name: Collect

# Data collection + weekly edition cut. Two run modes, both cron/dispatch driven:
#   1. Daily cron (not Tuesday) — silent data collection: ingest + enrich,
#      commit data/** only. The cutoff is unchanged, so a rebuild renders the
#      same published edition and nothing on the site changes.
#   2. Tuesday cron, or manual dispatch with cut_edition=true — the weekly
#      edition cut: ingest + enrich, bump data/edition.yaml to today, generate
#      commentary, commit data/**.
# This workflow only ever commits data/** — it does not render. Every push to
# main (including these commits) triggers Cloudflare's build, which renders from
# source and deploys; an edition cut ships simply by moving the cutoff in
# data/edition.yaml. Commits use GITHUB_TOKEN, which does not re-trigger GitHub
# Actions workflows, so there is no commit loop.

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC every day (03:00 CET/CEST); Tuesdays additionally cut the weekly edition. Early start absorbs GitHub's scheduler lag so a delayed run still lands Tuesday morning.
  workflow_dispatch:        # manual trigger from GitHub UI
    inputs:
      cut_edition:
        description: 'Cut a new edition (bump cutoff to today, render, deploy)'
        type: boolean
        default: false
      backfill_since:
        description: 'Backfill: re-ingest from this date (YYYY-MM-DD). Paginates source archives instead of only the feed head; already-ingested items are skipped by filename dedup.'
        type: string
        default: ''

permissions:
  contents: write           # needed to commit data/ and docs/ back to main

concurrency:
  # Serialize collect runs against each other so an overlapping daily/weekly run
  # can't race the git commit. render.yml no longer commits, so this is the only
  # path that writes to main.
  group: collect
  cancel-in-progress: false

env:
  # Provider for enrichment + commentary. Set the ENRICH_PROVIDER repo variable
  # to 'ollama' (with OLLAMA_API_KEY secret, host defaults below to Ollama Cloud)
  # for consistency with the local gemma4 setup, or 'anthropic' (with
  # ANTHROPIC_API_KEY secret). Auto-detects from key presence if unset.
  ENRICH_PROVIDER: ${{ vars.ENRICH_PROVIDER || '' }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
  OLLAMA_HOST: ${{ vars.OLLAMA_HOST || 'https://ollama.com' }}
  OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'gemma4:latest' }}

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine run mode
        id: mode
        # edition=true on the Tuesday schedule or an explicit dispatch — the
        # only runs that move the published cutoff forward.
        run: |
          edition=false
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%u)" = "2" ]; then
            edition=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.cut_edition }}" = "true" ]; then
            edition=true
          fi
          echo "edition=$edition" >> "$GITHUB_OUTPUT"
          echo "today=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv && uv sync

      - name: Ingest
        # A dispatch with backfill_since walks the source archives back to that
        # date — used to recover collection gaps (feeds only hold ~10-20 items,
        # so a missed stretch falls out of reach of the plain daily fetch).
        env:
          BACKFILL_SINCE: ${{ inputs.backfill_since }}
        run: |
          if [ -n "$BACKFILL_SINCE" ]; then
            uv run python -m pipeline.ingest --since "$BACKFILL_SINCE"
          else
            uv run python -m pipeline.ingest
          fi
        # Ingest runs without any API key — enrichment is the separate step below.
        # If a source returns 0 items it logs a warning but does not fail the job.

      - name: Enrich
        id: enrich
        # --limit caps per-run spend: a misbehaving scraper flooding events
        # cannot burn through the API budget in one run.
        run: uv run python -m pipeline.enrich --limit 200
        # Exit gracefully if no key configured — ingest + render still produce a useful site.
        # continue-on-error keeps a provider outage from blocking the data commit; the
        # Healthcheck ping step below folds this step's outcome into the alert so a
        # failure here is surfaced instead of silently succeeding.
        continue-on-error: true

      - name: Backfill stances
        id: stances
        run: uv run python -m pipeline.enrich --stances-only --limit 200
        # Catches events enriched before stance scoring existed or whose
        # stance block failed to parse on the first pass.
        continue-on-error: true

      - name: Validate YAML schemas
        # Blocking (no continue-on-error): malformed ingest or enrichment output
        # must not reach main. This fails the job before the commit step runs, so
        # job.status below is already 'failure' and the healthcheck ping picks it
        # up without needing to be folded into the ai_failed loop.
        run: uv run python -m pipeline.validate

      - name: Cut edition
        # Move the published cutoff to today. Everything ingested up to now
        # goes into this edition; later daily runs accumulate for the next one.
        if: ${{ steps.mode.outputs.edition == 'true' }}
        run: |
          cat > data/edition.yaml <<EOF
          # Edition cutoff: pipeline/render.py excludes events dated after this and
          # anchors all rolling windows to it, so re-renders between edition cuts
          # (e.g. layout-only merges) ship the same frozen data. Bumped by the weekly
          # Tuesday CI run, or manually via workflow_dispatch with cut_edition=true.
          cutoff: "${{ steps.mode.outputs.today }}"
          EOF

      - name: Comment
        id: comment
        # Commentary is written once per edition so it matches the frozen data.
        if: ${{ steps.mode.outputs.edition == 'true' }}
        run: uv run python -m pipeline.comment
        continue-on-error: true

      - name: Commit results
        # Plain git over the GITHUB_TOKEN credentials actions/checkout persists.
        # Only commits when something actually changed — no-op on an empty day.
        # data/** only; Cloudflare renders + deploys from source on the push.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if [ "${{ steps.mode.outputs.edition }}" = "true" ]; then
            msg="site: weekly edition ${{ steps.mode.outputs.today }}"
          else
            msg="data: daily ingest"
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$msg"
            git push
          fi

      - name: Healthcheck ping
        # healthchecks.io alerts if this ping doesn't arrive on schedule (catching
        # runs that never start) AND if it receives a /fail ping. The enrich,
        # stance-backfill, and commentary steps run with continue-on-error so a
        # provider outage never blocks the day's data commit — but that also means
        # the job reports success when they fail. Fold their outcomes in here so a
        # failed AI step trips the same alert as a failed run, instead of the
        # enrichment silently rotting while nobody notices.
        # Optional; skipped when the HEALTHCHECK_URL secret is not configured.
        if: ${{ always() }}
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          ai_failed=false
          for step in \
            "enrich=${{ steps.enrich.outcome }}" \
            "stances=${{ steps.stances.outcome }}" \
            "commentary=${{ steps.comment.outcome }}"; do
            name="${step%%=*}"; outcome="${step#*=}"
            if [ "$outcome" = "failure" ]; then
              echo "::warning::AI step '$name' failed; data was still committed, alerting via healthcheck"
              ai_failed=true
            fi
          done
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "HEALTHCHECK_URL not set; skipping ping"
            exit 0
          fi
          if [ "${{ job.status }}" = "success" ] && [ "$ai_failed" = "false" ]; then
            curl -fsS -m 10 --retry 3 "$HEALTHCHECK_URL" > /dev/null
          else
            curl -fsS -m 10 --retry 3 "$HEALTHCHECK_URL/fail" > /dev/null
          fi
