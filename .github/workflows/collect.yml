name: Collect

# Data collection + weekly edition cut. Two run modes, both cron/dispatch driven:
#   1. Daily cron (not Tuesday) — silent data collection: ingest + enrich,
#      commit data/** only. The site is not re-rendered, so nothing deploys.
#   2. Tuesday cron, or manual dispatch with cut_edition=true — the weekly
#      edition cut: ingest + enrich, bump data/edition.yaml to today, generate
#      commentary, render, commit data/** and docs/**.
# Merges to main redeploy the site via the separate render.yml workflow; this
# workflow no longer listens to push. Commits use GITHUB_TOKEN, which does not
# re-trigger any workflow, so there is no commit loop.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC every day; Tuesdays additionally cut the weekly edition
  workflow_dispatch:        # manual trigger from GitHub UI
    inputs:
      cut_edition:
        description: 'Cut a new edition (bump cutoff to today, render, deploy)'
        type: boolean
        default: false
      backfill_since:
        description: 'Backfill: re-ingest from this date (YYYY-MM-DD). Paginates source archives instead of only the feed head; already-ingested items are skipped by filename dedup.'
        type: string
        default: ''

permissions:
  contents: write           # needed to commit data/ and docs/ back to main

concurrency:
  # Serialize against the main-branch deploy in render.yml (same 'pipeline' group)
  # so the two paths that commit to main never clobber each other.
  group: pipeline
  cancel-in-progress: false

env:
  # Provider for enrichment + commentary. Set the ENRICH_PROVIDER repo variable
  # to 'ollama' (with OLLAMA_API_KEY secret, host defaults below to Ollama Cloud)
  # for consistency with the local gemma4 setup, or 'anthropic' (with
  # ANTHROPIC_API_KEY secret). Auto-detects from key presence if unset.
  ENRICH_PROVIDER: ${{ vars.ENRICH_PROVIDER || '' }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
  OLLAMA_HOST: ${{ vars.OLLAMA_HOST || 'https://ollama.com' }}
  OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'gemma4:latest' }}
  # Deployed under the minilaterals.com umbrella at this path, not the domain root.
  SITE_BASE_PATH: /weimar-triangle

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine run mode
        id: mode
        # edition=true on the Tuesday schedule or an explicit dispatch — the
        # only runs that move the published cutoff forward.
        run: |
          edition=false
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%u)" = "2" ]; then
            edition=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.cut_edition }}" = "true" ]; then
            edition=true
          fi
          echo "edition=$edition" >> "$GITHUB_OUTPUT"
          echo "today=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv && uv sync

      - name: Ingest
        # A dispatch with backfill_since walks the source archives back to that
        # date — used to recover collection gaps (feeds only hold ~10-20 items,
        # so a missed stretch falls out of reach of the plain daily fetch).
        env:
          BACKFILL_SINCE: ${{ inputs.backfill_since }}
        run: |
          if [ -n "$BACKFILL_SINCE" ]; then
            uv run python -m pipeline.ingest --since "$BACKFILL_SINCE"
          else
            uv run python -m pipeline.ingest
          fi
        # Ingest runs without any API key — enrichment is the separate step below.
        # If a source returns 0 items it logs a warning but does not fail the job.

      - name: Enrich
        # --limit caps per-run spend: a misbehaving scraper flooding events
        # cannot burn through the API budget in one run.
        run: uv run python -m pipeline.enrich --limit 200
        # Exit gracefully if no key configured — ingest + render still produce a useful site.
        continue-on-error: true

      - name: Backfill stances
        run: uv run python -m pipeline.enrich --stances-only --limit 200
        # Catches events enriched before stance scoring existed or whose
        # stance block failed to parse on the first pass.
        continue-on-error: true

      - name: Cut edition
        # Move the published cutoff to today. Everything ingested up to now
        # goes into this edition; later daily runs accumulate for the next one.
        if: ${{ steps.mode.outputs.edition == 'true' }}
        run: |
          cat > data/edition.yaml <<EOF
          # Edition cutoff: pipeline/render.py excludes events dated after this and
          # anchors all rolling windows to it, so re-renders between edition cuts
          # (e.g. layout-only merges) ship the same frozen data. Bumped by the weekly
          # Tuesday CI run, or manually via workflow_dispatch with cut_edition=true.
          cutoff: "${{ steps.mode.outputs.today }}"
          EOF

      - name: Comment
        # Commentary is written once per edition so it matches the frozen data.
        if: ${{ steps.mode.outputs.edition == 'true' }}
        run: uv run python -m pipeline.comment
        continue-on-error: true

      - name: Render
        # Only edition cuts touch docs/ here — plain daily runs collect data
        # silently. Merges to main redeploy separately via render.yml.
        if: ${{ steps.mode.outputs.edition == 'true' }}
        run: uv run python -m pipeline.render --output docs/weimar-triangle

      - name: Commit results
        # Plain git over the GITHUB_TOKEN credentials actions/checkout persists.
        # Only commits when something actually changed — no-op on an empty day.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.mode.outputs.edition }}" = "true" ]; then
            git add data docs
            msg="site: weekly edition ${{ steps.mode.outputs.today }}"
          else
            git add data
            msg="data: daily ingest"
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$msg"
            git push
          fi

      - name: Healthcheck ping
        # Dead-man switch: healthchecks.io alerts if this ping doesn't arrive on
        # schedule — catching runs that never start, not just runs that fail.
        # Optional; skipped when the HEALTHCHECK_URL secret is not configured.
        if: ${{ always() }}
        run: |
          if [ -n "${{ secrets.HEALTHCHECK_URL }}" ]; then
            if [ "${{ job.status }}" = "success" ]; then
              curl -fsS -m 10 --retry 3 "${{ secrets.HEALTHCHECK_URL }}" > /dev/null
            else
              curl -fsS -m 10 --retry 3 "${{ secrets.HEALTHCHECK_URL }}/fail" > /dev/null
            fi
          fi
