name: Test

# Unit tests over the pipeline's pure logic (classification, convergence/stance
# scoring, date windows, LLM-response parsing, source parsers). No commits, so it
# runs independently of the 'pipeline' concurrency group used by
# collect.yml/render.yml — same as lint.yml.

on:
  push:
    branches: ['**']

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv && uv sync

      - name: Run tests
        run: uv run pytest -q
