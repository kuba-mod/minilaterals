name: Lint

# Static analysis only — no commits, so it runs independently of the
# 'pipeline' concurrency group used by collect.yml/render.yml.

on:
  push:
    branches: ['**']

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv && uv sync

      - name: Ruff check
        run: uv run ruff check .
