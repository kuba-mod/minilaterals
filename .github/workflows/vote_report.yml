name: Vote report

# Weekly email digest of votes cast on the hub page's "vote for the next
# grouping" feature (see worker/index.js and pipeline/vote_report.py).
#
# Deliberately schedule + workflow_dispatch only — never pull_request, issue,
# or any event an outside contributor can trigger. workflow_dispatch itself
# requires repo write access to invoke from the GitHub UI/API, so nobody who
# just happens to visit or fork the repo can run this job or reach the SMTP
# secrets it uses. Reading /api/votes needs no credentials (it's the same
# public endpoint the hub page calls); only the email step below does.
#
# Requires these repo secrets (Settings → Secrets and variables → Actions):
#   SMTP_SERVER, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD
# for whatever mail provider sends as hello@minilaterals.com.

on:
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC
  workflow_dispatch:        # manual trigger from GitHub UI (requires write access)

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv && uv sync

      - name: Build report
        run: uv run python -m pipeline.vote_report --format html > /tmp/vote_report.html

      - name: Email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: 'minilaterals.com — weekly vote report'
          from: minilaterals.com vote report <${{ secrets.SMTP_USERNAME }}>
          to: hello@minilaterals.com
          html_body: file:///tmp/vote_report.html
