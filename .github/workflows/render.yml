name: Render

# Render CI check. Cloudflare is the deploy path now — its Git-integration build
# runs scripts/cf-build.sh (pipeline.render) on every push and serves the result,
# so docs/ is a build artifact and is not committed to the repo. This workflow
# does not deploy; it renders on every push purely to (a) fail fast if render.py
# crashes and (b) upload the built tree as a downloadable artifact for previewing
# a layout change without waiting on Cloudflare. render.py excludes events dated
# after data/edition.yaml's cutoff, so a render is a pure function of
# (templates, data, cutoff).

on:
  push:
    branches: ['**']

permissions:
  contents: read            # render-only CI check; nothing is committed

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

env:
  # Deployed under the minilaterals.com umbrella at this path, not the domain root.
  SITE_BASE_PATH: /weimar-triangle

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install uv && uv sync

      - name: Render
        run: uv run python -m pipeline.render --output docs

      - name: Upload rendered site
        # Download the zip from the run summary and open weimar-triangle/index.html
        # locally to verify a render without waiting on the Cloudflare preview.
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: docs
