# Reference goal sentences for each tracked issue area, shared across the
# minilateral groupings that track the topic (see data/groupings.yaml).
# pipeline/enrich.py reads these as the goal each country's stance is rated
# against. Goals are topic-level: one sentence per topic. Sources for the
# original Weimar priorities: FM joint declarations Feb/May 2024; EU Affairs
# Ministers Dec 2024. The newer topics (iran, migration, energy, indo_pacific,
# submarines) are drafted from the stated aims of the respective formats and
# are editable.

# --- Shared / Weimar Triangle priorities ---

ukraine: >
  Sustained, coordinated long-term support for Ukraine across military,
  economic, and diplomatic dimensions until a just and lasting peace is achieved.

defence: >
  A stronger European defence capability complementary to NATO, with particular
  attention to deterrence, the eastern flank, and collective security.

hybrid: >
  Coordinated action against hybrid threats including disinformation campaigns,
  cyber attacks, and foreign political interference.

enlargement: >
  Support for the EU accession of Ukraine and the Western Balkans, alongside
  the institutional reforms needed to prepare the Union for enlargement.

green_transition: >
  Support for the Clean Industrial Deal and the path to climate neutrality,
  aligning industrial and energy policy with European green objectives.

rule_of_law: >
  Democratic resilience, the rule of law, and countering disinformation as
  foundational to European unity and security.

# --- E3 (France, Germany, United Kingdom) ---

iran: >
  Preventing Iran from acquiring nuclear weapons: preserving or restoring
  verifiable limits on its nuclear programme and full IAEA oversight, and
  addressing destabilising regional activity.

# --- Visegrád Group ---

migration: >
  Effective control of the EU's external borders and coordinated management of
  irregular migration and asylum policy.

# --- Baltic Three / Visegrád (energy security) ---

energy: >
  Reducing dependence on Russian energy and securing regional energy supply,
  interconnection, and critical infrastructure.

# --- AUKUS ---

indo_pacific: >
  A free and open Indo-Pacific, upholding international law and deterring
  coercion in the region.

submarines: >
  Delivering conventionally-armed, nuclear-powered submarine capability and
  advanced-technology cooperation (AUKUS Pillar II).
