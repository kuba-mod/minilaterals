  location: Berlin, Germany
  position: Germany strongly supports Ukraine's sovereignty and independence, viewing
    its fate as intrinsically linked to Europe's security and advocating for a peace
    process that includes a free and sovereign Ukraine.
  positions:
    ukraine: Germany commits to long-term support for Ukraine across military, economic,
      and diplomatic dimensions until a just and lasting peace is achieved by supporting
      its sovereignty and independence.
    defence: Germany supports strengthening European defense capabilities by emphasizing
      collective security and the need for self-protection against external threats.
    hybrid: Germany calls for coordinated action against hybrid threats by highlighting
      the ongoing dangers of violence, lack of freedom, and revisionism.
    enlargement: Germany supports the EU accession of Ukraine by stating that a free
      and sovereign Ukraine is necessary for sustainable peace in Europe.
    rule_of_law: Germany affirms democratic resilience and the rule of law by contrasting
      the fight for freedom with the dangers posed by revisionism.
