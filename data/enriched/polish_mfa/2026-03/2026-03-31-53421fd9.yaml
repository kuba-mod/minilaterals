  location: Kyiv, Ukraine
  position: Poland remains ready to support self-defending Ukraine, including in military
    terms, and is taking concrete steps to participate in international accountability
    mechanisms for Russian crimes.
  positions:
    ukraine: Poland commits to continued support for Ukraine, covering energy security,
      defense capabilities, and post-war support for veterans, while emphasizing that
      no agreement with Russia is possible due to its interest only in Ukraine's surrender.
    defence: Poland reaffirms its readiness to support Ukraine militarily for as long
      as needed, aligning with the goal of strengthening collective security and defense
      capabilities.
    enlargement: Poland is taking proactive steps toward EU enlargement by acceding
      to the Special Tribunal for the Crime of Aggression and joining the International
      Claims Commission for Ukraine as a founding member.
    rule_of_law: Poland strongly condemns Russia's aggression and the Bucha massacre,
      demanding that Russia be held accountable for its crimes and rejecting any justification
      of its actions.
