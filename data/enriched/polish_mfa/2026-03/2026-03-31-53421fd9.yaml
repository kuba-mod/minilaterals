  positions:
    ukraine: Poland strongly supports Ukraine’s continued political and military stability,
      emphasizing the need to hold Russia accountable for war crimes and providing
      ongoing aid.
    defence: Poland commits to supporting Ukraine's defense capabilities and is actively
