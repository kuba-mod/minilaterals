  location: Paris, France
  position: Poland reiterated that the European Union remains India’s largest trade
    partner, while advocating for joint action with India on security and defense
    matters and the reduction of Russian oil imports.
  positions:
    ukraine: The ministers stressed that Europe, working closely with the US administration,
      must actively engage in forging peace solutions that comply with international
      law, and called for sustained sanctions against Russia, including targeting
      its energy and financial sectors.
    defence: The ministers discussed bringing the sphere of security and defence under
      the EU–India Partnership, suggesting alignment between Brussels and New Delhi
      on Russia’s aggression.
    rule_of_law: The top diplomats concluded that Russia’s attacks and disregard for
      international law necessitate sustained pressure through sanctions, and India
      was urged to reduce Russian oil imports to prevent financing of the war machine.
