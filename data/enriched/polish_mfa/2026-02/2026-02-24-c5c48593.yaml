  location: Kyiv, Ukraine
  position: Poland supports a united European effort to provide comprehensive security
    guarantees and aid to Ukraine, emphasizing the necessity of EU accession for long-term
    stability.
  positions:
    ukraine: Poland strongly commits to supporting Ukraine's recovery and sovereignty
      following Russian aggression, highlighting international efforts to isolate
      Russia.
    defence: Poland advocates for collective security through increased defense support
      and leveraging European influence to bolster Ukraine's defenses.
    enlargement: Poland views Ukraine's EU accession as a core component of its security
      strategy and commits to advancing negotiations based on established criteria.
    rule_of_law: Poland supports democratic resilience and cooperation with Ukraine,
      demonstrated by facilitating historical dialogue and aid.
