  location: null
  position: Poland strongly condemns Russia's war against Ukraine and calls for increased
    international pressure, sanctions, and support for Kyiv's sovereignty and security.
  positions:
    ukraine: Poland commits to long-term support for Ukraine across all dimensions
      until a just and lasting peace is achieved, emphasizing accountability for Russian
      crimes and ensuring no decision is made without Ukrainian consent.
    defence: Poland supports strengthening EU defense capabilities by reinforcing
      response measures in the Baltic Sea region against Russia's aggressive actions.
    hybrid: Poland calls for coordinated action against hybrid threats by addressing
      cyber operations, disinformation (FIMI), election interference, and migration
      instrumentalization.
    enlargement: Poland supports Ukraine's sovereignty and territorial integrity within
      its internationally recognized borders, aligning with goals for EU accession.
    green_transition: Poland supports the energy transition by emphasizing the need
      to end dependency on Russian energy imports in line with REPowerEU.
    rule_of_law: Poland supports democratic resilience and international law by demanding
      accountability for war crimes and supporting a peace based on the UN Charter.
