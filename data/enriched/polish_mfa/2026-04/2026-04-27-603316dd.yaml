  position: Poland supports strengthening regional media presence and democratic resilience
    in Eastern Partnership countries through international media projects.
  positions:
    hybrid: The project aims to strengthen public resilience to manipulation and counter
      disinformation targeted at Georgia and its international partners, aligning
      with the call for coordinated action against hybrid threats.
    enlargement: The project is planned to cover all the EU’s Eastern Partnership
      countries and more, supporting the goal of EU accession for neighboring countries.
    rule_of_law: The project aims to present reliable information and support the
      process of democratisation, affirming democratic resilience and the rule of
      law.
