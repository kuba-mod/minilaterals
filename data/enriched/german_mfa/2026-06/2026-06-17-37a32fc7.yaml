  position: Germany and Poland affirm their commitment to strengthening European security
    through joint action, particularly in response to Russian aggression.
  positions:
    ukraine: The declaration commits to supporting a just and lasting peace in Ukraine
      while acknowledging the need for regional responsibility.
    defence: Germany strongly supports enhancing collective defense capabilities,
      exemplified by the new German-Polish Defence Cooperation Agreement.
    hybrid: The declaration calls for enhanced resilience and coordinated action against
      Russia's hybrid threats, including disinformation campaigns.
    rule_of_law: Germany emphasizes protecting European values, including the rule
      of law and free elections, as foundational to security.
