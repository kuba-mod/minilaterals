  position: Germany and Poland affirm their commitment to strengthening European security
    through cooperation, particularly in response to Russian aggression, while emphasizing
    adherence to democratic values.
  positions:
    ukraine: The declaration commits to supporting a just and lasting peace for Ukraine,
      viewing it as essential for strengthening European security.
    defence: Germany strongly supports enhancing collective defense capabilities,
      exemplified by the new German-Polish Agreement on Defence Cooperation to secure
      the eastern flank.
    hybrid: Germany calls for coordinated resilience and action against hybrid threats,
      including disinformation campaigns aimed at undermining public order.
    rule_of_law: Germany affirms that protecting European values, including the rule
      of law and free elections, remains a core priority for regional stability.
