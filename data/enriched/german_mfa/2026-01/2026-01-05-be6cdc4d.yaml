  location: Lithuania
  position: Germany emphasizes the need for strong European cohesion and resolute
    action, alongside Lithuania and NATO partners, to counter Russian threats and
    defend freedom.
  positions:
    ukraine: Germany commits to continued support for Ukraine's efforts to end Russia’s
      war of aggression, viewing a strong Ukraine as essential for lasting peace in
      Europe.
    defence: Germany supports strengthening its defense capabilities and collective
      security by increasing vigilance, investing in infrastructure, and deploying
      military assets abroad.
    hybrid: Germany calls for coordinated action with partners to ward off diverse
      Russian threats, including those that undermine security and stability.
    rule_of_law: Germany stresses that maintaining democratic resilience and European
      unity requires countering external threats and ensuring self-defense capabilities.
  stances:
    ukraine:
      score: 2
      evidence: Another thing that unites us with our Lithuanian friends is our firm
