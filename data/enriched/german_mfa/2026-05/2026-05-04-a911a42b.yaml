  location: Athens, Greece
  position: Germany views Greece as a strategic partner essential for forging closer
    ties to build a resilient Europe capable of protecting its interests and values.
  positions:
    defence: Germany supports strengthening EU defense capabilities through joint
      procurement, European funding, and building a robust defense industry, particularly
      with close partners like Greece.
    hybrid: Germany emphasizes the need for coordinated action against global challenges,
      citing Russia's war in Ukraine, the Middle East situation, and Iran's blockade,
      which challenge established global rules.
    enlargement: Germany stresses the importance of tangible progress and credible
      accession prospects for candidate countries, including Albania and Ukraine,
      noting Greece's special role during its 2027 Presidency.
    rule_of_law: Germany affirms that Greece is the cradle of essential values and
      that the EU must enhance its decision-making processes to address crises and
      uphold democratic resilience.
  stances:
    defence:
      score: 1
      evidence: we Europeans have decided to take on greater responsibility for our
        own security and defence capabilities.
    hybrid:
      score: 1
      evidence: Russia’s war of aggression against Ukraine, the situation in the Middle
        East and Iran’s blockade of the Strait of Hormuz show that our security, economic
        stability and open trade routes are inextricably linked.
    enlargement:
      score: 2
      evidence: From Albania to Ukraine, we must offer credible prospects for accession.
    rule_of_law:
