  location: Belgrade, Serbia
  position: France reaffirmed its deep support for Serbia's EU accession path while
    announcing significant investments in infrastructure and regional security cooperation.
  positions:
    enlargement: France strongly supports the EU membership of Western Balkans countries
      like Serbia, emphasizing the need to speed up reforms towards accession.
    green_transition: France supports sustainable urban development by funding major
      infrastructure projects like a wastewater treatment plant and modern metro systems.
    hybrid: France commits to regional security by funding a program aimed at combating
      synthetic drug trafficking and related risks in the Western Balkans.
    rule_of_law: France emphasizes democratic resilience and stability by supporting
      Serbia's path towards EU integration and institutional reform.
