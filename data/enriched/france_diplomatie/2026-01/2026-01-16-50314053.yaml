      evidence: During his discussions, the Minister was keen to express to his interlocutors
        France’s deep support for Serbia’s prospective EU membership, in keeping with
        the French Strategy for the Western Balkans, and the importance of speeding
        up reforms along the path towards accession.
    green_transition:
      score: 2
      evidence: The Minister also signed a Memorandum of Understanding on the construction
        of a wastewater treatment plant for the city of Belgrade. ... Given the challenges
