  position: France and its partners express deep concern over new repressive legislation
    in Georgia that undermines democratic freedoms and breaches EU commitments.
  positions:
    rule_of_law: The statement strongly affirms the importance of rule of law by criticizing
      Georgian actions that restrict civil society and weaken legal frameworks.
    enlargement: The statement criticizes Georgia's actions for hindering its own
      EU accession process, thereby supporting the principle of stable enlargement.
  stances:
    rule_of_law:
      score: 1
      evidence: We regret the adoption on March 4th by the Georgian Parliament of
        new legislation on foreign funding and political activities, which is proof
        of a further repressive approach adopted by the Georgian authorities in relation
        to civil society.
    enlargement:
      score: 1
      evidence: We recall that it was Georgian government’s course of action since
        2024 that has brought the EU accession process to a de facto halt, as determined
        by the European Council’s conclusions in 2024 and assessed by the European
        Commission in its Enlargement Report in 2025.
