  position: France reiterated unwavering support for Ukraine's defense and stressed
    the need for coordinated international action to achieve a just and lasting peace.
  positions:
    ukraine: The leaders commit to providing long-term military, economic, and diplomatic
      support to Ukraine until a just and lasting peace is achieved.
    defence: France supports strengthening European defense capabilities through increased
      industrial cooperation and joint development of advanced military systems with
      Ukraine.
    hybrid: The leaders condemn Russia's aggressive actions, including missile attacks
      on civilians and dangerous drone incursions into NATO territory.
    enlargement: The leaders support Ukraine's path toward stability by emphasizing
      its inextricable link to wider Euro-Atlantic security.
    rule_of_law: The leaders support diplomatic efforts for peace, including a direct
      dialogue between Ukraine and Russia with international participation.
