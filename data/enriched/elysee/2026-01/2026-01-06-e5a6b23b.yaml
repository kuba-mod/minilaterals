  location: Paris, France
  position: France and partners committed to ensuring Ukraine's sovereignty and security
    through robust, legally binding guarantees as part of a lasting peace agreement.
  positions:
    ukraine: The Coalition commits to long-term support for Ukraine across military,
      economic, and diplomatic dimensions by confirming that its sovereignty and security
      must be integral parts of any peace settlement backed by robust guarantees.
    defence: The Coalition supports strengthening collective security and defense
      capabilities, recognizing Ukraine's ability to defend itself as critically important.
    hybrid: The statement does not explicitly address coordinated action against hybrid
      threats like disinformation or cyber attacks.
    enlargement: The statement supports the general goal of a lasting peace and security
      for Ukraine, which aligns with future EU enlargement goals, but does not specifically
      mention Western Balkans or institutional reforms.
    rule_of_law: The Coalition stresses the commitment to a just and lasting peace
      in line with United Nations Charter principles, affirming democratic resilience
      and international law.
