  location: Gdansk, Poland
  position: France and Poland reaffirmed their commitment to a secure, sovereign,
    democratic, and united Europe by strengthening bilateral cooperation and coordinating
    efforts on defense and sanctions against Russia.
  positions:
    ukraine: France strongly commits to long-term support for Ukraine's independence
      and territorial integrity until a just and lasting peace is achieved, viewing
      it as a common security interest.
    defence: France supports building a robust EU defense capability complementary
      to NATO by increasing investment, developing industrial bases, and reducing
      strategic dependencies.
    rule_of_law: France affirms democratic resilience and the rule of law as foundational
      to European security by upholding international rules-based order and supporting
      democracy.
