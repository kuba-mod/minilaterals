title: Eesti ja Malta Ordu sõlmisid koostööleppe tervishoiu ja humanitaarabi edendamiseks
text: Täna, 11. juunil allkirjastasid välisminister Margus Tsahkna ja Malta Ordu suurkantsler
  Riccardo Paternò di Montecupo Tallinnas kokkuleppe, mis loob õigusliku aluse Malta
  Ordu hospitaliidi- ja tervishoiutegevuse edendamiseks Eestis. Allkirjastamine toimus
  Malta Ordu suurmeistri ametliku visiidi veerel.
