title: Poliitikaküsimuste asekantsler Martin Roger pidas Türgis poliitilisi konsultatsioone
text: Välisministeeriumi poliitikaküsimuste asekantsler Martin Roger viibis täna,
  4. juunil visiidil Türgi pealinnas Ankaras, kus toimusid kohtumised Türgi asevälisministrite
  Mehmet Kemal Bozay ja Levent Gümrükçü ning teiste ametnikega. Arutelude keskmes
  olid Eesti ja Türgi kahepoolne koostöö, Venemaa jätkuv agressioon Ukrainas ning
  olukord Lähis-Idas ja Lõuna-Kaukaasias.
