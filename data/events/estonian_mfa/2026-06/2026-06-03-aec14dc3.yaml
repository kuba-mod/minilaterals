title: Eesti suursaatkonnas Kopenhaagenis avati kaheksas Eesti ettevõtluskeskus
text: 1.–2. juunil viibis välisministeeriumi välismajanduse ja arengukoostööküsimuste
  asekantsler Mariin Ratnik visiidil Taani pealinnas Kopenhaagenis, kus ta avas Eesti
  saatkonna uuenenud ruumid ja sinna juurde kuuluva ettevõtluskeskuse. Asekantslerit
  saatis visiidil Eesti äridelegatsioon.
