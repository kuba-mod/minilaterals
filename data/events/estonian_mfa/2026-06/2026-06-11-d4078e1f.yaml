title: 'Asekantsler Minna-Liina Lind Kiievis: NB8 riikidel on keskne roll Ukraina
  globaalse toetuse kindlustamisel ja Venemaa survestamisel'
text: Sel nädalal, 9.–10. juunil korraldas välisministeeriumi globaalküsimuste asekantsler
  Minna-Liina Lind Põhjala-Balti (NB8) riikide välisministeeriumite aseministrite
  ja asekantsleritega visiidi Kiievisse. Arutelude keskmes olid Ukraina jätkuv toetamine
  rahvusvahelistes organisatsioonides, Venemaa isoleerimine ja vastutusele võtmine
  ning infovahetus Ukraina küüditatud laste küsimuses.
