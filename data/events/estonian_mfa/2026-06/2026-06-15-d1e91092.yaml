title: 'Tsahkna kohtumisel Ungari välisministriga: Ungari hiljutised sammud on võimaldanud
  Euroopa Liidul oluliste teemadega edasi liikuda'
text: Täna, 15. juunil toimus Luxembourgis Euroopa Liidu välisministrite kohtumise
  veerel Eesti juhtimisel Põhjala ja Balti riikide välisministrite kohtumine Ungari
  välisministri Anita Orbaniga, et arutada koostööd Euroopa Liidus.
