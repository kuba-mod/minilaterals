title: 'Asekantsler Minna-Liina Lind Madridis: naiste ja tüdrukute õigused peavad
  olema välispoliitikas kesksel kohal'
text: Välisministeeriumi globaalküsimuste asekantsler Minna-Liina Lind viibis sel
  nädalal visiidil Madridis, kus ta osales viiendal feministliku välispoliitika kõrgetasemelisel
  konverentsil. Lisaks toimusid globaalkonsultatsioonid Hispaania välisministeeriumis
  ning kohtumised konfliktidega seotud seksuaalvägivalla ÜRO eriesindaja Pramila Patteni,
  Armeenia asevälisministri Robert Abisoghomonjani ning Kuveidi asevälisministri Sheikha
  Jawaher Ibrahim Al-Duaij Al-Sabah’ga.
