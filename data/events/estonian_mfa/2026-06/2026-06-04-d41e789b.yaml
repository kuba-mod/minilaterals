title: Eesti rõhutas OECD ministrite kohtumisel toetust Ukrainale ning avatud turgude
  tähtsust
text: 3.–4. juunil kohtusid Pariisis Majandusliku Koostöö ja Arengu Organisatsiooni
  (OECD) liikmes- ja partnerriikide ministrid, et arutada tööstuspoliitika rolli majanduskasvu
  ja konkurentsivõime edendamisel. Eesti delegatsiooni juhtis välisministeeriumi väliskaubanduspoliitika
  ja rahvusvaheliste majandusorganisatsioonide osakonna peadirektor Kenneth Kopamees.
