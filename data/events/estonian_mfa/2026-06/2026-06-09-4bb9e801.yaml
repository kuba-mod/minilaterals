title: 'Välisminister Tsahkna ettevõtjate infopäeval: ELi-Mercosuri ja ELi-Mehhiko
  lepingud on uus võimalus Eesti ettevõtetele'
text: '9. juunil toimus välisministeeriumis infopäev „Tollid langevad, turud avanevad:
  ELi-Mercosuri ja ELi-Mehhiko kaubanduslepingute praktiline infopäev Eesti ettevõtjatele“,
  mille raames tutvustati Eesti ettevõtjatele lepingutega seotud võimalusi ja väljakutseid.
  Infopäevale eelnes pidulik Ukraina aukonsulite ametisse astumise tseremoonia, millest
  olid kutsutud osa saama ka infopäeval osalevad Eesti ettevõtjad. Tseremoonia raames
  kõnelesid Eesti välisminister Margus Tsahkna ja Ukraina välisminister Andrii Sõbiha.'
