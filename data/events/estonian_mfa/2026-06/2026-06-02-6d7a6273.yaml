title: 'Välisminister Tsahkna: Venemaa öine raketirahe kinnitab Putini kasvavat meeleheidet'
text: Ööl vastu 2. juunit korraldas Venemaa Ukraina vastu järjekordse ulatusliku drooni-
  ja raketirünnaku, mille tagajärjel hukkus vähemalt 12 inimest ja vigastada sai üle
  saja, nende seas ka lapsed. Välisminister Margus Tsahkna sõnul kinnitab see brutaalne
  rünnak, et Venemaa muutub sõja venimise ja strateegilise paigalseisu tõttu üha närvilisemaks.
