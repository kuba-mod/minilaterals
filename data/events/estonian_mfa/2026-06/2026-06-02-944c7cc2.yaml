title: Eesti lõpetab Venemaa mittebiomeetriliste diplomaatiliste ja teenistuspasside
  tunnustamise
text: Alates 1. septembrist 2026 ei tunnusta Eesti Vabariik Venemaa Föderatsiooni
  mittebiomeetrilisi diplomaatilisi ega teenistuspasse Euroopa Liidu välispiiri ületamiseks
  ega viisa taotlemiseks. Venemaa Föderatsiooni mittebiomeetrilisi tavapasse ei tunnustata
  juba alates 31. märtsist 2025.
