title: 'Tsahkna: relvarahu Iisraeli ja Liibanoni vahel aitab maandada pingeid kogu
  regioonis'
text: Välisminister Margus Tsahkna ütles, et Ameerika Ühendriikide vahendusel kokku
  lepitud relvarahu Iisraeli ja Liibanoni vahel on oluline samm püsiva rahu saavutamiseks
  ning aitab maandada pingeid kogu Lähis-Ida regioonis.
