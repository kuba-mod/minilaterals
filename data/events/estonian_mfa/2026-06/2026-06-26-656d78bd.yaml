title: Marianne Mikko valiti ÜRO naiste õiguste komitee liikmeks
text: Täna, 26. juunil valiti New Yorgis toimunud valimistel Marianne Mikko uueks
  ametiajaks ÜRO naiste õiguste komitee (CEDAW) liikmeks. Endine Euroopa Parlamendi
  ja Riigikogu liige Marianne Mikko oli Põhjala-Balti (NB8) riikide ühiskandidaat.
  Kaheteistkümnele vabanevale kohale kandideerisid 20 riigi esindajad ning Mikko kogus
  133 riigi toetuse. Mikko kuulub komiteesse alates 2023. aastast ning valiti 2025.
  aastal komitee asepresidendiks. Uus mandaat on aastateks 2027–2030 ning tagab Eestile
  esindatuse ÜRO olulisimas naiste õiguste organis.
