title: Kantsler Vseviov kohtus Stockholmis Rootsi välisministeeriumi kantsleriga
text: Välisministeeriumi kantsler Jonatan Vseviov viibis täna, 1. juunil töövisiidil
  Stockholmis, kus ta kohtus Rootsi välisministeeriumi kantsleri Dag Harteliusega.
  Lisaks toimusid kohtumised Rootsi kaitseväe juhataja kindral Michael Claessoni,
  rahvusliku julgeoleku nõuniku Niclas Kvarnströmi, Rootsi välispoliitika instituudi
  (UI) juhi Jakob Hallgreni ning teiste ametnikega.
