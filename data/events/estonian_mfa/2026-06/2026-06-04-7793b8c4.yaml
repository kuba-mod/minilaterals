title: Välisminister Tsahkna andis Eesti Rahva Muuseumile üle Austraalias varjul olnud
  Vabariigi Presidendi lipu reliikvia
text: Välisminister Margus Tsahkna andis täna, 4. juunil Eesti Rahva Muuseumile üle
  Vabariigi Presidendi lipu, mis päästeti 1944. aastal Tallinnas Punaarmee kätte langemisest
  ja mis oli üle kaheksa aastakümne varjul välismaal, sellest valdava osa Austraalias.
