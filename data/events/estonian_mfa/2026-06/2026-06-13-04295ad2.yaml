title: Euroopa Liit jõudis kokkuleppele liitumisläbirääkimiste alustamises Ukraina
  ja Moldovaga
text: Euroopa Liidu 27 liikmesriiki jõudsid eile, 12. juunil kokkuleppele avamaks
  Ukraina ja Moldovaga liitumisläbirääkimiste esimene teemaplokk ehk põhialused. Välisminister
  Margus Tsahkna sõnul on see kauaoodatud ja oluline samm nende riikide ELiga ühinemise
  teel.
