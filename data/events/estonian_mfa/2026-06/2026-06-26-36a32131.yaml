title: 'Välisminister Tsahkna: järgmine Ukraina taastekonverents toimub 2027. aastal
  Tallinnas'
text: Täna, 26. juunil lõppes Gdanskis ametlikult viies Ukraina taastekonverents.
  Konverentsi lõpus andis korraldaja Poola teatepulga üle Eesti välisministrile Margus
  Tsahknale. Kuues Ukraina taastekonverents toimub 2027. aastal Tallinnas.
