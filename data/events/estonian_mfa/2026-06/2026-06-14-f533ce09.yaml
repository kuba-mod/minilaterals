title: 'Välisminister Tsahkna: Euroopa Liit avab homme liitumisläbirääkimiste esimese
  teemaploki Ukraina ja Moldovaga'
text: Homme, 15. juunil osaleb välisminister Margus Tsahkna Luksemburgis toimuval
  Euroopa Liidu välisasjade nõukogu kohtumisel, kus arutatakse Venemaa agressiooni
  Ukraina vastu, olukorda Lähis-Idas ja Euroopa Liidu – Hiina suhteid. Homme pärastlõunal
  toimuvad Luksemburgis valitsustevahelised konverentsid Ukraina ja Moldovaga, mille
  käigus avatakse ametlikult ELiga liitumisläbirääkimiste esimene teemaplokk. Eesti
  juhtimisel toimub Luksemburgis ka Põhjala ja Balti riikide välisministrite kohtumine
  Ungari välisministri Anita Orbaniga.
