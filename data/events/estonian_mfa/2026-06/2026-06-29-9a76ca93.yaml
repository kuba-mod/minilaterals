title: Eesti toetab Ukraina energiasüsteemi vastupidavust 125 000 euroga
text: Kliimaministeerium koos Välisministeeriumiga toetab taas Ukraina energiafondi
  (Ukraine Energy Support Fund) enam kui saja tuhande euroga, et aidata kaasa Ukraina
  energiataristu taastamisele ja varustuskindluse tagamisele.
