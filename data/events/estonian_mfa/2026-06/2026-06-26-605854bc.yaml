title: 'Välisminister Tsahkna: Pax Silica kokkulepe on võimalus edendada tehnoloogiat,
  innovatsiooni ja riikidevahelist koostööd'
text: Eile, 25. juunil sai Eesti USA juhitud Pax Silica algatuse vaatlejariigiks ja
  allkirjastas Pax Silica tehisaruavalduse. Pax Silica algatus käivitati 2025. aastal
  eesmärgiga tugevdada usaldusväärsete partnerite koostööd tehisintellekti ja kriitilise
  toorme tarneahelates.
