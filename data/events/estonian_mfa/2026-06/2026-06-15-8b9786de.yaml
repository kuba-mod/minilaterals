title: 'Tsahkna ELi välisministrite kohtumisel: ELi ambitsioon peab olema mereteenuste
  keeld ja alumiiniumoksiidi ekspordikeeld'
text: Täna, 15. juunil osales välisminister Margus Tsahkna Luksemburgis toimunud Euroopa
  Liidu välisministrite kohtumisel, kus kiideti heaks täiendavad isikuvastased sanktsioonid
  Venemaa vastu. Välisministri sõnul on see samm õiges suunas, aga survet Venemaale
  tuleb veelgi suurendada tugeva 21. sanktsioonipaketi kiire vastuvõtmisega.
