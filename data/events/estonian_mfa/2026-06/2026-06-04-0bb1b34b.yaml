title: Välisministeerium andis valitsusele ülevaate strateegilise kauba komisjoni
  tegevusest 2025. aastal
text: Välisminister Margus Tsahkna esitas valitsusele ülevaate välisministeeriumi
  juures tegutseva strateegilise kauba komisjoni tegevusest 2025. aastal, sealhulgas
  rahvusvahelise ekspordikontrolli arengutest, komisjoni tööst ja riikliku järelevalve
  tugevdamisest.
