title: 'Välisminister Tsahkna kohtumisel Kuuba opositsiooni esindajaga: Kuuba rahvas
  väärib vaba ja demokraatlikku tulevikku'
text: Täna, 17. juunil kohtus välisminister Margus Tsahkna Eestis viibiva Kuuba opositsiooni
  esindaja Orlando Gutierrez-Boronatiga, et arutada olukorda Kuubal ning võimalusi
  toetada sealset kodanikuühiskonda ja leevendada inimõiguste halvast olukorrast tingitud
  kannatusi.
