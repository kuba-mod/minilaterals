title: 'Tsahkna Luksemburgis: Euroopa Liit avas Ukraina ja Moldova ühinemisläbirääkimiste
  esimese teemaploki'
text: Täna, 15. juunil toimusid Luksemburgis valitsustevahelised konverentsid Ukraina
  ja Moldovaga, kus avati nende riikide Euroopa Liiduga ühinemisläbirääkimiste esimene
  teemaplokk. Välisminister Margus Tsahkna sõnul on tegemist kauaoodatud sammuga,
  mis võimaldab pärast mitmeaastast paigalseisu nende riikide ühinemisläbirääkimistega
  edasi liikuda.
