title: 'Välisminister Tsahkna Ukraina välisministrile: Ukraina ELi liikmesus on meie
  enda julgeoleku küsimus'
text: Täna, 9. juunil kohtus välisminister Margus Tsahkna Tallinnas oma Ukraina kolleegi,
  välisminister Andrii Sõbihaga. Arutelude keskmes olid Ukraina julgeolek, vajadus
  suurendada survet Venemaale, rahuprotsessi väljavaated, Ukraina ühinemine Euroopa
  Liiduga ning Ukraina ülesehitus.
