title: 'Välisminister Tsahkna Gdanskis: Ukraina kogemused lahinguväljal on Euroopa
  kaitsevõime tugevdamisel hindamatud'
text: 'Välisminister Margus Tsahkna viibib 25.–26. juunil Poolas Gdanskis, kus toimub
  viies Ukraina taastekonverents. Konverentsi avapäeval osales minister arutelus „Modern
  Deterrence: Changing Technological Landscape on the Battlefield“ ning kohtus Araabia
  Ühendemiraatide riigiministri Reem Al Hashimy ja Jaapani asevälisministri Ayano
  Kunimitsuga.'
