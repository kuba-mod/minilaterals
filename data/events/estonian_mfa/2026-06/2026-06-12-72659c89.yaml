title: Poliitikaküsimuste asekantsler Martin Roger pidas Aserbaidžaanis poliitilisi
  konsultatsioone
text: Eile, 11. juunil viibis poliitikaküsimuste asekantsler Martin Roger visiidil
  Bakuus, kus toimusid poliitilised konsultatsioonid Aserbaidžaani asevälisministri
  Fariz Rzajeviga. Visiidi veerel kohtus asekantsler ka Aserbaidžaani presidendi välis-
  ja julgeolekunõuniku Hikmet Hadžijevi ning asekaitseminister Agil Gurbanoviga.
