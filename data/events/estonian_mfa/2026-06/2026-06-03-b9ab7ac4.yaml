title: Kantsler Vseviov osales Riias strateegilise dialoogi konverentsil
text: 'Välisministeeriumi kantsler Jonatan Vseviov osales täna, 3. juunil Riias toimunud
  strateegilise dialoogi konverentsil. Kantsler võttis osa arutelust „Russia-Ukraine
  Peace Talks: Impact on Reassurance and Deterrence?“, mis keskendus Ukraina ja Venemaa
  rahukõneluste mõjule Euroopa julgeolekule.'
