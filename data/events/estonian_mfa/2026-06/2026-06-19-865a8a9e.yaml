title: 'Tsahkna kohtumisel Wadephuliga: jätkame Venemaa survestamist sõja lõpetamiseks'
text: Välisminister Margus Tsahkna kohtus täna, 19. juunil Kielis Saksamaa välisministri
  Johann Wadephuliga, et arutada Venemaa edasist survestamist sõja lõpetamiseks, ettevalmistusi
  NATO Ankara tippkohtumiseks ja Euroopa julgeoleku tugevdamist.
