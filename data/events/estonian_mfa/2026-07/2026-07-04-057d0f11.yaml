title: 'Välisminister Tsahkna: Ameerika Ühendriigid on olnud 250 aasta jooksul vabaduse
  ja võimaluste sümboliks'
text: Välisminister Margus Tsahkna ütles täna, 4. juulil Ameerika Ühendriikide 250.
  iseseisvuspäeva puhul, et Ameerika Ühendriikide ajalugu on olnud alati tihedalt
  seotud vabaduse ideaaliga ja veendumusega, et igaühel peab olema võimalus kujundada
  oma tulevikku. Need märksõnad on läbivad ka Eesti ja USA kahepoolsetes suhetes.
