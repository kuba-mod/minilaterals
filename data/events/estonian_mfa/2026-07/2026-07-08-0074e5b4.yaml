title: Välisministeerium andis Venemaa saatkonnale noodi Eesti-vastase valeinfo levitamise
  kohta
text: Eesti välisministeerium kutsus täna, 8. juulil välja Venemaa Föderatsiooni ajutise
  asjuri, et väljendada karmi hukkamõistu Venemaa viimase nädala drooni- ja raketirünnakutele
  Ukrainas, milles on hukkunud 93 inimest ja saanud vigastada üle 500. Samuti edastas
  välisministeerium asjurile noodi seoses järjepideva Eesti ja teiste Balti riikide
  vastase väärinfo levitamisega.
