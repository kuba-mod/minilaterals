title: 'Välisminister Tsahkna NATO tippkohtumisel: droonikokkulepe Ukrainaga annab
  Eestile ligipääsu moodsa sõjapidamise tipptehnoloogiale'
text: Välisminister Margus Tsahkna sõnul on täna, 7. juulil Ankaras NATO tippkohtumise
  veerel Eesti ja Ukraina vahel sõlmitud droonikokkulepe oluline samm, mis tugevdab
  kahe riigi kaitsekoostööd ja võimaldab Eestile ligipääsu Ukraina kiiresti arenevale
  tehnoloogiale.
