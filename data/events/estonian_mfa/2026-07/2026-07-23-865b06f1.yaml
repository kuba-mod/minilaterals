title: 'Välisminister Tsahkna: 21. sanktsioonipakett säilitab Venemaale valusa naftahinnalae
  ning sillutab teed kombatantide viisakeeluks'
text: Välisminister Margus Tsahkna sõnul leppis Euroopa Liit täna, 23. juulil kokku
  21. sanktsioonipaketi meetmetes, mille eesmärk on vähendada Venemaa riigieelarve
  tulusid ja seeläbi piirata Venemaa võimet Ukraina vastase agressiooniga jätkata.
  Eesti juhtimisel käsitletakse paketis Ukraina-vastases sõjas osalenud Vene võitlejate
  pääsu piiramist Schengeni alale. Muu hulgas on sanktsioonipaketis nafta hinnalae
  külmutamine praegusel tasemel järgmiseks aastaks.
