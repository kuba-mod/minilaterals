title: Asekantsler Roger osales NATO tippkohtumise veerel vestlusringis Balti riikide
  julgeolekumüütidest
text: 'Täna, 7. juulil osales välisministeeriumi poliitikaküsimuste asekantsler Martin
  Roger NATO Ankara tippkohtumise veerel toimunud kõrvalüritusel „Secret Agency: Why
  Narva’s Not Next, and Other Myths“ koos Läti välisministri Baiba Braže ja Leedu
  suursaadikuga NATO juures Darius Jauniškisega. Arutelu juhtis julgeolekuekspert
  Edward Lucas.'
