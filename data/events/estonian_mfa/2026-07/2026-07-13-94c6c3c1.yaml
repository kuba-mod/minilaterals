title: Euroopa Liit võttis vastu seni suurima Venemaa vastase kübersanktsioonide paketi
text: Euroopa Liit kiitis täna, 13. juulil välisasjade nõukogul heaks seni kõige ulatuslikuma
  Venemaa vastase kübersanktsioonide paketi. EL-i kübersanktsioonide raamistikku lisati
  kaheksa isikut ja neli üksust, kelle pahatahtlik tegevus küberruumis on otseselt
  kahjustanud liikmesriikide majandust, avalike teenuste toimimist ja kriitilist taristut.
  Hübriidsanktsioonide režiimi kaudu lisati nimekirja ka üks Venemaa sõjaväeluure
  (GRU) ohvitser, keda seostatakse sihitud EL-i vastaste küberrünnakutega.
