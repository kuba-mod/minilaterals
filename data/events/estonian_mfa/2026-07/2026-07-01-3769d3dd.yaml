title: Välisminister Tsahkna avab Tallinnas toimuva kahepäevase Armeenia toodete,
  maitsete ja kultuuri festivali
text: Välisminister Margus Tsahkna avab 3.‒4. juulil toimuva Armeenia toodete, maitsete
  ja kultuuri festivali, kus saab tutvuda Armeenia kaupade, toidu, teenuste, kultuuri
  ja ärivõimalustega. Üritus toimub Tallinnas Kultuurikatlas.
