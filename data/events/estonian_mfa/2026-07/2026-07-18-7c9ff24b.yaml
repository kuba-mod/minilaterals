title: 'Välisminister Tsahkna: senaator Grahami algatatud Venemaa-vastane sanktsioonipakett
  annaks tugeva löögi Vene majandusele'
text: Sel nädalal kinnitati, et Ameerika Ühendriikide senatis on senaatorite Lindsey
  Grahami ja Richard Blumenthali algatatud Venemaa-vastase sanktsioonipaketi eelnõu
  kogunud enam kui 60 senaatori ning Valge Maja toetuse. Paketi eesmärk on kehtestada
  tollimaksud riikidele, kes jätkavad Venemaa nafta ja gaasi ostmist või aitavad Moskval
  kehtestatud sanktsioonidest kõrvale hiilida.
