title: 'Välisminister Tsahkna president Zelenskõile: ettevalmistused Ukraina taastekonverentsi
  toimumiseks Tallinnas on täies mahus alanud'
text: Välisminister Margus Tsahkna ütles täna, 7. juulil NATO tippkohtumise veerel
  Ukraina presidendi Volodõmõr Zelenskõiga vesteldes, et ettevalmistused 2027. aasta
  28. ja 29. jaanuaril Tallinnas toimuvaks Ukraina taastekonverentsiks (Ukraine Recovery
  Conference) on juba alanud. Tsahkna kohtus Zelenskõiga ka Eesti ja Ukraina droonikokkuleppe
  allkirjastamisel.
