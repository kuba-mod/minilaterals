title: 'Tsahkna kohtumisel Läti välisministriga: Eesti ja Läti ootavad NATO tippkohtumiselt
  liitlaste ühtsust'
text: Välisminister Margus Tsahkna kohtus täna, 2. juulil Tallinnas Läti välisministri
  Baiba Bražega. Kohtumise arutelud keskendusid järgmisel nädalal toimuvale NATO Ankara
  tippkohtumisele ning piirkondlikule koostööle.
