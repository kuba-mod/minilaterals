title: 'Välisminister Tsahkna: sõjakurjategijate koht ei ole olümpial, vaid tribunali
  ees'
text: Rahvusvaheline Olümpiakomitee teatas eile õhtul, et loobub senistest soovituslikest
  piirangutest Venemaa sportlaste osalemisele rahvusvahelistel spordivõistlustel.
  Sisuliselt annab ROK nüüd igale rahvusvahelisele spordiföderatsioonile vabaduse
  kehtestada Venemaa sportlastele oma tingimused, lõpetades ühtse kaitsemehhanismi,
  mis seni nõudis Venemaalt pärit sportlaste neutraalse staatuse ranget kontrolli.
  Välisminister Margus Tsahkna sõnul on tegemist vastutustundetu otsusega, mis normaliseerib
  agressiooni ja aitab murendada Venemaa rahvusvahelist isolatsiooni.
