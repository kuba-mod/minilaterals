title: Kantsler Vseviov võõrustas Narvas ja Tapal oma Prantsuse kolleegi
text: Välisministeeriumi kantsler Jonatan Vseviov võõrustas eile ja täna Eestis Prantsusmaa
  välisministeeriumi kantslerit Martin Briensi, kellega koos külastati Narva linnust
  ja piiripunkti ning Tapa kaitseväelinnakut ja seal teenivaid Prantsusmaa liitlassõdureid.
