title: 'Välisminister Tsahkna Ukraina välisminister Sõbihale: rahvusvaheline kogukond
  peab Venemaa rünnakutele Mustal merel jõuliselt reageerima'
text: Eile, 22. juuli õhtul toimus välisminister Margus Tsahkna ja Ukraina välisministri
  Andrii Sõbiha telefonikõne, mille keskmes olid Venemaa jätkuvad rünnakud Ukraina
  linnade, tsiviiltaristu ning Mustal merel liikuvate tsiviillaevade ja sadamataristu
  vastu. Arutati ka võimalikke samme Venemaa täiendavaks survestamiseks ning Ukraina
  toetamiseks.
