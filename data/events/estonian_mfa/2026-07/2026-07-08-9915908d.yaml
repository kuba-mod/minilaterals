title: 'Välisminister Tsahkna NATO tippkohtumisel: Ukraina kui Euroopa suurima sõjalise
  jõu koht on NATOs'
text: Välisminister Margus Tsahkna ütles eile, 7. juulil NATO tippkohtumise raames
  toimunud NATO-Ukraina Nõukogu kohtumisel, kus osales ka Ukraina välisminister Andri
  Sõbiha, et Ukraina on tõestanud oma jõudu agressorile vastu seista, aga vajab jätkuvalt
  liitlaste tugevat toetust.
