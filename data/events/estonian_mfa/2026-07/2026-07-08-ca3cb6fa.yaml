title: 'Välisminister Tsahkna Ankaras: NATO tippkohtumise otsused tugevdavad Eesti
  julgeolekut'
text: Välisminister Margus Tsahkna ütles 7. ja 8. juulil toimunud NATO tippkohtumise
  järel, et kõik liitlased kulutavad kaitsele märkimisväärselt rohkem ning arvukate
  lepingute ja ühishangete sõlmimine tähendab, et investeeringud teisenevad ka konkreetseteks
  võimeteks. Lisaks tehti tippkohtumise raames otsuseid, mis tugevdavad otseselt meie
  julgeolekut, nende hulgas NATO õhuturbemissiooni Eestis muutumine õhukaitsemissiooniks.
