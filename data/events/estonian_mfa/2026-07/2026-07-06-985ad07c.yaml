title: Eesti juhib esimest ÜRO ülemaailmset tehisaru arutelu
text: Sel nädalal, 6.–7. juulil toimub Genfis ÜRO esimene ülemaailmne tehisaru haldamise
  dialoog (Global Dialogue on AI Governance), mida juhivad Eesti ja El Salvador. Dialoog
  toob kokku valitsused, rahvusvahelised organisatsioonid, ettevõtted, teadlased ja
  kodanikuühiskonna esindajad, et arutada, kuidas kujundada vastutustundlikku, kaasavat
  ja läbipaistvat tehisaru kasutamist globaalsel tasemel.
