title: 'Välisminister Tsahkna Lennart Meri konverentsil: Ukraina integreerimine Euroopasse
  on otsustava tähtsusega'
text: 'Välisminister Margus Tsahkna esines täna, 15. mail Lennart Meri konverentsil
  vestlusringis „Ukraine’s Strategic Place: From Frontline to Foundation“, kus ta
  rõhutas, et Ukraina integreerimine Euroopa Liiduga on otsustava tähtsusega nii Euroopa
  julgeoleku kui ka rahvusvahelise stabiilsuse jaoks.'
