title: 'Välisminister Tsahkna: seksuaalvähemustele tuleb tagada täpselt samad õigused
  ja võimalused nagu kõigile teistele'
text: Täna, 17. mail tähistatakse rahvusvahelist homofoobia, transfoobia ja bifoobia
  vastast päeva. Välisminister Margus Tsahkna sõnul tuletab see päev meelde, et kuigi
  Eestis on viimastel aastatel tehtud märkimisväärseid edusamme seksuaalvähemuste
  õiguste edendamisel — sealhulgas abieluvõrdsuse kehtestamisega 2023. aastal — tuleb
  jätkuvalt pöörata tähelepanu tõrjumise ja vägivalla täielikule välja juurimisele.
  Seda eriti olukorras, kus globaalne diskrimineerimine seksuaalvähemuste vastu on
  kasvutrendis.
