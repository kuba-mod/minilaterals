title: 'Välisminister Tsahkna: Eesti ja Singapur seisavad ühiselt vastu globaalsetele
  julgeolekuohtudele'
text: Täna, 20. mail kohtus välisminister Margus Tsahkna Tallinnas Singapuri riikliku
  julgeoleku eest vastutava ministri ja siseministri K. Shanmugamiga. Arutelu keskmes
  olid regionaalsed julgeolekuküsimused, sealhulgas Venemaa jätkuv agressioon Ukraina
  vastu, hübriidohud ning kahepoolse koostöö tihendamine.
