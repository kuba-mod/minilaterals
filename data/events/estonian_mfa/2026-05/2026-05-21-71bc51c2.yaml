title: Selgusid uuringu ''Soomes elava eesti väliskogukonna perekondade emakeelekasutus
  ja õppimine'' tulemused
text: Välisministeeriumi tellimusel viis Antropoloogia Keskus koostöös Helsingi Ülikooli
  ja Eesti Organisatsioonide Võrgustikuga Soomes (EOVS) läbi teadus- ja rakendusuuringu
  Soomes elavate eesti perede keelekasutuse ja emakeeleõppe kohta. Värskest uuringust
  selgub, et kuigi side Eestiga on tugev ja kodune keelekasutus aktiivne, vajab institutsionaalne
  keeleõpe suuremat paindlikkust, paremat info levikut, tugevamat kogukondlikku tuge
  ning keeleõppega seotud müütide murdmist. Saadud tulemused on otseseks aluseks konkreetsete
  poliitikasoovituste kujundamisel, et tugevdada eesti keele õpet ja kasutust Soomes
  elava Eesti kogukonna seas.
