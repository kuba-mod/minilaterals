title: 'Välisminister Tsahkna kohtumisel NATO peasekretäriga: NATO toimib liitlaste
  kaitsmisel efektiivselt ja täpselt plaanide järgi'
text: Välisminister Margus Tsahkna ütles täna, 26. mail Brüsselis NATO peakorteris
  alliansi peasekretäri Mark Ruttega kohtudes, et viimane aasta on esitanud alliansile
  hulga väljakutseid, aga samas tõestanud, et NATO töötab efektiivselt.
