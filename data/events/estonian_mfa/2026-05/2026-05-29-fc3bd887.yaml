title: 'Tsahkna Läänemeremaade Nõukogu kohtumisel: meie julgeoleku huvides on surve
  kasvatamine Venemaale agressiooni lõpetamiseks'
text: Välisminister Margus Tsahkna ütles 28. ja 29. mail Poolas Sopotis toimunud Läänemeremaade
  Nõukogu (LMN)  kohtumisel, et Venemaa tänaöine droonirünnak, mille käigus sai pihta
  kortermaja Rumeenias, kinnitab vajadust jätkata tegutsemist Venemaa survestamiseks
  agressiooni lõpetamiseks.
