title: Põhja- ja Baltimaade välisministrite avaldus Venemaa viimase desinformatsioonikampaania
  kohta
text: Põhja- ja Baltimaade välisministrid lükkavad kindlalt tagasi Venemaa räige desinformatsioonikampaania
  ja valeväited, mida toetab Valgevene ning mis puudutavad õhuruumi rikkumisi Põhja-
  ja Baltimaade piirkonnas. Mõistame teravalt hukka Venemaa ähvardused kasutada jõudu
  Läti ja teiste piirkonna riikide vastu.
