title: Kanada ja Balti riikide „3+1“ välisministrite kohtumise ühisavaldus
text: Kanada välisminister, Eesti ja Leedu välisministrid ning Läti välisministeeriumi
  parlamentaarne sekretär osalesid 20. mail 2026 Tallinnas neljandal Kanada ja Balti
  riikide „3+1“ välisministrite kohtumisel. Tuginedes varasematele kohtumistele Leedus
  (2020), Kanadas (2022) ja Lätis (2024), kinnitasid ministrid taas selle formaadi
  väärtust koordinatsiooni tugevdamisel lähedaste liitlaste ja sarnaselt meelestatud
  partnerite vahel.
