title: 'Tsahkna ELi välisministrite kohtumisel Küprosel: ainuõige on jätkata kahepunktilise
  rahuplaaniga'
text: Välisminister Margus Tsahkna ütles 27. ja 28. mail Küprosel toimunud ELi välisministrite
  kohtumisel, et Euroopa senine kahepunktiline Ukraina toetamisest ja Venemaa survestamisest
  koosnev rahuplaan on hästi töötanud ning ainuõige on sellega jätkata.
