title: Välisministeeriumi kantsler Jonatan Vseviov viibis visiidil Norras
text: Välisministeeriumi kantsler Jonatan Vseviov viibis 20.–21. mail visiidil Norras,
  kus ta kohtus Norra asevälisministri Eivind Vad Peterssoniga, välisministeeriumi
  kantsleri Torgeir Larsenga, osales Kirkenesi konverentsi vestlusringis „Deep dive
  into geopolitics“, külastas Norra ja Venemaa piiripunkti ning kohtus Norra piirivalve
  ülema Gøran Johansen Stensethga.
