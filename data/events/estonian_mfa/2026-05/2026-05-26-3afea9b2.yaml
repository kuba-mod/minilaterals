title: 'Välisminister Tsahkna: Venemaa valeväidete eesmärk on juhtida tähelepanu kõrvale
  Ukrainalt ja enda rasketelt rahvusvahelise õiguse rikkumistelt'
text: Venemaa ähvardused pöörduda Rahvusvahelise Kohtu poole venekeelse elanikkonna
  õiguste väidetavate rikkumiste tõttu ei ole midagi uut. Tegemist on järjekordse
  sammuga Venemaa pikaajalises käitumismustris, mis hõlmab süstemaatilist desinformatsiooni
  ja poliitilist surveavaldust Balti riikide vastu. Moskva retoorikat iseloomustavad
  vaenulikkus, alusetud süüdistused ja moonutatud narratiivid. Sedasama mustrit on
  Venemaa kasutanud alates Eesti iseseisvuse taastamisest 1991. aastal.
