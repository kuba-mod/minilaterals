title: 'Välisminister Tsahkna: Venemaa ähvardustest hoolimata ei lahku Eesti diplomaadid
  Kiievist'
text: '"Mõistame teravalt hukka Venemaa hiljutised ähvardused ja üleskutsed välismaalastele
  Kiievist lahkuda. Hirmutamine, diplomaatilise korpuse ning välisriikide kodanike
  ähvardamine ning tsiviilisikute teadlik ja tahtlik ründamine on vastuvõetamatu ning
  vastuolus ÜRO põhikirjaga. Venemaa näitab sellise sõnumiga taas oma terroristlikku
  palet."'
