title: Tallinnas toimus NB8 kliimasaadikute kohtumine
text: Eile, 27. mail kogunesid Tallinnas Põhjala Balti (NB8) riikide kliimaerisaadikud,
  et arutada, kuidas praegune geopoliitiline ja julgeolekuolukord mõjutab globaalset
  kliimapoliitikat ja kliimarahastust ning kuidas olla tulemuslikum sügisel toimuval
  COP31 kliimakonverentsil. Käsitleti ka rohetehnoloogia ja taastuvenergia rolli kliimakriisi
  leevendamisel.
