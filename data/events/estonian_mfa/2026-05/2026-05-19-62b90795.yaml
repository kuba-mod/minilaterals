title: Välisministeeriumis tutvustati Eesti kandidaati ITU arengusuuna büroodirektori
  ametikohale
text: Eile, 18. mail tutvustati välisministeeriumis Eestisse akrediteeritud suursaadikutele
  Eesti kandidaati Rahvusvahelise Telekommunikatsiooni Liidu (ITU) arengusuuna büroodirektori
  ametikohale – endist Eesti digidiplomaatia erisaadikut Nele Leoski. Praegu juhib
  Nele Euroopa Komisjoni digikoostöö keskust Knowledge Hub Digital ning on kaasa aidanud
  enam kui 110 riigi digiarengule.
