title: Eesti ja Tšehhi ettevõtted sõlmisid ärifoorumil kaitsekoostöö lepingu
text: Täna, 27. mail toimus Eesti–Tšehhi ärifoorum, mille eesmärk on tugevdada Eesti
  ja Tšehhi majanduskoostööd ning luua uusi kontakte eeskätt kaitse- ja kübervaldkonnas.
  Ärifoorum toimus seoses Tšehhi presidendi riigivisiidiga Eestisse ning seal osalesid
  ka president Alar Karis ja Tšehhi president Petr Pavel.
