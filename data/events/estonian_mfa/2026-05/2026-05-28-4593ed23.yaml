title: 'Välisminister Tsahkna keskkonnaõigluse konverentsil: kliimakriisi pidurdamine
  on globaalse julgeoleku küsimus'
text: Täna, 28. mail toimus Tallinnas välisministeeriumi ja MTÜ Mondo ühine rahvusvaheline
  keskkonnaõigluse konverents “Responsibility and Resilience in a Changing Climate”.
  Üritus tõi kokku poliitikakujundajad, kodanikuühiskonna esindajad ja eksperdid üle
  maailma, et arutada, kuidas jagunevad vastutus ja vastupanuvõime kliimakriisi tingimustes
  ning milliseid õiglasemaid ja kaasavamaid lahendusi on võimalik kujundada.
