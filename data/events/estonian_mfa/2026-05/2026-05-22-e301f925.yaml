title: 'Tsahkna NATO välisministrite kohtumisel: Euroopa jätkab suurema vastutuse
  võtmist ühise julgeoleku eest'
text: Välisminister Margus Tsahkna ütles täna, 22. mail Helsingborgis toimunud NATO
  välisministrite kohtumisel, et droonijuhtum Eestis näitab, et NATO töötab ja Euroopa
  jätkab suurema vastutuse võtmist ühise julgeoleku eest.
