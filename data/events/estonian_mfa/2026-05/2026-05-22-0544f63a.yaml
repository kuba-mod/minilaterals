title: Põhja- ja Baltimaade välisministrid mõistsid ühisavaldusega hukka Venemaa desinformatsioonikampaania
text: Põhja- ja Baltimaade välisministrid tegid täna, 22. mail ühisavalduse, milles
  mõistsid teravalt hukka Venemaa ja Valgevene desinformatsioonikampaania ja valeväited
  seoses õhuruumi rikkumistega Põhja- ja Baltimaade piirkonnas.
