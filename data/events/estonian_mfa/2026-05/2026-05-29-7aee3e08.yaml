title: 'Välisminister Tsahkna: Venemaa droonitabamus Rumeenias rõhutab vajadust suurendada
  survet Venemaale'
text: „Venemaa on sõjas Ukraina vastu lahinguväljal üha nõrgemas positsioonis, aga
  jätkab siiski oma eesmärkide poole püüdlemist jõhkrate drooni- ja raketirünnakutega
  Ukraina vastu. Ebaedust tingitud Putini üha kasvav närvilisus oh ohtlik, sest kasvatab
  ohtlike vahejuhtumite tõenäosust.
