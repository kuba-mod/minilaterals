title: 'Välisminister Tsahkna: Kanada tugevdab Eesti julgeolekut ja Atlandi-ülest
  sidet'
text: Täna, 20. mail viibis Tallinnas visiidil Kanada välisminister Anita Anand, kes
  kohtus Eesti välisministri Margus Tsahknaga ning üheskoos avati ka ametlikult Kanada
  saatkond Eestis. Päeva teises pooles toimus neljapoolne kohtumine, mille jaoks saabusid
  Eestisse Leedu välisminister Kęstutis Budrys ning Läti asevälisminister Artjoms
  Urulskis. Neljapoolsel kohtumisel arutati Balti riikide ja Kanada koostöö tugevdamist,
  regionaalset julgeolekut ja transatlantilisi suhteid.
