title: Andorra – Meeting between M. Jean-Noël Barrot and Ms Imma Tor Faus, Minister
  of…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting with
  his Andorran counterpart, Imma Tor Faus, Minister of Foreign Affairs, in Paris on
  Thursday 19 February. Welcoming the excellent dynamic of the relationship between
  France and Andorra, characterized by its strong cross-border dimension, the ministers
  talked about strengthening bilateral cooperation, especially as regards customs,
  education and health, and the main current European and international issues. Noting
  their extremely similar views, based on shared values, they signalled their joint
  commitment to compliance with international law, effective multilateralism and Francophonie.
  The Minister reiterated France’s full support for the draft association agreement
  between the European Union and the Principality of Andorra, and its imminent signature.
  Regarding cross-border links, the Minister assured his counterpart of the all-out
  effort on the French side with a view to the reopening of Route Nationale 20.
