title: Israel/Palestine – Israeli government measures regarding the West Bank
text: France strongly condemns the Israeli security cabinet’s decisions aimed at expanding
  Israel’s control over the West Bank, particularly Areas A and B. These decisions
  are contrary to international law and represent a dangerous challenge to the Oslo
  Accords and the Hebron Protocol. These measures, along with the approval of the
  E1 project and the publication of a tender for that project, are fueling momentum
  for annexing the West Bank and as such, represent a serious attack on the two-state
  solution. At a time when international efforts are focused on implementing phase
  two of the Gaza peace plan, these decisions are detrimental to current peace efforts
  and threaten to raise tensions. We call on Israel to immediately reverse these decisions
  and reaffirm our strong opposition to any form of annexation. France will remain
  committed to a just and lasting peace in the region in accordance with Security
  Council resolutions and the principles set forth in the New York Declaration.
