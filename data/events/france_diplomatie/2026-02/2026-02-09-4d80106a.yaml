title: Haiti – End of the Transitional Presidential Council mandate
text: La France prend acte de la fin du mandat du Conseil Présidentiel de Transition
  le 7 février 2026, conformément aux dispositions de l’accord politique du 3 avril
  2024. France takes note of the end of the Transitional Presidential Council’s mandate
  on February 7, in line with the political agreement of April 3, 2024. It applauds
  the orderly transition of executive power from President Laurent Saint-Cyr to the
  Cabinet of Ministers, led by Prime Minister Alix Didier Fils-Aimé. It encourages
  the Haitian government to continue strengthening the Haiti National Police and Haitian
  Armed forces and to step up efforts to combat criminal gangs and their means of
  support, particularly through the Haitian legal system. France will continue to
  back the Haitian security forces and will support the deployment of the Gang Suppression
  Force (GSF) in line with UN Security Council resolution 2793. It will continue to
  provide humanitarian aid to the most vulnerable members of the population and will
  maintain its solidarity-based investment policy in Haiti. It calls on all political
  actors and all components of civil society to work together with the interim authorities
  to promote stability, security and a return to constitutional and democratic order
  in Haiti through free, inclusive elections.
