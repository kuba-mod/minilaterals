title: Situation in the Great Lakes region
text: France welcomes the agreement by the President of the Democratic Republic of
  the Congo (DRC), Félix Tshisekedi, for the implementation of a ceasefire as proposed
  by Angola to all the warring parties. France also emphasizes the importance of implementing
  the Washington Accords of 4 December 2025 in every aspect, and calls on all the
  parties to honour their commitments. France will continue to make every effort to
  ensure that the momentum for peace created by these accords, by the Doha Framework
  of 15 November and by the action of the African Union are translated into tangible
  and rapid improvements in living conditions for the population in the eastern DRC.
  In this regard, France welcomes the visit to Goma by the UN Secretary-General’s
  Deputy Special Representative and Interim Head of the United Nations Organization
  Stabilization Mission in the Democratic Republic of the Congo (MONUSCO), Vivian
  van de Perre, from 12 to 14 February 2026, to prepare the Mission’s actions to support
  ceasefire monitoring and verification in the eastern DRC, in accordance with United
  Nations Security Council Resolution 2808 (2025). This first flight to Goma airport
  is a milestone. It is a step towards translating into action the commitment made
  at the Paris conference of 30 October 2025 to resume small-scale, daytime humanitarian
  flights to Goma. France calls on all the parties involved to work together now so
  that this first flight is followed by [other] humanitarian flights for the benefit
  of the population.
