title: Expiry of the New START Treaty
text: The New START Treaty, the latest strategic arms control treaty between the United
  States and Russia, expired on 5 February 2026. Russia bears responsibility for this
  situation, having suspended its participation in the New START Treaty in 2023 and
  stepped up actions undermining the international nuclear arms control architecture.
  France reaffirms its support for strategic arms control between the nuclear-weapon
  States with the largest nuclear arsenals, which is an essential instrument for strategic
  stability. France remains fully committed, particularly within the P5, to deepening
  dialogue on risk reduction and doctrines, with a view to strengthening our collective
  security.
