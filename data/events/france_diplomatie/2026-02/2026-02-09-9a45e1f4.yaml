title: Malaysia – Conversation between Jean-Noël Barrot and his Malaysian counterpart
text: Jean-Noël Barrot spoke by phone with his Malaysian counterpart, Mohamad Hasan,
  on February 9. He thanked him for the Malaysian authorities’ support in enabling
  Tom Félix to return promptly to France following his acquittal. The two Ministers
  also discussed expanding bilateral relations, particularly in the areas of business,
  defense, hybrid threats and critical minerals.
