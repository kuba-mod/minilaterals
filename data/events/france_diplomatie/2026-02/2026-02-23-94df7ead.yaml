title: FIRST TRADE MINISTERS’ MEETING UNDER THE FRENCH G7 PRESIDENCY
text: 'The discussions focused on securing mineral and critical-metal supply chains
  and preparing the 14th Ministerial Conference of the World Trade Organization, to
  be held in Yaoundé from 26 to 29 March 2026. On Monday 23 February 2026, Nicolas
  Forissier, Minister Delegate for Foreign Trade and Economic Attractiveness, attached
  to the Minister for Europe and Foreign Affairs, brought together his counterparts
  from Canada, Germany, Italy, Japan, the United Kingdom and the United States, and
  the European Trade Commissioner, for the first ministerial meeting on trade under
  the French G7 presidency. The meeting provided an opportunity to begin work on trade
  for 2026, based on the four priorities set by the French presidency: The discussions
  focused on securing mineral and critical-metal supply chains and preparing the 14th
  Ministerial Conference of the World Trade Organization, to be held in Yaoundé from
  26 to 29 March 2026. The G7 trade ministers will meet again in Paris on 5 and 6
  May 2026, in preparation for the summit of heads of State and government to be held
  in Evian from 15 to 17 June 2026.'
