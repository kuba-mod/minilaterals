title: Ukraine – Meeting between M. Jean-Noël Barrot and Mr Denys Shmyhal, First…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting with
  Denys Shmyhal, First Deputy Prime Minister and Minister of Energy of Ukraine, in
  Paris today. Together they discussed the situation in Ukraine, whose energy infrastructure
  is daily targeted by Russian strikes in the depths of winter, and the assistance
  provided by France both bilaterally and under the French G7 presidency. The two
  ministers also talked about the ongoing negotiations, the importance of involving
  the Europeans in discussions on the parameters directly affecting European security,
  and the European Union’s 20 th sanctions package, which is being prepared. The Minister
  reiterated France’s full support for Ukraine in its fight to defend its sovereignty,
  independence and territorial integrity, with 24 February 2026 marking four years
  since Russia’s large-scale invasion of Ukraine. He said that France will continue
  its efforts alongside all its partners to promote a just, lasting peace, and reaffirmed
  our determination to support Ukraine over the long term.
