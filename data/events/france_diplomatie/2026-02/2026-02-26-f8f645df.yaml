title: Cambodia – Meeting between Jean-Noel Barrot and Mr Prak Sokhonn, Minister of…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  on Wednesday 25 February with his counterpart Mr Prak Sokhonn, Minister of Foreign
  Affairs and International Cooperation of Cambodia. It came in the wake of their
  telephone call on 23 December. The Minister reiterated France’s desire to continue
  deepening its bilateral relations with Cambodia in the run-up to President Macron’s
  state visit for the 20 th Francophonie Summit, which Cambodia will host in November
  2026. Among other issues, the ministers discussed strengthening the two countries’
  economic relations, particularly in the energy, medical and agrifood fields. They
  spoke about the heritage partnership focused on the Angkor site in particular. The
  [French] Minister expressed our shared desire to combat online-scam centres. The
  Minister also reiterated France’s commitment to regional stability and emphasized
  the importance of fully implementing the ceasefire agreement of 27 December. Continued political
  dialogue between Thailand and Cambodia is necessary to allow a peaceful, lasting
  resolution of the border dispute, with due regard for international law and their
  bilateral commitments. France supports ASEAN’s efforts to this end, and is in contact
  with both partners, completely impartially. It reiterates its readiness to facilitate
  the two parties’ access to the archives in its possession, linked to the demarcation
  of the border.
