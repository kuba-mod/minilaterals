title: Meeting between Jean-Noël Barrot and the President of the European Court of…
text: On February 10, Minister for Europe and Foreign Affairs Jean-Noël Barrot met
  with the President of the European Court of Human Rights, Mattias Guyomar, in Strasbourg.
  He applauded the work carried out by Mr. Guyomar since his election as President
  of the Court in May 2025, an election that was a credit to the French judiciary’s
  tradition of excellence. The Minister reiterated France’s full support for the court’s
  independence and authority. He stressed the Court’s fundamental role in protecting
  democracy and the rule of law. He praised the stepped-up discussions between the
  Court and Council of Europe member states for the purpose of better executing its
  judgments. He reiterated France’s commitment to ensuring the full execution of the
  Court’s judgments, which is vital to the credibility and continuity of the system
  set forth in the European Convention on Human Rights.
