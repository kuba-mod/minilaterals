title: Iran – Sentencing of Narges Mohammadi
text: France was deeply concerned to learn of the sentencing of Nobel Peace Prize
  winner Narges Mohammadi to seven and a half years in prison. With this sentencing,
  the Iranian regime has once again opted for repression and intimidation, in defiance
  of the Iranian people’s fundamental rights, which Narges Mohammadi tirelessly defends.
