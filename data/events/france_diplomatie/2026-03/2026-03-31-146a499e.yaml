title: 'European Union: minister’s meeting with Stephane Séjourné, Executive Vice…'
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, hosted a meeting
  on Monday 30 March 2026 with M. Stéphane Séjourné, Executive Vice-President of the
  European Commission for Prosperity and Industrial Strategy. The discussions focused
  on European competitiveness and the deepening of the single market. The Minister
  paid tribute to Vice-President Stéphane Séjourné’s commitment, in particular to
  the Industrial Accelerator project. It is the first important step in strengthening
  the European preference and the EU’s strategic autonomy in key industries. In the
  current geopolitical context, the Minister said France would fully contribute to
  deepening this European industrial sovereignty strategy. The Minister reiterated
  the importance of critical raw materials supplies, in conjunction with the work
  being done under the French G7 presidency. Finally, and more generally, the discussion
  focused on the absolute need to make rapid progress on the European competitiveness
  and economic security agenda, building on the Draghi report.
