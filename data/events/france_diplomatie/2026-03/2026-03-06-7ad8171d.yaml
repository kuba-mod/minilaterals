title: 'Netherlands: the Minister’s meeting with his Dutch counterpart, Mr Tom Berendsen'
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  with his counterpart from the Netherlands, Mr Tom Berendsen, Minister of Foreign
  Affairs, in Paris on Thursday 5 March 2026. On the sidelines of their participation
  in meeting of European Union and Gulf Cooperation Council foreign ministers today,
  the ministers signalled their concern over developments in the Middle East and the
  risk of destabilization in the region. They agreed to continue coordinating with
  a view to protecting their nationals, their interests and those of their partners.
  Coming a few days after the new government in The Hague took office, the visit testifies
  to the vitality of the relationship between France and the Netherlands and to the
  opportunities for cooperation existing in the fields of the economy, advanced technology,
  energy and defence. Border cooperation on the island of Saint-Martin – including
  the forthcoming signature of an agreement on the right of hot pursuit at sea, which
  will improve the fight against drug trafficking – was also discussed. The visit
  also confirmed the two countries’ commitment to work for a more competitive, sovereign
  and resilient European Union, particularly as far as digital technology and supply
  chains are concerned. It provided an opportunity to note similar views about EU
  enlargement. The ministers reaffirmed their long-term support for Ukraine, particularly
  in the Coalition of the Willing, in the face of the war of aggression being waged
  by Russia, and their determination to strengthen the European defence technological
  and industrial base.
