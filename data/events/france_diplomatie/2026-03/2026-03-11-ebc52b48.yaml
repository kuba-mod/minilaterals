title: Situation in Lebanon (March 10, 2026)
text: France expresses its deep concern over the current escalation of violence in
  Lebanon. It has asked the United Nations Security Council in New York to hold an
  emergency meeting, which will take place tomorrow. France condemns Hezbollah’s irresponsible
  decision to join in Iran’s attacks on Israel since March 1. It calls on Hezbollah
  to end its operations and hand over its weapons. France offers the Lebanese authorities
  its full support; their March 2nd decision to prohibit Hezbollah’s military and
  security activities is an important commitment, which we commend. France calls on
  Israel to refrain from any land-based or long-term interventions in Lebanon, whose
  territorial integrity and sovereignty must be respected. France is deeply concerned
  by the current displacement of civilians and is doing its utmost to meet their humanitarian
  needs in cooperation with the Lebanese authorities and humanitarian actors, including
  the High Commissioner for Refugees. France calls on all the parties to exercise
  restraint, to return to the ceasefire of November 26, 2024, and to abide by UN Security
  Council resolution 1701. France calls on all the parties to abide by international
  law and international humanitarian law. Compliance with the rules governing the
  conduct of hostilities, and particularly the principles of distinction, proportionality
  and precaution, is vital to ensuring the protection of civilian populations and
  civilian infrastructure in all circumstances. France stresses that the protection
  of peacekeepers and the safety and security of United Nations personnel, property
  and premises must be guaranteed in accordance with international law and resolution
  1701. President Macron condemned the unacceptable attack on three members of the
  Ghanaian contingent on March 6, leaving one of them seriously wounded. France expresses
  its full solidarity with Ghana and wishes the affected personnel a speedy recovery.
  In this difficult situation, France applauds the bravery, professionalism and dedication
  of UNIFIL personnel.
