title: Mongolia – The Minister’s meeting with his Mongolian counterpart, Ms Batmunkh…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  on Tuesday 10 March with the Minister of Foreign Affairs of Mongolia, Ms Batmunkh
  Battsetseg, at the Nuclear Energy Summit. The two ministers spoke about progress
  in the key partnerships underpinning our bilateral relations, benefiting our respective
  sovereignties in the fields of energy, transport and civil protection. They discussed
  the forthcoming signing of the AFD establishment agreement, which will enable French
  activities to be launched in support of the priorities shared by the two countries.
  They reiterated their commitment to sustainable and responsible development, particularly
  in the run-up to COP17 on the fight against desertification, to be held in Ulaanbaatar
  from 17 to 28 August 2026. They discussed Mongolia’s participation in the next One
  Health summit, which will take place in Lyon.
