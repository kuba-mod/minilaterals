title: Iran - Joint G7 Foreign Ministers’ Statement
text: We, the G7 Foreign Ministers of Canada, France, Germany, Italy, Japan, the United
  Kingdom and the United States of America and the High Representative of the European
  Union, are gravely concerned by the developments surrounding the ongoing protests
  in Iran. We strongly oppose the intensification of the Iranian authorities’ brutal
  repression of the Iranian people, who have been bravely voicing legitimate aspirations
  for a better life, dignity and freedom, since the end of December 2025. We are deeply
  alarmed at the high level of reported deaths and injuries. We condemn the deliberate
  use of violence and the killing of protestors, arbitrary detention, and intimidation
  tactics by security forces against demonstrators. We urge the Iranian authorities
  to exercise full restraint, to refrain from violence, and to uphold the human rights
  and fundamental freedoms of Iran’s citizens, including the rights to freedom of
  expression, to seek, receive and impart information, and the freedom of association
  and peaceful assembly, without fear of reprisal. The members of the G7 remain prepared
  to impose additional restrictive measures if Iran continues to crack down on protests
  and dissent in violation of international human rights obligations.
