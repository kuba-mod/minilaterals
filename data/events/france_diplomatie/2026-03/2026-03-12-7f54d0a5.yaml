title: Lebanon - 60 tonnes of humanitarian cargo delivered to Lebanon
text: 'La situation des centaines de milliers de personnes déplacées au Liban est
  un sujet de grave préoccupation. The situation of hundreds of thousands of displaced
  people in Lebanon is an issue of grave concern. Given the emergency, the Ministry
  for Europe and Foreign Affairs (MEAE) is playing an active role. In partnership
  with the company CMA CGM, the MEAE’s Crisis and Support Centre (CDCS) shipped nearly
  60 tonnes of humanitarian aid on Thursday 12 March. M. Nicolas Forissier, Minister
  Delegate for Foreign Trade, M. Philippe Tabarot, Minister for Transport, and Mme
  Tanya Saadé, President of the CMA CGM Foundation saw off the shipment. This in-kind
  aid operation delivered 60 tonnes of humanitarian equipment and pharmaceutical products
  collected by the CDCS and the CMA CGM Foundation. They are intended to support the
  medical personnel and humanitarian organizations over there. The CMA CGM Foundation
  has made available all its logistical expertise and is providing free of charge
  a plane belonging to the CMA CGM Group to run this first French humanitarian flight
  bound for Beirut. These donations comprise, among other things: - 14.2 tonnes of
  medicines, via the dispatch of a mobile medical unit; - 9.8 tonnes of child-nutrition
  products; - 9.5 tonnes of shelter equipment (blankets, cooking kits and hygiene
  kits), 2,700 mattresses and ground sheets) and solar lamps. The equipment is being
  sent to the Lebanese Health Ministry, Lebanese hospitals and NGOs. In addition,
  there is medical equipment to support the medical teams mobilized on the ground.
  These emergency products will make it possible to increase the capabilities of medical
  personnel and humanitarian organizations over there, which are facing an unprecedented
  influx of displaced people. They will be distributed, inter alia, to the Lebanese
  Health Ministry, Hôtel-Dieu de France hospital and the NGOs Première Urgence Internationale,
  Solidarités International and the Order of Malta. In the face of this new crisis
  hitting Lebanon, France is working actively. The Minister for Europe and Foreign
  Affairs is continuing his contacts with his American, European and Middle Eastern
  partners to work on finding a way out of the crisis, as he has been doing since
  28 February.'
