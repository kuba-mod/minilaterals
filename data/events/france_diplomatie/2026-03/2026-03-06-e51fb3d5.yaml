title: Canada – Conversation between the Minister and his Canadian counterpart, Ms…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke today to the
  Canadian Minister of Foreign Affairs, Ms Anita Anand. The ministers took stock of
  the escalation under way in the Middle East. They agreed to go on coordinating closely,
  in particular to guarantee the protection of their nationals in the region. The
  Minister emphasized the special situation of Lebanon and France’s strong wish for
  infrastructure and civilians to be protected and Lebanon’s territorial integrity
  respected. They also discussed the G7’s priorities under the French presidency this
  year.
