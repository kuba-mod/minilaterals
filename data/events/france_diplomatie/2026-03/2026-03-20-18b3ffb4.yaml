title: 'Protection of social rights: Extension of the European social charter to the…'
text: 'La France a officiellement notifié aujourd’hui au Conseil de l’Europe l’extension
  de l’applicabilité de la Charte sociale européenne à ses territoires d’Outre-mer.
  France has today officially notified the Council of Europe of the extension of the
  European Social Charter’s applicability to its overseas territories. This decision
  reflects the French authorities’ desire to guarantee the same high-level protection
  of social rights to all its citizens, whatever their place of residence. It also
  testifies to the importance attached to the principle of equality between all citizens,
  to social cohesion and to solidarity between territories. The European Social Charter
  protects key everyday rights: the right to work, health, decent housing, social
  security, and support for the most vulnerable people. The Charter is an important
  instrument for promoting and protecting social rights in the Council of Europe countries.
  It is an essential pillar of the European social model. Specifically, from 1 May
  2026 onwards, the inhabitants of Guadeloupe, French Guiana, Martinique, Mayotte
  and Réunion will fully benefit from the Charter’s guarantee of these rights, as
  will those of Saint Martin, Saint Barthélemy and Saint Pierre and Miquelon, in areas
  covered by the State’s powers. By this step forward, France reaffirms its commitment
  to a strong, inclusive, protective social model for the benefit of all. Ministry
  for Europe and Foreign Affairs Spokesperson’s Department : presse.dcp@diplomatie.gouv.fr
  Office of Jean-Pierre Farandou, Minister for Labour and Solidarity: sec.presse.ts@travail.gouv.fr
