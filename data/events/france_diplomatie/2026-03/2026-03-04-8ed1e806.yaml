title: Iraq – Murder of Yanar Mohammed
text: France was deeply saddened to learn of the murder of Yanar Mohammed on March
  2 in Baghdad. We condemn this crime in the strongest possible terms. In 2025, Yanar
  Mohammad was awarded the Franco-German Prize for Human Rights and the Rule of Law
  in recognition of her commitment to the rights of Iraqi women. Her battle, which
  she waged with admirable courage and determination, cost her her life. This crime
  must not go unpunished. France pays tribute to Yanar Mohammed and offers its heartfelt
  condolences to her family and loved ones. We express our solidarity with all those
  who defend the rights of women in Iraq.
