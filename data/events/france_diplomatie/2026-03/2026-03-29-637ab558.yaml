title: Joint Statement of Foreign Ministers of Australia, France, Germany, Italy,
  New…
text: We, the Foreign Ministers of Australia, France, Germany, Italy, New-Zealand
  and the United Kingdom, express our deep concern about a bill that would significantly
  expand the possibilities to impose the death penalty in Israel and that could be
  voted into law next week. We are particularly worried about the de facto discriminatory
  character of the bill. The adoption of this bill would risk undermining Israel’s
  commitments with regards to democratic principles. The death penalty is an inhumane
  and degrading form of punishment without any deterring effect. This is why we oppose
  the death penalty, whatever the circumstances around the world. The rejection of
  the death penalty is a fundamental value that unites us. We urge the Israeli decision
  makers in Knesset and Government to abandon these plans.
