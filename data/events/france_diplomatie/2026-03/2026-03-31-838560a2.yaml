title: Jean-Noël Barrot’s conversation with Ms Nialé Kaba, Minister of Foreign Affairs…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke on the telephone
  to his Ivorian counterpart, Ms Nialé Kaba, Minister of State, Minister of Foreign
  Affairs and International Cooperation, on Monday 30 March 2026. This first exchange
  between the two ministers made it possible to highlight the excellent, diverse Franco-Ivorian
  partnership. The ministers welcomed the many important bilateral events of the past
  few weeks, with, among others, the return to Côte d’Ivoire of the Djidji Ayôkwé
  talking drum, Côte d’Ivoire’s presence at the International Agricultural Show as
  guest of honour and the holding of a Franco-Ivorian business forum organized by
  Business France. They talked about stepping up trade and investment between the
  two countries and increasing heritage and museum cooperation.
