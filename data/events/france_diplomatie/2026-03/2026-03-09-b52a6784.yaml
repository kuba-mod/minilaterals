title: Eswatini - M. Jean-Noël Barrot’s conversation with his counterpart Ms Pholile…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke today to his
  counterpart Ms Pholile Shakantu , Minister of Foreign Affairs and International
  Cooperation of the Kingdom of Eswatini. The conversation provided an opportunity
  to discuss the bilateral relationship, particularly in the education and energy
  fields. The two ministers especially welcomed progress in the provision of French
  courses in Eswatini, thanks to training programmes for Swazi French teachers. The
  [French] Minister also presented to his counterpart the goals of the Africa Forward
  Summit, co-organized by France and Kenya, which will be held in Nairobi on 11 and
  12 May 2026.
