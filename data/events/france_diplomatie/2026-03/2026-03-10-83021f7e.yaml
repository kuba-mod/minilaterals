title: International Partnership against impunity for the use of chemical weapons
  –…
text: International Partnership against impunity for the use of chemical weapons –
  Supporting the OPCW upon the delivery of the fifth IIT report (10 of March 2026)
  We, the participating States of the International Partnership against Impunity for
  the Use of Chemical Weapons (PAI), stand together to preserve the international
  standards and norms against the use of chemical weapons by anyone, anywhere, under
  any circumstances. We reiterate our strong support for the Convention on the Prohibition
  of the Development, Production, Stockpiling and Use of Chemical Weapons and on their
  Destruction, an essential pillar of the international disarmament and counter proliferation
  architecture and the rules based international order on which we all rely.
