title: 'European Union: Lille to host the headquarters of the European Union customs…'
text: Following a joint procedure involving the [European] Parliament and Council,
  the city of Lille has been chosen to host the headquarters of the European Union
  Customs Authority (EUCA). France welcomes the decision to set up a new European
  agency on its territory, in Lille, a city with a deeply rooted customs culture.
  The new headquarters is destined to play a central role in the ongoing reform of
  the Customs Union. France repeats that it is fully mobilized when it comes to protecting
  consumers and monitoring goods circulating within the EU.
