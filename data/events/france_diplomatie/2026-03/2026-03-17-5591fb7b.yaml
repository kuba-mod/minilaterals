title: Cybersecurity – The EU sanctions several private cyber offensive ecosystem…
text: At the March 16th Foreign Affairs Council meeting held in Brussels, member states
  adopted new listings under the European Union (EU) cyber sanctions regime. Today,
  the EU is imposing these restrictive measures on the private cyber offensive ecosystem
  that equips the malicious actors targeting France and Europe. Among the new entities
  listed are the private Iranian company Emennet Pasargad, which conducted cyberattacks
  and information manipulation campaigns in France against the newspaper Charlie Hebdo
  in 2023 and the Paris 2024 Olympic and Paralympic Games. The EU also listed Integrity
  Technology Group and Anxun Information Technology Co. Ltd, two private Chinese companies
  that have conducted cyberattacks in Europe, as well as two individuals associated
  with these companies. These five additions join the list of 21 entities and individuals
  that have been sanctioned thus far by the EU under its cyber sanctions regime. These
  measures will institute an asset freeze and a travel ban that prohibits those targeted
  from entering the EU. In keeping with the implementation of the new French national
  cybersecurity strategy, France is committed to using all the levers at its disposal
  at both the national and European levels in order to combat impunity and force the
  adversaries targeting us in cyberspace to pay the price, together with our partners
  and in accordance with the UN Framework of Responsible State Behavior in Cyberspace.
  France will continue working with the UK to bolster efforts made through the Pall
  Mall Process to combat the proliferation and irresponsible use of tools developed
  by the cyber offensive industry.
