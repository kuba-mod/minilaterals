title: Epstein files - Situation of Fabrice Aidan
text: On Tuesday 10 February, following the US Department of Justice’s publication
  of the files relating to the Epstein case, the Ministry for Europe and Foreign Affairs
  referred the situations of Fabrice Aidan, a French diplomat mentioned in the files,
  and all other persons implicated in relations with Mr Epstein to the Public Prosecutor
  at the Paris High Court under Article 40 of the Code of Criminal Procedure. Regarding
  Fabrice Aidan’s administrative situation, the Minister also initiated an administrative
  investigation and a disciplinary procedure. The Foreign Affairs General Inspectorate
  has completed its administrative investigation. In accordance with its procedures,
  it conducted some 30 hearings and heard all members of staff who had knowledge of
  the situation in 2013. All the Ministry staff who were approached, regardless of
  whether they are still in post, responded to the summonses sent to them. The Ministry
  took the initiative of forwarding the General Inspectorate’s report to the judicial
  authorities to support the ongoing judicial investigation, as the Minister had indicated.
  The Ministry places itself at the full disposal of the court, with which it is closely
  cooperating. On the basis of the administrative investigation, disciplinary measures
  are also being considered.
