title: DRC – Death of a French national in Goma
text: France condemns this morning’s attack in Goma, Democratic Republic of the Congo.
  The attack tragically killed several civilians, including a French national. She
  was working for UNICEF, helping protect children exposed to the current crisis in
  eastern DRC. France extends its condolences to her family, close friends and colleagues
  at this painful time and calls for the memory of our compatriot to be respected.
  It urges the parties to refrain from exploiting her death for their own ends. France
  is in contact with the Congolese authorities, who have pledged to clarify who was
  responsible for this tragic death and the circumstances of it, and act accordingly.
  France is asking for an independent, impartial investigation to be launched and
  is ready to contribute to it. France renews its support to UNICEF and all humanitarian
  actors who operate every day in difficult conditions in eastern DRC. We firmly condemn
  any violence against humanitarian workers and civilian populations, which may constitute
  war crimes, and urge the parties to respect international humanitarian law. France
  reiterates its appeal to the parties to end the fighting, adopt an effective, verifiable
  ceasefire and continue their dialogue through the mediation of the United States
  and Qatar and the African Union’s facilitation effort to find a lasting political
  solution to the conflict in the Great Lakes.
