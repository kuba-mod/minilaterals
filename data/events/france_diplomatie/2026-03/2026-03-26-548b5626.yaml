title: Minister’s meeting with Mr Subrahmanyam Jaishankar, India’s external Affairs…
text: The Minister for Europe and Foreign Affairs spoke to his Indian counterpart,
  Subrahmanyam Jaishankar, on Thursday 26 March 2026, on the sidelines of the G7 foreign
  ministers’ meeting at Abbaye des Vaux-de-Cernay. The Indian Foreign Minister’s participation
  in the meeting testifies to the importance France attaches to closely involving
  India, which holds the BRICS presidency this year, in its G7 presidency. The ministers
  welcomed the fact that Prime Minister Modi has confirmed his participation in the
  Evian Summit (15-17 June). With this in mind, the two ministers highlighted India’s
  contribution to the G7’s work, particularly on the question of major macroeconomic
  imbalances, and on international partnerships and solidarity. The ministers spoke
  at length about the situation in the Middle East. They agreed to continue their
  close coordination with the aim of working jointly to ensure the Strait of Hormuz
  is safe.
