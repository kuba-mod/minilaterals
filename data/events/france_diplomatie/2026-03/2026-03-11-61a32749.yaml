title: Armenia - The Minister’s meeting with Mr Mirzoyan, Armenian Minister of Foreign…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  today with the Armenian Minister of Foreign Affairs, Mr Ararat Mirzoyan, on the
  sidelines of the Nuclear Energy Summit held by France. The Minister and his counterpart
  discussed the regional situation, in the context of current events in Iran and the
  Middle East. He reiterated France’s full support for the normalization of relations
  between Armenia and Azerbaijan and for the development of regional connectivity,
  with due respect for States’ territorial integrity and sovereignty. The two ministers
  took stock of the main bilateral cooperation projects between France and Armenia,
  with a view to the forthcoming conclusion of a strategic partnership. The Minister
  signalled France’s unwavering commitment to Armenia’s sovereignty and democratic
  resilience.
