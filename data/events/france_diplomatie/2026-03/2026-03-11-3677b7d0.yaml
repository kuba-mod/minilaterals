title: UN – Appointment of the Executive Director of the United Nation Office on Drugs…
text: France welcomes the UN Secretary-General’s appointment of Monica Kathina Juma,
  National Security Adviser to the President of Kenya and Secretary to Kenya’s National
  Security Council, to serve as Executive Director of the United Nations Office on
  Drugs and Crime (UNODC) and Director General of the UN Office in Vienna. France
  has an important partnership with UNODC, which plays a major role in defining international
  policies on preventing and combating the illicit use of drugs and preventing terrorism.
  France is committed to ensuring that this effort is consistent with its own effort
  to combat organized crime, and particularly drug trafficking. France will continue
  to support UNODC in its effort to combat transnational criminal threats and to respond
  to new global challenges. We offer Ms. Juma our best wishes for success in her new
  role.
