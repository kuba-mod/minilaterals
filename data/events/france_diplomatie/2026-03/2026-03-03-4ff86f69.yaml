title: Lebanon – m. Jean- Noël Barrot’s conversation with the lebanese prime minister
text: The Minister spoke to Lebanese Prime Minister Nawaf Salam. He expressed to him
  France’s solidarity in the face of the ordeal Lebanon is going through as a result
  of Hezbollah’s irresponsible decision to join in the Iranian attacks against Israel.
  He signalled France’s support for the decisions taken by the Council of Ministers
  to put an end to Hezbollah’s military operations. He called for the Lebanese authorities
  to implement these essential decisions without further delay, to protect Lebanon’s
  sovereignty and stability. He emphasized France’s desire for infrastructure and
  civilians to be protected and for Lebanon’s territorial integrity to be respected.
