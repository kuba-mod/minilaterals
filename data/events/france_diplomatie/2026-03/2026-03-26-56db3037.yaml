title: Minister’s meeting with his highness Faisal bin Farhan Al Saud, Minister of…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke to his counterpart
  from the Kingdom of Saudi Arabia, Prince Faisal bin Farhan Al Saud, on the sidelines
  of the G7 foreign ministers’ meeting at Abbaye des Vaux-de-Cernay. The two ministers
  talked about the ongoing war in the Middle East, marked by strikes carried out against
  Iran by Israel and the United States, and missile and drone attacks carried out
  by Tehran in several countries of the region, particularly Saudi Arabia. The Minister
  reiterated France’s very strong condemnation of Iran’s attacks on its neighbours
  and signalled France’s wholehearted solidarity with the Kingdom of Saudi Arabia
  in these circumstances. The Minister emphasized the need to avoid any further extension
  of the conflict and recalled France’s commitment to de-escalation and a diplomatic
  solution. He repeated France’s readiness, when conditions allow and with its partners,
  to help guarantee freedom of navigation in the Strait of Hormuz, which must be restored.
  The two ministers also discussed the consequences of the war in the region, especially
  in Lebanon, and the need to support the authorities in the face of forces that challenge
  the sovereignty of the State. Finally, they reaffirmed their desire to continue
  their close coordination in order to contribute to regional stability and ongoing
  diplomatic efforts.
