title: Lebanon – Attack on UNIFIL
text: France strongly condemns the shots fired several times at soldiers of the United
  Nations Interim Force in Lebanon (UNIFIL) yesterday. These attacks from non-state
  armed groups are unacceptable. France calls on all the parties to show restraint,
  return to the ceasefire of 26 November 2024 and comply with Security Council Resolution
  1701. Hezbollah must end its operations and hand in its weapons. Israel must abandon
  its ground offensive, end its massive strikes and respect Lebanon’s sovereignty
  and territorial integrity. UNIFIL must be able to carry out its mandate to the full
  and exercise its freedom of movement. The protection of the Blue Helmets and the
  safety and security of personnel, property and premises of the United Nations must
  be ensured, in accordance with international law and Resolution 1701.
