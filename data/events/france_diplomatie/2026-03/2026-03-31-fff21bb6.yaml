title: Passing of Chandrikapersad Santokhi, former President of Suriname
text: France honors the memory of the former President of Suriname, Chandrikapersad
  Santokhi, who died suddenly. A major political figure in Suriname, he was elected
  President in 2020 and held that office until July 2025. His commitment to strengthening
  relations between our two countries, neighbors via French Guiana, resulted in the
  signing of an agreement to delineate the border along the Maroni River on March
  15, 2021. France offers its heartfelt condolences to his loved ones, and to the
  people and government of Suriname.
