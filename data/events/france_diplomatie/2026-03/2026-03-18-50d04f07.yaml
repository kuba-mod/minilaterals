title: Germany – Minister’s trip to Berlin
text: Minister for Europe and Foreign Affairs Jean-Noël Barrot was in Berlin, Germany,
  on March 17 and 18. This visit, which follows the Foreign Affairs Council meeting
  in Brussels and immediately precedes the European Council meeting, illustrates the
  close and constant cooperation that exists between France and Germany at the heart
  of Europe. The Minister addressed the German Cabinet in accordance with the provision
  contained in the bilateral Aachen Treaty stating that a member of the Government
  of one of the two countries shall attend cabinet meetings of the other country.
  Discussions focused on the international situation, particularly support for Ukraine
  and the situation in the Middle East. The Minister also took part in the Europe
  2026 conference along with his German counterpart, Johann Wadephul, He stressed
  the need to implement Franco-German initiatives to strengthen the EU’s sovereignty
  and competitiveness agendas, the drivers of a stronger, more resilient and more
  independent Europe. His visit also provided an opportunity to review the implementation
  of the joint economic agenda adopted in Toulon, This agenda established milestones
  for Franco-German cooperation and set priorities for the coming months.
