title: Bosnia and Herzegovina – Minister’s meeting with Mr Elmedin Konaković, Minister…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  with Mr Elmedin Konaković, Minister of Foreign Affairs of Bosnia and Herzegovina,
  in Paris on 20 March 2026. Thirty years after the signing of the Dayton Peace Accords
  in Paris, the Minister reaffirmed France’s commitment to Bosnia and Herzegovina’s
  independence, sovereignty and territorial integrity and to the whole region’s stability.
  The Minister signalled his support for the prospect of Bosnia and Herzegovina’s
  future in Europe and encouraged the continuation of the necessary reforms, two years
  after the European Council’s decision to begin negotiations on Bosnia and Herzegovina’s
  accession to the European Union. The two ministers signed an agreement on the establishment
  and activities of the French Development Agency, Proparco and Expertise France in
  Bosnia and Herzegovina. They also signed an agreement on authorizing spouses of
  diplomatic staff posted in France and Bosnia and Herzegovina to take up paid, professional
  employment. They welcomed the launch of the first direct flight between Paris-Orly
  and Sarajevo airports [by the Transavia airline] in April. The Minister welcomed
  Bosnia and Herzegovina’s decision to join the Western Balkans Cyber Capacity Centre
  (WB3C), based in Podgorica (Montenegro). The Minister and his Bosnian counterpart
  signalled their desire to continue strengthening bilateral relations between France
  and Bosnia and Herzegovina.
