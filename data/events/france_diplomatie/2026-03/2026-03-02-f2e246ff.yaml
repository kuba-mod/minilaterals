title: China – Conversation between M. Jean-Noël Barrot and his counterpart, Mr Wang
  Yi
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke on the telephone
  yesterday to Mr Wang Yi, Director of the Office of the Central Foreign Affairs Commission
  of the Chinese Communist Party and Minister of Foreign Affairs of the People’s Republic
  of China. The two ministers discussed the situation in the Middle East. The [French]
  Minister recalled the Iranian regime’s responsibility in the ongoing escalation,
  after it unjustifiably struck several countries in the region. This chaos and terror
  approach follows its refusal to comply with Security Council resolutions regulating
  its nuclear programme and ballistic activities and banning support for non-state
  armed groups, and to enter in good faith into multilateral negotiations on its nuclear
  programme. The Minister also recalled the scale of the human rights violations committed
  by the regime in January during the bloody crackdown on public demonstrations. The
  Minister added that the military operation by the United States and Israel was conducted
  without France participating or being informed. He also repeated that it was each
  country’s responsibility to prioritize international institutions to resolve disagreement
  and, if necessary, resort to the use of force. The two ministers agreed on the need
  to work towards de-escalation, in conjunction with the Gulf countries, and find
  a path to a political resolution guaranteeing collective security interests and
  provision for the Iranian people’s aspirations, in the framework set by UN Secretary-General
  resolutions and international law. The two ministers agreed to continue their close
  dialogue on the issue.
