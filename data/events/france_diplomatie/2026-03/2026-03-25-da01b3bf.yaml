title: G7 Foreign Ministers’ Meeting in Vaux-de-Cernay
text: 'In an international context marked by a growing number of conflicts, an increase
  in cross-cutting threats such as organized crime and drug trafficking, and the fragmentation
  of the world economic order, France wants to put dialogue, crisis-response and renewed
  multilateralism at the heart of its G7 Presidency. These will be the objectives
  of this G7 Foreign Ministers’ Meeting to be held on 26-27 March in Les Vaux-de-Cernay.
  True to the spirit of the founding Summit in Rambouillet in 1975, France wishes
  to demonstrate that the G7, born out of the first oil crisis, embodies a shared
  vision of global prosperity based on three principles: solidarity between nations,
  economic stability and collective responsibility. France’s G7 Presidency aims to
  be one of balance, convergence and results, to achieve concrete progress for the
  security and prosperity of all. A new international order must emerge to produce
  a fairer and more balanced system, underpinned by a renewed multilateralism. Reform
  of global governance, reconstruction and the fight against cross-cutting threats
  are issues which require a collective commitment which extends beyond G7 members
  alone. That is why the French G7 Presidency has chosen to involve the major emerging
  economies and regional partners in its work. Saudi Arabia, Brazil, South Korea,
  India and Ukraine will thus join the work of the G7 Foreign Ministers. Amid a growing
  number of conflicts, France will mobilize its partners on major crises. The ministers
  will also address several regional situations, including the Indo-Pacific, Sudan,
  Haiti, Gaza, and Venezuela and Cuba, in light of the events which have taken place
  since the start of 2026. France and its partners are seeking to work together to
  raise funds internationally to repair Chernobyl’s confinement structure, which was
  severely damaged by a Russian strike in 2025, and to organize a regional conference
  to combat the trafficking of Captagon in Syria, a synthetic drug that is wreaking
  havoc in the Middle East and has made its way to Europe. Finally, we will discuss
  regional economic integration in the Middle East. The Ministers will establish a
  G7 task force to work on creating a network of ports in G7 countries and other partner
  countries to step up the fight against drug trafficking. Another priority will be
  to organize a regional security conference in the Caribbean in Martinique in July
  2026, convening countries in the region and G7 partners to step up the fight against
  drug trafficking in the region, and to organize the fifth “No Money for Terror”
  conference, to be held in Paris on 19 May 2026 to combat terrorist financing. Finally,
  we will discuss securing critical mineral supply chains, following on from the discussions
  held under the Canadian G7 Presidency.'
