title: Belarus – Release of prisoners
text: France welcomes the release of 250 prisoners in Belarus, thanks to mediation
  by the United States. It is the most significant release since the start of this
  process initiated by Belarus in July 2024. France calls for this momentum to be
  continued and accelerated, and for political sentences and imprisonments to be halted.
  It also encourages the Belarusian authorities to continue allowing all the people
  released to live peacefully in Belarus, and calls on them to allow those who so
  wish to return to live in their country.
