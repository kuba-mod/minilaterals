title: Afghanistan – Air strike on a Kabul hospital
text: France strongly condemns the March 16th air strike on a Kabul hospital that
  killed numerous civilians. We express our heartfelt solidarity with the victims
  and their loved ones, and offer them our condolences. International humanitarian
  law applies to everyone and must ensure the protection of civilian populations.
  Humanitarian workers must be guaranteed free access to Afghan territory in accordance
  with United Nations Security Council resolution 2593.
