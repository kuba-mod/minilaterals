title: Minister Jean-Noël Barrot’s meeting with Ms Kaja Kallas, EU high representative…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke to Mme Kaja
  Kallas, EU High Representative for Foreign Affairs and Security Policy, on 26 March
  2026, on the sidelines of the G7 foreign ministers’ meeting. The meeting focused
  in particular on the situation in the Middle East, its consequences for maritime
  security and freedom of navigation, and notably on the situation in Lebanon. Both
  also discussed the European Union’s support for Ukraine in the face of Russian aggression.
  The Minister signalled France’s support for the swift adoption of a 20th package
  of sanctions against Russia, and its resolute commitment to fighting the Russian
  shadow fleet.
