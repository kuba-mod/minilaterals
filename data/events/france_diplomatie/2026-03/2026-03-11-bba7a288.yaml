title: First edition of the Franco-American dialogue on deterrence, strategic…
text: France and the United States convened a French -U.S. Deterrence, Strategic Stability,
  and Non-proliferation Dialogue in Paris on March 9, 2026. Under Secretary of State
  for Arms Control and International Security Thomas G. DiNanno co-chaired for the
  United States, and Director for Strategic Affairs, Security, and Disarmament at
  the French Ministry for Europe and Foreign Affairs Claire Raulin co-chaired for
  France. The delegations included participants from both sides’ foreign affairs,
  defense, and energy agencies. The two delegations held extensive talks on all nuclear
  related issues. Both delegations discussed the current strategic environment and
  its challenges. France and the United States decided to regularize an annual bilateral
  dialogue and to establish a working group to facilitate strengthened cooperation
  and prepare annual talks.
