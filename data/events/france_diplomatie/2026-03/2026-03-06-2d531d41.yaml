title: Azerbaijan – Iranian drone strike against Nakhchivan international airport
text: France condemns in the strongest terms the Iranian drone strike that targeted
  Nakhchivan International Airport in Azerbaijan this morning. France wishes the two
  people injured in the attack a speedy recovery. It expresses its wholehearted solidarity
  with Azerbaijan in the face of this unjustifiable attack, which is a flagrant violation
  of Azerbaijan’s sovereignty and of international law.
