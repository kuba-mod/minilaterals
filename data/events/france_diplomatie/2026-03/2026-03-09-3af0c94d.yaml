title: Burundi - M. Jean-Noël Barrot’s conversation with his counterpart, Mr Edouard…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke today to his
  counterpart Edouard Bizimana, Minister of Foreign Affairs, Regional Integration
  and Development Cooperation of Burundi. Minister Jean-Noël Barrot congratulated
  his counterpart, whose country has taken over the rotating chairmanship of the African
  Union for 2026. The two ministers welcomed the excellent bilateral partnership,
  building on the meeting between Presidents Macron and Ndayishimiye in Nice in June
  2025. Among other things, they discussed the resolution of the conflict in the Great
  Lakes. The [French] Minister also presented to his counterpart the goals of the
  Africa Forward Summit, co-organized by France and Kenya, which will be held in Nairobi
  on 11 and 12 May 2026.
