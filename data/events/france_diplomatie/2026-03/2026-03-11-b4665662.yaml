title: Ukraine - Minister’s meeting with Ms Yulia Svyrydenko, Ukrainian Prime Minister
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  yesterday with Ms Yulia Svyrydenko, the Ukrainian Prime Minister, on the sidelines
  of the world Nuclear Energy Summit organized by France. The two ministers discussed
  the situation in Ukraine, as Russian strikes continue daily and with the same intensity
  against energy infrastructure. The Minister assured the Ukrainian Prime Minister
  that France is working actively, bilaterally, with its European partners and as
  part of its G7 presidency, to support Ukraine as a matter of urgency and over the
  long term, while maintaining pressure on Russia. He also recalled the recent milestones
  in our bilateral cooperation, particularly the announcement on 19 February of the
  replenishment of the support fund dedicated to critical infrastructure and priority
  sectors in the Ukrainian economy. Discussing the situation in the Middle East and
  the risks of regional destabilization, the Minister emphasized that the Middle East
  crisis would not divert us from our efforts to achieve a just and lasting peace,
  and reiterated to the Ukrainian Prime Minister our determination to support Ukraine
  in its fight for its freedom and sovereignty.
