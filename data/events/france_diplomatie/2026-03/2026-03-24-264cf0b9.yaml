title: Conversation between Jean-Noël Barrot and Korean Foreign Minister Cho Hyun
text: On March 24, Minister for Europe and Foreign Affairs Jean-Noël Barrot spoke
  by telephone with Korean Foreign Minister Cho Hyun. With 2026 marking the 140th
  anniversary of the establishment of diplomatic relations between France and Korea,
  the Ministers discussed progress on strategic cooperation ahead of President Macron’s
  state visit to Korea and the South Korean Minister’s arrival in France, where he
  will attend meetings on the sidelines of the G7 foreign ministers meeting at Vaux-de-Cernay
  abbey. The Ministers spoke about international crises, reiterated their commitment
  to multilateralism and the rules-based international order, and reaffirmed their
  support for Ukraine.
