title: Israel – M. Jean- Noel Barrot’s conversation with his Israeli counterpart
text: 'The Minister spoke to his Israeli counterpart, Gideon Sa’ar. The two ministers
  discussed the ongoing regional escalation. The Minister expressed to his counterpart
  France’s solidarity with the civilians affected by the Iranian attacks. He condemned
  the firing of rockets and drones against Israel for which Hezbollah has claimed
  responsibility, and signalled the need for Lebanese infrastructure and civilians
  to be protected and for Lebanon’s territorial integrity to be respected. He signalled
  the need for de-escalation and a long-term response to the collective security challenges
  posed by the Iranian regime’s policy: the nuclear programme, the ballistic programme
  and regional destabilization activities.'
