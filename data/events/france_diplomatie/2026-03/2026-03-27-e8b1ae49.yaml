title: Joint Statement of G7 Foreign Ministers on Iran
text: We, the G7 Foreign Ministers of Canada, France, Germany, Italy, Japan, the United
  Kingdom, and the United States of America, and the High Representative of the European
  Union, met under France’s G7 Presidency, at Abbaye des Vaux-de-Cernay, France from
  March 26 to 27, 2026. We discussed the situation in Iran and the region. We underscored
  the importance of minimizing the impact of the conflict on regional partners and
  civilian populations, critical infrastructure - and the need to coordinate humanitarian
  aid efforts. We call upon an immediate cessation of attacks against civilians and
  civilian infrastructure. There can be no justification for the deliberate targeting
  of civilians in situations of armed conflict as well as attacks on diplomatic facilities.
  We focused on the value of diverse partnerships, coordination, and supporting initiatives,
  including to mitigate global economic shocks such as disruptions to economic, energy,
  fertilizer and commercial supply chains, which have direct impacts on our citizens.
  We reiterated the absolute necessity to permanently restore safe and toll free freedom
  of navigation in the Strait of Hormuz, consistent with UNSC Resolution 2817 and
  the Law of the Sea.
