title: Joint Statement - Minister’s Barrot’s visit to the Central African Republic
text: 'Minister for Europe and Foreign Affairs Jean-Noël Barrot paid a working visit
  to the Central African city of Bangui on March 12 and 13. During his visit to the
  Central African Republic, he met with Sylvie Notefe, the Minister of Foreign Affairs,
  Francophonie and Central African Nationals Abroad. The two Ministers discussed the
  bilateral relationship between the CAR and France, as well as major regional and
  international issues of common interest. The two officials also reaffirmed their
  commitment to continuing the close and excellent bilateral cooperation that exists
  between our countries, in accordance with the road map signed by President Macron
  and President Touadéra in 2024. They emphasized the importance of promoting a renewed
  partnership based on mutual respect, trust, transparency and shared interests, one
  that is both rooted in history and oriented toward the future. They hailed the vibrant
  new political dialogue between our two countries and applauded our accelerating
  cooperation, characterized by a number of projects in such varied areas as governance,
  justice, culture, gender equality, research, youth initiatives, professional training,
  sports, the ecological transition, health and entrepreneurship, as well as administrative
  reform and judicial assistance. The French government reiterated its commitment
  to supporting efforts by the Central African authorities to strengthen peace, national
  reconciliation and sustainable development. The Central African government expressed
  its commitment to strengthening constructive, mutually beneficial cooperation, particularly
  with regard to investment, institutional support, training and support for key projects.
  The two Ministers also exchanged views on global security challenges, as well as
  those affecting Central Africa. They urged compliance with the values and principles
  of multilateralism, and respect for national sovereignty and international cooperation
  with the aim of ensuring peace and security. On the bilateral front, the Central
  African Minister took the opportunity to thank the French Government for its loan
  of €25 million, equal to 16.4 billion FCFA, for the purpose of strengthening bilateral
  cooperation and meeting the priority needs of Central Africans, particularly by
  ensuring the sustainability of public finances and providing support for social
  sectors, especially healthcare. On the multilateral front, the Minister hailed the
  French contribution to the CAR’s stabilization efforts via the United Nations Multidimensional
  Integrated Stabilization Mission in the Central African Republic (MINUSCA), as well
  as European missions: the European Union Training Mission in the Central African
  Republic (EUTM RCA) and the European Union Advisory Mission in the Central African
  Republic (EUAM RCA). They concluded their meeting by praising their excellent discussions
  and expressed their wish to continue their conversation in a spirit of friendship
  and cooperation, in accordance with the roadmap. During his working visit, Minister
  Jean-Noël Barrot also officially opened the Expertise France office and the new
  Pasteur Institute building in Bangui in ceremonies attended by major Central African
  figures. He concluded his stay in the Central African Republic with a courtesy call
  on His Excellency President Faustin-Archange Touadéra, during which he reiterated
  the French President’s invitation to his Central African counterpart to take part
  in the Africa Forward Summit co-hosted by France and Kenya, which will be held in
  Nairobi on May 11 and 12.'
