title: Joint statement on Lebanon
text: We, Foreign Ministers of Belgium, Croatia, Cyprus, France, Greece, Italy, Malta,
  the Netherlands, Portugal, and the United Kingdom, and the High Representative of
  the European Union, express our full support to the Government and people of Lebanon,
  who are once again suffering the dramatic consequences of a war that is not theirs.
  We express our condolences to the family of the victims and our solidarity to the
  civilian population impacted by this war both in Lebanon and Israel. The responsibility
  for this situation lies with Hezbollah. We strongly condemn Hezbollah ’ s attacks
  in support of Iran against Israel, which must cease immediately. The priority is
  to avoid a further escalation of the regional conflict with Iran. We support the
  historic and courageous decisions taken by the Lebanese Government. There is no
  other way to preserve Lebanon from foreign interference than by strengthening its
  State, its institutions and sovereignty. In that regard, we call for direct political
  negotiation between Lebanon and Israel, that can contribute to putting a durable
  end to this conflict and set the conditions for peaceful regional coexistence. The
  Lebanese executive has our full support in its approach and we encourage it to continue
  on this path through the implementation of concrete and irreversible measures, at
  all levels, to restore its sovereignty over the whole Lebanese territory, including
  the State ’ s monopoly on arms. In this context, we are committed to support the
  Lebanese Armed Forces and Lebanese Security Forces, by participating actively in
  the international support conference to be held as soon as conditions allow. With
  a view to enabling the Lebanese security forces to become the sole independent guarantors
  of Lebanon ’ s sovereignty in the long term, we also call on the Lebanese authorities
  to continue to adopt the necessary financial and economic reforms, in line with
  IMF requirements. We call on all parties to immediately deescalate and to revert
  to the cessation of hostilities agreement and UN Security Council resolution 1701
  (2006). We call for the protection of the civilian population, humanitarian personnel,
  peacekeepers, and civilian infrastructure, including airport, ports and bridges
  across the country, in line with international humanitarian law. We reaffirm our
  concern regarding the forced displacement of over 1m people in Lebanon. We call
  on Israel to avoid a further widening of the conflict including through a ground
  operation on Lebanese territory. We strongly reaffirm that the territorial integrity
  of Lebanon must be respected. We stand determined to continue to support the Lebanese
  government in providing humanitarian assistance to those affected by the conflict
  including the more than 1 million people displaced and to preserve Lebanon ’ s internal
  cohesion, building on the emergency measures already taken by our respective countries.
  We call on the entire international community to participate in this vital humanitarian
  effort to ensure dignified living conditions for the many victims of this conflict.
  Finally, we reaffirm our strong support for the mandate of the United Nations Interim
  Force in Lebanon (UNIFIL) in South Lebanon and call to ensure deconfliction channels
  remain open. We strongly condemn all recent attacks on UNIFIL contingents, which
  provoked unacceptable casualties among the peacekeepers in recent days. We urge
  all parties, under all circumstances, to ensure the safety and security of UNIFIL
  personnel and premises, in accordance with international law. We commend its remarkable
  work in these difficult conditions.
