title: Bulgaria – Conversation between Jean-Noël Barrot and his Bulgarian counterpart
text: On May 22, Minister for Europe and Foreign Affairs Jean-Noël Barrot met with
  his Bulgarian counterpart, Velislava Petrova-Chamova, on the sidelines of the NATO
  Foreign Ministers Meeting in Sweden. The Minister emphasized France’s desire to
  work with the new Bulgarian government to give a new impetus to bilateral relations
  between our two countries and to strengthen cooperation in areas that are key to
  the sovereignty, strategic autonomy and competitiveness of the European Union. Their
  discussions covered such EU policy priorities as support for Ukraine, the Western
  Balkans, and security challenges in the North Sea.
