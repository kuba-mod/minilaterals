title: Russia – Russia’s Ambassador to France summoned
text: Following last weekend’s massive airstrikes and in light of the unacceptable
  threats against Ukrainian civilians and foreign diplomats, the Ministry for Europe
  and Foreign Affairs summoned the Russian Federation’s Ambassador to France, at the
  Minister’s request. Each day, Russia’s actions demonstrate its cynicism and contempt
  for international law. France strongly condemns Moscow’s acts of intimidation, which
  are proof of its military stalemate in Ukraine. France reiterates its call for Russia
  to end its illegal war of aggression in Ukraine. We maintain our commitment to defending
  European security and supporting Ukraine.
