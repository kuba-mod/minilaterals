title: United Nations – Conversation between Jean-Noël Barrot and Barham Salih, United…
text: Minister for Europe and Foreign Affairs Jean-Noël Barrot spoke with United Nations
  High Commissioner for Refugees Barham Salih on May 7. The Minister praised the cooperation
  between France and the UN High Commissioner for Refugees within their strategic
  partnership. He expressed France’s support for the implementation of the UNHCR’s
  mandate to protect and defend the rights of people forced to flee their homes, in
  line with the 1951 Geneva Convention relating to the Status of Refugees. The Minister
  assured the High Commissioner of France’s support for the reforms undertaken by
  the UNHCR to strengthen the effectiveness of its humanitarian response to crises
  and conflicts, and to offer long-term solutions to refugees and displaced persons.
  The Minister and the High Commissioner discussed the major crisis situations and
  their humanitarian consequences. They agreed to continue working closely together
  as part of the 75th anniversary celebrations of the 1951 Geneva Conventions relating
  to the Status of Refugees and in the leadup to the 2027 Global Refugee Forum.
