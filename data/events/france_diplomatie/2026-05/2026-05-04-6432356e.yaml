title: Oman – Meeting between Jean-Noël Barrot and Sayyid badr Albusaidi, minister
  of…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting in
  Muscat with his counterpart from the Sultanate of Oman, Sayyid Badr Albusaidi. The
  two ministers discussed the situation in the Middle East. They highlighted the need
  to consolidate the ceasefires in Iran and Lebanon and make headway on a lasting
  political settlement guaranteeing regional peace and stability. The Minister reiterated
  France’s very strong condemnation of the attacks Iran has carried out on its neighbours.
  He reaffirmed France’s solidarity with the Sultanate of Oman in this regard. The
  Minister reaffirmed France’s commitment to de-escalation and a diplomatic solution.
  He called for the unconditional, unrestricted and immediate reopening of the Strait
  of Hormuz, and reiterated France’s willingness to contribute – when conditions allow
  and together with its partners – to guaranteeing freedom of navigation in the strait,
  as part of the Franco-British initiative. The Minister emphasized that a diplomatic
  solution was essential in order to guarantee that Iran never acquires nuclear weapons
  and to address the threats posed by its ballistic and drone programmes and its destabilization
  activities. He expressed France’s readiness to support all efforts to this end.
  Finally, the two ministers reaffirmed their desire to continue their close coordination
  in order to contribute to regional stability and the ongoing diplomatic efforts.
