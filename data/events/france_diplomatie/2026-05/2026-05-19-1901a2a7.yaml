title: United Arab Emirates – Drone strikes on the Barakah nuclear plant
text: France condemns in the strongest possible terms the May 17th drone attacks on
  the Barakah nuclear plant in the United Arab Emirates. They must stop. France emphasizes
  that attacks on functioning civilian nuclear facilities endanger their safety and
  calls on all nations to abide by their obligations in this regard, particularly
  with respect to humanitarian law. France expresses its full solidarity with the
  people and authorities of the United Arab Emirates, a strategic partner, and remains
  fully committed to contributing to the defense of its territory. We reaffirm our
  unwavering support for the security, sovereignty and territorial integrity of our
  partners in the Middle East. France reaffirms its staunch commitment to a diplomatic
  solution in the crisis with Iran. Only a robust, lasting, verifiable agreement will
  be capable of restoring peace and avoiding another regional escalation.
