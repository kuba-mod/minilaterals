title: China – Mining accident in Shanxi province
text: France is deeply saddened following the gas explosion at the Liushenyu coal
  mine, in China’s Shanxi province, on 23 May 2026. It extends its sincere condolences
  to the victims’ families and close friends and expresses its wholehearted solidarity
  with the Chinese authorities and people in this ordeal.
