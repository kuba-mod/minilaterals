title: International Day Against Homophobia, Biphobia and Transphobia
text: On International Day Against Homophobia, Biphobia and Transphobia, France recalls
  the urgent need to combat worldwide the persecution, discrimination and violence
  that continue to target LGBT+ people. It expresses its deep concern over the proliferation
  of legislation hostile to LGBT+ people’s rights and of hate speech in many regions
  of the world. France reiterates its call for the global decriminalization of homosexuality
  and for full respect for all LGBT+ people’s fundamental rights. It encourages States
  to adopt laws and policies to fight homophobia and transphobia resolutely. In 2022,
  as a pioneer in the defence of LGBT+ people’s rights, France appointed an ambassador
  who promotes these messages to States, the European Union, international organizations
  and civil society. It has created a specific fund to support rights defenders and
  assist LGBT+ people in danger. It will continue to support those working for the
  equality and dignity of all people. France will continue its active efforts at European
  level and in multilateral forums. It welcomes the European Commission’s adoption
  of a new LGBTIQ+ equality strategy 2026-2030. France welcomes the Council of Europe’s
  adoption of a Recommendation on Equal Rights for Intersex Persons, and supports
  the preparation of a strategy for LGBT+ people’s rights for this 46-state area.
  At the United Nations, France will continue to work for the global decriminalization
  of homosexuality.
