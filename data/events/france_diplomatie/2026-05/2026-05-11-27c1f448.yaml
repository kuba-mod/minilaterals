title: '4th humanitarian assistance operation to Lebanon: almost 100 tons of aid…'
text: 'Since the beginning of the war in Lebanon, France, a friend of Lebanon, has
  stood fully alongside it, as stability and respect for its sovereignty are essential
  to regional security. As the French Minister for Europe and Foreign Affairs announced
  on his visit to Beirut on 19 March, €17 million in humanitarian assistance has been
  provided to meet the needs of the displaced civilian population, in partnership
  with the United Nations, the International Committee of the Red Cross (ICRC) and
  Lebanese and French NGOs. Since March 2016, the Ministry for Europe and Foreign
  Affairs Crisis and Support Centre (CDCS) has been working closely with the Lebanese
  authorities and has delivered almost 100 tons of medical assistance and essential
  equipment for displaced persons to Beirut. Through various humanitarian bridges
  set up with the European Union, 4 cargo flights have been arranged: on 12 March,
  23 April, 4 May, and today. This assistance was provided to the Lebanese Ministry
  of Public Health, as well as to several hospitals and humanitarian stakeholders
  in partnerships with France. These humanitarian assistance delivery operations and
  CDCS-funded projects in Lebanon help provide vital assistance to families displaced
  by war in many sectors such as healthcare, water/hygiene/sanitation, food security,
  education, protection and shelters. France would like to thank all its partners,
  including Jordan, as well as the organizations which helped make these operations
  a success through their donations and logistical support: the Tulipe Association,
  Electricians Without Borders, the CMA CGM Foundation and Nutriset.'
