title: United States – Jean-Noel Barrot’s telephone conversation with his American…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke on the telephone
  to Mr Marco Rubio, United States Secretary of State, on 3 May 2026. The two ministers
  talked about the main international crises, in particular the situations in the
  Middle East and Ukraine. The Minister reiterated the priority France has given to
  a diplomatic solution ensuring that Iran never acquires nuclear weapons. He recalled
  that France was ready to take part in any effort aimed at guaranteeing freedom of
  navigation in the Strait of Hormuz when conditions allow, in the framework of the
  Franco-British initiative. The two ministers emphasized that close coordination
  was necessary to facilitate the resumption of traffic. The Minister voiced France’s
  deep concern about the situation in Lebanon and reaffirmed France’s commitment to
  observance of the ceasefire and the safeguarding of Lebanese sovereignty. He signalled
  France’s support for the process of direct negotiations between Israel and Lebanon,
  which must enable Hezbollah’s disarmament, the withdrawal of Israeli forces and
  the establishment of a path towards peace and security for those two countries.
  Finally, the two ministers discussed the war in Ukraine. The Minister reiterated
  France’s steadfast support for Ukraine’s sovereignty and territorial integrity.
