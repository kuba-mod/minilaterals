title: Chad – Terrorist attacks on May 4 and 6
text: France condemns in the strongest possible terms the terrorist attacks that took
  place in the Lake Chad region on May 4 and 6. We offer our condolences to the Chadian
  authorities and to the families of the Chadian soldiers killed in those attacks.
  France will continue to stand with Chad in the fight against terrorism.
