title: Myanmar – M. Jean-Noel Barrot’s meeting with Mr Kim Aris, son of the State…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  on 5 May with Mr Kim Aris, son of the State Counsellor of the Republic of the Union
  of Myanmar, Daw Aung San Suu Kyi, who has been held in arbitrary detention since
  the military coup of 1 February [2021]. The Minister noted the junta’s announcement
  regarding her situation. He emphasized that France would continue to work for Ms
  Aung San Suu Kyi’s immediate and unconditional release and paid special attention
  to her health conditions, as well as the need for her to be allowed access to treatment
  and contact with her lawyers and loved ones. In this regard, he welcomed the “Proof
  of Life” campaign conducted by Mr Kim Aris and several civil society organizations.
  France continues to call for the release of all people detained arbitrarily and
  for full respect for fundamental rights. The Minister recalled France’s steadfast
  support for the Five-Point Consensus established by the Association of Southeast
  Asian Nations (ASEAN) in April 2021. He called for them to be implemented in full,
  in particular through an immediate de-escalation of violence and the establishment
  of an inclusive dialogue. France will continue to support a credible political process
  with its regional and United Nations partners. In the absence of tangible progress
  by the regime, France supported the renewal for one year of the European Union’s
  autonomous sanctions regime on Myanmar on 27 April 2026, which among other things
  makes it possible to impose sanctions on those responsible for war crimes, but also
  for serious attacks on human rights, democracy and the rule of law.
