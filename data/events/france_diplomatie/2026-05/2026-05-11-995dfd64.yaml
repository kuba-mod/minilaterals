title: Libya – Meeting between Jean-Noël Barrot, minister for europe and foreign…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting on
  7 May 2026 with Ms Hanna Tetteh, Special Representative of the United Nations Secretary-General
  for Libya and Head of the United Nations Support Mission in Libya (UNSMIL). The
  Minister recalled France’s steadfast commitment to Libya’s unity, stability and
  sovereignty. He renewed France’s support for the United Nations’ mediation efforts
  in Libya, which should lead to the relaunch of the Libyan political process and
  the organization of elections long awaited by the Libyan people.
