title: United Arab Emirates – France condemns the latest Iranian strikes
text: France strongly condemns the Islamic Republic of Iran’s unjustified attacks
  on the United Arab Emirates on May 4, which targeted civilian and energy infrastructure.
  These unacceptable strikes exacerbate the risk of further escalation, which must
  be avoided. France assures the people and authorities of the United Arab Emirates
  – our strategic partner – of its total solidarity and remains fully committed to
  helping it defend its territory. We reaffirm our unwavering support for the security,
  sovereignty and territorial integrity of our partners in the Middle East. France
  emphasizes the need to make headway toward a diplomatic solution to the current
  conflict based on reopening the Strait of Hormuz to free movement and on a robust
  agreement that addresses the nuclear and ballistic threats posed by Iran and its
  destabilization activities in the region.
