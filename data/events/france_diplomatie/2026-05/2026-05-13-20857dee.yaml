title: G7 trade ministers' communiqué
text: 1. We, the Trade Ministers of the Group of Seven (G7), met in Paris on May 5-6,
  2026, at a time of growing pressures on global value chains, increased market volatility,
  heightened risks to the security of energy markets and persistent macroeconomic
  and structural imbalances affecting the global economy. 2. In this context, we reaffirm
  the importance of dialogue and cooperation to support economic prosperity through
  trade, while enhancing economic resilience and economic security. 3. We reaffirm
  our shared concerns regarding non-market policies and practices (NMPPs), and their
  adverse impacts, including persistent market distortions, global structural excess
  capacity, harmful spillovers in global and domestic markets, and growing economic
  dependencies. 4. We will continue discussions on how best to counter NMPPs, including
  pervasive, opaque and harmful industrial subsidies, market-distortive practices
  of state-owned enterprises, and all forms of forced technology transfer. 5. We remain
  committed to sharing evidence, strengthening and developing tools, and promoting
  more effective and, where relevant, complementary responses to distortions and unfair
  competitive practices. We also recognize the importance of engaging with countries
  beyond the G7, including emerging and developing economies, in order to broaden
  awareness of the negative effects of NMPPs and support informed and effective responses.
  6. We reaffirm that resilient and reliable supply chains are essential to economic
  security. We will continue to deepen exchanges to identify vulnerabilities affecting
  strategic sectors, including critical technologies, with a view to reducing excessive
  dependencies, improving the security and resilience of supply chains, and addressing
  the risk of technology leakage. 7. We express our grave concerns regarding economic
  coercion, including coercion through arbitrary export restrictions that may lead
  to supply chain disruptions, notably for critical minerals, and undermine economic
  security and resilience. We will work together with partners to reduce critical
  dependencies and ensure that attempts or threats to weaponize economic dependencies
  will fail. We seek to deter and stand ready to take actions, where necessary, against
  economic coercion. 8. We underscore the strategic importance of critical minerals
  supply chains for our economic security and resilience. We recognize that they remain
  vulnerable to high levels of concentration, supply disruptions, and market distorting
  practices, which undermine the development of alternative supply capacities. 9.
  We further recognize that ensuring the long-term viability of diversified supply
  capacities requires an appropriate market environment and closer cooperation with
  trusted partners, including through plurilateral agreements. 10. In this regard, we
  intend to continue to discuss the feasibility and development of policies and mechanisms
  that would be necessary to ensure supply chain resilience and diversification, in
  a coordinated manner where relevant. These policies and mechanisms may include,
  as appropriate, resilience criteria, standards-based approaches, transparency and
  traceability mechanisms, demand and supply-side measures such as diversification
  requirements, revenue stabilization mechanisms including price-gap subsidies, joint
  procurement instruments, and trade-related instruments such as quotas and price
  floors, while taking into account factors such as their effectiveness,  and potential
  impacts, in particular on midstream and downstream industries, as well as the costs
  of inaction. 11. To support this, we will continue to take action to improve the
  common analytical foundations supporting this work, including through improved data
  availability and quality, market intelligence, and shared analysis, to facilitate
  complementary decision‑making among ourselves and potential likeminded partners.
  In this regard, we will continue discussions on how to best organize analytical
  cooperation on critical minerals, including by drawing on the contributions of external
  experts, where appropriate. 12. We take stock and regret the lack of substantive
  outcomes at the 14th World Trade Organization (WTO) Ministerial Conference in Yaoundé.
  We note that there is growing recognition among WTO Members of the need to improve
  the Organization’s ability to respond to contemporary trade realities and Members’
  interests. We call for constructive discussion at the WTO to drive meaningful reform. We
  acknowledge the agreed upon rules in the WTO are key to facilitating global trade. We
  underline the valuable role plurilateral initiatives can play in advancing progress
  on issues relevant to Members. We also underline the importance of a permanent moratorium
  on customs duties on electronic transmissions. 13. We note the rapid growth of cross-border
  trade in small parcels through e-commerce, which raises increasing challenges. We
  recognize the importance of strengthening cooperation across the G7 Trade and Finance
  Tracks to share experiences as regards measures aimed at promoting fair competition,
  enhancing compliance, improving customs risk management, ensuring product safety
  and minimizing environmental impacts, while enhancing joint efforts among relevant
  authorities. 14. We also emphasize the importance of engaging private sector stakeholders.
  We welcome the work carried out under the dedicated G7 task force on small parcels and
  the resulting sharing of current practices and national policy approaches. 15. We
  reaffirm our commitment to continued close cooperation within the G7 and with other-likeminded
  countries to address shared challenges and to improve the global trading system.
  We will continue advancing work on these priorities in preparation for the G7 Leaders’
  Summit.
