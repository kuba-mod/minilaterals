title: Romania – Russian drone incursions into Romanian airspace
text: France condemns in the strongest possible terms the unacceptable incursion of
  drones into Romanian airspace last night, which injured residents. France expresses
  its friendship and full solidarity with the Romanian authorities and people. This
  latest irresponsible escalation is a flagrant violation of international law. This
  event shows yet again that Russia’s war of aggression against Ukraine is a threat
  to the security of the EU and NATO as a whole. France will continue to provide Ukraine
  with unwavering support. The security of our allies is our priority and must be
  guaranteed. As a framework nation of NATO’s multinational battlegroup deployed in
  Romania, France will continue to play a full role in the efforts to strengthen NATO’s
  deterrence and defense posture.
