title: 2026 Henrik Enderlein Prize awarded to Olivier Schmitt
text: 'The international security expert was chosen for his sustained engagement bridging
  research and policymaking practice. Zachary Parolin received an honourable mention.
  Berlin/Paris, 28 May 2026. Olivier Schmitt, international security scholar at the
  Institute for Military Operations at the Royal Danish Defence College, has been
  awarded the 2026 Franco-German Henrik Enderlein Prize . Now in its fifth year, the
  €10,000 research prize honours outstanding social scientists aged 40 or younger
  whose work contributes to the future of Europe. The jury selected Schmitt as this
  year’s winner for his unique combination of rigorous research, practical engagement,
  and his thoroughly transnational perspective on one of the most pressing issues
  for the future of Europe. The jury also recognised Oxford Professor Zachary Parolin
  with an honourable mention for his outstanding contributions to the understanding
  of poverty, inequality and social mobility. The Henrik Enderlein Prize was presented
  today in a joint ceremony hosted by the German Federal Foreign Office, in cooperation
  with the Hertie School, Sciences Po, and the French Ministry for Europe and Foreign
  Affairs. The award commemorates the late President of the Hertie School, Henrik
  Enderlein , a passionate advocate of European integration. “Olivier Schmitt is an
  incredibly prolific scholar whose commitment to bringing research into public debate
  on European security clearly embodies Henrik Enderlein’s ideals. We are especially
  pleased to present him as the laureate of this year’s Henrik Enderlein Prize,” said
  Cornelia Woll , Professor of International Political Economy at the Hertie School
  and Chair of the Henrik Enderlein Prize Jury. "In memory of Henrik Enderlein’s European
  commitment, the Henrik Enderlein Prize reflects the values of Franco-German cooperation
  in the service of a strong, resilient, and capable European Union. In times of great
  challenges, the commitment to our European and democratic values is more needed
  than ever. We honour Olivier Schmitt as a dedicated European whose research addresses
  the current challenges of our time and provides excellent impetus for a forward-looking
  and active European Union in times of geopolitical upheaval. It is our common duty
  to advance the security, freedom and prosperity of our continent." “In honouring
  the work of scholars such as Olivier Schmitt, the Henrik Enderlein Prize is an expression
  of France’s and Germany’s shared commitment to intellectual excellence, democratic
  dialogue and the strengthening of a more united and resilient Europe. At a time
  of profound uncertainty, research and critical thinking on security, defence and
  international cooperation are more essential than ever to renew and deepen the European
  public debate.” “I am particularly delighted that the Henrik Enderlein Prize has
  been awarded to a researcher whose work is considered the gold standard on the contemporary
  transformations of warfare – a highly topical subject, if ever there was one, and
  one that lies at the heart of the security challenges that Europe faces since the
  return of war to the continent. By helping us to better understand how alliances
  are formed, how norms shape strategic behaviour, and how democracies conceive and
  organise their defence, Olivier Schmitt equips us with the intellectual tools essential
  for responding with clarity to a world in which military power has regained its
  central role.” Olivier Schmitt is Professor and Head of Research at the Institute
  for Military Operations at the Royal Danish Defence College. His work examines how
  states produce, sustain, and transform military power, with a particular focus on
  military adaptation, alliance politics, European security, and the security challenges
  posed by Russia. Combining theoretical innovation with extensive empirical research
  and direct engagement with policymakers, his scholarship has contributed significantly
  to debates on NATO, European defence, coalition warfare, and contemporary security
  threats. Zachary Parolin is Professor of Social Policy, Inequality, and Opportunity
  at the University of Oxford, where he also directs the Economics, Inequality, and
  Opportunity Programme at INET Oxford and is Professorial Fellow at Nuffield College.
  His research combines innovative data infrastructures with policy-relevant analysis,
  shaping debates on poverty measurement, intergenerational mobility, labour market
  inequality, and welfare state reform across Europe and the United States. His work
  has informed the European Commission’s Anti-Poverty Strategy and Minimum Wage Directive,
  as well as major policy discussions in the United States, including the expansion
  of child benefits. The Henrik Enderlein Prize is worth €10,000 and is awarded to
  young social science researchers aged 40 or younger. The prize-winners'' work demonstrates
  scientific excellence and makes a concrete contribution to public debates on the
  future of Europe. The Henrik Enderlein Prize is named in honour of the former president
  of the Hertie School and alumnus of Sciences Po, who was a fervent defender of Europe.
  The prize is awarded jointly by the French Ministry for Europe and Foreign Affairs,
  the German Federal Foreign Office, and coordinated by the Hertie School in Berlin
  and Sciences Po in Paris. The members of the jury are: the Chair of the Jury, Professor
  of International Political Economy Cornelia Woll; Johanna Mair , Professor of Organisation,
  Strategy and Leadership at the Hertie School and Director of the Florence School
  of Transnational Governance (STG) at the European University Institute; Professor
  Thurid Hustedt , Professor of Public Administration and Management and Dean of Graduate
  Programmes at the Hertie School; Thierry Mayer, Professor of Economics at Sciences
  Po; Jakob Vogel, Professor of History at Sciences Po; Paul-André Rosental, Scientific
  Director at Sciences Po; Caroline Soder, Deputy Commissioner for Franco-German Cooperation
  at the French Ministry of Foreign Affairs; Quentin Jalla, Deputy Commissioner for
  Franco-German Cooperation at the German Federal Ministry of Foreign Affairs; Anja
  Wehler-Schöck, Member of the Editorial Board at Tagesspiegel ; and Elsa Conesa,
  German correspondent at Le Monde.'
