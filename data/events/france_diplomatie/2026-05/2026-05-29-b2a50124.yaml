title: Saudi Arabia – The minister’s meeting with his highness Faisal Bin Farhan Al…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting with
  His Highness Prince Faisal bin Farhan Al Saud, Minister of Foreign Affairs of the
  Kingdom of Saudi Arabia, during the latter’s participation in the meeting of European
  Union foreign ministers in Cyprus today, 28 May. At the meeting, the ministers reviewed
  the regional situation. The Minister reiterated France’s unwavering commitment to
  the security of its Gulf partners and the need to achieve a lasting political solution
  to the Iran crisis, which is having serious consequences for the Gulf countries
  and the global economy. In this regard, he emphasized France’s support for the negotiations
  under way. The Minister spoke about the efforts being made by France to enable,
  once conditions allow, the deployment of a strictly defensive mission to facilitate
  the resumption of maritime traffic in the Strait of Hormuz. The two ministers also
  stressed the need for the ceasefire between Israel and Lebanon that came into force
  on 17 April to be fully observed, in order to enable a definitive political solution
  to the conflict through negotiation. Finally, they welcomed the depth of the relations
  between France and Saudi Arabia, in all areas of their bilateral cooperation.
