title: Cambodia – Partial pardon granted to human rights defender Kem Sokha
text: France welcomes the partial pardon granted to human rights defender and opposition
  figure Kem Sokha, removing the remaining 27 years of his prison sentence. France
  reiterates its commitment to the rule of law and democratic pluralism in Cambodia
  and around the world.
