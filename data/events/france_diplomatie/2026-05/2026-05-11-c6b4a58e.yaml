title: Kenya –  Conversation between Jean-Noël Barrot and his Kenyan counterpart,…
text: 'Minister for Europe and Foreign Affairs Jean-Noël Barrot spoke by telephone
  yesterday with Musalia Mudavadi, Kenya’s Prime Cabinet Secretary and Cabinet Secretary
  for Foreign and Diaspora Affairs. Their conversation took place just a few days
  before the Africa Forward  Summit, which will be held in Nairobi on May 11 and 12.
  “Africa Forward: Africa-France Partnerships for Innovation and Growth,” co-hosted
  by France and Kenya, will bring together more than 30 heads of State and some 4,000
  participants from multilateral institutions, the private sector, academia and civil
  society. It will be an opportunity to illustrate the commitment made by France,
  Kenya and other African countries to step up crossed investments and to create and
  fund concrete solutions to shared challenges, such as strengthening healthcare systems,
  food sovereignty, digital competitiveness, and access to energy and connectivity.
  This summit will once again illustrate our support for a fairer, more representative
  and more effective type of multilateralism, in which Africa is fully represented.
  To that end, during their conversation, the Ministers agreed on the need to reform
  the Security Council and ensure that it is fully capable of taking action – topics
  that will be central to the Peace and Security segment of the Africa Forward Summit.'
