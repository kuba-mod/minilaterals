title: Canada – Conversation between Jean-Noël Barrot and his Canadian counterpart
text: Minister for Europe and Foreign Affairs Jean-Noël Barrot met with Canadian Foreign
  Minister Anita Anand on the sidelines of the NATO Foreign Ministers Meeting in Helsingborg.
  The Minister noted the joint presence of French and Canadian armed forces on NATO’s
  eastern flank and hailed the French Army’s recent participation in Operation NANOOK-NUNALIVIT
  2026 alongside the Canadian Armed Forces. The Minister expressed France’s wish to
  expand cooperation with Canada on defense and security. He also invited his Canadian
  counterpart to take part in the conference bringing together Israeli and Palestinian
  civil society in Paris on June 12.
