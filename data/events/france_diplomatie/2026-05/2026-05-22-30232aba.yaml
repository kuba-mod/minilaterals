title: Ukraine – Conversation between Jean-Noël Barrot and his Ukrainian counterpart
text: Minister for Europe and Foreign Affairs Jean-Noël Barrot met today with his
  Ukrainian counterpart, Andrii Sybiha, on the sidelines of the NATO Foreign Ministers
  Meeting in Helsingborg. They discussed the situation on the ground, where Russia
  is facing heroic resistance from the Ukrainian people. The Minister once again applauded
  Ukrainian resilience after a particularly harsh winter, and condemned the ongoing
  Russian airstrikes targeting energy infrastructure and residential buildings, resulting
  in numerous civilian casualties. In this regard, the Ministers spoke about the ways
  to maintain and step up pressure on Russia. The Minister also stressed the importance,
  for France, of the fight against impunity; the EU’s adoption, on May 11, of a sanctions
  package against several Russian individuals and entities involved in the deportation
  and forcible transfer of Ukrainian children; and the May 15th launch, in Chisinau,
  of the Management Committee of the Special Tribunal for the Crime of Aggression
  against Ukraine – all measures that France supported. During their conversation,
  the Minister also reiterated France’s support for Ukraine in the membership process
  for joining the EU and emphasized the importance of  continuing its reform efforts
  in this regard. Lastly, the Minister emphasized France’s determination to stand
  with Ukraine in the long term and to continue its efforts, alongside all of its
  partners, until a just and lasting peace is achieved.
