title: Joint statement by 41 Members  of the Inter-Regional Task Force on the…
text: We are deeply concerned about a recent series of backward steps going against
  the global movement towards universal abolition of the death penalty, as outlined
  in the Global Report on Death Sentences and Executions 2025 recently released by
  Amnesty International. This includes a sharp increase in executions in the world,
  primarily due to a significant rise in executions in a small number of retentionist
  States. Other United Nations Member States have resumed the use of the death penalty
  after periods of suspension or have taken steps to reintroduce it into national
  legislation or to expand the types of offences for which the death penalty can be
  imposed, sometimes creating a framework susceptible to group-based discrimination.
  These setbacks serve as a stark reminder of the continued relevance and urgency
  of the fight for the universal abolition of the death penalty. The death penalty
  is inhumane and degrading, contrary to human dignity, without any deterring effect.
  We deplore the fact that the use of the death penalty leads to violations of the
  human rights of the persons facing the death penalty and of other affected persons,
  including violations of the right to life and to the prohibition of torture enshrined
  in international instruments including the Universal Declaration of Human Rights
  and the International Covenant on Civil and Political Rights . This is why we oppose
  the death penalty, in all cases and in all circumstances. Its rejection is a fundamental
  principle that unites us. We call for the universal abolition of the death penalty
  and commend the efforts undertaken worldwide towards this objective. The number
  of countries resorting to the death penalty continues to decline, with more than
  two thirds of United Nations Member States having abolished it in law or in practice.
  We urge all United Nations Member States to support the upcoming General Assembly
  resolution on the moratorium on the use of the death penalty, presented on behalf
  of the Inter-Regional Task Force, as well as the Human Rights Council’s biennial
  resolution on the abolition of the death penalty. We reiterate our full support
  for the work of the United Nations, the relevant treaty bodies and special procedure
  mandate holders, as well as Civil Society Organisations working towards these goals.
  We look forward to the 9th World Congress against the Death Penalty, to be held
  in Paris from 30 June to 2 July 2026. This Congress represents an opportunity to
  reaffirm our commitment towards universal abolition . The abolition of the death
  penalty is a universal fight for human dignity. We call upon all United Nations
  Member States to join us in achieving it. [1] Albania, Austria, Australia, Belgium,
  Bulgaria, Brazil, Chile, Costa Rica, Croatia, Cyprus, Czechia, Denmark, Estonia,
  Finland, France, Germany, Greece, Hungary, Ireland, Italy, Latvia, Lithuania, Luxembourg,
  Malta, Mexico, Mongolia, Montenegro, Netherlands, New Zealand, Norway, Poland, Portugal,
  Republic of Moldova, Romania, Slovakia, Slovenia, Spain, Sweden, Switzerland, United
  Kingdom, as well as the European Union.
