title: Iran - Deterioration in Ms Narges Mohammadi's State of health
text: France is deeply concerned by reports of an unprecedented deterioration in the
  health of Ms Narges Mohammadi, Nobel Peace Prize laureate, who is in prison in Iran
  because of her tireless defence of Iranians’ fundamental rights. France urges the
  Iranian authorities, which bear overwhelming responsibility for this situation,
  to take every measure necessary for her recovery, and strongly reiterates its call
  for her release and that of all people held arbitrarily in Iran. France stands by
  the Iranian people, who must be able to exercise their fundamental rights and freely
  choose their destiny.
