title: Naoufel Gaied is appointed Executive Secretary of the International Institute…
text: France welcomes the appointment on Tuesday 5 May 2026 of the French candidate,
  M. Naoufel Gaied, as Executive Secretary of the International Institute for Justice
  and the Rule of Law (IIJ). M. Gaied’s appointment fully reflects France’s historic,
  steadfast commitment to supporting the Institute since its creation, and demonstrates
  its recognition of the essential role played by the IIJ in strengthening the judicial
  capacities of States most vulnerable to terrorism, particularly in Africa and the
  Middle East. France supports a holistic approach to counter-terrorism, including
  in particular capacity-building for States and the development of a criminal justice
  system rooted in the rule of law and respect for human rights, which are an integral
  part of preventing violent extremism.
