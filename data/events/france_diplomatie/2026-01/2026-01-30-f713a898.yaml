title: Agreement between Damascus and Syrian Kurdish forces
text: France welcomes the signing of an agreement by the Syrian transitional government
  and the Syrian Democratic Forces (SDF). France actively facilitated the talks between
  all the parties. The signing of this agreement should definitively end the clashes
  seen in recent weeks and restart a peaceful transition to a united, pluralistic
  Syria. France is doing everything it can to help bring this about. It calls on the
  parties to fully implement this agreement, following the agreed-upon phases, and
  particularly the complete respect of the ceasefire.
