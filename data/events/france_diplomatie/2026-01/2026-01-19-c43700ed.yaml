title: Syria – Ceasefire agreement of 18 January 2026
text: 'France is true to its allies and its positions. It resolutely supports Syria’s
  unity and integrity. It is true to those with whom it has fought Daesh. We welcome
  the ceasefire agreement concluded on 18 January between President al-Sharaa and
  General Mazloum. We call on all the parties to observe it. The ceasefire must make
  it possible to move towards an important moment for the unity of the new Syria:
  the Syrian Democratic Forces’ integration into it. France has been and remains fully
  committed to supporting this process and thus working for a successful transition
  to a united, stable Syria that is richly diverse in all its constituent parts.'
