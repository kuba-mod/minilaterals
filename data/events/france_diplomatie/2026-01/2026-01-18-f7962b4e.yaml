title: Israel/Palestine – Delivery of humanitarian cargo to Gaza
text: Given the immense humanitarian needs in Gaza, France has decided to dispatch
  nearly 400 tonnes of food aid. These Nutriset nutritional supplements will improve
  the health of over 42,000 malnourished Gazan children between the ages of 6 months
  and 2 years. This in-kind-aid operation initiated by the Ministry for Europe and
  Foreign Affairs is remarkable in its scale as much as the State/company/UN partnership
  that made it possible. We thank the stakeholders for their essential cooperation,
  along with the World Food Programme (WFP), which will take on distribution in Gaza.
  This operation is part of the steadfast humanitarian commitment France has made
  since 7 October 2023, reflected in the delivery of over 1,300 tonnes of humanitarian
  cargo for civilians, through the United Nations, NGO partners and in-kind contributions.
  France reiterates that it is a matter of urgency for Israel to remove all obstacles
  so that the United Nations and NGOs can go on delivering humanitarian aid independently
  and impartially throughout the Gaza Strip, in accordance with international humanitarian
  law and United Nations Security Council Resolution 2803.
