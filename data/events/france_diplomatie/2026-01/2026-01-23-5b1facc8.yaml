title: Conversation between Jean-Noël Barrot and his Saudi counterpart, His Highness…
text: The Minister for Europe and Foreign Affairs spoke with his Saudi counterpart,
  His Highness Prince Faisal bin Farhan Al Saud, on the sidelines of the World Economic
  Forum in Davos on January 21 Both men emphasized the need to work toward stability
  in the Middle East, particularly in light of recent changes to the regional context
  in Syria, Iran, Palestine and Yemen. With regard to Syria, the two Ministers stressed
  their commitment to the country’s stability and security. They hailed the ceasefire
  agreement signed on January 18 by President al-Sharaa and General Mazloum, and expressed
  their desire to contribute to Syria’s recovery and economic development. They also
  reiterated the need to help strengthen the Lebanese army and the state monopoly
  on arms nationwide, and agreed to continue their consultations ahead of the international
  conference in support of the Lebanese Armed Forces, which will take place in Paris
  on March 5. The Minister welcomed the announcement that the Gaza Peace Plan was
  moving to phase 2. The two Ministers also discussed the announced formation of the
  Board of Peace (BoP), aimed at resolving conflicts beyond Gaza. In this regard,
  the Minister reiterated the importance of fully implementing UNSC Resolution 2803,
  and particularly the delivery of humanitarian aid – vital to the people of Gaza
  – in cooperation with the UN. Both Ministers also reiterated the need for reforms
  within the Palestinian Authority, in line with the New York Declaration. The two
  Ministers emphasized the excellence of French-Saudi bilateral relations in every
  field and their shared desire to continue deepening the ties between our two countries
  in every area.
