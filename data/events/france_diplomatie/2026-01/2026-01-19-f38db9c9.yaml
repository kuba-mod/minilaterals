title: Azerbaijan – Handover to Armenia of four Armenian prisoners from Nagorno…
text: France welcomes the Azerbaijani authorities’ handover to Armenia of four Armenian
  prisoners from Nagorno-Karabakh. The implementation of the transfer, which took
  place on 14 January 2026, is a tangible consequence of the momentum generated by
  the Washington summit of 8 August 2025 with a view to normalizing relations between
  Armenia and Azerbaijan. The signing and ratification of the peace treaty will make
  it possible to complete the process. France will continue to follow the trials of
  Armenians from Nagorno-Karabakh closely, pay particular attention to the treatment
  of the accused and call for the release of all persons detained arbitrarily in Azerbaijan.
