title: Spain – Train crash
text: France expresses its profound sadness following the train crash that occurred
  in Andalusia, southern Spain, on Sunday 18 January 2026. France extends its sincere
  condolences to the victims’ families and close friends and voices its wholehearted
  solidarity with the Spanish authorities and people in this ordeal.
