title: Conversation between Jean-Noël Barrot and the Prime Minister of the Kurdistan…
text: Minister for Europe and Foreign Affairs Jean-Noël Barrot spoke with Masrour
  Barzani, the Prime Minister of the Kurdistan Regional Government in Iraq, on the
  sidelines of the World Economic Forum in Davos on January 22. They discussed several
  regional issues, including the situation in Syria. They called on all the parties
  to de-escalate immediately, to protect all civilians, and to implement a global
  ceasefire that allows for the integration of the Syrian Democratic Forces (SDF)
  and provides guarantees to Kurds in Syria. They reaffirmed the priority importance
  of the fight against Daesh. The Minister for Europe and Foreign Affairs and the
  Prime Minister of the Kurdistan Regional Government also discussed the political
  situation in Iraq following the legislative elections held on November 11, 2025.
  During their conversation Minister Barrot applauded the high quality of the special
  ties between France and the autonomous region of Iraqi Kurdistan.
