title: Syria – Jean-Noël Barrot’s meeting with his Syrian counterpart, Asaad al…
text: Minister Jean-Noël Barrot hosted a meeting in Paris today with his Syrian counterpart,
  Asaad al-Shaibani. The meeting provided an opportunity to discuss deepening our
  bilateral relationship to support the stabilization of the new Syria, building on
  the Minister’s visit to Damascus in January 2025 and President Al-Sharaa’s visit
  to Paris in April 2025. The Minister welcomed Syria’s decision to join the international
  coalition against Daesh. In this regard, he welcomed the operation against Daesh
  conducted jointly with the United Kingdom, in coordination with the Syrian transitional
  authorities, on 3 January 2026. The Minister expressed France’s wholehearted support
  for the Syrian transitional authorities’ efforts to shed full light on the atrocities
  targeting civilians which occurred on the coast and in Sweida in March and July
  2025. He voiced his support for a transition carried out with respect for all components
  of Syrian society. The Minister also emphasized France’s wish to contribute to Syria’s
  economic recovery and development. He welcomed the lifting of US sanctions through
  the repeal of the Caesar Act, and signalled France’s willingness to support the
  return of French companies to Syria. Finally, the two ministers stressed the importance
  of working to restore a stabilized, unified and sovereign Syria. In this regard,
  they spoke of the need to achieve security arrangements with Israel in southern
  Syria. They also discussed progress in the negotiations between the transitional
  authorities and the Syrian Democratic Forces, with a view to fully implementing
  the agreement of 10 March 2025.
