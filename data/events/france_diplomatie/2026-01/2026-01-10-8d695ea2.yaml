title: Syria – Clashes in Aleppo
text: France deplores the renewed clashes in the Sheikh Maqsoud neighbourhood of Aleppo.
  It calls on the parties to return immediately to the ceasefire, facilitate access
  to humanitarian aid and protect the population. France supports the proposals aimed
  at ensuring the protection of all civilians in Aleppo, as the Syrian Government
  has pledged to do, and at enabling the combatants to withdraw with dignity. It will
  continue to work actively with its partners, first and foremost the United States,
  to secure a return to security and stability in Aleppo, in the framework of a united,
  sovereign and plural Syria.
