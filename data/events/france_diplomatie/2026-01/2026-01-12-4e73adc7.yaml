title: United States – Conversation between Jean-Noël Barrot and Secretary of State…
text: Minister for Europe and Foreign Affairs Jean-Noël Barrot spoke by phone with
  U.S. Secretary of State Marco Rubio on January 11. The ministers discussed several
  international issues, particularly the situations in Iran, Venezuela and Ukraine.
  With regard to Ukraine, the Minister emphasized the momentum within the Coalition
  of the Willing, which met last week in Paris to work on the security guarantees
  that are necessary to a just and lasting peace. The Minister brought up the subject
  of Greenland, stressing France’s commitment to the sovereignty and territorial integrity
  of Denmark, a NATO member. The two ministers agreed to continue their close dialogue
  on all of these topics.
