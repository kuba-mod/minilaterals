title: Switzerland – Fire in Crans-Montana
text: France extends its condolences to the families and close friends of the victims
  of the fire in Crans-Montana on 1 January. It expresses its full solidarity and
  its support to the Swiss people and authorities. Two French people are among those
  injured. They were immediately taken care of by the emergency services. The Ministry
  for Europe and Foreign Affairs ’ consular teams are in constant contact with the
  Swiss authorities in case other French nationals are affected.
