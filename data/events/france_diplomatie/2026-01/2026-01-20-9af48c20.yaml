title: Joint Communiqué from the Minister for Europe and Foreign Affairs of the…
text: Mr. Jean-Noël Barrot, Minister for Europe and Foreign Affairs of the French
  Republic, and Ms. Christine Razanamahasoa, Minister of Foreign Affairs of the Refoundation
  of the Republic of Madagascar, met in Paris on January 19, 2026. The two Ministers
  reaffirmed their commitment to the friendly, intense, high-quality bilateral relationship
  between France and Madagascar, forged in history and focused on the future. They
  also praised the vitality and unique nature of the personal ties between the two
  countries, marked by the presence of tens of thousands of Madagascar nationals in
  France, and tens of thousands of French nationals in Madagascar. In a troubled international
  context, they underscored the need to preserve and intensify these relations. To
  this effect, and directly in line with the telephone conversation between French
  President Emmanual Macron and President of Madagascar Michael Randrianirina, the
  two ministers agreed to lay the groundwork for the adoption of a renewed partnership
  agreement consistent with the Refoundation’s priorities. France remains committed
  to meeting the urgent needs of Madagascar and its people, especially young people,
  who have expressed the wish for a better, more just and more dignified life. Several
  projects were agreed upon in December 2025 in the areas of health, food security,
  urban planning and energy. They are already being implemented. The new phase of
  the French Development Agency (AFD)’s project in support of Madagascar’s justice
  system (PAJMA II) is now underway. The Ministry for Europe and Foreign Affairs mobilized
  the French Red Cross to help respond to the monkeypox (mpox) outbreak on the Big
  Island. The two ministers discussed other projects for 2026, such as strengthening
  cooperation between universities by improving living conditions for students, and
  developing digital excellence networks, with the goal being a quick start to these
  initiatives in order to directly benefit the population. France hails the initial
  advances in the refoundation process and the Refoundation Government’s expressed
  desire to restore trust in institutions, ensure that the State once again serves
  the common good and responds to the legitimate aspirations expressed by Malagasy
  society. In this regard, it reaffirms its full support for continuing the process
  with a view to holding free and transparent elections according to the established
  timetable. Energy and the distribution of drinking water were also discussed. In
  order to move forward in defining a renewed partnership, the two ministers agreed
  to work together on the upcoming organization of high-level visits in France and
  Madagascar. For the Government of the French Republic Mr. Jean-Noël Barrot Minister
  for Europe and Foreign Affairs For the Republic of Madagascar Madam Christine Razanamahasoa
