title: Ukraine – Massive airstrikes on Ukraine
text: France condemns in the strongest possible terms last night’s Russian airstrikes
  against Kyiv and eastern Ukraine, which killed several civilians, including children.
  This latest massive Russian bombardment of the population and civilian infrastructure
  once again demonstrates Moscow’s total contempt for peace efforts. Despite Ukraine’s
  repeated proposals for a lasting ceasefire, the Kremlin persists in stalling in
  order to prolong its war of aggression. These cynical strikes once again violate
  international humanitarian law. France will continue to support Ukrainian and international
  courts to ensure that these crimes do not go unpunished. On this day of mourning,
  France assures Kyiv of its deep solidarity with the Ukrainian people, offers its
  condolences to the victims’ families and offers those injured a speedy recovery.
  These latest attacks only strengthen our determination to further step up pressure
  on Russia to end its war of aggression and engage in good-faith negotiations. Together
  with our partners, and both bilaterally and on the European level, we will continue
  to offer Ukraine all the support it needs to bring about a just and lasting peace
  that guarantees its security and that of Europe.
