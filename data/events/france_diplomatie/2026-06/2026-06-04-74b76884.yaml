title: Lebanon – Announcement of the implementation of a ceasefire between Israel
  and…
text: France hails the June 3rd announcement of a ceasefire agreement between Lebanon
  and Israel, as well as the key role played by the United States in reaching this
  agreement, which follows the ceasefire agreement signed on April 16. It was concluded
  by legitimate representatives of the Lebanese and Israeli governments through discussions
  begun in Washington this past April. France now calls on all the parties to the
  conflict to implement the terms of the agreement as quickly as possible. Hezbollah
  must end its operations, withdraw from the South Litani Sector and make way for
  the Lebanese Armed Forces, the only forces that can legitimately ensure the Lebanese
  State’s sovereignty over all of its territory. The Israeli army must end its operations
  and begin its withdrawal from Lebanese territory. France reiterates its support
  for discussions between the Lebanese and Israeli authorities aimed at reaching a
  comprehensive political agreement, the only thing that can lead to a just and lasting
  settlement of the conflict that respects both Lebanon’s sovereignty and territorial
  integrity and Israel’s security. We reaffirm our willingness to contribute to the
  implementation of political and security arrangements in close consultation with
  the parties and our European and regional partners.
