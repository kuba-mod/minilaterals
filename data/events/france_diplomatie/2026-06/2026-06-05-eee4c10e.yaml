title: Lebanon - Death of a blue helmet
text: France was deeply saddened to learn of the death today, 4 June 2026, of a Serbian
  Blue Helmet, as he carried out his mission within the UN Interim Force in Lebanon
  (UNIFIL). France expresses its sincerest condolences to Serbia, the soldier’s family,
  his close friends and all UNIFIL personnel. It also wishes the Force’s two other
  soldiers injured in the attack a speedy recovery. Since the start of hostilities
  on 2 March, seven UNIFIL Blue Helmets have died in southern Lebanon while in the
  service of peace. France calls for full light to be shed on these incidents and
  asks for the perpetrators to be arrested and brought to justice. France once again
  calls on all the parties to comply with UN Security Council Resolution 1701 and
  refrain, in all circumstances, from endangering the safety of UN personnel, in accordance
  with international law and the Convention on the Safety of United Nations and Associated
  Personnel. It calls on all actors in the conflict to adhere to the terms of the
  ceasefire agreement concluded in Washington on 3 June between legitimate representatives
  of the Lebanese and Israeli governments. UNIFIL must be able fully to implement
  its mandate; this is all the more essential following the conclusion of a temporary
  ceasefire between Israel and Lebanon
