title: The Minister's meeting with Cardinal Pizzaballa, Latin Patriarch of Jerusalem
text: Ahead of the 12 June conference bringing together Israeli and Palestinian civil
  society for a two-state solution, the Minister for Europe and Foreign Affairs hosted
  a meeting today, Tuesday 9 June, with Cardinal Pierbattista Pizzaballa, Latin Patriarch
  of Jerusalem. The Minister reaffirmed France’s steadfast commitment to the Christian
  presence in the Holy Land and, more broadly, to religious pluralism in the Middle
  East and freedom of worship. He utterly condemned the increase in violence, acts
  of intimidation and attacks targeting Christians, their places of worship and their
  institutions in Jerusalem, Palestine and Israel.  He recalled France’s historical
  role in protecting several Christian communities in the Holy Land, as enshrined
  in the Mytilene and Constantinople agreements. The Minister also emphasized the
  need to protect the historical status quo at Jerusalem’s holy sites. France will
  continue to call for compliance with this framework, which is essential for the
  stability of Jerusalem and the region. The Minister and the Patriarch discussed
  the tragic humanitarian situation in Gaza and reviewed, among other things, the
  situation of Gaza’s Christian community. The Minister reiterated France’s humanitarian
  support, including through the Latin Patriarchate. He recalled the absolute urgency
  of achieving an actual ceasefire, facilitating humanitarian access and getting Gaza
  back on its feet, and implementing Resolution 2803. Finally, the Minister reaffirmed
  that only a political solution based on two States, Israel and Palestine, living
  side by side in peace and security can provide a long-term solution to the two peoples’
  legitimate aspirations. France will go on working with its partners to maintain
  the prospect of this solution, which is more threatened than ever today, and support
  all initiatives contributing to peace, dialogue and co-existence.
