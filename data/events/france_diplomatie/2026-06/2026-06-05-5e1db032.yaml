title: Italy – Jean-Noël Barrot’s participation in the third France-Italy Cross-Border…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, visited Bard in
  the Aosta Valley on Thursday 4 June 2026 to co-chair the third France-Italy Cross-Border
  Cooperation Committee alongside his counterpart Mr Antonio Tajani, with members
  of parliament and numerous French and Italian elected representatives taking part.
  The committee, a forum created by the Quirinal Treaty signed in November 2021, reflects
  the excellent coordination between France and Italy on the ground and the two countries’
  ongoing commitment to making progress together on issues shared by many French and
  Italian people living in the border area in terms of rail and road links and educational,
  linguistic and cultural cooperation. The ministers also made sure to discuss environmental
  and health issues, as well as concerted water management. During their meeting on
  the sidelines of the Cross-border Cooperation Committee, the ministers celebrated
  the excellent momentum in Franco-Italian relations, in every sphere. Among other
  things, they discussed France and Italy’s continued support for Ukraine and the
  situation in the Middle East, where the two countries are working jointly for de-escalation
  across the region and a return to peace. The ministers finally reiterated their
  joint commitment to the stability of the Western Balkans and their future in Europe.
