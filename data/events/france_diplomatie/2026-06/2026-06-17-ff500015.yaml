title: G7 leaders' call on the fight against cancer
text: 'We, the Leaders of the G7, reaffirm our commitment to accelerate the fight
  against cancer. Partner countries of the G7, Brazil, Egypt, India, Kenya and the
  Republic of Korea, also support this call on the fight against cancer. Cancer kills
  nearly 10 million people each year worldwide and new cases are projected to increase
  by 80 per cent globally by 2050, given the aging of the population and its interactions
  with environmental and behavioural risk factors, placing an ever-greater burden
  on societies, health systems and economies. Improvements in access to cancer prevention
  – including through screening, diagnosis and care – can and should be made. While
  major scientific advances have been achieved in several critical areas, progress
  should be accelerated by alignment of research efforts and faster translation of
  innovation into care. In this regard, we welcome that such advances have brought
  the elimination of cervical cancer within reach and we will accelerate our efforts
  to that end. We are determined to deepen international scientific cooperation, close
  persistent gaps in prevention and early detection, and ensure that progress in oncology
  reaches every patient. While acknowledging our existing financing efforts and the
  shared global responsibility, where we have taken a leadership role, we commit to
  strengthening our endeavours to advance cancer research and development. We commend
  the scientific advances made through international, regional and national initiatives.
  We have made concrete progress on aligning our cancer research programmes, strengthening
  collaboration between leading cancer institutes and advancing interoperable data
  standards for paediatric and adolescent cancers. We recognize that no single country
  possesses sufficient data to generate robust evidence across the full range of paediatric,
  adolescent and young adult tumour types. Building on existing international, regional
  and national initiatives – in accordance with our legislation, priorities, capacities
  and resources, and in compliance with applicable rules on privacy, data protection
  and intellectual property rights – we intend to work towards: We recognize that
  mortality from cancers with poor prognosis is one of the foremost global scientific
  challenges. Building on existing international, regional and national initiatives,
  we intend to work towards: We recognize that access to quality cancer care for all
  remains a pressing challenge. We intend to work towards: We will remain engaged
  and review progress on these commitments. This call for action reflects the outcome
  of the discussion between G7 members, benefiting from productive exchanges of views
  with partner countries.'
