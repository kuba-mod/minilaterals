title: Middle East – Iran resumes drone and missile attacks on its neighbors
text: France condemns in the strongest possible terms the Iranian drone and missile
  attacks that took place on June 3, targeting Kuwait International Airport and several
  towns in Bahrain. France expresses its full solidarity with the people and authorities
  of Kuwait and Bahrain. It reaffirms its unwavering commitment to the security, sovereignty
  and territorial integrity of all its partners in the Middle East, and its willingness
  to contribute to their defense if necessary. France calls on all the parties to
  strictly abide by the current ceasefire and to refrain from any actions that would
  be liable to spark a new military escalation, whose consequences would be disastrous
  for the region and the world. It remains actively engaged in the search for a diplomatic
  solution, the only thing capable of re-establishing a lasting peace.
