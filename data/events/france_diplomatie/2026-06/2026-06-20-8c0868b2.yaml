title: United Nations – World Refugee Day
text: On World Refugee Day, 20 June, France reaffirms its solidarity with those forced
  to flee their country to escape conflict and persecution. Through its humanitarian
  action worldwide, France is helping to provide assistance and protection to them
  and to the host States and communities taking them in. France reiterates its support
  to the Office of the United Nations High Commissioner for Refugees (UNHCR) in implementing
  its mandate to protect and defend refugees’ rights. It backs the reforms initiated
  aimed at increasing the effectiveness of the humanitarian response to crises and
  conflicts and providing lasting solutions for refugee and displaced populations,
  so that they may live with dignity and return to their countries as soon as the
  conditions exist. The strategic partnership between France and the UNHCR is marked
  this year by the 75 th anniversary celebrations of the 1951 Geneva Convention relating
  to the Status of Refugees. France supports the UNHCR’s essential action on the ground,
  in Sudan and the neighbouring countries, the Great Lakes region, Syria, Lebanon
  and Ukraine, as well as in supporting Afghan refugee women.
