title: Election of Dr. Khalilur Rahman as President of the 81st Session of the UN…
text: France congratulates Bangladeshi Foreign Minister Khalilur Rahman on his June
  2nd election as President of the 81st Session of the United Nations General Assembly,
  which will begin on September 8. France will be delighted to work with Dr. Rahman
  on all the issues addressed by the UN General Assembly in order to promote effective,
  action-oriented multilateralism. We share his desire to facilitate dialogue between
  Member States and show that the UN is capable of reforming itself and achieving
  concrete results. On this occasion, France reaffirms its commitment to the purposes
  and principles of the UN Charter.
