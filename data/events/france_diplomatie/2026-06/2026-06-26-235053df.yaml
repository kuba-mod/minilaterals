title: Burkina's unilateral decision to break off diplomatic relationse with France
text: The French authorities note Burkina Faso’s unilateral decision to break off
  diplomatic relations with France. France regrets this hostile and baseless decision,
  which illustrates the worrying drift in the Burkinabe authorities’ behaviour. The
  necessary reciprocal measures are currently being considered. France reiterates
  its solidarity with Burkina Faso’s population and recalls the close ties uniting
  our two peoples. The French authorities are paying special attention to the safety
  of the State personnel who are in the country and of the French community living
  in Burkina Faso. In these special circumstances, they call on French nationals to
  increase their vigilance.
