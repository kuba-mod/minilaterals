title: Hungary – Meeting between Jean-Noël Barrot and Hungarian Deputy Prime Minister…
text: On June 3, Minister for Europe and Foreign Affairs Jean-Noël Barrot hosted Hungarian
  Deputy Prime Minister and Minister of Foreign Affairs Anita Orbán. The Ministers
  expressed their shared desire to give new momentum to French-Hungarian relations
  in the service of a sovereign, democratic, competitive Europe. They discussed strengthening
  bilateral cooperation in strategic areas and addressed the priorities of the European
  agenda, including support for Ukraine and stepped-up pressure on Russia, the Western
  Balkans and the situation in the Middle East.
