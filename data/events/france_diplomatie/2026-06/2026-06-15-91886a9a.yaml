title: Canada – Conversation between Jean-Noël Barrot and his Canadian counterpart,…
text: The French Minister for Europe and Foreign Affairs spoke with Canadian Foreign
  Minister Anita Anand on the sidelines of the Paris Call for the Two-State Solution.
  The Ministers hailed the exceptional partnership between France and Canada, and
  expressed their desire to continue deepening this relationship. They discussed Russia’s
  war of aggression against Ukraine and the situation in the Middle East. The French
  Minister emphasized that only a political solution based on two states, Israel and
  Palestine, is capable of meeting the legitimate aspirations of both peoples over
  the long term. He underscored the particular situation that exists in Lebanon and
  reiterated the need for the parties to fully abide by the June 3 rd ceasefire agreement.
  Lastly, the Ministers talked about stepping up French-Canadian cooperation in the
  areas of security and defense, and agreed to continue working closely together ahead
  of upcoming meetings, such as those within the framework of the G7.
