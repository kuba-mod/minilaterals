title: Argentina – Jean-Noel Barrot’s meeting with Pablo Quirno, Minister of Foreign…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  on Wednesday 3 June with his Argentinian counterpart, Mr Pablo Quirno, Minister
  of Foreign Affairs, International Trade and Worship, who was visiting Paris for
  the OECD’s 18 th International Economic Forum on Latin America and the Caribbean.
  The meeting made it possible to renew France’s support for Argentina to join the
  OECD. It also provided an opportunity for the two ministers to sign a declaration
  of intent aimed at strengthening cooperation in Antarctica and reiterate the two
  countries’ determination to safeguard the integrity of the Antarctic Treaty System.
  The two ministers welcomed the dynamic economic and financial exchanges between
  our two countries – as illustrated by the organization of Argentina Week, to be
  held in Paris in the second half of 2026. Also discussed were the prospects of deepening
  our partnerships in mining, energy, nuclear power and security, to benefit our countries’
  strategic autonomy. Among other things, the Minister highlighted the growing presence
  of French businesses in Argentina, which have invested over €2.6 billion in many
  sectors since 2024. The meeting was also a chance to talk about international and
  regional issues of current concern, as well as global challenges and the common
  fight against anti-Semitism.
