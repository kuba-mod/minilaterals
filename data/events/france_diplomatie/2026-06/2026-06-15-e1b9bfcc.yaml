title: Ukraine – Deadly bombardments of Ukraine and damage to Kyiv’s Dormition…
text: France condemns Russia’s deadly airstrikes on Ukraine, and specifically on the
  cities of Kyiv and Kharkiv. These took place in the early hours of June 15 and left
  an estimated five dead and 29 civilians injured in the capital, including several
  children, and five dead and four injured in Kharkiv. The damage to Kyiv’s Dormition
  Cathedral – a major religious and historic site included on UNESCO’s World Heritage
  list – during the Russian airstrikes is unacceptable. In this regard, France reiterates
  that the destruction of any part of Ukraine’s heritage is a violation of the 1972
  Convention concerning the Protection of the World Cultural and Natural Heritage.
  These unjustifiable strikes demonstrate yet again Russia’s refusal to engage in
  good-faith negotiations and its decision to continue its war of aggression. France,
  which stands with Ukraine and the Ukrainian people, will continue to support Ukraine
  and to work toward a just and lasting peace.
