title: Lebanon - Joint statement on situation between Hezbollah and Israel
text: 'The Honourable Anita Anand, Canada’s Minister of Foreign Affairs; Penny Wong,
  Australia’s Minister for Foreign Affairs; Lars Løkke Rasmussen, Denmark’s Minister
  for Foreign Affairs; Margus Tsahkna, Estonia’s  Minister of Foreign Affairs; Kaja
  Kallas, High Representative of the European Union for Foreign Affairs and Security
  Policy; Elina Valtonen, Finland’s Minister for Foreign Affairs; Jean-Noël Barrot,
  France’s Minister for Europe and Foreign Affairs; Þorgerður Katrín Gunnarsdóttir,
  Iceland’s Minister for Foreign Affairs; Baiba Braže, Latvia’s Minister for Foreign
  Affairs; Kęstutis Budrys, Lithuania’s  Minister of Foreign Affairs; Espen Barth
  Eide, Norway’s Minister of Foreign Affairs; and Maria Malmer Stenergard, Sweden’s
  Minister for Foreign Affairs; today issued the following statement: “We express
  our profound concern over the continued escalation of hostilities in Lebanon and
  welcome ongoing efforts to implement the ceasefire. The people of Lebanon have already
  endured immense hardship. We call on all parties to exercise maximum restraint,
  adhere fully to the ceasefire, refrain from actions that could lead to further escalation
  and ensure the protection of civilians. We support the efforts of the Lebanese government
  to extend its authority throughout the country in line with the United Nations Security
  Council Resolution 1701, including through the strengthening of Lebanese state institutions
  and security forces and the disarmament of Hezbollah. Hezbollah must cease its attacks
  on Israel. All parties must respect international law, including international humanitarian
  law. In this regard, we call on Israel to respect Lebanon’s sovereignty and territorial
  integrity and to stop its military escalation. We further encourage continued engagement
  with ongoing diplomatic efforts, including those led by the United States and international
  partners, aimed at securing a negotiated path toward long-term stability and security
  for both Lebanon and Israel. The people of Lebanon and Israel have the right to
  live in peace, security and dignity, free from the threat of renewed conflict.”'
