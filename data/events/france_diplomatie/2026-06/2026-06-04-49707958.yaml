title: United Nations – Newly elected members of the UN Security Council for the 2027…
text: France congratulates Austria, Kirghizstan, Portugal, Trinidad and Tobago, and
  Zimbabwe on their election to the UN Security Council on June 3. The United Nations
  Charter gives the Security Council the main responsibility for peacekeeping and
  international security. As a permanent member, France will work closely with each
  of these partners, whose two-year term will begin on January 1, 2027, so that the
  Council can fully carry out its mandate. At a time marked by multiple crises and
  the temptations of unilateralism, France reaffirms its commitment to an open form
  of multilateralism based on international law and oriented toward concrete action
  that benefits the people. As a permanent member of the Security Council, we will
  work to ensure that this body – the keystone of our collective security architecture
  – retains its full authority and legitimacy.
