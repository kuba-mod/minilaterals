title: Minister’s meeting with Mr Volker Türk, United Nations High Commissioner for…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  on 29 June 2026 with the United Nations High Commissioner for Human Rights, Mr Volker
  Türk. On the eve of the opening in Paris of the ninth World Congress Against the
  Death Penalty, the Minister reiterated France’s commitment to the promotion and
  protection of human rights worldwide. He reaffirmed his full support for the work
  of the Office of the High Commissioner, both in Geneva and on the ground, to document
  human rights violations, combat impunity and ensure the effective implementation
  of international human rights law. The Minister welcomed the High Commissioner’s
  launch of the Global Alliance for Human Rights. In the face of attacks on multilateralism,
  the international order and the universality of human rights, France will commit
  itself, within this initiative, to promoting concrete actions in support of fundamental
  rights, human dignity and the rule of law.
