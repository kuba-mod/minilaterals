title: G7 leaders' statement on geopolitical issues
text: We, the Leaders of the G7, stand united in our unwavering support for Ukraine
  in defending its freedom, sovereignty, and territorial integrity. We reaffirm our
  solidarity with the Ukrainian population suffering from attacks on their critical
  infrastructure and cultural heritage. We commend Ukraine for its resilience and
  progress on the battlefield in recent months and emphasize there is now a new momentum.
  To support and accelerate this new momentum, we agree to increase the delivery of
  air defence capacities, additional systems and interceptors, and long-range capabilities.
  We are also ready to consider extending to Ukraine the benefit of licenses to allow
  for an increase in Ukraine’s military production. We stress the importance of energy
  resilience, on the basis of the needs and priorities expressed by Ukrainian authorities.
  We agree to provide further support to get the country through next winter. We commit
  to increase the pressure on the Russian war economy. In this context, we will strengthen
  our sanctions, including those on the oil and gas sectors. We consider this the
  right moment to proceed with additional measures, as President Trump has delivered
  a deal that we support in reopening the Strait of Hormuz. We recognize the breakthrough
  and the opportunity that currently exist in the Middle East. We welcome the announcement
  of a deal between the United States and Iran, secured under the strong leadership
  of President Trump, with the support of mediating countries, which provides an historic
  opportunity to prevent Iran from acquiring any nuclear weapon and tackling the threats
  related to its regional and ballistic activities. We support and are ready to contribute
  to its implementation. We reaffirm that the right of transit passage without restrictions
  or tolls is the bedrock of international trade. We agree that the multinational,
  independent, and defensive initiative led by France and the UK can play an important
  role to facilitate the resumption of maritime traffic in the Strait of Hormuz by
  protecting merchant vessels, reassuring commercial shipping operators, and supporting
  verification that all mines are removed. We strongly support a robust and comprehensive
  diplomatic follow-on agreement to the Memorandum of Understanding secured by President
  Trump that can bring peace and security for all in the region. We underline the
  need for the negotiation to this end to address the threats posed by Iran in the
  region and beyond and ensure that they never obtain a nuclear weapon. We agree that
  such a negotiation would benefit from the contributions from relevant regional and
  international partners, including the International Atomic Energy Agency (IAEA).
  We reaffirm that Iran will never obtain a nuclear weapon. In Lebanon, we support,
  through an immediate robust ceasefire, the Lebanese leadership’s efforts to achieve
  the disarmament of Hezbollah and the monopoly of arms, and to protect Lebanon’s
  territorial integrity and sovereignty with the appropriate international security
  guarantees. In Gaza, we will accelerate humanitarian and reconstruction efforts
  and the swift implementation of relevant political and security measures. We call
  for ending violence in the West Bank. We commit to accelerate the diversification
  of energy supply routes in order to reduce global vulnerability to the Strait of
  Hormuz and to increase our energy stocks. We welcome the potential for Canada to
  deliver significant additional capacity to global markets in coming years. We highlight
  the importance of a free and open Indo-Pacific based on the rule of law. We reaffirm
  our opposition to any unilateral attempts to change the status quo, in particular
  by force or coercion, in the East and South China Seas and across the Taiwan Strait,
  which should only be resolved peacefully through dialogue. We express deep concern
  about North Korea’s nuclear and ballistic missile programs and reaffirm our commitment
  to the complete denuclearization of North Korea in accordance with UN Security Council
  resolutions. We urge North Korea to resolve the abductions issue immediately. We
  reiterate the need to jointly address North Korea’s cryptocurrency thefts and cybercrimes.
  We welcome the Global Convergence for Growth Summit convened by President Macron
  on June 11th 2026, with the participation of China. We reaffirm our common interest
  in converging with other large economies on the causes of large and persistent global
  imbalances and on the need to address them. We will continue these efforts within
  the G20 under the United States’ host year and in other relevant fora.
