title: Trinidad and Tobago – Jean-Noël Barrot’s meeting with Mr Sean Sobers, Minister…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  on 2 July with his counterpart from the Republic of Trinidad and Tobago, Mr Sean
  Sobers, Minister of Foreign and CARICOM Affairs, on the sidelines of the Regional
  Security Conference held by France in Martinique on 2 and 3 July. The two ministers
  reaffirmed their joint determination to fight illicit trafficking, particularly
  drug trafficking, which affects the region, and increase security cooperation between
  France and Trinidad and Tobago. They emphasized the importance of a coordinated
  response, based on information sharing, capacity building and regional cooperation.
  The Minister welcomed the fact that Trinidad and Tobago is to join the Martinique
  appeal, paying tribute to Trinidad and Tobago’s driving role, among other things
  as spokesperson for Small Island Developing States committed to multilateralism.
  The two ministers also talked about the prospects of deepening the political partnership
  following Trinidad and Tobago’s election to the United Nations Security Council,
  and their wish to work together, especially on the priorities that Trinidad and
  Tobago intends to promote there and that France shares.
