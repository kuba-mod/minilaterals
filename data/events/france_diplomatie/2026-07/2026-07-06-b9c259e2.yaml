title: Ukraine – Waves of strikes on Kyiv
text: France strongly condemns the new waves of strikes that pelted the Ukrainian
  capital of Kyiv overnight on July 5. By launching another massive attack with hundreds
  of drones and missiles, Russia is once again guilty of violating international humanitarian
  law, causing at least 13 deaths in Ukraine by deliberately targeting residential
  neighborhoods that are home to civilians. On this day of mourning, France reaffirms
  its support of the country and people of Ukraine. France will continue to tirelessly
  support Ukraine until a just and lasting peace is achieved.
