title: Suriname - Jean-Noël Barrot’s meeting with Melvin Bouva, Minister of Foreign…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  on 2 July 2026 with Mr Melvin Bouva, Minister of Foreign Affairs, International
  Business and Cooperation of the Republic of Suriname, on the sidelines of the Regional
  Security Conference held by France in Martinique on 2 and 3 July. The Minister warmly
  congratulated Mr Bouva, who announced [that Suriname is] joining the Franco-Mexican
  initiative to suspend the right of veto at the United Nations Security Council in
  cases of mass atrocities. The two ministers discussed security issues in the Caribbean
  and reaffirmed their shared desire to step up regional cooperation to more effectively
  combat the illicit businesses – particularly drug trafficking and illegal gold mining
  – that affect the region. In this regard, the Minister welcomed Suriname’s commitment
  to supporting the Martinique appeal currently under discussion at the Regional Security
  Conference. The talks also focused on bilateral cooperation, in particular the challenges
  posed by management of the common border between France and Suriname. In this regard,
  the ratification of the border protocol signed in 2021 will represent a major step
  forward and will help increase the effectiveness of cooperation in the fight against
  illicit cross-border activities, in particular illegal gold mining. The two ministers
  agreed to continue close dialogue on the issue, for the benefit of the region’s
  security, stability and sustainable development.
