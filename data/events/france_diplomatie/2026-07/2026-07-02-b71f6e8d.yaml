title: United States – Minister's conversation with Marco Rubio, United States…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke on the telephone
  today to United States Secretary of State Marco Rubio. The Minister and the Secretary
  of State reviewed the implementation of the memorandum of understanding concluded
  between the United States and Iran on 14 June and signed by President Trump in Versailles
  on 17 June. The Minister reiterated the need to achieve a robust and verifiable
  agreement guaranteeing that Iran never acquires nuclear weapons. They welcomed the
  framework agreement reached between Lebanon and Israel and the decisive role played
  by the United States. The Minister reaffirmed France’s willingness to contribute
  to its implementation to enable the full restoration of Lebanese sovereignty, the
  exercise of a monopoly on weapons by the Lebanese State and the Israeli army’s withdrawal
  from Lebanese territory, while guaranteeing the security of both Israel and Lebanon.
  Together they discussed the situation in Ukraine in the wake of the constructive
  talks held at the G7 summit in Evian. Finally, they spoke about preparations for
  the NATO summit in Ankara on 7 and 8 July 2026.
