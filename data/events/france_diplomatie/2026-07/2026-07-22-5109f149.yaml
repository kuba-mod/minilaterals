title: Guyana - Message of condolence ffolowing the sinking of the ship MV Barima
text: France extends its condolences to the people and Government of the [Cooperative]
  Republic of Guyana following the sinking of the ship MV Barima on 18 July. It shares
  the pain of the survivors, the families and their loved ones. In close association
  with the Government and armed forces of Guyana, on 20 July France sent support in
  the form of a 15-strong specialist team of divers and rescue workers from the armed
  forces stationed in French Guiana. France stands in solidarity with its partners
  and neighbours in the Caribbean, West Indies and Guiana Shield.
