title: Joint Statement of G7 Foreign Ministers on El-Obeid (Sudan)
text: We, the G7 Foreign Ministers of Canada, France, Germany, Italy, Japan, the United
  Kingdom, and the United States of America, and the High Representative of the European
  Union urge the Rapid Support Forces and allied armed groups to immediately cease
  any action likely to lead to further atrocities or endanger civilians in El-Obeid,
  including drone strikes and impediments to humanitarian access. Following the atrocities
  committed during the Rapid Support Force’s siege and attack on El Fasher, we remain
  gravely concerned about alleged severe violations of international humanitarian
  law and international human rights law across Kordofan and Darfur regions, as well
  as Blue Nile in Sudan. We urge the Rapid Support Forces, as well as the Sudanese
  Armed Forces and allied armed groups, to abide by their obligations under the rules
  of international humanitarian law and international human rights law, as applicable.
  Civilians must be protected. We call on parties to the conflict to guarantee safe
  voluntary passage, and to facilitate rapid and unimpeded humanitarian access into
  and around El-Obeid and throughout the country. We urge the Sudanese Armed Forces,
  the Rapid Support Forces and allied armed groups to immediately cease hostilities
  and to engage in direct negotiations in good faith. We call for the Sudanese Armed
  Forces to cease their repeated rejection of the proposed de-escalation measures
  and for the Rapid Support Forces to implement their commitments under the Jeddah
  Declaration, which they have consistently failed to do so far. We support the efforts
  of the United Nations Secretary-General’s Personal Envoy, Mr. Pekka Haavisto, to
  advance de-escalation in El-Obeid and support ongoing broader efforts by the Quad
  and the Quintet to achieve a humanitarian truce, followed by a permanent ceasefire
  and an independent, inclusive, transparent and civilian-led political dialogue.
  We are united in our determination to promote accountability for all violations
  of international humanitarian law and international human rights law committed by
  all parties to the conflict. We remain committed to supporting victims and survivors,
  including through efforts to advance guarantees of non-recurrence. We call upon
  all external actors, as stated in the Berlin principles, to cease providing, directly
  or indirectly, armed, logistical, or financial support to the parties to the conflict
  and to refrain from any action that could exacerbate tensions and fuel the conflict.
  We call on the United Nations Security Council to expand the arms embargo on Darfur
  region to the entire Sudanese territory. We reaffirm our unwavering commitment to
  Sudan’s sovereignty, unity and territorial integrity. We reject all unilateral initiatives
  that risk leading to the country’s partition and remain committed to support the
  democratic aspirations of the Sudanese people.
