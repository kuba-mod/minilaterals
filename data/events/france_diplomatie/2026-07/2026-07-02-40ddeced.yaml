title: Ukraine – Deadly attacks on Kyiv
text: France strongly condemns the massive missile strikes targeting the capital of
  Ukraine, Kyiv, on the night of 1 to 2 July, which claimed the lives of more than
  10 people. These attacks on civilian infrastructure once again demonstrate Russia’s
  contempt for international humanitarian law and prove its unwillingness to negotiate
  in good faith and its stubbornness in continuing its war of aggression against Ukraine.
  France stands in solidarity with Ukraine and its people. It extends its condolences
  to the victims’ families and wishes those injured a speedy recovery. It stands by
  Ukraine more than ever and will continue to lend it its support, together with all
  its partners, with a view to a just and lasting peace.
