title: Germany - Franco-german cooperation brings tangible improvements to the lives…
text: 'At the meeting of Franco-German Council of Ministers at Augustusburg Palace
  in Brühl on 17 July 2026, Benjamin Haddad, Minister Delegate for Europe, and his
  German counterpart Gunther Krichbaum welcomed the progress made since the adoption
  of the Toulon cross-border roadmap: “Our aim is to make Franco-German cooperation
  a lever for practical solutions for citizens, workers, students and businesses,
  and continue removing the daily obstacles that remain at the border.” True to the
  spirit of the Aachen Treaty, the two ministers recalled the progress made thanks
  to the work done with the local authorities and [other] local stakeholders. The
  two ministers welcomed developments in cross-border apprenticeships and vocational
  training. The success of the Lauterbourg Agreement confirms young people’s interest
  in these career paths. “Our goal is to enable an ever-increasing number of apprentices
  and students to benefit from them, particularly by developing practical cross-border
  training courses from 2027”, said Benjamin Haddad. The two ministers welcomed “the
  progress made in cross-border healthcare. The signing of the additional protocol
  to the MOSAR Convention on the management of strokes is an important step. We also
  welcome the launch within the Cross-Border Cooperation Committee of the healthcare-corridor
  working group.” The two ministers called for practical proposals to be put forward
  to continue this momentum. In terms of mobility, the new options for booking train
  tickets between the SNCF and Deutsche Bahn and the development of regional cross-border
  train services are already making it easier for passengers to travel. Benjamin Haddad
  also pointed out that “the revision of EU Regulation 883 will be a significant step
  forward in facilitating business trips and short-term cross-border travel”. They
  also welcomed the cooperation projects started in the energy-transition field, particularly
  around the Interreg GeoTresOR project, and work on digital twins, which will improve
  the management of environmental challenges and natural risks at cross-border level.
  Finally, the ministers reaffirmed their desire to take better account in national
  and European policies of the distinctive features of border regions, particularly
  through the development of the “Grenzraumcheck” and the implementation of the BRIDGEforEU
  Regulation. They also agreed to closely coordinate their positions on future European
  legislation on worker mobility and transport. In conclusion, Benjamin Haddad and
  Gunther Krichbaum pointed out that Franco-German cooperation brings practical results
  when it draws on regions and local stakeholders. They reaffirmed their commitment
  to keeping up this momentum in order to make citizens’ daily lives easier and strengthen
  Franco-German friendship and the European enterprise at grassroots level.'
