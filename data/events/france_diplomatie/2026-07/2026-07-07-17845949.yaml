title: Venezuela – Delivery of 44 tonnes of humanitarian aid
text: Following the two earthquakes that hit Venezuela on 24 June, and at the request
  of the Venezuelan authorities, France mobilized and has sent from Guadeloupe 38
  tonnes of emergency humanitarian aid provided by the Ministry for Europe and Foreign
  Affairs’ Crisis and Support Centre and the French Red Cross. This emergency cargo,
  which arrived in Venezuela today, includes shelters, solar lamps and hygiene kits.
  These humanitarian supplies will be handed over to the Venezuelan Red Cross with
  the support of the International Federation of the Red Cross. Six tonnes of food
  and non-food goods collected thanks to the generosity of Martinique’s inhabitants
  will also be handed over to the NGO Caritas Venezuela. This aid-delivery operation
  was led by the Crisis and Support Centre, with the support of units from the French
  Armed Forces in the West Indies and in partnership with the French Red Cross. It
  follows on from the deployment in the country, at President Macron’s request, of
  a team of 85 French rescue workers, who carried out search and rubble-clearing operations
  in conjunction with the Venezuelan authorities until 4 July, to help earthquake
  victims. These operations come under the EU Civil Protection Mechanism (UCPM). France
  reiterates its profound solidarity with the Venezuelan people. Our thoughts go to
  the victims, their families and close friends and all those affected by the disaster.
  France will go on providing its support to the Venezuelan people in this ordeal,
  in keeping with the solidarity that unites our two nations.
