title: Launch of the Coalition for Children's Rights and Protection in the Age of…
text: 'On the margins of the first United Nations dialogue on AI governance, France,
  alongside Spain and Kenya, chaired the launch today of the Coalition for Children''s
  Rights and Protection in the Age of Artificial Intelligence. Bringing together 18
  States from all regions of the world as well as several UN agencies (UNICEF, OHCHR,
  ITU, UNESCO, ODET, DGC), this multilateral and multi-stakeholder initiative aims
  to ensure safe, secure and rights-respecting AI systems for children, in line with
  the Convention on the Rights of the Child. This launch builds on France''s efforts
  during its G7 Presidency, which made online child protection a leaders'' priority.
  France''s Ambassador for Digital Affairs and Artificial Intelligence, Clara Chappaz,
  opened the session by calling for strengthened international cooperation to address
  the growing risks posed by AI to the youngest among us – emotional dependence, exposure
  to inappropriate content, and impacts on cognitive development. This momentum echoes
  the call made the day before by the UN Secretary-General for an "AI Child Safety
  Pledge," which will find its place within the coalition''s work. List of member
  States: Austria, Brazil, Bulgaria, Canada, Czech Republic, El Salvador, Estonia,
  France, Indonesia, Italy, Japan, Kenya, Luxembourg, Malta, Morocco, Netherlands
  (Kingdom of the), Republic of Korea, Spain'
