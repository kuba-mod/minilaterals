title: Vanuatu – Conversation between Jean-Noel Barrot and Johnny Koanapo, Deputy…
text: The Minister for Europe and Foreign Affairs spoke to the Deputy Prime Minister
  of Vanuatu on 30 June 2026. This falls within the framework of frequent political
  exchanges with Vanuatu. The Minister and the Deputy Prime Minister talked together
  about the prospects of developing the bilateral relationship, particularly when
  it comes to economic development, Francophonie, connectivity and security. The discussions
  will continue with a view to developing a renewed bilateral partnership framework
  that will allow us to talk about all opportunities for cooperation between the two
  countries. Referring to the discussions on the maritime boundary between France
  and Vanuatu, the Minister reiterated the Government’s position regarding French
  sovereignty over Matthew and Hunter Islands.
