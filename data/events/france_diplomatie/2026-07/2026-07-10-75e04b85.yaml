title: G7 and Partner Countries Action Plan on Fertilizer Shocks and Food Systems…
text: 'A coordinated commitment from the G7 Finance and Development tracks. The conflict
  in the Middle East has increased pressures on supply chains for energy, agricultural
  inputs and fertilizers. It affects businesses, farmers and households around the
  world, particularly in the low-income countries. Against this backdrop, and based
  on work carried out with the support of the relevant international organizations,
  G7 Finance and Development Ministers and partner countries (Brazil, India, Kenya,
  Republic of Korea) have adopted a joint action plan to address disruptions in fertilizer
  markets and strengthen food systems resilience in the low-income and most affected
  countries. Grounded in a shared assessment of food insecurity risks, the plan recognises
  that the challenge is primarily one of affordability, and liquidity, rather than
  physical shortage of supplies. It is structured around three complementary areas
  of voluntary measures: 1. Immediate response : facilitate the physical delivery
  of food aid and agricultural inputs, preserve key logistical corridors as well as
  well-functioning markets, and support the working capital of the most exposed farmers,
  particularly smallholders. 2. Financial stabilisation : coordinate the deployment
  of international financial institutions’ financial instruments to support the low-income
  in their response to food-related shocks. 3. Long-term resilience : strengthen market
  monitoring via the Agirculatural Market Information System (AMIS), promote integrated
  soil fertility management, and invest in local and regional fertilizer production
  capacity. All identified measures are voluntary, targeted, temporary and financially
  sustainable, building on existing international coordination mechanisms.'
