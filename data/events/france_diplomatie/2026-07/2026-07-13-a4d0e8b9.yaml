title: Poland - Jean-Noel Barrot's meeting with his counterpart Radoslaw Sikorski
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, went to Warsaw
  on Thursday 9 July to participate in the Polish Ambassadors’ Conference and speak
  to his Polish counterpart, Mr Radosław Sikorski, Deputy Prime Minister and Minister
  of Foreign Affairs, who himself was guest of honour at the French Ambassadors’ Conference
  in January 2025. The two ministers talked about the main international and European
  issues, noting that they very much saw eye to eye and signalling their determination
  to act together. The discussion focused in particular on the unwavering support
  of France, Poland and the European Union in the face of the war of aggression being
  waged by Russia, with a view to the meeting of Coalition of the Willing heads of
  State and government, which will be held in Paris on 13 July at President Macron’s
  invitation. Following on from the Franco-Polish summit held in Gdańsk on 20 April
  and Radosław Sikorski’s visit to France on 18 May, the ministers took stock of the
  strategic projects underpinning the bilateral relationship, which contribute to
  the implementation of the Treaty of Nancy, concluded between France and Poland on
  9 May 2025. Following the meeting, the Minister spoke to the Polish ambassadors,
  to whom he set out France’s foreign and European policy priorities.
