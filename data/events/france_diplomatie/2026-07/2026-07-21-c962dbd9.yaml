title: Iran – Summoning of the Islamic Republic of Iran’s chargé d’affaires in France
text: At the behest of Minister for Europe and Foreign Affairs Jean-Noël Barrot, the
  Quai d’Orsay’s Secretary-General summoned the Islamic Republic of Iran’s chargé
  d’affaires today following the extremely serious act of intimidation targeting two
  French Embassy staffers in Iran on July 19. He was informed that we condemned this
  premeditated, deliberate attack in the strongest possible terms. It was a flagrant
  violation of international law and the Vienna Conventions, signed by Iran, which
  guarantee the protection of diplomatic personnel and form the basis of relations
  between countries. He was also reminded that this very serious, unacceptable incident
  will have repercussions, as the Minister told his Iranian counterpart yesterday.
  France expects the Iranian authorities to shed light on this incident, to punish
  its perpetrators, and to ensure the security and safety of its facilities and personnel
  in keeping with their international obligations.
