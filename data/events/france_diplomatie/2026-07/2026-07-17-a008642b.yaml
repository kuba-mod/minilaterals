title: Russia - Summoning of the chargé d'affaires of the Russian Federation's embassy…
text: The chargé d’affaires a.i. of the Russian Federation’s Embassy in France was
  summoned to the Ministry for Europe and Foreign Affairs today, Friday 17 July, as
  announced by the Minister. He was received by the Continental Europe Director. The
  aim of the summoning was to condemn in the strongest terms the malicious cyber activities
  conducted by Russia in France, particularly those carried out by the FSB’s Centre
  16. These activities, which also target a number of our European partners, are unacceptable
  and unworthy of a permanent member of the United Nations Security Council. He was
  duly informed that, alongside its partners and in the framework of international
  law, France remains determined to use every means at its disposal to pre-empt, discourage
  and respond to the destabilizing actions of which it is the target.
