title: Vatican - Meeting between Jean-Noel Barrot, Minister for Europe and Foreign…
text: Jean-Noel Barrot, Minister for Europe and Foreign Affairs, had a meeting in
  Paris on 10 July with Msgr Paul Richard Gallagher, Secretary for Relations with
  States and International Organizations of the Holy See. Jean-Noel Barrot, Minister
  for Europe and Foreign Affairs, had a meeting in Paris on 10 July with Msgr Paul
  Richard Gallagher, Secretary for Relations with States and International Organizations
  of the Holy See. During the meeting the Minister presented him, on President Macron’s
  behalf, with the insignia of Commandeur in the Légion d’Honneur , signalling the
  French Republic’s recognition of his commitment to peace, respect for international
  law and multilateralism, and to relations between France and the Apostolic See.
  The Minister and his counterpart welcomed the excellent relationship between France
  and the Holy See, marked by President Macron’s visit to Vatican City on 10 April
  2026 and Pope Leo XIV’s pastoral visit to France scheduled for 25 to 28 September
  2026. The Minister and Msgr Gallagher talked about the main international issues,
  in particular the Russian war of aggression against Ukraine and the situation in
  the Middle East and the Sahel. The Minister reiterated France’s historical commitment
  to the protection of the rights, schools and heritage of Eastern Christians, and
  its steadfast efforts to ensure the region finds stability, peace and security.
  He signalled the importance of the Holy See diplomatic corps’ commitment to inter-community
  dialogue, which is necessary for preventing conflicts and promoting sustainable
  peace processes. The meeting also focused on issues related to artificial intelligence
  and digital regulation, to which France and the Holy See attach major importance.
