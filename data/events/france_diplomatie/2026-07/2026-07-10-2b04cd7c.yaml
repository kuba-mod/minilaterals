title: Palestine – Organization of legislative and presidential elections
text: France welcomes the Palestinian Authority’s publication of a decree setting
  the official date of Palestinian legislative elections for November 28, 2026, and
  the holding of presidential elections in early 2027, in line with President Mahmoud
  Abbas’s pledges to President Macron. We call on all the parties to ensure the smooth
  unfolding of these elections, which must enable the Palestinian people to express
  themselves democratically via the vote throughout the Occupied Palestinian Territories
  in accordance with international standards France, together with its partners, is
  ready to provide all necessary support for the organization of these elections.
