title: Saudi Arabia/Yemen - Houthi attacks on two Saudi-flagged ships
text: France condemns in the strongest terms the attacks claimed by the Houthis on
  two commercial vessels flying Saudi flags in the Red Sea last night. These actions
  are irresponsible and a serious escalation. France expresses its support to and
  solidarity with the Kingdom of Saudi Arabia and all of its regional partners. It
  calls on the Houthis to immediately cease all military action. France remains fully
  committed to the safeguarding of maritime security and freedom of navigation under
  the European defensive operation ASPIDES, in liaison with its partners.
