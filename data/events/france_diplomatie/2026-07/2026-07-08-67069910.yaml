title: Ebola Epidemic – Support for the Democratic Republic of the Congo (DRC)
text: France has delivered 20 tons of aid to the Democratic Republic of the Congo
  (DRC), the country that to date has been hardest hit by the latest Ebola epidemic.
  Coordinated by the Ministry for Europe and Foreign Affairs’ Crisis and Support Center
  (CDCS), the aid reached its destination in Ituri Province on July 7. •         
  12 tons of equipment aimed at preventing and controlling infections in the homes
  of contacts of infected individuals; this equipment has been turned over to the
  French NGO Solidarités International; •          8 tons of medicine, delivered to
  the French NGOs ALIMA and Première Urgence Internationale to supplement the local
  healthcare system and ensure that the most vulnerable Congolese have access to quality
  care. This equipment is intended to support the efforts of actors on the ground,
  who are assisting the local, regional and UN health workers who have also been mobilized
  to contain the epidemic’s spread. France thanks all of its humanitarian partners
  and the European Union for their remarkable work in particularly difficult conditions.
  It also thanks Association Tulipe for its generous donations of medicines.
