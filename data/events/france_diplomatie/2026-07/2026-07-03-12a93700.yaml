title: Syria - Terrorist attack in Damascus
text: France utterly condemns the terrorist attack caused by an explosive device in
  a café in central Damascus on Thursday 2 July, which killed at least nine people.
  We extend our condolences to the bereaved and the Syrian authorities, and wish the
  many people injured a speedy recovery. We call for full light to be shed on the
  attack. France reiterates its support to the new Syrian authorities in the fight
  against terrorism and for the stabilization of Syria.
