title: Iceland – Meeting between the Minister and his Icelandic counterpart
text: On July 20, Minister for Europe and Foreign Affairs Jean-Noël Barrot met with
  his counterpart, Thorgerdur Katrin Gunnarsdóttir, during a bilateral visit to Iceland.
  The two ministers discussed the ongoing strengthening of bilateral relations, potential
  economic cooperation, the challenges facing the Northeast Atlantic and Arctic environments,
  as well as support for Ukraine in Russia’s war of aggression and the acceleration
  of settlement activity in the West Bank. They signed a roadmap that bolsters the
  framework for our discussions on security, climate and our economies. France reaffirmed
  its support for the close and mutually beneficial ties between the European Union
  and Iceland. As maritime nations and allies, France and Iceland reaffirmed their
  commitment to the respect for international law and effective multilateralism.
