title: India – Franco-Indian consultations between Martins Briens, Secretary General…
text: The Secretary General of the Ministry for Europe and Foreign Affairs, Martin
  Briens, and Indian Foreign Secretary Vikram Misri engaged in Franco-Indian consultations
  in Paris on April 13. Minister for Europe and Foreign Affairs Jean-Noël Barrot also
  met with Mr. Misri on this occasion. The Minister and the Foreign Secretary emphasized
  the importance of abiding by the ceasefire agreement reached by Iran and the United
  States, and of finding a swift and lasting end to the war through diplomatic means.
  They also discussed the ways and means of restoring freedom of navigation in the
  Strait of Hormuz. As India is working closely with the French G7 Presidency, they
  discussed the responses that our two countries could develop to tackle major macroeconomic
  imbalances and promote a more inclusive form of multilateralism.
