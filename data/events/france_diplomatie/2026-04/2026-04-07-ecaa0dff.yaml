title: Suspension of WHO medical evacuations from Gaza (April 7, 2026)
text: France expresses its deep concern following the World Health Organization’s
  announcement that it was suspending its medical evacuations in Gaza following a
  security incident that killed a WHO contract worker. This incident must be thoroughly
  investigated. The evacuation of patients from Gaza is essential to residents, who
  no longer have access to the medical care they need in the Gaza Strip. These evacuations
  must resume as swiftly as possible, without endangering humanitarian workers, and
  they must be stepped up. That includes evacuations to the West Bank. France reiterates
  its commitment to the smooth operation of the European Union Border Assistance Mission
  in Rafah (EUBAM Rafah), which plays a vital role in facilitating the freedom of
  movement at the Rafah crossing point, with all parties involved acting in compliance
  with  international law. France condemns all attacks on humanitarian workers in
  the strongest possible terms. All parties must guarantee their protection in all
  circumstances, in accordance with international humanitarian law.
