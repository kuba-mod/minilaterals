title: Russia – Fundamental freedoms and rights
text: France strongly denounces the Russian Supreme Court’s designation of a supposed
  “international public movement Memorial”, classed as an “extremist organization”.
  France recalls that it has always commended the role played by Memorial, which was
  dissolved in 2021, in fighting for human rights in Russia and for protecting the
  memory of the victims of Soviet-era repression. France also denounces the heavy
  prison sentences handed down to members of the Vesna movement, deemed “extremist”
  by the Russian authorities, Anna Arkhipova (12 years in prison), Yan Ksenzhepolsky
  (11 years), Vasily Neustroyev (10 years), Pavel Sinelnikov (7 and a half years),
  Yevgeny Zateev (6 years 2 months) and Valentin Khoroshenin (6 years 2 months). France
  calls on the Russian authorities to comply with their international obligations
  as regards guaranteeing fundamental freedoms and rights, release all persons held
  for political reasons and immediately, unconditionally abandon the legal proceedings
  begun against them.
