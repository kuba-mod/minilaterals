title: Jean-Noël Barrot’s conversation with Ms Rosa Yolanda Villavicencio, Minister
  of…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke on 16 April
  to his Colombian counterpart, Ms Rosa Yolanda Villavicencio. The conversation provided
  an opportunity to follow up on the Minister’s visit last November to Colombia, where
  he announced the launch of the international component of the plan for combating
  drug trafficking and organized crime. The two ministers agreed to continue deepening
  their cooperation in this field. The ministers discussed regional and international
  crises and agreed to act in close coordination, particularly within the United Nations
  Security Council, where Colombia began its mandate as an elected member in January
  2026. The ministers also welcomed the continued work of the high-level committee
  on political dialogue between France and Colombia on Comprehensive Rural Reform.
  The initiative is part of France’s role as a supporting country of Chapter 1 of
  the 2016 peace agreement, formalized in November 2024.
