title: Afghanistan – Nutritional inputs sent as part of European humanitarian air…
text: The Ministry for Europe and Foreign Affairs facilitated the delivery overnight
  of nearly 42 tonnes of humanitarian aid for Afghan civilians, with the support of
  the Airbus Foundation. The shipment, coordinated by the Crisis and Support Centre,
  comprises 2,680 boxes of ready-to-use therapeutic food, and 1 tonne of medical equipment.
  These products will be handed to the United Nations and used, among other things,
  to treat some 3,200 children under the age of five suffering from severe acute malnutrition.
  The operation is part of a European humanitarian air bridge launched by the European
  Union (EU) in March 2026 to prevent a shortage of vital nutrition supplies in Afghanistan.
  Three previous flights funded by the EU have already transported more than 270 tonnes
  of therapeutic food to Afghanistan. According to the United Nations, nearly 22 million
  Afghans currently need assistance. Among them, 7.5 million children and pregnant
  or breast-feeding women require preventive or curative treatment for malnutrition.
  France renews its support to Afghan women and men and will continue to supply them
  with essential humanitarian aid, through UN agencies and NGOs active on the ground.
