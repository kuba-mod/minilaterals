title: Lebanon – Israeli strikes
text: France condemns in the strongest terms the massive strikes carried out on 8
  April by Israel on Lebanon, including many districts of Beirut. The Lebanese authorities
  have reported an initial, preliminary toll of at least 250 dead and more than 800
  injured, a very significant proportion of them civilians, adding to the more than
  1,500 deaths recorded since the beginning of the conflict that Hezbollah started
  against Israel on 2 March. These strikes are especially unacceptable because they
  jeopardize the temporary ceasefire between the United States and Iran the day after
  it was concluded. This ceasefire must include Lebanon in order to end hostilities
  at regional level and pave the way for a solution to the crisis that guarantees
  the conditions for a lasting regional peace. France therefore calls on all parties
  to show the utmost restraint and grasp the opportunity offered by this ceasefire.
  France expresses its wholehearted solidarity with the Lebanese people, who continue
  to suffer the consequences of a war they did not choose and are paying the price
  daily of Hezbollah’s irresponsible, unacceptable decision to join in the conflict
  between Israel and Iran. France will go on supporting the Lebanese Government with
  a view to the restoration of its full sovereignty and in assisting the victims and
  displaced people.
