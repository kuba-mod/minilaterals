title: 'Pakistan: Conversation between the Minister for Europe and Foreign Affairs
  and…'
text: Minister for Europe and Foreign Affairs Jean-Noël Barrot spoke by telephone
  with Ishaq Dar, Deputy Prime Minister and Foreign Minister of Pakistan, on April
  10. The Minister hailed Pakistan’s role in the announcement of a ceasefire between
  the United States and Iran. He called for the most inclusive possible negotiations
  that will make it possible to resolve Iran’s threats on the nuclear, ballistic and
  regional fronts on a long-term basis. The two Ministers underscored the vital importance
  of including Lebanon in the terms of the ceasefire for the sake of its long-term
  viability. They also agreed to step up their bilateral discussions in keeping with
  the bilateral roadmap signed in 2023. They plan to speak in the near future.
