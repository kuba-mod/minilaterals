title: Iraq – Appointment of Prime Minister Ali Al-Zaidi
text: France welcomes the appointment of Mr Ali al-Zaidi as Prime Minister, tasked
  with forming the new government of the Republic of Iraq. This important step must
  pave the way to the establishment of new executive authorities to respond to the
  country’s challenges and the needs of the population. France will continue standing
  alongside Iraq to support it in the strengthening of its institutions and to work
  jointly for regional peace, stability and prosperity.
