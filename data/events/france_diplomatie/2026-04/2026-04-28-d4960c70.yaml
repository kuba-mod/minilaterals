title: Palestine – Local elections in the West Bank and Deir al-Balah
text: France welcomes the holding of local elections in the West Bank and in Deir
  al-Balah, Gaza, and the efforts made by the Palestinian Authority and the Palestinian
  Elections Commission that enabled the ballot to be held in this especially difficult
  context. The very fact that the vote went ahead demonstrates that, with the relevant
  stakeholders’ involvement, democratic expression is possible through the ballot
  box in Palestine. The way is therefore clear for presidential and legislative elections
  to be held in the coming months, which will allow the Palestinian people’s democratic
  will to be fully expressed.
