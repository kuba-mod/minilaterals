title: Israel/Palestine – Damaging of a wastewater treatment plant and demolition
  of a…
text: France condemns Israeli settlers’ attack, occupation and damaging of the wastewater
  treatment plant located in Tayasir in the northern West Bank in Area A that received
  €18.2 million in funding from the French Development Agency (AFD) and the EU, which
  left one Palestinian dead. France calls on the Israeli authorities to expel and
  prosecute those responsible. France also condemns Israeli settlers’ bulldozing of
  a school co-funded by the Crisis and Support Center (CDCS) via the West Bank Protection
  Consortium. France asks the Israeli government to provide financial compensation
  for the destruction caused by the settlers. These actions are part of the unprecedented
  acceleration of Israel’s settlement policy and the increasing number of Israeli
  settler attacks on Palestinian civilians. France calls on the Israeli government
  to take measures to put an end to this violence immediately. France reaffirms its
  firm opposition to any form of annexation that compromises the possibility of a
  two-state solution.
