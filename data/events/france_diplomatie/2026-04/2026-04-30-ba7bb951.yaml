title: Meeting between Jean-Noel Barrot and His Highness Faisal Bin Farhan Al Saud,…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting in
  Riyadh with his counterpart from the Kingdom of Saudi Arabia, Prince Faisal bin
  Farhan al Saud. The two ministers discussed the situation in the Middle East. They
  highlighted the need to consolidate the ceasefires in Iran and Lebanon and make
  headway on a lasting political settlement guaranteeing regional peace and stability.
  The Minister reiterated France’s very strong condemnation of the attacks Iran has
  carried out on its neighbours. He reaffirmed France’s solidarity with the Kingdom
  of Saudi Arabia in this context and its readiness to contribute to its defence,
  should circumstances again require it. The Minister reaffirmed France’s commitment
  to de-escalation and a diplomatic solution. He called for the unconditional, unrestricted
  and immediate reopening of the Strait of Hormuz, and reiterated France’s willingness
  to contribute – when conditions allow and together with its partners – to guaranteeing
  freedom of navigation in the strait, as part of the Franco-British initiative. The
  two ministers emphasized that a diplomatic solution was essential in order to guarantee
  that Iran never acquires nuclear weapons and to address the threats posed by its
  ballistic and drone programmes and its destabilization activities. They expressed
  their readiness to support all efforts to this end. The two ministers also discussed
  the consequences of the war in the region, particularly in Lebanon, and the need
  to support the authorities against the forces challenging the State’s sovereignty.
  The Minister stressed that the ceasefire in Lebanon must be fully observed by the
  parties. Finally, they reaffirmed their desire to continue their close coordination
  in order to contribute to regional stability and the ongoing diplomatic efforts.
