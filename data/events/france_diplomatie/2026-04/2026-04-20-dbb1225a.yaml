title: Meeting between Jean-Noël Barrot and Alain Berset, Secretary General of the…
text: Minister for Europe and Foreign Affairs Jean-Noël Barrot met with Alain Berset,
  Secretary General of the Council of Europe, in Strasbourg on April 20, 2026. The
  Minister reaffirmed France’s support of the work done by the Council of Europe,
  whose founding mission since 1949 has been to ensure respect for human rights, democracy
  and the rule of law. The Minister commended the Secretary General on his efforts
  to further his initiative, A New Democratic Pact for Europe. He recalled France’s
  full commitment to combatting the threat of foreign interference and information
  manipulation facing our democratic societies, with full respect for the rule of
  law and freedom of expression. The Minister applauded the Council of Europe’s role
  as a driving force in the efforts to support Ukraine and combat Russia’s impunity
  in its war of aggression.
