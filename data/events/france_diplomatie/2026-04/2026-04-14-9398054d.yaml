title: Senegal – Meeting between the Minister and his Senegalese counterpart, Cheikh…
text: Minister for Europe and Foreign Affairs Jean-Noël Barrot hosted Cheikh Niang,
  Minister of African Integration, Foreign Affairs and Senegalese Abroad in Paris
  on April 13. They emphasized the vitality of French-Senegalese relations against
  the backdrop of the new era of French-African relations launched in 2017. The ministers
  reviewed every aspect of our bilateral relationship and looked forward to the upcoming
  French-Senegalese intergovernmental seminar, which will mark a new stage in the
  renewed relationship between our two countries. They also discussed regional and
  international developments and spoke about the upcoming Africa Forward Summit, which
  will be held in Nairobi on May 11 and 12, and in which Senegal will take part.
