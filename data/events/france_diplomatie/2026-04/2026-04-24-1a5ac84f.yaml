title: Statement of the G7 Non-Proliferation Directors Group on the Treaty on the
  Non…
text: We, the G7 Non-proliferation Directors Group, reaffirm our unwavering commitment
  to the Treaty on the Non-Proliferation of Nuclear Weapons (NPT) and underline the
  authority and primacy of the NPT as the cornerstone of the global nuclear non-proliferation
  regime, and the foundation for the pursuit of nuclear disarmament and for the development
  of peaceful uses of nuclear technology. Amidst the pressing and unprecedented challenges
  that threaten global security and stability, we commit to working with all States
  Parties to achieve a successful Review Conference in 2026 and to pursue the broadest
  possible consensus on measures to reinforce the NPT regime across all its three
  pillars. We call on those States that have not yet done so to accede to the NPT,
  and for all States Parties to fully implement their obligations under the Treaty.
  We recognize the Treaty’s vital role in promoting international peace and security,
  preventing the spread of nuclear weapons and having enabled a significant reduction
  in nuclear weapons stockpiles from Cold War highs. We reaffirm our commitment to
  the ultimate goal of the worldwide elimination of nuclear weapons with undiminished
  security for all. In this regard, we are concerned with China’s and Russia’s significant
  nuclear weapons build-up and modernization. Concrete risk reduction measures should
  be pursued. Our security policies are based on the understanding that nuclear weapons,
  for as long as they exist, should serve defensive purposes, deter aggression and
  prevent war and coercion. We strongly encourage the United States’ pursuit of multilateral
  strategic stability. We highlight the leading role of G7 members in supporting the
  International Atomic Energy Agency (IAEA) and strengthening its safeguards system,
  including by promoting the universal adoption and effective implementation of Comprehensive
  Safeguards Agreements and Additional Protocols as the standard for verification
  under Article III of the Treaty. We reaffirm that full compliance with the NPT and
  relevant safeguards obligations is essential to ensuring international confidence
  in the peaceful nature of nuclear activities. The G7 remains determined that Iran
  must never develop or acquire a nuclear weapon. We demand that the DPRK abandon
  all nuclear weapons and existing nuclear programs in accordance with all relevant
  United Nations Security Council resolutions and reiterate that the DPRK cannot and
  will not have the status of a nuclear-weapon State in accordance with the NPT, nor
  any special status of any kind. We emphasize that access to the peaceful use of
  nuclear technology is a critical driver of sustainable economic growth. In this
  regard, G7 members reaffirm their commitment to support the IAEA in the promotion
  of nuclear energy, science, and technology for peaceful purposes, noting that our
  collective contribution to the IAEA’s technical cooperation fund since 2010 exceeds
  727 million euros. By providing consistent financial and technical support and sharing
  best practices, we demonstrate our political resolve to ensure that the Agency contributes
  to sharing the benefits of nuclear power and non-power applications.
