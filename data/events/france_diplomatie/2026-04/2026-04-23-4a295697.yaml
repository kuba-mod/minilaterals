title: Hungary – The Minister’s conversation with Ms Anita Orban
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a telephone conversation
  with Ms Anita Orbán, set to take office as foreign minister in the next Hungarian government.
  The Minister welcomed the victory of the Tisza party in the general election of
  12 April 2026, reflecting the Hungarian people’s attachment to the values of the
  European Union. The conversation focused particularly on priority issues such as
  support for Ukraine and the situation in the Middle East , as well as the new prospects
  opening up for relations between France and Hungary. The Minister and Ms Orbán spoke
  about ways of revitalizing and deepening bilateral cooperation projects and together
  promoting a more sovereign, competitive and democratic Europe.
