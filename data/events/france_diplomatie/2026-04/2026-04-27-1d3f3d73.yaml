title: United Nations – Minister’s meeting with Mr Antonio Guterres, United Nations…
text: As part of his visit to New York, the Minister for Europe and Foreign Affairs
  had a meeting with Mr António Guterres, United Nations Secretary-General. The Minister
  signalled his support for what the United Nations is doing and recalled the importance
  of effective multilateralism and adherence to international law and the United Nations
  Charter. The Minister talked about the situation in Lebanon, where France recently
  lost two of its soldiers engaged in the United Nations Interim Force in Lebanon
  (UNIFIL). He recalled the safety and security requirements for UNIFIL personnel
  and France’s commitment to the force being able to implement its mandate fully until
  its withdrawal starting on 1 January 2027. He also talked to the Secretary-General
  about the prospect of strengthening UNIFIL’s role in ensuring the safe delivery
  of humanitarian aid, in a way appropriate to the security situation and in close
  coordination with the Lebanese armed forces. On Palestine, the Minister welcomed
  the creation of the UN Horizon Fund, to which France will contribute. This initiative
  reflects a shared view about early recovery and reconstruction, centred on respect
  for international law, the fundamental rights of Palestinians and the unity of Palestine,
  with the Palestinian Authority’s full involvement. Regarding the situation in the
  Great Lakes, the Minister and the Secretary-General talked about MONUSCO’s role
  in the Democratic Republic of the Congo to support the ceasefire, civilian protection
  and de-escalation. As regards the Strait of Hormuz, they discussed the Franco-British
  initiative for a strictly defensive mission aimed at guaranteeing free, safe navigation
  in the Strait.
