title: Jean-Noël Barrot’s conversation with Mr Roberto Velasco Alvarez, Secretary
  of…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, spoke to his Mexican
  counterpart, Mr Roberto Velasco Alvarez, on 22 April. The conversation provided
  an opportunity to follow up on the visit by President Macron and the Minister to
  Mexico last November, during which the strengthening of our bilateral strategic
  partnership was announced, in particular through the adoption of a joint declaration.
  Convinced of the appropriateness of the Franco-Mexican initiative to regulate the
  use of the veto at the United Nations Security Council in the case of mass atrocities,
  the ministers agreed to continue their joint efforts with a view to garnering further
  support. The ministers discussed our two countries’ shared priorities in terms of
  protecting the environment, in particular the oceans. They also emphasized the potential
  of our bilateral trade and called for it to be developed, particularly through the
  revitalization of the Franco-Mexican Strategic Council.
