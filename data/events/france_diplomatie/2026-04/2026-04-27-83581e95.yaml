title: Lebanon – Death of a fourth Indonesian UNIFIL soldier
text: France was saddened to learn that a fourth Indonesian UNIFIL peacekeeper, Corporal
  Rico Pramudia, died on April 24 from injuries sustained following a projectile explosion
  from an Israeli tank on March 29 in southern Lebanon. His death follows the death
  of three other Indonesian soldiers in two separate incidents on March 29 and 30,
  as well as the death of two French soldiers, Staff Sergeant Florian Montorio and
  Corporal Anicet Girardin, who died on April 18 and April 22 respectively in an attack
  presumed to have been committed by Hezbollah. France offers its heartfelt condolences
  to Corporal Rico Pramudia’s family, loved ones and brothers in arms. France pays
  tribute to the six peacekeepers killed while serving the cause of peace in southern
  Lebanon since March 29. France reiterates its solidarity with Indonesia and calls
  for full light to be shed on the circumstances of these tragedies. With great seriousness,
  France once again calls on all of the parties to respect UN Security Council Resolution
  1701 and refrain from endangering UN personnel in all circumstances, in accordance
  with international law and the Convention on the Safety of United Nations and Associated
  Personnel. France calls on all of the parties to fully comply with the ceasefire
  that went into effect on April 17 and was extended by three weeks on April 23.
