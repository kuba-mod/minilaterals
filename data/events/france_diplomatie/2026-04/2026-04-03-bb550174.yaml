title: Iran – Arrest of Nasrin Sotoudeh
text: France was deeply concerned by the announcement of yesterday’s arrest of lawyer
  and human rights defender Nasrin Sotoudeh, winner of the Sakharov Prize. This arrest
  illustrates yet again the Iranian regime’s systematic policy of persecution and
  intimidation of human rights activists. It must stop. France calls for the immediate
  release of Nasrin Sotoudeh and all those detained arbitrarily in Iran. It expresses
  its concern over the alarming news concerning the health of Narges Mohammadi. It
  stands shoulder to shoulder with the Iranian people, who must be able to exercise
  their fundamental rights and freely choose their own future.
