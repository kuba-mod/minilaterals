title: Lebanon – Death of a second French soldier in an attack on UNIFIL
text: France was deeply shocked to learn of the death this morning of Corporal Anicet
  Girardin after he was returned to France. Corporal Girardin died of the injuries
  he suffered in an attack against the United Nations Interim Force in Lebanon (UNIFIL)
  which also claimed the life of Staff Sergeant Florian Montorio. France extends its
  most heartfelt condolences to his family, close friends and brothers in arms, and
  expresses its and profound sympathy to the two other French soldiers wounded in
  the attack. France reiterates its utmost condemnation of this attack, carried out
  in all probability by Hezbollah fighters, and its demand that its perpetrators be
  identified, arrested and brought before the courts. It pays tribute to the exemplary
  courage of Corporal Anicet Girardin, who died for France, and that of all our soldiers
  and contingents deployed within UNIFIL, who are working bravely and resolutely at
  the service of peace in Lebanon.  It recalls that UNIFIL must be fully able to exercise
  its mandate and its freedom of movement, in accordance with United Nations Security
  Council Resolution 1701. The Blue Helmets’ security and protection must be ensured
  by all the parties. France reaffirms its commitment alongside the Lebanese State
  in its efforts to restore full sovereignty over the whole of Lebanese territory
  and consolidate its monopoly on weapons. It remains fully mobilized to support the
  perpetuation of the temporary ceasefire which came into force on 17 April and the
  lasting stabilization of Lebanon.
