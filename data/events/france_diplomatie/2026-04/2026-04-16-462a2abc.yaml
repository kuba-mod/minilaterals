title: Temporary ceasefire between Israel and Lebanon
text: France welcomes the US President’s announcement of a 10-day temporary ceasefire
  between Israel and Lebanon. This truce is a necessary and welcome first step in
  providing respite to the populations following several weeks of deadly conflict
  in Lebanon and in Israel. France congratulates the United States on its active efforts,
  building on the direct talks between Israel and Lebanon in Washington on 14 April.
  It reaffirms its full support for the Lebanese Government’s brave decision to embark
  on these historic discussions with Israel, in the primary interest of the Lebanese
  people. France now calls on all the parties to abide fully by this ceasefire and
  refrain from any action liable to jeopardize the truce’s implementation. It calls
  for discussions between Israel and Lebanon to continue in order to work towards
  a political solution including Israeli withdrawal and Hezbollah’s disarmament and,
  beyond this, allowing a path of peace and security for the two countries to be mapped
  out. France reaffirms its commitment to full respect for Lebanon’s sovereignty and
  territorial integrity, in accordance with United Nations Security Council Resolution
  1701. It will remain fully mobilized alongside its European, regional and international
  partners to support the ongoing diplomatic process.
