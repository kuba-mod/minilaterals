title: Meeting between Jean-Noël Barrot, Minister for Europe and Foreign Affairs,
  and…
text: On Monday, April 27, Jean-Noël Barrot, Minister for Europe and Foreign Affairs,
  met with Rafael Grossi, Director General of the International Atomic Energy Agency
  (IAEA), on the sidelines of the 11th Nuclear Non-Proliferation Treaty Review Conference
  in New York, which they said that they hope will result in a collective reaffirmation
  of the Treaty by all the States Parties. The Minister reaffirmed France’s full support
  of the IAEA in the execution of its mandate to verify compliance with non-proliferation
  obligations and promote the use of nuclear energy for peaceful purposes under safe,
  responsible conditions. The Minister also reaffirmed the goal of ensuring that Iran
  never obtains nuclear weapons and reiterated the determination of France and its
  E3 partners to reach this goal via diplomatic means. Only a robust, lasting agreement
  that provides for a strong IAEA verification regime will lead us to lift the sanctions
  against Iran that were reintroduced in September 2025. The Minister and the Director
  General commended the success of the Nuclear Energy Summit held in Paris on March
  10, as well as the adoption of two statements on the development of nuclear energy
  as a safe, affordable energy source and the financing of nuclear energy. In addition,
  the Minister recalled France’s support of the IAEA’s work on nuclear safety and
  security in Ukraine and underscored France’s commitment to continuing international
  mobilization efforts to restore Chernobyl’s New Safe Confinement under France’s
  presidency of the G7.
