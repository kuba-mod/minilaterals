title: Death of a French soldier in an attack on UNIFIL
text: France was shocked to learn of the death of Staff Sergeant Florian Montorio
  in southern Lebanon this morning, in an attack against the United Nations Interim
  Force in Lebanon (UNIFIL) which injured three other French soldiers, two of them
  seriously. It extends its sincerest condolences to his family and close friends,
  and wishes the injured a speedy recovery. France utterly condemns this attack, in
  all probability carried out by Hezbollah. It expects the Lebanese authorities to
  shed full light on the attack and the culprits to be identified and held accountable
  in the courts. UNIFIL must be able to fulfil its mandate fully in accordance with
  United Nations Security Council Resolution 1701. This is all the more essential
  following the conclusion of a temporary ceasefire between Israel and Lebanon. The
  protection of Blue Helmets and the safety and security of United Nations personnel,
  assets and premises must be respected by all parties. France reaffirms its support
  for the Lebanese State in exercising its full sovereignty over the whole of Lebanon’s
  territory, and will continue to support it in this, in keeping with its brave decisions
  to ban Hezbollah’s military activities and to exercise an exclusive monopoly on
  weapons.
