title: Ukraine – 40th anniversary of the Chernobyl nuclear disaster
text: Forty years on from the Chernobyl disaster, France reiterates its support for
  the victims of the accident and pays tribute to the heroic courage of the people
  who worked to contain it. The event is a reminder of the transnational nature of
  industrial accidents, which require a mutually-supportive response. France, along
  with its European partners and the G7 members, is continuing its active efforts
  to secure the power station, which took practical form between 2007 and 2019 with
  its role in the building of the containment dome. France recalls that the Russian
  strikes on Ukrainian civilian and energy infrastructure may have major radiological
  consequences and that the attack by a Russian drone on the Chernobyl dome in February
  2025 is part of Russia’s terror strategy, which is increasing European insecurity
  by posing the risk of a nuclear incident. Following the attack, France is working
  actively under its G7 presidency in 2026 to support and take part in fundraising
  for the rebuilding of Chernobyl’s containment dome.
