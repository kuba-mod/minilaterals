title: China – Execution of M. Chan Thao Phoumy
text: We were appalled to learn of the execution in Guangzhou of our compatriot Chan
  Thao Phoumy, 62, who was sentenced to death for drug trafficking in 2010. Despite
  the active efforts of the French authorities, including to get a decision of clemency
  for our compatriot on humanitarian grounds, the Chinese authorities decided to carry
  out the sentence after he had been imprisoned for more than 20 years. We particularly
  regret the fact that M. Chan’s defence had no access to the final court hearing,
  which constitutes a violation of the rights of the interested party. We extend our
  sincere condolences to his family, whose distress we share. France reiterates its
  opposition to the death penalty everywhere and in all circumstances, and calls for
  its universal abolition.
