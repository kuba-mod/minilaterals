title: Meeting between Jean-Noël Barrot and Norwegian Foreign Minister Espen Barth…
text: Minister for Europe and Foreign Affairs Jean-Noël Barrot hosted his Norwegian
  counterpart, Espen Barth Eide, on April 13. The Ministers reviewed the implementation
  of the strategic partnership agreement between France and Norway signed during President
  Macron’s state visit to Oslo in June 2025. They discussed the prospects for strengthening
  bilateral cooperation, particularly in green industries, defense and the space industry,
  as well as NATO’s commitment to Arctic security. The Minister highlighted France’s
  commitment to the close partnership between the EU and Norway. The Ministers expressed
  their agreement on several international issues. They reiterated their unwavering
  support for Ukraine in Russia’s war of aggression. They also agreed on the need
  to restore the freedom of navigation in the Strait of Hormuz, in accordance with
  the Law of the Sea, and to include Lebanon in the terms of the U.S.-Iran ceasefire.
