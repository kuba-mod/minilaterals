title: Meeting between M. Jean-Noel Barrot, Minister for Europe and Foreign Affairs,…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  with Robert Floyd, Executive Secretary of the Comprehensive Nuclear-Test-Ban Treaty
  Organization (CTBTO) today, Monday 27 April 2026, on the sidelines of the 11th Review
  Conference of the Treaty on the Non-Proliferation of Nuclear Weapons [NPT] in New
  York. The Minister expressed the wish for the review conference to lead to the States
  parties collectively reaffirming their support for the NPT. He also reaffirmed France’s
  financial and political support for the CTBTO and its commitment to the entry into
  force of the Comprehensive Nuclear-Test-Ban Treaty (CTBT). The Minister and CTBTO
  Executive Secretary talked about the need to preserve the moratorium on nuclear
  testing, and ways of doing so.
