title: Poland – April 20, French-Polish Friendship Day
text: Today, on the first ever French-Polish Friendship Day, France applauds the close
  ties that bind together France and Poland. French-Polish relations, which were strengthened
  by the Treaty of Nancy that was signed by the President of France and the Prime
  Minister of Poland on May 9, 2025, are extremely dynamic, both politically and economically,
  as well as culturally, and are part of a resolutely ambitious European framework.
  Together, France and Poland are committed to strengthening Europe’s unity and sovereignty
  and remain deeply committed to multilateralism and a rules-based international order.
  Today, President Macron traveled to Gdansk for French-Polish Friendship Day. This
  day provided the opportunity to discuss the upcoming 2027 France-Poland cultural
  season. Today, April 20, the facade of the Quai d'Orsay will be lit up with the
  colors of the Polish flag, while in Poland, the facade of the Palace of Culture
  and Science will likewise be lit up.
