title: Architecture and urban planning agency Particules to represent France at the…
text: 'Jean-Noël Barrot, Minister for Europe and Foreign Affairs, and Catherine Pégard,
  Minister for Culture, announce that the project “ res publica: what is this space
  between you and me?” by the agency Particules has been chosen to represent France
  at the 20 th International Architecture Exhibition at the Venice Biennale Architettura
  2027 (8 May to 21 November 2027). At the end of the selection process organized
  by the Institut français, the jury chose the Particules team’s project for its powerful,
  sensitive, immersive and authentic submission. Its project for the 2027 French Pavilion
  celebrates the Architecture Act of 3 January 1977, a theme common to all the submissions.
  2027 will be the 50 th anniversary of this major law, which recognizes architecture
  as a cultural expression and a public-interest creation while emphasizing architects’
  responsibility for the quality of the living environment. The collective initiative,
  spearheaded by the ministries and the Institut français in collaboration with a
  broad coalition of architecture professionals, is based on a shared conviction:
  that architecture is a cultural, political and socially responsible statement serving
  the public interest; it embodies the shared hope of designing and building a living
  environment that contributes to wellbeing by adapting to societal and environmental
  changes. The French Pavilion is organized by the Institut français, an agency of
  the Ministry for Europe and Foreign Affairs and the Ministry for Culture.'
