title: Malta – Jean-Noël Barrot’s meeting with Mr Ian Borg, Maltese Deputy Prime…
text: M. Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting
  in Paris on 16 April with Mr Ian Borg, Malta’s Deputy Prime Minister and Minister
  for Foreign Affairs and Tourism. They paid tribute to the momentum in relations
  between France and Malta and signalled their desire to work to deepen them – particularly
  in the areas of transport, energy, sustainable mobility and the fight against drug
  trafficking – for the benefit of a more sovereign and competitive Europe. The ministers
  expressed their concern over developments in the Middle East, particularly in Lebanon,
  and their commitment to freedom of navigation. They reaffirmed their unwavering
  support for Ukraine in the face of the war of aggression being waged by Russia.
  They also discussed the situation in Libya.
