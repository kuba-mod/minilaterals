title: United Arab Emirates – Meeting between Jean-Noel Barrot and his Highness Sheikh…
text: Jean-Noël Barrot, Minister for Europe and Foreign Affairs, had a meeting in
  Abu Dhabi with his counterpart from the United Arab Emirates, His Highness Sheikh
  Abdullah bin Zayed Al Nahyan. The two ministers discussed the situation in the Middle
  East. They highlighted the need to consolidate the ceasefires in Iran and Lebanon
  and make headway on a lasting political settlement guaranteeing regional peace and
  stability. The Minister reiterated France’s very strong condemnation of the unacceptable
  attacks that Iran has carried out on its neighbours, and first and foremost, on
  the United Arab Emirates. He reaffirmed France’s unwavering solidarity with the
  United Arab Emirates under our bilateral defence agreement, and our willingness
  to participate in their defence, should conditions again call for it. The Minister
  reaffirmed France’s commitment to de-escalation and a diplomatic solution. He called
  for the unconditional, unrestricted and immediate reopening of the Strait of Hormuz,
  and reiterated France’s willingness to contribute – when conditions allow and together
  with its partners – to guaranteeing freedom of navigation in the strait, as part
  of the Franco-British initiative. The Minister emphasized that a diplomatic solution
  was essential in order to guarantee that Iran never acquires nuclear weapons and
  to address the threats posed by its ballistic and drone programmes and its destabilization
  activities. The two ministers also discussed the consequences of the war in the
  region, particularly in Lebanon, and the need to support the authorities against
  the forces challenging the State’s sovereignty. The Minister stressed that the ceasefire
  in Lebanon must be fully observed by the parties. Finally, they reaffirmed their
  desire to continue their close coordination in order to contribute to regional stability
  and the ongoing diplomatic efforts.
