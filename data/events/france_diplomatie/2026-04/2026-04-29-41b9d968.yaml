title: Madagascar – Summoning of the Charge d’Affaires of the Madagascar embassy
text: On Tuesday 28 April the Ministry for Europe and Foreign Affairs summoned the
  C hargé d'Affaires of the Madagascar Embassy in Paris to protest strenuously against
  the declaration of a diplomatic employee at the French Embassy in Antananarivo as
  “persona non grata”. He was informed that France categorically rejects any accusations
  of destabilizing the regime of the Re-Foundation of the Republic of Madagascar.
  Such accusations are not only unfounded, they are also incomprehensible, given the
  steadfast, practical support lent by France since October 2025, in conjunction with
  its international partners, to the Re-Foundation process, as it strives to address
  the legitimate aspirations expressed by the people of Madagascar and in particular
  its young people. France calls on the Malagasy authorities to maintain constructive
  dialogue in keeping with the bilateral relationship and in our two countries’ interests.
