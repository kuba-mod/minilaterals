title: 'Premier: Polska była, jest i będzie rzecznikiem mądrego i pragmatycznego rozszerzania
  UE'
text: 'Spotkanie premierów odbyło się w 34. rocznicę nawiązania stosunków dyplomatycznych
  z Republiką Armenii, która miała miejsce 26 lutego 1992 roku. Dzisiaj relacje Polski
  z Armenią to bezwarunkowa przyjaźń. Nie ma konfliktu interesów. Mamy wspólne poglądy
  - powiedział Premier Donald Tusk w oświadczeniu po spotkaniu delegacji. Dowodem
  bardzo dobrych stosunków dwustronnych jest podpisana dziś umowa między Ministrem
  Obrony Narodowej Rzeczypospolitej Polskiej a Ministerstwem Obrony Republiki Armenii
  o współpracy wojskowo-technicznej. Umowę podpisali Minister Obrony Narodowej Władysław
  Kosiniak-Kamysz i Minister Spraw Zagranicznych Armenii Ararat Mirzoyan. Wierzymy,
  że współpraca militarna na rzecz bezpieczeństwa całego regionu jest w interesie
  Polski i Armenii. Nasze narody wiedzą, jaką cenę płaci się, gdy jest się samemu
  Podpisane porozumienie oznacza więcej wspólnych szkoleń, wymiany doświadczeń i praktycznej
  współpracy wojskowej. Od dłuższego czasu Premier Armenii nie odwiedzał Polski na
  tak wysokim szczeblu.  Uważam tę wizytę za nowy etap, impuls dla naszych dwustronnych
  relacji W swoim wystąpieniu szef polskiego rządu odniósł się do okresu, w którym
  Polska wiązała duże nadzieje z budowaniem relacji dyplomatycznych z państwami powstałymi
  po rozpadzie Związku Radzieckiego. Polska była zawsze w czołówce tych, którzy uznawali
  niepodległość i państwowość powstających właśnie państw. To był czas, kiedy szczególnie
  mocno odczuwaliśmy wspólnotę historii Zdaniem Premiera Donalda Tuska kwestiami,
  które szczególnie łączyły wówczas te kraje były: wspólna wrażliwość, podobne rozumienie
  historii, szans, zagrożeń i aspiracji. Jednym z tematów dzisiejszego spotkania była
  akcesja Armenii do Unii Europejskiej. Polska była, jest i będzie rzecznikiem mądrego,
  jak trzeba ostrożnego, bardzo pragmatycznego rozszerzania Unii Europejskie. Jeśli
  będzie trzeba, także zmieniania UE po to, aby państw i narodów cieszących są wolnością,
  niepodległością i bezpieczeństwem było coraz więcej Jego zdaniem aspiracje Armenii i
  osobista konsekwencja Premiera Nikola Paszyniana, żeby wytyczać szlak europejski
  dla jego kraju są absolutnie uzasadnione. Szef rządu przypomniał, że państwa zjednoczone
  w Unii Europejskiej czerpią ogromne korzyści z działania razem. Jedność państw i
  narodów o podobnej kulturze politycznej, przywiązanych do podobnych wartości, jest
  absolutnie bezcenna. W oświadczeniu Premier Donald Tusk nawiązał również do konfliktu
  o Górski Karabach i osobistych zasługach Premiera Nikola Paszyniana w tej kwestii.
  Podziwiamy w Polsce wysiłek Armenii i osobisty Premiera Paszyniana w zakończeniu
  konfliktu o Górski Karabach. Wiemy, ile to wymagało odwagi, wizji i talentów politycznych
  Jego zdaniem w czasach niepewności strategicznej, geopolitycznych zmian i agresji
  rosyjskiej na Ukrainę, jest to przykład, który powinien zrobić wrażenie na politykach
  na całym świecie. Pokój jest możliwy, nawet jeśli emocje są na bardzo wysokim poziomie.
  Bardzo wysoko cenimy wsparcie Polski dla reform w Armenii, a także w procesie pokojowym,
  który teraz ma miejsce w naszym regionie Zdaniem armeńskiego lidera Polska jest
  przykładem kraju, który dzięki trudnym doświadczeniom historycznym wybrał drogę
  pokoju, wolności i budowy państwa demokratycznego.'
