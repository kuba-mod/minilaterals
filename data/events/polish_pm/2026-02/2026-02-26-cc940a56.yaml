title: Minister rolnictwa z poparciem sejmowej większości
text: 'Poprzedni rząd popierał Mercosur i pozwolił na import ukraińskiego zboża Polityczne
  porozumienie w sprawie umowy o wolnym handlu między Unią Europejską a krajami Mercosur,
  zostało zawarte w 2019 roku – za kadencji poprzedniego rządu. Rok 2019, minister
  PiS: Polska chce zawarcia umowy o wolnym handlu między Unią a wspólnym rynkiem Mercosur.
  Powinno to przyczynić się do większej otwartości naszych rynków i zwiększenia wolumenu
  wymiany handlowej. (…) W interesie Polski leży popieranie unijnych umów o wolnym
  handlu, w tym umowy z Mercosurem – cytował Donald Tusk podczas wystąpienia w Sejmie.
  Poprzedni rząd zajmował podobne stanowisko w sprawie importu ukraińskiego zboża.
  Rok 2023, wicepremier i minister rolnictwa PiS: Ukraińskie zboże nie zalewa polskiego
  rynku i nie jest zagrożeniem dla polskich rolników. A kilka dni później z pełnym
  przekonaniem radził naszym rolnikom, by nie sprzedawali zboża, bo cena urośnie.
  Pamiętamy, jakie były konsekwencje tej rekomendacji Podobna polityka rządu PiS dotyczyła
  także innych obszarów rolnictwa. Nie wiem co gorsze dla polskiego rolnictwa – wasze
   rządy czy powódź. Wszystko – Mercosur, Zielony Ład, ukraińskie zboże – psuliście,
  we wszystkich tych sprawach. Nasze rządy polegają na tym, że najpierw musimy po
  was sprzątać i naprawiać wszystkie szkody, a później realizować interesy, w tym
  przypadku polskiego rolnictwa Obecny rząd prowadzi odpowiedzialną i korzystną dla
  rolników politykę związaną z rozwojem obszarów wiejskich. Możemy głośno powiedzieć,
  że w funduszach europejskich będziemy mieli historyczny budżet dla rolnictwa. To
  6 mld euro plus 42,3 mld euro, co jest rekordową kwotą od momentu wejścia Polski
  do Unii Europejskiej” Premier ocenił, że tak, jak w przypadku programu SAFE, opozycja
  stara się zablokować unijne pieniądze dla Polski. Wasze wnioski, blokowanie, weta
  – wszystko to ma służyć jednemu, żeby w Polsce było gorzej, bo wtedy wam jest lepiej.
  To jest ten PiS-owski paradygmat. Robicie wszystko, aby zablokować pieniądze dla
  Polski zawsze wtedy, kiedy nie możecie ich ukraść Dopóki rządzi obecna Koalicja,
  nie będzie to możliwe.'
