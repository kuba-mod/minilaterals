title: Dziedzictwo żołnierzy Armii Krajowej trwa w naszych sercach
text: '14 lutego 1942 roku Naczelny Wódz gen. Władysław Sikorski wydał rozkaz o przekształceniu
  Związku Walki Zbrojnej w Armię Krajową. Rok temu Sejm ustanowił ten dzień Narodowym
  Dniem Pamięci Żołnierzy AK. Mam wielką satysfakcję, że Sejm w roku ubiegłym ustanowił
  14 lutego świętem Państwowym. W ten sposób usunięta została luka, która dla wielu
  z Was była bolesna. Środowisko akowskie wiele lat zabiegało o nadanie tej rocznicy
  należnej rangi. To dzięki waszym wysiłkom ten dzień stał się w końcu świętem Armia
  Krajowa liczyła blisko 380 tys. żołnierzy i była jedną z największych i najlepiej
  zorganizowanych armii podziemnych w okupowanej Europie. Kulminacją wysiłku zbrojnego
  Armii Krajowej było Powstanie Warszawskie –  heroiczna próba wyzwolenia stolicy
  własnymi siłami. Stało się ono symbolem determinacji Polaków w walce o wolność,
  ważnym przez kolejne dziesięciolecia. Symbol Polski Walczącej stał się znakiem oporu
  narodu polskiego. To nie tylko symbol - to deklaracja: Polska istnieje, Polska walczy,
  Polska się nie podda Konspiracyjne struktury były infiltrowane, dochodziło do licznych
  aresztowań i egzekucji. Mimo to duch Armii Krajowej przetrwał. Wielu jej żołnierzy
  kontynuowało walkę w szeregach organizacji niepodległościowych po zakończeniu wojny,
  podejmując próby oporu przeciwko sowieckiemu zniewoleniu. Weterani, z którymi mamy
  możliwość się spotykać, są dla nas żywym świadectwem heroizmu i poświęcenia. Ich
  odwaga pozostaje wzorem do naśladowania. Dziękujemy za ich służbę Ojczyźnie, za
  przekazywanie młodym pokoleniom wartości patriotycznych i za obecność w ważnych
  momentach naszej współczesnej, dzisiejszej historii Szacuje się, że w czasie wojny
  zginęło około 100 tysięcy żołnierzy AK. Tradycja Armii Krajowej była obecna także
  w czasach „Solidarności”. Wówczas ponownie walczono o wolną Polskę. Innymi metodami,
  ale z tym samym przesłaniem. Moje pokolenie i ja osobiście, mieliśmy w Was mentorów,
  przewodników, nauczycieli. Chodziło nam przecież wszystkim o to samo, o przyszłość
  Polski i Polaków, jako część Europy, a nie pod sowieckim butem Odnosząc się do współczesności,
  zaznaczył, że znak Polski Walczącej jest symbolem odpowiedzialności i wspólnoty.
  Znak Polski Walczącej to symbol odwagi, ale nie tylko. To znak odpowiedzialności
  za Polskę. Objawia się ona gotowością do poświęcenia w imię dobra wspólnego, poszukiwaniem
  porozumienia i zgody tego, co nas łączy, troskę o wspólnotę Przesłanie AK jest nadal
  aktualne. Premier przypomniał słowa pierwszego komendanta Armii Krajowej gen. Stefana
  Roweckiego ps. „Grot”, który powiedział, że sensem walki AK nie są ideały oderwane
  od rzeczywistości ale walka o człowieka, jego prawo do wolności, do godności, do
  prawdy i do własnej ojczyzny. One pokazują jak głęboki i uniwersalny sens miała
  walka żołnierzy Armii Krajowej. I ten sens zachował się do dzisiaj To przesłanie
  będzie obecne w dzisiejszym wystąpieniu Premiera podczas Konferencji Bezpieczeństwa
  w Monachium. Niech dziedzictwo żołnierza Armii Krajowej trwa w naszych sercach i
  niech będzie stałą inspiracją dla nas i przyszłych pokoleń Polaków. Chwała żołnierzom
  Armii Krajowej. Chwała bohaterom. Niech żyje wolna Polska Podczas uroczystości głos
  zabrał również kapitan Janusz Komorowski, prezes Zarządu Głównego Światowego Związku
  Żołnierzy Armii Krajowej. Armia Krajowa ukształtowała w większym czy mniejszym stopniu
  setki tysięcy Polaków, powołała w tysiącach domów tradycję wiernej walki o Polskę
  W imieniu walczących żołnierz AK podziękował za ustanowienie święta przypominającego
  o ich niezłomnej walce. W imieniu Światowego Związku Żołnierzy Armii Krajowej serdecznie
  dziękuję władzom Rzeczypospolitej, że powstał akt sprawiedliwości dziejowej – symboliczne
  upamiętnienie kilkuset tysięcy żołnierzy zbrojnej polskiej konspiracji lat 1939-1945,
  a nawet w dalszych latach tak zwanej drugiej konspiracji, jakim jest ustawa Narodowego
  Dnia Pamięci Armii Krajowej Ustanowienie tego dnia to uczczenie ostatnich żyjących
  żołnierzy Armii Krajowej oraz docenienie wysiłku jednej z największych armii podziemnej
  w okupowanej Europie.'
