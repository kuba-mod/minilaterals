title: Integracja Islandii z UE wzmocni bezpieczeństwo Europy
text: Od wielu lat relacje Warszawy i Reykjavíku są bardzo dobre. Oba kraje mają podobną
  ocenę sytuacji na temat wojny rosyjsko-ukraińskiej i są tak samo zaangażowane w
  pomoc Ukrainie. Polska i Islandia są przekonane, że tylko sprawiedliwy pokój i niepodległość
  Ukrainy daje szansę na pozytywny scenariusz dotyczący przyszłości Europy – zaznaczył
  Donald Tusk podczas wspólnego oświadczenia z Premier Islandii. Oba kraje zgadzają
  się również, że należy wspólnie działać na rzecz bezpieczeństwa. Byłbym więcej niż
  szczęśliwy, gdyby Islandia była częścią tej samej wspólnoty, co Polska. Musimy się
  nawzajem szanować i respektować różnice. Wielkość kraju nie ma tutaj znaczenia.
  Wszyscy zasługujemy dokładnie na ten sam szacunek i poszanowanie różnych odrębności
  W czasach geopolitycznej niepewności, przystąpienie Islandii do UE byłoby korzystne
  z punktu widzenia interesów Polski. Zintegrowanie państw i narodów podobnie myślących
  byłoby bardzo potrzebne, szczególnie w sferze bezpieczeństwa.  Współpracujemy już
  blisko z Islandią – także w konkretnym wymiarze militarnym – i będziemy kontynuować
  naszą współpracę Stosunki polsko-islandzkie mają szczególny charakter, ponieważ
  nasi rodacy stanowią największą mniejszość w Islandii. Liczbę Polaków w tym kraju
  ocenia się na ok. 30 tys., co stanowi ok. 6 proc. populacji. Polacy są w Islandii
  największą grupą mniejszościową i jest to historia sukcesu. Odczuwam do Was głęboki
  szacunek i podziw Polska i Islandia są także członkami Sojuszu Północnoatlantyckiego
  i wspólnie chronią  bezpieczeństwa Europy. Apel do Prezydenta o poparcie wspólnego
  bezpieczeństwa Prezes Rady Ministrów po raz kolejny zaapelował do Prezydenta Karola
  Nawrockiego o podpis pod ustawą, która umożliwi Polsce skorzystanie z prawie 200
  mld zł na wzmocnienie naszego bezpieczeństwa w ramach unijnego programu SAFE. Bardzo
  bym chciał, żeby w sprawach bezpieczeństwa nasze myślenie było wspólne – tak, jak
  jest wspólne między Islandią a Polską – jeśli chodzi o wielki program finansowania
  polskiego bezpieczeństwa SAFE W przekonywanie Karola Nawrockiego do poparcia ustawy
  o SAFE angażuje się coraz więcej środowisk. Do apelu generałów i oficerów Wojska
  Polskiego, by nie blokować pieniędzy na polski przemysł zbrojeniowy, wojsko i gospodarkę,
  dołączyli dziś także pracodawcy oraz przedsiębiorcy. Bardzo liczę na szybki podpis
  Prezydenta pod ustawą – dla dobra nas wszystkich i dla bezpieczeństwa Polski. Wszyscy
  na tym skorzystamy Polska jest największym beneficjentem programu SAFE. Na wzmocnienie
  swojego bezpieczeństwa mamy otrzymać ok. 200 mld zł, z czego 80 proc. środków trafi
  do polskich firm zbrojeniowych. Pieniądze z SAFE mają zostać przeznaczone m.in.
  na budowę obrony powietrznej i przeciwdronowej.
