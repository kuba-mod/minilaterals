title: Program SAFE to bezpieczeństwo i rozwój polskich firm. „Weto byłoby niepowetowaną
  stratą”
text: Głównym tematem wczorajszego posiedzenia Rady Bezpieczeństwa Narodowego był
  program SAFE. To niepowtarzalna szansa na rozwój polskiej armii i przemysłu zbrojeniowego
  przy wykorzystaniu środków unijnych. Program SAFE jest największym finansowym projektem,
  jeśli chodzi o rozwój polskiej obronności i przemysłu zbrojeniowego z udziałem europejskich
  środków Po raz pierwszy w historii Unia Europejska zdecydowała się uruchomić tak
  kompleksowy instrument wzmacniający bezpieczeństwo, a nasz kraj będzie jego największym
  beneficjentem. Do Polski może trafić blisko 1/3 środków przewidzianych w ramach
  programu wartego 150 mld euro. Blisko 200 mld zł trafi do Polski na bardzo korzystnych
  warunkach, niedostępnych na rynku finansowym w inny sposób SAFE przewiduje bardzo
  korzystne warunki finansowe – nisko oprocentowane pożyczki z 10-letnim odroczeniem
  płatności i 45-letnim okresem spłaty. Według założeń ponad 80 proc. środków ma trafić
  do polskich firm, co oznacza realne wzmocnienie krajowego przemysłu i nowych technologii.
  To zupełnie inne podejście w porównaniu do nakładów na obronność w poprzednich latach,
  które opierały się w głównej mierze o zagraniczne dostawy i firmy. Dzięki pieniądzom
  z SAFE zbudujemy Tarczę Wschód, tarczę antydronową i uzbroimy się w m.in. amunicję
  155 mm Wczoraj Rada Ministrów przyjęła projekt ustawy o Finansowym Instrumencie
  Zwiększenia Bezpieczeństwa SAFE. Już dziś w Sejmie odbędzie się jego pierwsze czytanie.
  Po zakończeniu prac legislacyjnych w parlamencie ustawa będzie czekała na podpis
  Prezydenta, który otwarcie przyznał, że ma wątpliwości dotyczące tego programu.
  Mam nadzieję, że cała Rada Bezpieczeństwa nie była wyłącznie po to, aby przygotować
  opinię publiczną do prezydenckiego weta. To byłaby niepowetowana strata, gdyby Prezydent
  się na to zdecydował Każdy dzień zwłoki, szczególnie w obliczu zagrożenia wojną
  i agresywnej polityki Rosji, oznacza opóźnienie w realizacji kluczowych inwestycji
  obronnych. Drugim tematem była inicjatywa Rady Pokoju, zaproponowana przez administrację
  prezydenta USA. Polska pozostaje lojalnym i przewidywalnym sojusznikiem Stanów Zjednoczonych,
  ale nie zrezygnuje z prawa do własnej oceny nowych projektów. Polska była, jest
  i będzie pewnym sojusznikiem Stanów Zjednoczonych. Jednak tak długo, jak ja będę
  premierem, Polska nie będzie w tej relacji wasalem Rząd ostrożnie podchodzi do Rady
  ds. Pokoju i analizuje wszystkie jej aspekty. Relacje sojusznicze muszą opierać
  się na partnerstwie, a nie na krótkowzrocznej metodzie pochlebstw. Nie wszystkie
  aspekty Rady Pokoju odpowiadają Polsce. Relacje sojusznicze nie mogą polegać na
  tym, że ktoś nieustannie potakuje i próbuje coś uzyskać. To nie działa Wiele państw
  europejskich podchodzi do tej inicjatywy z podobną rezerwą. Polska pozostaje otwarta
  na rozmowy, jednak każda propozycja musi być bezpieczna i zgodna z polską racją
  stanu. Ostatnim z punktów wczorajszego posiedzenia Rady Bezpieczeństwa Narodowego
  była kwestia kontaktów Marszałka Sejmu. RBN nie jest miejscem do rozstrzygania sporów
  personalnych ani oceny relacji towarzyskich polityków. Rozmowy na ten temat w kontekście
  bezpieczeństwa państwa są nieuzasadnione i nie służą merytorycznej dyskusji. Uważam,
  że Rada Bezpieczeństwa Narodowego to nie jest miejsce, gdzie dyskutuje się na temat
  kontaktów towarzyskich tego czy innego polityka Po wyczerpaniu dwóch kluczowych
  punktów szef rządu opuścił posiedzenie Rady, a informacje dotyczące oceny służb
  przekazał Minister Koordynator Służb Specjalnych Tomasz Siemoniak. Premier zwrócił
  również uwagę na formułę posiedzenia Rady Bezpieczeństwa Narodowego. W części jawnej
  przedstawiciele mediów oraz obywatele mogli usłyszeć wyłącznie wypowiedzi i zarzuty
  ze strony Prezydenta, bez możliwości odpowiedzi ze strony rządu. Wolałbym, żeby
  w przyszłości, kiedy jest różnica poglądów, prezydent zdecydował się na wymianę
  poglądów przy opinii publicznej. Albo wszystko w dyskrecji, albo nic Taka forma
  utrudnia pełny dostęp do argumentów obu stron. W sprawach bezpieczeństwa potrzebna
  jest maksymalna przejrzystość i możliwość wymiany poglądów na równych zasadach.
  Premier udał się dziś do Belgii na nieformalne spotkanie liderów państw i rządów
  UE.
