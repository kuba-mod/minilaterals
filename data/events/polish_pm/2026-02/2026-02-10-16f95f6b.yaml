title: 'Premier w 100-lecie Gdyni: Polska ma realne szanse dominować na Bałtyku'
text: Polska może odgrywać główną rolę na Bałtyku PGZ Stocznia Wojenna w Gdyni jest
  obecnie sercem modernizacji polskiej marynarki, gdzie realizowane są kluczowe programy
  bezpieczeństwa państwa. W Gdyni powstaną trzy nowoczesne fregaty w ramach programu
  „Miecznik” – „Wicher”, „Burza” i „Huragan” oraz okręt ratowniczy w ramach programu
  „Ratownik”. Wartość programu „Miecznik” wynosi 15 mld zł. Inwestycję prowadzi Polska
  Grupa Zbrojeniowa we współpracy z Brytyjczykami. To część wielkiego projektu, który
  składa się na program Bezpieczny Bałtyk – podkreślił Donald Tusk w gdyńskiej stoczni.
  Budowa nowych polskich okrętów to nie tylko przyszłe bezpieczeństwo na Bałtyku,
  ale też duże osiągnięcie technologiczne. Fregaty będą mogły – bez zawijania do portu
  – przebyć dystans z Gdyni do Nowego Jorku i z powrotem. To robi wrażenie. Nie tylko
  sam ogrom i nowoczesność, ale też możliwości techniczne – bezprecedensowe Dzięki
  rozbudowie polskich portów i rozwojowi floty, nasz kraj aspiruje do odgrywania głównej
  roli na Bałtyku. Nasza rodząca się na nowo potęga morska to zarówno wspólna z NATO
  akcja Baltic Sentry, jak i rozwój portów oraz floty. Nowe fregaty to tylko część
  naszych ambicji, tego wielkiego morskiego projektu, którego Gdynia jest absolutnym
  centrum Ważnym elementem wzmacniania pozycji Polski na Bałtyku jest także program
  „Orka”, realizowany we współpracy ze Szwecją. Jego celem jest pozyskanie przez nasz
  kraj nowych okrętów podwodnych. Gdynia staje się częścią bardzo ważnego projektu
  geopolitycznego. Nasza coraz ściślejsza współpraca ze Szwecją, ale także z Norwegią,
  Finlandią i państwami bałtyckimi, staje się absolutnie kluczowa dla bezpieczeństwa
  Europy i Polski  oraz dla funkcjonowania NATO w regionie Wodowanie pierwszej z trzech
  fregat budowanych przez gdyńską stocznię odbędzie się jeszcze w 2026 roku. 100 lat
  temu Gdynia otrzymała prawa miejskie, stając się symbolem nowoczesności oraz ambicji
  rozwojowych Polski. Gdynia powstała po to, żeby nasz kraj był suwerenny i żeby Polska
  była otwarta na cały świat. Jeszcze przed wojną Gdynia stała się jednym z największych
  portów na Bałtyku Po wojnie Gdynia pozostała dumą naszego kraju. To było naprawdę
  najnowocześniejsze miejsce w Polsce. Gdynia była symbolem naszych aspiracji przynależenia
  do wspólnoty Zachodu. I dzisiaj ponownie staje się synonimem polskich ambicji. Gdynia,
  razem z Gdańskiem, Sopotem i  Szczecinem – choć mają różne tradycje – mogą połączyć
  się w jeden nurt budowania zwycięskiej Polski W 2025 roku Gdynia została uznana
  najlepszym polskim miastem na prawach powiatu w prestiżowym Water City Index 2025.
  Natomiast w 2024 roku Institute for Quality of Life w Londynie umieścił Gdynię najwyżej
  spośród polskich miast w rankingu najszczęśliwszych miast na świecie. Te wyróżnienia
  potwierdzają, że Gdynia łączy dziś dynamiczny rozwój z wysoką jakością życia mieszkańców.
