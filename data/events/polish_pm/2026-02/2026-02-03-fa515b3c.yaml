title: Rząd powołuje zespół analityczny ws. skandalu pedofilskiego w USA
text: Premier Donald Tusk poinformował, że wspólnie z Ministrem Sprawiedliwości Waldemarem
  Żurkiem oraz Ministrem Koordynatorem ds. Służb Specjalnych Tomaszem Siemoniakiem
  podjęli decyzję o powołaniu zespołu analitycznego w związku ze skandalem pedofilskim
  ujawnionym w Stanach Zjednoczonych z udziałem Jeffreya Epsteina. To jest sprawa
  zupełnie bez precedensu. Zajmuje uwagę polskiej opinii publicznej ze względu na
  tzw. wątki czy ślady polskie w całej tej sprawie Ujawniono już ponad 3,5 miliona
  dokumentów, nagrań wideo, zdjęć i wiadomości, a niemal drugie tyle materiałów czeka
  na publikację. Pojawiły się też informacje o osobach, które miały informować Epsteina
  o grupach polskich kobiet lub dziewcząt. Każdy przyzwoity człowiek powinien wykluczać
  jakiekolwiek relatywizowanie kwestii pedofilii. To jest zbrodnia przeciwko dzieciom
  Polscy prokuratorzy i służby specjalne przeprowadzą szczegółową i rzetelną analizę.
  Jeśli zajdzie potrzeba, zwrócą się do władz amerykańskich o udostępnienie dokumentów
  lub plików, które jeszcze nie zostały ujawnione. Jeśli polskie dzieci padły ofiarą
  tej sprawy, państwo podejmie wszelkie działania, by pociągnąć sprawców do odpowiedzialności
  i zadośćuczynić pokrzywdzonym. Drugim aspektem amerykańskiego skandalu pedofilskiego
  jest jego wpływ na bezpieczeństwo państwa. Coraz więcej śladów, informacji i komentarzy
  w światowych mediach dotyczy podejrzenia, że ta afera pedofilska była współorganizowana
  przez rosyjskie służby specjalne Szef rządu, powołując się na słowa szkockiego dziennikarza
  Andrew Marra, powiedział, że Jeffrey Epstein miał mieć też nieograniczony dostęp
  do ogromnych środków finansowych, których źródło i pochodzenie wciąż pozostają niejasne.
   Jeffrey Epstein nagrywał i filmował wpływowych przywódców Zachodu – prezydentów,
  premierów oraz liderów największych firm światowych. Cały świat mówi o tym i zastanawia
  się, jakie to ryzyka ściąga na poszczególne kraje. Nie muszę państwu mówić o tym,
  jak poważne znaczenie dla bezpieczeństwa państwa polskiego ma ta ewentualność -
  coraz bardziej prawdopodobna - że rosyjskie służby współorganizowały ten proceder
  Prezes Rady Ministrów nie wykluczył także, że Polska będzie namawiać innych partnerów,
  by śledztwo w tej sprawie miało charakter międzynarodowy. Szef rządu poinformował,
  że na zaproszenie Prezydenta Ukrainy Wołodymyra Zełenskiego udaje się w tym tygodniu
  z wizytą do Kijowa. Nieprzypadkowo towarzyszyć będzie mi Minister Finansów i Gospodarki
  Andrzej Domański, który przygotowuje wspólnie ze swoim zespołem Światową Konferencję
  Odbudowy Ukrainy. Odbędzie się ona w czerwcu, w Gdańsku Rozmowy w Kijowie mają dotyczyć
  m.in. szczegółów organizacyjnych oraz przyszłego planu odbudowy Ukrainy, możliwego
  do realizacji po zakończeniu wojny lub zawieszeniu broni. Obecnie, mimo deklaracji
  Rosji o przerwie w atakach podczas mrozów, zawieszenie broni nie zostało dotrzymane.
  Ludność i infrastruktura cywilna nadal padają ofiarą nalotów, m.in. w Kijowie i
  Odessie. Rozmawiałem z naszymi ukraińskimi partnerami. Byłem bardzo poruszony tym,
  co powiedzieli, kiedy mnie zaprosili do Kijowa, mówiąc, że obecność lidera innego
  państwa zawsze trochę mityguje Rosjan. <<Może dzięki Twojej wizycie chociaż przez
  chwilę będziemy mogli wytchnąć od tego typu ataków>> Polska – jako najbliższy sojusznik
  i sąsiad Ukrainy – pokazuje swoją solidarność i wsparcie w czasie, gdy światowa
  uwaga coraz częściej odwraca się od trwającej wojny. Szef rządu odniósł się również
  do trudnej sytuacji pogodowej. Od kilku dni w Polsce notowane są rekordowo niskie
  temperatury. Będę prosił ministrów odpowiedzialnych za sytuacje kryzysowe o szczegółowe
  raporty. Niezależnie od prognoz pogody, musimy być wszędzie tam, gdzie pomoc państwa
  jest niezbędna Skutki mrozów są już odczuwalne w wielu regionach kraju. Wczoraj
  m.in. w Gdańsku doszło do awarii elektrociepłowni, a w całej Polsce część szkół
  pozostaje zamknięta.
