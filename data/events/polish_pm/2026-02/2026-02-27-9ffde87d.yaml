date: '2026-02-27'
type: press_release
source_name: polish_pm
title: SAFE - polski pomysł, wykonanie, korzyści
text: 'W ostatnim czasie, wokół unijnego programu SAFE pojawiło się wiele mitów i
  nieścisłości. Na ocenę projektu wpływają także spory polityczne, które nie powinny
  dotyczyć kwestii bezpieczeństwa państwa. Prezentujemy  dziś szczegółowe informacje
  dotyczące programu ze względu na ciągłe emocje związane z istotą SAFE. Chcemy, aby
  w jak najmniejszym stopniu spory polityczne zakłóciły realną ocenę tego, co Polska
  i Europa potrzebują w kwestii własnego bezpieczeństwa – zaznaczył Donald Tusk w
  firmie zbrojeniowej PIT-RADWAR, w Kobyłce koło Warszawy. Nasz kraj nie może już
  dłużej czekać – konieczne jest szybkie i zdecydowane wzmocnienie bezpieczeństwa
  państwa. Polska dobrze uzbrojona, w możliwie dużym stopniu samowystarczalna i równocześnie
  w nowoczesny sposób kooperująca z sojusznikami – to jest potrzeba absolutnie numer
  jeden. Nie ma dziś ważniejszej sprawy. Każdy miesiąc, tydzień i godzina będą wpływały
  na stopień naszego bezpieczeństwa, regionu i całego świata Polska jest największym
  beneficjentem programu SAFE. Na rozwijanie naszego bezpieczeństwa możemy pozyskać
  ok. 43,7 mld euro, czyli prawie 200 mld zł. Pierwszym mitem dotyczącym SAFE jest
  przekonanie, że program został narzucony z zewnątrz i zagraża polskiej suwerenności.
  SAFE od początku do końca został zaprojektowany w Polsce. To była nasza inicjatywa,
  idea i presja. Przekonywaliśmy partnerów – a nie było to łatwe zadanie – że UE musi
  radykalnie zwiększyć obronę swoich państw i wygenerować gigantyczne środki na dozbrojenie
  unijnych armii. SAFE służy więc polskiej suwerenności. To my powiedzieliśmy w Brukseli,
  jak ma wyglądać ten projekt, a nie oni nam Drugi mit związany z SAFE dotyczy tzw.
  warunkowości przy wydatkowaniu środków z programu. To mechanizm, który zabezpiecza
  projekty przed groźbą korupcji czy niezgodnego z celem wydawania pieniędzy. Tylko
  tam, gdzie mamy jasne prawo i zabezpieczenia antykorupcyjne jest pewność, że środki
  nie zostaną zmarnowane. Ten mechanizm powinien być broniony przez opozycję, bo jest
  jednym z realnych instrumentów pozwalających kontrolować rząd, jeśli chodzi o wydawanie
  pieniędzy Trzecim mitem dotyczącym SAFE jest przekonanie, że na programie skorzysta
  nie Polska, lecz Niemcy. Mówimy o blisko 200 mld zł dla naszego kraju, a więc o
  kosmicznej kwocie. Grubo ponad 80 proc. środków – to są oceny fachowców, generałów
  i instytucji państwowych – będzie służyło Polsce i naszym firmom. To wielki zastrzyk
  możliwości, pieniędzy i technologii, które trafią do krajowego przemysłu zbrojeniowego
  i do wszystkich kooperantów. Wiecie, ile ten osławiony niemiecki przemysł będzie
  korzystał na programie SAFE, który realizujemy w Polsce? To jest 0,37 proc.! Na
  programie SAFE skorzysta blisko 12 tys. firm, które współpracują i kooperują z polskim
  przemysłem zbrojeniowym. Przedsiębiorstwa te działają we wszystkich województwach
  i niemal każdym powiecie w Polsce. To będzie jeden przełomowych impulsów, jeśli
  chodzi o rozwój polskiej gospodarki. Na rozwój najnowocześniejszej technologii,
  czyli na satelity, kosmos, cybernetykę, drony i techniki antydronowe pójdzie 36
  proc. z blisko 200 mld zł SAFE nie ograniczy także polskich wydatków w USA, ani
  współpracy z amerykańskimi sojusznikami. My będziemy jeszcze lepszym sojusznikiem
  – właśnie dzięki programowi SAFE. A te grubo ponad 100 mld, które mieliśmy zamiar
  wydać na sprzęt i możliwości technologiczne, które płyną ze Stanów Zjednoczonych,
  zostaną wydane tak czy inaczej Dzięki programowi SAFE zrealizujemy strategię „win-win”
  – z korzyścią dla polskiej obrony, krajowego przemysłu oraz interesów naszych sojuszników.
  Obecnie Polska buduje system obronny na granicy wschodniej, który ma nas zabezpieczyć
  przed ewentualnym atakiem Rosji. Dzięki środkom z SAFE będziemy mogli znacznie wzmocnić
  ten projekt. Budujemy najbezpieczniejszą granicę militarną w Europie, a być może
  na świecie, za gigantyczne pieniądze. To póki co 10 mld euro, które zaplanowaliśmy
  na Tarczę Wschód z naszymi sojusznikami: Finlandią, Litwą, Łotwą i Estonią. SAFE
  będzie w dużej mierze dedykowany Tarczy Wschód. To jest autentyczna tarcza przeciwko
  groźbie rosyjskiej agresji Tarcza Wschód została formalnie zatwierdzona, jako element
  strategii Stanów Zjednoczonych, NATO i UE. Warto to kontynuować także z tego względu,
  że stało się to wspólnym przedsięwzięciem wszystkich sojuszników w Pakcie Północnoatlantyckim.
  Proszę więc jeszcze raz wszystkich którzy czekają – nie ma co czekać! Cała Polska
  czeka na te pieniądze, więc potrzebne są szybkie decyzje” SAFE wzmocni nie tylko
  bezpieczeństwo militarne Polski, ale także naszą współpracę z sojusznikami, czyniąc
  z Polski jeszcze silniejsze ogniwo systemu obronnego Europy i NATO. Program SAFE
  wsparciem dla armii, służb i infrastruktury Środki z SAFE mają zostać wydane na
  potrzeby wojska, wsparcie Policji i Straży Granicznej oraz ochronę cyberprzestrzeni.
  Pieniądze przeznaczymy także na budowę obrony powietrznej i przeciwdronowej. SAFE
  to jest nie program polityczny, ale patriotyczny. To strefa bezpieczeństwa i rozwoju,
  która realizuje marzenia minionych pokoleń o wolnej Polsce. Bez tego programu nie
  mamy innej możliwości, by zbudować w tak krótkim czasie jeszcze silniejszą armię
  i jeszcze lepiej wyposażyć żołnierzy – ocenił Wicepremier, Minister Obrony Narodowej
  Władysław Kosiniak-Kamysz. Obecnie Polska posiada trzecią największą armię NATO,
  ale ze względu na rosyjskie zagrożenie, realizuje plan 500 tys. armii, która będzie
  potrzebowała sprzętu z programu SAFE. Z SAFE skorzystają także służby podległe Ministerstwu
  Spraw Wewnętrznych i Administracji. Program SAFE to inwestycje w nasze codzienne
  bezpieczeństwo. Polska Policja, Straż Graniczna i Służba Ochrony Państwa też zyskają
  na programie. To oni go projektowali i decydowali, co zostanie zakupione, aby podnosić
  bezpieczeństwo naszego kraju. Dzięki SAFE służby otrzymają dodatkowo 7 mld zł –
  poinformował Minister Spraw Wewnętrznych i Administracji Marcin Kierwiński. Program
  SAFE pomoże także w rozwoju polskiej infrastruktury drogowej i kolejowej. Dzięki
  SAFE możemy zrobić jeszcze więcej na polskiej kolei i drogach. To są projekty, które
  spełniają warunki mobilności wojskowej, ale korzystać z nich będą mogli wszyscy
  Polacy, krajowe  firmy i nasza gospodarka – podkreślił Minister Infrastruktury Dariusz
  Klimczak. Pełnomocniczka Rządu do spraw Instrumentu na rzecz Zwiększenia Bezpieczeństwa
  Europy Magdalena Sobkowiak-Czarnecka wskazała, że największy procent środków na
  obronność z programu SAFE trafi na systemy artyleryjskie, a także na obronę przeciwlotniczą,
  przeciwrakietową i systemy antydronowe oraz na walkę naziemną i systemy wsparcia.
  Plan obejmuje dziesiątki inwestycji. To ponad 180 mld zł, które będziemy wydawać
  w polskim przemyśle zbrojeniowym. Nigdy wcześniej Unia Europejska nie przeznaczała
  takich środków na programy obronne Wiceminister Obrony Narodowej Cezary Tomczyk
  wskazał, że 89 proc. środków z SAFE trafi do takich firm zbrojeniowych, jak PIT-RADWAR,
  który jest autorem systemu antydronowego SAN. System SAN to podstawa ochrony antydronowej
  granicy Rzeczpospolitej. To 18 baterii rozlokowanych wzdłuż granicy wschodniej i
  północnej naszego kraju Wiceszef MON wyliczył, że ze środków z SAFE skorzystają
  też m.in. firmy: CENZIN, MESKO, Wojskowe Zakłady Lotnicze nr 1 w Łodzi, Wojskowe
  Zakłady Elektroniczne w Zielonce, Fabryka Broni „Łucznik” w Radomiu, Huta Stalowa
  Wola, Zakłady Metalowe „Dezamet” oraz Zakłady Mechaniczne „Tarnów”. Szef Sztabu
  Generalnego Wojska Polskiego gen. Wiesław Kukuła podkreślił, że program SAFE umożliwi
  znaczne przyspieszenie procesu transformacji sił zbrojnych w sytuacji wieloletniego
  niedofinansowania armii. Wykaz planowanych zakupów w ramach programu SAFE został
  zaczerpnięty z planu modernizacji technicznej i pilnych potrzeb operacyjnych. Dokonał
  tego zespół moich oficerów, do których mam pełne zaufanie Program SAFE to nie tylko
  inwestycja w armię i służby, ale przede wszystkim w bezpieczeństwo całego kraju
  i przyszłość Polski.'
