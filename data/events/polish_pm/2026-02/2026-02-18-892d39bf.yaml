title: 'Premier na GPW: Rok 2026 będzie rokiem turbo przyspieszenia'
text: 'W zeszłym roku Premier Donald Tusk zapowiedział na GPW, że 2025 będzie dla
  Polski rokiem inwestycji i przełomu. Dane gospodarcze potwierdzają ten fakt. Według
  GUS, w zeszłym roku poziom PKB wzrósł o 3,6 proc. Stało się tak wbrew okolicznościom,
  geostrategicznej niepewności i dramatycznym wydarzeniom związanym z wojną rosyjsko-ukraińską.
  Wbrew temu wszystkiemu Polska stała się oazą stabilności i wzrostu Wynik polskiego
  PKB za 2025 rok, to znacznie więcej niż w najsilniejszych krajach Unii Europejskiej
  – w zeszłym roku wzrost gospodarczy Niemiec wyniósł 0,3 proc., a Francji 0,9 proc.
  Głęboko wierzę, że nie jest to nasze ostatnie słowo i że Polska także w 2026 roku
  pokaże bezprecedensowe przyspieszenie. Naszym niekwestionowanym wzrostem w Europie
  chcemy jeszcze bardziej zaimponować światu Przyspieszenie gospodarcze ma przełożyć
  się nie tylko na wskaźniki makroekonomiczne, lecz także na sytuację materialną polskich
  rodzin i stabilność finansów państwa. Rok temu mieliśmy poczucie, że rozpędzająca
  się polska gospodarka to głównie konsumpcja i środki europejskie, ale zależało nam
  także na twardych inwestycjach, m.in. w polską naukę, technologie czy startupy.
  W 2025 roku poziom tych inwestycji wyniósł 4 proc. - wystarczająco żeby powiedzieć:
  „tak, udało się” i o wiele za mało, żeby się cieszyć. Dlatego z satysfakcją mogę
  powiedzieć, że w 2026 roku prognozujemy inwestycje na poziomie blisko 10 proc. Jednym
  z wyznaczników naszego rozwoju gospodarczego jest także wzrost akcji na warszawskiej
  giełdzie. Giełda jest najlepszym przykładem tego, jak poważnie krajowi i zagraniczni
  inwestorzy traktują nasze dane. W 2025 roku GPW osiągnęła rekordowy w tym stuleciu
  wzrost – blisko 50 proc. I nie mamy zamiaru zwalniać! O sile Polskiej gospodarki
  świadczy także wysoki poziom zakupów polskich obligacji przez inwestorów oraz silny
  kurs złotówki. Mocny złoty to bardzo czytelny dowód zaufania w stabilność polskiej
  gospodarki. Dodatkowo mamy do czynienia z wyraźnym wzrostem wynagrodzeń w każdym
  polskim domu Szczególnie ważny dla każdego obywatela jest także poziom inflacji.
  Inflacja spadła do rekordowo niskich poziomów – w styczniu wzrost cen wyniósł 2,2
  proc. To odczuwalna poprawa warunków życia każdej polskiej rodziny. Drożyzna była
  koszmarem przez bardzo długie miesiące. Pamiętamy te dwucyfrowe, rekordowe odczyty
  Obecny poziom inflacji jest ponad ośmiokrotnie mniejszy niż np. w styczniu 2023
  roku, kiedy wzrost cen wyniósł 17,2 proc. Polska posiada także bezpieczny – szczególnie
  na tle pozostałych gospodarek UE – poziom bezrobocia. Nasz kraj odnotowuje obecnie
  drugie najniższe bezrobocie w Europie. Nasz sukces gospodarczy jest doceniany i
  szeroko komentowany w europejskich i światowych mediach. Czytam jeden z tytułów:
  "Potrzebujemy więcej Warszawy w Berlinie. Niemiecka gospodarka odkrywa w Polsce
  nowy wzór do naśladowania". Słyszymy tu od Niemców, że polska gospodarka staje się
  przykładem dobrego zarządzania i efektywności. Czytam też, że dziwią się, jak to
  możliwe, że to nagle Polacy zaczynają kupować firmy w Niemczech, a nie odwrotnie?
  Donald Tusk przytoczył także inne prasowe tytuły ze światowych mediów, m.in.: "Żadne
  państwo byłego bloku wschodniego nie rozwijało się tak szybko, jak Polska. Wkrótce
  wyprzedzi Japonię" oraz: "Gospodarka Polski – nowa siła napędowa Europy". Ponadto,
  według New York Times, Warszawa to drugie warte do odwiedzenia miejsce na świecie,
  a zdaniem magazynu Forbes, stolica Polski znalazła się na pierwszym miejscu w rankingu
  europejskich miast przyszłości, które trzeba odwiedzić w 2026 roku Premier zwrócił
  także uwagę, że dzięki rozwojowi gospodarczemu, wielu polskich obywateli wraca po
  latach do ojczyzny. Polacy naprawdę zaczęli liczyć i wracają. Oceniają, gdzie jest
  lepsze życie, gdzie jest bezpieczniej i gdzie jest bardziej obiecująca przyszłość.
  To są główne kryteria, które decydują o masowych powrotach do Polski Nasz kraj staje
  coraz bardziej atrakcyjnym miejscem do życia nie tylko dla naszych rodaków, którzy
  wracają z emigracji, ale także dla obywateli z innych państw UE. Ze szczególną satysfakcją
  odnotowujemy, że coraz więcej Brytyjczyków, Niemców czy Holendrów decyduje się przyjechać
  do Polski, jako do miejsca stałego pobytu. Oni wierzą w to, że właśnie stajemy się
  sercem całej Europy Rząd działa w perspektywie wieloletniej, stawiając na przyspieszenie
  gospodarcze, deregulację oraz wzrost dobrobytu obywateli. Premier zaznaczył, że
  odblokowanie funduszy unijnych oraz inicjatywa programu SAFE były możliwe dzięki
  przekonaniu partnerów międzynarodowych, że Polska jest stabilna i wiarygodna. W
  kontekście gospodarczym Donald Tusk zwrócił ponadto uwagę na organizowaną przez
  Polskę Konferencję Odbudowy Ukrainy. To jest wydarzenie rangi światowej. Mówimy
  nie tylko o kolejnym wielkim akcie solidarności z Ukrainą. Mamy nadzieję, że dotrwamy
  do momentu, kiedy o Ukrainie będzie się mówiło, jako o największym placu budowy
  w Europie i miejscu, w którym polskie firmy będą robiły także bardzo dobry biznes
  Nasz kraj będzie organizatorem Konferencji Odbudowy Ukrainy w czerwcu 2026 roku.
  Minister Finansów i Gospodarki Andrzej Domański podkreślił, że Polska jest dziś
  jednym z głównych motorów wzrostu w Unii Europejskiej, a jej wkład w dynamikę całej
  Wspólnoty w 2026 roku ma być większy niż udział Francji czy Niemiec. Kolejne instytucje
  finansowe podnoszą prognozy wzrostu PKB dla Polski. Ostatnio Międzynarodowy Fundusz
  Walutowy podwyższył prognozę naszego wzrostu gospodarczego o 0,4 proc. – zaznaczył
  Minister Finansów i Gospodarki. W 2026 roku kluczowym filarem rozwoju gospodarki
  mają być inwestycje. Ich dynamika może sięgnąć nawet 10–11 proc., wyraźnie przewyższając
  tempo z poprzednich lat. Rekordowe środki z budżetu mają trafić m.in. na obronność,
  infrastrukturę drogową i kolejową, porty oraz transformację energetyczną. Inwestycje
  będą także dotyczyć energetyki jądrowej, morskiej energetyki wiatrowej, technologii
  kosmicznych, magazynów energii oraz systemów zwiększających bezpieczeństwo energetyczne.
  Andrzej Domański wskazał także na ambitny cel w perspektywie kilku lat – dogonienie
  Wielkiej Brytanii pod względem PKB per capita. Za 5-6 lat dogonimy Wielką Brytanię
  per capita, skorygowanym o poziom cen. Chodzi o wskaźnik, w którym w zeszłym roku
  wyprzedziliśmy Japonię. Coś, o czym 40 lat temu mówił Lech Wałęsa i co wydawało
  się niemożliwe – w 2025 roku stało się faktem. Obecnie cały świat patrzy na Polskę
  z uznaniem – zauważył Minister Finansów i Gospodarki. Jak podkreślił, Polska konsekwentnie
  zmniejsza dystans do najbogatszych gospodarek świata, a fundamentem tego procesu
  są inwestycje, eksport i budowa suwerenności technologicznej.'
