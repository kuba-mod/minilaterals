title: Rada Przyszłości - Polska na drodze do przyspieszenia i technologicznej suwerenności
text: 'Premier Donald Tusk powołał dziś Radę Przyszłości – gremium  złożone z 19 osób
  – reprezentantów świata nauki i biznesu oraz Ministra Finansów i Gospodarki Andrzeja
  Domańskiego, gospodarza prac Rady. Chciałem bardzo podziękować wszystkim, którzy
  zdecydowali się na tworzenie Rady Przyszłości. To ludzie bardzo zajęci, którzy nie
  narzekają na brak sukcesów w nauce, w biznesie, w kreowaniu zupełnie nowej rzeczywistości.
  To są ludzie, którzy zdobywali też dla Polski kosmos, którzy potrafią produkować
  najbardziej cenione w tej chwili satelity Rada Przyszłości będzie ciałem doradczym
  Prezesa Rady Ministrów, przygotowującym rekomendacje działań i rozwiązań wspierających
  dalszy rozwój Polski . Jednym z jej zadań będzie identyfikacja nowych silników wzrostu,
  opartych na innowacjach, kapitale ludzkim i własności intelektualnej. Skoncentruje
  się na skracaniu drogi od badań do produktu oraz na komercjalizacji i skalowaniu
  technologii w Polsce. Jestem przekonany, że już wkrótce Rada przedstawi rozwiązania
  i narzędzia, dzięki którym polska gospodarka będzie rozwijać się jeszcze szybciej,
  a pierwszym z kluczowych tematów będzie suwerenność technologiczna. Musimy uczynić
  naszą gospodarkę odporną na zewnętrzne zagrożenia Celem działań Rady jest uczynienie
  Polski liderem w kluczowych dziedzinach. Dzięki temu nasz kraj ma być nie tylko
  ambitny, nowoczesny i konkurencyjny, ale także bezpieczny. W skład Rady Przyszłości
  weszli naukowcy, przedstawiciele biznesu oraz eksperci w takich obszarach jak sztuczna
  inteligencja, technologie kosmiczne, biotechnologia, technologie finansowe i zastosowania
  dual-use (mające zastosowanie wojskowe, jak i cywilne). W ostatnim czasie Polska
  stała się „trendy”, a pozytywne wyobrażenia o kraju coraz częściej znajdują potwierdzenie
  w rzeczywistości. To właśnie w Polsce istnieje realna szansa na lepszą przyszłość.
  Żyjemy w jednym z najlepszych miejsc na Ziemi i to przede wszystkim dzięki aktywności,
  kreatywności, pracowitości, ludzi. Ale wiadomo, że szczęście jest potrzebne, jeśli
  chce się osiągać sukcesy i szczęście sprzyja lepszym Polska przyszłość, stabilny
  rozwój kraju wymagają dziś przyspieszenia – zarówno w gospodarce, biznesie, jak
  i nauce. Wymagają też większej elastyczności i nowoczesności w procedurach podejmowania
  decyzji. Polska jest dziś 20. gospodarką świata - to wielki sukces, ale nie dany
  raz na zawsze. Dlatego musimy budować nowe przewagi i wygrywać w globalnym wyścigu
  Polska chce rozwijać je w obszarach takich jak: sztuczna inteligencja, technologii
  kosmiczne, technologie dual-use oraz biotechnologia. Zgodnie z zapowiedziami premiera
  Donalda Tuska, miniony rok był rokiem przełomu, natomiast 2026 będzie rokiem przyspieszenia.
  Największą rezerwą i kluczowym źródłem rozwoju Polski - tym, co pozwoli uczynić
  nasz kraj niekwestionowanym liderem nie tylko w regionie, ale i w Europie pod względem
  gospodarczym - są umysły, zwłaszcza młodych Polek i młodych Polaków. Wszyscy mamy
  na uwadze tych, którzy dopiero wkraczają w dorosłość, a już dzisiaj imponują swoim
  przygotowaniem, intelektem, pomysłami nie tylko tutaj w Polsce, ale całemu światu.
  I ich także będziemy chcieli wziąć pod mądrą opiekę Naszym celem  jest stworzenie
  warunków, w których wszystkie Polki i wszyscy Polacy – posiadający ambicje i potencjał,
  często jeszcze nie w pełni odkryty – będą mogli realizować swoje aspiracje i marzenia
  tutaj, w Polsce.'
