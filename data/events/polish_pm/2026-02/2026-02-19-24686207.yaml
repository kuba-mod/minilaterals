title: Bezpieczeństwo Polski nie może czekać!
text: Polska musi przyspieszyć produkcję nowoczesnego uzbrojenia Przewaga na polu
  walki coraz bardziej zależy od dronów, systemów przeciwdronowych oraz rozwiązań
  autonomicznych. Rząd chce, aby w zdecydowanej większości uzbrojenie to było produkowane
  w Polsce. Nieprzypadkowo pokaz naszych możliwości ma miejsce w Wojskowym Instytucie
  Technicznym Uzbrojenia. Chodzi o połączenie gigantycznych możliwości finansowych
  – jeśli wszystko pójdzie dobrze z programem SAFE – zdolności technicznych i naukowych,
  kondycji polskiej gospodarki oraz możliwości wojska do wykorzystania tego potencjału.
  Ten czworokąt zapewni nam bezpieczeństwo – powiedział Premier na poligonie w Zielonce.
  Polska musi używać nadzwyczajnych środków, ponieważ wymaga tego od nas sytuacja
  geopolityczna. Nie muszę nikogo przekonywać, jak niepewna stała się sytuacja międzynarodowa,
  zarówno w regionie, jak i na świecie. Tym bardziej nie jest to więc pokaz czy abstrakcja,
  ale przygotowanie do sytuacji, w której być może nasz kraj będzie musiał wykorzystać
  wszystkie możliwości Sytuacja jest bardzo poważna. Musimy wykorzystać każdą możliwość
  dla poprawy naszego bezpieczeństwa. Zwróciłem się apelem do wszystkich, którzy mają
  cokolwiek do powiedzenia, żeby nie marnować dnia ani godziny, bo potrzeba jest tu
  i teraz. Musimy do końca wykorzystać wielki potencjał – finansowy, gospodarczy,
  naukowy i militarny – który wyróżnia dzisiaj Polskę w skali całego kontynentu Szczególnie
  ważna w tym kontekście jest realizacja program SAFE. SAFE znaczy bezpieczny. Niech
  nikomu w Polsce nie przyjdzie do głowy, żeby zablokować ten program, bo to będzie
  oznaczało uderzenie w samo serce polskich programów bezpieczeństwa. Tu nie ma miejsca
  na politykę czy jakieś partyjne konflikty Przyspieszenie polskiej produkcji zbrojeniowej
  jest warunkiem koniecznym naszego bezpieczeństwa. Polska staje się unijnym liderem,
  jeśli chodzi o łączenie nauki z nowoczesną technologią. Rząd chce, aby krajowe oraz
  europejskie środki zdynamizowały polską gospodarkę – w szczególności przemysł zbrojeniowy
  oraz badania naukowe. Świat chce kupować polskie „Borsuki” i Pioruny” Dzięki programowi
  SAFE Polska może otrzymać prawie 200 mld zł, z czego 80 proc. trafić do polskich
  firm – zarówno państwowych, jak i prywatnych. Pieniądze zostaną przeznaczone m.in.
  na budowę obrony powietrznej i przeciwdronowej. Skala tych projektów jest naprawdę
  bezprecedensowa. Tylko w systemie obrony SAN będziemy mieli do dyspozycji 700 pojazdów.
  To będą „Legwany” i „Jelcze” produkowane w Polsce Zwiększona produkcja zbrojeniowa
  to także szansa na rozwój polskiej gospodarki. Już dzisiaj zainteresowanie na świecie
  polskimi „Borsukami” czy „Piorunami” przekracza nasze możliwości. Będziemy prowadzić
  strategię „win-win”. To znaczy, że pieniądze będziemy wykorzystywali nie tylko na
  rzecz naszego bezpieczeństwa, ale także na rozwój gospodarczy Jednocześnie poinformował,
  że Polska wychodzi dziś z Konwencji Ottawskiej, która zakazuje użycia, składowania
  i produkcji min przeciwpiechotnych. Przy tej okazji szef rządu przekazał, że w trakcie
  finalizacji jest nowoczesny, polski system narzutowego minowania „Bluszcz”. Turbo
  doładowanie dla armii i pełna mobilizacja przemysłu obronnego Wicepremier Władysław
  Kosiniak-Kamysz podkreślił, że współpraca przemysłu zbrojeniowego, nauki oraz administracji
  państwowej stanowi fundament rozwoju zdolności obronnych Polski. Program SAFE to
  dziś najlepsze rozwiązanie, które daje turbo doładowanie zdolnościom polskiej armii.
  W ten sposób uwalniamy środki w budżecie, żeby reagować na rozwój naszej techniki
  wojskowej Wojna w Ukrainie pokazała, jak ważne jest tempo działania i zdolność do
  szybkiego zwiększania produkcji uzbrojenia. W tym kontekście istotne są rosnące
  możliwości naszego przemysłu zbrojeniowego, w tym spółek należących do Polskiej
  Grupy Zbrojeniowej. Każdy dzień, w którym Ukraina zużywa potencjał Federacji Rosyjskiej,
  to czas dany Polsce i NATO na odrobienie lekcji i wzmocnienie własnego bezpieczeństwa.
  Nie możemy zmarnować ani godziny Silna, dobrze wyposażona armia oraz niezależny
  przemysł zbrojeniowy to fundament bezpieczeństwa Polski. Podczas wypowiedzi na poligonie
  w Zielonce Premier zaapelował także do wszystkich polskich obywateli przebywających
  w Iranie, aby natychmiast opuścili ten kraj. Jak przekazał, ryzyko wybuchu dużego
  konfliktu jest bardzo realne i sytuacja może się gwałtownie pogorszyć w ciągu najbliższych
  godzin lub dni. W takim scenariuszu przeprowadzenie ewentualnej ewakuacji może okazać
  się niemożliwe. Chciałbym uświadomić wszystkim polskim obywatelkom i obywatelom,
  którzy są jeszcze w tej chwili w Iranie albo - nie daj Bóg - wybierają się do tego
  kraju. I mówię to też w imieniu ministra spraw zagranicznych, premiera Sikorskiego,
  który do mnie dzwonił jeszcze tuż przed przyjazdem na poligon - proszę natychmiast
  opuścić Iran i w żadnym wypadku nie wybierać się do tego kraju Jednocześnie podkreślił,
  żeby to ostrzeżenie potraktować niezwykle poważnie.
