title: Musimy być silni. Nie możemy przestać być dobrzy
text: 'Wystąpienie Premiera Donalda Tuska na Konferencji Bezpieczeństwa w Monachium
  Naród ukraiński zasługuje na najwyższy szacunek całego wolnego świata – wszystkich
  ludzi dobrej woli, każdego, kto posiada fundamentalną umiejętność odróżniania dobra
  od zła, prawdy od kłamstwa, i dla kogo porządek moralny, przyzwoitość oraz godność
  nie są historycznymi artefaktami. Podziwiamy naród ukraiński za odwagę i męstwo
  jego synów i córek, za niezwykłą odporność w obliczu nieludzkich cierpień ludności
  cywilnej, w tym tysięcy uprowadzonych ukraińskich dzieci, za wiarę mimo poczucia
  nierównej – jak wielu się wydawało – skazanej na porażkę walki z potężnym i brutalnym
  agresorem. W ciągu tych czterech lat padło wiele pięknych słów i komplementów pod
  adresem Ukraińców. Jednak komplementy nie wystarczą. Wciąż pamiętamy Twoje słowa,
  Wołodymyrze, z pierwszych dni wojny, kiedy Amerykanie zaoferowali Ci bezpieczne
  schronienie i transport: „Walka jest tutaj, potrzebuję amunicji, a nie transportu”.
  Dziś mógłbyś powiedzieć: „Walka nadal jest tutaj. Nadal potrzebujemy amunicji, a
  nie komplementów”. Pamiętam również nasze pierwsze spotkanie, tuż po Twoim zwycięstwie
  w wyborach prezydenckich, siedem lat temu. Lecieliśmy wtedy helikopterem nad Charkowem,
  a Ty z pełnym przekonaniem powiedziałeś mi, że chcesz zakończyć konflikt z Rosją,
  że zostałeś prezydentem, aby przynieść Ukrainie pokój, i że Ty oraz większość narodu
  ukraińskiego pragniecie normalnych stosunków ze wszystkimi sąsiadami. Wojna nie
  była wyborem Ukrainy ani Zełenskiego. Ich wyborem była obrona przed agresorem –
  obrona niepodległego państwa i jego obywateli, obrona marzeń o lepszym świecie,
  o wolności i prawach człowieka, o przystąpieniu do NATO i Unii Europejskiej. Dziś
  jesteśmy Wam wdzięczni nie tylko za to, że płacicie najwyższą cenę za opór wobec
  wroga, który stanowi zagrożenie również dla nas – dla Polaków, Europejczyków, dla
  całego świata zachodniego. Tak, dla całego świata zachodniego. Aby to zrozumieć,
  wystarczy przywołać symboliczny obraz z frontu na Ukrainie: północnokoreańscy żołnierze,
  rosyjscy dowódcy i irańskie drony. Jesteśmy Wam wdzięczni także za to, że uświadomiliście
  całemu wolnemu światu, iż bez walki, bez gotowości do konfrontacji ze złem, bez
  siły i determinacji – nie przetrwa. Dziękujemy również za przypomnienie, że to,
  co dla Zachodu stało się nudną codziennością – prawa i wolności, konstytucje i demokracje,
  dobrobyt i przewidywalność, o które przestaliśmy dbać, które zaczęliśmy podważać
  i kwestionować – jest czymś, o co Wy jesteście gotowi walczyć. Bo doskonale wiecie,
  jak straszna jest rzeczywistość bez zasad, praw i wolności. Wasze marzenia były
  kiedyś naszymi marzeniami. Polska jest najlepszym przykładem, że warto było marzyć
  o wolnym świecie, wierzyć w niego i o niego walczyć. Jako Polak chcę dziś powiedzieć
  to głośno i wyraźnie: warto było walczyć o to, by stać się częścią wolnego świata.
  Wczoraj my, dziś Ukraińcy pokazują, że te rzekomo przestarzałe – jak niektórzy je
  nazywają – wartości i instytucje działają, przynoszą dobro, bezpieczeństwo i wolność.
  Słyszę czasem opinie, że Europa jest na skraju upadku, że NATO jest przestarzałe,
  że stary porządek świata nie powinien już istnieć, a teraz nadszedł czas polityki
  transakcyjnej i Koncertu Wielkich Mocarstw. To nieprawda. Ci, którzy wierzą, że
  wszystko można kupić, powinni pamiętać, że w tej filozofii każdego można sprzedać.
  Zjednoczony Zachód – ze swoimi wartościami i instytucjami, z NATO i Unią Europejską
  – to najlepszy polityczny wynalazek w dziejach ludzkości. Nie możemy pozwolić, aby
  ktokolwiek z zewnątrz, a co dziś jeszcze groźniejsze – z wewnątrz – niszczył nasz
  świat. Musimy być silni, bo nie ma nic gorszego w polityce niż połączenie siły i
  zła. Istotą naszej cywilizacji zawsze było stawanie po stronie dobra, ze świadomością,
  że dobro samo się nie obroni. Musimy być silni. Nie możemy przestać być dobrzy.
  To jest ukraińska lekcja dla nas wszystkich.'
