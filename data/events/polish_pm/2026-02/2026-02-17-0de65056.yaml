title: 'Premier do opozycji ws. SAFE: Takiej zdrady interesów narodowych nikt wam
  nigdy nie wybaczy'
text: 'W swoim wystąpieniu przed Radą Ministrów szef rządu odniósł się do programu
  SAFE, podkreślając jego znaczenie dla polskiego przemysłu obronnego i obrony powietrznej
  kraju. 90 procent wydatków, jakie są związane z naszą obroną powietrzną i przeciwdronową
  w programie SAN, będzie pochodziło ze środków SAFE Szef rządu przypomniał o aktualnym
  zagrożeniu: tylko w ostatnią noc Rosja przeprowadziła atak na Ukrainę, wykorzystując
  425 środków napadu powietrznego, w tym cztery rakiety balistyczne Iskander. Przypomniał
  o też o wrześniowym ataku rosyjskich dronów na Polskę. Kluczowym elementem odstraszania
  Rosji przed atakami na Polskę i inne państwa jest zbudowanie systemu, który wyeliminuje
  takie zagrożenia. Od skutecznego sfinansowania i organizacji obrony powietrznej
  zależy więc nasze bezpieczeństwo. Polska jako największy beneficjent otrzyma w ramach
  programu SAFE ok. 200 mld zł, z czego 80 proc. ma trafić do polskich podmiotów –
  zarówno państwowych, jak i prywatnych. Wśród nich znajduje się Huta Stalowa Wola,
  do której, według danych Agencji Uzbrojenia, ma trafić 20 mld zł na produkcję armatohałubic
  Krab, bojowych wozów piechoty Borsuk czy moździerzy samobieżnych Rak. Już cały świat
  jest zainteresowany tym, żeby od nas to kupować, więc mówimy o wielkiej inwestycji,
  która będzie służyła - jeśli oczywiście prawica i Prezydent zrozumieją na co robią
  zamach - polskiej gospodarce, polskiej obronności, możliwościom eksportu polskiego
  uzbrojenia Z programu SAFE skorzystają również inne polskie zakłady i miasta, m.in.:
  Tarnów, Czernica, Skarżysko-Kamienna, Pionki, Bydgoszcz, Radom, Gdynia, Sanok, Laskowice
  czy Konieczki koło Częstochowy. Ten zamach na Stalową Wolę jest tym bardziej paskudny,
  bo w sobotę jeszcze zamierzają tam robić swoje konwencje partyjne. Dokładnie w tym
  samym czasie, kiedy robią zamach na te 20 miliardów złotych Szef rządu zapewnił,
  że nawet w przypadku blokowania lub wetowania programu rząd znajdzie sposób, by
  uratować część środków. Koalicja 15 października jest gotowa do współpracy z każdym,
  kto ma dobrą wolę i chce, by te pieniądze trafiły do Polski. Premier Donald Tusk
  przypomniał, że rząd nie przewiduje uczestnictwa Polski w obecnych okolicznościach
  w Radzie Pokoju. Ewentualna wizyta przedstawiciela Prezydenta K. Nawrockiego w Waszyngtonie,
  podczas inauguracyjnego posiedzenia, miałaby wyłącznie charakter obserwacyjny. Polska
  na pewno nie wyśle polskich żołnierzy do Strefy Gazy. Mamy swoje problemy bezpieczeństwa.
  Nikomu nie muszę tłumaczyć, na czym skoncentrowana jest polska armia i polskie wojsko
  Polska nie jest także zainteresowana współfinansowaniem projektów deweloperskich
  w Gazie. Środki finansowe są potrzebne przede wszystkim na inwestycje w polskich
  miastach.'
