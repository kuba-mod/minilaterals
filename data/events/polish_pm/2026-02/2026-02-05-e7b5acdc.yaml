date: '2026-02-05'
type: press_release
source_name: polish_pm
title: 'Premier w Kijowie: Wspieramy wszystko to, co słuszne i prawdziwe'
text: Od wielu miesięcy ukraińskie obiekty energetyczne pozostają głównym celem rosyjskich
  ataków.  Stolica kraju doświadcza długich przerw w dostawach ciepła, a mieszkańcy
  Kijowa funkcjonują na co dzień w ekstremalnych warunkach. Jestem w Kijowie razem
  z polską delegacją, bo jest to miejsce na świecie, gdzie wszyscy ludzie wyraźnie
  widzą, co to jest dobro i co to jest zło. Chcemy, żeby wszyscy obywatele i obywatelki
  Ukrainy wiedzieli, że nie są i nie pozostaną sami – podkreślił Donald Tusk po spotkaniu
  z Prezydentem Wołodymyrem Zełenskim. W kryzysowym dla Ukrainy czasie, Polska aktywnie
  wspiera swojego wschodniego sąsiada. Chciałem podziękować wszystkim Polakom, którzy
  zmobilizowali się na rzecz pomocy w tym dramatycznym okresie chłodu i ciemności,
  spowodowanej atakami Rosji W ostatnich tygodniach do Kijowa z Polski dotarło wsparcie
  w postaci m.in. generatorów prądu, pochodzących z zasobów państwa oraz z narodowej
  zbiórki. Dobrze wiemy, co znaczy przeżyć zimę, kiedy temperatura spada do minus
  30 stopni, bez ogrzewania i prądu, bo barbarzyński agresor postanowił zaatakować
  ludność cywilną w najbardziej bolesny i dotkliwy sposób Za polską pomoc podziękował
  Prezydent Wołodymyr Zełenski. Dziękuję bardzo społeczeństwu polskiemu za dostawę
  do Ukrainy sprzętu energetycznego, przede wszystkim generatorów. Dziękujemy bardzo
  Donaldzie – Twojemu zespołowi oraz wszystkim Polakom, którzy bardzo pomagają Donald
  Tusk zapewnił, że Polska pozostaje do dyspozycji, jeśli chodzi o pomóc w kwestii
  energetycznych problemów spowodowanych rosyjskimi nalotami. Nasz kraj kontynuuje
  także wsparcie wojskowe dla naszego wschodniego sąsiada. Prawie w całości zrealizowany
  został 47. pakiet pomocowy o wartości ok. 100 mln zł, zawierający głównie amunicję
  155 mm. Polska kończy również przygotowanie 48. pakietu o wartości 200 mln zł, który
  będzie zawierał m.in. sprzęt pancerny dla ukraińskich wojsk. Premier poinformował
  ponadto, że nasz kraj może przekazać Ukrainie samoloty MiG-29, a Ukraina jest gotowa
  do wymiany dronowej z Polską. Współdziałanie Polski i Ukrainy w dziedzinie bezpieczeństwa
  Współpraca między Warszawą i Kijowem w kwestii bezpieczeństwa zaczyna przybierać
  konkretny wymiar. Donald Tusk i Wołodymyr Zełenski podpisali list intencyjny w sprawie
  wspólnej produkcji amunicji i sprzętu wojskowego oraz rozwijania technologii obronnych.
  Podpisany list jest czymś więcej niż wstępem do praktycznej współpracy. Włożyliśmy
  sporo wysiłku w to, żeby idea wspólnej produkcji uzbrojenia i amunicji stała się
  faktem – żeby znaleźć finansowanie i znieść bariery, które uniemożliwiały wymianę
  technologii Jak dodał, będą także trwały prace nad możliwością efektywnego wykorzystania
  pieniędzy z unijnego programu zbrojeniowego SAFE. Za europejskie, polskie i ukraińskie
  pieniądze będziemy budowali wspólne bezpieczeństwo, na czym wszyscy skorzystamy
  Na współpracę w tej dziedzinie zwrócił także uwagę Prezydent Ukrainy. Liczymy na
  to, że Ukraina będzie uczestnikiem programu SAFE. Wspólnie z Polską będziemy produkowali
  m.in. drony Współpraca zbrojeniowa, to nie tylko kwestia bezpieczeństwa Ukrainy
  i Polski, ale też w przyszłości oba kraje mogą na tym skorzystać. Światowa Konferencja
  Odbudowy Ukrainy w Polsce Szef rządu poinformował, że kolejna konferencja na temat
  odbudowy Ukrainy, po ewentualnym rozejmie lub pokoju, odbędzie się w czerwcu 2026
  roku w Gdańsku. To światowe przedsięwzięcie, w które będę osobiście bardzo zaangażowany.
  Umówiliśmy się dzisiaj z Prezydentem Zełenskim, że w Gdańsku będziemy mówili z partnerami
  z całego świata nie tylko o planach, ale będziemy też podsumowywali pierwsze konkretne
  efekty naszej polsko-ukraińskiej współpracy W związku z rozmowami dotyczącymi tego
  wydarzenia Premierowi podczas wizyty w Kijowie towarzyszył Minister Finansów i Gospodarki
  Andrzej Domański. Dużą wagę do efektów gdańskiej konferencji przywiązuje również
  Kijów. Jestem pewien, że konferencja dotycząca odbudowy Ukrainy, odbędzie się w
  Polsce na najwyższym poziomie – przygotowujemy się do niej. Liczymy na to, że będzie
  to spotkanie z bardzo mocnymi i konkretnymi skutkami Donald Tusk poinformował także,
  że Polska i Ukraina będą jednocześnie rozmawiać na temat zwiększenia współpracy
  energetycznej. To jest kolejny dobry przykład tego, że pomoc może być także dobrym
  przedsięwzięciem gospodarczym dla obu stron. Ukraina dzisiaj potrzebuje więcej energii,
  a Polska stała się kluczowym partnerem, jeśli chodzi m.in. o dostawy gazu Szef rządu
  zwrócił uwagę, że dobrym przykładem jest tu np. współpraca polskiego Orlenu z ukraińskim
  Naftogazem. Podczas wizyty w Kijowie, Donald Tusk spotkał się również z szefową
  ukraińskiego rządu Juliją Swyrydenko, a także złożył wieniec na Polskim Cmentarzu
  Wojennym w Bykowni oraz  pod Ścianą Pamięci Poległych Obrońców Ukrainy.
