title: 'Premier przed RBN: Bezpieczeństwo narodowe to nie slogan, to dla nas sprawa
  absolutnie najważniejsza'
text: 'Do polskiej ambasady w Waszyngtonie wpłynęło zaproszenie na spotkanie inaugurujące
  pracę Rady Pokoju, które odbędzie się 19 lutego w Stanach Zjednoczonych. Zaproszenie
  adresowane jest do Prezydenta lub Prezesa Rady Ministrów. W obecnych okolicznościach
  funkcjonowania Rady i przy wątpliwościach ustrojowych Polska nie przystąpi do prac
  Rady Pokoju - zapowiedział Premier Donald Tusk w oświadczeniu przed posiedzeniem
  Rady Ministrów. Jeśli Prezydent Karol Nawrocki zdecyduje się uczestniczyć w spotkaniu
  inaugurującym jako świadek, otrzyma od rządu w tej sprawie pełne dossier. Nasze
  relacje ze Stanami Zjednoczonymi były, są i pozostaną naszym priorytetem. Jeśli
  zmienią się okoliczności, które umożliwią przystąpienie do prac w tej radzie, to
  nie wykluczamy żadnego scenariusza Do sprawy uczestnictwa w Radzie Pokoju Polska
  podchodzi w sposób bardzo elastyczny i otwarty. Polska z uwagą śledzi wysiłki administracji
  USA zmierzające do wdrożenia planu pokojowego dla Gazy. Międzynarodowy porządek
  na Bliskim Wschodzie musi opierać się jednak na prawie międzynarodowym, w tym na
  obowiązujących rezolucjach Rady Bezpieczeństwa ONZ. Premier Donald Tusk odniósł
  się do krytyki opozycji ws. programu SAFE i pożyczki na jego realizację. Próby wywrócenia
  projektu SAFE to nie tylko głupota czy zła wola. To próba destabilizacji Europy
  i ograniczenia pozycji Polski w UE, a w ostateczności wyprowadzenia Polski z Unii.
  Jesteśmy największym beneficjentem tego wielkiego funduszu na rzecz obrony Program
  SAFE to dziesiątki miliardów euro uprzywilejowanej pożyczki, od której jako państwo
  będziemy mieli dziesięcioletnie wakacje kredytowe. Program zakłada niskooprocentowane
  (ok. 3%) pożyczki związane z obligacjami UE. Spłata kapitału odłożona jest w czasie.
  Całość ma zostać spłacona do 45 lat od daty wypłaty każdej transzy pożyczki. Polska
  jako największy beneficjent otrzyma ok. 200 mld zł. Aż 80% z tej puli środków trafi
  do polskich firm. W czasach naszych poprzedników tylko 24% wydatków na zbrojenia
  trafiało do polskich firm. W ciągu dwóch lat podnieśliśmy ten wskaźnik do 35%. Natomiast
  80% środków z SAFE trafi do polskich firm. To wywołało atak ludzi lobbujących za
  obcymi interesami. Szef rządu przypominał o podpisanych dwa tygodnie temu umowach
  dotyczących realizacji programu SAN – największego i najnowocześniejszego systemu
  przeciwdronowego w Europie. Wartość zamówienia wynosi około 15 mld zł netto, a większość
  środków pochodzić będzie właśnie z unijnego programu SAFE. System powstanie przy
  strategicznym udziale polskiego przemysłu obronnego. Stawiamy dzisiaj na suwerenność,
  jeśli chodzi o zbrojenia. Chcemy mieć pełną kontrolę nad tym, co kupujemy, co będziemy
  chcieli w danym momencie wykorzystać i do tego także będą służyły pieniądze z programu
  SAFE. I nikt nas z tej drogi nie zawróci Z programu SAFE skorzysta wiele polskich
  firm – zarówno państwowych, jak i prywatnych. Przykładami przedsiębiorstw, które
  skorzystają z naszych inwestycji w samym tylko programie antydronowym są m.in.:
  Polska Grupa Zbrojeniowa, Advanced Protection System, PIT-RADWAR, Rosomak S.A, Huta
  Stalowa Wola czy Mesko. Premier Donald Tusk odniósł się również do ostatniego punktu
  programu dzisiejszego posiedzenia Rady Bezpieczeństwa Narodowego. Chodzi o działania
  organów państwa mające na celu wyjaśnienie okoliczności wschodnich kontaktów towarzysko–biznesowych
  Marszałka Sejmu Włodzimierza Czarzastego. Rada Bezpieczeństwa Narodowego nie jest
  miejscem do dyskutowania na temat tego, czy lubi się Marszałka Sejmu RP lub czy
  służby coś wiedzą na temat polityków. Ta Rada jest organem do spraw naprawdę poważnych
  i związanych z kluczowymi kwestiami bezpieczeństwa państwa Premier zapowiedział,
  że w tej sprawie rząd nie będzie aktywny i nie będzie uczestniczył w zamianie Rady
  Bezpieczeństwa Narodowego w pole gry politycznej.'
