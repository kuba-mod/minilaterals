title: Polska armada dronowa - europejskie pieniądze, polskie firmy i ukraińskie kompetencje
  z pola walki
text: 'Rzeszów, jako ważne centrum przemysłu lotniczego i zbrojeniowego, od początku
  rosyjskiej agresji na Ukrainę odgrywa kluczową rolę w polskim zaangażowaniu na rzecz
  sąsiedniego państwa. Rzeszów jest miejscem ciężkiej pracy na rzecz Polski, Europy
  i Ukrainy. Jako pierwsze zmobilizowało się do pomocy w pierwszych dniach rosyjskiej
  agresji. Miasta Podkarpacia i całej Polski to przykłady nadzwyczajnej solidarności,
  która od dekad jest polską specjalnością W najtrudniejszych chwilach rosyjskiej
  agresji na Ukrainę Polki i Polacy udzielili pomocy bez kalkulacji i spekulacji.
  Budujemy tę przyjaźń przede wszystkim wbrew tym, którzy chcieliby zrujnować Ukrainę,
  Polskę czy Europę. (…) Usłyszałem dzisiaj, po raz kolejny od Pani Premier te najprostsze
  słowo „dziękuję” za to co Polki i Polacy robili dla Ukraińców. Pani Premier także
  ode mnie usłyszała słowo „dziękuję” za to co Ukraina robi, w tak bohaterski, bezprecedensowy
  sposób od 50 miesięcy w wojnie z Rosją Kiedy Polska jako pierwsza pomogła Ukrainie,
  mało kto na świecie wierzył, że będzie ona w stanie odeprzeć rosyjską agresję. Dzisiaj
  cały świat z podziwem obserwuje to, co udało się osiągnąć Ukrainie. Dziś rozpoczął
  się wspólny projekt armady dronowej. Ukraina, broniąc się od ponad czterech lat
  przed rosyjską agresją, zgromadziła unikalne doświadczenia w walce przy użyciu systemów
  bezzałogowych. Polska zamierza z tego know-how w pełni skorzystać. Z wielką satysfakcją
  mogę ogłosić, że polski plan budowy armady dronowej będzie wspierany przez myśl
  techniczną i kompetencje dronowe naszych ukraińskich przyjaciół Projekt ma nie tylko
  wzmocnić polską obronność, ale przyczynić się do skoku technologicznego obejmującego
  całą wschodnią flankę Europy. Naszym celem jest, aby tą niespodziewaną dla Rosjan
  konsekwencją wojny było przeskoczenie właściwie całej epoki technologicznej, tak
  aby Ukraina, Polska i Europa były bezpieczne od ataków z powietrza, od jakichkolwiek
  zakusów agresora Szef rządu przypomniał, że kwestia obrony powietrznej jest dla
  Polski szczególnie bliska. We wrześniu 2024 r. Polska doświadczyła naruszenia swojej
  przestrzeni powietrznej przez rosyjskie drony. Relacje polsko-ukraińskie dawno wyszły
  poza schemat darczyńcy i odbiorcy. To strategiczne partnerstwo przynoszące obustronne
  korzyści. Relacje polsko-ukraińskie i europejsko-ukraińskie to nie jest jednostronna
  pomoc dla walczącego kraju. Udało się – i Polska była wiodąca w tym procesie – zbudować
  model relacji, w którym Ukraina też może coś dać Ukraina pokazała całemu wolnemu
  światu, czym jest determinacja w obronie niepodległości. Ta lekcja ma też wymiar
  praktyczny: ukraińskie kompetencje w dziedzinie dronów i obrony powietrznej są dziś
  cennym wkładem do wspólnego bezpieczeństwa. Ukraina pokazała światu, że potrafi
  obronić swoją niepodległość i wolność. Ta wojna pokazała również, na czym polega
  międzynarodowa solidarność oraz to, że narody wolnego świata są w stanie zaangażować
  się w obronę wartości Moment wycofania się Rosji, będzie momentem, w którym będzie
  potrzebne wspólne, zorganizowane działanie na rzecz odbudowy Ukrainy. Konferencja
  w Rzeszowie to również wstęp do szerokiej współpracy międzynarodowej na rzecz odbudowy
  Ukrainy. W ramach konferencji działa Strefa EXPO, gdzie polskie firmy prezentują
  swoje technologie i rozwiązania dla sektora bezpieczeństwa i obronności. W Gdańsku
  odbędzie się  kolejne spotkanie liderów europejskiego i światowego biznesu oraz
  liderów politycznych. Ta idea, aby cały wolny świat zjednoczył się nie tylko wokół
  pomocy dla Ukrainy w jej walce z Rosją, ale żeby zjednoczył się także na rzecz przyszłych
  planów Ukrainy po wojnie – głęboko w to wierzymy Przyszła odbudowa Ukrainy będzie
  wymagała zaangażowania całej społeczności międzynarodowej – zarówno państw, jak
  i biznesu. Głęboko wierzymy, że ta wojna nie przyniesie agresorowi oczekiwanych
  rezultatów i Ukraina utrzyma swoją niepodległość. Wtedy będzie potrzebna wspólna
  wielka akcja na rzecz odbudowy Ukrainy niszczonej bezwzględnie przez agresora Rzeszów,
  dzięki swoim unikatowym kompetencjom w dziedzinie lotnictwa, zbrojeniówki i technologii
  bezzałogowych, jest symbolem tego, czym Polska może wnieść do wspólnego wysiłku.'
