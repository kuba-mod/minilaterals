title: 'Premier po szczycie UE: Musimy pokazać, że Europa i Polska są gotowe do działania'
text: „Chcę obudzić tych, którzy żyją w złudzeniach. Rosja szykuje się do kolejnych
  aktów agresji” - powiedział premier Donald Tusk po nieformalnym posiedzeniu Rady
  Europejskiej na Cyprze. Dlatego tak ważna jest wspólna odpowiedzialność państw europejskich
  oraz NATO. Wezwanie Ameryki do tego, aby Europa wzięła na siebie ciężar obronności
  jest traktowane bardzo poważnie. „Polska to robi i jest przykładem dla europejskich
  partnerów, ale chcę mieć pewność, że wszyscy będziemy gotowi do reakcji w razie
  potrzeby” - dodał Premier. Państwa unijne jednogłośnie zgodziły się na uwolnienie
  90 mld euro pożyczki dla Ukrainy i uchwalenie 20. pakietu sankcji wobec Rosji. Obie
  te kwestie blokował wcześniej rząd premiera Węgier Viktora Orbana. Rozmowy dotyczyły
  także bezpieczeństwa Europy, NATO, energii oraz pieniędzy z programu SAFE dla Polski.
