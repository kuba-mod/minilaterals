title: 'Premier po szczycie UE: Musimy pokazać, że Europa i Polska są gotowe do działania'
text: Rozmowa z prezydentem Zełenskim o Ukrainie i Rosji była nadzwyczajnie szczera.
  Po zmianie na Węgrzech wzajemne zaufanie europejskich liderów wyraźnie wzrosło Decyzja
  ma nie tylko wymiar finansowy, ale także polityczny – odbudowuje jedność Europy
  i wzmacnia zdolność do wspólnego działania w obliczu zagrożeń. Wybory na Węgrzech
  są sygnałem, że demokracja nie przegrywa. Warszawa, Budapeszt, Bukareszt, czy Kiszyniów
  pokazują, że jest przyszłość dla demokracji w Europie Odbudowa zaufania między państwami
  członkowskimi jest warunkiem skutecznej polityki wobec Rosji i stabilności całego
  regionu. Podczas rozmów wyraźnie wybrzmiał temat bezpieczeństwa i roli Europy w
  systemie transatlantyckim. Nie możemy polegać tylko na deklaracjach i traktatach.
  Musimy polegać na praktycznych decyzjach, które dotyczą naszego bezpieczeństwa i
  - siłą rzeczy, muszą być europejskie, ale nie w kontrze do NATO Polska traktuje
  zobowiązania sojusznicze bardzo poważnie i oczekuje większego zaangażowania całej
  Europy. Chcę uświadomić europejskim liderom, że zagrożenie rosyjskie, to nie tylko
  wojna w Ukrainie. Ono realnie dotyczy całej Unii, nie tylko wschodniej flanki. Nie
  mamy więcej czasu Jeśli chcemy uniknąć agresywnych kroków ze strony Rosji musimy
  pokazać, że Europa i Polska są gotowe działać. Bardzo poważnie traktujemy wezwania
  Ameryki do tego, aby Europa wzięła na siebie ciężar obronności. Polska to robi i
  jest przykładem dla europejskich partnerów, ale chcę mieć pewność, że wszyscy będziemy
  gotowi do reakcji w razie potrzeby Premier zaznaczył, że kluczowa jest realna gotowość
  państw europejskich do wspólnego działania – nie tylko na poziomie deklaracji, ale
  także konkretnych decyzji i zdolności operacyjnych. Dostałem zapewnienie ze strony
  szefowej komisji i jej teamu, że zrobią wszystko, żeby ten polski pomysł na to,
  w jaki sposób wziąć pożyczkę, został uwzględniony. Chodzi o to, aby ta pożyczka
  nie wpływała na deficyt finansów publicznych w Polsce Rządowa propozycja zakłada,
  że pożyczka zostanie zaciągnięta przez Bank Gospodarstwa Krajowego  na rzecz Funduszu
  Wsparcia Sił Zbrojnych. Polska jest traktowana jako najważniejszy element mechanizmu
  SAFE. Wszyscy będą pracowali wspólnie z nami, żeby móc szybko i skutecznie wydać
  te środki Z kwotą w wysokości 43,7 mld euro Polska będzie największym beneficjentem
  programu. Finalny tekst umowy SAFE trafił dziś do europejskich stolic, w tym do
  Warszawy. To zakończenie etapu wielotygodniowych negocjacji pomiędzy krajami członkowskimi
  a Komisją Europejską. To dla nas bardzo ważne, żeby Europa skutecznie wspomagała
  tych, którzy są gotowi z nią współpracować i stabilizować sytuację na Bliskim Wschodzie
  Premier Donald Tusk poinformował również, że uprzedził Komisję Europejską o tym,
  że polski rząd zaskarży umowę z krajami Mercosur do Trybunału Sprawiedliwości UE.
