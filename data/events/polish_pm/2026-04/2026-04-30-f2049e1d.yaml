title: 'Premier: Solidarność całej koalicji bardzo nas wzmocniła'
text: Głosowanie w Sejmie potwierdziło spójność Koalicji 15 października. Jedność
  większości parlamentarnej pozwala na stabilne prowadzenie polityki państwa i realizację
  zaplanowanych reform. Nawet w trudnych okolicznościach, nawet przy tak masywnym
  ataku ze strony opozycji – Koalicja 15 października jest zjednoczona Stabilność
  polityczna pozostaje kluczowa dla skutecznego działania rządu i wdrażania długofalowych
  rozwiązań. Wystąpienie Pani Minister Hennig-Kloski obnażyło właściwie w 100% prawdziwe
  podłoże wniosku o wotum nieufności, hipokryzję tych, którzy ten wniosek złożyli
  Działania opozycji miały wymiar polityczny i nie dotyczyły realnej oceny pracy resortów.
  Sejmowe głosowanie oznacza dalszą realizację działań Ministerstwa Klimatu i Środowiska.
  Resort koncentruje się zarówno na nowych inwestycjach, jak i porządkowaniu problemów
  odziedziczonych po poprzednikach. Pani Minister Paulina Hennig-Kloska będzie dalej
  zarządzała swoim ministerstwem, niezależnie od intryg i nieodpowiedzialnych ataków
  opozycji Szef rządu zwrócił uwagę na skalę wyzwań, z którymi mierzy się resort.
  Przez lata wasza polityka środowiskowa i klimatyczna oraz wasi ministrowie i wiceministrowie
  kojarzyli się z zalewem śmieci z całej Europy, szczególnie z Niemiec. I dziś połowa
  pracy pani minister to właśnie usuwanie tych śmieci – zarówno metaforycznych, jak
  i faktycznych – po ośmiu latach waszych rządów Rząd koncentruje się na realnych
  działaniach – m.in. w obszarze środowiska, cen energii i walki z inflacją. Jak mówimy
  o cenach energii – naprawdę wspólnie robimy wszystko, żeby te ceny energii nie były
  aż tak dotkliwe, jak były za poprzednich rządów W ciągu 2,5 roku MKiŚ wdrożyło kluczowe
  rozwiązania w energetyce, ochronie środowiska i polityce klimatycznej. Obejmowały
  one m.in. pozyskanie środków unijnych, zwiększenie inwestycji w czystą energię,
  odroczenie systemu ETS2, działania na rzecz usuwania nielegalnych i niebezpiecznych
  odpadów, ochronę lasów oraz wzmocnienie bezpieczeństwa surowcowego państwa. Premier
  przypomniał, że już jego pierwsza rozmowa z Minister pokazała, że zależy jej na
  działaniach bez podziałów politycznych. Okazała się świetnym fachowcem, odpornym
  na ataki i zupełnie niewrażliwą osobą na polityczne pokusy Ministerstwo Zdrowia
  konsekwentnie realizuje długofalowy plan zmian. Jego celem jest nowoczesny, stabilny
  i bezpieczny dla pacjentów system budowany na lata, a nie do końca jednej kadencji.
  Ochrona zdrowia nie może być biciem głową w ścianę. Musimy działać w realiach i
  mądrzej wydawać pieniądze Premier wskazał także na znaczący wzrost finansowania
  systemu ochrony zdrowia. W 2019 roku na ochronę zdrowia poprzednia władza wydała
  102 mld zł, a my w 2025 roku grubo ponad 100% więcej, czyli 236 mld zł Zwiększone
  nakłady umożliwiły rozwój infrastruktury, inwestycje w kadry oraz wdrażanie nowych
  rozwiązań. Jednym z przykładów konkretnych efektów działań rządu jest program in
  vitro. 13 tysięcy dzieci urodziło się dzięki procedurze in vitro, którą blokowali
  poprzednicy w sposób nieludzki i cyniczny Program ten stanowi istotny element wsparcia
  dla rodzin oraz poprawy dostępności świadczeń zdrowotnych. W ochronie zdrowia zadania
  są wyłącznie trudne. Nie ma takiej ilości środków, która wystarczy na szybkie leczenie
  wszystkich przypadków. Polska nie jest tu wyjątkiem Fala dezinformacji i manipulacji
  wokół reform Ministerstwa Zdrowia tworzy społeczną nieufność wobec systemu ochrony
  zdrowia, uderza bezpośrednio w bezpieczeństwo pacjentów. Nie przyzwyczaimy się do
  kłamstwa, które tak często towarzyszy wypowiedziom PiS-u i Konfederacji Środki,
  które rząd ma do dyspozycji, należy zagospodarować jak najrozsądniej, przede wszystkim
  z punktu widzenia pacjenta. W tej sytuacji potrzebna jest współpraca, ponieważ ostatecznie
  decyzje dotyczą zdrowia dzieci, małżonków, rodziców i bliskich. Trzeba ochronić
  Polskę przed magikami i złodziejami, bo ci pchają się najbardziej do zarządzania
  systemem ochrony zdrowia, naoglądaliśmy się tego, co potrafi zrobić zdeprawowana
  władza – nie dopuścimy do tego System ochrony zdrowia wymaga uczciwego i odpowiedzialnego
  zarządzania, a publiczne pieniądze powinny być wydawane przede wszystkim z myślą
  o bezpieczeństwie pacjentów.
