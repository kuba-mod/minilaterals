title: Polska i Japonia zacieśniają współpracę w kluczowych sektorach gospodarki i
  bezpieczeństwa
text: Warszawa i Tokio wchodzą na najwyższy poziom współpracy, rozszerzając ją na
  kluczowe obszary – od polityki i gospodarki po bezpieczeństwo, inwestycje, handel,
  rolnictwo, sektor kosmiczny oraz naukę. Wynieśliśmy relacje polsko-japońskie do
  strategicznego, kompleksowego partnerstwa. Będziemy maksymalnie ułatwiać współpracę
  i działalność polskich firm w Japonii oraz japońskich w Polsce – podkreślił Premier
  Donald Tusk po spotkaniu z szefową japońskiego rządu Sanae Takaichi. W 2026 roku
  Polska weźmie udział w szczycie grupy G20 – elitarnego klubu 20. największych gospodarek
  świata, umacniając swoją pozycję w relacjach z Japonią. Dzisiaj, gdy staliśmy się
  niekwestionowanym liderem wzrostu gospodarczego i przeskoczyliśmy kilka epok w rozwoju
  cywilizacyjnym – możemy z dumą powiedzieć, że z Japonią jesteśmy równymi partnerami
  To moment, którym spełniają się oczekiwania wielu pokoleń Polaków. Kiedy byłem bardzo
  młodym człowiekiem, polskim marzeniem było zostać drugą Japonią. Byliście dla kilku
  generacji Polek i Polaków symbolem sukcesu, nowoczesności i wysokich aspiracji Zacieśnienie
  współpracy polsko-japońskiej otworzy nowe perspektywy rozwoju dla obu państw. Strategiczne
  współdziałanie Warszawy i Tokio będzie obejmowało wiele dziedzin życia gospodarczego
  i społecznego. Podczas wizyty podpisano kluczowe porozumienia i dokumenty, w tym
  umowę o zabezpieczeniu społecznym, memorandum o współpracy w rolnictwie oraz wspólne
  oświadczenie dotyczące potencjalnej współpracy cywilnej, jeśli chodzi o przestrzeń
  kosmiczną. Zakres naszej współpracy jest naprawdę niesamowity. Rozmawiałem o tym
  także ze środowiskami biznesu japońskiego. Ta współpraca, to od kosmosu po wołowinę,
  od energii nuklearnej po kolei dużych prędkości, od cyberbezpieczeństwa po sztuczną
  inteligencję W pogłębienie relacji Polski i Japonii będzie angażować się także szefowa
  japońskiego rządu Sanae Takaichi. Postanowiliśmy dalej wzmacniać naszą współpracę
  w wielu obszarach. Chodzi m.in. o współdziałanie w dziedzinie bezpieczeństwa, w
  tym przemysłu obronnego Wczoraj Prezes Rady Ministrów spotkał się w Ambasadzie RP
  z japońskimi parlamentarzystami, przedstawicielami biznesu i studentami polonistyki.
  Zainteresowanie Polską jest gigantyczne. Opinia o Polsce, jako najciekawszym rynku
  do inwestycji i państwie sukcesu naprawdę tutaj dotarła Szef rządu zapowiedział,
  że nasz kraj będzie wydawać najwięcej pieniędzy w Europie na inwestycje infrastrukturalne
  i energetykę. W samą energetykę Polska zainwestuje w ciągu najbliższych 10 lat prawie
  250 mld euro. Naprawdę staliśmy się potęgą gospodarczą Europy. Dysponujemy także
  jedną z najsilniejszych armii na kontynencie, a w tych trudnych czasach należymy
  do najbezpieczniejszych miejsc na świecie Rozwój strategicznej współpracy między
  Polską a Japonią stworzy nowe perspektywy w obszarach gospodarki, technologii i
  bezpieczeństwa obu państw. Wspólne oświadczenie Premier Japonii Sanae Takaichi oraz
  Premiera Rzeczypospolitej Polskiej Donalda Tuska
