title: Nowe otwarcie w stosunkach strategicznych Polski z Koreą Południową
text: Od wielu lat Polska i Korea Południowa budują bliskie relacje, zarówno w kontekście
  gospodarczym, jak i geopolitycznym. Dzięki naszej determinacji mogliśmy dzisiaj
  podnieść rangę naszych stosunków dwustronnych do poziomu wszechstronnego partnerstwa
  strategicznego – poinformował Premier Donald Tusk, po spotkaniu z Prezydentem Korei
  Południowej Lee Jae Myungiem. Kluczowym elementem naszych relacji jest współdziałanie
  w dziedzinie przemysłu militarnego. Siłą napędową polsko-koreańskich stosunków jest
  oczywiście współpraca przemysłów zbrojeniowych, którą chcemy kontynuować i wzmacniać
  w kierunku transferu technologii, polonizacji nabywanego uzbrojenia oraz przenoszenia
  części produkcji do naszego kraju Polska i Korea będą wspólnie dążyć do zrównoważenia
  relacji gospodarczych, aby oba państwa czerpały takie same korzyści ze współpracy.
  Cieszę się z perspektywy zwiększenia dostępu polskich produktów do rynku południowokoreańskiego,
  w tym dla eksportu naszej żywności. Będziemy nad tym pracować z pożytkiem dla obu
  naszych państw i narodów Na strategiczny charakter relacji między Warszawą a Seulem
  zwrócił uwagę Prezydent Korei Południowej Lee Jae Myung. „Przez blisko 37 lat Korea
  i Polska budują solidne i przyjazne stosunki oparte na współpracy w wielu dziedzinach
  – politycznej, gospodarczej, kulturalnej oraz dotyczącej wymiany osobowej. Polska
  stała się dla Korei jednym z pięciu największych partnerów handlowych wśród państw
  Unii Europejskiej” Relacje Polski i Korei Południowej wchodzą obecnie w nową fazę
  – bardziej ambitną i opartą na wspólnych interesach gospodarczych. Korea Południowa
  jest największym azjatyckim inwestorem w Polsce. Nasz kraj jest zainteresowany dalszym
  przyciąganiem koreańskiego kapitału. Osobiście zadbam o to, aby warunki dla tych
  inwestycji były optymalne. Obaj z Prezydentem uznaliśmy za zasadne wzmocnienie strategicznej
  współpracy w takich sektorach jak cyfryzacja, sztuczna inteligencja, półprzewodniki,
  eksploracja przestrzeni kosmicznej, a także w sektorze energetycznym, infrastruktury
  i transportu Oba kraje będą także przywiązywać dużą wagę do rozwijania współpracy
  dotyczącej kultury, nauki, oświaty oraz turystyki. Polska i Korea będą również wspierać
  się na arenie międzynarodowej. Polska w Europie, a Korea w Azji – będziemy wspólnie
  działać na rzecz stabilizacji sytuacji geopolitycznej. Żyjemy w czasach wielkich
  wstrząsów, naznaczonych wojnami i konfliktami. Musimy budować nowy ład międzynarodowy.
  Polska i Korea będą współpracować w celu zapewnienia stabilności tego nowego, wyłaniającego
  się świata Podczas wizyty w Seulu szef polskiego rządu spotkał się także z koreańskim
  Premierem Kim Min Seokiem i Przewodniczącym Zgromadzenia Narodowego Woo Won Shikiem.
  Rozmawiał  również z przedstawicielami koreańskich przedsiębiorstw i zrzeszeń biznesowych.
  Wspólne oświadczenie Republiki Korei i Rzeczypospolitej Polskiej
