title: Kryptoafera - w tle Zondacrypto i przelewy do polityków PiS i Konfederacji
text: Historia giełdy Zondacrypto od początku budziła wiele wątpliwości. Jej pierwszy
  założyciel zaginął i prawdopodobnie nie żyje. W 2022 r., pod nowym kierownictwem,
   firma odnotowała dynamiczny rozwój, któremu towarzyszyły powiązania z rosyjskim
  kapitałem i wpływami. Obecnie spółka sponsoruje wiele wydarzeń politycznych i społecznych
  w Polsce, w tym była strategicznym sponsorem Conservative Political Action Conference
  (CPAC) w Rzeszowie, związanej z kampanią prezydencką Karola Nawrockiego. Korzenie
  tej giełdy kryptowalut, która dzisiaj powoduje lęk tysięcy inwestorów, są wyjątkowo
  złowrogie. To jest zaginięcie lub najprawdopodobniej śmierć założyciela firmy, to
  są pieniądze mafii rosyjskiej i to jest wpływ rosyjskich służb Konsekwentne wetowanie
  przez Prezydenta rządowej ustawy regulującej rynek kryptowalut oraz poparcie tego
  stanowiska przez polityków opozycji może być postrzegane, jako działanie sprzyjające
  Zondacrypto. Upór Prezydenta, aby wetować ustawę, która mogła chronić Polaków przed
  nadużyciami albo utratą swoich pieniędzy oraz podtrzymywanie tego weta przez opozycję,
  to bezwstydne i jawne przyznanie się do tego, że grają na rzecz tej firmy. Nawet
  pomimo tego, że stoją za tym brudne rosyjskie pieniądze. Sytuacja budzi niepokój,
  ponieważ działania Prezydenta i opozycji są prowadzone w sposób jawny, mimo że nie
  brakuje wobec nich krytycznych ocen i wątpliwości. Sprawą Zondacrypto zajęła się
  już prokuratura, po zgłoszeniach od osób poszkodowanych. Działanie prokuratury było
  możliwe dopiero teraz, ponieważ nie mamy ustawy, która dawałaby narzędzia do ochrony
  inwestorów Według szacunków, w wyniku działania giełdy mogło ucierpieć nawet 30
  tys. osób. Aby wyjaśnić sprawę Zondacrypto, należy również przyjrzeć się działaniom
  poprzedniej prokuratury. Będziemy analizować, co sprawiło, że prokuratura kierowana
  przez pana Ziobrę prowadziła śledztwo w sprawie zaginięcia założyciela Zondacrypto
  w sposób nieudolny i ostatecznie nie doprowadziła go do rozstrzygnięcia. Ktoś bardzo
  konsekwentnie działał na rzecz promocji i ochrony tej firmy Szef rządu porównał
  sprawę Zondacrypto do afery SKOK-ów, gdy państwo musiało wspierać poszkodowanych,
  a także do sprawy Amber Gold i innych piramid finansowych, sugerując, że mechanizm
  działania może być podobny.
