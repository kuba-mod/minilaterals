title: Andrzej Poczobut uwolniony! „Witaj w polskim domu”
text: Andrzej Poczobut, dziennikarz, działacz mniejszości polskiej na Białorusi oraz
  obrońca praw człowieka, został dziś uwolniony z więzienia o zaostrzonym rygorze.
  Jego sprawa od lat budziła zainteresowanie opinii publicznej oraz była symbolem
  walki o wolność słowa i prawa obywatelskie. Wracam prosto z polsko – białoruskiej
  granicy. (…) Dzisiaj osiągnęliśmy to, do czego dążyliśmy przez ostatnie dwa lata
  - Andrzej Poczobut wrócił do kraju Powrót do wolności to efekt determinacji wielu
  osób oraz instytucji, które przez długi czas pracowały nad rozwiązaniem tej sprawy.
  Uwolnienie Andrzeja Poczobuta było możliwe dzięki ścisłej współpracy polskiej dyplomacji,
  służb specjalnych oraz partnerów międzynarodowych. Wymiana na polsko-białoruskiej
  granicy to finał trwającej dwa lata skomplikowanej dyplomatycznej gry, pełnej dramatycznych
  zwrotów akcji. Udało się dzięki świetnej pracy naszych służb, dyplomatów i prokuratury
  oraz wielkiej pomocy amerykańskich, rumuńskich i mołdawskich przyjaciół Szef rządu
  podkreślił również rolę polskich instytucji odpowiedzialnych za bezpieczeństwo państwa.
  Wszyscy powinniśmy się cieszyć z tego dnia. Chcę podkreślić kluczową rolę naszych
  służb - Agencji Wywiadu i Agencji Bezpieczeństwa Wewnętrznego oraz ministra Tomasza
  Siemoniaka. Wyrazy uznania należą się naszym dyplomatom oraz partnerom zagranicznym
  Współpraca międzynarodowa oraz konsekwentna presja dyplomatyczna pokazują skuteczność
  działań podejmowanych wobec reżimu w Mińsku. Andrzej Poczobut jest laureatem Nagrody
  Sacharowa Parlamentu Europejskiego i od lat angażował się w działania na rzecz praw
  człowieka. Jego uwolnienie ma znaczenie nie tylko dla Polski, ale także dla wszystkich,
  którzy opowiadają się za wolnością i demokracją. To dobry dzień dla Polski i Białorusinów,
  którzy marzą o wolności w swoim kraju. Jeszcze raz dziękuję wszystkim, dzięki którym
  było to możliwe Uwolnienie Poczobuta pokazuje, że wspólnota międzynarodowa może
  skutecznie reagować na naruszenia praw człowieka, a sankcje oraz działania dyplomatyczne
  przynoszą realne efekty. Polska będzie kontynuować działania na rzecz uwolnienia
  wszystkich więźniów politycznych na Białorusi oraz wspierać osoby represjonowane
  przez tamtejszy reżim. Andrzej Poczobut to bardzo zdeterminowany i odważny człowiek,
  który nie zamierza odpuszczać sprawy, dla której poświęcił wiele lat wolności. Może
  liczyć na naszą pełną pomoc, niezależnie od decyzji, jakie podejmie Dzisiaj na granicy
  polsko-białoruskiej doszło do wymiany symetrycznej 5 na 5. Jej celem było uwolnienie
  przede wszystkim Polaków i tych, którzy z Polską współpracowali.
