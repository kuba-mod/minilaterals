title: 'Premier o dwuznacznych powiązaniach wokół rynku kryptowalut: To akcja blokowania
  państwa polskiego'
text: Premier Donald Tusk przedstawił informacje, które otrzymał z Agencji Bezpieczeństwa
  Wewnętrznego, które pokazują przepływy pieniędzy i powiązania polityczne wokół rynku
  kryptowalut. Premier zaapelował do Marszałka Sejmu Włodzimierza Czarzastego o jak
  najszybsze głosowanie drugiego weta Prezydenta do tej ustawy. Nie jest moim zadaniem
  jest określać, co jest przestępstwem, a co jest tylko zachowaniem absolutnie niegodnym
  urzędników państwowych czy parlamentarzystów. Od tego jest prokurator generalny,
  który zainteresował się tą sprawą. Ale tak naprawdę najważniejsze jest, aby wyeliminować
  lub ograniczyć do minimum próby wpływania przez najbardziej zainteresowanych na
  ustanawianie prawa w Polsce w kwestii kryptowalut. Liczę tutaj bardzo na refleksję
  i zmianę stanowiska prezydenta, PiS-u i Konfederacji. Inaczej ten cień będzie nad
  wami już na zawsze Z informacji uzyskanych przez ABW wynika, że na przełomie października
  i listopada 2025 roku, miesiąc przed głosowaniem wniosku o odrzucenie pierwszego
  weta Prezydenta w sprawie regulacji rynku kryptowalut, Przemysław Kral, prezes zarządu
  Zondakrypto, dokonał wpłat na rzecz dwóch fundacji. 450 tysięcy złotych wpłacono
  na konto Fundacji Instytut Polski Suwerennej Zbigniewa Ziobro. Część z tych środków
  przeznaczono na obrońców Dariusza Mateckiego i księdza Michała Olszewskiego. Inna
  spółka związana z P. Kralem – Expo Service House – zrealizowała transakcję na rzecz
  fundacji posła Przemysława Wiplera. Była to kwota 70 tysięcy euro. Zondakrypto była
  także głównym sponsorem imprezy CPAC, imprezy prawicowych działaczy w trakcie kampanii
  prezydenckiej. Najważniejszymi uczestnikami tej imprezy byli prezydenci Andrzej
  Duda i Karol Nawrocki Szef rządu skomentował również grudniową deklarację ministra
  Zbigniewa Boguckiego z kancelarii prezydenta, który zapowiadał przygotowanie prezydenckiego
  projektu ustawy dotyczącej regulacji rynku kryptowalut. Nie rozumiem i chyba nikt
  nie rozumie, co się stało z inicjatywą zapowiedzianą w imieniu prezydenta Nawrockiego.
  Pan minister Bogucki tuż po głosowaniu nad wetem prezydenta powiedział, że w ciągu
  3 tygodni przygotują projekt ustawy. Minęło 100 dni Zawetowana dwukrotnie przez
  Prezydenta rządowa ustawa miała chronić Polki i Polaków przed zdarzeniami, które
  mogą dramatycznie zaważyć na ich portfelach. Premier podkreślił, że cały świat przyjął
  z ulgą i nadzieją informację o zawieszeniu ognia na Bliskim Wschodzie. Jedna rzecz
  jest absolutnie pewna - pokój, a nawet czasowe przerwanie ognia, zawsze jest lepsze
  od wojny Jednak mając na uwadze dotychczasowe zachowania zaangażowanych polityków,
  należy patrzeć z dużą ostrożnością na perspektywę nadchodzących tygodni. Kierując
  się odpowiedzialnością i interesem Polaków, nie zamierzamy rezygnować z programu
  Ceny Paliwa Niżej, w związku z przerwaniem walk na Bliskim Wschodzie. Będziemy ostrożnie
  analizowali sytuację i podejmowali odpowiedzialne decyzje tak, jak do teraz Dzięki
  mechanizmowi wprowadzonemu przez rząd paliwo w Polsce jest najtańsze w Europie.
  A maksymalna cena jest codziennie określana przez Ministra Energii. Premier odniósł
  się do także do projektów ustaw rozpatrywanych na posiedzeniu Rady Ministrów, w
  tym długo oczekiwanej ustawy o związku metropolitalnym pomorskim. To był bój wieloletni,
  jeśli chodzi o utworzenie metropolii. Ma to bardzo bezpośredni wpływ na życie ludzi
  Projekt przewiduje, że Gdańsk, Gdynia i Sopot, razem z powiązanymi gminami, utworzą
  związek metropolitalny. Rozwiązanie pozwoli samorządom lepiej koordynować działania
  w takich obszarach jak transport, planowanie przestrzenne czy ochrona środowiska.
  Jednym z postulatów środowisk uczniowskich, nauczycieli i rodziców było przyjęcie
  projektu ustawy powołującej  Rzecznika Praw Ucznia. Również uczniowie obecni podczas
  programu „Bez kitu” w TVN 24 z udziałem Premiera Donalda Tuska przypomnieli o potrzebie
  powołania takiej instytucji. Premier i Ministra Edukacji spotkali się z przedstawicielami
  środowiska w KPRM. Cieszę się, że udało nam się dotrzymać słowa Projekt tej ustawy
  precyzyjnie określa podstawowe prawa uczniów. Wśród nich m.in. prawo do równego
  traktowania, prawo do prywatności, prawo do sprawiedliwego oceniania oraz prawo
  do wolności od przemocy.
