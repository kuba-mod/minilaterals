title: Witamy w Europie! - Premier po zwycięstwie Pétera Magyara na Węgrzech
text: Wstępne wyniki wyborów na Węgrzech wskazują na historyczne zwycięstwo opozycji
  oraz porażkę rządu Viktora Orbána. Wszyscy się obawiali, że jest trend autorytarnych,
  skorumpowanych reżimów. Nie, tak nie jest. Najpierw Warszawa, później Bukareszt,
  Kiszyniów i teraz Budapeszt. Cieszę się, że ta część Europy pokazuje, że nie jesteśmy
  skazani na skorumpowane i autorytarne władze, bo rząd Victora Orbána stał się niestety
  takim, po wielu latach rządów Węgierskiej opozycji niezwykle trudno było wygrać
  wybory, ponieważ musiała mierzyć się z wieloma przeciwnościami politycznymi. To
  imponujące. To światło dla wszystkich, którzy nie wierzą we własne siły. Przeciwko
  Péterowi Magyarowi sprzysięgły się wszystkie możliwe moce, włącznie z naszym Prezydentem
  Nawrockim i prezesem Kaczyńskim, nie mówiąc o potężniejszych gościach. Każdy, kto
  wątpi w siebie, ma kapitalną lekcję tego, że zawsze trzeba wierzyć w wygraną i że
  wszystko jest możliwe Jeszcze przed wyborami Péter Magyar zapowiedział, że Polska
  będzie celem jego pierwszej wizyty zagranicznej. W ocenie Donalda Tuska relacje
  Warszawy z Budapesztem będą miały szczególny charakter.
