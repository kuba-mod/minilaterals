title: Local Content. Z korzyścią dla Polski
text: W czasie szybko postępujących zmian geopolitycznych oraz narastającego egoizmu
  gospodarczego państw, Polska powinna aktywnie dążyć do wzmocnienia swojej pozycji.
  Jednym z kluczowych narzędzi jest zwiększenie udziału krajowych przedsiębiorstw
  w zamówieniach publicznych. Nie ma już odwrotu od drogi repolonizacji naszego przemysłu
  i gospodarki. Potrzeba repolonizacji nosi nazwę Local Content – wyjaśnił Donald
  Tusk podczas wystąpienia w siedzibie firmy Apator w Ostaszewie, w województwie kujawsko-pomorskim.
  Idea Local Content w kontekście zamówień publicznych służy bezpośredniemu wsparciu
  krajowej gospodarki. Warto wybierać polskie, a nie zagraniczne. Wierzymy, że inwestowanie
  w krajowe przedsiębiorstwa, dobra kooperacja i synergia rodzimych firm, to prawdziwe
  koło zamachowe naszej gospodarki. Polska musi być tu pierwszym wyborem Istotne znaczenie
  ma również kwestia bezpieczeństwa państwa, m.in. poprzez skracanie łańcuchów dostaw
  i uniezależnianie się od niestabilnych partnerów zewnętrznych. Współczesne wyzwania,
  takie jak napięcia geopolityczne pokazują, jak łatwo może dochodzić do zakłóceń
  w globalnym handlu. Kiedy obserwujemy konsekwencje wojny w Ukrainie czy przebieg
  konfliktu na Bliskim Wschodzie widzimy wyraźnie, jak hasło suwerenności przekłada
  się na konkretne decyzje gospodarcze, które każą nam zadbać – w skali takiej, jak
  to jest tylko możliwe – o suwerenność łańcucha dostaw Koncepcja Local Content staje
  się nie tylko narzędziem wspierania krajowej gospodarki, lecz także kluczowym elementem
  budowania bezpieczeństwa ekonomicznego państwa. Rząd postanowił, że Local Content
  będzie systemowo wzmacniać polski przemysł, m.in. poprzez monitorowanie inwestycji
  publicznych, ocenę udziału krajowych firm oraz stworzenie kodeksu dobrych praktyk.
  Mówimy o wielkim przedsięwzięciu, jakim są nowe regulacje i rekomendacje, które
  złożą się na polski Local Content. To wszystko wymaga elastyczności i kreatywności,
  ale też determinacji. Wszędzie tam, gdzie będą zamawiane usługi i produkty, będziemy
  pilnowali i egzekwowali tę zasadę Local Content obejmie również jednostki samorządu
  terytorialnego, które w znacznym stopniu korzystają z zamówień publicznych. Będziemy
  prowadzić ranking samorządów, pewien system punktowania i wyceniania, dotyczący
  tego, kto realizuje Local Content. Będą z tego wyciągane konsekwencje. Każdy musi
  respektować nowe zasady. To ma być nasz wspólny obowiązek Szef rządu wskazał także
  przykład działań poprzedniego rządu, które było sprzeczne z zasadą Local Content.
  Nie jest patriotyzmem uleganie lobbystom i sprzedawanie ponad 400 stacji benzynowych
  Orbanowi, tak jak to miało miejsce kilka lat temu. Dziś widzimy, że te stacje trafiły
  do firmy, którą dysponuje polityk, najbliższy sojusznik Putina Nie można wspierać
  zagranicznej produkcji kosztem interesów Polski. Szacunek partnerów międzynarodowych
  rośnie, gdy nasz kraj twardo negocjuje i konsekwentnie dba o własny interes. Tak,
  będziemy egoistami. Będziemy dbali przede wszystkim o nasze. Kiedy rozmawialiśmy
  o zakupie śmigłowców Apache od amerykańskich przyjaciół usłyszałem, że z polskim
  Premierem negocjuje się równie trudno, jak z Prezydentem Trumpem. […] Nie ma już
  w Polsce frajerów. Są ludzie, którzy będą konsekwentnie i twardo dbali o nasz interes
  – właśnie w duchu idei Local Content i polskiego interesu narodowego Minister Aktywów
  Państwowych Wojciech Balczun ogłosił, że opublikowany zostanie kodeks dobrych praktyk
  dotyczący Local Content. Znajdą się tam rekomendacje i wytyczne dla spółek Skarbu
  Państwa, jak zwiększać Local Content, a także informacje, co i jak wprowadzić, aby
  krajowy przedsiębiorca miał szansę na kontrakt Aby przedsiębiorca mógł być uznany
  za podmiot krajowy w ramach Local Content, będzie musiał mieć w Polsce m.in. siedzibę,
  rezydencję podatkową, główny przedmiot działalności oraz min. 50 proc. obrotów.
  To powinno być uwzględnione przez zamawiających i w spółkach Skarbu Państwa, ale
  również w samorządach i przez wszystkich, którzy dysponują środkami publicznymi
  – zaznaczył Minister Aktywów Państwowych. Local Content będzie na bieżąco mierzony
  i monitorowany przez rząd we współpracy z Głównym Urzędem Statystycznym. Szef rządu
  odniósł się do sytuacji wokół Trybunału Konstytucyjnego i zaapelował do Prezydenta
  Karola Nawrockiego, aby wykazał, że traktuje Polskę jako wspólne zobowiązanie i
  odpowiedzialność. Spójność państwa, zdolność do kooperacji, szanowanie Konstytucji
  i przepisów – to środowisko prawne i polityczne, od którego w dużej mierze zależy
  sukces lub porażka tych wszystkich, którzy na co dzień działają w polskiej gospodarce
  Premier przytoczył również słowa byłego Prezydenta Andrzeja Dudy, który podkreślił,
  że Karol Nawrocki nie ma pola manewru i musi przyjąć ślubowanie wszystkich sędziów
  Trybunału Konstytucyjnego.
