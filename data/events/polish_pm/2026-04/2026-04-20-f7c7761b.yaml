title: Przyjaźń Polski i Francji jest trwała i oparta na solidnych fundamentach
text: Warszawa i Paryż prezentują zbliżone stanowisko wobec sytuacji geopolitycznej,
  podkreślając jej narastającą niestabilność, zwłaszcza w wymiarze strategicznym.
  „Tak samo postrzegamy potrzebę wzmocnienia suwerenności Europy i naszych państw.
  Chcemy konsekwentnie wspierać Ukrainę w jej oporze przeciwko agresji, a jednocześnie
  dbać o relacje transatlantyckie. Mamy determinację, by utrzymać je na możliwie dobrym
  poziomie.” Wobec szybko zmieniającej się sytuacji na świecie Europa potrzebuje jedności.
  „Pomoc Ukrainie, bezpieczeństwo wschodniej flanki, współpraca na rzecz cyberbezpieczeństwa,
  sztucznej inteligencji i nowoczesnych technologii – we wszystkich tych dziedzinach
  Europa musi uwierzyć we własne siły i możliwości. Nikt nam nie zapewni bezpieczeństwa,
  jeśli nie zrobimy tego sami” Przykładem solidarności między państwami była pomoc
  Francji we wrześniu 2025 r. podczas wtargnięcia rosyjskich dronów w polską przestrzeń
  powietrzną. „Zareagowaliście błyskawicznie, kiedy byliśmy ofiarą rosyjskiej prowokacji.
  W tym niepewnym momencie szybka reakcja Francji była jednoznaczna i potwierdziła,
  że NATO to jest coś bardzo konkretnego i że w trudnych chwilach można liczyć na
  europejskich sojuszników” Na aspekt wspólnego bezpieczeństwa zwrócił także uwagę
  Prezydent Emmanuel Macron. „Relacje polsko-francuskie są dziś na historycznym poziomie.
  To zaufanie będzie wzmacniane, ponieważ jest ono w interesie naszych krajów. Wolność
  Europy polega na zdolności do własnej obrony i niezależności krajów europejskich”
  Warszawa i Paryż zapowiadają dalsze zacieśnianie współpracy w kluczowych obszarach
  bezpieczeństwa i polityki europejskiej. Współpraca polsko-francuska przynosi efekty
  gospodarcze i wzmacnia potencjał obu państw. „Za nami bardzo obiecujące rozmowy
  dotyczące energetyki oraz współpracy militarnej i kosmicznej” W ostatnim czasie
  Polska staje się coraz bardziej atrakcyjnym partnerem dla Francji. „Jesteśmy państwem
  sukcesu. Rozwijamy się najszybciej w Europie i wydajemy najwięcej na zbrojenia.
  Oczekujemy partnerskich relacji w wymianie handlowej i wzajemnych inwestycjach w
  energetyce, przemyśle zbrojeniowym oraz infrastrukturze” Szef rządu przekazał, że
  Prezydent Francji wykazał zrozumienie dla polskiej polityki local content dotyczącej
  wspierania krajowego przemysłu. Istotnym obszarem współpracy polsko-francuskiej
  jest także ochrona dzieci i młodzieży przed uzależnieniem od internetu. „Będziemy
  tutaj ściśle współpracować, warto również wypracować rozwiązanie na poziomie europejskim”
  Współpraca Polski i Francji rozwija się dynamicznie i obejmuje coraz więcej obszarów.
  „Opracowaliśmy plan działań na najbliższe miesiące w dziedzinie bezpieczeństwa,
  energetyki jądrowej, kultury, mediów społecznościowych i sztucznej inteligencji.
  Będziemy kontynuować współpracę dla dobra Polski, Francji i Europy” – zadeklarował
  Prezydent Emmanuel Macron. Na szeroki zakres współpracy polsko-francuskiej zwrócił
  także uwagę Donald Tusk. „Mogę powiedzieć, że nasze współdziałanie, począwszy od
  tego nuklearnego, skończywszy na wspólnych ćwiczeniach wojskowych, to jest współpraca,
  która nie ma żadnych limitów” Podczas spotkania w Gdańsku podpisano wspólną deklarację
  w sprawie energii, list intencyjny dotyczący współpracy w obszarze telekomunikacji
  satelitarnej, a także porozumienie między Instytutem Francuskim, Instytutem Adama
  Mickiewicza oraz Instytutem Polskim w Paryżu w sprawie organizacji Sezonu Francja–Polska
  2027. Zwieńczeniem szczytu Polska-Francja była uroczystość wręczenia nagrody im.
  Bronisława Geremka za wkład w umacnianie relacji polsko-francuskich. Laureatem został
  aktor teatralny i filmowy Andrzej Seweryn. Wspólna deklaracja – I Polsko-Francuski
  Szczyt Międzyrządowy
