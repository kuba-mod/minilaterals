title: Ludzi dobrej woli jest więcej. Spokojnych Świąt!
text: '„Dziwny jest ten świat”. Słowa słynnej piosenki Czesława Niemena mogą być mottem
  dla czasu, w którym żyjemy. Już za chwilę przy świątecznych stołach będziemy komentować
  zaniepokojeni, czasem wręcz zaskoczeni, kolejne zdarzenia, które potwierdzają aktualność
  tych słów. Bo rzeczywiście każdy dzień przynosi nowe niespodzianki. Wokół nas, w
  miejscach najmniej spodziewanych, demokracja i porządek zmieniają się w skorumpowane
  autokracje, a chaos zastępuje umiarkowany ład. Podważane są odwieczne reguły i fundamenty
  naszej politycznej wspólnoty, a wielcy tego świata zaskakują nas najbardziej niedorzecznymi
  działaniami. I tylko wojna pozostaje tym samym niezmiennym złem co zawsze. Ten nowy
  ład a raczej nieład, rodzący się na naszych oczach, zaskakuje i niepokoi w równym
  stopniu starszych i młodszych z nas. I dlatego dziś, szczególnie dziś, właśnie w
  te święta popatrzmy na siebie i przypomnijmy sobie dalszy ciąg tej piosenki: „ludzi
  dobrej woli jest więcej i mocno wierzę w to, że ten świat nie zginie nigdy dzięki
  nim.” I nawet jeśli jesteście zmęczeni, zniechęceni i zaniepokojeni, nie traćcie
  wiary w samych siebie, swoich bliskich i w swój kraj. Kochani dużo miłości, ciepła
  i spokoju na święta. Dopóki jesteśmy razem nikt i nic nas nie złamie.'
