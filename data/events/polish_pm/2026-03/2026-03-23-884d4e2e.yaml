title: Polska i Norwegia wzmacniają partnerstwo strategiczne i militarne
text: Premier Donald Tusk spotkał się dziś z Premierem Królestwa Norwegii Jonasem
  Gahrem Størem w Ośrodku Szkolenia Poligonowego Wojsk Lądowych – Camp Jomsborg. Ten
  poligon jest symbolem współpracy państw nowego formatu, nad którym pracujemy od
  wielu miesięcy. My, Polacy, wiemy, jak ważne jest zacieśnianie współpracy obronnej
  wschodnio-północnej flanki NATO - powiedział Premier Donald Tusk na konferencji
  prasowej. Na terenie Ośrodka Szkolenia Poligonowego Wojsk Lądowych Dęba-Lipa znajduje
  się centrum szkoleniowe Camp Jomsborg – ośrodek szkoleniowy na potrzeby Sił Zbrojnych
  Ukrainy utworzony w ramach międzynarodowej inicjatywy przez Siły Zbrojne Norwegii.
  To właśnie w tym ośrodku szkolą się żołnierze ukraińscy i realizowana jest bezpośrednia
  pomoc na rzecz broniącej się przed rosyjską agresją Ukrainy. Chciałbym podziękować
  Tobie osobiście, polskiemu rządowi za udostępnienie tego obszaru dla działań nordycko-bałtyckich,
  za udostępnienie ośrodka szkolenia poligonowego do szkolenia tych żołnierzy, którzy
  bronią demokracji, wolności i integralności terytorialnej - zwrócił się do szefa
  polskiego rządu Premier Norwegii Jonas Gahr Støre. Jednym z omawianych dziś tematów
  było bezpieczeństwo w regionie, w tym dalsza koordynacja wsparcia dla Ukrainy oraz
  wzmocnienie współpracy w ramach NATO w obecnej sytuacji geopolitycznej. Polska i
  Norwegia wspólnie wspierają Ukrainę w obliczu rosyjskiej napaści. Stanowiska obu
  krajów dotyczące dozbrajania Europy i państw członkowskich NATO, czy korzyści ze
  współpracy militarnej i przemysłowej są dziś zbieżne. Niezwykle ważne są też wspólne
  projekty realizowane przez oba państwa. Mówiliśmy ostatnio bardzo dużo polskim systemie
  obrony przeciwrakietowej, o [systemie antydronowym] SAN. Robimy to wspólnie z naszymi
  przyjaciółmi norweskimi. To nie jest pierwsze przedsięwzięcie, gdzie firmy norweskie,
  technologia norweska współpracują z polskimi firmami, przemysłem zbrojeniowym na
  rzecz naszego bezpieczeństwa. Będziemy to kontynuować 30 stycznia br. powołano do
  życia konsorcjum, w skład którego wchodzą Polska Grupa Zbrojeniowa oraz norweska
  spółka Kongsberg Defence & Aerospace. Konsorcjum ma być odpowiedzialne za budowę
  systemu – dostarczenie 18 modułów bateryjnych systemów przeciwlotniczych z możliwością
  zwalczania bezzałogowych systemów powietrznych. Polska i Norwegia współpracują bez
  jakichkolwiek rys. Nie sądzę, żeby był kraj, z którym Norwegia zbliżyłaby się bardziej
  w ostatnich czterech latach niż z Polską na poziomie strategicznym, politycznym,
  na poziomie wartości Premier Donald Tusk zapowiedział, że Polska i Norwegia będą
  intensywnie pracowały nad pogłębieniem stosunków dwustronnych m.in. w obszarze bezpieczeństwa.
  Polska kończy prace nad nowym traktatem z Wielką Brytanią. Podpisaliśmy traktat
  z Francuzami, pracujemy nad pogłębieniem porozumienia z Niemcami. Rzeczą bardzo
  ważną jest natychmiastowe przystąpienie do pracy nad pogłębieniem, także formalnym,
  naszej współpracy między Polską a Norwegią Cieszę się, że dziś ustaliliśmy, że przechodzimy
  do intensywnych prac nad ustrukturyzowaniem i sformalizowaniem naszej strategicznej
  współpracy. Cieszę się, że będę mógł wspólnie z moimi zespołami w rządzie i z państwem
  współpracować - zapewnił Premier Norwegii Jonas Gahr Støre. Proces ten zostanie
  szybko sfinalizowany, a jego realizacja rozpoczyna się już dziś.
