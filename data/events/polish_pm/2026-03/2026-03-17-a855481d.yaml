title: Polska nie wyśle wojsk do Iranu. Priorytetem bezpieczeństwo i tania energia
text: 'Premier Donald Tusk uciął spekulacje dotyczące ewentualnego udziału naszego
  kraju w konflikcie na Bliskim Wschodzie, podkreślając, że taki scenariusz nie jest
  rozważany. Polska nie wyśle swoich wojsk do Iranu. Ten konflikt nie dotyczy bezpośrednio
  naszego bezpieczeństwa Nasze państwo koncentruje się obecnie na realizacji własnych
  zobowiązań sojuszniczych oraz wzmacnianiu swojego potencjału obronnego. Mamy inne
  zadania w ramach NATO – dotyczy to zarówno naszych sił lądowych, powietrznych, jak
  i morskich, które są ciągle w budowie Kluczowe znaczenie ma bezpieczeństwo regionu
  Morza Bałtyckiego, któremu powinny służyć m.in. nasze zasoby. Polskie stanowisko
  nie budzi wątpliwości wśród sojuszników, w tym USA. Polska walczy o dobre rozwiązania
  w ramach ETS Premier odniósł się do postulatów opozycji dotyczących wyjścia Polski
  z unijnego systemu ETS, czyli systemu handlu uprawnieniami do emisji CO₂. W odpowiedzi
  na pomysły pseudospecjalistów, dotyczące opuszczenia unijnych umów, zacytuję byłego
  Premiera Morawieckiego: „Wyjście z ETS nie jest możliwe w prawie europejskim. To
  proponują ci, którzy nie mają wiedzy albo mają złą wolę w tej kwestii Rząd podjął
  już działania, aby złagodzić skutki funkcjonowania systemu ETS oraz wpłynąć na stanowisko
  europejskich partnerów dotyczące dyskusji o ETS2. Podczas Rady Europejskiej, Polska
  będzie domagała się szczególnych rozwiązań, tak aby uwzględnić naszą sytuację, w
  której ETS negatywnie wpływa na ceny energii. Będziemy o to dalej walczyć. Na szczęście
  mamy dobrą ekipę, która potrafi to zrobić Jednocześnie Polska będzie rozwijać krajowe
  OZE, jako bezpieczne źródło energii, w przeciwieństwie do zależnej od importu ropy.
  Jeśli chodzi o „OZE-sroze”, to chcę uzmysłowić wszystkim sceptykom, że OZE jest
  najbardziej suwerennym źródłem energii, jakim dysponuje Polska. Ropa zawsze będzie
  musiała być importowana, co nas uzależnia Polska będzie dalej rozwijać odnawialne
  źródła energii, w tym energię wiatrową i słoneczną, które są bezpieczne, rozproszone
  i tanie. Nasz kraj rozpoczął już także rozwój energetyki jądrowej. Jutro w Gdańsku
  będziemy prezentować stanowisko rządu w sprawie przyszłości energii w Polsce. To
  wielkie wyzwanie, ale będziemy działać praktycznie, a naszym celem będzie dostępna
  i tania energia Równocześnie poinformował, że program Polska Zbrojna w ramach SAFE
  będzie realizowany, a środki z UE trafią do Polski, wspierając krajową obronność
  i przemysł zbrojeniowy.'
