title: 'Premier: bezpieczeństwo i energia są nierozłączne'
text: W ostatnich latach Polska staje się coraz ważniejszym centrum innowacji w energetyce,
  jednocześnie kształtując kierunki transformacji energetycznej dla innych krajów
  Unii Europejskiej. Gdańsk i Pomorze stały się centrum najnowocześniejszych technologii
  energetycznych, o których do niedawna mogliśmy tylko marzyć. To miejsce może stanowić
  wzór nie tylko w Polsce, ale i w całej Europie, jak inwestować po to, abyśmy byli
  bezpieczni energetycznie – ocenił Donald Tusk podczas konferencji PowerConnect Energy
  Summit. Dla bezpieczeństwa narodów kluczowe znaczenie mają energia, bezpieczne dostawy
  i akceptowalne ceny – pokazuje to wojna w Ukrainie oraz sytuacja na Bliskim Wschodzie.
  Dramat, jaki przeżywała Ukraina podczas zimy, koncentracja ataków agresora na infrastrukturę
  energetyczną, sytuacja w Cieśninie Ormuz oraz dramatyczne wahania na światowych
  rynkach energii potwierdzają, jak nierozłączne są ze sobą dwie kwestie – bezpieczeństwa
  i energii Wielkie inwestycje w bezpieczeństwo energetyczne podkreślają wagę utrzymania
  jedności świata Zachodu. Niedaleko stąd budujemy elektrownię jądrową, która będzie
  wspólnym dziełem polskich firm, europejskich pieniędzy oraz amerykańskich i kanadyjskich
  partnerów Nasz kraj konsekwentnie buduje swoją niezależność energetyczną, łącząc
  innowacje, inwestycje i współpracę międzynarodową. Polska w centrum europejskiej
  transformacji energetycznej Nasze państwo stało się największym w Europie placem
  budowy, realizując ambitne projekty w energetyce jądrowej, magazynach energii i
  farmach wiatrowych offshore. Rozwijamy także m.in. nowoczesne sieci przesyłowe,
  Naftoport, rafinerię oraz fabrykę baterii, która może stać się polską specjalizacją
  o zasięgu globalnym. Polska staje się niekwestionowanym mocarstwem gospodarczym.
  W ciągu najbliższej dekady zainwestujemy 1 bilion złotych w energetykę, infrastrukturę,
  linie przesyłowe i elektrownie Z tej kwoty m.in. ponad 220 mld zł ma zostać przeznaczonych
  na źródła odnawialne i magazyny energii, 234 mld zł – na dystrybucję, a 160 mld
  zł na energetykę jądrową. Nie ma drugiego kraju w Europie, który tak intensywnie
  zmieniałby swój sektor energetyczny. Polski rząd chce także zmieniać Europę, wskazując,
  że ceny i dostępność energii są kluczową barierą dla konkurencyjności gospodarki.
  Chodzi o bardziej elastyczne i realistyczne rozwiązania, które łączą bezpieczeństwo
  energetyczne z możliwie niskimi cenami energii. Wspólnie z grupą państw wystosowałem
  list do Komisji Europejskiej. To twardy manifest Polski, Włoch, Belgii, Austrii,
  Bułgarii, Słowacji, Grecji i innych państw, które skłonne są nas poprzeć, aby możliwa
  była kontynuacja darmowych uprawnień do emisji dla przemysłu, w tym polskiego. Chodzi
  o zmianę filozofii, aby każde unijne państwo mogło liczyć na specyficzne podejście
  Polska zasługuje na szczególne uznanie ze strony UE, bo podjęła bezprecedensowy
  program odchodzenia od kopalin, jako głównego źródła energii. Jednocześnie Premier
  wyraził nadzieję, że Europa już nigdy nie uzależni się od rosyjskiej ropy i gazu.
  Wobec wojny na Bliskim Wschodzie nie można rozluźniać sankcji ani wracać do współpracy
  energetycznej z Rosją. To jest kwestia naszej suwerenności, bezpieczeństwa oraz
  przetrwania całego Zachodu, Europy, Polski i wspólnoty transatlantyckiej Nasz kraj,
  stawiając na niezależność energetyczną i innowacje, wyznacza wzorce bezpieczeństwa
  i konkurencyjności dla całej Europy. Polska liderem transformacji energetycznej
  i nowoczesnych technologii Minister Energii Miłosz Motyka podkreślił, że transformacja
  energetyczna to nie zagrożenie dla polskiego przemysłu i obywateli, lecz szansa
  na większe bezpieczeństwo i niższe ceny. Polska jest już liderem w innowacjach technologicznych
  i rozwija także tę pozycję, jeśli chodzi o OZE oraz magazynowanie energii Minister
  Aktywów Państwowych Wojciech Balczun poinformował, że państwowe firmy będą realizować
  programy inwestycyjne związane z transformacją energetyczną o wartości setek miliardów
  złotych. Naszym zadaniem jest, aby beneficjentem wielkich projektów inwestycyjnych
  był polski biznes. To jest priorytet całego rządu Transformacja energetyczna staje
  się szansą dla Polski na bezpieczeństwo, niższe ceny energii i wzmocnienie pozycji
  krajowego przemysłu.
