title: 'Premier: Weto w sprawie SAFE byłoby niewybaczalnym błędem'
text: Premier Donald Tusk odniósł się do ewntualnego weta Prezydenta w sprawie ustawy
  o  SAFE. Polska włożyła wiele wysiłku w to, aby powstał program SAFE i żeby przekonać
  europejskich partnerów do tego, że obrona jest wspólnym obowiązkiem wszystkich państw.
  Dzięki temu możemy uzyskać blisko 200 mld zł - wyjaśniał Premier Donald Tusk przed
  posiedzeniem Rady Ministrów. Polska jest największym beneficjentem programu SAFE,
  a środki, które mogą do nas trafić, przewyższają cały budżet obronny Hiszpanii.
  Pieniądze mają zostać przeznaczone na realizację potrzeb wojska, wsparcie Policji
  i Straży Granicznej, ochronę cyberprzestrzeni oraz budowę systemów obrony powietrznej
  i przeciwdronowej. Jestem głęboko poruszony tym sygnałami. Nie jestem w stanie zrozumieć,
  jak można w sytuacji globalnych konfliktów i wojny przy naszej granicy myśleć o
  blokowaniu tego typu spraw jak SAFE. Niezależnie od tego, jakie to jest uderzające,
  my na pewno przygotujemy plan B Po posiedzeniu Rady Ministrów Premier spotkał się
  z generałami, aby omówić możliwe scenariusze działania w przypadku ewentualnego
  weta ustawy o SAFE. Jak zapewnił, rząd będzie dążył do tego, aby środki przeznaczone
  na rozwój polskich sił zbrojnych oraz przemysłu zbrojeniowego trafiły do Polski.
  Pieniądze te są oczekiwane w wielu miastach i zakładach pracy w całym kraju. Ewentualne
  obejście weta może jednak oznaczać dłuższy proces negocjacji i przekonywania partnerów
  międzynarodowych. Dziś ma odbyć się spotkanie Prezydenta Karola Nawrockiego z Premierem
  Donaldem Tuskiem, Wicepremierem Władysławem Kosiniakiem-Kamyszem oraz Ministrem
  Finansów i Gospodarki Andrzejem Domańskim. W rozmowach udział weźmie również Prezes
  Narodowego Banku Polskiego Adam Glapiński. Tematem spotkania będzie propozycja programu
  „Polski SAFE 0%” przedstawiona przez głowę państwa i Prezesa NBP. Mimo wielokrotnych
  próśb nie otrzymaliśmy do tej pory żadnej informacji na temat tego, jak miałby wyglądać
  wkład Narodowego Banku Polskiego w finansowanie  polskiego przemysłu zbrojnego i
  polskiej obrony Szef rządu wyraził nadzieję, że dzisiejsze rozmowy pozwolą poznać
  konkretne założenia. Dopiero po ich przedstawieniu rząd będzie mógł podjąć dalsze
  decyzje.
