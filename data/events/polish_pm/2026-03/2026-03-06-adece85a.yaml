title: Trwa ewakuacja Polaków z Bliskiego Wschodu. Pierwsze rządowe samoloty już wylądowały
text: Rząd, służby konsularne i wojsko czuwają nad ewakuacją Dziś nad ranem 109 Polaków
  z Bliskiego Wschodu bezpiecznie wylądowało w Warszawie na pokładzie samolotów Sił
  Powietrznych RP. Bardzo wiele osób ciężko pracuje, aby maksymalnie wykorzystać wszystkie
  możliwości. Od 1 marca ewakuowano ponad 2,8 tys. obywateli – czy to liniami cywilnymi,
  czy bezpośrednio przy pomocy naszych placówek W pomoc zaangażowane są służby konsularne
  oraz wojsko. Sytuacja jest monitorowana 24 godziny na dobę. Chodzi o to, aby jak
  najszybciej i najskuteczniej pomóc Polakom z terenów zagrożonych. Dotyczy to także
  miejsc, w których nasi obywatele utknęli z powodu braku tranzytu – głównie w dalekiej
  Azji Jednocześnie podkreślił, że w obecnych warunkach żaden kraj na świecie nie
  jest w stanie zapewnić wszystkim natychmiastowej i pełnej pomocy. Szef rządu poinformował
  także, że Unia Europejska jest gotowa współfinansować naszą akcję ewakuacyjną, jeśli
  na pokładzie polskich samolotów znajdą się także inni obywatele UE. Dla nas priorytetem
  są obywatele polscy, ale może to mieć także charakter koordynacji europejskiej.
  Wtedy całość akcji jest finansowana przez UE. Ona się naprawdę przydaje w takich
  sytuacjach. Nasi obywatele też będą mogli korzystać z tego mechanizmu w samolotach
  innych państw Wszystkie służby zaangażowane w ewakuację Polaków muszą przez cały
  czas pozostawać w najwyższej gotowości. Wicepremier, Minister Spraw Zagranicznych
  Radosław Sikorski poinformował, że służba dyplomatyczno-konsularna pracuje w trybie
  24-godzinnym. Codziennie zbiera się zespół zarządzania kryzysowego i praktycznie
  zakończyliśmy już ewakuację z Izraela, Jordanii i Libanu. Przy pomocy naszych konsuli
  Jordanię opuściło ok. 800 osób, a Izrael 360 osób Dzięki działaniom rządu i spotkaniom
  z branżą turystyczną odwoływane są już wycieczki turystyczne do regionu. Będziemy
  kontynuować apele do obywateli, aby przed każdym wyjazdem sprawdzali rekomendacje
  na stronie MSZ oraz korzystali ze sprawdzonych biur podróży i linii lotniczych –
  podkreślił Minister Spraw Zagranicznych. Minister Sportu i Turystyki Jakub Rutnicki
  zaznaczył, że rząd zabiega o maksymalne zwiększenie liczby lotów związanych z ewakuacją.
  Będziemy reagować tak, aby osoby mające problem z wydostaniem się z regionu mogły
  jak najszybciej wrócić do naszego kraju. W tej chwili priorytetem jest udrożnienie
  lotów do Polski ze Zjednoczonych Emiratów Arabskich Szef KPRM, Minister Jan Grabiec
  poinformował, że zgodnie z poleceniem Premiera, wszystkie samoloty rządowe zostały
  skierowane do dyspozycji akcji ewakuacyjnej. Jednocześnie zawieszono wszelkie loty
  VIP. Premier Donald Tusk zaapelował do Prezydenta Karola Nawrockiego i Prezesa Narodowego
  Banku Polskiego Adama Glapińskiego o jak najszybsze przedstawienie szczegółów dotyczących
  dodatkowych pieniędzy z banku centralnego na zbrojenia. Politykę trzeba odłożyć
  na bok. Z serdeczną niecierpliwością czekam na konkretne szczegóły. Jeśli Prezes
  NBP czy Prezydent, mają cokolwiek konkretnego do zaprezentowania w kwestii dodatkowych
  pieniędzy z NBP na przemysł zbrojeniowy, to proszę nie zwlekać ani się nie wahać
  Inicjatywa nie może być jednak alternatywą dla ustawy o SAFE, natomiast oba rozwiązania
  mogą się wzajemnie uzupełniać. Deklaruję pełną gotowość do współpracy. Gwarantuję,
  że zabierze nam to kilka godzin, żeby przekształcić inicjatywę w projekt ustawy.
  Jeśli dzisiaj dostanę materiał, to w poniedziałek w Sejmie będzie projekt dotyczący
  możliwości uchronienia tych środków Jak dodał, obecna sytuacja wymaga pełnej solidarności
  wszystkich instytucji państwa.
