title: 'Premier: Nie ma żadnego problemu, jeśli chodzi o zapasy paliwa w Polsce'
text: Premier Donald Tusk odniósł się do eskalacji konfliktu na Bliskim Wschodzie,
  która budzi duże obawy wśród Polaków. Po sobotnich atakach Stanów Zjednoczonych
  i Izraela na Iran oraz działaniach odwetowych, wiele krajów w regionie zamknęło
  przestrzeń powietrzną. Iran zapowiedział blokadę Cieśniny Ormuz, którą płynie nawet
  1/3 światowych dostaw ropy i gazu. Szczególne emocje budzi potencjalny brak paliw
  na stacjach benzynowych. Nie ma żadnego problemu, jeśli chodzi o zapasy paliwa w
  Polsce. Wojna nie ma bezpośredniego wpływu na dostawy ropy naftowej i innych paliw
  do Polski – powiedział Premier Donald Tusk przed posiedzeniem Rady Ministrów. Sytuacja
  w przypadku dostaw ropy naftowej i gazu ziemnego do Polski, wbrew temu co mówią
  politycy partii opozycyjnych, stabilna. ORLEN nie sprowadza ropy ani z Iranu, ani
  przez Cieśninę Ormuz, a struktura dostaw jest bezpieczna i przebiega bez zakłóceń.
  Trzeba mieć bardzo dużo złej woli, aby w sytuacji potężnego kryzysu geopolitycznego
  i wojen w kilku miejscach świata, bez żadnego powodu próbować destabilizować sytuację
  w naszym kraju Szef rządu odniósł się też do cen na stacjach paliw i działań państwa
  w tej sprawie. Spółki kontrolowane przez państwo będą miały na uwadze łagodzenie
  ewentualnych skutków podwyżek cen ropy na rynkach światowych ORLEN użyje dostępnych
  narzędzi, aby ewentualne skoki cen ropy na światowych giełdach nie odbiły się w
  sposób masowy i bardzo dotkliwy na cenach paliw w Polsce. Szef rządu odniósł się
  też do sytuacji Polaków przebywających na Bliskim Wschodzie, którzy z powodu zamkniętej
  przestrzeni powietrznej nie mogą wrócić do kraju. Jak podkreślił, skala jest duża
  – tylko w Zjednoczonych Emiratach Arabskich przebywa ok. 14 tys. obywateli RP. Nie
  mamy żadnych informacji ani danych, które wskazywałyby, że w jakikolwiek sposób
  ich bezpieczeństwo, życie czy zdrowie są zagrożone w związku z konfliktem Rząd jest
  przygotowany do podjęcia działań – wysłania samolotów. Ministerstwo Obrony Narodowej
  ma gotowe odpowiednie siły i środki. Polskie placówki, we współpracy z biurami podróży,
  sprawdzają, czy wszyscy obywatele są objęci opieką. Polacy, którzy byli zagrożeni
  bezpośrednio działaniami wojennymi zostali ewakuowani. Wszyscy polscy turyści -
  grupa ponad 480 osób z miejsc bezpośrednio zagrożonych działaniami wojennymi - otrzymali
  nasze regularne wsparcie i przy współpracy z biurami podróży opuścili Izrael, Jordanię
  i Liban. Są już w Polsce lub w drodze do kraju Od soboty, gdy pojawiły się pierwsze
  sygnały o tego typu zagrożeniach, w Ministerstwie Spraw Zagranicznych działa specjalny
  zespół zarządzania kryzysowego. Jego prace koordynuje Minister Sportu i Turystyki
  Jakub Rutnicki, a udział biorą także przedstawiciele Ministerstwa Obrony Narodowej,
  Ministerstwa Spraw Wewnętrznych i Administracji, Ministerstwa Infrastruktury oraz
  Minister Koordynator ds. Służb Specjalnych Tomasz Siemoniak. Apelujemy, aby śledzić
  wyłącznie oficjalne komunikaty rządowe i informacje przekazywane przez placówki
  konsularne, także na wypadek ewentualnej ewakuacji, jeśli napięcie w regionie będzie
  rosło. Polska prowadzi rozmowy z Francją i grupą najbliższych europejskich sojuszników
  w sprawie zaawansowanego programu odstraszania nuklearnego. Polska bardzo poważnie
  traktuje kwestie bezpieczeństwa nuklearnego. Sami inwestujemy bardzo dużo w przyszłe
  elektrownie jądrowe. Polska nie będzie chciała być pasywna, jeśli chodzi także o
  bezpieczeństwo nuklearne w kontekście militarnym. Będziemy współpracowali z naszymi
  sojusznikami, w tym z Francją Szef rządu jeszcze w marcu, podczas Szczytu Energii
  Atomowej w Paryżu będzie miał okazję rozmawiać o tym nie tylko z francuskim prezydentem,
  ale też z innymi europejskimi partnerami.
