title: Polska i Irlandia razem dla bezpieczeństwa Europy
text: Bezpieczeństwo w centrum współpracy Polski i Irlandii Polska i Irlandia są zgodne
  w kluczowych sprawach, zwłaszcza w kwestiach bezpieczeństwa. Mamy wspólny pogląd
  na sytuację za naszą wschodnią granicą. Polska i Irlandia jednoznacznie potępiają
  rosyjską agresję. To pokazuje, że bezpieczeństwo w kontekście sytuacji na Wschodzie
  jest wspólną kwestią europejską Warszawa i Dublin mają także podobny pogląd na temat
  rozszerzenia Unii Europejskiej. Chcemy to robić odpowiedzialnie, ostrożnie i we
  właściwym tempie. UE powinna rosnąć w siłę, stając się coraz większą i bardziej
  atrakcyjną Jak dodał, deregulacja, która była priorytetem polskiej prezydencji w
  Radzie Unii Europejskiej, będzie także priorytetem prezydencji irlandzkiej, która
  rozpocznie się 1 lipca 2026 roku. Na dobre relacje Polski i Irlandii zwrócił także
  uwagę Premier Micheál Martin. Nasze dwa narody łączą silne stosunki dwustronne.
  Mamy głębokie więzi międzyludzkie.  Polonia w Irlandii liczy ok. 120 tys. osób.
  Ta wspólnota stanowi bardzo ważną część naszej tkanki społecznej. Doceniamy talent,
  pasję i pracowitość Polaków Jak zapowiedział Micheál Martin, Dublin zdecydowanie
  wspiera Ukrainę i będzie kontynuować tę pomoc podczas swojej prezydencji w Radzie
  UE. Bezpieczeństwo energetyczne i konkurencyjna gospodarka W obliczu konfliktu na
  Bliskim Wschodzie kluczowa z punktu widzenia Polski i Europy jest kwestia wysokich
  ceny energii. Dlatego będziemy wspólnie pracować nad tym, aby w Polsce, Irlandii
  i całej UE ceny energii przestały być zagrożeniem dla konkurencyjności gospodarczej.
  Nie będziemy konkurencyjni przy tak wysokich poziomach cen Konkurencyjność gospodarcza
  będzie także jednym z priorytetów irlandzkiej prezydencji. Konkurencyjność to bezwzględnie
  konieczny warunek do tego, aby wyjść naprzeciw potrzebom ludzi, żeby inwestować
  w infrastrukturę i chronić obywateli przed zagrożeniami zewnętrznymi W kontekście
  współpracy gospodarczej pomiędzy Polską i Irlandią ważne jest także zwiększenie
  wymiany handlowej. Polska jest świetnym miejscem do inwestycji i bardzo atrakcyjnym
  partnerem gospodarczym, także jeśli chodzi o handel między naszymi państwami. Fakt,
  że tylu Polaków pracuje i mieszka w Irlandii, może być dodatkową zachętą, aby oba
  nasze narody były ze sobą tak blisko, jak to tylko możliwe Wspólne działania Polski
  i Irlandii pokazują, że bezpieczeństwo energetyczne i rozwój gospodarczy są priorytetami
  dla obu krajów.
