title: Rząd organizuje powrót Polaków z Bliskiego Wschodu
text: 'Priorytet: bezpieczny powrót Polaków do kraju Sytuacja na Bliskim Wschodzie
  pogarszała się stopniowo od kilku tygodni. Polski rząd kilkukrotnie ostrzegał przed
  możliwością wybuchu konfliktu zbrojnego i odradzał podróże do regionu. Ja sam kilka
  razy bardzo mocno zwracałem uwagę, żeby nie wybierać się w tamten rejon, w związku
  z zagrożeniem konfliktem. Ale stało się i niektórzy dokonywali takiego wyboru, bo
  nie mieli innego wyjścia. Więc musimy traktować wszystkich bez wyjątku jako naszych
  obywateli, którzy potrzebują w tej trudnej sytuacji pomocy państwa – koniec, kropka
  Ze względu na sytuację na Bliskim Wschodzie, rząd zdecydował o wysłaniu do Omanu
  transportu lotniczego, aby udzielić pomocy osobom wymagającym opieki ze względu
  na stan zdrowia. W ciągu kilkunastu godzin samolot z tym medycznym priorytetem powinien
  wylądować w Omanie. Tam m.in. oczekuje na transport poważnie chora Polka. Samolot
  poleci po chorych, ale w miarę możliwości ewakuujemy także każdego, kto będzie tego
  potrzebował Donald Tusk ocenił, że polskie przygotowania do akcji ewakuacyjnej są
  bardziej zaawansowane niż państw najbardziej zaangażowanych w konflikt. Jednocześnie
  szef rządu ponowił apel o niepodróżowanie na Bliski Wschód. Ciągle dość duże grupy
  decydują się na wylot turystyczny do państw regionu. Rząd nikomu nie może zakazać
  lotów w miejsca zagrożone konfliktem, ale jeśli ktoś naprawdę nie musi tam lecieć,
  to niech nie leci Jednocześnie premier zapewnił, że rządowe i wojskowe samoloty
  są gotowe do dalszej ewakuacji polskich obywateli, jednak sytuacja związana z wojną
  na Bliskim Wschodzie pozostaje nieprzewidywalna. Nie wszystkie lotniska w regionie
  są otwarte i czekają z otwartymi ramionami na polskie samoloty. W samych Emiratach
  jest 400 tys. obywateli UE, a ponad 10 tys. Amerykanów czeka na możliwość ewakuacji.
  Wszystkie państwa znalazły się obiektywnie w trudnej logistycznie sytuacji Szef
  rządu zaapelował, by Polacy przebywający w bezpiecznych miejscach, np. w hotelach
  w Dubaju, pozostali tam, dopóki nie otrzymają dokładnych informacji. Podczas posiedzenia
  zespołu koordynującego, Wicepremier, Minister Obrony Narodowej Władysław Kosiniak-Kamysz
  przedstawił najważniejsze informacje dotyczące gotowości wojska do wsparcia operacji
  ewakuacyjnej. Siły zbrojne są gotowe do udzielenia wszelkiej pomocy koniecznej do
  ewakuacji polskich obywateli z zagrożonych terenów. Możliwości transportowe są planowane,
  ale będą one podejmowane dopiero po upewnieniu się, że cała operacja będzie bezpieczna
  Wicepremier, Minister Spraw Zagranicznych Radosław Sikorski poinformował, że ewakuacja
  polskich obywateli z Izraela i Jordanii dobiega końca. Z obu krajów zostało przewiezionych
  drogą lądową do Egiptu ponad kilkaset osób. Władze Egiptu utrzymały otwartą przestrzeń
  powietrzną, a lotniska działają. Bardziej skomplikowana sytuacja jest w Libanie,
  ale największe skupisko naszych obywateli znajduje się w Zjednoczonych Emiratach
  Arabskich. Emiraty planują w najbliższych dniach wylot ok. 100 samolotów swoimi
  liniami i zabiegamy o to, aby jak największa część z nich przyleciała także do Warszawy
  Minister Sportu i Turystyki Jakub Rutnicki poinformował, że od wczoraj do Polski
  wróciło 574 osób z rejonu zagrożonego konfliktem. Obecnie koncentrujemy się na transporcie
  polskich obywateli ze Zjednoczonych Emiratów Arabskich do lotnisk w Omanie. Mamy
  zaplanowanych w tej chwili 6 połączeń z Omanem, dzięki czemu ok. 1 tys. obywateli
  wróci do Polski. Na przestrzeni kolejnych kilku dni do naszego kraju wróci bezpiecznie
  prawie 1,8 tys. Polaków Nasz narodowy przewoźnik – Polskie Linie Lotnicze LOT –
  wspiera małe biura podróży w sprowadzaniu polskich obywateli do naszego kraju. Na
  jutro zaplanowaliśmy lot samolotem do Sri Lanki, a dalej na Malediwy i stamtąd także
  zamierzamy sprowadzić naszych obywateli. Przedwczoraj sprowadziliśmy Polaków, którzy
  przebywali turystycznie w Izraelu i przemieścili się stamtąd do Kairu – przekazał
  Minister Infrastruktury Dariusz Klimczak. Do miejsc przesiadkowych, m.in. do Indii,
  skierowane zostały większe samoloty, aby zabrać pasażerów, którzy chcą wrócić do
  Polski. Kolejne loty tego typu będą także realizowane przy koordynacji z LOT.'
