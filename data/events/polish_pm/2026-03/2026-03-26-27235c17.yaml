title: Pakiet CPN, czyli „Ceny Paliwa Niżej”
text: Wojna na Bliskim Wschodzie spowodowała gwałtowny wzrost cen paliw na całym świecie,
  w tym w Polsce. W tej sytuacji rząd podejmuje rozwiązania, które ograniczą skutki
  kryzysu paliwowego i obniżą ceny na stacjach benzynowych. Jeszcze dziś, na nadzwyczajnym
  posiedzeniu, Rada Ministrów podejmie decyzje, aby ceny paliw w Polsce były możliwie
  najniższe Rozwiązanie jest możliwe dzięki rządowemu pakietowi CPN – „Ceny Paliwa
  Niżej”. Pamiętamy z przeszłości, że można było obniżać VAT i akcyzę, ale mimo to
  okazywało się, że końcowe ceny dla klienta nie tylko nie malały, ale nawet rosły.
  W związku z tym, nasz pakiet ma nie tylko uruchomić możliwości państwa, ale także
  uniemożliwić zarabianie na kieszeni polskich podatników i kierowców Jeżeli te propozycje
  zostaną zaakceptowane przez Parlament i podpisane przez Prezydenta najszybciej jak
  się da, to jeszcze przed Świętami Wielkanocnymi ceny na stacjach benzynowych spadną
  o ok. 1,2 zł na litrze każdego paliwa. Rządowy pakiet CPN przewiduje bezkompromisowe
  rozwiązania. Obniżymy stawkę VAT na paliwa z 23 proc. do 8 proc., a także akcyzę
  – do minimum wymaganego przepisami unijnymi, czyli o 29 groszy na benzynie i 28
  groszy na oleju napędowym Na czas obowiązywania obniżonych stawek VAT i akcyzy rząd
  wprowadzi także maksymalną cenę detaliczną paliw. Minister Energii będzie codziennie
  ustalał cenę maksymalną na podstawie wskaźników średniej ceny hurtowej oraz minimalnych
  kosztów operacyjnych. To jest rozwiązanie na czas kryzysu wojennego Rząd przygotowuje
  także kolejne rozwiązania, w tym podatek od nadmiarowych zysków koncernów naftowych,
  które korzystają na podwyżkach cen ropy. Sytuacja jest paradoksalna - im wyższe
  ceny na rynkach światowych, tym więcej ludzie płacą na stacjach benzynowych, ale
  ci, którzy działają w tym biznesie, mają większe zyski. Dlatego w takich przypadkach
  rząd również będzie reagować, wprowadzając podatek od nadmiarowych zysków koncernów
  Nowe rozwiązania powinny wejść w życie szybko – jeszcze przed Wielkanocą. Jestem
  przekonany, że wszystkie organy władzy państwowej, których zaangażowanie jest niezbędne
  w tym procesie, zrozumieją znaczenie tych zmian i że nie będziemy musieli czekać
  na odpowiednie decyzje i podpis Prezes Rady Ministrów zapowiedział ponadto, że nie
  przewiduje wprowadzania limitów sprzedaży paliwa na stacjach, chyba że pojawi się
  tzw. turystyka paliwowa – wówczas rząd podejmie odpowiednie działania.
