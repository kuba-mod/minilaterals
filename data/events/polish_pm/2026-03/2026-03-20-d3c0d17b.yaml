title: Europa zaczęła mówić językiem Polski w sprawie ETS
text: 'Przełom w Brukseli: zmiana podejścia do ETS i wsparcie dla Polski Podczas posiedzenia
  Rady Europejskiej w Brukseli unijni przywódcy uzgodnili zmiany w systemie handlu
  uprawnieniami do emisji CO2. Polska ma otrzymać wsparcie finansowe dla państw najbardziej
  obciążonych kosztami energii. Od wielu dni, wspólnie z Premier Włoch Giorgią Meloni
  przygotowywaliśmy linię postępowania, która miała skłonić najbardziej proklimatyczne
  państwa i Komisję Europejską do możliwie elastycznego podejścia w sprawie ETS Polska
  znajdzie się wśród państw objętych wsparciem z ETS, finansowanym ze środków uwolnionych
  z części uprawnień do emisji, które trafią do krajów najbardziej obciążonych wysokimi
  cenami energii. Zupełnie zmieniła się filozofia – powstała bardzo silna grupa państw,
  która skłoniła takie kraje jak np. Niemcy, aby nie kwestionowały potrzeby specyficznego
  podejścia do ETS. Udało się dokonać przełomu. To jest polityczna rewolucja w Unii
  Europejskiej Elastyczne podejście do ETS jest szczególnie ważne dla Polski, ponieważ
  system ten znacząco wpływa na ceny energii w naszym kraju. Udało się także uzyskać
  od Komisji Europejskiej deklarację przedłużenia o wiele lat okresu, w którym możliwe
  będzie przyznawanie bezpłatnych uprawnień dla przemysłu energochłonnego. Zostanie
  to potwierdzone najpóźniej do czerwca tego roku Decyzje unijnych liderów w Brukseli
  będą miały istotne znaczenie dla przyszłości polityki klimatycznej i konkurencyjności
  europejskiego przemysłu. Polska wzmacnia flankę wschodnią i wzywa do skupienia uwagi
  na Ukrainie Podczas unijnego szczytu Polsce udało się utrzymać flankę wschodnią
  jako jeden z kluczowych priorytetów obronnych UE. Z zadowoleniem przyjąłem także
  akceptację, aby w przyszłej perspektywie finansowej znalazły się dodatkowe środki
  dla regionów UE sąsiadujących z Rosją i Białorusią. Będzie to stanowić wymierną
  ulgę finansową dla naszych wschodnich województw Przywódcy UE dyskutowali również
  na temat migracji w kontekście konfliktu na Bliskim Wschodzie. Udało się przekonać
  Komisję Europejską i innych partnerów do jednoznacznego stwierdzenia, że UE nie
  powtórzy błędów z kryzysu migracyjnego z 2015 roku. Unia musi w sposób twardy i
  jednoznaczny bronić swojego terytorium i granic przed nielegalną migracją Donald
  Tusk powtórzył, że Polska nie powinna angażować się w wojnę w Iranie. My, jako Polacy,
  dźwigamy na naszych barkach poważny ciężar i odpowiedzialność – to ochrona granicy
  wschodniej Polski, Europy i NATO W interesie Polski jest utrzymanie uwagi świata
  na sytuacji w Ukrainie, ze względu na jej bezpośredni wpływ na bezpieczeństwo naszego
  kraju.'
