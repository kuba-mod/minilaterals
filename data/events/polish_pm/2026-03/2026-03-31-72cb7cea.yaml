title: Pakiet „Ceny Paliwa Niżej” działa
text: Premier Donald Tusk odniósł się do rządowego pakietu „Ceny Paliwa Niżej”, który
  wszedł w życie o północy z poniedziałku na wtorek. Skomentował pojawiające się wątpliwości,
  które – jak zaznaczył – są nieuzasadnione, w tym zarzut, że wprowadzone działania
  mają charakter nierynkowy i stanowią próbę regulowania cen przez państwo. Działamy
  w warunkach toczących się wojen, w tym wojny na Bliskim Wschodzie, która ma decydujący
  wpływ na ceny paliwa na świecie. Skoro działamy w warunkach wojennych, to musimy
  przyjąć pewne zasady, które są nadzwyczajne - i to jest regulacja nadzwyczajna,
  która ma na celu ochronę obywateli przed nieuzasadnionymi wzrostami cen Przyjęty
  pakiet CPN nie ma wpływu na ceny paliw kształtujące się na światowych giełdach.
  Rząd ma natomiast wpływ na to, w jaki sposób ograniczać i minimalizować ryzyka wynikające
  z wojny oraz działań niektórych państw i polityków destabilizujących globalny rynek.
  Rząd działa odpowiedzialnie. Rozwiązanie zostało przygotowane z uwzględnieniem bezpieczeństwa
  dostaw oraz stabilności finansowej spółek odpowiadających za paliwa na polskim rynku.
  Zbudowaliśmy mechanizm, który powoduje, że cena maksymalna, którą będziemy podawali
  codziennie, uwzględnia to, co dzieje się na rynkach światowych i ogranicza nieuprawnione
  zyski pośredników, hurtowników i spółek paliwowych W związku z wprowadzonymi rozwiązaniami
  ceny paliw mogą się każdego dnia nieznacznie wahać -  rosnąć lub spadać - w zależności
  od sytuacji na rynkach światowych. Jednak w okresie obowiązywania pakietu CPN będą
  one utrzymywane na możliwie najniższym poziomie. Zgodnie z opublikowanym wczoraj
  w Dzienniku Ustaw obwieszczeniu Ministra Energii, dzisiaj cena litra benzyny 95
  nie może przekroczyć 6,16 zł, benzyny 98 - 6,76 zł, a oleju napędowego - 7,60 zł.
  Szef rządu zwrócił się do ministrów, aby monitorowali tzw. turystykę paliwową a
  więc wyjazdy, szczególnie zza zachodniej granicy do Polski po tańsze paliwo. To
  jest w jakimś sensie najlepsza z możliwych recenzji naszego działania. Rzeczywiście
  u nas paliwo jest tak tanie, jak to tylko możliwe, co oznacza, że jest bardzo wyraźnie
  tańsze niż na przykład w Niemczech Rząd obserwuje tę kwestię. Na razie nie odnotowano
  masowości tego zjawiska. Szef rządu odniósł się również do informacji, że spółka
  Polskie Elektrownie Jądrowe złożyła wniosek do Prezesa Państwowej Agencji Atomistyki
  o zezwolenie na budowę pierwszej polskiej elektrowni jądrowej w gminie Choczewo
  na Pomorzu. To jest druga kluczowa decyzja. Żeby dać wyobrażenie o skali tego przedsięwzięcia,
  to powiem, że wniosek o wydanie zezwolenia na budowę to jest 40 tysięcy stron dokumentacji
  projektowej Dokument został złożony szybciej, niż pierwotnie planowano – aż sześć
  miesięcy przed terminem przewidzianym w harmonogramie. Premier Donald Tusk skomentował
  również przyjęty dziś przez Radę Ministrów projekt ustawy o systemach sztucznej
  inteligencji. Ma on na celu ochronę obywateli przed negatywnymi konsekwencjami i
  nadużyciami. To już nie jest lęk abstrakcyjny. Widać wyraźnie wszędzie na świecie,
  że sztuczna inteligencja może być wykorzystywana dla dobrych celów, ale może być
  także wykorzystywana przeciwko człowiekowi, jego dobremu imieniu, jego własności
  intelektualnej Polska jest jednym z pierwszych państw europejskich, które przygotowały
  tego typu regulacje. Rząd zamierza zadbać o to, aby przepisy chroniące obywateli
  przed negatywnymi skutkami stosowania sztucznej inteligencji nie hamowały rozwoju
  tego sektora.
