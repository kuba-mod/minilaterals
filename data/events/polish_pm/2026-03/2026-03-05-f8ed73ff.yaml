title: 'Premier: Nie ma czasu na kombinacje. Firmy zbrojeniowe czekają na pieniądze
  z polskiego programu SAFE'
text: W sprawie polskiego bezpieczeństwa nie ma czasu do stracenia Wszystkie krajowe
  firmy zbrojeniowe czekają na pieniądze z programu SAFE i są gotowe do rozpoczęcia
  produkcji. Te fabryki już pracują pod ten program. Ludzie projektują sprzęt, który
  będzie finansowany z SAFE. Te pieniądze są na stole. Do maja możemy zaplanować wydanie
  prawie 200 mld zł. Wokół trwa wojna. Sytuacja wymaga najwyższej powagi i odpowiedzialności.
  Nie ma mowy o politycznych gierkach Odnosząc się do propozycji alternatywnego programu
  zbrojeń, szef rządu przywołał list Prezesa NBP z grudnia 2025 roku. Wynika z niego,
  że strata NBP w 2024 roku przekroczyła 60 mld zł, a na koniec 2025 roku zbliżyła
  się do 100 mld zł. I co najważniejsze – pan Prezes napisał, że nie można wykluczyć
  straty NBP w kolejnych latach. Jak więc to wygląda? Dla rządu nie było pieniędzy
  z NBP, bo są gigantyczne straty, a nagle pojawiają się jakieś cudowne możliwości.
  Oczekujemy bardzo konkretnych i precyzyjnych informacji na ten temat, bo to są naprawdę
  poważne kwestie Szef rządu ponownie wezwał Karola Nawrockiego do szybkiego podpisania
  ustawy dotyczącej SAFE. Zwrócił się również do Adama Glapińskiego o przedstawienie
  dokładnych informacji na temat możliwości finansowych Narodowego Banku Polskiego.
  Dodał też, że polskie złoto przechowywane za granicą powinno wrócić do kraju.
