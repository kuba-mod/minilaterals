title: Polska i Niderlandy zacieśniają współpracę w sprawach bezpieczeństwa
text: Polskę i Holandię łączą dziś nie tylko wspólne interesy czy poglądy na sprawy
  międzynarodowe, ale także konkretne działania podejmowane wspólnie w ramach NATO.
  Premier Donald Tusk przypomniał o zaangażowaniu holenderskiego wojska we wrześniu
  2025 r. po ataku rosyjskich dronów, które naruszyły polską przestrzeń powietrzną.
  To właśnie holenderskie myśliwce F-35 zadziałały. My będziemy zawsze pamiętali tego
  odważnego, młodego holenderskiego pilota, który umiał podjąć decyzję wtedy, kiedy
  to było konieczne - powiedział Premier Donald Tusk we wspólnym oświadczeniu liderów
  po spotkaniu delegacji. Decyzja i działanie holenderskiego pilota były bardzo mocnym
  i jednoznacznym przykładem tego, jak należy postępować w takich sytuacjach. Chciałbym
  podziękować Niderlandom za obecność i zaangażowanie w ochronę wschodniej flanki
  NATO. Świadomość, że nasi sojusznicy stabilnie strzegą wschodniej granicy Polski,
  to ważny dla nas znak To szczególnie ważne w czasach geopolitycznych zawirowań i
  strategicznej niepewności, nie tylko w Ukrainie, ale i teraz na Bliskim Wschodzie.
  Polska odgrywa kluczową rolę w niesieniu pomocy Ukrainie. To – zdaniem holenderskiego
  Premiera – dowodzi silnej determinacji Polaków, by opierać się, gdy inne kraje używają
  siły i narzucają wolę swoim sąsiadom. My sami widzieliśmy to wtedy, kiedy polscy
  żołnierze starali się uwolnić Holandię w czasie pierwszej i drugiej wojny światowej.
  Osiemdziesiąt lat później, ta jakość staje się inspiracją i przykładem dla reszty
  Europy - oświadczył Premier Królestwa Niderlandów Rob Jetten. W odniesieniu do wojny
  w Ukrainie obaj liderzy podzielają pogląd, że w interesie Europy jest wspieranie
  tego kraju. Przegrana Ukrainy oznacza radykalny wzrost zagrożenia dla kontynentu.
  Warszawa jest jedną z pierwszych stolic, które odwiedził holenderski szef rządu,
  sprawujący swoją funkcję od 23 lutego br. To dowód na to, że relacje dwustronne
  są silne. W lipcu 2025 r. w Warszawie ministrowie obrony narodowej obydwu krajów
  podpisali "Memorandum o polsko-holenderskiej współpracy obronnej”. Nie jest zbiegiem
  okoliczności to, że odwiedzam Polskę tak szybko. Przez wiele lat wasz kraj stanowił
  przykład i wzorzec dla budowy silnej i bezpiecznej Europy, która może się bronić
  w sposób skuteczny. Jedno z kluczowych wyzwań, które przed nami dzisiaj stoi, jest
  właśnie takie Lipcowe memorandum dotyczy pogłębienia współpracy między Polską a
  Holandią w sektorze bezpieczeństwa i obronności, w tym sprzętu, technologii, logistyki
  oraz szkoleń personelu wojskowego. Będziemy nie tylko kontynuować, ale też pogłębiać
  naszą współpracę. Nawet, jeśli czasami mamy różnice zdań, to będziemy szukali cierpliwie
  rozwiązań, które będą korzystne i dla Holandii, i dla Polski. I na pewno znajdziemy
  takie rozwiązania W ramach memorandum polskie i holenderskie firmy będą mogły współpracować
  przy rozwoju przemysłu obronnego. To stworzy im nowe szanse na zwiększenie produkcji
  i wdrażanie nowoczesnych technologii wojskowych.
