title: 'Premier: To żołnierz najlepiej rozumie, jakim złem jest wojna i jakim dobrem
  jest pokój'
text: 'Premier Donald Tusk zwrócił się do obecnych w 1 Bazie Lotnictwa Transportowego
  z przesłaniem: Wielkanoc to czas, kiedy wszyscy myślimy o pokoju w naszym życiu
  codziennym i pokoju między narodami. To czas nadziei, którą symbolizuje Zmartwychwstanie.
  Słowa o potrzebie pokoju w gronie naszych żołnierzy mają szczególny sens. Nikt tak
  dobrze, jak żołnierz nie rozumie, jakim złem jest wojna i jakim dobrem jest pokój.
  To on ryzykuje swoim życiem. To on jest gotów oddać swoje życie za nasze wspólne
  bezpieczeństwo, za bezpieczeństwo granic, za Ojczyznę Wojna pozostaje dla nas rozwiązaniem
  ostatecznym – szczególnie w kontekście doświadczeń historycznych. Nasze dzieje jasno
  pokazują, jak wysoką cenę niesie konflikt i jak bezcenny jest pokój, który stanowi
  fundament bezpieczeństwa i rozwoju państwa. Premier Donald Tusk oraz Minister Obrony
  Narodowej, Wicepremier Władysław Kosiniak-Kamysz połączyli się dziś wirtualnie z
  żołnierzami pełniącymi służbę poza granicami kraju. Jesteśmy bardzo dumni z polskich
  żołnierzy. Cała Polska będzie o Was pamiętać w te świąteczne dni Polscy żołnierze
  służą na misjach na całym świecie – na rzecz Polski i naszych sojuszników. Wtedy,
  kiedy byłem w Iraku, kiedy byłem z Wami w Kosowie, wszędzie widziałem dumne, pełne
  odwagi i poświęcenia twarze Polek i Polaków w polskich mundurach W trakcie spotkania
  połączono się z wojskowymi z Polskich Kontyngentów Wojskowych, m.in. z misji UNIFIL,
  IRAK, KFOR czy IRINI, a także z żołnierzami zaangażowanymi w operacje krajowe: Bezpieczne
  Podlasie, Bezpieczny Zachód oraz Operację Horyzont. Dzisiejsze spotkanie było także
  okazją do podkreślenia potencjału polskiej armii. Tworzą ją doświadczeni dowódcy,
  profesjonalni żołnierze, a wzmacniają rekordowe w historii nakłady na obronność.
  To, że jesteśmy dziś rekordzistami w finansowaniu własnej armii w całym Pakcie Północnoatlantyckim,
  jest wysiłkiem całego naszego narodu Polacy dobrze rozumieją historyczną konieczność
  wzmacniania obronności. Polska armia będzie jedną z najnowocześniejszych i najlepiej
  wyposażonych w Europie – tak, aby zapewnić pokój i stabilność w regionie. Nie po
  to budujemy najsilniejszą armię w Europie, żeby korzystać przeciwko komuś z tych
  zdolności, ale żeby bronić naszych wartości, naszej sprawy, obronić Polskę przed
  tymi zagrożeniami. Wolność, pokój, niepodległość, suwerenność nie bronią się krzykiem,
  bronią się siłą - powiedział Wicepremier Władysław Kosiniak-Kamysz. Szef rządu zapowiedział,
  że zrobi wszystko, aby wojna nie stała się codziennością. Podkreślił, że Polska
  jest gotowa bronić się skutecznie i mądrze, a także prowadzić politykę, która nie
  dopuści do tego, by konflikt dotarł do naszego kraju. Aby wzmocnić obronność kraju,
  polski rząd tylko w tym roku przeznaczy na ten cel prawie 200 miliardów złotych.
  Polska jest na pierwszym miejscu pod względem zaangażowania w budowę sojuszniczego
  bezpieczeństwa, a przez to bezpieczeństwa naszej ojczyzny. Dajemy po prostu z siebie
  najwięcej. I tu podziękować należy wszystkim naszym rodakom. Wicepremier wskazał
  trzy kluczowe obszary rozwoju na najbliższe miesiące. Pierwszym jest budowa systemów
  dronowych i antydronowych – doświadczenia z konfliktów w Ukrainie i na Bliskim Wschodzie
  pokazują, jak bardzo zmieniło się pole walki. Drugim obszarem jest aktywność w przestrzeni
  kosmicznej oraz rozwój sztucznej inteligencji. Trzeci kierunek to zdolności dalekiego,
  precyzyjnego rażenia, które wzmacniają potencjał obrony. Nie odpuścimy żadnej złotówki
  na rzecz bezpieczeństwa państwa polskiego, bo czas jest najniebezpieczniejszy od
  zakończenia II wojny światowej. Nieroztropnością, wręcz zdradą, byłaby niemożliwość
  korzystania z tych środków, które są dzisiaj dostępne Zadeklarował, że resort obrony
  i rząd będą korzystać ze wszystkich możliwych i dostępnych środków, zarówno europejskich,
  jak i krajowych.'
