title: Propozycja NBP to „zero złotych”
text: Na rozwój naszego bezpieczeństwa możemy pozyskać z programu SAFE ponad 180 mld
  zł do natychmiastowej dyspozycji. Do polskiego przemysłu ma trafić aż 89 proc. środków,
  na czym zyska prawie 12 tys. krajowych firm. Polska włożyła wiele wysiłku, aby przekonać
  europejskich partnerów do współfinansowania naszego wojska. Miałem nadzieję, że
  dzisiejsze spotkanie z Prezydentem doprowadzi do jednoznacznej konkluzji. Generałowie,
  z którymi dzisiaj rozmawiałem, nie ukrywają, że liczy się już każda godzina Polska
  potrzebuje szybko pozyskać duże środki finansowe, aby przygotować naszą armię na
  ewentualne zagrożenia. Propozycja Prezydenta oraz Prezesa NBP to zero realnych środków.
  W tej chwili mamy tylko słowa i projekt ustawy, w którym nie ma pieniędzy – tylko
  nowa rada, biurokracja oraz dziesiątki niepotrzebnych przepisów Jeśli bank centralny
  jest w stanie osiągnąć zysk, powinien – zgodnie z prawem – przekazać go do budżetu
  państwa, a rząd przeznaczy te środki na bezpieczeństwo państwa. Zależy mi na tym,
  aby kwestie bezpieczeństwa były traktowane poważnie. Jestem gotów pracować nad każdą
  ustawą, która gwarantuje finansowanie polskiego przemysłu obronnego. Nie zgodzę
  się jednak na żadne manipulacje i polityczne gierki Jak dodał, liczy na szybki podpis
  Karola Nawrockiego pod ustawą o SAFE. Uprzedziłem Prezydenta, że jeśli nie będzie
  jego podpisu, to znajdziemy sposób, aby choć część tych pieniędzy trafiła do polskiej
  armii. Jestem rozczarowany tym, że nie znajdujemy zrozumienia w Pałacu Prezydenckim
  dla potrzeby szybkich decyzji w kwestii finansowania polskiego bezpieczeństwa. Liczę,
  że oczywisty interes narodowy weźmie górę nad polityczną grą Na wypadek weta Prezydenta
  rząd przygotuje uchwałę przewidującą wykorzystanie środków z programu SAFE na wojsko.
  Ma być gotowy jeszcze w tym tygodniu. Konsekwencją weta będzie jednak brak finansowania
  pozostałych elementów bezpieczeństwa Polski, takich jak dodatkowe środki na Straż
  Graniczną, Policję czy ochronę granicy wschodniej.
