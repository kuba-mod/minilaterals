title: 'Premier: W polskim interesie nie jest promowanie Orbana w jego prorosyjskich
  i antyunijnych działaniach'
text: Premier Donald Tusk odniósł się do spotkania Prezydenta Karola Nawrockiego z
  Premierem Węgier Victorem Orbanem. Na Węgrzech trwa obecnie kampania wyborcza, w
  której obecny premier Węgier ubiega się o reelekcję. Wizyta Prezydenta Karola Nawrockiego
  na Węgrzech odbyła się wbrew rekomendacji i opiniom polskiego rządu - poinformował
  szef rządu przed posiedzeniem Rady Ministrów. Polityka prowadzona przez węgierskiego
  lidera jest krytycznie oceniana przez polski rząd - jest sprzeczna zarówno z europejskimi
  interesami Polski, jak i jej interesami narodowymi. Wciąż czekamy na 2 mld zł zwrotu
  z European Peace Facility za sprzęt, który wysłaliśmy Ukrainie w pierwszych dniach
  wojny. To Premier Orban osobiście blokuje wypłatę tych pieniędzy dla Polski Błyskawiczna
  akcja Polski, podjęta niezwłocznie po rozpoczęciu rosyjskiej inwazji na Ukrainę
  umożliwiła jej przetrwanie najcięższych tygodni. Unia Europejska uznała, że państwa,
  które w tym kluczowym czasie niosły największe ciężary, powinny otrzymać zwrot kosztów.
  Innym przykładem działań węgierskiego rządu, które są sprzeczne z polską racją stanu,
  jest blokada 90 mln euro pomocy dla Ukrainy. Taka decyzja może negatywnie wpłynąć
  na geopolityczną sytuację regionu, w tym Polski. To Premier Orban zablokował 90
  mld euro pożyczki dla Ukrainy. Ze względu na skomplikowaną politykę USA wobec Ukrainy,
  ta pożyczka może przeważyć o losie tej wojny i bezpieczeństwie naszego regionu,
  szczególnie Polski Viktor Orban jako jedyny w Unii Europejskiej zdecydował się zablokować
  udzielenie europejskiej pożyczki w sytuacji, w której te pieniądze prawdopodobnie
  rozstrzygną o losach całej wojny. Środki te mają charakter zwrotny. Ukraina ma je
  spłacić po zakończeniu wojny. Szef rządu odniósł się również do informacji „The
  Washington Post”, że dyplomaci węgierscy, najbliżsi pracownicy Victora Orbana, ściśle
  współpracują z władzami rosyjskimi, przekazując im informacje z posiedzeń instytucji
  europejskich. Węgierski premier od początku inwazji Rosji na Ukrainę sam spotykał
  się kilkukrotnie z Władimirem Putinem. Litwa prosiła o wykluczenie delegacji węgierskiej
  na spotkaniu NATO, informując, że są podejrzenia, że delegacja węgierska przekaże
  informacje o najwyższym statusie dyskrecji do Moskwy „The Washington Post”, powołując
  się na źródła w zachodnich służbach wywiadowczych i raportach, napisał, że Péter
  Szijjártó regularnie konsultował się z Siergiejem Ławrowem i przekazywał Rosjanom
  informacje z rozmów prowadzonych na forum Unii Europejskiej. Jeden z europejskich
  urzędników ds. bezpieczeństwa powiedział gazecie, że przez takie działania „każde
  spotkanie UE od lat odbywa się praktycznie z Moskwą przy stole”. Premier Orban od
  samego początku wojny w Ukrainie bardzo konsekwentnie przeciwdziałał nowej energetycznej
  polityce Unii Europejskiej. Współpraca energetyczna Premiera Orbana i Moskwy jest
  konsekwentna i na wielu polach. To jest nie tylko ropa, to jest także energetyka
  jądrowa. To, co w tej chwili najbardziej uderzające, to próby Premiera Orbana przywrócenia
  normalnego biznesu z Rosją, jeśli chodzi o energetykę Nowa energetyczna polityka
  UE została wytyczona w dużej mierze dzięki polskim staraniom i na podstawie polskich
  rekomendacji. Premier Donald Tusk przypomniał również o ingerencji węgierskiego
  rządu w polskie sprawy. Na Węgrzech ukrywają się byli ministrowie w rządzie PiS.
  Premier Orban zdecydował o ukryciu ściganych przez polski wymiar sprawiedliwości
  obywateli, co jest krokiem wymierzonym jednoznacznie przeciwko polskim interesom
  Węgierski rząd jest przykładem łamania standardów prawnych i antykorupcyjnych. Polityka
  Viktora Orbana jest krytykowana za ograniczanie mechanizmów kontroli, w tym roli
  niezależnych mediów i sądownictwa, a w konsekwencji także za utrudnianie nadzoru
  ze strony unijnych instytucji.
