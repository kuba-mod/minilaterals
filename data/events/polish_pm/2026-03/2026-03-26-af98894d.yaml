title: Tańsze paliwo dla Polaków - rząd przyjął pakiet CPN
text: W ostatnich tygodniach, w związku z sytuacją na Bliskim Wschodzie, ceny ropy
  wzrosły o około 45%, oleju napędowego o ponad 40%, a benzyny o około 25%. Ten globalny
  wzrost cen paliw jest istotnym obciążeniem dla budżetów polskich rodzin. W odpowiedzi
  na to rząd wprowadza pakiet CPN, czyli „Ceny Paliwa Niżej”. Pracowaliśmy nad tym
  pewien czas tak, aby wszystkie propozycje przygotowane przez konkretne resorty były
  propozycjami odpowiedzialnymi. Musimy równocześnie zadbać o możliwie najniższe ceny
  paliw z punktu widzenia klienta i aby przy tej okazji nikt nie zarobił na kieszeni
  Polaków Dzięki przyjęciu pakietu ustaw, państwo będzie mogło szybko reagować na
  zmiany i ograniczać wstrząsy, zapewniając możliwie największą stabilność cen. Chcieliśmy
  uniknąć błędów czy negatywnych konsekwencji, bo takie obserwowaliśmy w niektórych
  państwach. Tak aby narzędzia, jakie przygotowaliśmy, przyniosły efekt końcowy przez
  nas pożądany, czyli ochronę klienta, a nie ochronę koncernu Szef rządu podkreślił,
  że Polska jest zabezpieczona i nie ma ryzyka, aby paliwa zabrakło. Rząd wprowadza
  najsilniejszy w Europie pakiet obniżek cen paliw Rząd podjął decyzję o obniżeniu
  niektórych podatków, aby ceny na stacjach były wyraźnie niższe. Obniżamy VAT na
  paliwa z 23% na 8%, obniżamy akcyzę do minimalnych dopuszczalnych poziomów - te
  działania powinny przynieść niższe ceny paliw o około 1,20 zł na litrze - zapowiedział
  Minister Finansów i Gospodarki Andrzej Domański. Akcyza zostanie obniżona do minimum
  wymaganego przepisami unijnymi – na benzynę o 29 groszy, a na olej napędowy o 28
  groszy. Wszystkie te działania mają czasowy charakter. Rząd będzie dostosowywał
  stawki akcyzy oraz podatku VAT do zmieniającej się sytuacji na rynku. Są to z punktu
  widzenia budżetu poważne wydatki. Dlatego podejmujemy prace na rzecz wprowadzenia
  specjalnego podatku od nadmiarowych zysków, zwanego popularnie windfall [tax], tak
  aby te podmioty, które mają ponadwymiarowe zyski zapłaciły wyższy podatek Dodatkowo
  rząd, w drodze obwieszczenia Ministra Energii, wprowadza mechanizm ceny maksymalnej,
  wyznaczanej na podstawie średnich cen hurtowych największych sprzedawców, powiększonych
  o koszty operacyjne. Te działania w swojej skali są działaniami najmocniejszymi,
  największymi z punktu widzenia wszystkich państw europejskich - powiedział Minister
  Energii Miłosz Motyka. Celem tego rozwiązania jest zagwarantowanie, że obniżki podatków
  będą w pełni odczuwalne w cenach detalicznych paliw i realnie przełożą się na niższe
  ceny na stacjach. Stabilizująca rola Orlenu na polskim rynku paliwowym Grupa Orlen,
  jako lider rynku pod względem sprzedaży hurtowej i detalicznej, od początku kryzysu
  podejmowała szereg działań mających na celu ochronę interesów konsumentów, m.in.
  poprzez minimalizację marży detalicznej oraz promocje na stacjach. Grupa Orlen odegra
  kluczową rolę stabilizującą rynek paliwowy w Polsce i wspierającą realizację celów
  polityki państwa, jeśli chodzi o ochronę konsumentów. Działamy prospołecznie - lider
  rynku wyznacza tak naprawdę trendy, więc jesteśmy tutaj spokojni - mówił Minister
  Aktywów Państwowych Wojciech Balczun. Proces legislacyjny będzie szybki. Pakiet
  przyjętych dziś ustaw trafił do Sejmu. Jutro zostanie poddany pod głosowanie parlamentu,
  a następnie przekazany do podpisu Prezydenta.
