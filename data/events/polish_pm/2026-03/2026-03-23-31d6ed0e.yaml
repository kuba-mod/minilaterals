title: Offset 96 śmigłowców Apache - twarde decyzje w interesie Polski
text: Dziś w Wojskowych Zakładach Lotniczych nr 1 w Łodzi zostały podpisane umowy
  wykonawcze umów offsetowych programu AH-64E Apache Guardian między WZL 1 a amerykańskim
  koncernem zbrojeniowym Lockheed Martin, co umożliwi realizację największego w Polsce
  offsetowego programu zbrojeniowego o wartości ok. 10,8 mld dolarów. Polska potrafiła
  serdecznie, przyjacielsko, ale też twardo negocjować elementy tego kontraktu. To
  jest zasada, jaką przyjęliśmy. (…) We własnym interesie trzeba negocjować twardo,
  trzeba stawiać sprawy jasno. Zadaniem polskiego rządu jest pilnować polskiego bezpieczeństwa
  i polskich interesów W 2024 roku Polska podpisała umowę na zakup 96 śmigłowców AH-64E
  Apache Guardian. Pierwsze maszyny przylecą do Polski w 2028 r., ostatni śmigłowiec
  dotrze dwa lata później. 96 Apache, jeden z najważniejszych kontraktów i chyba jednorazowo
  największy w historii kontrakt, jaki został podpisany przez Rzeczpospolitą jest
  naszym udziałem. To się działo 13 sierpnia 2024 roku, kiedy nasz rząd już prowadził
  politykę modernizacji i  transformacji polskiej armii - powiedział Wicepremier,
  Minister Obrony Narodowej Władysław Kosiniak-Kamysz. Apache to wielka szansa nie
  tylko dla naszej obronności, ale także dla tych konkretnych zakładów. Łączna wartość
  podpisanych dziś umów to ok. 300 mln zł. Formalnie otworzą one proces wdrażania
  technologii i rozpoczęcia budowy pełnego zaplecza specjalistycznego śmigłowców Apache
  w Wojskowych Zakładach Lotniczych nr 1 Łodzi. Bez takich umów wykonawczych, bez
  takich zdolności, które WZL osiągnie, pewne części musielibyśmy wysyłać do Stanów
  Zjednoczonych. A my teraz przylecimy do Łodzi się serwisować i zajmie nam to naprawdę
  szybciej, niż to by było w relacji ze Stanami Zjednoczonymi - wyjaśniał pułkownik
  pilot Krzysztof Kwiatkowski, szef Oddziału Śmigłowcowego Lotnictwa Bojowego w Zarządzie
  Lotnictwa Śmigłowcowego Dowództwa Generalnego Rodzajów Sił Zbrojnych. Szef rządu
  odniósł się do decyzji rządu PiS o zerwaniu umowy na zakup wielozadaniowych śmigłowców
  Caracal, wskazując, że w konsekwencji kosztowało to Polskę 80 mln zł kary. Przyjąłem
  zasadę, że Polska nie będzie zrywać kontraktów z żadnym z sojuszników i będziemy
  twardo negocjować w interesie polskiego bezpieczeństwa, polskich firm i obywateli
  Z kolei szef resortu obrony przypomniał, że śmigłowce te mogły już od dawna służyć
  w Wojsku Polskim. Śmigłowce wielozadaniowe w pełnej skali mogły już od dawna służyć
  w Wojsku Polskim. Mogliśmy mieć dużo więcej przygotowanych pilotów śmigłowców, personel
  naziemny, gdyby kontrakt na Caracale przez naszych poprzedników nie został zerwany.
  My takich błędów nie popełniamy - zapewnił Wicepremier Władysław Kosiniak-Kamysz.
  Rząd naprawia błędy poprzedników. Nie zrywa zawartych już umów ani podjętych zobowiązań.
  Szef rządu odniósł się również do towarzyszących tego typu kontraktom obaw i spekulacji,
  czy wobec trwającej wojny, a także potencjalnych przyszłych zagrożeń, to właściwa
  odpowiedź na takie wyzwania. Odpowiedź jest jednoznaczna. Tak, dzięki amerykańskim
  Apaczom, które będą serwisowane w Polsce, Polska będzie przygotowana do odparcia
  ataku na współczesnym polu walki. Będzie w stanie odpowiedzieć na współczesne zagrożenia
  Śmigłowce Apache 64 E Guardian przeznaczone są przede wszystkim do wsparcia działań
  wojsk lądowych. Obejmują także wsparcie systemu obrony powietrznej. Polska będzie
  drugim krajem po USA, który będzie posiadał największą liczbę tych maszyn. Niektórzy
  się zastanawiają, czy to nie jest przeszarżowanie, czy to nie jest nadmierna inwestycja.
  Ona wynika z potrzeb i ze strategii rozwoju Sił Zbrojnych Rzeczypospolitej. Apache
  towarzyszą wojskom lądowym. My budujemy największą armię wojsk lądowych w Europie
  - przypomniał Wicepremier Władysław Kosiniak-Kamysz. Pod tym względem Polska już
  dziś zajmuje w tej części świata drugie miejsce (po Turcji), a całym NATO – trzecie.
  Śmigłowce, wkomponowane w całość systemu rażenia Sił Zbrojnych RP, będą też współdziałały
  z najnowszą wersją czołgów ABRAMS. Szef rządu podkreślił, że decyzje dotyczące bezpieczeństwa
  Polski podejmowane są przede wszystkim w interesie Polek i Polaków. Przykładem jest
  projekt Polska Zbrojna oraz program SAFE, oparty na korzystnych europejskich kredytach.
  Rozwiązania te wzmacniają możliwości finansowe państwa i pozwalają uwolnić środki
  z innych części budżetu, przy jednoczesnym utrzymaniu ścisłej współpracy ze Stanami
  Zjednoczonymi. Nie ma żadnego konfliktu interesów pomiędzy państwami NATO. Polska,
  Europa, Stany Zjednoczone to jedna rodzina i jedna wspólnota. Ten kontrakt, podobnie
  jak program Polska Zbrojna i pożyczka SAFE służą bezpieczeństwu i współpracy wszystkich
  uczestników Sojuszu Wicepremier Władysław Kosiniak-Kamysz zapowiedział wprowadzenie
  programu SAFE. Zrealizujemy program SAFE, podpiszemy wszystkie kontrakty i wypełnimy
  wszystkie zobowiązania. Nie zmarnujemy żadnej szansy, która wzmocni bezpieczeństwo
  Polski Polska skutecznie broni dziś swoich interesów – działa z godnością, nie na
  kolanach, opierając się na rzetelnym rozpoznaniu i jasnej ocenie, na kim może polegać,
  a kto stanowi zagrożenie.
