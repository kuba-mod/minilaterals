title: Weto nas nie zatrzyma. Zrealizujemy program Polska Zbrojna
text: Prezydent utrudnił, ale nie zatrzymał modernizacji armii Prezydent poinformował
  wczoraj w orędziu o zawetowaniu ustawy o SAFE. Ludzie zastanawiają się dzisiaj,
  czy decyzja Prezydenta to zdrada, działanie lobbystów czy brak zdrowego rozsądku.
  Jedno jest pewne – brak podpisu Prezydenta jest poważnym utrudnieniem w realizacji
  programu modernizacji polskiej armii Prezes Rady Ministrów podkreślił, że mimo weta
  rząd będzie kontynuował działania na rzecz realizacji programu SAFE i zabezpieczenia
  środków dla bezpieczeństwa Polski. Pieniądze nie przepadną, bo rząd rozpoczyna realizację
  planu „B”. Dlatego dzisiaj zwołano specjalne posiedzenie Rady Ministrów. Program
  SAFE powstał z inicjatywy Polski, która od miesięcy zabiegała o jego uruchomienie
  w instytucjach europejskich. Program SAFE powstał w Polsce. W maju 2024 roku zwróciliśmy
  się do Unii Europejskiej o uruchomienie programu obronnego dla całej Wspólnoty.
  Od tego dnia codziennie przekonywaliśmy europejskich partnerów do tej idei Decyzja
  o odrzuceniu programu wywołała zdumienie w wielu europejskich stolicach. SAFE jest
  wspierany przez państwa NATO i ma wzmocnić bezpieczeństwo całej wschodniej flanki
  Sojuszu. Historia oceni decyzję Prezydenta bardzo szybko, w bardzo negatywny sposób.
  Nasi europejscy partnerzy nie rozumieją, dlaczego odrzuciliśmy tę wielką szansę
  Polska jest największym beneficjentem SAFE. Możemy pozyskać z programu ok. 43,7
  mld euro, czyli prawie 200 mld zł. Rząd przyjął dziś uchwałę, która upoważnia Ministra
  Obrony Narodowej oraz Ministra Finansów i Gospodarki do podpisania umowy dotyczącej
  SAFE i zrealizowania programu Polska Zbrojna. Będzie trudniej, będzie czasami wolniej.
  Będzie trzeba włożyć dużo więcej wysiłku, żeby przekonać wszystkich zaangażowanych
  w ten proces, bo nie będzie stosownych przepisów. Będziemy musieli polegać na własnej
  sile, własnej energii i własnej determinacji. Ale zrobimy to i ta uchwała pozwoli
  nam uruchomić program Polska Zbrojna. To jest nasza odpowiedź Setki miliardów dla
  polskiej armii i krajowych firm Program Polska Zbrojna opiera się na europejskim
  instrumencie SAFE, który powstał z inicjatywy naszego kraju i państw wschodniej
  flanki NATO. Program Polska Zbrojna, oparty o tani i korzystny europejski kredyt,
  miał sfinansować gigantyczne zakupy dla polskiej armii oraz Straży Granicznej i
  Policji. Przede wszystkim miał być bezprecedensowym strumieniem pieniędzy, który
  miał popłynąć do polskich firm, a nie niemieckich, amerykańskich czy koreańskich
  Większość środków – aż 89 proc. – miała trafić do polskich przedsiębiorstw zbrojeniowych
  i firm współpracujących z sektorem obronnym, wzmacniając potencjał przemysłowy kraju
  oraz tworząc nowe miejsca pracy. Premier odniósł się również do argumentów przedstawionych
  przez Prezydenta oraz kierownictwo Narodowego Banku Polskiego dotyczących alternatywnego
  finansowania programu. Wysłuchałem pomysłu Prezydenta i Prezesa Glapińskiego. Nic
  w nim nie było ani prawdziwe, ani rzetelne. Wymyślono bardzo niebezpieczną hucpę,
  aby mieć alibi dla tego weta Jak zaznaczył szef rządu, środki z programu SAFE były
  realnym i natychmiast dostępnym źródłem finansowania modernizacji armii oraz rozwoju
  polskiego przemysłu obronnego. Rząd nie zmarnuje szansy na modernizację armii Rząd
  nie dopuści do zablokowania programu, który ma strategiczne znaczenie dla bezpieczeństwa
  państwa. Zwracam się do wszystkich Polek i Polaków – tak, mamy powody do niepokoju.
  Świat patrzy ze zdumieniem, jak można marnować taką szansę. Ale nie pozwolimy na
  to Premier zapowiedział, że rząd uruchomi program Polska Zbrojna na podstawie uchwały,
  aby mimo trudności zapewnić finansowanie kluczowych inwestycji związanych z bezpieczeństwem.
  Uchwała w sprawie Programu Polska Zbrojna
