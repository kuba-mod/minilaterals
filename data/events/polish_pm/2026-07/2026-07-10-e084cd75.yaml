title: Pierwsza energia z polskiej farmy wiatrowej na Bałtyku trafiła do krajowej
  sieci!
text: Stacja elektroenergetyczna 400 kV Choczewo, do której dziś popłynął pierwszy
  prąd, jest największym tego typu obiektem w Polsce. Baltic Power będzie stanowić
  kolejny kluczowy element wzmacniający bezpieczeństwo energetyczne kraju. Energia
  z wiatru zapewnia nam suwerenność energetyczną. Fakt, że w tych niepewnych czasach,
  mamy źródła energii w wielu miejscach i jest niezależna od geopolityki, znaczy bardzo
  wiele - powiedział Premier Donald Tusk podczas konferencji prasowej. Przez lata
  Polska była uzależniona od dostaw ropy i gazu z Rosji. Dziś import z tego kierunku
  praktycznie nie istnieje, jednak sytuacja na światowych rynkach energii nadal pozostaje
  niestabilna. Konflikty i napięcia geopolityczne, w tym sytuacja wokół Cieśniny Ormuz,
  pokazują, jak ważne jest posiadanie własnych, bezpiecznych i niezależnych źródeł
  energii. Ostatnie wojny pokazują z całą mocą, że nie można mówić o bezpieczeństwie,
  kiedy nie mówi się o bezpieczeństwie energetycznym. Energetyka jest równie ważna
  jak broń, jak armia Rozwój morskiej energetyki wiatrowej sprawia, że Polska wzmacnia
  swoją niezależność i ogranicza wpływ wydarzeń w innych częściach świata – od Iranu,
  przez Moskwę, po inne regiony kluczowe dla światowego rynku energii. Rozwój polskiej
  gospodarki, najlepiej rozwijającej się gospodarki w Europie, wymaga coraz więcej
  energii. Różne źródła energii, a przede wszystkim odnawialne źródła energii - to
  jest przyszłość Mimo przeszkód politycznych Polska konsekwentnie realizuje inwestycje
  wzmacniające bezpieczeństwo energetyczne. Szef rządu poinformował także o rozmowie
  z premierem Kanady dotyczącej dalszej współpracy energetycznej, w tym możliwości
  rozwoju projektów związanych z energetyką jądrową. To kolejny kierunek działań,
  który może zwiększyć niezależność i stabilność polskiego systemu energetycznego.
  Baltic Power to pierwsza polska morska farma wiatrowa, realizowana przez Orlen we
  współpracy z kanadyjską firmą Northland Power i jedno z największych przedsięwzięć
  tego typu w Europie. To gigantyczne przedsięwzięcie technologiczne. Na miejscu są
  już 54 turbiny, a za chwilę będzie 76. Każda z nich jest wyższa od najwyższego budynku
  w UE - Varso Tower. To daje wyobrażenie, jak wielkie to wyzwanie Farma powstająca
  około 23 km od wybrzeża, na wysokości Choczewa i Łeby, będzie miała moc około 1,2
  GW i produkować około 4 terawatogodziny energii rocznie. Prąd z Baltic Power będzie
  zasilał 1,5 mln gospodarstw domowych i to nie jest nasza ostatnia taka inwestycja
  To skala porównywalna z łączną liczbą gospodarstw w Warszawie, Poznaniu i Trójmieście.
  Energia z Baltic Power popłynie do największej w Polsce stacji elektroenergetycznej
  400 kV w Choczewie. Obiekt o powierzchni 25 hektarów stanie się kluczowym węzłem
  przesyłu energii z morskich farm wiatrowych. Obie inwestycje pokazują, jak rozwija
  się Pomorze i Kaszuby. Kaszuby stają się sercem energetycznym Polski. Znowu zwróciliśmy
  twarz Polski ku Bałtykowi Dwa tygodnie temu kierowcy zyskali dostęp do ostatniego
  odcinka drogi ekspresowej S6, czyli Trasy Kaszubskiej. Równolegle realizowane są
  kolejne inwestycje kolejowe, które poprawiają komunikację i wzmacniają rozwój Pomorza.
