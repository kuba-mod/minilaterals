title: Polska wzmacnia bezpieczeństwo i rozwija współpracę obronną ze Stanami Zjednoczonymi
text: 'Dziś na terenie Wojskowych Zakładów Lotniczych Nr 2 w Bydgoszczy została podpisana
  umowa o współpracy pomiędzy PGZ S.A., WZL-2 i Anduril Industries – amerykańską firmą
  tworzącą nowoczesne technologie i autonomiczne systemy wojskowe. To ważny moment
  dla polskiego przemysłu zbrojeniowego, polskiego bezpieczeństwa oraz współpracy
  polsko-amerykańskiej. (...) Potwierdzenie, że staramy się bardzo skutecznie, przy
  pomocy różnych narzędzi, dyplomacji, współpracy naszych firm z partnerami z państw
  NATO, skutecznie i realistycznie dbać o bezpieczeństwo Polski, o rozwój polskiego
  przemysłu zbrojeniowego - powiedział Premier Donald Tusk podczas uroczystości podpisania
  umowy. Umowa przewiduje ulokowanie w Polsce montażu, a następnie produkcję autonomicznych
  rakietowych pocisków manewrujących dalekiego zasięgu Barracuda-500 (o zasięgu nawet
  do 900 km). Tego typu pociski to jeden z najważniejszych elementów współczesnego
  pola walki, a Polska jest pierwszym europejskim państwem, z którym Anduril podpisuje
  tego typu umowę. Tego nigdy nie mieliśmy w Polsce, nie produkowaliśmy, więc powinniśmy
  docenić ten moment, dlatego że tak naprawdę jesteśmy w historycznej chwili, w historycznym
  miejscu i ruszamy do przodu z wielkim, nowym projektem - mówił Minister Aktywów
  Państwowych Wojciech Balczun. Porozumienie zakłada udział spółek PGZ nie tylko w
  produkcji rakiet, ale także w ich dalszym rozwoju. W pierwszym etapie realizacji
  umowy będzie to montaż z pozyskiwanych od strony amerykańskiej komponentów. W dalszej
  kolejności strony umowy będą pracować nad polonizacją i europeizacją systemu opartego
  o unikalne rozwiązania softwearowe Anduril. Budujemy Polskę jako strategiczne miejsce
  dla transferu technologii i rozwoju przemysłu zbrojeniowego, który staje się kołem
  zamachowym polskiej gospodarki - powiedział Wicepremier Władysław Kosiniak-Kamysz.
  Szef rządu podziękował wszystkim zaangażowanym w skuteczne negocjacje. Dokonaliście,
  drodzy amerykańscy przyjaciele prawidłowego wyboru, wskazując na Polskę, na PGZ,
  na WZL jako swoich partnerów. Polska dzisiaj jest państwem najlepiej przygotowanym
  do współpracy zarówno ze stroną amerykańską, jak i z innymi partnerami NATO Współpraca
  ta zwiększy możliwości obronne Polski jako kluczowego państwa wschodniej flanki
  Sojuszu Północnoatlantyckiego. Uruchomienie montażu i produkcji systemów Barracuda
  wpisuje się także w potrzeby NATO dotyczące budowy masowo produkowanych, niskokosztowych
  systemów uderzeniowych. Nasze bezpieczeństwo opiera się nie tylko na nowoczesnym
  wyposażeniu i obecności wojsk sojuszniczych w Polsce, zwłaszcza amerykańskich, lecz
  także na jednolitej i konsekwentnej polityce państwa w zakresie bezpieczeństwa.
  Ponawiam swój apel do wszystkich, począwszy od Prezydenta do wszystkich polityków:
  nie igrajcie z ogniem. Pomoc Polski dla Ukrainy w jej wojnie z Rosją była przedmiotem
  naszego politycznego i narodowego konsensusu. Można dyskutować o historii, o wzajemnych
  relacjach. Można zastanawiać się, w jakim zakresie pomagać uchodźcom, migrantom
  tu w Polsce. Nie można w żaden sposób narażać na ryzyka naszej współpracy z Ukrainą
  w jej obronie przed napaścią rosyjską W ten sposób odniósł się do doniesień dotyczących
  przekazania przez Polskę Ukrainie pocisków przeznaczonych do systemów Patriot. Gdy
  poprzednie władze przekazały duże ilości polskiego uzbrojenia Ukrainie na początku
  wojny, nie spotykało się to z krytyką, mimo ryzyka. Powszechnie uznawano, że wsparcie
  Ukrainy w walce z Rosją leży w interesie Polski i bezpośrednio wpływa na nasze bezpieczeństwo,
  nie tylko z powodów solidarności czy moralnych. Od początku naszej współpracy z
  Premierem Kosiniakiem-Kamyszem bardzo tego pilnujemy, aby nasze donacje i pomoc
  militarna w sprzęcie dla Ukrainy nie narażały na szwank naszego bezpieczeństwa.
  Jestem przekonany i o tym będą świadczyły fakty i liczby, że robimy to o wiele skuteczniej
  niż ci, którzy dzisiaj podnoszą krzyk. A przed nami podejmowali decyzje o znacznie
  większym stopniu ryzyka Dziś Polska musi przede wszystkim zadbać o bezpieczeństwo
  swojej wschodniej granicy, co jest także elementem bezpieczeństwa całego NATO. Negocjując
  z partnerami Sojuszu Północnoatlantyckiego, Polska ustępuje tam, gdzie jest to konieczne
  – daje to, co może dać. Premier Donald Tusk podkreślił, że zbudowane zostało zrozumienie
  wokół tej polskiej taktyki. Będziemy jasno mówili, jaka jest prawda, jeżeli chodzi
  o wsparcie dla Ukrainy. Będziemy dementować każdą dezinformację i przypominać, że
  wróg jest na Kremlu - zapowiedziała Wiceminister Obrony Narodowej Magdalena Sobkowiak-Czarnecka.
  Wicepremier W. Kosiniak-Kamysz poinformował, że zgodnie z informacją przekazaną
  przez attaché wojskowego USA w Polsce, wstrzymana kilka tygodni temu rotacja wojsk
  amerykańskich zostanie wznowiona i w najbliższych tygodniach będzie kontynuowana.'
