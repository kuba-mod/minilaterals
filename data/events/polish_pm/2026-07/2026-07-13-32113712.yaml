title: Centrum Europejskiej Agencji Kosmicznej powstanie w Warszawie! To bardzo ważny
  dzień dla Polski i naszych ambicji
text: 'W Warszawie powstanie centrum technologiczne Europejskiej Agencji Kosmicznej
  (ESA). Polska będzie jednym z europejskich krajów, w których ESA będzie miała jedno
  ze swoich centrów. To pierwszy kraj na wschodniej flance Unii Europejskiej, który
  będzie miał możliwość takiej sformalizowanej współpracy - powiedział Premier Donald
  Tusk w oświadczeniu dla mediów. Obecnie ESA posiada placówki w: Niemczech (dwie),
  Holandii, Włoszech, Hiszpanii, Belgii oraz Wielkiej Brytanii. Warszawskie centrum
  będzie pierwszym, które powstanie poza granicami państw-sygnatariuszy konwencji
  o utworzeniu ESA. Sukcesy Polski w kosmosie to również sukcesy Europy w kosmosie.
  Polska jest jednym z liderów, jeżeli chodzi o takie obszary jak: inwestycje w bezpieczeństwo,
  przemysł obronny, ale również przemysł kosmiczny. Przemysł kosmiczny i obronny są
  ze sobą bardzo blisko związane. Jednego nie da się robić skutecznie bez drugiego
  i vice versa - mówił Dyrektor Generalny ESA Josef Aschbacher. Jak podkreślił Premier
  Donald Tusk, rola Polski polega dziś także na integrowaniu europejskich wysiłków,
  aby Europa mogła skutecznie konkurować ze Stanami Zjednoczonymi i Chinami w rozwoju
  technologii kosmicznych. Jeśli naprawdę myślimy serio o polskiej suwerenności, o
  europejskiej suwerenności, to Europa nie może pozostać w tyle za Stanami Zjednoczonymi,
  a szczególnie za Chinami, jeśli chodzi możliwości eksplorowania kosmosu z korzyścią
  też dla ludzi Ośrodek ESA w Warszawie będzie koncentrować się na bezpieczeństwie
  oraz rozwoju technologii o podwójnym zastosowaniu - wykorzystywanych zarówno w infrastrukturze
  cywilnej, jak i wojskowej. Centrum będzie rozwijać rozwiązania wzmacniające zdolność
  Europy do przewidywania, reagowania i odbudowy w sytuacjach kryzysowych. Polska
  jest obecnie najszybciej rozwijającą się gospodarką w Europie. Aby utrzymać to tempo,
  rząd konsekwentnie inwestuje w nowe motory wzrostu – między innymi w sektor kosmiczny.
  Dzięki temu Polska staje się jednym z europejskich liderów rozwoju technologii i
  aktywności w przestrzeni kosmicznej. Każde euro zainwestowane w sektor kosmiczny
  zwraca się sześcio- lub siedmiokrotnie, więc jest to dobra inwestycja w polską gospodarkę
  - powiedział Minister Finansów i Gospodarki Andrzej Domański. W latach 2023–2025
  Polska aż dziesięciokrotnie zwiększyła swoją składkę do Agencji. Na lata 2026–2028
  nasz wkład finansowy na programy opcjonalne (np. rozwój usług opartych na danych
  satelitarnych czy robotykę) został podwojony i wynosi 550 mln euro (czyli ponad
  2 mld zł). Jednym z celów Europejskiej Agencji Kosmicznej jest budowa pierwszego
  polskiego statku kosmicznego, który będzie mógł zapewniać dużo większe możliwości
  transportowe między Ziemią a satelitami, serwisowania satelitów, czy tankowania
  Minister Andrzej Domański poinformował, że Grupa PFR utworzy fundusz o wartości
  500 mln zł, który będzie wspierał inwestycje w przedsiębiorstwa sektora kosmicznego.
  Bank Gospodarstwa Krajowego uruchomi specjalną linię finansowania dla samorządów
  na rozwój infrastruktury związanej z sektorem kosmicznym w wybranych miastach.'
