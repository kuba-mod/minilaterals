title: Rząd porządkuje system ochrony zdrowia. Limity wynagrodzeń, jawne kontrakty,
  transparentny dostęp do świadczeń
text: Podczas dzisiejszego posiedzenia Rady Ministrów Minister Zdrowia Jolanta Sobierańska-Grenda
  przedstawiła projekty ustaw i rozporządzeń dotyczące zmian w ochronie zdrowia, które
  będą procedowane z zachowaniem konsultacji publicznych. Nie chcę, aby ewentualnie
  pragnący zawetować te ustawy prezydent miał formalny pretekst, czyli że na przykład
  nie przeprowadziliśmy stosownych konsultacji z zainteresowanymi środowiskami. Będziemy
  pilnowali każdej godziny i każdego dnia, aby jak najszybciej, ale zgodnie z regułami,
  doprowadzić do głosowania w Sejmie tych ustaw. Początek września wydaje się tutaj
  bardzo realistyczny Najwięcej emocji budziła kwestia tzw. kominów płacowych oraz
  niejasnych zasad kształtowania wynagrodzeń lekarzy, co wywoływało kontrowersje również
  w środowisku medycznym. W propozycji przygotowanej przez rząd wprowadzony zostanie
  limit wynagrodzenia. Po wprowadzeniu proponowanych zmian górnym limitem wynagrodzenia
  będzie szesnastokrotność płacy minimalnej, czyli 76 800 zł miesięcznie. To dużo,
  a polscy medycy nadal będą zarabiali więcej niż wynosi średnia europejska, więc
  nie będzie to dużą szkodą dla lekarzy. Premier zaznaczył, że lekarze nadal będą
  mogli dobrze zarabiać, jednak system musi jasno określać zasady dotyczące czasu
  pracy. Chodzi przede wszystkim o bezpieczeństwo pacjentów i wyeliminowanie sytuacji,
  w których dochodziło do nadużyć, takich jak praca przez większą liczbę godzin niż
  wynika to z dobowych norm czy świadczenie pracy w wielu miejscach jednocześnie.
  Zmiany w przepisach wyeliminują też wynagrodzenia uzależnione od procentu wartości
  wykonanej procedury. Nie będą już możliwe praktyki wynagrodzenia „procentu od procedury”.
  Leczenie nie jest biznesem i takie praktyki muszą się skończyć Proponowane zmiany
  dotyczące wynagrodzeń uporządkują dotychczasowy system wynagrodzeń w ochronie zdrowia,
  który sprzyjał nadużyciom.
