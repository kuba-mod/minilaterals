title: Polska gospodarzem pierwszych ćwiczeń wojskowych Koalicji Chętnych
text: W obliczu agresywnej postawy Rosji Europa musi przejmować coraz większą odpowiedzialność
  za własne bezpieczeństwo. Wczoraj Donald Tusk uczestniczył w Paryżu w spotkaniu
  liderów państw Koalicji Chętnych, złożonej z państw wspierających Ukrainę w wojnie
  z Moskwą. Wspólną decyzją Koalicji Chętnych pierwsze ćwiczenia, w których wezmą
  udział wojska brytyjskie i francuskie, odbędą się jesienią tego roku w Polsce. Manewry
  mają przygotować Koalicję do zapewnienia bezpieczeństwa w regionie i Ukrainie Decyzja
  o organizacji pierwszych ćwiczeń Koalicji Chętnych w Polsce potwierdza rosnące znaczenie
  naszego kraju w budowaniu bezpieczeństwa Europy. Kluczowa rola naszego kraju jest
  absolutnie doceniana. Muszę powiedzieć z dużą satysfakcją, że nasze miejsce – nie
  tylko w Koalicji, ale także w Europie – jest dzisiaj naprawdę bardzo znaczącym miejscem
  Polska pozostanie aktywnie zaangażowana we wspieranie Ukrainy we współpracy z sojusznikami
  z NATO. Obecnie nie jest jednak planowane przekazywanie kolejnych pocisków do systemów
  Patriot. Na tę chwilę nie przewiduję nowych donacji sprzętu do Ukrainy. Wszystko
  koordynujemy z sojusznikami i dopóki jestem Premierem, Polska będzie aktywnie uczestniczyła
  w obronie przed Rosją Jednocześnie Donald Tusk zapowiedział, że Polska przystąpi
  do tworzonej koalicji na rzecz obrony antybalistycznej z Ukrainą, jeśli polskie
  firmy przedstawią odpowiednią ofertę przemysłową. Po spotkaniu państw Koalicji Chętnych
  Premier, na zaproszenie prezydenta Francji, obserwuje paradę z okazji Święta Narodowego
  Francji. W defiladzie na Polach Elizejskich uczestniczą m.in. piloci Sił Powietrznych
  RP latający na samolotach F-16.
