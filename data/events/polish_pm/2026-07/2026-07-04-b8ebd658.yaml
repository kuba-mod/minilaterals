title: Rozwój OZE to inwestycja w bezpieczeństwo Polski i czystą energię
text: Rozwój energetyki opartej na odnawialnych źródłach energii jest jednym z kluczowych
  kierunków polityki gospodarczej Polski. Inwestycje w OZE, takie jak farma fotowoltaiczna
  ORLEN w Kleczewie, zwiększają produkcję czystej energii i wzmacniają bezpieczeństwo
  energetyczne kraju. To jest przedsięwzięcie o niezwykle praktycznym znaczeniu. Stąd
  płynie prąd, który wystarczy dla ok. 100 tys. gospodarstw domowych Farma w Kleczewie
  została rozbudowana w latach 2024-2026, dzięki czemu dziś jej łączna moc wynosi
  prawie 270 MW. Postanowiliśmy podwoić wielkość tej instalacji fotowoltaicznej. Dzięki
  temu mamy teraz prawie 500 tys. paneli na powierzchni ponad 400 hektarów Przed rozbudową
  inwestycji w Kleczewie konieczne było uporządkowanie kwestii związanych z jej wcześniejszą
  realizacją. Działania rządu objęły weryfikację kosztów projektu oraz odzyskiwanie
  części środków, które zostały wcześniej nieefektywnie wydatkowane. Poprzedni rząd
  rozpoczął tę inwestycję w sposób niekompetentny. Musieliśmy wyczyścić ten bałagan,
  który miał kosztować państwo 800 mln zł więcej niż powinien Projekt ORLEN w Kleczewie
  ma charakter hybrydowy – łączy farmę fotowoltaiczną i wiatrową, co zwiększa stabilność
  produkcji energii oraz efektywność wykorzystania odnawialnych źródeł energii. Minister
  Energii Miłosz Motyka podkreślił, że dzięki rządowym zmianom w prawie energetycznym
  oraz inwestycjom w infrastrukturę sieciową nowe instalacje OZE mogą być sprawniej
  przyłączane do sieci elektroenergetycznej. To element największej reformy prawa
  energetycznego w historii Polski. Inwestycje w polską energetykę i w nowe mocne
  niskoemisyjne, to inwestycja także w polskie firmy Instalacja w Kleczewie powstała
  na terenach pogórniczych, co pokazuje, że zdegradowane obszary mogą z powodzeniem
  zyskiwać nowe funkcje i być racjonalnie wykorzystywane na potrzeby nowoczesnej,
  zielonej energetyki. Zagospodarowanie terenów pokopalnianych do produkcji czystej
  energii jest niezwykle ważne. Region koniński był ważnym producentem energii i powinien
  nim pozostać. To miejsce, które ma odpowiednią infrastrukturę, ale też kapitał ludzki
  od lat produkujący energię na potrzeby krajowe – podkreśliła Minister Klimatu i
  Środowiska Paulina Hennig-Kloska. Transformacja regionów pogórniczych powinna odbywać
  się z uwzględnieniem potrzeb mieszkańców i pracowników. Jej celem jest wsparcie
  procesu przekwalifikowania osób dotychczas zatrudnionych w sektorze węgla brunatnego,
  rozwój nowych kompetencji zawodowych oraz tworzenie warunków sprzyjających rozwojowi
  małych i średnich firm.
