title: Pamięć nie może być sługą nienawiści
text: '11 lipca przypada rocznica krwawej niedzieli, czyli apogeum zbrodni wołyńskiej.
  Było to ludobójstwo dokonane przez ukraińskich nacjonalistów na Polakach i obywatelach
  polskich i innych narodowości ziem wschodnich II Rzeczpospolitej. Naszym obowiązkiem
  wobec ofiar, ale też sposobem przezwyciężenia bolesnej przeszłości na rzecz lepszej
  przyszłości jest prawda. A prawda to wskazanie i nazwanie winnych, to potępienie
  - jednoznaczne - tej zbrodni. Prawda to pamięć o każdej ofierze i miejscu jej kaźni.
  Zamordowani nie mogą pozostać bezimienni, nie mogą zostać bez godnego pochówku.
  Pamięć o nich to nasz wspólny obowiązek - wobec ich bliskich, wobec narodu i państwa
  polskiego. Dlatego jako Premier polskiego rządu podjąłem skuteczne starania o wznowienie
  po latach poszukiwań i ekshumacji ofiar zbrodni wołyńskiej, a także innych naszych
  ofiar wojen XX wieku na Ukrainie, których ciała nie zostały wcześniej godnie pochowane
  w grobach. Ich Rodziny czekały na to ponad 80 lat. Chcemy ocalić pamięć o każdej
  z nich, z imienia i nazwiska. Dlatego w Warszawie stanie Mur Pamięci z wiecznym
  ogniem i nazwiskami każdej odnalezionej i zidentyfikowanej ofiary. Rzeczpospolita
  nie zapomni o żadnej z nich. Pamięć nie może być sługą nienawiści. Odpowiedzią na
  nacjonalizm nie może być więcej nacjonalizmu. Pamięć i prawda muszą nam pomóc w
  budowie lepszej przyszłości: bez nienawiści i bez pogardy. Europa pokoju i wzajemnego
  szacunku, Europa pojednana po II wojnie światowej była możliwa dzięki prawdzie i
  nazywaniu rzeczy po imieniu. Kto chce przyłączyć się do tej wspólnoty, musi być
  na tę prawdę gotowy. Jesteśmy dziś odpowiedzialni za naszą przyszłość i bezpieczeństwo
  naszych dzieci i wnuków. To wspólna odpowiedzialność - Polski, Ukrainy, Europy.
  Potrzebujemy dziś solidarności wobec wspólnych zagrożeń, a solidarność zbudowana
  jest na fundamencie prawdy, pamięci i nadziei.'
