title: Dostęp do publicznej ochrony zdrowia musi być równy dla wszystkich - bez wyjątków
text: 'Nieprawidłowości ujawnione w Szpitalu Południowym w Warszawie nie są odosobnionym
  przypadkiem, lecz obrazują problemy występujące w wielu polskich placówkach. Dymisje
  osób odpowiedzialnych za sytuację w Szpitalu Południowym już nastąpiły, w tym również
  dzisiejsze rezygnacje dwóch pań wiceprezydent Warszawy. Dla rządu najważniejsze
  jest jednak skuteczne wyeliminowanie nadużyć i patologii, które są nie tylko efektem
  niewłaściwych działań poszczególnych osób, lecz także słabości obowiązującego systemu
  W pierwszej kolejności trzeba ukrócić najbardziej rażące nadużycia, w tym działanie
  tzw. „saloników VIP”. Dla Ministerstwa Zdrowia i NFZ zadanie jest proste: to zjawisko
  musi zniknąć. Zgodnie z prawem i przyzwoitością dostęp do usług medycznych w publicznej
  ochronie zdrowia powinien być równy i niezależny od znajomości Konieczne jest także
  uszczelnienie systemu w taki sposób, aby nie można było omijać obowiązujących kolejek,
  m.in. poprzez nieformalne praktyki, takie jak funkcjonowanie tzw. „zeszytu” w szpitalach.
  Wydałem polecenie maksymalnego przyspieszenia prac nad ostatecznym wdrożeniem e-rejestracji.
  Rozwiązanie zapewni transparentność kolejek i ułatwi wskazanie, gdzie doszło do
  nieprawidłowości Wyeliminowania wymaga ponadto działalność tzw. „lekarzy milionerów”,
  którzy wykorzystują system ochrony zdrowia. Wiemy, że istnieje zjawisko tzw. „lekarzy
  z walizkami”, którzy realizują drogie procedury w wielu placówkach, generując bardzo
  wysokie dochody, ale de facto nie zajmują się pacjentem. To zjawisko musi być ukrócone
  Szef rządu zaznaczył, że oczekuje od Minister Zdrowia i prezesa NFZ przygotowania
  klarownych rekomendacji systemowych w tych sprawach. Donald Tusk zaapelował do środowiska
  lekarskiego o współpracę dotyczącą uporządkowania systemu ochrony zdrowia i ograniczenia
  nieprawidłowych praktyk. Zwracam się do reprezentacji środowiska medycznego, żebyście
  pomogli naprawić ten stan rzeczy i nie szukali konfrontacji. To jest zarówno w interesie
  pacjentów, jak i lekarzy Konieczna jest także kontrola zarobków medyków, którzy
  pracują w publicznej służbie zdrowia. Bardzo proszę wszystkich, żeby zaakceptowali
  ten oczywisty i prosty pomysł rządu, żeby odpowiednia instytucja w Ministerstwie
  Zdrowia miała wgląd w to, kto, ile i w ilu miejscach zarabia z państwowych środków
  Celem zmian jest zwiększenie przejrzystości systemu ochrony zdrowia przy jednoczesnym
  poszanowaniu pracy i wynagrodzeń personelu medycznego. Premier Donald Tusk odniósł
  się także do przygotowań Polski w sprawie zbliżającego się szczytu NATO w Ankarze
  oraz rosnącej odpowiedzialności Europy za własne bezpieczeństwo. Prosiłem Władysława
  Kosiniaka-Kamysza, który współpracuje z Radosławem Sikorskim, aby bardzo precyzyjnie
  informowali o stanowisku rządu Prezydenta, który reprezentuje Polskę na szczytach
  NATO zgodnie z wieloletnią tradycją Szczyt NATO w Ankarze będzie de facto kończył
  etap, w którym Europa, w tym Polska, bierze większą odpowiedzialność za własną obronność,
  zwłaszcza jeśli chodzi o finansowanie i gotowości militarnej w obszarze broni konwencjonalnej.
  Polska jest w tym zakresie przykładem dla NATO.'
