title: 'Premier: W interesie Polski jest, aby Ukraina nie przegrała tej wojny'
text: Dziś w Ankarze rozpoczął się dwudniowy szczyt NATO. Polskę reprezentuje m.in.
  dwóch wicepremierów - Minister Obrony Narodowej Władysław Kosiniak-Kamysz i Minister
  Spraw Zagranicznych Radosław Sikorski. Pojechali tam z oczywistą misją, aby nasi
  sojusznicy - wszyscy bez wyjątku - w Pakcie Północnoatlantyckim wiedzieli, że polska
  polityka w odniesieniu do wojny rosyjsko- ukraińskiej jest polityką stabilną i nie
  będzie zależała od politycznych emocji czy politycznych gier pomiędzy partiami politycznymi
  w Polsce - powiedział Premier Donald Tusk przed posiedzeniem Rady Ministrów. Polska
  będzie wspierać Ukrainę w jej obronie przed rosyjską agresją nie tylko z poczucia
  przyzwoitości i solidarności, lecz przede wszystkim w trosce o własne bezpieczeństwo
  i w dobrze pojętym interesie narodowym. Będziemy racjonalnie oceniać to, co nam
  się opłaca w relacjach z Ukrainą. Nie jesteśmy naiwni. Kiedy trzeba było bronić
  polskiego rolnika - to my to robiliśmy Premier zapowiedział ścisłą współpracę w
  zakresie bezpieczeństwa i współpracy wojskowej oraz dalsze wzmacnianie obrony przed
  zagrożeniem ze strony Rosji. Podkreślił, że Polska będzie konsekwentnie kontynuować
  wsparcie dla Ukrainy wspólnie z sojusznikami z NATO, w tym ze Stanami Zjednoczonymi.
  Nie trzeba kochać Ukrainy. Nie mam tego typu oczekiwań, ale każdy, kto ma odrobinę
  oleju w głowie i odrobinę przyzwoitości w sercu wierzy, że w interesie Polski jest
  to, aby Ukraina nie przegrała tej wojny Wszystkie dotychczasowe formy wsparcia były
  precyzyjnie koordynowane i uzgadniane z kierownictwem NATO. Polska nie wysuwa się
  przed innych sojuszników ani pod względem wydatków, ani przekazywanego wsparcia.
  Priorytetem rządu jest ograniczenie zagrożenia ze strony Rosji dla Polski, regionu
  i całej Europy. Premier Donald Tusk poinformował, że przed Ministrą Zdrowia oraz
  kierownictwem Narodowego Funduszu Zdrowia stoi pilne zadanie przygotowania konkretnych
  rozwiązań dotyczących nieprawidłowości w systemie wynagrodzeń, wyceny świadczeń
  oraz organizacji pracy szpitali. Propozycje mają zostać przedstawione jutro. Wszystko
  to, co jest możliwe do zrobienia mocą decyzji pani minister, rządu i Narodowego
  Funduszu Zdrowia, przeprowadzimy w trybie pilnym. Nie będą to łatwe zadania i nie
  wszystkim się spodobają. Nie ma odwrotu od tej drogi Kilka zasadniczych spraw będzie
  wymagało jednak zmian ustawowych. Premier Donald Tusk odniósł się do nieprawidłowości
  w placówkach medycznych, w tym w Warszawskim Szpitalu Południowym. Moim zadaniem
  jako premiera rządu nie jest szukanie kozłów ofiarnych. Ci, którzy odpowiadają za
  konkretne sytuacje w szpitalach, będą odpowiadać również przed wymiarem sprawiedliwości
  Zapowiedział, że proces kontroli oraz egzekwowania przepisów prawa i zasad przyzwoitości
  będzie kontynuowany.
