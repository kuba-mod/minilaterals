title: Nauka i przemysł wspólnie dla bezpieczeństwa Polski
text: 'Narodowe Centrum Badań i Rozwoju podpisało 14 kolejnych umów z polskimi podmiotami
  z sektora przemysłowego i naukowego w ramach programu PERUN - jednego z najważniejszych
  instrumentów rozwoju przełomowych technologii obronnych dla Sił Zbrojnych RP. Piszemy
  nową historię polskiego wojska, systemu obrony, historię polskiego bezpieczeństwa
  w czasach globalnego zamętu, konfliktów zbrojnych - w tym najbardziej dramatycznego
  z naszego punktu widzenia, a więc napaści rosyjskiej na Ukrainę i wojny toczącej
  się tuż przy naszej granicy Program PERUN to wspólna inicjatywa Ministerstwa Obrony
  Narodowej, Ministerstwa Nauki i Szkolnictwa Wyższego oraz Narodowego Centrum Badań
  i Rozwoju, której celem jest wsparcie rozwoju nowoczesnych technologii obronnych,
  wyposażenia wojskowego oraz innowacji w sektorze nauki i przemysłu. Implementujemy
  doświadczenia z Ukrainy i budujemy zdolności we wszystkich obszarach. Dlatego umowy,
  które zostały dziś podpisane, dotyczą zdolności do operowania na lądzie, w powietrzu,
  na wodzie i pod wodą, a także w cyberprzestrzeni i przestrzeni kosmicznej - mówił
  Wicepremier i Minister Obrony Narodowej Władysław Kosiniak-Kamysz. Dzięki współpracy
  rozwijane są rozwiązania w takich obszarach takich jak: sztuczna inteligencja, autonomizacja,
  technologie kosmiczne, ochrona żołnierza, systemy bezzałogowe, cyberbezpieczeństwo
  i medycyna pola walki. Te umowy to wielki zastrzyk pomysłów, pieniędzy, energii
  ludzkiej, talentów w polskie technologie dla polskich firm, instytutów naukowych,
  polskich naukowców. To jest dla nas niezwykle istotna rzecz Wartość 14 umów podpisanych
  dziś wynosi ponad 364 mln zł. Łącznie od początku realizacji programu podpisano
  już 29 umów o wartości 753 mln zł, z czego dofinansowanie z MON i MNiSW to 723 mln
  zł. Wojsko definiuje swoje potrzeby, a polskie ośrodki badawcze przynoszą rozwiązania.
  Tak wygląda modelowa współpraca, na którą mamy odpowiednie środki – 723 mln złotych
  - powiedział Minister Nauki i Szkolnictwa Wyższego Marcin Kulasek. Już dziś polscy
  naukowcy, menedżerowie i przedsiębiorcy odgrywają istotną rolę w rozwoju nowoczesnych
  technologii. Dzięki m.in. programowi PERUN swoją wiedzę, talent i innowacyjność
  będą mogli wykorzystywać także na rzecz wzmacniania obronności i bezpieczeństwa
  Polski. Polska konsekwentnie wzmacnia swój potencjał obronny, rozwijając nowoczesne
  i komplementarne Siły Zbrojne. Już dziś nasz kraj jest w gronie liderów regionu
  pod względem wydatków na obronność, gotowości oraz zdolności operacyjnych. Celem
  rządu pozostaje budowa najsilniejszej armii w Europie. Wydajemy 5%, a tak naprawdę
  7% z budżetu państwa na naszą obronność. Mamy też gigantyczne wsparcie ze środków
  europejskich, np. SAFE. Budujemy nową historię poprzez sojusze, o których niedawno
  nikomu się nie śniło Rosnącą pozycję Polski w NATO i Unii Europejskiej potwierdza
  aktywne wsparcie sojuszników, w tym ich zaangażowanie we wzmacnianie bezpieczeństwa
  naszej wschodniej granicy. Niech to będzie lekcja dla wszystkich tych w Polsce i
  poza Polską, którzy uważają, że konflikt, chaos i przemoc to sposób na życie. Niech
  zrozumieją, że tylko wspólna, cierpliwa i konsekwentna praca może przynieść dobre
  efekty Polska rozwija współpracę z państwami regionu Morza Bałtyckiego i Europy
  Północnej, budując wspólną strategię bezpieczeństwa opartą na zbieżnych interesach
  oraz działaniach na rzecz ochrony wschodniej flanki NATO i bezpieczeństwa Bałtyku.
  Współczesne pole walki wymaga przewagi technologicznej, opartej na wiedzy, innowacjach
  i potencjale ludzkim. Kupić ze Stanów Zjednoczonych czy Korei jest naprawdę bardzo
  łatwo. Wymyślić i zbudować jest bardzo trudno, ale zawsze warto - powiedział Wiceminister
  Obrony Narodowej Cezary Tomczyk. Przewaga technologiczna i innowacyjność będą miały
  kluczowe znaczenie zarówno dla skuteczności obrony, jak i wzmacniania zdolności
  odstraszania potencjalnych przeciwników. Każda ta umowa oddala ryzyko ataku na Polskę.
  Każda decyzja o inwestowaniu w technologie i siły zbrojne sprawi, że każdy napastnik
  zastanowi się dziesięć razy, zanim zaatakuje Polskę Wzmacnianie zdolności obronnych
  państwa jest procesem ciągłym, a odpowiednie przygotowanie do potencjalnych zagrożeń
  to jeden z fundamentów utrzymania pokoju. Polska należy dziś do grona państw najintensywniej
  rozwijających swoje zdolności obronne.'
