title: 'Najnowocześniejsza kolej w Europie - #NaszaKolej'
text: Obecny okres to czas dynamicznego rozwoju Polski i ambitnych inwestycji w infrastrukturę
  kolejową. Celem rządu jest budowa najnowocześniejszej sieci kolejowej w Europie
  – podobnie jak podczas pierwszej kadencji rządu Premiera Donalda Tuska, kiedy powstała
  nowoczesna sieć autostrad i dróg ekspresowych. Warto uświadomić sobie skalę Zintegrowanej
  Sieci Kolejowej – 2,7 tys. km linii Kolei Dużych Prędkości, ponad 2 tys. km nowych
  linii kolejowych oraz 5,6 tys. km zmodernizowanych linii Pociągi Kolei Dużych Prędkości
  będą mogły rozpędzać się maksymalnie do 350 km na godzinę. Będziemy mieli najszybszą
  kolej w Europie, bo Polacy zasługują na to, aby móc się przemieszczać tak, jak robią
  to Japończycy czy Chińczycy Celem rządu jest, aby kolej stała się najchętniej wybieranym
  środkiem transportu przez Polki i Polaków. Kiedy zakończymy realizację wielkiego
  projektu Zintegrowanej Sieci Kolejowej, w ciągu roku powinniśmy przewozić w Polsce
  blisko 800 mln pasażerów. Już dziś nasza kolej przewozi niemal tyle osób, ilu mieszkańców
  liczy cała Unia Europejska Dzięki rządowym inwestycjom każdy powiat w Polsce będzie
  włączony w sieć połączeń dalekobieżnych. To będzie miało ogromne znaczenie cywilizacyjne.
  Mówimy o projekcie „Polska 100 minut”, dzięki któremu podróż z Warszawy do dużych
  miast będzie możliwa w ok. 100 minut, oraz o koncepcji „Polska w 3 godziny”, która
  pozwoli przejechać w takim czasie cały kraj. To sprawi, że życie, mieszkanie i praca
  w wielu mniejszych miejscowościach staną się bardziej atrakcyjne Projekt Zintegrowanej
  Sieci Kolejowej zakłada budowę 4,7 tys. km nowych linii kolejowych – ponad dwa razy
  więcej niż przewidywały plany poprzedniego rządu. Rozwój nowoczesnej kolei jest
  jednym z najważniejszych priorytetów rządu. Obecnie na rozwój infrastruktury kolejowej
  przeznaczamy 100 mld zł. To środki na budowę nowych stacji i linii kolejowych, modernizację
  istniejącej sieci oraz jej cyfryzację – poinformował Minister Infrastruktury Dariusz
  Klimczak. W ciągu ostatnich trzech lat liczba pasażerów kolei wzrosła o 100 mln.
  W 2026 roku przewieziemy 470 mln podróżnych, a w przyszłym roku przekroczymy rekordowy
  poziom 500 mln pasażerów. Od kiedy przejęliśmy władzę, PKP Intercity zwiększyło
  liczbę realizowanych codziennie połączeń o 130 oraz przewozi o 30% więcej pasażerów
  Rząd przywraca także połączenia kolejowe do miejscowości, które przez lata były
  pozbawione dostępu do transportu kolejowego. Tylko do końca 2027 roku pociągi wrócą
  m.in. do Polic, Sokołowa Podlaskiego, Połańca i Stronia Śląskiego. Bezpośrednie
  połączenie z Warszawą zyska również Łomża. Więcej informacji o tym, jak zmienia
  się polska kolej, znajduje się na stronie www.naszakolej.gov.pl .
