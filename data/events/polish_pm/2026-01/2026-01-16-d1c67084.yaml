title: Premier Donald Tusk gra razem z WOŚP - wylicytuj złote korki i spotkanie w
  KPRM
text: 'Zwycięzca licytacji otrzyma unikatowe sportowe buty – nowe złote korki, które
  stanowią ważną pamiątkę dla Premiera – są prezentem od przyjaciół. Drugim elementem
  jest wyjątkowe spotkanie z szefem rządu w Sali Zegarowej KPRM. To reprezentacyjne
  miejsce gościło w przeszłości wielu zagranicznych gości. W aukcji przewidziany jest
  udział jednej osoby. Termin realizacji nagrody ustalony jest do 31 stycznia 2027
  roku, a ewentualne koszty dojazdu pokrywa zwycięzca licytacji. Wszelkie pytania
  dotyczące aukcji prosimy kierować na adres: internet@kprm.gov.pl. 25 stycznia 2026
  roku Wielka Orkiestra Świątecznej Pomocy zagra po raz 34., tym razem pod hasłem
  „Zdrowe brzuszki naszych dzieci”. Dochód z aukcji zasili zbiórkę i wesprze działania
  Fundacji WOŚP. Zachęcamy do udziału w licytacji na rzecz Wielkiej Orkiestry Świątecznej
  Pomocy. Gramy razem – do końca świata i jeden dzień dłużej!'
