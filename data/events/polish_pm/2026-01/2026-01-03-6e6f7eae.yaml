title: 'Premier: Proszę wszystkich, żeby duch mobilizacji nas nie opuszczał'
text: Szef rządu skomentował doniesienia dotyczące dzisiejszego ataku sił amerykańskich
  na stolicę Wenezueli Caracas. Pierwsze dni 2026 r. to rzeczywiście bardzo mocne
  uderzenie. Jeszcze przyjdzie czas na analizę, jak to będzie wpływało na sytuację
  w naszym regionie. W dzisiejszych czasach takie masywne zdarzenia, jak atak sił
  amerykańskich, oddziałują na cały świat, więc będziemy odpowiednio reagować Jak
  wyjaśnił, posiada informacje o 11 polskich obywatelach, którzy wyjechali do Wenezueli.
  Zrobili to mimo wielokrotnych ostrzeżeń Ministra Spraw Zagranicznych, aby nie odwiedzać
  tego kraju, w związku z sytuacją wewnętrzną i ewentualnym konfliktem. Polska placówka
  dyplomatyczna w Caracas jest na razie bezpieczna. W związku z atakiem nic się tam
  nie wydarzyło Sytuacja w regionie jest monitorowana. Wszystkie nowe informacje będą
  na bieżąco przekazywane opinii publicznej. Służby zachowują mobilizację w związku
  z pogodą Wszystkie służby państwowe, odpowiedzialne za utrzymanie szeroko rozumianego
  bezpieczeństwa, są aktywne i przygotowane do działania. Dziękuję, że w czasie świątecznym
  i na przełomie roku, byliście wszędzie w Polsce na posterunku.  Mówię tutaj o strażakach,
  policjantach i urzędnikach samorządowych. Wielu ludzi ma powody Wam dziękować Sytuacja
  związana z pogodą jest jednak dynamiczna, dlatego mobilizacja służb musi być stała.
  W najbliższych dniach w całej Polsce możemy mieć do czynienia z zdarzeniami pogodowymi,
  więc bardzo prosiłbym wszystkich, żeby duch mobilizacji nas nie opuszczał. Nie możemy
  ulec złudzeniu, że na pewno już nic więcej się nie zdarzy. Zima może zaskoczyć w
  każdej chwili Odnosząc się do kryzysów pogodowych, szef rządu podkreślał, że przy
  takich zdarzeniach każdy powinien wiedzieć, że może liczyć na pomoc służb państwowych.
  Chciałbym, żeby wszyscy w Polsce mieli poczucie, że nikt nie zostanie sam w przypadku
  jakichś dramatycznych sytuacji. Nikt nie powinien czuć się osamotniony Jednocześnie
  szef rządu przypomniał o prawnym obowiązku usuwania śniegu i lodu z dachów budynków.
  To zadanie dla właścicieli i zarządców nieruchomości. Jak przekazały służby odpowiedzialne
  za bezpieczeństwo w województwie warmińsko-mazurskim, do wszystkich miejscowości
  w regionie jest już zapewniony dojazd. Policja i straż pożarna była w najwyższej
  gotowości. Reagowaliśmy na wszystkie medialne informacje, nawet te facebookowe,
  że ktoś nie mógł dojechać – zapewnił wojewoda warmińsko-mazurski Radosław Król.
  Wszystkie sytuacje związane z zagrożeniem mieszkańcy powinni zgłaszać na telefon
  alarmowy. Jak jest sygnał o czymkolwiek, to wystarczy zadzwonić na numer 112, a
  my żadnego sygnału nie bagatelizujemy Przejezdne są wszystkie linie kolejowe, z
  wyjątkiem odcinka Działdowo-Olsztyn. Linia jest wyłączona z ruchu m.in. z powodu
  dużej ilości drzew pochylonych w stronę torów, ze względu na zalegający na gałęziach
  śnieg. Wczoraj po raz pierwszy zastosowano tam metodę oczyszczania go z drzew podmuchem
  z wirnika śmigłowca. Wykorzystywany był do tego policyjny Black Hawk. Podczas odprawy
  omawiano też sytuację hydrologiczną, do której doszło pod koniec roku w Elblągu.
  Po ustaniu wiatru sytuacja zaczęła się stabilizować, a stan alarmu i pogotowie przeciwpowodziowe
  zostały odwołane.
