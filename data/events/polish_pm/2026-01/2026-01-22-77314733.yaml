title: 'Premier w Brukseli: Zawsze wygrywała wspólnota. Wytrwajmy'
text: Celem spotkania europejskich liderów w Brukseli jest wzmocnienie politycznej
  jedności Europy. To właśnie wspólne stanowisko państw jest dziś najcenniejsze i
  daje realną siłę w rozmowach międzynarodowych. Chciałbym, żebyśmy bardzo wyraźnie
  potwierdzili, że będziemy w stanie działać jako wspólnota polityczna wobec różnych
  propozycji zdarzeń, czy to jest Grenlandia, czy to jest Rada Pokoju, a przede wszystkim
  Ukraina Szef rządu wyraźnie zaznaczył, że sytuacja w Ukrainie nie może schodzić
  na dalszy plan, ponieważ to od niej zależy bezpieczeństwo całej Europy i Zachodu.
  Emocje i inne spory nie mogą odciągać uwagi od najważniejszych wyzwań geopolitycznych.
  Nie może być tak, że przez niepotrzebne zamieszanie, kwestia Ukrainy zeszła na dalszy
  plan. To jest kluczowa kwestia dla naszego bezpieczeństwa Europa i jej partnerzy
  muszą ponownie skupić się na tym, co naprawdę decyduje o stabilności kontynentu.
  Z całą pewnością zjednoczona i skupiona na ochronie relacji transatlantyckich przed
  kryzysem Europa, to jest coś absolutnie bezcennego Europejska jedność nie oznacza
  konfrontacji, lecz konsekwentną obronę wspólnych interesów i wartości, które od
  lat budują stabilność kontynentu. Dla Polski i całej Europy kluczowa jest ciągłość
  dialogu i unikanie działań, które mogłyby prowadzić do eskalacji napięć. Sprawa
  Grenlandii jest testem dojrzałości międzynarodowej współpracy. Wszelkie spory powinny
  być rozwiązywane metodami cywilizowanymi, bez przymusu i gróźb. Siła oraz presja
  to nie są wartości, które przyświecały powstaniu Unii Europejskiej. Jestem absolutnie
  przekonany, że przymus nie może być stosowany w relacjach z partnerami. Unia Europejska
  powstała po to, aby przymus nie stanowił narzędzia w polityce międzynarodowej Europa
  musi jasno komunikować swoje stanowisko w kontaktach ze Stanami Zjednoczonymi, jednocześnie
  dbając o wzajemny szacunek. Jako Premier Polski jestem zaangażowany w relacje transatlantyckie.
  Zrozumienie różnicy między dominacją a przywództwem jest dla nich kluczowe Premier
  odniósł się także do ostatnich decyzji i zapowiedzi administracji Prezydenta Donalda
  Trumpa. Relacje Europy ze Stanami Zjednoczonymi przechodzą trudniejszy moment, ale
  nie są zagrożone w długiej perspektywie. Dzięki dekadom więzi transatlantyckich
  Polska jest wolna i bezpieczna. Niezależnie od różnych napięć i kryzysów zawsze
  wygrywała wspólnota. Wytrwajmy Prezes Rady Ministrów przypomniał również o znaczeniu
  wspólnej odpowiedzialności w ramach NATO i nakładów każdego kraju w ramach obronności.
  Jako pierwsi wyciągnęliśmy wnioski z narastającego zagrożenia i poważnie zajęliśmy
  się inwestowaniem w nasze możliwości obronne. Nikt nie musiał nas do tego przymuszać
  Polska jest wzorem dla innych państw NATO w zakresie wydatków na obronność. W tym
  roku na ten cel przeznaczymy ponad 200 mld zł, czyli prawie 5 proc. PKB. Donald
  Tusk podkreślił, że Europa to nie tylko Unia Europejska, ale także bliscy partnerzy,
  którzy doskonale zdają sobie sprawę z priorytetów na kontynencie europejskim oraz
  obecnych wyzwań geopolitycznych. Współpraca Polski i UE z Wielką Brytanią, Kanadą,
  czy Norwegią jest wzorowa. Chciałbym, żebyśmy dzisiaj potwierdzili, że będziemy
  w stanie działać jako wspólnota wobec różnych zdarzeń Relacje z tymi państwami wzmacniają
  bezpieczeństwo całej Europy i pokazują, że wspólnota wartości takich jak wolność,
  pokój i demokracja wykracza poza formalne struktury.
