title: Orędzie noworoczne Premiera Donalda Tuska
text: 'Co to był za rok! Komentatorzy na całym świecie prześcigają się w epitetach:
  rollercoaster, scenariusz dreszczowca, początek nowej ery, koniec znanego świata.
  Nawet ostatni dzień roku na drogach nad morzem i w górach okazał się dla wielu poważnym
  wyzwaniem. Tak, na świecie wydarzyło się i zmieniło bardzo wiele. Wcale nie na lepsze.
  Dla nas jednak najważniejsze jest to, że chociaż świat dookoła trzęsie się w posadach,
  Polska rozwija skrzydła. W Polsce był to rok przełomu. Rok, w którym wzrost gospodarczy
  ruszył z kopyta. Skończyła się drożyzna. Rozpoczęliśmy wielkie inwestycje, inne
  oczyściliśmy z absurdów poprzednich lat. Uszczelniliśmy granicę. Naprawiliśmy zabagnione
  relacje z Europą i odzyskaliśmy nasze, polskie miliardy. Polacy zaczęli wracać z
  emigracji, a największe zagraniczne gazety piszą o Polsce jako absolutnym fenomenie.
  Nazywają naszą gospodarkę złotowłosą, czyli taką, jak ma być. A Warszawę uznają
  za najbardziej perspektywiczne miasto kontynentu. I to wszystko w roku, który wielu
  rozwiniętym krajom przyniósł widmo kryzysu i załamania. 1000 lat polskiego państwa
  zobowiązuje. Jubileusz piastowskiej koronacji przypomina nam, że nie ma sensu narzekać
  na trudne czasy. Państwo musi sobie radzić w każdych czasach. 1000 lat własnej historii
  pozwala nam wyciągać własne wnioski. Bez oglądania się na innych. Wiemy, co nam
  daje siłę i sukces, a co przynosi słabość i przegraną. Silna armia - bezpieczeństwo
  i wygrana. Warcholstwo i liberum veto - słabość i przegrana. Poszanowanie prawa,
  równość, wolność, tolerancja. Nasze polskie wartości to rozwój i potęga. Korupcja,
  oligarchia, polityczna klientela to zepsucie i upadek. Takie jest nasze polskie
  doświadczenie. Wiedza, za którą przez wieki płaciliśmy naprawdę wysoką cenę. Wydaje
  się, że to są proste prawdy, ale stanowią prawdziwy skarb, nasz fundament. Nie możemy
  ich zgubić. Choćby świat dookoła do końca oszalał, my musimy być mądrzy, silni,
  musimy być sobą. Musimy realizować nasz własny plan, dlatego bez względu na cokolwiek
  rok 2026 będzie rokiem polskiego przyspieszenia. Przyspieszymy budowę najsilniejszej
  armii w Europie. Przyspieszymy wielkie inwestycje infrastrukturalne. To będzie rok
  szybkiego zdobywania Bałtyku - naszego polskiego Bałtyku. Intensywna repolonizacja
  i odbudowa przemysłu, w tym przemysłu obronnego. Zasada lokal content, czyli najpierw
  polskie, stanie się na dobre żelazną regułą w zamówieniach publicznych. Dociśniemy
  śrubę przestępcom wszelkiej maści - czy to będzie król kiboli, handlarz narkotyków
  czy skorumpowany polityk czy rosyjski bojówkarz. Każdy, bez wyjątku, kto łamie prawo,
  w nadchodzącym roku gorzko tego pożałuje. Nie pozwolimy, żeby grupy przestępcze
  znów podniosły głowę, a na ulicę powróciła przemoc. Polska ma być i będzie oazą
  bezpieczeństwa. Jaki będzie przyszły rok na świecie? Prawdopodobnie, jak zwykle
  inny, niż wszyscy przewidują. Jaki by jednak nie był, moje, nasze zadanie się nie
  zmienia. To musi być kolejny dobry rok dla Polski. 1001 rok naszego państwa i tego
  nam wszystkim życzę.'
