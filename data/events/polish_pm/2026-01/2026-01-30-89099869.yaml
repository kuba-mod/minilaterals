title: System antydronowy SAN - kluczowe umowy podpisane
text: 'Podczas dzisiejszej uroczystości podpisano trzy umowy dotyczące realizacji
  systemu antydronowego SAN, otwierając tym samym nowy etap jego wdrażania. Do życia
  powołano konsorcjum, w skład którego wchodzą Polska Grupa Zbrojeniowa oraz norweska
  spółka Kongsberg Defence & Aerospace. Konsorcjum będzie odpowiedzialne za budowę
  systemu – dostarczenie 18 modułów bateryjnych systemów przeciwlotniczych z możliwością
  zwalczania bezzałogowych systemów powietrznych. Polska dźwiga na swoich barkach
  odpowiedzialność, wydatki, organizacje, to wszystko, co ma zapewnić bezpieczeństwo
  na polskiej, europejskiej, NATO-wskiej wschodniej granicy, ale nie możemy zostać
  z tym sami i nie zostaniemy z tym sami System SAN jest elementem „Tarczy Wschód”
  i ważnym uzupełnieniem krajowego wielowarstwowego, zintegrowanego systemu obrony
  przeciwlotniczej i przeciwrakietowej, który obejmuje programy: WISŁA, NAREW oraz
  PILICA+. Premier Donald Tusk zapowiedział, że jeszcze dziś w Zagrzebiu będzie rozmawiał
  o europejskim wymiarze programu „Tarcza Wschód” oraz systemu SAN. Zabezpieczenie
  wschodniej granicy Polski, kluczowe dla bezpieczeństwa naszego kraju, jest jednocześnie
  zadaniem o znaczeniu strategicznym dla Europy i całego NATO. Program SAN to największy
  i najnowocześniejszy w Europie zintegrowany system przeciwdronowy. Skala projektu,
  poziom integracji oraz stopień automatyzacji sprawiają, że nie istnieje dziś w Europie
  system o porównywalnych możliwościach i rozmiarze. To nie jest pojedynczy sprzęt
  wojskowy. To jest cały system naczyń połączonych, efektorów, sensorów, oddziaływania
  na zagrożenia z powietrza, ze strony śmigłowców i przede wszystkim zagrożenia ze
  strony bezzałogowych statków powietrznych – mówił Wicepremier i Minister Obrony
  Narodowej Władysław Kosiniak-Kamysz. System SAN będzie składał się z 18 baterii
  systemów antydronowych, 52 plutonów ogniowych, 18 plutonów dowodzenia i 703 pojazdów.
  Wartość zamówienia wynosi około 15 mld zł netto, a większość środków pochodzić będzie
  z unijnego programu SAFE przeznaczonego na obronność. W budowie Programu SAN zostaną
  wykorzystane środki m.in. z SAFE, a więc te europejskie środki, bardzo korzystne,
  bezprecedensowe w swojej skali i łatwości pozyskania zostaną zużyte na ten projekt
  Pierwsze elementy systemu trafią do Wojska Polskiego w rekordowym tempie – jeszcze
  w 2026 roku. Program SAN to polska odpowiedź na rosnące zagrożenia wynikające z
  masowego użycia bezzałogowych statków powietrznych – zarówno te, z którymi Polska
  miała do czynienia 10 września ubiegłego roku, jak i doświadczenia płynące z trwającej
  od lat wojny w Ukrainie. To, co dzieje się w powietrzu nad Ukrainą, rozstrzygać
  będzie i rozstrzyga każdego dnia o bezpieczeństwie i niepodległości tego kraju.
  Tak samo będzie z każdym innym państwem, które będzie zagrożone agresją takiego
  państwa jak Rosja System ma zabezpieczyć wschodnią i północną granicę Polski, kładąc
  nacisk na efektywność i niskokosztowe zwalczanie celów. Te pierwsze doświadczenia
  z agresją dronową pokazały, jak nieadekwatne są środki typu myśliwiec czy rakieta
  po to, aby zestrzelić drony. SAN to metoda na to, aby w sposób zdecydowanie bardziej
  efektywny, tańszy, mądrzejszy reagować na agresję w powietrzu Program SAN pozwoli
  na kompleksowe wykrywanie, identyfikację i zwalczanie bezzałogowych systemów powietrznych.
  Rozszerzy też nasze zdolności fizycznego niszczenia i zagłuszania m.in. dronów.
  Program SAN realizowany jest przez konsorcjum, którego liderem jest Polska Grupa
  Zbrojeniowa, przy strategicznym udziale polskiego przemysłu obronnego. Dzisiejsza
  umowa sprawia, że nasz przemysł będzie miał szansę pokazać, że nie tylko pojedynczy
  sprzęt wojskowy jest bardzo dobrej jakości, ale cały system antydronowy jestinnowacyjny,
  pierwszy tego typu w Europie. Będziemy oddziaływać w niezwykły sposób na zagrożenia,
  które idą ze Wschodu Polskimi dostawcami zaangażowanymi w program SAN są: Polska
  Grupa Zbrojeniowa (lider), APS- Advanced Protection Systems (z którym dziś podpisana
  została jedna z umów), PIT-RADWAR, Zakłady Mechaniczne Tarnów, Rosomak S.A., Jelcz,
  Huta Stalowa Wola, Mesko, Transbit. Udział podmiotów zagranicznych został ograniczony
  do komponentów, których polski przemysł nie jest w stanie dostarczyć w wymaganej
  liczbie i czasie. My to wszystko robimy nie po to, żeby komuś zagrażać, nie żeby
  toczyć wojnę, tylko żeby uniknąć agresji. (…) Nie ma lepszej metody niż uświadomienie
  naszym potencjalnym przeciwnikom, że polskie granice na ziemi, wodzie, powietrzu
  są granicami nie do pokonania, nie do przekroczenia przez agresora Polska ma silne
  sojusze i jest częścią NATO, jednak fundamentem bezpieczeństwa pozostaje własny
  potencjał obronny. To właśnie suwerenność w dziedzinie obronności, budowana we współpracy
  z sojusznikami, daje pewność, że Polska poradzi sobie w sytuacji zagrożenia. Program
  SAN służy temu, by Polska była bezpieczna – niezależnie od sytuacji międzynarodowej.'
