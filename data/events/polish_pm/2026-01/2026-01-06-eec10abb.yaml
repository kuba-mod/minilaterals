title: Tylko jedność i presja Zachodu może skłonić Rosję do pokoju
text: 'Tylko wspólne stanowisko Zachodu może powstrzymać Rosję Kraje, które tworzą
  Koalicję Chętnych, wspierają Kijów w celu zakończenia wojny ukraińsko-rosyjskiej.
  W Paryżu spotkali się m.in. liderzy państw europejskich oraz specjalni wysłannicy
  USA S. Witkoff oraz J. Kushner, którzy prowadzą negocjacje ze stroną ukraińską i
  przygotowują razem z Europejczykami pokój w Ukrainie. Oczywiście za wcześnie, żeby
  ogłaszać przesadnie optymistyczne komunikaty. Do pokoju potrzebna jest przede wszystkim
  pozytywna decyzja agresora o zakończeniu działań wojennych – podkreślił Donald Tusk
  po spotkaniu w Paryżu. Obecnie potrzebne jest sukcesywne uściślanie stanowisk Stanów
  Zjednoczonych, Unii Europejskiej oraz innych państw tworzących Koalicję Chętnych,
  takich jak Kanada, Turcja czy Norwegia. Z każdym tygodniem jesteśmy bliżej konkretnych
  rozwiązań. Dzisiaj rozmawialiśmy już o bardziej szczegółowych kwestiach, akceptowanych
  także przez Waszyngton, jeśli chodzi o gwarancje bezpieczeństwa i rolę poszczególnych
  państw. I to wygląda już naprawdę obiecująco Aby jednak skłonić Rosję do pokoju,
  potrzebny jest nieustanny nacisk na Moskwę. Z dużą nadzieją przywitaliśmy deklarację
  Prezydenta Trumpa i gotowość zgłoszoną przez uczestników dzisiejszego spotkania
  do wytwarzania presji na Rosję, włącznie z sankcjami, jeśli będzie taka potrzeba.
  Moskwę trzeba skłonić do tego, żeby usiadła wreszcie na serio do stołu i rozmawiała
  o warunkach pokoju Jeśli uda się to uzyskać, rola Polski w zabezpieczeniu działań
  państw wspierających Ukrainę po wojnie będzie miała charakter fundamentalny. Każde
  z zadań ma swojego narodowego lidera i wśród tych 4 państw, które będą decydowały
  o tym, jak działać po zakończeniu wojny, Polska będzie wiodąca, jeśli chodzi o kwestie
  logistyczno-organizacyjne Jednocześnie nasi partnerzy nie oczekują obecności polskich
  wojsk w Ukrainie. Prezes Rady Ministrów ocenił ponadto, że daleko idące deklaracje
  amerykańskie dotyczące uczestnictwa USA w gwarancjach bezpieczeństwa i w odbudowie
  Ukrainy, dają ostrożne powody do optymizmu. Warszawa wzorem rozwoju gospodarczego
  dla Kijowa Według USA, Ukraina może brać przykład z Polski w kontekście odbudowy
  swojej gospodarki po zakończeniu działań wojennych. Było mi miło słyszeć, kiedy
  strona amerykańska dodawała odwagi i wiary Ukrainie mówiąc, że Polska jest modelowym
  przykładem tego, jak można podnieść się z upadku gospodarki, przeprowadzając ambitne
  reformy i prowadząc przez lata dobrą politykę Zacytował też wysłannika Prezydenta
  Trumpa J. Kushnera, który ocenił, że Ukraina ma szansę osiągnąć takie sukcesy, jakie
  osiągnęła Polska. Przypomina mi to przesłanie, które przekazałem w orędziu noworocznym
  do Europejczyków: “Be like Poland”. Mniej więcej to samo powtórzyli dzisiaj Amerykanie.
  To powód do satysfakcji, że nie tylko my widzimy, jak wielką i pozytywną drogę przeszedł
  nasz kraj Jednocześnie Premier poinformował, że o roli Polski w procesie pokojowym
  będzie rozmawiał z Prezydentem Karolem Nawrockim. Do spotkania ma dojść jeszcze
  w tym tygodniu. Liderzy Koalicji Chętnych przyjęli dziś Deklarację Paryską, która
  jest potwierdzeniem woli współpracy europejsko-amerykańskiej na rzecz bezpieczeństwa
  Ukrainy i jej odbudowy po wojnie.'
