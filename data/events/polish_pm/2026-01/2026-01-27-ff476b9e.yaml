title: SAFE to epokowe wydarzenie dla bezpieczeństwa Polski i Europy
text: Pierwszy raz w historii Unia Europejska inwestuje w zakupy zbrojeniowe – poprzez
  instrument SAFE, co jest jednym z sukcesów polskiej prezydencji. Wczoraj Komisja
  Europejska pozytywnie oceniła wniosek Polski o finansowanie z tego programu. Nasz
  kraj będzie największym beneficjentem tego projektu  - trafi do nas prawie 200 mld
  zł. Pieniądze, jakie trafią do Polski z programu SAFE, są większe niż cały budżet
  obronny Hiszpanii czy Włoch. I mówię tylko o pieniądzach z SAFE. Nie mówię o naszych
  budżetowych nakładach na obronę Program SAFE od samego początku miał być projektem
  umożliwiającym wykorzystanie środków europejskich na ogromną skalę – zarówno na
  rzecz polskiego przemysłu zbrojeniowego, jak i wzmocnienia ochrony polskiej granicy.
  Pieniądze trafią na modernizację wojska, przemysł obronny i bezpieczeństwa państwa.
  Prawie 30 projektów z ponad setki to Tarcza Wschód i granica wschodnia, więc środki
  te będą bezpośrednio pracowały na nasze bezpieczeństwo Już dziś polska granica lądowa
  z Białorusią, i z Rosją jest najlepiej strzeżoną granicą ze wszystkich granic europejskich.
  Program SAFE to nie tylko inwestycje w bezpieczeństwo. To wielki program rozwojowy,
  który napędzi całą gospodarkę. 80 procent z tych środków trafi do polskich firm,
  do Polskiej Grupy Zbrojeniowej, do prywatnych państwowych podmiotów. Będą to bezpośrednie
  inwestycje w gospodarkę Szef rządu zapowiedział, że wkrótce razem z Ministrem W.
  Kosiniakiem-Kamyszem zainicjują inwestycję, której celem będzie dronowe zabezpieczenie
  wschodniej granicy Polski i Europy. Obecna sytuacja międzynarodowa, zarówno w wymiarze
  globalnym, jak i regionalnym, jest wyjątkowo dynamiczna. Niepewność wywołana konfliktem
  zbrojnym w Ukrainie, a także innymi dramatycznymi wydarzeniami, wymaga pogłębionej
  refleksji geopolitycznej. Dzisiaj będziemy omawiali założenia polskiej polityki
  zagranicznej. Sytuacja wokół Polski wymaga poważnej refleksji i adekwatnego myślenia
  o dyplomacji Uwaga decydentów oraz opinii publicznej koncentruje się dziś na kluczowych
  wyzwaniach polskiej polityki zagranicznej — relacjach zarówno z państwami stanowiącymi
  zagrożenie dla Polski, jak i z jej sojusznikami. Kwestia godności Polski i polskiego
  munduru stała się poważnym wyzwaniem. Będziemy działać w przemyślany i zdecydowany
  sposób To nawiązanie do słów Prezydenta Donalda Trumpa o udziale wojsk sojuszniczych
  w Afganistanie, które jego zdaniem miały trzymać się z dala od linii frontu. Wojsko
  Polskie ramię w ramię z sojusznikami brało udział m.in. w misjach w Afganistanie
  i Iraku. W Afganistanie zginęło 44 Polaków (43 żołnierzy i jeden ratownik medyczny).
  23 polskich żołnierzy zginęło w Iraku
