title: W sprawie bezpieczeństwa Polski niezbędna jest zgoda narodowa
text: Ponadpartyjny konsensus w sprawie bezpieczeństwa Polski W kontekście międzynarodowym,
  sytuacja naszego kraju uzależniona będzie od dalszych losów wojny Rosji z Ukrainą.
  Zwróciłem uwagę Prezydenta na pewne okoliczności dotyczące rozmów o przyszłym pokoju
  i zobowiązań różnych państw, które będą konsekwencją zawarcia umowy między Ukrainą
  i USA, a później między Rosją a Ukrainą, jeśli chodzi o zawieszenie ognia Chodzi
  o 20-punktowy plan pokojowy, który był dyskutowany na ostatnim spotkaniu Koalicji
  Chętnych w Paryżu. Zakłada on m.in. gwarancje bezpieczeństwa dla Kijowa w przypadku
  zawarcia umowy w Rosją. Mamy nadzieję, że wojna wreszcie się zakończy. W związku
  z tym są pewne punkty, które wymagają solidarnego działania wszystkich polskich
  instytucji odpowiedzialnych za nasze bezpieczeństwo Aby udało się to osiągnąć, należy
  wyjąć z bieżących sporów politycznych kwestię Ukrainy, Rosji oraz bezpieczeństwa
  militarnego Polski. Z zadowoleniem przyjmuję deklarację Prezydenta, że w tych sprawach
  jest tego samego zdania. W związku z tym, będziemy starali się kształtować jedną
  linię całego państwa w sprawach bezpieczeństwa Premier i Prezydent ustalili, że
  ewentualne podpisanie dokumentów, takich jak 20-punktowy plan pokojowy w sprawie
  Ukrainy, będą wymagały ratyfikacji. Będę proponował przeprowadzenie procedury ratyfikacyjnej,
  a więc także debatę w parlamencie, głosowanie w Sejmie i podpis Prezydenta. Zgodziliśmy
  się, że to ważny element całej procedury – żeby zbudować szeroki narodowy konsensus
  wokół spraw bezpieczeństwa Współpraca w tej dziedzinie będzie ważna w kontekście
  umocnienia pozycji Polski za granicą. Polska w G20 – wzrasta nasza rola na świecie
  Racja stanu wymaga także, aby rząd i Prezydent razem działali na arenie międzynarodowej
  w kwestii obecności Polski w G20. To państwa, które posiadają największe gospodarki
  na świecie. Szczyt G20 odbędzie się w tym roku w USA. Rozmawialiśmy o tym, aby wspólnie
  prowadzić akcję promocji i obecności Polski w czasie obrad G20. Chciałbym, żeby
  to była wspólna gra, bo chodzi także o opinię i reputację naszego kraju. Z satysfakcją
  przyjąłem gotowość Prezydenta, żebyśmy tutaj współpracowali Dzięki działaniom rządu,
  Polska odniosła ostatnio sukces, zajmując 20. miejsce w grupie najważniejszych gospodarek
  świata. Należymy także do najszybciej rozwijających się państw w Europie. Podczas
  konferencji prasowej Donald Tusk powiedział, że rozumie emocje protestujących w
  Warszawie rolników i podziela ich sprzeciw wobec umowy UE z państwami Mercosur.
  Głosowaliśmy przeciw Mercosur na każdym etapie, nawet w czasie ostatniego głosowania.
  Rozumiem emocje rolników Jak wyjaśnił, rządowi udało się wprowadzić do umowy UE-Mercosur
  klauzulę zabezpieczającą. Dzięki temu interesy rolników są w dużej mierze zabezpieczone.
  Rząd zapewni bezpieczeństwo w sieci mimo weta Prezydenta Prezes Rady Ministrów odniósł
  się także m.in. do weta Karola Nawrockiego w sprawie nowelizacji ustawy o świadczeniu
  usług drogą elektroniczną. Jak wyjaśnił, rząd znajdzie inne sposoby, by zwiększyć
  bezpieczeństwo w sieci. Nie rozumiem, jak można wetować ustawę, która ma uczynić
  państwo sprawniejszym w walce z pedofilią w sieci i propagandą rosyjską w internecie.
  (…) Trzeba się przyzwyczaić. To nie jest aż taka zła sytuacja, żeby naprawiać to,
  co jest kiepskie, bez ustaw. Bez wątpienia znajdziemy sposoby, żeby zwiększyć bezpieczeństwo
  w sieci Jak dodał, nadużywanie wolności słowa w internecie stwarza zagrożenie dla
  obywateli, zwłaszcza dzieci, a także dla państwa polskiego. Państwo musi dysponować
  narzędziami, które pozwolą na eliminowanie nielegalnych treści z sieci.
