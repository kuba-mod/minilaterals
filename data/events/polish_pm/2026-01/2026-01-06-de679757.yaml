title: Spotkanie Koalicji Chętnych w Paryżu - rozmowy na temat gwarancji dla Ukrainy
text: 'Międzynarodowe gwarancje bezpieczeństwa dla Kijowa Państwa Koalicji Chętnych
  pomagają Ukrainie zakończyć wojnę ukraińsko-rosyjską. W paryskim spotkaniu będą
  uczestniczyć: Prezydent Wołodymyr Zełenski, liderzy państw europejskich i UE, sekretarz
  generalny NATO Mark Rutte oraz sekretarz stanu USA Marco Rubio wraz ze specjalnymi
  wysłannikami Prezydenta Donalda Trumpa. Starania dyplomacji europejskiej, amerykańskiej
  i ukraińskiej dają szansę – ale na pewno nie gwarancję – na uzyskanie pokoju w Ukrainie.
  Nie muszę jednak tłumaczyć, jak ważne byłoby to z naszego punktu widzenia, gdyby
  te starania doprowadziły do przerwania ognia i pokoju – ocenił Premier Donald Tusk
  przed wylotem do Paryża. W stolicy Francji dyskutowane będą szczegóły Deklaracji
  Paryskiej, która będzie potwierdzeniem woli współpracy Europy i USA na rzecz gwarancji
  bezpieczeństwa, wsparcia Ukrainy i jej odbudowy po wojnie. To nie będą jeszcze zobowiązania,
  które wymagałyby jakiś konkretnych decyzji logistycznych czy finansowych, ale będą
  potwierdzeniem woli. Chodzi przede wszystkim o uzyskanie uczciwych i bezpiecznych
  – z punktu widzenia Ukrainy i Europy – warunków pokoju lub przynajmniej rozejmu
  Do zawarcia jakiejkolwiek umowy między Rosją i Ukrainą, potrzebna będzie także jeszcze
  dobra wola ze strony agresora, czyli Moskwy. Na razie nie ma żadnych sygnałów ze
  strony Rosji. Dlatego celem paryskiego spotkania jest zacieśnienie i ujednolicenie
  stanowiska europejskiego i amerykańskiego. Tylko taka presja ma szansę zmusić Rosjan
  do poważnego potraktowania kwestii przerwania ognia, a następnie pokoju Tematem
  spotkania Koalicji Chętnych będzie także dyskusja nad elementami przyszłego 20-punktowego
  planu pokojowego. Do tej pory ten dokument był trzymany w dość głębokiej tajemnicy.
  W tej chwili wiadomo, jaki jest punkt wyjścia – te 20 punktów, a także dokumenty,
  które będą opisywały współpracę państw europejskich i Stanów Zjednoczonych w odbudowie
  Ukrainy po wojnie. W Paryżu nie należy się jednak spodziewać ostatecznych decyzji
  Niewykluczone, że do podpisania dokumentów, które zatwierdzą ostatecznie wspólne
  amerykańsko-europejskie stanowisko, dojdzie w najbliższych dniach, być może w Waszyngtonie.
  Nieplanowanym tematem rozmów w Paryżu będzie także kwestia Grenlandii – poruszana
  przez USA i wzbudzająca dużo emocji w Europie. Dla Polski dwie rzeczy są jednoznaczne
  – żaden członek Paktu Północnoatlantyckiego nie powinien atakować czy grozić drugiemu
  członkowi. Inaczej NATO traciłoby sens, gdyby w obrębie Paktu dochodziło do konfliktu
  czy wzajemnych agresywnych kroków Solidarność europejska i poszanowanie integralności
  państw Europy są kwestiami elementarnymi. Wszystkie ewentualne spory czy dyskusje
  powinny być rozwiązywane w przyjaznym dialogu między członkami NATO. Dania może
  liczyć na solidarność całej Europy. Więzi transatlantyckie, które są fundamentem
  NATO i naszego bezpieczeństwa, nie mogą ucierpieć wskutek takich czy innych zapowiedzi,
  decyzji czy nieporozumień. To trudne zadanie, które będzie wymagało dobrej woli
  ze wszystkich stron Jak dodał, na kwestię bezpieczeństwa Polski w wymiarze strategicznym
  należy patrzeć z perspektywy długoterminowej. Różne nieporozumienia i niepokoje
  będą targały światem Zachodu, ale Polska musi być jednym z tych państw, które będzie
  cały czas dbało o zachowanie strategicznej więzi europejsko-amerykańskiej. Nie na
  najbliższy rok, ale na dekady Trzeba być solidarnym i stanowczym, ale równocześnie
  nie popełnić błędu – tylko takie podejście zagwarantuje bezpieczeństwo nie tylko
  Polski, ale całego Zachodu. Wspólne oświadczenie w sprawie Grenlandii'
