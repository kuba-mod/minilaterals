title: Polska obroniła się przed próbami destabilizacji infrastruktury energetycznej
text: Pod koniec 2025 roku, 29  i 30 grudnia, doszło do cyberataków na infrastrukturę
  energetyczną w Polsce. Zaatakowano punktowo niektóre miejsca, w tym dwie elektrociepłownie.
  Ataki były wymierzone  także w system, który umożliwia zarządzanie prądem pochodzącym
  z OZE, czyli z odnawialnych źródeł energii, jak wiatraki i farmy fotowoltaiczne.
  Wiele wskazuje na to, że te ataki były przygotowane przez grupy wprost związane
  z rosyjskimi służbami – powiedział Prezes Rady Ministrów na konferencji po spotkaniu.
  Premier zaznaczył, że zagrożone było nie tylko bezpieczeństwo energetyczne, czyli
  prąd i ciepło w naszych domach, ale także - bezpieczeństwo państwa. Polska skutecznie
  obroniła się przed cyberatakiem. Nie doszło do żadnych negatywnych konsekwencji,
  jak destabilizacja systemu energetycznego kraju czy blackout. Systemy, które dzisiaj
  w Polsce mamy, okazały się skuteczne. Ani przez chwilę nie była zagrożona infrastruktura
  krytyczna, czyli sieci przesyłowe i to, co decyduje o bezpieczeństwie całego systemu
  Prezes Rady Ministrów wyraził przekonanie, że choć polski system energetyczny jest
  bezpieczny i odporny na tego typu ingerencje czy ataki, potrzebuje dalszego wzmocnienia.
  Szef rządu podkreślił, że cyberatak na infrastrukturę energetyczną został potraktowany
  bardzo poważnie i rząd przygotowuje dodatkowe zabezpieczenia. Kończą się prace nad
  ustawą o Krajowym Systemie Cyberbezpieczeństwa, która wprowadzi bardziej rygorystyczne
  wymogi dotyczące zarządzania ryzykiem, ochrony systemów IT i OT (technologii operacyjnych)
  oraz reagowania na incydenty. Mam nadzieję jak najszybciej wdrożyć tę ustawę. Będziemy
  wyposażali polskie instytucje w narzędzia ochrony rynku przed systemami i urządzeniami,
  które ułatwiałyby obcym państwom ingerencję oraz pozyskiwanie informacji. Dążymy
  do autonomizacji i polonizacji systemów bezpieczeństwa Premier wyraził nadzieję,
  że Prezydent podpisze tę ustawę bez zbędnej zwłoki. Zmobilizowałem moich ministrów
  oraz służby specjalne do wytężonej pracy. Musimy być przygotowani na wszelkie ewentualności
  Premier podkreślił, że mimo prób ingerencji ze strony prawdopodobnie ludzi związanych
  z obcym mocarstwem, wczoraj, czyli 14 stycznia, Polska osiągnęła  rekordową produkcję
  energii w historii – 30 GW.
