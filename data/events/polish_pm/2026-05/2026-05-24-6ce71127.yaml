title: Odprawa w Rządowym Centrum Bezpieczeństwa po serii prowokacji i fałszywych
  alarmów
text: Wczoraj wieczorem, po fałszywym alarmie, straż pożarna była zmuszona siłowo
  wejść do mieszkania w Gdańsku należącego do członka rodziny Prezydenta. Ostatnio
  mamy do czynienia z kilkoma spektakularnymi prowokacjami polegającymi na zgłoszeniach
  do straży pożarnej i policji dotyczącymi pożaru czy zagrożenia życia – wyjaśnił
  Donald Tusk podczas odprawy w Rządowym Centrum Bezpieczeństwa. Wszystkie służby
  mają dołożyć wszelkich starań, aby zidentyfikować osoby odpowiedzialne za te działania
  i jak najszybciej doprowadzić do ich zatrzymania. Ostatnie zdarzenie jest szczególnie
  niepokojące z punktu widzenia bezpieczeństwa państwa. Choć nie chodzi o mieszkanie
  Karola Nawrockiego, lecz członka jego rodziny, prowokacja ma wyjątkowo groźny charakter.
  Uderza także w poczucie stabilności i bezpieczeństwa państwa. Wczoraj w nocy byłem
  w bezpośrednim kontakcie z Prezydentem Szef rządu zaapelował również, aby w związku
  z prowokacjami nie atakować straży pożarnej ani policji, podkreślając, że funkcjonariusze
  wykonują swoje obowiązki zgodnie z przepisami. Straż pożarna i policja nie mogą
  ryzykować, że zginie dziecko czy spłonie mieszkanie. Muszą reagować natychmiast
  i nie mają czasu ani narzędzi, aby w danej chwili ocenić, czy alarm jest fałszywy.
  Dla nich zawsze priorytetem jest szybkie podjęcie akcji Szef rządu zwrócił się do
  służb z prośbą, aby wszystkie nieobjęte tajemnicą informacje o działaniach państwa
  w sprawach dotyczących prowokacji były na bieżąco przekazywane społeczeństwu. Chodzi
  o to, aby możliwie szybko ograniczyć falę spekulacji i nieuzasadnionych przypuszczeń.
  Zwracam się również do najbardziej aktywnych uczestników debaty, aby powstrzymali
  się od szukania politycznego kontekstu i nie włączali tych spraw w bieżącą walkę
  partyjną Premier nakazał także sprawdzenie procedur oraz weryfikację sankcji za
  fałszywe zgłoszenia,  aby zwiększyć odporność służb ratunkowych na takie przestępstwa
  oraz skuteczność ścigania sprawców. W odprawie w Rządowym Centrum Bezpieczeństwa
  uczestniczyli Wicepremierzy Władysław Kosiniak-Kamysz i Krzysztof Gawkowski, Ministrowie
  Marcin Kierwiński, Jan Grabiec i Tomasz Siemoniak, a także szefowie służb podległych
  MSWiA oraz Ministrowi Koordynatorowi Służb Specjalnych.
