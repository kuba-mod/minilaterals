title: Państwo odzyska kontrolę nad rynkiem kryptowalut - rząd trzeci raz skieruje
  do Sejmu projekt ustawy
text: Premier zapowiada natychmiastowe skierowanie  do Sejmu projektu ustawy dotyczącej
  rynku kryptowalut. To już trzecia próba uregulowania tego obszaru. Wcześniej dwukrotnie
  ustawę zawetował Prezydent. Jedyną zmianę, jaką będę proponował w tym projekcie,
  to jeszcze wyraźniejsze zaostrzenie kar dla tych, którzy wykorzystując marzenia
  ludzi, czasami ich naiwność, brak wiedzy, oszukują ich i narażają państwo polskie,
  nasze bezpieczeństwo na szwank Zaostrzenie sankcji ma odstraszać potencjalnych sprawców
  nadużyć oraz zwiększyć poziom ochrony inwestorów. Premier zwrócił uwagę na powiązania
  części podmiotów działających na rynku kryptowalut z przestępczością zorganizowaną.
  Chodzi o giełdę Zondakrypto, która miała powiązania z rosyjską mafią oraz przelewała
  środki do podmiotów powiązanych z politykami PiS I Konfederacji. Mieliśmy do czynienia
  z firmą, której źródła są wyjątkowo ciemne. To mafia rosyjska i jej pieniądze zaangażowane
  w zorganizowanie giełdy Zondacrypto Szef rządu zwrócił także uwagę na kolejne poważne
  wątki sprawy, obejmujące zarówno powiązania kryminalne, jak i polityczne. Ta sprawa
  to porwanie lub zabójstwo założyciela Zondacrypto. To finansowanie przez te giełdę
  rozmaitych kampanii politycznych, patronowanie politycznym imprezom w kampanii prezydenckiej
  na rzecz Karola Nawrockiego i bezpośrednie finansowanie polityków prawicy Konieczne
  jest zdecydowane przeciwdziałanie takim zjawiskom poprzez skuteczne regulacje oraz
  działania organów państwa. Odpowiedzialność za ich brak ponosi opozycja. To skuteczne
  działania PiS-u, Konfederacji i Prezydenta Nawrockiego, aby zablokować dwukrotnie
  regulacje dotyczące tego rynku. Macie ostatnią szansę, żeby pokazać, że coś do was
  dotarło i że wspólnie z rządem będziecie chcieli zablokować na przyszłość działania
  tego typu gangsterki. Liczę na opamiętanie Projekt ustawy trafi do Sejmu jeszcze
  w tym tygodniu. Nowe przepisy mają wzmocnić narzędzia państwa w zakresie ochrony
  inwestorów oraz umożliwić wcześniejsze ostrzeganie przed ryzykownymi przedsięwzięciami.
