title: Donald Tusk i Giorgia Meloni zapowiadają nowy etap współpracy Polski i Włoch
text: Polska i Włochy mają podobne interesy, wspólną wizję Europy oraz podzielają
  te same wartości. Dlatego nadszedł czas na rozmowę o dalszym zacieśnianiu wzajemnych
  relacji. Jesteśmy gotowi do rozpoczęcia poważnych negocjacji, które powinny zakończyć
  się nowym traktatem. Nasze dwa kraje zasługują na stosunki na najwyższym możliwym
  poziomie. Łączy nas historia i wspólne poglądy geopolityczne. Przyjaźń polsko-włoska
  jest bardzo głęboko zakorzeniona w naszej historii Warszawa i Rzym mają również
  zbieżne stanowiska we wszystkich kluczowych sprawach dotyczących Europy – m.in.
  wojny w Ukrainie, unijnego systemu handlu emisjami oraz funduszy europejskich. W
  sprawie ETS będziemy działać razem – intuicja mi mówi, że będziemy tu skuteczni,
  jako polityczny duet. Jeśli chodzi o fundusze europejskie i o przyszłą perspektywę
  finansową UE, to Polska i Włochy mają identyczny pogląd, jeśli chodzi o politykę
  spójności i wspólną politykę rolną. Każe mi to z optymizmem patrzeć na finał tych
  negocjacji Wspólna praca Polski i Włoch na rzecz pokoju w Ukrainie ma bardzo praktyczny
  wymiar. Nasze firmy i instytucje będą razem pracowały, aby pomoc dla Ukrainy była
  rozbudowywana już teraz. Nie możemy czekać na zakończenie wojny, bo nie wiemy kiedy
  ona się zakończy. Dlatego Konferencja Odbudowy Ukrainy będzie także konferencją
  na rzecz bezpieczeństwa Ukrainy Na dobrą współpracę między państwami zwróciła także
  uwagę Giorgia Meloni. Włochy i Polska to jedyne dwa kraje, które wzajemnie mówią
  o sobie w swoich hymnach narodowych. Bardzo głębokie związki znajdują odbicie również
  w naszej współpracy gospodarczej. Wymiana handlowa przekroczyła rekordową kwotę
  36 mld euro. Warszawa jest jednym z najważniejszych naszych partnerów. Dlatego będziemy
  umacniać naszą współpracę i nasze partnerstwo Prezes Rady Ministrów podkreślił,
  że Giorgia Meloni odgrywa ważną rolę w budowie Europy opartej na wartościach. Jestem
  przywiązany do moralnych fundamentów polityki i wiem, że jeśli ktoś w Europie ma
  dokładnie takie samo podejście, to znaczy wierzy w to, że moralność i prawda mają
  sens – to jest to Georgia Meloni. Europejska polityka jest dużo lepsza dzięki obecności
  pani Premier Dzięki współpracy Polski i Włoch udało się także zjednoczyć większość
  państw UE wokół realistycznej i zdecydowanej polityki dotyczącej ochrony granic,
  bezpieczeństwa terytorialnego oraz zwalczania nielegalnej imigracji.
