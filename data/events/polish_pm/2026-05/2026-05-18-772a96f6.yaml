title: Polska rozwija współpracę obronną z USA – kolejna umowa podpisana
text: Amerykańska inwestycja w Polsce będzie służyła naprawie i obsłudze technicznej
  silników do legendarnych czołgów Abrams. Nasz kraj zakupił 366 takich maszyn. Dzisiaj
  jesteśmy świadkami niezwykłej uroczystości. Abramsy to jedna z naszych największych
  inwestycji i najlepszych przykładów współpracy polsko-amerykańskiej – ocenił Donald
  Tusk podczas uroczystości w Wojskowych Zakładach Lotniczych w Dęblinie. Polska będzie
  pierwszym państwem w Europie i trzecim na świecie, który posiada autoryzowane centrum
  serwisowe silników do czołgów Abrams. Są tylko trzy miejsca na świecie, gdzie funkcjonują
  takie centra – USA, Australia i teraz Polska. Nie ma lepszego dowodu trwałości,
  rzetelności i perspektyw współpracy polsko-amerykańskiej Kupując czołgi Abrams,
  poprzedni rząd nie zabezpieczył offsetu ani krajowych zdolności serwisowych dla
  ich silników. W efekcie naprawa i obsługa techniczna maszyn musiałyby odbywać się
  za oceanem, co wiązałoby się z długim czasem realizacji. Umowa podpisana z amerykańską
  firmą oznacza transfer najnowocześniejszych technologii oraz stworzenie nowych miejsc
  pracy w Polsce. Wartość inwestycji wynosi 300 mln zł. Jedność transatlantycka, w
  tym współpraca polsko-amerykańska, jest gwarancją bezpieczeństwa i stabilności ładu
  międzynarodowego, który w obecnych czasach narażony jest na różnego rodzaju ryzyka.
  Jestem przekonany, że trudności doby obecnej nie wpłyną na to, co jest fundamentem
  naszego europejskiego i amerykańskiego bezpieczeństwa, czyli wzajemne zaufanie,
  długoterminowa współpraca i budowanie wzajemnej lojalności, która będzie potrafiła
  oprzeć się wszelkim turbulencjom W Polsce panuje pełne zrozumienie dla znaczenia
  relacji polsko-amerykańskich. Nasz kraj pozostaje także bliskim i wiarygodnym sojusznikiem
  USA. Warto o tym pamiętać, bo lepszego sojusznika Ameryka nigdzie nie znajdzie.
  I to się nigdy nie zmieni. Jako Polska będziemy jednak zawsze oczekiwali tego samego,
  co sami prezentujemy wobec naszych najbliższych sojuszników – szacunku i przewidywalności
  Oczekujemy partnerskich relacji od swoich sojuszników, ponieważ nikt w Europie ani
  w NATO nie inwestuje tak dużo we własne i wspólne bezpieczeństwo jak nasz kraj.
  Polska jest także przykładem dla innych państw, jeśli chodzi o prowadzenie mądrej
  i odważnej polityki bezpieczeństwa. To jest skarb w polskiej polityce, że Polacy
  nie pokłócili się nigdy o te kwestie – bezpieczne polskie granice oraz nasze wojsko
  i sojusze. Niech tak pozostanie. Niech nikt nie ulegnie pokusie, aby sprawy bezpieczeństwa
  Polski wystawiać na szwank w związku z jakimś doraźnym interesem politycznym Utrzymanie
  silnego sojuszu polsko-amerykańskiego i jedności transatlantyckiej pozostaje jednym
  z kluczowych gwarantów bezpieczeństwa naszego kraju. Wicepremier, Minister Obrony
  Narodowej Władysław Kosiniak-Kamysz podkreślił, że NATO nie może istnieć bez Stanów
  Zjednoczonych, a siła USA bez NATO byłaby znacznie mniejsza, ponieważ oba filary
  bezpieczeństwa są ze sobą nierozerwalnie związane. Polsko-amerykańskie relacje nie
  są oparte tylko na deklaracjach czy wspólnej historii, ale także na pragmatycznych
  działaniach gospodarczych i militarnych. Realizujemy zamówienia na ponad 50 mld
  dolarów – to Abramsy, Apache, F-35 oraz Patrioty. To wielka inwestycja w polsko-amerykański
  sojusz na rzecz rozwoju gospodarczego i bezpieczeństwa. To zasługuje na szacunek
  każdej ze stron Reorganizacja wojsk USA nie może się odbywać kosztem Polski – największego
  sojusznika Stanów Zjednoczonych w Europie. Wspólne inwestycje, zakupy oraz tworzenie
  infrastruktury dla żołnierzy amerykańskich – Polska przeznacza na pobyt każdego
  z nich ok. 15 tys. dolarów rocznie – wyróżniają nas na tle innych państw europejskich.
  Wierzę, że wszystkie niedomówienia i medialny szum zostaną w najbliższych dniach
  wyjaśnione Władysław Kosiniak-Kamysz poinformował, że jesienią Polska podpisze kolejną
  umowę inwestycyjną na centrum serwisowe silników do helikopterów Apacz i Black Hawk
  oraz samolotów AW149.
