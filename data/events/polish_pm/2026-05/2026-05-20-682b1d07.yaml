title: Węgry - nowa nadzieja dla demokracji w Europie
text: Wizyta Pétera Magyara w Polsce jest jego pierwszą podróżą zagraniczną po zaprzysiężeniu
  na Premiera. Tisza, której jest liderem, zwyciężyła w kwietniowych wyborach parlamentarnych
  na Węgrzech – władzę po 16 latach stracił wówczas Viktor Orbán. Polaków i Węgrów
  łączy zrozumienie, że ważne sprawy wymagają waleczności i serca. Można pokonać każde
  zło, jeśli się wierzy we własny naród Zwycięstwo Pétera Magyara na Węgrzech ponownie
  obudziło w Europie nadzieję, że tradycyjne wartości demokratyczne są silniejsze
  od rządów autorytarnych. Twoje historyczne zwycięstwo to nie tylko powrót Budapesztu
  do UE. To także znak dla milionów ludzi w Europie i na świecie, że demokracja, rządy
  prawa, przyzwoitość i moralność w polityce nie są przegranymi sprawami Polsko-węgierskie
  stosunki są tradycyjnie dobre, niezależnie od tego, kto sprawuje władzę. Ostatnie
  lata rządów Viktora Orbana były dramatycznym momentem dla naszych relacji, ale i
  tak nie wpłynęły na stosunki między Polakami a Węgrami. Dzisiaj pokazujemy, że Węgry
  i Polska działają razem Péter Magyar zwrócił uwagę na wspólną historię Polski i
  Węgier. Szanujemy tysiącletnią przyjaźń polsko-węgierską. To także historia polskich
  uchodźców, którzy w czasie II wojny światowej znaleźli schronienie na Węgrzech.
  Uratowano wówczas ponad 30 tys. Polaków, w tym ok. 5 tys. polskich Żydów Odbudowę
  relacji z Warszawą i Europą Péter Magyar zapowiadał jeszcze w trakcie swojej kampanii
  wyborczej. To nie przypadek, że z pierwszą wizytą zagraniczną przyjechałem do Polski.
  Odwiedzam Kraków, Warszawę i Gdańsk – chciałem pokazać narodowi węgierskiemu jak
  najwięcej miejsc z Polski i odwiedzić miasta, w których bije serce wolności Europy
  Wizyta szefa węgierskiego rządu w Polsce pokazuje, że relacje oparte na wspólnych
  wartościach przetrwają każdą próbę czasu. Péter Magyar zapowiedział odnowienie współpracy
  w ramach Grupy Wyszehradzkiej – inicjatywy łączącej Polskę, Węgry, Czechy i Słowację,
  która wzmacnia pozycję czterech krajów Europy Środkowo-Wschodniej na arenie międzynarodowej.
  Rewitalizacja Grupy Wyszehradzkiej to szerszy projekt – dzielimy wspólne poglądy
  i interesy, dążąc do tego, aby Europa Środkowo-Wschodnia stała się miejscem, w którym
  rozstrzygają się losy całego kontynentu. Współpraca polsko-węgierska będzie tu absolutnie
  kluczowa Warszawa może zaoferować regionowi pomoc i współpracę dotyczącą bezpieczeństwa
  energetycznego, aby Europa Środkowo-Wschodnia stała się maksymalnie samodzielna
  pod względem dostaw i źródeł energii. W Polsce w krótkim czasie osiągnęliśmy pełną
  niezależność energetyczną dzięki dywersyfikacji dostaw. Jeszcze niedawno byliśmy
  w 90% zależni od rosyjskiego gazu i ropy, co ograniczało naszą suwerenność. Dziś
  jesteśmy w pełni niezależni i mamy wielokierunkowe możliwości działania Warszawa
  i Budapeszt będą także pracować nad wspólnym europejskim stanowiskiem wobec Ukrainy.
