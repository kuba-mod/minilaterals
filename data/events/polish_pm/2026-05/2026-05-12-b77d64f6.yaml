title: Państwo musi szanować godność każdego człowieka
text: Premier odniósł się do sytuacji prawnej małżeństw jednopłciowych, które zawarły
  związek poza granicami kraju i chcą zamieszkać w Polsce. Zobowiązaliśmy się, i będę
  tego też osobiście pilnował, aby przestrzegać wyroków zarówno trybunałów europejskich,
  jak i polskich sądów. W pierwszym rzędzie jest to więc kwestia praworządności –
  zapowiedział Prezes Rady Ministrów przed posiedzeniem Rady Ministrów. Chodzi o wyrok
  Trybunału Sprawiedliwości Unii Europejskiej, który orzekł, że państwo członkowskie
  UE musi uznawać małżeństwa dwóch osób tej samej płci, jeśli zostały one legalnie
  zawarte w innym kraju Unii podczas korzystania z prawa do swobodnego przemieszczania
  się i pobytu. Chciałbym przeprosić wszystkich, którzy przez długie lata czuli się
  odrzucani lub upokarzani. Państwo przez wiele lat nie zdawało tutaj egzaminu. Mam
  nadzieję, że po tym wyroku znajdziemy szybkie i konieczne rozwiązania w parlamencie
  Premier zobowiązał Ministra Cyfryzacji oraz Ministra Spraw Wewnętrznych i Administracji
  do przygotowania treści rozporządzenia w sprawie transkrypcji małżeństw jednopłciowych
  zawieranych poza granicami Polski. Równocześnie, żeby przeciąć wszelkie spekulacje,
  chcę podkreślić, że zarówno decyzja o wydaniu rozporządzenia, jak i przyszłe prace
  ustawowe i logika dotychczasowych praw, które obowiązują w Polsce, to nie jest droga
  do możliwości adopcji Decyzja o rozporządzeniu nie będzie otwarciem możliwości adopcji
  dzieci przez pary jednopłciowe. W Polsce opinia publiczna ma różne poglądy na temat
  związków jednopłciowych. Są one motywowane tradycją, wyznaniem wiary i poglądami
  politycznymi. Jednak uznawanie praw wszystkich obywateli jest kwestią godności i
  przestrzegania praw człowieka. W jednej sprawie nie możemy się różnić. To jest kwestia
  godności człowieka, prawa do szczęścia, prawa do równego traktowania przez państwo.
  I w tych kategoriach proszę wszystkich, zarówno tu, jak i w Sejmie, żeby szanować
  godność każdego człowieka Szacunek w debacie publicznej jest niezwykle ważny. Prace
  parlamentarne nad projektem ustawy mają rozpocząć się możliwie szybko. Przed nami
  gorąca debata, więc jeszcze raz chciałbym bardzo mocno podkreślić, żeby i w tej
  debacie, i w dyskusjach, i w decyzjach zawsze pamiętać o człowieku i jego godności.
  Z tego nikt, żadna okoliczność nikogo z nas nie zwalnia Szef rządu zaapelował również
  do parlamentarzystów o sprawne procedowanie aktów na poziomie ustawowym.
