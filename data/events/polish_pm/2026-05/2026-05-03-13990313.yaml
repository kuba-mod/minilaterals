title: Konstytucja 3 maja to lekcja odpowiedzialności i ostrzeżenie dla Europy
text: Szczyt Europejskiej Wspólnoty Politycznej odbywa się w czasie narastających
  napięć międzynarodowych. Jednym z kluczowych tematów będzie wzmacnianie wspólnoty
  politycznej i zdolności do reagowania na zagrożenia. Moment jest szczególny, nie
  muszę nikogo przekonywać o tym, jak ważne jest stałe utrzymywanie kontaktów i próba
  utrzymania takiej elementarnej spójności tej politycznej wspólnoty – powiedział
  Premier podczas spotkania z dziennikarzami. W obliczu niepewności międzynarodowej
  konieczne jest prowadzenie odpowiedzialnej i przewidywalnej polityki. W dobie tego
  strategicznego zamieszania i tej geopolitycznej niepewności bardzo zależy mi na
  tym, żeby wspólnie z innymi liderami nadać rys odpowiedzialności polityce międzynarodowej
  tak, aby sytuacja nie wymknęła się spod kontroli Udział w szczycie będzie również
  okazją do rozmów dwustronnych z najważniejszymi partnerami Polski. Premier zapowiedział
  spotkania m.in. z przywódcami Kanady, Wielkiej Brytanii oraz z prezydentem Ukrainy.
  Rozmowy będą dotyczyć zarówno bieżącej sytuacji bezpieczeństwa, jak i dalszego wsparcia
  dla Ukrainy oraz współpracy gospodarczej. Tegoroczny szczyt rozpoczyna się w dniu
  rocznicy uchwalenia Konstytucji 3 Maja – jednego z najważniejszych symboli polskiej
  państwowości. Premier zapowiedział, że odniesie się do tego dziedzictwa podczas
  rozmów z europejskimi liderami. Przypomnę zebranym w Erywaniu liderom świata o tym,
  jaka lekcja płynie z naszej historii i z tego dnia 3 maja – to jest lekcja optymizmu,
  ale też lekcja ostrzegawcza W jego ocenie doświadczenia historyczne Polski pokazują,
  jak ważne są odpowiedzialność polityczna i poszanowanie zasad państwa prawa. Szef
  rządu zaznaczył również, że duch Konstytucji 3 Maja powinien inspirować współczesną
  politykę. W duchu idei Konstytucji 3 Maja, będziemy rozmawiali o odpowiedzialnej
  polityce i takiej bardziej dalekowzrocznej polityce niż to, co w tej chwili czasami
  obserwujemy Premier odniósł się także do znaczenia konstytucji i rządów prawa –
  zarówno w kontekście międzynarodowym, jak i krajowym. Przestrzeganie obowiązujących
  zasad jest warunkiem skutecznego działania państwa. Najważniejszą rzeczą jest przestrzeganie
  konstytucji i wzmacnianie rządów prawa. Zawsze wtedy, kiedy narody, przywódcy, instytucje
  państwowe przestrzegają własnego prawa, kiedy rządy prawa nie są tylko pustym sloganem
  – wtedy sprawy idą do przodu Stabilność instytucji i przewidywalność działań władz
  są kluczowe dla rozwoju państwa i budowania zaufania społecznego. Premier odniósł
  się również do propozycji prezydenta Nawrockiego powołania Rady do spraw nowej Konstytucji.
  Najważniejsze jest przestrzeganie obowiązującego prawa, a nie inicjowanie nowych
  debat ustrojowych. Polska potrzebuje dziś przede wszystkim stabilności i odpowiedzialności
  politycznej. Pan prezydent dobrze wie, że ani dziś, ani jutro, ani pojutrze większości
  konstytucyjnej na rzecz jego pomysłów nie będzie, więc tak naprawdę raczej chodzi
  o polityczną grę. Moim zdaniem będzie to tylko kolejne zamieszanie, a Polska dzisiaj
  potrzebuje przede wszystkim stabilności Premier podkreślił, że spory polityczne
  są naturalne, ale nie mogą prowadzić do podważania fundamentów państwa. Podstawą
  funkcjonowania demokracji jest respektowanie obowiązujących przepisów.
