title: Służby w pełnej mobilizacji - akcja gaśnicza z powietrza i z ziemi
text: Wczoraj w powiecie wołomińskim na Mazowszu wybuchł pożar lasu, który objął obszar
  ok. 300 hektarów. Nieprzerwanie prowadzone są działania gaśnicze zarówno na ziemi,
  jak i z powietrza. Państwowa Straż Pożarna, Ochotnicza Straż Pożarna, Policja, WOT,
  Lasy Państwowe – zawsze te same służby i ci sami ludzie są na posterunku – chciałem
  im za to bardzo podziękować – powiedział Donald Tusk podczas odprawy w miejscowości
  Międzyleś. Polska otrzymała również sygnały od sąsiadów o gotowości do udzielenia
  wsparcia. Słowacy jako pierwsi zwrócili się do nas z pytaniem, czy potrzebujemy
  pomocy. W razie potrzeby będziemy mobilizować dodatkowe środki. Na razie wygląda
  na to, że poświęcenie i gigantyczna praca naszych strażaków przyniosły wstępny efekt
  Akcja gaśnicza prowadzona jest z wykorzystaniem nowoczesnego sprzętu i technologii.
  Mamy drony FlyEye i Bayraktar, a więc sprzęt umożliwiający monitoring sytuacji.
  To radykalnie zwiększa efektywność naszych działań. Cieszę się, że możliwości, którymi
  dysponuje Polska, służą nie tylko bezpieczeństwu państwa, ale także akcjom ratowniczym
  Prezes Rady Ministrów ponowił apel o stosowanie się do poleceń służb i zachowanie
  ostrożności. Od momentu zgłoszenia pożaru wszystkie służby natychmiast zostały zaangażowane
  w działania ratownicze. To blisko 800 strażaków nieustannie walczących z pożarem,
  wsparcie niemal 400 funkcjonariuszy Policji, ponad 250 zaangażowanych pojazdów oraz
  działania Wojsk Obrony Terytorialnej – poinformował Minister Spraw Wewnętrznych
  i Administracji Marcin Kierwiński. Czynnikiem sprzyjającym rozprzestrzenianiu się
  ognia pozostaje wiatr. Sytuacja jest stabilna, jednak obawiamy się najbliższych
  godzin ze względu na nasilający się wiatr, który w porywach może osiągać 40–45 km/h.
  W nocy odpowiednio zabezpieczyliśmy teren, wykorzystując także prace ziemne, aby
  ogień nie rozprzestrzenił się na nowe obszary – przekazał Komendant Główny Państwowej
  Straży Pożarnej Wojciech Kruczek. Od godzin porannych wykorzystywane jest również
  wsparcie z powietrza w postaci helikopterów i samolotów.
