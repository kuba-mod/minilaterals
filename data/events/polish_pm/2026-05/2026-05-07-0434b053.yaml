title: Premier w Watykanie - rozmowa z Papieżem o pokoju i jedności świata
text: W świecie zdominowanym przez narodowe egoizmy i konflikty potrzebny jest powrót
  do wartości głoszonych przez Leona XIV, takich jak pokój, odpowiedzialność i solidarność.
  Powiedziałem Ojcu Świętemu, że jego słowa mogą pozytywnie wpłynąć na świat, który
  zmierza w nienajlepszym kierunku. Słowa i działania Papieża mają wielkie znaczenie,
  ponieważ przywracają ład moralny także w życiu publicznym Szef rządu przypomniał
  postać polskiego Papieża św. Jana Pawła II, którego słowa także zmieniły komunistyczną
  rzeczywistość w naszej Ojczyźnie. Dobre i mądre słowa oraz moralne zachowania to
  nie tylko demonstracja – one czasami mogą zmienić świat. Tak było w przypadku Jana
  Pawła II – byliśmy wszyscy tego beneficjentami Za pośrednictwem szefa rządu, Leon
  XIV skierował do Polaków przesłanie, żeby nie tracili nadziei, budowali siłę na
  rzecz dobra oraz jednoczyli się wokół pozytywnych wartości. Świat nie musi się pogrążać
  w chaosie, jeśli ludzie dobrej woli odnajdą siebie i będą działać razem. Ciągle
  głęboko wierzę, że działanie bez przemocy, wiara w to, że prawda jest silniejsza
  od kłamstwa, solidarność i dialog są lepsze od konfrontacji, a prawa człowieka są
  wciąż aktualne – że to ma głęboki sens, i że nie jesteśmy w tym wszystkim sami Premier
  wręczył Papieżowi w podarunku Pięcioksiąg Mojżeszowy w języku kaszubskim, a od Leona
  XIV otrzymał album malarski z dedykacją. Tam jest jedno słowo, które Ojciec Święty
  odniósł do siebie i do mnie – peacemakers. Ja pewnie nie zasłużyłem na taką definicję,
  ale będę z dumą pokazywał ten tekst wszystkim. To, co jest myślą przewodnią pontyfikatu
  Papieża, jeśli chodzi o sprawy publiczne, to z całą pewnością pokój i pojednanie
  Donald Tusk potwierdził zaproszenie Papieża do Polski, które Ojciec Święty przyjął
  z radością. Premier złożył kwiaty na grobie św. Jana Pawła II w Bazylice Świętego
  Piotra. Spotkał się także z sekretarzem stanu Stolicy Apostolskiej, kardynałem Pietro
  Parolinem oraz szefem watykańskiej dyplomacji, arcybiskupem Paulem Richardem Gallagherem.
