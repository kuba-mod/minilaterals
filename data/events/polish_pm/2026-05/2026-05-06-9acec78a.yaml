title: Sztab kryzysowy w związku z pożarem lasów na Lubelszczyźnie
text: Wczoraj w powiecie biłgorajskim na Lubelszczyźnie wybuchł rozległy pożar lasu,
  który objął obszar ok. 300 hektarów. W trakcie akcji doszło do katastrofy samolotu
  typu Dromader, w której zginął pilot. Łączymy się w bólu z bliskimi i rodziną pilota
  Dromadera, który bezpośrednio uczestniczył w akcji gaśniczej i zginął tragicznie.
  Niech to nam uświadomi, jak wielkie jest to zagrożenie i ile cywilnej odwagi wymaga
  udział w tego typu działaniach – powiedział Donald Tusk podczas posiedzenia sztabu
  kryzysowego w RCB. Obecnie pożar jest w dużej mierze opanowany, choć pojedyncze
  ogniska w trudnym terenie wciąż stanowią zagrożenie. Sytuację utrudnia silny wiatr,
  który sprzyja rozprzestrzenianiu się ognia – poinformował Minister Spraw Wewnętrznych
  i Administracji Marcin Kierwiński, który jest na miejscu pożaru i stamtąd zdalnie
  uczestniczył w posiedzeniu sztabu. Strażacy, w tym jednostki ochotnicze, działają
  w ścisłej koordynacji z komendantami i władzami lokalnymi, aby skutecznie reagować
  na rozwój wydarzeń. W walce z ogniem bierze udział 5 śmigłowców i 4 samoloty. Komendant
  Główny Państwowej Straży Pożarnej Wojciech Kruczek przekazał, że w akcji uczestniczy
  101 zastępów i 372 strażaków oraz dodatkowo 50 żołnierzy Wojsk Obrony Terytorialnej.
  Elementem niepokojącym pozostaje wiatr, który potrafi przynieść iskrę i doprowadzić
  do zapłonu w innym miejscu Ze względu na panującą suszę, sytuacja w lasach w całej
  Polsce pozostaje bardzo trudna. Tylko wczoraj mieliśmy aż 136 pożarów na terenie
  lasów prywatnych i państwowych. Wdrożyliśmy dodatkowe działania prewencyjne i uruchomiliśmy
  wzmożone patrole – przekazała Minister Klimatu i Środowiska Paulina Hennig-Kloska.
  Ze względu na duże zagrożenie pożarowe RCB apeluje o ostrożność oraz nieużywanie
  ognia w lasach i ich sąsiedztwie. W sztabie kryzysowym uczestniczyli m.in. przedstawiciele
  Państwowej Straży Pożarnej, Policji oraz Instytutu Meteorologii i Gospodarki Wodnej.
