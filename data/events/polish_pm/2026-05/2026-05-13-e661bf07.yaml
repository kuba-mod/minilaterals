title: 'Premier: Polska to najlepsze miejsce do życia i spełniania marzeń'
text: Choć współczesną politykę międzynarodową często kształtują arogancja, nacjonalizmy
  i konflikty interesów, istnieją również siły zdolne równoważyć te tendencje oraz
  budować porządek świata oparty na współpracy i wartościach demokratycznych. Chciałbym,
  aby nikt nie utracił wiary w to, że siła czynienia dobra w polityce to nie są bajki
  dla naiwnych i żebyśmy na nowo zrozumieli, że dobro nie może być bezsilne, a prawda
  nie musi przegrywać z kłamstwem Polska jest przykładem kraju, który promuje wartości
  sprzyjające budowie lepszego świata. W Polsce jesteśmy odporni na falę pesymizmu,
  niepewności i strachu. Przepowiednie o negatywnych trendach cywilizacyjnych i geopolitycznych
  niekoniecznie muszą się sprawdzić Na świecie pojawiają się głosy, że jedyną skuteczną
  odpowiedzią na wyzwania takie jak kryzys migracyjny, pandemia czy ataki terrorystyczne
  są silne rządy autorytarne, a liberalna demokracja utraciła zdolność do skutecznej
  ochrony granic oraz zapewnienia bezpieczeństwa obywatelom. To jest nieprawda, nie
  ma takiego fatum. Przykład Węgier pokazuje, że prawda, odwaga i wiara we własne
  siły mogą rozstrzygać o zwycięstwach politycznych. Determinacja po stronie dobra
  może być silniejsza niż potężne agregaty zbudowane za wielkie pieniądze i przy pomocy
  obcych sił Podobna sytuacja ma miejsce w czasie wojny rosyjsko-ukraińskiej, gdzie
  mimo przewagi militarnej agresor nie jest w stanie pokonać państwa, które wierzy
  w swoją wolność i niepodległość. Przez ostatnie miesiące słyszałem, że Ukraina nie
  ma żadnych szans w wojnie z Rosją ze względu na dysproporcję potencjałów. Jednak
  tam, gdzie rodzi się solidarność między ludźmi – tak jak w Polsce, gdy przyjmowaliśmy
  ukraińskich uchodźców – a także solidarność między narodami gotowymi zjednoczyć
  się w pomocy Ukrainie – możliwe stają się rzeczy niezwykłe. Solidarność narodów
  Europy i Ameryki z Ukrainą okazuje się silniejsza niż cynicznie pojmowane interesy
  biznesowe. Żadne złe moce nie będą w stanie pokonać ludzi dobrej woli Wiara w demokrację
  pokazuje, że w polityce trzeba być silnym i gotowym do walki, a czasem także zdolnym
  do stanowczych działań, gdy ma się świadomość, że przeciwstawia się złu. Przykładem
  państwa, które zbudowało swój sukces na przejściu z komunizmu do demokracji, jest
  Polska. Obecnie jesteśmy najszybciej rozwijającym się krajem w Europie. W 1989 roku
  nasza gospodarka była warta 67 mld dolarów rocznie, a tym roku przekroczyliśmy już
  bilion dolarów. Dzisiaj przeciętna Polka i Polak są trzy razy zamożniejsi niż wtedy,
  gdy zaczynaliśmy przygodę z wolnością, niepodległością, wolnym rynkiem, przedsiębiorczością
  i prawami człowieka Nasz kraj budzi uznanie w Europie i na świecie dzięki swojej
  gospodarności, przedsiębiorczości, kreatywności, ambicji oraz licznym talentom.
  Polska to najlepsze miejsce na ziemi do życia i spełniania swoich marzeń – świadczą
  o tym fakty Sukces Polski pokazuje, że pracowitość, wytrwałość i przywiązanie do
  wartości demokratycznych mogą realnie zmieniać bieg historii.
