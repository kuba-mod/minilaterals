title: 'Premier po szczycie w Armenii: Wzmacniamy dwustronną współpracę z naszymi
  partnerami'
text: Armenia jest ważnym partnerem Polski i Unii Europejskiej. Donald Tusk podkreślił
  znaczenie Premiera Nikola Paszyniana dla stabilizacji regionu. To, co było z mojego
  punktu widzenia kluczowe w czasie tego szczytu, to oczywiście wsparcie naszych przyjaciół
  w Armenii. Nikol Paszynian to postać, na którą możemy zawsze liczyć i która przyczyniła
  się do stabilizacji w tym regionie – powiedział  szef rządu podczas spotkania z
  dziennikarzami. Donald Tusk zaznaczył, że Armenia może liczyć na Polskę i Europę.
  Polska i Wielka Brytania 27 maja podpiszą nowy traktat. Dokument ma wzmocnić współpracę
  obu państw, przede wszystkim w dziedzinie obronności. Podjęliśmy decyzję z premierem
  Wielkiej Brytanii, że dojdzie do podpisania traktatu między Polską i Wielką Brytanią,
  wzmacniającego realnie naszą współpracę w dziedzinie obronności. Odbędzie się to
  już 27 maja Traktat ma dotyczyć także szerszej współpracy strategicznej. Premier
  Donald Tusk poinformował również, że Wielka Brytania liczy na Polskę jako ważnego
  partnera w procesie zacieśniania relacji z Unią Europejską. Nastroje w Wielkiej
  Brytanii odwróciły się radykalnie. Dziś większość żałuje Brexitu i chciałaby możliwie
  intensywnego zacieśnienia więzi z UE. Polska będzie liderem na rzecz takiego zbliżenia
  Polska będzie wspierała ten proces ze względów geopolitycznych, ale także ze względu
  na dużą liczbę Polaków mieszkających w Wielkiej Brytanii. W rozmowach z premierem
  Kanady uzgodniono nowe formy współpracy w obszarze obronności, energetyce jądrowej
  i odnawialnej, a także we współpracy służb specjalnych. Kanada jest bardzo cennym
  partnerem. W najbliższym czasie udam się z oficjalną wizytą do Kanady, aby dopracować
  wszystkie umowy i wynieść relacje na wyższy poziom Podczas tej wizyty mają zostać
  dopracowane szczegóły nowych ustaleń. Premier spotkał się również z prezydentem
  Ukrainy Wołodymyrem Zełenskim. Rozmowa dotyczyła między innymi przygotowań do konferencji
  odbudowy Ukrainy (Ukrainian Recovery Conference), która odbędzie się w czerwcu w
  Gdańsku. Polsce zależy także na poprawie relacji między Ukrainą a Węgrami. Napięte
  relacje między Ukrainą a Węgrami blokowały wiele spraw, choćby pieniądze dla Polski,
  nie mówiąc już o tej wielkiej pożyczce europejskiej dla Ukrainy. Nam zależy na tym,
  aby premier Węgier działał na rzecz odbudowy pełnego zaufania między Budapesztem
  a Kijowem. To przyda się wszystkim w Europie Dobre relacje Budapesztu i Kijowa mają
  pomóc w odbudowie zaufania i ułatwić podejmowanie wspólnych decyzji. Ukrainie zależy
  na tym, żebyśmy ułatwili relacje z nowym premierem Węgier. Zależy nam, aby premier
  Węgier działał na rzecz odbudowy pełnego zaufania między Budapesztem a Kijowem Szef
  rządu zapowiedział, że w najbliższym czasie spotka się w Polsce z nowym premierem
  Węgier. Premier widzi możliwość bardziej intensywnej współpracy w regionie. Zapowiedział,
  że chce odbudować znaczenie Grupy Wyszehradzkiej, czyli Polski, Czech, Słowacji
  i Węgier. Moją ambicją jest zrewitalizować maksymalnie współpracę między Pragą,
  Bratysławą, Budapesztem i Warszawą Szef rządu podkreślił, że silniejsza współpraca
  regionalna jest ważna z punktu widzenia polskich interesów. Polsce zależy na jak
  największej obecności wojsk amerykańskich w kraju, ale nie kosztem solidarności
  europejskiej. Nie pozwolę na to, żeby Polska była w jakikolwiek sposób wykorzystywana
  do łamania solidarności czy współpracy na poziomie europejskim Premier podkreślił,
  że znaczenie relacji transatlantyckich jest kluczowe. Dla mnie proamerykańskość
  oznacza wspólne starania o to, aby więzi transatlantyckie były jak najsilniejsze,
  między Polską i Stanami Zjednoczonymi, ale także między Europą a Stanami Zjednoczonymi.
  My potrzebujemy obecności amerykańskiej nie tylko w Polsce, ale także w innych miejscach,
  bo to służy polskiemu bezpieczeństwu. Mam nadzieję, że te napięcia między niektórymi
  państwami europejskimi a prezydentem Trumpem niedługo trochę opadną Polska od dwóch
  lat zabiega o większą obecność USA. Rozmowy z Amerykanami trwają od początku działania
  rządu, choć sytuację utrudniają inne konflikty, m.in. na Bliskim Wschodzie. Premier
  zapewnił o współpracy z prezydentem, jeśli pojawi się możliwość zwiększenia obecności
  amerykańskiej w Polsce.
