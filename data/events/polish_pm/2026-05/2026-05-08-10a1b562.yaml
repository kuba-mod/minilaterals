title: Mamy to! Umowa SAFE podpisana - ponad 180 mld zł na wzmocnienie armii i przemysłu
  zbrojeniowego
text: 'Polska, jako pierwszy kraj Unii Europejskiej, podpisała umowę dotyczącą programu
  SAFE. Dzięki temu pozyskamy szybkie i realne finansowanie na zwiększenie potencjału
  armii. „W tych trudnych i ryzykownych czasach będziemy bezpieczniejsi o 180 mld
  zł” – wyjaśnił premier Donald Tusk podczas uroczystości podpisania umowy w KPRM.
  Środki z programu przeznaczymy na rozwój krajowego przemysłu zbrojeniowego i współpracujących
  z nim firm, a także na wzmacnianie polskich zdolności technologicznych. Na ten cel
  trafi aż 89%pozyskanych funduszy. Sukces programu SAFE, będącego polską inicjatywą,
  pokazuje także nasz rosnący wpływ na kierunki działania Unii Europejskiej. Umowę
  w obecności Premiera podpisali Wicepremier i Minister Obrony Narodowej Władysław
  Kosiniak-Kamysz, Minister Finansów i Gospodarki Andrzej Domański, komisarze UE –
  ds. obrony Andrius Kubilius i ds. budżetu – Piotr Serafin oraz przedstawiciele Banku
  Gospodarstwa Krajowego. Proces związany z zatwierdzeniem SAFE trwał niecały rok.
  I przypomnijmy był pomysłem polskiej Prezydencji w Radzie UE. Nasz kraj jest częścią
  NATO i posiada licznych sojuszników, jednak ich wsparcie będzie realne tylko wtedy,
  gdy sami będziemy silni i gotowi do obrony. Dlatego przeznaczymy ok. 43,7 mld euro,
  czyli ponad 180 mld zł z unijnego programu SAFE, na rozwój i modernizację polskiej
  armii. Wszyscy mamy nadzieję, że ominie nas otwarty konflikt, ale wiemy też, w jakim
  czasie i miejscu żyjemy. Dlatego chcemy mieć pewność, że polska armia i krajowy
  przemysł zbrojeniowy będą w stanie sprostać każdemu wyzwaniu 89% pieniędzy z SAFE
  trafi do polskich firm zbrojeniowych. Żaden z krajów uczestniczących w programie
  nie zainwestuje tak dużych środków w swój przemysł. Gigantyczne środki z programu
  przeznaczymy bezpośrednio w polskie bezpieczeństwo, krajowy przemysł zbrojeniowy
  oraz firmy z nim współpracujące, a także w nasze możliwości technologiczne Po podpisaniu
  umowy zaliczka z SAFE w wysokości 6,5 mld euro (ok. 27,5 mld zł) ma trafić do Polski
  w ciągu kilku dni. Pieniądze z SAFE oznaczają więcej zamówień dla przemysłu, silniejszą
  polską gospodarkę i nowe miejsca pracy. Rząd znajdzie także sposób – mimo weta Prezydenta
  Karola Nawrockiego do ustawy o SAFE – by z pieniędzy europejskich mogły skorzystać
  również polskie służby, w tym Straż Graniczna, Państwowa Straż Pożarna i Policja.
  Nasz kraj od zawsze należał do państw najmocniej zabiegających o to, by Unia Europejska
  wzięła na siebie większą odpowiedzialność za wspólne bezpieczeństwo. Dlatego wymyśliliśmy
  program SAFE, którego celem jest wzrost potencjału militarnego UE. To był projekt,
  który Polska postanowiła zrealizować i sfinalizować w czasie naszej prezydencji.
  To był także projekt głębokiej korekty polityki i strategii wydawania pieniędzy
  przez UE Sukces programu SAFE pokazuje również, że mamy realny i coraz większy wpływ
  na działania Unii Europejskiej. To Polska zaproponowała deregulację, jako główny
  mechanizm zwiększania konkurencyjności Europy wobec największych światowych potęg
  gospodarczych. Przedstawiliśmy również postulat radykalnego zwiększenia nakładów
  na obronność oraz głębokiej reformy polityki klimatycznej Polska aktywnie forsuje
  zmiany tam, gdzie są one najbardziej potrzebne i coraz wyraźniej wpływa na kierunek
  reform w Europie. Działania te mają na celu wzmacnianie Unii Europejskiej i zwiększanie
  jej odporności na współczesne wyzwania. Program SAFE zasila trzy filary naszego
  bezpieczeństw: silna armia, silne sojusze i silne społeczeństwo. To wielki moment
  dla Polski i Europy, a także dla bezpieczeństwa naszych dzieci oraz wnuków. Budowa
  bezpieczeństwa kraju nie może mieć żadnych ograniczeń i kompromisów. Nie zejdziemy
  z drogi budowy silnej, odważnej i ambitnej Polski Środki z SAFE będą przeznaczone
  m.in. na realizację programu Tarcza Wschód, rozwój systemów antydronowych, obrony
  przeciwlotniczej, artylerii oraz modernizację infrastruktury transportowej o znaczeniu
  wojskowym. Program SAFE będzie także służył polskiej gospodarce. Nie ma bardziej
  efektywnego źródła finansowania olbrzymiego wysiłku finansowego, jakim jest modernizacja
  polskiej armii niż program SAFE. Oszczędności dla finansów publicznych mogą sięgać
  80 mld zł. Przemysł obronny będzie silnikiem wzrostu polskiej gospodarki w kolejnych
  dekadach – ocenił Minister Finansów i Gospodarki Andrzej Domański. Unijny komisarz
  ds. obrony Andrius Kubilius podkreślił, że Unia Europejska musi być gotowa, by bronić
  swojego pokoju i bezpieczeństwa. Musimy produkować dużo więcej sprzętu obronnego
  i odstraszać Rosję. Polska jest faktycznym liderem w Europie, jeśli chodzi o obronę
  swojego terytorium, wschodniej flanki i całej Europy Komisarz UE ds. budżetu Piotr
  Serafin zaznaczył, że program SAFE to pierwsza, ale nie ostatnia inicjatywa wspólnych
  unijnych wydatków obronnych. Wkrótce przed nami negocjacje wieloletniego budżetu
  Unii Europejskiej, który wejdzie w życie w 2028 roku. Także w nowym budżecie obrona
  powinna być jednym z priorytetów Pełnomocniczka rządu ds. SAFE Magdalena Sobkowiak-Czarnecka
  zwróciła uwagę, że środki dla Polski w ramach programu stanowią jedną trzecią całej
  puli przeznaczonej dla Unii Europejskiej. Jesteśmy największym beneficjentem tego
  programu. Tylko do końca maja w ramach SAFE ma zostać podpisanych 40 umów. Firmy
  zbrojeniowe będą musiały zrealizować produkcję w perspektywie do 2030 roku – poinformowała
  Magdalena Sobkowiak-Czarnecka. Szef Sztabu Generalnego Wojska Polskiego gen. Wiesław
  Kukuła zapewnił, że wojsko sprawnie wykorzysta środki z SAFE do wzmocnienia zdolności
  obronnych Polski i całej wschodniej flanki NATO. Dołożymy wszelkich starań, aby
  każdą złotówkę jak najszybciej i jak najskuteczniej przełożyć na rzeczywiste zdolności
  Sił Zbrojnych Podpisanie umowy SAFE otwiera nowy etap wzmacniania europejskiego
  i polskiego bezpieczeństwa poprzez inwestycje w obronność oraz przemysł zbrojeniowy.
  Informacje na temat programu SAFE, w tym najważniejszych firm i miejsc, które dzięki
  niemu zyskają są dostępne na stronie polskasafe.gov.pl/polska-safe/'
