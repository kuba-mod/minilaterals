title: Podziękowania za akcję gaszenia pożarów w Puszczy Solskiej i apel o szacunek
  dla pracy służb
text: 'Podczas uroczystości Premier Donald Tusk wyróżnił kilkadziesiąt osób zaangażowanych
  w walkę z żywiołem: strażaków OSP i PSP, policjantów, żołnierzy Wojsk Obrony Terytorialnej,
  leśników, pracowników centrów zarządzania kryzysowego. Chylę głowę przed Waszym
  wysiłkiem, ofiarnością i dziękuję za wszystko, co zrobiliście w Puszczy Solskiej.
  Za to, co robicie każdego dnia, Polska jest Wam wdzięczna Pożar w Puszczy Solskiej
  był akcją wymagającą wysiłku i pracy w bardzo trudnych warunkach, z zagrożeniem
  zdrowia i życia. Pamiętamy o wszystkich, którzy ponieśli konsekwencje tej tragedii.
  Szczególnie pamiętamy o pilocie Andrzeju Gawronie, który oddał życie podczas służby,
  oraz o jego rodzinie i bliskich Pięciu ratowników uległo obrażeniom fizycznym i
  poparzeniom. Jestem dumny z tego, jak wszystkie służby państwowe działały razem
  podczas pożaru w Puszczy Solskiej i jak potrafiły połączyć swoje zasoby do tego,
  aby służyć Polakom i walczyć o ich bezpieczeństwo – powiedział Minister Spraw Wewnętrznych
  i Administracji Marcin Kierwiński. Akcja gaśnicza trwała od 5 do 12 maja. Już 8
  maja strażacy zatrzymali dalsze rozprzestrzenianie się ognia. W działaniach wykorzystano
  ponad 650 pojazdów oraz 14 statków powietrznych, w tym śmigłowce Black Hawk Policji
  i samoloty gaśnicze Lasów Państwowych. Załogi lotnicze wykonały blisko 1100 zrzutów
  wody. Szef rządu podkreślił, że państwo będzie stanowczo reagowało na wszelkie działania,
  które utrudniają pracę służb i destabilizują bezpieczeństwo w kraju. Każdy, kto
  przez fałszywe alarmy i sabotaż naraża ludzkie życie oraz dezorganizuje pracę strażaków,
  zostanie zidentyfikowany i trafi do więzienia na długie lata Donald Tusk zaapelował
  także o odpowiedzialność i niewykorzystywanie sytuacji kryzysowych do podważania
  zaufania do służb państwowych i w celach politycznych. Apeluję, żeby nikt nie próbował
  wykorzystywać takich sytuacji do ataku na służby, na policję, na służby specjalne,
  czy ostatnio także na straż pożarną Premier zapewnił funkcjonariuszy i ratowników
  o wsparciu państwa podczas wykonywania obowiązków związanych z ochroną życia i zdrowia
  ludzi. Chcę Was zapewnić, że zawsze będziecie mieli nasze pełne wsparcie i ochronę.
  Niech nikt, kto jest na służbie, nie waha się, żeby ruszyć z pomocą, gdy otrzyma
  sygnał o zagrożeniu. Nie ma czasu i miejsca na kalkulacje i zastanawianie się Trwa
  śledztwo w sprawie fałszywych alarmów. Staramy się też identyfikować takie zagrożenia,
  jak sabotaż. Strażacy mogą jeszcze skuteczniej walczyć z ogniem, gdy mają dobry,
  nowoczesny sprzęt. Pożar w Puszczy Solskiej gasiły jednostki OSP i PSP z województwa
  lubelskiego. W zeszłym roku trafiło tam 220 mln zł z Programu Ochrony Ludności i
  Obrony Cywilnej. W tym roku region ma otrzymać 297 mln zł. Pieniądze są przeznaczane
  m.in. na budowę i remont magazynów, zabezpieczenie dostępu do wody czy wyposażenie
  szpitali i służb ratowniczych. Program Ochrony Ludności i Obrony Cywilnej to największy
  program w historii modernizacji służb podległych MSWiA. To miliardy złotych po to,
  żeby Wasza praca mogła być efektywniejsza i bardziej komfortowa. Dobrze wyposażone
  służby, w tym straż pożarna, policja czy straż graniczna to większe bezpieczeństwo
  dla naszych obywateli Środki z programu pozwoliły także na zakup nowego wyposażenia
  dla Państwowej Straży Pożarnej i Ochotniczych Straży Pożarnych w całej Polsce –
  samochodów ratowniczo-gaśniczych czy elementów wyposażenia osobistego dla ratowników.
  Kierownictwo Lubelskiej Komedy Wojewódzkiej PSP Ground Forest Fire Fighting – wyspecjalizowane
  grupy do gaszenia pożarów lasów z ziemi Kompania szkolna Szkoły Aspirantów PSP w
  Krakowie Specjalistyczna Grupa Ratownictwa Wysokościowego Warszawa 7 Sztab Kierujący
  Działaniami Ratowniczymi na miejscu akcji'
