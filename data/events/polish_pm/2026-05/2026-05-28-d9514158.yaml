title: Program SAFE - pierwsze umowy podpisane
text: 'Dzięki programowi SAFE Polska pozyskała szybkie i realne finansowanie na zwiększenie
  potencjału wojskowego. Na rozwój i modernizację naszej armii przeznaczymy ok. 43,7
  mld euro, czyli ponad 180 mld zł. Kropka nad „i” została postawiona – europejskie
  pieniądze są zagwarantowane, a Polska jest najbardziej zaawansowana w realizacji
  swoich projektów Program SAFE, który został zapoczątkowany w 2025 r. podczas polskiej
  prezydencji w Radzie UE, zapewni nie tylko bezpieczeństwo, ale także pracę dla ponad
  10 tys. polskich firm. To są wykonawcy, podwykonawcy i kooperanci. Przez długi czas
  musiałem przekonywać różnych sceptyków i malkontentów, że 180 mld zł na polską gospodarkę
  i wojsko to rozwiązanie bez precedensu i dziejowa chwila dla bezpieczeństwa państwa
  W związku z dynamiczną sytuacją geopolityczną Polska chce jak najszybciej i efektywnie
  wykorzystać pozyskane środki. To przedsięwzięcie jest niezwykle wymagające – do
  30 maja chcemy zagospodarować 100 mld zł w 40 dużych, kompleksowych umowach Inwestycje
  w obronność są konieczne, aby uniknąć wojny i skutecznie odstraszać potencjalnego
  agresora – Rosję. Im więcej i mądrzej wykorzystamy środki, tym mniejsze jest ryzyko
  czarnego scenariusza. Teraz ciężko pracujemy, żeby móc później powiedzieć – nikt
  nie śmie zaatakować Polski Obecnie szczególnie ważnym zadaniem jest ochrona polskiej
  cyberprzestrzeni. Dziś służba w Wojsku Polskim ma charakter całodobowy i w praktyce,
  a nie w teorii, oznacza realną ochronę kraju, w tym także cyberprzestrzeni przed
  wrogimi atakami Szef rządu wyraził także nadzieję, że nikt w Polsce nie będzie już
  kwestionował podstawowego zadania władzy, jakim jest zapewnienie bezpieczeństwa
  państwu, jego granicom i obywatelom. Dzięki programowi SAFE, w ciągu 4 lat do Polski
  trafią tysiące jednostek sprzętu i nowych zdolności bojowych. Będzie to najszybszy
  proces modernizacji polskiej armii w historii. Unia Europejska musi brać większą
  odpowiedzialność za swoje bezpieczeństwo. Nikt nie rozumie tego lepiej niż Polska,
  dlatego jesteśmy absolutnym liderem – ocenił Wicepremier, Minister Obrony Narodowej
  Władysław Kosiniak-Kamysz. Zaletą SAFE jest także możliwość zwiększenia zdolności
  eksportowych polskich zakładów zbrojeniowych. Po latach kupowania sprzętu z zagranicy,
  Polska staje się eksporterem. Będziemy dostarczali systemy dronowe do Kanady i nie
  tylko Przypomniał także, że przez weto Prezydenta Policja, Straż Graniczna i Służba
  Ochrony Państwa zostały pozbawione możliwości modernizacji. Dlatego rząd podjął
  decyzję o rozszerzeniu programu pozamilitarnych przygotowań obronnych państwa, dzięki
  czemu można przeznaczyć 17 mld zł z budżetu na realizację projektów ważnych dla
  służb MSWiA. Pełnomocniczka Rządu ds. SAFE Magdalena Sobkowiak-Czarnecka zwróciła
  uwagę, że program był od początku polską inicjatywą. Polska była liderem tego procesu
  – to my projektowaliśmy program, to my otrzymaliśmy największą część środków, pierwsi
  podpisaliśmy umowę i pierwsi zaczynamy wydawać pieniądze – podkreśliła Magdalena
  Sobkowiak-Czarnecka. Ważnym aspektem SAFE jest także to, że środki z programu pochodzące
  od innych państw trafią do polskich firm, co dodatkowo wzmocni naszą gospodarkę.
  Wśród firm, z którymi zawarto dziś kontrakty SAFE, znajdują się m.in.: Maskpol,
  Celtech, Jelcz, WB Group oraz Stocznia Remontowa Shipbuilding. W ramach tych umów
  planowany jest zakup systemów GLADIUS, WARMATE i FlyEye, czyli nowoczesnych dronów.
  Polska zainwestuje również w nowoczesne okręty do pozyskiwania i przetwarzania danych
  geoprzestrzennych oraz w hełmy i kamizelki ochronne. Ponadto przewidziano zakup
  rozwiązań dotyczących kryptografii i sztucznej inteligencji wspierających bezpieczeństwo
  cyfrowe.'
