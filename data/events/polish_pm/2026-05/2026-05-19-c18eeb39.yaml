title: 'Rząd realizuje priorytety: więcej miejsc w żłobkach i skuteczne wykorzystanie
  środków z KPO'
text: 'Rozbudowa sieci żłobków jest jednym z elementów polityki prorodzinnej rządu
  i odpowiedzią na wyzwania demograficzne. W grudniu 2023 r. w Polsce funkcjonowało
  226 tys. miejsc w żłobkach. W kwietniu 2026 r. liczba ta wzrosła do niemal 272 tys.,
  co oznacza wzrost o 40 proc. Do końca tego roku przybędzie od początku naszych rządów
  okrągłe 100 tysięcy miejsc w żłobkach. (…) Co da nam liczbę miejsc w żłobkach -
  326 tysięcy. To oznacza, że blisko 80 proc. dzieci w wieku żłobkowym będzie miało
  dostęp do miejsca żłobkowego Rząd konsekwentnie pracuje również nad równomiernym
  rozmieszczeniem nowych placówek, szczególnie w gminach, w których do tej pory brakowało
  miejsc opieki dla najmłodszych dzieci.  W 2023 r. było 1105 gmin bez ani jednego
  miejsca żłobkowego. W kwietniu 2026 r. liczba ta spadła do 717, a w najbliższym
  czasie zmniejszy się poniżej 500. Chcemy, aby każdy młody rodzic wiedział, że państwo
  zadba o nich tak, aby rodzicielstwo nie wiązało się z dużym poświęceniem. Ciężko
  pracujemy nad tym, żeby żłobek dla każdego dziecka stał się faktem Państwo finansuje
  tworzenie miejsc żłobkowych niezależnie od tego, czy placówki są publiczne czy prywatne.
  Działania te są wspierane przez rządowy program „Aktywny Rodzic”. Rząd wdraża rozwiązania,
  które poprawiają dostęp pacjentów do świadczeń specjalistycznych oraz ograniczają
  liczbę niewykorzystanych wizyt. Jednym z priorytetów jest wprowadzanie systemu e-rejestracji
  tak, aby jak najmniej terminów u specjalistów się marnowało, a czas oczekiwania
  na wizytę był krótszy. Od 1 stycznia mamy taką możliwość, jeśli chodzi o placówki
  mammograficzne, testy HPV, konsultacje u kardiologa, które będą w pełni funkcjonowały
  w rejestracji online od 1 lipca 2026 roku. A od 1 sierpnia będzie można rejestrować
  się online w ośmiu kolejnych świadczeniach Do tej pory dzięki Centralnej e-rejestracji
  skutecznie odwołano około 500 tys. wizyt. Oznacza to, że system umożliwił ponowne
  wykorzystanie blisko pół miliona terminów u specjalistów. To realne wsparcie dla
  pacjentów oraz ważny krok w kierunku bardziej efektywnego systemu ochrony zdrowia
  Jednym z najważniejszych sukcesów obecnego rządu było odblokowanie środków z Krajowego
  Planu Odbudowy, które przez wielomiesięczne zaniedbania i brak skutecznych działań
  poprzednich władz pozostawały niedostępne dla Polski. Łączna wartość programu dla
  naszego kraju to 240 mld zł. Do końca tego roku wypłacimy z KPO 140 mld zł, z czego
  ok. 50 mld zł na inwestycje, które zakończą się w tym roku , a 90 miliardów na fundusze
  inwestycyjne, które będą pracować przez kolejne lata Do tej pory wypłacono już 68
  mld zł na zakończone inwestycje. Pozostałe ponad 30 mld zł zostanie uruchomione
  w 2027 roku na przedsięwzięcia kończące się w kolejnym etapie programu. To pieniądze,
  które realnie poprawiają jakość życia mieszkańców zarówno dużych miast, jak i mniejszych
  miejscowości. Polska dała radę mimo tego dramatycznego opóźnienia z winy poprzedników.
  Nie tylko zdobyliśmy te pieniądze, ale potrafimy także zarządzać ich wydawaniem
  Dzięki funduszom zrealizowano lub realizowane są m.in.: 18 tys. nowych miejsc w
  żłobkach, termomodernizację 200 tys. domów, szybki internet dla 211 tys. gospodarstw
  domowych czy budowę 11 obwodnic ważnych dla małych i średnich miast, budowę wielkich
  farm wiatrowych na Bałtyku czy zakup nowego sprzętu dla szpitali powiatowych i specjalistycznych.
  Premier Donald Tusk odniósł się również do sprawy obecności wojsk amerykańskich
  w Polsce. Polska jest najbardziej lojalnym i efektywnym sojusznikiem. Wielkie nakłady,
  wielkie inwestycje, w tym w amerykański sprzęt. Geografia, która powoduje, że Polska
  odpowiada za bezpieczeństwo nie tylko własne, ale wielu innych państw całego kontynentu
  europejskiego. To wszystko każe mi wierzyć, że nasze spotkania i perswazje wobec
  amerykańskich sojuszników przyniosą efekt W Brukseli Szef Sztabu Generalnego Wojska
  Polskiego gen. W. Kukuła spotyka się z Dowódcą Sił USA i NATO w Europie gen. A.
  Grynkewichem. Równolegle Wiceministrowie Obrony Narodowej Cezary Tomczyk i Paweł
  Zalewski prowadzą w USA rozmowy z przedstawicielami Pentagonu. Wicepremier Władysław
  Kosiniak-Kamysz rozmawiał dziś z szefem Pentagonu Petem Hegsethem, a jutro będzie
  rozmawiał z zastępcą przewodniczącego Kolegium Połączonych Szefów Sztabów Sił Zbrojnych
  USA. Seria spotkań i konsultacji ma na celu dalsze wzmacnianie współpracy obronnej
  oraz potwierdzenie znaczenia obecności wojsk amerykańskich w Polsce dla bezpieczeństwa
  całego regionu. Premier Donald Tusk odniósł się do informacji dotyczących zgody
  na pobyt w Stanach Zjednoczonych dla byłego ministra sprawiedliwości Zbigniewa Ziobry.
  Podkreślił, że polskie władze będą konsekwentnie informować partnerów zagranicznych
  o ciążących na nim zarzutach. Zezwolenie na pobyt w USA, ściganemu przez państwo
  polskie, Zbigniewowi Ziobrze jest bulwersującą decyzją. Ministerstwo Spraw Zagranicznych
  oraz Ministerstwo Sprawiedliwości przedstawią amerykańskim liderom oraz opinii publicznej
  komplet informacji, dlaczego pan Ziobro ucieka Minister Sprawiedliwości Waldemar
  Żurek podjął już działania związane z możliwością prowadzenia dalszych procedur
  ekstradycyjnych. Chciałbym, żeby Amerykanie wiedzieli, że można było wykorzystywać
  pieniądze, które miały pomagać ofiarom przestępstw na system Pegasus, który miał
  służyć m.in. także podsłuchiwaniu i inwigilacji opozycji w Polsce Szef rządu zaznaczył,
  że państwo nie może rezygnować ze ścigania osób, wobec których formułowane są poważne
  zarzuty, szczególnie jeśli pełniły one wcześniej wysokie funkcje publiczne. Na pewno
  będziemy bardzo konsekwentni i nikt nie może liczyć na rezygnację, na opuszczenie
  rąk przez nas, jeśli chodzi o ściganie, szczególnie tych odpowiedzialnych za złe
  rzeczy i tych którzy sprawowali kiedyś władzę w Polsce, bo to byłoby absolutnie
  niedopuszczalne Premier podkreślił również, że nikt nie powinien mieć możliwości
  uniknięcia odpowiedzialności przed wymiarem sprawiedliwości.'
