title: Mamom nie wystarczy życzyć - trzeba też je wspierać
text: Premier Donald Tusk złożył życzenia wszystkim Mamom z okazji ich święta. Składam
  wszystkim mamom w całej Polsce życzenia z głębi serca, żeby miały jak najwięcej
  radości z dzieci, żeby nie musiały się niepokoić o ich przyszłość Zadaniem rządu
  jest pomoc rodzinom i ograniczenie wszelkich trudności, aby macierzyństwo kojarzyło
  się wyłącznie ze szczęściem. Cieszę się bardzo z naszego babciowego, z nowych miejsc
  w żłobkach, z tego, że mamy nie 500, a 800 plus. O tym wszystkim wiele razy już
  mówiliśmy. Nie możemy na tym poprzestać Od 1 czerwca 2024 roku działa program in
  vitro, dzięki któremu do połowy maja br. urodziło się ponad 14 tysięcy dzieci. To
  sukces polityki prorodzinnej, dostrzegany przez rodziców dzieci, które przyszły
  na świat dzięki tej metodzie. Wraz z mężem przez długi czas zmagaliśmy się z problemem
  niepłodności. Po dwóch nieudanych próbach leczenia, które sfinansowaliśmy sami byliśmy
  na skraju rezygnacji. Nie stać było nas na kolejne leczenie. Dzięki Pana decyzji
  zyskaliśmy drugą szansę. Dziś z ogromną radością mogę poinformować, że dzięki temu
  wsparciu urodziła się nasza upragniona córeczka Aleksandra. Jej narodziny odmieniły
  nasze życie i sprawiły, że jesteśmy najszczęśliwszymi ludźmi na świecie – Premier
  zacytował list od jednej ze szczęśliwych Mam. Program wsparcia in vitro jest finansowany
  przez Ministerstwo Zdrowia. Rada Ministrów przyjęła regulacje, które zapewniają
  zabezpieczenie społeczne artystom, również mamom i ojcom. Dzięki zmianom rodzice,
  którzy wykonują zawód artystyczny, będą mogli m.in. skorzystać z urlopu macierzyńskiego
  i rodzicielskiego oraz otrzymać zwolnienie lekarskie na dzieci. Przyjęliśmy ustawę,
  dzięki której młodzi artyści nie będą musieli rezygnować ze swojej pasji i planów
  rodzinnych z powodów finansowych. Dziękuję wszystkim ministrom zaangażowanym w sprawne
  przygotowanie tego ważnego projektu Projekt ustawy o zabezpieczeniu socjalnym osób
  wykonujących zawód artystyczny powstał w odpowiedzi na postulaty środowiska artystycznego.
  Został przyjęty dzisiaj na posiedzeniu Rady Ministrów. Rada Ministrów przyjęła dziś
  także projekt zmian w ustawie o Krajowej Sieci Onkologicznej i powiązanych z nią
  przepisach. Projekt upraszcza organizację leczenia onkologicznego, ogranicza obowiązki
  administracyjne szpitali i przychodni oraz poprawia koordynację opieki nad pacjentami
  z chorobami nowotworowymi. Dzięki zmianom lekarze i placówki medyczne będą mogli
  skupić się bardziej na leczeniu pacjentów, a mniej na formalnościach. W Polsce,
  jeśli chodzi o ścieżkę leczenia onkologicznego, możemy mówić o naprawdę bardzo wysokim,
  światowym poziomie. Staramy się, aby to leczenie było szybkie, sprawne. Tutaj włączymy
  także najnowocześniejsze doświadczenia, jeśli chodzi o informatykę. I ta koordynacja,
  i nadzór nad pacjentem onkologicznym będzie jeszcze bardziej precyzyjny. To ważna
  korekta dotychczasowej praktyki Nowe przepisy odpowiadają na postulaty m.in. szpitali
  uczestniczących w Krajowej Sieci Onkologicznej. Premier zapowiedział podpisanie
  jutro Traktatu o Partnerstwie w Zakresie Bezpieczeństwa i Obronności między Polską
  a Wielką Brytanią. Dobrze wiemy, historia uczy nas ostrożności i sceptycyzmu, jeśli
  chodzi o skuteczność traktatów, ale muszę powiedzieć, że kiedy pracowaliśmy nad
  traktatem dotyczącym obronności i bezpieczeństwa z Wielką Brytanią, bardzo dbaliśmy
  o konkretne rozwiązania, których celem będzie realne zwiększenie bezpieczeństwa
  Polski w czasie pokoju, tak aby zapobiec ewentualnym zagrożeniom Szef rządu ocenił,
  że Wielka Brytania jest jednym z najbardziej solidnych i zaangażowanych, partnerów
  Ukrainy. Polska i Wielka Brytania ściśle współpracują w zakresie bezpieczeństwa
  tego kraju. To także jest powód, dla którego warto intensyfikować naszą współpracę
  z Wielką Brytanią w zakresie bezpieczeństwa i obrony Traktat będzie dotyczył nie
  tylko bezpieczeństwa militarnego, ale też m.in. cyfrowego. To drugi po traktacie
  z Nancy dokument wzmacniający partnerstwo na najwyższym poziomie dyplomatycznym.
  Premier poinformował, że komisarzem w Krakowie zostanie Stanisław Kracik. Panu prezydentowi
  Aleksandrowi Miszalskiemu dziękuję za to, co zrobił. Taka jest demokracja. Czasami
  podejmuje się decyzje nietrafione, czasami podejmuje się decyzje niepopularne Po
  referendum, na którym mieszkańcy stolicy Małopolski odwołali swojego prezydenta,
  prawo przewiduje ustanowienie zarządu komisarycznego. Wskazany właśnie komisarz
  będzie zarządzał miastem do momentu wybrania nowego prezydenta.
