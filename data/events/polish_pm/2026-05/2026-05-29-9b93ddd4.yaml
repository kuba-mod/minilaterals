title: „Cyfrowa Przyszłość Młodzieży” - konsultacje w KPRM
text: Według badań narastający problem uzależnienia od telefonów komórkowych coraz
  częściej dotyka dzieci i młodzież. Dlatego Rada Ministrów finalizuje prace nad rozwiązaniami
  ograniczającymi używanie smartfonów w szkołach podstawowych. W ciągu kilku dni na
  posiedzeniu rządu znajdzie się projekt zakazujący telefonów w szkołach. Nie możemy
  przejść obok tego problemu obojętnie. Według analiz, najmłodsi spędzają przed telefonem
  po 5-7 godzin dziennie. Wszyscy czujemy, że to nie jest normalne – podkreślił Donald
  Tusk podczas konsultacji z młodzieżą w Kancelarii Prezesa Rady Ministrów. Rząd będzie
  nadal współpracował z organizacjami młodzieżowymi, aby projekt zyskał szeroką akceptację.
  Zakaz korzystania z telefonów w szkołach nie jest przeciwko użytkownikom. Razem
  musimy rozwiązać ten problem, aby chronić nas wszystkich Ważnym zadaniem pozostaje
  także walka o bezpieczeństwo w sieci oraz kontrola związana z używaniem platform
  internetowych. Jeśli nie będzie pełnej solidarności między nauczycielami, rodzicami,
  rządem i dziećmi, to nie wygramy walki o bezpieczeństwo w Internecie. To nasze wspólne
  zadanie Szczególnie istotne jest skuteczne przeciwdziałanie szkodliwym treściom
  w sieci oraz wprowadzenie większej odpowiedzialności platform cyfrowych za treści
  udostępniane użytkownikom. Patostreamy muszą być ograniczone. Platformy internetowe
  powinny ponosić za to odpowiedzialność – wyjaśnił Wicepremier, Minister Cyfryzacji
  Krzysztof Gawkowski. Celem rządu jest odpowiedzialne reagowanie na rosnące wyzwania
  cyfrowe i ochrona najmłodszych. W dzisiejszych konsultacjach z młodzieżą uczestniczyli
  także Minister Edukacji Barbara Nowacka oraz Minister ds. Nadzoru nad Wdrażaniem
  Polityki Rządu Maciej Berek.
