title: Bezpieczna granica to szczelna granica
text: Jeszcze w 2023 roku tysiące osób przekraczały nielegalnie granicę Polski z Białorusią,
  która była nieszczelna. Ponad dwa lata temu moje pierwsze działania jako szefa rządu
  dotyczyły zapewnienia bezpieczeństwa na wschodniej granicy. To nie były łatwe decyzje
  i wymagały konsekwencji, ale zaowocowały bezprecedensowym sukcesem – ocenił Donald
  Tusk podczas odprawy z dowództwem Straży Granicznej w Otwocku. W ciągu pierwszych
  trzech miesięcy 2026 roku nie odnotowano ani jednej udanej próby nielegalnego przekroczenia
  granicy z Białorusią. To efekt m.in. inwestycji rządu w zabezpieczenia ochronne,
  wprowadzenia strefy buforowej oraz czasowego zawieszenia prawa do azylu. Dzięki
  pracy Straży Granicznej, Wojska Polskiego oraz Policji, a także działaniom prawnym
  i wielkim inwestycjom, udało nam się zbudować system, który uczynił wschodnią granicę
  Polski najlepiej strzeżoną granicą UE Ministrowie ogłosili dziś decyzje, które pozwolą
  wykorzystać dodatkowe pieniądze także na rzecz Straży Granicznej i ochrony granicy.
  To fundusze porównywalne z funduszami unijnego programu SAFE dla służb podległych
  MSWiA. Przypomnijmy środki nie mogły zostać przekazane z programu SAFE – tak jak
  na początku planował rząd – przez weto Prezydenta Karola Nawrockiego. Otrzymacie
  wszystkie niezbędne środki, bo zasłużyliście na to jak nikt w Polsce – dzięki waszej
  ofiarnej służbie i coraz większym kompetencjom Premier podkreślił jednocześnie,
  że służba Straży Granicznej w Polsce wykracza poza samą ochronę granic – stanowi
  także obronę demokracji, praw obywatelskich i wolności w kraju oraz Europie. Dzięki
  skutecznej pracy funkcjonariuszy Polacy i Europejczycy odzyskali poczucie bezpieczeństwa
  oraz wiarę w państwo demokratyczne, które potrafi chronić swoich obywateli. Minister
  Spraw Wewnętrznych i Administracji Marcin Kierwiński zaznaczył, że rząd nie szczędzi
  środków na wzmacnianie bezpieczeństwa wschodniej granicy Polski. To prawie 3 mld
  zł inwestycji w uszczelnienie naszej granicy. Realizujemy także największy w historii
  program modernizacji służb podległych MSWiA. Prawie 2,6 mld zł trafia już do Straży
  Granicznej, co oznacza wzrost o 90% względem poprzedniego programu Środki z programu
  modernizacji służb podległych MSWiA pozwolą m.in. zwiększyć liczbę etatów w Straży
  Granicznej o dodatkowe 3 tys. osób. Komendant Główny Straży Granicznej gen. Robert
  Bagan podkreślił znaczenie zarówno infrastruktury, jak i funkcjonariuszy w zapewnieniu
  bezpieczeństwa wschodniej granicy Polski. Na naszą skuteczność składa się wiele
  elementów – bariera fizyczna i jej modernizacja, nowa bariera elektroniczna, a także
  zabezpieczenia na Bugu. Ale najważniejszym elementem są ludzie – doskonali fachowcy
  Straży Granicznej, którzy w połączeniu z rozwiązaniami technicznymi i współpracą
  z żołnierzami Wojska Polskiego przynoszą tę skuteczność, jaką mamy obecnie – zaznaczył
  Komendant Główny Straży Granicznej. Czujność funkcjonariuszy nie ogranicza się tylko
  do granicy z Białorusią, lecz obejmuje również granicę ukraińską, rosyjską oraz
  wszystkie porty lotnicze i morskie. Dzięki temu Polska skutecznie chroni bezpieczeństwo
  swojego terytorium i obywateli. W 2026 roku Straż Graniczna odmówiła wjazdu ponad
  8,7 tys. cudzoziemców, którzy nie posiadali uprawnień do wjazdu lub byli zastrzeżeni
  w systemie Schengen. Premier Donald Tusk odniósł się do informacji dotyczących rozmieszczenia
  wojsk USA w naszym kraju. Chcę wszystkich uspokoić. Jesteśmy w stałym kontakcie
  ze Stanami Zjednoczonymi i NATO, a wszelkie decyzje mają charakter logistyczny i
  nie zagrażają bezpieczeństwu Polski. Nasz kraj pozostaje lojalnym i skutecznym sojusznikiem,
  a ochrona bezpieczeństwa obywateli i sojuszników jest naszym priorytetem Polska
  pozostaje gwarantem bezpieczeństwa dla swoich obywateli i sojuszników, a wszystkie
  działania są pod pełną kontrolą.
