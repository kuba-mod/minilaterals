title: Wzmocnienie bezpieczeństwa Polski i Wlk. Brytanii - traktat z Northolt podpisany
text: Historia i położenie geograficzne Polski pokazują, jak istotne są trwałe partnerstwa
  oparte na konkretnych zobowiązaniach i praktycznej współpracy. Traktat polsko-brytyjski
  wzmacnia bezpieczeństwo obu państw oraz służy skutecznemu odstraszaniu potencjalnych
  zagrożeń jeszcze przed wystąpieniem konfliktu. Rzeczpospolita i Zjednoczone Królestwo
  potrzebują współpracy na najwyższym poziomie, jeśli chodzi o bezpieczeństwo i obronność
  – podkreślił Donald Tusk podczas uroczystości podpisania traktatu z Wielką Brytanią
  w Northolt, historycznej bazie polskich lotników z Dywizjonu 303. Szczególnie ważnym
  obszarem współpracy między Warszawą a Londynem będzie ochrona cyberprzestrzeni.
  Nowoczesne technologie powodują, że dzisiaj nikt nie czuje się bezpieczny. Współdziałanie
   w tej dziedzinie jest bardzo istotne Polsko-brytyjski traktat ma także służyć zacieśnieniu
  współpracy w ramach Sojuszu Północnoatlantyckiego. Robimy to, aby wzmocnić NATO.
  Chcemy być bardziej praktyczni i szybsi w reagowaniu, jeśli będzie taka potrzeba.
  Istotą polityczną porozumienia jest wzmocnienie solidarności europejskiej i więzi
  transatlantyckich Celem Polski i Wielkiej Brytanii jest skuteczne odstraszanie potencjalnego
  agresora – Rosji. Nie ma dla nas większego wyzwania niż rosyjska agresja. Widzimy
  to nie tylko w samej Ukrainie, ale też poza jej granicami. Podpisany traktat jest
  naprawdę pokoleniowym wzmocnieniem relacji w zakresie bezpieczeństwa i obronności
  pomiędzy naszymi krajami – ocenił szef brytyjskiego rządu Keir Starmer. Polska i
  Wielka Brytania zadeklarowały także ochronę wspólnych wartości, takich jak rządy
  prawa, demokracja i prawa człowieka. Wartości te pozostają fundamentem współpracy
  Warszawy i Londynu. Nasza współpraca militarna, technologiczna, w cyberprzestrzeni
  oraz w zakresie bezpieczeństwa w szerokim wymiarze – w tym zdrowotnym i informacyjnym
  – daje nadzieję, że ten historyczny traktat rzeczywiście uczyni naszą przyszłość
  bezpieczniejszą Podpisany dokument zwiększa także stabilność w regionie oraz w ramach
  wspólnoty euroatlantyckiej. Traktat między Rzecząpospolitą Polską a Zjednoczonym
  Królestwem Wielkiej Brytanii i Irlandii Północnej o Partnerstwie w Dziedzinie Bezpieczeństwa
  i Obronności
