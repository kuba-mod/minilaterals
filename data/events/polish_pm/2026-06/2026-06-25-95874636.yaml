title: 'Premier: Odbudowa Ukrainy będzie możliwa dzięki naszej solidarności'
text: W Gdańsku rozpoczęła się dwudniowa Konferencja na rzecz Odbudowy Ukrainy (Ukraine
  Recovery Conference – URC) współorganizowana przez Polskę oraz Ukrainę. Jestem dumny,
  że tak wielu z was, pań i panów premierów, prezydentów, przewodniczących, przedsiębiorców,
  menedżerów przybyło do Gdańska. Tysiące ludzi przez dwa dni będą przygotowywać wspólnie
  wielki projekt - projekt odbudowy Ukrainy po wojnie - powiedział Premier Donald
  Tusk podczas sesji otwierającej URC. Konferencja stanowi kontynuację międzynarodowego
  formatu zainicjowanego przez państwa G7 oraz platformę darczyńców dla Ukrainy. Jej
  celem jest koordynacja działań na rzecz odbudowy kraju oraz mobilizacja inwestycji
  niezbędnych do realizacji tego procesu. Oczekujemy podpisania ponad 160 umów wartych
  10 mld euro - zapowiedziała Premier Ukrainy Julia Swyrydenko. Wskazała, że będą
  one miały wpływ na wiele wymiarów – rozwój regionalny, biznesowy, a także obronny.
  Premier Tusk zwrócił uwagę na historyczne wyzwania stojące dziś przed Europą i światem
  zachodnim – zjednoczenie Europy i wolnego świata wobec agresji oraz niepewności,
  która w ostatnich latach ogarnęła znaczną część globu. Wskazał, że dziś wszyscy
  wierzymy, że Ukraina oprze się rosyjskiej agresji, a odbudowa Ukrainy będzie możliwa
  dzięki naszej solidarności. Nasze wsparcie dla Ukrainy jest konsekwentne i niezłomne,
  aby pomóc osiągnąć sprawiedliwy i trwały pokój -  oświadczył szef Rady Europejskiej
  Antonio Costa. Do Ukrainy trafi pierwsza płatność na kwotę 3,2 mld euro z unijnej
  pożyczki o wartości 90 mld euro. W dalszym ciągu wzywamy wszystkich naszych partnerów,
  żeby utrzymali swoje wsparcie, bowiem silna, niezależna Ukraina leży w naszym interesie
  - zaapelowała Przewodnicząca Komisji Europejskiej Ursula von der Leyen. Ambicją
  Unii Europejskiej jest nie tylko pomagać Ukrainie i Europie, ale pomagać Ukrainie
  rosnąć, bogacić się jako wolny europejski kraj – dlatego UE stała się tam największym
  inwestorem. Wybór Gdańska jako miejsca tego wyjątkowego spotkania nie był przypadkowy.
  Miasto ma szczególny wymiar symboliczny. To tu rozpoczęło się największe nieszczęście
  współczesnej Europy, jakim była II wojna światowa. Tu na własne oczy można zobaczyć,
  co to znaczy cud odbudowy Gdańsk został podniesiony z ruin i stał się jednym z najbardziej
  spektakularnych przykładów rekonstrukcji na świecie. Odbudowa objęła nie tylko zabytkową
  tkankę miejską, lecz także ducha i tożsamość miasta. Ukraina słusznie chce być częścią
  zjednoczonej Europy. Zawsze warunkiem prawdziwego, pełnego zjednoczenia było rozumienie
  własnej historii. I autentyczna zdolność i gotowość do pojednania To właśnie w Gdańsku
  rozpoczęła się wojna, która podzieliła narody Europy i wydawała się na trwałe przekreślić
  możliwość porozumienia między nimi. Dziś Polacy, Niemcy, Francuzi, Brytyjczycy są
  partnerami, sojusznikami, co pokazuje, że można uczciwie i zgodnie z prawdą historyczną
  rozmawiać o przeszłości, by nasza przyszłość wyglądała inaczej. Przyszłość możemy
  zbudować tylko na prawdzie, na wzajemnym szacunku, na rozumieniu historii. Solidarność,
  która narodziła się w Gdańsku, może być naszą rzeczywistością, jeśli otworzymy swoje
  serca i umysły na przeszłość, ale przede wszystkim na przyszłość Podczas Konferencji
  zostaną podpisane umowy między podmiotami polskimi i ukraińskimi, które posłużą
  zacieśnianiu relacji gospodarczych. Na marginesie URC odbywają się spotkania dwustronne
  Premiera z liderami państw, m.in.Prezesem Banku Światowego Ajay Banga, z Kanclerzem
  Austrii Christianem Stockerem oraz Premierem Bułgarii Rumenem Radewem.
