title: Bezpieczeństwo, inwestycje i transparentność wynagrodzeń w ochronie zdrowia
text: Bezpieczeństwo Polski pozostaje jednym z najważniejszych priorytetów rządu.
  Dlatego Rada Ministrów upoważniła Ministra Obrony Narodowej do podjęcia działań
  na rzecz utworzenia w Polsce stałej bazy wojskowej dla żołnierzy USA. Dziękuję Premierowi
  Władysławowi Kosiniakowi-Kamyszowi za inicjatywę utworzenia stałej bazy Sił Zbrojnych
  Stanów Zjednoczonych. To bardzo poważne przedsięwzięcie. Dzisiaj przyjęliśmy uchwałę
  Rady Ministrów w tej sprawie, aby rozpocząć nad nim prace Uchwała umożliwi rozpoczęcie
  konsultacji i uzgodnień ze stroną amerykańską oraz przygotowanie propozycji dotyczących
  lokalizacji bazy, niezbędnej infrastruktury, kosztów przedsięwzięcia i źródeł jego
  finansowania. Stała obecność wojsk USA w Polsce oznacza dodatkowe wzmocnienie bezpieczeństwa
  kraju i całej wschodniej flanki NATO, a także pogłębienie współpracy obronnej między
  Polską a Stanami Zjednoczonymi. Bezpieczeństwo państwa to również silna i odporna
  gospodarka. Rząd konsekwentnie wspiera rozwiązania zwiększające udział polskich
  przedsiębiorstw w realizacji największych inwestycji. Premier podpisał dziś dokument
  „Dobre praktyki w zakresie zwiększenia przez spółki z udziałem Skarbu Państwa udziału
  komponentu krajowego w kluczowych procesach inwestycyjnych” dotyczące stosowania
  zasad Local Content. Ich celem jest zwiększenie udziału krajowych firm, pracowników
  i dostawców w strategicznych projektach realizowanych w naszym kraju. Bardzo ważne
  jest dla nas, aby krajowe inwestycje przynosiły korzyści polskim firmom i pracownikom
  Działania te mają wzmacniać konkurencyjność naszej gospodarki, zwiększać jej odporność
  na zewnętrzne zakłócenia oraz tworzyć nowe możliwości rozwoju dla polskich przedsiębiorstw,
  szczególnie z sektora małych i średnich firm. Local Content pomaga krajowym przedsiębiorstwom
  uczestniczyć w strategicznych projektach infrastrukturalnych, energetycznych i przemysłowych.
  To szansa na rozwój technologii, zdobywanie nowych kompetencji i budowanie przewag
  konkurencyjnych polskich firm. Jednym z projektów wspierających rozwój nowoczesnego
  przemysłu ma być wznowienie prac nad budową fabryki samochodów elektrycznych w Jaworznie.
  Znamy smutny finał ambitnego przedsięwzięcia, jakim była Izera za czasów naszych
  poprzedników Obecny rząd zakończył przygotowania do reaktywacji projektu realizowanego
  przez spółkę ElectroMobility Poland, pozyskał nowego partnera oraz zabezpieczył
  4,5 mld zł finansowania z Krajowego Planu Odbudowy. Zgodnie z planem umowa inwestycyjna
  ma zostać podpisana jesienią, a uruchomienie produkcji przewidziano na 2029 rok.
  Fabryka ma produkować do 400 tys. pojazdów rocznie i stworzyć ok. 4 tys. miejsc
  pracy. Podczas posiedzenia Rady Ministrów przyjęto również projekt ustawy, który
  umożliwi Ministrowi Zdrowia, Narodowemu Funduszowi Zdrowia oraz Agencji Oceny Technologii
  Medycznych i Taryfikacji pozyskiwanie dokładniejszych danych o wynagrodzeniach pracowników
  medycznych. Dane będą mogły być przypisywane do konkretnych osób na podstawie numeru
  PESEL lub numeru prawa wykonywania zawodu. Premier odniósł się również do informacji
  dotyczących wysokich wynagrodzeń uzyskiwanych przez jednego z lekarzy. Szczegółowo
  wyjaśnimy sprawę młodego lekarza z Warszawy. W zależności od wyników kontroli sprawą
  może zainteresować się również prokuratura Przyjęte przez Radę Ministrów przepisy
  zwiększą przejrzystość systemu wynagrodzeń w ochronie zdrowia i umożliwią skuteczniejszy
  nadzór nad wydatkowaniem środków publicznych. Rząd rozpoczął także proces stopniowego
  wygaszania programu „Ceny Paliw Niżej”, który został wprowadzony w odpowiedzi na
  gwałtowne wzrosty cen paliw związane z konfliktem na Bliskim Wschodzie. Z satysfakcją
  mogę powiedzieć, że program CPN działał i wyraźnie stabilizował sytuację. Wczoraj
  zaczęliśmy wygaszanie programu i mamy dobre wieści – mimo przywrócenia akcyzy, ceny
  paliw na stacjach będą na podobnym poziomie W pierwszym etapie przywrócona zostanie
  akcyza na paliwa. Kolejnym krokiem będzie powrót do standardowych stawek VAT. W
  związku ze spadkiem cen na rynkach światowych, zmiany te nie powinny spowodować
  istotnego wzrostu cen na stacjach paliw.
