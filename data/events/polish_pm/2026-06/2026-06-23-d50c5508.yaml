title: 'Premier: Nie przyłożę ręki do podsycania napięcia w relacjach polsko-ukraińskich'
text: Premier Donald Tusk odniósł się do napięć w relacjach polsko-ukraińskich. W
  reakcji na nadanie jednej z jednostek Sił Zbrojnych Ukrainy nazwy „Bohaterów UPA”
  Prezydent Karol Nawrocki odebrał Prezydentowi Ukrainy Wołodymyrowi Zełenskiemu Order
  Orła Białego. W odpowiedzi strona ukraińska odesłała odznaczenie do Polski. Od wielu
  godzin pracujemy nad tym, aby minimalizować koszta i straty, jakie powstały wskutek
  decyzji Prezydentów Ukrainy i Polski - powiedział szef rządu przed posiedzeniem
  Rady Ministrów. Po wybuchu pełnoskalowej wojny w Ukrainie zarówno bohaterstwo ukraińskich
  żołnierzy broniących swojego kraju przed rosyjską agresją, jak i solidarność oraz
  ofiarność Polaków udzielających pomocy uchodźcom spotkały się z uznaniem na całym
  świecie. Jednocześnie przy tak dużej skali migracji napięcia, rozczarowania i konflikty
  społeczne są zjawiskiem nieuniknionym. Rozumiem nastroje, ale mając na uwadze strategiczne
  bezpieczeństwo Polski, nie przyłożę ręki do podsycania tych napięć. W długoterminowym
  interesie Polski jest budowanie relacji z Ukrainą na wizji przyszłości Po obu stronach
  granicy istnieją środowiska polityczne zainteresowane podsycaniem napięć zamiast
  budowaniem porozumienia i współpracy. Historyczne doświadczenia i związane z nimi
  emocje są zrozumiałe, jednak nie mogą prowadzić do pogłębiania podziałów. Dawno
  już tak mądrze nie brzmiały słowa Władysława Bartoszewskiego o tym, że warto być
  przyzwoitym, chociaż nie zawsze się to opłaca. Jeśli chodzi o kwestie polsko-ukraińskie,
  obie strony powinny zrozumieć, że warto być przyzwoitym Szef odniósł się również
  do rozpoczynającej się w czwartek Konferencji Odbudowy Ukrainy. Wydarzenie odbędzie
  się bez względu na działania polskich i ukraińskich polityków. Przygotowano już
  200 porozumień i umów, które zostaną zawarte w Gdańsku między polskimi a ukraińskimi
  firmami. Jeśli chodzi o wspólne przedsięwzięcia, biznes po zakończeniu wojny, mówimy
  o setkach miliardów dolarów. To będą pieniądze do wydania także przez polskie firmy
  w Ukrainie po zakończeniu wojny - w interesie Polski i Ukrainy, żeby ta współpraca
  była kontynuowana Szef rządu wyraził nadzieję, że zarówno po stronie polskiej, jak
  i ukraińskiej będzie przybywać osób gotowych przeciwstawiać się negatywnym emocjom
  oraz działać na rzecz dialogu, wzajemnego szacunku i wspólnej przyszłości obu narodów.
  Premier odniósł się do wstępnych ustaleń Najwyższej Izby Kontroli dotyczących funkcjonowania
  szpitali, wskazujących na nieprawidłowości w zakresie realizacji świadczeń zdrowotnych,
  organizacji czasu pracy lekarzy oraz systemu wynagrodzeń. Wstępne wyniki kontroli
  NIK w szpitalach potwierdzają, że mamy dwa problemy, którymi zajmiemy się  – „rekordowo”
  długie dyżury i nadużycia systemu płacowego. Ujawnione nieprawidłowości są efektem
  zarówno wadliwych mechanizmów systemowych, jak i niewystarczającego nadzoru, kontroli
  oraz niewłaściwych działań części osób odpowiedzialnych za funkcjonowanie systemu.
  Rząd będzie konsekwentnie realizował wnioski płynące z tej kontroli. Czeka mnie
  bardzo poważna rozmowa z szefostwem NFZ, ponieważ wykluczam myślenie, że jako jednostka
  nadzorująca wydawanie środków, był bezradny w kontrolowaniu nieprawidłowości w wynagrodzeniach
  Szef zaapelował o prace nad odważniejszymi rozwiązaniami legislacyjnymi mającymi
  na celu naprawę systemu ochrony zdrowia. Obecne mechanizmy stwarzają też możliwości
  nadużywania pozycji publicznej lub społecznej, by uzyskać uprzywilejowany dostępu
  do świadczeń zdrowotnych. Premier Donald Tusk polecił Ministrom Zdrowia i Sprawiedliwości
  przygotowanie wspólnych rekomendacji, aby uniemożliwić i nakładać sankcje na osoby,
  które wykorzystują swoją pozycję społeczną do omijania kolejek. W przypadku stwierdzenia
  nieprawidłowości wyciągane będą konsekwencje. Premier Donald Tusk poinformował o
  spotkaniu z przedstawicielami amerykańskiej firmy Shield AI, specjalizującej się
  w produkcji zaawansowanych systemów bezzałogowych. Przedstawiciele Shield AI zadeklarowali
  gotowość do lokowania w Polsce kapitału oraz nowoczesnych technologii. Ta współpraca
  wydaje się niezwykle interesująca pod względem bezpieczeństwa, nowoczesności naszej
  armii, ale też biznesu i technologii. Mówimy o tysiącach miejsc pracy, o miliardach
  zainwestowanych dolarów. W intencji naszych amerykańskich partnerów Polska ma być
  takim hubem Do etapu końcowego zbliża się też duże przedsięwzięcie inwestycyjne
  realizowane we współpracy z partnerami z Tajwanu Decyzja zapadła - na Dolnym Śląsku
  będziemy mieli wielki park technologiczny, który powstanie przy współpracy z tajwańskimi
  firmami. Będzie to miało wymiar ponadnarodowy i ponadregionalny, powstaną tysiące
  nowych miejsc pracy Planowany park technologiczny stworzy warunki do realizacji
  wspólnych przedsięwzięć w strategicznych sektorach gospodarki i bezpieczeństwa.
  Na terenie około 150 hektarów mają zostać zrealizowane inwestycje o wartości liczonej
  w miliardach dolarów. Dodatkowo Gaz-System podjął decyzję dotycząca realizacji kolejnej
  inwestycji wzmacniającej pozycję Polski jako regionalnego hubu gazowego. W Zatoce
  Gdańskiej powstanie trzeci terminal LNG. Będzie to druga, po obecnie budowanym terminalu
  FSRU, pływająca instalacja w tym regionie. Inwestycja uzupełni istniejącą infrastrukturę
  gazową, obok terminalu LNG w Świnoujściu, zwiększając bezpieczeństwo energetyczne
  kraju oraz możliwości dywersyfikacji dostaw gazu.
