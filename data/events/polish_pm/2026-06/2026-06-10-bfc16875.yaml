title: 'Premier: Skutecznie bronimy polskiego bezpieczeństwa i polskiej granicy'
text: Podczas debaty w Sejmie Donald Tusk odniósł się do działań rządu w obszarze
  bezpieczeństwa państwa i funkcjonowania służb. Bardzo wysoko oceniam pracę ministra
  Marcina Kierwińskiego. Kiedy Polska znalazła się w potrzebie, zrezygnował z pracy
  w Europarlamencie, nie kierując się przywilejami, i bez wahania wrócił, by pomóc
  powodzianom Jednym z sukcesów Marcina Kierwińskiego jest również skuteczna ochrona
  granic i walka z nielegalną migracją. Od dłuższego czasu o Polsce mówi się jako
  o jednym z najbezpieczniejszych miejsc w Europie. My nie bawiliśmy się – jak niektórzy
  – w makietę zapory na granicy i nie handlowaliśmy wizami. Podejmowaliśmy natomiast
  decyzje w kraju i na forum europejskim, które realnie wzmocniły ochronę polskiego
  terytorium przed nielegalną migracją Efektem działań szefa MSWiA było także wzmocnienie
  etosu pracy w służbach mundurowych. Od końca 2023 r. liczba policjantów wzrosła
  z ok. 93 tys. do ponad 102 tys. funkcjonariuszy, a liczba kandydatów do służby zwiększyła
  się z 15 tys. do 35 tys. osób. Rząd wprowadził również 30% podwyżki wynagrodzeń,
  świadczenia mieszkaniowe dla funkcjonariuszy oraz przyjął program modernizacji służb
  mundurowych o wartości 13 mld zł. Podczas debaty w Sejmie Premier ostrzegł jednocześnie
  przed narastającą falą wrogości wobec osób ze względu na ich pochodzenie. Tego typu
  nastroje są coraz częściej podsycane przez liderów opozycji i mogą prowadzić do
  poważnych skutków społecznych i politycznych. Z pojedynczych wyzwisk robi się fala,
  która zagraża istocie Rzeczypospolitej. Polowanie, które trwa obecnie, widzieliśmy
  w Europie wielokrotnie i z reguły kończyło się katastrofą Działania części polityków
  wzmacniają atmosferę nienawiści i podziałów, która może obrócić się również przeciwko
  jej autorom. Jeśli będziecie kontynuować marsz w stronę brunatnego krajobrazu politycznego,
  prowadząc działania polegające na śledzeniu i lustrowaniu, to także staniecie się
  ofiarami tego trendu. Opamiętajcie się, jest jeszcze czas Politycy powinni pozostawać
  wierni wartościom republikańskim, które stanowią fundament Rzeczypospolitej, takim
  jak służba państwu, przestrzeganie prawa oraz równość obywateli. W debacie publicznej
  nie można poddawać ocenie pochodzenia, rasy czy koloru skóry. Polacy żyjący w elementarnej
  zgodzie, nie szukający różnic etnicznych i genealogicznych – tylko tacy Polacy imponują
  światu i budują potęgę Rzeczpospolitej Siłą i bogactwem Polski jest jej różnorodność
  oraz przekonanie, że niezależnie od pochodzenia wszyscy obywatele służą dobru wspólnemu.
