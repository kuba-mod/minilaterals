title: „System jest zwyrodniały” - konieczna radykalna naprawa i większa przejrzystość
  w ochronie zdrowia
text: Rząd konsekwentnie zwraca uwagę, że udział środków przeznaczanych na wynagrodzenia
  w ochronie zdrowia jest w wielu przypadkach nieproporcjonalnie wysoki w stosunku
  do wydatków związanych z leczeniem pacjentów. Nikogo nie obwiniam, ale system jest
  naprawdę zwyrodniały. Przez całe lata był coraz bardziej nastawiony na śrubowanie
  wynagrodzeń części lekarzy. Doszło do takich dysproporcji, że są szpitale, w których
  koszty wynagrodzeń stanowią niemal całość wszystkich wydatków Problemem systemu
  ochrony zdrowia pozostaje także niewystarczająca transparentność wynagrodzeń medyków.
  Większa przejrzystość ma pomóc w odbudowie zaufania społecznego oraz skuteczniejszym
  nadzorze nad wydatkowaniem środków publicznych. Wczoraj Rada Ministrów przyjęła
  projekt ustawy, który wreszcie umożliwi agencji podległej Ministerstwu Zdrowia skuteczne
  kontrolowanie i monitorowanie wynagrodzeń lekarzy. Będzie to dotyczyło konkretnych
  osób i konkretnych płac Nowe przepisy mają zostać przyjęte jeszcze podczas obecnego
  posiedzenia Sejmu. Ponadto w lipcu wejdzie w życie ustawa wprowadzająca centralny
  rejestr umów jednostek sektora finansów publicznych. Umożliwi to m.in. kontrolę
  wynagrodzeń w publicznej służbie zdrowia, czyli w SPZOZ-ach. Mam nadzieję, że we
  współpracy ze środowiskiem medycznym będziemy poszukiwać kolejnych rozwiązań prawnych,
  które uniemożliwią nadużywanie systemu Prezes Rady Ministrów zapowiedział również
  szczegółowe kontrole dotyczące wykorzystania środków publicznych przeznaczanych
  na ochronę zdrowia. Zwróciłem się do Najwyższej Izby Kontroli o przeprowadzenie
  kompleksowych kontroli. Chcę otrzymać szczegółowy raport oraz wnioski dotyczące
  miejsc, w których dochodziło do nadużyć. W uzasadnionych przypadkach sprawy będą
  kierowane również do prokuratury Zapowiedziane działania mają zwiększyć przejrzystość
  systemu ochrony zdrowia, ograniczyć ryzyko nadużyć oraz zapewnić bardziej efektywne
  wykorzystanie środków publicznych z korzyścią dla pacjentów. Premier zapowiedział
  także wyjaśnienie spraw dotyczących potencjalnych nieprawidłowości w dostępie do
  świadczeń medycznych oraz wykorzystywania relacji osobistych w systemie ochrony
  zdrowia. Dzisiaj w mediach pojawiają się sugestie dotyczące Szpitala Południowego
  i korzystania z usług poza kolejnością czy z ułatwieniami, także w odniesieniu do
  polityków Koalicji Obywatelskiej. Każdy, kto znajdzie się w tej sytuacji, będzie
  musiał publicznie wytłumaczyć, jak było naprawdę. Oczekuję również od szpitala i
  samorządu warszawskiego precyzyjnych informacji. Jest też wystarczająco dużo sygnałów,
  żeby szpital podjął także decyzje personalne Nie może pozostać żadna dwuznaczność
  i wszystko musi być wyjaśnione „do samego spodu”. Jeśli okaże się, że złamano prawo,
  sprawą zajmie się prokuratura, a jeśli doszło do naruszenia dobrych obyczajów, będzie
  to skutkować odpowiedzialnością polityczną Szef rządu zwrócił także uwagę, że podobne
  zjawiska mają charakter szerszy i wymagają systemowych zmian. Znajomości nie mogą
  decydować o tempie dostępu do lekarza czy szpitala. System wymaga radykalnej naprawy
  i wspólnej odpowiedzialności wszystkich środowisk politycznych Zapowiedziane kontrole
  mają pozwolić na ocenę skali problemu i przygotowanie koniecznych zmian systemowych.
  W przypadku stwierdzenia nieprawidłowości zostaną wyciągnięte odpowiednie konsekwencje,
  także wobec osób pełniących funkcje publiczne.
