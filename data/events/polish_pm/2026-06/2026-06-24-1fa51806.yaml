title: Przyszłość Europy i zachodniego świata będzie zależała od naszej jedności
text: 'Premier Donald Tusk wziął udział w spotkaniu liderów państw Grupy E5 w Berlinie.
  Rozmowy dotyczyły m.in. przygotowań do zbliżającego się szczytu NATO w Ankarze,
  perspektyw osiągnięcia trwałego i sprawiedliwego pokoju w Ukrainie, i współpracy
  europejskich przemysłów obronnych. Polska nie miała i nie będzie miała żadnych wątpliwości,
  że przyszłość Europy, zachodniego świata, Ukrainy w tym dramatycznym dla niej momencie,
  będzie zależała od tego, na ile zachowamy jedność europejską i transatlantycką -
  oświadczył Premier Donald Tusk po spotkaniu liderów państw Grupy E5. Szef rządu
  zaznaczył, że Polska będzie konsekwentnie działać na rzecz utrzymania jedności Europy
  i współpracy transatlantyckiej. Będziemy chronić europejską jedność zarówno w trakcie
  wojny na rzecz Ukrainy, w jej konfrontacji z Rosją. Będziemy chronić więzi transatlantyckie,
  nawet jeśli niektórzy politycy nie zawsze doceniają znaczenia więzi transatlantyckich
  Premier podkreślił również znaczenie państw flanki wschodniej dla zachowania bezpieczeństwa
  Europy. Zapowiedział działania na rzecz ich pełnej reprezentacji we wszystkich formatach
  współpracy dotyczących bezpieczeństwa i przyszłości regionu. Bez Polski, bez państw
  skandynawskich, bez państw bałtyckich, bez Rumunii trudno będzie cokolwiek osiągnąć
  w konfrontacji cywilizacyjnej, konfrontacji z agresywnymi wschodnimi sąsiadami Polska
  już teraz przyczynia się do umacniania bezpieczeństwa europejskiego, czego dowodem
  są rekordowe wydatki na obronność – obecnie na poziomie prawie 7 procent PKB. Premier
  zaapelował do liderów NATO, by włożyli więcej wysiłku w budowę zdolności obronnych
  Europy i własnych krajów, jeśli poważnie traktują swoje zobowiązania. Ponadto jutro
  w Gdańsku rozpocznie się Konferencja Odbudowy Ukrainy z udziałem wielu przywódców,
  dyplomatów i firm. To praktyczny wymiar wsparcia Polski i Europy dla walczącej Ukrainy.
  Niezależnie od różnych zdarzeń, przeprowadzę ją zgodnie z planem. Będzie to kolejny
  wkład Polski i Europy w odbudowę Ukrainy, pomoc Ukrainie dzisiaj i w odbudowę Ukrainy
  po wojnie Grupę E5 tworzą państwa europejskie zaangażowane we wspieranie Ukrainy
  oraz wzmacnianie bezpieczeń stwa regionu i świata: Polska, Niemcy, Francja, Wielka
  Brytania i Włochy. Gospodarzem dzisiejszego s potkania był Kanclerz Niemiec Friedrich
  Merz. Oświadczenie przywódców grupy E5'
