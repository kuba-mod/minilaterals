title: Święto Służby Ochrony Państwa i powitanie F-35 w Polsce - kolejny symbol bezpieczeństwa
  państwa
text: Funkcjonariusze Służby Ochrony Państwa dbają o codzienne bezpieczeństwo instytucji
  oraz osób sprawujących władzę w Polsce. Są strażnikami polskiego bezpieczeństwa
  i służą ochronie państwa. Dziękuję i kłaniam się nisko wszystkim, którzy na co dzień
  wykazują się profesjonalizmem i odwagą Służba Ochrony Państwa mierzy się dziś z
  nowymi wyzwaniami, które wymagają zwiększonych kompetencji, nowoczesnego sprzętu
  oraz rozbudowanej logistyki. Spotykacie się z nowymi zagrożeniami, czy to w cyberprzestrzeni,
  czy w postaci incydentów dronowych. W takich sytuacjach zawsze jesteście na miejscu
  i dzięki temu autorzy prób sabotażu czy dywersji są bezsilni W związku z rosnącą
  skalą wyzwań SOP będzie wzmacniana m.in. w ramach Programu Modernizacji Służb Mundurowych
  na lata 2026–2029. Budżet formacji ma wzrosnąć o 125% i osiągnąć poziom blisko 500
  mln zł. Nie zabraknie mi i moim współpracownikom determinacji, aby cała Służba Ochrony
  Państwa czuła się doceniona przez państwo polskie. Zasługujecie na to, jak mało
  kto Zwiększenie wsparcia dla formacji ma wzmocnić jej zdolność do reagowania na
  współczesne wyzwania i zapewnienia bezpieczeństwa państwa. Polska dołączyła dziś
  do elitarnego grona 20 państw posiadających samoloty F-35 – jako pierwsze państwo
  wschodniej flanki NATO. Nad Polską przeleciały pierwsze F-35, które będą chronić
  bezpieczeństwa nieba nad naszym krajem W 2030 roku w Polsce będą stacjonować 32
  samoloty F-35. W bazie w Łasku będzie centrum szkolenia pilotów tych najnowocześniejszych
  maszyn F-35 łączy technologię obniżonej wykrywalności (stealth), sensory działające
  w zakresie 360 stopni oraz bezpieczną komunikację z sojusznikami, dzięki czemu działa
  jak powietrzne centrum dowodzenia i rozpoznania. Samolot został zaprojektowany jako
  kluczowy węzeł wymiany informacji, zmieniając sposób prowadzenia operacji powietrznych.
