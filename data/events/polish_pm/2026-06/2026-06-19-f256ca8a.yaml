title: Europa zwiększa presję na Rosję i wzmacnia wsparcie dla Ukrainy
text: Podczas obrad Rady Europejskiej unijni liderzy omówili aktualną sytuację na
  Ukrainie oraz związane z nią wyzwania dla bezpieczeństwa Europy. Sukcesy Ukrainy
  w głębokich uderzeniach, m.in. na Moskwę, wzbudziły szerokie uznanie. Z jednej strony
  jest poczucie, że nasza pomoc przynosi efekty, z drugiej zaś zdajemy sobie sprawę,
  że im trudniejsza sytuacja Rosji, tym większe ryzyko działań niekonwencjonalnych
  wobec państw UE - powiedział Premier D. Tusk podczas konferencji prasowej w Brukseli.
  Rosja nie wykazuje obecnie realnej woli zakończenia konfliktu. Wśród europejskich
  liderów nie ma już przekonania, że Władimir Putin chce rozmów pokojowych. Nic nie
  wskazuje na to, żeby Rosja była zainteresowana jakimikolwiek negocjacjami.  Zadaniem
  Europy jest w tej sytuacji takie wsparcie dla Ukrainy, żeby ona mogła dalej skutecznie
  stawiać opór rosyjskiej agresji Rada Europejska podjęła decyzję o przedłużeniu sankcji
  na Rosję już nie o sześć, a o dwanaście miesięcy. Ustalone zostały również elementy
  kolejnego pakietu sankcji. Jako Europa będziemy szukali kolejnych skutecznych sposobów
  na uderzenie we flotę cieni. Dodatkowo w 21. pakiecie sankcji będziemy uderzać w
  platformy kryptowalutowe, które współpracują z rosyjskim reżimem Rosja pozostaje
  szczególnie aktywna na rynku kryptowalut. Środki pozyskiwane w ten sposób mogą następnie
  zasilać rosyjską machinę wojenną, finansując produkcję rakiet i dronów wykorzystywanych
  do ataków na Ukrainę. Przywódcy państw członkowskich poruszyli kwestię reprezentacji
  Unii Europejskiej w potencjalnych przyszłych rozmowach pokojowych dotyczących wojny
  rosyjsko-ukraińskiej oraz spotkań organizowanych w mniejszych formatach - E3 czy
  E5. Żaden taki format nie może uzurpować sobie prawa do reprezentowania całej Unii
  Europejskiej. Od tego są instytucje i traktaty. Polska nie będzie respektowała żadnych
  ustaleń, które będą podjęte bez jej udziału Wszelkie decyzje dotyczące ewentualnego
  zawieszenia broni oraz przyszłego pokoju między Ukrainą a Rosją powinny być podejmowane
  zgodnie z obowiązującymi traktatami, z udziałem wszystkich państw, których bezpieczeństwo
  będzie zależeć od tych rozstrzygnięć. Polska wraz z pozostałymi państwami wschodniej
  flanki musi być przygotowana na różne scenariusze, w tym prowokacje, incydenty z
  wykorzystaniem dronów czy ataki w cyberprzestrzeni. Aby się przed tym chronić, Polska
  systematycznie wzmacnia swoje zdolności obronne. Nie, nie lękajmy się. Polska jest
  coraz lepiej przygotowana na wszystkie możliwe zdarzenia Europejscy przywódcy mają
  dziś świadomość, że sytuacja może w najbliższym czasie stać się jeszcze bardziej
  poważna wraz z przedłużającą się wojną. Osiągnęliśmy sukces – przyjęliśmy nową strategię
  Unii Europejskiej, która zakłada zwiększenie wsparcia finansowego dla ochrony wschodniej
  flanki oraz rozwój programu bezpieczeństwa dronowego Inicjatywa „Straż Flanki Wschodniej”,
  realizowana przez kilka państw członkowskich, będzie mogła liczyć na wsparcie całej
  Unii Europejskiej. Równolegle rozwijany będzie wspólny europejski program dotyczący
  bezpieczeństwa dronowego.
