title: 'Premier: Nikt nie może lekceważyć naszej wrażliwości'
text: Premier podczas konferencji prasowej odniósł się do decyzji Prezydenta Ukrainy
  Wołodymyra Zełenskiego o nazwaniu jednostki wojskowej imieniem „Bohaterów UPA”.
  Historia dzieliła nasze narody i nie wytrzemy z pamięci zbrodni Ukraińskiej Powstańczej
  Armii, które zostały popełnione na Polakach. Mam nadzieję, że strona ukraińska zrozumie,
  że nikt nie może lekceważyć naszej wrażliwości Jednocześnie należy dążyć do deeskalacji
  emocji, ponieważ w interesie Polski leży skuteczne wspieranie Ukrainy w jej obronie
  przed rosyjską agresją. Ukraina nie może przegrać tej wojny. Gdyby tak się stało,
  Polska znajdzie się w dramatycznie trudniejszej sytuacji Jak wyjaśnił, nasz kraj
  będzie wspierać Ukrainę w drodze do członkostwa w Unii Europejskiej, ale wyłącznie
  na zasadach obowiązujących wszystkie państwa kandydujące. Zaznaczył, że Ukraina
  musi spełnić europejskie standardy, m.in. dotyczące uczciwej konkurencji i walki
  z korupcją. Rząd przyjął pakiet propozycji na 2027 r., które zostaną przedstawione
  Radzie Dialogu Społecznego. Wśród nich znalazła się podwyżka wynagrodzeń w państwowej
  sferze budżetowej o 3 proc. Wzrost płac obejmie m.in. urzędników i nauczycieli.
  Z determinacją zadbaliśmy o to, aby nauczyciele w Polsce zarabiali więcej. Podwyżka
  z 2024 roku była największa w historii, ale wiem, że powinno być więcej. Jak tylko
  pojawi się taka możliwość, nauczyciele będą tą grupą, o której będę pamiętał Rząd
  przekazał także Radzie Dialogu Społecznego propozycje dotyczące wzrostu płacy minimalnej
  z 4806 zł do 4950 zł oraz waloryzację emerytur i rent o co najmniej 3,48%. Pilnujemy,
  żeby inflacja nie zjadała pieniędzy i samych podwyżek – tak, jak było to kiedyś
  Ministerstwo Finansów prognozuje, że w 2027 roku inflacja wyniesie 2,5%.
