title: Nowe okręty dla Polski. Najważniejszy kontrakt w historii Marynarki Wojennej
  RP podpisany!
text: Jednym z najważniejszych rezultatów konsultacji było podpisanie umowy na zakup
  trzech okrętów podwodnych A26 dla Marynarki Wojennej RP w ramach programu „Orka”.
  Włożyliśmy bardzo dużo wysiłku i starań, aby faktem stało się nie tylko podpisanie
  wielu dzisiaj dokumentów, w tym tej znaczącej umowy o programie „Orka” i zakupie
  łodzi podwodnych, ale także wielu innych dziedzinach - powiedział Premier Donald
  Tusk w oświadczeniu dla mediów. Jest to najważniejszy kontrakt w historii polskiej
  Marynarki Wojennej. Pokolenia marynarzy czekały na ten dzień. Program „Orka” przez
  30 lat nie mógł znaleźć swojego finału. Udało się to dopiero rządowi Premiera Donalda
  Tuska - podkreślił Minister Obrony Narodowej Władysław Kosiniak-Kamysz. Podpisane
  porozumienia stanowią dowód zaufania i partnerskich relacji między oboma państwami.
  To dzień historyczny. To duży kamień milowy - 3 szwedzkie łodzie podwodne A26 staną
  się własnością Polski. To bardzo duże przedsięwzięcie. Mówimy o 50 miliardach szwedzkich
  koron, jak to wszystko się połączy - mówił Premier Królestwa Szwecji Ulf Kristersson.
  Program „Orka” to nie tylko zakup nowoczesnego uzbrojenia, lecz przede wszystkim
  początek długofalowej współpracy przemysłowej między Polską i Szwecją. Mamy ambitne
  plany, żeby ten wielki projekt „Orka” był zaledwie etapem, a nie finałem naszej
  współpracy Zakup okrętów podwodnych przez Polskę oraz pozyskanie przez Szwecję okrętu
  ratowniczego i zestawów Piorun pokazują, że oba państwa stały się równorzędnymi
  partnerami. Rozwój polskiego przemysłu obronnego pozostaje jednym z priorytetów
  rządu, a współpraca ze Szwecją stanowi kolejny impuls do wzmacniania krajowych zdolności
  produkcyjnych i technologicznych. To nie są proste zakupy w jedną czy drugą stronę,
  ale autentyczna, prawdziwie partnerska współpraca z korzyścią dla obu przemysłów
  Konsultacje polsko-szwedzkie odbyły się w ramach odnowionego Partnerstwa Strategicznego
  podpisanego w Harpsund w listopadzie 2024 r. W spotkaniu uczestniczyli ministrowie
  obrony narodowej, spraw zagranicznych, finansów, kultury i dziedzictwa narodowego
  oraz infrastruktury. Premier Donald Tusk podkreślił, że Polska i Szwecja konsekwentnie
  współpracują na rzecz tego, aby Morze Bałtyckie było obszarem pokoju i bezpieczeństwa.
  Robimy to wszystko także dla naszych dzieci i wnuków, aby nasz region, nasze państwa,
  Morze Bałtyckie były obszarem pokoju, bezpieczeństwa, a nie tak jak bywa dzisiaj,
  obszarem niepokoju i zagrożeń Szef rządu zaznaczył również, że oba państwa odegrały
  istotną rolę w budowaniu współpracy regionalnej, która znacząco zwiększyła bezpieczeństwo
  obywateli krajów położonych nad Bałtykiem. Przystąpienie Szwecji do NATO dodatkowo
  wzmocniło bezpieczeństwo całego regionu. Razem ze Szwecją jesteśmy odpowiedzialni
  za budowę nowej architektury bezpieczeństwa dla Morza Bałtyckiego i NATO - powiedział
  Minister Władysław Kosiniak-Kamysz. Premier Szwecji Ulf Kristersson zwrócił uwagę
  na wyjątkowo dobre relacje łączące oba państwa. Relacje między Polską i Szwecją
  są najlepsze w całej historii. Są one głębsze i silniejsze niż kiedykolwiek wcześniej.
  Jesteśmy sojusznikami w NATO, partnerami strategicznymi w Unii Europejskiej, sąsiadami
  na Morzu Bałtyckim Polska i Szwecja podzielają ocenę zagrożeń dla bezpieczeństwa
  Europy oraz pozostają zgodne w kwestii dalszego wsparcia Ukrainy wobec rosyjskiej
  agresji. Oba państwa opowiadają się także za zdecydowanymi działaniami na rzecz
  bezpieczeństwa Morza Bałtyckiego – wolnego od działań rosyjskiej floty cieni, prowokacji
  i zagrożeń militarnych. Polsko-szwedzkie konsultacje międzyrządowe. Wspólna deklaracja
  Wspólne oświadczenie Rzeczypospolitej Polskiej i Królestwa Szwecji w sprawie Paktu
  dla Morza Bałtyckiego
