title: Zakończenie budowy Trasy Kaszubskiej - historyczny moment dla Pomorza i całego
  północnego wybrzeża
text: Już w najbliższy piątek kierowcy skorzystają z ostatniego brakującego odcinka
  drogi ekspresowej S6 między Słupskiem a Leśnicami koło Lęborka. Udostępnienie trasy
  oznacza zakończenie budowy jednej z najważniejszych arterii komunikacyjnych północnej
  Polski, łączącej Szczecin, Koszalin, Słupsk, Gdynię i Gdańsk. Na pewno dobrze rozumiecie
  moje emocje związane z tym miejscem, długo czekaliśmy na dokończenie Trasy Kaszubskiej
  - to jest droga o wielkim znaczeniu też międzynarodowym. - powiedział Premier Donald
  Tusk podczas konferencji prasowej. Droga ekspresowa S6 od marca 2025 roku nosi nazwę
  Trasy Kaszubskiej. Droga od Gdańska do Szczecina, od Wisły do Odry jest też przypomnieniem,
  że kiedyś Kaszuby to było to Pomorze Wielkie. Cieszę się, że wszyscy moi ziomkowie
  będą dzisiaj z wielką satysfakcją przyjmowali te informacje. Dzięki temu wszyscy
  będą pamiętali, że to oni byli gospodarzami tej ziemi od Szczecina po Gdańsk Otwarcie
  ostatniego odcinka S6 znacząco ułatwi codzienne podróże tysiącom kierowców i pasażerów,
  a także usprawni ruch w okresie rozpoczynających się wakacji. W piątek mamy koniec
  roku szkolnego i początek wakacyjnych wyjazdów, a to właśnie z drogi ekspresowej
  S6 zjeżdża się do najpopularniejszych polskich kurortów nad Bałtykiem. Zyska na
  tym turystyka, branża turystyczna, przedsiębiorcy. To jest droga o ogromnym potencjale
  gospodarczym - mówił Minister Infrastruktury Dariusz Klimczak. Droga ekspresowa
  S6 pełni kluczową funkcję w obsłudze transportu do polskich portów morskich, łącząc
  Świnoujście i Szczecin z portami Trójmiasta. Jest również częścią europejskiego
  korytarza transportowego biegnącego od Rygi do Lubeki. Jej znaczenie wykracza jednak
  poza kwestie gospodarcze – będzie także ważnym elementem systemu bezpieczeństwa
  państwa. Dzięki wybudowaniu całej S6 dajemy tlen całemu regionowi i wzmacniamy pozycję
  Polski na transeuropejskiej sieci drogowej. To jest bardzo dobra wiadomość dla polskiej
  gospodarki Polska od lat jest przykładem dla innych państw regionu w zakresie rozwoju
  nowoczesnej infrastruktury transportowej. Nasze autostrady i drogi ekspresowe należą
  dziś do najlepszych w Europie. Ten odcinek Trasy Kaszubskiej potwierdza bardzo wysoką
  jakość i to, że nasze aspiracje są uzasadnione.  Mamy prawo do dumy z tego, co Polska
  osiągnęła przez te lata, także jeśli chodzi o infrastrukturę Widoczne jest znaczące
  ożywienie budowy dróg i kolei. Od początku rządu otwarto prawie 700 km odcinków
  nowych dróg. Szef rządu skomentował również kolejne doniesienia medialne oraz wypowiedzi
  byłego chirurga Szpitala Południowego dotyczących sytuacji w placówce oraz możliwych
  nieprawidłowości skutkujących zgonami pacjentów. Niezależnie od tego czy to się
  komuś opłaca czy nie - będziemy wyjaśniali każdy element sprawy Szpitala Południowego
  i tam, gdzie jest potrzebna prokuratura, ona jest i działa Premier pozostaje w stałym
  kontakcie z Prokuratorem Generalnym Waldemarem Żurkiem, którego zobowiązał do osobistego
  nadzoru nad wszystkimi wątkami tej sprawy. Szef rządu wyraził nadzieję, że przesłuchanie
  chirurga przyniesie więcej konkretnych informacji i pozwoli wyjaśnić kluczowe okoliczności
  sprawy. Nie jest moim zadaniem ocenianie wiarygodności wypowiedzi w tych czy innych
  audycjach bohaterów tej sprawy. To nie jest moje zadanie. Ja mam swoją opinię na
  temat wiarygodności niektórych źródeł, ale sprawa jest zbyt poważna. Zarzuty są
  bardzo poważne Prezes Rady Ministrów zapowiedział, że nie będzie uczestniczył w
  nagonce na żadną ze stron sporu. Jednocześnie zapewnił, że wszelkie nieprawidłowości
  zostaną dokładnie zbadane, a osoby odpowiedzialne poniosą konsekwencje. W kwestii
  Szpitala Południowego nie będzie żadnej litości dla tych, którzy dopuścili się ewentualnych
  przestępstw albo wykroczeń o charakterze moralnym, to także znajdzie swój finał
  Potwierdzić mają to wyniki kontroli Najwyższej Izby Kontroli, śledztwa prokuratury
  oraz prowadzonego audytu. Wyjaśniane będą także kwestie związane z tzw. kominami
  płacowymi oraz wyceną niektórych procedur medycznych w szpitalach. W interesie lekarzy
  jest bardzo szybkie doprowadzenie sytuacji w ochronie zdrowia i w polskich szpitalach
  do akceptowalnej nowej normy. Tak, żeby ludzie mieli zaufanie do tego, co robią
  lekarze, bo zaufanie jest niezbędne przy leczeniu ludzi. Żeby ludzie też mieli przekonanie,
  że szpital to nie jest miejsce finansowych przekrętów czy nadużyć W to zadanie Premier
  będzie osobiście zaangażowany. Premier Donald Tusk odniósł się również do rozpoczynającej
  się jutro w Gdańsku Konferencji Odbudowy Ukrainy oraz napięć w relacjach między
  prezydentami Polski i Ukrainy. Moim zadaniem było doprowadzenie do finału, aby ta
  konferencja odbyła się nie tylko zgodnie z planem, ale z szansami na sukces. Mam
  nadzieję, że ta konferencja także będzie pewnym krokiem, żeby obniżyć eskalację
  emocji. To na pewno nie jest potrzebne ani nam, Polakom, ani Ukraińcom Podczas konferencji
  odbędzie się również szczyt państw wschodniej flanki NATO. Rozmowy będą dotyczyć
  kwestii bezpieczeństwa i współpracy. Z kolei dziś Premier będzie uczestniczył w
  spotkaniu grupy E5 z udziałem Francji, Włoch, Wielkiej Brytanii i Niemiec. Zapowiedział,
  że będzie informował europejskich partnerów o sytuacji związanej z decyzją ukraińskiego
  Prezydenta o nadaniu jednej z jednostek wojskowych imienia bohaterów UPA. To decyzja
  nieakceptowalna z polskiej perspektywy, którą nasi europejscy partnerzy rozumieją
  coraz lepiej.
