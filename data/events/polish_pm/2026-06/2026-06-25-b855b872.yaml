title: Rosja największym zagrożeniem. Razem jesteśmy silniejsi
text: Równocześnie z Konferencją Odbudowy Ukrainy w Gdańsku odbył się Szczyt Wschodniej
  Flanki z udziałem prezydentów Litwy i Rumunii oraz premierów Finlandii, Estonii,
  Łotwy, Szwecji. W rozmowach uczestniczyli także przedstawiciele instytucji europejskich.
  Polska od lat nalegała, aby obrona wschodniej flanki była odpowiedzialnością całej
  UE. Dlatego dziś w tym gronie rozmawialiśmy z szefową Komisji Europejskiej i komisarzem
  ds. obrony - powiedział Premier Donald Tusk podczas wspólnego oświadczenia liderów
  państw wschodniej flanki. Podkreślił również znaczenie utrzymania silnych więzi
  transatlantyckich oraz współpracy obronnej ze Stanami Zjednoczonymi. Nie mamy wątpliwości,
  że obecność i współpraca z USA dobrze służy bezpieczeństwu Europy i państw wschodniej
  flanki Szczyt w Gdańsku to kolejne spotkanie liderów państw. Pierwsze odbyło się
  w Helsinkach w 2025 roku. Ustanowiliśmy ten format wspólnie wraz z krajami flanki
  wschodniej w zeszłym roku w Helsinkach. W tej chwili spotykamy się po raz drugi
  i ważne jest, abyśmy kontynuowali te prace - powiedział Premier Finlandii Petteri
  Orpo. Celem spotkań przywódców wschodniej flanki jest koordynacja działań i polityki
  państw regionu zagrożonych przez agresywne działania Rosji. Podzielamy bez wyjątku
  opinię, że sytuacja jest bardzo niestabilna. Można spodziewać się rozmaitego typu
  eskalacji w najbliższych tygodniach i miesiącach. Będziemy chcieli przygotować się
  jako grupa państw bezpośrednio wystawionych na to ryzyko, bo graniczących z Rosją,
  Białorusią, Ukrainą Premier Rumunii Nicușor Dan podkreślił, że jedność powinna dotyczyć
  północy i południa, powinna sięgać od wschodu do zachodu i obejmować także basen
  Morza Czarnego. Potrzebne są nam mechanizmy niezbędne do planowania i przygotowania
  obywateli. Robimy coś więcej niż ochrona terytorium. Chronimy zasady, które łączą
  nasze kraje. Bezpieczeństwo flanki stanowi o naszym bezpieczeństwie. Nie odwlekajmy
  tego. - powiedział Prezydent Litwy Gitanas Nauseda. Podkreślono też wkład poszczególnych
  państw w działania obronne. Szwedzkie władze wciąż działają w sposób zdecydowany
  wobec floty cieni, podtrzymując prawo międzynarodowe. Bronimy zasobów morskich znajdujących
  się na flance wschodniej, na Morzu Bałtyckim Stwierdził, że „potrzebujemy siły,
  aby zapewnić pokój”, a flanka wschodnia pokazuje, jak to robić. Polska pozostaje
  jednym z liderów wśród państw pod względem poziomu wydatków przeznaczanych na obronę
  i bezpieczeństwo, co znacząco umacnia nasze relacje z Amerykanami. Na obronę bezpośrednio
  i na rzeczy związane z obroną to będzie 7%, więc udział rzeczywiście bardzo duży,
  bardzo solidny Podnoszenie nakładów na obronność jest istotne we wszystkich państwach
  regionu. Ostatnie 6 miesięcy to czas podejmowania wielu ważnych działań dla wzmocnienia
  obronności i bezpieczeństwa. 5,4% PKB to jest poziom wydatków Estonii na obronność
  - deklarował Premier Estonii Kristen Michal. Kraje położone na flance wschodniej
  ponoszą największy ciężar inwestycji w obronność na rzecz całej Europy. Te kraje
  przeznaczają największą część swojego PKB na obronność, biorąc odpowiedzialność
  za bezpieczeństwo całego regionu. Jeśli spojrzeć na program SAFE, to 76 mld euro
  z tego projektu wykorzystują właśnie kraje flanki wschodniej. To dzieje się w imię
  solidarności całej Europy Na potrzebę zaangażowania i podjęcia wysiłku finansowego
  na rzecz bezpieczeństwa Europy i solidarności wskazali wszyscy uczestnicy spotkania.
  Państwa sygnatariusze przyjęły wspólną deklarację, w której podkreśliły konieczność
  dalszego, szerokiego wsparcia dla Ukrainy – militarnego, finansowego i politycznego
  – oraz poparły jej integrację ze strukturami euroatlantyckimi. Zadeklarowano również
  rozwój wspólnych projektów obronnych, modernizację infrastruktury oraz zwiększanie
  wydatków na bezpieczeństwo. Spotkanie w Gdańsku zakończyło się potwierdzeniem jedności
  i solidarności państw wschodniej flanki oraz pełnego wsparcia ze strony Unii Europejskiej
  dla działań wzmacniających bezpieczeństwo regionu.
