title: Miliardowe inwestycje w sztuczną inteligencję dla polskich szkół
text: Sztuczna inteligencja staje się ważnym elementem polskiego systemu edukacji.
  W odpowiedzi na rosnące znaczenie nowych technologii rząd realizuje program wyposażania
  szkół w nowoczesną infrastrukturę wspierającą rozwój kompetencji cyfrowych uczniów
  i nauczycieli. Laboratoria sztucznej inteligencji to dużo sprzętu, ale przede wszystkim
  ludzie - uczniowie szkół podstawowych i średnich, którzy tego narzędzia będą w przyszłości
  używać w codziennym życiu - powiedział Premier Donald Tusk, podczas wydarzenia organizowanego
  w KPRM. W ramach przedsięwzięcia do szkół podstawowych i ponadpodstawowych w całym
  kraju trafi 12 tysięcy laboratoriów sztucznej inteligencji. Każde laboratorium zostanie
  wyposażone w kompleksowy zestaw urządzeń, obejmujący m.in. laptopy dla uczniów i
  nauczycieli, jednostkę centralną obsługującą usługi AI, urządzenia sieciowe, monitor
  interaktywny, kamerę z mikrofonem oraz specjalistyczne oprogramowanie. Pracownie
  AI powstaną w większości szkół w Polsce. To masywny program, który zmieni sposób
  uczenia, ale w taki sposób, aby uczniowie pozostali sobą - zapowiedziała Ministra
  Edukacji Barbara Nowacka. Dostawy wyposażenia do placówek oświatowych już się rozpoczęły,
  a ich zakończenie planowane jest na drugą połowę lipca bieżącego roku. To gigantyczny
  program cyfryzacji polskich szkół. Wszystkie nasze inwestycje to nie tylko sprzęt,
  ale przede wszystkim inwestycje w kompetencje, wiedzę oraz umiejętności uczniów
  i nauczycieli - mówił Wiceminister Cyfryzacji Paweł Olszewski. Ministerstwo Cyfryzacji
  przeznaczy 1,86 mld zł brutto ze środków Krajowego Planu Odbudowy oraz budżetu państwa
  na wyposażenie szkół w laboratoria sztucznej inteligencji. Łączna wartość środków
  przeznaczonych na cyfryzację oświaty w latach 2024–2026 w ramach KPO wynosi ponad
  5 mld zł. Szef rządu zaznaczył, że ważne staje się przygotowanie obywateli do świadomego
  i odpowiedzialnego korzystania z narzędzi opartych na sztucznej inteligencji. Wskazał
  również, że w debacie publicznej coraz częściej poruszany jest temat rosnącej autonomii
  systemów AI i ich wpływu na podejmowane przez ludzi decyzje. Najważniejszym zadaniem
  dla młodego pokolenia będzie nie lekceważyć zagrożeń, jakie daje sztuczna inteligencja
  oraz mieć poczucie suwerenności wobec narzędzi, których używają Zaapelował do nauczycieli,
  by uczyli mądrego stosowania sztucznej inteligencji. Skuteczność wdrożenia AI zależy
  również od ich kompetencji, dlatego od jesieni 2025 r. realizowane są systemowe
  szkolenia (m.in. w ramach programów Funduszy Europejskich dla Rozwoju Społecznego),
  min. dla 13 tysięcy nauczycieli szkół podstawowych i ponadpodstawowych. To wydaje
  mi się absolutnie ważne. To wy macie nią rządzić, nie ona wami. Mam nadzieję, że
  powinno być to zdrową ambicją każdej i każdego z Was - zwrócił się do biorących
  udział w wydarzeniu uczniów. Premier Donald Tusk podkreślił jednocześnie, że systemy
  sztucznej inteligencji nie zawsze są całkowicie neutralne i obiektywne. Dlatego
  tak ważne staje się ma rozwijanie umiejętności krytycznej oceny generowanych przez
  nie treści.
