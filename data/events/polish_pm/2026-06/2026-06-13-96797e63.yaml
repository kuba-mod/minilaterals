title: „Nasza Kolej” - Łomża wraca na kolejową mapę Polski
text: 'Przywrócenie połączenia kolejowego do Łomży realizuje rządowy program przeciwdziałania
  wykluczeniu komunikacyjnemu. Celem jest zapewnienie dostępu do połączeń dalekobieżnych
  mieszkańcom wszystkich powiatów w Polsce. Łomża nie jest wyjątkiem, jest symbolem
  nowej reguły – przywracamy połączenia kolejowe w wielu miejscowościach Polska realizuje
  dziś największy program inwestycji kolejowych w Europie. Do 2032 roku wydamy 180
  mld zł na rozwój kolei, w tym 18 mld zł na nowoczesne pociągi produkowane w naszym
  kraju Dzięki tym inwestycjom ułatwiamy codzienne życie mieszkańcom Polski. Kolej
  ma być do dyspozycji wszystkich, którzy chcą się przemieszczać – czy to między małymi
  miejscowościami, czy do stolicy. Będzie łatwiej, szybciej, nowocześniej i bezpieczniej
  Rząd konsekwentnie rozwija polską kolej, traktując ją jako jeden z filarów nowoczesnego
  transportu publicznego. Inwestujemy w budowę nowych linii kolejowych, nowe dworce,
  remont stacji, cyfryzację kolei oraz nowoczesny tabor. Wszystko po to, aby odpowiedzieć
  na zapotrzebowanie Polaków, którzy chcą jeździć koleją – podkreślił Minister Infrastruktury
  Dariusz Klimczak. Renesans polskiej kolei trwa – od 14 czerwca na tory wyjedzie
  560 pociągów dziennie, o 46 więcej niż rok temu i o 129 więcej niż w 2023 roku.
  Coraz więcej Polek i Polaków wybiera kolej: w 2025 roku przewiozła ona 439 mln pasażerów,
  czyli o 65 mln więcej niż dwa lata wcześniej. Więcej informacji o tym, jak zmienia
  się polska kolej i jakie inwestycje realizujemy w całym kraju jest dostępnych na
  stronie naszakolej.gov.pl .'
