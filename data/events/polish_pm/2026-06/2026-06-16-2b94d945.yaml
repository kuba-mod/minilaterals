title: „Polska Inwestuje” - jesteśmy miejscem stabilnym i przewidywalnym dla inwestorów
text: 'Polska umacnia swoją pozycję jako jedno z najbardziej korzystnych miejsc do
  inwestowania w Europie. Potwierdza to rosnące zainteresowanie Polską zarówno krajowych
  przedsiębiorców, jak i inwestorów zagranicznych. Źródłem mojego optymizmu jest fakt,
  że Polska staje się z miesiąca na miesiąc coraz bardziej atrakcyjnym miejscem wartym
  inwestowania - powiedział Premier Donald Tusk podczas wydarzenia na Giełdzie Papierów
  Wartościowych w Warszawie. Mimo napiętej sytuacji geopolitycznej i trwającej wojny
  w Ukrainie, Polska pozostaje atrakcyjnym kierunkiem dla inwestorów. To również dowód
  na skalę przemian, jakie zaszły w Polsce w ostatnich dekadach. Przez minione 37
  lat rozwijamy się niemal najszybciej na świecie. Jesteśmy w tej chwili szóstą największą
  gospodarką Unii Europejskiej. Uczestniczymy w pracach grupy G20. Prognozy międzynarodowych
  instytucji mówią jednoznacznie, jasno: Polska w tym i w kolejnym roku będzie należała
  do liderów wzrostu gospodarczego. Właśnie dlatego nie możemy spocząć na laurach
  - wyjaśniał Minister Finansów i Gospodarki Andrzej Domański. Wzrost gospodarczy
  wymaga ciągłego wzmacniania fundamentów rozwoju poprzez inwestycje, modernizację
  państwa oraz tworzenie warunków sprzyjających dalszej ekspansji gospodarki. Zdaniem
  Ministra Finansów decyzje te powinny być podejmowane właśnie w okresach dobrej koniunktury,
  aby zapewnić stabilny rozwój w kolejnych dekadach. Rząd rozpoczął już ten proces,
  realizując m.in. szeroko zakrojony program deregulacyjny przygotowany we współpracy
  ze środowiskiem przedsiębiorców. Minister A. Domański wskazał pięć kluczowych obszarów,
  na których rząd będzie koncentrował swoje działania. Są to deregulacja, transformacja
  energetyczna, wzmocnienie Polskiej Strefy Inwestycji, a także projekt KUKE 2.0 stanowiący
  rozszerzenie programu gwarancyjnego, oraz Accelerate.pl (program budowy nowej generacji
  polskich startupów). Dziś na warszawskiej giełdzie zadebiutowała Lumina Metals,
  kanadyjska spółka, która od 2011 r. prowadzi w Polsce projekty poszukiwawcze złóż
  miedzi i srebra. Flagowym projektem spółki jest budowa kopalni „Nowa Sól”, zlokalizowanej
  w województwie lubuskim, w północnej części Legnicko-Głogowskiego Okręgu Miedziowego.
  Ponad 20 miliardów złotych zostanie zainwestowane w województwie lubuskim w wydobycie
  miedzi. To duża inwestycja na kilkadziesiąt lat Projekt znajduje się obecnie na
  etapie przygotowawczym i uzyskiwania niezbędnych pozwoleń. Spółka zwraca uwagę nie
  tylko na aspekty biznesowe, lecz także na społeczne korzyści płynące z realizowanej
  inwestycji – stąd idea Lubuskiego Funduszu Młodego Pokolenia. Ważne dla mnie było
  to, żeby młodzi ludzie, dzisiaj dzieci, w tym województwie czuły, że są współgospodarzami
  tego projektu. Ci wszyscy, którzy będą przed 18. rokiem życia, wtedy, kiedy kopalnia
  w Nowej Soli ruszy, będą uczestnikami tego funduszu. Te pieniądze przydadzą się
  dla ich rozwoju W perspektywie najbliższych pięciu lat Lumina Metals deklaruje inwestycje
  w Polsce o wartości około 1 mld zł. Zachęcamy wszystkich inwestorów w Polsce do
  budowania synergii między społecznością lokalną a inwestorem. To miejsca pracy,
  rozwój państwa oraz sukces i szansa dla młodych ludzi Lubuski Fundusz Młodego Pokolenia
  wpisuje się również w ideę repolonizacji gospodarki i inwestycji. Chodzi nie tylko
  o udział krajowego kapitału, ale także o aktywne włączenie lokalnych społeczności
  – w tym młodego pokolenia – w proces tworzenia i czerpania korzyści z rozwoju gospodarczego.
  Rząd zakończył prace nad rekomendacjami dla polskich firm, które są związane z Local
  Content. Dzisiaj zakończyliśmy tworzenie rekomendacji dla polskich firm związanych
  z Local Content. Cieszę się, że repolonizacja staje się faktem Po raz pierwszy Polska
  wdraża tak kompleksowy pakiet rozwiązań obejmujących kwestie prawne, gospodarcze
  i etyczne. Przez lata zbyt mało polskich firm prywatnych uczestniczyło w procesie
  realizacji zamówień publicznych. Dlatego m.in. wdrożyliśmy nową politykę zakupową
  państwa, wprowadziliśmy test MŚP, wspieramy krótsze terminy płatności oraz zaliczkowanie
  zamówień. To ważne, bo rynek zamówień publicznych ma ogromną skalę. Mówimy o kwocie
  600 mld zł w skali roku Działania podejmowane przez rząd nie zniechęcają zagranicznych
  inwestorów, lecz wręcz zwiększają ich zainteresowanie polskim rynkiem. Polska przestała
  być prostą montownią. Co innego przyciąga inwestorów - na pierwszym miejscu jest
  to wielkie przekonanie, że młode pokolenie Polek i Polaków to najlepiej wykwalifikowana
  kadra Decyzje inwestorów o lokowaniu kapitału w Polsce są efektem racjonalnej oceny
  potencjału kraju. Sukces ten jest rezultatem wysiłku całego społeczeństwa, a nie
  wyłącznie działań instytucji państwowych. Za to chciałem wszystkim rodakom podziękować,
  że doprowadziliście do tego miejsca, w którym z taką satysfakcją o atrakcyjności
  Polski mówimy i słyszymy w każdym zakątku świata Premier wskazał na szereg zagranicznych
  inwestycji realizowanych w Polsce jako dowód na atrakcyjność krajowej gospodarki.
  Wśród nich wymienił południowokoreańską firmę Kumo, która zapowiedziała uruchomienie
  produkcji w Polsce w ramach projektu wartego 600 mln euro. Zwrócił też uwagę na
  inwestycję Ryanaira o wartości 270 mln euro, obejmującą budowę centrum serwisowania
  silników lotniczych, którego uruchomienie planowane jest na 2028 rok. Wśród nowych
  przedsięwzięć znalazła się inwestycja Solarisa – wspólny projekt polsko-hiszpański
  w Środzie Wielkopolskiej wart 46 mln euro. Premier zapowiedział, że jesienią ma
  zostać sfinalizowane porozumienie między ElectroMobility Poland a tajwańskim Foxconnem
  dotyczące budowy w Jaworznie dużego hubu elektromobilności. W ramach inwestycji
  powstaną trzy modele samochodów elektrycznych.'
