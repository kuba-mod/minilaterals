title: 15 tysięcy dzieci urodzonych dzięki rządowemu programowi in vitro
text: W Kancelarii Prezesa Rady Ministrów odbyły się wyjątkowe urodziny – drugie urodziny
  programu in vitro, podczas których gościliśmy rodziców i dzieci, które przyszły
  na świat dzięki rządowemu programowi. Wydarzenie było okazją do podsumowania dwóch
  lat funkcjonowania programu przywróconego przez obecny rząd. To jest jeden z najpiękniejszych
  Dni Dziecka z dziećmi, które były upragnionym skarbem dla Was wszystkich – zwrócił
  się Premier Donald Tusk do rodziców odwiedzających KPRM. W Polsce z niepłodnością
  mierzy się nawet 1,5 mln par. Program in vitro stanowi realne wsparcie dla tych
  osób oraz ważny element polityki prorodzinnej państwa. Już 40 tys. par jest objętych
  programem in vitro. Zwiększamy też finansowanie na realizację programu z 500 mln
  na 600 mln zł rocznie – poinformowała Minister Zdrowia Jolanta Sobierańska-Grenda.
  Zwiększenie finansowania pozwoli objąć wsparciem kolejne pary marzące o dziecku
  oraz zapewnić stabilność funkcjonowania programu w kolejnych latach. Podczas poprzedniej
  edycji programu (2013–2016), na świat przyszło 22 365 dzieci – tyle, ile liczy średniej
  wielkości polskie miasto. Polityka rodzinna i wsparcie dla rodziców mają fundamentalne
  znaczenie dla przyszłości kraju. Chcę podkreślić, jak ważne jest, abyśmy wszyscy
  mobilizowali nasze siły, aby w Polsce było jak najwięcej dzieci. Żeby były bezpieczne
  i rodzice mieli poczucie bezpieczeństwa materialnego. Od tego zależy nasza przyszłość
  Odpowiedzialność państwa nie kończy się na wsparciu przy narodzinach dziecka. Obejmuje
  ono zarówno wsparcie finansowe, jak i rozwój usług publicznych oraz dostęp do opieki
  zdrowotnej. Naszym zadaniem jest zapewnienie tym maluchom bezpieczeństwa – granic
  państwa, materialnego, żłobków i możliwość opieki. Pracujemy nad tym każdego dnia
  Program in vitro jest częścią szerszej polityki wspierania rodzin realizowanej przez
  rząd. Czujemy obowiązek, aby stwarzać rodzicom możliwość łączenia aktywności zawodowej
  z rodzicielstwem. Dlatego powstało „babciowe”, aby ułatwiać codzienność młodym rodzinom
  – podkreśliła Wiceminister Rodziny, Pracy i Polityki społecznej Aleksandra Gajewska.
  W ramach programu „Aktywny Rodzic” rodzice mogą otrzymać nawet 1500 zł miesięcznie
  na organizację opieki nad dzieckiem do 3. roku życia. Dzięki działaniom rządu 388
  gmin zyskało dostęp do żłobków, a w całym kraju powstało już 45 tys. nowych miejsc
  opieki dla najmłodszych. Zmodernizowano również 918 placów zabaw przy żłobkach.
  Rząd zwiększył także świadczenie wychowawcze z 500 do 800 zł oraz uprościł procedury
  jego przyznawania.
