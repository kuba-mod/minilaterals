title: Chronimy dzieci przed uzależnieniem od smartfonów i szkodliwymi treściami w
  sieci
text: Rada Ministrów przyjęła dziś projekt nowych przepisów w prawie oświatowym, które
  ograniczają możliwość korzystania z telefonów komórkowych w szkołach podstawowych.
  Rozwiązanie jest odpowiedzią na rosnący problem uzależnienia dzieci od urządzeń
  cyfrowych oraz pogarszającej się koncentracji, relacji społecznych i zdrowia psychicznego
  uczniów. Będziemy budowali synergię między rodzicami, nauczycielami i uczniami oraz
  tłumaczyć, że walczymy z cywilizacyjnym problemem uzależnienia od internetu, telefonów.
  Musimy mieć świadomość, że robimy to dla dobra młodych Polek i Polaków - powiedział
  Premier Donald Tusk przed posiedzeniem Rady Ministrów. Badania wskazują na rosnące
  uzależnienia od telefonu, platform społecznościowych oraz na słabnące relacje międzyludzkie
  młodego pokolenia. Wiemy, że to może mieć fatalne skutki cywilizacyjne dla naszych
  dzieci, młodych ludzi i dla państwa. Będę bardzo prosił o wzajemną życzliwość w
  czasie prac w Sejmie. Takie zrozumienie, że robimy to dla dobra przede wszystkim
  młodych Polek i Polaków Nowe przepisy mają służyć przede wszystkim ochronie dzieci
  i wspierać rodziców oraz nauczycieli w wychowaniu młodego pokolenia. Jesteśmy przekonani,
  że rodzice i nauczyciele solidarnie powinni mieć narzędzie do ochrony dzieci, z
  wyjątkami Projekt nowelizacji ustawy przewiduje wyjątki od zakazu korzystania z
  telefonów m.in. w sytuacji, gdy uczeń korzysta z nich ze względów zdrowotnych np.
  monitorowania stanu zdrowia, w sytuacji pilnego kontaktu ucznia z rodzicami lub
  urządzenie jest potrzebne do realizacji zajęć lub sprawdzenia wiedzy. Rząd przyjął
  również projekt ustawy o ochronie małoletnich przed dostępem do treści pornograficznych
  w internecie. Nowe przepisy zobowiążą dostawców usług cyfrowych do stosowania skutecznych
  metod weryfikacji wieku użytkowników. Chcemy wszyscy chronić nasze dzieci i młodych
  ludzi, ale szczególnie najmłodszych, przed szkodliwymi treściami, które czynią spustoszenie
  w ich umysłach i emocjach. Musimy zrobić wszystko, żeby to było skuteczne Przyjęte
  rozwiązania mają zapewnić realną ochronę małoletnich oraz zwiększyć odpowiedzialność
  platform i dostawców usług cyfrowych za bezpieczeństwo najmłodszych użytkowników
  internetu. Chodzi nam nie o cenzurę, ale o to, żeby mieć narzędzia, które pozwolą
  nam panować nad tą cyfrową rzeczywistością, tak, aby młodzi nie padli ofiarą niepożądanych
  treści Zmiany mają pomóc rodzicom, nauczycielom i szkołom skuteczniej reagować na
  wyzwania związane z nadmiernym korzystaniem z urządzeń elektronicznych oraz zagrożeniami
  obecnymi w internecie. Dzięki temu dzieci będą mogły korzystać z nowych technologii
  w sposób bezpieczniejszy i bardziej odpowiedzialny.
