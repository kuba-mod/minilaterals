title: Compte rendu du conseil des ministres du 10 juin 2026.
text: 'Retrouvez le compte rendu du conseil des ministres du mercredi 10 juin 2026.
  Le ministre de l’économie, des finances et de la souveraineté industrielle, énergétique
  et numérique a présenté une ordonnance portant extension ou adaptation de diverses
  dispositions du code monétaire et financier dans les collectivités de l’article
  74 de la Constitution et en Nouvelle-Calédonie. Ce texte a pour objet de rendre
  applicables un certain nombre de dispositions législatives du code monétaire et
  financier déjà en vigueur en métropole et dans les collectivités ultramarines régies
  par l’article 73 de Constitution. Il rend possible la fourniture d''espèces par
  un commerçant dans le cadre d''une opération de paiement pour l''achat de biens
  ou de services (opération dite « cash back ») en Nouvelle-Calédonie, en Polynésie
  française et dans les îles Wallis et Futuna, archipels dans lesquels l’accès aux
  espèces peut être difficile du fait de leur configuration géographique. Il autorise
  l''émission de monnaies complémentaires locales en Nouvelle-Calédonie en complément
  de sa loi du Pays du 18 août 2025 relative à l’économie sociale et solidaire et
  en Polynésie française. Il met à jour le dispositif relatif aux investissements
  directs étrangers, aux intermédiaires habilités à administrer et à conserver des
  titres financiers se trouvant en redressement ou en liquidation judiciaires. L’ordonnance
  étend, dans les collectivités de l’Atlantique et du Pacifique, le régime des infractions
  et des sanctions concernant les frais bancaires de clients décédés. Le dispositif
  sur la lutte contre le blanchiment des capitaux et le financement du terrorisme
  est notamment complété par des obligations de vigilance à l’égard de la clientèle.
  L’encadrement de l''influence commerciale et la lutte contre les dérives des influenceurs
  sur les réseaux sociaux, comme les offres d''investissement en ligne, sont rendus
  applicables dans le Pacifique. L’ordonnance n° 2025-1091 du 19 novembre 2025 portant
  réécriture du code de procédure pénale a réorganisé le code de procédure pénale
  et a harmonisé ses dispositions. Son article 28 procède au remplacement des anciennes
  références au code de procédure pénale figurant dans le code monétaire et financier
  par les nouvelles références. La présente ordonnance étend ces modifications en
  Nouvelle-Calédonie, en Polynésie français et dans les îles Wallis et Futuna. La
  ministre des outre-mer et la ministre de l’aménagement du territoire et de la décentralisation
  ont présenté une ordonnance portant extension et adaptation aux collectivités relevant
  de l’article 74 de la Constitution et à la Nouvelle-Calédonie des dispositions de
  la loi n° 2025-1249 du 22 décembre 2025 portant création d’un statut de l’élu local.
  Afin que les collectivités relevant de l’article 74 de la Constitution et la Nouvelle-Calédonie
  puissent bénéficier des évolutions offertes par la loi du 22 décembre 2025, le législateur
  a habilité le Gouvernement à y étendre les dispositions utiles. Toutes les collectivités
  ultramarines concernées ont été consultées sur le projet de texte. Le Conseil national
  d’évaluation des normes en a également été saisi et a rendu un avis favorable. L’ambition
  de cette ordonnance est d’étendre les mesures permettant d’améliorer les conditions
  d’exercice des mandats locaux et favoriser l’engagement local, dans le respect des
  compétences des collectivités relevant de l’article 74 de la Constitution et de
  la Nouvelle-Calédonie. Ainsi, la très grande majorité des dispositions du texte
  s’appliquent aux élus communaux et membres des groupements de communes de la Polynésie
  française et de la Nouvelle-Calédonie en leur permettant notamment de concilier
  plus facilement mandat et vie personnelle, de bénéficier d’une augmentation du nombre
  de jours de formation ou de faciliter les conditions d’exercices pour les élus en
  situation de handicap. L’ordonnance prévoit également, dans une moindre mesure,
  des dispositions applicables dans les îles Wallis et Futuna ainsi qu’aux élus des
  collectivités de Saint-Barthélemy, de Saint-Martin et de Saint-Pierre-et-Miquelon.
  Par cette ordonnance, le Gouvernement assure l’application des avancées prévues
  par la loi du 22 décembre 2025 dans les collectivités concernées, dans des conditions
  adaptées à leur organisation institutionnelle et à leurs compétences. Le conseil
  des ministres a adopté les mesures individuelles suivantes : Sur proposition du
  Premier ministre et du ministre de l’action et des comptes publics : - M. Pierre
  BOUILLON, administrateur de la Ville de Paris, est nommé délégué interministériel
  à la transformation publique, à compter du 24 juin 2026 ; - M. Walter ARNAUD, ingénieur
  général de l''armement, est nommé directeur interministériel du numérique, à compter
  du 24 juin 2026. Sur proposition du ministre de l''économie, des finances et de
  la souveraineté industrielle, énergétique et numérique : - Mme Fabienne LEBRETON
  est nommée membre du conseil général de la Banque de France. Sur proposition du
  ministre de l’éducation nationale et du ministre de l’enseignement supérieur, de
  la recherche et de l’espace : - M. Raphaël MULLER, conseiller référendaire à la
  Cour des comptes, est nommé recteur de la région académique Pays de la Loire, recteur
  de l’académie de Nantes, à compter du 22 juin 2026. Sur proposition de la ministre
  de la culture : - Mme Isabelle CHARDONNIER, administratrice de l’Etat, est nommée
  directrice générale de la démocratie culturelle, des enseignements et de la recherche,
  à compter du 22 juin 2026. Sur proposition du ministre de l’enseignement supérieur,
  de la recherche et de l’espace : - M. Thierry DAUXOIS est nommé président du Centre
  national de la recherche scientifique. Le ministre de l’économie, des finances et
  de la souveraineté industrielle, énergétique et numérique a présenté une ordonnance
  portant extension ou adaptation de diverses dispositions du code monétaire et financier
  dans les collectivités de l’article 74 de la Constitution et en Nouvelle-Calédonie.
