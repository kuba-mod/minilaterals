title: Cérémonie commémorative du 86e anniversaire de l'appel du 18 juin 1940.
text: Le chef de l’État, Protecteur de l’Ordre de la Libération, a présidé la cérémonie
  de commémoration du 86 e anniversaire de l’Appel du 18 juin 1940 au Mont Valérien,
  ce jeudi 18 juin 2026. Le Président de la République a rendu hommage à ceux qui
  se sont battus pour la France et aux compagnons de l’Ordre de la Libération et a
  assisté au ravivage de la vasque de bronze, allumée pour la première fois le 18
  juin 1945 par le général de Gaulle et les 200 compagnons de la Libération.
