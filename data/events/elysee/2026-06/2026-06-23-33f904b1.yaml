date: '2026-06-23'
type: press_release
source_name: elysee
title: Cérémonie d'entrée au Panthéon de Marc Bloch.
text: 'Le chef de l’État a présidé la cérémonie d’entrée au Panthéon de Marc et Simonne
  Bloch le mardi 23 juin 2026. Homme des Lumières entré dans l''armée des ombres,
  historien et Cofondateur de l''École des Annales , Marc Bloch a pensé l''histoire
  comme un éclairage indispensable au temps présent et a incarné l''héritage universaliste
  des Lumières. C''est cet héritage intellectuel et républicain , qu''il porte au
  Panthéon. Combattant de 14, résistant de la première heure, il rejoint les rangs
  de la Résistance et participe aux travaux du réseau mis en place par Jean Moulin
  avant d''être arrêté par la Gestapo et fusillé en juin 1944. Il entre au Panthéon
  aux côtés de Simonne Bloch , qui choisit de le suivre dans son combat et dans son
  destin, et à qui la France rend enfin hommage en lui offrant un lieu de recueillement.
  C''est le courage et l''engagement de deux vies au service de la vérité, de la liberté
  et de la République qui sont ainsi honorés. L’ensemble des Français qui le souhaitent
  peuvent se rendre rue Soufflot, le mardi 23 juin à partir de 18h30, pour assister
  à la cérémonie d’entrée de Marc et Simonne Bloch au Panthéon. Ce 16 juin 1944, au
  crépuscule, dans un champ de la région lyonnaise, les nazis exécutent leurs prisonniers.
  30 hommes de toutes conditions, confessions, opinions. Un menuisier, un syndicaliste,
  un cheminot, des Polonais, des Résistants, des communistes, et parmi eux, un professeur
  d''histoire, Marc Bloch. De la Sorbonne à ce champ où il tomba, Marc Bloch vécut
  ainsi : parmi les Hommes, guidé par la volonté de comprendre leurs vies et de partager
  leurs idéaux. Mort héroïque parce que stoïque. Mort à laquelle il s''était préparé
  pour la France, comme soldat déjà blessé au front, 29 ans plus tôt. Mort dont son
  ami Lucien Febvre dira qu''elle fut « une sainte mort ». Mort infligée parce que
  Marc Bloch a résisté à la barbarie nazie et à son complice, le gouvernement de Vichy.
  Quand l''ennemi occupe la France à partir de juin 1940, quand le gouvernement de
  l''État français aux mains de Pétain et Laval, entre dans la voie de la collaboration,
  le destin de Marc Bloch bascule, comme celui de tous les Juifs. De cœur et de raison
  authentiquement républicain, défenseur ardent et inlassable de la laïcité, Marc
  Bloch endure les conséquences de l''antisémitisme d''État initié par le gouvernement
  du maréchal Pétain. Qu''importent, aux yeux des hommes de Vichy, la vie et l''œuvre
  de Marc Bloch. Pour eux, rien ne compte plus que sa judéité. Il était pourtant de
  Ceux de 14. Croix de guerre. Chevalier de la Légion d''honneur à titre militaire.
  Vétéran de la Campagne de France de 39-40. Réengagé à plus de 50 ans pour défendre
  sa patrie. Historien, normalien, professeur à l''Université de Strasbourg puis à
  la Sorbonne. Fondateur avec Lucien Febvre de l''École des Annales. Auteur des «
  Rois Thaumaturges » ou de « La Société féodale ». Qu''importe cette vie de grandeur
  et de labeur. Les hommes au service de l''État français ne voient en Marc Bloch
  que le juif. Le juif malfaisant, funeste, nocif. Coupable parce que juif. A exclure,
  persécuter et effacer parce que juif. Dès la fin de 1940, Marc Bloch subit comme
  tant de nos compatriotes les conséquences de cette politique menée au nom de la
  France. Et sa famille avec lui. Infernal enchaînement. Il est exclu de l''université
  au bout d''un processus bureaucratique inique. Ses traitements et pensions sont
  supprimés, ses comptes bancaires bloqués. Son appartement parisien réquisitionné.
  Il est alors obligé de quitter avec les siens la zone nord occupée par les nazis.
  Ne pouvant plus partir pour l''Amérique, tous se réfugient en zone sud qui n''a
  de « libre » que le nom. De là, Marc Bloch, qui se proclame « juif qui ne se cache
  pas », se bat comme il peut contre ce régime, où l''antisémitisme est d''État après
  l''adoption des deux statuts des Juifs et la loi de juillet 1941. Marc Bloch mène
  alors une première bataille contre Vichy et les nazis. Devenu nomade, entre sa maison
  de Fougères, Montpellier et Lyon, il lui faut sauver sa bibliothèque. Oui, sa bibliothèque,
  que le Gouvernement de Vichy, comme l’occupant, veulent lui confisquer. 5 000 livres,
  patiemment rassemblés par Marc Bloch tout au long de sa vie. Livres de l''étudiant,
  du professeur, du Républicain. 5 000 livres qui disent la vérité d''un homme, son
  amour de la littérature, son appétit de savoir, sa soif de transmettre. Alors, Marc
  Bloch résiste à cette persécution inepte, ne veut pas renoncer à ses livres, à sa
  vie, à ce qui donne sens à son existence. Alors il se bat. Demande à Lucien Febvre
  d''activer tous les réseaux possibles, sollicite Fernand de Brinon, représentant
  de Vichy en zone occupée, écrit à Jérôme Carcopino, ancien élève de son père, désormais
  au service de Pétain. On lui a tout pris, mais au moins qu''on lui laisse ses livres.
  Il ne demande rien d''autre pour lui, pour ses enfants. Mais non, rien n''y fait.
  La lâcheté des uns et la méchanceté des autres se conjuguent. L''antisémitisme lui
  a volé son métier, son appartement, son argent. Il faut qu''il lui vole aussi ses
  livres. Ces derniers sont expédiés en Allemagne, dispersés. Et pour beaucoup perdus.
  Dans la France de la collaboration, avide de prendre sa revanche sur l''affaire
  Dreyfus, le cas de Marc Bloch montre que dès qu''il faut s''en prendre à un Juif,
  il se trouve toujours un préfet pour réquisitionner. Un policier pour perquisitionner.
  Un juge pour condamner. Un universitaire pour justifier. Un journaliste pour approuver.
  Un voisin pour dénoncer. Et tant d''autres pour détourner le regard. Tout cela s''est
  passé. Et s''est mise en place une mécanique idéologique de haine conjuguée à une
  épidémie de lâcheté. Dans le même temps, ils furent quelques-uns pour rallumer les
  braises de ce que nous sommes, et sauver l''honneur et l''âme de la France avant
  d''en hâter la victoire. Oui, quelques-uns, auxquels nous nous raccrochons. Un préfet.
  Jean Moulin organise l''armée secrète au nom de De Gaulle. Un policier. Achille
  Peretti, fonde le réseau Ajax. Un juge. Paul Didier, refuse de prêter serment à
  Pétain. Un professeur agrégé de droit. Pierre-Henri Teitgen, entre dans le réseau
  qui va devenir Combat. Un journaliste. Pierre Dac, moque les collaborateurs sur
  les ondes de Radio Londres. Une psychiatre. Adélaïde Hautval, est déportée à Auschwitz
  pour avoir défendu des juifs molestés dans la rue et deviendra Juste parmi les Nations.
  Et 1 038 garçons « sans attache » choisissent de rejoindre la France Libre pour
  y gagner le plus beau des titres de noblesse en République : Compagnon de la Libération.
  Marc Bloch s''inscrit dans cette chaîne humaine salutaire. Lui, l''héritier des
  Lumières, ancien combattant des deux guerres, choisit à son tour l''armée des ombres.
  Le voici. À Lyon, réseau Franc-Tireur recruté à 57 ans par Maurice Pessis, un gamin
  de 20 ans. « C''est moi le poulain de Maurice », lâche-t-il dès la première rencontre
  avec ses camarades, fidèle à cet humour pince-sans-rire dont il ne s''est jamais
  départi. Le voici, rebaptisé « Maurice Blanchard », « Monsieur Rolin » ou de ses
  alias de Résistant : « Chevreuse » ou « Narbonne ». Le voici, siégeant dans le Comité
  des experts créé par Jean Moulin aux côtés d''Henri Frenay, François de Menthon,
  Alexandre Parodi, Michel Debré et tant d''autres. Ensemble, ils pensent le destin
  de la France libérée. Le voici dirigeant régional des Mouvements unis de Résistance.
  Le voici, conscient des risques qu''il prend en s''exposant de la sorte, mais aussi
  sa famille, son épouse Simonne et leurs enfants. Le voici arrêté ce 8 mars 1944
  sur le pont de la Boucle, à Lyon, par des Français membres de cette Gestapo dont
  le chef est Klaus Barbie. Le voici enfermé à Montluc, comme Jean Moulin avant lui.
  Prisonnier de Francis André, dit « gueule tordue », et de sa bande de collaborateurs
  voleurs et tortionnaires. Torturé, passé sept fois au supplice de la baignoire,
  ne donnant que des noms connus pour être déjà à Londres en sécurité, préservant
  la vie de tous les autres. Professeur d''espoir aussi, encore et toujours. Dans
  la prison de Montluc, Marc Bloch, frappé, torturé, supplicié est ce prisonnier qui
  demeure calme, souriant et gai. Oui, gai. « Il nous encourageait », raconte l''un
  de ses compagnons de captivité, « il nous ranimait, nous parlait de la France, de
  son passé et ne désespérait jamais ». Livré aux nazis et assassiné avec ses compagnons,
  au soir du 16 juin 1944, Marc Bloch est présenté par la propagande de Vichy comme
  terroriste parce que Juif. Sa mort est même revendiquée par le chef de la Milice,
  Joseph Darnand, terrible aveu qui marque alors la volonté des derniers fidèles de
  Vichy d''entraîner le pays dans la guerre civile alors même que la défaite du nazisme
  et la chute du gouvernement de Vichy est inéluctable. Disons-le ici : voilà où mène
  inévitablement l''antisémitisme, dès lors que quiconque s''engage sur ce chemin
  de ténèbres. Confronté à ce cauchemar, la grandeur de Marc Bloch est cependant de
  n''avoir jamais désespéré de la France et du peuple Français. La résistance de Marc
  Bloch est aussi de pensée et d''écriture. Puisqu''il est historien et que l''Histoire
  est un combat. Puisque Vichy lui a volé ses livres, le voici qui en écrit de nouveaux.
  Deux livres de combat, deux livres de résistance : « Apologie pour l''histoire »
  et « L''Etrange défaite ». Marc Bloch dédicace ainsi à Lucien Febvre son « Apologie
  de l''histoire » : « nous sommes les vaincus provisoires d''une injuste défaite
  ». Tout Marc Bloch est là, dans ces quelques mots. L''historien n''a pas vocation
  à contempler le passé pour déplorer ce qui n''est plus. Son devoir est au contraire
  d''entrer dans l''action au nom du passé. « Je croyais à l''avenir parce que je
  l''écrivais moi-même », dira-t-il plus tard. Ainsi naît « L''Etrange défaite »,
  essai d''histoire du temps présent pour tous les lendemains à venir. Il y ausculte
  les plaies de la patrie vaincue et les multiples causes politiques, militaires,
  morales de l''humiliation de 1940. Bloch prodigue des enseignements qui nous obligent
  encore et pointe les raisons qui ont mené la France heureuse du Front populaire
  de l''été 36 au désastre du printemps 40. La perte de toute force morale de la Nation.
  A commencer par ses élites qui cédèrent à l''esprit de défaite par détestation des
  élans du peuple français. Marc Bloch est sévère avec les dirigeants des gouvernements
  Blum qui n''ont pas vu le pire advenir, mais il l''est encore plus et surtout avec
  ces Français d''influence et de pouvoir qui, de fait, préféraient admirer Hitler
  plutôt que le Front populaire. Qui doutaient de la France, la voyaient déjà décadente,
  au fond, n''y croyaient plus. L''esprit de défaite, sans cesse entretenu par ceux
  qui se proclament plus Français que vous. Ce sont toujours les premiers à sacrifier
  la France aux intérêts de puissances hostiles. Les premiers à la renier. Les premiers
  à la trahir. Premiers à sacrifier à leurs intérêts un peuple libre, peuple qu''au
  plus profond d''eux-mêmes, ils n''aiment pas. Ainsi persiste encore et toujours
  cet esprit de défaite indissociable de l''esprit de Vichy, poison lent de notre
  vie publique et qu''il faut combattre inlassablement. Esprit qui prétend sauver
  la France en l''écartant de nos principes de liberté, d''égalité et de fraternité.
  Fascination pour la force brute d''esprits faibles qui s''étaient fatigués de la
  complexité du monde, manquaient de caractère et ne croyaient plus dans le peuple
  français. Intellectuel intranquille, Marc Bloch est pour nous ce testament permanent.
  Testament de vie, car Marc Bloch est inséparable de Simonne, son amour, son éternelle
  victoire, sans qui il n''aurait pu accomplir son œuvre. Inséparable de la bravoure
  des siens : Alice, engagée dans le secours aux enfants. Étienne, Louis et Daniel
  entrés en Résistance, quand les deux cadets Jean-Paul et Suzanne vivent les épreuves
  du temps. La flamme aussi de la République chez ses petits-enfants et arrière-petits-enfants.
  Marc Bloch, affaire de famille, famille de devoirs, de pensée et d''action. Testament
  de savoir et de science aussi. Sa bibliothèque a été dispersée par les nazis, mais
  ce sont bien les graines de son génie européen qui ont essaimé et enfanté d''autres
  savants, comme lui attachés à notre civilisation de liberté, jusqu''à Carlo Ginzburg
  disparu voilà quelques jours. Testament pour l''historien aussi. « Papa, à quoi
  sert l''histoire ? », selon la phrase qu''il place au début de son Apologie. Pour
  Marc Bloch, l''Histoire sert à chercher la vérité et à trouver la liberté. Inspiré
  par son père, lui-même professeur d''histoire antique, et son frère médecin, Marc
  Bloch a placé la méthode scientifique au cœur de sa discipline, le rapport au fait,
  la construction de la vérité, mais aussi l''étude des sociétés humaines dans les
  rapports sociaux et religieux comme dans les imaginaires. « L''histoire est la science
  des hommes dans le temps », écrit-il. Elle n''est pas une succession d''événements
  bruts, initiés par des individus, aussi exceptionnels soient-ils parfois, mais une
  construction de temps long. Marc Bloch entend lire le passé aussi dans les mentalités
  des peuples. Pour ce médiéviste, les croyances du paysan de la France féodale comptent
  autant que les gestes du Roi de France. S''il est des Rois thaumaturges qui guérissent
  par miracle et que le peuple accepte de croire à cette légende, il est indispensable
  de comprendre les ressorts de cette relation entre roi et peuple. Le métier de l''historien
  est de configurer, contextualiser, interpréter ce qui doit devenir vérité scientifiquement
  éprouvée. C''est là, dans les « façons de sentir et penser » de chacun, dans l''exploration
  de ce que Lucien Febvre nomme « l''outillage mental », que se trouve le chemin qui
  mène à la vérité dans l''Histoire. Vérité bâtie sur les traces, les faits, les analyses.
  Vérité qui se polit dans l''historiographie. Dilexit veritatem : il a chéri la vérité.
  Épitaphe et boussole, idéal démocratique qui rejoint le métier de l''historien.
  Ainsi Marc Bloch lie-t-il France et Histoire, République et science, Gouvernement
  et Raison. Cette méthode et ce lien sont aujourd''hui encore les meilleurs antidotes
  contre les poisons de la révision historique qu''un peu partout nous revoyons poindre.
  Oui, pour Marc Bloch, adolescent au temps de l''affaire Dreyfus, la République organise
  la confrontation respectueuse des faits, des idées, donne sa place à la science
  et à la justice, libère de la dépendance aux croyances faciles et de la crédulité
  aux fausses nouvelles. L''intégrité intellectuelle ne va jamais sans force morale
  ni sans courage physique. Deux fronts d''une même guerre pour la vérité : science
  et Résistance. Testament d''un professeur, enfin. Fils de professeur, Marc Bloch
  ne cessa jamais d''enseigner. N''importe où, à l''université de Strasbourg comme
  dans la prison de Montluc. C''est comme s''il montait sur l''estrade, donnant à
  tous un cours simple, sans jargon, à hauteur d''intelligence, optimiste toujours.
  « Je crois aux jeunes », disait-il. Oui, être professeur d''histoire est ce plébiscite
  de chaque jour à notre jeunesse et à la force d''un nouveau printemps. Testament
  permanent qu''il ne finit pas de nous léguer. Ainsi Marc Bloch entre-t-il au Panthéon,
  vivant, là, devant nous. Et son legs devient nôtre, formulé avec ses propres mots :
  « La France demeurera, quoi qu''il arrive, la patrie dont je ne saurais déraciner
  mon cœur. J''y suis né, j''ai bu aux sources de sa culture, j''ai fait mien son
  passé, je ne respire bien que sous son ciel et je me suis efforcé, à mon tour, de
  la défendre de mon mieux. » Vive Marc Bloch, vive Simonne Bloch, vive la République,
  vive la France ! Ce 16 juin 1944, au crépuscule, dans un champ de la région lyonnaise,
  les nazis exécutent leurs prisonniers. 30 hommes de toutes conditions, confessions,
