title: Disparition de Marjane Satrapi.
text: 'Artiste, auteure de bande dessinée, réalisatrice, Marjane Satrapi avait conquis
  un public mondial avec « Persépolis ». Sa disparition est celle d’une figure de
  la culture française et d’une artiste éprise de liberté, dont l’œuvre portait un
  message universel et lui avait valu une immense notoriété internationale. Née le
  22 novembre 1969 en Iran, Marjane Satrapi grandit à Téhéran dans une famille de
  sympathisants communistes. Elle fut témoin très tôt de la répression du régime du
  Shah. A quatorze ans, Marjane Satrapi fut envoyée par ses parents à Vienne où elle
  étudia au lycée français. Elle revint en 1988 à Téhéran pour obtenir son diplôme
  à l’école des Beaux-Arts de Téhéran, puis repartit pour suivre la scolarité de l’Ecole
  supérieure des Arts décoratifs de Strasbourg. Elle s’installa bientôt à Paris, où
  elle fut intégrée à l’atelier des Vosges dans lequel passait toute une nouvelle
  génération de talents, de Christophe Blain à Joann Sfar. En 2000, Marjane Satrapi
  commença la publication de « Persepolis ». En noir et blanc, défilaient les épisodes
  d’une enfance mêlée à la grande histoire contemporaine de l’Iran : la révolution
  de 1979, la prise d’otages de l’ambassade américaine, l’emprise des pasdaran, le
  fondamentalisme, l’exil de la jeune Marjane, le racisme subi en Autriche, les difficultés
  de l’intégration, l’initiation à l’anarchisme, les malheurs du cœur, la dépression,
  le retour en Iran après la guerre contre l’Irak. Avec son œil d’enfant, son ironie,
  sa tendresse, ses démons intérieurs, l’auteure créa un monde bouleversant dans lequel
  s’identifièrent les lecteurs. C’était aussi le déploiement d’une histoire intime
  et douloureuse aux proportions du destin du peuple iranien. « Persepolis » fut dès
  lors un immense succès populaire. Marjane Satrapi, devenue une voix universelle,
  publia ensuite « Broderies » en 2003, fresque sur le quotidien des femmes iraniennes,
  puis « Poulet aux prunes », sur la tragédie du grand-oncle de l’auteur, musicien
  qui décide de se laisser mourir après la casse de son târ, instrument traditionnel.
  Ce fut ensuite au cinéma que le talent de Marjane Satrapi s’épanouit. En 2007 sortit
  le film « Persepolis », réalisé avec Vincent Paronnaud, qui reçut le Prix du jury
  au Festival de Cannes, puis fut salué par deux Césars. Elle adapta encore « Poulet
  aux prunes » en 2010. Marjane Satrapi se tourna ensuite vers la peinture, réalisant
  des portraits de femmes, montrés dans plusieurs galeries parisiennes, et imaginant
  aussi un triptyque pour les jeux olympiques et paralympiques de Paris 2024, reproduit
  en tapisserie par la Manufacture des Gobelins. Elue à l’Académie des Beaux-Arts,
  Marjane Satrapi porta aussi la cause du peuple iranien et l’étendard du droit des
  femmes. Elle fut engagée dans le mouvement « Femme, vie, liberté », pour lequel
  elle coordonna un roman graphique en soutien aux manifestations en Iran. Le Président
  de la République et son épouse saluent une immense artiste qui avait transformé
  une enfance iranienne en fable universelle. Ils adressent à sa famille, à ses proches,
  à ceux qui l’aimaient, leurs condoléances émues.'
