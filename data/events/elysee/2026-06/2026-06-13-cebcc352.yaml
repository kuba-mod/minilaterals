title: Disparition de David Hockney.
text: Le monde perd un peu de ses couleurs. David Hockney, peintre anglais et l’une
  des plus grandes figures de l’art contemporain, nous a quittés à l’âge de quatre-vingt-huit
  ans. David Hockney vit le jour à Bradford en 1937 ; une enfance plongée dans la
  grisaille fit de lui un jeune homme fasciné par la couleur. Son père, artiste talentueux
  qui avait renoncé à sa passion, l’encourage dans son apprentissage du dessin. Il
  découvrit alors Matisse, Picasso, Francis Bacon, dont la liberté l’inspirera à tracer
  son propre destin d’artiste. Élève au Royal College of Art de Londres, il y refusa
  le dogmatisme de l’art contemporain américain. Il fut d’abord dessinateur de presse,
  vécut en Egypte avant de s’envoler pour Los Angeles. Représentant tour à tour le
  scintillement de l’eau d’une piscine, ou le mouvement d’un corps, il fut le grand
  peintre de l’esthétique californienne. Figure de l’art pop des années 1960 et du
  Swinging London, il élabora tout au long de sa carrière un langage visuel reconnaissable
  entre tous, marqué par son traitement des lignes, des couleurs et de la lumière.
  Ami d’Andy Warhol et de Rudolf Noureev, son œuvre fut celle d’un homme de son temps.
  Avec une étincelle particulière dans le regard, David Hockney était capable de voir,
  à sa manière, des éléments du quotidien, une autoroute ou une flaque d’eau, et de
  les transformer en œuvres d’art. Nous incitant ainsi à regarder le monde d’un œil
  nouveau, plus attentif. Et sachant sans cesse se réinventer. Portant une approche
  pionnière des représentations artistiques de l’homosexualité, même lorsque celle-ci
  était encore criminalisée, il inspira les jeunes générations d’artistes à étendre
  le champ des possibles. Sa gaieté libre, son humour britannique ont fait de lui
  une personnalité aimée bien au-delà des amateurs d’art contemporain ; ses lunettes
  colorées, son sourire souvent agrémenté d’une éternelle cigarette, ont façonné une
  silhouette inimitable. Génie de la créativité, il s’essaya tout au long de sa vie
  à diverses manières de faire naître l’image, de l’aquarelle à l’acrylique en passant
  par les Polaroid. En 2020, il repoussa encore les limites de sa création avec une
  fresque de quatre-vingt-onze mètres, faite à partir de dessins digitaux représentant
  le changement des saisons dans le verdoyant pays d’Auge. Amoureux de la France et
  tout particulièrement de la Normandie, ses travaux ont pourtant fait le tour du
  monde, de Tokyo à Paris et, bien sûr, Londres. Son exposition au Centre Georges
  Pompidou en 2017 et à la Fondation Louis Vuitton l’année dernière avaient battu
  le record de fréquentation pour un artiste vivant. Le Président de la République
  et son épouse saluent la mémoire d’un grand artiste à l’imagination aussi vive que
  ses toiles. Ils adressent leurs condoléances sincères à sa famille et ses admirateurs.
