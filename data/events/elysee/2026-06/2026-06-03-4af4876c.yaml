title: Meeting with Péter Magyar, Prime Minister of Hungary.
text: The President of the Republic received the Prime Minister of Hungary, Péter
  Magyar, on Wednesday, June 3, 2026, at the Élysée Palace. They discussed key European
  issues , including support for Ukraine and the continuation of sanctions against
  Russia, European security and defense, strengthening European competitiveness, and
  preparations for the next multiannual financial framework. This visit also provided
  an opportunity to deepen bilateral relations between France and Hungary through
  the development of cooperation in several strategic areas, such as nuclear energy,
  defense, and infrastructure.
