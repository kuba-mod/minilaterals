title: Sommet UE-Balkans au Monténégro.
text: Le Président de la République s'est rendu au Monténégro les jeudi 4 et vendredi
  5 juin dans le cadre d’une visite bilatérale et du Sommet UE-Balkans occidentaux.
  Vendredi 5 juin, les chefs d’État et de gouvernement de l’Union européenne et des
  pays des Balkans occidentaux se sont réunis à l’occasion du Sommet UE-Balkans occidentaux
  pour évaluer les progrès réalisés vers l’intégration européenne et les conditions
  d’une stabilité et d’une prospérité communes à l’ensemble de la région. Ce sommet
  témoigne de l’importance stratégique accordée aux Balkans occidentaux, dont la stabilité
  et l’ancrage européen conditionnent la sécurité du continent. Les dirigeants ont
  abordé de nombreux sujets liés aux coopérations sectorielles et à l'élargissement
  de l'Union européenne.
