title: 9th Choose France Summit.
text: The President of the Republic attended the 9th edition of the Choose France
  Summit on Monday, June 1, 2026, at the Palace of Versailles. Since its launch in
  2018 by the Head of State, the Choose France Summit has facilitated more than 230
  investment decisions. These decisions represent a total of nearly 87 billion euros
  invested across the country. The summit has established itself as an essential annual
  economic event for manufacturers, investors, and business leaders from around the
  world. This year’s summit brought together more than 200 foreign business leaders
  , whom the President of the Republic urged to continue investing in our country
  to strengthen the industrial base and the independence of France and Europe. Once
  again this year, despite a complex macroeconomic and geopolitical landscape, France
  has been ranked as the most attractive country in Europe for the seventh consecutive
  year, according to the EY Attractiveness Barometer. This ranking is the result of
  the proactive economic policy pursued by the President of the Republic, based in
  particular on an attractive tax system, significant regulatory simplifications,
  and the production of large quantities of carbon-free energy.
