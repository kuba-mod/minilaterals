title: Hommage national à Edgar Morin.
text: 'Le chef de l''État a présidé ce mercredi la cérémonie d’hommage de la Nation
  à Edgar Morin, disparu le 29 mai dernier. Cet hommage national vient saluer le parcours
  d’un philosophe, écrivain, Résistant et sociologue du temps présent. Edgar Morin
  incarnait pour des millions de Français l’idéal de l’intellectuel humaniste , engagé
  pour la paix, le dialogue entre les peuples, la défense du droit international,
  l’idéal européen, ou la cause écologique. Tant de fois, Edgar Morin avait vu la
  mort en face. À dix ans, quand son père se posa, grave, devant lui, le jeune Edgar
  Nahoum comprit en un instant que sa mère était morte. Chagrin premier et inconsolable,
  qui l''accompagna jusqu''au bout de son existence. L''année suivante, le petit garçon,
  frappé d''un mal mystérieux, condamné par tous les médecins, en réchappa à force
  de soins donnés par sa tante. À 20 ans, Edgar Nahoum, devenu Edgar Morin, Résistant,
  se rendit à un rendez-vous. Au bas de l''escalier, un pressentiment, comme un étourdissement :
  il rebroussa chemin. Un piège était en effet tendu par la Gestapo. À 30 ans, Edgar
  Morin fit paraître L''Homme et la mort, son premier livre. Dix ans plus tard, une
  hépatite le laissa dans le coma. Chaque fois, Edgar Morin ressuscita. Chaque fois,
  il voulut encore davantage « vivre de mort, mourir de vie ». Oui, Edgar Morin aimait
  la vie. Il l''aimait et fut, tout au long de la sienne, cet homme des renaissances.
  Esprit de la Renaissance aussi, mu par une ambition intellectuelle digne des siècles
  de l''humanisme et qui, comme Montaigne, entendait embrasser toutes les facettes
  de notre condition : les idées, les lois, les arts, les sciences, les technologies.
  Homme de toutes les Renaissances, esprit de la grande Renaissance. La pensée complexe
  qu''il établit et qu''il enseigna fut au fond avant tout cette pensée de la vie.
  Ce fut dans la résistance, d''abord, qu''Edgar Morin trouva sa voie. Il s''y engagea
  en patriote, enfant d''un enseignement laïc dispensé à l''école de Ménilmontant,
  vibrant de son identité de Français juif traqué, opprimé, fort de sa conscience
  politique forgée devant la montée des fascismes dans les années 30. Malgré le deuil
  des camarades, la peur au ventre, il ne cessa de lutter. Dans la Résistance, Edgar
  Nahoum avait trouvé son nom clandestin, Morin. Il avait aussi et surtout trouvé
  un sens à sa vie, une fraternité avec des camarades extraordinaires, Jean Cassou,
  Florence Malraux, Mascolo, Jankélévitch ou sa future épouse, Violette Chapellaubeau.
  Au plus près de la mort, la vie s''était éclaircie. Et la pensée complexe, déjà,
  pour comprendre comment la barbarie fut enfantée par la civilisation. Alors, après
  la guerre, Edgar Morin, encore soldat, s''établit un temps en Allemagne sur les
  traces du nazisme, produit par la même nation qui avait inventé Nietzsche ou Beethoven,
  génies si chers à son cœur. Il en tira un livre à rebours de l''époque, pour défendre
  l''idée de l''Allemagne qu''il aimait, l''idée de l''Europe qu''il aimait et ces
  idées dont il espérait la renaissance. Penser par soi-même, même contre l''époque,
  même contre les siens. Dans la France de l''après-guerre, encore sous les décombres,
  dans ces jours de dénuement passés rue Saint-Benoît, avec Robert Antelme et Marguerite
  Duras, vibrer au tourbillon de la vie, chacun chez soi est reparti. Il se fit, durant
  ces décennies, penseur de son temps, de l''époque, avec lucidité, exigeant toujours
  sans jamais donner quelque leçon. C''est parce qu''il s''exerçait à cette pensée
  de vérité et de contradiction qu''Edgar Morin aperçut, dans la conduite de la guerre
  en Algérie, les risques fatals encourus par la République, et qu''il s''engagea,
  pour Messali Hadj, et l''indépendance de l''Algérie. C''est ainsi qu''Edgar Morin
  sut discerner dans la puissance du Parti communiste le risque totalitaire et qu''il
  s''en affranchit en publiant un livre de rupture qui fit date : Autocritique. C''est
  ainsi qu''à l''inverse de sa génération intellectuelle prompte à effacer la figure
  de l''Homme au profit des lois de l''économie ou des formes du langage, lui ne cessait
  de placer l''Homme, ses passions, sa Raison, au cœur de tout. Oui, Edgar Morin,
  par sa vie, qu''il refusait de séparer de son œuvre, avait appris à penser contre
  les apparences, contre les écoles, parfois contre lui-même. Pensée inclassable,
  intempestive et donc intemporelle. Il fut aussi ce chercheur, traquant les émergences,
  saisissant la société dans chacun de ses soubresauts. Devenu chercheur au CNRS,
  il sut décrire la rumeur d''Orléans avec ses emballements, ses croyances, ses lâchetés,
  et son travail éclaire encore ce que nous savons de ses poussées de fièvre imaginaire.
  Dans la Folle nuit de la place de la Nation, un concert de Johnny et Sylvie Vartan,
  il aperçut l''émergence de la génération des yéyés, enfants nés après la guerre,
  animés de l''urgence de vivre. Dans les Stars, il vit l''avènement d''une nouvelle
  culture de masse. Dans le Journal de Plozévet, écrit après une immersion en Bretagne,
  la fin de la société rurale. Mort, naissance, renaissance toujours. Vie d''une société,
  description de la France. Dans la Californie des années 1970, Edgar Morin se réinventa
  une vie, laissa son existence de chercheur et engloutit de nouveaux continents du
  savoir. Sur les rives du Pacifique, il se laissa gagner par l''air de la modernité
  à toute allure : informatique, révolution de la jeunesse, science nouvelle. À la
  manière d''Arthur Rimbaud, il voulut se faire voyant, par ce « long, immense et
  raisonné dérèglement de tous les sens ». Comprendre, toujours, comment ce qui transforme
  est lui-même transformé. Pour Edgar Morin, cela revenait à savoir pourquoi, après
  la chute du mur de Berlin, après l''essor de la mondialisation, le modèle occidental
  entrait en crise. Au moment de sa victoire politique et économique, il se corrodait
  de ses excès et de ses succès. C''était la crise écologique qu''Edgar Morin avait
  discernée dès 1972. C''était, au cœur même de la modernité politique, le retour
  du fondamentalisme religieux. C''était la crise de l''ordre international avec le
  surgissement des guerres, des conflits, des massacres à grande échelle. C''était
  au moment même du triomphe de la pensée humaine par le progrès matériel et technologique,
  la menace de son asservissement par les machines et de sa colonisation par les empires
  numériques. Aussi, jusqu''à la fin, Edgar Morin enseignait à des millions d''esprits
  à travers le monde à ne jamais se résigner aux simplismes. Pour lui, la vérité ne
  résultait jamais d''un seul camp, d''un seul dogme. L''engagement ne pouvait être
  l''embrigadement, et l''avenir était promis au chaos si l''on cédait à l''accablement
  ou à l''inaction. Pour Edgar Morin, cette pensée complexe fut toujours le prélude
  à l''action juste. Pensée complexe - le mot intimide. Edgar Morin, pourtant, l''avait
  illustré par sa vie. La partie vaut pour le tout, vie d''un siècle français. À présent,
  il n''est plus. Et jamais Edgar Morin n''a paru si vivant. Vivant par ses intuitions,
  son travail sur les rumeurs, devançant les algorithmes devenus fous. Vivant grâce
  à son œuvre somme, la Méthode, plaidant l''unité de tous les savoirs, vision éclairée
  à l''heure de l''intelligence artificielle. Vivant, parce que la nécessité de réconcilier
  les hommes avec la nature et avec eux-mêmes n''a jamais été si impérieuse. Ce qui
  transforme est lui-même transformé. Certes, il demeurait tel qu''en lui-même. Enfant
  de Ménilmontant, fou de cinéma, de Rimbaud, de Dostoïevski, juif et méditerranéen,
  passionné du Maroc, Monsieur le Premier ministre, proche des siens, de sa famille,
  de ses filles, amoureux de la vie, de son épouse, cher Sabah, complice d''existence
  et de pensée, aimant ses amis, fidèle de chaque instant. Humaniste planétaire, certes,
  mais irréductiblement Français, toujours. Pour ses combats de liberté, celui de
  la Résistance et du front de Libération. Pour ses combats d''égalité, d''émancipation.
  Pour ses combats de fraternité aussi, avec tous les peuples privés de leurs droits.
  Pourtant, Edgar Morin, au fil de ses 104 ans de pensée et de combat, avait lui-même
  été changé et transformé par la vie. Il avait opéré tant de renaissances, quittant
  les dogmes, les étiquettes, les partis et les appartenances pour se réinventer sans
  cesse. Parce qu''il guettait en tout l''imprévu. « Êtes-vous heureux ? ». C''était
  la question que posait aux passants Edgar Morin dans son film documentaire tourné
  avec Jean Rouch, « Chronique d''un été ». Sommes-nous heureux ? Heureux de l''écouter
  encore. Car Edgar Morin enseigne que nos générations, confrontées à tant d''épreuves
  politiques, climatiques, stratégiques, économiques, ne doivent jamais perdre l''espérance
  dans l''Homme, seul et ultime responsable du monde tel qu''il est. Avec Edgar Morin
  s''éteint un destin exceptionnel dans le siècle. Mais cette énergie française, généreuse,
  ambitieuse, universelle, va continuer de renaître. Sommes-nous heureux ? Nous sommes
  désormais sans lui, privés de son sourire, de sa voix, de sa bienveillance, mais
  là, avec son œuvre, sa pensée. « Elle est retrouvée. Quoi ? L''Eternité. C''est
  la mer allée avec le soleil ». Alors, cher Edgar, vous avez retrouvé l''éternité
  et vous êtes heureux. Alors nous sommes heureux. D''accord. Car c''est là l''élégance
  de la vie que vous nous avez aussi transmise. Chacun, en guettant ce chapeau qui
  pourrait s''envoler, le revoit là, avec son sourire, sa voix. On revoit ses yeux
  fendus de bonheur et ce qui sent peut-être un pas de danse, vivre en poésie. Merci,
  Edgar. Vive la République. Vive la France. Tant de fois, Edgar Morin avait vu la
