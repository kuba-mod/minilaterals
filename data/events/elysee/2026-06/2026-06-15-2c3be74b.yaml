  d'être là à ses côtés. C'est important qu'on puisse d'abord avoir ce G7 au lendemain
  d'un accord essentiel qui a été scellé avec l'Iran. Pour parler évidemment de nos
  grandes crises, l'Iran, l'Ukraine, nos guerres, leurs règlements, construire la
  paix, restaurer la prospérité, mais aussi voir les voies et moyens de coopérer entre
  nos économies. C'est le but du G7 pour améliorer la prospérité, les éléments de
  coopération dans les différents domaines. Puis nous aurons l'occasion aussi de célébrer
  à la Française les 250 ans d'indépendance, la France ayant été aux côtés des États-Unis
  d'Amérique, à Versailles dans deux jours. I wanted to say… I mean to command President
  Trump for the celebration yesterday and to welcome President Trump and ministers
  and his team for being here in Evian for the G7. I think yesterday was signed a
  very important agreement, a peace deal with Iran. And it's a very important one
  because, first, it will fix the nuclear issue, and it's a very important matter
  for peace for the whole world, and it will reopen Ormuz, it will provide peace in
  Lebanon, and so we are ready to take our fair share of the burden and be part of
  the commitment of the international community in order to support this deal. We
  will discuss about that together and with colleagues later on. But it's a very important
  step towards peace, but as well for global economy. We will have the occasion to
  discuss about the war in Ukraine in order to re-engage together and negotiate a
  good and solid peace, and sustainable peace, and President Zelensky will be with
  us as well tomorrow. Obviously, we will have the occasion during this G7 to speak
  about a series of issues from rare earths, critical minerals, trade, et cetera,
  where we have to build convergence among the G7 members. It will be the occasion
  for us to celebrate the 250 years of independence for the U.S., and Versailles is
  a good place because this is where the king and his minister of foreign affairs
  at the time did support the U.S. during years, as well prepared what we called the
  Paris Treaty in 1783, which was the final point of this war. So it's a great honor
  and a great pleasure to have you, Mr. President, in Evian and Versailles. [Intervention
  de M. Donald Trump, Président des Etats-Unis d’Amérique] Monsieur Macron, quel engagement
  êtes-vous prêt à prendre au nom de la France dans le détroit d’Ormuz ? Vous avez
