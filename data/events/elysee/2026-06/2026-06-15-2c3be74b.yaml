  demain pour le 13h. Merci à vous. Merci d’avoir été à Evian, cette Haute-Savoie
  qu'on aime. Dans l'après-midi, le Président Emmanuel Macron s'est entretenu avec
  Donald Trump , Président des États-Unis d'Amérique. Bienvenue au Président. I will
  say a few words in French . Je voudrais d'abord accueillir et souhaiter la bienvenue
  au Président Trump. Merci d'être là un lendemain d'anniversaire et de célébration.
