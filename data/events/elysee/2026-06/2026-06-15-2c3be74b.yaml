date: '2026-06-15'
type: press_release
source_name: elysee
title: 'Sommet du G7 d''Évian : premier jour.'
text: Le Président de la République et Brigitte Macron ont accueilli le Sommet du
  G7 à Évian du 15 au 17 juin 2026. Ce Sommet, placé sous le signe de la convergence
  réunit les dirigeants des pays membres du G7, les représentants de l’Union européenne,
  les pays partenaires associés à cette présidence (le Brésil, la Corée du Sud, l’Égypte,
  l’Inde et le Kenya), ainsi que plusieurs organisations internationales et pays invités
  , parmi lesquels l’Ukraine et plusieurs États du Golfe. Dans la matinée du 15 juin,
  le Président Emmanuel Macron est allé à la rencontre des élus locaux à la buvette
  Cachat , chef d'oeuvre d'Art nouveau, qui va rouvrir ses portes dans quelques jours
  après sept ans de travaux. Puis il a assisté à une présentation de l’oeuvre « Correspondance
  » , fresque réalisée par l'illustratrice Aurélie Castex, en présence des enfants
  des écoles d’Évian et de Khaled El-Enamy , Directeur général de l’UNESCO. Le Président
  de la République s'est ensuite adressé aux forces de sécurité et de secours mobilisées
  pendant le Sommet. Merci beaucoup. Merci pour votre présence. Monsieur le préfet
  de région, Madame la préfète. Je salue Madame la maire. Merci beaucoup pour l'accueil
  et vraiment la mise à disposition de ces locaux, l'accueil à Évian. Je salue l'ensemble
  des parlementaires, des autorités ici réunies. Je voulais pouvoir vous serrer la
  main, vous saluer, mais avant ça, dire quelques mots pour vous remercier. Parce
  qu'évidemment, nous tenons ce G7. C'est une grande fierté pour la France, une grande
  responsabilité. Nous allons essayer de faire avancer au maximum tous les dossiers
  qui sont importants pour notre pays, notre continent, et aussi la paix et la prospérité
  dans le monde avec les grands dirigeants de la planète. Mais ceci n'est possible
  que par votre mobilisation collective. Je remercie la commune, l'ensemble du territoire
  pour leur accueil, mais je veux remercier la très grande mobilisation pour sécuriser
  ce G7, et c'est ce collectif ici présent. On a de manière exceptionnelle près de
  13 800 forces de sécurité qui sont mobilisées. Évidemment, nos policiers, nos gendarmes
  de tout le territoire, et je veux aussi saluer la mobilisation et le soutien des
  forces de tout le territoire et des unités mobiles de tout le territoire, et donc
  on a une mobilisation inédite de nos policiers, de nos gendarmes. Évidemment, nos
  militaires à leurs côtés, qui sont aussi présents et que je salue, qui sont là et
  apportent de manière inédite également leur soutien. Je veux remercier nos douaniers,
  qui sont également là et contribuent au plan frontière, l'ensemble des forces de
  sécurité intérieure. Je vais saluer les unités, évidemment, locales, nationales,
  mais nos forces de déminage qui sont ici présentes, nos forces de renseignement,
  nos unités d'élite, et qui sont ici présentes avec les sécurités d'usage. Mais c'est
  pour nous une grande fierté d'avoir, évidemment, les GIGN qui sont mobilisés. Notre
  sécurité civile, qui est également mobilisée et présente sur le terrain une fois
  encore, et les équipes de sécurité civile, sapeurs-pompiers sont là, et je veux
  vraiment vous en remercier, nos soignants, les SAMU une fois encore mobilisés. En
  vous disant merci aujourd'hui, évidemment. Je veux avoir une pensée pour votre frère
  d'armes qui a été fauché et est tombé samedi. J'ai une pensée particulière, évidemment,
  pour nos gendarmes de l'Ain, l'adjudant Raffoux est tombé en assurant la mission.
  Il l'assurait dans le cadre de ce G7. Il était venu ici vous soutenir et participer
  à la mission. Je sais que le DGGN va descendre, le ministre de l'Intérieur s'est
  exprimé, il sera là, mais je voulais vraiment, en notre nom à tous, dire mon soutien
  à tous ces frères d'armes ici présents, à tous ces frères d'armes de l'Ain, évidemment
  à sa famille, c'était aussi un papa de deux enfants, et je veux ici dire notre émotion,
  notre soutien et notre reconnaissance. Et puis, évidemment, je veux aussi remercier
  nos magistrats qui sont ici présents et l'ensemble de celles et ceux qui concourent
  à la mission. Les magistrats font ici un travail remarquable et, dans l'unité avec
  nos forces de sécurité, ont déjà permis d'agir avec beaucoup d'efficacité et vont
  permettre aussi de mener des affaires dans les meilleurs délais face, évidemment,
  à ce qui peut advenir sur le terrain. Donc, c'est un continuum, c’est l'action de
  l'État, c'est la force de l'État. Il y a déjà eu beaucoup d'opérations qui ont été
  conduites dans la plus grande discrétion ces derniers jours, et je veux vous en
  féliciter avec le concours des services de renseignement nationaux. Il y a des opérations
  qui continuent d'être menées au moment où je vous parle et qui continueront d'être
  menées dans les prochains jours pour assurer la sécurité, la paix sur le territoire.
  Je voudrais avoir un dernier mot aussi pour vous remercier et remercier tous les
  collègues qui sont mobilisés côté Suisse parce qu'hier, comme les jours précédents,
  et on a décidé de prolonger cette mission, il y a plusieurs centaines de nos forces
  de sécurité, de nos militaires qui sont aussi mobilisés en soutien de la Suisse
  pour assurer la sécurité du territoire, la sérénité au maximum et la stabilité pour
  tous. Voilà, je ne veux pas être plus long, mais je voulais rappeler la contribution
  de chacune et de chacun, de toutes nos forces, de toutes celles et ceux qui concourent
  et l'ensemble des services, afin que ce G7 puisse se passer dans les meilleures
  conditions pour la population, afin que ce G7 se passe dans le calme, la sécurité,
  une fois encore. C'est une grande fierté pour moi d'être là et de pouvoir vous remercier
  pour la mission qui a déjà commencé pour beaucoup d'entre vous depuis plusieurs
  semaines, plusieurs mois, qui va se poursuivre toute cette semaine et parfois un
  peu au-delà, et qui vient en plus des missions de chaque jour. Je veux ici vous
  redire avec beaucoup de reconnaissance, de gratitude et en connaissance de cause,
  un grand merci pour ce que vous faites chaque jour. C'est, chaque jour, pour nous
  tous, des défis du quotidien et je sais que vous faites bien et que vous faites
  de votre mieux. J'essaie de faire pareil avec vous. Et donc un immense merci d'être
  là pour permettre à ce G7 de se tenir et de le faire dans le meilleur ordre. Merci,
  Madame la préfète, d'en assurer le commandement sur le territoire et de coordonner
  cette action. Je suis très reconnaissant sous l'autorité du préfet de région, mais
  pour ce département, de le faire avec beaucoup de savoir-faire et de professionnalisme,
  comme toujours. Merci à toutes et tous. Bon courage pour les prochains jours. On
  ne lâche rien. Vive la République et vive la France. Merci beaucoup. Merci pour
  votre présence. Monsieur le préfet de région, Madame la préfète. Je salue Madame
  la maire. Merci beaucoup pour l'accueil et vraiment la mise à disposition de ces
