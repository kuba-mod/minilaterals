  journal télévisé de 13 heures sur TF1 et a répondu aux questions d'Anne-Sophie Lacarrau.
  Effectivement, merci Isabelle. On se retrouve dans cette salle particulière. Bonjour
  Monsieur le Président. Alors cette salle, c'est ici que se dérouleront vos réunions
  de travail entre chefs d'État et de gouvernement, autour de cette table pour votre
  dernier G7. Vous allez discuter d'enjeux majeurs pour la marche du monde mais qui
  auront des répercussions très concrètes dans notre quotidien. Nous y viendrons.
  D'abord évidemment cet accord annoncé dans la nuit entre l'Iran et les Etats-Unis
  pour mettre fin au conflit, y compris au Liban. Faut-il y croire Monsieur le Président ?
  Bonjour, merci beaucoup d'être là à Evian. Oui, il faut y croire, il faut tout faire
  pour le mettre en œuvre. Et donc cet accord est une bonne chose parce que c'est
  ce que nous appelons de nos vœux depuis des semaines. D'abord nous allons tout faire
  et nous mobiliser dès ce soir dans le cadre de nos travaux et demain aussi puisque
  on n'aura pas simplement les membres du G7 qui sont les sept grandes économies démocratiques
  dans le monde. On a associé des partenaires et demain on aura une session sur la
  question de l'Iran avec en particulier l'Égypte, les Émirats arabes unis et le Qatar.
  Nous, nous allons tout faire d'abord pour que cet accord soit une réalité et donc
  pour que Ormuz puisse se rouvrir de manière pacifique et que le trafic puisse reprendre.
  C'est très important pour nos compatriotes parce que c'est à peu près un quart du
  pétrole et du gaz produit dans le monde qui sort par ce détroit. Donc nous avons
  construit avec les Britanniques une mission. Nous sommes, nous, sur place. Il y
  a plusieurs nations qui sont sur place, les néerlandais, les italiens, les britanniques,
  nous. On est prêts à agir très vite. Pour faire quoi ? Envoyer des avions, envoyer
  une frégate, envoyer des démineurs. Nous, nous avons aussi notre porte-avions, le
  Charles de Gaulle avec tout ce qui l'entoure. Qui reste dans la zone et qui peut
  être déployé dans les 2-3 jours qui suivront la confirmation. Donc ce qu'on va faire
  avec les Américains, en parallèle avec les Iraniens, c'est nous assurer de ce déploiement
  pour que cette réouverture d'Ormuz puisse se faire de manière pacifique et qu'elle
  dure. Est-ce que cette réouverture se fera sans péage ? La presse iranienne semble
  dire que non, il y en aura un avec l'accord des États-Unis. Si c'est le cas, c'est
  un recul en arrière. Alors si c'est le cas, c'est en effet pas le retour à la situation
  que nous connaissions il y a plusieurs mois. C'est évidemment pas du tout ce qu'on
  souhaite parce que ça créerait un précédent. Il y a beaucoup d'autres détroits dans
  le monde, si à chaque fois on fait payer, quelle est la conséquence ? Vous faites
  monter les prix pour la terre entière. Donc là, on va aussi en discuter. Ce n'est
  pas conforme au droit international. Donc nous, on défend le droit international
  et on va tout faire en effet pour qu'il n'y ait pas de péage. Alors aujourd'hui,
  ils jouent sur les mots, ils disent ce sont pour des services. Donc on va regarder,
  déjà la priorité c'est de le rouvrir. C'est faire sortir les centaines de bateaux,
  de porte-conteneurs, de tankeurs pour que les marchandises, les équipages, parce
  qu'il y a des équipages qui sont bloqués depuis des mois, le pétrole, le gaz puissent
  sortir, que ça rouvre et que ça fasse baisser les prix. Évidemment, on va parler
  des prix. Raisonnablement, on peut espérer une réouverture dans quel délai ? Écoutez,
  là aujourd'hui, si l'accord a été signé, il y a des confirmations techniques qui
  vont se faire. L'accord a été conclu, il sera signé vendredi. Alors il a été signé
  électroniquement, je ne veux pas rentrer dans le détail, et il y a des annexes qui
  seront finalisées vendredi. Donc ce qu'on nous dit, c'est que normalement ça doit
  repartir maintenant. Donc vigilance, les prochaines heures vont nous dire. Est-ce
  qu'on a les premiers bateaux qui vont le franchir ? Donc là, il faut tout faire
  dans les heures, les jours qui viennent, pour que ce soit une réalité. La deuxième
  chose, c'est que la communauté internationale, et donc nous, on s'assure que ce
  soit une réalité qui dure. La troisième chose, c'est qu'on s'assure qu'il n'y ait
  pas de péage, et que les prix ne montent pas, et ça on va en discuter demain, c'est
  de trouver un accord. Et puis en parallèle, c'est important pour que ce soit aussi
  bien compris, dans les travaux qu'on va mener dans ce G7, on va tout faire pour
  réduire notre dépendance à ce détroit. C'est-à-dire trouver d'autres chemins. Quand
  vous avez du gaz qui est produit en Irak, aujourd'hui il sort par ce détroit, c'est
  faire en sorte qu'il y ait des gazoducs qui aillent à travers l'Irak, la Syrie,
  le Liban, et qui ressortent par un autre endroit. C'est que les Émirats Arabes Unis
  puissent avoir aussi des gazoducs qui ressortent de l'autre côté du détroit. C'est
  que l'Arabie Saoudite puisse avoir des gazoducs qui passent à travers leur pays
  pour passer par la mer Rouge, et qu'à travers l'Égypte, on puisse les avoir en Méditerranée.
  C'est trouver des voies et moyens de réduire notre dépendance à ce seul détroit.
  Ça, ça veut dire construire des infrastructures, et c'est l'engagement du G7. Et
  à la pompe, à quand les premières baisses de prix pour les automobilistes ? C'est
  la question que tout le monde se pose en nous regardant. Bien sûr c'est une question
  qui, évidemment, est très importante pour nous. Si les prochains jours nous montrent
  que c'est bon, nous, on va donc se déployer. Avec les Britanniques, on va piloter
  cette mission. Donc, comme je vous le disais, les Français peuvent être fiers parce
  que leurs militaires vont pouvoir, dans les prochaines heures, participer à cette
  stabilisation. C'est dans les semaines qui viennent qu'on aura un impact sur les
  cours. Alors maintenant, comme il y a beaucoup de spéculations, je dirais, si c'est
  confirmé, tout de suite les marchés vont baisser. Mais pour que les chaînes logistiques
  repartent, ça va prendre quelques semaines. Néanmoins, on va voir des prix qui vont
  baisser, et le gouvernement va continuer de s'assurer que dans les délais normaux,
  ça soit bien répercuté à la pompe. Vous allez demander aux distributeurs de baisser
  les prix aussi vite qu'ils les avaient montés ? On ne va pas simplement leur demander,
  on va le vérifier, c'est la règle du jeu. Sur les objectifs de guerre, j'aimerais
  qu'on revienne dessus. Parce qu'au départ, si cette guerre a été déclenchée, Donald
  Trump le disait, c'était pour renverser le régime des mollahs, il est toujours là.
  C'était pour empêcher l'Iran d'obtenir la bombe nucléaire. Là, on ne sait pas. Ce
  conflit n'a donc pas permis, à ce stade, de régler ces sujets de fond. Le régime
  iranien a-t-il gagné ? Je ne dirais pas cela, et surtout je serai prudent et patient.
  Nous, nous n'avons pas participé à cette offensive, comme vous le savez. Donc là,
  notre objectif, c'est la réouverture d'Ormuz. Et en effet, il ne faut pas de péage
  ou de choses qui iraient enrichir ... Ensuite, c'est de s'assurer que cette paix,
  vous l'avez dit dans votre propos introductif, elle permette de protéger le Liban.
  Parce qu'aujourd'hui, le Liban, dans sa souveraineté, son intégrité territoriale
  doit être protégée. Il faut lutter contre des groupes terroristes qui sont mauvais
  pour le Liban et pour la région. Mais il faut s'assurer que le Liban retrouve la
  paix, qu'il n'y ait plus de bombardements, que les troupes étrangères se retirent
  et qu'on redonne la possibilité aux forces armées libanaises de retrouver ce qu'on
  appelle le monopole des armes, et donc désarment dans le bon ordre, le Hezbollah.
  La troisième chose, et c'est dans l'accord, ce qui va se faire durant les 60 jours
  qui viennent, c'est l'accord sur le nucléaire, mais aussi ce qu'on appelle les capacités
  balistiques, c'est-à-dire les tirs de longue portée que les Iraniens peuvent faire.
  Ça, c'est important pour la paix dans la région, c'est important pour nous. Donc
  nous, notre priorité, c'est qu'il y ait un accord solide et sérieux qui soit finalisé.
  La France avait fait partie, il y a un peu plus de 10 ans, de l'accord qui avait
  été initié par les Américains. Nous, on avait souhaité que cet accord soit tenu
  et respecté en 2018. J'étais déjà là. D'ailleurs, le G7 en 2019, on s'était beaucoup
  activé, les Iraniens étaient venus en coulisses. Donc là, nous, on va s'assurer
  pour que les capacités d'uranium enrichi qui sont présentes, eh bien, elles soient
  bien neutralisées. Alors comment ? Il faudrait que les Américains aillent le chercher
  cet uranium ? Alors non, il y a plusieurs solutions. D'abord, il faut que ça se
  fasse sous supervision de l'Agence internationale d'énergie atomique, l'AIEA. Parce
  que c'est la communauté internationale, il y a un garant. Ensuite, soit il faut
  sortir cet uranium et le mettre dans un pays tiers pour qu'il soit contrôlé, progressivement
  dilué. Soit il faut le diluer sur place sous le contrôle de l'AIEA. En tout cas,
  il faut faire que cet uranium enrichi, qui est proche du seuil dangereux dans lequel
  après, on peut construire des armes nucléaires, le sortir ou le diluer. Ensuite,
  il faut s'assurer qu'il y aura un contrôle de cette agence pour que les Iraniens
  ne puissent pas, dans les mois et les années qui viennent, se réorganiser pour refaire
  de l'uranium enrichi et construire des armes avec. Donc ça, c'est une pression de
  la communauté internationale sur leurs activités, c'est un contrôle sur les sites.
  On connaît, on sait comment le faire parce qu'on l'a déjà fait. Donc nous, on contribuera
  avec nos experts. On contribuera aussi parce que cet accord, il prévoira la levée
  des sanctions sur l'Iran, s'il est bon. Eh bien, s'il n'est pas suffisant, à ce
  moment-là, les sanctions ne seront pas levées. Ça, avec les Britanniques et les
  Allemands en particulier, on a un rôle particulier, spécifique. Est-ce que vous
  prévoyez d'envoyer des moyens supplémentaires dans la zone ? On l'a dit tout à l'heure,
  le Charles de Gaulle va rester sur place. Y aura-t-il des envois supplémentaires
  et quand ? Aujourd'hui, nous sommes sans doute la nation n'étant pas partie au conflit
  qui a le plus de moyens présents dans la région, entre la Méditerranée orientale,
  la mer Rouge et l'océan Indien. Donc nous avons des moyens déjà déployés depuis
  plusieurs mois. Je veux vraiment dire à nos marins notre fierté et ma reconnaissance
  parce que pour eux, c'est des semaines, des mois de mer. Donc nous, on s'organise
  pour réagir très vite dès qu'il y aura accord de toutes les parties prenantes. Donc
  l'accord signé est là, on va regarder. Les Omanais nous ont déjà dit d'accord pour
  les escortes. Vous savez, Oman, c'est le pays qui est de l'autre côté du Détroit
  par rapport à l'Iran. Et donc là, ce sera une discussion avec les Américains et
  les Iraniens pour pouvoir assurer cette mission. Et en tout cas, nous, on a aussi
  des missions qu'on effectue en mer Rouge, par exemple, pour s'assurer de la sécurité
  ou en Méditerranée orientale pour être aux côtés de nos alliés ou aux côtés aussi
  de nos forces. On pourrait avoir le Charles de Gaulle dans le Détroit ? Je ne veux
