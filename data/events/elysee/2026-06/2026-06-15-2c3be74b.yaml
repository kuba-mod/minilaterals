  soutenir un candidat ? Et donc c'est d'abord d'assurer l'unité de la nation, dans
  des moments très difficiles, on l'a encore vécu ces derniers jours. Et d'être là
  pour nos enfants, les protéger. D'être là pour la France, son indépendance, sa liberté,
  sur les grands sujets militaires, diplomatiques ou technologiques. D'être là aussi
  pour qu'on ait une Europe plus forte, pour qu'on soit plus indépendant. Et donc
  la campagne va se faire, c'est tout à fait normal, et moi je ferai tout pour qu'elle
  se fasse dans un bon cadre. Elle va se faire avec un rassemblement national qui
  avance en favori. Est-ce que vous vous sentez responsable, Monsieur le Président,
  de faire monter en puissance dans le pays ? Je ne ferai pas de commentaires politiques.
  Je pense que ce n'est pas mon rôle dans cette période. Encore moins que naguère.
  Par contre, puisque vous évoquez tout ce qui peut se passer, c'est aussi pour ça
  que j'ai demandé au gouvernement de s'assurer que cette campagne et cette élection
  se passent aussi dans les meilleures conditions pour nous protéger de ce qu'on appelle
  les ingérences. C'est-à-dire qu'il n'y ait pas d'attaque informationnelle de puissance
  étrangère pour déstabiliser le pays. Qu'il n'y ait pas d'attaque cyber. Que ça ne
  soit pas faussé. Je crois que c'est ça, mon rôle. Après, les Françaises et les Français
  me connaissent. Ils savent ce que je pense. Les idées que je défends, j'ai eu l'occasion
  de les défendre lors de deux campagnes présidentielles. Ce que je porte, ce que
  je défends, ce pour quoi je me bats depuis plus de neuf ans maintenant. Une France
  plus forte, une économie plus prospère, l'innovation, le développement, notre enfance,
  notre Europe. Voilà. Et donc, je continuerai de le faire jusqu'au bout. Et je le
  ferai pour que nos débats soient le plus calmes, le plus apaisés possible. Et que
