title: Inauguration of the memorial honoring the victims of the genocide against the
  Tutsi.
text: President Emmanuel Macron dedicated the memorial honoring the victims of the
  genocide against the Tutsi in Rwanda on Tuesday, June 2, 2026. Built on the banks
  of the Seine at the initiative of the French government and the City of Paris, and
  named “L’Archive,” this memorial was designed by artist Grada Kilomba as a place
  of reflection in memory of those who perished, and to ensure the intergenerational
  transmission of the memory of the genocide perpetrated against the Tutsi in Rwanda.
  This ceremony continues the process of remembrance and reconciliation that has been
  underway for several years between France and Rwanda, based on dialogue, joint research
  and truth-seeking efforts, the acknowledgment of France’s responsibilities by the
  President of the Republic during his visit to Rwanda in May 2021, decisive action
  in the field of education, and intensified efforts to bring those responsible for
  the genocide to justice.
