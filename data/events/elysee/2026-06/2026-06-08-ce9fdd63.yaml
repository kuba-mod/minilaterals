date: '2026-06-08'
type: press_release
source_name: elysee
title: Déplacement à Amiens.
text: Le Président de la République s'est rendu à Amiens le lundi 8 juin 2026. Le
  chef de l’État a débuté sa visite par l’usine Goodyear afin de mettre en lumière
  le projet de modernisation engagé par l’entreprise en 2021 et soutenu dans le cadre
  de France 2030. Ce projet porté par le partenariat entre Goodyear et l'État a permis
  d’ automatiser le site de production , d’ accroître ses capacités industrielles
  et de soutenir la création de 120 emplois supplémentaires sur une nouvelle ligne
  de production, avec l’appui de France Travail. Le Président Emmanuel Macron s'est
  adressé aux employés de Goodyear sur les stratégies engagées en France pour faire
  baisser le chômage depuis 2017. Emmanuel MACRON Merci pour vos mots, Monsieur le
  directeur. Thank you, dear Mark, thank you very much. Je salue nos parlementaires
  qui sont là, Madame la vice-présidente du Conseil régional, Madame la présidente
  du Conseil départemental, Monsieur le maire, Mesdames et Messieurs, en vos grades
  et qualités, je salue nos préfets, évidemment, je suis très heureux d'être parmi
  vous. Je voulais vous dire quelques mots pour saluer et accompagner tout le travail
  qui est fait ici sur ce site et puis essayer d'expliquer ce qu'on est en train de
  faire pour réindustrialiser le pays et en particulier, la Somme et l’Amiénois. D'abord,
  en m'adressant à vous, moi, étant un enfant de la région, je sais aussi d'où on
  vient. J'ai vu beaucoup de jeunes qui viennent d'arriver ou sont en alternance,
  sont là depuis quelques années. J'ai vu aussi beaucoup de collaboratrices, collaborateurs
  qui sont là depuis 30, 35 ans dans l'entreprise. On sait qu'il y a eu des périodes
  difficiles, il y a une douzaine d'années, sur le site d'Amiens Nord aussi, des moments
  qui ont été très durs. Je pense aussi à tous les collègues qui ont eu à subir les
  plans sociaux et je pense aussi à toutes les difficultés qu'on connaît dans notre
  industrie européenne et française. Néanmoins, pourquoi on se retrouve là et qu'est-ce
  qui fait qu'on peut regarder devant et que sur ce site, où on est, avec les réinvestissements
  qui sont faits, on peut regarder avec confiance et vigilance, mais aller de l'avant
  et vous pouvez être fiers. C'est parce qu'ici même, on est en train d'investir,
  vous êtes en train d'investir et on est en train d'accompagner une transformation,
  une modernisation de l'outil industriel qu'est le vôtre. Et de le faire pour pouvoir
  être pleinement compétitif, relever les défis d’aujourd'hui et de demain, continuer
  à produire, le faire dans la compétition internationale et de le faire aussi dans
  des meilleures conditions de travail. Je m'explique. Depuis la sortie de Covid,
  et ce choix s'est fait en 2021-2022, Goodyear a décidé de réinvestir sur ce site
  environ 160 millions d'euros, je parle sous votre contrôle collectif, pour digitaliser,
  robotiser, améliorer les choses. J'ai vu les premières machines déployées. Le Gouvernement
  français s'est engagé à côté en investissant 45 millions d'euros dans le cadre de
  ce qu'on appelle France 2030. Vous en avez peut-être entendu parler, pour justement
  aider à moderniser l'outil de travail. L'objectif, c'est quoi ? C'est d'améliorer
  vos conditions de travail, c'est de permettre de produire plus. C'est là où vous
  avez une cadence d'environ 135 000, le but, c'est de passer à 150 000, d'être plus
  productif grâce à cette modernisation et de pouvoir tenir la compétition internationale.
  Le choix qui est d'abord fait par le groupe et par le Gouvernement français, c'est
  un choix de confiance dans le site d'Amiens et de confiance dans les technologies
  de demain pour réussir cette transformation. C'est comme à chaque fois dans une
  aventure industrielle, le mariage de plusieurs volontés. C’est aussi pour ça que
  je suis là, pour vous remercier et vous dire ma gratitude. Il n'y a pas de réinvestissement
  qui est fait si l'entreprise ne croit pas dans les femmes et les hommes qui la font,
  et donc la qualité du travail qui est fait ici. Personne n'aurait réinvesti ici
  si les femmes et les hommes qui font vivre ce site, qui le font tourner, n'étaient
  pas à la hauteur. Donc merci à vous parce que vous avez déclenché cette confiance
  par votre travail de chaque jour. Je veux aussi vous remercier parce que je sais
  que par les accords qui ont été trouvés à travers le dialogue social, et en particulier
  l'accord sur les 5x8 qui a été conclu, vous accompagnez aussi d'efforts qui sont
  faits, d'organisation du temps de travail, tout ce choix. Merci à vous. Deuxièmement,
  merci évidemment au groupe, à l'actionnaire, à l'entreprise, parce que vous faites
  confiance dans le site d'Amiens, dans la France, et vous investissez ici. Merci
  pour tout le travail qui est fait. Je veux aussi remercier les élus qui sont là,
  l'ensemble des collectivités locales, la ville, la métropole, le département, la
  région, et évidemment, à leur côté les services de l'État, parce que c'est un accompagnement
  de chaque jour durant toutes ces dernières années sur tout ce qui fait la vie d'une
  entreprise sur un site, la qualité de vie des collaboratrices, des collaborateurs,
  les éléments de logistique. Là, comme je l'ai dit, on a mis 45 millions d'euros
  avec France 2030 pour accompagner cet effort. Puis, je veux remercier tous les partenaires,
  les banques, les partenaires, les sous-traitants qui accompagnent cette transformation.
  Tout ça vous montre une chose, c'est que la réindustrialisation est possible parce
  qu'avec cet effort collectif, on croit dans l'avenir où vous réorganisez le temps
  de travail et l'entreprise, où Goodyear investit, où on investit à leurs côtés.
  Non seulement on maintient les un peu plus de 800 emplois du site, mais ça permet
  de réembaucher 120 collaboratrices et collaborateurs. Là, il y a le travail avec
  France Travail qui est lancé pour les identifier et permettre de les recruter. Ce
  qui va permettre de continuer à augmenter les équipes du site et à faire qu'on va
  créer 120 emplois industriels sur ce site d'Amiens. Ça, c'est formidable. Tout ça,
  j'essaie d'expliquer cette histoire, elle n'est pas écrite d'avance. C'est vraiment
  le fruit d'un investissement collectif, d'un engagement collectif dont on doit se
  féliciter. C'est pour montrer qu'il n'y a pas de fatalité. Tout ça, on le retrouve
  d'ailleurs dans les chiffres. Quand on regarde l’Amiénois, ces huit-neuf dernières
  années, on a fait baisser le chômage d'un peu plus de trois points, on a réaugmenté
  l'emploi industriel, en particulier en sortie de Covid. Pour la première fois depuis
  une quinzaine d'années, on a créé plus de sites industriels ou maintenu plus de
  sites industriels qu'on en a détruits. Ça ne veut pas dire que c'est simple partout,
  on l'évoquait avec les élus, il y a des sites qui sont en difficulté et on se bat.
  Mais on reconquiert, on redémarre. Mais ça ne se fait pas tout seul. C'est les réformes
  qu'on a faites, c'est votre engagement de chaque jour, c'est le fait qu'on arrive
  à convaincre des groupes industriels d'être là, même dans des périodes difficiles,
  et qu'on se retrousse les manches pour y aller. Maintenant, quand je regarde devant,
  qu'est-ce qu'on doit faire pour continuer de réussir ensemble et réussir cette bataille
  de la réindustrialisation à Amiens, dans les environs et au-delà en France ? C'est
  un ensemble qu'on retrouve au fond, à la fois quand on parle de Goodyear, quand
  on parle d’Eurolysine, vous en avez peut-être entendu parler, de ce site industriel
  où on fait les acides aminés dans l'Amiénois, là aussi, qui est menacé, ou quand
  on veut se défendre sur les datacenters. À chaque fois, c'est la même recette. Premièrement,
  on doit réformer et être compétitif. C'est ce qu'on a fait en France ces dernières
  années. On l'a fait, ça n'a parfois pas toujours été simple, je m'en souviens assez
  bien, mais enfin, c'est ce qui nous a permis d'être compétitifs et puis, au niveau
  de l'entreprise, par le dialogue social, d'avancer. Deuxièmement, c'est de continuer
  à simplifier, c'est-à-dire accélérer les choses pour accompagner dans les meilleurs
  délais nos entreprises. C'est ce qu'on veut faire au niveau français. On a appelé
  ça les projets « Notre-Dame ». C'est ce qu'on veut faire au niveau européen. Chaque
  fois qu'on est trop lent, on perd. La rapidité, elle est clé.  Vous avez peut-être
  vu qu'on a annoncé, il y a quelques jours, au Bosquel, ce formidable investissement.
  On va avoir un des plus grands datacenters d'Europe. On a attiré les Japonais de
  SoftBank parce qu'on a été les plus rapides d'Europe, on a été vite. C'est un gigawatt
  de centre de données, de production de calcul, qui va permettre de moderniser notre
  économie, qu'on va faire au Bosquel. Ce n'est pas abstrait, parce que cette intelligence
  artificielle qu'on remet, c'est celle qu'on utilise sur des sites comme celui de
  Goodyear pour moderniser notre industrie. Quand vous entendez parler d'intelligence
  artificielle, c'est aussi fait pour vous. Ce qu'on fait ici, c'est une application
  directe et industrielle de l'intelligence artificielle. Réformer, simplifier et
  aller vite. Deuxièmement, c'est investir. Ce qu'on fait depuis la sortie du Covid
  avec France 2030, après France Relance, ce que l’on veut faire au niveau européen
  et ce que les entreprises doivent faire, c'est ce qu'a fait Goodyear. Troisièmement,
  c'est protéger. Ce n'est pas un gros mot. Je le dis parce que votre secteur est
  touché comme d'autres, nous sommes face à une compétition internationale qui ne
  respecte pas les règles du jeu. Quand on parle des pneumatiques, on a aujourd'hui
  une concurrence chinoise qui est très forte. Parfois, elle existe parce que les
  Chinois ont beaucoup investi, se sont modernisés, ont robotisé. Là, très bien. On
  doit être à la hauteur. C'est ce qu'on fait ici. C'est ce qu'on fait dans tous les
  sites où on peut. Ça, on ne va pas en débattre. On doit être compétitifs, robotiser,
  produire. Il y a une concurrence qu'on n'accepte pas, c'est la concurrence déloyale.
  On doit jouer avec les mêmes règles du jeu. Quand vos concurrents chinois font beaucoup
  trop de subventions, ou vendent à perte sur le marché, ou sont à des niveaux de
  prix qui ne sont pas possibles pour la production, les règles du jeu sont faussées.
  On ne va pas se mettre à jouer avec une équipe à 13 sur le terrain et l'autre à
  11. On est d'accord. Sinon, ce n'est plus le même championnat. C'est ce qui se passe
  aujourd'hui. Face à ça, on se bat au niveau européen, on l'a fait déjà il y a quelques
  années sur les véhicules électriques, vous l'avez peut-être vu ; on l'a fait sur
  l'acier ; on est en train de le faire sur les pneumatiques, on a les résultats des
  premières enquêtes européennes, pour mettre des mesures de protection. Pour dire
  là, quand on a des concurrents qu'on a identifiés, qui sur-subventionnent leurs
  entreprises, on va leur mettre des tarifs. On va faire en sorte de rééquilibrer
  les règles du jeu. Ça, ça va avec. Je vous le dis parce que ces investissements
  ne vont pas régler tout le sujet. Il faut qu'à côté, on protège notre industrie
  européenne, qu'on protège Goodyear et sa production, parce que vous êtes soumis
  à une concurrence déloyale et que nous avons des concurrents aujourd'hui qui, malgré
  tout ça, vont continuer à vendre, ce qui serait une vente à perte pour vous, pour
  nous, et ce qui n'est pas possible. Là, on demande à l'Europe de sévir, de mettre
  en place ce qu'on appelle des clauses de sauvegarde, des tarifs. On se bat aussi
  pour avoir une préférence européenne. Ça, c'est important que vous l'ayez en tête,
  parce que c'est le combat qu'on mène depuis plusieurs années, et il est clé en particulier
  dans l'automobile. Ça veut dire que dans chaque voiture produite en Europe, on veut
  un minimum de pourcentage produit sur le sol européen. Les Chinois le font. Les
  Américains le font sur leur marché. Nous, en Europe, on est les seuls à ne pas l'avoir
  fait. Ça, c'est de la naïveté. Pour défendre justement les pneus qui sont faits
  à Amiens, les batteries électriques qui sont faites à Douai, les composantes qu'on
  fait dans la région, on doit définir un pourcentage, une préférence européenne,
  un contenu européen. Ça, c'est des réformes qu'on est en train de pousser au niveau
  européen, quand on se bagarre, quand je vais à Bruxelles. C’est une vraie transformation,
  parce que c'est ça qui rendra l'Europe compétitive. Ce n'est pas du protectionnisme,
  c'est de la juste protection. On continue à être ouvert au monde, mais on dit qu'on
  est ouvert avec les mêmes règles. Voilà la bataille qu'on est en train de conduire.
  Ce qu'on est en train de faire au niveau des pneumatiques, c'est exactement la même
  chose. J'ai parlé d’Eurolysine qu'on fait sur les acides aminés pour l'alimentation
  animale. Eurolysine, là, qui est une belle entreprise de la région qui est bousculée,
  on va investir, il va y avoir une augmentation de capital d'environ 70 millions
  d'euros. On va monter au capital avec le groupe Avril, l'État sera là, on va monter
  parce qu'on fait confiance et qu'on veut défendre la souveraineté alimentaire. En
  même temps, on va se battre pour dire la concurrence déloyale sur les acides aminés
  quand elle vient de la Chine et qu'elle est sur-subventionnée, on met des tarifs,
  on met des clauses de sauvegarde. Voilà ce que je voulais vous dire. Au fond, ce
  qui est en train de se jouer ici est pour moi une parfaite illustration de la bataille
  pour la réindustrialisation partout en France. On tient mieux que beaucoup de nos
  collègues, parce qu'on a réinvesti plus tôt, parce qu'aussi on a souffert, nous,
  il y a 15, 20 ans, plus que d'autres. Ces dernières années, on remonte tout doucement
  la pente, pas assez vite à mon goût, parce qu'on a aussi du vent en face. On a eu
  la guerre en Ukraine, l'inflation importée. A cela s’ajoute désormais la guerre
  au Proche et au Moyen-Orient qui nous fait monter les prix, qui pèse aussi sur votre
  pouvoir d'achat, qui pèse sur la compétitivité des entreprises. Malgré tout ça,
  on continue à créer de l'emploi industriel, malgré tout ça, on arrive à écrire des
  pages comme celles qu'on écrit aujourd'hui avec Goodyear, là où beaucoup de nos
  voisins ferment tout simplement des usines dans votre secteur. On va tenir, plus
  que tenir, on va continuer d'avancer, mais moi, je voulais essayer de vous expliquer
  tout ça ce matin, mais surtout de vous dire que rien de cela n'est possible si l'effort
  n'est pas collectif et la confiance n'est pas collective. Je finirai par là où on
  a commencé. Rien de tout ça n'est possible s'il n'y a pas des femmes et des hommes
  comme vous qui se battent pour bien faire comme vous l'avez fait toutes ces dernières
  années, qui passez des accords comme vous l'avez fait pour les cinq-huit et qui
  menez ici aussi une production de qualité qui arrive à convaincre l'entreprise de
  réinvestir et le Gouvernement d'être à vos côtés. Comme vous, je crois dans l'industrie.
  Je pense que ce sont des métiers formidables qui créent de la valeur ajoutée, qui
  permettent ensuite à notre modèle social de tourner parce qu'on ne peut pas redistribuer
  si on ne crée pas de richesses. Ce sont des métiers qui évoluent. Les plus anciens
  ici me disaient qu'ils ont vu quand même les conditions de travail s'améliorer.
  La robotisation, la modernisation, l'intelligence artificielle et le robot dans
  l'usine, c'est ce qui permet aussi d'avoir de meilleures conditions, de féminiser
  les emplois industriels, Mesdames, et d'améliorer les conditions de travail pour
  qu'il y ait moins de troubles musculosquelettiques. Tout ça, au fond, c'est une
  histoire de progrès. Elle n'est pas écrite d'avance, mais c'est notre investissement
  collectif. En tout cas, je suis très reconnaissant à vous, à Goodyear, aux services
  de l'État, aux élus, à tous ceux qui ont rendu cela possible. Nous, on va continuer
  de se battre pour que la page qu'on écrit aujourd'hui d'investissement, de confiance
  dans l'avenir, de réindustrialisation, continue de se faire, évidemment pour l'Amiénois,
  pour la Somme, qu'on aime tant, c'est évidemment aussi l'enfant du pays qui vous
  parle, mais pour tout le pays. Parce que la France a une formidable page de réindustrialisation
  à écrire. On peut être fier de ce qui a été fait ces dernières semaines et ces derniers
  mois, qui est le fruit du travail de ces dernières années, des datacenters, en passant
  par les pneumatiques, de ce qu'on fait sur la robotique, etc. On continue d'avancer
  ensemble. On va se battre pour avoir une Europe qui investit à nos côtés, qui protège
  mieux notre industrie et nos collaboratrices et nos collaborateurs, qui nous permette,
  en particulier, de nous protéger contre la concurrence déloyale. Merci à toutes
  et tous, en tout cas pour votre accueil aujourd'hui. Merci pour tout le travail
  fait. Vive Goodyear, vive Amiens, vive la République et vive la France. Emmanuel
