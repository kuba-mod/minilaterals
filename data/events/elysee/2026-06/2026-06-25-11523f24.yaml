date: '2026-06-25'
type: press_release
source_name: elysee
title: Déclaration conjointe franco-italienne.
text: '1. À l’occasion du 36e sommet franco-italien, organisé le 25 juin 2026, nous
  célébrons l’amitié, ancrée profondément dans l’histoire et la géographie, qui lie
  la France et l’Italie et dont témoigne le Traité entre la République française et
  la République italienne pour une coopération bilatérale renforcée, dit « Traité
  du Quirinal » , signé le 26 novembre 2021. 2. Le Traité du Quirinal est la pierre
  angulaire de nos relations et constitue un instrument essentiel pour le renforcement
  de notre coopération au bénéfice de nos pays et de nos peuples ainsi qu’au bénéfice
  de l’avenir et de la prospérité de l’Union européenne (UE) et du continent européen.
  3. Confrontés à de multiples problématiques, nous réaffirmons notre volonté commune
  de parvenir à une Europe plus unie, souveraine, démocratique, résiliente et compétitive.
  À cette fin, nous approfondirons notre coopération bilatérale toujours étroite,
  notamment dans les domaines politique, économique, agricole, social, éducatif, scientifique
  et culturel ainsi que dans les secteurs industriels et innovants stratégiques pour
  l’avenir de nos pays et de l’UE. 4. Nous réaffirmons notre volonté commune de renforcer
  les liens entre la France et l’Italie, notamment en ce qui concerne les générations
  à venir, et d’exploiter encore toutes les possibilités offertes par le Traité du
  Quirinal. 5. Dans un contexte géopolitique difficile marqué par le retour de la
  guerre sur le continent européen avec la guerre d’agression menée par la Russie
  contre l’Ukraine et caractérisé par de nombreuses crises dans notre voisinage et
  un accroissement des menaces hybrides, nous réaffirmons notre attachement à un ordre
  international fondé sur des règles de droit et notre volonté d’ approfondir encore
  la coopération franco-italienne en matière de politiques étrangère, de sécurité
  et de défense dans tous les secteurs . Cette coopération sera renforcée aux niveaux
  bilatéral, européen et multilatéral, dans tous les cadres pertinents comme les Nations
  Unies, l’Organisation du Traité de l’Atlantique Nord (OTAN), le G7, le G20, la Communauté
  politique européenne ou le groupe E5 . 6. Nous réaffirmons notre soutien à l’indépendance,
  à la souveraineté et à l’intégrité territoriale de l’Ukraine dans ses frontières
  internationalement reconnues. En coordination avec les partenaires et alliés affinitaires,
  nous continuerons de fournir à l’Ukraine et au peuple ukrainien un soutien politique,
  financier, économique, humanitaire, diplomatique et militaire complet, notamment
  en appuyant le relèvement et la reconstruction du pays. 7. L’attitude impérialiste
  actuelle de la Russie fait peser une menace directe sur le continent européen tout
  entier, et son agression contre l’Ukraine a sérieusement compromis la sécurité et
  la stabilité de toute notre région. C’est pourquoi l’Europe a un rôle clé à jouer
  au profit d’un futur règlement et dans la défense de ses intérêts en matière de
  sécurité. L’Ukraine a prouvé à de nombreuses reprises qu’elle était prête à entamer
  des négociations constructives, et la Russie doit en faire autant. À cette fin,
  et pour contraindre Moscou à s’asseoir à la table des négociations, nous sommes
  déterminés à exercer la plus forte pression possible sur la Russie en adoptant des
  trains de sanctions supplémentaires, en mettant pleinement en œuvre les sanctions
  déjà adoptées et en luttant contre tout acte de contournement. Nous sommes déterminés
  à cibler les revenus énergétiques de la Russie et à entraver son secteur financier,
  notamment son système bancaire ou l’utilisation des crypto-actifs. Nous renforcerons
  notre coopération opérationnelle dans la lutte contre la flotte fantôme de la Russie.
  Une paix juste et durable fondée sur les règles fondamentales du droit international
  est la seule issue acceptable à la guerre en cours. 8. La stabilité, la sécurité
  et le développement de la Méditerranée demeurent une priorité stratégique commune
  de nos deux pays. Dans ce contexte, nous soutenons le Pacte pour la Méditerranée
  , en mettant l’accent sur le renforcement des relations entre l’UE et ses partenaires
  du Sud de la Méditerranée grâce à un cadre pratique de coopération fondée sur la
  confiance mutuelle, la responsabilité conjointe et le pilotage commun. En promouvant
  la connectabilité, la résilience et la croissance solidaire, nous appuierons le
  Pacte, à la fois dans le développement de notre coopération bilatérale et au moyen
  d’actions conjointes au niveau de l’UE, afin de faire face aux problématiques communes
  tout en contribuant à la stabilité à long terme et à la prospérité commune dans
  toute la région méditerranéenne. 9. Tout en œuvrant à la sécurité et à la stabilité,
  nous plaidons pour une approche inclusive qui associe prévention, endiguement et
  résolution des crises et des conflits avec la promotion d’un plan d’action positif
  et ambitieux. Nous soutenons le développement économique, qui constitue un instrument
  essentiel de la promotion de la paix et de la stabilité dans la région, en portant
  une attention particulière à l’emploi des jeunes, à la formation professionnelle,
  à la gestion durable des ressources en eau, à la sécurité alimentaire et à la transition
  énergétique, tout en renforçant la coordination avec les pays partenaires de la
  Méditerranée, les institutions financières internationales et le secteur privé.
  Ces efforts s’appuient sur les cadres du partenariat euro-méditerranéen et sur l’engagement
  pris par l’UE vis-à-vis de son voisinage méridional, qui constituent des piliers
  de la prospérité et de la stabilité régionales. 10. S’agissant de la situation au
  Moyen-Orient , nous soulignons l’importance de l’atténuation des effets du conflit
  sur les partenaires régionaux, les populations civiles et les infrastructures essentielles
  ainsi que la nécessité de coordonner les efforts d’aide humanitaire. Nous rappelons
  que la diplomatie est le seul moyen d’apaiser les tensions et d’obtenir une solution
  durable pour mettre fin aux hostilités. Nous saluons la signature d’un mémorandum
  d’entente entre les États-Unis et l’Iran et nous œuvrerons avec nos partenaires
  européens et régionaux à soutenir un règlement diplomatique à long terme qui garantira
  que l’Iran n’obtiendra jamais l’arme nucléaire. Nous sommes déterminés à jouer notre
  rôle dans la restauration permanente d’une navigation libre et sûre dans le détroit
  d’Hormuz. Tout arrangement régissant la navigation dans le détroit d’Hormuz doit
  être conforme au droit de la mer et doit être adopté conformément aux procédures
  applicables de l’Organisation maritime internationale (OMI). Nous demeurons unis
  dans notre attachement à la solution à deux États pour Israël et la Palestine ,
  et nous sommes fermement convaincus qu’il s’agit de l’unique moyen de permettre
  aux Israéliens et aux Palestiniens de vivre côte à côte dans la paix, la sécurité
  et la dignité, à l’intérieur de frontières sûres et reconnues, et de garantir la
  paix et la stabilité pour tous dans la région. Nous continuerons de soutenir conjointement
  les efforts déployés par les autorités libanaises pour rétablir leur pleine souveraineté
  sur l’ensemble du territoire libanais, notamment grâce au monopole de l’État sur
  les armes et l’usage de la force. À cette fin, nous soutiendrons la création d’une
  mission de politique de sécurité et de défense commune au Liban à l’automne 2026,
  qui œuvrera avec tous les acteurs concernés, notamment le Comité technique militaire
  pour le Liban, et sera compatible avec les initiatives bilatérales dans le pays.
  Nous soutenons fermement la Force intérimaire des Nations Unies au Liban (FINUL)
  et soulignons son rôle essentiel dans la réalisation de progrès à l’issue du cessez-le-feu.
  Nous mènerons de concert des réflexions sur la situation après le départ de la FINUL
  en vue de conduire une coalition internationale en appui au Liban dans ce contexte.
  11. Nous réaffirmons notre attachement à un partenariat d’égal à égal avec l’Afrique
  , réactif face aux priorités des partenaires africains et conforme aux intérêts
  européens, et nous reconnaissons l’engagement de la France vis-à-vis du continent
  africain, mis en avant lors du Sommet « Africa Forward » à Nairobi, ainsi que les
  engagements énoncés par l’Italie dans le « Piano Mattei per l’Africa », tels qu’ils
  ont été réaffirmés lors du second sommet Afrique-Italie à Addis Abeba, en vue de
  promouvoir des initiatives coordonnées et qui se renforceraient mutuellement sur
  tout le continent africain. Dans ce contexte, la France et l’Italie coopéreront
  à la mise en œuvre de la stratégie « Global Gateway » de l’UE, en œuvrant ensemble
  pour garantir une gouvernance claire et efficace pilotée par les États membres dans
  le cadre de l’instrument « Europe dans le monde » et en promouvant des initiatives
  conjointes dans une approche « équipe Europe ». La France et l’Italie continueront
  d’approfondir la coordination de leurs efforts en matière de paix et de sécurité
  sur le continent africain, en appui des solutions pilotées par les pays africains,
  dans le cadre de notre partenariat avec l’Union africaine, notamment en ce qui concerne
  les opérations et les missions de la politique de sécurité et de défense commune.
  12. L’aide publique au développement demeure un outil clé pour faire face aux problématiques
  les plus importantes et pour soutenir une croissance durable, solidaire et résiliente
  sur tout le continent africain. La France et l’Italie ont l’intention d’intensifier
  leur coopération en Afrique dans les secteurs clés d’intérêt commun, notamment l’énergie,
  le numérique, l’agriculture durable et la sécurité alimentaire, la santé, la formation
  professionnelle et la création de possibilités pour les jeunes, notamment grâce
  aux cadres de coopération européens communs. La France et l’Italie réaffirment en
  outre leur volonté commune de poursuivre leur engagement et leur soutien vis-à-vis
  des pays touchés par des crises humanitaires sévères, notamment le Soudan, en œuvrant
  de concert avec les partenaires africains et la communauté internationale pour promouvoir
  la stabilité, la résilience et le développement à long terme. 13. Nous appuyant
  sur les rapports Letta et Draghi, nous travaillerons ensemble pour améliorer la
  compétitivité et la durabilité de nos économies, tout en garantissant notre sécurité
  économique au niveau national et au niveau de l’UE grâce à une protection efficace
  de nos atouts, de nos entreprises et de nos infrastructures essentielles, à l’atténuation
  des risques dans les secteurs critiques et stratégiques, à la dissuasion, notamment
  vis-à-vis des formes de coercition, et à une coopération renforcée avec nos partenaires
  de confiance. Nous soutiendrons la simplification et l’adaptation de l’encadrement
  des aides d’État par l’UE afin de faciliter les investissements dans les secteurs
  stratégiques, tout en préservant l’intégrité du marché unique et en garantissant
  l’égalité des conditions de concurrence parmi les États membres. Nous sommes déterminés
  à approfondir et à étendre nos liens bilatéraux économiques, commerciaux et d’investissement,
  qui sont déjà solides, comme le programme conjoint de Bpifrance et d’Invitalia et
  le mémorandum d’entente entre Bpifrance et la Cassa Depositi e Prestiti. Comme d’autres
  partenaires de l’UE, nous sommes déterminés à faire progresser les priorités liées
  au marché unique, comme l’union de l’épargne et des investissements , notamment
  avec l’achèvement rapide en 2026 des trains de mesures sur la titrisation et sur
  l’intégration des marchés et la surveillance, d’après les modalités financières
  convenues par le groupe E6. Par ailleurs, nous coopérerons étroitement pour renforcer
  la compétitivité du secteur bancaire européen , en garantissant que le future programme
  européen traite d’une manière cohérente l’égalité des conditions de concurrence,
  la simplification du cadre prudentiel et l’intégration plus avant du marché bancaire
  de l’UE. 14. Suite à la signature de leur déclaration conjointe définissant un programme
  commun pour l’industrie et la compétitivité en Europe le 3 mars 2026 et de leur
  déclaration commune définissant un programme numérique européen commun le 5 mai 2026,
  la France et l’Italie honoreront leurs engagements conjoints, notamment s’agissant
  de l’industrie automobile, des industries à forte intensité énergétique, des matières
  premières critiques, des semi-conducteurs et des secteurs industriels « zéro émission
  nette ». Une négociation rapide du règlement relatif à l’accélération des capacités
  industrielles soutiendra la production de biens par l’UE dans ses secteurs industriels
  stratégiques ; ce règlement sera applicable dans toutes les législations pertinentes,
  aux achats publics, aux ventes aux enchères ainsi qu’aux régimes de soutien public
  de l’UE et nationaux. 15. S’agissant plus particulièrement de l’industrie automobile,
  nous coopérerons pour garantir que la règlementation donne à l’industrie les moyens
  de satisfaire l’ambition de l’Europe de devenir chef de file en matière de mobilité
  décarbonée, tout en préservant les emplois industriels en Europe, en tenant compte
  de la neutralité technologique et du contenu européen. Nous soutenons les propositions
  visant à stimuler les investissements qui contribuent à consolider une base industrielle
  solide pour les véhicules de l’avenir au sein de l’UE. 16. Concernant l’aviation
  civile, nous reconnaissons l’interconnexion de nos bases industrielles et de nos
  chaînes de valeur ainsi que la coopération fructueuse, notamment dans l’industrie
  de l’aviation régionale. Nous réaffirmons notre volonté de soutenir la transition
  de ce secteur vers la décarbonation, notamment grâce aux carburants durables d’aviation,
  et de garantir le rôle de chef de file de l’industrie européenne dans cette transition.
  17. La France et l’Italie développeront leurs efforts conjoints pour faire face
  à la problématique des petits colis et de la mode ultra-éphémère, conformément à
  la lettre conjointe adressée en décembre 2025 à la Commission européenne. 18. La
  France et l’Italie promouvront une approche européenne conjointe pour préserver
  et renforcer la compétitivité dans les chaînes de valeur de la mode et du luxe,
  qui constituent des atouts stratégiques de l’identité culturelle, de l’excellence
  industrielle et du rayonnement mondial de l’Europe. À cet égard, nous soutenons
  pleinement le développement de la coopération entre nos fédérations pour la mode
  et la haute couture. 19. La crise énergétique déclenchée par la situation au Moyen-Orient
  met en lumière la nécessité pour l’UE d’ accélérer sa décarbonation , notamment
  grâce à la diversification de l’approvisionnement énergétique et des sources d’énergie
  et sur la base du principe de neutralité technologique , afin de réduire aussi rapidement
  que possible nos dépendances aux combustibles fossiles et de bâtir une véritable
  autonomie stratégique dans le secteur énergétique, en particulier en mobilisant
  toutes les sources d’énergie décarbonées, nucléaires et renouvelables, tout en plaçant
  au premier rang des priorités le développement de chaînes de valeur européennes
  robustes. Nous avons pour objectif commun le renforcement de nos efforts dans le
  secteur des réseaux électriques et des interconnexions afin d’améliorer la résilience
  de nos systèmes énergétiques. 20. Nous saluons notre étroite coopération de longue
  date dans le secteur de l’énergie nucléaire civile, notamment dans le cadre de l’Alliance
  européenne du nucléaire et dans la coordination conjointe des projets importants
  d’intérêt européen commun en matière de technologies nucléaires innovantes, et nous
  sommes déterminés à renforcer encore notre dialogue, notamment dans les domaines
  de la recherche et de l’industrie et au sein de l’UE, en vue de permettre de nouveaux
  travaux conjoints sur des projets communs à long terme. Nous saluons en outre la
  coopération industrielle croissante sur les petits réacteurs modulaires, qui reflète
  l’ampleur de notre écosystème industriel et technologique. Nous encourageons de
  nouveaux efforts conjoints en faveur de solutions européennes relatives aux petits
  réacteurs modulaires et aux technologies nucléaires avancées, notamment en associant
  les chaînes d’approvisionnement industriel étendues de la France et de l’Italie
  et en coopération avec les entreprises qui opèrent dans le secteur des réacteurs
  de quatrième génération, en vue de soutenir la souveraineté technologique et industrielle
  européenne. 21. Nous efforts conjoints viseront en outre à obtenir une révision
  efficace du système d’échange de quotas d’émission de l’UE (SEQE) pour réduire la
  volatilité des prix du carbone et atténuer son impact sur les prix de l’électricité,
  tout en préservant le rôle essentiel du SEQE dans la transition climatique et énergétique
  grâce à un signal prix fondé sur le marché pour les émissions de carbone qui stimule
  l’investissement et l’innovation. 22. Nous sommes déterminés à renforcer encore
  notre coopération en matière d’élargissement et de réforme de l’UE et à promouvoir
  et consolider la paix, la stabilité, la prospérité et la sécurité sur le continent
  européen . Nous continuerons de poursuivre une approche fondée sur les mérites dans
  le processus d’adhésion et un traitement égal des Balkans occidentaux, de la Moldavie
  et de l’Ukraine. 23. S’agissant de la migration , nous coopérerons étroitement sur
  la législation clé de l’UE, notamment pour garantir la mise en œuvre effective du
  pacte sur la migration et l’asile et du nouveau règlement sur les retours. Nous
  renforcerons la coopération bilatérale au niveau européen dans la lutte contre la
  migration irrégulière et les réseaux de trafic illicite de migrants, conformément
  au plan d’action adopté par les ministères de l’Intérieur du G7 en 2024. Nous continuerons
  de développer la dimension extérieure de la stratégie de l’UE en matière de migration
  et des partenariats globaux avec les pays d’origine et de transit tiers, en renforçant
  la coopération opérationnelle, l’échange d’informations et les actions, notamment
  en Afrique du Nord et dans la région du Sahel. Nos efforts conjoints seront notamment
  axés sur une meilleure prévention des flux de migration irrégulière par la route
  de la Méditerranée centrale et la route de la Manche. Nous reconnaissons l’importance
  des retours volontaires assistés depuis les pays de transit vers les pays d’origine
  des flux migratoires. 24. Nous investirons encore dans le développement des capacités
  de défense, contribuant à l’état de préparation de la défense européenne de façon
  à contribuer à une Europe plus forte au sein d’une OTAN plus forte. Nous soutenons
  fermement le développement d’une base industrielle et technologique de défense européenne
  solide. À cet égard, nous travaillerons à la mise en œuvre de domaines prioritaires
  en matière de capacités déjà définis par le Conseil européen, en nous appuyant sur
  le Fonds européen de la défense et le programme européen d’investissement dans le
  domaine de la défense (EDIP), qui renforce les industries européennes. Nous soulignons
  qu’il est important, notamment dans le cadre du prochain cadre financier pluriannuel
  (CFP), de concevoir et de mettre en œuvre des instruments européens contribuant
  à réduire nos dépendances stratégiques et à renforcer notre souveraineté technologique,
  sur la base des critères de préférence européenne convenus qui permettent également
  la coopération avec nos partenaires. Nous reconnaissons qu’une UE plus forte et
  plus performante dans le domaine de la sécurité et de la défense, pleinement complémentaire
  des engagements et des réalisations de l’OTAN, contribuera de façon positive à la
  sécurité transatlantique et mondiale. Nous nous félicitons des travaux en cours
  en matière d’acquisition conjointe. Nous saluons par ailleurs les travaux menés
  dans le cadre de l’approche européenne de frappe à longue portée, qui ouvre la voie
  à une coopération à court ou long terme pour que la base industrielle et technologique
  de défense européenne puisse concevoir, produire et fournir des solutions. 25. Nous
  réaffirmons notre volonté de développer des projets de capacités conjointes dans
  le secteur de la défense, notamment des projets de défense européens d’intérêt commun
  dans le cadre de l’EDIP, qui contribueront à l’autonomie stratégique de l’UE, notamment
  dans les domaines spatial et maritime ainsi que dans les secteurs de la défense
  aérienne et antimissile intégrée et des unités robotiques de combat pour les opérations
  terrestres, dans un champ vaste visant à améliorer la défense européenne dans une
  approche à 360 degrés. Nous partageons l’objectif de bâtir une base industrielle
  et technologique de défense compétitive, notamment en nous appuyant sur les projets
  bilatéraux en cours en matière de défense aérienne , comme le système sol-air à
  moyenne portée en version terrestre de nouvelle génération et les futurs nouveaux
  intercepteurs d’engins hypersoniques . La signature d’une nouvelle feuille de route
  bilatérale dans le domaine de la défense (2026-2031) et la création d’un comité
  stratégique bilatéral pour l’industrie renforceront encore notre dialogue sur ces
  questions. 26. Nous renforcerons notre étroite coopération dans le domaine spatial
  , en nous appuyant sur des initiatives d’entreprises en faveur de l’innovation,
  de la souveraineté européenne et de la compétitivité mondiale, comme le projet Bromo
  , dont nous saluons et soutenons les avancées. Nous consoliderons nos liens dans
  le domaine de l’accès à l’espace en soutenant l’accélération d’Ariane 6 et de Vega-C,
  en réponse à la demande européenne croissante sur le plan stratégique et en tirant
  parti du soutien que se prêtent mutuellement nos industries respectives en matière
  d’approvisionnements critiques. Nous renforcerons également notre coopération en
  matière d’exploration, d’observation de la Terre, de télécommunications par satellite
  et de surveillance spatiale, en veillant tout particulièrement à promouvoir les
  possibilités d’une coopération spatiale renforcée au profit de la défense. Reconnaissant
  que l’espace constitue une source essentielle de connaissance et de savoir, ainsi
  qu’une composante de notre souveraineté et de notre indépendance, nous continuerons
  à promouvoir la science et l’exploration spatiales. 27. En vue de consolider le
  dialogue et la coordination entre les administrations et les agences nationales
  des deux pays chargées des dossiers liés à l’espace, des consultations bilatérales
  sur l’espace seront organisées régulièrement au niveau technique approprié pour
  promouvoir la coopération sur des questions d’intérêt mutuel, notamment la politique
  industrielle et la coopération économique, les programmes européens, la coopération
  internationale, les enceintes multilatérales, la défense et la sécurité. Nous coopérerons
  étroitement en préparation du Sommet international sur l’espace qui sera organisé
  en France les 9 et 10 septembre 2026, pour mettre en avant l’Europe en tant que
  puissance spatiale de poids, grâce à une vision politique commune, à des investissements
  conséquents aux niveaux européen et national et à une industrie spatiale robuste,
  renommée, compétitive, performante et souveraine. 28. Nous coordonnerons nos positions
  sur les programmes et budgets de l’UE et de l’Agence spatiale européenne , notamment
  en ce qui concerne la mise en œuvre de la préférence de l’UE, la gouvernance et
  les achats de l’Europe relatifs au secteur spatial, le cadre réglementaire qui le
  régit et la gestion des fréquences satellite. Nous rappelons l’importance des efforts
  multilatéraux pour améliorer la gouvernance de l’espace au niveau international
  et le rôle décisif en la matière du Comité des utilisations pacifiques de l’espace
  extra-atmosphérique des Nations Unies que présidera l’Italie en 2026-2027 et qui
  constitue la principale instance mondiale dans ce domaine. 29. Nous avons pour objectif
  stratégique commun la mise au point d’une infrastructure européenne résiliente et
  robuste pour une connectivité sécurisée en orbite terrestre basse, en particulier
  pour des usages gouvernementaux souverains. Nous nous coordonnerons aux fins du
  déploiement efficace et en temps utile de l’infrastructure pour la résilience, l’interconnectivité
  et la sécurité par satellite (IRIS²) , qui est reconnue comme un pilier déterminant
  et indispensable du développement d’une capacité souveraine européenne. Nous promouvrons
  un engagement approprié du paysage industriel des deux pays, notamment en amont
  et en aval du système, et nous échangerons sur nos positions, notamment s’agissant
  de la question du spectre disponible, pour qu’IRIS2 profite à l’ensemble des États
  membres et qu’elle constitue un nouveau pilier majeur de l’autonomie stratégique
  européenne. Par ailleurs, en vue des discussions à venir au sujet de la procédure
  de sélection des services mobiles par satellite pour l’attribution de la bande de
  fréquences de 2 GHz , nous avons pour objectif commun la préservation des intérêts
  souverains européens au sein d’une bande de fréquences limitée et stratégique, en
  soutenant une éventuelle disposition prévoyant l’attribution d’une quantité suffisante
  de spectre aux utilisateurs gouvernementaux concernés, notamment IRIS² . 30. Tandis
  que les négociations sur le CFP se poursuivent, la France et l’Italie intensifieront
  leur coopération pour définir et faire progresser les conditions nécessaires à un
  accord exhaustif et équilibré . Cela implique un travail conjoint sur l’ensemble
  des paramètres , qui consistera à préserver les politiques traditionnelles communes
  majeures de l’UE tout en i nvestissant dans l’innovation et les secteurs stratégiques
  pour sa souveraineté industrielle et technologique , à s’assurer que la modernisation
  du budget bénéficie à tous par la suppression de tous les rabais, ainsi qu’à avancer
  sur la voie de nouvelles ressources propres et à apporter des résultats concrets
  en la matière, en s’appuyant sur les propositions de la Commission et en examinant
  des ressources complémentaires, comme une contribution numérique, afin de mieux
  calibrer le niveau global des dépenses pour qu’il soit à la hauteur de nos ambitions
  et de stabiliser notre contribution nationale au budget de l’UE . 31. En parallèle
  des négociations portant sur les règlements liés au CFP, nous travaillerons main
  dans la main, notamment pour garantir un pilotage fort par les États membres dans
  la gouvernance des instruments de l’UE, une préférence européenne manifeste et ciblée
  dans l’attribution des fonds européens consacrés au renforcement de l’autonomie
  stratégique, de la sécurité économique et de la résilience de l’UE, et un emploi
  optimal de l’effet de levier des fonds européens afin de susciter des investissements
  publics et privés. 32. Nous faisons face à des problématiques communes en matière
  de sécurité et de souveraineté alimentaires , mais aussi en ce qui concerne l’avenir
  de l’agriculture européenne . Nous défendrons des accords commerciaux équilibrés
  et durables , bénéficiant à l’ensemble des parties, qui tiendront compte de l’impact
  cumulé des concessions applicables à nos secteurs agricoles, et nous soutiendrons
  l’adoption de mesures miroirs dans la législation européenne pour mieux protéger
  l’environnement et la santé des consommateurs européens, afin de contribuer efficacement
  à réduire la dépendance de l’UE. Par ailleurs, nous poursuivrons nos efforts visant
  à mettre en œuvre une chaîne de valeur décarbonée, compétitive et souveraine concernant
  les engrais pour veiller à ce que nos agriculteurs aient à tout moment un accès
  sécurisé et abordable à ces produits. Nous saluons le dialogue bilatéral établi
  dans ce domaine, notamment pour promouvoir des appellations d’origine protégées
  et des indications géographiques protégées, ainsi que pour renforcer la coopération
  institutionnelle en matière de recherche, d’éducation et de formation professionnelle
  dans le secteur agricole , qui repose notamment sur nos accords bilatéraux. Nous
  réaffirmons notre volonté commune de préserver une politique agricole commune (PAC)
  et une politique commune de la pêche (PCP) fortes , dotées de ressources suffisantes
  au titre du prochain CFP pour faire face aux enjeux futurs, protéger les revenus
  des agriculteurs et des pêcheurs européens et garantir le renouvellement des générations.
  33. Nous saluons l’organisation du premier Forum pour la science et l’innovation
  à Paris en 2025, qui témoigne de la force de nos liens et de nos collaborations
  dans le domaine scientifique. Nous soutiendrons le développement de dialogues structurés
  entre nos communautés scientifiques, en mettant l’accent sur les priorités bilatérales
  communes comme les technologies quantiques et le calcul à haute performance. 34.
  Nous reconnaissons que les grandes infrastructures de recherche constituent une
  possibilité unique d’accélération des progrès scientifiques et un investissement
  dans la prospérité à long terme de nos peuples. Nous saluons la coopération continue
  entre nos deux pays, notamment la coopération portant sur les ondes gravitationnelles
  qui est incarnée par le projet Virgo de l’Observatoire gravitationnel européen,
  ainsi que les travaux en cours au sein du Conseil des représentants d’États pour
  le Téléscope Einstein. 35. La France et l’Italie reconnaissent l’importance stratégique
  de la recherche polaire pour faire face aux problématiques mondiales, les régions
  polaires constituant des laboratoires naturels essentiels à la compréhension des
  changements climatiques et de leurs répercussions à l’échelle mondiale. Dans cette
  optique, le sommet One Planet - Polar Summit, organisé par la France à Paris en
  novembre 2023, et le Polar Dialogue du Arctic Circle Forum, organisé par l’Italie
  à Rome en mars 2026, ont été deux moments historiques lors lesquels les deux pays
  ont réaffirmé l’importance des sciences, de la coopération internationale et du
  dialogue entre les chercheurs, les responsables politiques et les parties prenantes.
  36. La France et l’Italie fermement déterminées à mettre au point un programme numérique
  pour l’Europe commun pour stimuler la compétitivité, simplifier la réglementation,
  approfondir le marché unique tout en protégeant les droits de l’homme et les compétences
  nationales essentielles et en favorisant l’investissement et l’innovation, renforcer
  les écosystèmes des jeunes entreprises innovantes, notamment au moyen d’instruments
  bilatéraux de collaboration, et atteindre l’autonomie stratégique. Cette stratégie
  commune couvre notamment des questions liées à l’intelligence artificielle (IA),
  concernant laquelle la France et l’Italie soutiennent activement l’initiative européenne
  pour une IA d’avant-garde, ainsi que le lancement d’un projet important d’intérêt
  commun européen relatif à l’IA. Notre engagement commun s’étend également au développement
  des capacités européennes en matière de calcul à haute performance, de télécommunications
  et de technologies quantiques ainsi que de chaînes de valeur sécurisées et résilientes
  dans les secteurs technologiques clés qui sont stratégiques pour l’avenir de l’UE.
  37. Conformément à l’approche présentée dans le programme commun pour l’industrie
  et la compétitivité en Europe et le programme numérique européen commun franco-italiens,
  les discussions portant sur la préférence européenne dans le secteur numérique doivent
  être proportionnées, graduelles et fondées sur des données probantes et constituer
  un levier au bénéfice de l’écosystème encore émergeant de l’Europe afin de renforcer
  les chaînes de valeur technologiques et industrielles et de favoriser la mise au
  point de technologies et de services créant de la valeur en Europe. 38. Par ailleurs,
  la question du lieu où sont stockées, traitées et gérées les données est devenue
  un sujet revêtant une importance stratégique pour la souveraineté et la résilience
  de l’Europe. La France et l’Italie travailleront au niveau européen pour garantir
  le plus haut niveau de protection des données les plus sensibles face à tous les
  risques, notamment ceux découlant de l’application de législations extraterritoriales
  par des pays non membres de l’UE. Avec cette ambition commune, la France et l’Italie
  encouragent l’UE à poursuivre avec détermination la révision en cours du règlement
  sur la cybersécurité et concernant la proposition d’un acte législatif sur le développement
  de l’informatique en nuage et de l’IA , afin d’instaurer un mécanisme crédible pour
  faire face à tous les risques et toutes problématiques en lien avec les technologies.
  La France et l’Italie continueront également de soutenir le développement de communs
  numériques grâce au consortium pour une infrastructure numérique européenne pour
  les communs numériques (DC-EDIC). 39. En vue d’approfondir la coopération sur les
  sujets relatifs au numérique et à l’informatique, la France et l’Italie engageront
  un dialogue bilatéral sur ces thématiques , qui contribuera à promouvoir une approche
  « équipe Europe » coordonnée. Par ailleurs, faire d’internet et des réseaux sociaux
  un endroit sûr et protéger nos enfants et nos adolescents des risques liés au numérique
  est une priorité partagée par nos deux pays. À cet effet, alors que d’importantes
  mesures réglementaires ont été prises au sein de l’UE, en particulier les lignes
  directrices de l’UE relatives à la protection des mineurs en ligne publiées en 2025,
  l’application systématique et efficace du règlement sur les services numériques
  doit rester une priorité. La France et l’Italie défendront une approche ambitieuse,
  globale et axée sur la sécurité dès la conception pour protéger les mineurs en ligne
  dans le cadre du prochain programme numérique de l’UE, notamment grâce à la nécessité
  d’atteindre l’âge de la majorité pour accéder aux réseaux sociaux, dans le respect
  des compétences nationales. Nous œuvrerons à garantir aux utilisateurs des expériences
  sûres, sécurisées et appropriées à leur âge, notamment grâce à des mécanismes de
  vérification de l’âge efficaces et innovants, dans le respect de leur vie privée
  en fonction des juridictions concernées, des situations nationales et des cadres
  juridiques applicables. 40. Nous réaffirmons notre engagement à faire face ensemble
  aux problématiques sans précédent que génère la triple crise planétaire (climat,
  biodiversité, pollutions) aux niveaux bilatéral, européen et multilatéral . Nous
  continuerons à promouvoir la mise en œuvre de l’Accord de Paris et nous travaillerons
  main dans la main pour soutenir les initiatives de coopération internationale associées
  en matière d’atténuation des effets des changements climatiques, notamment celles
  lancées par le G7, en renforçant notre coopération en matière d’adaptation et de
  résilience et en soutenant les efforts visant à mettre en œuvre les plans d’adaptation
  de manière concrète, à améliorer la propension à investir et à promouvoir des partenariats
  qui aident les pays vulnérables à développer leur résilience et à faire face aux
  répercussions croissantes des changements climatiques. 41. Nous renouvelons notre
  collaboration pour soutenir l’intégration des politiques d’adaptation locales, régionales,
  nationales, européennes et internationales et la mise en œuvre de la stratégie européenne
  pour la résilience dans le domaine de l’eau, en renforçant la collaboration au sein
  de la coalition du G7 sur les enjeux hydriques. Nos efforts comprendront également
  la définition de positions communes ambitieuses sur la lutte contre la pollution
  plastique , notamment au moyen d’un instrument international juridiquement contraignant
  et efficace relatif au cycle de vie des plastiques. En outre, nous continuons de
  promouvoir une gestion durable des produits chimiques et des déchets, conformément
  aux engagements multilatéraux, pour réduire leurs effets néfastes sur l’environnement
  et la santé humaine. La promotion des politiques de préservation de la nature sera
  également poursuivie dans le cadre de la Convention alpine et de la Stratégie de
  l’UE pour la région alpine , en particulier en ce qui concerne les glaciers. 42.
  Suite à l’organisation de la troisième Conférence des Nations Unies sur l’océan
  (UNOC3) à Nice en juin 2025, nous veillerons à la coordination étroite de la mise
  en œuvre du pacte européen pour l’Océan adopté par la Commission européenne , notamment
  des dispositions du projet d’acte législatif pour l’Océan . La France et l’Italie
  soutiennent par ailleurs l’adoption formelle de mesures robustes aux fins de la
  décarbonation dans le cadre de l’OMI, conformément à la Stratégie de 2023 de l’OMI
  sur la réduction des émissions de gaz à effet de serre des navires, pour garantir
  entre autres l’égalité des conditions de concurrence à l’échelle mondiale et éviter
  les distorsions qui pourraient nuire à la compétitivité de l’économie européenne.
  43. Nous nous félicitions de la signature d’une Déclaration France-Italie sur les
  mers et l’océan , qui réaffirme notre volonté commune d’intensifier notre coopération,
  notamment en ce qui concerne la Méditerranée et dans le cadre de la Convention de
  Barcelone , pour protéger l’environnement maritime, soutenir le développement d’une
  économie bleue et la résilience des territoires côtiers et insulaires et promouvoir
  l’innovation et la recherche. 44. En tant que pays signataires de la déclaration
  de Brest de février 2022, la France et l’Italie reconnaissent et apprécient le travail
  mené lors des réunions visant à créer le Centre international Mercator pour les
  océans et elles suivent attentivement les avancées du projet. 45. En conséquence
  des changements climatiques, les catastrophes naturelles et d’origine humaine sont
  de plus en plus fréquentes et graves. La situation exige le renforcement de l’efficacité
  du mécanisme de protection civile de l’UE en soutien aux États membres, auxquels
  incombe la responsabilité principale de la gestion de ces crises, comme il a été
  rappelé dans les conclusions du Conseil européen en juin 2025. 46. Nous développerons
  et renforcerons notre coopération bilatérale, européenne et multilatérale afin de
  lutter contre la criminalité organisée et internationale, notamment le trafic de
  drogues . À cet égard, nous avons lancé conjointement la Coalition européenne contre
  les drogues (ECAD) lors du sommet de la Communauté politique européenne (CPE) qui
  s’est tenu le 2 octobre 2025 à Copenhague. Nous mettrons en œuvre la feuille de
  route adoptée lors de la deuxième réunion de l’ECAD qui s’est tenue lors du dernier
  sommet CPE à Erevan le 4 mai dernier, notamment sur la question de la lutte contre
  le trafic maritime et portuaire, contre les flux financiers illicites, le blanchiment
  d’argent, la corruption ainsi que la menace émergente des drogues de synthèse, en
  particulier dans les Balkans occidentaux et adopterons une approche globale comprenant
  la prévention, le traitement et la rémission. Dans ce cadre, la France et l’Italie
  organiseront ensemble une conférence internationale à San Patrignano, la première
  communauté de rémission d’Italie, le 23 octobre 2026. Par ailleurs, nous soutiendrons
  la mise en place d’un nouveau régime de sanctions de l’UE ciblant la criminalité
  organisée , sans préjudice des procédures et de la coopération des services opérationnels
  et judiciaires. 47. Nous renforcerons notre coopération pour lutter contre la menace
  que constituent l’ingérence et la manipulation d’informations de la part d’acteurs
  étrangers , afin de consolider notre résilience démocratique et d’améliorer notre
  capacité de réaction conjointe, notamment grâce au bouclier européen de la démocratie
  et à la mise en place d’un centre européen pour la résilience démocratique , et
  en soutenant la mise en œuvre complète du règlement sur les services numériques
  et en promouvant le mode opératoire informationnel défini par le mécanisme de réponse
  rapide du G7. 48. Réaffirmant l’importance du renforcement des relations entre nos
  peuples, nous nous félicitions des conclusions de la troisième réunion du Comité
  de coopération frontalière créé par le Traité du Quirinal, qui s’est tenue à Aoste
  le 4 juin dernier, pour le renforcement de la coopération entre nos autorités frontalières
  au bénéfice des populations locales. Nous saluons en outre la signature d’un arrangement
  pour la mise en place d’une brigade franco-italienne. 49. Dans ce contexte, nous
  réaffirmons notre attachement commun à l’achèvement de la liaison ferroviaire à
  grande vitesse entre Lyon et Turin sur le plan financier et notre volonté de garantir
  l’accès à cette liaison. Nous nous félicitons de la signature ce jour d’une déclaration
  d’intention sur le développement de la ligne ferroviaire Marseille-Nice-Gênes et
  nous soutenons le lancement de l’appel d’offres pour les nouveaux travaux de percement
  du tunnel historique de Tende. Nous rappelons d’autres réalisations majeures, comme
  la réouverture du tunnel de Tende, l’ouverture du second tube du tunnel de Fréjus
  ainsi que l’entrée en vigueur prochaine, le 1er juillet, de la convention relative
  à l’entretien courant et à l’exploitation de la section située en territoire français
  de la ligne ferroviaire Coni-Breil-Vintimille et l’annonce des travaux prévus sur
  cette ligne. Nous nous réjouissons du lancement de l’appel d’offres pour le redémarrage
  de l’autoroute ferroviaire alpine. 50. Nous poursuivrons nos efforts conjoints pour
  assurer la gestion coordonnée de toutes les liaisons ferroviaires et routières entre
  nos deux pays, notamment grâce au lancement d’une étude conjointe sur la résilience
  et la décarbonation des infrastructures transfrontalières dans la région alpine
  , tenant compte des intérêts spécifiques de nos territoires et autorités locales,
  ainsi que de la nécessité globale d’interconnexion de nos économies. 51. La France
  et l’Italie réaffirment leur attachement commun au renforcement de la coopération
  en matière d’enseignement supérieur, de recherche et de mobilité universitaire,
  qui constitue une contribution stratégique à la mise en place d’un espace européen
  de l’enseignement supérieur plus intégré, plus innovant et plus ouvert à l’international.
  Nous poursuivrons notre étroite collaboration pour la mise en œuvre d’un label « diplôme
  européen » et pour le projet plus vaste d’un éventuel diplôme européen, en soutenant
  des formes de coopération transnationale ambitieuses et inclusives entre les établissements
  d’enseignement supérieur. Nous soulignons également le rôle crucial des alliances
  d’universités européennes, véritables laboratoires de l’avenir de l’enseignement
  supérieur européen, favorisant les programmes conjoints, le multilinguisme, l’innovation
  et une gouvernance académique commune. Une attention particulière sera accordée
  au renforcement de la coopération dans les sciences, les technologies, l’ingénierie
  et les mathématiques, s’agissant notamment des technologies émergentes et des secteurs
  stratégiques pour la compétitivité de l’Europe. Dans ce cadre, nous nous félicitions
  du renforcement de la coopération bilatérale par l’intermédiaire de l’Université
  franco-italienne, du nombre croissant des doubles diplômes et des diplômes conjoints
  entre nos établissements ainsi que du développement des initiatives communes multilatérales
  visant à accroître l’attractivité des universités et leur ouverture à des pays tiers,
  notamment aux pays méditerranéens et africains, conformément à la dimension internationale
  de l’espace européen de l’enseignement supérieur. 52. La jeunesse est au cœur de
  notre coopération bilatérale. Partageant l’objectif d’aider les jeunes de nos deux
  pays à mieux se connaître et à découvrir davantage la France et l’Italie, nous sommes
  heureux d’annoncer le lancement d’un nouveau programme « Jeunes Talents » entre
  la France et l’Italie, ainsi que la mise en place d’un comité transfrontalier sur
  la mobilité des jeunes , qui permettra aux jeunes de se rencontrer et de participer
  au renforcement de l’amitié franco-italienne. 53. Nous nous félicitons du renforcement
  des liens, déjà étroits, entre nos deux pays dans le domaine de l’enseignement et
  de la formation professionnelle , avec la signature d’une déclaration d’intention
  particulière visant à faciliter le passage des jeunes de l’enseignement à la vie
  professionnelle grâce à l’échange d’informations sur les initiatives réussies et
  au développement de partenariats entre les établissements des deux systèmes de formation
  technique et professionnelle, aux niveaux de l’enseignement secondaire et supérieur.
  Dans ce même état d’esprit, nous sommes déterminés à moderniser nos administrations
  publiques respectives et à renouveler et rajeunir les effectifs du secteur public,
  en permettant à nos administrations de partager les bonnes pratiques en matière
  de gestion intergénérationnelle, de parcours professionnels, de développement des
  compétences, de gestion prévisionnelle de l’emploi et d’utilisation de l’intelligence
  artificielle dans le secteur public, et nous attendons avec intérêt de pouvoir nous
  appuyer sur les résultats de cette démarche pour renforcer notre coopération dans
  ce domaine. 54. Nous nous félicitons du niveau élevé d’apprentissage et de maîtrise
  des langues française et italienne , atteint grâce à la mise en place de nombreuses
  initiatives visant à promouvoir et à améliorer l’enseignement de nos deux langues,
  ainsi que du renforcement de certains mécanismes comme l’Esabac . 55. Nous saluons
  le retour des Jeux olympiques et paralympiques en Europe avec trois éditions en
  seulement six ans et nous renforcerons à cet égard notre coopération et nos échanges
  d’expérience dans le domaine du sport, du volontariat des jeunes et de l’organisation
  des grands événements sportifs internationaux. 56. Nous soulignons que nos partenariats
  culturels jouent un rôle essentiel dans nos efforts communs visant à construire
  une UE plus forte. Dans cette perspective, nous saluons la signature de plusieurs
  arrangements renforçant la coopération bilatérale pour la protection et la valorisation
  de notre patrimoine culturel commun et pour le soutien à la coopération entre nos
  industries culturelles et créatives. L’élargissement de la portée du programme de
  résidences artistiques « Nouveau Grand Tour » aux métiers de l’artisanat permettra
  de renforcer davantage la connaissance mutuelle entre nos artistes et créateurs.
  La France et l’Italie sont des pionnières en matière de coproduction et de codistribution
  cinématographiques et audiovisuelles : nos autorités compétentes étendront le champ
  de leur collaboration afin de soutenir nos artistes et nos industries et de promouvoir
  encore la diversité culturelle . Le programme de coopération audiovisuelle mettra
  en avant l’expertise conjointe de nos deux pays, par l’intermédiaire d’un comité
  bilatéral, afin de défendre des mesures règlementaires européennes ambitieuses.
  Nous œuvrerons ensemble à la protection, au renforcement et à la promotion de notre
  vaste patrimoine culturel commun. Nous avons décidé de renforcer les synergies entre
  nos bibliothèques nationales et les organismes chargés de la préservation de notre
  patrimoine. 57. Nous nous réjouissons de célébrer en 2027 l’Année européenne des
  Normands , qui marquera le millénaire de la naissance de Guillaume le Conquérant,
  afin de mettre en lumière les liens historiques étroits entre nos deux pays et,
  plus particulièrement, entre la Normandie et le sud de l’Italie.'
