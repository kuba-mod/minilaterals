title: State Visit by the King and Queen of the Kingdom of Thailand, Their Majesties
  Maha Vajiralongkorn, Rama X, and Suthida Bajrasudhabimalalakshana.
text: The President of the Republic and his wife welcomed Their Majesties King Maha
  Vajiralongkorn, Rama X, and Queen Suthida Bajrasudhabimalalakshana of Thailand on
  Monday, June 29, 2026, at the Élysée Palace. As France and Thailand celebrate the
  170th anniversary of the establishment of diplomatic relations this year, this state
  visit underscores the strength of the ties between our two countries and provides
  an opportunity to deepen our cooperation. This state visit to France is the first
  since that of Their Majesties King Bhumibol Adulyadej and Queen Sirikit, who were
  welcomed by General de Gaulle in 1960, and the first to Europe during the reign
  of Rama X. Prime Minister Anutin Charnvirakul, who had traveled to France for a
  working visit from May 22 to 25, 2026, accompanied the King on this occasion. Upon
  their arrival, Their Majesties Maha Vajiralongkorn, Rama X, and Suthida Bajrasudhabimalalakshana
  were welcomed at the Hôtel national des Invalides. They then proceeded to the Élysée
  Palace for a presentation of archival materials illustrating Franco-Thai relations,
  followed by a state dinner.
