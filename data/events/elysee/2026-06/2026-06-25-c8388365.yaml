date: '2026-06-25'
type: press_release
source_name: elysee
title: Franco-Italian joint statement.
text: '1. On the occasion of the 36th Franco-Italian Summit held on June 25th, 2026,
  we celebrate the friendship, deep-rooted in history and geography, that binds France
  and Italy, reflected in the Treaty for a Strengthened Bilateral Cooperation, known
  as the “Quirinal Treaty” , signed on November 26th, 2021. 2. The Quirinal Treaty
  constitutes a cornerstone of our relationship and a key instrument for strengthening
  our cooperation for the benefit of our countries, our peoples as well as the future
  and prosperity of the EU and the European continent. 3. Faced with numerous challenges,
  we reaffirm our common will to deliver on a more united, sovereign, democratic,
  resilient and competitive Europe. We will deepen, to this end, our ever-close bilateral
  cooperation, especially in the political, economic, agricultural, social, educational,
  scientific and cultural spheres, as well as in industrial and innovative sectors
  that are strategic for the future of our nations and of the European Union. 4. We
  reaffirm our common will to strengthen the ties between France and Italy, particularly
  with regard to future generations, and to exploit further all the opportunities
  offered by the Quirinal Treaty. 5. In a challenging geopolitical environment characterized
  by the return of war on the European continent, driven by Russia’s war of aggression
  against Ukraine, by multiple crises in our neighbourhood and a rise in hybrid threats,
  we reaffirm our commitment to the rules-based international order and our will to
  further deepen Franco-Italian cooperation on foreign, security and defence policy
  across all fields . This cooperation will be strengthened at bilateral, European
  and multilateral levels, in all relevant frameworks such as the United Nations, NATO,
  the G7/G20, the European Political Community or the E5 format . 6. We reiterate
  our support to Ukraine’s independence , sovereignty and territorial integrity within
  its internationally recognized borders. In coordination with like-minded partners
  and allies, we will continue to provide comprehensive political, financial, economic,
  humanitarian, diplomatic and military support to Ukraine and its people, including
  by backing its recovery and reconstruction. 7. Russia’s current imperialist posture
  poses a direct threat to the whole European continent, as its aggression against
  Ukraine has deeply undermined the security and stability of our entire region. For
  this reason, Europe has a key role to play in a future settlement and to defend
  its security interests. While Ukraine has consistently demonstrated its full readiness
  to enter into meaningful negotiations, Russia must show the same commitment. To
  this aim, and to compel Moscow to the negotiating table, we are determined to exert
  utmost pressure on Russia by adopting additional sanctions packages, fully implementing
  those already adopted and fighting against any circumvention. We are committed to
  targeting Russia’s energy revenues and constraining its financial sector, including
  its banking system or the use of cryptoassets. We will strengthen our operational
  cooperation in the fight against its shadow fleet. A just and long-lasting peace
  based on fundamental rules of international law is the only acceptable way out from
  the ongoing war. 8. The Mediterranean stability , security and development remains
  our shared strategic priority. In this context, we support the Pact for the Mediterranean
  focusing on strengthening relations between the EU and its Southern Mediterranean
  partners through a practical framework of cooperation based on mutual trust, joint
  responsibility and shared ownership. By promoting connectivity, resilience and inclusive
  growth, we will support the Pact, both in scaling up our bilateral cooperation and
  through joint action at EU level, to address common challenges while contributing
  to long-term stability and shared prosperity across the Mediterranean region. 9.
  Alongside the pursuit of security and stability, Italy and France advocate for an
  inclusive approach that combines the prevention, containment and resolution of crises
  and conflicts with the promotion of an ambitious positive agenda. We support economic
  development as an essential instrument for promoting peace and stability across
  the region, with particular attention to youth employment, vocational training,
  sustainable water resource management, food security and the energy transition,
  while strengthening coordination with Mediterranean partner countries, international
  financial institutions and the private sector. These efforts build upon established
  Euro-Mediterranean partnership frameworks and the European Union’s engagement with
  its Southern Neighbourhood as key pillars of regional prosperity and stability.
  10. With regard to the situation in the Middle-East , we emphasise the importance
  of mitigating the impact of the conflict on regional partners, civilian populations
  and critical infrastructure, and the need to coordinate humanitarian aid efforts.
  We recall that diplomacy is the only way to reduce tension, and to bring about a
  lasting solution to end hostilities. We welcome the signing of the memorandum of
  understanding between the United States and Iran and we will work with our European
  and regional partners to support a long-term diplomatic settlement ensuring that
  Iran will never acquire a nuclear weapon. We are committed to playing our part in
  permanently restoring free and safe navigation in the Strait of Hormuz. Any arrangement
  governing navigation in the Strait should be in accordance with the law of the sea,
  and be adopted in line with relevant procedures at the IMO. We remain united in
  our commitment to the two-state solution for Israel and Palestine , which we firmly
  believe is the only way to enable Israelis and Palestinians to live side by side
  in peace, security and dignity, within secure and recognised borders and to ensure
  peace and security for all in the region. We will jointly keep supporting the efforts
  of the Lebanese authorities to restore full sovereignty over their territory, notably
  through the monopoly on the use of force and arms. To this end, we will support
  the establishment of a CSDP mission to Lebanon this fall 2026, which will work with
  all the relevant actors, such as the MTC4L, and will be consistent with bilateral
  initiatives in the country. We strongly support UNIFIL and underline its essential
  role in consolidating progress following the ceasefire. We will collaborate together
  on post-UNIFIL reflections co-leading an international coalition to support Lebanon
  in a post-UNIFIL context. 11. We reaffirm our commitment to a partnership of equals
  with Africa , responsive to the priorities of African partners and in line with
  European interests, and recognise the commitments of Italy’s “Piano Mattei” as reaffirmed
  at the second Italy-Africa Summit in Addis Ababa, and France’s engagement on the
  Continent as recently outlined at the “Africa Forward” Summit in Nairobi, with a
  view to fostering coordinated and mutually reinforcing initiatives across the continent.
  In this framework, Italy and France will cooperate in the implementation of the
  EU’s Global Gateway strategy, working together in ensuring a clear and efficient
  Member States’ led governance within the future Global Europe instrument and promoting
  joint initiatives in a Team Europe approach. Italy and France will continue to deepen
  their coordination on peace and stability on the African continent, in support of
  African-led solutions within our partnership with the African Union, especially
  as regards CSDP operations and missions. 12. Official Development Assistance remains
  a fundamental tool for addressing crucial challenges and supporting sustainable,
  inclusive and resilient growth across the Continent. Italy and France intend to
  intensify their cooperation in Africa in key sectors of mutual interest, including
  energy, digital, sustainable agriculture and food security, health, vocational training
  and the creation of opportunities for young people, also through common European
  cooperation frameworks. The Parties also reaffirm their common determination to
  maintain their engagement and support for countries affected by severe humanitarian
  crises, including Sudan, working together with African partners and the international
  community to promote stability, resilience and long-term development. 13. Building
  on the Letta and Draghi reports, we will work together to enhance the competitiveness and
  sustainability of our economies, while ensuring our economic security both at national
  and EU level through effective protection of our critical assets, companies and
  infrastructure, de-risking in critical and strategic sectors, deterrence in particular
  towards any form of coercion, and reinforced cooperation with trusted partners.
  We will support the simplification and adaptation of the EU State aid framework
  to facilitate investments in strategic sectors, while preserving the integrity of
  the Single Market and ensuring a level playing field among Member States. We are
  committed to deepening and expanding our already strong economic, trade and investment
  bilateral ties, such as the joint program of BpiFrance and Invitalia and the MoU
  between BpiFrance and CDP. Together with other EU partners, we are committed to
  advancing Single Market priorities, including the Savings and Investments Union
  , notably through the swift conclusion in 2026 of Securitization and the Market
  Integration and Supervision Package, building on the agreed E6 Finance terms. We
  will also work closely together to strengthen the competitiveness of the European
  banking sector , ensuring that the upcoming European agenda address in a coherent
  manner the level playing field, simplification of the prudential framework and further
  integration of the EU banking market. 14. Following the signing of a Shared Agenda
  for Industry and Competitiveness in Europe on March 3rd 2026 and the Shared European
  Digital Agenda on May 5th 2026, France and Italy will uphold their joint commitment,
  especially with regards to the Automotive industry, Energy intensive industries,
  Critical Raw Materials, Semiconductors and Net zero industrial sectors. A swift
  negotiation of the Industrial Accelerator Act will support the EU production of
  goods in strategic industrial sectors in the EU, to be applied in all relevant legislations,
  public procurement, auctions as well as in EU and national public support schemes.
  15. More specifically regarding the Automotive industry, we will cooperate to ensure
  that regulations empower the industry to fulfil Europe’s ambition of becoming a
  leader in decarbonised mobility while safeguarding industrial jobs in Europe, taking
  into account technological neutrality and European content. We support proposals
  aiming at incentivize investments contributing to consolidate a robust industrial
  base for the vehicles of the future within the EU 16. With regards to civil aviation,
  we acknowledge the interconnexion of our industrial bases and value chains and successful
  cooperation such as in regional aviation industry. We reaffirm our commitment to
  support the sector''s transition towards decarbonization, including through SAF
  (Sustainable Aviation Fuel), and to ensure the global leadership of the European
  industry in this transition. 17. France and Italy will develop their joint efforts
  to address the challenge of small parcels and ultra-fast fashion, in line with the
  December 2025 joint letter to the Commission. 18. France and Italy will advance
  a joint European approach to safeguard and strengthen the competitiveness of the
  fashion and luxury value chains, recognised as strategic assets for Europe’s cultural
  identity, industrial excellence and global projection. In this respect, we fully
  support the upgrade in the cooperation between our haute couture and fashion federations.
  19. The energy crisis spurred by the situation in the Middle East also highlights
  the need for the EU to accelerate its decarbonation , also through diversification
  of energy supply and sources and based on the principle of technological neutrality
  , to reduce, as quickly as possible, our dependencies to fossil fuels and build
  a genuine strategic autonomy in the energy sector in particular by mobilizing all
  decarbonized energy sources, nuclear and renewables while prioritizing the development
  of strong European value chains. We share the aim of strengthening our efforts in
  the field of grids and interconnections , in order to enhance the resilience of
  our energy systems. 20. We welcome our long-standing and close collaboration in
  civil nuclear energy, including within the framework of the European Nuclear Alliance
  and in the joint coordination of the Important project of common European interest
  (IPCEI) on Innovative Nuclear Technologies, and we are determined to further strengthen
  our dialogue, including at the research and industry level and within the EU, enabling
  new joint work on long term common projects. We also welcome the growing industrial
  cooperation on Small Modular Reactors, which reflects the depth of our industrial
  and technological ecosystem. We encourage further joint efforts on European solutions
  for SMRs and advanced nuclear technologies, including through the involvement of
  the wider Italian and French industrial supply chains and through cooperation with
  companies active in fourth-generation reactors, with a view to supporting European
  technological and industrial sovereignty. 21. Our joint efforts will also aim at
  achieving an effective revision of the EU Emissions Trading System (ETS) to reduce
  the volatility of the carbon price and mitigate its impact on electricity prices,
  while preserving the essential role of the ETS in the climate and energy transition
  through a market-based price signal for carbon emissions that drives investment
  and innovation. 22. We are committed to further strengthening our cooperation on
  EU enlargement and reforms , to promote and consolidate peace, stability, prosperity
  and security on the European continent . We will continue to pursue a merit approach
  accession process and equal treatment for the Western Balkans, Moldova and Ukraine.
  23. With regard to migration , we will cooperate closely on key EU legislation,
  in particular to ensure the effective implementation of the Pact on Migration and
  Asylum and the new return regulation. We will strengthen our bilateral and European
  cooperation in the fight against irregular migration and migrant smuggling networks,
  in line with the Action Plan adopted by the G7 Ministries of Interior in 2024. We
  will continue to develop the external dimension of EU migration policy and comprehensive
  partnerships with third countries of origin and transit, strengthening operational
  coordination, information exchange and actions, inter alia in North Africa and in
  the Sahel region. Our joint effort will focus in particular on better preventing
  irregular migration flows through the Central Mediterranean route and the Channel
  route. We recognize the importance of assisted voluntary returns from transit countries
  to countries of origin of migratory flows. 24. We will further invest in defence
  capability development, contributing to European defence readiness in a way that
  helps build a stronger Europe in a stronger NATO. We strongly support the development
  of a robust European defence technological and industrial base. We will, in this
  regard, work to implement the priority capability areas already identified by the
  European Council, building on the European Defence Fund and the European defence
  industry programme (EDIP), which strengthens European industries. We emphasize the
  importance of designing, in particular within the next Multiannual Financial Framework
  (MFF), and implementing the EU instruments contributing to reducing our strategic
  dependencies and reinforcing our sovereignty on technologies, based on the agreed
  European preference criteria which also allow for cooperation with our partners.
  We acknowledge that a stronger and more capable European Union in the field of security
  and defence, in full complementarity with NATO’s commitments and achievements, will
  contribute positively to global and transatlantic security. We commend the ongoing
  work on common procurement. We also welcome the work conducted within the ELSA initiative,
  that paves the way for short to long-term cooperation for the European defence industrial
  and technological base to develop, produce and deliver. 25. We reaffirm our commitment
  to developing joint capability projects in the defence sector, in particular within
  the EDIP’s European defence projects of common interest (EDPCI), that shall contribute
  to EU strategic autonomy, in domains such as, inter alia, space, maritime, integrated
  air missile defence, robotic combat units for land operations, and with a wide focus
  that enhances European defence from a 360-degree perspective. We share the goal
  of building a competitive European defence and technology industrial base, including
  by building on the ongoing bilateral projects on air defence, such as SAMP/T NG
  and the further future interceptor against hypersonic threats . The conclusion of
  a new bilateral roadmap in the field of defence (2026-2031) and the establishment
  of a bilateral industrial strategic committee will further strengthen our dialogue
  on these issues. 26. We will enhance our close cooperation in the space domain ,
  building on corporate initiatives in favour of innovation, European sovereignty
  and global competitiveness, such as the Bromo project , the progress of which we
  welcome and support. We will strengthen our ties in the areas of access to space
  by supporting the ramp-up of Ariane 6 and VEGA C, in line with the growing European
  strategic demand and leveraging the mutual support of our respective industries
  for critical supplies. We will also reinforce our cooperation in exploration, Earth
  observation, satellite telecommunications and Space Situational Awareness (SSA)
  with a specific focus on promoting the opportunities for further cooperation on
  space for defence. Recognizing space as an essential source of knowledge and understanding,
  as well as an element of sovereignty and independence, we will continue to promote
  space science and exploration. 27. With the aim to strengthen the dialogue and coordination
  between the relevant national administrations and agencies of the two countries
  in charge of space dossiers, regular bilateral space consultations at the appropriate
  technical level will be held to promote coordination on issues of mutual interest,
  such as industrial policy and economic cooperation, European programs, international
  cooperation, multilateral forums, defence, and security. We will closely coordinate
  in the run-up to the International Space Summit that will be held in France on 9-10
  September 2026, to promote Europe as a strong space power, thanks to a shared political
  vision, substantial investments at European and national levels and a solid and
  recognized competitive, capable and sovereign space industry. 28. We will coordinate
  our positions on EU and European Space Agency (ESA) programmes and budget definition
  , including as regards to the implementation of EU preference, European space governance
  and procurement, Space regulatory framework and the satellite frequencies management.
  We recall the importance of multilateral efforts to advance international space
  governance and the central role in this regard of the UN Committee on the Peaceful
  Uses of Outer Space, that Italy chairs in 2026-2027, as the main relevant global
  forum. 29. We share the strategic objective of developing a European resilient and
  robust infrastructure for secure connectivity in Low Earth Orbit, in particular
  for sovereign governmental use cases. We will coordinate towards the effective and
  timely deployment of Infrastructure for Resilience, Interconnectivity and Security
  by Satellite (IRIS²) , identified as a critical and necessary backbone for the development
  of a European sovereign capability. We will promote a proper involvement of both
  countries’ industrial landscapes, including in the upstream and downstream of the
  system, and coordinate to discuss our positions including on the issue of spectrum
  capacity, ensuring IRIS2 will prove to benefit all Member States and constitute
  a major new pillar of European strategic autonomy. Furthermore, in the upcoming
  discussions on the MSS 2GHz band selection process, we share the objective of preserving
  European sovereign interests in a scarce and strategic frequency band, supporting
  a possible provision for the assignation of a sufficient amount of spectrum to dedicated
  Governmental users including IRIS² . 30. France and Italy will intensify their cooperation
  as negotiations now proceed on the MFF, so as to frame and further progress on the
  necessary conditions needed to reach a comprehensive and balanced agreement . This
  implies joint work on all parameters : preserving our key traditional EU common
  policies while investing in innovation and strategic sectors for European industrial
  and technological sovereignty ; making sure that the modernisation of the EU budget
  is for everyone - thus abolishing all rebates; moving forward and delivering on
  new own resources , building on the Commission’s proposals and examining complementary
  resources such as a digital contribution, so as to better calibrate the overall
  level of expenditure to match our ambitions as well as stabilise our national contributions to
  the EU budget . 31. In parallel negotiations on MFF related regulations, we will
  work together to ensure, inter alia, a strong Member States’ led governance in EU
  instruments, a clear and targeted European preference in the allocation of EU funds
  dedicated to strengthening the Union’s strategic autonomy, economic security, and
  resilience, as well as a maximized leverage effect of EU funds to trigger public
  and private investments. 32. We face common challenges regarding food security and
  sovereignty as well as the future of European agriculture . We will defend balanced
  and sustainable trade agreements , with reciprocal benefits, which take into account
  the cumulative impacts of concessions for our agricultural sectors, as well as support
  mirror measures in EU legislation to better protect the environment and the health
  of EU consumers, so as to effectively contribute to reduce EU’s dependencies. We
  will also continue to work to implement a decarbonized, competitive and sovereign
  chain of value for fertilizers to strengthen a secure and affordable access for
  our farmers at all time. We welcome the bilateral dialogue established in this area,
  particularly with a view to promoting protected designations of origin and protected
  geographical indications as well as strengthening institutional cooperation in the
  field of agricultural research, education and vocational training , based in particular
  on our bilateral agreements. We reiterate our shared commitment to the preservation
  of a robust common agricultural policy (CAP) and common fisheries policy (CFP),
  with sufficient resources in the next MFF to meet future challenges, to preserve
  the incomes of European farmers and fishermen and to ensure the renewal of generations.
  33. We welcome the organisation of the first Forum for science and innovation held
  in Paris in 2025, demonstrating the strength of our scientific ties and collaborations.
  We will support the development of structured dialogues between our scientific communities,
  focusing on shared bilateral priorities such as quantum technologies and high-performance
  computing. 34. We recognize that Large Research Infrastructures represent a crucial
  opportunity to advance scientific progress as well as an investment in the long-term
  prosperity of our peoples. We express appreciation for the continued cooperation
  between our two countries, especially with regard to gravitational waves as embodied
  in the EGO-VIRGO project, including the ongoing work within the Einstein Telescope
  BGR. 35. Italy and France recognize the strategic importance of polar research in
  addressing global challenges, with the Polar regions serving as essential natural
  laboratories for understanding climate change and its worldwide impacts. In this
  spirit, the One Planet – Polar Summit, hosted by France in Paris in November 2023,
  and the Arctic Circle Forum – Polar Dialogue, hosted by Italy in Rome in March 2026,
  stand as two key moments through which both countries reaffirmed the importance
  of science, international cooperation, and dialogue among researchers, policymakers
  and stakeholders. 36. France and Italy are strongly committed to developing a shared
  European digital agenda in order to boost competitiveness, simplify regulation,
  deepen the single market while preserving human rights and essential national competences,
  and fostering investment and innovation, strengthen the start-up ecosystems also
  by means of bilateral collaboration tools and achieve strategic autonomy. This shared
  strategy covers, in particular, issues relating to artificial intelligence, where
  France and Italy actively support the European Initiative for frontier AI, as well
  as launching an IPCEI on AI. Our shared commitment also extends to increasing European
  capacities in high-performance computing, telecommunications, quantum technologies
  as well as secure and resilient value chains in key and strategic technological
  sectors for the future of the EU. 37. In line with the approach presented in the
  Franco-Italian Shared Agenda for Industry and Competitiveness in Europe and the
  Shared European Digital Agenda, the discussion around European preference in the
  digital sector should be proportionate, gradual and evidence-based and as a lever
  to support Europe’s still emerging digital ecosystem, to strengthen industrial technology
  value chains and to foster the development of technologies and services providing
  value in Europe. 38. The question of where data is stored, processed and governed
  has become, as well, a matter of strategic importance for Europe''s sovereignty
  and resilience. France and Italy will work at the European level to ensure the highest
  level of protection for the most sensitive data against all risks, including those
  stemming from the application of non-EU extraterritorial laws. With this shared
  ambition, France and Italy encourage the EU to advance resolutely, through the ongoing
  revision of the Cybersecurity Act and the proposed Cloud and AI Development Act
  , to establish a credible mechanism capable of addressing all these technological-related
  risks and challenges. France and Italy will also keep supporting the development
  of digital commons through the Digital Commons-EDIC (European digital infrastructure
  consortium). 39. With a view to deepen cooperation on digital and cyber topics,
  France and Italy will establish a bilateral dialogue on these matters , which will
  contribute to promote a coordinated “Team Europe” approach. We also share the priority
  to make the internet and social media a safe place and to protect our children and
  teenagers from digital risks . As significant regulatory steps have been taken within
  the EU, especially the EU Guidelines on protection of minors online published in
  2025, consistent and effective enforcement of the Digital Services Act must remain
  a priority as regards this matter. France and Italy advocate for an ambitious, comprehensive
  and safety-by-design approach to safeguarding minors online as part of the forthcoming
  EU digital agenda, including through a digital age of majority for accessing social
  media, respecting national competences. We will work to ensure a safe, secure and
  age-appropriate experiences including through effective and innovative age assurance
  mechanisms while preserving the privacy of users according to respective jurisdictions,
  national circumstances and applicable legal frameworks. 40. We reaffirm our commitment
  to tackling together the unprecedented challenges posed by the triple planetary
  crisis (climate, biodiversity, pollutions) at the bilateral, European and multilateral
  levels . We will continue to promote the implementation of the Paris Agreement and
  will work together on supporting related international cooperation initiatives,
  including those launched by the G7, on mitigation and by strengthening our cooperation
  on climate adaptation and resilience, supporting efforts to translate adaptation
  planning into concrete implementation, enhance investment readiness and promote
  partnerships that help vulnerable countries build resilience and address the growing
  impacts of climate change. 41. We are renewing our collaboration to support the
  integration of local, regional, national, European and international adaptation
  policies and the implementation of the European Water Resilience Strategy, strengthening
  collaboration within the G7 Water Coalition. Our action will also cover the definition
  of ambitious common positions on combating plastic pollution , in particular through
  an effective international legally-binding instrument addressing the life-cycle
  of plastics and we also continue to promote sustainable management of chemicals
  and waste, in line with multilateral commitments, to reduce negative impacts on
  the environment and human health. The promotion of conservation policies will also
  be pursued within the framework of the Alpine Convention and the European Strategy
  for the Alpine Region , particularly with regard to glaciers. 42. Following the
  UNOC3 organised in Nice in June 2025, we will ensure a close coordination on the
  implementation of the European Ocean Pact adopted by the European Commission , including
  with respect to the proposed Ocean Act . Italy and France also support the formal
  adoption of robust measures for decarbonation within the framework of the International
  Maritime Organisation (IMO), in line with the IMO’s 2023 Strategy on the reduction
  of greenhouse gas emissions from ships, not least to ensure a “level playing field”
  at global level and avoid distortions that could affect the competitiveness of the
  European economy. 43. We welcome the signing of a Franco-Italian declaration on
  the seas and the Ocean , which reaffirms our joint commitment to intensify our cooperation,
  particularly with regard to the Mediterranean and in the framework of the Barcelona
  Convention , in protecting the marine environment, supporting the development of
  the blue economy and the resilience of coastal and island communities, and promoting
  innovation and research. 44. As signatory countries to the Brest Declaration of
  February 2022, Italy and France recognise and value the work carried out during
  the meetings aimed at establishing the Mercator International Centre for the Ocean
  and are closely monitoring the latest developments. 45. Natural and man-made disasters
  have increased substantially in frequency and severity as a result of climate change.
  This calls for a strengthening of the effectiveness of the EU Civil Protection Mechanism
  (UCPM) in support of Member States, which retain primary responsibility for managing
  such crises, as recalled by the European Council in its conclusions of June 2025.
  46. We will scale up and reinforce our bilateral, European and multilateral cooperation to
  fight organised and international crime, in particular drug trafficking . In this
  regard, we have launched jointly a European Coalition against Drugs (ECAD) at the
  European Political Community (EPC) summit in Copenhagen on October 2nd, 2025. We
  will implement the roadmap adopted at the second meeting of the ECAD at the last
  EPC summit in Yerevan, on May 4th, especially as regards tackling maritime and port
  trafficking, combatting illicit financial flows, money laundering, corruption, as
  well as the emerging threats of synthetic drugs, in particular in the Western Balkans
  and adopting a comprehensive approach that includes prevention, treatment and recovery.
  In this framework, Italy and France will jointly host an international conference
  in San Patrignano, the leading recovery community in Italy, on October 23rd, 2026.
  We will also support delivering on a new EU sanctions regime targeting organised
  crime , not prejudicial to law enforcement and judicial procedures and cooperation.
  47. We will strengthen our cooperation to tackle the threat posed by the interference
  and manipulation of information by foreign actors , in order to bolster our democratic
  resilience and improve our joint response capacity, notably through the European
  Democracy Shield and the set-up of a European Centre for Democratic Resilience ,
  also supporting the full implementation of the Digital Services Act, and endorsing
  the Information Manipulation Set defined by the G7 Rapid Response Mechanism. 48.
  Reaffirming the importance of strengthening our people-to-people relations, we commend
  the outcome of the third meeting of the Cross-Border Cooperation Committee established
  by the Quirinal Treaty, which took place on June 4th in Aosta, with the aim to reinforcing
  the cooperation between our bordering authorities for the benefit of their local
  communities. We also welcome the signing of a memorandum for the establishment of
  a joint Franco-Italian brigade. 49. In this context, we reaffirm our shared commitment
  for the completion of the high-speed rail link between Lyon and Torino in terms
  of funding and to ensure access to it. We welcome the signing, today, of a declaration
  of intent on the development of the Marseille – Nice – Genoa railway line, and support
  the launch of the tender for the re-boring works on the historic Tende tunnel. We
  recall other important achievements, such as the reopening of the Tende Tunnel , the
  opening of the second tube of the Fréjus Tunnel as well as the entry into force,
  on July 1st, of the convention on the operation of the exploitation of the Cuneo–Breil–Ventimiglia rail
  link located on French territory and the announcement of the works scheduled on
  the line. We welcome the launch of the tender for the resumption of the Alpine Rail
  Highway. 50. We will continue our joint efforts to ensure the coordinated management
  of all rail and road links between our two countries, including through the launch
  of a joint study on the resilience and decarbonation of cross-border infrastructures
  in the Alpine region , taking into account the specific interests of our territories
  and local authorities, as well as the overarching need of interconnection of our
  economies. 51. France and Italy reaffirm their shared commitment to strengthening
  cooperation in higher education, research and academic mobility, as a strategic
  contribution to the construction of a more integrated, innovative and internationally
  open European Higher Education Area. We will continue to work closely together on
  the implementation of the European Degree Label and on the broader pathway towards
  a possible European Degree, supporting ambitious and inclusive forms of transnational
  cooperation between higher education institutions. We also underline the key role
  played by the European Universities Alliances as laboratories for the future of
  European higher education, fostering joint programmes, multilingualism, innovation
  and shared academic governance. Particular attention will be devoted to strengthening
  cooperation in Science, Technology, Engineering and Mathematics (STEM) disciplines,
  including emerging technologies and strategic sectors for Europe’s competitiveness.
  In this framework, we welcome the strengthening of bilateral cooperation through
  the Italian-French University (UIF/UFI), the growing number of double and joint
  degrees between our institutions, and the development of common multilateral initiatives
  aimed at enhancing academic attractiveness and openness towards third countries,
  particularly in the Mediterranean and Africa, in line with the international dimension
  of the European Higher Education Area. 52. Youth is a key focus of our bilateral
  cooperation. Sharing the aim of helping young people from both countries to get
  to know one another better and to discover more about France and Italy, we are thrilled
  to announce the launch of a new “Young Leaders programme” between France and Italy,
  as well as the establishment of a Cross-border Committee on Youth Mobility , which
  will enable young people to meet and play a full part in strengthening Franco-Italian
  friendship. 53. We welcome the strengthening of already close ties between our two
  countries in the field of education and vocational training, with the signing of
  a specific declarations of intent, aimed at facilitating youth transition from education
  to work, by sharing knowledge of successful initiatives and developing partnerships
  between institutions of the two technical and vocational training systems at secondary
  and tertiary level. In the same spirit, we are committed to modernising our public
  administrations and to renewing and rejuvenating the public sector workforce, allowing
  our administrations to share best practices on intergenerational management, careers
  and skills development, strategic workforce planning and the use of artificial intelligence
  in the public sector, and we look forward to building on its outcomes to deepen
  our cooperation in this field. 54. We welcome the high level of uptake and learning
  of Italian and French, achieved through numerous initiatives to promote and develop
  the teaching of our languages, and the strengthening of schemes such as the ESABAC.
  55. As France and Italy welcome the return of the Olympics and Paralympics Games
  in Europe, with three editions in only six years, we will strengthen our cooperation
  and exchange of experience in the field of sports, youth volunteering and organization
  of major international sporting events. 56. We stress that our cultural partnerships
  play a key role in our joint effort to build a stronger European Union. In this
  view, we welcome the signing of several memoranda strengthening bilateral cooperation
  for the protection and enhancement of our shared cultural heritage and supporting
  collaboration between our cultural and creative industries. The extension of the
  scope of the “Nouveau Grand Tour” artist-in-residence programme to craft disciplines
  will further foster mutual knowledge between our artists and creators. Italy and
  France are pioneers in film and audiovisual co-production and co-distribution: our
  relevant authorities will broaden the scope of their collaboration to support our
  artists and our industries and further promote cultural diversity. The audiovisual
  cooperation programme will promote our two countries’ joint expertise, through a
  bilateral committee, to champion ambitious European policy measures. We will work
  together to protect, enhance and promote our vast common cultural heritage. We agreed
  to strengthen synergies between our national libraries as well as our entities in
  charge of preserving heritage. 57. We look forward to celebrating the 2027 European
  Year of the Normans, timed with the millennium of William the Conqueror, to highlight
  the profound historical connections between our two countries and specifically between
  Normandy and Southern Italy.'
