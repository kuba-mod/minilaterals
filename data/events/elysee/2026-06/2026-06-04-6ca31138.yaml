  pu longuement discuter à la fois de plusieurs de ces accords qui étaient en train
  d''être finalisés et où vous avez pu vous rendre devant l''Assemblée nationale et
  le Sénat auprès des commissions compétentes, ce qui était un moment important, et
  je vous en remercie. Cette visite aujourd''hui au Monténégro est importante pour
  la France et pour l''amitié entre nos deux pays ; importante par son caractère inédit,
