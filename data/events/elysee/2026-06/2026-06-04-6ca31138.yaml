  en vos grades et qualités, chers amis, permettez-moi de vous remercier, Monsieur
  le Premier ministre, pour l''accueil et les échanges. Nous avons eu l''occasion
  avec Monsieur le président, précédemment, de nous exprimer, d''échanger avec d''ailleurs
  beaucoup de celles et ceux qui font la relation bilatérale. Et je suis très heureux
