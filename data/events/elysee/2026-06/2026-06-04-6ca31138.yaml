  son cheminement vers l''Union européenne et accueille demain, dirais-je même dès
  ce soir, un sommet entre l''Union européenne et les pays de la région. Tout au long
  de cette journée, nous avons pu mesurer la profondeur de la qualité de la relation
  entre nos deux pays, mais aussi son potentiel pour les années à venir. Et les accords
  qui ont été signés, pour lesquels je refélicite les signataires, les discussions
  que nous avons eues, y compris avec les acteurs économiques, culturels, institutionnels,
