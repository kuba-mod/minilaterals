date: '2026-06-04'
type: press_release
source_name: elysee
title: 'Déplacement au Monténégro : première journée.'
text: 'Le Président de la République s''est rendu au Monténégro les jeudi 4 et vendredi
  5 juin dans le cadre d’une visite bilatérale puis du Sommet UE-Balkans occidentaux.
  Alors que le Monténégro célèbre les 20 années de son indépendance , cette visite
  a permis d’approfondir la dynamique de notre relation bilatérale dans plusieurs
  secteurs stratégiques : Il s''agit de la première visite d''un Président français
  au Monténégro depuis l''indépendance. Après avoir été accueilli par le Président
  du Monténégro, Jakov Milatović , les deux chefs d''États se sont entretenus en tête-à-tête
  avant de s''adresser à la presse. Le Président Emmanuel Macron a notamment apporté
  le soutien de la France aux réformes engagées par le Monténégro dans le cadre de
  son processus d’adhésion à l’Union européenne. Emmanuel MACRON Merci beaucoup. Merci,
  Monsieur le Président, cher Jakov, pour tes mots à l''instant et cet accueil. Nous
  sommes très heureux, avec les ministres, les parlementaires, l''ensemble de la délégation
  qui m''accompagne, d''être à vos côtés aujourd''hui, parmi vous, au Monténégro pour
  la première visite d''un Président de la République française dans l''histoire de
  nos relations bilatérales. C''est un honneur, d''autant que cette visite intervient
  à un moment particulièrement symbolique pour votre pays, 20 ans après la restauration
  de votre indépendance, mais aussi un moment important pour toute la région, à la
  veille d''un sommet entre l''Union européenne et les États des Balkans occidentaux.
  Je voudrais remercier avant toute chose, très chaleureusement, le Président Milatović,
  cher Jakov, pour son accueil ici, à Cetinje. Nous avons eu l''occasion de nous entretenir
  de sujets d''intérêt commun et nous allons poursuivre tout au long de la journée
  et demain avec nos collègues. Je suis très heureux de vous retrouver tout particulièrement
  dans cette ville, à Cetinje, donc ancienne capitale royale où s''est forgée l''identité
  monténégrine. Mais aussi certains de nos liens bilatéraux, comme en témoigne l''ancienne
  légation française à quelques rues d''ici, que nous irons voir tout à l''heure,
  construite il y a 115 ans de cela, qui venait aussi témoigner du fait que la France,
  dès après le Congrès de Berlin, fut parmi les premiers à reconnaître dès ce moment-là
  le Monténégro, comme nous l''avons fait aussi il y a 20 ans dans un contexte plus
  contemporain. Vous l''avez dit, votre pays s''est toujours illustré dans la région
  par sa capacité à se défendre, à rester souverain, à défendre son identité, son
  histoire, sa force. Tout cela force le respect. Au fond, je voudrais essentiellement
  avoir deux messages à votre endroit ce matin. Le premier, ce sont nos relations
  bilatérales. Nous développons un partenariat et nous voulons développer un partenariat
  ambitieux avec le Monténégro. La France n''était pas à sa juste place jusqu''alors
  ici, nous n''étions pas suffisamment investis et présents. Nous avons ensemble,
  ces dernières années, beaucoup réinvesti la relation bilatérale. D''abord, elle
  correspond à notre histoire, au lien singulier qui est le nôtre, qui a pu irriguer
  notre littérature, qui a aussi inspiré plusieurs de vos dirigeants. Vous avez fait
  référence à Nicolas. Nous avons beaucoup progressé ces dernières années grâce à
  la signature d''un accord intergouvernemental qui facilite le développement de nos
  coopérations économiques autour notamment des secteurs de la santé, des infrastructures
  et de l''énergie. Nous signerons tout à l''heure d''importants accords qui sont
  les illustrations qui vont nous permettre, avec nos entreprises, avec l''Agence
  française de développement, les ministères compétents, de décliner ces accords dans
  tous les domaines que je viens d''évoquer, avec le grand projet d''hôpital, des
  grands projets d''infrastructures et des projets d''énergie, entre autres. Je n''oublie
  évidemment pas aussi notre coopération en matière de défense, avec la livraison
  future de deux patrouilleurs qui sont actuellement en cours de construction à Concarneau,
  et le projet aussi emblématique que nous portons ensemble, Monténégro, Slovénie
  et France, avec le Centre de développement des capacités cyber à Podgorica. Je veux
  ici aussi dire que notre relation bilatérale va nous permettre d''avancer ensemble
  sur des sujets d''intérêt commun. Je pense à la lutte contre les ingérences étrangères
  et à la manipulation de l''information, où, là aussi, nous avons des coopérations
  entre nos meilleurs experts qui sont en train de s''établir, entre les agences que
  nous avons mises en place, car nos démocraties sont à protéger partout et la France
  a bâti une expertise que nous souhaitons partager avec vous. Le deuxième message,
  il est pour l''Europe. Vous l''avez dit, Monsieur le Président, la France est aux
  côtés du Monténégro pour continuer de l''accompagner alors que vous êtes dans la
  dernière ligne droite de l''adhésion. Nous parlerons tout à l''heure et nous parlerons
  demain avec notre collègue de notre vision pour l''ensemble de la région, car il
  est important dans mon esprit que nous continuions de concilier la nécessité de
  reconnaissance des mérites propres à chaque candidat et l''unité de la région. Je
  veux ici saluer le remarquable travail que vous avez conduit ces dernières années
  vous-même, votre Premier ministre et le Gouvernement. Vous avez réussi à mener des
  réformes très profondes, à parachever déjà le travail sur de nombreux chapitres,
  à les ouvrir tous et à avancer avec détermination, force, et au fond, cette volonté
  européenne, notre devoir. Moi qui crois profondément à cette réunification de l''Europe,
  c''est de l''accompagner, parce que c''est une chance, je crois profondément, pour
  votre pays, pour la région, pour l''Europe, d''avoir des dirigeants jeunes qui veulent
  moderniser leur pays et qui ont compris que la souveraineté du pays va avec l''adhésion
  à l''Europe, choisie, décidée, pour plus de croissance, de prospérité, de paix et
  la protection des démocraties. À ce titre, nous serons à vos côtés pour vous permettre
  d''avancer dans les prochains mois et tenir les objectifs ambitieux que vous vous
  êtes donnés, parce que je crois qu''en la matière, seule l''ambition permet d''avoir
  des résultats. Je veux ici vous redire combien la France est et sera à vos côtés,
  renforçant ce faisant l''indéfectible amitié entre nos deux pays. Vive le Monténégro,
  vive la France et vive l''amitié entre nous. Journaliste Monsieur le Président Milatović,
  Monsieur le Président de la République, vous avez parlé des ingérences étrangères
  ici au Monténégro comme en France. Est-ce que vous êtes favorable sur ce sujet à
  la remise en cause du titre de séjour de Xenia Fedorova qui est accusée par des
  députés européens, mais pas seulement, d''être une propagandiste du Kremlin. Concernant
  la guerre en cours au Moyen-Orient, cette nuit, un soldat de la Finul a été tué.
  C''est intervenu juste avant l''annonce d''un cessez-le-feu entre le Liban et Israël,
  un cessez-le-feu extrêmement fragile, qui est aussi dépendant du désarmement du
  Hezbollah. Que peut faire la France concrètement pour préserver ce cessez-le-feu,
  le rendre durable ? Est-ce que, d''ailleurs, nous soutenons cette démarche ? Merci
  beaucoup. Emmanuel MACRON Merci beaucoup. Pour ce qui est de votre première question,
  d''abord, ce n''est pas le Président, par une décision souveraine, qui remet en
  cause les titres de séjour ou qui les donne. C''est une bonne chose. Il y a des
  règles et des procédures dans notre pays, il faut qu''elles soient respectées. Quant
  au fond de l''affaire, je n''ai pas attendu qu''elle soit commentée aujourd''hui.
  Je vous renvoie à ce que je disais à Versailles en juin 2017. Assez clairement,
  en présence du Président Poutine, devant une personne qui était à l''époque en charge
  prétendument d''un média, mais de ce qui était une agence de propagande d''État.
  Les choses n''ont pas changé, je pense la même chose. Pour ce qui est du Liban,
  je veux d''abord, ici, m''incliner avec beaucoup de respect devant la mémoire du
  soldat serbe qui est tombé et qui faisait partie des troupes de la Finul, qui, malheureusement,
  accompagne ses frères d''armes français, indonésiens, ghanéens, qui ont aussi eu
  à subir ces pertes durant ces dernières semaines dans le cadre de cette opération
  des Nations Unies que nous conduisons. Je veux représenter à la Serbie tout notre
  respect. Nous soutenons le cessez-le-feu entre le Liban et Israël, et tout ce qui
  permet, en effet, de restaurer la paix, de lutter contre les activités terroristes,
  et de pleinement établir la souveraineté et l''intégrité territoriale du Liban.
  Dans ce cadre, la France se tient, évidemment, comme nous l''avons toujours fait,
  à disposition pour avancer sur ce chemin. Il y a un mécanisme de coordination qui
  a été mis en place, où les États-Unis et la France sont ensemble. Si le cessez-le-feu
  est sérieux, c''est ce mécanisme qu''il faut réactiver pour pouvoir faire le suivi
  et vérifier sa mise en œuvre. Il faut ensuite définir les voies et moyens de permettre
  de restaurer la souveraineté libanaise et le retour des forces armées libanaises
  pour retrouver le monopole des armes, car c''est bien de cela dont il s''agit. Monopole
  des armes aux forces armées libanaises, intégrité territoriale libanaise et souveraineté
  libanaise sur son territoire et maintien du cessez-le-feu dans la durée pour une
  paix durable. C''est la politique que nous défendons, c''est celle que nous sommes
  prêts à soutenir. Journaliste Monsieur le Président Macron, bienvenue au Monténégro.
  Président Milatović, merci de cette occasion. Ma question est adressée à tous les
  deux. Monsieur Macron, par rapport à l''année prochaine et les élections présidentielles
  en France, les résultats de cette élection pourront-ils, à votre avis, influencer
  la position française qui est celle du soutien à la voie européenne du Monténégro,
  et bien sûr, en fonction de la fermeture par le Monténégro de tous les chapitres
  de négociations prévus ? La même question est adressée au Président du Monténégro,
  mais aussi dans le contexte de tous les autres membres de l''Union européenne qui
  auront leurs élections d''ici 2027 et 2028. Merci. Emmanuel MACRON La question que
  vous posez est légitime, elle a existé dans tous les processus d''adhésion que nous
  avons connus. Tout au long de notre histoire, à chaque fois que nous avons conduit
  des élargissements, ils ont eu à être approuvés par les autres États membres. À
  chaque fois, évidemment, les États, les Gouvernements, les dirigeants qui, au nom
  de ces États, avaient pu accompagner un processus qui prend des années pour aller
  vers l''adhésion, n''étaient pas forcément ceux qui étaient là lorsque l''adhésion
  se finalisait. Je ne vais pas ici préempter le vote des Français. Dans un peu moins
  d’un an, ils auront à s''exprimer. Je serai ici prudent. Mais quoi qu''il arrive,
  il me semble que la garantie qu''il s''agisse de la France, comme de tous les pays
  de l’Union européenne qui ont des élections à venir, plus le Monténégro est résolu
  dans ses réformes, plus il avance vite sur ce chemin de l''adhésion, ce qu''il fait,
  plus il est clair dans ses explications, y compris à l''égard de l''ensemble des
  formations politiques, quelle que soit leur sensibilité, ce que font votre Président
  et votre Premier ministre en se déplaçant dans les capitales. Ils ont encore été
  voir nos parlementaires récemment, plus l''adhésion se fera. Je suis à cet égard
  confiant. Comme vous le savez, en France, il y a plusieurs voies possibles, celle
  du référendum, celle aussi qui est à la main de ceux qui dirigeront, d''aller vers
  les majorités déterminées dans les deux chambres. En tout cas, je pense que si ce
  processus est continu sur ce chemin, c''est-à-dire un vrai volontarisme des réformes
  faites et qui est incontestable, je ne fais pas d''inquiétude au-delà du raisonnable.
  Si je pouvais me permettre un conseil, d''abord, comme je le rappelle, je n''ai
  pas ici à préempter ni le vote des Françaises et des Français, ni celui qui se fera
  dans tous les autres pays. Ne doutez pas de vous. Quand on est sur un chemin si
  difficile, il y a toujours mille et une raisons de dire c''est très difficile, il
  va arriver ceci, cela. Il y a beaucoup de gens pour écrire les scénarios de malheur
  qui justifient l''inaction. On a les meilleurs experts partout, c''est vrai dans
  tous les pays, vous savez. La chose qui permet de réussir, c''est de faire et d''y
  croire. Croyez en vous, ayez confiance en vous. Le chemin qui a été fait, en l''espace
  de plus de deux ans est remarquable et même au-delà de ce que beaucoup croyaient,
  il vient après déjà des premières réformes et je suis très confiant parce que je
  vous vois croire en vous, mais continuez et le reste suivra. Emmanuel MACRON Merci
  beaucoup. Merci, Monsieur le Président, cher Jakov, pour tes mots à l''instant et
  cet accueil. Nous sommes très heureux, avec les ministres, les parlementaires, l''ensemble
  de la délégation qui m''accompagne, d''être à vos côtés aujourd''hui, parmi vous,
