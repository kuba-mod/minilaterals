title: 'Sommet du G7 d''Évian : deuxième jour.'
text: 'Le Président de la République et Brigitte Macron ont accueilli le Sommet du
  G7 à Évian du 15 au 17 juin 2026. Après avoir accueilli Volodymyr Zelensky , Président
  de l''Ukraine, ce mardi matin, le Président Emmanuel Macron a participé à une réunion
  de travail sur le thème « Construire la paix et la sécurité pour l''Ukraine et l''Europe
  », en présence des pays du G7 et de l''Ukraine. Puis, le Président de la République
  a accueilli les chefs d''État et de gouvernement de la République arabe d''Égypte,
  des É mirats arabes unis et de l''É tat du Qatar avant de prendre part à un déjeuner
  de travail sur l''enjeu de « Faire face aux crises et garantir la stabilité au Moyen-Orient
  ». À 15 heures, une photographie de famille a été prise avec les derniers chefs
  d''État et de gouvernment arrivés : Brésil, Inde, Corée du Sud et Kenya. La réunion
  de travail « Nouer de nouveaux partenariats et rebâtir la solidarité internationale
  » a ensuite eu lieu en présence des pays du G7, des pays partenaires, de la Banque
  mondiale et de la Banque africaine de Développement. En fin d''après-midi, des entretiens
  bilatéraux se sont déroulés avant que le Président de la République et Brigitte
  Macron accueillent un dîner de gala en l''honneur des chefs de délégation et de
  leurs conjoints. Retrouvez les déclarations adoptées ce mardi 16 juin ci-dessous :
  Appel des chefs d''État et de gouvernement à une réponse coordonnée à l''épidémie
  d''Ébolavirus de Bundibugyo. Appel des chefs d''État et de gouvernement sur la lutte
  contre le cancer. Déclaration des chefs d''État et de gouvernement sur des partenariats
  internationaux mutuellement bénéfiques. Déclaration des chefs d’État et de gouvernement
  sur la lutte contre le trafic de drogues. Déclaration des chefs d’État et de gouvernement
  sur la lutte contre le trafic de migrants. Déclaration des chefs d’État et de gouvernement
  du G7 sur les questions géopolitiques.'
