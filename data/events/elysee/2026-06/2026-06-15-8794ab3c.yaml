title: Déclaration des leaders sur le mémorandum d’entente entre les États-Unis et
  l’Iran.
text: Nous saluons chaleureusement l’annonce du mémorandum d’entente entre les États-Unis
  et l’Iran. Nous félicitons les États-Unis, le gouvernement iranien ainsi que tous
  les acteurs impliqués, y compris le Pakistan, le Qatar et tous les autres médiateurs,
  pour cette avancée diplomatique. C’est un moment d’opportunité pour rétablir la
  stabilité régionale et stabiliser l’économie mondiale. Il est désormais essentiel
  que les négociations détaillées aboutissent et que cet accord soit mis en œuvre
  rapidement et pleinement. Nous sommes prêts à soutenir cet effort. La réouverture
  urgente du détroit d’Ormuz, avec une liberté de navigation inconditionnelle et sans
  restriction, est indispensable. Nous nous engageons à jouer notre rôle pour y parvenir
  — conformément à nos exigences constitutionnelles respectives — y compris par une
  mission strictement défensive et indépendante visant à rassurer le trafic commercial
  et à mener des opérations de déminage. L’Iran ne doit jamais se doter de l’arme
  nucléaire. Nous sommes prêts à travailler avec les États-Unis, l’Iran et l’AIEA
  à cette fin. Nous sommes disposés à lever les sanctions pertinentes en réponse à
  des mesures claires et vérifiables de la part de l’Iran concernant son programme
  nucléaire. Nous travaillerons de manière intensive avec les États-Unis, l’Iran et
  les partenaires régionaux pour saisir cette opportunité, maintenir le momentum et
  parvenir à un règlement diplomatique à long terme. Nous réaffirmons également notre
  plein soutien à la stabilité, à la souveraineté et à l’intégrité territoriale du
  Liban, et à l’importance d’un cessez-le-feu robuste. Liste des pays signataires
  : Allemagne, Australie, Canada, Chypre, France, Grèce, Italie, Japon, Royaume-Uni.
