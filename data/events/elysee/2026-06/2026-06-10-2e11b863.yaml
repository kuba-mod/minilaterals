date: '2026-06-10'
type: press_release
source_name: elysee
title: Déplacement à l'hôpital Robert Debré.
text: 'Le Président Emmanuel Macron s''est à l’Hôpital Robert-Debré à l’occasion de
  la pose de la première pierre de l’Institut du Cerveau de l’Enfant (ICE), ce mercredi.
  Le chef de l’État et son épouse ont échangé avec les équipes scientifiques et médicales
  ainsi qu’avec des familles concernées par les troubles du neurodéveloppement. Ce
  déplacement a permis de mettre en lumière l’ambition portée par l’Institut du Cerveau
  de l’Enfant, qui réunit recherche fondamentale, recherche clinique et innovation
  afin d’accélérer les découvertes au bénéfice des patients et de leurs proches. À
  travers cet investissement, la France se dote d’ un outil d’excellence pour mieux
  comprendre le cerveau de l’enfant et lui donner toutes les chances de se développer,
  de grandir et de construire son avenir. Suite à une rencontre avec les familles
  et les professonnels du service de psychiatrie de l''enfant et de l''adolescent
  du Professeur Richard Delorme , la cérémonie de pose de la première pierre a eu
  lieu. Bonjour Mesdames, Messieurs. Je salue notre ministre, nos ministres qui sont
  là, nos parlementaires, nos élus, Madame la préfète, le directeur général de l’AP-HP,
  l''ensemble des responsables d''organismes de recherche, d''institutions qui sont
  présents, et puis tous les soignants qui sont là, les familles et les enfants. Beaucoup
  de choses ont été dites, et c''est assez difficile, en fait, de parler après vous
  deux, je dois le dire. Mais on a eu l''occasion avant d''en dire un mot. Je voulais
  peut-être ajouter juste 5 choses, de là où on est, parce que tout a été présenté
  par vous et par vous, Madame la directrice générale. D''abord, vous dire que la
  conviction d''investir dans l''enfance, elle est là et il faut qu''elle continue,
  parce que c''est investir - ça semble être une platitude de le dire - mais dans
  l''avenir de la nation. Et quand on regarde les choix collectifs qu''on fait bien
  souvent, nos choix collectifs ne vont pas toujours vers les enfants ou les générations
  à venir. Et bien souvent, les choix collectifs se font par commodité ou par court-termisme
  vers ce qui est déjà présent, vers ce qui est déjà là, ce qui est déjà apparent.
  Ma conviction profonde, c''est qu''investir dans nos enfants, pour à la fois mieux
  connaître, mieux accompagner, et je dis ça avec beaucoup de reconnaissance pour
  déjà toutes celles et ceux qui soignent, qui accompagnent, qui éduquent et, quand
  on dit ça collectivement, je ne remets absolument pas en cause ce qui est fait,
  l''immense tâche qui est déjà à l''œuvre, mais on voit qu''on en a besoin et que
  c''est en fait le meilleur investissement que la Nation puisse faire pour elle-même
  et son avenir. C''est tout ce qui a été fait avec les 1 000 premiers jours, la stratégie
  nationale pour l''autisme et les troubles du neurodéveloppement, les assises de
  la pédiatrie, ce qui a été fait pour la santé mentale des enfants, des adolescents.
  Parce que mieux on comprend, plus on peut agir tôt, voire prévenir ; plus on va
  ajouter des opportunités, plus on va réduire des souffrances à des enfants, à des
  adolescents ou à des familles. Et ça, c''est la première chose. C''est très important.
  On n''est qu''au début. Il y a beaucoup de choses qui ont été améliorées grâce à
  vous toutes et à vous tous, et je suis infiniment reconnaissant, mais il y a encore
  énormément de choses à faire. La deuxième chose que je voulais vous dire, c''est
  qu''on va faire avec cet institut du cerveau de l''enfant, et grâce aussi à la qualité,
  déjà, du soin, de la recherche qu''il y a dans notre pays, une référence mondiale
  dans la recherche sur le cerveau de l''enfant. Et en effet, cet institut du cerveau
  de l''enfant, il incarne, vous l''avez très bien rappelé, vous me l''avez parfaitement
  réexpliqué tout à l''heure, cette discussion entre la recherche, le soin, l''innovation,
  l''éducation, les familles, l''interdisciplinarité aussi entre les différents chercheurs
  et les soignants. Et il s''inscrit très bien dans cette discipline qu''on a sur
  les troubles du neurodéveloppement, parce que tout ce qui cloisonne ne permet pas
  de bien comprendre et pas de bien traiter. Et la complexité est telle, quand on
  parle du cerveau, que si on fait travailler tout seul le généticien ou tout seul
  l''imagerie, on n''a sans doute pas la réponse, et que si on sépare la science de
  l''éducation, on n''a pas le bon accompagnement pour les familles. Et donc là, on
  va faire vraiment un centre de référence mondial, ici. On va, à côté évidemment
  de l''ICE, avoir aussi toute la dynamique de la stratégie nationale, et puis les
  cinq centres d''excellence qui ont été consolidés, et le sixième qui a été créé
  cette année au CHU de Bordeaux. Et puis le groupement d''intérêt scientifique sur
  les troubles du neurodéveloppement qui poursuit son essor, beaucoup d''entre vous,
  j’en reconnais les visages, en sont les acteurs. Avec plus de 500 équipes partenaires
  dans le monde. Il y a 150 équipes françaises, mais il y a une dynamique aussi qui
  est internationale, européenne. Vous avez vous-même dit tout à l''heure que R2D2
  a été financé par l''Europe, et donc on en a besoin. Et là, c''est France 2030 qui
  vient accompagner ce projet, avec au total un soutien qui sera au final d''un peu
  plus de 60 millions d''euros. Le troisième point sur lequel je voulais insister,
  c''est la puissance scientifique qu''il y a derrière cet institut du cerveau de
  l''enfant. Et je veux évidemment remercier ici les équipes de l''hôpital et l''ensemble
  des équipes partenaires à l''AP-HP dans tous les services, mais également l''Inserm,
  Pasteur, le CEA, l''Université Paris Cité. L''institut du cerveau de l''enfant c’est
  déjà, parce qu''on va donner une unité de lieu avec cette première pierre dans les
  18 mois à venir. Mais je veux quand même rappeler ce que ça représente : ce sont
  20 équipes de recherche, 10 services hospitaliers, 400 professionnels mobilisés,
  déjà plus d''une cinquantaine de publications scientifiques en 2025, une trentaine
  d''essais cliniques en cours, une cohorte de 4 000 enfants suivis, 62 plateformes
  technologiques, dont l''une des rares IRM 7T en France. Et donc, il y a vraiment
  une puissance scientifique derrière tout ça, et on va encore la démultiplier parce
  que cette interdisciplinarité in situ, qui va pouvoir se faire ici, elle permettra
  des innovations, elle permettra de la mutualisation. Quatrième message que je voulais
  avoir, c''est, et on l''a rappelé, au fond, votre témoignage le dit très bien, et
  l''hommage que vous avez rendu au professeur Delorme et à ses équipes était bouleversant,
  c''est qu''il y a la volonté de comprendre, de chercher, de continuer à avancer,
  mais pour offrir des solutions, pour aider des vies. Celle de Joshua, de sa famille,
  celle de Maya, qu''on a vu aussi, et de tous les enfants qui sont là. Et donc, c''est
  une excellence scientifique et je crois que c''est la force aussi du modèle français,
  de ce qu''on a dans nos hôpitaux, une recherche qui est toujours aussi une recherche
  clinique, c''est d''apporter des solutions à nos enfants, à leurs familles, et d''aller
  vers un repérage plus précoce, des diagnostics plus rapides. Et c''est vrai que
  tout à l''heure, quand Joshua nous a expliqué qu''il a passé 5 ans, en fait, pour
  être diagnostiqué, passant d''un établissement à l''autre, on voit toute la souffrance,
  l''inquiétude et ce que vous avez décrit derrière, et aussi des accompagnements
  plus personnalisés, parce que c''est ça ce que, à la fois, l''Institut du cerveau
  de l''enfant va permettre de faire et la recherche va permettre d''affiner. Et aujourd''hui,
  on ne parle pas d''un petit sujet. Je rappelle toujours les statistiques avec ce
  qu''elles ont de limitant, mais on dit qu''il y a un enfant sur 6 en moyenne qui
  souffre de troubles du neurodéveloppement, et on sait qu''on a un enfant sur 5 qui
  a des difficultés d''apprentissage. Ça ne veut pas dire que c''est un enfant sur
  5 qui va être un décrocheur ou qui ne pourra pas apprendre, vous l''avez très bien
  dit, mais c''est un enfant sur cinq à qui il faudra apporter une réponse, soit pour
  l''aider à l''école différemment, soit pour aménager son temps scolaire ou son environnement
  familial, soit pour qu''il ait aussi un soutien médical. Cette réponse, si elle
  n''est pas individualisée, elle ne peut pas marcher. Et c''est là aussi où le décloisonnement
  entre la médecine, l''éducation et la famille, il est vital pour ces enfants et
  pour, évidemment, leur famille et leurs proches. Derrière tout ça, c''est aussi
  des solutions très concrètes pour nos enfants, pour leur famille. Et au fond, l''Institut
  du cerveau de l''enfant, c''est une formidable source d''espoir contre la fatalité
  ou les assignations, parce que vous l''avez dit, quand un papa entend sur son enfant :
  “ce ne sera jamais pour lui”. Ce n''est pas vrai, c''est du défaitisme ou du fatalisme.
  Il y a toujours une réponse. En tout cas, notre responsabilité, c''est toujours
  de nous battre. Et puis enfin, je voudrais vous dire que c''est pour nous un projet
  au service des familles et des territoires. Et d''ailleurs, c''est comme ça que
  vous l''avez voulu. Ce projet, vous l''avez rappelé tout à l''heure, il est né de
  vos discussions dans le cadre de cette magnifique mission des 1 000 premiers jours.
  Et vous êtes ici des équipes de soins qui sont au contact de populations, dans un
  territoire qui a ses difficultés. Vous avez proposé, vous avez voulu, on a accompagné
  ce choix de faire cet Institut du cerveau de l''enfant comme un acteur majeur du
  soin sur ce territoire qui en a besoin, de le mettre au cœur d''une stratégie de
  ce qu''on appelle « l''aller vers », mais de le mettre là où il y a des besoins,
  là, où il y a des patients, et pas dans un endroit hors sol. L''Institut du cerveau
  de l''enfant, c''est déjà un acteur majeur du soin, avec environ 10 000 hospitalisations
  de jour, 65 000 consultations-examens chaque année, et donc un vrai défi de santé
  qu''il faut continuer d''accompagner et qui va permettre de renforcer, et avec une
  volonté aussi qui est ancrée dans le projet, évidemment, du Nord-Est parisien, et
  qui est un projet à la fois parisien et francilien, mais qui est véritablement de
  réduire les inégalités territoriales qui sont aussi souvent des inégalités de santé
  et de santé publique. C''est pourquoi ce projet correspond aussi à la stratégie
  qui est portée par l’AP-HP, qui est portée par la ministre et à laquelle, on croit
  très profondément. Voilà. C''était les 5 choses que je voulais ajouter à ce qui
  a déjà été dit. Au fond, c''est ce que vous faites chaque jour et ce que cet Institut
  du cerveau de l''enfant va permettre d''accélérer, de reconnaître. C''est en aidant
  à mieux comprendre ce qu''est le cerveau de l''enfant, de permettre à chaque enfant
  d''avoir la vie qu''il mérite et de s''épanouir et c''est la plus belle chose. On
  vit dans un moment du pays qui est très dur, à plein d''égards, et qui nous a tous
  beaucoup choqués, mis en colère, profondément attristés, parce que c''est une enfant
  qui a été touchée. Et chaque jour, quand des enfants sont touchés, c''est quelque
  chose qui nous bouleverse. Et je veux ici dire tout mon soutien à nos compatriotes
  qui chaque jour font de leur mieux pour soigner, pour éduquer, pour protéger nos
  enfants. C''est la plus belle mission de la République et de la Nation et je suis
  très heureux, très fier d''être à vos côtés pour juste accompagner des idées que
  vous aviez et c''est notre responsabilité de le faire. Je suis très reconnaissant
  aux femmes et aux hommes que vous êtes qui chaque jour vous battez pour cela et
  œuvrez, donnez de votre temps. Et je veux ici redire toute mon estime et tout notre
  soutien aux familles et aux enfants. Bonjour Mesdames, Messieurs. Je salue notre
