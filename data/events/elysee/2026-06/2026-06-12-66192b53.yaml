title: Disparition de Frank Michael.
text: Figure de la variété francophone, voix familière des scènes belges et françaises,
  Frank Michael avait chanté l’amour et conquis les cœurs. L’artiste vit le jour près
  de Parme au début des années 1950 et partit très jeune pour la Belgique, où il s’installa
  avec ses parents à Seraing. Passionné de guitare, de piano et de chanson, il courut
  les radio-crochets dès l’adolescence, en parallèle de son emploi de technicien en
  électronique. En 1974, il sortit son premier 45 tours, « Je ne peux vivre sans toi
  », qui lança sa carrière. Sa sincérité, sa voix douce, son répertoire romantique
  et chaleureux lui valurent l’affection du public, notamment féminin. Il chantait
  « Dites-lui que je l’aime », « Entends ma voix », ou « Toutes les femmes sont belles
  », l’un de ses plus grands succès. Discret, peu habitué de la télévision et de la
  radio, Frank Michael se faisait connaître par les galas et les tournées. Du rire
  aux larmes, sa musique consolait autant qu’elle émouvait. Sa notoriété dépassa la
  France et la Belgique, pour se diffuser dans d’autres pays européens et au Canada.
  Il chanta les textes de Michel Mallory, Didier Barbelivien, mais aussi de Johnny
  Hallyday, qui lui écrivit une chanson pour l’album Entre nous, en 2003. La même
  année, Frank Michael diversifia son style et réalisa l’un de ses rêves avec son
  disque « Thank you Elvis », reprenant des titres de l’idole de son enfance, enregistrés
  à Nashville même, avec les musiciens du « King ». En 2024, après une vie toute dédiée
  à la musique, il annonça une tournée d’adieu, ultime rendez-vous avec un public
  qui lui était resté fidèle depuis un demi-siècle. Le Président de la République
  et son épouse saluent la mémoire d’un artiste populaire, dont la voix aura accompagné
  plusieurs générations. Ils adressent à sa famille, à ses proches, ainsi qu’à son
  public, leurs condoléances émues.
