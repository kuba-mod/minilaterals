title: Disparition de Charlie Dalin.
text: 'Navigateur, ingénieur naval, vainqueur du Vendée Globe, Charlie Dalin avait
  conquis la France par son talent, sa ténacité et cette force silencieuse qui faisait
  de lui l’un des plus grands marins de sa génération. Sa disparition est celle d’un
  champion d’exception qui avait fait de l’océan son horizon. Né au Havre le 10 mai
  1984, Charlie Dalin grandit face à la Manche, dans une ville ouverte sur les vents,
  les départs et les rêves de large. À six ans, il découvrit l’Optimist, puis la voile
  légère avec le désir, un jour d’y inscrire sa propre route. Cette passion devint
  une vocation. Formé à l’ingénierie navale à Southampton, passé par des cabinets
  d’architectes et des chantiers navals en Suède, en Thaïlande et en Australie, Charlie
  Dalin pensait les bateaux autant qu’il les menait. Revenu en France, il rejoignit
  l’équipe technique d’Armel Le Cléac’h, avant de lancer son propre projet. Deuxième
  de la Mini-Transat en 2009, puis admis au Pôle d’entraînement de Port-la-Forêt,
  en sept saisons, il signa cinq podiums sur la Solitaire du Figaro. Lors de l’édition
  2020-2021, Charlie Dalin avait été le premier à franchir la ligne d’arrivée aux
  Sables-d’Olonne, avant d’être classé deuxième. Il se fit une promesse de gagner
  l’édition suivante. Le 10 novembre 2024, il prit le départ du Vendée Globe. Fidèle
  à sa réserve, il mena son combat contre la maladie comme il menait ses courses :
  avec courage et pudeur. Dans les mers du Sud, il livra un duel magnifique avec Yoann
  Richomme. En décembre, dans l’océan Indien, son choix audacieux de se placer en
  avant d’une immense dépression disait tout de lui : l’intelligence de la mer, le
  sang-froid, l’audace maîtrisée. Revenu du large le 14 janvier 2025, il entra dans
  le chenal des Sables-d’Olonne en vainqueur. En 64 jours, 19 heures, 22 minutes et
  49 secondes, il établissait un record historique et offrit à la France un moment
  de bonheur sportif et de fierté populaire. La révélation de la condition médicale
  du champion donna à son exploit une profondeur plus grande encore. Charlie Dalin
  n’avait pas voulu que la maladie vole la lumière de sa victoire mais que l’on voie
  d’abord la mer, le bateau, l’arrivée, la joie simple d’un marin ayant rejoint son
  rêve. Le Président de la République et son épouse saluent la mémoire d’un immense
  marin, une force du destin qui aura porté très haut les couleurs de notre pays sur
  toutes les mers du monde. Ils adressent à son épouse Perrine, à son fils Oscar,
  à sa famille, à ses proches, à ses compagnons de mer et à la grande famille de la
  voile leurs condoléances les plus émues.'
