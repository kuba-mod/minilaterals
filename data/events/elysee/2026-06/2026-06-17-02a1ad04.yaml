title: Dîner avec Donald Trump, Président des États-Unis d’Amérique au château de
  Versailles.
text: À l’occasion du 250e anniversaire de l’indépendance des États-Unis d’Amérique,
  le Président Emmanuel Macron et son épouse ont accueilli le Président américain Donald
  Trump au château de Versailles, le mercredi 17 juin 2026. Haut lieu de l’amitié
  franco-américaine , c'est au château de Versailles que fut signé en 1783 le traité
  consacrant l’indépendance des États-Unis. Le Président américain a signé à Versailles
  un protocole d'accord de paix mettant fin aux hostilités en Iran et dans la région.
  Après une visite de l'exposition « Versailles et l’indépendance américaine » , le
  dîner a eu lieu au sein du château, avec des représentants politiques et des chefs
  d'entreprises. À l'issue de la soirée, le Président de la République a répondu aux
  questions des journalistes. Merci beaucoup. Merci pour votre patience. Ces derniers
  jours, nous avons tenu ce G7 qui a permis d'avancer sur beaucoup de sujets qui sont
  très importants pour nous. L'Ukraine, le commerce international, l'intelligence
  artificielle, la paix au Proche et Moyen-Orient que nous soutenons depuis des mois.
  Donc je pense que ce G7 a été utile, a été un succès. J'avais souhaité avoir ce
  moment plus bilatéral avec le président Trump pour célébrer les 250 ans de l'indépendance
  américaine, qui s'est aussi un peu construite ici. C'est important pour nos compatriotes
  de le mesurer, parce que ce sont dans ces lieux à Versailles que le ministre des
  Affaires étrangères de Louis XVI, le comte de Vergennes, a aussi convaincu le roi
  d'apporter son soutien aux Etats-Unis d'Amérique. C'est ici que Benjamin Franklin
  est venu convaincre le roi en 1778, ce que je rappelais durant notre dîner. Donc
  ça montre aussi la force de ces liens. En effet, ce soir et c'est une très bonne
  nouvelle, a pu être signé officiellement par le président, ici même, à Versailles,
  cet accord entre l'Iran et les Etats-Unis d'Amérique. Je pense que c'est un accord
  qui permet de mettre fin au conflit, qui permet la paix, la réouverture du détroit
  d'Ormuz, sans péage, et 60 jours qui vont s'ouvrir pour conclure un accord sur le
  nucléaire, le balistique et les activités régionales. Nous allons continuer de travailler.
  Mais enfin, c'est un moment de paix et une bonne nouvelle pour beaucoup de nos compatriotes,
  parce que les prix, normalement, du carburant aussi, vont baisser, les prix du gaz.
  Quel rôle sera joué par la France, M. le Président ? La France continuera de jouer
  ce rôle d'être une puissance facilitatrice qui cherche à aider, à bâtir du compromis.
  Nous avons de l'expertise en matière de nucléaire. Nous sommes, comme vous le savez,
  un des pays importants pour lever les sanctions ou maintenir la pression. On a aussi
  des compétences. Et puis il y a un travail qui se fait en commun sur le plan diplomatique,
  donc on va continuer de le faire. Vous parlez de Versailles comme un instrument
  diplomatique, un instrument de puissance. C'en est l'illustration encore ce soir ?
  Oui, je crois profondément. Ça rappelle la force de l'histoire, ça rappelle ce que
  la France sait faire et dont les Français peuvent être fiers. Dont d'ailleurs des
  millions de visiteurs du monde entier sont fiers chaque année en venant ici. Et
  ça montre aussi que c'est un lieu qui inspire. Donc maintenant, la suite suivra.
  Monsieur le Président, il y a eu encore un appel important à cette initiative, semble-t-il,
  avec le président Trump, le président Zelensky, pour faire le suivi de la discussion
  d'hier. Maintenant, on continue d'avancer sur le soutien à l'Ukraine pour l'aider
  à résister, pour l'aider à avoir des résultats, pour l'aider à, justement, défendre
  son indépendance. Je pense que ce qui s'est fait aussi ces derniers jours est très
  important parce que c'est la réunification du G7 derrière l'Ukraine et notre force
  à tous qui est mise au service de sa capacité à se défendre, de sa capacité aussi
  à contre-attaquer, à reconstruire son énergie. Donc c'était positif. Voilà. Et on
  va continuer de travailler. Jusqu'à appeler Poutine, jusqu'à appeler Vladimir Poutine ?
  Là, pour le moment, c'est à lui de dire s'il est prêt à revenir à la table de discussion,
  pas à des conditions qui sont inabordables. Mais l'Amérique vous fait une place
  désormais, l'Europe ? L'Amérique, surtout, est avec nous pour aider l'Ukraine. Et
  ça, c'est très important. Je vous remercie à tous. Merci beaucoup et bon courage.
  Merci pour votre patience. Merci à vous. Merci beaucoup. Merci pour votre patience.
