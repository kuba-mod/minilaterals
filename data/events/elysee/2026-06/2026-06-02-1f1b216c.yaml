title: Déplacement du Président de la République et Brigitte Macron au Centre National
  du Football de Clairefontaine.
text: À quelques jours du coup d'envoi de la Coupe du Monde de football 2026 organisée
  par le Canada, les Etats-Unis et le Mexique, le Président de la République et Brigitte
  Macron se sont rendus au Centre National du Football de Clairefontaine, ce mardi
  2 juin 2026. Après une rencontre avec l’équipe de France féminine présente pour
  préparer leurs deux matchs décisifs pour la qualification pour la Coupe du Monde
  2027 qui se tiendra au Brésil, le chef de l’État a échangé avec les joueurs ainsi
  que le staff technique de l ’équipe de France de Football masculine afin de leur
  apporter son soutien et celui de tout le pays. Puis, suite au déjeuner avec l'équipe,
  le chef de l’État a échangé avec des scolaires, lauréats du concours « Foot à l’Ecole
  » , qui étaient présents à Clairefontaine pour passer 24h avec les Bleus.
