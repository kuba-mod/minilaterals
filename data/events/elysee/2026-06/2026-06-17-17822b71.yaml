  be made, for example in Africa. Today, many countries, given their ratings or lack
  thereof, are unable to attract private sector investment. That is the consensus
  we came to at the Africa Forward Summit. We decided to expand the scope, to include
  the entire African continent, of a mechanism that already exists, called the African
  Trade and Investment Development Insurance (ATIDI) which covers first losses. It
  was endorsed by the African Development Bank and African countries, and many G7
  countries have taken shares, agreed to provide guarantees and supported its action,
  as well as coordinating with the World Bank’s action, the clearly important MIGA
  and the second-loss fund the World Bank is establishing. It is an important step
  forward and we will monitor the implementation of this work and have decided to
  meet on the sidelines of the United Nations General Assembly to take stock. In addition
  to this text that is clearly very important, we have also adopted a call for a coordinated
  response to the Ebola outbreak. This call was supported by India, Egypt, the Republic
  of Korea and Kenya in addition to the G7 countries. The message of support regarding
  Ebola is clear: to help the Democratic Republic of the Congo, Uganda and all the
  countries that could be affected to deal with the epidemic. This means rapidly developing
  a vaccine and effective treatment and establishing appropriate procedures in line
  with WHO standards. The G7 committed to earmark more than €1 billion in emergency
  aid through this call for action, which is also very important, with a very strong
  commitment of the Europeans and Americans behind this mechanism and close collaboration
  with Africa CDC. When it comes to scientific and health cooperation, we have also
  issued an important text on the fight against cancer for the first time in the history
  of the G7. And it is a key time of reconvergence on health issues that have often
  given rise to disagreements and divisions. This priority reflects a universal reality.
  Cancer kills nearly 10 million people each year. The number of new cases is projected
  to increase by 80% globally by 2050, given the aging of the population and its interactions
  with environmental and behavioural risk factors. This ambitious call puts cooperation
  mechanisms with three main priorities at the heart of the fight against cancer.
  Concerning paediatric cancer, we are promoting data sharing. For cancers with poor
  prognosis – lung, liver and pancreatic cancer – we are promoting universal access
  to high-quality health care in both wealthy and developing countries. At this Summit,
  we were also able to make real progress on major global macroeconomic imbalances.
  We will build shared growth, drawing on all the preparatory work we conducted, the
  experts’ report published in spring and discussions we held. Basically, we all endorsed
  a text that defends a vision of balanced growth. We are aware of the major global
  imbalances. China must address the problem of overcapacity, excessive subsidies
  and a lack of domestic consumption. Europeans must invest more and modernize and
  streamline their economies, and the United States must address the issue of its
  twin deficits. Consensus has been reached regarding these points. Ahead of this
  G7 Summit, we successfully organized an unprecedented virtual convergence summit.
  We held a videoconference on 11 June with the G7 member and partner countries and
  China, for the first time in over 20 years, which allowed us to put this issue on
  table, if you will, to initiate better coordination. Within the G7 and with the
  G7+ countries, we began to build very clear elements of coordination, that is to
  say building unity and acknowledging that divisions, everything that fractures our
  economies, prevent us from effectively resolving these imbalances. So beyond the
  convergence summit, which in a way will set in motion a process that we will continue
  in preparation for the G20, China will have a seat at the table along with many
  others. We also very clearly affirmed cooperation mechanisms with the G7 and partner
  countries, first of all by recognizing the role of the IMF and its consolidation,
  and asking our ministers, as well, to work in preparation for September on clear
  cooperation approaches on the issues of fertilizers and food. This is absolutely
  key, as that is where we see the most striking imbalances that affect the most vulnerable
  populations. We also adopted important texts on the strength of our value chains,
  and in particular on critical minerals. While we began discussion on this topic
  last year under the Canadian presidency, until now we had never succeeded in constructing
  practical solutions, and to the contrary there were even risks of division. Faced
  with China, which has sometimes accumulated strategic reserves – which I do not
  say as a reproach, this is a strategy developed for over 15 years – we are all confronted
  with risks of over-dependence and thus vulnerability in our value chains. If we
  act in an uncoordinated fashion, we will aggravate the situation and create even
  greater imbalances. We have agreed to proceed together, as G7 members and within
  the G7+. We have thus agreed to develop cooperation projects together – and the
  projects that have been adopted are moreover highly concrete, in the annex to the
  declaration that I mentioned – specifically to reduce our sources of dependence,
  and together diversify our sources of supply. A total of 195 concrete projects representing
  €64 billion in joint investments have been established through this text, and we
  will continue to build on this momentum. I believe that this a key point for improving
  the resilience of our value chains, reducing their dependence, and doing so in a
  cooperative manner. Lastly, we just held a discussion on digital technology and
  artificial intelligence with all of the G7 and G7+ leaders, along with around a
  dozen leaders in digital technology and artificial intelligence from all G7 countries.
  What emerged from this discussion? First of all, the need to protect children online.
  Consensus is growing, as seen from Canada and the United Kingdom to the European
  Union and Brazil. Australia was not present, but I would like to commend their pioneering
  role as well. Several of us have already taken concrete initiatives and finalized
  laws. We have adopted a statement agreeing on the need to act and the importance
  of calling for platforms’ accountability. This momentum will be continued, and Prime
  Minister Modi has furthermore confirmed what he began to announce at the summit
  last February in Delhi. Once again, India is joining this plan, making the gathering
  of G7 and partners a true platform. This, I would say, is the DNA of the G7: liberal
  democracies with developed economies. This G7+ brings together other democracies
  in partnership, and together we have the same approach which is in keeping with
  our democratic values: protecting our children. This is a very important moment
  and an important milestone for progress. Several of us have also underlined the
  importance of better regulating artificial intelligence and the marking of AI content.
  There too, it is important to build initiatives. I will push for action at European
  level, but this consensus is necessary because we are seeing the impact that this
  issue has on our democracies. It was important to have this discussion with leaders
  in digital technology and AI. Concerning artificial intelligence, we are all faced
  with the same thing and it was important to hold this joint discussion. We all want
  innovation, we all want computing capabilities and data centres, we all want to
  develop the opportunities, productivity, transformations, and improvements in health
  and digital technology that AI can offer. But it is no longer possible for anyone,
  either political or business leaders, to ignore its impact on our democracies and
  our societies. This is why the opportunity and the need for a regulation have become
  clear today. This must be undertaken on an international level. We began this work
  with the G7 with a Global Partnership on Artificial Intelligence initiative backed
  by France and Canada to build an initial structure hosted at the OECD. We must now
  go further and succeed in improving regulation. The challenge that lies before us –
  and we had many discussions with the AI and technology leaders as well as with the
  US administration – concerns frontier models. We must succeed in better regulating
  them to prevent them from falling into the hands of authoritarian regimes, people
  who could pose a threat to our cyber security or our societies. To do so, however,
  the answer cannot be a lack of cooperation between democracies. So basically, what
  we are working on building over the coming months, if you will, is a platform for
  discussion and cooperation between a number of democracies faced with the risks
  of artificial intelligence, a platform for cooperation to jointly establish common
  standards, as well as to share, with regard to cyber security, and security more
  broadly, the impacts and thus the right solution. This is exactly what we have agreed
  upon and what we will continue to work on together. A meeting is planned in September
  so that our ministers can finalize this work and several leaders will come together
  as well. In any case, there is broad consensus confirming that international cooperation
  is necessary on this point as well, and to reassess the situation in several months.
  I don’t want to go on too long, but I would just like to say that beyond what I
  have just described, major statements were also adopted to work together to fight
  drug trafficking, and to work on setting up a port alliance to better counter this
  issue through stronger coordination. You see the synergy with all that the Government
  is currently doing in France as well as to fight against migrant smuggling, with
  a text that also builds on the work of the Italian and Canadian G7 presidencies
  and enables the improvement of our mechanisms in coordination and in synergy with
  the statement on new partnerships that I just mentioned. This Summit does not mark
  the end of our G7 Presidency. It ends at the end of the year, and we will therefore
  continue working in the various ministerial formats required to finalize certain
  points, such as the one I just mentioned on AI and digital technology. Many historic
  steps forward were made during the G7 on the topics I just mentioned, though, and
  many examples of very concrete progress for which we have been preparing these last
  few months, even these last few days, that I wanted to share with you and clarify
  here. I will now take questions. Thank you. Find below the statements adopted this
  Wednesday, 17 June: Leaders''statement for a more balanced durable resilient growth.
  Leaders''call on a safer digital space for minors. G7 leaders''declaration on securing
  supply chains for critical minerals.'
