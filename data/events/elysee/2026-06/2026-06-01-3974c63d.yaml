title: Disparition d'André Santini.
text: Figure de la vie politique française, André Santini s’est éteint à l’âge de
  85 ans. Avec lui disparaît l’un des élus les plus expérimentés des Hauts-de-Seine.
  Maire bâtisseur d’Issy-les-Moulineaux, parlementaire, ancien ministre, André Santini
  a marqué quatre décennies de vie publique. Né à Paris en 1940, dans une famille
  modeste d’origine corse, André Santini grandit entre l’exigence du travail, le goût
  des autres et cette liberté de ton, cet humour qui ne devait plus le quitter. Élève
  au lycée Pasteur, diplômé de Sciences Po, formé au droit et aux langues orientales,
  il devint enseignant à la Sorbonne avant d’embrasser la vie politique. C’est dans
  les Hauts-de-Seine, sous le regard et dans le sillage de Charles Pasqua, qu’il trouva
  son premier territoire d’engagement. À Issy-les-Moulineaux, dont il devint maire
  en 1980, il inscrivit l’essentiel de son destin public. Pendant plus de quarante
  ans, il transforma profondément cette ancienne ville ouvrière, attirant entreprises
  et médias, jusqu’à faire de sa commune l’un des pôles économiques et de rayonnement
  les plus dynamiques de l’ouest parisien. Elu député des Hauts-de-Seine en 1986,
  il représenta pendant plus de vingt-cinq ans ses administrés à l’Assemblée. André
  Santini fut aussi secrétaire d’État aux Rapatriés du gouvernement de Jacques Chirac
  en 1986, puis ministre délégué à la Communication jusqu’en 1988. Longtemps membre
  de l’UDF puis de l’UDI, sa place incontournable dans la vie du centre et de la droite
  l’amena aussi à devenir secrétaire d’Etat à la Fonction publique de 2007 à 2009.
  Son esprit, son style, et ses formules malicieuses firent de lui une figure reconnaissable
  de notre vie publique. Ces dernières années, placé dans un combat face à la maladie,
  André Santini continua d’honorer son mandat et n’abandonna jamais Issy-les-Moulineaux,
  où il fut réélu pour la huitième fois en 2026. Le Président de la République et
  son épouse s’inclinent devant la mémoire d’un élu profondément attaché à sa commune
  et d’une personnalité marquante de la vie politique française. Ils présentent leurs
  condoléances à sa famille, à ses proches, au conseil municipal et aux habitants
  d’Issy-les-Moulineaux et à tous ceux qui l’aimaient.
