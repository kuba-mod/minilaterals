title: Déclaration des dirigeants E5.
text: 'Face aux menaces et défis actuels pesant sur l’environnement de sécurité, les
  dirigeants de la France, de l’Allemagne, de l’Italie, de la Pologne et du Royaume-Uni
  se sont réunis aujourd’hui à Berlin. Le Secrétaire général de l’OTAN a participé
  à la réunion depuis Washington. Les dirigeants ont affirmé leur engagement indéfectible
  en faveur de la sécurité euro-atlantique et du lien transatlantique, reconnaissant
  le rôle essentiel que les États-Unis continuent de jouer au sein de l’Alliance.
  Ils sont convenus de travailler collectivement au succès du sommet de l’OTAN à Ankara
  organisé par le Président Erdoğan les 7 et 8 juillet 2026. Ils ont exprimé leur
  solide détermination à bâtir une Europe plus forte dans une OTAN plus forte et de
  poursuivre leurs efforts respectifs dans le domaine de l’industrie de défense dans
  la coopération la plus étroite possible. Les dirigeants ont décidé d’avancer dans
  cinq domaines prioritaires : 1. Leadership européen et partage du fardeau : Les
  dirigeants sont engagés en faveur d’un rôle européen renforcé au sein de l’OTAN,
  avec une Europe assumant une plus grande responsabilité dans notre sécurité transatlantique
  commune, en coordination étroite avec les États-Unis d’Amérique. Les dirigeants
  saluent les progrès significatifs réalisés par les Alliés dans la mise en œuvre
  de l’Engagement d’Investissement de Défense de La Haye et conviennent de développer
  conjointement de nouvelles pistes afin de renforcer les contributions européennes
  aux capacités Alliées. 2. Sécurité collective : Les dirigeants conviennent de renforcer
  proactivement la posture de dissuasion et de défense de l’Alliance et d’accroître
  les contributions aux activités de dissuasion de l’OTAN afin de dissuader et de
  répondre à la menace la plus importante et la plus directe émanant de la Russie
  ainsi qu’à la menace asymétrique la plus directe que constitue le terrorisme pour
  la sécurité euro-atlantique, en cohérence avec leur approche à 360 degrés. Les dirigeants
  réaffirment leur engagement fondamental et leur détermination pour la sécurité de
  l’espace euro-atlantique, et leur détermination à agir ensemble rapidement si elle
  venait à être menacée. 3. Coopération industrielle de défense : Les dirigeants reconnaissent
  l’importance d’une coopération industrielle de défense plus étroite pour obtenir
  des résultats quant aux capacités de l’OTAN, à l’efficacité opérationnelle et à
  la résilience indispensables à la dissuasion et à la défense, au rythme, à l’échelle
  et à la valeur nécessaires. Ils continueront de renforcer la coopération industrielle
  de défense, en particulier dans les domaines de la défense aérienne, des systèmes
  sans pilote, de l’IA et d’autres capacités clés, y compris les feux de longue portée.
  Ils conviennent d’accélérer leur engagement en faveur du développement et de l’acquisition
  conjoints, au niveau européen, de capacités de frappe de précision en profondeur.
  En complément du renforcement des efforts industriels européens, les dirigeants
  ont insisté sur l’importance de mobiliser les technologies émergentes, soutenues
  par des mécanismes financiers destinés à débloquer capitaux et investissements.
  Cela inclut l’extension des instruments existants pour combler les lacunes capacitaires
  critiques et renforcer l’interopérabilité. 4. Soutien à l’Ukraine : Les dirigeants
  sont déterminés à renforcer encore substantiellement leur soutien à l’Ukraine dans
  sa défense contre l’agression russe, y compris par des sanctions et une pression
  économique accrues sur la Russie, ainsi que par un soutien à la résilience du secteur
  énergétique de l’Ukraine. Ils soutiennent les engagements de soutien militaire pris
  lors du sommet de l’OTAN et l’intensification de la coopération avec l’Ukraine à
  travers des initiatives de l’Alliance, notamment JATEC et NSATU. Ils réaffirment
  leur engagement à approfondir le partenariat de l’OTAN avec l’Ukraine, rapprochant
  celle-ci de l’Alliance et reconnaissant sa contribution essentielle à la sécurité
  euro-atlantique. Les dirigeants sont d’accord en ce qui concerne les conditions
  pour une paix juste et durable et soutiennent les propositions de dialogue direct
  entre l’Ukraine et la Russie, avec une participation européenne et américaine active.
  5. Unis sur l’Iran : Les dirigeants ont salué le mémorandum d’entente entre les
  États-Unis et l’Iran, obtenu sous l’impulsion du Président Trump avec le soutien
  de pays médiateurs, et estiment qu’il constitue une opportunité de restaurer la
  stabilité régionale et de stabiliser l’économie mondiale. Les dirigeants ont réitéré
  leur engagement en soutien à la mise en œuvre du mémorandum dans le cadre d’un suivi
  global et urgent qui montre des résultats pour une paix durable. Les dirigeants
  ont souligné que l’Iran ne doit jamais disposer de l’arme nucléaire. Ils ont réaffirmé
  l’importance d’une liberté de navigation inconditionnelle et sans restriction dans
  le détroit d’Ormuz. Ils ont confirmé leur engagement à participer à la mission militaire
  multinationale conduite par le Royaume-Uni et la France, dès que les conditions
  le permettront et en ligne avec leurs nécessités constitutionnelles respectives.
  Celle-ci pourrait jouer un rôle important de réassurance pour l’industrie maritime
  et pour la réouverture du détroit, notamment à travers la vérification du déminage.'
