  de nos échanges commerciaux, que l''accord entre l''Union européenne et l''Inde
  permettra de démultiplier encore davantage. Mais je veux terminer en évoquant, au
  service de ces partenariats et de cette ambition pour l''innovation commune, la
  force de nos liens humains. La formation professionnelle entre nos deux pays est
  un axe clé de notre développement, un accord pour la création d''un centre national
  d''excellence sur les métiers de l''aéronautique et des secteurs associés à Kanpur,
  dont l’Uttar Pradesh en est une des illustrations. Nous voulons développer le lien
  entre nos universités, nos centres de recherche et pour nos jeunesses. Nous avons
  cet objectif de 30 000 étudiants indiens en France pour 2030. Cet objectif est essentiel
  et j''invite toutes celles et ceux qui sont là à y contribuer pour démultiplier
  l''accueil ici d''étudiants indiens et pour permettre aussi à de nombreux étudiants
  français et chercheurs français de vous rejoindre en Inde au service de cette ambition
  commune. À ce titre, je veux ici rendre hommage au Centre franco-indien pour la
  promotion de la recherche avancée, le CEFIPRA, une institution visionnaire dont
  nous venons de célébrer le 40ème anniversaire et qui sous-tend cet effort. Mais
  nous avons encore à lui donner une perspective nouvelle et plus forte. Monsieur
  le Premier ministre, cher Narendra, je crois profondément que le fait que Nice accueille
  aujourd''hui et demain le premier Bharat Innovates 2026 en dehors de votre pays
  est le signe que ces liens qui nous unissent sont éminemment forts, s''appuient
  sur une histoire technologique, scientifique, industrielle qui s''est profondément
  transformée ces dernières années, mais indiquent combien nos deux pays ont à continuer
  de construire ensemble, par leurs forces scientifiques, entrepreneuriales et industrielles,
  mais aussi par la conviction qui nous lie et une même lecture du monde. Nous croyons
  dans la coopération, nous croyons dans la recherche ouverte, nous croyons dans le
  respect du droit international et dans le respect des nations indépendantes. C''est
  au service de cette lecture du monde que se construit notre partenariat en matière
  de recherche et d''innovation. C''est pour cela que cette année franco-indienne
  de l''innovation est si importante et que votre présence aujourd''hui à Nice signifie
  beaucoup. Merci, Monsieur le Premier ministre. Merci, Mesdames et Messieurs, et
  bon sommet. Les deux dirigeants ont abordé également les coopérations du partenariat
  stratégique global spécial franco-indien , notamment dans le domaine de la défense,
  de l’espace et des technologies et de la coopération universitaire et culturelle.
  Ils ont échangé par ailleurs sur les grands enjeux économiques et internationaux
  en amont du Sommet du G7 que la France accueille du 15 au 17 juin à Évian et auquel
  le Premier ministre indien participera.'
