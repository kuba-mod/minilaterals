date: '2026-06-14'
type: press_release
source_name: elysee
title: Déplacement à Nice avec Narendra Modi, Premier ministre de l'Inde.
text: 'Le Président de la République s''est rendu à Nice accompagné de Narendra Modi,
  Premier ministre de la République de l’Inde, le dimanche 14 juin 2026. Cette visite,
  la huitième du Premier ministre en France, intervient suite à la visite officielle
  du chef de l’État en Inde en février dernier. Elle traduit la continuité du dialogue
  entre la France et l’Inde et l’approfondissement de la coopération entre nos deux
  pays, notamment dans le domaine de l’innovation et des nouvelles technologies. Dans
  la continuité des sommets sur l’intelligence artificielle à Paris et à New Delhi et
  du lancement de l’année franco-indienne de l’innovation en février 2026, le Président
  de la République et le Premier ministre ont inauguré à Nice l’évènement Bharat Innovates
  . Cet événement a rassemblé notamment 120 startups indiennes , en particulier dans
  des secteurs clés pour la relation bilatérale tels que l’énergie, la ville intelligente
  et la mobilité, l’espace, la santé. Monsieur le Premier ministre, cher Narendra,
  Mesdames et Messieurs les ministres, Messieurs les ambassadeurs, Monsieur le préfet,
  Mesdames et Messieurs les parlementaires, Monsieur le maire, Mesdames et Messieurs
  les entrepreneurs et entrepreneuses, chercheurs, acteurs de l''innovation, Mesdames
  et Messieurs, en vos grades et qualités. C''est un grand honneur pour nous, Monsieur
  le Premier ministre, très cher Narendra, de vous accueillir ici, à Nice, pour ce
  premier Bharat Innovates hors d''Inde. Nous avons, ensemble, il y a quelques mois,
  à Bombay, lancé cette année franco-indienne de l''innovation. Comme la vidéo que
  nous venons de voir le rappelait, je disais alors : la question n''est pas de savoir
  si l''Inde innove, mais qui innovera avec l''Inde. Vous nous faites un grand honneur
  de, pour la première fois, montrer des start-ups , des grands innovateurs de votre
  pays, hors de vos murs, qui viennent ici construire des partenariats, trouver des
  investisseurs, convaincre des talents. En commençant mon propos, je voudrais d''abord,
  Monsieur le Premier ministre, vous féliciter, évidemment, pour votre présence ici,
  mais parce qu''il y a quelques jours, vous êtes devenu le Premier ministre qui aura
  le plus longtemps servi son pays depuis l''indépendance de l''Inde.  Cette longévité
  et cette stabilité disent beaucoup de votre action déterminée, de la force de votre
  pays et de ses atouts et de votre leadership. Donc nous sommes très fiers de vous
  avoir ici. Alors, pourquoi pour la France l''Inde est une évidence et votre capacité
  à innover l''est ? Je le dirais de manière très directe et très simple. Vous avez
  le dividende démographique. Un pays d''un milliard 400 millions d''habitants, un
  pays qui, depuis très longtemps, a fait le pari du savoir, de l''intelligence, de
  la recherche, et qui forme aujourd''hui autant d''ingénieurs que l''Europe et les
  États-Unis d''Amérique réunis, plus d''un million par an. Un pays qui, dans tous
  les domaines du jeu, et nous l''avons vu, toute la recherche, l''innovation et les
  modèles de frontières, est à la pointe de l''innovation internationale. Si un seul
  exemple suffisait à montrer ce que vous êtes capable de faire, je crois que le spatial
  l''illustre sans doute mieux que nul autre. La mission Chandrayaan-3 de juillet
  2023, qui a permis le premier alunissage sur le pôle sud lunaire, qui a été menée
  dans un temps record par l''ISRO, avec des coûts records, est une démonstration
  de force, de recherche, d''innovation, mais aussi de mise en œuvre industrielle
  et de concret. Ceci doit conduire beaucoup de pays du monde à voir l''Inde comme
  elle est aujourd''hui, pas simplement un pays qui fournit des talents ou qui peut
  encore fournir, et ce qu''il continue à faire, des talents de sous-traitance industrielle
  ou technologique, non, un très grand pays d''innovation qui bâtit lui-même des modèles
  de rupture et qui est devenu incontournable. De l''autre côté, je veux convaincre
  ici les investisseurs, entrepreneurs qui sont en France, ici à Nice aujourd''hui
  avec nous, de ce qu''est la France. Le premier pays d''innovation et le pays le
  plus attractif d''Europe depuis 7 ans. Nous l''avons encore montré il y a quelques
  semaines avec Choose France, et 93 milliards d''euros d''investissement confirmés.
  Depuis 7 ans, la France est le pays le plus attractif de notre Europe. Nous sommes
  le pays qui est le plus en pointe sur l''intelligence artificielle, qui, de très
  loin, a créé le plus d''entreprises, suscité le plus d''investissements et créé
  le plus d''emplois. Nous avons des talents que nous formons en qualité, que nous
  continuons à former dans le spatial, dans l''intelligence artificielle, dans le
  quantique, et nous avons une force dans l''économie contemporaine, c''est que la
  France produit et exporte une énergie pilotable la plus décarbonée d''Europe, largement
  grâce au nucléaire. Cette énergie, elle est à 95 % décarbonée, et l''année dernière,
  nous en avons exporté 90 TWh, la même chose que l''année précédente. Dans ce monde
  où, en particulier, la course à l''intelligence artificielle, c''est une course
  pour les capacités de calcul, l''énergie est la ressource rare. Toute notre stratégie,
  entre autres, est de convertir cette énergie disponible en capacité de calcul sur
  notre sol, ce qui fait de la France le pays, de très loin, leader en création de
  centres de données en Europe et en capacité à développer des modèles aujourd''hui
  fondationnels et de langage large. La France est le seul pays d''Europe à avoir
  un modèle LLM qui est en situation de concurrencer les grands Américains et les
  grands Chinois, avec Mistral AI, et ce qui nous conduit aussi à développer dans
  tous les domaines de ce jeu nos capacités. Voilà quelques raisons, et je ne serai
  pas plus long, pour lesquelles la France et les Français, avec eux les Européens,
  doivent regarder l''Inde différemment, et je crois aussi que les Indiens doivent
  regarder la France avec intérêt compte tenu de nos atouts. C''est pourquoi cette
  rencontre aujourd''hui est très importante. C''est celle qui permet la rencontre
  entre vos capacités d''innovation, Bharat Innovates , et la French Tech, Choose
  France , France 2030. Et dans quelques jours, nous serons avec le Premier ministre
  Modi à VivaTech, où vous avez été l''invité d''honneur en 2022. La France, depuis
  maintenant un peu plus de 10 ans, croit très profondément dans la stratégie que
  vous conduisez, Monsieur le Premier ministre. Le Make in India , nous sommes plus
  qu''au fond des gens qui la respectent, nous sommes des acteurs, nous pratiquons.
  Depuis 10 ans, nous avons massivement développé des perspectives industrielles dans
  le domaine de la défense et de la sécurité, dans les domaines de l''innovation et
  tant d''autres, et nous avons ensemble bâti de plus en plus. C''est ce qui a conduit
  aussi à construire à la fois ce partenariat unique entre nos deux pays, que nous
  avons rehaussé il y a quelques mois, et en matière d''innovation, à lancer cette
  année d''innovation ensemble à Mumbai et à également lancer ce réseau franco-indien
  de l''innovation en février dernier, qui est un instrument pour tous les acteurs
  indiens et français, dont je vous invite à vous saisir. Cette visite en France est
  également l''occasion d''adopter une feuille de route France-Inde Innovation 2030,
  qui constitue une nouvelle réalisation importante de ce partenariat stratégique
  global spécial. Cette feuille de route démontre dans de nombreux domaines la force
  de cette innovation. Après avoir vanté les mérites de l''un et de l''autre, je voudrais
  finir en déclinant quelques-uns des axes de notre aventure commune. Dans le domaine
  de l''intelligence artificielle, nos deux pays partagent l''ambition d''une intelligence
  artificielle sûre, ouverte, sécurisée, digne de confiance, responsable et éthique.
  C''est le cœur du message que nous avions envoyé en janvier 2025 ensemble à Paris,
  en coprésidant le Sommet pour l''IA, et c''est le cœur du message qui a été aussi
  promu il y a quelques mois dans votre pays, dans le Sommet de Delhi. Je me réjouis
  que nous continuions à travailler ensemble dans la perspective du prochain Sommet
  IA l''année prochaine. Les projets que nous portons en matière de recherche, de
  coopération industrielle, s''inscrivent en quelque sorte dans cette troisième voie
  pour l''intelligence artificielle, celle que nous promouvons, celle aussi d''une
  coopération ouverte, là où les derniers jours l''ont encore montré, la tentation
  de refermer les modèles d''intelligence artificielle, en tout cas, d''en faire des
  instruments de puissance, de cesser les coopérations, cette tentation s''accroît.
  L''Inde et la France ensemble croient dans un partenariat, dans le respect du multilinguisme,
  dans le respect d''une IA coopérative, d''un modèle ouvert pour le bien commun.
  Dans le domaine du climat et de l''énergie, l''Inde et la France innovent ensemble
  pour garantir une sécurité énergétique et le respect des engagements pris à la COP21.
  Mon premier voyage à vos côtés, Président, en 2018, c''était pour ensemble installer
  l''Alliance solaire internationale, acteur ô combien important de cette stratégie
  de décarbonation mondiale, la Coalition pour la résilience des infrastructures face
  aux catastrophes, qui nous lie, là aussi, et qui nous permet d''agir dans beaucoup
  de pays, également tout ce que nous conduisons l''un avec l''autre. Dans le domaine
  de l''énergie nucléaire, nous travaillons ensemble sur des projets pour aujourd''hui
  et pour demain, de Jaitapur aux technologies d''avenir, comme les SMR. Ensemble,
  nous avons à œuvrer pour améliorer la situation, bâtir une énergie plus décarbonée
  et continuer les coopérations aussi en matière de recherche, d''observation, pour
  pouvoir, là aussi, avoir une science ouverte. En santé, cela a été montré à l''instant
  par les vidéos, notre coopération est forte. En 2023, nous avons lancé le Campus
  franco-indien en sciences de la vie pour la santé, qui produit d''excellents résultats
  en termes de projets de recherche, d''échanges entre chercheurs. Cet automne sera
  lancé un club santé qui favorisera les synergies entre nos entreprises et nos centres
  de recherche. Nos deux instituts nationaux de santé et de la recherche médicale,
  l''Inserm et l''ICMR, luttent déjà ensemble contre la résistance aux antimicrobiens
  par une alliance impliquant des industriels du secteur. Lors de ma dernière visite
  en Inde en février, j''ai pu inaugurer le premier centre de recherche pour la santé
  globale, utilisant de l''IA, dans le plus grand hôpital universitaire de la ville,
  AIMS, en partenariat avec Sorbonne Université et IIT Delhi. Dans le domaine du spatial,
  évidemment, là aussi, notre coopération est forte, mais nous avons encore beaucoup
  à faire. Nombre de start-ups présentes aujourd''hui coopèrent depuis plusieurs années
  ensemble. Nous coopérons depuis plus de 60 ans ensemble. En février dernier, j''ai
  constaté la solidité du partenariat entre le CNES et l''ISRO, dont témoigne le développement
  continu de satellites conjoints d''observation de la Terre depuis plus de 20 ans.
  Et le prochain satellite, Trishna, actuellement en cours de développement, sera
  lancé depuis l''Inde l''année prochaine et fournira des mesures précises de la température
  de surface dans le monde, améliorant notre capacité, entre autres, à gérer les ressources
  d''eau. Qu''il s''agisse d''explorations spatiales, de vols habités dans l''espace,
  de constellations nouvelles, nous avons des projets massifs à développer ensemble.
  L''Inde aura un rôle éminent lors du sommet spatial international qui se tiendra
  à Paris les 9 septembre et 10 septembre prochains. Évidemment, je pourrais ici décliner
  de nombreux secteurs. La défense, où nos partenariats se sont profondément transformés
  ces dernières années, et où le Made in India est une réalité profonde. Le développement
  de nos échanges commerciaux, que l''accord entre l''Union européenne et l''Inde
  permettra de démultiplier encore davantage. Mais je veux terminer en évoquant, au
  service de ces partenariats et de cette ambition pour l''innovation commune, la
  force de nos liens humains. La formation professionnelle entre nos deux pays est
  un axe clé de notre développement, un accord pour la création d''un centre national
  d''excellence sur les métiers de l''aéronautique et des secteurs associés à Kanpur,
  dont l’Uttar Pradesh en est une des illustrations. Nous voulons développer le lien
  entre nos universités, nos centres de recherche et pour nos jeunesses. Nous avons
  cet objectif de 30 000 étudiants indiens en France pour 2030. Cet objectif est essentiel
  et j''invite toutes celles et ceux qui sont là à y contribuer pour démultiplier
  l''accueil ici d''étudiants indiens et pour permettre aussi à de nombreux étudiants
  français et chercheurs français de vous rejoindre en Inde au service de cette ambition
  commune. À ce titre, je veux ici rendre hommage au Centre franco-indien pour la
  promotion de la recherche avancée, le CEFIPRA, une institution visionnaire dont
  nous venons de célébrer le 40ème anniversaire et qui sous-tend cet effort. Mais
  nous avons encore à lui donner une perspective nouvelle et plus forte. Monsieur
  le Premier ministre, cher Narendra, je crois profondément que le fait que Nice accueille
  aujourd''hui et demain le premier Bharat Innovates 2026 en dehors de votre pays
  est le signe que ces liens qui nous unissent sont éminemment forts, s''appuient
  sur une histoire technologique, scientifique, industrielle qui s''est profondément
  transformée ces dernières années, mais indiquent combien nos deux pays ont à continuer
  de construire ensemble, par leurs forces scientifiques, entrepreneuriales et industrielles,
  mais aussi par la conviction qui nous lie et une même lecture du monde. Nous croyons
  dans la coopération, nous croyons dans la recherche ouverte, nous croyons dans le
  respect du droit international et dans le respect des nations indépendantes. C''est
  au service de cette lecture du monde que se construit notre partenariat en matière
  de recherche et d''innovation. C''est pour cela que cette année franco-indienne
  de l''innovation est si importante et que votre présence aujourd''hui à Nice signifie
  beaucoup. Merci, Monsieur le Premier ministre. Merci, Mesdames et Messieurs, et
  bon sommet. Monsieur le Premier ministre, cher Narendra, Mesdames et Messieurs les
  ministres, Messieurs les ambassadeurs, Monsieur le préfet, Mesdames et Messieurs
  les parlementaires, Monsieur le maire, Mesdames et Messieurs les entrepreneurs et
