title: Dinner with Donald Trump, President of the United States of America, at the
  Palace of Versailles.
text: On the occasion of the 250th anniversary of the independence of the United States
  of America, President Macron and his wife welcomed President Trump at the Palace
  of Versailles on Wednesday, June 17, 2026. A historic symbol of Franco-American
  friendship , it was at the Palace of Versailles that the 1783 treaty recognizing
  the independence of the United States was signed. At Versailles, the American President
  signed a peace memorandum of understanding bringing an end to hostilities in Iran
  and the region. Following a visit to the exhibition “Versailles and American Independence”,
  the dinner took place within the Palace, attended by political representatives and
  business leaders. At the end of the evening, the President of the Republic answered
  journalists’ questions.
