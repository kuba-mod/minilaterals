title: Déplacement à Berlin.
text: Le Président de la République s'est rendu à Berlin afin de participer à une
  réunion avec le Chancelier allemand, le Premier ministre britannique, la Présidente
  du Conseil des ministres italien et le Premier ministre polonais, ce mercredi 24
  juin 2026. Lors de cette rencontre à laquelle le Secrétaire général de l’OTAN a
  également participé en visioconférence, l es dirigeants ont évoqué la poursuite
  du soutien à l’Ukraine dans le prolongement des initiatives annoncées lors du sommet
  du G7 et des travaux engagés dans le cadre de la Coalition des volontaires pour
  doter l’Ukraine de garanties de sécurité solides. Cette réunion a également permis
  de poursuivre leur coordination étroite sur les enjeux de sécurité du continent
  européen et de préparer le sommet de l’OTAN qui se tiendra à Ankara les 7 et 8 juillet
  prochains. Ces échanges étaient enfin l’occasion de poursuivre les efforts engagés
  en faveur d’une Europe plus forte au sein de l’Alliance, notamment à travers le
  développement des capacités européennes de défense et le renforcement de la coopération
  entre partenaires européens.
