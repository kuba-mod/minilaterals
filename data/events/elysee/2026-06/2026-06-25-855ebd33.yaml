title: Disparition de Yaacov Agam.
text: 'Yaacov Agam est un de ces artistes sur lesquels la mort n’a longtemps eu aucune
  prise. Sa joie de vivre et les couleurs qui en étaient la manifestation tangible
  le mettaient à l’abri de cette immobilité qui lui ressemble si peu. Né en Terre
  Sainte en 1928, c’est aussi là qu’il s’est éteint le jour-même de l’équinoxe d’été,
  le 21 juin dernier. Ce jeune homme de 98 ans restera à jamais vivant, lui qui fut
  l’un des pionniers de l’art cinétique, beauté du mouvement, scintillement des couleurs
  et modernité heureuse d’un courant artistique profondément européen. L’Europe fut
  son terrain de jeu et d’invention, pour ce fils de rabbin formé à l’Ecole des Beaux-arts
  Bezalel puis à l’Ecole d’arts appliqués de Zurich où il fait ses premières touches
  d’artiste, s’apprêtant à transformer la peinture en expérience vivante, mouvante
  et extatique. Européen, il le restera toujours lui qui, sur le chemin des Etats-Unis,
  s’établit à Paris, une ville qu’il a couvée de son regard rieur dès le début des
  années 1950. Il fréquente l’atelier de la Grande Chaumière, puis la galeriste Denise
  René qui lui présente ses pairs, Victor Vasarely, Pol Bury. « Le Mouvement » est
  né. L’aventure de l’art cinétique ne fait que commencer. Yaacov Agam, ou tout simplement
  Agam, proposait d’aller plus loin qu’un regard passif sur des œuvres picturales.
  Le regard transforme l’œuvre, la fait sienne, s’en nourrit, s’en abreuve, comme
  son père de la source talmudique. La couleur est sa prière, le mouvement sa dévotion.
  André Breton, le Pape des surréalistes, se passionne pour cet art magique et donne
  ses titres à ses premières œuvres. Agam eut d’autres fées, il souleva des enthousiasmes
  durables. En 1971, le Président Georges Pompidou lui commande une antichambre pour
  ses appartements privés de l’Elysée. Ce salon est une plongée, une immersion complète
  dans un monde de couleurs, de formes et de mouvement. S’y déclinent 900 nuances
  de couleurs, jusqu’au tapis réalisé par la Manufacture des Gobelins. Si le Président
  Pompidou n’eut pas le temps de voir l’œuvre achevée, et que celle-ci fut finalement
  transportée au Centre Pompidou, elle constitue toutefois le point originel de l’art
  contemporain au cœur du Palais de la République, et de ce dialogue toujours fécond
  entre le patrimoine et l’avant-garde qui est la meilleure définition de notre histoire
  de l’art. Des Fontaines musicales de La Défense à la grande sculpture d’acier Toute-Direction
  installée à La Roche-sur-Yon, Yaacov Agam a ponctué la France de formes cinétiques
  dont la joie est communicative, lancée comme une contre-attaque à tous les immobilismes.
  Yaacov Agam, artiste de France mais enfant d’Israël à qui sa ville natale de Rishon
  LeZion a consacré un musée. C’est là-bas qu’en recevant le très prestigieux prix
  Israël, en avril dernier, il avait eu ces mots : « La créativité est le fondement
  du judaïsme ». Le voilà à présent immobile, mais ses œuvres, elles, continuent à
  se mouvoir au rythme de notre regard. Telle est l’éternité de Yaacov Agam. Le Président
  de la République et son épouse adressent leurs condoléances à sa famille et à ses
  proches.'
