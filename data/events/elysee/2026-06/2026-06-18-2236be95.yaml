title: Interview du Président de la République sur France 2.
text: Le Président Emmanuel Macron a accordé une interview à Caroline Roux pour France
  Télévisions le jeudi 18 juin 2026. Il est notamment revenu sur la tenue du G7 à
  Évian, la situation en Ukraine, le protocole d'accord de paix signé entre les États-Unis
  et l'Iran et la relation bilatérale France - États-Unis.
