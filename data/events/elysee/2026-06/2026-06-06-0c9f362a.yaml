title: Disparition de Bernadette Chirac.
text: Elue de Corrèze, Première dame pendant douze ans, Bernadette Chirac était une
  figure de notre Histoire. Bien plus, par ses engagements, sa personnalité, son parcours,
  Bernadette Chirac avait conquis une place à part dans le cœur des Français. Née
  en 1933 à Paris, Bernadette Chodron de Courcel était issue d’une famille d’héritiers
  des manufactures de faïences et d’émaux du Loiret. Elle en retint une éducation
  faite de rigueur, de dévouement, d’amour de la patrie. Après un baccalauréat préparé
  à l’Ecole Normale Catholique de Paris, elle entra à Sciences Po. Elle y rencontra
  un jeune homme étudiant, Jacques Chirac. Une alliance se noua qui jamais ne se défit.
  Ils se marièrent en 1956. La politique ne faisait pas partie du contrat de mariage,
  rappelait-elle souvent. Pourtant, c’est ensemble qu’ils se dévouèrent à l’envie
  de servir la République. Ce fut d’abord le cas en Corrèze, terre de prédilection
  de Jacques Chirac, où la famille s’était réfugiée durant la guerre et sous l’Occupation.
   Dès le début des années 1970, ce fut là que Bernadette Chirac embrassa une carrière
  politique parallèle à celle de son mari. Elle fut élue conseillère municipale de
  Sarran, où le couple possédait une propriété. Première femme à devenir conseillère
  générale en 1979, elle fut réélue à quatre reprises. Bernadette Chirac fut toujours
  fidèle à ces terres d’élection, devenues ses terres d’adoption, arpentant les campagnes,
  nouant des amitiés durables avec les Corréziens. Accompagnant le parcours de son
  mari, à Matignon puis à la Mairie de Paris, Bernadette Chirac reprit même des études
  d’archéologie, sujet qui la passionnait depuis l’enfance. Devenue « Première Dame »
  à son arrivée au palais de l’Elysée en 1995, Bernadette Chirac en fut la vigie durant
  douze ans. Traitant régulièrement des affaires courantes comme des réceptions des
  chefs d’Etat et de gouvernement, elle avait une haute idée du savoir-vivre à la
  Française et fit rayonner la maison de la République partout dans le monde. Surtout,
  Bernadette Chirac s’investissait corps et âme dans de nombreuses œuvres caritatives.
  Au gré de ses mandats et des statuts que lui conféra la carrière politique de son
  mari, elle sut mettre à profit sa notoriété publique pour faire avancer les causes
  qui lui tenaient à cœur. Présidente et fondatrice de diverses initiatives culturelles,
  elle puisa aussi dans son expérience personnelle, celle de la maladie de sa fille
  Laurence, pour faire avancer les conditions d’hospitalisation et l’accompagnement
  des jeunes malades. Présidente de la Fondation des Hôpitaux de Paris - Hôpitaux
  de France dès 1994, elle redonna également vie aux Pièces Jaunes dans les années
  2000 en parcourant des milliers de kilomètres à travers la France. Elle présida
  également la fondation Claude-Pompidou, en témoignage fidèle à l’une de ses plus
  proches amies. En 2020, Bernadette Chirac transmit le flambeau de la Fondation des
  Hôpitaux à Madame Brigitte Macron, après vingt-cinq ans d’un engagement constant.
  A travers ces engagements, cette histoire partagée avec des millions de Français,
  malades, soignants, anonymes, Bernadette Chirac tissa un lien particulier avec la
  Nation, Première dame et dame de cœur, connue pour sa manière discrète et tenace
  de changer la vie des plus fragiles. Après la fin du mandat de Jacques Chirac, Bernadette
  Chirac continuait de faire vivre ses engagements comme la mémoire des siens. Le
  Président de la République et son épouse saluent la mémoire d’une Première dame
  entrée dans le cœur des Français. Ils adressent à Claude, sa fille, Frédéric son
  gendre, Martin son petit-fils, à sa famille, à tous ses proches, et tous ceux, nombreux,
  qui l’aimaient, leurs condoléances émues.
