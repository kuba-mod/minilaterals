date: '2026-06-19'
type: press_release
source_name: elysee
title: Déplacement à Bruxelles à l'occasion du Conseil européen.
text: 'Le Président de la République s''est rendu à Bruxelles les 18 et 19 juin 2026
  afin de participer au Conseil européen. Au lendemain du Sommet du G7 qui s’est tenu
  à Évian en début de semaine, ce Conseil européen a permis de faire le point sur
  les orientations et l’action de l’Union européenne sur les enjeux internationaux
  , notamment : Les dirigeants européens ont également abordé le prochain cadre financier
  pluriannuel pour 2028-2034 ainsi que les conditions qui permettront de doter l’Union
  européenne des moyens nécessaires pour répondre à ses priorités stratégiques et
  renforcer sa souveraineté . Bonjour, merci de votre présence, je voulais vous rendre
  compte de ce Conseil européen qui nous a permis d’avancer à vingt-sept sur la situation
  internationale, de l''Ukraine au Moyen-Orient, mais aussi aux déséquilibres mondiaux
  sur le plan macroéconomique, avec un débat sur le fond quant au prochain cadre financier
  pluriannuel de l''Union européenne pour la période 2028 à 2034. Je voulais ici remercier
  la présidence chypriote pour son travail à cet égard, la mobilisation et l''organisation
  justement de nos travaux. Ce Conseil européen s''est tenu à l''issue du G7 d’Évian
  et a permis de poursuivre la dynamique enclenchée sur beaucoup de sujets lors de
  ce G7. D''abord, l''Ukraine. J''ai eu l''occasion de le rappeler à l''issue du G7
  d’Évian, pour la première fois depuis la nouvelle administration américaine, nous
  avons reconvergé entre Américains et Européens sur la position à l''égard de l''Ukraine,
  le soutien à celle-ci, soutien militaire réaffirmé, soutien pour financer ses infrastructures
  énergétiques et soutien aussi pour recoordonner des sanctions à l''égard de la Russie
  et faire pression. Nous avons, côté européen aussi, une position plus forte puisque
  c''est la première fois depuis décembre 2024 que nous adoptons à Vingt-Sept des
  conclusions sur l''Ukraine, ce qui est un acquis aussi de ce Conseil. Évidemment,
  après le début des versements du prêt de 90 milliards d''euros qui avait été décidé
  en décembre, la dynamique est meilleure. Nous avons confirmé ici exactement cette
  dynamique que je viens de décrire, enclenchée à Évian. On a eu un débat sur le soutien
  aux capacités de défense, en particulier antiaériennes ; le rapprochement de nos
  capacités et de nos productions. Nous avons aussi souligné que le prêt accordé par
  les Européens permettra justement de manière concrète d''améliorer la résilience
  énergétique ukrainienne. Je veux aussi saluer à cet égard l''accord trouvé au G7
  pour financer les travaux de sécurisation de l''arche de confinement de la centrale
  de Tchernobyl qui avait été endommagée par un tir russe en février 2025. Notre soutien
  aussi va de pair avec l''accroissement des sanctions, et là aussi position à vingt-sept.
  À ce titre également, nous resserrons l’étau sur la flotte fantôme, qui demeure
  le vecteur principal des exportations du pétrole russe, et augmentons la pression
  sur le système bancaire russe et les mécanismes financiers alternatifs, c''est-à-dire
  les cryptomonnaies utilisées pour contourner les sanctions. Comme agréé là aussi
  au G7, nous allons renforcer nos sanctions sur le secteur pétrolier et gazier pour
  une adoption rapide du 21ème paquet de sanctions. Les Européens restent prêts à
  contribuer à des garanties de sécurité robustes, notamment via la coalition des
  volontaires, qui aura un rôle à jouer au moment voulu. A ce titre, je veux ici rappeler
  que nous avons invité à Paris le 13 juillet prochain pour un sommet de la coalition
  des volontaires, tous les pays qui en sont membres, qu''ils soient membres de l''Union
  européenne ou pas, puis à participer au défilé du 14 juillet, aux côtés des armées
  aussi ukrainiennes. Enfin, les progrès réalisés dans le processus d''adhésion de
  l''Ukraine et de la Moldavie cette semaine sont historiques, je veux ici les rappeler,
  ils ont été salués lors de ce Conseil ; l''ouverture du bloc des chapitres fondamentaux
  qui marque le début officiel des négociations d''adhésion. Je salue l''engagement
  de la Hongrie et de l''Ukraine sur le sujet des minorités nationales, qui permet
  ainsi aussi de remettre sur le droit chemin le processus d''adhésion de l''Ukraine
  à l''Union européenne, en restant fondés sur le respect des mérites propres. Il
  s’agit d’une avancée sur ce sujet et d’une confirmation de la dynamique positive
  qui a été manifeste lors du G7. Ensuite, sur la situation au Moyen-Orient. Là aussi,
  dans la continuité des travaux que nous avons menés ces derniers jours à Évian,
  nous avons salué le mémorandum d''entente entre les États-Unis et l''Iran qui a
  permis de mettre fin aux hostilités, y compris au Liban, la réouverture du détroit
  d''Ormuz et qui ouvre la voie à une reprise des négociations vers un accord pour
  restaurer durablement la stabilité et la sécurité dans la région. Les Européens
  sont prêts à contribuer à la mise en œuvre de cet accord pour rétablir la liberté
  de navigation dans le détroit d''Ormuz via la mission militaire multilatérale que
  nous avons finalisée, et qui pourra être déployée quand les conditions le permettront
  et à la demande des parties prenantes, nous nous tenons disponibles. Aussi pour
  que l''Iran puisse coexister pacifiquement avec son environnement régional en encadrant
  ses programmes nucléaires et balistiques, ainsi que la fin de ses activités de déstabilisation
  dans la région et en Europe. Au Liban, la position unanime a été un cessez-le-feu
  immédiat, et le soutien, évidemment, à celui-ci, un retrait d''Israël du territoire
  libanais, un retrait aussi, évidemment, et une remise de ses armes par le Hezbollah,
  et le soutien de la politique menée par le Président Aoun et le Premier ministre
  Salam d''assumer le monopole des armes aux Forces armées libanaises. L''Union européenne
  mobilisera ses instruments pour renforcer l''État libanais et ses forces armées
  et de sécurité. À ce titre, j’ai eu l''occasion hier de voir le Premier ministre
  Nawaf Salam, nous allons articuler nos efforts avec aussi le travail qui est en
  cours à Washington entre représentants libanais et israéliens. Nous aurons l''occasion
  de finaliser le calendrier la semaine prochaine, en lien avec les autorités libanaises,
  pour une conférence de soutien aux Forces armées libanaises et à la reconstruction.
  Nous organiserons à Paris celle-ci dans les prochaines semaines pour mobiliser les
  financements internationaux, pour mobiliser le soutien aux Forces armées libanaises,
  mais également permettre la construction, en lien très étroit avec le Liban, des
  solutions qui se substitueront ou auront vocation à poursuivre l''effort aujourd''hui
  de la FINUL. Sur la situation à Gaza, nous allons continuer à faire pression pour
  mettre en œuvre le plan de paix. Le constat est évidemment clair, aujourd''hui,
  la situation humanitaire est inacceptable, la solution politique n''avance pas et
  l''acheminement massif et sans entrave de l''aide humanitaire est la priorité. En
  Cisjordanie, les avancées du projet de colonisation E1 sapent la perspective d''un
  État palestinien et d''une solution à deux États et imposent d''agir vite : sanctions
  contre la colonisation extrémiste et violente de la Cisjordanie, sanctions à l''échelle
  européenne des ministres extrémistes, approfondissement de la différenciation entre
  le territoire d''Israël et les colonies illégales afin d''aligner notre politique
  commerciale sur le droit international. Le débat, ce matin, a permis de partager
  les convictions des uns et des autres sur ce sujet et d''avoir des conclusions qui
  vont permettre, et à la Commission d''un côté et au Conseil, de poursuivre leurs
  travaux et de prendre ces décisions. Voilà pour les deux grands dossiers internationaux
  qui ont, ces derniers jours, été marqués, je le disais, d''abord par les avancées
  de ce protocole d''entente qui, au moins, a mis fin aux bombardements, avec beaucoup
  de dossiers qui restent ouverts et nécessitent un travail important, mais à une
  reconvergence entre Européens et Américains et, je le crois, à des perspectives
  d''évolution positives, mais qui nécessitent encore beaucoup d''engagement de tous
  sur ces deux dossiers. Nous avons ensuite, longuement hier soir, parlé des déséquilibres
  macroéconomiques mondiaux. Le constat est connu, il a été très bien décrit par le
  Fonds monétaire international, par les experts que nous avions mobilisés pour le
  G7, largement décrit et partagé lors du G7 et discuté hier. Les Européens ont d''abord,
  si je puis dire, leur part du travail : améliorer leur compétitivité et accroître
  leur investissement. C''est cohérent avec ce que nous avions décrit lors de notre
  retraite en février dernier et dans tous les travaux récents. Ensuite, nous voyons
  aussi que, de leur côté, les États-Unis et la Chine ont une part du travail à mener :
  nécessité de réduire les déficits jumeaux côté américain, nécessité de traiter la
  question monétaire chinoise, nécessité aussi de réduire les subventions excessives
  et la consommation domestique insuffisante du côté de la Chine. Le dialogue sur
  les déséquilibres mondiaux sera poursuivi. Il a permis, dans le cadre du G7, d''avancer
  en définissant ce consensus en G7+. Puis aussi, quelques jours avant le G7, avec
  le sommet que nous avions tenu sur ce qu''on appelle le Sommet des Convergences
  avec l''Inde et la Chine, en associant pour la première fois depuis 20 ans la Chine
  à de tels travaux et en commençant à préparer ce travail sur la base de ce que je
  viens d''évoquer en vue du G20 de la fin d''année. L''Union européenne doit aussi,
  dans ce contexte, gagner en rapidité et en efficacité. Il est aussi vrai qu''il
  faut simplifier, gagner en compétitivité et investir davantage. La description qui
  a été faite hier de la situation montre que l''Union européenne a encore des dépendances
  excessives dans beaucoup de domaines et qu''il y a une accélération dans certains
  secteurs de la désindustrialisation du fait d''une concurrence déloyale, en particulier
  venant de Chine. C''est pourquoi l''Union européenne doit accélérer et mobiliser
  ses instruments de défense commerciale pour assurer à nos entreprises des conditions
  de concurrence loyale. Pas de conflits, pas de protectionnisme, mais une lucidité,
  des instruments de juste protection et une réduction de nos dépendances. Nous devons
  faire levier du marché intérieur, assumer la préférence européenne dans les secteurs
  stratégiques, comme on a commencé à le faire et comme la France l''a toujours soutenu,
  poser nos conditions aux investissements directs étrangers, avec un véritable transfert
  de technologie et de l''emploi local, et au fond, avoir des mesures de court terme
  qu''on doit encore renforcer : les clauses de sauvegarde, la préférence européenne,
  les mesures qu''on a déjà commencé à mettre en œuvre et qu''il faut continuer dans
  d''autres secteurs, les compléter au besoin. Nous devons assumer une politique de
  diversification comme celle qu''on fait sur les minerais critiques ou les terres
  rares. Là aussi, le G7 a permis de compléter notre approche européenne, puisque
  pour la première fois dans le cadre du G7, nous avons obtenu un accord avec les
  Américains pour ensemble réduire notre dépendance aux minerais critiques et aux
  terres rares, coopérer, et on a décidé d''un peu moins de 200 projets communs pour
  un montant total d''investissement d''un peu plus de 60 milliards d''euros. On doit
  poursuivre cette mécanique qui est la seule qui permettra à notre industrie de maintenir
  ses emplois et surtout à l''innovation de se faire et d''être maîtrisée par les
  Européens. C''est en particulier l''objectif de L'' Industrial Accelerator Act que
  nous devons adopter rapidement. C''est aussi dans ce sens que les initiatives que
  nous continuons de pousser pour la titrisation, la supervision unique et, au fond,
  un vrai marché unique des capitaux et de l''investissement en Europe s''imposent.
  Nous sommes entrés dans le fond de la négociation du prochain budget pluriannuel
  de l''Union européenne sur la période 2028-2034, à partir de ce qu''on appelle cette
  boîte de négociation chiffrée proposée par la présidence chypriote. Ici, nos objectifs
  sont assez simples pour essayer de clarifier le débat, peut-être le simplifier.
  Sur les dépenses, nous voulons que ce budget commun réponde aux défis de souveraineté
  et de sécurité des Européens. Pour cela, qu''il préserve nos politiques traditionnelles,
  comme la Politique agricole commune, la politique de pêche, celle aussi que nous
  avons à l''égard des régions ultrapériphériques, importantes pour la France, puis
  la politique de cohésion, importante pour beaucoup de pays et beaucoup de nos régions.
  Nous devons, dans le même temps, investir dans les secteurs clés pour notre avenir
  et notre souveraineté : préférence européenne pour la défense, politique spatiale,
  intelligence artificielle, quantique, cleantech . Cette augmentation, qui correspond
  d''ailleurs à la proposition de la Commission, est très cohérente avec le constat
  macroéconomique que je viens de tirer. L''Europe doit investir davantage. En matière
  de dépenses, nous devons assumer cette augmentation, mais qui suppose aussi plus
  d''efficacité collective, une gouvernance claire, en particulier pour le Fonds de
  modernisation et de compétitivité, qui suppose que les États membres soient pleinement
  associés à la définition de ces objectifs, qu''on ait un critère d''excellence qui
  soit bien pris en compte. Pour cela, du côté des recettes, nous devons travailler
  en priorité à de nouvelles ressources propres afin de stabiliser nos contributions
  nationales à ce budget. C''est la condition sine qua non d''un accord équilibré.
  Je veux enfin saluer les accords partiels trouvés au Conseil cette semaine par la
  présidence chypriote sur trois règlements de base de ce futur cadre financier et
  qui permettront de préserver la PAC, la pêche et le soutien spécifique à nos outre-mer,
  en particulier le programme POSEI. Et on doit poursuivre ce travail pour maintenir
  les acquis de ces derniers mois sur la neutralité technologique, la préférence européenne
  en matière de défense, la place des États dans la gouvernance. L’aide au développement
  de l''Europe, ce qu''on appelle : « l''Europe globale », ne devra pas servir aujourd''hui
  à financer des choses qui ne relèvent pas de cette politique, mais elle doit précisément
  servir l''influence, le poids de l''Europe et les partenariats dans l''esprit, là
  aussi, de ce que la France défend et de ce qui a été acté au G7, c''est-à-dire un
  nouveau partenariat fondé sur l’investissement solidaire et défense de nos intérêts
  avec les pays du Sud, sans confondre les différents objectifs que nous pouvons avoir
  à travers ce budget. Je ne vais pas être plus long pour pouvoir répondre à vos questions,
  mais voilà les quelques éléments que je voulais livrer à votre connaissance à l''issue
  de ce Conseil, où nous avons pu avancer à travers nos discussions sur des dossiers
  structurants, évidemment, pour notre Europe, et le faire en continuité avec les
  acquis consolidés lors du G7 d''Évian. Je réponds maintenant à vos questions. Bonjour,
  Monsieur le Président. Je voulais vous demander si vous aviez été informé au préalable
  de l''initiative prise par Antonio Costa pour essayer d''établir un canal de communication
  diplomatique avec Moscou. Pensez-vous qu''il serait légitime, que le Président du
  Conseil européen, de représenter les Européens dans le cadre d''éventuelles négociations
  de paix à venir si elles se matérialisent ? Sur ce sujet, nous avons eu un débat
  très clair hier. Les Européens ne sont pas des médiateurs. Il y a pu y avoir des
  puissances parfois amies qui se sont positionnées comme étant des médiateurs de
  ce conflit. Nous ne sommes pas des médiateurs. Nous sommes aux côtés de l''Ukraine.
  Nous lui apportons de l''aide, du soutien et nous avons sanctionné la Russie. Deuxième
  élément très simple, très clair, que nous avons toujours défendu : le jour où il
  y aura des négociations, les européens devront être autour de la table. Parce qu''il
  en va des intérêts de l''Europe qui, partie liée avec ce qui se joue en Ukraine
  par l''aide que nous avons apportée, par la question de l''élargissement qui concerne
  les Européens, aussi par les soutiens financiers et les prêts que nous avons pu
  faire dans le règlement financier de celui-ci. L’Union européenne devrait être représentée
  et le président Costa, en tant que ses compétences sont définies, il y aura une
  place. Pour autant, les États membres y auront aussi leur place. Il ne peut pas
  les représenter quand il s''agit des garanties de sécurité qui seront un élément
  clé de toute négociation. Premièrement, nous ne sommes pas des médiateurs. Deuxièmement,
  nous devons être autour de la table d''une négociation quand elle se tiendra, les
  représentants des institutions et les États membres qui sont clés pour les garanties
  de sécurité futures. Ce qui s''est passé ces dernières semaines, c''est que les
  Européens disent que dans une négociation qui avait été initiée par les Américains :
  « on doit en être ». C''est aussi à ce titre que le président Zelensky avait sollicité
  le E3 et nous avait demandé de venir à Londres, il y a 8 jours. Les choses ont changé
  ces derniers jours, puisque les Américains, pour la première fois depuis l''élection
  du président Trump, ont dit : « on se met avec vous, on soutient l''Ukraine, on
  va soutenir encore plus fort et on va sanctionner la Russie. » La question aujourd''hui
  n''est pas de savoir qui, quand, comment doit aller négocier avec la Russie, c''est
  de se dire on a tous clarifié notre position, alors c''est à la Russie, à qui beaucoup
  d''offres ont été faites ces derniers mois, de dire quand elle sera prête à négocier.
  La négociation se tiendra d''abord entre la Russie et l''Ukraine, et devra associer
  autour de la table les Américains et les Européens. Je pense qu''il faut être très
  clair sur le débat et, dans le bon ordre des choses, compte tenu de ce qui s''est
  passé ces derniers jours, notre priorité, c''est l''aide militaire à l''Ukraine
  et le soutien est le soutien à sa politique énergétique pour l''hiver prochain,
  l''accroissement de la pression sur la Russie et notre disponibilité à recevoir
  un message de la Russie si elle était prête à négocier sérieusement, ce qui n''a
  pas été le cas jusqu''à présent. Vous n''avez pas répondu à la question de mon collègue
  pour savoir si vous aviez été informé de l''initiative… Je pense que c''est de rang
  2 tout ça. J''ai le droit de vous dire que c''est de rang 2. Je vous ai expliqué
  exactement ce que c''était là. Je pense que si nous-mêmes, nous décidons d''avoir
  des débats inutiles dans des situations complexes, on peut passer beaucoup de temps.
  Je vous dis ce que je pense et je vous dis ce que je fais. J’ai confiance dans mes
  partenaires. On travaille avec les chefs d''État des gouvernements qui sont autour
  de la table, avec le président Costa, la présidente Von Der Leyen, en confiance,
  parce qu''on poursuit les mêmes objectifs. On est tous d''accord sur ce que je viens
  de vous dire. Hier, Mette Frederiksen et Giorgia Meloni ont appelé à un nouveau
  débat stratégique sur l''immigration. Je crois que vous n''étiez pas encore arrivés.
  Est-ce que vous pensez, qu''il est nécessaire de « ravoir » un débat stratégique
  sur l''immigration ? Est-ce que c''est un sujet ? Et dans cette lettre qui a été
  signée par 19 États membres, initiés par également Rome et Copenhague, les signataires
  de cette lettre demandent à ce qu''il y ait une aide financière de la Commission
  pour financer les fameux centres de retour. Est-ce que vous pensez que cette question-là,
  du financement des centres de retour, doit aussi être discutée au niveau européen ?
  Merci pour votre question. Il y a eu, en effet, un débat, et j''étais représenté
  par le chancelier Merz, qui a tenu à Paris avec le Premier ministre Modi, puis le
  Premier ministre Salam, mais dans les conclusions, nous avons acté qu''il y aurait
  un débat stratégique en octobre. Je suis tout à fait disponible pour le faire. Quelle
  est la politique migratoire que nous défendons ? Nous défendons, et nous avons permis
  d''ailleurs à cette politique d''avancer ces dernières années. Nous sommes pour
  qu''il y ait moins d''immigration illégale en Europe, qu''on traite plus vite le
  sujet quand il advient, qu''on soit plus efficace en européen, et qu''on puisse
  renvoyer chez eux les personnes qui n''ont pas vocation à rester sur le sol européen,
  donc celles qui n''ont ni l''asile, ni ne sont en train de s''intégrer ou n''ont
  de titre régulier. Je crois que ça relève d''un certain bon sens. C''est conforme
  à notre droit et c''est ce que nos sociétés attendent de nous. Je dis ça parce que
  c''est la France, sous sa présidence, qui a débloqué la question migratoire, qui,
  je rappelle, était bloquée depuis plus de 4 ans, avec plus aucune avancée. Pour
  y avoir fait tous les conseils sur ce sujet, c''était à chaque fois la foire d''empoigne.
  On a relancé cela en 2022 cela a permis d''arriver au pacte asile-migration, lequel
  maintenant entre en vigueur. Qu''est-ce qu’il va nous permettre ce pacte ? Et ça,
  je le soutiens, la France le défend parce qu''elle en a été à l''initiative. On
  contrôle mieux les arrivées, on a des mécanismes d''enregistrement qui permettent
  d''aller beaucoup plus vite et donc de suivre les personnes qui rentrent sur le
  territoire européen, même quand ils passent les frontières entre nos pays. On traite
  beaucoup plus vite les dossiers. Pour celles et ceux qui n''ont pas vocation à rester,
  on les renvoie beaucoup plus vite dans leur pays. Ça a été complété par une politique
  de retour avec des éléments de retour vers les pays d''origine qui permet là aussi
  d''être plus efficaces. Tout ça, nous le soutenons. Nous avons pris ces dernières
  années nous-mêmes des politiques qui ont durci notre droit parce que c''était une
  nécessité face à la pression migratoire que le continent européen a subie. Plusieurs
  pays, depuis plusieurs mois, parfois années, ont décidé d''avoir des politiques,
  je cite le terme, « innovantes » sur le sujet. Je suis un grand soutien de l''innovation
  dans mon pays, je serai tout à l''heure avec Vivatech encore, mais j''ai toujours
  une grande prudence quand on parle d''innovation sur les valeurs et les droits humains.
  Permettez-moi d''avoir cette réserve. Il y a la question, en effet, de ces fameux
  centres de retour dans les pays tiers. Cette politique-là, la France ne la soutient
  pas. Nous sommes pour une politique de retour plus efficace. Je n''ai jamais vu
  un centre de retour dans un pays tiers fonctionner. J’ai, ces dernières années,
  beaucoup entendu des gens le faire ou signer des accords. Je vous invite à considérer
  ce que c''est. Ça veut dire que des gens qui ne veulent pas revenir dans leur pays
  d''origine ou que vous n''arrivez pas à faire revenir dans leur pays d''origine,
  vous allez trouver un troisième pays dans lequel vous allez les pousser, et que
  ce pays va accepter, peut-être contre de l''argent. Alors quel pays, quelles relations
  vous créez, quels droits humains, et que vous allez pousser tous ces gens dans un
  pays qui n''est pas le leur, alors même que vous ne voulez pas les garder chez vous.
  Je ne suis pas sûr que ce soit ça, notre Europe. Je ne suis pas sûr que ce soient
  les principes fondamentaux sur lesquels notre Europe s''est construite. Je ne crois
  pas, par ailleurs, que ce soit efficace. La preuve en est que je n''ai jusqu''alors
  vu personne le faire fonctionner. Je crois même que les pays qui avaient signé des
  préaccords avec les uns ou les autres, membres de l''Union européenne ou d''autres,
  ne les ont pas mis en œuvre. Donc nous ne le mettrons pas en œuvre, et j''ai beaucoup
  de respect pour toutes celles et ceux qui veulent le faire, je suis en désaccord,
  à la fois d''un point de vue pragmatique et principiel. Je pense que ça n''a rien
  à voir avec la politique européenne, ça relève des politiques nationales. En tout
  cas, moi, je m''opposerais à ce que le budget européen, a fortiori le budget pour
  la politique internationale de l''Europe, soit utilisé pour bâtir des centres de
  retour. Quand parfois on entend les uns ou les autres défendre des politiques avec
  le continent africain ou d''autres, bon courage pour défendre notre crédibilité
  sur ces continents en expliquant qu''on va utiliser l''argent pour l''investissement
  solidaire afin de faire des centres de retour sur leurs continents. Là où la totalité
  de l''Union africaine se mobilise aujourd''hui sur des questions historiques ô combien
  importantes, comme la traite des êtres humains ou autres. Dans quel monde vit-on ?
  Oui, pour une politique très rigoureuse en matière d''immigration, tel que nous
  l''avons porté au niveau européen et national, et je l''assume. Oui, pour une politique
