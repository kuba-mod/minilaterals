  sujet quand il advient, qu''on soit plus efficace en européen, et qu''on puisse
  renvoyer chez eux les personnes qui n''ont pas vocation à rester sur le sol européen,
  donc celles qui n''ont ni l''asile, ni ne sont en train de s''intégrer ou n''ont
  de titre régulier. Je crois que ça relève d''un certain bon sens. C''est conforme
  à notre droit et c''est ce que nos sociétés attendent de nous. Je dis ça parce que
  c''est la France, sous sa présidence, qui a débloqué la question migratoire, qui,
  je rappelle, était bloquée depuis plus de 4 ans, avec plus aucune avancée. Pour
  y avoir fait tous les conseils sur ce sujet, c''était à chaque fois la foire d''empoigne.
  On a relancé cela en 2022 cela a permis d''arriver au pacte asile-migration, lequel
  maintenant entre en vigueur. Qu''est-ce qu’il va nous permettre ce pacte ? Et ça,
  je le soutiens, la France le défend parce qu''elle en a été à l''initiative. On
  contrôle mieux les arrivées, on a des mécanismes d''enregistrement qui permettent
  d''aller beaucoup plus vite et donc de suivre les personnes qui rentrent sur le
  territoire européen, même quand ils passent les frontières entre nos pays. On traite
  beaucoup plus vite les dossiers. Pour celles et ceux qui n''ont pas vocation à rester,
  on les renvoie beaucoup plus vite dans leur pays. Ça a été complété par une politique
  de retour avec des éléments de retour vers les pays d''origine qui permet là aussi
  d''être plus efficaces. Tout ça, nous le soutenons. Nous avons pris ces dernières
  années nous-mêmes des politiques qui ont durci notre droit parce que c''était une
  nécessité face à la pression migratoire que le continent européen a subie. Plusieurs
  pays, depuis plusieurs mois, parfois années, ont décidé d''avoir des politiques,
  je cite le terme, « innovantes » sur le sujet. Je suis un grand soutien de l''innovation
  dans mon pays, je serai tout à l''heure avec Vivatech encore, mais j''ai toujours
  une grande prudence quand on parle d''innovation sur les valeurs et les droits humains.
  Permettez-moi d''avoir cette réserve. Il y a la question, en effet, de ces fameux
  centres de retour dans les pays tiers. Cette politique-là, la France ne la soutient
  pas. Nous sommes pour une politique de retour plus efficace. Je n''ai jamais vu
  un centre de retour dans un pays tiers fonctionner. J’ai, ces dernières années,
  beaucoup entendu des gens le faire ou signer des accords. Je vous invite à considérer
  ce que c''est. Ça veut dire que des gens qui ne veulent pas revenir dans leur pays
  d''origine ou que vous n''arrivez pas à faire revenir dans leur pays d''origine,
  vous allez trouver un troisième pays dans lequel vous allez les pousser, et que
  ce pays va accepter, peut-être contre de l''argent. Alors quel pays, quelles relations
  vous créez, quels droits humains, et que vous allez pousser tous ces gens dans un
  pays qui n''est pas le leur, alors même que vous ne voulez pas les garder chez vous.
  Je ne suis pas sûr que ce soit ça, notre Europe. Je ne suis pas sûr que ce soient
  les principes fondamentaux sur lesquels notre Europe s''est construite. Je ne crois
  pas, par ailleurs, que ce soit efficace. La preuve en est que je n''ai jusqu''alors
  vu personne le faire fonctionner. Je crois même que les pays qui avaient signé des
  préaccords avec les uns ou les autres, membres de l''Union européenne ou d''autres,
  ne les ont pas mis en œuvre. Donc nous ne le mettrons pas en œuvre, et j''ai beaucoup
  de respect pour toutes celles et ceux qui veulent le faire, je suis en désaccord,
  à la fois d''un point de vue pragmatique et principiel. Je pense que ça n''a rien
  à voir avec la politique européenne, ça relève des politiques nationales. En tout
  cas, moi, je m''opposerais à ce que le budget européen, a fortiori le budget pour
  la politique internationale de l''Europe, soit utilisé pour bâtir des centres de
  retour. Quand parfois on entend les uns ou les autres défendre des politiques avec
  le continent africain ou d''autres, bon courage pour défendre notre crédibilité
  sur ces continents en expliquant qu''on va utiliser l''argent pour l''investissement
  solidaire afin de faire des centres de retour sur leurs continents. Là où la totalité
  de l''Union africaine se mobilise aujourd''hui sur des questions historiques ô combien
  importantes, comme la traite des êtres humains ou autres. Dans quel monde vit-on ?
  Oui, pour une politique très rigoureuse en matière d''immigration, tel que nous
  l''avons porté au niveau européen et national, et je l''assume. Oui, pour une politique
  qui lutte contre l''immigration illégale, qui nous rend plus efficaces, qui conduit
  à des retours. Pour ce qui est de la France, non, à des centres de retour ou des
  hubs de retour dans des pays tiers, parce que je crois que ça n''est ni efficace,
  ni ne correspond aux principes qui sont les nôtres. Pour ma part, ça doit relever
  des politiques de chaque État, je les respecte, mais ce n''est pas celles qu''on
  mettra en œuvre et ce n''est pas celles que le budget que nous adopterons mettra
  en œuvre. Une question sur le sujet des déséquilibres macroéconomiques globaux,
  plus particulièrement sur la Chine. Hier soir, les 27 ont chargé la commission de
  mener un dialogue avec la Chine, mais également de réfléchir à un nouvel instrument
  de défense commerciale. Selon vous, est-ce que l''Union européenne a besoin d''un
  nouvel instrument ? Si oui, lequel ? Et dans quel délai ? Et plus globalement, est-ce
  que vous avez constaté une plus grande unité des 27 sur le sujet chinois, au-delà
  du constat, mais sur la réponse à apporter à ce déséquilibre profond avec la Chine ?
  Merci. Oui, je trouve qu''il y a un réveil et heureusement. J’avais porté ce débat
  il y a plusieurs mois. J''avais eu l''occasion de m''exprimer dans la presse et
  de défendre cette approche qui n''est pas une approche hostile, pardon de l''anglicisme,
  on reste sur le dérisking plutôt que le découpling. Donc, on ne veut pas découpler
  notre économie, on veut réduire nos dépendances et protéger face à de la concurrence
  déloyale. Je pense que c''est légitime, il faut l''assumer. Le Premier ministre
  belge avait aussi écrit une lettre en ce sens après son propre déplacement, et on
  constate tous les chiffres. Dans des secteurs industriels comme la machine-outil
  ou l''automobile, on a aujourd''hui des destructions d''emplois massives, et on
  voit aussi l''efficacité des mesures qui ont été prises par la Commission européenne,
  par exemple sur les véhicules électriques que nous avions soutenus. On voit que
  ça permet de réguler les choses et de défendre les intérêts de nos constructeurs.
  On a utilisé des instruments ces derniers temps comme des clauses de sauvegarde,
  des mesures de préférence européennes. On a donné mandat à la Commission européenne
  parce qu''en fait, ça va tellement vite, il y a tellement de secteurs touchés qu''il
  est légitime de se poser la question : quelles sont les approches les plus efficaces ?
  J''ajoute qu''en fait, à chaque fois, secteur par secteur, les acteurs ou les gouvernements
  viennent solliciter la Commission, qui lance une enquête pour regarder s''il y a
  de la concurrence déloyale et ça prend souvent 12-18 mois. En 12-18 mois, vous pouvez
  avoir des entreprises qui sont au tapis. On l''a vu dans des secteurs, par exemple,
  comme les acides aminés, des choses comme ça, ou la nutrition agricole. Je pense
  que c''est dans ma ville de naissance à Amiens, Eurolysine, qu''on défend. Ils font
  des acides aminés, c''est parfaitement dans ce qu''on veut, c''est pour la nutrition,
  l''alimentation des bêtes, souveraineté alimentaire, c''est tout ce qu''on veut
  faire. Ils sont là, ils avancent, ils sont compétitifs, boum ! On a un dumping chinois
  sur ce secteur. On demande une enquête. Chaque mois qui passe, c''est chaque mois
  de sortie du marché pour ces acteurs, parce que ça va très, très vite. Quand on
  veut moderniser les outils que la Commission a à ce mandat, c''est pour pouvoir
  répondre plus rapidement et se dire, dès qu''il y a une suspicion, en fait, de concurrence
  déloyale et qu''on voit des positions qui posent problème, on doit pouvoir réagir
  et protéger. C''est aussi ce qu''il y a dans l''accélérateur industriel, c''est-à-dire
  des mécanismes d''aide beaucoup plus rapides pour nos secteurs. Je pense qu''il
  y a maintenant un alignement beaucoup plus fort qu''il y a quelques mois de nos
  acteurs européens, de l''ensemble de nos partenaires. Ça, je le mesure. Il y a une
  volonté de passer à l''acte, comme on l''a fait sur certains dossiers, on a beaucoup
  poussé, avec des instruments nouveaux et plus efficaces, comme je viens de le dire,
  surtout plus rapides. Ceci doit s''accompagner d''un dialogue exigeant avec la Chine,
  c''est-à-dire celui des transferts de technologies et de la création d''emplois
  chez nous. Parce qu''il faut aussi reconnaître que les acteurs chinois, il y a de
  la sur-subvention, ils subventionnent en moyenne huit fois plus leurs entreprises
  que la moyenne de l''OCDE. Vous imaginez ? Mais dans le même temps, il faut reconnaître
  aussi que la Chine a réussi à aller très vite et très fort sur de l''innovation.
  Quand on parle des green tech, quand on parle de la robotique, ils ont aussi des
  solutions industrielles qui sont pertinentes. On veut faire ce transfert de technologie
  pour être efficace. Merci beaucoup. Merci pour votre attention, vos questions. À
  très vite. Je vais m''exprimer dans quelques heures sur l''innovation technologique,
  celle-ci, à Paris.'
