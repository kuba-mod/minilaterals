date: '2026-06-25'
type: press_release
source_name: elysee
title: 36e Sommet franco-italien.
text: 'Le Président de la République s''est rendu à Antibes le jeudi 25 juin 2026
  à l’occasion du 36e sommet franco-italien. Pour ce sommet bilatéral, prévu par le
  traité du Quirinal signé en 2021, le chef de l’État a reçu la Présidente du Conseil
  des ministres d’Italie, Giorgia Meloni, dans une ville qui illustre notre attachement
  partagé à l’espace méditerranéen , au cœur d’une région marquée par nos coopérations
  et partenariats transfrontaliers , notamment en matière d’infrastructures, de transports
  ou de sécurité. Ce sommet a permis d’approfondir la coopération franco-italienne
  dans plusieurs secteurs stratégiques , notamment la défense, l’énergie nucléaire
  et le spatial. Les deux dirigeants ont échangé également sur les grands enjeux européens
  et internationaux , en particulier le soutien à l’Ukraine et la situation au Liban,
  et ont lancé des initiatives visant à renforcer les liens entre nos peuples , en
  particulier à travers la jeunesse et la culture. Emmanuel MACRON Madame la Présidente
  du Conseil, chère Giorgia, Mesdames, Messieurs les ministres, Mesdames les ambassadrices,
  Mesdames, Messieurs, en vos grades et qualités. Je remercie Madame la Présidente
  du Conseil ainsi que tous les ministres ici présents, et les acteurs de la relation
  entre l''Italie et la France, pour leur présence à Antibes à l''occasion de notre
  36ème sommet franco-italien. Nous nous sommes, en effet, retrouvés ces derniers
  jours à de nombreuses reprises avec Madame la Présidente, lors du sommet du G7 à
  Évian, juste après au Conseil européen des 18 et 19 juin, hier à Berlin avec plusieurs
  autres collègues. Et nous nous retrouverons dans quelques jours à Ankara pour le
  sommet de l''OTAN, comme nous l''avions fait d''ailleurs au début mai au sommet
  de la Communauté politique européenne en Arménie. Dans chacune de ces enceintes,
  l''Italie et la France partagent des intérêts, des convictions et portent souvent
  des projets communs. Ce travail s''appuie sur une coopération bilatérale qui est
  riche et solide, dont ce sommet nous montre la profondeur des partenariats, des
  projets, des investissements qui constituent la réalité concrète de la relation
  entre l''Italie et la France. Les sept accords qui viennent d''être signés le montrent,
  comme aussi les accords qui ont été signés entre nos entreprises et entre nos grands
  acteurs. Oui, l''Italie et la France sont toujours l''une pour l''autre des partenaires
  aussi naturels qu''incontournables. C''est tout l''objet de ce sommet que de projeter
  la relation franco-italienne vers l''avenir avec des objectifs clairs. C''était
  le sens aussi du traité du Quirinal qui, depuis cinq ans, a donné un cadre plus
  ambitieux et plus concret à nos partenariats et à nos projets. D''abord, sur le
  plan économique et commercial, nos deux pays ont largement dépassé en 2025 le niveau
  historique des 100 milliards d''euros d''échanges et de biens. Nos chaînes de valeurs
  sont intégrées, nos entreprises travaillent de plus en plus sur des projets communs,
  tandis que nos investissements croisés sont plus conséquents. Le succès du forum
  d''affaires franco-italien qui s''est tenu au Cannet en est la parfaite illustration.
  Ce sommet vient d''abord rehausser notre coopération en matière de défense. Nous
  venons de l''évoquer, nos ministres se sont réunis sur nos priorités partagées :
  le soutien continu à l''Ukraine, la participation conjointe à des opérations de
  paix et de politiques de sécurité et de défense communes, les programmes conjoints
  d''armement, avec des réussites franco-italiennes comme les missiles Aster ou le
  SAMP/T Nouvelle Génération. Notre feuille de route capacitaire et le comité bilatéral
  de stratégie industrielle de défense acté aujourd''hui viendront renforcer notre
  coopération capacitaire et industrielle en appui à la base industrielle et technologique
  de défense européenne. Nous renforçons aussi notre coopération dans le domaine de
  l''énergie. L''actualité récente l''a encore démontré, il est plus que jamais nécessaire
  de renforcer l''indépendance énergétique de notre Europe. La France a fait un choix
  clair et décisif il y a de nombreuses années en faveur de la production d''énergie
  nucléaire et un processus législatif est en cours en Italie en vue d''une relance.
  À ce titre, je veux saluer la volonté des industriels italiens de participer au
  développement et au déploiement en Europe du projet de petits réacteurs modulaires
  NUWARD. Je l''ai redit lors de nos échanges avec Madame la Présidente du Conseil,
  nous voulons bâtir avec l''Italie un partenariat industriel global et privilégié
  dans le domaine du nucléaire civil, couvrant toute la chaîne de valeur. Dans le
  secteur spatial, la coopération franco-italienne a été un moteur historique pour
  l''Europe et elle doit le rester. Le site de Thales Alenia Space à Cannes, visité
  par les ministres italiens et français aujourd''hui, en est le symbole. Nous devons
  continuer à mettre ces compétences au service du renforcement de la compétitivité,
  de la résilience, de la souveraineté européenne, pour l''accès autonome à l''espace,
  les communications par satellite, l''observation et l''exploration, comme pour le
  spatial de défense. C''est pourquoi nous avons réaffirmé notre soutien au projet
  BROMO, porté par Thales Alenia Space, Airbus et Leonardo, qui permettra l''avènement
  d''un champion européen du spatial, ainsi qu''au projet IRIS², qui constituera la
  colonne vertébrale de la connectivité satellitaire européenne. Nos équipes vont
  continuer à travailler durant l''été et se retrouveront aussi pour porter un agenda
  commun lors du Sommet spatial international des 9 et 10 septembre prochains. En
  matière de sécurité, nous avons acté lors de ce sommet la création de la brigade
  mixte franco-italienne, afin de nous doter d''un instrument opérationnel de surveillance
  autour de notre frontière commune au service de la lutte contre la criminalité transfrontalière
  et l''immigration irrégulière, alors que nous mettons en œuvre le Pacte asile et
  migration. Nous travaillons aussi étroitement ensemble dans le cadre de la Communauté
  politique européenne, puisque l''Italie et la France ont pris une initiative commune
  de bâtir cette Coalition européenne contre les drogues et le narcotrafic, qui rassemble
  40 États et organisations partenaires pour des résultats opérationnels, de la résilience
  portuaire à la lutte contre les flux financiers illicites, ainsi qu''à la réhabilitation.
  Nous multiplions aussi nos coopérations en matière de transport, nous poursuivons
  nos projets. A cet égard aussi, le comité transfrontalier porté au niveau des ministres
  qui avait été décidé dans le cadre du traité du Quirinal a changé la donne en termes
  de rapidité de mise en œuvre. Le projet du tunnel routier de Tende, autour de deux
  tunnels, après la mise en service d''un nouveau tube à l''été 2025, est clé. Nous
  avançons sur le projet de liaison ferroviaire Lyon-Turin. Nous progressons pour
  réaliser l''axe ferroviaire Marseille-Gênes, désormais éligible au financement européen.
  Et on le voit bien, de Tende à Fréjus, nous avons beaucoup progressé sur l''ensemble
  de nos projets transfrontaliers en termes d''infrastructures, et il nous faut poursuivre,
  de la même manière que nous poursuivons une stratégie commune sur le plan industriel
  et agricole. L''accord qui a été signé aujourd''hui le montre là aussi, comme la
  communauté d''agenda européen le montre également. En matière de culture, nous nous
  engageons à valoriser notre patrimoine matériel et immatériel, à faciliter la mobilité
  des artistes, à encourager la coproduction d''œuvres culturelles, en particulier
  dans le cinéma et l''audiovisuel. C''est tout le sens de l''accord qui a été signé.
  Enfin, la vitalité de notre relation se mesure aussi aux échanges croissants entre
  nos jeunesses et nos étudiants. Nous avons acté la création d''un parcours franco-italien
  pour les élèves de lycées professionnels, le lancement d''un nouveau programme de
  jeunes talents, et le renforcement de notre coopération dans les domaines de l''enseignement
  et de la formation professionnelle. Cette relation bilatérale, dont je viens de
  décrire ici à la fois les forces historiques, mais ce qui s''est aussi beaucoup
  développé ces dernières années, ou que ce sommet permet d''accélérer, vient en quelque
  sorte nourrir également une vision de l''Europe plus compétitive et plus souveraine.
  Nous avons échangé sur nos défis de compétitivité, et l''Union européenne, en effet,
  nous en sommes convaincus ensemble, doit accélérer, investir plus, réduire ses dépendances,
  se diversifier. Nous avons constamment, ces derniers mois, porté cette exigence
  commune lors des débats européens, en voulant aussi assurer pour nos entreprises
  une concurrence plus loyale, protéger lorsqu''il y a de la concurrence déloyale,
  simplifier pour se resynchroniser avec le reste du monde, investir. Nous devons
  faire levier de notre marché intérieur, soutenir la production dans l''Union européenne
  par une préférence européenne dans les secteurs stratégiques, et accélérer sur l''union
  de l''épargne et de l''investissement pour avoir des financements conjoints privés.
  Nous avons eu également avec Madame la présidente une discussion sur le prochain
  cadre budgétaire pluriannuel pour l''Union européenne de 2028 à 2034. Et je crois
  pouvoir dire que l''Italie et la France ont le même agenda : défendre les politiques
  de cohésion et d''agriculture, avoir une Europe plus efficace, avoir une Europe
  qui investit dans ses politiques d''avenir pour être souveraine, et donc qui saura
  trouver ou des ressources nouvelles pertinentes qui ne touchent pas nos acteurs
  industriels ou nos ménages, ou aller vers des mécanismes d''endettement communs
  de manière pragmatique. En effet, c''est cet équilibre qui sera clé et c''est pourquoi
  nous devons travailler ensemble en priorité à de nouvelles ressources propres, bâtir
  un accord équilibré, mais aussi savoir innover sur le financement du prochain budget.
  Enfin, durant ce sommet, nous reviendrons sur ce que nous avons beaucoup débattu
  ces derniers jours dans les grandes questions internationales. L''Ukraine, nous
  l''avons largement évoquée hier, et je ne veux pas ici être plus long, mais nous
  avons ces derniers jours réussi une reconvergence avec les États-Unis d''Amérique,
  ce qui est un point clé pour l''efficacité de notre stratégie. Évidemment, la mise
  en œuvre de la paix au Proche et Moyen-Orient. Et à ce titre, nous avons avec nos
  partenaires un rôle à jouer pour contribuer à des opérations de déminage et de réouverture
  d''Ormuz, mais nous voulons le faire dans un cadre pacifique, agréé et déconflicté
  avec l''ensemble des parties prenantes, qui permettra justement la stabilité dans
  la durée. Sur Israël et la Palestine, nous avons plaidé en faveur d''une mise en
  œuvre effective du plan de paix à Gaza et permettre l''acheminement massif et sans
  entrave de l''aide humanitaire. Et lors du G7, nous avons ensemble plaidé pour qu''en
  Cisjordanie, des avancées de la colonisation qui sapent la perspective d''une solution
  à deux États cessent. Nous devons maintenant avancer entre Européens sur la mise
  en œuvre de mesures concrètes. Et puis, pour le Liban, la France et l''Italie ont
  un rôle particulier. Nous sommes deux nations fortement contributrices de la FINUL,
  et ensemble avec Madame la présidente, nous voulons lancer une coalition sur le
  dispositif post-FINUL évidemment en coordination avec l''Union européenne et les
  Nations unies, pour renforcer la souveraineté du Liban et de ses forces armées,
  empêcher que son territoire ne devienne le point d''appui d''une escalade régionale.
  Je crois pouvoir dire que, sur ce point comme sur beaucoup d''autres, la coopération
  entre nos forces armées, nos ministres et entre nous est excellente et, je l''espère,
  permettra d''avancer durant les prochains mois pour bâtir une perspective après
  le 31 décembre 2026, puisque c''est la fin du mandat de la FINUL qui sera alors
  actée. La feuille de route issue du sommet franco-italien est claire et opérationnelle.
  Les défis que nous avons sont nombreux, je viens ici d''en couvrir qu''une partie.
  Mais je crois pouvoir dire que nos entreprises, nos administrations, nos jeunesses,
  nos sociétés civiles et nos gouvernements ont conscience, comme nous l''avons l''un
  et l''autre, de l''importance de ces défis et de l''exigence des temps que nous
  vivons. Et je crois que tous les projets que nous bâtissons lors de ce sommet sur
  le plan bilatéral, tout ce que nous avons décidé aujourd''hui d''actions communes
  sur le plan européen et les initiatives prises de l''Ukraine au Liban permettent
  d''avoir un agenda commun qui donne à l''Italie et à la France une relation encore
  plus forte, mais aussi son utilité au sein de l''Europe et notre utilité pour défendre
  un droit international efficace et un ordre international plus stable. Je vous remercie
  pour votre attention en réitérant mes remerciements à Madame la présidente du Conseil
  de sa visite à Antibes et de ce sommet. Journaliste Bonsoir. Madame la Présidente
  du Conseil des ministres, Monsieur le Président de la République, vos relations
  ont parfois été qualifiées de glaciales. Comment les qualifiez-vous aujourd''hui ?
  Concrètement, sur le terrain, ce que nous constatons, c''est surtout l''évolution
  de l''un des symboles de ces relations entre l''Italie et la France, le tunnel de
  Tende. C''est le seul passage entre l''Italie et la France avec l''autoroute. Ça
  concerne des centaines de milliers de Français et d''Italiens. Ce tunnel, il a été
  fermé. Puis désormais, il y a une circulation alternée, extrêmement pénalisante
  pour les frontaliers. Alors puisque désormais, les relations semblent se réchauffer
  entre nos deux pays, pouvez-vous nous annoncer quand va rouvrir totalement ce tunnel ?
  Et puis, Madame la Présidente du Conseil des ministres, Monsieur le Président de
  la République, il y a également des inquiétudes concernant la réalisation concrète
  du méga-projet de satellite BROMO. Comment éviter qu''il ne finisse comme le projet
  d''avion de combat franco-allemand ? Merci beaucoup. Emmanuel MACRON Peut-être que
  nous vivons tous sous le même climat. Il est chaud et il n''y a plus rien de glaciaire.
  Nous défendons les intérêts de nos pays, mais nous le faisons de manière respectueuse
  et engagée. Nous croyons dans la force de la coopération bilatérale, en particulier
  la coopération transfrontalière. Je crois que l''accélération de beaucoup de projets
  l''a montré. Nous croyons aussi dans une Europe plus forte et plus souveraine et
  qui tient sa place. Et ça, je crois que ça nous rassemble. Et donc nous avons vraiment
  une approche commune, et vous l''avez vu, qu''il s''agisse de l''Ukraine, qu''il
  s''agisse du Liban, qu''il s''agisse de la situation à Ormuz ou de nos positions
  sur le budget, nous avons vraiment réussi à bâtir des convergences et c''est ça
  qui nous importe. Je suis, moi, très content de ce qu''on a réussi à trouver à bâtir
  et qui sort de ce sommet. À cet égard, c''est ça qui nous permettra d''avancer,
  vous l''avez dit, c''est la coopération transfrontalière qui a permis, après les
  terribles événements que nous avions subis, de rouvrir le tunnel de Tende, d''avoir
  d''abord un premier tube avec, en effet, parfois les contraintes qui existent, mais
  il est rouvert. C''était l''engagement qui a été pris. Et les travaux commencent
  sur le deuxième, comme je l''ai dit, et donc c''est ce sur quoi nous sommes d''accord.
  Et c''est d''ailleurs ce qui est piloté directement par nos ministres, conformément
  à ce qu''on a voulu il y a cinq ans lors du Traité du Quirinal, pour que, justement,
  il y ait des relations bilatérales beaucoup plus fortes et une coopération transfrontalière,
  c''est qu''elle soit prise au niveau ministériel sur ces sujets. Donc ça avance,
  je veux vous rassurer. On a été au rendez-vous des réouvertures qui avaient été
  promises lors des différents déplacements, mais on va continuer d''améliorer les
  choses. Cette coopération transfrontalière, elle est vraiment exemplaire, qu''il
  s''agisse des infrastructures de transport, et on va continuer, comme aussi de la
  coopération dans la lutte contre l''immigration clandestine, au-delà de la brigade
  signée aujourd''hui. D’ailleurs, tous ces derniers mois, ces dernières années, on
  a eu une coopération extrêmement efficace, et nos ministres en sont les garants
  et ont toujours fait fonctionner cela avec beaucoup de pragmatisme et d''efficacité.
  Sur BROMO, nous l''avons dit, l''un et l''autre, nous avons une communauté de vues,
  c''est-à-dire que nous soutenons cette opération. Elle consolide le spatial européen,
  elle consolide la force de nos entreprises, en particulier Thales Alenia Space,
  qui est présent dans votre région, mais également Airbus et Leonardo. Et donc nous
  avons besoin d''aller au terme, et nous, nous pensons que c''est cohérent avec l''agenda
  que nous soutenons, d''ailleurs Italie et France, et plusieurs collègues, qui est
  un agenda d''une plus grande compétitivité européenne et donc qui nous permet de
  bâtir des champions. Et donc bâtir des champions, c''est parfois rapprocher des
  grands acteurs européens entre eux. Et donc nous pensons qu''il faut faire ce projet,
  qu''il ne faut pas demander des remèdes excessifs, et même le moins possible, et
  qu''il faut permettre de bâtir ce grand champion mondial. Journaliste Bonsoir à
  toutes et à tous. Je m''adresse à Madame Meloni. Après l''interview à Fox ce mercredi,
  l''Italie a été accusée d''être complice de l''agression à l''Iran. Je voudrais
  savoir comment vous réagissez à cette accusation ? Et comment s''est passée la clarification
  avec Monsieur Rutte ? Est-ce que vous avez une idée de comment les choses se sont
  passées du moment que Monsieur Crosetto parle de mots prononcés au hasard. Je voudrais
  demander à Monsieur Macron, vous avez dit que Trump a pris une certaine position
  par rapport à l''Europe et je voudrais savoir si vous êtes inquiet de l''éloignement
  des États-Unis de l''Europe. Emmanuel MACRON Quant à votre question, je crois depuis
  de nombreuses années que nous avons besoin d''une Europe plus souveraine, plus forte,
  plus indépendante, dans les domaines militaires, dans les domaines technologiques,
  économiques, alimentaires, etc. C''est pour moi le fil directeur de la politique
  à la fois française et européenne que nous menons. Depuis 2022, cette stratégie
  dite d''autonomie stratégique a été actée par les Européens eux-mêmes. L''Ukraine
  ayant été un accélérateur. Je crois que les 18 derniers mois ont encore fait passer
  un nouveau seuil aux Européens. Je m''en félicite. Je défends aussi un pilier européen
  fort au sein de l''OTAN. Pour autant, je ne suis pas favorable à un éloignement
  avec les États-Unis d''Amérique. Alors, je pense qu''il y a eu des moments d''incertitude,
  d''éloignement, qui se sont joués durant ces 18 derniers mois sur la question ukrainienne,
  sur d''autres dossiers, qu''ils soient technologiques, économiques ou autres. Notre
  devoir, c''est de constamment renforcer notre indépendance pour être moins exposés
  à la volatilité de telle ou telle décision, mais c''est, partout où on le peut,
  de continuer d''avoir les États-Unis d''Amérique engagés avec nous, surtout dans
  les dossiers où elle a un rôle important à jouer. C''est pourquoi, à ce titre, je
  pense que le G7, la semaine dernière, a permis une reconvergence entre Américains,
  Canadiens, Japonais et Européens très importante, d''une part sur le dossier ukrainien,
  puisque pour la première fois, les États-Unis ont signé avec nous un texte qui a
  dit clairement qu''ils ne sont plus des médiateurs neutres, mais qu''ils soutiennent
  à nos côtés la souveraineté territoriale, l''intégrité territoriale ukrainienne,
  le soutien militaire, capacitaire et énergétique, et les sanctions à la Russie.
  Et ça, c''est un vrai changement qui les rapproche. De la même manière, sur les
  Proche et Moyen-Orient, nous avons trouvé des chemins de convergence, d''Ormuz au
  Liban, en passant par la question nucléaire. Et je pense aussi que sur la question
  des terres rares et des minerais critiques, sujet que nous avions discuté sous présidence
  italienne, puis sous présidence canadienne. On a signé un texte très opérationnel
  avec près de 200 projets, un peu plus de 60 milliards d''euros d''investissements
  communs, qui signe aussi une reconvergence entre les Américains et les Européens.
  Donc ça, c''est important, et ça, il faut le garder, il faut avancer. Mais on sait
  qu''il y aura vraisemblablement des changements, de nouvelles péripéties. Notre
  rôle, c''est partout où on le peut de garder les Américains avec nous, mais chaque
  jour de renforcer notre indépendance. Journaliste Monsieur le Président, la France
  fait face à un épisode caniculaire inédit et dans le même temps à son impréparation.
  On le voit, les écoles ne peuvent pas donner cours normalement ; des enfants dorment
  au sol avec des draps mouillés ; dans les EHPAD, des personnes âgées sont en souffrance.
  On est très loin des annonces de rénovation énergétique que vous aviez annoncées
  il y a trois ans. Le Fonds vert a aussi largement été amputé l''an dernier. La France
  a-t-elle pris du retard face au changement climatique que nous vivons ? Et puis,
  Madame la Présidente du Conseil, au moment de la condamnation de Marine Le Pen en
  première instance, vous aviez déploré un problème pour la démocratie. La soutiendrez-vous
  encore d''ici une dizaine de jours si elle est condamnée en appel ? Merci. Emmanuel
  MACRON Le Premier ministre a déjà commencé à décrire tout ce qui avait été fait,
  et à juste titre, ainsi que les ministres, qu''il s''agisse des hôpitaux, des EHPAD,
  ou de l''aide exceptionnelle qui a été apportée durant toutes ces dernières années
  aux collectivités locales avec le fonds vert, mais avant ça, bien d''autres, et
  ça fait maintenant plusieurs années que nous avons accompagné une transition de
  nos habitats, de nos bâtiments publics, de nos infrastructures publiques, qui correspond
  à l''adaptation. Donc, il y a un gros travail qui a été fait, et je pense que l''honnêteté
  conduit à le regarder, à la fois de montants investis et de vraies transformations
  et qui ont changé beaucoup de choses, qui ont d''ailleurs été accompagnées par l''engagement
  de beaucoup de nos fonctionnaires, dont je veux saluer le rôle, et d''élus qui ont
  vraiment fait un très gros travail. J''étais, juste avant de vous rejoindre, à Vélizy-Villacoublay,
  où j''ai vu le travail remarquable des équipes municipales très engagées. Néanmoins,
  nous n''avons pas fini ce travail. Il faut avoir cette humilité. Et pour ma part,
  je regrette plutôt les choix qui ont été faits, mais je crois aussi dans la démocratie.
  Il se trouve que quand j''avais une majorité absolue, ces fonds ont été votés. Il
  y a eu ensuite des choix qui ont été faits et qui sont le fruit de compromis de
  certaines formations politiques. Allez les voir pour leur demander pourquoi ils
  ont coupé ces fonds. Maintenant, on doit continuer le travail d''adaptation. Maintenant,
  au-delà de cette adaptation nécessaire, qui me fait largement tempérer le caractère
  excessif de vos propos et vous renvoie plutôt à la fois aux faits et à la réalité
  de ce qui a été conduit, nous vivons, et il faut avoir l''humilité de le regarder,
  une période totalement inédite. Nous nous sommes adaptés au réchauffement climatique,
  mais on ne s''adapte pas à un pic qui n''a pas d''équivalent aujourd''hui en Europe,
  et qui n''a jamais eu d''équivalent dans notre histoire, c''est-à-dire un pic caniculaire
  qui dure aussi longtemps et qui est à 15 degrés au-dessus des normales saisonnières.
  Et donc face à cela, je veux saluer vraiment l''organisation du Gouvernement et
  de l''ensemble des services, à la fois les soignants, les services de secours, sapeurs-pompiers,
  pompiers volontaires, de nos forces de sécurité, de l''ensemble du monde associatif,
  des bénévoles, des collectivités locales, c''est un tout qui vient en soutien. Et
  donc là, on protège, c''est la priorité. Donc d''abord, il y a les gestes de prévention.
  Donc il faut rappeler à chacun : boire régulièrement, ne pas faire d''efforts au
  soleil, se protéger au maximum, s''adapter. Ensuite, il y a tout le travail que
  nous faisons à l''hôpital. Je remercie encore nos soignants. C''est aussi pour ça
  qu''on est amenés à adapter des événements ou à les annuler pour réduire la charge
  potentielle qu''il y aurait en plus sur nos hôpitaux. Et il faut continuer d''agir
  comme on le fait en soutien à nos hôpitaux. Et les décisions annoncées ce matin
