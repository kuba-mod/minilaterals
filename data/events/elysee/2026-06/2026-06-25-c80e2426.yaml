  a-t-elle pris du retard face au changement climatique que nous vivons ? Et puis,
  Madame la Présidente du Conseil, au moment de la condamnation de Marine Le Pen en
  première instance, vous aviez déploré un problème pour la démocratie. La soutiendrez-vous
  encore d''ici une dizaine de jours si elle est condamnée en appel ? Merci. Emmanuel
  MACRON Le Premier ministre a déjà commencé à décrire tout ce qui avait été fait,
  et à juste titre, ainsi que les ministres, qu''il s''agisse des hôpitaux, des EHPAD,
  ou de l''aide exceptionnelle qui a été apportée durant toutes ces dernières années
  aux collectivités locales avec le fonds vert, mais avant ça, bien d''autres, et
  ça fait maintenant plusieurs années que nous avons accompagné une transition de
  nos habitats, de nos bâtiments publics, de nos infrastructures publiques, qui correspond
  à l''adaptation. Donc, il y a un gros travail qui a été fait, et je pense que l''honnêteté
  conduit à le regarder, à la fois de montants investis et de vraies transformations
  et qui ont changé beaucoup de choses, qui ont d''ailleurs été accompagnées par l''engagement
  de beaucoup de nos fonctionnaires, dont je veux saluer le rôle, et d''élus qui ont
  vraiment fait un très gros travail. J''étais, juste avant de vous rejoindre, à Vélizy-Villacoublay,
  où j''ai vu le travail remarquable des équipes municipales très engagées. Néanmoins,
  nous n''avons pas fini ce travail. Il faut avoir cette humilité. Et pour ma part,
  je regrette plutôt les choix qui ont été faits, mais je crois aussi dans la démocratie.
  Il se trouve que quand j''avais une majorité absolue, ces fonds ont été votés. Il
  y a eu ensuite des choix qui ont été faits et qui sont le fruit de compromis de
  certaines formations politiques. Allez les voir pour leur demander pourquoi ils
  ont coupé ces fonds. Maintenant, on doit continuer le travail d''adaptation. Maintenant,
  au-delà de cette adaptation nécessaire, qui me fait largement tempérer le caractère
  excessif de vos propos et vous renvoie plutôt à la fois aux faits et à la réalité
  de ce qui a été conduit, nous vivons, et il faut avoir l''humilité de le regarder,
  une période totalement inédite. Nous nous sommes adaptés au réchauffement climatique,
  mais on ne s''adapte pas à un pic qui n''a pas d''équivalent aujourd''hui en Europe,
  et qui n''a jamais eu d''équivalent dans notre histoire, c''est-à-dire un pic caniculaire
  qui dure aussi longtemps et qui est à 15 degrés au-dessus des normales saisonnières.
  Et donc face à cela, je veux saluer vraiment l''organisation du Gouvernement et
  de l''ensemble des services, à la fois les soignants, les services de secours, sapeurs-pompiers,
  pompiers volontaires, de nos forces de sécurité, de l''ensemble du monde associatif,
  des bénévoles, des collectivités locales, c''est un tout qui vient en soutien. Et
  donc là, on protège, c''est la priorité. Donc d''abord, il y a les gestes de prévention.
  Donc il faut rappeler à chacun : boire régulièrement, ne pas faire d''efforts au
  soleil, se protéger au maximum, s''adapter. Ensuite, il y a tout le travail que
  nous faisons à l''hôpital. Je remercie encore nos soignants. C''est aussi pour ça
  qu''on est amenés à adapter des événements ou à les annuler pour réduire la charge
  potentielle qu''il y aurait en plus sur nos hôpitaux. Et il faut continuer d''agir
  comme on le fait en soutien à nos hôpitaux. Et les décisions annoncées ce matin
  par le Premier ministre vont permettre de prendre les bonnes décisions d''organisation.
  Et puis, il faut être vigilant. On a vu aussi beaucoup de cas de noyades, d''une
  part. Donc, il faut bien sûr renvoyer des messages de prudence et continuer le travail
  d''aller vers les publics les plus vulnérables, ce qui est fait avec beaucoup d''engagement
  par le secteur social, médico-social et sanitaire, vers les plus âgés. Et c''est
  tout le travail qui est fait évidemment par nos EHPAD, mais également par les services
  de l''État et les services des collectivités territoriales pour aller voir chacun.
  Et nous avons tous un rôle à jouer dans ces moments. Ce sont des moments de solidarité
  où j''invite chacun de nos compatriotes à aller voir si le voisin, qui est âgé,
  vivant seul, qui est en situation de handicap, se porte bien. Voilà, ce sont des
  moments plutôt de solidarité et de mobilisation qui doivent signer ces périodes.
  Et c''est ce qui est en train de se passer. Je suis très reconnaissant à l''égard
  de l''ensemble des forces mobilisées. J''invite chacun, voilà, à prendre soin de
  soi et prendre soin des autres et passer cet épisode. Mais nous continuons à être
  mobilisés. Le Gouvernement annoncera demain de nouvelles mesures. Je ne vais pas
  ici rentrer dans plus de détails. J''ai eu, juste avant de décoller tout à l''heure,
  le Premier ministre qui prépare la CIC de demain où il annoncera des mesures nouvelles.
  Journaliste Madame Meloni, je voudrais revenir sur une décision importante aujourd''hui,
  c''est-à-dire de mettre en place une nouvelle coalition dirigée par la France et
  l''Italie pour l''après-mission FINUL. Pouvez-vous nous fournir quelques détails
  supplémentaires ? C''est la même question que je vous adresse, Monsieur Macron.
  Il y aura aussi la question des pays qui voudront participer à cette initiative.
  J''espère que les États-Unis en feront partie. Merci. Emmanuel MACRON Madame la
  Présidente vient de très bien décrire la démarche. Nous savons que le terme du mandat
  des Nations unies pour l''UNIFIL arrive en fin d''année et qu''à partir du mois
  d''août si nous ne faisons rien, les premières mesures pour se désengager seront
  mécaniquement prises. Il est important de bâtir une perspective et donc nous allons
  ensemble, d''abord, travailler avec les autorités libanaises : le président, le
  chef du gouvernement, et le ministre de la Défense, et le chef d''état-major des
  armées libanais, pour bâtir une solution qui vienne en appui des forces armées libanaises
  et des forces de sécurité. Sur la base de ceci, nous essaierons de construire la
  coalition la plus large, et en effet, de bâtir un mandat clair. Sera-t-il un mandat
  d''une force multinationale aux côtés des forces armées libanaise ? Est-ce qu''on
  pourra bâtir avec un vrai mandat des Nations unies ? Il est trop tôt pour répondre
  à cette question. Mais évidemment, notre souhait, c''est d''avoir le mandat le plus
  clair, la mission la plus efficace, et le plus de monde dans une telle coalition,
  parce que notre objectif, c''est la souveraineté libanaise, l''intégrité territoriale
  du Liban et la mise en œuvre de ce que le président Aoun a dit dès le premier jour
  de son mandat, et ce que le président du Conseil Nawaf Salam bâti chaque jour, c''est-à-dire
  le monopole des armes dans la main des forces armées libanaises, et donc le retrait
  des armes au Hezbollah. Pour ça, il faut venir en soutien des forces armées. Cette
  coopération sur le poste UNIFIL ce que nous lançons, je veux aussi ici saluer le
  rôle que le Qatar, l''Arabie saoudite jouent dans la région en soutien du Liban,
  et nous aurons l''occasion dans les prochains jours aussi d''avoir des éléments
  de soutien avec l''Arabie saoudite, aux forces armées libanaises à très court terme.
  Mais tout ça a du sens si on sait bâtir la perspective du post-UNIFIL, et c''est
  ce que nous avons décidé de faire ensemble, Italie et France. Voilà, Mesdames et
  Messieurs, je crois qu''on arrive au terme de cette conférence de presse. Je veux
  à nouveau remercier Madame la présidente, sa délégation, et vous remercier tous,
  et saluer la résistance de la délégation italienne, qui a eu le soleil de face pendant
  toute la conférence de presse, les frondaisons y ont produit, en quelque sorte,
  donné un répit momentané à la délégation française. Donc excusez-moi pour cet exercice
  de torture involontaire.'
