date: '2026-06-17'
type: press_release
source_name: elysee
title: 'Sommet du G7 d''Évian : troisième jour.'
text: 'Le Président de la République et Brigitte Macron ont accueilli le Sommet du
  G7 à Évian du 15 au 17 juin 2026. Pour ce dernier jour du G7 d''Évian, une première
  réunion de travail s''est déroulée sur le thème « Relancer une croissance économique
  équilibrée, partagée et durable, au bénéfice de tous » , en présence des pays du
  G7, des pays partenaires, du Fonds monétaire international et de l’OCDE. Puis, un
  déjeuner de travail autour du sujet « Assurer un déploiement sûr, rapide et efficace
  de l’intelligence artificielle » , a eu lieu en présence des pays du G7, des pays
  partenaires et des chefs d’entreprises. Dans l''après-midi, le Président Emmanuel
  Macron a tenu une conférence de presse pour clôturer le Sommet. Bonjour Messieurs,
  Dames, merci beaucoup pour votre présence à l''issue de ce G7. 51 ans après Rambouillet,
  ce sommet était un moment important et permettez-moi de commencer par remercier
  toutes celles et ceux qui l''ont rendu possible, évidemment la Commune et ses habitants,
  Evian. Nous étions très heureux de remercier Madame la maire, l''ensemble de ses
  équipes, l''ensemble des communes d''ailleurs qui ont accueilli les différents événements,
  les services de l''État dans le département qui ont été largement évidemment sollicités
  sous l''autorité de Madame la préfète, l''ensemble de nos forces de sécurité intérieure,
  de nos militaires, de nos douaniers, de notre sécurité civile, de nos sapeurs-pompiers,
  de nos soignants et beaucoup de bénévoles aussi des équipes qui ont rendu cet événement
  possible dans toutes ses composantes. Nous étions très fiers d''accueillir ce G7
  à Évian, très fiers d''être 23 ans après en Haute-Savoie pour un tel événement et
  de pouvoir mettre à l''honneur aussi la beauté de nos paysages, notre jeunesse hier
  soir, notre culture et tout ce qui fait la richesse de notre pays. Permettez-moi
  aussi d''avoir un mot pour l''ensemble des équipes qui ont travaillé sur ces textes
  ardemment. Les équipes de Sherpa et l''ensemble des équipes de négociatrices et
  de négociateurs du cabinet, au ministère des Affaires étrangères, au ministère de
  l''Économie et des Finances, dans tous les ministères qui ont été sollicités, les
  ministres qui ont aussi eu à mener des G7 dans leur format, le protocole, le secrétariat
  général de ce G7 qui a piloté l''ensemble des opérations et l''ensemble des équipes
  qui ont rendu ce travail possible, évidemment celles qui nous ont accueillis et
  l''ensemble du groupe. Voilà, je tenais à le dire parce que de tels événements ne
  sont possibles, ils ne sont des succès, que quand des femmes et des hommes s''engagent
  et mettent toute leur énergie, c''est ce qui a été fait durant ces derniers jours
  de manière plus visible mais pendant des mois. Bravo à tous Je dis bravo parce qu''il
  n''a échappé à personne que ce G7 se tenait dans un contexte extrêmement difficile
  de fragmentation du monde, de crises multiples, de conflits et que beaucoup peut
  se jouer lors de nos échanges et que ces derniers mois avaient été marqués plutôt
  par de la fragmentation, des divisions ou des désaccords et nous les avions assumés.
  Ce G7 a permis, et c''est ce qui constitue pour un tel sommet un élément de son
  succès et donc c''est pourquoi je peux vous dire que ce G7 est objectivement un
  succès, c''est qu''il a été un moment d''unité, de discussion de qualité et de vraie
  coopération entre les dirigeants qui se retrouvaient ici. Ce sommet, en effet, nous
  a permis de nous coordonner de manière très étroite pour répondre aux crises et
  de travailler aux grands défis de notre temps, avec d''abord une méthode, c''est
  qu''on a associé évidemment très étroitement les pays membres du G7, mais ce qu''on
  a appelé les pays partenaires du G7+, l''Inde, le Kenya en tant qu''il avait co-présidé
  le sommet Africa Forward , la Corée du Sud, le Brésil et l''Égypte, avec aussi quelques
  dirigeants d''organisations internationales et donc c''est vraiment ce G7+, qui
  a piloté ce travail de bout en bout, qui a permis d''arriver à ce texte. Nous avons
  également associé le président Zelensky, j''y reviendrai dans ses conclusions sur
  un moment, une discussion importante sur l''Ukraine, et côté évidemment du président
  Sissi, nous avons associé l''émir du Qatar et le président des Émirats arabes unis
  pour une discussion sur l''Iran, le détroit d''Ormuz et toutes les conséquences
  sur le Golfe. Évidemment, les organisations internationales ont aussi été associées
  à nos travaux, FMI, Banque mondiale, Banque africaine de développement et OCDE pour
  des sessions spécifiques. Neuf déclarations ont été adoptées de manière unanime
  par les leaders du G7, et avec d''ailleurs sur plusieurs de celles-ci, des soutiens
  du G7+. Tous les leaders du G7 ont adopté la déclaration géopolitique, je vais y
  revenir, un appel des chefs d''État et de gouvernement sur la lutte contre le cancer,
  un appel des chefs d''État et de gouvernement à une réponse coordonnée à l''épidémie
  d''Ebola, une déclaration des chefs d''État et de gouvernement sur des partenariats
  internationaux mutuellement bénéfiques, la déclaration sur les chaînes d''approvisionnement
  en minerais critiques, la déclaration pour une croissance plus équilibrée, durable
  et résiliente, et ensuite celle contre le trafic de migrants, contre les trafics
  de drogue, et la dernière sur un espace numérique plus sûr pour les mineurs. Neuf
  déclarations donc, unanimes. Je voudrais maintenant revenir sur les accords que
  nous avons pu dégager sur chacun des sujets les plus importants. L''Ukraine, le
  premier. La participation du président Zelensky nous a permis d''avoir une discussion
  en profondeur sur l''Ukraine qui, pour la première fois en ces termes, nous a permis
  de dégager des éléments d''accords importants. D''abord le soutien indéfectible
  à l''Ukraine, la solidarité à son peuple dont les infrastructures essentielles,
  le patrimoine culturel ont été attaqués après les multiples attaques contre la population
  civile. Les Ukrainiens ont été incroyablement résistants et tous les membres du
  G7 étaient d''accord pour dire la nécessité de ce soutien, ce soutien à l''intégrité
  territoriale de l''Ukraine, mais aussi le fait que le rapport de force avait profondément
  changé dans les derniers mois. L''Ukraine avance, résiste, la Russie recule. C''est
  pourquoi nous sommes tous convenus d''accroître la fourniture de capacités de défense
  aérienne, de systèmes et d''intercepteurs supplémentaires ainsi que de capacités
  de longue portée. Sur ces volets, le Président américain d’ailleurs a insisté pour
  dire la mobilisation de l''industrie de défense américaine, la capacité à fournir
  de tels équipements et nous avons été plusieurs à insister, à la demande des Ukrainiens
  ces derniers mois, sur l''importance du licensing et de la production sur le sol
  ukrainien pour aller encore plus vite. Nous sommes aussi convenus, unanimement,
  d''apporter un soutien supplémentaire à l''Ukraine pour permettre au pays de faire
  face à l''hiver prochain avec une initiative du G7 de soutien aux infrastructures
  énergétiques, donc évidemment à la reconstruction de beaucoup de choses qui ont
  été détruites et ont plongé dans le froid et l''obscurité beaucoup de populations
  civiles. En même temps, nous sommes en train de finaliser aussi un financement par
  les pays du G7 plus nos partenaires principaux de la mise en pleine sûreté et sécurité
  des équipements de Tchernobyl. Enfin, nous nous sommes engagés à accroître les pressions,
  y compris par un renforcement de nos sanctions et cette remobilisation du G7 pour
  accroître la pression sur la Russie est extrêmement importante, ceci d''ailleurs
  quelques semaines après l’arraisonnement d''un bateau de la Shadow Fleet par les
  autorités françaises et quelques jours après la même opération avec notre coopération
  des autorités britanniques. Nous continuons, nous nous coordonnons dans un environnement
  en matière de prix du pétrole et du gaz qui a changé ces derniers jours. Ça c''est
  pour l''Ukraine, c''est la première fois que nous avons une telle convergence en
  G7 et c''est la première fois que nous portons des conclusions aussi claires parce
  que nous savons aussi au sein du G7 les désaccords ou les différences qui pouvaient
  y avoir et donc c''est à mes yeux un vrai progrès et c''est aussi une condition
  de notre efficacité collective au succès de la guerre de résistance ukrainienne.
  Nous avons ensuite abordé la situation au Moyen-Orient avec, comme je le disais,
  le Qatar, l''Egypte, les Émirats arabes unis et là aussi nous avons en G7 des conclusions
  très claires. Nous avons unanimement salué le très bon accord conclu entre les États-Unis
  d''Amérique et l''Iran, obtenu par le président Trump. C''est un accord que nous
  soutenons parce que c''est un accord qui met fin à une situation de très grande
  instabilité dont les conséquences pour nos économies étaient terribles. Chacun le
  voit dans sa vie de tous les jours, on le voit sur nos entreprises, nos compatriotes
  le voient et donc c''était une bonne chose d''y mettre un terme. Nous avons réaffirmé
  que le droit de passage en transit sans entrave, sans redevance à travers le détroit
  d''Ormuz était la pierre angulaire justement du début de cet accord et commence
  dès maintenant. Nous avons convenu que l''initiative multinationale et indépendante
  en matière de défense qui a été co-bâtie par la France et le Royaume-Uni était disposée
  à jouer un rôle important pour faciliter la reprise du trafic maritime dans le détroit
  d''Ormuz en protégeant les navires marchands. C''est évidemment une offre qui est
  faite mais tout ça dépend des accords passés entre l''Iran, les États-Unis d''Amérique,
  avec l''accord aussi d''Oman qui est de l''autre côté de ce détroit. En tout cas,
  c''est une disponibilité que nous avons confirmée et on a plusieurs pays qui sont
  dans la région et prêts à réagir très vite si la demande était faite dont la France
  et nous avons une vingtaine de pays qui ont d''ores et déjà indiqué leur engagement
  ferme de contribution à une telle opération. Dans cet accord, nous n''avons pas
  oublié de souligner l''importance du Liban et notre soutien aussi unanime au cessez-le-feu
  qui a été obtenu pour le Liban, cessez-le-feu solide et immédiat qui est une urgence
  absolue et la nécessité de défendre l''intégrité territoriale, la souveraineté du
  Liban et de l''ensemble des autorités politiques et militaires. Dans la bande de
  Gaza, nous nous sommes aussi engagés à accélérer les efforts humanitaires et de
  reconstruction de la mise en œuvre rapide des mesures politiques et de sécurité
  pertinentes. Nous avons appelé à mettre un terme aux violences en Cisjordanie, ce
  qui est là aussi une nécessité rappelée par tous et endossée par tous. Nous nous
  sommes aussi engagés dans la diversification des voies d''approvisionnement énergétique
  pour réduire nos vulnérabilités internationales liées au détroit d''Ormuz, c''est-à-dire
  financer ensemble des voies alternatives de circulation du gaz, du pétrole pour
  sortir justement de la région et rejoindre les routes internationales. Notre déclaration
  commune a aussi réaffirmé les positions du G7 sur l''Indo-Pacifique, lesquelles
  sont des positions historiques et constantes. Mais l''importance de ce point sur
  le Proche et Moyen-Orient, c''est le fait que tous les pays du G7 ont soutenu cet
  accord et réinsisté sur l''importance de la question d''Ormuz, du Liban et évidemment
  de la finalisation de discussions nucléaires et balistiques et sur la question des
  déstabilisations régionales, qui est une condition de la stabilité de toute la région.
  Sur les autres sujets, sur les partenariats internationaux, sujet sur lequel nous
  nous sommes, vous le savez, beaucoup battus ces dernières années, nous avons aussi
  là marqué une avancée concrète à travers les débats qui se sont tenus, les ministériels
  et l''accord qui a été obtenu. Pour cela, nous avons eu une réunion de travail avec
  les pays partenaires, le Brésil, la Corée du Sud, l''Égypte, l''Inde et le Kenya,
  ainsi que la Banque mondiale et la Banque africaine de développement. Le G7 est
  pertinent à cet égard parce qu''il continue de représenter environ 70 % de l''aide
  publique au développement. Notre réflexion vient de loin parce qu''elle s''est construite
  sur l''initiative que la France avait bâtie justement pour les nouveaux financements
  pour l''Afrique dès 2021, le nouveau pacte financier en 2023, qui avait conduit
  à la création du partenariat pour la prospérité des peuples et de la planète, et
  le sommet Africa Forward de 2026, que nous avons co-présidé avec le président Ruto.
  Au fond, ce que nous avons conduit à faire advenir ces dernières années et qui a
  été consolidé, endossé dans ce G7+, c''est d''abord un changement de philosophie
  profonde. Nous défendons un concept d''investissement solidaire, de partenariat
  respectueux avec les pays, de construction ensemble des solutions de financement,
  et non plus d''une aide verticale qui est faite par des donateurs qui décident des
  priorités avec des récipiendaires qui ont peu leur mot à dire. Donc le système traditionnel
  change de philosophie, c''est acté. Ensuite, c''est la mise en œuvre d''outils,
  là aussi modernisés, avec un travail accru de l''ensemble des acteurs de la finance
  internationale. Et c''est ce que nous avons bâti ces dernières années, à travers
  l''initiative de Quai d’Orsay, du ministère des Finances et de l''AFD, à travers
  Finances en commun. Nous avons consolidé et endossé le travail de Finances en commun,
  et nous avons aussi consolidé des instruments pour améliorer la complémentarité
  des financements publics et privés. À ce titre, je vous renvoie à la déclaration
  pour ne pas être trop long, nous avons rappelé l''importance de la solidarité envers
  les pays et les populations dans les domaines de santé, de nutrition, d''éducation,
  qui sont des véritables investissements nécessaires pour tous. Mais nous avons aussi
  acté du soutien à des mécanismes de garantie des premières pertes qui sont la condition
  pour que, par exemple sur le continent africain, des investissements privés puissent
  être réalisés. On a aujourd''hui beaucoup de pays dont les notations ou l''absence
  de notations ne permettent pas aux secteurs privés de se déployer. C''est tout le
  consensus qu''on a construit au Sommet Africa Forward . On a décidé d''élargir à
  l''ensemble du continent un mécanisme qui existait, qui s''appelle ATIDI, qui garantit
  les premières pertes. Il a été endossé par la Banque africaine de développement
  et les pays africains, et nous sommes plusieurs pays du G7 à entrer à son capital,
  à accepter d''apporter des garanties et à soutenir son action, en la coordonnant
  aussi avec l''action de la Banque mondiale, l''importance évidemment du MIGA et
  du fonds que construit la Banque mondiale, pour permettre de prendre les deuxièmes
  pertes. C''est une avancée importante et on va veiller à la mise en œuvre de ces
  travaux avec un point de rendez-vous qu''on a donné en marge de l''Assemblée générale
  des Nations unies. Outre ce texte évidemment très important, nous avons aussi adopté
  une déclaration en réponse à l''épidémie d''Ebola. Cette déclaration, au-delà des
  pays du G7, a été aussi soutenue par l''Inde, l''Égypte, la Corée et le Kenya. Sur
  Ebola, le message de soutien est clair. Aider la RDC, l''Ouganda et tous les territoires
  qui pourraient être touchés afin de faire face à l''épidémie. Cela passe par le
  développement rapide d''un vaccin, d’un traitement efficace, par la mise en place
  de procédures adéquates en ligne avec les standards de l''OMS. Le G7 s''est engagé
  à consacrer plus d''un milliard en réponse d''urgence au travers de cette déclaration,
  qui est là aussi très important, avec un engagement très fort des Européens et des
  Américains derrière ce mécanisme et un travail étroit avec CDC Africa. Nous avons
  également, cette fois en matière de coopération scientifique et de santé, acté d''un
  texte important sur la lutte contre le cancer. Pour la première fois dans l''histoire
  du G7. Et là aussi, c''est un moment de reconvergence très important sur les questions
  de santé qui avaient parfois pu donner lieu à des désaccords ou des divisions. Cette
  priorité reflète une réalité universelle. Le cancer tue près de 10 millions de personnes
  chaque année. D''ici 2050, le nombre de nouveaux cas devrait bondir de 80 % à l''échelle
  mondiale du fait du vieillissement démographique, des risques environnementaux et
  comportementaux. Cette déclaration ambitieuse place au cœur de la lutte contre le
  cancer des mécanismes de coopération à travers trois grandes priorités. Cancer pédiatrique,
  là, nous promouvons le partage de données. Cancer de mauvais pronostics, poumon,
  foie, pancréas et accès universel à des soins de qualité dans les pays riches comme
  dans les pays en développement. Ce sommet, au-delà de ces sujets, nous a également
  permis de faire de vrais progrès sur la question des grands déséquilibres macroéconomiques
  mondiaux. On veut construire une croissance partagée, notamment grâce à tout le
  travail préparatoire que nous avions fait, au rapport d''experts qui avait été rendu
  au printemps dernier, et aux discussions que nous avons pu tenir. Au fond, nous
  nous avons tous acté d''un texte qui défend une vision de la croissance équilibrée.
  Nous connaissons les grands déséquilibres mondiaux. La Chine doit traiter le problème
  des surcapacités, des sursubventions et du manque de consommation domestique. Les
  Européens doivent investir davantage et moderniser et simplifier leurs économies,
  et les États-Unis doivent traiter la question des déficits jumeaux. Le consensus
  s''est établi autour de ces éléments. En amont de ce G7, nous avons réussi, là aussi
  de manière inédite, à réunir de manière virtuelle un sommet des convergences, et
  nous avons tenu en effet une visioconférence le 11 juin avec les membres du G7 +
  et la Chine, qui est une première depuis plus de 20 ans, qui a permis de mettre,
  si je puis dire, sur la table ce constat pour engager à une meilleure coordination.
  Mais au sein du G7 et du G7 +, nous avons vraiment commencé à construire des éléments
  de coordination très clairs, c''est-à-dire bâtir l''unité et acter que les divisions,
  tout ce qui fracture nos économies ne permet pas de régler de manière efficace ces
  déséquilibres. Donc, au-delà du sommet des convergences, qui va en quelque sorte
  enclencher une dynamique qu''on va poursuivre en vue du G20, là, la Chine sera autour
  de la table avec beaucoup d''autres, nous avons affirmé de manière très claire,
  là aussi, des mécanismes de coopération au sein du G7 +, d''abord en actant le rôle
  du FMI et la consolidation de celui-ci, en demandant à nos ministres, là aussi,
  de travailler pour septembre sur des éléments clairs en termes de coopération sur
  la question des engrais, sur la question de l''alimentation, qui est absolument
  clé, parce que c''est là où les déséquilibres sont les plus frappants et touchent
  les populations les plus vulnérables. Nous avons également acté de textes importants
  sur la résistance de nos chaînes de valeurs et, en particulier, les minerais critiques.
  Sur ce sujet, où nous avions commencé la discussion l''année dernière, présidence
  canadienne, jusqu''alors, nous n''avions jamais réussi à bâtir des réponses concrètes
  et nous avions même plutôt des risques de division. Face à une Chine qui a parfois
  accumulé des réserves stratégiques, et ce n''est pas un reproche que je leur fais,
  c''est une stratégie qui a été bâtie depuis plus de 15 ans, nous sommes tous face
  à des risques de surdépendance et donc de vulnérabilité de nos chaînes de valeurs.
  Si nous y allons en ordre dispersé, nous créerons des suraccidents et des déséquilibres
  encore plus grands. Nous avons acté d''y aller ensemble, en G7 et même en G7+. Et
  donc, ensemble, de bâtir des projets de coopération, et c''est des projets très
  concrets qui ont été adoptés, d''ailleurs, en annexe de la déclaration que j''évoquais,
  c''est-à-dire réduire ensemble nos sources de dépendance, diversifier ensemble nos
  sources d''approvisionnement. 195 projets concrets, 64 milliards d''euros d''investissements
  conjoints ont été bâtis à travers ce texte, et c''est comme ça une dynamique qu''on
  va continuer. C''est à mes yeux un point clé pour améliorer la résistance de nos
  chaînes de valeurs, réduire leur dépendance, mais le faire de manière coopérative.
  Enfin, nous avons tenu une discussion à l''instant sur le numérique et l''intelligence
  artificielle avec l''ensemble des dirigeants du G7+, et une douzaine de dirigeants
  de tous les pays, d''ailleurs, du G7, du numérique et de l''intelligence artificielle.
  Qu''est-ce qui ressort de cette discussion ? D''abord, la nécessité de protéger
  l''enfance en ligne. On voit le consensus qui monte, et du Canada aux Britanniques,
  en passant évidemment par l''Union européenne, le Brésil, l''Australie n''était
  pas là, mais je veux saluer son rôle aux avant-postes. Nous sommes plusieurs à avoir
  déjà pris des initiatives concrètes et de finaliser des lois. Nous avons adopté
  une déclaration pour nous accorder sur la nécessité d''agir et l''importance d''appeler
  les plateformes à la responsabilité. Cette dynamique va se poursuivre, et le Premier
  ministre Modi a confirmé d''ailleurs ce qu''il avait commencé à annoncer lors du
  sommet de février dernier à Delhi. Donc, là aussi, l''Inde rejoint ce plan, ce qui
  fait vraiment du G7+, une plateforme. Ce qui est, je dirais, notre ADN G7, ce sont
  les démocraties libérales qui ont des économies développées. Le G7+, associe d''autres
  démocraties, et ensemble, nous avons cette même approche qui est conforme à nos
  valeurs démocratiques, protéger nos enfants. Mais c''était un moment très important
  et c''est un point d''avancée très important. Nous sommes plusieurs aussi à souligner
  l''importance de mieux réguler l''intelligence artificielle et son marquage. Là
  aussi, il est important de bâtir des initiatives. Je vais le pousser au niveau européen,
  mais ce consensus est nécessaire parce qu''on voit l''impact que cela a sur nos
  démocraties. C''était important d''avoir cette discussion avec des dirigeants du
  numérique et de l''IA. Sur l''intelligence artificielle, nous sommes tous confrontés
  à la même chose et c''était important qu''il y ait cette discussion commune. Nous
  voulons tous l''innovation, nous voulons tous avoir des capacités de calcul, des
  centres de données, nous voulons tous développer les chances, la productivité, les
  transformations, les améliorations en matière de santé, de numérique que l''IA peut
  apporter. Mais nul ne peut plus ignorer, ni des dirigeants ni des responsables économiques,
  l''impact sur nos démocraties, l''impact sur nos sociétés. C''est pourquoi c''est
  la possibilité et la nécessité d''une régulation qui aujourd''hui s''impose. Elle
  doit se faire à l''échelle internationale. On avait commencé en G7 par une initiative
  franco-canadienne du Partenariat mondial pour l''intelligence artificielle à construire
  une première structure adossée à l''OCDE. On doit, sur celle-ci, aller plus loin
  maintenant et réussir à mieux réguler. Le défi qui est devant nous, et on a eu beaucoup
  de discussions avec les dirigeants de l''IA et de la technologie, comme avec l''administration
  américaine, le défi, ce sont ces fameux modèles frontières . On doit réussir à mieux
  les réguler pour éviter qu''ils ne tombent dans la main de régimes autoritaires,
  de gens qui pourraient menacer notre cybersécurité ou nos sociétés. Mais, pour ce
  faire, la réponse ne peut pas être de la non-coopération entre démocraties. Donc,
  on est en train de bâtir, au fond, c''est ça ce qu''on va construire dans les prochains
  mois, eh bien, en quelque sorte, une plateforme de discussion et de coopération
  entre quelques démocraties face aux risques de l''intelligence artificielle, une
  plateforme de coopération pour définir ensemble des standards communs, une plateforme
  de coopération pour partager aussi, en matière de cybersécurité, plus largement
  de sécurité, les impacts et donc la bonne réponse. C''est exactement cela que nous
  avons acté et ce sur quoi nous allons continuer le travail avec les uns et les autres.
  Là aussi, un point de rendez-vous est donné en septembre pour que ce travail puisse
  être finalisé par l''ensemble de nos ministres et on se reverra avec quelques dirigeants.
  En tout cas, il y a un large consensus pour dire que, là aussi, la coopération internationale
  est nécessaire et refaire le point dans quelques mois. Voilà, je ne veux pas être
  plus long, dire simplement qu''au-delà de ce que je viens de détailler, des déclarations
  importantes ont été aussi conclues pour combattre ensemble le narcotrafic, le travail
  sur la mise en place d''une alliance des ports pour mieux lutter en renforçant la
