  guerre. Il y a ce dîner à Versailles que vous justifiez par l''anniversaire des
  250 ans de l''indépendance sans que certains, là aussi en France, ne puissent s''empêcher
  d’y lire une nouvelle entreprise de séduction. M. le Président, n''en faites-vous
  pas trop à l''égard d''un président qui peut changer d''avis dans l''heure, voire
  menacer la France de rétorsions économiques ? M. le Président, est-ce que c''est
  l''idée que vous faites d''un rapport de force ? Merci. Merci pour votre question.
  Vous savez, si je n''avais pas tenu de manière constante les positions qui ont été
  les miennes durant les derniers mois, vous pourriez avoir un doute sur les rapports
  de force. For sure . Mais quand il s''est agi de la sécurité du Danemark et de la
  question du Groenland, quand il s''est agi de l''intégrité territoriale de l''Ukraine
  et de la paix et de la sécurité en Europe, quand il s''est agi de nos producteurs,
  je n''ai jamais été ambigu ni faible. J''ai toujours été clair dans l''expression
  de mes désaccords. Très clair. Soit à Washington, soit à Davos ou ailleurs. Mais
  j''ai toujours maintenu le dialogue, parce que c''est ça, la diplomatie. Si la diplomatie,
  ça n''est que recevoir des gens avec qui vous êtes totalement d''accord, la question
  que poseront vos successeurs, c''est, au fond, à quoi servent ces réunions ? Vous
  savez que vous êtes d''accord avec ces gens, ça ne sert à rien de les voir. Regardez
  tous les sujets que j''évoque depuis tout à l''heure. Si nous n''avions pas vu aujourd''hui
  le président Trump, son équipe, si pendant les deux derniers jours, on n''avait
  pas tenu ce G7, où en serions-nous sur l''IA ? Un clash constant, parce que sinon,
  ce monde ne se parle que par tweet ou par déclaration de presse interposée. Donc,
  quand on reconverge, quand on arrive à dire qu''on est d''accord sur l''Iran, j''ai
  été le premier à dire quand je pensais que ce n''était pas approprié de faire des
  frappes unilatérales sans objectifs clairs. Il y a une paix qui est signée avec
  des objectifs clairs, le Liban qui est dedans, des garanties claires sur le nucléaire,
  je suis d''accord, je soutiens. Sur l''Ukraine, on soutient l''intégrité territoriale,
  on soutient avec force leur rééquipement des sanctions sur la Russie, on se réengage,
  quelque chose se passe. Sur l''intelligence artificielle, on reconverge, oui, quelque
  chose se passe. Chacun a son style, ensuite, je ne le commente pas. Mais je pense
  que le rôle de la France, c''est de tenir tête et d''assumer sa voix quand il y
  a des désaccords ou que ses intérêts ne sont pas pris en compte, mais c''est aussi
  d''être accueillante, de savoir honorer ses invités, et je le fais, somme toute,
  du Premier ministre indien en passant par le président indonésien au président du
  Kenya ou du Nigeria jusqu''au président américain, parce que je pense que la force
  de la France, c''est aussi cela. Nos grandes actions diplomatiques se sont aussi
  tenues par des capacités à bien accueillir le monde ou les autres grands dirigeants.
  Ça passe par là aussi. Et n''ayons pas honte de ce que nous sommes. Versailles est
  un instrument diplomatique et un instrument de puissance. Vous savez quoi ? Je l''ai
  utilisé dès juin 2017. Il y a eu des choses qu''on a obtenues, et après, ça ne s''est
  pas aussi bien passé que ça avec le président que j''ai accueilli en juin 2017.
  En tout cas, je l''assume totalement, parce qu''à chaque fois, en tenant une position
  de fermeté ou en réengageant et en accueillant avec chaleur, je défends les intérêts
  de mon pays. C''est ça, ce qui compte. Et quand je défends les intérêts de notre
  pays, de la France, j''ai à cœur de le faire en accueillant bien les gens, en faisant
  en sorte qu''ils soient bienveillants avec nous et que, derrière, ils prennent les
  bonnes décisions pour nous. Je crois que c''est ce que les Français attendent de
  moi. Au fond, je suis comme les Bleus. Que je joue à l''extérieur ou à domicile,
  mon but, c''est de marquer des buts. Voilà. Et quand j''accueille des équipes, j''essaie
  de bien les accueillir. Votre équipe m''a dit déjà que vous voyez le président Lula
  comme un interlocuteur important avec le sud global, avec les BRICS spécialement,
  mais le Brésil n''a pas signé la majorité des déclarations de ce sommet, de ce G7.
  Il y a une interprétation selon laquelle c''était tout pour avoir l''unité avec
  le président Donald Trump, avec un discours d''antagonisme contre la Chine et aussi
  en laissant à côté des questions très importantes, les rôles des ONU, la crise climatique.
  Que répondez-vous à ces critiques ? Être-vous déçu avec la position du Brésil ?
  Juste pour finir, avez-vous discuté avec Lula aussi l''interdiction d''importation
  de viande brésilienne par l''Union européenne ? Merci. Alors, sur votre deuxième
  question, c''est une décision ponctuelle du commissaire européen et qui fait bien
  son travail. C''est-à-dire qu''en fait, il contrôle si les règles sanitaires pour
  protéger le consommateur européen sont respectées. Quand elles ne sont pas respectées,
  il interdit, il fait des contrôles. C''est ce que j''ai toujours défendu parce que
  vous êtes dans une région aussi qui a un gros potentiel agricole. Comment vous voulez,
  moi, que je dise à mes producteurs, t''as pas le droit d''utiliser tel ou tel antibiotique
  pour produire de la viande ou du lait, puis on va importer de la viande ou du lait
  qui vient du bout du monde, qu''ils utilisent ? Vous êtes fous. Et le président
  Lula, c''est un grand leader social et environnemental. Nous aussi. Nous, on le
  fait. Donc, le commissaire européen a raison et on contrôle. Après, sur votre deuxième
  question, j''ai envie de dire, c''est plutôt au président Lula qu''il faut la poser.
  C''est à lui de dire, s''il s''engage, moi, je vais vous dire de manière très pragmatique
  ce qu''on a fait. Soit on dit, on veut aller sur tous les sujets où on sait qu''on
  n''est pas d''accord avec les Etats-Unis d''Amérique. Sur le climat, on sait qu''on
  n''est pas d''accord. Sur le rôle de l''ONU, du Board of Peace , on sait qu''on
  n''est pas d''accord. C''est aussi un des sujets sur lesquels j''ai tenu tête. On
  a essayé de les ouvrir. Quand ça ne marche pas, on ne va pas faire du 6 plus 1,
  sinon, ça ne sert à rien de faire un G7. Et là, on fait même un G7 +. Par contre,
  moi, je pense à beaucoup de valeurs, d''avoir les Etats-Unis d''Amérique qui signent
  avec nous un texte sur les minerais critiques et les chaînes de valeur. Énorme valeur.
  C''est l''intérêt du Brésil de le signer avec les Etats-Unis d''Amérique. Il ne
  faut pas faire de mauvaises politiques en la matière, parce que là, on est beaucoup
  plus forts. Je vous dis une chose, ce G7 n''a jamais été à aucun moment anti-chinois.
  Ce n''est pas la position de la France. Ça, c''est inacceptable de dire ça. Nous
  sommes conscients des différences que nous avons avec la Chine, en particulier nos
  rapports aux valeurs démocratiques, des désaccords qu''on peut avoir là aussi, mais
  il y a toujours une politique de respect. On veut simplement réduire nos dépendances.
  Mais il n''y a pas de conflit. Ce n’est pas un G7 anti-chinois du tout. Ça n''a
  pas été du tout l''esprit, d''ailleurs. Mais on avance. Donc, moi, je trouve que
  signer un texte avec les Etats-Unis d''Amérique sur les mineries critiques, sur
  le cancer, sur Ebola, sur les partenariats internationaux, sur le commerce, sur
  l''IA, ça a beaucoup de valeur. Mieux que ça, on avait des doutes en commençant.
  Est-ce qu''on sera d''accord sur le Proche et Moyen-Orient ? Est-ce qu''on sera
  d''accord sur l''Ukraine ? C''est pour ça qu''il n''y avait pas de rédaction antérieure.
  Tout le travail qui a été fait avant hier soir et hier, ça a été de recréer les
  convergences, d''où cette atmosphère positive. Ces convergences, on les a mises
  dans le dur. Et on a signé avec les Etats-Unis un texte de paix au Proche et Moyen-Orient,
  d''exigence de paix, pour le Liban, pour empêcher le nucléaire iranien, et un texte
  de soutien à l''Ukraine inédit. Ça a énormément de valeur. Donc je défends cette
  méthode, parce qu''elle produit des résultats, elle est bonne. Voilà, mesdames et
  messieurs. Je remercie une fois encore toutes les équipes qui ont permis cela et
  ces avancées, pour moi, très importantes. C''était un grand honneur d''être là au
  nom de la France pour ce deuxième G7 que nous avions organisé ces dernières années.
  Je veux aussi avoir un mot pour nos amis voisins suisses qui nous ont aidés à organiser
  ce G7 et qui ont eu aussi beaucoup de logistique à assurer et des éléments divers
  et variés à tenir. Donc je voudrais vraiment leur dire un très grand merci pour
  cette coopération. Voilà, mesdames et messieurs, un grand merci. Bon courage. Retrouvez
  les déclarations adoptées ce mercredi 17 juin ci-dessous : Déclaration des chefs
  d''État et de gouvernement pour une croissance plus équilibrée, plus durable et
  plus résiliente. Appel des chefs d''État et de gouvernement pour un espace numérique
  plus sûr pour les mineurs. Déclaration des chefs d''État et de gouvernement du G7
  sur la sécurisation des chaînes d''approvisionnement en minerais critiques.'
