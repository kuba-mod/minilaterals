date: '2026-06-10'
type: press_release
source_name: elysee
title: Réception des groupes d'engagement du G7 au Palais de l’Elysée.
text: 'Le Président de la République a reçu les représentants des groupes d’engagement
  du G7 ce mercredi 10 juin 2026 au Palais de l’Elysée. Cet événement a réunit les
  groupes d''engagements suivants : Foundation 7, Labour 7, Business 7, Think Tank
  7, Youth 7, Women 7, Civil 7, Urban 7, University 7, Science 7, Tech 7, Pride 7
  et G7 des avocats. Cette séquence a permis d’échanger en amont du sommet du G7 d’Evian
  (15-17 juin) avec les représentants de la société civile, des partenaires sociaux,
  du monde économique, des fondations, des think tanks et de la jeunesse ayant contribué
  tout au long de l’année aux travaux préparatoires de la présidence française du
  G7. Cette rencontre était également l’occasion pour les groupes d’engagement de
  présenter leurs principales recommandations au Président de la République avant
  la tenue du sommet. Les échanges ont porté sur : Dans quelques jours, vous accueillerez,
  Monsieur le Président, à Évian-les-Bains, le Sommet des chefs d''État et de gouvernement.
  Deux G7 à votre actif. Bravo. Mais le G7 ne se résume pas à ces 3 jours de rencontres
  au plus haut niveau. Depuis le début de l''année, 13 groupes d''engagement participent
  activement à la préparation de ce rendez-vous majeur. Ils réunissent des membres
  de la société civile, des acteurs non étatiques issus notamment du monde économique
  et des organisations syndicales. Ils associent également des fondations, des chercheurs,
  des représentants de la jeunesse et des collectivités territoriales. Alors, ils
  sont bénévoles, farouchement passionnés, vous le verrez, et leur mission est de
  croiser les expériences de terrain, faire émerger des analyses et formuler des recommandations
  dans un contexte international particulièrement tendu et troublé. Monsieur le Président
  de la République, Emmanuel Macron, vous avez tenu, ce soir, à les remercier et à
  les honorer. Alors, ces groupes d''engagement sont ici présents et vous allez pouvoir
  découvrir huit de leurs représentants, ici, sur scène, et ils vont pouvoir expliquer
  leurs travaux, démontrer aussi et parler de leurs recommandations, les recommandations
  qu''ils souhaitent porter durant le Sommet d''Évian. Cette restitution s''articulera
  autour de deux tables rondes. La première sera consacrée à la croissance et à la
  prospérité partagées, et la seconde, aux grands défis mondiaux et à la résilience
  des démocraties. Mais avant d''accueillir la première table ronde et les premiers
  panélistes, je vous demanderai, Monsieur le Président, de faire un mot d''introduction
  pour les féliciter et les remercier. Merci à toutes et à tous. Je salue la ministre,
  nos parlementaires, les maires, les présidents d''universités, d''organismes, et
  puis évidemment les représentants des événements labellisés des groupes d''engagement
  et tous les soutiens. Je voulais en effet qu''on puisse se retrouver et échanger.
  D''abord, pour que vous puissiez présenter, comme ça a été dit, les groupes d''engagement
  qui se sont réunis. Et au fond, peut-être vous dire quelques mots de ce G7 et de
  pourquoi ce moment est important à mes yeux. Ça fait quelques années maintenant
  qu''on a un multilatéralisme qui est bousculé. Je parle en étant peut-être litotique.
  Et donc, depuis le début, ce qu''on a essayé de faire dans plusieurs domaines, le
  climat, la santé, je dirais de manière plus large, c''est d''avoir une approche
  où, au fond, toutes les parties prenantes étaient associées pour essayer de continuer
  à maintenir la dynamique ou faire avancer les choses. Parce que parfois, même quand
  les gouvernements sont bloqués, on va y revenir sans doute tout au long de cette
  soirée, parce qu''on a dans ce G7 des difficultés parfois de convergence sur certains
  thèmes, ce n''est pas un grand hasard, sur la santé, le climat, le genre, la discussion
  est peut-être moins spontanée ou convergente ou naturellement convergente qu''elle
  ne l''était il y a quelques années. À ce moment-là, l''approche par des groupes
  d''engagement permet d''avancer et d''éviter de reculer, si je puis dire. Et ça,
  c''est important. Donc pour moi, ce que vous représentez, les actions que vous portez,
  que vous avez portées et que vous allez porter, sont extrêmement importantes dans
  ce multilatéralisme efficace auquel nous croyons et qui suppose de faire en permanence
  de la guerre de mouvement et d''engager des partenaires dans tous les domaines du
  jeu. Et donc d''avoir les partenaires sociaux, les entreprises, le monde associatif,
  les académiques, les collectivités territoriales, c''est une manière aussi de continuer
  à innover et à faire améliorer les choses dans les différents domaines du jeu, et
  on va y revenir à travers les deux sessions. Ensuite, ce G7, il y a aussi des formations
  ministérielles qui ont permis d''avancer, il a aussi consolidé des résultats qui
  n''étaient pas forcément attendus. Je dis ça aussi comme source d''espérance. Sur
  les questions de santé, par exemple, on a quand même consolidé, sur la question
  du cancer, de la recherche, et on est en train de finaliser les textes. Mais des
  éléments de partage de données qui semblent consensuels et qui sont bons, on est
  en train d''essayer de consolider sur Ebola et la vaccination aussi. Moi, j''étais
  très heureux de ce qui a été fait, et vous allez sans doute y revenir sur le plan
  universitaire, et là, avec des vraies convergences à 7, ce qui n''avait pas toujours
  été le cas certaines années. Et donc, ce sont des sources d''espoir. Après, pour
  vous dire, juste en deux mots, avant qu''on commence, comment ça va être organisé.
  Donc ça commencera à Évian lundi soir. Il y aura d''abord un moment de retraite
  des 7 dirigeants pour couvrir sans salle d''écoute, sans rien, les grandes thématiques
  de crises internationales. On aura ensuite le mardi matin une discussion sur l''Ukraine
  avec le président Zelensky. Et ça, c''est très important pour nous parce qu''il
  faut recréer de la convergence en G7 en soutien à l''Ukraine sur les différents
  aspects, évidemment, de la guerre, du soutien, des négociations et dans la durée.
  On aura ensuite une séance de travail où on associera au G7 l''Égypte, l''Arabie
  saoudite, le Qatar et les Émirats arabes unis pour parler de la guerre, de la question
  à la fois d''Ormuz, des négociations sur l''Iran et de l''énergie avec un vrai impact
  pour nos économies. Donc c''est très important justement de trouver des voies et
  moyens de coopération. On aura ensuite une session de travail sur le partenariat
  Nord-Sud. Ça, vous y avez beaucoup travaillé. Et c''est vraiment le mardi après-midi
  qu''on va consolider le travail sur ce domaine-là et les instruments, justement,
  et j''espère la convergence entre les pays du G7. Et on va associer à cette session,
  outre le FMI, la Banque mondiale et la Banque africaine de développement, des partenaires
  avec lesquels on a construit cet agenda. Et qui sont tout particulièrement la Corée
  du Sud, l''Inde, le Kenya, qui va rapporter pour le continent africain, parce qu''on
  a co-présidé ensemble le sommet Africa Forward, et le Brésil. Et on a assez peu
  de pays, je dirais, partenaires de ce G7+, à dessein, parce qu''on a voulu garder
  une unité, mais on les a embarqués sur toutes les conclusions. Et enfin, on aura
  deux sessions le dernier jour. L''une sur les déséquilibres mondiaux, la question
  de la croissance. Il y a eu tout le travail qui a été fait en amont par des experts
  et qui a déjà été largement évoqué avec l''ensemble des parties prenantes, qui a
  fait l''objet d''un gros travail des ministres de l''Économie et des Finances. Et
  qui va donner lieu demain à 14 heures, à une session de ce qu''on a appelé le sommet
  des convergences, où on va parler en G7 avec aussi la Chine en particulier qui sera
  invitée en plus de cette outreach, donc ça, ce sera demain, pour préparer la session
  de mercredi prochain qui sera sur ces déséquilibres. Et enfin, on aura une discussion
  avec des entreprises de la tech, membres du G7, donc américaines et autres membres
  du G7, pour parler à la fois de notre agenda de protection et de régulation, et
  pour parler des questions de souveraineté, de sécurité, de cybersécurité liées au
  numérique. Voilà, je ne veux pas être plus long, mais c''est pour que vous ayez
  un peu les grandes thématiques et comment va se passer ce mai, qui n''épuise pas
  la totalité des thèmes du G7, puisqu''il y a dans les filières ministérielles beaucoup
  d''autres thèmes qui ont avancé, et on a aussi 7 déclarations, je pourrais y revenir,
  qui vont être adoptées en parallèle. Je m''arrête là. Un Sommet riche et dense,
  mais comme cette soirée qui nous attend avec deux tables rondes, je vais demander
  à nos panélistes de nous rejoindre. Madame Bathylle Missika, Madame Veronica Nilsson,
  Madame Véronique Torner et Monsieur Sébastien Treyer. On va commencer très rapidement.
  On va rentrer dans le vif du sujet parce qu''il faut tenir les temps. Vous avez
  vraiment trois, quatre minutes chrono pour nous parler de vos recommandations, de
  vos propositions, de votre action et de votre travail. Alors, cette première table
  ronde sera autour de la croissance et la prospérité partagées. Et nous commençons
  par vous, Bathylle Missika. Vous êtes vraiment très engagée et passionnée, évidemment,
  comme toutes les personnes que vous allez voir et entendre ce soir. D''abord, vous
  êtes cheffe de la division Réseau, partenariat au centre de développement de l''OCDE.
  L’OCDE, qui est l''Organisation de coopération et de développement économique. Je
  préfère le dire parce que j''aimerais aussi saluer des lycéens qui sont avec nous
  ce soir, qui font partie du réseau Erasmus, et saluer leurs professeurs, parce que
  grâce à eux, ils sont ici, ils ont fait des vidéos. Donc merci beaucoup. Je reviens
  à vous, Bathylle. Vous êtes aussi secrétaire générale du Pacte de Paris pour la
  prospérité, les peuples et la planète. Enfin, vous pilotez les travaux de Foundation
  7, donc le F7, et vous avez énormément de choses à nous dire à ce sujet. Vous voulez
  nous parler de philanthropie. Allez-y, je vous en prie. La parole est à vous. Merci
  infiniment. Alors nous sommes un nouveau groupe, le F7. Si vous me permettez, je
  vais commencer par une citation de Mike Tyson, parce que je me disais qu''elle était
  assez à propos. « Everyone has a plan until you get punched in the face. » C''est
  exactement à ce moment qu''on se trouve. Quel est le contexte ? « Nous avons tous
  un plan jusqu''à se prendre un gros coup de gant dans la figure. » Ensuite, on se
  dit : « bon, et maintenant quoi ? » Et donc : maintenant quoi ? Maintenant, il y
  a une baisse de l''aide publique au développement, une crise de la dette qui est
  amplifiée par la crise énergétique et la guerre avec l''Iran. On est donc dans un
  moment critique. Comment est-ce qu''on répond à cela ? En essayant de défragmenter
  et d’amener la philanthropie autour de la table à un moment où les finances d''une
  part, et aussi les partenariats innovants, d''autre part, sont critiques. C''est
  une nécessité. Cette nécessité est reflétée dans le deuxième pilier de la présidence
  française du G7 sur les partenariats. Donc l''approche partenariale, c''est maintenant
  la philanthropie qui est à la table. Lorsqu''on nous a demandé, donc le réseau des
  fondations qui travaillent pour le développement, dont nous avons la responsabilité,
  de prendre la tête de ce groupe, nous avons demandé quelque chose qui nous a été
  accordé et qui est absolument incroyable. Qui était : on ne veut pas juste se parler
  entre nous et ensuite vous remettre un rapport. On veut mélanger les tribus. Là,
  si on veut parler de finances innovantes, il faut pouvoir mettre les fondations
  avec les banques de développement. Nous travaillons très étroitement avec FiCS,
  avec les gouvernements. Qu''est-ce que c''est ? On appelle ça le blended finance,
  la finance mixte. Ce groupe de fondations va donc essayer d''amener aussi d''autres
  fondations. Nous avons des fondations du Nord, du Sud. NetForward est un réseau
  qui est connecté aussi à d''autres réseaux, avec des fondations saoudiennes, des
  Émirats, du Brésil, mais aussi françaises, américaines, qui ne sont pas que basées
  au Nord. Elles avaient une vraie demande par rapport à nous de dire : 1) on voudrait
  être à la table parce qu''on n''est pas qu’un chéquier et 2) on aimerait comprendre
  comment justement est-ce qu''on fait ces Development Impact Bonds. Pardon pour mes
  anglicismes. Comment est-ce qu''on fait de la finance innovante, comment est-ce
  qu''on vient partager le risque avec les autres acteurs ? Au G7 Développement, à
  la ministérielle, le 30 avril, nous avons eu une première séance qui a lancé ces
  travaux et cette communauté de pratique. Pour la première fois, ces tribus travaillent
  et se parlent ensemble. Elles ne mangent pas la même chose au petit-déjeuner, elles
  ne parlent pas la même langue. Ce manuel va être un livrable de la présidence française
  du G7, donc à destination des fondations, sur comment est-ce qu''on fait de la finance
  innovante. Mais en parallèle, nous avons aussi une déclaration signée par, pour
  l''instant, 26 fondations, qui est toujours d''actualité, puisque la présidence
  est en cours, qui propose comment la philanthropie peut relever ce défi et venir
  aider, notamment dans l''architecture du financement de la philanthropie. La philanthropie,
  ça représente à peu près 10 % de l''aide publique au développement sur nos chiffres
  de l''OCDE, mais c''est en croissance et c''est un chiffre qui est sous-estimé.
  Pourquoi ? Parce que quand on regarde l''aide publique au développement, il y a
  beaucoup de ces fonds qui ne vont pas directement, qui sont des coûts associés,
  des coûts de fonctionnement. La philanthropie, il nous manque beaucoup de données.
  Donc on est plutôt sur 15-20 %. Si vous imaginez les différentes parts de contributions
  de financement pour le développement, ça commence à être une partie intéressante.
  Nous, on se dit donc : comment est-ce que ces acteurs de la philanthropie vont venir
  faire partie de cet écosystème qui s''intéresse aussi bien aux politiques, mais
  aussi à comment on s''insère dans l''architecture du financement. Alors nous avons
  commencé une série de travaux à la fois techniques sur la finance innovante avec
  les banques publiques de développement, les institutions financières internationales
  et les gouvernements, mais aussi une série thématique au moment de grands sommets,
  au moment de l''Assemblée générale de l''ONU, au moment des réunions annuelles de
  la Banque mondiale, autour de finances innovantes pour le climat, ou pour le climat
  en Asie, finances innovantes autour de l''éducation, pour que les philanthropes
  de l''éducation puissent parler aussi avec ces acteurs, à la fois publics, privés.
  Il y a un nouveau mot à la mode, c''est le 4P, mais c''est un autre 4P, c''est le
  partenariat public-privé-philanthropique. Et ça paraît simple, mais ils sont compliqués
  à mettre en œuvre. Pour conclure, mes messages pour Évian seraient : l''innovation
  partenariale est essentielle et on ne peut plus se permettre d''avoir une fragmentation
  entre les groupes d''acteurs. Il faut mettre toutes les tribus autour de la table.
  Ça c''est une première chose et nous saluons cette innovation. C''est la première
  fois que ce groupe existe. Nous espérons aussi qu''il sera repris par la présidence
  britannique du G20 et nous y travaillons activement. Nous comptons aussi sur vous,
  Monsieur le Président, pour leur souffler à l''oreille que cette innovation française
  va avoir longue vie. En parallèle, ce groupe, cette communauté de pratiques, va
  survivre bien au-delà de la présidence française du G7 parce que là, maintenant,
  elle est lancée et qu''elle a besoin de continuer à exister si on veut libérer plus
  de finances innovantes, si on veut mettre les fondations au cœur du réacteur dans
  les ambitions de cette présidence. Merci de nous avoir accordé cette confiance au
  groupe des fondations. Merci, Bathylle. Donc, un guide pratique pour la philanthropie,
  vous la rendez très sexy, finalement, et très abordable. Et pour parler de ce partenariat
  et le fait de travailler ensemble, justement, je donne la parole à Madame Veronica
  Nilsson. Vous-même, vous êtes donc à la tête du L7, du Labour 7, et vous avez travaillé
  conjointement avec le B7, le Business 7, un partenariat exigeant, mais un partenariat
  réussi. Puisque, vous, vos recommandations sont plutôt d''amener le G7 à intégrer,
  en tout cas, une dimension sociale à la mondialisation. Expliquez-nous tout ça.
  Avant, je voudrais juste dire que vous êtes secrétaire générale de TUAC, la commission
  syndicale consultative auprès de l''OCDE, et donc vous êtes à la tête du L7. Je
  vous en prie. Merci beaucoup, Monsieur le Président, Mesdames, Messieurs. Je représente
  les organisations syndicales dans l''ensemble des G7, et notamment les organisations
  hautes en France, alors c''est la CFDT, la CGT, Force ouvrière, CFE-CGC et l''UNSA.
  Depuis 1977, nous travaillons pour porter les priorités concrètes du monde du travail
  dans l’enceinte du G7 : le salaire, le travail décent, les conditions de travail,
  la démocratie au travail, etc. Je voudrais commencer par rappeler l''esprit de Rambouillet.
  Parce qu''à ce moment-là, le gouvernement de G7 avait décidé de promouvoir une société
  ouverte, démocratique, profondément attachée à la liberté individuelle et au progrès
  social. Je trouve qu''aujourd''hui, c''est encore plus important qu''il y a 51 ans.
  Le message du L7 est clair. Pour répondre aux déséquilibres mondiaux, il faut prendre
  en compte la dimension sociale de la mondialisation. Il faut mettre fin aux violations
  des droits fondamentaux au travail, le travail des enfants, le travail forcé, le
  droit des négociations collectives et la liberté syndicale. C''est ces violations-là
  qui contribuent aux déséquilibres géoéconomiques et les avantages économiques induits.
  La Confédération syndicale internationale, la CSI, a récemment publié leur indice
  des droits dans le monde, et ça montre que c''est pire que jamais. Même dans d''autres
  coins du monde, en Europe et en Amérique, ils ont enregistré la pire note depuis
  la création de cet indice. Donc c''est très, très préoccupant. C''est en vue de
  ce développement que nous avons été invités, ensemble avec le B7, par la filière
  emploi, pour travailler ensemble sur un des livrables. C''était bien difficile,
  mais nous avons réussi à nous mettre d''accord sur une proposition concrète pour
  défendre le level playing field et pour lutter contre la concurrence déloyale. Nous
  avons présenté cette proposition hier à Genève, quand il y avait la réunion ministérielle
  ou la réunion des ministres d''emploi du G7, et on a eu l''occasion de participer.
  Je dois dire, parce que Monsieur le Président a dit tout à l''heure qu''il faut
  éviter de reculer. Eh oui, mais on a même fait du progrès hier. Je trouve que les
  ministres du Travail, ils ont fait du progrès. Pas autant qu''on aurait souhaité
  comme L7, mais quand même, il y a du progrès. Il faut le reconnaître parce que c''est
  vraiment très important. On a aussi réussi à dépasser nos divergences avec le B7,
  justement, pour arriver à ce papier avec nos propositions. Donc, ce qu''on propose,
  c''est d''abord, je trouve que c''est quand même une vision. Qu''est-ce que ça veut
  dire, « level playing field » ? Mais aussi de dessiner un chemin pour mettre fin
  à la course au moins disant social en s''appuyant sur deux leviers. Le premier levier,
  c''est les politiques commerciales. Il faut renforcer la place des normes sociales
  dans le commerce, dans les accords commerciaux pour lutter contre les excédents
  commerciaux fondés sur les modèles d''exploitation. Le deuxième levier, c''est les
  politiques de développement. Nous proposons de mettre en place une plateforme pour
  promouvoir des salaires minimums vitaux. C''est un sujet dont l''OIT a déjà travaillé.
  Ils ont adopté ou approuvé une méthodologie à l''échelle internationale justement
  pour calculer ce salaire. Nous souhaitons, bien sûr, que nos propositions soient
  reprises pendant le sommet. Je trouve aussi, je voulais aussi dire avant de finir,
  que le dialogue social, c''est vraiment un pilier de la démocratie. C''est un levier
  indispensable pour assurer l''équation sociale et un développement économique inclusif.
  Nous, L7, nous serions, et ensemble, je suis sûre, avec B7, nous serions heureux
  de porter nos propositions conjointes au sommet. Je trouve que ça serait un signal
  d''attachement au dialogue et à la démocratie sociale très forte. Merci beaucoup.
  Oui, merci beaucoup. D’abord peut-être dire qu''il y a eu des déclarations qui ont
  été adoptées, des positions dans les ministériels, ça a été dit, on aura normalement
  7 déclarations qu''on va finaliser, et il y aura sans doute en plus de ça des textes
  de manière ad hoc qu''on va adopter sur certaines sessions. Mais si le G7 leader
  est un momentum, ce n’est pas la fin du G7 français, et on veut aussi créer, j''y
  reviendrai, d''autres occasions de faire avancer cet agenda. Là, l''idée, c''est
  de faire un moment de convergence ou d''avancer sur des points clés, mais on a aussi
  la volonté de poursuivre dans le deuxième semestre. Au fond, d''abord, ce qui a
  été dit, je m''y retrouve beaucoup, et je veux vous remercier pour les travaux qui
  ont été faits par vos 4, même 5, avec le B7, formations. Sur ce que vous avez dit
  d''abord sur les philanthropies et le nouveau deal, en quelque sorte, qui doit y
  avoir dans le financement international, ça rejoint un des points que vous avez
  faits et qui rejoint d''ailleurs Finances en commun. Et l''AFD et Rémy Rioux en
  particulier, toutes ces dernières années, ont vraiment contribué à faire pivoter
  tout ça, y compris sur le plan conceptuel. Ça vient après plusieurs années d''efforts
  où la France a porté en 2021 le sommet sur le financement des économies africaines,
  en 2023, le fameux 4P, donc le pacte pour la prospérité des peuples et de la planète,
  dont vous assurez le secrétariat général et qui s''est adossé à l''OCDE, et maintenant
  ce G7. Et au fond, toute notre philosophie, ça a été aussi de dire qu''il faut sortir
  d''abord d''une approche de l''aide publique au développement, qui était un peu
  toujours unilatérale, pour cette approche d''investissement solidaire, où d''abord
  on co-définit un agenda et où on mobilise beaucoup plus de l''argent public et privé.
  Cette approche-là, on l''a, je dirais, conceptualisée et pensée avant le choc du
  retrait américain dans beaucoup de politiques et aussi de la diminution des chiffres
  d''APD dans beaucoup de pays. Et je pense que ce changement de philosophie est très
  important parce que d''abord, un, c''est ce que demandent beaucoup de pays du Sud.
  Ils ne veulent plus de politique d''aide publique au développement. Ils veulent
  des investissements qui sont co-décidés. Ils veulent aussi limiter l''effet d''éviction
  où l''argent public va venir sur des projets où ils pourraient attirer de l''argent
  privé. Et ça, c''est un point qui est clé dans notre agenda et dans ce qu''on est
  en train de faire. Donc on change de philosophie, on change d''approche. Et en effet,
  c''est le grand apport de finances en commun, de 4P, c''est-à-dire qu''on met autour
  de la table, ou de ce que dirige Laurence qui est là aussi et qui a été les One
  Planet Summit sur les fonds souverains, les asset managers et autres, c''est de
  se dire, on a des grands objectifs et on met autour de la table tous les financeurs,
  c''est-à-dire les gouvernements, les institutions financières, les banques multis,
  les banques régionales, les banques de développement, les philanthropies, le secteur
  privé. On définit des objectifs en commun, et on regarde là où ça doit être de l''argent
  public, là où on peut trouver des effets de levier pour améliorer l''efficacité
  de l''argent qu''on met, et on développe des programmes ensemble. Ça, c''est vraiment
  fondamental, et je suis très content de cette déclaration des fondations, parce
  que ça rejoint ce que vous disiez, c''est une approche qui, je crois, est beaucoup
  plus efficace, et de toute façon, on n''a pas le choix, parce que le punch, on l''a
  pris. Donc on doit aller dans ce sens. Et je pense qu''on peut vraiment avoir des
