date: '2026-06-03'
type: press_release
source_name: elysee
title: Compte rendu du conseil des ministres du 3 juin 2026.
text: 'Retrouvez le compte rendu du conseil des ministres du mercredi 3 juin 2026.
  La ministre des outre-mer a présenté une ordonnance adaptant et modernisant certaines
  dispositions du code général des collectivités territoriales applicables en Polynésie
  Française. Cette ordonnance s’inscrit dans le cadre prévu à l’article 74-1 de la
  Constitution, permettant au Gouvernement d’étendre avec les adaptations nécessaires
  les dispositions de nature législative en vigueur en métropole, dans les collectivités
  d’outre-mer visées à l’article 74 et en Nouvelle-Calédonie. Fruit d’un important
  travail associant les instances locales, le texte reprend et adapte la majorité
  des dispositions inscrites dans la proposition de loi portant adaptation et modernisation
  des dispositions du code général des collectivités territoriales applicables en
  Polynésie française déposée au Sénat. L’ambition est de répondre à la volonté manifestée
  par de nombreux élus polynésiens du bloc communal de clarifier, d’adapter et de
  compléter les dispositions du code général des collectivités territoriales applicables
  localement. L’ordonnance permet ainsi d’intervenir en matière de finances et budget,
  de pouvoir de police du maire, de droit funéraire et de services publics environnementaux.
  Elle permettra notamment d’adapter les règles de fonctionnements des conseils municipaux
  aux contraintes géographiques locales et de résoudre une problématique tant organisationnelle
  que financière pour les communes dispersées sur plusieurs îles. Le report de délais
  concernant certaines obligations d’exercice des compétences en matière de service
  publics permettra également aux collectivités de se mettre en conformité dans des
  délais adaptés à leurs capacités. Enfin, l’élargissement des prérogatives du maire
  constituera un levier pour garantir la continuité du service public. Par cette ordonnance,
  le Gouvernement donne ainsi la possibilité aux communes polynésiennes et à leurs
  groupements d’agir efficacement en tenant compte d’un cadre juridique adapté à leurs
  réalités. Le ministre l’intérieur et le garde des sceaux, ministre de la justice,
  ont présenté un décret abrogeant l’article L.342-19 du code de l’entrée et de séjour
  des étrangers et du droit d’asile et modifiant les délais de recours devant la Cour
  nationale du droit d’asile dans le cadre des travaux actuellement conduits par le
  Gouvernement visant à adapter le droit interne aux nouvelles exigences découlant
  du pacte européen sur la migration et l’asile, qui doit entrer en application le
  12 juin prochain. D’une part, ce décret abroge l’article L. 342-19 du code de l’entrée
  et du séjour des étrangers et du droit d’asile (CESEDA). En effet, pour ce qui concerne
  l’application du règlement (UE) 2024/1349 du 14 mai 2024 instituant une procédure
  de retour à la frontière (PRF), le Gouvernement souhaite mobiliser les dispositions
  en vigueur du livre III du CESEDA relatives au refus d’entrée et à la zone d’attente.
  Toutefois, l’article L. 342 19 du même code, qui prévoit que l’étranger dont le
  placement en zone d’attente a pris fin est autorisé à entrer sur le territoire sous
  couvert d’un visa de régularisation de huit jours, est contraire aux exigences du
  règlement (UE) 2024/1349 s’agissant des conséquences à tirer de l’échec du réacheminement
  de l’étranger au terme de la PRF. Le règlement (UE) 2024/1349 dispose en effet que,
  dans ce cas, l’étranger doit faire l’objet d’une procédure de retour conformément
  à la directive 2008/115/CE du Parlement européen et du Conseil du 16 décembre 2008
  relative aux normes et procédures communes applicables dans les Etats membres au
  retour des ressortissants de pays tiers en séjour irrégulier. Afin d’assurer une
  meilleure cohérence entre le droit européen et le droit interne et une meilleure
  efficacité de la politique de lutte contre l’immigration irrégulière, il est ainsi
  nécessaire de ne plus prévoir d’octroi d’un visa de régularisation de huit jours
  pour l’étranger dont le placement en zone d’attente a pris fin. Une telle évolution
  nécessite la suppression de l’article L. 342-19 du CESEDA. D’autre part, le décret
  modifie le délai de recours contentieux devant la Cour nationale du droit d’asile
  (CNDA) afin de le rendre conforme aux exigences du §7 de l’article 67 du règlement
  (UE) 2024/1348 du Parlement européen et du Conseil du 14 mai 2024 instituant une
  procédure commune en matière de protection internationale dans l’Union et abrogeant
  la directive 2013/32/UE. Conformément au point a du paragraphe 7 de l’article 67
  du règlement (UE) 2024/1348, le présent décret prévoit que les recours contre les
  décisions d’irrecevabilité et, lorsque l’une des circonstances de la procédure accélérée
  s''applique au moment où elles sont prises, contre les décisions de rejet, doivent
  être formés devant la CNDA dans un délai de dix jours à compter de leur notification.
  Conformément au point b du paragraphe 7 de l’article 67 du règlement précité, le
  présent décret prévoit que le délai de recours d’un mois continue à s’appliquer
  dans les autres cas. L’article L. 342-19 et le second alinéa de l’article L. 532-1
  du CESEDA résultent de l’ordonnance n° 2020-1733 du 16 décembre 2020 portant partie
  législative du code de l’entrée et du séjour des étrangers et du droit d’asile et
  n’ont pas été modifiées, depuis, par une loi ou une ordonnance ratifiée. Cette ordonnance
  n’a pas fait l’objet d’une ratification expresse. Le Conseil constitutionnel considère
  que les dispositions issues d’ordonnances non ratifiées « ne peuvent être regardées
  comme étant de forme législative au sens du second alinéa de l’article 37 de la
  Constitution » et prononce un non-lieu lorsqu’il est lui est demandé de les déclasser.
  Ces dispositions ne peuvent ainsi être modifiée que par décret en Conseil d’Etat
  délibéré en conseil des ministres. Le ministre de l’économie, des finances et de
  la souveraineté industrielle, énergétique et numérique, le ministre de l’Europe
  et des affaires étrangères, et le ministre de l’enseignement supérieur et de la
  recherche et de l’espace ont présenté une communication relative à l’attractivité
  de la France et faisant état du succès du programme Choose France, dont la neuvième
  édition s’est tenue le 1er juin 2026. D’années en années, la France confirme son
  attractivité économique et financière au sein de l’Europe. Cette dynamique repose
  à la fois sur la qualité de son environnement économique, la profondeur de sa place
  financière, son écosystème d’innovation, la qualité de son écosystème d’enseignement
  supérieur et de recherche et les réformes structurelles engagées depuis 2017 pour
  renforcer la compétitivité de son économie. La France demeure le principal pays
  d’accueil des investissements étrangers en Europe. Selon l’édition 2026 du baromètre
  EY de l’attractivité, elle est, en 2025 et pour la 7 ème année consécutive, la première
  destination européenne en nombre de projets d’investissements internationaux. Cette
  attractivité reflète les atouts structurels du pays : une main-d’œuvre qualifiée,
  des infrastructures de qualité, dont une électricité bas-carbone compétitive, un
  tissu industriel diversifié, un accès privilégié au marché européen, ainsi qu’un
  écosystème dynamique en matière d’innovation. Depuis 2017, la France a conduit un
  agenda cohérent de réformes destinées à renforcer la compétitivité des entreprises
  et la prévisibilité de l’environnement économique. Ces réformes comprennent notamment
  la baisse progressive de l’impôt sur les sociétés à 25 %, la suppression de plusieurs
  impôts de production, les réformes du marché du travail visant à accroître la flexibilité
  et la prévisibilité pour les entreprises, ainsi que la loi PACTE. Parallèlement,
  le plan d’investissement « France 2030 », de 54 milliards d’euros, a contribué à
  investir massivement dans les technologies innovantes et le soutien à la transition
  écologique. Plus récemment, la loi visant à accroître le financement des entreprises
  et l’attractivité de la France (« loi Holroyd ») a modernisé certains aspects du
  droit des sociétés, quand le plan d’électrification des usages, présenté en avril
  2026, vient inscrire l’économie française sur une trajectoire d’électrification
  massive, pour renforcer la souveraineté, accélérer la décarbonation et renforcer
  la compétitivité des entreprises. Cette dynamique se reflète également dans l’attractivité
  croissante de la place financière de Paris. Depuis le Brexit, Paris est le principal
  centre financier de l’Union européenne (UE), avec près de 347 000 emplois dans le
  secteur financier, grâce à de nombreuses relocalisations d’activités. Ces installations
  se poursuivent, de nombreux établissements continuant à faire le choix de Paris
  pour leurs activités en UE. Plus largement en France le secteur financier occupe
  désormais 920 000 emplois, représentant un excédent commercial des services financiers
  de 13 milliards d’euros (en 2025). La place de Paris bénéficie aujourd’hui d’un
  écosystème complet couvrant l’ensemble de la chaîne de valeur financière : banques,
  gestionnaires d’actifs, infrastructures de marché, fintechs, services juridiques
  et de conseil. Cette attractivité s’appuie également sur une dynamique collective
  : un cadre réglementaire stable, une supervision reconnue, un important réservoir
  de talents, l’écosystème français de la technologie et de l’innovation. L’attractivité
  académique et scientifique de la France est dans ce contexte une condition nécessaire
  pour l’autonomie technologique, économique et stratégique du pays, et pour sa compétitivité
  à court et moyen terme. L’attractivité en matière scientifique est une priorité
  de long terme du gouvernement : en 2019, le plan Bienvenue en France a donné un
  objectif quantitatif fort : atteindre 500 000 étudiants internationaux en France
  en 2027. Malgré le ralentissement dû à la crise de la Covid-19, la France est sur
  le point d’atteindre cet objectif. Attirer des talents scientifiques en France pour
  que le pays conserve sa place dans la compétition scientifique et technologique
  actuelle est une priorité tant économique que stratégique, en particulier dans des
  domaines comme le quantique ou l’intelligence artificielle. Le programme Choose
  France and Europe for science, annoncé le 5 mai 2025 par le Président de la République,
  aux côtés de la Présidente de la Commission européenne, vise à cette fin à accueillir
  en France des chercheurs de rang mondial. Il a suscité un intérêt constant auprès
  des chercheurs du plus haut niveau, venus des plus grandes institutions américaines
  : Yale, Harvard, Princeton ou encore la NASA. Fin mai 2026, plus de soixante d’entre
  eux ont été sélectionnés, pour un investissement total de 37 millions d’euros. Par
  le même temps, face au constat que trop peu de Français et même d’européens choisissent
  aujourd’hui d’étudier les matières scientifiques et techniques, le plan Choose France
  for Higher Education a été lancé le 21 avril 2026. Il vise à répondre aux besoins
  identifiés du pays sur un plan qualitatif, pour concentrer les efforts sur les disciplines
  prioritaires pour la souveraineté française, tout en renforçant la qualité de l’accueil
  des étudiants étrangers. Fruit de la convergence de ces priorités interministérielles,
  les Sommets Choose France viennent illustrer la stratégie d’attractivité du Président
  de la République et du Gouvernement, et constituent désormais un rendez-vous économique
  annuel majeur. Depuis 2018, ils permettent de mettre en valeur les réformes engagées,
  les atouts du territoire et les opportunités d’investissement offertes par la France
  dans des secteurs stratégiques tels que l’industrie, les technologies, l’intelligence
  artificielle, la transition énergétique ou les services financiers. Ces séquences
  contribuent également à renforcer le dialogue de confiance entre les pouvoirs publics
  et les investisseurs internationaux, dans un contexte de forte concurrence économique
  mondiale. En huit éditions, ce sont 231 annonces d’investissements en France qui
  ont été recensées, pour un montant de 87 milliards d’euros d’investissements, dont
  50 % ont d’ores et déjà été concrétisés. Une hausse des annonces lors des éditions
  2024 et 2025 expliquent le nombre de projets toujours en cours. Le 1er juin dernier,
  la 9ème édition du Sommet Choose France a de nouveau été un succès pour l’attractivité
  de la France. Elle a rassemblé un nombre record de plus de 200 chefs d’entreprises
  étrangères de près de 50 nationalités différentes, dont la moitié y participait
  pour la première fois. Avec 71 annonces représentant un montant de 93 milliards
  d’euros d’investissements amenés à créer plus de 15 600 emplois, cette édition a
  également été un record sur un plan économique. Elle a été l’occasion de mettre
  à l’honneur les thématiques des transitions énergétique et numérique souveraines.
  Avec l’implantation de centres de données à grande échelle, de rang mondial, la
  France franchit une nouvelle étape dans les infrastructures d’intelligence artificielle,
  tout en renforçant son ancrage industriel sur l’ensemble de la chaîne de valeur,
  de l’assemblage de serveurs à la production d’équipements, en passant par les composants
  critiques et la formation, avec des partenariats technologiques majeurs entre fleurons
  français et entreprises étrangères. Cette dynamique d’investissements participe
  également à la consolidation de notre autonomie stratégique dans les secteurs du
  spatial, des métaux critiques, de la santé, de l’agroalimentaire et de l’énergie.
  Plusieurs investisseurs étrangers ont ainsi confirmé leur ancrage en France via
  l’annonce de nombreux projets de décarbonation de leur appareil industriel, en cohérence
  avec le plan d’électrification du Gouvernement. Le conseil des ministres a prononcé,
  sur proposition du ministre de l’intérieur, la dissolution du groupement de fait
  dénommé « Patria Albiges » et du groupement de fait dénommé « Front de rue ». La
  ministre des outre-mer a présenté une ordonnance adaptant et modernisant certaines
  dispositions du code général des collectivités territoriales applicables en Polynésie
  Française. Cette ordonnance s’inscrit dans le cadre prévu à l’article 74-1 de la
