  le même temps, face au constat que trop peu de Français et même d’européens choisissent
  aujourd’hui d’étudier les matières scientifiques et techniques, le plan Choose France
  for Higher Education a été lancé le 21 avril 2026. Il vise à répondre aux besoins
  identifiés du pays sur un plan qualitatif, pour concentrer les efforts sur les disciplines
  prioritaires pour la souveraineté française, tout en renforçant la qualité de l’accueil
  des étudiants étrangers. Fruit de la convergence de ces priorités interministérielles,
  les Sommets Choose France viennent illustrer la stratégie d’attractivité du Président
  de la République et du Gouvernement, et constituent désormais un rendez-vous économique
  annuel majeur. Depuis 2018, ils permettent de mettre en valeur les réformes engagées,
  les atouts du territoire et les opportunités d’investissement offertes par la France
  dans des secteurs stratégiques tels que l’industrie, les technologies, l’intelligence
  artificielle, la transition énergétique ou les services financiers. Ces séquences
  contribuent également à renforcer le dialogue de confiance entre les pouvoirs publics
  et les investisseurs internationaux, dans un contexte de forte concurrence économique
  mondiale. En huit éditions, ce sont 231 annonces d’investissements en France qui
  ont été recensées, pour un montant de 87 milliards d’euros d’investissements, dont
  50 % ont d’ores et déjà été concrétisés. Une hausse des annonces lors des éditions
  2024 et 2025 expliquent le nombre de projets toujours en cours. Le 1er juin dernier,
  la 9ème édition du Sommet Choose France a de nouveau été un succès pour l’attractivité
  de la France. Elle a rassemblé un nombre record de plus de 200 chefs d’entreprises
  étrangères de près de 50 nationalités différentes, dont la moitié y participait
  pour la première fois. Avec 71 annonces représentant un montant de 93 milliards
  d’euros d’investissements amenés à créer plus de 15 600 emplois, cette édition a
  également été un record sur un plan économique. Elle a été l’occasion de mettre
  à l’honneur les thématiques des transitions énergétique et numérique souveraines.
  Avec l’implantation de centres de données à grande échelle, de rang mondial, la
  France franchit une nouvelle étape dans les infrastructures d’intelligence artificielle,
  tout en renforçant son ancrage industriel sur l’ensemble de la chaîne de valeur,
  de l’assemblage de serveurs à la production d’équipements, en passant par les composants
  critiques et la formation, avec des partenariats technologiques majeurs entre fleurons
  français et entreprises étrangères. Cette dynamique d’investissements participe
  également à la consolidation de notre autonomie stratégique dans les secteurs du
  spatial, des métaux critiques, de la santé, de l’agroalimentaire et de l’énergie.
  Plusieurs investisseurs étrangers ont ainsi confirmé leur ancrage en France via
  l’annonce de nombreux projets de décarbonation de leur appareil industriel, en cohérence
  avec le plan d’électrification du Gouvernement. Le conseil des ministres a prononcé,
  sur proposition du ministre de l’intérieur, la dissolution du groupement de fait
  dénommé « Patria Albiges » et du groupement de fait dénommé « Front de rue ».'
