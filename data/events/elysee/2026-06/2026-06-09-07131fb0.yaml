title: L'Élysée fête la musique !
text: Comme chaque année, le 21 juin, la cour d’honneur du Palais de l’Élysée a ouvert
  ses portes à l’occasion de la Fête de la Musique 2026 ! Plusieurs artistes étaient
  présents de 19h à minuit , pour vous faire danser...et chanter !
