title: Déplacement au salon VivaTechnology.
text: Le Président de la République s'est rendu à la dixième édition du salon VivaTech,
  Porte de Versailles à Paris, ce jeudi 18 juin 2026. Cette édition a permis une nouvelle
  fois de mettre en avant les startups présentes et plus globalement les 25 000 startups
  françaises , représentant plus de 1,1 million d’emplois. Le chef de l'État a échangé avec
  des entreprises technologiques et des startups françaises , témoignant de la vitalité
  et du dynamisme de l’écosystème français à la pointe de l’innovation sur des secteurs
  clés pour l’économie et la souveraineté française. Dans le contexte de l’année franco-indienne
  de l’innovation lancée en février 2026 à Bombay, le Président Emmanuel Macron s'est
  rendu sur le stand de l’Inde , dédié à ses entreprises innovantes, aux côtés de
  Narendra Modi , Premier ministre de la République de l’Inde. La France et l'Inde partagent
  en effet des ambitions communes dans les secteurs d’avenir et d’innovation, notamment
  illustrées par les Sommets sur l’Intelligence artificielle de février 2025 à Paris
  et de février 2026 à New Delhi et l’événement Bharat Innovates de juin 2026 à Nice.
  Le Président de la République a aussi échangé avec des startups libanaises présentes
  au salon, accompagné de Nawaf Salam , Premier ministre de la République libanaise,
  témoignant du dynamisme entrepreneurial libanais et du soutien de la France au redressement
  du Liban.
