title: La France et l'Allemagne ont conclu un accord sur la stratégie et la gouvernance
  de KNDS.
text: 'Aujourd''hui, la France et l''Allemagne ont conclu un accord sur la stratégie
  et la gouvernance de KNDS, dont elles ont l’intention de devenir co-actionnaires,
  à travers des transactions visant à un actionnariat paritaire entre les deux pays.
  L’accord et les transactions seront effectifs sous réserve de leur approbation budgétaire
  par le Parlement allemand. En fixant ce cadre franco-allemand, les deux États franchissent
  une étape décisive pour renforcer leur souveraineté partagée dans la défense terrestre.
  Par cet accord, les deux États sécurisent leurs droits à la fois comme actionnaires
  et comme États souverains. Ses principes fondateurs sont un engagement actionnarial
  de long terme, la parité des droits de gouvernance, et une surveillance appropriée
  des sujets de sécurité. En outre, les deux Etats sont convenus de revoir régulièrement
  leur niveau de détention actionnariale et son évolution possible. L''accord ouvre
  par ailleurs la voie à une possible introduction en bourse de KNDS dans un futur
  proche. Pour KNDS - née en 2015 de la fusion de Nexter Systems et de KMW (Krauss-Maffei
  Wegmann) - il s''agit d''une nouvelle étape majeure. L''ambition commune de la France
  et de l''Allemagne est claire : faire de KNDS une entreprise de défense de premier
  plan, en Europe et dans le monde, au service des armées française et allemande,
  et renforcer sa compétitivité dans l''industrie européenne des systèmes terrestres
  - en élargissant ses capacités et son offre, en développant des synergies dès que
  possible et en consolidant la souveraineté industrielle, technologique et militaire
  française et allemande par une innovation continue. Cette ambition s''articule autour
  de six objectifs clés : Cet accord reflète la détermination partagée de la France
  et de l''Allemagne à renforcer les capacités industrielles et de défense de l''Europe,
  à soutenir leurs armées et à renforcer durablement la souveraineté européenne. Il
  ouvre un nouveau chapitre pour KNDS et lui donne un cadre solide pour son développement
  futur. À l''heure d''un réarmement accéléré et d''une compétition technologique,
  il marque une étape décisive vers une Europe plus souveraine.'
