title: Déclaration conjointe des dirigeants de la France, du Royaume-Uni, de l’Allemagne
  et de l’Ukraine.
text: Le Premier ministre britannique Keir Starmer, le Président français Emmanuel
  Macron et le Chancelier allemand Friedrich Merz ont rencontré le 7 juin le Président
  ukrainien Volodymyr Zelensky afin de réaffirmer leur soutien indéfectible à l’Ukraine
  dans sa défense contre l’invasion illégale de la Russie et les prochaines étapes
  des négociations pour soutenir une paix juste et durable. Ils ont souligné que l’Europe
  avait un rôle important à jouer dans tout règlement, en tant que soutien inébranlable
  de l’Ukraine. Les dirigeants ont clairement indiqué que tous les efforts devaient
  être menés en coopération la plus étroite avec l'Ukraine, les partenaires européens
  au sens large et les États-Unis. Ils ont salué les récents succès de l’Ukraine sur
  le champ de bataille, notamment la libération récente de territoires et l’utilisation
  novatrice de la technologie des drones. Ils ont condamné les attaques de drones
  et de missiles à grande échelle menées par la Russie – y compris l’utilisation répétée
  de missiles Oreshnik – sur des villes ukrainiennes avec un bilan tragique parmi
  les populations civiles, ainsi que les incursions irresponsables et dangereuses
  de drones russes sur le territoire de l’OTAN. Ils ont présenté leurs condoléances
  à toutes les victimes. Ils ont échangé sur la manière de se saisir du prochain Sommet
  du G7 à Évian, de la prochaine réunion de la Coalition des Volontaires, et du sommet
  de l’OTAN à Ankara pour coordonner au mieux la poursuite du soutien à l’Ukraine
  sur la base de ses besoins prioritaires, notamment par la pression continue sur
  l’économie de guerre de la Russie et par un engagement accru en matière de soutien
  militaire et de défense pour l’Ukraine lors du Sommet de l’OTAN. Les dirigeants
  ont souligné le besoin urgent de faire passer à l’échelle la production d’intercepteurs
  et de développer conjointement des capacités antimissiles balistiques et de frappe
  en profondeur, ainsi que de soutenir la viabilité future des forces armées ukrainiennes.
  Ils ont également échangé sur la façon dont l’Alliance peut apprendre de l’expertise
  du champ de bataille de l’Ukraine et sur la manière d’accroître la coopération industrielle
  de long terme avec l’Ukraine afin que l’Europe renforce sa propre défense. Ils ont
  insisté sur le lien inextricable entre la sécurité, la prospérité et la souveraineté
  de l’Ukraine, d’une part, et la sécurité euro-atlantique au sens large, d’autre
  part. Concernant les négociations, ils ont examiné les conditions qui devraient
  être réunies pour parvenir à une paix juste et durable. Les dirigeants ont salué
  l'appel lancé par le président Zelensky pour une fin de la guerre, négociée par
  la voie diplomatique, tel qu’exposé dans sa lettre adressée au Président de la Fédération
  de Russie le 4 juin 2026. Ils ont apporté leur soutien à la proposition en faveur
  d’un dialogue direct entre l’Ukraine et la Russie – avec la participation active
  des États-Unis et de l'Europe – afin de parvenir à un cessez-le-feu et de soutenir
  la poursuite des négociations. Ils ont confirmé qu'ils continueraient à se tenir
  résolument aux côtés de l’Ukraine.
