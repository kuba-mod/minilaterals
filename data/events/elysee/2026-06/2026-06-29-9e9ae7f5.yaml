title: Visite d’État du Roi et de la Reine du Royaume de Thaïlande, leurs Majestés
  Maha Vajiralongkorn, Rama X et Suthida Bajrasudhabimalalakshana.
text: Le Président de la République et son épouse ont reçu Leurs Majestés le Roi Maha
  Vajiralongkorn, Rama X, et la Reine Suthida Bajrasudhabimalalakshana de Thaïlande
  le lundi 29 juin 2026, au Palais de l’Élysée. Alors que la France et la Thaïlande
  célèbrent cette année le 170e anniversaire de l’établissement de leurs relations
  diplomatiques , cette visite d’État rappelle la vitalité des liens entre nos deux
  pays et est l’occasion d’approfondir notre coopération. Cette visite d’État en France
  est la première depuis celle de leurs Majestés le Roi Bhumibol Adulyadej et la Reine
  Sirikit, qui furent accueillis par le Général de Gaulle en 1960, et la première
  en Europe du règne de Rama X . Le Premier ministre Anutin Charnvirakul , qui s’était
  rendu en France pour une visite de travail du 22 au 25 mai 2026, a accompagné le
  Roi à cette occasion. À leur arrivée, Leurs Majestés Maha Vajiralongkorn, Rama X,
  et Suthida Bajrasudhabimalalakshana, ont été accueilli à l'Hôtel national des Invalides.
  Puis ils se sont rendus au Palais de l'Élysée pour une présentation d'archives incarnant
  la relation franco-thaïlandaise puis un dîner d'État.
