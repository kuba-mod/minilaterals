title: Entretien avec Mark Carney, Premier ministre du Canada.
text: 'Le Président de la République a reçu Mark Carney, Premier ministre du Canada,
  le vendredi 12 juin 2026 au Palais de l’Elysée. Cette visite est intervenue à quelques
  jours du Sommet du G7 présidé par la France, qui se tiendra du 15 au 17 juin 2026
  à Evian. Elle était l’occasion de dresser un bilan des travaux menés lors du Sommet
  du G7 de Kananaskis organisé par le Canada et d’échanger sur les grands enjeux qui
  structurent l’agenda de cette édition, dans un contexte international marqué par
  de profondes mutations économiques et géopolitiques. Les deux dirigeants entendaient
  également consolider le partenariat franco-canadien et approfondir leur coopération
  dans les domaines du commerce, de la défense, de la transition énergétique, de l’intelligence
  artificielle, des technologies quantiques et des minéraux critiques. Monsieur le
  Premier ministre du Canada, cher Mark, Mesdames, Messieurs les ministres, Madame
  l''ambassadrice, Monsieur l''ambassadeur, Mesdames, Messieurs. Chers amis, bienvenus
  à Paris, bienvenus à nouveau à Paris, si je puis dire, Monsieur le Premier ministre,
  très cher Mark. Il y a un peu plus d''un an, vous choisissiez la France pour votre
  première visite à l''étranger, ce qui est un immense honneur que nous n''avons pas
  oublié. Plus récemment, nous nous sommes entretenus à Erevan, en marge du huitième
  sommet de la Communauté politique européenne, quelques mois plus tôt lors du Forum
  économique mondial ou encore en marge de la réunion de la Coalition des volontaires.
  Tout cela signe la grande convergence de vues, la proximité, le partenariat entre
  le Canada et la France. En effet, si je puis dire aujourd''hui, plus que jamais,
  nous avons une même lecture du monde. Nous constatons que l''ordre international
  est fragmenté, qu''il est marqué par le retour des rapports de force, par la contestation
  des règles communes, par la coercition économique, par les ingérences, les luttes
  informationnelles. Au fond, nous croyons dans l''État de droit, dans l''ordre international,
  dans la science, dans le changement climatique et ce qu''il implique, dans le respect
  de nos valeurs démocratiques et leur protection, et dans la protection aussi de
  notre enfance. Ce constat, nous l''avons dressé l''un et l''autre, et face à cela,
  nos deux pays partagent la même conviction : les démocraties doivent être lucides,
  fortes et capables d''agir ensemble. Nous devons renforcer notre autonomie de décision,
  notre sécurité économique, notre résilience industrielle, énergétique et technologique,
  en un mot, notre souveraineté. Ce qui n''est en aucun cas un choix de repli, mais
  une condition pour être des démocraties capables de protéger leurs citoyens et défendre
  leurs intérêts. Notre relation bilatérale s''inscrit dans une dynamique plus large,
  celle du rapprochement stratégique entre le Canada et le continent européen. À cet
  égard, je veux dire combien, il y a quelques semaines, le sommet que j''évoquais
  de la Communauté politique européenne a été un moment important, puisque le Canada
  a été le premier pays géographiquement non-européen à être invité comme observateur.
  Mais au fond, votre présence à Erevan disait combien le Canada est un pays politiquement
  et géo-stratégiquement profondément aligné avec l''Europe et réciproquement. C''était
  un signal politique fort, le symbole de ce qui nous unit, ses valeurs partagées,
  un attachement commun à un système international fondé sur des règles et des normes
  agréées. Nous allons évoquer aujourd''hui ensemble des sujets évidemment centraux
  comme les enjeux de sécurité et de défense. Vous avez pris depuis votre arrivée
  aux responsabilités des décisions importantes d''augmentation du budget canadien
  de la défense, la France a fait de même ces dernières années. Nos industries de
  défense ont des complémentarités réelles. L''enjeu est évidemment maintenant de
  passer de la convergence politique à des coopérations industrielles concrètes, durables,
  mutuellement bénéfiques. Mais je veux souligner combien votre présence dans les
  grandes coalitions, en particulier la Coalition des volontaires aux côtés de l''Ukraine,
  est un signe important aussi de cette cohérence, y compris opérationnelle et militaire.
  Nous voulons également travailler sur plusieurs secteurs stratégiques, essentiels
  pour notre souveraineté : l''intelligence artificielle, le quantique, le nucléaire
  civil, les minerais critiques et stratégiques, la transition énergétique et d''autres
  encore. La France et le Canada, l''Europe et le Canada ont des partenariats essentiels
  à bâtir et renforcer dans ces sujets. Ces thèmes, d''ailleurs, seront au cœur de
  notre G7. Nous parlerons aussi d''économie et de commerce. Le contexte est connu,
  les tensions commerciales sont mauvaises pour la croissance économique. Nous croyons
  tous deux à un libre-échange fondé sur les règles au profit de tous, sur le refus
  des logiques de coercition économique. A la veille du sommet d’Évian, nous avons
  pu lancer hier, ensemble, et je vous en remercie, avec nos autres collègues du G7,
  avec également la Chine, le FMI, les pays partenaires qui seront présents à Évian,
  une discussion importante sur la résorption des déséquilibres macroéconomiques mondiaux
  à l''occasion du sommet de convergence mondiale pour la croissance. Nous poursuivrons
  également ces échanges dans quelques jours. Nous aborderons également ensemble la
  question de la protection des mineurs en ligne, nous partageons là le même objectif :
  avant un certain âge, nos enfants ne doivent pas être exposés à des contenus dangereux
  et leur cerveau ne peut être capté par des algorithmes addictifs et opaques. Plus
  nous sommes nombreux à le dire, plus nous pouvons peser sur la régulation dans ce
  domaine. Là encore, au moment où 14 États membres de l''Union européenne, les Britanniques
  aussi nous ont rejoints dans cet effort, le fait que le Canada prenne une telle
  décision quelques mois après la mise en place par l''Australie, qui a été aux avant-postes
  de celle-ci, eh bien nous nous mettons dans une coalition très cohérente avec ce
  que je dis depuis tout à l''heure. Ce sont ces pays qui pensent la même chose sur
  les questions de sécurité et de défense, sur la protection des démocraties, sur
  la protection des mineurs, sur le commerce aussi. Nous évoquerons naturellement
  l''Ukraine et le Proche et Moyen-Orient. Le Canada et la France sont des puissances
  de paix, nous maintenons depuis maintenant 4 ans notre soutien à l''Ukraine, rejetant
  les menaces de la Russie, condamnant l''escalade irresponsable de Moscou. Je l''évoquais,
  votre présence et votre soutien constant au sein de la coalition des volontaires
  est un signe très fort à cet égard. Au Proche et Moyen-Orient, nous partageons le
  même attachement au respect du droit international, à la résolution des conflits
  par la diplomatie, et c''est cette voie qui permettra, je l''espère, d''aboutir
  très prochainement à l''accord entre les États-Unis d''Amérique et l''Iran. Nous
  nous tenons prêts, quant à nous, à contribuer à sa mise en œuvre en accompagnant
  la reprise sans condition du trafic dans le détroit d''Ormuz et en apportant notre
  expertise et notre soutien à un accord global. Celui-ci devra être robuste sur les
  volets nucléaires et balistiques ainsi que sur la stabilité régionale. À cet égard,
  là aussi, le Canada et la France, ensemble depuis le début, défendent la souveraineté,
  la sécurité, l''intégrité territoriale du Liban pour donner sa chance à la paix
  et accompagner les efforts des autorités libanaises pour assurer leur mission de
  souveraineté et lutter contre toute forme de terrorisme. Enfin, je veux ici rappeler
  qu''aucune stabilité durable pour la région n''est possible sans la stabilisation
  de Gaza et la mise en œuvre de la solution des deux États. Celle-ci, qu''il y a
  un an ensemble, nous avons défendue par un mouvement diplomatique commun avec plusieurs
  autres pays amis. Celle-ci est dans les faits plus menacée que jamais par des décisions
  irresponsables, et nous souhaitons ici réitérer notre soutien, évidemment, à la
  déclaration de New York d''il y a bientôt un an, notre attachement collectif aussi
  aux sociétés civiles palestiniennes et israéliennes, lesquelles sont d''ailleurs
  réunies en ce moment même à Paris. Monsieur le Premier ministre, cher Mark, le Canada
  et la France partagent aujourd''hui plus qu''une amitié ancienne, plus qu''une culture,
  une histoire, une langue commune, qui sont évidemment ô combien importantes et que
  nous chérissons ensemble. Nous partageons une même lecture stratégique du monde,
  des actions communes, une volonté de renforcer notre autonomie stratégique, une
  conviction que nos démocraties ont un rôle essentiel à jouer dans l''ordre international.
  Quelques jours avant le sommet du G7, cette convergence franco-canadienne est un
  moteur au service de cet agenda et au service de nos deux pays. Je vous remercie
  très sincèrement de votre présence à Paris aujourd''hui, de ce moment d''amitié
  et de travail, et de cette communauté de valeurs et de vues ainsi réaffirmée. Merci
  beaucoup. Monsieur le Premier ministre du Canada, cher Mark, Mesdames, Messieurs
  les ministres, Madame l''ambassadrice, Monsieur l''ambassadeur, Mesdames, Messieurs.
