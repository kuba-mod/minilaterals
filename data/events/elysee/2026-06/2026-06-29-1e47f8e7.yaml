title: Déclaration conjointe de la France et d’Oman à l’issue de la visite officielle
  de sa Majesté Haïtham ben Tariq, Sultan d’Oman, en France.
text: '1. Le 29 juin, sa Majesté Haïtham ben Tariq, Sultan d’Oman, a effectué une
  visite officielle en France à l’invitation de M. Emmanuel Macron, Président de la
  République française. Cette première visite en France de sa Majesté Haïtham ben Tariq
  témoigne de la relation de longue date et empreinte de confiance entre la République
  française et le Sultanat d’Oman, établie à la fin du XIXe siècle avec l’ouverture
  du consulat français à Mascate en 1894. 2. Les deux chefs d’État, au cours d’une
  session de discussion officielle, ont salué l’intensification des contacts bilatéraux
  à tous les niveaux au cours de l’année écoulée et ont souligné leur volonté commune
  de renforcer leur partenariat bilatéral global et tourné vers l’avenir dans de nombreux
  domaines. Ils se sont réjouis des conclusions positives tirées du premier dialogue
  stratégique, qui a eu lieu à Paris le 14 avril 2026, et des récentes visites ministérielles,
  notamment de la visite du ministre de l’Europe et des Affaires étrangères à Mascate
  le 1er mai dernier, qui a engendré des progrès tangibles dans les domaines de la
  politique, de l’économie, de la défense et de la culture. 3. Les deux chefs d’État
  ont ouvert le forum d’affaires franco-omanais, qui a réuni plus de 60 entreprises
  françaises et omanaises. Cet événement a contribué à renforcer les relations d’affaires
  entre les deux pays et a conduit à la signature de grands contrats économiques dans
  les domaines des énergies renouvelables, de l’eau et de l’aérospatial. 4. Les deux
  chefs d’État ont salué le dynamisme des relations économiques bilatérales et ont
  exprimé le souhait d’étendre encore ces relations en renforçant le commerce bilatéral
  et en facilitant les flux commerciaux entre la France et Oman. Ils ont réaffirmé
  leur volonté partagée de mettre en œuvre des projets d’intérêt mutuel, sur la base
  de la présence de longue date d’entreprises françaises à Oman. 5. Les deux chefs
  d’État ont souligné l’importance du développement des relations entre les deux pays,
  en mettant l’accent sur la nécessité d’accroître les investissements mutuels dans
  leurs secteurs productifs respectifs. Ils entendent atteindre ces objectifs grâce
  aux opportunités de partenariat offertes par le plan « France 2030 » et le programme
  « Oman Vision 2040 », notamment dans les domaines des énergies renouvelables, de
  l’hydrogène, des infrastructures maritimes, de la logistique, des technologies de
  l’information, des transports, du tourisme, de la culture et de l’industrie spatiale. Dans
  ce contexte, les deux chefs d’État se sont félicités de la signature du mémorandum
  d’accord sur la promotion des investissements et sont convenus de tirer parti de
  cet instrument clé pour concrétiser ces ambitions et faciliter les flux d’investissements
  concrets. 6. En outre, les deux chefs d’État ont réaffirmé leur volonté de renforcer
  leur coopération dans les secteurs stratégiques que sont l’aviation civile et l’espace.
  À cette fin, ils ont souligné l’importance de la signature d’un accord de coopération
  technique entre la Direction générale française de l’aviation civile et l’Autorité
  omanaise de l’aviation civile, d’une lettre d’intention et d’un mémorandum d’entente
  sur les transports, notamment sur la coopération en matière des transports urbains
  et de systèmes de métro. La France salue par ailleurs le partenariat établi entre
  Oman et Airbus pour la construction du premier satellite d’Oman, le partenariat
  entre CMA CGM et Asyad Group devant permettre à ce dernier d’étendre et d’intégrer
  ses réseaux logistiques autour des ports d’Oman et le partenariat signé récemment
  entre Oman et Suez pour la gestion de l’eau dans Mascate et ses environs, ainsi
  que la première étape majeure qu’ont atteinte Oman et EDF dans le développement
  des capacités de pompage-turbinage d’Oman. 7. Les deux chefs d’État se sont félicités
  de la coopération culturelle entre leurs deux pays et ont réaffirmé leur détermination
  à renforcer encore les liens culturels et universitaires franco-omanais. Ils ont
  salué à cet égard la signature de plusieurs accords visant à intensifier leur coopération
  dans les domaines culturel, scientifique et universitaire, notamment la mobilité
  des étudiants et des chercheurs, l’archéologie, la muséologie et la santé. 8. Coopération
  dans le domaine de l’éducation : ils ont convenu de déployer des efforts pour accroître
  l’inscription de l’ensemble des élèves qui remplissent les conditions d’admission
  au Lycée français international de Mascate, conformément aux procédures et aux règlements
  approuvés par le ministère de l’Éducation du Sultanat d’Oman. 9. Ils ont également
  souligné qu’il était important d’accroître la mobilité des étudiants vers la France
  dans le cadre de projets de coopération universitaire conjoints, notamment la mise
  en œuvre d’un mécanisme financé conjointement qui associe les établissements d’enseignement
  supérieur publics et privés des deux pays, la promotion de projets de recherche
  collaboratifs, le développement de programmes de doubles diplômes et le renforcement
  des programmes de bourse existants pour les étudiants omanais qui suivent des études
  de courte ou de longue durée en France, conformément aux priorités du programme
  « Oman Vision 2040 ». 10. Ils ont souligné qu’il était important de renforcer l’enseignement
  du français dans le Sultanat d’Oman grâce au développement dans les écoles publiques
  omanaises du programme pilote pour l’enseignement du français, à la formation professionnelle
  de professeurs de français omanais et à la promotion de la traduction littéraire
  et universitaire, qui constitue un moyen de promouvoir les échanges culturels et
  éducatifs. 11. Ils ont également salué le partenariat de longue date entre le ministère
  de l’Éducation du Sultanat d’Oman et le Centre franco-omanais de Mascate, qui promeut
  la coopération culturelle et éducative entre les deux pays. Ils ont pris acte de
  la contribution du Centre à l’enseignement du français dans les écoles omanaises,
  à l’offre de possibilités de formation linguistique et à l’organisation d’initiatives
  en faveur de la mobilité des étudiants, notamment le programme annuel d’école d’été
  en France pour les étudiants omanais. 12. Secteur des musées : ils ont convenu de
  renforcer l’échange de savoir-faire dans le secteur des musées et de poursuivre
  leurs efforts conjoints pour ouvrir le musée franco-omanais (Bait Faransa), qui
  illustre les relations historiques de longue date qui unissent les deux pays. 13.
  Secteur de l’archéologie : ils ont convenu de coopérer dans le domaine de la recherche
  scientifique et de favoriser des résultats positifs grâce à des publications universitaires
  à la fois en France et dans le Sultanat d’Oman. 14. Coopération scientifique : les
  deux chefs d’État ont souligné l’importance du renforcement de la coopération scientifique
  dans le domaine des sciences humaines grâce aux activités du bureau du Centre français
  de recherche de la péninsule Arabique du Sultanat d’Oman. 15. Les deux chefs d’État
  se sont entretenus au sujet de la coopération bilatérale dans le domaine de la défense
  et de la sécurité. Ils ont salué la qualité de la coopération militaire bilatérale,
  notamment l’intégration d’équipements français au sein des forces armées omanaises
  et la réalisation régulière d’exercices conjoints dans toutes les armées, ainsi
  que les visites des différents ports d’Oman par des navires de guerre français.
  16. Ils ont souligné leur volonté commune de renforcer leur collaboration dans les
  domaines stratégiques clés, notamment la sûreté maritime et la lutte contre les
  trafics illicites. 17. Conformément à la détermination continue de la France à préserver
  la sûreté maritime et la liberté de navigation dans la région, notamment grâce aux
  déploiements navals multinationaux, les deux chefs d’État se sont engagés à renforcer
  leur coopération en matière de renseignement et de surveillance maritimes ainsi
  que de préservation des routes commerciales. 18. Ils sont convenus d’achever les
  travaux lancés en 2022 pour un accord concernant l’échange et la protection réciproque
  d’informations classifiées et protégées dans le domaine de la défense. Ils sont
  également convenus de finaliser l’accord sur l’échange d’informations entre leurs
  services de renseignement militaires respectifs. 19. Les deux chefs d’État ont réaffirmé
  leur volonté de poursuivre la coordination de leurs efforts en faveur de la paix
  et de la sécurité internationales et de les intensifier. Ils ont souligné qu’il
  est important de soutenir la désescalade régionale, la prévention des conflits et
  la lutte contre le terrorisme sous toutes ses formes ainsi que contre la prolifération
  des armes de destruction massive, tout en assurant la sécurité des voies maritimes.
  20. Les deux chefs d’État ont réaffirmé leur ferme attachement aux principes et
  aux objectifs de la Charte des Nations Unies et au multilatéralisme. Ils ont également
  souligné leur attachement aux normes du droit international, du droit international
  humanitaire et du droit maritime international. Ils ont plus particulièrement réaffirmé
  leur attachement à la Convention des Nations Unies sur le droit de la mer, qui demeure
  le cadre juridique régissant les espaces maritimes, notamment le détroit d’Ormuz
  et la mer d’Oman. 21. Les deux chefs d’État ont réaffirmé leur engagement ferme
  en faveur du dialogue et de la diplomatie comme moyens de résoudre la crise régionale,
  se félicitant du rôle constructif des deux pays à cet égard, et ont souligné la
  nécessité de rétablir la stabilité et la sécurité régionales. Ils ont salué le protocole
  d’accord entre les États-Unis et l’Iran et ont fait part de leur soutien aux négociations
  en cours visant à parvenir à un accord diplomatique à long terme. 22. La France
  s’est réjouie de la médiation d’Oman sur la question nucléaire ainsi que de ses
  efforts pour résoudre la crise dans le détroit d’Ormuz. Oman a salué les efforts
  de la France pour favoriser une reprise rapide de la navigation dans le détroit
  d’Ormuz. 23. Les deux chefs d’État ont souligné l’importance de la réouverture du
  détroit d’Ormuz et ont réaffirmé leur attachement à une navigation libre, sans conditions
  ni restrictions, notamment le droit de passage en transit conformément au droit
  de la mer. Les deux chefs d’État sont convenus de collaborer avec toutes les parties
  prenantes afin d’œuvrer en faveur de la liberté de navigation à l’avenir et de conduire
  des opérations de déminage conjointes. 24. Les deux chefs d’État ont souligné la
  nécessité de mettre en œuvre la Déclaration de New York sur le règlement pacifique
  de la question de Palestine et la mise en œuvre de la solution des deux États, approuvée
  en 2025 par 142 pays, ainsi que le plan de paix pour Gaza et l’intégralité de la
  résolution 2803 du Conseil de sécurité des Nations Unies, notamment l’acheminement
  sans entrave de l’aide humanitaire dans la bande de Gaza et le maintien du cessez-le-feu,
  de bonne foi et dans les meilleurs délais. 25. Les deux chefs d’État ont réaffirmé
  leur soutien total au Conseil de direction présidentiel de la République du Yémen.
  Ils ont également souligné qu’il est particulièrement important de soutenir tous
  les efforts régionaux et des Nations Unies visant à aboutir à une solution inclusive
  et globale à la crise au Yémen. Ils reconnaissent l’importance stratégique de la
  stabilité régionale en mer Rouge pour l’économie mondiale ainsi que l’importance
  de la liberté de la navigation en tant qu’exigence internationale. 26. Les deux
  chefs d’État ont fait part de leur soutien aux efforts mis en œuvre pour atteindre
  une paix globale, juste et pérenne en Ukraine, dans le respect du droit international
  et des principes de la Charte des Nations Unies. Ils ont rappelé la nécessité de
  respecter la souveraineté, l’intégrité territoriale et l’indépendance politique
  des États. 27. La République française et le Sultanat d’Oman ont exprimé leur profonde
  conviction que leurs liens historiques ainsi que leur attachement commun au droit
  international et au dialogue constructif entre leurs autorités constituent les fondations
  solides d’un partenariat ambitieux, durable et renforcé. 28. Sa Majesté Haïtham ben Tariq
  a chaleureusement remercié le Président Emmanuel Macron et le peuple français de
  l’accueil aimable et de l’hospitalité généreuse qu’ils lui ont accordés ainsi qu’à
  la délégation qui l’accompagnait lors de leur visite en France. Sa Majesté a également
  invité le Président Macron à effectuer une visite à Oman.'
