title: Entretien de travail avec Masayoshi Son, Directeur général de SoftBank.
text: Le Président de la République a reçu Masayoshi Son, Directeur général de SoftBank
  au Palais de l’Elysée le lundi 1er juin 2026. À l’occasion de la 9e édition du Sommet
  Choose France , et quelques semaines après l’entretien entre le chef de l’État et
  le dirigeant de Softbank le 1er avril dernier à Tokyo, l’entreprise japonaise officialise
  un investissement record de 45 milliards d’euros et pouvant atteindre à terme 75
  milliards d’euros . Cet investissement vise à accélérer le développement des infrastructures
  d'intelligence artificielle en France, avec l'engagement de développer et d'exploiter
  au moins 3 GW et jusqu’à 5 GW de capacité de centres de données dédiés à l'IA à
  l'échelle nationale. Softbank va également s’associer à Schneider Electric pour
  développer une usine de production industrielle à grande échelle au port de Dunkerque,
  dédiée à la fabrication de modules d’alimentation pour centres de données. D’un
  montant inédit dans l’histoire des investissements d’une entreprise en France, ces
  annonces illustrent l’efficacité de la politique économique volontariste menée par
  le Président Emmanuel Macron depuis 2017. Cette stratégie a permis de consolider
  les atouts de la France en matière d’attractivité, en particulier dans le domaine
  de l’intelligence artificielle, grâce à une énergie largement décarbonée et à l’excellence
  de ses talents. Une dynamique amplifiée par l’organisation du Sommet pour l’action
  sur l’intelligence artificielle à Paris en février 2025. Après un entretien de travail,
  puis la signature d'un accord entre Masayoshi Son et Olivier Blum , CEO de Schneider
  Electric, le Directeur général de SoftBank et le chef de l'État se sont adressés
  à la presse. Merci, merci beaucoup. Je vais dire quelques mots en anglais avant
  de conclure en français. Vous l'avez parfaitement décrit, nous nous sommes effectivement
  rencontrés tout d'abord en début avril lors de ma visite d’Etat au Japon, et nous
  y avons eu nos premiers échanges. Nous voulions très clairement avancer avec vous.
  Vous avez toujours été direct et agressif au sens positif du terme. Effectivement,
  c'était un défi que je vous ai lancé ; je vous ai demandé si vous étiez rapide et
  si vous pouviez le faire pour le premier juin, et nous l'avons fait.  Je veux d’abord
  remercier personnellement, vos équipes et nos équipes qui ont travaillé très étroitement
  ensemble. Effectivement, entre Dunkerque, Bosquel et Bouchain, nous avons déjà identifié
  différents sites, et on a garanti trois gigawatts, et nous voulions augmenter jusqu'à
  cinq. Nous avons déjà d’autres sites en tête pour parvenir aux 75 milliards que
  vous avez débloqués. Donc pour nous, c'est un résultat exceptionnel, car vous êtes
  un partenaire extrêmement respecté. Nous transformons de l'énergie déjà existante
  en capacité, en intelligence artificielle pour le monde entier mais nous rattrapons
  ce faisant, le retard de l’Europe en matière de computing capacity. Alors ce matin,
  à l’Élysée, nous signons ce partenariat, vous l'avez signé avec Schneider, ce partenariat
  qui nous permettra ensemble d'ajouter une valeur ajoutée à ce projet avec ces activités
  à Dunkerque en matière de robotique, et la valeur ajoutée n'en sera que plus grande.
  Bien sûr, nous avons également parlé avec Masayoshi et nos équipes ce matin de la
  façon de créer d'autres datacenters en France. Nous avons identifié tous les sites
  potentiels et nous avons également regardé comment générer plus de valeur ensemble ;
  c'est-à-dire comment être plus présents en matière de robotique, et robotique IA,
  puisque vous êtes un grand acteur, Masayoshi, dans le domaine. Nous avons notre
  feuille de route. Nous voulons faire plus encore. J’aimerais donc vous remercier
  à titre personnel pour votre engagement ce matin. Je vais, si vous le voulez bien,
  passer au français, vous avez une interprétation. C'est donc une très grande fierté
  que cette annonce de ce matin, et elle vient dans le cadre de la neuvième édition
  de Choose France. Depuis neuf ans, nous avons ces rendez-vous à Versailles pour
  l'attractivité de notre pays. J'ai eu l'occasion de le dire la semaine dernière.
  C'est aussi ce qui a permis d'expliquer au monde, de mobiliser les investissements
  internationaux et de faire de la France, depuis sept ans maintenant, de manière
  ininterrompue, le pays le plus attractif d'Europe. Durant ces sept dernières années,
  la France est le pays en Europe qui a attiré le plus d'investissements étrangers.
  C'est le fruit d'un travail collectif, des réformes que nous avons pu conduire sur
  le plan fiscal, sur le plan du droit du travail, de la politique pro-innovation
  que nous avons menée, de la mobilisation aussi de toutes les équipes, et je veux
  remercier ici mon équipe, les ministres, Business France, la DGE à Bercy, mais aussi
  l'ensemble des collectivités territoriales, car c'est aussi une mobilisation de
  tous nos territoires. Sur les dernières éditions de Choose France, nous avons mobilisé
  87 milliards d'euros d'investissements étrangers, confirmés, délivrés, avec la création
  de plus de 50 000 emplois, et cela dans tous nos territoires, avec beaucoup de villes
  de moins de 30 000 habitants dans lesquelles ces investissements se sont déployés.
  J'étais, il y a quelques jours près de Châteaudun, pour l'un des sites de Vorwerk,
  ce qui est une parfaite illustration de l'intensité de ces investissements. Aujourd'hui,
  à Versailles, nous allons rejoindre ces lieux dans quelques instants, ce sont 71
  nouveaux investissements qui sont annoncés. Cette édition de Choose France, à elle
  seule, va permettre de cristalliser un montant record de 93 milliards d'euros d'investissements
  confirmés pour plus de 15 000 emplois. C'est évidemment de très loin une édition
  record, et c'est historique. Ce sont 93 milliards d'euros d'investissements dans
  les datacenters et dans l'IA, bien sûr, et l'annonce faite par Masayoshi et SoftBank
  représente près de la moitié de ce montant, avec les 45 milliards confirmés. Nous
  n'avons pas pris tous ceux qui sont à venir. Il y a en plus de ces 45, vous l'avez
  compris, le reste pourra arriver dans les années à venir à la somme de 75. Mais
  donc, au-delà des 45 milliards de SoftBank, il y a en effet d'autres projets d'intelligence
  artificielle, de datacenters , mais aussi des projets stratégiques pour notre indépendance
  dans les semi-conducteurs, dans les minerais critiques, dans l'électrification des
  tracteurs ou des camions, dans l'acier, dans la santé. Ces 93 milliards d'euros
  d'investissements étrangers dans notre pays sont la preuve concrète de l'attractivité
  de la France pour la septième année consécutive, première destination des investissements
  étrangers en Europe. Elle consacre ces années d'efforts que nous accompagnons aussi
  avec une accélération de notre agenda européen, une simplification de celui-ci,
  y compris dans les domaines d'innovation, et une accélération des grands projets
  français avec ce qu'on a appelé la méthode « Notre-Dame » et les investissements
  d'avenir pour 2030. L'annonce faite par SoftBank aujourd'hui est donc massive, elle
  est elle aussi historique. Ce sont 45 milliards d'euros d'investissement en France
  confirmés que nous avons bâtis en deux mois grâce à de l'énergie disponible et tout
  le travail qui a été fait avec la filière nucléaire française qui nous permet d'exporter
  depuis deux ans plus de 90 TWh. Grâce aussi à toute la mobilisation, la préparation
  des sites avec les collectivités territoriales, avec RTE, pour que ces sites soient
  tout de suite branchés dans les meilleurs délais. Les sites du Bosquel, de Dunkerque,
  du Bouchain sont ainsi prévus pour accueillir les investissements de SoftBank. Ils
  sont confirmés. Pour ces sites, et comme je le disais tout à l'heure en introduction
  en anglais, ces trois gigawatts, c'est du sûr et du ferme, comme pour le co-investissement
  avec Schneider sur Dunkerque. Ceci nous permet d'avoir ces 45 milliards d'euros
  d'investissement, et ceci va nous permettre de déployer donc les travaux dans les
  tout prochains mois, puisque nous avons un objectif de finaliser tout cela entre
  fin 2029, mi-2030, pour ces sites, et donc pour qu'il y ait une production qui,
  d'ici la fin de l'année 2030, puisse être pleinement effective. C'est donc une montée
  en valeur ajoutée pour le pays. Au-delà de ces 45 milliards d'euros, d'autres sites
  ont été identifiés pour permettre les 75 milliards d'euros d'investissement de SoftBank
  qui sont souhaités en France sur des datacenters. Nous avons identifié aussi de
  nouveaux projets pour produire des robots dans notre pays et continuer l'innovation.
  Mais là-dessus, fidèle à la méthode que nous avons eue durant ces derniers mois,
  je n'en dirai pas davantage. Nous avons conçu les choses avec beaucoup d'ambition,
  avec la volonté d'aller vite, mais on annonce quand c'est sûr, et c'est ce qu'on
  a fait aujourd'hui. En tout cas, c'est une journée très importante pour la France,
  pour ce partenariat avec SoftBank, puisque à la fois les datacenters et le partenariat
  avec Schneider vont nous permettre vraiment d'avancer beaucoup plus fort, de faire
  de la France votre premier pays d'investissement, de faire de la France, de très
  loin, le premier pays accueillant des centres de données, des datacenters et des
  capacités de calcul en Europe, et de faire de la France aussi le point avancé de
  la production de robots IA, d'industrialisation par l'IA avec ce partenariat avec
  Schneider. Je vous remercie pour votre attention, Mesdames et Messieurs. Je voudrais
  terminer par un mot personnel à Masayoshi. Merci beaucoup pour votre engagement,
  votre ambition et d’avoir permis tout cela en quelques semaines. Merci. Merci beaucoup,
  pour nous, en termes de confiance, de capacité, de rapidité. Vous pouvez compter
  sur nous pour de grandes réalisations. Merci beaucoup. Merci Mesdames et Messieurs.
