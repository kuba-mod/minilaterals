  la montagne, avec un sens de l'innovation, une volonté aussi, tout à la fois de
  créer des emplois, mais de protéger l'activité soutenable, de protéger les paysages,
  et donc merci infiniment pour cela. Je veux remercier aussi Jean-Louis Cazaubon,
  président du syndicat mixte de valorisation touristique du Pic du Midi et l'ensemble
  de ses équipes. C'est un projet qui vient de loin, je le sais, et il est ô combien
  important. Et puis madame Odile Rosi, la présidente de l'université de Toulouse,
  qui a joué un rôle très important à l'ensemble des équipes à ses côtés. Et également
  monsieur Nicolas Bourgeois et monsieur Rémi Cabanac et tous les élus aussi, que
  je n'ai pas cités là, mais les maires qui accompagnent ce projet et qui ont poussé
  ce projet aux côtés des services de l'Etat et de votre rôle, monsieur le préfet,
  d'avoir ici tant de vallées réconciliées, unanimes derrière ce projet, c'est un
  formidable moment. Voilà, je ne veux pas être plus long, mais je voulais vous dire
  combien c'est pour moi important et c'était important de célébrer au fond ce moment,
  à vos côtés, parce qu'il dit beaucoup de ce qu'est votre vie au quotidien et pour
  nos universités, pour nos centres de recherche, pour nos écoles, pour les élus,
  pour les acteurs de la vie économique, ils rassemblent. Ce paysage, moi aussi, quand
  j'ai la chance de revenir dans nos Pyrénées, c'est un point de référence, c'est
  celui qu'on cherche du regard pour savoir comment le temps a évolué et qui rappelle
  des souvenirs. En concluant mon propos, je n'oublie pas que derrière, il y a aussi
  des générations qui, à dos d'hommes et d'ânes, ont permis au pic d'exister et qui
  ont frayé les premiers chemins dans la montagne. Il ne faut jamais oublier leur
  force, c'est eux qui ont permis à ce paysage ainsi de se dessiner et qui ont permis
  ensuite aux scientifiques de faire leur travail, puis maintenant de le développer
  encore davantage. Mais sans ces pionniers, nous ne serions pas là. En recevant ce
  dossier, je pense à eux et au courage qu'ils ont eu et à ce qu'il faut toujours
  célébrer. Voilà. Je vais m'arrêter là, mesdames et messieurs, chers amis. Je veux
  simplement dire que vous allez ensuite avoir nos élèves que j'ai déjà cités, qui
  vont pouvoir profiter de beaucoup de produits du terroir qui nous ont préparé des
  tas de choses. Je veux remercier Jérôme Bernat, que je vois là, et la coopérative
  de Plaimont, parce qu'il a fourni quand même du vin beaucoup de la région, en particulier
  du Saint-Mont. Je veux remercier Dominique Bouchet, meilleur ouvrier de France,
  parce qu'il a fourni le fromage. Il est là et il a bien travaillé, comme toujours.
  Donc on a le Gers, on a le Comminges, voilà. Et puis, évidemment, Éric Abadie, accompagné
  de Françoise et de Sacha de l'étape du Berger, qui ont fourni aussi beaucoup de
  plats et qui ont déployé leur savoir-faire. Je dois dire que l'étape du Berger fut
  un lieu de complot utile pour que ce projet puisse advenir. Et donc je remercie
  le Berger et mon ami pour avoir rendu ce moment possible, en plus de nous en faire
  profiter dans un instant. Voilà, mes chers amis, je ne veux pas être plus long.
  C'est un moment de grande fierté, de grande émotion et puis de retrouvailles. Donc
  célébrons-la tous ensemble. Vive le pic du Midi, vive la République et vive la France.
