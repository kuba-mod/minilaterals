date: '2026-06-09'
type: press_release
source_name: elysee
title: Remise du dossier de candidature du Pic du Midi au patrimoine mondial de l’Unesco
  au Président de la République.
text: Le Président de la République a reçu au palais de l’Élysée les élus, scientifiques
  et représentants du monde académique mobilisés en faveur de la candidature du Pic
  du Midi et de son observatoire à une inscription au Patrimoine mondial de l’Unesco.
  Le 17 juillet 2025, le chef de l’État s'était rendu au pic du Midi afin de soutenir
  cette candidature. Cette réception est l’occasion de mettre à l’honneur un site
  scientifique et patrimonial d’exception , qui contribue depuis plus de 150 ans à
  l’avancée des connaissances dans l’astronomie, la physique des particules, l’étude
  de l’atmosphère et l’observation du changement climatique. Inscrit depuis 2022 sur
  la Liste indicative de la France , le Pic du Midi incarne l’excellence scientifique
  française et un lien unique entre recherche, patrimoine et territoire. À travers
  cette réception, le Président de la République a salué l’engagement des acteurs
  mobilisés autour de cette candidature et rappellera l’importance de préserver les
  lieux qui participent au rayonnement scientifique et culturel de notre pays . Mesdames,
  messieurs les ministres, merci beaucoup d'être à nos côtés aujourd'hui. Je ne sais
  pas si le Premier ministre Jean Castex... Il est là. Merci, Jean, d'être aussi avec
  nous. Mesdames, messieurs les parlementaires, Monsieur le préfet de région, Monsieur
  le préfet des Hautes-Pyrénées, messieurs les préfets, Madame la présidente de la
  région Occitanie, Monsieur le président du Conseil départemental des Hautes-Pyrénées,
  Mesdames, messieurs les maires, Mesdames, messieurs les directrices et directeurs,
  Madame la présidente, Mesdames, messieurs, en vos grades et qualités, chers amis.
  C'est la vie d'une nation. Et au moment où nous nous retrouvons aujourd'hui pour
  parler de notre pic du Midi, chéri, et je vais y revenir, nul ici n'ignore, je dirais
  qu'à quelques kilomètres du pic, un drame aussi est advenu qui bouleverse le pays
  tout entier. Donc, évidemment, je ne peux pas commencer cette cérémonie sans avoir
  une pensée pour une de nos familles et pour tant de familles qui sont touchées par
  les drames, les horreurs, dire toute la détermination du gouvernement, des pouvoirs
  publics, mais aussi dire toute l'affection que nous avons à l'égard de la famille
  de la petite Lyhanna, voilà. Maintenant, je disais, c'est la vie d'une nation d'avoir
  ces drames qui se tressent avec des moments qui animent nos territoires et qui sont
  plus heureux, plus festifs, comme celui qui nous réunit et qui était programmé aujourd'hui
  pour l'Elysée, et c'est pour moi une grande fierté de vous avoir toutes et tous
  ici dans cette maison qui est la vôtre, et d'avoir un peu le sentiment, pour reprendre
  le Boulevard des airs, que je rentre aussi un peu à la maison en vous recevant ici.
  Donc, ça me fait du bien aussi de voir vos visages, d'entendre parler de nos paysages.
  Au fond, le Pic du Midi et son observatoire, c'est en effet une partie de notre
  histoire de France. C'est une histoire de climat, de saison, de pastoralisme, de
  travail. C'est une histoire de science, avec la pose de la première pierre de l'Observatoire
  il y a plus de 150 ans. C'est une histoire d'industrie, de passion sportive, avec
  notre Tourmalet, notre Tour de France. C'est une histoire de femmes et d'hommes
  dans nos vallées, qui sont des vies faites de passion, d'engagement, et je le dis
  devant tous les élus qui sont là, engagés au quotidien, et puis aussi tous ceux
  qui font vivre l'économie, l'activité de ces vallées. Et puis c'est une histoire
  plus intime et personnelle pour chacun d'entre nous, et je la partage avec vous.
  Alors, ce pic aujourd'hui, c'est de la mobilisation de la nation tout entière. Je
  disais, je remercie vraiment les ministres qui sont là ce soir à vos côtés, l’éducation
  nationale, l'enseignement supérieur, la recherche, la culture. Le ministre aura
  ce rôle aussi de porter jusqu'à l'UNESCO à travers vous, et je remercie le préfet
  d'avoir porté le dossier et le préfet de région de l'avoir accompagné. C'est quand
  même une grande chose, ce que nous allons viser. L'inscription, donc, au patrimoine
  mondial, la protection, qui est en même temps une reconnaissance de ce qui nous
  est familier pour beaucoup d'entre vous ici et de ce en quoi nous croyons. C'est
  une histoire née grâce à l'engagement de l'université de Toulouse, du syndicat mixte
  de valorisation touristique du Pic du Midi et de tous nos élus du territoire. Ça,
  je veux vraiment vous en remercier. Alors, plusieurs étapes ont été franchies pour
  arriver jusqu'à ce dossier. A présent, cette candidature est soumise à l'examen
  des experts indépendants avec examen final à la session du mois de juin-juillet
  2027. Donc, moi, je ferai tout ce que je peux pour vous accompagner jusqu'au bout
  de là où je suis, mais tous les observateurs vigilants auront vu que l'arrivée finale,
  je ne serai plus là, moi. Mais je serai avec vous pour aller chercher la médaille,
  si je puis dire. Comptez sur moi. Toujours mobilisé. Donc, c'est la reconnaissance
  de la valeur universelle de ce site et de toute son histoire, de cet ensemble à
  la fois naturel, humain, de recherche. C'est ce à quoi nous sommes particulièrement
  attachés. Le Pic est, en effet, à la fois un joyau naturel, pleinement reconnu,
  étudié, peint, admiré, et en même temps, un vrai trésor scientifique pour nous.
  Ce n'est pas un hasard, je le disais, si l'université a été à l'initiative. Le directeur
  général du CNRS nous fait l'honneur d'être avec nous. Mais les équipes scientifiques
  qui sont sous l'autorité du ministre, y tiennent ô combien. Donc, c'est un lieu
  où se sont déroulées des conquêtes scientifiques. C'est un lieu qui a été un lieu
  de conquêtes humaines et c'est un lieu d'attachement pour tous les élus du territoire
  que vous êtes. Donc, il mérite à cet égard cette place singulière et cette reconnaissance
  par l'UNESCO, nous le croyons très profondément, parce qu'il marie à la fois le
  patrimoine naturel, le patrimoine humain et le patrimoine scientifique. C'est ce
  qui est la force de ce dossier. Alors, maintenant, je voudrais passer à des remerciements
  qui sont, en étant des remerciements, des mobilisations collectives, parce que c'est
  une étape, mais on va avoir un an de travail devant nous pour aller réussir à accrocher
  le soutien. Alors, je veux d'abord remercier évidemment le groupe Boulevard des
  Airs, qui a accepté de se produire aujourd'hui à l'Elysée, qui a beaucoup porté
  ce dossier, qui porte aussi ce qu'il y a derrière, à la fois sa mythologie et son
  caractère éducatif. Merci de l'accompagnement qui a été fait. Et je vous remercie
  d'avoir accepté de venir ici chanter avec deux classes, l'une de l'école de Juillan
  et l'autre de l'école Joliot-Curie de Montfermeil, qui étaient les élèves qui étaient
  avec vous. Donc merci infiniment pour cela. Je veux remercier aussi les classes
  du lycée Victor Duruy de Bagnères-de-Bigorre pour les métiers des activités équipements
  touristiques de sécurité. Les élèves du lycée professionnel Reffye de Tarbes pour
  les métiers d'art et du textile, qui font le lien justement entre la tradition et
  les savoir-faire locaux et la vocation scientifique du site. Les élèves des lycées
  des établissements de l’Arrouza et du lycée Lautréamont. C'est très important parce
  que le territoire est embarqué dans ce projet et la mobilisation de nos élèves,
  et on en retrouvera plusieurs tout à l'heure, est très importante. Ce qui me permet
  avec eux de remercier leurs enseignants, les directrices et directeurs d'établissements
  et, évidemment, toutes les équipes du rectorat. C'est une mobilisation collective.
  Alors, je le disais, maintenant, il va falloir transformer tout cela pour le mettre
  au standard de l'UNESCO, à les convaincre à la fois de protéger ce site exceptionnel,
  mais maintenir la dynamique qui est la nôtre. Il y a un 1er élément clé, c'est la
  dynamique d'attractivité pour un tel projet. Un classement UNESCO sur le territoire,
  c'est très clairement une augmentation des visiteurs. On l'a vu dans tous les sites
  qui ont été ainsi reconnus. Les sites français classés voient souvent leur fréquentation
  tripler, voire quadrupler dans les 5 ans. Je le dis pour tous les maires des vallées
  adjacentes, c'est aussi une vraie opportunité. Je sais que nos parlementaires, ils
  seront vigilants. Pour le pic du Midi, ça pourrait signifier une hausse de 160 000
  à 400 000 visiteurs par an. C'est donc l'ensemble du territoire à proximité immédiate
  du pic qui jouira d'une augmentation de la fréquentation touristique, mais aussi,
  plus largement, le département des Hautes-Pyrénées. Même les vallées qui ne sont
  pas très loin du pic. Cher Michel, est-ce que nous avons toujours des... Evidemment,
  des conflits entre... Pas des conflits. D'ailleurs, je viendrai en juillet, à Loudenvielle.
  Je le dis pour tout de suite apaiser les discussions. Mais c'est vrai, l'engagement
  sera tenu. Mais donc ça irradiera même jusque-là. Ce rayonnement implique, et je
  le dis ici pour continuer à avancer sur une dynamique collective, évidemment, de
  continuer à renforcer et consolider l'aéroport Tarbes-Lourdes-Pyrénées et la desserte
  aérienne de grande qualité qu'il propose. Ça, je sais combien tous les élus du territoire
  y sont attachés, et tous ceux qui utilisent cet aéroport. Ces dernières années,
  on a fait ce qu'il fallait. Donc c'est de lui donner de la visibilité, parce qu'il
  y aura beaucoup plus de touristes, comme je l’ai évoqué, c'est important pour le
  territoire. Et puis, évidemment, de consolider le projet de nouvel hôpital de Tarbes-Lourdes,
  pour lequel nous sommes tous déterminés à avoir à ouvrir les portes en 2031. Ça
  aussi, ça fait partie de la mobilisation. On a également toute la mobilisation touristique,
  c'est pour ça qu'il faut continuer tout le travail hôtelier, ce qu'on a fait avec
  Lourdes dès la sortie du Covid, ce qu'on veut continuer à faire avec toutes les
  communes du département et même au-delà, continuer à améliorer l'offre et continuer
  de former les plus jeunes qui auront vocation à y travailler. C'est des emplois
  non délocalisables, on en a besoin. Cette attractivité du territoire est absolument
  clé. Alors, je veux maintenant adresser, pour conclure, mes remerciements à vraiment
  des personnes qui ont été clés dans cette aventure. Evidemment, madame la présidente
  de la région, chère Carole Delga, et monsieur le président du département, cher
  Michel Pélieu. Le fait que vous soyez là aujourd'hui à nos côtés, que vous portiez
  le projet avec détermination, dans une adhésion unanime du territoire, c'est très
  important et je veux vraiment vous remercier. Je sais aussi combien le département
  et la région font beaucoup, à la fois pour le pic, pour les vallées et puis pour
  la montagne, avec un sens de l'innovation, une volonté aussi, tout à la fois de
  créer des emplois, mais de protéger l'activité soutenable, de protéger les paysages,
  et donc merci infiniment pour cela. Je veux remercier aussi Jean-Louis Cazaubon,
  président du syndicat mixte de valorisation touristique du Pic du Midi et l'ensemble
  de ses équipes. C'est un projet qui vient de loin, je le sais, et il est ô combien
  important. Et puis madame Odile Rosi, la présidente de l'université de Toulouse,
  qui a joué un rôle très important à l'ensemble des équipes à ses côtés. Et également
  monsieur Nicolas Bourgeois et monsieur Rémi Cabanac et tous les élus aussi, que
  je n'ai pas cités là, mais les maires qui accompagnent ce projet et qui ont poussé
  ce projet aux côtés des services de l'Etat et de votre rôle, monsieur le préfet,
  d'avoir ici tant de vallées réconciliées, unanimes derrière ce projet, c'est un
  formidable moment. Voilà, je ne veux pas être plus long, mais je voulais vous dire
  combien c'est pour moi important et c'était important de célébrer au fond ce moment,
  à vos côtés, parce qu'il dit beaucoup de ce qu'est votre vie au quotidien et pour
  nos universités, pour nos centres de recherche, pour nos écoles, pour les élus,
  pour les acteurs de la vie économique, ils rassemblent. Ce paysage, moi aussi, quand
  j'ai la chance de revenir dans nos Pyrénées, c'est un point de référence, c'est
  celui qu'on cherche du regard pour savoir comment le temps a évolué et qui rappelle
  des souvenirs. En concluant mon propos, je n'oublie pas que derrière, il y a aussi
  des générations qui, à dos d'hommes et d'ânes, ont permis au pic d'exister et qui
  ont frayé les premiers chemins dans la montagne. Il ne faut jamais oublier leur
  force, c'est eux qui ont permis à ce paysage ainsi de se dessiner et qui ont permis
  ensuite aux scientifiques de faire leur travail, puis maintenant de le développer
  encore davantage. Mais sans ces pionniers, nous ne serions pas là. En recevant ce
  dossier, je pense à eux et au courage qu'ils ont eu et à ce qu'il faut toujours
  célébrer. Voilà. Je vais m'arrêter là, mesdames et messieurs, chers amis. Je veux
  simplement dire que vous allez ensuite avoir nos élèves que j'ai déjà cités, qui
  vont pouvoir profiter de beaucoup de produits du terroir qui nous ont préparé des
  tas de choses. Je veux remercier Jérôme Bernat, que je vois là, et la coopérative
  de Plaimont, parce qu'il a fourni quand même du vin beaucoup de la région, en particulier
  du Saint-Mont. Je veux remercier Dominique Bouchet, meilleur ouvrier de France,
  parce qu'il a fourni le fromage. Il est là et il a bien travaillé, comme toujours.
  Donc on a le Gers, on a le Comminges, voilà. Et puis, évidemment, Éric Abadie, accompagné
  de Françoise et de Sacha de l'étape du Berger, qui ont fourni aussi beaucoup de
  plats et qui ont déployé leur savoir-faire. Je dois dire que l'étape du Berger fut
  un lieu de complot utile pour que ce projet puisse advenir. Et donc je remercie
  le Berger et mon ami pour avoir rendu ce moment possible, en plus de nous en faire
  profiter dans un instant. Voilà, mes chers amis, je ne veux pas être plus long.
  C'est un moment de grande fierté, de grande émotion et puis de retrouvailles. Donc
  célébrons-la tous ensemble. Vive le pic du Midi, vive la République et vive la France.
  Mesdames, messieurs les ministres, merci beaucoup d'être à nos côtés aujourd'hui.
  Je ne sais pas si le Premier ministre Jean Castex... Il est là. Merci, Jean, d'être
  aussi avec nous. Mesdames, messieurs les parlementaires, Monsieur le préfet de région,
  Monsieur le préfet des Hautes-Pyrénées, messieurs les préfets, Madame la présidente
  de la région Occitanie, Monsieur le président du Conseil départemental des Hautes-Pyrénées,
  Mesdames, messieurs les maires, Mesdames, messieurs les directrices et directeurs,
