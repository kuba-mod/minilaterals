title: 'Journey to Montenegro: Day One.'
text: 'The President of the Republic visited Montenegro on Thursday, June 4, and Friday,
  June 5, as part of a bilateral visit followed by the EU-Western Balkans Summit.
  As Montenegro celebrates 20 years of independence , this visit provided an opportunity
  to strengthen our bilateral relationship in several strategic sectors: This was
  the first visit by a French President to Montenegro since the country’s independence.
  After being welcomed by the President of Montenegro, Jakov Milatović , the two heads
  of state held a one-on-one meeting before addressing the press. President Emmanuel
  Macron notably expressed France’s support for the reforms undertaken by Montenegro
  as part of its process of accession to the European Union. After lunch at the Vladin
  Dom Museum and a tour of the Cetinje Monastery, President Emmanuel Macron went to
  the Ministry of Culture for a signing ceremony. He then spoke alongside Prime Minister
  Milojko Spajić . At the end of the day, a dinner was held to celebrate the 20th
  anniversary of Montenegro''s independence.'
