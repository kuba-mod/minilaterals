title: Entretien avec Péter Magyar, Premier ministre de Hongrie.
text: Le Président de la République a reçu ce mercredi le Premier ministre de Hongrie,
  Péter Magyar, au Palais de l’Elysée. Ils ont échangé sur les principaux dossiers
  européens , notamment le soutien à l’Ukraine et la poursuite des sanctions contre
  la Russie, la sécurité et la défense européenne, le renforcement de la compétitivité
  européenne ainsi que la préparation du prochain cadre financier pluriannuel. Cette
  visite a aussi permi d’approfondir la relation bilatérale entre la France et la
  Hongrie , à travers le développement de coopérations dans plusieurs domaines stratégiques,
  tels que le nucléaire, la défense et les infrastructures.
