title: Official visit by His Majesty Haitham bin Tarik, Sultan of Oman.
text: The President of the Republic welcomed His Majesty Haitham bin Tarik, Sultan
  of Oman, during an official visit on Monday, June 29, 2026. This first visit by
  His Majesty to France underscores the strengthened relationship between France and
  the Sultanate of Oman in many areas, including the economic, scientific, cultural,
  and industrial sectors. The visit also provided an opportunity for the two heads
  of state to discuss the international and regional situation. The discussions reaffirmed
  the importance of supporting regional de-escalation and addressed the issue of securing
  maritime routes , which requires free and unconditional passage through the Strait
  of Hormuz. After signing agreements and attending a working lunch , the two leaders
  attended a France-Oman business forum.
