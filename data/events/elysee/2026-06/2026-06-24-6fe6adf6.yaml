title: Compte rendu du conseil des ministres du 24 juin 2026.
text: 'Retrouvez le compte rendu du conseil des ministres du mercredi 24 juin 2026.
  Le ministre de l’économie, des finances et de la souveraineté industrielle, énergétique
  et numérique a présenté un projet de loi portant ratification de l’ordonnance n°2026-255
  du 8 avril 2026 relative à la transposition de la directive (UE) 2024/1619 du Parlement
  européen et du Conseil du 31 mai 2024 modifiant la directive 2013/36/UE en ce qui
  concerne les pouvoirs de surveillance, les sanctions, les succursales de pays tiers
  et les risques environnementaux, sociaux et de gouvernance. Cette directive est
  issue du paquet bancaire européen adopté en mai 2024 et constitue une avancée supplémentaire
  dans le renforcement de la stabilité financière. Elle complète les exigences prudentielles
  des précédentes directives « CRD 4 » et « CRD 5 » adoptées en 2014 et en 2019 dans
  le cadre des accords internationaux dits « Bâle III ». Entrée partiellement en vigueur
  le 10 avril dernier, l’ordonnance de transposition de la directive « CRD6 » renforce
  l’indépendance et les pouvoirs de sanction et de contrôle des superviseurs, notamment
  en matière de contrôle des nominations au sein des banques et de leurs opérations
  financières. Elle intègre les risques environnementaux, sociaux et de gouvernance
  dans le cadre de supervision bancaire, en particulier par la rédaction par les banques
  de plans dits « de transition ». Enfin, elle précise les conditions dans desquelles
  les banques des pays tiers à l’Union européenne et leurs succursales peuvent fournir
  des services en France. Le ministre de l’Europe et des affaires étrangères a présenté
  un projet de loi autorisant la ratification de l’accord de passation conjointe de
  marché en vue de l’acquisition d’une plateforme centrale commune pour le mécanisme
  d’ajustement carbone aux frontières. Signé à Bruxelles le 15 décembre 2025, cet
  accord vise à désigner par adjudication une plateforme commune de vente des certificats,
  en application de l’article 20, paragraphe 2, du règlement (UE) 2023/956 du Parlement
  européen et du Conseil du 10 mai 2023 établissant un mécanisme d’ajustement carbone
  aux frontières. Il détermine les règles de procédure et les modalités pratiques
  de coopération entre les États membres et la Commission européenne pour la conduite
  de la procédure de passation commune de marché, puis la gestion du marché lui-même.
  Le ministre de la ville et du logement a présenté un projet de loi visant la relance
  et la décentralisation du logement. Depuis plusieurs années, la France traverse
  une crise profonde du logement. Effondrement de la construction, difficultés croissantes
  d''accès à la propriété comme à la location, raréfaction de l''offre, hausse des
  coûts de production : le logement est devenu l''une des premières préoccupations
  des Français. En dix ans, nos concitoyens ont perdu l''équivalent de 25 mètres carrés
  de pouvoir d''achat immobilier. Derrière ce chiffre, ce sont des étudiants qui ne
  trouvent plus à se loger, des jeunes actifs qui renoncent à un emploi, des familles
  qui reportent un projet de vie. Le logement est aujourd''hui une véritable bombe
  sociale. Face à cette urgence, le Gouvernement a engagé dès janvier 2026 un Plan
  Relance Logement avec l''objectif de reconstruire une politique de l''offre et permettre
  la production de deux millions de logements d''ici 2030. Après une première étape
  franchie avec la création du statut du dispositif Jeanbrun dans la loi de finances
  pour 2026, ce projet de loi constitue la deuxième pierre de cette stratégie de relance.
  Fruit de plusieurs mois de concertation avec l''ensemble de l''Équipe de France
  du Logement, les élus locaux, les professionnels du secteur et les partenaires institutionnels,
  le texte a reçu un avis favorable du Conseil national de l''habitat (CNH), du Conseil
  national de la ville (CNV) ainsi que du Conseil national d''évaluation des normes
  (CNEN). Le projet de loi repose sur une conviction simple : face à la crise du logement,
  il faut produire davantage, rénover davantage et faire davantage confiance aux territoires.
  Avec ce projet de loi, le Gouvernement fait le choix du choc d''offre, de la décentralisation
  et du pragmatisme écologique. En relançant la construction, en accélérant la rénovation,
  en renforçant les pouvoirs des maires et en engageant un troisième programme national
  de renouvellement urbain, il apporte une réponse concrète à une crise qui touche
  aujourd''hui tous les territoires et toutes les générations. Le texte sera désormais
  inscrit au bureau de l''Assemblée nationale dès aujourd''hui et soumis au Parlement
  à la rentrée afin que le débat démocratique puisse s''engager dans les prochaines
  semaines. Le Gouvernement appelle l''ensemble des forces politiques à se saisir
  de ce sujet qui dépasse les clivages partisans et conditionne à la fois le pouvoir
  d''achat, l''emploi, la cohésion territoriale et la capacité de chacun à construire
  son avenir. Le conseil des ministres a adopté les mesures individuelles suivantes
  : Sur proposition du ministre de l’intérieur : - Mme Emmanuelle DUBEE , administratrice
  de l’Etat, est nommée préfète de la région Bretagne, préfète de la zone de défense
  et de sécurité Ouest, préfète d''Illeet-Vilaine. - M. Laurent HOTTIAUX , administrateur
  de l’Etat, est nommé préfet de la région Pays dela-Loire, préfet de la Loire-Atlantique.
  Sur proposition de la ministre des armées et des anciens combattants : - M. le 
  contrôleur  général  des  armées Damien d’OZOUVILLE est nommé chef du groupe de
  contrôle de l’armement, du maintien en condition opérationnelle et des exportations
  du contrôle général des armées à compter du 1er juillet 2026 ; - M. le général de
  division Emmanuel CHARPY est nommé officier général de zone de défense et de sécurité
  Ouest et commandant de zone terre NordOuest à compter du 1er août 2026, et est élevé
  aux rang et appellation de général de corps d’armée ; - M. le général de division
  aérienne du corps des officiers de l’air Bertrand JARDIN est nommé souschef d''état-major
  « appui-environnement » de l''état-major des armées à compter du 1er août 2026,
  et est élevé aux rang et appellation de général de corps aérien ; - M. le général
  brigade aérienne du corps des officiers des bases de l’air Patrice JÉZÉQUEL est
  nommé inspecteur des armements nucléaires à compter du 1er août 2026 ; - M. le médecin
  général inspecteur, médecin chef des services hors classe Guillaume PELÉE de SAINT
  MAURICE , est nommé inspecteur général du service de santé des armées et prend les
  rang et appellation de médecin général des armées à compter du 1er août 2026 ; -
  M. le général de corps d’armée Jacques LANGLADE de MONTGROS est nommé chef d''étatmajor
  de l’armée de terre à compter du 26 juillet 2026 et est élevé aux rang et appellation
  de général d’armée ; - M. le viceamiral d’escadre Christophe CLUZEL est nommé chef
  d''étatmajor de la marine et est élevé aux rang et appellation d’amiral à compter
  du 15 juillet 2026. Sur proposition du ministre de l’Europe et des affaires étrangères
  : - Mme Anne-Marie MASKAY , administratrice de l’Etat, est nommée ambassadrice,
  représentante permanente de la France auprès de l''Organisation maritime internationale
  à Londres. Sur proposition de la ministre de la santé, des familles, de l’autonomie
  et des personnes handicapées : - M. Frédéric VARNIER , directeur d''hôpital, est
  nommé directeur général de l''agence régionale de santé de Bretagne ; - M. Yann-Gaël
  AMGHAR , inspecteur général des affaires sociales est nommé directeur général de
  l’agence régionale de santé des Hautsde-France ; - Mme Anne-Briac BILI est nommée
  directrice générale de l’agence régionale de santé CentreVal de Loire, à compter
  du 13 juillet 2026. Sur proposition de la ministre de l’aménagement du territoire
  et de la décentralisation et du ministre de la ville et du logement : - M. Xavier
  BARROIS, administrateur de l’Etat, est nommé directeur général des collectivités
  locales par intérim. Le ministre de l’économie, des finances et de la souveraineté
  industrielle, énergétique et numérique a présenté un projet de loi portant ratification
  de l’ordonnance n°2026-255 du 8 avril 2026 relative à la transposition de la directive
