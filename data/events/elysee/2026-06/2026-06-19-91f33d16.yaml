title: 10 ans de VivaTech !
text: Le Président de la République a reçu plusieurs centaines d’acteurs de la tech
  française, européenne et internationale à l’occasion d’une réception célébrant les
  dix ans de VivaTech, le vendredi 19 juin 2026 au Palais de l’Élysée. Cette réception
  était l’occasion de saluer le développement de l’écosystème technologique français
  , dont le dynamisme a contribué à faire de la France le premier hub technologique
  de l’Union européenne. Dix ans après sa création, VivaTech est devenu l’un des principaux
  rendez-vous mondiaux de l’innovation , réunissant cette année plus de 180 000 visiteurs
  issus de 171 pays et près de 15 000 start-ups. Le Président de la République a échangé
  avec des entrepreneurs, chercheurs, investisseurs et dirigeants d’entreprises technologiques.
  Ils ont discuté des enjeux liés à l’intelligence artificielle et aux technologies
  de rupture , ainsi que des questions de souveraineté numérique, de compétitivité
  et d’investissement . Cette séquence intervient dans le prolongement des échanges
  consacrés à l’intelligence artificielle lors du Sommet du G7 d’Évian et des initiatives
  portées par la France pour renforcer son attractivité, soutenir l’innovation et
  affirmer sa souveraineté technologique, notamment dans le cadre du Sommet Choose
  France 2026 .
