  ont engagé des réformes importantes réduisant le recours à la peine de mort, même
  si des étapes sont encore à franchir pour aller jusqu''au bout. Ces décisions nous
  rappellent qu''aucune fatalité n''attache durablement un peuple à la peine de mort
  et que l''abolition n''est pas un idéal lointain. Mais un chemin concret sur lequel
  chaque étape compte. A ce titre, je ne peux voir qu''avec inquiétude ce que dans
  le Sahel, en Israël, certains poussent avec des textes de loi proposés, que je l''espère,
  les cours suprêmes en indépendance et en conscience auront à juger. Enfin, la cause
  de l''abolition universelle ne saurait être menée sans la mobilisation indispensable
  des sociétés civiles, des organisations non gouvernementales, des défenseurs des
  droits qui sont les forces vives du mouvement abolitionniste. Je souhaite ici leur
  rendre hommage, en particulier à « Ensemble contre la peine de mort », organisateur
  de ce Congrès, à la « Commission internationale contre la peine de mort » également,
  à laquelle a longtemps appartenu Robert Badinter, à l''ensemble des organisations
  de la société civile et à leurs jeunes militants qui sont engagés dans ce combat,
  aux Nations unies, Monsieur le Haut-Commissaire, et à l''importance, là aussi, de
  votre soutien, et à l''ensemble des lauréats Marianne que je viens de voir et qui
  sont, là aussi, une des initiatives portées par la diplomatie française qui visent
  à accompagner ces femmes et ces hommes qui, avec courage, se battent pour les droits
  humains, pour la dignité humaine et pour l''abolition. Voilà, mesdames et messieurs,
  ce que j''étais venu vous dire en soulignant, au fond, au-delà de tout cela, l''importance
  de ce Congrès et de votre mobilisation. Permettez-moi aussi de saluer la décision
  des autorités marocaines d''accueillir le prochain Congrès mondial contre la peine
  de mort, choix important. Au fond, en concluant mon propos, je voudrais simplement
  nous rappeler collectivement une chose, ça vaut pour ceux qui vivent dans des pays
  qui pratiquent encore la peine de mort comme dans les nôtres, y compris dans ce
  vieux pays qu''est la France, après les débats que nous avons encore eus ces dernières
  semaines. Ça n''est jamais acquis, jamais. Ne pensez pas que vous êtes les combattants
  d''une cause qui vaut pour tel ou tel pays qui n''a pas encore aboli, ou que vous
  êtes les combattants d''une mémoire qui a déjà vieilli. La bataille pour l''abolition,
  parce que c''est une bataille pour la dignité humaine, est éminemment contemporaine.
  Parce qu''aujourd''hui, dans nos sociétés, ce débat revient. Parce qu''aujourd''hui,
  dans nos sociétés, beaucoup se remettent à penser que la peine de mort serait une
  réponse, dans une confusion des principes et du langage. Ne croyez pas une seule
  seconde que le combat qui est le vôtre ne vaut pas aussi pour ici et pour aujourd''hui.
  Je le dis aux plus jeunes qui sont nés, c''est une chance, dans des pays où l''abolition
  était déjà là, qui n''ont pas eu à vivre ces débats et qui pourraient penser au
  fond que c''est de toute évidence, comme tous les combats pour les droits humains.
  C’est le fruit de luttes et ces luttes sont toujours à reprendre. C''est pourquoi
  votre Congrès est important, c''est pourquoi le combat qui est le vôtre est essentiel.
  Je dirais même que pour nos sociétés démocratiques, il est existentiel.'
