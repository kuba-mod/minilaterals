date: '2026-06-30'
type: press_release
source_name: elysee
title: Congrès mondial contre la peine de mort.
text: 'Le Président de la République a participé au neuvième congrès mondial contre
  la peine de mort à la Maison de la Radio et de la Musique le mardi 30 juin 2026.
  Comme le Président s’y était engagé à l’occasion du 75e anniversaire de la Déclaration
  universelle des droits de l’Homme , la France a accueilli le Congrès mondial pour
  la seconde fois. Cet évènement a pour objectif de renforcer l’engagement du pouvoir
  judiciaire , de mobiliser les jeunes générations et plus largement l’ensemble des
  acteurs , y compris régionaux. Le Congrès intervient dans un contexte paradoxal
  de croissance constante du nombre d’États abolitionnistes (114 États aujourd’hui),
  mais aussi de forte recrudescence du nombre d’exécutions. Près d''un an après la
  panthéonisation de Robert Badinter et 45 ans après l’abolition de la peine de mort
  en France , le chef de l’État a rappelé à cette occasion l’importance de ce combat
  , le rôle moteur de la France en faveur de l’abolition universelle et le rôle clé
  des organisations internationales et de la société civile. Mesdames et Messieurs,
  Chers amis, Merci Madame la directrice générale, pour votre accueil dans cette auguste
  maison. Je salue l''ensemble des ministres, présidentes et présidents d''organisations,
  de cours, d''organisations internationales, les ambassadrices, les ambassadeurs,
  les parlementaires, tous les représentants d''organisations internationales et non
  gouvernementales. Au fond, on dit généralement : Mesdames et Messieurs, en vos grades
  et qualités. J''ai envie de vous dire en plus, au titre des combats qui sont les
  vôtres. Je suis très heureux, Président, d''être là à vos côtés en cette journée.
  C''est au fond, un vieil engagement, engagement pris aux côtés de Robert Badinter
  lorsque nous avions célébré ensemble les 40 ans de la loi d''abolition en France,
  engagement pris à Chaillot lorsqu''on célébrait des textes ô combien importants
  au fondement de nos principes et de nos valeurs, et engagement pris auprès des uns
  et des autres durant toutes ces dernières années, qui sont des engagements que la
  France a pris depuis des décennies, même plus loin que cela. En accueillant aujourd''hui
  le 9e Congrès mondial contre la peine de mort, la France retrouve au fond un rendez-vous
  qu''elle avait contribué à inaugurer à Strasbourg il y a 25 ans avec le tout premier
  Congrès. Elle continue d''être aux côtés de celles et ceux qui se battent pour l''abolition.
  Depuis, le monde a profondément changé, c''est une évidence de le dire. Nombre d''États
  abolitionnistes ont rejoint. L''abolition de la peine de mort est en effet l''un
  des rares droits humains en constante progression et l''espérance d''une abolition
  universelle constitue un horizon accessible. Toutefois, et j''y reviendrai, les
  risques demeurent dans beaucoup de pays et quand je vois les débats dans nos pays,
  je considère que rien n''est acquis. La France, l''Europe, de nombreux États à travers
  le monde, dont je veux ici saluer l''engagement et les représentants, ont endossé
  ce combat, continuent à le faire, il est essentiel. La France elle-même sait que
  l''abolition de la peine de mort est un combat. Beaucoup de gens font semblant de
  croire que c''est au fond une évidence, que cela aurait toujours été, que c''est
  très simple. Je n''oublie pas le combat qui a été mené il y a plus de 40 ans contre
  l''opinion publique, contre, au fond, l''opinion telle qu''elle semblait s''exprimer,
  mais au nom des principes qui guident cette abolition. Je sais que dans beaucoup
  de pays où cette abolition continue de progresser, rien de ce chemin n''est évident.
  C''est toujours le fruit d''un débat profond, parfois douloureux, traversant nos
  sociétés, nos consciences, nos convictions les plus intimes. Une majorité de nos
  compatriotes était encore en effet opposée à l''abolition quand, le 18 septembre
  1981, l''Assemblée nationale adoptait la loi portant abolition de la peine de mort,
  initiative alors portée par le garde des Sceaux Robert Badinter, soutenu dès sa
  campagne par le Président François Mitterrand. Nous avons appris et compris qu''une
  démocratie pouvait se montrer inflexible à l''égard du crime sans pour autant renoncer
  à l''humanité, sans pour autant, au fond, devenir ce qu''elle combat. Cette expérience
  aussi nous invite à beaucoup d''humilité. Aucun peuple ne transforme ses représentations
  de la justice en un jour. La peine de mort, je le dis ici avec beaucoup d''humilité
  devant plusieurs femmes et plusieurs hommes qui ont vécu ces situations. La peine
  de mort, c''est d''abord un silence, celui que décrit Hugo et beaucoup d''autres,
  celui qui suit le prononcé de la sentence, chape de plomb froide qui s''abat sur
  l''individu et assassine déjà une part de son humanité. La peine de mort, c''est
  ensuite une attente. Cette attente du condamné qui vit ses derniers jours, parfois
  nombreux, le corps et l''esprit enchaînés à une seule et même pensée, terrible,
  insoutenable, incommensurable : la mort. Depuis des siècles, la peine de mort accompagne
  l''histoire des Hommes. Elle a été présentée comme une nécessité, comme une justice,
  parfois comme une protection, mais nous savons qu''il n''en est rien. Je ne veux
  pas ici revenir sur les débats, les démonstrations, sur l''instrumentalisation de
  celles-ci, les biais, le caractère toujours faillible de nos décisions de justice
  qui vont avec notre justice elle-même. Je voudrais simplement dire à cet égard deux
  choses très simples. La peine de mort n''a jamais rendu une société plus sûre. Jamais.
  Parce qu''elle ne dissuade pas. C''est faux. Ça a été montré, observé, mesuré. La
  peine de mort n’a et n''a jamais eu la valeur dissuasive que certains pouvoirs,
  souvent autoritaires, qui la défendent voudraient lui accorder. Elle peut être une
  arme, elle n''est jamais un bouclier. La deuxième chose fondamentale à mes yeux,
  c''est qu''au fond l''abolition, c''est la reconnaissance de la dignité humaine,
  c''est le fait que quoi que l''un ou l''une d''entre nous ait pu faire, nous n''avons
  pas le pouvoir de lui nier cette appartenance à notre humanité. Ce principe est
  au fondement de toutes nos sociétés démocratiques. Ce principe est la possibilité
  même de vivre ensemble. Même avec le pire des hommes ou la pire des femmes, nous
  devons faire et nous ne pouvons lui nier sa part de dignité humaine. Nous pouvons
  le punir, nous devons le punir. Nous devons contribuer à la restauration des droits
  de la victime, de ses ayants droit, de sa famille. Nous devons le punir pour lui
  faire comprendre, porter réparation au nom de la société, mais nous n''avons pas
  le droit de lui enlever cette appartenance à l''humanité. Il y a en quelque sorte
  une trahison de ce que nous sommes et de ce que sont nos sociétés démocratiques
  dans la peine de mort, en ce qu''elles viennent d''une part nier la dignité de l''autre,
  ce qui nous est interdit, mais en ce qu''elles pensent qu''on peut chasser le mal
  de la société. Être une démocratie, c''est construire la possibilité de prendre
  des décisions ensemble, de donner des représentations, de prendre des lois, de prendre
  des décisions, mais c''est reconnaître la part de tous au sein d''une société démocratique,
  la part de chacun, et d''accepter qu''on ne chasse pas le mal qui est le nôtre hors
  de notre société. On le contraint, on le réduit, on le sanctionne, on le prévient
  par l''éducation, parfois par le soin, mais on ne peut pas le chasser et le nier,
  et en aucun cas la peine de mort véritablement ne le supprime. C’étaient les deux
  choses que je voulais rappeler à cet égard, qui me paraissent importantes. La peine
  de mort n''est pas efficace, contrairement à ce qu''on nous dit, la peine de mort
  est une négation de l''humanité et du principe de dignité humaine qui est en chacun
  de nous. C''est pourquoi, à cet égard, une démocratie ne se mesure pas seulement
  à la force de ses lois, mais à sa capacité à préserver la dignité de chacun, de
  réussir ce combat pour l''abolition. L''histoire de l''abolition, c''est celle d''une
  marche en avant, je le rappelais en commençant mon propos, et nous pouvons en effet
  nous réjouir du nombre croissant d''États abolitionnistes, mais la peine de mort
  reste cependant encore dans de nombreuses régions du monde une réalité. Alors que
  le monde n''a jamais été aussi proche de l''abolition, jamais les exécutions n''ont
  été aussi nombreuses dans les pays qui ont encore ce principe. Le nombre d''exécutions
  a même atteint l''année dernière son niveau le plus haut depuis 1981, avec 2 707
  personnes exécutées par les autorités de 17 pays seulement. 25 000 personnes se
  trouvent, à l''heure où nous sommes réunis, dans l''attente insoutenable de leur
  exécution. C''est devant cette réalité et adossés aux principes humanistes qui ont
  fait rayonner leur histoire commune que la France et l''Europe sont pleinement engagées
  dans la voie de l''abolition universelle. Après avoir retiré de leurs législations
  respectives la peine capitale, les Européens réunis au sein du Conseil de l''Europe
  ont décidé collectivement de fonder en 2003 le premier et plus vaste espace politique
  de l''histoire sans peine de mort, à travers la ratification du 13e protocole additionnel
  à la Convention européenne des droits de l''Homme. C''est une fierté. Notre Union
  européenne a également fait de l''abolition une condition à l’intégration par de
  nouveaux États. L''idéal abolitionniste est au cœur des principes et de l''édifice
  européen, mais il n''est en aucun cas réductible à l''Europe seule. D''abord, faisant
  référence au Conseil de l''Europe, il doit s''étendre à la totalité de son espace,
  y compris jusqu''à ses confins, y compris jusque dans des pays qui, aujourd''hui
  encore, le bousculent. Surtout, au-delà de l''humanisme qu''il y a derrière l''abolitionnisme,
  je veux ici redire, je l''évoquais à l''instant avec quelques-uns et quelques-unes
  de nos combattants de la liberté, c''est un principe universel. En aucun cas, l''idée
  abolitionniste ne pourra être réduite à une conception strictement européenne, ni
  même occidentale. Il y a des combats qui transcendent les frontières, les époques,
  les régimes politiques, et l''abolition universelle de la peine de mort en est un.
  S’il suffisait de convoquer aussi des arguments historiques et géographiques, on
  pourrait ici rappeler que dès 1863, le Venezuela faisait le choix historique d''abolir
  la peine de mort, ouvrant un chemin qui allait progressivement être emprunté sur
  tous les continents. Depuis notre dernier rendez-vous à Berlin en 2022, le mouvement
  de l''histoire a poursuivi sa marche sur d''autres continents. La Zambie et le Zimbabwe
  ont pris la décision d''abolir la peine capitale. Je veux saluer l''annonce importante
  faite par le ministre pour le Liban, je les en remercie ô combien. Je pense qu''il
  n''y a rien d''innocent à prendre pour le Liban une telle décision si courageuse,
  au moment où dans le voisinage d''autres décisions funestes sont prises qui vont
  dans le sens contraire. Je veux saluer tous les États aussi qui, comme la Malaisie,
  ont engagé des réformes importantes réduisant le recours à la peine de mort, même
  si des étapes sont encore à franchir pour aller jusqu''au bout. Ces décisions nous
  rappellent qu''aucune fatalité n''attache durablement un peuple à la peine de mort
  et que l''abolition n''est pas un idéal lointain. Mais un chemin concret sur lequel
  chaque étape compte. A ce titre, je ne peux voir qu''avec inquiétude ce que dans
  le Sahel, en Israël, certains poussent avec des textes de loi proposés, que je l''espère,
  les cours suprêmes en indépendance et en conscience auront à juger. Enfin, la cause
  de l''abolition universelle ne saurait être menée sans la mobilisation indispensable
  des sociétés civiles, des organisations non gouvernementales, des défenseurs des
  droits qui sont les forces vives du mouvement abolitionniste. Je souhaite ici leur
  rendre hommage, en particulier à « Ensemble contre la peine de mort », organisateur
  de ce Congrès, à la « Commission internationale contre la peine de mort » également,
  à laquelle a longtemps appartenu Robert Badinter, à l''ensemble des organisations
  de la société civile et à leurs jeunes militants qui sont engagés dans ce combat,
  aux Nations unies, Monsieur le Haut-Commissaire, et à l''importance, là aussi, de
  votre soutien, et à l''ensemble des lauréats Marianne que je viens de voir et qui
  sont, là aussi, une des initiatives portées par la diplomatie française qui visent
  à accompagner ces femmes et ces hommes qui, avec courage, se battent pour les droits
  humains, pour la dignité humaine et pour l''abolition. Voilà, mesdames et messieurs,
  ce que j''étais venu vous dire en soulignant, au fond, au-delà de tout cela, l''importance
  de ce Congrès et de votre mobilisation. Permettez-moi aussi de saluer la décision
  des autorités marocaines d''accueillir le prochain Congrès mondial contre la peine
  de mort, choix important. Au fond, en concluant mon propos, je voudrais simplement
  nous rappeler collectivement une chose, ça vaut pour ceux qui vivent dans des pays
  qui pratiquent encore la peine de mort comme dans les nôtres, y compris dans ce
  vieux pays qu''est la France, après les débats que nous avons encore eus ces dernières
  semaines. Ça n''est jamais acquis, jamais. Ne pensez pas que vous êtes les combattants
  d''une cause qui vaut pour tel ou tel pays qui n''a pas encore aboli, ou que vous
  êtes les combattants d''une mémoire qui a déjà vieilli. La bataille pour l''abolition,
  parce que c''est une bataille pour la dignité humaine, est éminemment contemporaine.
  Parce qu''aujourd''hui, dans nos sociétés, ce débat revient. Parce qu''aujourd''hui,
  dans nos sociétés, beaucoup se remettent à penser que la peine de mort serait une
  réponse, dans une confusion des principes et du langage. Ne croyez pas une seule
  seconde que le combat qui est le vôtre ne vaut pas aussi pour ici et pour aujourd''hui.
  Je le dis aux plus jeunes qui sont nés, c''est une chance, dans des pays où l''abolition
  était déjà là, qui n''ont pas eu à vivre ces débats et qui pourraient penser au
  fond que c''est de toute évidence, comme tous les combats pour les droits humains.
  C’est le fruit de luttes et ces luttes sont toujours à reprendre. C''est pourquoi
  votre Congrès est important, c''est pourquoi le combat qui est le vôtre est essentiel.
  Je dirais même que pour nos sociétés démocratiques, il est existentiel. Mesdames
  et Messieurs, Chers amis, Merci Madame la directrice générale, pour votre accueil
