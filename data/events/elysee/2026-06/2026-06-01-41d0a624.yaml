  de la mise en œuvre pour que tout ceci devienne réalité et que nous changions le
  visage de ce pays, de ce continent. Je crois qu''au cours des dernières années,
  et c''est le principal moteur de ce mouvement. Nous avons ensemble pu construire
  un environnement favorable aux entreprises. Et très tôt, nous avons entrepris des
  réformes de la réglementation du travail. Et de fait, lors de mes entretiens bilatéraux,
  personne n''a évoqué la réglementation du droit du travail en France, alors qu’auparavant,
  on me parlait du manque de flexibilité, etc., donc le droit du travail. Deuxièmement,
  la fiscalité sur les plus-values et de nombreux sujets afin de faciliter les investissements
  totalement nouveaux, la recherche et le développement et même remarque à cet égard.
  Troisièmement, l''énergie. Et là, c''est le résultat des grands investissements
  opérés ces dernières années, car nous avons un avantage historique qui est l''énergie
  nucléaire. Mais ces dernières décennies, nous avons beaucoup investi pour réorganiser
  cette chaîne de valeurs en France. Et je salue tous les acteurs essentiels, qu''il
  s''agisse d''EDF, Framatome, Orano, le CEA et toute la famille française du nucléaire.
  Nous avons fait beaucoup au cours des 10 dernières années, et nous avons réinvesti
  précisément pour moderniser les instruments existants. Ce qui veut dire qu''en 2022,
  au début de la guerre d''agression menée par la Russie en Ukraine, nous importions
  de l''électricité, car nous n''étions pas à notre maximum. Nous utilisions quelque
  60 % de nos capacités. Ensuite, nous avons amélioré la situation, et en 2025-2024,
  nous avons pu exporter plus de 90 TWh. Et nous sommes de loin le principal exportateur
  d''électricité en Europe, ce qui nous offre la capacité d''investir dans des centres
  de données, dans de nombreux projets, sans faire souffrir nos ménages et nos entreprises.
  C''est un avantage exceptionnel de l''écosystème français, l''énergie disponible
  décarbonée. Par ailleurs, 95 % de cette électricité est d’ores et déjà décarbonée.
  Nous investissons dans des capacités supplémentaires afin de compléter le cycle
  et de le moderniser, mais également pour construire 6 plus 8 réacteurs. C''est déjà
  en cours. C''est un investissement pour les décennies à venir. Mais ceci illustre
  auprès de chacun d''entre nous que cet avantage sera durable. Et si vous intégrez
  les coûts et la compétitivité, en regardant les prix essentiels, le marché dans
  son ensemble, l''année dernière, 60 euros le MWh en France, 90 en Allemagne et plus
  de 105 euros le MWh en Italie. Donc nous sommes extrêmement concurrentiels en termes
  de coûts d''énergie et c''est l''un des sujets essentiels aujourd''hui. Et puis,
  celui des talents. Nous avons investi dans l''éducation, l''éducation supérieure.
  Nous formons de nombreux talents. Nos universités sont une force. Nos centres de
  recherche également. Nous avons amélioré l''écosystème et les synergies. Je crois
  que Paris-Saclay en est le meilleur exemple. Nous avons maintenant l''unité du site.
  Nous formons de plus en plus. Nous avons lancé un certain nombre de programmes France
  2030 pour former de plus en plus de personnes, notamment des scientifiques en matière
  de data, les compétences en matière de technologie verte. Nous formons de nombreux
  talents. Cela fait partie de notre stratégie en matière quantique et d''intelligence
  artificielle. Bien sûr, il s''agit aussi d''attirer d''autres talents, d''où les
  projets d''excellence, d''investissement dans notre écosystème. Autrefois, nous
  exportions de nombreux talents vers la Silicon Valley. Maintenant, nous parvenons
  à garder de plus en plus de nos talents grâce à ce nouvel écosystème. J''aimerais
  ajouter que ces dernières années, nous sommes parvenus à renforcer notre écosystème
  dans les domaines clés en termes d''innovation : le quantique, l''intelligence artificielle.
  Avec des stratégies à long terme, des investissements constants avec des ajustements
  permanents. Nous avons revu, d''ailleurs, ces dernières semaines, nos stratégies
  en matière quantique et d''IA pour être plus rapides encore et plus forts. Maintenant,
  il nous faut nous concentrer sur un certain nombre de sujets. Je dirais, au niveau
  français, qu''il s''agit de la rapidité, de l''échelle et de la simplification.
  Simplification. Nous adoptons un certain nombre de textes législatifs afin de réduire
  ce qui est trop complexe dans notre réglementation actuelle. Nous rationalisons
  également tous les secteurs possibles. Nous rationalisons la réglementation en vigueur.
  Nous la simplifions. Nous venons d''adopter un texte en matière d''IA pour les centres
  de données afin d''accélérer les projets. Nous avons simplifié les règles. Nous
  travaillons très dur afin de simplifier tout ça. Puis, l''échelle pour faire en
  sorte que vous puissiez avoir, en investissant en France, accès à l''entièreté du
  marché européen. J''y reviendrai. Puis la vitesse. La vitesse est essentielle. Permettez-moi
  de vous dire que trop nombreux sont ceux qui pensent qu''en Europe, nous sommes
  trop lents. Alors ce n''est pas nécessairement pour acquis, mais nous progressons.
  J''étais d''ailleurs, il y a quelques jours, à côté de Châteaudun, dans une usine
  de Vorwerk. Nos amis allemands sont sans doute ici présents. Ils ont annoncé au
  fil des ans, 2023-2024-2025, de nouveaux investissements. En deux ans, leur usine
  a pu être construite. Nous avons pris les engagements. Nous les avons tenus. Nous
  avons adopté ce que nous appelons la stratégie Notre-Dame. Nous sommes parvenus
  à restaurer et à rouvrir Notre-Dame en cinq ans. C''est ce que nous faisons également
  dans les projets industriels. Nous avons des procédures que nous rationalisons,
  nous simplifions tout. Vous avez un point d''entrée unique, un guichet unique, et
  nous accélérons au maximum. C''est ce que nous faisons sur les projets de centres
  de données, les fameux datacenters, et pour de nombreux projets industriels européens.
  Nous continuerons à accélérer. Vous pouvez compter sur moi. C''est beaucoup mieux.
  La France est en tête en Europe. Lorsque je compare avec le reste du monde, je pense
  que nous pouvons faire encore mieux. Mais soyez certains que pour la simplification,
  l''échelle et la rapidité, vous pouvez compter sur nous. Chaque fois que nous nous
  engageons, nous tenons nos promesses. Alors, nous allons travailler à une échelle
  nationale. C''est au cœur de notre stratégie. Je vais laisser du temps à notre échange
  et à nos questions-réponses. Mais quel est l''enjeu au niveau européen ? Que souhaitons-nous
  faire ? Nous voulons renforcer la compétitivité de l''Europe, en mettant en place
  des mesures très importantes. D''abord, des mesures de simplification. Je sais que
  vous êtes nombreux qui êtes gênés, voire plus, par la réglementation. Alors on a
  déjà voté des paquets omnibus. Ça va dans le bon sens, mais la simplification, c''est
  essentiel. Il faut modifier ce qui a parfois été mis en place, parfois accélérer
  d''autres choses. Mais ce qu''il faut faire, c''est essayer de ne pas commettre
  les mêmes erreurs trop souvent en Europe. Nous nous infligeons des blessures nous-mêmes.
  Nous devons donc nous synchroniser avec le reste du monde. Et à chaque fois qu''on
  fait un pas en arrière, il faut réparer la chose. Ça passe par la simplification.
  Ensuite, le marché unique. Lorsque vous investissez dans un pays, la France, l''Allemagne,
  l''Italie, vous investissez en Europe. Cela vous ouvre un marché de 400 millions
  de citoyens, d''habitants. A chaque fois que nous améliorons, nous approfondissons
  ce marché unique, nous approfondissons la compétitivité de l''Europe. Il s''agit
  donc de renforcer, de créer un marché numérique unique et de centraliser aussi les
  marchés des capitaux. La semaine dernière, nous avons discuté de la création d''une
  union des marchés des capitaux. C''est le tandem franco-allemand qui va essayer
  d''embarquer les autres partenaires. Donc, deuxième mot-clé : la protection. Je
  voulais être clair là-dessus. Lorsque vous vous rendez aux États-Unis ou au Canada,
  vous êtes protégés, si vous êtes un acteur américain ou canadien. Vous n''êtes pas
  traités comme un acteur européen. Si vous allez en Chine, vous n''êtes pas forcément
  bien traités en tant qu''acteur français. Mais de notre côté, nous souhaitons que
  tous ceux qui font partie de l''écosystème économique français, qui ont investi,
  soient protégés. Et ça passe par là. Protection. La préférence européenne. Une clause
  de protection qui protège les investisseurs comme l''ont fait l''ALENA et d''autres.
  Nous avons donc commencé à protéger les acteurs qui ont investi en Europe dans l''industrie
  automobile et nous allons approfondir cette mesure. Pourquoi ? Parce que c''est
  la seule manière de rendre l''Europe attractive. Lorsque vous investissez dans des
  usines de production de batteries lithium-ion à Douai, il faut que les constructeurs
  automobiles européens choisissent cette batterie. Tout ce qui sera produit en Europe
  fera partie de l''empreinte européenne. L''Europe a peut-être été trop naïve jusqu''à
  présent. Donc cette préférence européenne, nous allons la défendre. Sans cela, la
  concurrence déloyale nous écrasera. Et tout cela passe par des investissements.
  A l''échelle européenne, nous voulons attirer plus de financements privés et publics.
  Pour mes [financements] privés, nous le faisons, et notamment par l''union des marchés
  des capitaux, et pour les [financements] publics en augmentant les budgets dans
  les secteurs porteurs d''innovation, l''IA, le quantique, l''espace et les technologies
  vertes, la green tech également. Voilà donc les priorités essentielles pour l''Europe.
  On pourra y revenir pendant les questions et réponses, mais tout ça s''inscrit dans
  un contexte géopolitique tout à fait particulier, qui fait que nous devons avoir
  comme priorité le renforcement de notre souveraineté et notre indépendance. Cela
  ne signifie pas que nous voulions vivre en vase clos de manière isolée, pas du tout.
  Le but, c''est de réduire les sur-dépendances. Cela passe par l''innovation, par
  les investissements et par la réduction des risques par rapport à nos dépendances
  excessives. C''est ce qui nous protégera des risques géopolitiques. Il y a un aspect
  important, et j''aimerais le souligner, c''est la prévisibilité. L''amélioration
  de la compétitivité passera par un approvisionnement du marché unique, par des procédures
  simplifiées et plus rapides. Mais il ne faut absolument pas sous-estimer nos amis
  européens. Le cadre européen donne de la prévisibilité. Personne ne peut décider
  de changer les règles du jour au lendemain : les décrets présidentiels, etc. Le
  fait du prince, ça n''existe pas en Europe. Et c''est très important, cette prévisibilité.
  Certains diraient à court terme : non, j''aimerais bien que vous passiez un décret
  en ma faveur. Bon, très bien, tant que nous sommes amis. Mais en fait, non, à long
  terme, ce n''est pas bon. La prévisibilité, l''Etat de droit, voilà ce qui fait
  la stabilité et l''attractivité des marchés matures. C''est la même chose sur le
  plan géopolitique : ici, en Europe, nous sommes prévisibles. Dernier point sur des
  axes verticaux, je n''irai pas plus loin, mais sur l''espace donc. Notre secteur,
  notre filière spatiale européenne est très forte. Je crois que vous avez été éclairés
  et vous avez eu une discussion probablement très intéressante avec ceux qui m''ont
  précédé, Thomas et Arnaud, les deux d''ailleurs. Ils vont participer à des projets
  extraordinaires et donc ils font notre fierté. Thomas a commandé une mission sur
  l''ISS et va le faire. Arnaud va faire partie de l''équipe de Haven-1. [Applaudissements]
  Nous pouvons bien sûr les applaudir. Mais je voulais souligner que l''Europe a énormément
  d''atouts en ce qui concerne l''espace. Nous produisons des lanceurs, nous avons
  des sites de lancement, c’est Kourou. Nous disposons de satellites. Il y a énormément
  d''innovations à tous les étages. Nous proposons des services spatiaux et aujourd''hui,
  nous disposons d''une constellation en basse orbite, la constellation Léo. Elle
  n''est ni américaine, ni chinoise. Elle est gérée par Eutelsat et nous avons un
  accès indépendant à l''espace. Donc toute une panoplie d''innovations, toute une
  gamme d''innovations, des acteurs matures, très solides dans ce domaine : voilà
  ce que je voulais porter à votre attention. Et du 9 au 10 septembre va se tenir
  un sommet de l''espace en France où tous les grands acteurs seront réunis pour réfléchir
  à notre avenir et nos partenaires clés seront là également, l''ESA notamment. Voilà
  le premier axe que je voulais mettre en lumière. Ensuite, les centres de données
  et l’IA. Lors du sommet sur l''IA en février 2025, nous avons annoncé 109 milliards
  d''investissements. Et grâce à l''annonce de Softbank aujourd''hui, cela porte la
  somme à un niveau encore plus élevé. J''aimerais souligner le fait que nous voulons
  approfondir la chaîne de valeur. Nous avons eu d''excellentes discussions avec nos
  partenaires aujourd''hui. On peut parler des activités dans le civil et dans le
  militaire, mais notre priorité essentielle, bien sûr, c''est de réussir à installer
  des capacités de calcul beaucoup plus importantes en France et nous menons la course
  en Europe aujourd''hui. Non seulement cela, mais nous voulons également pouvoir
  produire des puces, avoir des sociétés de services, réduire nos dépendances et vraiment
  créer de la valeur, mais aussi disposer d''entreprises qui font de la robotique
  ou des modèles d''IA, LLM, etc. Donc il nous faut des capacités de calcul. L''Europe
  était en retard, donc nous voulons les installer, mais ces capacités, nous souhaitons
  les mettre à la disposition de nos champions pour développer des capacités d''IA
  et créer de la valeur. Dans le quantique, nous venons de renouveler notre stratégie
  sur les plans européen et français. Et enfin, un peu de culture. N''oublions pas
  que nous nous tenons ici devant le château de Versailles. Nous investissons également
  dans le secteur du tourisme. Vous êtes nombreux, d''ailleurs, à avoir confirmé des
  investissements dans le tourisme ou dans le patrimoine. Nous disposons d''énormément
  de monuments classés, protégés. Nous recherchons une diversification. Et justement,
  la culture, c''est aussi ce qui nous rend attractifs. Je voulais vous informer que
  le 7 septembre, nous allons co-présider avec la Corée le Sommet du Cinéma et de
  l''Image animée en France et cela marquera une accélération des investissements
  dans le cinéma, dans les industries créatives et culturelles, et ce, pour permettre
  à nos grands acteurs de travailler pour l''attractivité de la France. Alors je ne
  vais pas vous garder plus longtemps, je voulais souligner les éléments les plus
  importants, et je vous remercie pour votre confiance, votre engagement au service
  de notre pays. Il s''agit là d''un rendez-vous vraiment très important pour nous.
  Je remercie encore toutes les entreprises françaises présentes aujourd''hui. Je
  sais qu''elles apprécient ce rendez-vous, ces rencontres. Elles nous disent que
  les discussions sont toujours très, très fructueuses. Mais soyez assurés de notre
  engagement. Nous croyons à ce programme. Tout ce qui a été signé ici, qui a été
  annoncé aujourd''hui et lors des éditions passées, tout sera exécuté et réalisé
  dans les délais. Et c''est pour cela que notre événement grandit d''année en année,
  parce qu''il ne s''agit pas que d''une rencontre d''un jour. Il s''agit de tout
  un processus qui demande de l''effort, de l''engagement. Et je suis là moi-même,
  et je mets en jeu ma crédibilité, celle de mes ministres, celle de nos administrations.
  Donc merci encore et donc choisissez la France, bien sûr.'
