title: Joint Omani French declaration at the conclusion of the official visit of His
  Majesty Sultan Haitham bin Tarik, Sultan of Oman to France.
text: '1. On June 29, 2026 His Majesty Haitham bin Tarik, Sultan of Oman, paid an
  official visit to France at the invitation of the President of the French Republic,
  Mr. Emmanuel Macron. This first visit of His Majesty Haitham to France is a reflection
  of the long-standing and trustworthy bilateral relationship between France and the
  Sultanate of Oman, established in the late 19th century, when the French consulate
  opened in Muscat in 1894. 2. The two heads of State held an official discussion
  session during which they commended the intensification of the bilateral contacts
  over the last year at all levels and emphasised their shared commitment to strengthening
  their comprehensive and forward-looking bilateral partnership in a variety of areas.
  They welcomed the positive outcomes of the first strategic dialogue that took place
  in Paris on 14 April 2026 and of recent ministerial visits, including of the Minister
  for Europe and Foreign Affairs to Muscat on May 1st, which resulted in tangible
  progress in political, economic, defence and cultural areas. 3. The two heads of
  State opened the Franco-Omani business forum, which brought together more than 60
  French and Omani companies. This event helped strengthen business relations between
  the two countries and led to the signing of major economic contracts in the fields
  of renewable energy, water, and aerospace. 4. Both sides commended the dynamism
  of the bilateral economic relations and expressed their wish to expand them further
  by enhancing bilateral trade and facilitating trade flows between the Sultanate
  of Oman and France. They reiterated their joint commitment to implementing projects
  of mutual interest, based on the long-standing presence of French companies in the
  Sultanate of Oman. 5. The two sides emphasised the importance of developing investment
  relations between the two countries, highlighting the need to increase mutual investment
  in each country’s productive sectors. This would be achieved through partnership
  opportunities provided by the Oman Vision 2040 and France 2030, particularly in
  the areas of renewable energy, hydrogen, maritime infrastructure, logistics, information
  technology, transportation, tourism, culture and the space industry. In this context,
  both sides welcomed the signing of the Memorandum of Understanding on Investment
  Promotion, agreeing to leverage it as a key executive instrument to operationalise
  these ambitions and facilitate concrete investment flows. 6. The two Heads of States
  also reaffirmed their commitment to strengthening their cooperation in the strategic
  sectors of civil aviation and space. To this end, they stressed the importance of
  signing a technical cooperation agreement between the French Directorate General
  of Civil Aviation and the Omani Civil Aviation Authority, a letter of intent and
  a memorandum of understanding on transports including cooperation in urban transport
  and metro system. France welcomes also the partnership established between Oman
  and Airbus for the construction of Oman''s first satellite and the partnership between
  CMA-CGM and Asyad Group to expand and integrate its logistics networks around the
  ports of Oman as well as the recently signed partnership between Oman and Suez for
  water management in the greater Muscat, and the first milestone reached by EDF and
  Oman in developing pumped hydrostorage capacities in Oman. 7. The two sides praised
  the cultural cooperation between the two countries and reaffirmed their commitment
  to further strengthening Omani-French cultural and academic ties. They welcomed
  in this regard the signature of several agreements aimed at stepping up collaboration
  in the cultural, scientific and academic sectors, including student and research
  mobility, archaeology, museology and health. 8. Educational cooperation: they agreed
  that efforts will be made to increase the enrolment of all students who meet the
  admission requirements of the International French School of Muscat, in accordance
  with the procedures and regulations approved by the Ministry of Education in the
  Sultanate of Oman. 9. They also stressed the importance to increase student mobility
  to  France within the framework of joint academic cooperation projects, including
  the establishment of a jointly funded mechanism involving public and private higher
  education institutions from both countries, the promotion of collaborative research
  projects, the development of dual-degree programmes, and the expansion of existing
  scholarship programmes for Omani students pursuing short- and long-term studies
  in France, in line with the priorities of Oman Vision 2040. 10. They highlighted
  the importance of strengthening the teaching of the French language in the Sultanate
  of Oman through the expansion of the French language pilot programme in Omani public
  schools, the professional development of Omani French-language teachers, and the
  promotion of literary and academic translation as a means of fostering cultural
  and educational exchange. 11. They also welcomed the longstanding partnership between
  the Ministry of Education of the Sultanate of Oman and the Omani-French Centre in
  Muscat, which promotes educational and cultural cooperation between the two countries.
  They further acknowledged the Centre’s contribution to the teaching of French in
  Omani schools, the provision of language training opportunities, and the organization
  of student mobility initiatives, including the annual summer school programme in
  France for Omani students. 12. Museum sector: they agreed to strengthen the exchange
  of expertise relating to the Museum sector and to continue the joint efforts to
  open the Omani-French museum (Bait Faransa), showcasing the longstanding historical
  relations between the two countries. 13. Archaeology sector: they agreed to cooperate
  jointly in scientific research and to promote outcomes through academic publications
  in both France and the Sultanate of Oman. 14. Scientific Cooperation: both sides
  emphasized the importance of enhancing scientific cooperation in the field of Humanities
  through the activities of the French Centre for Scientific Research on the Arabian
  Peninsula (CEFREPA) office in the Sultanate of Oman. 15. The two heads of States
  discussed the bilateral cooperation in the field of defence and security. They praised
  the quality of the bilateral military cooperation, particularly the integration
  of French equipment within the Omani Armed Forces, as well as conducting regular
  joint exercise of all forces and visits by French warships to different ports in
  Oman. 16. They stressed their joint commitment to enhancing their collaboration
  in key strategic areas, particularly maritime security and the fight against illicit
  trafficking. 17. In line with France''s constant dedication to preserve maritime
  security and freedom of navigation in the region, including through the multinational
  naval deployments, they committed to strengthening their cooperation in maritime
  intelligence, maritime surveillance, and the safeguarding of trade routes. 18. They
  agreed to finalise the work initiated in 2022 on the Agreement on the Exchange and
  Reciprocal Protection of Classified and Protected Information in the Field of Defence.
  They also agreed to finalise the agreement on information exchange between their
  respective military intelligence departments. 19. The two leaders reaffirmed their
  commitment to continuing to coordinate and intensifying their efforts to contribute
  to international peace and security. They emphasised the importance to support regional
  de-escalation, conflict prevention and combatting all forms of terrorism and the
  proliferation of weapons of mass destruction, as well as securing maritime routes.
  20. Both sides reaffirmed their unwavering commitment to the principles and purposes
  of the United Nations Charter and to multilateralism. They also underlined their
  commitment to the norms of international law, international humanitarian law and
  international maritime law. In particular, they reaffirmed their commitment to the
  United Nations Convention on the Law of the Sea which remains the legal framework
  for governing maritime spaces, including the Strait of Hormuz and the Sea of Oman.
  21. The two sides reaffirmed their unwavering commitment to dialogue and diplomacy
  as means to resolve the crisis in the region, commending the constructive role of
  both countries in this regard, and highlighted the need to restore regional stability
  and security. They welcomed the Memorandum of Understanding agreed between the United
  States and Iran and their support to the ongoing negotiations aimed at reaching
  a long-term diplomatic settlement. 22. France welcomed Oman’s mediation on the nuclear
  issue as well as Oman’s efforts to resolve the crisis in the Strait of Hormuz. Oman
  welcomes France’s efforts to support a swift resumption of traffic in the Strait
  of Hormuz. 23. They emphasized the importance of reopening the Strait of Hormuz,
  and reaffirmed their commitment to free, unconditional, and unrestricted navigation,
  including the right of transit passage in accordance with the law of the sea.  Both
  parties agreed to work collaboratively with all stakeholders to support freedom
  of navigation going forward and conduct joint demining operations. 24. They reiterated
  that lasting peace in the region can only be achieved through a fair, comprehensive
  settlement of the Israeli Palestinian conflict, based on the internationally agreed
  parameters. They reaffirmed in this regard their support for the implementation
  of the Two-State solution and the right of the Palestinian people to self-determination,
  and for the establishment of an independent, sovereign, viable and democratic State
  of Palestine living side by side in peace and security with the State of Israel.
  25. Both sides stressed the need to implement the New York Declaration for the implementation
  of the Two-State solution endorsed by 142 States in 2025 as well as the Comprehensive
  Plan to End the Gaza Conflict and the provisions of UN Security Council 2803 in
  its entirety, including the unimpeded delivery of humanitarian aid in the Gaza Strip
  and maintenance of the ceasefire, in good faith and without delay. 26. Both parties
  reaffirmed their full support for the Presidential Leadership Council of the Republic
  of Yemen.  They also agreed on the great importance of supporting all UN and regional
  efforts to achieve an inclusive and comprehensive solution to the Yemeni crisis. 
  They recognise the strategic importance of the Red Sea regional stability for the
  global economy and the related importance of freedom of navigation as an international
  requirement. 27. Both sides expressed support for effort toward the achievement
  of a comprehensive, just and lasting peace in Ukraine, in accordance with international
  law and the principles of the United Nations Charter. They reiterated the need to
  respect the sovereignty, territorial integrity and political independence of States.
  28. France and the Sultanate of Oman expressed their firm belief that their historical
  ties, shared commitment to international law and constructive dialogue between their
  authorities provide a solid basis for an ambitious, enduring and strengthened partnership.
  29. His Majesty Sultan Haitham bin Tarik expressed his warm thanks to President
  Emmanuel Macron and the people of France for the friendly welcome and generous hospitality
  extended to His Majesty and his accompanying delegation during their visit to France.
  His Majesty also extended an invitation to President Macron to visit Oman.'
