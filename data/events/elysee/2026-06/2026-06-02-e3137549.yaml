  les esprits et, le jour venu, frappe, massacre, efface. Chemin de vigilance, car
  le génocide est un crime contre l''humanité, et par son caractère systématique,
  sa barbarie, sa volonté d''anéantissement et d''oubli, il est une offense que les
  bourreaux commettent contre tous les hommes. Une blessure faite à la conscience
  universelle. Oui, ce génocide porte en lui la mémoire de tous les autres génocides,
  dans leur différence particulière et irréductible, sans hiérarchie, sans confusion,
  avec la même indignation, la même douleur, la même résolution aussi à ne pas laisser
  se commettre le pire. Et notre conception de l''universel revient à dire cela. Nul
  ne peut être en paix dans le secret de sa conscience si l''humanité, quelque part,
  est prise pour cible. Chemin d''action, ensuite. Car toute cette histoire nous oblige
  à toujours œuvrer pour la paix, le dialogue, pour que les armes cessent et que la
  mécanique des crimes ne se réenclenche plus jamais. À ce titre, être là nous oblige
  à vouloir la paix pour tous, le respect de chacun et de toutes les souverainetés
  dans ce drame en cours depuis trop longtemps dans la région des Grands Lacs. Chemin
  d''espérance, enfin. C''est un âpre chemin, mais il est de notre devoir de le tracer
  et d''avancer ensemble. Rien n''est acquis, rien n''est conquis, rien n''est achevé.
  Mais ces blocs sont là pour nous rappeler ce passé, pour nous dire ce qui est désormais
  reconnu, et pour nous permettre ensemble ce chemin. À nous de transmettre avec rigueur,
  dignité et fidélité ce message, de redire vos mots, de dire ces poèmes, de porter
  ensemble avec courage cette histoire. Tui Buke, Tui Ubaka. Se souvenir, bâtir ensemble.
  Et nous serons là. Je vous remercie.'
