date: '2026-06-02'
type: press_release
source_name: elysee
title: Inauguration du mémorial en hommage aux victimes du génocide perpétré contre
  les Tutsi.
text: 'Le Président Emmanuel Macron a inauguré ce mardi le mémorial en hommage aux
  victimes du génocide perpétré contre les Tutsi au Rwanda aux côtés de Paul Kagame,
  Président de la République du Rwanda, sur l’Esplanade Habib-Bourguiba. Érigé sur
  les bords de Seine à l’initiative de l’État et de la Mairie de Paris, et baptisé
  « L’Archive » , ce mémorial a été conçu par l’artiste Grada Kilomba , comme un lieu
  de recueillement, en souvenir des disparus, et de transmission intergénérationnelle
  de la mémoire du génocide perpétré contre les Tutsi au Rwanda. Cette cérémonie poursuit
  le processus mémoriel et de réconciliation engagé depuis plusieurs années entre
  la France et le Rwanda fondé sur le dialogue, un travail conjoint de recherche et
  de vérité, la reconnaissance des responsabilités de la France par le Président de
  la République lors de sa visite au Rwanda en mai 2021, une action déterminée dans
  le domaine de l’éducation et une intensification des efforts de justice contre les
  responsables du génocide. Monsieur le Président de la République du Rwanda, cher
  Paul Kagame, Madame la Première Dame, Mesdames et Messieurs les ministres, Madame
  la secrétaire générale de l''Organisation internationale de la francophonie, Mesdames
  et Messieurs les ambassadeurs, Mesdames et Messieurs les parlementaires, Monsieur
  le délégué national de l''Ordre de la Libération, Monsieur le maire de Paris, Mesdames
  et Messieurs les élus, Mesdames et Messieurs en vos grades et qualités, chers rescapés,
  chers amis. Ce monument est un aboutissement. Il inscrit désormais le génocide des
  Tutsi au Rwanda, au cœur de notre capitale et de notre histoire. Il est l''aboutissement
  d''un long et patient travail de vérité que nous avons collectivement fait nôtre
  et qui s''appuie sur des décennies de témoignages, d''écrits, de travaux, d''une
  mobilisation acharnée. Et merci pour les mots à l''instant prononcés, Madame, avec
  courage. La lumière devait être faite, les mots devaient être posés, la reconnaissance
  devait être accomplie. À Kigali, en mai 2021, au mémorial de Gisozi, j''ai reconnu
  au nom de la France les responsabilités de notre pays dans un engrenage qui a conduit
  à mener au génocide des Tutsi. J''ai dit alors ce que notre nation a fait, a laissé
  faire, a dit ou n''a pas dit. Je n''entends rien retrancher de ces mots qui sont
  autant de pierres ajoutées à l''édifice de vérité que nous voulons bâtir. Je n''ai
  oublié aucun de ces mots. Je n''ai pas oublié non plus votre regard dans ces instants,
  président, votre attention, puis vos propres mots, comme toujours, choisis, pudiques,
  mais qui accueillaient cette reconnaissance. Je veux ici, aujourd''hui, à Paris,
  vous remercier infiniment pour cela. En cela, j''entends demeurer fidèle à notre
  volonté de respecter les leçons de l''histoire, toujours et partout, comme nous
  le faisons et comptons continuer de le faire avec l''Algérie, comme nous l''avons
  fait au Cameroun, au Sénégal, en Haïti. Moment toujours arasé par le sel des silences,
  de l''injustice, de l''absence trop longue de reconnaissance. Et soyez ici assurés
  de notre détermination à poursuivre cette œuvre de vérité et de justice. Oui, notre
  nation regarde son histoire en face, devoir pour elle-même, devoir envers autrui
  lorsque les actes commis en son nom s''écartent de l''idéal qui est le sien, devoir
  envers les victimes, les survivants, leurs enfants et les enfants de ceux qui ne
  sont plus, de celles et ceux qui, durant ces jours et ces nuits, ont vécu la terreur,
  comme vous l''avez admirablement rappelé. La France le doit aussi au regard des
  liens fraternels qu''elle entend nouer avec les peuples amis, au premier rang desquels
  le peuple rwandais. Elle le doit enfin, car dire et nommer le passé permet d''ouvrir
  l''avenir. Depuis ces mots prononcés, depuis ce moment, pour les présents et les
  absents, depuis lors, un rapprochement inédit s''est dessiné entre le Rwanda et
  la France. Et votre présence aujourd''hui à Paris, Monsieur le Président, Madame,
  donne à ce moment un sens profond et une portée historique. Cette reconnaissance
  a été permise dans l''ombre et la persévérance par des esprits courageux. Et je
  veux ici saluer, comme vous l''avez fait, le travail des associations, et en particulier
  celui d''Ibuka France, cher Marcel Kabanda, sans lequel ce monument n''existerait
  pas. Ce monument est l''enfant de cette persévérance et de cette reconnaissance.
  L''œuvre de l''artiste, ce dialogue entre deux masses, formant un jardin où chacun
  peut prêter voix au souffle du temps. Cette œuvre, nous la devons à Grada Kilomba.
  Ces archives, c''est leur nom, ont quelque chose du « Calme bloc ici-bas chu d''un
  désastre obscur », pour évoquer Mallarmé. Ce désastre, c''est celui du génocide,
  où les Tutsis furent massacrés pour ce qu''ils étaient. Ce désastre est formé des
  appels à la haine, des nuits de massacre ininterrompues, des corps amoncelés sous
  la besogne des bourreaux. Le désastre, c''est celui de l''absence, de la nuit perpétuelle
  de l''anéantissement, de l''épouvante au cœur des survivants. Cette œuvre incarne
  cette puissance du désastre, où se figent la haine et l''esprit de mort. Cette œuvre
  relève aussi d''un mouvement inverse, celui de la mémoire à travers les mots inscrits
  en français, en anglais, en kinyarwanda, en swahili. Ces blocs sombres ne sont pas
  seulement un mausolée, mais un livre ouvert, et qui, comme les livres, reste et
  traverse le temps par-delà l''aube et le crépuscule. Et dans ces pierres imaginées
  se dessine la résistance de la vie à l''oubli, à la mort. Comme l''a dit Esther
  Mujawayo, « survivre, c''est apprendre à vivre avec les absents. » Près de ce mausolée,
  les absents sont là. Ils sont dans le cœur des vivants et dans ces blocs, avec nous,
  ici pour toujours. Je veux remercier en cela l''artiste, l''ensemble de ceux qui
  ont œuvré pour l''édification de cette œuvre, qui dit avec force, calme et beauté,
  la permanence pour nous du souvenir. Et je veux remercier Monsieur le maire de Paris,
  Monsieur Grégoire et sa prédécesseure, Madame la maire, Anne Hidalgo, pour avoir
  voulu ici cette œuvre, l''avoir portée et nous avoir accueillis par vos mots, Monsieur
  le maire. Mais ce monument, s''il est un aboutissement, il n''est pas une fin. C''est
  un jalon sur un chemin que nous avons ouvert. Nous avons collectivement, ces dernières
  années, beaucoup travaillé, vous, vous avez beaucoup lutté, pour que des mots soient
  prononcés en 2021. Comme je l''ai dit, président, vous les avez accueillis avec
  beaucoup de courage. Et je ne sous-estime pas qu''il y avait beaucoup de gens pour
  vous dire que ça n''était pas assez, que ça aurait dû arriver plus tôt, et cela
  d''autant plus que vous, vous aviez combattu. Mais par ce travail de tous, par ces
  mots prononcés, parce que vous les avez accueillis, nous avons ouvert des chemins.
  Ils sont fragiles, ces chemins, encore, mais nécessaires. Et le rassemblement d''aujourd''hui
  doit nous rappeler aussi tout le soin que nous devons y mettre. Chemin de vérité.
  Dans un monde où les empires, parfois, ont la tentation de falsifier l''histoire,
  dans ce moment aussi où le passé est un champ de bataille, dire la vérité est plus
  que jamais nécessaire. C''est la condition de la paix. Et tous ceux qui, y compris
  aujourd''hui encore, dans votre région, nient cette vérité, prennent le risque du
  retour de la guerre. D''abord, nous devons continuer d''écouter la parole des survivants.
  Je pense aujourd''hui aux rescapés, aux témoignages bouleversants que nous venons
  d''entendre, à l''innocence du quotidien opposée à la mécanique du crime de masse,
  à celles et ceux qui ont vu disparaître leurs proches, à celles et ceux qui ont
  traversé ces mois atroces et qui ont pourtant trouvé la force de témoigner, de transmettre,
  de reconstruire. Je pense à tant d''écrits, de romans, de témoignages. Je pense
  aux récits brûlants de Jean Hatzfeld, dont je me souviens encore, et les voix des
  rescapés de Nyamata, aux livres, aux textes de Gaël Faye et de tant d''autres. Je
  pense aussi à la diaspora rwandaise de France, à celles et ceux qui portent en eux
  le deuil, la survie, parfois l''attente longue, difficile de la justice. Ensuite,
  ce chemin de vérité, nous le ferons en donnant aux historiens les moyens de travailler,
  en écoutant leurs recommandations, en continuant, chaque fois qu''il le faut, d''accompagner
  cette œuvre scientifique. Et je veux ici remercier Monsieur Duclerc et tous les
  membres de la Commission sous sa direction. Merci, cher Vincent, vous et tous vos
  collègues, pour le travail mené avec rigueur, courage, par la Commission de recherche
  sur les archives françaises. Pour nous, la vérité se fonde et se fondera toujours
  sur le dialogue, la recherche historique, l''ouverture des archives, le travail
  des historiens mené dans le silence des livres, aux côtés des sources et des traces
  de l''histoire. L''histoire prend ainsi sa juste place. Elle donne aux témoignages,
  aux traces. Elle accueille les mémoires. Elle fait justice. Elle permet la vérité
  et la reconnaissance. Chemin de justice, ensuite. Ces dernières années encore, la
  justice française a poursuivi son travail. Il le fallait. Mais ce que vous avez
  dit pour conclure tout à l''heure, Madame, est juste. Et nous allons y veiller.
  Des procès se sont tenus, d''autres enquêtes se poursuivent. Personne n''est ni
  ne sera au-dessus des lois. Et à celles et ceux qui pensaient avoir trouvé sur notre
  sol le refuge du temps ou l''abri de l''oubli, la justice française s''est trouvée
  les moyens de répondre. Aucun crime contre l''humanité ne peut bénéficier de la
  prescription ou de l''impunité, aucun. Et je le redis avec force, justice sera rendue.
  Et je salue, à ce titre, le travail inlassable des associations de partis civils
  qui jouent un rôle fondamental dans ce processus, le travail des avocats, le travail
  des magistrats. Chemin de vigilance aussi. Ces blocs irrécusables sont devant nous
  aussi comme des injonctions, injonctions à ne jamais nous accommoder, ne jamais
  oublier que ces masses obscures renferment aussi ce que l''esprit humain peut avoir
  de barbare. Ne cédons rien à la haine raciste de tous les jours. Et comme le dit
  l''auteur rwando-canadien Benjamin Sehene : « le génocide commence quand on regarde
  son voisin comme un étranger. » C''est vrai. Le seul remède à cet abandon de chaque
  jour, à ce mal qui n''est jamais banal mais qui devient courant, est un devoir de
  fraternité. Et comment ? Comment imaginer que le risque a disparu ? Comment ne pas
  s''épouvanter devant la force de frappe aujourd''hui des propagandes en ligne ?
  Il y a, derrière nos écrans, d''autres radios Mille Collines. Ouvrons les yeux.
  Soyons lucides aussi sur les logiques ethniques, racialistes, qui fleurissent ici
  ou là. Les mots peuvent varier, les masques changer. La logique, à la fin, demeure.
  Haine de l''autre, haine de tous les autres, haine totale et implacable qui conduit
  au meurtre de masse. La logique de ce crime de masse a été parfaitement décrite,
  là aussi par plusieurs historiens, Stéphane Audoin-Rousseau et plusieurs autres,
  qui ont montré cette continuité, le retour de ces cycles dont vous avez parlé, Président.
  Ceci nous oblige. Ce monument, est donc aussi un enseignement : qui commence à haïr
  l''autre en raison de sa couleur de peau, de son identité, de son origine, de son
  ethnie, enclenche une mécanique qui emporte tout. Une soif de meurtre qui tenaille
  les esprits et, le jour venu, frappe, massacre, efface. Chemin de vigilance, car
  le génocide est un crime contre l''humanité, et par son caractère systématique,
  sa barbarie, sa volonté d''anéantissement et d''oubli, il est une offense que les
  bourreaux commettent contre tous les hommes. Une blessure faite à la conscience
  universelle. Oui, ce génocide porte en lui la mémoire de tous les autres génocides,
  dans leur différence particulière et irréductible, sans hiérarchie, sans confusion,
  avec la même indignation, la même douleur, la même résolution aussi à ne pas laisser
  se commettre le pire. Et notre conception de l''universel revient à dire cela. Nul
  ne peut être en paix dans le secret de sa conscience si l''humanité, quelque part,
  est prise pour cible. Chemin d''action, ensuite. Car toute cette histoire nous oblige
  à toujours œuvrer pour la paix, le dialogue, pour que les armes cessent et que la
  mécanique des crimes ne se réenclenche plus jamais. À ce titre, être là nous oblige
  à vouloir la paix pour tous, le respect de chacun et de toutes les souverainetés
  dans ce drame en cours depuis trop longtemps dans la région des Grands Lacs. Chemin
  d''espérance, enfin. C''est un âpre chemin, mais il est de notre devoir de le tracer
  et d''avancer ensemble. Rien n''est acquis, rien n''est conquis, rien n''est achevé.
  Mais ces blocs sont là pour nous rappeler ce passé, pour nous dire ce qui est désormais
  reconnu, et pour nous permettre ensemble ce chemin. À nous de transmettre avec rigueur,
  dignité et fidélité ce message, de redire vos mots, de dire ces poèmes, de porter
  ensemble avec courage cette histoire. Tui Buke, Tui Ubaka. Se souvenir, bâtir ensemble.
  Et nous serons là. Je vous remercie. Monsieur le Président de la République du Rwanda,
  cher Paul Kagame, Madame la Première Dame, Mesdames et Messieurs les ministres,
  Madame la secrétaire générale de l''Organisation internationale de la francophonie,
  Mesdames et Messieurs les ambassadeurs, Mesdames et Messieurs les parlementaires,
  Monsieur le délégué national de l''Ordre de la Libération, Monsieur le maire de
  Paris, Mesdames et Messieurs les élus, Mesdames et Messieurs en vos grades et qualités,
  chers rescapés, chers amis. Ce monument est un aboutissement. Il inscrit désormais
  le génocide des Tutsi au Rwanda, au cœur de notre capitale et de notre histoire.
  Il est l''aboutissement d''un long et patient travail de vérité que nous avons collectivement
