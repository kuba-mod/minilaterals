title: 'G7 Summit in Evian : Day Two.'
text: 'The President of the Republic and Brigitte Macron hosted the G7 Summit in Évian
  from June 15 to 17, 2026. After welcoming Volodymyr Zelensky , President of Ukraine,
  on Tuesday morning, President Emmanuel Macron took part in a working session on
  the theme “Building Peace and Security for Ukraine and Europe”, attended by the
  G7 countries and Ukraine. The President of the Republic then welcomed the heads
  of state and government of the Arab Republic of Egypt, the United Arab Emirates,
  and the State of Qatar before taking part in a working lunch on the topic of “Addressing
  Crises and Ensuring Stability in the Middle East.” At 3:00 p.m., a group photo was
  taken with the most recently arrived heads of state and government: Brazil, India,
  South Korea, and Kenya. The working session titled “Forging New Partnerships and
  Rebuilding International Solidarity” then took place in the presence of the G7 countries,
  partner countries, the World Bank, and the African Development Bank. In the late
  afternoon, bilateral meetings took place before the President of the Republic and
  Brigitte Macron hosted a gala dinner in honor of the heads of delegation and their
  spouses. Find the statements adopted on Tuesday, June 16, here : Leaders'' call
  for a coordinated response to the Bundibugyo ebola outrbreak. Leaders'' call on
  the fight against cancer. Leaders'' declaration on mutually beneficial international
  partnerships. Leaders’ declaration on the fight against drug trafficking. Leaders’
  declaration on tackling migrant smuggling. G7 leaders'' statement on geopolitical
  issues.'
