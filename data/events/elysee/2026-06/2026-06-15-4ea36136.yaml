title: 'G7 Summit in Evian : Day One.'
text: The President of the Republic and Brigitte Macron hosted the G7 Summit in Évian
  from June 15 to 17, 2026. This Summit, focusing on convergence , brings together
  t he leaders of the G7 member countries, representatives of the European Union,
  partner countries associated with this presidency (Brazil, South Korea, Egypt, India,
  and Kenya), as well as several international organizations and guest countries ,
  including Ukraine and several Gulf States. On the morning of June 15, President
  Emmanuel Macron met with local elected officials at the Cachat refreshment stand
  , an Art Nouveau masterpiece that is set to reopen in a few days after seven years
  of renovations. He then attended a presentation of the work “Correspondance”, a
  mural created by illustrator Aurélie Castex, in company of children from Évian schools
  and Khaled El-Enamy , Director-General of UNESCO. The President of the Republic
  then spoke to the security and emergency response personnel mobilized for the Summit.
  Then, he was interviewed on the " Journal de 13h " on TF1 and answered questions
  from Anne-Sophie Lacarrau. In the afternoon, President Emmanuel Macron spoke with
  Donald Trump , President of the United States of America. He and his wife then officially
  welcomed the G7 heads of state and government and their spouses. The leaders gathered
  at the end of the day for a working dinner on the theme of “working together to
  address major international challenges.”
