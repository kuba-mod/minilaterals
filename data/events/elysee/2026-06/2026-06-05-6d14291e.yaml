title: EU-Balkans Summit in Montenegro.
text: The President of the Republic visited Montenegro on Thursday, June 4, and Friday,
  June 5, as part of a bilateral visit and the EU-Western Balkans Summit. On Friday,
  June 5, the heads of state and government of the European Union and the Western
  Balkan countries met at the EU-Western Balkans Summit to assess progress toward
  European integration and the conditions for stability and shared prosperity across
  the region. This summit underscores the strategic importance attached to the Western
  Balkans, whose stability and European integration are key to the continent’s security.
  The leaders discussed a wide range of issues related to sectoral cooperation and
  the enlargement of the European Union.
