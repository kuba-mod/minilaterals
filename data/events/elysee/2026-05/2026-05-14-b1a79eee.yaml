title: Disparition de Fleury Di Nallo.
text: 'Fleury Di Nallo, surnommé le « Petit Prince de Gerland », meilleur buteur de
  l’histoire de l’Olympique Lyonnais, nous a quittés à l’âge de 83 ans. Né le 20 avril
  1943 à Lyon, dans une famille d’immigrés italiens installés dans une cité ouvrière
  de Gerland, Fleury Di Nallo trouva dans le football une école de la vie, un moteur
  d’intégration et de dépassement. À dix-sept ans à peine, en 1960, il entra pour
  la première fois sous les couleurs de l’Olympique Lyonnais contre Reims. Pendant
  quatorze ans à l’OL, il inscrivit 222 buts en 494 matchs — un record encore en vigueur
  aujourd’hui. Petit par la taille, immense par le talent, il compensait son gabarit
  par sa vivacité, une lecture du jeu hors du commun et un sens du but imparable.
  Numéro 10, il était « le Petit Prince de Gerland » pour le public, la « Fleur »
  pour ses co-équipiers. Il forma des trios devenus mythiques avec Angel Rambert et
  Nestor Combin jusqu’en 1965, puis avec Serge Chiesa et Bernard Lacombe jusqu’en
  1974. Le 21 mai 1967, lors de la finale de la Coupe de France au Parc des Princes,
  Fleury di Nallo inscrivit le but libérateur face à Sochaux, avant de recevoir le
  trophée des mains du général de Gaulle. Cette image figea à jamais l’image d’un
  enfant du peuple, capitaine de son club de cœur, porté au sommet par la seule force
  de son talent. Il remporta au total trois Coupes de France : 1964, 1967 et en 1973,
  confirmant son statut d’immense joueur de l’OL. En équipe de France, il inscrivit
  8 buts en 10 sélections, réussissant notamment à égaliser face au Brésil de Pelé
  lors d’un match resté dans les mémoires. Il représenta avec fierté notre pays et
  laissa le souvenir d’un joueur créatif, combatif et profondément respecté dans le
  monde du football. Au cours de sa carrière, Fleury Di Nallo porta également les
  couleurs du Red Star, de l’AS Limoges et de Montpellier, poursuivant partout le
  même engagement et la même passion du jeu. Fleury Di Nallo incarnait une certaine
  idée du football : populaire, généreuse et fidèle. Son nom demeure associé à une
  époque fondatrice du football français et à une passion qui continue d’inspirer
  les générations actuelles. Le Président de la République et son épouse adressent
  leurs condoléances émues à ses proches, aux supporters lyonnais et à tous les amoureux
  du football français.'
