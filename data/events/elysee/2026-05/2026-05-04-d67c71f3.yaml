  a collective wakeup call and not to be dependent on any big power. And this is as
  well, one of the preconditions of this strategic autonomy. Après une session plénière,
  le Président Emmanuel Macron et la présidente du Conseil italien Giorgia Meloni
  ont co-présidé une réunion de la coalition européenne contre les drogues rassemblant
  quarante États autour de coopérations concrètes. Puis, différentes réunions et tables
  rondes sur la résillience des systèmes démocratiques se sont déroulées. 22 juillet
  2026 - Seul le prononcé fait foi Bonjour à tous. Je vais retrouver le président
  d''Arménie dans un instant et commencer la partie bilatérale de cette visite. Mais
  je pense que dans le contexte que nous connaissons, c''était très important de tenir
  cette réunion de la communauté politique européenne, la huitième ici, à Erevan.
  D''abord, parce qu''elle vient consacrer tout le chemin fait par l''Arménie ces
  dernières années. Je pense que c''est très important de le souligner, et ça n''est
  souvent pas assez vu. Mais il y a huit ans, beaucoup de gens regardaient l''Arménie
  comme un pays qui dépendait énormément de la Russie, dont les solutions de sécurité
  étaient totalement dans la main des Russes, dont les dirigeants étaient souvent
  influencés par la Russie, pour rester pudique. Depuis la révolution de velours lancée
  par le Premier ministre Pashinyan, par la politique qu''il a menée ces dernières
  années de construction de la paix et de regard vers l''Europe et d''engagement vers
  l''Europe, eh bien, nous consacrons une ère nouvelle. En effet, cette Europe qui
  va de l''Islande jusqu''au Caucase, cette Europe large, celle que réunit la communauté
  politique européenne, c''est celle qui a du sens pour parler des sujets de lutte
  contre les trafics de drogue, de solidarité énergétique et de connectivité, de protection
  de nos démocraties contre les ingérences étrangères et la fausse information et
  de solutions de défense et de sécurité communes. Donc, sur chacun de ces sujets,
  nous avons consolidé des alliances et des coalitions. On a bâti d''ailleurs des
  réponses très concrètes durant ces dernières années, et cette réunion a permis de
  passer encore une étape, en particulier sur la lutte contre les drogues. On était
  40 autour de la table avec des initiatives concrètes qui ont été prises. J''ajoute
  à cela pour conclure que, pour la première fois, nous avions le Canada, et le Premier
  ministre Carney a été très clair aussi dans son ambition, l''ordre international,
  c''est-à-dire, au fond, la capacité pour les pays qui croient dans les règles internationales,
  dans la démocratie, dans la coopération, dans le commerce, ouvert et équitable de
  travailler ensemble, se refera à partir d''Europe et par ce dialogue particulier.
  Monsieur le Président, vous avez beaucoup échangé aujourd''hui avec les 27. La semaine
  dernière, en France, on a beaucoup parlé des super profits réalisés par TotalEnergies.
  C''est un sujet très concernant. Est-ce que, d''après vous, l''Europe doit mettre
  en place une contribution exceptionnelle, notamment pour les énergéticiens ? D''abord,
  il y a un processus de transparence qui est aujourd''hui assuré dans beaucoup de
  pays. En France, il l''est, avec des enquêtes permanentes sous l''autorité du Premier
  ministre et des ministres compétents à Bercy. Les Européens suivent cela de très
  près. Il ne faut surtout pas oublier la cause de tout cela. La cause, c''est qu''aujourd''hui,
  on a le détroit d''Ormuz qui est fermé depuis des semaines. Donc, notre énergie,
  on doit surtout la mettre à réouvrir le détroit d''Ormuz, parce que par ce détroit
  sortent à peu près 20 % du pétrole et du gaz mondial, 30 % des engrais. Donc, notre
  problème, c''est ça, à la base. Ce ne sont pas les comportements d''un tel ou un
  tel. Après, on doit s''assurer que quand les prix montent, ils sont répercutés le
  plus tard possible et que quand les prix baissent, ils sont répercutés le plus vite
  possible pour pas que ce soit nos consommateurs qui, en quelque sorte, soient les
  principales victimes. C''est là où il faut faire le suivi des marges. Mais aujourd''hui,
  il n''y a pas des producteurs ou que ce soit qui sont en train de faire beaucoup
  d''argent et qui font monter le prix à dessein. Il y a surtout un contexte géopolitique
  par ce blocus. Donc, la priorité, c''est la réouverture pacifique et concertée d''Ormuz
  et le suivi, la transparence, s''il y a des profits excessifs ou des comportements
  de, si je puis dire, un peu prédateurs ou spéculateurs, en effet, les différents
  pays et les Européens devront y répondre. You said that you will discuss the issues
  with President Aliyev, how will you do that ? By phone or in person ? I will first
  discuss with the President of Armenia and the Prime Minister of Armenia, and after
  that, I will call President Aliyev, and we will organize together the right way
  to proceed, either physically or through this phone call. But you can count on me,
  and I am a strong believer in this peace process. Thank you. Est-ce que vous avez
  l’impression que l’Europe ressort plus forte de cette réunion ? Je pense que l''Europe
  est à un moment de vérité qui suppose plus d''unité et plus d''ambition. Cette réunion
  était importante pour moi, on doit encore accélérer et aller plus loin. On a besoin
  d''une Europe forte qui réduise ses dépendances excessives, qui bâtisse ses solutions
  de paix et de sécurité pour elle-même et qui agit comme un continent vraiment uni
  par une communauté de destin. C''est ça en quoi nous croyons. 22 juillet 2026 -
