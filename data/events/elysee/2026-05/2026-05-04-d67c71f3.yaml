date: '2026-05-04'
type: press_release
source_name: elysee
title: Sommet de la Communauté politique européenne à Erevan en Arm
text: 'Le Président de la République a participé au Sommet de la Communauté politique
  européenne à Erevan, en République d''Arménie, le 4 mai 2026. Pour ce premier jour
  à Erevan, le Président Emmanuel Macron a participé au huitième Sommet de la Communauté
  politique européenne (CPE) dans le but de renforcer le dialogue stratégique entre
  États européens et de répondre aux grands défis de sécurité et de stabilité sur
  le continent. Bonjour à tous. Heureux de vous retrouver à Erevan. C''est important
  parce que c''est un nouveau rassemblement de cette Europe large qui est la communauté
  politique européenne. Qui, de l''Europe du Nord aux Balkans en allant jusqu''au
  Caucase, permet de rassembler aujourd''hui 40 délégations qui sont ici. Et on voit
  que c''est une Europe qui avance. On va dans un instant tenir une réunion de soutien
  à l''Ukraine. On aura l''occasion d''avoir des réunions de soutien, justement, à
  l''indépendance, la souveraineté arménienne, à la Moldavie. Et puis, c''est une
  Europe aussi qui bâtit sa sécurité, sa défense. C''est, je crois, le bon cadre,
  parce que les défis de sécurité européens sont au-delà des frontières de l''Union
  européenne, et cette Europe large est pertinente à ce titre. Nous avons aussi bâti,
  lors du dernier Sommet à Copenhague, une alliance contre la drogue et les trafics
  de drogue. Elle comporte 40 délégations, États et organisations internationales,
  et nous allons pour la deuxième fois la réunir avec des actions très concrètes que
  nous coordonnons dans les ports, les aéroports, pour lutter aussi contre le financement
  des trafics. Voilà l''agenda du jour, et c''est pour moi une occasion importante
  de continuer à faire avancer ce projet européen qu''est la Communauté politique
  européenne. Nous aurons ensuite l''occasion d''une visite bilatérale. Monsieur le
  Président, est-ce que la France va augmenter les troupes en Roumanie, en sachant
  que Trump a menacé qu''il va les retirer et pour quand une visite à Bucarest ? J''espère
  pour très bientôt et nous serons au rendez-vous de toute façon de la sécurité. La
  France est nation-cadre pour la sécurité de la Roumanie et donc, nous prendrons
  nos responsabilités. Aujourd''hui, le déploiement que nous avons est considéré comme
  suffisant, mais nous nous adapterons évidemment en dialogue très étroit avec les
  autorités de Roumanie, mais vous pouvez compter sur la France. Quel est le message
  aujourd''hui de la CPE à Donald Trump ? C''est un message d''abord pour nous-mêmes.
  Nous, Européens, nous bâtissons nos solutions de sécurité. C''est ce que nous avons
  décidé de faire dès 2022 en créant la Communauté politique européenne. C''est ce
  que nous avons fait en bâtissant une coalition des volontaires pour apporter des
  garanties de sécurité à l''Ukraine, c''est ce que nous avons fait avec l''opération
  ad hoc et la mission pour la libération d''Ormuz. Donc, ce n''est pas en réaction
  à qui que ce soit, mais les Européens prennent leur destin en charge, augmentent
  leurs dépenses de défense et de sécurité et bâtissent leurs solutions communes.
  Monsieur le Président, est-ce que vous allez participer à l''initiative qu''a annoncée
  le président Trump ? Je ne sais pas quelle est cette initiative. Vous savez, il
  y a 10 jours, nous, nous poussions, dès que le cessez-le-feu a été déclaré, pour
  faire deux choses. J''avais eu le président Trump et le président Pezechkian. Le
  cessez-le-feu devait inclure le Liban et le cessez-le-feu devait permettre la réouverture
  d''Ormuz. Le vendredi, nous avons tenu cette mission ad hoc qui a rassemblé de nombreux
  États et gouvernements, une cinquantaine, de tous les continents d''ailleurs, ce
  qui est une très bonne chose. Le même jour, les États-Unis ont annoncé faire un
  blocus. Aujourd''hui, je regarde la situation. Si les États-Unis veulent réouvrir,
  sont prêts à réouvrir Ormuz, c''est très bien. C''est ce qu''on demande depuis le
  début. Mais nous, on ne va pas participer à quelque opération de vive force que
  ce soit dans un cadre, pour ma part, qui ne me semble pas clair. Donc nous, nous
  avons bâti une mission ad hoc sur laquelle nous travaillons. La planification militaire
  s''est faite à Londres, mais nous souhaitons qu''il y ait surtout une réouverture
  concertée entre l''Iran et les États-Unis. C''est la seule solution qui permet durablement
  de rouvrir le détroit d''Ormuz, de permettre la libre navigation et de le faire
  sans restriction et sans péage. Ensuite, je veux ici redire aussi qu''il est essentiel
  que le cessez-le-feu soit respecté au Liban. Il y a encore eu plusieurs dizaines
  de morts la nuit dernière. Il est essentiel que le cessez-le-feu soit respecté.
  Vraiment, c''est l''engagement que les parties ont pris, et je le dis pour la souveraineté,
  l''indépendance du Liban et la protection des populations civiles. Merci, mesdames
  et messieurs. J''aurai l''occasion de vous reparler tout à l''heure. Merci. Bonjour
  à tous. Heureux de vous retrouver à Erevan. C''est important parce que c''est un
  nouveau rassemblement de cette Europe large qui est la communauté politique européenne.
  Qui, de l''Europe du Nord aux Balkans en allant jusqu''au Caucase, permet de rassembler
