  volontaires pour apporter des garanties de sécurité à l''Ukraine, c''est ce que
  nous avons fait avec l''opération ad hoc et la mission pour la libération d''Ormuz.
  Donc, ce n''est pas en réaction à qui que ce soit, mais les Européens prennent leur
  destin en charge, augmentent leurs dépenses de défense et de sécurité et bâtissent
  leurs solutions communes. Monsieur le Président, est-ce que vous allez participer
  à l''initiative qu''a annoncée le président Trump ? Je ne sais pas quelle est cette
  initiative. Vous savez, il y a 10 jours, nous, nous poussions, dès que le cessez-le-feu
  a été déclaré, pour faire deux choses. J''avais eu le président Trump et le président
  Pezechkian. Le cessez-le-feu devait inclure le Liban et le cessez-le-feu devait
