  ont annoncé faire un blocus. Aujourd''hui, je regarde la situation. Si les États-Unis
  veulent réouvrir, sont prêts à réouvrir Ormuz, c''est très bien. C''est ce qu''on
  demande depuis le début. Mais nous, on ne va pas participer à quelque opération
  de vive force que ce soit dans un cadre, pour ma part, qui ne me semble pas clair.
  Donc nous, nous avons bâti une mission ad hoc sur laquelle nous travaillons. La
  planification militaire s''est faite à Londres, mais nous souhaitons qu''il y ait
  surtout une réouverture concertée entre l''Iran et les États-Unis. C''est la seule
  solution qui permet durablement de rouvrir le détroit d''Ormuz, de permettre la
  libre navigation et de le faire sans restriction et sans péage. Ensuite, je veux
  ici redire aussi qu''il est essentiel que le cessez-le-feu soit respecté au Liban.
