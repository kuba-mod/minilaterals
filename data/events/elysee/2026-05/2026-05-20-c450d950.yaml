title: La Coupe du monde d’e-sport 2026 à Paris !
text: 'Le Président de la République salue l’annonce faite aujourd’hui par la Fondation
  Esports selon laquelle la France a été choisie pour accueillir la Coupe du monde
  d’e-sport 2026, le plus grand championnat mondial d’e-sport multi-jeux, à Paris
  du 6 juillet au 23 août 2026. Il s’agira de la première édition organisée hors d’Arabie
  saoudite depuis la création du championnat. Après les Jeux olympiques et paralympiques
  de Paris en 2024 et la Coupe du monde de rugby en 2023, ce choix témoigne de l’attrait
  que continue d’exercer la France sur les grandes compétitions mondiales et reflète
  l’approfondissement des relations entre l’Arabie saoudite et la France, notamment
  dans les domaines culturel et sportif. Depuis 2015, la France s’est imposée comme
  une destination incontournable – la première en Europe – pour les grands événements
  mondiaux d’e-sport. Cette année encore, la France a accueilli les plus grands événements
  mondiaux : le Six Invitational à l’Adidas Arena et le RLCS Major 2 à la Paris La
  Défense Arena. L’organisation de cette compétition mondiale en France en 2026 témoigne
  et récompense l’effort collectif entrepris au cours des dix dernières années par
  l’industrie de l’e-sport — une dynamique soutenue par le Président de la République
  et appuyée par les agences gouvernementales et les autorités locales. Cette dynamique
  se poursuivra en octobre 2026 avec le retour de l’EVO France à Nice. Au cours des
  sept semaines de compétition à Paris, la Coupe du monde d''e-sport 2026 réunira
  plus de 2 000 joueurs professionnels issus de 200 clubs internationaux représentant
  plus de 100 pays. L''événement bénéficiera des infrastructures remarquables de Paris
  et de sa région, et mobilisera les secteurs du tourisme, de l''hôtellerie, du commerce
  de détail et de la culture. Les trois clubs français qui se sont qualifiés au plus
  haut niveau international, Team Vitality, Gentle Mates et Karmine Corps, défendront
  les couleurs nationales devant leur public. L''e-sport rassemble plus de 12 millions
  de joueurs en France et constitue l''une des expressions les plus dynamiques de
  la culture numérique chez les jeunes en France et en Europe. L’arrivée de la Coupe
  du monde d’e-sport à Paris en 2026 sera l’occasion d’une fête populaire, ouverte
  et fédératrice, ainsi qu’une opportunité de renforcer et de promouvoir les relations
  entre la France et l’Arabie saoudite. La France, hôte de la Coupe du monde d’e-sport
  2026, et l’Arabie saoudite, hôte précédent, saluent l’engagement de la Fondation
  Esports à faire de la Coupe du monde d’e-sport 2026 un succès.'
