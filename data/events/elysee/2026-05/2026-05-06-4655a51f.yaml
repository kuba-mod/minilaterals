title: Disparition de Pierre-François Veil.
text: Avocat, homme d’engagement, héritier et passeur d’une mémoire qu’il n’a cessé
  de faire vivre avec dignité et exigence, Pierre-François Veil aura consacré sa vie
  au service du droit, de la justice et du souvenir. Né le 16 mars 1954, Pierre-François
  Veil grandit à la lumière de l’Histoire. Fils de Simone Veil, rescapée des camps
  de la mort et figure éminente de la République, et d’Antoine Veil, grand serviteur
  de l’État, il porta toute sa vie la conscience aiguë du siècle. Comme ses frères
  Jean et Claude-Nicolas, Pierre-François Veil retint de cette filiation l’exigence
  de se tenir à la hauteur de son héritage et de faire vivre une espérance humaniste.
  Après des études de droit, il choisit la voie des prétoires, devenant avocat en
  1979. Au fil des années, Pierre-François Veil prit part à des affaires majeures,
  en particulier celles qui touchaient à la mémoire de la Shoah et à la reconnaissance
  des vérités longtemps tues. Sans jamais chercher la lumière, il contribua à faire
  prévaloir le droit là où l’histoire exigeait réparation. Son engagement en tant
  que Président de la Fondation pour la Mémoire de la Shoah, fonction qu’il occupait
  depuis 2023, après Simone Veil puis David de Rothschild, s’inscrivait dans une fidélité
  à l’histoire de sa famille comme à ses idéaux personnels. Il fut là, notamment,
  pour la commémoration des 80 ans de la rafle du Vél d’Hiv ou de la libération des
  camps, comme à tant de moments de mémoire et de transmission. Gardien vigilant de
  la mémoire de Simone Veil après sa disparition, il accompagna, aux côtés de son
  frère Jean, les initiatives destinées à transmettre son œuvre et ses combats. Il
  fut notamment présent et actif pour l’entrée au Panthéon de Simone Veil le 1er juillet
  2018. Le Président de la République et son épouse saluent la mémoire d’un homme
  qui aura servi le droit, la justice et la mémoire avec une fidélité exemplaire.
  Ils adressent à sa famille, à ses proches et à tous ceux qui l’ont connu leurs condoléances
  émues.
