title: 'Sommet « Africa Forward : Partenariats entre l’Afrique et la'
text: 'Le Kenya et la France co-organiseront le sommet « Africa Forward : des partenariats
  entre l’Afrique et la France pour l’innovation et la croissance » , qui se tiendra
  à Nairobi les 11 et 12 mai 2026. Il réunira le Président de la République française, le
  Président de la République kényane et les autres chefs d’État et de gouvernement
  africains. Le sommet Africa Forward marque une étape majeure dans les relations
  entre la France et le continent africain, près de dix ans après le discours du Président
  de la République à Ouagadougou. Il s’agit du premier sommet de ce type à être accueilli
  et co-présidé avec un pays anglophone. Il est à l’image de partenariats Afrique-France
  à la fois robustes et équilibrés. Ces partenariats se construisent en soutien du
  développement économique de chacun – car ils reposent sur des complémentarités réelles
  – et au service des populations. Ils doivent également participer d’une gouvernance
  mondiale plus juste et plus inclusive, qui refuse les logiques de bloc, les prédations
  et les nouveaux impérialismes : plus que jamais, ces partenariats sont utiles. Le
  sommet Africa Forward illustrera la richesse et le dynamisme des relations entre
  le continent africain et la France par la diversité des acteurs qui y prendront
  part – Etats, entreprises, jeunesses, artistes, sociétés civiles et diasporas. Il
  sera l’occasion de démontrer l’engagement de la France, du Kenya et des pays africains
  pour accélérer les investissements croisés et pour construire et financer des solutions
  concrètes aux défis communs, tels que le renforcement des systèmes de santé, la
  souveraineté alimentaire, la compétitivité dans le domaine du numérique, l’accès
  à l’énergie et la connectivité. Il s’inscrit dès lors dans la continuité du Sommet
  sur le financement des économies africaines de Paris en 2021, du Sommet pour le
  nouveau pacte financier mondial de Paris et du Sommet africain sur le climat de
  Nairobi en 2023, ainsi que du Sommet entre l’Union africaine et l’Union européenne
  de Luanda en novembre 2025. La journée du 11 mai, intitulée « Inspire and Connect »,
  s’ouvrira par un forum d’affaires qui mettra en évidence la profondeur des partenariats
  économiques franco-africains et valorisera les projets et initiatives portées par
  les secteurs privés africains et français. Au cours de cette journée, plusieurs
  temps forts auront lieu autour de la jeunesse et sur des secteurs d’excellence,
  créateurs d’emploi et fédérateurs tels que le sport ou les industries culturelles
  et créatives. La journée du 12 mai sera largement consacrée aux questions de financement
  du développement et aux enjeux globaux. Les questions de formation et d’emploi des
  jeunes, de souveraineté et de compétitivité seront au cœur des discussions. Le sommet
  évoquera également les enjeux de paix et de sécurité en soutien des médiations africaines
  et des actions de l’Union Africaine. Certaines conclusions du sommet Africa Forward
  viendront nourrir la préparation du sommet du G7 , que la France accueillera à Evian
  du 15 au 17 juin. Communiqué conjoint de la France et du Kenya : le sommet « Africa
  Forward » se tiendra à Nairobi (Kenya) les 11 et 12 mai 2026. Discours du Président
  Emmanuel Macron à l''université de Ouagadougou en 2017.'
