title: Appel à l'action – Lutter contre les conséquences des déséqu
text: 'Nous, les Chefs d''État et de gouvernement des pays africains, nous sommes
  réunis les 11 et 12 mai 2026 à Nairobi, au Kenya, lors du Sommet Africa Forward,
  en présence du Président de la République française ainsi que des représentants
  du Fonds Monétaire International (FMI), du Groupe de la Banque mondiale, du Groupe
  de la Banque africaine de développement (BAD), de la Banque européenne pour la reconstruction
  et le développement (BERD), de la Banque européenne d''investissement (BEI), du
  Fonds vert pour le climat (GCF), de la Banque ouest-africaine de développement (BOAD)
  et d''autres acteurs du développement tels que le groupe Agence Française de Développement
  (AFD) et le Pacte pour la Prospérité, les Peuples et la Planète (4P). Nous avons
  eu des échanges fructueux sur la situation économique mondiale actuelle et ses conséquences
  pour l''Afrique. Nous nous sommes réunis dans un contexte de tensions géopolitiques
  et de conflits croissants, tel que le conflit en cours au Moyen-Orient, un contexte
  également de concurrence et d''instabilité géo-économiques, d''inégalités qui se
  creusent, d''incertitudes économiques mondiales croissantes, de fragmentation et
  de déséquilibres macroéconomiques mondiaux, qui affectent de manière disproportionnée
  les économies en développement, particulièrement en Afrique. Ces évolutions aggravent
  les vulnérabilités existantes dans les chaînes d''approvisionnement mondiales, sur
  les marchés de l''énergie et en matière de sécurité alimentaire, avec des conséquences
  préoccupantes pour les économies africaines. Nous rappelons que l''Afrique est à
  la fois un continent d''opportunités et de défis : elle doit faire de sa transition
  démographique un véritable dividende démographique ce qui nécessite de créer un
  marché du travail capable d''absorber plus de 10 millions de jeunes par an. Elle
  doit réussir une urbanisation rapide qui nécessite des infrastructures de base,
  elle doit s’industrialiser et développer de la valeur ajoutée au profit des populations
  locales, permettre des transitions énergétiques justes et l''adaptation au changement
  climatique, et contribuer pleinement aux développements technologiques mondiaux.
  Nous soulignons que le capital humain, le dynamisme et l''innovation de l''Afrique,
  ainsi que ses ressources naturelles, notamment ses minéraux critiques, sont des
  atouts majeurs pour sa croissance future et son développement durable, et devraient
  servir de catalyseurs pour la création de valeur ajoutée locale, la valorisation
  des ressources et la création d’emplois sur le continent. Nous reconnaissons que
  les défis du continent sont exacerbés par les conséquences des déséquilibres macroéconomiques
  mondiaux. La dépendance persistante aux exportations de matières premières dans
  le commerce international (hydrocarbures, cacao, vanille, café et ressources minières),
  le poids des dettes souveraines, le creusement des besoins de financement du développement
  et la diversification limitée des économies africaines constituent une source de
  vulnérabilité. S’ils ne sont pas traités, les déséquilibres mondiaux excessifs,
  qui résultent des déséquilibres des grandes économies mondiales, ne feront qu''accroitre
  cette vulnérabilité. En effet, nous constatons que les surcapacités structurelles,
  associées à des politiques et des pratiques distorsives non conformes aux mécanismes
  du marché, entravent l''industrialisation du continent africain ainsi que le développement
  économique fondé sur les exportations. Nous notons également que la prolifération
  de mesures commerciales unilatérales et non coordonnées pèse sur l''intégration
  de l''Afrique dans l''économie mondiale. Ces surcapacités font baisser artificiellement
  les prix mondiaux des matières premières, sapent la compétitivité des industries
  africaines naissantes et découragent les investissements directs étrangers dans
  les secteurs productifs du continent, freinant ainsi la transformation structurelle
  et la création d''emplois. Ces dynamiques contribuent également à des coûts d''emprunt
  élevés, à des marges de manœuvre budgétaires réduites, à une volatilité des taux
  de change et à un accès réduit à des financements de long terme abordables pour
  le développement des économies africaines. Nous réaffirmons qu''un système commercial
  multilatéral fondé sur des règles, non discriminatoire, juste, ouvert, inclusif,
  équitable, durable et transparent est indispensable. Remédier aux surcapacités,
  réduire les subventions qui faussent la concurrence et garantir un accès équitable
  aux marchés sont essentiels pour permettre l''industrialisation de l''Afrique. Nous
  soulignons la nécessité de promouvoir des chaînes de valeur régionales africaines
  capables de créer des emplois décents, de favoriser le transfert de technologies
  et de renforcer la résilience industrielle du continent. Une croissance économique
  forte, inclusive et durable est le socle de la prospérité économique. Nous appelons
  les grandes économies mondiales à travailler ensemble pour parvenir à des politiques
  macroéconomiques et budgétaires équilibrées et favorables à la croissance, qui soutiennent
  la sécurité et la résilience économiques mondiales, garantissent des marchés financiers
  bien régulés et permettent à l''ensemble de nos citoyens de bénéficier de cette
  croissance. Nous exhortons les grandes économies mondiales à reconnaître leur responsabilité
  commune dans la réduction des déséquilibres excessifs, et à prendre  des engagements
  résolus pour mettre en œuvre des politiques intérieures appropriées et de manière
  coordonnée, afin de rééquilibrer leurs modèles de croissance d''une façon qui soutienne
  une croissance équilibrée et durable pour tous les pays, y compris pour les pays
  émergents et en développement, ces engagements et ces actions coordonnées permettant
  en même temps de réduire les déséquilibres macroéconomiques mondiaux. Nous appelons
  enfin ces économies ainsi que les institutions financières internationales, en particulier
  le FMI, à renforcer la surveillance des déséquilibres mondiaux et à assurer une
  surveillance multilatérale appropriée pour assurer un suivi des engagements pris.
  Nous appelons les institutions financières internationales à mieux prendre en compte
  les vulnérabilités spécifiques des pays africains touchés par les conflits, les
  chocs climatiques et les contraintes structurelles de développement. Nous appelons
  la France, ainsi que le Kenya qui est associé au G7, à porter cette préoccupation
  importante du continent africain au Sommet d''Évian en juin 2026.'
