title: “No Money for Terror” Ministerial Conference.
text: 'The President of the Republic attended the fifth “No Money For Terror” ministerial
  conference on Tuesday, May 19, 2026, at the Ministry of the Economy, Finance, and
  Industrial, Energy, and Digital Sovereignty. Organized as part of France’s G7 presidency,
  this conference brought together in Paris more than 70 international delegations
  committed to combating the financing of terrorism. This meeting provided a unique
  opportunity for the international community to take stock of its commitments and
  reaffirm its determination to tackle this issue. This fifth edition builds on the
  initiative launched by the President of the Republic in Paris in 2018, and continued
  in Melbourne in 2019, New Delhi in 2022, and Munich in 2025. The NMFT conference
  marks a highlight of the Finance track of the French G7 presidency, which has made
  the fight against financial crime one of its priorities. In particular, terrorist
  financing remains a major concern for France and its international partners , given
  the gravity of the persistent threats that terrorist groups pose to the security
  of populations, the stability of societies, and peace. France, considered as one
  of the most effective countries in the fight against financial crime, stands out
  for the quality of its framework for combating money laundering and terrorist financing
  . This is the result of close collaboration among various government agencies and
  coordinated action across ministries. During this conference, discussions addressed
  three current issues:'
