title: Disparition de Béatrice Bellamy.
text: Femme d’engagement et d’expérience, Béatrice Bellamy, députée de Vendée, s’est
  éteinte. Avec elle, la Nation perd l’une de ses élues, passionnément attachée à
  son territoire et à ses idéaux de progrès et d’humanisme. Béatrice Bellamy vit le
  jour en 1966, d’un père médecin et d’une mère infirmière. À Cugand, au bord de la
  Sèvre nantaise où elle grandit, elle cultiva un goût des autres. Elle se consacra
  alors à la santé, comme préparatrice en pharmacie, puis responsable de la phytothérapie
  chez Pierre Fabre, avant de rejoindre Sanofi. Son attachement à la Vendée la poussa,
  en parallèle, à embrasser très jeune la vie politique. Élue conseillère municipale
  de Cugand à seulement 23 ans, elle fut de nouveau élue en 2014 et en 2020 à La Roche-sur-Yon.
  Femme de tête et de cœur, bénévole de longue date, elle s’engagea contre le cancer
  du sein, organisant chaque année une course dédiée dans sa ville, la « Joséphine
  », devenue depuis un évènement national. Béatrice Bellamy fut élue députée en 2022,
  sous les couleurs d’Horizons, avant d’être réélue en 2024. À l’Assemblée nationale,
  elle agit contre les déserts médicaux et pour l’accès aux soins. Ses combats la
  conduisirent aussi à être rapporteure pour avis sur les Jeux olympiques et paralympiques
  de 2024, tout comme une voix indispensable de la lutte contre le sexisme et les
  violences faites aux femmes dans les fédérations sportives. Face à l’épreuve de
  la maladie, Béatrice Bellamy continua d’honorer son mandat et demeura cette figure
  opiniâtre, généreuse, pragmatique, qui manquera au Palais Bourbon comme aux Français.
  Le Président de la République et son épouse s’inclinent devant la mémoire de cette
  Vendéenne, élue de terrain et engagée pour le bien commun. Ils présentent leurs
  condoléances à sa famille, à ses proches et à tous ceux qui l’aimaient.
