title: Disparition d'Ofer Bronchtein.
text: 'Ofer Bronchtein, artisan infatigable de la paix au Proche-Orient, Franco-Israélien
  de cœur et de combat, nous a quittés. Avec lui s’éteint une voix humaniste qui portait
  l’espérance de la paix et donnait toutes ses forces pour la faire advenir. Né en
  1957 à Beer-Sheva, dans le Neguev, Ofer Bronchtein grandit en Israël avant de rejoindre
  la France avec sa famille à l’âge de neuf ans, pour suivre son père, engagé à l’ORTF.
  Ofer Bronchtein y demeura huit ans avant de retourner en Israël, dans un kibboutz
  près du mont Tabor. Il s’installa ensuite à Tel Aviv dans le quartier populaire
  de Shkhunat Hatikva. C’est là, au contact des réalités sociales les plus vives,
  qu’il forgea ses convictions : la justice sociale, la réconciliation, la paix comme
  seul horizon possible. Entrepreneur culturel, militant du Parti travailliste, Ofer
  Bronchtein s’engagea dans la voie du dialogue. En 1987, au mépris de la loi israélienne
  qui prohibait tout contact avec l’Organisation de Libération de la Palestine, il
  rencontra Mahmoud Abbas en Espagne, ce qui lui valut une peine d’incarcération.
  Il ne cessa dès lors d’œuvrer pour le dialogue. Proche du Premier ministre Yitzhak
  Rabin, il vécut de près les négociations qui menèrent aux accords d’Oslo. L’assassinat
  d’Yitzhak Rabin en 1995, puis les années de la seconde Intifada ne réussirent pas
  à déraciner ses espoirs de paix. Cofondateur et président du Forum International
  pour la Paix, installé à Paris, Ofer Bronchtein fut pendant des décennies ce passeur
  déterminé entre deux peuples. En 2011, le président Mahmoud Abbas lui remit un passeport
  palestinien, honorant ainsi une promesse de Yasser Arafat. Personnalité marquante
  de la relation entre la France et Israël, Ofer Bronchtein œuvra à compter de 2020,
  à la demande du Président de la République, pour amorcer un nouveau chapitre des
  négociations de paix au Proche-Orient. Alors que l’attaque terroriste du 7 octobre
  commise par le Hamas précipita la région dans le chaos, il fut de ceux qui voulurent
  voir advenir la reconnaissance de l’Etat de Palestine par la France, affirmée par
  le Président de la République le 22 septembre 2025 à la tribune des Nations Unies.
  Ce jour-là marquait pour lui le jalon d’un long chemin de reconnaissance et de dialogue,
  le terme du « combat de sa vie », et l’injonction à persévérer dans l’œuvre de paix.
  Homme de la société civile, visage d’une génération qui connut l’espoir d’Oslo,
  Ofer Bronchtein avait ce don rare de savoir parler à tous sans chercher à plaire,
  gagnant la confiance par sa franchise, sa personnalité, son énergie infatigable
  malgré la maladie. Le Président de la République et son épouse saluent la mémoire
  d’un homme qui aura consacré chaque heure de sa vie à la cause de la paix et de
  l’humanisme. Ils adressent leurs plus sincères condoléances à sa famille, à ses
  proches, et à tous ceux qui partagent son espérance et perpétueront son œuvre.'
