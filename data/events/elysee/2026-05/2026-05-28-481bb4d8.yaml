title: Joint Statement on the Occasion of the State Visit of the President of the
  Republic of Indonesia to France.
text: On the occasion of the State Visit of the President of the Republic of Indonesia
  to Paris, France, on 28 May 2026, H.E. Emmanuel Macron, President of the French
  Republic, and H.E. Prabowo Subianto, President of the Republic of Indonesia, held
  bilateral talks covering key areas of cooperation and global issues of common interest.
  Against a backdrop of rising geopolitical tensions, shifting global dynamics, and
  pressing climate, environmental, health, and technological challenges, the two Presidents
  reaffirmed their shared determination to deepen their partnership. This cooperation
  will be guided by mutual trust and a strong commitment to rules-based multilateralism.
  They welcomed the sustained momentum of high-level exchanges, including the State
  Visit of President Emmanuel Macron to Indonesia on 27-29 May 2025, and the visits
  of President Prabowo Subianto to France on 13-15 July 2025, 23 January 2026, and
  13-14 April 2026, illustrating the vitality of their strategic partnership. Partnership
  for Sovereignty and Prosperity The two Presidents reaffirmed their commitment to
  strengthening security and defense cooperation and welcomed the convening of the
  12th Indonesia-France Defence Dialogue (IFDD) this year. They supported the expansion
  of training initiatives, including in mounted cavalry units, language training,
  as well as exchanges between the respective police forces on public order management
  and community safety. They also encouraged their respective Ministers to further
  enhance cooperation in the field of armaments, notably through capacity building,
  joint development and defence industry cooperation. They underscored the importance
  of promoting an open and rules-based international trade system and committed to
  fully implement the Comprehensive Economic Partnership Agreement between the European
  Union and Indonesia as soon as possible. They supported the implementation of projects
  of mutual interest and reciprocal investments in transportation, health, energy
  transition, innovation and technology, sustainable mining and critical minerals,
  maritime, and agriculture, with a view to strengthening the EU and Indonesia’s industrial
  competitiveness and their mutual integration into each other’s and global markets.
  In this regard, they highlighted the importance of developing a joint roadmap in
  agriculture to ensure the effective implementation of bilateral cooperation on the
  basis of reciprocity. They welcomed mutually beneficial progress in bovine and equine
  cooperation, as well as noting in particular the progressive opening of market access
  for products of mutual interest, in accordance with their respective laws and regulations.
  They also supported the expansion of cross-border investments, including in downstream
  industries, and encouraged stronger business partnerships, notably through the High-Level
  France-Indonesia Business Council, which convened for the first time under the auspices
  of the two Leaders in Paris on 28 May 2026. Partnership for Peace, International
  Law, Multilateralism, and Global Issues The two Presidents advocated respect for
  sovereignty and territorial integrity, and the promotion of multilateralism based
  on international law, with the United Nations Charter at its core. They rejected
  any use or threat of force and called for the peaceful resolution of disputes, including
  in Palestine, Iran, Ukraine, and Lebanon. They expressed deep concern over the impact
  of ongoing hostilities on civilian lives and infrastructure, and reaffirmed the
  importance of resolving differences through peaceful means, as well as their support
  for freedom of navigation in accordance with the 1982 United Nations Convention
  on the Law of the Sea (UNCLOS). They recalled their Joint Declaration on the Peaceful
  Resolution of the Question of Palestine and the New York Declaration on the Peaceful
  Settlement of the Question of Palestine and the Implementation of the Two-State
  Solution, emphasizing the need to end the illegal occupation of Palestinian territories
  and to achieve a comprehensive, just, and lasting resolution. They also expressed
  deep concern over escalating tensions in the Strait of Hormuz, which threaten regional
  stability and global energy supply, called on all States to prevent further escalation,
  and reaffirmed freedom of navigation, including transit passage and innocent passage
  through the Strait of Hormuz and any strait used for international navigation, in
  accordance with the 1982 UNCLOS. The two Leaders also reaffirmed their commitment
  to a just and lasting peace in Ukraine and elsewhere in the world based on the principles
  of the UN Charter and of international law. They welcomed the signing of the Joint
  Declaration of Intent on Development Cooperation, enabling triangular cooperation
  with third countries, contributing to their national development as well as regional
  stability and prosperity. They also encouraged their relevant ministries and agencies
  to identify priority projects to implement this cooperation. The two Leaders reaffirmed
  their commitment to protecting global public goods. They emphasized their commitment
  to full implementation of the Paris agreement, in accordance with equity and Common
  but Differentiated Responsibilities and Respective Capabilities, in light of different
  national circumstances and priorities. The Just Energy Transition Partnership (JETP)
  in Indonesia, to which France contributes, is an important platform in the fight
  against climate change. On biodiversity and nature protection, they reaffirmed the
  importance of promoting the effective and balanced implementation of the BBNJ Treaty
  and underlined the importance of concluding an international legally binding instrument
  on plastic pollution, including in the marine environment. They also looked forward
  to strengthening partnerships through the Ocean Impact Summit to be held on 8-10
  October 2026 in Bali and the first UN Ocean Conference of Parties under the BBNJ
  agreement in 2027 in New York. The two Leaders also welcomed the opportunity to
  further explore cooperation in forestry, with a view to advancing conservation efforts
  and promoting sustainable forest management and contribute to efforts to reduce
  forest loss and land degradation. Partnership for Culture and Deepening People-to-People
  Exchange to Build the Society of Tomorrow The two Presidents welcomed the France-Indonesia
  Year of Innovation 2026 and expressed their commitment to advancing strategic projects
  that strengthen innovation ecosystems, enhance technological capabilities, and support
  the development of future industries. In this context, Indonesia expressed its interest
  in exploring cooperation with France in research and innovation, including in support
  of the development of a safe, secure, and sustainable nuclear energy infrastructure
  and ecosystem. Building on this momentum, the two Presidents adopted a Joint Declaration
  on education, research, and mobility, emphasizing these as priority areas of bilateral
  cooperation. They also welcomed the convening of the Joint Working Group on Higher
  Education, Research, Innovation, and Entrepreneurship in Angers on 1-3 July 2026.
  The two Leaders further reaffirmed the importance of the Joint Working Group on
  education focused on shared thematic priorities and exploring new areas of cooperation.
  The two Leaders exchanged views on cooperation to strengthen public administration
  education in Indonesia and acknowledged ongoing discussions between their Foreign
  Ministries to advance concrete initiatives aimed at enhancing diplomatic capacity.
  Both Leaders also welcomed the launch of the inaugural Policy Planning Dialogue
  (PPD) between the Foreign Ministries of both countries to be held in Paris in June
  2026, which is expected to provide a mechanism for regular dialogue and exchanges
  of geopolitical analyses, as well as to promote closer cooperation in addressing
  the fragmentation of the global security architecture. The two Presidents further
  welcomed the first Strategic Cultural Dialogue held in Paris on 15 July 2025, and
  encouraged continued implementation of the Joint Declaration on the Strategy in
  the Field of Culture adopted on 29 May 2025. Towards the Establishment of a Comprehensive
  Strategic Partnership The two Leaders expressed their shared vision to elevate bilateral
  relations through the establishment of a future Comprehensive Strategic Partnership
  between France and Indonesia, aimed at fostering a deeper, more productive, and
  mutually beneficial relationship grounded in respect for sovereignty and territorial
  integrity. To this end, they agreed to work towards a concrete framework for the
  Comprehensive Strategic Partnership, building on existing bilateral mechanisms and
  priority areas of cooperation. They encouraged their respective Ministers and relevant
  agencies including their respective development financing institutions to identify
  key deliverables, timelines, and areas for enhanced coordination that contribute
  to the national development priorities and long-term progress of both countries.
