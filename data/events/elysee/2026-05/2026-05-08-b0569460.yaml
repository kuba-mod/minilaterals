title: Le Président de la République a chargé la Ministre déléguée
text: Le Président de la République a chargé la Ministre déléguée auprès de la Ministre
  des Armées et des Anciens combattants, Mme Alice Rufo, de se rendre en Algérie ce
  8 mai. A cette occasion, Mme Alice Rufo se rendra à Sétif pour y commémorer les
  événements tragiques qui y ont eu lieu le 8 mai 1945. Alors même que les Français
  célébraient leur libération, la répression des manifestations dans les villes de
  Sétif, Guelma et Kherrata durait plusieurs semaines et faisait des milliers de victimes. 
  C'est la vérité de notre histoire et c'est l’honneur de la France de la regarder
  en face. Cette démarche témoigne de la volonté du Président de la République de
  traiter des relations entre la France et l’Algérie avec honnêteté, dans le respect
  de toutes les mémoires qui y sont liées. La lucidité avec laquelle la France regarde
  l’histoire doit aujourd’hui permettre de nouer des relations confiantes et prometteuses
  pour l’avenir, dans l’intérêt même des peuples français et algérien. C’est dans
  cette perspective que la Ministre déléguée sera reçue par les autorités algériennes
  avec qui elle évoquera les prochaines étapes de la consolidation de nos relations
  bilatérales. Elle leur dira l’appréciation du Président de la République pour la
  reprise de notre coopération consulaire, sa volonté d’amplifier les résultats déjà
  obtenus et de restaurer un dialogue efficace, respectueux de l’intérêt  national
  de chacun, dans notre intérêt commun. C’est à cette fin que l’Ambassadeur de France
  en Algérie accompagnera la Ministre déléguée et reprendra ses activités. Il travaillera
  sur tous les aspects de notre coopération bilatérale, dans un esprit de réciprocité,
  avec une attention prioritaire au retour en France de notre compatriote, M. Christophe
  Gleizes.
