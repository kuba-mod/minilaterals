title: Joint statement on the situation in the West Bank.
text: 'Over the past few months, the situation in the West Bank has deteriorated significantly.
  Settler violence is at unprecedented levels. The policies and practices of the Israeli
  government, including a further entrenchment of Israeli control, are undermining
  stability and prospects for a two-state solution. International law is clear: Israeli
  settlements in the West Bank are illegal. Construction projects in the E1 area would
  be no exception. The E1 settlement development would divide the West Bank in two
  and mark a serious breach of international law. Businesses should not bid for construction
  tenders for E1 or other settlement developments. They should be aware of legal and
  reputational consequences of participating in settlement construction including
  the risk of involving themselves in serious breaches of international law. We call
  on the Government of Israel to end its expansion of settlements and administrative
  powers, ensure accountability for settler violence and investigate allegations against
  Israeli forces, respect the Hashemite custodianship over Jerusalem’s Holy Sites
  and the historic status quo arrangements, and lift financial restrictions on the
  PA and the Palestinian economy. We strongly oppose those, including members of the
  Israeli government, who argue for annexation and forcible displacement of the Palestinian
  population. We reaffirm our unwavering commitment to a comprehensive, just and lasting
  peace based on a negotiated two-state solution in accordance with relevant UN Security
  Council resolutions where two democratic states, Israel and Palestine, live side
  by side in peace and security within secure and recognised borders.'
