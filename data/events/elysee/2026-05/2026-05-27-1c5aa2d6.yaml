title: Compte rendu du conseil des ministres du 27 mai 2026.
text: 'Retrouvez le compte rendu du conseil des ministres du mercredi 27 mai 2026.
  Le ministre du travail et des solidarités, la ministre de la santé, des familles,
  de l’autonomie et des personnes handicapées et le ministre de l’action et des comptes
  publics ont présenté un projet de loi portant approbation des comptes de la sécurité
  sociale de l’année 2025. Depuis la loi organique n° 2022-354 du 14 mars 2022 relative
  aux lois de financement de la sécurité sociale, un projet de loi d’approbation des
  comptes de la sécurité sociale doit être déposé sur le bureau de l’Assemblée avant
  le 1er juin de l’année suivant celle de l’exercice auquel il se rapporte. Ce texte
  est conçu comme l’équivalent des lois relatives aux résultats de la gestion et portant
  approbation des comptes de l’Etat. Sa mise aux voix est nécessaire avant la discussion
  du projet de loi de financement de la sécurité sociale, conformément à l’article
  L.O. 111-7-1 du code de la sécurité sociale. En 2025, le solde des régimes obligatoires
  de base de la sécurité sociale, y compris le fonds de solidarité vieillesse (FSV),
  s’établit à -21,6 milliards d’euros, contre -15,3 milliards d’euros en 2024. La
  branche maladie est déficitaire à hauteur  de -15,9 milliards d’euros (-13,8 milliards
  d’euros en 2024) et la branche vieillesse à hauteur de -7,1 milliards d’euros  (-
  5,6 milliards d’euros en 2024). Les comptes sociaux sont particulièrement marqués
  en 2025, comme en 2024, par une moindre dynamique de l’inflation, avec dans un premier
  temps des recettes qui ralentissent simultanément, tandis que les dépenses ne décélèrent
  que de façon différée ensuite, conséquence des règles de revalorisation en vigueur.
  Or, cette normalisation de l’inflation en 2025, en s’établissant à 0,9 % (1,8 %
  en 2024) en moyenne annuelle au sens de l’indice des prix à la consommation hors
  tabac, après les pics de 2022 et 2023 (5,3 % et 4,8 % respectivement), a tendance
  à dégrader les comptes l’année où le ralentissement des prix se produit. En conséquence,
  le déficit des régimes de base de la sécurité sociale et du FSV augmente par rapport
  à 2024 (6,3 milliards d’euros) après s’être continuellement amélioré entre le creux
  historique de 2020 (39,7 milliards d’euros) et 2023. Le solde est toutefois moins
  dégradé que ce qui était attendu dans la loi de financement de la sécurité sociale
  (LFSS) pour 2026, qui prévoyait un solde de -23 milliards d’euros. Cet écart de
  +1,4 milliard d’euros s’explique principalement par des dépenses inférieures à celles
  initialement prévues, plus particulièrement celles des branches maladie et famille.
  Les recettes, légèrement supérieures à la prévision, contribuent également à améliorer
  le solde quoique dans une ampleur plus modérée. Le garde des sceaux, ministre de
  la justice, le ministre de l’éducation nationale et la ministre de la santé, des
  familles, de l’autonomie et des personnes handicapées ont présenté un projet de
  loi relatif à la protection des enfants. Un projet de loi ambitieux pour garantir
  à chaque enfant : sécurité, stabilité et avenir. Protéger les enfants est une exigence
  républicaine. Elle impose de garantir à chaque enfant la sécurité, la stabilité
  et les conditions nécessaires à son développement. Trop d’enfants connaissent cependant
  des situations d’instabilité prolongée, des ruptures de parcours, des difficultés
  persistantes d’accès aux soins malgré l’engagement constant des professionnels de
  l’enfance et des départements, et en dépit des avancées décisives des lois de 2007,
  2016 et 2022. Il existe aussi des fragilités dans le contrôle des personnes qui
  interviennent auprès des enfants. Afin de mieux protéger les enfants vulnérables,
  ce projet de loi fait de la protection de l’enfance une politique où l’Etat assume
  pleinement sa responsabilité, aux côtés des départements et de l’autorité judiciaire.
  Sans remettre en cause les acquis des réformes précédentes, il en approfondit la
  portée autour d’une boussole unique, l’intérêt supérieur de l’enfant, et d’une philosophie
  en trois temps : protéger mieux, agir plus tôt, stabiliser durablement. Volontairement
  ramassé autour de mesures concrètes et pragmatiques, il poursuit quatre orientations
  majeures. 1. Sécuriser et stabiliser le parcours de chaque enfant confié Le projet
  de loi rénove le placement judiciaire en réaffirmant son caractère provisoire et
  impose, dès le premier placement, une échéance de réévaluation du statut de l’enfant
  et de son projet de vie. Il ouvre la possibilité d’un placement de plus longue durée,
  jusqu’à la majorité pour les enfants d’au moins treize ans, lorsque l’intérêt de
  l’enfant le commande et avec des garanties de stabilité. Lorsqu’un retour auprès
  des parents n’est pas envisageable, il adapte la procédure de délaissement parental
  pour la rendre plus rapide, encourage le recours à l’adoption simple et autorise
  le placement en vue d’adoption sous le contrôle du juge des enfants. 2. Remettre
  l’accueil de type familial au cœur de la protection de l’enfance Le projet de loi
  a pour objectif de favoriser et déployer autant que possible les modalités d’accueil
  à caractère familial. Le texte fait de la recherche d’un tiers digne de confiance
  un réflexe : son évaluation devient obligatoire dans les trois mois suivant un placement,
  même en urgence. L’accueil durable et bénévole est indemnisé. Le statut des assistants
  familiaux est modernisé afin de soutenir l’attractivité d’une profession indispensable
  au bon fonctionnement de la protection de l’enfance. 3. Garantir la sécurité de
  tous les enfants, où qu’ils soient Le projet de loi crée l’ordonnance de sûreté
  de l’enfant, qui remplace l’ordonnance de placement provisoire et permet au juge
  des enfants comme au procureur de la République d’agir face à un danger grave et
  immédiat y compris lorsqu’il émane d’un parent : interdiction de contact, attribution
  de la jouissance du logement familial, articulation clarifiée entre le juge des
  enfants et le juge aux affaires familiales. Le contrôle des antécédents judiciaires
  est par ailleurs systématisé pour l’ensemble des professionnels, intervenants et
  bénévoles présents auprès des enfants accueillis en protection de l’enfance, mais
  aussi dans les écoles, les accueils périscolaires et de loisirs, et les établissements
  de santé. Le droit à un environnement sûr ne doit dépendre ni du lieu ni du statut
  de l’enfant. Le projet de loi renforce la qualité et la sécurité des lieux d’accueil
  en soumettant certaines structures à un régime d’autorisation renforcé. Il améliore
  les échanges d’informations entre les différents acteurs de la protection de l’enfance,
  territoriaux et nationaux. 4. Adapter l’action éducative et lever les blocages du quotidien
  Le texte assouplit le recueil de l’accord parental pour la mise en place d’un accompagnement
  éducatif administratif et rend modulables les mesures d’assistance éducative en
  milieu ouvert. Il autorise aussi le service gardien à accomplir, en cas de silence
  ou de négligence des parents, les actes nécessaires à la santé de l’enfant. Ces
  simplifications visent à éviter les situations de blocage qui nuisent à l’intérêt
  supérieur de l’enfant. Par ce texte, le Gouvernement engage une refondation de la
  protection de l’enfance. Il donne aux professionnels des leviers pour agir, aux
  enfants confiés un horizon stable, et à la République les moyens de tenir l’exigence
  qui est la sienne : protéger tous les enfants. Le ministre de l’Europe et des affaires
  étrangères a présenté un projet de loi autorisant l’approbation de l’Accord multilatéral
  entre autorités compétentes portant sur l’échange des informations GloBE. Cet accord
  multilatéral, signé le 9 juillet 2025 à Paris, définit les règles et procédures
  nécessaires pour permettre aux entreprises concernées d’effectuer des déclarations
  centralisées ainsi que l’échange d’informations avec les administrations fiscales
  des pays partenaires. Il constitue ainsi une nouvelle étape clé dans la mise en
  œuvre de la réforme garantissant une imposition minimale mondiale des groupes d’entreprises
  multinationales et des groupes nationaux, communément appelée « Pilier 2 ». Cet
  accord constitue un axe majeur de simplification administrative pour les entreprises
  dans le champ de l’impôt minimum mondial. Il permet aux groupes de réaliser un dépôt
  unique de la déclaration GloBE dans un des Etats ou territoires mettant en œuvre
  l’accord, plutôt qu’un dépôt local dans chaque Etat et territoire d’implantation
  de leurs filiales. Conformément à la recommandation publiée par l’OCDE le 18 mai
  dernier, les entreprises peuvent procéder à un dépôt centralisé en France pour les
  entités de leur groupe situées dans l’un des Etats identifiés par l’OCDE comme prêts
  à participer à l’échange d’informations dès cette année. Dans cet esprit, si l’un
  des Etats participants n’était finalement pas en mesure de mettre en œuvre cet échange
  d’information d’ici à la fin de l’année, les filiales françaises de groupes multinationaux
  pourront procéder à un dépôt local en France d’ici au 31 décembre 2026 sans encourir
  de sanction. Enfin, l’administration française appréciera avec bienveillance la
  situation des entreprises ayant pris des mesures raisonnables pour se mettre en
  conformité au regard de leurs obligations déclaratives de notification et de dépôt
  de la déclaration GloBE au 30 juin 2026. Le conseil des ministres a adopté les mesures individuelles
  suivantes : - M. Pierre-André DURAND, administrateur de l’Etat, est nommé conseiller
  maître en service extraordinaire à la Cour des comptes, à compter du 29 juin 2026
  ; - M. Thierry BONNIER, administrateur de l’Etat, est nommé conseiller maître en
  service extraordinaire à la Cour des comptes, à compter du 29 juin 2026. Sur proposition
  du ministre de l’intérieur : - M. Georges-François LECLERC, administrateur de l’Etat,
  est nommé préfet de la région d''Ile-de-France, préfet de Paris ; - M. Brice BLONDEL,
  conseiller maître à la Cour des comptes, est nommé préfet des Yvelines ; - M. Michel
  PROSIC, administrateur de l’Etat, est nommé préfet de la Charente-Maritime ; - Mme
  Véronique DEPREZ-BOUDIER, administratrice de l’Etat, est nommée préfète de la Haute-Corse
  ; - Mme Magali DAVERTON, administratrice de l’Etat, est nommée préfète déléguée
  pour l''égalité des chances auprès du préfet du Val-de-Marne ; - M. Fabrice RIGOULET-ROZE,
  administrateur de l’Etat, est nommé préfet de la région Occitanie, préfet de la
  Haute-Garonne, à compter du 29 juin 2026 ; - M. Sébastien CAUWEL, administrateur
  de l’Etat, est nommé préfet de Tarn-et-Garonne, à compter du 1er juin 2026 ; - M.
  Pascal GAUCI, administrateur de l’Etat, est nommé préfet de l’Aube. Sur proposition
  du garde des sceaux, ministre de la justice : - M. Pascal COURTADE, administrateur
  de l’Etat, est nommé directeur général de l’administration pénitentiaire, à compter
  du 1er juin 2026 ; - M. Olivier BOYER est nommé conseiller d’Etat en service extraordinaire.
  Sur proposition du ministre de l’économie, des finances et de la souveraineté industrielle,
  énergétique et numérique : - M. Emmanuel MOULIN, administrateur de l’Etat, est nommé
  gouverneur de la Banque de France, à compter du 2 juin 2026 ; - M. François VILLEROY
  DE GALHAU est nommé gouverneur honoraire de la Banque de France. Le ministre du
  travail et des solidarités, la ministre de la santé, des familles, de l’autonomie
  et des personnes handicapées et le ministre de l’action et des comptes publics ont
  présenté un projet de loi portant approbation des comptes de la sécurité sociale
