title: Déclaration sur une stratégie conjointe franco-indonésienne sur l’éducation,
  la recherche et la mobilité.
text: 'Le Président de la République française, S.E. M. Emmanuel Macron, Le Président
  de la République d''Indonésie, S.E. M. Prabowo Subianto, Rappelant que, depuis l’établissement
  des relations diplomatiques en 1950, la France et l’Indonésie ont construit un partenariat
  étroit et mutuellement bénéfique, Soulignant l’intensification et la diversification
  croissante de leur coopération dans les domaines de l’éducation, de l’enseignement
  supérieur et de la recherche depuis l’Accord de coopération culturelle et technique
  signé le 20 septembre 1969, la déclaration conjointe de partenariat stratégique
  adoptée le 1er juillet 2011, le plan d’action pour l’approfondissement du partenariat
  stratégique pour la période 2022-2027 adopté le 24 novembre 2021 et la déclaration
  conjointe « Horizon 2050 » adoptée le 28 mai 2025, Réitérant l’importance qu’ils
  attachent à l’Année France-Indonésie de l’innovation 2026 en tant qu’initiative
  phare et outil structurant de leur coopération dans le domaine de la connaissance
  et du développement humain, ainsi qu’en tant que moyen de favoriser un partenariat
  tourné vers l’avenir et mutuellement bénéfique dans le progrès technologique et
  les industries futures, Convaincue que la connaissance et la science sont la meilleure
  réponse aux défis contemporains, Adopter la présente Déclaration définissant une
  stratégie commune pour l''éducation, la recherche et la mobilité. 1. La France et
  l’Indonésie reconnaissent le rôle central d’une éducation inclusive, équitable et
  de qualité et de la diversité des connaissances, ainsi que d’une recherche scientifique
  ouverte et éthique fondée sur l’excellence académique et la promotion de l’intégrité
  de l’information, pour répondre aux grands défis contemporains : changement climatique,
  sécurité alimentaire, santé mondiale, biodiversité, transition énergétique et transformation
  numérique. 2. La France et l’Indonésie réaffirment leur engagement en faveur de
  l’égalité de genre dans l’éducation, notamment en favorisant l’accès des filles
  et des femmes aux domaines des STEM (sciences, technologies, ingénierie et mathématiques),
  en renforçant leur participation dans les secteurs émergents tels que l’intelligence
  artificielle et en soutenant l’autonomisation économique des femmes par l’éducation
  et le développement des compétences. 3. En conséquence, la France et l’Indonésie
  ont décidé d’établir une stratégie commune dans le domaine de l’éducation, de la
  recherche et de la mobilité pour structurer et développer leur coopération, sur
  la base d’une approche de partenariat et de co-contribution, et exploreront les
  possibilités d’étendre cette coopération, y compris par le biais de cadres de coopération
  Sud-Sud et triangulaire, permettant le partage des connaissances et des meilleures
  pratiques avec d’autres pays en développement. 4. Réaffirmant leur attachement au
  Plan d’action commun dans le domaine de l’éducation signé à Paris en mai 2023, la
  France et l’Indonésie souhaitent approfondir leur coopération dans les domaines
  de la formation des enseignants, de la formation professionnelle et de la promotion
  du multilinguisme. 5. La France et l’Indonésie réaffirment l’importance de la formation
  des enseignants, y compris dans les filières d’enseignement professionnel, en tant
  que moteur essentiel de la qualité de l’éducation. Ils encourageront la coopération
  et la mise en réseau entre leurs institutions respectives de formation des enseignants,
  notamment les Instituts nationaux français de l''enseignement supérieur et de l''enseignement
  (INSPE) et leurs homologues indonésiens, afin de renforcer la portée territoriale
  et l''impact des initiatives conjointes au profit des professionnels de l''éducation,
  des enseignants et des étudiants des deux pays. 6. Reconnaissant l’importance de
  l’éducation dès le plus jeune âge, les deux pays s’engagent également à renforcer
  la coopération en matière d’éducation de la petite enfance en tant que fondement
  de l’apprentissage tout au long de la vie et du développement inclusif impliquant
  l’Agence pour l’éducation française à l’étranger (AEFE) et le réseau INSPE, ainsi
  que le ministère indonésien de l’enseignement primaire et secondaire. 7. En matière
  de formation professionnelle, les deux pays s''engagent à poursuivre et à développer
  les initiatives dans le domaine de l''hôtellerie et des arts culinaires. 8. Les
  deux pays se félicitent de la collaboration entre les ministères indonésiens du
  Tourisme et de l’Enseignement supérieur, et le ministère français de l’Éducation,
  dans la mise en place de programmes qui créent des opportunités pour les jeunes
  Indonésiens de venir en France pour la formation puis l’apprentissage dans les hôtels
  et les restaurants. Les deux pays conviennent de poursuivre et d''étendre cette
  initiative, notamment par des mesures de cofinancement. 9. Ils soutiennent les travaux
  en cours pour proposer un programme de formation des formateurs en restauration
  collective, en soutien au programme indonésien de repas gratuits (Makan Bergizi
  Gratis - MBG), et appellent à sa mise en œuvre dès le second semestre 2026. 10.
  Reconnaissant l''importance d''une communication efficace dans la coopération internationale,
  les deux pays continueront de promouvoir le multilinguisme en soutenant la formation
  linguistique, y compris pour les fonctionnaires, en encourageant l''enseignement
  et la promotion de leur langue et de leur culture respectives, et en faisant progresser
  des initiatives conjointes telles que la formation des enseignants de langues. 11.
  La France et l’Indonésie réaffirment l’importance de la coopération en matière de
  développement du capital humain pour les fonctionnaires, y compris les programmes
  de formation, les échanges et les activités de développement professionnel (y compris
  pour les inspecteurs et les maîtres d’école). 12. Les deux pays se félicitent de
  la coopération en cours entre leurs académies diplomatiques et se déclarent intéressés
  à explorer une éventuelle collaboration avec l''Institut national du Service Public
  pour soutenir le développement des talents de l''administration publique et du gouvernement.
  13. La France et l’Indonésie soulignent le caractère de longue date de leur coopération
  en matière de recherche scientifique, qui s’est étendue à diverses disciplines.
  14. Les deux pays sont convaincus que la recherche fondamentale sert la société
  et encourage les collaborations, telles que les publications conjointes dans des
  revues internationales à comité de lecture, tout en assurant des arrangements équitables,
  transparents et mutuellement convenus sur les droits de propriété intellectuelle,
  conformément aux réglementations applicables. Ils s’engagent à promouvoir l’intégrité
  de l’information et à défendre la science, en particulier dans les domaines de la
  triple crise planétaire du changement climatique, de la biodiversité et de la pollution.
  15. La France et l’Indonésie réaffirment leur engagement en faveur d’une coopération
  bilatérale solide et structurée dans les domaines de l’éducation, de la recherche
  scientifique et de la mobilité universitaire. Un accent particulier est mis sur
  le soutien de la coopération interdisciplinaire et la poursuite de projets innovants
  couvrant tous les domaines scientifiques. 16. Reconnaissant l’importance des initiatives
  de recherche conjointes, des copublications et des conférences scientifiques, la
  France et l’Indonésie soulignent leur engagement à renforcer la coopération scientifique
  bilatérale et à faire progresser l’échange de connaissances et d’expertise entre
  leurs pays. 17. Les deux pays réaffirment leur soutien aux cadres de cofinancement
  établis pour attirer des chercheurs de haut niveau dans les domaines de l''ingénierie,
  de la médecine, des sciences naturelles et d''autres domaines mutuellement convenus.
  En outre, les deux pays soulignent que la mobilité des chercheurs est fondamentale
  pour établir des partenariats internationaux durables et impactants, y compris des
  visites scientifiques de haut niveau. 18. La France et l’Indonésie saluent les engagements
  de longue date des institutions de recherche françaises en Indonésie, notamment
  le Centre national de la recherche scientifique (CNRS), l’Institut de recherche
  pour le développement (IRD), le Centre de coopération internationale en recherche
  agricole pour le développement (CIRAD) et l’École française d’Extrême-Orient (EFEO).
  19. Les deux pays prennent également acte de la signature de la lettre d’intention
  signée à Jakarta le 28 mai 2025 entre BRIN et le CNRS, et de la collaboration dans
  l’organisation de la conférence scientifique « Une seule santé » en novembre 2025.
  20. La création d’écoles de sciences et le développement de projets et de laboratoires
  de recherche internationaux entre le CNRS et des partenaires tels que BRIN constitueront
  une étape importante pour la collaboration bilatérale en matière de recherche et
  un ajout important au fonctionnement en cours dans les laboratoires communs internationaux,
  ainsi que le lancement récent de projets de partenariat dans des secteurs tels que
  l’agriculture, le cacao et l’avancement de la nutrition. 21. Les visites réciproques
  de dirigeants scientifiques sont encouragées comme des occasions clés d''explorer
  de nouvelles voies de partenariat, y compris la détection précoce des tsunamis,
  l''agroforesterie durable et la gestion des forêts, le tout dans l''intérêt des
  deux sociétés et de leur environnement. 22. Les deux pays reconnaissent la valeur
  du renforcement des liens maritimes, illustré par les échanges bilatéraux et la
  collaboration scientifique, y compris le dialogue maritime bilatéral et les expéditions
  conjointes. Ces initiatives favorisent les collaborations et les partenariats universitaires
  et de recherche tout en encourageant la compréhension et l''exploration de nouvelles
  possibilités. 23. Dans le domaine de la santé, après le Sommet One Health à Lyon
  du 5 au 7 avril 2026 et marqué par un engagement actif de l’Indonésie, les efforts
  conjoints pour lutter contre la résistance aux antimicrobiens, prévenir les zoonoses,
  minimiser les effets négatifs sur la santé des aliments ultra-transformés, ainsi
  que le soutien aux efforts en cours de l’Indonésie pour établir un comité interministériel
  national One Health, la France et l’Indonésie célèbrent les initiatives de collaboration
  entre les universités, les hôpitaux, les secteurs privés et les organisations philanthropiques,
  en mettant particulièrement l’accent sur la formation médicale. Les deux pays s’engagent
  à mettre en œuvre la déclaration d’intention sur la santé signée le 27 mai 2024
  au niveau ministériel, qui prévoit une coopération dans les forums multilatéraux
  et un travail conjoint sur quatre thèmes : le renforcement des services et systèmes
  de santé ; la coopération hospitalière, notamment en médecine d’urgence ; les technologies
  de la santé ; la formation du personnel de santé (y compris la promotion de l’apprentissage
  du français pour permettre aux Indonésiens d’accéder aux études médicales et aux
  stages dans les établissements hospitaliers), ainsi que le protocole d’entente sur
  la préparation, la prévention, la détection et la réponse aux zoonoses signé le
  7 avril 2026. 24. Pour favoriser le dialogue maritime bilatéral entre les deux pays,
  l’Indonésie et la France soutiennent l’intégration des questions maritimes dans
  l’éducation et la recherche. En particulier, les deux pays soutiennent le développement
  d’aires d’éducation marine et l’organisation d’événements qui sensibilisent leurs
  populations aux défis de la triple crise mondiale. 25. La transition énergétique
  est une autre pierre angulaire, les deux pays s’engageant à explorer la recherche
  conjointe sur les énergies non fossiles, les sources d’énergie et à revitaliser
  leur coopération de longue date dans le nucléaire civil (notamment à travers le
  Consortium France Indonésie en Ingénierie et Gestion du FICEM) ou la recherche scientifique,
  ainsi qu’à mettre l’accent sur les échanges universitaires et scientifiques. 26.
  En outre, la France et l’Indonésie se réjouissent de l’approfondissement des échanges
  entre les hauts responsables, qui visent à favoriser un dialogue constructif et
  à promouvoir la collaboration universitaire. 27. La France et l’Indonésie notent
  l’importance des efforts de collaboration dans des domaines tels que l’archéologie,
  la littérature et l’histoire, qui renforcent la compréhension culturelle mutuelle
  de leurs cultures et de leur patrimoine respectifs. 28. Dans ce contexte, les deux
  pays notent la collaboration entre les institutions françaises et les universités
  indonésiennes pour favoriser les échanges scientifiques et académiques et exploreront
  la coopération future, notamment par le biais de travaux et de publications communs,
  ainsi que de financements. Ils soulignent également la collaboration réussie dans
  l''organisation de congrès scientifiques internationaux. 29. La France et l’Indonésie
  renforceront les programmes de mobilité ciblant l’accueil des étudiants, des enseignants
  et des chercheurs dans leurs pays respectifs, notamment dans les domaines prioritaires
  des relations bilatérales, en augmentant le nombre d’accords universitaires et en
  poursuivant les programmes de bourses cofinancées. Les deux pays accueillent favorablement
  le programme de bourses France-LPDP pour les candidats à la maîtrise et au doctorat.
  Ils encourageront les accords de double diplôme et l''excellence académique par
  l''intégration de l''enseignement supérieur avec la recherche scientifique de haut
  niveau. Le développement d’accords ciblés entre le LPDP et des institutions françaises
  reconnues pour leur excellence en enseignement et en recherche sera encouragé. 30.
  Le développement du double diplôme entre les établissements d’enseignement français
  et indonésien est un levier efficace pour développer la mobilité étudiante dans
  un cadre de coopération institutionnelle solide. Les programmes de double diplôme
  sont des instruments pour le développement de la coopération visant à la mobilité
  des étudiants. L’implication des universités PTN-BH en Indonésie dans ce type de
  coopération est fortement encouragée. Les deux pays mobiliseront leurs programmes
  nationaux de financement et de bourses d''études pour favoriser les échanges scientifiques
  et universitaires. 31. La France et l’Indonésie encourageront également la reconnaissance
  de leurs certifications linguistiques nationales réciproques (DELF / DALF pour les
  étudiants indonésiens souhaitant étudier en France et BIPA pour les étudiants français
  souhaitant étudier en Indonésie) comme critère de compétence linguistique pour la
  sélection dans leurs programmes nationaux de bourses. 32. Ils sont engagés dans
  une coopération continue avec les principaux instituts de recherche et laboratoires.
  33. Les deux pays s''engagent à améliorer la mobilité bilatérale des étudiants à
  tous les niveaux universitaires, y compris le programme Garuda pour les étudiants
  de premier cycle, y compris pour la formation en français. 34. Pour mettre en œuvre
  cette Stratégie conjointe sur l’éducation, la recherche et la mobilité, la France
  et l’Indonésie favoriseront une collaboration étroite entre leurs missions diplomatiques,
  ministères concernés, organismes de recherche, établissements d’enseignement supérieur,
  ainsi que les parties prenantes publiques et privées, notamment par la mise en place
  d’un mécanisme de coordination conjoint, la désignation de points focaux et l’élaboration
  d’une feuille de route de mise en œuvre assortie de délais, complétant la feuille
  de route qui sera adoptée dans le cadre de la présente Stratégie. 35. Les deux pays
  se félicitent de la convocation du 14e Groupe de travail conjoint franco-indonésien
  sur l’enseignement supérieur, la recherche, l’innovation et l’entrepreneuriat, organisé
  à Angers par l’Université d’Angers et l’ESSCA les 1er, 2 et 3 juillet 2026. Une
  feuille de route transformant les orientations de cette stratégie en projets opérationnels
  et concrets sera adoptée à cette occasion. 36. La France et l’Indonésie feront périodiquement
  le point sur la mise en œuvre de cette stratégie par le biais d’un groupe de travail
  conjoint composé de représentants de leurs missions diplomatiques, ministères, agences
  et institutions concernés, ainsi que par des consultations annuelles ou bilatérales
  régulières, soutenues par un mécanisme structuré de suivi et d’évaluation et l’échange
  de bonnes pratiques pour en assurer l’efficacité, la durabilité et l’impact à long
  terme. 37. Les deux pays promouvront conjointement cette stratégie et mettront en
  évidence les résultats de leur coopération dans les domaines de l''éducation, de
  la recherche et de la mobilité. 38. Toutes les activités entreprises par les institutions
  françaises et indonésiennes doivent être conformes et soumises aux lois et réglementations
  en vigueur dans chaque pays.'
