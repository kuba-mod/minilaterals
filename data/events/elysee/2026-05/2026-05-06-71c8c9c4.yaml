title: 'Africa Forward: Africa-France Partnerships for Innovation and Growth Summit.'
text: 'Kenya and France will jointly hold the “Africa Forward Summit: Africa-France
  Partnerships for Innovation and Growth” in Nairobi on 11 and 12 May 2026. The President
  of the French Republic, the President of the Republic of Kenya and other African
  heads of State and Government will attend. The African Forward Summit is a milestone
  in relations between France and the African continent, nearly ten years after the
  speech of the French President’s speech in Ouagadougou. This is the first summit
  of its kind to be hosted and co-chaired with an English-speaking country. It reflects
  robust and balanced Africa-France partnerships built in support of each country’s
  economic development – because they are based on real complementarities – and to
  the benefit of populations. These partnerships must also contribute to fairer and
  more inclusive global governance, which rejects bloc mindsets, predation and new
  imperialist tendencies and are now more than ever proving their worth. The Africa
  Forward Summit will illustrate the rich and dynamic relations between the African
  continent and France through the diversity of participants, which include States,
  business leaders, young people, artists, civil societies and diasporas. It will
  be an opportunity to highlight the commitment of France, Kenya and other African
  countries to stepping up mutual investment and to building and financing tangible
  solutions to common challenges, including health system strengthening, food sovereignty,
  digital competitiveness, energy access and connectivity. It builds on the Summit
  on the Financing of African Economies held in Paris in 2021, the New Global Financing
  Pact held in Paris in 2023 and the Africa Climate Summit held in Nairobi the same
  year, as well as the European Union-African Union Summit held in Luanda in November
  2025. 11 May’s theme is “Inspire and Connect” and it will begin with a Business
  Forum that will highlight the breadth of France-Africa economic partnerships and
  promote projects and initiatives conducted in African and French private sectors.
  There will be several special events focused on young people and sectors of excellence
  that generate jobs and build cohesion, including sports and cultural and creative
  industries. 12 May will be devoted to development finance and global issues. Youth
  employment and training, sovereignty and competitiveness will be at the core of
  discussions. The Summit will also discuss peace and security in support of African
  mediation and African Union action. Certain conclusions of the Africa Forward Summit
  will provide substance for preparations of the G7 Summit , which France will host
  in Evian from 15 to 17 June.'
