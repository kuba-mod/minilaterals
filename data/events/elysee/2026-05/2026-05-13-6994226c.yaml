title: Déclaration de Nairobi pour la paix et la securité en Afriqu
text: 'Réunis à l''occasion du segment du Sommet Africa Forward consacré aux questions
  de paix et de sécurité le 12 mai 2026 à Nairobi ; Considérant que l''instabilité du
  monde, les remises en cause du multilatéralisme et du droit international et l''intensification
  de la concurrence entre puissances menacent la paix, la sécurité et le développement
  durable en Afrique ; Les co-présidents français et kenyan ainsi que les chefs d''État
  et de gouvernement participants réaffirment les principes suivants : - Ils rappellent
  leur conviction qu''un multilatéralisme efficace et inclusif, fondé sur le droit
  international et la Charte des Nations Unies, et dont l''Union africaine et les
  organisations sous-régionales africaines sont l''expression à l''échelle continentale,
  sont constitutifs d''un état de paix durable. - Ils défendent une gouvernance mondiale
  renouvelée, capable de répondre aux défis du XXIe siècle. Ils reconnaissent l''urgence
  d''une réforme globale du Conseil de sécurité des Nations Unies pour le rendre plus
  efficace et représentatif, en phase avec les objectifs de la Position africaine
  commune, notamment le Consensus d''Ezulwini et la Déclaration de Syrte, et réaffirment
  leur détermination à œuvrer de concert à cette fin. - Ils affirment qu''un usage
  responsable du véto contribue à renforcer la crédibilité et l''autorité morale du
  Conseil de sécurité de I''ONU, et appellent les membres permanents du Conseil de
  sécurité à s''abstenir d''utiliser le véto en cas d''atrocités de masse, lorsque
  des crimes de génocide, des crimes contre l''humanité et des crimes de guerre à grande
  échelle sont commis. - Ils appuient les opérations de paix africaines et appellent
  à la mise en œuvre de la résolution 2719 du Conseil de sécurité des Nations Unies,
  sans préjudice de la primauté du Conseil de sécurité, pour en assurer l''opérationnalisation
  et le financement adéquat, prévisible et durable. - Ils soutiennent le renforcement
  des capacités des armées africaines dans le respect du principe de souveraineté et
  de l''architecture africaine de paix et de sécurité sur lesquels repose la stabilité du
  continent. - Ils rejettent les ingérences extérieures qui sapent les efforts visant
  à réaliser les aspirations de l''Agenda 2063 de l''UA, et la privatisation de la
  sécurité, conformément aux statuts pertinents de l''OUA/UA sur l''élimination du
  mercenariat en Afrique. - Ils réaffirment que les Africains doivent rester parties
  prenantes aux médiations sur les crises qui les affectent et rappellent la centralité
  de l''Union africaine, des Communautés économiques régionales et des Mécanismes
  régionaux (RM) pour offrir une plateforme de médiation inclusive et construire une
  paix durable. - Ils réaffirment la primauté des solutions politiques négociées fondées
  sur le respect du droit international, de la souveraineté et de l''intégrité territoriale
  des États, pour le règlement des crises. Ils réaffirment leur engagement à respecter
  le droit international humanitaire dans les conflits armés qui affectent la région
  et appellent tous les États à se joindre a l''initiative mondiale visant à revitaliser
  l''engagement politique en faveur du droit international humanitaire. - Ils expriment
  leur profonde préoccupation face à la menace persistante du terrorisme et de l''extrémisme
  violent sur le continent et leur solidarité avec les personnes qui en sont victimes.
  Ils soulignent l''importance d''une approche globale, combinant mesures sécuritaires
  et réponses politiques, sociales et économiques pour traiter durablement ces phénomènes.
  - Ils rappellent que face aux crises, l''aide humanitaire reste essentielle pour
  répondre aux urgences et protéger les populations les plus vulnérables, les médiations
  inclusives permettent de rétablir le dialogue, de prévenir l''escalade des tensions
  et de promouvoir des solutions durables et le financement du développement est un
  levier clé pour s''attaquer durablement aux causes profondes et renforcer la résilience.
  - Ils appellent au renforcement des capacités institutionnelles et des mécanismes
  de sécurité collective pour faire face aux conflits en cours au Soudan, au Soudan
  du Sud, dans la région des Grands Lacs, en Somalie et dans la région du Sahel par
  la cessation des hostilités, le dialogue inclusif, la lutte contre le terrorisme,
  le renforcement des capacités et la stabilisation régionale. -  Ils soulignent le
  lien entre la sécurité et la croissance économique inclusive, l''autonomisation
  des jeunes, l''éducation, la résilience climatique et l''engagement des populations
  diasporiques'
