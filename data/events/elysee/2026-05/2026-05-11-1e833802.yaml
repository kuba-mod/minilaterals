date: '2026-05-11'
type: press_release
source_name: elysee
title: 'Sommet Africa Forward au Kenya : première journée.'
text: 'Le Président de la République s''est rendu au Kenya du 10 au 12 mai 2026 dans
  le cadre du Sommet Africa Forward. Le Sommet « Africa Forward : des partenariats
  entre l’Afrique et la France pour l’innovation et la croissance » vise à accentuer
  les échanges économiques et les investissements et à consolider les réponses communes
  face aux grands défis globaux. Cette première journée du Sommet était consacrée
  à la jeunesse. À leur arrivée à l''Université de Nairobi, le Président Emmanuel
  Macron et le Président kenyan William Ruto ont participé à une première séquence intitulée
  « Future Makers ». 22 juillet 2026 - Seul le prononcé fait foi D''abord, merci,
  Président, de nous accueillir, pas simplement à Nairobi, mais dans ton alma mater
  et dans ton université. Merci à l''université de nous accueillir et vraiment à ces
  mots d''accueil très forts et à tous. Moi, j''avais plutôt envie de continuer à
  écouter. Je deviens un vétéran dans cette mission. Ça fait neuf ans que je me bats
  pour essayer de changer beaucoup de choses du rapport entre la France et l''Afrique,
  l''Europe et l''Afrique. C''était magnifique de vous écouter tous les quatre, parce
  que vous avez très bien parlé. En vous écoutant, je me disais : au fond, il faut
  les laisser faire. La première chose, pourquoi il fallait changer ce continent ?
  Normalement, ce type de sommet aurait commencé par une rencontre entre les dirigeants
  français-africains ou européens-africains, et les dirigeants européens, français,
  seraient venus et auraient expliqué aux dirigeants africains et après peut-être
  à la société civile vaguement : « On a bien regardé votre situation, voilà ce qui
  est bon pour vous, on va vous aider ». Je crois que c''est plus du tout ce dont
  l''Afrique a besoin et ce qu''elle veut entendre. Le Président l''a très bien dit
  hier. Il dit : « Nous, on ne veut plus ça, on n''a pas besoin que vous nous aidiez
  ». Et ça tombe bien parce que nous, on n''a plus totalement les moyens non plus,
  si on est lucide. En plus, ça crée plein de tensions. On a toujours des polémiques
  à la maison. Les gens disent : vous les aidez, puis après, on a déjà tellement de
  problèmes, etc. Non ! L''Afrique est en train de réussir. C''est le continent le
  plus jeune au monde, c''est le continent qui a le plus de croissance au monde. Donc
  juste l''Afrique a besoin d''investissements pour être plus souveraine, Kate l’a
  très bien dit et nous, on a envie d''être des partenaires d''égal à égal parce qu''en
  fait, on a exactement le même combat à mener en Europe. En vrai, c''est exactement
  ça qui se joue. Et on commence ce Sommet Africa Forward en vous écoutant, vous la
  jeunesse du continent africain, nous dire : « Voilà mes rêves, mes ambitions, ce
  que je suis déjà en train de faire ». Nous, on vient en disant : « OK, nous, on
  a des investissements à faire, c''est intelligent pour vous, c''est bon pour nous,
  on le fait ensemble ». Et nos défis sont jumeaux. Nos défis sont exactement ceux
  que vous avez décrits, qu''il s''agisse de technologie, d''IA, de paiement, ou qu''il
  s''agisse, comme on dit aujourd''hui, d''industrie culturelle et créative, ou de
  récits. Vous l''avez très bien dit, Aicha, tout à l''heure. Quel est notre défi
  commun, Europe et Afrique ? C''est de ne pas dépendre. Il y a une opposition entre
  les entrepreneurs et les consommateurs. Les solutions sont conçues aux États-Unis
  ou en Chine. Lorsqu''on parle de l''intelligence artificielle, beaucoup d''entre
  nous, aujourd''hui, sommes des consommateurs. Nous avons une bataille partagée au
  niveau de l''investissement pour construire l''autonomie stratégique pour l''Europe
  et l''Afrique. Si nous travaillons ensemble, nous serons d''autant plus forts. Donc
  nous avons besoin d''infrastructures. C''est le défi que nous devons également relever
  en Europe pour augmenter les capacités. Si nous voulons construire une infrastructure,
  nous devons investir ensemble et c''est le défi auquel est confronté le Président
  Ruto. Aucune infrastructure n''est possible sans l''énergie. Nous devons construire
  des infrastructures renouvelables et nucléaires afin de déployer l''électrification
  pour les foyers et les entreprises en Afrique. Mais afin d''augmenter les capacités,
  nous devons relever ce premier défi. Lorsque nous parlons de l''infrastructure,
  nous parlons vraiment de la souveraineté. Ce partenariat avec FoxConn constitue
  un exemple parfait de ce récit de souveraineté partagé. C''est une entreprise africaine,
  européenne et taïwanaise. Nous tous, nous devons confronter ce défi de la souveraineté
  et réduire notre dépendance. Donc, nous devons travailler sur l''infrastructure.
  Il en va pour WEGA et pour les systèmes de paiement. Je vous salue pour ce que vous
  avez fait avec le système que vous avez bâti. Je pense que vous êtes les leaders
  en matière de paiement. Le deuxième défi, nous devons confronter ces défis ensemble.
  Il s''agit du talent. En Europe et surtout en France, nous formons notre talent.
  Nous devons créer de l''emploi pour ce talent et veiller à ce que ce talent reste.
  Il y a quelques années, des talents qui travaillaient sur l''IA à la Silicon Valley
  étaient français. Maintenant, ces Français reviennent parce que nous devenons les
  leaders de l''IA en Europe. Le défi est le même en Afrique. Vous avez raison, nous
  devons former davantage. Je suis fier de ce que nous faisons ici au niveau des investissements
  et au niveau de la collaboration avec l''université afin de construire de nouveaux
  partenariats avec les meilleures universités. C''est ce que nous souhaitons faire
  à travers le continent. C''est-à-dire créer du talent, les former ici dans des systèmes
  éducatifs robustes. Nous espérons que ce talent restera afin d''aider le développement
  du continent. Nous allons prolonger nos partenariats avec les universités africaines
  et nous allons accélérer également notre investissement. J''aimerais remercier les
  entreprises d''avoir appuyé ce travail. Orange va annoncer les 50 centres numériques,
  avec un million de jeunes Africains qui seront formés d''ici 2030. Il y a quelques
  années, nous avons lancé Digital Africa afin de relier les systèmes numériques.
  Cela fait partie des capacités de formation pour votre talent, mais cela nous permet
  de rester ce talent. On le sait très bien, c''est le vainqueur qui écrit l''histoire.
  Tout le travail qu''on est en train de faire, d''ailleurs, on y reviendra dans la
  journée avec les sessions culturelles et sur les restitutions culturelles, c''est
  qu''on est en train aussi de réinventer ce partenariat équilibré avec le continent
  africain par la restitution des œuvres culturelles, par le changement de ce récit.
  Mais il y a un récit contemporain à écrire. Ce récit contemporain, c''est très juste
  s''il est fait par d''autres, soit avec un regard backward-looking , soit avec des
  gens qui ne connaissent pas, en tout cas, s''il n''est pas fait par les Africaines
  et les Africains. Il n''y a aucune chance que cette histoire soit la bonne. C''est
  aussi une question de souveraineté, parce que ce regard, c''est celui qu''on laisse
  aux générations à venir, c''est celui qui permet de démultiplier notre force. C''est
  l''histoire qu''on est en train de faire. Celle qui vous donne encore plus de capacité
  à entraîner. C''est celle qui, vous l''avez dit parfaitement, Jean Wilfrid, qui
  va attirer les investissements. Si j''ai la bonne histoire, le bon récit, j''ai
  de l''influence, je vais attirer des gens qui vont participer à mon histoire. C''est
  du soft power . C’est une capacité aussi importante que les infrastructures ou que
  les talents. J''ai besoin d''énergie, d''infrastructures, de talents et du bon récit.
  Ce récit, c''est ce qui nous tient, c''est ce qui fait que la culture est inséparable
  de la technologie et de l''économie. Si on sait bâtir ce bon récit, ou ces bons
  récits, parce qu''il n''y en a sans doute pas un seul pour le continent africain,
  mais s''il est fait par les Africaines et les Africains, s''il est diffusé comme
  il se doit, alors l''effet démultiplicateur est énorme. L''exemple du Bénin est
  un parfait exemple parce que c''est une réussite durant les dernières années remarquable,
  qui est passée par la culture et par l''économie. Je suis très impressionné par
  ce que le continent est en train de faire. Il y a un panafricanisme positif. J''ai
  adoré ce que vous avez dit sur la marque, mais on a souvent mis le panafricanisme
  autour de discours qui étaient très négatifs, revendicatifs, un peu revanchards,
  un peu anti- ceci ou cela. Il y a un panafricanisme qui est celui de votre génération,
  qui est positif, qui veut juste conquérir tout, bâtir son continent, soulever ses
  défis, attirer les investissements du monde entier et dire : moi, je suis là, j''ai
  envie de bâtir, je n''ai pas envie qu''on m''impose des solutions qui viennent d''ailleurs.
  Je veux développer mon pays, mon continent et choisir. Nous, notre rôle, ce n''est
  pas de faire de l''aide, c''est juste de dire : « nous, ça nous plaît, on veut faire
  ça aussi ». Parce que nous aussi, vous l''avez dit, la France, elle a toujours été
  comme ça. C''est une nation qui s''est toujours vue comme plus grande qu''elle-même,
  parfois en faisant des choses qu''on ne ferait plus aujourd''hui, je l''ai dit et
  répété, mais parce qu''on rêve plus grand, parce qu''on a construit cette histoire
  pour nous-mêmes. C’est ce qui fait qu''il y a deux raisons qui font qu''on a envie
  d''être avec vous aujourd''hui et que ce Sommet est très important pour nous. La
  première, on veut, nos entreprises, le gouvernement français, on veut investir à
  vos côtés parce qu''on est sûrs que ça va marcher et que l''histoire africaine est
  une grande histoire, que quand on regarde Europe-Afrique, c''est une évidence et
  que ce combat pour la souveraineté technologique, de l''IA, du quantique, des talents,
  des récits, il est commun. Si vous échouez, on n''a aucune chance. Si vous échouez,
  votre jeunesse quittera, on aura plein de tensions migratoires. On veut que vous
  réussissiez parce que c''est bon pour la France et pour l''Europe. Il y a une histoire
  positive à bâtir, totalement inédite, qui est cette histoire du XXIème siècle où
  vous allez bâtir votre récit, on va défendre le nôtre et on va le faire main dans
  la main. La deuxième chose, c''est qu''on a destin lié. Ce que vous avez décrit,
  Marwa, et ce que vous avez dit comme, en fait, histoire très belle, et ça m''a fait
  plaisir d''entendre ça, c''est qu''il y a des millions et des millions de jeunes
  en France qui sont des diasporas comme vous. Pendant trop d''années, on leur a dit :
  excuse-toi d''être d''une diaspora, excuse-toi d''être ceci ou cela, ou fais oublier
  un peu. Non. Vous êtes 100 % Françaises, 100 % Algériennes. Accumulez-les, redoublez-les,
  on en a besoin, parce que c''est un accélérateur pour nous, Français, d''avoir des
  jeunes comme vous qui sont françaises et algériennes, françaises et centrafricaines,
  et qui ont envie de dévorer le monde, de conquérir plein de choses, mais qui sont
  avec nous. Soyez fiers de cette diaspora, soyez totalement françaises et totalement
  africaines. Et moi, c''est aussi pour ça que je suis là, parce que dans notre pays,
  et je le dis pour nos amis Kényans qui, peut-être, ne le savent pas assez, mais
  il y a des millions et des millions de nos jeunes qui sont totalement Français et
  totalement Africains. C''est une immense chance pour le pays. Voilà, je vais m''arrêter
  là. Mais, vous, les bâtisseurs d''avenir, c''est vous qui allez bâtir cet avenir.
  Je suis extrêmement ravi de voir combien vous avez des solutions et la fierté que
  vous décrivez quand vous parlez de votre avenir. C''est la raison pour laquelle
  je suis ici. Je crois en l''avenir de l''Afrique et en l''avenir de vos pays. Je
  suis le Président d''un pays qui veut faire partie de cet avenir. Nous voulons investir
  ici. Nous voulons être fiers de notre passé et de notre avenir. Mais il faut avoir
  un partenariat généreux, équilibré et lucide, d''égal à égal. C''est par cette manière
  que nous allons encadrer et bâtir notre avenir. 22 juillet 2026 - Seul le prononcé
