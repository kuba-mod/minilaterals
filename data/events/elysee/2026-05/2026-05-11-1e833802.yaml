  puissent être en quelque sorte des accélérateurs de croissance sur le continent.
  Trois : ce continent a toutes les clés en main. On veut l''aider, on veut co-investir
  avec lui et sortir de la logique verticale pour être dans une logique d''égalité,
  partenariale, de co-investissement. Et quatre : on veut bâtir ensemble ces solutions
  d''avenir, parce que les solutions d''avenir se feront pour ce continent avec sa
  jeunesse. On l''a vu ce matin, le Président le rappelait, le mobile payment a été
  inventé ici et s''est développé beaucoup plus vite en Afrique que sur le continent
  européen. Nos amis kényans le savent, comme nos amis marocains le savent formidablement
  eux aussi. Tout ça, c''est ce qui est au cœur de Africa Forward. C''est un changement
  de regard et un changement de logique. Je voulais simplement vous annoncer aujourd''hui
  qu''à travers cette mobilisation, tout ce qui a été fait, il y a des résultats très
  concrets pour le continent africain. Aujourd''hui, par votre mobilisation et ce
  qui a été fait, ce sont 23 milliards d''euros d''investissements annoncés pour le
  continent africain. 23 milliards d''euros. Ces 23 milliards d''euros, c’est 14 milliards
  d''euros d''entreprises françaises qui sont là. Des grands groupes, des ETI, des
  PME, qui investissent 14 milliards d''euros sur le continent. Je salue tous leurs
  dirigeants qui sont présents, qui investissent 14 milliards d''euros, évidemment
  au Kenya, mais dans tous les pays ici présents, et qui vont créer plus de 250 000
  emplois directs en France et en Afrique. A côté de ça, c’est neuf milliards d''euros
  d''investissement d''entrepreneurs et d''investisseurs africains en Afrique qui
  se sont mobilisés. C''est inédit et c''est exactement la plateforme de mobilisation
  dont nous avions besoin, dont on a besoin et qu''on veut accélérer. Immenses applaudissements
  pour vous tous ici pour ce résultat extraordinaire. Je veux remercier les entreprises
  françaises qui se sont mobilisées, qui sont là. On a beaucoup parlé d''Orange, on
  a vu tout à l''heure Canal+, on a vu bioMérieux, on a les entreprises qui sont dans
  le secteur de la santé, Castel et d''autres. Dans tous les secteurs, on a des entreprises,
  je ne veux pas faire de jaloux. On a des entreprises familiales, on a des groupes
  cotés, on a des PME. Vous avez joué le jeu de manière extraordinaire. On a des entreprises
  de tous les territoires qui sont là, qui se sont développées. Je suis très heureux
  que vous soyez là, aux côtés de grands dirigeants malgaches, béninois, sénégalais,
  nigérians, marocains, et qu''ensemble vous construisez des projets, parce que c''est
  exactement ça l''avenir. Je voulais vous dire que je le conçois aussi dans un rapport
  totalement réciproque. On a fondé, avec Jean, quelques autres, Tony était là aussi,
  on pense à Gilbert, à Mike, on a tous les amis qui sont là, le professeur Rabiou
  était avec nous ce matin pour la villa, et Aliko aussi. On a fondé ce conseil africain
  franco-nigérian. Le Nigéria était au cœur de Choose France. Il y a deux ans, trois
  ans, quatre ans, et il le sera encore. Ce que je voulais vous dire dans le rapport
  bilatéral, c''est que je veux qu''il y ait plus d''investisseurs africains en France
  aussi. On n''est pas juste là pour venir investir sur le continent africain à vos
  côtés, mais on a besoin que les grands leaders d''entreprises africains viennent
  investir en France. C''est ça aussi qui fonde cette relation, maintenant totalement
  décomplexée, parce que c''est aussi un changement du regard, c''est aussi une réalité.
  Il y a aujourd''hui des investisseurs, des entrepreneurs sur le continent africain
  extraordinairement innovants, extraordinairement ambitieux, qui nous aident à changer
  la France et qui nous aident à créer des emplois industriels dans notre pays. C''est
  une immense fierté et c''est la clé de ce partenariat réciproque, juste, dont William
  a parlé il y a un instant. Un immense bravo pour ces investissements, [pour] ce
  qui a été fait. Je voudrais finir en répondant au Président RUTO pour ce qu''il
  a dit et ce qu''on va faire demain et à Évian. Vous avez à la clé ces dizaines de
  milliards d''investissements, ce changement de la perspective qu''on a su faire
  durant ces dix dernières années ensemble, mais on veut aller plus loin. Si on est
  honnête, quels sont les défis aujourd''hui pour que l''Afrique soit au rendez-vous
  de sa réussite entrepreneuriale ? Un : l''éducation. Franchement, ce qu''a fait
  le Maroc, c''est une révolution incroyable. Je le dis ici, Monsieur le Premier ministre,
  ce que vous avez fait sous l''autorité de Sa Majesté le Roi est un modèle pour le
  continent. Formation primaire, secondaire et universitaire, et c''est là qu''on
  voit les choses, c''est parmi les meilleurs résultats dans notre école polytechnique,
  les jeunes qui sortent de chez vous. C''est un modèle extraordinaire. Le Kenya est
  en train de faire des choses absolument formidables. Le Nigeria est en train de
  faire des choses formidables. On le voit ici. Et c''est d''ailleurs pour ça qu''on
  a commencé la journée avec le Président, avec un investissement de l''Agence Française
  de Développement dans l''ingénierie, l''IA, avec Saclay, avec l''AFD, dans cette
  alma mater du Président RUTO. L''éducation, l''éducation ! Deux : l''énergie. Vous
  avez cette bataille, on a besoin que le continent africain transforme son énergie. 
  Il y a des trésors extraordinaires, des trésors d''hydroélectricité. Je pense à
  la République démocratique du Congo, avec des entrepreneurs qui sont là, des grands
  projets qui sont en train de se bâtir en RDC. Et au Congo-Brazza[ville]. Je pense
  aussi aux grands hydrocarbures. L''Algérie a un potentiel de développement extraordinaire,
  avec là aussi des investisseurs, des entrepreneurs qui peuvent faire de l''Algérie
  l''un des eldorados de demain pour les transitions par le gaz, pas simplement pour
  le continent africain, mais toute la Méditerranée. Vous avez dans beaucoup de vos
  pays la volonté de développer le nucléaire civil, et on veut être des partenaires
  de cela. L’énergie est un formidable levier de transformation. Vous avez de grands
  entrepreneurs de l''énergie ici. On veut être des partenaires de ce développement.
  La troisième chose, ce sont les infrastructures. Ça a été très bien dit, les infrastructures
  du numérique, les infrastructures de transport, les infrastructures d''énergie,
  le green là aussi, c''est une clé pour développer l''économie de vos pays. C''est
  une clé pour la souveraineté du continent africain. C''est là d''ailleurs que nous
  avons exactement le même défi. On a commencé la journée comme ça avec le Président,
  c''est que nous aussi, nous voulons notre propre souveraineté sur nos infrastructures
  comme vous. Éducation, énergie, infrastructures, structuration de l''économie, c''est
  le quatrième défi. L''un des grands défis de l''Afrique, on le sait, c''est qu''il
  y a énormément d''emplois qui se créent, mais beaucoup trop dans l''économie informelle.
  Il faut aider les entreprises du continent africain à se structurer, en améliorant
  la gouvernance, en permettant de grandir, en permettant ce faisant de payer de meilleurs
  salaires, d''intégrer le système bancaire et le financement pour permettre à plus
  de ménages en Afrique, jeunes ou moins jeunes, d''accéder à un logement durable,
  aux services primaires que sont l''éducation et à la santé et au bon développement.
  La capacité à faire de l''économie africaine une économie plus formelle, elle est
  clé. C''est là où on doit aider vos gouvernements, les accompagner dans la structuration
  de ces stratégies. Le cinquième et dernier, je suis sans doute incomplet, mais c''est
  les cinq auxquels je tenais, c''est [que] pour réussir ça, il faut de l''investissement
  massif, public et privé. Cette stratégie d''investissement, c''est celle qu''on
  est en train de mener. Vous avez en quelque sorte fait votre part avec les annonces
  d''aujourd''hui, les 23 milliards d''euros d''investissements venant de la France,
  du continent africain pour l''Afrique. Ce que l''on veut faire demain et au G7,
  c''est structurer un cadre d''investissement pour le continent africain. Il n''y
  a aucune raison aujourd''hui pour qu''il y ait si peu d''investissements privés
  qui viennent sur un continent plein d''énergie et de jeunesse comme le vôtre. Dans
  ce continent, si on veut réussir à monter la chaîne de valeur, qui est le cœur des
  défis si on veut réussir la montée dans l''économie formelle, l''Afrique est un
  continent où on ne doit pas simplement extraire les matières et les minerais. On
  doit les transformer, on doit créer l''industrie. On doit avoir une agriculture
  intelligente pour la structurer et avoir toutes ces opportunités. Si nous voulons
  cela, il faut de l''investissement massif. Pour cela, il faut que l’on arrive à
  résoudre la question du rating des pays, et de beaucoup d’entreprises, et de la
  notation. Il faut qu''on arrive à résoudre le traitement du risque pour les investisseurs,
  souvent non africains, et parfois certains investisseurs africains. Il y a cinq
  ans, ensemble, on a lancé à Paris le Sommet pour le financement des économies africaines.
  On a bâti une stratégie d''émission des droits de tirage spéciaux du FMI pour les
  réallouer en Afrique. On a réussi notre pari : plus de 100 milliards de droits de
  tirage spéciaux ont été réalloués sur le continent africain. Ça a permis avec le
  FMI de faire quoi ? De développer des projets aux côtés des États de manière clé,
  il y a eu une dizaine de programmes. Deuxième étape, à Paris, juillet 2023, William
  était là. On s''est battus, beaucoup de dirigeants étaient là, le Pacte de Paris
  pour les peuples et la planète (4P). Et là on a dit : il faut plus de leviers. On
  était tous les deux à une table ronde avec le président de la Banque mondiale, la
  directrice générale du FMI, on a dit : « on augmente le levier pour que, quand on
  met de l''argent du FMI et de la Banque mondiale, cela déclenche à chaque fois le
  même argent du privé ». On a complètement transformé l''effet de levier. Beaucoup
  plus d''argent privé qui est venu en déclenchement. Il reste un problème qu''on
  n''a pas résolu, et on doit le résoudre entre demain et Évian. C''est qu''aujourd''hui,
  on n''a pas de vrai mécanisme qui garantisse les premières pertes. On doit réussir
  à traiter la question de la notation de beaucoup d''États africains qui sont souvent
  sous « B - », parce que le programme MIGA de la Banque mondiale a permis de rendre
  éligibles à des garanties jusqu''à « B - ». En dessous, fini. Il n''y a qu''une
  quinzaine d''États africains éligibles. On doit réussir surtout à avoir des vrais
  mécanismes de première perte. Il y a beaucoup de mécanismes aujourd''hui qui prennent
  les deuxièmes pertes, mais ça ne suffit pas. Ce qui fait qu''on a énormément de
  banques, de fonds d''investissement, d''entrepreneurs, parfois africains, mais surtout
  non-africains, qui ne viennent pas investir ici. La solution existe et elle existe
  ici au Kenya, c''est ATIDI. Le président de la BAD est venu me voir il y a quelques
  semaines, m''a dit : « il faut qu''on regarde avec ça, ça marche, c''est de la première
  perte ». Nous, Français, on va co-investir à vos côtés, entrer au capital d''ATIDI
  pour se mettre aux côtés de nos frères africains et de quelques autres. On va surtout
  structurer ensemble, demain, avec nos frères africains et William, le tour de piste
  qui va nous permettre de faire d’ATIDI la vraie plateforme, le vrai mécanisme de
  garantie sur les premières pertes pour le continent africain. On va ensemble, tous
  les deux, aller à Évian, à la mi-juin pour convaincre le G7 d''endosser cela et
  que toutes les économies les plus riches nous accompagnent pour mettre cette sécurité
  derrière. Voilà, mes amis, je ne serai pas plus long, je vais m’arrêter là. En tout
  cas, on a senti toute la journée beaucoup d''énergie. Je voulais vous dire combien
  on est fiers, avec le Président RUTO, d''être à vos côtés et de vous dire que l''avenir,
  c''est vous qui allez l''écrire. Les plus jeunes, comme les moins jeunes, tous ceux
  qui portent l''avenir de ce continent, que vous soyez entrepreneuses, entrepreneurs,
  artistes, académiques, chercheurs ou chercheuses, journalistes, sportifs, et avec
  ce forum, vous avez, je crois, ouvert une ère nouvelle. Avec ces 23 milliards d''euros
  d''investissement annoncés aujourd''hui, et tout ce qu''on va lancer, c''est une
  ère nouvelle qui s''ouvre. Elle s''ouvre aujourd''hui à Nairobi, dans votre alma
  mater, Monsieur le Président, mon cher William, il n''y aura plus de retour en arrière.
  On va ensemble co-produire, co-investir, co-inventer, parce que c''est le sens de
  la nouvelle relation entre la France, l''Europe, entre nous et le Kenya et tout
  le continent africain. La journée s''est achevée par un dîner officiel avec les
  chefs d''État et de gouvernement participant au Sommet.'
