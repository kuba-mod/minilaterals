  de ses marchés qu''elle a su créer. Mais elle n''épuise pas la question européenne.
  L''Europe, c''est une géographie, c''est une histoire, c''est une histoire de civilisation,
  d''ailleurs ce qu''on a vu ce matin ensemble le montre, et on en parlait avec ceux
  qui m''accompagnaient au musée ce matin en voyant tous ces manuscrits, c''est comme
  une évidence lorsqu''on se plonge dans l''histoire arménienne, on ne peut que constater
  que cette histoire est européenne. Par la place de la chrétienté, la place des textes,
  les dialogues entre les imaginaires. Donc, la communauté politique européenne, c''est
  la reconnaissance de cette Europe large, de ce grand continent, et du fait que,
  de l''Islande à l''Azerbaïdjan et l''Arménie, nous avons quelque chose à nous, et
  nous avons à bâtir des solutions communes. Ma conviction profonde, c''est que, quand
  on parle de défense et de sécurité, de lutte contre les trafics, d''immigration,
  d''énergie, pour ne citer que ces exemples, et ils n’épuisent pas tout, et de protection
  des espaces démocratiques, alors la communauté politique est l''espace qui a du
  sens parce que nos régions ont été bousculées par ces luttes d''empires. Le Sud-Caucase
  l''a été ces dernières décennies, ô combien ces derniers siècles. Mais ces dernières
  décennies, cela a continué. Par la construction européenne, l''Europe de l''Ouest
  s''en est progressivement immunisée. Par l''élargissement, ou plutôt la réunification
  d''après 1990, elle a permis à d''autres pays d''Europe du centre de rejoindre cette
  aventure. Je pense qu''il y a ce temps d''émancipation, maintenant, commune et collective.
  Alors, est-ce que ça doit passer par une intégration à l''Union européenne et un
  élargissement de l''Union européenne ? Je ne sais pas. Je ne suis pas sûr. Ça dépendra
  du choix des pays. C''est très exigeant comme processus, parce qu''il y a tout ce
  qu''on appelle l''acquis communautaire qui est à intégrer. Je suis convaincu qu''on
  ne doit pas attendre cela et qu''il faut dès maintenant, compte tenu de l''état
  du monde, agir ensemble. C''est exactement ce qu''on a fait, tout particulièrement
  ces quatre dernières années. Nous avons bâti la grande Europe en termes réels. Le
  chemin qui a été fait par l''Arménie, c''est un chemin qui permet la grandeur. Qu''est-ce
  qu''une Europe qui accepterait que le Sud-Caucase soit en quelque sorte disputée
  par les empires, menaçant notre sécurité, menaçant nos routes énergétiques, nous
  bousculant. Ce n''est pas une Europe qui est, qui vit en sérénité. De la même manière,
  quel est l''avenir de l''Arménie ? Si ce n''était, et c''est le deuxième temps de
  ma réponse, un avenir européen, c''est le seul qui lui garantit les équilibres de
  la paix. Parce que l''Europe n''est pas un projet hégémonique. C''est un projet
  partagé par des États qui tous pèsent la même chose. Hier, nous étions 47 autour
  de la table. Chacun avait le même temps de parole. C''est très important. L''Union
  européenne, d''ailleurs, a cet ADN. Donc, cette Europe large, c''est une Europe
  respectueuse, où il n''y a pas la domination d''une puissance sur les autres. Ça
  n''est pas un projet de vassalité, qui est un peu le projet alternatif dans la région,
  si je me permets le terme pudique. L''Europe, ce n''est pas un projet qui convoque
  les gens en leur disant ce qu''ils doivent faire. C''est un projet de partenariat
  équilibré. À cet égard, je pense qu''il est favorable, fécond pour l''Arménie, compte
  tenu du choix de la paix, de la stabilité, de la démocratie et de la prospérité
  qu''elle a fait. Voilà. Merci. Suite à un déjeuner, le Président de la République
  a rencontré des jeunes de l''école n°10 de Gyumri . En fin d''après-midi, un dépôt
  de gerbes au monument aux victimes du tremblement de terre du 7 décembre 1988 a
  été réalisé. Pour clôturer cette visite d''État, le Président Emmanuel Macron a
  participé à un concert franco-arménien où il s''est adressé au peuple Arménien.
  22 juillet 2026 - Seul le prononcé fait foi Bonjour, Gyumri. Je voulais, avant de
  partir, et en remerciant Monsieur le Premier ministre, cher Nikol, vous dire juste
  un mot. D''abord, pour remercier l''orchestre et l''ensemble des artistes qui se
  sont produits et qui vont continuer de jouer. Et puis, pour vous remercier, vous,
  pour le magnifique accueil que vous nous avez réservé, le magnifique accueil que
  j''ai eu à Erevan et aujourd''hui avec l''ensemble de la délégation française à
  Gyumri. Personne n''a oublié ce jour de décembre 1988, où les horloges se sont arrêtées,
  où la ville a été touchée, et où le monde s’est levé pour toi, Arménie. Charles
  Aznavour l''a chanté, la France s''est mobilisée, plus de 500 pompiers, sapeurs-pompiers,
  militaires se sont mobilisés pour venir en aide. Et Gyumri renaît, avec ses pierres
  noires, et après l''enfer, et après l''hiver, c''est un nouveau printemps. Et je
  suis très heureux, avant de partir, de pouvoir vous dire que j''étais très fier
  durant ces deux jours d''être à vos côtés. Nous savons toutes les difficultés qu''il
  y a eu ces dernières années. Mais comme Gyumri est là, avec ce nouveau visage, l''Arménie
  avance en paix, en stabilité, avec l''Europe. Et comme nous étions là en décembre
  1988, nous étions là dans les pires heures de 2020 et nous serons là aujourd''hui
  et demain à vos côtés. Alors, merci Gyumri, merci l’Arménie. Et n’oubliez jamais
  que la France vous aime. Vive l''Arménie ! Vive la France ! Vive Gyumri ! Merci !
