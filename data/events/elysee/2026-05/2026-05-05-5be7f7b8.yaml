date: '2026-05-05'
type: press_release
source_name: elysee
title: Visite d'État en République d'Arménie.
text: 'À l’issue du Sommet de la Communauté politique européenne à Erevan, le Président
  de la République a débuté une visite d’État en Arménie les 4 et 5 mai 2026. Cette
  visite s’inscrit dans une dynamique d’approfondissement d’une relation historique
  et d’amitié entre la France et l’Arménie , ainsi que dans le contexte du rapprochement
  engagé entre l’Arménie et l’Union européenne . Le 4 mai, le chef de l''État s''est
  entretenu avec le Président arménien Vahagn Khatchatourian avant de rencontrer la
  communauté française en vivant en Arménie . 22 juillet 2026 - Seul le prononcé fait
  foi Mesdames et Messieurs les ministres, Monsieur l''ambassadeur, Madame, Mesdames
  et Messieurs les parlementaires, Madame la consule honoraire, Madame la présidente
  de la Galerie nationale d''Arménie qui nous accueillait, Messieurs les coprésidents,
  Mesdames et Messieurs les présidents d''associations, Mesdames et Messieurs en vos
  grades et qualités, chers compatriotes. Je suis très heureux d''être là, très heureux
  d''être de retour, d''abord de nous retrouver dans cette magnifique salle des fresques
  de la Galerie nationale, d''être de retour 8 ans après ce sommet de la Francophonie
  qui nous avait permis d''être là dans un contexte bien différent, et 20 ans après
  la dernière visite d''État d''un président français. En 8 années, que d''événements.
  Et je sais ici tout ce que vous avez vécu, que nous avons traversé. La guerre, avec
  ses conséquences sur beaucoup de familles et un chemin si douloureux, les mois d''angoisse,
  la mobilisation en France, le soutien humanitaire, beaucoup sont là qui l''ont organisé
  en cet automne 2020, et je m''en souviens comme si c''était hier, le soutien de
  la France, j''y reviendrai, puis un chemin de paix qui s''est d''ailleurs jalonné
  de la rencontre de Prague en 2022 jusqu''au 8 août 2025, une Arménie qui se tourne
  vers l''Europe, qui accueille aujourd''hui dans sa capitale plus de 40 chefs d''État
  et de gouvernement. Durant toutes ces années, vous avez tenu, et je veux commencer
  mon propos par vous dire ma gratitude, mon admiration pour ce que représente notre
  communauté ici. Oui, durant toutes ces années, l''Arménie a été confrontée à une
  période difficile. Elle a traversé la guerre, elle a reconquis la paix, elle s''est
  reconstruite et a un taux de croissance extraordinaire. Et la communauté française
  y joue son rôle pleinement. Nos entreprises, petites et grandes, contribuent à cette
  expansion économique : Amundi, Veolia, Pernod Ricard, le Bureau Veritas, Yan Group,
  Mistral, Aramine, Richel, Alan, AXA et tant d''autres. L''Agence française de développement
  a doublé depuis 2023 son encours en Arménie, porté aujourd''hui à plus de 800 millions
  d''euros. Et qu''il s''agisse d''eau, de connectivité, d''infrastructures, nous
  sommes là des soutiens constants de cette période. Et nous avons bâti des relations
  qui n''existaient pas jusqu''alors. Lorsqu''après 2020, beaucoup ont tourné le dos
  ou oublié ce qui se passait ici, la France a décidé de construire une relation militaire
  qui n''existait pas jusqu''alors. L''Arménie reconstruit son armée et nous l''aidons.
  Nous formons, nous équipons, nous conseillons les soldats arméniens et c''est une
  innovation de la relation bilatérale des dernières années. On nous l''a parfois
  reproché dans le voisinage. On nous l''a parfois fait payer dans le voisinage. Et
  nous avons souvent été seuls parmi les européens à le faire. Mais nous l''avons
  toujours assumé parce que c''est un effort fait pour pouvoir se défendre et se protéger.
  Et je voudrais ici, convoquant cette relation, saluer la mémoire du major Arnaud
  Frion tombé en Irak le 12 mars dernier et qui, quelques mois plus tôt, était ici
  même et formait ses camarades arméniens. C''est vous dire que nous envoyons nos
  soldats les plus valeureux ici pour cette œuvre de formation. Oui, jamais depuis
  l''indépendance de l''Arménie, les relations entre nos deux pays n''avaient été
  si intenses, si confiantes. Jamais depuis le tremblement de terre de 1988, la solidarité
  de la France avec l''Arménie n''avait été aussi active, ni aussi concrète que durant
  ces dernières années. Et nous vous le devons d''abord. Parce que c''est dans votre
  diversité, professeurs, entrepreneurs, travailleurs humanitaires, journalistes,
  artistes, viticulteurs, hommes et femmes de religion, volontaires de multiples organisations
  françaises et arméniennes, observateurs de la mission européenne, c''est vous qui
  êtes les artisans de cette relation bilatérale. Je voudrais ici rendre un hommage
  particulier aux retournants de 1947 et à leurs descendants. Ceux qui avaient tout
  quitté pour rejoindre, leur avait-on fait croire, l''Arménie des beaux lendemains.
  Ceux qui, trompés, discriminés, persécutés souvent par le régime stalinien, ont
  tenu bon, la France au cœur. Ceux que la France n''a jamais abandonnés, la plupart
  ont pu repartir grâce aux efforts de notre diplomatie. Ceux qui sont restés sont
  souvent âgés et fragiles. Et je sais que notre ambassade prend soin d''eux. J''ai
  demandé à ce que puissent être augmentés les secours qui leur sont versés. Ce n''est
  que justice. Nous le devons aussi à nos compatriotes d''origine arménienne. Car
  le peuple arménien n''a pas seulement honoré notre pays de sa confiance et de sa
  fidélité, il nous a donné des filles et des fils qui ont fait la France et son histoire,
  qui ont fondé notre mémoire commune. Ils sont, comme le rappelait le grand Charles
  Aznavour, 100 % français et 100 % arméniens. Nous le savons. Refusant les assignations,
  ils prouvent que l''on peut être à la fois patriote français et éminemment fidèle
  à ses origines. Nous le devons enfin à celles et ceux qui servent la France en Arménie,
  à l''ambassade, à l''Institut français, à l''Alliance française, au lycée français
  Anatole France, à l''université française en Arménie, au sein de l''AFD d''Expertise
  France, de l''OFII et bien sûr dans nos armées, représentant avec talent, conviction
  et dévouement la France en Arménie. Qu''ils soient toutes et tous ici remerciés.
  Et puis, puisque je vois certains plus jeunes, je n''oublie pas et je n''oublie
  jamais nos volontaires internationaux, nos volontaires du service civique, qui jouent
  un rôle important et, par leur engagement, continuent de tresser cette relation.
  Je voudrais aussi avoir un mot pour notre action consulaire remarquable et qui s''est
  encore illustrée par l''accueil de nos compatriotes contraints de fuir l''Iran.
  Vous avez joué un rôle tout particulier ces derniers mois, et je voulais vous en
  remercier, et par notre agence consulaire de Goris, ouverte au plus fort des périls,
  au cœur de la région, qui était alors la plus menacée d''Arménie. Quand ça tirait
  encore quelques kilomètres, nous ouvrions. Nous ouvrions, nous, à Goris, montrant
  le soutien à la population, le soutien aux Arméniennes et aux Arméniens, ne lâchant
  rien. Désormais, flottent les couleurs de la France et c''est notre fierté à tous.
  Alors, cette relation est singulière. Et au fond, je voudrais aussi vous dire quelques
  mots de cette relation d''hier, d''aujourd''hui et de demain qu''on est en train
  de bâtir par cette visite d''État. Cette relation est singulière parce qu''elle
  est faite de passion, à la fois parce que les Arméniennes et les Arméniens ont toujours
  eu un rôle à part. Même lorsque le Royaume de France, on l''évoquait encore hier
  avec Monsieur l''Ambassadeur, se méfiait des Marseillais s''est parfois arrivé,
  il donnait un statut particulier aux commerçants arméniens, pour lesquels ils voyaient
  une seule difficulté, les chicayas marseillais qui auraient pu les gêner dans leur
  commerce. Puis, notre relation a pris un tour singulier autour du génocide, où notre
  marine, évidemment, a joué ce rôle courageux, si fort, et où la France a accueilli,
  en plus des Arméniennes et des Arméniens qu''elle avait déjà, tant de celles et
  ceux qui fuyaient les routes du génocide, de la terreur, de la misère. Tant de nos
  villes, de Marseille à Lyon, évidemment en passant par la capitale, les Hauts-de-Seine
  ne seraient pas totalement les Hauts-de-Seine non plus, sans beaucoup de communes
  qui ont été nouées par ces communautés, tant de nos villes ont construit des liens
  si singuliers par cette histoire. Et puis, ces liens sont venus nourrir le fait
  que l''imaginaire français a toujours été arménophile, parce que c''était le combat
  de la liberté. C''était le combat d''un petit pays, d''une civilisation, au milieu
  de tant d''empires, battu par tant d''empires, et qui, des Perses au tsar de Russie
  jusqu''à l''Union soviétique, était comme soumise à une fatalité, celle des dominations,
  mais ne s''y laissait jamais faire. Et donc, ces femmes et ces hommes qui avaient
  tout traversé pour rejoindre la France trouvaient là des cœurs et des mains à prendre
  parce que la France, au fond, a toujours aimé ce que l''Arménie représentait et
  représente, un goût de la liberté, une volonté de ne pas se soumettre, un amour
  de la culture, la volonté de ne rien céder, de garder son alphabet, sa langue, sa
  singularité, là où tant et tant voulaient la soumettre. Ce qui fait que cette histoire
  n''a cédée à aucun des aléas du temps, est avant tout une histoire de passion. C''est
  celle que vous nourrissez par votre présence ici même. C''est celle de la communauté
  arménienne en France, de tous les binationaux. C''est celle qui fait aussi que le
  24 avril est devenue la journée nationale de la commémoration du génocide des Arméniens
  partout en France et pour toutes les Françaises et les Français. Nous l''avons voulu
  et nous l''avons assumé, envers et contre tout. Et c''est ce qui fait aussi que,
  ces dernières années, ce rôle s''est renforcé, ce lien s''est renforcé. Déjà, en
  1988, la France s''était toute entière mobilisée. Oui, il y avait Charles Aznavour,
  que j''évoquais tout à l''heure, évidemment, mais il y a eu tant de familles qui
  se sont mobilisées pour ce drame qui était vécu dans notre chair, et nous y serons
  demain ensemble. Mais ce qui s''est passé en 2020 a eu une résonance en France toute
  particulière. Ce sentiment d''injustice, cette morsure de l''histoire, la mobilisation,
  je le disais, humanitaire, cette volonté de construire une relation militaire qui,
  jusque-là, n''existait pas, de renforcer notre relation consulaire, de renforcer
  les liens de culture pour tant d''entreprises, de venir ici, dès le lendemain, alors
  que rien n''était écrit. Beaucoup d''européens nous ont regardé ainsi faire. Et
  demain, nous allons signer ce partenariat stratégique qui vient, en quelque sorte,
  consolider tout cela. Et nous l''avons fait en tressant cette relation. Je vois
  ici nos sénateurs, plusieurs de nos maires, notre ministre en charge de la ruralité
  et des collectivités locales, nos parlementaires, nos collectivités territoriales,
  ont multiplié les partenariats durant cette période. Le Fonds arménien de France,
  qui investit les villages de la frontière, qui joue un rôle essentiel, la relation
  que CCAF et tant de villes ont nouées ici même, ont joué un rôle déterminant dans
  cette période point à point. Nous avons renforcé la trame de la relation bilatérale.
  Alors, nous le faisons dans un contexte tout particulier, mais qui donne à ce partenariat
  stratégique entre nos deux pays encore plus d''importance. Il va renforcer le lien
  entre nos diplomaties, nos armées, nos entreprises, nos institutions culturelles
  de recherche, d''enseignement, et c''est ô combien important. Et j''ai vu, durant
  ces dernières années, l''Arménie aussi faire le choix de la paix, de la prospérité
  et de l''Europe. Et nous n''avons pas le droit de laisser passer ce tournant. Je
  sais qu''il y aura dans cette salle des différences. J''ai appris à les connaître
  et à les comprendre. Je sais que parfois, il y a plusieurs diplomaties de la communauté
  française à l''égard de l''Arménie. C''est notre charme, c''est une relation de
  passion. Parfois même, le gouvernement arménien a appris à connaître ces différences
  et les soubresauts que nous pouvions avoir. Ce n''est pas rationnel. C''est nous,
  c''est cette relation. Mais je vais vous dire en conviction ce que j''ai vécu ces
  dernières années avec ce pays et ses dirigeants. On s''était un peu habitués pendant
  des décennies et des décennies à ce que l''Arménie, y compris l''Arménie dans ses
  extensions géographiques les plus hasardeuses, et vous savez la position que j''ai
  toujours tenue, y compris quand je venais au CCAF ou que j''ai toujours tenue ici,
  on s''était habitué à ce que l''Arménie soit en quelque sorte un satellite de la
  Russie. On s''était habitué à accepter une relation singulière. Et on s''était dit
  finalement, après 2014, encore plus après 2022, ça pourrait continuer. Je dois bien
  reconnaître qu''il y a eu, avec la Révolution de Velours et l''avènement des nouveaux
  dirigeants, des choix courageux qui ont été faits, qui ont été de clarifier cette
  relation. Et je peux vous dire que la réunion de la Communauté politique européenne,
  qui s''est tenue aujourd''hui avec plus de 40 dirigeants, ne se serait jamais tenue
  avec des dirigeants arméniens à la main des Russes ou ambigus avec la Russie. Et
  donc, l''Arménie a fait le choix, en effet, en quelque sorte, de la majorité géopolitique,
  de sortir de cette entrave et de se tourner vers l''Europe. On ne peut pas faire
  comme si ça n''existait pas, nous, Français. On peut embrasser ce choix et l''engager.
  Et c''est aussi pour ça que je suis très heureux, et on y a beaucoup contribué,
  que demain, ici même, au milieu de cette visite d''État, il y ait un sommet pour
  la première fois entre l''Union européenne et l''Arménie, qui va permettre d''améliorer
  la connectivité. On va essayer d''y pousser les sujets de rooming, pardon de ce
  terme affreux, mais qui est donc d''améliorer, oui, la connectivité, les interconnexions
  entre nos opérateurs mobiles, qui va permettre aussi d''aider à la tenue des frontières
  avec Frontex. Parce qu''on fait comme si ça n''existait pas, mais il y a quand même
  toujours 4 000 soldats russes sur le territoire arménien, donc plus de 1 000 gardes-frontières.
  Et donc, il faut que l''Europe s''engage pour aider à tenir les frontières de manière
  plus indépendante ce pays. Et donc, l''Europe doit s''engager au service de la souveraineté
  arménienne et de ce choix pour l''Europe et pour l''indépendance qui a été fait.
  Ensuite, elle a fait un choix pour la paix, un choix contraint. La guerre de 2020
  était terrible pour tant de familles, peut-être pour plusieurs d''entre vous, à
  coup sûr pour plusieurs d''entre vous. Je rappelais tout à l''heure une morsure
  terrible. Mais nous, en 2020, on s''est mobilisés pour l''aide humanitaire, ensuite
  pour aider militairement. Mais regardons lucidement qui était là aux côtés de l''Arménie.
  La France, autant qu''elle l''a pu, mais la Russie n''était pas là. Je vous rassure,
  pas plus qu''elle n''est là pour le Venezuela quand il a des problèmes, pour la
  Syrie auprès de ses alliés historiques. On l''a encore vue pour l''Iran quand elle
  a des accointances ou pour le régime malien lorsqu''il est bousculé par les terroristes.
  Il vaut mieux, vous le voyez bien dans le contexte géopolitique, ne pas trop avoir
  besoin de la Russie. Mais elle n''était pas là en 2020. Elle ne sera pas là demain,
  sauf à demander une nouvelle dépendance. Et je n''ai pas vu beaucoup d''autres Européens
  étrangers régionaux venir. Et donc ce choix de la paix qui a été fait, quelles que
  soient les frustrations, les ressentiments, c''est aussi un choix de pragmatisme
  pour construire une stabilité. Et cette Arménie du XXIe siècle, si on veut qu''elle
  se construise dans cette région, indépendamment de la Russie, dans la paix et la
  stabilité, je crois pouvoir vous dire que le choix des dirigeants actuels est le
  seul choix raisonnable. Alors, ça ne veut pas dire, pour autant, qu''il n''importe
  pas d''avoir de l''exigence. C''est le dialogue que nous voulons conduire avec la
  Turquie, avec l''Azerbaïdjan, la libération des prisonniers, le respect du patrimoine
  religieux et culturel, et c''est tout le travail que nous avons fait dans les premières
  heures avec l''Alif, dont je veux remercier l''engagement, en poussant l''UNESCO
  à aller plus loin et plus fort, et par le partenariat bilatéral. Et nous voulons
  continuer avec nos actions aussi éducatives, culturelles, par cette exigence géopolitique,
  mais en s''appuyant sur cette paix et cette stabilité. On a parlé de la paix de
  Washington, je l''ai salué au mois d''août dernier, mais je n''oublie pas que ce
  chemin, nous l''avons commencé en obtenant à Prague, pendant une nuit, de cette
  même Communauté politique européenne, la reconnaissance pour la première fois par
  l''Azerbaïdjan des frontières d''Alma-Ata, pour la première fois, c''est-à-dire
  le respect de ce qu''ils étaient en train de menacer et qui était indispensable
  pour la stabilité que j''évoque. On a parfois reproché au Premier ministre Pashinyan,
  cette même nuit, d''avoir abandonné le Nagorno-Karabakh, oubliant ce faisant qu''à
  deux reprises auparavant, le président Poutine l''avait déjà fait. Il a eu raison
  de suivre ce chemin. Et puis, je vois aussi cette Arménie qui est en train de retrouver
  la prospérité, avec des chiffres de croissance remarquables, avec une innovation
  dans le numérique, dans l''intelligence artificielle extraordinaire, une part de
  son produit intérieur brut dans ce secteur, qui est comme une anomalie quand on
  regarde la région. Nous voulons y participer. Et en quelque sorte, nous voulons
  participer à l''aventure de l''Arménie du XXIᵉ siècle, une Arménie qui ne dépend
  plus de la Russie, mais se tourne pleinement vers l''Europe et est au cœur de cette
  communauté politique européenne, une Arménie qui veut la paix, la stabilité durable
  et une Arménie de la prospérité et qui la construit par elle-même à travers des
  partenariats choisis et des alliés fiables comme la France. Voilà, mesdames et messieurs,
  pourquoi nous sommes là aujourd''hui, pour bâtir cette page nouvelle. C''est ça,
  le sens de ce partenariat stratégique. Alors, rien n''est simple et rien n''est
  écrit. La guerre continue en Ukraine, beaucoup des voisins ont encore toutes les
  options ouvertes. Mais je sais que les choix que l''Arménie est en train de faire,
  que nous sommes en train de faire à ses côtés, obligeront tous les voisins à clarifier
  leur jeu. Et nous, à leur demander : êtes-vous avec les Européens ou contre ? Ce
  qui s''est passé aujourd''hui a quelque chose d''irréversible, parce que, par tout
  ce chemin, nous avons replacé l''Arménie au cœur de l''Europe géopolitique, recevant,
  animant les travaux de la communauté politique européenne, et, demain, nouant ce
  dialogue avec les institutions de l''Union européenne. Cet acte-là est inédit. L''Arménie
  peut en être fière, mais il ouvre cette page nouvelle et nous serons aux côtés de
  l''Arménie pour cela. Et c''est une opportunité extraordinaire pour vous toutes
  et tous, parce que le monde dans lequel nous vivons, surtout depuis 2022, nécessitait
  ces clarifications. Une fois que j''ai dit tout cela, ça n''enlève rien à cet imaginaire
  qui nous dépasse, et à l''amour que nous portons pour ce pays et que nous nous portons.
  Et je voulais vous dire ces quelques mots de conviction et du cœur, et vous dire
  que tout cela continuera de nous animer, parfois de nous diviser, qu''importe. Nous
  sommes là et nous nous aimons. Et vous savez, on était avec le ministre, fini à
  l''instant, qui me disait tout ce qu''il faisait avec l''Association des maires
  ruraux de France, en lien avec plusieurs villes et villages en Arménie. Et je me
  souviens, comme hier, de son prédécesseur, Vanik Berberian, qui était un homme formidable,
  maire de Gargilesse, enfant de la République, président de l''Association des maires
  ruraux de France, promoteur de Georges Sand et de la ruralité. Cet homme, malheureusement,
  quand il fut touché par la maladie, durant tous les derniers mois, a revécu dans
  l''Arménie rêvée. Et il m''écrivait toutes les semaines en m''envoyant des musiques,
  des poèmes - Michel, recevez, je pense, les mêmes vous aussi - de l''Arménie de
  son enfance, d''une Arménie parfois qu''il n''avait jamais connue, d''une Arménie
  rêvée. Le duduk était là, les musiques parfois les plus spirituelles, et il a tenu
  par cela. Il y a quelque chose d''irrationnel dans ce lien qui nous lie, cet amour
  de la liberté, de l''universel, cette identité qui nous rend plus forts l''un et
  l''autre. Et je sais combien, ici, tant d''entre vous ont la même nostalgie de France
  ou la même France tant aimée que vous colportez en Arménie et qui nous rend plus
  forts. C''est ça, la communauté arménienne en France, la communauté française en
  Arménie. Voilà, Mesdames et Messieurs. Merci à vous, mes chers compatriotes. Vive
  la République, vive la France, vive l''amitié entre l''Arménie et la France. 22
  juillet 2026 - Seul le prononcé fait foi Mesdames et Messieurs les ministres, Monsieur
