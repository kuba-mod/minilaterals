date: '2026-05-19'
type: press_release
source_name: elysee
title: Conférence ministérielle "No Money For Terror".
text: 'Le Président de la République a participé à la cinquième conférence ministérielle
  « No Money For Terror » le mardi 19 mai 2026 au ministère de l''Économie, des Finances
  et de la Souveraineté industrielle, énergétique et numérique. Organisée dans le
  cadre de la présidence française du G7, cette conférence a réunit à Paris plus de
  70 délégations internationales engagées dans la lutte contre le financement du terrorisme
  . Cette rencontre a offert une occasion unique à la communauté internationale de
  dresser un état des lieux de ses engagements et réaffirmer sa mobilisation sur le
  sujet. Cette cinquième édition s''inscrit dans la continuité de l’initiative lancée
  par le Président de la République à Paris en 2018, puis poursuivie à Melbourne en
  2019, New Delhi en 2022 et Munich en 2025. La conférence NMFT marque un temps fort
  de la filière Finances de la présidence française du G7, qui fait de la lutte contre
  la criminalité financière l’une de ses priorités. En particulier, le financement
  du terrorisme demeure une préoccupation majeure de la France et de ses partenaires
  internationaux , compte tenu de la gravité des menaces persistantes que font peser
  les groupes terroristes sur la sécurité des populations, la stabilité des sociétés
  et la paix. La France, considérée comme l’un des pays les plus efficaces en matière
  de lutte contre la criminalité financière, se distingue par la qualité de son dispositif
  de lutte contre le blanchiment de capitaux et le financement du terrorisme . C’est
  le fruit d’une collaboration étroite entre différents services de l’État et d’une
  action coordonnée entre les ministères. Pendant cette conférence, les discussions
  ont permis d’aborder trois enjeux d’actualité : Monsieur le ministre, merci beaucoup
  pour l''accueil. Je remercie l''ensemble des équipes de Bercy et tous les services
  qui, sous votre autorité, ont accueilli cet événement. A la fois les travaux du
  G7 avec l''ensemble de vos homologues [du G7] et des nations qu''on a souhaité accueillir,
  et puis beaucoup de vos homologues qui sont là pour cette réunion. Mesdames et Messieurs
  les dirigeants et dirigeantes d''organisations internationales, Mesdames, Messieurs
  les ministres, Mesdames, Messieurs les ambassadrices, ambassadeurs, Mesdames, Messieurs
  les directrices et directeurs, Mesdames, Messieurs en vos grades et qualités. Je
  suis très heureux, d''abord, de revenir à Bercy, maison qui m’est familière et que
  j''aime beaucoup, [et d’y retrouver] des gens remarquables qui y travaillent, de
  retrouver le ministre entouré de plusieurs de ses collègues du Gouvernement avec
  tant de ses homologues ici pour cette 5ème édition de la conférence « No Money For
  Terror ». Malheureusement pour moi, quand on est vétéran dans ce métier, on peut
  se souvenir des anciennes réunions, et donc je me souviens très bien de la première
  de ces réunions en 2018 à l''OCDE, où nous avons lancé cette initiative avec plusieurs
  d''entre vous. Je pense que c''est très important que le travail se soit poursuivi
  et que, huit ans plus tard, nous nous retrouvions, pouvant constater tout ce qui
  a été fait, mais aussi tout ce qui nous reste à faire. En m''adressant devant vous
  aujourd''hui, en vous disant ma gratitude pour tous les ministres qui sont présents
  et tout le travail fait, je veux évidemment avoir une pensée pour les victimes de
  tous les attentats terroristes que nos pays, nos populations ont subi durant ces
  dernières années, parfois ces derniers mois, ainsi qu''à leurs proches. Cette conférence
  est un rappel que la mobilisation ne faiblit pas et que la communauté internationale
  est décidée à véritablement aller au bout et lutter sans relâche contre le terrorisme
  sous toutes ses formes, et la criminalité qui l''accompagne, et qu''évidemment,
  la partie financière est ô combien importante dans cette lutte. Cette conférence
  a mobilisé de manière très large, et on le voit bien, durant toutes ces dernières
  années, beaucoup a été fait. Nous avons, depuis l''édition de 2018, donné une impulsion
  considérable. Une impulsion d''abord qui a créé une dynamique, un véritable mouvement
  pour lutter contre le financement du terrorisme. Il a conservé tout son élan grâce
  à l''engagement de l''Australie, de l''Inde, de l''Allemagne, qui ont pris l''initiative
  d''organiser de nouvelles éditions, des rendez-vous « No Money For Terror », ainsi
  que celui de toutes les délégations qui ont pris part à ces événements importants.
  La présence en ces murs aujourd''hui de près de 90 pays et organisations internationales
  issus de tous les continents témoigne encore de ce que la lutte contre le financement
  du terrorisme est une priorité de tous et un combat mené de concert par la communauté
  internationale. On le voit bien, depuis 2018, on a réussi vraiment à mobiliser,
  à élargir le cercle, à avoir une action d''autant plus efficace qu''elle englobe
  une quasi-totalité de la communauté internationale. Cette approche unie, coordonnée,
  est la seule à même de faire obstacle aux organisations terroristes structurées
  et financées à l''échelle internationale. Nous savons que chaque pays qui manque,
  c''est un angle mort dans lequel viennent s''engouffrer les groupes terroristes.
  Il est donc absolument essentiel de continuer à élargir ce cercle et à poursuivre
  cet élan de mobilisation qui est déjà le premier succès de ces huit dernières années.
  Je sais que votre réunion aujourd''hui fut précédée d''un intense travail préparatoire
  qui a fait intervenir les experts de la société civile, les organisations humanitaires
  intervenant dans les territoires les plus touchés, les acteurs privés en situation
  de détecter et prévenir des tentatives de financement du terrorisme. Tous ont répondu
  présents, et c''est très important. En même temps qu''il y a une mobilisation géographique
  la plus large possible, la mobilisation de tous les secteurs et de tous les acteurs
  est essentielle. Elle a structuré, j''y reviendrai dans un instant, le modèle français.
  Elle continue de le structurer. Mais il est important que, dans tous les pays, on
  continue d''engager l''ensemble des partenaires privés pour, évidemment, attraper
  ces flux financiers qui nourrissent le terrorisme. La première conférence « No Money
  For Terror » avait en outre abouti à l''adoption d''un agenda de Paris comme ambitieuse
  feuille de route, dont votre réunion aujourd''hui fut l''occasion d''un important
  travail de bilan. Une étape cruciale a été franchie un an après la première conférence
  à Paris avec l''adoption, sous la présidence française du Conseil de sécurité des
  Nations unies, de la résolution dite 2462, la première résolution des Nations unies
  intégralement dédiée à la lutte contre le financement du terrorisme. Celle-ci reprenait
  largement cet agenda de Paris et ce qui avait été fait par vous-mêmes ou vos prédécesseurs
  en 2018. Depuis, les États du monde entier ont l''obligation d''incriminer le financement
  du terrorisme selon une définition commune à tous, intégrant les nouvelles menaces
  et un niveau d''exigence à la hauteur de l''enjeu. Sur cette base, les pays ont
  considérablement renforcé les instruments à leur disposition, que ce soit par la
  création de cellules de renseignements financiers, par le renforcement des obligations
  de transparence de chaque transaction ou encore par la modernisation des cadres
  légaux permettant un partage d''informations entre partenaires le plus rapide possible,
  efficace et sûr. A titre d''illustration, pour montrer que ce travail continue,
  je veux saluer le MoU signé entre Tracfin et son homologue marocain à l''occasion
  de cet événement qui permet justement d''avancer. Durant toutes ces années, nous
  avons continué dans tous vos pays, côté français aussi, à avancer sur la base de
  cet agenda. Je veux saluer le travail de nos services de renseignement intérieur
  et extérieur, de nos services enquêteurs [et] de nos magistrats, qui, durant toutes
  ces dernières années, ont consolidé la lutte contre le terrorisme. Cette lutte est
  profondément interministérielle : l''Intérieur, la Justice, avec aussi la pénitentiaire,
  les services financiers, les services sociaux aussi, [qui] constituent cet ensemble
  que nous avons su regrouper en bâtissant aussi une coordination de notre renseignement
  et de la lutte contre le terrorisme basée à l''Élysée, qui a été construite en même
  temps que la première réunion à la première conférence de « No Money For Terror
  ». Tout ça a été, si je puis dire, l''édifice que nous avons consolidé en franco-français
  ces dernières années, avec un parquet national antiterroriste, avec des services
  spécialisés, un chef de filât donné à la Direction générale de la Sécurité intérieure
  et une coordination de toute une communauté du renseignement et de tous les services.
  Tout ça nous a rendus beaucoup plus efficaces, et je sais que beaucoup de vos pays,
  chacun prenant sa voie, ont aussi renforcé ce travail, et la coopération a permis,
  justement, de consolider tout cela. Nous avons renforcé aussi notre mécanisme national
  de gel d''avoirs. Nous avons mobilisé davantage pour faire des régimes de sanctions
  antiterroristes européens et onusiens des outils efficaces durant cette période,
  dans la lignée des résolutions 1373 et 2462 du Conseil de sécurité. Puis, nous avons
  aussi, au niveau européen, continué le travail et renforcé ce travail de manière
  très structurante durant ces dernières années. Tout ça est venu aussi consolider
  et réitérer le rôle central que joue le groupe d''action financière, le GAFI. Je
  crois que vos discussions de cet après-midi confirment que son rôle est plus que
  jamais essentiel contre le financement du terrorisme. Créé il y a 37 ans sous l''impulsion
  du G7, sous présidence française, c''est aujourd''hui un outil incontournable, qu''il
  s''agisse de l''émission de normes de référence, véritable boussole de l''action
  des États contre la criminalité financière, qu''il s''agisse aussi de l''évaluation
  régulière de l''efficacité des pays à lutter contre le financement du terrorisme
  et les autres flux financiers illicites, indispensables à assurer la crédibilité
  de nos engagements. Au plan opérationnel, le groupe Egmont poursuit également sa
  mobilisation pour garantir la coopération efficace des cellules de renseignements
  financiers du monde entier contre le financement du terrorisme. Donc oui, nous avons
  ces dernières années consolidé à la fois la norme, mais de manière très opérationnelle
  les liens entre nos services avec de véritables résultats. Nous nous sommes aussi
  engagés derrière le GAFI. La France s''était engagée lors de notre premier rassemblement
  à rehausser sa contribution volontaire au GAFI, et nous renouvelons une fois encore
  notre contribution volontaire à hauteur de trois millions d''euros pour l''exercice
  2025-2027. Alors si l''Agenda de Paris conserve en 2026 sa pertinence, si vous avez
  collectivement beaucoup œuvré ces dernières années pour améliorer la lutte contre
  le financement du terrorisme, nos efforts sur plusieurs priorités doivent continuer
  de se porter et je voudrais revenir sur juste trois d''entre elles pour ne pas être
  trop long. La première, elle me paraît tout à fait critique et doit alimenter les
  travaux du G7 et la coopération opérationnelle entre nous. C''est la question des
  innovations financières et de la lutte contre les paradis réglementaires. En effet,
  les innovations financières, et en particulier les cryptoactifs, sont porteuses
  de progrès et d''opportunités indéniables pour nos sociétés. Mais leur mésusage
  à des fins terroristes constitue un risque : reposant sur le pseudonymat, elles
  favorisent l''opacité et peuvent donc être détournées. Alors, nous avons des stratégies
  nationales sur ces cryptomonnaies, sur ces cryptoactifs. Plusieurs sont d''ailleurs
  en avance et aux avant-postes. Je sais toutes les réflexions, parfois en termes
  de non-régulation, de dérégulation sur ce sujet, qui peuvent paraître parfois très
  attractives. Mais enfin, une chose est sûre, c''est que c''est un instrument massif
  de contournement de toutes les règles que nous nous sommes données. Je le dis avec
  beaucoup de gravité : si nous laissons un continent émergent totalement hors de
  régulation, hors des instruments que nous avons développés, d''abord, de facto ,
  nous serons complices d''activités terroristes, coupables ou de criminalités organisées.
  Mais surtout, dès l''année prochaine ou l''année suivante, nous aurons des débats
  légitimes qui viendront d''acteurs régulés qui nous diront : « Vous ne nous apportez
  plus le level playing field » , comme on dit en bon français. « Vous nous imposez
  toutes les règles et, à côté, vous nous créez des compétiteurs qui n''en ont plus
  aucune ». Il n''y a pas de monde soutenable, en paix, de régulation et de stabilité
  financière pour nos pays si, en quelque sorte, nous réinventons un Far West que
  nous avons régulé. Nous avons connu un monde financier sans régulation aucune. C''est
  celui-là même qui nous a conduits progressivement à réguler nos acteurs par des
  règles de soutenabilité, de liquidités, par aussi des règles de transparence pour
  traquer les flux illicites et le financement d''activités illicites. Ne laissons
  pas s''installer autour des cryptoactifs une forme d''opportunité pour les criminels
  et les terroristes ou de voie de détournement des règles que nous avons créées.
  C''est le sens des travaux que nous avons engagés en France et en Europe pour faire
  de l''Europe une place forte de l''innovation dans le secteur, mais aussi pour réguler,
  rendre plus transparent. À cet égard, plusieurs d''entre vous, je pense à nos amis
  du Golfe qui ont beaucoup développé ces activités, qui ont aussi eu des premières
  autorités de régulation, peuvent échanger aussi de manière très transparente et
  utile avec nous. Je salue tous les acteurs privés qui s''engagent dans cette démarche.
  Je les invite à le faire en France, gage aussi de bonnes régulations, mais nous
  devons absolument développer ce travail et le faire de manière commune. Je pense
  qu’il est très important que le groupe que vous représentez, compte tenu de vos
  compétences et du fait qu''il y a tous les acteurs pertinents, avec justement une
  géographie là aussi pertinente qui est ici présente, le fasse dès maintenant ensemble.
  C’est la clé du succès. C''est ce cercle-là que vous représentez aujourd''hui, qui
  permettra de définir la bonne régulation au bon niveau, tout à la fois efficace
  pour lutter contre le financement du terrorisme et proportionnée pour continuer
  à laisser l''innovation prospérer. Parce qu''à côté de ça, ces cryptoactifs permettent
  de redonner de la liquidité, permettent des échanges aussi plus facilement, permettent
  de réduire certains frais pour de la circulation monétaire et financière entre plusieurs
  géographies, et c''est une source d''innovation. Mais il ne faut pas la laisser
  être détournée. Il nous reviendra collectivement, en particulier, dans le cadre
  du GAFI, de nous assurer de la mise en œuvre d''une régulation adéquate, harmonisée,
  sur des services sur cryptoactifs. Ne laissons pas des paradis réglementaires nouveaux
  se développer alors que nous avons mis tant d''années à combattre ce qui préexistait.
  La deuxième priorité que je voulais ici mentionner pour les années à venir, ce sont
  les interactions maintenant clairement identifiées entre la lutte contre le terrorisme
  et la criminalité organisée. Tous ces derniers mois, nous avons conduit en France
  ce travail. Le ministère de l''Intérieur, le garde des Sceaux ici présent, la ministre
  déléguée ici présente et les services de Bercy - je pense évidemment aussi à Tracfin,
  comme d''ailleurs aux collègues de la sphère sociale - ont beaucoup œuvré pour bâtir
  une stratégie de lutte contre la criminalité organisée. Nous l''avons fait en nous
  inspirant très profondément de ce qu''on avait bâti ces dernières années dans la
  lutte contre le terrorisme. Nous l''avons fait en identifiant que, dans de plus
  en plus de géographies, la connexion entre la criminalité organisée et le terrorisme
  est croissante. Nous avons bâti une organisation nouvelle avec un chef de filât.
  Je le disais : [pour] la lutte antiterroriste, nous avons confié le chef de filât
  à la Direction générale de la Sécurité intérieure. Nous avons, en septembre 2025,
  donné à la Direction nationale de la police judiciaire le chef de filât de la lutte
  contre la criminalité organisée. Comme nous avions bâti un parquet national antiterroriste,
  nous avons bâti un tout nouveau parquet national anticriminalité organisée. Nous
  avons aussi créé une structure avec un État-major de lutte contre la criminalité
  organisée rassemblant l''ensemble des services de l''État, travaillant de concert,
  mutualisant les moyens et les informations, et permettant d''être beaucoup plus
  efficaces dans cette lutte contre la criminalité organisée. C''est ce travail qu''il
  nous faut conduire, je le crois très profondément, à l''échelle internationale et
  dans le cadre de ce forum. Plusieurs pays représentés aujourd''hui ont clairement
  alerté, à juste titre, sur les porosités qui existent entre financement du terrorisme
  et criminalité organisée. Nous l''avons constaté, nous l''avons fait avancer sur
  l''agenda national. Le GAFI, d''ailleurs, a toujours été vigilant à cet égard, et
  c''est pourquoi, il nous faut maintenant bâtir des coopérations nouvelles pour renforcer
  notre action. La criminalité organisée, toujours prompte à intégrer les innovations
  financières à ses modes de fonctionnement, peut aussi vendre son expertise et ainsi
  offrir aux entités terroristes la voie vers de nouvelles opportunités de financement
  illicites. Il faut nous garder de toute approche en silo. Donc, de la même manière
  que nous avons structuré une réponse nationale qui vise à garantir l''interministérialité
  et la plus grande efficacité, il est très important de faire circuler le travail
  entre la lutte contre la criminalité organisée et la lutte contre le terrorisme.
  Il est important de le faire aussi dans vos enceintes, de multiplier les coopérations
  entre services de renseignement, de multiplier les échanges d''informations pertinentes
  et de multiplier les coopérations en matière judiciaire entre les réseaux identifiés.
  Si nous voulons démanteler les hydres qui souvent fonctionnent, et de plus en plus,
  entre plusieurs pays, avec une capacité d''adaptation extraordinaire, il nous faut,
  nous, redoubler de capacités d''innovation et être extrêmement rapides, transparents,
  et ouvrir les circuits d''information entre, parfois, ces différents silos. La troisième
  priorité sur laquelle je voulais insister, c''est ce que j''appellerais l''emprise
  territoriale. Certaines organisations terroristes sont en mesure de générer des
  revenus importants par le contrôle qu''elles exercent sur un territoire même de
  superficie limitée. Nous ne pouvons ignorer les méthodes mises en place par des
  filiales de l''État islamique, d''Al-Qaïda en Afrique ou de Boko Haram, ou au Moyen-Orient
  ou en Asie, qu''il s''agisse d''extorsion de population, de pillage de ressources
  naturelles ou sur le continent latino-américain, d''enlèvement contre rançon. Contre
  les emprises territoriales terroristes, nous devons redoubler d''efforts et redoubler
  aussi notre soutien aux institutions légitimes. Ce soutien doit être total. L''ambiguïté
  ne doit jamais exister. Les médiations avec un tel ou un tel ne sont jamais légitimes.
  Dans la bataille que nous menons - et cela vaut aussi pour la lutte anti-terroriste
  de manière tout à fait militaire, c''est ce que nous faisons en coopération en apportant
  notre soutien à plusieurs États d''ailleurs africains, [soutien que nous avons]
  renforcé ces derniers mois. Comme en matière de lutte contre les financements, la
  lutte contre cette emprise territoriale est absolument clé. Nos échanges, et c''est
  la nouveauté de cette cinquième édition des conférences « No Money For Terror »,
  ont également porté sur les territoires qui ont connu une emprise terroriste et
  qui ont été confrontés au défi, justement, de permettre la réintégration dans les
  circuits financiers internationaux. C''est l''un des points sur lesquels je voudrais
  conclure. Aussi important que tous les éléments de lutte et quelques priorités additionnelles
  sur lesquelles je voulais ici insister, lorsque nous libérons des territoires de
  l''emprise terroriste, il est très important d''être collectivement efficaces pour
  la réinsertion financière et la réinclusion financière des territoires libérés.
  On l''a vu parfois dans des batailles que nous avons perdues ou insuffisamment gagnées :
  à chaque fois qu''on gagne contre un groupe terroriste, si derrière le développement
  économique, la normalisation politique et administrative ne s''installent pas, les
  groupes terroristes reviennent. Parce qu''en quelque sorte, ils proposent des opportunités
  économiques informelles. On l''a vu pendant malheureusement plusieurs années au
  Sahel. À chaque fois que nous gagnons contre un groupe terroriste, que nous le poussons
  hors d''une emprise territoriale, il est nécessaire de permettre très rapidement
  aux territoires libérés d''être réinclus dans les enceintes internationales. La
  réinclusion financière est un aspect central du combat contre le terrorisme. Il
  s''agit de lutter contre ses causes profondes en réunissant les conditions de l''accès
  humanitaire, de la stabilisation, du développement économique et de la reconstruction.
  Et ce sera clé, d''ailleurs, dans plusieurs pays du Moyen-Orient - je pense à la
  Syrie, je pourrais penser à beaucoup d''autres - où cette réinclusion est très importante
  et est à organiser de manière tout à fait véloce et structurée. Je le dis tout autant
  pour la Syrie que pour les chers voisins de celle-ci, dont le Liban, puisque le
  ministre nous fait l''honneur d''être présent parmi nous. C''est pour cette raison
  aussi que la France a soutenu l''adoption pérenne de la résolution des Nations unies
  2664, prévoyant une exemption humanitaire transversale pour les régimes de sanctions.
  Nous le savons parce que nous y avons été confrontés. Dans des pays où des régimes
  de sanctions existent, on s''était parfois trouvé confrontés à l''impossibilité
  de financer des actions humanitaires. Cette résolution est venue régler ce problème
  et il est absolument clé. Par ailleurs, le retour des services financiers régulés
  dans les territoires contribue aussi à la transparence des transactions qui vont
  y opérer et donc à la prévention des futurs criminels. En somme, dès qu''on gagne
  contre les groupes terroristes, il faut très vite réinclure, normaliser et recréer
  un cadre régulé financier, car c''est ce qui coupe les potentielles voies de financement
  nouveau pour d''autres activités terroristes à venir. Ainsi se concluent donc les
  cinquièmes éditions des conférences « No Money For Terror ». L''agenda que vous
  avez bâti est clair. Je veux ici vous dire que la France s''efforcera de porter
  ses résultats sans relâche. Nous le ferons dans le cadre, et le ministre vous l''a
  dit, de la présidence du G7 que nous assurons cette année, et nous le ferons aussi
  avec tous nos partenaires en parfaite intelligence. Notre mobilisation ne pourra
  retomber aussi longtemps que des actes terroristes trouveront financement. C''est
  absolument indispensable. Sur la base de tout ce qui a été fait ces dernières années,
  de tout ce que je viens d''essayer de manière imparfaite, sans être trop rapide,
  de récapituler, mais aussi sur la base des quelques priorités nouvelles qui sont
  les nôtres, il nous faut redoubler d''actions. C''est ce que nous devons à la sécurité
  et la sûreté de nos populations, c''est ce que nous devons pour avoir, le monde
  dans lequel nous voulons vivre, un monde de paix, de stabilité, où les actions terroristes
  n''ont pas prise. Ceci suppose aussi d''être organisés pour continuer d''avoir un
  cadre transparent, sain, pleinement souverain, dans une coopération efficace et
  qui nous permette de bâtir la paix d''aujourd''hui et de demain. Je veux vous remercier
  très chaleureusement de votre présence, mais du travail que vous conduisez tout
  au long de l''année et avec vous, l''ensemble de vos équipes, et je le dis aussi
  pour l''ensemble des équipes françaises qui sont ici présentes et dans tous les
  ministères représentés, qui œuvrent chaque jour avec une détermination absolue pour
  lutter contre le terrorisme et pour lutter contre la criminalité organisée. Monsieur
  le ministre, merci beaucoup pour l''accueil. Je remercie l''ensemble des équipes
  de Bercy et tous les services qui, sous votre autorité, ont accueilli cet événement.
  A la fois les travaux du G7 avec l''ensemble de vos homologues [du G7] et des nations
  qu''on a souhaité accueillir, et puis beaucoup de vos homologues qui sont là pour
  cette réunion. Mesdames et Messieurs les dirigeants et dirigeantes d''organisations
  internationales, Mesdames, Messieurs les ministres, Mesdames, Messieurs les ambassadrices,
  ambassadeurs, Mesdames, Messieurs les directrices et directeurs, Mesdames, Messieurs
  en vos grades et qualités. Je suis très heureux, d''abord, de revenir à Bercy, maison
  qui m’est familière et que j''aime beaucoup, [et d’y retrouver] des gens remarquables
  qui y travaillent, de retrouver le ministre entouré de plusieurs de ses collègues
  du Gouvernement avec tant de ses homologues ici pour cette 5ème édition de la conférence
  « No Money For Terror ». Malheureusement pour moi, quand on est vétéran dans ce
  métier, on peut se souvenir des anciennes réunions, et donc je me souviens très
  bien de la première de ces réunions en 2018 à l''OCDE, où nous avons lancé cette
  initiative avec plusieurs d''entre vous. Je pense que c''est très important que
  le travail se soit poursuivi et que, huit ans plus tard, nous nous retrouvions,
  pouvant constater tout ce qui a été fait, mais aussi tout ce qui nous reste à faire.
  En m''adressant devant vous aujourd''hui, en vous disant ma gratitude pour tous
  les ministres qui sont présents et tout le travail fait, je veux évidemment avoir
  une pensée pour les victimes de tous les attentats terroristes que nos pays, nos
  populations ont subi durant ces dernières années, parfois ces derniers mois, ainsi
  qu''à leurs proches. Cette conférence est un rappel que la mobilisation ne faiblit
  pas et que la communauté internationale est décidée à véritablement aller au bout
  et lutter sans relâche contre le terrorisme sous toutes ses formes, et la criminalité
  qui l''accompagne, et qu''évidemment, la partie financière est ô combien importante
  dans cette lutte. Cette conférence a mobilisé de manière très large, et on le voit
  bien, durant toutes ces dernières années, beaucoup a été fait. Nous avons, depuis
  l''édition de 2018, donné une impulsion considérable. Une impulsion d''abord qui
  a créé une dynamique, un véritable mouvement pour lutter contre le financement du
  terrorisme. Il a conservé tout son élan grâce à l''engagement de l''Australie, de
  l''Inde, de l''Allemagne, qui ont pris l''initiative d''organiser de nouvelles éditions,
  des rendez-vous « No Money For Terror », ainsi que celui de toutes les délégations
  qui ont pris part à ces événements importants. La présence en ces murs aujourd''hui
  de près de 90 pays et organisations internationales issus de tous les continents
  témoigne encore de ce que la lutte contre le financement du terrorisme est une priorité
  de tous et un combat mené de concert par la communauté internationale. On le voit
  bien, depuis 2018, on a réussi vraiment à mobiliser, à élargir le cercle, à avoir
  une action d''autant plus efficace qu''elle englobe une quasi-totalité de la communauté
  internationale. Cette approche unie, coordonnée, est la seule à même de faire obstacle
  aux organisations terroristes structurées et financées à l''échelle internationale.
  Nous savons que chaque pays qui manque, c''est un angle mort dans lequel viennent
  s''engouffrer les groupes terroristes. Il est donc absolument essentiel de continuer
  à élargir ce cercle et à poursuivre cet élan de mobilisation qui est déjà le premier
  succès de ces huit dernières années. Je sais que votre réunion aujourd''hui fut
  précédée d''un intense travail préparatoire qui a fait intervenir les experts de
  la société civile, les organisations humanitaires intervenant dans les territoires
  les plus touchés, les acteurs privés en situation de détecter et prévenir des tentatives
  de financement du terrorisme. Tous ont répondu présents, et c''est très important.
  En même temps qu''il y a une mobilisation géographique la plus large possible, la
  mobilisation de tous les secteurs et de tous les acteurs est essentielle. Elle a
  structuré, j''y reviendrai dans un instant, le modèle français. Elle continue de
  le structurer. Mais il est important que, dans tous les pays, on continue d''engager
  l''ensemble des partenaires privés pour, évidemment, attraper ces flux financiers
  qui nourrissent le terrorisme. La première conférence « No Money For Terror » avait
  en outre abouti à l''adoption d''un agenda de Paris comme ambitieuse feuille de
  route, dont votre réunion aujourd''hui fut l''occasion d''un important travail de
  bilan. Une étape cruciale a été franchie un an après la première conférence à Paris
  avec l''adoption, sous la présidence française du Conseil de sécurité des Nations
  unies, de la résolution dite 2462, la première résolution des Nations unies intégralement
  dédiée à la lutte contre le financement du terrorisme. Celle-ci reprenait largement
  cet agenda de Paris et ce qui avait été fait par vous-mêmes ou vos prédécesseurs
  en 2018. Depuis, les États du monde entier ont l''obligation d''incriminer le financement
  du terrorisme selon une définition commune à tous, intégrant les nouvelles menaces
  et un niveau d''exigence à la hauteur de l''enjeu. Sur cette base, les pays ont
  considérablement renforcé les instruments à leur disposition, que ce soit par la
  création de cellules de renseignements financiers, par le renforcement des obligations
  de transparence de chaque transaction ou encore par la modernisation des cadres
  légaux permettant un partage d''informations entre partenaires le plus rapide possible,
  efficace et sûr. A titre d''illustration, pour montrer que ce travail continue,
  je veux saluer le MoU signé entre Tracfin et son homologue marocain à l''occasion
  de cet événement qui permet justement d''avancer. Durant toutes ces années, nous
  avons continué dans tous vos pays, côté français aussi, à avancer sur la base de
  cet agenda. Je veux saluer le travail de nos services de renseignement intérieur
  et extérieur, de nos services enquêteurs [et] de nos magistrats, qui, durant toutes
  ces dernières années, ont consolidé la lutte contre le terrorisme. Cette lutte est
  profondément interministérielle : l''Intérieur, la Justice, avec aussi la pénitentiaire,
  les services financiers, les services sociaux aussi, [qui] constituent cet ensemble
  que nous avons su regrouper en bâtissant aussi une coordination de notre renseignement
  et de la lutte contre le terrorisme basée à l''Élysée, qui a été construite en même
  temps que la première réunion à la première conférence de « No Money For Terror
  ». Tout ça a été, si je puis dire, l''édifice que nous avons consolidé en franco-français
  ces dernières années, avec un parquet national antiterroriste, avec des services
  spécialisés, un chef de filât donné à la Direction générale de la Sécurité intérieure
  et une coordination de toute une communauté du renseignement et de tous les services.
  Tout ça nous a rendus beaucoup plus efficaces, et je sais que beaucoup de vos pays,
  chacun prenant sa voie, ont aussi renforcé ce travail, et la coopération a permis,
  justement, de consolider tout cela. Nous avons renforcé aussi notre mécanisme national
  de gel d''avoirs. Nous avons mobilisé davantage pour faire des régimes de sanctions
  antiterroristes européens et onusiens des outils efficaces durant cette période,
  dans la lignée des résolutions 1373 et 2462 du Conseil de sécurité. Puis, nous avons
  aussi, au niveau européen, continué le travail et renforcé ce travail de manière
  très structurante durant ces dernières années. Tout ça est venu aussi consolider
  et réitérer le rôle central que joue le groupe d''action financière, le GAFI. Je
  crois que vos discussions de cet après-midi confirment que son rôle est plus que
  jamais essentiel contre le financement du terrorisme. Créé il y a 37 ans sous l''impulsion
  du G7, sous présidence française, c''est aujourd''hui un outil incontournable, qu''il
  s''agisse de l''émission de normes de référence, véritable boussole de l''action
  des États contre la criminalité financière, qu''il s''agisse aussi de l''évaluation
  régulière de l''efficacité des pays à lutter contre le financement du terrorisme
  et les autres flux financiers illicites, indispensables à assurer la crédibilité
  de nos engagements. Au plan opérationnel, le groupe Egmont poursuit également sa
  mobilisation pour garantir la coopération efficace des cellules de renseignements
  financiers du monde entier contre le financement du terrorisme. Donc oui, nous avons
  ces dernières années consolidé à la fois la norme, mais de manière très opérationnelle
  les liens entre nos services avec de véritables résultats. Nous nous sommes aussi
  engagés derrière le GAFI. La France s''était engagée lors de notre premier rassemblement
  à rehausser sa contribution volontaire au GAFI, et nous renouvelons une fois encore
  notre contribution volontaire à hauteur de trois millions d''euros pour l''exercice
  2025-2027. Alors si l''Agenda de Paris conserve en 2026 sa pertinence, si vous avez
  collectivement beaucoup œuvré ces dernières années pour améliorer la lutte contre
  le financement du terrorisme, nos efforts sur plusieurs priorités doivent continuer
  de se porter et je voudrais revenir sur juste trois d''entre elles pour ne pas être
  trop long. La première, elle me paraît tout à fait critique et doit alimenter les
  travaux du G7 et la coopération opérationnelle entre nous. C''est la question des
  innovations financières et de la lutte contre les paradis réglementaires. En effet,
  les innovations financières, et en particulier les cryptoactifs, sont porteuses
  de progrès et d''opportunités indéniables pour nos sociétés. Mais leur mésusage
  à des fins terroristes constitue un risque : reposant sur le pseudonymat, elles
  favorisent l''opacité et peuvent donc être détournées. Alors, nous avons des stratégies
  nationales sur ces cryptomonnaies, sur ces cryptoactifs. Plusieurs sont d''ailleurs
  en avance et aux avant-postes. Je sais toutes les réflexions, parfois en termes
  de non-régulation, de dérégulation sur ce sujet, qui peuvent paraître parfois très
  attractives. Mais enfin, une chose est sûre, c''est que c''est un instrument massif
  de contournement de toutes les règles que nous nous sommes données. Je le dis avec
  beaucoup de gravité : si nous laissons un continent émergent totalement hors de
  régulation, hors des instruments que nous avons développés, d''abord, de facto ,
  nous serons complices d''activités terroristes, coupables ou de criminalités organisées.
  Mais surtout, dès l''année prochaine ou l''année suivante, nous aurons des débats
  légitimes qui viendront d''acteurs régulés qui nous diront : « Vous ne nous apportez
  plus le level playing field » , comme on dit en bon français. « Vous nous imposez
  toutes les règles et, à côté, vous nous créez des compétiteurs qui n''en ont plus
  aucune ». Il n''y a pas de monde soutenable, en paix, de régulation et de stabilité
  financière pour nos pays si, en quelque sorte, nous réinventons un Far West que
  nous avons régulé. Nous avons connu un monde financier sans régulation aucune. C''est
  celui-là même qui nous a conduits progressivement à réguler nos acteurs par des
  règles de soutenabilité, de liquidités, par aussi des règles de transparence pour
  traquer les flux illicites et le financement d''activités illicites. Ne laissons
  pas s''installer autour des cryptoactifs une forme d''opportunité pour les criminels
  et les terroristes ou de voie de détournement des règles que nous avons créées.
  C''est le sens des travaux que nous avons engagés en France et en Europe pour faire
  de l''Europe une place forte de l''innovation dans le secteur, mais aussi pour réguler,
  rendre plus transparent. À cet égard, plusieurs d''entre vous, je pense à nos amis
  du Golfe qui ont beaucoup développé ces activités, qui ont aussi eu des premières
  autorités de régulation, peuvent échanger aussi de manière très transparente et
  utile avec nous. Je salue tous les acteurs privés qui s''engagent dans cette démarche.
  Je les invite à le faire en France, gage aussi de bonnes régulations, mais nous
  devons absolument développer ce travail et le faire de manière commune. Je pense
  qu’il est très important que le groupe que vous représentez, compte tenu de vos
  compétences et du fait qu''il y a tous les acteurs pertinents, avec justement une
  géographie là aussi pertinente qui est ici présente, le fasse dès maintenant ensemble.
  C’est la clé du succès. C''est ce cercle-là que vous représentez aujourd''hui, qui
  permettra de définir la bonne régulation au bon niveau, tout à la fois efficace
  pour lutter contre le financement du terrorisme et proportionnée pour continuer
  à laisser l''innovation prospérer. Parce qu''à côté de ça, ces cryptoactifs permettent
  de redonner de la liquidité, permettent des échanges aussi plus facilement, permettent
  de réduire certains frais pour de la circulation monétaire et financière entre plusieurs
  géographies, et c''est une source d''innovation. Mais il ne faut pas la laisser
  être détournée. Il nous reviendra collectivement, en particulier, dans le cadre
  du GAFI, de nous assurer de la mise en œuvre d''une régulation adéquate, harmonisée,
  sur des services sur cryptoactifs. Ne laissons pas des paradis réglementaires nouveaux
  se développer alors que nous avons mis tant d''années à combattre ce qui préexistait.
  La deuxième priorité que je voulais ici mentionner pour les années à venir, ce sont
  les interactions maintenant clairement identifiées entre la lutte contre le terrorisme
  et la criminalité organisée. Tous ces derniers mois, nous avons conduit en France
  ce travail. Le ministère de l''Intérieur, le garde des Sceaux ici présent, la ministre
  déléguée ici présente et les services de Bercy - je pense évidemment aussi à Tracfin,
  comme d''ailleurs aux collègues de la sphère sociale - ont beaucoup œuvré pour bâtir
  une stratégie de lutte contre la criminalité organisée. Nous l''avons fait en nous
  inspirant très profondément de ce qu''on avait bâti ces dernières années dans la
  lutte contre le terrorisme. Nous l''avons fait en identifiant que, dans de plus
  en plus de géographies, la connexion entre la criminalité organisée et le terrorisme
  est croissante. Nous avons bâti une organisation nouvelle avec un chef de filât.
  Je le disais : [pour] la lutte antiterroriste, nous avons confié le chef de filât
  à la Direction générale de la Sécurité intérieure. Nous avons, en septembre 2025,
  donné à la Direction nationale de la police judiciaire le chef de filât de la lutte
  contre la criminalité organisée. Comme nous avions bâti un parquet national antiterroriste,
  nous avons bâti un tout nouveau parquet national anticriminalité organisée. Nous
  avons aussi créé une structure avec un État-major de lutte contre la criminalité
  organisée rassemblant l''ensemble des services de l''État, travaillant de concert,
  mutualisant les moyens et les informations, et permettant d''être beaucoup plus
  efficaces dans cette lutte contre la criminalité organisée. C''est ce travail qu''il
  nous faut conduire, je le crois très profondément, à l''échelle internationale et
  dans le cadre de ce forum. Plusieurs pays représentés aujourd''hui ont clairement
  alerté, à juste titre, sur les porosités qui existent entre financement du terrorisme
  et criminalité organisée. Nous l''avons constaté, nous l''avons fait avancer sur
  l''agenda national. Le GAFI, d''ailleurs, a toujours été vigilant à cet égard, et
  c''est pourquoi, il nous faut maintenant bâtir des coopérations nouvelles pour renforcer
  notre action. La criminalité organisée, toujours prompte à intégrer les innovations
  financières à ses modes de fonctionnement, peut aussi vendre son expertise et ainsi
  offrir aux entités terroristes la voie vers de nouvelles opportunités de financement
  illicites. Il faut nous garder de toute approche en silo. Donc, de la même manière
  que nous avons structuré une réponse nationale qui vise à garantir l''interministérialité
  et la plus grande efficacité, il est très important de faire circuler le travail
  entre la lutte contre la criminalité organisée et la lutte contre le terrorisme.
  Il est important de le faire aussi dans vos enceintes, de multiplier les coopérations
  entre services de renseignement, de multiplier les échanges d''informations pertinentes
  et de multiplier les coopérations en matière judiciaire entre les réseaux identifiés.
  Si nous voulons démanteler les hydres qui souvent fonctionnent, et de plus en plus,
  entre plusieurs pays, avec une capacité d''adaptation extraordinaire, il nous faut,
  nous, redoubler de capacités d''innovation et être extrêmement rapides, transparents,
  et ouvrir les circuits d''information entre, parfois, ces différents silos. La troisième
  priorité sur laquelle je voulais insister, c''est ce que j''appellerais l''emprise
  territoriale. Certaines organisations terroristes sont en mesure de générer des
  revenus importants par le contrôle qu''elles exercent sur un territoire même de
  superficie limitée. Nous ne pouvons ignorer les méthodes mises en place par des
  filiales de l''État islamique, d''Al-Qaïda en Afrique ou de Boko Haram, ou au Moyen-Orient
  ou en Asie, qu''il s''agisse d''extorsion de population, de pillage de ressources
  naturelles ou sur le continent latino-américain, d''enlèvement contre rançon. Contre
  les emprises territoriales terroristes, nous devons redoubler d''efforts et redoubler
  aussi notre soutien aux institutions légitimes. Ce soutien doit être total. L''ambiguïté
  ne doit jamais exister. Les médiations avec un tel ou un tel ne sont jamais légitimes.
  Dans la bataille que nous menons - et cela vaut aussi pour la lutte anti-terroriste
  de manière tout à fait militaire, c''est ce que nous faisons en coopération en apportant
  notre soutien à plusieurs États d''ailleurs africains, [soutien que nous avons]
  renforcé ces derniers mois. Comme en matière de lutte contre les financements, la
  lutte contre cette emprise territoriale est absolument clé. Nos échanges, et c''est
  la nouveauté de cette cinquième édition des conférences « No Money For Terror »,
  ont également porté sur les territoires qui ont connu une emprise terroriste et
  qui ont été confrontés au défi, justement, de permettre la réintégration dans les
  circuits financiers internationaux. C''est l''un des points sur lesquels je voudrais
  conclure. Aussi important que tous les éléments de lutte et quelques priorités additionnelles
  sur lesquelles je voulais ici insister, lorsque nous libérons des territoires de
  l''emprise terroriste, il est très important d''être collectivement efficaces pour
  la réinsertion financière et la réinclusion financière des territoires libérés.
  On l''a vu parfois dans des batailles que nous avons perdues ou insuffisamment gagnées :
  à chaque fois qu''on gagne contre un groupe terroriste, si derrière le développement
  économique, la normalisation politique et administrative ne s''installent pas, les
  groupes terroristes reviennent. Parce qu''en quelque sorte, ils proposent des opportunités
  économiques informelles. On l''a vu pendant malheureusement plusieurs années au
  Sahel. À chaque fois que nous gagnons contre un groupe terroriste, que nous le poussons
  hors d''une emprise territoriale, il est nécessaire de permettre très rapidement
  aux territoires libérés d''être réinclus dans les enceintes internationales. La
  réinclusion financière est un aspect central du combat contre le terrorisme. Il
  s''agit de lutter contre ses causes profondes en réunissant les conditions de l''accès
  humanitaire, de la stabilisation, du développement économique et de la reconstruction.
  Et ce sera clé, d''ailleurs, dans plusieurs pays du Moyen-Orient - je pense à la
  Syrie, je pourrais penser à beaucoup d''autres - où cette réinclusion est très importante
  et est à organiser de manière tout à fait véloce et structurée. Je le dis tout autant
  pour la Syrie que pour les chers voisins de celle-ci, dont le Liban, puisque le
  ministre nous fait l''honneur d''être présent parmi nous. C''est pour cette raison
  aussi que la France a soutenu l''adoption pérenne de la résolution des Nations unies
  2664, prévoyant une exemption humanitaire transversale pour les régimes de sanctions.
  Nous le savons parce que nous y avons été confrontés. Dans des pays où des régimes
  de sanctions existent, on s''était parfois trouvé confrontés à l''impossibilité
  de financer des actions humanitaires. Cette résolution est venue régler ce problème
  et il est absolument clé. Par ailleurs, le retour des services financiers régulés
  dans les territoires contribue aussi à la transparence des transactions qui vont
  y opérer et donc à la prévention des futurs criminels. En somme, dès qu''on gagne
  contre les groupes terroristes, il faut très vite réinclure, normaliser et recréer
  un cadre régulé financier, car c''est ce qui coupe les potentielles voies de financement
  nouveau pour d''autres activités terroristes à venir. Ainsi se concluent donc les
  cinquièmes éditions des conférences « No Money For Terror ». L''agenda que vous
  avez bâti est clair. Je veux ici vous dire que la France s''efforcera de porter
  ses résultats sans relâche. Nous le ferons dans le cadre, et le ministre vous l''a
  dit, de la présidence du G7 que nous assurons cette année, et nous le ferons aussi
  avec tous nos partenaires en parfaite intelligence. Notre mobilisation ne pourra
  retomber aussi longtemps que des actes terroristes trouveront financement. C''est
  absolument indispensable. Sur la base de tout ce qui a été fait ces dernières années,
  de tout ce que je viens d''essayer de manière imparfaite, sans être trop rapide,
  de récapituler, mais aussi sur la base des quelques priorités nouvelles qui sont
  les nôtres, il nous faut redoubler d''actions. C''est ce que nous devons à la sécurité
  et la sûreté de nos populations, c''est ce que nous devons pour avoir, le monde
  dans lequel nous voulons vivre, un monde de paix, de stabilité, où les actions terroristes
  n''ont pas prise. Ceci suppose aussi d''être organisés pour continuer d''avoir un
  cadre transparent, sain, pleinement souverain, dans une coopération efficace et
  qui nous permette de bâtir la paix d''aujourd''hui et de demain. Je veux vous remercier
  très chaleureusement de votre présence, mais du travail que vous conduisez tout
  au long de l''année et avec vous, l''ensemble de vos équipes, et je le dis aussi
  pour l''ensemble des équipes françaises qui sont ici présentes et dans tous les
  ministères représentés, qui œuvrent chaque jour avec une détermination absolue pour
  lutter contre le terrorisme et pour lutter contre la criminalité organisée.'
