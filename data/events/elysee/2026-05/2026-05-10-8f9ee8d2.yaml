title: Visit in Kenya.
text: The President of the Republic visited Kenya from May 10 to 12, 2026, for the
  Africa Forward Summit. Upon his arrival on May 10, President Emmanuel Macron held
  talks with Kenyan President William Ruto . This bilateral meeting ahead of the Summit
  further strengthens the partnership between our two countries , which has continued
  to grow in recent years. In particular, the two leaders signed agreements on projects
  and partnerships between French and Kenyan companies.
