date: '2026-05-13'
type: press_release
source_name: elysee
title: Déplacement en République fédérale démocratique d'Éthiopie.
text: 'Le Président de la République s''est rendu en République fédérale démocratique
  d''Éthiopie le mercredi 13 mai 2026. Le Président Emmanuel Macron a commencé sa
  visite à Addis-Abeba par un entretien bilatéral élargi avec le Premier ministre
  éthiopien, Abiy Ahmed au Palais National d''Éthiopie. Puis, le chef de l''État a
  participé à une rencontre trilatérale avec le Président de la Commission de l’Union
  africaine, Mahmoud Ali Youssouf et le Secrétaire général des Nations unies, António
  Guterres au siège de l’Union Africaine. Cette réunion s''est centrée sur le renforcement
  des réponses conjointes sur les thématiques de paix et de sécurité . Enfin, le Président
  de la République s''est exprimé aux côtés du Président de la Commission de l’Union
  africaine. 22 juillet 2026 - Seul le prononcé fait foi Monsieur le Président de
  la Commission de l''Union africaine, cher Mahmoud, Je veux avoir un mot pour remercier
  le Premier ministre Abiy Ahmed de son accueil en Éthiopie et du moment bilatéral
  que nous avons eu. Ensuite, je tenais en effet à vous retrouver ici. Je suis très
  heureux de m''adresser à vous devant ce Nelson Mandela Hall et d''avoir pu échanger
  à l’instant avec le Président de l''Union africaine et les membres clés de sa gouvernance,
  ainsi qu’avec le Secrétaire général des Nations Unies et ses proches collaboratrices
  et collaborateurs. Le Président a parfaitement rappelé le contexte. Nous sortons
  de la conférence de Nairobi et donc de ce Sommet Africa Forward . Je tiens à vous
  remercier à nouveau, Président, vous-même, comme je remercie à l''instant le Secrétaire
  général des Nations Unies, Antonio Guterres, de votre présence à ce Sommet qui a
  permis, sur les sujets économiques et politiques, d''avancer dans plusieurs cadres.
  C’est aussi la parole que j''étais venu porter dans cette enceinte sur plusieurs
  sujets. Alors, sur les opérations africaines de paix, qui est le premier axe des
  échanges que nous avons eus aujourd''hui. Quelle est la position de la France que
  nous portons, ce qui a d''ailleurs été endossé à Nairobi, que nous avons largement
  discuté à l''instant ? Nous considérons que les problèmes africains doivent avant
  tout être réglés et coordonnés par l''Afrique, et que l''instance légitime est l''Union
  africaine. Je l''ai dit, face à toutes ces crises, la France s''est toujours engagée
  ces dernières années à soutenir les médiations africaines. Nous soutenons donc véritablement
  la coordination, sous l''autorité de l''Union africaine, de ces médiations. Il est
  important – et la déclaration de Nairobi a été très claire sur ce point – d’en finir
  en particulier avec les ingérences extérieures qui nourrissent beaucoup de conflits :
  je pense en particulier au Soudan, [ainsi qu’avec le recours croissant] à la privatisation
  de beaucoup de conflits qu''on voit sur le continent africain. A ce titre, la déclaration
  de Nairobi, endossée par tous les Etats, est un élément important de clarification.
  Alors, face à cela, que faire ? D''abord, opérationnaliser la résolution 27-19 du
  Conseil de sécurité des Nations unies. C''est celle qui permet d''opérationnaliser
  le financement adéquat, prévisible et durable pour les opérations de maintien de
  la paix en Afrique et qui crédibilisera le rôle de l''Union africaine. Cette résolution
  n''a pas encore trouvé d''application directe et concrète parce qu''elle est bloquée.
  On a vraiment cette volonté, tous les trois, de faire avancer ce dossier et de pouvoir
  mettre en œuvre cette résolution qui est essentielle et qui est le cadre le plus
  abouti dont nous disposons. C''est un outil large, fort, crédible, qui, d''ailleurs,
  montre que le multilatéralisme fonctionne lorsqu''on s''en donne les moyens. Pour
  ce faire, j''ai indiqué que la France était prête à coordonner le fonctionnement
  des 23 écoles nationales à vocation interrégionale présentes partout sur le continent
  africain afin de venir soutenir les efforts de l''Union africaine, en particulier
  dans la planification et la montée en capacité des forces nécessaires à la prévention
  des conflits et au maintien de la paix. Puis, vous avez pris une initiative importante,
  qui est celle de bâtir un fonds pour la paix de l''Union africaine. 400 millions
  d''euros ont déjà été mobilisés. L''objectif est un milliard. A ce titre, la France
  donc a indiqué sa disponibilité et nous avons décidé ensemble qu''une conférence
  internationale pour lever les fonds supplémentaires et mobiliser de nouveaux partenaires
  publics et privés pour ce fonds pour la paix de l''Union africaine sera organisée
  dans le dernier trimestre de cette année, à Paris. C''est là aussi un élément important
  pour donner de la crédibilité et de la force à ce soutien à l''Union africaine et
  à son rôle sur les opérations de maintien de la paix. Sur la gouvernance internationale,
  la France a une position claire là aussi. Nous nous sommes battus ces dernières
  années pour que l''Union africaine soit membre permanent du G20. C''est chose faite
  et c''est une fierté. Nous nous battons pour que l''Afrique soit représentée parmi
  les membres permanents du Conseil de sécurité. J''ai dit au Président [que] si un,
  deux membres étaient nommément désignés par l''Union africaine, par consensus de
  tous les pairs, je suis sûr qu''aucun des membres permanents ne sera capable de
  le bloquer. En tout cas, nous ferons tout le travail diplomatique à vos côtés. Mais
  le temps est venu. De la même manière, nous sommes favorables à la poursuite de
  la réforme de la gouvernance des institutions financières pour que l''Afrique soit
  mieux représentée. Puis, marque concrète de notre travail commun : à Nairobi, nous
  avons avancé sur l''amélioration du fonctionnement multilatéral en ayant 11 pays
  africains qui ont rejoint ce qu''on appelle l''initiative franco-mexicaine, initiative
  que nous avions lancée il y a quelques années, [et] qui consiste à limiter l''usage
  du droit de veto au Conseil de sécurité des Nations Unies en cas de crime de masse.
  Personne ne peut légitimement comprendre comment un État membre qui a le droit de
  veto au Conseil de sécurité peut bloquer le bon fonctionnement des Nations Unies
  lorsqu''un crime de masse est en cours. Cette limitation suppose une réforme de
  la charte. Grâce à la mobilisation que nous avons pu conduire à Nairobi, nous avons
  aujourd''hui 11 États africains qui nous ont rejoints, en plus de ceux qui étaient
  déjà derrière cette initiative, ce qui fait 118 États membres. Il faut 131 pour
  avoir les deux tiers. On va continuer d''ici la fin de l''année la mobilisation
  pour pouvoir déclencher une initiative concrète, mais c''est un des acquis de la
  déclaration de Nairobi. Enfin, l''importance de cette discussion, de cet échange
  de travail que nous conduisons avec l''Union africaine, c''est aussi que les problèmes
  de l''Afrique soient pleinement pris en compte au moment des grandes crises. Lorsque
  la pandémie est advenue, je me souviens, la France s''est mobilisée et j''avais
  eu l''immense honneur d''être convié à un bureau de l''Union africaine pour faire
  face à l''épidémie. C''est là que nous avons bâti l''initiative COVAX et que la
  France a mobilisé le G20 avec l''Union africaine pour pouvoir conduire à des dispositifs
  de solidarité sur les diagnostics, les éléments de vaccins et les premiers traitements.
  Surtout, on a bâti une initiative commune pour produire en Afrique. Nous avons décidé
  ensemble de lancer une initiative que nous allons soutenir pour ce G7, pour là aussi
  soutenir l''Afrique, le continent africain, face à la crise au Moyen-Orient et à
  la fermeture d''Ormuz. Toute l''économie mondiale est évidemment touchée par la
  fermeture du détroit d''Ormuz, mais le continent africain tout particulièrement.
  Plusieurs pays ont des augmentations de leur prix de l''essence à la pompe de plus
  de 30 %. Plusieurs pays ont aujourd''hui des augmentations massives de leurs engrais
  et des risques de rupture dans les mois à venir, ce qui met en danger la sécurité
  alimentaire. Face à cela, nous devons soutenir encore davantage l''économie africaine.
  C''est tout le sens de ce que nous avons d''abord bâti à Nairobi, ensemble avec
  la Banque africaine de développement et votre soutien, Président, qui est de monter
  une initiative pour soutenir le secteur privé africain. Nous voulons l''accélérer.
  C''est l''initiative dite ATIDI, qui est une structure qui existe déjà, qu''avec
  la Banque africaine de développement on va élargir au niveau du continent africain,
  et que nous allons ensemble, avec le Président RUTO, porter au niveau du G7 pour
  obtenir le soutien des économies les plus développées, [et ce] pour avoir dans les
  plus brefs délais ce mécanisme de garantie aux pays africains pour que les secteurs
  privés aillent investir. Initiative complètement complémentaire de celle portée
  par l''Union africaine sur la question des agences de notation et votre initiative
  d''avoir une agence de notation africaine. En plus de ça, nous allons bâtir une
  initiative d''aide aux pays les plus touchés, pour avoir un soutien de court terme
  face aux conséquences de la crise d''Ormuz. Nous allons ensemble conduire à une
  initiative pour soutenir l''Union africaine et les pays concernés pour produire
  des alternatives à la dépendance d''engrais, de manière jumelle à ce que nous avions
  fait sur la question de la production de vaccins. L''Afrique a les moyens de sa
  souveraineté en matière d''engrais et de fertilisants. Simplement, c''est un investissement
  massif. Plusieurs acteurs privés, d''ailleurs, ont engagé ce travail avec des gouvernements.
  Nous souhaitons, dans le cadre du G7, prendre une initiative pour soutenir ce mouvement
  et porter une politique de souveraineté en matière d''engrais et de souveraineté
  agricole pour le continent africain. C''est notre devoir, et c''est rationnel sur
  le plan économique. C''est la souveraineté du continent qui est ici en jeu. Je ne
  veux pas être plus long, mais nous allons sur tous ces sujets continuer le travail
  main dans la main. Je veux ici dire combien la France tient à l''Union africaine,
  à son travail, son engagement, à votre engagement, monsieur le Président. J''ai
  eu l''occasion, toutes ces dernières années, de voir à la fois votre qualité d''analyse
  et votre capacité à mobiliser dans vos diverses fonctions. L''Union africaine a
  un rôle aujourd''hui plus éminent encore qu''hier. Sur le plan politique, sur sa
  capacité à enclencher les grands chantiers que nous venons d''évoquer, vous saurez
  toujours trouver la France à vos côtés, parce que c''est dans ce partenariat que
  se construit ce multilatéralisme efficace auquel nous croyons et que nous voulons
  continuer non seulement de défendre, mais de rendre réel. C''était aussi le sens
  du Sommet Africa Forward . C''était le sens de ma visite aujourd''hui, ici, à vos
  côtés, aux côtés de l''Union africaine, avec le Secrétaire général des Nations Unies.
