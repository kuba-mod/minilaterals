title: Déclaration conjointe à l’occasion de la visite d’État du Président de la République
  d’Indonésie en France.
text: À l’occasion de la visite d’État du Président de la République d’Indonésie à
  Paris (France), le 28 mai 2026, Emmanuel Macron, Président de la République française,
  et Prabowo Subianto, Président de la République d’Indonésie, ont tenu des discussions
  bilatérales portant sur les domaines clés de la coopération entre les deux pays
  et les problématiques mondiales d’intérêt commun. Dans un contexte d’aggravation
  des tensions géopolitiques, de transformation des dynamiques à l'œuvre dans le monde
  et de problématiques urgentes portant sur le climat, l’environnement, la santé et
  les technologies, les deux présidents ont réaffirmé leur détermination commune à
  approfondir le partenariat entre les deux pays. Leur coopération repose sur la confiance
  mutuelle et un attachement fort au multilatéralisme fondé sur des règles. Ils ont
  salué l’impulsion durable donnée aux échanges bilatéraux de haut niveau, notamment
  la visite d’État du président Emmanuel Macron en Indonésie du 27 au 29 mai 2025
  et les visites du président Prabowo Subianto en France du 13 au 15 juillet 2025,
  le 23 janvier 2026 et les 13 et 14 avril 2026, qui témoignent du dynamisme de leur
  partenariat stratégique. Partenariat pour la souveraineté et la prospérité Les deux
  présidents ont réaffirmé leur volonté de renforcer la coopération en matière de
  sécurité et de défense et ont salué l’organisation en 2026 du 12e dialogue de défense
  franco-indonésien. Ils ont soutenu le développement d’initiatives de formation,
  notamment concernant les régiments de cavalerie montée, la formation linguistique
  ou encore des échanges entre leurs forces de police respectives sur le maintien
  de l’ordre public et la sécurité des populations. Ils ont aussi encouragé leurs
  ministres respectifs à approfondir encore la coopération dans le domaine de l’armement,
  notamment grâce au renforcement des capacités, au développement conjoint et à la
  coopération dans l’industrie de la défense. Ils ont souligné la nécessité de promouvoir
  un système commercial international ouvert et fondé sur des règles et ils se sont
  engagés à mettre pleinement en œuvre, dès que possible, l’Accord de partenariat
  économique global entre l’Union européenne et l’Indonésie. Ils ont soutenu la réalisation
  de projets d’intérêt commun et d'investissements réciproques dans les secteurs du
  transport, de la santé, de la transition énergétique, de l’innovation et des technologies,
  de l’exploitation minière durable et des minerais essentiels, des questions maritimes
  et de l’agriculture, afin de renforcer la compétitivité des entreprises de l’Union
  européenne (UE) et de l’Indonésie et leur intégration dans leurs marchés respectifs
  et dans les marchés mondiaux. À cet égard, ils ont souligné l’importance d’élaborer
  une feuille de route conjointe sur l’agriculture afin de garantir une mise en œuvre
  efficace de la coopération bilatérale sur la base de la réciprocité. Ils se sont
  félicités des progrès mutuellement bénéfiques de la coopération s’agissant des bovins
  et des équidés, en notant en particulier l’ouverture progressive des marchés aux
  produits d'intérêt commun, dans le respect de leurs législations et règlementations
  respectives. Ils ont également appuyé le développement des investissements transfrontaliers,
  y compris dans les filières en aval, et ils ont encouragé des partenariats plus
  étroits entre entreprises, notamment dans le cadre du Conseil des affaires de haut
  niveau France-Indonésie qui s’est réuni pour la première fois à Paris le 28 mai
  2026, sous les auspices des deux présidents. Partenariat pour la paix, le droit
  international, le multilatéralisme et les problématiques mondiales Les deux présidents
  ont appelé au respect de la souveraineté et de l’intégrité territoriale ainsi qu’à
  la promotion du multilatéralisme fondé sur le droit international, qui repose en
  premier lieu sur la Charte des Nations Unies. Ils ont rejeté toute menace ou emploi
  de la force et ont appelé au règlement pacifique des différends, notamment en Palestine,
  en Iran, en Ukraine et au Liban. Ils ont affirmé leur vive préoccupation concernant
  les conséquences des hostilités en cours qui menacent la vie des populations civiles
  et les infrastructures ; ils ont réaffirmé la nécessité de régler les différends
  par des moyens pacifiques ainsi que leur soutien à la liberté de navigation conformément
  à la Convention des Nations Unies sur le droit de la mer de 1982. Ils ont rappelé
  leur Déclaration conjointe sur le règlement pacifique de la question de la Palestine
  et la mise en œuvre de la solution des deux Etats et la Déclaration de New York
  sur le règlement pacifique de la question de Palestine et la mise en œuvre de la
  solution des deux États, en soulignant la nécessité de mettre fin à l’occupation
  illégale des territoires palestiniens et de parvenir à un règlement global, juste
  et durable. Ils se sont également déclarés vivement préoccupés par l’escalade des
  tensions dans le détroit d’Ormouz, qui menace la stabilité régionale et l’approvisionnement
  mondial en énergie, ils ont appelé tous les États à empêcher toute nouvelle escalade
  et ils ont réaffirmé la liberté de navigation, notamment les droits de passage en
  transit et de passage inoffensif par le détroit d’Ormouz et tout autre détroit servant
  à la navigation internationale, conformément à la Convention des Nations Unies sur
  le droit de la mer de 1982. Les deux présidents ont également réaffirmé leur attachement
  à une paix juste et durable, fondée sur les principes de la Charte des Nations Unies
  et le droit international, en Ukraine et partout ailleurs dans le monde. Ils ont
  salué la signature de la déclaration d’intention sur la coopération au développement,
  qui permet la coopération triangulaire avec des pays tiers et contribue à leur développement
  national ainsi qu’à la stabilité et à la prospérité régionales. Ils ont en outre
  encouragé les ministères et les organismes concernés à définir des projets prioritaires
  pour la mise en œuvre de cette coopération. Les deux présidents ont réaffirmé leur
  volonté de protéger les biens publics mondiaux. Ils ont souligné leur attachement
  à la pleine mise en œuvre de l’Accord de Paris dans le respect des principes d’équité,
  de responsabilités communes mais différenciées et de capacités respectives, eu égard
  aux différentes situations et priorités nationales. Le Partenariat pour une transition
  énergétique juste en Indonésie, auquel la France contribue, constitue une plateforme
  importante dans la lutte contre le changement climatique. S’agissant de la protection
  de la nature et de la biodiversité, les deux présidents ont réaffirmé qu’il est
  essentiel de promouvoir une mise en œuvre efficace et équilibrée de l’accord se
  rapportant à la Convention des Nations Unies sur le droit de la mer et portant sur
  la conservation et l’utilisation durable de la diversité biologique marine des zones
  ne relevant pas de la juridiction nationale, dit « BBNJ », et ils ont souligné l’intérêt
  de conclure un instrument international juridiquement contraignant sur la pollution
  plastique, notamment dans le milieu marin. Ils ont appelé de leurs vœux le renforcement
  des partenariats grâce au Ocean Impact Summit qui se tiendra à Bali du 8 au 10 octobre
  2026 et à la première conférence des parties à l’accord BBNJ qui sera organisée
  à New York en 2027. Les deux présidents se sont aussi réjouis de la possibilité
  d’explorer des coopérations dans le domaine forestier, en vue d’accroître les efforts
  de conservation, de promouvoir une gestion durable des forêts et de contribuer à
  l’action visant à réduire la disparition des forêts et la dégradation des terres.
  Partenariat pour la culture et le renforcement des échanges entre les peuples, en
  appui à la société de demain Les deux présidents ont salué l’Année de l’innovation
  France-Indonésie 2026 et ils ont déclaré leur volonté de faire avancer les projets
  stratégiques qui renforcent les écosystèmes d’innovation, améliorent les capacités
  technologiques et soutiennent le développement des industries d’avenir. Dans ce
  contexte, l’Indonésie a fait part de son souhait d’étudier les possibilités de coopération
  avec la France dans le domaine de la recherche et de l’innovation, notamment en
  appui au développement d’infrastructures et d’un écosystème nucléaires sûrs, sécurisés
  et durables. Mettant à profit cette dynamique, les deux présidents ont adopté une
  déclaration conjointe sur l’enseignement, la recherche et la mobilité, soulignant
  qu’il s’agit de domaines prioritaires de la coopération bilatérale entre la France
  et l’Indonésie. Ils se félicitent de la tenue à Angers du 1er au 3 juillet 2026
  des assises de la coopération franco-indonésienne pour l’enseignement supérieur,
  la recherche, l’innovation et l’entrepreneuriat. Ils ont par ailleurs réaffirmé
  l’importance du groupe de travail conjoint sur l’enseignement, qui se concentre
  sur les priorités communes et étudie les nouveaux domaines de coopération. Les deux
  présidents ont échangé sur la coopération en matière de renforcement de l’enseignement
  relatif à l’administration publique en Indonésie et ils ont pris bonne note des
  discussions en cours entre leurs ministères des Affaires étrangères visant à faire
  progresser les initiatives concrètes portant sur l’amélioration des capacités diplomatiques.
  Les deux présidents ont par ailleurs salué le lancement du dialogue sur la planification
  politique entre les ministères des Affaires étrangères de leurs deux pays, dont
  la première réunion se tiendra à Paris en juin 2026 et qui vise à fournir un mécanisme
  permettant d’entretenir un dialogue régulier et d’échanger des analyses géopolitiques
  ainsi qu’à promouvoir une coopération plus étroite pour faire face à la fragmentation
  de l’architecture de sécurité mondiale. Les deux présidents ont également salué
  le premier dialogue culturel stratégique, organisé à Paris le 15 juillet 2025, et
  ont encouragé la poursuite de la mise en œuvre de la déclaration conjointe portant
  sur une stratégie dans le domaine culturel adoptée le 29 mai 2025. Vers la mise
  en place d’un partenariat stratégique global Les deux présidents ont fait part de
  leur ambition commune d’élever le niveau de leurs relations diplomatiques grâce
  à la mise en place d’un partenariat stratégique global entre la France et l’Indonésie,
  visant à promouvoir une relation plus profonde, plus fructueuse et mutuellement
  bénéfique, fondée sur le respect de la souveraineté et de l’intégrité territoriale.
  À cette fin, ils sont convenus de définir un cadre concret pour ce partenariat stratégique
  global, en s’appuyant sur les mécanismes bilatéraux existants et les domaines clés
  de coopération. Ils ont encouragé leurs ministères respectifs et leurs organismes
  concernés, notamment leurs institutions de financement du développement, à définir
  des objectifs clés, un calendrier et les domaines pour améliorer la coordination
  des efforts au service des priorités nationales de développement et des progrès
  à long terme des deux pays.
