title: Journées Choose France.
text: Depuis son lancement en 2018 par le chef de l’État, le sommet Choose France
  s’est imposé comme un rendez-vous économique annuel incontournable pour l’ensemble
  des industriels, investisseurs et chefs d’entreprises à travers le monde. En amont
  de la neuvième édition, plus de 100 sites industriels et technologiques ouvrent
  leurs portes au public les 29, 30 et 31 mai 2026. Aérospatial, pharmaceutique, intelligence
  artificielle, brasseries artisanales... Venez voir ce qui se fabrique près de chez
  vous !
