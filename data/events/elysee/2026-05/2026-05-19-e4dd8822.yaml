title: Rencontre avec le groupe d'engagement « Science 7 ».
text: 'Le Président de la République a reçu le groupe d''engagement du G7 pour la
  science, le « Science 7 » ou S7, ce mardi 19 mai 2026 au Palais de l''Élysée. Chaque
  année, dans le cadre du G7 organisé par le pays hôte, les académies des sciences
  des pays participants se concertent au sein d’un sommet scientifique, le S7 , pour
  élaborer des positions et recommandations communes mettant en avant de grandes priorités
  scientifiques. Le groupe d’engagement du S7 s''est réuni à Paris les 18 et 19 mai
  autour des trois thématiques : Cette année, les académies des sept pays ont convergé
  sur une déclaration commune par consensus . Le Président de la République a salué
  les travaux et la déclaration commune du S7, et a rappelé l’importance de ces thématiques
  pour la France, qui sont au cœur de notre agenda international. Aussi, le premier
  thème s’inscrit dans la continuité de l’initiative portée par le chef de l’État
  sur l’impact des écrans et des réseaux sociaux sur la santé publique , en particulier
  des enfants, et l’enjeu de leur régulation. Quant à elle, la thématique des constellations
  de satellites trouvera un écho direct lors du Sommet sur l’Espace , qui se tiendra
  en France en septembre. Enfin, la thématique de l’Arctique prolonge la dynamique
  engagée autour du One Polar Summit , de l’UNOC, de la stratégie internationale pour
  l’Arctique, ainsi que de la visite à Nuuk du Président de la République en juin
  dernier. À un moment où la recherche libre est de plus en plus menacée, le Président
  Emmanuel Macron a échangé avec Stéphanie Debette , François Baccelli et Laurent
  Bopp , rapporteurs du S7, sur leurs conclusions et leurs recommandations sur ces
  enjeux scientifiques partagés et a réaffirmé son ambition pour une science ouverte
  et libre qui constitue l’un des ciments de nos démocraties . Les académies des sciences
  des pays du G7 réunies à Paris pour porter la voix de la science.'
