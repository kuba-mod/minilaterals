date: '2026-05-12'
type: press_release
source_name: elysee
title: 'Sommet Africa Forward au Kenya : deuxième journée.'
text: 'Le Président de la République s''est rendu au Kenya du 10 au 12 mai 2026 dans
  le cadre du Sommet Africa Forward. La deuxième journée a débuté par une session
  plénière d''ouverture du Sommet. Mr. President, dear William, Your Majesty, Heads
  of State and Government, Secretary General, Secretary General of [the Pan-African]
  Parliament, of the African Union Commission, Secretary General of [La] Francophonie,
  Ministers, Ambassadors, Entrepreneurs, Ladies and Gentlemen. Mr. President. I will
  switch in French, if you allow me. Le Président a tout dit. Je veux juste rajouter
  quelques convictions pour qu''ensuite on puisse passer à nos travaux. C''est un
  nouveau type de Sommet, c''est une nouvelle philosophie, nous allons aller au bout
  de cette philosophie. D''abord, ce Sommet a commencé par des rencontres de la jeunesse,
  des entreprises, de la culture, du sport. D’ailleurs, nous allons, juste après cette
  session, rencontrer des représentants du monde de l''entreprise qui vont nous dire
  leurs conclusions et on va échanger avec eux. La conviction que je voudrais partager
  avec vous, c''est que l''agenda que le continent africain et la France doivent avoir,
  celui auquel en tout cas je crois, n’est en aucun cas de regarder en arrière, ni
  à gauche ni à droite, comme dirait mon ami le Président RUTO, mais de regarder en
  effet devant. Ce que je me suis efforcé de faire depuis dix ans, c''est de bâtir
  une relation qui regarde avec lucidité le passé. On a eu ce travail qui a été fait
  avec l''Algérie, le Cameroun, le Rwanda et plusieurs autres. Qui regarde avec courage
  le présent, et qui a restitué les œuvres d''art. Qui veut réinventer la relation
  monétaire et économique. Qui veut investir dans le sport, dans les industries culturelles
  et créatives, dans le co-investissement avec le continent. Qui, avec respect, veut
  être aux côtés de l''Afrique pour son propre agenda. La relation entre l''Afrique
  et la France, telle que nous la voyons, telle que nous la pensons, telle que nous
  la mettons en œuvre, est fondée en effet sur la lucidité, le courage, le respect
  et une volonté d''avoir au fond un agenda partagé. C''est ce qu''on a fait depuis
  dix ans. On y est longuement revenu hier et je ne veux pas être plus long. Pourquoi
  je suis convaincu que c''est encore plus vrai aujourd''hui qu''il y a dix ans ?
  Parce que les défis de l''Afrique et de l''Europe sont les mêmes. Nous voulons la
  paix, la prospérité, la souveraineté. L''Europe s''est battue pour cela. Elle a
  construit, après la Deuxième Guerre mondiale, l''Union européenne pour avoir d''abord
  la paix, puis un marché commun pour avoir la prospérité. Aujourd''hui, l''agenda
  européen est un agenda d''autonomie stratégique pour ne pas dépendre de la domination
  ni chinoise ni américaine, et [pour] essayer d''être sur une voie médiane qui respecte
  le droit international. Qui croit dans l''ordre multilatéral que nous avons bâti.
  Qui croit dans le commerce ouvert. Qui ne croit pas dans l''hégémonie de quelques-uns
  sur les autres. Qui croit que la science est la meilleure façon de régler les questions
  de climat comme de santé. Qui croit à l''Etat de droit. C''est ça, ce que fait l''Europe
  aujourd''hui. C''est exactement le même défi qu''a l''Afrique. L''Afrique veut la
  paix, la prospérité, l''indépendance. Le partenariat que nous voulons pour ce Sommet
  Africa Forward, le partenariat auquel je crois entre l''Afrique et l''Europe, c''est
  un partenariat au service de la paix, de la prospérité et de cette indépendance,
  de cette autonomie stratégique. Il est très puissant, et c''est, si nous arrivons
  à le faire, ce qui nous permettra de rebâtir ensemble un ordre multilatéral qui
  est tellement bousculé, qui nous fragilise, dont les dérives nous touchent, d''ailleurs,
  les uns et les autres, et, au fond, d''être une source d''avenir pour chacun. D''abord,
  la paix, le Président l''a dit, je ne vais pas répéter ce qu''il vient de vous dire.
  La paix passera, je le crois très profondément, par l''unité du continent africain.
  Je suis très heureux de voir mes frères ici, chefs d''État et de gouvernement, ministres
  présents et ayant pris la peine de venir à Nairobi. Je sais vos agendas chargés,
  je veux vous dire ma gratitude. C''est une magnifique image parce que c''est l''image
  du continent africain uni. Du Maghreb à l''océan Indien, en passant par le sud du
  continent jusqu''à l''Afrique de l''Ouest et cette Afrique australe, il n''y a pas
  plusieurs Afriques et souvent, on a voulu nous séparer sur cela. Il y a un seul
  continent qui doit être respecté comme tel et porter cet agenda. Ce qui suppose
  pour nous d''être aux côtés de vous pour être mieux représentés dans les instances
  financières, mais également onusiennes. Je souscris à tout ce que le Président RUTO
  a dit. La France défend cet agenda d''une Afrique présente au Conseil de sécurité
  des Nations Unies. Comme nous nous sommes battus pour que l''Union africaine ait
  son siège permanent au G20 il y a quelques années, et nous l''avons obtenu. Nous
  étions quelques-uns au début et on a réussi à faire cela. De la même manière, nous
  soutenons un agenda — le Secrétaire général l''a ô combien soutenu il y a quelques
  années — d''une Union africaine qui ait plus de capacités et de mobilisation pour
  défendre ses opérations de paix et de sécurité et qui, en articulation étroite avec
  les Nations Unies, peut construire ses propres médiations, à qui l’on donne les
  moyens de construire ses solutions de paix et de sécurité. Mais l''unité du continent
  africain, une meilleure représentation, une capacité africaine à bâtir des solutions
  de paix et de sécurité et une Europe à vos côtés pour aider à financer ces solutions
  de paix et de sécurité, dans un partenariat de sécurité repensé comme celui que
  la France a fait ces dernières années avec de nombreux États, c''est-à-dire respectueux
  de la souveraineté de chaque pays africain, en partenariat étroit mais jamais en
  substitution, est la clé d''une paix pour le continent. De la même manière, je me
  félicite que nos discussions de tout à l''heure nous permettront de porter un agenda
  commun pour lever les blocages, aujourd''hui, que nous avons au Conseil de sécurité,
  et pour continuer d''avancer pour, en cas de crime de masse, pouvoir avoir des Nations
  Unies qui avancent et qui décident. La paix. La prospérité, ensuite. Je souscris
  à tout ce qu''a dit le Président RUTO, donc je ne vais pas le répéter. Il a parfaitement
  raison sur l''agenda de prospérité du continent. Il est clair, il est simple. Ce
  qu''on veut faire, ce n''est pas apporter de l''aide. Ce logiciel est passé. Vous
  le voyez bien, beaucoup d''États du Nord, les uns par idéologie, les autres par
  difficultés budgétaires, ne vous apportent plus l''aide qui était prévue. C''est
  une réalité. On doit penser différemment la relation Nord-Sud avec lucidité. D''abord,
  il faut regarder avec lucidité que la principale source de transfert qui va vers
  les pays d''Afrique, elle vient des diasporas. Elle vient de toutes celles et ceux
  qui ont émigré, qui travaillent dur dans beaucoup de pays et renvoient vers leurs
  familles l''argent. Elle reste supérieure à l''aide qui vient des gouvernements.
  Mais la logique dans laquelle nous devons rentrer, c''est celle du co-investissement.
  Et co-investissement pour faire quoi ? Investir dans le capital humain, les talents
  et cette jeunesse. Bâtir une économie formelle. La grande difficulté de l''Afrique,
  c''est d''avoir une trop grande partie de son économie qui reste dans l''informel
  et ne permet pas à des classes moyennes d''émerger et d''avancer. Pour cela, monter
  dans la chaîne de valeur et être à vos côtés pour structurer une agriculture plus
  forte et structurer aussi une chaîne industrielle qui fait que l''Afrique ne sera
  pas simplement un continent de l''extraction des matières premières, des minerais
  critiques, des terres rares, mais de leur transformation et valorisation, et réussir
  à vous accompagner dans la transformation et l''investissement en matière d''infrastructures
  et d''énergie. Talent, économie formelle, montée dans la chaîne de valeur, infrastructure
  et énergie, tels sont les éléments clés, avec aussi la logique continentale, et
  qu''a rappelé le Président RUTO à l''instant. C’est d''ailleurs tout ce que les
  tables rondes qui ont été aujourd''hui portées et sur lesquelles nous discuterons
  permettront de structurer autour de la santé, de l''agriculture, de l''économie
  bleue ou de l''intelligence artificielle. Cet agenda d''Africa Forward, cet agenda
  de croissance, de prospérité, c''est celui aux côtés duquel nous voulons être par
  une logique d''investissement. C''est là où nous nous retrouvons dans cet agenda
  de prospérité et de souveraineté. Faire réussir l''Afrique sur le plan économique,
  lui permettre d''avoir plus de souveraineté, d''autonomie, c''est s''assurer pour
  les Européens également d''avoir plus d''autonomie stratégique par ce partenariat
  et de réduire nos dépendances, je dirais, aux deux grandes économies qui veulent
  en quelque sorte tout capter. Donc cet agenda est commun. Ça n''est pas la France
  et l''Europe aujourd''hui qui viennent mobiliser la totalité des terres rares, des
  minerais critiques ou des matériaux pour complètement capturer le marché mondial.
  Ça n''est ni la France ni l''Europe qui viennent vous donner des impériums en termes
  de solutions de sécurité. Ne vous trompez plus, ce temps est largement passé. L''agenda
  européen a pour intérêt de vous voir réussir sur le plan de la prospérité et de
  la souveraineté parce que c''est le même que le nôtre. Si vous réussissez sur la
  souveraineté en matière d''intelligence artificielle, d''agriculture ou d''industrie,
  vous nous aidez à réussir parce que vous nous offrez aussi d''autres solutions,
  parce que vous offrez un avenir à vos populations, parce que vous réduisez la migration
  subie, qui est aussi un problème pour vos pays, parce qu''il fait fuir les talents,
  en même temps qu''il apporte une solution à l''agenda de l''Europe. Je veux ici
  qu''il y ait un réveil collectif quand on parle de tout ça. Ça n''est pas un agenda
  univoque d''une Europe qui regarderait l''Afrique comme un continent qu''elle devrait
  aider, c''est celui d''un partenariat d''égal à égal, parce que vous aider à réussir,
  c''est la condition pour notre réussite. Nous voulons le faire ensemble, de manière
  respectueuse, lucide et courageuse. C''est pourquoi, pour le réussir, on a voulu
  mobiliser les secteurs privés. Hier, on a annoncé, ce qui est une première, grâce
  à ce forum d''affaires, 23 milliards d''euros d''investissements privés, d''investissements
  d''entreprises, de fonds d''investissement du secteur totalement privé en Afrique.
  Ces 23 milliards d''investissements, ce sont 14 milliards d''investissements des
  entreprises françaises dans les pays africains et neuf milliards d''investissements
  des entreprises et business leaders africains sur le continent. Cette réalisation
  en elle-même, c''est un vrai choc qui illustre la force de ce que je suis en train
  de vous dire et le fait que c''est aussi un sommet d''action. Tout ça doit passer
  par des choses simples, qu''a dit le Président : un nouveau paradigme de croissance
  des pays qui développent une stratégie de valorisation de leurs ressources, d''agriculture
  et d''industrie plus fortes, mais aussi d''une politique fiscale et budgétaire qui
  soit plus cohérente avec cet agenda. Ensuite, c''est de réussir à mieux mobiliser
  nos financements internationaux. Le FMI, la Banque mondiale, comme on l''a fait
  ces dernières années avec les droits de tirage spéciaux, ma chère Kristalina, ensemble,
  la remobilisation de ces plus de 100 milliards de droits de tirage spéciaux vers
  l''Afrique pour mieux mobiliser cet argent et un meilleur effet de levier. Comme
  l''a dit le Président, c''est de bâtir au niveau de l''Afrique une vraie stratégie
  de garantie sur les premières pertes et de s''appuyer sur l''instrument aujourd''hui
  dit ATIDI, basé à Nairobi. Qui va permettre justement, c''est ce que nous allons
  nous engager à faire à vos côtés, la France rentrera au capital d''ATIDI, nous mobiliserons
  à vos côtés des solutions pour qu''ATIDI puisse jouer son rôle plein et entier à
  l''échelle du continent pour porter les premières pertes. Cette stratégie, c''est
  celle d''un nouveau paradigme financier, qui permet de se battre pour la prospérité
  du continent et pour son autonomie stratégique. Pour le reste, le Président RUTO
  l’a très bien dit, je vais donc couper mon discours, et au fond, c''est l''illustration
  physique et en acte du partenariat. Je ne vais pas répéter ce qu''il a dit. Il l''a
  mieux dit que je ne l''aurais fait. Je m''inscris dans ses paroles et je les endosse.
  Aujourd''hui, nous allons, dans un instant, nous réunir avec les entrepreneuses
  et entrepreneurs. Ensuite, pour ces questions de croissance, nous nous verrons sur
  l''architecture financière. Nous discuterons des solutions de paix et nous allons
  endosser une série de textes qui vont illustrer cet agenda que je viens de décrire.
  Après quoi, nous aurons les résultats de ce Sommet Africa Forward, avec déjà ses
  résultats, ces investissements, nos engagements communs. Puis, avec le Président
  RUTO, nous irons porter en votre nom au G7 d’Evian, l''agenda que nous aurons défini.
  Tout au long de l''année, nous allons, auprès des Nations Unies, du FMI, de la Banque
  mondiale, porter cet agenda commun sur la base du mandat que vous nous aurez donné.
  C’est pourquoi ce Sommet est aussi, à mes yeux, celui par lequel nous devons définir
  ensemble une ligne d''action qui doit nous permettre de relever les défis contemporains.
  Voilà, mes chers collègues, mes chers amis, je ne serai pas plus long. Je veux en
  tout cas vous dire la gratitude que j''ai à l''égard du Président RUTO pour avoir
  accepté d''accueillir ce Sommet de nouvelle génération, Africa Forward, la gratitude
  que j''ai à votre égard, mes chers frères et chères sœurs et mes chers amis, d''être
  là, d''apporter votre contribution et votre énergie, et vous dire que la France,
  et avec elle l''Europe, se tiendront aux côtés du continent africain pour bâtir
  avec lui cet agenda de paix, de prospérité et d''indépendance auquel il aspire.
  De le faire avec beaucoup de respect et d''humilité, de le faire au service de ce
  continent qui est le plus jeune du monde et qui, l''année dernière encore, a eu
  la croissance la plus forte au monde, qui n''est pas simplement un continent d''avenir,
  mais déjà un continent du présent. Soyez fiers de ce que vous êtes. Moi, je suis
  très fier d''être à vos côtés et d''essayer humblement de construire avec vous,
  cet agenda dans lequel nous investirons ensemble et nous réussirons ensemble. Vive
  l''Afrique et vive l''amitié entre l''Afrique et la France. Mr. President, dear
  William, Your Majesty, Heads of State and Government, Secretary General, Secretary
  General of [the Pan-African] Parliament, of the African Union Commission, Secretary
