  durant le week-end. Sous l''autorité du Premier ministre, le gouvernement a pris
  les bonnes décisions, la ministre de la Santé en a rendu compte à plusieurs reprises.
  Les meilleurs experts ont été consultés, comme d''ailleurs nous le faisons à chaque
  fois pour prendre de telles décisions, et la France a pris un protocole extrêmement
  rigoureux sur tous les cas contacts qui ont été établis, avec, en prenant en compte
  tous les éléments connus des scientifiques aujourd''hui, en étant extrêmement prudents,
  sur à la fois les délais d''incubation et les risques dans les premières étapes
  de l''infection. Fort de cela, aujourd''hui, le Gouvernement a sans doute un des
  protocoles qui est le plus exigeant, comme l''Espagne et quelques autres, ce qui
  est une bonne chose, parce que nous avons l''expérience du passé. Pour autant, il
  ne s''agit pas de comparer ce qui n''est pas comparable. C''est un virus qui est
  connu, dont les caractéristiques sont différentes de ce qu''on a pu connaître au
  moment de la Covid-19. Le Gouvernement a pris les bonnes décisions. La situation
  est sous contrôle, sous son autorité, grâce à nos soignants, que je veux à nouveau
  remercier. Maintenant, il est important qu''il y ait une vraie coordination européenne,
  c''est-à-dire que les protocoles, je pense, aillent vers les standards les plus
  exigeants qui ont été définis à très court terme, et que l''Organisation mondiale
  de la santé puisse coordonner tout cela comme il se doit dans les prochaines étapes.
  Mobilisation, vigilance, exigence, mais on continue d''avancer à la lumière de la
  science. As for the very latest question, which, if I understood properly, was directly
  addressed to me and was in a certain way more political and personal. If you ask
  me, what is the most important issue for humanity and my main responsibility, I
  would probably answer : our children. Because we can take a lot of decisions, some
  of them are sometimes largely too short-term driven, it could be a necessity. And
  sometimes you have to take, I would say, the second-best decision, because we all
  decide under a lot of constraints. But the most important decisions we take in our
  capacities, and I think it''s hopeful for heads of states, governments and business
  leaders, entrepreneurs, and artists, is when we try to take into consideration the
  long run. I think a lot of decisions we took today are for the long run because
  they are very demanding and we are transforming a lot of things, but this is not
  a reason not to take them. I think the main transformations are the ones you decide
  when you are precisely inspired by the next generation and our children. I think
  this is a question of fairness as well, because the only ones not to be present
  in this room are our children or the children to be born. This is why they are the
  ones to inspire us and they are the ones that we have to take into consideration
  in our decisions, because they are not yet around the table. This is why when we
  speak about education and health, economic opportunities, Africa''s opportunities,
  when we speak about peace, when we speak about as well, how to protect children
  and teenagers against inappropriate content, especially in the digital environment,
  we are doing the most important things. My main responsibility is to do my best
  for our children. [Intervention de M. William RUTO, Président de la République du
  Kenya] Thank you very much, Mr. President, dear William, dear brother. Your Majesty,
  Heads of State and Government, Ambassadors, Ministers, Ladies and Gentlemen. Let
  me first thank you. Thank you very much, Mr. President, dear William, for not just
  hosting this summit we co-chaired - this is a big honor for us - but for having
  created a special, I would say, a special taste and a special atmosphere for this
  summit. I think everybody clearly felt during these few days what being welcomed
  in Kenya could mean. Nobody had the feeling of being a foreigner here or to be welcomed
  by you. Everybody had the feeling of being at home and to work collectively. Thanks
  to you, [to] your perfect organization and the spirit clearly you had from the very
  beginning. Thank you very much. Permettez-moi de passer en français désormais. En
  effet, je veux vraiment remercier le Président RUTO pour la parfaite organisation
  de ce Sommet. Nous avions 35 chefs d''État et de gouvernement, plusieurs ministres,
  des délégations d''organisations régionales, d''institutions financières, au total
  plus d''une cinquantaine. Hier encore, nous étions plus de 6 000 avec les chefs
  d''entreprises, de dirigeants d''entreprises, de dirigeantes d''entreprises et investisseurs.
  Pendant ces quelques jours, le Sommet Africa Forward a accueilli véritablement,
  de manière inédite, ici à Nairobi, l''illustration même et la capacité à agir de
  ce que nous avions entrepris ensemble il y a quelques mois, cher William. Merci
  infiniment à vous, à votre gouvernement et au Kenya. Je veux remercier l''ensemble
  des chefs d''État et de gouvernement et ministres présents et dirigeants d''institutions
  financières ou d''organisations régionales qui nous ont rejoints pour ces travaux.
  Nous l''avons dit ce matin ensemble l''un et l''autre. Le Président vient de le
  rappeler et je ne veux pas élaborer, le message est clair. C''est un partenariat
  totalement renouvelé, d''égal à égal, lucide sur les défis, ambitieux sur les réponses
  et tourné vers l''action que nous avons voulue. Laissez-moi revenir sur les résultats,
  pour aller dans le droit fil de ce que le Président vient de dire. D''abord, le
  dialogue entre le public et le privé. Nous avons commencé hier par la jeunesse,
  qui nous a présenté ses projets, par le secteur privé, qui a présenté ses engagements
  de manière inédite. Ce Sommet a permis d''aboutir aux 23 milliards d''euros d''investissements
  privés d''entreprises françaises et africaines sur le continent africain, et la
  création de plusieurs centaines de milliers d''emplois. À côté de ça, la coalition
  Africa France Impact Coalition , AFIC, qui compte aujourd''hui une quarantaine de
  chefs d''entreprise africains et français, qui a échangé ce matin, là aussi, de
  manière inédite avec les chefs d''État et de gouvernement, sera pérennisée. Le compte
  rendu des travaux sera rendu transparent et cette coalition deviendra un outil structurant
  de notre partenariat économique. Le dialogue ce matin s''est noué là aussi d''une
  manière totalement neuve. On a vu le Président RUTO interroger des dirigeants d''entreprises
  en demandant : « qu''est-ce qu''il vous faut pour en faire davantage » ? On a vu
  notre ami le Président de Zambie expliquer clairement la stratégie qu''il avait
  eue sur l''énergie à des dirigeants du secteur pour qu''ils investissent dans son
  pays. C''est exactement ça le sens de ce partenariat renouvelé. On va mettre en
  œuvre tout ce qu''on s''est dit sur les obstacles à lever, les risques à partager,
  et avec aussi des projets structurants qui vont commencer à avancer dans le domaine
  de l''énergie notamment, des réseaux électriques, des renouvelables qui touchent
  beaucoup des pays présents ici même. Ensuite, sur la réforme de l''architecture
  financière internationale, nous avons eu une session qui a permis d''avancer avec
  la conclusion d''une déclaration commune sur cette réforme de l''architecture financière.
  Un appel à l''action que nous allons ensemble porter au G7 d’Évian dans un mois,
  où le Président RUTO sera à mes côtés. Le constat est très clair, il a été dit par
  les chefs d''entreprise comme par les dirigeants : fragmentation des chaînes de
  valeur, tensions commerciales, instabilité géopolitique, insuffisante valorisation
  des matières premières sur le continent africain, alors qu''il y a [un] potentiel.
  Les chefs d''État qui sont là le savent parfaitement. Là-dessus, nous avons posé
  les bases d''une réponse collective, d''abord en appelant à une responsabilité accrue
  des grandes économies mondiales pour corriger et répondre aux déséquilibres mondiaux.
  Ça, c''est ce que nous irons défendre au G7. Ensuite, en affirmant une ambition
  forte dans une déclaration et un plan d''action, bâtir et soutenir une architecture
  financière africaine plus intégrée, plus efficace et plus souveraine, ce qui suppose
  un changement de méthode, faire confiance aux acteurs africains, renforcer les instruments
  existants et mieux les coordonner. À cet égard, nous avons donné mandat à la Banque
  africaine de développement de structurer, d''être vraiment l''acteur clé de cette
  architecture, et de développer sur la base d''un instrument existant, qui a d''ailleurs
  son siège à Nairobi, ATIDI, pour en faire l''instrument haut niveau du continent
  d''une garantie financière qui prendra les premières pertes pour permettre aux investisseurs
  du monde entier, africains et non africains, d''investir davantage d''argent privé
  sur le continent. Là-dessus, la France, je l''ai dit, rentrera au capital d''ATIDI
  et nous nous mobiliserons ensemble, d''abord pour que, au sein de la BAD, lors de
  l''Assemblée générale de la fin de ce mois, tous les États africains qui ne sont
  pas déjà à ce tour de table le rejoignent. Ensuite, pour ensemble aller chercher
  les grandes économies de ce monde lors du G7 pour les faire entrer au capital de
  ce mécanisme et les inciter à nous accompagner pour les garanties. Sur la paix et
  la sécurité, ensuite, nous avons tenu des travaux qui ont permis là aussi d''aboutir
  à un document conjoint, une déclaration finale. Nous avons réaffirmé une évidence
  trop longtemps ignorée ou oubliée. Les solutions africaines doivent être au cœur
  des crises africaines. Les outils existent : médiations, opérations de paix, cadres
  régionaux. Ils doivent être pleinement soutenus. La France sera au rendez-vous de
  cet engagement en appui, en partenaire, toujours. Nous avons réaffirmé ensemble
  notre détermination à œuvrer pour des solutions politiques durables, notamment dans
  les Grands Lacs et au Soudan, car il ne peut y avoir de développement sans stabilité.
  Notre déclaration a réaffirmé qu''il ne peut y avoir de paix durable en Afrique
  sans respect absolu de la souveraineté, sans la fin des interférences extérieures,
  sans un effort pour mettre fin à la privatisation de la sécurité. Nous avons également
  mobilisé collectivement, et dans notre déclaration il y a un soutien de tous les
  membres, je remercie mon ami, Premier ministre, qui a lancé tout à l''heure l''offensive
  autour de la table, pour justement accompagner cette initiative visant à mettre
  fin à l''usage abusif du veto au Conseil de sécurité des Nations Unies en cas de
  crimes de masse. Ce sont des initiatives très fortes et ce message, je le porterai
  dès demain à Addis-Abeba, au siège de l''Union africaine, où j''aurai une réunion
  trilatérale inédite avec le président de la Commission de l''Union africaine et
  le Secrétaire général des Nations Unies pour, justement, continuer d''accompagner
  la déclaration de Nairobi. Enfin, plusieurs tables rondes se sont tenues sur des
  initiatives sectorielles qui ont toutes bâti des partenariats utiles, équilibrés,
  renforçant la souveraineté des pays africains. Dans l''agriculture, avec la création
  d''un véhicule financier visant à mobiliser des investisseurs privés et qui a été
  validé. Nous avons annoncé le lancement de l''initiative FARM+ avec Proparco qui
  privilégiera plusieurs axes d''action qui vont exactement dans le sens de ce qui
  a été demandé ce matin par les dirigeants ici présents sous l''impulsion du Président.
  Accompagner les économies africaines et les investisseurs pour monter la chaîne
  de valeur, pour avoir justement une agriculture plus résiliente, pour continuer
  d''innover et d''améliorer la rentabilité, en même temps que le fonds FASA, qui
  existe déjà, multi-bailleurs, sera rejoint par la France et plusieurs entreprises
  françaises. Dans l''économie bleue, nous accompagnerons l''essor d''un secteur stratégique
  pour l''avenir du continent avec des investissements, des infrastructures, la formation
  de compétences. Plusieurs acteurs financiers et industriels ont annoncé là-dessus
  leur engagement, et avec une formation aussi aux métiers par un partenariat qui
  se fera avec plusieurs pays et l''Ecole nationale supérieure maritime. Dans le domaine
  de l''intelligence artificielle, nous avons posé les bases d''un partenariat entre
  l''Afrique et la France pour mobiliser le potentiel des pays africains, renforcer
  l''accès à Internet avec plusieurs projets, en particulier aussi des projets de
  câbles sous-marins reliant l''Europe à l''Afrique de l''Ouest, avec des projets
  d''innovation, de fonds d''amorçage, de lancement de start-up technologiques africaines,
  avec la création aussi du réseau des Africa Forward AI Clusters , qui va permettre,
  dans tous les pays africains qui le souhaitent, et tous ceux qui étaient présents,
  de développer une intelligence artificielle pleinement souveraine, en droite ligne
  de ce que nous évoquions avec le Président hier, et la jeunesse. En même temps,
  nous avons ensemble soutenu un programme de bourses de haut niveau qui permettront
  des échanges croisés de talents africains en France et de Français en Afrique. Sur
  la santé, enfin, les tables rondes ont permis le lancement de plusieurs initiatives.
  Je veux ici parler de l''initiative de soutien à la production locale Africa Initiative
  for Medical Access and Manufacturing , AIM2030, de la Banque mondiale, qui doublera
  la fabrication locale sur le continent africain d''ici 2030, avec neuf pays engagés
  dans cette première étape. Des projets qui existent et qu''on avait déjà commencé
  à accompagner, qui se sont développés en Afrique du Sud, au Kenya, évidemment aussi
  au Rwanda, en Égypte, au Maroc, au Sénégal, au Ghana. Je pourrais ici multiplier
  les pays. Des projets de transfert de technologies coordonnés par Unitaid en vue
  de la production locale de bout en bout. Puis, le transfert de technologie de vaccins
  dont [celui contre] le chikungunya, sur lequel je veux insister en particulier,
  où l''Institut Pasteur transférera vers l''Institut Pasteur de Dakar cette technologie.
  Puis, tout ça a aussi abouti à des résultats très concrets pour construire des systèmes
  de santé résilients, avec un investissement dans la production locale et la formation
  dans plusieurs pays, avec des plateformes pays lancées par plusieurs d''entre vous.
  Je ne veux pas être plus long, tout ça est détaillé dans l''ensemble des travaux
  et des livrables qui sortiront ce soir sur le site Internet et qui seront communiqués
  par la coprésidence d''Africa Forward Summit. Mais tout ça pour vous montrer que
  d''hier à ce soir, dans tous les domaines, tous les compartiments du jeu, dans absolument
  tous les domaines, nous avons déjà des résultats, des investissements concrets,
  des actions et des mobilisations concrètes qui ont été signées à l''occasion de
  ce Sommet et que nous allons suivre. C''est un jalon essentiel dans la construction
  d''une relation nouvelle entre l''Afrique et la France, mais plus largement entre
  l''Afrique et le reste du monde. Vous en avez rappelé, Président, les chiffres tout
  à l''heure. Ça fait dix ans, et pour certains qui sont là, ça fait parfois 20 ans,
  25 ans, qu''on entend beaucoup de gens venir ici nous dire : « ah, l''Afrique, ne
  les oubliez pas, c''est un continent en devenir ».  Non, c''est un continent qui
  est là et bien là.  C''est le continent le plus jeune du monde. C''est le continent
  à la plus forte croissance du monde. C''est un continent qui fait que quiconque
  l''ignore aujourd''hui se trompe et renonce à son propre avenir. L''Afrique est
  là, présente, forte. Tous ceux qui ne font pas leur travail avec le continent africain,
  tous ceux qui viennent continuer d''en prélever les ressources pour les valoriser
  ailleurs, d''en négliger les situations de déséquilibre ou de détresse, tout cela
  obère simplement leur propre avenir. Ce que nous avons fait avec le Sommet Africa
  Forward , c''est main dans la main, avec le Président RUTO, de dire l''Afrique est
  là, l''Afrique organise son propre sommet et la France est là à ses côtés pour co-investir
  et co-construire. Vous avez donné un exemple magnifique, Président, d''une capacité
  à recevoir, à accueillir, à penser, à stimuler, à contester les solutions toutes
  faites. Les dirigeants d''entreprises, la jeunesse qu''on a vue, les investisseurs,
  les créateurs, les chefs d''État et de gouvernement ont montré l''exemple de cette
  ambition complètement réinventée. Nous sommes bien là, nous sommes là à votre côté
  et ensemble, nous continuerons d''agir. Ça a commencé et nous allons le démultiplier,
  croyez-moi. Merci infiniment, Président, cher William, et merci à toutes et tous
  pour ce Sommet Africa Forward . Ça n''est qu''un début. [Intervention de M. William
  RUTO, Président de la République du Kenya] Je crois que la première question vous
  était adressée, vous y avez répondu. La deuxième question, qui était en fait deux
  questions, m''était adressée et je vais y répondre. D''abord, c''est très important
  et c''est très concret qu''il y ait un représentant du continent africain, une voix
  africaine qui soit présente quand on va parler des crises internationales à régler.
  Parce que l''Afrique est touchée par ces crises. Je le redis ici parce que c''est
  souvent oublié dans les commentaires internationaux, mais l''un des continents qui
  a été le plus durement touché par les conséquences assez directes de la guerre d''agression
  russe lancée contre l''Ukraine, ça a été le continent africain, parce qu''on parlait
  de deux grandes puissances céréalières et de deux grands producteurs d''engrais.
  Il y a eu d''énormes problèmes de soutenabilité financière, ce qui nous avait conduit
  à lancer l''initiative FARM, dès 2022, et on passe maintenant à FARM+ qui passe
  à l''échelle. Ensuite, ce qui se passe à Ormuz en ce moment. Nous sommes tous victimes
  de ce qui se passe à Ormuz. Les journalistes et les entrepreneurs et compatriotes
  français qui sont là le savent ô combien. Nous sommes aussi touchés, comme vous
  l''êtes dans vos pays, à cause des prix à la pompe et des conséquences sur le gaz
  et le pétrole. Mais les conséquences alimentaires sur le continent africain sont
  massives. Parce que là encore, c''est environ un tiers de certains types de fertilisants
  qui sortaient par le détroit d''Ormuz. Donc, se dire qu''on parle du règlement ou
  de l''incapacité à régler les crises avec les grands dirigeants du monde sans avoir
  l''Afrique, c''est en soi une faute morale et politique. C’est la première chose
  qu''on va faire au G7 : avoir le continent africain dûment représenté et dire, quand
  on parle de ces grandes crises, [qu’]on doit prendre en compte les conséquences
  sur le continent africain. Je n''en cite qu''une partie. La deuxième, elle est sur
  le mécanisme de première perte et les garanties, et sur l''architecture financière,
  ce qui est une des compétences natives, si je puis m''exprimer ainsi, du G7. Là-dessus,
  nous irons ensemble avec le Président RUTO porter deux messages très concrets. Le
  premier, c''est le rééquilibrage, c''est la correction de ce qu''on appelle les
  déséquilibres macroéconomiques. Je ne vais pas ici être trop long, mais c''est un
  enjeu. C''est au cœur de l''agenda économique du G7, le monde dans lequel on vit
  a des déséquilibres macroéconomiques très problématiques. Des surcapacités venant
  de la Chine, des tarifs américains, un sous-investissement européen et une insuffisante
  montée dans la chaîne de valeur du continent africain. C''était au cœur de toutes
  nos discussions, sur l''agriculture comme sur l''industrie. Si les économies développées
  n''adhèrent pas à cet agenda - c''est ça qu''on va essayer d''aller chercher, premier
  point concret aussi – [alors] on ne pourra pas réussir cet enjeu. Or, il est important
  que les économies du G7 et leurs partenaires qui seront invités, je pense au Brésil,
  à l''Inde, à la Corée du Sud, à côté du Président Kenyan, c''est très important
  que ces pays adhèrent à cette stratégie du continent africain et donc cessent de
  venir, ce ne sont pas les pays du G7 qui le font vraiment, pour être honnête, mais
  prendre les matières premières pour les emmener dans leur pays. Que si on a une
  stratégie minerais critique, matières premières et terres rares, on l''est avec
  le continent africain, en faisant la valorisation sur le continent africain. C''est
  ce que je disais ce matin, on a un agenda commun pour les pays du G7 et pour l''Afrique,
  qui est un agenda d''autonomie stratégique, qui doit aussi venir un peu contrer
  les prédateurs du XXIème siècle, dont l''Afrique est la principale victime. Ceux
  qui viennent prendre pour garder chez eux et accumuler et détenir le contrôle du
  marché mondial. C''est de manière très concrète quelque chose sur lequel on veut
  avoir l''accord des autres, avoir une stratégie commune pour aider l''Afrique à
  monter dans ses chaînes de valeur et créer plus de valeurs sur le continent et avoir
  le même agenda de souveraineté. Le dernier point très concret qu''on va défendre
  au G7 ensemble, c''est d''avoir un soutien maximal des membres du G7 à ce mécanisme
  de garantie que nous avons décidé d''élargir à l''échelle du continent. C''est-à-dire
  qu''ATIDI, qui est cette structure qui existe déjà, qui prend en partie les premières
  pertes et qui a quelques États membres et qui est basée dans la région, que sur
  la base des travaux de la Banque africaine de développement, on arrive avec une
  copie commune en disant : « ce véhicule, qui est maintenant un véhicule panafricain,
  soutenons-le, rentrons au capital ou mettons en place des garanties ou du capital
  appelable pour permettre à ces structures, avec la Banque africaine de développement,
  de garantir les investisseurs privés qui iront dans tel ou tel secteur avec une
  gouvernance qu''on aura dûment définie ». Ça, c''est très concret et c''est totalement
  transformant. Sur la deuxième question que vous m''avez posée, qui est le risque
  sanitaire, j''étais en lien permanent avec le Premier ministre, évidemment depuis
  que les premiers cas sont apparus, et en particulier lorsqu''il y a eu une accélération
  durant le week-end. Sous l''autorité du Premier ministre, le gouvernement a pris
  les bonnes décisions, la ministre de la Santé en a rendu compte à plusieurs reprises.
  Les meilleurs experts ont été consultés, comme d''ailleurs nous le faisons à chaque
  fois pour prendre de telles décisions, et la France a pris un protocole extrêmement
  rigoureux sur tous les cas contacts qui ont été établis, avec, en prenant en compte
  tous les éléments connus des scientifiques aujourd''hui, en étant extrêmement prudents,
  sur à la fois les délais d''incubation et les risques dans les premières étapes
  de l''infection. Fort de cela, aujourd''hui, le Gouvernement a sans doute un des
  protocoles qui est le plus exigeant, comme l''Espagne et quelques autres, ce qui
  est une bonne chose, parce que nous avons l''expérience du passé. Pour autant, il
  ne s''agit pas de comparer ce qui n''est pas comparable. C''est un virus qui est
  connu, dont les caractéristiques sont différentes de ce qu''on a pu connaître au
  moment de la Covid-19. Le Gouvernement a pris les bonnes décisions. La situation
  est sous contrôle, sous son autorité, grâce à nos soignants, que je veux à nouveau
  remercier. Maintenant, il est important qu''il y ait une vraie coordination européenne,
  c''est-à-dire que les protocoles, je pense, aillent vers les standards les plus
  exigeants qui ont été définis à très court terme, et que l''Organisation mondiale
  de la santé puisse coordonner tout cela comme il se doit dans les prochaines étapes.
  Mobilisation, vigilance, exigence, mais on continue d''avancer à la lumière de la
  science. As for the very latest question, which, if I understood properly, was directly
  addressed to me and was in a certain way more political and personal. If you ask
  me, what is the most important issue for humanity and my main responsibility, I
  would probably answer : our children. Because we can take a lot of decisions, some
  of them are sometimes largely too short-term driven, it could be a necessity. And
  sometimes you have to take, I would say, the second-best decision, because we all
  decide under a lot of constraints. But the most important decisions we take in our
  capacities, and I think it''s hopeful for heads of states, governments and business
  leaders, entrepreneurs, and artists, is when we try to take into consideration the
  long run. I think a lot of decisions we took today are for the long run because
  they are very demanding and we are transforming a lot of things, but this is not
  a reason not to take them. I think the main transformations are the ones you decide
  when you are precisely inspired by the next generation and our children. I think
  this is a question of fairness as well, because the only ones not to be present
  in this room are our children or the children to be born. This is why they are the
  ones to inspire us and they are the ones that we have to take into consideration
  in our decisions, because they are not yet around the table. This is why when we
  speak about education and health, economic opportunities, Africa''s opportunities,
  when we speak about peace, when we speak about as well, how to protect children
  and teenagers against inappropriate content, especially in the digital environment,
  we are doing the most important things. My main responsibility is to do my best
  for our children. [Intervention de M. William RUTO, Président de la République du
  Kenya]'
