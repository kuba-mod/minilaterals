title: Meeting with the advocacy group « Science 7 ».
text: 'The President of the Republic met with the G7 Science Engagement Group, known
  as “Science 7” or S7, on Tuesday, May 19, 2026, at the Élysée Palace. Each year,
  as part of the G7 summit organized by the host country, the national academies of
  sciences of the participating countries hold a scientific summit, the S7, to develop
  joint positions and recommendations highlighting key scientific priorities. The
  S7 Engagement Group met in Paris on May 18 and 19 to discuss three key themes: This
  year, the academies of the seven countries reached a consensus on a joint declaration.
  The President of the Republic commended the work and the joint declaration of the
  S7, and reiterated the importance of these themes for France, which are at the heart
  of our international agenda. Furthermore, the first theme builds on the initiative
  led by the Head of State regarding the impact of screens and social media on public
  health, particularly on children, and the challenge of regulating them. As for the
  topic of satellite constellations, it will be directly addressed at the Space Summit
  , to be held in France in September. Finally, the topic of the Arctic builds on
  the momentum generated by the One Polar Summit , the UNOC, the international strategy
  for the Arctic, and the President of the Republic’s visit to Nuuk last June. At
  a time when independent research is under increasing threat, President Emmanuel
  Macron met with Stéphanie Debette, François Baccelli, and Laurent Bopp, the S7 rapporteurs,
  to discuss their findings and recommendations on these shared scientific challenges,
  and reaffirmed his commitment to open and free science, which is one of the cornerstones
  of our democracies. The science academies of the G7 countries meet in Paris to speak
  out for science.'
