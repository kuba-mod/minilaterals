title: Avril 2026 - Déplacements et rendez-vous de Madame Brigitte
text: 'Visite officielle au Japon : -    Rencontre avec Kunihiko Moriguchi, artiste
  japonais, atelier de Kimonos Ginza Motoji -    Dîner avec des représentants de la
  culture populaire japonaise -    Visite du lycée métropolitain Harumi -    Déjeuner
  avec des artistes japonais -    Séquence officielle avec Sanae Takaichi, première
  ministre du Japon, Palais d’Akasaka -    Entretien avec Akie Abe, épouse de Shinzō
  Abe, ancien premier ministre du Japon -    Audience et déjeuner offert par Leurs
  Majestés l’Empereur et l’Impératrice du Japon Visite d’Etat en République de Corée :
  -    Cérémonie d’hommage aux combattants de la guerre de Corée, War Memorial -  
   Dîner privé offert par Lee Jae-myung, Président de la république de Corée et Kim
  Hye-kyung, son épouse, Maison-Bleue -    Cérémonie d’accueil officiel, Maison-Bleue
  -    Visite du Musée national de Corée avec Kim Hye-kyung, épouse de Lee Jae-myung,
  Président de la république de Corée -    Déjeuner d’Etat, Maison-Bleue -    Visite
  des locaux de Hybe Entertainment, rencontre avec des membres de groupe de K-pop
  -    Visite du Centre Pompidou Hanwha Séoul -    Dîner avec des personnalités de
  la K-pop et du cinéma Réunion de travail avec les équipes de la Fondation des Hôpitaux
  Présentation du livre « La Petite Mère » de Nathalie Saint-Cricq (Editions de l''Observatoire),
  Librairie Delamain (Paris Centre) Déplacement au Vatican : -    Audience avec le
  Pape Léon XIV, Palais apostolique -    Rencontre avec le Cardinal Pietro Parolin,
  Secrétaire d''État du Saint-Siège, Palais apostolique -    Déjeuner en l’honneur
  du Cardinal Pietro Parolin, Secrétaire d''État du Saint-Siège, Villa Bonaparte -  
   Visite du Palais du Latran et de la Basilique Saint-Jean-de-Latran Rendez-vous
  avec Édouard Geffray, ministre de l’Éducation nationale, ministère de l’Education
  nationale (Paris 7e) Rendez-vous avec Céline Greco, présidente de l''association
  IM''PACTES, et David Chemoul, intervenant au Centre de santé Asterya dédié aux enfants
  de l''aide sociale à l''enfance Concert annuel des élèves des maisons d’éducation
  de la Légion d''honneur, Saint-Denis (93) Dîner d''Etat en l’honneur de Mohamed
  Ould Cheikh El Ghazouani, Président de la République islamique de Mauritanie, et
  de Mariem Mint Mohamed Fadel Ould Dah, son épouse Rendez-vous avec Olivier Théophile,
  directeur général de LIVE – L’Institut des Vocations pour l’Emploi, et Olivier Klein,
  membre du comité pédagogique Réunion du conseil d’administration de LIVE – L’Institut
  des Vocations pour l’Emploi Déplacement au Royaume du Maroc : -    Entretien avec
  S.A.R la Princesse Lalla Hasnaa -    Soirée d’ouverture du Théâtre Royal de Rabat
  en présence de S.A.R la Princesse Lalla Khadija, S.A.R la Princesse Lalla Meryem
  et S.A.R la Princesse Lalla Hasnaa Cérémonies d’obsèques de Nathalie Baye, Église
  Saint-Sulpice (Paris 6e) Déplacement en République hellénique : -    Dîner offert
  par Konstantínos Tasoúlas, Président de République hellénique, et Fani Stathopoulou,
  son épouse, Palais Présidentiel -    Entretien avec Mareva Grabowski, épouse de
  Kyriákos Mitsotákis, premier ministre de Grèce -    Visite de l’exposition « À la
  recherche de l’Orient. Parcours croisés d’archéologues », dans le cadre de la célébration
  du 180ème anniversaire de la fondation de l''École française d''Athènes, Centre
  culturel de la Fondation Stavros Niarchos Réunion de travail avec les équipes de
  la Fondation des Hôpitaux Remise de décorations aux athlètes et para-athlètes médaillés
  aux Jeux olympiques et paralympiques de Milan-Cortina 2026 Déplacement à Roubaix
  (59), cours interactif avec les « Livers » des campus LIVE - L''Institut des Vocations
  pour l''Emploi de Clichy-sous-Bois, Valence, Roubaix, Marseille, Reims, Bordeaux
  et du Havre Accueil de Cécile Kohler et Jacques Paris à l''Élysée. Concert annuel
  des demoisselles des maisons d''éducation de la Légion d''Honneur à Saint-Denis.
  Dîner d''État en l’honneur de Mohamed Ould Cheikh El Ghazouani, Président de la
  République islamique de Mauritanie, et de Mariem Mint Mohamed Fadel Ould Dah, son
  épouse. Dîner d''État en l’honneur de Mohamed Ould Cheikh El Ghazouani, Président
  de la République islamique de Mauritanie, et de Mariem Mint Mohamed Fadel Ould Dah,
  son épouse. Cérémonie de remise collective de décorations aux médaillés des Jeux
  olympiques et paralympiques de Milan-Cortina 2026.'
