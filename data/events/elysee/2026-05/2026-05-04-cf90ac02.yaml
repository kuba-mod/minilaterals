title: Joint Statement by the Leaders of France, Lithuania, Estonia, Norway, Poland,
  the United      Kingdom, The President of the European Council, and the High Representative
  of the Union for Foreign Affairs and Security Policy.
text: We, the leaders of France, Lithuania, Estonia, Norway, Poland, the United Kingdom,
  the President of the European Council, and the High Representative of the EU met
  with Prime Minister Nikol Pashinyan on the margins of the European Political Community
  summit in Yerevan. We are united in supporting the Republic of Armenia. We welcome
  Armenia’s continued commitment to build a deep and sustainable democracy and we
  strongly support its democratic resilience and sovereignty in the perspective of
  the parliamentary elections which will be held on June 7. We are determined to continue
  supporting Armenia in safeguarding its democratic integrity and strengthening its
  resilience against external hybrid threats. The people of Armenia must be able to
  choose their future freely, without foreign interference. We will continue to provide
  support to Armenia, through provision of experts, capacity building, equipment and
  election observation to contribute to free and fair elections.     .
