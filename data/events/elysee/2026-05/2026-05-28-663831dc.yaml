title: State visit by Prabowo Subianto, President of the Republic of Indonesia.
text: President Emmanuel Macron welcomed Prabowo Subianto, President of the Republic
  of Indonesia, to the Élysée Palace on Thursday during his state visit to France.
  Exactly one year after the President of the Republic’s state visit to Indonesia
  and during this Franco-Indonesian Year of Innovation, this meeting provided an opportunity
  to announce the elevation of relations between the two countries to the level of
  a comprehensive strategic partnership and to deepen cooperation in the fields of
  defense, energy, agriculture, transportation, research, and higher education. The
  discussions also provided an opportunity to address key international issues , notably
  efforts to support Ukraine and those aimed at resolving the crisis in the Middle
  East, and to exchange views on the need to consolidate our sovereignties in a context
  where power politics are becoming increasingly prevalent. The two Presidents addressed
  the press together before holding talks and chairing a France-Indonesia High-Level
  Business Council. Following the France-Indonesia High-Level Business Council meeting,
  a state dinner was held at the Élysée Palace.
