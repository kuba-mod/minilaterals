title: Compte rendu du conseil des ministres du 20 mai 2026.
text: 'Retrouvez le compte rendu du conseil des ministres du mercredi 20 mai 2026.
  La ministre de l’aménagement du territoire et de la décentralisation a présenté
  un projet de loi visant à renforcer l’Etat local, articuler son action avec les
  collectivités territoriales et sécuriser les décideurs publics. Ce projet de loi
  vise à conforter l’organisation de l’Etat déconcentré au service de l’efficacité
  de l’action publique locale, au service de nos concitoyens et du partenariat avec
  les collectivités locales. Il porte trois ambitions : (1) clarifier le rôle de l’Etat
  à l’échelle locale, en renforçant les missions du préfet de département ; (2) simplifier
  la relation à l’Etat des élus locaux et (3) sécuriser l’action des agents publics
  et des élus locaux dans l’exercice de leurs compétences. Ce texte s’inscrit dans
  un mouvement d’ensemble de décentralisation et d’efficacité de l’action publique
  autour des constats et priorités issues des contributions reçues à la suite de la
  consultation lancée par le Premier ministre à l’automne : renforcement de la capacité
  à agir des collectivités territoriales, notamment par la simplification des normes,
  clarification de l’organisation de l’Etat et de la répartition des compétences,
  sécurisation des décideurs publics locaux ; il en est une étape importante. Dans
  le cadre de cet acte de décentralisation, il fait suite à plusieurs textes déjà
  adoptés récemment : loi « statut de l’élu local » du 22 décembre 2025, premier «
  méga-décret » de simplification des normes pour les collectivités en février 2026.
  Il accompagne ce mouvement en parallèle de textes importants en cours d’examen ou
  en préparation, qui traitent respectivement de la simplification de normes concernant
  les collectivités locales (projet de loi présenté en Conseil des ministres du 15
  avril 2026, projet de deuxième « méga-décret » de simplification, qui sera pris
  d’ici l’été, proposition de loi relative aux communes nouvelles soutenue par le
  Gouvernement), et de compétences décentralisées ou partagées (proposition de loi
  relative au service public de la petite enfance, projet de loi relatif au logement,
  projet de loi relatif à l’aide sociale à l’enfance, projet de loi relatif à l’extension
  des prérogatives, des moyens, de l''organisation des polices municipales et des
  gardes champêtres), ainsi qu’à l’aménagement du territoire et à la territorialisation
  de l’action publique (projet de loi cadre relatif au développement des transports,
  proposition de loi « Montagne » adoptée le 13 mai 2026 en première lecture au Sénat).
  Dans ce cadre, l’ambition du texte présenté ici est de recentrer le rôle de l’Etat
  local et de renforcer la déconcentration, en tant qu’elle est une garantie de la
  libre administration des collectivités territoriales, confortant la relation de
  confiance entre le préfet, représentant de l’Etat dans chaque département, et les
  collectivités territoriales, condition de la continuité et de l’efficacité de l’action
  publique ainsi que du service public rendu aux usagers. Il part d’un constat : trop
  souvent, sur le terrain, l’action publique est ralentie par la dispersion, la complexité
  et l’absence d’interlocuteur clair. L’unité de la République n’impose pas l’uniformité
  des réponses : elle commande au contraire la capacité d’adaptation aux réalités
  des territoires. Son enjeu : un Etat local plus lisible, plus réactif, plus utile
  en dépassant les « silos » administratifs et porteur de solutions concrètes pour
  les élus et les habitants. La solution qu’il apporte : un préfet qui redevient le
  point d’entrée, le point d’appui et de décision de l’Etat territorial, pour accompagner
  l’exercice des compétences décentralisées. Ce texte porte ainsi des avancées pragmatiques
  au service de la mise en œuvre des compétences décentralisées : directement utile
  pour les élus et, in fine, pour les citoyens, il renforce les moyens du préfet afin
  de coordonner l’ensemble des politiques publiques territorialisées relevant des
  services de l’Etat et de ses opérateurs, pour qu’ils agissent en cohérence dans
  l’intérêt des projets portés par les collectivités territoriales et acteurs locaux.
  Il annonce également une nouvelle stratégie d’aménagement du territoire, qui définira
  un nouveau cap en matière d’aménagement, en partenariat avec les collectivités pour
  relever les défis des grandes transitions démographiques, climatiques, économiques
  sur notre territoire. Il simplifie les modalités de la contractualisation des politiques
  publiques entre l’Etat et collectivités territoriales ainsi que les interactions
  entre collectivités d’un même bassin de vie, au-delà des limites administratives,
  en les invitant à construire des contrats de réciprocité, par exemple entre villes
  ou métropoles et communes rurales. Cette stratégie constituera un document socle
  pour préparer et mobiliser les crédits du plan de partenariat national et régional
  prévu par le cadre financier pluriannuel 2028-2034 de l’Union européenne. Le texte
  consacre en outre le rôle d’autorité de gestion des régions et celui d’organismes
  intermédiaires des collectivités infrarégionales ou de leurs groupements. Ramassé,
  ce texte permettra à l’Etat local déconcentré d’être plus performant dans son organisation
  à l’écoute des collectivités, dans l’idée annoncée par le Premier ministre d’une
  clarification du rôle de chacun en matière d’action publique locale, la parole de
  l’Etat étant coordonnée pour des réponses mieux adaptées localement, avec la création
  d’un guichet unique autour du préfet, interlocuteur et soutien de premier plan des
  élus locaux, pour toutes demandes de subvention d’investissement ou d’ingénierie.
  Le guichet unique, c’est la fin de ce que nombre d’élus locaux décrivent comme un
  « parcours d’obstacles ». Le texte permettra au préfet de déroger aux normes en
  le sécurisant : adapter la règle, c’est la rendre intelligente, à condition que
  ce soit de manière motivée, encadrée, publiée et contrôlée. Enfin, il redéfinit
  le régime de protection fonctionnelle des gestionnaires publics, achevant ainsi
  l’acte de sécurisation des décideurs locaux après les dispositions déjà prises dans
  la loi « statut de l’élu ». Ainsi, le projet de loi visant à renforcer l’Etat local,
  articuler son action avec les collectivités territoriales et sécuriser les décideurs
  publics, ne vise pas à décentraliser de nouvelles compétences aux collectivités
  mais à permettre de : - rendre l’Etat local plus opérant, identifiable, mobilisant
  des circuits raccourcis, des opérateurs mieux coordonnés pour des décisions plus
  rapides ; - donner de l’oxygène aux élus en donnant plus de lisibilité, de visibilité
  sur les financements et davantage de possibilités d’adaptation locale ; - créer
  des outils au service de l’exercice des compétences décentralisées et donc au service
  des élus et des habitants des collectivités. La ministre de l’agriculture, de l’agro-alimentaire
  et de la souveraineté alimentaire a présenté un décret relatif à l’instruction et
  à la délivrance de l’agrément des structures de conseil et d’accompagnement du réseau
  France services agriculture. Le réseau France services agriculture est un nouveau
  dispositif dont le déploiement est prévu au 1er janvier 2027 et qui permettra aux
  personnes qui veulent s’installer en agriculture ou transmettre leur exploitation
  d’être accompagnées dans leur projet. Ce réseau a pour objectif de répondre à l’un
  des défis principaux de l’agriculture : le renouvellement des générations. Ce réseau
  s’articulera autour de deux niveaux de service : un service d’accueil, d’information
  et d’orientation qui sera assuré par les chambres d’agriculture, et un service d’accompagnement
  plus personnalisé des projets, qui sera assuré par des structures agréées par l’Etat.
  Pris sur le fondement de l’article 24 de la loi n° 2025- 268 du 24 mars 2025 d''orientation
  pour la souveraineté alimentaire et le renouvellement des générations en agriculture,
  le décret a pour objet d’introduire une dérogation à la règle selon laquelle le
  silence de l’administration vaut acceptation pour la délivrance, par l’Etat, de
  l’agrément des structures de conseil et d’accompagnement du réseau FSA. Cette disposition
  permet ainsi de garantir la qualité de l’offre de service des structures agréées.
  Ce décret vient en complément du décret en Conseil d’Etat qui fixe les conditions
  de délivrance et de retrait de l’agrément des structures de conseil et d’accompagnement
  du réseau France services agriculture. Le conseil des ministres a adopté les mesures
  individuelles suivantes : Sur proposition du ministre de l''intérieur : A été adoptée
  une mesure diverse d’ordre individuel concernant un officier général de la gendarmerie
  nationale. Sur proposition de la ministre des armées et des anciens combattants
  : - M. Laurent SELLIER est nommé délégué à la sûreté nucléaire et à la radioprotection
  pour les installations et activités intéressant la défense à compter du 1er juin
  2026. En outre, ont été adoptées diverses mesures d’ordre individuel concernant
  des officiers généraux de l’armée de terre, de la marine nationale, de l’armée de
  l’air et de l’espace, du service de santé des armées et du service d’infrastructure
  de la défense. Sur proposition de la ministre de la transition écologique, de la
  biodiversité et des négociations internationales sur le climat et la nature : -
  Mme Anne CLERC, administratrice de l’Etat, est nommée déléguée interministérielle
  à la forêt, au bois et à ses usages. La ministre de l’aménagement du territoire
  et de la décentralisation a présenté un projet de loi visant à renforcer l’Etat
