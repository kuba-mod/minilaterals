title: Déclaration conjointe sur la situation en Cisjordanie
text: 'Au cours des derniers mois, la situation en Cisjordanie s''est significativement
  détériorée. La violence des colons a atteint des niveaux sans précédent. Les politiques
  et les pratiques du gouvernement israélien, notamment la poursuite du renforcement
  du contrôle israélien, compromettent la stabilité et les perspectives d''une solution
  à deux États. Le droit international est clair : les colonies israéliennes en Cisjordanie
  sont illégales. Les projets de construction dans la zone E1 ne feraient pas exception.
  Le projet de colonie E1 diviserait la Cisjordanie en deux et constituerait une grave
  violation du droit international. Les entreprises ne devraient pas candidater à
  des marchés de construction sur E1 ou sur d’autres projets de colonies. Elles doivent
  être conscientes des conséquences juridiques et réputationnelles liées à leur participation
  à la construction de colonies, y compris au risque de s’engager elles-mêmes dans
  de graves violations du droit international. Nous appelons le gouvernement israélien
  à mettre fin à l''expansion des colonies et de ses pouvoirs administratifs, à veiller
  à ce que les colons auteurs d''actes de violence répondent de leurs actes et à enquêter
  sur les allégations visant les forces israéliennes, à respecter la tutelle hachémite
  sur les lieux saints de Jérusalem et les accords historiques relatifs au statu quo
  sur ces derniers, ainsi qu''à lever les restrictions financières imposées à l''Autorité
  palestinienne et à l''économie palestinienne. Nous nous opposons fermement à ceux,
  y compris des membres du gouvernement israélien, qui prônent l''annexion et le déplacement
  forcé de la population palestinienne. Nous réaffirmons notre engagement indéfectible
  en faveur d''une paix globale, juste et durable, fondée sur une solution négociée
  à deux États, conformément aux résolutions pertinentes du Conseil de sécurité des
  Nations unies, dans laquelle deux États démocratiques, Israël et la Palestine, coexistent
  dans la paix et la sécurité à l''intérieur de frontières sûres et reconnues. Signataires :
  - Royaume-Uni - Italie - Espagne - Allemagne - Norvège - Pays-Bas - Canada - Australie
  - Nouvelle Zélande - Haute Représentante de l''UE et vice-présidente de la Commission
  européenne'
