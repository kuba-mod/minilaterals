title: Cérémonie de commémoration du 81e anniversaire de la Victoir
text: Le chef de l’État a présidé la cérémonie de commémoration du 81 e anniversaire
  de la Victoire du 8 mai 1945, le vendredi 8 mai 2026. Dans un premier temps, le
  Président Emmanuel Macron a déposé une gerbe devant la statue du Général de Gaulle
  , Place Clémenceau à Paris. Il s'est ensuite dirigé vers l'Arc de Triomphe avec
  la grande escorte mixte de la Garde républicaine. Après la revue des troupes, il
  a déposé une gerbe devant la tombe du soldat inconnu et ravivé la flamme . Il a
  ensuite salué le comité de la flamme et les porte-drapeaux ainsi que les personnalités
  et le public présent.
