date: '2026-05-28'
type: press_release
source_name: elysee
title: Visite d'État de Prabowo Subianto, Président de la République d'Indonésie.
text: 'Le Président Emmanuel Macron a reçu Prabowo Subianto, Président de la République
  d''Indonésie ce jeudi au Palais de l’Élysée, à l’occasion de sa visite d''État en
  France. Un an jour pour jour après la visite d''État du Président de la République
  en Indonésie et en cette année franco-indonésienne de l’Innovation, cette rencontre
  a permi d’annoncer le rehaussement de la relation entre les deux pays au niveau
  d’un partenariat stratégique global et d’approfondir la coopération dans les domaines
  de la défense, de l’énergie, de l’agriculture, des transports, de la recherche et
  de l’enseignement supérieur. Les échanges ont également permi d’aborder les principaux
  enjeux internationaux , notamment les efforts pour soutenir l’Ukraine et ceux engagés
  pour favoriser une sortie de crise au Moyen-Orient, et d’échanger sur la nécessité
  de consolider nos souverainetés dans un contexte où les logiques de puissance se
  font de plus en plus prégnantes. Les deux Présidents se sont adressés conjointement
  à la presse avant de s''entretenir et de diriger un Haut conseil d''affaires France-Indonésie
  . 20 juillet 2026 - Seul le prononcé fait foi Cher Prabowo Subianto, Mesdames, Messieurs
  les ministres, Mesdames, Messieurs les ambassadeurs, Mesdames, Messieurs, Je suis
  très heureux d''accueillir aujourd''hui à Paris le Président de la République d''Indonésie,
  et je le remercie d''avoir accepté mon invitation pour cette visite d''État. Elle
  intervient un an exactement après celle que j''avais effectuée en Indonésie, preuve
  de la dynamique exceptionnelle de notre relation. Cette dynamique s''appuie sur
  une amitié ancienne entre nous, entre nos deux pays, et une transformation profonde
  de cette relation durant les dernières années. Les crises internationales en Europe,
  au Moyen-Orient, en Asie mettent à l''épreuve la sécurité collective du monde, la
  résilience aussi de nos économies. L’aggravation des déséquilibres mondiaux sur
  le plan macroéconomique, la montée des dispositifs de coercition économique et la
  volatilité accrue également appellent une solidarité renforcée. Je dirais que ce
  constat n''a fait qu''accroître la vision stratégique qui est celle de la France
  depuis dix ans et qui a présidé à l''approfondissement de nos relations ces dernières
  années. Nous sommes convaincus qu''en Indopacifique, il y a une stratégie, une troisième
  voie à poursuivre, qui n''est la vassalisation à aucune des deux grandes économies
  mondiales, mais de manière pacifique, la volonté de bâtir un chemin d''indépendance.
  Nous sommes convaincus qu''il y a à construire, entre l''Indonésie et la France,
  entre nos régions, une coalition d''indépendants, c''est-à-dire de pays qui veulent
  rester souverains, qui veulent commercer avec tous, qui veulent continuer à produire,
  à créer, mais qui ne veulent pas tomber dans la dépendance exclusive à l''égard
  de telle ou telle grande puissance, qu''il s''agisse de minerais critiques, de terres
  rares, de matières premières ou que sais-je. A cet égard, l''Indonésie est un partenaire
  majeur de l''Indopacifique, de cette consolidation de nos souverainetés. Je sais
  que c''est la conviction profonde aussi du Président Prabowo. C''est pourquoi nous
  avons décidé de rehausser notre partenariat stratégique établi en 2011 au rang de
  partenariat stratégique global. Nous l''avons renforcé par des choix extrêmement
  forts ces dernières années. Nous continuons d''avancer à l''occasion de cette visite
  en diversifiant ce partenariat. D''abord, dans le domaine de la sécurité et de la
  défense, l''Indonésie et la France sont unies par un partenariat d''exception qui
  nous permet très concrètement de renforcer nos souverainetés respectives, d''avancer
  aussi sur les métiers les plus technologiques et industriels. La livraison au cours
  des derniers mois des premiers avions de combat Rafale, acquis par l''Indonésie,
  l''illustre tout particulièrement. Nos échanges aujourd''hui témoignent aussi de
  notre volonté de poursuivre dans cette voie et nous développons l''ensemble aussi
  des partenariats qui ont été esquissés. Nous allons renforcer nos actions de formation,
  de coopération sur le plan opérationnel. Nous avons multiplié les exercices conjoints,
  certains auront lieu dans les tout prochains mois, notamment à la faveur de la mission
  PÉGASE de septembre 2026. Dans tous les domaines du jeu, qu''il s''agisse des avions
  de combat, qu''il s''agisse de vos capacités pour la marine indonésienne, qu''il
  s''agisse aussi des capacités pour l''armée de terre, d''exercices conjoints de
  formation, nous avons donné aux partenariats de défense et de sécurité un tour inédit
  et nous allons dans un instant échanger à nouveau et bâtir des perspectives nouvelles.
  En matière économique, nous renforcerons nos échanges commerciaux bilatéraux et
  nos investissements croisés. Je forme à cet égard le vœu que l''accord de partenariat
  économique global entre l''Union européenne et l''Indonésie entre rapidement en
  vigueur. Je sais que vous partagez ce souhait, tant nous sommes d''ailleurs complémentaires
  à bien des égards. Pour en tirer tout le potentiel, il est important qu''il soit
  pleinement mis en œuvre, s''agissant notamment de la levée des obstacles au commerce
  et aux investissements. Nous souhaitons lancer des grands projets dans le transport,
  la santé, la transition énergétique, l''agriculture et j''en passe. Le premier Haut
  Conseil d''entreprises France-Indonésie, qui se réunit en ce moment même, permettra
  aussi de donner une impulsion forte. C''est ce Haut Conseil que nous avons voulu
  ensemble. Je suis aussi particulièrement heureux qu''il nous permette d''avancer
  dans de nombreux domaines. Là aussi, dans la transition énergétique, dans les domaines
  miniers, dans les domaines agricoles, nous avons beaucoup à faire pour avancer et
  diversifier ce partenariat. Je pense aussi au secteur d''innovation et nous souhaitons
  ensemble faire davantage dans les secteurs financiers, dans les secteurs de l''intelligence
  artificielle, du quantique ou du numérique. En parlant de l''ouverture de nos économies,
  je voulais aussi vous dire, Président, combien nous sommes heureux de l''ouverture
  du marché indonésien pour nos filières bovines, laitières et de viande, qui accompagne
  aussi votre stratégie de souveraineté alimentaire, votre ambition pour améliorer
  l''alimentation de vos compatriotes et la grande politique sociale que vous avez
  lancée. Je me réjouis aussi de la volonté des grands groupes indonésiens, de votre
  fonds souverain, Danantara, d''investir davantage en France. Ils seront présents
  à Choose France lundi prochain à Versailles, et leur présence aujourd''hui avec
  nous est essentielle. Nous voulons aussi renforcer notre partenariat culturel pour
  les industries culturelles et créatives. Nous avons lancé en mai 2025 une stratégie
  culturelle conjointe lors de notre visite au temple de Borobudur. Cette stratégie
  a connu des avancées importantes ces derniers mois, que nous parlions de musées,
  de livres, de cinéma ou de mode. Dans le cadre de l''année de l''innovation France-Indonésie
  2026, nous sommes également convenus d''approfondir et de mieux structurer notre
  coopération scientifique, technologique et universitaire. Nous adopterons parmi
  les déclarations aujourd''hui une déclaration conjointe dans, justement, ces domaines.
  La France souhaite accueillir plus d''étudiants, de chercheurs, de talents indonésiens,
  et la Fondation France-Asie va lancer un chapitre Indonésie qui participe de cette
  même ambition et qui permettra aussi la mise en place d''un programme annuel de
  Young Leaders , réunissant des jeunes personnalités de talent engagées dans le développement
  de nos relations. Enfin, évidemment, nous échangerons avec le Président sur les
  grands dossiers internationaux, le conflit entre les États-Unis, Israël et l''Iran,
  qui a de lourdes conséquences sur nos économies. Nous avons là-dessus une vision
  commune : défendre la liberté de navigation, travailler à la déconfliction, ouvrir
  le détroit d’Ormuz de manière pacifique, refuser toute prétention à privatiser le
  détroit ou taxer le passage. Là-dessus, nous avons lancé une coalition internationale
  pour agir de manière efficace. D''ailleurs, la situation à Ormuz ne fait que renforcer
  la nécessité d''accélérer la transition énergétique, qui est un axe prioritaire
  de notre partenariat, et notamment, dans le cadre du partenariat pour la transition
  énergétique juste de l''Indonésie et l''action que nous menons à travers l''Agence
  française de développement. Nous nous exprimons aussi sur le Proche et Moyen-Orient.
  Je veux saluer vraiment votre rôle, votre amitié, les positions très courageuses
  que vous aviez prises l''année dernière pour, là aussi, la paix dans le Proche et
  Moyen-Orient, votre soutien à la reconnaissance de la Palestine. Nous sommes aussi
  engagés pleinement ensemble pour la souveraineté et la stabilité du Liban, où nos
  troupes au sein de la FINUL agissent ensemble. Nos deux nations ont en commun d''avoir
  perdu des enfants pour la défense, justement, du Liban et de la communauté internationale.
  Nous avons cette fraternité d''armes et de sang d''avoir perdu ainsi nos soldats
  ces dernières semaines au sein de la FINUL. Je veux ici saluer votre engagement,
  Président, celui de vos forces armées, et notre volonté commune de continuer à œuvrer
  pour la paix et pour la souveraineté du Liban, au moment même où les frappes, de
  manière indiscriminée, continuent, où il y a plus de 3 000 morts, en particulier
  au sud du Liban, plus d''un million de déplacés, la situation est intenable et inacceptable.
  Rien ne justifie aujourd''hui les frappes qui sont conduites sur le sud du Liban.
  Nous appelons, à nouveau, à la fin de ces frappes, au retour de la paix, de la discussion
  et à la construction aussi d''une solution pérenne. Je voudrais dire que cette situation,
  évidemment, ne détourne pas notre attention de l''Ukraine ni de la pression que
  nous devons exercer sur la Russie. La France et l''Europe, aux côtés de l''Ukraine,
  œuvrent pour une paix juste et durable. Je veux saluer, Président, vos efforts de
  médiation, votre travail sans relâche pour parler à toutes les parties prenantes.
  Nous avons eu à chaque fois l''occasion d''échanger sur ce point. La déstabilisation
  du monde touche hélas aussi l''Asie du Sud-Est, en mer de Chine méridionale, à la
  frontière entre la Thaïlande et le Cambodge, en Birmanie. Et alors que l''ASEAN
  occupe une place centrale dans la stratégie de la France et de l''Union européenne
  dans l''Indopacifique, nous travaillons avec le Président Prabowo pour œuvrer ensemble
  face à ces crises. À tous les niveaux, et je m''arrêterai là, le lien, le partenariat
  entre l''Indonésie et la France est plus pertinent que jamais. Il vient conforter
  une vision d''indépendance que nous avons pour nos pays. Il vient conforter une
  vision de respect de l''ordre international et de la paix dans le monde. Le partenariat
  qui nous lie est, à mes yeux, riche d''avenir. Parce que nous avons dans les secteurs
  de la défense, de l''énergie, de l''industrie, de l''innovation, énormément de choses
  à faire encore et énormément de solutions à bâtir pour votre région et pour le monde.
  Je vous remercie infiniment, Président, d''être à Paris. Vous savez que la France
  vous aime. Elle vous l''avait témoigné le 14 juillet, il y a bientôt deux ans. Vous
  êtes toujours le bienvenu dans ce pays. 20 juillet 2026 - Seul le prononcé fait
