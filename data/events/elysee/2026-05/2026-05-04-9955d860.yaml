title: Déclaration conjointe des dirigeants de la France, de la Lit
text: Nous, dirigeants de la France, de la Lituanie, de l’Estonie, de la Norvège,
  de la Pologne et du Royaume-Uni, ainsi que le Président du Conseil européen et de
  la Haute Représentante de l’Union européenne pour les affaires étrangères et la
  politique de sécurité, avons rencontré le Premier ministre Nikol Pashinyan en marge
  du sommet de la Communauté politique européenne à Erevan. Nous sommes unis dans
  notre soutien à la République d’Arménie. Nous saluons l’engagement continu de l’Arménie
  à construire une démocratie profonde et durable, et nous soutenons fermement sa
  résilience démocratique et sa souveraineté dans la perspective des élections législatives
  qui se tiendront le 7 juin. Nous sommes déterminés à continuer de soutenir l’Arménie
  dans la protection de son intégrité démocratique et dans le renforcement de sa résilience
  face aux menaces hybrides extérieures. Le peuple arménien doit pouvoir choisir librement
  son avenir, sans ingérence étrangère. Nous continuerons à fournir un soutien à l’Arménie,
  notamment par le biais d’experts, du renforcement des capacités, de la fourniture
  d’équipements et de l’observation électorale, afin de contribuer à la tenue d’élections
  libres et équitables.
