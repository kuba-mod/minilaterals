  the friendship between Africa and France. President Emmanuel Macron then took part
  in a working session with heads of state and government and a coalition of French
  and African business leaders. Following a working lunch on the reform of the international
  financial architecture , a plenary session on peace and security was held. The President
  of the Republic then held talks with several African heads of state before giving
  an interview to RFI, France 24, and TV5 Monde. Finally, the Summit concluded with
  a press conference with the Kenyan President , followed by a closing concert.'
