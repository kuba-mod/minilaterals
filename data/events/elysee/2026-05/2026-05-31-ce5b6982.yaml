title: Réception en l'honneur du Paris Saint-Germain, vainqueur de la Ligue des Champions.
text: Le Président de la République a reçu l’équipe du Paris Saint-Germain et son
  équipe technique ce dimanche 31 mai au Palais de l’Elysée, après leur deuxième titre
  en Ligue des Champions. Pour la deuxième année consécutive, le Paris Saint-Germain
  s’est hissé sur le toit de l’Europe , devenant ainsi le seul club français à remporter
  cette compétition deux années consécutives . Cette victoire récompense les efforts
  et le talent de l’ensemble des joueurs, ainsi que le travail du staff technique
  emmené par Luis Enrique . À quelques jours de la Coupe du Monde 2026, ce succès
  marque l’excellence du football français et couronne l’engagement de tout un club
  et de ses supporters. Mesdames, messieurs, chers amis, je salue la présidente de
  l'Assemblée, les ministres, les parlementaires, les élus, il y a beaucoup de monde,
  et tout le monde qui est là. Bienvenue à l'Élysée. Une année encore pour vous accueillir.
  Paris a gagné deux étoiles. Merci. Avant de les remercier et de dire tout le mérite
  qu'ils ont, je voudrais avoir un mot pour commencer. Parce que malheureusement,
  on a vu, et je ne veux pas qu'on s'habitue à ça, et personne n'a envie qu'on s'habitue
  à ça, des scènes de violence inacceptables à Paris et dans d'autres villes, hier
  soir, une bonne partie de la nuit. Je veux remercier le ministre de l'Intérieur,
  le préfet de police, l'ensemble des équipes qui se sont mobilisées sur la plaque
  parisienne et dans beaucoup de villes de province face à ce qui est inqualifiable.
  Je veux remercier l'ensemble de nos forces de l'ordre, évidemment nos commerçants
  qui ont été touchés, les victimes, les gens qui ont été blessés. Ce n'est pas le
  foot, ce n'est pas le sport, ce n'est pas ce qu'on aime. Merci à nos policiers et
  à nos gendarmes. Nous serons intraitables avec ceux qui ont été attrapés. On ne
  veut plus voir ça. Fini. On en a ras le bol. Terminé. Maintenant, retour au sport.
  Je ne vais pas être long, mais je dois dire que vous nous avez fait vraiment vibrer
  jusqu'à la dernière seconde et qu'autant l'année dernière ça avait été franc, massif,
  triomphant là, vous avez été la chercher et on a vibré avec vous au-delà évidemment
  des 120 minutes jusqu'à la dernière seconde de ces tirs au but. Mais quelle équipe !
  Hier, la France a fait en deux ans, grâce au PSG, ce que nous n'avions pas fait
  dans notre histoire en 70 ans de foot, c'est-à-dire deux titres. Merci pour ça.
  Hier, le PSG est rentré dans la très, très grande ligue, parce qu'il est devenu
  en effet l'un des deux seuls clubs, pas simplement à avoir fait trois finales durant
  les six dernières années, mais avec le Réal, avoir fait ce fameux back-to-back ,
  c'est-à-dire avoir enchaîné deux victoires. C'est immense, c'est énorme, nous nous
  le savons, mais un immense bravo, c'est la fierté du PSG, de Paris, de la France
  tout entière. Pour ça, je veux remercier évidemment le Président, cher Nasser, l'actionnaire
  qui, pendant tant d'années, je le rappelais l'année dernière, mais y a cru, a investi,
  vient de si loin. Vous n'avez jamais lâché le PSG. Vous y avez investi, réinvesti.
  Il y a eu des années difficiles, il y a eu des années où beaucoup de gens vous disaient
  il faut tout arrêter, il faut tout lâcher. Vous avez continué. C'est une très grande
  fierté que vous soyez là, que vous ayez porté ce club au sommet de l'Europe. Merci.
  Je sais combien Monsieur le maire de Paris est fier de ça aussi. Il est là avec
  nous et continuera d'avancer. Je voudrais aussi remercier évidemment le coach et
  le staff. Je le disais l'année dernière, Luis Campos, Luis Enrique, leur équipe.
  Si le foot pouvait être un exercice de chimie qui se fait en laboratoire, il faut
  tout de suite nous donner la formule. C’est vrai que lorsque l’on regarde, saison
  après saison, ce que vous arrivez à faire, on a le sentiment que tout était prévu.
  Vous êtes des maîtres dans l'art. Merci infiniment à l'un et l'autre de tout ce
  qui a été fait. Un immense bravo. Cette victoire, c'est la vôtre. C'est celle du
  staff. Bravo. Je n'oublie pas tous les experts du foot qui expliquaient que c'était
  terrible quand Luis Enrique est arrivé, tout ce qu’il allait mal faire, tout ce
  qui allait mal se passer, les doutes. On a vu hier un coach hyper concentré, qui
  n'a jamais lâché, qui a été un chef d'orchestre extraordinaire. C'est la meilleure
  réponse à toutes les critiques, ces deux étoiles. Bravo, chapeau. Je veux évidemment
  remercier cette équipe dans son ensemble. Je ne vais pas citer tous les joueurs,
  vous les connaissez chacun, mais peut-être, je vais juste insister sur le capitaine,
  parce que Marqui, ça fait quelques années quand même qu'il est au club. Il a connu
  toutes ces années, il n'a jamais lâché. Lui aussi, quand beaucoup de gens lui disaient,
  il faut partir, il est resté. Quand beaucoup d'autres disaient que l'herbe est plus
  verte ailleurs ou dans d'autres clubs européens, ou aller faire soi-disant des meilleures
  carrières, il est resté. Et quel capitaine ! Marqui est deux étoiles. C'est la récompense
  de la fidélité, de la loyauté, de la légitimité. Chapeau ! Vous l'avez accueilli,
  on a un Ballon d'Or évidemment ici avec nous. On a de la chance, le pied d'Ousmane
  n'a pas tremblé hier. Une fois encore, il était au rendez-vous avec toute l'équipe.
  On a même découvert, après la 90e minute, qu'il savait animer le banc de touche
  comme très peu, parce qu'il était motivé, parce qu'il ne lâche rien et que c'est
  cet esprit de la gagne qu'il y a derrière. Merci, Ousmane, pour cette saison, ce
  Ballon d'Or. Je veux remercier chacun des joueurs de cette équipe ensuite, parce
  que l'année dernière, j'ai rappelé le mérite de chacun, votre unité, votre ténacité.
  C'était la première étoile, c'était magnifique. On mettait fin à ce qui semblait
  être une malédiction sur le foot français. Je dois dire que cette année, d'abord,
  pour certaines générations, vous avez vengé les Verts en demi-finale avec le Bayern.
  Merci pour ça. On a vu dans ce match à quel point vous étiez un tout, à quel point
  cette équipe, elle se tenait, et chacun allait au combat, chacun relançait, chacun
  s'est donné jusqu'au bout, personne ne s'est énervé, même dans les moments où nous,
  derrière l'écran ou dans le stade, je dois dire, parfois, on s'énervait. Vous n'avez
  rien lâché, vous avez fait preuve, encore plus que l'année dernière, d'une unité,
  d'une force de caractère, d'une force d'âme et d'une maturité, parce que vous n'avez
  jamais donné aucun signe de fébrilité, même si le scénario du premier quart d'heure
  n'était sans doute pas celui qui était écrit, vous avez tenu, vous avez remonté,
  vous avez tenu encore. Jusqu'à la dernière seconde, les nerfs n'ont pas lâché. Ça,
  pour moi, c'est le signe d'une immense équipe, c'est-à-dire d'une équipe qui marie
  des talents extraordinaires, nombre d'entre vous sont en équipe de France ou dans
  d'autres équipes internationales, et ils vont rejoindre d'autres maillots dans quelques
  jours, et c'est la loi du foot, et on s'affrontera peut-être sur le terrain lors
  de la Coupe du monde. Au-delà de ces grandes individualités, on a vu une grande
  unité. Je trouve que le visage que vous avez donné durant toute la compétition,
  comme durant la saison, et en particulier durant cette finale, c'est un tout, sous
  la houlette, je le disais, d'un coach. Ça, c'est immense. Bravo à chacune et chacun
  d'entre vous pour le staff et bravo à chacun des joueurs qui sont ici présents.
  Cette équipe du PSG est une immense équipe et pas de doute, après ce back-to-back
  , c'est la plus grande équipe d'Europe. Bravo. Derrière vous, vous l'avez vu sur
  le Champ-de-Mars, vous le voyez ce soir ici, et vous allez le voir dans un instant
  en retrouvant le Parc des Princes. Évidemment, tous vos supporters sont derrière
  vous. Évidemment, la capitale est derrière vous. Je veux vous dire combien c'est
  toute la France qui est fière. Je le disais, on partage avec le Qatar, l'Espagne,
  un peu de Maroc, un peu d'autres nations qui sont autour, évidemment, de vos maillots,
  cette fierté. C’est une immense fierté pour tout le pays. Maintenant, je finirai
  en disant que dans quelques jours, certains d'entre vous auront trouvé le maillot
  bleu, d'autres, d'autres maillots, et une autre compétition va commencer. Je serai
  mardi midi à Clairefontaine pour encourager les Bleus. J'en aurai certains à mes
  côtés. Je voudrais une chose, au fond, le PSG a suivi les Bleus, deux étoiles. Maintenant,
  j'attends de nos Bleus qu'ils nous en mettent une troisième sur le maillot. Parce
  qu'il n'y a aucune équipe au monde qui a autant de talent et autant d'expérience
  emmagasinée. En tout cas, ce soir, on est extrêmement fiers de cette équipe du PSG,
  de son président, de son coach, de tout son staff, de son capitaine et de tous ses
  joueurs. Ils ont fait ce que beaucoup pensaient inaccessible. Ils l'ont fait avec
  cœur, avec passion. Ils l'ont fait en faisant vibrer Paris et tout le pays. Alors
  vive Paris, vive le PSG, vive la République et vive la France ! Mesdames, messieurs,
  chers amis, je salue la présidente de l'Assemblée, les ministres, les parlementaires,
