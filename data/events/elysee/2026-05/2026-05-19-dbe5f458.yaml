date: '2026-05-19'
type: press_release
source_name: elysee
title: Conseil de planification écologique depuis le Salon REuse Economy.
text: 'Ce mardi 19 mai 2026, le chef de l''État s''est rendu à l''exposition REuse
  Economy où il a présidé un Conseil de planification écologique. Lors d''une déambulation
  dans les stands de l''exposition REuse Economy , le Président Emmanuel Macron a
  échangé avec plusieurs acteurs économiques qui proposent des solutions opérationnelles
  en faveur du réemploi. Puis, le chef de l''État a présidé la cinquième réunion du
  Conseil de planification écologique . Ce conseil s''inscrit dans la continuité de
  l''engagement du chef de l''État et est l''occasion de faire un point d''étape sur
  la mise en oeuvre de la planification écologique annoncée en septembre 2023 autour
  de priorités concrètes : électrification, accompagnement des territoires, économie
  circulaire. Dans un contexte international où les reculs sur le climat se multiplient,
  ce conseil a permis de rappeler le lien fondamental entre planification écologique,
  enjeux économiques et industriels et indépendance de la France. Depuis 2017, la
  France a réduit ses émissions de plus de 20 % , ce qui représente une baisse des
  émissions de 100 millions de tonnes , soit plus que ce qui avait été fait entre
  1990 et 2017. Ces conseils ont pour objectif de tracer le chemin de la souveraineté
  énergétique de la France et d’obtenir des avancées européennes majeures en faveur
  d’une écologie alliant protection du climat, réindustrialisation et réduction de
  nos dépendances . Monsieur le Premier ministre, Mesdames, Messieurs les ministres,
  Mesdames, Messieurs, Merci beaucoup d''être là. Je voulais qu''on puisse se réunir
  à l''occasion de ce salon sur l''économie circulaire et la réutilisation est une
  bonne illustration d''une partie des leviers d''action que nous avons et que nous
  avons encore en main, même si on les a activés par les lois des dernières années,
  dites AGEC et autres, qu''on puisse donc réunir un nouveau Conseil de la planification
  écologique, à la fois à quelques jours de l''ultime mise en consultation de la Stratégie
  nationale bas-carbone, et quelques semaines après la publication par le Gouvernement
  de la Programmation pluriannuelle de l''énergie, qui était tant attendue, et du
  plan électrification. La planification écologique, c''est l''engagement que j''avais
  pris devant les Françaises et les Français, c''est l''idée d''avoir justement auprès
  du Premier ministre, coordonnant l''action de beaucoup d''entre vous, une vision
  commune, et au fond de réconcilier, je dirais, plusieurs objectifs qu''on a trop
  souvent opposés artificiellement : le climat et la biodiversité, la souveraineté
  et la compétitivité. Notre stratégie écologique et cette planification permettent
  véritablement de les réconcilier. Je veux dire qu''il n''y aura pas de compétitivité
  durable si elle ne touche pas les questions justement de souveraineté et d''écologie,
  et réciproquement. Ce triangle est à prendre comme un tout. On l''a vu ces trois
  dernières années, la dépendance aux énergies fossiles de l''Union européenne est
  une fragilité, on l''a vu au moment de la guerre d''agression russe en Ukraine.
  On le revoit aujourd''hui à Ormuz avec le blocage de ce détroit avec, à chaque fois,
  les mêmes ressorts, c’est-à-dire que nos dépendances aux hydrocarbures fossiles
  touchent évidemment beaucoup de chaînes d''activité : notre compétitivité, la compétitivité
  du pays, de plusieurs segments industriels. Notre dépendance aussi, par exemple,
  aux engrais et aux fertilisants non européens, à ces deux reprises, a aussi été
  touchée. On voit, qu''il s''agisse donc des plastiques, des engrais, de la chimie
  lourde, nos dépendances ainsi se révéler. A côté de ça, je crois que ces dernières
  années, on a conforté et consolidé des choix énergétiques pertinents. On aura l''occasion
  d''y revenir, mais tout le travail qui a été fait, la stratégie de Belfort annoncée
  en février 2022, permet à la France, en ayant terminé aussi tous les travaux de
  grand carénage et de pouvoir utiliser quasi à plein potentiel le parc actuel, et
  en ayant décidé aussi de capacités nouvelles sur le plan à la fois renouvelable
  et nucléaire. Elle nous permet d''avoir l''un des mix les plus efficaces, d''avoir
  une politique de production énergétique qui est la bonne et qui nous permet d''aller
  dans le sens d''une réduction de notre dépendance aux fossiles et d''une amélioration
  de la facture énergétique. Notre ambition est claire avec la planification écologique,
  c''est de passer de plus de 60 % d''énergie fossile dans notre consommation à moins
  de 40 % en 2030. C''est atteignable, ce qui permettrait d''économiser entre 20 milliards
  et 40 milliards d''euros par an sur la balance commerciale. Ça représente un point
  à deux points de PIB. Donc on ne parle pas d''une petite chose et c''est tout à
  fait faisable. C''est l''objectif de cette planification écologique qui permet donc
  de combiner une série d''objectifs, comme je viens de l''évoquer, à travers différents
  leviers. Si on regarde notre bilan des dernières années en matière d''émissions
  de gaz à effet de serre et de biodiversité, il est bon sur l''ensemble des deux
  quinquennats. Entre 2017 et 2023, on a réduit nos émissions d''au moins 20 %. La
  France, c''est grâce à son parc nucléaire, aux choix qui ont été faits, aux pratiques
  aussi de décarbonation, d''électrification, à la fois dans les usages dits de mobilité,
  comme sur nos sites industriels, ont commencé à donner leurs premiers effets. Entre
  2017 et 2022, nous avons doublé le rythme de réduction des émissions par rapport
  à la période précédente. Nous sommes passés de 1 % à 2 % par an. Entre 2022 et 2024,
  on a à nouveau doublé. On a été au-dessus des 4 % de réduction, ce qui est une très
  bonne chose. On a ainsi pu rattraper une bonne partie du retard qui nous avait été
  laissé et qui avait conduit à cette fameuse inaction climatique qui condamne la
  période, je le rappelle, 2015-2018. Pas du tout la période 2017-2022. On a été sur
  cette phase de reconquête qui est très bonne. On a repris en main notre destin énergétique
  avec des vrais résultats et qui sont l''illustration de ce que j''évoquais à l''instant,
  puisque nous sommes devenus en 2025 exportateurs d''électricité, là où en 2022,
  on importait parce qu''on n''utilisait pas à plein le parc, et qu''on était en fin
  de cette période de grand carénage. En 2025, on exporte 90 TWh, ce qui fait de nous
  non seulement un pays de production d''énergie décarbonée pilotable, mais un pays
  d''export. Néanmoins, il faut être lucide, en 2024 et 2025, notre rythme de réduction
  des émissions a ralenti. Il ne faut pas le laisser s''installer. C''est pour moi
  l''un des objectifs aussi de ce Conseil. Il y a besoin d''un réveil, parce que les
  habitudes reprennent le dessus. Il y a beaucoup de secteurs qui sont là pour dire :
  « Ce n''est pas le moment, ne venez pas nous ennuyer ici, tout ça n''est pas bon
  », et qui, ce faisant, consolident nos dépendances. Partout où on ne change pas
  les habitudes, où il y a derrière des mauvais résultats, on construit la non-compétitivité
  de demain, les émissions d''aujourd''hui, et le manque de souveraineté. Il ne faut
  absolument pas renoncer à nos grands objectifs, sortir des énergies fossiles, électrifier
  les voitures comme les bus, les trains, etc., décarboner notre industrie, qui sont
  des nécessités, et qui d''ailleurs sont des nécessités nationales et européennes.
  On a obtenu de vraies avancées au niveau européen depuis un an. L''Europe a suivi
  ce modèle français, et avec, là aussi, des principes simples qui ont irrigué notre
  action ces dernières années. Jamais d''objectifs irréalistes sans les moyens de
  les atteindre. C''est d''ailleurs pour ça que lorsque l’on a fixé des nouveaux objectifs
  en 2040, on a dit au niveau européen : « hors de question de les prendre si on ne
  prend pas les décisions pour se rendre capable de les obtenir ». Deuxièmement, une
  décarbonation au profit de nos industries. C’est totalement faux de dire que la
  voiture électrique, ce serait une histoire de bobo, etc., aller à Douai ou ailleurs
  expliquer que c''est une histoire de bobo. On a recréé de l''emploi industriel avec
  la décarbonation et l''électrification de notre parc véhicule. Là où, il y a 10
  ans, il n''y avait pas une production en Europe de batteries électriques, on a des
  gigafactories, je prends toujours l''exemple, justement, de Douai. Je pourrais parler
  de Douai et de Maubeuge en même temps, mais on produit de la batterie électrique,
  maintenant, là-bas, on reproduit de la R5 électrique sur notre sol, et on produit
  la R4 à Maubeuge. On a montré qu''on pouvait réindustrialiser par ce levier. Une
  politique de réciprocité, c''est aussi pour ça qu''on tient, dans tous les domaines
  du jeu, à ces fameuses clauses miroirs. C''est-à-dire que l''on veut que les acteurs
  avec lesquels on commerce aient les mêmes contraintes que celles que l''on se donne,
  parce qu''on pense qu''elles sont justes. C''est pourquoi, aussi, nous devons poursuivre
  nos efforts pour assurer ce maintien au niveau européen. Je pense à ces mécanismes
  dits ETS ou MACF, sans rentrer dans le détail ici, mais qui sont des vrais référentiels.
  Je pense aussi à la préférence européenne, qui réconcilie, encore une fois, compétitivité,
  souveraineté et climat. Ce combat européen est indissociable de celui qu''on a mené
  au niveau français. J''ai bien noté, ces dernières années, que l''écologie était
  devenue une cible facile, en particulier pour les extrêmes, et qu''elle est le théâtre
  d''opérations d''un populisme. Toutes les options, les actions qu''on a menées ont
  été prises sur la base de la science. Je pense qu''il faut continuer de le faire.
  Partout où nous avons des questions, c''est la science qui doit éclairer nos choix.
  Ensuite, il y a une réalité qu''on ne peut pas nier, qu''il s''agisse du climat,
  de la biodiversité, mais aussi de notre compétitivité, il faut s''appuyer sur ce
  qu''on sait mesurer et ce qu''on a fait. A ce titre, nous devons continuer à avancer
  sur des enjeux très concrets. L''électrification, l''économie circulaire, l''accompagnement
  aussi des collectivités, la lutte, également contre la désinformation climatique.
  Ce salon, d''ailleurs, illustre très bien l''enjeu de tout cela. Il nous faut continuer
  à avancer sur ces sujets d''éco-conception et de réemploi, on le voit bien, en particulier
  sur le plastique. On va y venir dans nos débats. En accompagnant les collectivités
  qui souhaitent s''engager pour permettre l''atteinte de nos obligations européennes,
  après une concertation approfondie pour la mettre en œuvre. Je rappelle qu''aujourd''hui,
  nous payons un milliard et demi d''euros parce qu''on ne respecte pas les normes
  européennes sur la consigne. S’il y a des ministères qui ont un milliard et demi
  d''euros en trop, il faut tout de suite le signaler. Si on pense que c''est un bon
  usage et de bons choix collectifs de dire : « La consigne, ça contrarie certains
  ou certains autres » et donc, il ne faut surtout pas y aller. Alors que des pays
  comme les Britanniques sont en train d''y aller à la marche forcée, que nous étions
  naguère en avance, expliquez aux gens que l''on a les moyens de payer chaque année
  un milliard et demi à l''Europe parce qu''on n''est pas au rendez-vous des obligations
  que l''on s’est données. C''est nous qui l''avons choisi, pour nous-mêmes, parce
  que c''est bon. Ce qui est montré dans le salon, on le montre très bien, d''ailleurs,
  ça réduit notre dépendance aux intrants et aux matières pour produire parce qu''on
  réutilise. On crée de l''emploi local, non délocalisable. On recrée de la compétitivité
  sur certaines filières parce qu''on réduit aussi la volatilité des prix, parce qu''à
  chaque fois qu''on produit du consommable à usage unique, on dépend du prix des
  intrants. Si on a Ormuz de fermé pour trois ou quatre mois, le prix des intrants
  monte. Là où on fait de la réutilisation, on crée de la résilience, y compris sur
  ces prix. Je pense qu''il faut maintenant bouger. La consigne pourra faire partie
  des leviers d''action à étudier. Je demande au Gouvernement sous l''autorité du
  Premier ministre d''engager les concertations pour définir les actions concrètes
  qui nous permettront d''atteindre l''objectif de recyclage en 2030 et réunir à cette
  fin l''ensemble des acteurs de la filière pour identifier le chemin le plus réaliste
  pour y arriver. On sait qu''il y a des modèles variés, on sait qu''il y a des gens
  qui ont avancé. Il ne faut pas déstabiliser des filières qui se sont mises en place.
  Je pense qu''il faut continuer à avancer là-dessus. Il faut continuer aussi à consolider
  notre bilan sur la réutilisation, sur la partie industrielle. La REP, on l''a longuement
  évoquée autour de ce salon et on y reviendra. Je pense qu''il faut défendre le bilan
  qui est le nôtre parce qu''il montre qu''il y a un chemin possible. Je pense qu''il
  ne faut pas désespérer les gens. Il faut sortir des oppositions stériles. Nous ne
  sommes pas confrontés, comme nation, à une forme d''alternative qui serait : « on
  ne change rien parce que tout peut continuer et il ne faut pas nous ennuyer » ou
  « il faut faire de la décroissance pour faire de la bonne écologie ». C''est faux.
  Il y a la possibilité, par le changement des pratiques avec les bonnes incitations,
  par de l''organisation collective, par de l''innovation, c''est aussi pour ça, c''est
  au cœur de France 2030, de ce qu''on a fait, par une construction cohérente nationale
  et européenne, il y a la possibilité d''avoir des résultats. On l''a montré en passant
  d''1 % de réduction de nos émissions de CO₂ à 2 %, puis à plus de 4 %. Là, le petit
  repli que l''on a montre simplement qu''on rentre à la fois dans le dur, qu''il
  y a aussi des mauvaises habitudes qui ont parfois repris le dessus. Il est important
  de relancer les choses. L''objectif de ce Conseil de planification écologique est
  qu''on puisse faire un bilan un peu détaillé. Je propose qu''on le fasse dans le
  premier temps de nos échanges. Qu''on puisse ensuite faire un point sur le plan
  d''électrification, qui est essentiel. Le Premier ministre a eu raison, au-delà
  des aides de court terme pendant la crise, de relancer les choses sur ce volet.
  Que l''on puisse ensuite faire un point plus détaillé sur l''économie circulaire
  et le Plan plastique, que l''on finisse sur la planification territoriale, qui est
  évidemment un des leviers clés pour mettre tout cela en œuvre. Merci beaucoup. Monsieur
  le Premier ministre, Mesdames, Messieurs les ministres, Mesdames, Messieurs, Merci
  beaucoup d''être là. Je voulais qu''on puisse se réunir à l''occasion de ce salon
  sur l''économie circulaire et la réutilisation est une bonne illustration d''une
