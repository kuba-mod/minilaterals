date: '2026-05-09'
type: press_release
source_name: elysee
title: Déplacement en République arabe d'Égypte.
text: 'Le Président de la République s''est rendu en République arabe d''Égypte ce
  samedi. À son arrivée à Alexandrie , le Président Emmanuel Macron s''est entretenu
  avec Abdel Fattah Al-Sissi , Président de la République arabe d''Égypte afin de
  conforter une relation bilatérale forte entre la France et l’Egypte et d''aborder
  la crise actuellement en cours au Moyen-Orient . Le chef de l''État a ensuite participé
  à l''inauguration du nouveau campus de l''université Senghor. Monsieur le Président
  de la République, cher Abdel Fattah, Madame la Secrétaire générale de l''Organisation
  internationale de la Francophonie, chère Louise [Mushikiwabo], Mesdames et Messieurs
  les ambassadrices et les ambassadeurs, Monsieur le président de l''université Senghor,
  Monsieur le recteur, Mesdames, Messieurs en vos grades et qualités, Je crois que
  tout a été dit sur cette université, ce projet et ce qu''il en porte. Permettez-moi
  en cet instant de partager peut-être quelques convictions avec vous. D''abord, pour
  vous parler de ce jour important et ensuite pour avoir quelques mots sur ce qu''il
  signifie. En effet, ce magnifique projet de l''université Senghor a été pensé, voulu
  au sommet de Dakar en 1989. Il y a 35 ans, Alexandrie accueillait le premier site,
  avant que vous ne décidiez, Monsieur le Président, de rebâtir au fond et d''investir.
  Je veux saluer ici l''engagement de l''Égypte qui, à près de 60 millions d''euros,
  a permis à ce site de Borg el Arab d''émerger et de s''ouvrir à vous. Le nombre
  d''étudiants va continuer d''augmenter. J''ai compris que la 20ème promotion avait
  quelque chose d''assez particulier. Mais l''idée, c''est que les promotions qui
  suivent soient de plus en plus nombreuses, et nous avons pris l''engagement commun
  de dépasser même l''objectif de 500 étudiants qui est aujourd''hui affiché. Vous
  l''avez très bien montré. D''abord la vitalité, la diversité des profils qui se
  sont exprimés, la force de ce que représente d''ores et déjà cette université avec
  ses 17 sites, avec toutes ses formations en ligne qui fait qu''il y a des milliers
  d''auditrices et d''auditeurs qui sont certifiés chaque année et des dizaines de
  milliers d''anciens étudiants, d''alumni, qui sont aussi la force de ce réseau et
  qui ont formé, continuent de former et formeront les cadres des organisations internationales,
  de la CEDEAO, de l''UMA, de l''Union Africaine, Monsieur le commissaire, des Nations
  Unies, qui ensuite permettront à tous les talents, dans d''autres universités, dans
  les hôpitaux, dans les entreprises, de faire rayonner tout ce que vous avez ici
  acquis et partagé. C''est un formidable projet, et comme l''a rappelé Madame la
  Secrétaire générale, un projet porté en propre par l''OIF qui est ô combien important
  pour nous tous. Bravo pour cela, et c''est pour ça que je tenais à être parmi vous
  aujourd''hui. Maintenant, laissez-moi vous dire simplement, au-delà de cette journée
  si importante, pourquoi la francophonie, les universités et ce que vous représentez
  est important dans le moment que nous vivons, je dirais même essentiel ? La francophonie,
  c''est une création inédite parce qu''elle est née de la volonté de quatre dirigeants
  après les décolonisations, qui ont dit : « le français n''est pas la langue de ceux
  qui nous ont colonisés ». Les présidents Senghor, Bourguiba, Diori et Sihanouk,
  donc c''est l''Afrique et l''Asie, ont dit : « Le français est à nous, butin de
  guerre, on le garde, et on va décider de son avenir ». Donc la francophonie est
  par naissance une invention totalement décentrée. Elle appartient au monde francophone,
  elle appartient à l''ensemble de celles et ceux qui ont décidé d''adopter le français,
  écrivains, créateurs, ceux qui l''ont reçu en héritage, héritage heureux ou malheureux,
  mais qui habitent cette langue. Donc cette université, elle emporte cette histoire
  collective qui est la nôtre, et qui fait qu''à travers tous les continents, la langue
  française est là qui nous unit. Ce n''est pas une langue qui se réduit à un passé
  simplifié parfois. C’est au fond une langue qui porte en elle un universel, un projet
  de liberté, et cette volonté de continuer à avancer. Par définition, la francophonie
  se pense et se vit dans le multilinguisme. Notre cérémonie d''aujourd''hui l''a
  montré. Nous avons tous nos langues d''origine, de naissance, nos langues qu''on
  appelle maternelles. Mais le français, grâce à la francophonie, est devenu une langue
  hospitalière, prise par d''autres, réinventée, ce qui fait que la langue française,
  grâce à ce qu''est la francophonie, est une langue où le français de l''académie
  se bouscule avec le wolof, le haïtien, le congolais, l''anglais et tant et tant
  de langues. Ces mots voyagent parce que cette langue voyage. Je l''ai souvent rappelé :
  l''épicentre aujourd''hui de la langue française est sur les bassins du fleuve Congo.
  Elle n''est pas sur les quais de la Seine. Parce que c''est là qu''il y a le plus
  de locuteurs. Ce projet de la francophonie, c''est celui que vous faites vivre en
  enseignant dans cette université, en venant y étudier, Monsieur le président, en
  y croyant et en investissant. C''est au fond un magnifique projet universaliste
  qui a décidé de convertir une histoire qui avait, évidemment, des moments terribles,
  et qui rassemble aujourd''hui 56 pays membres, 32 observateurs, cinq pays associés.
  On a encore élargi l''année dernière le club lors de ce Sommet de Villers-Cotterêts
  qu''a rappelé tout à l''heure notre Secrétaire général. Je voulais ici vous redire
  l''importance du multilinguisme, de l''universalisme, de cette hospitalité de la
  langue française et ce qui fait qu''au-delà de cette université, nous multiplions
  les projets. Pour, par exemple, s''assurer que l''intelligence artificielle que
  vous étudiez tous préserve bien ce plurilinguisme aussi et assure un apprentissage
  dans la langue française et une compréhension des contenus de la langue française
  dans tous les modèles et en particulier ces modèles fondationnels de l''intelligence
  artificielle. Pour nous assurer que nos traducteurs, nos interprètes sont bien respectés,
  promus. Pour nous assurer aussi que l''édition en langue française et les traductions
  vers l''arabe, l''anglais ou d''autres, sont ainsi maintenues. Tout ça, ce sont
  les projets que nous menons, que nous continuons de mener. Ensuite, au-delà de la
  francophonie, nous sommes dans une université. Je voulais dire aux enseignants qui
  sont là et aux élèves combien c''est important à nos yeux. Parce que ça n''est pas
  simplement un lieu où l''on transmet des savoirs, où l''on apprend, où l''on parachève
  déjà des savoirs largement acquis. Parce que j''ai compris qu''on avait des médecins
  dûment diplômés aussi dans cette université, des cadres du développement durable,
  etc. Mais parce que dans ce monde de plus en plus complexe, les universités sont
  les lieux qui permettront de bâtir l''avenir en ce qu''ils ont une liberté académique,
  qui n''est pas soumise au diktat des uns aux autres ou des désaccords que les dirigeants
  peuvent avoir. Je le défendais en effet l''année dernière au Caire, vous le rappeliez
  à l''instant, mais la liberté académique que portent nos universitaires et les enseignants,
  la liberté du savoir qui est transmis aux étudiants, la possibilité de rechercher
  librement, d''enseigner ce que justement des femmes et des hommes reconnus par leurs
  pairs et ayant été dûment habilités pour le faire, pour recevoir, est un trésor
  fondamental. C''est celui par lequel notre humanité a pu progresser et se bâtir.
  C’est la démarche qui, en quelque sorte, nous a toujours libérés collectivement
  des obscurantismes ou des divisions. Le rôle de nos universités dans ce moment de
  fracturation que vous avez rappelé l''un et l''autre, dans ce moment de division,
  dans le moment où certains pays même voudraient dire à des universités : « vous
  n''avez plus le droit de rechercher sur ceci ou sur cela », « vous n''avez plus
  le droit d''enseigner ceci ou cela », du climat à l''égalité des genres. La liberté
  académique et la liberté de nos universités, la liberté des savoirs est un trésor
  que nous chérissons et que nous défendons. C''est pourquoi, au-delà de ce projet,
  nous avons décidé aussi, et l''année prochaine nous [le] permettra, de passer un
  cap décisif, de donner aussi un nouveau cadre à la coopération entre l''Egypte et
  la France, et d''avoir ce site nouveau, ce projet plus ambitieux pour notre université
  franco-égyptienne, qui va permettre, au-delà des 60 écoles françaises, et associées
  qui développent l''enseignement du français. Pour les enfants, les adolescents ici
  en Égypte, au-delà de ce que le réseau égyptien fait en langue française, d''avoir
  une université franco-égyptienne qui portera notre ambition commune. Ce projet,
  nous le chérissons, et avec le Président, nous voulons aller encore plus loin, et
  donc nous donnerons une impulsion encore supplémentaire à la coopération universitaire
  franco-égyptienne. De là, nous voulons faire naître un mouvement de coopération
  entre l''Europe et le continent africain pour créer des universités nouvelles. Mon
  dernier mot est pour vous dire que vous êtes la solution aux problèmes que nous
  connaissons. Aujourd''hui, quand je regarde la situation géopolitique qui est la
  nôtre, de l''Ukraine à la situation qui a été rappelée à Gaza et en Cisjordanie,
  au Liban chéri, bousculé, menacé, frappé aujourd''hui, et à la situation dans le
  Golfe et dans tant de pays d''amis liés à la guerre qui se joue en Iran, nous ne
  pouvons que voir les défis des générations qui sont les vôtres. Je m''adresse là
  aux plus jeunes. La solution à bien de nos maux est de reconstruire l''unité entre
  des pays ou des espaces régionaux qui se sont ces dernières années par trop écartés
  ou divisés. J''en vois deux que cette université en particulier peut réunir : la
  Méditerranée et l''Afrique. Je veux ici vous dire que je ne me résous pas à voir
  ces deux espaces tant aimés par la France à continuer à vivre dans les fractures
  ou les divisions que nous connaissons. Vos générations n''ont souvent entendu parler
  de la Méditerranée que comme un espace où se jouaient les routes de la misère ou
  des drames advenaient à travers celles et ceux qui voulaient la traverser par des
  routes forcées, contraintes, ou par des désaccords qui écartaient les uns ou les
  autres, ou par les guerres, j''évoquais le Liban à l''instant. Nous nous trouvons
  ici même à Alexandrie, paradis perdu d''une Méditerranée heureuse, berceau de civilisations
  et de rêve d''une Méditerranée où l''on pensait tout possible. Et de Durrell à Youssef
  Chahine, en passant par Omar Sharif, autant de figures qui ont arpenté les rues
  de cette ville et qui l''ont rêvée, nous avons le devoir de vous donner, de donner
  à cette génération la chance de refaire de la Méditerranée un espace uni, le berceau
  de plusieurs civilisations qui se sont toujours entremêlées, mais qui ont tant apporté
  au monde, pas simplement aux pays qui l''abordent. Ma conviction profonde est que
  par ce programme, par la francophonie, par le savoir, nous pouvons réunifier la
  Méditerranée. De Marseille à Alexandrie, il y a cette réunion qui n''est pas un
  hasard. Je suis avec vous, Président, aujourd''hui, mon cher ami, pour ouvrir une
  université, ce qui est quand même un des plus beaux moments que peut connaître un
  dirigeant. Dans quelques jours, le 15 mai, nous ouvrirons les saisons méditerranéennes
  que nous avons voulues à Marseille, où des artistes, des universitaires, des intellectuels
  de toutes les rives de la Méditerranée se retrouveront pour penser cette ambition.
  Ne lâchons pas ce fil. Par le savoir, la création, la science, la langue, voulons
  une Méditerranée unie et heureuse. C''est un des défis les plus importants de nos
  générations. A ce titre, l''alliance entre l''Égypte et la France est une alliance
  de paix, de stabilité, de générosité. Je veux que le français continue d''être la
  langue chérie des Égyptiennes et des Égyptiens. C''est pourquoi on va continuer
  d''avancer. L''arabe est la deuxième langue parlée en France. C''est une réalité
  qu''il faut souvent rappeler. Donc la Méditerranée est unie par ce multilinguisme,
  mais ce projet va nous permettre d''avancer. Cette université - et je le vois par
  la variété des élèves, des cadres qui sont là - cette université, la francophonie,
  est aussi un magnifique ferment de réunification du continent africain. On a souvent
  voulu renvoyer la France à un pré carré, l''Afrique française, francophone. C''est
  d''ailleurs pour ça que, dès après-demain, nous tiendrons ce qu''on appelait naguère
  les sommets France-Afrique . On le tiendra à Nairobi et on l''a appelé ça, pardon
  Madame la Secrétaire générale, le Sommet Africa Forward . Mais c''est un clin d''œil
  pour dire : l''Afrique est un continent aux mille langues. Alors on pourrait dire
  anglophone, lusophone, francophone, nous savons qu''il y en a beaucoup plus. Mais
  le français a cela de particulier pour le continent africain, qu''il est une des
  langues qui permet d''échanger, de circuler, de commercer, d''enseigner, de créer,
  entre les pays, parfois même au sein d''un même pays, entre tant et tant de langues
  qui parfois se côtoient sans forcément se comprendre. Donc, par la francophonie,
  le français a ce rôle un peu singulier, et cette université aussi, d''essayer de
  réunifier le continent africain parce qu''il permet de voyager dans le multilinguisme
  de celui-ci. De l''arabe à l''anglais, au portugais, en passant par le wolof que
  j''évoquais ou tant d''autres, le français est une langue d''échange et d''unité.
  Je voudrais qu''à travers cette université Senghor, par une ruse de l’histoire que
  nous aurions réussi à inventer, là où certains ont vu la langue française arriver
  par des volontés de dominer ou de conquérir, cette langue soit reprise par tous
  ceux qui la parlent, qui l’enseignent, transformée, bousculée, avec de nouveaux
  mots qui viennent de Pointe-Noire, de Tananarive ou que sais-je, et qui réussiront,
  ce faisant, à réunifier pleinement le continent. Que la francophonie soit l''un
  des truchements d''un panafricanisme culturel, intellectuel, créatif et de savoir.
  Parce que ce n''est que par ce pari pour la jeunesse et pour le savoir que le continent
  africain pourra pleinement se réunifier, sortir de ses crises, de ses divisions
  et avancer. Voilà ce que je voulais vous dire et ce par quoi je voulais conclure.
  Que cette université joue pleinement son rôle et, avec elle, le projet de Senghor
  un peu réinventé et réhabité, mais que notre langue, que ce projet soit aussi celui
  qui permette de réunifier la Méditerranée et l''Afrique et permette à vos générations
  de relever les défis, heureuse et choisissant son avenir. Et merci, Président, pour
  votre accueil ici. Monsieur le Président de la République, cher Abdel Fattah, Madame
  la Secrétaire générale de l''Organisation internationale de la Francophonie, chère
  Louise [Mushikiwabo], Mesdames et Messieurs les ambassadrices et les ambassadeurs,
