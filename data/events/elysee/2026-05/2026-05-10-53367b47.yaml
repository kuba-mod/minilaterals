  I got it , dans laquelle nous soutenons la construction d''un nouveau complexe de
  sciences et d''ingénierie. Nous portons aussi des partenariats avec les meilleurs
  établissements d''enseignement supérieur français, en particulier Saclay, pour l''ingénierie,
  l''intelligence artificielle et quelques autres disciplines. Grâce à ces partenariats
  qui combinent enseignement, recherche, innovation, employabilité, c''est une future
  génération d''ingénieurs kenyans qui travaillera demain sur les nouveaux modèles
  d''intelligence artificielle, les solutions en matière climatique et qui sont une
  chance pour le pays et la région. Nos engagements démontrent aussi que la France
  mobilise son savoir-faire dans des secteurs clés pour la croissance et l''innovation
  kényane, les infrastructures énergétiques, numériques ou de transport, qui sont
  vos priorités. C''est la raison pour laquelle des entreprises françaises investissent
  et croient dans le potentiel du Kenya. CMA CGM, qui vient de s''engager à rénover
  deux terminaux du port de Mombasa, investissement au total de 700 millions d''euros.
  Meridiam, qui va agrandir la seconde ferme éolienne du pays à hauteur de 225 millions
  de dollars… Kipeto. Au total, à travers l''ensemble des projets, nous l''avons vu,
  c''est plus d''un milliard d''euros qui sont ainsi signés. Les projets que nous
  avons signés aujourd''hui et qui sont le fruit d''un très gros travail ces derniers
  mois, parfois ces dernières années, vont permettre d''améliorer la vie des Kényanes
  et des Kényans, à l''instar de la construction d''un nouveau centre national de
  contrôle électrique qui permettra un accès moins cher et plus fiable à l''énergie.
  La mise à niveau des rails et de signalisations du train urbain de Nairobi qui vise
  à réhabiliter le mode de transport pour décongestionner la ville. L''appui à une
  autoroute numérique qui permettra le déploiement de la fibre dans de nombreux services
  publics kényans. Le déploiement d''un partenariat sur, justement, les carburants
  durables, SAF, entre nos compagnies. L''amélioration du partenariat en matière de
  suivi climatique et météorologique, décisif pour l''agriculture intelligente que
  vous voulez promouvoir. Le partenariat en matière de thé qui va de la recherche
  à la diffusion et [à] la montée en gamme, en sophistication et en valeur ajoutée
  de votre thé par les partenariats que nous avons signés en la matière. Puis en parlant
  d''électricité et d''énergie, le partenariat que nous avons signé en matière de
  nucléaire civil. Au-delà, en effet, de ce qui a été signé par Meridiam pour l''éolien
  que je viens d''évoquer, il y a notre volonté et votre volonté de bâtir dans la
  durée un partenariat en matière de nucléaire civil. Je veux vous dire ici, Monsieur
  le Président, que vous vous engagez avec la France sur cette voie. C''est un partenariat
  de confiance que nous ne prenons pas à la légère. Le nucléaire civil en France est
  une technologie que nous avons patiemment déployée et consolidée depuis l''après-Deuxième
  Guerre mondiale, que nous avons souvent partagée avec des partenaires de confiance,
  qui nous permet aujourd''hui de produire 75 % de notre électricité, à la fois bas
  carbone et pilotable. Lorsqu''on parle de nucléaire civil avec vous, on parle de
  ce qui est central pour notre pays. On sait comment faire ce nucléaire sûr, durable,
  en toute sécurité, en parfaite concertation. Mais ce n''est pas quelque chose qu''on
  vous vend, c''est d''abord quelque chose qu''on utilise, avec des entreprises d''État
  qui ont déployé ces technologies et continuent d''innover. Voilà, mesdames et messieurs,
  au-delà de ce qu''avait dit le Président, ce que je voulais rappeler sur le partenariat
  bilatéral. Mais vous l''avez compris, c''est aussi pour nous l''occasion de structurer
  un partenariat plus large à travers l''organisation pour la première fois du Sommet
  Africa Forward , ici même, où demain soir, Monsieur le Président, vous avez la générosité
  d''accueillir les 35 chefs d''État et de gouvernement qui seront rassemblés, la
  cinquantaine de délégations au total qui seront mobilisées. La première journée
  à l''université de Nairobi, dès demain, mettra en avant les initiatives entrepreneuriales
  et privées qui sont au cœur de cet esprit. On aura dans le CEO Forum plus de 6 000
  participants, ce qui n''est jamais arrivé à ce niveau-là sur le continent. Vous
  pouvez en être extrêmement fier, ça montre l''attractivité qu''il y a de ce partenariat.
  Nous aurons aussi des innovations qui seront présentées, la jeunesse africaine qui
  pourra s''exprimer, avec laquelle nous échangerons, et nous aurons en matière de
  sport ou d''industrie culturelle et créative, là aussi, plusieurs initiatives concrètes
  qui seront déployées avec des financements privés et publics. L''idée, c''est aussi
  ce partenariat, parce qu''on annoncera des investissements d''entreprises françaises
  sur le continent africain et des investissements d''entreprises africaines sur le
  continent africain. La deuxième journée, au Centre international de conférences,
  démontrera, elle, notre engagement commun pour avancer sur les solutions de paix
  et la question des grandes crises régionales, et engager la communauté internationale,
  puisque le Secrétaire général des Nations unies sera à nos côtés, pour également
  réformer l''architecture financière internationale. Nous aurons mandat ensemble
  de défendre ces positions communes au G7 d’Evian dans un mois, et puis d''accélérer
  la réforme de l''architecture financière africaine, avec un travail très étroit
  avec la Banque africaine de développement. Nous parlerons également de santé, de
  souveraineté alimentaire, de compétitivité, d''énergie, de connectivité. Vous le
  voyez, c''est véritablement une première, et déjà, par la mobilisation des chefs
  d''État et de gouvernement, des investisseurs des entreprises, une première et un
  formidable succès. Voilà, cher William, voilà de belles perspectives pour nos travaux
  futurs, Monsieur le Président, et je veux vous en remercier. Nous venons d''apprendre
  que l''Iran menace, je cite « d''une réponse immédiate en cas de déploiement français
  et britannique dans le détroit d''Ormuz ». Est-ce que cela veut dire que la mission
  du Charles de Gaulle est désormais caduque ? Est-ce que cela remet en cause le principe
  même de la coalition maritime ? Puis l''actualité chargée concernant l''Algérie.
  Peut-on désormais parler d''un dégel ? Est-ce que vous êtes optimiste pour la libération
  du journaliste Christophe Gleizes ? Et comptez-vous vous rendre bientôt en Algérie ?
  [Intervention du Président de la République du Kenya, M. William Ruto] As for the
  first question, I want just to clarify the fact that western African countries will
  be present. I mean, President of Senegal, President of Côte d''Ivoire, President
  of Gabon, President of DRC [Democratic Republic of the Congo] and many others will
  be here. It''s hard to say that Western Africa will not be present in this room.
  You have three countries, and I do regret that which decided because of the coup
  and the behaviors of the military people in charge, to put them aside from the rest
  of the club, by the way, outside of ECOWAS as well and others. Le retrait de cela
  ne signifie pas que l''Afrique de l’Ouest ne fait pas partie de cette rencontre.
  Les grands dirigeants d''Afrique de l''Ouest seront présents. Au-delà de tout cela,
  nous sommes très attentifs également à la société civile, y compris la société civile
  des pays du Sahel et de leur présence ici. Nous pouvons être en désaccord avec des
  gouvernements ou des régimes, mais nous ne sommes pas en désaccord avec la population.
  Le Mali, le Niger, le Burkina Faso et tous ces peuples, nous les aimons, et toutes
  ces sociétés civiles sont impliquées dans cette société. Il y aura de très nombreux
  artistes, intellectuels, entrepreneurs qui viennent de ces régions. C’est un peu
  dans la continuité que je répondrai à votre question. Je n’ai jamais pris l''Afrique
  francophone comme étant justement un pré carré. C''est, dès novembre 2017, dans
  le discours d’Ouagadougou que je l’ai dit. Il n''y a pas la volonté, en étant ici
  ou en faisant ce sommet Africa Forward , après celui de Montpellier, qui était déjà
  une innovation en 2021, [la volonté] de cacher ou quoi que ce soit. Il y a juste
  la volonté de dire : l''Afrique est un tout. Nous sommes les vrais panafricanistes.
  Nous croyons que l''Afrique est un continent. Et ce continent a beaucoup à bâtir,
  c''est le plus jeune au monde. Il a donc un dividende démographique extraordinaire.
  C''est celui qui a la plus grosse croissance au monde. Il a fait l''année dernière
  une croissance légèrement supérieure à celle de l''Asie du Sud-Est. Il faut le regarder
  totalement différemment. En effet, c''est un continent que je ne veux plus que la
  France regarde d''un côté comme étant un pré carré, où les dirigeants d''entreprises
  auraient, en quelque sorte, tous les droits ou tous les contrats qui leur seraient
  garantis, parce que c''était l''Afrique francophone. Parfois, certains considéraient
  que la France donnait une forme d''assurance garantie, quoi qu''il advienne, en
  étant là, à faire ou défaire les gouvernements. C''est fini. Depuis 2017, cette
  époque est terminée. D''abord, parce que bien avant 2017, nos entreprises avaient
  commencé à perdre des parts de marché en Afrique francophone. On le commentait peu,
  mais c''était le cas, parce que c''est compétitif, l''Afrique, à juste titre, et
  parce que je crois à un partenariat équilibré. La transformation qu''on fait depuis
  dix ans, c''est une transformation qui a consisté à dire : partout en Afrique, on
  croit à la souveraineté des États et à leur intégrité territoriale. Il y a un coup
  d''État au Mali. Vous ne voulez plus de la France parce que vous ne voulez plus
  vous battre contre le terrorisme ? On s''en va. Comme on dit en bon français, «
  no offense ». Malheureusement, l''actualité montre que ce n''était sans doute pas
  la meilleure décision que les putschistes maliens avaient prise pour leur pays.
  Je veux ici saluer la mémoire de nos soldats tombés trop nombreux pour la souveraineté
  et l''intégrité territoriale du Mali entre 2013 et 2020. Mais nous avons complètement
  repensé la relation de sécurité. Pas pour nous soustraire, pour justement la rééquilibrer.
  Partout, il y avait des bases qui étaient posées, trop visibles, qui étaient comme,
  en quelque sorte, la rémanence d''une ère passée. Nous les avons transformées, devenues
  partenariales, comme au Gabon. Nous avons repensé cette relation pour qu''elle soit
  rebâtie de manière totalement nouvelle. Au Bénin, au Ghana, au Nigeria, on est en
  train d''inventer une relation de sécurité qui n''existe pas et qui est partenariale.
  C''est l''Afrique de l''Ouest. Et ça marche, avec des vrais résultats sécuritaires,
  au Bénin comme au Nigeria. On a repensé la relation économique. Ce Sommet en est
  l''illustration parfaite. On a repensé la relation culturelle. En 2017, tout le
  monde nous disait : « les restitutions culturelles, il le dit, [mais] il ne le fera
  jamais ». Hier a été promulguée la loi qui permet ces restitutions culturelles pour
  le continent africain. Tout ça pour vous dire qu''il y a, en actes, une transformation
  de ce partenariat équilibré, et l''Afrique de l''Ouest est bien là, présente, et
  la France a des succès formidables en Afrique de l''Ouest. Quand je vois ce qu''on
  a su faire ces dernières années avec le Bénin en matière culturelle ou sécuritaire,
  succès formidable. Quand je vois ce qu''on est en train de faire avec le Gabon,
  quand je vois avec, justement, le Président du Sénégal, que je verrai demain, ce
  qu''on est en train de faire sur le sport, sur la culture, ou sur la réinvention
  de notre partenariat sécuritaire avec des académies régionales, on a des vrais succès
  en Afrique de l''Ouest, on transforme. Puis, à côté de ça, on crée un continent
  inédit dans ce qui était la relation de la France avec l''Afrique. Le Kenya, où
  aucun de mes prédécesseurs ne s''était rendu avant 2019. Le Nigeria, où on a complètement
  transformé la relation. L''Afrique du Sud, avec qui la complicité est forte. Mais
  je pourrais ici aussi citer ce qu''on a su faire ces deux dernières années avec
  le Maroc, où vous parlez de notre relation avec l''Afrique lusophone. Moi aussi,
  je regarde devant. Je constate qu''on a tout transformé ces dix dernières années
  et qu''on n''a jamais cherché à éviter l''Afrique francophone. Vous savez, j''étais
  au printemps au Gabon, je serai cet automne au Sénégal et en Côte d''Ivoire. Vous
  voyez ? On continue d''avancer. On est dans tous ces pays avec ce partenariat renouvelé
  qui permet d''aller de l''avant. Sur les deux dernières questions qui m''étaient
  posées, l''Iran et l''Algérie. Sur l''Iran, je crois qu''il y a beaucoup de confusion
  et il faut calmer les esprits. J''ai entendu votre question, vous avez parlé d''un
  déploiement. Il n''y a jamais eu et il n’a jamais été question d''un déploiement
  français ou franco-britannique. J''ai pris la décision, il y a quelques jours, de
  basculer le Charles de Gaulle, les frégates qui l''accompagnent ainsi que l''ensemble
  de ce qui fait notre groupe aéronaval au-delà du détroit de Bab el-Mandeb, et donc
  de passer de Méditerranée orientale à la proximité. Il n''a jamais été question
  d''un déploiement, mais on se tient prêt. Depuis le début, nous nous disons une
  chose très simple : liberté de navigation. Mettre fin à tout blocus d''où qu''il
  vienne et quel qu''il soit, refuser quel que péage d''où qu''il vienne et permettre
  la liberté de navigation. Nous en avons parlé avec le Président. Le continent africain
  tout entier est victime aujourd''hui du blocus depuis des mois d''Ormuz. Nous n''avons
  jamais envisagé, je vous invite à revoir depuis le premier jour toutes mes déclarations,
  à faire un déploiement pour rouvrir Ormuz. Nous avons bâti une mission ad hoc, copilotée
  avec les Britanniques, qui a rassemblé 50 pays et organisations internationales
  pour permettre, de manière concertée, avec l''Iran, et en déconflictant la chose
  avec tous les pays de la région et les États-Unis, d''assurer, dès que les conditions
  le permettront, la reprise du trafic maritime et des voies à la fois des engrais,
  de la nourriture, du gaz, du pétrole et des marchandises. Je ne sais pas qui commente
  quoi, mais enfin ce qu''on commente, ce n''est pas ce que la France propose. Nous
  continuons de nous tenir dans cette position. J''appelle chacun au calme et à la
  responsabilité. Je pense qu''il y a beaucoup trop d''escalades langagières qui conduisent
  toujours aux escalades physiques. Les plus vulnérables de la planète en sont les
  premières victimes, mais nous sommes aujourd''hui tous les victimes de ce qui est
  en train de se passer. Nos compatriotes en France aussi paient chaque jour le prix
  de cette guerre que nous n''avons pas voulue. Aujourd''hui, retour au calme, priorité
  à la réouverture pacifique et concertée d''Ormuz, reprise de discussions responsables
  sur les questions nucléaires et balistiques dans un cadre adapté. La France est
  là pour fournir des solutions de manière respectueuse et dans le cadre du droit
  international. Pour ce qui est de l''Algérie, je me félicite des dernières heures,
  du déplacement de la ministre déléguée aux Armées, qui était un geste important
  sur le plan mémoriel, des bonnes discussions qu''elle a pu avoir avec le Président
  Tebboune, le chef d''état-major des Armées algérien et de nombreux officiels, et
  des déclarations publiques qui s''en sont suivies. Comme je vous l''ai expliqué
  depuis plusieurs semaines, je considère que mon devoir est de défendre les intérêts
  des Françaises et des Français. Leur intérêt, c''est que nous retrouvions une relation
  apaisée, constructive, avec l''Algérie. Cette relation doit être respectueuse des
  deux côtés, mais elle doit permettre d''apporter des solutions sur tous les sujets.
  Les derniers mois ont causé beaucoup de torts et à l''Algérie et à la France. Ce
  n''est pas notre intérêt de poursuivre cette solution et d''avoir quelques postures
  de politique intérieure. Mon souhait, c''est, avec pragmatisme, au service de l''intérêt
  de nos compatriotes, pour des solutions, qu''elles soient humanitaires, migratoires,
  sécuritaires, mais aussi économiques ou régionales, de bâtir des solutions responsables
  avec l''Algérie. J’espère donc que c’est le début d’une progression, on a déjà eu
  des premiers signaux et d’une reprise qui se fera dans le respect des deux côtés,
  dans l''estime et dans la volonté de servir nos peuples. Je veux remercier à nouveau
  le Président William Ruto pour les mots qu''il a eus à l''instant sur sa confiance
  dans le partenariat. Je crois qu''il dit beaucoup mieux que je ne saurais le faire
  la force du sommet que nous portons, du regard commun que nous avons et en effet
  de cette volonté que nous avons l''un et l''autre de regarder en avant pour nos
  deux pays et pour le continent africain et de se dire qu''il y a eu souvent par
  le passé, au fond, une volonté, quand on parlait de la relation entre plusieurs
  pays d''Europe et l''Afrique, de regarder en arrière. Nous, nous avons toujours
  cherché à bâtir des solutions. C''est l''esprit de la relation bilatérale, c''est
  l''esprit de la relation de notre coprésidence de ce Sommet Africa Forward . C''est
  au fond ce partenariat renouvelé dans tous les domaines du jeu qui doit permettre
  à l''Afrique de réussir et à nos pays de réussir avec l''Afrique. Je suis très heureux
  et très fier d''être à vos côtés ce soir et les deux jours qui viennent, Président,
  mon cher William.'
