date: '2026-05-29'
type: press_release
source_name: elysee
title: Déplacement dans l'Eure-et-Loir dans le cadre des « Journées Choose France
  ».
text: Le Président de la République s'est rendu en Eure-et-Loir, le vendredi 29 mai
  2026, dans le cadre des « Journées Choose France ». Événement totalement inédit
  destiné à valoriser nos outils industriels, les « Journées Choose France » se tiennent
  pour leur 1ère édition les 29, 30 et 31 mai 2026 , partout en France, à la veille
  du Sommet Choose France. Organisées sur le modèle des Journées du patrimoine, les
  « Journées Choose France » ont été créées afin de permettre aux Français de découvrir
  les sites de production des entreprises qui produisent, innovent et se développent
  sur le territoire . Cette initiative vise à illustrer concrètement, dans les territoires,
  les retombées de la politique d’attractivité et de réindustrialisation menée depuis
  2017 . 111 sites représentant 92 entreprises différentes participent à cette première
  édition , répartis sur l’ensemble du territoire national. Depuis le lancement de
  l’initiative Choose France, plus de 230 projets totalisant 87 milliards d’euros
  d’investissements étrangers ont été annoncés en France , contribuant à la création
  de plusieurs milliers d’emplois industriels et au renforcement de la souveraineté
  économique nationale. À cette occasion, le chef de l’État a visité la nouvelle usine
  Vorwerk de Donnemain-Saint-Mamès, dédiée à la production du robot culinaire Thermomix
  . Ce projet, annoncé lors de Choose France 2022 et renforcé en 2024, représente
  désormais près de 130 millions d’euros d’investissement et la création de 124 emplois
  industriels. Le site s’inscrit dans la stratégie de développement industriel du
  groupe allemand en France et illustre la coopération économique franco-allemande
  ainsi que les ambitions européennes en matière de réindustrialisation et de souveraineté
  industrielle . 20 juillet 2026 - Seul le prononcé fait foi Monsieur le ministre,
  Monsieur le préfet, Mesdames et messieurs les parlementaires, Monsieur le président
  du conseil régional, Monsieur le président du conseil départemental, Mesdames, messieurs
  les maires et les élus, Messieurs les CEO et vice-présidents de Vorwerk, Mesdames,
  messieurs les collaboratrices, collaborateurs, ensemble des partenaires, Mesdames
  et messieurs, chers tous. Juste, je vais dire deux mots en anglais pour remercier
  Thomas. Thank you very much for your words, for the commitment of the family and
  the company, for France and the territory and thank you very much for this two millionth
  thermomix being produced here on this site, I will do my best, you can count on
  me, I will try to have the best possible use of this thermomix for sure. Ecoutez,
  je suis très heureux d'être parmi vous et merci pour toutes celles et ceux qui ont
  fourni toute la matinée des explications avec souvent beaucoup de passion et d'engagement
  pour leur métier et leur travail dans l'entreprise. Mais si nous sommes là, c'est
  qu'on est à quelques jours d'une nouvelle édition de Choose France. Lundi, ça se
  tiendra à nouveau. Au fond, c'était l'occasion à la fois de revenir sur ce qui a
  été il y a quelques années, une annonce faite dans le pays, qui était des lignes
  de journaux, qui est aujourd'hui une réalité que vous vivez, et aussi l'engagement
  d'une entreprise sur le territoire, qui est le fruit de ce travail collectif, de
  votre confiance, mais qui permet de montrer que, quand on parle de Choose France,
  de l'attractivité française, c'est une réalité. C'est une réalité qui repose et
  qui se construit sur les réformes qu'on a pu faire ces dernières années, qui ont
  fait, parce que ce n'est pas un miracle ce n'était pas le cas avant, que depuis
  sept ans, on est le pays le plus attractif d'Europe. Ça a été confirmé, encore pour
  l'année dernière. Donc ça fait maintenant sept années consécutives que la France
  est le pays d'Europe qui attire le plus d'investissements étrangers. Ça ne tombe
  pas du ciel. C'est le fruit de réformes, du travail aussi de constance et de notre
  engagement collectif. C'est nos réformes macroéconomiques, nos éléments de simplification,
  je vais y revenir, toute la politique qu'on doit continuer d'accélérer au niveau
  européen. Mais l'histoire de Vorwerk a quelque chose, je trouve, d'unique, d'extrêmement
  illustratif de ce qu'on veut faire. C'est aussi pour ça que je suis là auprès de
  vous. Une entreprise qui, il y a plusieurs décennies, a investi sur votre territoire.
  Donc c'est d'abord sa confiance dans la France, la force du couple franco-allemand.
  Quand on parle d'Europe, ce n'est pas abstrait. Donc cette confiance franco-allemande
  qu'on trouve aussi d'ailleurs dans les machines, les robots, je l'ai vu, vous me
  l'avez expliqué tout à l'heure, il y a des machines allemandes, puis des robots
  français, avec des partenaires qui sont présents ici et qui développent dans la
  région les robots avec lesquels vous travaillez. Il y a eu des moments de doute.
  À ce moment-là, les élus locaux se sont mobilisés. Je veux saluer la présence ici
  de nos maires, de notre département, de la région, évidemment, monsieur le ministre
  qui, à l'époque, était au premier chef intéressé. Vous vous êtes battus pour que
  l'entreprise ne parte pas et qu'elle reste, qu'elle se développe. Ces dernières
  années, l'entreprise a fait des choix. Je veux quand même y revenir. C'est en 2022
  qu'est annoncée la création d'un nouveau site, après Cloyes-les-Trois-Rivières,
  le site historique. En 2022, vous dites, on va s'installer à Donnemain, on va faire
  cet investissement, moderniser le site historique de Cloyes, investir ici pour créer
  une entreprise. La France, au début, n'était pas favorite. Mais vous faites cet
  investissement. En 2024, vous augmentez l'investissement en disant, on va aller
  plus vite encore sur la modernisation, créer plus d'employés. Et en 2025, vous faites
  l'annonce d'un nouveau site pour la R&D, la Chapelle-du-Noyer, pour investir à nouveau
  et embaucher à nouveau. Donc, depuis 2022, il y a eu 4 séries d'annonces faites
  par l'entreprise pour moderniser le site historique, créer ce site, aller encore
  plus vite et plus fort et créer un nouveau site. Ça, je veux vous remercier infiniment
  pour cette confiance. Et au fond, pourquoi ? D'abord, parce qu'il y a une entreprise
  qu'on appelle de taille intermédiaire, donc un champion qui a grandi ces dernières
  années, plusieurs milliers de collaboratrices et de collaborateurs, qui a fait les
  bons choix industriels, qui a décidé de moderniser, de robotiser. Ça vous doit beaucoup.
  Et qui a fait le choix de l'Europe et de la France. Donc merci à vous, parce que
  c'est un vrai choix industriel. La deuxième chose, c'est vous. C'est parce qu'il
  y a des collaboratrices, des collaborateurs qui ont été exemplaires et qui ont montré
  leur engagement pour l'entreprise durant toutes ces années. Parce qu'on n'investit
  pas dans un endroit où les gens ne sont pas motivés. On n'investit pas dans un endroit
  où les gens ne montrent pas leur attachement à la marque, à l'entreprise. Ça m'a
  été dit tout à l'heure, ça nous a été dit à plusieurs reprises, y compris quand
  j'ai vu le directeur général et le président et la famille en 2022. C'est parce
  qu'il y a aussi des collaboratrices et des collaborateurs qui sont attachés à l'entreprise.
  Donc je voulais vraiment vous dire mes remerciements, parce que c'est ce collectif
  qui a permis ces choix. La troisième chose, c'est parce qu'il y a des partenaires
  de qualité. Tous ceux qui sont là, partenaires industriels, qui font partie de cet
  écosystème d'innovation, de production, vous en êtes, et des élus qui ont continué
  de se mobiliser. Et puis il y a eu les services de l'État, et je veux vraiment remercier
  l'ensemble des services de l'État, les équipes de l'Élysée, des ministères, de Business
  France, de la préfecture et l'ensemble des services de l'État sur le territoire
  avec nos élus, parce que c'est pour ça qu'on a pu avancer aussi. Je vais vous dire
  quelque chose pour que vous ayez confiance dans le pays, on avait une discussion
  tout à l'heure, j'en ai, moi, assez du défaitisme qu'on entend sur la France et
  sur l'Europe. C'est une folie. Sinon, on n'a pas confiance en nous-mêmes. Qui aura
  confiance en nous ? Mais ce qu'on a fait ici, c'est la démonstration en acte que
  c'est possible. Tout le monde nous dit que c'est impossible. C'est très, très long
  en France, en Europe, on ne peut plus faire de projet industriel. On s'est engagés.
  En 2022, on a dit 2 ans. 2 ans. Les gens nous ont dit, c'est impossible, 2 ans pour
  faire une usine. On l'a fait. Les gens pensent que pour construire des usines en
  France, il faut faire des millions, voire des milliards de subventions. Ici, zéro
  subvention publique. Il n'y en a pas eu. Il n'y en a pas eu. Vorwerk n'a pas touché
  de l'argent de la France. Mais qu'est-ce qu'on a fait ? On a foncé tous ensemble
  pour dire ce qu'était ce site, une friche agricole, on va créer une usine. Donc,
  on a été deux fois plus vite que d'habitude sur les permis. L'ensemble des collectivités
  territoriales ont simplifié leurs plans d'urbanisme. Les services de l'Etat ont
  redoublé d'efforts pour mettre en parallèle les procédures. On a payé des fouilles,
  ça oui, pour justement aller plus vite. En deux ans, on a bâti une usine. Donc,
  je le dis haut et clair, c'est possible. Quand on a des femmes et des hommes motivés,
  fiers de leur entreprise, dont les qualités sont reconnues, quand on a le bon contexte
  macroéconomique, c'est-à-dire qu'il ne faut pas massacrer les entreprises avec de
  la fiscalité, ni ceux qui travaillent avec de la fiscalité, c'est ce que j'essaie
  de faire depuis neuf ans. J'entends parfois, chaque année, comme les hirondelles
  reviennent, on a parfois les velléités fiscales qui reviennent. Non ! Stabilité !
  Stabilité, compétitivité européenne et rapidité ! Et donc, on l'a fait tous ensemble.
  On a créé ce site en deux ans. Ça, c'est une formidable force, c'est une source
  d'attractivité, c'est une source de fierté, mais ça montre qu'on peut aller de l'avant.
  Donc, nous avons recréé ici, entre Cloyes, Donnemain, La Chapelle, des emplois industriels.
  Ce qui est d'ailleurs conforme à ce qu'on fait dans le pays depuis maintenant sept
  ans, c'est qu'on réindustrialise progressivement, là où pendant douze ans, on avait
  désindustrialisé. C'est l'ensemble de cette mobilisation qui est clé. Ce qui fait
  que, non seulement, Vorwerk a décidé d'aller plus vite, de doubler la mise, d'investir
  sur La Chapelle, mais je dois le dire ici aujourd'hui, sur la base de cet exemple,
  vous avez été nos meilleurs ambassadeurs. Les équipes m'ont raconté tout à l'heure
  que quand une autre entreprise allemande, du Mittelstand, Zwilling , qui fait les
  cocottes Staub, disait, je vais fermer mon site en France. Ce n'était pas chez vous,
  c'est dans les Hauts-de-France, mais c'est la même équipe. Je vais fermer, je vais
  ouvrir l'usine en Malaisie, parce qu'en France, ils n'iront jamais assez vite, ce
  sera trop compliqué, etc. Grâce à vous, parce que vous avez été expliquer ce qu'on
  a su faire ensemble en deux ans. Vous avez été les voir, « vous devriez quand même
  leur demander ». On a bossé avec eux sur le même modèle, modèle Vorwerk. Cette même
  entreprise allemande, elle a décidé de moderniser son site et de réinvestir en France.
  Donc à chaque fois qu'on raconte, c'est possible. À chaque fois qu'on se mobilise
  tous, en format équipe de France, on y va, en partenariat franco-allemand, on a
  des résultats, on réindustrialise, on recrée de la confiance, on tord le cou à des
  idées reçues, et on met un coup d'arrêt à ce défaitisme insupportable. On est un
  grand pays industriel, un grand pays d'activité, qui permet à des femmes et des
  hommes comme vous, de se reconvertir dans la carrière, à des plus jeunes de trouver
  un emploi, à un CDI à 20 ans, et à des femmes et des hommes de ce territoire, d'avoir
  un avenir industriel et de bâtir une vie avec leur famille. C'est ça, ce qu'on veut.
  On veut créer de la richesse dans notre pays, pour pouvoir soutenir notre modèle,
  que nos enfants aient une meilleure vie que nous. C'est possible il faut se retrousser
  les manches. Ce que vous faites, je vous ai vus sur vos lignes de production, ce
  que vous faites quand vous bâtissez aussi et que vous concevez cette modernisation,
  cette robotisation, et ce que l'ensemble des équipes ont fait pour que ça aille
  vite et qu'on soit compétitifs. Parce que c'est une bataille mondiale et que l'exemple
  de Vorwerk montre qu'on peut la gagner. Donc voilà pourquoi je suis là. Pour dire,
  quand on a annoncé en 2022, en 2024, en 2025, des choses, c'était du réel, du tangible.
  On l'a là. Je suis même un peu moins bête maintenant sur comment on fait le bol,
  comment il est hermétique et comment on a les lignes de production. Donc ça, c'est
  grâce à vous. C'est grâce à nous tous. Vous pouvez être très fiers de ça. Alors,
  je le disais, septième fois consécutive qu'on est le pays le plus attractif d'Europe.
  Lundi, on aura un nouveau Choose France avec des annonces qui s'annoncent formidables.
  La totalité de ce qu'on a annoncé ces dernières années, c'est en réaliser 87 milliards
