  redoublé d'efforts pour mettre en parallèle les procédures. On a payé des fouilles,
  ça oui, pour justement aller plus vite. En deux ans, on a bâti une usine. Donc,
  je le dis haut et clair, c'est possible. Quand on a des femmes et des hommes motivés,
  fiers de leur entreprise, dont les qualités sont reconnues, quand on a le bon contexte
  macroéconomique, c'est-à-dire qu'il ne faut pas massacrer les entreprises avec de
  la fiscalité, ni ceux qui travaillent avec de la fiscalité, c'est ce que j'essaie
  de faire depuis neuf ans. J'entends parfois, chaque année, comme les hirondelles
  reviennent, on a parfois les velléités fiscales qui reviennent. Non ! Stabilité !
  Stabilité, compétitivité européenne et rapidité ! Et donc, on l'a fait tous ensemble.
  On a créé ce site en deux ans. Ça, c'est une formidable force, c'est une source
  d'attractivité, c'est une source de fierté, mais ça montre qu'on peut aller de l'avant.
  Donc, nous avons recréé ici, entre Cloyes, Donnemain, La Chapelle, des emplois industriels.
  Ce qui est d'ailleurs conforme à ce qu'on fait dans le pays depuis maintenant sept
  ans, c'est qu'on réindustrialise progressivement, là où pendant douze ans, on avait
  désindustrialisé. C'est l'ensemble de cette mobilisation qui est clé. Ce qui fait
  que, non seulement, Vorwerk a décidé d'aller plus vite, de doubler la mise, d'investir
  sur La Chapelle, mais je dois le dire ici aujourd'hui, sur la base de cet exemple,
  vous avez été nos meilleurs ambassadeurs. Les équipes m'ont raconté tout à l'heure
  que quand une autre entreprise allemande, du Mittelstand, Zwilling , qui fait les
  cocottes Staub, disait, je vais fermer mon site en France. Ce n'était pas chez vous,
  c'est dans les Hauts-de-France, mais c'est la même équipe. Je vais fermer, je vais
  ouvrir l'usine en Malaisie, parce qu'en France, ils n'iront jamais assez vite, ce
  sera trop compliqué, etc. Grâce à vous, parce que vous avez été expliquer ce qu'on
  a su faire ensemble en deux ans. Vous avez été les voir, « vous devriez quand même
  leur demander ». On a bossé avec eux sur le même modèle, modèle Vorwerk. Cette même
  entreprise allemande, elle a décidé de moderniser son site et de réinvestir en France.
  Donc à chaque fois qu'on raconte, c'est possible. À chaque fois qu'on se mobilise
  tous, en format équipe de France, on y va, en partenariat franco-allemand, on a
  des résultats, on réindustrialise, on recrée de la confiance, on tord le cou à des
  idées reçues, et on met un coup d'arrêt à ce défaitisme insupportable. On est un
  grand pays industriel, un grand pays d'activité, qui permet à des femmes et des
  hommes comme vous, de se reconvertir dans la carrière, à des plus jeunes de trouver
  un emploi, à un CDI à 20 ans, et à des femmes et des hommes de ce territoire, d'avoir
  un avenir industriel et de bâtir une vie avec leur famille. C'est ça, ce qu'on veut.
  On veut créer de la richesse dans notre pays, pour pouvoir soutenir notre modèle,
  que nos enfants aient une meilleure vie que nous. C'est possible il faut se retrousser
  les manches. Ce que vous faites, je vous ai vus sur vos lignes de production, ce
  que vous faites quand vous bâtissez aussi et que vous concevez cette modernisation,
  cette robotisation, et ce que l'ensemble des équipes ont fait pour que ça aille
  vite et qu'on soit compétitifs. Parce que c'est une bataille mondiale et que l'exemple
  de Vorwerk montre qu'on peut la gagner. Donc voilà pourquoi je suis là. Pour dire,
  quand on a annoncé en 2022, en 2024, en 2025, des choses, c'était du réel, du tangible.
  On l'a là. Je suis même un peu moins bête maintenant sur comment on fait le bol,
  comment il est hermétique et comment on a les lignes de production. Donc ça, c'est
  grâce à vous. C'est grâce à nous tous. Vous pouvez être très fiers de ça. Alors,
  je le disais, septième fois consécutive qu'on est le pays le plus attractif d'Europe.
  Lundi, on aura un nouveau Choose France avec des annonces qui s'annoncent formidables.
  La totalité de ce qu'on a annoncé ces dernières années, c'est en réaliser 87 milliards
  d'euros d'investissement d'entreprises allemandes, britanniques, mais parfois taïwanaises,
  chinoises, américaines, indonésiennes en France. C'est des emplois créés, c'est
  de l'investissement qui se fait, c'est de la richesse qui se crée chez nous. C'est
  ça dont on a besoin. Donc, il ne faut pas lâcher ce combat. Il est essentiel. C'est
  le combat pour l'industrialisation. C'est le combat pour l'innovation. Je veux vraiment
  vous saluer tous parce que moi, c'est ce collectif que j'aime. Quand je vois des
  élus qui se battent sur le terrain quand ça risque de fermer, tout tenir, des élus
  qui se battent pour investir, accélérer les projets, quand je vois des élus qui
  se battent à nos côtés pour qu'on puisse former des jeunes plus rapidement et on
  tient ô combien à l'apprentissage, aux politiques de reconversion, ça, c'est la
  France qui gagne. C'est la France qui permet de créer des emplois et de vous offrir
  des opportunités et de vous voir avec fierté parler de votre travail comme vous
  l'avez fait tout à l'heure, ce qui est pour moi la plus belle des récompenses, ça
  vaut tous les chiffres de la Terre. Croyons collectivement dans le pays. Alors,
  au moment où on se parle, il y aura plusieurs sites parce qu'on a créé les Journées
  de Choose France et donc aujourd'hui, dans beaucoup de sites, mais tout le week-end,
  il y a plusieurs douzaines de sites industriels qui sont ouverts au public. Ce sont
  des sites qui ont bénéficié justement de ces investissements de Choose France. Il
  y en aura partout en France. Donc on aura Aubert et Duval dans le Puy-de-Dôme, on
  aura Saint-James en Normandie, on aura aussi Novo Nordisk, à Chartres, qui a été
  un gros investissement dans la pharma qu'on avait été ensemble célébrer. Donc vous
  pourrez, la carte est rendue publique, avec toutes vos familles, aller dans ces
  sites pour au fond être attachés à l'industrie comme on est attachés aussi à notre
  patrimoine. On est dans un grand territoire, un grand département de patrimoine
  historique, on y tient aussi beaucoup. Aimer nos usines, aimer notre industrie,
  c'est aussi important pour le pays, pour convaincre aussi beaucoup de jeunes qu'il
  y a de l'avenir dans l'industrie et qu'ils ont vos modèles à suivre, c'est-à-dire
  la possibilité de trouver des emplois stables, de qualité, où on peut être bien
  formé, où on est formé tout au long de sa vie, où on a amélioré les conditions de
  travail grâce à la robotisation, et où on peut avoir un emploi qui évolue tout au
  long de la vie. J'ai vu des exemples concrets où on prend des responsabilités et
  où on travaille dans de bonnes conditions. Je ne veux pas être plus long, mais je
  voulais être parmi vous pour remercier de la confiance qu'il a eu dans la France,
  évidemment le groupe Vorwerk, pour vous remercier collectivement, chacune et chacun,
  de nous avoir permis de faire cela, et pour vous dire, pour nous dire collectivement,
  de croire en nous. On est une très grande nation d'innovation, d'industrie, d'agriculture
  aussi, et on a encore un avenir magnifique. Simplement, il faut être capable d'aller
  encore plus vite, de nous mobiliser, de valoriser nos atouts, d'attirer partout
  dans le monde ceux qui investissent, et de mettre en œuvre ce qu'on a dit qu'on
  ferait. C'est exactement ce qu'on a fait ici, et c'est ce qu'on va continuer de
  faire. Aucune fatalité, aucune simplification, aucun défaitisme. L'esprit de conquête,
  toujours et encore, parce que c'est possible, c'est la France et c'est l'Europe,
  et c'est l'amitié franco-allemande. Merci à tous.
