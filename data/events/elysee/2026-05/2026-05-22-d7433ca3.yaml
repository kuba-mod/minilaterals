date: '2026-05-22'
type: press_release
source_name: elysee
title: Forum européen sur la puissance de calcul, les sciences et technologies quantiques
  et les semi-conducteurs.
text: 'Le Président Emmanuel Macron s''est rendu au Très Grand Centre de Calcul du
  Commissariat à l’énergie atomique et aux énergies alternatives (CEA), à Bruyères-le-Châtel,
  afin de participer au Forum européen sur la puissance de calcul, les sciences et
  technologies quantiques et les semi-conducteurs, ce vendredi 22 mai 2026. Ce forum
  a réunit les principaux acteurs français et européens de ces secteurs stratégiques afin
  de mettre en lumière les savoir-faire, les talents et l’écosystème d’excellence
  dont disposent la France et l’Europe sur ces technologies d’avenir. À cette occasion,
  le Président Emmanuel Macron a annoncé plusieurs mesures structurantes destinées
  à maintenir notre souveraineté et notre avance dans ces filières dans un contexte
  de compétition internationale croissante . Cet événement s’inscrit dans la continuité
  de l’action engagée depuis 2017 par le Président de la République pour soutenir
  le développement des technologies de rupture et renforcer la souveraineté technologique
  européenne . Après une visite de l''ordinateur quantique photonique "Lucy" de Quandela
  commentée par le directeur du TGCC et plusieurs experts de renommée mondiale, le
  chef de l''État a pris la parole. Monsieur le Premier ministre, Mesdames et Messieurs
  les ministres, Madame la préfète, Mesdames et Messieurs les parlementaires, Monsieur
  le président du conseil départemental, Madame la maire, Mesdames et Messieurs les
  élus, Monsieur le délégué général pour l’armement, Monsieur le secrétaire général
  pour l''investissement, Madame l''administratrice générale du CEA, Monsieur le directeur
  général du CNRS, Mesdames et Messieurs les chercheurs, les industriels, Mesdames
  et Messieurs en vos grades et qualités, Merci de votre présence. Je suis très heureux
  avec le Premier ministre et plusieurs ministres, d''être parmi vous aujourd''hui,
  ici, au Très Grand Centre de Calcul du CEA à Bruyères-le-Châtel. Ce lieu s''inscrit
  dans cette vallée du savoir qui rassemble les meilleures universités, grandes écoles,
  organismes de recherche, entreprises de pointe. C''est une grande fierté française,
  une force française, c''est important de nous retrouver là sur la question des technologies
  de calcul, du quantique, des semi-conducteurs. Ici, se concentrent des décennies
  de recherches, d''ingénieries, d''innovations industrielles, de visions stratégiques,
  au cœur d''ailleurs d''une vision française, duale, ce site du CEA et la présence
  de la DAM ici le montrent ô combien, de la capacité aussi à œuvrer entre la recherche
  fondamentale, la recherche appliquée et le monde industriel, entre le civil et le
  militaire. Ici se croisent le calcul classique avec l''ordinateur Joliot-Curie,
  le quantique avec Lucy, que nous venons de voir, l''IA bientôt avec le data center
  Mistral d''Eclairion à quelques centaines de mètres, et demain, l''Exascale Alice
  Recoque, mais aussi les semi-conducteurs, essentiels à tout cela. Le civil, le militaire,
  le public, le privé, une grande tradition de recherche française, et notre avenir
  qui se joue ici également. Nous devons relever ce défi tous ensemble, au fond, le
  fil directeur, à la fois de ce que vous faites au quotidien, mais de l''approche
  sur laquelle je veux ici insister, c''est l''importance de continuer à avoir cet
  écosystème profondément intriqué. Chercheurs, enseignants, ingénieurs, doctorants,
  techniciens, entrepreneurs, industriels, investisseurs, équipes des universités,
  du CEA, du CNRS, de l''INRIA, et évidemment aussi de la DGA et des industriels militaires.
  Je veux remercier toutes celles et ceux qui, non simplement, prennent part, mais
  font vivre ces grands projets, nous les ont présentés, c''était au cœur de vos tables
  rondes ce matin avec les ministres et de ce qui vient de nous être ici montré. Ce
  lieu n''est pas anodin, il dit en effet l''importance de ces grands projets pour
  le pays, du lien entre notre dissuasion nucléaire, les simulations, l''importance
  du calcul et ensuite cette capacité à irriguer la recherche. Désormais, nous pouvons
  continuer de compter évidemment sur le CEA avec les autres organismes de recherche
  mentionnés, pour investir dans le quantique et les semi-conducteurs. Ce dont nous
  parlons aujourd''hui, c''est au fond du défi de notre indépendance, de notre souveraineté
  sur ces grandes capacités de l''électronique, du calcul, et aussi de l''IA pour
  les années, les décennies à venir. La révolution du calcul est un tournant technologique
  et les années qui s''ouvrent seront celles de la convergence entre trois grandes
  révolutions : le calcul haute performance, l''intelligence artificielle et le quantique.
  Je le disais déjà, en 2021, lors du lancement du premier Plan quantique en France,
  j''étais aux côtés de beaucoup d''entre vous, c''est une révolution scientifique
  et économique. C’est exactement ce que nous avons vécu ces dernières années. D''un
  côté, le quantique remet en cause les architectures cryptographiques qui sécurisent
  nos communications, nos systèmes bancaires, certains de nos systèmes de défense,
  pour rester pudiques. De l''autre, il est une source inestimable d''innovation pour
  les télécommunications, la santé, la chimie, l''énergie, la défense, une fois encore ;
  je pense à la recherche, aux investissements, au premier déploiement d''une offre
  quantique, par exemple par Orange, pour ses réseaux sécurisés, au développement
  de Thales, qui nous ont été montrés dans la sécurité post-quantique de nos dispositifs
  de défense, comme de nos cartes SIM. De même, sur les semi-conducteurs, infrastructures
  clés pour tout calcul numérique, des voitures aux ordinateurs les plus puissants,
  leur maîtrise, on le sait bien, est fondamentale. Comme souvent dans le numérique,
  cette course fait que le premier qui atteint l''usage emportera toute la mise. C’est
  aussi pour ça que nous sommes là avec le Premier ministre et les ministres à vos
  côtés. Nous sommes conscients de tout ce qui a été fait, je vais y revenir rapidement,
  sur ces dernières années, avec le Plan quantique, avec aussi ce qui a été fait sur
  les semi-conducteurs et l’IA. Nous sommes convaincus que nous sommes dans une phase
  de très forte accélération où beaucoup de choses se jouent. Les 18-24 mois à venir
  sont absolument décisifs pour la recherche comme pour nos industriels. On sait que
  ceux qui réussiront, en particulier dans le quantique, à prendre les options technologiques
  les plus radicales, ceux qui réussiront cette phase, seront ceux qui bâtiront les
  standards, prendront les parts de marché. Les 18-24 mois à venir sont clés pour
  réussir dans la construction de cette chaîne de valeur souveraine européenne. On
  sait où est le défi. Le défi, c''est d''avoir des semi-conducteurs, infrastructures,
  capacités de calcul, cloud, IA et usage applicatif, les plus souverains possibles.
  Nous connaissons nos vulnérabilités. La France avait plaidé pour avoir un cloud
  souverain européen, les autres ne nous ont pas suivis. J''espère qu''on pourra reconquérir
  cette part. On a aujourd''hui, en particulier sur le quantique, sur le semi-conducteur,
  sur tous ces sujets, une bataille de la souveraineté qui est en train d''être conduite
  et qu''on doit absolument réussir, au fond, une géopolitique du calcul, où les dépendances
  technologiques deviendront de plus en plus des dépendances économiques, industrielles,
  stratégiques, sans doute même démocratiques. L’horizon stratégique est clair, c''est
  celui-ci, à Paris comme à Bruxelles, nous devons accélérer. Nous devons accélérer
  parce qu''on a beaucoup de force, je vais y revenir, mais nous sommes à un moment
  où il y a une accélération et les chiffres doivent nous rendre lucides sur nos dépendances.
  Depuis l''été dernier, les sociétés américaines du quantique accélèrent avec des
  levées de fonds et des valorisations record, appuyées par les GAFAM. En un an, le
  rapport de valorisation entre nos champions européens et leurs concurrents américains
  est passé d''un rapport d’un à trois à un rapport d’un à sept. Sur les semi-conducteurs,
  je constate encore que plus de 90 % des capacités avancées de production demeurent
  à Taïwan, l''objectif que l’on s''était fixé en Européens de 20 % de production
  mondiale d''ici 2030, c''était le premier Chips Act européen, ne sera pas atteint.
  Nous sommes encore en retard sur ce Plan de début de reconquête de souveraineté.
  On voit bien que le moment est critique, c''est cette phase d''accélération, nous
  devons réussir ce virage. Tout ça se fait dans un contexte où la même lucidité doit
  nous conduire à dire que nous sommes dans la bataille quand on parle de quantique,
  et nous avons des forces, notre écosystème a des forces, vous, quand on parle de
  quantique et d''électronique. L’Europe compte les cinq prix Nobel mondiaux des technologies
  quantiques attribués depuis 2021, tous issus de nos laboratoires publics, la plupart
  ayant travaillé sur le plateau de Saclay. Je salue la présence de Michel Devoret
  à nos côtés aujourd''hui. Elle dispose du deuxième vivier mondial de chercheurs
  et de start-up. Nous sommes crédibles en termes de formation, en termes d''organismes
  de recherche, en termes d''écosystèmes de start-ups. Tout ça, c''est la base de
  l''école française, des grands paris qui ont été faits, des grands programmes, et
  qui vient de loin, avec aussi cette approche duale, le CEA y est pour beaucoup,
  le CNRS et l''INRIA à ses côtés. Nous avons fait ces dernières années aussi des
  choix forts pour bâtir notre souveraineté numérique, la consolider à travers des
  infrastructures critiques, pour relancer aussi avec le premier plan en Europe d''intelligence
  artificielle, que l’on a su ensuite monter à l''échelle, puis avec la volonté, justement,
  de bâtir ce Plan quantique il y a maintenant cinq ans et avoir une stratégie semi-conducteurs
  française et européenne. D''ailleurs, quantique et semi-conducteurs sont deux piliers
  structurants de France 2030, lancé à la même période. Sur le quantique, le Plan
  lancé en 2021 a permis de consolider nos résultats et de les accélérer. En matière
  de recherche, plus de 600 publications, 48 brevets, des laboratoires communs avec
  l''industrie, comme Pasqal, Institut d''Optique, Quandela, C2N. Nous avons aussi
  consolidé, vivifié cette recherche. La formation, même chose. Plus 40 % sur les
  masters, plus 25 % sur les doctorants. Ces talents, évidemment, alimentent nos laboratoires,
  ils alimentent les start-ups. Le but, c''est qu''ils puissent aussi continuer d''alimenter
  les grands groupes qui ont besoin de se nourrir, de consolider leur expertise, leur
  connaissance en la matière. Nous avons, en parallèle, renforcé notre autonomie sur
  plusieurs composants critiques : cryogénie, laser, interconnexion. En termes de
  calcul, nous déployons, ici, à Bruyères, le premier exascale public au monde. Pour
  accélérer le développement des acteurs privés, nous avons mis en place un programme
  d''achat public souverain, le programme dit « PROQCIMA », lancé en 2024, qui a déjà
  engagé 500 millions d''euros pour porter cinq entreprises françaises. Grâce à cela,
  la France compte cinq champions de l''ordinateur quantique sur cinq filières technologiques
  différentes, tous issus de nos plus grands laboratoires : Pasqal, Quandela, Alice
  & Bob, Quobly et C12. Nous avons même des entreprises qui ouvrent leurs premières
  usines comme Alice & Bob. Il n''y a pas aujourd''hui en Europe un écosystème de
  formation, de recherche et de start-up aussi complet que le nôtre et sur lequel
  les investissements ont été aussi massifs ces dernières années. C''est une force
  et aucun autre pays au monde, à l''exception des États-Unis et de la Chine pour
  autant qu''on en connaisse, n''a su faire émerger une telle diversité technologique.
  C''est une force stratégique majeure. C''est pour cela que l’on a les moyens de
  réussir. Sur le quantique, je le dis ici avec beaucoup de force, on a les moyens
  d''être dans les gagnants de cette course. Sur les semi-conducteurs, la stratégie
  nationale d''accélération de juillet 2022, avec 5,5 milliards d''euros aux engagements
  confondus, nous a permis de reconstruire, avec STMicroelectronics, qui accélère
  formidablement et qui est en train, là, de faire, ces derniers mois, un parcours
  remarquable, Soitec, là aussi, je parle des start-up d''hier devenues des grands
  groupes d''aujourd''hui liés encore une fois au laboratoire du CEA, à la recherche
  publique, à l''écosystème remarquable de Grenoble et de Crolles, SiPearl, Vsora,
  je pense aussi au projet Crolles avec GlobalFoundries, notre participation aussi
  au projet important d''intérêts européens communs, les fameux PIIEC microélectronique.
  Sur tout ça aussi, nous avons augmenté nos capacités de production, nous avançons,
  même si nous savons que nous avons encore des dépendances sur ce volet à l''égard
  de Taïwan, comme d''ailleurs le reste du monde. Les partenariats industriels et
  de recherche que l’on est en train de bâtir, avec Foxconn et d''autres, consolidés
  l''année dernière, sur lesquels on va encore revenir lors du Choose France, seront
  à cet égard décisifs. La France a tenu son rang, elle investit, mais comme je le
  disais, le rythme de nos concurrents nous oblige à passer à la vitesse supérieure.
  J''en viens maintenant à l''avenir. Il faut garder ce qu''on a très bien su faire
  et qui est notre force, et donc consolider l''intrication de notre écosystème. Il
  faut continuer à investir sur l''amont, formation, recherche fondamentale, l''écosystème
  de recherche. Il nous faut accélérer l''industrialisation, les innovations de rupture
  et la consolidation. C''est là où, si l’on veut gagner cette partie, il faut absolument
  changer d''échelle. Alors ici, à Bruyères, je veux revenir sur plusieurs éléments
  et plusieurs annonces françaises et européennes, mais insister vraiment sur ce mot
  d''ordre pour ces annonces. Il faut continuer de faire ensemble, c''est-à-dire faire
  converger les initiatives. Pour le programme de recherche, qui doit beaucoup mieux
  associer industriels et start-ups encore, pour les start-ups les plus en pointe,
  qui doivent maintenant passer à une phase de convergence des technologies ou du
  moins de rapprochement sur des plateformes communes en lien avec la recherche publique.
  Je veux ici vous inciter à continuer. L''esprit est déjà là. J''ai pu encore le
  mesurer ce matin. Je le vois à chaque fois dans mes déplacements et depuis tous
  les rendez-vous de suivi du plan de 2021. Mais il est nécessaire de continuer à
  renforcer cet esprit de collectif. Premièrement, avec le Gouvernement, nous voulons
  ici aujourd''hui vous dire que nous allons décider d''un abondement immédiat de
  la stratégie nationale quantique à hauteur d''un milliard d''euros. Cet investissement,
  ce supplément d''un milliard, est mobilisé via France 2030. Je veux remercier les
  équipes, l''autorité du Premier ministre et des ministres, qui ont redéployé les
  priorités, qui va permettre d''avancer très concrètement. C''est le renforcement
  des cœurs de calcul avec l''accélération de notre programme d''achat public PROQCIMA,
  que j''évoquais, qui a permis de faire émerger ces cinq champions. C''est le cofinancement
  du futur programme européen d''acquisition de calculateurs tolérants aux fautes.
  Dont j''ai bien compris, ça m''a été réexpliqué ce matin, combien c''étaient des
  éléments de rupture extrêmement importants. Je le dis parce que pour les béotiens
  comme moi, c''est parfois contre-intuitif. C''est l''appui aux agences de programmes
  du CEA, de l''INRIA sur les infrastructures et les logiciels et applications. C''est
  un soutien aux technologies hors calcul, capteurs et communications quantiques.
  C''est enfin le socle de recherche des talents et de la normalisation en prolongeant
  et renforçant le programme de recherche et le programme de soutien à la formation
  des QuanTEdu. Avec l''effort de la recherche et des armées, le retour européen et
  l''effet de levier privé, ce sont ainsi près de 3 milliards d''euros qui seront
  mobilisés sur 5 ans pour notre pile quantique nationale. Ça, c''est le premier élément
  qui permet cette accélération et qui est dans la droite ligne de ce que nous avons
  fait pour consolider les efforts. Deuxième élément, nous engageons la France dans
  un nouveau programme de financement européen sur l''électronique, le PIIEC dit Advanced
  Semiconductor Technologies, alias AST, à hauteur de 550 millions d''euros pour la
  contribution française, afin de financer la recherche et l''industrialisation sur
  les technologies pertinentes pour l''IA et les data centers. La pré-notification
  s''ouvrira le mois prochain, en juin. Le gouvernement présentera en juillet une
  nouvelle stratégie nationale électronique à horizon 2035 et finalisera pour juin
  à Vivatech les conclusions de la mission franco-allemande sur l''innovation de rupture
  qui a été conduite, comme nous l''avions demandé par les deux gouvernements, par
  Bpifrance et SPRIND. Je demande dans le même mouvement à nos organismes, CEA, CNRS,
  INRIA, IRT, de constituer dans la continuité de leurs échanges de ce matin une coalition
  européenne de recherche et de technologie alignée avec Fraunhofer, Helmholtz, Max
  Planck, IMEC, TNO, etc., et engagée par ces partenariats sur une stratégie commune
  de préférence européenne. Pour tout cela, nous devons pouvoir nous appuyer sur notre
  écosystème aussi privé. A ce titre, je veux saluer la vague de partenariats industriels
  que cette séquence rend visible et qui sont aussi une force pour cette deuxième
  phase que nous enclenchons. Le rachat de Bull via l''APE est un signal fort de cette
  stratégie d''État actionnaire, et Bull aura vocation à jouer le rôle d''un des consolidateurs
  européens dont notre continent a besoin. On l''a encore vu ce matin sur la partie
  interconnecteur. Je pense aussi au partenariat de Quobly avec STMicroelectronics,
  qui ouvre l''accès à une usine de production en volume. L''acquisition par la France
  d''un calculateur quantique Alice & Bob, tolérant aux fautes, hébergé ici, au très
  grand centre de calcul du CEA en 2027. L''implantation par Quandela de sa future
  semi-conducteur Facility à Munich. Le partenariat tripartite avec Qbitoft, Scaleway
  et Pasqal, qui formalise une verticale quantique souveraine. Le projet de réseau
  à calculateur quantique multiple entre OVHcloud et WeLinq. Le retour de fonderie
  de première puce de SiPearl. On a vu ce matin des échantillons. Et le contrat conclu
  entre STMicroelectronics et AWS, qui permet à une entreprise française de devenir
  le fournisseur stratégique d''une infrastructure de calcul américaine, ce qu''il
  ne faut pas sous-estimer. Voilà un écosystème devenu maîtrisé, intégré, exportable
  et qui accélère et qui est aussi une force pour cette phase. En quelque sorte, l''amorçage,
  c''est maintenant l''accélération et la consolidation industrielle, et nous devons
  tous nous mobiliser. Face à cette accélération mondiale, aucun pays ne pourra réussir
  seul, et c''est pourquoi, au-delà de ces deux annonces françaises, c''est aussi
  une phase d''accélération européenne que nous allons porter. La France a porté le
  Chips Act, s''est engagée dans le Quantum Flagship, dans EuroHPC. Elle impulse aujourd''hui
  le futur Quantum Act et la révision du Chips Act, et prendra toute sa place dans
  les fameuses AI factories. Pardon pour cette multiplication d''anglicismes. Mais
  nous devons continuer d''aller plus loin, comme je le disais, sur toutes les couches ;
  semi-conducteurs, HPC, quantique, cloud, IA, qui ne forment plus qu''un seul continuum
  pour avoir un stack souverain européen. Nous devons en faire une doctrine, ce qui
  impose à mes yeux, là aussi, au niveau européen, un changement de méthode et une
  accélération. D''abord, la méthode. Il convient de beaucoup mieux associer public
  et privé au niveau européen. Je dirais que l''Europe est très en retard par rapport
  à la France. Les sept tech-créateurs : Airbus, ASML, Ericsson, Mistral, Nokia, SAP,
  Siemens, qui se sont exprimés récemment, parlent pour l''industrie de notre continent,
  et ils ont raison. Il faut le faire ensemble, associer les laboratoires publics
  de nos pays, engager un vrai programme commun autour de la Commission européenne
  avec les pays les plus engagés pour avancer. Pour ça, nous devons avoir deux exigences
  que nous allons porter, au-delà des régulations européennes que nous allons prendre.
  La première, il faut une Europe qui se choisit et se protège. Depuis huit décennies,
  c''est la commande publique américaine qui fait la Silicon Valley. Ce qui fonctionne,
  on l''a bien vu dans le programme qu''on a fait, c''est pour ça qu''on va abonder,
  c''est PROQCIMA. C''est décider des vrais publics d''achat souverains. Les États-Unis
  et la France n''ont jamais eu honte de ces politiques d''achat. La Chine achète
  souverainement. En Europe, ça reste un gros mot. Ça fait des années que je me bats,
  dès 2017 où j''ai parlé de cette souveraineté européenne. La commande publique européenne,
  elle est clé, et elle est clé en particulier dans tous les segments de recherche,
  d''innovation et d''industrialisation que nous évoquons. C''est pour ça que la France
  a pris cette initiative et porte avec l''Allemagne, l''Autriche, les Pays-Bas et
  la Pologne, une proposition qui structurera le futur Quantum Act autour d''un projet
  européen massif d''achat public de calculateurs, conçu, fabriqué et opéré par des
  entreprises européennes, libres de toute législation, à portée extra-territoriale.
  Nous connaissons l''importance de celle-ci, surtout en matière de défense. Il faut
  étendre cela à des obligations d''achat européen dans nos marchés critiques ; supercalculateurs,
  processeurs quantiques, cloud souverains, gigafactory d''IA, composants de notre
  base industrielle de défense. Ensuite, des exigences de valeur ajoutée européenne.
  Nous portons, avec l''Allemagne et les Pays-Bas, une position ambitieuse pour la
  révision du Chips Act, orientée par la demande, avec une exigence de valeur ajoutée
  européenne dans les marchés EuroHPC et des exigences de contenu européen assumées.
  Le secteur privé ne se mobilise pas par les colloques ni par la régulation, il se
  mobilise par les contrats. C''est notre devoir à tous. Et puis, nous devons assumer
  des mesures de défense, c''est-à-dire de sauvegarde, quand les clauses s''imposent,
  de préférence européenne, l''équivalent d''une section 301 à l''européenne. Il n''y
  a aucune raison que, quand notre souveraineté est en jeu, bousculée par des acteurs
  étrangers qui viennent après nous imposer par leurs propres acteurs leur extraterritorialité,
  nous ne réagissions pas. Nous nous battons toutes ces dernières années pour le faire.
  Dans les secteurs qu''on évoque, c''est plus nécessaire qu''ailleurs encore. La
  deuxième exigence, c''est la magnitude du financement, c''est la mère des batailles.
  Au-delà de ce que j''ai annoncé pour la France, soyons honnêtes, aucun budget national
  ne sera à la hauteur de l''échelle d''investissement public et privé qu''il faut
  mobiliser. Ce dont on parle aujourd''hui sur le quantique et l''électronique de
  pointe, tout ce qui est aussi largement le calcul, nécessite une Europe qui investisse
  beaucoup plus massivement. Une Europe qui accepte une politique de concurrence adaptée,
  modernisée, pour permettre à des champions d''émerger. Je vais être très simple,
  la bataille qu''on va mener dans les prochains mois, elle a deux piliers fondamentaux.
  Quand vous en entendrez parler, on les voit souvent comme abstraits. Je veux que
  vous compreniez pleinement qu''ils sont clés pour votre recherche et votre industrie.
  On ne peut pas gagner la bataille du quantique, de l''électronique, du calcul si
  on ne mène pas ces deux combats au niveau européen. Le premier, c''est la taille
  du budget européen sur la période 2028-2034. On va négocier toute cette fin d''année
  le budget européen. Si sa taille n''est pas massivement augmentée, l''Europe ne
  sera pas à la hauteur des défis en matière de défense et de sécurité, de quantique,
  d''IA et de green tech. Si on ne fait pas l''investissement aujourd''hui, compte
  tenu de l''accélération que j''évoque, nous sortirons du paysage. Alors, j''entends
  tous les gens qui me disent : « il ne faut pas trop dépenser en ce moment en Europe.
  » Mais regardez ce que les Américains et les Chinois dépensent, il ne faut pas dépenser
  davantage sur nos politiques historiques. Il faut les préserver et les moderniser.
  Mais il faut dépenser au moment de cette course d''innovation, sinon nous dépendrons
  demain. La clé derrière tout ça, c''est d''avoir une Europe qui investit en empruntant
  sur le marché mondial. Nous allons continuer de défendre l''idée d''un emprunt européen
  pour la recherche, l''innovation et la technologie dans ces technologies critiques,
  afin de bâtir de nouveaux programmes. C''est un devoir pour nos enfants. L''Europe
