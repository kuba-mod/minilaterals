  Dans les secteurs qu''on évoque, c''est plus nécessaire qu''ailleurs encore. La
  deuxième exigence, c''est la magnitude du financement, c''est la mère des batailles.
  Au-delà de ce que j''ai annoncé pour la France, soyons honnêtes, aucun budget national
  ne sera à la hauteur de l''échelle d''investissement public et privé qu''il faut
  mobiliser. Ce dont on parle aujourd''hui sur le quantique et l''électronique de
  pointe, tout ce qui est aussi largement le calcul, nécessite une Europe qui investisse
  beaucoup plus massivement. Une Europe qui accepte une politique de concurrence adaptée,
  modernisée, pour permettre à des champions d''émerger. Je vais être très simple,
  la bataille qu''on va mener dans les prochains mois, elle a deux piliers fondamentaux.
  Quand vous en entendrez parler, on les voit souvent comme abstraits. Je veux que
  vous compreniez pleinement qu''ils sont clés pour votre recherche et votre industrie.
  On ne peut pas gagner la bataille du quantique, de l''électronique, du calcul si
  on ne mène pas ces deux combats au niveau européen. Le premier, c''est la taille
  du budget européen sur la période 2028-2034. On va négocier toute cette fin d''année
  le budget européen. Si sa taille n''est pas massivement augmentée, l''Europe ne
  sera pas à la hauteur des défis en matière de défense et de sécurité, de quantique,
  d''IA et de green tech. Si on ne fait pas l''investissement aujourd''hui, compte
  tenu de l''accélération que j''évoque, nous sortirons du paysage. Alors, j''entends
  tous les gens qui me disent : « il ne faut pas trop dépenser en ce moment en Europe.
  » Mais regardez ce que les Américains et les Chinois dépensent, il ne faut pas dépenser
  davantage sur nos politiques historiques. Il faut les préserver et les moderniser.
  Mais il faut dépenser au moment de cette course d''innovation, sinon nous dépendrons
  demain. La clé derrière tout ça, c''est d''avoir une Europe qui investit en empruntant
  sur le marché mondial. Nous allons continuer de défendre l''idée d''un emprunt européen
  pour la recherche, l''innovation et la technologie dans ces technologies critiques,
  afin de bâtir de nouveaux programmes. C''est un devoir pour nos enfants. L''Europe
  au niveau agrégé est sous-endettée par rapport aux Chinois et aux Américains, massivement.
  Si on demande à chaque État de contribuer, aucun État ne dira je veux accroître
  ma contribution nationale pour financer cette Europe. Si ensuite on dit, ça dépend
  de ressources propres, combat que je mène depuis 5 ans, ils nous diront tous : «
  nous ici, on ne veut pas la taxe numérique, ça va fâcher les Américains. Ici, on
  ne veut pas des ETS, on n''est pas d''accord avec votre modèle. » On va mener ce
  combat. Comptez sur moi. La clé, c''est de faire ce qu''on a su faire au moment
  du Covid, parce qu''il y avait urgence. Ce qu''on a fait il y a quelques semaines
  pour l''Ukraine, parce qu''il y avait urgence. Je le dis très clairement, il y a
  une urgence de souveraineté, de recherche, de technologie pour notre Europe à investir
  sur ces technologies critiques. L''Europe doit aller sur un investissement d''avenir
  et un emprunt d''avenir ensemble dans les prochains mois. Le deuxième élément clé,
  c''est de mobiliser l''argent privé. Nous devons parachever l''union bancaire et
  on doit bâtir une union des marchés de capitaux, une union du financement commun.
  Pourquoi ? Parce que c''est le seul moyen d''avoir des acteurs privés qui vont investir
  dans vos technologies. Aujourd''hui, je donnais les chiffres, quelle est la force
  des Américains ? Ils ont un marché intégré. Ils ont des acteurs à l''échelle du
  continent qui investissent massivement. Nous, on a construit des régulations sur
  nos banques et nos assurances qui financent 70 % de nos économies, qui leur interdisent
  de financer l''innovation et les fonds propres. Bilan des courses : notre épargne,
  est plus abondante que l''épargne américaine, ne va que pour financer les obligations
  du monde entier ou pour aller chercher du profit en finançant des innovations américaines.
  Des centaines de millions partent chaque année. Adaptons notre régulation enfin
  cette année et bâtissons cette union des marchés de capitaux, cette union de l''épargne
  et du financement, c''est la même chose, en consolidant une épargne européenne et
  en disant : « l''épargne qu''ont les Européens, affectons-la dans les domaines critiques
  où il y a des besoins de souveraineté et de la rentabilité. » C''est la deuxième
  bataille clé que nous allons mener. Voilà, Mesdames et Messieurs, je ne veux pas
  être plus long, mais je voulais vous dire ici ce que la France a décidé pour elle-même,
  ce que nous portons au niveau européen, et les combats que nous allons conduire.
  Parce que je suis très fier de ce que nous avons fait ces dernières années tous
  ensemble. Tout ça s''inscrit dans des décennies de recherche fondamentale, de recherche
  appliquée, menée et portée par nos universités, nos organismes de recherche. Mais
  depuis 5 ans, nous avons donné une phase d''accélération inédite. On doit encore
  accélérer et passer à l''échelle. C''est maintenant. De Saclay à Grenoble jusqu''à
  Munich ou autres, c''est cette Europe que nous voulons. C''est cette France forte,
  parce que la France est parmi les leaders mondiaux aujourd''hui sur ce dont nous
  parlons. 18 mois, voilà l''horizon. 18 mois pour bâtir, accélérer, investir, acheter
  et garantir l''indépendance de la France et de l''Europe à horizon de 2050. C''est
  une aventure formidable. C''est le défi que nous allons relever tous ensemble. Vive
  la République et vive la France.'
