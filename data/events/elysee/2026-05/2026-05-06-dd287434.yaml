title: Compte rendu du conseil des ministres du 6 mai 2026.
text: 'Retrouvez le compte rendu du conseil des ministres du mercredi 6 mai 2026.
  Le garde des sceaux, ministre de la justice, a présenté un projet de loi ratifiant
  l’ordonnance n° 2025-1091 du 19 novembre 2025 portant réécriture du code de procédure
  pénale dans sa partie législative. Le conseil des ministres a adopté le projet de
  loi ratifiant l’ordonnance du 19 novembre 2025 qui a réécrit à droit constant la
  partie législative du code de procédure pénale. Tout en procédant à la correction,
  à droit constant, de diverses inexactitudes et omissions qui figuraient dans cette
  ordonnance, ce projet de loi prévoit que l’entrée en vigueur du nouveau code de
  procédure pénale, fixée au 1er janvier 2029 par l’ordonnance, pourra être reportée
  par décret jusqu’au 1 er septembre 2030. Un tel report pourrait en effet s’avérer
  nécessaire pour procéder aux adaptations informatiques indispensables à l’application
  du nouveau code et à des actions de formation. Le projet de loi habilite par ailleurs
  le Gouvernement à procéder par ordonnance à l’intégration dans le nouveau code,
  toujours à droit constant, des réformes de procédure pénale qui seront adoptées
  par le Parlement d’ici son entrée en vigueur. La ministre de l’agriculture, de l’agro-alimentaire
  et de la souveraineté alimentaire a présenté un projet de loi de ratification de
  l’ordonnance n° 2026-154 du 4 mars 2026. Cette ordonnance, publiée au Journal officiel
  le 5 mars dernier, modernise et adapte les dispositions du livre VIII du code rural
  et de la pêche maritime applicables aux territoires ultramarins, dans les domaines
  clés de l’enseignement agricole, du développement agricole et de la recherche agronomique.
  Prise sur le fondement de la loi n° 2025-268 du 24 mars 2025 pour la souveraineté
  alimentaire et le renouvellement des générations en agriculture, cette ordonnance
  répond à un double objectif : Conformément à l’article 57 de la loi du 24 mars 2025,
  le Gouvernement soumet ce projet de loi au Parlement dans le délai de trois mois
  suivant la publication de l’ordonnance. Son article unique vise à entériner définitivement
  ces adaptations, qui entrent en vigueur depuis le 5 mars 2026. Le conseil des ministres
  a adopté les mesures individuelles suivantes : Sur proposition du Premier ministre
  et du garde des sceaux, ministre de la justice : - M. Marc GUILLAUME, conseiller
  d’Etat, est nommé vice-président du Conseil d’Etat, à compter du 21 mai 2026. Sur
  proposition du ministre de l''économie, des finances et de la souveraineté industrielle,
  énergétique et numérique : - M. Claude IMAUVEN est nommé président du conseil d’administration
  de la société Orano. Le garde des sceaux, ministre de la justice, a présenté un
  projet de loi ratifiant l’ordonnance n° 2025-1091 du 19 novembre 2025 portant réécriture
  du code de procédure pénale dans sa partie législative. Le conseil des ministres
