title: Clôture de la 79e édition du Festival de Cannes.
text: Sous la présidence de Park Chan-wook, maître du cinéma coréen, le festival de
  Cannes a regardé l’époque droit dans les yeux et placé le 7e art au cœur des enjeux
  qui traversent nos sociétés. Un an après l’Iranien Jafar Panahi pour Un simple accident,
  la Palme d’or décernée au réalisateur roumain Cristian Mungiu pour Fjord couronne
  un film inspiré d’une réalité sociale douloureuse, dont la singularité prononcée
  laisse une empreinte durable sur le spectateur. De la Palme d’or d’honneur décernée
  à la légende américaine Barbra Streisand au Grand prix pour Minotaure du réalisateur
  russe en exil Andreï Zviaguintsev, le palmarès de cette 79e édition fut une célébration
  digne et engagée de cet art du regard mais aussi de l’écoute comme le soulignait
  Isabelle Huppert, dont la plus grande richesse sera toujours celle de sa liberté
  inconditionnelle. Avec ce palmarès tout à l’honneur du cinéma européen, la France
  a joué un rôle important. Chacun des dix films primés a un producteur ou coproducteur
  français et le Centre National du Cinéma en a soutenu la moitié. Plus que jamais,
  la France peut être fière d’être la capitale de cette liberté sur grand écran, en
  attendant avec impatience de découvrir ces films dans les 6 400 salles de cinéma
  à travers tout le territoire. Le Président de la République et son épouse saluent
  l’ensemble du monde du cinéma rassemblé à Cannes, comédiennes et comédiens, réalisatrices
  et réalisateurs, scénaristes mais aussi tous ces noms au générique des films qui
  nous font vibrer, des techniciens aux financeurs publics comme privés, et dont la
  conjugaison constitue la condition nécessaire d’un art qui a besoin de tout le monde
  pour nous enchanter.
