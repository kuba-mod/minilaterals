  lourde, que l’on pensait impossible il y a quelques années, devient une réalité.
  Grâce à notre savoir-faire, nous produisons en France, chez Renault Trucks, des
  poids lourds électriques. Geodis s''engage à électrifier sa flotte de fret. C''est
  donc une chaîne complète, sur la mobilité lourde que l’on est en train de structurer.
  L''exemple que je viens de donner le montre. Un constructeur français, un grand
  opérateur logistique français et des kilomètres se faisant décarboner. Là-dessus,
  je veux être aussi très clair, pour tordre le cou parfois à des idées qu''on entend.
  Quand on parle de véhicules électriques, ne nous trompons pas, on n''est pas en
  train d''accompagner une désindustrialisation. D''abord, je le rappelle, depuis
  sept ans, on réindustrialise le pays, mettant fin à douze ans de désindustrialisation.
  Le véhicule électrique est un levier de notre réindustrialisation. La part d''industrie
  française, le nombre d''emplois créés en France est supérieur sur le véhicule électrique
  que sur le thermique. Parce que l’on a toute une stratégie intégrée, parce que l’on
  a relocalisé des gigafactories de batteries dans notre pays, on en a créé l''installation.
  Dans cette même salle, il y a bientôt dix ans, être un vétéran me permet d''avoir
  ces remarques, l''industrie elle-même me disait : « malheureux, n''allez pas trop
  vite sur le véhicule électrique. Non, ne faites pas ça, Président. On ne sait pas
  produire de batteries électriques en Europe. On n''en fait pas. On dépend totalement
  des Chinois et des Coréens du Sud. Donc surtout, n''allez pas, ceux qui étaient
  là peut-être s''en souviennent, n''allez pas sur le véhicule électrique, grosse
  erreur ». On a montré que l’on savait installer chez nous de la production de batteries
  électriques, de gigafactory. On va bientôt produire plus de batteries électriques
  qu''on ne produit de véhicules sur le sol français. Derrière, on remonte vers l''amont,
  vers le lithium, sur lequel on a encore des dépendances. On était ensemble avec
  le Premier ministre et les ministres, là aussi, pour montrer notre base. On est
  en train de structurer toute une filière : lithium, on va progressivement raffiner,
  batterie électrique, construction de véhicules électriques. Douai est la parfaite
  illustration de cette nouvelle stratégie. On produit par du transfert de technologie,
  en ayant réussi un pari, dans la relation aussi avec le continent asiatique, en
  transférant des emplois de la technologie, en formant chez nous, on produit les
  batteries qui sont, de l''autre côté de la cour, installées sur les R5 électriques
  produites sur le sol français. De la même manière que la R4 électrique, produite
  quelques kilomètres plus loin, elle, à Maubeuge, est aussi faite avec des composants
  français. Vous le voyez bien, c''est du concret, l''électrification et les véhicules
  électriques, les usines Renault qui produisent la R5 à Douai, la R4 à Maubeuge,
  notre capacité à avoir bâti toute une filière, y compris quand il s''agit de modèles
  de constructeurs étrangers qui sont prêts à investir chez nous et qui produisent
  chez nous. Je veux ici aussi remercier tous les constructeurs qui s''engagent et
  vous annoncer de nouveaux investissements en la matière, j''évoquais la R5 à Douai,
  la R4 à Maubeuge, Stellantis, à Mulhouse, va investir plus d''un milliard d''euros
  nouveaux, pour produire de nouvelles générations de véhicules électriques à partir
  de 2029. C’est un engagement de notre autre grand constructeur dans cette logique,
  produire de l''électrique en France et d''installer chez nous de nouveaux modèles.
  C''est un véritable avenir industriel que nous offrons à ce site de Mulhouse, le
  cœur de la stratégie concrète que nous portons sur une terre qui aime l''automobile,
  qui a cette histoire et qui y croit. Nous continuons d''avancer et je suis très
  heureux sur les sites que j''évoquais, de Douai, Maubeuge pour Renault et de Mulhouse
  pour Stellantis. Ceci nous permet d''aborder avec confiance la hausse de la production
  de véhicules électriques en France, 400 000 véhicules par an l''an prochain et une
  accélération forte dans les prochaines années sur la base des investissements que
  je viens d''évoquer et qui s''appuie sur tout l''amont que l’on a développé : la
  Vallée de la Batterie dans les Hauts-de-France que j''évoquais, nos mines de lithium
  dans l''Allier, etc. Tout cela, c''est une stratégie cohérente que nous allons consolider.
  Pour que cette stratégie soit pleinement soutenable, nous devons penser évidemment
  à l''électrification de tous les usages et ne jamais être à court d''électricité
  pour nos véhicules. Les opérateurs de bornes de recharge ont donc un rôle essentiel
  à jouer. C''est toute la stratégie qu''on a eue ces dernières années. Ils se sont
  engagés à déployer 240 000 bornes, dont 60 000 points de charge rapides et ultrarapides.
  Je veux ici saluer plusieurs acteurs présents dans la salle qui ont pris des engagements
  particuliers, Electra, qui investira 300 millions d''euros d''ici 2030, Engie également,
  et je veux saluer les grandes et moyennes surfaces, notamment le groupe Leclerc,
  qui s’est engagé au déploiement de 10 000 bornes à horizon 2030 et la grande distribution
  montre ici qu''elle a un rôle d''entraînement à avoir dans les territoires comme
  sur les prix. Je veux également remercier la Banque des Territoires qui a annoncé
  1,2 milliard d''euros d''investissement sur cette stratégie des bornes électriques.
  Ces bornes et ces annonces viendront compléter les plus de 185 000 bornes déjà en
  service pour atteindre notre objectif de 400 000 points de recharge ouverts au public
  en 2030. Je veux vraiment remercier tous les acteurs, dans la diversité que je viens
  d''évoquer, qui participent à cet effort collectif. Une critique forte est également
  celle du manque de transparence des prix pour la recharge, c''est pourquoi je salue
  dans ce contexte l''initiative lancée par la fédération Charge France de mettre
  à disposition un calculateur qui permettra de calculer les gains économiques du
  passage d''une voiture thermique à une voiture électrique. Je sais que toute cette
  émulation que je viens de rappeler nous permettra de tirer les prix vers le bas
  et vers la transparence. Je fais confiance à nos distributeurs qui savent le faire,
  mais c''est pour le bien du consommateur et pour la confiance que j''évoquais, pour
  accélérer ce passage à l''électrique. Au-delà de cette électrification de notre
  parc automobile, les transports au-delà de la route doivent continuer d''être électrifiés.
  L''utilisation de carburants fossiles, en effet, ce n''est pas simplement sur les
  trajets du quotidien, c''est aussi la production du pays, engins de chantier, engins
  agricoles, engins de voirie. Ce sont des pans entiers de l''économie qui peuvent
  s''affranchir des énergies fossiles. Nous avons le savoir-faire, je pense en particulier
  à Mecalac, qui va produire sur son site d''Annecy de nouvelles chargeuses électriques.
  Ce matin, les engins que vous avez pu voir dans la cour de l''Élysée, pelles mécaniques,
  appareils agricoles, tracteurs électriques, démontrent justement notre capacité
  d''innovation et notre savoir-faire industriel en la matière. Pour décarboner, il
  faut aussi décarboner nos moyens de chauffage, et donc je poursuis dans l''énumération
  des axes d''effort. Les pompes à chaleur sont à cet égard un pilier de notre stratégie.
  Là aussi, on entend et on a entendu beaucoup d''idées fausses, notamment que les
  pompes à chaleur ne fonctionneraient pas quand il fait froid. Alors d''abord, toutes
  les études démontrent le contraire. Ensuite, j''invite les sceptiques à aller en
  Norvège, qui n''est pas réputée pour la douceur de ses hivers et qui est l''un des
  pays dont le taux d''équipement de pompe à chaleur est l''un des plus élevés au
  monde. Donc, faites le voyage d''études, pour ceux qui n''y croient pas, ou invitez
  les sceptiques à s''y rendre. Contrairement à ce que j''ai pu entendre, il ne s''agit
  pas de mettre une pompe à chaleur dans tous les logements. Et là, il faut faire
  du pragmatisme. On peut également avoir des chauffages électriques performants,
  couplés à une bonne isolation. Dans certaines zones, le recours à un réseau de chaleur
  sera plus pertinent. Dans d''autres, ce sera la géothermie. Et on sait qu''il y
  a aussi des habitations qui continueront à avoir besoin du gaz. Et il ne faut stigmatiser
  personne. Il faut accompagner et convaincre. C''est beaucoup plus efficace. Il n''y
  a d''ailleurs pas de solution unique. Mais la pompe à chaleur doit devenir la solution
  de référence quand les autres options décarbonées ne sont pas disponibles. Le phénomène
  météorologique que nous vivons nous rappelle également que nous devons prendre en
  compte le confort d''été, ce que peuvent faire certains équipements réversibles
  produisant également du froid. Les pompes à chaleur sont un investissement important,
  et cela peut constituer un frein, je le sais, et c''est pourquoi je salue l''engagement
  de certains d''entre vous : Effy, Octopus, EDF, pour avoir répondu à notre appel
  et donné de la visibilité à vos clients pour leur assurer que le passage à l''électrique
  soit bien la forme la plus économique et leur permettre un lissage de l''investissement
  dans le temps. C''est aussi une filière qui repose sur un tissu français dense.
  La France dispose aujourd''hui de plus de 40 sites de production capables de produire
  plus de 400 000 pompes à chaleur par an, et la filière représente plus de 60 000
  emplois dans la production et dans l''installation. Cet écosystème riche et mobilisé
  d''installateurs est tout à fait clé dans le déploiement de ces équipements. Je
  salue, à ce titre, l''engagement pris par les industriels pour aller plus loin encore,
  viser le million de pompes à chaleur produites en France en 2030 et la création
  d''un centre d''expertise qui permettra de renforcer la transparence et la confiance
  dans cette solution. Là aussi, de la même manière, on veut stabiliser toute une
  filière, la déployer et créer des emplois. C''est une opportunité industrielle très
  forte pour être en mesure de produire des pompes à chaleur sur notre sol de façon
  compétitive. Octopus Energy annonce ainsi aujourd''hui même l''implantation d''une
  nouvelle usine sur notre sol, accroissant encore la réindustrialisation du pays
  par ses filières. Puis, je voudrais terminer par là. Quand on parle de décarbonation,
  d''électrification, on doit continuer à parler de réindustrialisation. Pour l''industrie,
  on ne compte plus les exemples d''investissements pour décarboner les procédés.
  France 2030, a construit le vaisseau amiral de cette stratégie. Nous avons ici même
  lancé il y a quelques années une stratégie de décarbonation de nos 50 plus gros
  sites émetteurs, et ceux-ci avancent. Du ciment à l''acier, en passant par tous
  les secteurs industriels qui sont les plus lourds, nous sommes en train de montrer
  que réindustrialisation et décarbonation sont totalement compatibles, en doublant
  cette stratégie d''une stratégie européenne cohérente qui consiste, avec le mécanisme
  d''ajustement carbone aux frontières, avec les bonnes protections, eh bien d''accompagner
  justement cette décarbonation. L''électrification a un potentiel gigantesque dans
  l''industrie, des milliers de sites qui produisent encore de la vapeur à partir
  d''énergies fossiles le montrent. Nous avons des solutions innovantes. Je pense
  par exemple à l''entreprise EPYR qui va inaugurer ce vendredi sa première unité
  de stockage thermique sur le site industriel de WEPA à Troyes, une installation
  mise en service en moins de 6 mois qui permet de fournir 25% des besoins en vapeur
  du site pour gagner en compétitivité par rapport au gaz. À plus long terme, nous
  savons aussi que les projets de petits réacteurs modulaires apporteront des solutions,
  et donc on a une stratégie complète, mais qui a commencé et qui, à marche forcée
  avec ce qu''on a fait sur les grands sites de nos ports, de nos grandes cimenteries,
  de nos aciéristes, a déjà produit des premiers résultats. Je pense aussi aux start-ups
  de l''industrie décarbonée qui innovent vers des procédés industriels 100 % électriques,
  comme GravitHy pour l''acier ou FertigHy pour les engrais. À ce titre, permettez-moi
  un mot sur nos engrais. Produire de façon décarbonée des engrais est essentiel pour
  notre souveraineté alimentaire. Nous devons produire en France les engrais dont
  nous avons besoin, à court terme en relançant les sites existants et en trouvant
  les bonnes solutions et en répondant aux demandes des industriels, et à moyen terme
  par des mesures d''implantation de nouveaux sites, et nous préparons des annonces
  très prochaines sur ce volet. Vous voyez bien, l''électrification est une démarche
  collective. Je pense aussi à des groupes comme le groupe Schneider qui mobilise
  l''ensemble de sa chaîne de valeur pour tenir ses objectifs de décarbonation, avec,
  par exemple, le transformateur exposé dans la cour, qui est un exemple de l''innovation
  française, qui fonctionne sans gaz fluoré et qui, là aussi, montre comment l''innovation
  de pointe permet d''obtenir ces résultats. Voilà. Je n''ai pas pu, malheureusement,
  citer toutes les entreprises qui sont présentes dans cette salle et qui sont déjà
  engagées directement ou indirectement dans ce grand objectif d''indépendance nationale
  qu''est l''électrification. Mais je tiens ici à toutes les saluer et à saluer tous
  les secteurs qui sont présents, du logement au transport, du véhicule électrique
  au secteur portuaire, de l''industrie lourde aux start-up. Il n''y a aucun secteur
  qui fait exception. L''électrification est un combat contemporain et une stratégie
  pour notre pays pour être plus indépendant, plus compétitif, créer davantage d''emplois
  sur le pays et décarboner. Nous sommes en train de montrer que c''est possible avec
  des vrais résultats, il faut poursuivre cet axe d''effort. C''est ce que je viens
  ici de détailler. L''État y jouera sa part. Le Premier ministre en a fait les annonces
  avec la Programmation pluriannuelle de l''énergie et, avec le Gouvernement, nous
  continuerons à accompagner les Français dans la période actuelle en ayant cette
  perspective. Au fond, par cette mobilisation d''aujourd''hui, je veux aussi qu''on
  ait tous un axe, une ligne d''horizon qui soit claire. Il y a évidemment le quotidien,
  et vous êtes pour beaucoup d''ailleurs aux côtés des Françaises et des Français,
  comme le Gouvernement, pour les aider à faire face à la crise énergétique qu''ils
  subissent, qu''ils soient particuliers, agriculteurs, pêcheurs, industriels, indépendants.
  Beaucoup de nos compatriotes souffrent très directement de l''augmentation des prix
  des hydrocarbures fossiles. Alors, nous les accompagnons par des aides indispensables.
  Mais le court terme ne doit pas nous faire oublier cet investissement qui est de
  moins en moins long terme parce que nous en avons rapproché en quelque sorte la
  réalité. L''électrification, c''est déjà une réalité. Il faut en accélérer le déploiement
  parce que c''est la manière la plus structurante et responsable de répondre aux
  conséquences de nos dépendances fossiles. À chaque fois qu''on arrive de manière
  efficace à aider des ménages ou des entreprises à électrifier, on réduit leur dépendance
  à des énergies que nous importons, on réduit leur dépendance à la volatilité des
  événements géopolitiques et on règle de manière beaucoup plus durable leur problème
  de pouvoir d''achat ou de compétitivité. Ce n''est pas un problème renvoyé à demain,
  une solution renvoyée à demain, pardon. C''est réel et aujourd''hui. Et donc l''accélération
  du Plan d''électrification français est véritablement la réponse collective la plus
  efficace et la plus responsable à la situation que nous connaissons. Donc, je veux
  vous remercier pour cet engagement collectif. Vous savez pouvoir compter sur le
  Gouvernement dans ses efforts et sur l''ensemble des opérateurs que j''ai pu évoquer
  dans ces propos. Merci à toutes et tous pour votre présence ce matin, votre mobilisation
  pour l''électrification de la France. Électrifions la France : pour une énergie
  moins chère, plus souveraine, plus durable.'
