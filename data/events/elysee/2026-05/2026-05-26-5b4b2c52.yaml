date: '2026-05-26'
type: press_release
source_name: elysee
title: Réunion de l'équipe de France de l'électrification.
text: 'Le Président de la République a accueilli l''équipe de France de l''électrification
  ce mardi 26 mai 2026 au Palais de l’Élysée pour accélérer la mobilisation nationale
  en faveur de l''électrification de la France. Dans la continuité du Plan d''électrification
  des usages présenté par le Premier ministre en avril 2026, le Président de la République
  a réuni l’ensemble des acteurs, industriels innovants, entreprises engagées et financeurs,
  autour d''un objectif commun : électrifier en profondeur les usages et tous les
  secteurs de l''économie française . Le chef de l’État a officialisé des engagements
  concrets pris par des acteurs économiques dans quatre domaines prioritaires : Plusieurs
  pactes de filières ont été signés, incarnant la mobilisation de l''ensemble de la
  chaîne économique au service de la première grande nation décarbonée d''Europe.
  Une électrification dont l’intérêt est redoublé au regard des contraintes économiques
  pesant sur les français. Cette réunion s''inscrit dans la continuité de l''engagement
  du chef de l’État, qui a fait de la souveraineté énergétique un axe central de son
  action . Depuis son discours fondateur de Belfort en février 2022, la France a engagé
  une transformation profonde de son système de production énergétique avec la relance
  du nucléaire avec le programme des six EPR2, l’accélération des énergies renouvelables
  et un déploiement massif des infrastructures de recharge. En 2026, plus de 95 %
  de l''électricité produite en France est issue de sources bas carbone , faisant
  de notre pays l''un des leaders mondiaux de l''électricité décarbonée. L’électrification
  représente par ailleurs un levier majeur pour les industriels, pour électrifier
  leurs productions et pour produire les composants essentiels pour cette électrification.
  Monsieur le Premier ministre, Mesdames, Messieurs les ministres, Mesdames, Messieurs
  les parlementaires, Mesdames, Messieurs les élus, Mesdames, Messieurs chefs d''entreprise,
  Industriels, Acteurs de l''électrification, Chers amis, Merci beaucoup pour votre
  présence aujourd''hui. Je sais que vous avez eu plusieurs travaux sous l''autorité
  des ministres ici présents, qui ont permis d''avancer aussi, d''échanger au sein
  de cette Équipe de France de l''électrification. L''actualité nous rappelle ô combien
  ce qui se joue est important pour le pays et combien nos vulnérabilités, en tout
  cas nos dépendances, en particulier à l''égard des énergies fossiles, peuvent nous
  fragiliser dans des dérèglements géopolitiques. Parler d''électrification pour le
  pays, c''est parler d''indépendance et de souveraineté, c''est parler de décarbonation
  et de compétitivité et de création d''emplois industriels. Ces trois objectifs sont
  ceux que nous devons poursuivre et qui sont tout à fait atteignables. Je veux voir
  dans la réunion d''aujourd''hui une réunion de confiance dans nos capacités à réussir
  et de mobilisation collective. Confiance parce qu''on a de vrais atouts. Je crois
  qu''on est structurés, on a les éléments, j''y reviendrai, d''indépendance énergétique.
  Beaucoup d''entre vous investissent et vont réinvestir. Nous sommes d''ores et déjà
  plus résilients qu''en 2022. Je regarde les difficultés qu''on avait au moment de
  la guerre d''agression russe en Ukraine et des difficultés à produire. On était
  en train d''importer, on est aujourd''hui déjà plus forts. Il faut simplement aujourd''hui
  continuer à nous mobiliser, innover et réindustrialiser encore plus vite et fort.
  Notre atout repose sur le modèle historique qui est le nôtre. C''est une chance
  que nos aînés aient fait les bons choix, aient investi dans la durée. Je pense que
  ces dernières années, on a conforté ces bons choix. La stratégie dite de Belfort
  demeure totalement valide, c''est-à-dire celle qui repose sur trois piliers, tels
  qu''annoncés en février 2022 : l''efficacité énergétique, la meilleure énergie,
  c''est celle qu''on ne dépense pas, qu''on ne consomme pas. Donc partout, on peut
  réduire notre consommation par de l''innovation, en isolant davantage, en améliorant
  nos systèmes, en étant plus efficaces, c''est bon. Ensuite, c''est évidemment de
  développer nos renouvelables de manière appropriée avec, là-dessus, les axes évoqués
  à Belfort et que nous déployons. Puis, c''est le nucléaire, en confortant justement
  notre programme avec de nouveaux réacteurs. L''objectif de cette stratégie est simple,
  c''est de consolider le modèle français, mais d''accélérer nos résultats, et à travers
  la Programmation pluriannuelle de l''énergie qui en a donné la trajectoire, passer
  de 60 % aujourd''hui de consommation fossile à 30 % à horizon 2035, ce qui est tout
  à fait faisable avec cette stratégie. Alors, on connaît les solutions. La biomasse,
  le gaz renouvelable, la chaleur fatale, on doit continuer à les exploiter. Évidemment,
  nous en avons des quantités limitées. Il y a la géothermie, que nous devons massivement
  développer, et la Programmation pluriannuelle de l''énergie prévoit de la multiplier
  par quatre d''ici 2030. L''hydrogène naturel, demain peut-être, dont les premiers
  retours nous donnent espoir, sans qu''il puisse encore tenir lieu de réponses immédiates,
  mais c''est un axe d''effort. Puis, il y a l''électricité que nous produisons sur
  notre sol, c''est ce que j''évoquais. Elle est à 95 % décarbonée, abordable, indépendante,
  et dont les axes d''effort qu''on va faire sur le renouvelable et le nucléaire sont
  les bons. D''ores et déjà, je le disais, on a amélioré les choses à cet égard. Parce
  que là où, en 2022, on importait de l''électricité, parce qu''on finissait notre
  grand carénage et nos investissements, là, nous sommes des exportateurs nets d''électricité
  décarbonée. On a exporté plus de 90 TWh l''année dernière et l''année d''avant,
  donc on a des bons résultats. Ce qui veut dire qu''à peu près 20 % de notre production
  est exportée aujourd''hui. Ça, c''est une force. Ce qui fait qu''en effet, la France
  peut s''enorgueillir d''être une grande puissance électrique, ce qui est un atout
  dans le contexte géopolitique qu''on évoque. Nous avons construit la stratégie qui
  permet de conforter cette position. C''est ce qui fait aussi que les hausses sur
  les prix de l''électricité ont été limitées en France, quand elles ont été beaucoup
  plus sensibles ailleurs. Je vais ici rappeler les chiffres, parce que c''est une
  force de notre pays, ce qui aussi a permis d''expliquer certaines différences qui
  sont parfois pointées par certains. Le prix de gros pour l''année prochaine est
  de 55 euros par MWh en France, il atteint 93 euros en Allemagne, 107 euros par MWh
  en Italie. C''est clé. Il faut maintenant donner cette visibilité du prix de l''électricité,
  de la stabilité pour avoir la confiance des ménages et des entreprises et permettre
  d''accélérer notre stratégie. On a cet avantage aujourd''hui compétitif. Comment
  on le transforme ? En continuant les investissements dans la durée. Il faut pour
  ça, produire, raccorder, électrifier, réindustrialiser. C''est ça, nos axes d''effort
  pour l''Équipe de France de l''électrique. D''abord, produire, c''est un peu la
  déclinaison de cette stratégie de Belfort, mais c''est un axe d''effort important.
  Nous devons continuer à faire avancer le programme du nouveau nucléaire que nous
  avons lancé, six EPR, et une extension à venir pour huit réacteurs supplémentaires.
  Nous devons faire avancer les appels d''offres sur l''éolien en mer qu''a annoncés
  le Gouvernement et qui seront publiés dans les prochaines semaines. En restant à
  des prix abordables, c''est très important, et je le dis aussi très clairement.
  Moi, je ne soutiendrai pas des projets d''éoliens en mer, quels qu''ils soient,
  à des prix qui défient toute concurrence. Il ne faut pas refaire les erreurs du
  passé, parce qu’on voit bien les difficultés qu''on a parfois eues d''avoir des
  projets qui étaient hors de la maille, où on continue à payer parfois 15 ans plus
  tard des prix qui sont totalement déconnectés du marché, donc, les autres énergies
  renouvelables aussi à développer de manière équilibrée. Tout ça parce que c''est
  une affaire de long terme, 2050, 2060, 2100. C''est aussi l''axe qui est le nôtre
  pour les générations à venir. C''est le sens aussi des travaux que mène RTE sur
  les évolutions de long terme de notre mix électrique et dont les conclusions seront
  rendues pour la fin d''année. Elles permettront d''éclairer notre décision sur l''extension
  du programme dit EPR2 à de nouveaux réacteurs, et à continuer le travail. C''est
  aussi ce qui nous permettra de dessiner les prochains conseils de politique nucléaire.
  Là aussi, quand je parle de 2050, 2060, 2100, c''est exactement l''horizon de temps
  qui a conduit à décider tout ce qu''on a pu faire lors du dernier Conseil de politique
  nucléaire sur la fermeture du cycle et les éléments d''une plus grande autonomie.
  Produire de l''électricité, donc premier axe. Le deuxième axe d''effort, c''est
  d''accélérer le raccordement. Si je puis dire, pour que ça marche, il faut pouvoir
  se brancher et se brancher le plus rapidement possible. Ça fonctionne déjà, on a
  des progrès qui sont perceptibles. Nous savons raccorder rapidement pour proposer
  des solutions pour les centres de données ou pour certains industriels. La France
  attire en particulier des grands centres de données et Choose France va encore le
  montrer dans les prochains jours. Il y a eu des annonces encore en Hauts-de-France
  ces derniers jours qui ont montré cette force. Il est très clair que quand on parle
  d''intelligence artificielle, de capacité de calcul, l''avantage comparatif de la
  France, c''est d''avoir cette électricité décarbonée, disponible et une capacité
  à raccorder dans les temps et de manière compétitive. Sur le raccordement, RTE aura
  lancé d''ici la fin de l''année la réalisation de cinq grands projets dits « fast-track
  ». Cette procédure consacre la place justement de notre pays comme premier pays
  européen pour l''accueil des grands centres de données, en s''appuyant sur la résilience
  du réseau, l''abondance de cette électricité bas-carbone et l''efficacité des équipes
  de RTE. Mais notre objectif doit être clair. Nous devons élever nos exigences, revoir
  notre cadre s''il le faut, parce que ce qui est aujourd''hui l''exception, ces quelques
  projets dits fast-track, en termes de délai, doit devenir la norme pour le raccordement.
  C''est attendu de beaucoup de projets industriels, dont certains sont dans cette
  salle, de beaucoup de projets agricoles et autres. Je salue à cet égard les engagements
  de RTE pour accélérer les délais de raccordement très concrètement. Ce sont des
  investissements pour les grandes zones industrielles au portuaire : Dunkerque, Le
  Havre, Fos. Les grands ports français seront aussi compétitifs pour l''accueil de
  nouvelles industries, et ce sont des accélérations dont ils ont besoin. Accélération
  aussi dans les zones industrielles de taille intermédiaire, en Île-de-France, Sud-Alsace,
  Saint-Avold, Valenciennes-Maubeuge, Port-la-Nouvelle, là aussi où c''est attendu.
  C''est une nouvelle logique avec une application pionnière des principes du premier
  prêt, premier servi. Ce n''est pas lors de la pile du dossier de dépôt qu''il faut
  prendre, c''est quand les projets ont avancé sur le reste, il faut pouvoir raccorder
  et s''adapter, et donc être en une logique beaucoup plus adaptable pour suivre le
  rythme ou de nos besoins ou de l''industrie. Il faut pour ça mobiliser plus. Je
  salue donc les équipes de RTE, je salue aussi Enedis, qui s''engage à raccorder
  ses projets d''électrification 30 % plus rapidement que précédemment. C’est un premier
  effort, mais il faut continuer et poursuivre cette réduction des délais. Je sais
  aussi que la Commission de régulation de l''énergie poursuit le même objectif en
  donnant un cadre réglementaire qui permettra d''aller encore au-delà, et c''est
  un effort important. Enfin, il nous faudra construire dans cet axe d''effort du
  raccordement de nouvelles lignes électriques, et ça ne se fera qu''en bonne coopération
  et concertation avec les territoires. C''est le cas notamment de la ligne qui doit
  alimenter la zone industrielle de Fos. Ce n’est pas simplement pour le port, mais
  c''est vraiment une électrification de tout le Sud et de cet axe méditerranéen.
  Cette ligne est nécessaire et nous devons donner un signal clair pour fournir la
  visibilité aux industriels qu''ils veulent investir et tout mettre en œuvre pour
  que cette ligne soit en service d''ici 2029, pour faire face aux augmentations de
  consommation, permettre l''électrification des industries présentes et à venir.
  Ensuite, il y a une mobilisation à avoir après la production, le raccordement, une
  mobilisation collective sur les usages. On en a beaucoup parlé, vous en avez reparlé
  ce matin. Il y a en effet à électrifier nos usages, c''est l''axe d''effort sur
  lequel nous portons ces dernières années, et c''est un axe d''effort essentiel,
  c''est le cœur du plan d''électrification, qui est, je le rappelle, avant tout aussi
  un grand plan industriel. C''est un grand plan de transformation qui embarque 6
  000 entreprises et va créer ou pérenniser plus de 600 000 emplois. C''est vous qui
  portez les solutions, ce sont les Français qui choisiront et donc, je crois à cet
  égard qu''il faut leur faire confiance, mettre en capacité d''avoir cette mobilisation
  collective sur les usages et rendre le passage à l''électrique en quelque sorte
  naturel et désirable, parce que c''est bon pour le pouvoir d''achat, c''est bon
  pour la compétitivité, c''est bon pour l''indépendance du pays. Pour ça, il faut
  donner confiance par la visibilité sur les prix, avant tout. C''est indispensable,
  parce qu''il y a eu beaucoup de messages et contre-messages dans les années qui
  ont précédé. Je remercie l''ensemble des acteurs compétents d''avoir œuvré pour
  améliorer les choses dans les derniers mois, au premier rang desquels l''EDF. L''État
  a donné une direction sur la production pour avoir une électricité compétitive et
  donc, nous devons continuer d''avancer. C''est maintenant aux fournisseurs de traduire
  cela pour les consommateurs en donnant des prix, eux aussi, compétitifs sur la durée
  et des prix prévisibles. Je salue les engagements qui ont été pris pour fournir
  de nouvelles offres à prix fixe aux particuliers, leur faire bénéficier des heures
  les plus compétitives pour la recharge de leurs véhicules ou pour profiter de l''abondance
  de l''énergie solaire, ce que fait EDF, ce que fait Total, Engie, Octopus. Je ne
  peux qu''encourager les autres à le faire, étant convaincu qu''aussi, on a une carte
  à jouer plus largement, la grande distribution a aussi à s''engager avec nous sur
  ce sujet. De même qu''investir dans le nucléaire et le renouvelable nous a rendus
  résilients aujourd''hui, et davantage que d''autres, investir dans le véhicule électrique,
  le chauffage électrique, la pompe à chaleur, nous rendra plus résilients pour demain.
  Cela vaut aussi pour des usages parfois insoupçonnés, comme pour la production d''engrais.
  J''y reviendrai. Cette visibilité sur le temps long vaut tout autant pour les industriels
  dont les investissements engagent une, deux, parfois trois décennies. Je salue aussi
  les progrès faits par EDF pour proposer des contrats de long terme, parfois à 8,
  10, voire 15 ans, adossés au parc historique pour faire profiter les entreprises
  de cet avantage compétitif. Au total, ce sont plus de 50 térawattheures qui sont
  mobilisés au profit de l''industrie. Ça a été le fruit d''un travail de notre part
  à l''égard des autorités européennes, pour sécuriser le cadre juridique, puis un
  engagement de l''opérateur historique pour le fournir à l''industrie. Mais maintenant,
  on a de la stabilité, de la visibilité et, je crois pouvoir le dire, de la compétitivité.
  Au-delà de cette confiance et de la visibilité sur les prix, dans ces axes d''efforts,
  il y a évidemment tout le travail autour du véhicule électrique. La mobilité électrique
  est là, c''est déjà une réalité, les chiffres sont en croissance constante. Nous
  allons lancer la troisième édition du leasing électrique. Stellantis et Renault
  ont prévu de mettre en place des services de pré-réservation accessibles dans les
  prochains jours. C’est une mobilisation collective, là aussi, qui est attendue pour
  continuer ce développement. C''est tout l''effort qu''on a mené ces dernières années
  pour avoir les bons dispositifs d''accompagnement, de l''offre et de la demande,
  pour avoir une politique européenne aussi cohérente, qui vienne accompagner l''offre
  européenne, et en particulier française, et moins, si je puis dire pour rester pudique,
  l''offre non européenne. Au-delà des particuliers, la mobilité intéresse également
  les professionnels. Les aides mises en place par le Gouvernement pour l''acquisition
  de véhicules utilitaires légers doivent permettre de démultiplier le recours à l''électrique.
  Le réseau Mobilians, de son côté, mettra 10 000 véhicules électriques à disposition
  dans ses agences de location. Ça fait partie aussi des efforts très concrets et
  sur lesquels nous voulons continuer d''avancer. Au-delà, la mobilité électrique
  lourde, que l’on pensait impossible il y a quelques années, devient une réalité.
  Grâce à notre savoir-faire, nous produisons en France, chez Renault Trucks, des
  poids lourds électriques. Geodis s''engage à électrifier sa flotte de fret. C''est
  donc une chaîne complète, sur la mobilité lourde que l’on est en train de structurer.
  L''exemple que je viens de donner le montre. Un constructeur français, un grand
  opérateur logistique français et des kilomètres se faisant décarboner. Là-dessus,
  je veux être aussi très clair, pour tordre le cou parfois à des idées qu''on entend.
  Quand on parle de véhicules électriques, ne nous trompons pas, on n''est pas en
  train d''accompagner une désindustrialisation. D''abord, je le rappelle, depuis
  sept ans, on réindustrialise le pays, mettant fin à douze ans de désindustrialisation.
  Le véhicule électrique est un levier de notre réindustrialisation. La part d''industrie
  française, le nombre d''emplois créés en France est supérieur sur le véhicule électrique
  que sur le thermique. Parce que l’on a toute une stratégie intégrée, parce que l’on
  a relocalisé des gigafactories de batteries dans notre pays, on en a créé l''installation.
  Dans cette même salle, il y a bientôt dix ans, être un vétéran me permet d''avoir
  ces remarques, l''industrie elle-même me disait : « malheureux, n''allez pas trop
  vite sur le véhicule électrique. Non, ne faites pas ça, Président. On ne sait pas
  produire de batteries électriques en Europe. On n''en fait pas. On dépend totalement
  des Chinois et des Coréens du Sud. Donc surtout, n''allez pas, ceux qui étaient
  là peut-être s''en souviennent, n''allez pas sur le véhicule électrique, grosse
  erreur ». On a montré que l’on savait installer chez nous de la production de batteries
  électriques, de gigafactory. On va bientôt produire plus de batteries électriques
  qu''on ne produit de véhicules sur le sol français. Derrière, on remonte vers l''amont,
  vers le lithium, sur lequel on a encore des dépendances. On était ensemble avec
  le Premier ministre et les ministres, là aussi, pour montrer notre base. On est
  en train de structurer toute une filière : lithium, on va progressivement raffiner,
  batterie électrique, construction de véhicules électriques. Douai est la parfaite
  illustration de cette nouvelle stratégie. On produit par du transfert de technologie,
  en ayant réussi un pari, dans la relation aussi avec le continent asiatique, en
  transférant des emplois de la technologie, en formant chez nous, on produit les
  batteries qui sont, de l''autre côté de la cour, installées sur les R5 électriques
  produites sur le sol français. De la même manière que la R4 électrique, produite
  quelques kilomètres plus loin, elle, à Maubeuge, est aussi faite avec des composants
  français. Vous le voyez bien, c''est du concret, l''électrification et les véhicules
  électriques, les usines Renault qui produisent la R5 à Douai, la R4 à Maubeuge,
  notre capacité à avoir bâti toute une filière, y compris quand il s''agit de modèles
  de constructeurs étrangers qui sont prêts à investir chez nous et qui produisent
  chez nous. Je veux ici aussi remercier tous les constructeurs qui s''engagent et
  vous annoncer de nouveaux investissements en la matière, j''évoquais la R5 à Douai,
  la R4 à Maubeuge, Stellantis, à Mulhouse, va investir plus d''un milliard d''euros
  nouveaux, pour produire de nouvelles générations de véhicules électriques à partir
  de 2029. C’est un engagement de notre autre grand constructeur dans cette logique,
  produire de l''électrique en France et d''installer chez nous de nouveaux modèles.
  C''est un véritable avenir industriel que nous offrons à ce site de Mulhouse, le
  cœur de la stratégie concrète que nous portons sur une terre qui aime l''automobile,
  qui a cette histoire et qui y croit. Nous continuons d''avancer et je suis très
  heureux sur les sites que j''évoquais, de Douai, Maubeuge pour Renault et de Mulhouse
  pour Stellantis. Ceci nous permet d''aborder avec confiance la hausse de la production
  de véhicules électriques en France, 400 000 véhicules par an l''an prochain et une
  accélération forte dans les prochaines années sur la base des investissements que
  je viens d''évoquer et qui s''appuie sur tout l''amont que l’on a développé : la
  Vallée de la Batterie dans les Hauts-de-France que j''évoquais, nos mines de lithium
  dans l''Allier, etc. Tout cela, c''est une stratégie cohérente que nous allons consolider.
  Pour que cette stratégie soit pleinement soutenable, nous devons penser évidemment
  à l''électrification de tous les usages et ne jamais être à court d''électricité
  pour nos véhicules. Les opérateurs de bornes de recharge ont donc un rôle essentiel
  à jouer. C''est toute la stratégie qu''on a eue ces dernières années. Ils se sont
  engagés à déployer 240 000 bornes, dont 60 000 points de charge rapides et ultrarapides.
  Je veux ici saluer plusieurs acteurs présents dans la salle qui ont pris des engagements
  particuliers, Electra, qui investira 300 millions d''euros d''ici 2030, Engie également,
  et je veux saluer les grandes et moyennes surfaces, notamment le groupe Leclerc,
  qui s’est engagé au déploiement de 10 000 bornes à horizon 2030 et la grande distribution
  montre ici qu''elle a un rôle d''entraînement à avoir dans les territoires comme
  sur les prix. Je veux également remercier la Banque des Territoires qui a annoncé
  1,2 milliard d''euros d''investissement sur cette stratégie des bornes électriques.
  Ces bornes et ces annonces viendront compléter les plus de 185 000 bornes déjà en
  service pour atteindre notre objectif de 400 000 points de recharge ouverts au public
  en 2030. Je veux vraiment remercier tous les acteurs, dans la diversité que je viens
  d''évoquer, qui participent à cet effort collectif. Une critique forte est également
  celle du manque de transparence des prix pour la recharge, c''est pourquoi je salue
  dans ce contexte l''initiative lancée par la fédération Charge France de mettre
  à disposition un calculateur qui permettra de calculer les gains économiques du
  passage d''une voiture thermique à une voiture électrique. Je sais que toute cette
  émulation que je viens de rappeler nous permettra de tirer les prix vers le bas
  et vers la transparence. Je fais confiance à nos distributeurs qui savent le faire,
  mais c''est pour le bien du consommateur et pour la confiance que j''évoquais, pour
  accélérer ce passage à l''électrique. Au-delà de cette électrification de notre
  parc automobile, les transports au-delà de la route doivent continuer d''être électrifiés.
  L''utilisation de carburants fossiles, en effet, ce n''est pas simplement sur les
  trajets du quotidien, c''est aussi la production du pays, engins de chantier, engins
  agricoles, engins de voirie. Ce sont des pans entiers de l''économie qui peuvent
  s''affranchir des énergies fossiles. Nous avons le savoir-faire, je pense en particulier
  à Mecalac, qui va produire sur son site d''Annecy de nouvelles chargeuses électriques.
  Ce matin, les engins que vous avez pu voir dans la cour de l''Élysée, pelles mécaniques,
