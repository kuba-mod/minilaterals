title: Proposition de nomination de Pascal Chevremont en qualité de président de l’Autorité
  nationale des jeux.
text: Le Président de la République envisage, sur proposition du Premier ministre,
  de nommer Pascal Chevremont en qualité de président de l’Autorité nationale des
  jeux. La Présidente de l’Assemblée nationale et le Président du Sénat sont saisis
  de ce projet de nomination, afin que la commission intéressée de chacune des assemblées
  se prononce, le moment venu, dans les conditions prévues par le cinquième alinéa
  de l’article 13 de la Constitution.
