date: '2026-05-21'
type: press_release
source_name: elysee
title: Cérémonie du 25e anniversaire de la loi Taubira.
text: 'Ce jeudi 21 mai 2026 au Palais de l''Élysée, le chef de l''État a présidé la
  cérémonie du 25e anniversaire de la loi tendant à la reconnaissance de la traite
  et de l''esclavage en tant que crime contre l''humanité, dite « loi Taubira ». Le
  21 mai 2001 , cette loi, adoptée à l’unanimité par le Parlement, a fait de la France
  le premier pays au monde à reconnaître officiellement la traite négrière et l’esclavage
  colonial comme des crimes contre l’humanité . Madame la présidente de l''Assemblée
  nationale, Mesdames, Messieurs les ministres, Monsieur le Premier ministre, Monsieur
  le directeur général de l''UNESCO, Mesdames, Messieurs les ambassadeurs, Madame
  la défenseure des droits, Mesdames, Messieurs les parlementaires, Mesdames, Messieurs
  les présidents de départements, maires, élus, Mesdames et Messieurs les directrices
  et directeurs, Mesdames et Messieurs en vos grades et qualités, chers amis. La loi
  du 21 mai 2001 reconnaissait et qualifiait la traite négrière et l''esclavage, dans
  sa vérité, un crime contre l''humanité. Et l''histoire retiendra que cette loi fut
  portée avec force et dignité par Christiane Taubira. Cette force et cette dignité,
  nous les avons retrouvées, pour ceux qui étaient nostalgiques. Nous en avons retrouvé
  les accents, le chant sourd, les résonances de Césaire à Maryse Condé, et cette
  voix aussi singulière, française, qui, de l''Océanie en passant par l''Amazonie
  jusqu''à nos Caraïbes, chante notre langue différemment. Vous l''avez redit, Madame
  la ministre, chère Christiane, avec beaucoup de force, cette loi venait de loin
  et elle était nécessaire. Elle était nécessaire et la présence que je retrouve aujourd''hui
  montre combien elle dit quelque chose de ce que nous sommes, de ce qu''est la France,
  de ce que sont évidemment nos territoires ultramarins et la possibilité de continuer
  cette histoire, mais aussi de notre relation avec le continent africain, avec le
  continent américain, avec l''Océanie et le Pacifique. Alors, il y eut bien des débats,
  et ils existent toujours, pour s''interroger sur la pertinence de lois dites mémorielles,
  faut-il légiférer sur l''histoire ou pas, jusqu''où aller. Mais au fond, cette loi
  nommait et reconnaissait, et elle était l''aboutissement, en effet, de siècles de
  souffrance, de siècles durant lesquels cette mémoire singulière et douloureuse avait
  été transmise, partagée, de génération en génération au sein de familles antillaises,
  réunionnaises, guyanaises, mahoraises, africaines et tant d''autres. Parfois, on
  voulait la faire taire. Parfois, elle ne faisait que se murmurer. Mais elle était
  passée de main en main, de mère en fille, de famille en famille. Elle fut parfois
  écrite. Elle était là. Oui, il a fallu convaincre chacun que ce combat était celui
  de la République, encore et toujours, que l''oubli ne devait pas ensevelir les victimes
  et que la République avait, certes, aboli deux fois l''esclavage, en 1794 puis en
  1848, mais elle ne l''avait pas encore qualifié. Ainsi a fini par s''imposer le
  jugement de l''histoire que la loi a reconnu comme tel. C''est pourquoi cette loi
  était nécessaire. 25 ans plus tard, où en sommes-nous ? Vous l''avez rappelé, vous
  venez de le dire, le président Ayrault, cher Jean-Marc, l''a dit aussi, la loi du
  21 mai 2001 a permis l''essor d''une recherche historique rigoureuse. Elle a inscrit
  le 10 mai comme journée nationale de commémoration. Elle a donné une reconnaissance
  légale à une douleur que certains voulaient et veulent encore minimiser, ignorer,
  refouler. Elle a permis la fondation, ô combien importante, et nous l''avons pérennisée,
  consolidée, installée là où elle devait être, comme une évidence aujourd''hui. Alors
  que reste-t-il à faire ? Puisque vous avez rappelé, au fond, toute cette légende
  des siècles sur laquelle s''adossait et dans laquelle s''enracinait ce texte, que
  reste-t-il à faire ? Beaucoup en vérité. D''abord, et cela vient d''être évoqué,
  le Code noir. En effet, il subsiste encore un texte qui n''aurait jamais dû survivre
  à l''abolition de l''esclavage, encore moins traverser les siècles jusqu''à nous,
  un texte qui n''a jamais fait l''objet d''une abrogation formelle par la République,
  au point que cet oubli est comme devenu une faute. Je veux ici citer évidemment
  ce qu''on appelle le Code noir promulgué en mars 1685 sous l''égide de Louis XIV,
  rédigé sous l''autorité de Colbert. 60 articles. 60 articles destinés à organiser
  la mise en esclavage d''êtres humains dans les colonies françaises. 60 articles
  pour réduire les Africains à l''état de biens meubles, prescrire les châtiments
  corporels les plus abominables, organiser la séparation des familles, nier enfin
  à des centaines de milliers d''hommes, de femmes, d''enfants, leur humanité fondamentale.
  Certes, depuis l''abolition de l''esclavage du 27 avril 1848, ce terrible code ne
  produit plus d''effets juridiques. Mais précisément, le droit n''est pas seulement
  une mécanique d''effets. Le silence, voire l''indifférence que nous maintenons depuis
  près de deux siècles à l''égard de ce Code noir n''est pas un oubli, mais est devenu
  une forme d''offense, un défi à ceux qui nous fondent depuis 1789. C''est pourquoi
  je demande au Gouvernement de faire sienne la proposition de loi visant à abroger
  le Code noir qui doit être débattue le 28 mai prochain à l''Assemblée nationale.
  Je veux ici saluer le travail de nombreux historiens qui ont soulevé ce débat, l''ont
  porté jusque dans la sphère politique, saluer le député Max Mathiasin et des parlementaires
  à ses côtés qui ont ouvert ce chantier nécessaire en déposant cette proposition
  de loi, conformément aux vœux et à l''engagement qu''avait pris François Bayrou
  alors premier ministre. Oui, la France va enfin abroger le Code noir, non pas pour
  l''effacer de notre histoire. Les archives demeureront, les historiens continueront
  leur travail, les musées continueront de l''exposer, mais pour affirmer clairement
  que son maintien est une trahison de ce qu''est la République. Et parce que la République
  française doit enfin se donner les moyens de dire, dans sa propre langue juridique,
  avec la même solennité qu''elle a su déployer pour d''autres textes de mémoire,
  oui, ce texte est contraire à notre Constitution, contraire au Droit de l''homme
  et du citoyen, contraire à l''égale dignité de tous les êtres humains que nous professons
  comme une valeur fondatrice. Oui, en nous reconfrontant à ce que la France a pu
  faire, avec lucidité, nous aurons à dire non. Car il est une part du peuple français
  pour qui le 10 mai, le 23 mai ne sont pas des dates abstraites, pour qui les noms
  de Toussaint Louverture, Louis Delgrès, Solitude, Joseph Ignace ou tant d''autres
  sont des noms de famille au sens le plus profond. Pour qui l''histoire de l''esclavage
  n''est pas un passé révolu, mais une origine à laquelle on revient sans cesse, une
  blessure que l''on transmet sans le vouloir, une mémoire que l''on ne sait parfois
  pas comment tenir sans qu''elle vous consume. Alors, abroger le Code noir, c''est
  dire à cette part essentielle de notre peuple que son histoire, sa mémoire est aussi
  celle de la nation elle-même tout entière. Il y a devant nous ce défi, cette autre
  grande question, qui est sous-jacente à ce qu''a convoqué à l''instant la ministre
  Christiane Taubira, qui est celle de la réparation. Grosse affaire, dirait-on à
  Haïti. Immense question que, d''ailleurs, nous avons su affronter à plusieurs reprises
  sur des questions de mémoire très contemporaines, comme avec les Harkis. La question,
  c''est comment réparer un tel crime, comment réparer quand des générations après,
  les choses sont là ? Est-ce une promesse tenable ? En tout cas, c''est une question
  qu''il ne faut pas refuser. Mais c''est une question sur laquelle il ne faut pas
  non plus faire de fausses promesses. Je vais essayer de vous dire, et sans doute,
  cette réflexion et ces décisions sont encore inachevées, car nous cheminons tous
  ensemble. Mais c''est tout ce que, depuis 25 ans et ces dernières années, nous avons
  essayé de faire collectivement avec notre propre histoire, avec l''histoire qui
  nous lie avec le continent africain, avec nos Caraïbes, l’Océanie, l''Amérique.
  On ne peut pas réparer au sens, je parle sous le contrôle d''un éminent académicien,
  au sens où, étymologiquement, on pourrait le dire, c''est-à-dire rétablir un état
  premier et effacer les traces. C''est impossible et ce n''est pas souhaitable. Mais
  réparer, c''est d''abord restaurer la juste place. Et donc, c''est d''abord l''éducation.
  C''est par là que vous avez commencé. Vous l''avez rappelé, c''est le cœur, d''ailleurs,
  de la mission de l''Éducation nationale, évidemment, de ce que fait la Fondation,
  de ce qui a été fait depuis 25 ans de manière encore plus ardente. Et c''est pour
  ça que j''ai une gratitude très profonde pour nos enseignants qui sont ici présents,
  et les directrices, directeurs, rectrices et recteurs. Le concours de La Flamme
  de l''égalité à l''école est évidemment clé, mais tous les concours, tous les enseignements,
  le changement des programmes et tout ce qui nous reste à faire est essentiel, qui
  consiste à remettre la pleine place de cette histoire dans l''histoire de la République
  et de la France. La première des réparations consiste à restaurer la vérité dans
  notre histoire, à lui donner toute sa place, à redonner des noms aux héros, à leur
  redonner un sens, à leur faire réhabiter les lieux, comme nous l''avons fait d''ailleurs
  en 2023 avec Toussaint Louverture au Fort de Joux, et à mesurer d''ailleurs la cruauté
  au carré lorsqu''il a fallu mettre ce héros, ce soldat, celui qui au fond était
  plus républicain que les Français eux-mêmes, dans le fort le plus reculé de toutes
  les côtes afin d''être totalement sûr qu''il ne puisse jamais s''en échapper et
  mourir dans le froid et si loin de sa terre natale. L''éducation, donc, pilier essentiel
  pour commencer à réparer. La recherche, ensuite. Vous l''avez dit, la Fondation,
  là aussi, pour la mémoire de l''esclavage, joue un rôle essentiel. Là aussi, une
  question nationale, l''Enseignement supérieur va continuer ce travail, mais c''est
  poursuivre les fonds dévolus aux études sur l''histoire coloniale, sur l''histoire
  de l''esclavage, de la traite, afin de les mettre à la hauteur de notre ambition
  mémorielle et afin surtout que ce travail de vérité, d''histoire, ces dialogues,
  continuent de se faire. Je veux ici dire combien ces dernières années, nous avons
  placé, au-delà de la question de la traite, de l''esclavage, la question de la recherche
  scientifique comme étant au cœur de toute forme de réparation sur notre propre histoire
  coloniale avec l''Algérie. Je souhaite que nous puissions reprendre le travail de
  cette commission mixte, mais aussi pour une histoire plus contemporaine, comme nous
  l''avons fait avec le Cameroun, avec le Rwanda, dans des gestes, je crois, mémoriaux
  qui sont essentiels, et par un travail scientifique où ces commissions mixtes ont
  pu avancer, faire révéler la vérité, et du coup pouvoir donner tout son sens à notre
  histoire, et là, oui, la réparer. C''est-à-dire y ajouter des pans qui avaient disparu,
  remettre des faits, des axes, des actes, redonner une place à des traces qui avaient
  été effacées, à des récits qui avaient été travestis. La recherche essentielle.
  Ensuite, c''est de continuer à donner des lieux, de les nommer. La Fondation en
  a un ô combien important, et c''est aussi pour ça que nous avons voulu le mémorial
  des victimes de l''esclavage, et je me réjouis de pouvoir l''inaugurer à Paris au
  début de l''année prochaine avec vous, là où fut adoptée la Déclaration universelle
  des droits de l''homme au Trocadéro. Je tiens à remercier toutes les associations,
  le ministère des Outre-mer, je sais l''engagement aussi qu''a eu votre prédécesseur,
  Manuel Valls, Madame la ministre, pour finaliser ce projet, l''ensemble des ministères,
  des associations qui sont là et qui ont su trouver l''accord, et les artistes évidemment.
  Et ce mémorial aura une place essentielle dans notre capitale et viendra en quelque
  sorte comme prolonger ou dialoguer avec le Mémorial ACTe de Pointe-à-Pitre, des
  lieux aussi. Et puis, pour continuer de réparer, il faut restituer, c''est-à-dire
  redonner à l''histoire de nos partenaires, et je le dis ici devant les ambassadrices
  et les ambassadeurs qui sont là, car cette mémoire, la violence qui va avec, l''esclavage,
  la traite, qui a été aussi avec la colonisation, s''est accompagnée de rapts. Et
  donc la restitution que nous avons décidée des œuvres, elle contribue à ce geste
  de réparation, c''est-à-dire dans un cadre qui a été dûment défini, de la même manière,
  par les chercheurs, par les plus grands spécialistes qui ensuite a acheminé, qui
  a donné lieu à ce texte de loi voté à l''unanimité il y a quelques jours, promulgué
  il y a quelques jours à peine, de pouvoir restituer des œuvres qui avaient été volées
  dans ce même geste de violence. La restitution des œuvres, des biens culturels,
  qui sont aussi souvent des biens culturels et religieux, participe de ce chemin
  de réparation. Indissociable de cela, il y a — et c''est au fond ce que votre texte
  de loi, il y a 25 ans — a fait, la reconnaissance. Reconnaître, c''est nommer, c''est
  mettre des mots, c''est inscrire pleinement dans notre histoire, mais ce n''est
  pas un geste léger. Et ce parcours de la reconnaissance, nous ne l''avons pas terminé.
  C''est de continuer comme vous l''avez fait, comme par prétérition, à divulguer
  et a expliquer quelle est notre histoire, l''histoire de nos lieux. Celui-ci, en
  effet, construit avec l''argent de la traite, de l''exploitation du sucre, parce
  que le financier Crozat a voulu le rendre heureux, comte d’Évreux, que sa fille
  puisse contracter un bon mariage. Ce lieu a été financé par là, comme beaucoup de
  lieux de la République. Faut-il pour autant les abattre, les effacer ? Faut-il démolir
  les statues ? Non, je l''ai déjà dit. Ce n''est pas ça, le sens de l''histoire.
  Ce n''est pas ça, réparer. Ce serait encore casser davantage. Mais il faut le reconnaître,
  le nommer, le partager et lui donner sa juste place dans notre histoire. Parce que
  c''est ce qui nous permet de continuer d''avancer tel que nous sommes et dans nos
  Outre-mer, et avec aussi le continent africain et tous nos partenaires. Si nous
  ne reconnaissons pas, aucune chance qu''on puisse bâtir l''avenir. Nous sommes comme
  l''ange de clé qui est pris entre le vent qui l''amène vers l''avenir et un regard
  qui est constamment rivé vers le passé parce qu''il n''a pas digéré ce passé, parce
  qu''il n''a pas reconnu lui-même. Ce travail de reconnaissance, ce parcours, c''est
  celui que nous devons poursuivre. Il se fait par un va-et-vient constant entre la
  science, ce travail qu''il faut poursuivre avec les historiens et la geste politique.
  Et il n''est pas terminé. Et je veux ici, dans ce travail, ce parcours de reconnaissance,
  évoquer deux travaux qui me tiennent à cœur et qui sont importants pour nous, en
  tant que Français, et pour notre relation avec les Caraïbes et l''Afrique. C''est
  d''abord le travail qu''on a enclenché avec Haïti, il y a un an. Il est très important,
  il relève de cette éthique de la responsabilité. Nous avons reconnu que Charles
  X avait, en 1825, infligé à la jeune République d''Haïti le remboursement d''une
  dette pour prix du départ de la puissance coloniale française. Indûment, nous avons
  reconnu. Cette dette était d''autant plus cruelle qu''elle frappait une nation d''anciens
  esclaves qui s''étaient libérés par les armes, au nom même des valeurs de la Révolution
  et de la République. C''est pour cette raison que nous avons, d''un commun accord
  avec les autorités haïtiennes, réuni des historiens de nos deux pays, des spécialistes
  — et je remercie ceux qui ont à piloter cette commission, et je souhaite que le
  Gouvernement leur donne tous les moyens de continuer d''avancer dans leurs travaux
  — pour, justement, revisiter cette histoire et, de manière la plus exacte possible,
  établir les responsabilités de tous les acteurs, la réalité et les réparations possibles.
  Ce travail était nécessaire et la Commission est à l''œuvre, je le sais, depuis
  plusieurs mois. Je souhaite qu''elle puisse, en décembre prochain, nous rendre ce
  travail. Puis il y a un autre dialogue du même ordre que nous commençons, avec l''Afrique
  et avec mon ami John Dramani Mahama, président du Ghana, initiateur de la résolution
  évoquée. La France ne l''a pas votée, cette résolution, mais de manière totalement
  assumée, et je l''ai expliqué au président du Ghana, parce qu''on aurait dû sans
  doute faire mieux le travail en amont collectivement, mais parce qu''on a refusé
  la formulation explicitement hiérarchisant les crimes contre l''humanité. Et je
  pense d''ailleurs que ce n''était pas une bonne démarche. Et d''ailleurs, ces crimes
  contre l''humanité sont eux-mêmes inséparables, et j''ai toujours refusé toute hiérarchie.
  Et je pense qu''on aurait ouvert des débats dans notre société, et on aurait d''ailleurs
  acté, je pense, une hiérarchisation qui, dans la période que nous vivons, n''aurait
  pas été salutaire. Néanmoins, je l''ai dit, parce que j''ai eu de longs échanges
  avec le président avant, après. Il est venu ici, on en a longuement parlé. On ne
  peut pas simplement s''arrêter à cette résolution. On ne peut pas ne pas entendre
  ce qu''il y a derrière, qui est justement une demande de justice, toujours de réparation.
  Et donc, ensemble, nous en avons parlé et j''ai d''abord accepté l''invitation du
  président Mahama de participer au suivi de la mise en œuvre de la résolution de
  l''Assemblée générale en m''adressant à la conférence que le Ghana accueillera dans
  un mois. Mais nous avons décidé de lancer ensemble un travail scientifique international
  avec un ancrage franco-ghanéen, mais assumant la participation large de nos scientifiques
  en la matière pour établir les éléments scientifiques et faire des recommandations
  très concrètes aux décideurs politiques. Même si on n''est pas d''accord avec la
  formulation, on ne peut pas balayer d''un revers de main cette résolution. En effet,
  ce mouvement qui s''est établi, qui, sinon, viendra à créer de nouveaux clivages
  dans le monde que nous connaissons et qui, en quelque sorte, serait vécu, vu comme
  une forme de mépris, ou de refus de voir. Nous devons engager le dialogue, le travail
  avec honnêteté pour continuer ce chemin. Et donc, là encore, nous allons mener ce
  travail. S''il est l''affaire de tous, la France va continuer de prendre sa part,
  elle l''a prise depuis longtemps, et je souhaite qu''avec nous, États, organisations
  internationales et régionales, l''UNESCO, l''ONU, l''Union européenne, la communauté
  caribéenne, l''Union africaine, etc., et toutes les fondations aussi, comme la Fondation
  pour la mémoire de l''esclavage et l''association, participent de ce mouvement,
  car il est essentiel. Mais pour autant, en faisant cela, nous devons avoir l''honnêteté
  de nous dire qu''on ne pourra jamais réparer ce crime, totalement, parce que c''est
  impossible. Mais qu''est-ce que cela nous dit ? D''abord, je pense l''honnêteté
  de dire les choses et de ne pas se tenir de fausses promesses. Mais ça nous dit
  que ce parcours de reconnaissance et de réparation, nous devons accepter le fait
  qu''il n''a pas de point final. On ne peut pas clôturer ce qui s''est passé, mais
  que nous devons sans cesse le recommencer, et que nous devons sans cesse continuer
  d''avancer, mais que vous ne pourrez pas un jour mettre un chiffre, mettre un mot
  qui viendrait donner un point final à cette histoire, parce qu''elle continue de
  circuler. D''abord, elle continue et continuera de circuler entre les Caraïbes,
  les Amériques, l''Afrique et la France. Mais c''est à nous, par ce parcours de reconnaissance,
  de réparation assumée, de lui donner un nouveau visage. J''ai été frappé de voir
  que quand on a, par exemple, restitué au Bénin les œuvres qui avaient été volées
  dans la brutalité il y a plus d''un siècle, ces 26 pièces du Trésor d''Abomey, la
  manière dont nous l''avons fait, pensée, conçue, n''a pas été un point final. Des
  artistes contemporains béninois sont venus créer. Ils sont venus exposer ici, à
  la conciergerie. Ils sont venus continuer le travail et le dialogue. Ils se sont
  réapproprié ces œuvres qu''on leur avait volées pour en faire des mythes contemporains.
  Et des jeunes Français sont venus redécouvrir Behanzin et ses figures qui avaient
  disparu, qu''ils ne venaient plus voir quand c''était dans nos musées, parce que
  des artistes de leur génération sur le continent africain, d''un seul coup, venaient
  réinventer cette histoire. Si nous avons le courage, la lucidité, la volonté de
  dire qu''il n''y a pas de point final, les générations à venir continueront de faire
  circuler cette histoire. Les souffrances, mais cette fois-ci, les souffrances qui
  ne sont plus tues ou murmurées, mais qui sont transcendées, recréées, réinventées,
  et on leur redonnera toute la place dans nos institutions. C''est exactement le
  même chemin que nous devons faire pour nous-mêmes en France. La réparation au fond,
  et je veux ici faire un affreux plagiat, mais comme je le cite, ce ne sera pas un
  plagiat, mais m''inscrire dans les pas du philosophe Rachid Benzine, qui travaille
  en ce moment sur une notion un peu orpheline de notre philosophie, de notre pensée :
  le chagrin. Il a raison de dire que nos nations sont traversées par des chagrins,
  individuels ou collectifs, et nous ne savons pas les prendre. Et il y a des fausses
  promesses faites aux chagrins, les uns en ne voulant plus les entendre. Chagrin
  d''hier ne vient plus m''ennuyer, avec ça on va passer à autre chose, fini la repentance.
  Ou les autres fausses promesses, ton chagrin est indépassable et je vivrai avec
  toi dans un chagrin éternel qui va, en quelque sorte, désunir le pays. Un chagrin
  se porte et il se porte ensemble. Et la vraie reconnaissance et réparation, c''est
  d''accepter tous ensemble de porter ces grands chagrins de la France et de la République,
  qui est d''avoir reconnu ces crimes que sont la traite et l''esclavage, de continuer
  à en faire ce travail de vérité, de l''enseigner, de rechercher, de continuer de
  créer, de l''assumer, de le reconnaître et de se dire : c''est nous et on le porte
  ensemble, chacun avec vos histoires, avec nos histoires. Nous n''avons pas la même
  histoire les uns et les autres par rapport à ces crimes, mais nous les portons ensemble
  parce que nous sommes ensemble la France. Et je terminerai là-dessus. Je suis profondément
  convaincu qu''il y a 25 ans, la loi que vous avez portée, tout ce travail que fait
  la Fondation, que toutes et tous vous faites dans vos associations, vos écoles,
  vos parlements, ce que nous sommes en train de faire là est évidemment un travail
  nécessaire pour inventer l''avenir, mais nécessaire à nous-mêmes. Il y a cette sempiternelle
  question qui revient, dans notre pays : quelle est l''identité française ? C''est
  ce chemin. Et l''identité française, elle est faite de ces formidables faits d''armes,
  de ces grands récits, de ces grandes aventures. Elle est faite aussi des crimes
  qui ont été commis, de ses pages, de son histoire, qu''elle doit regarder avec lucidité.
  Mais la France et sa République est faite de citoyennes et de citoyens qui ont vécu
  cette histoire, et parfois de chaque côté. Mais ils l''ont vécu ensemble et ils
  vivent surtout aujourd''hui ensemble. Et la possibilité de vivre ensemble, ce qui
  est, ce qui nous fait une nation, c''est de faire ce parcours de reconnaissance
  et d''assumer pleinement et de reconnaître cette histoire. Il n''y a pas d''identité
  française ni dans le déni de ce qui s''est fait, ni dans le déni, l''effacement
  de ce qu''il y a, ni dans le refus d''avancer sur les reconnaissances ou les réparations,
  ni dans le repli exclusif sur ces histoires où d''autres voudraient promettre que
  la réparation possible est intégrale ou que la vraie lutte est dans un communautarisme
  contemporain. Le vrai, la véritable identité française, c''est d''avoir fait des
  grandes choses, c''est de reconnaître aussi les crimes graves que nous avons pu
  faire, et c''est de continuer de vouloir avancer ensemble. Cette histoire y participe,
  et ce que nous sommes en train de faire y participe. C''est pourquoi nous aurons
  toujours la réparation imparfaite, parce que cette histoire est intranquille. Alors,
