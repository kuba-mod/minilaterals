title: Réception des acteurs mobilisés pour le choix de Lille comme siège de l’Autorité
  douanière de l'Union européenne.
text: Ce jeudi 21 mai 2026, le Président de la République a reçu au Palais de l'Élysée les
  acteurs mobilisés pour que le nouveau siège de l’autorité douanière de l'Union européenne
  s'installe à Lille. Depuis 2022, la France s'est engagée sur la réforme de l'union
  douanière au sein de l'Union européenne. C'est dans ce contexte que la candidature
  de Lille comme siège de l'Autorité douanière de l'Union européenne s'est imposée.
  Lille ayant été élue, le Président Emmanuel Macron a tenu à remercier les équipes
  engagées sur la candidature de la ville en les accueillant au Palais de l'Élysée.
  Choisir la France c'est doter l'Europe d'un ancrage solide pour renforcer son unité
  et affirmer son rôle sur la scène internationale. C'est un signal fort pour le rayonnement
  européen de la France et de Lille.
