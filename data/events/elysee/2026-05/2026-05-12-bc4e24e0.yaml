date: '2026-05-12'
type: press_release
source_name: elysee
title: Déclaration finale de Nairobi.
text: 'Nous, représentants de pays africains et de la République française, réunis
  au sommet « Africa Forward » le 12 mai 2026, Reconnaissant les profondes transformations
  du paysage économique, technologique, environnemental et géopolitique mondial, Affirmant
  notre attachement commun à un ordre international pacifique, juste et fondé sur
  des règles de droit et reposant sur les principes de la Charte des Nations Unies,
  Affirmant notre attachement commun au développement durable, à la croissance solidaire
  et à des économies et à des sociétés résilientes, Reconnaissant le potentiel considérable
  de l’Afrique comme moteur de la croissance, de l’innovation et de la prospérité
  à l’échelle mondiale, Réaffirmant la nécessité de partenariats fondés sur le respect
  mutuel, les responsabilités communes et le co-développement, Adoptons la présente
  déclaration en tant que cadre du partenariat renforcé entre l’Afrique et la France
  pour accroître la croissance solidaire et l’innovation. Nous reconnaissons l’évolution
  de l’environnement de sécurité internationale et ses conséquences pour l’Afrique
  ainsi que les liens de plus en plus forts entre la paix, la sécurité et le développement
  durable. i.    Affirmer les principes et les objectifs de l’Acte constitutif de
  l’Union africaine, qui promeut l’unité, la paix, la sécurité, la bonne gouvernance,
  des élections ouvertes et démocratiques ainsi que la coopération entre ses États
  membres. ii.    Soutenir les solutions en faveur de la paix et de la sécurité pilotées
  par l’Afrique grâce à l’Architecture africaine de paix et de sécurité de l’Union
  africaine et à la mise en œuvre de la résolution 2719 du Conseil de sécurité des
  Nations Unies pour un partenariat renforcé entre les Nations Unies et l’Union africaine,
  notamment s’agissant des processus de planification et de prise de décision et du
  financement prévisible et durable des opérations menées par l’Union africaine. iii.  
   Définir de nouvelles pistes de coopération afin de faire face aux menaces émergentes
  et aux menaces transnationales, notamment le terrorisme, la criminalité transnationale
  organisée, les cybermenaces, les flux illicites, le trafic d’armes, le trafic de
  migrants et le trafic de drogues illicites. iv.    Renforcer l’autonomie stratégique,
  la résilience et les capacités en matière de sécurité collective de l’Afrique dans
  un contexte de bouleversement des rapports de force internationaux. v.    Approfondir
  le dialogue sur la façon de faire face à la fragmentation géopolitique, à la volatilité
  économique et à l’affaiblissement du consensus multilatéral, qui ont des conséquences
  sur la paix et les questions de sécurité en Afrique. vi.    Renforcer les capacités
  institutionnelles et les mécanismes de sécurité collective pour faire face aux conflits
  en cours dans la Corne de l’Afrique, la région des Grands Lacs et la région du Sahel
  par la cessation des hostilités, le dialogue inclusif, le renforcement des capacités
  en matière de lutte contre le terrorisme et la stabilisation de la région. vii.  
   Établir un lien entre la sécurité avec la croissance économique solidaire, l’autonomisation
  des jeunes, l’éducation, la résilience climatique et la mobilisation de la diaspora.
  viii.    Soutenir une réforme globale du Conseil de sécurité des Nations Unies afin
  de le rendre plus efficace et plus représentatif, conformément aux objectifs de
  la Position africaine commune, notamment le Consensus d’Ezulwini et la Déclaration
  de Syrte sur la représentation équitable de l’Afrique. Nous affirmons qu’il est
  nécessaire de transformer l’agriculture en un secteur moderne, compétitif et résilient
  face aux changements climatiques. Nous nous engageons à mener les actions suivantes :
  i.    Promouvoir une agriculture et des systèmes alimentaires productifs, durables
  et résilients, notamment le développement de l’agro-industrie et des chaînes de
  valeurs intégrées, en particulier dans les secteurs qui peuvent être développés
  à grande échelle. ii.    Encourager les systèmes d’agriculture et d’élevage qui
  améliorent la nutrition tout en adoptant l’approche « Une seule santé » afin de
  protéger la santé humaine, animale et des écosystèmes. iii.    Renforcer les systèmes
  alimentaires, la productivité des élevages et les économies rurales et garantir
  une chaîne d’approvisionnement en engrais durable. iv.    Investir dans la recherche,
  l’innovation et les pratiques adaptées aux changements climatiques dans le secteur
  de l’agriculture, notamment l’agro-écologie, l’agroforesterie, les semences de qualité
  adaptées aux conditions locales, la gestion intégrée de la santé des sols et les
  outils numériques tout en encourageant la recherche conjointe et les partenariats
  de développement avec des institutions françaises. v.    Renforcer l’enseignement
  technique et supérieur agricole afin de mieux intégrer les jeunes au marché du travail
  local. vi.    Promouvoir des chaînes de valeurs structurées dans le secteur de l’agriculture,
  notamment l’agro-transformation, la chaîne du froid, la logistique et le commerce
  national, régional et international dans le cadre de la Zone de libre-échange continentale
  africaine, afin de passer d’une agriculture reposant seulement sur l’exportation
  de produits bruts à une agriculture qui soit un vecteur d’industrialisation, de
  valeur ajoutée et de souveraineté économique. vii.    Autonomiser les jeunes, les
  femmes et les petits exploitants grâce à des financements, à la propriété foncière,
  à des outils numériques pour l’agriculture de précision et à technologie financière
  appliquée à l’agriculture ainsi que grâce à des incubateurs d’innovation et aux
  développements des compétences. viii.    Améliorer la sécurité alimentaire et la
  nutrition, promouvoir des régimes sains pour tous et encourager les liens économiques
  entre les zones rurales et les zones urbaines. ix.    Renforcer la résilience de
  l’agriculture et des systèmes alimentaires grâce à une approche globale et systémique
  qui tienne compte des normes climatiques, environnementales, économiques et sanitaires
  ainsi que des problématiques géopolitiques. x.    Soutenir à cet égard la mise en
  œuvre opérationnelle du Plan d’action 2024-2034 du Sommet africain sur les engrais
  et la santé des sols, à la fois sur le plan du savoir-faire technique et sur le
  plan du renforcement des capacités. xi.    Mobiliser les investissements public-privé
  et les partenariats public-privé au service de parcs agro-industriels et de chaînes
  de valeur compétitives. Nous reconnaissons le rôle que jouent les systèmes de santé
  robustes pour garantir la sécurité et le développement humain, tout en accroissant
  la souveraineté sanitaire grâce au renforcement de la capacité de l’Afrique à protéger
  la santé de ses populations et à la mobilisation des investissements durables dans
  des systèmes de santé résilients. Nous nous engageons à mener les actions suivantes :
  i.    Progresser dans la mise en place de la couverture sanitaire universelle et
  de systèmes de santé résilients et tournés vers les personnes grâce au renforcement
  des soins de santé primaires, à un accès équitable aux soins et à la réduction des
  obstacles financiers. ii.    Améliorer la prévention et la surveillance des pandémies,
  la préparation aux pandémies, les capacités des laboratoires et les capacités en
  génomique et adopter une approche « Une seule santé ». iii.    Collaborer sur les
  liens entre le climat et la santé dans les enceintes internationales pertinentes
  et promouvoir l’initiative « One Health & Beyond » en faisant de la santé un moteur
  de la lutte contre les changements climatiques et de la résilience systémique et
  en intégrant l’approche « Une seule santé » dans les contributions déterminées au
  niveau national et dans les plans nationaux d’adaptation. iv.    Accélérer la production
  régionale de vaccins, de médicaments, de moyens de dépistage et de technologies
  médicales grâce à des partenariats stratégiques qui s’inscrivent dans des cadres
  parrainés par les Centres africains pour le contrôle et la prévention des maladies,
  l’Agence africaine du médicament et la Zone de libre-échange continentale africaine.
  v.    Contribuer et participer au Mécanisme africain d’achats groupés, qui constitue
  un instrument stratégique de mobilisation du pouvoir d’achat collectif, élargir
  l’accès abordable et équitable aux produits de santé qui sauvent des vies et accroître
  les parts de marché durables pour les fabricants africains. vi.    Renforcer et
  harmoniser les cadres réglementaires pour garantir la qualité, la sécurité et l’efficacité
  des produits de santé sur tout le continent africain. vii.    Promouvoir un accès
  équitable aux technologies de pointe et soutenir l’innovation au sein des institutions
  africaines. viii.    Attirer des financements nationaux et internationaux coordonnés,
  correspondant aux besoins et aux priorités des pays, pour garantir des systèmes
  de santé résilients, des effets durables et, à terme, la souveraineté sanitaire.
  ix.    Investir dans le développement de la main d’œuvre, la formation et le développement
  professionnel afin de disposer d’une main d’œuvre compétente et réactive dans le
  domaine de la santé, tout en promouvant le recrutement éthique, la santé numérique
  dans le respect de la protection des données ainsi que des infrastructures de santé
  résilientes face aux changements climatiques. x.    Parvenir à la souveraineté sanitaire
  grâce à la production régionale, au transfert de technologies, à l’harmonisation
  réglementaire et aux chaînes d’approvisionnements résilientes. xi.    Promouvoir
  la recherche conjointe, l’innovation et une coopération équitable en matière de
  santé mondiale guidées par l’Union africaine, les Centres africains pour le contrôle
  et la prévention des maladies et l’Organisation mondiale de la santé. Nous affirmons
  qu’avoir accès à une énergie fiable, abordable et durable est essentiel au développement
  et à la mise en œuvre du programme de développement à long terme de l’Afrique grâce
  une croissance solidaire et grâce à la création d’emplois et de richesse. Nous nous
  engageons à mener les actions suivantes : i.    Promouvoir l’industrialisation verte
  grâce à des investissements dans les énergies renouvelables, les systèmes à faible
  émission de carbone, l’hydrogène vert et à faible émission de carbone et les grands
  projets en matière d’énergie propre comme l’hydroélectricité, la géothermie, la
  valorisation énergétique et l’énergie nucléaire. ii.    Collaborer afin de renforcer
  la sécurité et la souveraineté énergétiques, notamment en tirant parti du potentiel
  considérable de l’Afrique en matière d’énergies renouvelables et en soutenant le
  développement des chaînes de valeur locales au service de produits énergétiques
  propres. iii.    Élargir l’accès à l’énergie propre, notamment aux modes de cuisson
  propres, et mettre en place des marchés énergétiques interconnectés. iv.    Encourager
  l’électrification destinée à l’utilisation finale dans tous les secteurs pertinents
  afin de réaliser la transition verte. v.    Faciliter le transfert de technologies
  vertes dans des conditions justes et mutuellement bénéfiques, lever les obstacles
  à la production locale et soutenir le développement de la main d’œuvre au profit
  des emplois verts. vi.    Renforcer les réseaux électriques nationaux et l’interconnectivité
  régionale. vii.    Respecter la souveraineté nationale sur les ressources naturelles,
  notamment les minerais essentiels, et promouvoir la valorisation locale, la création
  de valeur ajoutée et la transformation durable concernant les minerais essentiels
  africains en appui à l’industrialisation, à la diversification économique et à la
  résilience des chaînes de valeur régionales. viii.    Renforcer les chaînes de valeur
  régionales grâce à l’intégration continentale et à la production « made in Africa
  », tout en développant un accès sûr, durable et fiable aux technologies et aux ressources
  stratégiques. ix.    Donner la priorité aux énergies renouvelables et à faible émission
  de carbone pour les usages productifs comme l’irrigation, l’entreposage frigorifique,
  l’agrotransformation et la production d’engrais afin de réduire les coûts et les
  émissions de carbone. x.    Tirer parti des partenariats diversifiés et des plateformes
  pilotées par les pays comme l’Initiative d’industrialisation verte de l’Afrique
  et le Partenariat accéléré pour les énergies renouvelables en Afrique pour coordonner
  les efforts et le financement à long terme. xi.    Promouvoir un financement juste
  et équitable du développement durable et de la lutte contre les changements climatiques
  grâce à une plus grande présence de l’Afrique dans les processus internationaux
  de prise de décisions, de gouvernance, de définition de normes et d’édiction de
  règles. xii.    Soutenir l’Accord de Paris et une approche stratégique fondée sur
  les sciences et travailler ensemble à la mise en œuvre des conclusions du premier
  bilan mondial pour progresser vers une transition énergétique juste, tout en tenant
  compte des principes et des objectifs communs énoncés dans la Stratégie et le Plan
  d’action de l’Union africaine en matière de changement climatique et de développement
  résilient (2022-2032). Nous reconnaissons que l’économie bleue représente un secteur
  d’avenir stratégique pour la croissance, l’emploi et la durabilité. Nous nous engageons
  à mener les actions suivantes : i.    Soutenir une économie bleue  reposant sur
  la souveraineté maritime, la résilience face aux changements climatiques, la transformation
  économique et une prospérité inclusive, en reconnaissant que les océans jouent un
  rôle stratégique pour la sécurité alimentaire, la biodiversité, la sécurité des
  corridors commerciaux, la transition énergétique dans le secteur maritime et la
  stabilité climatique. ii.    Rappeler le partenariat historique entre l’Afrique
  et la France sur la sécurité, le commerce et le renforcement des capacités maritimes
  et nous attacher à en faire un cadre tourné vers l’avenir promouvant la réciprocité,
  le coinvestissement et les valeurs partagées. iii.    Rappeler également la Stratégie
  africaine sur l’économie bleue, la Stratégie africaine intégrée pour les mers et
  les océans à l’horizon 2050, l’Agenda 2063, la Charte de Lomé et la Stratégie nationale
  de la France pour la mer et le littoral ; nous engager à mener une coopération maritime
  conduite par l’Afrique dans le respect de la Convention des Nations Unies sur le
  droit de la mer et de l’Accord se rapportant à la Convention des Nations Unies sur
  le droit de la mer et portant sur la conservation et l’utilisation durable de la
  diversité biologique marine des zones ne relevant pas de la juridiction nationale.
  iv.    Affirmer que la coopération doit respecter la souveraineté nationale, le
  droit international et les droits souverains sur les ressources marines, et doit
  demeurer conduite par l’Afrique, tournée vers le développement et reposer sur une
  gouvernance maritime civile, tout en ayant une valeur ajoutée économique, technologique
  et stratégique réciproque. v.    Sécuriser ensemble les biens maritimes communs
  en menant une action de sensibilisation accrue dans ce domaine et en luttant conjointement
  sur un plan non militaire contre la piraterie, les trafics, la pêche illicite, non
  déclarée et non réglementée, tout en préservant les routes maritimes, les infrastructures
  critiques et la stabilité du commerce ; encourager la ratification de l’Accord relatif
  aux mesures du ressort de l’État du port visant à prévenir, contrecarrer et éliminer
  la pêche illicite, non déclarée et non réglementée ainsi que la ratification de
  l’Accord de l’Organisation mondiale du Commerce sur les subventions à la pêche.
  vi.    Veiller à l’adoption rapide du cadre « net-zéro » de l’Organisation maritime
  internationale au moyen des procédures établies, à une transition juste en matière
  de transport maritime mondial qui permette de renforcer la compétitivité commerciale
  de l’Afrique, sa sécurité alimentaire, son industrialisation et sa participation
  aux chaînes de valeur maritimes mondiales, en conformité avec l’Accord de Paris
  et les principes d’équité et de responsabilités communes mais différenciées, et
  avec des financements ciblés et des transferts de technologies. vii.    Accueillir
  favorablement les engagements à investir dans les économie maritimes et côtières,
  les énergies renouvelables, les solutions maritimes à faible émission de carbone
  ainsi que la conservation, la restauration et la gestion durable des écosystèmes
  du « carbone bleu », grâce au renforcement des cadres règlementaires, des partenariats
  de développement et de l’accès aux financements et aux technologies. viii.    Reconnaître
  les changements climatiques et l’augmentation du niveau de la mer ; appeler de manière
  urgente à des stratégies nationales à long terme reposant sur les sciences et les
  solutions fondées sur la nature ; saluer le « Défi contributions déterminées au
  niveau national bleues » ; appeler à une mobilisation pour permettre aux populations
  côtières de mettre en œuvre des réponses face à la crise climatique. ix.    Affirmer
  que la coopération doit promouvoir une transition juste et équitable pour les océans
  avec un accès abordable et prévisible aux financements et aux technologies, en reconnaissant
  la diversité des capacités et le contrôle national sur les données maritimes, les
  systèmes règlementaires et les infrastructures stratégiques. x.    Demander aux
  ministres concernés et aux autorités compétentes de définir des formes de coopération
  au titre de la présente déclaration, de leur donner la priorité et de les promouvoir,
  dans le respect des priorités et des cadres juridiques applicables sur le plan national.
  xi.    Mettre en place des coopérations structurées renforçant la souveraineté maritime,
  garantissant des corridors commerciaux résilients, accélérant la transition vers
  des économies sobres en carbone, préservant les écosystèmes du « carbone bleu »
  et faisant des océans une source durable de prospérité partagée pour les générations
  présentes et futures. Nous reconnaissons que la transformation numérique et l’intelligence
  artificielle (IA) conduisent à repenser nos économies, nos services publics, nos
  systèmes de connaissances, notre sécurité, nos industries créatives et la compétitivité
  mondiale. Nous reconnaissons également que la participation de l’Afrique à l’ère
  de l’IA requiert des investissements à tous les niveaux de la pile numérique et
  de l’IA, conformément à la Stratégie continentale sur l’intelligence artificielle
  de l’UA, au Cadre stratégique de l’UA en matière de données, au Protocole relatif
  au commerce numérique de la Zone de libre-échange continentale africaine et au programme
  plus général de l’Afrique en matière de transformation numérique. Nous nous engageons
  à mener les actions suivantes : i.    Promouvoir une transformation numérique inclusive
  et une IA responsable, sûre, sécurisée, digne de confiance et respectueuse des droits,
  guidés par les cadres africains et internationaux, en accordant une attention particulière
  aux droits de l’homme, à la protection des enfants et des mineurs, à la diversité
  culturelle, au plurilinguisme, à l’égalité entre les femmes et les hommes, à la
  durabilité environnementale et à la protection des groupes vulnérables. ii.    Combler
  la fracture numérique, notamment en faveur des femmes, des jeunes, des populations
  rurales, des personnes en situation de handicap et des populations mal desservies.
  iii.    Mobiliser les investissements publics et privés au profit d’infrastructures
  numériques et d’IA résilientes, notamment la connectivité haut débit, les centres
  de données régionaux, les capacités de calcul et d’informatique en nuage, les énergies
  propres et les systèmes de données fiables. iv.    Renforcer la souveraineté numérique
  et l’autonomie stratégique en soutenant l’appropriation par l’Afrique des données
  et des systèmes d’IA, leur accueil, traitement et la création de valeur sur le continent
  africain, tout en promouvant l’interopérabilité, des normes ouvertes, des infrastructures
  libres et des transferts de technologie volontaires. v.    Soutenir des modèles
  linguistiques africains, des ensembles de données et des tests de performance locaux
  ainsi que des systèmes d’IA « poids ouverts ». vi.    Développer les compétences,
  la recherche collaborative et les écosystèmes d’innovation. vii.    Encourager les
  entreprises, les institutions, les investisseurs et les porteurs de projets innovants
  africains et français à développer le coinvestissement, la coproduction et la cogestion.
  viii.    Promouvoir une gouvernance de l’IA éthique et favorable à l’innovation
  en nous appuyant sur le Sommet pour l’action sur l’intelligence artificielle tenu
  à Paris en 2025, le Pacte numérique mondial des Nations Unies et les engagements
  « Africa Forward » qui ont suivi. ix.    Renforcer le commerce numérique, l’interopérabilité
  transfrontière et les flux de données fiables dans le cadre du Protocole sur le
  commerce numérique de la Zone de libre-échange continentale africaine, notamment
  le développement de jeunes entreprises innovantes et l’accès aux marchés des entreprises
  africaines s’appuyant sur l’IA et le numérique. x.    Promouvoir l’utilisation responsable
  des technologies numériques et de l’IA dans l’économie créative, tout en protégeant
  la propriété intellectuelle des industries créatives africaines, en soutenant les
  moyens de subsistance des créateurs, en renforçant la distribution numérique et
  en accroissant l’accès aux marchés des entreprises culturelles et créatives africaines.
  xi.    Renforcer la coopération internationale pour faire face aux risques frontaliers
   et socio-techniques découlant des technologies numériques et de l’IA, notamment
  la propagation de fausses informations, la désinformation, les manipulations en
  ligne, les violences générées par l’IA et les nuisances facilitées par les technologies
  numériques. xii.    Développer une troisième voie pour l’Afrique reposant sur le
  numérique et l’IA qui soit ancrée dans l’autonomie stratégique, la réduction de
  la dépendance vis-à-vis d’un pouvoir technologique concentré, des technologies transparentes
  et respectueuses des droits, des infrastructures durables et un partage de la capacité
  à façonner les règles mondiales à l’ère de l’IA. Nous reconnaissons que l’architecture
  financière internationale doit évoluer pour prendre en compte les réalités mondiales
  actuelles et se conformer aux objectifs de développement durable (ODD). Nous nous
  engageons à mener les actions suivantes : i.    Œuvrer de manière constructive à
  un rééquilibrage approprié des quote-parts du Fonds monétaire international (FMI)
  en faveur des pays les moins bien représentés, afin de mieux refléter le positionnement
  relatif des pays membres dans l’économie mondiale, ce qui devrait réduire les écarts
  de représentation, tout en protégeant les quote-parts des pays les plus pauvres,
  notamment de l’Afrique ; appuyer les efforts des pays pour avoir accès à des financements
  concessionnels dans le cadre du Fonds fiduciaire pour la réduction de la pauvreté
  et pour la croissance et du Fonds pour la résilience et la durabilité du FMI. ii.  
   Garantir une représentation accrue de l’Afrique au sein du Conseil d’administration
  du FMI, notamment grâce au 25e siège créé en novembre 2024 pour représenter l’Afrique
  subsaharienne. iii.    Veiller à ce que les flux financiers internationaux vers
  le continent africain s’inscrivent dans le cadre des priorités de l’Agenda 2063,
  des ODD et des engagements en faveur d’une industrialisation, d’infrastructures
  et d’une transition verte durables. iv.    Contribuer à mobiliser tous types de
  fonds (internationaux et nationaux, publics et privés) pour le financement du développement
  et œuvrer en faveur d''une utilisation efficace et ciblée des ressources concessionnelles,
  en veillant à ce qu’elles demeurent disponibles pour les pays qui en ont le plus
  besoin. v.    Garantir la disponibilité de financements concessionnels pour les
  pays en développement par le biais de l’Association internationale de développement.
  vi.    Continuer d’améliorer l’architecture de la dette mondiale, notamment en accélérant
  la mise en œuvre du Cadre commun entre le G20 et le Club de Paris, de manière prévisible,
  rapide, ordonnée et concertée. vii.    Mettre en œuvre le « Stimulus des ODD » afin
  de promouvoir des dettes à long terme à des taux d’intérêt moindres. viii.    Renforcer
  la mise en œuvre du programme d’action d’Addis-Abeba et des principaux résultats
  de la Conférence de Séville sur le financement du développement. ix.    Participer
  de manière constructive aux discussions internationales en cours afin de promouvoir
  un système fiscal international inclusif, permettant de lutter contre l’évasion
  fiscale, le transfert de bénéfices et les flux financiers illicites. Nous reconnaissons
  que la jeunesse africaine représente un atout stratégique. Nous nous engageons à
  mener les actions suivantes : i.    Développer l’enseignement, la formation et l’acquisition
  de compétences. ii.    Soutenir les écosystèmes d’innovation et l''entrepreneuriat.
  iii.    Promouvoir les échanges de connaissances et les partenariats institutionnels.
  Nous affirmons que le capital humain est le fondement de toute transformation durable.
  Nous réaffirmons que les infrastructures sont un moteur essentiel de la compétitivité
  et de la croissance. Nous nous engageons à mener les actions suivantes : i.    Investir
  dans le transport, l’énergie et les infrastructures numériques. ii.    Appuyer la
  mise en œuvre de la Zone de libre-échange continentale africaine. iii.    Renforcer
  les chaînes de valeur régionales et l’intégration des marchés régionaux. Nous reconnaissons
  que la connectivité joue un rôle clé pour réaliser pleinement le potentiel du continent
  africain. Nous reconnaissons que la réalisation de ces objectifs ambitieux nécessite
  des investissements importants et durables. Nous nous engageons à mener les actions
  suivantes : i.    Promouvoir les financements mixtes et les partenariats public-privé.
  ii.    Soutenir les mécanismes de financement innovant et les instruments de partage
  des risques afin de mobiliser davantage de ressources privées à l’échelle locale
  et internationale. iii.    Inscrire les investissements dans le cadre des priorités
  en matière de développement et de lutte contre les changements climatiques grâce
  à des projets à fort impact pouvant être financés et étendus afin de produire des
  résultats concrets et durables. iv.    Appuyer les efforts déployés pour renforcer
  la mobilisation des ressources nationales et la gestion des finances publiques qui
  jouent un rôle clé pour assurer la stabilité macroéconomique et mettre en place
  des écosystèmes favorisant le développement économique. Nous affirmons que l’avenir
  de l’Afrique repose sur l’accroissement de ses capacités de production, le développement
  de son industrialisation et une croissance fondée sur l’innovation. Nous nous engageons
  à soutenir une transition, pour passer de modèles économiques reposant sur l’extraction
  des ressources naturelles à des systèmes orientés vers la création de valeur ajoutée,
  l’industrie manufacturière et la production durable. Nous reconnaissons que l’Afrique
  est non seulement un marché d’avenir mais aussi un partenaire en matière de production,
  d’innovation et de conduite de l’économie mondiale. Nous adoptons la présente déclaration
  qui constitue une feuille de route commune tournée vers l’action. Nous appelons
  les États, le secteur privé, les partenaires du développement et la société civile
  à travailler de concert pour promouvoir cette vision. Ensemble, nous bâtirons un
  avenir caractérisé par la croissance durable, la résilience et la prospérité partagée.'
