title: The 2026 Esports World Cup in Paris!
text: 'The President of the French Republic Emmanuel Macron welcomes today’s announcement
  by the Esports Foundation that France has been selected to host the 2026 Esports
  World Cup, the world’s largest multi-game esports championship, in Paris from July
  6 to August 23, 2026. This will be the first edition held outside of Saudi Arabia
  since the championship’s inception. Following the 2024 Paris Olympic and Paralympic
  Games and the 2023 Rugby World Cup, this selection signals that France continues
  to attract major global competitions and reflects the deepening relationship between
  Saudi Arabia and France, particularly in the cultural and sporting spheres. Since
  2015, France has established itself as a must-visit destination—the leading one
  in Europe—for major global esports events. Once again this year, France hosted the
  world’s biggest events: the Six Invitational at the Adidas Arena and the RLCS Major
  2 at the Paris La Défense Arena. Hosting this global competition in France in 2026
  is a testament to and recognition of the collective effort undertaken over the past
  ten years by the esports industry—a momentum supported by the President of the Republic
  and backed by government agencies and local authorities. This momentum will continue
  in October 2026 with the return of EVO France to Nice. Throughout the seven weeks
  of competition in Paris, the 2026 Esports World Cup will bring together more than
  2,000 professional players from 200 international clubs representing over 100 countries.
  The event will benefit from the remarkable infrastructure of Paris and its region,
  and will engage the tourism, hospitality, retail, and cultural sectors. The three
  French clubs that have qualified for the highest international level, Team Vitality,
  Gentle Mates, and Karmine Corp, will defend the national colors in front of their
  home crowd. Esports brings together more than 12 million players in France and is
  one of the most dynamic expressions of digital culture among young people in France
  and Europe. The arrival of the Esports World Cup in Paris in 2026 will be an occasion
  for a popular, open, and unifying celebration, as well as an opportunity to strengthen
  and promote relations between France and Saudi Arabia. France, the host of the 2026
  Esports World Cup, and Saudi Arabia, the previous host, commend the Esports Foundation’s
  commitment to making the 2026 Esports World Cup a success.'
