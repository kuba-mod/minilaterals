title: Disparition d'Edgar Morin.
text: 'Philosophe, écrivain, Résistant et sociologue du temps présent, Edgar Morin
  incarnait pour des millions de Français l’idéal de l’intellectuel engagé et humaniste.
  Son parcours dans le siècle était celui d’un penseur aux semelles de vent, qui sut
  bâtir une œuvre universelle en forme d’ode à la liberté, l’égalité et la fraternité.
  Edgar Morin fut d’abord l’enfant du siècle. Né Edgar Nahoum le 8 juillet 1921 à
  Paris, il était le fils unique d’un père commerçant séfarade venu de Salonique.
  Sa mère disparut alors qu’il n’avait que dix ans. Il grandit à Ménilmontant et dans
  l’ébullition politique des années 1930 où ses convictions pacifistes et humanistes
  s’éprouvèrent. A l’heure de la débâcle et de l’Occupation, Edgar Nahoum gagna Toulouse
  pour poursuivre ses études de droit et s’occuper d’étudiants réfugiés, « trouvant
  enfin l’expérience de l’utilité, de la fraternité, de la liberté » auprès de la
  jeunesse du monde entier. Croisant la route de Résistants et d’intellectuels, il
  adopta l’alias de Morin, entra dans la clandestinité et rejoignit les réseaux de
  Résistance communiste à Lyon, dont il devint un commandant exemplaire. A la Libération,
  après l’expérience vive de la fraternité des réseaux résistants, Edgar Morin rejoignit
  l’Allemagne occupée où il écrivit son premier livre, « L’An zéro de l’Allemagne
  », compte-rendu lucide et sans haine sur le sort d’un peuple à terre. Revenu à Paris,
  vivant comme un modeste intellectuel, Edgar Morin entra au CNRS en 1950 par l’entremise
  de Georges Friedmann. C’est alors qu’il publia « L’Homme et la mort », et opéra
  sa rupture avec le Parti Communiste l’année suivante. Il raconta dans l’ « Autocritique
  » (1959) l’histoire de cet idéal et de son deuil. Son engagement politique se tourna
  alors vers le soutien à la décolonisation en Algérie, avec la constitution d’un
  Comité des intellectuels en Afrique du Nord, en 1955. Pourtant, étranger à l’esprit
  de chapelle, Edgar Morin resta en marge des grandes familles intellectuelles ou
  partisanes. Il préféra fonder « Arguments » en 1955, la revue des Editions de minuit,
  où il fut l’un des passeurs aussi des théories de l’Ecole de Francfort. Ce fut en
  tant qu’écrivain des sciences sociales, mélangeant les disciplines, rétif aux orthodoxies,
  qu’Edgar Morin dessina son chemin. Sensible à l’esprit nouveau et rebelle des années
  1960, il co-réalisa « Chroniques d’un été » avec Jean Rouch, voyagea en Californie,
  publia « Les stars » en 1957, sur les vedettes de la nouvelle société médiatique,
  ou « L’esprit du temps », en 1962, sur la culture de masse. Enfant de la culture
  populaire, curieux de tout, Edgar Morin peignit dans « Le Monde » la génération
  « yé-yé ». Devenu sociologue du présent, il s’intéressa ensuite à Mai 68 ou à la
  « Rumeur d’Orléans ». Invité en Californie dans les années 1970, dont il rapporta
  un essai sur la jeunesse, il ajouta à ses centres d’intérêt déjà infinis, la biologie
  moléculaire, l’informatique, les sciences de l’information. Ce fut là aussi qu’il
  forgea des convictions écologiques profondes, qui l’amenèrent à écrire en 1972 «
  l’An I de l’ère écologique ». Edgar Morin publia enfin « La Méthode », en six volumes,
  dont la publication s’étendit de 1977 à 2006 : œuvre somme où il définit la « pensée
  complexe », ambition d’appréhender par-delà la modernité l’unicité du monde, réconciliant
  culture et nature. Témoin et acteur du siècle, Edgar Morin ne cessa jamais de lire,
  d’écrire, voyager et penser. Il s’engagea toujours pour la paix, le dialogue entre
  les peuples, la défense du droit international, l’idéal européen, ou la cause écologique.
  Au fil des décennies, par la force solaire de sa présence, son inlassable énergie
  à défendre les idées auxquelles il tenait, Edgar Morin avait pris une place à part
  dans le cœur des Français attachés comme lui à l’espérance universelle de liberté
  et de dignité humaine. « J’ai foi dans l’amour et dans la fraternité », déclarait-il
  encore ces derniers mois au « Monde ». Le Président de la République et son épouse
  saluent un destin dans le siècle, dont l’œuvre humaniste, universelle et féconde
  continuera de vivre en France et dans le monde. Ils adressent à sa famille, à ses
  proches, à ses lecteurs et ceux qui l’aimaient, leurs condoléances émues.'
