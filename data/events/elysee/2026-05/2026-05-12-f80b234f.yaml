title: Déclaration conjointe – Des partenariats internationaux et d
text: 'Nous, les Chefs d''État et de gouvernement de la France et des pays africains,
  nous sommes réunis le 12 mai 2026 à Nairobi, au Kenya, lors du Sommet Africa Forward,
  en présence des représentants du Fonds Monétaire International (FMI), du Groupe
  de la Banque mondiale, du Groupe de la Banque africaine de développement (BAD),
  de la Banque européenne pour la reconstruction et le développement (BERD), de la
  Banque européenne d''investissement (BEI), du Fonds vert pour le climat (GCF), de
  la Banque ouest-africaine de développement (BOAD) et d''autres acteurs du développement
  tels que le groupe Agence Française de Développement (AFD) et le Pacte pour la Prospérité,
  les Peuples et la Planète (4P). Nous saluons la présidence française du G7 et ses
  travaux sur le financement du développement et les partenariats internationaux.
  Nous souhaitons que la présente déclaration contribue aux travaux des membres et
  des pays invités au G7 sous présidence française. Les relations commerciales et
  économiques entre la France, l''Europe et l''Afrique demeurent une source de stabilité
  collective et de prospérité partagée. Dans le contexte du conflit en cours au Moyen-Orient,
  dont les conséquences s''étendent bien au-delà de la région, nous soulignons que
  cette relation est plus précieuse que jamais et qu''elle contribue à renforcer notre
  résilience mutuelle. Nous reconnaissons les effets déstabilisateurs du conflit sur
  l''économie mondiale, sur la stabilité financière, ainsi également que sur les marchés
  mondiaux de l''énergie, qui ont engendré une hausse des coûts pour les économies
  africaines et perturbé l’approvisionnement en intrants agricoles, aggravant ainsi
  les vulnérabilités existantes en matière de sécurité alimentaire sur le continent.
  Nous prenons acte des évolutions et des pressions démographiques, avec un nombre
  croissant de jeunes arrivant sur le marché du travail dans les économies en développement,
  qui va de pair avec l''urgente nécessité de créer des emplois. Nous soulignons que
  l''avenir du développement de l''Afrique repose sur un partenariat entre égaux au
  service d''intérêts mutuellement bénéfiques et d''une prospérité partagée. Nous
  reconnaissons que le système de financement du développement existant a montré ses
  limites face aux défis contemporains. Tout en réaffirmant que l''aide publique au
  développement (APD) reste un élément essentiel du soutien international, nous insistons
  sur le fait que la coopération au développement doit être alignée sur les priorités
  et stratégies de développement définies au niveau national, ainsi que sur les principes
  d''appropriation par les pays. Nous nous engageons donc à promouvoir une approche
  renouvelée des partenariats internationaux, caractérisée par des partenariats mutuellement
  bénéfiques fondés sur des priorités communes, la co-création, les co-investissements
  notamment à travers la recherche, le renforcement des capacités et la formation,
  le partage des connaissances et la création de valeur à long terme, tout en tenant
  compte des limites du système de développement actuel et des différentes situations
  nationales et niveaux de développement. Ce partenariat renouvelé doit reposer sur
  le respect mutuel, la souveraineté des États sur leurs ressources naturelles et
  le principe de création de valeur partagée au bénéfice des populations africaines.
  Nous nous engageons à promouvoir de véritables partenariats, dans l''esprit du Pacte
  pour la Prospérité, les Peuples et la Planète (4P), afin d''améliorer l''efficacité
  de l''architecture financière mondiale pour l''Afrique et de soutenir la souveraineté
  et la résilience des pays partenaires africains grâce à une appropriation renforcée,
  tout en veillant à ce que les plus vulnérables ne soient pas laissés pour compte.
  Ces travaux seront cohérents avec ceux menés dans le cadre des institutions financières
  internationales et du Forum des Nations Unies sur le financement du développement,
  et les compléteront. Nous nous engageons également à poursuivre notre coopération
  pour renforcer notre engagement politique en faveur des biens publics mondiaux,
  du commerce et de la coopération économique, afin d''attirer davantage d''investissements
  et de stimuler l''intégration régionale et continentale en vue d''une croissance
  durable, d''une plus grande valorisation locale et de la création d''emplois décents
  et en nombre suffisant, notamment pour lutter contre le chômage des femmes et des
  jeunes, conformément à nos Objectifs de développement durable. Nous reconnaissons
  que la prise en compte de la vulnérabilité dans l''accès au financement est importante
  à cet égard. À cette fin, nous nous engageons à continuer de soutenir toutes les
  économies africaines dans leur développement, leur industrialisation, la diversification
  de leurs exportations et leur intégration dans les marchés régionaux. Nous réaffirmons
  notre soutien à la pleine opérationnalisation de la Zone de libre-échange continentale
  africaine (ZLECAf) en tant que principal moteur de la souveraineté économique et
  de la transformation industrielle de l''Afrique. Nous encouragerons le développement
  durable des chaînes de valeur afin de renforcer la capacité des industries locales
  à être compétitives sur les marchés régionaux et mondiaux, et permettre également
  par là-même de diversifier et de sécuriser les chaînes d''approvisionnement mondiales.
  Nous nous engageons en outre à promouvoir des normes internationales élevées en
  matière de qualité, de sécurité, de transparence et de durabilité dans les infrastructures,
  les biens et les services sur les marchés africains, tout en tenant compte des différentes
  situations nationales et niveaux de développement. Le respect de ces normes est
  essentiel pour atteindre les Objectifs de développement durable, protéger les consommateurs,
  renforcer les chaînes de valeur et soutenir la compétitivité à long terme des économies
  africaines. Nous nous félicitons de la prise de conscience croissante de l’importance
  de la dette sur l''investissement et le développement dans les pays africains. Nous
  sommes prêts à soutenir les nouveaux travaux et initiatives pour renforcer la transparence
  de la dette, soutenir une restructuration efficace de celle-ci le cas échéant et
  maintenir des financements de qualité et des fondamentaux macroéconomiques solides,
  afin de contribuer à élargir les marges de manœuvre budgétaires et à soutenir la
  croissance. Nous saluons les efforts en cours pour renforcer les liens entre dette,
  climat et nature, avec le soutien du 4P, en explorant des instruments financiers
  innovants, notamment, le cas échéant, les Clauses de résilience climatique (CRDC),
  le recours à des échanges « dette contre développement » en particulier portant
  sur de la dette commerciale obligataire ou encore d''autres outils de financements
  liés à des critères de durabilité. Ces mécanismes sont complémentaires des financements
  concessionnels et autres instruments, lorsque nécessaire. À cet égard, nous saluons
  le rôle des instruments concessionnels tels que l''Association internationale de
  développement (IDA) et le Fonds africain de développement (FAD) dans la fourniture
  de financements concessionnels efficaces, la promotion de la viabilité de la dette,
  l''investissement privé, le soutien aux États fragiles et le financement des priorités
  d''investissement nationales et régionales africaines. Ce partenariat doit intégrer
  les défis spécifiques des partenaires africains les plus pauvres et les plus vulnérables,
  qui sont confrontés à des chocs externes, à une marge de manœuvre budgétaire réduite,
  à un isolement géographique, à un accès limité aux marchés des capitaux et à des
  situations de conflit. Nous insistons sur l''importance de soutenir les populations
  vulnérables, notamment en reconnaissant que l''extrême pauvreté, le développement
  des jeunes enfants, la résilience face aux impacts du changement climatique, l''amélioration
  de la nutrition et de la sécurité alimentaire, la santé ainsi que l''accès à l''éducation
  et l''égalité entre les sexes sont des domaines où des efforts sont nécessaires
  pour permettre un avenir meilleur pour les prochaines générations. Pour donner vie
  à ce partenariat, nous affirmons la nécessité d''une action coordonnée et décisive
  aux niveaux mondial, régional et national. Nous réaffirmons notre engagement commun
  en faveur du développement durable, de la transformation économique et de la lutte
  contre le changement climatique et ses conséquences en Afrique, sans laisser personne
  de côté. Le paysage de la coopération internationale au développement se trouve
  à un tournant décisif, marqué par une fragmentation accrue, une contraction historique
  des ressources publiques et des défis mondiaux impérieux. Par conséquent, nous reconnaissons
  que l''APD doit être complétée par un engagement renouvelé en faveur de la coopération
  internationale au développement, fondé sur des partenariats mutuellement bénéfiques
  et dépassant le paradigme traditionnel de l''aide. Nous réaffirmons l''importance
  des financements concessionnels, essentiels pour financer les politiques de solidarité
  et répondre aux besoins fondamentaux dans les contextes les plus vulnérables, ainsi
  que notre soutien à l''APD, qui demeure un indicateur clé des efforts budgétaires
  des donateurs et du soutien concessionnel. Nous reconnaissons toutefois que la mobilisation
  des capitaux privés revêt désormais une importance encore plus cruciale et que l’APD
  ne rend pas compte de l''ensemble des flux financiers qui contribuent au développement
  des pays partenaires. Nous reconnaissons les travaux relatifs au Soutien public
  total au développement durable (TOSSD), qui vise à adopter la perspective des pays
  partenaires et offre une vision complémentaire des flux pertinents pour le développement.
  Nos partenariats doivent contribuer à mobiliser toutes les formes de financement
  du développement, qu’elles soient internationales ou nationales, publiques ou privées,
  y compris les sources innovantes, afin de renforcer l’autonomie et la souveraineté,
  en s’appuyant sur l’appropriation par les partenaires et à une échelle qui soit
  à la mesure des besoins du continent. Pour répondre à des besoins croissants, nous
  avons besoin d''une architecture financière africaine plus efficace, plus résiliente
  et plus inclusive, qui s''appuie sur un éventail plus large de bailleurs, concentre
  les ressources concessionnelles là où elles sont le plus nécessaires et aligne davantage
  l''ensemble des flux financiers sur les Objectifs de développement durable. À l''appui
  des politiques menées et financées au niveau national, les bailleurs doivent veiller
  à ce que les financements concessionnels ciblent les besoins les plus urgents et
  contribuent aux politiques de santé et de développement précoce ainsi qu''à la lutte
  contre l''extrême pauvreté. Nous soulignons que la mobilisation des financements
  privés nécessite, avant tout, d''améliorer la qualité des institutions, la préparation
  et la rentabilité des projets, l''environnement des affaires et le cadre macroéconomique,
  ainsi qu''une plus grande stabilité fiscale et juridique rendue possible par une
  gouvernance transparente. Nous soulignons également l''importance d''un environnement
  économique, commercial et financier international prévisible pour renforcer la confiance
  des investisseurs et permettre des investissements à grande échelle. Nous saluons
  les efforts visant à mieux évaluer l''impact des risques et des obstacles qui entravent
  l''investissement privé à grande échelle dans les marchés africains et émergents.
  Nous attendons avec intérêt les analyses complémentaires à venir en la matière,
  notamment provenant des travaux en cours de l''initiative 4P. Nous reconnaissons
  que le renforcement de la mobilisation des ressources intérieures publiques (MRIP)
  est un objectif essentiel pour financer le développement durable, améliorer le climat
  des affaires et instaurer la confiance. Nous reconnaissons que l''amélioration de
  la mobilisation des ressources intérieures ne doit pas seulement viser à renforcer
  le recouvrement des recettes auprès des acteurs économiques formels actuels, mais
  aussi contribuer à élargir l''assiette fiscale par la réduction du secteur informel,
  en tirant davantage parti de la numérisation et des technologies pour améliorer
  le recouvrement, simplifier les procédures et l''administration fiscale, renforcer
  la lutte contre l''évasion fiscale et les flux financiers illicites, améliorer l''efficacité
  et la transparence des dépenses, ainsi qu''en consolidant les marchés financiers
  nationaux et en adoptant des pratiques de gestion durable de la dette afin de créer
  un environnement propice à l''investissement privé. Nous reconnaissons également
  que le respect de ces conditions préalables n''est pas suffisant et que le continent
  est confronté à une contrainte spécifique sur l''allocation et la tarification des
  risques. Pour surmonter ce défi, des actions stratégiques seront nécessaires dans
  plusieurs domaines clés. Nous soulignons que la fragmentation et la concurrence
  entre institutions sont préjudiciables à une architecture efficace de financement
  du développement, et appelons tous les acteurs à travailler en tant que système
  et à veiller, chaque fois que possible, à la rationalisation, à l''interopérabilité
  et à la simplification des procédures. Premièrement, nous reconnaissons le rôle
  crucial que jouent les marchés de capitaux locaux s’ils sont plus profonds et les
  systèmes financiers et bancaires locaux s’ils sont plus solides en tant que facilitateurs
  essentiels pour favoriser les investissements privés. Nous soulignons la nécessité
  pour les pays africains d''améliorer leur accès aux mécanismes de garantie, aux
  financements concessionnels et aux investissements de long terme. Nous rappelons
  que le Fonds Monétaire International (FMI), en tant que principal acteur du filet
  mondial de sécurité financière, joue un rôle clé en Afrique à travers ses trois
  missions principales : la surveillance des politiques économiques et financières
  de ses membres, l''octroi d''un appui financier aux pays confrontés à des problèmes
  de balance des paiements, et le renforcement des capacités dans les domaines économique
  et financier. Nous saluons le rôle du FMI en Afrique. Nous saluons l''accent mis
  par le Groupe de la Banque mondiale sur la création d''emplois en Afrique, notamment
  en favorisant les infrastructures, en soutenant des politiques propices aux entreprises
  et en mobilisant des capitaux du secteur privé, notamment dans des secteurs clés
  tels que l''énergie et les infrastructures, l''agro-industrie, la santé, le tourisme
  et l’industrie manufacturière à forte valeur ajoutée. Nous saluons les partenariats
  sectoriels en cours tels que Mission 300 (M300), AgriConnect et l''Initiative africaine
  pour l''accès aux médicaments et leur fabrication (AIM2030), ainsi que le soutien
  aux entrepreneurs locaux à travers toute l''Afrique avec l''expansion des initiatives
  en faveur des champions locaux. Nous saluons la vision du Groupe de la Banque africaine
  de développement (BAD) visant à faire avancer la Nouvelle Architecture Financière
  Africaine pour le Développement en partenariat avec d''autres partenaires du développement,
  et nous nous félicitons d''un certain nombre d''autres initiatives prises pour renforcer
  le financement de l''Afrique, notamment : - un appel à (i) la BAD pour accroître
  son implication, sa coopération et ses synergies avec l’Assurance pour le développement
  du commerce et de l’investissement en Afrique (ATIDI), (ii) une plus grande implication
  des partenaires régionaux et non régionaux pour renforcer le bilan de l''ATIDI,
  comme le soutien de la BEI à l''expansion de la participation des pays africains
  à l''ATIDI, par exemple ; - un engagement conjoint continu pour accélérer le développement
  des marchés de capitaux locaux afin de mobiliser les capitaux nationaux et l''accès
  aux financements à long terme en monnaie locale, avec le déploiement de facilités
  concrètes en monnaie locale à cette fin, notamment une opération de co-financement
  croisé inédite de 100 millions d''euros entre la BOAD et Proparco, la collaboration
  entre la BERD et Proparco dans le cadre de l''initiative DELTA dans le contexte
  de la Plateforme d''action de Séville, et le partenariat en cours de développement
  entre la BOAD et la BERD. Cette dynamique est également renforcée par le lancement
  d''un programme d''emprunt en monnaie locale pouvant atteindre 500 millions de dollars
  entre la SFI et une grande banque commerciale africaine, visant à soutenir les opérations
  en monnaie locale de la SFI dans les pays d''opération de cette grande banque africaine
  ; - les travaux conjoints BAD-BERD sur une facilité intégrée pour les PME à forte
  croissance dans des secteurs africains clés, combinant dette structurée, quasi-fonds
  propres et un accompagnement ciblé en matière de conseil ; - des travaux supplémentaires
  pour renforcer la mobilisation des capitaux privés, notamment par le développement
  de solutions programmatiques et de portefeuilles – telles que la titrisation – et
  une plus grande standardisation pour renforcer la capacité des BMD à originer-partager/originer-distribuer
  leurs actifs à l’ échelle (afin de développer une véritable classe d’actifs « portefeuilles
  de BMD »), devant permettre in fine davantage d''investissements en Afrique. Deuxièmement,
  nous reconnaissons la nécessité d''augmenter les garanties de haute qualité et les
  mécanismes de rehaussement de crédit afin de réduire le coût du capital pour le
  secteur privé, notamment en ce qui concerne les technologies bas-carbone, en vue
  d''attirer les investisseurs à long terme. Au niveau multilatéral, nous saluons
  l''initiative portée par le Groupe de la Banque mondiale et sa plateforme de garanties
  hébergée à l''Agence multilatérale de garantie des investissements (MIGA), visant
  à simplifier l''accès aux garanties financières pour les projets de développement
  dans les marchés émergents via un guichet unique. Nous encourageons une ambition
  accrue pour développer l''émission de garanties, notamment en augmentant le soutien
  à l''Afrique en vue d''atteindre jusqu''à 6,4 milliards de dollars d''émissions
  annuelles d''ici 2030 par la plateforme de garanties du Groupe Banque mondiale.
  Nous encourageons tous les acteurs en mesure de le faire à accorder davantage de
  garanties et de rehaussements de crédit. La mobilisation de l''investissement privé
  est essentielle, et nous saluons les progrès réalisés grâce à la base de données
  mondiale sur les risques des marchés émergents (GEMS), cogérée par la BEI et l''IFC,
  pour améliorer l''évaluation des risques et la transparence des investissements,
  notamment en Afrique. Nous saluons également le lancement de l''Initiative mondiale
  pour les obligations vertes, une initiative Global Gateway et Team Europe (BEI,
  BERD et plusieurs institutions financières de développement européennes) visant
  à soutenir le développement des marchés d''obligations vertes dans les économies
  émergentes et en développement. Au niveau régional, nous prenons note de la cartographie
  menée par le Groupe de la Banque africaine de développement (BAD) pour identifier
  les lacunes dans l''architecture financière pour l''Afrique. Nous soutenons les
  efforts visant à construire un système plus intégré et plus efficace, qui s''appuie
  sur les institutions et ressources financières du continent africain. Nous prenons
  également acte de la proposition de la BAD de mobiliser des droits de tirages spéciaux
  vers (ou via) les BMD, et nous encourageons les pays en mesure de le faire à envisager
  cette possibilité. À cet égard, nous saluons l''intention de la BAD de contribuer
  à combler les lacunes de l''architecture actuelle de garanties en Afrique, d''une
  manière qui complète les instruments et institutions existants et évite les doublons.
  Nous soutenons le rôle de l''ATIDI en tant que plateforme panafricaine d''atténuation
  des risques visant à renforcer et à mieux adapter la couverture des risques, à favoriser
  la coordination entre acteurs et à renforcer l''appropriation africaine dans la
  mobilisation des investissements privés. Au niveau national, nous reconnaissons
  le rôle pivot des banques publiques de développement dans l''effet d''entraînement
  sur le financement privé. Nous soutenons le renforcement des capacités des banques
  de développement nationales et régionales africaines afin qu''elles jouent pleinement
  leur rôle dans le financement du développement du continent. Nous saluons la collaboration
  entre MIGA, le réseau Finance en Commun (FiCS) et le Club International de Finance
  pour le Développement (IDFC) en vue de déployer une plateforme de garanties au profit
  des banques publiques de développement, afin d''élargir leur capacité à mobiliser
  des capitaux privés. Nous nous engageons également à développer des plateformes
  nationales, ou d''autres mécanismes de coordination, soutenus par des partenaires
  nationaux, régionaux et multilatéraux, afin de mobiliser davantage de capitaux privés
  pour le financement des infrastructures et services essentiels. Ces plateformes
  nationales nécessitent l''appropriation par les gouvernements, une vision stratégique
  et des priorités communes, ainsi que des partenariats visant à favoriser la collaboration
  entre les partenaires du développement et à garantir la capacité du système de financement
  du développement à fonctionner à grande échelle, par exemple grâce à des plateformes
  de réduction des risques.'
