title: Nairobi Declaration for Peace and Security in Africa.
text: 'Gathered on the occasion of the Africa Forward Summit segment dedicated to
  peace and security issues on 12 May 2026 in Nairobi; Considering that global instability,
  challenges to multilateral ism and international law and intensifying competition
  between powers threaten peace, security and sustainable development in Africa; The
  French and Kenyan Co-Presidents as well as the participating Heads of State and
  Government reaffirm the following principles: - They recall their conviction that
  an effective and inclusive multilateralism, based on international law and the Charter
  of the United Nations, and expressed by the African Union and African sub-regional
  organizations at the continental level, are constitutive of a lasting state of peace.
  - They defend a renewed global governance, capable of responding to the challenges
  of the 21st century. They recognize the urgent need for a comprehensive reform of
  the UN Security Council to make it more effective and representative, in line with
  the objectives of the Common African Position, including the Ezulwini Consensus
  and the Sirte Declaration, and reaffirm their determination to work together to
  this end. - They affirm that the responsible use of the veto helps to strengthen
  the credibility and moral authority of the UN Security Council, and call upon the
  permanent members of the Security Council to refrain from using the veto in case
  of mass atrocities, when crimes of genocide, crimes against humanity and war crimes
  on a large scale are committed. - They support African peace operations and call
  for the implementation of UN Security Council Resolution 2719, without prejudice
  to the primacy of the Security Council, to ensure its operationalization and adequate,
  predictable and sustainable funding. - They support the capacity building of African
  armies while respecting the principle of sovereignty, and the African peace and
  security architecture on which the stability of the continent is based. - They reject
  external interferences which undermine the quest to realize the aspirations of the
  AU Agenda 2063, and the privatization of security, in line with the relevant OAU/AU
  statutes on the elimination of mercenarism in Africa. - They reaffirm that Africans
  must remain the main stakeholders in mediations on the crises that affect them and
  recall the centrality of the African Union, Regional Economic Communities and Regional
  Mechanisms (RMs) to offer an inclusive mediation platform and build a lasting peace.
  - They reaffirm the primacy of negotiated political solutions based on respect for
  international law, sovereignty and territorial integrity of States, for the settlement
  of crises. They reaffirm their commitment to respect international humanitarian
  law in armed conflicts affecting the region and call on all states to join the global
  initiative to revitalize political commitment to international humanitarian law.
  - They express their deep concern about the continuing threat of terrorism and violent
  extremism on the continent and our solidarity with the people who are victims of
  it. They underline the importance of a comprehensive approach, combining security
  measures and political, social and economic responses to sustainably address these
  phenomena. - They recall that in the face of crises, humanitarian aid remains essential
  to respond to emergencies and protect the most vulnerable populations, inclusive
  mediations make it possible to restore dialogue, prevent the escalation of tensions
  and promote durable solutions and financing for development is a key lever to sustainably
  address the root causes and strengthen resilience. - They call for the strengthening
  of institutional capacities and collective security mechanisms to address ongoing
  conflicts in Sudan, South Sudan, the Great Lakes region, Somalia and the Sahel region
  through the cessation of hostilities, inclusive dialogue, counter-terrorism, capacity
  building and regional stabilization. - They underline the link between security
  and inclusive economic growth, youth empowerment, education, climate resilience
  and diaspora engagement.'
