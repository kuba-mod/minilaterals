title: Communiqué du Conseil de planification écologique.
text: 'Le Président de la République a réuni aujourd’hui le 5ème Conseil de planification
  écologique du quinquennat. En présence du Premier ministre et de 10 Ministres, le
  Conseil a fait le bilan de la planification écologique, des progrès réalisés et
  décidé de nouvelles mesures. Le Président de la République et le Premier ministre
  ont réaffirmé l’importance de la méthode de planification, de son pilotage transversal
  avec l’appui du Secrétariat général à la planification écologique (SGPE), et du
  concours de tous les ministères sur l’ensemble des secteurs pour atteindre les objectifs
  de la France en matière de décarbonation et d’électrification, d’économie circulaire,
  de protection des ressources ou encore d’adaptation. Ils ont rappelé que la transition
  telle que mise en œuvre en France devait permettre la décarbonation, des opportunités
  industrielles et économiques et une indépendance plus forte pour notre pays. Ils
  ont invité l’ensemble du Gouvernement à renforcer la mise en œuvre concrète de la
  transition pour tous les Français. Dans le contexte de guerre au Proche et Moyen-Orient
  et de forte fluctuation des cours du pétrole à des niveaux très élevés, les engagements
  de décarbonation de la France lui permettent également de gagner en souveraineté.
  Ainsi, en électrifiant nos industries, nos véhicules et nos bâtiments grâce à une
  électricité à 95 % décarbonée produite sur notre territoire, notre pays réduira
  sa facture énergétique de 20 à 40 milliards d’euros d’ici 2030. Grâce à une politique
  assumée de préférence européenne qui porte ses fruits, la transition écologique
  contribue à accélérer la réindustrialisation du pays : la part de marché pour les
  véhicules électriques augmente fortement ces derniers mois et les véhicules électriques
  neufs achetés en France sont ainsi deux fois plus produits sur le territoire que
  pour les autres motorisations. C’est aussi le sens des investissements de France
  2030 dans le domaine de la décarbonation. Parce que l’économie circulaire doit également
  devenir un levier d’industrialisation et de souveraineté, le Conseil a validé le
  lancement du plan Plastique , traduction opérationnelle de la refondation des filières
  à responsabilité élargie du producteur (REP) vers une approche industrielle. Il
  permettra d’accélérer l’éco-conception des emballages, de renforcer les capacités
  industrielles de collecte, de tri et de recyclage, de déployer le réemploi, et d’accompagner
  l’atteinte des objectifs européens de 55 % de recyclage des emballages plastiques
  en 2030, (90 % pour les bouteilles). La consigne pourra faire partie des leviers
  d’action à mobiliser. Dans ce cadre, le Président de la République a demandé au
  Gouvernement, sous l’autorité du Premier ministre, d’engager les concertations pour
  définir les actions concrètes, parmi lesquels figure la consigne, qui permettront
  d’atteindre l’objectif de recyclage en 2030. Dès les prochains jours, le Ministre
  délégué chargé de la Transition écologique réunira les collectivités et les industriels
  afin d’identifier les moyens et le calendrier de mise en œuvre. Concernant le réemploi,
  le Conseil national de l’économie circulaire est saisi d’une mission pour fixer
  des objectifs clairs à six filières stratégiques. Cet exercice sera suivi des Assises
  du réemploi à la rentrée, manifestation qui sera reconduite annuellement. Ce CPE
  a été l’occasion de dresser le bilan de la planification écologique en matière d’atténuation.
  Les émissions de gaz à effet de serre ont baissé d’environ 100 millions de tonnes
  de CO2 par an entre 2017 et 2025, soit autant que ce qui avait été fait entre 1990
  et 2017. Nous devons toutefois accélérer le rythme : un effort équivalent reste
  à faire en moins de quatre ans, alors que la baisse a ralenti en 2024 et 2025. Pour
  doter la France d’un cap clair en vue de réduire ses émissions, la dernière phase
  de consultation publique sur la 3ème stratégie nationale bas carbone sera lancée
  dans les prochains jours. Le développement des énergies renouvelables dans les territoires
  ultra-marins est également fortement accompagné par l’État afin d’accélérer leur
  souveraineté énergétique et la décarbonation de l’énergie, à partir de solutions
  adaptées aux potentiels locaux. L’aide de l’État a ainsi été augmentée à 20 M€ par
  projet pour faciliter les recherches exploratoires en vue de développer de nouvelles
  centrales géothermiques. Le respect de la neutralité technologique , auquel la France
  a beaucoup travaillé au cours des dernières années et qui est désormais effectif
  au plan européen, permet, aux plans tant réglementaire que financier, de redonner
  toute sa place à l’énergie nucléaire. La France poursuivra la promotion de la neutralité
  technologique au niveau européen qui constitue également un élément majeur en faveur
  de l’électrification de l’Europe. Le Conseil a fait le point sur le déploiement
  du plan d’électrification , notamment sur les 100 territoires pilotes que le Premier
  ministre a demandé aux préfets d’identifier d’ici l’été (circulaire du Premier ministre
  du 12 mai 2026). Ils bénéficieront d’un suivi renforcé pour préparer la sortie du
  gaz et du fioul comme modes de chauffage ou encore appuyer l’installation de bornes
  de recharge pour véhicules électriques. Un point détaillé sur l’avancement du plan
  et sur les engagements du secteur privé ainsi que les outils de suivi du plan seront
  annoncés dans les prochains jours. Au-delà de l’électrification, l’ensemble des
  modes de transport sont engagés dans l’effort de décarbonation et de souveraineté
  énergétique. Le projet de loi-cadre relatif au développement des transports adopté
  au Sénat en première lecture le 28 avril marque une avancée majeure pour la définition
  d’un nouveau modèle de financement des infrastructures pour soutenir notamment le
  report modal et la transition vers des mobilités moins carbonées. Avec le lancement
  le 2 avril dernier de l’appel à projets pour la décarbonation du transport maritime,
  la France devient le tout premier État européen à affecter une partie des recettes
  du marché carbone européen étendu au maritime. Pour verdir l’aviation civile et
  réduire les dépendances aux importations de carburéacteur, le Conseil rappelle l’ambition
  de porter au niveau européen, le soutien au développement d’une filière de production
  de carburants d’aviation durables et la création d’un mécanisme pour limiter les
  reports de trafic et les fuites de carbone vers des hubs extra-européens. Pour adapter
  les stratégies nationales aux particularités de chaque territoire, 17 COP (conférences
  des parties) régionales ont eu lieu en 2025, avec près de 12 000 participants .
  Les départements se sont massivement mobilisés via les COP sur l’adaptation. L’objectif
  désormais est d’accélérer les projets concrets locaux. L’État accompagne les collectivités
  dans leur transition, via le Fonds vert, ses dotations d’investissement, le Fonds
  Barnier ou encore ses opérateurs, qui sont au plus près de leurs enjeux. Il met
  et continuera à mettre à leur disposition de nouvelles données pour les aider à
  anticiper des conséquences du changement climatique et aménager leur territoire
  en conséquence. Il lancera ainsi dans les prochaines semaines le site « Le littoral
  de ma commune » et, avant la fin de l’année, le portail national des impacts du
  changement climatique et la carte nationale des inondations. Pour accompagner plus
  efficacement les collectivités, le Conseil a décidé de faire du préfet l’interlocuteur
  unique pour les demandes d’ingénierie et de financement des collectivités territoriales,
  et de proposer un accompagnement aux 35 000 maires récemment élus, en présentiel
  et dès le mois de septembre, pour présenter les priorités de l’État en matière de
  planification écologique et les offres d’accompagnement associées. Une contractualisation
  renouvelée entre l’État et les collectivités infrarégionales sera mise en place
  dès 2026, qui permettra la cohérence des investissements soutenus par l’État avec
  la planification écologique. De plus, un nouveau cycle de COP territoriales sera
  lancé d’ici la fin du mois, centré notamment sur la préparation des futurs contrats.
  L’offre numérique d’accompagnement des collectivités sera par ailleurs rationalisée,
  notamment par le biais d’un point d’entrée unifié pour l''instruction de leurs projets.
  Le renforcement de notre souveraineté repose aussi sur notre capacité à protéger
  nos ressources naturelles. Les forêts françaises, qui captent 63 millions de tonnes
  de CO₂ par an, sont aujourd’hui menacées par le changement climatique, avec une
  surmortalité des arbres et plus de 1 million d’hectares de forêts en état de dépérissement.
  Plus de 400 M€ ont été investis par l’État depuis 2021 pour assurer le renouvellement
  forestier. Un plan de protection de la forêt et de relance de la filière bois, dont
  le déficit commercial est de 7,2 Md€ en 2025, est en cours d’élaboration par la
  Ministre de la transition écologique. Notre biodiversité bénéficie également de
  mesures de protection ambitieuses. La France a ainsi protégé plus de 30 % de son
  territoire terrestre et marin, et vise 10 % en « protection forte ». De même, la
  protection de la qualité des eaux littorales contribue au double objectif de protection
  de la santé des écosystèmes et de préservation des conditions des activités économiques
  dépendantes de ce milieu fragile. Pour protéger notre santé, il est indispensable
  de continuer à améliorer la qualité de de l’eau, de l’air, des sols. En 2026, de
  nouvelles mesures sont prises, en particulier l’interdiction des PFAS pour vêtements
  et cosmétiques, une redevance incitant les industriels à trouver des solutions de
  substitution, et de nouvelles règles pour la gestion des boues d’épuration. En outre,
  à la suite du Sommet « One Health » le 7 avril 2026 à Lyon, la France s’est engagée
  à lancer une nouvelle stratégie « Une seule santé ». Après le Covid, l’hantavirus
  nous rappelle le lien entre santé animale, santé humaine et biodiversité et la nécessité
  d’une telle stratégie. Ces cinq dernières années, l’État a accompagné plus fortement
  la transition des ménages, des entreprises et des collectivités. Son soutien budgétaire
  a augmenté de 25 %, et a permis de rendre la transition plus accessible. En dix
  ans, le reste à charge d’un ménage modeste qui rénove son logement a été divisé
  par deux, et le véhicule électrique est devenu plus rentable qu’un véhicule thermique.
  L’accélération de la rénovation et de l’adaptation à la transition des logements
  sociaux en outre-mer est encouragée par un crédit d’impôt spécifique à hauteur de
  40 % des travaux. Pour renforcer le soutien à la transition, l’État a réorienté
  les certificats d’économies d’énergies pour soutenir l’électrification. Le défi
  étant de réduire le déficit budgétaire tout en préservant les soutiens les plus
  efficients, l’État s’est doté d’une stratégie de financement de la transition écologique.
  Elle sera actualisée et consolidée en 2026 et fera office de cadrage économique
  pour décarboner la France. La transition écologique doit être un facteur de création
  d’emploi et de souveraineté, en permettant l’émergence de production décarbonée
  et la modernisation de nos industries. Dans ce cadre, la France assume de porter
  la préférence européenne dans l’ensemble des politiques publiques afin de favoriser,
  partout où c’est pertinent, la production sur le sol européen. C’est également essentiel
  pour sortir des dépendances critiques encore trop nombreuses en Europe, comme le
  montre la crise du détroit d’Ormuz. À cet égard, la proposition législative de la
  Commission européenne visant à créer en Europe un « accélérateur industriel », qui
  doit encore être améliorée, est un premier pas. La France conserve également une
  ambition forte sur l’électrification comme levier de croissance et de souveraineté
  dans la révision du paquet automobile, ou encore sur l’incitation à la décarbonation
  dans la révision du marché des quotas carbone, dans laquelle la France défend des
  ajustements ciblés pour les grands secteurs industriels qui ont des projets de décarbonation
  (acier, chimie, engrais) et en mobilisant des leviers tels que l’évolution des référentiels
  et des quotas gratuits. La mise en œuvre du mécanisme d’ajustement carbone aux frontières
  (MACF) et son renforcement, adaptés à nos territoires d’outre-mer, représentent
  un complément indispensable pour assurer que les importateurs paieront un prix du
  carbone équivalent à celui payé par les industriels européens. De nouvelles mesures
  sont attendues de la part de la Commission européenne sur ces enjeux majeurs. Au
  niveau international, la France porte un changement de méthode sur les COP climat
  pour que les financements soient conditionnés à un renforcement des engagements
  des autres parties. Dans un contexte difficile pour l’action multilatérale sur l’environnement,
  le G7 environnement a adopté sept déclarations et a permis des avancées sur le financement
  de la biodiversité et la santé environnementale. Enfin, alors que les certitudes
  de Français sur l’origine humaine du réchauffement climatique reculent et que les
  faits scientifiques sont attaqués, préserver les bases d’un débat démocratique sain
  sur la transition écologique est essentiel. Un plan national pour l’accès à l’information
  sur l’environnement et le climat sera présenté cet été et le Haut Conseil pour le
  Climat mènera une mission sur la place du fait scientifique et de la parole des
  scientifiques dans le débat public en matière de transition au second semestre.'
