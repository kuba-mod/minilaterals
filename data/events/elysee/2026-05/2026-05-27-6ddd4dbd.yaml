date: '2026-05-27'
type: press_release
source_name: elysee
title: Entretien avec Jonas Gahr Støre, Premier ministre du Royaume de Norvège.
text: Le Président de la République a reçu le Premier ministre du Royaume de Norvège,
  Jonas Gahr Støre, mercredi 27 mai 2026 au Palais de l’Élysée. Cette visite s’inscrit
  dans la continuité du partenariat stratégique global signé entre la France et la
  Norvège le 25 juin 2025 et illustre le renforcement de la coopération entre les
  deux pays dans les domaines de la défense, de l’énergie, de l’espace et des industries
  stratégiques. Les échanges ont porté en particulier sur le renforcement de la coopération
  entre nos pays en matière de défense . Ont été aussi évoqués les sujets spatiaux
  , en particulier en matière satellitaire, alors que la Norvège vient d’intégrer
  le programme européen Iris2 , et en vue du Sommet spatial des 9 et 10 septembre
  prochains. Les dirigeants ont aussi abordé les questions énergétiques et les coopérations
  industrielles , en particulier dans le champ des matières premières critiques. Cet
  entretien a permis aussi d’évoquer le renforcement des coopérations entre l’Union
  européenne et la Norvège . Le Président de la République a rappelé son attachement
  au renforcement de la base industrielle et technologique européenne et à une approche
  fondée sur la préférence européenne . Enfin, les principaux sujets internationaux
  ont été abordés, tels que la guerre d’agression russe contre l’Ukraine, la situation
  au Moyen-Orient et les enjeux de sécurité dans l’Arctique. Merci beaucoup et félicitations
  à nos ministres. Monsieur le Premier ministre, cher Jonas, Mesdames, Messieurs les
  ministres et les ambassadrices et ambassadeurs, Mesdames, Messieurs, je veux d'abord
  remercier Monsieur le Premier ministre pour sa visite qui nous permet d'avancer
  un an après la visite que j'avais effectuée à Oslo, à l'occasion de laquelle nous
  avons élevé notre relation au niveau de partenariat stratégique global. Nous posons
  aussi à l'occasion de votre visite les bases d'une accélération de cette coopération.
  Je veux vous dire ici combien la France est attachée aux liens d'amitié et de confiance
  qui unit nos deux États depuis 120 ans et nos nations et nos peuples depuis bien
  plus longtemps encore. La Norvège est aujourd'hui un partenaire précieux et incontournable
  pour la sécurité collective des Européens et des Français. Elle l'est aussi pour
  notre transition comme pour la résilience énergétique de l'Europe. Je suis très
  fier de constater les avancées effectuées en commun depuis la signature de notre
  partenariat stratégique en juin dernier donc à Oslo en matière de sécurité et de
  défense, de minerais et de métaux critiques, de spatial, d'intelligence artificielle,
  de quantique, d'exploration de grands fonds marins, d'énergie renouvelable, de décarbonation,
  etc. Tout d'abord, c'est un développement majeur et je veux aussi me réjouir de
  la visite et de cette signature. C'est le renforcement de nos liens en matière de
  défense et de sécurité. Je veux ici dire combien nous avons appris l'un de l'autre
  ces dernières années, tout particulièrement, et combien l'impulsion que vous avez
  donnée, M. le Premier ministre, les choix que vous avez faits sont pour nous déterminants
  et viennent d'être consacrés à l'instant mais c'est aussi dans la durée que nous
  allons pleinement collectivement les mesurer. M. le Premier ministre, vous avez
  donné votre accord pour que la Norvège rejoigne ce que nous avons appelé la dissuasion
  nucléaire avancée, lors du discours de l'Île-Longue. C'est une étape très importante
  de notre partenariat et ce sera le moteur d'une coopération très ambitieuse. C'est
  une exigence réciproque que nous fixons au bénéfice de notre sécurité collective
  en Europe. La Norvège, partenaire géographique et stratégique clé avec laquelle
  nous avions déjà des coopérations importantes pour assurer la protection du territoire
  allié face aux menaces extérieures, représentera une forte valeur ajoutée pour cette
  dissuasion avancée. Rappelons en effet dans le secteur de la défense que les coopérations
  sont intenses et qu'au fond cette dissuasion avancée vient consacrer déjà une intimité
  stratégique capacitaire. Les escales toujours plus nombreuses de notre marine nationale
  en Norvège, 20 pour le premier trimestre 2026, témoignent de la qualité du soutien
  des forces norvégiennes mais aussi de l'engagement de la France pour la sécurité
  nordique et arctique qui s'est encore renforcé depuis le début de l'année dernière.
  Sur l'année écoulée, la présence de nos moyens navals a été multipliée par trois
  en Norvège et dans la région et je salue la forte dimension opérationnelle de notre
  coopération entre armées avec par exemple le premier déploiement de chasseurs de
  l'armée de l'air en Norvège au mois de décembre 2025. Je veux aussi saluer ici l'engagement
  constant de la Norvège en soutien à l'Ukraine agressée et le rôle clé de votre pays
  Monsieur le Premier ministre au sein de la coalition des volontaires, les montants
  investis, la capacité aussi à penser dans tous les domaines justement de cet effort
  de résistance. Alors que notre continent fait face à des menaces renouvelées, il
  était de notre devoir d'accélérer cette coopération et c'est tout le sens de l'arrangement
  dit de Narvik qui vient d'être signé. Nommé en hommage aux soldats français tombés
  dans les fjords de Narvik lors de cette première grande victoire alliée le 28 mai
  1940 pour faire reculer l'occupant nazi auxquels ont répondu en 1944 les soldats
  norvégiens qui ont contribué à la libération de la France et de l'Europe. Cet accord
  donc que nous venons de signer prévoit désormais un principe d'assistance mutuelle
  entre nos deux pays. Il institue des dialogues réguliers à tous les niveaux entre
  nos armées, il prévoit un renforcement de la coopération dans plusieurs grands domaines
  clés, défense antiaérienne, arctique, grand nord, spatial. Il formalise enfin notre
  coopération de long terme au soutien à l'Ukraine. Dans un moment de réveil stratégique
  indispensable à l'Europe, ce renforcement historique de notre coopération de défense
  viendra soutenir nos ambitions pour la défense européenne. Vous le savez la France
  a œuvré au renforcement des instruments européens de soutien à la base industrielle
  et technologique de défense et nous avons toujours veillé à la bonne intégration
  de la Norvège dans ces mécanismes et je veux ici vous redire vraiment ma gratitude
  et le respect que les armées françaises ont pour vos armées et la qualité de la
  coopération et la profonde transformation stratégique que nous sommes en train de
  faire. Évidemment nous aborderons ensuite dans un instant avec Monsieur le Premier
  ministre beaucoup d'autres sujets, la situation en Ukraine plus largement et l'effort
  de résistance, l'admirable résistance ukrainienne, la situation au Moyen-Orient,
  notre soutien à la souveraineté, l'intégrité territoriale du Liban, à la solution
  des deux états, aujourd'hui plus que jamais menacée et la crise nous oblige à continuer
  de travailler ensemble et je veux dire combien sur ces sujets nous sommes affinitaires.
  Notre partenariat comme je l'évoquais rapidement ne se limite pas aux aspects militaires
  et diplomatiques. En matière d'industrie verte nous mobilisons des solutions nouvelles
  pour réduire justement les gaz à effet de serre et continuer d'avancer. Je veux
  saluer à ce titre l'attribution récente du projet de parcs éoliens offshore d'Utsira
  Nord à EDF Power Solutions associé à son partenaire norvégien Deepwind Offshore
  . L'approfondissement aussi de notre coopération sur la capture et le stockage de
  carbone dans la droite ligne de l'accord que nous avons signé il y a un an et qui
  sert aussi nos engagements climatiques dans des secteurs aujourd'hui difficiles
  à décarboner. Je pense à Total Énergie, Air Liquide, EDF. Je me réjouis également
  du renforcement de notre coopération en matière de minerais critiques grâce à la
  signature d'une déclaration d'intention spécifique en mars dernier. Cette coopération
  est déjà opérationnelle et je tiens à saluer l'investissement de nos industriels
  qui en sont les forces motrices. Plusieurs projets industriels ont ainsi vu le jour
  avec Eramet et Stellantis ou avec Equinor en France et qui se développent dans le
  lithium ou d'autres. Nous souhaitons aussi renforcer nos coopérations dans le domaine
  spatial et je me réjouis à cet égard de la participation de la Norvège au sein du
  programme Iris2 de connectivité satellite de l'Union européenne et je sais que vous
  serez aussi un acteur clé du sommet spatial qui se tiendra le 9 et 10 septembre
  prochains et qui nous permettra d'avancer sur plusieurs autres projets industriels.
  Au fond, nous avons la même relation au monde. Nous continuons de croire dans une
  décarbonation qui permet l'innovation et la compétitivité. Nous défendons la souveraineté
  de l'Europe du Pôle à l'Ukraine et nous sommes pour le respect du droit international.
  La souveraineté des nations c'est immense mais nous mettons des moyens, des capacités,
  des investissements derrière ces convictions communes. C'est pourquoi votre visite
  aujourd'hui signifie beaucoup Monsieur le Premier ministre et je voulais vous dire
  toute la gratitude pour celle-ci, ma reconnaissance pour votre engagement et l'alliance
  indéfectible scellée avec la France aujourd'hui. Je vous remercie. Merci beaucoup
  et félicitations à nos ministres. Monsieur le Premier ministre, cher Jonas, Mesdames,
