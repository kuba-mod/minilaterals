title: Declaration of the Nuclear Alliance.
text: We, the Governments of Belgium, Bulgaria, Croatia, Czechia, Finland, France,
  Hungary, Italy, Netherlands, Poland, Romania, Slovakia, Slovenia, Sweden, Members
  of the Nuclear Alliance REAFFIRM our strong commitment to developing and deploying
  nuclear energy, in full respect of each Member States’ right to determine their
  own energy mixes, as a key component of our decarbonisation, competitiveness and
  energy security strategies, taking into account safety, security and safeguards.
  Nuclear energy is key pillar of the EU’s electricity mix. Beyond providing low carbon
  and reliable electricity and heat, nuclear energy offers a valuable complement to
  intermittent renewable energy sources. In addition, nuclear energy plays a key role
  in supporting the stability of our electricity grids by bringing inertia to the
  system, while also helping to reduce the substantial investments required to make
  our grids future-proof. RECALL the recognition of nuclear energy technologies as
  net-zero technologies in the EU Net-Zero Industry Act and the recent adoption of
  the revised EU Climate Law, which recognises the principle of technological neutrality
  as a key element of our EU-wide decarbonisation strategy, and CALL for further inclusion
  of this principle in all relevant legislative and non-legislative proposals relating
  to the climate and energy framework, including the upcoming Strategy for Clean Energy
  Investments, as well as the EU’s state aid rules and Multiannual Financial Framework.
  WELCOME the European Commission’s update of its Nuclear Illustrative Programme (PINC),
  which confirms that nuclear energy plays and will continue to play an important
  role in the EU’s energy system. The updated PINC also highlights the significant
  investments required both to maintain existing nuclear capacity, including the safe
  extension of the operational lifetime of current reactors, and to develop new projects,
  including small modular reactors, which are essential to meet growing and evolving
  energy demand while ensuring the stability and resilience of our power systems.
  The PINC is not merely a forward-looking assessment. Under the Euratom Treaty, it
  sets out objectives and identifies the investments needed to achieve them, which
  must now be translated into concrete implementation. CALL upon the European Commission
  to play its part in identifying ways to improve nuclear projects’ access to relevant
  EU funds and financing instruments, such as the “InvestEU” instrument, preventing
  any unjust exclusions. We also CALL upon the European Commission to contribute to
  accelerating nuclear state aid notification procedures, while ensuring greater legal
  certainty, predictability and consistency in the application of state aid rules
  for nuclear projects, and allowing the tailor-made approach required for such capital-intensive
  instruments. REAFFIRM that, in the context of our ongoing negotiations on the next
  EU Multiannual Financial Framework (MFF), but also without prejudice to these negotiations,
  the principle of technological neutrality will remain an important consideration
  for our Member States in the design and practical implementation of the framework.
  We should ensure that the future MFF respects this principle and allows for fair
  treatment of nuclear energy projects, focusing on those that deliver EU-wide benefits
  thereby signalling our political support and providing the necessary predictability
  and confidence to mobilise investment at scale. We recognise the importance of an
  effective combination of public support and private financing in ensuring the successful
  delivery of nuclear projects, on our decarbonisation pathway. REAFFIRM that the
  new MFF, without prejudice to ongoing negotiations, should be able to support nuclear
  projects, focusing on those that bring a European added value, in line with the
  EU’s industrial competitiveness policy, Net Zero Industry Act, and Clean Industrial
  Deal. As such, we CALL upon the European Commission and encourage EU Member States
  to support projects that will strengthen the EU industrial capacities and capabilities
  and will mobilise the EU supply chain, as well as to increase nuclear power plant
  capacities, while remaining open to cooperation and strategic partnerships. This
  is essential to ensure that the EU strengthens its clean industrial capacities and
  supply chains, as well as to secure the technologies it needs for transitioning
  to a climate-neutral society and resilient economy, while safeguarding its competitiveness.
  COMMEND the launch by the European Commission of the EU Industrial Alliance for
  Small Modular Reactors (SMRs) and the role it plays in supporting our nuclear industry.
  CALL upon the European Commission to continue its engagement through its initiatives
  for nuclear skills, training, research and innovation, as well as through ambitious
  industry policies for nuclear power projects. UNDERLINE the importance of accelerating
  the industrial deployment of SMR technologies in Europe, ensuring that European
  industry remains at the forefront of innovation and manufacturing. COMMEND the mobilisation
  of investments by the European Investment Bank (EIB) to support nuclear energy projects
  in Europe, thereby strengthening investor confidence and the mobilisation of private
  capital. COMMEND the EIB’s recognition of the role of nuclear energy projects, both
  large-scale, small modular and advanced reactors, as net-zero energy projects, in
  our fight against climate change and CALL for this recognition to be duly reflected
  in the EIB’s climate objectives when it leads to emissions reduction. We further
  CALL upon other European institutional and private financial institutions to update
  their classification of nuclear energy projects accordingly, and upon the Commission
  to continue refining the EU Taxonomy framework on the basis of scientific evidence
  and taking into account the schedules of the nuclear investments implemented in
  the EU. CALL upon the EIB to maintain and reinforce its role in supporting the EU’s
  nuclear energy sector and industry through appropriate financing instruments and
  guarantees. In particular, the EIB has an important role to play to support the
  de-risking of nuclear innovation and production capacities, including the development
  of innovative nuclear reactors, such as small and advanced modular reactors, the
  maintenance, modernisation, lifetime extension/long-term operation and further development
  of our conventional nuclear power fleet, and the deployment of the nuclear fuel
  cycle infrastructure needed to support our nuclear energy ambitions. This is key
  to ensure that the EU maintains its capabilities and the competitiveness of its
  domestic industry. COMMEND that full consideration be given to economic and technical
  advantages provided by nuclear technology for the grid system and its contribution
  to a resilient Energy Union. In order to de-risk nuclear projects, system services
  and overall system costs should be fully recognized.
