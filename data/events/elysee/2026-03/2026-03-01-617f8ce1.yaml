title: Joint Statement by the Leaders of France, Germany and the United Kingdom on
  indiscriminate Iranian attacks on countries in the region.
text: The Leaders of France, Germany and the United Kingdom are appalled by the indiscriminate
  and disproportionate missile attacks launched by Iran against countries in the region,
  including those who were not involved in initial US and Israeli military operations.
  Iran’s reckless attacks have targeted our close allies and are threatening our service
  personnel and our civilians across the region. We call on Iran to stop these reckless
  attacks immediately. We will take steps to defend our interests and those of our
  allies in the region, potentially through enabling necessary and proportionate defensive
  action to destroy Iran’s capability to fire missiles and drones at their source.
  We have agreed to work together with the US and allies in the region on this matter.
