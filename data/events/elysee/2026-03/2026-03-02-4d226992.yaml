title: Joint declaration of President Macron and Chancellor Merz.
text: In the spirit of their close partnership as set out in Article 4 of the Treaty
  of Aachen, France and Germany have decided to enter into closer cooperation in the
  field of deterrence in response to the evolving threat landscape. France and Germany
  have established a high-ranking nuclear steering group that will act as a bilateral
  framework for doctrinal dialogue and the coordination of strategic cooperation,
  including consultations regarding the appropriate mix of conventional, missile defence
  and French nuclear capabilities. France and Germany have agreed to take first concrete
  steps beginning this year, including German conventional participation in French
  nuclear exercises and joint visits to strategic sites as well as development of
  conventional capabilities with European partners. France and Germany will also increase
  their ability, as Europeans, to manage escalation beneath the nuclear threshold
  – in particular in the fields of Early Warning and Air Defense and Deep Precision
  Strike. This Franco-German cooperation is based on the shared understanding that
  the nuclear dimension of deterrence remains a cornerstone of European security,
  relying on US extended deterrence, including US nuclear weapons forward-deployed
  to Europe, and on the independent strategic nuclear forces of France and the United
  Kingdom, which have a deterrent role of their own and contribute significantly to
  the overall security of the Alliance. This Franco-German cooperation will add to,
  not substitute for, NATO’s nuclear deterrence and NATO’s nuclear sharing arrangements,
  to which Germany contributes and will continue to contribute. France and Germany
  will continue to comply with their obligations under international law including
  the Treaty on the Non-Proliferation of Nuclear Weapons. In light of their strong
  commitment to Article 5 of the North Atlantic Treaty and Art. 42 (7) of the Treaty
  on European Union, Franco-German cooperation aims at strengthening the systems of
  collective security both countries belong to. It aims at enhancing Europe’s security
  as a whole. Special attention will be given to coordination with the United States,
  the United Kingdom, other Allies and NATO.
