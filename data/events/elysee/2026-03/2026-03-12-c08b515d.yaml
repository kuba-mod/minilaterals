title: Private sector’s Statement on Nuclear Energy Financing.
text: 'We note the Statement on Nuclear Financing released by 26 states in the context
  of the World Nuclear Energy Summit held in Paris on March 10th 2026. We recognize
  the growing global demand for reliable, affordable and low-carbon energy, and acknowledge
  that nuclear energy, when deployed responsibly, can contribute to promoting energy
  security and supporting economic development efforts in line with national priorities.
  We recognize the importance of mobilizing adequate, predictable and diversified
  financing for nuclear energy projects, including through a combination of public
  and private fundings, and appropriate regulations. We welcome recent initiatives
  by multilateral development banks to engage on nuclear energy-related capacity-building,
  including: the cooperation framework between the World Bank Group and the IAEA in
  June 2025, the engagement and support of the European Investment Bank (EIB), and
  the continuous involvement of the European Bank for Reconstruction and Development.
  We support long‑term objectives to expand nuclear electricity generation and the
  broader industry where national policy supports it and strict ESG, safety, waste,
  and regulatory criteria are met, as part of a diversified low carbon mix that accelerates
  the energy transition. Signatories: ABN AMRO, BNP Paribas, Citi, Crédit Agricole
  CIB, Meridiam, RBC Capital Markets, SFIL, Societe Generale.'
