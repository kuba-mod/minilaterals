title: Statement on nuclear financing.
text: 'We Armenia, Argentina, Belgium, Bulgaria, Canada, Estonia, Finland, France,
  Hungary, Italy, Japan, Jordan, Morocco, Mongolia, Netherlands, Poland, Czech Republic,
  Greece, Romania, Rwanda, Slovakia, Slovenia, Turkiye, Ukraine, United Kingdom, Vietnam
  , recognize the growing global demand for reliable, affordable and low-carbon energy,
  and acknowledge that nuclear energy, when deployed responsibly, can contribute to
  energy security and economic development efforts in line with national priorities.
  We recognize the importance of mobilizing adequate, predictable and diversified
  financing for nuclear energy projects, including through a combination of public
  funding, international financial institutions, export credit agencies, private investors
  and innovative financial instruments as well as asset regulation frameworks. We
  welcome recent initiatives by international financial institutions to engage on
  nuclear energy-related capacity-building, including: the cooperation framework between
  the World Bank Group and the IAEA in June 2025, as well as the agreements subsequently
  concluded between the IAEA and the Asian Development Bank (ADB), the Development
  Bank of Latin America and the Caribbean (CAF), and the OPEC Fund for International
  Development, the engagement and support of the European Investment Bank (EIB), and
  the continuous involvement of the European Bank for Reconstruction and Development
  (EBRD). We express support for long-term objectives of expanding nuclear electricity
  generation and the broader nuclear industry to accelerate energy diversification
  and strengthen energy security. *** The World Bank Group, ADB, CAF, OPEC Fund, EIB
  and EBRD are working with the International Atomic Energy Agency (IAEA) and others
  to support countries interested in the further development of nuclear energy.'
