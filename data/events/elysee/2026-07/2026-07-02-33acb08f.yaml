title: Cinquième réunion de suivi consacrée à la lutte contre le narcotrafic.
text: Le chef de l’État a présidé la cinquième réunion de suivi consacrée à la lutte
  contre le narcotrafic, au Palais de l’Elysée ce jeudi 2 juillet 2026. Depuis novembre
  2025 , le Président de la République a régulièrement réuni des membres du gouvernement,
  directeurs d’administration et chefs de l’autorité judiciaire afin d’ intensifier
  la réponse de l’État face à la criminalité organisée. 2 juillet 2026 - Seul le prononcé
  fait foi Emmanuel MACRON J'ai souhaité qu'on puisse se réunir pour la cinquième
  fois depuis le mois de novembre dernier pour faire un point global sur la lutte
  contre le narcotrafic et à la suite aussi de l'actualité récente à Nice, Marseille,
  Nantes ou Grenoble, qui nous a rappelé que, même si on avait des résultats déjà
  obtenus par l'action résolue du gouvernement et de l'ensemble des services, il y
  a encore beaucoup à faire. La réponse, on le sait, est pleinement interministérielle,
  avec un plan massif à la hauteur d'un phénomène qui a changé d'échelle ces dernières
  années et pas simplement en France. La dynamique que nous avons enclenchée il y
  a maintenant sept mois et la mobilisation inédite ont commencé à produire des résultats
  concrets qui sont le fruit des lois récemment votées. Le parquet national anticriminalité
  organisée, qui est opérationnel depuis le 5 janvier, l'état-major interministériel
  de lutte contre la criminalité organisée qui est en place, les opérations type Octopus
  contre la DZ Mafia, qui ont produit une quarantaine d'interpellations, l'affaire
  Kessaci qui a donné lieu à six mises en examen et autant d'incarcérations, la réduction
  du nombre de points de deal, qui est tangible et visible sur le terrain, ce qui
  est une bonne chose, mais on le sait, avec une évolution des pratiques et une multiplication
  aussi des livraisons à domicile, si je puis utiliser cette formule. À cela s'ajoute
  aussi la préparation de différentes actions, ce qu'on a décidé sur nos ports, y
  compris des ports qui n'étaient pas suffisamment couverts jusqu'alors, comme le
  port de Sète, puis les plans d'urgence dans nos Outre-mer, comme l'évolution de
  notre douane, et je vais y revenir. Le narcotrafic continue de progresser chaque
  jour et est véritablement un marché criminel qui pèse plus de 7 milliards d'euros
  par an et qui, on le sait, alimente la délinquance criminelle, elle l'alimente dans
  nos quartiers, dans nos territoires ultramarins et chez beaucoup de nos voisins.
  C'est pourquoi il ne faut absolument pas lâcher cette action. Donc les priorités
  pour moi sont les suivantes, ce qui impose une action complète et déterminée. D'abord,
  poursuivre les actions de terrain, mobiliser pleinement nos services, on y reviendra,
  et je veux vraiment qu'on ait là, dans la priorisation de ce que font nos services
  de renseignement, une action renforcée sur le narco, l'action de la police, de la
  gendarmerie, en lien avec le continuum de sécurité, évidemment, les polices municipales,
  et évidemment l'action justice derrière pour traquer partout sur le terrain et ne
  laisser aucune tranquillité, aucun répit à qui que ce soit. Deuxièmement, la coopération
  internationale, qui est un levier très important. On a renforcé les choses, mais
  l'action que nous avons à mener avec l'Algérie, le Maroc, les Émirats arabes unis,
  la Tunisie, pour obtenir des résultats sur des cibles priorisées est clé. On a commencé
  à avoir des résultats, c'est essentiel pour le démantèlement de filières internationales,
  on le sait ô combien. Troisièmement, c'est renforcer la pression qu'on met sur les
  routes d'approvisionnement. C'est là aussi où le plan douane qui a été demandé et
  que vous avez finalisé, le Premier ministre y reviendra, je le sais, avec les ministres
  compétents, est clé, en particulier pour nos ports et nos aéroports. Parce qu'il
  doit produire un choc capacitaire avec un renforcement très concret des moyens,
  dès maintenant et dans les années qui viennent, avec, si je puis dire, des nouvelles
  capacités, des nouveaux équipements, en plus de ce que nous avons décidé sur les
  arrivées dans nos aéroports pour être plus efficaces dans les actions conduites.
  Et je vous en remercie. Quatrième axe d'action, à mes yeux, c'est les Outre-mer.
  On a évidemment le plan d'urgence Antilles-Guyane. On a une situation sécuritaire
  marquée par la forte augmentation des homicides qui sont liés au narcotrafic et
  au trafic d'armes. Donc, dès janvier dernier, on a établi un plan d'urgence avec
  plusieurs axes. Il faut accélérer son déploiement et je demande qu'on regarde l'ensemble
  des territoires ultramarins parce qu'on voit les fragilités qu'il y a aussi, évidemment,
  en Polynésie. En tout cas, il n'y a pas de négligence à avoir. Cinquième élément,
  c'est la pression à mettre sur les consommateurs, à travers à la fois la réforme
  qu'on fait sur les amendes forfaitaires délictuelles, leur mise en œuvre, les évolutions
  qui ont été décidées, les campagnes de communication, la pression qu'on doit mener.
  Il n'y a pas de trafic de drogue dans les quartiers s'il n'y a pas de consommateurs,
  généralement, dans les beaux quartiers. Soyons clairs. Donc, c'est quand même la
  grande différence avec d'autres formes de banditisme ou de criminalité, c'est que
  là, on a des gens qui nourrissent, quelque part, le crime qu'ils peuvent déplorer.
  Donc, la pression sur le consommateur, la prise de responsabilité, les éléments
  clés pour véritablement accroître la pression et les sanctions et les éléments de
  prévention sur le plan sanitaire sont clés. Donc, il y a ce continuum prévention-sanction,
  mais la pression sur le consommateur est clé. Puis, le dernier point, c'est en matière
  d'éducation, où il faut évidemment continuer de renforcer le travail. Merci de ce
  qui a déjà été fait, mais où il faut avancer. Tout ça pour dire qu'au fond, nous
  ne devons absolument pas relâcher l'effort. Je vous remercie de tout ce qui a été
  fait ces derniers mois et qui a permis de, pas simplement transformer le paysage
  institutionnel, mais d'avoir des premiers résultats extrêmement structurants. Mais
  cette action, elle est profondément interministérielle. C'est pour ça qu'elle suppose
  la coordination sous la houlette du Premier ministre et je l’en remercie. Elle suppose,
  sur les axes d'effort que je viens d'évoquer, d'intensifier, d'accélérer. C'est
  clé. Donc, sur cette base-là, je voudrais donner d'abord la parole au Premier ministre
  pour pouvoir revenir sur les points qu'il souhaite détailler, en particulier le
  suivi des cellules interministérielles qu'il a animées. Et puis, on reviendra sur
  chacun des éléments que je viens d'évoquer. Monsieur le Premier ministre. 2 juillet
