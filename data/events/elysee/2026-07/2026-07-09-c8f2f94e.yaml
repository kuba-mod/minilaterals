title: Compte rendu du Conseil des ministres du jeudi 9 juillet 2026.
text: 'Retrouvez le compte rendu du conseil des ministres du jeudi 9 juillet 2026.
  Le Premier ministre a présenté un projet de loi de cohésion républicaine par la
  lutte contre le racisme et l’antisémitisme. Notre pays fait face à une recrudescence
  sans précédent des actes de haine. En 2024, les services de police et de gendarmerie
  ont recensé plus de 16 000 infractions à caractère raciste, xénophobe ou antireligieux.
  Pourtant, ces chiffres ne reflètent qu’une fraction de la réalité de nos concitoyens
  : environ 1,7 million de personnes estiment être victimes d’au moins une atteinte
  à caractère raciste chaque année, mais 97 % d’entre elles ne portent pas plainte.
  Ce « chiffre noir » constitue en lui-même une faille que notre République ne saurait
  accepter. En particulier, Internet et les réseaux sociaux constituent à la fois
  de formidables outils de partage et de sociabilité mais aussi de puissants vecteurs
  de diffusion de la haine. La dématérialisation et la durée potentiellement illimitée
  de ces messages leur confèrent un impact considérable. Cela constitue aujourd’hui
  un défi majeur pour les autorités publiques et les acteurs judiciaires. Depuis 2023,
  les signalements de contenus illicites en ligne sur la plateforme Pharos ont augmenté
  de plus de 45 %, faisant du numérique un vecteur autonome de propagation de la haine.
  Face à ce phénomène, des évolutions majeures sont déjà intervenues mais le Gouvernement
  entend aller plus loin. Le projet de loi de cohésion républicaine par la lutte contre
  le racisme et l’antisémitisme entend d’abord améliorer les dispositifs existants
  : les circonstances aggravantes qui répriment les discriminations sont étendues
  à tous les délits et contraventions et les associations de lutte contre les discriminations
  pourront se constituer partie civile pour toutes les infractions qui en relèvent.
  Il facilite également la dénonciation de ces faits en permettant à l’employeur des
  personnes concourant à une mission de service public de déposer plainte à leur place.
  Il réaffirme par ailleurs les valeurs communes de la République en clarifiant les
  contours de l’infraction de contestation de la Shoah, en permettant au juge de prononcer
  une peine d’inéligibilité à l’égard de l’auteur de tels propos ; il institue une
  peine d’inéligibilité obligatoire en cas de condamnation pour des faits aggravés
  par des circonstances discriminatoires. Il vise enfin à lutter contre la prolifération
  des propos haineux en ligne en permettant le retrait de tels propos par la plateforme
  Pharos. La ministre de la transition écologique, de la biodiversité et des négociations
  internationales sur le climat et la nature a présenté un projet de loi ratifiant
  l’ordonnance n° 2026- 326 du 29 avril 2026 portant adaptation du droit français
  aux textes pris pour l’application du règlement (UE) 2023/956 du Parlement européen
  et du Conseil du 10 mai 2023. L’ordonnance objet du présent projet de loi de ratification
  a été prise sur le fondement de l’article 34 de la loi n° 2025-391 du 30 avril 2025
  portant diverses dispositions d''adaptation au droit de l''Union européenne en matière
  économique, financière, environnementale, énergétique, de transport, de santé et
  de circulation des personnes, qui a habilité le Gouvernement à prendre les mesures
  législatives nécessaires à la bonne mise en œuvre du mécanisme. Cette ordonnance
  introduit les dispositions nécessaires à la communication d’informations par la
  direction générale des finances publiques et la Banque de France à l’autorité administrative
  compétente pour le mécanisme d’ajustement carbone aux frontières (MACF), afin d’éviter
  certains schémas de fraude. Dans un second temps, ces dispositions permettront la
  mise en œuvre du principe du « dites-le nous une fois » pour les démarches en ligne
  relatives au MACF. Les modifications correspondantes du livre des procédures fiscales
  et du code monétaire et financier poursuivent le double objectif d’effectivité des
  contrôles incombant à l’autorité administrative compétente et de simplification
  de la vie administrative des entreprises. Cette ordonnance précise également les
  procédures afférentes aux décisions individuelles prises par l’autorité administrative
  compétente en application du règlement MACF. Elle clarifie le déroulement de ces
  procédures afin d’en garantir la prévisibilité pour les entreprises concernées.
  Cette ordonnance accompagne la mise en œuvre effective du MACF depuis le 1er janvier
  2026, en tenant compte des retours d’expérience de la période transitoire qui s’est
  déroulée d’octobre 2023 à décembre 2025. Elle tient compte des mesures de simplifications
  adoptées au titre du paquet législatif européen « Omnibus I ». Le ministre de l’éducation
  nationale et le ministre de l’enseignement supérieur, de la recherche et de l’espace,
  ont présenté un décret portant modification des modalités de nomination des recteurs.
  La réforme territoriale de 2020 a concentré les attributions en matière d’enseignement
  supérieur et de recherche sur les recteurs de région académique et sur les recteurs
  délégués à l’enseignement supérieur, à la recherche et à l’innovation, fonction
  crée à cette occasion dans régions académiques. Dans un objectif de cohérence, au
  regard de la compétence limitée des recteurs d’académie en matière d’enseignement
  supérieur et de recherche, les articles 1 et 2 du décret suppriment la condition
  de détention de l’habilitation à diriger les recherches pour les recteurs d’académie
  et ne maintiennent cette condition que pour l’ensemble des recteurs de région académique
  et des recteurs délégués pour l’enseignement supérieur, la recherche et l’innovation,
  pour lesquels une dérogation à hauteur de 40 % demeure possible. Cette modification
  permet d’ouvrir d’avantage la fonction de recteur d’académie à des profils de haut
  niveau audelà des seules carrières universitaires et tire les conséquences de l’évolution
  profonde de cette fonction sous l’effet conjugué de certaines évolutions structurantes
  telles que la contrainte budgétaire qui impose un pilotage resserré des moyens,
  la déconcentration de la gestion notamment des ressources humaines ou encore l’importance
  des relations avec les préfets et les collectivités locales. En matière d’enseignement
  supérieur et de recherche, la circulaire du 11 août 2025 conforte le rôle des recteurs
  de région académique et des recteurs délégués à l’enseignement supérieur, la recherche
  et l’innovation comme interlocuteurs des universités et des autres établissements
  dans les territoires, ce qui justifie le maintien du principe de détention d’une
  habilitation à diriger des recherches. Parallèlement, la direction générale de l’enseignement
  supérieur et la direction générale de la recherche et de l’innovation se recentrent
  sur leurs missions stratégiques nationale, avec des décrets en cours de publication
  pour un effet au 1er septembre prochain. Enfin, l’examen pour avis de toute nouvelle
  nomination d''une personne n''ayant jamais occupé un emploi de recteur, par une
  commission chargée d''apprécier l''aptitude de l''intéressée, prévue à l''article
  R.* 222-13 du code de l''éducation, demeure une garantie d’appréciation des compétences
  requises dans le choix des profils des nouveaux recteurs. Le ministre délégué auprès
  du Premier ministre, chargé des relations avec le Parlement, a présenté une communication
  relative au bilan de l’application des lois. Au 30 juin 2026, le taux d''application
  des lois, correspondant aux mesures d''application des lois promulguées depuis plus
  de six mois, s''établit à 91% pour les lois de la 16ème législature. Ce chiffre
  est en hausse par rapport au niveau des précédentes législatures en fin de quinquennat.
  S’agissant de la 17ème législature, le taux d’application s’établit à 67 %, en hausse
  significative de 12 points par rapport au dernier bilan daté du 31 décembre 2025.
  Ce taux est inférieur à celui de la 15ème législature à une période comparable,
  qui était de 87 %. Il dépasse en revanche celui de la 16ème législature qui était
  de 61 % à la même date. Le Gouvernement est pleinement mobilisé pour assurer une
  application des lois rapide. Un comité interministériel de l''application des lois
  (CIAL) a ainsi été organisé en mai 2026 pour identifier les efforts à fournir et
  augmenter le taux d’application avant la fin du quinquennat. Le conseil des ministres
  a adopté les mesures individuelles suivantes : Sur proposition du ministre de l’intérieur
  : - M. le général de division Sylvain NOYAU, est nommé commandant de la région de
  gendarmerie de Provence-Alpes-Côte d’Azur, commandant la gendarmerie pour la zone
  de défense et de sécurité Sud et est élevé aux rang et appellation de général de
  corps d''armée, à compter du 1er août 2026 ; - M. Jean-Marie GIRIER, administrateur
  de l’Etat, est nommé préfet des Alpes-Maritimes. Sur proposition de la ministre
  des armées et des anciens combattants : - M. le général de division Etienne du PEYROUX
  est nommé directeur des ressources humaines de l’armée de terre et est élevé aux
  rang et appellation de général de corps d’armée, à compter du 1er août 2026 ; -
  M. le général de division Lionel CATAR est nommé major général de l’armée de terre
  et est élevé aux rang et appellation de général de corps d’armée, à compter du 1er
  août 2026. Sur proposition du ministre de l’Europe et des affaires étrangères :
  - M. Frédéric BILLET, ministre plénipotentiaire, est maintenu dans les fonctions
  de directeur du protocole d’État et des évènements diplomatiques, introducteur des
  ambassadeurs du ministère de l’Europe et des affaires étrangères, jusqu’au 31 mai
  2027 ; - M. Gaël VEYSSIERE, administrateur de l’Etat, est nommé directeur du centre
  de crise et de soutien du ministère de l’Europe et des affaires étrangères, à compter
  du 17 juillet 2026. Sur proposition de la ministre de la santé, des familles, de
  l’autonomie et des personnes handicapées : - Mme Andréa KHOSHKHOU est nommée déléguée
  interministérielle à l’accessibilité. Sur proposition de la ministre de l’aménagement
  du territoire et de la décentralisation et du ministre de la ville et du logement
  : - Mme Marie GAUTIER-MELLERAY, maîtresse des requêtes au Conseil d’Etat, est nommée
  directrice générale des collectivités locales, à compter du 27 juillet 2026. Sur
  proposition du ministre des transports : - Mme Delphine ALLÉHAUX est nommée membre
  de l’Autorité de contrôle des nuisances aéroportuaires en tant que personnalité
  compétente en matière d’émissions atmosphériques de l’aviation. Le Premier ministre
  a présenté un projet de loi de cohésion républicaine par la lutte contre le racisme
  et l’antisémitisme. Notre pays fait face à une recrudescence sans précédent des
