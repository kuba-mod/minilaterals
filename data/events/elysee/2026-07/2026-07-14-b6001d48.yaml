date: '2026-07-14'
type: press_release
source_name: elysee
title: Commémoration des 10 ans de l'attentat de Nice.
text: 'Le Président de la République et Madame Brigitte Macron ont participé, ce mardi
  14 juillet 2026, à la commémoration du dixième anniversaire de l’attentat de Nice.
  Neuf ans après la première commémoration des attentats, le 14 juillet 2017, que
  le chef de l’État avait présidée, un hommage a été rendu aux 86 victimes ainsi qu''à
  l''ensemble des blessés et des rescapés . La cérémonie a salué la dignité des familles
  et le courage des forces de secours et des intervenants qui, dans l''horreur de
  cette nuit, ont incarné ce que la France célébrait ce soir-là : la République. 14
  juillet 2026 - Seul le prononcé fait foi Monseigneur, Altesse, Madame la présidente
  de l’Assemblée nationale, messieurs les présidents de la République, messieurs les
  ministres, messieurs les Premiers ministres, mesdames et messieurs les ambassadrices
  et ambassadeurs, mesdames et messieurs les parlementaires, monsieur le procureur
  général près la Cour de cassation, monsieur le procureur national anti-terroriste,
  Monsieur le préfet, monsieur le président du Conseil départemental, monsieur le
  vice-président du Conseil régional, monsieur le maire, mesdames et messieurs les
  élus, mesdames et messieurs les présidentes et présidents d’associations, chères
  victimes, chères familles, mesdames et messieurs. Nous voici réunis 10 ans après
  afin de prendre la mesure de l’histoire. Aucun d’entre nous n’a oublié, n’oublie
  et n’oubliera ce qui s’est passé ici, à Nice, le 14 juillet 2016. Jamais. 10 ans.
  Et que peut le temps contre une nuit qui n’en finit pas ? Que peuvent les années
  contre une absence qui, chaque matin, impose le silence ? La vie a repris doucement
  son cours, mais n’a pas rendu les voix, les visages, les regards des êtres aimés
  qui manquent cruellement. Il y a 10 ans, ce 14 juillet 2016, la Promenade des Anglais
  était ce qu’elle avait toujours été : un ruban de lumière entre la ville et la mer,
  un lieu où les générations se mêlaient, où les familles réunies venaient regarder
  le ciel s’embraser au feu de la Concorde nationale, où les femmes et les hommes
  de tous les pays célébraient ensemble la liberté, notre République, notre nation.
  Et en un peu plus de 4 minutes, un camion lancé sur une foule de 30 000 personnes
  transforma cette fête en effroi, la promenade en champ de morts, le doux songe d’une
  nuit d’été en blessures françaises. 19 tonnes, d’un périple empreint de haine, le
  vertige d’une nuit de cauchemar. Ce soir-là, 86 vies furent volées. 86. 15 étaient
  celles d’enfants, vous l’avez rappelé. 450 furent blessés dans leur chair et des
  milliers d’autres le furent dans leur âme, parfois des années avant que la blessure
  ne trouve un nom. Il y a 9 ans, ici même, je vous avais dit que nous oublierions
  le nom du terroriste, mais que nous apprendrions par cœur le nom de nos morts. Je
  vous avais dit que vos morts étaient devenus nos morts et que l’État ne vous abandonnerait
  jamais. Et le Président, il ne vous abandonnera pas. Oui, nous n’avons oublié aucun
  nom, aucun visage, aucune histoire. Nous n’avons oublié ni ceux qui vivaient ici,
  sous cette lumière, ni ceux qui étaient venus pour quelques jours, quelques heures,
  parfois pour la première fois. Ils étaient de tant de nations différentes, Français,
  touristes, visiteurs, amis de la France, parce qu’ils partageaient ce soir-là notre
  fête et notre liberté, ils sont entrés pour toujours dans notre mémoire nationale.
  À leurs familles, dont beaucoup vivent loin de Nice, loin de la France, je veux
  dire aujourd’hui en présence des ambassadeurs de leurs pays, que la distance n’a
  jamais créé l’oubli. Ils sont avec nous. Les frontières n’ont pas séparé nos deuils.
  Et vous avez dû parfois affronter la douleur dans une autre langue, accomplir des
  démarches depuis un autre pays, revenir ici pour un procès, mais la France vous
  devait soutien, vérité et fidélité. Et je veux dire à tous nos compatriotes ici
  qu’elle ne les oublie pas. La République est là. La France est là. Et je veux à
  cet égard avoir un mot tout particulier pour les associations et leurs représentants,
  Anne Murris, Stéphane Erbs, Patrick Prigent et Hager Ben Aoussi, qui, je le sais,
  jouent un rôle essentiel pour accompagner ce mouvement de réparation. Merci à vous.
  Le 13 novembre dernier à Paris, 10 ans après les attentats du Stade de France, des
  terrasses de Paris et du Bataclan, je disais que l’on ne pouvait donner de sens
  au 13 novembre mais que l’on pouvait trouver un sens au 14 novembre et à chacun
  de ses lendemains. Rien ne donnera jamais un sens au 14 juillet 2016, mais nous
  pouvons ensemble donner un sens à tous les 15 juillet qui ont suivi par la mémoire,
  la justice, la fraternité et l’action et d’abord par la reconnaissance, car cette
  nuit-là, face à l’abîme, des femmes et des hommes se sont levés, puisant au plus
  profond d’eux-mêmes les ressources qu’ils savaient justes et fortes, celles de la
  République, pour faire prévaloir l’entraide des hommes. Une France à l’unisson face
  à l’horreur. Les policiers municipaux et nationaux qui coururent vers le danger
  quand tout le monde cherchait à lui échapper, ceux qui ouvrirent le feu et arrêtèrent
  enfin la course du camion-bélier, les sapeurs-pompiers, les équipes du SAMU, les
  secouristes, les médecins, les infirmiers, les urgentistes, les aides-soignants,
  les agents hospitaliers qui virent arriver l’impensable et firent face avec sens
  du devoir et dignité. Les personnels du centre hospitalier de Nice qui déclenchèrent
  le plan blanc et transformèrent chaque service en poste de combat pour la vie. Les
  agents de la ville, les agents de l’État, les magistrats, les enquêteurs, les personnels
  scientifiques et médico-légaux, ceux qui durent identifier, annoncer, recueillir,
  protéger. Et puis toutes celles et tous ceux qui s’armèrent de courage pour poser
  un garrot, pour porter un blessé, pour guider un enfant, ouvrir une porte. Ceux
  qui tinrent la main d’un inconnu et restèrent auprès d’un mourant afin qu’il ne
  fût pas seul. Ceux qui, cette nuit-là, ne demandèrent pas d’où venait l’autre, quelle
  langue était la sienne, quel Dieu était le sien, ou même s’il en avait un, ils virent
  une vie à sauver. Ils furent, dans le chaos de la barbarie, les dignes enfants de
  la fraternité française. Et à cette chaîne de fraternité, à tous les primo-intervenants
  professionnels, volontaires, connus ou non, la nation redit en ce jour merci, encore
  et toujours merci. Vous avez agi dans l’obscurité pour ramener la lumière de l’espérance.
  Vous avez été les premiers remparts de la République, chaîne d’union qui se forme
  quand l’essentiel est en jeu. Et cette chaîne ne devait pas se rompre après l’urgence.
  Et elle continue 10 ans après, plus forte que jamais. Il y a 9 ans, je vous disais
  que votre dignité ne pouvait, ne devait pas se heurter à la froideur bureaucratique.
  Et je sais que malgré le travail accompli, certaines et certains d’entre vous ont
  connu des démarches trop longues, des expertises éprouvantes, des courriers parfois
  incompréhensibles, des silences ressentis comme un nouvel abandon. Je sais qu’une
  blessure psychique peut mettre des années à se révéler, que l’état d’un enfant ne
  se laisse pas enfermer dans un calendrier administratif et qu’aucune procédure ne
  doit ajouter de la souffrance à la souffrance. Alors l’État, le Fonds de garantie
  des victimes des actes de terrorisme et d’autres infractions et la délégation interministérielle
  à l’aide aux victimes ont appris, corrigé, transformé leur manière d’accompagner
  avec vous, grâce à vous. Près de 3 000 victimes ont été prises en charge et des
  indemnisations versées, mais aucune somme ne rend une vie. Aucune indemnité ne mesure
  l’amour perdu. Elle est la traduction matérielle autant que faire se peut de la
  solidarité nationale. Mais derrière chaque dossier, il y a un visage. Auprès de
  chaque victime, un interlocuteur. Pour chaque parcours de vie et de reconstruction,
  une réponse adaptée. C’est le sens des permanences organisées ici, de la médiation,
  de la transparence sur les droits et du soutien au projet de vie. L’emploi, le logement,
  les études, la réparation des vivants. C’est le sens aussi du travail inlassable
  et indispensable mené avec les associations de victimes que je viens d’évoquer,
  parce qu’elles ont transformé leur douleur en vigilance pour les autres et obligé
  les institutions à devenir meilleures. Ce travail continuera. Il continuera pour
  celles et ceux dont l’état de santé n’est pas stabilisé. Il continuera pour les
  mineurs d’alors devenus jeunes adultes et pour les victimes étrangères que la distance
  ne doit jamais éloigner de leurs droits. La justice aussi fait son œuvre. Le procès
  de première instance puis d’appel ont commencé à établir les responsabilités. Et
  ce travail de vérité et de justice se poursuivra avec calme, méthode et exigence.
  Le meurtrier principal n’était plus là pour répondre de ses actes. Et ce vide fut
  une épreuve supplémentaire. Mais la République refuse le silence et l’impunité.
  Nice, depuis plus de 10 ans, porte les cicatrices de plusieurs attaques. Le 3 février
  2015, 3 militaires furent attaqués parce qu’ils portaient l’uniforme de la France
  et protégeaient un centre de la communauté juive. Le 14 juillet 2016, une foule
  entière fut visée parce qu’elle célébrait la nation. Le 29 octobre 2020, un terroriste
  ayant traversé la Méditerranée entra dans la basilique Notre-Dame de l’Assomption
  et assassina Nadine Devillers, Vincent Loques et Simone Barreto Silva parce qu’ils
  avaient franchi la porte d’un lieu de culte. Parce que la liberté de conscience,
  donc de croire, est pour nous une liberté fondamentale. Nous étions là aussi et
  j’étais là, à vos côtés. Et à chaque fois, la même idéologie islamiste et le même
  projet : tuer, terroriser, dresser les Français les uns contre les autres, transformer
  le deuil en haine. Et à chaque fois, Nice a répondu autrement. Nice a pleuré sans
  renoncer à vivre. Nice a protégé ses chrétiens, ses juifs, ses musulmans, tous ses
  enfants sans distinction, car il n’est en France qu’une seule communauté, la nation
  indissociable de la République, qui garantit par la loi à chacun le droit de croire
  ou de ne pas croire, l’indivisibilité de la République, notre plus grande force.
  En 10 ans, notre organisation a profondément changé et la France est plus forte.
  La Coordination nationale du renseignement et de la lutte contre le terrorisme a
  été créée. La Direction générale de la sécurité intérieure est devenue chef de file
  et ses moyens ont été renforcés. Le parquet national antiterroriste a été institué
  et ses moyens aussi renforcés. Nos lois permettent d’agir plus tôt, de fermer les
  lieux où se prêche la haine, de surveiller bien davantage les individus dangereux,
  de protéger les rassemblements. Et de mieux prévenir la récidive. Depuis 2024, 16
  projets d’attentats ont été déjoués. Et derrière ce chiffre, il y a des veilles
  sans sommeil, des surveillances discrètes, des décisions prises à temps, des vies
  sauvées qui ne sauront jamais qu’elles l’ont été. La menace a changé. Elle est souvent
  plus diffuse, plus rapide, plus solitaire. Elle se glisse dans les écrans, saisit
  les esprits fragiles, mêle fanatisme, fascination pour la violence et déséquilibre.
  Elle peut transformer un objet quotidien en arme, mais elle peut revenir aussi des
  régions où le terrorisme prospère, comme nous l’avons malheureusement connu. Et
  c’est pourquoi nous devons continuer d’y agir, de surveiller, de lutter contre ces
  groupes. Et je salue ici l’engagement aussi de nos forces armées et de nos services
  extérieurs, entre autres en Afrique et au Moyen-Orient. Voilà pourquoi aussi notre
  justice doit être puissante et notre coopération européenne et internationale constante.
  Et je sais ici pouvoir compter sur l''ensemble des services de l''État pleinement
  mobilisés et vigilants pour nous protéger collectivement. Mais je sais aussi avec
  vous en cette journée combien notre combat se joue bien avant le passage à l''acte,
  par l''école qui enseigne la raison et l''esprit critique, au sein de la famille
  qui peut donner l''alerte, des services publics qui repèrent toute forme de rupture
  avec la société démocratique. C''est notre société tout entière qui a pour but d''enseigner
  ce qui signifie d''être citoyen français. Ce combat, nous devons sans relâche, chaque
  jour, continuer de le mener avec la force de la loi, dans la fidélité de l''État
  de droit et en veillant à notre unité. C''est cela qui nous rend plus forts et rien
  d''autre. Chères familles, chères victimes, 10 ans ont passé. Les enfants de la
  promenade sont devenus adultes. Certains sont nés après l''attentat et grandissent
  dans une ville dont ils découvrent peu à peu la blessure. À eux, nous devons transmettre
  ce qui a été notre réponse ce soir-là, les jours d''après et durant ces années :
  le courage, la justice, la fraternité, celles de notre nation et de notre République.
  Ce soir, 86 faisceaux de lumière s''élèveront au-dessus de la mer. Ils ne remplaceront
  personne. Ils ne consoleront aucune absence mais ils diront que nous portons aujourd''hui
  comme demain le souvenir de chacun. Il y a 9 ans, je vous avais dit que le 14 juillet
  niçois ne serait plus jamais le même. Il ne l''est plus et ne le sera plus jamais.
  À la joie de la fête s''est mêlée une gravité qui ne la quittera pas, mais le 14
  juillet n''a pas cessé d''être le jour de notre liberté et Nice n''a pas cessé d''être
  cette ville d''art, de lumière, de langues mêlées, cette ville française et méditerranéenne
  enracinée et ouverte. Alors oui, 10 ans après, la République est à vos côtés. Elle
  se souvient, accompagne, protège et combat. Pour eux, pour vous, disparus, blessés,
  survivants, pour la liberté qu''ils célébraient ce soir-là et que nous continuerons
  de faire vivre en leur nom : notre liberté, notre égalité, notre fraternité. Vive
  Nice, vive la République et vive la France ! 14 juillet 2026 - Seul le prononcé
  fait foi Monseigneur, Altesse, Madame la présidente de l’Assemblée nationale, messieurs
