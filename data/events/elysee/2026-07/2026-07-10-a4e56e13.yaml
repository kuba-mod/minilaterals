title: La France et la Pologne ont tenu leur première réunion du groupe de pilotage
  nucléaire à Paris.
text: Lors du discours du Président de la République à l’Île Longue sur la dissuasion
  nucléaire française, le Président de la République française a annoncé la mise en
  place de dialogues stratégiques bilatéraux avec les partenaires européens concernés
  afin d’établir le concept de dissuasion avancée. La France et la Pologne ont tenu
  leur première réunion du groupe de pilotage nucléaire à Paris, le vendredi 10 juillet.
  Les autorités étaient accompagnées de hauts responsables militaires et de représentants
  des ministères de la Défense et des Affaires étrangères pour échanger sur les enjeux
  de sécurité européenne. Elles ont convenu d’une feuille de route commune et ont
  manifesté leur ambition de coopération bilatérale pour œuvrer à une Europe plus
  sûre et mieux défendue.
