date: '2026-07-13'
type: press_release
source_name: elysee
title: Sommet de la Coalition des Volontaires à Paris.
text: 'Le Président de la République a co-présidé, avec le Premier ministre britannique
  et le Chancelier allemand un Sommet de la Coalition des Volontaires, ce lundi 13
  juillet 2026 à l’Hôtel national des Invalides, en présence notamment du Président
  ukrainien Zelensky. À la veille du défilé du 14 juillet , auquel le chef de l’État
  a convié l’ensemble des pays contributeurs de la Coalition, ce Sommet a permis de
  prolonger et d’amplifier les avancées et les convergences obtenues notamment lors
  du Sommet du G7 à Evian en faveur de la réaffirmation du soutien à la défense de
  l’Ukraine et du renforcement de la pression sur l’effort de guerre russe , notamment
  à travers la lutte contre la flotte fantôme. Dans la continuité de la Déclaration
  de Paris du 6 janvier 2026 , ce Sommet a permis aux dirigeants de faire le point
  sur la planification opérationnelle des garanties de sécurité , destinées à assurer
  une paix robuste et durable en Ukraine. Ce Sommet fut précédé de la première réunion
  de la Coalition antibalistique , organisée au Quai d’Orsay, que le Président de
  la République est venu clôturer après s’être entretenu avec le Président Zelensky.
  Cette réunion a permis de travailler sur les moyens nécessaires pour permettre à
  l’Ukraine de se défendre , sur le renforcement de notre coopération industrielle
  ainsi que sur la mise en commun du savoir-faire de nombreux pays et industries en
  Europe. 13 juillet 2026 - Seul le prononcé fait foi Merci Mesdames et Messieurs
  d''être là. Monsieur le Président, cher Volodymyr, Monsieur le Chancelier, cher Friedrich,
  Monsieur le Premier ministre, cher Keir, Mesdames, Messieurs, les ministres, Mesdames,
  Messieurs, les ambassadrices et ambassadeurs, Mesdames, Messieurs, les journalistes,
  Merci d''être là aux Invalides aujourd''hui. Nous avons en effet tenu à Paris une
  nouvelle réunion des chefs d''État et de gouvernement des 37 pays qui composent
  désormais la Coalition des volontaires. La Moldavie, la Macédoine du Nord nous ont
  rejoints, ce qui est une bonne chose. 37 pays européens, et je n''oublie pas nos
  amis canadiens, comme aussi nos amis de la région Indo-Pacifique, du Japon à l''Australie,
  en passant par la Nouvelle-Zélande. Cette réunion est la seizième depuis la première
  que nous avions tenue en février 2025 à Paris et Londres, et s''inscrit dans une
  séquence nouvelle, un moment nouveau, et a permis d''amplifier et accélérer une
  double dynamique. D''abord, celle du terrain militaire, puisque l''Ukraine a largement
  repris l''initiative, elle a résisté à cet hiver si difficile, elle reconquiert
  du terrain, et les difficultés s''accumulent pour la Russie sur les fronts militaires
  et économiques. Deuxième dynamique, c''est celle de la négociation où les facteurs
  s''alignent pour renforcer les chances d''une paix robuste. Forts des résultats
  du Sommet du G7 à Evian, nous avons reconstruit une unanimité au Conseil européen
  qui s''en est suivi au mois de juin, et cette dynamique a été confirmée au sommet
  de l''OTAN à Ankara la semaine dernière, tant sur le diagnostic, à savoir, pour
  le dire vite, que l''OTAN ne joue pas en faveur de la Russie et qu''elle ne peut
  pas espérer tenir ses objectifs, que sur les conséquences qu''il faut en tirer,
  imposer la fin des combats et relancer les négociations. Ce moment nouveau nous
  conduit, avec cette mobilisation d''aujourd''hui, à plusieurs axes directeurs, sur
  lesquels je voulais revenir. Premièrement, nous sommes déterminés à continuer de
  consolider notre unité entre alliés pour converger vers un cessez-le-feu et une
  paix juste et durable. Deuxièmement, pour ce faire, nous sommes aussi déterminés
  à continuer de soutenir l''Ukraine, aujourd''hui encore plus vite et plus fort.
  Et ce sommet, cette Coalition, a été un moment d''accélération et de mise en œuvre
  d''engagements pris durant ces derniers mois. C''est vrai du soutien financier qui
  a été acté avec le prêt européen de 90 milliards d''euros, rejoint par le Royaume-Uni,
  et j''en remercie Monsieur le Premier ministre, des engagements pris à Ankara, 70
  milliards d''euros, avec les premiers déboursements qui viennent d''advenir. C''est
  vrai aussi sur le soutien militaire, et c''est dans cet esprit que nous avons agréé,
  en début d''après-midi, avec le président Zelensky, une feuille de route entre nos
  deux pays, mettant en œuvre ce qui avait été acté sur le principe en novembre dernier
  pour notre coopération bilatérale. Sur la défense antiaérienne, d''une part avec
  l''acquisition par l''Ukraine d''une première série de batteries SAMP/T de nouvelle
  génération qui vient compléter les systèmes qui seront livrés avec leurs missiles
  dans les semaines à venir, et sur la modernisation de la chasse ukrainienne d''autre
  part avec le projet d''acquisition de 16 Rafales et du système d''armement qui les
  accompagne, dont les premiers doivent voler dans les airs ukrainiens dès 2028-2029,
  avec les formations qui se tiendront dès les prochains mois. Des systèmes de radar
  sont aussi cédés, des missiles supplémentaires, et nous avons acté du licensing
  dans des capacités nouvelles A2SM, Aster 30, SCALP, qui permettra de produire beaucoup
  plus rapidement ces capacités avec nos amis ukrainiens et sur le sol ukrainien.
  Plusieurs autres éléments plus confidentiels ont été aussi actés entre nos deux
  pays. L''Ukraine a des besoins immédiats, en particulier en matière antibalistique.
  Cette contribution bilatérale y participe, mais à l''initiative du président Zelensky,
  nous avons réuni un peu plus tôt une coalition nouvelle, la Coalition antibalistique,
  réunissant 8 pays au total — l''ensemble d''entre nous y étions, avec nos industriels
  — qui a permis justement et qui va permettre d''accélérer de manière très concrète
  la défense antibalistique de l''Ukraine. D''abord en continuant à donner à l''Ukraine
  les capacités dont elle a besoin pour défendre son ciel, les populations civiles
  et ses infrastructures critiques. Ensuite, en autorisant la production de capacités
  nouvelles sous licence, le président Trump l''a déjà annoncé sur la production d''intercepteurs
  pour les batteries Patriot. Nous avons, je le disais, décidé de le faire pour les
  missiles Aster qui arment les systèmes SAMP/T que nous développons avec l''Italie,
  et plusieurs autres ont décidé des licencings dans ce sens, mais aussi de mettre
  en commun nos forces et notre expertise pour développer des capacités nouvelles.
  C''est le sens du projet FREYA qui, en agrégeant justement les briques capacitaires
  de nos 8 pays et de plusieurs de nos industriels, va permettre d''agréger une offre
  commune et d''accélérer en la matière la protection de l''Ukraine. Dans un contexte
  où la Russie voit ses vulnérabilités économiques s''accroître, notamment du fait
  des mesures que nous avons adoptées jusqu''à présent, nous sommes aussi déterminés
  à les exploiter en renforçant la pression que nous exerçons. Et c''est le troisième
  axe sur lequel nous avons avancé aujourd''hui par le biais de nos sanctions et de
  la lutte contre la flotte fantôme. Nos sanctions, c''est ce que nous soutenons,
  avec le 21ᵉ paquet de sanctions pour l''Union européenne qui ciblera en particulier
  le secteur bancaire et financier, le complexe militaro-industriel, les acteurs participant
  à tout contournement. Et je remercie, là aussi, nos amis britanniques de la parfaite
  coordination avec l''Union européenne. Je veux aussi saluer à cet égard les décisions
  prises récemment par l''administration américaine, celles de pardonner les régimes
  d''exception sur les hydrocarbures fossiles venant de la Russie, celles aussi qui
  ont été prises à l''initiative de plusieurs sénateurs américains pour renforcer
  ces sanctions américaines. Et qu''il me soit permis, en cet instant, de rendre hommage
  à la mémoire du sénateur Lindsey Graham, qui a joué un rôle important durant ces
  dernières années aux côtés de l''Ukraine, des valeurs qui nous lient et du lien
  transatlantique. En parallèle, nous renforçons nos moyens de lutte contre la flotte
  fantôme, notre moyen de presser sur la Russie. L''arraisonnement du bâtiment Deliver
  par la Marine nationale le 1ᵉʳ juin dernier, cinquième opération d''arraisonnement
  par la France depuis la fin 2025, démontre notre engagement. Je veux ici aussi saluer
  le travail de la Suède, du Royaume-Uni, la contribution de nos amis britanniques,
  espagnols et de plusieurs autres. C''est un effort que nous allons continuer. Nos
  chefs d''état-major nous ont présenté les modalités pour que d''autres pays s''y
  joignent et nous continuerons de nous organiser à cette fin. Une réunion se tiendra
  en septembre prochain à Paris au niveau ministériel. Enfin, nous sommes déterminés
  à poursuivre notre travail sur les garanties de sécurité qui seront la colonne vertébrale
  d''une paix juste et durable. Vous vous en souvenez sans doute, il y a plus de 6
  mois, le 6 janvier dernier, la Déclaration de Paris pour les garanties de sécurité
  robustes pour une paix solide et durable avait permis à tous les pays de la Coalition
  d''endosser une même stratégie qui consacrait aussi une convergence opérationnelle
  entre nous tous avec les États-Unis, présents à cette occasion, pour une vision
  commune des garanties de sécurité et une organisation commune. Premier pilier, le
  soutien militaire à long terme pour les Forces armées ukrainiennes. Deuxième pilier,
  la force de réassurance, la mission, justement, de soutien à l''Ukraine, la MNFU,
  déployée en mer, dans les airs, sur le sol ukrainien lorsqu''un cessez-le-feu sera
  conclu, à vocation purement défensive. Elle ne constitue en aucun cas un mécanisme
  de surveillance du cessez-le-feu, mais la démonstration de notre engagement à nous
  assurer que la cessation des hostilités est irréversible, et elle vise à mener des
  actions pour accompagner la régénération des forces ukrainiennes, donner des gages
  de réassurance et permettre des avancées très concrètes pour le pays, comme la reprise
  des liaisons aériennes ou le trafic maritime. Et puis, troisièmement, des mesures
  mises en œuvre pour prévenir une nouvelle attaque de la Russie et y répondre si
  la Russie décidait d''attaquer à nouveau. Ces mesures de réponse pourront être d''ordre
  militaire, économique et politique. Ces garanties, je le disais, sont défensives,
  en aucun cas escalatoires. Nous avons franchi cette étape en janvier dernier. Depuis,
  une planification intense a été finalisée sous l''autorité de nos chefs d''état-major.
  La coalition a donc bien cette force multilatérale pour l''Ukraine maintenant prête
  à agir. Le QG de cette force organise cette planification et la transforme semaine
  après semaine en engagements opérationnels concrets. Nous avons à cet égard décidé
  aujourd''hui des exercices qui se tiendront dans les prochains mois. Ils nous ont
  été présentés officiellement tout à l''heure. Ils seront déployés dans les pays
  voisins de l''Ukraine, pour valider nos plans de déploiement et démontrer que nous
  sommes prêts, déterminés et crédibles, sur terre, dans les airs et en mer. Je veux
  le dire avec clarté, le soutien à l''Ukraine est un investissement dans notre propre
  sécurité. Et ceux qui pensent que cette guerre s''arrêtera aux frontières ukrainiennes
  si nous cédons ou cherchons des moyens d''accommoder l''agresseur se trompent. L''histoire
  de notre continent nous a appris ce que coûte le renoncement face à l''agression
  et nous ne referons pas cette erreur. Je veux m''adresser directement aux Européens.
  Ce que nous construisons ici n''est pas seulement pour l''Ukraine, c''est la démonstration
  que l''Europe peut assumer sa propre sécurité, défendre ses intérêts, et qu''elle
  peut agir avec unité, avec force, sans naïveté quant aux intentions de Moscou. Cette
  coalition en est la preuve la plus concrète. Et c''est un grand honneur pour la
  France demain, non seulement de procéder au défilé traditionnel de nos forces armées,
  mais d''y adjoindre un défilé de l''ensemble de nos partenaires de la coalition,
  des volontaires et de nos amis ukrainiens qui défileront avec nous et illustreront
  ce réveil stratégique et notre unité. Monsieur le président, Monsieur le Chancelier,
  monsieur le Premier ministre, chers amis, je veux ici le redire, nous nous battons
  tous ensemble pour la paix et la sécurité de notre continent. Et nous nous tenons
  aux côtés du peuple ukrainien, pour lequel nous avons respect, estime et amitié.
  Et vous avoir à nos côtés, Monsieur le président, est une grande fierté. Merci à
  mes deux collègues d''être là. Et je veux redire que la crédibilité de nos engagements
  s''est encore renforcée aujourd''hui, lors de ce sommet qui a permis de concrétiser
  les choses, d''accélérer notre défense et notre engagement aux côtés de l''Ukraine,
  il sera démontré avec force demain lors du défilé. Et permettez-moi d''avoir un
  dernier mot pour notre collègue, le premier ministre Keir Starmer, qui nous a fait
  l''honneur d''être à nos côtés. Dans quelques jours, il passera le relais dans un
  esprit de continuité. Mais je veux ici lui redire combien ce fut une fierté pour
  nous de travailler avec lui et combien cette coalition des volontaires lui doit
  beaucoup et l''engagement des Européens aux côtés de l''Ukraine lui doit beaucoup.
  C''était une grande fierté d''être avec vous, Monsieur le Premier ministre. Merci
  à vous. 13 juillet 2026 - Seul le prononcé fait foi Merci Mesdames et Messieurs
