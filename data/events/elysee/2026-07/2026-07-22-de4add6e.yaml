date: '2026-07-22'
type: press_release
source_name: elysee
title: Compte rendu du Conseil des ministres du mercredi 22 juillet 2026.
text: 'Retrouvez le compte rendu du conseil des ministres du mercredi 22 juillet 2026.
  Le ministre de l’intérieur a présenté un projet de loi relatif à la lutte contre
  les ingérences étrangères dans la vie démocratique. Les opérations d’ingérence numérique
  étrangère cherchent à semer la confusion et à polariser la société pour éroder la
  confiance dans les institutions. Face au risque de manipulation de l''information
  et d''ingérence étrangère, le ministre de l''intérieur a présenté un projet de loi
  visant à renforcer la protection de la vie démocratique. Dans un contexte marqué
  par l’évolution rapide de ces phénomènes et à l’approche des échéances électorales
  à venir, il s’agit de faire évoluer les moyens juridiques à la main de l’Etat pour
  faire cesser rapidement la diffusion de contenus manifestement inexacts ou trompeurs
  susceptibles de porter atteinte aux intérêts fondamentaux de la Nation et à la sincérité
  du débat démocratique. Par son article premier, il vise à permettre une réaction
  judiciaire rapide et proportionnée face aux campagnes de désinformation menées de
  manière délibérée, massive et automatisée par le biais de services de communication
  en ligne, lorsqu''elles menacent gravement et de façon imminente l’indépendance
  de la Nation, l’intégrité de son territoire, sa sécurité, la forme républicaine
  de ses institutions, la sauvegarde de sa population en France et à l’étranger. Le
  texte crée à cet effet une nouvelle procédure de référé permettant au président
  d''un tribunal judiciaire spécialement désigné d''ordonner, à la demande du ministère
  public ou de toute personne ayant intérêt à agir, toutes mesures proportionnées
  et nécessaires pour faire cesser la diffusion de tels contenus par les hébergeurs
  et fournisseurs d''accès. Cette ordonnance pourra faire l''objet d''un appel devant
  le premier président de la cour d''appel, et la mesure pourra être modifiée ou rétractée
  selon la même procédure. Son second article élargit le référé « anti-manipulation
  de l’information » en période électorale crée par la loi du 22 décembre 2018, à
  l’ensemble des scrutins politiques. Enfin, son troisième article réhausse la pénalisation
  de l’infraction d’atteinte à la sincérité du scrutin prévue par le code électoral,
  en portant d''un an à trois ans d''emprisonnement son quantum et de 15 000 à 45
  000 euros le montant de l’amende. Il élève aussi à six ans la peine privative de
  liberté encourue en cas d’infraction commise dans le but de servir les intérêts
  d’une puissance étrangère ou d''une entreprise ou d''une organisation étrangère
  ou sous contrôle étranger. Par cette réforme et face à la multiplication des tentatives
  de manipulation de l''information et d''ingérence dans la vie démocratique, le Gouvernement
  entend doter la justice et les autorités compétentes d''outils efficaces et proportionnés
  pour lutter contre la manipulation du débat public et préserver la sincérité des
  scrutins. Ces mesures concilient l''exigence de protection des processus démocratiques
  et le respect de la liberté d''expression et de communication. La ministre des outre-mer
  a présenté un projet de loi ratifiant l’ordonnance n° 2026-468 du 10 juin 2026 portant
  extension et adaptation aux collectivités relevant de l''article 74 de la Constitution
  et à la Nouvelle-Calédonie des dispositions de la loi n° 2025-1249 du 22 décembre
  2025 portant création d''un statut de l’élu local. Afin que les collectivités relevant
  de l’article 74 de la Constitution et la Nouvelle-Calédonie puissent bénéficier
  des avancées prévues par la loi du 22 décembre 2025, le législateur avait habilité
  le Gouvernement à y étendre les dispositions utiles. L’ensemble des collectivités
  ultramarines concernées ont été consultées sur le projet d’ordonnance. Le Conseil
  national d’évaluation des normes, également saisi, a rendu un avis favorable. L’ordonnance
  du 10 juin 2026 étend et adapte les mesures destinées à améliorer les conditions
  d’exercice des mandats locaux et à favoriser l’engagement local, dans le respect
  de l’organisation institutionnelle et des compétences propres à chacune de ces collectivités.
  La très grande majorité de ses dispositions s’appliquent ainsi aux élus communaux
  et aux membres des groupements de communes de la Polynésie française et de la Nouvelle-Calédonie.
  Elles leur permettent notamment de mieux concilier l’exercice de leur mandat avec
  leur vie personnelle, de bénéficier d’un nombre accru de jours de formation et d’améliorer
  les conditions d’exercice du mandat des élus en situation de handicap. L’ordonnance
  prévoit également, dans une moindre mesure, des dispositions applicables dans les
  îles Wallis-et-Futuna ainsi qu’aux élus des collectivités de Saint-Barthélemy, de
  Saint-Martin et de Saint-Pierre-et-Miquelon. Par ce projet de loi, le Gouvernement
  ratifie l’ordonnance du 10 juin 2026 et consolide ainsi l’application, dans les
  collectivités concernées, des avancées prévues par la loi du 22 décembre 2025, dans
  des conditions adaptées à leurs compétences et à leur organisation institutionnelle.
  Le ministre du travail et des solidarités, la ministre de la santé, des familles,
  de l’autonomie et des personnes handicapées et la ministre des outre-mer ont présenté
  une ordonnance qui marque une étape majeure de la convergence sociale à Mayotte.
  Prévue par la loi du 11 août 2025 de programmation pour la refondation de Mayotte,
  cette réforme parachève l’alignement progressif des droits sociaux des Mahoraises
  et des Mahorais sur ceux applicables dans l''ensemble de la République. Une nouvelle
  étape vers l''égalité des droits Depuis la départementalisation de Mayotte en 2011,
  de nombreuses avancées ont permis de rapprocher progressivement les droits sociaux
  des Mahorais du droit commun. Avec cette ordonnance, le Gouvernement franchit une
  nouvelle étape en engageant une convergence complète de la protection sociale. Dès
  le 1er janvier 2028, les assurés mahorais seront affiliés au régime général de la
  sécurité sociale. Le code de la sécurité sociale s''appliquera désormais de plein
  droit à Mayotte : seules des adaptations limitées, justifiées par les spécificités
  du territoire, seront maintenues. Les futures évolutions de la législation sociale
  bénéficieront ainsi automatiquement aux Mahoraises et aux Mahorais. Une convergence
  progressive, au service de la justice sociale et du développement économique La
  trajectoire retenue concilie deux exigences : accélérer l''accès aux droits tout
  en préservant les équilibres économiques de l''archipel. Elle s''organise autour
  de trois horizons : - dès 2026, les exonérations générales de cotisations sociales
  et les dispositifs LODEOM sont appliqués à Mayotte, accompagnés d''une revalorisation
  de la prime d''activité ; - d’ici 2031, avec de premières étapes fortes d''augmentation
  dès les prochaines années, l''alignement du SMIC, de la quasitotalité des prestations
  familiales, des prestations maladie, des minima sociaux et de la prime d''activité
  sera achevé ; - d''ici 2036, la convergence sera pleinement réalisée avec l''alignement
  des cotisations sociales et l''extinction progressive des dispositifs spécifiques
  devenus sans objet. Cette montée en charge progressive permettra de renforcer les
  droits des habitants tout en accompagnant les entreprises et les acteurs économiques
  du territoire. Cette convergence poursuit trois objectifs complémentaires : - valoriser
  le travail déclaré, qui ouvre des droits à la retraite, à l''assurance maladie et
  à la protection sociale ; - lutter contre la précarité en augmentant progressivement
  les minima sociaux ; - accompagner les assurés, les employeurs et les acteurs locaux
  dans la mise en œuvre de cette réforme ambitieuse. Une sécurité sociale pleinement
  intégrée au régime général À compter de 2028, la Caisse de sécurité sociale de Mayotte
  deviendra un organisme de base du régime général de sécurité sociale. Son organisation,
  sa gouvernance et son ancrage territorial seront préservés, tout en lui permettant
  de bénéficier pleinement de l''appui des caisses nationales pour accompagner la
  montée en charge de cette réforme. La trajectoire de convergence fera l''objet d''un
  suivi renforcé au niveau national comme au niveau local afin de garantir sa bonne
  mise en œuvre et d''accompagner durablement les assurés, les employeurs et l''ensemble
  des acteurs du territoire. Cette ordonnance traduit la volonté du Gouvernement de
  faire de Mayotte un département pleinement intégré à la République, où les droits
  sociaux convergent progressivement dans des conditions soutenables pour les habitants
  comme pour les acteurs économiques. Le ministre du travail et des solidarités, la
  ministre de la santé, des familles, de l’autonomie et des personnes handicapées
  et la ministre des outre-mer ont présenté une ordonnance relative à la sécurité
  sociale à Saint-Pierre-et-Miquelon. Cette ordonnance, prise en application de l’article
  74-1 de la Constitution, vise à rénover la législation applicable à la sécurité
  sociale et à la caisse de Saint-Pierre-et-Miquelon, en étendant de nouvelles prestations
  et en programmant l’alignement progressif des règles en matière d’accidents du travail
  et des maladies professionnelles sur le droit commun. Les règles de gouvernance
  de la caisse locale sont modernisées et rapprochées de celles des caisses générales
  de sécurité sociale des départements et régions d’outre-mer. De nouveaux droits
  sont prévus en faveur des assurés de Saint-Pierre-et-Miquelon selon un calendrier
  échelonné entre 2026 et 2031 : - l’indemnisation du congé supplémentaire de naissance
  ; - la prise en charge des soins pour les pensionnés du régime local vivant de façon
  habituelle à l’étranger mais en séjour temporaire dans le territoire ; - la possibilité
  de bénéficier d’un départ anticipé à la retraite en cas d’incapacité permanente
  ; - le droit à l’information retraite selon les modalités de droit commun ; - le
  droit à l’allocation de cessation anticipée d’activité pour les travailleurs de
  l’amiante. En outre, le projet d’ordonnance rend applicable, d’ici 2035, avec des
  adaptations à prendre par décret en Conseil d’Etat, les dispositions du code de
  la sécurité sociale relatives aux accidents du travail et aux maladies professionnelles,
  pour améliorer sensiblement la protection des salariés, notamment en sécurisant
  la reconnaissance des maladies professionnelles hors tableaux. Ce délai permettra
  d’établir, en concertation avec les acteurs locaux, des modalités progressives d’évolution
  des cotisations d’accidents du travail et maladies professionnelles et d’amélioration
  de la prévention. Enfin, les dispositions relatives à la sécurité sociale en vigueur
  à Saint-Pierre-et-Miquelon sont partiellement intégrées dans le code de la sécurité
  sociale, dans les domaines où s’appliquent largement le droit commun, afin de permettre
  à l’avenir l’application de plein droit des réformes intervenant dans ces domaines.
  Ce faisant, ce texte marque une nouvelle étape dans le mouvement visant à faire
  bénéficier les assurés de Saint-Pierre-et-Miquelon du même niveau de protection
  sociale que celui de France hexagonale et des départements et régions d''outre-mer,
  tout en tenant compte des particularités du territoire. Le ministre de l’intérieur
  a présenté un décret portant création d’une commission indépendante d’information
  du public en cas d’ingérences étrangères en contexte électoral. Ce texte vise à
  renforcer les moyens de l’Etat en matière de lutte contre les ingérences étrangères
  en période électorale. Cette Commission assurera, indépendamment de toute autorité,
  la détection, la caractérisation et, le cas échéant, l’information du public relative
  aux menaces ou cas avérés d''ingérence étrangère. Le projet de décret institue ainsi
  une commission chargée de recevoir les signalements transmis par les administrations
  et autorités compétentes en matière de détection des ingérences étrangères, au sens
  du code monétaire et financier et du code de la défense. Une fois la menace d''ingérence
  caractérisée, la commission pourra en informer les candidats et partis politiques
  concernés, la rendre publique par tout moyen, et porter les signalements reçus à
  la connaissance de l''autorité judiciaire ou de toute autre autorité compétente.
  Elle exercera ses fonctions en toute indépendance. Par ailleurs, cette commission
  sera compétente pour l''ensemble des scrutins concourant au renouvellement général
  des assemblées locales, nationales et européennes, ainsi que pour le renouvellement
  des sénateurs. Ses missions s''exerceront exclusivement pendant la période électorale,
  à compter du lendemain de la publication du décret de convocation des électeurs
  et au plus tôt six mois avant le premier tour, jusqu''au premier jour du deuxième
  mois suivant l''acquisition du résultat du scrutin. Le texte prévoit une composition
  de la commission reposant sur trois hautes juridictions : elle comprendra un membre
  du Conseil d''Etat, qui la présidera, un magistrat de la Cour de cassation et un
  magistrat de la Cour des comptes, chacun désigné par le chef de la juridiction dont
  il est issu, pour un mandat de six ans, renouvelable une fois. Son secrétariat sera
  assuré par le secrétariat général de la défense et de la sécurité nationale, auquel
  elle pourra également recourir pour l''exercice de ses missions, de même qu''aux
  services compétents de l''Etat et aux autorités administratives indépendantes. La
  commission pourra, en outre, entendre ou consulter des personnalités qualifiées
  et publiera, dans les six mois suivant le scrutin, un rapport dressant le bilan
  de son activité. Le projet de décret procède enfin à une coordination avec le décret
  du 13 juillet 2021 portant création du service de vigilance et de protection contre
  les ingérences numériques étrangères, afin d''identifier la nouvelle commission
  comme destinataire des informations transmises par ce service. Le ministre de l’intérieur
  et la ministre de la santé, des familles, de l’autonomie et des personnes handicapées
  ont présenté un décret relatif à l’intervention du préfet dans le versement du fonds
  d’intervention régional des agences régionales de santé. Renforcer la proximité
  et l''efficacité de l''action publique en santé Ce décret vise à renforcer l''association
  des préfets à certaines décisions de financement du fonds d''intervention régional
  (FIR) des agences régionales de santé (ARS). Cette réforme vise à rapprocher les
  décisions des territoires, à mieux articuler l''action des agences régionales de
  santé avec les priorités définies localement et à renforcer la cohérence de l''action
  de l''Etat au service de l''accès aux soins. Le décret permettra de renforcer la
  territorialisation des financements en santé en créant des dotations départementales
  au sein du FIR. Ces dotations seront définies par les directeurs généraux des ARS
  afin de mieux répondre aux besoins des territoires et d''offrir davantage de visibilité
  aux acteurs locaux. Ce texte prévoit également que les préfets soient informés ou
  consultés avant les décisions de financement les plus importantes, selon des modalités
  qui seront précisées par arrêté. Cette évolution donnera aux représentants de l''Etat
  une capacité d''intervention accrue sur les projets structurants pour les territoires.
  Le décret traduit ainsi la volonté du Gouvernement de renforcer la coordination
  entre les préfets et les ARS dans les territoires. L''association renforcée des
  préfets aux décisions du FIR permettra de mieux prendre en compte les priorités
  territoriales et de soutenir plus rapidement les projets répondant aux enjeux locaux
  d''accès aux soins, de prévention ou d''organisation de l''offre de santé. Le Gouvernement
  réaffirme ainsi sa volonté de renforcer l''ancrage territorial des ARS, en les rapprochant
  davantage du terrain, en confortant la place des élus et en renforçant la cohérence
  de l''action de l''Etat. Le conseil des ministres a adopté les mesures individuelles
  suivantes : - M. François-Noël BUFFET est nommé Défenseur des droits, à compter
  du 23 juillet 2026. Sur proposition du ministre de l’intérieur : - M. Jean SALOMON
  , administrateur de l’Etat, est nommé préfet de l’Yonne, à compter du 24 août 2026
  ; - Mme Sibylle SAMOYAULT , administratrice de l’Etat, est nommée préfète des Hautes-Pyrénées,
  à compter du 24 août 2026 ; - M. Simon FETET , conseiller maître à la Cour des comptes,
  est nommé préfet des Pyrénées-Atlantiques, à compter du 24 août 2026 ; - Mme Valérie
  MICHEL-MOREAUX , administratrice de l’Etat, est nommée préfète des Deux-Sèvres,
  à compter du 24 août 2026 ; - M. Jérôme BONET , directeur des services actifs de
  la police nationale, est nommé préfet de la HauteSavoie, à compter du 17 août 2026
  ; - Mme Fabienne DECOTTIGNIES , administratrice de l’Etat, est nommée préfète du
  Gard, à compter du 17 août 2026 ; - M. Victor DEVOUGE , administrateur de l’Etat,
  est nommé préfet de la Nièvre, à compter du 24 août 2026 ; - M. Pierre CHAVY , administrateur
  du Sénat, est nommé préfet, secrétaire général aux politiques publiques de la préfecture
  de la région Ile-de-France, préfecture de Paris, à compter du 24 août 2026 ; - M.
  Jean-Claude GENEY , administrateur de l’Etat, est nommé préfet délégué chargé d’une
  mission territoriale temporaire, à compter du 24 août 2026. - M. le général de brigade
  Antoine BRÉART DE BOISANGER est nommé secrétaire général de la garde nationale et
  secrétaire général du Conseil supérieur de la réserve militaire à compter du 1er
  août 2026. En outre, ont été adoptées diverses mesures d’ordre individuel concernant
  des officiers généraux de la gendarmerie nationale. Sur proposition de la ministre
  des armées et des anciens combattants : - M. le général de corps d’armée Laurent
  CLUZEL est nommé gouverneur militaire de Metz, officier général de zone de défense
  et de sécurité Est, commandant de zone terre NordEst et commandant des forces françaises
  et de l’élément civil stationnés en Allemagne, à compter du 1er août 2026 ; - M.
  le viceamiral d’escadre Jean-François QUÉRAT est nommé conseiller du Gouvernement
  pour la défense, à compter du 1er août 2026 ; - M. le général de corps aérien du
  corps des officiers de l’air Stéphane GROËN est nommé inspecteur général des armées
  et est élevé aux rang et appellation de général d’armée aérienne, à compter du 1er
  septembre 2026 ; - M. le général de division aérienne du corps des officiers de
  l’air Cyrille DUVIVIER est nommé général commandant territorial de l’armée de l’air
  et de l’espace et officier général de zone de défense et de sécurité SudOuest et
  est élevé aux rang et appellation de général de corps aérien, à compter du 1er septembre
  2026 ; - M. le général de corps aérien du corps des officiers mécaniciens de l’air
  Christophe PAGÈS est nommé adjoint « ressources humaines » du major général de l’armée
  de l’air et de l’espace et directeur des ressources humaines de l’armée de l’air
  et de l’espace, à compter du 8 août 2026. En outre, ont été adoptées diverses mesures
  d’ordre individuel concernant des officiers généraux de l’armée de terre, de la
  marine nationale, de l’armée de l’air et de l’espace, du service de santé des armées,
  du service de l’énergie opérationnelle, de la direction générale de l’armement,
  et du service du commissariat des armées. Sur proposition du garde des sceaux, ministre
  de la justice : - Mme Christine MAUGÜÉ , présidente de section au Conseil d’Etat,
  est nommée présidente de la section du contentieux du Conseil d’Etat, à compter
  du 9 août 2026. Sur proposition du ministre de l’éducation nationale, du ministre
  de l’enseignement supérieur, de la recherche et de l’espace de la ministre des sports,
  de la jeunesse et de la vie associative : - M. Richard LAGANIER , administrateur
  de l’Etat, est nommé directeur de l’encadrement, secrétaire général adjoint des
  ministères de l’éducation nationale, de l’enseignement supérieur, de la recherche
  et de l’espace et des sports, de la jeunesse et de la vie associative. Sur proposition
  du ministre de l’Europe et des affaires étrangères : - M. Arnaud SUQUET , administrateur
  de l’Etat, est nommé directeur d’Afrique et de l’océan Indien à l’administration
  centrale du ministère de l’Europe et des affaires étrangères, à compter du 15 septembre
  2026 ; - M. Philippe BERTOUX , administrateur de l’Etat, est nommé ambassadeur,
  représentant permanent de la France au conseil de l’Organisation du traité de l’Atlantique
  Nord à Bruxelles, à compter du 1er septembre 2026. Sur proposition de la ministre
  de la santé, des familles, de l’autonomie et des personnes handicapées : - M. Sébastien
  DELESCLUSE est nommé directeur général de l’agence régionale de santé Pays de la
  Loire ; - Mme Sarah SAUNERON , administratrice de l’Etat, est nommée directrice
  générale de l’agence régionale de santé de Nouvelle-Aquitaine, à compter du 22 août
  2026. Sur proposition de la ministre de la culture : - M. Laurent Le BON est nommé
  président du Centre national d’art et de culture Georges-Pompidou ; - M. Alexander
  NEEF est nommé directeur général de l’Opéra national de Paris, à compter du 1er
  septembre 2026 ; Sur proposition de la ministre de la culture et du ministre de
  l’enseignement supérieur, de la recherche et de l’espace : - M. Emmanuel KASARHÉROU
  est nommé président de l’établissement public du musée du quai Branly-Jacques Chirac.
