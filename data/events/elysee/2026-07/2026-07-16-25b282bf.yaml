date: '2026-07-16'
type: press_release
source_name: elysee
title: Déplacement à Fontainebleau.
text: 'Le Président de la République s''est rendu à Fontainebleau, ce jeudi 16 juillet
  2026, afin d’apporter son soutien à l’ensemble des femmes et des hommes mobilisé pour
  lutter contre les incendies. Après une présentation du dispositif et des opérations
  conduits au poste de commandement opérationnel, le chef de l’État a rencontré les
  élus ainsi que l’ensemble des acteurs engagés sur le terrain . Le Président Emmanuel
  Macron les a remerciés pour leur mobilisation sans faille ces derniers jours et
  a réaffirmé le plein engagement de l’État pour faire face à la saison exceptionnellement
  intense de feux de forêt que nous connaissons actuellement sur le territoire national.
  16 juillet 2026 - Seul le prononcé fait foi Emmanuel MACRON Bon, merci beaucoup.
  Je sais que vous êtes fatigués par les derniers jours, mais je tenais à venir vous
  voir pour vous remercier, pour vous encourager et parler avec vous un peu d''avenir.
  Et je remercie l''ensemble des élus qui sont là à mes côtés, évidemment notre préfet,
  le directeur général qui est avec nous également, et je voulais vous remercier tous.
  Évidemment, ici, vous avez vécu un 14 juillet un peu particulier. Il a commencé
  quelques jours plus tôt. Et c''est aussi pour ça que je tenais à être à vos côtés
  pour vous dire le soutien de la nation. Ce qui s''est passé ces derniers jours ici,
  en forêt de Fontainebleau, est évidemment exceptionnel. On n''avait jamais vu un
  tel feu. Et d''ailleurs, le pays n''a jamais été confronté à autant d''épisodes
  de pression, de feux, un peu partout sur le territoire. Le directeur général le
  rappelait, et je l’en remercie auprès du ministre de l''Intérieur de sa mobilisation
  ainsi que celle de l''ensemble des personnels. Jamais on n''avait connu ça depuis
  la fin de la Deuxième Guerre mondiale. Donc on est face à une pression qui est inédite.
  Alors face à ça, vous avez tenu, et c''est mes premiers mots, c''est vraiment vous
  remercier et vous dire ma gratitude. Vous avez tenu en vous projetant tout de suite,
  et je veux vraiment avoir un remerciement évidemment pour l''ensemble des pompiers,
  des sapeurs-pompiers, évidemment du SDIS de Seine-et-Marne, remercier l''ensemble
  des collègues qui sont venus de la France entière. Donc là, on a la Haute-Savoie,
  mais on a eu des centaines de sapeurs-pompiers qui sont venus de toute la France
  et merci beaucoup de vous être mobilisés pour venir en soutien aux copains. Et je
  remercie aussi les sapeurs-pompiers militaires qui sont venus, qu''il s''agisse
  des FORMISC ou des sapeurs-pompiers de Paris. C''était aussi un élément essentiel.
  On a projeté ici environ 1 000 sapeurs-pompiers au cœur de la crise. Donc ça a été
  une mobilisation inédite. Et à côté de ça, des moyens aussi de notre sécurité civile
  et de notre gestion de crise inédits en Île-de-France. On a eu 4 Dash et 2 Canadair
  qui ont été projetés ici, plus nos hélicoptères. Et ça, on ne l''avait jamais fait,
  en particulier les Dash et les Canadair, on ne l''avait jamais fait dans l''histoire
  en région Île-de-France. Et donc je veux vraiment vous remercier, tous ceux qui,
  dans le pic de la crise, vous êtes mobilisés de la France entière, remercier aussi
  les partenaires privés qui sont venus et qui se sont mobilisés à vos côtés. Tout
  ça s''est fait avec aussi le soutien de nos gendarmes et de nos policiers. Et je
  veux les en remercier parce qu''ils ont sécurisé les périmètres dans des conditions
  très difficiles, parce qu''ils ont facilité le travail évidemment de nos sapeurs-pompiers
  durant toute cette période, parce qu''ils ont contribué à protéger, à évacuer ce
  qui était déterminé, et que tout de suite ils ont aussi mené les investigations.
  Et donc je veux vraiment remercier nos gendarmes, nos policiers pour leur mobilisation,
  comme à chaque fois, en temps réel, pour protéger, pour intervenir, et puis pour
  mener aussi les investigations. Et je remercie Madame la procureure qui est avec
  nous et l''ensemble de nos magistrats parce que le travail a déjà commencé. Et je
  veux que le message soit clair pour tout le monde. On a déjà — évidemment je m''arrêterai
  là — des gens qui ont été appréhendés, mais rien ne sera lâché. Non, mais je veux
  que le message soit clair ici comme partout en France : il n''y aura aucune tolérance
  et nous serons intraitables, parce que ce sont des vies qui sont mises en danger,
  parce que c''est évidemment notre territoire national qui est attaqué à chaque fois
  qu''un feu se déclenche. Donc merci à vous pour tout le travail fait. Je veux évidemment
  remercier nos personnels de la Croix-Rouge, de la Croix-Blanche, l''ensemble des
  services, des mairies, du département qui se sont mobilisés pour aussi aider jour
  et nuit, avec tous les bénévoles qui ont été là pour venir en soutien une fois encore.
  Et puis remercier les personnels évidemment de l''ONF qui, je le sais, veillent
  tout au long de l''année sur notre forêt, qui continuent à sécuriser, à aider aux
  côtés de nos sapeurs-pompiers dans le cadre de leur mission, qui continuent de vérifier
  qu''il n''y ait pas de drame qui soit fait par ailleurs, et qui, je le sais, ont
  particulièrement mal aujourd''hui de ce qu''ils voient et de ce qu''ils vivent,
  parce que c''est leur vie au quotidien. Et remercier avec eux aussi les personnels
  de l''OFB, qui apportent dans leur mission un soutien important. Et puis évidemment,
  je veux remercier nos élus, parce que tout ça s''est tenu par un pacte formidable,
  mais comme à chaque fois, je le vois, en crise, entre évidemment les services de
  l''État sous l''autorité de Monsieur le préfet, pour qui j''ai un remerciement tout
  particulier, la Sécurité civile mobilisée et l''ensemble de nos sapeurs-pompiers,
  sous l''autorité du directeur général, ici présent, et de l''ensemble des équipes,
  mais avec, à chaque fois, nos élus qui ont été là. Et, Monsieur le ministre, Mesdames,
  Messieurs les maires et présidents de collectivités, je veux vous remercier vraiment,
  parce que je sais que ça vous a tous touchés aussi particulièrement parce que ce
  sont vos communes qui ont été impactées, vos vies, nos compatriotes, mais vous avez
  été mobilisés jour et nuit durant ces derniers jours pour pouvoir justement être
  en soutien, coordonnés avec les personnels. Et évidemment, j''ai un mot tout particulier
  pour le département, avec le SDIS qui était aux avant-postes de cet engagement et
  de tout cela. Et au fond, c''est l''équipe de France qui a résisté. Il y a près
  de 2 000 hectares avec les deux feux qui ont été brûlés malheureusement. Ça fait
  10 % de cette forêt. Mais je veux ici le dire avec force, par votre mobilisation
  ici en Seine-et-Marne, dans la région Île-de-France, par le soutien civil et militaire,
  et le soutien des bénévoles, par le soutien de la France entière, à date, et je
  suis toujours prudent parce qu''il faut l''être, on va continuer le travail, mais
  on ne déplore pas une victime. Et ça, c''est vraiment un exploit, et c''est grâce
  à vous. Alors maintenant, on va continuer. Je veux aussi dire où on en est. D''abord,
  tout ce travail, on ne part pas de rien. Il y a eu un réinvestissement de la nation
  durant toutes ces dernières années sur la sécurité civile, la gestion de crise,
  parce qu''on n''a pas attendu ce feu. Je dirais que parce que ces dernières années,
  malheureusement, on avait aussi connu des épisodes qui étaient très atypiques. On
  a connu des feux en Bretagne, on a connu des feux inédits en Gironde, on a connu
  des feux dans l''Est. Tout le pays peut être touché, et je pense que c''est important.
  Tout le pays peut être touché par ces feux. Et donc on a beaucoup réinvesti ces
  dernières années. Je me félicite que le ministre de l''Intérieur, dès juillet 2017,
  ait recommandé 6 Dash 8, les Dash qu''on utilise là. En 2017, on n''avait pas commandé
  depuis 10 ans, des Dash. 6 ont été commandés en 2017, les premiers sont arrivés
  en 2019, puis on a continué le réinvestissement capacitaire à se doter de Dash,
  de Canadair. En 2017, on ne produisait plus de Canadair. Il n''y avait pas de polémique
  à l''époque pour savoir si c''était 2, 4 ou 6, on en produisait zéro. On a relancé
  à ce moment-là une production de Canadair française en mobilisant les autres Européens,
  en commandant, en mettant 6 pays européens ensemble pour pouvoir relancer la filière,
  la produire. Donc on n''a pas attendu cette crise depuis 9 ans. On réarme là aussi
  notre sécurité civile avec un engagement inédit de la nation. On n''a jamais fait
  autant. On a reconstitué des colonnes de feu, on s''est redonné des moyens, on a
  fait ce fameux pacte capacitaire en 2022 que vous pilotez, que vous voyez arriver.
  On est à près de 60 % à peu près du déploiement de ce pacte. On l''aura fait l''année
  prochaine en totalité. Et donc c''est des colonnes de feu qu''on constitue, qu''on
  réarme et autres. Et donc tout ça, c''est des moyens en plus et aussi c''est ce
  qu''on a réinventé en termes de capacité de, si je puis dire, flexibilité, c''est-à-dire
  d''avoir des partenaires privés, de louer. Et donc l''État loue du matériel quand
  on a des pics de crise. Les départements, et je veux les saluer, louent aussi du
  matériel à nos côtés, c''est très important. Et on a aussi nos partenaires privés
  qui sont mobilisés, et je remercie nos partenaires qui sont là, FireRescue et Euro
  Disney, qui est là, fidèle au département et au territoire, et qui a fait partie
  de ceux qui ont contribué là sur cette crise. Ce qui fait que là où, en 2022, je
  parle sous le contrôle du DG, on devait être en aéronefs à peu près 20, on a continué
  à monter. Là, on mobilise 70 hélicos et avions, ce qui veut dire qu''on n''a jamais
  eu dans notre histoire autant de moyens mobilisables, jamais. Mais enfin, tout ça
  se fait par l''engagement des femmes et des hommes que vous êtes. Et ça, j''ai une
  immense reconnaissance. Et je veux remercier vraiment tous ceux qui vous aident
  au quotidien. J''ai eu un mot pour chacun ici. Mais au-delà des forces constituées,
  si je puis dire, je veux aussi avoir un mot pour nos agriculteurs. On l''avait déjà
  vu, je me souviens très bien, dans l''est de la France, quand on avait été touchés
  en plein été, nos agriculteurs étaient venus apporter l''eau. Ce qui a été fait
  là par les agriculteurs de la région et du département a été extraordinaire, et
  je veux les en remercier, parce que c''est à vos côtés une mobilisation exceptionnelle
  pour aller vous mettre l''eau au plus proche pour que les hélicos puissent venir
  les chercher. Et ça, c''est la France. C''est-à-dire quand on est face à la crise,
  à la confrontation, il y a une mobilisation de tous, des moyens civils, des moyens
  militaires. On a 140 militaires mobilisés, nos hélicos, nos moyens, là aussi, logistiques.
  Et donc tout ça, c''est exceptionnel. Et donc je veux vraiment vous dire merci,
  vous dire aussi ma fierté et vous dire à quel point cette unité, quand on est dans
  la crise, est notre force. Et je suis très admiratif de ce que vous avez fait ces
  derniers jours. Je sais que beaucoup d''entre vous n''ont pas dormi, se sont battus
  là depuis, en particulier le 12 juillet, même s''il y avait déjà des feux, pour
  ceux qui sont d''ici, qui avaient commencé avant. Mais vous avez pleinement illustré
  ce qu''est cet esprit du 14 juillet, c''est-à-dire celui de la concorde nationale,
  du combat organique d''une nation qui, dans toutes ses composantes, décide d''agir
  ensemble pour sauver des vies, pour sauver le territoire, et ne se demande pas qui
  fait quoi, s''organise, comme je dirais, de manière spontanée pour le faire, sous
  la coordination de notre préfet et de tous. Maintenant, quand je regarde les semaines
  à venir, d''abord, ici, il faut continuer le travail. Ça va quand même, on n''est
  plus dans la phase aiguë, le feu est stabilisé, fixé. On va faire le maximum pour
  pouvoir rouvrir les grands axes, rouvrir les commerces, là aussi, qui ont été fermés,
  je le dis, pour l''activité, dans les meilleurs délais. Et je veux que chacun sache
  la mobilisation, évidemment, de l''État, des collectivités locales à cet égard,
  et agir pour que la vie puisse, partout où on le peut, reprendre ses droits. Il
  va y avoir évidemment plusieurs semaines de travail pour totalement éteindre ce
  feu, à cause du, vous le connaissez mieux que moi, mais de ce terrain qui est complexe,
  de la tourbe, du fait qu''on peut avoir des feux qui réapparaissent et des conditions
  météorologiques par ailleurs. Et donc il faut avoir cette humilité aussi et cette
  patience, je le dis pour tous, parce qu''il y aura une mobilisation qui va se poursuivre.
  À côté de ça, dans la France entière, on va avoir un été, on le sait, qui sera dur.
  Il sera dur parce qu''on a déjà battu tous les records et on est à mi-juillet, et
  la saison des feux est encore devant nous normalement, quand je regarde les rythmes
  habituels. Et donc on a tous besoin de rester unis, et je le dis pour Monsieur le
  Directeur général, l''ensemble des personnels de la Sécurité civile. Au moment où
  on prend la maîtrise du feu ici, on sait qu''on est en vigilance extrême dans le
  Var, en Corse aussi. On a un Sud-Est qui est extrêmement sec, avec des températures
  très élevées, avec beaucoup de vent, et qui du coup est très vulnérable aux incendies.
  Et donc on a redéployé des moyens, on en a remis vers Istres et au-delà pour être
  aux avant-postes. Et donc je le sais, on sera aussi confrontés à d''autres événements,
  et tout au long de l''été. Et donc pour ce faire, je veux ici repasser des messages
  simples : la prévention. Nous sommes tous, nous et nos compatriotes, détenteurs
  de cette mission de prévention. Il faut appeler chacun à la vigilance. Chaque geste
  est important. Et donc aucune négligence, et une vigilance quand on voit des comportements
  inappropriés. Et cette prévention est essentielle pour éviter que des feux prennent
  de l''ampleur. Ensuite, c''est l''alerte avancée. Et là, je veux saluer aussi tout
  le travail que fait Météo-France à nos côtés, qu''on a complètement transformé ces
  dernières années. Les cartes sont disponibles, on voit sur Météo-France, chacun
  peut être en situation de vigilance et aux avant-postes, mais on doit vraiment prépositionner
  nos moyens, et dès qu''il y a de la préalerte, savoir nous déployer. Ensuite, tenir
  dans la durée. Et ça, ça va être tout notre travail pour régénérer les forces, nous
  permettre d''avancer et tenir. Et puis, être intraitables dans le traitement et
  dans le suivi judiciaire. C''est-à-dire partout où il y a des négligences comme
  des comportements criminels, parce que je veux être clair, c''est aussi une négligence
  qui conduit à des grands risques, et donc ça n''est pas rien. Et donc que derrière,
  il y ait un suivi comme il se doit. Donc voilà ce que je voulais dire pour l''été
  qui vient. On va continuer donc de mobiliser et d''être vigilants, et puis aussi
  avec nos forces de police, de gendarmerie et nos magistrats, d''agir. Et puis, je
  voulais avoir un dernier mot pour notre forêt de Fontainebleau. Évidemment, là,
  les semaines à venir, c''est l''urgence, c''est maîtriser le feu. Ensuite, il faudra
  une certaine patience dans certains endroits, on le sait, sous la houlette des professionnels,
  mais c''est évidemment votre forêt. C''est notre forêt parce que c''est un trésor.
  C''est notre forêt parce que vous avez enclenché, Monsieur le ministre, je parle
  sous votre contrôle, mais un engagement collectif ici pour la classer à l''UNESCO.
  Il se trouve que j''en entends parler chez moi puisque vous avez engagé mon épouse
  dans cette aventure en lui demandant d''être marraine de cette candidature, et donc
  elle est… Elle va venir vous voir aussi dans les prochains temps pour être à vos
  côtés sur cela. Et puis, c''est un trésor à la fois d''accueil du public, de biodiversité,
  et cette forêt, on y tient. Et donc évidemment, tout ça va s''organiser dans le
  bon ordre, mais dès maintenant, on va lancer la mobilisation pour replanter et rebâtir
  cette forêt. Et on va le faire dès maintenant en bon ordre, en mobilisant avec la
  ville de Fontainebleau, l''ONF et la Fondation du patrimoine, que je remercie et
  qui nous a aidés à beaucoup de collectes, parce que c''est un patrimoine naturel.
  Et donc la Fondation du patrimoine, l''ONF et la ville de Fontainebleau vont lancer
  là, dans les prochaines heures, un guichet unique pour permettre de collecter la
  solidarité nationale. Et je compte donc sur chacune et chacun pour pouvoir dès maintenant
  donner pour la forêt de Fontainebleau et nous permettre de faire le travail dans
  la durée, de replanter, de rebâtir et de continuer de nous améliorer aussi pour
  que cette forêt soit encore demain mieux protégée. Voilà ce que je voulais vous
  dire pour aussi vous donner quelques mots d''espoir et pour nous projeter collectivement
  sur notre avenir. Je veux évidemment, en finissant mon propos, réitérer mes remerciements,
  avoir une pensée pour les près de 1 000 de nos compatriotes qui ont été déplacés,
  qui ont dû quitter leur domicile dans, je le sais, beaucoup d''angoisse. Mais tout
  ça s''est bien fait grâce à vous collectivement, et c''est une force qu''ils puissent
  tous retrouver leur domicile dans les meilleures conditions. Et en concluant mon
  propos, je voudrais ici rappeler à tous la mémoire du caporal Baptiste Gerfaud-Valentin,
  jeune sapeur-pompier volontaire de 22 ans qui est tombé en Savoie. Tout près de
  chez vous. Et je ne pouvais pas finir sans évoquer son nom, sa mémoire. L''hommage
  national lui a été rendu, voilà, il y a quelques jours. Mais ceci montre ô combien
  la mission n''est jamais une mission innocente. Et là, je suis là pour vous féliciter,
  pour dire que tout s''est bien passé. Vous avez gagné et vous allez gagner jusqu''au
  bout. Mais que nul n''oublie que lorsqu''on se bat face au feu, le pire peut advenir
  et que vous êtes ces soldats du feu qui prenez tous les risques. Et donc c''est
  aussi en mémoire de lui que je vous félicite aujourd''hui. Voilà. Merci infiniment
  à tous et toutes de ce que vous avez fait ces derniers jours. C''est une immense
  fierté. Vous pouvez être fiers. Moi, je suis très fier de ce que vous avez fait
  pour cette forêt, pour nos compatriotes qui vivaient là, pour le pays. Et on continuera
  de se battre tout l''été et on continuera d''y mettre tous les moyens et tout l''engagement,
  et je suis avec vous. Vive la République et vive la France ! 16 juillet 2026 - Seul
