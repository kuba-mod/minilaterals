title: Communiqué Sommet Lumière.
text: Le Président de la République française, Emmanuel Macron, et le Président de
  la République de Corée, Lee Jae-myung, coprésideront le Sommet Lumière, le lundi
  7 septembre 2026 à Saint-Paul de Vence. Premier sommet international consacré à
  l’avenir du cinéma et de l’image animée, cet événement réunira 150 invités de haut
  niveau en provenance de plus de 30 pays des cinq continents, parmi lesquels les
  principaux dirigeants et décideurs internationaux des secteurs du cinéma, de l’audiovisuel
  et du jeu vidéo, ainsi que des personnalités politiques et des talents portant les
  engagements du Sommet. Ensemble, ils échangeront sur les défis et les opportunités
  pour l’avenir du cinéma et de l’image animée, et s’engageront sur des actions concrètes
  pour le secteur, s’agissant notamment des impacts de l’intelligence artificielle,
  de l’éducation aux images dès le plus jeune âge, ou encore de son modèle économique.
  Le Sommet Lumière offrira ainsi une plateforme stratégique pour forger de nouvelles
  alliances pour le cinéma et l’image animée. Il sera aussi l’occasion d’illustrer
  en actes l’attractivité toujours renouvelée de la France dans les domaines du cinéma,
  des séries, de l’animation et du jeu vidéo, au bénéfice des Français et de nos territoires,
  et de valoriser les atouts, aussi bien industriels que culturels, que la France
  a à offrir pour bâtir l’avenir du cinéma et de l’image animée.
