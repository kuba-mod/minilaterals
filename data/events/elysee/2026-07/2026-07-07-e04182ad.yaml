title: Proposition de nomination de François-Noël Buffet en qualité de Défenseur des
  droits.
text: Le Président de la République envisage, sur proposition du Premier ministre,
  de nommer M. François-Noël Buffet en qualité de Défenseur des droits. La Présidente
  de l’Assemblée nationale et le Président du Sénat sont saisis de ce projet de nomination,
  afin que la commission intéressée de chacune des assemblées se prononce dans les
  conditions prévues par le cinquième alinéa de l’article 13 de la Constitution.
