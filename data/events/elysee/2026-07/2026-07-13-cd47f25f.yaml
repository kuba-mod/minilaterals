date: '2026-07-13'
type: press_release
source_name: elysee
title: Déplacement à l'Hôtel de Brienne.
text: 'Le Président de la République et Brigitte Macron se sont rendus à l’Hôtel de
  Brienne, ce lundi 13 juillet 2026, pour la réception en l’honneur des troupes appelées
  à défiler à l’occasion de la fête nationale du 14 juillet 2026. Dans un contexte
  stratégique marqué par le retour de la guerre de haute intensité , l’accumulation
  des menaces et l’instabilité , la France s’est dotée des moyens d’agir. L’adoption
  définitive de l’actualisation de la loi de programmation militaire traduit la volonté
  d’aller plus vite, plus loin et plus fort pour que la France continue de tenir son
  rang. Après une rencontre avec des familles endeuillées , le Président Emmanuel
  Macron a pris la parole devant les militaires. Il a souligné que la France est un
  partenaire fiable et stable , fidèle à ses engagements et guidé par une ligne claire :
  la non-belligérance dans les conflits qu’elle n’a pas choisis, le respect du droit
  international et la défense de la liberté, y compris la liberté de navigation. Il
  a également redit sa détermination et sa reconnaissance en tant que chef des armées.
  13 juillet 2026 - Seul le prononcé fait foi Monsieur le Premier ministre, Madame
  la ministre des Armées et des Anciens combattants, Madame la ministre déléguée,
  Mesdames et Messieurs les ambassadrices et ambassadeurs, Monsieur le président de
  la Commission de la défense nationale et des forces armées de l''Assemblée nationale,
  Monsieur le président de la Commission des affaires étrangères, de la défense et
  des forces armées du Sénat, Mesdames et Messieurs les parlementaires, Monsieur le
  chef d''état-major des armées, Monsieur le délégué national de l''Ordre de la Libération,
  Monsieur le délégué général pour l''armement, Monsieur le secrétaire général pour
  l''administration, Messieurs les chefs d''état-major, Monsieur le directeur général
  de la Gendarmerie nationale, Monsieur le gouverneur militaire de Paris, Mesdames
  et Messieurs les officiers généraux, Mesdames et Messieurs les directeurs, officiers,
  sous-officiers, officiers mariniers, militaires du rang, marins, aviateurs et personnels
  civils des armées, Mesdames et Messieurs. Je suis particulièrement heureux et fier
  de vous retrouver aujourd''hui ici, à l''hôtel de Brienne, dans ce lieu chargé d''histoire
  où, dans le bruit des canons de la guerre, Clemenceau organisa la victoire et où
  siègera plus tard le général de Gaulle comme chef du gouvernement provisoire. C''est
  la 10ème fois que j''ai l''honneur, ici, de me tenir devant vous. Il y a 9 ans,
  sitôt élu par les Français, je vous annonçais un tournant historique pour nos Armées,
  tournant auquel beaucoup avaient cessé de croire, habitués aux coupes budgétaires
  successives. Avec vous, j''entendais ainsi renouer avec l''esprit des volontaires
  de l''an II, esprit de liberté exigeant de l''audace, encore de l''audace, toujours
  de l''audace. Je vous annonçais que le budget de la défense serait augmenté, que
  les engagements seraient tenus et que la France et ses armées seraient à la hauteur
  de leurs devoirs et responsabilités. Je fixais pour cela un objectif clair, vérifiable :
  atteindre dès 2025 un effort de défense à hauteur de 2 % de la richesse du pays.
  J''en prenais ici l''engagement solennel. J''en prenais l''engagement parce que
  j''étais alors convaincu que les périls du monde imposaient de redresser nos armées.
  Parce que la nation a toujours su se rassembler pour défendre sa liberté par les
  armes quand il faut, héritière en cela des soldats de Valmy, des héros de Camerone,
  des Poilus de Verdun et des Braves de Bir Hakeim. L''engagement a été tenu et nous
  avons bien fait. Avant même que le Sahel ne sombre dans le chaos, avant même que
  le Proche et Moyen-Orient ne s''enflamment, avant même que la guerre n''arrive sur
  le sol européen, nous avions amorcé notre réarmement. Avant même le lancement de
  cette guerre insensée que mène la Russie contre la nation et la terre d''Ukraine,
  avant toutes les turbulences que nous traversons aujourd''hui, nous prônions l''autonomie
  stratégique de la France et de l''Europe. L''autonomie stratégique, cette indépendance
  dans l''analyse, dans la décision et dans l''action, cette liberté au fond, cette
  ambition pour notre pays et qui fait la grandeur de la France et sa singularité
  dans le concert des nations. La France qui refuse l''esprit de ce que fut l''Étrange
  Défaite, la France qui parle au monde, la France libre. L''engagement a été tenu,
  les faits sont là. Et l''an dernier, à cette même place, je demandais d''aller plus
  vite, d''aller plus fort, être libre, être craint, être puissant, non par plaisir,
  mais par nécessité. « On n''agit pas par goût, mais parce que le devoir l''impose.
  » comme l''écrivait Marc Bloch. Je demandais donc d''accélérer encore cet effort
  de défense et fixais pour objectif d''avancer à 2027 l''ambition initialement prévue
  pour 2030 d''atteindre un budget de 64 milliards d''euros pour nos Armées. 64 milliards
  d''euros, en 2027, c''est, en 10 ans, un doublement du budget des Armées. Nous l''avons
  chaque année tenu à l''euro près et ce sera fait. Oui, l''engagement a été tenu,
  les faits sont là et l''histoire jugera. Et je veux ici saluer le sérieux du travail
  accompli par la ministre des Armées et des Anciens combattants, Madame Catherine
  Vautrin, et par la représentation nationale qui a massivement voté ce texte d''actualisation
  et la loi de programmation militaire il y a quelques jours dans un esprit de concorde
  et de responsabilité. Et ce faisant, je veux remercier l''ensemble de vos prédécesseurs
  qui, durant ces 10 dernières années, ont permis ces votes successifs et ont permis
  de tenir ces budgets à l''euro près. Un effort supplémentaire de 36 milliards d''euros
  est donc prévu pour la période 2026-2030 avec, vous le savez, trois grandes priorités.
  D''abord, l''augmentation de nos stocks de munitions et le renforcement de la préparation
  opérationnelle. Ensuite, des moyens supplémentaires pour garantir notre souveraineté :
  alerte avancée, espace, feu dans la très grande profondeur, défense sol-air et aussi
  le rehaussement de notre dissuasion nucléaire en cohérence avec le virage stratégique
  que nous avons annoncé au mois de mars dernier avec la mise en place de la dissuasion
  avancée. Enfin, l''amélioration de la capacité des armées à mener les combats qui
  pourraient s''imposer dès demain, défense surface-air, lutte anti-drones, guerre
  dans le champ électromagnétique, drones de tous types, quantiques, intelligence
  artificielle, en plus de ce qui avait déjà été acté en 2023, avec le cyber, le spatial
  et le maritime. Cette actualisation doit produire des effets visibles avec des commandes
  et des premières livraisons dès 2026. Cette actualisation entend aussi renforcer
  la résilience de la nation avec le nouveau régime d''état d''alerte, avec le service
  national qui commencera dès septembre et permet au fond de consolider cette force
  d''âme dont je parlais ici en 2024. C''était une nécessité. On en mesure la nécessité
  en mer d''Arabie, où notre Marine nationale est engagée depuis de longs mois. Et
  quelle belle preuve de vigueur de nos forces navales après 4 siècles au service
  de la France ! Je veux ici féliciter nos marins déployés depuis de longs mois et
  leur chef, l''amiral Nicolas Vaujour, qui transmettra à son successeur, après 37
  années de guerre des mers, une Marine opérationnelle dont il peut être fier. Merci,
  amiral, et bonne mer à votre successeur, l''amiral Christophe Cluzel ! On en mesure
  la nécessité avec la Coalition des Volontaires qui se réunira cet après-midi aux
  Invalides pour prendre les décisions qui s''imposent et continuer à soutenir l''Ukraine
  qui défend son territoire, qui défend sa souveraineté, qui défend sa liberté et,
  par voie de conséquence, notre sécurité en Europe. Je remercie le chef d''État-major
  des armées, le général Fabien Mandon, pour tout ce qui a été fait depuis 18 mois
  maintenant à cet égard. Et je salue nos soldats déployés en Roumanie. Notre armée
  de Terre, une fois encore et là aussi, a été au rendez-vous. Et notre armée de Terre
  dont vous rendez cet été le commandement, cher général Pierre Schill, après avoir
  œuvré pour sa transformation et sa préparation à la haute intensité, avec un sens
  du commandement marqué par la subsidiarité et la confiance. Merci, mon général,
  et bon vent à votre successeur, le général Jacques Langlade de Montgros. On en mesure
  la nécessité quand nos partenaires, je pense aux Émirats arabes unis, au Qatar,
  à la Jordanie, constatent dans les faits, notamment grâce à notre armée de l''Air
  et de l''Espace, la force qui est la nôtre. Et je veux ici remercier l''ensemble
  de nos pilotes, de nos mécaniciens, sous votre commandement, général Bellanger.
  Oui, chacun dans cette région a pu mesurer, comme ailleurs, la fiabilité des engagements
  pris par la France pour leur sécurité. La France est un partenaire fiable, stable,
  qui tient ses engagements et qui tient une ligne dure : la ligne de la non-belligérance
  dans les conflits qu''elle n''a pas choisis, la ligne du respect du droit international,
  de la liberté, y compris la liberté de navigation qu''elle comptait aider à faire
  respecter dans le détroit d''Ormuz. Et c''est la même volonté de respect de la souveraineté
  et de la liberté de navigation qui a présidé depuis 8 années à notre stratégie Indo-Pacifique
  et qui a expliqué beaucoup de nos réussites dans cette région, la ligne de la défense
  de nos intérêts et de nos amis partout dans le monde lorsque c''est nécessaire.
  Et je pense à nos déploiements récents et ponctuels comme en Finlande, mais aussi
  à nos engagements plus pérennes en Estonie, en Lituanie, au Liban, en Irak. On en
  mesure la nécessité dans tous les théâtres où nos services extérieurs opèrent, et
  je veux ici remercier la DGSE, l''ensemble de ses agents, et nous n''en oublions
  aucun, ainsi que leurs directeurs, qui agissent dans la confidentialité requise
  pour la sécurité et les intérêts de la nation. Et nous en mesurons la nécessité
  aussi sur le territoire national à travers l''opération Sentinelle qui se poursuit
  et mobilise nos forces et à travers la présence partout sur le territoire de notre
  gendarmerie. Merci, mon général. Dans ce brouillard de la guerre, la France n''est
  pas seule. Bien au contraire. Ancrée dans son socle européen, mais apte aussi au
  plus grand large, elle sait proposer des initiatives et fédérer des coalitions.
  Cela, nous l''avons montré il y a quelques années, dès Takouba, en étant nation
  cadre et en commençant à agréger au cœur de l''Afrique les forces de tant de pays.
  Et nous l''avons montré il y a 18 mois en bâtissant cette Coalition des Volontaires,
  avec nos amis britanniques. Et nous serons honorés, et je les remercie de leur présence
  parmi nous ce midi, quand en tête des troupes défilent demain nos partenaires de
  la Coalition des Volontaires, éléments avancés qui incarnent en particulier la capacité
  des Européens à saisir leur destin et à prendre leur sécurité en main, associant
  tant de nations européennes et à leurs côtés le Canada, et les démocraties de l''Indo-Pacifique.
  Là aussi, en quelques années, nous aurons bâti des capacités nouvelles en Europe
  et orchestré un réveil stratégique. L''Europe est en train de devenir une puissance
  s''appuyant sur les États qui la constituent, respectueuse de leurs décisions souveraines,
  mais assumant de se défendre et d''agir unie, une Europe qui ne sera pas celle des
  nationalismes qui l''ont longtemps consumée, mais qui, en conjuguant les patriotismes
  de leurs membres, en agissant unis, nous rend tous plus forts. Le message que nous
  envoyons au monde est le suivant : oui, la paix est notre but, oui, nous chérissons
  la liberté et le droit, et oui, nous nous tenons prêts à combattre pour les défendre,
  toujours, et au prix du sang s''il le faut. Ce prix du sang, payé par nos soldats
  français morts pour la France, blessés dans leur chair ou leur âme. Et je veux redire
  le respect de la Nation pour ces soldats morts pour la France. Notre affection aux
  familles endeuillées auprès desquelles j''étais il y a un instant avant de vous
  rejoindre, à nos blessés, à toutes leurs familles. Et notre attachement aux pensionnaires
  de l''Institution nationale des Invalides. La reconnaissance de la Nation, notre
  soutien et ma compassion aux familles sont là pour signifier que la France n''oublie,
  et n''oubliera jamais leur nom. De même que nous n''oublions jamais nos anciens
  combattants qui portent tant de nos combats, notre mémoire, nos engagements, et
  dont je remercie ici les grandes fédérations et les associations. Je salue également
  le travail accompli par la ministre déléguée, Madame Alice Rufo, pour améliorer,
  entre autres choses, l''accompagnement des blessés avec une prise en charge plus
  coordonnée et plus humaine ; là encore, l''engagement a été tenu. J''apporte, vous
  le savez, la plus grande attention à la condition militaire. Chef des armées, j''en
  suis l''ultime garant. À cet égard, j''entends que les efforts consentis ces dernières
  années pour les militaires et leurs familles ne soient pas remis en cause, en particulier
  par des mesures d''économies portées à l''aveugle qui ont tant abîmé nos armées
  il y a quelques années. Oui, la Nation sait ce qu''elle doit à ses soldats et à
  leurs familles. Oui, pour nous défendre, nous avons besoin des meilleurs de nos
  concitoyens dans tous les métiers, du combat comme du soutien, pour continuer à
  disposer d''un modèle d''armée complet. Oui, nous devons attirer, oui, nous devons
  fidéliser, oui, nous devons compenser justement les suggestions. Et je remercie
  à ce titre le Haut Comité d''évaluation de la condition militaire pour son travail
  et sa vigilance chaque année, mais également le secrétariat général des armées,
  le CEMA et l''ensemble des chefs et des ministres pour leur grande vigilance. C''est
  l''ambition que je porte pour les soldats de la France depuis que je suis président
  de la République. Je veux ici saluer l''engagement exigeant de celles et ceux qui
  font ce choix de servir la France et de défendre ses intérêts et ses valeurs partout
  dans le monde. Ce choix de l''engagement, de la disponibilité en tout temps et en
  tout lieu, de la patrouille sur terre, dans les airs, sur mer et sous les mers,
  du courage et de la bataille, cette ouverture volontaire au sacrifice, cette exigence
  fondamentale de l''efficacité pour réaliser la mission, quel qu''en soit le prix
  des mutations et des déménagements qui ont tant d''impacts sur la vie personnelle
  et sur toutes les familles. La condition militaire est au fond le corollaire du
  réarmement. Les deux notions sont indissociables. C''est une question de cohérence,
  de crédibilité et un enjeu d''efficacité. Voilà pourquoi j''ai veillé à améliorer
  les rémunérations des militaires, la situation des familles, des blessés. Voilà
  pourquoi je resterai vigilant jusqu''à la dernière seconde à ce que les conditions
  de vie des militaires, de leurs familles, y compris leur logement, soient améliorées.
  Voilà pourquoi je m''y suis engagé comme je m''y suis engagé dans d''autres cénacles.
  En 2027, une part des primes viendra intégrer le calcul des pensions militaires.
  Je sais combien cette mesure est attendue et je sais pouvoir compter, sur ce sujet
  comme sur tout le reste, sur la mobilisation et la vigilance du Premier ministre,
  cher Sébastien Lecornu, tant attaché aussi à nos armées. Voilà pourquoi je serai
  attentif à ce que la trajectoire des effectifs fixée par la loi de programmation
  militaire soit respectée. Ils sont une pièce essentielle de notre réarmement. Notre
  réarmement, ce sont aussi les efforts que fait la direction générale de l''armement
  —et merci au délégué général pour ses efforts, son travail— et nos industriels,
  animés par elle, pour innover là où d''autres continuent encore à entretenir des
  rentes de situation. Compte tenu des menaces, toute notre industrie de défense doit
  se mobiliser pour gagner en agilité, répondre aux enjeux et continuer d''être compétitive,
  innover, se positionner, savoir quand se recentrer sur la rusticité et pouvoir produire
  en volume certaines armes quand les besoins l''exigent. La guerre en Ukraine et
  les risques identifiés par la Revue nationale stratégique montrent bien qu''aujourd''hui,
  ce n''est plus seulement le stock, mais le flux qui détermine la stabilité stratégique
  en Europe. Ce ne sont plus les arsenaux existants, mais la capacité d''en produire
  qui sauront décourager les adversaires. L''Ukraine nous donne à cet égard une leçon
  spectaculaire. Et soyons lucides, nous avons pris de nombreuses initiatives, lancé
  beaucoup de choses, réinvesti comme jamais. Nous avons, il y a un peu plus de 4
  ans, lancé l''économie de guerre. Mais est-ce que c''est suffisant ? Non. Face à
  la concurrence internationale, à l''accélération dans tous les domaines du jeu,
  à l''émergence de nouveaux compétiteurs, y compris insoupçonnés parfois il y a quelques
  mois, nous devons continuer d''investir davantage, tant des fonds publics européens
  que des fonds publics nationaux, mais aussi des fonds privés. Nous devons innover.
  Nos entreprises du secteur doivent s''habituer à prendre davantage de risques. À
  s''habituer à prendre des risques sans forcément sécuriser toutes les commandes,
  comme on le fait dans beaucoup de secteurs, à produire aussi plus vite, à mobiliser
  les programmes et les financements européens que nous avons très souvent inspirés
  nous-mêmes, à tout faire pour bâtir des standards européens et une vraie préférence
  européenne. Ceci doit être vrai dans le domaine spatial, comme l''a très bien montré
  la revue stratégique coordonnée par le SGDSN, et je l''en remercie. Le sommet que
  nous organiserons en septembre prochain permettra d''avancer, je l''espère, dans
  ce domaine. Mais il nous faut continuer d''accélérer. L''opération BROMO est, à
  cet égard, soutenue par le Gouvernement, l''ensemble de l''État français comme de
  nos partenaires pour, là aussi, créer plus de synergies, rapprocher nos grands opérateurs,
  mais nous devons aller plus loin sur les projets européens de constellations communes
  d''innovation en commun, de standards européens. C''est la même chose dans les autres
  domaines. Malgré l''échec du SCAF, que je regrette profondément, nous aurions tort
  de nous arrêter là, et nous aurions tort de penser que les réalités d''aujourd''hui
  sont vraies dans 10 ans, 15 ans ou 20 ans, et qu''il n''y aurait pas des compétiteurs
  qui vont émerger. Alors avançons sur le SAMP/T nouvelle génération, sur l''alerte
  avancée avec JEWEL, sur le tir dans la profondeur où nous devons bâtir nos propres
  solutions en cohérence complète avec la dissuasion avancée que nous avons décidée.
  Avançons sur le char de combat avec KNDS. Avançons sur des projets multiples qui
  nous permettent de faire de l''Europe une réalité industrielle et en acte. Partout
  où on crée de la dyssynergie, on se fait plaisir sur le moment, mais on crée les
  retards de demain. Partout où on flatte les nationalismes, en France ou ailleurs,
  on se trompe sur l''histoire qui est la nôtre. Le patriotisme, oui, le nationalisme,
  jamais. Et au moment où l''Europe se réarme, penser qu''accumuler chacun séparément
  des capacités est le sens de l''histoire, c''est une absurdité. Nous devons bâtir
  en Européens et garder nos spécificités propres, nos modes de décision, nos forces
  d''intervention, notre crédibilité. Mais ne faisons pas bégayer l''histoire. Il
  nous faut aussi reconnaître que dans les drones, les intercepteurs, les missiles
  ou les munitions, nous ne produisons pas assez vite, nous ne produisons pas assez
  fort et nous devons nous adapter pour nos propres besoins, là où je vois nos armées
  attendre parfois des mois, si ce n''est des années, les capacités qu''on leur promet,
  mais aussi pour être compétitifs à l''international. Nous ne vendrons pas des solutions
  si nous expliquons aux clients qui veulent se protéger aujourd''hui que nous leur
  livrerons les munitions, les missiles qui vont avec dans 5 ans, 6 ans, 7 ans. Des
  compétiteurs arrivent qui leur proposent pour demain. Et donc nous devons, là aussi,
  investir, prendre des risques. Je compte sur nos industriels pour le faire et réaliser
  ce nouvel ordre, mais aussi pour mobiliser nos PME, nos start-ups, l''ensemble de
  nos écosystèmes pour produire partout mieux sur le territoire français. Les commandes
  historiques des dernières années et nos succès à l''export nous obligent et doivent
  nous conduire à une exigence redoublée. Enfin, je veux saluer l''engagement de la
  jeunesse de France, qui a répondu présente à l''appel et qui rejoindra dès septembre
  nos rangs en effectuant dans les armées son service national. J''irai à la rencontre
  des appelés du service national à la rentrée en chef des Armées pour les féliciter.
  Et je veux remercier le chef d''État-major des Armées et ses équipes pour la mise
  en œuvre de ce projet que j''avais annoncé en novembre dernier à Varces. Il est
  essentiel pour consolider cette force d''âme. Il est essentiel pour continuer à
  recruter les meilleurs. Il est essentiel pour continuer aussi à accroître notre
  réserve. Et nous savons que dans les enjeux aussi de la mobilisation nationale,
  il y a les objectifs que nous nous sommes fixés pour doubler les effectifs de celle-ci.
  Mes chers compatriotes, soldats, aviateurs, marins, nous avons beaucoup fait pour
  redresser nos armées et nous continuerons à le faire parce qu''une armée statique
  serait une armée défaite. Et dans ce monde en bascule, nous devons conserver un
  temps d''avance, anticiper les chocs et les besoins. Nous devons être stratèges
  et nourrir une vision prospective. Cette vision de la défense à 10 ans, je la livrerai
  prochainement à l''occasion des 150 ans de l''École de guerre qui forme les officiers
  supérieurs dont la France a besoin demain pour tenir son rang. Oui, nous devons
  préparer les guerres à venir, mais ne nous trompons pas, notre capacité à les mener
  dépendra de notre crédibilité aujourd''hui. Ce sont les guerres d''aujourd''hui
  que nous devons gagner. C''est notre force à tenir sur le front ukrainien, c''est
  notre capacité à être là où nos partenaires nous attendent, au Proche et Moyen-Orient,
  c''est notre capacité à continuer à être des partenaires tels que nous l''avons
  reconçu en Afrique, c''est notre capacité à nous tenir dans l''Indo-Pacifique qui
  déterminera notre capacité à tenir les enjeux de 2030. Tout se joue aujourd''hui,
  ici, encore. Tout ce qui a été fait depuis 10 ans nous a rendus plus forts, mais
  soyons humbles, exigeants, il nous reste beaucoup à faire. Alors, aujourd''hui,
  à la veille de notre fête nationale, à l''occasion de laquelle la nation se rassemblera
  Place de la Concorde pour rendre hommage à ces soldats, je veux ici en ce jour vous
  redire ma détermination, ma reconnaissance et ma fierté d''être à vos côtés depuis
  2017. C''est ma plus grande fierté. Vous avez ma confiance. 13 juillet 2026 - Seul
  le prononcé fait foi Monsieur le Premier ministre, Madame la ministre des Armées
  et des Anciens combattants, Madame la ministre déléguée, Mesdames et Messieurs les
  ambassadrices et ambassadeurs, Monsieur le président de la Commission de la défense
  nationale et des forces armées de l''Assemblée nationale, Monsieur le président
  de la Commission des affaires étrangères, de la défense et des forces armées du
  Sénat, Mesdames et Messieurs les parlementaires, Monsieur le chef d''état-major
  des armées, Monsieur le délégué national de l''Ordre de la Libération, Monsieur
  le délégué général pour l''armement, Monsieur le secrétaire général pour l''administration,
  Messieurs les chefs d''état-major, Monsieur le directeur général de la Gendarmerie
  nationale, Monsieur le gouverneur militaire de Paris, Mesdames et Messieurs les
  officiers généraux, Mesdames et Messieurs les directeurs, officiers, sous-officiers,
  officiers mariniers, militaires du rang, marins, aviateurs et personnels civils
  des armées, Mesdames et Messieurs. Je suis particulièrement heureux et fier de vous
  retrouver aujourd''hui ici, à l''hôtel de Brienne, dans ce lieu chargé d''histoire
  où, dans le bruit des canons de la guerre, Clemenceau organisa la victoire et où
  siègera plus tard le général de Gaulle comme chef du gouvernement provisoire. C''est
  la 10ème fois que j''ai l''honneur, ici, de me tenir devant vous. Il y a 9 ans,
  sitôt élu par les Français, je vous annonçais un tournant historique pour nos Armées,
  tournant auquel beaucoup avaient cessé de croire, habitués aux coupes budgétaires
  successives. Avec vous, j''entendais ainsi renouer avec l''esprit des volontaires
  de l''an II, esprit de liberté exigeant de l''audace, encore de l''audace, toujours
  de l''audace. Je vous annonçais que le budget de la défense serait augmenté, que
  les engagements seraient tenus et que la France et ses armées seraient à la hauteur
  de leurs devoirs et responsabilités. Je fixais pour cela un objectif clair, vérifiable :
  atteindre dès 2025 un effort de défense à hauteur de 2 % de la richesse du pays.
  J''en prenais ici l''engagement solennel. J''en prenais l''engagement parce que
  j''étais alors convaincu que les périls du monde imposaient de redresser nos armées.
  Parce que la nation a toujours su se rassembler pour défendre sa liberté par les
  armes quand il faut, héritière en cela des soldats de Valmy, des héros de Camerone,
  des Poilus de Verdun et des Braves de Bir Hakeim. L''engagement a été tenu et nous
  avons bien fait. Avant même que le Sahel ne sombre dans le chaos, avant même que
  le Proche et Moyen-Orient ne s''enflamment, avant même que la guerre n''arrive sur
  le sol européen, nous avions amorcé notre réarmement. Avant même le lancement de
  cette guerre insensée que mène la Russie contre la nation et la terre d''Ukraine,
  avant toutes les turbulences que nous traversons aujourd''hui, nous prônions l''autonomie
  stratégique de la France et de l''Europe. L''autonomie stratégique, cette indépendance
  dans l''analyse, dans la décision et dans l''action, cette liberté au fond, cette
  ambition pour notre pays et qui fait la grandeur de la France et sa singularité
  dans le concert des nations. La France qui refuse l''esprit de ce que fut l''Étrange
  Défaite, la France qui parle au monde, la France libre. L''engagement a été tenu,
  les faits sont là. Et l''an dernier, à cette même place, je demandais d''aller plus
  vite, d''aller plus fort, être libre, être craint, être puissant, non par plaisir,
  mais par nécessité. « On n''agit pas par goût, mais parce que le devoir l''impose.
  » comme l''écrivait Marc Bloch. Je demandais donc d''accélérer encore cet effort
  de défense et fixais pour objectif d''avancer à 2027 l''ambition initialement prévue
  pour 2030 d''atteindre un budget de 64 milliards d''euros pour nos Armées. 64 milliards
  d''euros, en 2027, c''est, en 10 ans, un doublement du budget des Armées. Nous l''avons
  chaque année tenu à l''euro près et ce sera fait. Oui, l''engagement a été tenu,
  les faits sont là et l''histoire jugera. Et je veux ici saluer le sérieux du travail
  accompli par la ministre des Armées et des Anciens combattants, Madame Catherine
  Vautrin, et par la représentation nationale qui a massivement voté ce texte d''actualisation
  et la loi de programmation militaire il y a quelques jours dans un esprit de concorde
  et de responsabilité. Et ce faisant, je veux remercier l''ensemble de vos prédécesseurs
  qui, durant ces 10 dernières années, ont permis ces votes successifs et ont permis
  de tenir ces budgets à l''euro près. Un effort supplémentaire de 36 milliards d''euros
  est donc prévu pour la période 2026-2030 avec, vous le savez, trois grandes priorités.
  D''abord, l''augmentation de nos stocks de munitions et le renforcement de la préparation
  opérationnelle. Ensuite, des moyens supplémentaires pour garantir notre souveraineté :
  alerte avancée, espace, feu dans la très grande profondeur, défense sol-air et aussi
  le rehaussement de notre dissuasion nucléaire en cohérence avec le virage stratégique
  que nous avons annoncé au mois de mars dernier avec la mise en place de la dissuasion
  avancée. Enfin, l''amélioration de la capacité des armées à mener les combats qui
  pourraient s''imposer dès demain, défense surface-air, lutte anti-drones, guerre
  dans le champ électromagnétique, drones de tous types, quantiques, intelligence
  artificielle, en plus de ce qui avait déjà été acté en 2023, avec le cyber, le spatial
  et le maritime. Cette actualisation doit produire des effets visibles avec des commandes
  et des premières livraisons dès 2026. Cette actualisation entend aussi renforcer
  la résilience de la nation avec le nouveau régime d''état d''alerte, avec le service
  national qui commencera dès septembre et permet au fond de consolider cette force
  d''âme dont je parlais ici en 2024. C''était une nécessité. On en mesure la nécessité
  en mer d''Arabie, où notre Marine nationale est engagée depuis de longs mois. Et
  quelle belle preuve de vigueur de nos forces navales après 4 siècles au service
  de la France ! Je veux ici féliciter nos marins déployés depuis de longs mois et
  leur chef, l''amiral Nicolas Vaujour, qui transmettra à son successeur, après 37
  années de guerre des mers, une Marine opérationnelle dont il peut être fier. Merci,
  amiral, et bonne mer à votre successeur, l''amiral Christophe Cluzel ! On en mesure
  la nécessité avec la Coalition des Volontaires qui se réunira cet après-midi aux
  Invalides pour prendre les décisions qui s''imposent et continuer à soutenir l''Ukraine
  qui défend son territoire, qui défend sa souveraineté, qui défend sa liberté et,
  par voie de conséquence, notre sécurité en Europe. Je remercie le chef d''État-major
  des armées, le général Fabien Mandon, pour tout ce qui a été fait depuis 18 mois
  maintenant à cet égard. Et je salue nos soldats déployés en Roumanie. Notre armée
  de Terre, une fois encore et là aussi, a été au rendez-vous. Et notre armée de Terre
  dont vous rendez cet été le commandement, cher général Pierre Schill, après avoir
  œuvré pour sa transformation et sa préparation à la haute intensité, avec un sens
  du commandement marqué par la subsidiarité et la confiance. Merci, mon général,
  et bon vent à votre successeur, le général Jacques Langlade de Montgros. On en mesure
  la nécessité quand nos partenaires, je pense aux Émirats arabes unis, au Qatar,
  à la Jordanie, constatent dans les faits, notamment grâce à notre armée de l''Air
  et de l''Espace, la force qui est la nôtre. Et je veux ici remercier l''ensemble
  de nos pilotes, de nos mécaniciens, sous votre commandement, général Bellanger.
  Oui, chacun dans cette région a pu mesurer, comme ailleurs, la fiabilité des engagements
  pris par la France pour leur sécurité. La France est un partenaire fiable, stable,
  qui tient ses engagements et qui tient une ligne dure : la ligne de la non-belligérance
  dans les conflits qu''elle n''a pas choisis, la ligne du respect du droit international,
  de la liberté, y compris la liberté de navigation qu''elle comptait aider à faire
  respecter dans le détroit d''Ormuz. Et c''est la même volonté de respect de la souveraineté
  et de la liberté de navigation qui a présidé depuis 8 années à notre stratégie Indo-Pacifique
  et qui a expliqué beaucoup de nos réussites dans cette région, la ligne de la défense
  de nos intérêts et de nos amis partout dans le monde lorsque c''est nécessaire.
  Et je pense à nos déploiements récents et ponctuels comme en Finlande, mais aussi
  à nos engagements plus pérennes en Estonie, en Lituanie, au Liban, en Irak. On en
  mesure la nécessité dans tous les théâtres où nos services extérieurs opèrent, et
  je veux ici remercier la DGSE, l''ensemble de ses agents, et nous n''en oublions
  aucun, ainsi que leurs directeurs, qui agissent dans la confidentialité requise
  pour la sécurité et les intérêts de la nation. Et nous en mesurons la nécessité
  aussi sur le territoire national à travers l''opération Sentinelle qui se poursuit
  et mobilise nos forces et à travers la présence partout sur le territoire de notre
  gendarmerie. Merci, mon général. Dans ce brouillard de la guerre, la France n''est
  pas seule. Bien au contraire. Ancrée dans son socle européen, mais apte aussi au
  plus grand large, elle sait proposer des initiatives et fédérer des coalitions.
  Cela, nous l''avons montré il y a quelques années, dès Takouba, en étant nation
  cadre et en commençant à agréger au cœur de l''Afrique les forces de tant de pays.
  Et nous l''avons montré il y a 18 mois en bâtissant cette Coalition des Volontaires,
  avec nos amis britanniques. Et nous serons honorés, et je les remercie de leur présence
  parmi nous ce midi, quand en tête des troupes défilent demain nos partenaires de
  la Coalition des Volontaires, éléments avancés qui incarnent en particulier la capacité
  des Européens à saisir leur destin et à prendre leur sécurité en main, associant
  tant de nations européennes et à leurs côtés le Canada, et les démocraties de l''Indo-Pacifique.
  Là aussi, en quelques années, nous aurons bâti des capacités nouvelles en Europe
  et orchestré un réveil stratégique. L''Europe est en train de devenir une puissance
  s''appuyant sur les États qui la constituent, respectueuse de leurs décisions souveraines,
  mais assumant de se défendre et d''agir unie, une Europe qui ne sera pas celle des
  nationalismes qui l''ont longtemps consumée, mais qui, en conjuguant les patriotismes
  de leurs membres, en agissant unis, nous rend tous plus forts. Le message que nous
  envoyons au monde est le suivant : oui, la paix est notre but, oui, nous chérissons
  la liberté et le droit, et oui, nous nous tenons prêts à combattre pour les défendre,
  toujours, et au prix du sang s''il le faut. Ce prix du sang, payé par nos soldats
  français morts pour la France, blessés dans leur chair ou leur âme. Et je veux redire
  le respect de la Nation pour ces soldats morts pour la France. Notre affection aux
  familles endeuillées auprès desquelles j''étais il y a un instant avant de vous
  rejoindre, à nos blessés, à toutes leurs familles. Et notre attachement aux pensionnaires
  de l''Institution nationale des Invalides. La reconnaissance de la Nation, notre
  soutien et ma compassion aux familles sont là pour signifier que la France n''oublie,
  et n''oubliera jamais leur nom. De même que nous n''oublions jamais nos anciens
  combattants qui portent tant de nos combats, notre mémoire, nos engagements, et
  dont je remercie ici les grandes fédérations et les associations. Je salue également
  le travail accompli par la ministre déléguée, Madame Alice Rufo, pour améliorer,
  entre autres choses, l''accompagnement des blessés avec une prise en charge plus
  coordonnée et plus humaine ; là encore, l''engagement a été tenu. J''apporte, vous
  le savez, la plus grande attention à la condition militaire. Chef des armées, j''en
  suis l''ultime garant. À cet égard, j''entends que les efforts consentis ces dernières
  années pour les militaires et leurs familles ne soient pas remis en cause, en particulier
  par des mesures d''économies portées à l''aveugle qui ont tant abîmé nos armées
  il y a quelques années. Oui, la Nation sait ce qu''elle doit à ses soldats et à
  leurs familles. Oui, pour nous défendre, nous avons besoin des meilleurs de nos
  concitoyens dans tous les métiers, du combat comme du soutien, pour continuer à
  disposer d''un modèle d''armée complet. Oui, nous devons attirer, oui, nous devons
  fidéliser, oui, nous devons compenser justement les suggestions. Et je remercie
  à ce titre le Haut Comité d''évaluation de la condition militaire pour son travail
  et sa vigilance chaque année, mais également le secrétariat général des armées,
  le CEMA et l''ensemble des chefs et des ministres pour leur grande vigilance. C''est
  l''ambition que je porte pour les soldats de la France depuis que je suis président
  de la République. Je veux ici saluer l''engagement exigeant de celles et ceux qui
  font ce choix de servir la France et de défendre ses intérêts et ses valeurs partout
  dans le monde. Ce choix de l''engagement, de la disponibilité en tout temps et en
  tout lieu, de la patrouille sur terre, dans les airs, sur mer et sous les mers,
  du courage et de la bataille, cette ouverture volontaire au sacrifice, cette exigence
  fondamentale de l''efficacité pour réaliser la mission, quel qu''en soit le prix
  des mutations et des déménagements qui ont tant d''impacts sur la vie personnelle
  et sur toutes les familles. La condition militaire est au fond le corollaire du
  réarmement. Les deux notions sont indissociables. C''est une question de cohérence,
  de crédibilité et un enjeu d''efficacité. Voilà pourquoi j''ai veillé à améliorer
  les rémunérations des militaires, la situation des familles, des blessés. Voilà
  pourquoi je resterai vigilant jusqu''à la dernière seconde à ce que les conditions
  de vie des militaires, de leurs familles, y compris leur logement, soient améliorées.
  Voilà pourquoi je m''y suis engagé comme je m''y suis engagé dans d''autres cénacles.
  En 2027, une part des primes viendra intégrer le calcul des pensions militaires.
  Je sais combien cette mesure est attendue et je sais pouvoir compter, sur ce sujet
  comme sur tout le reste, sur la mobilisation et la vigilance du Premier ministre,
  cher Sébastien Lecornu, tant attaché aussi à nos armées. Voilà pourquoi je serai
  attentif à ce que la trajectoire des effectifs fixée par la loi de programmation
  militaire soit respectée. Ils sont une pièce essentielle de notre réarmement. Notre
  réarmement, ce sont aussi les efforts que fait la direction générale de l''armement
  —et merci au délégué général pour ses efforts, son travail— et nos industriels,
  animés par elle, pour innover là où d''autres continuent encore à entretenir des
  rentes de situation. Compte tenu des menaces, toute notre industrie de défense doit
  se mobiliser pour gagner en agilité, répondre aux enjeux et continuer d''être compétitive,
  innover, se positionner, savoir quand se recentrer sur la rusticité et pouvoir produire
  en volume certaines armes quand les besoins l''exigent. La guerre en Ukraine et
  les risques identifiés par la Revue nationale stratégique montrent bien qu''aujourd''hui,
  ce n''est plus seulement le stock, mais le flux qui détermine la stabilité stratégique
  en Europe. Ce ne sont plus les arsenaux existants, mais la capacité d''en produire
  qui sauront décourager les adversaires. L''Ukraine nous donne à cet égard une leçon
  spectaculaire. Et soyons lucides, nous avons pris de nombreuses initiatives, lancé
  beaucoup de choses, réinvesti comme jamais. Nous avons, il y a un peu plus de 4
  ans, lancé l''économie de guerre. Mais est-ce que c''est suffisant ? Non. Face à
  la concurrence internationale, à l''accélération dans tous les domaines du jeu,
  à l''émergence de nouveaux compétiteurs, y compris insoupçonnés parfois il y a quelques
  mois, nous devons continuer d''investir davantage, tant des fonds publics européens
  que des fonds publics nationaux, mais aussi des fonds privés. Nous devons innover.
  Nos entreprises du secteur doivent s''habituer à prendre davantage de risques. À
  s''habituer à prendre des risques sans forcément sécuriser toutes les commandes,
  comme on le fait dans beaucoup de secteurs, à produire aussi plus vite, à mobiliser
  les programmes et les financements européens que nous avons très souvent inspirés
  nous-mêmes, à tout faire pour bâtir des standards européens et une vraie préférence
  européenne. Ceci doit être vrai dans le domaine spatial, comme l''a très bien montré
  la revue stratégique coordonnée par le SGDSN, et je l''en remercie. Le sommet que
  nous organiserons en septembre prochain permettra d''avancer, je l''espère, dans
  ce domaine. Mais il nous faut continuer d''accélérer. L''opération BROMO est, à
  cet égard, soutenue par le Gouvernement, l''ensemble de l''État français comme de
  nos partenaires pour, là aussi, créer plus de synergies, rapprocher nos grands opérateurs,
  mais nous devons aller plus loin sur les projets européens de constellations communes
  d''innovation en commun, de standards européens. C''est la même chose dans les autres
  domaines. Malgré l''échec du SCAF, que je regrette profondément, nous aurions tort
  de nous arrêter là, et nous aurions tort de penser que les réalités d''aujourd''hui
  sont vraies dans 10 ans, 15 ans ou 20 ans, et qu''il n''y aurait pas des compétiteurs
  qui vont émerger. Alors avançons sur le SAMP/T nouvelle génération, sur l''alerte
  avancée avec JEWEL, sur le tir dans la profondeur où nous devons bâtir nos propres
  solutions en cohérence complète avec la dissuasion avancée que nous avons décidée.
  Avançons sur le char de combat avec KNDS. Avançons sur des projets multiples qui
  nous permettent de faire de l''Europe une réalité industrielle et en acte. Partout
  où on crée de la dyssynergie, on se fait plaisir sur le moment, mais on crée les
  retards de demain. Partout où on flatte les nationalismes, en France ou ailleurs,
  on se trompe sur l''histoire qui est la nôtre. Le patriotisme, oui, le nationalisme,
  jamais. Et au moment où l''Europe se réarme, penser qu''accumuler chacun séparément
  des capacités est le sens de l''histoire, c''est une absurdité. Nous devons bâtir
  en Européens et garder nos spécificités propres, nos modes de décision, nos forces
  d''intervention, notre crédibilité. Mais ne faisons pas bégayer l''histoire. Il
  nous faut aussi reconnaître que dans les drones, les intercepteurs, les missiles
  ou les munitions, nous ne produisons pas assez vite, nous ne produisons pas assez
  fort et nous devons nous adapter pour nos propres besoins, là où je vois nos armées
  attendre parfois des mois, si ce n''est des années, les capacités qu''on leur promet,
  mais aussi pour être compétitifs à l''international. Nous ne vendrons pas des solutions
  si nous expliquons aux clients qui veulent se protéger aujourd''hui que nous leur
  livrerons les munitions, les missiles qui vont avec dans 5 ans, 6 ans, 7 ans. Des
  compétiteurs arrivent qui leur proposent pour demain. Et donc nous devons, là aussi,
  investir, prendre des risques. Je compte sur nos industriels pour le faire et réaliser
  ce nouvel ordre, mais aussi pour mobiliser nos PME, nos start-ups, l''ensemble de
  nos écosystèmes pour produire partout mieux sur le territoire français. Les commandes
  historiques des dernières années et nos succès à l''export nous obligent et doivent
  nous conduire à une exigence redoublée. Enfin, je veux saluer l''engagement de la
  jeunesse de France, qui a répondu présente à l''appel et qui rejoindra dès septembre
  nos rangs en effectuant dans les armées son service national. J''irai à la rencontre
  des appelés du service national à la rentrée en chef des Armées pour les féliciter.
  Et je veux remercier le chef d''État-major des Armées et ses équipes pour la mise
  en œuvre de ce projet que j''avais annoncé en novembre dernier à Varces. Il est
  essentiel pour consolider cette force d''âme. Il est essentiel pour continuer à
  recruter les meilleurs. Il est essentiel pour continuer aussi à accroître notre
  réserve. Et nous savons que dans les enjeux aussi de la mobilisation nationale,
  il y a les objectifs que nous nous sommes fixés pour doubler les effectifs de celle-ci.
  Mes chers compatriotes, soldats, aviateurs, marins, nous avons beaucoup fait pour
  redresser nos armées et nous continuerons à le faire parce qu''une armée statique
  serait une armée défaite. Et dans ce monde en bascule, nous devons conserver un
  temps d''avance, anticiper les chocs et les besoins. Nous devons être stratèges
  et nourrir une vision prospective. Cette vision de la défense à 10 ans, je la livrerai
  prochainement à l''occasion des 150 ans de l''École de guerre qui forme les officiers
  supérieurs dont la France a besoin demain pour tenir son rang. Oui, nous devons
  préparer les guerres à venir, mais ne nous trompons pas, notre capacité à les mener
  dépendra de notre crédibilité aujourd''hui. Ce sont les guerres d''aujourd''hui
  que nous devons gagner. C''est notre force à tenir sur le front ukrainien, c''est
  notre capacité à être là où nos partenaires nous attendent, au Proche et Moyen-Orient,
  c''est notre capacité à continuer à être des partenaires tels que nous l''avons
  reconçu en Afrique, c''est notre capacité à nous tenir dans l''Indo-Pacifique qui
  déterminera notre capacité à tenir les enjeux de 2030. Tout se joue aujourd''hui,
  ici, encore. Tout ce qui a été fait depuis 10 ans nous a rendus plus forts, mais
  soyons humbles, exigeants, il nous reste beaucoup à faire. Alors, aujourd''hui,
  à la veille de notre fête nationale, à l''occasion de laquelle la nation se rassemblera
  Place de la Concorde pour rendre hommage à ces soldats, je veux ici en ce jour vous
  redire ma détermination, ma reconnaissance et ma fierté d''être à vos côtés depuis
  2017. C''est ma plus grande fierté. Vous avez ma confiance.'
