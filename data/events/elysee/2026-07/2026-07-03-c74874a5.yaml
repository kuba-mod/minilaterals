title: Disparition de Christian Lambert.
text: 'Christian Lambert était un homme qui conjuguait à merveille autorité et courage.
  Gardien de la paix devenu commissaire, chef du RAID puis préfet, il avait parcouru
  tous les étages de la Police nationale et gravi toutes les marches du service de
  la République. Né le 5 juin 1946 à Corbeil-Essonnes, Christian Lambert débuta comme
  sapeur-pompier avant d’entrer, en 1967, comme gardien de la paix à la préfecture
  de police de Paris. Inspecteur, puis commissaire, il s’imposa par son sang-froid
  et son instinct. Pionnier du RAID, il fut, en mai 1993, lors de la prise d’otages
  de l’école maternelle de Neuilly-sur-Seine, l’un des piliers de l’intervention pour
  la libération des enfants. Il y déploya la force véritable qui était la sienne,
  la précision du geste et le sens de la responsabilité. Devenu chef du RAID en 2002,
  il conduisit l’année suivante l’opération qui permit l’arrestation en Corse d’Yvan
  Colonna, recherché pour l’assassinat du préfet Claude Érignac. L’interpellation,
  accomplie sans effusion de sang, portait sa marque : préparation minutieuse, discrétion
  absolue, résolution entière. La Corse fut ensuite pour lui un nouveau territoire
  de service, comme préfet délégué pour la sécurité. Puis vint la direction des compagnies
  républicaines de sécurité, au coeur des violences urbaines de 2005. Partout, Christian
  Lambert commandait avec exigence. Directeur de cabinet du préfet de police de Paris,
  il devint en 2010 préfet de la Seine-Saint-Denis. Ceux qui redoutaient alors la
  nomination d’un « préfet policier » découvrirent un préfet pleinement engagé dans
  son département, attentif à ses élus, à ses habitants, à ses fractures et ses espérances.
  Car Christian Lambert savait que l’ordre républicain exige aussi de retisser la
  confiance, de garantir l’égalité et de faire sentir partout la présence protectrice
  de l’État. Après son départ du corps préfectoral, il continua de servir, au ministère
  de l’Intérieur, puis à la direction de la sûreté de la SNCF. Si son ascension devait
  tout au mérite, son commandement, lui, devait tout à l’expérience. Christian Lambert
  avait connu la rue, les nuits de veille, le danger des interventions et la solitude
  des décisions. Il savait décider, assumer et protéger. Derrière la fermeté, il y
  avait une fidélité ; derrière le franc-parler, une chaleur ; derrière le grand policier,
  un homme profondément attaché au service de la Nation. Un gardien de la paix devenu
  gardien de la République. Le Président de la République et son épouse s’inclinent
  devant la mémoire d’un grand serviteur de l’État et adressent à sa famille, à ses
  proches, ainsi qu’à l’ensemble des policiers de France leurs condoléances les plus
  émues.'
