title: Visit to the Syrian Arab Republic.
text: The President of the Republic visited Syria on July 6 and 7, 2026. One year
  after the visit to France by Ahmed al-Charaa , Interim President of the Syrian Arab
  Republic, this trip, the first by a European Union head of state to Syria since
  the fall of the Assad regime , is part of France’s ongoing support for the Syrian
  people. Upon his arrival, President Emmanuel Macron met with President Ahmed al-Charaa
  for a working dinner. The following day, the President of the Republic met with
  representatives of Syrian civil society before being received at the Presidential
  Palace in Damascus for a bilateral meeting with President Ahmed al-Charaa. The two
  leaders then participated in an economic forum focused on the reconstruction of
  Syria and strategic corridors. Finally, following a signing ceremony for the agreements
  and a working lunch , the two leaders spoke at a joint press conference. The President
  of the Republic reaffirmed France’s commitment to Syria’s unity and to an inclusive
  and pluralistic political transition that guarantees the rights, security, and representation
  of all segments of Syrian society. This visit underscored France’s concrete commitment
  to the reconstruction of a sovereign, stable Syria that lives in peace with its
  neighbors. It marked the beginning of a new chapter in the Franco-Syrian partnership
  in the economic and security spheres, and supported efforts to promote regional
  stability and diversify supply routes between Europe and the Middle East.
