title: Visite d'État de Brice Oligui Nguema, Président de la République du Gabon.
text: Le Président de la République et Brigitte Macron ont accueilli Brice Oligui
  Nguema, Président de la République du Gabon, et Zita Oligui Nguema, dans le cadre
  d’une visite d'État. Après la visite d'État du Président Emmanuel Macron au Gabon
  en novembre dernier, les deux dirigeants se sont retrouvés pour une visite consacrant
  un partenariat renouvelé entre le Gabon et la France , porté sur la coopération
  en matière économique, énergétique, culturelle et de défense. Les deux chefs d'État ont
  également évoqué ensemble les questions régionales et globales , en particulier
  la protection de la forêt du Bassin du Congo. Après un entretien et une cérémonie
  de signature d'accords , le Président Emmanuel Macron et son épouse ont retrouvé
  le Président gabonais pour un dîner d'État.
