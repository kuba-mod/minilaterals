title: Les choix numériques qui déterminent la santé de nos enfants.
text: 'PARIS/GENEVA— Des réseaux sociaux aux jeux en ligne en passant par les systèmes
  d’IA générative, les environnements numériques façonnent la santé des individus.
  Cela vaut tout particulièrement pour les enfants et les jeunes. Partout dans le
  monde, l’enfance est en train d’être remodelée par les technologies numériques qui
  façonnent la manière dont les jeunes apprennent, jouent et interagissent. Notre
  tâche n’est ni de faire l’éloge ni de condamner la technologie. Il s’agit de faire
  face à une vérité simple : notre environnement numérique promet non seulement des
  avantages considérables, mais présente également de graves risques pour la santé
  et le développement des enfants. Notre responsabilité est de maximiser les premiers
  tout en prévenant les seconds. Il n’est pas trop tard pour agir, mais il est trop
  tard pour se contenter d’ajustements progressifs. Les outils numériques peuvent
  élargir les perspectives en favorisant l’apprentissage, la communication et l’accès
  aux services de santé, en particulier pour les enfants vivant dans des régions isolées
  ou touchées par des crises. Pour de nombreux jeunes, les espaces en ligne offrent
  également des possibilités de créativité, de vie communautaire et d’appartenance,
  notamment à ceux qui sont confrontés à l’exclusion dans la vie réelle. Ces avantages
  ne sont néanmoins pas garantis ; ils dépendent fortement de qui y a accès, de la
  manière dont les technologies sont conçues et des intérêts qu’elles servent. Les
  gouvernements reconnaissent de plus en plus que la protection des enfants en ligne
  est un impératif de santé publique. L’Australie a mis en place la première obligation
  au monde imposant aux plateformes de réseaux sociaux d’empêcher les enfants de moins
  de 16 ans de détenir un compte, tandis que la France fait avancer une législation
  visant à interdire l’accès aux réseaux sociaux aux moins de 15 ans. L’Indonésie
  a interdit l’accès aux enfants de moins de 16 ans, l’Espagne a annoncé son intention
  de faire de même, et l’Irlande collabore avec ses partenaires de l’Union européenne
  pour mettre au point des restrictions d’âge et des systèmes de vérification de l’âge
  visant à protéger les moins de 16 ans. Le Royaume-Uni a lui aussi récemment annoncé
  son intention d’interdire aux plateformes de réseaux sociaux de proposer leurs services
  aux moins de 16 ans, parallèlement à des mesures de protection supplémentaires telles
  que des restrictions sur la diffusion en direct et les contacts avec des inconnus.
  Quant au Canada, il a présenté un projet de loi visant à restreindre l’accès aux
  réseaux sociaux pour les enfants de moins de 16 ans, tout en exigeant des plateformes
  des mesures de sécurité intégrées plus strictes et une plus grande responsabilité.
  Ensemble, ces mesures reflètent un consensus mondial croissant selon lequel les
  environnements numériques nécessitent une gouvernance efficace, une conception adaptée
  à l’âge et des garanties plus solides pour protéger la santé des enfants. L’Organisation
  mondiale de la Santé soutient cette démarche en renforçant la recherche nécessaire
  pour mieux comprendre l’impact des technologies d’aujourd’hui et de demain, en fournissant
  des conseils techniques aux pays et en promouvant des environnements de santé numériques
  sûrs et équitables. Des solutions s’imposent car les environnements numériques ne
  sont pas neutres. La manière dont ils sont conçus, régis et monétisés façonne de
  nombreux aspects de nos vies, notamment notre santé. Par exemple, l’exposition répétée
  à des contenus stéréotypés, sexualisés, violents ou discriminatoires influence la
  manière dont les enfants se perçoivent eux-mêmes et appréhendent le monde qui les
  entoure. Les algorithmes filtrent de plus en plus les informations de santé dans
  le but d’attirer l’attention plutôt que de garantir l’exactitude, ce qui favorise
  la propagation d’allégations trompeuses. La collecte et l’utilisation des données
  personnelles, en particulier à des fins de profilage et de marketing ciblé, soulèvent
  des préoccupations en matière de vie privée, de manipulation et de bien-être. Les
  données actuelles associent une exposition numérique excessive à des problèmes tels
  que l’anxiété, la dépression, les troubles du sommeil, une agressivité accrue et,
  dans les cas les plus graves, des tendances suicidaires, en particulier chez les
  adolescents vulnérables. Le marketing numérique sur ces plateformes peut exposer
  les utilisateurs à la promotion de produits nocifs, tels que le tabac, l’alcool
  et les sites de jeux d’argent. L’utilisation des réseaux sociaux, des jeux vidéo
  et de l’IA peut aggraver la solitude et supplanter les relations hors ligne. Une
  utilisation prolongée contribue à un mode de vie sédentaire et à une réduction du
  sommeil, qui sont des facteurs de risque connus de maladies non transmissibles.
  L’exploitation et les abus sexuels en ligne sont également en augmentation à l’échelle
  mondiale, parallèlement à une forte hausse du matériel pédopornographique, des images
  d’abus générées par l’IA et des contenus « deepfake » à caractère sexuel ou de harcèlement.
  Ces phénomènes entraînent des conséquences profondes et durables sur la santé mentale,
  la confiance et la sécurité. Les pratiques commerciales accentuent tous ces risques.
  De nombreuses plateformes sont conçues pour maximiser l’engagement, sans protection
  adéquate contre l’exposition à des contenus préjudiciables ni fonctionnalités visant
  à préserver la santé physique et mentale des enfants. Il est essentiel de réduire
  l’exposition à des contenus illégaux, extrêmes ou explicites. Le bien-être des enfants
  ne se résume cependant pas à l’absence de préjudice. Il dépend de relations stables,
  de limites appropriées, d’une activité physique et de possibilités de liens sociaux
  dans le monde réel. Les risques se multiplient lorsque les environnements numériques
  perturbent – plutôt que de favoriser – un développement sain. L’IA générative est
  un facteur amplificateur majeur, tant en termes de risques que d’opportunités pour
  le bien-être des enfants. Utilisés de manière responsable, les outils d’IA spécialement
  conçus peuvent soutenir l’éducation, l’accessibilité et la santé. Leur impact à
  long terme sur les attentes des enfants en matière de relations, d’empathie ou d’autorégulation
  reste ainsi incertain. Tant que cela restera le cas, une approche de précaution
  n’est pas anti-innovation. Elle défend l’enfant. L’équilibre numérique fait partie
  de la solution. Si les environnements numériques nécessitent une réglementation,
  de la transparence, une conception adaptée à l’âge, des fonctionnalités de sécurité
  et de confiance renforcées, ainsi qu’une obligation de rendre des comptes, les données
  scientifiques doivent suivre le rythme de la technologie, ce qui exige des recherches
  indépendantes et longitudinales menées dans tous les niveaux de revenus et toutes
  les régions. Avant tout, nous devons écouter la jeunesse d’aujourd’hui. En tant
  qu’utilisateurs actifs de la technologie, les jeunes peuvent contribuer à faire
  évoluer les environnements numériques de manière responsable. Les mondes en ligne
  et hors ligne forment désormais un espace unique où les outils numériques peuvent
  favoriser un développement sain – ou le compromettre. Les jeunes devraient faire
  valoir leurs propres expériences vécues afin de contribuer à définir des garde-fous
  appropriés. Les parents, les éducateurs, les établissements scolaires et les communautés
  doivent également prendre part à ce débat. Ce processus exige une collaboration
  soutenue entre les gouvernements, le secteur privé, la société civile et les institutions
  de santé publique, fondée sur un engagement commun à maximiser les bénéfices et
  à minimiser les risques. Il est essentiel de renforcer la transparence, le partage
  des données, les choix de conception favorisant la santé et le soutien des entreprises
  en faveur de normes de sécurité efficaces, en particulier pour les mineurs. L’OMS
  peut jouer son rôle de catalyseur et exercer son influence pour établir des normes
  et des règles. Nos enfants et nos jeunes ne sont ni des cobayes, ni un marché captif,
  ni une marchandise. Ensemble, nous pouvons et devons façonner des environnements
  numériques qui protègent et favorisent leur développement sain. Les choix que nous
  faisons aujourd’hui auront des répercussions pendant des générations. Le Président
  de la République Emmanuel Macron et le Directeur général de l''Organisation mondiale
  de la santé Tedros Adhanom Ghebreyesus.'
