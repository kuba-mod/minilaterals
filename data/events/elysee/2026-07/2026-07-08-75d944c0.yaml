title: Déclaration de la France, de la Suède et de la Finlande concernant la participation
  de la France aux Forces terrestres avancées de l’OTAN en Finlande.
text: Le groupe tactique des Forces terrestres avancées de l’OTAN en Finlande a été
  créé en juin 2026. Les Forces terrestres avancées Finlande représentent le neuvième
  groupe tactique multinational des Forces terrestres avancées de l’OTAN et renforce
  la capacité de dissuasion et de défense de l’Alliance dans le Grand Nord. La France
  contribuera par des déploiements de forces terrestres aux rotations des Forces terrestres
  avancées Finlande, incluant une unité de combat qui sera intégrée à la formation
  des Forces terrestres avancées et déployée dans la Zone d’Opérations. La France,
  en collaboration avec le groupe tactique des Forces terrestres avancées Finlande,
  formera également des capacités essentielles, de manière temporaire et selon les
  besoins du FLF. La participation de la France aux Forces terrestres avancées Finlande
  est une manifestation claire de notre engagement conjoint pour une Europe plus forte
  au sein d’une OTAN plus forte.
