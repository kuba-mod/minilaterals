title: 'Déterminés à accélérer les progrès vers la paix : Déclaration des coprésidents
  de la Coalition des volontaires.'
text: 'Les membres de la Coalition des volontaires se sont réunis aujourd’hui à Paris.
  Forts des résultats du Sommet du G7 à Évian et du Sommet de l’OTAN à Ankara, qui
  ont encore renforcé notre détermination et notre unité, nous réaffirmons notre soutien
  indéfectible à l’Ukraine, qui défend sa liberté, sa souveraineté et son intégrité
  territoriale, et contribue de façon décisive à la sécurité euro-atlantique. Nous
  rendons hommage au courage et à la résilience du peuple ukrainien et nous saluons
  les récents succès ukrainiens sur le champ de bataille. Nous condamnons les attaques
  impitoyables de missiles et de drones menées à grande échelle par la Russie sur
  des villes ukrainiennes avec un bilan dévastateur sur les civils. Un large consensus
  s’est dégagé parmi les pays participants sur les points suivants : Nous restons
  déterminés à instaurer une paix juste et durable en Ukraine, conformément aux principes
  du droit international, notamment la Charte des Nations unies, qui préservera les
  intérêts de l’Ukraine et les nôtres en matière de sécurité. Dans ce contexte, nous
  réitérons notre appel en faveur d’un cessez-le-feu complet et immédiat en Ukraine
  et de la reprise de négociations directes. Nous soutenons la proposition d’un dialogue
  direct entre l’Ukraine et la Russie – avec la participation active des États-Unis
  et de l’Europe – pour instaurer un cessez-le-feu à partir de la ligne de contact,
  et nous soutenons la poursuite de négociations constructives, fondées en particulier
  sur les paramètres suivants : Nous continuerons à soutenir l’Ukraine aussi longtemps
  que nécessaire, y compris par de l’aide militaire, financière et civile. Nous convenons
  d’accroître la livraison de systèmes de défense aérienne, d’intercepteurs et de
  moyens de longue portée. Conscients de la menace croissante posée par l’utilisation
  de missiles balistiques et de l’importance grandissante des capacités de défense
  pour la sécurité du continent européen, nous saluons l’annonce de la création de
  la Coalition contre les missiles balistiques et nous nous déclarons prêts à travailler
  sans relâche au développement de capacités antibalistiques supplémentaires. Nous
  saluons également les décisions d’accorder à l’Ukraine des licences pour la production
  d’intercepteurs. Nous nous engageons à intensifier la pression économique sur la
  Russie aussi longtemps qu’elle continuera d’attaquer l’Ukraine. Nous continuerons
  de renforcer nos sanctions et de coordonner notre action pour empêcher leur contournement.
  Nous continuerons également de prendre des mesures pour perturber la flotte fantôme
  russe, dans le plein respect du droit international et, en particulier, de la Convention
  des Nations unies sur le droit de la mer. Nous agirons de manière plus systématique
  et coordonnée, notamment par des mécanismes dédiés au sein de la Coalition, afin
  d’intensifier les opérations d’arraisonnement et les contrôles pour mettre fin à
  l’impunité dont bénéficient ces navires. Nous travaillerons ensemble pour tirer
  les leçons de l’expérience acquise et faciliter le partage de renseignements, développer
  des approches opérationnelles communes et coordonner le soutien des États volontaires
  aux opérations nationales entreprises par un État participant. Nous convenons que
  la sécurité de l’Ukraine et sa capacité à se défendre revêtent une importance cruciale
  pour garantir l’avenir de la sécurité collective euro-atlantique. Nous saluons la
  déclaration ferme de soutien du président Trump aux garanties de sécurité, lors
  du sommet de l’OTAN à Ankara. Nous réaffirmons, comme le prévoit la Déclaration
  de Paris du 6 janvier 2026, qu’un accord de paix durable devra s’appuyer sur des
  garanties de sécurité politiquement et juridiquement contraignantes qui seront mises
  en œuvre une fois qu’un cessez-le-feu sera entré en vigueur, en complément des accords
  bilatéraux de sécurité et conformément à nos dispositions juridiques et constitutionnelles
  respectives. Ces garanties seront défensives par nature. Leur objectif est d’empêcher
  une reprise de l’agression russe contre l’Ukraine et d’assurer la stabilité et la
  sécurité en Europe. Elles s’accompagneront d’une aide militaire de long terme aux
  Forces armées de l’Ukraine. Nous saluons le fait que la Force multinationale pour
  l’Ukraine (MNF-U) soit prête à agir pour régénérer les forces ukrainiennes et apporter
  à l’Ukraine une réassurance au sein de son territoire, sur terre, dans les airs
  et en mer, à la demande l’Ukraine, une fois qu’un cessez-le-feu crédible sera en
  place. Des exercices auront lieu dans les mois à venir pour faire la démonstration
  de la capacité de la MNF-U à intervenir, une fois les hostilités cessées.'
