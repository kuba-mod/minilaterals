title: Déclaration conjointe relative à la création de la Coalition intégrée contre
  les missiles balistiques.
text: Nous, les dirigeants du Danemark, de la France, de l’Allemagne, de l’Italie,
  des Pays-Bas, de la Norvège, de l’Espagne, de la Suède, de l’Ukraine et du Royaume-Uni,
  conscients de la menace croissante posée par les missiles balistiques et de l’importance
  grandissante des capacités de défense pour la sécurité du continent européen, annonçons
  aujourd’hui le lancement de la création d’une coalition purement défensive contre
  les missiles balistiques. Nous exprimons notre soutien à son projet phare visant
  à travailler sans relâche au développement d’une capacité antibalistique. Nous pensons
  que la protection de l’Europe nécessite une solution globale, sous la forme d’une
  architecture intégrée de défense antimissile, afin de dissuader et de neutraliser
  les futures menaces de missiles — développée grâce à un effort collectif, à l’ouverture
  technologique et à une coopération industrielle de confiance. Elle complètera les
  systèmes existants de défense contre les missiles balistiques, y compris les solutions
  européennes souveraines déjà acquises ou qui le seront à l’avenir par les pays participants.
  En mettant en commun notre base industrielle de défense, notre recherche et notre
  expérience opérationnelle, notre objectif est de bâtir une capacité partagée contre
  les missiles balistiques pour l’Europe et de soutenir les activités contributives
  pertinentes. Cette action n’est orientée contre aucun peuple, mais en défense du
  nôtre. Nous reconnaissons l'expérience unique de l'Ukraine, acquise par sa défense
  face à la guerre d'agression menée par la Russie. A travers cette Déclaration, nous
  entendons établir des exigences opérationnelles communes, des groupes de travail
  techniques conjoints, des mécanismes de gouvernance clairs, ainsi qu’une feuille
  de route vers les premières capacités opérationnelles de la Coalition – dans le
  respect de nos dispositions constitutionnelles respectives et de nos obligations
  internationales. Nous nous efforcerons de soutenir les activités conjointes de recherche
  et de développement dans le cadre du projet phare, notamment en recherchant des
  opportunités de financement adaptées et en favorisant un meilleur échange de données
  et d'informations. Les membres fondateurs de la Coalition sont le Danemark, la France,
  l'Allemagne, l'Italie, les Pays-Bas, la Norvège, l'Espagne, la Suède, l'Ukraine
  et le Royaume-Uni. La Coalition reste ouverte à d'autres nations qui partagent ses
  principes et ses objectifs.
