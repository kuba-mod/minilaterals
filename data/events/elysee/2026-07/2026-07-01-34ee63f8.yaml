date: '2026-07-01'
type: press_release
source_name: elysee
title: Compte rendu du Conseil des ministres du mercredi 1er juillet 2026.
text: 'Retrouvez le compte rendu du conseil des ministres du mercredi 1er juillet
  2026. Le garde des sceaux, ministre de la justice, le ministre de l''éducation nationale
  et la ministre de la santé, des familles, de l’autonomie et des personnes handicapées,
  ont présenté un projet de lettre rectificative au projet de loi relatif à la protection
  des enfants. La parole des victimes se libère, et avec elle apparaît la réalité
  d''un phénomène longtemps tu : des prédateurs sexuels qui frappent à plusieurs reprises,
  et des enfants dont la vulnérabilité est exploitée. Le Gouvernement entend y répondre
  et complète le projet de loi relatif à la protection des enfants avec un double
  renforcement de la réponse publique : accélérer la conduite des enquêtes et durcir
  la répression, d''une part ; consolider les dispositifs de prévention, d''autre
  part. La lettre rectificative resserre d’abord le cadre temporel de l''enquête conduite
  par le procureur de la République. Elle consacre le principe d''une audition rapide
  des mis en cause dès leur identification. Elle garantit aussi une meilleure information
  des victimes à l’issue des trois premiers mois d’investigation. C''est une exigence
  simple, qu''attendent les enfants comme les familles : que les services d’enquête
  et l’institution judiciaire agissent vite, sans laisser le temps faire son œuvre
  d''oubli ou de découragement. Le Gouvernement entend ensuite réhausser la réponse
  pénale au niveau de gravité des faits. La lettre rectificative porte la répression
  du viol sur mineur de quinze ans à caractère sériel à la réclusion criminelle à
  perpétuité. Dans la même logique de fermeté, les auteurs d''infractions sexuelles
  sont exclus du bénéfice de la libération sous contrainte de plein droit : aucun
  automatisme ne saurait s''appliquer à ceux qui ont attenté à l''intégrité d''un
  enfant. Enfin, la lettre rectificative complète la portée du projet de loi relatif
  à la protection des enfants qui, déjà, systématise le contrôle des antécédents judiciaires
  des professionnels et bénévoles intervenant auprès des enfants dans les écoles,
  les accueils périscolaires et de loisirs, les établissements de santé. La lettre
  rectificative prévoit d’abord un régime de contrôle préfectoral des accueils de
  mineurs aujourd''hui non couverts par une réglementation particulière, en vue de
  s’assurer du respect des garanties de santé et de sécurité physique et morale des
  mineurs. Elle prévoit ensuite l’obligation de communiquer aux responsables légaux
  de chaque enfant l’identité des professionnels intervenant à son contact dans le
  cadre des activités périscolaires, afin de renforcer la confiance, de permettre
  aux familles d''identifier ces intervenants et, s''il y a lieu, de faciliter le
  signalement de tout comportement préoccupant. Le ministre de l’action et des comptes
  publics a présenté un projet de loi ratifiant l’ordonnance n° 2026-265 du 8 avril
  2026 portant partie législative du code des douanes. Cette ordonnance, prise en
  application de l’article 36 de la loi n° 2023-610 du 18 juillet 2023 visant à donner
  à la douane les moyens de faire face aux nouvelles menaces, a permis de donner une
  véritable cohérence au droit douanier en y intégrant notamment les règles procédurales
  relatives aux contributions indirectes et aux réglementations assimilées, ainsi
  que les dispositions particulières relatives aux collectivités d’outre-mer. Elle
  a rendu les dispositions douanières plus lisibles et plus accessibles pour l’ensemble
  des usagers de la douane. L’élaboration de la partie législative du code des douanes
  a révélé la nécessité de compléter certaines sanctions concernant les précurseurs
  de drogue et les alcools, spiritueux, vins et bières. Elle nécessite également de
  procéder à l’adaptation de plusieurs autres textes afin d’assurer leur cohérence
  avec le nouveau code des douanes. Sont notamment concernés le code monétaire et
  financier, le code de la sécurité intérieure et le code des transports. En ce qui
  concerne ce dernier, est ainsi mise en place la réservation des services maritimes
  effectués dans les eaux françaises aux seuls navires battant pavillon européen,
  afin de préserver une concurrence loyale sur ces prestations qui se développent
  dans le contexte de l’expansion des énergies marines renouvelables. Cela vient en
  complément de ce qui existe déjà pour les transports maritimes. Enfin, dans le prolongement
  de la loi visant à sortir la France du piège du narcotrafic du 13 juin 2025, le
  projet de loi améliore le cadre juridique permettant aux agents de l’administration
  des douanes d’accéder, sous certaines conditions, à des données issues de traitements
  automatisés concernant l’identification et la traçabilité du trafic des marchandises,
  des moyens de transport et des personnes. Outre l’extension des données assujetties
  à celles relatives aux flux entre les territoires ultramarins et le territoire métropolitain,
  il facilite le croisement entre les données pertinentes afin d’améliorer l’efficacité
  opérationnelle de la Douane. Le Premier ministre a présenté un décret modifiant
  les attributions du ministre de l''économie, des finances et de la souveraineté
  industrielle, énergétique et numérique, du ministre de la santé, des familles, de
  l’autonomie et des personnes handicapées, et du ministre de l''enseignement supérieur,
  de la recherche et de l’espace. Le conseil des ministres a examiné ce jour un décret
  modifiant les attributions de plusieurs ministres, afin de tirer les conséquences
  de la création de la direction générale de la recherche, de l’innovation et du numérique
  en santé (DGRINES). Ce texte précise que la DGRINES est placée sous l’autorité de
  la ministre chargée de la santé, de l’autonomie et des personnes handicapées. Afin
  de mieux incarner la dimension interministérielle du pilotage stratégique de la
  recherche en santé, il prévoit également que le ministre chargé de la recherche,
  ainsi que le ministre chargé de l’économie et, pour les sujets relevant de ses attributions,
  le ministre chargé de l’industrie, disposent de cette direction générale. Issue
  du rapprochement de plusieurs entités, équipes et missions jusqu’ici portées séparément
  - la délégation au numérique en santé, la sous-direction recherche et innovation
  de la direction générale de l’offre de soins (DGOS), l’article 51 et l’Agence de
  l’innovation en santé - la DGRINES réunit au sein d’une même direction générale
  des leviers majeurs de transformation du système de santé. Elle couvre notamment
  les champs du numérique en santé, de la recherche clinique, de l’innovation organisationnelle,
  de l’accès au marché des produits de santé innovants et de l’usage des données et
  de l’IA en santé. Cette évolution traduit la vocation transversale et la dimension
  interministérielle de la DGRINES, située au croisement des politiques publiques
  de santé, de recherche, d’innovation, de numérique en santé, et de développement
  industriel dans le domaine de la santé. Elle permet de renforcer la cohérence de
  l’action publique dans des domaines stratégiques pour la transformation et la résilience
  du système de santé, la souveraineté sanitaire et numérique, et le développement
  des innovations au bénéfice des patients, des professionnels et du système de soins.
  Transformer les résultats de la recherche fondamentale en véritable innovation au
  service des patients et du système de santé, impose une action coordonnée et collective,
  une simplification administrative et des financements adaptés à chaque étape. Depuis
  2023, le pilotage de la recherche a été renforcé par la création d’agences de programme
  chargées de fédérer les forces de la recherche pour répondre aux grands enjeux de
  politique publique du pays. L’agence de programme en santé de l’Inserm permet de
  mieux structurer la stratégie nationale de recherche et d’innovation en santé, d’accroître
  la capacité d’anticipation, de résilience et de transformation du système de santé,
  en identifiant les ruptures technologiques. La création de la DGRINES marque ainsi
  une nouvelle étape dans l’organisation de l’Etat pour mieux accompagner la recherche,
  l’innovation et le numérique en santé, en articulation étroite avec l’ensemble des
  ministères concernés. Le ministre de l’intérieur a présenté, après consultation
  le 29 juillet 2026 des représentants de l’ensemble des partis politiques, une communication
  relative au calendrier électoral 2027. La date du dimanche 18 avril 2027 a été retenue
  pour l’organisation du premier tour de l’élection du Président de la République,
  et le 2 mai 2027 pour le second tour. En Guadeloupe, en Martinique, en Guyane, à
  Saint-Pierre-et-Miquelon, à Saint-Barthélemy, à Saint-Martin et en Polynésie française,
  les électeurs voteront le samedi pour tenir compte du décalage horaire. La période
  de « parrainage » débutera le lendemain de la publication du décret convoquant les
  électeurs qui interviendra en début d’année 2026. En application du II de l’article
  3 de la loi organique n° 2021-335 du 29 mars 2021 portant diverses mesures relatives
  à l’élection du Président de la République, la période de computation des dépenses
  et des recettes de campagne débute à compter du 1er avril 2026. Le conseil des ministres
  a adopté les mesures individuelles suivantes : Sur proposition de la ministre des
  armées et des anciens combattants : - M. le général de corps d’armée Jean-Christophe
  BECHON est nommé inspecteur général des armées et est élevé aux rang et appellation
  de général d’armée, à compter du 1er août 2026 ; - M. le général de division Frédéric
  BARBRY est nommé directeur du service national et de la jeunesse et est élevé aux
  rang et appellation de général de corps d’armée, à compter du 1er août 2026 ; -
  M. le vice-amiral Frédéric DREHER est nommé contrôleur général des armées en mission
  extraordinaire pour une durée de deux ans, et est élevé aux rang et appellation
  de vice-amiral d’escadre, à compter du 1er août 2026 ; - M. le général de division
  aérienne du corps des officiers de l’air Nicolas LEVERRIER est nommé contrôleur
  général des armées en mission extraordinaire pour une durée de deux ans, et est
  élevé aux rang et appellation de général de corps aérien, à compter du 1er août
  2026 ; - M. le vice-amiral Emmanuel SLAARS est nommé commandant de la zone maritime
  Manche et mer du Nord, commandant de l''arrondissement maritime Manche-mer du Nord
  et préfet maritime de la Manche et de la mer du Nord et est élevé aux rang et appellation
  de vice-amiral d’escadre, à compter du 1 er août 2026 ; - M. le vice-amiral d’escadre
  Laurent HERMANN est nommé commandant de la zone maritime Méditerranée, commandant
  de l''arrondissement maritime Méditerranée et préfet maritime de la Méditerranée,
  à compter du 1er août 2026 ; - M. le vice-amiral d’escadre Marc-Antoine LEFÈBVRE
  de SAINT-GERMAIN est nommé commandant de la zone maritime Atlantique, commandant
  de l''arrondissement maritime Atlantique et préfet maritime de l’Atlantique, à compter
  du 1er août 2026. Sur proposition du ministre de la ville et du logement : - M.
  Jonathan SEBBANE, ingénieur général des ponts, des eaux et des forêts, est nommé
  président du conseil d’administration du Centre scientifique et technique du bâtiment.
