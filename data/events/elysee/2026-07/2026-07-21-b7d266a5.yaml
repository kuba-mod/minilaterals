title: Déplacement au centre d'appui de l'enfance Astérya.
text: Le Président Emmanuel Macron s'est rendu ce mardi 21 juillet, au centre d’appui
  à l’enfance Asterya de Paris. Ce centre est le premier centre de santé en France
  entièrement dédié aux enfants confiés à l’aide sociale à l'enfance (ASE). Cette
  visite a permis de mettre en lumière un modèle de prise en charge fondé sur la garantie
  que chaque enfant puisse bénéficier d’une prise en charge coordonnée et exhaustive
  de sa santé somatique et psychique , quels que soient son histoire et son lieu de
  vie. Le chef de l’État a salué l’engagement des professionnels mobilisés en faveur
  de la protection de l’enfance lors d'un échange avec les équipes. Il a également
  rencontré des enfants suivis et des familles d'accueil. Cet échange était l’occasion
  de rappeler l’importance d’une action collective , menée par les différents acteurs
  sanitaires et médico-sociaux, pour mieux repérer les situations de vulnérabilité
  et garantir la continuité des parcours de soins pour les enfants les plus fragiles.
  L’État est pleinement engagé en faveur d’ une protection de l’enfance renforcée
  visant à permettre à chaque enfant protégé d’être reconnu, soigné et accompagné
  dans toutes les dimensions de sa reconstruction.
