title: NATO Summit in Turkey.
text: The President of the Republic and his wife, Brigitte Macron, visited Turkey
  for the NATO Summit on Tuesday, July 7, and Wednesday, July 8, 2026. The Summit
  focused on the Alliance’s key security challenges , against a backdrop marked in
  particular by the ongoing war of aggression waged by Russia against Ukraine. Discussions
  focused in particular on strengthening European defense and the Alliance’s European
  pillar , as well as on providing sustained support to Ukraine and adapting the Alliance
  to evolving security threats. On this occasion, the Head of State reiterated France’s
  commitment to a more sovereign Europe within a strengthened Alliance. He reaffirmed
  the need for sustained support for Ukraine’s defense, for Europeans to contribute
  more to their own security, and for close cooperation among Allies in the face of
  contemporary strategic challenges. Statement from France, Sweden and Finland regarding
  France's participation in NATO's Forward Land Forces Finland (FLF Finland).
