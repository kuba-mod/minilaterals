date: '2026-07-12'
type: press_release
source_name: elysee
title: Journée nationale de commémoration de la reconnaissance de l'innocence d'Alfred
  Dreyfus.
text: 'Le chef de l’État a présidé ce dimanche 12 juillet 2026, la première journée
  nationale de commémoration de la reconnaissance de l’innocence d’Alfred Dreyfus,
  instaurée en 2025. À l’occasion du 120e anniversaire de la reconnaissance de l’innocence
  d’Alfred Dreyfus par la Cour de cassation, cette journée nationale réaffirme l’attachement
  de la Nation aux valeurs des Lumières et de la République. Elle symbolise la victoire
  de la justice et de la vérité sur l''arbitraire et le mensonge , ainsi que la lutte
  contre l''antisémitisme. À travers Alfred Dreyfus et ses défenseurs, c''est l''ensemble
  de la Nation qui se voit rappelée à son devoir de vigilance et de persévérance .
  12 juillet 2026 - Seul le prononcé fait foi Mesdames les ministres, Monsieur l''ambassadeur,
  Madame la défenseure des droits, Mesdames et Messieurs les parlementaires, Monsieur
  le Premier président de la Cour de cassation, Monsieur le procureur général près
  la Cour de cassation, Monsieur le chef d''état-major des armées, Monsieur le préfet
  de la région Île-de-France, Monsieur le maire de Paris, Monsieur le Premier président
  de la Cour d''appel de Paris, Madame la procureure générale près la Cour d''appel
  de Paris, Monsieur le gouverneur militaire de Paris, Mesdames, Messieurs les élus,
  Mesdames, Messieurs les directrices et directeurs, Monsieur le grand-rabbin de France,
  Mesdames, Messieurs en vos grades et qualités, chers amis. Merci, Monsieur le maire,
  d''avoir pris cette décision et organisé cette cérémonie et d''avoir permis à la
  sculpture de Tim de trouver la place digne qui était la sienne. Et merci, Monsieur
  le Premier président, Monsieur le procureur général près la Cour de cassation, d''avoir
  organisé cette exposition et permis à chacune et chacun de pouvoir se remémorer
  ici ce que fut un grand arrêt. Il y a 120 ans jour pour jour, oui, la Cour de cassation
  rendait à un homme sa liberté, sa dignité et son honneur. Vous venez de le rappeler,
  Monsieur. Le 12 juillet 1906, en cassant sans renvoi le jugement de Rennes, la plus
  haute juridiction de notre pays proclamait l''innocence du capitaine Alfred Dreyfus,
  triomphe de la justice après des années de combat et le lent dévoilement de la vérité.
  Nous sommes réunis aujourd''hui pour la première fois pour une journée de commémoration
  nationale que j''ai voulu inscrire désormais à notre calendrier. Ce n''est pas seulement
  un hommage à un homme dont la conduite fut exemplaire tout au long de sa vie au
  service de la France, c''est un hommage à ce que son destin a révélé des Français.
  Cette forme particulière de contradiction et d''affrontement qui nous est propre,
  mais qui s''achève par la victoire de l''esprit républicain sur les forces réactionnaires.
  Ce qui va devenir l''affaire commence par une faute commise contre la République,
  un bordereau trafiqué et une accusation fondée sur le soupçon et le préjugé antisémite.
  Un homme est arrêté, dégradé publiquement dans la cour de l''école militaire, déporté
  sur l''île du Diable pour un crime qu''il n''a pas commis. 12 années durant, la
  vérité connue de quelques-uns se heurte à un mensonge d''État et aux manipulations
  d''une petite caste dévoyée refusant de reconnaître la faute initiale. Ainsi sont
  nés les Dreyfusards, compagnons d''un combat indissociable pour la vérité et la
  République. Le premier d''entre eux fut le lieutenant-colonel Picquart, chef du
  contre-espionnage, qui découvre les preuves de l''innocence de Dreyfus et de la
  culpabilité d''Esterhazy, et qui, plutôt que d''enterrer ce qu''il sait, choisit
  de le dire. Il en paiera le prix : mutation, disgrâce, emprisonnement. Picquart,
  parfois empreint des préjugés de son temps, a su se dépasser. Premier à se battre
  pour que l''innocence d''un homme soit reconnue quel qu''en soit le prix, il a,
  sans aucun doute, accompli le geste le plus dreyfusard qui soit. Il n''avait aucune
  raison sentimentale de défendre Dreyfus. Se taire eût été plus facile. Personne
  n''en aurait rien su. Mais il s''est lancé malgré tout, corps et âme, dans cette
  bataille par seul attachement à ce qui est vrai. Puis vint Zola, Émile Zola, oui,
  qui s''engage à son tour, convaincu par Picquart et les premiers Dreyfusards. Zola
  qui publie le fameux « J''accuse… ! » dans L''Aurore, le 13 janvier 1898. « J''accuse… !
  » transforme une affaire judiciaire en affaire d''État. Zola prend son risque et
  a mesuré ce qu''il pouvait perdre. Il est poursuivi en diffamation et défendu par
  l''exceptionnel Maître Labori. Lors des audiences de son procès, il se heurte à
  un président de chambre qui passe son temps à hurler : « La question ne sera pas
  posée. » dès lors que lui et son avocat entendent soulever les responsabilités de
  ceux qui ont fait condamner Dreyfus. Zola est condamné de manière aussi injuste
  que stupide et contraint à l''exil en Angleterre. Condamné pour avoir mis son talent
  et sa notoriété au service d''une cause qui n''était pas la sienne, mais celle de
  la justice. Vint aussi Georges Clemenceau, alors journaliste avant d''être président
  du Conseil, celui qui inventa le titre « J''accuse… ! » de l''article de Zola et
  qui, avec une ténacité inlassable, fit de la presse l''arme de la vérité contre
  la rumeur. Et tous les autres, enfin : Bernard Lazare, premier à publier un mémoire
  sur l''erreur judiciaire, Mathieu Dreyfus, le frère, qui refuse de renoncer, Lucie,
  déjà plusieurs fois évoquée, Jean Jaurès, qui rallie la gauche socialiste à une
  cause d''abord jugée étrangère au combat ouvrier, tandis que Jules Guesde, au nom
  de l''insoumission à tout ce qui incarne l''argent aux yeux de certains à gauche,
  se perd en ambiguïté. Et Anatole France, et Marcel Proust, et tant de femmes et
  d''hommes anonymes qui signèrent des pétitions au péril de leur réputation bourgeoise,
  et parfois de leur statut social. Tous rejetèrent ce que Charles Péguy désigna avec
  ces mots : « Nous avons vu en face de nous un tel amas de saletés et de laideurs,
  qu''à moins de nous en faire complices, nous avons dû désirer de toutes nos forces
  que cela n''eût jamais eu lieu dans l''histoire du monde. » Tous n''étaient pas
  unis par l''affection ou l''amitié pour un homme que beaucoup ne connaissaient pas.
  Mais tous étaient unis en fraternité. L''injustice commise contre un seul d''entre
  nous est une injustice commise contre nous tous. Ces femmes et ces hommes de bonne
  volonté ont su vaincre leurs préjugés, s''élever et se distinguer en République.
  En cela, leur exemple nous oblige et nous inspire. Les Dreyfusards ont constitué
  l''armée des Lumières et nous ont légué ce bien précieux qu''est le dreyfusisme,
  cette mystique que nous devons préserver et entretenir. L''affaire nous enseigne
  qu''un État de droit ne se mesure pas à sa capacité à ne jamais se tromper, mais
  à sa capacité à se corriger lui-même. La justice française a fini par regarder en
  face sa propre erreur, la défaire puis la réparer. Rendre justice à Dreyfus, c''était
  rendre grâce à l''esprit de 1789. C''est cela, la grandeur de la France. Ne pas
  céder au mythe de l''infaillibilité de l''État, mais croire en la faculté de réparation
  de la République. Et cette exigence de vérité n''est d''aucune époque, elle est
  permanente. L''affaire Dreyfus n''est pas une page de notre histoire qui se serait
  fermée en 1906 grâce à la Cour de cassation et à la réintégration de Dreyfus dans
  l''armée. Il n''en est rien. Le dreyfusisme n''est pas un souvenir, c''est un état
  d''esprit qui refuse que l''appartenance d''un homme à une religion, une origine,
  une communauté puisse devenir l''alibi permettant de le livrer en pâture à une justice
  et une opinion aveugles. Le dreyfusisme nous rappelle que l''antisémitisme, quelle
  qu''en soit la racine ou les explications prétendues, est l''ennemi de la République.
  Or, nous savons que les vieux démons de l''antisémitisme n''ont jamais totalement
  disparu de notre pays. Nous le savons parce que les actes antisémites, loin de s''éteindre,
  continuent de frapper des personnes en raison de ce qu''elles sont. Et face à ce
  retour de l''odieux antisémitisme, la vigilance est un devoir de tous les instants.
  Le dreyfusisme est aussi une méthode : ne jamais céder à la facilité du soupçon
  collectif, vérifier, chercher la vérité avant de condamner, toujours préférer la
  preuve à la rumeur, l''enquête à l''anathème. Enfin, le dreyfusisme nous enseigne
  quelque chose sur le courage civique. Être dreyfusard en 1898, ce n''était pas rejoindre
  le camp du confort ou de la popularité, c''était s''exposer, minoritaire, à l''hostilité
  de son propre milieu, parfois de sa propre famille. Dans un temps où l''instantanéité
  des réseaux et la viralité de l''accusation peuvent broyer une réputation en quelques
  heures, sans autre forme de procès que celui mené par l’émeute, le dreyfusisme nous
  enseigne que l''exigence de vérité n''a jamais été aussi nécessaire. Aujourd''hui
  encore, défendre une vérité qui peut apparaître comme inconfortable parce que minoritaire
  face à l''opinion majoritaire, contre son propre camp parfois, contre l''air du
  temps souvent, exige ce même courage tranquille. Cette aspiration à faire œuvre
  de vérité et de justice s''est déployée au cours du siècle écoulé. Et chaque fois
  que des Juifs ont été victimes de la haine antisémite, des Français, à l''exemple
  de Zola et Picquart, de Clemenceau et Jaurès, se sont dressés pour refuser la persécution.
  J''ai une pensée notamment en ce jour pour les Justes parmi les nations qui, durant
  l''Occupation et le règne de l''État français de Pétain, ont fait preuve de courage,
  de volonté, de ténacité et de cette force d''âme pour sauver des Juifs. Les Justes
  sont entrés au Panthéon par la décision du président Jacques Chirac il y a 20 ans.
  Il est temps désormais que sur chaque maison, chaque immeuble, chaque lieu où des
  Juifs furent abrités, hébergés, sauvés, soient apposés les noms des Justes qui les
  sauvèrent de la barbarie nazie. J''en appelle à toutes les municipalités de France
  pour qu''elles fassent leur cette entreprise. En cela, elles seront pleinement héritières
  de l''esprit du dreyfusisme et fidèles à la figure de Dreyfus. Alfred Dreyfus est
  mort en 1935, estimant jusqu''au bout n''avoir jamais obtenu une réparation pleinement
  juste. C''est aussi cela que nous devons regarder en face aujourd''hui. La reconnaissance
  de l''innocence n''a jamais totalement effacé la blessure de l''homme. La Nation
  s''y efforce, par-delà la mort, qui a élevé Alfred Dreyfus au grade qu''il aurait
  pu obtenir au terme de sa carrière militaire et de son engagement durant la Grande
  Guerre : général de brigade Dreyfus. Et je veux saluer ici la mobilisation de Pierre
  Moscovici, Frédéric Salat-Baroux, Louis Gautier, Haïm Korsia et Vincent Duclert.
  Mais ce que Dreyfus et les Dreyfusards ont légué à la France dépasse aujourd''hui
  le sort d''un seul homme. Tous ont démontré que si une nation peut se déchirer sur
  le destin d''un simple capitaine, elle peut aussi, grâce à la vigilance, à la persévérance
  et au courage de quelques combattants, sauver son honneur. Chaque 12 juillet désormais,
  nous nous souviendrons de cela, que la justice et la vérité ont vaincu la haine
  et le mensonge et qu''elles doivent, chaque jour, à nouveau, être défendues. Vive
  le général Dreyfus ! Vive la République ! Et vive la France ! 12 juillet 2026 -
