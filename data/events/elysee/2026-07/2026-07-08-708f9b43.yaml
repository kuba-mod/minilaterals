date: '2026-07-08'
type: press_release
source_name: elysee
title: Sommet de l'OTAN en Turquie.
text: 'Le Président de la République et son épouse, Brigitte Macron, se sont rendus
  en Turquie à l’occasion du Sommet de l’OTAN, les mardi 7 et mercredi 8 juillet 2026.
  Ce Sommet était consacré aux principaux enjeux de sécurité de l’Alliance , dans
  un contexte marqué notamment par la poursuite de la guerre d’agression menée par
  la Russie contre l’Ukraine. Les échanges ont porté notamment sur le renforcement
  de la défense européenne et du pilier européen de l’Alliance , mais aussi sur le
  soutien durable à l’Ukraine et l’adaptation de l’Alliance à l’évolution des menaces
  sécuritaires. À cette occasion, le chef de l’État a rappelé l’engagement de la France
  en faveur d’une Europe plus souveraine au sein d’une Alliance renforcée. Il a réaffirmé
  la nécessité d’un soutien durable à la défense de l’Ukraine, d’une contribution
  accrue des Européens à leur propre sécurité et d’une coopération étroite entre les
  Alliés face aux défis stratégiques contemporains. 8 juillet 2026 - Seul le prononcé
  fait foi Bonjour Messieurs, dames. On vient de terminer ce Sommet de l’Otan et je
  veux remercier à nouveau le Président Erdoğan pour son accueil et l''organisation
  de ce sommet. Ça a permis de réaffirmer des choses assez simples, je les ai évoquées
  ce matin, je peux vous en rendre compte. D''abord, le fait que les Européens investissent
  de plus en plus et agissent de plus en plus pour leur défense. Je le porte, pour
  ma part, depuis 9 ans, considérant que nous devons le faire pour nous-mêmes, et
  c''est le cœur de cette autonomie stratégique européenne à la fois en dépensant davantage,
  la France est un bon exemple à travers nos deux lois de programmation militaire
  et l''avenant qui vient d''être voté à l''Assemblée nationale, nous aurons doublé
  en 10 ans le budget des armées françaises, doublé. Ensuite, on prend nos responsabilités.
  Nous prenons la tête de beaucoup de missions de l''OTAN. On l''a fait en Roumanie.
  Vous savez notre présence aussi dans plusieurs pays du flanc Est. Nous avons annoncé
  aujourd''hui notre participation aux opérations justement de forces terrestres avancées
  dans le cadre de l''OTAN en Finlande, en accord avec la Finlande et la Suède. La
  France participera à ces rotations. Donc on est projetés aussi, on participe aux
  opérations pour la sécurité du territoire européen, en Européens. Et quand les Américains
  repositionnent leurs efforts et retirent leurs moyens maritimes, nous sommes là
  aussi pour les remplacer. La France à elle seule a couvert 80 % des besoins maritimes
  qui avaient été ouverts par le repositionnement américain. Ensuite, on développe
  aussi nos propres solutions. Vous savez qu''en plus du réinvestissement, nous Français
  poussons depuis plusieurs années le fait que les Européens doivent défendre et pousser
  une industrie européenne de défense. Si on dépense plus, ce n''est pas pour acheter
  du non-européen. Il y a eu beaucoup d''efforts qui ont été faits ces derniers temps.
  Ce qu''on a su structurer, qu''on va continuer avec d''ailleurs plusieurs initiatives
  qui ont été ici annoncées ou confirmées, en matière de défense sol-air, en matière
  de tirs de longue portée et de précision, en matière d''alerte avancée, ce sont
  des solutions européennes. Ce qu''on fait avec le Rafale, ce qu''on fait avec le
  SAMP/T, ce qu''on fait avec justement nos tirs dans la profondeur avec d''autres Européens,
  ce qu''on fait avec l''initiative dite JEWELS avec les Allemands sont des choses
  très concrètes, mais on développe des capacités européennes et il faut les défendre,
  comme d''ailleurs dans les systèmes de commande en matière d''IA. Donc une Europe
  qui investit, qui défend sa souveraineté et son autonomie stratégique au sein de
  l''OTAN. À cet égard, ce que la France a proposé il y a quelques mois en matière
  de dissuasion nucléaire avancée est une de ces composantes. On a aujourd''hui une
  discussion comme ça, structurée avec 10 pays, qui nous permet vraiment de proposer
  des solutions nouvelles et de créer des dilemmes stratégiques chez nos compétiteurs.
  Le deuxième élément, c''est que cette alliance est une alliance de paix et d''équilibre.
  Elle est là pour la paix du continent européen. C''est exactement ce que nous défendons
  quand il s''agit de l''Ukraine ou du Proche et Moyen-Orient. Donc sur l''Ukraine,
  nous avons réaffirmé évidemment nos engagements, réaffirmé aussi les moyens que
  nous y mettons. Le 13 juillet prochain, à Paris, la coalition des volontaires se
  réunira à nouveau. Ce sera l''occasion, sur la lutte contre la flotte fantôme, des
  initiatives capacitaires nouvelles, la mobilisation de notre industrie au soutien
  de l''Ukraine, de faire des annonces supplémentaires et de programmer aussi des
  exercices ensemble. Évidemment, les forces des pays présents seront invitées le
  lendemain à notre défilé national, et c''est une bonne chose pour leur montrer aussi
  le patriotisme français, cette force, et pour pouvoir les inviter aussi à défiler
  et à être à nos côtés parce que la sécurité et la liberté du continent européen
  se jouent aussi dans ce qui aujourd''hui se passe en Ukraine et notre capacité à
  nous défendre de manière unie. Donc, le rendez-vous du 13 juillet prochain est,
  à mes yeux, très important. La consolidation des initiatives à l''occasion de ce
  sommet a permis de le préparer. Enfin, je veux ici souligner que nous avons réussi
  au G7 à Évian à entamer cette reconvergence, je l''évoquais comme telle, mais Américains,
  Européens, Asiatiques et Canadiens parlons d''une même voix sur l''Ukraine comme
  sur le Proche et Moyen-Orient. C''est une bonne chose, c''est-à-dire celle qui défend
  la souveraineté, la stabilité et le respect du droit international. C''est ça que
  nous devons défendre et c''est le sens de cette alliance. Je vais maintenant répondre
  à vos questions. Donald Trump a affirmé aujourd’hui que le cessez-le-feu était terminé
  et qu’il pourrait frapper très fort l’Iran ce soir, est-ce que vous considérez que
  l’accord qui a été signé à Versailles en votre présence est désormais caduque ?
  Est-ce que vous avez pu échanger avec le Président Trump ? Oui, je pense qu''il
  y a eu une violation de cet accord par les frappes iraniennes qui ont conduit à
  une réponse américaine. Je pense que les Iraniens ont eu tort de faire ces frappes
  qui contreviennent à ce qu''ils ont eux-mêmes signé, qui a été préparé à Islamabad
  et signé à Lucerne. Pour autant, aujourd''hui, nous sommes toujours dans le cadre
  des 60 jours. Ma compréhension, c''est que les réunions qui sont prévues dans ce
  cadre vont continuer de se tenir et il faut continuer d''avancer avec beaucoup de
  calme, de sang-froid et de patience. Et nous, nous défendons toujours le même agenda :
  la paix et la stabilité, la réouverture du détroit d''Ormuz sans conditions ni péage,
  la paix et la stabilité au Liban, c''est-à-dire le retrait des armes du Hezbollah,
  le retrait de toute force étrangère du sol libanais, et les capacités offertes au
  Liban pour se protéger lui-même, et un cadre de sécurité pour tout le monde avec
  des négociations qui aboutissent sur le nucléaire et le balistique iranien. Et donc
  les discussions vont se poursuivre. Est-ce que vous craignez une agression des Etats-Unis
  au Groenland ? Non, je ne fais pas de politique-fiction. Et si c''était le cas,
  je ne pense pas que le président américain aurait été présent aujourd''hui. Dans
  notre alliance, il y a non seulement des règles de solidarité si l''un est agressé,
  mais il y a évidemment des règles de solidarité pour ne pas s''agresser les uns
  avec les autres. Non, je ne crois pas à cela. Donc il faut être calmes et il y a suffisamment
  de sujets de vraie préoccupation. Les groupes techniques qui avaient été prévus depuis
  février dernier continuent de se tenir, les exercices aussi de l''Alliance se font.
  Nous y participons. Et dans le cadre d''Arctic Sentry, il y a eu Arctic Endurance,
  qui est un des exercices prévus auxquels nos forces ont participé. Ce qui me permet
  de saluer nos chasseurs alpins, entre autres, et l''ensemble des forces qui ont
  pris part. Monsieur le Président, le Charles de Gaulle a quitté la zone, est-ce
  qu’avec la reprise des tensions dans le détroit d’Ormuz, ça doit passer par un redéploiement
  des moyens maritimes ? Pas à ce stade, compte tenu de ce que je viens d''évoquer.
  Nous l''avons fait en connaissance de cause et après analyse de la situation, et
  en considérant que la désescalade après la signature de l''accord et l''entrée dans
  les 60 jours ne justifiait plus le déploiement que nous avions décidé dès les premiers
  jours de mars dernier. Donc je pense que ce choix demeure pertinent. Nous avons
  des moyens de déminage, nous avons des moyens de protection et nous avons aussi
  des moyens évidemment de sécurité et de protection de nos alliés dans la région.
  C''est ce qui demeure pertinent. Si les choses devaient se détériorer à nouveau,
  évidemment je réenvisagerais les déploiements qui sont nécessaires. Ça n''est pas
  le cas pour le moment et je pense que les discussions dans le cadre de l''accord
  signé à Lucerne vont se poursuivre. Le Président Trump a critiqué le Groenland,
  l’Espagne, l’Italie, est-ce que vous pensez que ça remet en cause cette convergence
  dont vous parliez au G7 ? Je ne les ai pas entendus dans la salle, je ne les ai
  pas entendus dans nos échanges et ils n''ont pas de conséquence sur les choix qui
  sont faits aujourd''hui. Donc il faut continuer de travailler. Est-ce que dans la
  salle c’était un message d’unité ? Vous avez rencontré Monsieur Erdoğan, est-ce
  que vous avez parlé de SAMP/T ? On a parlé de tout. On a parlé de tout, de notre
  coopération bilatérale sur le plan économique, sur le plan de la défense, sur le
  plan de l''éducation, sur beaucoup de sujets qui concernent nos compatriotes des
  deux côtés, avec des vraies sources de satisfaction et des choses à améliorer, mais
  on l''a fait dans un esprit constructif. On a évidemment également parlé de l''Ukraine,
  parlé de Proche et Moyen-Orient, de la Syrie, du Liban, de l''Irak et de notre coordination
  sur ces sujets. J''étais très satisfait de cette discussion et du suivi qui sera
  fait par nos ministres. Sur ce sujet, je l''ai déjà dit, nous avons un travail qui
  est en cours en franco-italien avec la Turquie et donc c''est ce travail technique
  qui se poursuit. Monsieur le Président, pas question de commenter des décisions
  de justice, on l''a bien compris, mais le fait politique en France, après sa condamnation
  Marine Le Pen a décidé de se porter candidate pour une quatrième fois consécutive,
  vous l’avez vous-même affrontée à deux reprises, est-ce que vous estimez comme votre
  ancien Premier ministre Gabriel Attal qu’il s’agit d’une faute morale, ou est-ce
  qu’à l’inverse comme un autre de vos Premiers ministres qu’elle est dans son bon
  droit ? Mais je l''ai déjà dit. D''abord, on est à l''étranger. Je n''aime pas commenter
  l''actualité politique française, vous le savez. Ensuite, de là où je suis, de par
  notre Constitution, je ne suis pas amené à participer à cette élection. Par contre,
  je suis amené à être Président jusqu''à la dernière seconde. Donc, je ne suis pas
  un commentateur de la vie politique française. Je suis là pour défendre, protéger,
  représenter notre pays, prendre des décisions, agir et être garant de notre unité.
  Donc à cet égard, je serai le garant que les opérations électorales se fassent dans
  un cadre sain, apaisé, sans ingérence étrangère et que chacun puisse exprimer sa
  voix et défendre sa position. Ce n''est pas la mienne qui compte aujourd''hui parce
  que je ne serai pas devant le suffrage des Français au mois de mai prochain. Est-ce
  que le Président Trump a posé des conditions au maintien des Etats-Unis dans l’OTAN ?
  Emmanuel MACRON Non, je n''ai entendu ni condition, ni d''ailleurs même déclaration
  qui aurait pu aller dans l''autre sens. La présence du Président Trump ici, ce qu''il
  a vu du réinvestissement de chacun, des choix qui sont faits et la clarté des discussions
  que nous avons pu avoir sur différents sujets ne doit même pas laisser planer le
  doute sur cette matière. Les États-Unis ont annoncé et sont en train de mettre en
  œuvre un redéploiement de leurs efforts, qui me paraît tout à fait légitime, sur
  le sol européen et qui suppose que les Européens s''organisent. Mais j''ai déjà
  dit à plusieurs reprises, on ne doit pas le faire parce que quelqu''un nous le demande,
  on doit le faire pour nous-mêmes. Donc tout ça me paraît cohérent et je ne commente
  pas les commentaires. Donc non, il n''y a pas de question là-dessus. Il faut avancer.
  On a suffisamment de défis à nos portes qui touchent nos sociétés et d''instabilité
  dans le monde pour nous concentrer sur les vrais sujets. Qu’avez-vous à dire au
  Président Zelensky, qui demande aux alliés de l''OTAN davantage de moyens pour sa
  défense antiaérienne. Emmanuel MACRON Il a raison. Il a raison, nous devons continuer
  d''être plus innovants. Ce sera un des objets de la discussion du 13 juillet prochain.
  Et en particulier, nous souhaitons mobiliser aussi plusieurs industriels de plusieurs
  de nos pays qui, sur l''antibalistique, sont clés pour lui et pour sa sécurité et
  la sécurité de son peuple. Donc nous devons absolument l''aider. Plusieurs pays
  ont des réserves importantes de missiles qui sont utilisés par les systèmes Patriot.
  Il les mobilise, c''est légitime. Et donc il y a des efforts qui sont en train d''être
  faits. Ce n''est pas le cas de la France, comme vous le savez. Il y a par ailleurs
  un travail important qui est fait sur l''antibalistique et sur d''autres capacités.
  Donc nous allons le faire lors de la coalition des volontaires du 13 juillet prochain,
  comme d''ailleurs avec nos industriels. C''est, je pense, un point important. Donc
  c''est dans ce sens qu''on va œuvrer. La réunion de la semaine prochaine a pour
  vocation de répondre à cette demande légitime du Président Zelensky. Merci beaucoup.
  Est-ce que de futurs exercices militaires conjoints seront l’objet de la coalition
  des volontaires ? C''est quelque chose qu''on va en effet travailler en vue de lundi
  prochain, mais qui vise à crédibiliser et consolider tout le travail qui est fait
  ensemble contre la flotte fantôme, pour la sécurité ukrainienne, le jour d''après,
  etc. Est-ce que le Président Trump a réitéré ses menaces contre l’Espagne ? Non,
  pas du tout. Les propos du Président Trump, les propos de tous les dirigeants que
  j''ai pu entendre, hors les moments où j''ai eu à faire des bilatérales, mais ce
  qui m''a été rapporté est conforme, ont été des propos respectueux de chacun des
  membres et absolument sans discrimination de qui que ce soit, ce qui, à mon avis,
  est une bonne méthode pour avancer au sein d''une alliance. Merci beaucoup. J''espère.
  Et donc on avance sur beaucoup de nos sujets. Oui, oui, oui. On a eu un très bon échange,
  une fois encore, et je pense que c''est tout à fait faisable. Merci à vous. Merci, mesdames
  et messieurs. 8 juillet 2026 - Seul le prononcé fait foi Bonjour Messieurs, dames.
