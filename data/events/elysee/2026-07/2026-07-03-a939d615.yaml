title: Déclaration conjointe du Président de la République française et du Premier
  ministre britannique.
text: Le détroit d'Ormuz est une artère vitale pour l'économie mondiale. Rétablir
  un transit sûr pour les navires de toutes les nations à travers le détroit est un
  sujet de préoccupation mondiale. Le Sultanat d'Oman a accepté de travailler avec
  la France et le Royaume-Uni pour garantir que ses eaux territoriales souveraines
  soient sûres pour la navigation. La France et le Royaume-Uni se tiennent également
  prêts à déployer la mission militaire multinationale plus large pour soutenir la
  liberté de navigation dans le détroit d'Ormuz. La France et le Royaume-Uni réaffirment
  leur engagement commun en faveur de la stabilité régionale, du respect de la souveraineté
  de tous les États, ainsi que leur volonté de maintenir une coopération étroite avec
  leurs partenaires afin de préserver la sécurité mondiale, la liberté de navigation
  et le droit international.
