date: '2026-07-17'
type: press_release
source_name: elysee
title: Conclusions du 26e Conseil des ministres franco-allemand.
text: 'Dans le prolongement du Conseil des ministres franco-allemand qui s’est tenu
  le 29 août 2025 à Toulon, la France et l’Allemagne, déterminées à mettre en œuvre
  le Traité d’Aix-la-Chapelle et ses objectifs, ont réaffirmé le rôle fondamental
  de l’amitié et du partenariat franco-allemands dans la construction d’une Union
  européenne (UE) plus souveraine, plus compétitive, plus prospère et plus résiliente.
  Le 26ème Conseil des Ministres franco-allemand s’est mis d’accord sur de nouvelles
  initiatives pour renforcer leur amitié et leur partenariat bilatéral au bénéfice
  de leurs économies et de leurs peuples. La France et l’Allemagne sont toutes deux
  convaincues qu’une économie prospère, robuste et interconnectée est essentielle
  pour assurer la stature internationale, la cohésion interne et la pérennité de l’UE.
  Cela suppose un secteur industriel robuste, or celui-ci subit actuellement de fortes
  pressions. L’économie n’est pas seulement un facteur de croissance, c’est aussi
  la pierre angulaire du bien-être social, de l’innovation et de l’influence géopolitique.
  En tirant parti de sa puissance économique, l’UE peut négocier des accords commerciaux
  avec des partenaires du monde entier, promouvoir des conditions de concurrence équitables
  et relever des défis mondiaux comme la transition numérique. La France et l’Allemagne
  saluent les progrès significatifs réalisés dans la mise en œuvre du Programme d’action
  économique franco-allemand adopté à Toulon en août 2025. Les deux pays souhaitent
  poursuivre la mise en œuvre des projets phares en cours et en lancer de nouveaux.
  La France et l’Allemagne ont réuni un groupe de travail de haut niveau sur l’espace.
  Les deux pays reconnaissent le rôle crucial joué par IRIS² dans la mise en place
  d’une infrastructure spatiale européenne résiliente, intégrée et robuste. C’est
  la première étape vers un système de systèmes européen, qui reposera sur IRIS² pour
  la transmission de données. Par conséquent, les deux pays sont convenus des principes
  suivants pour IRIS² : (i) la fourniture de services en temps utile ; (ii) la prise
  en considération des cas d’usage (bande passante, temps de latence, sécurité et
  qualité de service), notamment le recensement des différents groupes d’utilisateurs
  ayant des exigences diverses ; (iii) une approche commerciale pour stimuler les
  investissements privés et la concurrence ; et (iv) le rôle central des partenariats
  public-privé pour mobiliser des capacités financières et l’innovation en faveur
  du secteur public tout en gardant les marchés ouverts aux acteurs commerciaux (voir
  le non-papier conjoint « IRIS2 : un élément clé de l’infrastructure spatiale et
  du paysage économique européens »). Le groupe de travail appliquera ces principes
  lors de ses futurs travaux. Dans le contexte géopolitique actuel, la France et l’Allemagne
  reconnaissent que les questions de fréquences sont un enjeu stratégique (voir le
  non-papier conjoint « La gestion du spectre radioélectrique est essentielle pour
  préserver la capacité de l’UE à jouer un rôle dans sur les questions spatiales mondiales
  »). Les deux pays reconnaissent que la gouvernance internationale du spectre des
  fréquences radioélectriques et des orbites satellitaires exercée par l’Union internationale
  des télécommunications (UIT), qui est ancrée dans le multilatéralisme et fondée
  sur le droit international ainsi que sur la Charte des Nations Unies, constitue
  une base appropriée et valide pour coordonner les systèmes de radiocommunications
  de l’ensemble des pays. Afin de développer leurs politiques spatiales, la France
  et l’Allemagne soutiendront le rôle clé de l’UIT lors du Sommet international sur
  l’espace qui aura lieu à Paris les 9 et 10 septembre 2026. À la différence du marché
  des télécommunications terrestres, le marché des télécommunications par satellite
  est intrinsèquement pan-européen. Aussi est-il dans l’intérêt des utilisateurs et
  des opérateurs de satellite de mieux harmoniser le cadre des services par satellite
  en Europe, tout en veillant à ce que cette harmonisation permette une utilisation
  efficace du spectre radioélectrique et respecte les compétences des États membres,
  notamment en matière de sécurité et de défense. La bande de fréquences MSS 2 GHz
  est essentielle pour assurer la compétitivité de l’Europe et sa souveraineté en
  matière de connectivité et devrait être utilisée comme un levier de renforcement
  de la souveraineté et du marché européens (voir le non-papier conjoint « Note sur
  les fréquences »). Conscientes du fait que la bande de fréquences MSS 2 GHz revêt
  une importance stratégique, la France et l’Allemagne sont convenues que la procédure
  de sélection doit permettre un accès de gros dans des conditions justifiées de manière
  objective, non discriminatoires, proportionnées et transparentes (voir le non-papier
  conjoint « Analyse conjointe de la bande de fréquences MSS 2 GHz »). Il est essentiel
  de garantir à IRIS2 une part suffisante de la bande de fréquences MSS 2 GHz en Europe
  pour les services de connectivité directe, et ce point devrait être clairement indiqué
  dans la proposition de règlement en la matière (voir le non-papier conjoint « IRIS2 :
  un élément clé de l’infrastructure spatiale et du paysage économique européens »).
  Par ailleurs, la France et l’Allemagne ont lancé des travaux prospectifs communs
  au sujet des technologies spatiales critiques et elles renforceront leur coopération
  en matière de développement de ces technologies afin de garantir leur souveraineté
  conjointe dans ces domaines stratégiques. La France et l’Allemagne ont intensifié
  leur coopération en matière de technologies de pointe, notamment grâce : -    À
  des programmes de recherche bilatéraux sur l’IA avec la collaboration entre l’Institut
  national de recherche en sciences et technologies du numérique (INRIA) et le Centre
  allemand de recherche pour l’intelligence artificielle (DFKI) et à une coopération
  en matière de batteries à haute performance avec le projet réussi « HIPOBAT ». Sur
  la base du succès de cette collaboration, les deux pays s’engagent à renforcer leur
  coopération et à l’étendre à d’autres États membres de l’UE ; -    À une coopération
  en matière d’IA industrielle, de technologies avancées de semi-conducteurs et de
  technologies/fusion nucléaires dans le cadre de projets importants d’intérêt européen
  commun (PIIEC) et à deux ateliers sur l’amélioration du financement en capital-risque
  du secteur de la microélectronique. Le groupe de travail sur l’innovation de rupture,
  créé à la suite du Conseil des ministres franco-allemand de 2025, a présenté son
  rapport et soutient l’ambition de la France de créer une entité nationale dédiée
  à l’innovation de rupture. Comme annoncé aujourd’hui, la France et l’Allemagne sont
  convenues d’une feuille de route pour une coopération future entre cette nouvelle
  entité française et l’Agence fédérale allemande pour l’innovation de rupture SPRIND,
  sous la forme de challenges communs. La France et l’Allemagne reconnaissent le rôle
  crucial de l’énergie de fusion en tant que solution sûre, durable et neutre en carbone
  pour répondre aux besoins énergétiques futurs de l’Europe et du monde. Elles sont
  en train de mettre en place un cadre de coopération renforcée et ont adopté une
  déclaration d’intention conjointe (signée aujourd’hui). Les technologies quantiques
  sont essentielles pour assurer la souveraineté technologique, la création de valeur
  économique et la sécurité nationale. La France et l’Allemagne sont fermement attachées
  à la coopération bilatérale, qui est au cœur du rôle moteur de l’Europe. Un document
  présentant leurs positions communes sur le règlement européen dans le domaine quantique
  (EU Quantum Act) a été signé aujourd’hui. Comme décidé à Toulon, la France et l’Allemagne
  entendent renforcer la flexibilité de leurs systèmes énergétiques, accroître leur
  indépendance énergétique, bâtir un marché de l’énergie décarboné et garantir des
  approvisionnements énergétiques sûrs à un coût abordable. Parmi leurs principales
  priorités figurent la construction du marché de l’électricité, dont les redevances
  d’accès au réseau, le Cadre de l’UE pour l’Energie à l’horizon 2040, une étude conjointe
  avec la Pologne, ainsi que le déploiement et le dérisking des infrastructures transfrontalières
  dédiées à l’hydrogène pour permettre le développement à grande échelle de l’hydrogène
  de manière rentable. Pour faire avancer ces priorités, la France et l’Allemagne
  renforceront leur coopération sur la construction du marché de l’électricité, notamment
  par la coordination de leurs positions sur les redevances d’accès au réseau, les
  codes réseaux, c’est-à-dire l’attribution des capacités et la gestion de la congestion,
  et sur la réponse à la demande afin de garantir des prix équitables et abordables.
  Les deux pays élaboreront un non-papier conjoint dans le cadre du Livre blanc sur
  le marché de l’électricité, en mettant l’accent sur la gouvernance, la simplification
  et l’accélération du développement des codes réseaux, ainsi que sur l’amélioration
  de la gouvernance et de la coordination régionale. En parallèle, la France et l’Allemagne
  instaureront un dialogue régulier sur le Cadre de l’UE pour l’Energie à l’horizon
  2040 afin de garantir la fiabilité et la sécurité des investissements pour les énergies
  renouvelables et bas carbone, ainsi que le respect de la neutralité technologique
  entre toutes les technologies énergétiques zéro émission nette et bas carbone dans
  leurs contributions respectives aux objectifs européens en matière d''énergie, de
  durabilité et de climat. Pour faire avancer le projet d’un corridor de l’hydrogène
  du Sud-Ouest de l’Europe, la France et l’Allemagne poursuivront leurs échanges dans
  l’année à venir, conjointement avec l’Espagne, le Portugal et la Commission européenne,
  sur les principaux éléments d’un cadre technique et réglementaire visant à réduire
  les risques et renforceront la coopération régionale sur l’hydrogène le long de
  la frontière entre les deux pays. Dans le domaine de la politique numérique, la
  France et l’Allemagne ont approfondi de manière importante leur coopération bilatérale,
  dans la continuité du Sommet sur la souveraineté numérique européenne qui s’est
  tenu à Berlin en novembre 2025 et du salon VivaTech organisé à Paris en juin 2026.
  Les deux pays ont défini une position commune visant à collaborer activement au
  paquet de mesures sur la souveraineté technologique de l’UE, notamment en s’accordant
  sur une compréhension commune de la souveraineté numérique comme outil pour renforcer
  la capacité de l’Europe à agir de façon indépendante tout en préservant l’ouverture
  des marchés, l’innovation, la compétitivité technologique et la coopération avec
  des partenaires internationaux de confiance. La France et l’Allemagne unissent leurs
  forces dans la perspective des prochaines négociations au niveau de l’UE. Les deux
  pays réaffirment leur volonté d’établir des cadres simplifiés, propices à l’innovation
  et compétitifs, tout en encourageant le développement de leurs propres capacités
  technologiques, par exemple via l’Initiative européenne pour l’IA de frontière,
  qui a créé une dynamique importante pour une coopération européenne plus étroite
  dans ce domaine. La France et l’Allemagne mettront à profit cette dynamique en renforçant
  l’écosystème de l’Europe en matière d’IA de frontière grâce au calcul à haute performance,
  aux talents, à la recherche et aux investissements. Ces mesures visent à renforcer
  la souveraineté numérique de l’Europe et à réduire de manière importante les dépendances
  à l’égard des fournisseurs de technologie non européens. La France et l’Allemagne
  continueront à travailler en partenariat avec des pays chefs de file dans les domaines
  de la numérisation et de l’IA, et resteront de ce fait une destination attractive
  pour les investissements dans les technologies numériques et l’IA. Les prochaines
  étapes consisteront à mettre en place les structures de l’Initiative européenne
  pour l’IA de frontière qui permettront de faire avancer l''initiative à très court
  terme. Outre l''Allemagne et la France, un troisième État membre devrait également
  rejoindre l''initiative avant la fin de l''été. La France et l’Allemagne reconnaissent
  que les capacités des centres de données constituent une condition préalable à la
  réalisation des ambitions de l’Europe en matière d’IA, à sa souveraineté numérique
  et à sa compétitivité. Les deux pays renforceront leur coopération par la promotion
  de conditions-cadres propices à l’investissement, à l’intégration énergétique, à
  la valorisation de la chaleur résiduelle, aux infrastructures numériques résilientes,
  aux chaînes de valeur industrielles et aux opportunités transfrontalières mutuellement
  bénéfiques, tout en échangeant les bonnes pratiques concernant les procédures de
  planification et d’octroi des autorisations. De plus, la France et l’Allemagne mèneront
  conjointement des initiatives visant à favoriser une adoption plus rapide de l’IA
  dans le secteur industriel, en particulier au sein des PME, et à faire de l’IA industrielle
  une priorité majeure. La France et l’Allemagne piloteront la mise en œuvre du projet
  important d’intérêt européen commun (PIIEC) sur l’intelligence artificielle et identifieront
  les cas d’usage phares de l’IA industrielle dans les industries stratégiques, notamment
  le secteur automobile, qui serviront de modèle pour un déploiement à plus grande
  échelle en Europe. La France et l’Allemagne renforceront encore davantage leur coopération
  dans le domaine des matières premières, en particulier en matière de sécurité des
  approvisionnements, conformément aux engagements pris lors du sommet du G7 à Évian.
  Les deux pays sont convenus d’organiser une table ronde conjointe réunissant des
  dirigeants d’entreprises françaises et allemandes sur la « Protection de la chaîne
  de valeur européenne des aimants permanents à base de terres rares », dans le cadre
  d’une déclaration conjointe des deux pays. La France et l’Allemagne partagent l’ambition
  conjointe de bâtir une Europe souveraine et compétitive dans le domaine des matières
  premières critiques. Elles soutiendront le développement d’une plateforme de renseignement
  minier dans le cadre du futur centre européen des matières premières critiques (EU-CRMC).
  S’appuyant sur cet effort commun de partage de l’information, les deux pays plaideront
  conjointement en faveur d’une réorientation des instruments financiers européens
  existants vers des projets couvrant l’ensemble de la chaîne de valeur des métaux
  critiques et soutiendront une approche européenne plus opérationnelle en matière
  de structuration des marchés des matières premières critiques. La France et l’Allemagne
  intensifieront leur coopération et leurs échanges sur les questions de modernisation
  de l’action publique et de réduction des lourdeurs administratives, en particulier
  sur les enjeux de la garantie d''une disponibilité à l''échelle nationale et de
  l''amélioration des services publics numériques, ainsi que de la mesure des coûts
  administratifs et de l''analyse d''impact réglementaire. La France et l’Allemagne
  réaffirment leur partenariat étroit et leur engagement conjoint en faveur d’une
  UE forte et unie. Conformément au Traité d’Aix-la-Chapelle sur la coopération et
  l’intégration franco-allemandes, les deux pays sont convaincus que la poursuite
  de la coopération franco-allemande est et demeurera un élément déterminant d’une
  Europe forte, compétitive et souveraine. Afin de faire avancer ensemble les dossiers
  clés du programme d’action européen, la France et l’Allemagne ont coordonné leurs
  positions sur les sujets suivants : La réduction de la bureaucratie au sein de l’UE
  demeure un élément essentiel de l’agenda de l’UE en matière de compétitivité. La
  France et l’Allemagne conviennent qu’un niveau d’ambition plus élevé est nécessaire
  lors des négociations des paquets Omnibus restants, notamment en ce qui concerne
  le numérique, l’environnement et les régions ultrapériphériques, de même qu’il est
  nécessaire de conserver les normes pertinentes et les objectifs stratégiques, et
  elles décident de créer un groupe de travail franco-allemand de haut niveau pour
  conclure rapidement les négociations en question. Les deux pays demandent aux parties
  prenantes et aux organisations d’entreprises de rendre compte régulièrement des
  aspects du corpus réglementaire de l’UE qui doivent encore être simplifiés, et ils
  suivent avec attention le « Nettoyage approfondi de la réglementation » de la Commission
  pour contribuer à la mise au point de nouveaux paquets Omnibus substantiels ou à
  d’autres propositions concrètes permettant de simplifier la législation, y compris
  sur les initiatives visant à accélérer les procédures d''aménagement et de permis,
  idéalement dès la présentation du programme de travail 2027 de la Commission. En
  outre, la France et l’Allemagne souhaitent que le « Fitness Check » numérique de
  la Commission donne lieu à des améliorations concrètes et quantifiables en matière
  de compétitivité et à une réduction significative des charges administratives, notamment
  pour les PME, les petites entreprises à capitalisation moyenne (mid-caps) et les
  start-ups. En parallèle, l’UE doit limiter autant que possible la création de nouvelles
  contraintes bureaucratiques inutiles dans la législation à venir. La France et l’Allemagne
  plaident en faveur d’un mécanisme ciblé pour réduire les coûts réglementaires, administratifs
  et de mise en conformité et pour éviter ces contraintes dans les processus législatifs
  conformément aux instructions données par le Conseil européen en mars 2026. La feuille
  de route « Une Europe, un marché » est une trajectoire clé vers le renforcement
  de la compétitivité de l’Europe. Elle soutient la mise en œuvre des priorités agréées
  mutuellement, dans les délais prévus. La France et l’Allemagne entendent développer
  encore la feuille de route, et en particulier y intégrer les priorités définies
  au niveau des chefs d’État et de gouvernement comme le train de mesures pour la
  simplification des services financiers. Un élément crucial de la feuille de route
  est le projet d’un « 28e régime », baptisé EU Inc., dont l’adoption d’ici à fin
  2026 est déterminante. La France et l’Allemagne appellent la Commission à soumettre
  des propositions dans les délais et demandent au Conseil et au Parlement européen
  d’adapter leurs processus législatifs aux échéances fixées dans la feuille de route.
  La France et l’Allemagne continueront de soutenir sa mise en œuvre. Les deux pays
  continueront leur coopération efficace s’agissant de leur contribution à la réduction
  des obstacles au marché unique les plus nocifs et à la concrétisation du plein potentiel
  du marché européen. La France et l’Allemagne réaffirment leur détermination commune
  à mettre en œuvre l’union de l’épargne et des investissements. L’Europe a besoin
  de marchés des capitaux plus profonds, plus intégrés et plus compétitifs, qui puissent
  promouvoir l’innovation financière et qui soient soutenus par une supervision européenne
  efficace. Le train de mesures sur l’intégration des marchés et la surveillance constitue
  l’une des initiatives essentielles pour développer les marchés des capitaux européens.
  Sur la base de la contribution récente des ministres des Finances de l’Allemagne,
  de l’Espagne, de la France, de l’Italie, des Pays-Bas et de la Pologne du 28 mai
  2026, qui porte sur les paramètres essentiels du paquet sur l’intégration des marchés
  et la surveillance, notamment sur les nouvelles fonctions de supervision attendues
  de l’Autorité européenne des marchés financiers, la France et l’Allemagne soutiennent
  l’adoption d’ici à octobre prochain d’une orientation générale au sein du Conseil
  et la conclusion en temps opportun, d’ici à la fin de l’année, d’un accord ambitieux.
  Par ailleurs, s’agissant de la priorité clé que constitue la mobilisation de l’épargne
  européenne, la France et l’Allemagne appellent à la mise en œuvre rapide du label
  « Finance Europe », s’appuyant sur la réunion de suivi de haut niveau qui se tiendra
  à Berlin à l’automne. Les deux pays saluent le rapport intermédiaire de la task
  force franco-allemande sur l’avenir de la finance numérique publié en juin 2026.
  Ils partagent avec la task force l’ambition de renforcer la compétitivité, la résilience
  et la souveraineté de l’Europe en matière de finance numérique, notamment grâce
  au développement de la tokenisation des marchés des capitaux, à l’accélération du
  déploiement de la monnaie de banque centrale interbancaire et à la promotion d’actifs
  de règlements numériques libellés en euros. La France et l’Allemagne se réjouissent
  par avance de la publication du rapport final d’ici à la fin de l’année. Dans la
  continuité du rapport Noyer-Kukies et de la feuille de route ministérielle de janvier
  2026, la France et l’Allemagne réaffirment leur volonté de renforcer le financement
  des scale-ups en Europe et confirment le lancement d’un réseau franco-allemand pour
  le financement des scale-ups, ouvert à l’intégration progressive d’autres États
  membres de l’UE. En outre, la France et l’Allemagne utiliseront au mieux ces initiatives
  pour soutenir le renforcement du rôle international de l’euro. Reconnaissant les
  déséquilibres macroéconomiques mondiaux actuels et leurs effets néfastes sur les
  industries européennes, la France et l’Allemagne plaident par ailleurs en faveur
  d’une réponse européenne unie et ambitieuse pour soutenir des conditions de concurrence
  équitables, diversifier et dérisker leurs économies.  Les deux pays soutiennent
  un agenda commercial pragmatique, fondé sur la conclusion de nouveaux accords commerciaux
  bilatéraux et régionaux ambitieux et justes pour que les entreprises européennes
  aient accès à de nouveaux marchés d’exportation, pour contribuer à la diversification
  des chaînes de valeur et pour atténuer les risques pour l’économie de l’UE, tout
  en défendant ses intérêts fondamentaux et en garantissant des conditions de concurrence
  véritablement équitables. Outre leur participation continue au dialogue constructif
  avec leurs principaux partenaires économiques et dans la continuité des discussions
  tenues lors du sommet du G7 d’Évian et lors de la réunion du Conseil européen les
  18 et 19 juin 2026, la France et l’Allemagne appellent à l’utilisation rapide et
  systématique de tous les instruments existants. En complément, les deux pays appellent
  la Commission à soumettre dans les meilleurs délais des propositions concrètes pour
  le renforcement de nos instruments de défense commerciale, de la politique industrielle
  et de la sécurité économique, notamment au moyen d’un nouvel instrument de résilience
  pour réduire les dépendances dans les secteurs critiques et stratégiques et traiter
  la problématique de la surconcentration des chaînes d’approvisionnement afin d’éviter
  les vulnérabilités structurelles. La France et l’Allemagne soutiennent fermement
  le système d’échange de quotas d’émission (SEQE) de l’UE, qui constitue le principal
  instrument fondé sur le marché pour atteindre l’objectif de neutralité climatique
  de l’Europe d’ici à 2050. Un prix du carbone efficace envoie un message décisif
  pour mobiliser des capitaux en faveur des technologies zéro émission nette et bas
  carbone et pour soutenir la transformation des processus de production. Il est donc
  essentiel de préserver l’ambition et l’intégrité du SEQE pour atteindre les objectifs
  en matière de climat tout en garantissant la compétitivité de l’Europe. Conformément
  aux conditions propices à la réalisation de l’objectif pour 2040 convenues dans
  la loi européenne sur le climat, les réexamens à venir doivent garantir la pérennité
  du système grâce à des ajustements ciblés et renforcer la compétitivité afin de
  préserver la base industrielle de l’UE. Ce principe vaut pour le SEQE, notamment
  pour les quotas alloués à titre gratuit, ainsi que pour les référentiels du SEQE,
  s’agissant desquels les deux pays ont encouragé la Commission à veiller à ce que
  les référentiels alternatifs révisés et la méthode utilisée pour déterminer ces
  référentiels alternatifs tiennent compte avec plus d’exactitude des capacités de
  décarbonation réelles de leurs industries. Dans le prolongement de l’Agenda économique
  franco-allemand, la France et l’Allemagne soutiendront la Commission européenne
  afin de garantir la compétitivité mondiale de l’industrie automobile européenne,
  d’accélérer l’adoption des véhicules à zéro émission et à faibles émissions, et
  de préserver une base industrielle européenne solide. La proposition de révision
  de la Commission européenne constitue une base importante pour faire progresser
  une réglementation sur les émissions de CO₂ adéquate, technologiquement neutre et
  flexible, ainsi que des exigences en matière de contenu européen, conformément aux
  objectifs climatiques de l’UE, tout en tenant compte des évolutions technologiques
  pertinentes. La France et l’Allemagne contribueront de manière constructive au processus
  législatif en cours, en cherchant à élaborer d’ici la fin de l’été une approche
  franco-allemande commune sur le paquet automobile, ainsi que sur les dispositions
  connexes relatives à l’automobile prévues dans la loi sur l’accélérateur industriel.
  Le prochain cadre financier pluriannuel sera essentiel pour garantir la capacité
  d’action de l’UE dans un monde de plus en plus incertain. Il devra permettre d’obtenir
  des résultats concrets sur les priorités communes et de stabiliser les contributions
  nationales. La France et l’Allemagne œuvreront à faire progresser les conditions
  nécessaires à un accord exhaustif et équilibré, notamment concernant les nouvelles
  ressources propres, le volume global, la modernisation de l’architecture et la réduction
  de la bureaucratie, dans l’objectif de conclure les négociations relatives au cadre
  financier pluriannuel en 2026. Convaincues que l’élargissement contribue à une Europe
  sûre, prospère et démocratique et relève donc de leurs intérêts stratégiques communs,
  la France et l’Allemagne réaffirment leur détermination à donner un nouvel élan
  au processus d’élargissement. À cette fin, la France et l’Allemagne ont lancé une
  initiative lors du Sommet UE-Balkans occidentaux à Tivat (Monténégro) en juin 2026
  pour la création de nouvelles incitations dans le cadre d’un processus d’intégration
  progressive renforcé et fondé sur le mérite pour l’ensemble des pays candidats.
  Les deux pays souhaitent simplifier et améliorer le processus actuel pour le rendre
  plus efficace et pour permettre une intégration à l’UE plus rapide et plus approfondie,
  sur la base des critères de Copenhague. Rappelant la Déclaration de Grenade, la
  France et l’Allemagne soutiennent également les progrès réalisés en parallèle en
  matière de réformes internes de l’UE afin de traiter les sujets clés relatifs aux
  priorités de l’UE, à ses politiques et à sa capacité d’action. Les deux pays attendent
  avec intérêt les discussions approfondies qui se tiendront au Conseil européen en
  octobre 2026. Alors que les négociations concernant l’adhésion de certains pays
  candidats touchent à leur fin, la France et l’Allemagne œuvreront ensemble à ce
  que les prochains traités d’adhésion renforcent l’UE et contribuent à la sécurité
  de son voisinage, notamment en adoptant les garanties et les périodes transitoires
  nécessaires. Compte tenu des évolutions géopolitiques auxquelles nous sommes confrontés,
  la France et l’Allemagne soulignent la nécessité de réformer l’organisation interne
  de l’Union européenne en matière d’action extérieure, afin de permettre à l’UE d’apporter
  des réponses plus fermes, plus rapides et mieux coordonnées sur la scène internationale.
  Le Conseil européen d’octobre 2026 devrait demander à la présidence du Conseil d’entamer
  ces travaux, notamment au sein du Conseil, en vue d’une action extérieure de l’UE
  plus forte et mieux coordonnée. Ces travaux devraient porter sur le rôle et l’organisation
  institutionnelle des institutions et organes concernés de l’UE, notamment le HRVP,
  la Commission et le SEAE. La présidence devrait faire rapport au Conseil européen
  d’ici la fin de l’année 2026. La France et l’Allemagne sont convaincues que la coopération
  bilatérale doit apporter des bénéfices concrets aux citoyens et permettre aux deux
  pays de promouvoir ensemble leur modèle démocratique fondé sur des valeurs partagées.
  La France et l’Allemagne s’emploient à adopter une approche pluridimensionnelle
  pour renforcer leurs sociétés face aux problématiques économiques et sociales au
  moyen d’un dialogue social approfondi, en renforçant les liens entre leurs peuples
  grâce à la culture, aux médias et aux projets conjoints relatifs à la jeunesse,
  afin de garantir la sécurité en ligne des citoyens ainsi que pour simplifier et
  améliorer le quotidien des habitants des régions transfrontalières. La France et
  l’Allemagne sont convenues d’accélérer leur coopération sur la sûreté et la sécurité
  de l’intelligence artificielle (IA) grâce à la collaboration à venir de leurs organismes
  respectifs chargés de la sécurité de l’IA (l’Institut national pour l’évaluation
  et la sécurité de l’intelligence artificielle [INESIA] et son équivalent allemand).
  Les deux organismes partageront leurs bonnes pratiques et renforceront leurs capacités
  grâce à l’échange de connaissances et de savoir-faire. La France et l’Allemagne
  approfondiront leur coopération institutionnelle et contribueront aux efforts européens
  dans ce domaine. La France et l’Allemagne sont déterminés à offrir un espace numérique
  sûr pour les mineurs. Les deux pays prendront des mesures contre toute pratique
  ou tout modèle économique qui menace la sécurité et le bien-être des enfants. Il
  est impératif que les fournisseurs de services numériques développent et appliquent
  des technologies et des systèmes qui garantissent des expériences sûres, sécurisées
  et adaptées à l’âge de l’utilisateur. Les deux pays saluent les nombreuses initiatives
  nationales menées dans les États membres de l’UE pour définir des règles relatives
  à la « majorité numérique », notamment la mise en place au niveau national d’un
  âge minimum pour accéder aux réseaux sociaux, conformément aux lignes directrices
  du règlement sur les services numériques (DSA) relatives à la protection des mineurs
  en ligne. La France et l’Allemagne œuvreront ensemble au niveau européen pour instaurer
  une majorité numérique harmonisée. Des systèmes de vérification de l’âge fiables,
  interopérables et qui assurent la minimisation des données et la confidentialité
  sont essentiels pour mettre en place une protection efficace des jeunes, notamment
  des mineurs sur les plateformes en ligne. À cet égard, les deux pays saluent l’initiative
  lancée par la Commission européenne pour mettre au point un schéma directeur d’application
  de vérification de l’âge. La France et l’Allemagne sont fermement déterminées à
  renforcer la pleine application du droit de l’Union visant à protéger les mineurs,
  notamment le règlement sur les services numériques (DSA). Les deux pays instaureront
  un échange régulier d’experts de haut niveau entre l’Autorité de régulation de la
  communication audiovisuelle et numérique (Arcom) et l’Agence fédérale pour la protection
  des enfants et des adolescents face aux médias (BzKJ) afin de contribuer à la protection,
  à l’autonomisation et à la participation réelle des enfants et des jeunes dans la
  vie numérique. La France et l’Allemagne réaffirment leur détermination commune à
  prévenir et à combattre les violences en ligne envers les femmes et les filles.
  Le développement rapide des technologies émergentes, notamment de l’IA, risque d’exacerber
  encore ce phénomène en favorisant l’apparition de nouvelles formes d’abus. Les deux
  pays accéléreront leur coopération tant au niveau bilatéral qu’au niveau européen
  et ils défendront ensemble l’élaboration d’un plan d’action européen global pour
  prévenir et combattre les violences en ligne envers les femmes et les filles. Dans
  un contexte de défis économiques domestiques et mondiaux, le Sommet social franco-allemand
  a lancé avec succès un processus de dialogue continu auquel sont associés les partenaires
  sociaux afin de soutenir les réformes et l’adaptation du marché du travail et des
  systèmes de protection sociale. Une nouvelle édition de ce sommet aura lieu à Paris
  le 10 novembre 2026 avec pour thème « Le travail comme moyen de lutter contre la
  pauvreté et de promouvoir l’inclusion sociale ». Les priorités qui y seront fixées
  seront prises en compte dans l’élaboration du programme pour la période 2026-2027
  du groupe d’experts franco-allemand sur l’avenir du travail, qui se réunit chaque
  trimestre pour discuter des enjeux communs sur le marché du travail et en matière
  de politiques sociales, tels qu’une plus grande participation au marché du travail
  ou l’utilisation de l’IA dans le cadre professionnel. Le dialogue entre les acteurs
  français et allemands doit se poursuivre, notamment dans le contexte des réformes
  relatives aux retraites, à la fiscalité et aux soins de santé qui ont été annoncées
  cet été en Allemagne. L’Office franco-allemand pour la Jeunesse (OFAJ) a mis en
  relation plus de 10 millions de jeunes depuis 60 ans. La France et l’Allemagne soutiennent
  le développement des échanges et des partenariats entre les jeunes des deux pays,
  dans le cadre des mécanismes de mobilité qui ont fait leurs preuves en matière de
  renforcement de la compréhension commune et des compétences linguistiques, mais
  aussi en élargissant ces mécanismes à de nouveaux territoires et à de nouveaux publics.
  Le traité d’Aix-la-Chapelle a par ailleurs créé le Fonds citoyen franco-allemand
  afin de soutenir les projets conjoints mis en place par des membres de la société
  civile. La France et l’Allemagne sont favorables au projet d’intégration de ce Fonds
  dans l’Office franco-allemand pour la jeunesse. Réunir l’engagement citoyen et la
  coopération pour la jeunesse au sein d’un même cadre institutionnel permettra de
  créer de nouvelles synergies et renforcera la réalisation par ces deux structures
  de leurs objectifs communs. La liberté des médias et l’accès à une information fiable
  sont des piliers indispensables de la démocratie. En conséquence, la France et l’Allemagne
  réaffirment leur soutien et poursuivront la coopération agréée à Toulon sur le «
  bouclier pour l’information » de France Médias Monde et de Deutsche Welle ainsi
  que sur l’européanisation d’ARTE, dans le cadre de leurs recherches de financements
  européens durables. Ces projets contribueront à promouvoir les valeurs européennes
  et la lutte contre les activités de manipulation de l’information et d’ingérence
  étrangères, et renforceront les démocraties européennes. Au vu de ce qui précède,
  des conditions de concurrence équitables pour les plateformes et les médias traditionnels
  sont nécessaires et les deux pays plaideront ensemble en leur faveur afin de veiller
  à ce que ce point soit bien intégré au niveau européen au sein de la directive sur
  les services de médias audiovisuels (SMA). En 2026 et 2027, de nombreuses élections
  se tiendront en Europe. Dans ce contexte, la France et l’Allemagne soulignent qu’il
  est important de déployer des efforts communs pour lutter contre les activités de
  manipulation de l’information et d’ingérence menées depuis l’étranger qui sont de
  plus en plus hostiles au modèle européen et à ses valeurs démocratiques. Elles appellent
  la Commission européenne à mettre à jour, dès que possible en 2026, ses lignes directrices
  à l’intention des fournisseurs de très grandes plateformes en ligne et de très grands
  moteurs de recherche en ligne sur l’atténuation des risques systémiques pour les
  processus électoraux, présentées en vertu de l’article 35, paragraphe 3, du règlement
  (UE) 2022/2065 (règlement sur les services numériques - DSA), afin de veiller au
  respect par les plateformes en ligne de leurs obligations et de contribuer à la
  résilience et à l’intégrité des processus électoraux des États membres de l’UE.
  La France et l’Allemagne encouragent également la Commission à utiliser pleinement
  et activement les outils dont elle dispose déjà au titre de la surveillance directe
  qu’elle exerce sur les très grandes plateformes en ligne et les très grands moteurs
  de recherche en ligne, et elles l’appellent à veiller à une coopération étroite
  et permanente en ce qui concerne les capacités des États membres et les outils européens.
  La France et l’Allemagne renforceront leur coopération au niveau européen pour garantir
  le bon fonctionnement de l’espace Schengen, notamment grâce à la révision des mandats
  des agences de l’UE Frontex et Europol. Elles saluent par ailleurs le plan d’action
  de l’Union européenne pour la route migratoire Manche-mer du Nord, qui constitue
  une réponse de l’UE pour faire face aux difficultés rencontrées par les États membres
  et doit être mis en œuvre rapidement. Dans ce contexte, les deux pays uniront leurs
  efforts pour mieux prévenir les flux d’immigration irrégulière qui aboutissent à
  des traversées de la Manche et ils poursuivront leur coopération dans la lutte contre
  les réseaux criminels qui les organisent. La France et l’Allemagne veilleront à
  coordonner étroitement leurs efforts en matière de contrôle des frontières intérieures
  et renforceront leurs outils conjoints afin d’améliorer leur coopération transfrontalière
  dans la lutte contre l’immigration irrégulière, notamment en tirant parti de l''expérience
  acquise pour parvenir à un accord au titre de l’article 23a du Code Frontières Schengen.
  Elles entendent conclure dès que possible les négociations relatives à un nouvel
  accord intergouvernemental sur la coopération policière et douanière. Enfin, elles
  renforceront leur coopération bilatérale en matière de gestion des crises, notamment
  grâce à des exercices conjoints et à l’échange de bonnes pratiques visant à accroître
  la résilience. Comme en témoigne l’adoption, à Toulon, d’un plan d’action sur la
  coopération transfrontalière, la France et l’Allemagne sont déterminées à mettre
  en œuvre les priorités visant à améliorer les mesures de coopération concrètes et
  efficaces et à lever les obstacles auxquels sont confrontées leurs populations frontalières
  dans le domaine de l’apprentissage, de la mobilité ou encore des soins de santé.
  Elles saluent les travaux du comité transfrontalier et les progrès accomplis dans
  le domaine des soins de santé (signature du protocole additionnel à la Convention
  relative à l’aide médicale urgente transfrontalière dite « Convention MOSAR », discussions
  en cours sur la gestion d’un corridor transfrontalier pour les soins de santé),
  dans le secteur de l’énergie (réalisation du potentiel géothermique dans les régions
  frontalières), et en matière de mobilité (procédures de réservation simplifiées
  pour les voyages transfrontaliers, réalisation de projets ferroviaires régionaux
  transfrontaliers). Elles se réjouissent de la forte demande en matière de formation
  professionnelle transfrontalière dans le cadre de l’Accord de Lauterbourg et elles
  s’efforcent de permettre la conclusion d’autant de contrats de formation que possible
  pour les apprentis transfrontaliers bénéficiant, pour l’année universitaire 2026,
  de ce mécanisme unique en son genre. La France et l’Allemagne s’emploieront également
  à démontrer la manière dont l’intégration transfrontalière des données sur la base
  de leurs jumeaux numériques nationaux les aidera, en cas de catastrophe, à mieux
  analyser les effets sur l’environnement et à disposer d’une vue d’ensemble commune.'
