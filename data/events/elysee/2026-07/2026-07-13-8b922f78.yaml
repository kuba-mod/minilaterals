title: Défilé militaire du 14 juillet 2026.
text: Le chef de l’État a présidé le défilé militaire du 14 juillet 2026, qui se tiendra
  sur l’avenue des Champs-Élysées, de la place de l’Étoile à la place de la Concorde.
  Cette année, le défilé militaire a mis à l’honneur le « réveil stratégique de l’Europe
  ». Pour l’occasion, une trentaine de chefs d’É tat et de gouvernement de la Coalition
  des Volontaires étaient présents pour assister à ce défilé historique. Parmi les
  troupes à l’honneur qui ont ouvert ce défilé, 35 nations étaient représentées par
  près de 500 alliés. À travers une démonstration inédite, illustrant la complémentarité
  des capacités terrestres et aériennes, ce défilé a donné à voir des forces opérationnelles
  et de soutien pleinement engagées pour défendre les intérêts de la France et de
  ses alliés. Cette édition a souligné également la synergie entre les armées et les
  forces de sécurité intérieure , indispensable pour construire un continuum de sécurité
  solide face à l’évolution des menaces. Le défilé a réunit 6 686 militaires à pied,
  315 véhicules dont 98 motos, 98 avions, 31 hélicoptères et 193 chevaux de la Garde
  républicaine. Le Président de la République a clôturé le défilé et a reçu des blessés
  des armées, de la gendarmerie nationale, de la police nationale, des services des
  douanes et de la sécurité civile au palais de l’Élysée à l’issue.
