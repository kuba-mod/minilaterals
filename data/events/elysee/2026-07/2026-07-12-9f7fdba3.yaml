title: Disparition de Son Altesse l’Emir–Père, Cheikh Hamad bin Khalifa Al–Thani.
text: Son Altesse l’Emir–Père, Cheikh Hamad bin Khalifa Al–Thani, s’est éteint aujourd’hui.
  Le Président de la République présente à Son Altesse Cheikh Tamim bin Hamad Al–Thani,
  Emir de l’Etat du Qatar, à sa famille, aux autorités qatariennes ainsi qu’à l’ensemble
  du peuple qatarien ses condoléances les plus attristées et l’assurance de son amitié
  et de celle du peuple français. Pendant son règne, de 1995 à 2013, Cheikh Hamad,
  homme d’une vision au service des aspirations de son peuple, a été l’artisan inlassable
  de la modernisation historique du Qatar dans tous les domaines. Déterminé à faire
  rayonner son pays, il a su bâtir une diplomatie novatrice et efficace, faisant de
  l’Etat du Qatar un acteur reconnu et respecté des relations internationales. Tout
  au long de son règne, Cheikh Hamad s’est attaché à construire une relation forte
  et confiante avec la France, au service d’une vision partagée des grands enjeux
  régionaux et internationaux. Dans les moments difficiles qu’il traverse aujourd’hui,
  la France renouvelle au Qatar son soutien et sa solidarité. Fidèle à l’héritage
  de Cheikh Hamad, le Président de la République réaffirme à Cheikh Tamim sa détermination
  à œuvrer avec lui à l’approfondissement continu du partenariat stratégique qui unit
  la France et le Qatar, dans l’intérêt des deux pays comme de la stabilité régionale
  et internationale.
