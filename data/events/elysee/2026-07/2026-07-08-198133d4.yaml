title: 'Statement from France, Sweden and Finland regarding France''s participation
  in NATO''s Forward Land Forces Finland

  (FLF Finland).'
text: NATO's Forward Land Forces in Finland's Battlegroup was established in June
  2026. FLF Finland is NATO's ninth Forward Land Forces multinational battlegroup
  and enhances the Alliance's deterrence and defence in the High North. France will
  contribute with ground forces deployments to rotations of FLF Finland, including
  a battle unit which will be integrated into the FLF formation and deployed to the
  Area of Operations (AOO). France will also train critical enablers together with
  the FLF Finland battlegroup on a temporary basis, depending on the needs of the
  FLF. France's participation in FLF Finland is a clear manifestation of our joint
  commitment to a stronger Europe in a stronger NATO.
