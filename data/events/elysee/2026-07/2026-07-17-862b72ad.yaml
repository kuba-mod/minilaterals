title: Conclusions du Conseil franco-allemand de défense et de sécurité du 17 juillet
  2026.
text: 'Alors que le continent européen est confronté à la guerre et à des menaces
  hybrides, que les crises se multiplient dans son voisinage et que les grands rapports
  de force forgent un contexte géopolitique complexe, la France et l’Allemagne sont
  déterminées à renforcer la sécurité de l’Europe et de la région euro-atlantique
  ainsi qu’à contribuer à un ordre international fondé sur des règles de droit. En
  réaffirmant les ambitions du Traité d’Aix-la-Chapelle, la France et l’Allemagne
  conviennent de renforcer leur coopération bilatérale en matière de défense et de
  sécurité dans les six domaines suivants : En se fondant sur la déclaration conjointe
  du Président Macron et du Chancelier Merz du 2 mars 2026 et dans la continuité de
  la création du groupe de pilotage nucléaire franco-allemand présidé conjointement
  par le Président français et le Chancelier allemand, avec la participation des Ministres
  des Affaires étrangères et des Ministres de la Défense, la France et l’Allemagne
  renforceront encore leur coopération stratégique et leur culture stratégique commune.
  Les consultations confidentielles entre les deux pays seront axées sur la coordination
  des capacités conventionnelles, des capacités de frappe de précision dans la profondeur
  et des capacités de défense balistiques avec la dissuasion nucléaire, afin d’accroître
  la capacité de la France et de l’Allemagne à gérer l’escalade sous le seuil nucléaire
  et à développer les capacités conventionnelles nécessaires. Cette coopération bilatérale
  sans précédent contribuera à renforcer la dissuasion en Europe et à accroître la
  sécurité de l’Europe dans son ensemble dans le plein respect des obligations juridiques
  internationales des deux pays. Cette coopération vient compléter, sans s’y substituer,
  la dissuasion nucléaire de l’Organisation du Traité de l’Atlantique Nord (OTAN)
  et les arrangements de l’OTAN pour le partage du nucléaire, auxquels l’Allemagne
  a contribué. Aujourd’hui, le déploiement d’un Rafale des forces aériennes stratégiques
  françaises auprès de la 31e escadre aérienne tactique allemande « Boelcke » à Nörvenich
  marque la première étape opérationnelle de la coopération stratégique franco-allemande.
  D’autres actions seront menées au cours de l’année, notamment la participation conventionnelle
  de l’Allemagne à un exercice nucléaire français. Face à la menace à long terme que
  représente la Russie pour la sécurité euro-atlantique, et en saluant les conclusions
  du sommet de l’OTAN à Ankara, la France et l’Allemagne sont déterminées à renforcer
  le pilier européen de l’Alliance et à prendre davantage de responsabilités en ce
  qui concerne la défense de l’Alliance, en coopération avec d’autres Alliés. Les
  deux pays soutiennent le développement d’une base industrielle et technologique
  de défense européenne solide, en œuvrant à la normalisation, à la simplification
  et à la mise à l’échelle des équipements de leurs forces armées. La France et l’Allemagne
  tireront partie de l’expérience du Fonds européen de la défense et du Programme
  pour l’industrie européenne de la défense (EDIP) dans la perspective du prochain
  cadre financier pluriannuel de l’UE. Les deux pays œuvreront ensemble à réaliser
  des avancées dans les domaines capacitaires prioritaires qui ont déjà été définis
  par le Conseil européen, pour exploiter les technologies émergentes, débloquer des
  capitaux et des investissements privés et réduire leurs dépendances stratégiques.
  La France et l’Allemagne intensifient leur coopération militaire, notamment dans
  le cadre d’exercices conjoints. Les deux pays sont convenus que la Brigade franco-allemande
  prenne part à des exercices et des activités de l’OTAN avec le Corps multinational
  Nord-Est à Szczecin. Ils saluent les progrès réalisés en ce qui concerne l’escadron
  de transport aérien franco-allemand basé à Évreux, qui atteindra sa pleine capacité
  opérationnelle conjointe d’ici fin 2026. La France et l’Allemagne sont déterminées
  à contribuer de manière significative au renforcement de l’état de préparation de
  la défense européenne ainsi qu’à participer au renforcement du pilier européen de
  l’OTAN.  Les deux pays sont par conséquent convenus d’intensifier leur coopération
  en matière d’industrie et de capacités dans plusieurs domaines stratégiques clés :
  1. La France et l’Allemagne définiront une norme européenne de combat collaboratif
  pour garantir l’interopérabilité de tous les systèmes aériens européens, notamment
  des avions de chasse, des aéronefs de combat collaboratif et des effecteurs déportés,
  et pour promouvoir le développement collaboratif d’un futur système de systèmes.
  À cette fin, les deux pays développeront un cadre sécurisé basé sur une architecture
  ouverte et modulaire, des interfaces partagées et l’étude de solutions technologiques
  communes permettant la création d’un système d’échange d’informations souverain,
  interopérable et pouvant être étendu. 2. En ce qui concerne KNDS, la France et l’Allemagne
  réaffirment leur fort attachement aux accords conclus en juin. En tant que futurs
  co-actionnaires à droits égaux, les deux pays portent un intérêt particulier à une
  introduction en bourse rapide, en fonction des conditions de marché et dès qu’ils
  auront conjointement décidé de faire progresser la situation. Ce faisant, la France
  et l’Allemagne créent une base forte et solide pour le succès et le développement
  à long terme de KNDS en tant qu’entreprise de défense de premier plan en Europe
  et dans le monde, au service des forces armées françaises et allemandes. En tant
  que futurs co-actionnaires, elles continueront de promouvoir conjointement une harmonisation
  adaptée des opérations et une innovation constante, pour veiller à ce que KNDS reste
  en mesure de développer des programmes axés sur les utilisateurs, de proposer des
  solutions efficaces pour répondre aux besoins des deux armées et d’exporter ces
  solutions vers des pays partenaires. 3. En ce qui concerne le système de combat
  terrestre principal, la France et l’Allemagne étudieront une approche pour le combat
  collaboratif dans le cadre d’un programme de recherche et la développeront jusqu’au
  stade de la démonstration de faisabilité. Cette approche devra pouvoir être adaptée
  aux véhicules sur chenilles avec ou sans équipage, afin de couvrir les différents
  systèmes de mission de combat collaboratif possibles, et intégrer la conduite autonome
  ainsi que des technologies de capteurs pour contribuer aux services de combat collaboratif.
  Les deux pays envisageront une approche utilisant un système de systèmes, qui fera
  partie intégrante des futures opérations multi-domaines. 4. Avec leurs partenaires
  britanniques, la France et l’Allemagne étudieront les possibilités de coopération
  dans tous les axes de travail relatifs à la frappe dans la profondeur, en mettant
  l’accent sur la propulsion balistique d’effecteurs à très longue portée (2 500 km).
  Les deux pays reconnaissent et examineront les capacités existantes de l’entreprise
  franco-allemande ArianeGroup. 5. S’agissant de la défense aérienne et antimissile
  intégrée, la France et l’Allemagne envisageront les possibilités de coopération
  en ce qui concerne les capacités européennes souveraines de défense contre les missiles
  balistiques, qui font partie, aux côtés des systèmes de positionnement dynamique
  et d’alerte précoce, des capacités nécessaires pour gérer l’escalade sous le seuil
  nucléaire. 6. S’agissant du domaine spatial, la France et l’Allemagne exploreront
  activement les possibilités d’interopérabilité, notamment entre le programme IRIS2
  promu par la France et la prochaine constellation nationale de l’Allemagne, pour
  permettre de fédérer les systèmes spatiaux tout en protégeant la souveraineté et
  les services nationaux. Les deux pays poursuivront et intensifieront leur coopération
  concernant les systèmes de reconnaissance spatiale de nouvelle génération. Les deux
  pays intensifieront leurs efforts tout autant l’un que l’autre pour se servir d’Ariane
  6 et d’autres lanceurs européens dans le déploiement de satellites militaires. Ils
  conviennent également d’examiner les possibilités de coopération concernant les
  capacités de défense active. 7. La France et l’Allemagne poursuivront la mise en
  œuvre de l’initiative JEWEL (« Joint Early Warning for a European Lookout »), dans
  tous ses piliers (espace, surface, commandement et contrôle), tout en élargissant
  cette initiative à de nouveaux partenaires grâce à une approche délibérée. 8. Afin
  de promouvoir la souveraineté des données, la France et l’Allemagne étudieront le
  développement d’une ossature numérique européenne souveraine, tenant compte des
  solutions relevant de la sécurité centrée sur les données, de l’intelligence artificielle
  et du cloud de leurs deux pays, comme le système français Arcadia et les solutions
  allemandes équivalentes. Afin d’améliorer la gouvernance de la coopération franco-allemande
  en matière d’armement, un dialogue régulier entre le Délégué général français pour
  l’armement et le Secrétaire d’état allemand chargé de l’armement et de l’innovation
  sera instauré et organisé alternativement en France et en Allemagne. Ces réunions
  porteront sur toutes les questions pertinentes en lien avec la coopération bilatérale
  en matière d’armement et l’innovation dans le domaine de la défense dans le cadre
  du Comité franco-allemand pour l’armement et l’innovation. Condamnant la guerre
  d’agression illégale que la Russie mène contre l’Ukraine, la France et l’Allemagne
  réaffirment leur soutien continu et inébranlable à l’indépendance et à la souveraineté
  de l’Ukraine ainsi qu’à son intégrité territoriale au sein de ses frontières reconnues
  à l’échelle internationale. Elles demeurent déterminées à parvenir à une paix juste
  et durable en Ukraine, conformément aux principes du droit international, notamment
  la Charte des Nations Unies, qui préservera les intérêts de l’Ukraine de même que
  leurs intérêts en matière de sécurité. La France et l’Allemagne saluent l’adoption
  et la mise en œuvre rapide du prêt de l’UE de soutien à l’Ukraine de 90 milliards
  d’euros ainsi que l’engagement de l’OTAN d’aider durablement l’Ukraine à assurer
  sa sécurité, confirmé lors du sommet d’Ankara. La France et l’Allemagne sont prêtes
  à contribuer à des garanties de sécurité solides et crédibles pour l’Ukraine, notamment
  au sein de la Coalition des volontaires et en vue de renforcer les capacités de
  dissuasion et de défense du pays. Elles continueront de soutenir l’Ukraine aussi
  longtemps qu’il le faudra, en lui fournissant un soutien militaire prenant la forme
  de financements et de dons en matière d’équipements prioritaires, d’acquisitions
  dans le secteur industriel, d’une coopération en matière de recherche et développement,
  de productions conjointes ainsi que de financements en appui à la production ukrainienne,
  en accordant une attention particulière aux capacités de frappes dans la profondeur
  et à la défense aérienne, notamment à la défense contre les missiles balistiques.
  La France et l’Allemagne saluent la signature du mémorandum d’entente entre les
  États-Unis et l’Iran, facilitée par le Pakistan et le Qatar. Les droits et les libertés
  de navigation dans le détroit d’Ormuz doivent être restaurés conformément au droit
  international, sans taxes ou redevances. La France et l’Allemagne appellent l’Iran
  à s’abstenir de compromettre les prochaines négociations au moyen d’escalades ou
  d’activités militaires. Soutenant la mission militaire multinationale pour le détroit
  d’Ormuz menée par la France et le Royaume-Uni, la France et l’Allemagne sont prêtes
  à participer dès que les conditions le permettront grâce à des ressources déployées
  par anticipation. Cette mission pourrait contribuer de façon significative à rassurer
  l’industrie du transport maritime et à rouvrir le détroit, notamment grâce à des
  vérifications de déminage. La France et l’Allemagne soutiennent pleinement les négociations
  visant à régler la question du programme nucléaire de l’Iran. Les deux pays réaffirment
  que l’accord final devra garantir d’une façon pouvant être vérifiée que l’Iran ne
  mettra jamais au point d’arme nucléaire ni n’en fera l’acquisition. Ils appellent
  instamment l’Iran à se conformer à nouveau à ses obligations juridiquement contraignantes
  en matière de garanties, notamment en laissant les inspecteurs de l’Agence internationale
  de l’énergie atomique accéder à toutes ses installations nucléaires. La France et
  l’Allemagne demeurent déterminées à renforcer l’État libanais, en soutenant le monopole
  des forces armées libanaises sur l’usage de la force, le désarmement du Hezbollah
  et la mise en œuvre de réformes économiques et financières urgentes. Les deux pays
  appellent les parties au conflit à respecter la souveraineté et l’intégrité territoriale
  du Liban. Ils soutiennent les travaux en cours sur les possibilités après le départ
  de la Force intérimaire des Nations Unies au Liban, notamment un dialogue continu
  dans le cadre l’Organisation des Nations Unies et de l’Union européenne. La France
  et l’Allemagne saluent l’accord signé à Washington le 26 juin par le Liban et Israël
  et sont prêtes à soutenir sa mise en œuvre et à coordonner de près les prochaines
  étapes devant être définies en appui à la pleine souveraineté du Liban.'
