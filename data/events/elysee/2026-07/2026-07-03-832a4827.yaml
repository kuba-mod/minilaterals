title: Joint Declaration by the President of the French Republic and the Prime Minister
  of the United Kingdom.
text: The Strait of Hormuz is a vital artery for the global economy. Restoring safe
  transit for ships of all nations through the Strait is a matter of global concern.
  The Sultanate of Oman has agreed to work with the United Kingdom and France  to
  ensure that its sovereign territorial waters are safe for navigation. The UK and
  France also stand ready to deploy the wider Multinational Military Mission to support
  freedom of navigation in the Strait of Hormuz. The United Kingdom and France reaffirm
  their shared commitment to regional stability, respect for the sovereignty of all
  States, and their willingness to maintain close cooperation with their partners
  in order to uphold global security, freedom of navigation and international law.
