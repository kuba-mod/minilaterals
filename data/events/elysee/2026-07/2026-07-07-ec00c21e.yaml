date: '2026-07-07'
type: press_release
source_name: elysee
title: Déplacement en République arabe syrienne.
text: Le Président de la République s'est rendu en Syrie les 6 et 7 juillet 2026.
  Un an après la visite en France d’ Ahmed al-Charaa , Président de transition de
  la République arabe syrienne, ce déplacement, le premier d’un chef d’État de l’Union
  européenne en Syrie depuis la chute du régime des Assad , s’inscrit dans la continuité
  du soutien constant de la France au peuple syrien. A son arrivée, le Président Emmanuel
  Macron a retrouvé le Président Ahmed al-Charaa pour un dîner de travail . Le lendemain,
  le Président de la République a échangé avec des acteurs de la société civile syrienne
  avant d'être accueilli au Palais présidentiel de Damas pour un entretien bilatéral
  avec le Président Ahmed al-Charaa. Puis, les deux dirigeants ont participé à un
  forum économique consacré à la reconstruction de la Syrie et aux corridors stratégiques
  . 7 juillet 2026 - Seul le prononcé fait foi Merci beaucoup, Merci Monsieur le Président,
  Mesdames, Messieurs les ministres, heureux d'être à vos côtés en cette journée et
  de pouvoir être là aux côtés d'une délégation d'entreprises françaises considérable
  et aux côtés de vos entreprises et aussi de vous-mêmes. Je voudrais m'inscrire dans
  la continuité des propos que le président vient de tenir. Après 14 années de guerre,
  au fond, le défi de la Syrie est multiple et les opportunités, les intérêts des
  entreprises françaises sont convergents avec ce défi. C'est d'abord stabiliser le
  pays et à travers la reconstruction sous toutes ses formes, donner des perspectives
  d'opportunités de création d'emplois pour les Syriennes et les Syriens qui sont
  présents ici, ceux qui ont été déplacés dans le pays ou ceux qui sont réfugiés à
  l'étranger pour leur permettre de revenir dans des bonnes conditions. C'est pour
  nos entreprises des opportunités à saisir pour participer à ce développement. Au-delà
  de la première phase, celle de la stabilisation, de la reconstruction, c'est également
  faire de la Syrie dans la durée un hub régional, vous l'avez dit, c'est-à-dire un
  lieu où des stratégies plus larges peuvent se développer et en particulier où des
  chaînes logistiques nouvelles peuvent se construire, des routes énergétiques ou
  de données peuvent se bâtir qui d'ailleurs réduisent les risques inhérents au fonctionnement
  de la région aujourd'hui et ce qui se passe encore, même si c'est à moindre intensité
  dans le détroit d'Ormuz, le montre ô combien. Et des axes qui avaient pu être pensés,
  certains y reviendront il y a plusieurs décennies, sont à réenvisager. Donc c'est
  aussi une série d'opportunités pour nos entreprises, nos investisseurs, de participer
  à cette aventure dans la durée et de pouvoir avancer. Pour réussir cela, la première
  chose, c'est de multiplier les échanges, les accompagnements. L'Union européenne,
  la France s'engagent, vous le savez, à vos côtés. Nous avons été les premiers à
  ouvrir ce cycle de levée de sanctions. Nous avons cherché à convaincre tous nos
  partenaires, y compris américains. Les prochaines semaines seront marquées par des
  étapes importantes qui vont permettre de poursuivre tout ce travail que je viens
  d'évoquer. Ensuite, c'est les discussions qu'il y a entre nos entrepreneurs. La
  réunion d'aujourd'hui est importante. Je souhaite qu'elle soit suivie par d'autres,
  qu'il puisse y avoir plusieurs autres visites et échanges, et en particulier que
  nos conseils d'affaires, CAFSY et CEFS, puissent, à travers la signature de l'accord
  entre ces deux instances aujourd'hui, renforcer la coordination et les partenariats
  entre les communautés d'affaires, qu'il y ait un dialogue aussi régional, et qu'à
  travers cette communauté d'affaires et cette perspective reconstruction et hub régionale,
  on arrive à bâtir un dialogue nouveau entre, d'une part, la Syrie, les États clés
  du Golfe qui sont nos partenaires, la France et les Européens. Pour réussir pleinement
  cela, au-delà des discussions d'affaires que nous avons là et qui couvrent beaucoup
  de domaines, puisque nos entreprises veulent rouvrir et être accompagnées par des
  outils financiers, comme le FASEP, qui est bien connu côté français, ou d'autres
  instruments, on veut couvrir tous les domaines, l'énergie, l'eau, les transports,
  la logistique. Évidemment, quand je parle d'énergie, je parle d'hydrocarbures offshore,
  onshore comme d'énergies nouvelles, mais aussi les titres sécurisés, l'aviation
  civile, on l'a couvert avec M. le Président. Il y a des domaines très variés. Mais
  pour cela, on a besoin collectivement de réussir à créer un choc de confiance. Je
  veux ici le dire, notre intention, ce n'est pas de multiplier des annonces en milliards
  pour qu'on mette des mois, voire des années à les réaliser. Ce choc de confiance
  suppose un travail intime que nous devons commencer, que nous allons commencer.
  D'abord, pour vous aider à rebâtir un système fiable de financement, de compensation
  et de structuration de la chaîne monétaire, économique, financière, qui permette
  un bon cadre pour les investissements internationaux et le bon fonctionnement d'une
  économie saine et transparente. La France est prête aussi à être un partenaire par
  les expertises et la coopération que nous voulons renforcer, par aussi ce que nous
  voulons faire avec vous et le GAFI pour permettre justement toutes ces clarifications,
  la coopération avec la banque centrale syrienne. Ensuite, c'est tout ce qu'on a
  commencé et qu'on veut continuer d'accompagner avec la restructuration du secteur
  bancaire, qui assurera un bon financement de votre économie, nous sommes en capacité
  de vous appuyer là aussi à cet égard. Et puis c'est tout le travail à bâtir que
  vous avez commencé avec le Fonds monétaire international, mais aussi demain avec
  le Club de Paris pour permettre là aussi la structuration d'un bon financement,
  la restructuration de la dette passée et ce qui permettra à l'économie d'avancer.
  Je pense que la fiabilité de ce cadre, sa clarté est la condition pour qu'on ait
  d'abord une bonne stabilisation et reconstruction et ensuite un partenariat en effet
  durable comme nos entreprises le souhaitent, et la construction de ce hub régional,
  de ces nouveaux corridors énergétiques et de connectivité. Donc vous pouvez compter
  aussi sur nous, sur ce chemin. Je veux remercier en tout cas nos entreprises présentes,
  MEDEF international en octobre dernier et tout ce qui a été fait pour préparer cette
  réunion et dire à tous et toutes qu'avec le Président, au fond, nous voulons continuer
  ce chemin. Ce chemin, il est simple. L'histoire entre la Syrie et la France est
  une histoire de confiance qui est plus grande que nous. Nous avons été aux côtés
  du peuple syrien quand il a voulu son unité, sa liberté. Nous n'avons jamais dévié
  de cette voie, contrairement à beaucoup, y compris ces dernières années quand certains
  cédaient à d'autres sirènes. Jusqu'au bout, nous avons été là et nous avons été
  dans les premiers à rouvrir quand il a fallu rouvrir, avec cette nouvelle ère qui
  commençait. Donc, nous sommes des partenaires fiables, constants, prévisibles et
  qui avons, je crois, toujours été aux côtés des intérêts du peuple syrien, de son
  unité et, aujourd'hui, de sa volonté de retrouver la prospérité. C'est là où la
  France, où ces entreprises, ces investisseurs ici présents, continueront de se trouver.
  Je vous remercie. 7 juillet 2026 - Seul le prononcé fait foi Merci beaucoup, Merci
