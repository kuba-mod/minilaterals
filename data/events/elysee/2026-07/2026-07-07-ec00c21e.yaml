  France, où ces entreprises, ces investisseurs ici présents, continueront de se trouver.
  Je vous remercie. Enfin, après une cérémonie de signature d'accords et un déjeuner
  de travail, les deux dirigeants se sont exprimés lors d'une conférence de presse
  conjointe. 7 juillet 2026 - Seul le prononcé fait foi Merci Monsieur le Président.
  Merci pour vos mots, Mesdames, Messieurs les ministres, Mesdames, Messieurs en vos
  grades et qualités. Je veux d'abord remercier le Président pour son accueil hier
  soir, pour nos premiers échanges, pour cette promenade à travers la ville des Omeyyades
  à une vue nocturne de Damas, et évidemment des échanges que nous avons eus ce matin
  avec également la rencontre économique. Je veux dire ici l'émotion qui est la nôtre
  d'être en effet de retour aujourd'hui en Syrie, à Damas avec vous. Il y a l'histoire,
  bien sûr, celle de votre pays, au carrefour de tant de civilisations, d'idées, de
  mouvements, qui nous ont chacun façonné et permis d'être ce que nous sommes au Levant,
  en Méditerranée, en Europe aussi, tant nous sommes indéfectiblement liés les uns
  aux autres. Il y a notre histoire, plus particulièrement, et celle des 15 dernières
  années, au cours desquelles les Syriens ont montré à tous qu'un peuple uni était
  invincible, qu'il menait une révolution de la dignité et qu'il vaincrait, quoi qu'il
  en coûte. Il a fallu du courage à ceux qui, les premiers, à Deraa, Damas, Homs,
  Alep, et partout dans le pays, sont sortis les premiers pour demander la chute du
  régime. Il a fallu du courage et de l'audace à ceux qui ont fait vivre le grand
  rêve d'une Syrie libre alors que le dictateur précipitait leur pays dans l'abysse.
  Il a fallu de l'abnégation à ceux qui ont tout perdu, leurs enfants, leurs familles,
  leurs biens, sur les routes de l'exil. Je pense, entre autres, aux jeunes Hamza
  al-Khatib, aux jeunes Alan al-Kurdi, à la courageuse Razan Zeitouneh, à la remarquable
  Bassma Kodmani, à l'honnête César et à tant d'autres qui incarnent chacun à leur
  façon le malheur et la grandeur du peuple syrien. Avec force, la France dit en ce
  jour, hommage à eux, hommage au peuple syrien tout entier. Monsieur le Président,
  je sais la solitude des Syriens dans la guerre, sous les coups du dictateur, de
  ces milices, de ces alliés, des terroristes et des fanatiques venus combattre ici
  à leurs dépens. Il a fallu trop de temps pour en sortir. Les Français le savent
  bien. Les attaques terribles qui ont endeuillé notre pays en 2015, puis en 2016,
  ont été préparées en Syrie par des groupes terroristes qui ont recruté trop de volontaires
  dans les jeunesses françaises, européennes ou maghrébines. Beaucoup ont commis ici
  et en France de graves crimes, mais le pire aurait été de se résoudre au chaos.
  La France a donc accompagné les Syriens de son mieux, avec constance, contre l'ancien
  régime, contre les terroristes, avec ceux qui les combattaient, avec tous ceux qui
  pouvaient concourir à l'avènement d'une nouvelle Syrie, du début jusqu'à la fin.
  Aussi, Monsieur le Président, lorsqu'une nouvelle ère s'est ouverte, la France a
  décidé, en conscience, de l'accompagner. C'est dans cet esprit que je vous avais
  reçu à Paris le 7 mai 2025 pour votre première visite en dehors de cette région.
  Je vous ai alors dit l'engagement de la France pour une Syrie libre et souveraine.
  Je vous ai dit combien nous étions à vos côtés sur ce chemin de confiance, où il
  y avait, vous le saviez, beaucoup à faire. J'avais pris l'engagement de venir, et
  je suis là. En effet, nous sommes à vos côtés pour vous dire notre confiance dans
  le peuple syrien, dans votre travail pour apporter la paix, la sécurité, la prospérité.
  J'y vois aussi le signe que la liberté nous est une cause commune. Rien n'est simple
  et la route est longue, nous le savons, mais vous avez pris vos responsabilités
  et déjà beaucoup accompli. La transition politique se poursuit avec la nomination
  du Parlement. La lutte contre le terrorisme est rude et vous la menez avec détermination.
  La réintégration des groupes qui ont combattu Daesh, tout particulièrement les forces
  démocratiques syriennes, se poursuit dans le respect des engagements pris à leur
  égard. Et la clarté de votre propos vous permet de gagner la confiance des partenaires
  internationaux. Bien davantage reste encore à faire, nous l'avons longuement évoqué,
  vous le savez mieux que quiconque. La Syrie a besoin de tous ses enfants et chacun
  doit y trouver sa place. Sans doute est-ce là un grand défi, car il vous faut rassembler
  les Syriens, convaincre ceux qui ont fui que leur avenir est désormais ici. Pour
  faire tout cela, il est nécessaire qu'à la dictature succède un véritable état de
  droit. Cela seul permettra la construction d'une nouvelle Syrie et la prospérité
  de cette dernière. La France a des attentes, vous le savez, des espoirs, des intérêts
  aussi. En retour, la Syrie a raison de lui demander de s'engager concrètement. C'est
  ce que nous faisons au travers du partenariat global que nos ministres viennent
  de signer. C'est aussi le sens des nombreux accords que nous avons conclus. Tout
  cela témoigne de nos intérêts communs. D'abord, dans la lutte contre le terrorisme
  que j'évoquais à l'instant, le contrôle de l'Etat sur l'ensemble du territoire syrien
  est nécessaire à la sécurité des Syriens comme de tous. La France maintient son
  engagement au sein de la coalition internationale contre Daesh, est aussi disponible
  pour mener des actions de lutte contre le terrorisme à vos côtés et au service de
  la souveraineté syrienne. Elle coopère activement avec les autorités de Damas et
  est prête à faire davantage encore en matière de sécurité, à la fois sur le plan
  capacitaire, sur le plan de la formation, sur le plan des coopérations. Dans la
  lutte contre l'impunité, ensuite, car il est vital pour l'avenir de la Syrie que
  la parole des victimes soit recueillie, que justice leur soit rendue, que leurs
  bourreaux soient jugés, quels qu'ils soient. C'est une condition nécessaire, nous
  le savons, à la paix civile. Vous avez pris l'engagement que les violences ayant
  suivi la chute de l'ancien régime seraient incluses, et c'est important. La France,
  là aussi, vous accompagnera. La Syrie se verra ainsi restituer les plus de 50 millions
  d'euros issus de la saisie de biens mal acquis par la famille de l'ancien dictateur.
  Nous sommes les premiers à avoir conduit cette action en justice et à être allés
  jusqu'au bout, et nous poursuivrons partout où elle sera possible. Ces fonds seront
  rendus au peuple syrien pour financer des projets de développement concret sur le
  territoire. Sur le plan économique, nous mesurons combien l'urgence est là de rendre
  aux Syriens l'espoir d'une vie meilleure. La France apportera son assistance à la
  restauration des institutions financières, au financement de la reconstruction et
  à la conduite de vos projets. Nous l'avons longuement évoqué hier et ce matin. L'accès
  aux crédits, le rétablissement des services bancaires restent la première condition
  pour que les entrepreneurs syriens puissent agir. La France croit dans l'avenir
  de votre pays, dans sa reconstruction immédiate, mais aussi en tant que pays cœur
  de cette région, au cœur de corridors énergétiques, logistiques, d'interconnexion
  aussi de données, au cœur du lien nouveau à bâtir entre le Golfe et l'Europe. Nous
  avons un intérêt commun à construire les infrastructures énergétiques, je le disais,
  les réseaux d'électricité, les moyens commerciaux qui nous permettent de croire
  à un avenir possible et ensemble de bâtir cette prospérité. Plusieurs chefs d'entreprise
  sont là, qui nous accompagnent. Ils viennent pour investir, pour reconstruire. CMA
  CGM qui a signé le premier contrat d'investissement international en 2025 et poursuit
  son développement et ses investissements dans votre pays. TotalEnergies là aussi
  poursuit ses investissements dans tous les domaines, à la fois sur le transit de
  l'énergie, sur les productions d'énergie fossiles ici même et sur la production
  d'énergie renouvelable, et qui souhaite ô combien participer à la reconstruction
  des interconnexions que j'évoquais et du corridor énergétique, en particulier Kirkouk-Banias,
  que nous avons là aussi longuement évoqué. Toutes les entreprises qui étaient là,
  vous l'avez vu, sont volontaires pour faire davantage et le faire dans un cadre
  qui soit celui de l'état de droit, de la lutte contre la corruption, de la clarté
  que vous défendez et un cadre auquel nous voulons contribuer. C'est avec la même
  détermination que nous voulons avancer sur la sécurisation des titres, sur la construction
  d'hôpitaux, sur l'offre éducative et dans l'enseignement supérieur. En effet, s'agissant
  de l'éducation et de la culture, elles sont au cœur des affinités que Français et
  Levantins cultivent de longue date. Car en Syrie, l'archéologie en est un socle.
  Je suis donc heureux d'annoncer, comme vous l'avez dit, le retour en Syrie de 23
  pièces archéologiques qui avaient été prêtées à l'Institut du monde arabe en 2010.
  Nous nous attacherons à relancer notre coopération éducative, scientifique et culturelle,
  notamment en ouvrant l'Institut français du Proche-Orient dans ses locaux de Damas,
  en facilitant le retour en activité des établissements français, nos universités,
  Sciences Po et beaucoup d'autres, en développant des offres nouvelles en matière
  de numérique, en consolidant vos efforts en matière d'éducation, et en souhaitant
  aussi poursuivre en matière culturelle le travail, comme nous l'avons fait ces dernières
  années, en particulier en soutenant aussi l'action d'Aliph dans votre pays. Mais
  évoquant les établissements français, je veux ici dire, et nous l'avons évoqué ensemble,
  l'importance des écoles chrétiennes francophones que l'ancien régime avait obligé
  à fermer leurs portes. Nous œuvrons et nous sommes prêts à avancer aux côtés de
  l'œuvre d'Orient pour que toutes celles qui peuvent l'être soient rouvertes dans
  les meilleurs délais. Le fonds dédié à cette mission sera évidemment disponible
  pour permettre d'éduquer, d'instruire des jeunes filles et des jeunes garçons partout
  dans le pays. Sur la paix et la sécurité au Moyen-Orient, nous avons eu, M. le Président,
  un excellent échange hier et aujourd'hui, et je vous en remercie. Je veux saluer
  ici la modération, le sens des responsabilités que vous montrez dans un contexte
  difficile. Je soutiens votre objectif de faire d'abord respecter la souveraineté
  de votre pays et son intégrité territoriale. Cela vaut pour tous, et d'abord pour
  vos voisins, dont les incursions, les ingérences, les frappes ne sont pas acceptables.
  Je soutiens aussi votre volonté d'établir des relations nouvelles avec le Liban,
  d'égal à égal. Le rétablissement de l'autorité de l'Etat libanais sur l'ensemble
