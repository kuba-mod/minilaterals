  que nous avons là aussi longuement évoqué. Toutes les entreprises qui étaient là,
  vous l'avez vu, sont volontaires pour faire davantage et le faire dans un cadre
  qui soit celui de l'état de droit, de la lutte contre la corruption, de la clarté
  que vous défendez et un cadre auquel nous voulons contribuer. C'est avec la même
  détermination que nous voulons avancer sur la sécurisation des titres, sur la construction
  d'hôpitaux, sur l'offre éducative et dans l'enseignement supérieur. En effet, s'agissant
  de l'éducation et de la culture, elles sont au cœur des affinités que Français et
  Levantins cultivent de longue date. Car en Syrie, l'archéologie en est un socle.
  Je suis donc heureux d'annoncer, comme vous l'avez dit, le retour en Syrie de 23
  pièces archéologiques qui avaient été prêtées à l'Institut du monde arabe en 2010.
  Nous nous attacherons à relancer notre coopération éducative, scientifique et culturelle,
  notamment en ouvrant l'Institut français du Proche-Orient dans ses locaux de Damas,
  en facilitant le retour en activité des établissements français, nos universités,
  Sciences Po et beaucoup d'autres, en développant des offres nouvelles en matière
  de numérique, en consolidant vos efforts en matière d'éducation, et en souhaitant
  aussi poursuivre en matière culturelle le travail, comme nous l'avons fait ces dernières
  années, en particulier en soutenant aussi l'action d'Aliph dans votre pays. Mais
  évoquant les établissements français, je veux ici dire, et nous l'avons évoqué ensemble,
  l'importance des écoles chrétiennes francophones que l'ancien régime avait obligé
  à fermer leurs portes. Nous œuvrons et nous sommes prêts à avancer aux côtés de
  l'œuvre d'Orient pour que toutes celles qui peuvent l'être soient rouvertes dans
  les meilleurs délais. Le fonds dédié à cette mission sera évidemment disponible
  pour permettre d'éduquer, d'instruire des jeunes filles et des jeunes garçons partout
  dans le pays. Sur la paix et la sécurité au Moyen-Orient, nous avons eu, M. le Président,
  un excellent échange hier et aujourd'hui, et je vous en remercie. Je veux saluer
  ici la modération, le sens des responsabilités que vous montrez dans un contexte
  difficile. Je soutiens votre objectif de faire d'abord respecter la souveraineté
  de votre pays et son intégrité territoriale. Cela vaut pour tous, et d'abord pour
  vos voisins, dont les incursions, les ingérences, les frappes ne sont pas acceptables.
  Je soutiens aussi votre volonté d'établir des relations nouvelles avec le Liban,
  d'égal à égal. Le rétablissement de l'autorité de l'Etat libanais sur l'ensemble
  de son territoire est une exigence que nous partageons. Le Hezbollah doit rendre
  les armes. Israël doit quitter le Liban. La Syrie et le Liban ont vocation à se
  rapprocher, à œuvrer ensemble pour lutter contre toute forme de terrorisme, et ensemble
  à se rapprocher de l'Europe, dont vous êtes les partenaires naturels dans la région.
  Voilà, Monsieur le Président, ce dont je voulais témoigner ici, et je voudrais terminer
  par là où vous avez fini vous-même, dire qu'en effet, nous avons pris la décision,
  au-delà des choix que nous avions déjà faits ces derniers mois, eh bien, de nommer
  de part et d'autre nos ambassadeurs, de consolider tout cela, d'être des acteurs
  de cette ère nouvelle et d'agir ensemble en défendant chacun de nos intérêts, mais
  avec détermination et volonté, en effet, de construire un partenariat nouveau entre
  nos deux pays, fort aussi de leur histoire, et un partenariat nouveau entre la région
  et l'Europe, défendant cette paix et cette sécurité pour tous à laquelle nous croyons,
  et cette histoire de souveraineté que vous portez aujourd'hui pour la Syrie et à
  laquelle nous croyons pour toute la région. La France, en tout cas, vous le savez,
  est à vos côtés. Merci, Président. Monsieur le Président, quelles sont les priorités
  de la France à l'égard de la Syrie, en particulier concernant la mobilisation et
  le soutien international, et pour soutenir le processus de développement en Syrie ?
  Merci. Merci beaucoup. J'ai essayé de les dire dans mon propos. C'est d'abord aider
  à la reconstruction, je dirais aux reconstructions au pluriel, que la justice puisse
  se faire et s'organiser, que l'Etat de droit se mette en place et se structure avec
  ses cadres, le travail sur la Constitution, mais tout ce qui, derrière, construit
  la capacité à ce que, au fond, l'Etat de droit permette de donner des règles à tous,
  parce que c'est la garantie que justice soit faite après 14 années de guerre et
  des décennies d'un régime autoritaire, et c'est la garantie de l'unité du peuple
  syrien et de sa liberté. Reconstruction aussi économique, qui, elle aussi, ne sera
  possible que si les services de base sont restaurés, qu'il y a un véritable système
  bancaire fiable, assuré, que s’il y a un choc de confiance sur lequel vous travaillez,
  et nous voulons être vos partenaires en la matière, et donc des banques solides,
  un système bancaire consolidé, un système de paiement et de compensation qui fonctionne,
  et un cadre de lutte contre la corruption et toute forme de financement occulte
  qui garantira des investissements de qualité et un juste retour de ces investissements
  à l'économie syrienne. Donc ça, c'est le premier axe, c'est les reconstructions.
  Pourquoi ? Parce que nous croyons dans votre peuple, que nous avons toujours soutenu
  et dans son histoire, parce que nous pensons que votre peuple le mérite, parce que
  nous pensons aussi que c'est une condition de stabilité, c'est même la condition
  de stabilité, pour éviter que d'autres viennent piller, que d'autres viennent déstabiliser
  ou qu'à nouveau la guerre s'empare du pays. Nous pensons que ce faisant, c'est notre
  intérêt, parce que quand le terrorisme regagne ici, nous sommes menacés, et parce
  que nos entreprises ont aussi leurs propres intérêts à défendre. Premier axe, les
  reconstructions. A cet égard, au-delà, c'est aussi défendre nos intérêts et être
  partie prenante de ces corridors énergétiques, de ce hub que vous voulez bâtir,
  parce que nous considérons que nos entreprises et nos investisseurs peuvent y avoir
  un intérêt en participant à cette histoire positive. La deuxième chose, c'est la
  sécurité. Je le disais, nous avons été touchés par le terrorisme qui a été fomenté
  dans votre pays, que nous sommes touchés et bousculés lorsque le terrorisme revient
  et que nous voyons aujourd'hui ce qui se passe depuis des mois dans la région. A
  cet égard, le chemin syrien, par sa singularité, est un chemin d'espoir et aussi
  une voie de souveraineté qui sait résister aux interférences étrangères. On en a
  besoin. Donc nous, nous avons un intérêt de sécurité. Nous ne voulons pas que des
  combattants étrangers présents ici, nous ne voulons pas que des groupes terroristes
  encore présents ici ou dans la région puissent nous menacer. Donc le partenariat
  sécuritaire est très important pour nous. Être sûr qu'il y a un Etat avec un appareil
  sécuritaire fort, mais aussi une bonne coopération avec nous pour nous protéger
  et protéger les Françaises et les Français. Enfin, on a un intérêt commun dans la
  politique régionale, je l'évoquais, parce qu'on croit à la même grammaire d'action.
  Il y aurait beaucoup d'autres choses à citer, mais peut-être que je vais m'arrêter
  là. J'ai fini tout à l'heure avec la culture et l'éducation, mais pour moi, c'est
  aussi une des grandes priorités. Je pense qu'on a beaucoup à faire ensemble en matière
  de culture, d'éducation, que c'est un axe-clé pour que votre pays bâtisse pleinement
  son avenir et que la France a toujours été là sur ce sujet au soutien des écoles,
  des universités, de votre culture, et nous souhaitons y reprendre toute la place.
  Je pense que c'est extrêmement important aussi. Bonjour, messieurs les présidents.
  Monsieur le président al-Charaa, il y a eu deux explosions ce matin à Damas. Est-ce
  que vous avez des informations sur la responsabilité et la circonstance de ces attentats ?
  Et est-ce que, quelque part, ces attentats qui ont eu lieu à proximité de l'hôtel
  où logeait le président lors d'une visite aussi importante ne remettent pas en cause
  ou mettent en péril cet espoir d'une nouvelle ère propice aux investissements que
  vous évoquiez tous les deux ce matin devant les investisseurs ? Et, monsieur le
  président, si vous pouvez dire un mot là-dessus, ce serait très bien aussi. Merci.
  [Réponse de M. Ahmed al-Charaa, président de transition de la République arabe syrienne]
  Bonsoir. Par courtoisie, comme j'ai été interpellé par votre confrère français,
  je vais juste dire que je souscris à ce qu'a dit le président Charaa. D'abord, j'ai
  une pensée pour les blessés de ce matin, qu'il s'agisse de civils ou de forces de
  sécurité. Et j'espère que la santé et la situation de chacun s'améliorera dans les
  meilleurs délais. Ensuite, les choses sont bien organisées. Nous avons fait ce voyage
  en connaissance de cause, en étant organisés côté français, en étant organisés côté
  syrien. Nous ne sommes pas dupes sur à la fois les éléments de risque, mais ils
  sont maîtrisés, et aussi sur la volonté de certains groupes d'empêcher le retour
  plein et entier de la Syrie dans le concert des nations. Et je pense qu'il faut
  à la fois être aux côtés de ceux qui ont été blessés, continuer d'être intraitables
  en matière de sécurité, vous l'êtes ici et nous le sommes quand nous nous déplaçons,
  mais ne pas nous laisser déstabiliser sur l'importance du chemin qui est le nôtre.
  Donc on avance. Question au président Macron. Monsieur le Président, vous avez affirmé
  la nécessité de respecter la souveraineté des Etats et le droit international. Quelle
  est la position officielle de la France quant aux incursions israéliennes dans le
  Sud, et quelle forme prendra le soutien dont vous avez parlé à l'instant, le soutien
  que la France peut accorder au gouvernement syrien pour soutenir ses revendications,
  comme les a exprimés le président Charaa aujourd'hui, à savoir le retrait des Israéliens
  jusqu'à la ligne d'avant le 8 décembre ? Merci. Nous condamnons ces incursions comme
  nous condamnons toute violation de la souveraineté. Nous l'avons fait dès le début
  avec beaucoup de clarté. Nous considérons que, y compris pour sa propre sécurité,
  l'unité israélienne n'a jamais intérêt à violer la souveraineté de ses voisins.
  Elle a intérêt à discuter et à construire un chemin de sécurité partenariale où
  chacun assure la sécurité chez soi. C'est d'ailleurs ce que nous avons aussi défendu
  pour le Liban et mis en œuvre en 2024-2025, et je pense que partout où on viole
  la sécurité de son voisin, on fait croire aux gens qu'on les protège à court terme,
  mais on construit les recettes de l'insécurité de long terme. Donc nous condamnons
  toute forme d'incursion sur le territoire d'un tiers, et je pense que toutes les
  incursions sur votre territoire souverain dans son intégralité sont de mauvaises
  choses. Ensuite, sur la sécurité et le partenariat avec la Syrie, je l'ai dit, c'est
  le partenariat avec un Etat souverain, et donc nous sommes disponibles, et nous
  avons commencé les discussions. Il y a eu des premières missions préparatoires.
  Elles seront suivies par d'autres missions techniques. Nous voulons œuvrer ensemble
  pour vous aider à la formation. On le fait d'ailleurs en matière de protection civile,
  avec aussi le partenariat avec le Qatar sur les casques blancs. Ça fonctionne très
  bien. On l'a fait aussi par le passé. Et donc formation. Ensuite, un partenariat
  capacitaire pour permettre l'équipement et la diversification des équipements de
  vos armées, et nous sommes prêts à des partenariats dans la lutte contre le terrorisme.
  Je l'ai dit, la France reste engagée dans la région dans la lutte contre le terrorisme.
  Nous l'avons été jusqu'à très récemment dans votre pays, dans le Nord-Est syrien.
  Nous le sommes en Jordanie, en Irak et avec constance, et donc nous sommes aussi
  prêts, dans un cadre que nous sommes en train de redéfinir, à apporter notre soutien
  à travers nos forces spéciales dans la lutte contre le terrorisme et les groupes
  terroristes, pour toutes les raisons que j'évoquais. Donc voilà quelques-uns des
  axes, mais tout ça est ce que nous avons discuté ensemble avec le Président ce matin,
  qui a donné lieu à plusieurs échanges ces dernières semaines et que nous allons
  poursuivre pour le finaliser très prochainement. Monsieur le Président Macron, vous
  parliez des violations à la souveraineté libanaise et syrienne. Que peut concrètement
  faire la France pour aider à restabiliser le Liban et la Syrie ? Monsieur le Président
  Charaa, comment la Syrie entend aider le Liban à restabiliser sa frontière, à lutter
  contre le mouvement Hezbollah ? Et monsieur le Président, je suis désolée, à cause
  de l'actualité, on a une question nationale. La Cour d'appel a visiblement, dans
  son jugement, permis à Marine Le Pen d'être éligible pour l'élection. Quelle est
  votre réaction ? Est-ce que vous pensez que c'est sain pour la démocratie ? Ce qui
  est sain pour la démocratie, c'est que le président de la République ne commente
  pas les décisions de justice. Donc je vais m'en tenir à cette grammaire, qui plus
  est à l'étranger. Ensuite, sur la stabilité dans la région et l'intégrité territoriale.
  Nous, on a la même règle partout. C'est ce que nous avons défendu toutes ces dernières
  années en Irak, avec, je le rappelle, les initiatives que nous avons bâties avec
  ces Conférences de Bagdad pour la souveraineté irakienne. C'est ce que nous défendons
  pour le Liban, c'est ce que nous défendons pour la Syrie, c'est ce que nous défendons
  pour la Palestine. Il n'y a pas de double régime, il n'y a pas de double standard.
  Sinon, quelle est la crédibilité de la France quand elle va plaider la souveraineté
  ukrainienne face à la Russie ? C'est pour ça que, derrière, on peut demander aussi
  à des gens comme le président Charaa ou d'autres d'être, à nos côtés, comprenant
  ce qu'on défend en Ukraine. Ce sont les mêmes principes. Le droit international
  ne varie pas en fonction des latitudes, des longitudes. Et donc, je pense que la
  bonne méthode, si je prends l'exemple du Liban, de ce qu'on a mis en oeuvre, d'ailleurs,
  en 2024 et 2025, et de ce qui fonctionne, c'est d'avoir un mécanisme de coordination
  avec des garants, en l'espèce, la France et les Etats-Unis jouaient ce rôle au Liban,
  et ça a fonctionné, qui fait que, quand il y a un différend, un désaccord ou des
  inquiétudes émises par, en l'espèce, l'armée israélienne, c'est ce mécanisme de
  coordination qui en prend compte et qui permet d'avoir de la transparence et d'éviter
  tout de suite qu'on aille bombarder. Ensuite, c'est le renforcement et la consolidation
  des institutions légitimes, c'est-à-dire la présidence, le gouvernement, les forces
  armées libanaises, les forces de sécurité intérieure, les gens qui ont le monopole
  légitime des armes. Que voulez-vous aller expliquer aux gens qu'il faut retirer
  les armes au Hezbollah si vous affaiblissez ceux qui ont le monopole légitime ?
  Vous les poussez dans la guerre civile. Donc le 2ème bloc, c'est ça, c'est de redonner
  les moyens à ceux qui sont les détenteurs de l'autorité légitime de défendre leur
  pays. Nous l'avons fait et nous sommes prêts à le refaire dès que le cadre sera
  approprié, ce qui n'est pas le cas aujourd'hui, mais donc avec des conditions claires.
  Et puis derrière, un mécanisme de reprise progressive du territoire pour que la
  souveraineté libanaise soit pleinement recouvrée avec un mécanisme de contrôle des
  armes conforme, d'ailleurs, à ce que le Président Aoun a dit dès le début de son
  mandat et qui est à mettre en œuvre, et la reprise des armes par ces autorités légitimes.
  C'est ça, ce à quoi nous croyons. Et donc, au fond, nous pensons qu'il faut désarmer
  le Hezbollah, nous pensons qu'il faut qu'Israël quitte le territoire libanais et
  nous pensons qu'il faut consolider les institutions légitimes et restaurer la souveraineté
  du Liban. Et nous pensons aussi que pour la Syrie, elle doit être pleinement souveraine
  et unie et que tous ceux qui occupent son territoire doivent quitter et qu'ils doivent
  trouver des mécanismes et bâtir des mécanismes pour faire valoir leurs intérêts
  de sécurité qui sont à prendre en compte par le gouvernement actuel. [Réponse de
  M. Ahmed al-Charaa, président de transition de la République arabe syrienne] Je
  voudrais poser une question au président français. Vous avez rappelé l'engagement
  de la France à soutenir une Syrie unifiée et pluraliste. Comment est-ce que vous
  conciliez cela avec les appels de certains à s'ingérer dans les affaires syriennes
  ou à diviser la Syrie ? Je ne les suis pas. C'est assez simple. Et donc, je pense
  que la Syrie mérite cette unité, le respect de son peuple, et je l'ai dit, dans
  toutes ses composantes. Mais pour ça, c'est l'unité à préserver, d'abord l'unité
  par le peuple et pour le peuple lui-même, le travail que fait le gouvernement actuel
  en matière de sécurité, mais aussi d'éducation, d'économie. C'est le travail que
  la justice doit faire et il est extrêmement important. Et donc, nous, c'est d'accompagner
  ce chemin. Et je pense qu'on aurait tort de penser qu'on peut faire réussir une
  des composantes du peuple syrien contre l'autre, surtout quand on parle depuis l'étranger.
  Et donc, je le dis avec aussi beaucoup d'estime, j'espère que vous l'avez compris,
  pour le peuple syrien qui s'est battu pour sa liberté. Et je crois qu'il mérite
  cela. Et au-delà des intérêts que nous défendons, on a le droit aussi d'être idéaliste
  quand on parle de politique au sens noble du terme. Et c'est quand même formidable
  qu'un peuple se soit battu pendant 14 ans pour sa liberté et qu’unit il la recouvre
  et qu'il ait envie de croire à son avenir. Et que nous, on ait envie d'y croire
  aussi et de l'aider. Et vous savez quoi ? C'est possible. Et nous avons connu dans
  d'autres temps, il y a plus de huit décennies, une période comparable. Rien n'est
  comparable, elle était très différente avec ce que vous avez vécu, mais notre histoire
  contemporaine, à nous, Français, nous enseigne ce que c'est que de rebâtir les cadres
  d'un Etat au sein d'une société qui recouvre la liberté, mais qui a chaque jour,
  en quelque sorte, une documentation complète pour expliquer comment les uns pourraient
  être contre les autres. Nous nous sommes reconstruits en mettant notre unité au-dessus
  de tout, en mettant le goût de la paix au-dessus de tous les différends, en mettant
  la volonté d'avancer pour nos enfants comme étant supérieure à toutes les divisions.
  Je ne dis pas que ça vaut partout et pour tout temps, mais je trouve que ce serait
  formidable que ça vienne ici, et je pense que c'est possible. Alors, courage. Le
  Président de la République a réaffirmé l’attachement de la France à l’unité de la
  Syrie et à une transition politique inclusive et pluraliste , garantissant les droits,
  la sécurité et la représentation de l’ensemble des composantes de la société syrienne.
  Ce déplacement a marqué l’engagement concret de la France en faveur de la reconstruction
  d’une Syrie souveraine, stable et en paix avec ses voisins. Il a permis d’ouvrir
  une nouvelle page du partenariat franco-syrien dans les domaines économique et sécuritaire,
  et d’accompagner les efforts engagés en faveur de la stabilité régionale et de la
  diversification des routes d’approvisionnement entre l’Europe et le Moyen-Orient.
