title: Déplacement dans les Hautes-Pyrénées.
text: Le Président de la République s'est rendu dans les Hautes-Pyrénées le jeudi
  9 et vendredi 10 juillet 2026. Le chef de l’État a assisté comme presque chaque
  année à une étape du Tour de France aux côtés de Christian Prudhomme , directeur
  de la compétition. Cette première étape de montagne de l'édition 2026 fut l’occasion
  de saluer l’engagement des coureurs, des organisateurs et des services publics mobilisés
  à l’occasion de cet évènement sportif et patrimonial français. Lors de l'étape du
  jeudi 9 juillet, le Président Emmanuel Macron et Christian Prudhomme se sont insérés
  dans la course avant d'arriver à Gavarnie-Gèdre pour la remise des trophées et des
  maillots. Le lendemain, le Président de la République s'est rendu à Loudenvielle,
  petite commune des Hautes-Pyrénées bénéficiant du zonage France Ruralités Revitalisation.
  Il a participé à une visite du développement touristique de la vallée et du bord
  du lac de Génos ainsi que des installations sportives qui bénéficient aux habitants
  et aux préparations sportives d'équipes nationales.
