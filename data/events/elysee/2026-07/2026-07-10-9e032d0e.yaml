title: France and Poland held their first Nuclear Steering Group meeting in Paris.
text: At the Île Longue speech by the President of the Republic on France’s nuclear
  deterrence, the President of the French Republic announced bilateral strategic dialogues
  with the European partners involved to establish the concept of forward deterrence.
  France and Poland held their first nuclear steering group meeting in Paris on Friday,
  10th July. They were accompanied by senior military personnel and officials from
  Defence and Foreign Ministries to discuss European security issues. They agreed
  a joint roadmap, and raised the ambition of bilateral cooperation to work towards
  a safer and better defended Europe.
