title: Déclaration conjointe du Président de la République et du Président de l'Ukraine.
text: Conformément à la déclaration d’intention signée par les deux chefs d’Etat le
  17 novembre 2025, l’Ukraine et la République française réaffirment leur intention
  de coopérer pour accélérer l’équipement des forces armées ukrainiennes, qui constituent
  la première garantie de sécurité pour l’Ukraine et l’Europe. La France et l’Ukraine
  conviennent d’accorder une priorité haute aux projets capacitaires renforçant l’aviation
  de combat et la défense aérienne et antimissile balistique de l’Ukraine. Conformément
  au cadre agréé du prêt de soutien à l’Ukraine de l’Union européenne (Ukraine Support
  Loan – USL), l’Ukraine confirme que ses priorités au titre de la mise en œuvre du
  volet de défense viendront renforcer l’intégration et la coopération entre les bases
  industrielles et technologiques de défense de l’Ukraine et de l’Union européenne.
  1. Aviation de combat – de premiers pilotes de Rafale ukrainiens dès 2026 ; la production
  sous licence de bombes AASM et de missiles SCALP autorisée en Ukraine. L’Ukraine
  annonce la commande de 16 premiers Rafale et de leur armement, sur les 100 dont
  l’acquisition a été prévue en novembre 2025. Les financements afférents seront sollicités
  au titre des tranches 2026 et 2027 de l’Ukraine Support Loan. 4 premiers Rafale,
  seront transférés aux armées ukrainiennes à l’issue du cycle de formation des pilotes
  et mécaniciens ukrainiens, qui pourra commencer en France dès 2026. Cette formation
  débutée sans délai permettra le déploiement de cette première capacité en Ukraine
  au plus tôt. Des armements air/sol et air/air, parmi lesquels des bombes AASM, des
  roquettes guidées laser anti-drones et des missiles MICA et METEOR, seront livrés
  au gré du déploiement opérationnel des aéronefs. Chaque avion de combat Rafale sera
  livré avec une quantité d’armement convenue lors des consultations bilatérales techniques
  ultérieures. Par ailleurs, la France autorise la production sous licence de bombes
  AASM et de missiles SCALP en Ukraine, dès que possible et avant la fin de l’année
  2026. 2. Défense aérienne et antimissile balistique – l’Ukraine deviendra le premier
  utilisateur au combat des systèmes franco-italiens SAMPT-NG ; la production sous
  licence de missiles Aster 30 en Ukraine est autorisée par la France et l’Italie.
  L’Ukraine annonce également son intention de commander 4 systèmes franco-italiens
  SAMPT- NG. Les financements afférents seront sollicités au titre des tranches 2026
  et 2027 de l’Ukraine Support Loan (USL). 5 radars GM400, 1 radar GF300 et 1 radar
  Kronos seront également inscrits dans les calendriers de produits de l’USL en 2026.
  Compte tenu du contexte opérationnel en Ukraine, la France s'engage à livrer les
  systèmes SAMPT-NG dès que possible, au travers d’un déploiement progressif des différents
  modules une fois livrés et qualifiés, à partir de 2027. Par conséquent, 1 radar
  GF300 sera déployé en Ukraine avant la fin de l'année 2026 en tant que premier composant
  des systèmes SAMPT-NG. Pendant la période de production desdits systèmes, la France
  s'engage à déployer 2 systèmes SAMP-T à l'Ukraine, qui seront retournés après la
  livraison des nouveaux systèmes SAMP-T NG. Les 5 radars GM400 seront livrés avant
  fin 2027. Concomitamment, afin de répondre à l’urgence opérationnelle, la France
  et l’Italie ont décidé d’accélérer les livraisons de missiles Aster 30 d’ici octobre
  2026, en soutien de l’engagement contracté auprès d’Eurosam grâce à l’USL. Par ailleurs,
  la France et l’Italie autoriseront dès que possible et avant la fin d’année 2026,
  la production sous licence de missiles Aster 30 en Ukraine. Enfin, la France soutient
  le développement des missiles intercepteurs antibalistiques ukrainiens, notamment
  le projet FREYA, en accompagnant les coopérations industrielles avec les entreprises
  françaises et en fournissant des moyens d’expertise de la DGA.
