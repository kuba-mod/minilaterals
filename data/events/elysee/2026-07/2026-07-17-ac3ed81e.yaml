  pas l''Iran qui décide pour les eaux omanaises. Merci. Monsieur le Président, je
  voudrais savoir quels sont les buts européens. Vous avez parlé tous les deux du
  cadre financier pluriannuel. Où est la convergence entre la France et l''Allemagne ?
  Je ne vois pas vraiment, parce que la France voulait avoir un financement important
  pour les dépenses agricoles. Et le souhait est plutôt de les limiter. Et, Monsieur
  le Chancelier fédéral, le Président a parlé de la convergence dans les rapports
  avec la Chine, mais la Chine récuse vos accusations de l''infra-valorisation du
  yuan. Il y a également l''accusation des surcapacités qui serait tout à fait fausse
  parce qu''il y a cette demande de la part de l''Europe. Est-ce que vous pouvez nous
  donner une réponse si vous voulez être vraiment prêts à vous défendre face aux produits
  chinois ? Et sur la question sur Jens Spahn, il y a déjà une partie de la CSU qui
  exige son retrait. Quelle est votre réponse ? Est-ce que vous allez défendre Monsieur
  Spahn ou pas ? Vous avez posé deux questions sur la Chine et le budget. Sur le budget,
  la France défend un budget agricole ambitieux, mais elle n''est pas toute seule.
  Ne vous trompez pas. Il n''y a pas d''accord sur le budget si vous n''avez pas les
  gens sur l''agriculture et les fonds de cohésion, en vrai. Malheureusement pour
  moi, ça sera mon troisième exercice budgétaire négocié, donc je peux vous le dire
  en connaissance de cause. Nous, on est prêts à faire ce que dans le langage bruxellois,
  j''ai découvert ça, on appelle des smart cuts , des coupes intelligentes, c''est-à-dire
  des coupes sur lesquelles on est d''accord. Donc, en vrai, on va commencer la discussion
  pour dire où est-ce qu''on peut faire des économies intelligentes qui n''impactent
  pas nos priorités réciproques. Mais on va devoir trouver une convergence sur tout
  ça. De quoi on a besoin ? D''un budget européen qui tient nos politiques historiques
  sur l''agriculture. Parce que l''agriculture, il en va aussi de notre souveraineté
  alimentaire. Il ne faut pas se tromper. Ça ne sert à rien de bâtir la souveraineté
  numérique de défense si c''est pour construire une dépendance agricole. On pense
  que l''agriculture, c''est acquis de tout temps. Faux. On a construit après-guerre,
  par notre Europe, une souveraineté alimentaire. Il faut la défendre. Donc l''agriculture,
  important. Les fonds de cohésion, très importants pour beaucoup de nos collègues
  parce que ça recrée de la convergence européenne. Après, on voit bien qu''il y a
  des budgets qui augmentent beaucoup dans d''autres politiques sur les coûts de fonctionnement
  de notre Europe, etc., où on peut se mettre d''accord. Ensuite, on a la nécessité
  d''avoir de nouvelles politiques et sur le spatial, on s''est mis d''accord sur
  IRIS², sur le numérique, sur les technologies vertes, sur des sujets de défense,
  l''IA, le quantique. On veut une politique européenne ambitieuse. Si on veut défendre
  le marché unique, on ne peut pas renvoyer ça aux budgets nationaux, sinon on détricote
  le marché unique. Donc ce qu''on a appelé là ce fonds de compétitivité, ces dépenses
  d''avenir, appelez-le comme vous voulez, c''est aussi un pilier très important du
  prochain budget. Et derrière ça, nous, ce qu''on fait, c''est qu''on va travailler
  ensemble pour regarder où est-ce qu''on peut faire les coupes intelligentes pour
  que ça revienne à un niveau raisonnable mais ambitieux. Et on a besoin de cette
  ambition. Et préparer ensemble notre réponse aussi à ce que la Commission nous prépare
  sur les ressources propres, très important. Dans les prochaines semaines, la discussion
  sur les ressources propres, elle est clé. Pourquoi ? Parce que les ressources propres
  que l''Union peut avoir, qui sur une taxe numérique, qui sur le mécanisme d''ajustement
  carbone aux frontières ou autre, c''est ce qui vous permet d''avoir plus d''investissements
  européens sans avoir plus de contributions nationales, surtout de la part des pays
  comme nous qui sont des contributeurs nets. Donc voilà l''esprit dans lequel on
  va travailler et en bâtissant un accord et un compromis. Sur la Chine, les chiffres,
  ils sont assez simples et assez clairs. On peut dire ce qu''on veut, la Chine, c''est
  en aide aux entreprises 8 fois la moyenne de l''OCDE. La Chine, ça représente à
  peu près 15 % du commerce mondial et c''est 35 % des produits manufacturés. Si ça
  ne s''appelle pas une surcapacité ! Et c''est l''effondrement du marché domestique.
  Ce qui fait que nous, Européens, on est un facteur d''ajustement du déséquilibre
  entre offre et demande chinois. C''est vraiment très clair. Et on l''est encore
  plus post-tarifs américains. Donc, il est clair qu''on doit régler ça. Et il n''y
  avait pas forcément de convergence au début entre nous. Rappelez-vous, quand la
  Commission a lancé son enquête sur les véhicules électriques venant de Chine, elle
  a fait d''ailleurs une approche très fouillée, différenciée entreprise par entreprise.
  On n''était pas d''accord en franco-allemand à cette époque-là. Là, vraiment, on
  est d''accord parce que les chiffres sont là. Il y a une vraie convergence historique.
  Et donc, on ne doit insulter personne, on n''est pas du tout pour faire un decoupling,
  comme on le dit en bon français ou en bon allemand, avec la Chine. On est pour à
  la fois nous dérisquer, réduire nos dépendances, d''où ce qu''on veut faire ensemble
  sur la technologie, les matières premières critiques, mais on est pour protéger
  nos entreprises. Des mesures de sauvegarde, des mesures, ce qu''on demande à la
  Commission, et au fond, pas mettre 18 mois pour faire une enquête. Il y a un secteur
  qui est menacé par une attaque de l''industrie chinoise et ça se voit tout de suite,
  quelque part, des mesures d''urgence et des procédures d''alerte que la Commission
  pourra prendre pour pouvoir tout de suite réagir et protéger notre base industrielle.
  Et ça, il faut réussir à le faire dans un dialogue avec la Chine pour qu''elle comprenne
  que sinon, elle nous place dans une position impossible. Mais c''est fondamental.
  Et à côté de ça, j''insiste sur 2 autres choses et je conclurai là. On doit défendre
  le contenu européen parce qu''au-delà de la Chine, plus largement, on est le seul
  grand espace qui ne défend pas son contenu domestique. La Chine, elle a une préférence
  chinoise. Elle défend un contenu chinois, elle défend un capital chinois. Les États-Unis
  d''Amérique et même l''Amérique du Nord à travers le NAFTA, ils défendent un contenu,
  surtout quand il y a des subventions fédérales. Nous, en Europe, on est les seuls
  jusqu''à présent à ne pas le faire. On commence à le faire, mais il faut le faire,
  il faut le faire. Et l''Europe, c''est 27, parce que le budget, on est 27 à payer.
  Les Marocains, les Turcs qu''on aime beaucoup, avec lesquels on a un lien industriel
  et qui sont des partenaires de confiance, ils ne sont pas dans le budget européen.
  Nos partenaires commerciaux, l''Inde ou autres, qui sont des gens de confiance avec
  qui on a une relation amicale, on les aime beaucoup, on veut commercer, mais ils
  ne sont pas dans le budget européen. Donc on défend une préférence européenne et
  un contenu européen qui est vraiment à 27, parce que c''est sur des dispositifs
  que les Européens à 27 payent. Et on doit défendre notre emploi à 27. Et mon dernier
  point, c''est qu''on doit compléter tout ça, et je salue vraiment ce que le chancelier
  avait lancé dans la discussion au G7 il y a quelques semaines, d''un dialogue sur
  le change avec la Chine. C''est très important. C''est-à-dire qu''on doit vraiment
  réengager avec la Chine un dialogue stratégique, nous Européens, parce qu''aujourd''hui
  on a un renminbi qui a une relation à l''euro qui n''est pas soutenable et qui ne
  correspond pas aux termes de l''échange. Il ne peut pas y avoir un tel excédent
  commercial de leur part et un renminbi autant dévalué par rapport à l''euro. Ce
  n''est pas soutenable. Et ça, et la fermeture de leurs marchés financiers est un
  problème pour la relation commerciale et financière entre nos 2 espaces. Et donc,
  ça, on doit l''aborder de manière extrêmement respectueuse, mais volontariste. Conclusions
  du Conseil franco-allemand de défense et de sécurité du 17 juillet 2026. Conclusions
  du 26ème Conseil des ministres franco-allemand.'
