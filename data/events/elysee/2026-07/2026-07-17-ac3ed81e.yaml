date: '2026-07-17'
type: press_release
source_name: elysee
title: Déplacement en Allemagne à l’occasion du 26e conseil des ministres franco-allemand.
text: 'Le Président de la République s''est rendu en République fédérale d''Allemagne
  à l''occasion du 26e conseil des ministres franco-allemand, ce jeudi 16 et vendredi
  17 juillet 2026. À son arrivée, le Président Emmanuel Macron a été accueilli par
  Friedrich Merz , Chancelier fédéral de la République d''Allemagne, avant de prendre
  la parole à ses côtés pour une déclaration conjointe. 16 juillet 2026 - Seul le
  prononcé fait foi Merci beaucoup. Merci, Monsieur le Chancelier, cher Friedrich.
  Bonjour Mesdames et Messieurs. Je commencerai par là où Monsieur le Chancelier vient
  de terminer, pour le remercier, évidemment, de son accueil, pour l''entretien que
  nous allons avoir avec nos équipes, puis le tête-à-tête que nous aurons ce soir,
  pour organiser ici ce Conseil franco-allemand de défense et de sécurité, puis notre
  Conseil des ministres franco-allemand, et de le faire quelques jours après sa présence
  si importante pour notre fête nationale. Et c''est vrai qu''avoir cette image de
  la Coalition des volontaires avec le Président ukrainien sur nos Champs-Élysées,
  avoir les troupes de cette Coalition des volontaires qui défilaient aux côtés de
  nos troupes au lendemain d''une réunion de cette Coalition de volontaires était
  très important. Et avoir mon ami le Chancelier Friedrich Merz à mes côtés était
  pour moi quelque chose de très important, de ce que nous sommes en train de faire
  avec cette Europe de la puissance qui conjugue nos forces, qui respecte les spécificités
  de chacun et chacune, mais montre ce réveil stratégique européen. Et je veux vraiment
  te remercier à nouveau d''avoir été là et des avancées que nous avons pu conduire.
  Comme vient de le dire Monsieur le Chancelier, nous allons, lors de ces entretiens,
  évidemment revenir sur les grands sujets internationaux, notre soutien à l''Ukraine
  et la paix et la sécurité en Europe, la situation au Proche et Moyen-Orient, mais
  on va aussi renforcer l''agenda bilatéral et européen. Et avec quelques priorités,
  les sujets de sécurité et de défense, où en matière de dissuasion avancée, d''alertes
  précoces, de tirs dans la profondeur, de capacités communes. Nous voulons redonner
  une nouvelle dynamique, sur le spatial, où nous voulons là aussi, et on a un texte
  qui marque notre ambition et nos volontés communes d''avancer en franco-allemand
  et en européen, en matière d''innovation, avec ce qu''on va faire sur le quantique
  et l''intelligence artificielle, de convergence énergétique, Monsieur le Chancelier
  l''a rappelé. Au-delà de cet agenda bilatéral et européen, c''est aussi ce que nous
  voulons faire en matière d''industrie européenne, pour la protéger, mais aussi pour
  la projeter dans le XXIème siècle. Et qu''il s''agisse d''investissements, d''innovations,
  de protection commerciale, je crois pouvoir dire que les derniers mois ont marqué
  aussi une vraie convergence franco-allemande dans l''agenda européen, et nous aurons
  l''occasion d''y revenir, en particulier en revenant sur nos échanges très fructueux
  qu''on avait eus ensemble au G7, sur la question du change ou sur la relation à
  la Chine. Et puis, ces conseils permettent aussi de revenir sur les questions transfrontalières,
  les échanges humains, la coopération transfrontalière en matière de santé, de transports,
  nos coopérations en matière universitaire et de recherche, ce qui nourrit aussi
  notre relation bilatérale. En tout cas, je suis très heureux de pouvoir être là
  ce soir et demain, aux côtés de Monsieur le Chancelier, demain avec nos ministres,
  et de pouvoir avancer dans ce moment qui est celui d''un réveil stratégique européen,
  mais qui est la consolidation aussi de ce réflexe franco-allemand qui était au cœur
  de nos discussions dès les premiers jours de votre mandat, quand on a lancé ensemble
  cette initiative en mai 2025, et puis, évidemment, dès le sommet de Toulon. Et donc,
  on va ici le poursuivre. Je suis très heureux d''être là avec vous et de pouvoir
  avancer. Merci beaucoup, Friedrich. Merci Messieurs, Dames. 16 juillet 2026 - Seul
  le prononcé fait foi Merci beaucoup. Merci, Monsieur le Chancelier, cher Friedrich.
  Bonjour Mesdames et Messieurs. Je commencerai par là où Monsieur le Chancelier vient
  de terminer, pour le remercier, évidemment, de son accueil, pour l''entretien que
  nous allons avoir avec nos équipes, puis le tête-à-tête que nous aurons ce soir,
  pour organiser ici ce Conseil franco-allemand de défense et de sécurité, puis notre
  Conseil des ministres franco-allemand, et de le faire quelques jours après sa présence
  si importante pour notre fête nationale. Et c''est vrai qu''avoir cette image de
  la Coalition des volontaires avec le Président ukrainien sur nos Champs-Élysées,
  avoir les troupes de cette Coalition des volontaires qui défilaient aux côtés de
  nos troupes au lendemain d''une réunion de cette Coalition de volontaires était
  très important. Et avoir mon ami le Chancelier Friedrich Merz à mes côtés était
  pour moi quelque chose de très important, de ce que nous sommes en train de faire
  avec cette Europe de la puissance qui conjugue nos forces, qui respecte les spécificités
  de chacun et chacune, mais montre ce réveil stratégique européen. Et je veux vraiment
  te remercier à nouveau d''avoir été là et des avancées que nous avons pu conduire.
  Comme vient de le dire Monsieur le Chancelier, nous allons, lors de ces entretiens,
  évidemment revenir sur les grands sujets internationaux, notre soutien à l''Ukraine
  et la paix et la sécurité en Europe, la situation au Proche et Moyen-Orient, mais
  on va aussi renforcer l''agenda bilatéral et européen. Et avec quelques priorités,
  les sujets de sécurité et de défense, où en matière de dissuasion avancée, d''alertes
  précoces, de tirs dans la profondeur, de capacités communes. Nous voulons redonner
  une nouvelle dynamique, sur le spatial, où nous voulons là aussi, et on a un texte
  qui marque notre ambition et nos volontés communes d''avancer en franco-allemand
  et en européen, en matière d''innovation, avec ce qu''on va faire sur le quantique
  et l''intelligence artificielle, de convergence énergétique, Monsieur le Chancelier
  l''a rappelé. Au-delà de cet agenda bilatéral et européen, c''est aussi ce que nous
  voulons faire en matière d''industrie européenne, pour la protéger, mais aussi pour
  la projeter dans le XXIème siècle. Et qu''il s''agisse d''investissements, d''innovations,
  de protection commerciale, je crois pouvoir dire que les derniers mois ont marqué
  aussi une vraie convergence franco-allemande dans l''agenda européen, et nous aurons
  l''occasion d''y revenir, en particulier en revenant sur nos échanges très fructueux
  qu''on avait eus ensemble au G7, sur la question du change ou sur la relation à
  la Chine. Et puis, ces conseils permettent aussi de revenir sur les questions transfrontalières,
  les échanges humains, la coopération transfrontalière en matière de santé, de transports,
  nos coopérations en matière universitaire et de recherche, ce qui nourrit aussi
  notre relation bilatérale. En tout cas, je suis très heureux de pouvoir être là
  ce soir et demain, aux côtés de Monsieur le Chancelier, demain avec nos ministres,
  et de pouvoir avancer dans ce moment qui est celui d''un réveil stratégique européen,
  mais qui est la consolidation aussi de ce réflexe franco-allemand qui était au cœur
  de nos discussions dès les premiers jours de votre mandat, quand on a lancé ensemble
  cette initiative en mai 2025, et puis, évidemment, dès le sommet de Toulon. Et donc,
  on va ici le poursuivre. Je suis très heureux d''être là avec vous et de pouvoir
  avancer. Merci beaucoup, Friedrich. Merci Messieurs, Dames. Puis les deux dirigeants
  ont échangé lors d’un entretien et d’un dîner de travail préparatoires en amont
  du conseil des ministres franco-allemand. Le vendredi 17 juillet, ils ont co-présidé
  le conseil franco-allemand de défense et de sécurité (CFADS) sur la base aérienne
  de Nörvenich puis le 26e conseil des ministres franco-allemand (CMFA) à Brühl, au
  château d''Augustusburg. Dans un contexte géopolitique qui accroît la pertinence
  de l’Europe de la défense, ce conseil franco-allemand de défense et de sécurité fut
  l''occasion pour la France et l''Allemagne de se coordonner sur les principaux sujets
  de politique internationale et d''approfondir leurs coopérations industrielles de
  défense , afin de continuer à bâtir une plus grande intimité stratégique entre nos
  deux pays. Le conseil des ministres franco-allemand a réuni ensuite dix ministres
  de chaque côté autour de domaines structurants de la coopération franco-allemande
  . Il a permis d’aborder les défis posés par l’accroissement des déséquilibres macroéconomiques
  globaux pour l’économie et l’industrie européennes et nos projets et actions communs
  en faveur de l’agenda de compétitivité et de souveraineté européennes pour y répondre.
  Il a également permis de faire avancer nos coopérations renforçant les liens entre
  citoyens français et allemands et la résilience de nos sociétés , notamment s’agissant
  de la protection des mineurs en ligne, de la lutte contre les ingérences étrangères
  et la désinformation, des échanges via l’Office franco-allemand pour la Jeunesse
  (OFAJ), et de l''approfondissement de la coopération transfrontalière. 17 juillet
  2026 - Seul le prononcé fait foi Merci beaucoup, Monsieur le Chancelier, cher Friedrich.
  Merci pour ces mots et merci Mesdames, Messieurs les Ministres et l''ensemble de
  nos équipes, nos ambassadeurs, pour la préparation de ce Conseil franco-allemand
  pour la défense et la sécurité, de ce Conseil des ministres franco-allemand. C''était
  le 26e. Merci Mesdames, Messieurs d''être là pour cette conférence de presse. Le
  Chancelier a tout dit et très bien dit. Et donc je vais essayer d''apporter juste
  quelques touches. D''abord pour vous dire que c''est pour nous un grand honneur
  de vous retrouver dans ce château d''Augustusburg, qui est en effet le symbole de
  la réconciliation entre nos deux pays, à la fois la première visite d''État en Allemagne
  en 1962 du Président de Gaulle, et si on remonte encore plus dans le temps, le traité
  de 1751, dit traité d''union, d''amitié et de bonne correspondance entre Louis XV
  et l''archevêque prince électeur de Cologne. C''est dire que ce lieu est fait pour
  les grands moments franco-allemands. Je crois pouvoir dire que ce 26e Conseil des
  ministres franco-allemand a été marqué par un esprit de franchise, d''amitié, de
  pragmatisme et de volontarisme. Monsieur le Chancelier l''a parfaitement dit, mais
  nous vivons un moment de défi pour nos deux pays et une époque très singulière.
  La guerre sur le sol européen, la question régulièrement posée sur la convergence
  transatlantique et sa solidité, les défis technologiques auxquels nous sommes soumis,
  les défis migratoires que nous avons subis, et évidemment aussi aujourd''hui une
  guerre commerciale ouverte et une grande agressivité commerciale chinoise. Tout
  ça remet en cause beaucoup des fondamentaux de ce qu''était d''abord notre croissance,
  parfois nos modèles économiques et ce qui avait fondé l''Europe ces dernières décennies.
  Au fond, ça impose encore plus de travailler en franco-allemand, c''est ce fameux
  réflexe qu''on a mis au point il y a un an, à la fois pour nos deux pays, parce
  qu''on doit bâtir aussi les nouvelles sources de prospérité, assurer aujourd''hui
  notre sécurité parce que c''est là qu''elle se joue, et parce qu''on le sait très
  bien, si la France et l''Allemagne ne se mettent pas d''accord, l''Europe n''avance
  pas. On connaît par cœur tout ce qui se dit sur le couple franco-allemand, mais
  la vérité, c''est que si le couple franco-allemand n''avance pas, l''Europe n''avance
  pas. Ce n''est pas une raison qui est parfois totalement suffisante, mais c''est
  la condition nécessaire pour les progrès européens. Pour tout cela, je crois pouvoir
  dire que sur, à la fois nos discussions en tête-à-tête et avec nos équipes hier,
  et les conseils d''aujourd''hui ont marqué des avancées et une feuille de route
  très claire. Sur la partie sécurité-défense, Monsieur le Chancelier l''a dit, bon,
  on n''a pas mis en œuvre tout ce qu''on voulait mettre en œuvre il y a un an. Il
  faut être lucide. De toute façon, vous le savez. On le regrette, parce que ce n''est
  pas optimal à tous égards. On en a tiré une conséquence pour ce qui est de l''échec
  du SCAF, qui est de mettre en place une gouvernance de nos projets maintenant refondée,
  beaucoup plus resserré où, évidemment, les équipes politiques et nos ministres vont
  suivre avec leurs principaux collaborateurs en charge les projets pour pas les laisser
  dériver. Mais surtout, je crois qu''on a redonné une impulsion par quelque chose
  et des initiatives qu''on a prises ensemble et qui n''étaient pas forcément attendues
  il y a un an. C''est ce qu''on a conçu patiemment pendant plusieurs mois et annoncé
  ensemble en mars dernier autour de la dissuasion avancée. Ce que la France a proposé,
  ce que l''Allemagne a immédiatement répondu et ce qu''ensemble nous avons bâti,
  qui est aussi de donner à l''Allemagne ce rôle d''avant-garde dans la dissuasion
  avancée, de partenaire singulier et unique. Et je crois que le meilleur symbole,
  c''était ce matin à Norvenich sur la base, les Rafale, les Eurofighter ensemble
  et notre réunion qui s''est tenue dans cet endroit. Donc on a programmé avec un
  document confidentiel aussi beaucoup de choses ensemble sur ce volet. Et sur la
  dissuasion avancée, on va vraiment continuer la gamme des signalements possibles.
  Et c''est très important pour notre sécurité collective parce que ça crée du doute
  stratégique chez nos adversaires, parce que ça renforce notre intimité. Et derrière,
  il en découle aussi de nouvelles coopérations. C''est toute la partie épaulement
  conventionnel qui accompagne cette dissuasion avancée. Et donc on a acté d''avancer
  ensemble et là, on a consolidé la feuille de route de Toulon sur ce qu''on appelle
  l''alerte avancée, donc JEWEL, où à la fois la composante spatiale mais aussi terrestre,
  on a acté dans notre texte commun d''y aller. Donc on aura une offre commune franco-allemande.
  La deuxième chose, c''est les frappes dans la profondeur. On a demandé à nos ministres
  d''avancer pour qu''il y ait une coopération trilatérale qui se passe avec chacun
  son segment du jeu très clair pour qu''on ait des capacités de tir dans la profondeur
  Allemagne, Royaume-Uni, France. Très bonne chose là aussi pour l''épaulement conventionnel
  de cette dissuasion avancée. Et puis, sur la défense antiaérienne, nous plaidons
  pour une souveraineté européenne et on veut avancer sur les fameux SAMP/T nouvelle
  génération, avec là aussi très clairement une volonté de la France de coproduire
  avec l''Allemagne et nos partenaires italiens qui sont dans le SAMP/T nouvelle génération,
  d''avoir une offre très claire. On va aussi avancer dans les prochaines semaines
  sur la stratégie et la gouvernance de KNDS, qui est un des points clés de notre
  coopération. Donc relance très forte sur ce sujet avec une nouvelle feuille de route,
  une nouvelle méthode. Et puis, Monsieur le Chancelier a parfaitement dit tout ce
  qu''on fait sur l''Ukraine. Je crois que ces dernières semaines, par notre travail
  conjoint, on a d''abord bâti une reconvergence européenne et américaine à Évian.
  On a ensuite consolidé celle-ci à Ankara avec l''offre en particulier américaine
  de licensing à l''Ukraine et un réengagement américain concret. Et on a traduit
  l''engagement des Européens et de leurs partenaires sur les garanties de sécurité
  en début de semaine à Paris. Là, il y a une vraie synergie et une très grande complémentarité.
  Sur la partie économique, là aussi, on a eu de très bons échanges. Il y a d''abord
  des choses sur lesquelles on avance très bien, et ce Conseil a consolidé tout le
  très bon travail qui avait été fait par les équipes, les ministres, sur la base
  à la fois de Toulon l''année dernière, le précédent CMFA, et puis du sommet qui
  s''était tenu à Berlin sur la souveraineté numérique européenne et de VivaTech il
  y a quelques semaines. Et donc, sur le numérique et l''innovation, on a vraiment
  là des coopérations très fortes, la création de l''initiative d''intelligence artificielle
  de frontière en particulier, qu''on va porter ensemble, une création d''ARPA, donc
  d''agence d''innovation de rupture en franco-allemand, avec le partenariat qu''on
  avait installé l''année dernière entre BPI et SPRIND, et une volonté d''avancer
  aussi sur les matières premières critiques, qui vient en complémentarité de cette
  initiative, et évidemment aussi, on a arrêté notre agenda commun sur le volet innovation,
  souveraineté technologique et ce qu''on va porter au niveau européen, souveraineté
  numérique européenne, etc. Sur souveraineté numérique, innovation, technologies
  de pointe et matières critiques, des avancées très importantes. Sur l''espace, on
  est au milieu du gué. Ces derniers mois étaient incertains, on le voyait bien parce
  qu''il y a des tentations chez beaucoup de nos industriels parfois de revenir à
  des solutions plus nationales, parfois. Chez certains autres, peut-être de préférer
  le grand large à l''Europe. Nous, on préfère l''au-delà du Rhin à l''au-delà de
  l''océan, parce que c''est plus efficace. Et donc, je crois qu''on a bien avancé
  là aussi. D''abord, on a ensemble marqué notre soutien au projet Iris². C''était
  très important, il y avait eu des doutes. Donc soutien à ce projet, à son financement,
  qui est la clé pour avoir une constellation vraiment européenne, et retrouver de
  la souveraineté par rapport à ce qui est aujourd''hui l''exclusivité d''une offre
  américaine ou chinoise. Volonté ensuite d''avancer sur nos projets de consolidation
  dans le secteur des satellites et puis volonté de passer en revue là aussi, sur
  le civil comme le militaire, tout ce qu''on peut faire pour améliorer les choses.
  Au-delà du soutien à IRIS², je considère qu''un des grands acquis qu''on a consolidés
  ici et qui s''était structuré ces dernières semaines, c''est notre position commune
  sur l''attribution des fréquences en Europe pour les services de satellites vers
  mobile et garantir justement cette souveraineté européenne, là aussi. Très important.
  Donc voilà, on a commencé ce travail, on a reconvergé sur l''espace avec ces 2 acquis,
  on a dessiné les lignes, on a demandé à nos ministres vraiment de travailler pour
  septembre. On a le Sommet spatial international en septembre qu''on va co-présider
  ensemble. Et donc là, on doit vraiment aller encore plus loin et porter ensemble
  aussi d''autres initiatives européennes. Sur l''agenda de compétitivité européenne,
  dès l''année dernière, on avait ensemble porté vraiment un agenda et scandé un agenda
  de simplification, de débureaucratisation, et celui-ci avance. Et c''est vraiment,
  je crois pouvoir dire, l''impulsion franco-allemande qui l''a porté. Donc on continue
  sur la simplification de la réglementation européenne d''avancer, sur l''approfondissement
  du marché unique dans tous les domaines du jeu, et ça, on le porte ensemble et nos
  équipes de manière très forte. On a acté là qu''il fallait que ce soit dans ce semestre
  qu''on parachève l''union des marchés de capitaux ou l''union de l''épargne et du
  financement. C''est fondamental parce que si on veut une Europe qui sait financer
  ses projets de rupture et au fond avoir la partie financière privée de ce que je
  viens de dire sur l''IA, le quantique et autres, il faut aller au bout de ce projet.
  Il y a un vrai accord franco-allemand, il y a ce groupe des 6 que les ministres
  ont structuré. Maintenant, c''est de la mise en œuvre, mais on pense qu''il faut
  le faire et la présidence irlandaise le veut. Soutien plein et entier de notre part,
  avec aussi le label d''épargne européen et tout ce qu''on fait sur, justement, finance,
  euro numérique, etc. Ça, c''est un point très important pour moi de cet agenda de
  compétitivité qu''on a acté, reconfirmé. Ensuite, il y a eu un très bon échange
  et je trouve qu''on n''a jamais été aussi convergents sur la question de la Chine.
  On n''avait pas la même histoire sur la relation à la Chine et pas toujours les
  mêmes positions. Je crois qu''on constate tous aujourd''hui l''impact qu''elle a.
  On n''est pas du tout anti-chinois, soyons clairs, et dans notre diplomatie comme
  dans notre économie, mais on regarde lucidement. Notre Europe, c''est chaque jour
  1 milliard d''euros de déficit commercial à l''égard de la Chine. Chaque jour, 1
  milliard. C''est chaque jour des milliers, des dizaines de milliers d''emplois détruits.
  Chaque jour. Alors derrière ça, il y a une Chine qui est très bonne en matière d''innovation.
  Et ça, on est d''accord. Et donc là-dessus, on veut engager avec la Chine pour avoir
  des transferts de technologie dans nos pays. Pas importer les produits, transférer
  en étant respectés, en créant des emplois chez nous pour pouvoir en profiter parce
  qu''on est lucides. Deuxième chose, on veut protéger par ailleurs nos entreprises
  et nos secteurs. On l''a vu sur la chimie, on le voit sur la machine-outil, sur
  l''automobile et sur beaucoup d''autres. On est aujourd''hui bousculés. Pourquoi ?
  Parce qu''on a quand même une Chine qui aide en moyenne 8 fois plus ses entreprises
  que la moyenne de l''OCDE et que nous, et qui ne respecte pas les règles du jeu.
  Et donc là-dessus, on a appuyé, on va réappuyer très fortement le mandat donné à
  la Commission européenne d''aller beaucoup plus vite sur ces enquêtes de marché
  et ces instruments de protection de nos industries. Et ça, c''est absolument fondamental.
  Et on a demandé à nos ministres de l''Économie, des Finances, des Affaires étrangères,
  à l''initiative de Monsieur le chancelier, et je suis 100 % d''accord, pour septembre,
  d''avoir une feuille de route franco-allemande sur ce sujet. Et puis derrière ça,
  on veut engager un dialogue aussi avec la Chine sur la question du change et de
  l''ouverture des marchés financiers, parce que c''est aussi fondamental pour corriger
  ce qui sont aujourd''hui des dysfonctionnements de la relation en matière de change
  et de la relation monétaire. Ça, je pense, c''est aussi un des grands acquis de
  notre discussion très approfondie. Sur les autres questions économiques, il y a
  aussi une volonté réaffirmée d''avancer, d''abord pour finir d''ici la fin d''année
  le prochain cadre financier pluriannuel, et de le faire en étant conscient qu''on
  veut de l''ambition européenne, mais on veut de l''efficacité des dépenses. On regardera
  ensemble la copie, on va la préparer ensemble, qui sera donnée par la Commission
  sur les ressources propres, mais on ne peut pas avoir une trajectoire irréaliste
  d''augmentation de nos contributions nationales. Donc ambition, efficacité, exigence.
  Sur l''élargissement et les réformes internes de l''Union européenne, nous partageons
  la même feuille de route. On a pris il y a quelques semaines une initiative franco-allemande
  sur l''élargissement qu''on va mettre en œuvre, on en a longuement parlé hier, dans
  les prochains mois. Et puis on a demandé à nos ministres de travailler ensemble
  sur un accord franco-allemand sur la question de la préférence européenne et du
  contenu européen, sur la réforme dite ETS, sur les flexibilités à nos objectifs
  carbone, et évidemment aussi sur l''ensemble des révisions de directives, et en
  particulier l''accélérateur industriel. Cette famille de sujets qui est aujourd''hui
  en train d''être discutée au niveau européen, nous voulons bâtir un accord franco-allemand
  très structurant pour, au fond, garder nos ambitions et nos ancres, mais défendre
  la compétitivité européenne avec force, et défendre notre industrie. On croit dans
  une industrie décarbonée, mais au bon rythme, avec les bonnes protections et avec
  du pragmatisme quand on regarde la compétition internationale. Enfin, le troisième
  axe de notre coopération, c''est la protection, la résilience de nos sociétés et
  de nos démocraties. Là-dessus, soutien à notre politique et la très bonne coopération
  franco-allemande en matière de lutte contre l''immigration clandestine de sécurité.
  Et je veux vraiment remercier Monsieur le chancelier, son ministre pour la très
  bonne coopération à cet égard, on l''a dit, pour lutter contre les passeurs, pour
  là aussi mettre en œuvre ce que nous avons soutenu au niveau européen pour le pacte
  asile-migration. Volonté d''aller vers des avancées concrètes sur le plan aussi
  transfrontalier, avec les transports ferroviaires, la mobilité des travailleurs,
  la santé, où on a eu des propositions très concrètes, et l''apprentissage. Et puis
