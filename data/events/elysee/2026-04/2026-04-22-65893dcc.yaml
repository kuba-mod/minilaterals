  une chaîne de commandement claire, des gens à qui on rend compte, et des délais
  records qu''on doit tenir. Sur ces 150 grands projets, on parle de quelque chose
  qui est important pour la vie du pays. C''est plus de 70 milliards d''euros d''investissement,
  c''est 30 000 emplois, c''est 63 départements concernés, c''est en quelque sorte
  les cathédrales industrielles de l''indépendance française. Ces 150 grands projets
  stratégiques vont être suivis, et pour ça, on prend, comme on a fait pour les JO,
  comme pour Notre-Dame, les textes. On s''appuie sur les textes que j''évoquais,
  sur le texte de simplification qui a été voté la semaine dernière, et puis le Gouvernement
  prend des mesures très concrètes. Un décret contentieux projet stratégique qui sort
  aujourd''hui. Ce projet va permettre, tous les maires ici présents, les préfets,
  les porteurs de projets le savent, ce que nous disent souvent les investisseurs,
  ce que nous disent les industriels, c''est très bien, même si vous accélérez les
  projets, le contentieux, c''est trop long. On prend des années parfois de recours
  et ça nous freine. Là, c''est l''unification du contentieux, c''est quelque chose
  qu''on a déjà testé, ça marche, un seul niveau, la Cour administrative d''appel.
  Le gain, c''est un an, un an de gain sur les délais de recours. C''est acté, ça
  sort aujourd''hui. Deuxième élément, le foncier économique. C''est très important.
  Les élus le savent aussi, nos préfets ont fait ce travail. On avait lancé, à quelques
  années, rappelez-vous, le fonds Friche qui avait permis d''accélérer dans beaucoup
  de territoires les choses avec nos friches. On l''avait relancé avec France Relance.
  On a un foncier économique qui est disponible. Ce qu''il nous faut réussir à bâtir,
  c''est des dispositifs clés en main pour les extensions, pour des grands groupes
  qui viennent s''installer, pour des ETI, des PME. On a 44 sites classés déjà disponibles,
  22 000 hectares entre maintenant et 2030, et avec France Foncier, on relance une
  grande stratégie pour justement non seulement identifier avec les élus, mais préparer
  ces terrains. Parce que quand on a un foncier industriel, il y a des tas de choses,
  ou d''ailleurs quelle que soit la nature du terrain avant, je dis industriel, à
  vocation industrielle, mais quand on a une friche, quel que soit l''usage précédent,
  si on veut qu''il y ait un projet industriel qui arrive, on doit préparer tout l''administratif,
  on doit regarder les raccordements. Toutes ces choses-là peuvent se faire en temps
  masqué. C’est exactement ça qu''on va préparer. On l''a déjà fait sur beaucoup de
  sites. On va l''accélérer. Le ministre de l''Industrie, Monsieur Martin, va justement
  préparer ces zones d''accélération industrielles pour justement utiliser les textes
  européens en particulier, justement, notre accélérateur industriel qui est à l''échelle
  européenne, et permettre d''avoir, si je puis dire, ce sucre rapide pour avoir ces
  zones d''accélération avec les élus partout où on les a identifiés. Troisième élément,
  c''est la loi de simplification de la vie économique, adoptée justement la semaine
  dernière, qui va permettre de réduire massivement les délais, en particulier pour
  les data centers, pour ne citer qu''un exemple. Si on veut être compétitif, attirer
  les data centers du monde entier. On a commencé l''année dernière, on commence à
  rattraper notre retard. La clé, ce sont les délais. Cette loi, elle nous remet dans
  la compétition. Sans ça, on était encore un peu trop lent. Le quatrième point, c''est
  aussi de simplifier les évaluations environnementales. Non pas pour réduire l''exigence
  environnementale, mais simplement pour acter le fait qu''on a beaucoup de procédures
  et qu''on a des procédures qui sont faites par les services de l''État. On a des
  procédures qui sont faites par des autorités environnementales indépendantes, qui
  sont souvent redondantes et qui sont souvent séquentielles. Le ministre Lefèvre
  va avoir à piloter ce travail, justement, avec une mission qui part dès aujourd''hui,
  et avec des textes très concrets, sous l''autorité, là aussi, du Premier ministre,
  pour finaliser, justement, une accélération de toutes ces procédures. On ne réduit
  pas l''ambition environnementale ou de biodiversité, simplement, on remet du bon
  sens, on parallélise tout ça, et on réduit massivement les délais. Ces 150 cathédrales
  industrielles, ces 150 grands projets industriels, c''est vraiment ce qu''on sort
  aujourd''hui avec des éléments nouveaux, avec des annonces, une mobilisation du
  Gouvernement et une mobilisation, et je vous en remercie, de nos préfets qui sont
  là et tous leurs collègues, de l''ensemble des services de l''État que je veux remercier,
  de nos opérateurs, parce que tout ça, ça mobilise le BRGM, je l''ai dit, RTE et
  toutes celles et ceux qui sont là, et de nos élus. Parce que ça se fait par ce tandem
  fondamental, justement, préfet-maire, on dit souvent, mais qui est la recette de
  ce succès et de ce qui permet d''avancer. Dans les mois qui viennent, on doit redoubler
  d''énergie et accélérer encore massivement sur ce chantier. Je voudrais avoir un
  dernier mot pour dire que le combat jumeau qu''on mène sur l''industrie, on le mène
  sur l''agriculture. Quand on parle de souveraineté industrielle, il ne faut jamais
  perdre de vue qu''on a la souveraineté agricole, la ministre est là à nos côtés,
  qui sait ô combien, et on porte cette ambition. Alors, on porte cette ambition,
  et de ces derniers mois, le Gouvernement a accéléré les choses en la matière, avec
  les conférences de souveraineté alimentaire, qui permet justement, filière par filière,
  d''identifier toutes les simplifications, les accélérations de projets, les changements
  qu''il faut porter, avec aussi une approche très concrète, ce qui a été fait sur
  les projets hydrauliques, 400 projets identifiés sur lesquels l''accélération est
  déjà en cours, ils sont en train de sortir, et là aussi avec une mobilisation de
  nos préfets, et puis des projets d''élevage qui, d''ores et déjà, par les textes
  législatifs ou réglementaires des derniers mois, ont été accélérés et qu''on commence
  à sortir beaucoup plus vite. Cette mobilisation a commencé, et on va la poursuivre
  avec, de la même manière, plusieurs centaines de projets agricoles identifiés partout
  sur le territoire qui vont être accélérés, qui vont s''appuyer sur les premières
  simplifications qu''on a prises. Le Fonds Hydraulique a été largement augmenté,
  triplé, et qui va permettre d''accompagner, justement, les 400 projets identifiés.
  Et puis, la loi d''urgence agricole, qui va permettre, là aussi, de sortir beaucoup
  plus vite des projets. On a 400 projets hydrauliques, je le disais, mais 1/4 d''entre
  eux, tout spécifiquement, va être massivement accéléré par cette loi, les plus importants.
  Pour nos éleveurs, avec cette loi, on va pouvoir passer d''une logique pour un quart
  des projets en flux et à 40 % en stock, on passera d''une logique d''autorisation
  à une simple logique d''enregistrement, donc on va beaucoup plus vite sur le terrain.
  Pour nos éleveurs de volailles, on aura des changements de seuil. C’est des choses
  très concrètes qui, pour les éleveurs, en particulier, sur toutes les installations
  classées, qui peuvent parfois prendre des années, on va simplifier, changer les
  seuils, accélérer, là aussi, avec, justement, des projets territoriaux qui seront
  accompagnés. Là aussi, sur le plan agricole, on a pris des textes, on a identifié
  des projets, on les accompagne, on a déjà gagné en délai, et on va continuer, avec
  la loi d''urgence agricole et la mobilisation des projets identifiés sur le terrain,
  avec nos préfets, avec les services de l''État, d''accélérer la mise en œuvre de
  ces projets. Parce que rien ne justifie que nous soyons une nation qui sait faire
  en 5 ans la reconstruction de Notre-Dame, et je le disais l''autre jour, qui parfois
  met plus de 5 ans à faire un projet industriel ou à faire un poulet. Il n''y a rien
  qui justifie ça, si ce n''est au fond une forme d''aquoibonisme, c''est-à-dire que
  tout le monde s''est habitué et on a laissé les choses s''entasser. On doit accélérer
  pour réussir cette bataille industrielle. Voilà, Mesdames et Messieurs, ce que je
  voulais vous dire aujourd''hui en étant devant vous. On doit consolider ce qu''on
  a fait ces dernières années, parce qu''on est bien meilleurs que d''aucuns ne veulent
  nous le dire ou que nous regardons nous-mêmes. On venait d''une situation difficile,
  mais on est en train de réindustrialiser, on se tient mieux en dynamique que nos
  voisins, on doit consolider cette politique macroéconomique. On doit se battre sur
  l''énergie et les minerais critiques, et on doit investir, protéger et accélérer.
  Le jour d''aujourd''hui, c''est un jour pour l''accélération de nos projets avec
  ces 150 grands projets industriels. On va continuer. Le 30-31 mai prochain, nous
  aurons les journées de Choose France qui, dans tous les sites qui ont fait l''objet
  de ces investissements, on aura des ouvertures au grand public pour qu''aussi sur
  nos territoires, nos compatriotes voient l''importance de l''industrie et de la
  force de ces projets qu''on accompagne. Le 1er juin, on aura Choose France pour
  attirer encore des investisseurs étrangers dans des projets comme celui-ci. Je le
  rappelle, la France, pays le plus attractif d''Europe depuis 6 ans sur le plan industriel.
  Et nous aurons en novembre 2026 l''édition France de Choose France, comme on l''a
  tenu il y a quelques mois, pour faire le suivi de tous ces projets. On aura donc
  une revue de tous les 150 projets annoncés aujourd''hui. Et tous les deux mois,
  sous l''autorité du ministre de l''Économie, des Finances et de l''Industrie, il
  y aura une revue de ces projets, de ces 150 projets, pour voir si ça avance au bon
  rythme. Revue de chantier, il n’y a que comme ça, que ça marche. Voilà, Mesdames
  et Messieurs, merci pour la mobilisation d''aujourd''hui, merci pour votre combat
  de chaque jour, en tant qu''élus, en tant que serviteurs de l''État, en tant qu''entrepreneurs
  industriels, collaborateurs et collaboratrices. Je veux ici vous dire notre confiance,
  et vous l''avez compris, notre détermination. On doit continuer de l''avant. La
  France est une magnifique nation et c''est une grande nation de recherche, de technologie,
  d''industrie, d''agriculture. C''est à nous de nous battre pour que les projets
  sortent et continuent d''avancer et qu''on continue d''embaucher et on y arrivera.
  Vive la République et vive la France !'
