date: '2026-04-22'
type: press_release
source_name: elysee
title: Déplacement dans l'Allier.
text: 'Le Président de la République s''est rendu à Montluçon et Échassières dans
  l''Allier le mercredi 22 avril 2026. Ce déplacement vise à mettre en lumière le
  « projet Notre-Dame » dans le cadre du dispositif d''accélération des projets industriels
  stratégiques et des initiatives agricoles . Ces projets bénéficient d''un accompagnement
  administratif renforcé , porté par les préfets en lien avec l''ensemble des collectivités.
  Cette initiative, annoncée par le Président de la République en novembre 2025 à
  l''occasion de la première édition de « Choose France – Édition France » et formellement
  lancée en janvier 2026, comporte aujourd''hui 150 projets répartis dans 63 départements
  , pour 71 milliards d’euros d''investissement cumulé et plus de 32 000 emplois .
  La moitié sont portés par des PME et ETI, contribuant à la souveraineté industrielle
  et alimentaire de la nation. Après avoir présidé le Conseil des ministres depuis
  Montluçon, le chef de l''État a inauguré l''un des 150 « grands projets stratégiques
  » (GPS) retenus dans le cadre du dispositif d''accélération : la mine de lithium
  d''Imerys à Échassières. À partir de 2030 , ce projet permettra l''équipement de
  700 000 batteries de véhicules électriques par an et générera près de 3 200 emplois
  directs et indirects , en cohérence avec l''impératif de décarbonation . À l''issue
  d''une présentation du projet EMILI par le directeur d''Imerys sur le site de la
  carrière de lithium, le Président Emmanuel Macron s''est adressé aux ouvriers. Merci
  beaucoup pour vos mots et pour votre accueil. Monsieur le Premier ministre, Mesdames,
  Messieurs les ministres, Mesdames, Messieurs les parlementaires, Monsieur le Préfet,
  Mesdames, Messieurs les Préfètes et Préfets, Monsieur le Président du Conseil départemental,
  Monsieur le Maire, Monsieur le Directeur général d’Imerys et je salue l''ensemble
  des chefs de service de l''État et d''opérateurs ici présents avec nous tous et
  toutes. Vous venez de rappeler l''importance de ce projet. Au fond, j''ai souhaité
  vous dire quelques mots ici, pour évidemment parler de ce projet, mais de la cohérence
  de ce qui est fait par le Gouvernement, et de ce que nous souhaitons faire avec
  l''ensemble des élus locaux qui sont ici présents. Ici, à Échassières, c''est, Monsieur
  le maire, vous le savez bien, un projet important. D''abord, c''est une histoire
  industrielle devant laquelle nous sommes, mais c''est aussi un projet important
  pour l''avenir. Monsieur le directeur général vient d''en rappeler les termes :
  34 000 tonnes d''hydroxyde de lithium qui seront produites par an à partir de 2030.
  En effet, on a pour objectif, environ, de produire 1,5 million de véhicules électriques,
  enfin, de batteries électriques, par an. Ça veut dire que la moitié de ce qu''on
  doit produire pour ces batteries, on le sécurise avec ce site. Pour moi, c''est
  la cohérence d''une stratégie que nous avons depuis des années, qui est de réconcilier
  les trois points fondamentaux : compétitivité et création d''emplois, souveraineté
  et décarbonation. Et quiconque manque un de ces points nous met dans une impasse
  industrielle. Quand les gens nous proposent d''aller faire de la décarbonation en
  perdant de la souveraineté, c''est une mauvaise solution. Quand les gens nous proposeraient
  de la compétitivité qui renonce au climat, on sait que ce n''est pas durable. Donc
  il faut tenir les trois. C''est exactement ce qu''on fait, par exemple, sur la mobilité
  électrique depuis des années. Il y a 10 ans, c''est simple, je réunissais les constructeurs
  automobiles. Je leur disais : « On va aller plus vers l''électrique. » Ils me disaient :
  « Malheureux, n''y allez pas, on ne produit pas une batterie électrique en Europe.
  Tout est en Corée et en Chine. » On produit aujourd''hui en France des batteries
  électriques. On a nos 4 gigafactories. C''est le fruit du travail des dernières
  années. On avait une dépendance sur l''amont avec ce site. La concentration et le
  travail de raffinage qui sera fait par la technologie que vous stabilisez, on va
  sécuriser l''amont. C''est exactement le sens de l''histoire industrielle que nous
  devons faire. Ici, vous aurez le quatrième gisement au monde de lithium. Donc on
  ne parle pas de quelque chose d''anecdotique. Alors tout ça, c''est le fruit d''un
  combat industriel, d''un travail commun qu''il faut absolument consolider. Je le
  dis parce que ça ne tombe pas du ciel ni ne sort de terre tout seul. La France,
  et vous le savez, dans ces territoires, on était à Montluçon il y a quelques instants,
  qui a souffert de la désindustrialisation, comme tant de villes dans notre pays
  ces dernières années. Notre pays a parfois plus désindustrialisé que les autres
  voisins, en particulier à la fin du 20ème, au début du 21ème siècle, et on sortait
  de 12 années de destruction de sites et d''emplois industriels. Ces 10 dernières
  années, on commence la réindustrialisation. C’est le fruit du travail collectif.
  Sur les 2 millions d''emplois au total, on a 130 000 emplois nets créés dans l''industrie
  et 300 sites industriels nets. Ça veut dire que si je compte les fermetures et les
  ouvertures, on en a fait plus 300 nettes de sites industriels. On a donc stoppé
  les 12 années de désindustrialisation, et c''est en train de repartir. C''est le
  fruit de quoi ? D''une politique macroéconomique cohérente. On ne peut pas vouloir
  refaire de l''industrie et vouloir taxer les gens qui investissent. Ça, ça ne marche
  pas. Même si on veut se faire plaisir au café ou avec les copains, ça ne marche
  pas. Il faut tenir une politique qui attire le capital en France. Il faut garder
  une politique qui ne surtaxe pas les entreprises qui produisent en France. Et il
  faut donc avoir une bonne politique sur le capital productif industriel. Une politique
  qui, avec les ordonnances travail et les réformes successives, et je fais confiance
  au Gouvernement pour finaliser l''adoption de ce qui a été fait par nos partenaires
  sociaux sur l''assurance-chômage, mais qui continue de simplifier la vie du travail
  et de consolider tout cela. Et puis une politique d''accompagnement de nos industriels.
  Ce qu''on a fait pendant le Covid, ce qu''on a fait avec France Relance, ce qu''on
  a fait avec France 2030. La cohérence de cette décennie, elle nous met dans cette
  situation de meilleure santé industrielle. Elle repose sur une stratégie de consolidation
  de nos filières. Ce qui fait qu''à Toulouse, on a consolidé notre aéronautique.
  À Dunkerque, on a inventé, justement, de Dunkerque à Douai, cette vallée des batteries.
  Que quand on parle de Belfort, on peut reparler aujourd''hui avec fierté d''hydrogène,
  parce qu''on va le consolider, mais aussi de nos turbines et de ce secteur. À Lacq,
  on va consolider toute une filière sur les terres rares. On est en train de bâtir
  aussi les fondamentaux de cette industrie du 21ème siècle et de ce qui marche avec.
  Il faut consolider tout cela et garder ce triptyque : climat, souveraineté, compétitivité.
  Il est absolument indispensable parce que rien n''est acquis et on le voit très
  bien. Rien n''est acquis parce qu''on a une transformation du monde qui est le nouveau
  défi. Je l''ai dit, on a été testé. C''est là qu''on a redéveloppé des instruments
  de souveraineté avec le Covid. On a ensuite eu la guerre en Ukraine et l''inflation.
  Là, aujourd''hui, on a une concurrence chinoise qui est terrible, terrible. Vous
  l''avez vécu dans l''acier, dans le département, mais on a des prix qui s''effondrent.
  Quand on parle de lithium, on a une concurrence chinoise qui est terrible. Ils tirent
  les prix vers le bas pour avoir le monopole. Il y a un dumping avec des surcapacités.
  Il y a de l''autre côté les Américains qui répondent avec des tarifs qui nous touchent
  aussi. Nous devons absolument avoir une stratégie française et européenne face à
  cela. Et c''est aussi pour ça que c''est très important de la voir sur ce qui sécurise
  notre industrie, qui sont ces terres rares, ces minerais critiques. Prenez juste
  un chiffre : 86 % de la production mondiale de métaux critiques, ce sont 3 pays.
  La Chine, c''est 60 % de l''extraction de terres rares et 90 % des actions pour
  les raffiner. Ça veut dire que si on ne fait pas des chantiers comme celui qu''on
  s''apprête à faire sur le lithium aujourd''hui, on est totalement à la main des
  Chinois et de quelques autres sur les 10, 15, 20, 30 ans à venir pour notre industrie.
  Ce qui n''est absolument pas soutenable et serait irresponsable. Face à ça, la stratégie
  maintenant de demain, je disais, il faut consolider ce qu''on a fait côté français.
  Il ne faut pas les imiter. Il y a des débats, si j''ai bien compris, qui s''ouvriront
  pour les politiques macroéconomiques à venir. Pour les mois à venir, on doit consolider
  ça.  Maintenant, nous, on doit agir sur, je dirais, deux fondamentaux pour la France
  qui sont absolument fondamentaux, l''énergie et les matériaux critiques. Ça, c''est
  dans les prochains mois un élément clé. L''énergie, on a la stratégie annoncée à
  Belfort en 2022 : économiser au maximum de l''énergie et donc tout ce qu''on peut
  faire en effacement, en réduction de nos surconsommations industrielles et des ménages,
  développer le renouvelable, mais surtout consolider le pilier français qui est le
  nucléaire. On a aujourd''hui le grand chantier du siècle qui est le nucléaire. Il
  est fondamental parce qu''il va nous permettre de rester compétitifs en matière
  d''énergie, de rester décarbonés et de rester souverains, toujours mes trois points.
  Donc ça, c''est ce qu''on est en train de consolider de l''amont à l’aval. Et c''est
  absolument décisif parce qu''au moment où l''énergie est rare, et vous voyez toute
  la difficulté du moment, nous, nous exportons 90 TWh d''électricité. C’est la force
  du nucléaire historique, du grand carénage qu''on a su faire et accompagner dans
  nos territoires et de ce qu''on est en train de relancer. La période que nous vivons
  montre simplement une chose : on doit accélérer avec constance sur cette stratégie.
  C''est ce que le Premier ministre a confirmé hier et annoncé quelques jours. Et
  on doit réussir ce pari d''avoir une politique d''aide à des filières, ce qu''on
  fait, mais en même temps une politique qui regarde l''avenir et qui accélère notre
  électrification. Parce que dans le moment où nous sommes en train de voir les conséquences
  de la dépendance des hydrocarbures fossiles liées à nos mobilités ou autres, on
  ne doit pas simplement aider ou, si je puis dire, financer les surcoûts qui viennent
  du bout du monde et qui sont le fruit des déstabilisations géopolitiques ou de nos
  dépendances. Il faut qu''on accélère notre politique, là aussi, d''indépendance.
  Le plan d''électrification qui va permettre d''ici 2030 de doubler les montants
  qui sont investis et des véhicules électriques, aux pompes à chaleur, à tout ce
  qui permet d''accélérer dans les collectivités locales, dans les filières industrielles
  pour nos compatriotes, est absolument clé. Et c''est le lien pour cette stratégie.
  On aura besoin de cette mine, on aura besoin de ce qui est fait ici. Parce que ce
  n''est pas la peine d''accélérer une stratégie d''électrification si on n''est pas
  fichu de construire ces batteries électriques et de sécuriser à l''amont ce que
  nous ferons. Ça, c''est pour l''énergie. On a les fondamentaux, on est bon, il faut
  simplement accélérer et consolider. On a ensuite les matériaux critiques. Et là
  aussi, on a plus de force qu''on ne le croit. Je le dis ici dans ce territoire qui
  a une histoire minière sur ce site qui, depuis plus d''un siècle, extrait le kaolin
  et qui demain extraira kaolin et lithium. Mais nous sommes une grande terre, et
  on l''avait oublié, d''extraction, de transformation et aux meilleurs critères,
  là aussi, internationaux. On a le BRGM qui est quand même l''excellence mondiale
  en termes de recherche d''études. On a fait d''ailleurs notre cartographie il y
  a trois ans maintenant et on exporte ce modèle en proposant justement cette indépendance
  partout dans le monde. Toutes nos stratégies, ça va être d''exploiter au maximum,
  de transformer au maximum sur le terrain, c''est le projet EMILI. Extraire ici le
  lithium, pouvoir en faire les travaux de concentration à quelques kilomètres d''ici,
  sécuriser d’ailleurs, ça sera l’engagement de l’État, la partie ferroviaire et ensuite
  pouvoir le vendre à des producteurs de batteries sur le sol français. A côté de
  ça, nous avons une stratégie de diversification. On réduit nos dépendances à quelques
  pays, donc on diversifie nos approvisionnements, et on a une stratégie de réindustrialisation
  et de recyclage sur ces matériaux critiques et ces minerais. Pourquoi ? Parce que
  si on veut réduire là aussi nos dépendances, on doit trouver le moyen, nous, de
  créer de la valeur dans le cycle. Je vous parlais par exemple de Carester à Lacq.
  On est en train de créer un champion mondial de séparation des terres rares pour
  les utiliser sur le plan industriel. On doit au maximum recycler. C''est ce qu''on
  fait, par exemple, avec Orano qui va travailler l''aval du futur, qui va permettre
  de réduire nos dépendances en matière d''uranium. C’est ce qu''on fait avec beaucoup
  d''acteurs de l''économie circulaire française qui, ce faisant, nous permettent
  de réutiliser ces matériaux critiques, ces minerais critiques, ces terres rares.
  Ça, c''est la stratégie qui est essentielle et il faut la consolider dans les années
  à venir pour notre industrie. A côté de ces deux piliers, énergie et donc matériaux
  critiques, on a un triptyque français et européen : investir, protéger et accélérer.
  Et c''est pour ça, sur ce deuxième pilier, qu''on est en particulier là aujourd''hui.
  Investir, c''est clé. C''est ce qu''on fait avec France 2030, qu''on est en train
  de consolider au niveau européen. On va convaincre nos partenaires qu''on a besoin
  d''investir massivement dans ces technologies pour réindustrialiser, parce que la
  bataille est mondiale et que nos compétiteurs investissent beaucoup et plus que
  les Européens aujourd''hui. Les Chinois, les Américains, quand on regarde ce qu''ils
  font sur les industries de défense, sur le quantique, sur l''intelligence artificielle,
  sur les technologies de transition, dont celle-ci, ils investissent des montants
  considérables. Les Européens, au niveau agrégé, ne le font pas assez. C’est la bataille
  qu''on va mener au niveau européen. Et on a besoin de consolider aussi de l''investissement
  privé. Alors, on a créé des instruments, des fonds, le Crédit d''impôt industrie
  verte. On a bâti, là aussi, des possibilités de faire. Mais de la même manière qu''on
  a su, pour l''argent public, avoir France 2030, on doit vraiment remobiliser l''épargne
  privée européenne sur l''industrie. C''est toute la bataille qu''on a pour l''union
  des marchés de capitaux, c''est-à-dire une union d''investissement. Ça, c''est la
  clé pour investir. Ça va être notre bataille des prochains mois. Ensuite, c''est
  de protéger. Ce mot n''est pas un gros mot. Et je me bats de tous les coins pour
  qu''on le pousse et qu''on convainque nos partenaires. Je vous parlais de la bataille
  que nous livrent les Chinois. Vous l''avez vécue avec Erasteel sur le territoire.
  Parce que là, on célèbre les succès. On a des moments difficiles aussi. Qu''est-ce
  qui se passe ? Qu''est-ce qui est en train de se passer ? On a des tas de secteurs
  où la Chine fait du dumping et nous casse la matière. Nous, on résiste un peu mieux,
  parfois parce qu''on avait plus désindustrialisé que les voisins, parce qu''on s''est
  mis sur des meilleurs segments, parce qu''on a protégé très vite. ArcelorMittal,
  ils sont encore là, ils nous font des investissements parce qu''on a tout de suite
  protégé. On a pris ce qu''on appelle des clauses de sauvegarde pour freiner. Mais
  l''Europe, c''est la conversion qu''on est en train de faire, doit davantage protéger.
  Protéger en mettant de la préférence européenne, en imposant dans les filières des
  composants européens et en sachant prendre, quand on a de la concurrence déloyale,
  des mesures de protection. Les Nord-Américains le font, les Chinois le font, on
  était les derniers à ne pas le faire. Ça, c''est la bataille qu''on mène, celle
  que vous m''entendez conduire et les ministres avec moi ces dernières années tout
  particulièrement, pour cette souveraineté européenne, elle est clé. Et je le dis
  à un moment où nos voisins allemands et quelques autres sont en train de subir la
  pire vague de désindustrialisation connue dans les dernières décennies. L''année
  dernière, c''est plus de 250 000 emplois industriels détruits en Allemagne. À comparer
  avec les nôtres, ils partaient de beaucoup plus haut. Pourquoi ? Parce que dans
  la machine-outil ou dans l''automobile, ils sont percutés par cette concurrence,
  il faut bien le dire, déloyale, qui vient de Chine. Se battre pour la préférence
  européenne est clé si on veut le succès de cette stratégie que je vous présente.
  Je vais dire quelque chose de simple, c''est clé pour le site qu''on fait là. Parce
  que si on veut que le lithium qu''on extrait ici aille dans nos batteries qu''on
  fait en France, il faut qu''on crée des incitations pour que les producteurs de
  voitures européens achètent des batteries françaises et européennes. Parce que s''ils
  font comme ils font depuis 20 ans, ils iront acheter la moins chère sur le marché.
  Et si les Chinois font du dumping pendant 6 mois, 1 an, ils créeront mécaniquement,
  par des subventions d''État, la batterie la moins chère du monde. C''est pour ça
  qu''on a besoin de sécuriser cette préférence européenne. C''est une question de
  cohérence industrielle. Le dernier point de cette stratégie, c''est accélérer. En
  même temps qu''on investit, qu''on a des compétences, qu''on est en train de faire
  ça, il faut absolument qu''on puisse accélérer sur nos projets. Accélérons en Europe,
  c''est ce qu''on fait avec ces Omnibus Act, c''est ces lois un peu diverses dispositions,
  on dirait chez nous, qui permettent justement de réduire les délais européens, qui
  freinent, qui simplifient. C’est un combat qu''on mène, en particulier avec l''Allemagne,
  depuis un an maintenant, avec des premiers résultats. Mais c''est ce qu''on fait
  au niveau français. On n''a pas commencé hier, je vous rassure. Il y a eu plusieurs
  lois de simplification, mais ces trois dernières années, on a accéléré ce travail.
  Il y a trois ans, quand je recevais beaucoup des porteurs de projets de la réindustrialisation,
  certains d''ailleurs qui sont là, on avait pour le départ d''un grand projet 17-18
  mois. Grâce à la loi Industrie verte, la loi ASAP, qui ont été promulguées, commencées
  à être appliquées, appliquées par nos préfets qui sont là, les services de l''État,
  on est passé à 8-9 mois pour nos grands projets. On a déjà diminué par deux les
  délais. Ça veut dire que ça marche et c''est possible, avec un effort très important,
  en regardant avec les filières industrielles ce qu''il fallait simplifier, et en
  mobilisant tous les services de l''État, avec un chef sur le terrain, et on avance.
  Ce que le Gouvernement lance aujourd''hui, par les réunions de ce matin, par tout
  le travail de mobilisation, ce sont nos 150 grands projets stratégiques. 150 projets
  industriels partout sur le territoire, et je remercie les ministres qui, avec les
  filières, les industriels, les ont présentés ce matin, et ont préparé tout ça. Je
  remercie nos préfets qui sont là, qui vont avoir à les accompagner en plus de tout
  le reste. Au fond, je le disais aux maires il y a quelques jours, c’est la méthode
  Notre-Dame de Paris, ce n’est pas compliqué. C''est-à-dire un projet identifié,
  une chaîne de commandement claire, des gens à qui on rend compte, et des délais
  records qu''on doit tenir. Sur ces 150 grands projets, on parle de quelque chose
  qui est important pour la vie du pays. C''est plus de 70 milliards d''euros d''investissement,
  c''est 30 000 emplois, c''est 63 départements concernés, c''est en quelque sorte
  les cathédrales industrielles de l''indépendance française. Ces 150 grands projets
  stratégiques vont être suivis, et pour ça, on prend, comme on a fait pour les JO,
  comme pour Notre-Dame, les textes. On s''appuie sur les textes que j''évoquais,
  sur le texte de simplification qui a été voté la semaine dernière, et puis le Gouvernement
  prend des mesures très concrètes. Un décret contentieux projet stratégique qui sort
  aujourd''hui. Ce projet va permettre, tous les maires ici présents, les préfets,
  les porteurs de projets le savent, ce que nous disent souvent les investisseurs,
  ce que nous disent les industriels, c''est très bien, même si vous accélérez les
  projets, le contentieux, c''est trop long. On prend des années parfois de recours
  et ça nous freine. Là, c''est l''unification du contentieux, c''est quelque chose
  qu''on a déjà testé, ça marche, un seul niveau, la Cour administrative d''appel.
  Le gain, c''est un an, un an de gain sur les délais de recours. C''est acté, ça
  sort aujourd''hui. Deuxième élément, le foncier économique. C''est très important.
  Les élus le savent aussi, nos préfets ont fait ce travail. On avait lancé, à quelques
  années, rappelez-vous, le fonds Friche qui avait permis d''accélérer dans beaucoup
  de territoires les choses avec nos friches. On l''avait relancé avec France Relance.
  On a un foncier économique qui est disponible. Ce qu''il nous faut réussir à bâtir,
  c''est des dispositifs clés en main pour les extensions, pour des grands groupes
  qui viennent s''installer, pour des ETI, des PME. On a 44 sites classés déjà disponibles,
  22 000 hectares entre maintenant et 2030, et avec France Foncier, on relance une
  grande stratégie pour justement non seulement identifier avec les élus, mais préparer
  ces terrains. Parce que quand on a un foncier industriel, il y a des tas de choses,
  ou d''ailleurs quelle que soit la nature du terrain avant, je dis industriel, à
  vocation industrielle, mais quand on a une friche, quel que soit l''usage précédent,
  si on veut qu''il y ait un projet industriel qui arrive, on doit préparer tout l''administratif,
  on doit regarder les raccordements. Toutes ces choses-là peuvent se faire en temps
  masqué. C’est exactement ça qu''on va préparer. On l''a déjà fait sur beaucoup de
  sites. On va l''accélérer. Le ministre de l''Industrie, Monsieur Martin, va justement
  préparer ces zones d''accélération industrielles pour justement utiliser les textes
  européens en particulier, justement, notre accélérateur industriel qui est à l''échelle
  européenne, et permettre d''avoir, si je puis dire, ce sucre rapide pour avoir ces
  zones d''accélération avec les élus partout où on les a identifiés. Troisième élément,
  c''est la loi de simplification de la vie économique, adoptée justement la semaine
  dernière, qui va permettre de réduire massivement les délais, en particulier pour
  les data centers, pour ne citer qu''un exemple. Si on veut être compétitif, attirer
  les data centers du monde entier. On a commencé l''année dernière, on commence à
  rattraper notre retard. La clé, ce sont les délais. Cette loi, elle nous remet dans
  la compétition. Sans ça, on était encore un peu trop lent. Le quatrième point, c''est
  aussi de simplifier les évaluations environnementales. Non pas pour réduire l''exigence
  environnementale, mais simplement pour acter le fait qu''on a beaucoup de procédures
  et qu''on a des procédures qui sont faites par les services de l''État. On a des
  procédures qui sont faites par des autorités environnementales indépendantes, qui
  sont souvent redondantes et qui sont souvent séquentielles. Le ministre Lefèvre
  va avoir à piloter ce travail, justement, avec une mission qui part dès aujourd''hui,
  et avec des textes très concrets, sous l''autorité, là aussi, du Premier ministre,
  pour finaliser, justement, une accélération de toutes ces procédures. On ne réduit
  pas l''ambition environnementale ou de biodiversité, simplement, on remet du bon
  sens, on parallélise tout ça, et on réduit massivement les délais. Ces 150 cathédrales
  industrielles, ces 150 grands projets industriels, c''est vraiment ce qu''on sort
  aujourd''hui avec des éléments nouveaux, avec des annonces, une mobilisation du
