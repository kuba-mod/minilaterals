date: '2026-04-29'
type: press_release
source_name: elysee
title: Remise de décorations aux athlètes médaillés aux Jeux olympi
text: 'Le Président de la République a décoré nos athlètes français médaillés des
  Jeux olympiques et paralympiques d’hiver de Milan-Cortina 2026, ce mercredi 29 avril
  au Palais de l’Elysée. À moins de quatre ans du retour des Jeux olympiques et paralympiques
  en France, la famille olympique s''est réuni pour célébrer les victoires françaises
  et se projeter vers les Alpes 2030 . Cette cérémonie a rendu hommage à l’ensemble
  des femmes et des hommes qui ont contribué au succès de ces Jeux : athlètes de l’équipe
  de France, représentants des fédérations, membres des équipes encadrantes, représentants
  des comités nationaux olympiques et paralympiques français, experts de la haute
  performance du ministère des Sports et de l’Agence nationale du Sport. Le chef de
  l’État a souhaité que cette cérémonie de décoration collective soit partagée avec
  les autorités politiques et personnalités sportives parmi lesquelles : Sébastien
  Lecornu, Premier ministre ; Marina Ferrari, ministre des Sports, de la Jeunesse
  et de la Vie associative ; Amélie Oudéa-Castéra, Présidente du Comité national olympique
  et sportif français ; Marie-Amélie Le Fur, championne paralympique d''athlétisme,
  Marie Bochet championne paralympique en ski alpin, remettront les insignes aux récipiendaires
  aux côtés du Président de la République. Monsieur le chef d''état-major des armées,
  Monsieur le directeur général de la police nationale, Messieurs les présidents de
  régions qui sont là et que je retrouve avec plaisir, Mesdames et Messieurs les présidents
  et présidentes de fédérations sportives, Mesdames, Messieurs les athlètes, acteurs
  du monde sportif, Mesdames, Messieurs en vos grades et qualités, chers amis, je
  suis très heureux, avec mon épouse, de vous accueillir à l''Élysée pour célébrer
  nos athlètes olympiques et paralympiques, membres de cette grande famille tricolore
  du sport. Cette année encore, vous avez su vous dépasser, nous émouvoir, nous rendre
  fiers. C''est la troisième fois que nous nous retrouvons ici pour célébrer les succès
  de nos délégations et je veux vous remercier tous ici présents et avoir aussi une
  pensée pour tous les autres empêchés par le rythme exigeant des entraînements et
  des compétitions. Aujourd''hui, cette cérémonie a un éclat particulier puisque nous
  y fêtons 35 médailles, dont 12 en or. Record de Pékin battu, avec 23 médailles historiques
  pour l''équipe olympique, 12 médailles conservées pour l''équipe paralympique, qui
  maintient un très haut niveau malgré une concurrence plus rude à chaque édition.
  Je sais combien les deux présidentes ici présentes, et je remercie la présidente
  du CNOSF et la présidente du CPSF pour leur engagement, continuent de suivre ces
  performances, et au-delà de ça, la cohérence du monde sportif français. A Milano-Cortina,
  la France s''est hissée 6e au tableau des médailles dans les deux compétitions,
  rappelant ainsi qu''elle est une grande nation sportive, une nation capable de s''imposer
  parmi les meilleures, une nation qui fait vibrer nos couleurs, nos valeurs. Je veux
  aussi souligner une nation qui a su avoir des athlètes féminines au rendez-vous,
  puisqu''elles ont remporté un nombre historique de médailles. Ce palmarès, nous
  le devons à la détermination sans faille de notre délégation, qui n''a reculé devant
  rien, ni devant cette intensité des épreuves d''hiver, ni devant les années d''entraînement
  et d''efforts recommencés. Je veux en remercier évidemment les athlètes, l''ensemble
  de leurs équipes, les fédérations qui sont derrière ces athlètes, et tous les bénévoles,
  les clubs dans lesquels vous avez commencé, les équipes qui vous ont accompagnés,
  les familles qui sont aussi derrière vous. Je pense particulièrement aux athlètes
  paralympiques qui devaient souvent repousser, comme les autres, la fatigue et les
  doutes, mais aussi la douleur et les limites du possible. Vos médailles sont aussi
  bien souvent une leçon de vie. Chacun de vos parcours force le respect. Participer
  aux Jeux olympiques et paralympiques, que l''on en sorte médaillé ou non, c''est
  toujours s''engager dans une épreuve totale. Je pense en cela au panache d''Emilien
  Jacquelin, qui n''est pas parmi nous aujourd''hui, mais qui a inscrit une page de
  légende. Il a manqué le podium pour moins d''une seconde sur le sprint, mais deux
  jours plus tard, il a su trouver la force de se dépasser en poursuite en arrachant
  avec éclat une médaille de bronze. Au public, vous avez offert cette année un spectacle
  unique dont nous avons pu revoir quelques grands moments à l''écran, et durant toutes
  les semaines passées, un spectacle de précision, de maîtrise, de sang-froid. Nos
  biathlètes ainsi, qui ont visé juste et décroché pas moins de 13 médailles, plaçant
  la France au tout premier rang dans les disciplines, avec Quentin Fillon Maillet
  avec nous par la pensée lui aussi, qui est devenu l''athlète français le plus médaillé
  des Jeux, Julia Simon, qui détient désormais le même record chez les femmes. Vous
  nous avez ramené, chère Julia, 4 médailles, dont 3 frappées du plus précieux métal,
  en reine de l''individuel comme du collectif, avec vos rafales tirées jusqu''au
  bout sans trembler pour une victoire exemplaire en relais femmes. Cette année, le
  biathlon français a d''ailleurs particulièrement brillé dans l''effort partagé,
  l''emportant sur toutes les épreuves de relais. Parfois distancés, jamais désespérés,
  vous n''avez jamais laissé l''écart se creuser pour finalement remonter et l''emporter
  au courage et au panache. Je pense au succès de Fabien Claude, Émilien Jacquelin,
  Éric Perrot, tout comme à ceux de Camille Bened, Océane Michelon ou Lou Jeanmonnot.
  Pendant plusieurs semaines, au rythme des épreuves, les Jeux nous ont fait vibrer
  et ce sont nos rêves et nos vies qui soudain ont pris de l''altitude, grâce à vous.
  Ce sont aussi des moments de grâce que nous avons vécus, et je sais que, pas simplement
  les athlètes, mais tous ceux qui les accompagnent les ont partagés. Je pense à cet
  instant offert par Guillaume Cizeron et Laurence Fournier Beaudry au patinage, une
  danse d''une liberté infinie qui ont conquis, à l''évidence, le monde entier devant
  un public fasciné, et une performance artistique qui fut aussi une course contre
  la montre, quelques mois pour atteindre l''osmose parfaite qui, bien souvent, prend
  normalement des années. Quelques mois aussi pour permettre à Laurence de concourir
  sous les couleurs de la France, chères à son cœur. À peine sacrés aux jeux, un mois
  plus tard, toujours portés par cette complicité, vous renouvelez l''exploit, champions
  du monde. Incroyable épopée qui avoisine tant d''autres. Je pense aux épopées des
  pistes de Bormio pour le ski-alpinisme, avec le succès à toute allure d''Emily Harrop
  et Thibault Anselmet. Trois nouvelles épreuves, trois médailles aussi, et je ne
  peux qu''espérer que le COJOP ait pris note et que vous retrouviez la discipline
  au programme en 2030. Épopée aussi sur les pentes embrumées de Cortina, de Romane
  Miradoli, qui nous a, elle, offert une précieuse médaille d''argent en ski alpin,
  conquise virage après virage, à bout de force.  Épopée encore de nos jeunes para-skieurs
  qui se sont, eux, tout autant illustrés, Aurélie Richard, dont le sourire et la
  bonne humeur ont été un rayon de soleil sur ces montagnes italiennes, qui a ouvert
  le compteur tricolore paralympique avec l''argent en descente. La benjamine de nos
  médaillés a rappelé aussi, avec 4 médailles pour une première participation, que
  la valeur n''attend pas le nombre des années. Quant à Arthur Bauchet, après une
  chute, il a su rechausser les skis dès le lendemain pour conserver son titre en
  super combiné, puis aller chercher l''or en slalom géant. Julien Segers a, lui,
  conquis le bronze, en Super-G. Autant d''histoires magnifiques qui furent les romans
  de ces Jeux. À côté de ces médailles de vitesse, d''autres ont été arrachées à l''endurance,
  à la persévérance sur les pistes de Tesero. Nos fondeurs ont avancé ensemble, au
  bout de l''effort et au bout d''eux-mêmes, pour la médaille d''argent. Je parle
  bien sûr de Victor Lovera, Hugo Lapalus, Théo Schely et Mathis Desloges, triplement
  médaillés sur ces Jeux, un palmarès si prometteur qui dit déjà tant de travail et
  d''ambition. Autre de nos jeunes générations, Karl Tabouret, qui s''est imposé en
  paraski de fond, sur 10 kilomètres classiques, bien conseillé, je crois, par Benjamin
  Daviet, récompensé du bronze, comme Anthony Chalençon, accompagné de Florian Michelon.
  La ténacité, l''expérience, ce refus obstiné de céder qui vous caractérise ont fait
  la différence. Enfin, aux épreuves de Livigno, nos athlètes ont franchi les bosses,
  dompté les parcours chahutés, histoire d''audace, histoire d''instinct. Perrine
  Laffont y retrouve le podium olympique en ski de bosses. En snowboard cross, Léa
  Casta et Loan Bozzolo ont aussi offert à la France le bronze. Et Cécile Hernández,
  fidèle à elle-même, a conservé son rang avec ce courage et ce supplément d''âme
  immense de championne paralympique. Oui, ces épopées d''Italie ont soulevé la France
  et le monde, et je sais que nos athlètes n''ont pas fini de gravir les sommets et
  de nous impressionner. Tous ont brillé, qu''ils aient l''or, l''argent, le bronze,
  et même ceux qui ont eu à affronter des déceptions, parce qu’eux se sont aussi préparés
  dans ces Jeux, la suite. A travers votre exemple, mesdames et messieurs les athlètes,
  ce sont aussi nos jeunes qui vont s''inscrire dans nos clubs avec le cœur et l''esprit,
  avec présents en eux les exploits que vous avez fait partager, ce que vous leur
  avez fait vivre. Vous avez permis de créer des vocations nouvelles. De cela, je
  veux vous remercier particulièrement aujourd''hui. Comment, au-delà des fédérations,
  des clubs, ne pas aussi avoir un mot pour nos armées ? Madame la ministre, mon général,
  monsieur le chef d''État-major, qui ont plus de 50 % des médaillés olympiques et
  paralympiques dans leur rang, et qui donc, comptent beaucoup, comme à chaque fois,
  pour cet effort. Cette cérémonie vient témoigner de la fierté, de la reconnaissance
  de la nation, et à travers vous, donc, de tous vos clubs, vos fédérations, vos familles
  et tous les bénévoles. Je veux aussi remercier évidemment tous ceux qui ont mené
  ce travail pour l''excellence, notre Agence Nationale du Sport, toute notre stratégie
  et haute performance, cher Yann, et tout ce que les ministres successifs, Madame
  la ministre aujourd''hui, ont porté. Nous continuerons de faire tout cela à travers
  notre stratégie Ambition Bleue, conçue et déployée par le pôle haute performance,
  qui doit vous donner les moyens, nous donner collectivement les moyens de viser
  l''or, d''être en tout cas durablement dans le top 5 des nations sportives, qui
  est l''objectif qu''on poursuit depuis les Jeux de Paris, et que l''on veut poursuivre,
  évidemment, pour les Jeux de 2030 et la suite. En vous recevant aujourd''hui, je
  veux aussi ici redire la fierté de la nation, quelques années après Albertville,
  cher Michel, et avec toujours le même engagement de la nation, vous incarnez aussi
  avec cette constance, avec Jean-Claude et quelques autres, d''accueillir les Jeux
  d''hiver à la maison. Et je veux ici remercier le président Grospiron, le directeur
  général Cadot, toutes les équipes du COJO, la SOLIDEO, nos régions, l''ensemble
  des collectivités, évidemment, la ministre des Sports et tous ceux qui y contribuent,
  parce que nous serons au rendez-vous pour ces Jeux d’hiver, qui sont un rendez-vous
  important pour pas simplement nos deux régions, mais la France entière, nos Alpes
  en bleu, blanc, rouge, qui vont permettre à vos générations d''exceller, au fond,
  d''aller encore plus loin et de réussir encore davantage, parce que vous serez à
  la maison cette fois. Donc c''est un défi pour nous que nous allons évidemment remporter,
  parce que nous sommes forts de l''expérience des Jeux de 2024. C''est un défi organisationnel,
  nous le savons, avec une logistique des sites à rationaliser, et nous avons encore
  le travail à faire sur ce volet, et nous y veillons avec soin. C''est à chaque fois
  un défi d''organisation, d''infrastructure, de mobilité, de sécurité, et évidemment
  de performance sportive. Parce que là aussi, encore, pour nos Jeux de 2030, nous
  voulons le dépassement, le panache, et le faire en étant au rendez-vous de l''excellence,
  comme nous avons su le faire il y a maintenant bientôt 2 ans. Alors à vous, qui
  êtes les visages de notre nation sportive, qui êtes déterminés à faire encore mieux,
  plus haut, plus loin, plus fort, je veux ici redire notre fierté en vous décorant
  aujourd''hui et vous dire, pour toute l''équipe qui prépare nos Jeux d''hiver à
  venir, notre confiance. Nous serons au rendez-vous, avec l''excellence, la performance,
  l''esprit olympique qui nous anime et que nous avons su réinventer. La France vous
  dit : « merci et bravo. » Vive l''olympisme français, vive nos athlètes olympiques
  et paralympiques, vive la République et vive la France. Monsieur le chef d''état-major
  des armées, Monsieur le directeur général de la police nationale, Messieurs les
  présidents de régions qui sont là et que je retrouve avec plaisir, Mesdames et Messieurs
  les présidents et présidentes de fédérations sportives, Mesdames, Messieurs les
  athlètes, acteurs du monde sportif, Mesdames, Messieurs en vos grades et qualités,
