  et nous avons encore le travail à faire sur ce volet, et nous y veillons avec soin.
  C''est à chaque fois un défi d''organisation, d''infrastructure, de mobilité, de
  sécurité, et évidemment de performance sportive. Parce que là aussi, encore, pour
  nos Jeux de 2030, nous voulons le dépassement, le panache, et le faire en étant
  au rendez-vous de l''excellence, comme nous avons su le faire il y a maintenant
  bientôt 2 ans. Alors à vous, qui êtes les visages de notre nation sportive, qui
  êtes déterminés à faire encore mieux, plus haut, plus loin, plus fort, je veux ici
  redire notre fierté en vous décorant aujourd''hui et vous dire, pour toute l''équipe
  qui prépare nos Jeux d''hiver à venir, notre confiance. Nous serons au rendez-vous,
  avec l''excellence, la performance, l''esprit olympique qui nous anime et que nous
  avons su réinventer. La France vous dit : « merci et bravo. » Vive l''olympisme
  français, vive nos athlètes olympiques et paralympiques, vive la République et vive
  la France.'
