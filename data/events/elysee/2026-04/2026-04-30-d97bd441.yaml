title: Exercice de préparation des armées à la haute intensité ORIO
text: Le Président de la République a participé à l'exercice de préparation des armées
  à la haute intensité « ORION 26 » à Mailly-le-Camp et à Suippes, ce jeudi 30 avril
  2026. Le chef de l’État a assisté à des manœuvres terrestres et aériennes illustrant
  les capacités de l’armée de Terre en matière de commandement et de combat en haute
  intensité . Après une présentation de l'exercice par le Général d'armée Pierre Schill,
  Chef d'état-major de l'armée de Terre, le Président Emmanuel Macron a été immergé
  dans « ORION 26 » à travers une immersion dans un raid hélicoptères pendant un combat
  aéroterrestre, la démonstration de tir d'artillerie, le survol d'un réseau de tranchées,
  l'observation d'une frappe aérienne depuis un véhicule blindé et l'immersion dans
  un parcours de tir. À l'issue de l'exercice, le chef de l’État a annoncé à la radio
  la fin de l'exercice et a félicité les participants. Il a notamment salué l’ engagement
  des militaires mobilisés , qui œuvrent avec courage et détermination au service
  de la France. Monsieur le Président du Conseil régional, Monsieur le Président du
  Conseil départemental, Monsieur le Maire, Monsieur le Chef d'état-major de l'Armée
  de terre, Messieurs les maires, officiers, sous-officiers, caporaux-chefs, caporaux
  et soldats de l'Armée de terre, je veux vous dire la fierté qui est la mienne d'être
  devant vous aujourd'hui. Et avant de vous dire quelques mots, honorer la mémoire
  de vos frères d'armes, le Major Frion, l'adjudant Montorio et le sergent Girardin,
  morts pour la France, morts au combat en Irak et au Liban. En leur hommage, je vous
  propose de respecter dès à présent une minute de silence. Merci pour nos morts,
  pour leurs familles. J'ai une pensée aussi pour nos blessés. Je sais que leur combat
  est difficile et douloureux. Notre présence aujourd'hui est aussi en reconnaissance
  de cela. Malgré la gravité de ces mots, de ces moments, je veux ici, oui, vous dire
  la fierté qui est la mienne et celle de la ministre des Armées, du CEMA, du CEMAT
  et des généraux qui m'accompagnent, d'être à vos côtés pour la conclusion de l'exercice
  Orion, qui s'affirme comme un succès et un signal clair envoyé tout à la fois à
  nos alliés et à nos adversaires. Il y a un an, jour pour jour, j'étais déjà au sein
  de l'armée de Terre, sous le soleil d'Aubagne, pour assister à la cérémonie de commémoration
  des combats de Camerone et remettre les certificats de nationalité à trois légionnaires
  devenus Français. Le cadre a radicalement changé. Mais être à vos côtés aujourd'hui,
  c'est réaffirmer la force de notre armée de Terre, l'esprit de corps et ce sens
  du collectif. Ce que j'ai vu aujourd'hui, c'est une armée qui avance, qui se transforme,
  qui se modernise, qui agrège et qui est là pour répondre aux défis contemporains
  qui sont les nôtres. C'est pourquoi cet exercice est si important et vous pouvez
  être fiers d'y avoir contribué. Notre armée de Terre s'est profondément modernisée,
  comme toutes nos armées ces dernières années. J'ai pu voir à vos côtés les derniers
  équipements que vous avez touchés, qui ont continué de se déployer conformément
  aux lois de programmation militaire successives et à la sur-marche qui est en train
  d'être négociée, c'était une nécessité. L'armée avance, innove, adopte ces nouveaux
  équipements, les transforme, innove elle-même, je l'ai vu aussi. Ensuite, nous avons
  vu le défi d'une nécessité pour les Européens de prendre davantage en charge leur
  défense. Et donc de consolider cette interopérabilité qu'apporte l'OTAN, mais de
  réussir à agréger autour de nous, avec nous, d'autres armées européennes. Je veux
  ici saluer nos partenaires européens présents à nos côtés, nos amis britanniques
  et allemands intégrés au sein du commandement. Je salue nos frères d'armes espagnols,
  grecs, italiens, polonais, qui ont aussi contribué à cet exercice. Merci d'être
  avec nous ce soir. Votre présence incarne la force dont l'Europe est capable. En
  effet, à chaque fois, ces derniers mois, que nous avons conçu des missions importantes
  pour la sécurité des Européens, nous avons pensé la capacité à planifier, la capacité
  à assurer un commandement et le déploiement de telles opérations. Nous avons pensé,
  évidemment, à des déploiements conjoints. C'est le sens même de la Coalition des
  volontaires que nous sommes en train d'organiser pour les garanties de sécurité
  en Ukraine. Elles sont sous commandement franco-britannique. Cet exercice Orion
  a permis de tester la robustesse de nombre de ces approches et nous a permis de
  conforter à la fois ce qui a été pensé et voulu, et je vous en remercie pour le
  commandement, et également la capacité des Européens à agir ensemble. Cet exercice
  nous a montré la crédibilité qu'ont les Européens à pouvoir déployer, ensemble,
  une opération de cette ampleur, et la France à être une nation cadre dans ce contexte.
  C'est à mes yeux un message très clair qui est envoyé à nos partenaires ukrainiens,
  qui nous attendent sur ce registre, et à tous nos frères d'armes européens qui savent
  pouvoir s'agréger à de telles missions et travailler à nos côtés. Je suis là aujourd'hui
  pour vous dire de continuer à vous battre pour faire de la France une puissance
  reconnue par ses alliés et redoutée par ses ennemis. Elle illustre chaque jour à
  quel point notre environnement international se brutalise, cette actualité que nous
  vivons, et nous avons raison de continuer de nous adapter à la menace. Mais le dernier
  mot que j'aurai, en étant à vos côtés aujourd'hui, c'est qu'évidemment, il y a la
  modernisation en cours, nos lois de programmation militaires, il y a ce que nous
  allons continuer de faire. Évidemment, il y a une France qui est au cœur de l'Europe
  avec ses partenaires, agrège, consolide et sait bâtir une Europe de la défense crédible
  pour sa sécurité, la sécurité de ses partenaires de défense et répondre aux défis
  contemporains. Mais derrière tout cela, il y a notre force d'âme, les femmes et
  les hommes qui font nos armées. L'importance d'un exercice comme celui que vous
  venez de vivre, c'est aussi de la solidifier. Et l'importance d'un exercice comme
  celui qui vient d'être organisé, c'est de tester la robustesse de notre capacité
  à résister dans tous les domaines du jeu, y compris la partie civile, y compris
  en engageant, comme vous l'avez fait durant cet exercice, d'autres ministères. La
  capacité aussi que nous aurons à intégrer les réservistes, et nous avons renforcé
  cela, et le service national dans quelques semaines. Mais n'oubliez jamais cela.
  C'est vous qui tenez notre capacité d'engagement, notre efficacité au combat, notre
  capacité de résistance. Et à la fin, la victoire. Aucun équipement ne le fera à
  votre place. Nos frères d'armes ukrainiens, que vous avez eu l'honneur de former,
  ici même, le démontrent chaque jour. En février 2022, il y avait peu d'experts pour
  expliquer qu'ils allaient résister. C'est par leur force d'âme qu'ils ont tenu,
  c'est par leur force d'âme qu'ils ont innové, c'est par leur force d'âme qu'ils
  ont, pied à pied, su tenir leur territoire. C'est un exemple qui doit continuer
  de nous inspirer. Je sais une chose, par l'honneur qui m'est fait depuis bientôt
  neuf ans d'être là où je suis, c'est que cette force-là, nous l'avons. Et nul ne
  nous l'enlèvera. Soyez fiers de cela. En tout cas, je suis fier d'être à votre tête,
  car c'est cette force-là qui est la plus importante dans les moments que nous sommes
  en train de vivre. Je suis éminemment fier de notre armée de terre, de nos armées,
  de l'ensemble des frères d'armes ici rassemblés. Je mesure la révolution du combat
  terrestre qui se joue aujourd'hui, toutes les transformations que vous avez conduites
  et celles qui continueront. Je suis fier de l'exercice que vous venez de conduire
  et je vous en remercie. Mais je suis surtout fier des Françaises et des Français
  engagés que vous êtes et de cette force-là qui continuera de nous tenir. Vive la
  République ! Vive la France ! Monsieur le Président du Conseil régional, Monsieur
  le Président du Conseil départemental, Monsieur le Maire, Monsieur le Chef d'état-major
  de l'Armée de terre, Messieurs les maires, officiers, sous-officiers, caporaux-chefs,
