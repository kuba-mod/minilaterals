  de montée des eaux, qui est largement lié au réchauffement climatique, à la fonte
  de glaciers. Donc, on voit un phénomène de montée des eaux. Ça, c''est le premier
  risque. Il est déjà là. Il touche beaucoup de pays à travers ce qu''on appelle «
  l''érosion côtière », l''érosion des côtes. C''est-à-dire que la mer vient manger
  les côtes parce qu''elles montent. Nous, on l’a, en France. Par exemple, tu as des
  endroits où la mer vient manger une partie du territoire. Tu as des immeubles qui
  s''effondrent. C''est un phénomène qui est très fort, et il y a certains pays vulnérables,
  [comme] en Afrique [avec] le Sénégal par exemple, qui a eu beaucoup ça, avec ses
  côtes qui ont été mangées. Ce qui va avec cette érosion côtière, c''est aussi un
  phénomène de grand risque pour des îles, des petites îles. On a par exemple maintenant
  à peu près établi que tu as des îles dans le Pacifique, des toutes petites îles,
  qui ont horizon à 2050. Ta génération, elle vivra 2050. Eh bien, ces îles, vraisemblablement,
  vont disparaître. Ce n''est pas de la fiction. Donc ça, c''est le premier risque, c''est,
  à cause du réchauffement, la montée des eaux, la disparition de certaines îles,
  la fragilisation de certains territoires. Le deuxième risque qu''on a à court terme,
  c''est la modification qui est liée au réchauffement de la terre, de l''acidité
  de la mer, et donc une attaque sur la biodiversité marine. Et ça, on le voit aussi,
  à cause d''un phénomène de réchauffement. Tu as des phénomènes d''acidification
  qui se passent et donc tu as des espèces qui sont menacées. Tu as certains endroits,
  à cause de ces phénomènes, où tu as, par exemple, les coraux qui sont en train de
  disparaître ou des espèces qui disparaissent. On a donc un deuxième risque qui est
  un risque pour la biodiversité et qui est énorme parce que la biodiversité marine
  est très importante pour nos équilibres. Une fois que tu perds une espèce, tu as
  l''impression que ce n''est pas grave, mais ça vient tout déséquilibrer. Ça déséquilibre
  les autres espèces,l''écosystème et la vie animale évidemment, mais aussi humaine
  parce qu''on est un tout. Puis, le troisième risque, c''est la désorganisation.
  En effet, c''est les phénomènes climatiques majeurs. On les voit déjà avec des cyclones,
  avec des incendies qui reviennent plus souvent. Et c''est les courants marins qui
  sont en train de se dérégler. Ça commence. Donc ça, c''est aussi un phénomène. Alors
  il commence à se traduire par déjà des choses qu''on voit : des cyclones plus nombreux
  dans certaines zones. Tu as peut-être entendu parler des sargasses, par exemple,
  dans les Antilles. C''est terrible, ce sont des algues qui s''accumulent et qui
  sont très mauvaises à la fois pour la santé animale et humaine, qui ont une odeur
  terrible. C''est lié à quoi ? C''est les alluvions de l''Amazonie qui viennent avec
  la température se transformer différemment, qui nourrissent ces algues et les courants
  les ramènent. Tu vois, c''est exactement l''illustration de ce que je dis, dérèglement
  des courants. Donc dans les risques, il y a en effet le dérèglement possible du
  Gulf Stream. Il y a plein de scientifiques qui sont en train de le modéliser. Il
  est possible que ça vienne et ça aura des impacts. Ça pourra refroidir certaines
  zones. Je ne pense pas que ça amènera une glaciation ici, mais ça peut refroidir
  certaines zones sur la partie atlantique et ça peut conduire à ce que des espèces de
  poissons soient plus pêchables ou en effet, à ce que ça change un petit peu des
  écosystèmes. Ce n''est pas le risque le plus immédiat, mais il existe. Alors face
  à ça, qu''est-ce qu''on fait ? C''est ce qu''on appelle les politiques d''adaptation,
  c''est-à-dire qu''on adapte les choses en essayant d''anticiper. Mais ce qui doit
  aller en amont, c''est ce qu''on appelle les politiques d''atténuation, c''est-à-dire
  qu''on doit surtout traiter la cause et donc essayer de réduire tout ce qui crée
  ça. C''est nos émissions de gaz à effet de serre. C''est pour ça qu''on essaie tous,
  en train d''électrifier, de décarboner, d''adapter nos pratiques pour freiner ce
  réchauffement. J''ai été clair ? Oui ? Donc, à mon avis, pas de risque de glaciation
  à Chypre pour les prochaines années. Intervenant C''est une question un peu personnelle,
  mais pourquoi avez-vous voulu être Président de la France ? Emmanuel MACRON J''ai
  toujours aimé mon pays et je me suis toujours intéressé à la vie de mon pays. Mais
  ça, ça ne fait pas de toi un Président. Emmanuel MACRON Après, de plus en plus,
  je me suis passionné pour la politique. Après, j''ai fait des études qui m''ont
  amené, pas de manière directe, mais à être haut fonctionnaire. Puis après, j''ai
  vu le secteur privé. Je me suis intéressé à ce que faisait l''État. J''avais envie
  que mes idées puissent se réaliser. D''abord, j''ai conseillé d''autres Présidents.
  Après, j''ai été même ministre. Après, je me suis dit, on peut changer les choses
  plus fort, plus vite. Donc j''ai lancé un mouvement politique. Et puis, je suis
  allé à la présidence. C''est toujours pour faire des choses que je ne crois pas
  simplement utiles, mais c''est me battre pour que mon pays et puis notre Europe
  avancent, et puis [pour]défendre des valeurs auxquelles je crois. Donc c''est une
  affaire de passion. Ce n''est pas tellement un plan de carrière. Je n''ai pas fait
  de politique avant, et je n''en ferai pas après, tu vois ? Intervenant Et ça vous
  intéresse encore [de] progresser pour la France ? Emmanuel MACRON Chaque jour. Ce
  qui est, je vais te dire, le plus dur après neuf ans, c''est qu''il faut garder
  ce que tu as bien fait et essayer d''aller plus loin. Mais il faut parfois reprendre
  des choses que tu as mal faites. Parce qu''il y a des choses que tu as faites et
  puis tu n''as pas réussi, soit tu ne l''as pas bien expliqué, soit ce n''était pas
  la bonne chose qu''il fallait faire, soit on ne l''a pas faite assez vite. Il faut
  avoir l''énergie d''aller le reprendre et de se dire : « ça, on n''a pas bien réussi
  ». Tu vois ? Mais oui, bien sûr, jusqu''à la fin, sinon je le regretterais trop.
  Après, il y a des choses que tu réussis, d''autres que tu ne réussis pas, parce
  que tu as des contraintes, parce que parfois, tu arrives à convaincre. Tu ne fais
  pas les choses toute seule, donc quand tu n''arrives pas à convaincre, à emmener
  les gens, tu n''arrives pas à changer les choses. Il faut toujours, essayer, avoir
  des convictions et les porter avec sincérité. Toi, tu es chypriote ? Intervenant
  Moitié grecque et moitié française. Emmanuel MACRON Moitié grecque, moitié française.
  Et toi, tu es ? Directeur Peut-être une dernière question. Intervenant Bonjour,
  Monsieur le Président. Je suis un des éco-délégués de cette école. J’ai eu l''occasion de
  lire un article qui parlait des SMR. C''est un projet destiné pour l''année 2030.
  Juste, je voulais connaître votre opinion. Et ce changement d''énergie, comment
  ça va impacter la France et aussi l''Europe ? Emmanuel MACRON Vous savez ce que
  c''est les SMR ? Intervenant Oui, moi, je suis multinational. Je suis né ici, à
  Chypre, mais je suis moitié russe et moitié ukrainien. Emmanuel MACRON J''espère
  que la famille n''est pas trop déchirée ? Emmanuel MACRON SMR, tu expliques à tes
  camarades ce que c''est ? Intervenant Bien sûr, c''est des réacteurs nucléaires
  qui produisent de l''énergie nucléaire. En fait, le but de ces réacteurs, c''est
  de passer d''énergie fossile à l''énergie nucléaire. Emmanuel MACRON Alors, en fait,
  SMR, c''est vrai. Je vais essayer de vous expliquer en quoi ça joue. SMR, ça veut
  dire Small Modular Reactor. C''est des plus petits réacteurs avec des technologies qu''on
  stabilise. Certaines sont prêtes, d''autres sont à venir. Mais la question que tu
  poses, elle est en fait plus sur l''énergie nucléaire. Pour que vous compreniez,
  je vais essayer de le faire le plus simplement possible, sous le contrôle de plus
  grands physiciens que moi. En fait, pour faire fonctionner une société, nous, il faut
  de l''énergie. Vous en utilisez tout le temps : pour vous déplacer, pour vous chauffer
  à la maison, pour faire marcher la clim, pour faire tourner les usines, pour allumer
  la lumière. On utilise de l''énergie. Cette énergie, elle a plusieurs sources. Nous,
  notre défi, c''est d''avoir l''énergie qui est à la fois la moins chère possible,
  pour ne pas que vos parents payent trop cher et que les entreprises soient compétitives,
  une énergie plutôt qu''on produit chez nous pour ne pas dépendre. Vous voyez en
  ce moment ce qui se passe à Ormuz, ça nous touche parce que c''est une énergie qu''on
  ne produit pas, on prend leur gaz et leur pétrole. Puis d''essayer d''avoir l''énergie
  qui est la moins polluante, donc qui émet moins de gaz à effet de serre. Historiquement,
  on a fait beaucoup de tout ce que je dis là avec du charbon. C''est une énergie fossile,
  c''est-à-dire qu''elle vient de sous la terre, c''est des ressources périssables.
  Le charbon, il y en a encore dans le sol européen, mais c''est la pire des énergies
  en termes de pollution. C''est le truc qui pollue le plus au monde. Malheureusement,
  il y a encore des pays qui ont dû le rouvrir, à cause d''ailleurs de la guerre en Ukraine,
  parce qu''on voulait se passer du gaz russe. Mais le charbon, on essaie de s''en
  passer parce que c''est le plus polluant, ce n''est pas super compétitif, c''est
  vraiment des vieux machins. Il y a encore des pays qui utilisent beaucoup de charbon
  pour leur modèle, par exemple l''Inde, mais aussi la Corée. C''est un vrai problème.
  Notre priorité, si on voulait régler le climat à l''échelle de la planète, ce serait
  de faire sortir le charbon de tous ces pays émergents : Vietnam, Corée, Indonésie.
  Un peu mieux que ça, et qui est encore une énergie fossile, c''est-à-dire qu''on
  va chercher dans la terre qu''on extrait : le gaz. Vous en avez ici. Vous extrayez
  du gaz. Le gaz, c''est une énergie fossile aussi. Ça pollue, mais beaucoup moins
  que le charbon. C''est assez compétitif, mais c''est limité. Il n''y en aura pas
  à perpétuité, parce qu''encore une fois, ça pollue. On en a ici, mais on n''en a
  pas partout en Europe, et l''Europe, elle est dépendante de gaz. Elle est dépendante
  aujourd''hui, d''ailleurs, des États-Unis, qui sont devenus des gros producteurs,
  et du Golfe, confère ce qui se passe à Ormuz. Puis il y a une troisième source d''énergie
  qui est le nucléaire. Le nucléaire, ce n''est pas quelque chose qu''on extrait du
  sol, ce n''est pas une énergie fossile, c''est sur la base d''une réaction où on va
  concentrer beaucoup d''énergie. On va, grâce à l''énergie qui se dégage de cette
  réaction —j''essaie de simplifier au maximum — faire tourner des turbines, des réacteurs
  et, ce faisant, produire de l''électricité. Comme c''est une réaction qui est très
  puissante, le nucléaire, qu''on a stabilisé à la fin de la Deuxième Guerre mondiale
  et donc qui s''est développé dans les années 50-60, permet de produire des centrales
  nucléaires qui sont des énormes usines en quelque sorte. Alors elle produit cette
  réaction de manière très sécurisée et permet de faire tourner des réacteurs et donc
  de produire des grandes quantités d''électricité. Alors c''est des gros investissements
  au début, mais à terme, on les amortit, comme on dit. C''est-à-dire au bout de plusieurs
  décennies, c''est rentable. On le fait sur notre sol. La seule chose qu''il faut
  apporter, c''est l''uranium dont on a besoin. Là, pour le coup, c''est assez compétitif
  et souverain. Donc ça, c''est une bonne solution. C''est mieux que l''énergie fossile.
  Puis on a une autre famille de solutions qui est l''énergie renouvelable. Les sources
  d''énergie renouvelable : le solaire, les éoliennes, et l''éolien en mer. Toute
  notre stratégie, et c''est ce qu''on fait en France, c''est ce qu''on veut faire
  partout en Europe, c''est progressivement aller à zéro sur le charbon et remplacer
  partout où il y a du charbon par du renouvelable, peut-être du gaz, essayer de réduire
  notre dépendance au gaz et aller vers de l''économie d''énergie et des renouvelables
  et du nucléaire. Le nucléaire, on le développe en Europe. La France l’a. En France,
  75 % de l''électricité qu''on produit, elle est faite à base de nucléaire. Tu imagines ?
  Des pays comme la Pologne, des pays comme la République tchèque, ou d’autres, sont
  en train de redévelopper du nucléaire. D''autres font du renouvelable. Il faut un
  peu de tout. Donc les fameux SMR sont des petites centrales nucléaires. Elles sont
  donc plus abordables. Elles se produisent plus rapidement. Elles font moins peur.
  Les réseaux électriques peuvent les intégrer plus facilement. C''est des technologies
  qui vont arriver en effet sur le marché vers 2030. Elles vont pouvoir permettre
  d''abord à des pays qui n''ont pas encore de nucléaire d''en prendre, et donc peut-être
  de réduire la consommation d''énergie fossile. Elle va permettre donc de développer
  plus vite cela, et elle va permettre aussi de réduire la consommation d''énergie
  fossile pour des sites industriels ou des ports. Par exemple, les ports consomment
  beaucoup d''énergie fossile. Si on veut les électrifier, avoir un SMR, c''est bien.
  Après, quand on parle de SMR, il y a aussi différentes innovations techniques, mais
  là, je vais finir de vous achever, donc je ne vais pas trop développer. C''était
  à peu près clair ? Le combat, tout ce qu''on fait, c''est cette transition pour
  aller vers l''énergie renouvelable et vers le nucléaire, parce que c''est ce qui
  va baisser nos coûts. Allez, je prends la dernière question. Alors, toi et toi,
  ensemble, et puis je réponds et on file. Intervenant Bonjour, Monsieur le Président.
  Vous avez parlé d''une progression de l''Union européenne. Est-ce que vous pouvez
  envisager dans le futur une fédéralisation de l''Union européenne ? Intervenant
  Qu''est-ce que les jeunes comme nous peuvent faire pour promouvoir la paix dans
  le monde ? Emmanuel MACRON Merci pour ces deux dernières questions. Vos deux questions,
  elles sont d''ailleurs un peu liées. Pour moi, l''Union européenne, l''aventure
  européenne, c''est une aventure de paix, de prospérité, de démocratie et de souveraineté.
  Donc là, le défi de notre Europe, c''est d''être plus forte et plus indépendante.
  Pourquoi ? Parce qu''on a des États-Unis d''Amérique, qui ne nous protégeront plus
  dans la durée. On l''a bien vu, avec l''affaire du Groenland, avec ce qui se passe
  aujourd''hui en Iran, avec un peu ce qui se passe en Ukraine. Ils sont là encore,
  c''est formidable, c''est des alliés, mais l''Europe, elle s''est construite en
  pensant que pour toute l''éternité, les États-Unis nous protégeraient. Pour votre
  génération, je pense que ce sera plus vrai. On doit être indépendants sur le plan
  de notre défense et notre sécurité, plus fort. Deuxièmement, on dépend aussi des
  Américains sur les solutions technologiques, l''intelligence artificielle des réseaux.
  Est-ce que c''est bien de dire que nos cerveaux, nos solutions technologiques, non.
  Nous, Européens, on doit, si on veut continuer de décider pour nous-mêmes, les maîtriser.
  Puis, on voit aussi que la Chine est en train d''arriver, le conflit entre les deux
  se fait, on est un peu pris au milieu. La Chine arrive avec des produits de moins
  en moins chers, elle prend des parts de marché, elle nous impose ces produits parce
  qu''on est un peu naïfs, et de l''autre côté, les Américains mettent leurs tarifs
  et nous les mettent dessus aussi. Donc la bataille de l''Europe, là, c''est d''être
  plus indépendante, de moins dépendre. C''est à chaque fois de nous dire, dès qu''on
  fait quelque chose : est-ce qu''il y a une solution européenne ? Et à chaque fois
  qu''on choisit un non-européen, on perd du temps. On se trompe. Il faut continuer
  à être ouvert avec tous les autres, mais on doit renforcer nos liens pour avoir vraiment
  une indépendance européenne, qui est la clé. C’est ce qu''on appelle « la souveraineté
  », c''est-à-dire la capacité de décider pour nous-mêmes. Parce que si demain on
  n''est plus capable de nous protéger nous-mêmes, pour notre défense, si toutes nos
  solutions technologiques sont dans la main des autres, on pourra dire ce qu''on
  veut. On ne choisira plus. Mon obsession, c''est que vos générations puissent continuer
  de choisir en européen. Donc, il faut une Europe plus forte. Donc la clé, c''est
  d''abord ça. C''est une Europe qui sait se protéger, qui impose la préférence européenne,
  qui investit sur son avenir beaucoup plus qu''elle le fait aujourd''hui et qui décide
  sur les grands sujets technologiques, de défense et de sécurité, d''espace, d''intelligence
  artificielle, de santé, d''investir ensemble et de bâtir des solutions communes.
  Pour ça, est-ce qu''il faut un fédéralisme ? Non. Mais c''est une des options, certains
  la défendent. Moi, je suis assez attaché aux États-nations parce que je pense qu''ils
  sont aussi porteurs d''une souveraineté, d''une légitimité démocratique. Mais je
  suis un passionné d''Europe et je pense que le modèle qu''on a créé, il faut juste
  le rendre plus fort. Mais je n''exclus pas par principe l''idée de renforcer. On
  a créé avec la Commission européenne ce qu''on appelle des « pouvoirs fédéraux ».
  Elle décide au nom de tous sur certains sujets. Mais je pense que c''est bien encore d''avoir
  des États-nations avec leur identité, leur spécificité, et que tout ne soit pas
  décidé dans un centre lointain. Mais la bataille de l''Europe, notre bataille-là,
  c''est de faire de l''Europe une puissance plus indépendante, plus forte. C’est
  ça aussi qui maintiendra la paix, pour en venir à ta question. C''est une bataille
  de chaque jour. Je pense que la paix est menacée. Moi, je crois que votre génération
  a un rôle. Nous, d''abord, on a un devoir à votre égard pour la paix. Donc, je ne
  vais pas vous charger de quelque chose qui est notre travail. La réalité, c''est
  que c''est aux adultes d''assurer la paix pour que leurs enfants grandissent en
  paix. La honte que peut avoir ma génération de dirigeants, c''est d''être aussi
  peu efficace à assurer la paix pour votre génération. Vous, vous ne devriez pas
  avoir de soucis avec la guerre. C''est notre problème. Alors vous, qu''est-ce que
  je peux vous demander en plus de ce que vous subissez déjà ? D''abord, c''est de
  toujours rappeler que la paix doit primer à vos parents. Ensuite, moi, je dirais
  deux choses qui sont clés pour porter cette paix pour votre génération et pour la
  suite. La première, c''est de toujours chercher à comprendre les autres et d''être
  dans ce geste de partage, d''ouverture vers les autres cultures. C''est ce qu''est
  le projet européen, mais c''est aussi ce que vous faites ici, dans cette école,
  c''est le lien qu''il y a. Je pense que ça, c''est fondamental. La paix ne se décrète
  pas un beau matin. La guerre naît des malentendus, des incompréhensions ou de la
  folie de certains dirigeants et parfois de peuples qui pensent que leur sécurité
  viendra de la destruction du voisin. Ce qui fait la paix, c''est qu''on accepte
  de faire cet effort de comprendre nos différences, de créer un système où on se
  respecte mutuellement, mais où chaque partie fait l''effort de comprendre l''autre.
  Je pense que les jeunes que vous êtes, vous pouvez faire quelque chose de très important pour
  la paix d''aujourd''hui et de demain, c''est de continuer à comprendre les autres
  et d''avoir une certaine indulgence pour eux, parce qu''on comprend toujours moins
  bien l''autre que soi-même. C''est vrai de son voisin en classe, c''est vrai de
  son voisin de maison, c''est vrai des autres peuples. La clé, elle est là. Elle
  est d''avoir ce geste, d''essayer de comprendre, d''avoir cette tolérance. La deuxième
  chose, pour votre génération, c''est d''avoir le goût de l''avenir. Moi, ce qui
  me frappe, et c''est aussi pour ça qu''on mène ce combat pour les réseaux sociaux :
  « aime la guerre celui qui n''espère plus rien ». La paix, elle, suppose de respecter
  l''autre, ce que je viens de dire, mais la deuxième chose, c''est d''aimer l''avenir.
  Quand tu aimes l''avenir, tu n''as aucune envie de faire la guerre. Moi, je veux
  pour votre génération que vous aimiez l''avenir et que vous ne soyez pas trop angoissé
  par l''avenir. Je sais que là, aujourd''hui, il y a les sujets climatiques, il y
  a la guerre, il y a ces réseaux sociaux. Votre génération, elle subit une pression
  des contenus que ma génération n''avait pas. On vivait beaucoup plus dans l''innocence.
  Vous avez droit quand même à votre part d''innocence. Donc ne soyez pas trop inquiets
  des problèmes du monde, mais aimez l''avenir et chérissez-la. Voilà. Ça, c''est
  mes deux conseils pour nous aider et vous aider pour la suite. À nous de faire le
  boulot à court terme, mais vous, essayez toujours de comprendre l''autre et aimez
  l''avenir. Merci beaucoup pour votre temps. Merci beaucoup pour cet échange. Bon
  courage pour la suite. Ne soyez pas inquiets. Intervenant C''est possible d''annuler
  le Bac ? Enfin, le chef de l''État a participé à une réunion puis à un dîner dans
  le cadre du Conseil européen informel à la Marina d''Ayia Napa.'
