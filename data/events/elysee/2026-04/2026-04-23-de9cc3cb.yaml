date: '2026-04-23'
type: press_release
source_name: elysee
title: 'Déplacement à Chypre : première journée.'
text: 'Le Président de la République s''est rendu à Chypre à l''occasion de la réunion
  informelle du Conseil Européen, le 23 et le 24 avril 2026. Il a débuté sa visite
  à Chypre par une séquence bilatérale qui a permis une discussion approfondie avec
  le Président Nikos Christodoulides. Ils ont abordé les enjeux liés au partenariat
  stratégique entre les deux pays , la stabilité régionale en Méditerranée orientale
  et la situation au Proche-Orient et au Moyen-Orient. Le chef de l''État et le Président
  Nikos Christodoulides ont aussi évoqué le bilan à mi-parcours de la présidence chypriote
  du conseil de l''UE et nos priorités européennes, en particulier le soutien à l''Ukraine
  et l''agenda européen de compétitivité . Merci beaucoup, Monsieur le Président,
  cher Nikos. Mesdames et Messieurs les ministres, Madame l''Ambassadrice, Monsieur
  l''Ambassadeur, Mesdames et Messieurs. Permettez-moi d''abord, cher Président, cher
  Nikos, d''avoir un mot pour le sergent Anicet Girardin qui a succombé, hier, à ses
  blessures lors d''une attaque contre la FINUL samedi dernier. Une attaque inacceptable,
  commise selon toute vraisemblance par le Hezbollah, qui a également coûté la vie
  à l''adjudant Montorio, à qui la nation vient de rendre hommage. Je veux ici adresser
  mes condoléances sincères à sa famille, ses frères d''armes et avoir une pensée
  aussi pour nos autres soldats blessés. Nous attendons évidemment des autorités libanaises
  que toute la lumière soit faite sur cette attaque, que les auteurs soient identifiés,
  arrêtés et puissent répondre de leurs crimes. Monsieur le Président, merci pour
  les mots que vous venez d''avoir et pour l''accueil qui est fait à la France aujourd''hui,
  juste avant ce sommet informel et sous votre présidence au Conseil européen. Monsieur
  le Président, c''est pour ma délégation et moi-même, un véritable bonheur d''être
  à vos côtés, parce que cela compte et parce que la France aime Chypre. Notre rôle
  est d''être aux côtés de votre pays en effet quand les temps sont difficiles. Lors
  de ma visite le mois dernier, immédiatement après le déclenchement de la guerre
  au Moyen-Orient, nous nous sommes rendus ensemble, avec le Premier ministre grec,
  Kyriákos Mitsotákis, sur la base aérienne de Paphos, et nous y avons réaffirmé notre
  solidarité sans faille à l''égard de votre pays. Parce que c''est une solidarité
  à l''égard d''un ami, c''est aussi une solidarité européenne. C''est donner un contenu
  immédiat, très concret, à ce que vous venez de rappeler, c''est-à-dire ce que sont
  nos textes européens qui prévoient une telle solidarité. C''était la réaffirmation
  de notre détermination à sécuriser l''espace européen. J''ai dit de manière très
  simple, le 9 mars dernier, lorsque Chypre est attaquée, c''est l''Europe qui est
  attaquée. Nous avons donc renforcé notre dispositif de défense dans la région, avec
  le déploiement rapide de moyens militaires, en particulier le groupe aéronaval français.
  C''est avec constance ces dernières années que nous avons agi à chaque fois que
  la région a été sous tension. En 2021, aussi, nous étions aux côtés de la Grèce
  et de Chypre quand d''autres formes de tensions s''exerçaient en Méditerranée orientale.
  En tout cas, ce soutien est la manifestation concrète de la solidarité qui nous
  lie entre membres de l''Union européenne et de la relation franco-chypriote que
  nous avons rehaussée en décembre dernier au rang de partenariat stratégique. C''était
  votre volonté, dès le premier jour, je me souviens très bien, de votre élection.
  La France est fière d''être l''un des partenaires privilégiés de Chypre en matière
  de défense, tant au plan opérationnel que pour la fourniture d''équipements et d''armements.
  Nous venons d''évoquer à l''instant avec Monsieur le président le renforcement de
  cette coopération avec de nouveaux partenariats, les perspectives à venir avec l''accord
  SOFA qui sera signé en juin et une volonté, ensemble, d''avancer. Ceci est aussi
  cohérent avec le rôle que vous avez joué et que vous continuez de jouer pour nous-mêmes
  et beaucoup d''Européens ces dernières années, puisque votre soutien a été à chaque
  fois indispensable lors des opérations d''évacuation de nos ressortissants au Proche-Orient.
  Je tiens ici à vous remercier une fois encore de tout ce qui a été fait durant ces
  dernières années par votre pays. C''est pourquoi c''est un partenariat stratégique
  équilibré, pertinent. Il a, 4 mois après sa signature, déjà porté ses fruits dans
  de nombreux domaines. En matière de sécurité et de défense, je l''ai dit, où d''ailleurs
  nous mobilisons les instruments européens, comme le programme SAFE, au service de
  ces capacités, mais dans les secteurs des infrastructures, de la transition écologique,
  où des entreprises françaises et chypriotes travaillent étroitement au développement
  de solutions innovantes. Et je salue la signature récente d''un accord dans le domaine
  spatial entre Hellas Sat, le CNES, Safran et Thales Alenia Space. Plusieurs entreprises
  françaises sont directement impliquées dans des projets d''ampleur à Chypre, notamment
  Bouygues et Egis, les aéroports de Nice, chargés de la gestion de l''agrandissement
  des aéroports de Larnaca et de Paphos, TotalÉnergies dans le domaine gazier, avec
  un projet important. Le grand port maritime de Marseille Fos et l''autorité des
  ports de Chypre ont également conclu un accord pour accélérer la décarbonation des
  activités du port de Limassol. Dans le domaine de la sécurité civile, l''expertise
  française est engagée auprès de nos partenaires chypriotes, notamment pour soutenir
  les efforts de lutte contre les feux de forêt, défi que nos deux pays doivent relever
  chaque été. Et puis, nous avons une relation qui s''est intensifiée ces dernières
  années en matière de recherche. Une partie de la délégation qui m''accompagne d''ailleurs,
  travaille sur ces sujets, et notre institut de recherche, mais également une coopération
  remarquable dans le domaine éducatif. Nous irons visiter tout à l''heure l''école
  franco-chypriote de Nicosie, qui connaît une très forte croissance, avec aussi un
  développement rapide de son deuxième campus à Limassol. Et là aussi, nous poussons
  les murs, si je puis dire. Nous avons aussi, avec le président, parlé de la suite.
  C''est, je crois, un formidable investissement d''avenir. Tout ça est au service
  d''une relation bilatérale qui atteint un niveau historique. Nous nous en réjouissons,
  le président et moi-même, que nous voulons encore densifier avec des projets d''interconnexions,
  des projets d''énergie et, au fond, en reconnaissant le rôle qu''a Chypre dans la
  Méditerranée orientale, d''être aussi ce point de passage entre notre Europe et
  les rives de Méditerranée orientale des autres continents. C''est pourquoi tous
  les projets d''interconnexions verront la France à vos côtés en termes de soutien
  pour des financements européens, de partenariats industriels et opérationnels. C''est
  aussi pour cela, vous l''avez rappelé, Monsieur le président, que le projet IMEC,
  de Bombay à Marseille, passe mécaniquement par votre pays et par des partenariats
  que nous souhaitons renforcer en matière de transport maritime, en matière de connexion
  énergétique, en matière de connexion et de transmission de données qui sont, je
  dirais, trois segments sur lesquels le partenariat bilatéral est aussi au service
  de cette intégration plus large d''un point de vue régional. Nous œuvrons aussi
  ensemble dans la région, dans un contexte évidemment bousculé, je veux remercier
  le président pour son engagement constant, d''abord pour discuter avec toutes les
  parties prenantes, comme le fait la France, et au fond, nous avons une posture depuis
  le premier jour qui est claire. Nous appelons au respect du droit international,
  nous voulons la désescalade et la reprise de négociations. Nous sommes venus en
  soutien des pays du Golfe qui ont été attaqués directement par l''Iran. Nous avons
  pris nos responsabilités, nous avons protégé nos ressortissants et nous œuvrons
  au retour de la paix avec, je dirais, deux questions qui sont importantes pour nos
  deux pays, sur lesquelles nous avons beaucoup fait ensemble. La première, c''est
  celle de la liberté de navigation et tout le travail qui a été fait pour la réouverture
  pacifique d''Ormuz. Votre pays était aux côtés du Royaume-Uni et de la France, parmi
  les 49 nations qui se sont réunies la semaine dernière pour, justement, bâtir ce
  cadre de coopération pacifique et permettre de construire le cadre d''une réouverture
  dans la durée d''Ormuz, diplomatique, militaire, mais aussi technique et financière,
  pour assurer la reprise du trafic, ô combien importante pour le commerce international,
  nos économies, le prix du gaz et du pétrole. C''est aussi dans ce même esprit que
  nous œuvrons ensemble aux côtés du Liban. Et vous avez pris une excellente initiative
  en faisant venir demain le Président Aoun, qui sera à nos côtés avec le prince héritier
  de Jordanie, le Président de la Syrie et le Président de l''Égypte. Mais le Liban,
  en effet, est aujourd''hui sous une très forte pression et nous œuvrons tous pour
  que d''abord le cessez-le-feu soit prolongé. C''est ce que nous défendons. Pour
  que les négociations puissent se faire dans un cadre adapté, c''est-à-dire évidemment
  entre le Liban et Israël, mais qu''elles puissent inclure tous les pays de la région
  qui sont pertinents pour la sécurité et la stabilité du Liban dans la durée, et
  pour que nous puissions véritablement bâtir les conditions d''une paix durable qui
  respecte la souveraineté du Liban, son intégrité territoriale et qui désarme durablement
  le Hezbollah. À ce titre, je veux ici confirmer, puisque j''ai eu l''occasion il
  y a 48 heures de recevoir le Premier ministre Nawaf Salam à Paris, que la France
  se tient prête, au moment où le Liban en jugera opportun, d''organiser une conférence
  de soutien et de mobilisation de tous pour soutenir le Liban dans cet effort justement
  de reprise de souveraineté et que nous organiserons cette conférence qui aura tout
  à la fois vocation à soutenir les forces armées libanaises et à aider à la reconstruction
  du sud Liban, lesquelles sont indissociables. Et ceci serait aussi l''occasion de
  mobiliser davantage les financements européens et nous soutenons l''un et l''autre
  l''idée d''un accord de partenariat de l''Union européenne avec le Liban dans ce
  contexte, qui pourrait d''ailleurs venir se cristalliser au moment de cette conférence,
  comme on a su le faire ces dernières années, à chaque fois avec une aide remarquable
  de votre part, Président, avec la Jordanie ou avec l''Egypte. C''est le moment d''aider
  le Liban, c''est le moment d''être aux côtés de cette région et de le faire avec
  cette vocation de paix que nous venons d''évoquer. De la même manière, nous continuerons
  évidemment d''œuvrer ensemble pour l''Ukraine et son soutien. Je veux ici féliciter
  la présidence Chypriote. Le déblocage du prêt de 90 milliards d''euros à l''Ukraine,
  agréé en décembre dernier, va devenir une réalité, et c''est une très bonne chose,
  et je fais confiance à votre leadership. Et nous aurons l''occasion ce soir, puisque
  vous avez invité le Président Zelensky, de poursuivre les échanges avec l''Ukraine
  et l''agenda, à la fois de soutien à l''Ukraine, de pression sur la Russie avec
  des nouvelles sanctions, mais avec aussi une action déterminée à l''égard de la
  flotte fantôme russe. Notre travail conjoint aussi au sein de la coalition des volontaires
  doit permettre d''apporter aussi des garanties de sécurité robustes à l''Ukraine,
  ce qui est un travail indispensable que nous devons poursuivre. Et puis, je veux
  ici aussi dire un mot de ce que nous tiendrons à la fois ce soir et demain, c''est-à-dire
  ce sommet informel, et remercier à nouveau votre présidence pour tout le travail
  qui est fait en commun. Au fond, nous sommes dans un moment d''indépendance à renforcer
  et de souveraineté européenne, et c''est absolument indispensable. Et donc les travaux
  que nous aurons à conduire viendront, si je puis dire, au soutien de cet agenda,
  dont vous venez de rappeler l''importance, dans la région, à l''égard de l''Ukraine,
  d''accélérer notre agenda de simplification et de compétitivité, qui est absolument
  clé. Et cet agenda doit se traduire par des avancées concrètes, la simplification
  que nous avons décidée et qui doit rentrer en vigueur, une politique ambitieuse
  de souveraineté sur les aspects technologiques les plus importants et un budget
  qui réponde à cette ambition de souveraineté par des finalités claires et des moyens
  là aussi clairs, et la mise en place d''une union de l''épargne et de l''investissement,
  qui est un élément indispensable de cette compétitivité européenne, en même temps
  qu''une préférence européenne que nous soutenons dans ce contexte. Sur tous ces
  points, nous aurons l''occasion de débattre, ce soir et demain, d''avancer, mais
  je veux ici dire l''importance, en effet, de votre présidence pour une Europe plus
  forte, plus souveraine. Voilà, monsieur le Président, ce que je souhaitais ici rappeler.
  Nous aurons l''occasion, dans un instant, d''être aux côtés des enfants et des adolescents
  et de soutenir les initiatives bilatérales éducatives, mais de rappeler aussi l''importance
  d''un autre agenda qui est aussi à défendre au niveau européen, qui est la protection
  de nos enfants face aux réseaux sociaux. En tout cas, je veux à nouveau, cher Nikos,
  vous remercier pour votre accueil, pour l''amitié, pour le partenariat stratégique
  qui met notre relation bilatérale à son plus haut, vous dire la fierté qui est la
  nôtre d''être à vos côtés aujourd''hui, et sur le plan bilatéral, sur le plan européen
  comme sur le plan régional, de continuer à avancer ensemble pour une Europe plus
  forte et indépendante au service de nos deux pays et pour une région en paix. Merci
  beaucoup, Monsieur le Président, cher Nikos. Mesdames et Messieurs les ministres,
  Madame l''Ambassadrice, Monsieur l''Ambassadeur, Mesdames et Messieurs. Permettez-moi
  d''abord, cher Président, cher Nikos, d''avoir un mot pour le sergent Anicet Girardin
