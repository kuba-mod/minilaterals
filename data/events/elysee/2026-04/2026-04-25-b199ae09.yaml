  de soi. Nous, Européens, nous doutons trop de nous-mêmes. Pour les Français, quand
  on vient en Grèce, c''est formidable, on retrouve de l''estime de soi parce que
  vous nous aimez. Venez en France, vous retrouverez de l''estime de vous-mêmes parce
  que vous y êtes aimés. Mais nous, Européens, apprenons à nous aimer nous-mêmes et
  à avoir confiance en nous, beaucoup plus qu''on ne le fait aujourd''hui, parce que
  nous avons dans nos mains des tas d''atouts. Alors ayons en quelque sorte avec nous-mêmes
  la bienveillance et l''amitié que nous avons l''un envers l''autre, parce que c''est
  ça ce qui nous permet d''aller de l''avant. Regardez comment les Indiens, les Canadiens,
  les Singapouriens, les Africains, les Latino-Américains nous regardent, nous, Européens,
  comme des gens qui respectent l''état de droit, comme des gens qui respectent l''ordre
  international, comme des grandes civilisations qui en même temps croient dans l''innovation,
  qui ne croit pas dans l''hégémonie de quelques-uns, mais dans le respect à l''égard
  de tous et qui continue d''innover. Cette plateforme est extraordinaire pour continuer
  non pas de conquérir le monde, mais de croître, de bâtir du progrès en ayant une
  certaine vision du monde qui est la nôtre, respectueuse, équilibrée. Alors croyons
  en nous et continuons d''aller de l''avant. Mais merci infiniment d''être là à toutes
  et tous et vive l''amitié entre la Grèce et la France. Monsieur le Premier ministre,
  cher Kyriákos, merci beaucoup. Mesdames, Messieurs les ministres, Madame l’ambassadrice,
  Monsieur l’ambassadeur, Mesdames, Messieurs les parlementaires, Monsieur le président
  de la Fédération hellénique des entreprises, Monsieur le président de la Chambre
  de commerce et d’industrie France-Grèce, Mesdames et Messieurs, en vos grades et
  qualités, chers amis. D''abord, je suis ravi de revenir dans ces lieux. Je viens
  presque à chaque fois que je viens en Grèce, Monsieur le Premier ministre, et de
  revenir pour ce forum économique France-Grèce. Je veux ici remercier à mon tour
  la Fondation Niarchos, la Fédération hellénique des entreprises, la Chambre de commerce
  et d''industrie franco-hellénique, ainsi que Business France et les équipes et les
  délégations organisées. Vous avez à peu près tout dit, monsieur le Premier ministre.
  Je vais essayer de prendre les choses par un autre angle, mais au fond, comme vous
  allez le comprendre, et je crois, comme je l''espère, vous le sentez depuis hier,
  nous sommes essentiellement d''accord et quasiment sur tout. En tout cas, le premier
  point, et c''était l''objectif de ce forum, et c''est ce qui vous lie, ce qui nous
  lie, la relation entre nos deux pays est à un niveau historiquement élevé. Elle
  s''appuie sur un travail ces dernières années important, et je pense que votre mobilisation
  aujourd''hui, les rencontres qui se sont tenues, les accords que vous signez, jouent
  un rôle extrêmement important, et je ne saurais trop vous encourager à aller de
  l''avant. En effet, d''abord, il y a deux aventures économiques qui sont à l''œuvre.
  La Grèce, ces dernières années, a été un formidable succès de politique économique.
  Nul n''a oublié la crise que vous avez traversée. La France, vous le savez, a toujours
  été à vos côtés, aux côtés de la solidarité au sein de la zone euro, face à un choc
  qui était asymétrique, de devoir tous se tenir ensemble, et vous avez mené des réformes
  extrêmement courageuses, extrêmement fortes, et tout le monde doit regarder en face
  le formidable succès. Votre croissance a été supérieure à la moyenne de l''Union
  européenne, le chômage a diminué de 15 points, le désendettement a été spectaculaire,
  et donc c''est un formidable symbole de réussite économique qui est votre pays.
  Et je le dis pour toutes les entreprises et investisseurs français qui sont là,
  ou qui, n''étant pas là encore, doivent regarder la Grèce avec ces yeux nouveaux.
  C''est une formidable réussite. Je dois dire que l''élection récente de Kyriakos
  Pierrakakis à la présidence de l''Eurogroup, en quelque sorte, est venue sceller
  cette confiance et cette reconnaissance. De notre côté, vous avez eu la gentillesse
  de rappeler, monsieur le Premier ministre, la résilience de l''économie française,
  mais le fait que nous avons concentré notre politique ces dernières années sur la
  baisse du chômage, la création d''activités, 2 millions d''emplois marchands créés,
  la réindustrialisation, qui, malgré le contexte difficile, produit ses résultats,
  et l''innovation et l''attractivité. La France est le pays le plus attractif d''Europe
  depuis six ans sans discontinuer, et le pays qui crée le plus de start-up et parvient
  à les faire le plus croître, en même temps que nous restons un hub d''énergie décarbonée.
  Cette stratégie, d''ailleurs, nous lie aussi. Nous l''avons bien vu parmi les accords
  signés aujourd''hui. Et donc tout ça doit nous faire regarder l''un l''autre avec
  des yeux un peu différents, peut-être des histoires habituellement racontées, et
  renforcer les relations bilatérales. Alors, je le disais, elles n''ont jamais été
  aussi élevées, à la fois en termes de biens comme de services et d''investissement.
  Et ce qui a été signé ces dernières heures ou ces derniers jours vient évidemment
  le densifier. Il y a plus de 200 entreprises françaises qui comptent près de 17
  000 salariés implantés en Grèce. Les investissements en Grèce sont en constante
  augmentation depuis une décennie, jusqu''à atteindre un peu plus de 2 milliards
  d''euros. Et ce qui a été signé par ces dernières années, Naval Group, Dassault,
  MBDA ce matin en matière de défense, en matière d''intelligence artificielle par
  Mistral IA. Ce que nous avons fait dans les infrastructures, infrastructures numériques,
  l''infrastructure Meridium a investi, les énergies renouvelables avec l''investissement
  d''Akuo dans les parcs éoliens, les services financiers, avec Euronext et la bourse
  d''Athènes. Tout ça vient en quelque sorte, scander ce parcours. Néanmoins, je veux
  le dire ici aux entreprises qui sont là et aux investisseurs très clairement, nous
  ne sommes pas au niveau d''investissement et d''échanges qu''on devrait avoir compte
  tenu de l''amitié qui est entre nous et des histoires économiques que nous avons
  écrites ces dernières années. Quand je regarde le stock et le niveau, on doit faire
  et on peut faire beaucoup mieux. Il faut vraiment que vous continuiez de multiplier
  ces rendez-vous, de convaincre d''autres partenaires, mais je suis vraiment convaincu
  qu''on peut faire et qu''on doit faire encore davantage. Quand je regarde aujourd''hui
  le niveau des investissements français en Grèce, il n''est pas du tout au niveau
  qu''il devrait atteindre. Quand je regarde le niveau d''investissement des grandes
  entreprises et investisseurs grecs en France, c''est la même chose. Alors, pourquoi
  faire plus ? D''abord parce que, je viens de le dire, nous avons une histoire économique
  récente qui doit redonner confiance aux investisseurs et aux acteurs économiques
  des deux côtés. Ensuite, parce que nous avons des intérêts stratégiques qui nous
  rapprochent. Et c''est plus fort que tout dans un moment où, à coup sûr, la géopolitique
  a repris le dessus sur l''économie et la géoéconomie. Le Premier ministre l''a parfaitement
  rappelé. Nous avons en 2021 signé ce partenariat stratégique. On ne l''a pas simplement
  reconduit aujourd''hui, on l''a renforcé dans tous les domaines du jeu. Mais ce
  qu''on fait ensemble en matière de défense et de sécurité, maintenant en matière
  d''énergie, on signe des accords sur le renouvelable. On a aussi signé un partenariat
  sur le nucléaire civil pour avancer, regarder ce qu''on fait en matière d''investissement,
  d''infrastructures, de culture, d''éducation, de recherche. Tout ça crée une intimité
  et un alignement d''intérêts qui doit renforcer les relations économiques. Les entrepreneurs
  et investisseurs que vous êtes doivent regarder la relation entre nos deux pays
  comme une relation qui est aujourd''hui clé, parce que nous avons la même lecture,
  en quelque sorte, de la dynamique géopolitique. La sécurité de la Grèce est clé
  pour la France, et réciproquement. Nous avons une politique très affinitaire au
  Proche et Moyen-Orient. Nous avons la même volonté de défendre la paix et la stabilité
  sur le continent européen et la même conscience que nous devons renforcer la sécurité
  de notre Europe. Ceci est une deuxième raison d''investir. La troisième, c''est
  que quand je regarde un peu le monde, on voit bien ces désordres. Nous avons les
  guerres, les déstabilisations, mais on a aujourd''hui une confrontation qui est
  en train de monter entre les deux grandes puissances. Les Etats-Unis d''un côté,
  avec lesquels nous gardons des liens privilégiés au sein de l''OTAN par notre histoire,
  nos valeurs, les liens économiques qui nous lient, et de l''autre côté la Chine,
  avec lesquelles aussi d''ailleurs nos deux pays ont des relations très fortes et
  qui aujourd''hui a des véritables solutions technologiques, économiques, mais est
  dans une logique de surcapacité qui vient nous bousculer. Ces deux puissances sont
  en train de rentrer, qu''on le veuille ou non, et sont rentrées depuis plusieurs
  années dans une confrontation géoéconomique et géopolitique. C''est d''ailleurs
  cette confrontation qui fait que les États-Unis, depuis 15 ans, se détournent progressivement
  de notre Europe. C''est aussi cela qui fait monter les tensions un peu partout.
  Face à ça, je crois pouvoir dire que nos deux pays ont le même pragmatisme. C''est-à-dire
  que nous défendons une vision qui n''est absolument pas confrontationnelle ni avec
  la Chine ni avec les Etats-Unis, mais qui veut renforcer l''indépendance de l''Europe,
  l''indépendance de nos pays et l''indépendance de notre continent. C''est le cœur
  de notre stratégie en matière de défense, en matière de technologie, en matière
  de finances. Dans le même temps, nous voulons aussi bâtir des partenariats nouveaux
  avec d''autres pays, et en quelque sorte, nous croyons à ce que j''avais appelé
  il y a quelques mois une coalition des indépendants qui, du Pacifique allant jusqu''au
  Canada, crée une forme de diagonale des économies et en particulier des démocraties
  qui ne veulent pas dépendre. Dans ce cadre-là, la France et la Grèce ont un positionnement
  tout à fait singulier. Nous avons un positionnement, je crois pouvoir le dire, central
  dans ce grand projet qui s''appelle IMEC. Gérard qui est là et qui porte ce projet
  sous secrétariat pour la France. Mais dans le cadre du G20 indien, nous avions lancé
  ce projet d''aller de l''Inde à la Méditerranée. C''est un projet qui relie cette
  immense démocratie émergente qu''est l''Inde, en passant par les pays du Golfe,
  traversant la Méditerranée et allant jusqu''à Marseille. Ce projet nous lie, mais
  il est porteur, il est en quelque sorte le cœur de développement de cette coalition
  des indépendants. Mais c''est un projet qui relie énormément de projets, énormément
  d''investissements potentiels en matière de défense et de sécurité, en matière de
  connexion, évidemment du transport maritime, mais également d''énergie, de données,
  de numériques, et qui va nous permettre dans les années à venir de structurer des
  partenariats nouveaux, de lancer des investissements massifs et de lier véritablement
  nos deux pays encore davantage parce que nous serons moteurs dans le développement
  et dans le déploiement de l''IMEC. Le tout dernier point que je voulais faire, je
  viens de le dire, c''est aussi que nous avons la même stratégie, la même vision
  de ce que doit être cette Europe plus indépendante, plus souveraine en matière économique.
  Je crois que pour vous, c''est important de le comprendre, de le mesurer et, en
  quelque sorte, de le fertiliser par vos choix, vos investissements, vos partenariats.
  La conviction que nous portons avec le Premier ministre, il vient de l''exprimer,
  elle est au fond simple et claire. Si on veut une Europe qui ne dépend pas, qui
  continue d''aller de l''avant, qui bâtit ses propres solutions, qui sait se défendre,
  qui sait innover, qui sait créer des emplois industriels, mais aussi agricoles,
  technologiques, et qui, pour nos enfants, bâtit des solutions pleinement souveraines,
  c''est-à-dire européennes. Quelle est la stratégie ? Première chose, nous devons
  simplifier, être plus compétitifs. Aucune chance d''avoir des solutions européennes
  si on est deux fois plus cher que les voisins. Aucune chance si on est deux fois
  plus lent. Et donc, l''agenda de simplification que nous menons dans nos deux pays,
  et que nous menons aussi au niveau européen, avec ces textes européens qu''on est
  en train de faire pour enlever des réglementations devenues caduques ou excessives,
  avec ce que nous sommes en train de faire pour le 28e régime, pour les entrepreneurs,
  avec ce que nous sommes en train de faire pour approfondir ce qu''on appelle le
  marché unique, c''est-à-dire réduire les barrières et aller plus vite, est clé.
  Et à cet égard, nous avons montré l''exemple avec une des grandes simplifications
  qui est le marché des capitaux et de l''investissement, et ce qui a été fait entre
  la Bourse d''Athènes et Euronext, c''est une réalisation très concrète de ce chemin
  qu''on veut faire et qu''on veut mener à l''échelle de toute l''Europe. Le deuxième
  élément, c''est de protéger. Ce n''est pas un gros mot, mais c''est que les entrepreneurs
  que vous êtes le savez très bien chaque jour. Notre Europe aujourd''hui, elle est
  très compétitive, mais elle doit l''être davantage, elle est très ouverte et parfois
  elle est beaucoup plus ouverte que les voisins. Quand vous avez des Américains qui
  nous mettent des tarifs, quand vous avez des Chinois qui sur subventionnent certains
  secteurs, qui viennent d''ailleurs littéralement percuter le secteur de la machine-outil
  ou de l''automobile en Europe, parce qu''ils font du dumping, qu’ils viennent monopoliser
  le secteur des minerais critiques et des terres rares et créer des dépendances dans
  beaucoup de secteurs d''activité, on ne peut pas rester inerte et dire : non, non,
  nous, on va être les derniers au monde à respecter les règles de l''Organisation
  mondiale du commerce, parce que le résultat de tout ça, ce sera la désindustrialisation
  européenne. Donc on doit protéger par des clauses de sauvegarde, des clauses miroirs,
  la protection de certains secteurs stratégiques et une préférence européenne qui
  est clé, qui consiste à dire : dans certains secteurs, on doit protéger la chaîne
  de valeur européenne. C''est fondamental et c''est à faire maintenant. Troisième
  élément, c''est de continuer de nous diversifier. On ne doit pas dépendre d''un
  seul. Et c''est au cœur de notre ADN. Nous sommes deux grandes puissances maritimes.
  Et donc ce que nous sommes en train de faire dans tous les domaines du jeu, c''est
  une diversification de nos ressources par d''autres partenariats. Ce qu''on a fait
  à l''instant, enfin à l''instant, il y a quelques semaines avec l''Inde par exemple,
  ce qu''on est en train de poursuivre avec d''autres, ce qu''on veut faire aussi
  avec le CPTPP qui va donc du Canada au Pacifique, ce sont des logiques de diversification
  de nos accords pour moins dépendre. Et puis, la dernière chose, c''est d''investir.
  Et ça, c''est fondamental, et je terminerai sur ce point, c''est au cœur de notre
  stratégie à l''un et à l''autre, et ça doit nous pousser à aller encore plus vite
  et faire davantage. Notre Europe a besoin de plus d''investissements publics et
  privés. Et dans nos deux pays qui sont beaucoup plus attractifs qu''il y a 10 ans,
  avec un chemin très différent, nous devons mobiliser davantage d''investissements
  privés et les attirer chez nous, mais on doit aussi réussir à mobiliser plus d''investissements
  publics européens, et c''est au cœur de ce qu''on va faire ensemble. L''investissement
  privé, c''est simple, c''est cette Union des marchés de capitaux, fondamentale,
  c''est une logique d''attractivité des capitaux étrangers pour fertiliser nos stratégies.
  Et puis, l''argent public, c''est celui qu''on doit mobiliser au niveau européen.
  Et nous avons avec le Premier ministre la même vision des choses. On a besoin d''un
  budget européen beaucoup plus ambitieux, qui continue de défendre nos politiques
  de cohésion, notre agriculture, mais qui porte dans les domaines que vous avez évoqués
  aujourd''hui une volonté d''investissement massive en matière d''énergie, renouvelable
  et nucléaire, dont notre Europe a besoin, en matière de défense et de sécurité dans
  tous les domaines du jeu, et en matière de rupture technologique, en particulier
  dans l''intelligence artificielle, le quantique et l''espace. La bataille se joue
  maintenant. Il y a une accélération comme rarement dans tous ces domaines du jeu.
  Cette accélération suppose des investissements massifs en termes d''innovation.
  Aujourd''hui, notre Europe investit beaucoup moins et beaucoup moins vite et que
  la Chine et que les États-Unis d''Amérique. À chaque fois que nous sommes plus lents,
  que nous investissons moins massivement, nous perdons des opportunités. C''est pourquoi
  nous allons défendre l''un et l''autre un budget européen ambitieux en la matière,
  mais qui vient compléter cette stratégie complète que je viens de présenter, simplification-accélération,
  protection-diversification, pour que notre Europe puisse aller chercher l''argent
  pertinent sur les marchés, avoir des ressources propres nouvelles pour pouvoir porter
  cette ambition. Le moment que nous vivons est un moment qui, s''ils le décident,
  peut appartenir aux Européens. Parce que nous avons justement la capacité d''être
  cette plateforme qui agrégera autour d''elle les démocraties et les émergents qui
  ne veulent pas dépendre des deux premières économies mondiales ou être les victimes
  de leurs confrontations. Cette position, c''est celle à laquelle nous croyons. C''est
  celle, en quelque sorte, que nous avons commencé à inventer par le partenariat stratégique
  franco-grec. C''est exactement ce qu''on a fait en matière de défense et de sécurité
  et qui est en train d''inspirer le reste de l''Europe. C''est celle que nous devons
  promouvoir. Et donc je voudrais que, par notre présence, en vous félicitant de ce
  forum, en regardant avec beaucoup de satisfaction la dynamique de la relation bilatérale,
  je voudrais vous convaincre qu''on doit réussir à faire deux, trois, quatre fois
  plus dans les années qui viennent entre nos deux pays et au niveau européen. Parce
  qu''au fond, notre seul défaut à nous, Européens, c''est qu''on a en quelque sorte
  pardonné cette référence quelque peu française, mais on a fini par mal comprendre
  ce qu''était le doute cartésien. C''est un doute méthodique, ce n''est pas le doute
  de soi. Nous, Européens, nous doutons trop de nous-mêmes. Pour les Français, quand
  on vient en Grèce, c''est formidable, on retrouve de l''estime de soi parce que
  vous nous aimez. Venez en France, vous retrouverez de l''estime de vous-mêmes parce
  que vous y êtes aimés. Mais nous, Européens, apprenons à nous aimer nous-mêmes et
  à avoir confiance en nous, beaucoup plus qu''on ne le fait aujourd''hui, parce que
  nous avons dans nos mains des tas d''atouts. Alors ayons en quelque sorte avec nous-mêmes
  la bienveillance et l''amitié que nous avons l''un envers l''autre, parce que c''est
  ça ce qui nous permet d''aller de l''avant. Regardez comment les Indiens, les Canadiens,
  les Singapouriens, les Africains, les Latino-Américains nous regardent, nous, Européens,
  comme des gens qui respectent l''état de droit, comme des gens qui respectent l''ordre
  international, comme des grandes civilisations qui en même temps croient dans l''innovation,
  qui ne croit pas dans l''hégémonie de quelques-uns, mais dans le respect à l''égard
  de tous et qui continue d''innover. Cette plateforme est extraordinaire pour continuer
  non pas de conquérir le monde, mais de croître, de bâtir du progrès en ayant une
  certaine vision du monde qui est la nôtre, respectueuse, équilibrée. Alors croyons
  en nous et continuons d''aller de l''avant. Mais merci infiniment d''être là à toutes
  et tous et vive l''amitié entre la Grèce et la France. Enfin, les deux dirigeants
  ont visité l''exposition « À la recherche de l’Orient. Parcours croisés d’archéologues
  » , dans le cadre de la célébration du 180e anniversaire de la fondation de l''École
  française d''Athènes .'
