date: '2026-04-25'
type: press_release
source_name: elysee
title: 'Déplacement en Grèce : deuxième journée.'
text: 'Le Président de la République s''est rendu en Grèce à l''occasion d''une visite
  officielle, le 24 et le 25 avril 2026. Le 25 avril, en début de matinée, le Président
  Emmanuel Macron et le Premier ministre grec Kyriákos Mitsotákis se sont rendus au
  Port du Pirée pour visiter la frégate Kimon , construite par Naval Group à Lorient
  et livrée à la Grèce en janvier 2026. Puis les deux dirigeants se sont rendus au
  Palais Maximou à Athènes pour un entretien suivi de la signature de plusieurs accords
  et d''une conférence de presse . 22 juillet 2026 - Seul le prononcé fait foi Thank
  you. Thank you, Mister Prime Minister Kyriákos. Thank all of you. I''m very happy
  and very proud to be here with my ministers and my delegations. I think what obviously
  the friendship between our two countries and the balance comes from over the centuries,
  but I think we are clearly transforming relationship. Since 2021, given the, I mean,
  the challenges we are facing, we are building a new comprehensive partnership. It''s
  indeed global and strategic partnership. It''s different in security, obviously,
  that we will sign that from all different capacities. It''s about energy, it''s
  about economy, it''s about culture, it''s about innovation. This is why our partnership
  is so important, obviously for your country, which is at the forefront of some of
  the key challenges for the Europeans, but for our countries. I want to tell you
  that my words yesterday and I expressed true commitment from France, and you can
  count on us. Thank you. 22 juillet 2026 - Seul le prononcé fait foi Thank you. Thank
  you, Mister Prime Minister Kyriákos. Thank all of you. I''m very happy and very
  proud to be here with my ministers and my delegations. I think what obviously the
  friendship between our two countries and the balance comes from over the centuries,
  but I think we are clearly transforming relationship. Since 2021, given the, I mean,
  the challenges we are facing, we are building a new comprehensive partnership. It''s
  indeed global and strategic partnership. It''s different in security, obviously,
  that we will sign that from all different capacities. It''s about energy, it''s
  about economy, it''s about culture, it''s about innovation. This is why our partnership
  is so important, obviously for your country, which is at the forefront of some of
  the key challenges for the Europeans, but for our countries. I want to tell you
  that my words yesterday and I expressed true commitment from France, and you can
  count on us. Thank you. Merci, Monsieur le Premier ministre, cher Kyriákos, Mesdames,
  Messieurs les ministres, Madame l''ambassadrice, Monsieur l''ambassadeur, Mesdames
  et Messieurs, Merci pour vos mots, monsieur le Premier ministre à l''instant, cher
  Kyriákos, et votre accueil pour l''ensemble de ma délégation et moi-même. Vous venez
  de rappeler une fois encore, nous l''avons fait hier, la profondeur, l''intensité
  de la relation entre nos deux pays, l''amitié qui nous lie. Alors que le monde se
  fait chaque jour plus brutal, plus instable, en déséquilibre, celle-ci n''est pas
  simplement importante, ce n''est pas un legs de l''histoire. Nous l''avons, si je
  puis dire, revigorée. En effet, en 2021, nous avons signé ce partenariat stratégique
  de défense, aussi parce que la France avait délété, su réagir face aux menaces qui
  réapparaissaient et qui vous touchaient. Et c''est ce partenariat que nous avons
  reconduit ici. Pendant cinq années, nous l''avons saisi de manière très concrète
  et avons densifié, en matière de défense, en matière de relations stratégiques,
  de manière inédite, le lien entre nos deux pays. Ce faisant, nous avons lancé un
  mouvement qui a inspiré et continue d''inspirer le reste de l''Europe et a consolidé
  ce pilier européen de l''OTAN, cette Europe de la défense, qui est maintenant devenue,
  si je puis dire, une vraie stratégie au cœur de notre Europe. Quelques mois après
  notre partenariat stratégique, nous lancions un exercice stratégique européen, nous
  avons débouché sur ce fameux compas, et puis on a fait, il y a maintenant un an,
  au niveau européen, ce Conseil si important de mars dernier qui a consacré, justement,
  cette Europe de la défense. En 2021, quand la Grèce et la France se liaient par
  ce partenariat, c''était un gros mot pour beaucoup de gens. Nous avons eu, au travers
  de ce partenariat aussi, une fonction, si je puis dire, d''inspiration, d''élan
  pour beaucoup. Il y a au sein de ce partenariat une clause d''aide et d''assurance
  mutuelle en cas d''agression armée. Je veux dire ici qu''il est bon de le dire,
  ce ne sont pas simplement des mots. Cette clause, elle se vivra en acte. Et d''ailleurs,
  c''est exactement celle que nous avons aussi mise en acte ensemble vis-à-vis de
  Chypre le 1ᵉʳ et 2 mars dernier, puis pour les semaines qui ont suivi. Et puis elle
  s''est traduite par des coopérations industrielles de défense, la Grèce ayant fait
  le choix de s''équiper de 24 Rafale et de 4 frégates de Naval Group, dont la première,
  la Kimon, produite à Laurion, que nous avons été visitée ce matin, qui vous a été
  livrée en janvier. Cette même frégate qui s''est d''ailleurs déployée au large de
  Chypre mars dernier. Nous avons multiplié les échanges entre nos armées, les opérations
  communes, maritimes et terrestres. Ce partenariat, aujourd''hui, nous ne venons
  pas simplement de le consacrer, mais de l''élargir par la signature d''un partenariat
  stratégique global renforcé. Bien sûr, la défense, avec, en matière d''innovation,
  là aussi en renforcement de nos liens, la dimension nouvelle que représente la dissuasion
  aussi avancée, que j''ai annoncée il y a quelques semaines, qui a fait l''objet
  d''un travail intense entre nos équipes, et que nous allons poursuivre, et qui permet
  d''ancrer ce lien stratégique entre la Grèce et la France. Aussi, en allant bien
  au-delà de la défense, ce partenariat prend un nouveau tour, en renforçant la coopération
  entre nos services diplomatiques, dans l''énergie, avec un accord sur le nucléaire
  civil, dans l''environnement, avec la décision de la Grèce, que je salue vivement,
  de rejoindre l''organisation internationale Mercator, de système et services numériques
  pour les océans, dans l''enseignement supérieur, dans l''éducation. Nous aurons
  tout à l''heure l''occasion de visiter, avec monsieur le Premier ministre, l''exposition,
  célébrant les 180 ans de l''École française d''Athènes, lieu de référence pour les
  chercheuses et les chercheurs en sciences humaines et sociales. Nous renforçons
  ce faisant le partenariat scientifique et notre partenariat en matière de culture.
  Ce matin, l''ensemble de nos musées se sont, sous l''autorité de nos ministres,
  réunis, pour voir aussi les politiques d''échange, de renforcement et de partenariat.
  Celui-ci vient aussi couvrir l''économie et la compétitivité. Les échanges franco-grecs
  ont doublé en 10 ans. Ils n''ont jamais été aussi élevés. Près de 200 entreprises
  françaises, comptant près de 17 000 salariés, sont implantées en Grèce. Elles opèrent
  dans des secteurs stratégiques, le numérique, l''intelligence artificielle, le renouvelable,
  les réseaux électriques, les services financiers, avec, par exemple, vous l''avez
  évoqué, le rachat de la bourse d''Athènes par Euronext en novembre 2025. Consolidation,
  d''ailleurs, qui, là aussi, permettra de servir de point d''appui à l''Union des
  marchés de capitaux, à laquelle nous croyons l''un et l''autre profondément. Je
  me réjouis à ce titre que cette visite ait été l''occasion de signer plusieurs grands
  contrats, dans le domaine de la défense, avec la rénovation des missiles MICA de
  l''armée hellénique par MBDA, dans les énergies renouvelables, avec la signature
  par Akuo d''un contrat de développement conjoint pour sept projets éoliens en Grèce
  centrale. Le forum économique que nous clôturerons ensemble tout à l''heure permettra
  d''accélérer dans cette voie, parce que nous avons encore beaucoup à faire. Je le
  disais, au-delà de la relation bilatérale, nous œuvrons ensemble avec une intimité
  stratégique très forte. Face à la situation que nous connaissons au Moyen-Orient,
  nous appelons l''un et l''autre au retour de la paix, au maintien du cessez-le-feu,
  incluant le Liban, à la poursuite des négociations diplomatiques pour traiter de
  la question nucléaire, balistique et des déstabilisations régionales, à la réouverture
  pacifique du détroit d''Ormuz, et ensemble. Avec 47 autres pays, nous avons tenu
  la première réunion de cette mission ad hoc pour la réouverture pacifique d''Ormuz
  il y a une semaine. Et ensemble, nous plaidons pour que la paix soit trouvée au
  Liban, que ce pays puisse retrouver sa pleine souveraineté et sa stabilité, et que
  le gouvernement libanais et ses Forces armées puissent procéder au désarmement du
  Hezbollah. Paix, stabilité dans la région, c''est l''agenda que nous défendons.
  De la même manière, depuis le premier jour, ensemble, nous sommes aux côtés de l''Ukraine
  pour résister à la guerre d''agression russe. Nous l''avons fait avec des aides
  multiples. Et ces dernières heures encore, nous étions à Chypre ensemble, avec la
  finalisation du prêt de 90 milliards d''euros de l''Union européenne, finalement
  confirmée, qui va pouvoir acter la décision prise ensemble en décembre dernier.
  Nous voulons et nous continuons d''avancer pour une Europe plus forte, plus sûre,
  plus souveraine en matière de défense et de sécurité, mais aussi une Europe plus
  compétitive, et ça veut dire également une Europe plus forte en matière économique
  et technologique. Et les deux sont indissociables. Notre conviction profonde, ce
  qui nourrit nos stratégies, c''est que nous plaidons pour que notre Europe accélère
  dans cet agenda, se tienne comme une vraie puissance géopolitique, c''est-à-dire
  de défense et de sécurité, mais aussi industrielle, agricole, économique, technologique,
  et puisse être beaucoup plus compétitive, investir davantage et protéger davantage
  son économie. Enfin, puisque nous parlons d''Europe, je veux dire là aussi que nous
  avons ensemble contribué à impulser un mouvement que je crois inarrêtable et salutaire,
  qui est celui de la protection de nos démocraties et de nos enfances. Il y a quelques
  mois, ensemble, nous avons lancé, avec quelques autres collègues d''ailleurs méditerranéens,
  une première initiative pour protéger nos enfants et nos adolescents des réseaux
  sociaux, et aller vers des politiques d''interdiction. Nous l''apportons dans nos
  deux pays. Nous étions 6, un peu comme dans le site, vous savez. On est partis à
  six, on est déjà à 14. Je suis sûr qu''on arrivera à 27, parce que c''est une évidence.
  Les scientifiques, maintenant, l''ont prouvé. Et donc, nous allons aller au bout
  de ce combat. En septembre prochain, nous aurons mis en œuvre un texte qui permettra
  d''interdire nos réseaux sociaux aux jeunes de moins de 15 ans. Je sais que la Grèce,
  à compter de janvier 2027, fera exactement la même chose. On s''est coordonné pour
  pousser la mise en œuvre au niveau européen. On est en train de convaincre tous
  les collègues. De la même manière, on veut aussi, ensemble, se battre pour que les
  règles démocratiques soient mieux respectées par les plateformes numériques. La
  transparence des algorithmes, la lutte contre les faux comptes, la responsabilisation
  aussi des acteurs, comme d''ailleurs, ensemble, nous avions œuvré en ce sens pour
  le DSA. Voilà, Mesdames et Messieurs, ce que je voulais ici dire. Mais au fond,
  tout cela dit une chose. C''est combien l''alliance de nos pays peut non seulement
  nous renforcer conjointement, mais rendre aussi l''Europe plus forte. Parce que
  l''histoire entre la Grèce et la France, c''est une histoire d''inspiration et d''amitié
  réciproque, en termes de démocratie, en termes de liberté, en termes d''innovation.
  À chaque fois, nous avons su reconnaître la force de l''autre et nous nous en sommes
  inspirés. Et c''est cela qui, au fond, a toujours nourri la relation bilatérale.
  Parce que la Grèce et la France sont aussi cela de commun, qu''elles ont toujours
  et qu''elles continuent de toujours vouloir penser plus grande que la frontière
  de nos pays. Comme deux puissances maritimes, nous pensons un peu l''universel.
  C''est aussi pour cela que nos deux pays sont liés par cette alliance si singulière
  que nous avons encore célébrée hier et que nous continuerons de faire avancer. Merci,
  Monsieur le Premier ministre, merci infiniment très cher Kyriákos pour ces discussions,
  ces textes importants que nous avons signés, mais surtout pour le chemin commun
  que nous continuons de mener ensemble. Merci, mesdames et messieurs. Monsieur le
  Président, vous avez renouvelé l''accord stratégique pour la sécurité et la défense.
  Que va se passer à partir de demain ? Quels seront les changements à partir de demain
  pour ce qui est de la sécurité de la Grèce, de la France et de l''Europe, puisque
  vous soulignez toujours la dimension européenne, vous évoquez une sorte d''OTAN
  européen, si vous voulez ? Quels sont les liens entre tout cela et le débat concernant
  l''article 42, paragraphe 7, pour la réponse automatique en cas de menace ? Merci.
  Vous avez raison de dire que nos traités européens ont un article, l''article 42,
  paragraphe 7, qui est au fond, dans sa substance, plus fort que l''article 5, parce
  qu''il prévoit une solidarité entre les États membres, mais il ne laisse pas l''option.
  Nous avons montré que l''article 42, paragraphe 7, n''était pas des mots. Ensemble,
  au début du mois de mars dernier, Chypre a été visée par des attaques du Hezbollah.
  Nous sommes venus et la décision a été prise dans la minute. Votre frégate, le groupe
  de notre côté, avec notre porte-avion, nos frégates et les frégates de plusieurs
  de nos collègues, et des moyens supplémentaires. De la même manière, lorsque le
  Danemark a commencé à être menacé, la situation était différente, mais des alertes
  étaient là, nous avons tout de suite réagi. Je crois pouvoir dire que pour la Grèce
  et la France, l''article 42.7, c''est du béton, c''est-à-dire que c''est une obligation
  et nous sommes là. Mais nous avons rendu encore plus fort cet article, si je puis
  dire, par notre partenariat stratégique de défense, et maintenant ce partenariat
  stratégique global renforcé. Et qu''est-ce qu''il dit ? Il y a cette clause d''assurance
  mutuelle. Il le rend encore plus fort, il le lit de manière bilatérale entre nos
  deux pays, et c''est ce qui m''a permis de vous dire hier soir avec beaucoup de
  clarté : ne vous posez même pas la question, quoi qu''il arrive, nous serons là,
  à vos côtés. Et nous l''avons renforcé par aussi des capacités communes. Je pense
  que ce qui est très fort et ce qui a changé, et ce que ce partenariat vient changer
  à nouveau, c''est que non seulement on a des programmes industriels communs, on
  a des équipements communs, c''est-à-dire on utilise les mêmes frégates. En vrai,
  votre programme de frégate, il est jumeau d''une autre, on avance ensemble. On n''en
  a pas plus que vous, on est les deux nations clientes de Naval Group sur FDI. Vous
  vous dotez des rafales, on avance ensemble, on fait des exercices communs. Là, on
  renouvelle les MICA. On a encore d''autres projets, et la suite est à construire.
  Avec ce dialogue aussi sur la dissuasion renforcée, c''est une intimité stratégique
  beaucoup plus forte, qui fait que moi, j''ai souhaité proposer à monsieur le Premier
  ministre, et il a souhaité engager ce dialogue stratégique, de voir comment on pouvait
  encore renforcer ces liens. Ce sont des coopérations industrielles, capacitaires
  et stratégiques pour encore renforcer cette clause d''assistance. C''est assez inédit,
  ça l''est même résolument, et ceci montre le lien entre nos deux pays. Voilà exactement
  ce que c''est. C''est beaucoup plus fort que tout ce qu''on peut avoir à travers
  les alliances qui lient beaucoup d''autres États. Je veux ici que vous ayez bien
  en tête une chose, c''est que cette clause d''assurance mutuelle et d''assistance,
  elle est intangible et elle n''est pas discutée entre nous. Donc il n''y a pas de
  point d''interrogation à avoir, il n''y a pas de doute à nourrir, et pour tous nos
  ennemis potentiels, ou réels, il faut qu''ils le sachent très clairement. Voilà.
  Bonjour monsieur le Premier ministre, bonjour monsieur le Président. Pour rebondir
  sur la question de mon confrère sur l''article 42.7, il y a une demande dans la
  région, y compris à Chypre où vous étiez hier, de clarification de l''opérationnalité,
  de renforcement de cet article. Est-ce que vous y êtes ? La France y est favorable
  pour vraiment graver dans le marbre ce renforcement pour que les Européennes prennent
  le relais d''une OTAN qui peut se montrer défaillante. Et justement sur l''OTAN,
  vous avez redit hier qu''elle était affaiblie par les remises en cause constantes
  côté américain. Ces critiques virulentes contre les Européens se sont encore poursuivies
  hier sur la question du détroit d''Ormuz. Avec des fuites sur une présumée volonté
  de suspendre l''Espagne. Dans ces conditions, Monsieur le Président, est-ce que
  vous diriez que l''OTAN est toujours une alliance, qu''elle n''est pas totalement
  dévitalisée pour ne pas reprendre un autre diagnostic que vous avez pu émettre il
  y a quelques années ? Merci. Merci beaucoup. Sur l''article 42, paragraphe 7, on
  vient de l''évoquer. Je crois que pour nous, il est clair et qu''il n''y a pas d''interprétation
  ou d''ambiguïté, si je puis dire, sur cet article. Il faut maintenant, dès que la
  vocation est mise en œuvre, l''opérationnaliser. Ce que nous avons fait encore récemment
  et ce que nous ferons à l''égard de tous ceux qui auraient besoin de le solliciter,
  c''est aussi la force de notre Union européenne. Je ne crois pas qu''il y ait un
  besoin aujourd''hui de changer les traités ou de les modifier, ils sont très clairs.
  Il y a simplement un besoin d''abord de continuer de renforcer la défense et la
  sécurité de tous nos pays. C''est la logique dans laquelle nous nous sommes engagés.
  C''est nous-mêmes nous équiper, continuer d''innover. Et c''est ce que nous défendons
  depuis neuf ans. L''Europe plus souveraine que nous appelons de nos vœux, c''est
  une Europe qui innove, qui produit sur son sol. Et donc, on a besoin, nous tous,
  Européens, la relation franco-grecque en est l''illustration vivante, d''acheter
  davantage européens, de produire davantage européens, d''innover davantage en Européens.
  Mais pour ça, il faut aussi rester très compétitif en européens. Parce qu''on ne
  va pas acheter des choses qui sont moins bien que les compétiteurs ou qui sont beaucoup
  plus chères. C''est ça notre défi. C''est comme ça qu''on le mettra en œuvre. Donc
  les stratégies nationales, la clarté est donnée. Elle a été rappelée d''ailleurs
  hier par la présidente de la Commission lors de nos débats. Article 42, paragraphe
  7, elle a la même lecture que nous deux, la même. Ensuite, c''est sa mise en œuvre,
  le moins souvent possible, parce que ça voudrait dire sinon qu''il y a des agressions
  ou des attaques, mais en tout cas en ne laissant aucune ambiguïté. L''OTAN apporte
  des choses et nous n''avons jamais considéré que nos alliances, nos partenariats
  ou l''Union européenne étaient une alternative à l''OTAN ou quelque chose pour supprimer
  l''OTAN. L''OTAN, c''est une alliance plus large qui apporte l''interopérabilité,
  qui avait évidemment notre allié américain. Et donc nous, notre responsabilité,
  c''est de ne jamais rien faire pour affaiblir l''OTAN. Et je crois pouvoir dire
  qu''avec méthode, c''est exactement ce que nous faisons. Mais c''est aussi de regarder
  avec lucidité le fait que ce qui est demandé, parfois gentiment, parfois moins gentiment
  par les Américains aux Européens, c''est au fond de faire quoi ? De s''occuper de
  leur sécurité. C''est ça le message qui est donné. Quand on nous dit : vous devez
  prendre vos parts du fardeau, vous devez investir plus, ce qui était le message
  déjà il y a près de 10 ans. Quand on nous dit, on nous secoue aujourd''hui un peu
  en menaçant un tel ou tel, la leçon qu''on doit en tirer : ne soyons plus dépendants.
  Et donc, on doit, oui, investir davantage, mais nous, Européens, on doit renforcer
  ce pilier européen de l''OTAN, on doit renforcer cette Europe de la défense, non
  pas contre qui que ce soit, non pas en alternative à quoi que ce soit, en essayant
  de consolider nos alliances historiques, parce qu''elles nous rendent plus fortes
  et sont le fruit aussi d''une amitié et d''une estime, mais en ayant la lucidité
  de voir que ça peut être fragilisé. Donc on ne doit pas courir ce risque. Voilà,
  c''est exactement notre stratégie. Hier soir, au Forum romain, vous avez dit que
  cette crise est une opportunité. Nous pouvons renforcer l''Europe et cela passe
  à travers une économie concurrentielle et compétitive. Il nous faut donc des ressources.
  Il y a tout un débat, toute une discussion sur le cadre financier pluriannuel, mais
  les stratégies sont différentes selon les pays. Est-ce que l''Europe saura trouver
  les ressources nécessaires afin d''atteindre ses ambitions ? Merci. Je suis un éternel
  optimiste, donc je vais vous dire oui. L''expérience, c''est ce que j''évoquais
  un peu hier aussi, me conduit plutôt à vous dire oui, parce qu''à chaque fois, on
  commence avec des positions très écartées, on arrive toujours à l''obtenir. Une
  Europe plus compétitive qui est dans la course, c''est une Europe qui simplifie,
  qui protège son économie contre le non-respect du commerce international des pratiques
  de dumping, qui diversifie ses partenariats et puis qui investit dans l''innovation,
  la transformation. C''est tout le défi de notre budget. On doit garder nos politiques
  historiques, elles sont importantes. Et ce n''est pas ici qu''on va dire, entre
  nous, qu''on est pour sacrifier la Politique agricole commune ou les Fonds de cohésion.
  Donc ça, c''est nos grands budgets historiques, on veut les maintenir et il y aura
  une écrasante majorité pour les maintenir. Et puis, on a des défis historiques liés
  à notre génération : la défense et la sécurité, la bascule technologique que sont
  l’IA et le quantique et les green tech. Sur ces trois catégories, l''investissement
  est à faire maintenant. Et les Européens investissent beaucoup moins que les Américains
  et les Chinois, publics et privés. Donc pour faire face à ces nouveaux défis, ces
  trois catégories de dépenses, on doit mobiliser de l''argent privé, beaucoup mieux.
  C''est notre Union des marchés de capitaux. Et ça, il ne faut pas ralentir, aller
  en arrière, il faut accélérer. Mais on a besoin aussi de plus d''argent public.
  Comme on veut que ce soit un marché unique, puisqu''on le défend, qu''on simplifie
  les règles, on ne veut pas que cet argent public soit national, sinon on va recréer
  de la compétition interne. Il doit être européen, cet argent public. Alors, on a
  plusieurs leviers. On a des ressources propres nouvelles, parce qu''en même temps,
  personne n''a envie que les contributions nationales n''augmentent. On a tous des
  limites. Et donc l''argent public nouveau au niveau européen, ça peut être quoi ?
  Les contributions nationales, personne n''a envie de les augmenter. Deuxième option,
  les ressources propres, on est prêt à regarder. Il y a des ressources propres qui
  peuvent être mobilisées. La Commission a proposé des idées, le Parlement européen.
  Il faut avancer là-dessus, c''est le débat qui a été lancé hier par la Commission.
  Nous sommes favorables à avoir de nouvelles ressources propres. Et puis, in fine,
  il faut bien regarder aussi le contexte dans lequel on est. Et c''est là où tout
  se rejoint, où le moment est important. C''est qu''il y a un appétit pour la dette
  européenne parce qu''il y a une géopolitique et parce que les investisseurs aujourd''hui
  ont envie d''un peu réduire leur risque, leur exposition aux papiers américains,
  s''ils ont beaucoup acheté Il n''y a pas tellement de papiers européens, il y a
  des papiers nationaux, on vend de la dette de chacune de nos nations, mais on a
  besoin de ce que les marchés appellent un safe and liquid asset , un actif qui est
  à la fois sûr et liquide. C''est de la dette européenne. Là, on a deux leviers à
  creuser. Le premier, on s''est endetté au moment du Covid. Aujourd''hui, on nous
  dit qu''il faut vite le rembourser. C''est idiot. Étalons cette dette, refaisons
  des réémissions, parce que les gens veulent ce papier pour pas cher. Ça nous donne
  de la profondeur de champ. La deuxième chose, peut-être que sur des dépenses, pour
  bien rassurer tout le monde, qui sont d''intérêt commun, qui sont nouvelles, allez,
