date: '2026-04-24'
type: press_release
source_name: elysee
title: 'Déplacement en Grèce : première journée.'
text: 'Le Président de la République s''est rendu en Grèce à l''occasion d''une visite
  officielle, le 24 et le 25 avril 2026. Cette visite met à l’honneur les liens historiques
  entre la France et la Grèce, notre attachement partagé aux valeurs européennes et
  les coopérations étroites dans tous les domaines, en particulier la défense, l’économie
  et la culture . À son arrivée, le Président Emmanuel Macron s''est rendu à l'' Agora
  romaine pour un échange sur la souveraineté européenne avec Kyriákos Mitsotákis
  , Premier ministre de la République hellénique. Monsieur le Président, c''est un
  plaisir de vous accueillir ici. Monsieur le Premier ministre, c''est un plaisir
  de vous voir ici. Monsieur le Président, vous le savez peut-être, dans ce pays,
  nous sommes rarement d''accord les uns avec les autres, mais bon, c''est quelque
  chose que l''on retrouve également ailleurs. Mais, en revanche, là où nous sommes
  d''accord, de manière générale, c''est la vision que nous avons de l''Europe. Nous
  sommes d''accord sur le fait que nous avons des défis à relever, et puis nous voudrions
  vous remercier, car vous avez toujours été un ami de la Grèce, et nous vous en remercions.
  Alors, il y a énormément de prédictions très sombres pour l''avenir de l''Europe.
  Je voudrais savoir, est-ce que vous avez le sentiment que l''Europe n''est plus
  tout à fait pertinente aujourd''hui avec tout ce qui se passe ? Est-ce que vous
  avez le sentiment que nous sommes devenus une espèce de creuset de réflexion, une
  espèce d''ONG anonyme ? Alors merci, merci beaucoup. Merci de vos paroles et merci
  de votre accueil. Merci, M. Le Premier ministre, cher Kyriákos. Merci de votre invitation,
  de me donner l''occasion d''être ici aujourd''hui. Eh bien, je dois vous dire que
  je pense exactement le contraire. Je pense que c''est ce moment pour être, justement,
  le moment de l''Europe et à plusieurs égards. Tout d''abord, tous, dans ce monde,
  voient clairement que nous sommes dans un monde de désordre. Deuxième élément, tout
  le monde voit que la puissance numéro un, les États-Unis, pourrait être un allié
  pour certains pays, mais cet allié n''est plus tout à fait stable. C''est quelque
  chose qui compte. Lorsque nous avons des partenaires, nous sommes vraiment à leur
  côté. D''ailleurs, la Grèce et la France, ces derniers mois, nous avons agi de concert
  dès le premier moment, dès les premières attaques de l''Iran. Nous nous sommes vus
  hier et nous avons dit que la Grèce, la France étaient justement reconnu, félicité
  par les autres pays de l''Union européenne parce que nous avons notre système de
  protection aérienne, nous avons nos rafales, nous avons de nouveaux systèmes de
  dernière génération et nous avons contribué concrètement, dès les premiers instants,
  à leur défense. Et je pense que ça, c''est quelque chose qu''il ne faut pas sous-estimer.
  Nous sommes prévisibles, nous sommes fiables. Et puis surtout, lorsque vous prenez
  l''image globale, l''Europe, lorsqu''on peut mutualiser toutes nos capacités, l''Europe
  représente une capacité de défense énorme. Elle est un acteur qui compte pour une
  part immense du commerce international. Nous sommes aussi une plateforme financière
  extrêmement importante. Et d''ailleurs, nous sommes en train d''améliorer les rapports
  entre la France et la Grèce ces derniers mois avec la fusion sur la plateforme d’Euronext.
  Si l''on prend les différents domaines, les différentes catégories, eh bien, nous
  y sommes maintenant. Ce que nous devons encore faire, c''est devenir une vraie grande
  puissance, donc utiliser notre poids dans l''ordre mondial, nous faire respecter
  beaucoup plus que ce qui est le cas aujourd''hui, et contribuer à des solutions
  réelles. Il ne s''agit pas simplement d''être un acteur, un négociateur d''accords.
  Non, nous devons imposer certaines conditions, protéger notre industrie, et nous
  devons être perçus comme un partenaire crédible à long terme. Et je dois vous dire
  que là où nous sommes en ce moment, c''est le moment qui est la chance pour l''Union
  européenne. C''est maintenant que l''Union européenne peut être perçue comme un
  partenaire prévisible et fiable. Merci. Merci, Monsieur le Président. Monsieur le
  Premier ministre, partagez-vous cette opinion ? Et puis également, pour être une
  grande puissance, il faut aussi avoir une économie très forte. Et lorsque l''on
  voit les chiffres, il y a tout de même des éléments inquiétants en termes de PIB,
  de technologie. Il y a une différence assez importante entre les États-Unis et l''Europe.
  Est-ce que l''Europe le fait suffisamment pour justement rattraper son retard ?
  Et est-ce que nous nous estimons qu''il s''agit d''une espèce de sur-réglementateur,
  sur-législateur ? Comment est-ce que l''on pourrait trouver un équilibre ? Eh bien,
  c''est justement cela, le défi. Je pense que nous avons sur-réglementé certains
  secteurs. Oui, comme Kyriákos a dit, il est clair que nous avons des défis devant
  nous, et il s''agit effectivement de mener à bien une simplification, une simplification
  d''échelle pour le marché unique, par exemple. Alors, il est clair que nous sommes
  trop lents. La simplification, oui, nous devons retirer toutes les entraves que
  nous nous sommes parfois mises nous-mêmes. Nous avons encore trop de réglementations
  nationales, nous devons améliorer cela. Et c''est justement l''une des conclusions
  du rapport Draghi et du rapport Letta. Ce dont nous avons parlé avec la Commission
  l''an dernier, il y a ce paquet Omnibus. D''ailleurs, nous sommes nombreux à faire
  exactement le même exercice au niveau national, mais cela ne suffit pas. Cela ne
  suffit pas, car on peut aussi avoir une réglementation intelligente, et je voudrais
  insister là-dessus. Il nous faut une réglementation qui, parfois, va préserver notre
  industrie, notre capacité de production. La Chine et les États-Unis disposent de
  réglementations, mais cette réglementation favorise les acteurs nationaux. La plupart
  du temps, nos réglementations représentent un poids sur les acteurs européens et
  nous sommes un peu trop naïfs vis-à-vis des autres. Nous devons préserver un terrain
  de jeu égalitaire, mais il faut bien entendu que ceux qui veulent travailler au
  sein de l''Union européenne, eh bien, vont être soumis aux mêmes conditions. Or,
  ce n''est pas toujours le cas. Voilà pourquoi nous, nous prônons ce concept de préférence
  européenne. Si l''on veut vraiment aller de l''avant avec ce programme, eh bien,
  nous devons être lucides et nous devons voir les choses en face. L''un des défis
  de l''industrie aujourd''hui, cela concerne la Chine. La Chine, aujourd''hui, est
  en surcapacité. Elle a des aides d''État dans pratiquement tous les secteurs et
  elle tue pratiquement les secteurs équivalents européens. Nous devons voir comment
  nous allons réagir par rapport à cela. Est-ce que nous sommes dans un éboulement ?
  L''année dernière, la Chine a contribué à détruire des milliers d''emplois en Allemagne.
  Il faut réagir. Comment réagir ? Eh bien, il faut une réglementation pour protéger
  les secteurs clés. Et il s''agira aussi de protéger nos démocraties. Ce que nous
  voulons faire, par exemple, par rapport aux réseaux sociaux pour les jeunes, les
  enfants et les adolescents, ça, c''est quelque chose que nous devons faire. Et ça,
  c''est quelque chose qu''il faudra faire aussi pour la compétitivité. Oui, il faut
  restaurer un terrain de jeu égal. Il faut une concurrence loyale. À chaque fois
  que la concurrence devient déloyale, eh bien, à ce moment-là, il faut protéger notre
  économie. Et puis, je dois dire que la protection, ce n''est pas le protectionnisme.
  Moi, je suis tout à fait en faveur du libre-échange, mais nous n''en sommes plus
  là. Il y a d''un côté une surproduction, une surcapacité et une aide extrême du
  côté de la Chine. Nous avons un protectionnisme du côté des États-Unis. Non, nous
  devons nous protéger. Voyons ce que fait la Chine sur les minéraux critiques, par
  exemple, et les terres rares, ils reprennent un grand nombre de ces capacités. Ils
  mettent à mal la concurrence. Lorsqu''il y a encore des concurrents, ils créent
  des conditions de dumping pour justement mettre à mal les concurrents. Et lorsque
  nous sommes très naïfs, eh bien, nos propres producteurs vont en Chine pour avoir
  de meilleures conditions, mais il faut un pourcentage minimal d''entreprises européennes.
  Autrement, nous n''allons pas pouvoir protéger notre autonomie stratégique. Nous
  le voyons bien dans le domaine de la sécurité, mais c''est aussi : l''industrie,
  l''agriculture, la technologie et les finances. Pour clôturer cette partie sur l''économie,
  je voudrais vous poser cette question. Bon, nous avons parlé des marchés des capitaux.
  Toutes ces réformes, eh bien, pour certains, ils ont le sentiment, certains ont
  le sentiment que c''est quelque chose qui ne s''adresse qu''aux élites. Nous sommes
  dans un monde qui est très polarisé. Comment allez-vous les convaincre pour dire
  que ces objectifs que nous devons atteindre vont effectivement faire une différence
  dans leur vie quotidienne ? Monsieur le Président, que voyez-vous par rapport à
  cela ? Les marchés des capitaux, par exemple. Nous avons essayé de mettre en place
  une union bancaire depuis des années, mais c''est très, très important. Pourquoi ?
  En tant qu''Européens, nous avons davantage d''épargne que les Américains. C''est
  vrai. Mais cette épargne, en raison de nos réglementations, cela va financer les
  marchés des obligations, donc cela finance les dettes des États ou des entreprises,
  ou alors cette épargne va aux États-Unis pour financer les entreprises là-bas parce
  qu''ils ont un bon marché de capitaux. Avoir un marché de capitaux fort en Europe,
  cela signifie avoir la capacité de mettre notre épargne au bon endroit pour financer
  l''innovation et la création d''activités. C''est ceci que nous devons expliquer.
  Et nous voulons tous avoir la meilleure innovation du monde, bien sûr. En même temps,
  nous voulons que ce soit abordable, nous voulons que ceci fasse partie du monde,
  nous voulons avoir de l''innovation et nous voulons être libres et indépendants.
  Si on achète des produits de l''autre bout du monde parce qu''ils avaient la capacité
  d''investir dans cette innovation, eh bien, on perd quelque chose. Très clairement,
  il n''y a pas de raison que par rapport à ces sommes d''épargne que nous avons,
  il n''y a pas de raison que nous ne puissions pas les canaliser là où il le faut
  par rapport aux différents titres. Voilà ce qu''est l''enjeu du marché des capitaux.
  Pour ce faire, nous devons simplifier notre réglementation pour mettre en place,
  pour devenir, pour mettre en place de véritables acteurs européens. C''est la seule
  manière d''avancer. Et puis, une fois de plus, la simplification de la réglementation
  pour que cette épargne puisse être investie dans l''innovation et prendre des risques
  aussi. Alors, nous avons une demi-heure pour couvrir différents sujets. Alors, inévitablement,
  nous allons parler de M. Trump. Trump dit que l''Europe est gâtée, qu''elle a sous-traité
  sa défense aux États-Unis. Alors, nous l''avons vu à Ormuz, l''Europe ne peut pas
  entreprendre d''action toute seule. Et même en Ukraine, s''il nous faut un engagement
  de la part de l''Europe, ceci ne peut pas se faire sans le soutien des États-Unis.
  Comment donc agir ? Nous ne devons pas sous-estimer le moment actuel. Nous avons
  en ce moment un président américain, un président russe et un président chinois
  qui sont tous contre l''Union européenne. Et donc, c''est l''occasion. Mais si nous
  ne croyons pas en nous-mêmes, qui va dire : mais vous êtes formidables ! Nous devons
  être un petit peu plus confiants. Et puis, je dois dire que je ne suis pas d''accord
  avec vous sur l''Ukraine, pour revenir sur cet exemple. Lorsque la guerre a commencé,
  en février 2022, il y avait énormément de scepticisme sur notre capacité à réagir.
  Mais quels sont les faits ? Au premier jour, nous avons décidé deux sanctions contre
  la Russie à l''unanimité. Nous avons adopté ce paquet. Et l''économie russe en souffre,
  il ne faut pas croire les fake news , justement. Donc déjà, au premier jour, nous
  avons exprimé notre solidarité très claire vis-à-vis de l''Ukraine, dans un cadre
  très clair. Nous ne voulons pas être impliqués dans ce conflit, parce que nous parlons
  aussi d''un pays d''une puissance nucléaire à nos portes, mais nous avons contribué
  à la résistance ukrainienne. Nous sommes l''investisseur le plus important. L''Ukraine
  résiste beaucoup mieux que ce que l''on attendait. Et quant à la capacité des Européens,
  on nous disait, voilà, il y a six mois, l''Ukraine va tout à fait s''effondrer pendant
  l''hiver. Eh bien, ils ont repris les territoires. Donc nous avons adopté des sanctions.
  Nous sommes restés unis. Nous avons fourni beaucoup d''aide aux Ukrainiens sur les
  financements, les capacités dans d''autres domaines. Et pour la première fois, nous
  avons mis en place cette coalition des pays volontaires. Et ce n''est pas quelque
  chose qui va à l''encontre du soutien américain. Mais ce qu''il faut voir, c''est
  que cette coalition que nous avons lancée au mois de février de l''année dernière
  en tant que réaction à cet événement, cet incident à la Maison-Blanche avec le président
  Zelensky, ce que nous disons, c''est que nous voulons prendre nos décisions nous-mêmes.
  Ça, c''est quelque chose, d''ailleurs, que nous avons lancé avec le Royaume-Uni,
  mais nous avons également le Canada, l''Australie, la Nouvelle-Zélande, le Japon.
  Donc ce n''est pas uniquement l''Union européenne, il y a également la Norvège et
  le Royaume-Uni, et c''est une création qui est très puissante. En tant qu''Européens,
  nous mettons en place un cadre qui nous permet de mettre en place cette réaction.
  Alors, bien entendu, les relations avec les États-Unis sont très importantes, mais
  nous avons déjà pris un certain nombre de décisions, et ce que nous avons décidé
  au niveau français, par exemple, ne va pas à l''encontre de ce que veulent faire
  les États-Unis. Alors, par exemple, Airbus, c''est un véritable succès. Pourquoi
  ne pouvons-nous pas, en Europe, travailler sur la prochaine génération d'' Eurofighters
  ? Je sais que c''est quelque chose qui vous frustre beaucoup, mais quel est le problème ?
  Pourquoi il y a autant de retard, d''hésitation ? Oui, nous devons dégager des résultats.
  Mais d''ailleurs, c''est quelque chose qui est tout à fait en cohérence par rapport
  à ce que nous disons depuis le début. Si l''on voit la concurrence mondiale, l''ordre
  mondial, eh bien, ce qu''il nous faut, c''est des normes communes et davantage de
  simplification. Tant qu''on a six ou sept ou huit fois plus de capacités, lorsque
  nous avons ces structures fragmentées, eh bien, nous ne pourrons pas être compétitifs
  vis-à-vis des États-Unis, donc il faut des fusions, il faut des approches différentes,
  mais nous devons aller au-delà des intérêts nationaux et des intérêts des entreprises,
  ça, c''est un intérêt stratégique global. Pour moi, la défense et la sécurité, c''est
  un très bon exemple qui va permettre justement d''illustrer ce dont nous parlions
  tout à l''heure, avoir une autonomie stratégique. C''est quoi, cette autonomie stratégique ?
  C''est acheter européen, c’est produire européen. C''est ce que nous avons fait
  avec les sous-marins. Vous avez décidé d''acheter des sous-marins français. Le Kimon
  est une fierté partagée. Nous allons voir cette frégate de près demain. Mais là
  aussi, c''est une coopération, parce que cela devrait progressivement être une production
  européenne. Et c''est au niveau européen que nous devons gérer cela. Il y a de nombreux
  pays qui n''avaient pas d''industrie très forte, très puissante. On doit leur dire
  aux Coréens, par exemple, ou à d''autres, nous devons leur dire : vous devez acheter
  européen parce que cela vous permettra d''être plus indépendant, plus autonome,
  parce que quels que soient les choix des États-Unis, vous pourrez être sûr que vous
  disposerez encore de vos armes, de vos munitions, mais il faut créer aussi des possibilités
  industrielles. Et c''est précisément ce que nous sommes en train de faire. Et c''est
  cela, justement, la révolution que nous devons mener à l''échelle européenne. Parce
  que nous avons sous-estimé le fait qu''après la Deuxième Guerre mondiale, la défense
  et la sécurité n''étaient plus un sujet de préoccupation pour les Européens, ou
  même c''était un sujet tabou. Voilà. C''était un sujet national. Nous n''étions
  pas censés coopérer au niveau européen et le grand fournisseur, c''était les États-Unis.
  Et ce qui est en train de changer progressivement, c''est que nous avons décidé
  d''avoir cette solidarité commune, ces programmes communs. Il est vrai que nous
  n''avons pas énormément de temps. Vous avez dit que l''OTAN est mort au niveau cérébral.
  Est-ce que vous pensez qu''il pourrait y avoir un OTAN européen ? À quoi est-ce
  que cela va ressembler ? Alors, en 2022, le Président Poutine nous a fait une piqûre
  de rappel, si vous voulez. Il est clair que l''OTAN est soumise à des pressions.
  Il est clair que les Européens devaient aussi assumer leur part du fardeau. Et effectivement,
  nous dépensons plus. Et puis, il y a, à l''article 5, ce qui a été proposé par le
  président américain, pas par les Européens, qui affaiblit l''alliance. Nous, nous
  sommes là pour l''interopérabilité de nos équipements, de nos armées, etc. Et c''est
  la source, justement, de son efficacité et c''est une bonne alliance stratégique
  qui nous est utile à nous tous. Mais je dois dire que je crois beaucoup au pilier
  européen de l''OTAN. Je l''ai déjà dit, je l''ai déjà défendu il y a des années,
  comme votre Premier ministre l''a dit. Nous prenons, justement, l''autonomie stratégique,
  et voilà où nous en sommes. Et je pense que nous devons renforcer ce pilier européen.
  Nous ne devons pas affaiblir l''OTAN. Nous devons, bien entendu, préserver l''OTAN
  et son interopérabilité, mais les alliés européens doivent avoir une alliance plus
  forte et être prêts à agir. Par exemple, en mer Baltique, dans l''Arctique, vis-à-vis
  de la Russie, sur certaines questions de sécurité, en Ukraine, avec la coalition
  des pays volontaires. Ailleurs, par exemple, dans le détroit d''Ormuz, ce ne sont
  pas des opérations de l''OTAN, ce sont des opérations des Européens qui travaillent
  ensemble et qui mettent en place des solutions stratégiques communes. Donc, je pense
  que ce que nous créons c''est… Ce que nous sommes en train de créer, c''est le pilier
  européen de l''OTAN, et nous renforçons les capacités de défense de l''Europe. Je
  pense qu''on aurait du mal à ne pas être d''accord avec vous, alors je vais essayer
  d''aborder une autre question. La Chine. On essaye de nous faire croire que l''Europe
  ne peut pas gérer la situation avec la Chine en dehors des États-Unis. Qu''en pensez-vous ?
  Moi, je suis en faveur d''une réduction du risque. Réduire le risque, ceci consiste
  à dire, lorsqu''il y a trop de dépendance, eh bien, nous devons y remédier, changer
  les modes de production, les lieux de production. Nous avons vis-à-vis de la Chine
  des dépendances énormes en ce moment par rapport à certaines matières critiques,
  par rapport à la technologie également. Et je pense que le programme que nous devrions
  avoir devant nous, c''est justement avoir une stratégie de réduction de risque.
  Nous avons les mêmes valeurs que les États-Unis, pas les mêmes valeurs que la Chine,
  mais ce que nous devrions éviter, c''est de nous précipiter dans une politique de
  découplage vis-à-vis de la Chine. Sinon, nous allons donner l''impression que nous
  sommes un simple vassal des États-Unis, et ce n''est absolument pas là que réside
  notre avenir. Voilà pourquoi je suis vraiment en faveur de cette stratégie pour
  l''Europe de réduction de risque. C''est une stratégie sur 10 ans. Nous avons besoin
  des préférences européennes. Nous devons mettre en place des clauses par rapport
  à certains secteurs lorsqu''il y a trop d''aide d''État, par exemple les véhicules
  électriques. Nous devons réengager le dialogue stratégique avec la Chine. Donc leur
  dire, nous ne croyons pas au système de tarifs, nous pensons que c''est une mauvaise
  idée. Mais nous devons résoudre les déséquilibres. Il nous faut probablement davantage
  de transferts, davantage d''investissements pour les secteurs critiques dans lesquels
  nous pourrions travailler ensemble. Et donc, je pense que le fait de rééquilibrer
  et de réduire les risques, c''est quelque chose qui est tout à fait faisable au
  niveau européen. Nous allons rester, bien entendu, engagés par rapport aux Américains,
  mais sans devenir leur vassal. Monsieur le Premier ministre, désolé, nous allons
  en arriver aux dernières questions. Monsieur le Président, la différence entre le
  gouvernement Trump 1 et le gouvernement Trump 2. Vous semblez avoir une relation
  proche avec lui, avec bien entendu des hauts et des bas. Alors, à quel point est-ce
  difficile pour vous ? Écoutez, je prends ce que nos dirigeants donnent, c''est une
  philosophie que nous devons suivre. Bon, je connais Monsieur Trump très bien, c''est
  un caractère trempé. Mais, comme vous l''avez dit, nous devons être lucides vis-à-vis
  de la stratégie américaine. Et cela ne dépend pas uniquement du caractère et du
  comportement de Monsieur Trump. Et je dois dire que si les Américains ont décidé
  que leur priorité numéro un, c''est l''Amérique, l''Amérique d''abord, il a été
  élu pour cela. Il a été élu pour apporter des résultats dans ce domaine. Ensuite,
  la deuxième priorité, c''est la Chine. Mais, c''est Monsieur Obama qui a dit que
  je serais le premier président pacifique. Mais, c''est assez cohérent. Voyons ce
  qui a été fait en Afghanistan ou les autres décisions qui ont été prises. Ce n''était
  pas une approche pro-européenne. Bon, parfois, Monsieur Trump est plus explicite.
  Il peut être plus agressif sur le plan verbal, si vous voulez, mais ils ne mettent
  pas les intérêts européens dans leurs priorités. Voilà, c''est un fait. Mais, nous,
  en tant que dirigeants, nous ne sommes pas là pour commenter, réagir sur les tweets
  ou autres commentaires. Nous, nous sommes là pour défendre nos pays, notre continent.
  Ce que nous devons faire, c''est agir. Il faut, bien entendu, aller plus vite, c''est
  clair, pour renforcer notre indépendance. Ça, c''est vraiment mon obsession. Donc,
  plus prévisible. Et donc, à ce moment-là, est-ce que Trump va reprendre les affaires
  courantes ? Moi, je pense que c''est un moment historique. Moi, je suis d''accord
  avec Kyriákos. On peut être en contact avec les États-Unis sur certains sujets parce
  que nous avons tout de même des liens historiques et certaines valeurs communes
  avec les États-Unis. J''espère que nous allons pouvoir trouver des solutions au
  niveau du G7 sur les matières critiques et les terres rares parce que nous avons
  des intérêts partagés par rapport aux surcapacités chinoises et par rapport au fait
  qu''ils ont pratiquement le monopole là-dessus. Et je pense véritablement que cette
  approche américaine va durer tout simplement. Et au cours du premier mandat, un
  grand nombre de pays européens voyaient le gouvernement américain et se disaient :
  « Bon, d''accord, cela va, de toute manière, un jour, se terminer, donc essayons
  de résister et attendons patiemment. » Mais nous voyons bien désormais que nous
  devons réagir, nous devons réagir en tant qu''Européens, nous devons être plus unis,
  nous devons défendre nos intérêts. Et je pense que nous allons dans la bonne direction.
  Qu''en pensez-vous, Monsieur le Premier ministre ? Je vais vous poser encore une
  question concrète pour ensuite essayer de vous poser des questions pour conclure,
  si possible, de manière optimiste. Je lisais des mémoires qui disaient qu''il avait
  eu une rencontre avec Monsieur Giscard D’Estaing et qui lui disait : « Voilà, nous
  avons un voisin qui pose problème. Et que feriez-vous si vous aviez un tel voisin ?
  » Et je vous pose donc la même question. Eh bien, nous serions là si vous voyez
  ce que nous avons fait à l''été 2021, ce que nous avons fait avec Chypre, il y a
