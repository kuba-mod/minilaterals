title: 'Déplacement à Chypre : deuxième journée.'
text: Le Président de la République s'est rendu à Chypre à l'occasion de la réunion
  informelle du Conseil Européen, le 23 et le 24 avril 2026. Pour ce deuxième jour
  à Chypre, le Président Emmanuel Macron s'est adressé à la presse à son arrivée au
  centre de conférence Filoxenia . Puis, le chef de l'État a participé à une session
  de travail dans le cadre du Conseil européen informel. Il a échangé avec ses homologues
  sur le cadre financier pluriannuel 2028-2034 de l'Union européenne, le soutien à
  l'Ukraine ainsi que sur la situation internationale, notamment lors d'un échange
  consacré à la situation au Proche-Orient et au Moyen-Orient , en présence de dirigeants
  de la région.
