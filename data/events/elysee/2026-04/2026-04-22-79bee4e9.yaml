title: Compte rendu du conseil des ministres du 22 avril 2026.
text: 'Retrouvez le compte rendu du Conseil des ministres du mercredi 22 avril 2026 :
  Le ministre de l’économie, des finances et de la souveraineté industrielle, énergétique
  et numérique et le ministre de l’action et des comptes publics ont présenté un projet
  de loi relatif aux résultats de la gestion et portant approbation des comptes de
  l’année 2025. Ce projet de loi arrête le montant définitif des recettes et des dépenses
  du budget 2025, ainsi que le solde budgétaire qui en découle et le résultat de l’exercice.
  Il approuve également le compte de résultat de l’exercice, le bilan de l’État et
  le compte général de l’État, conformément aux dispositions de la loi organique relative
  aux lois de finances. L’année 2025 a été marquée par un début de gestion dans des
  conditions exceptionnelles sous loi spéciale et sous l’empire des services votés,
  en l’absence de loi de finances initiale (LFI) votée. La gestion 2025 se distingue
  par une réduction significative du déficit public, s’inscrivant pleinement dans
  la trajectoire de redressement des comptes publics. Malgré un contexte macroéconomique
  marqué par une croissance révisée à la baisse (0,9 % selon l’Insee, contre 1,1 %
  en dans le projet de loi de finances déposé pour 2025), le déficit public s’établit
  à 5,1 % du PIB, en amélioration de 0,7 point par rapport à 2024 (5,8 %). Ce résultat
  est également meilleur que la prévision de la LFI pour 2025, qui anticipait un déficit
  de 5,4 % du PIB. Le solde budgétaire de l’État s’élève à -124,2 milliards d’euros,
  ce qui marque une très forte amélioration de +14,8 milliards d’euros par rapport
  à la LFI pour 2025. Cette amélioration s’explique principalement par : - une hausse
  des recettes fiscales nettes de +6,8 milliards d’euros, portée notamment par l’impôt
  sur les sociétés (+6,9 milliards d’euros) ; - une augmentation des recettes non
  fiscales de +3,0 milliards d’euros, liée à la hausse du produit des amendes, sanctions,
  pénalités et frais de poursuites (+2,2 milliards d’euros) ; - une baisse des dépenses
  du budget général de 5,0 milliards d’euros, grâce à une charge de la dette inférieure
  de 3,3 milliards d’euros aux prévisions et un pilotage strict des dépenses ministérielles
  tout au long de la gestion. Par rapport à la loi de finances de fin de gestion (LFG),
  le solde budgétaire est en amélioration de +7,4 milliards d’euros, grâce à une meilleure
  exécution des recettes fiscales (+3,1 milliards d’euros) et non fiscales (+0,9 milliard
  d’euros), une amélioration du solde des comptes spéciaux (+2,5 milliards d’euros)
  une baisse des dépenses du budget général (-0,9 milliard d’euros). Le résultat patrimonial
  de l’État s’établit à -129,5 milliards d’euros, soit une dégradation de 7,1 milliards
  d’euros par rapport à 2024, principalement en raison du décalage temporel entre
  comptabilité patrimoniale et comptabilité budgétaire, dans la prise en compte des
  charges et dépenses, d’une part, et des produits et recettes, d’autre part. De même,
  le bilan de l’État se dégrade de 116,1 milliards d’euros, mais dans une mesure moindre
  qu’en 2024 (-118,7 milliards d’euros), en raison principalement de la hausse de
  l’endettement financier (+138,6 milliards d’euros, à comparer aux +171,5 milliards
  d’euros en 2024) et ce en dépit d’une plus-value des actifs immobilisés (+23,1 milliards
  d’euros). La maîtrise de la dépense publique a été renforcée en 2025, avec la mise
  en place de comité d’alerte des finances publiques et un pilotage rigoureux tout
  au long de l’année. Pour éviter toute dégradation significative de la trajectoire
  des finances publiques, le Gouvernement a : - limité au strict nécessaire les reports
  entrants avec pour objectif de revenir progressivement à un niveau frictionnel ;
  - pris un décret d’annulation en avril pour un montant total de -2,7 milliards d’euros
  ; - procédé à un premier surgel concomitant à ces annulations et du même ordre de
  grandeur, visant à ralentir la dépense et à reconstituer une réserve de précaution
  à un niveau cohérent avec l’ampleur des aléas identifiés sur l’exercice ; - puis
  procédé à un second surgel en septembre (1,5 milliard d’euros), assorti de mesures
  d’économies ciblées, pour sécuriser le respect global des plafonds fixés par la
  LFI 2025. Ces mesures ont permis de limiter l’exécution sur le périmètre des dépenses
  de l’État à 488,2 milliards d’euros, soit une exécution dans l’épure de la LFI pour
  2025. Enfin, l’ajustement structurel réalisé en 2025 (+0,9 point de PIB potentiel)
  a été nettement plus important que ce qui était projeté dans la loi de programmation
  des finances publiques pour l’année 2025 (+0,4 point). Cette amélioration illustre
  l’efficacité des réformes engagées et la rigueur du pilotage budgétaire. La loi
  de finances initiale pour 2026 s’inscrira dans la continuité de cette trajectoire,
  avec un suivi renforcé de l’exécution budgétaire et une attention particulière portée
  à la tenue et à la qualité de la dépense publique. Le conseil des ministres a adopté
  les mesures individuelles suivantes : - Mme Cindy LEONI, administratrice de l’État,
  est nommée déléguée interministérielle à la lutte contre le racisme, l''antisémitisme
  et la haine envers les personnes lesbiennes, gays, bi et trans, à compter du 4 mai
  2026 ; - Mme Valérie PÉNEAU, inspectrice générale de l’administration, est nommée
  conseillère maître à la Cour des comptes (5ème tour), à compter du 11 mai 2026 ;
  - M. Olivier FOMBARON, conseiller référendaire à la Cour des comptes, est nommé
  conseiller maître à la Cour des comptes (1er tour), à compter du 11 mai 2026 ; -
  Mme Nicole TURON-CHERRAT, conseillère présidente de chambre régionale des comptes,
  est nommée conseillère maître à la Cour des comptes (hors tour), à compter du 11
  mai 2026. Sur proposition de la ministre des armées et des anciens combattants :
  Ont été adoptées diverses mesures d’ordre individuel concernant des officiers généraux
  du contrôle général des armées. Sur proposition du ministre de l’intérieur : - M.
  Etienne STOSKOPF, administrateur de l’État, est nommé secrétaire général du ministère
  de l’intérieur, à compter du 18 mai 2026 ; - il est mis fin, à sa demande, aux fonctions
  de préfète de la région Auvergne-Rhône-Alpes, préfète de la zone de défense et de
  sécurité Sud-Est, préfète du Rhône exercées par Mme Fabienne BUCCIO, à compter du
  18 mai 2026 ; - M. Etienne GUYOT, administrateur de l’État, est nommé préfet de
  la région Auvergne-Rhône-Alpes, préfet de la zone de défense et de sécurité Sud-Est,
  préfet du Rhône, à compter du 18 mai 2026 ; - Mme Sophie BROCAS, administratrice
  de l’État, est nommée préfète de la région Nouvelle-Aquitaine, préfète de la zone
  de défense et de sécurité Sud-Ouest, préfète de la Gironde, à compter du 18 mai
  2026 ; - M. Hugues MOUTOUH, administrateur de l’État, est nommé préfet de la région
  Centre-Val de Loire, préfet du Loiret, à compter du 18 mai 2026 ; - M. Stanislas
  BOURRON, administrateur de l’État, est nommé préfet du Val-de-Marne, à compter du
  18 mai 2026 ; - M. David CLAVIÈRE, administrateur de l’État, est nommé préfet du
  Calvados, à compter du 18 mai 2026 ; - M. François-Xavier BIEUVILLE, administrateur
  de l’État, est nommé préfet de la Loire, à compter du 18 mai 2026 ; - M. Frédéric
  POISOT, administrateur de l’État, est nommé préfet de Mayotte, à compter du 18 mai
  2026 ; - M. Thierry LAURENT, administrateur de l’État, est nommé préfet délégué
  chargé d’une mission territoriale temporaire, à compter du 18 mai 2026. Sur proposition
  de la ministre de la santé, des familles, de l’autonomie et des personnes handicapées
  : - il est mis fin, à sa demande, aux fonctions de directeur de la Caisse nationale
  d’assurance vieillesse, exercées par M. Renaud VILLARD, à compter du 1er mai 2026
