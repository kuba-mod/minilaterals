title: France and Sweden held a meeting in the Nuclear Steering Group in Paris.
text: In his speech on nuclear deterrence doctrine, given on March 2nd at Ile Longue,
  the President of the French Republic announced bilateral strategic dialogues with
  the European partners involved, to establish the concept of forward deterrence.
  France and Sweden held their first nuclear steering group meeting in Paris on Thursday,
  April 23rd, under the joint chairmanship of Elysée and the Swedish Prime Minister’s
  office. Cooperation is making headway. The roadmap has been established, and our
  two countries have reaffirmed their ambition for a stronger, safer and better defended
  Europe.
