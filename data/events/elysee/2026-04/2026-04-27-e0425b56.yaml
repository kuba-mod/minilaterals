title: La France et la Suède ont réuni à Paris le groupe de pilotag
text: Le Président de la République française avait annoncé, lors du discours sur
  la doctrine de dissuasion, le 2 mars à l'Ile Longue, la tenue de dialogues stratégiques
  bilatéraux avec les partenaires européens impliqués, pour mettre en œuvre le concept
  de dissuasion avancée. La France et la Suède ont réuni, ce jeudi 23 avril à Paris,
  leur premier groupe de pilotage nucléaire, sous la présidence conjointe de l'Elysée
  et du cabinet du premier ministre suédois. La coopération avance. La feuille de
  route a été établie et nos deux pays ont pu réaffirmer leur ambition d'une Europe
  plus forte, plus sûre et mieux défendue.
