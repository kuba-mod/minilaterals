title: 'One Health Summit: better health for all life and the planet.'
text: On April 7, 2026, France hosted the One Health Summit in Lyon to strengthen
  international cooperation in addressing health, food, and environmental risks. The
  One Health approach aims to sustainably balance and optimize the interdependent,
  inseparable, and closely connected health of people, animals, plants, and ecosystems.
  The One Health Summit will bring together, for the first time, heads of state and
  government from around the world, representatives of relevant international and
  regional organizations, parliamentarians, scientists, as well as representatives
  from the private sector, civil society, local authorities, development banks, and
  youth organizations, to accelerate the implementation of the “One Health” approach.
  Upon his arrival in Lyon, President Emmanuel Macron took part in a meeting on the
  architecture of global health . He then opened the high-level session bringing together
  all key international stakeholders . The President of the Republic then attended
  several panels on governance and science , communicable diseases , and non-communicable
  diseases . The Lyon commitments for health for all life and the planet.
