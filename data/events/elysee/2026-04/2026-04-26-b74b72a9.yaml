title: Disparition de Claude Bessy.
text: 'Danseuse, chorégraphe, professeur, directrice de l’Ecole de danse, Claude Bessy
  avait tracé par son talent et sa force d’âme une carrière unique, au service de
  la danse dont elle écrivit quelques unes des plus belles pages du XXe siècle. Sa
  disparition est celle de décennies de passion et de transmission. Née le 21 octobre
  1932, Claude Bessy vit le jour dans une famille d’artistes au sein du 9 e arrondissement
  de Paris non loin de l’Opéra Garnier. Parce qu’elle dessinait des ballerines sur
  ses cahiers d’écolier, son institutrice la présenta au danseur Gustave Ricaux. Claude
  Bessy accomplit ensuite une carrière stellaire à l’Opéra de Paris : prise à l’Ecole
  de danse à dix ans, puis dans le corps de ballet à quatorze, étoile à vingt-quatre.
  Très vite repérée comme un des talents les plus éclatants de sa génération, elle
  brilla dans « Le Palais de cristal » et « Sérénade » de George Balanchine et « Mirages »
  de Serge Lifar puis dans les grands rôles classiques : « Giselle » et « Le Lac des
  Cygnes ». Elle participa aux créations de Serge Lifar, avec l’ « Atlantide », et
  marqua les esprits dans « Daphnis et Chloé » de George Skibine en 1961. Vedette
  de l’après-guerre, surnommée la « Brigitte Bardot du ballet », Claude Bessy était
  réclamée par le monde entier, de New York à Hollywood, où Gene Kelly l’embaucha
  pour « L’invitation à la danse », un film de 1956. Elle retrouva le danseur dans
  « Pas de dieux », en 1960, qui fit entrer le jazz à l’Opéra. Claude Bessy passa
  dans la légende trois ans plus tard, interprète du « Boléro » de Maurice Béjart,
  sur la scène du Palais des sports. Après sa carrière de danseuse, Claude Bessy prit
  la suite de Roland Petit à la tête du ballet de l’Opéra de Paris en 1970, puis devint
  directrice de l’Ecole de danse trois ans plus tard. Pendant trente ans, jusqu’en
  2004, elle en marqua profondément l’histoire. Ce fut elle qui imagina le bâtiment
  de Christian de Portzamparc inauguré en 1987 à Nanterre, elle aussi qui révolutionna
  l’accueil et la formation des élèves. Claude Bessy vit passer des générations de
  danseurs, Patrick Dupond, Sylvie Guillem, Marie-Claude Pietragalla, Nicolas Le Riche,
  et tant d’autres, qui brillaient dans les Démonstrations et autres spectacles annuels,
  dont elle imaginait les décors, costumes et chorégraphies, et emmenait dans des
  tournées internationales. Ce fut encore Claude Bessy qui fit entrer le contemporain
  ou la vidéo à l’Ecole de l’Opéra de Paris. En trente ans, son travail, sa vision,
  sa personnalité permirent de placer l’école au sommet des meilleures écoles du monde.
  Elle fut aussi une chorégraphe remarquée. Fidèle au neuvième arrondissement, reconnue
  à la hauteur de son talent et de sa force de conviction, légende de la danse en
  France et dans le monde, Claude Bessy transmit les leçons de sa vie à travers des
  ouvrages. Elle était, pour bien des danseurs, l’ « âme de la danse », du nom du
  ballet qu’elle dansait à vingt ans et qui fut l’un des fils rouges de sa vie. Elle
  ne cessa de vibrer pour ses anciens élèves de l’Opéra, au Palais Garnier et ailleurs.
  Le Président de la République et son épouse saluent une immense artiste qui fit
  rayonner la France. Ils adressent à sa famille, ses proches, ses élèves et admirateurs,
  tous ceux qui l’aimaient, leurs condoléances émues.'
