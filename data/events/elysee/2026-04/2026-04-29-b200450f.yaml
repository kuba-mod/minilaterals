title: Compte rendu du conseil des ministres du 29 avril 2026.
text: 'Retrouvez le compte rendu du Conseil des ministres du mercredi 29 avril 2026 :
  Le ministre du travail et des solidarités a présenté un projet de loi de sécurisation
  permettant aux boulangers-pâtissiers artisanaux et aux artisans fleuristes d’occuper
  des salariés volontaires le 1er mai grâce au dialogue social de branche. Fruit d’une
  longue et riche histoire, symbole des conquêtes sociales, le 1er mai est le seul
  jour férié obligatoirement chômé et payé pour tous les salariés en France. Ce n’est
  que par exception qu’il est possible d’employer un salarié au cours de la journée
  du 1er mai. Cette exception concerne les établissements et les services qui, en
  raison de la nature de leur activité, ne peuvent interrompre le travail. Ainsi qu’il
  résulte de la jurisprudence constante de la Cour de cassation, lorsqu’il souhaite
  employer des salariés le jour du 1er mai, il appartient toujours à l’employeur concerné
  d’établir que, dans sa situation particulière, la nature de l’activité que ses salariés
  exercent ne permet pas d’interrompre leur travail le jour du 1er mai. La Cour de
  cassation a également précisé qu’il n’existait pas de dérogation de principe au
  chômage du 1er mai en faveur des établissements bénéficiant d’une dérogation de
  droit au repos dominical, mettant ainsi un terme à une tolérance ministérielle antérieure
  qui autorisait le travail du 1 er mai pour les établissements autorisés de plein
  droit à travailler le dimanche. Cet état du droit est source d’incertitudes et de
  difficultés pour certains secteurs, à l’origine d’une initiative législative d’origine
  parlementaire. Toutefois, à l’issue de concertations avec les partenaires sociaux
  représentatifs au niveau interprofessionnel, le Gouvernement entend recentrer la
  dérogation de droit envisagée sur les secteurs des boulangerspâtissiers artisanaux
  et des artisans fleuristes. Une clarification du droit applicable pour sécuriser
  ces établissements, apparaît donc nécessaire tout en fixant des garanties et en
  accordant une place centrale au dialogue social de branche pour définir des conditions
  indispensables permettant de s’assurer que le droit des salariés est préservé. Tout
  d’abord, dans ces secteurs, seuls les salariés volontaires, qui auront donné leur
  accord par écrit à leur employeur, pourront être occupés le 1er mai. Cette dérogation
  circonscrite aux boulangers-pâtissiers artisanaux et aux artisans fleuristes ne
  pourra être applicable que si des accords de branche sont conclus pour prévoir dans
  ces deux secteurs précis la possibilité de travailler le 1er mai en précisant les
  modalités de recueil de l’accord écrit du salarié volontaire et les modalités de
  prise en compte d’un changement d’avis du salarié. Ces salariés percevront, en plus
  du salaire correspondant au travail accompli, une indemnité égale au montant de
  ce salaire. Ainsi, le dialogue social des partenaires sociaux au niveau des branches
  est favorisé pour garantir que la possibilité d’occuper des salariés le 1er mai
  dans ces deux secteurs est encadrée. Ce projet de loi s''inscrit donc dans une volonté
  de clarification des conditions dans lesquelles certains établissements peuvent,
  à titre dérogatoire, employer des salariés le 1er mai, sans remettre en cause le
  principe du chômage de ce jour particulier et en préservant un équilibre visant
  à garantir le caractère très circonscrit de cet aménagement du cadre juridique sur
  le 1er mai, en s’appuyant sur le dialogue social de branche. Sous réserve de l’adoption
  de ce projet de loi par le Parlement et de la conclusion des accords de branche
  prévus par le dispositif, le nouveau cadre juridique pourrait s’appliquer pour les
  secteurs concernés à partir du 1er mai 2027. En ce qui concerne le 1er mai 2026,
  le Gouvernement a appelé à l’intelligence collective des parties prenantes pour
  un fonctionnement apaisé des boulangeries-pâtisseries artisanales et des artisans
  fleuristes ce jour-là. Les engagements pris par le Gouvernement vis-à-vis des boulangers-pâtissiers
  artisanaux et des artisans fleuristes seront tenus. Le ministre de l’économie, des
  finances et de la souveraineté industrielle, énergétique et numérique et la ministre
  déléguée auprès du ministre de l’économie, des finances et de la souveraineté industrielle,
  énergétique et numérique, chargée de l’intelligence artificielle et du numérique
  ont présenté un projet de loi portant habilitation du Gouvernement à refondre par
  ordonnance la partie législative du code des postes et des communications électroniques.
  Ce projet de loi présenté sur le fondement de l’article 38 de la Constitution, permettra
  au Gouvernement d’améliorer la lisibilité et l’intelligibilité de ce code créé en
  1952 qui, malgré les mutations profondes du secteur des communications électroniques
  intervenues au cours de ces soixante-dix dernières années, n’a fait l’objet que
  de modifications au fil de l’eau en complexifiant l’usage. Comme il est de coutume
  pour les codes anciens n’ayant jamais fait l’objet de refonte globale, le Gouvernement
  sollicite un délai de 36 mois d’habilitation, nécessaires pour mener à bien ce travail.
  Le ministre délégué auprès de la ministre de la transition écologique, de la biodiversité
  et des négociations internationales sur le climat et la nature, chargé de la transition
  écologique, a présenté une ordonnance portant adaptation du droit français aux textes
  pris pour l’application du règlement (UE) 2023/956 du Parlement européen et du Conseil
  du 10 mai 2023 établissant un mécanisme d’ajustement carbone aux frontières (MACF).
  Cette ordonnance est prise sur le fondement de l’article 34 de la loi n° 2025-391
  du 30 avril 2025 portant diverses dispositions d''adaptation au droit de l''Union
  européenne en matière économique, financière, environnementale, énergétique, de
  transport, de santé et de circulation des personnes. Cette disposition habilite
  le Gouvernement à prendre les mesures législatives nécessaires à la bonne mise en
  œuvre du mécanisme. La présente ordonnance introduit les dispositions nécessaires
  à la communication d’informations entre les agents de la direction générale des
  finances publiques (DGFiP) et les agents de l’autorité administrative compétente
  pour le MACF. Elle permet les demandes d’informations de l''autorité administrative
  afin d’éviter certains schémas de fraude. Dans un second temps, cette disposition
  permettra la mise en œuvre du principe du « dites-le nous une fois » pour les démarches
  en ligne relatives au MACF. De même, cette ordonnance modifie le code monétaire
  et financier, afin que la Banque de France puisse communiquer à l’autorité administrative
  compétente certaines informations en matière de capacité opérationnelle et financière.
  Les modifications du livre des procédures fiscales et du code monétaire et financier
  poursuivent ainsi le double objectif d’effectivité des contrôles incombant à l’autorité
  administrative compétente et de simplification de la vie administrative des entreprises.
  Enfin, cette ordonnance précise les procédures afférentes aux décisions individuelles
  prises par l’autorité administrative compétente en application du règlement MACF.
  Elle clarifie le déroulement de ces procédures afin d’en garantir la prévisibilité
  pour les entreprises concernées. Cette ordonnance accompagne la mise en œuvre effective
  du MACF depuis le 1er janvier 2026, en tenant compte des retours d’expérience de
  la période transitoire qui s’est déroulée d’octobre 2023 à décembre 2025. Elle tient
  compte des mesures de simplifications adoptées dans le cadre du paquet législatif
  européen « Omnibus I ». Le conseil des ministres a adopté les mesures individuelles
  suivantes : - M. Emmanuel GLIMET, conseiller maître à la Cour des comptes, est nommé
  président de chambre à la Cour des comptes. Sur proposition du ministre de l’économie,
  des finances et de la souveraineté industrielle, énergétique et numérique : - M.
  Cédric BOURILLET, ingénieur général des mines, est nommé directeur général de l’énergie
  et du climat, à compter du 1er mai 2026. Sur proposition de la ministre de la santé,
  des familles, de l’autonomie et des personnes handicapées : - M. Hugo GILARDI, administrateur
  de l’État, est nommé directeur général de l’offre de soins, à compter du 18 mai
  2026. - il est mis fin, à sa demande, aux fonctions de directeur général de l’agence
  régionale de santé Pays de la Loire exercées par M. Jérôme JUMEL Le ministre du
