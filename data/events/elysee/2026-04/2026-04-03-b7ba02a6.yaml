title: 'From France to the Republic of Korea: our commitment for the preservation
  of the Ocean.'
text: Together in Seoul on 3 April 2026, Presidents Lee Jae Myung and Emmanuel Macron
  committed to building on the success of Nice for the protection and sustainable
  use of the Ocean, coastal and marine ecosystems and biodiversity, in both bilateral
  and multilateral formats, whilst acknowledging the critical role of the Ocean in
  the global response to climate change. The Republic of Korea and France reiterated
  their willingness to pursue efforts to increase the profile of maritime affairs
  and Ocean preservation on the international agenda, which is an indispensable condition
  for the preservation of life on Earth. Located on either side of the Eurasian continent,
  the Republic of Korea and France share unbreakable cultural, economic and political
  ties to the Ocean. Aware of the Ocean as a driving force for the prosperity of humanity
  and their two populations, they are united in their desire to conserve, use and
  preserve the Ocean and ensure the sustainable use of its resources. France and Costa
  Rica joined forces to organise the Third United Nations Conference on the Ocean
  (UNOC3) in June 2025, in Nice. At a time when the Ocean in under considerable strain,
  this unprecedented summit brought together over 60 Heads of States and Government
  and 130,000 participants around ambitious action for the Ocean, resulting in the
  adoption of the Nice Ocean Action Plan containing strong and concrete commitments
  for Ocean conservation. UNOC3 and its commitments for the Ocean squarely placed
  the spotlight on diverse maritime affairs, ranging from Ocean protection’s structural
  under-financing to the sustainable management of Ocean resources. During the 80th
  session of the United Nations General Assembly, in September 2025, it was decided
  that the Republic of Korea and Chile would have the honour of organising the Fourth
  United Nations Ocean Conference (UNOC4) in 2028. As the last UN Ocean Conference
  before the 2030 deadline of the Sustainable Development Goals (SDGs), this will
  be a crucial moment to ensure continuity of political action and assess our collective
  capacity to preserve the integrity of the Ocean and the health of the world’s seas.
  The Republic of Korea and France will spare no effort to guarantee a high level
  of ambition towards 2028 and beyond, and underscore the importance of efficient,
  impact-driven multilateralism. In order to reach SDG 14 (Life Below Water) and implement
  the 2030 Agenda, the Republic of Korea and France commit to maintaining global momentum
  in favour of Ocean protection in all international and regional fora. Their goal
  is to preserve the Ocean, whilst enabling the development of a fair, sustainable
  blue economy, based on respect for the Ocean and strengthening the resilience of
  coastal communities.
