title: Joint political declaration on the reform of the global health architecture.
text: On the margins of the One Health Summit in Lyon, France, we, Heads of State
  and Government, leaders of regional and international organizations, global health
  actors, representatives of civil society REAFFIRM our commitment to multilateralism
  in order to achieve global health outcomes UNDERLINE that we stand at a defining
  moment for global health, faced with rapid and unprecedented challenges unfolding
  amid decreasing development aid, escalating demographic and climate impacts, tighter
  fiscal space, increased health needs, prolonged conflicts, and economic imbalances,
  which threaten to overturn hard-won health and human gains. RECOGNIZE the remarkable
  progress accomplished by the global health community over the past decades and reaffirm
  our responsibility to sustain these achievements by safeguarding, streamlining and
  where necessary reinforcing the essential functions of existing multilateral and
  regional health institutions and partnerships, and by preserving the health-related
  global public goods they help provide. At the same time, we acknowledge the complexity
  and fragmentation of the global health architecture which must be urgently adapted
  and strengthened, so that it can rapidly and effectively respond to emerging health
  needs and challenges. WELCOME the ongoing discussions on the reform of the global
  health architecture to make it more efficient, collaborative, sustainable, fit for
  purpose, country-driven and accountable, including through regional and global initiatives.
  AFFIRM that reforms must, among other objectives, enable a fundamental shift towards
  country health sovereignty ; outline concrete transition strategies in support of
  countries’ self-reliance ; place primary health care at the heart of resilient national
  health systems ; safeguard sexual and reproductive health and rights ; promote to
  advance equitable and affordable access to health and innovations and promote inclusive
  governance ; incentivize a cross-sectoral One Health approach to strengthen health
  outcomes ; advance meaningful and comprehensive civil society and community engagement.
  We commit to ensuring to promote that advances in science, in a reformed global
  health architecture, are increasingly accessible globally to ensure health for all,
  rooted in an evidence-based approach. Further RECOGNIZE the leadership demonstrated
  by countries on the need for reform and that the reform of the global health architecture
  should embrace the ongoing reflections on the evolution of the multilateral development
  system and global financial architecture and the UN80 process, as well as evolving
  national and regional dynamics related to health sovereignty. SUPPORT the development
  of country-platform like approaches as key driver for optimizing coordination between
  actors and alignment on national strategies, while ensuring the efficient use and
  mobilization of domestic and complementary external resources in order to increase
  efficiency and integration. WELCOME to that end the National Health Compacts and
  similar approaches. SUPPORT the development of a variety of financing tools for
  health, taking into account the French G7 presidency deliverables and the proposals
  made by the African Union, among others, and the mobilization of domestic resources
  as an integral part of increasing health sovereignty. COMMEND the central role of
  World Health Organization (WHO) as the coordinating and norms and standard-setting
  authority on international health work, and express our shared determination to
  actively engage in the joint process supporting the reform of the global health
  architecture hosted by the WHO. This process should build upon existing global and
  regional reflections and initiatives, fostering inclusive dialogue, information-sharing
  and seeking areas of consensus with a strong operational focus. Within an ambitious
  timeframe, it should lead to a set of recommendations, jointly developed by the
  actors in global health, and contribute to a strong, efficient and equitable global
  health ecosystem. REITERATE our commitment to strengthen equitable partnerships,
  to continue working towards the goal of universal health coverage and the protection
  of the right to health, to foster constructive dialogue between low-, middle- and
  high-income countries and to drive synergies amongst global health actors. WELCOME
  continued high-level political dialogue among interested countries and key global
  health stakeholders. Adopted in Lyon, France, 7 April 2026 by the representatives
  or Heads of State and Government of Armenia, Australia, Botswana, Cambodia, Canada,
  Cyprus, France, Germany, Ghana, Guinea, Japan, Kenya, Norway, Singapore, South Africa,
  Spain, Sweden, Tunisia, United-Kingdom, And by Africa Center for Diseases Control
  and Prevention, Gavi- the vaccine alliance, Global Fund to Fight AIDS, Tuberculosis
  and Malaria, Pandemic Fund, the Joint United Nations Programme on HIV/AIDS, United
  Nations Development Programme, the United Nations International Children's Emergency
  Fund, Unitaid, World Health Organization; Wellcome Trust, Pact for Prosperity, People
  and the Planet (4P); HEAR CSO (Health Architecture Reimagined – Civil Society);
  Global Health Advocates & Impact Santé Afrique – Co-chairs of the 2026 C7 Global
  Health Working Group; With the presence of the African Union Commission, the European
  Commission, the Organisation for Economic Cooperation and Development (OECD) and
  the World Bank.
