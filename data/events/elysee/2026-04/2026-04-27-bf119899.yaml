date: '2026-04-27'
type: press_release
source_name: elysee
title: 'Déplacement en Andorre : première journée.'
text: 'Sept ans après sa dernière visite, le Président Emmanuel Macron s''est rendu
  en Principauté d''Andorre en sa qualité de Coprince le 27 et 28 avril 2026. Dans
  un contexte régional en mutation, cette visite visait à accompagner la modernisation
  économique, sociale et européenne d’Andorre et réaffirmer le lien historique et
  singulier qui unit la France à la principauté. À cette occasion le chef de l’Etat
  est venu soutenir les projets de coopération en matière de transition écologique
  à travers des coopérations énergétiques franco-andorranes, encourager la poursuite
  du rapprochement d’Andorre avec l’Union européenne et aborder la question des droits
  des femmes , sujet particulièrement sensible dans un pays où l’avortement demeure
  interdit. À son arrivée, le chef de l’État s''est addressé à la presse puis s''est
  entretenu avec Xavier Espot Zamora, le chef du gouvernement d''Andorre , ainsi qu''avec
  Josep-Lluis Serrano Pentinat, Evêque d''Urgell et Co-prince épiscopal d''Andorre.
  Emmanuel MACRON Bonjour à toutes et à tous. Heureux d’être en Andorre. Merci beaucoup
  d’être là. Je suis très heureux de revenir en Andorre et d’être avec Monsieur le
  chef du gouvernement. Nous allons nous entretenir. Je verrai après le co-prince.
  On aura une cérémonie de lettres de créance. Puis on aura l''occasion de revenir
  sur des thématiques importantes, aujourd''hui et demain : la jeunesse, l''éducation,
  et aussi de nombreux sujets sur l''avenir européen, qui me paraît très important.
  Je m''exprimerai demain plus longuement. Merci beaucoup, en tout cas, d''être là
  et d''accompagner Andorre sur cette voie. Journaliste Monsieur Macron, tout à l''heure,
  vous avez fustigé ces « maboules qui veulent se fâcher avec l''Algérie ». Qu''est-ce
  que vous vouliez dire précisément ? Emmanuel MACRON D''abord, j''étais très heureux
  d''être en Ariège ce matin et en ce début d''après-midi. On a vu cet hôpital, formidable,
  qui vient d''être fait. L''intégralité des médecins qui étaient là aujourd''hui
  sont des praticiens hospitaliers qui ont été formés hors de France et qu''on a régularisés
  après des tests. Donc je pense que c''est très important dans la période qui vient
  de ne pas accepter l''esprit de réduction, de caricature. C''est important de pouvoir
  coopérer avec des pays en ayant un dialogue exigeant, en défendant nos intérêts,
  ce qu''on fait, mais en étant respectueux de chacun. Je pense que la situation internationale
  nous montre qu''il faut être loin de toutes les caricatures, être plutôt dans le
  dialogue, avancer, être respectueux, faire respecter aussi nos droits. C''est ce
  qu''on fait sur beaucoup de sujets, mais considérer aussi que pour faire tourner
  nos services publics, on a parfois besoin de leurs ressortissants. Journaliste Est-ce
  que vous visez Bruno RETAILLEAU ? Emmanuel MACRON Non, je ne vise personne. Non,
  non. Je ne vise personne. Je suis dans une approche positive. Je dis qu''on a besoin
  de ces femmes et ces hommes qui servent notre pays. Journaliste Justement, Monsieur
  le Président, vous parlez de la situation internationale. Vous avez échangé avec
  une personne qui vous a interpellé, vous avez dit : « On se bat pour que le prix
  de l''essence diminue. Il faut qu''on rouvre ce fichu détroit [d''Ormuz], C’est
  ça qui nous fout dedans. On se bat mais il y en a qui ne nous aident pas ». Qui
  ne nous aide pas ? Emmanuel MACRON Aujourd’hui, on voit bien que la tension qui
  s''entretient et les réponses qui se font de loin ne sont pas bonnes. Le cessez-le-feu
  est en place. C''est une bonne chose. Il inclut maintenant le Liban. Nous l''avons
  fortement souhaité et nous avons œuvré pour. Il faut maintenant que les discussions
  puissent avancer. Pendant ce cessez-le-feu et ces discussions, on fait tout pour
  que le trafic puisse reprendre de manière normale. J''ai eu l''occasion de m''entretenir
  hier avec le Président Trump pour aussi lui dire à quel point nous condamnions la
  violence dont il avait été victime. J’ai essayé de le convaincre aussi que c''est
  important de pouvoir rouvrir de part et d''autre le trafic pour permettre au gaz,
  au pétrole, aux engrais, aux marchandises de pouvoir passer ce détroit parce que
  ça impacte l''économie mondiale. Nous avons mis en place une coalition qui a vocation
  justement aussi à sécuriser, stabiliser, montrer que la communauté internationale
  est derrière une telle ouverture. J''espère que nous arriverons à convaincre les
  parties prenantes dans les prochains jours. Je réengagerai [les échanges] d''ailleurs
  dès la fin de cette visite, en échangeant à nouveau avec les autorités iraniennes.
  Journaliste J’imagine que par rapport à la personne qui vous a interpellé, vous
  avez un sentiment d’inquiétude ? Emmanuel MACRON On en parlait avec le chef du gouvernement :
  partout en Europe, je dirais [même] partout dans le monde, les prix pèsent. On voit
  bien, on a été ce matin dans un département qui est très rural, tous nos compatriotes
  qui sont dans la ruralité sont touchés par le prix de l''essence, parce qu''il n''y
  a pas d''alternative de transport en commun. Donc c''est très dur pour eux. Le gouvernement
  a pris des premières mesures sur certains secteurs ou pour les gros rouleurs. Enfin,
  il faut qu''on traite le problème à sa racine. Sa racine, c''est en effet de permettre
  à ces routes de se rouvrir. Je veux dire à nos compatriotes qu''on est à leur côté,
  que le gouvernement fait le maximum, mais qu''on est surtout à la tâche pour que
  les choses repartent dans la bonne direction et que le calme revienne. Emmanuel
  MACRON Je l''ai dit, il faut de la transparence et de la méthode. Il ne faut pas
  qu''on se divise en ce moment-là. Vous savez, les seuls qui profitent, ce sont ceux
  qui produisent. On ne produit pas, nous. Donc [sur] toute la chaîne, après, il faut
  qu''il y ait de la transparence. C''est ce que le gouvernement a mis en place dès
  le début, avec des professionnels en espèce, notre répression des fraudes et la
  concurrence, qui regardent, oui, bien sûr. Puis cette transparence, elle vient ensuite
  au gouvernement, elle est partagée. Et évite qu''il y ait des marges excessives
  qui se forment. Mais la cause du problème, ce n''est pas tel ou tel, vous savez,
  chez nous. La cause du problème, c''est qu''aujourd''hui, il y a ce blocus et il
  y a le détroit d''Ormuz qui est fermé. Donc il faut traiter le problème à la racine,
  permettre aux choses de repartir, et puis, d''une manière aussi plus profonde, nous
  réduire nos dépendances. C''est au long cours. Je ne suis pas en train de vous dire
  [que] c''est ce qui va permettre de régler le problème de tous nos compatriotes
  demain. Mais tout ce qu''on a fait ces dernières années, qui réduit nos dépendances
  aux hydrocarbures fossiles, va dans la bonne direction, donc il faut en même temps
  l''intensifier, parce qu''on voit bien ce à quoi ça nous expose. Emmanuel MACRON
  Merci beaucoup. En tout cas, je suis très heureux d''être en Andorre. Emmanuel MACRON
  Bonjour à toutes et à tous. Heureux d’être en Andorre. Merci beaucoup d’être là.
  Je suis très heureux de revenir en Andorre et d’être avec Monsieur le chef du gouvernement.
