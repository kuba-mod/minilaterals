  conjointe s''est ensuite déroulée avec les des deux Co-princes pour la présentation
  de lettres de créance pour quinze nouveaux ambassadeurs accrédités en Andorre .
  Le Président Emmanuel Macron a également visité le site de la centrale hydroélectrique
  FEDA , où le chef du gouvernement lui a présenté le projet d''accord de coopération
  entre EDF et FEDA avec l''installation d''un groupe pompte alternateur porté par
  les deux opérateurs à l''Hospitalet. À l''issue de cette première journée, un dîner
  a été offert à l''Andorra Park Hotel. 22 juillet 2026 - Seul le prononcé fait foi
  Mesdames et Messieurs les conseillers généraux, Mesdames et Messieurs les ambassadrices
  et ambassadeurs, Mesdames et Messieurs en vos grades et qualités, J''ai un discours
  très intelligent et très bien préparé. Mais je vais encore donner un discours demain.
  On s''est déjà exprimés, alors permettez-moi, puisque c''est un toast dont il s''agit,
  de vous parler davantage avec le cœur, pour vous dire combien je suis heureux de
  vous retrouver, sept ans après. Monseigneur, c''était votre prédécesseur, mais beaucoup
  d''entre vous étaient là. Je retrouve des visages amis qui ont parfois égrainé quelques
  visites. Depuis sept ans, beaucoup de choses se sont passées. Mais je veux vous
  dire la joie qui est la mienne de vous retrouver, de retrouver les élus, les forces
  vives du territoire. Alors demain, je ne ferai pas le parcours entre les sept paroisses.
  Nous l''avions fait il y a sept ans, mais nous irons voir notre jeunesse, nous irons
  au Parlement, et nous aurons l''occasion de voir l''ensemble des maires, des élus
  si importants. Mais je veux vous dire combien, en tant que co-prince, je suis fier
  de ce que vous avez collectivement fait durant ces sept années écoulées. Je vous
  le dis tout particulièrement, Monsieur le chef du gouvernement, mais cela va à toute
  la principauté. Vous avez d''abord tenu, tenu dans une période qui était si difficile,
  celle de la pandémie du Covid, où évidemment compte tenu des caractéristiques qui
  sont les nôtres ici, beaucoup était à craindre. Vous avez résisté avec intelligence,
  avec force. Puis, le monde ne s''est pas calmé dans les années qui ont suivi. Nous
  en connaissons les tourments. Vous avez tenu ce cap auquel je suis particulièrement
  attaché. Nous l''avons exprimé chacun dans nos termes tout à l''heure, Monseigneur,
  co-princes inséparables. Au fond, cette neutralité active à l''international et
  cette capacité si singulière de l''Andorre d''être ancrée, attachée à ses traditions,
  à sa géographie et à savoir toujours se projeter vers une forme d''universel, vers
  des principes qui la dépassent et à savoir aussi embrasser une Europe au sein de
  laquelle elle est inscrite. C''est dans cette tension permanente entre la modernité
  à laquelle nous sommes confrontés et qui est aussi le départ de l''avenir d''Andorre
  sur le plan économique et ses traditions, entre son ancrage, son enracinement et
  son avenir européen que se joue en effet le destin de la principauté. C''est ce
  qui nous rend si forts, c''est ce qui vous rend en effet si singuliers. Ce chemin
  n''est pas exempt de ce qui fait parfois le charme, d''autres fois les tourments
  du quotidien, mais ça importe peu quand on regarde le chemin parcouru. Mais d''ici,
  vous le voyez depuis les cimes, ce qui est une bonne chose. Je suis heureux d''avoir
  emmené dans mes bagages les voisins d''Occitanie, en particulier de l''Ariège, Monsieur
  le ministre, pour des projets magnifiques comme celui que nous avons vu entre EDF
  et FEDA à l''instant, mais aussi pour des partenariats multiples. Nous savons combien
  ils sont importants, qu''il s''agisse des routes, des projets d''échanges. Vous
  savez combien nous tenons à ce partenariat quand il s''agit aussi, par exemple,
  d''éducation, on y reviendra demain, et de tout ce qui fait la vie du quotidien.
  Vous dire que depuis sept ans, vous avez fait beaucoup de choses et vous avez bien
  fait. Et que nous nous retrouvons là. Je salue aussi les ambassadrices et ambassadeurs
  qui sont à nos côtés. Et je leur redis ce message important à porter à leur capitale :
  l''Andorre est une principauté singulière. Et aimez-la comme telle. Au fond, depuis
  plus de sept siècles, c''est ce compagnonnage singulier, Monseigneur, Urgell et
  Foix, et maintenant, entre les évêques co-princes et les présidents co-princes,
  qui fait aussi la force de cette principauté. Et qui lui donne ce rôle si actif
  à l''international que je rappelais tout à l''heure. Je suis pour ma part très heureux
  de vous retrouver. Et très heureux de retrouver ce caractère aussi pyrénéen qui
  m''est cher et familier. Pour vous dire les choses de manière un peu plus intime.
  Les gens ignorent tout ce qu''on peut faire dans nos vallées quand ils vivent loin.
  Mais ceux qui ont bâti ces premiers barrages, ces premières routes, qui ont fait
  la principauté d''aujourd''hui, les premiers à dos d’âne, en tout cas à sueur d’hommes.
  C''est à eux que nous devons tout cela. Ceci donne des caractères qui sont faits
  pour le monde qui s''offre à nous. C''est-à-dire des caractères qui ne cèdent rien
  et qui, dans les temps difficiles, se révèlent. C''est ce que vous êtes. C''est
  la chance de cette principauté. Alors, mesdames et messieurs, chers amis, permettez-moi
  de vous dire toute la joie ce soir de vous retrouver, d''être aux côtés du co-prince,
  du chef du gouvernement. Permettez-moi de vous souhaiter une excellente soirée en
  vous remerciant d''être là, en fidélité à l''Andorre, en fidélité à la principauté,
  en reconnaissance de tout ce qui a été fait. Et en sachant aussi que nous avons
  devant nous, j''en reparlerai demain plus avant, des défis qui nous attendent, mais
  que nous relèverons avec le même caractère, avec la même fidélité à cette histoire.
  Et pour ma part, avec la même confiance en vous. 22 juillet 2026 - Seul le prononcé
