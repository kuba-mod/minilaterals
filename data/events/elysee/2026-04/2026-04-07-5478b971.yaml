title: 'One Health & Beyond: A Multi-Stakeholder Declaration.'
text: 'Signatories : France, Cambodia, Botswana, Cyprus, Kenya, Armenia, Egypt, Brazil,
  Singapore, Thailand, United Arab Emirates, Democratic Republic of Congo, Mexico,
  Tunisia, World Health Organization, Africa CDC, CGIAR, FAO, WOAH) We, the undersigned
  governments, international organizations, research institutions, civil society organizations
  and private sector partners, Recognizing that climate change increasingly affects
  human, animal and ecosystem health, and that strengthening health resilience enhances
  climate ambition, social stability and sustainable development, Recalling the outcomes
  of recent Conferences of the Parties (COP), including the COP28 Declaration on Climate
  and Health, the Guiding Principles for Financing Climate and Health Solutions, and
  the initiatives launched at COP29 and COP30, including the Belém Health Action Plan,
  Acknowledging the findings of the Intergovernmental Panel on Climate Change (IPCC)
  regarding the increasing frequency of climate-sensitive diseases and the necessity
  of science-based adaptation pathways to reduce systemic vulnerabilities, Acknowledging
  that health considerations are already reflected across adaptation, mitigation co-benefits
  and sustainable development frameworks, and that further integration can be achieved
  within existing mandates and instruments, Affirm our shared commitment to advancing
  the integration of the One Health approach across climate action. We will progressively
  strengthen the integration of One Health considerations, as appropriate to national
  contexts, within Nationally Determined Contributions (NDCs), National Adaptation
  Plans (NAPs) and relevant national climate, development and sectoral strategies.
  This includes placing epidemiological surveillance and nutrition at the heart of
  state adaptation policies to anticipate and respond to evolving sanitary threats.
  We encourage the exchange of experiences and good practices in this regard, in preparation
  for COP31 and subsequent COP sessions. We commit to fostering science-based action
  by aligning national health-climate strategies with the latest IPCC assessment reports,
  ensuring that adaptation efforts are grounded in rigorous climate modeling and epidemiological
  projections. We will promote and support the development of implementable initiatives
  aimed at strengthening the resilience of health systems to climate-related risks,
  including : Recognizing the importance of evidence-based policy and anticipatory
  risk management, we will support voluntary efforts to enhance data collection and
  knowledge-sharing on climate-related health, zoonotic and vector-borne risks, aiming
  to reduce uncertainty through better access to climate and health data for all stakeholders.
  In this context, we emphasize the role of the IPCC in synthesizing global knowledge
  to help policymakers better understand the complex interactions between climate
  change and the determinants of health. We will explore the use and refinement of
  relevant adaptation indicators, including those related to disease surveillance
  capacity and system resilience, and contribute to learning processes linked to the
  Global Goal on Adaptation and the Global Stocktake. These efforts will build on
  existing processes and will not create additional mandatory reporting obligations.
  To ensure continuity and coherence across future COPs, we hereby launch a voluntary
  Health & Climate Integration Cycle for the period 2026–2028). At COP31 in 2026,
  signatories will present at a ministerial event concrete progress achieved in integrating
  climate-related health risks - including vector-borne and zoonotic dimensions as
  well as the broader impacts of climate change in exacerbating both communicable
  and non-communicable diseases - into national planning and policy frameworks. In
  2027, a concise multi-stakeholder technical note will be published to consolidate
  operational lessons, methodological approaches and priority areas for strengthened
  One Health integration. Ahead of COP32 and the 2028 Global Stocktake, consolidated
  recommendations will be developed to further strengthen the integration of climate-related
  health, zoonotic and vector-borne considerations within existing climate architecture
  and instruments. These recommendations will build on documented national experience
  and contribute to enhancing coherence across adaptation, resilience and public health
  planning processes and support the preparation of subsequent Nationally Determined
  Contributions. We will work to improve alignment between national priorities and
  existing financing mechanisms, with a view to facilitating access to climate finance
  for health-related adaptation and resilience actions, leveraging both public and
  private investment to build equitable and sustainable health systems. This voluntary
  cycle is intended to enhance coherence without altering the mandate of the UNFCCC
  or creating new institutional structures. It is intended to enhance collaboration
  and accelerate practical integration of health within climate action, building on
  existing frameworks and commitments.'
