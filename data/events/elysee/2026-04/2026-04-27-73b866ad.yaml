  Le Président de la République a ensuite visité le site hospitalier de Lavelanet,
  labellisé hôpital de proximité et entièrement reconstruit grâce au Ségur de la santé.
  Ainsi, il a pu échanger avec les soignants et les élus locaux sur les enjeux de
  l''accès aux soins dans les territoires ruraux.'
