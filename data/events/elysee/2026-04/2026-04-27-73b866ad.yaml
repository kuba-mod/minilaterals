title: Déplacement en Ariège.
text: 'Le Président Emmanuel Macron s''est rendu ce lundi en Ariège. Il a débuté son
  déplacement par la visite du chantier industriel d''Occitanie Géotex , soutenu par
  le programme France 2030. Ce projet de 30 millions d''euros crééra 40 emplois directs
  et plus de 120 emplois indirects dans le bassin ariégeois, mobilisant des centaines
  d''agriculteurs de la région. Le chantier illustre la politique de réindustrialisation
  menée depuis 2017, avec un ancrage dans les territoires , tournée vers l''innovation
  et la transition écologique . Après avoir posé la première pierre du futur site
  de l''usine Géotex , le chef de l''État a pris la parole. 22 juillet 2026 - Seul
  le prononcé fait foi Je salue évidemment l''ensemble de nos élus parlementaires,
  Monsieur le président du Conseil régional, [Madame] la présidente du Conseil départemental,
  Monsieur le ministre, j''aurais dû commencer par là, cher Laurent, Mesdames et Messieurs
  en vos grades et qualités, comme on dit. Je suis très heureux et très fier d''être
  à vos côtés dans cette journée. Très heureux et très fier, parce que le projet dont
  on met la première pierre aujourd''hui a beaucoup de sens pour le territoire et
  pour le pays. D''abord, parce qu''il vient dire qu''il n''y a jamais de fatalité.
  Je sais combien ces terres ont souffert de la désindustrialisation. Les terres où
  je suis né ont connu la même trajectoire, et je sais ici qu''il y avait plusieurs
  centaines d''emplois, mais certains ont résisté quand même, et on est heureux d''avoir
  le groupe Sage et les salariés qui sont là et qui font encore tourner une partie
  de cette activité historique. Le territoire a résisté à ces chocs de la désindustrialisation.
  Et là, à travers ce projet Géotex, c''est une mobilisation collective de la commune,
  de la com-com [communauté de communes], du département, de la région, qui a fait
  beaucoup, y compris pour la recherche, pour amorcer avec vous le projet, et puis
  de l''État, avec France 2030, avec les services nationaux, la préfecture. Avec tous
  les partenaires qui sont là, que je veux remercier, qui ont aidé au financement,
  qui ont aidé à monter l''opération, qui sont des partenaires aussi qui sécurisent
  l''aval de l''opération, cela va permettre véritablement d''inventer une activité
  qui est cohérente avec l''histoire du site et du département, le textile. Et qui
  nous démontre à tous que le textile n''est pas un métier du passé et que l''industrie
  est bien un des défis contemporains. Parce qu''on a tous vécu, ceux qui sont de
  ma génération, cette histoire. On nous a expliqué, il y a 20 ans, 25 ans : « Le
  textile, ce n''est plus pour nous ». On est en train de montrer que ce n''est pas
  vrai parce que si on y met de la valeur ajoutée, si on sait réinventer les choses,
  on a véritablement la possibilité de retrouver un avenir du textile dans notre pays.
  C''est exactement ce que Géotex a permis de faire. D''abord, ça va donner des perspectives
  à nos agriculteurs. On sait combien on en a besoin. Avec le chanvre qui va nous
  permettre d''avoir, dans des territoires qui ont un vrai défi sur l''eau, des cultures
  qui sont moins gourmandes en eau, qui permettent de régénérer les sols et qui ont
  beaucoup de sens sur le plan agricole. Ensuite, vous allez leur sécuriser l''aval
  ici avec un processus remarquable où vous avez mis votre savoir-faire. C''est aussi
  pour ça que c''est une histoire d''innovation et de continuité, de pouvoir le transformer
  pour en faire une matière totalement biosourcée. C’est cohérent avec nos défis climatiques.
  Puis derrière, on en sécurise un aval avec des textiles, très techniques pour certains,
  d''usage grand public avec beaucoup de potentiel pour d''autres. En effet, de l''automobile
  aux eaux et forêts, de l''ONF aux métiers du bâtiment, j''ai pu voir la grande multitude
  de débouchés que vous allez avoir pour ces textiles. Mais ils vont nous permettre
  aussi de réduire les émissions de CO₂ pour tous ces métiers en aval. Tout ça veut
  dire que la bataille pour l''industrie et la réindustrialisation, la transformation
  de notre agriculture qui fait face à ce défi de l''eau qu''on connaît dans la région,
  [et] la souveraineté, parce qu''on a ici défendu des emplois et de la souveraineté,
  mais on va recréer de la souveraineté à travers ce projet, sont compatibles quand
  il y a de l''innovation et des femmes et des hommes qui mettent leur savoir, justement,
  au service de ces beaux projets. C''est pour moi très émouvant d''être à vos côtés,
  parce qu’on met des financements, on met de l''innovation. France 2030 est là à
  vos côtés, mais ça n''est possible que parce qu''il y a l''expertise de femmes et
  d''hommes qui sont là parfois depuis trois décennies et qui ont mis ce savoir-faire,
  que Sage a repris il y a quelques années en sortie de COVID, au service de ce grand
  projet industriel. Vous pouvez être extrêmement fiers de ce qui a été fait ici toutes
  ces dernières années qui marquent aujourd''hui, et que nous marquons, si je puis
  dire, d''une première pierre qui est une nouvelle étape. Maintenant, à horizon de
  deux ans, on va passer dans une étape industrielle qui va complètement changer le
  territoire et à laquelle je crois beaucoup et je veux qu''on croit ensemble beaucoup. 
  Ce ne sont pas que des mots. C''est le combat pour la souveraineté, c''est le combat
  pour la réindustrialisation, et c''est le combat d''avenir, parce qu''il nous permet
  de prendre ensemble notre indépendance, le climat et l''emploi. Je remercie les
  partenaires qui sont là et qui vont assurer la construction pendant les mois à venir,
  parce que ce sera aussi un gros boulot et ça donne du travail à nos entreprises
  locales, et on en a besoin. Je remercie tous ceux qui vont porter le chantier maintenant,
  dans les mois à venir, et qui vont, là aussi, avec beaucoup de fierté, créer de
  l''emploi et de l''activité. Voilà, Mesdames et Messieurs, ce que je voulais vous
  dire. En tout cas, je suis extrêmement heureux d''être à vos côtés, dans ce beau
  département aujourd''hui, à côté de nos élus. Aux côtés de toutes et tous, pour
  vous dire que l''avenir s''écrit, et il s''écrit ensemble aujourd''hui, et que l''industrie
  est aussi pour nos territoires, et qu''on va reconquérir ce que des années difficiles
  nous avaient pris. Il n''y a que de la volonté et des projets, et la force de femmes
  et d''hommes qui sont prêts à innover, à porter leurs projets, et à être accompagnés.
