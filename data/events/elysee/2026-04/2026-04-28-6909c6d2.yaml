  en acte à l''instant quand il s''agit de vos représentants. Parité parfaite, que
  beaucoup de parlements européens pourraient regarder. Notre constitution nous permet
  de poursuivre avec courage et détermination le combat essentiel qui doit garantir
  leur liberté, leur autonomie et, par là même, la pleine place des femmes dans la
  société. J''espère à ce titre que le fruit du dialogue engagé et dans le respect
  de la conscience de chacun, des avancées attendues par le plus grand nombre pourront
  être prochainement enregistrées. Je sais que lorsqu''on parle de l''interruption
  volontaire de grossesse, beaucoup d''Andorrans le réclament. Nombre de nos partenaires
  l''attendent. Ceci doit se faire dans le respect des institutions, des équilibres,
  des consciences de chacun, de la tradition aussi et de la principauté. Mais votre
  gouvernement a fait une proposition d''avancer. Elle me paraît proportionnée. Avançant
  sur la dépénalisation pour les femmes, elle va sur ce chemin. De là où je suis,
  sans préempter vos débats à venir, je souhaite avec affection que ce débat progresse
  et qu''il permette de répondre à une demande que j''entends. Comme dans la plupart
  de nos démocraties, l''Andorre est confrontée à la difficulté de concilier aussi
  droit des justiciables et exigence d''une justice efficiente. Je veux saluer là
  les efforts déployés, Monsieur le Président du Conseil supérieur de la justice,
  pour renforcer les moyens de la justice. Là où des magistrats étrangers, en particulier
  français et espagnols, apportaient autrefois leur concours, ce sont désormais des
  juges andorrans qui disent le droit et font vivre l''état de droit. Vous pouvez
  compter sur mon soutien et sur la coopération constante des autorités judiciaires
  françaises, notamment la convention triennale avec l''École nationale de la magistrature,
  renouvelée en 2024. Tant que l''Andorre le souhaitera, la France sera heureuse d''accompagner
  des réformes courageuses que vous menez pour consolider un système judiciaire équitable
  et transparent. Progrès dans la vie quotidienne aussi : le défi du logement — je
  vous ai bien entendu — est au cœur des préoccupations des Andorrans et des Andorranes,
  comme dans beaucoup d''autres pays. Mais c''est vrai que la croissance économique
  des dernières années, les spéculations, maintenant régulées, menées par certains,
  ont conduit les prix du logement à monter. J''étais ce matin à l''école, des enseignants
  me l''ont dit. Je sais que votre gouvernement, vos élus l''entendent, et je veux
  saluer leur engagement, comme celui des forces vives, pour bâtir un système qui,
  jusqu''alors, n''existait pas. C''est toujours difficile de changer les règles,
  et donc de construire un système qui permet de rendre le marché plus accessible.
  Je note avec espoir aussi l''émergence d''un premier marché de logement à prix abordable,
  qui est un élément indispensable d''une politique globale. J''entends l''impatience.
  Je sais, votre ministre et votre chef du Gouvernement à la tâche, les élus de toute
  sensibilité, vigilants et engagés, et je vous souhaite d''y arriver, parce que c''est
  nécessaire pour que nous continuions de permettre à toutes les Andorranes et les
  Andorrans d''avoir un logement digne, de permettre en particulier à toutes celles
  et ceux qui servent dans nos services publics de pouvoir bien se loger et bien loger
  leur famille. Quand on parle aussi des défis, il y a celui de l''énergie. Vous avez
  un modèle historique qui est très fort, on l''a vu hier, et je me félicite des projets
  à venir, entre FEDA et EDF, qui vont permettre de le consolider dans le temps et
  d''avoir de nouvelles réserves reposant sur l''hydroélectricité. Puis, en parlant
  de l''avenir, il y a évidemment aussi le transport. J''avais eu l''occasion de dire,
  il y a sept ans, combien il m''apparaissait important que nous poursuivions les
  investissements. Je me réjouis de l''aboutissement du projet Paravalanche-Hospitalet
  2, qui est le fruit d''un partenariat exemplaire entre l''Andorre et la France,
  cofinancé à parts égales. Mais il nous reste beaucoup à faire, et nous le savons.
  Ce qui s''est passé avec la RN20, cet hiver, l''a encore montré. D''abord, ça nous
  a montré la vulnérabilité de nos axes face au dérèglement climatique. Ça nous a
  rappelé l''humilité que doivent avoir tous les montagnards dans ce contexte, mais
  enfin, la nécessité d''y répondre par des investissements pérennes. Nous nous sommes
  organisés pour aussi que les activités soient préservées. On sait les travaux qui
  viendront. Mais je veux vous dire ici que la France continuera d''être un partenaire
  de confiance pour améliorer les accès routiers, ferroviaires, et continuer le travail
  aussi sur l''aérien, et que nous comptons le faire également en mobilisant, parce
  que c''est ce que nous vous devons, c''est l''intérêt économique d''Andorre, c''est
  aussi la demande, parce que c''est un intérêt partagé avec nos compatriotes ariégeois
  qui le demandent tout autant. La RN20, on en parle des deux côtés, je vous rassure.
  Le ministre est là pour vous le témoigner en tant qu''aussi élu de l''Ariège. Mais
  c''est aussi ça qui permet de continuer le véritable destin d''Andorre, principauté
  au cœur des Pyrénées, mais qui a vocation à ne jamais se laisser enclaver et à toujours
  communiquer, accueillir, échanger. C''est une puissance ici de commerce, d''échange
  et d''accueil. Fort de cela, je souhaite que ces partenariats, tout ce que nous
  allons faire sur le transport, nous puissions l''appuyer également sur des financements
  européens, car, je tiens ici à le rappeler, les financements de la Banque européenne
  d''investissement peuvent bénéficier à Andorre. Ça a commencé il y a peu, et ça
  va continuer. Et ça, c''est un formidable acquis. Alors, évoquant la Banque européenne
  d''investissement, vous me voyez venir, je vais vous parler d''Europe. L''Europe.
  L''Andorre est une grande et vieille démocratie. On vient de le voir par l''esprit
  de contestation, la force. Je sais aussi que votre Parlement est plein de celle-ci.
  Mais quand je regarde la principauté, elle est une forme de précipité d''Europe,
  par sa culture démocratique, par son attachement pyrénéen au cœur de notre continent,
  par sa capacité à vivre dans le multilinguisme, par sa tradition d''accueil et toutes
  les nationalités qu''elle a ici. L''Europe a quelque chose d''une évidence quand
  on en parle ici, l''Europe. Je sais que néanmoins, ça éveille des inquiétudes, L''Union
  européenne, on dit toujours : « c''est un machin bureaucratique, terrible. » Ça
  va nous enlever notre singularité. Tous ces débats, je les connais par cœur, ils
  existent en France. Ils ont existé et continuent d''être là, vous savez. Il ne faut
  pas penser que partout dans les 27 pays de l''Union européenne, ces débats n''existent
  plus et donc vos débats sont légitimes. Ce sont des craintes qui sont tout à fait
  légitimes et estimables. Mais permettez-moi de vous dire comment je vois les choses
  une fois encore, en tant que coprince et de là où je suis. On parle d''un accord
  d''association avec l''Union européenne depuis des décennies. Il a été commencé,
  arrêté, repris, il a été amélioré, et j''ai beaucoup d''estime pour les gouvernements
  successifs, pour les conseils généraux successifs qui se sont engagés dans ces débats
  et qui ont permis ce cheminement. Mais je crois que vous y êtes, que nous y sommes.
  Parce que cet accord a été finalisé. Il sera signé avant l''été par la Commission
  européenne, par les États membres, ce qui permettra d''engager la ratification au
  Parlement européen et en Europe en fin de cette année et en début d''année prochaine.
  Cet accord, il a été bien négocié, dans le sens où il est complet, il permet d''avoir
  l''accès au marché unique et à sa force, et il a été aussi bien négocié, si je puis
  dire, avec mon autre casquette en tant que membre de l''Union européenne. Parce
  que vous avez des périodes transitoires très longues qui vont permettre aussi de
  dire, si on n''est pas content sur telle chose, on peut revenir en arrière. Donc
  ce n''est pas un accord pour solde de tout compte. C''est intelligemment fait. C''est
  pour l’Andorre une promesse d''avenir, un jalon naturel pour cette principauté profondément
  européenne, par sa géographie, son histoire et sa culture. Il va permettre de renforcer
  l''accès aux universités européennes. Il va permettre à vos entreprises d''accéder
  plus facilement au marché unique, à votre culture de mieux rayonner, à vos acteurs
  économiques d''être beaucoup plus forts, en même temps qu''il préserve les singularités
  d''Andorre. Et qui permettra d''évaluer à chaque fois pour revenir en arrière si
  ça ne vous va pas. Mais là où je veux attirer votre attention, c’est que si maintenant
  vous dites : « non, en fait, on ne veut plus de cet accord-là, en tout cas pas celui-là.
  » On va continuer de l''améliorer. Alors, vous prendriez une responsabilité qui
  n''est pas à considérer à la légère. Je le dis parce qu''en tant qu''État membre,
  je me suis beaucoup engagé pour vous aider à finaliser cette négociation. C''est
  que si, à la fin, vous disiez « non », ou « pas maintenant, on va renégocier, nous,
  on sera meilleur, on va faire une meilleure négociation », la porte ne se rouvrira
  pas. Je vous le dis en toute sincérité parce que la Commission européenne et tous
  les gens qui se sont engagés pendant des années pour arriver à cet accord maintenant
  concluent. Ils diront : « on en a marre de ces gens-là. » Je vous le dis avec affection.
  Ils diront : « on en a marre », « ça fait des années qu''ils nous font le coup.
  Ça fait des années. Ils ne veulent pas de cet accord. Il est déjà formidable. On
  ne va pas se fatiguer ». Je me suis battu pour inscrire cet accord dans l''agenda
  parce que quand on a à gérer l''Ukraine, l''Iran, la crise énergétique, la crise
  migratoire, l''union des marchés de capitaux, il faut convaincre la Commission européenne
  d''avoir du temps pour notre Andorre. Ils me regardaient tous en disant : « vous
  êtes sympa, vous, mais c''est vos affaires. » Ne vous trompez pas. Le mieux est
  l''ennemi du bien. Ça fait très longtemps qu''on le pousse. Et je regarde en regardant
  ceux qui ont fait ça. D''autres principautés en Europe ont un peu fait ça il y a
  quelques années. Fini. Et si au fond vous dites : « ça ne nous intéresse pas maintenant,
  on va l''améliorer », les Européens seront là et diront : « vous reviendrez plus
  tard quand on aura le temps et quand vous aurez bien réfléchi ». Pendant longtemps,
  les gouvernements n''oseront plus rouvrir ce chapitre. Vous savez, me replongeant
  dans ce qui est notre identité, il y a cette sage maxime héritée de 1748 et du viguier
  épiscopal d''Andorre, Antoni Fiter i Rossell. Il écrivait « Avant d''entreprendre
  les choses, il faut les consulter cent fois. Une fois résolues, les exécuter rapidement,
  dès que l''occasion se présente, car elle s''échappe et s''envole très vite ». Que
  cette parole de 1748 nous inspire parce que cette maxime vaut. On peut toujours
  mieux faire, mais c''est là, maintenant, c''est très bon, très fort, ça vient de
  loin. Saisissez-le parce que c''est bon pour Andorre, dont la vocation est européenne.
  Parce que cette principauté a vocation à rayonner en Europe en gardant sa singularité.
  Parce que la force d''Andorre est d''avoir justement toujours tenu cet ancrage et
  ce rapport à l''universel, cette singularité pyrénéenne et cette capacité d''accueil,
  cet amour du catalan et cette générosité avec le français et tant d''autres langues.
  Cette petite enclave pyrénéenne est européenne. Qu''elle la saisisse pleinement
  en respectant ses singularités. Voilà, mes chers amis, mesdames et messieurs, chères
  Andorranes, chers Andorrans, et vous toutes et tous qui faites la richesse de ce
  pays, dans les épreuves comme dans les moments de joie et d''espoir, à l''image
  des deux jours que nous sommes en train de vivre parmi vous. Laissez-moi vous dire,
  avec mon cher coprince, Monseigneur, la conscience éminente que nous avons de notre
  rôle, l''un et l''autre, nous en avons beaucoup parlé ensemble. La conviction que
  nous sommes là pour servir le peuple d''Andorre, pour vous servir. Ce pays libre,
  franc, ouvert à tous les peuples et à toutes les nations, pour citer toujours le
  même auteur. Nous sommes là avec beaucoup d''affection, beaucoup de soutien, beaucoup
  d''amitié. A chaque fois que vous doutez, n''oubliez jamais que vous avez deux coprinces
  qui sont là à vos côtés pour vous soutenir et qui sont là, non pas en surplomb,
  même si vous ne nous voyez pas tous les jours. Monseigneur est plus présent que
  moi. Mais nous sommes là plutôt en soutien, à vos côtés, pour vous aider à cheminer.
  Andorre fait bien dans ce monde si compliqué et vous pouvez être fiers de ce que
  vous êtes. Vous continuerez à bien faire et, en tout cas, chaque jour, soyez convaincus
  que vous êtes dans mes pensées et dans mon cœur, que de là où je suis, nous vous
  aimons. Regardez l''avenir avec espoir, espérance même, et avec cette volonté de
  continuer de l''avant pour cette jeunesse avec laquelle j''ai commencé. Suite à
  un déjeuner officiel, les deux Coprinces se sont vu remettre la décoration de la
  « Creu dels 7 Braços » au Sanctuaire de Méritxel.'
