  laïc, à la française, apporte au modèle andorran et est une chance pour tous. Ensuite,
  les Coprinces se sont entretenus avec le Syndic général du Conseil général de l''Andorre
  avant de participer à une session solennelle du Conseil général. 22 juillet 2026
  - Seul le prononcé fait foi Mesdames et Messieurs les conseillers généraux, Mesdames
  et Messieurs en vos grades et qualités. C''est avec une joie profonde et un sentiment
  d''honneur renouvelé que je vous retrouve aujourd''hui en cette Maison des Vallées,
  l''un des plus anciens parlements d''Europe, lieu chargé d''une authenticité particulière,
  et symbole vivant de liberté et de continuité démocratique du peuple andorran. C''est
  d''autant plus un sentiment d''honneur que, comme vous l''avez souligné à l''instant,
  Monsieur le Syndic général, pour la première fois de notre histoire, nous nous retrouvons
  côte à côte dans ce lieu, en même temps, traduisant, je dirais physiquement, l''esprit
  de l''histoire et de la Constitution. Certains lieux perdent de leur magie après
  une première visite. Ce n''est pas le cas de la Casa de la Vall . Ce n''est pas
  seulement le fruit des remarquables [et] lourds travaux de rénovation menés depuis
  mon dernier séjour, et je tiens à saluer ceux qui ont porté ce beau projet architectural
  avec le talent que j''ai pu découvrir ce matin. Non, cette émotion tient à quelque
  chose de plus profond, à la beauté sans pareil qui émane de ces pierres, la solennité
  de cette histoire, cette foi séculaire, et à ce que vous portez. Je vous remercie,
  Monsieur le Syndic, Madame la Vice-Syndic et vous tous, conseillères et conseillers,
  de m''y accueillir de nouveau. C''est toujours avec un sentiment de fierté que je
  prends la parole devant vous en cette qualité de coprince, conscient de la longue
  lignée de coprinces qui m''ont précédé dans cette charge, dont certains que vous
  venez de mentionner. Une histoire à laquelle nous espérons, vous l''avez souligné,
  apporter notre contribution. Je remercie une fois encore Monseigneur Serrano de
  l''amitié qu''il nous témoigne en se joignant à nous aujourd''hui. Par l''institution
  que nous incarnons ensemble, vous l''avez rappelé, Monsieur le Syndic, c''est à
  la fois le témoignage et la garantie de la souveraineté et de l''indépendance du
  pays. Elle s''inscrit dans une trajectoire longue, selon un modèle institutionnel
  qui traverse le temps, mais une institution à la fois vivante et qui se renouvelle
  et s''adapte. La charge que j''assume ici est un précieux héritage, elle trouve
  ses racines bien avant la République, nous le savons, et vous avez mentionné les
  paréages. Mais c''est par la Constitution qu''elle a été librement confiée une nouvelle
  fois au Président de la République française. Et ce choix, ainsi que, vous l''avez
  bien rappelé, dit tout de la nature de notre relation : une confiance librement
  choisie, une amitié ancrée dans notre histoire, mais un pacte renouvelé par la volonté
  du peuple, et aussi longtemps qu''il le souhaitera. C''est ici, dans cette Maison
  des Vallées, que s''est écrite cette histoire démocratique du Conseil de la Terre
  de 1419 jusqu''à la Constitution que vous vous êtes librement donnée en 1993. Les
  Andorrans ont toujours réaffirmé leur volonté de se gouverner eux-mêmes avec sagesse
  et détermination. Depuis le suffrage universel de 1993 jusqu''aux réformes les plus
  récentes, notre démocratie est ainsi vivante, en perpétuel renouvellement, oscillante
  entre tradition et modernité. La principauté andorrane n''est pas une curiosité
  historique. Elle a été la garantie de son indépendance et le fondement de sa souveraineté.
  L''épisode napoléonien de 1806 où les Andorrans ont eux-mêmes réclamé son rétablissement
  en est l''illustration parfaite. Le cœur de la démocratie, on le sait, bat entre
  ses murs. Une démocratie, à bien des égards, exemplaire. La parité y est effective,
  à l''unité près. Le renouvellement des générations s''y accomplit, naturellement.
  L''ouverture à toute la société y est réelle. Vous avez su, avant beaucoup, associer
  les citoyens aux travaux du Conseil général, donnant ainsi à la démocratie participative
  ses lettres de noblesse. La Constitution a permis l''édification d''un État de droit
  solide où le tribunal constitutionnel garantit les libertés fondamentales, où le
  Conseil supérieur de la justice veille à l''indépendance du pouvoir judiciaire et
  la vie démocratique qui est vivante du Conseil général jusque dans chacune de nos
  paroisses. Le débat politique qui est libre, particulièrement libre, et il faut
  s''en féliciter. Et comme dans tous les parlements du monde, les idées fusent, les
  projets s''affrontent, parfois avec véhémence, mais avec un respect et une tradition
  du dialogue qui peuvent, parfois, faire défaut ailleurs. Des échanges, me dit-on,
  qui peuvent souvent se conclure autour d''une bonne table, culture pyrénéenne qui
  m''est chère. Cette même Constitution vous a offert aussi un rôle singulier à l''international.
  Je veux ici le redire parce qu''il m''importe ô combien. Elle vous a ouvert les
  portes des Nations Unies et de la scène internationale où l''Andorre sait se faire
  entendre, défendant les principes fondamentaux de la liberté, de la dignité humaine,
  des droits de l''homme, comme elle l''a brillamment démontré lors de sa présidence
  du comité des ministres du Conseil de l''Europe. Votre engagement en faveur de l''éducation,
  de la diffusion des savoirs, notamment dans le cadre de l''UNESCO, témoigne de cette
  même exigence universelle. Et vous alliez la parole à l''action quand Andorre accueille
  la 7ème réunion mondiale du partenariat pour les montagnes, qui réunit des experts
  de 45 pays afin de faire progresser le développement durable des régions montagneuses
  et fait adopter la déclaration d''Andorre, un engagement international visant à
  promouvoir le développement durable dans nos régions montagneuses et à placer ces
  zones au centre de l''agenda mondial. Vous avez compris que la modernisation politique
  devait s''accompagner d''une ouverture économique. Les crises que nous traversons
  ensemble rappellent à quel point la tentation du repli, cette voie qui peut sembler
  protectrice, conduit à l''isolement. L''Andorre a supporté d''importantes réformes
  ces dernières décennies : s''adapter à un monde en mutation, répondre aux exigences
  de l''action collective, et continue de le faire. Ces réformes ont-elles mis en
  péril notre identité ? Bien au contraire. Elles ont permis à l’Andorre de se transformer
  sans se renier, de passer d''une économie agraire à des services florissants, mais
  sans jamais renoncer à ses racines. C''est dans cet esprit que nous abordons notre
  relation avec l''Union européenne. Et s''il appartient au Président de la République
  que je suis de veiller à ce que le projet européen vive dans le parfait respect
  du cadre que fixent les traités de l''Union, vous savez aussi pouvoir compter sur
  votre coprince, un allié résolu à vous accompagner dans ce rapprochement, vers cet
  espace européen qui est, au fond, l''espace naturel de l''Andorre. Telle est la
  nature de ce qui nous unit, une relation de confiance et d''amitié librement choisie,
  maintes fois renouvelée. Je m''engage à continuer d''exercer pleinement la responsabilité
  de coprince qui m''est confiée, conjointement avec le coprince épiscopal, avec le
  souci constant de contribuer au libre fonctionnement de notre démocratie et la préservation
  de son identité. Je crois pouvoir dire que nous avons —nous l''avons échangé ensemble
  avec Monsieur le coprince, Monseigneur— la même vision, au fond, de la vocation
  qui est la nôtre, celle de servir le peuple andorran. Cette identité nationale est
  un bien commun à entretenir activement, ainsi que vous le faites, et l''adoption
  de la loi sur la langue propre, le retour des fresques de Sant-Esteve à Andorre-la-Vieille
  ou la récupération du livre d''actes de 1743 à 1864, sont autant d''avancées concrètes
  qui témoignent précisément d''un pays à la fois ouvert et enraciné, désireux d''accueillir
  les nouveaux arrivants sans jamais renoncer à ce qui constitue son essence. Mais
  les institutions doivent également demeurer à l''écoute des attentes quotidiennes
  des citoyennes et des citoyens d''Andorre, en apportant des réponses concrètes en
  matière d''accès au droit pour chacune et chacun, surtout les plus vulnérables,
  en veillant à ce que les fruits de la croissance profitent au plus grand nombre.
  Il vous faut continuer d''œuvrer pour garantir, face à un marché débridé, l''accès
  au logement. Et c''est un des droits premiers qu''il nous faut garantir : le pouvoir
  d''achat, l''avenir des retraites, la viabilité des petites entreprises, la durabilité
  économique et environnementale, la connexion avec l''Europe. Autant de défis pour
  lesquels le pragmatisme doit faire son chemin, car les citoyens attendent, ici comme
  partout, des résultats tangibles. Je sais que des initiatives sur le logement ont
  pu être adoptées, avec majorité au Conseil général. Je sais aussi les débats en
  cours, et je vous souhaite d''avancer dans la bonne direction. Je vous invite, mesdames
  et messieurs les élus et les responsables politiques, à vous placer aussi dans une
  perspective longue, à vous projeter ensemble pour déterminer dans quelle Andorre
  vous souhaitez que vos enfants s''épanouissent. Au fond, nos actes d''aujourd''hui
  conditionnent plus que jamais la solidité des institutions de demain et l''avenir
  de notre projet. Le doute n''est jamais une faiblesse, il peut être le moteur d''une
  action politique consciente et responsable. Mais derrière, c''est toujours l''action
  résolue qui doit primer, et le goût de l''avenir, car c''est ce que nous devons
  à nos jeunesses. C''est mis en mouvement par ce seul intérêt de garantir la pérennité
  de l''Andorre pour chacun, et particulièrement pour ces jeunes Andorrans dont nous
  sommes comptables devant l''avenir, que je vous invite à poursuivre votre mission,
  avec le sens de la responsabilité qu''imposent vos fonctions et avec la certitude
  que vos coprinces sont à vos côtés. Mesdames et messieurs, je veux une nouvelle
  fois vous remercier pour la chaleur de votre accueil, pour l''honneur de renouveler,
  en ces lieux toujours habités par l''esprit des paréages, le pacte qui unit le cœur
  de la démocratie andorrane à ses coprinces. Sachez que vous avez, Monseigneur et
  moi-même, des coprinces qui y seront vigilants et feront tout pour se montrer à
  la hauteur de ce pacte. 22 juillet 2026 - Seul le prononcé fait foi Mesdames et
  Messieurs les conseillers généraux, Mesdames et Messieurs en vos grades et qualités.
  C''est avec une joie profonde et un sentiment d''honneur renouvelé que je vous retrouve
  aujourd''hui en cette Maison des Vallées, l''un des plus anciens parlements d''Europe,
  lieu chargé d''une authenticité particulière, et symbole vivant de liberté et de
  continuité démocratique du peuple andorran. C''est d''autant plus un sentiment d''honneur
