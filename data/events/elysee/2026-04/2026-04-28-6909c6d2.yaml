date: '2026-04-28'
type: press_release
source_name: elysee
title: 'Déplacement en Andorre : deuxième journée.'
text: 'Sept ans après sa dernière visite, le Président Emmanuel Macron s''est rendu
  en Principauté d''Andorre en sa qualité de Coprince le 27 et 28 avril 2026. Pour
  son deuxième jour en Andorre, le Coprince français Emmanuel Macron a échangé avec
  les élèves et enseignants du lycée Comte de Foix , puis de l''école Andorrane de
  Santa Coloma . 22 juillet 2026 - Seul le prononcé fait foi Madame la rectrice, merci
  de nous avoir rejoints depuis Montpellier, Mesdames, Messieurs les directrices,
  directeurs du ministère de l''Éducation, Mesdames, Messieurs les enseignants, agents
  administratifs, Mesdames, Messieurs en vos grades et qualités, Je vais essayer de
  parler à tout le monde. Je vais donc tourner le dos un peu à tout le monde aussi,
  vu la configuration de la salle. Écoutez, je suis très heureux de pouvoir vous rendre
  visite, et c''est le choix qu''on a fait avec Monsieur le chef du Gouvernement :
  de pouvoir être au contact de la jeunesse, ici, et des parents, et des enseignants,
  et de vous dire l''importance que nous donnons à l''éducation. Je vois certains
  produits déjà éminents du système éducatif, qui maintenant vont poursuivre les études
  ailleurs, mais ça fait plus de 125 ans que la France s''investit avec fierté dans
  l''éducation de la jeunesse andorrane. En effet, c''est en 1900 que le premier professeur,
  instituteur français, foulait le sol de la principauté. Depuis, cette histoire s''est
  épanouie et cet établissement est le plus beau symbole de cette relation. Et avec
  une spécificité, je parle sous le contrôle de monsieur le délégué, qui est que vous
  êtes ici, en effet, dans un établissement français, dans le cadre de cette convention,
  mais qui fait aussi vivre la pluralité des modèles en Andorre. Ce qui est une chance,
  une richesse. Je voulais vous dire à la fois la confiance que nous avons et la volonté
  de poursuivre. Ce lycée Comte de Foix a été le fruit de l''impulsion donnée par
  le coprince Valéry Giscard d''Estaing. Ce que la France a bâti ici est sans équivalent.
  C''est un enseignement public, laïc et gratuit, au-delà des frontières françaises,
  alors même que peu d''élèves français le fréquentent, et qui coexiste de manière
  harmonieuse avec les autres systèmes éducatifs publics au sein d''une structure
  commune, l''enseignement public en France. Nulle part ailleurs, un tel système n''existe.
  Nulle part ailleurs. Cette spécificité, c''est aussi une chance pour les élèves
  qui sont là, pour les enseignants qui sont là, et une fierté, et je suis venu vous
  dire, parce que j''ai regardé les résultats, d''abord, combien nous sommes fiers
  de ce qui est fait ici, et donc combien nous entendons le poursuivre. Donc ce système
  va perdurer. Cet investissement en faveur de la justice, justement, l''égalité des
  chances. Cet investissement en faveur de la jeunesse andorrane, nous allons le poursuivre
  dans l''avenir. Et la Convention franco-andorrane dans le domaine de l''enseignement
  vient d''être renouvelée et signée, ce qui est une bonne chose. Elle ouvre la voie,
  justement, à un investissement accru, notamment avec les travaux de rénovation.
  Je remercie la principauté, et c''est un investissement que je ne sous-estime pas
  et qui est extrêmement important. Je vois le ministre qui opine du chef, ce qui
  vaut confirmation à la fois de l''ambition, mais de la réalité de l''investissement.
  Ce lycée, comme je le disais, c''est un excellent établissement à tous égards, et
  je veux vraiment remercier à la fois son proviseur, Monsieur Salvan, l''accompagnement
  du délégué à l''enseignement, Monsieur Dekerle, dont je salue le travail et les
  résultats, l''ensemble de la communauté pédagogique qui est ici présente et qui
  porte ces résultats, enseignants, agents administratifs. Je veux ici vous dire toute
  ma gratitude, la reconnaissance du travail qui est le vôtre et notre volonté de
  le continuer, de l''accompagner dans l''avenir. Puis à vous, les plus jeunes qui
  êtes là, les élèves ou les anciens élèves, je voudrais ici vous dire que vous avez
  fait le choix, malgré une offre diversifiée en principauté, de poursuivre vos études
  dans un environnement francophone, ce qui, je crois, est une chance, et je vais
  défendre cette francophonie. Cette francophonie, elle n''est jamais exclusive. Andorre
  en est le magnifique exemple. Je le redirai tout à l''heure. La langue officielle
  a été réaffirmée, le catalan. Mais la place du français, en même temps, est préservée
  dans le système éducatif. Parce que la francophonie se pense toujours dans un multilinguisme
  et que là où vous êtes nés ou là où vos parents ont décidé de vivre, c''est-à-dire
  dans ce cœur des Pyrénées, vous êtes dans un espace où le multilinguisme est là.
  Apprendre le français, rejoindre le système éducatif français, c''est une chance,
  et c''est pour cela que pour nous, cet établissement est une fierté parce qu''il
  accueille des jeunes de toutes conditions et de plus de 40 nationalités différentes,
  à l''image d’une Andorre qui est le creuset de toutes les cultures et qui est justement
  ce lieu aussi d''ouverture. Être à l''école de la République française n''enlève
  rien à l''identité, qui est la vôtre, n''enlève rien à l''apprentissage d''autres
  langues. Mais le français a ici une place singulière, elle n''est pas la langue
  officielle, mais c''est la langue d''un de vos coprinces, et il est naturel que
  les Andorrans puissent s''adresser à lui dans sa propre langue. C''est aussi la
  langue de près de 400 millions de francophones, ce qui est une chance pour vous
  dans l''avenir, à la fois sur le continent européen, mais le continent africain,
  pacifique. C''est une langue qui, avec la maîtrise de l''espagnol, vous permet de
  multiplier les possibles et d''avoir accès à beaucoup d''opportunités pour l''avenir
  et qui vous met, là aussi, au cœur de notre Europe. Je ne veux pas être plus long,
  mais je voulais ici, en commençant cette journée pour cette visite, vous dire combien
  nous plaçons notre confiance, notre espoir dans la jeunesse andorrane. Elle est
  une source de fierté, d''inspiration et de confiance. En étant là devant vous aujourd''hui,
  je vais vous dire que nous allons continuer cet investissement, continuer d''accompagner
  l''ensemble des enseignants qui sont ici présents, de tous les jeunes, de leurs
  parents, pour que ce système unique, comme je le rappelais, puisse perdurer. En
  effet, 52 ans après l''ouverture de ce lycée, plus de 125 ans après l''arrivée du
  premier instituteur sur le sol d''Andorre, on puisse avoir encore des décennies
  et même des siècles d''enseignement français en Andorre, parce que ce système public,
  laïc, à la française, apporte au modèle andorran et est une chance pour tous. 22
  juillet 2026 - Seul le prononcé fait foi Madame la rectrice, merci de nous avoir
  rejoints depuis Montpellier, Mesdames, Messieurs les directrices, directeurs du
  ministère de l''Éducation, Mesdames, Messieurs les enseignants, agents administratifs,
