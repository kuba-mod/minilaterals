title: Disparition de Michel Bassompierre.
text: 'Michel Bassompierre est un de ces artistes que l’on aime dès l’enfance. Dans
  la tendre et amicale compagnie de ses ours, gorilles, lions, manchots empereurs,
  morses, il a sculpté tout au long de sa vie une arche de Noé et nous a invités à
  bord. Né le 22 mars 1948 à Paris, il est à sa naissance l’équation parfaite d’une
  mère artiste et d’un père scientifique. Jamais il n’a cessé d’explorer la poésie
  du monde animal, ponctuant la France et le monde de ses sculptures attendrissantes
  comme s’il s’était donné pour mission de lutter, seul et avec son regard hérité
  de Rodin, contre la disparition des espèces animales et les attaques contre la beauté
  du vivant. Michel Bassompierre portait en son nom l’immensité minérale et c’est
  pourtant au monde sauvage qu’il a consacré sa vie, depuis les premières esquisses
  d’animaux observés avec son œil patient au zoo de Vincennes, au Jardin des Plantes
  et bien sûr dans la grande galerie de l’Evolution du Muséum national d’histoire
  naturelle qu’il a tant aimé, jusqu’à la renommée internationale et ses « fragiles
  colosses » ponctuant Park Avenue, à New York. Quel chemin parcouru pour le discret
  élève de René Leleu à l’Ecole des Beaux-arts de Rouen, qui est toujours resté lui-même
  un peu sauvage et réservé, comme à rebours de l’exubérance de l’époque, privilégiant
  la force tranquille des grands animaux d’Afrique et d’ailleurs à la fébrilité mécanique
  et virtuelle. Michel Bassompierre est mort trop tôt, mais comme il a vécu : dans
  l’ombre lumineuse de sa tanière d’artiste, et un des plus grands de notre temps.
  Sculpteur animalier, mais surtout témoin de l’élégance animale, dont il a peuplé
  nos villes et nos imaginaires, il avait été promu dans l’ordre de la Légion d’honneur.
  Le Président de la République et son épouse saluent un artiste humble et discret
  mais aimé des Français, un amoureux des animaux auxquels il a offert son œil et
  sa main de sculpteur. Ils adressent leurs condoléances à sa famille et à ses proches.'
