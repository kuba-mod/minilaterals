title: Paris Declaration - Robust Security Guarantees for a Solid and Lasting Peace
  in Ukraine.
text: 'The members of the Coalition of the Willing, Ukraine and the United States
  have convened today in Paris. We all stressed our commitment to a just and lasting
  peace in Ukraine in line with the United Nations Charter principles, and welcomed
  the progress achieved, including in the discussions between the Americans, the Ukrainians,
  European and other partners. In particular, the Coalition was clear that Ukraine’s
  ability to defend itself is critically important for ensuring the future of Ukraine’s
  and Euro-Atlantic collective security. We confirmed that ensuring the sovereignty
  and lasting security of Ukraine shall be an integral part of a peace agreement,
  and that any settlement will have to be backed up by robust security guarantees
  for Ukraine. We stand ready to commit to a system of politically and legally binding
  guarantees that will be activated once a ceasefire enters into force, in addition
  to bilateral security agreements and in accordance with our respective legal and
  constitutional arrangements. They will include the following components : We have
  further decided to establish a US/Ukraine/Coalition coordination cell at the Coalition
  Operational Headquarters in Paris.'
