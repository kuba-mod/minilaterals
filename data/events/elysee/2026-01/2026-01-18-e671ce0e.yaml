title: Statement by Denmark, Finland, France, Germany, the Netherlands, Norway, Sweden
  and the United Kingdom.
text: As members of NATO, we are committed to strengthening Arctic security as a shared
  transatlantic interest. The pre-coordinated Danish exercise “ Arctic Endurance ”
  conducted with Allies, responds to this necessity. It poses no threat to anyone.
  We stand in full solidarity with the Kingdom of Denmark and the people of Greenland.
  Building on the process begun last week, we stand ready to engage in a dialogue
  based on the principles of sovereignty and territorial integrity that we stand firmly
  behind. Tariff threats undermine transatlantic relations and risk a dangerous downward
  spiral. We will continue to stand united and coordinated in our response. We are
  committed to upholding our sovereignty.
