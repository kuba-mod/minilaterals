title: Leader’s Declaration of France, the United Kingdom and Germany on the situation
  in Iran.
text: We are deeply concerned about reports of violence by Iranian security forces,
  and strongly condemn the killing of protestors. The Iranian authorities have the
  responsibility to protect its own population and must allow for the freedom of expression
  and peaceful assembly without fear of reprisal. We urge the Iranian authorities
  to exercise restraint, to refrain from violence, and to uphold the fundamental rights
  of Iran’s citizens.
