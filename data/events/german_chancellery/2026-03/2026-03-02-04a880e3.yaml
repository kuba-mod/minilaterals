title: Joint declaration of President Macron and Chancellor Merz
text: In the spirit of their close partnership as set out in Article 4 of the Treaty
  of Aachen, France and Germany have decided to enter into closer cooperation in the
  field of deterrence in response to the evolving threat landscape. France and Germany
  have established a high-ranking nuclear steering group that will act as a bilateral
  framework for doctrinal dialogue and the coordination of strategic cooperation,
  including consultations regarding the appropriate mix of conventional, missile defence
  and French nuclear capabilities. France and Germany have agreed to take first concrete
  steps beginning this year, including German conventional participation in French
  nuclear exercises and joint visits to strategic sites as well as development of
  conventional capabilities with European partners. France and Germany will also increase
  their ability, as Europeans, to manage escalation beneath the nuclear threshold
  – in particular in the fields of Early Warning and Air Defense and Deep Precision
  Strike. This Franco-German cooperation is based on the shared understanding that
  the nuclear dimension of deterrence remains a cornerstone of European security,
  relying on US extended deterrence, including US nuclear weapons forward-deployed
  to Europe, and on the independent strategic nuclear forces of France and the United
  Kingdom, which have a deterrent role of their own and contribute significantly to
  the overall security of the Alliance. This Franco-German cooperation will add to,
  not substitute for, NATO’s nuclear deterrence and NATO’s nuclear sharing arrangements,
  to which Germany contributes and will continue to contribute. France and Germany
  will continue to comply with their obligations under international law including
  the Treaty on the Non-Proliferation of Nuclear Weapons. In light of their strong
  commitment to Article 5 of the North Atlantic Treaty and Art. 42 (7) of the Treaty
  on European Union, Franco-German cooperation aims at strengthening the systems of
  collective security both countries belong to. It aims at enhancing Europe’s security
  as a whole. Special attention will be given to coordination with the United States,
  the United Kingdom, other Allies and NATO. Höflichkeitsübersetzung Gemeinsame Erklärung
  von Staatspräsident Macron und Bundeskanzler Merz Im Geiste ihrer engen Partnerschaft,
  wie sie in Artikel 4 des Vertrags von Aachen niedergelegt ist, haben Frankreich
  und Deutschland angesichts der sich wandelnden Bedrohungslage beschlossen, auf dem
  Gebiet der Abschreckung enger zusammenzuarbeiten. Frankreich und Deutschland haben
  eine hochrangige Nuklear-Steuerungsgruppe eingerichtet, die als bilateraler Rahmen
  für den verteidigungspolitischen Austausch und die Koordinierung strategischer Maßnahmen
  dienen soll. Hierzu gehören Konsultationen über die geeignete Mischung aus konventionellen
  Fähigkeiten, Raketenabwehr sowie französischen Nuklearfähigkeiten. Frankreich und
  Deutschland haben vereinbart, in diesem Jahr erste konkrete Schritte in diese Richtung
  zu unternehmen, darunter die konventionelle Beteiligung Deutschlands an französischen
  Nuklearübungen, gemeinsame Besuche strategischer Einrichtungen sowie Weiterentwicklung
  konventioneller Fähigkeiten mit europäischen Partnern. Frankreich und Deutschland
  werden als Europäer zudem ihre Fähigkeit zum Eskalationsmanagement unterhalb der
  nuklearen Schwelle verbessern – insbesondere in den Bereichen Frühwarnung, Luftverteidigung
  und „Deep Precision Strike“. Diese deutsch-französische Zusammenarbeit beruht auf
  dem gemeinsamen Verständnis, dass die Nukleardimension der Abschreckung ein Eckpfeiler
  der europäischen Sicherheit bleibt. Diese stützt sich auf die erweiterte Abschreckung
  der USA, einschließlich der in Europa stationierten US-amerikanischen Nuklearwaffen,
  sowie auf die unabhängigen strategischen Nuklearstreitkräfte Frankreichs und Großbritanniens,
  die eine eigene Rolle bei der Abschreckung spielen und bedeutend zur Sicherheit
  des Bündnisses insgesamt beitragen. Diese deutsch-französische Zusammenarbeit wird
  die nukleare Abschreckung der NATO sowie die nukleare Teilhabe, zu der Deutschland
  einen Beitrag leistet und auch weiterhin leisten wird, ergänzen, nicht ersetzen.
  Frankreich und Deutschland werden ihren Verpflichtungen nach dem Völkerrecht, einschließlich
  des Vertrags über die Nichtverbreitung von Kernwaffen, weiterhin nachkommen. Im
  Lichte ihres klaren Bekenntnisses zu Artikel 5 des Nordatlantikvertrags und Artikel
  42 Absatz 7 des Vertrags über die Europäische Union zielt die deutsch-französische
  Zusammenarbeit darauf ab, die Systeme der kollektiven Sicherheit zu stärken, denen
  beide Länder angehören. Ihr Ziel ist die Stärkung der europäischen Sicherheit insgesamt.
  Besonderes Augenmerk gilt der Abstimmung mit den Vereinigten Staaten, dem Vereinigten
  Königreich und weiteren Alliierten sowie der NATO.
