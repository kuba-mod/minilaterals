title: Cabinet Committee The National Security Council
text: 'The National Security Council meets at the Federal Chancellery. In the National
  Security Council, the Federal Government’s expertise and knowledge in matters of
  national security are pooled, coordinated across the departments and prepared for
  strategic decision-making. The National Security Council deals with issues at the
  interface between internal, external, economic and digital security as well as civil
  and military defence, acting as a bridge and closing the gaps that can arise at
  the interfaces of national security. Terms of Reference of the National Security
  Council Règlement intérieur du Conseil de sécurité nationale As a cabinet committee,
  the National Security Council fulfils three central core tasks that complement each
  other and strengthen national security: The National Security Council meets under
  the chairmanship of the Federal Chancellor and consists of the following members:
  Other members of the Federal Government, representatives of the Federal States and
  individuals with outstanding expertise may be consulted on an ad hoc basis if their
  areas of responsibility are affected. Who convenes the National Security Council?
  The Federal Chancellor chairs the National Security Council and convenes it. When
  and how does the National Security Council meet? The National Security Council meets
  regularly, but can also be convened at short notice for meetings concerning specific
  situations or crises. How does the National Security Council work? The National
  Security Council is supported by an administrative department at the Federal Chancellery
  which coordinates and manages the work required to prepare and run the meetings
  of the National Security Council. The specialised departments at the Federal Chancellery
  and the ministries involved make a significant contribution to this in their respective
  areas of competence and responsibility.'
