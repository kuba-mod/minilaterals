date: '2026-03-19'
type: press_release
source_name: german_chancellery
title: Joint statement by the leaders of France, Germany, the United Kingdom, Italy,
  the Netherlands, Japan and Canada on the Strait of Hormuz.
text: We condemn in the strongest terms recent attacks by Iran on unarmed commercial
  vessels in the Gulf, attacks on civilian infrastructure including oil and gas installations,
  and the de facto closure of the Straits of Hormuz by Iranian forces. We express
  our deep concern about the escalating conflict. We call on Iran to cease immediately
  its threats, laying of mines, drone and missile attacks and other attempts to block
  the Strait to commercial shipping, and to comply with UN Security Council Resolution
  2817. Freedom of navigation is a fundamental principle of international law, including
  under the United Nations Convention on the Law of the Sea. The effects of Iran’s
  actions will be felt by people in all parts of the world, especially the most vulnerable.
  Consistent with UNSC Resolution 2817, we emphasise that such interference with international
  shipping and the disruption of global energy supply chains constitute a threat to
  international peace and security. In this regard, we call for an immediate comprehensive
  moratorium on attacks on civilian infrastructure, including oil and gas installations.
  We express our readiness to contribute to appropriate efforts to ensure safe passage
  through the Straits. We welcome the commitment of nations who are engaging in preparatory
  planning. We welcome the International Energy Agency decision to authorise a coordinated
  release of strategic petroleum reserves.  We will take other steps to stabilise
  energy markets, including working with certain producing nations to increase output.
  We will also work to provide support for the most affected nations, including through
  the United Nations and the IFIs. Maritime security and freedom of navigation benefit
  all countries.  We call on all states to respect international law and uphold the
  fundamental principles of international prosperity and security. Erklärung der Staats-
  und Regierungschefs von Frankreich, Deutschland, dem Vereinigten Königreich, Italien,
  der Niederlande, Japan und Kanada zur Situation in der Straße von Hormus Höflichkeitsübersetzung
  Wir verurteilen auf das Schärfste die jüngsten Angriffe Irans auf unbewaffnete Handelsschiffe
  im Golf, Angriffe auf zivile Infrastruktur einschließlich Öl- und Gasanlagen sowie
  die faktische Sperrung der Straße von Hormus durch iranische Kräfte. Wir bekunden
  unsere tiefe Sorge angesichts des eskalierenden Konflikts. Wir rufen Iran auf, seine
  Drohgebärden, das Verlegen von Minen sowie Drohnen- und Raketenangriffe und andere
  Versuche, die Straße für die Handelsschifffahrt zu blockieren, sofort einzustellen
  und Resolution 2817 des VN-Sicherheitsrats einzuhalten. Die Freiheit der Schifffahrt
  ist ein völkerrechtliches Grundprinzip, das auch im Seerechtsübereinkommen der Vereinten
  Nationen niedergelegt ist. Die Auswirkungen des iranischen Handelns werden für Menschen
  in allen Teilen der Welt spürbar sein, insbesondere für die vulnerabelsten Bevölkerungsgruppen.
  Im Einklang mit Resolution 2817 betonen wir, dass ein derartiger Eingriff in die
  internationale Schifffahrt ebenso wie die Störung globaler Energieversorgungsketten
  eine Bedrohung des Weltfriedens und der internationalen Sicherheit darstellen. In
  diesem Zusammenhang fordern wir ein sofortiges und umfassendes Moratorium für Angriffe
  auf zivile Infrastruktur einschließlich Öl- und Gasanlagen. Wir bekunden unsere
  Bereitschaft, einen Beitrag zu geeigneten Anstrengungen zu leisten, um eine sichere
  Passage der Meerengen zu gewährleisten. Wir begrüßen das Engagement von Staaten,
  die vorbereitende Planungen durchführen. Wir begrüßen die Entscheidung der Internationalen
  Energieagentur, eine koordinierte Freigabe der strategischen Ölreserven zu bewilligen.
  Wir werden weitere Maßnahmen zur Stabilisierung der Energiemärkte treffen, auch
  durch Zusammenarbeit mit bestimmten Erzeugerländern im Hinblick auf eine Produktionssteigerung.
  Darüber hinaus werden wir darauf hinarbeiten, die am stärksten betroffenen Länder
  zu unterstützen, auch im Rahmen der Vereinten Nationen und der IFI. Maritime Sicherheit
  und eine freie Schifffahrt kommen allen Ländern zugute. Wir rufen alle Staaten auf,
  das Völkerrecht zu achten und die wesentlichen Grundprinzipien des globalen Wohlstands
  und der internationalen Sicherheit aufrechtzuerhalten.
