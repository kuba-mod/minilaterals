title: Press conference between Federal Chancellor Merz and Czech Prime Minister Babiš
  Closely connected for a stable Europe
text: 'The West must not let up in its support for Kyiv, emphasised the Chancellor
  during the Czech Prime Minister’s visit. Andrej Babiš’s inaugural visit to Berlin
  emphasises how closely the Czechs and Germans are linked in Europe, Federal Chancellor
  Friedrich Merz said at a joint press conference with the Czech Prime Minister at
  the Federal Chancellery. Read the transcript of the press conference here (only
  German):'
