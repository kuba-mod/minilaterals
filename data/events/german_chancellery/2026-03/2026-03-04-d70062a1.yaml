title: Press conference of the Federal Chancellor after the meeting with US President
  Trump Difficult times call for strong partnerships
text: In addition to the situation in Iran, transatlantic trade relations and the
  Russian war of aggression against Ukraine were important topics. Federal Chancellor
  Friedrich Merz was received by US President Donald Trump in Washington , D.C. .
  Both agreed that the Iranian regime was responsible for the brutal oppression of
  its people, Chancellor Merz said after the talks, and also that Iran’s nuclear and
  missile programme was a threat to peace and security in the entire region. “We therefore
  share the interest of the United States and Israel in seeing an end to all this
  at some point”, said the Chancellor at the White House. In addition to the situation
  in Iran, Merz and Trump also discussed the upcoming NATO summit in Ankara, transatlantic
  trade relations, and the Russian war of aggression against Ukraine.
