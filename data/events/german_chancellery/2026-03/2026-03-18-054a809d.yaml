title: Policy statement by the Federal Chancellor ahead of the European Council A
  united Europe as a guarantee for the future
text: The Federal Government wants to regain lost room for manoeuvre, the Chancellor
  emphasised in the German Bundestag. In his policy statement to the European Council,
  Federal Chancellor Friedrich Merz urged the European‑Commission to make widespread
  reductions in the regulations. The Commission must clarify where laws could be simplified
  and where overregulation could be abolished entirely. Competitiveness will be the
  central theme of the Brussels summit. At the same time, the Chancellor called for
  more speed in EU ‑free trade agreements. When it comes to foreign policy, the pressure
  on Russia must remain high - in order to get a just peace for Ukraine. Federal Chancellor
  Merz insisted on European participation in possible peace negotiations. Merz rejected
  Germany’s military involvement in the US and Israeli operations against Iran. However,
  Germany would not close itself off to a “debate about free shipping in the Strait
  of Hormuz, for example, once the war has ended”. Germany stands in a world increasingly
  characterised by great powers, in which external players are restricting the scope
  for action. Under these conditions, “ a united Europe is the most important guarantee
  ” for our own future, said the Federal Chancellor. Only together would EU ‑States
  have the necessary power potential to safeguard rules, fairness and stability worldwide.
  Merz warned that Europe must define its interests more clearly and “ stop selling
  itself short”. For Chancellor Merz, Europe’s competitiveness is the focus of the
  upcoming EU Council. The aim is to push forward an “ambitious European competitiveness
  agenda”. The plan is to strengthen the single market, for example through standardised
  company law, a capital market union and a systematic reduction in bureaucracy. The
  Federal Government is also focusing on a more active trade policy to strengthen
  Europe’s strategic independence - with new free trade agreements, closer partnerships
  and more stable economic relations. The US and Europe must “join forces” to work
  towards a just peace in Ukraine, the Federal Chancellor demanded. He reminded the
  audience that Ukraine was prepared to negotiate, while Russia was systematically
  undermining peace efforts and continuing to attack civilian infrastructure. Pressure
  on Moscow must therefore be increased, for example through a 20th EU ‑sanctions
  package and the disbursement of the agreed 90‑billion‑euro‑ loan to Ukraine. Merz
  criticised the blockade of an EU ‑member state. Europe must be involved in future
  peace negotiations. “For years and decades” Iran has “covered the world with terror”,
  said the Chancellor. Germany shares Israel and the USA’s goal that Iran should no
  longer pose a threat in future. At the same time, Merz criticised the fact that
  there is “still no credible concept” for the current military operation. As long
  as the war continues, Germany will not take part in it, the Chancellor declared.
  “This does not specifically rule out the possibility of using diplomatic means to
  bring the war to a rapid end,” said Merz. Europe has a strong interest in this;
  an escalation or collapse of the Iranian state would have massive consequences for
  security, energy supply and migration. Federal Chancellor Merz reminded the audience
  how important peace, freedom and democracy are today. Many people have the feeling
  that room for manoeuvre is being lost - due to geopolitical upheaval, a backlog
  of reforms, rising costs, economic stagnation and too much bureaucracy. The Federal
  Government wants to regain these freedoms, not for the State, but for its citizens
  and companies. To this end, it is focusing on international partnerships, economic
  reforms, digitalisation, modernisation of social systems, and measures to strengthen
  security. With regard to developments on the energy markets, Germany intervenes
  where it has national room for manoeuvre - for example by releasing oil reserves
  and exercising greater control over petrol station prices. The Chancellor also referred
  to the Federal Government’s renewal programme, which has initiated a reduction in
  bureaucracy, state modernisation, a high-tech‑agenda and a turnaround in its migration
  policy. He also emphasised that, for the first time in years, Germany had recorded
  a positive investment balance, although what matters now is “our will to shape the
  future” and fundamental reforms. The Federal Government wants to use “strength and
  creativity” to ensure that Germany and Europe emerge stronger from this time of
  upheaval.
