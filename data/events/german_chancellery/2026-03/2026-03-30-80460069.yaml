title: Press conference with Federal Chancellor Merz and President al-Sharaa of Syria
  Support for Syria’s stability and growth
text: 'Federal Chancellor Friedrich Merz met with Syrian President Ahmed al-Sharaa
  for talks in the Federal Chancellery. Political stability and growth are crucial
  for any reconstruction to be successful, said Federal Chancellor Friedrich Merz
  during a press conference after his discussions with Syrian President Ahmed al-Sharaa.
  The Syrians who return to Syria with new experiences and new ideas from Germany
  and around the world should contribute significantly to this, Merz emphasised. The
  Federal Chancellor encouraged President al-Sharaa: “Create space in the new Syria
  for all Syrians, regardless of their religion, ethnicity and gender.” Read the transcript
  of the press conference here (in German only):'
