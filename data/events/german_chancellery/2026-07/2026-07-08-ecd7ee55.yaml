title: Fragen und Antworten Schutz bei hohen Temperaturen
text: 'Bei hohen Temperaturen ist es besonders wichtig, ausreichend zu trinken. Hitzewellen,
  hohe Temperaturen und starke Luftfeuchtigkeit können schwere Folgen haben. Denn
  eine konstante Körpertemperatur ist für unser Gehirn und unsere Organe von essenzieller
  Bedeutung. Warum der Schutz vor Hitze so wichtig ist, wen die hohen Temperaturen
  besonders gefährden und was die Bundesregierung zum Schutz vor Hitze tut – die wichtigsten
  Fragen und Antworten im Überblick. Es ist wichtig, dem Körper bei seinem natürlichen
  Abkühlungsprozess zu helfen. Das Bundesinstitut für Öffentliche Gesundheit empfiehlt,
  ausreichend zu trinken – am besten etwa zwei bis drei Liter über den Tag verteilt.
  Es ist von Bedeutung, sich selbst und auch die eigene Wohnung bei hohen Temperaturen
  zu kühlen. Darüber hinaus ist es ratsam, in der Sonne eine Kopfbedeckung zu tragen
  und gleichzeitig einen Sonnenschutz mit hohem Lichtschutzfaktor aufzutragen. Aktivitäten
  sollten in die kühleren Morgen- oder Abendstunden verlegt werden. Wenn Erkrankungen
  vorliegen oder Medikamente eingenommen werden, kann ein Gespräch mit einem Arzt
  oder einer Ärztin sinnvoll sein. Der Körper arbeitet ständig daran, die Temperatur
  zu halten: Auf Hitze reagiert er mit abkühlenden Prozessen. Insbesondere hohe Temperaturen
  in Verbindung mit hoher Luftfeuchtigkeit können es dem Körper schwer machen, sich
  abzukühlen. So funktioniert bei hoher Luftfeuchtigkeit die Wärmeabgabe über Schwitzen
  nicht mehr hinreichend. Während ein Sonnenbrand und geschwollene Beine noch vergleichsweise
  harmlos sind, kann ein Hitzeschlag lebensbedrohlich sein. Informationen, wie der
  Körper auf Hitze reagiert, bietet das Bundesinstitut für Öffentliche Gesundheit.
  Ein hoher Temperaturanstieg kann für jeden Menschen verheerende Folgen haben – doch
  es gibt einige Risikogruppen, für die der Schutz vor Hitze besonders von Bedeutung
  ist. Darunter fallen Säuglinge und Kleinkinder, die zum Beispiel schneller dehydriert
  sind. Auch für ältere Menschen stellen hohe Temperaturen eine erhöhte Gefahr dar:
  Es ist für ihre Organe schwieriger, sich an hohe Temperaturen anzupassen. Auch Wohnungslose
  und chronisch Erkrankte müssen besonders geschützt werden. So ist bei chronischen
  Erkrankungen wie Bluthochdruck, Diabetes oder Asthma die Fähigkeit des Körpers,
  seine Temperatur zu regulieren, gestört. Mehr zu den Risiken von hohen Temperaturen
  insbesondere bei Kleinkindern, älteren Menschen und chronisch Erkrankten gibt es
  auf den Seiten des Bundesinstituts für Öffentliche Gesundheit. Hitzewellen spielten
  in den Sommern der vergangenen Jahre eine immer größere Rolle. Wenn an mehreren
  aufeinanderfolgenden Tagen hohe Temperaturen herrschen, spricht man von einer Hitzewelle.
  Es gibt allerdings international keine einheitliche Definition. Der Deutsche Wetterdienst
  (DWD) spricht von einer Hitzewelle, sobald die Temperatur an mindestens drei aufeinanderfolgenden
  Tagen über 28 °C liegt. Beim Deutschen Wetterdienst können Sie die Hitzewarnungen
  abrufen. Grundsätzlich ist es in Deutschland Aufgabe der Länder und Kommunen, regional
  angepasste Hitzemaßnahmen und Hitzeaktionspläne zu entwickeln. Dies ist sinnvoll,
  weil die Maßnahmen immer an der konkreten Situation vor Ort ausgerichtet werden
  müssen. Um der Hitze ganzheitlich zu begegnen, hat Bundesgesundheitsministerin Nina
  Warken im Juni 2025 drei weitere Hitzeschutzpläne vorgestellt, die den Hitzeschutzplan
  Gesundheit aus dem Jahr 2023 erweitern. Neu hinzugekommen sind damit Musterpläne
  für den organisierten Sport, Apotheken und ambulante psychologische Praxen. Weiterentwickelt
  werden beispielsweise diese Initiativen des Hitzeschutzplans Gesundheit: Der „Hitzeservice“ für
  Kommunen bietet unter anderem Informationen zu Hitzeschutzmaßnahmen und Hitzeaktionsplänen.
  Das Robert Koch Institut (RKI) entwickelt sein „Hitze- Monitoring “ weiter. Ziel
  ist es, Auswirkungen künftiger Hitzewellen besser abschätzen zu können. Und das
  Bundesinstitut für Öffentliche Gesundheit erweitert sein Informationsangebot, zum
  Beispiel auf dem Portal „Klima – Mensch – Gesundheit" . Auch das Bundesumweltministerium
  bietet in einer Broschüre Tipps für heiße Tage an. Außerdem unterstützt es Kommunen
  und Einrichtungen dabei, kühlende Stadtnatur und begrünte Dächer zu schaffen. Ziel
  ist es auch, durch Frischluftschneisen und Schattenplätze die Stadtplanung langfristig
  auf Hitzewellen auszurichten.'
