title: Im Bundestag beschlossen Experimentierräume für neue Entwicklungen
text: 'Reallabore machen es möglich, Innovationen zu erproben, die im allgemeinen
  Rechtsrahmen an Grenzen oder auf offene Fragen stoßen. Innovationen sollen sich
  in Deutschland freier entwickeln k ö nnen. Das hat sich die Bundesregierung im Koalitionsvertrag
  und auch in der Staatsmodernisierungsagenda vorgenommen. Daf ü r hat das Bundeskabinett
  dem Bundestag eine Formulierungshilfe an die Hand gegeben f ü r eine Ä nderung des
  Reallabore-Gesetzesentwurfs - das neue Bundeserprobungsgesetz. Dieses Gesetz hat
  der Bundestag nun beschlossen. Es gestaltet die Rahmenbedingungen so, dass Innovationen
  und technische Entwicklungen besser getestet werden k ö nnen, nämlich in sicheren
  Testräumen außerhalb des normalen Systems. Sogenannte Reallabore erm ö glichen solche
  Testläufe unter fast realen Bedingungen – teils außerhalb des geltenden Rechts,
  aber immer unter behördlicher Begleitung. Das hilft dem Fortschritt auf zwei Wegen:
  Die Technik kann sich freier entwickeln, h ä lt dabei aber Schutzstandards ein.
  Zudem können sich Gesetze und Verordnungen durch den Testraum besser an diese Entwicklungen
  anpassen – um Risiken als auch Anforderungen besser Rechnung zu tragen. Das neue
  Bundeserprobungsgesetz regelt Reallabore ü bergreifend, innovationsfreundlicher
  und verbindlicher. Ziel ist es dabei auch, Zeit zu sparen und Kosten zu senken.
  Eine neue allgemeine Erprobungsklausel im Gesetz erm ö glicht es, testweise digitale
  oder vereinfachte Verfahren vor Ort zu erproben und auszuwerten. Zum Beispiel können
  dazu mehrere Verfahrensschritte zusammengelegt oder ein KI -Einsatz getestet werden
  – dabei sind auch ausnahmsweise Abweichungen von verwaltungsrechtlichen Regeln möglich.
  Bei positiver Bewertung können solche Verfahren anschließend bundesweit als Regelung
  vorgeschlagen werden. Das Gesetz sieht auch konkrete Änderungen von Einzelgesetzen
  vor und ermöglicht Probeläufe im Gesundheitswesen, im Jugendmedienschutz, bei der
  Registermodernisierung in der Wirtschaft, im Bildungsbereich, im Telekommunikationssektor
  oder auch im Luftverkehr. Konkret ändert sich beispielsweise das Online zugangsgesetz.
  Dort wird die M ö glichkeit geschaffen, die Europ ä ische Brieftasche f ü r die
  Digitale Identit ä t auszutesten, das sogenannte EUID -Wallet. Das ist die digitale
  EU -Identität, die es Bürgerinnen und Bürgern ermöglicht, Geschäfte online abzuschließen.
  Dazu zählen Dienstleistungen oder die Verwaltung von offiziellen digitalen Dokumente,
  die so gespeichert und weitergeleitet werden können sowie die Möglichkeit, verbindliche
  Unterschriften zu leisten. Und nach der neuen Experimentierklausel im Jugendschutzgesetz
  d ü rfen automatisierte Bewertungssysteme für die Vergabe von Alterskennzeichen
  einen Testlauf unternehmen. Mehr Informationen zu Reallaboren finden sich auf der
  Portalseite des Bundeswirtschaftsministeriums.'
