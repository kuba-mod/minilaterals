title: Sitzung des Nationalen Sicherheitsrates im Juli 2026
text: Der Nationale Sicherheitsrat ist heute unter dem Vorsitz des Bundeskanzlers
  zusammengetreten. Dabei tauschten sich die Mitglieder vor dem NATO-Gipfel in Ankara
  über den russischen Angriffskrieg gegen die Ukraine aus. Die Bundesregierung wird
  die Ukraine weiter entschlossen unterstützen und den Druck auf Russland gemeinsam
  mit ihren Partnern weiter erhöhen. Das Ziel der Bundesregierung bleiben ernsthafte
  Verhandlungen für einen gerechten und dauerhaften Frieden. Deutschland unterstützt
  den ukrainischen Vorschlag für direkte Gespräche der Ukraine mit Russland unter
  Teilnahme Europas und der USA. Darüber hinaus setzte der Nationale Sicherheitsrat
  die Beratung zum strategischen Umgang mit fortgeschrittenen KI-Modellen sowie zum
  Thema der Gesamtverteidigung fort.
