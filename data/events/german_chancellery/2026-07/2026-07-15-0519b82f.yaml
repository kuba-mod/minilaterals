title: Im Kabinett beschlossen Weniger Bürokratie im Verkehrsbereich
text: 'Das Lkw -Fahrverbot soll künftig nur noch an bundesweit einheitlichen Feiertagen
  gelten. Das Kabinett hat eine Reihe an Maßnahmen beschlossen, die bürokratische
  Vorschriften abschaffen oder vereinfachen sollen – so auch im Verkehrsbereich .
  Vorgesehen sind unter anderem Verwaltungsverfahren zu vereinfachen, überflüssige
  Informationspflichten abzubauen und gesetzliche Doppelstrukturen zu beseitigen.
  Unternehmen werden so von Bürokratie befreit, Abläufe in der Verwaltung optimiert
  und die Rechtsklarheit verbessert. Davon profitieren auch Bürgerinnen und Bürger.
  Der beschlossene Gesetzentwurf und die Verordnung bündeln eine Vielzahl von Einzelmaßnahmen,
  die Wirtschaft, Bürgerinnen und Bürger sowie die Verwaltung um insgesamt rund 65
  Millionen Euro pro Jahr entlasten sollen. Darunter beispielsweise: Mit dem Entlastungspaket
  werden Maßnahmen aus der Modernisierungsagenda Bund und der Föderalen Modernisierungsagenda
  umgesetzt. Weitere Informationen lesen Sie beim Bundesverkehrsministerium .'
