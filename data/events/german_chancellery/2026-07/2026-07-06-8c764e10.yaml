title: Im Kabinett beschlossen Wohngeld wird neu geordnet
text: 'Die Neuordnung des Wohngelds soll auch zum Bürokratierückbau beitragen. Das
  Bundeskabinett hat den Entwurf eines Gesetzes zur Vereinfachung und Fortentwicklung
  des Wohngeldgesetzes beschlossen. Der Entwurf sieht notwendige Einsparungen vor
  und soll so zur Haushaltskonsolidierung beitragen. Geplant ist, das Wohngeld zum
  Inkrafttreten des Gesetzes am 1. Januar 2027 abzusenken. Im Einzelnen ist folgendes
  vorgesehen: Um den bürokratischen Aufwand zu reduzieren, soll die Prüfungsdichte
  verringert und die Nachweisführung vereinfacht werden. Nachweise für eine Schwerbehinderung
  oder Pflegebedürftigkeit sollen beispielsweise vereinfacht und der Prüfaufwand für
  sogenannte Wechselmodellfälle – Kinder, die wechselweise bei getrenntlebenden Eltern
  wohnen – verringert werden. Bereits bewilligte Bescheide sind von den Regelungen
  nicht betroffen; sie gelten bis zum Ende ihrer Laufzeit weiter. Diese beträgt in
  der Regel 12 Monate, in Ausnahmefällen 24 Monate. Wohngeld ist ein staatlicher Zuschuss
  für Mieterinnen und Mieter sowie selbstnutzende Eigentümerinnen und Eigentümer.
  Diese haben Anspruch auf Unterstützung, wenn ihr Haushaltseinkommen zu niedrig ist,
  um die Wohnkosten zu tragen. Mit der Neuregelung werden Menschen aus dem Wohngeldbezug
  herausfallen. Wer Hilfe und Unterstützung benötigt, wird sie aber auch weiterhin
  erhalten. Damit Wohnen wieder bezahlbar wird, hat die Koalition beschlossen , eine
  Wohnungsbaugesellschaft für bezahlbares Wohnen (WBG) einzurichten. Ziel ist es,
  günstige Wohnungen zu bauen, die der Wohnungsmarkt derzeit nicht ausreichend bereitstellt.
  So soll der Wohnungsmarkt entlastet und der Druck auf die Mieten gesenkt werden.'
