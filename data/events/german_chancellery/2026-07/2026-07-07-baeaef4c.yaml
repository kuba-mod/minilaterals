title: Canada-Germany Joint Statement
text: 'Today, the Prime Minister of Canada, Mark Carney, and the Chancellor of Germany,
  Friedrich Merz, announced the launch of negotiations towards a Canada-Germany Strategic
  Partnership Agreement (“Partnership Agreement”). Canada and Germany benefit from
  a robust bilateral relationship, with established cooperation across a number of
  shared priorities. The Partnership Agreement will serve as a flexible strategic
  framework through which Canada and Germany will shape and advance cooperation, and
  direct investment in key strategic industries, for years to come. Amongst others,
  key areas of cooperation will include: (I)    Security and Defence; (II)    Technology,
  Artificial Intelligence and Space; (III)    Supply Chains and Critical Minerals;
  (IV)    Energy; and (V)    Investment. The Prime Minister and Chancellor invite
  their Ministers of Foreign Affairs with advancing negotiations, with the intention
  of finalising the Partnership Agreement by the end of year. Höflichkeitsübersetzung
  Gemeinsame Erklärung von Deutschland und Kanada Bundeskanzler Friedrich Merz und
  der kanadische Premierminister Mark Carney kündigten heute die Aufnahme von Verhandlungen
  für eine deutsch-kanadische strategische Partnerschaftsvereinbarung an („Partnership
  Agreement”). Kanada und Deutschland profitieren von starken bilateralen Beziehungen
  und einer etablierten Zusammenarbeit in einer Reihe gemeinsamer Prioritäten. Die
  Partnerschaftsvereinbarung wird als flexibler strategischer Rahmen dienen, auf dessen
  Grundlage Deutschland und Kanada die Zusammenarbeit gestalten und vorantreiben sowie
  in den kommenden Jahren Investitionen in strategisch wichtige Wirtschaftszweige
  steuern werden. Zu den wichtigsten Bereichen der Zusammenarbeit zählen unter anderem:
  (I)    Sicherheit und Verteidigung; (II)    Technologie, künstliche Intelligenz
  und Weltraum; (III)    Lieferketten und kritische Mineralien; (IV)    Energie; und
  (V)    Investitionen. Der Bundeskanzler und der Premierminister bitten ihre Außenminister,
  die Verhandlungen voranzutreiben, um die Partnerschaftsvereinbarung bis zum Jahresende
  abzuschließen.'
