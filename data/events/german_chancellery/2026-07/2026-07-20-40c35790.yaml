title: Bundeskanzler Merz telefoniert mit dem neuen britischen Premierminister Andrew
  Burnham
text: Bundeskanzler Friedrich Merz hat mit dem neuen britischen Premierminister Andrew
  Burnham telefoniert. In dem Gespräch gratulierte Bundeskanzler Merz dem Premierminister
  zu dessen Amtsantritt. Beide drückten ihren Wunsch aus, die enge Zusammenarbeit
  zwischen beiden Ländern fortzusetzen und dazu auch die Umsetzung des Vertrags von
  Kensington weiter voranzutreiben. Mit Blick auf den russischen Angriffskrieg gegen
  die Ukraine waren sich der Bundeskanzler und der Premierminister einig, die Ukraine
  weiter umfassend zu unterstützen und den Druck auf Russland zu erhöhen. Das Ziel
  bleiben ernsthafte Verhandlungen, um einen gerechten und dauerhaften Frieden zu
  erreichen.
