title: Im Kabinett beschlossen Mehr Geld für Mutter-und-Kind-Stiftung
text: 'Die Bundesregierung will den Schutz des ungeborenen Lebens stärken. Die Bundesregierung
  hat einen Gesetzentwurf beschlossen, mit dem die finanzielle Grundlage der Bundesstiftung
  Mutter und Kind gestärkt wird. Bisher ist die gesetzlich festgelegte Bundeseinlage
  für die Stiftung seit 1993 unverändert geblieben. Sie liegt bei jährlich mindestens
  rund 92 Millionen Euro. Die Bundesstiftung "Mutter und Kind – Schutz des ungeborenen
  Lebens" wurde 1984 errichtet, um schwangere Frauen in besonderen Notlagen schnell
  und unbürokratisch finanziell zu unterstützen. Die Stiftung hilft jährlich weit
  über 100.000 werdende Mütter in Notlagen. Die Bundesregierung hat nun beschlossen,
  die Bundeseinlage der Stiftung in zwei Schritten zu erhöhen: auf jährlich 101 Millionen
  Euro ab dem Jahr 2027 und auf 105 Millionen Euro ab dem Jahr 2032. Dadurch können
  die Hilfen der Stiftung besser an die gestiegenen Lebenshaltungskosten angepasst
  und ihre Entlastungswirkung verbessert werden. Die Bundesstiftung gewährt finanzielle
  Hilfen insbesondere für Schwangerschaftsbekleidung, aber auch für die Erstausstattung
  des Kindes, für die Weiterführung des Haushaltes und der Wohnung, für die Einrichtung
  sowie für die Betreuung des Kindes. Höhe und Dauer der Unterstützung richten sich
  nach den besonderen Umständen der persönlichen Notlage der Frau. Die vor der Entbindung
  beantragten Hilfen können in Einzelfällen für bis zu drei Jahre nach der Geburt
  gezahlt werden, zum Beispiel um der Mutter den Abschluss einer Ausbildung zu ermöglichen.
  Anträge auf Stiftungsmittel stellen: Die Anträge auf Stiftungsmittel können in einer
  Schwangerschaftsberatungsstelle vor Ort gestellt werden. Weitere Informationen dazu
  bietet die Internetseite der Bundesstiftung . Über die Postleitzahlensuche  kann
  dort die am nächsten gelegene Schwangerschaftsberatungsstelle, wo ein Antrag gestellt
  werden kann, gefunden werden.'
