title: Der Orden Pour le mérite hat unter anderem Marina Abramović und Anselm Kiefer
  als neue Mitglieder gewählt
text: 'Das Kapitel des Ordens hat in seiner Sitzung am 31. Mai 2026 in Berlin die
  Rechtswissenschaftlerin Angelika Nußberger und den bildenden Künstler Anselm Kiefer
  als inländische Mitglieder sowie die Performancekünstlerin Marina Abramović und
  den Wirtschaftswissenschaftler Ernst Fehr als ausländische Mitglieder in den Orden
  gewählt. Dazu erklärt Staatsminister Weimer: „Ich freue mich, dass mit Angelika
  Nußberger, Anselm Kiefer, Marina Abramović und Ernst Fehr ganz herausragende Persönlichkeiten
  als neue Mitglieder gewählt wurden. Ihr Wirken hat Wissenschaft geprägt und in der
  Gegenwartskunst weltweit Maßstäbe gesetzt. Ihre Wahl macht die Bedeutung dieses
  Ordens als Auszeichnung für höchste geistige und künstlerische Leistungen noch einmal
  deutlich.“ Die neuen Mitglieder haben inzwischen ihre Wahl angenommen. Dem Orden
  gehören somit 34 inländische und 38 ausländische Mitglieder, darunter 17 Nobelpreisträgerinnen
  und Nobelpreisträger an. Die Zuwahl in den Orden zählt zu den höchsten Ehrungen,
  die einem Wissenschaftler oder Künstler in Deutschland zuteilwerden kann. Die Künstler-
  und Gelehrtenvereinigung wurde 1842 von Preußen-König Friedrich Wilhelm IV. gegründet
  und 1952 von Bundespräsident Theodor Heuss wiederbelebt. Sie steht unter dem Protektorat
  des Bundespräsidenten. Erster Kanzler des Ordens war der Naturforscher Alexander
  von Humboldt. Der Staatsminister für Kultur und Medien finanziert den Orden und
  betreut ihn organisatorisch. Weitere Informationen unter www.orden-pourlemerite.de'
