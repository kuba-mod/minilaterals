title: Sommer-Pressekonferenz des Bundeskanzlers „Wir haben viel erreicht, aber es
  ist noch lange nicht genug“
text: 'Bei der Bundespressekonferenz stellte sich Bundeskanzler Merz den Fragen der
  Journalistinnen und Journalisten. Die Bundesregierung hat nach Ansicht des Bundeskanzlers
  viele Reformen angepackt, die überfällig waren. „W ir sind damit nach meiner Einschätzung
  auch auf einem guten Weg “, so Merz. Aber noch lange nicht am Ziel. Denn Ziel sei,
  dass Deutschland zu einer wettbewerbsfähigen Wirtschaft zurückkehre und zu den leistungsstarken
  Volkswirtschaften in Europa gehöre. „Die Koalition hat Tritt gefasst.“ Der Bundeskanzler
  lobte die gute Zusammenarbeit in der Koalition. Er schließe das erste Halbjahr 2026
  mit der Zuversicht ab, „ dass wir auch im zweiten Halbjahr gute Politik für Deutschland
  machen“, so Merz, „wohlwissend, dass wir nach wie vor vor großen Aufgaben stehen“.
  Das beschlossene Infrastruktur-Zukunftsgesetz werde die gesamte Planung und Durchführung
  von Infrastrukturvorhaben deutlich erleichtern. Es werde schneller gehen, da wichtige
  Vorhaben künftig prioritär behandelt werden könnten, „weil wir diesen Ausbau unter
  die Überschrift des überragenden öffentlichen Interesses gestellt haben“, so Bundeskanzler
  Merz. „Das ist eine wichtige Gesetzgebung gewesen.“ In der vergangenen Woche ist
  im Bundestag und im Bundesrat die umfassendere Reform der gesetzlichen Krankenversicherung
  verabschiedet worden, ein Vorhaben, „das wir über viele Monate vorbereitet haben“.
  Auf Basis der Vorschläge der FinanzKommission Gesundheit (FKG) sei der Gesetzentwurf
  erstellt worden. Das Ziel der Reform sei es, die Beitragssätze zu stabilisieren.
  Folgen solle noch die Reform der Alterssicherung. Zum zweiten Mal in dieser Wahlperiode
  habe das sogenannte Entlastungskabinett getagt. „Eine Kabinettsitzung, bei der wir
  uns praktisch ausschließlich mit der Entlastung und mit der Abschaffung von gesetzlichen
  Regelungen beschäftigten“, so Merz. Es gehe darum, Bürokratie in Deutschland zurückzudrängen
  und damit Unternehmen sowie Bürgerinnen und Bürger zu entlasten. „Das ist eine Aufgabe,
  die uns auf Dauer gestellt sein wird.“ Der Bundeskanzler kündigte ein weiteres Entlastungskabinett
  zum Ende des Jahres an. Kanzler Merz betonte, er habe von Anfang an sehr viel Wert
  darauf gelegt, dass Deutschland wieder eine stärkere Rolle in der Europäischen Union
  spiele. Merz wies auf die besondere Verantwortung Deutschlands hin, „zum Gelingen
  der europäischen Politik beizutragen“. Als Herausforderung bewertete er die im zweiten
  Halbjahr 2026 anstehende Einigung über den mittelfristigen Finanzrahmen. Gelungen
  sei seiner Ansicht nach, dass man in der EU zu einer übereinstimmenden Auffassung
  beim Thema Vollendung des europäischen Binnenmarktes und der Wiederherstellung der
  Wettbewerbsfähigkeit der europäischen Industrie gekommen sei. Er wolle eine bessere
  Zusammenarbeit innerhalb der EU befördern, so der Kanzler. Der Bundeskanzler ging
  auf den jüngsten NATO -Gipfel in Ankara ein. Er verwies auf Erfolge in der militärisch-technologischen
  Zusammenarbeit, nämlich auf das Abkommen zwischen Kanada, Norwegen und Deutschland
  zum gemeinsamen U -Boot-Bau. „Das ist nicht nur eine militärisch-strategische Entscheidung,
  das ist auch eine wirtschaftspolitisch wichtige Entscheidung für unser Land. Wir
  werden im hohen zweistelligen Milliardenbetrag Aufträge haben für die Werften in
  Deutschland und für die Zulieferer in Deutschland.“ Zudem verwies der Kanzler auf
  das Treffen der sogenannten Koalition der Willigen in Paris, ein Bündnis mehrerer
  Staaten zur Unterstützung der Ukraine gegen den Angriffskrieg Russlands. Dort sei
  „die klare Entschlossenheit von uns allen zum Ausdruck“ gebracht worden, der Ukraine
  weiter zu helfen. Außerdem habe man mit dem Nationalen Sicherheitsrat „eine Institution
  geschaffen, die im Kanzleramt im umfassenden Sinne Sicherheitspolitik definiert:
  innere Sicherheit, äußere Sicherheit, Versorgungssicherheit“ – bis hin zum Schutz
  der Bevölkerung, etwa vor Hitzewellen.'
