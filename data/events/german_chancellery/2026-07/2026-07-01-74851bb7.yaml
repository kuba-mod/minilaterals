date: '2026-07-01'
type: press_release
source_name: german_chancellery
title: Pressekonferenz mit Kanzler Merz nach dem Verteidigungskabinett Die NATO europäischer
  machen
text: 'In der gemeinsamen Pressekonferenz betonte Bundeskanzler Merz: „ Wir wollen
  die NATO insgesamt europäischer machen.“ Zum zweiten Mal in dieser Legislatur ist
  das Bundeskabinett im Verteidigungsministerium zusammengekommen. NATO -Generalsekretär
  Mark Rutte hat als Gast an der Sitzung teilgenommen. Der Schwerpunkt der Sitzung
  lag auf sicherheits- und verteidigungspolitischen Themen. Das Kabinett hat mehrere
  Beschlüsse gefasst, die die Bundeswehr stärken und die Gesellschaft resilienter
  machen sollen. An der anschließenden Pressekonferenz haben auch der Verteidigungsminister
  und der NATO -Generalsekretär teilgenommen. In seinem Statement sprach Kanzler Merz
  auch über die Themen der Sitzung und betonte, dass Deutschland sicherheitspolitisch
  Tempo mache. „ Das braucht es in einer Weltlage, in der wir als Europäer schnell
  und entschieden Verantwortung für unsere Freiheit, für unsere Sicherheit und auch
  für unseren Wohlstand übernehmen müssen und wollen“, so Merz. Die Kabinettssitzung
  diente auch der Vorbereitung des anstehenden NATO -Gipfels. Dieser wird am 7. Und
  8. Juli in Ankara stattfinden. Der Termin reiht sich ein in die Gespräche mit den
  Amtskollegen aus Frankreich, Großbritannien, Italien und Polen im E5 –Format in
  Berlin in der letzten Woche und die Abstimmung mit US -Präsident Donald Trump. (Die
  Protokollierung des fremdsprachlichen Teils erfolgte anhand der Simultandolmetschung.)
  Sehr geehrter Herr Generalsekretär, lieber Mark Rutte, meine Damen und Herren, ich
  heiße den Generalsekretär der NATO herzlich willkommen. Aber ich bedanke mich zugleich
  für die erneute Gastfreundschaft des Bundesverteidigungsministers in seinem Haus.
  Wir haben heute die 50. Kabinettssitzung der Bundesregierung gehabt, und wir sind
  zum zweiten Mal im Bundesverteidigungsministerium zu Gast. Sie wissen, dass wir
  seit dem letzten Jahr einmal im Jahr mit dem ganzen Bundeskabinett hier im Verteidigungsministerium
  tagen, um miteinander über sicherheitspolitische Fragen zu diskutieren. Wir hatten
  im vergangenen Jahr den SACEUR , General Grynkewich, zu Gast. Wir haben in diesem
  Jahr Mark Rutte, den Generalsekretär der NATO , zu Gast. Ich will es einfach noch
  einmal sagen: Lieber Mark, ganz herzlichen Dank für das Kommen nach Berlin, aber
  auch herzlichen Dank für die sehr gute Zusammenarbeit, die wir in der NATO haben.
  Ich freue mich, dass wir heute die Gelegenheit hatten, auch im Bundeskabinett miteinander
  zu zeigen, dass wir die Themen, die wir in der NATO miteinander diskutieren, auch
  im gesamten Bundeskabinett zum Thema machen. Ich will noch einmal die Gastfreundschaft
  des Verteidigungsministeriums erwähnen. Herzlichen Dank auch an die Mitarbeiterinnen
  und Mitarbeiter, Soldatinnen und Soldaten hier im Haus für die gute Vorbereitung
  und die Gastfreundschaft, denn wo, wenn nicht hier, in diesem Haus, sollten wir
  uns über verteidigungspolitische Fragen miteinander unterhalten? Wir haben diesen
  Termin am heutigen Tag auch mit Bedacht gewählt. Denn in der nächsten Woche findet
  der NATO -Gipfel in Ankara statt. Diesen bereiten wir sehr intensiv vor. Ich habe
  in der vergangenen Woche – das wissen Sie – meine Amtskollegen im sogenannten E5
  -Format nach Berlin eingeladen: den französischen Staatspräsidenten, die italienische
  Ministerpräsidentin, den polnischen Ministerpräsidenten und den britischen Premierminister.
  Wir haben intensiv über die Themen gesprochen, die ich auch im unmittelbaren Anschluss
  daran noch einmal mit Mark Rutte telefonisch abgestimmt habe, zu einem Zeitpunkt,
  zu dem er gerade bei Präsident Trump im Oval Office war. Ich konnte deswegen auch
  unmittelbar nach dem Treffen der E5 den amerikanischen Präsidenten und den Generalsekretär
  der NATO über unsere Themen informieren. Ich habe für Freitag dieser Woche jetzt
  die baltischen Amtskollegen aus Estland, Lettland und Litauen zu einem Treffen nach
  Berlin eingeladen. Wir wollen ganz einfach von der europäischen Seite aus vor dem
  NATO -Gipfel ein Zeichen der Geschlossenheit und der Stärke setzen. Wir wollen die
  NATO insgesamt europäischer machen. Wir übernehmen als Europäer mehr Verantwortung
  in der NATO . Wir bauen einseitige transatlantische Abhängigkeiten ab. Das ist unter
  allen Umständen für beide Seiten des Atlantiks eine richtige Entscheidung. Dazu
  gehört, dass wir unsere Verteidigungsausgaben entschieden erhöhen. Deutschland wird
  schon bis 2029 das im vergangenen Jahr in Den Haag verabredete 3,5-Prozent-Ziel
  erreichen, viele Jahre vor dem Zeitpunkt, den wir in der NATO insgesamt verabredet
  haben. Wir werden diese Mittel gemeinsam umsetzen. Nationale Alleingänge in der
  NATO wollen wir nicht. Wir wollen mehr Zusammenarbeit, transatlantisch und europäisch.
  Unsere Nachbarn sollen sich sicherer fühlen, wenn Deutschland stark ist. Wenn Deutschland
  seine Streitkräfte und seine Allianzverpflichtungen fest in die Allianz und in die
  NATO einbindet, dann wird das auch gelingen. Wir wollen in Ankara unverändert ein
  Zeichen der Unterstützung für die Ukraine setzen. Die Bundesregierung schlägt vor,
  dass wir als europäische NATO -Alliierte Kyjiw eine neue Finanzierungszusage geben.
  Wir hoffen, dass Moskau daraus die richtigen Schlüsse zieht. Wir werden in unserer
  Unterstützung für die Ukraine nicht nachlassen. Der Zeitpunkt, zu dem sich die russische
  Staatsführung bereiterklärt, in Gespräche und in Verhandlungen einzutreten, sollte
  jetzt näherkommen. Es liegt nur an Moskau. Die Gesprächsbereitschaft von uns, der
  Europäer, der NATO , aber insbesondere die Gesprächsbereitschaft des ukrainischen
  Staatspräsidenten und damit der Ukraine ist vielfach dokumentiert. Es liegt nur
  an Putin, jetzt diese Gespräche zu führen und den Krieg zu beenden. Es wird beim
  NATO -Gipfel auch um die Zukunft im Mittleren Osten gehen. Wir helfen weiterhin,
  einen dauerhaften Frieden zwischen den USA und Iran zu erreichen. Unser gemeinsames
  Ziel bleibt ein Ende des iranischen Nuklearprogramms und eine dauerhafte Öffnung
  der Straße von Hormus. Sie sehen also, dass große außen- und sicherheitspolitische
  Aufgaben vor uns liegen. Wir brauchen deshalb starke Streitkräfte und zugleich eine
  resiliente Gesellschaft. Auch dies war umfassend Thema im heutigen Kabinett. Ich
  will drei Beschlüsse nennen, die wir zusätzlich getroffen haben. Erstens, haben
  wir ein Gesetz verabschiedet, das den Aufbau und den Ausbau der Infrastruktur für
  die Bundeswehr beschleunigt. Wir haben zweitens ein Gesetz zur Stärkung der Reserve
  beschlossen. Wir brauchen Reservisten in der Bundeswehr. Wir machen unsere Reserve
  einsatzbereit, und wir vergrößern sie zugleich. Sie wird ein integraler Bestandteil
  der Bundeswehr. Schließlich, drittens, haben wir Eckpunkte zur Erneuerung der Sicherstellungs-
  und Vorsorgegesetze vereinbart. Das klingt etwas sperrig, ist aber in Wahrheit das,
  was wir als umfassendes Sicherheitskonzept für die Einbeziehung auch der Bevölkerung
  in den Zivilschutz, in den Bevölkerungsschutz verstehen, und dies auch für die Streitkräfte
  im Krisenfall. Sie sehen, dass wir sicherheitspolitisch Tempo machen. Das braucht
  es in einer Weltlage, in der wir als Europäer schnell und entschieden Verantwortung
  für unsere Freiheit, für unsere Sicherheit und auch für unseren Wohlstand übernehmen
  müssen und wollen. Abschließend noch einmal herzlichen Dank, lieber Mark. Deutschland
  kann auf die NATO zählen. Aber auch die NATO kann auf Deutschland zählen. Ich danke
  dir sehr für deinen Besuch. Ich freue mich, wenn wir uns schon in wenigen Tagen
  auch in Ankara sehen. Vielen Dank und auch von mir ein herzliches Willkommen allen
  hier im Bendlerblock. Herr Bundeskanzler, lieber Mark Rutte, ich freue mich, dass
  das Kabinett zum zweiten Mal hier getagt hat. Das ist gerade in diesen Zeiten ein
  wichtiges Signal dafür, welche Herausforderungen sich aus der sicherheitspolitischen
  Lage für uns, nicht nur als Bundeswehr, nicht nur als Streitkräfte, sondern für
  die Bundesregierung insgesamt und für das gesamte Land, ergeben. Es ist die zweite
  Sitzung, die wir haben. Das unterstreicht den besonderen Stellenwert. Deswegen ist
  es schön, lieber Mark, dass auch du bei der Gelegenheit heute dabei bist. Vielen
  Dank für deine wichtige Rolle, so umfassend und empathisch ausgeführt, wie du es
  überall auf der Welt für die NATO tust. Vielen Dank dafür. Wir haben in den letzten
  Jahren viel erreicht. Wir sind heute deutlich besser aufgestellt als noch vor drei
  Jahren. Wir sind auch krisensicherer. Die Bundeswehr wächst. Wir beschaffen deutlich
  mehr Material, wir bauen schneller und mehr Infrastruktur, und doch bleibt viel
  zu tun. Das Kabinett hat heute – der Bundeskanzler hat es erwähnt – das Reservestärkungsgesetz
  und das Bundeswehr-Infrastrukturbeschleunigungsgesetz und außerdem die sehr, sehr
  wichtigen Eckpunkte zur Sicherstellung der Vorsorge auf den Weg gebracht. Das alles
  sind wichtige Vorhaben. Ich will nur in aller Kürze auf die Vorhaben eingehen. Zum
  Reservestärkungsgesetz: Die alten Regelungen zur Reserve waren auf viele verschiedene
  Gesetze verteilt und gleichzeitig auf das ausgerichtet, was die Truppe in Zeiten
  von internationaler Krisenoperation braucht, aber nicht auf Landes- und Bündnisverteidigung.
  Dieser Wechsel macht auch einen anderen Blick auf die Reserve notwendig. Unser Ziel
  ist klar: bis zum Jahr 2035 260.000 in der aktiven Truppe und mindestens 200.000
  Reservisten. Mit dem Reservestärkungsgesetz gehen wir jetzt, nach der Strategie
  zur Reserve, den nächsten folgerichtigen Schritt: eine Reserve, die auf Augenhöhe
  mit der aktiven Truppe ihren Dienst versehen soll, ihnen die Bedeutung zu geben,
  die sie haben, und unsere Reservistinnen und Reservisten am Ball zu halten, sie
  also auch in ihren Qualifikationen weiterentwickeln zu können, damit sie im Ernstfall
  eben auch die neuen Systeme beherrschen können. Für all das dient dieses Gesetz.
  Wir brauchen eben ‑ die Zahl habe ich genannt – mehr Reservistinnen und Reservisten.
  Was regeln wir? Wir wollen die doppelte Freiwilligkeit abschaffen. Bisher mussten
  sowohl Arbeitgeber als auch Reservisten einer Heranziehung zustimmen. Das soll laut
  Gesetzentwurf entfallen. In Zukunft sollen Reservisten verpflichtend zur Reservedienstleistung
  herangezogen werden können. Die Heranziehung wird aber nach der Dauer gestaffelt,
  für die jemand bei der Bundeswehr Dienst geleistet hat, und auch das Alter wird
  eine Rolle spielen. Wir werden außerdem die Arbeitgeber früher anschreiben. Heranziehungsbescheide
  sollen spätestens acht Wochen vorher vorliegen. Es gibt eine Anhörung und natürlich
  die Möglichkeit, persönliche Gründe, die jeweils dagegensprechen, seitens des Arbeitgebers,
  Unabkömmlichkeit, oder auch des Arbeitnehmers zu berücksichtigen. Die Möglichkeiten
  für die Arbeitgeber, Kosten für eine Ersatzkraft abzurechnen, werden großzügiger
  gestaltet. Noch ein Wort zu den neuen Wehrdienstleistenden, weil es auch nach den
  Meldungen der letzten Tage wichtig ist: Wir überraschen niemanden mit diesem Gesetz,
  der sich in den letzten Jahren freiwillig gemeldet hat und nicht davon ausgehen
  musste, verpflichtend zu Reserveübungen herangezogen zu werden. Deswegen gelten
  die neuen Regelungen nicht für freiwillig Wehrdienst Leistende, die sich vor Inkrafttreten
  des Gesetzes verpflichtet haben, also auch nicht für die freiwillig Wehrdienst Leistenden,
  die aktuell ihren Wehrdienst leisten. Sie gelten natürlich erst recht nicht für
  die ehemaligen Wehrpflichtigen bis 2011. Gleichzeitig ist für die Reserve wichtig,
  dass die Reserve nur so im Zugriff sein und an Reserveübungen teilnehmen kann, wie
  wir wissen, wen es dort draußen gibt und wo sie sind. Die Wehrerfassung ‑ das wissen
  Sie – wird durch die Fragebögen und die darauffolgenden Musterungen gewährleistet.
  Aber die Wehrüberwachung, also die Verwaltung der Reservedienstleistenden, ist in
  den vergangenen Jahren, seit 2011, eben auch nicht praktiziert worden. Auch das
  führen wir jetzt wieder ein. Wir verschicken auch hierzu Fragebögen, gleichen Daten
  und Verfügbarkeit und Qualifikation ab, um auch hierbei die Wehrerfassung, in dem
  Fall für die Reserve, voranzutreiben. Zur Infrastruktur: Wir schaffen Voraussetzungen
  und fassen insgesamt zehn Gesetze an, um Infrastruktur in der Bundeswehr bzw. für
  die Bundeswehr zu beschleunigen. Wir investieren jedes Jahr mit steigenden Zahlen
  in der echten Umsetzung in Infrastruktur. Um das auch in Zukunft zu gewährleisten
  und noch mehr Tempo aufnehmen zu können, insbesondere für Unterkünfte, aber auch
  für Munitionsdepots und Logistik für unsere neuen Waffensysteme, brauchen wir schnellere
  Prozesse. Diese schaffen wir. Ich bin dem Bundesumweltminister sehr, sehr dankbar
  für die exzellente Kooperation bei diesem Gesetz, das wir gemeinsam vorgelegt haben.
  Wir haben an den Stellen, an denen es schwerfiel, sich auf das eine oder andere
  einzulassen, Kompromisse geschaffen. Wir haben Fristen gesetzt, nach Ablauf derer
  bestimmte Regelungen, wenn sie nicht neu gefasst werden, auslaufen. All das ist
  extrem wichtig. Vielen Dank an der Stelle. Lieber Mark, wir tun alles dafür, dass
  die Bundeswehr ihre Einsatzbereitschaft als größter NATO -Partner in Europa stärkt,
  ganz im Sinne der Landes- und Bündnisverteidigung. Wir haben in den vergangenen
  Jahren – das will ich noch einmal deutlich unterstreichen – auch operativ deutlich
  mehr Verantwortung übernommen. Ich nenne nur die Brigade Litauen, das Air Policing
  ab Ende des Jahres von Ämari in Estland aus, das Deutsch-Niederländische Korps,
  das für Estland und Lettland Führungsverantwortung übernimmt und vieles andere mehr.
  Das alles ist gewissermaßen für den NATO -Gipfel in der kommenden Woche gut angelegt.
  Ich bin sehr froh, dass wir heute im Kabinett miteinander diesen Austausch hatten,
  auch über die Fragen der Vorsorge- und Sicherstellungsgesetze, aber gerade auch
  mit dem Generalsekretär. Deswegen war das Signal klar, und das bleibt es: Wir übernehmen
  mehr Verantwortung für unsere eigene konventionelle Abschreckung. Wir stärken die
  Resilienz der Gesellschaft und der Wirtschaft. Wir machen klar, dass unsere Streitkräfte
  ihren Auftrag am Ende nur so gut werden ausführen können, wie das Land dahinter
  funktioniert. (auf Deutsch) Herr Bundeskanzler, lieber Friedrich, Herr Bundesverteidigungsminister,
  lieber Boris, (auf Englisch) vielen Dank für dieses herzliche Willkommen. Es ist
  immer eine Freude, in Berlin zu sein. Dies ist meine Botschaft. Deutschland führt,
  und Deutschland liefert. Der NATO -Gipfel in Ankara ist einer, bei dem es vor allem
  um das Liefern gehen wird: erhöhte Verteidigungsausgaben, Rüstungsproduktion und
  starke Unterstützung für die Ukraine. Es war mir eine Ehre, heute an der Kabinettssitzung
  teilzunehmen. Das Kabinett ist der Motor einer Regierung, die bei den Verteidigungsausgaben
  sehr viel tut. Deutschland wird bis 2029 3,5 Prozent des BIP für Verteidigung ausgeben.
  Das ist wirklich eine große Errungenschaft. Es braucht dafür politischen Mut, Entschlossenheit
  und Überzeugung. Man muss schwierige Entscheidungen treffen. Aber es ist das Richtige
  in einer gefährlicheren Welt. Beim Gipfel in der nächsten Woche werden wir uns darauf
  konzentrieren, dieses Geld in einsatzbereite, kampfbereite Fähigkeiten umzusetzen
  und unsere Rüstungsindustrie signifikant auszubauen. Deutschland hat eine wichtige,
  große, starke Industrie mit herausragenden Forschungsinstitutionen. Die Botschaft
  der NATO an die Industrie ist ganz klar: Seid bereit, macht schneller, zusammen,
  mit neuen Produktionslinien, starken Lieferketten, liefert schnell, was wir brauchen!
  Denn Abschreckung wird genauso sehr in Fabriken gebaut wie von Streitkräften projiziert.
  Die NATO ist ein transatlantisches Bündnis und wird es bleiben, aber wir brauchen
  hier eine noch bessere Balance. Eine enge Zusammenarbeit mit den USA ist wichtig,
  aber die europäischen Bündnispartner und Kanada übernehmen jetzt Verantwortung für
  konventionelle Verteidigung in Europa. Deutschland leistet bereits starke Beiträge
  zu unserer gemeinsamen Sicherheit. Erst gestern hat das 1. Deutsch-Niederländische
  Corps die Rolle eines taktischen Hauptquartiers an der Ostflanke für Landstreitkräfte
  in Estland und Lettland übernommen. Dann gibt es die neue Panzerbrigade, die permanent
  in Litauen stationiert ist – sie hat ihre erste Kampfübung abgehalten –, deutsches
  Air Policing in der Ostsee für sicheren Luftraum, und die deutsche Marine spielt
  eine große, wichtige Rolle beim Schutz kritischer Infrastruktur in der Ostsee. Deutschland
  führt auch an bei der Unterstützung der Ukraine, ist der größte europäische Unterstützer
  der Ukraine für Freiheit und Souveränität. In Wiesbaden geht es um Ausbildung für
  die Ukraine, und Deutschland bringt auch die Partner im Rahmen der UDCG , der Ukraine-Kontaktgruppe,
  für eine wichtige Unterstützung der Ukraine zusammen. Nächste Woche beim Gipfel
  werden die Bündnispartner nachhaltige, planbare und langfristige Unterstützung für
  die Ukraine zusagen, und wir danken Deutschland für die Führung bei diesem Thema.
  Wir sind uns einig, dass der Druck auf Russland aufrechterhalten werden muss. Selbst
  nach dem Krieg in der Ukraine wird Russland eine langfristige Bedrohung für die
  euroatlantische Sicherheit bleiben. Die globale Sicherheitslage ist komplex und
  volatil. Schauen Sie sich an, wie Iran die Weltwirtschaft durch eine Blockade der
  Straße von Hormus erpresst. Ich begrüße die Zusagen der Bündnispartner im Bereich
  des Schutzes der freien Seewege. Herr Kanzler, Herr Bundesminister, Deutschland,
  Europa und Nordamerika waren zusammen in der NATO immer stärker. Durch Investitionen
  in Verteidigungsstärke, Industrie und Innovation werden wir uns zukunftsfest machen.
  Nur so können wir in dieser gefährlicheren Welt sicher bleiben. Wir sehen uns nächste
  Woche in Ankara. Ich freue mich. Vielen Dank! Frage: Herr Bundeskanzler, Herr Pistorius,
  ich hätte ganz gerne nach der deutsch-amerikanischen Rüstungszusammenarbeit gefragt.
  Es gibt Berichte darüber, dass die Bundesregierung mit der amerikanischen Regierung
  eng darüber spreche, welche amerikanischen Waffen jetzt in Lizenz hier in Deutschland
  produziert werden könnten. Aber ich frage mich: Steht es eigentlich in Übereinstimmung
  mit dem Ziel, dass sich die Europäer unabhängiger machen wollen, wenn wir jetzt
  anfangen, hier in Deutschland US -Waffen zu produzieren? Vielleicht können Sie den
  vermeintlichen Widerspruch aufklären. Ich habe eine kurze Zusatzfrage. Heute ist
  die Sitzung des Koalitionsausschusses. Rechnen Sie eigentlich noch mit einem großen
  Steuerpaket, das beschlossen werden kann? Bundesminister Pistorius: Ich fange gerne
  an. Das ist in der Tat nur ein vermeintlicher Widerspruch, denn niemand hat bei
  allem Anspruch auf mehr Unabhängigkeit jemals gesagt, dass wir auf amerikanische
  Systeme verzichten wollen. Das ist nicht der Fall, und das wird auch in Zukunft
  nicht der Fall sein. Wir arbeiten engstens mit der amerikanischen Rüstungsindustrie
  zusammen, und das wollen wir fortsetzen. Es gibt eben Systeme, die wir noch nicht
  haben oder die wir nicht haben. Die brauchen wir in den nächsten fünf bis zehn Jahren
  aber dringend. Gleichzeitig wissen wir, dass die Produktionskapazitäten der Amerikaner
  auch beschränkt sind und dringend eine Ausweitung derselben gefordert ist. Deswegen
  sind wir sehr daran interessiert, bestimmte Systeme oder Teile von Systemen eben
  auch in Deutschland zu bauen. Wir haben ein Beispiel mit dem Rumpf der F‑35, und
  es gibt andere, an denen wir arbeiten wollen und können. Von daher ist die Antwort:
  Das eine schließt das andere nicht aus. Es geht darum, mehr Unabhängigkeit zu gewährleisten,
  ohne gleichzeitig auf die enge Kooperation mit den Amerikanern zu verzichten. Bundeskanzler
  Merz: Ich kann das, was der Bundesverteidigungsminister sagt, nur bestätigen. Wir
  haben ja bereits Kooperationsvereinbarungen mit den Vereinigten Staaten von Amerika
  geschlossen. Es gibt eine intensive rüstungstechnologische Zusammenarbeit, und die
  liegt in unserem gegenseitigen Interesse. Natürlich wollen wir uns auch weiter unabhängig
  machen. Aber wir wollen diese Kooperation mit den Amerikanern immer da suchen, wo
  sie in unserem eigenen Interesse liegt. Umgekehrt suchen die Amerikaner die Zusammenarbeit
  mit uns, und dieses Angebot nehmen wir natürlich an. Was die Sitzung des Koalitionsausschusses
  heute Nachmittag betrifft: Wir werden heute einige Zeit brauchen, um über die Themen
  zu sprechen, die wir gemeinsam für notwendig und für richtig halten. Es geht jetzt
  vor allem darum, die Wettbewerbsfähigkeit unserer Wirtschaft wieder zu stärken.
  Wir müssen die Rahmenbedingungen verbessern. Dafür wird es Vorschläge zum Rückbau
  der Bürokratie geben. Es wird weitere Vorschläge zur Modernisierung unseres Staatswesens,
  zur Digitalisierung geben, und wir werden auch über das Thema der Steuern und des
  Arbeitsmarktes sprechen. Das Ganze ist ein Prozess. Der ist gut vorbereitet, aber
  noch nicht abgeschlossen. Frage: Sie haben über den NATO -Gipfel gesprochen. Was
  haben Sie im Gepäck, um den europäischen Pfeiler der NATO weiter zu stärken? Zum
  Umgang mit der immer neuen Kritik von Herrn Trump: Wollen Sie eher diplomatisch
  darauf reagieren, wie der Herr Generalsekretär, oder klare Kante zeigen, wie Frau
  Meloni es in den letzten Tagen gemacht hat? Herr Bundeskanzler, wovon hängt denn
  ab, ob heute Abend und morgen ein großer Wurf gelingt, und was steht dem aktuell
  noch entgegen? Bundeskanzler Merz: Sie werden mir nachsehen, dass ich jetzt keine
  Details der Vorbesprechungen, die andauern, nenne. Wir werden heute Nachmittag eine
  ganze Reihe von Vorschlägen diskutieren, das heute Abend, hoffe ich, nicht zu spät
  abschließen und sie dann morgen auch der Presse vorstellen. Meine Erwartung ist,
  dass wir in der Modernisierung unseres Landes wirklich einen großen Sprung nach
  vorn machen, dass wir auch das Thema der Wettbewerbsfähigkeit prioritär im Blick
  haben und dass wir alles tun, damit private Haushalte konsumieren können, aber auch
  die Industrie investieren kann. Das ist sozusagen der Rahmen, in dem wir uns bewegen,
  und ich bin zuversichtlich, dass wir das auch gut hinbekommen. Das wird übrigens
  nicht die letzte Sitzung des Koalitionsausschusses sein. Wir werden auch im Laufe
  der Wahlperiode immer wieder weitere Entscheidungen zu treffen haben. Ich habe das
  immer wieder gesagt: Es gibt nicht den einen großen Big Bang. Den wird es heute
  nicht geben, den wird es morgen nicht geben. Wir sind in einem Prozess. Wir beschleunigen
  diesen Prozess, aber wir werden heute dazu auch die Vorschläge noch einmal abschließend
  diskutieren, die wir dann morgen gemeinsam vorstellen werden. Zum NATO -Gipfel:
  Da ist kein Widerspruch. Wir nehmen die europäischen Interessen gemeinsam wahr.
  Deswegen war ja auch unter anderem Giorgia Meloni letzte Woche hier. Ich will einmal
  ein Wort aufgreifen, das Boris Pistorius eben auch in unserer Kabinettssitzung gesagt
  hat: Die NATO muss europäischer werden, damit sie transatlantisch bleiben kann.
  Ich finde, das ist eine sehr gute Formulierung. Wir haben in den letzten Jahren
  zu wenig für unsere eigene Sicherheit getan. Das holen wir jetzt nach. Wir machen
  das aber nicht, um einem numerischen Ziel zu entsprechen, das der amerikanische
  Präsident gesetzt hat, sondern wir tun es in unserem eigenen Interesse. Wir tun
  es, weil wir es für richtig und für notwendig halten, und wir begegnen der amerikanischen
  Regierung auf Augenhöhe. Amerika ist einer von 32 NATO -Partnern. Wir sind einer
  von 32 NATO -Partnern. Aber wir sind auf der europäischen Seite der NATO gut abgestimmt,
  im Übrigen auch mit Kanada. Wir gehen jetzt also durchaus selbstbewusst in die nächste
  Woche und sagen den Amerikanern: Ihr seid abhängig von uns. Wir sind abhängig von
  euch. Wir zusammen sind verteidigungsfähig. Frage: Ich habe eine Frage an den Minister.
  Mit dem neuen Wehrdienst und dem Ausbau der Reserve verlässt die Bundesregierung,
  verlässt Deutschland, wenn man so will, ja jetzt langsam, aber sicher das Paradigma
  der Freiwilligkeit. Der Ausbau des Reservestärkungsgesetzes ist ja eigentlich viel
  mehr als ein Verwaltungsgesetz, nämlich ein Baustein der Zeitenwende. Könnten Sie
  sozusagen, wenn man so will, diese Metaebene noch einmal erklären und schildern,
  wie optimistisch Sie sind bzw. was Sie erwarten, inwieweit die deutsche Gesellschaft
  das annehmen wird, eben auch diese Verpflichtungen, die dann konkret mit der Reserve
  einhergehen? Bundesminister Pistorius: Ja, das will ich gerne tun. Ich habe ein
  sehr positives Bild von dem, wie die Gesellschaft auf diese Maßnahmen reagiert.
  Wir sehen beim neuen Wehrdienst, dass die Bewerbungs- und die Einstellungszahlen
  steigen. Übrigens noch einmal zur Information: Die Fragebögen, die an gerade 18 Jahre
  alt Gewordene verschickt werden, dienen nicht in erster Linie der Werbung für den
  neuen Wehrdienst, sondern der Wehrerfassung und der Zuführung zur dann folgenden
  Musterung. Das ist noch einmal wichtig, weil ein 18-Jähriger heute im Zweifel noch
  in der Schule oder in der Ausbildung ist und nicht, sobald er den Brief erhält,
  „Ich bewerbe mich jetzt bei der Bundeswehr“ sagen wird, sondern dann ist es unsere
  Aufgabe, den Kontakt zu erhalten und ihn dann zur gegebenen Zeit für die Bundeswehr
  zu gewinnen. Trotzdem haben wir mehr als 500 18-Jährige gewonnen, die sagen, dass
  sie wollen; das dazu. Zur Reserve: Allen, die sich mit der Materie beschäftigen,
  ist das klar. Wir sagen ja allen, die künftig zu uns kommen werden: Für euch trifft
  das zu, für die anderen nicht. Das heißt, das ist die Voraussetzung dafür. Es gibt
  keine Anzeichen dafür, dass das eben irgendjemanden davon abhält; denn wer sich
  entscheidet, zur Truppe zu kommen, egal für wie lange und in welcher Laufbahn, weiß,
  dass eine Bundeswehr, dass Streitkräfte in diesen Zeiten nicht funktionieren ohne
  regelmäßige Reserveübungen, ohne eine aktive und starke Reserve. Deswegen mache
  ich mir darüber eigentlich gar keine Gedanken. Ich bin sehr sicher, dass das sehr
  wohlwollend aufgenommen wird und auch klar als konsequent betrachtet wird. Frage:
  ( auf Englisch ) Herr Kanzler, Minister, Herr Generalsekretär, im Hinblick auf die
  Rhetorik aus den USA , aus dem Weißen Haus – NATO 3.0, Einstellung der Finanzierung –,
  frage ich: Sind die Europäer jetzt alleine in der Verteidigung der Ukraine? Generalsekretär
  Rutte: ( auf Englisch ) Na ja, was die Verteidigung der Ukraine angeht, sind die
  USA immer noch unerlässlich, und es gibt weiterhin Flüsse von wichtigen Unterstützungsmitteln
  aus den USA in die Ukraine. Die werden von den Kanadiern, von Europäern bezahlt,
  und ich denke, das ist nur fair. Es geht also zum Beispiel um Abfangkörper für Patriot-Systeme,
  die kritische Infrastruktur in der Ukraine schützen. Nur die USA können diese Dinge
  herstellen. Aber ja, Europa leistet riesige Unterstützung mit Geld, mit Rüstungsmitteln.
  Schauen Sie sich an, was Deutschland bilateral macht, aber auch die tschechische
  Munitionsinitiative und andere Initiativen sowie Investitionen in die Rüstungsindustrie
  in der Ukraine. Das ist Europa, aber es braucht eben auch die USA . Bundeskanzler
  Merz: ( auf Englisch ) Ich habe auch noch eine kurze Anmerkung dazu. Wir hatten
  dazu beim G7 -Treffen eine intensive Diskussion, und Sie können sich unser Statement
  zu diesem Thema anschauen. Es war sehr, sehr klar. Der US -Präsident war dort. Er
  hat das Dokument unterzeichnet. Das ist die klare Position aller G7 -Länder, und
  darauf können wir uns verlassen, und zwar auch beim NATO -Gipfel in der nächsten
  Woche. Frage: Herr Bundeskanzler, Herr Pistorius, ich habe jeweils eine Frage an
  Sie. Sie haben alle vom Iran gesprochen. Dass das Thema beim NATO -Gipfel wird,
  ist ja eigentlich untypisch. In dem 14-Punkte-Plan von Herrn Trump wird von 300 Milliarden
  Dollar gesprochen, was den Wiederaufbau für den Iran angeht, und davon, dass das
  auch von den Partnern mitgetragen werde. Ist das ein Commitment , das auch Deutschland
  eingehen würde? Herr Pistorius, was passiert denn jetzt eigentlich mit der „Fulda“
  und dem Tender „Mosel“, die da vor Dschibuti liegen? Kommen die jetzt wieder zurück,
  oder warten wir bis nach dem Sommer? Bundeskanzler Merz: Ich kann nur zunächst für
  die Bundesregierung sagen: Wir hoffen jetzt auf ein Ende der Kampfhandlungen und
  auf den Abschluss eines Vertrages, auch jenseits dieses MoU, das vorliegt. Wir haben
  immer gesagt: Wir sind bereit, mitzuhelfen und auch militärisch abzusichern, dass
  die Straße von Hormus frei bleibt. Sobald es um den Wiederaufbau der zerstörten
  Infrastruktur in der Region geht, kann man über alles reden, aber zunächst einmal
  müssen die Kampfhandlungen aufhören. Dann werden wir sicherlich auch unseren Beitrag
  dazu leisten, aus eigenem ökonomischem Interesse vor allen Dingen die Energieinfrastruktur
  in der Region so wiederherzustellen, dass wir auch eine sichere Versorgung in Europa
  und in Deutschland haben. Bundesminister Pistorius: Sie wissen, dass unsere beiden
  Schiffe in Dschibuti liegen. Sie werden gewartet und warten, wie ich immer sage,
  aber sie werden nicht unendlich warten. Im Augenblick gibt es kein Szenario dafür,
  das ich in den nächsten Tagen oder Wochen sehe, dass der Korken schnell aus der
  Flasche kommt und wir in die Straße von Hormus einfahren könnten, um Minen zu räumen.
  Das ist im Augenblick nicht absehbar. Der Iran hat gestern Frankreich eine klare
  Absage erteilt und gesagt, was er von einer unautorisierten, ohne Einladung stattfindenden
  Minenräumung durch wen auch immer halten würde. Von daher ist das überhaupt nicht
  in Sicht. Das führt logischerweise dazu, dass wir unsere beiden Schiffe nicht bis
  in den Herbst dort liegen lassen werden, in der Erwartung, dass irgendwann einmal
  etwas passiert. Wir werden dann im Sommer rechtzeitig die Entscheidung treffen,
  dass unsere Soldaten ihren Sommer im Zweifel eher bei 40 Grad in Berlin statt bei
  knapp 50 Grad in Dschibuti verbringen.'
