title: Im Kabinett beschlossen Vermittlung in Arbeit stärken
text: 'Jobsuche und Formulare per App: Die Arbeitsvermittlung soll digitaler und damit
  moderner werden. Das Kabinett hat den Gesetzentwurf zur Modernisierung und Digitalisierung
  der Arbeitsförderung beschlossen. Mit dem Gesetz will die Bundesregierung die Bundesagentur
  für Arbeit (BA) moderner aufstellen. Ziel ist es, den Austausch zwischen Bürgerinnen
  und Bürgern, Unternehmen und Agenturen zu vereinfachen und die Vermittlung in Arbeit
  zu stärken. Nach dem Prinzip „ digital first “ sollen Anträge künftig vorrangig
  digital über die Online -Formulare der Bundesagentur für Arbeit gestellt werden.
  Bereits viel genutzt wird die digitale Antragstellung auf Arbeitslosengeld. Künftig
  soll auch die Arbeitslosmeldung vorrangig digital erfolgen. Sie wird dafür vereinfacht
  und nutzerfreundlicher gestaltet. Für Unternehmen verpflichtend wird die elektronische
  Antragstellung beim Kurzarbeitergeld. Beratungsgespräche sollen künftig, sofern
  ein persönliches Gespräch nicht erforderlich ist, per Video- Call geführt werden
  können. Dies ermöglicht ein breiteres Terminangebot, insbesondere für Arbeitsuchende,
  die sich noch in einem Beschäftigungsverhältnis befinden. Die Zunahme digitaler
  Kommunikation in der gesamten Gesellschaft ermöglicht auch eine Modernisierung des
  Erreichbarkeitsrechts, ohne dass die Mitwirkungspflichten der arbeitslosen Personen
  verringert werden: Für die Erreichbarkeit ist es künftig nicht mehr erforderlich,
  werktäglich persönlich seinen Postbriefkasten auf Mitteilungen und Vorschläge der
  Agentur für Arbeit zu prüfen. Mit dem Gesetz will die Bundesregierung den Bürokratieabbau
  und die Modernisierung der Verwaltung in Deutschland weiter voranbringen. Der Entwurf
  ist Teil des Entlastungskabinetts , das viele weitere Maßnahmen zum Bürokratieabbau
  enthält. Mit dem Gesetz sollen zudem neue Impulse für die Kernaufgabe de r Bundesagentur
  für Arbeit gesetzt werden: die Vermittlung in Arbeit und auch in Weiterbildung .
  Ziel ist, im Idealfall Arbeitslosigkeit zu verhindern, bevor sie eintritt. So soll
  das Instrument der Beschäftigungse rprobung eingeführt werden. Das bietet neue Möglichkeiten
  für nahtlose Übergänge zwischen zwei Beschäftigungen – von Job zu Job. Außerdem
  wird die berufliche Weiterbildung gestärkt, beim Weiterbildungsgeld sind Verbesserungen
  vorgesehen. Bundesarbeitsministerin Bärbel Bas erklärte zu dem Kabinettsbeschluss:
  Wenn Unternehmen Arbeitsplätze abbauen müssten, käme es darauf an, dass die Fachkräfte
  schnell und unkompliziert in Branchen wechseln, in denen sie gebraucht werden. „Ein
  nahtloser Übergang verhindert Arbeitslosigkeit für die Beschäftigten und ihre Familien
  und fördert Wirtschaftswachstum.“ Um Unternehmen zu entlasten, soll zudem der Arbeitsschutz
  digitalisiert und modernisiert werden. Für Gründerinnen und Gründer werden mit der
  Fristverlängerung beim Zugang zur freiwilligen Arbeitslosenversicherung für Selbstständige
  positive Impulse gesetzt. Außerdem sieht der Gesetzentwurf vor, die Arbeitsabläufe
  innerhalb der Bundesagentur für Arbeit konsequent zu digitalisieren, um so dem drohenden
  Personalengpass der Agentur selbst entgegenzuwirken. Die Bundesagentur für Arbeit
  hat in den vergangenen Jahren bereits große Schritte bei der Digitalisierung unternommen.
  So ist es aktuell unter anderem möglich, sich online arbeitsuchend und arbeitslos
  zu melden. Unternehmen können online Förderleistungen oder Kurzarbeitergeld beantragen.
  Informationen und Formulare rund um Arbeitsuchend-, Arbeitslos-Meldung und zum Arbeitslosengeld
  finden Sie bei der Bundesagentur für Arbeit .'
