title: Im Bundestag beschlossen Kindergeld künftig ohne Antrag
text: 'Das Kabinett hat das antragslose Kindergeld beschlossen. Das Gesetz ist Teil
  der föderalen Modernisierungsagenda. Eine konkrete Entlastung für Familien: Das
  Kindergeld – eine der wichtigsten Geldleistungen für Familien – soll ab Frühjahr
  2027 ohne Antrag ausgezahlt werden. „Wir wollen einen modernen Staat, der für die
  Menschen da ist“, betonte Bundesfinanzminister Lars Klingbeil bei der Vorstellung
  des Gesetzentwurfs in Berlin. Ziel sei es, Eltern durch Bürokratierückbau gerade
  in der Zeit nach der Geburt zu entlasten. „Dann können Eltern nach der Geburt voll
  und ganz für ihr Baby da sein, statt sich mit unnötigem Papierkram herumzuschlagen“,
  so Klingbeil. Das Vorhaben ist Teil der föderalen Modernisierungsagenda, mit der
  Bund und Länder den Bürokratierückbau weiter vorantreiben. Das Kabinett hat den
  Gesetzesentwurf am 18. März auf den Weg gebracht. Der Bundestag hat das antraglose
  Kindergeld am 9. Juli beschlossen. Die Umstellung auf das antragslose Kindergeld
  soll nächstes Jahr in zwei Stufen erfolgen. Die erste Stufe: Ab Frühjahr 2027 soll
  die Neuerung zunächst für Familien gelten, die bereits Kinder haben und Kindergeld
  beziehen. Grund dafür ist, dass die relevanten Daten der Familienkasse schon vorliegen.
  Die zweite Stufe: Ende 2027 soll dann auch für erste Kinder das Kindergeld antragslos
  ausgezahlt werden. Voraussetzungen dafür sind aber, dass Die Bekämpfung von Kindergeld-Missbrauch
  ist für die Bundesregierung wichtig. Deshalb gilt: Das antragslose Kindergeld wird
  die Regel, sie ersetzt aber nicht die Prüfung des Kindergeldanspruches durch die
  Familienkasse. Bei unvollständiger Datenlage oder Zweifel am Kindergeldanspruch
  bleibt es bei der bisherigen Praxis. Das antragslose Kindergeld soll die bisherige
  Antragsstellung – nicht die Prüfung des Kindergeldanspruches – ersetzen. Das heißt:
  Statt über einem Antrag soll die Familienkasse die relevanten Informationen künftig
  über den Datenaustausch der Verwaltung erhalten. Diese Methode nennt sich Once-Only
  -Prinzip. Das Once-Only -Prinzip besagt, dass Bürger und Unternehmen Daten oder
  Nachweise nur ein einziges Mal bei einer Behörde einreichen müssen. Diese Daten
  werden datenschutz- und datensicherheitskonform sicher zwischen Behörden ausgetauscht,
  wodurch erneute Angaben entfallen. Es ist ein Kernkonzept der Digitalisierung, das
  Bürokratie abbaut, Zeit spart und Prozesse in der Verwaltung beschleunigt. So vergibt
  zum Beispiel das Bundeszentralamt für Steuern für jedes neugeborene Kind eine Steuer-
  ID . Die Informationen über die Geburt des Kindes werden vom Standesamt geteilt.
  Diese werden dann an die Familienkasse per Datenaustausch automatisch übermittelt.
  Das antragslose Kindergeld ist ein wichtiges Projekt der föderalen Modernisierungsagenda
  , mit der Bund und Länder den Bürokratierückbau weiter vorantreiben. Die Agenda
  umfasst insgesamt mehr als 200 Maßnahmen. Bürgerinnen und Bürger sollen neben dem
  antraglosen Kindergeld künftig unter anderem auch von vorausgefüllten und automatisierten
  Steuererklärungen profitieren. Daran arbeiten Bund und Länder gemeinsam. Weitere
  Informationen zum antragslosen Kindergeld lesen Sie beim Bundesfinanzministerium.'
