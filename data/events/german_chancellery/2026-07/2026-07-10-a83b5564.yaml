title: Im Bundesrat beschlossen Innovationen durch KI fördern
text: 'Der Wirtschaftsstandort Deutschland soll mehr vom Einsatz von KI profitieren
  können. Die Bundesregierung will dafür sorgen, dass der Standort Deutschland die
  Chancen Künstlicher Intelligenz voll ausschöpfen kann. Das Kabinett hat am 11. Februar
  den Gesetzentwurf zur Durchführung der europäischen KI -Verordnung beschlossen.
  Diesen hatte der Bundesminister für Digitales und Staatsmodernisierung, Karsten
  Wildberger, vorgelegt. Am Donnerstag 11. Juni hat der Bundestag den Gesetzentwurf
  mit leichten Änderungen beschlossen. Der Bundesrat hat am 10. Juli zugestimmt. Das
  Gesetz kann nun ausgefertigt und verkündet werden. Es tritt am Tag nach der Verkündung
  in Kraft. Die KI -Verordnung vom Juni 2024 schafft einen unionsweit geltenden Rechtsrahmen
  für die Entwicklung, Bereitstellung und Nutzung von KI -Systemen. Sie soll Innovation
  fördern, Grundrechte schützen und Vertrauen in KI stärken. Zur Umsetzung der KI
  -Verordnung muss jeder Mitgliedsstaat der Europäischen Union die national zuständigen
  Behörden festlegen. Mit dem beschlossenen Gesetzentwurf stellt die Bundesregierung
  sicher, dass die nationale Umsetzung der EU -Vorgaben innovationsfreundlich und
  bürokratiearm erfolgt. Der Gesetzentwurf legt fest, welche nationalen Behörden des
  Bundes und der Länder für die Marktüberwachung und Notifizierung von KI -Systemen
  zuständig sind. Er regelt deren Zusammenarbeit und schafft klare Ansprechpartner
  für Unternehmen. Dabei wird auf bestehende Strukturen und behördliche Expertise
  zurückgegriffen, um Doppelarbeit zu vermeiden und bewährte Fachkompetenz zu nutzen.
  Kernelement des Entwurfs ist die zentrale Rolle der Bundesnetzagentur, die im Wesentlichen
  als Marktüberwachungsbehörde für die Einhaltung der KI -Verordnung zuständig ist
  . Dort entsteht ein Koordinierungs- und Kompetenzzentrum . Dieses bündelt KI -Expertise
  zentral, stellt sie anderen Behörden zur Verfügung und bietet Informationen für
  Unternehmen. Die Bundesnetzagentur wird auch Aufgaben bei der Innovationsförderung
  erhalten: Insbesondere soll sie mindestens ein KI -Reallabor einrichten, um dort
  innovative KI -Systeme testen zu können.'
