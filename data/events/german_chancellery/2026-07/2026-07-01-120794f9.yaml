date: '2026-07-01'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 1. Juli 2026
text: 'stellvertretender Regierungssprecher Hille (Vorsitzende Buschow eröffnet die
  Pressekonferenz und begrüßt SRS Hille sowie die Sprecherinnen und Sprecher der Ministerien.)
  Heute hat das Kabinett , wie mittwochs üblich, getagt, aber ausnahmsweise nicht
  im Bundeskanzleramt, sondern, das jetzt schon zum zweiten Mal, im Bundesverteidigungsministerium.
  Der Bundeskanzler hat damit, wenn man so will, eine Tradition aus der Bonner Republik
  wiederbelebt. Das Bundeskabinett tagt jetzt einmal im Jahr im Bundesverteidigungsministerium
  mit dem klaren Schwerpunkt ‑ das erschließt sich aus dem Tagungsort ‑ Sicherheit
  und Verteidigung. Ziel ist es, damit deutlich zu machen, welch große Bedeutung dieses
  Thema hat und dass dies ein Thema ist ‑ Sicherheit im umfassenden Sinne ‑, das nicht
  nur einzelne Ressorts, sondern die ganze Bundesregierung betrifft, um nicht zu sagen:
  ein „whole-of-government approach“. So verstehen wir Sicherheit. Das hat heute im
  Austausch auch mit dem NATO-Generalsekretär Mark Rutte stattgefunden. In der nächsten
  Woche ‑ Sie wissen das ‑ findet der NATO-Gipfel in Ankara statt. Dazu gab es schon
  diverse Vorbereitungstreffen. Auch diese Sitzung diente noch einmal dazu, im Zulauf
  auf den NATO-Gipfel miteinander die wichtigsten Herausforderungen zu besprechen.
  Sie alle wissen, in welchem Prozess sich die NATO befindet. Europa übernimmt deutlich
  mehr Verantwortung. Darum wird es beim NATO-Gipfel in der kommenden Woche schwerpunktmäßig
  gehen. Darüber hat das Kabinett heute einen sehr konstruktiven, intensiven Austausch
  mit dem NATO-Generalsekretär geführt. Darüber hinaus haben wir natürlich auch, wie
  üblich, Beschlüsse gefasst. Auch sie fallen heute vollumfänglich in den Bereich
  Sicherheit und Verteidigung. Verabschiedet hat das Bundeskabinett den Entwurf eines
  Reservestärkungsgesetzes und eines Bundeswehr-Infrastrukturbeschleunigungsgesetzes.
  Die veränderte Bedrohungslage in Europa und die daraus resultierenden sicherheitspolitischen
  Anforderungen an die Verteidigungsfähigkeit der Bundeswehr und unsere Abschreckung
  im Bündnis machen diese Gesetze erforderlich. Erstens gibt es das Reservestärkungsgesetz
  . Damit werden rechtliche Rahmenbedingungen geschaffen, damit Reservistinnen und
  Reservisten regelmäßig und verlässlich in den Streitkräften üben können. Hierfür
  ist neben der freiwilligen auch die Möglichkeit einer verpflichtenden Heranziehung
  vorgesehen. Das ist damit sozusagen eine Abkehr von der doppelten Freiwilligkeit,
  wie sie bisher gilt. Gleichzeitig sollen die Attraktivität des Reservistendienstes
  weiter gesteigert und Bürokratie in diesem Bereich abgebaut werden. Es werden Regelungen
  modernisiert, um die Reserve schneller und wirksamer in die Landes- und Bündnisverteidigung
  einbinden zu können. Details kann Ihnen im Anschluss gern der Kollege Müller auseinanderlegen,
  sofern daran Interesse besteht. Das Zweite ist das Bundeswehr-Infrastrukturbeschleunigungsgesetz
  . Damit wird die gesetzliche Grundlage geschaffen, um den zügigen Ausbau, die Modernisierung
  und die Neuerrichtung militärischer Infrastruktur sicherzustellen. Für die beschleunigte
  Planung und Umsetzung von Bauvorhaben der Bundeswehr wurden unter anderem Ausnahmen
  im Umwelt- und Naturschutzrecht sowie eine Stärkung der Eigenvollzugskompetenzen
  der Bundeswehr vorgesehen. Auch der dritte Beschluss, den das Kabinett getroffen
  hat, fällt in den Bereich der Verteidigung, in die Kategorie der Gesamtverteidigung,
  wenn man so will. Die Bundesregierung hat die gemeinsam vom Bundesminister des Innern
  und vom Bundesminister der Verteidigung vorgelegten Eckpunkte zur Novellierung der
  Sicherstellungs- und Vorsorgegesetzebeschlossen . Damit reagieren wir sowohl auf
  die veränderte Bedrohungslage in Deutschland und Europa als auch auf neue technologische
  Entwicklungen. Der Gesamtverteidigung kommt eine neue Bedeutung zu. Sie ist nur
  gesamtstaatlich und gesamtgesellschaftlich leistbar. Zivile und militärische Verteidigung
  greifen ineinander und müssen koordiniert geplant und umgesetzt werden. Dabei müssen
  alle staatlichen Stellen in Bund und Ländern, alle Verwaltungsebenen bis zu den
  Kommunen und die Wirtschaft sowie zivilgesellschaftliche Organisationen bereits
  im Frieden zusammenwirken, damit es dann im Ernstfall auch funktioniert. Ziel der
  Eckpunkte ist es, einen Orientierungsrahmen für die Evaluierung der Sicherstellungs-
  und Vorsorgegesetze zu geben. Diese Gesetze schaffen eine wichtige Grundlage, um
  die Verzahnung der militärischen und der zivilen Seite sowie die Handlungsfähigkeit
  von Bund, Ländern und Kommunen in Krisenlagen aller Art zu stärken. Sie sind maßgeblich,
  um sowohl die Versorgung der Zivilbevölkerung als auch der eigenen und verbündeten
  Streitkräfte in maßgeblichen Krisenlagen bis hin zum Verteidigungsfall sicherzustellen.
  Die bisherigen Regelungen reflektieren nicht mehr vollumfänglich die aktuellen Bedrohungsszenarien
  sowie die technologischen Entwicklungen und bedürfen deshalb einer Evaluation und
  Anpassung. Wie gesagt, hat das Kabinett dazu heute Eckpunkte beschlossen. So weit
  war es das mit dem kurzen Einblick in die Sitzung im BMVg und die Beschlüsse des
  Bundeskabinetts. Herr Hille, bei der Sitzung des Kabinetts im BMVg im vergangenen
  Jahr wurden auch Beschlüsse gefasst, die kurz danach hinfällig waren, weil sich
  die Koalitionspartner nicht einig waren. Ist in diesem Fall sichergestellt, dass
  das nicht wieder passiert? Zum Reservestärkungsgesetz habe ich eine Frage an Herrn
  Müller. Der Abschied von der Freiwilligkeit ist auch von der Wirtschaft beklagt
  worden, aktuell von verschiedenen Wirtschaftsverbänden. Es gibt aber auch den juristischen
  Einwand: Ausscheidende Zeitsoldaten werden ja für sechs Jahre grundbeordert. Die
  jetzt vorgesehene Dienstpflicht gilt aber weit darüber hinaus bis zum Erreichen
  der Altersgrenze. ‑ Ist das eine Wehrpflicht durch die Hintertür, und ist das in
  Rechtsförmlichkeit mit dem BMJV so abgestimmt? Vielleicht mag sich das BMJV auch
  dazu äußern. Ich weiß, ehrlich gesagt, nicht genau, auf was Sie Bezug nehmen. (zur
  Kabinettssitzung ) Ich helfe Ihnen gern: das Gesetz zum neuen Wehrdienst, das in
  der Kabinettssitzung im Bundesministerium der Verteidigung im August vergangenen
  Jahres beschlossen und kurz danach von einem Koalitionspartner infrage gestellt
  wurde. Gut. Ich würde Ihre Prämisse und Deutung dennoch nicht so ganz teilen, weil
  wir ‑ Sie wissen das wahrscheinlich besser als jeder andere ‑ mittlerweile einen
  neuen Wehrdienst beschlossen und eingeführt haben. Deshalb bin ich auch nicht nur
  guter Dinge, sondern der Überzeugung, dass das, was die Bundesregierung und das
  Kabinett heute auf den Weg gebracht haben, ein Beschluss aller an der Bundesregierung
  beteiligten Parteien ist und von daher auch volle Gültigkeit entfalten wird. (zum
  Entwurf eines Gesetzes zur Stärkung der Reserve ) Zum ersten Teil Ihrer Frage, zum
  Feedback der Arbeitgeber: Wir haben in den letzten Wochen eine umfassende Beteiligung
  der Arbeitgeber durchgeführt. Bevor es zum Kabinettsbeschluss kommt, erfolgt immer
  eine Verbandsbeteiligung. Wir haben dort sowohl konstruktive Kritik als auch sehr
  positive Stimmen mitbekommen. Im Gesetz wurden auch Vorkehrungen geschaffen, sodass
  die Nachteile, die gegebenenfalls entstehen können, aufgefangen werden. Hierbei
  gibt es höhere Ersatzzahlungen. Wenn Arbeitskraft nachweisbar wirklich fehlt, dann
  gibt es finanzielle Möglichkeiten. Die Arbeitgeber werden doppelt so lange vorher
  informiert und beteiligt. Sie sollen angehört werden. Natürlich haben sie auch den
  inhaltlichen Vorteil. Der Soldat und die Soldatin, die in die Truppe gehen, tauschen
  sich aus, lernen neue Technik und lernen gegebenenfalls neue IT kennen. Sie haben
  einen ständigen Erfahrungsaustausch und eine Horizonterweiterung. Da kann man sicherlich
  auch von einer Reifung reden. Das wird am Ende auch dem Arbeitgeber und dem Betrieb
  zugutekommen. ‑ Das vielleicht zur ersten Frage. Deswegen teile ich diese Prämisse
  nicht, dass das im Grunde nachteilig wäre, sondern wir erleben dabei eine gute Diskussion
  und auch die Anerkennung dieser Vorteile für die Arbeitgeber. Und nein, das ist
  natürlich keine Wehrpflicht durch die Hintertür. Wir haben heute gegen 12 Uhr eine
  Presseinformation verschickt. Sie haben das vielleicht mitbekommen. Sie stellt auf
  knapp drei Seiten sehr ausführlich dar, warum wir das brauchen, warum wir diese
  Abschaffung der doppelten Freiwilligkeit benötigen. Es bringt uns nichts, wenn der
  gut ausgebildete Soldat bzw. die gut ausgebildete Soldatin nach vier, sechs oder
  acht Jahren vielleicht benötigt wird und das System nicht bedienen kann oder zum
  Beispiel das Sturmgewehr, das wir jetzt neu einführen, noch nie in der Hand hatte
  oder wenn sie noch nie in neuen Waffensystemen und Großwaffensystemen, die wir einführen,
  gesessen haben oder sie noch nie gesehen haben. Deswegen ist es sinnvoll, wenn wir,
  wie es der Minister heute gesagt hat, am Ball bleiben. Die Reservistinnen und Reservisten
  bleiben am Ball und üben regelmäßig. Das ist ja alles in einem überschaubaren Rahmen.
  Wir reden hier teilweise von drei Wochen und teilweise von ein paar mehr Wochen
  pro Jahr maximal. Wir werden hier auch mit Augenmaß herangehen, weil am Anfang die
  Kapazitäten auch erst anwachsen müssen. Wir werden vor allen Dingen auch in den
  Folgejahren natürlich sehr intensiv die persönlichen Belange berücksichtigen. Ich
  hatte auch das BMJV gefragt. Es geht mir nicht um die Sinnhaftigkeit. Das war nicht
  die Frage. Es geht mir um die Rechtsförmlichkeit, dass jemand, der als Zeitsoldat
  ausscheidet, juristisch gesehen, wusste, dass er sich auf maximal sechs Jahre für
  die Grundbeorderung verpflichtet. Aber jetzt geht es deutlich darüber hinaus. Das
  ist eine andere rechtliche Situation. Gesetze werden vom BMJV immer auf Rechtsförmlichkeit
  geprüft. Ist das in diesem Fall erfolgt, und hatten Sie keine Einwände? Ich habe
  hier für das BMJV nichts hinzuzufügen. Wenn jetzt etwas rechtlich anders ist, heißt
  das nicht, dass wir dazu etwas sagen können. Meine Frage war, ob Sie das auf Rechtförmlichkeit
  geprüft haben. Dann ist die Antwort: „Ich habe dem nichts hinzuzufügen“ nicht besonders
  hilfreich. Das BMJV wurde hieran in den üblichen Arten und Weisen beteiligt. Aber
  das ist ein regierungsinterner Vorgang. Deswegen kann ich mich dazu nicht weiter
  äußern. Genau. Das möchte ich auch unterstreichen. Natürlich geht ein Gesetz im
  Entwurf, bevor es überhaupt in die Kabinettsbefassung geht, umfassend in die Ressortbeteiligung.
  Das erfolgte natürlich auch dieses Mal. Die von Ihnen angesprochenen sechs Jahre
  Grundbeorderung sind ja ein System, das wir erst seit ein paar Jahren haben. Das
  ist noch nicht unbedingt ein Alt- bzw. Legacy-Verfahren. Ja, natürlich bauen wir
  jetzt für die Zeitsoldaten und Berufssoldaten teilweise bis zum 65. Lebensjahr,
  teilweise noch länger, bis zum 68. Lebensjahr, wenn es gewünscht ist, wenn der Einzelfall
  es erfordert und auch, wenn es gewollt ist, die Möglichkeit aus, eine sogenannte
  Wehrübung ‑ heute reden wir von Reservedienstleistungen ‑ durchzuführen. Aber die
  Notwendigkeiten bestimmen das. Die Prüfung war erfolgt. Es gehört auch zu den nachwirkenden
  Pflichten, wenn man in der Truppe gedient, diese Ausbildung genossen und sich damals
  dazu verpflichtet hat, diesen Dienst zu leisten. Ich möchte noch einmal betonen:
  Alle, die früher mussten, wie zum Beispiel die ehemaligen Wehrpflichtigen sind explizit
  ausgenommen. Alle, die davon im Bereich der freiwillig Wehrdienst Leistenden in
  den vergangenen Jahren nichts wussten, sind davon explizit ausgenommen. Diejenigen,
  die jetzt im neuen Wehrdienst freiwillig Wehrdienst leisten ‑ in sechs, sieben,
  acht oder neun Monaten ‑, sind davon ausgenommen. Wenn das Gesetz in Kraft tritt,
  haben sie noch die freie Entscheidung: Ist das für mich eine weitere Auflage, mit
  der ich gut leben kann, die ich mit meinen staatsbürgerlichen Pflichten, mit diesem
  Dienst verbinde? Dann entscheide ich mich dafür oder nicht. ‑ Aber diese drei Gruppen
  sind explizit ausgenommen, um hier nicht für eine Überraschung zu sorgen. Die anderen,
  die zwölf Jahre gedient haben, die 15 Jahre Berufssoldat waren, die vielleicht 30 Jahre
  gedient haben ‑ diejenigen, die 42 Jahre gedient haben, sind dann schon raus ‑,
  haben auch eine Verpflichtung für ihr Land, für die Truppe über Jahrzehnte genossen.
  Ich weiß auch aus Gesprächen: Da gibt es auch diese Vorbehalte nicht. Herr Müller,
  ich habe nur eine Verständnisfrage dazu, wenn Sie von einer verpflichtenden Heranziehung
  von Reservisten sprechen. Wie schon ausgeführt wurde, erfolgte die Zusage im Wissen
  von einem Zeithorizont bis zu sechs Jahren. Jetzt ist es bis zum Renteneintrittsalter,
  wenn ich es richtig verstanden habe. Welche rechtlichen Möglichkeiten gibt es trotzdem
  im Falle des Reservisten, der, sagen wir einmal, zehn Jahre gedient hat, sich aber
  auf sechs Jahre eingestellt hat und mit dieser Situation nicht zufrieden ist? Ist
  er dann komplett in dieser Verpflichtungsschiene, oder gibt es auch rechtliche Schritte,
  um sich dem zu entziehen? In unserem Land haben wir Gott sei Dank ein funktionierendes
  Rechtsstaatssystem und können uns zum Beispiel über verwaltungsgerichtliche Verfahren
  über alle Maßnahmen und rechtlichen Gesetze, die erlassen werden, beschweren oder
  dagegen vorgehen, wenn wir das für nötig erachten. Das ist klar. Aber ich möchte
  noch einmal ganz klar sagen: Erst einmal heißt das ja nicht, dass jetzt automatisch
  jeder diese Reservedienstleistung leisten muss, sondern hierbei wird auch noch einmal
  genau geschaut ‑ vor allen Dingen in den nächsten Jahren, bis die Truppe weiter
  aufgewachsen ist ‑: Welche Qualifikationen bringt er mit? ‑ Deswegen machen wir
  parallel auch diese R1-Abfrage ‑ Sie haben vielleicht heute die Pressemitteilung
  gelesen ‑, mit der wir noch einmal gezielt anfragen: Wo wohnt ihr? Was könnt ihr?
  Seid ihr fit? Welche Qualifikationen bringt ihr mit? ‑ Dann werden wir uns natürlich
  genau angucken: Wen kann ich in der jetzigen Phase gerade gebrauchen? Wer soll jetzt
  drei oder sechs Wochen zu uns kommen? Wen können wir jetzt gebrauchen? ‑ Am Anfang
  wird das wahrscheinlich nur ein Bruchteil von denen sein, die wir insgesamt erfassen
  und die wir insgesamt haben. Das wird dann aufwachsen. Das wird nicht alle betreffen,
  weil wir die Grundkapazitäten auch gar nicht haben, angefangen bei der Ausbildung
  und Unterbringung. Wir werden aufwachsen, bis wir diesen Gesamtbestand von mindestens
  200 000 in der Truppe auch wirklich bedienen können. (zum Entwurf eines Bundeswehr-Infrastrukturbeschleunigungsgesetzes
  ) Herr Hille, Sie hatten auch noch die Stärkung der militärischen Infrastruktur
  bei der heutigen Kabinettssitzung erwähnt. Bezieht sich das ausschließlich auf explizite
  militärische Infrastruktur, oder könnte zum Beispiel auch die gerade sehr leidende
  Deutsche Bahn von dieser Art von Investitionen profitieren? Der Entwurf trägt den
  Namen „Bundeswehr-Infrastrukturbeschleunigungsgesetz“. Ohne, dass ich da jetzt in
  jedem Detail drinstecke, würde ich daraus schließen, dass es sich auf die Bundeswehr
  bezieht. Aber auch dazu wäre der Kollege Müller im Detail besser auskunftsfähig.
  Schwerpunkt dieses Gesetzespaketes ist eine Änderung von zehn Gesetzen. Teilweise
  sind sie 70 Jahre alt. Sie wurden zwar zwischendurch schon mal angefasst. Aber die
  Gesetze selbst sind 70 Jahre alt. Ein Schwerpunkt ist ein Bundeswehrbaugesetz, das
  uns ermöglicht, dass wir außerhalb der etablierten Verfahren, die aktuell über die
  Landesbaubehörden gehen ‑ jeder Bau geht über die Landesbaubehörde ‑, wenn es zeitkritisch
  ist, selbst über Dritte oder ganz alleine den Bau anstoßen und durchführen können.
  Das betrifft im Schwerpunkt die Bundeswehr und alle möglichen Erleichterungen im
  Prozess, zum Beispiel bei Auskünften in Beteiligungsverfahren zu Sicherheitsinteressen
  und Kompensationen zum Beispiel bei benötigten Baumfällungen, die dann vereinfacht
  und mit finanziellen Mitteln auf unseren eigenen Liegenschaften abgegolten werden
  können. Das sind solche Kleinigkeiten, die alle zehn Gesetze umfassen. Zu den Sicherstellungs-
  und Vorsorgegesetzen habe ich eine Frage an das Bundesministerium für Gesundheit.
  Es werden bis jetzt nur das BMI und das BMVg erwähnt. Ein ganz wichtiges Thema aus
  Sicht der Bundeswehr ist das Gesundheitssicherstellungsgesetz. Vielleicht können
  Sie bei dieser Gelegenheit einmal sagen, wie dazu der Stand der Dinge ist. Das wurde
  schon unter der Vorgängerregierung vom Sanitätsdienst der Bundeswehr angemahnt.
  Wie Sie schon richtig gesagt haben, arbeiten wir als Bundesregierung und speziell
  im BMG am sogenannten GeSiG, dem Gesundheitssicherstellungsgesetz. Im vergangenen
  Jahr wurden viele Vorbereitungsgespräche geführt. Ziel ist es, die Resilienz des
  Gesundheitssystems besser aufzustellen. Ich kann Ihnen dazu keinen konkreten Zeitplan
  nennen. Das Gesetz ist sehr umfassend und komplex. Wir arbeiten daran. Es gibt keinen
  konkreten Zeitplan. Ich kann Ihnen also jetzt noch kein Datum nennen. Haben die
  heute beschlossenen Eckpunkte in irgendeiner Weise Auswirkungen auf die Erarbeitung
  dieses Gesetzes? (zum Ausscheiden der deutschen Fußballnationalmannschaft bei der
  Fußball-Weltmeisterschaft der Männer ) Herr Hille, war es ein Versehen, dass das
  BPA den Tweet des Kanzlers in den Morgenstunden direkt nach der Niederlage gegen
  Paraguay so veröffentlicht hat? Es gab tatsächlich rund um dieses Thema, möchte
  ich einmal sagen, eine gewisse spezielle Wahrnehmung, um nicht zu sagen: eine intensivere
  Debatte. Ich möchte deshalb noch einmal klarstellend sagen: Natürlich ist der Bundeskanzler
  vom Ausscheiden der deutschen Nationalmannschaft bei der Fußball-Weltmeisterschaft
  enttäuscht, wie jeder der Millionen Fußballfans in Deutschland auch. Das ist überhaupt
  keine Frage. Auch er hat sich, ehrlich gesagt, ein bisschen mehr erhofft. Aber so
  ist das nun mal im Sport: Mal gewinnt man, mal verliert man. In diesem Fall ist
  das Ergebnis bekannt. In einer solchen Stunde ist es wichtig, Trost zu spenden und
  für Zusammenhalt zu werben. Das hat der Bundeskanzler getan. Der Tweet, den Sie
  angesprochen haben, ist Ergebnis einer Kommunikationspanne. Ich finde, dass das,
  was Sie uns jetzt erklären, gar nicht zu dem zweiten Tweet passt, den ich hier noch
  einmal vorlese: „Wer den Adler auf der Brust trägt, hat unseren Rückhalt verdient
  und nicht unseren Spott.“ Da hätte der Kanzler doch lieber schreiben können: Ich
  bin auch enttäuscht. ‑ Das verstehe ich nicht. Das sind zwei unterschiedliche Dinge.
  Die Enttäuschung ist das eine. Davon kann sich aber, ehrlich gesagt, keiner richtig
  etwas kaufen. Es geht dem Bundeskanzler gerade auch in der Niederlage darum ‑ wir
  alle wissen, wie hart es auch für Sportler und Profisportler ist, zu verlieren ‑,
  der Mannschaft und dem Land Trost zuzusprechen und auch für Zusammenhalt zu werben.
  Es ist einfach, gemeinsam Erfolge zu feiern. Aber dem Bundeskanzler ist es wichtig,
  auch gerade in Momenten einer solchen schweren Niederlage zusammenzustehen. Das
  hat er damit zum Ausdruck gebracht. Herr Hille, vielleicht können Sie ein bisschen
  erläutern, wie diese Kommunikationspanne zustande kam. Was genau ist dabei schiefgelaufen?
  Zwischen diesem ersten Tweet, der heftig diskutiert worden ist, und dem zweiten
  sind ein paar Stunden vergangen. Man kann Tweets eigentlich auch löschen, oder?
  Was ist da genau schiefgelaufen? Herr Hille, ein bisschen Erläuterung bräuchte ich
  jetzt doch noch. […] [ Die Frage beinhaltete einen Teil „unter zwei“ ] Auf jeden
  Fall bleiben wir dann beim Bundeskanzleramt, welches erklärt hat, das sei ein falscher
  Tweet zum falschen Zeitpunkt mit dem falschen Knopf gewesen. Wenn man jetzt sagt,
  das sei ein falscher Tweet gewesen, gehe ich dann richtig in der Annahme, dass sich
  der Kanzler damit auch von der Aussage in diesem ersten, jetzt mutmaßlich falschen
  Tweet, die deutsche Mannschaft habe mit ihrem Einsatz und Teamgeist begeistert und
  er sei stolz auf die Mannschaft, distanziert? Ich sage es gerne noch mal: Der Bundeskanzler
  ist genauso wie Millionen Fußballfans in diesem Land davon enttäuscht, dass die
  deutsche Mannschaft ausgeschieden ist. Auch er hatte sich mehr erhofft, wie wahrscheinlich
  wir alle hier. Aber im Sport kann man nicht nur gewinnen, sondern da gibt es auch
  Momente der Niederlage. Diese ist besonders bitter. Da ist es dem Bundeskanzler
  wichtig, Trost zu spenden für die Mannschaft, aber auch für die Millionen Fußballfans
  in unserem Land und dafür zu werben, dass man gerade auch in schwierigen Stunden
  zusammenstehen muss. Nach einer solchen bitteren Niederlage ist das umso wichtiger.
  Das ist dem Bundeskanzler ein Anliegen. [Es folgte ein Teil „unter zwei“ bzw. „unter
  drei“] Herr Hille, Sie haben am Anfang gesagt, der Kanzler ist, wie alle anderen
  der 80 Millionen Bundesbürger, die sich für Deutschland engagiert haben, enttäuscht.
  Aber das war nicht nur eine Niederlage. Das war ein Beleg für den Zustand des deutschen
  Fußballs nach drei verschiedenen WMs, bei denen Deutschland nicht weitergekommen
  ist, wie wir es nach 2014 ‑ 2014 war es aus brasilianischer Sicht schmerzhaft ‑
  erfahren haben. Der Bundeskanzler ist auch ein Fußballfan. Er trägt auch einen Borussia-Schal.
  Wie kann es denn sein, dass es zu dieser Gemengelage kam ‑ nicht nur, was die zeitliche
  Veröffentlichung und den Text anbetrifft, sondern auch ein bisschen das Gespür,
  wann der Tweet mit welchem Text dazu rausgehauen werden soll? Mir fehlt ein bisschen
  das Gesamtbild. Das war nicht nur eine Niederlage wie beim DFB-Pokal. Das wird jetzt
  eine Reihe von Sachen mit ins Rollen bringen zu dem Zustand des deutschen Fußballs.
  Abschließender Satz: Jürgen Klopp sagte einmal ‑ ‑ ‑ Mir wäre lieber, Sie würden
  eine abschließende Frage formulieren. Es tut mir leid, aber ich habe, ehrlich gesagt,
  die Frage nicht verstanden. Von daher würde ich Sie bitten, das noch einmal ‑ nicht
  in gleicher Länge ‑ zu wiederholen. Das mache ich sehr gerne, Herr Hille. Wie kann
  es zu dieser gesamten Gemengelage „Falscher Text, falscher Zeitpunkt der Veröffentlichung,
  vor allen Dingen falscher Inhalt“ kommen? Wie kommt es zu dieser Gemengelage? Dazu
  würde ich auf das verweisen, was ich gerade gesagt habe. Genau das habe ich erläutert,
  wie es dazu kommt ‑ auch mit dem Hinweis darauf, dass es sich um eine Kommunikationspanne
  handelt. Das leuchtet mir einfach nicht ein. Da komme ich nicht mit. (zum Förderprogramm
  „Demokratie leben!“ ) Meine Frage geht an das Bundesfamilienministerium. Warum taucht
  das Haber-Verfahren schon im Förderaufruf auf? Warum haben Sie das quasi so prominent
  platziert? Was ist das Ziel, die Innovationsprojekte und bundeszentrale Infrastruktur
  jetzt tatsächlich herauszunehmen? Worin sehen Sie die Vorteile? Wir haben hier mehrfach
  betont, dass wir das Förderprogramm „Demokratie leben!“ weiterentwickeln wollen.
  Dazu zählte auch, dass wir ab 2027 vier Programmebenen und ein Sondervorhaben vorhalten.
  Wir haben heute dazu eine sehr ausführliche Pressemitteilung veröffentlicht, in
  der wir genau diese Programmebenen auch noch einmal deutlich erklären. Kommune und
  Land sind jeweils eine Programmebene. Wir haben auch eine Programmebene Bund und
  eine Programmebene „Digitaler Raum“. Daraus kann man schon sehr gut erkennen, dass
  das eine wirkliche Neuaufstellung des Programms ist, die wir für sinnvoll halten,
  weil wir glauben, dass wir es mit dieser Weiterentwicklung und in Teilen auch Neuaufstellung
  schaffen können, dieses wichtige Instrument der Demokratiebildung und Extremismusprävention
  in Deutschland besser auszubauen und möglicherweise auch viel mehr Menschen zu erreichen.
  Unser Ziel ist es, mit neuen wirkungsorientierten Zielen und mehr Pluralität eine
  größere Breitenwirkung zu erzeugen, vor allem in der Mitte der Gesellschaft, bei
  der wir davon ausgehen, dass wir sie im Moment nicht erreichen. Es gab ja große
  Sorgen, dass zum Beispiel HateAid ‑ das wurde vorhin auch schon mal erwähnt ‑ und
  auch die Amadeu Antonio Stiftung mit mehreren Projekten aus der Förderung herausfallen
  könnten. Teilen Sie diese Sorge? Grundsätzlich haben wir immer betont, dass die
  Projektträger die Möglichkeit haben, sich zu bewerben, sich mit ihren Projekten
  neu zu bewerben. Ich würde sagen: Stand hier und heute gibt es für mich keinen Grund
  zu sagen, dass diese Stiftungen keine Fördergelder bekommen, wenn sie gute Projekte
  einreichen ‑ wie alle anderen. Ich denke, das ist wichtig zu betonen. Jeder, der
  ein Projekt einreicht, hat die gleiche Chance, über das Programm gefördert zu werden,
  wenn die Projektträger die Förderkriterien erfüllen. Sie haben jetzt gesagt: mehr
  Pluralität, größere Breitenwirkung. Was bedeutet das konkret? Vielleicht können
  Sie Beispiele nennen. Wir haben vor allem einen, wie wir finden, wichtigen neuen
  Programmschwerpunkt in der Programmebene „Digitaler Raum“. Das ist eine eigenständige
  Programmebene, bei der wir uns zum Beispiel ganz gezielt darum kümmern, dass Radikalisierung
  im Netz weiter zum Thema gemacht wird, breiter aufgestellt wird. Hier geht es auch
  um die digitale Demokratiebildung, Stärkung der Medien- und Digitalkompetenz. Das
  ist für uns ein Punkt, wo wir glauben, dass wir mehr in die in die Breite wirken
  können, weil dieses Thema auch die breite Gesellschaft erreicht. Wir haben ein Sondervorhaben
  „Integration und Teilhabe“. Da geht es uns insbesondere darum, den Dialog und den
  Zusammenhalt in einer vielfältigen Einwanderungsgesellschaft zu fördern. Können
  Sie denn schon abschätzen, wer jetzt nicht mehr oder, sagen wir mal, weniger gefördert
  wird? Ist das schon unter diesen neuen Voraussetzungen irgendwie absehbar? Können
  Sie sagen, wie groß die Gesamtsumme für die Förderbereiche ist? Das kann ich nicht
  tun, weil die Haushaltsgespräche ja noch laufen. Deswegen können wir uns im Moment
  zu Volumina nicht äußern. Sie haben vorhin gesagt, wenn man gute Projekte einreicht,
  dann hat man die Perspektive, dass die Mittel freigemacht werden. Was sind die Kriterien,
  um die Projekte als gut zu bezeichnen? Da darf ich Sie auf unsere Pressemitteilung
  und auf unsere Seite demokratie-leben.de verweisen. Da können Sie sich das detailliert
  anschauen. Was ist es denn für ein Zeichen, in dem Moment, in dem die AfD die stärkste
  politische Kraft in diesem Lande geworden ist, die Mittel für diese Projekte, die
  gerade eben dagegen steuern, die dagegen kämpfen, zu reduzieren? Was für ein Symbol
  ist das aus Ihrer Sicht? Ich teile Ihre Prämisse nicht, die Sie mit Ihrer Frage
  aufmachen. Ich glaube, ich habe gerade versucht zu erklären, dass es unser Ziel
  ist, die Demokratieförderung neu aufzustellen, weil wir glauben, dass es Handlungsbedarf
  gibt. Wir haben auch im Moment überhaupt nicht von Kürzungen gesprochen, sondern
  wir versuchen, hier deutlich zu machen, dass sich gute Projekte bewerben können.
  Dann schauen wir uns die Projekte an, und dann gibt es die Möglichkeit der Förderung.
  Ich habe Sie schon sehr gut verstanden. Sie haben vorhin gesagt, die Radikalisierung
  im Netz sei zum Beispiel auch eine Priorität. Dann frage ich Sie jetzt ganz konkret:
  Die Amadeu Stiftung hat eine gesellschaftliche, zivilgesellschaftliche Arbeit gemacht,
  die von allen Seiten gelobt wurde. Wie kann es dann sein, dass diese Einrichtung
  jetzt unsicher ist, ob die Mittel freigegeben werden oder sie keine Mittel mehr
  bekommen? Wie kann das dann sein? Wie passt es mit dieser politischen Lage zusammen,
  die ich vorhin beschrieben habe? Ich glaube, ich habe es mehr als deutlich gemacht,
  und es ist auch nicht das erste Mal, dass wir das hier erläutern. Wir haben ja hier
  schon mehrfach über diese Fragestellung gesprochen. Ich habe gerade noch einmal
  deutlich gemacht: Es besteht die Möglichkeit, sich zu bewerben und die Chance, auch
  weiter Fördergelder zu bekommen. Eine Frage an das Wirtschaftsministerium zur Reise
  der Bundeswirtschaftsministerin nach Kasachstan . Im Zusammenhang mit dieser Reise
  berichtet die „Märkische Allgemeine Zeitung“ heute, dass die kasachische Regierung
  darüber nachdenkt, Öl über Ust-Luga nach Deutschland zu verschiffen. Ist dieses
  Thema konkret bei diesem Besuch zur Sprache gekommen? Und wenn nicht, würde ich
  darüber hinaus gern wissen: Welche Transportwege sind denn besprochen worden, um
  Öl von Kasachstan nach Deutschland zu bekommen? Vielleicht kann ich grundsätzlich
  noch einmal sagen, da die Reise ja gestern zu Ende gegangen ist, dass die Ministerin
  mit verschiedenen Vertretern der kasachischen Regierung sehr konstruktive Gespräche
  geführt hat ‑ mit dem Staatspräsidenten, mit dem Premier, mit verschiedenen Ministern.
  Es ging um industrie- und rohstoffpolitische Zusammenarbeit und Kooperation, auch
  im Vorgriff oder im Blick darauf, dass im Herbst noch einmal Besuche kasachischer
  Seite hier in Berlin anstehen. Man hat jetzt auch schon einmal vorbereitend über
  konkrete Vereinbarungen gesprochen, die dann getroffen werden können. Zu Ihrer konkreten
  Frage zu Öltransporten: Die Ministerin hat vor Ort betont, dass Kasachstan ein sehr
  verlässlicher Partner in der Öllieferung ist. Man hat darüber gesprochen, wie die
  derzeitige Unterbrechung der Öltransporte gelöst werden kann. Kasachstan hat gezeigt,
  dass sie an einer sehr zügigen Lösung interessiert sind, gegebenenfalls tatsächlich
  über eine Verschiffung. Das sind aber Sachen, die jetzt noch eruiert werden. Da
  kann ich jetzt noch keine Details nennen. Ist denn über Ust-Luga gesprochen worden?
  Das steht ja auf der Sanktionsliste. Von daher würde sich das jetzt nach meinem
  Verständnis ausschließen. Oder denkt man womöglich auch darüber nach, Sanktionen
  zu lockern, um dann Transporte möglich zu machen? Es ist mir nicht bekannt, dass
  da über eine Lockerung nachgedacht wird. Ich kenne an der Stelle aber auch die ganz
  konkreten Inhalte der Gespräche nicht. Der Tankrabatt ist ja heute offiziell ausgelaufen.
  Die Tankstellen haben, obwohl sie den Preis nicht gesenkt haben, noch einmal deutlich
  erhöht. Auch in Differenz zu 12 Uhr gestern liegt das deutlich über diesen 17 Cent.
  Eine Frage an das BMWE: Halten Sie das für gerechtfertigt, und halten Sie sich hier
  eventuelle Sanktionen und Maßnahmen vor? Ich bin nicht die Stelle, die entscheidet,
  ob Preisbildung gerechtfertigt ist, sondern wir haben das Bundeskartellamt als unabhängige
  Kartellbehörde. Sie wissen, wir haben mit dem Kraftstoffmaßnahmenpaket die Möglichkeiten
  des Bundeskartellamts im Mineralöl- und Kraftstoffbereich noch einmal gestärkt.
  Die Markttransparenzstelle Kraftstoffe schaut sich diese Entwicklung natürlich sehr
  genau an. Es laufen Untersuchungen mit Bezug auf die Raffineriebetreiber, auf die
  Tankstellen und die Vertriebsstrukturen dort. Der Präsident des Bundeskartellamts
  hat, glaube ich, gestern auch noch einmal öffentlich davon gesprochen, dass aus
  seiner Sicht durchaus Mängel in der Wettbewerbsstruktur des Marktes insgesamt bestehen.
  Insofern ist es dann dem Bundeskartellamt vorbehalten, im Rahmen der rechtsstaatlichen
  Verfahren, die wir dafür vorgesehen haben, einzelne Maßnahmen zu ergreifen. Aber
  eine politische Bewertung könnten Sie ja vornehmen. Ich meine, das Argument, warum
  der Preis nicht so schnell gesenkt wurde, war ja immer, er müsse sich anpassen.
  Jetzt wurde heute auch noch subventioniertes Benzin, das einmal eingekauft worden
  ist, an den Kunden zu erhöhten Preisen weitergegeben. Nein, ich würde also bei der
  Antwort bleiben, die ich eben gegeben habe. Dann muss eben geschaut werden durch
  das Bundeskartellamt: Entsprechen die Preise, die vom Endkunden verlangt werden,
  den Kostenstrukturen sowohl im Mineralölmarkt als auch in den nachgelagerten Märkten?
  An das Auswärtige Amt: Herr Hinterseher, die Kollegen hatte am Montag gefragt, ob
  Sie mit den staatlichen Behörden in Venezuela in Kontakt sind. Ich frage deshalb
  noch einmal neu, weil die Sache dort sehr volatil ist und das in der Presselandschaft
  in Südamerika auch sehr oft Thema ist: Gibt es einen neuen Kenntnisstand, den Sie
  uns nach diesen zwei Tagen geben können? Gleich meine Nachfrage, wenn ich darf:
  Können Sie schon eine Summe nennen, wie viel das Auswärtige Amt für die Hilfe an
  Venezuela verwendet hat? Ich fange am besten mit dem ersten Teil der Frage an. Ich
  habe meinen Ausführungen vom Montag hier nichts hinzuzufügen. Natürlich haben wir
  eine Botschaft in Caracas, natürlich sind wir mit den Behörden in Kontakt, und natürlich
  sind wir mit allen anderen Akteuren in Kontakt, um hier humanitäre Hilfe zu leisten.
  Es gibt eine Notlage in Venezuela durch zwei gravierende, sehr schwere Erdbeben
  mit großer Zerstörung. Dort versuchen wir im bestmöglichen positiven Sinne dahingehend
  zu wirken, dass der größtmöglichen Zahl an Menschen geholfen werden kann, und das
  Ganze so schnell und effektiv wie möglich. Das hatte ich am Montag ausgeführt. Nach
  wie vor gelten ‑ das können Sie vermutlich auch in den Protokollen von Montag und
  Freitag nachlesen ‑ die Zahlen, die wir dort verkündet haben, was dort neu hinzukommt.
  Angesichts der hohen Zahl an Vermissten und Verschütteten hatte der Außenminister
  auf seiner Reise nach Lateinamerika angekündigt, die Hilfe für Venezuela auf 13 Millionen
  Euro aufzustocken. Es sind also bis jetzt 13 Millionen Euro. Wenn eine Naturkatastrophe,
  wie ich gerade ausgeführt hatte, dort zuschlägt, wo sie zuschlägt, dann sehen wir
  es als unsere Pflicht an, dort als das dafür verantwortliche Ressort im Rahmen der
  Möglichkeiten humanitäre Hilfe bereitzustellen. Ist in diese 13 Millionen auch schon
  das Nachbeben einbezogen, das dann zwei Tage später kam? Es gab, glaube ich, eine
  Reihe von Nachbeben unterschiedlicher Größenordnung. Es gab ein Doppelbeben, das
  sehr schwer war. Das ist die Zahl, die ich Ihnen ‑ Stand heute ‑ nennen kann. Allerdings
  kann ich Ihnen jetzt nicht aufschlüsseln, welche Summe an welchem Tag in Verbindung
  mit welchem Erdbeben dort geleistet wurde. Denn es geht um eine insgesamte Notlage.
  Sie haben das Ausmaß der Zerstörung gesehen. Wir sehen das ja auch aus Medienberichten,
  aber auch durch die Teams, die mittlerweile vor Ort sind. Wir haben das Technische
  Hilfswerk vor Ort. Wir haben als Ersthelfer auch die Hilfsorganisation @fire im
  Einsatz gehabt, deren Mitarbeiter zum Teil schon zurückgekehrt sind. Das ist eine
  extrem anstrengende Mission für die Helferinnen und Helfer, die aus vielen europäischen
  Staaten kamen, wo wir dann teilweise Hilfe geleistet haben. Ich glaube, auch das
  war am Montag hier Thema, dass die Bundeswehr, die Luftwaffe, auch Helferteams aus
  anderen europäischen Staaten zum Ort des Geschehens gebracht hat. Dadurch bekommen
  wir natürlich noch einmal zusätzliche Eindrücke, die sehr erschütternd sind. Wir
  danken allen, die sich als Helferinnen und Helfer einsetzen oder ihren Einsatz dort
  vor Ort geleistet haben. Auch andere Regierungen klagen darüber, dass die Regierung
  in Venezuela von der Situation sehr überfordert ist. Damit man einen Einblick von
  dieser Hilfsbereitschaft bekommen kann: Gibt es ein Netzwerk mit anderen Ländern,
  zum Beispiel von Deutschland aus, oder sind die Kanäle praktisch nur die jeweiligen
  Botschaften? Wie muss man sich das vorstellen? Nein, das ist europäisch koordiniert.
  Auch das hatten wir hier am Freitag und am Montag schon ausgeführt, dass es eine
  europäische Koordinierung gibt, einen Nothilfemechanismus, der von Venezuela ausgelöst
  wurde. Im Rahmen dessen koordinieren wir uns natürlich auf europäischer Seite und
  mit allen Behörden vor Ort, mit den Hilfsorganisationen. Aber, noch einmal: Humanitäre
  Hilfe folgt humanitären Prinzipien und wird in der Regel staatsfern geleistet. Das
  ist auch hier der Fall. Darauf möchte ich noch einmal hinweisen. Herr Hille, zum
  Porträt der Altkanzlerin : Hat der Bundeskanzler das schon gesehen, und wie gefällt
  es ihm? Das kann ich Ihnen beides nicht sagen. Ich könnte mir vorstellen, dass er
  genauso wie ich Berichterstattung gesehen hat. Aber mehr weiß ich dazu nicht. Wissen
  Sie denn, ob er es im Bode-Museum besichtigen will, oder wartet er, bis es im Kanzleramt
  hängt, um es dann zu Gesicht zu bekommen? Das werden wir sehen. Sie wissen, wie
  wir mit Terminen des Bundeskanzlers umgehen. Die kündigen wir am Freitag der Vorwoche
  an. Solange das nicht der Fall ist ‑ ‑ ‑ Herr Hille, heute ist ein Podcast erschienen,
  der von einem Treffen zwischen Mathias Döpfner und dem Bundeskanzler berichtet.
  Bei diesem Treffen sei es um die AfD gegangen. Herr Döpfner hätte den Bundeskanzler
  gedrängt, mit der AfD zusammenzuarbeiten. Das letzte Treffen sei mit der Bemerkung
  oder einer Drohung von Matthias Döpfner an den Bundeskanzler geendet: Das werden
  Sie bereuen. Erstens. Haben diese Treffen stattgefunden? Zweitens. Ist Ihnen diese
  Drohung bekannt? Ich habe das auch gelesen. Das sind absurde Gerüchte. ‑ Beantwortet
  das Ihre Frage? Dass es stattgefunden hat oder dass dieser Inhalt gefallen ist?
  Es sind absurde Gerüchte, die da berichtet werden. Herr Hille, heute findet ja die
  Sitzung des Koalitionsausschusses statt. Ich weiß, der Kanzler hat sich schon dazu
  geäußert. Aber vielleicht können Sie uns noch mal etwas darlegen. Man scheint sich
  ja schon auf viele Punkte geeinigt zu haben. Was sind denn aus Ihrer Sicht jetzt
  noch die größten Knackpunkte bei den Gesprächen? Das Interesse verstehe ich natürlich
  sehr. Ich werde aber das tun, was Sie gerade schon angerissen haben, und das, was
  für mich am einfachsten ist, nämlich den Bundeskanzler zu zitieren, weil er sich,
  wie Sie gesagt haben, gerade im Rahmen der PK nach der Kabinettssitzung schon geäußert
  hat: Meine Erwartung ist, dass wir in der Modernisierung unseres Landes wirklich
  einen großen Sprung nach vorn machen. - Ich denke, viel besser kann man das nicht
  beschreiben. Ich hatte eigentlich auch noch eine Frage zum Fußball . Aber ich würde
  jetzt vielleicht grundsätzlich zum Twitter-Verhalten fragen: Sind denn alle Tweets,
  die vom Kanzleraccount abgesetzt werden, mit dem Kanzler besprochen, also jedes
  Wort? Gibt er dafür auch seine Autorisierung? Das wird Sie nicht zufriedenstellen,
  aber ich werde jetzt nicht weiter auf interne Abläufe eingehen. Wir haben das Thema,
  um das es heute schwerpunktmäßig ging, glaube ich, ausreichend bearbeitet, aber
  alles Weitere hinsichtlich interner Abläufe bleibt auch intern. Dann stelle ich
  vielleicht noch eine Nachfrage: Hat der Kanzler noch einen Tipp an den DFB, wie
  jetzt mit der Trainerentscheidung verfahren werden soll? Der Bundeskanzler ist Bundeskanzler
  und kümmert sich um die Dinge, um die sich ein Bundeskanzler kümmert. Diese Fragen
  nach dem Umgang und der Nachbearbeitung sind Fragen, um die sich der DFB, der Deutsche
  Fußball-Bund, zu kümmern hat. Ich bin mir ziemlich sicher, dass er das tun wird,
  und dafür braucht er nicht irgendwelche Ratschläge des Bundeskanzlers. Jetzt wieder
  zum Ernst der Lage! Herr Hinterseher, in Südamerika bahnt sich ein Rechtsruck an
  . Chile hat einen rechtspopulistischen Präsidenten. In Kolumbien ist das auch der
  Fall. Jetzt wurde in Peru Frau Fujimori als Wahlsiegerin hervorgebracht. Was hat
  das für eine Bedeutung für den Bundesaußenminister? Wie ordnet er diese Entwicklung
  in Südamerika in Bezug auf Handelspartner, in Bezug auf Austausch ein? Wie ordnet
  er denn diese Entwicklung ein? In Brasilien werden im Oktober auch Präsidentschaftswahlen
  stattfinden, die jetzt voll im Fokus stehen. Wie ordnet der Bundesaußenminister
  diese Entwicklung, diesen Rechtsruck in Südamerika ein? Wir haben den zur Kenntnis
  genommen. Wir kommentieren demokratische Wahlen nicht. Das ist jeweils die Entscheidung
  des dortigen Souveräns, also des Volkes, das über die jeweilige Leitung des Landes
  entscheidet, die Regierung oder den Präsidenten oder die Präsidentin, wie in Peru.
  Das haben wir von hier aus nicht zu kommentieren. Was wir allerdings machen: Wir
  befinden uns in engem Austausch mit unseren Partnern weltweit. Sie wissen, dass
  der Minister gerade in der Region ist. Er war gestern auf dem MERCOSUR-Gipfel und
  hat dort ‑ das können Sie unseren Auftritten in sozialen Medien auch entnehmen ‑
  unter anderem den chilenischen Präsidenten getroffen. Wir arbeiten mit unseren Partnern
  weltweit zusammen, um im Sinne unserer eigenen außenpolitischen Ziele zu wirken.
  Das ist einerseits, für Freiheit, Sicherheit und Wohlstand einzutreten. Natürlich
  möchte man bei dieser Reise nach Lateinamerika gerade vor dem Hintergrund, dass
  das MERCOSUR-Abkommen jetzt unter Dach und Fach ist, sicherstellen, dass diese Partnerschaft,
  die es jetzt gibt und die den Unternehmen auf beiden Kontinenten einiges erleichtert,
  auch mit Leben gefüllt wird, damit dort ein möglichst enges Netzwerk an wirtschaftlichen
  Verflechtungen entsteht; denn von diesem Freihandelsabkommen können 700 Millionen
  Menschen unmittelbar profitieren. Ein Thema, das aktuell ist, aber sicherlich keine
  Schlagzeilen machen wird, ist mein Abschied aus der Regierungspressekonferenz .
  Ich werde nach sechs Jahren als Pressesprecher des Umweltministeriums auf die Fachebene
  wechseln. Ich blicke auf sechs interessante Jahre zurück. Ich durfte Ihnen hier
  Antworten zur Ahrtal-Katastrophe, zum Fischsterben in der Oder, dem Verbrenner-Aus,
  dem Atomausstieg geben. Ich kann mich auch noch sehr gut an die Stimmung im Saal
  erinnern, als ich davon berichtete, dass die ersten Angriffe Russlands auf das AKW
  in Saporischschja stattgefunden haben. Das hat mich sehr ergriffen und ist auf jeden
  Fall in meiner Erinnerung eingebrannt. Ich möchte diesen Moment noch viel mehr dafür
  nutzen, Ihnen im Plenum zu danken. Danke, dass Sie diesen Raum mit der blauen Wand
  geschaffen haben. Die Bundespressekonferenz ist ein unabhängiger Ort. Danke, dass
  Sie uns dreimal die Woche eingeladen haben. Ich bin sehr gerne gekommen. Vielen
  Dank auch dafür, dass ich vorher nie wusste, was Sie fragen werden. Das wäre natürlich
  praktisch gewesen, und viele Sprechzettel hätte ich nicht schreiben müssen, aber
  das hätte, glaube ich, den demokratischen Kern dieser Veranstaltung verfehlt, den
  ich hier während der sechs Jahre erleben durfte. Denn der heißt Gewaltenteilung.
  Journalisten laden die Regierung ein, Journalisten stellen die Fragen, und die Regierung
  antwortet. Hier geht es nicht um Performance, sondern um Relevanz. Deshalb sage
  ich auch: Danke, dass Sie stets fair und aufrichtig interessiert an Umweltthemen
  gewesen sind, auch wenn die Welt vielleicht etwas anderes vorhatte. Denn Ihr Interesse
  schafft Relevanz in der Gesellschaft. Ich hoffe, meine Antworten haben Ihre Arbeit
  ein bisschen leichter gemacht. Ich sage aber auch Danke an die Kolleginnen und Kollegen
  hier oben auf dem Podium. Hausleitungen wechseln manchmal die Farbe. Aber ich habe
  in den Pressestellen der Ministerien und im Bundespresseamt immer wieder hilfsbereite
  Kolleginnen und Kollegen gefunden, und dafür möchte ich ganz herzlich danken. Ich
  hoffe, dass ich Ihnen auch ein guter Partner gewesen bin, und sage in dieser Weise
  in alle Richtungen: Auf ein baldiges Wiedersehen! Vielen Dank für diese Wertschätzung
  auch unserer sehr besonderen Institution, wissend, dass Sie es hier bestimmt nicht
  immer nur gemocht haben. Danke, dass Sie da waren, danke für den Austausch, und
  Ihnen persönlich alles Gute!'
