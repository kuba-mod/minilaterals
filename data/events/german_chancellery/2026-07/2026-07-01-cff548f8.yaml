title: Im Kabinett beschlossen Gut ausgebildete und verfügbare Reservisten stärken
  Verteidigungsfähigkeit
text: Reservistinnen und Reservisten müssen gut ausgebildet sein, ihre Qualifikation
  halten und sich weiterbilden können. Die veränderte Bedrohungslage in Europa und
  die daraus resultierenden sicherheitspolitischen Anforderungen an unsere Verteidigungs-
  und Abschreckungsfähigkeit erfordern einen deutlichen Aufwuchs der Bundeswehr –
  qualitativ und quantitativ. Als wehrhafte Demokratie muss sich Deutschland verteidigen
  können, um in Freiheit und Sicherheit zu leben. Dafür braucht das Land starke Streitkräfte
  und eine resiliente Gesellschaft. Für die Verteidigungsfähigkeit braucht Deutschland
  neben der aktiven Truppe gut ausgerüstete und einsatzbereite Reservistinnen und
  Reservisten, die schnell und verlässlich verfügbar sind. Mit dem Entwurf des Reservestärkungsgesetzes
  schafft die Bundesregierung die rechtlichen Rahmenbedingungen. Die Reservisten leisten
  im Frieden einen wertvollen Beitrag, im Grundbetrieb und auch im Einsatz. Im Verteidigungsfall
  tragen sie zum Aufwuchs der Bundeswehr bei und übernehmen auf Augenhöhe mit der
  aktiven Truppe Schlüsselaufgaben. Dafür müssen sie gut ausgebildet sein, ihre Qualifikation
  halten und sich weiterbilden können. Deshalb ist es notwendig, dass Reservistinnen
  und Reservisten regelmäßig und verlässlich aktiven Dienst leisten. Hierfür ist die
  verpflichtende Heranziehung zu Reservediensten notwendig. Die neuen Vorschriften
  finden dabei keine Anwendung auf ehemalige Freiwillig Wehrdienstleistende (FWDL).
  Für den Gesamtumfang und die maximale jährliche Dauer von Reservedienstleistungen
  wird ein Stufenmodell geschaffen, das die vorher geleistete aktive Dienstzeit berücksichtigt
  und dem Grundsatz der Verhältnismäßigkeit Rechnung trägt. Wer länger gedient hat
  und mehr Qualifikationen mitbringt, der wird auch länger insgesamt und pro Jahr
  Reservedienst leisten. Bisher erfolgte in der Praxis grundsätzlich die Heranziehung
  zum Reservedienst nur mit dem Einverständnis des Betroffenen und zusätzlich mit
  dem Einverständnis des privaten Arbeitgebers. Die aktuellen sicherheitspolitischen
  Anforderungen an die Einsatzbereitschaft der Streitkräfte sind mit der bisherigen
  Praxis der „doppelten Freiwilligkeit“ nicht mehr zu vereinbaren. Die verpflichtende
  Heranziehung wird notwendig, damit Reservisten verlässlich und regelmäßig Dienst
  leisten können. Im Spannungs- und Verteidigungsfall gilt unverändert die Möglichkeit
  einer Heranziehung zum unbefristeten Wehrdienst. Deren Anordnung durch die Bundesregierung
  bedarf aber nun der Zustimmung durch den Bundestag. Gleichzeitig soll die Attraktivität
  des Reservistendienstes weiter gesteigert und Bürokratie in diesem Bereich abgebaut
  werden. Es werden Regelungen modernisiert, um die Reservisten schneller und wirksamer
  in die Landes- und Bündnisverteidigung einbinden zu können. Durch Änderungen im
  Unterhaltssicherungsgesetz sollen Auslandszuschläge erhöht und die Erstattung von
  Fahrtkosten sowie die Gewährung von Reisebeihilfen erweitert werden. Im Interesse
  der Arbeitgeber sollen durch Änderungen im Arbeitsplatzschutzgesetz bei Beschäftigung
  einer Ersatzkraft höhere Kosten erstatten werden. Außerdem ist ein Förderbeitrag
  für kleine und mittlere Unternehmen vorgesehen, um die Abwesenheit von Mitarbeiterinnen
  und Mitarbeitern zu kompensieren. Hier finden Sie Fragen und Antworten zur Reserve
  der Bundeswehr . Hier gelangen Sie zum Beratungsgespräch und zur Bewerbung .
