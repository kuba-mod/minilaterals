title: Bundeskanzler Merz telefoniert mit dem israelischen Ministerpräsidenten Netanjahu
text: Bundeskanzler Friedrich Merz hat heute mit dem Ministerpräsidenten von Israel,
  Benjamin Netanjahu, telefoniert. Beide tauschten sich insbesondere zur Lage in Libanon
  sowie in den Palästinensischen Gebieten aus. Der Bundeskanzler betonte, Schritte
  hin zu einer faktischen Teilannexion des Westjordanlandes dürfe es nicht geben.
  Er unterstrich zudem die Bedeutung des Rahmenabkommens zwischen den USA und Iran
  als beste Chance für Stabilität in der Region.
