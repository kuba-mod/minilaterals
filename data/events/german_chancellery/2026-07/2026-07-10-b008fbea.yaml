title: 26. Deutsch-Französischer Ministerrat und Deutsch-Französischer Verteidigungs-
  und Sicherheitsrat
text: Am 17. Juli 2026 findet der Deutsch-Französische Ministerrat statt. Bereits
  am Vorabend trifft Bundeskanzler Friedrich Merz mit dem französischen Staatspräsidenten
  Emmanuel Macron zusammen. Hier sind kurze Pressestatements geplant. Anschließend
  gibt es ein Delegationsgespräch und ein gemeinsames Abendessen. Am 17. Juli 2026
  ist für 09:00 Uhr eine Sitzung des Deutsch-Französischen Verteidigungs- und Sicherheitsrats
  unter Leitung von Bundeskanzler Merz und Staatspräsident Macron auf dem Fliegerhorst
  Nörvenich geplant. Im Vordergrund stehen sicherheitspolitische Themen sowie Fragen
  der strategischen Zusammenarbeit. Parallel dazu kommen die weiteren teilnehmenden
  Bundesministerinnen und -minister mit ihren franz ö sischen Counterparts auf Schloss
  Augustusburg in Br ü hl zu bilateralen Gespr ä chen zusammen. Staatspräsident Macron
  wird um 11:00 Uhr auf Schloss Augustusburg in Brühl durch Bundeskanzler Friedrich
  Merz offiziell mit militärischen Ehren begrüßt. Anschließend tagt der Deutsch-Französische
  Ministerrat. Hier werden Wirtschaft und Wettbewerbsfähigkeit sowie der gesellschaftliche
  Austausch und Resilienz im Fokus der Gespräche stehen. Weiterhin wird der Ministerrat
  über gemeinsame deutsch-französische Impulse für eine Reihe von Themen auf EU-Ebene
  beraten. Zum Abschluss des Deutsch-Französischen Ministerrats ist für 15:00 Uhr
  eine gemeinsame Pressekonferenz von Bundeskanzler Merz und Staatspräsident Macron
  vorgesehen.
