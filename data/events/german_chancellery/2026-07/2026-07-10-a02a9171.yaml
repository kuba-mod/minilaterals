title: Bundeskanzler Merz empfängt den Staatspräsidenten der Demokratischen Volksrepublik
  Algerien, Tebboune
text: Bundeskanzler Friedrich Merz wird am 16. Juli 2026 um 14:30 Uhr den Staatspräsidenten
  der Demokratischen Volksrepublik Algerien, Abdelmadjid Tebboune, im Bundeskanzleramt
  empfangen. In einem gemeinsamen Gespräch werden die bilateralen Beziehungen sowie
  energie- und wirtschaftspolitische Fragen im Mittelpunkt stehen.
