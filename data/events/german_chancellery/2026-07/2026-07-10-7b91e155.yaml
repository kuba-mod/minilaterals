title: Im Bundesrat beschlossen Infrastruktur-Zukunftsgesetz beschleunigt Bau neuer
  Schienen, Straßen und Brücken
text: 'Das Infrastruktur-Zukunftsgesetz soll Planungs- und Genehmigungsverfahren für
  Straßen, Brücken und Bahntrassen verkürzen. Die Bundesregierung investiert so viel
  wie noch nie in wichtige Verkehrsprojekte, um Versäumnisse aus der Vergangenheit
  zu korrigieren: Bis 2029 fließen etwa 169 Milliarden Euro in die Sanierung kaputter
  Straßen, überlasteter Schienenwege, maroder Brücken und sanierungsbedürftiger Wasserstraßen.
  Damit die Mittel schnell wirksam werden, braucht es zügige Planungs- und Genehmigungsverfahren.
  Deshalb hat das Bundeskabinett das Infrastruktur-Zukunftsgesetz beschlossen. Es
  verkürzt langwierige Verfahren und ermöglicht schnelleres, pragmatisches und unbürokratisches
  Bauen. Der Bundestag hat am 26. Juni dem Gesetz mit Änderungen zugestimmt. Der Bundesrat
  hat am 10. Juli das Infrastruktur-Zukunftsgesetz beschlossen. Die intensive parlamentarische
  Befassung im Bundestag hat dazu beigetragen, den Gesetzentwurf in zentralen Punkten
  weiter zu stärken. Darunter u. a. eine neue Stichtagsregelung, dadurch wird der
  Zeitraum, in dem Änderungen berücksichtigt werden müssen, klar begrenzt. Außerdem
  die Möglichkeit einer Ersatzgeldzahlung statt Ausgleichsmaßnahme auch für Energieinfrastrukturvorhaben
  sowie die Ausweitung des überragenden öffentlichen Interesses auf systemkritische
  Schifffahrtsanlagen und wichtige Maßnahmen des Hochwasser- und Küstenschutzes. Weitere
  Informationen dazu lesen Sie auf der Seite des Bundesverkehrsministeriums . Bundesverkehrsminister
  Patrick Schnieder erklärte zudem, mit dem Gesetz gebe die Bundesregierung „Behörden
  und Unternehmen endlich Tempo, Klarheit und Verlässlichkeit, damit Sanierungen und
  Ausbauten dort ankommen, wo sie gebraucht werden: auf unseren Straßen, Brücken,
  Schienen und Wasserwegen“. Konkret werden unter anderem der Bau von neuen Autobahnen,
  Schienenwegen, der Ersatz von maroden Brücken, der Neu- und Ausbau von LKW -Parkplätzen,
  Hafenanlagen, Projekte zum Hochwasser- und Küstenschutz sowie wichtige Sanierungen
  von Wasserstraßen künftig prioritär behandelt – und im überragenden öffentlichen
  Interesse stehen. Dadurch werden die Projekte im Genehmigungsverfahren bevorzugt.
  Das gilt auch für den Bau neuer Straßen, die im Bundesverkehrswegeplan im weiteren
  Bedarf liegen – soweit sie von militärischer Relevanz sind. Zudem ist geplant, bei
  der Elektrifizierung von Bahnstrecken künftig schneller voranzukommen. Bei Strecken
  unter 60 Kilometern werden die langwierige Umweltverträglichkeitsprüfung entfallen.
  Die Digitalisierung ist ein zentraler Bestandteil des Gesetzentwurfs. Planfeststellungsverfahren
  werden künftig vollständig digital durchgeführt – nach dem Prinzip „ digital only
  “, so auch die geplante Bürgerbeteiligung. Für Bürgerinnen und Bürger ohne Internetzugang
  ist eine Ausnahme vorgesehen. Das Infrastruktur-Zukunftsgesetz ist Teil einer umfassenden
  Beschleunigungsagenda der Bundesregierung. Weitere Vorhaben sind die Novelle des
  Umwelt-Rechtsbehelfsgesetzes, das Gesetz zur Stärkung der natürlichen Infrastruktur,
  sowie bereits getroffene Maßnahmen über das Vergabebeschleunigungsgesetz sowie der
  Föderalen Modernisierungsagenda . Bei neuen Verkehrsprojekten stellt sich weiterhin
  die Frage, inwieweit die Vorhaben mit dem Umwelt- und Naturschutz im Einklang stehen.
  Mit dem Gesetzentwurf bleiben die Belange des Naturschutzes durch konkrete und materielle
  Umweltstandards weiterhin von Bedeutung – das Infrastruktur-Zukunftsgesetzes konzentriert
  sich auf die Verfahren: Diese sollen so geregelt werden, dass dringend benötigte
  Neubauvorhaben nicht mehr blockiert werden können. Künftig soll es eine sorgfältige
  Ausbalancierung bei Vorhaben des überragenden öffentlichen Interesses geben. Für
  unvermeidbare Eingriffe in Natur und Landschaft stehen die Möglichkeiten Ausgleich,
  Ersatz und Ersatzgeldzahlung gleichrangig zur Verfügung. Konkret gilt dies für Vorhaben
  im Bereich Verkehr, Militär, Telekommunikation und Energieinfrastruktur  – sowie
  bei Vorhaben, die durch das Sondervermögen Infrastruktur und Klimaneutralität finanziert
  werden. Sondervermögen für Infrastruktur und Klimaneutralität : Das 500 Milliarden
  Euro starke Sondervermögen sorgt für die hohen Investitionen von Bund, Ländern und
  Kommunen. Das Geld soll insbesondere in moderne Schulen und Kitas, Bahnstrecken
  und Straßen sowie für Forschung und Digitalisierung investiert werden. Ziel ist
  es, mit dem Sondervermögen Deutschland zu modernisieren, den Wohlstand zu sichern
  und wieder ein höheres Wirtschaftswachstum zu erreichen.'
