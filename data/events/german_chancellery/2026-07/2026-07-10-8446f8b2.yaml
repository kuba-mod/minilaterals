title: Im Bundestag und Bundesrat beschlossen Bund entlastet Länder und Kommunen
text: 'Das Länder- und Kommunalentlastungsgesetz soll Ländern und Kommunen mehr Freiräume
  für Investitionen in Straßen, Schulen, Kitas und bürgernahe Dienstleistungen geben.
  Mit insgesamt rund vier Milliarden Euro will der Bund Länder und Kommunen bis einschließlich
  2029 finanziell unterstützen – rückwirkend zum 1. Januar 2026. Das Bundeskabinett
  hat dazu am 15. April einen Gesetzentwurf beschlossen. Hintergrund sind kaputte
  Straßen, sanierungsbedürftige Kitas und Schulgebäude, wenige Service-Zeiten der
  Bürgerbüros. In vielen Städten und Gemeinden müssen Bürgerinnen und Bürger Einschränkungen
  wie diese in Kauf nehmen. Der Grund: Viele Kommunen in Deutschland haben mit einer
  hohen Schuldenlast zu kämpfen. Insbesondere finanzschwache Kommunen haben Probleme,
  genügend Geld in Infrastruktur und freiwillige Dienstleistungen zu investieren,
  die den Bürgerinnen und Bürgern zugutekommen sollen. Die Zuständigkeit für die finanzielle
  Ausstattung der Kommunen liegt bei den Ländern. Der Bundesregierung ist es jedoch
  ein wichtiges Anliegen, dass die Kommunen handlungsfähig sind und sie vor Ort investieren
  können. Denn Menschen erleben gerade in ihrem direkten Umfeld, ob der Staat funktioniert
  und Straßen, Schulen und Kitas in einem guten Zustand sind. Um hier zu unterstützen,
  hat das Bundeskabinett den Gesetzentwurf zur Entlastung der Länder und ihrer Kommunen
  auf den Weg gebracht. Der Deutsche Bundestag hat dem Gesetzentwurf am 9. Juli zugestimmt,
  der Beschluss des Bundesrats folgte am 10. Juli. 250 Millionen Euro gehen jährlich
  an finanzschwache Flächenländer . Ziel ist, sie damit bei der Bedienung der kommunalen
  Altschulden zu unterstützen. Konkret sollen die Sonderlasten, die sich aus übermäßigen
  Verbindlichkeiten der Kommunen ergeben, ausgeglichen werden. Zur Entlastung ostdeutscher
  Länder für Rentenzahlungen aus dem Versorgungssystem der ehemaligen DDR stellt der
  Bund jährlich etwa 350 Millionen Euro zur Verfügung. So sinkt der Anteil der ostdeutschen
  Bundesländer an den Erstattungen für die Aufwendungen der Rentenversicherung von
  2026 bis 2029 von 50 auf 40 Prozent. Die finanzstarken Länder erhalten jährlich
  insgesamt etwa 400 Millionen Euro . Hintergrund ist, dass sie innerhalb des Länderfinanzausgleichs
  die Kosten zur Unterstützung der finanzschwächeren Länder zu tragen haben. Zur Finanzierung
  senkt der Bund die Umsatzsteuerabschläge, die der Bund von den finanzstarken Ländern
  erhebt. Der Gesetzentwurf steht für eine faire Aufgaben- und Finanzverteilung zwischen
  Bund, Ländern und Kommunen. Klar ist: Finanziell ausreichend ausgestattete Kommunen
  und ein gut funktionierendes Gemeinwesen stärken unsere Demokratie. Die Bundesregierung
  hat in dieser Legislaturperiode bereits zahlreiche Maßnahmen zur Entlastung der
  Länder und Kommunen ergriffen. So stehen den Ländern 100 Milliarden Euro aus dem
  Sondervermögen Infrastruktur und Klimaneutralität zur Verfügung. Dieses Geld können
  die Länder flexibel einsetzen, zum Beispiel für Investitionen in die Infrastruktur
  ihrer Kommunen. Darüber hinaus werden Mindereinnahmen des Investitions-Sofortprogramms
  weitgehend vom Bund getragen. Einnahmeausfälle der Kommunen von etwa 13,5 Milliarden
  Euro werden durch Anpassung der Festbeträge bei der Umsatzsteuer sogar vollständig
  übernommen. Außerdem haben sich Bund und Länder auf eine Finanzreform zur Entlastung
  der Städte und Gemeinden verständigt. In Zukunft wird der Bund Leistungsgesetze
  nur noch dann beschließen, wenn die damit verbundenen Kosten vor allem für die Gemeinden
  zum größten Teil ausgeglichen werden.'
