title: Bundesregierung aktuell
text: 'selten erlebt man Politik in einer derartigen Entscheidungsdichte wie in dieser
  Woche. Mit dem Programm für Aufschwung und Beschäftigung hat die Regierungskoalition
  nun das größte Reformpaket seit Beginn der Legislaturperiode vorgelegt. Steuerpolitik,
  Arbeitspolitik, Entbürokratisierung und eine Fülle anderer Vorschläge aus allen
  Winkeln des politischen Betriebs: Hier wird geerntet, was über Monate sorgsam gepflanzt,
  gehegt, gewässert und gezogen wurde. Erst die Gesundheitsreform, dann die Rente,
  nun Wachstum, Wettbewerb und Entbürokratisierung: Bei der Fülle der Reformvorhaben
  gerät schnell aus dem Blick, welches Ziel die Bundesregierung verfolgt. Es geht
  um Wohlstand und Sicherheit. Es geht um den Sozialstaat, der den Zusammenhalt unserer
  Gesellschaft garantiert, der die Stärke der politischen Mitte ausmacht. Bei all
  den Krisen in der Welt, dem Handelsdruck, den Kriegen aber auch der politischen
  Polarisierung von Gesellschaften im Inneren: Am Ende sind es Wohlstand und Sicherheit,
  die ein Land zusammenhalten. Darin steckt also das Versprechen, das sich im jüngsten
  Reformpaket in 34 Unterpunkte zerlegen lässt. Die Entscheidungen der Koalition sind
  nicht auf diese Wahlperiode allein angelegt. Sie sollen weit darüber hinaus reichen.
  Deswegen müssen sie mit einer Portion Ehrlichkeit serviert werden: Wer die Errungenschaften
  des Landes behalten möchte, muss sich auf Reformen und auch auf Einschnitte einlassen.
  Aus der Demoskopie wissen wir, dass über diese Erkenntnis großes Einvernehmen herrscht:
  Reformen sind nötig. Nun müssen auch die Lasten geteilt werden. Viele Maßnahmen
  werden Familien und Menschen mit kleinen und mittleren Einkommen entlasten. Die
  geplante Steuerreform soll dafür sorgen, dass mehr vom Erarbeiteten im eigenen Geldbeutel
  bleibt. Eine Familie mit Kindern und einem Einkommen von 60.000 Euro kann beispielsweise
  um bis zu 600 Euro pro Jahr entlastet werden. Gleichzeitig sollen die Vorschläge
  der Rentenkommission noch in diesem Jahr umgesetzt werden – ein gesetzgeberischer
  Kraftakt. Auch für die Wirtschaft gibt es neue Impulse. Bürokratische Hürden sollen
  abgebaut, Berichtspflichten reduziert und Verfahren vereinfacht werden. Gerade junge
  Unternehmen und Start-ups brauchen Luft, um zu investieren, zu wachsen und Arbeitsplätze
  zu schaffen. Mehr Dynamik soll es zudem beim Wohnungsbau geben, damit bezahlbarer
  Wohnraum schneller entsteht. Natürlich werden die einzelnen Vorschläge intensiv
  diskutiert werden. Das ist richtig und notwendig – und gehört zu einer lebendigen
  Demokratie. Reformen dieser Dimension berühren unterschiedliche Interessen. Deswegen
  werden wir noch lange über die Details diskutieren und an der Umsetzung feilen.
  Das ändert aber nichts an der prinzipiellen Entschlossenheit, diese Reformen voranzutreiben.
  In dieser Woche wurden also nicht nur Beschlüsse über Beschlüsse gefasst. Die Kaskade
  der Entscheidungen zeigt auch, dass die Bundesregierung den Willen hat, Deutschland
  zu reformieren und der Gesellschaft neue Kraft zu geben. „ Deutschland kann auf
  seinen Stärken aufbauen, aber darf sich nicht an die Vergangenheit klammern. Wir
  müssen jetzt beherzt zugreifen, Chancen erkennen und in die Zukunft aufbrechen.“
  – so steht es im Beschlusstext der Koalition. Es geht um Aufbruch und Gerechtigkeit.
  Die 21,5 Millionen Rentnerinnen und Rentner in Deutschland erhalten wegen der guten
  Lohnentwicklung ab 1. Juli 4,24 Prozent mehr Rente. Wir freuen uns über Ihr Feedback:
  Nutzen Sie bitte dafür das Kontaktformular (nicht die Antwortfunktion auf diese
  E-Mail).'
