title: Bundeskanzler Merz gratuliert dem Ministerpräsidenten der Republik Litauen,
  Herrn Mindaugas Sinkevičius
text: Sehr geehrter Herr Ministerpräsident, zu Ihrer Amtsübernahme übermittle ich
  Ihnen meine herzlichen Glückwünsche. Deutschland und Litauen verbindet eine enge
  Partnerschaft, die sich sowohl bilateral als auch in der Europäischen Union und
  der NATO bewährt. Die Stationierung der deutschen Brigade in Litauen unterstreicht
  unser gemeinsames Bekenntnis zur Sicherheit Europas. Ich freue mich darauf, unsere
  enge Zusammenarbeit mit Ihrer Regierung fortzusetzen und sie auch im Rahmen Ihrer
  bevorstehenden EU-Ratspräsidentschaft weiter auszubauen. Mit freundlichen Grüßen
  Friedrich Merz Bundeskanzler der Bundesrepublik Deutschland
