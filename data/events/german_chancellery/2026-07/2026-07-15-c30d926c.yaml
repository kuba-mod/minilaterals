title: Im Kabinett beschlossen Mehr Geld für berufliche Fortbildungen
text: Wer sich zum Friseurmeister fortbilden möchte, wird künftig mit dem geänderten
  Aufstiegs-BAföG noch besser unterstützt. Lehrgänge, Prüfungen, Materialien, Lebensunterhalt
  – berufliche Fort- und Weiterbildungen können mir erheblichen Kosten verbunden sein.
  Mit dem sogenannten Aufstiegs- BAföG bieten Bund und Länder hier finanzielle Unterstützung.
  Das Bundeskabinett hat nun eine Reform des seit 1996 bestehenden Förderangebots
  beschlossen. Das Aufstiegs- BAföG richtet sich an Teilnehmerinnen und Teilnehmer
  von Maßnahmen der beruflichen Aufstiegsfortbildung. Typische Aufstiegsfortbildungen
  sind etwa Meisterkurse oder Erzieher- und Technikerschulen. Anspruchsberechtigt
  sind alle, die sich mit einem Lehrgang oder an einer Fachschule auf eine anspruchsvolle
  berufliche Fortbildungsprüfung vorbereiten – unabhängig vom Alter. Nun will die
  Bundesregierung das Aufstiegs- BAföG noch attraktiver machen und die Förderleistungen
  ausbauen. Demnach bekommt – wer sich nach einer abgeschlossenen Berufsausbildung
  weiterbildet – künftig mehr Geld. Mit der Reform will die Bundesregierung die höherqualifizierende
  Berufsbildung und damit eine erfolgreiche Fachkräftegewinnung stärken. Durch gesetzliche
  Klarstellungen sowie die Streichung der Anrechnung von Arbeitgeberleistungen auf
  den Maßnahmenbeitrag des Aufstiegs- BAföG wird zudem der Vollzug spürbar entlastet.
  Das Gesetz soll zum 1. August 2027 in Kraft treten. Das Aufstiegsfortbildungsförderungsgesetz
  ( AFBG , auch „Aufstiegs- BAföG “, früher „Meister- BAföG “ genannt) unterstützt
  die Vorbereitung auf inzwischen mehr als 700 Fortbildungsabschlüsse. Die Förderung
  wird teilweise als Zuschuss, der nicht zurückgezahlt werden muss, teilweise als
  zinsgünstiges Darlehen gewährt. Die Kosten des Aufstiegs- BAföG tragen zu 78 Prozent
  der Bund und zu 22 Prozent die Länder.
