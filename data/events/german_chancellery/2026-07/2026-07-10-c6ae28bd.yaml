  Weg gebracht wird, das SGB-III-Modernisierungsgesetz, das Übergänge erleichtern
  und die Arbeitsförderung auch noch einmal unterstützen soll. Ich wollte meine Frage
  eh an Herrn Stratmann richten, denn ich wollte ganz gerne wissen, inwieweit Sie
  denn bereits Modelle durchgerechnet haben, wenn eben derartige, sage ich einmal,
  Varianten in Anspruch genommen werden. Das wäre ja alles auch haushaltswirksam,
  unter anderem bei Ihnen, denn vieles davon wird ja aus dem Bundesetat gefördert.
  Auf was stellen Sie sich denn angesichts der Nachrichten, wie sie sich bislang abzeichnen,
  jetzt rein finanziell ein? Jetzt fragen Sie natürlich nach laufenden Gesprächen,
  Entscheidungen und Konsequenzen, die so jetzt nicht getroffen worden sind. Insofern
  wäre das jetzt, darauf bezogen, dann doch eher etwas hypothetisch. Das, was Sie
  jetzt gerade mit „haushaltswirksam“ meinten, sind ja letztendlich auch Instrumente
  der Bundesagentur für Arbeit. Insofern sind das ja eben Maßnahmen oder Instrumente,
  die aus der Arbeitslosenversicherung bezahlt werden ‑ ich müsste mich jetzt korrigieren;
  ich vermute die Kollegen hören mit ‑ und in dem Sinne nicht haushaltswirksam sind,
  sondern Instrumente sind, die dann aus dem Haushalt der BA finanziert werden. Nun
  besteht der Haushalt der BA ja nicht aus irgendetwas, sondern der wird ja unter
  anderem durch die Arbeitslosenversicherung und Ähnliches gefüttert, genau den Bereich,
  in dem die Bundesregierung, Herr Meyer, bislang gesagt hat, da möchte sie gerne
  versuchen, Kostenanstiege zu vermeiden. Haben Sie denn in irgendeiner Form durchrechnen
  lassen, was das bedeutet? Wir machen jetzt hier ein bisschen den dritten Schritt
  vor dem ersten. Deshalb noch einmal: Wichtig ist, dass die Gespräche ja weiterhin
  zu laufen scheinen. Eine enge Sozialpartnerschaft ist, glaube ich, ein Markenzeichen
  nicht nur unserer Industrie insgesamt, sondern insbesondere der Automobilindustrie,
  natürlich insbesondere auch bei dem Unternehmen, über das wir gerade gesprochen
  haben. Natürlich geht es jetzt darum, dort Entscheidungen zu treffen, die der Verantwortung
  der Sozialpartner dann auch gerecht werden und die in die Zukunft weisen. Darum
  geht es. Wie gesagt, wir sollten nicht den dritten Schritt vor dem ersten machen.
  Ich wollte noch einmal ganz sichergehen, Herr Meyer, Frau Ungrad. Es finden jetzt
  keine direkten Gespräche des Kanzlers oder der Wirtschaftsministerin mit VW statt.
  Ist das richtig? Wir befinden uns generell im Gespräch mit der Automobilindustrie,
  aber es gibt keine direkten Gespräche, nein. Derzeit liegen mir darüber keine Erkenntnisse
  vor. Ich habe auch nichts anzukündigen. Natürlich stehen wir trotzdem mit den Protagonistinnen
  und Protagonisten der Industrie, der Automobilindustrie und auch des Unternehmens,
  das Sie jetzt gerade genannt haben, ständig im Austausch. Ein konkretes Gespräch
  habe ich jetzt hier nicht anzukündigen. Das betrifft nicht nur VW, aber die Automobilindustrie.
  Weil Sie gerade die Elektroautoförderung erwähnt hatten: Ist eigentlich geplant,
  da noch einmal nachzusteuern? Wenn ich es richtig sehe, kommt die Elektroautoförderung
  ja nämlich auch chinesischen Autos zugute. Das ist ja eigentlich für die Wettbewerbssituation
  von so einem Konzern wie VW, der da sehr engagiert ist, nicht unbedingt förderlich.
  Gibt es also Überlegungen der Bundesregierung, dass man quasi eine Klausel einführt,
  ähnlich wie beim Dienstwagenprivileg, dass nur Autos davon profitieren können, die
  in Deutschland oder Europa, also der EU, gebaut werden? Vielleicht darf ich das
  zuständige Ministerium bitten. Ich könnte vielleicht kurz etwas zu den Zahlen sagen,
  und zwar ist es nicht so, dass sozusagen überwiegend ausländische Fahrzeuge davon
  profitieren. Es ist also noch zu früh, das genau zu sagen. Das liegt sozusagen an
  dem Verhältnis der bewilligten Anträge und der Anträge und der Bewilligungen. Da
  sehen wir ungefähr einen Prozentsatz von 15 Prozent; so viel erst einmal zur aktuellen
  Situation. Bezüglich möglicher Anpassungen von Förderprogrammen würde ich das Wort
  noch einmal abgeben. Wer fühlt sich berufen, etwas zu Änderungen bei Förderprogrammen
  zu sagen? – Schweigen. Wir haben dieses Programm ja aus guten Gründen aufgelegt
  und auch haushalterisch hinterlegt. Die ersten Meldungen, die wir nach dem Antragsstart
  bekommen haben, waren ja wirklich sehr, sehr positiv. Generell, was die E-Auto-Absatzzahlen
  in Deutschland angeht, ist das, glaube ich, eine positive Entwicklung. Insofern
  habe ich hier nichts zusätzlich anzukündigen. Entschuldigung, dann muss ich doch
  noch einmal nachfragen. Es gibt ja zwei Ziele. Das eine Ziel ist, den Absatz zu
  fördern; deswegen gibt es die Prämie. Das zweite Ziel ist, die deutsche und vielleicht
  europäische Autoindustrie im Vergleich zu den steigenden Zahlen des Absatzes von
  chinesischen Autos in Europa, aber eben auch in Deutschland, wettbewerbsfähig zu
  halten. Darauf zielte die Frage ab, ob vorgesehen ist, dass man angesichts dieser
  steigenden Zahl von Anträgen, die für chinesische E-Autos vorliegen, noch einmal
  nachsteuern will. Wie gesagt, wurde die Grundthese, die Sie eben genannt haben,
  dass es überhaupt so ist, dass deutsche und europäische Autos nicht davon profitieren,
  vom BMUKN ja schon ein wenig in Frage gestellt. Insofern würde ich dafür auch noch
  einmal auf die Zahlen verweisen. Dass sie nicht davon profitieren, habe ich auch
  nicht gesagt. Aber der entscheidende Punkt ist auch, dass gleichzeitig die Autos
  von entscheidenden Wettbewerbern angesichts einer neuen Chinastrategie, die die
  Bundesregierung verfolgen will, auch mit Steuermitteln gefördert werden. Ist das
  von der Bundesregierung politisch gewünscht? Am Ende sind solche Förderprogramme,
  beispielsweise dieses, natürlich auch in europäisches Recht und in andere Dinge
  einzupassen. Noch einmal: Wir haben uns sehr bewusst auf den Weg gemacht, den Erwerb
  von E-Autos insbesondere auch für Menschen mit kleinem und mittlerem Einkommen ‑ ‑ ‑
  Das ist ja auch das Hauptziel dieses Förderprogramms gewesen, weil der Umstieg in
  der Vergangenheit für viele eben schwierig war. Deshalb haben wir es aufgelegt. ‑
  Noch einmal: Aus unserer Sicht ‑ so habe ich das BMUKN verstanden ‑ war die erste
  Bilanz wirklich sehr, sehr positiv, sowohl was die Nachfrage als auch was die Wirkung
  angeht. Wir haben ja das BMUKN hier sitzen. Vielleicht möchte das BMUKN selbst noch
  einmal seine Zahlen und Darstellungen erläutern. Zu den Zahlen kann ich nur sagen,
  dass wir uns hierbei im Prozess befinden. Sie haben gehört, dass das Förderprogramm
  wirklich sehr, sehr positiv ist. Es ist eine sehr hohe Zahl an Anträgen, die es
  bisher gibt. Es liegen weit über 65 000 vor. Sie alle werden jetzt aktuell abgearbeitet.
  Wir sind natürlich auch bemüht, transparent darüber zu informieren, wer davon profitiert.
  Das können wir an der Stelle tun, wenn mehr Anträge bewilligt werden. Wir haben
  auch schon immer auf die Erkenntnisse, die wir haben, verwiesen. Es wurde jetzt
  auch mehrfach angesprochen. Wir sehen also, dass die Anteile gerade der kleinen
  und mittleren Einkommen bei der Förderung wirklich sehr hoch sind. Insofern ist
  es aus unserer Sicht ein zufriedenstellendes Programm. Dann schiele ich noch zu
  Frau Ungrad, weil es natürlich auch wieder um Industriepolitik geht. Ist es im Sinne
  der Bundesregierung, wenn über die Förderung insbesondere von kleineren Automodellen
  in verstärktem Maße nicht deutsche oder europäische Autohersteller von staatlichen
  Fördermaßnahmen profitieren? Ich finde, dass der stellvertretende Regierungssprecher
  es gut erläutert hat. Dem schließe ich mich an. Ich habe eine Frage an Herrn Meyer
  und Herrn Kaminski zur Reform des BND-Gesetzes , konkret zum Referentenentwurf,
  der vor ein paar Tagen veröffentlicht wurde. In der Begründung heißt es, dass der
  BND im Verteidigungs-, Spannungs- oder Zustimmungsfall auch die Befugnis hat, Zitat,
  „die gegnerischen Angriffsfähigkeiten zu schwächen“, nötigenfalls mit „kinetischen
  Mitteln“. Können Sie vielleicht erläutern, was genau diese kinetischen Mittel sind,
  die der Bundesregierung dabei vorschweben? Das Wort hat ja schon einen besonderen
  Klang. Ich habe ja am Mittwoch ‑ da war die BND-Novelle auch schon Thema ‑ auch
  schon ein paar Sätze dazu gesagt. Wir befinden uns jetzt in einem Stand, in dem
  sich dieses Gesetz und auch mehrere Gesetze, die unsere Sicherheitsbehörden betreffen,
  in der Ressortabstimmung befinden. Das heißt, dass wir noch nicht einmal bei einem
  Kabinettsbeschluss und erst recht nicht bei einem Gesetz sind, sondern darüber wird
  jetzt ja auch diskutiert. Deshalb würde ich hier jetzt, in diesem frühen Stadium,
  nicht einzelne Maßnahmen auseinandernehmen, weil, wie gesagt, dafür jetzt ja auch
  eine Ressortabstimmung läuft. Wenn Entscheidungen getroffen werden, können wir das
  dann im Einzelnen auch darlegen. Grundsätzlich ist es natürlich so, dass sich die
  Sicherheitslage in Deutschland und in Europa und sicherlich auch weltweit einfach
  komplett verändert hat. Deshalb haben wir uns auf den Weg gemacht, unsere Sicherheitsdienste
  wirklich auch an die Herausforderungen dieser neuen Zeit anzupassen. Dabei haben
  wir enormen Nachholbedarf. Ich glaube, das kann man einmal so klar aussprechen.
  Deshalb haben wir uns auf den Weg gemacht, den BND mit diesem Gesetz wirklich neu
  aufzustellen, neue Fähigkeiten und neue, effektivere Möglichkeiten, seinen Dienst
  am Ende zu tun, zur Verfügung zu stellen und den gesetzlichen Rahmen dafür zu schaffen.
  Deshalb haben wir uns auf den Weg gemacht und auch intensive Diskussionen, auch
  bereits im Vorfeld. Noch einmal: Jetzt befinden wir uns in der Ressortabstimmung.
  Dabei wird es sicherlich weitere Hinweise, Eingaben etc. geben, bis es dann zu einem
  endgültigen Beschluss kommt. Herr Meyer, ich finde es ein bisschen schwierig, wenn
  man als BPA auch für das Kanzleramt zuständig ist ‑ es ist ja der Kanzleramtsgesetzentwurf
  für das BND-Gesetz ‑ und dann nicht einmal in der Lage ist, zu erläutern, warum
  man kinetische Mittel anstrebt. Kinetische Mittel sind ja nicht irgendetwas. Sie
  sind ja wirklich Wirkmittel. Das heißt: die haptische Einwirkung auf physische Gegenstände
  und Personen. Das ist ja keine Kleinigkeit. Erläutern Sie doch bitte einmal, was
  der Gedanke dahinter ist. Warum muss der BND im Ausland Dinge zerstören können bzw.
  Menschen auch angreifen können? Das ist es ja de facto. Deshalb habe ich ja gerade
  auf die Frage hin begründet, warum wir hierbei Veränderungen vornehmen, nämlich
  weil sich die Sicherheitslage massiv geändert hat. Das betrifft ganz viele Bereiche.
  Sie haben jetzt einen Bereich genannt. In der Tat darf der BND künftig auf Basis
  dieser Reform im Rahmen von spezifischen Gefährdungslagen aktiv einwirken, um Gefährdungen
  durch eine fremde Macht abzuwenden. Das ist dann auch sozusagen ein Qualitätssprung.
  Noch einmal: Den begründen wir mit der veränderten Sicherheitslage. Deshalb ist
  es notwendig. Worauf ich nur hingewiesen habe, ist, dass wir hier in der Regel ja
  auch sonst nicht im Detail über Entwürfe diskutieren und beraten. Sie befinden sich
  ja mitten in einer Ressortabstimmung. Das heißt, dass sich dieser Entwurf sicherlich
  auch noch weiterentwickeln wird. Darauf habe ich nur hingewiesen: dass ich dann
  natürlich, wenn es zu einem Kabinettsbeschluss kommt, sicherlich die Details, die
  möglich sind ‑ ‑ ‑ Wir befinden uns beim BND ja auch immer im Bereich der Nachrichtendienste,
  in dem man auch genau schauen muss, welche Informationen geteilt werden können und
  welche nicht. Deshalb habe ich auf die prozessualen Dinge hingewiesen. Aber noch
  einmal: Der Grund ist die veränderte Sicherheitslage und die Notwendigkeit, den
  BND und auch weitere Sicherheitsbehörden wie beispielsweise auch den Verfassungsschutz
  so auszurichten, dass unsere Sicherheit hier in Deutschland, die Sicherheit der
  Bürgerinnen und Bürger auch in Zukunft gewährleistet ist. Dann lasse ich bitte einmal
  für das Protokoll vermerken, dass Herr Meyer bereit ist, nach der Kabinettsfassung
  darüber zu sprechen und dann nicht darauf verweist, dass es dann Sache des Bundestages
  in der Beratung sei. Vielen Dank. Dann weise auch ich für das Protokoll darauf hin,
  dass ich auf dieses Spannungsfeld gerade explizit hingewiesen habe. Das ist auch
  wichtig. Trotzdem ist es ja ‑ das sehen Sie ja auch; auch der BND selbst kommuniziert
  durchaus auch stark über das, was er tut, weil wir eben wirklich sehen, dass sich
  auch unsere Nachrichtendienste weiterentwickeln müssen ‑ ‑ ‑ Es hat einfach etwas
  mit dieser veränderten Sicherheitslage in Deutschland und Europa zu tun. Es sind
  andere Zeiten. Es sind neue Zeiten. Deshalb braucht es hierfür auch neue Antworten.
  Ich hätte noch eine Frage an Herrn Meyer zum Thema von Hitzetoten . Das RKI hat
  ja gestern Zahlen über die hitzebedingte Mortalität veröffentlicht, das Statistische
  Bundesamt auch. Man sieht, dass in der Woche mit den extremen Temperaturen Ende
  Juni doch mehrere Tausend Menschen mehr gestorben sind als in den Wochen zuvor und
  mehr, als es normalerweise für eine Woche üblich ist. Jetzt gibt es den Vorwurf
  aus der Opposition, gerade von den Grünen, dass der Kanzler sich zu diesem Thema
  der Hitze und der Hitzetoten die ganze Zeit nicht geäußert habe und das Thema nicht
  ernst genug nehme. Da wir jetzt wahrscheinlich die nächsten Hitzewellen vor uns
  haben, wollte ich fragen, was Sie zu dem Vorwurf sagen und ob der Kanzler plant,
  sich dieses Hitzethema auch zu eigen zu machen. Normalerweise würde ich zu Äußerungen
  aus dem parlamentarischen Raum hier nichts sagen. Aber es ist ja durchaus ein schwerwiegender
  Vorwurf, der da gemacht wird. Deshalb möchte ich ihn schon auch in aller Klarheit
  zurückweisen. Es ist in der Tat so, dass wir uns offensichtlich mit dem Phänomen
  der Hitze und auch den Folgen massiv beschäftigen müssen. Wir tun das nicht erst
  seit dem vorletzten Wochenende, sondern bereits seit Monaten und Jahren. Es hat
  in der gesamten Bundesregierung eine hohe Aufmerksamkeit. Ich erspare Ihnen jetzt,
  auf Zuständigkeiten hinzuweisen, die es in dem Bereich nun einmal gibt. Aber nichtsdestoweniger
  begreifen wir das Thema des Hitzeschutzes natürlich als Gemeinschaftsaufgabe. Deshalb
  stellen wir als Bund ‑ darauf haben wir auch immer wieder hingewiesen ‑ zum Beispiel
  auch Mittel zur Verfügung. Ich weise nur auf das Sondervermögen Infrastruktur und
  Klimaneutralität hin, aus dem dann zum Beispiel auch Mittel für den Hitzeschutz
  verwendet werden können. Noch einmal: Wir begreifen es als Aufgabe, in der unterschiedliche
  Ebenen ineinandergreifen. Es ist etwas, was uns alle betrifft und was uns alle auch
  umtreibt und zu dem übrigens auch wir als Bundesregierung zum Beispiel über die
  Seiten des Gesundheitsministeriums transparent informieren, was jeder Einzelne vielleicht
  auch tun kann, um sich in akuten Situationen zu schützen. Aber natürlich geht es
  auch darum, die staatlichen Strukturen und Infrastrukturen so zu verändern, dass
  sie den Hitzeschutz auch wirklich gewährleisten können. Es ist für uns ein ganz,
  ganz wichtiges Thema, weil es wirklich sehr, sehr viele Menschen, übrigens auch
  uns ‑ wir, die hier oben sitzen, sind auch Menschen ‑ ganz akut betrifft. Die Frage
  zielte natürlich ein bisschen persönlicher auf den Kanzler, darauf, dass er sich
  nicht zu dem Thema äußert. Ansonsten hat der Umweltminister ja schon Stellung genommen.
  Ist geplant, dass er selbst sich dieses Thema in Form einer Rede oder anderer Dinge
  annimmt? Erst einmal habe ich mich hier und, glaube ich, hat sich auch Herr Kornelius
  als Sprecher des Bundeskanzlers ja auch schon dazu geäußert. Ich kann Ihnen versichern,
  dass der Bundeskanzler sich mit diesem Thema auch intensiv beschäftigt und befasst.
  Herr Meyer, was konkrete Maßnahmen angeht ‑ die nächste Hitzewelle scheint sich
  ja gerade schon anzukündigen; es wird wieder um die 40 Grad Celsius, zumindest im
  Südwesten ‑, würde ich gern wissen: Plant die Bundesregierung, in irgendeiner Form
  eigene Maßnahmen zu ergreifen, sei es ‑ was weiß ich ‑, das THW loszuschicken um
  zu helfen, um Städte abzukühlen oder, was auch immer man sich alles vorstellen kann?
  Das zweite, etwas größere daran Hängende, ist diese Frage: Eine der Maßnahmen, die
  zum Hitzeschutz beiträgt, ist der passive, aber auch der aktive Hitzeschutz bei
  Gebäuden. Dazu würde ich ganz gern wissen, ob es Pläne innerhalb der Bundesregierung
  gibt, die Hitzeschutzmaßnahmen ins überragende öffentliche Interesse zu stellen,
  um damit beispielsweise Probleme beim Denkmalschutz zu beseitigen. Das war jetzt
  eine vielschichtige Frage, die vielleicht auch weitere Häuser betrifft, die mir
  dabei sicherlich auch noch aushelfen können. Ich will es aber, da Sie nach konkreten
  Maßnahmen gefragt haben, wirklich noch einmal darlegen, damit es auch klar ist:
  Grundsätzlich ist es in Deutschland Aufgabe der Länder und Kommunen ‑ das ist sozusagen
  die Arbeitsteilung, auf die wir uns verständigt haben ‑, regional angepasste Hitzemaßnahmen
  und Hitzeaktionspläne zu entwickeln. Die Bundesregierung unterstützt Länder und
  Kommunen dabei, Menschen besser vor den Folgen extremer Hitze zu schützen. Wir unterstützen
  bei der Aufklärung und Vernetzung. Es gibt den Hitzeschutzplan für Gesundheit mit
  Hitzeschutzplänen für die Bereiche Sport, Apotheken und psychotherapeutische Praxen.
  Darauf haben wir einen besonderen Schwerpunkt gelegt. Darüber hinaus gibt es zum
  Beispiel das Portal hitzeservice.de, das auch zur Verfügung gestellt wird. Es enthält
  Angebote zum speziellen Schutz spezieller Risikogruppen: für ältere Menschen, für
  Kinder, insbesondere auch für Wohnungslose und Pflegebedürftige. Es gibt das Hitzemonitoring
  des Robert Koch-Instituts, das wir weiterentwickelt haben, um Auswirkungen von Hitzewellen
  besser einschätzen zu können. Zudem informiert das Portal klima-mensch-gesundheit.de
  des Bundesinstituts für öffentliche Gesundheit ‑ das ist, glaube ich, im Bereich
  BMG nachgeordnet ‑ auch die Öffentlichkeit und auch Privatpersonen, wie gesagt,
  über Präventionsmaßnahmen, aber auch Fördermöglichkeiten, die es gibt. Wir unterstützen
  auch Städte und Gemeinden dabei, sich durch mehr Grünflächen, Schatten und Frischluftschneisen
  langfristig hitzeresilienter auszugestalten. Auch auf das Sondervermögen habe ich
  hingewiesen. Das, was ich jetzt hier dargelegt habe, ist sicherlich nicht umfassend,
  zeigt aber, glaube ich, dass auch wir uns dieses Themas sehr stark angenommen haben.
  Vielleicht möchte der ein oder andere Kollege noch ergänzen. Ich kann mich den Aussagen
  von Herrn Meyer eigentlich nur anschließen. Er hat es ja schon schön vorgetragen.
  Auch wir haben uns ja hier in den vergangenen Wochen schon einmal geäußert. Das
  BMG informiert vor allem und klärt auf. Wenn es jetzt um so etwas wie Stadtentwicklung
  etc. geht, würde ich auf die andere Seite verweisen. Genau, Stadtentwicklung ist
  unser Thema. Wir haben dazu natürlich auch verschiedene Maßnahmen, die allerdings
  eher langfristig wirken. Zu dem, was Sie jetzt auch gefragt haben, kann ich mit
  kurzfristigen Maßnahmen nicht aushelfen. Sie wissen ja, dass wir in der Städtebauförderung
  dieses Jahr bei einer Milliarde Euro sind. Damit werden auch klimaschonende Maßnahmen
  oder klimaschützende Maßnahmen gefördert. Es gibt das Programm der Anpassung urbaner
  und ländlicher Räume an den Klimawandel ‑ dazu haben wir auch gerade erst veröffentlicht,
  wie viele ausgewählt wurden ‑ und die Agenda Stadt grün-blau, in der es darum geht,
  mehr grüne und blaue Infrastruktur in die Städte zu integrieren, um die Städte herunterzukühlen.
  Aber es sind, wie gesagt, halt langfristige Maßnahmen. Tatsächlich müsste ich einmal
  nachschauen, ob wir im Gebäudebereich noch irgendetwas nachreichen können. Natürlich
  ist es so, dass bei den Neubauförderprogrammen ‑ das wissen Sie auch ‑ ein bestimmter
  Förderstandard gilt. Das bedeutet auch, dass die Gebäude besonders gut gedämmt sind
  und eine Hitzeentwicklung in Gebäuden gar nicht so sehr stattfinden kann. Wenn ich
  noch etwas habe, reiche ich es gern noch nach. Ich würde gern noch erwähnen, dass
  an dieser Stelle auch ein Sprecher unseres Hauses schon relativ viele Maßnahmen
  vorgestellt hat. Diese würde ich jetzt nicht noch einmal wiederholen. Ich würde
  aber darauf hinweisen, dass es aus unserer Sicht schon so ist ‑ wir haben auf die
  Zuständigkeiten hingewiesen ‑, dass wir als Bund auch das Ziel haben oder bereit
  sind, dabei mehr in die Verantwortung zu gehen und eine dauerhafte gemeinsame Finanzierung
  von Hitzeschutz und Klimaanpassung durch Bund und Länder zu erreichen. Dafür ist
  eine neue Bund-Länder-Gemeinschaftsaufgabe nötig. Dazu gibt es auch intensive Gespräche
  mit den Ländern. Hat das BMI auch noch etwas zu ergänzen? Ich hatte das THW als
  Beispiel angesprochen. Grundsätzlich ist es ganz lapidar ausgedrückt natürlich die
  Aufgabe des THW, die Bevölkerung in Situationen, in denen Schwierigkeiten bestehen,
  zu unterstützen. Konkret habe ich dazu jetzt erst einmal nichts zu sagen. Ich habe
  eine Nachreichung. Es geht um das Inkrafttreten des Gebäudemodernisierungsgesetzes
  . Wenn das Gesetz neben den üblichen Unterschriften durch den Bundesrat und durch
  den Bundestag bis hin zum Bundespräsidenten geht, wird es dann im Bundesgesetzblatt
  erscheinen und damit in Kraft treten. Ausnahmen sind manche Regelungen zur EPBD.
  Dafür gibt es noch ein bisschen mehr Zeit zur Vorbereitung. Sie treten ein halbes
  Jahr später in Kraft. Aber wenn es im Bundesgesetzblatt steht, ist es dann grundsätzlich
  in Kraft getreten.'
