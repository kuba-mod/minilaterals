date: '2026-07-10'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 10. Juli 2026
text: 'stellvertretender Regierungssprecher Meyer (Vorsitzender Feldhoff eröffnet
  die Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der
  Ministerien.) Ich werfe einen Blick auf die Termine des Bundeskanzlers in der nächsten
  Woche, die tatsächlich gut gefüllt ist. Der Bundeskanzler wird am Montag, den 13. Juli,
  zur Eröffnung der Adenauer School of Government an der Universität zu Köln gegen
  13 Uhr eine Rede halten. Danach geht es für mehrere Termine nach Paris . Um 17 Uhr
  wird der Bundeskanzler an einem Treffen der Koalition der Willigen teilnehmen. Hierbei
  wird es um eine gemeinsame Bestandsaufnahme zu den Sicherheitsgarantien für die
  Ukraine, die weitere Unterstützung der Ukraine sowie die Abstimmung über Wege zu
  einem gerechten und dauerhaften Frieden für die Ukraine gehen. Am Dienstag, den
  14. Juli, wird der Bundeskanzler am Vormittag auf Einladung von Präsident Emmanuel
  Macron an den Feierlichkeiten zum französischen Nationalfeiertag teilnehmen. Es
  ist für den Bundeskanzler eine persönliche Ehre, auf der Ehrentribüne an der Militärparade
  auf den Champs-Élysées teilzunehmen. Zugleich senden unsere beiden Länder damit
  gemeinsam ein starkes Signal deutsch-französischer Freundschaft und Verbundenheit.
  Dann geht es zurück nach Deutschland. Der Kanzler nimmt am Abend des 14. Juli 2026
  auf dem Marktplatz Ahrweiler zusammen mit dem Ministerpräsidenten von Rheinland-Pfalz,
  Gordon Schnieder, an der Gedenkveranstaltung anlässlich des fünften Jahrestages
  der Flutkatastrophe im Ahrtal teil. Der Bundeskanzler wird dort eine Rede halten.
  Die Gedenkveranstaltung ist presseöffentlich. Zuvor besuchen der Bundeskanzler und
  der Ministerpräsident gemeinsam in Bad Neuenahr-Ahrweiler eine städtische Baumaßnahme
  im Kurpark, um sich über den Stand des Wiederaufbaus zu informieren. Außerdem werden
  sie mit jungen Ehrenamtlichen aus dem Ahrtal und Gewerbetreibenden sprechen. Am
  Mittwoch, den 15. Juli, tagt wie gewohnt um zehn Uhr das Bundeskabinett unter Leitung
  des Bundeskanzlers. Wie Sie möglicherweise bereits mitbekommen haben, geht es in
  dieser Woche um das sogenannte Entlastungskabinett. Dabei geht es vorwiegend um
  Bürokratierückbau und Entlastungen. Beide Themen bilden den Schwerpunkt dieser Kabinettssitzung.
  Um 13 Uhr wird sich der Bundeskanzler, wie traditionell üblich vor der parlamentarischen
  Sommerpause, hier in der Bundespressekonferenz Ihren Fragen zu aktuellen Themen
  der Innen- und Außenpolitik stellen. Er in seiner Funktion als Bundeskanzler das
  zweite Mal hier zu Gast. Am Donnerstag, den 16. Juli, empfängt der Bundeskanzler
  um 14.30 Uhr den Staatspräsidenten der Demokratischen Volksrepublik Algerien , Abdelmadjid
  Tebboune im Kanzleramt . Im Vordergrund des Treffens stehen unter anderem die bilateralen
  Beziehungen und die Themen von Wirtschaft, Energie und Rohstoffen. Für 15.30 Uhr
  ist eine Pressekonferenz geplant. Zuvor wird der algerische Staatspräsident von
  Bundespräsident Frank-Walter Steinmeier in der Villa Borsig mit militärischen Ehren
  empfangen. Anschließend reist der Bundeskanzler nach Nordrhein-Westfalen. Am Vorabend
  des deutsch-französischen Ministerrats wird er den französischen Staatspräsidenten
  Macron zum zweiten Mal in dieser Woche treffen. Die beiden werden kurze Pressestatements
  geben. Danach sind ein Delegationsgespräch sowie ein Abendessen geplant. Am Freitag,
  den 17. Juli, wird gegen neun Uhr der Tag mit einer Sitzung des Deutsch-Französischen
  Verteidigungs- und Sicherheitsrats unter Leitung des Bundeskanzlers sowie des französischen
  Staatspräsidenten auf dem Fliegerhorst Nörvenich beginnen. Gemeinsam mit den Außen-
  und Verteidigungsministern werden außen- und sicherheitspolitische Themen im Vordergrund
  der Gespräche stehen, einschließlich Fragen der strategischen Zusammenarbeit. Parallel
  dazu kommen die weiteren teilnehmenden Bundesministerinnen und -minister mit ihren
  französischen Counterparts auf Schloss Augustusburg in Brühl zu bilateralen Gesprächen
  zusammen. Staatspräsident Macron wird dort gegen elf Uhr offiziell mit militärischen
  Ehren begrüßt. Im Anschluss daran findet der deutsch-französische Ministerrat unter
  Leitung des Bundeskanzlers und des französischen Staatspräsidenten statt. Bei dem
  Treffen stehen die Themen von Wirtschaft und Wettbewerbsfähigkeit sowie gesellschaftlichem
  Austausch und Resilienz im Fokus. Gleichzeitig wird der Ministerrat über gemeinsame
  deutsch-französische Impulse für eine Reihe von Themen auf EU-Ebene beraten. Zum
  Abschluss ist am Freitag für 15 Uhr eine gemeinsame Pressekonferenz von Staatspräsident
  Macron und Bundeskanzler Merz vorgesehen. Ministerin Reem Alabali Radovan wird am
  Montag nach Brüssel reisen. Sie wird an einem Treffen der Palestine Donor Group
  teilnehmen. Unter dem Vorsitz von EU-Kommissarin Šuica und dem palästinensischen
  Ministerpräsidenten Mustafa kommt diese Gruppe am Montag zu ihrem zweiten Treffen
  in Brüssel zusammen. Im Zentrum stehen drei Punkte. Es geht um eine neue Initiative
  zur Unterstützung von Sofortmaßnahmen in Gaza, die sogenannten „early recovery“-Maßnahmen;
  es geht um eine Bestandsaufnahme der finanziellen Lage der palästinensischen Behörde
  PA, und es geht um die Fortschritte bei der Umsetzung der Reformagenda der PA. Die
  Ministerin wird um 15.45 Uhr einen Doorstep, ein kurzes Statement, geben, wozu wir
  dann auch eine Pressemitteilung versenden. (zur Reise des Bundeskanzlers nach Paris
  ) Herr Meyer, können Sie ein bisschen präzisieren, was bei der Koalition der Willigen
  jetzt, nach dem NATO-Gipfel, noch als neues Element dazukommen soll? Die umfassenden
  Finanzzusagen hat es ja schon in Ankara gegeben. Was sind also die neuen Elemente,
  und warum ist dieses Treffen überhaupt notwendig? Sie haben es gesagt, die Ukraine
  war beim NATO-Gipfel natürlich ein wichtiges Thema. Aber es ist durchaus auch wichtig,
  gerade angesichts des derzeitigen Stands auch der Fortentwicklung des Ukrainekrieges,
  in der sogenannten Koalition der Willigen, die ja vor allen Dingen aus europäischen
  und weiteren Unterstützerinnen und Unterstützern der Ukraine besteht, wirklich eine
  gemeinsame Bestandsaufnahme vorzunehmen. Wo stehen wir, und was sind auch gemeinsame
  Wege, die wir als Unterstützerinnen und Unterstützer der Ukraine gehen können, um
  dazu beitragen zu können, die Chance und das Zeitfenster, das sich möglicherweise
  in der Zukunft ergeben könnte, für einen gerechten und dauerhaften Frieden, zu nutzen?
  Deshalb, ist es, denke ich, ein guter Moment, das zu vertiefen. Beim NATO-Gipfel
  stand, wie gesagt, eine Reihe von Themen auf der Tagesordnung. Hier jetzt ist der
  klare Fokus auf die Ukraine gerichtet. Können Sie präzise sagen, was die Elemente
  sein könnten, die dort wirklich neu beschlossen werden? Eine Bestandsaufnahme hat
  man ja schon in Ankara gemacht. Warum also jetzt noch dieses Treffen? Es ist ein
  anderer Kreis, der dort zusammenkommt. Ich glaube, es kann gar nicht genug Gespräche
  und Austausch geben, gerade im Zusammenschluss der Partnerinnen und Partner der
  Ukraine, um dieses Gespräch auch fortzusetzen. Was konkrete „outcomes“, konkrete
  Ergebnisse des Treffens, angeht, würde ich natürlich auf das Treffen selbst verweisen.
  Aber noch einmal: Nur weil ein NATO-Gipfel stattgefunden hat, ist die Diskussion
  für uns ja nicht beendet, im Gegenteil. Wir wollen jede Möglichkeit und jede Gelegenheit
  nutzen, weil es in unserem ureigensten Interesse ist, die Ukraine nicht nur langfristig
  zu unterstützen, sodass sie standhalten kann, sondern auch Wege zu einem gerechten
  und dauerhaften Frieden zu finden. Das ist für die Ukraine und auch für uns Europäer
  besonders wichtig. Herr Meyer, gerade in den letzten Wochen gab es mehrfach Berichterstattungen,
  wonach das Verhältnis zwischen Herrn Merz und Herrn Macron sehr abgekühlt sei. Können
  Sie beschreiben, wie dieses Verhältnis aus Sicht der Bundesregierung ist? Es entwickelt
  sich ja auch insofern auseinander, als Macron nicht für eine weitere Amtszeit zur
  Verfügung steht und Deutschland über viele finanzielle Mittel verfügt, die in Frankreich
  auch Sorge verursachen, gerade im Verteidigungsbereich. Wie würden Sie das Verhältnis
  beider Länder und der Staats- und Regierungschefs einschätzen? Ich würde es als
  sehr gut bezeichnen. Es ist auch über die vergangenen Monate der Zusammenarbeit
  des Bundeskanzlers mit dem französischen Staatspräsidenten sogar noch weiter gewachsen.
  Wir sehen ja auch an jeder Stelle, egal ob es um wirtschaftspolitische Fragen, um
  europapolitische Fragen, um Fragen der gemeinsamen europäischen Sicherheit oder
  um die Ukraine geht, dass Deutschland und Frankreich in vielen Bereichen wirklich
  gemeinsame Interessen haben, dass sie gemeinsam auch stärker sind, wenn wir die
  Kräfte zwischen Deutschland und Frankreich bündeln. Deshalb zeigt die nächste Woche
  mit der Präsenz des Bundeskanzlers beim Nationalfeiertag, aber dann insbesondere
  auch mit dem deutsch-französischen Ministerrat, bei dem es ja nicht nur ein Treffen
  zwischen dem Staatspräsidenten und dem Bundeskanzler gibt, sondern bei dem wir in
  der gesamten Bandbreite der Arbeit der beiden Regierungen weitere Schritte vereinbaren
  werden, wie groß unser Interesse an diesem tiefen und engen Dialog ist, den wir
  haben und den wir fortlaufend haben werden. Von einer Abkühlung kann da überhaupt
  keine Rede sein, im Gegenteil. Das Verhältnis ist sehr gut, und wir arbeiten weiter
  daran, dass das so bleibt. Ich will es wirklich noch einmal betonen: Alle wichtigen
  Fragen, die uns in der Bundesregierung beschäftigen, sind am Ende auch Fragen, die
  in irgendeiner Form das deutsch-französische Verhältnis betreffen. Deshalb ist dieser
  Austausch so intensiv, und deshalb hat der Bundeskanzler es als große Ehre empfunden,
  dass er eingeladen wurde, auch für die kommende Woche, und hat sofort und sehr gern
  zugesagt. Sie haben die Europapolitik erwähnt. Es gibt aber doch massive Differenzen
  zwischen beiden Ländern, etwa was die künftigen Finanzen angeht. Ist es nicht so,
  dass Frankreich und Deutschland eigentlich fundamental andere Vorstellungen haben,
  wohin sich die EU entwickeln soll? Es ist doch völlig klar, dass wir miteinander
  auch über die richtigen Wege sprechen. Das gehört, denke ich, zu einer Partnerschaft
  dazu. Hinsichtlich des Ziels eines wirtschaftlich starken, eines sicheren Europas
  besteht überhaupt kein Dissens. Deshalb arbeiten wir gemeinsam an den richtigen
  Wegen, um das auch zu erreichen. Herr Meyer, es gibt mindestens einen Medienbericht,
  wonach beide Seiten, Deutschland und Frankreich, ein Chinapapier vorbereiten, das
  im Ministerrat vorgestellt und verabschiedet werden soll. Können Sie das bestätigen?
  Wenn ja: Was steht denn in diesem Papier? Wes Geistes ist dieses Papier? Sie werden
  Verständnis dafür haben, dass ich Ihnen zu einzelnen möglichen Inhalten dieses Treffens
  jetzt noch nichts darbieten kann. Dafür laufen ja auch Gespräche Das bezieht sich
  allgemein auf das Treffen. Dass faire Handelsbeziehungen auf der Welt für unsere
  beiden Länder ein wichtiges Thema sind, ist, denke ich, klar. Zu der spezifischen
  Frage habe ich hier nichts anzukündigen und auch keine weiteren Details. Vielleicht
  weiß das Wirtschaftsministerium etwas. Auf einem der letzten Ministerräte sind führende
  Ökonomen beider Länder beauftragt worden, Memos zu erstellen. Eines ging inhaltlich
  in Richtung Chinas. Der Inhalt war schon sehr spannend, weil darin von einer weitgehenden
  Marktlockerung gegenüber China die Rede war. Ist das weiterverfolgt worden? Wissen
  Sie, wie der Stand diesbezüglich ist? Ist dieses Papier irgendwo eingeflossen, oder
  ist es versandet? Zu einzelnen auf EU-Ebene diskutierten Handelsinstrumenten kann
  ich Ihnen keinen Stand mitteilen. Darüber liegen mir keine Erkenntnisse vor. Ich
  weiß nicht, ob das in Herrn Meyers oder eher Herrn Kaminskis Zuständigkeit liegt.
  Das Ahrtal hat ja eine gewisse Historie. Kann der Kanzler irgendetwas an Ankündigungen
  mitbringen, was beispielsweise den Hochwasserschutz oder den Katastrophenschutz
  speziell in dieser Region betrifft? Ich will erst einmal noch einordnend zum Besuch
  sagen, dass die schrecklichen Bilder, die Verluste und die Schäden dieser Hochwasserkatastrophe
  im Ahrtal dem Bundeskanzler noch sehr präsent sind. Bei der Flut in Rheinland-Pfalz
  und Nordrhein-Westfalen im Jahr 2021 sind über 180 Menschen gestorben. Dem Kanzler
  ist sehr bewusst, dass die Folgen dieser verheerenden Katastrophe die Bevölkerung
  vor Ort bis heute sehr belasten. Das hat tiefe Wunden gerissen und war wirklich
  eine Katastrophe für die ganze Region und für viele Menschen, die davon betroffen
  waren. Der Bund steht an der Seite der Opfer und der betroffenen Kommunen. Deshalb
  war es dem Bundeskanzler ein Anliegen, dort vor Ort zu sprechen. Konkret zu den
  Sachschäden: Das enorme Ausmaß der Sachschäden zeigte sich schon unmittelbar nach
  der Katastrophe. Der Bund hat unmittelbar nach der Flutkatastrophe gemeinsam mit
  den Ländern zunächst 800 Millionen Euro an Soforthilfe und dann für den langfristigen
  Wiederaufbau mit dem errichteten Sondervermögen „Aufbauhilfe 2021“ bis zu 30 Milliarden
  Euro bereitgestellt. Davon sind gemäß der Verordnung über die Verteilung und Verwendung
  der Mittel des Fonds „Aufbauhilfe 2021“ bis zu 28 Milliarden Euro für die Wiederaufbaumaßnahmen
  in den Ländern und zwei Milliarden für den Wiederaufbau der Bundesinfrastruktur
  ‑ das betrifft insbesondere Autobahnen und Schieneninfrastruktur ‑ vorgesehen. Bislang
  sind aus dem Sondervermögen Mittel in Höhe von insgesamt rund 6,2 Milliarden Euro
  abgerufen worden. Davon gingen rund 5,2 Milliarden Euro an die Länder. Knapp eine
  Milliarde Euro wurde für den Wiederaufbau von Bundesinfrastruktur verwendet. Was
  Hochwasserhilfen angeht, sind die Länder zuständig. Das umfasst auch die Antragsverfahren,
  die Bewilligung und auch die Auszahlung der Hilfen an die Geschädigten. Die bewirtschaftenden
  Ressorts stellen den Ländern die Mittel in Höhe der jeweils gemeldeten Bedarfe aus
  dem Sondervermögen zur Verfügung. Die Antragsfrist für dieses Sondervermögen ‑ das
  ist vielleicht auch noch wichtig ‑ ist am 30. Juni 2026 abgelaufen. Die Behörden
  können aber noch bis Ende 2030 Anträge bewilligen. Aufgelaufene Anträge können also
  weiterhin bewilligt werden, weshalb es für eine Bilanz der Wiederaufbaumaßnahmen
  vielleicht noch einen Moment zu früh ist. Aber ich hatte bei den Terminen ja darauf
  hingewiesen: Es ist nicht nur die Gedenkveranstaltung, sondern es wird auch konkret
  ein Wiederaufbauprojekt dort vor Ort besucht. Sie haben die Zahlen jetzt ja aktiv
  genannt. Ich habe es nicht ganz genau mitgeschrieben, aber wenn ich es richtig verstanden
  habe, dann wurden bislang 6,2 Milliarden Euro von 30 Milliarden Euro abgerufen.
  Das heißt, es gibt noch ein gewisses Delta. Sie haben auch darauf hingewiesen, dass
  die Antragsfrist gerade erst geendet hat. Was tun Sie, wenn sich herausstellen sollte,
  dass diese Mittel real nicht gebunden sein sollten? Überlegen Sie, diese Mittel
  noch einmal beantragbar zu machen? Wie gesagt, ist die Antragsfrist am 30. Juni
  abgelaufen. Das heißt nicht, dass es keine Bewilligungen mehr geben kann, sondern
  das ist bis Ende 2030 noch notwendig. Solch ein Wiederaufbau ist eben eine langwierige
  Aufgabe. Bisher ist davon auszugehen, dass die zur Verfügung stehenden Gelder mittelfristig
  weiterhin benötigt werden. Eine Öffnung des Ausbauhilfefonds für andere Zwecke beträfe
  zudem nicht den Bund allein, sondern in Folge solidarischer Kostentragung auch die
  Gesamtheit der Länder. Dementsprechend noch einmal der Hinweis darauf: Die Antragsfrist
  ist zwar abgelaufen, aber Bilanz können wir erst dann ziehen, wenn auch der Bewilligungszeitraum
  abgegolten ist. Dafür ist es noch einen Moment zu früh. Mir geht es um einen bestimmten
  Aspekt. Bevor Mittel eventuell abgerufen werden, sind sie aber erst einmal gebunden,
  sobald ein Antrag darauf gestellt ist. Haben Sie eine Zahl dazu, wie viele der Mittel
  aus dem Fonds bislang gebunden sind? Darüber liegt mir im Moment keine Zahl vor.
  Dann würde ich eine Nachlieferung dazu sehr begrüßen. Vielleicht kann Herr Kaminski
  das aber schon beantworten. Das kann ich tatsächlich nicht sagen. Aber Sie hatten
  auch nach dem Katastrophenschutz gefragt. Herr Meyer hatte es gerade schon erwähnt.
  Der Katastrophenschutz ist tatsächlich Sache der Länder bzw. Kommunen. Das bedeutet
  nicht, dass der Bund hierbei nicht trotzdem aktiv würde und unterstützte. Erst kürzlich
  wurde der Pakt für den Bevölkerungsschutz vorgestellt. Ein großer Teil davon sind
  die massiven Investitionen auch in diesem Bereich. Der Bund unterstützt zum Beispiel
  mit dem THW, das natürlich in den Fällen, in denen es notwendig ist, immer zur Verfügung
  steht. Hier wird massiv investiert, aber auch in die Ausbildung und auch in die
  Hilfe der Ausbildung für Kommunen und Länder, damit die Bevölkerung weiß, wie im
  Katastrophenfall oder auch im Zivilschutzfall damit umgegangen wird. (zum Besuch
  des Staatspräsidenten der Demokratischen Volksrepublik Algerien in Deutschland )
  Sie haben eben gesagt, die Themen von Wirtschaft, Energie und Rohstoffen würden
  eine Rolle spielen. Könnten Sie uns auf den aktuellen Stand bringen, was genau die
  Wünsche Deutschlands an Algerien sind, vor allem im Bereich von Rohstoffen und Energie?
  Ich würde dem Termin tatsächlich nicht vorgreifen wollen und bitte dafür um Verständnis.
  Ich glaube, es wird sicherlich Gelegenheit geben, das bei der Pressekonferenz im
  Anschluss zu vertiefen. Wie gesagt, die Vertiefung der Wirtschaftsbeziehungen sowie
  der Ausbau der Energie- und Rohstoffkooperationen dürften sicherlich Themen im Gespräch
  sein. Darauf liegt durchaus ein Fokus. Alles Weitere dann wirklich im Anschluss
  an den Termin. Das Thema der Migration haben Sie jetzt nicht erwähnt. Wird das auch
  ein Thema sein? Es ist grundsätzlich denkbar, dass alle möglichen Themen, die im
  bilateralen Verhältnissen in irgendeiner Form eine Rolle spielen, angesprochen werden.
  Das kann ich nicht ausschließen. Der Fokus liegt, wie gesagt, auf den Themen von
  Wirtschaft, Energie und Rohstoffen. Alles Weitere dann im Anschluss an den Termin.
  Ich würde die Frage zunächst Herrn Meyer stellen, weil der Kanzler ja mitverhandelt
  hat. Herr Meyer, können Sie sagen, welche Zusagen es gibt, bis wann wie viele von
  den Tomahawks geliefert werden? Wir haben in der Tat am Rande des NATO-Gipfels mit
  der US-Regierung vereinbart, dass Tomahawk-Raketen und entsprechend bodengestützte
  Typhon-Launcher von uns erworben werden und in Deutschland stationiert werden können.
  Zugleich arbeiten wir daran ‑ das ist immer wichtig, weil das der Zweischritt ist ‑,
  auch eigene europäische Systeme zu entwickeln. Die Details dieser Vereinbarung sind
  zu klären. Ich kann aber auch mit aller Vorsicht darauf hinweisen, dass Informationen
  zu Stückzahlen oder darüber, wo bestimmte Dinge stationiert werden könnten, natürlich
  eingestufte Informationen und sicherheitsrelevante Informationen sind. Deshalb werden
  wir darüber, so wie es auch gängige Praxis ist, nicht informieren können. Ich will
  doch noch nachhaken. Wurden in den Gesprächen von den Amerikanern, vielleicht von
  Pete Hegseth, denn konkrete Daten und Zahlen genannt? Also ganz abstrakt: Haben
  sie zugesagt: „Ihr bekommt bis dann und dann so und so viele von den Dingern“? Auch
  dazu möchte ich nicht weiter ins Detail gehen. Auf Ebene der Verteidigungsminister
  ist in der Tat etwas vereinbart worden. Aber noch einmal: Über die Worte des Bundeskanzlers
  hinaus ‑ auch der Verteidigungsminister hat sich geäußert ‑ können und wollen wir
  zu diesem Zeitpunkt noch nicht weiter ins Detail gehen. Ich nehme an, Frau Dr. Noack
  wird das auch nicht tun wollen und können. Zu den Zeitlinien kann ich Ihnen hier
  noch nichts mitteilen. Dem ist auch nichts weiter hinzuzufügen. Wir gehen jetzt
  in die Verhandlungen, und das kann ich leider nicht vorwegnehmen. Für die Stückzahlen
  gilt das gleichermaßen. Ich will es aber auch noch versuchen, Herr Meyer. Denn wir
  haben durch den Irankrieg ja gesehen, dass die USA erhebliche Probleme hatten, ihre
  Lager wieder aufzufüllen. Dort wurden ja zum Beispiel auch Tomahawks eingesetzt.
  Es war klar, dass auch Lieferungen, die für die Ukraine wichtig waren, zeitlich
  weit nach hinten gestellt wurden. Gibt es eine Zusicherung oder eine Garantie, dass
  diese Tomahawks von der amerikanischen Firma angesichts der Kriegssituation, die
  wir im Iran immer noch haben, überhaupt geliefert werden können? Auch da würde ich
  dabei bleiben, dass wir die Zusage, die Genehmigung für eine Beschaffung von Tomahawk-Raketen
  und von bodengestützten Typhon-Launchern dann auch zu erteilen, begrüßt haben. Das
  ist für uns eine wichtige Nachricht, weil diese Beschaffung eine ganz wichtige Fähigkeitslücke
  schließt. Noch einmal: Es geht für uns um die Selbstverteidigung. Wir haben uns
  in den vergangenen Jahren, übrigens auch schon in der Vorgängerregierung, sehr intensiv
  dafür eingesetzt, dass das gelingt. Dass es jetzt diese Vereinbarung gibt, ist für
  uns eine gute Nachricht. Aber es geht ja genau darum, ob die Fähigkeitslücke tatsächlich
  geschlossen wird. Es gibt die Vereinbarung. Aber wenn die Tomahawks nicht geliefert
  werden können, dann wird die Fähigkeitslücke nicht geschlossen. Ich möchte das Ganze
  einmal grundsätzlich einordnen. Es ist natürlich richtig, dass der Tomahawk-Marschflugkörper
  dafür geeignet ist, konventionell abzuschrecken, weil es eine Präzisionswaffe ist.
  Sie zahlt auf die „Deep Precision Strike“-Fähigkeit ein. Das ist richtig. Aber wir
  haben hier immer schon deutlich gemacht, dass wir einen, wie sagt man, Zweiklang
  verfolgen ‑ bei uns ist es sogar ein Dreiklang ‑, wobei wir bei marktverfügbaren
  Systeme natürlich schauen, wie wir sie besorgen und wie wir sie in unsere Fähigkeiten
  einbringen können. Das Zweite ist die Entwicklung entlang des European Long-Range
  Strike Approach, also mit der ELSA-Initiative. Das Dritte ist die Modernisierung
  von TAURUS zu TAURUS NEO. All diese Anteile zahlen letztendlich ein. Auch wir begrüßen,
  wie gesagt, selbstverständlich diese Entscheidung, weil sie zur europäischen Verteidigung
  beiträgt. Deswegen ist die Tomahawk-Diskussion natürlich eine sehr wichtige, aber
  das ist nicht die einzige Fähigkeit, die am Ende für die europäische Verteidigung
  zur Verfügung stehen wird. Ich habe ein paar Dinge vielleicht noch nicht ganz richtig
  verstanden. Vielleicht können Sie es mir erklären. Ich würde gern verstehen, auf
  welchem Wege die Tomahawks denn gekauft werden sollen. Es gibt ja zwei unterschiedliche
  Beschaffungsprogramme mit den USA, zum einen gepoolt und zum anderen direkt über
  den Hersteller. Welcher Weg ist denn dafür vorgesehen? Das hat ja auch Auswirkungen
  auf die Verfügbarkeit. Sie haben ELSA gerade angesprochen. Da habe ich den Zeitplan
  gar nicht mehr vor Augen. Wie ist das denn bei ELSA? Gibt es inzwischen einen konkreten
  Zeitplan, wann ELSA denn verfügbar sein soll? Gleiches gilt für TAURUS NEO. Ich
