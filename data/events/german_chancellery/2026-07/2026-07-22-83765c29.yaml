title: Kinderbetreuung Recht auf Ganztag startet
text: 'Während der Schulferien sollen nun auch Angebote der Jugendarbeit eines öffentlichen
  oder anerkannten freien Trägers gefördert werden können. Bei der Ganztagsbetreuung
  liegt der Fokus auf den Kindern: Die ganztägige Bildung und Betreuung eröffnet Kindern
  vielfältige Möglichkeiten zum Lernen, Entdecken und Wachsen – in der Schule ebenso
  wie im Hort. Kinder können im Ganztag gezielt gefördert werden. Es steht ausreichend
  Zeit zur Verfügung, damit sie auch außerhalb des Unterrichts Lernerfahrungen sammeln
  können. So werden Bildungschancen eröffnet, die Benachteiligungen ausgleichen. Der
  Ausbau der Ganztagsbetreuung für Kinder im Grundschulalter ist deshalb ein wichtiges
  Vorhaben der Bundesregierung. In den vergangenen Jahren haben Bund, Länder und Kommunen
  den Ausbau ganztägiger Bildungs- und Betreuungsangebote bereits deutlich vorangebracht.
  Es wird auch gemeinsam daran gearbeitet, die Qualität der Angebote kontinuierlich
  zu verbessern. Nur mit qualitativ hochwertigen Betreuungsangeboten für Kinder im
  Grundschulalter kann die Vereinbarkeit von Familie und Beruf unterstützt und unfreiwillige
  Teilzeitarbeit von Müttern und Vätern verringert werden. Der Ausbau der Ganztagsbetreuung
  ist ein deshalb auch ein zentrales Element zur Bekämpfung des Fachkräftemangels.
  Damit nach der Einschulung von Kindern keine Betreuungslücke entsteht, wurde 2021
  das Ganztagsförderungsgesetz verabschiedet. Mit diesem Gesetz wird ab dem 1. August
  2026 stufenweise ein Rechtsanspruch auf Ganztagsförderung für Kinder im Grundschulalter
  eingeführt. Der Rechtsanspruch gilt zunächst für die erste Klassenstufe und wird
  bis zum Schuljahr 2029/30 jährlich um je eine Klassenstufe ausgeweitet, sodass er
  ab dem Schuljahr 2029/2030 für die Klassenstufen eins bis vier gilt. Der Rechtsanspruch
  beinhaltet aber keine Pflicht: Eltern können frei wählen, ob und in welchem Umfang
  sie ein Angebot der ganztägigen Bildung und Betreuung wahrnehmen wollen. Gerade
  in den Schulferien ist Jugendarbeit unverzichtbar: Ferienfreizeiten und Sommercamps
  bieten Kindern Erholung, Selbstorganisation und Aktivitäten. Die Bundesregierung
  hat deshalb die Gestaltungsmöglichkeiten für Länder und Kommunen erweitert: Ab 1.
  August 2026 können auch Angebote der Jugendarbeit von öffentlichen oder anerkannten
  Trägern den Rechtsanspruch auf Ganztagsbetreuung in den Schulferien erfüllen. So
  lassen sich bestehende Strukturen vor Ort besser nutzen und Familien erhalten verlässliche
  Betreuungsmöglichkeiten.'
