title: Im Kabinett beschlossen Stiftung „Flucht, Vertreibung, Versöhnung“ künftig
  eigenständig
text: 'Das Museum und Dokumentationszentrum Flucht, Vertreibung, Versöhnung wurde
  im Juni 2021 im ehemaligen Deutschlandhaus am Anhalter-Bahnhof in Berlin eröffnet.
  Die Bundesregierung hat einen Gesetzentwurf zur Stiftung Flucht, Vertreibung, Versöhnung
  beschlossen, um der bislang unselbstständigen Stiftung ihre Eigenständigkeit zu
  geben. Durch die künftige Eigenständigkeit wird die Stiftung gestärkt, kann mit
  einer eigenen verlässlichen finanziellen Basis planen und dadurch deutlich besser
  ihre wichtige Bedeutung dokumentieren. Um dies zu erreichen, wird die Stiftung aus
  dem Gesetz zur Errichtung der Stiftung Deutsches Historisches Museum im Zuständigkeitsbereich
  des Beauftragten für Kultur und Medien herausgelöst. Die Stiftung Flucht, Vertreibung,
  Versöhnung widmet sich seit mehreren Jahren im Geiste der Versöhnung der Erinnerung
  und dem Gedenken an Flucht und Vertreibung im 20. Jahrhundert in Europa und darüber
  hinaus und hat sich zunehmend etabliert. Ein Dokumentationszentrum Flucht, Vertreibung,
  Versöhnung dient seit 2021 als als Lern- und Erinnerungsort zu Flucht, Vertreibung
  und Zwangsmigration sowohl in der Geschichte als auch in der Gegenwart. Denn über
  Jahrhunderte hinweg haben zahlreiche Menschen unter dem Unrecht von Vertreibung
  und Verfolgung gelitten. Viele Millionen Menschen verloren schlagartig ihre Heimat.
  Mit nur wenig Gepäck ausgestattet, mussten sie Haus und Hof verlassen und wurden
  in eine ungewisse Zukunft getrieben. Eine Rückkehr war in vielen Fällen nicht möglich.
  Diesen Schicksalen widmen sich die Stiftung und das Dokumentationszentrum. Hintergrund
  : Der Deutsche Bundestag beschloss im Dezember 2008 das Gesetz zur Errichtung einer
  Stiftung „Deutsches Historisches Museum“ (DHMG). Im Abschnitt 2 regelt das Gesetz
  die Errichtung der Stiftung Flucht, Vertreibung, Versöhnung als unselbständige Stiftung
  innerhalb der Stiftung Deutsches Historisches Museum. Am 13. Mai 2009 fand die konstituierende
  Sitzung des Stiftungsrates der Stiftung Flucht, Vertreibung, Versöhnung statt. 2011
  wurde das „ Deutschlandhaus“ am Anhalter Bahnhof in Berlin als künftiger Standort
  des Dokumentationszentrums der Stiftung Flucht, Vertreibung, Versöhnung bestimmt.
  Am 17. Oktober 2016 wurde das Richtfest für das zukünftige Dokumentationszentrum
  der Stiftung gefeiert. Eröffnet wurde es am 21. Juni 2021.'
