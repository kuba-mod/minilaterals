title: Verordnung tritt in Kraft Renten steigen zum 1. Juli
text: 'Von der Rentenanpassung profitieren rund 21 Millionen Rentnerinnen und Rentner
  in ganz Deutschland. Foto: Getty Images/Image Source/ Uwe Umstaetter 21,5 Millionen
  Rentnerinnen und Rentner in Deutschland erhalten zum 1. Juli mehr Geld: Ihre Renten
  steigen um 4,24 Prozent. Die Höhe der Rentenanpassung hat die Bundesregierung in
  der Rentenwertbestimmungsverordnung 2026 festgelegt. Erfreulich: Die Rentenanpassung
  beträgt zum vierten Mal seit fünf Jahren über vier Prozent. Sie stärkt erneut die
  Kaufkraft der Rentnerinnen und Rentner. Der Grund für die Erhöhung ist die gute
  Lohnentwicklung. Der Weg der Gesetzgebung: Das Bundeskabinett hatte die Verordnung
  Ende April 2026 beschlossen. Anschließend hatte der Bundesrat am 12. Juni 2026 grünes
  Licht gegeben. Der aktuelle Rentenwert wird jeweils zum 1. Juli eines Jahres neu
  bestimmt. Seit dem 1. Juli 2023 gibt es einen bundeseinheitlichen aktuellen Rentenwert.
  Dieser Wert soll jetzt um 4,24 Prozent steigen – von gegenwärtig 40,79 Euro auf
  42,52 Euro. Für eine Standardrente bei durchschnittlichem Verdienst und 45 Beitragsjahren
  bedeutet das einen Anstieg um 77,85 Euro im Monat. Der Rentenwert gibt an, wie viel
  ein sogenannter Entgeltpunkt wert ist. Entgeltpunkte sammeln Versicherte über die
  Jahre entsprechend ihres Verdienstes: Wer in einem Jahr so viel verdient wie der
  Durchschnitt, bekommt dafür einen Punkt. Die Zahl der gesammelten Punkte multipliziert
  mit dem aktuellen Rentenwert plus weitere Faktoren ergeben dann die Rente. In Deutschland
  folgt die Rentenanpassung der Entwicklung der Bruttolöhne. Zusätzlich gilt die sogenannte
  Haltelinie für das Rentenniveau von 48 Prozent. Das heißt, der Rentenwert wird zum
  1. Juli 2026 so hoch festgesetzt, dass das Rentenniveau von 48 Prozent erreicht
  wird. Mit dem Rentenpaket 2025 hatte die Bundesregierung die Haltelinie von 48 Prozent
  bis 2031 verlängert. Das Rentenniveau gibt an, wie hoch die Altersbezüge einer Rentnerin
  oder eines Rentners, die bzw. der 45 Jahre lang immer zum Durchschnittslohn gearbeitet
  hat, im Verhältnis zum aktuellen Durchschnittslohn ausfallen. Vereinfacht ausgedrückt:
  Mit dem Rentenniveau wird gezeigt, wie sich die Renten im Verhältnis zu den Löhnen
  entwickeln. Sinkt es, werden die Rentnerinnen und Rentner im Verhältnis zur arbeitenden
  Bevölkerung ärmer. Die Bundesregierung plant, unser Alterssicherungssystem grundlegend
  zu reformieren. Das ist mit Blick auf den demografischen Wandel dringend notwendig.
  Dafür will sie die Vorschläge der Alterssicherungskommission umsetzen. Diese hatte
  ihren Bericht am 23. Juni 2026 an die Bundesregierung übergeben. Ziel ist, das Alterseinkommen
  dauerhaft zu stabilisieren. Im Zuge der Reform soll nach 2031 auch die jährliche
  Rentenanpassung geändert werden. Weitere Informationen zur Rentenanpassung finden
  Sie im FAQ auf der Webseite der Deutschen Rentenversicherung .'
