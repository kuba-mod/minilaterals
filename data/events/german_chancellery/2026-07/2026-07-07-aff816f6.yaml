title: Canada-Germany Joint Statement
text: 'Today, the Prime Minister of Canada, Mark Carney, and the Chancellor of Germany,
  Friedrich Merz, announced the launch of negotiations towards a Canada-Germany Strategic
  Partnership Agreement (“Partnership Agreement”). Canada and Germany benefit from
  a robust bilateral relationship, with established cooperation across a number of
  shared priorities. The Partnership Agreement will serve as a flexible strategic
  framework through which Canada and Germany will shape and advance cooperation, and
  direct investment in key strategic industries, for years to come. Amongst others,
  key areas of cooperation will include: (I)    Security and Defence; (II)    Technology,
  Artificial Intelligence and Space; (III)    Supply Chains and Critical Minerals;
  (IV)    Energy; and (V)    Investment. The Prime Minister and Chancellor invite
  their Ministers of Foreign Affairs with advancing negotiations, with the intention
  of finalising the Partnership Agreement by the end of year.'
