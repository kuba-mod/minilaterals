title: Im Kabinett beschlossen Bedeutung des Bundesopferbeauftragten stärken
text: Roland Weber ist seit Anfang 2025 Opferbeauftragter der Bundesregierung. Die
  Bundesregierung will das Amt des Bundesopferbeauftragten auf eine gesetzliche Grundlage
  stellen. Einen entsprechenden Gesetzesentwurf hat sie auf den Weg gebracht. Damit
  soll der besonderen Bedeutung des Amtes Rechnung getragen werden. Dauerhaft soll
  gewährleistet werden, dass Betroffene terroristische Straftaten im Inland die notwendige
  Unterstützung erhalten. Der Staat muss Opfer und Hinterbliebene terroristischer
  Anschläge in Deutschland bestmöglich unterstützen. Der Bundesopferbeauftragte nimmt
  dabei eine wichtige Aufgabe wahr. Er ist zentrale Ansprechperson und steht den Betroffenen
  zur Seite. „Terroristische Gewalt fügt Menschen schweres Leid zu“, betont Bundesjustizministerin
  Stefanie Hubig. „Terror richtet sich zugleich gegen uns alle, gegen unsere freiheitliche
  Gesellschaft.“ Das Amt wurde 2018 durch einen Beschluss des Bundeskabinetts eingerichtet.
  Der nun vorliegende Gesetzentwurf berücksichtigt die Erfahrungen nach den Anschlägen
  der jüngeren Vergangenheit und legt die Aufgaben des Bundesopferbeauftragten sowie
  den Kreis der Betroffenen fest. Der Bundesopferbeauftragte ist zentraler Ansprechpartner
  für alle Betroffenen von extremistischen oder terroristischen Anschlägen im Inland.
  Er vermittelt in Zusammenarbeit mit den zuständigen Stellen und Einrichtungen praktische,
  finanzielle und psychosoziale Hilfe. Zudem unterstützt der Bundesopferbeauftragte
  im Umgang mit Behörden bei der Klärung anschlagsbezogener Anliegen. Als „politische
  Stimme“ der Betroffenen und setzt er sich in Politik und Öffentlichkeit für die
  Interessen und Bedürfnisse der Betroffenen ein. Weitere Informationen zum amtierenden
  Bundesopferbeauftragten gibt es beim Bundesjustizministerium.
