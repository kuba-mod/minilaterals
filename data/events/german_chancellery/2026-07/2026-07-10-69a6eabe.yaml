title: Entbürokratisierung Verfahren vereinfachen, Verwaltung entlasten
text: 'In der gesamten Bundesverwaltung sollen digitale Lösungen verankert werden.
  Die Bundesregierung setzt damit ihre Modernisierungsagenda für Staat und Verwaltung
  konsequent fort. Sie will Verwaltungsvorgänge vereinfachen, Hürden abbauen und digitale
  Lösungen in der Bundesverwaltung verankern. Verfahren sollen einfacher werden, Doppelstrukturen
  reduziert und digitale Prozesse gestärkt werden. Konkret geht es unter anderem um
  folgende Schritte: Mit dem Gesetz bringt die Bundesregierung die Umsetzung ihrer
  Modernisierungsagenda für Staat und Verwaltung voran. Bundeskanzler Friedrich Merz:
  „Wir haben den Anspruch, dass wir wieder an die Spitze kommen". Die neuen Regelungen
  zum Bürokratierückbau im Bereich des Bundesinnenministeriums stehen unter diesem
  Vorzeichen: Sie entlasten die Verwaltung und stärken damit die Handlungsfähigkeit
  des Staates.'
