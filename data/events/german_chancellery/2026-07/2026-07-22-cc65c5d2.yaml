date: '2026-07-22'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 22. Juli 2026
text: 'stellvertretender Regierungssprecher Meyer (Vorsitzende Wefers eröffnet die
  Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der Ministerien.)
  Auch von mir herzlich willkommen hier in neuer Atmosphäre! Schön, Sie so nah vor
  mir zu haben. Das Kabinett hat heute getagt, und ich möchte Sie über einige wenige
  Beschlüsse des Kabinetts informieren. Die Bundesregierung hat heute den Entwurf
  eines Gesetzes zur Stiftung Flucht, Vertreibung, Versöhnung beschlossen. Primäres
  Ziel des Gesetzentwurfes ist es, der Stiftung ihre Eigenständigkeit zu geben. Dazu
  wird die Stiftung aus dem Gesetz zur Errichtung der Stiftung Deutsches Historisches
  Museum im Zuständigkeitsbereich des Beauftragten für Kultur und Medien herausgelöst
  und der Vorsitz des Stiftungsrats dem Bundesinnenministerium übertragen. Durch die
  künftige Eigenständigkeit wird die Stiftung gestärkt und kann mit einer eigenen
  verlässlichen finanziellen Basis planen und dadurch ihre wichtige Bedeutung deutlich
  besser dokumentieren. Die Bundesregierung setzt mit dem Gesetzentwurf ein weiteres
  Vorhaben des Koalitionsvertrags um. Weiterhin hat die Bundesregierung den Entwurf
  eines Gesetzes über eine Beauftragte oder einen Beauftragten der Bundesregierung
  für die Anliegen von Betroffenen von terroristischen Straftaten im Inland beschlossen.
  Das Amt des Bundesopferbeauftragten soll auf eine gesetzliche Grundlage gestellt
  werden. Damit soll der besonderen Bedeutung des Amtes Rechnung getragen und dauerhaft
  gewährleistet werden, dass Betroffene die notwendige Unterstützung erhalten. Der
  Beauftragte ist zentraler Ansprechpartner auf Bundesebene für alle von extremistischen
  oder terroristischen Anschlägen im Inland Betroffenen. Das können Hinterbliebene,
  Verletzte, Tatzeuginnen und ‑zeugen, Ersthelferinnen und Ersthelfer und auch Besitzerinnen
  und Besitzer von Geschäften oder Einrichtungen sein, die durch das Anschlagsgeschehen
  zu Tatorten wurden. Er kümmert sich um ihre Anliegen und vermittelt praktische finanzielle
  und psychosoziale Hilfe. Zudem setzt er sich im politischen Raum für die Belange
  der Betroffenen ein. Das Amt des Bundesopferbeauftragten wurde 2018 durch einen
  Beschluss des Bundeskabinetts beim Bundesministerium der Justiz und für Verbraucherschutz,
  BMJV, eingerichtet. Der Entwurf eines Bundesopferbeauftragtengesetzes berücksichtigt
  insbesondere die Erfahrungen nach den Anschlägen der jüngeren Vergangenheit Er legt
  beispielsweise erstmals die Aufgaben des Bundesopferbeauftragten und den Kreis der
  Betroffenen klar fest. Weiterhin hat das Bundeskabinett einen Gesetzentwurf zur
  Bundesstiftung „Mutter und Kind – Schutz des ungeborenen Lebens“ beschlossen. Die
  Stiftung unterstützt schwangere Frauen in finanziellen Notlagen durch ergänzende
  Hilfen und erreicht jährlich mehr als 100 000 Frauen. Mit dem Gesetzentwurf wird
  die finanzielle Grundlage der Bundesstiftung Mutter und Kind gestärkt. Die gesetzlich
  festgelegte Bundeseinlage für die Stiftung ist seit 1993 unverändert geblieben.
  Mit dem Gesetzentwurf wird sie deshalb in zwei Schritten erhöht, und zwar auf jährlich
  101 Million Euro ab dem Jahr 2027 und auf 105 Millionen Euro ab dem Jahr 2032. Dadurch
  können die Hilfen der Stiftung besser an die gestiegenen Lebenshaltungskosten angepasst
  und ihre Entlastungswirkung verbessert werden. Die Bundesregierung hat heute auch
  die von der Bundesministerin für Wirtschaft und Energie vorgelegte Startup- und
  Scaleup-Strategie der Bundesregierung beschlossen. Damit wollen wir Start-ups und
  Scale-ups in allen Bereichen unterstützen; denn sie sind Treiber für Innovation
  und Wachstum. Wir erleben derzeit einen Gründerboom in Deutschland. Ich wiederhole
  deshalb gern, was der Kanzler vorige Woche hier in einem anderen Raum in der Sommer-PK
  gesagt hat. Die neuen Rekordzahlen aus dem ersten Halbjahr 2026 mit über 3000 Start-up-Gründungen
  zeigen: Da geht etwas in Deutschland. ‑ Jung e Unternehmen können morgen die Champions
  sein, die auch für Beschäftigung und Wohlstand in Deutschland sorgen. Diese Chance
  wollen wir ergreifen, um weiter voranzukommen, und legen mit der Startup- und Scaleup-Strategie
  jetzt noch einmal eins obendrauf. In acht Handlungsfeldern ergreift die Bundesregierung
  Maßnahmen, um die Bedingungen für Start-ups und Scale-ups in Deutschland zu verbessern.
  Ein zentrales Handlungsfeld ist die Finanzierung. Wir wollen den Zugang zu Kapital
  weiter stärken und damit die Möglichkeiten für Wachstum und Verbleib erfolgreicher
  Start-ups und Scale-ups in Deutschland verbessern. Mit einem weiteren Handlungsfeld
  adressieren wir außerdem erstmals Start-ups und Scale-ups aus dem Bereich der Sicherheit
  und Verteidigung. Wir wollen zudem Bildung, Ausgründung und Transfer befördern,
  Start-up-Gründerinnen und ‑Gründern und jungen Unternehmen Bürokratie aus dem Weg
  räumen, ihnen den Zugang zu öffentlichen Aufträgen erleichtern und sie im Wettbewerb
  stärken, sie bei der Fachkräftegewinnung unterstützen, Kooperationen, Internationalisierung
  und Vernetzung fördern. Die Strategie ist ein umfassendes, ressortübergreifendes
  start-up-politisches Arbeitsprogramm. Einige der Maßnahmen sind schon ergriffen
  worden; andere werden derzeit bereits erarbeitet; weitere befinden sich noch in
  der Planung. Die Bundesregierung wird die Maßnahmen der Strategie innerhalb dieser
  Legislaturperiode umsetzen und jährlich über den Stand der Umsetzung unterrichten.
  Zudem hat das Kabinett mit dem Programm zur Steigerung der Cybersicherheit in der
  Bundesverwaltung, kurz CyberGovSecure, eine Bündelung von Sofortmaßnahmen beschlossen.
  Mit dem Programm wird die ressortübergreifende Umsetzung der gesetzlichen Verpflichtungen
  zur Informationssicherheit unterstützt. Die operativen Maßnahmen werden durch das
  Bundesamt für Sicherheit in der Informationstechnik, BSI, koordiniert. Die strategische
  Steuerung des Programms übernimmt das BMDS. Das Programm steigert die Cybersicherheit
  und Cyberresilienz der obersten Bundesbehörden. Damit setzen wir ein weiteres wichtiges
  Koalitionsvorhaben zur Cybersicherheit um und stärken den Schutz und die digitale
  Wehrhaftigkeit Deutschlands. Viele Beispiele aus der Vergangenheit haben gezeigt,
  wie notwendig und wichtig das ist. Soweit zu den Beschlüssen des Kabinetts von heute
  Vormittag. Da wir am Freitag keine Regierungspressekonferenz haben, würde ich auch
  die Termine des Bundeskanzlers für die kommenden Tage und die kommende Woche hier
  bereits ankündigen. Der Bundeskanzler wird an diesem Samstag, den 25. Juli, am Festakt
  zur Eröffnung der Bayreuther Festspiele teilnehmen, die in diesem Jahr ihr 150-jähriges
  Jubiläum feiern. Der Bundeskanzler wird dort um 17.15 Uhr eintreffen. Der Festakt
  selbst beginnt um 18 Uhr im Festspielhaus. Der Bundeskanzler wird dort ein Grußwort
  zum 150. Jubiläum halten. Im Anschluss wird er im Ehrenhof des Neuen Schlosses zum
  Staatsempfang von Herrn Ministerpräsident Markus Söder erwartet. Beide Termine sind
  presseöffentlich. Am Sonntagabend ‑ wir befinden uns am 26. Juli ‑ nimmt der Bundeskanzler
  am traditionellen Liborimahl in Paderborn teil und hält dort die Festrede. Beim
  Liborimahl spricht jedes Jahr eine bekannte Persönlichkeit aus dem In- oder Ausland
  vor geladenen Gästen zum Thema Europa. Das Liborimahl ist Teil des Liborifestes.
  Mit dem Fest feiern Stadt und Erzbistum Paderborn jährlich ihren Patron, den heiligen
  Liborius. Es ist eines der größten und ältesten Volksfeste Deutschlands und zeichnet
  sich durch seine Mischung aus kirchlichen und weltlichen Feierlichkeiten aus. Am
  Montag, den 27. Juli, trifft der Bundeskanzler die isländische Ministerpräsidentin
  Kristrún Frostadóttir zu einem kurzen Besuch im Bundeskanzleramt. Island ist NATO-Alliierter
  und enger Partner. Bei dem Gespräch werden voraussichtlich bilaterale, außen- und
  europapolitische Themen im Vordergrund stehen. Es ist ein kurzer Termin, und der
  Termin ist deshalb auch nicht presseöffentlich. Am Dienstag, den 28. Juli, wird
  der Bundeskanzler gegen 12.30 Uhr Ortszeit den Taoiseach der Republik Irland, Herrn
  Micheál Martin, in Dublin besuchen. Anlass des Besuchs ist die halbjährige EU-Ratspräsidentschaft
  Irlands, die am 1. Juli 2026 begonnen hat. Zentrale Gesprächsthemen sind der nächste
  mehrjährige Finanzrahmen der EU sowie die EU-Wettbewerbsfähigkeit, EU-Erweiterung
  und die bilateralen Beziehungen. Eine gemeinsame Pressekonferenz vor Ort ist bereits
  geplant. Am Mittwoch, den 19. Juli, tagt wie gewohnt um 10 Uhr das Bundeskabinett
  unter der Leitung des Bundeskanzlers. Herr Frey soll Fraktionsvorsitzender werden.
  Wer folgt dem im Kanzleramt nach? Gibt es weitere Kabinettsposten, die neu besetzt
  werden? Ich vermute, dass es einige Nachfragen dazu geben wird, und bitte um Verständnis
  dafür, dass ich Sie diesbezüglich enttäuschen muss. Es ist klar, dass auf der Position
  des Fraktionsvorsitzenden in der CDU/CSU-Fraktion eine Änderung erforderlich ist.
  Der Bundeskanzler, der auch Parteivorsitzender der CDU ist, und der CSU-Vorsitzende
  werden in den zuständigen Gremien einen Vorschlag machen. Ich denke, auch aus Respekt
  vor den zuständigen Gremien ist es richtig, dass der Vorschlag zunächst dort erfolgt
  und ich das von dieser Stelle aus nicht kommentiere. Ich habe ja nicht nach dem
  Fraktionsvorsitzenden gefragt, über den dann in der Tat in den zuständigen Gremien
  beschlossen und beraten wird, sondern nach dem Bundeskabinett. Vielleicht könnten
  Sie uns ins Bild setzen, welche Positionen dort neu besetzt werden und mit wem.
  Auch dazu habe ich, wie gesagt, nichts anzukündigen. Der Bundeskanzler wird in den
  zuständigen Gremien einen Vorschlag machen. Das betrifft den Fraktionsvorsitz. Alles
  Weitere kann ich von dieser Stelle aus nicht kommentieren. Herr Meyer, es geht darum,
  wie das Kabinett umgebildet werden kann. Für wann ist zu erwarten, dass die Nachfolge
  von Herrn Frei geklärt und kommuniziert wird? Ich verstehe die Frage. Sie ist völlig
  klar und völlig berechtigt. Trotzdem möchte ich noch einmal darauf hinweisen, dass
  es dafür zuständige Gremien gibt. Dort werden mögliche Personalvorschläge gemacht.
  Wenn sich daraus eine Konsequenz ergeben sollte, dann sehen wir weiter. Noch gibt
  es diese Gremiensitzung nicht. Sie findet am Nachmittag statt. Alles Weitere dann
  im weiteren Verfahren. Darauf verweise ich. War die Umbildung heute Thema im Kabinett?
  Es war keine Umbildung Thema im Kabinett, nein. (zum Entwurf eines Gesetzes zur
  Stiftung Flucht, Vertreibung, Versöhnung) Ich habe zwei Fragen, wenn ich darf. Die
  erste Frage betrifft das Thema einer verlässlichen finanziellen Basis, so haben
  Sie gesagt. Können Sie sagen, ob die Stiftung auch finanziell gestärkt wird? Ich
  meine, sie erhält im Moment ungefähr 56 Millionen Euro im Jahr. Ist die Zahl richtig?
  Ändert sich daran etwas? Die zweite Frage: Ist es bei den Änderungen im Referentenentwurf
  geblieben, dass der Stiftungsrat künftig um den Beauftragten für Aussiedlerfragen
  erweitert und dass explizit festgeschrieben wird, dass ein Schwerpunkt der Dauerausstellung
  auf Flucht und Vertreibung der Deutschen im und nach dem Zweiten Weltkrieg, was
  natürlich immer schon umstritten war und bislang so dezidiert nicht darinsteht,
  liegen soll? Die Frage möchte ich an das zuständige BMI abgeben. Ich kann Ihnen
  leider nur allgemein etwas dazu sagen. Mit dem vorliegenden Entwurf wird das Ziel
  einer Selbstständigkeit der Stiftung Flucht, Vertreibung und Versöhnung umgesetzt.
  Sie haben nach der Finanzierung gefragt. Eine Antwort müsste ich nachreichen. Meine
  zweite Frage war: Veröffentlichen Sie noch den Gesetzentwurf? Die eine Stelle ist
  unter Historikern nicht unumstritten; das wissen Sie ja. Es geht immer um das Ringen
  darum, auf wen man sich in dieser Dauerausstellung fokussiert, auf die Deutschen
  oder auf die Flucht in ganz Europa. Deswegen also noch die Frage: Will man in Zukunft
  eine inhaltlich andere Schwerpunktsetzung auf das Leid der Deutschen nach dem Zweiten
  Weltkrieg vornehmen? Es tut mir leid; auch das müsste ich leider nachreichen. Meine
  erste Frage geht in eine ähnliche Richtung. Kritiker sehen darin einen Paradigmenwechsel,
  wenn die deutschen Opfer, die deutschen Vertriebenen mehr in den Fokus gerückt werden
  sollen. Sehen Sie das auch so? Die Frage geht an das BMI. Ich kann Ihnen dazu noch
  einmal sagen, dass kritisiert wurde, wie Sie auch schon gesagt haben, dass die Dauerausstellung
  unter Berücksichtigung der historischen Hintergründe und Zusammenhänge sowie der
  europäischen Dimension und Folgen errichtet, unterhalten und weiterentwickelt wird,
  wobei Flucht, Vertreibung und Integration der Deutschen im und nach dem Zweiten
  Weltkrieg den Schwerpunkt bilden. Damit wird im Gesetzestext nachvollzogen, was
  in der Stiftungskonzeption aus dem Jahr 2012 sowie der Konzeption der Dauerausstellung
  aus dem Jahr 2017 gründet. Dies wird in der Gesetzesbegründung deutlich gemacht.
  Dann noch einmal etwas allgemeiner gefragt: Warum geht die Stiftung vom BKM an das
  Innenministerium über? Auch diese Antwort müsste ich leider nachreichen. Es liegt
  mir nicht vor. (zum Entwurf eines Gesetzes über eine Beauftragte oder einen Beauftragten
  der Bundesregierung für die Anliegen von Betroffenen von terroristischen Straftaten
  im Inland) Meine Frage geht an das BMJV. Das Amt gibt es ja schon länger. Was konkret
  ändert sich dadurch, dass es jetzt gesetzlich verankert wird? Der Regierungssprecher
  hat es ja schon ein bisschen skizziert. Das Amt gibt es seit 2016. Es wurde nach
  dem Anschlag auf dem Breitscheidplatz geschaffen. 2018 gab es einen Kabinettsbeschluss,
  um dieses Amt ein bisschen stetiger zu machen. Mit dem Gesetzentwurf haben wir jetzt,
  wie der Regierungssprecher schon gesagt hat, erst einmal richtig klar festgelegt,
  was der Betroffenenkreis ist und was die Aufgaben sind. Wir haben vor allen Dingen
  eine langfristige Grundlage, die vom Gesetzgeber beschlossen wird und nicht allein
  von der Bundesregierung im Rahmen eines Kabinettsbeschlusses. Kann Herr Weber jetzt
  mit mehr Personal rechnen? Die Höhe der Mittel, die für den Bundesopferbeauftragten
  vorgesehen sind, ist erst einmal weiterhin die gleiche, so wie es auch im Gesetzentwurf
  vorgesehen ist. Das Personal wird im Zusammenhang mit Anschlagsgeschehen immer kurzfristig
  mit Personal aus dem BMJV aufgestockt. Die Geschäftsstelle ist bisher dauerhaft
  mit ungefähr zehn bis zwölf Leuten besetzt. (zur Startup- und Scaleup-Strategie
  der Bundesregierung) Gibt es einen bestimmten Grund dafür, warum die Pressekonferenz
  der Ministerin genau gleichzeitig mit der Regierungspressekonferenz stattfinden
  muss? Mir sind keine spezifischen Gründe bekannt. Vermutlich hat es mit dem Kalender
  der Ministerin zu tun, der sehr eng gepackt ist. (zum Programm zur Steigerung der
  Cybersicherheit in der Bundesverwaltung) Meine Fragen richten sich an das Innenministerium
  und an das Digitalministerium. Zunächst möchte ich nach dem fragen, was jetzt im
  Kabinett beschlossen wurde. Wie groß ist die Sorge Ihrer Ministerien, dass man wirklich
  gut genug und rechtzeitig genug aufgestellt ist? Es gab jetzt in Rumänien den Fall,
  dass das komplette Grundbuch des Landes samt aller Back-ups gelöscht wurde. Könnte
  so etwas auch in Deutschland passieren? Ganz allgemein zum Kabinettbeschluss heute:
  Wir sehen, dass die Lage im Cyberbereich angespannt ist. Unsere demokratischen Institutionen
  und digitalen Infrastrukturen stehen im Fadenkreuz staatlicher und krimineller Angreifer.
  Deswegen hat das Kabinett heute den Beschluss gefasst, bezogen auf die Cybersicherheit
  in der Bundesverwaltung ein Programm auf den Weg zu bringen, um die Cybersicherheit
  zu stärken. Das betrifft vor allem auch eine stringente Herangehensweise. Wir haben
  in den einzelnen Ressorts bisher noch unterschiedliche Regelungen, was Schwachstellenmanagement
  oder auch die Vorgaben auf mobilen Endgeräten betrifft. Mit Sofortmaßnahmen wird
  sehr konkret dafür gesorgt, dass hier einheitlicher und stringenter vorgegangen
  wird. Zum Fall in Rumänien: Deutschland ist bekannterweise dezentral und analog
  organisiert. Konkret auf die Grundbücher bezogen, wäre so ein Fall in Deutschland
  nicht denkbar. Aber wir sind ja gerade dabei, die Register zu digitalisieren und
  dabei auch Millionen Daten zu digitalisieren. Dabei denken wir die Cybersicherheit
  von Anfang an als integralen Bestandteil mit. Wir lernen auch aus solchen Fällen,
  die im europäischen Ausland passieren. Zum Beispiel wird es, wenn wir jetzt die
  Wallet erstellen, im Vorfeld massive Cybertests bzw. Simulationen geben, bevor sie
  Anfang kommenden Jahres online geht. Ich könnte noch etwas allgemein zur Bedrohungslage
  sagen. Bundesinnenminister Dobrindt hat sich auf der Innenministerkonferenz am 19. Juni
  schon dazu geäußert und von einer hohen Bedrohungslage gesprochen. Das bedeutet
  unter anderem, dass in Deutschland jederzeit mit einem Anschlag zu rechnen ist und
  Anschlagspläne klar erkennbar sind. Das gilt natürlich auch für den Cyberbereich.
  In den vergangenen Monaten gab es mehrfach Anschlagspläne gegenüber Einrichtungen
  und Personen, die von unseren Sicherheitsbehörden vereitelt wurden. Die vermehrte
  Melde- und Aufklärungslage hat uns dazu veranlasst, die Bedrohungslage ernster zu
  nehmen. Das gilt, wie gesagt, auch für den Cyberbereich. Es wurde jetzt bekannt,
  dass sich eine KI von OpenAI selbstständig gemacht hat. Reicht das, was jetzt beschlossen
  wurde, aus, wenn man weiß, dass sich KI selbstständig machen kann? Ist die Bundesregierung
  also auch darauf vorbereitet? Diesen Vorfall haben wir natürlich wahrgenommen. Er
  ist ein weiteres Beispiel dafür, dass wir einen Paradigmenwechsel haben, was die
  Fähigkeiten von KI-Agenten betrifft. Wir sehen ja schon in den letzten Monaten,
  dass die Fähigkeiten sogenannter Frontier-AI-Modelle massiv zunehmen. Damit gehen
  auch gestiegene Risiken einher, und das verändert auch die Bedrohungslage potenziell
  massiv. Wir als Bundesregierung schauen uns diese Entwicklung schon länger sehr
  genau und ganzheitlich an, und wir handeln auch entsprechend. Sie haben wahrgenommen,
  dass der Nationale Sicherheitsrat am 8. Juni die Gründung eines KI-Sicherheitsinstituts
  beschlossen hat. Dieses befindet sich im Aufbau. Wir haben seitdem die Kooperation
  mit vergleichbaren Instituten in Großbritannien und Frankreich angestoßen, weil
  gerade bei diesem Thema auch die internationale Zusammenarbeit und der Austausch
  über Erfahrungen mit solchen Modellen wichtig sind. UK hat schon seit zwei Jahren
  ein Sicherheitsinstitut. Davon profitieren wir über diesen Austausch von Erfahrungen.
  Für uns ist auch entscheidend, dass wir Zugang zu diesen sehr leistungsfähigen KI-Modellen
  haben. Das ist ein grundlegender strategischer Faktor. Es ist sicherzustellen, dass
  auch unsere europäischen Unternehmen und auch unsere Sicherheitsbehörden Zugang
  zu diesen Modellen haben. Wir haben in der Vergangenheit gesehen, dass das nicht
  immer der Fall ist. Umso mehr setzen wir jetzt darauf, europäische Player auch auf
  diesem Gebiet größer zu machen. Es ist für uns auch eine Frage der digitalen Souveränität,
  dass wir solche wirkmächtigen Modelle in unserem Einflussbereich brauchen. Die Bundesregierung
  hat hierzu eine Reihe von Maßnahmen angestoßen, etwa die, die KI-Regulierung auf
  europäischer Ebene herunterzufahren oder sozusagen ein bisschen zu vereinfachen,
  um Innovationen zu ermöglichen, sodass Start-ups hier wachsen. Wir sehen ja auch
  erfreuliche Zahlen im Start-up-Bereich. Das Thema wurde hier schon öfters angesprochen.
  Wir haben eine Reihe von Maßnahmen auf den Weg gebracht. Natürlich schaut sich auch
  das BSI als zentrale Cybersicherheitsbehörde diesen Fall jetzt sehr genau an. Es
  ist dabei, ihn zu analysieren, und es wird auch Rückschlüsse für unsere nationale
  Cybersicherheit ziehen. Dazu eine Frage an Herrn Meyer: Eben haben wir von der KI-Regulierung
  auf europäischer Ebene gehört, aber eher mit dem Impetus „weniger Regeln, damit
  wir mehr Innovation haben“. Wäre aber dieser jüngste Vorfall nicht doch auch für
  die Bundesregierung ein Anlass, das Albtraumhafte, das für viele Menschen ja auch
  in der KI steckt, anzuerkennen und zu sagen: „Das müssen wir auf europäischer Ebene
  ernst nehmen. Wir machen uns dafür stark, dass KI-Regulierung eher intensiviert
  als abgebaut wird“? Das ist, denke ich, etwas, was nicht nur die Ebene der Fachressorts
  betrifft. Ja, absolut. Sie haben gerade gesagt, ob das nicht ein Signal oder Symbol
  ist, dass man KI ernstnehmen sollte. Ich glaube, wir nehmen die Entwicklungen, die
  mit der künstlichen Intelligenz einhergehen, sehr ernst. Deshalb befassen wir uns
  damit auch sehr umfassend. Da geht es am Ende in der Tat nicht nur um Regulierung,
  sondern da geht es vor allen Dingen auch um Know-how. Bei dem KI-Institut, das angesprochen
  worden ist, geht es deshalb genau darum, unterschiedliches Know-how, das wir in
  Deutschland, aber auch weltweit haben, zu bündeln und dann sicherlich auch die richtigen
  Schlussfolgerungen daraus zu ziehen. Es geht aber zum Beispiel auch darum, den Rahmen
  dafür zu schaffen, dass europäische Modelle und Lösungen möglich werden. Dabei spielt
  wiederum Regulierung eine wichtige Rolle. Insofern noch einmal: Wir nehmen dieses
  Thema sehr ernst, haben dazu aber einen holistischen Angang. Wir schauen nicht nur
  auf die Regulierung oder auf bestimmte Vorfälle, sondern wollen wirklich einen Rahmen
  dafür schaffen, dass in Europa eigene Modelle und auch eigene Unternehmen erfolgreich
  sein können. Wir wollen gleichzeitig an den Chancen partizipieren können und uns
  für mögliche Gefahren wappnen. Welche konkreten Möglichkeiten hätte die Bundesregierung
  in einem solchen Fall überhaupt? Es geht bei KI ja eher um OpenAI und in der Regel
  nicht um europäische Unternehmen. Welche Möglichkeiten sieht die Bundesregierung
  also überhaupt, dass Deutschland bei der KI-Regulierung eine entscheidende Rolle
  spielen kann? Sind wir dem letztlich auch aus Ihrer Sicht ein Stück weit ausgeliefert?
  Ich würde widersprechen, dass wir dem ausgeliefert sind. Ich habe ja gerade darauf
  hingewiesen, dass diese Entwicklung nicht nur uns als Politik, sondern auch die
  Wirtschaft und auch die Gesellschaft sehr stark beschäftigt. Das, was wir national
  tun können, werden wir am Ende auch tun. Noch einmal: Dabei geht es insbesondere
  darum, die Rahmenbedingungen zu schaffen und auch Know-how-Transfer sicherzustellen.
  Aber natürlich geht es bei so einem Thema am Ende vor allen Dingen auch um europäische
  Lösungen. An Herrn Meyer und das Digitalministerium: Mich würde noch einmal dieser
  ganz konkrete Fall interessieren, in dem ein KI-Modell selbstständig einen Cyberangriff
  gestartet hat. Wie bewerten Sie diesen Fall? Ist das für Sie eine Cyberattacke wie
  jede andere, oder sticht sie dadurch, dass die KI hier ‑in Anführungszeichen ‑ selbstständig
  geworden ist, auch für Sie besonders heraus? Ich hatte dazu ja eingangs eine Bewertung
  abgegeben und von einem Paradigmenwechsel gesprochen. Dieser Fall ist ein weiteres
  Beispiel dafür, dass die Modelle immer mehr können und dass dies auch mit Risiken
  einhergeht. Herr Meyer, da es vom „Handelsblatt“ in den letzten Tage Berichte in
