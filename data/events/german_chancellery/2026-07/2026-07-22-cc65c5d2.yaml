  Haushaltsausschusses. Das passiert seit 2007. Darin werden die Kosten zusammengefasst,
  die in jedem Ressort jeweils in der eigenen Zuständigkeit anfallen. Bezüglich der
  Inhalte des Berichtes müsste ich Sie dann leider an den Haushaltsausschuss verweisen.
  Zum aktuellen Stand: Wir sind gerade dabei, den Bericht für 2025 zu erstellen. Seit
  einigen Tagen wird ja der Vorschlag von Frau Alabali Radovan diskutiert, die BMZ-Ausgaben
  für die Ukrainehilfe als eine von der Schuldenbremse befreite Bereichsausnahme zu
  deklarieren. Wie wird das im BMF beurteilt? Ist das machbar? Das würde ich jetzt
  von dieser Stelle aus gar nicht kommentieren. Zu dem Vorschlag kann vielleicht das
  BMZ noch einmal Stellung nehmen. Ich habe ja gerade schon gesagt, wie es sich mit
  dem Bericht der Kommission zur Schuldenbremse verhält, und gesagt, dass wir den
  in den nächsten Wochen erwarten und uns dann auch näher damit beschäftigen werden.
  Ich kann dazu gerne noch einmal etwas sagen. Es ist ja so, dass der Haushalt unseres
  Ministeriums stark unter Druck steht. Die Verteidigung und der Wiederaufbau der
  Ukraine sind wichtig und im Interesse Deutschlands, und dabei geht es nicht nur
  um die militärische Unterstützung, sondern auch um die zivile Unterstützung. In
  dem Zusammenhang hat unsere Ministerin diesen Vorschlag geäußert. Ich kann gerne
  noch einmal wörtlich vorlesen, was sie gesagt hat: Die Ukraine zeigt das sehr deutlich.
  Mit unserer Entwicklungszusammenarbeit konnten allein im letzten Winter mehr als
  drei Millionen Menschen trotz der schweren Angriffe Russlands weiter mit Energie,
  mit Strom und Wärme versorgt werden. Das BMZ leistet damit einen zentralen Beitrag
  zur Resilienz der Ukraine. Das ist für mich zivile Sicherheitspolitik. Deshalb sprechen
  wir innerhalb der Bundesregierung darüber, ob solche Ausgaben für die Ukraine künftig
  auch unter die Bereichsausnahme fallen können. Wenn wir dies hier anders finanzieren
  könnten, wäre das besser. Grundsätzlich müssen wir klären, ob wir Sicherheit eng
  oder umfassend definieren. Immerhin sitze ich als Entwicklungsministerin auch im
  Nationalen Sicherheitsrat. So hat sie das im Interview mit Reuters gesagt, und dem
  habe ich nichts hinzuzufügen. Ich habe eine Frage an das Auswärtige Amt. Gestern
  ist in der Türkei ein Mitarbeiter der Deutschen Welle, ein Journalist, erneut verhaftet
  worden. Er ist im Februar schon einmal inhaftiert worden. Ich hätte ganz gerne gewusst,
  ob Sie sich um diesen Fall kümmern und wie Sie ihn kommentieren. Ja, wir verfolgen
  den Fall des Investigativjournalisten Alican Uludağ, der auch für die Deutsche Welle
  in der Türkei arbeitet, natürlich weiterhin sehr aufmerksam. Sie wissen: Herr Uludağ
  war ja bereits einmal in Untersuchungshaft. Die Deutsche Welle leistet aus unserer
  Sicht in der Türkei und weltweit sehr wichtige Arbeit, und Herr Uludağ ist ein sehr
  anerkannter und übrigens auch preisgekrönter Journalist. Es ist aus unserer Sicht
  wichtig, dass die Deutsche Welle ‑ genauso wie alle anderen Journalistinnen und
  Journalisten auch ‑ frei berichten kann, wie das übrigens eben auch bei uns in Deutschland
  möglich ist. Pressefreiheit und Rechtsstaatlichkeit sind höchste Güter unserer Gesellschaften,
  an denen sich dann übrigens auch die Türkei als Mitglied des Europarates und als
  Unterzeichner der Europäischen Menschenrechtskonvention messen lassen muss. Die
  türkische Regierung hält im Übrigen ja auch an einer Vollmitgliedschaft oder am
  Ziel einer Vollmitgliedschaft der Türkei in der Europäischen Union fest, und da
  ist es klar, dass es dafür eine Entwicklung bräuchte, die nicht im Widerspruch zu
  den Kopenhagener Kriterien der Europäischen Union steht. Also würde ich schlussfolgern:
  Ja, diese neuerliche Festnahme irritiert uns. Sie irritiert uns sehr. Im Übrigen
  hatte sich auch der Kulturstaatsminister ja bereits bei der ersten Festnahme geäußert,
  und diese Äußerungen gelten aus unserer Sicht auch weiterhin. Das bleibt unsere
  Haltung. Gibt es einen Kontakt mit der türkischen Regierung? Ich kann Ihnen jetzt,
  hier und heute ‑ ‑ ‑ Die Nachricht ist auch relativ neu. Ich glaube, die ist von
  gestern. Es ging unseres Kenntnisstandes nach um einen Post auf einer sozialen Medienplattform.
  Aber das ist, um das vielleicht einmal klarzustellen, für das Auswärtige Amt kein
  Konsularfall, denn dafür wäre die Voraussetzung eine deutsche Staatsangehörigkeit.
  Noch einmal ‑ das ist ein anderes Thema, aber gerade lautete das Stichwort Irritationen ‑
  kurz zum gestrigen Treffen von Alijew und Merz: Herr Meyer, war die Bundesregierung
  angesichts Ihrer Aussagen von Montag überrascht über die Aussagen von Herrn Alijew
  zum Thema „Pofalla und Platzeck in Baku“? Ist die Frage ist, ob die Bundesregierung
  überrascht darüber war? Ich habe es einfach akustisch nicht verstanden. Der Regierungssprecher
  hatte uns ja hier am Montag gesagt, Sie hätten keine Kenntnisse über Geheimgespräche
  zwischen der deutschen und der russischen Seite in Baku. Herr Alijew hat gestern
  genau das bestätigt, also dass Herr Platzeck und Herr Pofalla in Baku gewesen sein
  sollen. Sind Sie von diesen Aussagen des aserbaidschanischen Präsidenten überrascht
  bzw. irritiert? Die Frage geht an das AA und das BPA, bitte. Der Bundeskanzler ist
  in der gleichen Pressekonferenz ja auch danach gefragt worden. Er hat dort auch
  noch einmal gesagt, dass wir als Bundesregierung keine Kenntnis darüber haben, und
  das gilt auch, ja. Aber jetzt haben Sie ja offenbar Kenntnisse, wenn der Präsident
  Aserbaidschans genau das erzählt hat. Herr Hinterseher, ist der Außenminister irritiert
  bzw. hat er davon gewusst? Ich würde das nicht mit einer emotionalen Reaktion verbinden
  wollen, sondern kann auch noch einmal das darlegen, was der stellvertretende Regierungssprecher
  gerade gesagt hat: Von dem gestern erwähnten Treffen in Baku hat das Auswärtige
  Amt keine Kenntnis, und es fand weder in unserem Auftrag statt, noch waren wir in
  die Planung dieses Treffens in irgendeiner Art involviert. Aber der Punkt ist ja:
  Jetzt haben Sie ja Erkenntnis. Was sagen Sie denn dazu? Wir haben keine eigenen
  Erkenntnisse darüber. Wie gesagt, der Bundeskanzler hat gestern wörtlich gesagt:
  „Ich kann darauf eine ganz einfache Antwort geben: Mir ist von einem solchen Treffen
  nichts bekannt.“ Dementsprechend können wir das auch nicht kommentieren. Wie gesagt,
  hinsichtlich unserer Haltung zum Ukrainekrieg, aber auch hinsichtlich Fragen darüber,
  wer hier derjenige ist, der diesen Krieg begonnen hat, und wer auch derjenige ist,
  der diesen Krieg beenden muss, nämlich Wladimir Putin, gibt es, glaube ich, keinen
  Zweifel. Das ist die Haltung der Bundesregierung. Noch einmal: Über mögliche, etwaige
  Gespräche haben wir keine eigenen Erkenntnisse. Ich habe noch eine Nachreichung
  zur Stiftung Flucht, Vertreibung und Versöhnung. Da bin ich Ihnen noch eine Antwort
  schuldig. Es gibt keine Abkehr von der bisherigen inhaltlichen Arbeit der Stiftung.
  Nach wie vor legt das Gesetz als Stiftungszweck fest, „im Geiste der Versöhnung
  die Erinnerung und das Gedenken an Flucht und Vertreibung im 20. Jahrhundert [...]
  im historischen Kontext des Zweiten Weltkriegs und der nationalsozialistischen Expansions-
  und Vernichtungspolitik und ihrer Folgen wachzuhalten.“ Noch zu der letzten Frage:
  Es gibt keinen Mittelaufwuchs bei der Stiftung.'
