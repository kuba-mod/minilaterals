title: 'Popmusikgipfel im Kanzleramt: Weimer startet konzertierte Aktion zwischen
  Künstlern und Industrie'
text: 'Der Staatsminister für Kultur und Medien, Wolfram Weimer, hat sich heute im
  Bundeskanzleramt mit Vertreterinnen und Vertretern der Musikbranche auf eine gemeinsame
  Zukunftsagenda für das Musikstreaming geeinigt. Dafür kamen zum ersten Mal alle
  Interessengruppen der Musikindustrie gemeinsam zusammen: Musiker wie Herbert Grönemeyer,
  Manager von Streamingdiensten und Musiklabels sowie Vertreter von Branchenverbänden.
  Die Zukunftsagenda sieht vor, dass unter Moderation des BKM gemeinsam mit der Branche
  in einer neu eingerichteten „Taskforce Musikstreaming“ an passgenauen Lösungen für
  aktuelle Herausforderungen gearbeitet wird. Hierzu gehört auch, einen „Vergütungskompass“
  einzuführen, der erstmals belastbare Daten für den deutschen Markt bereitstellt.
  Kulturstaatsminister Weimer sagte vorab: „Kreatives Schaffen muss sich auch im digitalen
  Zeitalter lohnen. Die heute vereinbarte Zukunftsagenda eröffnet einen strukturierten
  Dialog über die Zukunft des Musikstreamings – insbesondere im Hinblick auf Fragen
  der Vergütung und Transparenz. Sie bildet den Auftakt für einen gemeinsamen Prozess,
  an dem zentrale Akteure des Musikstreaming-Marktes beteiligt sind. Wir werden diesen
  Prozess aktiv moderieren und darauf hinwirken, dass unterschiedliche Perspektiven
  zusammengeführt und tragfähige Lösungen entwickelt werden.“ Musikstreaming ist heute
  eine der zentralen Formen des Musikkonsums und gleichzeitig wichtiger Wachstumstreiber
  der Musikbranche. Mit seiner wirtschaftlichen Bedeutung rücken auch Fragen der Vergütung
  und Transparenz zunehmend in den Fokus. Vor diesem Hintergrund lud Kulturstaatsminister
  Wolfram Weimer die Musikbranche zwischen Dezember 2025 und März 2026 zu drei Gesprächsrunden
  ein. Nun kommen erstmalig alle Akteurinnen und Akteure der Musikindustrie zusammen
  – darunter Künstlerinnen und Künstler, Vertreterinnen und Vertreter von Streamingdiensten,
  Labels und aus der Branche. Zu den Teilnehmenden des Gipfels heute gehörten namhafte
  Künstlerinnen und Künstler wie Herbert Grönemeyer, Carolin Niemczyk und Daniel Grunenberg
  von Glasperlenspiel, sowie der Rapper, Songwriter und Produzent Maeckes. Ebenfalls
  vertreten waren PRO MUSIK e.V., die Akademie für populäre Musik und die Fair Share
  Initiative. Neben der GEMA, dem Verband Deutscher Musikverlage e.V. sowie dem Bundesverband
  Musikindustrie und dem Verband unabhängiger Musikunternehmer*innen nahmen auch Vertreterinnen
  und Vertreter der Universal Music Group, von Sony Music sowie von dem Label BMG
  an dem Termin teil. Vertreterinnen und Vertreter von Amazon Music, Apple Music,
  Spotify und YouTube Music sowie vom Branchenverband Bitkom waren ebenfalls anwesend,
  ebenso vom Bundesministerium der Justiz und für Verbraucherschutz (BMJV). Weitere
  Informationen zu diesem Thema sind unter www.kulturstaatsminister.de/zukunftsagenda-musikstreaming
  zu finden.'
