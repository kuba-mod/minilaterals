title: Pressestatement von Bundeskanzler Merz vor dem Deutsch-Französischen Ministerrat
  am 16. Juli 2026 in Bensberg
text: Ich heiße den französischen Staatspräsidenten Emmanuel Macron herzlich willkommen.
  Ich freue mich sehr, dass wir die deutsch-französischen Regierungsgespräche, den
  deutsch-französischen Ministerrat in diesem Jahr in Deutschland durchführen. Wir
  waren vergangenes Jahr in Toulon und haben eine sehr erfolgreiche gemeinsame Begegnung
  in Frankreich gehabt, im Süden Frankreichs. Wir sind heute hier in Nordrhein-Westfalen,
  und wir werden morgen in Schloss Augustusburg sein. Das ist ein bekannter Platz,
  und es hat eine Tradition für die deutsch-französischen Beziehungen. Das ist der
  Ort, der Platz, das Schloss, in dem Präsident Charles de Gaulle vor 65 Jahren dem
  damaligen Bundespräsidenten Konrad Adenauer einen deutsch-französischen Freundschaftsvertrag
  angeboten hat. Dieser deutsch-französische Freundschaftsvertrag ist dann der Élysée-Vertrag
  geworden, die Basis, die Grundlage für unsere Arbeit heute. Wir werden uns über
  die großen Themen unterhalten, über die Wirtschaftspolitik, über die Energiepolitik,
  über die Sicherheits- und Verteidigungspolitik. Ich freue mich sehr, dass die französische
  Regierung und der französische Präsident meiner Einladung gefolgt sind, jetzt im
  Sommer 2026 nach Deutschland zu kommen. Es ist eine Woche, in der wir uns schon
  zum zweiten Mal sehen. Wir hatten Gelegenheit, am Anfang der Woche in Paris die
  Koalition der Willigen im Élysée zu treffen. Wir haben am Dienstagmorgen auch gemeinsam
  als Gäste des französischen Staatspräsidenten an der Militärparade zum Nationalfeiertag
  der Franzosen teilgenommen. Das war, wenn ich das noch einmal sagen darf, Emmanuel,
  ein wirklich bewegendes Ereignis. Herzlichen Dank für die nicht selbstverständliche
  Einladung auch zu diesem großen Festtag der Franzosen, dem 14. Juli. Herzlich willkommen
  in Deutschland! Ich freue mich auf unsere Begegnung und auf unsere Beratungen heute
  Abend und morgen.
