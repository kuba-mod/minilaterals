title: Deutschlandfonds Investitionen für mehr Wachstum in Deutschland
text: 'Bundesfinanzminister Klingbeil, die Bundeswirtschaftsministerin Reiche und
  der KfW -Vorstandsvorsitzende Wintels bei der Vorstellung des Deutschlandfonds.
  Foto: picture alliance / REUTERS/Liesa Johannssen Der im Dezember 2025 von Bundesregierung
  und KfW gestartete Deutschlandfonds ist gut angelaufen. Er vereint verschiedene
  Finanzierungsinstrumente, um mit öffentlichen Mitteln privates Kapital zu mobilisieren.
  Ziel sind zusätzliche Investitionen von rund 130 Milliarden Euro – umgesetzt durch
  Kredite, Beteiligungen und staatliche Risikoabsicherungen durch die KfW . Das Geld
  soll unter anderem in Künstliche Intelligenz, Biotechnologie und die Sicherung von
  Rohstoffen fließen. Der Staat übernimmt gezielt einen Teil des Risikos von Investoren.
  Damit mehr bezahlbare Wohnungen gebaut werden, wird zusammen mit der KfW zudem ein
  Wohnungsbaufonds aufgebaut. Der Deutschlandfonds fügt sich ein in die Investitionsagenda
  der Bundesregierung, mit der die Wettbewerbsfähigkeit Deutschlands gestärkt werden
  soll. Neben der Einrichtung des Sondervermögens – der größten Unternehmenssteuerreform
  seit 20 Jahren – und neuen Abschreibungsmöglichkeiten für Unternehmen gibt der Deutschlandfonds
  weitere Impulse für mehr private Investitionen. Der Deutschlandfonds ist im ersten
  Halbjahr erfolgreich gestartet, erste Finanzierungen wurden getätigt, neue Bausteine
  stehen vor dem Start. Darunter: Dem Deutschlandfonds stehen etwa 1 Milliarde Euro
  an Haushaltsmitteln zur Verfügung sowie Staatsgarantien in Höhe von von etwa 30
  Milliarden Euro. Zusätzlich steuert die KfW 5,3 Milliarden Euro bei. Es sollen private
  Investitionen in Höhe von 130 Milliarden Euro angestoßen werden. Die Mittel sollen
  nun weiter aufgestockt werden. Wachstumsinvestitionen im Rahmen des Zukunftsfonds
  erhalten zusätzlich 770 Millionen Euro. Der Rohstofffonds soll auf 1,5 Milliarden
  Euro aufgestockt werden. Der Haushaltsausschuss muss noch zustimmen.'
