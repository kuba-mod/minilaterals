title: Im Bundesrat beschlossen Reparieren statt wegwerfen
text: 'Künftig sollen Verbraucherinnen und Verbraucher ein Recht auf Reparatur schadhafter
  Produkte erhalten. Foto: Getty Images/iStockphoto/baranozdemir Schadhafte Produkte
  sollen vermehrt repariert werden. Käuferinnen und Käufer sollen das Recht auf Reparatur
  bekommen. Ziel ist es, einen nachhaltigen Konsum und eine Kultur des Reparierens
  zu fördern. Mit dem neuen Gesetz zur Förderung der Reparatur von Waren soll ein
  Recht auf Reparatur geschaffen werden. Dieses kann gegenüber dem Hersteller für
  die übliche Lebensdauer geltend gemacht werden. Wie lange das genau der Fall ist,
  bestimmt das Gesetz. Verbraucherinnen und Verbraucher haben bei einer mangelhaften
  Sache schon jetzt das Recht auf Gewährleistung. Das bedeutet: Ein Händler muss zwei
  Jahre für die Mangelfreiheit eines Produktes einstehen. Geht das gekaufte Produkt
  innerhalb dieser Zeit kaputt, haben Verbraucherinnen und Verbraucher gegenüber dem
  Händler verschiedene Rechte. Bei der Entscheidung für eine Reparatur soll sich künftig
  die Gewährleistung von zwei auf drei Jahre verlängern. Die neuen Regeln stellen
  klar: Lässt sich eine Ware nicht reparieren, obwohl das bei dieser Art von Produkt
  üblicherweise erwartet werden kann, begründet dies einen Sachmangel. Verbraucherinnen
  und Verbraucher können dann Gewährleistungsrechte geltend machen. Außerdem besteht
  durch das Gesetz die Möglichkeit, Ersatzteile und Werkzeug für die Reparatur zu
  einem angemessenen Preis vom Hersteller zu erhalten. Damit kann man die Reparatur
  selbst in die Hand nehmen.'
