title: 'Bundeskanzler Merz äußerte sich heute angesichts der kanadischen Entscheidung
  zur Beschaffung von U-Booten der 212-CD Klasse:'
text: „Premierminister Mark Carney hat soeben verkündet, dass sich Kanada für die
  Beschaffung deutsch-norwegischer U-Boote der 212CD-Klasse entschieden hat. Vor dem
  morgen beginnenden NATO-Gipfel setzt die kanadische Regierung damit ein starkes
  Zeichen der transatlantischen und europäischen Zusammenarbeit in der Verteidigungsindustrie.
  Dies ist ein großes, strategisches Vorhaben, das Kanada, Deutschland und Norwegen
  auf Jahrzehnte verbindet. Es ist Ausdruck unserer auf Dauer angelegten Partnerschaft,
  die weit über die Sicherheits- und Verteidigungspolitik hinausreicht. Mit Mark Carney
  und meinem norwegischen Amtskollegen Jonas Gahr Støre arbeite ich seit vielen Monaten
  intensiv an dieser Partnerschaft. Für dieses gegenseitige Vertrauen danke ich beiden.
  Deutschland wird es auch in Zukunft honorieren.“
