title: Im Kabinett beschlossen Mehr digitale Stabilität und besserer Zugang zur Versorgung
text: 'Mehr Sicherheit, weniger Aufwand und schnellere Hilfe im Gesundheitswesen:
  Das soll das Gesetz zur Digitalisierung im Gesundheitswesen ermöglichen. Foto: Getty
  Images/Franziska & Tom Werner Digitale Anwendungen wie die elektronische Patientenakte
  oder das E -Rezept sind bereits eingeführt. Im Alltag stoßen Versicherte, Praxen
  und Apotheken aber noch zu oft auf technische Hürden, unterschiedliche Datenformate
  und Systemausfälle. Der nun im Kabinett beschlossene Entwurf des GeDIG soll genau
  hier Abhilfe schaffen. Die Neuregelung soll bestehende digitale Angebote verlässlicher
  und nutzerfreundlicher machen, Versorgungslücken schließen und die rechtliche Grundlage
  dafür schaffen, dass Gesundheitsdaten sicher dort ankommen, wo sie gebraucht werden
  – in der Arztpraxis, in der Apotheke und im Notfall. Zugleich setzt Deutschland
  die EU -Verordnung zum Europäischen Gesundheitsdatenraum (EHDS) um und macht Gesundheitsdaten
  europaweit nutzbar. Elektronische Patientenakte: Kassen erhalten mehr Spielraum
  für eigene digitale Zusatzangebote, die elektronische Patientenakte wird weiter
  ausgebaut, und Apotheken erhalten über das E -Rezept einen eingeschränkten Zugriff.
  Telematikinfrastruktur: Die gematik erhält eine stärker steuernde Rolle mit einer
  neuen Betreiberfunktion sowie erweiterten Befugnissen zur Gefahrenabwehr, um die
  Betriebsstabilität zu erhöhen. Digitale Anwendungen: E -Rezept und E -Rechnung werden
  praxistauglicher, die eGK und die digitale Identität einfacher nutzbar, unsichere
  Übertragungswege wie Fax abgeschafft. Primärversorgung: Elektronische Überweisung,
  digitale Ersteinschätzung und eine engere Verzahnung mit der 116 117 schaffen zusätzliche,
  niedrigschwellige Zugänge zur Versorgung. Interoperabilität: Leistungserbringer
  und IT -Hersteller werden zu kompatiblen, austauschbaren Datenformaten verpflichtet;
  das KIG erhält erweiterte Aufgaben. Forschung und Versorgung: Das Forschungsdatenzentrum
  Gesundheit wird gestärkt, Kassen erhalten mehr Möglichkeiten zur datengestützten
  Versorgung und dürfen neue Ansätze in befristeten Reallaboren erproben. Europäischer
  Gesundheitsdatenraum: Für einen besseren grenzüberschreitenden Zugang zu Gesundheitsdaten
  in der Versorgung erhalten die gematik und das Bundesgesundheitsministerium (als
  „Stelle für digitale Gesundheit“, Digital Health Authority ) sowie das BSI als Marktüberwachungsbehörde
  und die Deutsche Verbindungsstelle Krankenversicherung – Ausland (DVKA) klar definierte
  Aufgaben. Der grenzüberschreitende Datenaustausch soll weitgehend über die elektronische
  Patientenakte erfolgen. Weitere Informationen zum Gesetzentwurf für Daten und digitale
  Innovation im Gesundheitswesen (GeDIG) finden Sie beim Bundesgesundheitsministerium.'
