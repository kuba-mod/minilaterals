title: Internationaler Handel Zolleinigung mit den Vereinigten Staaten
text: 'Containerschiffe transportieren riesige Mengen an Gütern weltweit. Die Handelsbeziehungen
  zwischen der EU und den USA machen fast 30 Prozent des weltweiten Handels aus. Die
  Europäische Kommission und die Vereinigten Staaten haben sich im August 2025 mit
  dem sogenannten Turnberry-Deal auf eine Grundsatzeinigung zur Höhe der gegenseitigen
  Zölle verständigt. Am 1. Juli 2026 sind die neuen EU -Verordnungen zur EU - US -Zollvereinbarung
  in Kraft getreten. Sie gelten bis zum bis zum 31. Dezember 2029. Bundeskanzler Friedrich
  Merz begrüßte die Grundsatzeinigung. Es sei „gut, dass Europa und die USA sich geeinigt
  haben und so eine unnötige Eskalation in den transatlantischen Handelsbeziehungen
  vermeiden”. Deutschland habe so seine Kerninteressen wahren können. Das Ergebnis
  sei „ in der gegebenen Situation das Beste, was zu erreichen war”. Die EU setzt
  die Vereinbarung mit den USA mit den Verordnungen 2026/1455 und 2026/1461 um. Sie
  wurden am 30. Juni im Amtsblatt der EU veröffentlicht und gelten damit ab dem 1.
  Juli 2026. „Dies ist nicht das Ende des Prozesses, wir arbeiten weiterhin mit den
  USA zusammen, um weitere Zollsenkungen zu vereinbaren, mehr Bereiche der Zusammenarbeit
  zu identifizieren und mehr Wirtschaftswachstumspotenzial zu schaffen”, sagte EU
  -Kommissionspräsidentin Ursula von der Leyen nach der Verständigung. Sie kündigte
  zudem an, die internationalen Handelspartnerschaften weiter zu diversifizieren für
  Arbeitsplätze und Wohlstand in der EU . Die Europäische Kommission hat sich mit
  US -Präsident Trump grundsätzlich auf 15 Prozent Zölle auf die überwiegende Mehrheit
  der EU -Exporte in die USA verständigt. Diese Obergrenze gilt für die meisten Sektoren
  – darunter Autos, Halbleiter und Pharmazeutika. Der Zollsatz von 15 Prozent ist
  zwar höher als die in den vergangenen Jahren gültigen Zollsätze. Er liegt aber deutlich
  unter den Zöllen , die US -Präsident Trump im Falle einer Nicht-Einigung angedroht
  oder bereits beschlossen hatte. Die gemeinsame schriftliche Vereinbarung fixiert
  diese Grundsatzeinigung. Die Zoll-Einigung für Autos gilt seit dem 24. Februar 2026
  rückwirkend ab 1. August 2025. Die Bundesregierung hat sich für eine faire und dauerhafte
  Verständigung eingesetzt. Die Vereinbarung mit den USA sollte möglichst rasch umgesetzt
  werden. Dafür war die Bundesregierung mit den anderen Beteiligten in ständigem Austausch.
  Die Verhandlungen mit den USA führte die Europäische Kommission. Die Europäische
  Kommission und Deutschland setzten sich dabei immer zuerst für den freien, regelbasierten
  Handel sowie Kompromisse ein, die für beide Seiten vorteilhaft sind. Das Europäische
  Parlament hatte die Zustimmung zur Vereinbarung an bestimmte Bedingungen geknüpft.
  Darüber ist im Trilog-Verfahren zwischen dem Europäischen Parlament, der Europäischen
  Kommission und den Mitgliedsstaaten eine Einigung erzielt worden. Damit konnte die
  Vereinbarung EU -seitig umgesetzt werden. Das ist gut, denn: Unternehmen brauchen
  Planungssicherheit – auf beiden Seiten des Atlantiks. Die EU verpflichtete sich,
  Zölle auf alle aus den USA importierten Industriegüter abzuschaffen und den Marktzugang
  für bestimmte nicht sensible Agrar- und Lebensmittelerzeugnisse zu verbessern. Beispielsweise
  erhalten Nüsse, Milchprodukte, Obst- und Gemüsewaren, verarbeitete Lebensmittel,
  Saatgut, Sojaöl sowie Schweine- und Bisonfleisch einen bevorzugten Marktzugang über
  Zollkontingente. Diese Regelungen gelten bis Ende 2029 ( Sunset -Klausel), mit der
  Möglichkeit einer Verlängerung. Außerdem wird die zollfreie Einfuhr von Hummer und
  Langusten aus den USA bis zum 31. Juli 2030 verlängert. Zudem wird ein Schutzmechanismus
  eingerichtet, falls die den USA gewährten Zollpräferenzen zu Importsteigerungen
  führen, die der EU -Industrie, einschließlich des Agrarsektors, ernsthafte Schäden
  zufügen könnten. Die Kommission kann eine Untersuchung auf eigene Initiative oder
  auf Grundlage von Informationen eines oder mehrerer Mitgliedstaaten oder des Europäischen
  Parlaments einleiten. Zölle und andere Handelsschranken belasten immer auch die
  Wirtschaft, insbesondere exportorientierte Unternehmen. Die Einigung gibt der Wirtschaft
  aber Planungssicherheit. Es sei so gelungen, „einen Handelskonflikt abzuwenden,
  der gerade die exportorientierte deutsche Wirtschaft hart getroffen hätte”, hatte
  Bundeskanzler Merz nach der Grundsatzeinigung betont. Das gilt besonders auch für
  die Automobilwirtschaft: Die vorherigen US -Zölle von 27,5 Prozent wurden von den
  USA damit Anfang August 2025 auf 15 Prozent fast halbiert. Gerade hier war die schnelle
  Zollsenkung von größter Bedeutung. Zwischenzeitlich erhobene Zusatzzölle für KfZ
  -Teile nahmen die USA wieder zurück. Die Vereinbarung sieht die 15-Prozent-Obergrenze
  ebenfalls für Pharmazeutika, Halbleiter und Bauholz vor. Für Holzprodukte findet
  sie bereits Anwendung. Die Zölle für Pharmazeutika treten voraussichtlich Ende Juli
  2026 in Kraft. Die Bundesregierung setzt sich weiterhin gemeinsam mit der EU -Kommission
  dafür ein, die höheren US -Zölle für Stahl- und Aluminium, Metallwaren, sowie für
  die Halbleiterindustrie zu senken. Sollten die USA jedoch bis zum 31. Dezember 2026
  weiterhin einen Zollsatz von über 15 Prozent auf EU -Stahl- und Aluminiumderivate
  anwenden, kann die EU -Kommission die Zollpräferenzen aussetzen. Gleichzeitig setzt
  sich die Bundesregierung auch weiterhin in den Handelsbeziehungen weltweit für Zollsenkungen
  und den Abbau von Handelshemmnissen ein. Denn eine Beschränkung des weltweiten Handels
  schadet allen. Von stabilen und planbaren Handelsbeziehungen mit Marktzugang für
  beide Seiten profitieren alle – auch Verbraucherinnen und Verbraucher. Daher ist
  die nun gefundene Einigung eine gute Nachricht. Welche Auswirkungen die US -Zölle
  für Verbraucherinnen und Verbraucher in Deutschland haben werden, ist laut Expertinnen
  und Experten derzeit noch nicht vorhersehbar. Möglich ist zum Beispiel auch, dass
  bestimmte, von den US -Zöllen betroffene Produkte etwa aus Asien verstärkt in Europa
  angeboten werden. Das könnte die Preise bei manchen Produkten bei uns unter Umständen
  sogar nach unten treiben, würde aber europäische Produzenten unter Druck setzen.
  Daher hat die Europäische Kommission eine Taskforce zur Überwachung von Importen
  eingerichtet. Zwischen der EU und den USA wurden 2025 Waren im Wert von 910 Milliarden
  Euro gehandelt. Die EU exportierte Waren im Wert von 555 Milliarden Euro in die
  USA . Die US -Importe betrugen 356 Milliarden Euro. Der Dienstleistungshandel zwischen
  der EU und den USA belief sich 2025 auf 865 Milliarden Euro. Die EU exportierte
  Dienstleistungen im Wert von 343 Milliarden Euro in die USA , während die Importe
  aus den USA 522 Milliarden Euro ausmachten. Zudem sind die EU und die USA weiterhin
  wichtige Investitionspartner: EU - und US- Unternehmen haben 2025 gegenseitige Investitionen
  in Höhe von 1,77 Billionen Euro getätigt. Berücksichtigt man sowohl Waren als auch
  Dienstleistungen, verzeichnete die EU gegenüber den USA 2025 einen Überschuss von
  20 Milliarden Euro. Das sind ein Prozent des gesamten Handels, der insgesamt 1,77
  Billionen Euro beträgt. Die transatlantische Zusammenarbeit ist für Deutschland
  und die Europäische Union von großer Bedeutung. Die Europäische Union und die Vereinigten
  Staaten haben die umfassendsten bilateralen Handels- und Investitionsbeziehungen
  der Welt und die am engsten miteinander verzahnten Volkswirtschaften. Zusammen machen
  sie fast 30 Prozent des weltweiten Handels mit Waren und Dienstleistungen und 43
  Prozent des weltweiten Bruttoinlandsprodukts (BIP) aus. Für die Handels- und damit
  auch die Zollpolitik ist die Europäische Kommission zuständig. Sie führt die Verhandlungen
  zum Handel mit den Vereinigten Staaten – immer in enger Abstimmung mit den EU -Mitgliedstaaten,
  also auch mit Deutschland. Innerhalb der Europäischen Union sind alle Zölle seit
  der Gründung der Zollunion 1968 abgeschafft. Zölle sind Abgaben, die bei der Einfuhr
  von Waren erhoben werden. Sie dienen als Einnahmequelle für den Staat und erhöhen
  die Preise für Importe aus dem Ausland. Das kann zu Preisvorteilen für im Inland
  hergestellte Produkte führen. Zölle sollen lokale Unternehmen und Arbeitsplätze
  fördern und die heimische Industrie vor Wettbewerb im Ausland schützen. Gleichzeitig
  verteuern Zölle importierte Produkte und bremsen den grenzüberschreitenden Handel.
  Gerade die deutsche Wirtschaft, aber auch die USA und viele andere Staaten haben
  in den letzten Jahrzehnten enorm vom freien und regelbasierten, weltweiten und gegenseitigen
  Handel profitiert. Bei der Festlegung der Zölle befolgt die Europäische Union die
  Grundsätze und Regeln der Welthandelsorganisation ( WTO ). Einer der wichtigsten
  WTO -Grundsätze ist die sogenannte Meistbegünstigung – sie erlaubt den Ländern in
  der Regel keine diskriminierenden Unterscheidungen zwischen ihren Handelspartnern.
  Länder können Freihandelsabkommen schließen, um den Handel mit bestimmten Waren
  zu vereinfachen. Diese Abkommen gelten nur für Waren, die zwischen diesen Ländern
  gehandelt werden. Ebenso können Länder Schranken gegen Produkte aus bestimmten Ländern
  setzen, die als unfair gehandelt gelten. Für Deutschland hat die Beibehaltung und
  Stärkung der internationalen regelbasierten Handelsordnung höchste Priorität. Dazu
  gehört auch, den freien und fairen Wettbewerb auf Basis des vereinbarten WTO -Rechts
  zu schützen, neue EU -Freihandelsabkommen abzuschließen und Handelsschranken zu
  verhindern.'
