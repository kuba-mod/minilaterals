title: 'Kulturbauten-Initiative: Staatsminister Weimer übergibt Förderbescheide in
  Höhe von rund 43 Millionen Euro für Kulturbauten in Hamburg und Lübeck'
text: 'Staatsminister Wolfram Weimer setzt seine Kulturbautenreise fort: Am 14. Juli
  besuchte er den Friedhof Ohlsdorf und die Schaugewächshäuser in Planten un Blomen
  in Hamburg. Anschließend reiste er nach Lübeck zur Kathedrale St. Marien und zum
  Dom zu Lübeck. Alle Institutionen erhielten Förderbescheide. Staatsminister Weimer
  sagte vorab: „Ich freue mich, dass die Kulturbauten-Initiative so stark Gestalt
  annimmt. Auch die Stationen meiner heutigen Reise spiegeln die kulturelle Vielfalt
  unseres Landes wider: vom historischen Friedhof über denkmalgeschützte Gewächshäuser
  bis hin zu großen Kirchen. Es sind Orte der Begegnung, des Austauschs und des gesellschaftlichen
  Zusammenhalts – Orte, die Identität stiften. Mit den Fördermitteln des Bundes tragen
  wir dazu bei, dass diese bedeutenden Orte auch für kommende Generationen erhalten
  bleiben. Ich danke dem Haushaltsausschuss des Deutschen Bundestages, der regelmäßig
  Gelder für Investitionen in Kulturbauten zur Verfügung stellt.“ Zu Beginn besuchte
  Kulturstaatsminister Weimer den größten Parkfriedhof der Welt in Ohlsdorf und überreichte
  einen Förderbescheid in Höhe von 9,05 Millionen Euro. Die Mittel fließen in die
  denkmalgerechte Sanierung zweier Kapellen aus den 1920er Jahren sowie in die Errichtung
  eines Schutzbaus für das Mausoleum der Familie Schröder, um dieses vor dem weiteren
  Verfall zu bewahren. Anschließend ging es in die Parkanlage Planten un Blomen, wo
  der Staatsminister die architektonisch eindrucksvollen Schaugewächshäuser besichtigte.
  Für deren denkmalgerechte Sanierung erhielt die Freie Hansestadt Hamburg einen Förderbescheid
  in Höhe von 13,15 Millionen Euro. Nach Hamburg ging es weiter in Richtung Norden.
  In der Altstadt Lübecks, einer UNESCO-Weltkulturerbestätte, steht die Kathedrale
  St. Marien. Staatsminister Weimer konnte sich hier ein Bild der aufwendigen Innenraumsanierung
  machen. Mit 14 Millionen Euro unterstützt der Bund die denkmalgerechte Sanierung.
  Hierzu gehören unter anderem die Restaurierung der farbigen Wand und der Bleiverglasung
  sowie die Erneuerung des Fußbodens. Zuletzt ging der Blick nach oben: Im Lübecker
  Dom konnte der Staatsminister die Turmarbeiten miterleben und mit den Zuständigen
  ins Gespräch kommen. Für die Sanierung der bedeutenden Doppelturmanlage, die den
  Blick auf die Altstadt prägt, erhielt die Evangelische Kirchengemeinde einen Förderbescheid
  in Höhe von 6,5 Millionen Euro. Mit seiner Reise möchte Staatsminister Weimer die
  herausragende Bedeutung für die kulturelle Identität Deutschlands sichtbar machen
  und zugleich ein Zeichen für die Vielfalt der Kulturlandschaft setzen, die weit
  über die großen Städte hinausreicht. Viele dieser Orte prägen seit Jahrhunderten
  das Erscheinungsbild ihrer Regionen und sind zugleich wichtige Anziehungspunkte
  für Bildung und Tourismus.'
