title: Bundeskanzler Merz telefoniert mit dem irakischen Premierminister Ali Al-Zaidi
text: Bundeskanzler Friedrich Merz hat heute mit dem irakischen Premierminister, Ali
  Al-Zaidi, telefoniert. Der Bundeskanzler erneuerte seine Glückwünsche zum Amtsantritt.
  Beide tauschten sich zu regionalen Entwicklungen und der Vertiefung der bilateralen
  Beziehungen aus. Der Bundeskanzler unterstrich die Bedeutung guter Rahmenbedingungen
  für den weiteren Ausbau der Wirtschaftsbeziehungen.
