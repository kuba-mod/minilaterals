title: Neues Verpackungsrecht Wenn schon Verpackung, dann recycelbar
text: 'Mit dem Verpackungsrecht-Durchführungsgesetz werden EU -Regelungen bürokratiearm
  und praktikabel umgesetzt. Ab August 2026 gelten in der Europäischen Union die neuen
  Vorgaben der europäischen Verpackungsverordnung. Ziel ist es, EU -weit einheitliche
  Regeln für Verpackungen zu schaffen. Deshalb gilt ein Teil der EU -Vorschriften
  unmittelbar in allen Mitgliedstaaten. Ein anderer Teil wird national konkretisiert:
  Darum geht es beim nationalen Verpackungsrecht-Durchführungsgesetz. Mit diesem Durchführungsgesetz
  wird das bisherige Verpackungsgesetz abgelöst. In Deutschland bewährte Strukturen
  werden zugleich so weit wie möglich übernommen. Ziel ist es, eine bürokratiearme
  und praktikable Regelung zu schaffen. Ab 2028 werden für die dualen Systeme für
  Kunststoffabfälle erhöhte Recycling quoten von 75 Prozent gelten. Die Regelung sieht
  hierfür mehrere Berechnungsmethoden vor. Vor allem für das chemische Recycling ermöglicht
  sie Absatzmärkte. Mit der neuen Regelung sollen Verpackungsmengen insgesamt verringert
  und unvermeidbare Verpackungen möglichst recycling fähig gestaltet werden. Darüber
  hinaus werden weitere verbraucherrelevante Vorgaben gelten:'
