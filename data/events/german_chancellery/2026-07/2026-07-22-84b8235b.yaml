title: Bundeskanzler Merz telefoniert mit dem armenischen Ministerpräsidenten Paschinjan
text: Bundeskanzler Friedrich Merz hat heute Nachmittag mit dem armenischen Ministerpräsidenten
  Nikol Paschinjan telefoniert. Die Regierungschefs tauschten sich zur aktuellen Lage
  im Nahen Osten und zum Krieg Russlands gegen die Ukraine sowie den Auswirkungen
  auf den Südkaukasus aus. Der Bundeskanzler ermutigte zu weiteren Schritten im Friedensprozess
  zwischen Armenien und Aserbaidschan und unterstrich dessen Bedeutung für die regionale
  Stabilität. Beide betonten in diesem Zusammenhang die Chancen für den Ausbau der
  bilateralen Beziehungen und der Beziehungen Armeniens mit der EU.
