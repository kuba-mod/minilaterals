title: Finanzreform der Gesetzlichen Krankenversicherung (GKV) beschlossen Für ein
  bezahlbares Gesundheitssystem
text: 'Bundesgesundheitsministerin Warken und Kanzler Merz haben die Reform im Gesundheitswesen
  nach der Sitzung des Bundeskabinetts vorgestellt. Das Gesetz zur Gesetzlichen Krankenversicherung
  (GKV) schafft die Grundlage dafür, die Beiträge zur gesetzlichen Krankenversicherung
  stabiler zu halten. Dazu werden die Ausgaben im Gesundheitswesen begrenzt und verschiedene
  Bereiche neu geregelt. Das Gesetz hat nach dem Bundestag nun auch den Bundesrat
  passiert und kann in Kraft treten. Versicherte profitieren insbesondere davon, dass
  der Bund sich künftig stärker an den Gesundheitskosten für Menschen in der Grundsicherung
  beteiligt und dadurch die Finanzierung der gesetzlichen Krankenversicherung breiter
  aufgestellt wird. Auch Maßnahmen wie der höhere Beitrag der Pharmaunternehmen zur
  Finanzierung der gesetzlichen Krankenversicherung tragen dazu bei, den Anstieg der
  Krankenkassenbeiträge zu begrenzen. Gleichzeitig bleibt eine gute medizinische Versorgung
  gesichert. Die Regelungen betreffen unter anderem Krankenhäuser, Arzneimittel, Impfstoffe,
  die psychotherapeutische Versorgung sowie die Zuzahlungen und Familienversicherung.
  Mit dem Gesetz soll in allen Leistungsbereichen des Gesundheitswesens nun der Grundsatz
  gelten, dass sich die Ausgaben an den Einnahmen orientieren müssen. Der Anstieg
  bei Preisen und Vergütungen wird dauerhaft auf die tatsächliche Kostenentwicklung
  begrenzt. Die durchschnittliche Entwicklung der Bruttolöhne gilt dabei als Obergrenze.
  Die Ausgaben müssen für Versicherte einen nachweisbaren Nutzen haben. Kosten für
  homöopathische Arzneimittel werden künftig nicht mehr erstattet. Dasselbe gilt auch
  für Cannabis-Blüten. Regelungen, die zu Doppelvergütungen oder Fehlanreizen geführt
  haben, sollen abgeschafft werden. Im Arzneimittelbereich wird ein ergänzender Herstellerabschlag
  eingeführt. Der Rabatt, den Apotheken bei der Abgabe verschreibungspflichtiger Arzneimittel
  an gesetzlich Versicherte gewähren müssen, wird erhöht. Die Vergütungen von Führungskräften
  von Krankenkassen sollen ebenso begrenzt werden wie deren Ausgaben für Verwaltung
  und Werbung. Die Zuzahlungsbeiträge für Versicherte sind seit 2004 unverändert.
  Sie werden nun einmalig um 50 Prozent erhöht. Die Festzuschüsse der Krankenkassen
  beim Zahnersatz werden um 10 Prozent reduziert und liegen damit wieder auf dem gleichen
  Niveau wie vor dem Jahr 2020. Die Regelungen für die Zuzahlungsbefreiungen und für
  Härtefälle bleiben unverändert erhalten: Bei chronisch kranken Menschen liegt die
  jährliche Belastungsgrenze bei einem Prozent des Haushaltsbruttoeinkommens, bei
  allen anderen Personen bei zwei Prozent. Die Vergütung psychotherapeutischer Leistungen
  wird angepasst. Bereits begonnene Behandlungen werden weiterhin bis zu ihrem Abschluss
  vollständig vergütet. Die Regelungen zur beitragsfreien Familienversicherung werden
  angepasst. Ab 2028 zahlen mitversicherte Ehegatten und Lebenspartner keinen zusätzlichen
  Beitrag, wenn sie Kinder bis zum vollendeten 12. Lebensjahr betreuen. Beitragsfrei
  mitversichert bleiben unter anderem Ehegatten und Lebenspartner mit Pflegegrad 3,
  4 oder 5 , Menschen mit einer Rente wegen voller Erwerbsminderung sowie Personen,
  die Grundsicherung beziehen. Für alle anderen mitversicherten Partner wird ein zusätzlicher
  Beitrag erhoben in Höhe von 2,5 Prozent des Einkommens des erwerbstätigen Ehepartners.
  Damit die kieferorthopädische Versorgung insbesondere in ländlichen Regionen gesichert
  bleibt, können auch künftig Zahnärztinnen und Zahnärzte mit entsprechender Qualifikation
  kieferorthopädische Leistungen erbringen. Regelungen zum GKV-Beitragsstabilisierungsgesetz
  finden Sie beim Bundesgesundheitsministerium.'
