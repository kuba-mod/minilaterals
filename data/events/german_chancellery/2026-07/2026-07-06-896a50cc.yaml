title: 'Im Kabinett beschlossen: Bundeshaushalt 2027 Etat im Zeichen von Wohlstand
  und Sicherheit'
text: 'Der von Bundesfinanzminister Klingbeil vorgelegte Haushaltsentwurf soll die
  deutsche Wirtschaft langfristig stärken. Globale Krisen und Konflikte stören Lieferketten,
  treiben Energiepreise in die Höhe und erschweren das Wirtschaftswachstum. Die Bundesregierung
  begegnet diesen Herausforderungen mit Handlungsstärke. Sie hat in den letzten Wochen
  weitreichende Entscheidungen für Reformen getroffen, um die Wirtschaft zu stärken,
  Arbeitsplätze zu sichern und die Sozialsysteme zukunftsfest aufzustellen. Mit dem
  Beschluss des Bundeshaushalts 2027 und des Finanzplans bis 2030 schafft das Kabinett
  nun auch die finanziellen Grundlagen, um Sicherheit, Beschäftigung und Wohlstand
  in Deutschland langfristig zu sichern. Die Bundesregierung setzt dabei weiterhin
  auf einen Dreiklang aus Investitionen, Strukturreformen und Konsolidierung. Bundesfinanzminister
  Lars Klingbeil sagte bei der Vorstellung des Haushalts, die Regierung setze mit
  dem Bundeshaushalt auf Investitionen und auf Reformen. Die Prioritäten seien klar:
  „Wir wollen unser Land wieder auf Wachstumskurs bringen. Wir wollen die Arbeitsplätze
  der Zukunft in Deutschland schaffen. Wir setzen auf Hightech , auf KI , auf Innovation
  und wir wollen in Zukunft sicher leben und deswegen stärken wir Sicherheit, Resilienz
  und Verteidigung. Wir handeln und wir investieren dafür, dass Deutschland ein starkes
  Land bleibt.“ Mit dem Bundeshaushalt 2027 setzt die Bundesregierung ihre Investitionen
  zur Stärkung der Sicherheit sowie zur Belebung der Wirtschaft fort. Insgesamt stehen
  rund 118 Milliarden Euro für Investitionen zur Verfügung. Mit diesen Rekordinvestitionen
  sollen das Land modernisiert, Beschäftigung gesichert und die Innovationskraft Deutschlands
  gestärkt werden. Diese Investitionsoffensive soll auch in den Folgejahren konsequent
  fortgeführt werden. Eine zentrale Rolle spielt das Sondervermögen Infrastruktur
  und Klimaneutralität . Für 2027 sind über 36 Milliarden Euro für Investitionen des
  Bundes vorgesehen. Hinzu kommen 10 Milliarden Euro für den Klima- und Transformationsfonds
  sowie rund 8 Milliarden Euro zur Unterstützung von Ländern und Kommunen. Diese Investitionen
  seien notwendig, um das Land gerechter zu machen, so der Finanzminister. „Öffentliche
  Investitionen in Infrastruktur nutzen allen. Gute Schulen und kostenlose Kitas,
  funktionierende Straßen, Bahnverbindungen, bezahlbare Wohnungen, moderne Krankenhäuser,
  sanierte Sportstätten: Das kommt allen in unserem Land zugute, egal ob in der Stadt
  oder auf dem Land, egal ob man viel Geld hat oder wenig.“ Die Bundesregierung erhöht
  zudem die Verteidigungsausgaben, um die Abschreckungs- und Verteidigungsfähigkeit
  Deutschlands zu verbessern. Vorderstes Ziel ist es, militärische Auseinandersetzungen
  zu verhindern. Für Verteidigung steigen die vorgesehenen Ausgaben im kommenden Jahr
  deutlich auf über 109 Milliarden Euro, ergänzt durch Mittel aus dem Sondervermögen
  Bundeswehr. Der Bundeshaushalt trägt insgesamt dazu bei, die Krisenfestigkeit zu
  stärken. Die in der Koalition vereinbarten Konsolidierungsmaßnahmen setzt die Bundesregierung
  Schritt für Schritt um. „Die Haushaltskonsolidierung heute sichert uns die Freiheit
  von morgen. Wir schaffen uns damit wieder Handlungsspielräume“, sagte Klingbeil.
  Diese Spielräume entstehen unter anderem durch die Kürzung von Finanzhilfen im Klima-
  und Transformationsfonds, eine noch wirksamere Bekämpfung von Finanz- und Steuerkriminalität,
  die Besteuerung von Kryptowerten, die Einführung einer Plastiksteuer und die Anpassung
  der Tabaksteuer. Auch Finanzhilfen im Kernhaushalt sollen abgebaut werden. Die Bundesregierung
  hat mit einem konsequenten Subventionsabbau begonnen. 2027 werden auf diese Weise
  knapp drei Milliarden Euro eingespart. In den Folgejahren wird dieser Betrag noch
  deutlich aufwachsen. Außerdem werden – wie im Koalitionsvertrag vereinbart – weitere
  Kürzungen der Mittel für Entwicklungszusammenarbeit vorgenommen. Sparen beginnt
  in der Bundesverwaltung selbst. Effizientere Abläufe und Strukturen in den Bundesministerien
  sparen im kommenden Jahr 1,2 Milliarden Euro im Bundeshaushalt ein. Der Bund überprüft
  alle Maßnahmen hinsichtlich ihrer Wirkung und konnte so für 2027 bereits ressortübergreifende
  Einsparungen in Höhe von vier Milliarden Euro umsetzen. Dies entspricht der Einsparvorgabe
  von 1 Prozent pro Jahr je Ministerium. Diesen Weg wird die Bundesregierung fortsetzen:
  Ab 2028 sollen auf diese Weise weitere 8 Milliarden Euro pro Jahr eingespart werden.
  Der Bund führt außerdem den bereits begonnenen Stellenabbau in der Verwaltung –
  Sicherheitsbehörden sind ausgenommen – fort. Die Einsparquote beim Personal für
  2027 soll zwei Prozent betragen. Insgesamt werden bis 2029 beim Personal acht Prozent
  eingespart. Das Kabinett hat im Haushaltsbegleitgesetz zudem weitere Maßnahmen beschlossen,
  um den Bundeshaushalt zu stärken. So soll der Steuersatz für gewisse Alkoholika
  – außer Bier und Wein – angehoben werden. Daraus ergeben sich bei vollständiger
  Weitergabe der Erhöhungen an die Verbraucherinnen und Verbraucher moderate Preisänderungen
  im zweistelligen Cent -Bereich. Darüber hinaus wird der Bundeszuschuss an die gesetzliche
  Rentenversicherung im Jahr 2027 um 1 Milliarde Euro abgesenkt, was zu einer Entlastung
  des Bundeshaushalts in gleicher Höhe führt.'
