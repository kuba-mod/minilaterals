title: Naher Osten Deutschland steht in tiefer Freundschaft an der Seite Israels
text: 'Deutschland, Europa und Israel stehen für Dialog und Partnerschaft. Nach den
  schrecklichen Terroranschlägen der Hamas am 7. Oktober 2023 hat sich Deutschland
  klar und fest an die Seite Israels gestellt. Inzwischen stabilisiert sich der Waffenstillstand
  in Gaza und ein dauerhafter Frieden ist möglich. „Ich wünsche dem israelischen Volk,
  dass nun nach schweren Jahren von Terror und Krieg eine bessere Zeit beginnt“, sagte
  Bundeskanzler Friedrich Merz bei seinem Antrittsbesuch in Israel. „Dass Entscheidungen
  getroffen werden, die zu Frieden und guter Nachbarschaft in der Region beitragen.“
  Deutschland und er persönlich würden dabei in tiefer Freundschaft an der Seite Israels
  stehen. Der Bundeskanzler reiste am 6. und 7. Dezember 2025 zu Gesprächen mit Staatspräsident
  Itzchak Herzog und Ministerpräsident Benjamin Netanjahu nach Israel. Es müsse nach
  den Traumata des Krieges das Fundament einer neuen Ordnung gelegt werden, in der
  Israelis, Palästinenser und arabische Nachbarn dauerhaft in Frieden, Freiheit, Sicherheit
  und Würde leben können, so der Kanzler in einer gemeinsamen Pressekonferenz mit
  Netanjahu. Bei den Gesprächen ging es auch um den US -Friedensplan für Gaza . Der
  Kanzler betonte, es müsse nach der Freilassung der lebenden und toten Geiseln durch
  die Hamas der Einstieg in die zweite Phase gelingen. Dazu gehöre, dem Terror der
  Hamas dauerhaft die Grundlage zu entziehen. Die Hamas dürfe keine Rolle mehr in
  Gaza spielen. Zudem müsse die prekäre humanitäre Lage der Zivilbevölkerung Gazas
  schnell und spürbar verbessert werden. Nach mehr als zwei Jahren Krieg war es im
  Oktober 2025 dank der Vermittlung von US -Präsident Donald Trump gelungen, einen
  Waffenstillstand für Gaza zu vereinbaren. Der Bundeskanzler nahm am 13. Oktober
  2025 in Ägypten an der Unterschriftenzeremonie zum Frieden in Gaza teil. „Dieser
  Tag, der 13. Oktober 2025, ist ein historischer Tag”, sagte Kanzler Merz vor Ort.
  Der Krieg in Gaza sei zu Ende – nach zwei Jahren Blutvergießen, nach dem 7. Oktober
  2023, diesem barbarischen Terrorangriff der Hamas. Der Kanzler dankte US -Präsident
  Donald Trump und der US -Regierung für die Friedensinitiative, das Engagement und
  die klare Haltung in diesem Konflikt und den Partnern in Katar, Ägypten und der
  Türkei für ihre Vermittlung. Dank gebühre auch der israelischen Regierung, die den
  Weg zum Frieden frei gemacht habe. Lesen Sie hier das Pressestatement im Wortlaut
  . Deutschland werde sich weiter einbringen, damit der Weg zum Frieden gelingt –
  das unterstrich der Kanzler in einer Erklärung zum Waffenstillstand . Die Bundesregierung
  setzt große Hoffnungen in den Friedensprozess und unterstützt nachdrücklich den
  Friedensplan von Präsident Trump . Die Bundesregierung ist für eine verhandelte
  Zwei-Staaten-Lösung. Die Anerkennung eines palästinensischen Staates stehe am Ende
  und nicht am Anfang des Prozesses. Gleichwohl dürfe die israelische Regierung es
  nicht unmöglich machen, dass ein solcher Staat eines Tages entsteht. Die Bundesregierung
  fordere die israelische Regierung dringend auf, keine weiteren Schritte hin zu einer
  Annexion des Westjordanlands zu unternehmen. Das machte der Bundeskanzler bei einer
  Pressekonferenz mit dem tschechischen Ministerpräsidenten Babiš am 10. März 2026
  deutlich. Solche Schritte – wie etwa zum sogenannten E1-Gebiet – müsse die israelische
  Regierung unterlassen, forderte Kanzler Merz. „Das wäre ein großer Fehler.“ In einem
  Telefonat mit Israels Premierminister Netanjahu hat der Bundeskanzler diese Forderung
  noch einmal unterstrichen. „Israel hat das Recht und geradezu die Pflicht, seine
  Bürger und seine Existenz gegen diejenigen zu verteidigen, die dem demokratischen
  jüdischen Staat das Existenzrecht immer wieder absprechen“, erklärte der Kanzler
  anlässlich seines Besuchs in Israel. Kein Staat könne es hinnehmen, dass seine Bürger
  von islamistischen Terroristen ermordet, entführt und gefoltert werden. Deshalb
  stehe Deutschland Israel bei. Gleichzeitig lebten die Menschen in Gaza weiter unter
  sehr prekären Umständen. Deutschland leiste hier humanitäre Unterstützung. Bundesaußenminister
  Wadephul erklärte vor seiner jüngsten Reise nach Israel am 7. Juli, die Bundesregierung
  verliere Gaza nicht aus dem Blick. „Vollumfänglicher Zugang für humanitäre Helfer
  und ihre Materialien sind unerlässlich, um die verzweifelte Lage der Menschen in
  Gaza zu verbessern“, so Wadephul. Im Juli 2026 wurde eine Initiative aus europäischen
  Ländern und der EU -Kommission vorgestellt, deren Ziel es ist, knapp 900 Millionen
  Euro für Early Recovery Maßnahmen in Gaza bereitzustellen. Deutschland beteiligt
  sich daran. „Die Initiative wird auch neue Impulse geben für die zügige Umsetzung
  des 20-Punkte-Plan des Friedensrates. Es müssen endlich die Rahmenbedingungen für
  einen Wiederaufbau geschaffen werden – zu der auch eine Entwaffnung der Hamas gehört“,
  erklärte Bundesentwicklungsministerin Alabali Radovan in Brüssel. Bei seinem Antrittsbesuch
  in Israel erinnerte der Kanzler auch an das Schicksal der Opfer der Terroranschläge,
  der Geiseln und ihrer Angehöriger. „Wir haben mit dem israelischen Volk um die Toten
  getrauert. Wir haben mit Ihnen um die Geiseln gebangt“, so der Kanzler. „Die Heimkehr
  der letzten überlebenden Geiseln, unter ihnen deutsche Staatsangehörige, hat uns
  berührt und auch beglückt.“ Nach 738 Tagen waren die letzten lebenden Geiseln aus
  der Gefangenschaft der Hamas freigekommen. Der Friedensplan sah auch die Übergabe
  der Leichname der ermordeten Geiseln vor, damit ihre Familien in Würde Abschied
  nehmen können. Beim Angriff der Hamas waren mehr als 1.000 Bürgerinnen und Bürger
  Israels gestorben, 250 wurden als Geiseln verschleppt. „Der 7. Oktober 2023 hat
  tiefe Wunden gerissen”, sagte der Kanzler. Deutschland tritt für die Existenz und
  die Sicherheit Israels ein. Dies gehöre zum unveränderlichen Wesenskern deutsch-israelischer
  Beziehungen. Es sei Ausdruck bleibender historischer Verantwortung, so Kanzler Merz.
  „Das gilt für heute, das gilt für morgen, und das gilt für immer.“ Geschichte des
  Nahost-Konflikts: Eine der zentralen Auseinandersetzungen im Nahen Osten ist der
  ungelöste Konflikt zwischen Israelis und Palästinenserinnen und Palästinensern.
  Nach dem Ende des britischen Mandats über Palästina proklamierte Ben Gurion am 14.
  Mai 1948 den Staat Israel. Seitdem kam es immer wieder zu kriegerischen Auseinandersetzungen
  mit den Nachbarstaaten. Dabei geht es auch um die Zukunft eines eigenen Staats für
  Palästinenserinnen und Palästinenser. Zwei-Staaten-Lösung : Die Bundesregierung
  hält an der Überzeugung fest, dass nur eine verhandelte Zwei-Staaten-Lösung dauerhaft
  Frieden und Sicherheit für Israelis und Palästinenser bringen wird. Die Anerkennung
  eines palästinensischen Staats betrachtet sie weiter als einen der abschließenden
  Schritte auf dem Weg zur Verwirklichung einer Zwei Staaten-Lösung. Ihre Hilfe zur
  Schaffung der Voraussetzungen palästinensischer Staatlichkeit setzt die Bundesregierung
  fort. Dazu gehört die Unterstützung der Autonomiebehörde. Seit dem Überfall der
  Terrororganisation Hamas auf Israel hat sich Deutschland intensiv darum bemüht,
  dass sich die Lage nicht zu einer Krise ausweitet, die den ganzen Nahen Osten erfasst.
  Kanzler Merz traf bei seiner Reise in die Region am 6. Dezember in Jordanien König
  Abdullah II. , um mit ihm über die gemeinsamen Anstrengungen für Frieden im Nahen
  Osten und die enge sicherheitspolitische Zusammenarbeit zu sprechen. Am selben Tag
  telefonierte der Kanzler mit dem Präsidenten der Palästinensischen Autonomiebehörde,
  Mahmoud Abbas . Er begrüßte die kooperative Haltung der Palästinensischen Autonomiebehörde
  zum Friedensplan von US -Präsident Trump. Die Autonomiebehörde müsse nun dringend
  notwendige Reformen angehen. Außenminister Johann Wadephul reiste zuletzt am 7.
  Juli nach Israel zu seinem israelischen Amtskollegen Gideon Sa''ar. Er reise zu
  einem engen Freund und Partner, sagte Wadephul vor Abflug. Ziel sei es gewesen,
  mit seinem Besuch einen Beitrag zur Verständigung und langfristigen Befriedung in
  der Region zu leisten. Deutschland wolle Israel und Libanon auf dem Weg unterstützen,
  den jahrzehntelangen Konflikt zwischen beiden Ländern zu beenden. Zugleich war unter
  anderem auch die humanitäre Situation in Gaza Thema ihrer Unterredung. Bereits im
  März 2026 reiste Wadephul auf Bitte des Bundeskanzlers nach Israel. Die weiterhin
  schlechte humanitäre Versorgungslage der Menschen im Gazastreifen sowie die angespannte
  Situation im Westjordanland, insbesondere durch den völkerrechtswidrigen israelischen
  Siedlungsbau und extremistische Siedler, waren Thema seines Besuches in Jerusalem.
  Er überbrachte die Bitte der Bundesregierung, dass die israelische Regierung die
  Siedlungspläne gründlich überdenke. Zuvor war Wadephul unter anderem am 5. Oktober
  2025 in der Region, führte Gespräche in Katar und beim Golfkooperationsrat in Kuwait
  sowie in Israel.  Ende Juli 2025 war Wadephul auf Beschluss des Sicherheitskabinetts
  nach Israel und in die Palästinensischen Gebiete gereist, um dort mit seinen Gesprächspartnern
  über die damals dramatisch verschärfte Lage zu beraten. Ziel bleibt ein anhaltender
  und dauerhafter Frieden unter der Voraussetzung einer verhandelten Zwei-Staaten-Lösung.
  Diese sei die einzige realistische Perspektive, mit der Israelis und Palästinenser
  in Zukunft Seite an Seite, in Sicherheit und in Würde leben können, und die einzige
  Chance auf nachhaltigen Frieden in der Region, bekräftigte der Außenminister. Auch
  Bundespräsident Frank-Walter Steinmeier machte sich bei seiner jüngsten Reise in
  die Region aus Anlass des 60. Jubiläums deutsch-israelischer Beziehungen einen Eindruck
  von der Lage und führte Gespräche. Zunehmend geht es um die weitere Perspektive
  für Gaza. Es stehen Fragen wie die der Verwaltung und des Wiederaufbaus an. Die
  Bundesregierung begrüßt Initiativen zum Wiederaufbau des Gazastreifens. Klar ist:
  Die Bekämpfung der Hamas ist ein legitimes Ziel. Gleichzeitig muss die humanitäre
  Lage im Gaza-Streifen weiter verbessert werden. Die Hilfs- und Warenlieferungen
  müssen ermöglicht, Bewohner des Gazastreifens weiter mit humanitärer und medizinischer
  Hilfe versorgt werden. Deutschland leistet humanitäre Unterstützung. Deutschland
  beteiligt sich an einer EU -Initiative , die am 13. Juli 2026 in Brüssel beim zweiten
  Treffen der Palestine DonorGroup vorgestellt wurde. Ziel der Initiative aus europäischen
  Ländern und der EU -Kommission ist es, knapp 900 Millionen Euro für Early Recovery
  Maßnahmen in Gaza bereitzustellen. Als Teil der EU -Initiative wird das BMZ seine
  Unterstützung ausweiten und beispielsweise Wasserinfrastruktur wieder funktionsfähig
  machen und Bäckereien wieder zum Laufen bringen. Das BMZ stellt dafür im Rahmen
  der EU -Initiative 66,5 Millionen Euro an neuen Mitteln zur Verfügung. Hinzu kommen
  knapp 57 Millionen Euro aus bereits laufenden Projekten. „Als europäische Initiative
  wollen wir schnellstmöglich Sofortmaßnahmen auf den Weg bringen, um das Leben für
  die Menschen in Gaza erträglicher zu machen“, sagte Bundesentwicklungsministerin
  Reeem Alabali Radovan. Die Initiative solle auch neue Impulse für die zügige Umsetzung
  des 20-Punkte-Plan des Friedensrates geben. Die Bundesregierung hat im August 2025
  in Zusammenarbeit mit Jordanien eine Luftbrücke für humanitäre Hilfsgüter über Gaza
  organisiert – in enger Abstimmung mit Frankreich und Großbritannien. Transportflugzeuge
  der Luftwaffe warfen insgesamt 717 Paletten mit knapp 381 Tonnen dringend benötigter
  Hilfsgüter ab – vor allem Nahrungsmittel und medizinische Versorgungsgüter. Den
  Umfang der zukünftigen Unterstützung des UN -Hilfswerks UNRWA--United Nations Relief
  and Works Agency for Palestine Refugees in the Near East macht die Bundesregierung
  von umfassenden Reformen abhängig. Pressekonferenz von Bundeskanzler Merz und Ministerpräsident
  Netanjahu zum Antrittsbesuch in Israel „Die Freundschaft zwischen Deutschland und
  Israel ist kostbar” Pressestatement des Bundeskanzlers bei seiner Reise nach Jordanien
  und Israel „Jordanien spielt eine einzigartige Rolle in der israelisch-palästinensischen
  Frage” Bundeskanzler Merz telefoniert mit dem Präsidenten der Palästinensischen
