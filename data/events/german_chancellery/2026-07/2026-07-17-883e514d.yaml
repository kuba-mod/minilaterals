title: Bundesregierung aktuell
text: 'die Woche hat für Bundeskanzler Friedrich Merz mit einem großen politischen
  Treffen bei Frankreichs Präsidenten Emmanuel Macron in Paris begonnen, und sie endete
  mit einer Reise Macrons und einem Treffen mit Merz im Westen Deutschlands. Es war
  also (auch) eine deutsch-französische Woche, die sich da rund um den 14. Juli, dem
  Nationalfeiertag unserer Nachbarn, entfaltet hat. In Paris kamen 25 Staats- und
  Regierungschefs der „Koalition der Willigen“ zur Unterstützung der Ukraine zusammen,
  und ihre Botschaft wurde von 6700 Soldaten in der traditionellen Militärparade auf
  den Champs-Élysées multipliziert: Europas Sicherheit ist ein Gemeinschaftswerk,
  und das Ziel ist ein gerechter Frieden für die Ukraine. Die Koalition der Willigen
  ist das Unterstützer-Bündnis für die Ukraine. Kiew erzielt in diesem Kriegssommer
  beachtenswerte militärische Erfolge, aber gleichzeitig leidet das Land unter schweren
  Luftangriffen durch ballistische Waffen Russlands. Nötig ist also noch mehr Hilfe,
  vor allem für die Luftabwehr. Der Zeitpunkt ist kritisch, weil die innere Situation
  Russlands und der ukrainische Druck auf Infrastruktur, Energieversorgung und Logistik
  den Krieg an einen Wendepunkt führen könnte. Auch deshalb war es wichtig, dass beim
  NATO-Gipfel in Ankara beschlossen wurde, die Ukraine in diesem und im nächsten Jahr
  mit jeweils mehr als 70 Milliarden Euro zu unterstützen. Deutschland und seine Partner
  sind bereit, nach einem Waffenstillstand einen Beitrag zur Sicherheit der Ukraine
  zu leisten. Auch darauf bereitet sich die Koalition der Willigen vor – ein Manöver
  in Polen wird eine Demonstration der Entschlossenheit liefern. Der Deutsch-Französische
  Ministerrat tagt zweimal im Jahr zur vollen Palette der politischen Themen, wozu
  wenig erstaunlich auch diesmal Verteidigung und Zusammenarbeit in Rüstungsfragen
  gehören. Konkret ist es der Deutsch-Französische Verteidigungs- und Sicherheitsrat,
  der für sein Treffen symbolträchtig den Fliegerhorst Nörvenich ausgewählt hat und
  dort vor einem französischen Rafale-Jet seine Gespräche abwickelte. Diese spezielle
  Rafale-Version ist Teil der französischen nuklearen Abschreckung, was die Botschaft
  so simpel wir wirkungsvoll macht: Die strategische Abschreckung Frankreichs wird
  mehr und mehr von der Bundeswehr unterstützt, die Annäherung in diesem sensiblen
  Teil der Sicherheitspolitik geht voran. Der 26. Ministerrat – also quasi die Versammlung
  der Kabinette (oder Teilen davon) – fand ebenfalls symbolträchtig nicht weit davon
  entfernt in Schloss Augustusburg in Brühl statt. Seit der Grundsteinlegung 1725
  ist dieses Schloss ein Symbol der europäischen Verwobenheit. Was damals die Herrscherhäuser
  stabilisierte (der Kölner Kurfürst Clemens August war Mitglied der bayerischen Kurfürstenfamilie
  und natürlich verbunden mit dem französischen Hof), ist heute politisches Einmaleins
  für die gewählten Vertreter Deutschlands und Frankreichs. In Schloss Augustusburg,
  einem barocken Meisterwerk, hatte Präsident Charles de Gaulle Bundeskanzler Konrad
  Adenauer vor 65 Jahren vorgeschlagen, ein Freundschaftsabkommen zu schließen – den
  Elysée-Vertrag. Die Idee dahinter lebt heute in Brühl weiter: Die Themen des politischen
  Alltags sind deutsch-französisch verzahnt, die Fachleute in den Ministerien und
  der Regierungszentralen arbeiten kontinuierlich an ihren Dossiers, die dann in dem
  gemeinsamen Rat verabschiedet werden. Das ist die Brennkammer im vielbeschworenen
  deutsch-französischen Motor, oder für Freunde des Elektroantriebs: die Batteriezelle.
  Neben all der deutsch-französischen Dynamik hat die Bundesregierung in dieser Woche
  auch ihre innenpolitische Agenda weitergetrieben. Das sogenannte Entlastungskabinett
  hat keine neuen Gesetze beschlossen, sondern alte abgeschafft. Das ist eine wohltuende
  Aufräumarbeit, die jeder zu schätzen weiß, der mal den eigenen Kleiderschrank aufräumt.
  Die Prüffrage bei dieser Übung: Ist das noch nötig, oder kann das weg? Das Ergebnis:
  Entbürokratisierung, bessere Verfahren. 600 Millionen Euro sind so an Entlastung
  zusammengekommen, 445 Millionen alleine im Gesundheitsbereich. Das Bundeskabinett
  wird auch über die parlamentarische Sommerpause hinweg tagen und beschließen, immer
  mit dem Ziel, auch für die kommenden Generationen ein lebens- und liebenswertes
  Land zu schaffen. Diese Bundesregierung hat ihren Rhythmus gefunden. Der „Bundesregierung
  aktuell“- Newsletter pausiert bis Ende August, dann melden wir uns wieder. Genießen
  Sie den Sommer! Die Hamburger Speicherstadt, Schloss Neuschwanstein, die Zeche Zollverein
  und die Burg Gutenfels – nur vier von insgesamt 55 deutschen Welterbestätten der
  UNESCO. Aber die UN-Organisation kann noch so viel mehr: Sie engagiert sich für
  Bildung, Wissenschaft, Kultur und internationale Zusammenarbeit – und Deutschland
  ist seit 1951 dabei. Wir freuen uns über Ihr Feedback: Nutzen Sie bitte dafür das
  Kontaktformular (nicht die Antwortfunktion auf diese E-Mail).'
