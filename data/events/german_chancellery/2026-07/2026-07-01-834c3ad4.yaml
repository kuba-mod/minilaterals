title: Im Kabinett beschlossen Vorsorge- und Sicherstellungsgesetze werden angepasst
text: Im Falle eines Notstandes sollen Militär und Zivilbevölkerung an einem Strang
  ziehen. Die beschlossenen Eckpunkte zur Novellierung der Sicherstellungs- und Vorsorgegesetze
  dienen dazu, eben die Gesetze zu bewerten, die im Falle eines Notstandes oder einer
  Krisensituation angewendet werden. Die Eckpunkte schaffen eine wichtige Grundlage,
  um die Verzahnung der militärischen und der zivilen Seite zu stärken. Die Handlungsfähigkeit
  von Bund, Ländern und Kommunen soll in Krisenlagen aller Art abgesichert sein. So
  soll eine gesamtgesellschaftliche Zusammenarbeit gefördert werden. Darüber hinaus
  ist die Überprüfung der Gesetze entscheidend, um sowohl die Versorgung der Zivilbevölkerung
  als auch der eigenen und verbündeten Streitkräfte in maßgeblichen Krisenlagen bis
  hin zum Verteidigungsfall sicherzustellen. Die bisher geltenden Sicherstellungs-
  und Vorsorgegesetze stammen überwiegend noch aus der Zeit des Kalten Krieges. Sie
  reflektieren nicht mehr vollumfänglich die aktuelle Bedrohungslage in Deutschland
  und Europa sowie die aktuellen technologischen Entwicklungen. Deshalb war die Novellierung
  notwendig.
