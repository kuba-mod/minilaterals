title: 'Liberalisierungsinitiative für Kultur und Medien – Kulturstaatsminister Weimer:
  „Kultur entfesseln für mehr Freiheit und weniger Bürokratie“'
text: 'Das Entlastungskabinett der Bundesregierung hat heute eine Reihe weiterer Maßnahmen
  zum Bürokratieabbau beschlossen. Diese Maßnahmen flankiert Kulturstaatsminister
  Wolfram Weimer mit einer eigenen Liberalisierungsinitiative zum Bürokratieabbau
  im Kulturbereich. Ziel ist es, bürokratischen Aufwand für Kreative und Kulturbehörden
  zu reduzieren, indem Verwaltungsprozesse digitaler, schlanker und praxistauglicher
  gestaltet werden. Dies umfasst unter anderem Vereinfachungen im Zuwendungsrecht,
  bei der Antragsverwaltung oder im Arbeitszeitgesetz. Kulturstaatsminister Wolfram
  Weimer: „Künstlerinnen und Künstler sollen das tun können, wofür sie brennen: Kunst
  schaffen. Viel zu oft hängen sie jedoch fest in komplizierten Antragsverfahren,
  kleinteiliger Kontrolle und aufwändigen Dokumentationspflichten. Mit unserer Liberalisierungsinitiative
  fahren wir solche unnötigen bürokratischen Hürden zurück. So entfesseln wir die
  Kultur durch mehr Vertrauen statt übermäßiger Kontrolle, durch Antragsverfahren
  per Maus-Klick oder durch Anpassungen im Arbeitszeitgesetz.“ Unter anderem setzt
  sich Kulturstaatsminister Weimer dafür ein, die Fristen zur Mittelverwendung durch
  Zuwendungsempfänger zu verlängern, um die Fördergelder flexibler einsetzen zu können.
  Zudem sollen Bagatellgrenzen bei möglichen Rückforderungen eingeführt und Dokumentationspflichten
  abgebaut werden. Dies würde den Verwaltungsaufwand sowohl für die Fördergeldempfänger
  als auch für die Kulturbehörden erheblich reduzieren. Darüber hinaus werden Förderverfahren
  in der Behörde des Staatsministers Ende-zu-Ende digitalisiert und in diesem Zuge
  möglichst vereinheitlicht. Dies ergibt kürzere Bearbeitungszeiten, weniger Medienbrüche,
  mehr Transparenz und verbesserte Möglichkeiten zum Monitoring. Durch Anpassungen
  im Arbeitszeitgesetz soll die Sonntagsöffnung von öffentlichen Bibliotheken ermöglicht
  werden. Dies verschafft insbesondere Berufstätigen, Familien und Alleinerziehenden
  zusätzliche Gelegenheiten für einen Bibliotheksbesuch. Der Staatsminister setzt
  sich zudem für weitere maßvolle Flexibilisierungen der Arbeitszeiten in der Kultur-
  und Kreativwirtschaft ein. Diese sollen sich künftig stärker an den Gegebenheiten
  des Kulturbetriebs orientieren und zugleich die Interessen der Arbeitnehmerinnen
  und Arbeitnehmer wahren. Weitere Entlastungen sowie regulatorische und administrative
  Handlungsfelder für die Kultur- und Kreativwirtschaft werden im September in einem
  gemeinsamen Workshop mit dem Bundesministerium für Wirtschaft und Energie mit den
  Branchen und anderen Ressorts erörtert.'
