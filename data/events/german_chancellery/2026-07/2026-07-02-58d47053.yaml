title: Fragen und Antworten 33 Empfehlungen für eine große Rentenreform
text: 'Die Alterssicherungskommission habe zu einem der „schwierigsten Reformprojekte
  unserer Zeit“ ein ausgewogenes Paket vorgelegt, betonte der Bundeskanzler. Die Alterssicherungskommission
  hat am 23. Juni 2026 ihre Vorschläge für eine grundlegende Rentenreform vorgelegt
  und an die Bundesregierung übergeben . Bundeskanzler Friedrich Merz sprach von einem
  der „schwierigsten Reformprojekte unserer Zeit“. Die Empfehlungen der Kommission
  seien für den Sozialstaat, für Deutschland als Wirtschaftsstandort und die Gesellschaft
  von „allergrößter Bedeutung“. Der Koalitionsausschuss hat am 2. Juli 2026 den Bericht
  der Alterssicherungskommission gewürdigt und will die 33 Empfehlungen der Alterssicherungskommission
  vollständig und zügig umsetzen. Der Vorschlag sei wegweisend für unseren Sozialstaat,
  den Wirtschaftsstandort Deutschland und vor allem für die Gesellschaft. Ziel sei,
  dass das Gesetzgebungsverfahren bis Ende 2026 abgeschlossen sei, so Bundeskanzler
  Merz. Hier finden Sie den vollständigen Bericht der Alterssicherungskommission.
  PDF, 1 MB, barrierefrei Dringender Reformbedarf besteht wegen der demografischen
  Entwicklung: Immer weniger Beitragszahler finanzieren immer mehr Rentnerinnen und
  Rentner. Als Folge würden die Beiträge steigen und das Rentenniveau sinken. In der
  Vergangenheit konnten Korrekturen das System nicht wirklich stabilisieren. Deshalb
  soll nun mit einer großen Reform das Rentensystem langfristig gesichert werden.
  Die Menschen in Deutschland müssen sich auch künftig auf die Rente verlassen können.
  Gleichzeitig müssen die Lasten über alle gesellschaftlichen Gruppen und Generationen
  hinweg gerecht verteilt werden. Mit der Reform soll eine Trendumkehr gelingen: Sie
  soll ermöglichen, dass der Beitragssatz in der Rentenversicherung sinkt und sich
  mittelfristig das Gesamtversorgungsniveau aus gesetzlicher Rente, betrieblicher
  und privater Altersvorsorge erhöht. Die Kommission formuliert zum ersten Mal eine
  politische Zielgröße für die lebensstandardsichernde Altersversorgung: Für Durchschnittsverdienende
  wird eine Nettoersatzquote von mindestens 70 Prozent nach Steuern angesetzt, die
  perspektivisch erreicht werden soll. Dann würde man mindestens 70 Prozent des letzten
  Netto-Einkommens erhalten. Bei Geringverdienern sollte die Quote höher liegen. Die
  Kommission empfiehlt, kapitalgedeckte Elemente in der Alterssicherung zu stärken.
  Sie sieht darin einen wichtigen Schritt, um das Gesamtversorgungsniveau für Rentnerinnen
  und Rentner nicht nur zu stabilisieren, sondern mittelfristig deutlich zu erhöhen.
  Bei der Umsetzung sollte sich Deutschland an den besonders erfolgreichen Vorbildern
  in anderen Ländern wie etwa Schweden orientieren. Die Gesetzliche Rente bleibt die
  wichtigste Säule im System. Die Kommission schlägt vor, sie weiter zu stärken und
  um eine verpflichtende kapitalgedeckte Renten-Komponente, die „gesetzliche Kapitalrente“,
  zu ergänzen. Dazu sollen individuelle Kapitalkonten für die Beitragszahlenden eingerichtet
  werden. Empfohlen wird ein zusätzlicher Beitragssatz von zwei Prozent, der von Beschäftigten
  und Arbeitgebern jeweils zur Hälfte gezahlt wird. Die Beiträge sollen nach schwedischem
  Vorbild zentral verwaltet und am Kapitalmarkt angelegt werden. Damit werden die
  positiven Effekte des Kapitalmarktes genutzt. Für Menschen, die bald in Rente gehen
  und deshalb wenig von der gesetzlichen Kapitalrente profitieren können, soll als
  Ausgleich eine Übergangsregelung bei der Rentenberechnung eingeführt werden. Die
  Kosten werden aus Steuermitteln finanziert. Um das Rentensystem zu stabilisieren,
  soll sich auch das Renteneintrittsalter ändern. Die Regelaltersgrenze soll nach
  2031 moderat an die steigende Lebenserwartung angepasst werden. Dabei sollen sich
  Änderungen der Lebenserwartung im Verhältnis 2:1 auf die Erwerbs- und die Rentenphase
  aufteilen. Das würde nach aktuellen Daten des Statistischen Bundesamtes momentan
  bedeuten, dass die Regelaltersgrenze zwischen 2031 und 2041 schrittweise um etwa
  sechs Monate von 67 auf 67,5 Jahre angehoben würde. Die Kommission empfiehlt, den
  abschlagsfreien Renteneintritt für „besonders langjährig Versicherte“, ursprünglich
  bekannt als „Rente mit 63“, abzuschaffen. Er betrifft Menschen, die mindestens 45
  Versicherungsjahre vorweisen können. Außerdem empfiehlt die Kommission, die Altersgrenze
  für die Frührente mit Abschlägen („Rente für langjährig Versicherte“ nach 35 Versicherungsjahren)
  von derzeit 63 auf 64 Jahre zu erhöhen. Danach wird sie ebenfalls parallel zur Entwicklung
  der Regelaltersgrenze angehoben. Die Altersgrenze bei der Altersteilzeit soll von
  derzeit 55 Jahren auf 58 Jahre steigen. Auch sie soll künftig an die Regelaltersgrenze
  gekoppelt werden. Die sogenannte „Altersteilzeit im Blockmodell“ soll nicht mehr
  länger möglich sein. Aus Sicht der Kommission soll die Rentenentwicklung weiterhin
  an die Lohnentwicklung gekoppelt werden. Allerdings soll der sogenannte Nachhaltigkeitsfaktor
  der Rentenanpassungsformel nach 2031 wieder eingesetzt werden. Mit ihm wird die
  Entwicklung der Demografie und der Erwerbstätigkeit bei der Berechnung des jährlichen
  Rentenwertes berücksichtigt. Gleichzeitig läuft die bis 2031 befristete Haltelinie
  aus. Das heißt: Die Renten steigen zwar weiterhin, aber langsamer als die Löhne.
  So werden die Auswirkungen der demografischen Entwicklung fair verteilt. Die Kommission
  empfiehlt, den Kreis der Beitragszahler zu erweitern. Ab einem Stichtag sollen auch
  Selbständige verpflichtend in die Gesetzliche Rentenversicherung einbezogen werden,
  ebenso Abgeordnete des Deutschen Bundestages und der Landesparlamente sowie Vorstände
  von Aktiengesellschaften. Auch geringfügige Beschäftigungsverhältnisse, sogenannte
  Minijobs, sollen einbezogen werden, ihr steuer- und sozialversicherungsrechtlicher
  Sonderstatus soll abgeschafft werden. Ausnahmen soll es nur noch für Schülerinnen
  und Schüler geben. Die Koalition hat in ihrem ersten Jahr schon eine Reihe von Rentengesetzen
  auf den Weg gebracht. Die einzelnen Vorhaben zielen darauf ab, die gesetzliche,
  betriebliche und private Altersvorsorge zu verbessern. Daran soll nun eine umfassende
  Reform des Rentensystems anknüpfen. Die Bundesregierung hatte deshalb im Januar
  2026 die Alterssicherungskommission eingesetzt, die entsprechende Vorschläge erarbeiten
  sollte. Dabei sollte sie das Gesamtversorgungsniveau in den Blick nehmen. Der Kommission
  gehörten acht Wissenschaftler und drei Parlamentarier an. Geleitet wurde sie von
  Frank-Jürgen Weise und Constanze Janda. Diese Rentengesetze hat die Bundesregierung
  bereits umgesetzt: das Rentenpaket 2025 mit der Sicherung des Rentenniveaus und
  der Mütterrente, das Betriebsrentenstärkungsgesetz und die Aktivrente . Außerdem
  beschloss das Bundeskabinett im Dezember 2025 eine grundlegende Reform der steuerlich
  geförderten privaten Altersvorsorge sowie Eckpunkte für eine Frühstart-Rente .'
