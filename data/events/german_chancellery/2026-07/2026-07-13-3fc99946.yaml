title: Bei leichten Erkrankungen Telefonische Krankschreibung
text: 'Die telefonische Krankschreibung hat sich während der Corona-Krise bewährt.
  Die Koalitionsfraktionen haben sich darauf verständigt , die telefonische Krankschreibung
  abzuschaffen und eine verpflichtende Vorlage der Arbeitsunfähigkeitsbescheinigung
  ab dem ersten Tag der Erkrankung einzuführen. Bis zur Umsetzung dieser Maßnahmen
  bleiben die bisherigen Regelungen bestehen. Bei Erkrankungen wie leichten grippalen
  Infekten ist es möglich, sich telefonisch krankschreiben zu lassen. Voraussetzung
  ist, dass man in der Praxis bekannt ist. Eltern können eine ärztliche Bescheinigung
  bei Erkrankung ihres Kindes ebenfalls per Telefon erhalten. Die Bescheinigung ist
  Voraussetzung dafür, dass berufstätige Eltern Krankengeld erhalten, wenn sie ihr
  krankes Kind betreuen. Versicherte, die aufgrund einer leichten Erkrankung arbeitsunfähig
  sind, können bis zu fünf Kalendertage telefonisch krankgeschrieben werden. Ärztinnen
  und Ärzte stellen hierfür am Telefon Fragen zu den Beschwerden. Sie entscheiden
  dann, ob die Krankschreibung telefonisch erfolgen kann oder doch eine Untersuchung
  in der Praxis nötig ist. Wer eine Folgebescheinigung benötigt, muss die Praxis aufsuchen.
  Die Krankschreibung kann telefonisch nicht verlängert werden, es sei denn, die erstmalige
  Arbeitsunfähigkeitsbescheinigung wurde während eines Praxisbesuchs ausgestellt.
  Dann kann diese Krankschreibung per Telefon verlängert werden. Wer seine Versichertenkarte
  in der Praxis zuvor im entsprechenden Quartal noch nicht eingelesen hat, muss dies
  nach der Erkrankung nachholen. Eltern können für bis zu fünf Werktage eine Bescheinigung
  über die Erkrankung eines Kindes bekommen. Die Voraussetzungen sind die gleichen
  wie bei der Krankschreibung für Erwachsene: Die Patientin oder der Patient muss
  in der Praxis bekannt sein, die Erkrankung darf nicht schwer sein und der Arzt oder
  die Ärztin entscheidet, ob der telefonische Kontakt ausreicht. Gesetzlich Versicherte
  haben Anspruch auf Kinderkrankengeld , wenn sie ihr erkranktes Kind betreuen. Das
  Kinderkrankengeld beträgt in der Regel 90 Prozent des ausgefallenen Nettoarbeitsentgelts.
  Für die Jahre 2024 und 2025 wurden die Kinderkrankentage von 10 auf 15 Arbeitstage
  pro Kind und Elternteil im Jahr erhöht. Die Krankschreibung auf Papier – den „Gelben
  Zettel“ – gibt es nicht mehr. Die Arztpraxis übermittelt die elektronische Arbeitsunfähigkeitsbescheinigung
  (eAU) automatisch an die Krankenkasse. Der Arbeitgeber kann sie dort elektronisch
  abrufen. Achtung: Der Beschäftigte muss seinen Arbeitgeber weiterhin über seine
  Krankschreibung informieren. Seit Januar 2024 erhalten gesetzlich Versicherte zudem
  für verschreibungspflichtige Arzneimittel das sogenannte E-Rezept. Das elektronische
  Rezept hat das rosafarbene Papierrezept abgelöst. Die Praxis hinterlegt die Informationen
  zu den verschriebenen Medikamenten auf der Versichertenkarte, in der Apotheke werden
  die Daten ausgelesen. Der Bundestag hatte den Gemeinsame Bundesausschuss (G-BA)
  von Ärzten, Krankenkassen und Kliniken aufgefordert, eine dauerhafte Regelung zur
  telefonischen Krankschreibung vorzulegen. Diese Möglichkeit entlaste Arztpraxen
  und reduziere für Patientinnen und Patienten die Gefahr, sich in vollen Wartezimmern
  anzustecken. Im Dezember 2023 veröffentlichte der G-BA die neuen Regelungen . Die
  Krankschreibung per Telefon hatte sich während der Corona-Pandemie bewährt. Die
  Regelung hatte dazu beigetragen, die Verbreitung des Virus einzudämmen. Nach mehrmaliger
  Verlängerung war sie am 31. März 2023 ausgelaufen. Der Gemeinsame Bundesausschuss
  (G-BA) ist das höchste Beschlussgremium der gemeinsamen Selbstverwaltung im deutschen
  Gesundheitswesen. Die grundsätzlichen Entscheidungen zum Leistungsanspruch der gesetzlich
  Krankenversicherten trifft in Deutschland der Gesetzgeber. Er hat den G-BA mit der
  Aufgabe betraut den sogenannten Leistungskatalog der Krankenkassen zu konkretisieren.'
