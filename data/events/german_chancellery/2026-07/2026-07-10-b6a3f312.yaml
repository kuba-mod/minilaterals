title: Bundesregierung aktuell
text: 'wenn ein Basketballspiel besonders eng ist, dann spricht man in den letzten
  Minuten von der Crunchtime. Hier entscheidet sich, ob sich die Anstrengung der gesamten
  Partie auszahlt. Fehler wiegen besonders schwer, gute Spielzüge zahlen sich aus.
  Ein bisschen fühlt sich der politische Betrieb in Berlin gerade so an: Die letzten
  Tage vor der Sommerpause geraten zur Crunchtime in Bundestag und Bundesrat. Jetzt
  entscheidet sich, ob die über Monate ausgetüftelte Planung aufgeht. Krankenversicherung,
  Kindergeld, Gebäudeenergiegesetz, beschleunigte Genehmigungen, Infrastrukturzukunftsgesetz
  – lange Gesetzesnamen reduzieren sich auf ja oder nein, jetzt zählt nur die Mehrheit.
  Die Regierungskoalition hat in der letzten Woche das größte Reformpaket seit Beginn
  der Legislaturperiode vorgelegt: die Vorschläge zur Rente, für Wachstum, Wettbewerb
  und Bürokratierückbau. Die große Gesundheitsreform war da bereits auf dem Weg und
  wurde auch am Freitag im Bundestag verabschiedet. Unser Ziel bleibt klar: Wir wollen
  den Staat modernisieren und die Systeme fit machen, damit wir die großen Krisen
  dieser Zeit abwettern und Wohlstand sichern können. Hier geht es aber nicht nur
  um Zahlen, Wachstum oder Sicherheit. Das überragende Ziel ist Stabilität für eine
  Gesellschaft, die verunsichert ist und empfänglich für radikale Verheißungen. Stabilität
  beginnt mit dem Geld und damit mit dem Bundeshaushalt. Dieser Haushalt ist weit
  mehr als eine Sammlung von Zahlen. Er entscheidet darüber, ob Pläne verwirklicht,
  Versprechungen eingehalten und Reformen umgesetzt werden können. Das Kabinett hat
  am Montag seine Zustimmung für den Bundeshaushalt 2027 gegeben. Eine Schlüsselzahl
  darin: 118 Milliarden Euro. Sie werden für Investitionen ausgegeben – mehr als je
  zuvor. Sie fließen in Forschung und Entwicklung, in Klimaschutz und Energiesicherheit,
  in moderne Schienen, Brücken, Straßen und Häfen. Es gibt erste Signale, dass der
  Reformkurs Wirkung entfaltet: Mehr als 10.000 Beschäftigte nutzen bereits das Angebot
  der Aktivrente. Der Start-up Verband meldet mehr als 3000 Firmenneugründungen im
  ersten Halbjahr und der Auftragsbestand der Unternehmen steigt seit 2025 kontinuierlich.
  Noch ist vieles zu tun, aber die Richtung stimmt. Auf der Prioritätenliste dieser
  Bundesregierung steht außerdem die Sicherheitspolitik ganz oben. Deswegen diente
  der NATO-Gipfel in Ankara als Testmoment für die Zusagen, die das Bündnis vor einem
  Jahr gegeben hatte. Und ja, die Mitglieder haben geliefert. Deutschland hat seine
  Verteidigungsausgaben 2026 bereits auf fast 125 Milliarden Euro erhöht. Seit 2022,
  dem Jahr des Beginns des russischen Angriffskrieges gegen die Ukraine, haben wir
  die Verteidigungsausgaben gar verdoppelt. Das kostet den Staat viel Geld und Kraft,
  und immer wieder wird die Frage gestellt: Ist das wirklich nötig? Wären die Summen
  nicht besser in andere Projekte investiert? Ich kann immer nur appellieren, die
  Aufgaben des Staates nicht gegeneinander auszuspielen. Sicherheit und gesellschaftliche
  Stabilität gehören zusammen. Jeden Tag testet Moskau unsere Entschlossenheit durch
  Cyberangriffe, Sabotage, und auch durch Desinformation – etwa mit dem Narrativ,
  dass sich die Regierung nur um Waffen aber nicht um Bürger kümmere. Das ist nachweislich
  falsch – die Sozialausgaben sind stabil hoch in Deutschland. Es ist der russische
  Krieg, der jetzt schon im fünften Jahr alles ins Wanken bringt, was wir unter Stabilität
  und Ordnung verstehen. Auf dem NATO-Gipfel haben die europäischen Mitglieder aber
  auch Kanada gezeigt, dass sie ihre Verteidigung ernst nehmen. Nur wenn Russland
  diese Entschlossenheit ernst nimmt, wird es erkennen, dass seine Aggression nur
  ins Verderben führt. Ein starkes Zeichen war dabei die Verabredung zwischen Kanada,
  Norwegen und Deutschland zum U-Boot-Bau. Es handelt sich um einen der größten Rüstungsaufträge,
  wenn nicht den größten in der Geschichte der Bundesrepublik Deutschland. Diese Beschaffung
  sorgt für eine enge sicherheitspolitische Verbindung über den Atlantik hinweg, und
  zugleich schafft sie Wertschöpfung und Arbeitsplätze in Deutschland. Am Ende dieser
  Woche stehen also viele gute Nachrichten für Deutschland und auch für Europa. Die
  Regierungsfraktionen im Bundestag können sich selbstbewusst in die sitzungsfreie
  Zeit verabschieden. Die Bundesregierung wird noch bis Ende Juli im normalen Betriebstempo
  weiterarbeiten: mit Reisen, Gipfeln, Kabinettssitzungen, Verhandlungen über die
  nächsten Reformen. Im Basketball heißt es: Die Crunchtime gewinnt selten derjenige
  mit dem spektakulärsten Wurf. Meist gewinnt die Mannschaft, die bis zur letzten
  Minute zusammenspielt und alles gibt. Bundesfinanzminister Klingbeil zum Entwurf
  des Bundeshaushalts 2027: „Wir wollen, dass Deutschland ein starkes und krisenfestes
  Land ist. Deshalb sind die Prioritäten im Bundeshaushalt für 2027 klar: Wir wollen
  unser Land wieder auf Wachstumskurs bringen und die Arbeitsplätze der Zukunft in
  Deutschland schaffen. Wir investieren in Zukunftsfähigkeit und Innovationskraft
  ebenso wie in Sicherheit und Resilienz.“ Bundeskanzler Merz am 07.07.2026 zur deutsch-
  norwegischen Rüstungskooperation mit Kanada „Die gestrige Entscheidung Kanadas,
  sich der deutsch-norwegischen Kooperation bei U-Booten vom Typ 212CD anzuschließen,
  bietet die einzigartige Chance, unsere Zusammenarbeit in den Bereichen Rüstungsindustrie
  und Verteidigungskooperation voranzutreiben. Wir ergreifen diese Gelegenheit, um
  Deutschland, Kanada und Norwegen im Geiste der Freundschaft und des Vertrauens auf
  Jahrzehnte enger zusammenzubringen.“ Gründungsboom beschleunigt sich: In der ersten
  Jahreshälfte 2026 wurden in Deutschland 3.053 Startups neu gegründet. Wir freuen
  uns über Ihr Feedback: Nutzen Sie bitte dafür das Kontaktformular (nicht die Antwortfunktion
  auf diese E-Mail).'
