title: Flutkatastrophe im Ahrtal 2021 Gedenken zum 5. Jahrestag
text: 'Die Überflutungen im Ahrtal im Juli 2021 brachten viele Zerstörungen mit sich,
  die für die Menschen vor Ort zum Teil noch bis heute spürbar sind. Fünf Jahre sind
  seit der verheerenden Flutkatastrophe vergangen, die vor allem in Rheinland-Pfalz
  und Nordrhein-Westfalen enormes Leid und Zerstörung verursacht hat. Auch Bayern
  und Sachsen waren von den Flutereignissen betroffen. Insgesamt starben mehr als
  180 Menschen, viele weitere verloren ihre Existenz. Ein besonders erschreckendes
  Ausmaß hatte die Flut im Ahrtal. Die Folgen belasten viele Menschen vor Ort bis
  heute. Um schnellstmöglich zu unterstützen, hatte der Bund unmittelbar nach der
  Flutkatastrophe gemeinsam mit den Ländern zunächst 800 Millionen Euro Soforthilfe
  bereitgestellt. Zusätzlich wurde für den langfristigen Wiederaufbau das Sondervermögen
  „Aufbauhilfe 2021“ mit bis zu 30 Milliarden Euro errichtet. Davon sind bis zu 28
  Milliarden Euro für die Wiederaufbaumaßnahmen in den Ländern und 2 Milliarden Euro
  für den Wiederaufbau der Bundesinfrastruktur vorgesehen. Bis zum 30. Juni 2026 sind
  aus dem Sondervermögen „Aufbauhilfe 2021“ Mittel in Höhe von insgesamt rund 6,2
  Milliarden Euro abgerufen worden. Davon gingen rund 5,2 Milliarden Euro an die Länder.
  Knapp eine Milliarde Euro wurde für den Wiederaufbau von Bundesinfrastruktur verwendet.
  Die Antragsfrist für das Sondervermögen „Aufbauhilfe 2021“ ist am 30. Juni 2026
  ausgelaufen. Die Behörden können aber noch bis Ende 2030 Anträge bewilligen. Fakten
  zur Flutkatastrophe in 2021 : Mehr als 180 Menschen verloren ihr Leben. Zum Teil
  fielen in der Ahrtalregion bis zu 150 Liter Regen pro Quadratmeter innerhalb von
  24 Stunden. Zum Vergleich: Seit 1990 fielen in diesem Gebiet im Durchschnitt im
  gesamten Monat Juli keine 70 Liter. Das THW stellte in der Hochphase pro Tag über
  4.100 ehrenamtliche Kräfte – schwerpunktmäßig an der Ahr und an der Erft. Neben
  den finanziellen Anstrengungen, die für den Wiederaufbau gebraucht werden, soll
  an die Arbeit der haupt- und ehrenamtlichen Einsatzkräfte erinnert werden. Feuerwehr,
  Rettungsdienste und Polizei haben Überragendes geleistet. Der Bund beteiligte sich
  hieran beispielsweise mit Kräften des THW und des Bundesamts für Bevölkerungsschutz
  und Katastrophenhilfe ( BBK ). Auch Bundeswehr und Bundespolizei waren im Einsatz.
  Das Technische Hilfswerk ( THW ) ist die ehrenamtliche Einsatzorganisation des Bundes
  und gehört zum Geschäftsbereich des Bundesinnenministeriums. Es steht der Bevölkerung
  in Not- und Unglücksfällen mit Technik und Know-how zur Seite. Dies geschieht in
  Deutschland und weltweit in Hilfseinsätzen. Das THW besteht aus etwa 2.200 hauptamtlichen
  und rund 88.000 ehrenamtlichen Mitarbeiterinnen und Mitarbeitern deutschlandweit.
  Um sich besser auf künftige Naturkatastrophen vorzubereiten, hat auch der Bund aus
  dem damaligen Geschehen die richtigen Schlüsse gezogen. Ein Aspekt war etwa die
  effektivere Warnung der Bevölkerung in Gefahrensituationen: Alle Menschen müssen
  erreicht werden. Dies geschieht am besten in einer Kombination aus digitalen und
  analogen Warnmitteln – zum Beispiel durch Warn- Apps , Cell Broadcast und Sirenen.
  Cell Broadcast nennt man ein Warnsystem für Mobiltelefone, das Nachrichten über
  Mobilfunkmasten an alle Handys in einem bestimmten Gebiet sendet – ohne App , Telefonnummer
  oder Internetverbindung. Darüber hinaus arbeitet die Bundesregierung gemeinsam mit
  den Ländern und Kommunen stetig an einer Fortentwicklung und Verbesserung des Bevölkerungsschutzes.
  Bevölkerungsschutz umfasst die Begriffe Zivilschutz und Katastrophenschutz. Zivilschutz
  definiert die Aufgabe, die Bevölkerung vor kriegsbedingten Gefahren zu schützen. Unter
  Katastrophenschutz versteht man den Schutz bei großen Unglücken und Katastrophen
  in Friedenszeiten. Weitere Informationen und Tipps für den Umgang mit Hochwasser
  finden Sie beim Bundesamt für Bevölkerungsschutz und Katastrophenhilfe . Ob Hitze,
  langanhaltende Dürren oder andere Extremwetterereignisse, wie Stürme und Starkregen
  – die Bundesregierung sieht die dringende Notwendigkeit, die Anpassung an den Klimawandel
  weiter voranzutreiben. Deshalb gilt es, die Klimaanpassungsstrategie weiter umzusetzen
  und bundesweit die dazu bestehenden Förderprogramme zielgerichtet und effizient
  zu nutzen. So berät das Zentrum für KlimaAnpassung (ZKA) alle Interessierten, vor
  allem Kommunen und Städte. Kommunen können dabei voneinander lernen und für sie
  geeignete Beispiele übernehmen. Zudem wird das bundesweite Aktionsprogramm natürlicher
  Klimaschutz weitergeführt, für das bis 2028 3,5 Milliarden Euro zur Verfügung stehen.
  Gesunde Wälder, Moore und Auen wirken nicht nur Trockenheit entgegen, sie können
  viel Wasser aufnehmen und vorhalten, für Dürrezeiten speichern und bei Hochwasser
  als Überschwemmungsflächen zur Verfügung stehen. Das Aktionsprogramm sorgt mithin
  dafür, dass die genannten Ökosysteme gestärkt, wiederhergestellt und bewahrt werden. Und
  um die künftigen Möglichkeiten nicht ungenutzt zu lassen, will die Bundesregierung
  auch die Forschung zu Klimafolgen und Klimaanpassung verstärken. Die Bundesregierung
  investiert so viel wie noch nie in die Verkehrsinfrastruktur Deutschlands. Bis 2029
  fließen etwa 169 Milliarden Euro in die Sanierung kaputter Straßen, überlasteter
  Schienenwege, maroder Brücken und sanierungsbedürftiger Wasserstraßen. Das Geld
  stellt der Bund zum Teil aus dem Bundeshaushalt aber insbesondere aus dem Sondervermögen
  Infrastruktur und Klimaneutralität zur Verfügung. Dadurch können deutlich mehr Investitionen
  als zuvor ermöglicht werden. Damit das Geld aus dem Sondervermögen Infrastruktur
  und Klimaneutralität schnell zum Einsatz kommt und die Bauprojekte zügig vorangehen,
  hat die Bundesregierung zudem Planungs- und Genehmigungsverfahren beschleunigt:
  Das Infrastruktur-Zukunftsgesetz ermöglicht schnelleres, pragmatisches und unbürokratisches
  Bauen. Konkret werden damit unter anderem Autobahnen und Bundesfernstraßen, Schienenwege,
  der Ersatz von maroden Brücken, der Neu- und Ausbau von LKW -Parkplätzen, Hafenanlagen,
  Projekte zum Hochwasser- und Küstenschutz sowie wichtige Sanierungen von Wasserstraßen
  künftig prioritär behandelt. Darüber hinaus hat die Bundesregierung auch das Vergabebeschleunigungsgesetz
  auf den Weg gebracht. Es ist am 1. Juli 2026 in Kraft getreten. Damit ist das nationale
  Vergaberecht schneller, einfacher, flexibler und digitaler. Das ist besonders wichtig,
  um Bauprojekte schnell und unbürokratisch mit Mitteln aus dem Sondervermögen Infrastruktur
  und Klimaneutralität zu versorgen.'
