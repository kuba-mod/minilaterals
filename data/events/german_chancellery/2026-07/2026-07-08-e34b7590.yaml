title: Im Bundestag angenommen Verschärfte Haftung bei Unfällen mit E-Scootern
text: 'Die Zahl der Unfälle mit Elektro-Rollern hat stark zugenommen. Deshalb hat
  die Bundesregierung die Regelungen angepasst. Die Bundesregierung will es Geschädigten
  von Unfällen mit E -Rollern erleichtern, Schadensersatzansprüche geltend zu machen.
  Zudem sind auch mehr Konsequenzen für die Halter von Elektro- Scooter n vorgesehen.
  Künftig sollen diese haften und zudem verschärfte Haftungsregeln für Fahrerinnen
  und Fahrer gelten. Dazu will die Bundesregierung das Straßenverkehrsgesetz ändern.
  Sie hat deshalb auf Vorschlag der Bundesjustizministerin Stefanie Hubig einen entsprechenden
  Gesetzentwurf beschlossen. Der Bundestag hat den Gesetzesentwurf in unveränderter
  Form angenommen. Nun muss der Bundesrat zustimmen. E-Scooter: In Deutschland sind
  im Jahr 2023 laut Gesamtverband der deutschen Versicherungswirtschaft rund 990.000
  versicherte E - Scooter gemeldet gewesen; 2020 noch waren es 180.000. Ähnlich schnell
  wie diese Zahl steigt die Anzahl der Unfälle mit E - Scooter n: Im Jahr 2024 betrug
  die Zahl der Unfallbeteiligten mit Elektro-Rollern etwa 12.000 – im Jahr 2020 waren
  es noch weniger als 6.000 . Bei vielen Unfällen, an denen E - Scooter beteiligt
  sind, handelt es sich um Mietfahrzeuge. Deren jeweilige Fahrerin oder Fahrer sind
  deshalb häufig schwer zu ermitteln. Die Halter sind überwiegend Sharing -Anbieter,
  die E - Scooter vermieten. Daher wird – wie bei anderen Kraftfahrzeugen – eine Gefährdungshaftung
  für den Halter von sogenannten Elektrokleinstfahrzeugen eingeführt. So wird verhindert,
  dass die Geschädigten leer ausgehen. Für Fahrerinnen und Fahrer von Elektro- Scooter
  n soll künftig eine Haftung für vermutetes Verschulden gelten: Das bedeutet, dass
  sie dann haften, wenn sie sich nicht entlasten können. Im Ergebnis sollen für Unfälle
  mit E - Scooter n künftig die gleichen Haftungsregeln gelten wie für Unfälle mit
  anderen Kraftfahrzeugen, wie zum Beispiel Autos. Ziel ist ein gutes und besonnenes
  Miteinander im Straßenverkehr.'
