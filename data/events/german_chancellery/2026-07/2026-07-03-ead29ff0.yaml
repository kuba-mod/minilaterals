title: Press conference with Federal Chancellor Merz and the B3 heads of state and
  government “The security of the Baltic States is also the security of Germany”
text: 'The Chancellor emphasised that Germany and the Baltic States are “close partners
  within the European Union and in European policy”. “The security of the Baltic States
  is also the security of Germany”, said Federal Chancellor Friedrich Merz as he welcomed
  Estonian Prime Minister Kristen Michal, Latvian President Edgars Rinkēvičs and Lithuanian
  President Gitanas Nausėda to Berlin. According to Merz, close coordination among
  the Allies is more important than ever against the backdrop of the forthcoming NATO
  summit in Ankara. The Federal Government, he said, should follow the example of
  its Baltic partners when it comes to their clarity of vision and determination.
