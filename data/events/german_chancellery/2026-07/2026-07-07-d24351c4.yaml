title: Statement by Prime Minister Mark Carney, Chancellor Friedrich Merz and Prime
  Minister Jonas Gahr Støre
text: In times of profound geopolitical change, Canada, Germany and Norway are determined
  to build a strategic, long-term security partnership built on shared values and
  interests. Yesterday’s Canadian decision to join the German-Norwegian Type 212CD
  submarine cooperation creates a unique opportunity to boost our defence industrial
  and military cooperation. We are seizing this opportunity to bring Canada, Germany
  and Norway closer together for decades to come in a spirit of friendship and trust.
  Together, we will assume greater responsibility for transatlantic security and collective
  defence. Our commitment extends beyond security and defence, encompassing strategic
  areas such as investment, energy, artificial intelligence, space and critical minerals.
  Höflichkeitsübersetzung Erklärung von Bundeskanzler Friedrich Merz, Premierminister
  Mark Carney und Ministerpräsident Jonas Gahr Støre In Zeiten tiefgreifender geopolitischer
  Veränderungen sind Deutschland, Kanada und Norwegen entschlossen, eine strategische,
  langfristige Sicherheitspartnerschaft auf der Grundlage gemeinsamer Werte und Interessen
  aufzubauen. Die gestrige Entscheidung Kanadas, sich der deutsch-norwegischen Kooperation
  bei U-Booten vom Typ 212CD anzuschließen, bietet die einzigartige Chance, unsere
  Zusammenarbeit in den Bereichen Rüstungsindustrie und Verteidigungskooperation voranzutreiben.
  Wir ergreifen diese Gelegenheit, um Deutschland, Kanada und Norwegen im Geiste der
  Freundschaft und des Vertrauens auf Jahrzehnte enger zusammenzubringen. Gemeinsam
  werden wir mehr Verantwortung für die transatlantische Sicherheit und die kollektive
  Verteidigung übernehmen. Unser Engagement geht über Sicherheit und Verteidigung
  hinaus und umfasst auch strategische Bereiche wie Investitionen, Energie, künstliche
  Intelligenz, Weltraum und kritische Mineralien.
