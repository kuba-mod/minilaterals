title: Übersicht Die Woche des Kanzlers
text: 'Bundeskanzler Friedrich Merz verabschiedet im Bundeskanzleramt einen Gast.
  Die „Woche des Kanzlers“ wirft einen Blick auf die wichtigsten Momente im Arbeitsalltag
  von Bundeskanzler Friedrich Merz. Jede Woche nimmt er zahlreiche öffentliche Termine
  wahr – er greift wirtschafts- und gesellschaftspolitische Themen auf, tauscht sich
  mit nationalen und internationalen Gästen im Bundeskanzleramt aus oder reist zu
  anderen Staats- und Regierungschefinnen und -chefs. Die Bildergalerien geben einen
  Überblick über die Aufgaben und Verantwortlichkeiten des Kanzlers. Und die Bürgerinnen
  und Bürger können ihn durch seine Kanzlerschaft begleiten. Köln, 13. Juli 2026:
  Mit einer Rede eröffnete Bundeskanzler Merz am Montag die Adenauer School of Government
  an der Universität zu Köln. Die neue Fakultät soll künftige Führungskräfte auf die
  Herausforderungen einer zunehmend komplexen Welt vorbereiten und strategisches Denken
  sowie gute Regierungsführung stärken. Am Abend wurde der Bundeskanzler von Emmanuel
  Macron in Paris begrüßt. Der französische Präsident war Gastgeber des Gipfeltreffens
  der Koalition der Willigen. Die Koalition der Willigen ist ein Zusammenschluss von
  derzeit 35 Staaten und Organisationen, die sich gemeinsam mit der Ukraine für einen
  dauerhaften und gerechten Frieden in der Ukraine einsetzen. Bundeskanzler Friedrich
  Merz betonte erneut die Bereitschaft aller Beteiligten, auch nach einem Waffenstillstand
  zur Sicherheit der Ukraine beitragen zu wollen. Paris, 14. Juli 2026: Frankreich
  feierte seinen Nationalfeiertag mit einer Militärparade in der Hauptstadt. Zu den
  geladenen Gästen zählten auch Bundeskanzler Friedrich Merz und seine Frau Charlotte
  sowie zahlreiche weitere Staatsgäste. Am Abend besuchte der Kanzler die Stadt Bad
  Neuenahr und sprach mit Ehrenamtlichen der Feuerwehr, des Deutschen Roten Kreuzes,
  des THW und des DLRG , die vor fünf Jahren bei der Flutkatastrophe im Ahrtal im
  Einsatz waren. Stellvertretend für die tausenden ehrenamtlichen Helferinnen und
  Helfern aus der Region und der gesamten Bundesrepublik, dankte er ihnen für die
  bedingungslose Hilfsbereitschaft. In seiner Rede bei der zentralen Gedenkveranstaltung
  gedachte Kanzler Merz der Menschen, die vor fünf Jahren ums Leben kamen. „Wir denken
  an sie. Wir denken an ihre Familien und ihre Freunde. Wir denken an diejenigen,
  die in den Wassermassen verloren haben, was ihnen kostbar war“, so der Bundeskanzler.
  Berlin, 15. Juli 2026: Die Kabinettsmitglieder habe in dem inzwischen zweiten Entlastungkabinett
  weitere Maßnahmen zum Bürokratierückbau auf den Weg gebracht – mit einem Entlastungsvolumen
  von rund 600 Millionen Euro. Das Ziel: Staat und Verwaltung in Deutschland grundlegend
  modernisieren, unnötige Bürokratie vermeiden und Verfahren beschleunigen. Traditionell
  stellte sich der Bundeskanzler vor Beginn der parlamentarischen Sommerpause den
  Fragen der Hauptstadtpresse bei der Sommer-Pressekonferenz. „Wir haben viel erreicht,
  aber es ist noch lange nicht genug“, so der Bundeskanzler zu den Fragen der Journalistinnen
  und Journalisten. Berlin, 16. Juli 2026: Am Donnerstag empfing Bundeskanzler Merz
  empfing den algerischen Präsidenten Abdelmadjid Tebboune zu einem Gespräch im Kanzleramt.
  Im Mittelpunkt standen dabei die bilateralen Beziehungen sowie energie- und wirtschaftspolitische
  Fragen. Bergisch-Gladbach, 16. Juli 2026: Vor der imposanten Kulisse von Schloss
  Bensberg empfing Bundeskanzler Merz den französischen Präsidenten Macron zum Auftakt
  des Deutsch-Französischen Ministerrats. 17. Juli 2026: In einem Hangar des Fliegerhorsts
  Nörvenich tagten die zuständigen Minister des deutsch-französischen Verteidigungs-
  und Sicherheitsrats am Morgen unter der Leitung von Bundeskanzler Merz und dem französischen
  Präsidenten Macron zu außen- und sicherheitspolitische Themen, einschließlich Fragen
  der strategischen Zusammenarbeit. Köln, 13. Juli 2026: Mit einer Rede eröffnete
