date: '2026-07-07'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 7. Juli 2026
text: 'stellvertretender Regierungssprecher Meyer (Vorsitzender Feldhoff eröffnet
  die Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der
  Ministerien.) (Vorsitzender Feldhoff eröffnet die Pressekonferenz und begrüßt SRS
  Meyer sowie die Sprecherinnen und Sprecher der Ministerien.) Der Haushalt, der gestern
  im Kabinett war, ist hier ja schon vom Bundesminister vorgestellt worden. Deshalb
  habe ich tatsächlich nur einen Termin anzukündigen, auch wenn Sie die Ankündigung
  möglicherweise schon auf anderem Wege erreicht hat. Der Bundeskanzler plant, am
  Donnerstag im Deutschen Bundestag eine Regierungserklärung zur aktuellen politischen
  Lage abzugeben. Ich denke, das ist nach Abschluss des NATO-Gipfels ein guter Zeitpunkt.
  Herr Meyer, Sie haben auf den NATO-Gipfel verwiesen. Wird diese Regierungserklärung
  einen eher innenpolitischen Schwerpunkt haben, also mit Blick auf die Reformen,
  die letzte Woche oder vorletzte Woche verkündet wurden, oder einen eher außenpolitischen,
  mit Blick auf den NATO-Gipfel? Der NATO-Gipfel hat jetzt eine hohe Aufmerksamkeit
  bei uns, auch weil er heute und morgen stattfindet. Er hat, denke ich, auch eine
  hohe Bedeutung für die Sicherheit in Europa, aber auch auf der Welt. Insofern hat
  er eine hohe Aufmerksamkeit. Deshalb ist es, denke ich, naheliegend, dass das auch
  in der Regierungserklärung im Anschluss eine Rolle spielen wird. Trotzdem ist angekündigt:
  zur aktuellen politischen Lage. Es gibt sicherlich auch weitere Dinge, die der Bundeskanzler
  gern vortragen möchte. Insofern gibt es keine Einschränkung von meiner Seite, aber
  den Hinweis auf den NATO-Gipfel. Herr Meyer, vielleicht können Sie noch einmal sagen,
  warum das U-Boot-Geschäft , das ja doch ein relativ großes Volumen hat, für Deutschland
  so wichtig ist und was die Bundesregierung Kanada im Gegenzug angeboten hat. Es
  gab bei den Südkoreanern ja eine ganze Reihe von Punkten, die noch mit im Paket
  waren. Vielleicht können Sie sagen, was Deutschland für eine erfolgreiche Bewerbung
  um den Auftrag mit ins Spiel gebracht hat. Erst einmal freuen wir uns sehr über
  die Entscheidung. Der Bundeskanzler hat sie ja bereits am gestrigen Abend kommentiert.
  Er hat gesagt, dass die kanadische Regierung damit vor dem beginnenden NATO-Gipfel
  ein starkes Zeichen der transatlantischen und europäischen Zusammenarbeit in der
  Verteidigungsindustrie setzt. Er hat von einem großen, strategischen Vorhaben gesprochen,
  das Kanada, Deutschland und Norwegen auf Jahrzehnte verbindet. Er hat auch gesagt:
  „Es ist Ausdruck unserer auf Dauer angelegten Partnerschaft, die weit über die Sicherheits-
  und Verteidigungspolitik hinausreicht.“ Insofern freuen wir uns, wie gesagt, über
  die Nachricht. Sie hat in der Tat eine sicherheitspolitische Bedeutung und eine
  unternehmerische Bedeutung, aber natürlich auch eine strategische Bedeutung. Deshalb
  war das Timing jetzt vor dem NATO-Gipfel auch sehr gut. Wir haben uns in der vergangenen
  Zeit auf unterschiedlichen Ebenen dafür eingesetzt, dass das gelingt, und haben
  uns deshalb gestern sehr gefreut, dass das so verkündet wurde. Meine Frage hatte
  noch einen zweiten Aspekt. Was hat die Bundesregierung sonst noch angeboten? Die
  Koreaner hatten unter anderem noch eine Autofabrik mit im Angebot. Was waren die
  Angebote Deutschlands? Am Ende werden diejenigen, die den Zuschlag gegeben haben,
  sicherlich begründen ‑ das haben sie ja gestern auch schon getan ‑, warum sie sich
  für das deutsch-norwegische Modell entschieden haben. Wie gesagt, denke ich, dass
  wir sehr gute Argumente auf unserer Seite hatten. Herr Meyer, Frau Wetter, es gibt
  Vorwürfe, dass die Steuerreform eigentlich keine richtige Steuerreform sei. Vom
  Volumen her sei sie zu gering. Es geht vor allem um Freibeträge, die ohnehin hätten
  angehoben werden müssen und die man jetzt als Teil einer Steuerreform verkaufe.
  Was sagen Sie zu den Vorwürfen? Zu Ihren Fragen hat sich Bundesfinanzminister Lars
  Klingbeil gestern in der Pressekonferenz bereits geäußert. Darauf kann ich an dieser
  Stelle nur verweisen. Aber gerade weil das Leben teurer geworden ist, ist es natürlich
  wichtig, jetzt zu entlasten. Wie der Finanzminister gestern auch gesagt hat, hätte
  er sich auch ein deutlich größeres Paket vorstellen können. Dies ist nun das Paket,
  auf das sich geeinigt wurde. Ziel ist es, damit kleine und mittlere Einkommen zu
  entlasten und insbesondere Familien ins Visier zu nehmen. Das wird mit der nun vorgestellten
  Einkommenssteuerreform umgesetzt. Ich würde gern ergänzen. Ich würde das nicht kleinreden
  wollen. Es ist, denke ich, schon wichtig, gerade in Zeiten, in denen vieles teurer
  geworden ist und in denen auch Belastungen gestiegen sind, dass wir hier mit einem
  Umfang von zehn Milliarden Euro auch in Anbetracht der wirklich angespannten Haushaltslage
  ‑ wir haben den Haushalt gestern ja auf den Weg gebracht; da ist das deutlich abzulesen ‑
  einen sehr klaren Schwerpunkt gesetzt haben. Wenn es gelingt, eine Familie mit zwei
  Kindern und einem mittleren Einkommen ‑ ich sage einmal, mit 60 000 Euro brutto ‑
  mit rund 600 Euro wirklich spürbar zu entlasten ‑ das ist das Ziel, das im Koalitionsausschuss
  festgehalten wurde, und das werden wir so umsetzen ‑, dann hilft das Familien und
  Arbeitnehmerinnen und Arbeitnehmern in unserem Land ganz konkret. Insofern stehen
  wir stark hinter dieser Reform und halten sie für richtig. Gibt es in der Bundesregierung
  die Hoffnung, dass in dieser Legislaturperiode vielleicht noch eine zweite Steuerreform,
  die dann vielleicht ein bisschen umfangreicher ausfällt, umgesetzt werden kann?
  Ich würde davor warnen, jetzt, wenige Tage nach dem Beschluss des Koalitionsausschusses,
  schon wieder die nächsten Ankündigungen zu machen. Noch einmal: Wir haben gesagt,
  das ist für uns ein Schwerpunkt. Wir wollen Arbeitnehmerinnen und Arbeitnehmer und
  insbesondere Familien ‑ sie stehen im Mittelpunkt dieser Einkommensteuerreform ‑
  zum 1. Januar 2027 entlasten. Darauf liegt jetzt unser voller Fokus. Das werden
  wir umsetzen, damit diese Entlastung zum 1. Januar 2027 in Kraft treten kann und
  viele Menschen in Deutschland davon profitieren können. Wie steht das Wirtschaftsministerium
  zu den von Union und SPD geplanten Änderungen am Gebäudemodernisierungsgesetz ?
  Was passiert mit der von Frau Ministerin Reiche beschworenen Technologieoffenheit,
  wenn ein neues Gesetz doch dazu verpflichtet, ab 2045 vollständig auf klimaneutrale
  Brennstoffe zu setzen? Zum GEG kann ich Ihnen sagen: Es kann Änderungen geben, wenn
  der Haushaltsausschuss des Deutschen Bundestages dem zustimmt. Zu Details können
  wir uns aber jetzt nicht äußern, sondern das tun wir dann, wenn der Haushaltsausschuss
  entschieden hat. Herr Meyer, wie blickt die Bundesregierung auf den Skandal der
  politischen Einflussnahme auf den WM-Wettbewerb ? Ich kann mir Ihre Wortwahl an
  der Stelle nicht zu eigen machen. Ich habe eine Vermutung, worauf Sie mit der Frage
  abzielen. Vielleicht kann ich generell dazu sagen ‑ die Staatsministerin hat sich
  ja auch bereits geäußert ‑: Wir sind immer der Meinung, dass die Rolle der Politik
  nicht auf dem Spielfeld ist, sondern dass auf dem Spielfeld entschieden werden muss.
  Das war ja auch in diesem Fall so und wird bei der WM sicherlich auch weiterhin
  so sein. Hat auch der Kanzler die Telefonnummer von Infantino? Meine Frage richtet
  sich an das Wirtschaftsministerium. Können Sie bestätigen, dass der Aufbau einer
  neuen nationalen Gasreserve geplant ist? Wenn ja, was sind die Gründe dafür? Welche
  Kosten werden erwartet? Wie sieht der Zeitplan dafür aus? Ich kann bestätigen, dass
  das BMWE eine staatliche Krisenvorsorge zur Stärkung der Versorgungssicherheit mit
  Gas in diesen geopolitisch unsicheren Zeiten plant. In der aktuellen Situation müssen
  wir uns künftig gegen alle Einwirkungen von außen absichern, beispielsweise gegen
  Angriffe auf Pipelines. Bevor ich auf Details eingehe, ist mir wichtig zu betonen:
  Es geht dabei nicht um die reguläre Wintervorsorge. Diese funktioniert und bleibt
  bei den Marktakteuren. Darauf gehe ich gleich näher ein. Wir reden hier von einem
  neuen Krisenvorsorgeinstrument. Das ist wichtig zu verstehen. Das BMWE hat einen
  innerhalb der Bundesregierung abgestimmten Plan zum Aufbau einer solchen strategischen
  Gasreserve vorgelegt. Ziel ist es, die Gasversorgung Deutschlands auch in außergewöhnlichen
  Krisensituationen abzusichern und die Resilienz des Energiesystems weiter zu stärken.
  Die strategische Gasreserve soll bei plötzlichen Importausfällen oder anderen gravierenden
  Störungen in der Gasversorgung zur Verfügung stehen. Im Krisenfall schafft dies
  wertvolle Zeit, um alternative Gasimporte zu organisieren, technische Störungen
  zu beheben oder weitere Maßnahmen anzustoßen. So können volkswirtschaftlich erhebliche
  Schäden, beispielsweise auch Abschaltungen, bei Kunden vermieden werden. Eine solche
  Krisenvorsorge ist erforderlich, weil der Markt allein derartige Extremrisiken,
  von denen wir hier reden, nicht absichern kann. Über den Einsatz einer solchen Gasreserve
  entscheidet der Bundeslastverteiler bei der Bundesnetzagentur, sofern eine Gasmangellage
  droht oder unmittelbar bevorsteht. Die Wintervorsorge ‑ das habe ich schon angedeutet ‑
  bleibt Aufgabe der Marktakteure wie Händler und Lieferanten. Die strategische Gasreserve
  ergänzt diese marktwirtschaftliche Vorsorge ausschließlich für außergewöhnliche
  Krisensituationen und ist daher strikt vom Markt getrennt. Es geht um Resilienz
  und um Versorgungssicherheit. Ich möchte auch noch einmal betonen, dass die Versorgungslage
  mit Gas in Deutschland gut ist. Die Speicher füllen sich planmäßig. Die Wintervorsorge
  des Marktes funktioniert. Die strategische Reserve hat nichts mit der aktuellen
  Versorgungslage zu tun, sondern sie schafft zusätzliche Sicherheit für außergewöhnliche
  geopolitische Risiken und stärkt langfristig die Resilienz Deutschlands. Sie haben
  auch nach dem Zeitplan gefragt. Es wird zeitnah ein Kabinettsbeschluss für die entsprechenden
  Gesetzesänderungen angestrebt. Sie haben schon sehr vieles beantwortet, vor allem
  hinsichtlich der Gründe. Aber Angaben zu Umfang und Kosten fehlen mir noch. Meine
  Frage nach dem Zeitplan bezog sich nicht auf den Zeitplan für die Verabschiedung
  im Kabinett, sondern auf den Zeitplan für den Aufbau der Reserve. Zum Umfang: Wir
  reden hier von 24 Milliarden Kilowattstunden. Um den an sich gut funktionierenden
  Gasmarkt nicht zu beeinträchtigen und zusätzliche Preiswirkungen möglichst gering
  zu halten, wird die Beschaffung des Gases über einen Zeitraum von mehreren Jahren
  gestreckt. Erste Speicherbuchungen sind für den Winter 2026/2027 vorgesehen, die
  erste Befüllung für Sommer 2027. Zu den Kosten: Der Markt an sich kann eine ausreichende
  Krisenvorsorge für Extremfälle wie diese nicht bereitstellen. Eine Absicherung gegen
  seltene Großereignisse ist teuer. Die Eintrittswahrscheinlichkeit ist gering. Das
  ist bei Resilienzmaßnahmen immer so. Daher führen wir diese Reserve ein. Aufgrund
  der haushaltspolitischen Lage wird die strategische Gasreserve nicht aus dem Haushalt
  finanziert, sondern erfolgt stattdessen verursachergerecht über eine Umlage. Aber
  die Belastung wird deutlich geringer sein als die mit der Ende 2025 abgeschafften
  Gasspeicherumlage. Sie wird nur ungefähr zehn Prozent der alten Umlage umfassen.
  Wir reden hier also von 29 Cent bis 36 Cent je Megawattstunde. Frau Lorenzat, mehrfach
  wurde betont, es gebe hinsichtlich Kerosins keinen Mangel . Die Lufthansa hat ja
  noch eigene Entscheidungen getroffen. Was würden Sie Menschen raten, die sich fragen,
  ob sie für ihren Herbsturlaub eher auf Fahrrad, Bahn oder Auto setzen sollen oder
  ob sie sich sicher sein können, dass sie dorthin fliegen können, wohin sie möchten?
  Unser Stand der Dinge ist, dass es in Deutschland keine physischen Energieknappheiten
  gibt. Wir beobachten das natürlich weiterhin. Wir sind in ständigem Austausch mit
  den Akteuren auf dem Markt und der Branche und haben im April auch einen Kerosinroundtable
  mit den Stakeholdern durchgeführt. Auch dabei wurde übereinstimmend berichtet, dass
  es keine physischen Knappheiten gebe. Neue Erkenntnisse liegen mir dazu gerade nicht
  vor. Die Airlines haben damals auch gesagt, sie seien derzeit ausreichend versorgt.
  Was Airlines am Ende entscheiden, ist natürlich nicht Sache der Bundesregierung,
  aber das ist die Lage im Hinblick auf die Marktsituation. Sie haben über den jetzigen
  Ist-Zustand gesprochen. Ich hatte aber mehr nach dem Perspektivischen in zwei, drei
  Monaten gefragt. Ich möchte nicht spekulieren, wie sich Märkte entwickeln. Herr
  Hinterseer, die Chinesen sind mit einem Raketentest von einem Atom-U-Boot im Südpazifik
  aus aufgefallen. Wie bewerten Sie den Vorgang? Wir beobachten die Lage natürlich
  sehr genau. Sie wissen, dass wir es grundsätzlich mit Sorge sehen, dass chinesische
  Drohgebärden und militärische Aktivitäten in der Region als Ganzes zunehmen. Frieden
  und Sicherheit im Indopazifik sind für unsere Interessen, für deutsche, aber auch
  für europäische, zentral. China trägt eine besondere Verantwortung für Frieden und
  Stabilität in der Region, auch als ständiges Mitglied des UN-Sicherheitsrats. Grundsätzlich
  gilt: Chinas massive und teils auch intransparente Aufrüstung beobachten wir mit
  großer Sorge. Wir haben China wiederholt aufgefordert, sich internationalen Rüstungskontrollansätzen
  zu öffnen. Dies und ein Engagement im Bereich von Risikoreduzierung, Dialog und
  Transparenz wären aus unserer Sicht wichtige Schritte in diese Richtung. Sehen Sie
  den Test im Zusammenhang mit dem NATO-Gipfel? Die Aussage, die ich gerade getätigt
  habe, steht in keinem Zusammenhang mit dem NATO-Gipfel. Eine Frage ans Verteidigungsministerium:
  Der Minister hat am Sonntag die Sorge geäußert, dass für den Fall eines AfD-Wahlsiegs
  oder einer AfD-geführten Regierung in einem Bundesland auch militärische Informationen
  weitergereicht werden könnten. Könnten Sie ein bisschen ausführen, was er damit
  meint und wo seine Hauptsorgen liegen? Zunächst bitte ich um Verständnis dafür,
  dass ich die einzelnen Aussagen des Ministers jetzt nicht auslege oder interpretiere.
  Aber ganz allgemein zu der Frage bzw. zum Thema von Informationen, die sicherheitsrelevant
  sind: Wir haben an dieser Stelle schon häufig besprochen, dass wir berücksichtigen
  müssen, dass sich die Gesamtkonzeption im Bereich von Informationen verändert hat.
  Das heißt, Informationen gerade im militärischen Bereich sind deutlich sensibler
  zu behandeln, einfach weil sich die globale sicherheitspolitische Lage verändert
  hat. Insofern sind wir ganz allgemein und unabhängig von einzelnen Beteiligten darauf
  bedacht, die Einstufungen sehr sorgfältig zu wählen. Ganz grundsätzlich gilt für
  uns wie für alle anderen auch, dass sich die Einstufung von Informationen nach den
  Vorgaben im Sicherheitsüberprüfungsgesetz und in der dazugehörigen Verschlusssachenanweisung
  regelt. Das heißt, das sind die Grundsätze und die Maßstäbe, die auch für uns gelten.
  Wenn Sie da einmal hineinschauen, dann sehen Sie, dass es um unbestimmte Begriffe
  geht. Es geht also um die Fragen, ob etwas wesentliche Sicherheitsinteressen berührt
  oder Interessen der Bundesrepublik oder unserer Partnerländer Nachteile zufügen
  konnte. In der Auslegung ist zu beachten, welche Informationen wirklich geteilt
  werden können. Ich kann einmal ein, wie ich denke, ganz gut greifbares Beispiel
  nennen. Sie wissen, dass wir, wenn es zum Beispiel um Beschaffung geht, noch vor
  einigen Jahren viel transparenter waren und im Zweifel auch gesagt haben, wie viel
  beschafft wird. Das ist jetzt einfach nicht mehr möglich, weil das Sicherheitsinteresse
  in der Abwägung anders gewichtet werden muss, weil wir wirklich darauf achten müssen,
  dass unsere Sicherheitsinteressen gewahrt bleiben und Informationen nicht im Zweifel
  in Richtung Russlands gehen oder wohin auch immer. In diesem allgemeinen Kontext
  sind auch die Aussagen des Ministers zu verstehen, dass wir einfach reflektieren
  müssen, dass es um sensible Informationen geht, die unsere Sicherheit betreffen
  und damit direkt auch unsere Aufgabe der Landes- und Bündnisverteidigung. Er hat
  sich ausdrücklich auf den Fall von Sachsen-Anhalt bezogen. Was heißt das mit Blick
  auf eine Landesregierung? Ich habe meiner Antwort nicht wirklich etwas hinzuzufügen,
  weil wir uns auch hier ‑ da gelten für uns keine Sondermaßstäbe ‑ an diese Einstufungsregelungen
  halten müssen, und genau das tun wir auch. Das gilt sowohl für die parlamentarische
  Kommunikation auf Bundesebene als auch in Bezug auf die Länderkommunikation. Sie
  wissen ja, dass es beispielsweise im O-Plan Deutschland oder in ähnlichen Dingen
  auch jetzt schon Details gibt, die nicht geteilt werden, auch völlig unabhängig
  davon, welche Partei an der Regierung ist. Das möchte ich nicht näher auf eine Partei
  spezifizieren. Das Thema der Weitergabe sensibler Daten betrifft ja nicht nur das
  Verteidigungsministerium, sondern auch das Innenministerium. Sieht Ihr Minister
  das ähnlich kritisch, oder ist er ähnlich besorgt wie der Verteidigungsminister?
  Ich würde jetzt hier nicht die Meinung des Ministers bringen. Das müsste ich Ihnen
  aus Perspektive des Ministeriums aber tatsächlich nachliefern. Das wäre nett. ‑
  Herr Meyer, gibt es in der Bundesregierung auf übergeordneter Ebene überhaupt eine
  Beschäftigung damit, was der Fall einer möglichen AfD-Regierung in Sachsen-Anhalt
  in der Kommunikation oder der Zusammenarbeit zwischen dem Bund und einem Bundesland
  verändern könnte? Generell würde ich die Aussagen des Verteidigungsministeriums
  unterstützen, dass wir uns natürlich immer Gedanken machen, auch um sicherheitsrelevante
  Fragestellungen. Nun findet ja aber in diesem Jahr in einem Bundesland eine freie
  Wahl statt, und der will ich an keiner Stelle vorgreifen oder etwaige Ergebnisse
  vorhersehen, sondern das liegt ja in der Hand der Bürgerinnen und Bürger. Sie haben
  es beide durchaus allgemein gehalten, unabhängig von Parteien, aber der Minister
  hat sich ja sehr ausdrücklich zum Thema eines Wahlsiegs der AfD und nicht irgendeiner
  Partei geäußert. Insofern stelle ich gerne noch einmal die Nachfrage: Welche spezifischen
  Sorgen haben Sie gerade bei der AfD? Das würde ich nicht weiter qualifizieren. Es
  wäre auch nicht angemessen, wenn ich jetzt hier für den Verteidigungsminister spräche.
  Insofern würde ich bei dem bleiben, was ich gerade gesagt habe. Ich habe ja gerade
  gesagt, dass wir uns allgemein natürlich immer ‑ das gilt in diesen Zeiten natürlich
  ganz besonders, weil sich unsere Sicherheitslage einfach massiv verändert hat ‑
  mit allen möglichen Fragen auseinandersetzen, auch sehr frühzeitig. Noch einmal:
  Mit Blick auf Landtagswahlen habe ich dem nichts hinzuzufügen. Herr Meyer, gestern
  soll im Nationalen Sicherheitsrat über einen strategischen Umgang mit KI-Modellen
  gesprochen worden sein. Können Sie da mehr Details nennen? Was ist ein strategischer
  Umgang? Wir hatten es ja gerade: Die veränderte Sicherheitslage fordert uns auf
  allen möglichen Ebenen. Das ist ja auch der Grund, warum wir diesen Nationalen Sicherheitsrat
  einberufen haben. Ich will dazu noch einmal sagen, dass der grundsätzlich geheim
  tagt, auch aus guten Gründen, weil es eben um Fragen der nationalen Sicherheit geht.
  Wir haben aber in der Tat, und das kann der Nationale Sicherheitsrat dann auch jeweils
  entscheiden, gestern zumindest über den Rahmen auch die Öffentlichkeit informiert
  und haben in der Tat deutlich gemacht, dass der Nationale Sicherheitsrat in den
  Beratungen über den strategischen Umgang mit fortgeschrittenen KI-Modellen sowie
  das Thema der Gesamtverteidigung beraten hat. Wir haben auch in der Vergangenheit
  schon darüber berichtet. Zum Beispiel geht es dabei um den Aufbau eines Instituts
  für KI und quasi die Zusammenziehung von dem Wissen, das wir in diesem Bereich haben.
  Federführend ist das dann auch vom BMDS vorangetrieben worden. Insofern ist das
  etwas, das uns auf verschiedenen Ebenen beschäftigt. Noch einmal: Der Nationale
  Sicherheitsrat tagt ansonsten geheim. Insofern kann ich hier jetzt über Details
  der Beratung keine weitere Auskunft geben. Also können Sie auch nicht sagen, welche
  KI-Modelle die Bundesregierung dabei besonders im Blick hat, die von Anthropic oder
  so etwas? Vielleicht mag das BMDS noch einmal ein bisschen allgemein etwas ergänzen,
  wenn Sie mögen. Wie gesagt, für uns ist es sehr wichtig, vor allen Dingen Expertise
  in diesem Bereich zusammenzuziehen. Natürlich verändern KI-Modelle unsere Wirtschaft,
  unser Zusammenleben, unsere Gesellschaft gerade massiv, und deshalb ist es wichtig,
  dass wir uns sehr grundlegend damit befassen. Das BMDS hat da die größte Expertise,
  zumindest hier auf der Bank. Ja, ich kann das gerne ergänzen. Wir betrachten den
  Zugang zu solchen besonders wirkmächtigen Frontier-AI-Modellen als grundlegenden
  strategischen Faktor. Es ist wichtig, sicherzustellen, dass diese Modelle für europäische
  Unternehmen und Sicherheitsbehörden verlässlich verfügbar sind. Das KI-Sicherheitssystem,
  das sich gerade im Aufbau befindet ‑ da läuft auch noch die Konzeptionsphase; da
  können wir jetzt noch nicht so viele Details verraten ‑, ist ja auch ein Ansatz,
  um hier international vernetzt zu arbeiten. Wir haben vergangene Woche auch eine
  Zusammenarbeit mit dem britischen KI-Sicherheitsinstitut geschlossen, und dabei
  geht es auch um den Austausch von Erfahrungen mit solchen wirkmächtigen KI-Modellen.
  Herr Meyer, noch einmal die Frage nach dem Nationalen Sicherheitsrat, auch wenn
  er geheim getagt hat: Können Sie sagen, ob dabei auch diskutiert wurde, ob man chinesische
  KI-Modelle staatlicherseits überhaupt verwenden sollte? Es gibt ja so einen Wettbewerb
  zwischen amerikanischen Modellen, die dann in den professionellen Versionen auch
  relativ teuer sind, und offenen Modellen, die die Chinesen kostenlos anbieten. Gibt
  es da eine Grundverständigung in der Bundesregierung, dass man die einen, nämlich
  die chinesischen, nicht anwenden sollte? Sie haben jetzt noch einmal mit Bezug auf
  den Nationalen Sicherheitsrat gefragt. Da muss ich wirklich dabei bleiben: Das ist
  ein geheim tagendes Gremium. Wir haben gestern in Grundzügen darüber informiert,
  um was es ging. Dabei würden wir auch bleiben. Ich stelle die Frage noch einmal
  ohne Bezug auf den Nationalen Sicherheitsrat, der geheim tagt: Ist es das Ziel ‑ die
  Frage richtet sich entweder an das Digitalministerium oder Herrn Meyer ‑, dass man
  eine Verständigung darüber hat, ob chinesische KI-Modelle eingesetzt werden oder
  nicht? Ich kann vielleicht ganz allgemein sagen, dass unser Ziel sein muss, auch
  europäische KI-Modelle zu entwickeln und KI-Modelle auch in unserem Einflussbereich
  zu fördern. Dafür hat sich der Minister ausgesprochen. Die Diskussion wird ja oft
  auf die USA und China verengt, und wir nehmen jetzt stärker auch Europa in den Blick
  und versuchen hier auch ‑ zum Beispiel über den Staat als Ankerkunden, als strategischen
  Auftraggeber von IT-Dienstleistungen ‑, über gesetzliche Rahmenbedingungen, bei
  denen wir uns auf europäischer Ebene dafür einsetzen, dass wir hier auch den europäischen
  Unternehmen mehr Innovationsspielräume geben, einfach auch Entwicklungen aus Europa
  voranzutreiben. Das muss unsere Antwort sein. Ich hätte noch eine Zusatzfrage, genau
  anschließend an diese Antwort, an das Innenministerium. Sie kennen diese Debatte
  um Palantir, also KI-gestützte Anwendungen, die es gibt. Da gibt es ja auch eine
  Debatte, in der unterschiedliche Häuser dieser Bundesregierung zu unterschiedlichen
  Einschätzungen kommen, nämlich hinsichtlich der Frage, ob man dabei europäischen
  Anbietern den Vorhang geben sollte oder ein amerikanisches Modell nimmt. Gibt es
  da die Entscheidung, dass man sich jetzt für europäische Anbieter entscheidet? Es
  wird weiter danach geschaut. Das ist eine technologieoffene Entscheidung. Das bedeutet
  vom Prinzip her, dass hier keine Entscheidung gefallen ist, aber dass wir nichts
  ausschließen, aber auch nicht sagen, dass man sich hier konkret für diesen oder
  jenen Anbieter entschieden hat. Ich hätte eine Frage an das Umwelt- und Klimaministerium:
  Welche absehbaren Folgen wird denn die Entnahme von 2,7 Milliarden Euro aus dem
  KTF haben? Können Sie dazu schon etwas sagen? Dazu hat sich ja gestern der Finanzminister
  geäußert, und an der Stelle würden wir das auch beim Finanzministerium belassen
  wollen. Auch über die Ausgestaltung des KTF, wie Sie wissen, wird innerhalb der
  Bundesregierung ja noch weiter gesprochen, und in der kommenden Woche werden wir
  einen entsprechenden Termin haben. Dann würde ich die Frage, ob Sie da schon irgendwelche
  Details dazu nennen können, wie sich das auswirkt, schlicht und ergreifend auch
  noch mal an das Finanzministerium richten. Ich kann mich der Kollegin nur anschließen.
  Der Finanzminister hat sich dazu geäußert, und dem habe ich nichts hinzuzufügen.
  Vielleicht kann ich noch ergänzen ‑ das hat Finanzminister Klingbeil ja auch gestern
  deutlich festgestellt ‑, dass in der Gesamtheit aller Maßnahmen des KTF auch die
  Klimaschutzwirkung des Klimaschutzplans berücksichtigt werden soll. Das ist natürlich
  ein Punkt, der uns an der Stelle wichtig ist. Daraus ergibt sich noch eine weitere
  Frage, und die geht dann, glaube ich, an das Wirtschaftsministerium, weil die Förderung
  der Heizungen ja bei Ihnen liegt. Ist das korrekt? Das ist jetzt wirklich eine Wissensfrage.
  Es heißt, die Förderung klimafreundlicher Heizungen soll in den nächsten Jahren
  zurückgefahren werden. Können Sie dazu Details nennen? Dazu kann ich gerade spontan
  nichts sagen. Das müsste ich gegebenenfalls nachreichen. Aber grundsätzlich führen
  wir die Förderung ja fort, das haben wir ja angekündigt. Das bezieht sich auf den
  Haushaltsentwurf 2027 . Darin ist eine halbe Milliarde mehr für den Aus- und Neubau
  von Schienenstrecken als bisher vorgesehen. Können Sie uns sagen, für welche Strecken
  das genutzt werden soll? Das werden wir zum gegebenen Zeitpunkt dann auch öffentlich
  spezifizieren. Da liegen natürlich diverse Strecken auf dem Tisch. Das müssen wir
  jetzt abwägen. Ist das also noch keine konkrete Zuschreibung für eine bestimmte
  Strecke? Die Trassenpreisförderung im Cargo-Bereich ist reduziert worden, wahrscheinlich,
  um innerhalb des Haushalts Geld zu sparen. Können Sie erklären, warum man das gemacht
  hat? Die Trassenpreisförderung hat ja den Hintergrund, dass wir da fördern müssen
  oder wollen, wo es einen Förderbedarf gibt. Wir haben ja vor Kurzem für den Schienenpersonenfernverkehr
  verkündet, dass es den Förderbedarf dort nicht mehr unmittelbar gibt. Im Güterverkehr
  findet da gerade eine Abwägung statt, und wir werden uns jetzt natürlich auch im
  Lichte des Urteils aus Köln genau anschauen, wie sich das in der Praxis auswirken
  wird. Es gibt die Sorge, dass, wenn Sie die Förderung in dem Bereich zurückfahren,
  dann wieder mehr Verkehr von der Schiene auf die Straße verlegt wird. Teilen Sie
  die Sorge nicht? Die Sorgen aus der Branche oder auch die allgemeinen Forderungen
  sind uns bekannt. Das wird natürlich alles in die Reformen der Trassenpreise einfließen.
  Sie hatten gerade nach der Heizungsförderung gefragt. Ich hatte falsch verstanden,
  was Sie meinten. Ich hatte mich ja am Anfang zur Bundesförderung für effiziente
  Gebäude geäußert. Da gilt das, was ich am Anfang gesagt habe. Ich habe eine Frage
  an das AA und an Herrn Meyer. Am Montag wird sich ja auch der Außenrat in Brüssel
  treffen. Dabei wird es ja auch sicherlich wieder um Sanktionen gegen Israel gehen.
  Herr Wadephul ist ja jetzt gerade auch vor Ort. Ich gehe davon aus, dass es dabei
  auch um dieses Thema gehen wird. Meine Frage ist, ob Deutschland dem Kommissionsvorschlag
  zustimmen wird, Handelsbeschränkungen etwa für Siedlungsprodukte einzuführen. Wird
  es sich enthalten oder dagegen stimmen? Schließlich hat ja das AA zuletzt immer
  wieder an der Einstimmigkeit festgehalten. Die Frage wäre dann noch, ob Deutschland
  zumindest den Weg für einen Mehrheitsentscheid freimachen wird, wenn es schon nicht
  zustimmen möchte. Ich würde gerne einmal anfangen. Wie Sie richtig sagten, ist Außenminister
  Wadephul heute Morgen nach Israel gereist. Zur Stunde findet dort gerade ein Treffen
  mit seinem israelischen Amtskollegen Gideon Sa’ar statt. Danach wird der Außenminister
  dann weiter zum Gipfel nach Ankara reisen, zum NATO-Gipfel. Zu den Themen der Reise
  hatte sich der Außenminister, glaube ich, auch vor der Abreise schon einmal geäußert.
  Ziel der Reise ist es, vor der Teilnahme am NATO-Gipfel in der Türkei auch einen
  Beitrag zur Verständigung in der gesamten Region zu leisten. Weitere Themen, die
  dort heute Teil des Gesprächs sein werden ‑ aber ich will dem Ganzen eben jetzt
  nicht vorgreifen, weil gleich im Anschluss auch noch eine Pressekonferenz vor Ort
  stattfinden wird, bei der womöglich auch diese Frage adressiert wird ‑, werden unter
  anderem eine Einigung zwischen Israel und Libanon sowie die laufenden Verhandlungen
  zwischen den USA und Iran und auch die humanitäre Lage im Gazastreifen sein, die
  uns sehr wichtig ist und die wir fortlaufend ansprechen. Wie ich gerade sagte, soll
  dort in etwa einer halben Stunde eine Pressekonferenz stattfinden. Ich glaube, konkret
  zu der Frage, wie wir uns in der Europäischen Union und in internen Gesprächen einbringen,
  haben wir uns hier in der Vergangenheit öfter geäußert. Auch der Minister hat seine
  Haltung zur Aussetzung des Assoziierungsabkommens deutlich und klar gemacht, nämlich
  dahingehend, dass er das nicht für den richtigen Schritt hält. Darauf würde ich
  Sie gerne verweisen. Sie haben das jetzt in Bezug auf die Aussetzung des Assoziierungsabkommens
  beantwortet. In dem Fall war ja konkret nach Produkten aus Siedlungen gefragt worden.
  Das ist ja noch einmal ein anderer Aspekt. Vielleicht können Sie darauf auch antworten.
  Der Minister hat ja tatsächlich, wie Sie eben referiert haben, ausführlich gesagt,
  was bei dieser Reise seine Ziele sind. Er hat eine Sache, die jetzt auch im Zusammenhang
  damit steht, nicht erwähnt. Ist das einfach der Kürze des Statements geschuldet,
  oder weshalb ist die Siedlergewalt im Westjordanland dort kein Thema? Ich würde
  gerne mit Ihrer zweiten Frage beginnen. Natürlich ist die Siedlergewalt ein Thema,
  das wir fortlaufend gegenüber der israelischen Seite ansprechen, ebenso wie der
  Siedlungsbau als solches. Wir sehen darin ein erhebliches Hindernis im Hinblick
  auf eine Zweistaatenlösung, und deswegen werden wir das auch weiter fortlaufend
  adressieren. Aber ich will Gespräche nicht vorwegnehmen, die jetzt zur Stunde laufen.
  Soweit ich richtig informiert bin, hat diese Pressekonferenz auch gerade eben begonnen.
  Insofern würde ich Sie gerne darauf verweisen. Zu der anderen Frage, die Sie mit
  Blick auf Siedlungsprodukte gestellt hatten: Wir bringen uns ‑ aber auch da noch
  einmal der Hinweis, dass das Diskussionen sind, die im europäischen Rahmen vertraulich
  laufen ‑ natürlich dort in Gespräche ein. Es ist wichtig, und ich hatte auf das
  Assoziierungsabkommen verwiesen: Alle anderen Fragen, die im europäischen Rahmen
  geklärt werden, werden vertraulich besprochen, und dabei bringt sich Deutschland
  natürlich konstruktiv ein. Ich habe eine Frage an das Familienministerium zum Elterngeld
  . Die Familienministerin will das Elterngeld reformieren. Sie will einerseits die
  Bezugsdauer senken, andererseits die konkreten Sätze erhöhen. Das sind so ein bisschen
  „mixed signals“, an denen es auch schon viel Kritik gibt. Warum will die Familienministerin
  das Elterngeld gerade auf diese Weise reformieren? Was ist der Hintergrund? Vielen
  Dank für die Frage. - Ich glaube, das haben wir auch immer wieder gesagt: Das sind
  die Vorgaben aus dem Koalitionsvertrag, bei denen es eben darum geht, die Partnerschaftlichkeit
  zu erhöhen. Die Ministerin hatte auch zugesagt, dass sie die Sätze erhöhen möchte.
  Das ist jetzt so auch im Gesetzentwurf vorgesehen. Insofern kann ich das auch bestätigen.
  Der Gesetzentwurf ist gestern am späten Nachmittag in die Ressortabstimmung gegangen.
  Eine halbe Stunde später wurde dann auch schon darüber berichtet. Das ist tatsächlich
  der Gesetzentwurf, der sich jetzt in der Abstimmung befindet. Möglicherweise wird
  es daran natürlich auch noch Änderungen geben. Die Geburtenrate fällt in Deutschland.
  Gerade erst sind wieder Zahlen herausgekommen. Sie nähert sich historischen Tiefständen
  an. Ist es aus Sicht der Familienministerin ausgerechnet jetzt das richtige Signal,
  von 14 auf zwölf Monate herunterzugehen? Auch dazu haben wir uns immer wieder so
  geäußert, dass wir eben zweierlei haben. Zum einen sind das die Reformvorgaben aus
  dem Koalitionsvertrag, und zum anderen haben wir natürlich auch die Sparvorgaben.
  Sie wissen: Das Elterngeld ist der mit Abstand größte Posten im Etat des Familienministeriums,
  und insofern sind wir auch gezwungen, hier anzusetzen, wenn wir die Sparvorgaben
  eben umsetzen wollen. Eine Frage an das Auswärtige Amt zum Sudan : Es gibt Warnungen
  von Seiten der UNO vor Massakern rund um El Obeid, die möglicherweise die Dimensionen
  des Massakers von Al-Faschir einnehmen könnten. Das betrifft laut UNICEF 500 000
  Menschen. Wie versuchen Sie, auf die Konfliktparteien einzuwirken? Wir sind in der
  Tat zutiefst besorgt über die Lage in und um die Stadt El Obeid in Sudan. Deshalb
  haben wir uns auch im Menschenrechtsrat in Genf gemeinsam mit Großbritannien und
  anderen Partnern für eine Dringlichkeitsdebatte eingesetzt, die am 3. Juli stattfand.
  Erstmals in der Geschichte ist der Menschenrechtsrat hier präventiv tätig geworden.
  Der UN-Hochkommissar für Menschenrechte, Volker Türk, hat hier noch einmal ausdrücklich
  davor gewarnt, dass die Rapid Support Forces bei einer Einnahme von El Obeid erneute
  Massaker an der Zivilbevölkerung verüben könnten. ‑ Ich denke, darauf haben Sie
  auch Bezug genommen. Dieser Warnung hat sich der Menschenrechtsrat gestern am 6. Juli
  in einer im Konsens verabschiedeten Resolution angeschlossen. Eine humanitäre und
  eine menschenrechtliche Katastrophe, wie sie in Al-Faschir stattfand, darf sich
  aus unserer Sicht nicht wiederholen. Wir rufen die RSF und die SAF dazu auf, jetzt
  gemeinsam mit den Unterstützern die Lage zu deeskalieren und vor allem humanitäres
  Völkerrecht einzuhalten. Die RSF haben in den letzten Wochen ihre Drohnenangriffe
  noch einmal intensiviert und Kräfte um El Obeid in einer Weise zusammengezogen,
  die einen groß angelegten Angriff auf diese strategisch außerordentlich wichtige
  Stadt nahelegen. Etwa eine halbe Million Menschen, darunter bereits 100 000, die
  schon aus anderen Teilen des Landes vertrieben wurden, leben in der Stadt. Die RSF
  terrorisieren jetzt dort die Menschen, indem sie wiederholt Märkte, Krankenhäuser,
  Treibstofflager mit Drohnen angreifen und damit gezielt die humanitäre Krise verschärfen.
  Die Preise für Nahrungsmittel, Wasser und Benzin haben sich bereits vervielfacht.
  Derzeit können NGOs die Stadt nur in sehr eingeschränktem Umfang mit humanitärer
  Hilfe versorgen. Sollten Drohnenangriffe der RSF die einzige Verbindungsstraße jetzt
  völlig unpassierbar machen, dann könnte gar keine Hilfe mehr nach El Obeid gelangen
  und die Zivilbevölkerung, vor allem Frauen und Kinder, könnten vor den Angriffen
  auch nicht mehr fliehen. Insofern noch einmal der Hinweis, wozu wir die RSF aufrufen.
  ‑ Hierbei würde ich es belassen. Ich habe trotzdem noch eine Nachfrage, weil Sie
  ja auch Gastgeber der Sudankonferenz waren und es da Fortschritte auf dem Papier
  gab. Wen sehen Sie jetzt in der Verantwortung? Ich hatte ja gerade gesagt, dass
  es aus unserer Sicht darum geht, dass die SAF und die RSF, aber vor allem die RSF,
  jetzt mit Bezug auf El Obeid gemeinsam einen Weg finden, mit ihren Unterstützern
  die Lage zu deeskalieren und humanitäres Völkerrecht einzuhalten. Wichtig ist, dass
  die Zivilisten jetzt die Möglichkeit haben, das Gebiet sicher zu verlassen. Alle
  Konfliktparteien ‑ das gilt natürlich in jedem bewaffneten Konflikt ‑ sind verpflichtet,
  einen sicheren und ungehinderten Zugang für humanitäre Hilfe zu gewähren. Falls
  die militärische Eskalation nicht gestoppt wird, müssen wir erneut Schlimmstes befürchten,
  nämlich willkürliche Tötungen, so wie wir sie schon in Al-Faschir gesehen hatten,
  Entführungen, sexuelle Gewalt. Wir rufen die RSF aus genau diesen Gründen dazu auf,
  diesen Angriff unverzüglich einzustellen. Wir selbst unterstützen die notleidende
  Bevölkerung mit humanitärer Hilfe. In den Kordofan-Provinzen laufen 17 humanitäre
  Projekte des Auswärtigen Amts für Nothilfe, Gesundheit, Versorgung mit Lebensmitteln
  und Trinkwasser. Außerdem geht es uns darum, Schutz vor allem von Kindern, vor geschlechterbasierter
  Gewalt zu leisten. Ganz anderes Thema, das Recht der Nachrichtendienste . Das betrifft
  wahrscheinlich das Digitalministerium, auf jeden Fall Herrn Meyer. In dem nun veröffentlichten
  Referentenentwurf heißt es in Bezug auf den BND, dass dieser, wenn kein gleich geeignetes
  Produkt in Deutschland oder Europa vorhanden ist, für seine Zwecke auch Software
  aus anderen Weltregionen anschaffen darf. Diese Subsidiaritätsregelung, wie sie
  da in dem Entwurf genannt wird, greift nur, bevor eine Anschaffung getätigt wird.
  Sobald sie einmal getätigt wurde, darf die Anwendung beliebig lang verwendet werden.
  Ist der letztere Aspekt im Sinne der digitalen Souveränität und des Schutzes der
  Daten von Menschen, die davon betroffen sind, eine sinnvolle Regelung? Ist das jetzt
  bewusst nur so für den BND, weil man den Datenschutz ausländischer Personen anders
  gewichtet als den deutscher Personen? Vielen Dank für Ihre Frage. Das will ich vielleicht
  noch deutlich machen, damit das klar wird. Die Ressortabstimmung zu den Reformgesetzen
  wurde am 1. Juli, die Länder- und Verbändeanhörung am 3. Juli eingeleitet. Dementsprechend
  befinden wir uns mitten im Verfahren, in dem es jetzt sicherlich Rückmeldungen,
  auch Weiterentwicklungsmöglichkeiten geben wird. Deshalb würde ich jetzt an dieser
  Stelle nicht auf Einzelmaßnahmen oder Einzelvorschläge aus diesem Gesetz eingehen.
  Generell haben wir schon im Koalitionsvertrag festgelegt, dass das Recht der Nachrichtendienste
  wirklich umfassend reformiert werden soll, um die nationale Souveränität und die
  operativen Fähigkeiten der Nachrichtendienste zu stärken. Das ist, denke ich, in
  Anbetracht der Bedrohungslage, die hier schon vielfach Thema war, auch sehr, sehr
  notwendig. Es geht darum, mit der Leistungsfähigkeit relevanter europäischer Partnerdienste
  wirklich Schritt zu halten. Da haben wir Nachholbedarf aus den vergangenen Jahren;
  den holen wir auf. Es wurde zudem vereinbart, dass für effektive Kontrollstrukturen
  und zielgerechtete Kontrollen nach den jeweiligen Maßgaben des Bundesverfassungsgerichts
  gesorgt wird. Darüber hinaus muss bis zum Ende des Jahres eine verfassungsgerichtliche
  Entscheidung zu einem Teil der strategischen Fernmeldeaufklärung des BND umgesetzt
  werden. Das ist sozusagen der Grund, warum wir uns hier auf den Weg machen, wirklich
  auch grundlegend Dinge zu verändern. Die beteiligten Ressorts ‑ BMI, BMVG, Bundeskanzleramt
  und BMJV ‑ haben in den letzten Monaten intensiv an diesen Entwürfen gearbeitet
  und die maßgeblichen Gesetze, die jetzt, wie ich gerade gesagt habe, in die entsprechenden
  Verfahren gehen, auf den Weg gebracht. Das betrifft vor allem das BND-Gesetz, aber
  auch das Bundesverfassungsschutzgesetz. Dementsprechend befinden wir uns hier in
  dem Prozess. Ich habe noch einmal deutlich gemacht, warum wir das machen; das ist
  wichtig. Alles Weitere folgt sicherlich im weiteren Verfahren. Ich kann hier nichts
  ergänzen. Für Nachrichtendienste haben wir keine Zuständigkeit. Es gibt den IT-Zustimmungsvorbehalt
  für alle IT-Ausgaben, aber davon sind die Nachrichtendienste und Sicherheitsbehörden
  explizit ausgenommen. Zu dieser Erlaubnis, so eine Software endlos zu benutzen,
  wenn man sie angeschafft hat, wüsste ich gerne, wie das mit dem sogenannten Lock-in-Effekt
  ist. Darf man da also auch Software verwenden, bei der die Gefahr besteht, dass
  man später sozusagen nicht mehr auf etwas anderes umswitchen kann, wenn zum Beispiel
  ein europäischer Anbieter etwas Gleichwertiges entwickelt hat? Ich würde dabeibleiben.
  Wir können an der Stelle des Verfahrens jetzt nicht auf einzelne Detailmaßnahmen
  eingehen. Wir sind im laufenden Verfahren. Es gibt noch keinen Kabinettsbeschluss,
  sondern wir sind in der Ressortabstimmung und dann auch in der Länder- und Verbändeanhörung.
  Ich habe die Ziele beschrieben, an denen wir derzeit arbeiten. Über die Details
  informieren wir gerne nach einem möglichen Beschluss, der in der Zukunft liegt.
  Noch eine Frage ans Gesundheitsministerium: Am Freitag soll ja der Bundestag und
  dann möglichst auch der Bundesrat der GKV-Reform zustimmen. Die Länder fordern weitere
  Zugeständnisse des Bundes, gerade im Bereich Krankenhäuser oder Krankenhausfinanzierung.
  Ich hätte ganz gerne gewusst, wie offen Sie für diese Forderungen sind. Gibt es
  ein neues Angebot an die Länder, um mit neuen Kompromissen deren Zustimmung zu sichern?
  Da werde ich Sie wahrscheinlich mit der Antwort enttäuschen müssen. Die Verhandlungen
  laufen, die Gespräche laufen. Aber wir werden denen jetzt nicht vorgreifen. Da muss
  ich bitten, das parlamentarische Verfahren abzuwarten.'
