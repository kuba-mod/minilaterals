source_name: german_chancellery
title: 'Im Kabinett: Schwerpunkt Bürokratierückbau Spürbare und sichtbare Entlastungen
  für Bürgerinnen und Bürger'
text: 'Mit den Beschlüssen des zweiten Entlastungskabinetts führt die Bundesregierung
  ihren Kurs für weniger Bürokratie und mehr Tempo konsequent fort. Weniger Behördengänge,
  schnellere Verfahren, mehr digitale Lösungen: Hohe Priorität der Bundesregierung
  ist es, den Alltag der Bürgerinnen und Bürger einfacher zu machen und die Wirtschaft
  zu stärken. Konkret geht es darum, Staat und Verwaltung in Deutschland grundlegend
  zu modernisieren, unnötige Bürokratie zu vermeiden sowie Verfahren zu beschleunigen.
  Dass der eingeschlagene Weg erfolgreich ist, zeigt die Bilanz des zweiten Entlastungskabinetts.
  Seit dem ersten Entlastungskabinett am 5. November 2025 hat die Bundesregierung
  mehr als 40 konkrete Maßnahmen beschlossen, die zu einer jährlichen Entlastung von
  etwa zehn Milliarden Euro führen. Davon profitieren unmittelbar Bürgerinnen und
  Bürger, Wirtschaft und Verwaltung. Bundeskanzler Merz hat in der Sommer-Pressekonferenz
  im Juli das Entlastungskabinett als Nachweis des steten Fortschritts bei der Staatsmodernisierung
  gewürdigt und bereits das nächste Entlastungskabinett zum Ende des Jahres angekündigt:
  „Diese Aufgabe wird uns auf Dauer gestellt sein. Das ist nichts, was wir heute abgeschlossen
  haben.“ Nochmals betonte der Kanzler, den Rückbau der Bürokratie fortführen zu wollen,
  um „die Bürgerinnen und Bürger, aber auch die Unternehmen in Deutschland von hohen
  bürokratischen Lasten zu entlasten“. Dazu gehört, dass künftig umfassend Berichts-
  und Dokumentationspflichten abgeschafft werden sollen. Und Anträge als genehmigt
  gelten, wenn eine Behörde nicht in einer bestimmten Frist widerspricht. Der Bundesminister
  für Staatsmodernisierung Karsten Wildberger hob in der Pressekonferenz nach dem
  heutigen Kabinett den grundsätzlichen Perspektivwechsel des Staates hervor. „Das
  ist Ausdruck eines neuen Selbstverständnisses des Staates: Schlank, effizient und
  mit mehr Vertrauen in die Eigenverantwortung von Unternehmern und Bürgern. Wir werden
  künftig nur noch das wirklich Notwendige regulieren“, betonte er. Das bedeutet auch:
  Nicht Bürgerinnen und Bürger und Unternehmen sollen auf den Staat warten, sondern
  der Staat muss liefern. Allein in den letzten Wochen hat die Bundesregierung wichtige
  Maßnahmen mit einer Entlastungswirkung von etwa 1,5 Milliarden Euro auf den Weg
  gebracht. Dazu gehören beispielsweise: Gemeinsames Ziel der Gesetzesvorhaben sind spürbare
  Entlastungen im Alltag, schnellere Verfahren, eine konsequente Digitalisierung und
  bessere Rahmenbedingungen für Investitionen, Innovationen und wirtschaftliches Wachstum.
  Ziel ist mehr Tempo für einen modernen Staat. Die Bundesregierung führt ihren Kurs
  für weniger Bürokratie und mehr Tempo konsequent fort. Im Rahmen des zweiten Entlastungskabinetts
  am Mittwoch wurden jetzt weitere Maßnahmen auf den Weg gebracht – mit einem Entlastungsvolumen
  von weiteren rund 600 Millionen Euro: Ein Schwerpunkt des zweiten Entlastungskabinett
  ist die Digitalisierung im Gesundheitswesen . Die jährlichen Entlastungen belaufen
  sich auf rund 445 Millionen Euro. Was sich unter anderem ändert: Die Überweisung
  vom Hausarzt zum Facharzt soll künftig digital erfolgen. Der bisherige Überweisungsschein,
  den man mitnehmen und beim Facharzt vorlegen muss, gehört der Vergangenheit an. Mit
  der elektronischen Überweisung wird einer der letzten papierbasierten Prozesse im
  Gesundheitswesen digitalisiert. Über die ePA -App können Versicherte künftig Ersteinschätzung,
  Überweisung und Terminvermittlung aus einer Hand nutzen, wobei die digitale Terminvergabe
  diskriminierungsfrei und fair gestaltet wird. Auch wird ein einheitlicher, digitaler
  Medikationsplan eingeführt, der laufend von Ärztinnen und Ärzten sowie Apotheken
  aktualisiert wird und so die Arzneimitteltherapiesicherheit spürbar erhöht. Weiterer
  Vorteil: Praxen und Kliniken werden verpflichtet, sich gegenseitig Befunde und Arztbriefe
  nur noch über einen sicheren digitalen Kommunikationsweg zuzuschicken. Das spart
  Kosten und Zeit und ermöglicht digitale Arbeitsabläufe. Das Gesetz verbessert den
  Informationsaustausch zwischen den Beteiligten und macht die Versorgung schneller,
  digitaler und effizienter. Die Bundesregierung baut Bürokratie im Verkehrsbereich
  deutlich zurück . Mit dem Gesetz und der Verordnung zum Bürokratierückbau im Verkehrsbereich
  werden Verwaltungsverfahren vereinfacht und stärker digitalisiert. Zudem werden
  bestehende Regelungen modernisiert, beispielsweise durch die Aufhebung des Lkw -Fahrverbots
  an bundesuneinheitlichen gesetzlichen Feiertagen. Dadurch werden Abläufe für Unternehmen,
  Verwaltung und Verkehr effizienter gestaltet und bürokratische Belastungen reduziert.
  Die Bundesregierung beendet damit den bisherigen bürokratischen Flickenteppich und
  schafft Planungssicherheit. Wer ein reines Elektroauto fährt, muss künftig keine
  grüne Plakette mehr kaufen und auf die Windschutzscheibe kleben, um in eine Umweltzone
  einzufahren. Das E -Kennzeichen selbst gilt als Nachweis. Das Gesetz zur Modernisierung
  und Digitalisierung der Arbeitsförderung soll die Arbeitslosenversicherung und die
  Arbeitsförderung bürgerfreundlicher, effizienter und unbürokratischer machen. Wer
  etwa Leistungen beantragt oder Änderungen mitteilen muss, soll das einfacher digital
  erledigen können. Beratungs- und Meldetermine können künftig per Videoschalte von
  zu Hause stattfinden. Auch die sogenannte tägliche Briefkastenpflicht entfällt,
  solange Bürgerinnen und Bürger digital erreichbar bleiben. Die Bundesregierung stärkt
  Fortbildungen für den beruflichen Aufstieg . Die Attraktivität beruflicher Aufstiegsmöglichkeiten
  wird erhöht und mögliche Einstiegshürden werden abgebaut. Dafür werden Kosten für
  geförderte Fortbildungsmaßnahmen für die Teilnehmerinnen und Teilnehmer mit einem
  Paket von Maßnahmen deutlich gesenkt. Wenn beispielsweise eine Meisterprüfung oder
  andere Fortbildung gemacht und dafür vom Arbeitgeber unterstützt wird, fällt nunmehr
  die Anrechnung beim Aufstiegs- BAföG weg. Unterstützung durch den Arbeitgeber soll
  sich lohnen. Mit einem breiten Maßnahmenbündel werden landwirtschaftliche Betriebe
  und die Verwaltung von überflüssiger Bürokratie entlastet, Verwaltungsprozesse werden
  optimiert. Einige Beispiele: Statt alle drei Jahre müssen zukünftig Landwirte und
  Gärtner die verpflichtende Fortbildung zum Pflanzenschutz nur noch alle sechs Jahre
  machen. Meldepflichten nach dem Lebensmittel- und Futtermittelgesetzbuch werden
  gestrichen. Für den Nutzhanf-Anbau sowie die Tierärzteschaft gibt es bürokratische
  Vereinfachungen. Zudem werden bis 2028 keine neuen Öko-Regelungen eingeführt, um
  neuen Aufbau von Bürokratie zu vermeiden. Im zweiten Entlastungskabinett wurden
  überdies weitere Maßnahmen beschlossen, die das Ziel einer konsequenten Entlastung
  für Bürgerinnen und Bürger, Wirtschaft und Verwaltung verfolgen: Staatsmodernisierung
  ist eine langfristige Aufgabe, die die Bundesregierung entschlossen angegangen ist
  – und die dauerhaft fortgesetzt wird. Konkret plant die Bundesregierung weitere
  wichtige Gesetzesvorhaben, die den Bürokratierückbau erheblich voranbringen: Mit
  der Abschaffung von Berichts- und Dokumentationspflichten soll übermäßige Bürokratie
  und Kontrolle durch den Staat abgebaut werden. Künftig gilt der Grundsatz, Berichtspflichten
  werden gestrichen. Nur solche, die wirklich unverzichtbar sind, sollen bestehen
  bleiben. Gleichzeitig sollen Genehmigungsverfahren gegenüber dem Staat beschleunigt
  werden. Künftig sollen vollständige Anträge nach vier Monaten als genehmigt gelten,
  sofern sich die Behörde nicht meldet. Auch das Bauen soll einfacher, günstiger und
  schneller werden. Dafür wir das Bauvertragsrecht durch den Gebäudetyp E angepasst,
  sodass von gesetzlich nicht zwingenden Baustandards leichter abgewichen werden kann.
  Bereits das erste Entlastungskabinett Anfang November 2025 umfasste zahlreiche Vorhaben,
  die Bürgerinnen und Bürger sowie die Wirtschaft von Bürokratie befreien. Über 80
  konkrete Maßnahmen für weniger Bürokratie und einen schnellen, digitalen Staat finden
  sich zudem in der Modernisierungsagenda Bund . Gemeinsam mit den Ländern hat sich
  der Bund darüber hinaus in der Föderalen Modernisierungsagenda auf mehr als 200
  Vorhaben unter anderem für schnellere Verfahren und leistungsfähige Strukturen verständigt.
  Erste Maßnahmen wirken bereits: Mehr Informationen und Beispiele zu dem Programm
  von Bund und Ländern PDF, 195 KB, nicht barrierefrei finden Sie hier.'
