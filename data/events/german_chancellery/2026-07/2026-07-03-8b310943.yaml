title: Bundeskanzler Merz gratuliert US-Präsident Trump zum 250. Jahrestag der Unabhängigkeit
  der Vereinigten Staaten
text: Bundeskanzler Merz hat heute Präsident Trump angerufen und seine herzlichen
  Glückwünsche zum anstehenden 250. Jahrestag der Unabhängigkeit der Vereinigten Staaten
  übermittelt. Er hat die besondere Verbundenheit zwischen Deutschen und Amerikanern
  unterstrichen. Der Bundeskanzler und der US-Präsident haben sich bei dieser Gelegenheit
  vor dem anstehenden NATO-Gipfel in Ankara abgestimmt. Der Bundeskanzler hat betont,
  dass Deutschland mehr Verantwortung für die Sicherheit im euroatlantischen Raum
  übernimmt. Die NATO werde europäischer, damit sie transatlantisch bleiben könne.
  Beide verabredeten, das Gespräch in Ankara fortzusetzen.
