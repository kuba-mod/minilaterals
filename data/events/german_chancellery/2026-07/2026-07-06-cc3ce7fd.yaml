title: Bis maximal Ende 2035 E-Autos von Kfz-Steuer befreit
text: 'Auch Elektrofahrzeuge, die zwischen 2026 und 2030 neu zugelassen werden, können
  von der Steuer befreit werden. Die Bundesregierung will den Automobilstandort Deutschland
  erfolgreich für die Zukunft aufstellen, Arbeitsplätze sichern und die Klimaziele
  erreichen. Ein wichtiger Baustein ist der Ausbau der Elektromobilität. Um den Kauf
  von E -Fahrzeugen noch attraktiver zu machen, hat das Bundeskabinett eine gezielte
  Maßnahme beschlossen: Reine Elektrofahrzeuge sollen auch über 2025 hinaus von der
  Kfz -Steuer ausgenommen werden. Damit profitieren auch zwischen 2026 und 2030 neu
  zugelassene Elektrofahrzeuge von der Steuerbefreiung. Das ist ein starkes Signal:
  Investitionen in E -Fahrzeuge zahlen sich nachhaltig aus. Kfz-Steuerbefreiung :
  Die Bundesregierung hat die Verlängerung der Kfz -Steuerbefreiung für reine Elektrofahrzeuge
  am 15. Oktober 2025 auf den Weg gebracht. Am 4. Dezember hat der Bundestag den Gesetzesentwurf
  beschlossen, am 19. Dezember folgte die Zustimmung des Bundesrats. Die Steuerbefreiung
  galt bislang für reine Elektrofahrzeuge, die bis zum Stichtag 31. Dezember 2025
  erstmalig zugelassen beziehungsweise komplett auf Elektroantrieb umgerüstet werden.
  Der Gesetzentwurf verlängert diese steuerliche Begünstigung um fünf Jahre – neuer
  Stichtag: 31. Dezember 2030. Die maximal zehnjährige Steuerbefreiung ist jedoch
  begrenzt bis längstens zum 31. Dezember 2035. Es lohnt sich also, frühzeitig ein
  reines Elektrofahrzeug anzuschaffen. Der Beschluss des Kabinetts ergänzt bereits
  umgesetzte Verbesserungen im Bereich der E-Mobilität bei Abschreibungsregeln und
  bei der Dienstwagenbesteuerung. Darüber hinaus können Käuferinnen und Käufer von
  Elektroautos bis zu 6.000 Euro Zuschuss online beantragen. Das Förderprogramm entlastet
  gezielt Familien mit kleineren und mittleren Einkommen. Gleichzeitig kurbelt es
  die Autoindustrie an und stärkt den Klimaschutz.'
