title: 'Bundeskabinett bringt Novelle des Wettbewerbsrecht auf den Weg – Staatsminister
  Weimer: „Mehr Spielraum für wirtschaftliche Stabilisierung von Medienanbietern“'
text: 'Das Bundeskabinett hat heute den Entwurf zur 12. Novelle des Gesetzes gegen
  Wettbewerbsbeschränkungen des Bundeswirtschaftsministeriums beschlossen. Sie enthält
  unter anderem wesentliche Verbesserungen zugunsten der Medienbranche, für die sich
  auch Medienminister Wolfram Weimer eingesetzt hat. Die neuen Regelungen betreffen
  unter anderem Erleichterungen bei Sanierungsfusionen im Pressebereich sowie rechtssichere
  Kooperationsmöglichkeiten im Rundfunk. Ziel ist es, die wirtschaftlichen Handlungsoptionen
  von Presse, Verlagen und Rundfunk im digitalen Strukturwandel weiter zu verbessern.
  Damit setzt die Bundesregierung eines der zentralen medienpolitischen Vorhaben des
  Koalitionsvertrags um. Staatsminister Wolfram Weimer: „Mit den medienpolitischen
  Anpassungen der Gesetzesnovelle verschaffen wir Medienunternehmen deutlich mehr
  Spielraum zur wirtschaftlichen Stabilisierung. Angesichts des immer schärferen Wettbewerbsdrucks
  wird es ihnen unterhalb einer bestimmten Größe nun leichter möglich sein, sich durch
  wirtschaftliche Sanierungen, Kooperationen oder Fusionen am Markt neu aufzustellen.
  Damit leistet die Bundesregierung einen wesentlichen ordnungspolitischen Beitrag
  zum Erhalt der dualen Medienordnung in Deutschland.“ Bereits bislang dürfen Zeitungs-
  und Zeitschriftenverlage Kooperationen eingehen, um die Pressevielfalt zu sichern.
  Diese Kooperationen werden nun auch für private Rundfunkanbieter ermöglicht. Auch
  im öffentlich-rechtlichen Rundfunk wird die Zusammenarbeit erleichtert. Die öffentlich-rechtlichen
  Rundfunkanstalten sind im Medienstaatsvertrag mit der Erbringung von Dienstleistungen
  von allgemeinem wirtschaftlichem Interesse betraut worden. Kooperationen, die der
  Erfüllung dieses Auftrags dienen, sind nun vom Kartellverbot ausgenommen. Auch Kooperationen
  zwischen dem öffentlich-rechtlichen Rundfunk und privaten Rundfunkanbietern werden
  erleichtert. Hier wird in Zukunft bei der kartellrechtlichen Prüfung die Stärkung
  der Basis im intermedialen Wettbewerb besonders berücksichtigt. Dadurch wird die
  im Medienstaatsvertrag der Länder bereits angelegte Zusammenarbeit wettbewerbsrechtlich
  noch leichter umsetzbar. Für Kooperationen von privaten Rundfunkanbietern, auch
  mit dem öffentlich-rechtlichen Rundfunk, ist ein Verfahren beim Bundeskartellamt
  vorgesehen, das rasch die nötige Rechtsklarheit schafft. Mit der Gesetzesnovelle
  sollen die relevanten Umsatzschwellenwerte in der Fusionskontrolle insgesamt angehoben
  werden. Damit sinkt die Zahl anmeldepflichtiger Zusammenschlüsse. Dies entlastet
  auch die Presse. Mit vereinfachten Voraussetzungen für Sanierungsfusionen erhalten
  Presse- und Zeitschriftenverlage zusätzliche Optionen zur wirtschaftlichen Stabilisierung.'
