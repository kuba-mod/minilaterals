title: Bundeskanzler Merz gratuliert dem Ministerpräsidenten der Republik Moldau,
  Vasile Tofan
text: Sehr geehrter Herr Ministerpräsident, zu Ihrer Wahl zum Ministerpräsidenten
  der Republik Moldau übermittle ich Ihnen meine besten Glückwünsche. Deutschland
  und Moldau sind auf vielfältige Weise eng miteinander verbunden. Ich freue mich
  darauf, mit Ihnen gemeinsam unsere Beziehungen zum Wohle unserer beiden Länder weiter
  auszubauen. Auf dem Weg in die Europäische Union und bei den dafür notwendigen Reformen
  wird Deutschland auch weiterhin ein verlässlicher Partner der Republik Moldau sein.
  Für die vor Ihnen liegenden Aufgaben wünsche ich Ihnen Erfolg und eine glückliche
  Hand. Mit freundlichen Grüßen Friedrich Merz Bundeskanzler der Bundesrepublik Deutschland
