title: Bundeskanzler Merz gratuliert dem Ministerpräsidenten der Ukraine, Serhij Korezkyj
text: 'Sehr geehrter Herr Ministerpräsident, zu Ihrem Amtsantritt gratuliere ich Ihnen
  sehr herzlich. Sie übernehmen Ihr Amt in einer Zeit großer Herausforderungen für
  Ihr Land. Sie können sich darauf verlassen, dass Deutschland die Ukraine bei der
  Verteidigung gegen die russische Aggression weiter entschlossen und kraftvoll unterstützen
  wird. Ich freue mich darauf, die deutsch-ukrainischen Beziehungen gemeinsam mit
  Ihnen und in beiderseitigem Interesse fortzuentwickeln. Um die europäische Perspektive
  der Ukraine weiter zu stärken, möchte ich Sie zu einer entschlossen Reformagenda
  ermutigen. Seien Sie versichert: Wir stehen dabei fest an der Seite der Ukraine.
  Für die Bewältigung der vor Ihnen liegenden Aufgaben wünsche ich Ihnen viel Glück
  und Erfolg. Mit freundlichen Grüßen Friedrich Merz Bundeskanzler der Bundesrepublik
  Deutschland'
