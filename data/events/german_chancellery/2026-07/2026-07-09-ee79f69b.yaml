title: Bund und Länder vergeben Stipendienplätze in Italien und Frankreich
text: 'Kulturstaatsminister Wolfram Weimer gibt die Rompreisträgerinnen und Rompreisträger
  für einen Aufenthalt in der vom Bund getragenen Deutschen Akademie Rom Villa Massimo
  sowie die Stipendiatinnen und Stipendiaten für die Aufenthalte in der Deutschen
  Akademie Rom Casa Baldi in Olevano Romano und im Deutschen Studienzentrum in Venedig
  bekannt. Mit diesen Aufenthalten in Italien ermöglicht es die Bundesregierung hochbegabten
  und besonders qualifizierten Künstlerinnen und Künstlern aus Deutschland, sich künstlerisch
  weiterzuentwickeln. Die Stipendien werden vollständig aus dem Etat des Beauftragten
  der Bundesregierung für Kultur und Medien finanziert. Darüber hinaus werden die
  Stipendiatinnen und Stipendiaten für die Bundesateliers der Cité Internationale
  des Arts in Paris benannt. Diese Stipendien werden von den sechzehn Ländern finanziert.
  Die Kosten übernimmt jeweils das Land, in dem die Stipendiengäste ihren Wohnsitz
  haben. Für den Rompreis, der einen zehnmonatigen Aufenthalt in der Villa Massimo
  ab September 2027 umfasst, wählte die Jury folgende Preisträgerinnen und Preisträger
  aus: Christoph Wagner, Berlin (Architektur) Studio CO NOW: Duy An Tran und Paul
  Reinhardt, Berlin (Architektur) Sven Johne, Berlin (Bildende Kunst) Paula Doepfner,
  Berlin (Bildende Kunst) Svenja Leiber, Berlin (Literatur) Julia Schoch, Potsdam
  (Literatur) Robert Henke, Berlin (Musik) Sophia Jani (Sophia Pfleger), München (Musik)
  Für einen Aufenthalt in der Casa Baldi in 2027/2028 wurden ausgewählt: Prof. Verena
  Schmidt, Berlin (Architektur) ANA institute: Lukas Fink und Dr. Jan Engelke, Zürich
  (Architektur) Jens Klein, Leipzig (Bildende Kunst) Cihan Çakmak, Berlin (Bildende
  Kunst) Ricarda Messner, Berlin (Literatur) Markus Thielemann, Hannover (Literatur)
  Jug Marković, Stuttgart (Musik) Hristina Šušak, Dresden (Musik) Ein Aufenthalt im
  Jahr 2027 im Deutschen Studienzentrum in Venedig wird ermöglicht für: Juliane Seehawer,
  Brüssel (Architektur) Prof. Anne Beer, München (Architektur) Youssef Tabti, Hamburg
  (Bildende Kunst) Ronny Bulik, Leipzig (Bildende Kunst) Jennifer de Negri, Berlin
  (Literatur) Stefan Hornbach, Berlin (Literatur) Andrea Burelli (Andrée Burelli),
  Berlin, (Musik) Agnese Menguzzato, Berlin (Musik) Folgende Künstlerinnen und Künstler
  wurden für einen Aufenthalt in der Cité Internationale des Arts 2027/2028 ausgewählt:
  Prof. Heike Hanada, Berlin (Architektur) Lionel Esche, Berlin (Architektur) Veronika
  Kellndorfer, Berlin (Bildende Kunst) Stefanie Schroeder, Leipzig (Bildende Kunst)
  Başak Günak, Berlin (Musik) Clemens K. Thomas, Freiburg im Breisgau (Musik) Mitglieder
  der Jury in der Sparte Bildende Kunst waren Dr. Sarah Alberti, Prof. Tulga Beyerle,
  Esra Ersen, Prof. Dr. Christoph Grunenberg und Çağla Ilk. In der Sparte Architektur
  entschieden Ayşin İpekçi, Anh-Linh Ngo und Elena Schütz. Die Jury-Mitglieder in
  der Sparte Literatur waren Anke Buettner, Hauke Hückstädt und Kristof Magnusson.
  In der Sparte Musik (Komposition) wählten Marko Nikodijević, Dr. Lucia Ronchetti
  und Arash Safaian die Stipendiengäste aus. Das Bewerbungs- und Auswahlverfahren
  wurde von der Kulturstiftung der Länder durchgeführt.'
