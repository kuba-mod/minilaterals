title: Öffentliche Aufträge schneller vergeben Einfacher beschaffen, schneller bauen
text: 'Das nationale Vergaberecht soll künftig einfacher, flexibler, schneller und
  digitaler werden. Einen entsprechenden Entwurf hat das Kabinett nun beschlossen.
  Für die notwendigen Investitionen in die Infrastruktur ist eine Reform des Vergaberechts
  von besonders hoher Bedeutung: Denn insbesondere auch das Sondervermögen Infrastruktur
  und Klimaschutz soll schnell dort ankommen, wofür es eingeplant ist. Auch deshalb
  hatte die Bundesregierung den Gesetzentwurf zur Beschleunigung öffentlicher Vergaben
  im Sommer 2025 beschlossen. Das neue „Vergabebeschleunigungsgesetz“ ist am 1. Juli
  2026 in Kraft getreten. Nach längeren Beratungen hat der Bundestag das Vergabebeschleunigungsgesetz
  am 23. April beschlossen. Der Bundesrat hat es abschließend am 8. Mai angenommen.
  Es wurde am 18. Mai im Bundesgesetzblatt veröffentlicht. Das Gesetz gehört zu den
  zentralen Vorhaben des Koalitionsvertrags und des Sofortprogramms der Regierung.
  Öffentliche Aufträge mit einem jährlichen Auftragsvolumen von vielen Milliarden
  Euro sind ein erheblicher Wirtschaftsfaktor und setzen wichtige Investitionsanreize
  für Unternehmen. Die öffentliche Vergabe trägt damit zum Wirtschaftswachstum bei.
  Fast 380 Millionen Euro jährlich sparen Verwaltungen und Wirtschaft durch das neue
  Gesetz zur Beschleunigung des Vergaberechts. Ziel des Gesetzes ist es, das nationale
  Vergaberecht einfacher, flexibler, schneller und digitaler zu gestalten – und das
  für die gesamte öffentliche Beschaffung in Deutschland. Das entlastet die Vergabestellen
  und die Unternehmen. Für Unternehmen wird es einfacher und attraktiver, sich um
  öffentliche Aufträge zu bewerben. Zudem erhöht das Gesetz die sogenannte Direktauftragswertgrenze
  auf 50.000 Euro für öffentliche Aufträge des Bundes – das führt zu weniger Verfahren.
  Denn bis zu diesem Auftragswert muss dann kein Vergabeverfahren, ein Bieterverfahren
  zwischen mehreren Unternehmen, gestartet werden. Das spart Kosten und Zeit. Das
  Gesetz hält am allgemeinen Losgrundsatz fest, weil es gut für den Mittelstand ist
  und durch mehr Ausschreibungen auch mehr Unternehmen von den öffentlichen Aufträgen
  profitieren. Der Grundsatz bedeutet aber auch, dass viele Leistungen einzeln ausgeschrieben
  und vergeben werden müssen, auch wenn sie zusammengehören. Das führt zu aufwändigeren
  und langwierigeren Verfahren, als wenn solche Leistungen auch zusammengefasst vergeben
  werden dürften. Wo nun besondere Schnelligkeit gefragt ist – beispielsweise bei
  den Infrastrukturvorhaben des Sondervermögens oder den Bedarfen von Sicherheitsbehörden
  für die zivil-militärische Verteidigung – genügt deshalb zukünftig unter bestimmten
  Bedingungen eine sogenannte Gesamtvergabe. Für den Sicherheitsbereich können solche
  Ausnahmen bis 2030 gemacht werden. Der Bundestag hat den Gesetzentwurf im Gesetzgebungsverfahren
  vor allem durch Maßnahmen zur Förderung des Mittelstands ergänzt. Außerdem sollen
  Auftraggeber im Fall einer Gesamtvergabe Auftragnehmer verpflichten können, bei
  der Erteilung von Unteraufträgen die Interessen von kleinen und mittleren Unternehmen
  besonders zu berücksichtigen. Der Gesetzentwurf enthält auch die Grundlage für eine
  Verordnung,  um Leitmärkte für klimafreundliche Produkte rechtlich zu verankern.
  Zudem sorgt der Entwurf f ü r weniger Nachweispflichten, st ä rkt Eigenerkl ä rungen
  der Unternehmen, beschleunigt Nachpr ü fungsverfahren und erlaubt mehr elektronische
  Kommunikation in den Verfahren. Das Gesetz soll bereits 2027 evaluiert werden. Zudem
  hat das Bundeskabinett am 10. Juni zwei Verwaltungsvorschriften beschlossen, die
  ebenfalls am 1. Juli mit dem Vergabebeschleunigungsgesetz in Kraft getreten sind.
  So sollen einerseits zwei Maßnahmen die Beteiligung von Start-ups in der öffentlichen
  Beschaffung stärken, indem Wertgrenzen abgesenkt werden und weniger Verfahren insbesondere
  für Start-ups notwendig sind. Das erhöht ihre Chancen auf öffentliche Aufträge und
  soll das wirtschaftliche Umfeld für Innovationen und Start-ups verbessern. Zudem
  werden für den Bereich der Liefer- und Dienstleistungen Verhandlungsvergaben ohne
  Teilnahmewettbewerb bis zu einer Auftragswertgrenze von 100.000 Euro voraussetzungslos
  erlaubt. Die sogenannten Abweichenden Verwaltungsvorschriften reihen sich ein in
  eine Reihe von Vorhaben, die der Vereinfachung und Beschleunigung der öffentlichen
  Beschaffung dienen. Die Regelungen im Vergaberecht sorgen dafür, dass Unternehmen
  gleichbehandelt werden und der Staat seine Aufträge transparent vergibt. Das schafft
  einen fairen Wettbewerb zwischen den interessierten Unternehmen und verhindert Korruption
  und Vetternwirtschaft. Geregelt werden können auch weitere Aspekte wie Nachhaltigkeit,
  oder andere beispielsweise umweltbezogene, soziale oder innovative Kriterien. So
  kann öffentlich Auftragsvergabe auch weiteren politischen Zielen dienen.'
