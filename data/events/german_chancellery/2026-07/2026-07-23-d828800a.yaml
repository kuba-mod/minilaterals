title: 'Kulturbauten-Initiative: Staatsminister Weimer besucht Schloss Mainau: „Ein
  einzigartiger Ort mit herausragender kulturhistorischer Bedeutung“'
text: 'Im Rahmen seiner Kulturbautenreise besuchte Staatsminister Wolfram Weimer am
  23. Juli Schloss Mainau am Bodensee. Der Beauftragte der Bundesregierung für Kultur
  und Medien förderte in den letzten Jahren einige Maßnahmen zur Sanierung des Schlosses
  mit rund 2,44 Millionen Euro. Gut eine weitere Million Euro stehen aus den sogenannten
  Denkmalschutz-Sonderprogrammen für Schloss und Schlosskirche bereit. Vor Ort konnte
  sich der Staatsminister ein Bild von den erfolgreichen Arbeiten machen. Staatsminister
  Weimer sagte vorab: „Die Insel Mainau mit ihrem Schlosskomplex und der Schlosskirche
  ist ein einzigartiger Ort mit herausragender kulturhistorischer Bedeutung und ein
  lebendiges Zeugnis von Bau-, Garten- und Kulturgeschichte. Ein Ort, der zum Verweilen
  einlädt und gleichzeitig Geschichte erlebbar macht – ein Ort, der Identität stiftet.
  Ich danke dem Haushaltsausschuss des Deutschen Bundestages, der regelmäßig Mittel
  für Investitionen in bedeutende Kulturbauten bereitstellt.“ „Die Unterstützung der
  Bundesregierung für den Erhalt dieses einzigartigen Barockensembles bedeutet uns
  sehr viel. Schloss und Kirche als bedeutendes Kulturerbe und als Ort der Begegnung
  für unsere Gäste und kommende Generationen zu bewahren, ist eine große Verantwortung,
  der wir uns mit großer Freude widmen“, sagt Mainau-Geschäftsführer Björn Graf Bernadotte.
  Bis September dieses Jahres wird die Haustechnik im gesamten Schloss, dazu gehört
  beispielsweise die Heizung, sowie die Elektrotechnik im Nordflügel und Keller umfassend
  saniert. Zuvor wurden bereits das Dachgeschoss und die Fassade, die aus den Baujahren
  1735 bis 1756 stammt, erneuert, sowie das historische Tragwerk des Dachs instandgesetzt.
  Die Maßnahmen kommen unmittelbar der Öffentlichkeit zugute: Insbesondere der Weiße
  Saal kann seit den Sanierungen wieder für Veranstaltungen genutzt werden. Mit seiner
  Reise möchte Staatsminister Weimer die herausragende Bedeutung für die kulturelle
  Identität Deutschlands sichtbar machen und zugleich ein Zeichen für die Vielfalt
  der Kulturlandschaft setzen, die weit über die großen Städte hinausreicht. Viele
  dieser Orte prägen seit Jahrhunderten das Erscheinungsbild ihrer Regionen und sind
  zugleich wichtige Anziehungspunkte für Bildung und Tourismus.'
