title: Bundesregierung gedenkt der Ermordeten des Widerstands gegen die nationalsozialistische
  Gewaltherrschaft
text: 'Die Bundesregierung erinnert am 20. Juli 2026 – dem 82. Jahrestag des Attentats-
  und Umsturzversuchs gegen Hitler – mit einer Feierstunde um 11:00 Uhr im Ehrenhof
  des Bendlerblocks in Berlin, Stauffenbergstraße, an den Widerstand gegen die nationalsozialistische
  Gewaltherrschaft. Nach der Begrüßung durch den Vorstandsvorsitzenden der Stiftung
  20. Juli 1944, Prof. Dr. Robert von Steinau-Steinrück und dem Grußwort des Bürgermeisters
  von Berlin und Senators für Finanzen, Stefan Evers, wird die Bundesministerin für
  Bildung, Familie, Senioren, Frauen und Jugend, Karin Prien, die Ansprache halten.
  Anschließend wird Valerie Riedesel Freifrau zu Eisenbach (Kuratoriumsvorsitzende
  der Stiftung 20. Juli 1944) das Totengedenken sprechen. Die Vizepräsidentin des
  Deutschen Bundestages Andrea Lindholz legt danach, begleitet vom Generalinspekteur
  der Bundeswehr, Carsten Breuer, an dem Ort, an dem Claus Schenk Graf von Stauffenberg
  und weitere Widerstandsbeteiligte in der Nacht zum 21. Juli 1944 erschossen wurden,
  einen Kranz nieder. Anschließend legen weitere Repräsentanten der Verfassungsorgane
  des Bundes und des Landes Berlin sowie der Stiftung 20. Juli 1944 im Gedenken an
  die Opfer des Nationalsozialismus Kränze nieder. Ablauf Musikalische Gestaltung:
  Das große Blechbläser-Ensemble des Musikkorps der Bundeswehr Leitung: Stabsfeldwebel
  Akio Ogawa-Müller Hinweis: In diesem Jahr gibt es keine Gedenkveranstaltung der
  Bundesregierung in der Gedenkstätte Berlin-Plötzensee. Journalistinnen und Journalisten,
  die sich für diesen Termin akkreditieren möchten, finden weitere Informationen auf
  www.cvd.bundesregierung.de'
