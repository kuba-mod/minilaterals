title: Bundeskanzler Merz gratuliert der Ministerpräsidentin der Republik Korea, Han
  Seong-sook
text: Sehr geehrte Frau Ministerpräsidentin, zu Ihrem Amtsantritt als Ministerpräsidentin
  der Republik Korea gratuliere ich Ihnen herzlich. Deutschland und die Republik Korea
  verbindet eine vielfältige und vertrauensvolle Partnerschaft, die auf gemeinsamen
  Werten und Interessen gründet. Umso mehr freue ich mich darauf, in naher Zukunft
  Ihr Land zu besuchen. Mit diesem Besuch verbinde ich den Wunsch, unsere Zusammenarbeit
  weiter zu vertiefen. Für Ihre verantwortungsvolle Aufgabe wünsche ich Ihnen Kraft,
  Erfolg und eine glückliche Hand. Mit freundlichen Grüßen Friedrich Merz Bundeskanzler
  der Bundesrepublik Deutschland
