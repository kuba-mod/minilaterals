title: Bundeskanzler Merz reist zum NATO-Gipfel nach Ankara
text: Bundeskanzler Friedrich Merz wird am 7. und 8. Juli 2026 am NATO-Gipfel in Ankara
  teilnehmen. Themen des Gipfels werden die Umsetzung der Beschlüsse des NATO-Gipfels
  von 2025 in Den Haag sein, wo es um die Erhöhung der Verteidigungsausgaben und eine
  stärkere Verantwortung der europäischen Alliierten für eine gemeinsame euro-atlantische
  Sicherheit geht. Auch wird man sich über den Ausbau der Kapazitäten der Verteidigungsindustrie,
  eine engere Kooperation bei Rüstungsprojekten und die weitere militärische Unterstützung
  der Ukraine austauschen.
