title: Gesetz tritt in Kraft Neue Grundsicherung löst Bürgergeld ab
text: 'Die neue Grundsicherung schafft klare Regeln mit dem Ziel, Sozialleistungen
  fairer auszugestalten und Missbrauch wirksamer zu verhindern. Mit der neuen Grundsicherung
  sollen Sozialleistungen gerechter und treffsicherer werden. Es gilt der Grundsatz
  des Forderns und Förderns: Menschen, die Hilfe brauchen, sollen sich weiterhin auf
  Unterstützung verlassen können. Wer aber arbeiten kann, muss daran mitwirken, seinen
  Lebensunterhalt selbst zu bestreiten. Rechte und Pflichten sollen verbindlicher
  und Konsequenzen spürbarer werden. Gleichzeitig sollen die Jobcenter die Arbeitsuchenden
  besser auf ihrem Weg in Arbeit unterstützen. Das Gesetz zur Umgestaltung der Grundsicherung
  für Arbeitsuchende tritt zum 1. Juli 2026 schrittweise in Kraft. Das Gesetz sieht
  Änderungen im Zweiten Buch des Sozialgesetzbuches (SGB II) vor. Das Kabinett hatte
  den Gesetzentwurf am 17. Dezember 2025 beschlossen. Anschließend hatte der Bundestag
  ihn am 5. März 2026 verabschiedet. Der Bundesrat billigte ihn abschließend am 27.
  März 2026. Fragen und Antworten zur neuen Grundsicherung finden Sie beim Bundesministerium
  für Arbeit und Soziales .'
