title: Modernisierung des Bundespolizeigesetzes Zeitgemäße Befugnisse für die Bundespolizei
text: 'Die Befugnisse für Polizeibeamte sollen moderner und zeitgemäßer angepasst
  werden. Das Bundespolizeigesetz, das die Aufgaben und die Rechtsstellung der Bundespolizei
  regelt, stammt zu großen Teilen aber noch aus dem Jahr 1994. Zu dieser Zeit gab
  es weder Chat -Gruppen noch Social Media . Seitdem hat sich viel geändert: Genau
  wie die technischen Möglichkeiten, sind die Aufgaben der Polizei größer und vielfältiger
  geworden. Um dem großen Aufgabenfeld der Bundespolizei gerecht zu werden, hat die
  Bundesregierung das Bundespolizeigesetz an die veränderte Gegenwart angepasst und
  das Bundespolizeigesetz umfassend modernisiert und strukturiert. Ziel ist, die über
  50.000 Bundespolizistinnen und Bundespolizisten mit zeitgemäßen Befugnissen auszustatten,
  die den heutigen Gefahrenlagen entsprechen. So sollen sie zuverlässig für die Sicherheit
  an unseren Grenzen, auf See, an Flughäfen sowie bei der Bahn Sorge tragen und Bürgerinnen
  und Bürger im In- und Ausland schützen. Hierzu zählen unter anderem diese neuen
  Befugnisse : zum Einsatz von Drohnen als Sensorträger, zur Detektion und Abwehr
  von Drohnen, von denen Gefahren ausgehen; zur präventive Telekommunikationsüberwachung,
  einschließlich der Quellen-Telekommunikationsüberwachung; zum Erlass von Meldeauflagen
  und Aufenthaltsverboten; zur Durchführung verdachtsunabhängiger Kontrollen in Waffen-
  und Messerverbotszonen im Bahnbereich; zur Beantragung einer Abschiebungshaft bei
  Gericht gegen vollziehbar ausreisepflichtige, nicht geduldete Personen, die sie
  in ihrem Zuständigkeitsbereich feststellt. Um die Bundespolizei vor der Unterwanderung
  durch Extremisten zu schützen, wird außerdem eine Zuverlässigkeitsüberprüfung für
  alle Personen eingeführt, die von der Bundespolizei neu eingestellt werden. Im Rahmen
  des parlamentarischen Verfahrens wurden im Deutschen Bundestag Änderungen vorgenommen.
  Unter anderem schafft ein neuer Paragraf zur „automatisierten Erkennung von Gefahren“
  für die Bundespolizei eine Befugnis zur Erkennung von Bewegungs- und Objektmustern
  sowie Aufenthaltsorten, die auf Gefahren hindeuten. Zu den weiteren Änderungen zählt
  etwa die Schaffung einer Befugnis für die Bundespolizei zur „biometrischen Detektion
  in Echtzeit“. Weiterführende Informationen finden Sie beim Bundesministerium des
  Innern .'
