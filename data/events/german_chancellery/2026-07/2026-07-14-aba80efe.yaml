title: Rede des Kanzlers anlässlich der Gedenkveranstaltung 5 Jahre Ahrtalflut „Ein
  Land, in dem wir uns die Hände reichen“
text: 'Bundeskanzler Merz dankte den Zehntausenden ehrenamtlichen Helferinnen und
  Helfern aus der Region und der ganzen Bundesrepublik. Anlässlich des fünften Jahrestages
  der Flutkatastrophe im Ahrtal hat Bundeskanzler Friedrich Merz zusammen mit dem
  rheinland-pfälzischen Ministerpräsidenten Gordon Schnieder an der Gedenkveranstaltung
  teilgenommen. Gemeinsam haben sie zudem in Bad Neuenahr-Ahrweiler eine städtische
  Baumaßnahme im Kurpark besucht, um sich über den Stand des Wiederaufbaus zu informieren
  und mit jungen Ehrenamtlichen aus dem Ahrtal und Gewerbetreibenden zu sprechen.
  In seiner Rede gedachte Kanzler Merz der Menschen, die vor fünf Jahren ums Leben
  kamen oder ihre Heimat verloren hatten. „Wir denken an sie. Wir denken an ihre Familien
  und ihre Freunde. Wir denken an diejenigen, die in den Wassermassen verloren haben,
  was ihnen kostbar war. Ihr Zuhause. Ihr Hab und Gut. Das, was hart erarbeitet war.
  Das, was schöne Erinnerungen in sich getragen hat“, so Bundeskanzler Merz. Er dankte
  den Zehntausenden ehrenamtlichen Helferinnen und Helfern aus der Region und der
  ganzen Bundesrepublik. „Die Katastrophe, die hier geschehen ist, hat das Beste Ihrer
  Region, hat das Beste unserer Gesellschaft hervorgebracht: bedingungslose Hilfsbereitschaft;
  ein stärkendes Miteinander“, würdigte Bundeskanzler Merz in seiner Rede. Deutschland
  sei „ein Land, in dem wir uns die Hände reichen“, sagte er. Zugleich betonte der
  Kanzler, dass Bund, Länder und Kommunen gemeinsam zahlreiche Vorsorge- und Präventionsmaßnahmen
  sowie Maßnahmen der Klimaanpassung auf den Weg gebracht hätten, um Deutschland besser
  auf Naturkatastrophen vorzubereiten. In Bad Neuenahr spricht Bundeskanzler Friedrich
  Merz mit Ehrenamtlichen der Feuerwehr, des Deutschen Roten Kreuzes, des THW und
  des DLRG, die vor fünf Jahren im Einsatz waren. Stellvertretend dankte er ihnen
  und den tausenden ehrenamtlichen Helferinnen und Helfern aus der Region und der
  gesamten Bundesrepublik, die vor fünf Jahren bedingungslose Hilfsbereitschaft zeigten.
  Auch fünf Jahre nach der Flutkatastrophe sind nicht alle Schäden der verheerenden
  Naturkatastrophe behoben. In Bad Neuenahr informiert sich der Bundeskanzler über
  den Wiederaufbau des neuen Kurparks. Zahlreiche Menschen besuchen die Gedenkfeier
  auf dem Marktplatz in Bad Neuenahr. Als die Flut vor fünf Jahren kam, riss sie Häuser,
  Autos und Leben mit sich. In seiner Rede gedachte Kanzler Merz der Menschen, die
  vor fünf Jahren ums Leben kamen. „Wir denken an sie. Wir denken an ihre Familien
  und ihre Freunde. Wir denken an diejenigen, die in den Wassermassen verloren haben,
  was ihnen kostbar war. Ihr Zuhause. Ihr Hab und Gut. Das, was hart erarbeitet war.
  Das, was schöne Erinnerungen in sich getragen hat“, so Bundeskanzler Merz. In Bad
  Neuenahr spricht Bundeskanzler Friedrich Merz mit Ehrenamtlichen der Feuerwehr,
  des Deutschen Roten Kreuzes, des THW und des DLRG, die vor fünf Jahren im Einsatz
  waren. Stellvertretend dankte er ihnen und den tausenden ehrenamtlichen Helferinnen
  und Helfern aus der Region und der gesamten Bundesrepublik, die vor fünf Jahren
  bedingungslose Hilfsbereitschaft zeigten. Auch fünf Jahre nach der Flutkatastrophe
  sind nicht alle Schäden der verheerenden Naturkatastrophe behoben. In Bad Neuenahr
  informiert sich der Bundeskanzler über den Wiederaufbau des neuen Kurparks. Zahlreiche
  Menschen besuchen die Gedenkfeier auf dem Marktplatz in Bad Neuenahr. Als die Flut
  vor fünf Jahren kam, riss sie Häuser, Autos und Leben mit sich. In seiner Rede gedachte
  Kanzler Merz der Menschen, die vor fünf Jahren ums Leben kamen. „Wir denken an sie.
  Wir denken an ihre Familien und ihre Freunde. Wir denken an diejenigen, die in den
  Wassermassen verloren haben, was ihnen kostbar war. Ihr Zuhause. Ihr Hab und Gut.
  Das, was hart erarbeitet war. Das, was schöne Erinnerungen in sich getragen hat“,
  so Bundeskanzler Merz. liebe Kolleginnen und Kollegen aus dem Deutschen Bundestag,
  dem rheinland-pfälzischen Landtag, es ist ein Tag der Trauer und des Gedenkens,
  an dem wir heute zusammenfinden. Es ist ein Tag der Erinnerung an die Menschen,
  die hier vor fünf Jahren viel zu früh ihr Leben verloren haben: 135 Menschen im
  Ahrtal, 75 hier im Stadtgebiet. Wir denken an sie. Wir denken an ihre Familien und
  an ihre Freunde. Wir denken an diejenigen, die in den Wassermassen verloren haben,
  was ihnen kostbar war: ihr Zuhause, ihr Hab und Gut, das, was hart erarbeitet war,
  das, was schöne Erinnerungen in sich getragen hat. Sie hier im Ahrtal teilen miteinander
  Erfahrungen, die unvorstellbar sind für die meisten Menschen in unserem Land – und
  die auch für mich unvorstellbar sind. Die Fotos, die Videoaufnahmen geben uns, die
  wir nicht zu den Betroffenen zählen, einen Eindruck von der Zerstörungskraft, die
  hier vor fünf Jahren gewütet hat. Die Bilder haben sich uns allen eingeprägt. Aber
  was wir auf den Bildern nicht sehen können, sind das Grollen der Wassermassen, das
  Geräusch von berstenden Hauswänden, von zersplitternden Scheiben, von zerberstendem
  Holz, das Schrillen unzähliger Alarmanlagen und vor allem die Hilfeschreie von Menschen
  in Not. Es war laut in der Flutnacht. So berichten es die, die es erlebt haben.
  Was wir auf den Bildern nicht sehen können, was wir, die wir nicht Betroffene sind,
  nur nachzuempfinden versuchen können, ist das Entsetzen, ist die Todesangst, die
  Angst um Familie und Freunde, die um sich griff, als das Wasser immer weiter stieg.
  Und ich kann auch selbst nur versuchen, nachzuempfinden, wie sich das Leben derjenigen
  veränderte, die erleben mussten, wie innerhalb weniger Stunden die vertraute Welt
  des Alltags, das eigene Zuhause, das, was gewöhnlich ein Raum von Schutz und Geborgenheit
  ist, buchstäblich unter den eigenen Füßen davongerissen wird. Die Erzählungen der
  Überlebenden, der Hinterbliebenen hier im Ahrtal, die Bilder der Zerstörung - sie
  erinnern uns daran, wie verletzlich, wie verwundbar wir Menschen sind. Meine Damen
  und Herren, unser Land, die Bundesrepublik Deutschland, ist gegründet worden als
  ein Land, das sich selbst den Anspruch gegeben hat, keinen Menschen alleinzulassen
  in seiner Verletzlichkeit und in seiner Verwundbarkeit, die wir alle gemeinsam haben.
  Die Bundesrepublik Deutschland ist gegründet worden als ein Land, das dem selbstgestellten
  Anspruch nach keinen schutzbedürftigen Menschen schutzlos lässt gegenüber Naturgewalten,
  gegenüber menschlicher Gewalt, gegenüber Willkür, gegenüber Schicksalsschlägen und
  Grausamkeit. Kein Mann, keine Frau, kein Kind! Freiheit und Sicherheit – die Sicherheit,
  die ein freies und gutes Leben braucht – sind die Grundversprechen unseres Landes
  und unserer Gesellschaft. Das ist die Legitimationsgrundlage unseres Staates. Und
  darum ist es die Pflicht staatlicher Organisation, darum ist es unsere Pflicht,
  Vorsorge zu treffen, wo Gefahren drohen, die die Vorsorgekraft des Einzelnen übersteigen.
  Es ist die Pflicht staatlicher Organisationen, auch mit den sogenannten Blaulichtorganisationen,
  die hier im Ahrtal so viel Gutes getan haben, und ich nenne nur stellvertretend
  Technisches Hilfswerk, Deutsches Rotes Kreuz, die Feuerwehren. Es ist die Pflicht,
  zu helfen, wo Selbsthilfe und Nachbarschaftshilfe nicht mehr ausreichen. Es ist
  die Pflicht und Aufgabe staatlicher Institutionen, zu unterstützen und Steine aus
  dem Weg zu räumen, wo nach der Katastrophe, wo nach dieser Katastrophe Menschen
  wieder Aufbau leisten und Neues entstehen lassen wollen. Ich sehe vor mir und ich
  habe sehen dürfen, wie viel an Aufbauarbeit im Ahrtal bereits geleistet worden ist.
  Ich komme soeben aus dem Kurpark Bad Neuenahr-Ahrweiler. Ich habe sehen dürfen,
  wie viel schon wieder aufgebaut wurde, und hören dürfen, wie viel noch in der Planung
  ist, wie unermüdlich, wie zielstrebig Sie sich hier in der Zivilgesellschaft, in
  den Unternehmen, in der kommunalen Politik, in der Verwaltung der Verwüstung stellen,
  Neues entstehen lassen, Gemeinschaft entstehen lassen, Zusammenleben entstehen lassen,
  buchstäblich aus dem Schlamm und aus der Zerstörung. Sie erwarten zu Recht, dass
  Bundespolitik und Landespolitik das ihrige tun über die Ausbau- und Aufbauhilfefonds
  hinaus. Die Jahrhundertflut, die Katastrophe, die hier geschehen ist, hat bereits
  erheblichen Einfluss genommen auf die Gesetzgebung, und sie tut es immer noch. Bund,
  Länder und Kommunen haben gemeinsam zahlreiche Maßnahmen auf den Weg gebracht, um
  Deutschland besser auf Naturkatastrophen vorzubereiten. Wir investieren in Vorsorgemaßnahmen,
  in Prävention, in Maßnahmen zur Klimaanpassung. Ich möchte es erneut sagen und ich
  möchte es mit Nachdruck sagen: Kein Mensch, keine Stadt, keine Region darf und soll
  in unserem Land allein bleiben mit der Furcht vor Katastrophen und Naturgewalten,
  mit der Furcht vor den Folgen des Klimawandels, den wir erleben. Das ist es, was
  ich als Auftrag dieses Tages verstehen möchte. Meine sehr geehrten Damen und Herren,
  es ist ein Auftrag, dem sich so viele bereits in der Flutnacht angenommen haben.
  Heute ist ein Tag auch von Heldinnen und Helden. Viele Menschen haben in der Flutnacht,
  haben in den Folgetagen Unglaubliches geleistet. Sie haben geholfen, wo die Not
  am größten war – bisweilen unter Einsatz des eigenen Lebens, unter größten Gefahren
  jedenfalls für Leib und Leben. In den Folgewochen haben sich Zehntausende ehrenamtliche
  Helferinnen und Helfer aus der ganzen Bundesrepublik Deutschland mit ihrer Hände
  Arbeit der Zerstörung hier im Ahrtal entgegengestellt. Die Katastrophe, die hier
  geschehen ist, hat das Beste Ihrer Region, hat das Beste unserer Gesellschaft hervorgebracht:
  bedingungslose Hilfsbereitschaft, ein stärkendes Miteinander. Ich danke Ihnen allen,
  die Sie ein Teil davon waren und es weiterhin bis heute sind. Ich danke Ihnen im
  Namen der gesamten Bundesregierung. Heute ist ein schwerer Tag. Aber es ist auch
  ein Tag, der zeigt, was Ihre Region sein kann, was unser Land auch sein kann: ein
  Land, in dem wir uns die Hände reichen. Ich wünsche allen, die heute in besonderer
  Weise dieser Gemeinschaft bedürfen, dass sie diese Gemeinschaft finden. Ich wünsche
  allen, die heute in besonderer Weise Trost bedürfen, dass sie diesen Trost finden.
  Ich wünsche Ihnen allen, dass Sie, die hier leben, wieder Heimat finden, dass Sie
  in Ihrer Heimat wieder sicher, geborgen leben können und dass Sie sich auch so fühlen.
  Ich wünsche es Ihnen von ganzem Herzen.'
