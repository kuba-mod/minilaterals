title: Im Bundesrat beschlossen Scheinvaterschaften effektiv verhindern
text: Bei Vaterschaftsanträgen soll künftig auch die Ausländerbehörde zustimmen. Die
  Bundesregierung hat ein Gesetz auf den Weg gebracht, mit dem sogenannte „Scheinvaterschaften”
  künftig effektiver verhindert werden sollen. Missbräuchliche Anerkennungen von Vaterschaften
  zeichnen sich regelmäßig dadurch aus, dass Männer mit deutscher Staatsangehörigkeit
  oder mit unbefristetem Aufenthaltsrecht die Vaterschaft für ausländische Kinder
  anerkennen, die nicht ihre sind. Für das Kind wird dadurch der Erwerb der deutschen
  Staatsangehörigkeit herbeigeführt und so mittels Familiennachzug ein Aufenthaltsrecht
  der drittstaatsangehörigen Mutter begründet oder gestärkt. Kinder und Mütter bekommen
  Aufenthaltstitel und Sozialleistungen. Missbräuchliche Vaterschaftsanerkennungen
  werden häufig nicht erkannt. Das Gesetz trägt dazu bei, dass Vaterschaften künftig
  nicht mehr anerkannt werden, die allein der aufenthaltsrechtlichen Vorteilsnahme
  dienen. Die Beteiligten sollen von einer missbräuchlichen Vaterschaftsanerkennung
  nicht sozialrechtlich profitieren können. Die Regelungen haben nun den Bundesrat
  passiert. Künftig ist eine zwingend notwendige Zustimmung der Ausländerbehörde zur
  Anerkennung der Vaterschaft erforderlich, wenn es ein „aufenthaltsrechtliches Gefälle”
  gibt. Das bedeutet, dass der Scheinvater einen deutschen Pass, die Frau der Kinder
  aber beispielsweise nur eine Duldung besitzt. Ohne die Ausländerbehörde wird die
  Anerkennung der Vaterschaft dann nicht wirksam. Damit besteht sie zivilrechtlich
  nicht und entfaltet auch keine ausländerrechtliche Wirkung. Die Zustimmung der Ausländerbehörde
  wird immer dann zurückgenommen, wenn sie etwa aufgrund von Bestechung, Drohung oder
  vorsätzlich falscher Tatsachenangaben erwirkt wurde. Wenn falsche oder unvollständige
  Angaben gemacht wurden, um die Zustimmung der Ausländerbehörde zu bekommen, sind
  diese künftig strafbewehrt. Ein Missbrauch der Vaterschaft soll künftig leichter
  anhand von gesetzlich vorgesehenen Vermutungstatbeständen festgestellt werden. Dabei
  können Tatbestände für oder gegen einen Missbrauch sprechen. Die Vermutungstatbestände
  orientieren sich dabei an Erfahrungswerten aus der behördlichen Praxis. Zudem sollen
  Mitwirkungspflichten der Beteiligten verschärft werden, indem Erklärungen, die für
  eine Entscheidung erheblich sind, abgegeben und entsprechende Nachweise erbracht
  werden müssen. Eine schuldhafte und wiederholte mangelnde Mitwirkung über einen
  längeren Zeitraum kann künftig dazu führen, dass die erforderliche Zustimmung der
  Ausländerbehörde nicht erteilt wird Die Zustimmung der Ausländerbehörde ist nicht
  nötig, wenn der Anerkennende tatsächlich leiblicher Vater des Kindes ist, ein Missbrauch
  ausgeschlossen werden und das Standesamt dies mit einfachen Mitteln feststellen
  kann. Zudem braucht es die Zustimmung nicht, wenn zwischen Vater und Kind eine sozial-familiäre
  Beziehung besteht oder der Anerkennende tatsächlich Verantwortung für das Kind übernimmt.
