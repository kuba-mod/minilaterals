date: '2026-07-08'
type: press_release
source_name: german_chancellery
title: Pressekonferenz von Kanzler Merz nach dem NATO -Gipfeltreffen in Ankara Wichtiger
  Schritt in eine neue NATO
text: 'Deutschland habe einen großen Beitrag geleistet, dass die NATO zusammenbleibt
  und stärker wird, betonte Merz bei seiner Abschluss-Pressekonferenz in Ankara. „Es
  war ein guter Tag hier in Ankara, der uns gemeinsam gelungen ist“, resümierte Bundeskanzler
  Friedrich Merz nach dem NATO -Gipfel, der vom 7. bis 8. Juli 2026 in Ankara stattfand.
  Der Gipfel habe gezeigt, dass die NATO einen wichtigen Schritt vorangekommen sei
  auf dem Weg zu einer neuen NATO – und dass die vor einem Jahr in Den Haag beschlossenen
  Ziele in von den NATO -Staaten umgesetzt werden. Diese NATO sei europäischer denn
  je. Die Europäer übernähmen mehr Verantwortung. Und doch bleibe sie transatlantisch
  fest verankert. Die NATO bleibe unerreicht stark und vor allem bleibe sie einig,
  bekräftigte der Kanzler. Die NATO -Staaten hätten sich klar und eindeutig zu Artikel
  5 des NATO -Vertrags bekannt. Meine Damen und Herren, wir schließen den NATO -Gipfel
  in Ankara in diesen Minuten ab. Ich habe gerade Präsident Erdoğan noch einmal in
  einem persönlichen Gespräch herzlich für die Vorbereitung und die Durchführung des
  diesjährigen NATO -Gipfels hier in Ankara gedankt, der ja in außergewöhnlich bewegten
  Zeiten stattfindet. Vor allem sehen wir, dass Russland den Krieg gegen die Ukraine
  weiter eskaliert. Das hat Folgen für uns alle. Das hat Folgen für die Freiheit,
  für die Sicherheit, für den Wohlstand im gesamten euroatlantischen Raum. Deswegen
  haben wir beim Haager- NATO -Gipfel im letzten Jahr ja auch verabredet, dass wir
  unsere Verteidigungsausgaben über einen Zeitraum von zehn Jahren auf fünf Prozent
  erhöhen. Hier in Ankara konnten wir eine erste Bilanz ziehen, und diese Bilanz ist
  durchweg positiv. In den letzten zwölf Monaten haben allein die europäischen Mitglieder
  der NATO ihre Verteidigungsausgaben um mehr als 100 Milliarden Euro erhöht. Deutschland
  hat daran einen Anteil von rund 25 Milliarden Euro. Wir haben unsere Verteidigungsausgaben
  auf knapp 125 Milliarden Euro angehoben. Wir haben innerhalb von vier Jahren, seit
  dem Jahr 2022, unsere Investitionen in unsere Verteidigung verdoppelt. Wir werden
  das in Den Haag verabredete Fünf-Prozent-Ziel damit deutlich vor der Zeit erreichen.
  Diese Zahlen zeigen: Wir lassen den Worten des letzten Jahres Taten folgen. Wir
  haben uns diesen Kraftakt vorgenommen, und wir leisten ihn – nicht, um irgendjemandem
  einen Gefallen zu tun, sondern um unsere eigene Sicherheit zu stärken. Wir tun es,
  weil es in unserem eigenen Interesse notwendig ist. Denn jeden Tag testet Russland
  unsere Entschlossenheit durch Cyber angriffe, durch Sabotage, durch Ausspähversuche
  und gezielte Desinformation. Deshalb war es so wichtig, dass wir uns alle hier in
  Ankara noch einmal sehr klar und deutlich zu Artikel 5 des NATO -Vertrags verpflichtet
  und bekannt haben. Das haben wir auf europäischer Seite alles intensiv vorbereitet,
  das wissen Sie. Ich habe dazu verschiedentlich auch nach Berlin eingeladen, unter
  anderem im sogenannten E5 -Format, also dem der Staats- und Regierungschefs aus
  Frankreich, Italien, Polen, Großbritannien und Deutschland, aber auch im B3 -Format.
  Die drei baltischen Staaten sind also ebenfalls durch ihre Staats- und Regierungschefs
  meine Gäste gewesen. Ich kann heute sagen: Die Arbeit hat sich gelohnt. Die NATO
  bleibt für uns alle ein einziger großer Vorteil. Das gilt für Europa, das gilt für
  Kanada, und das gilt auch für die Vereinigten Staaten. Ich habe in der Arbeitssitzung
  heute vom „Geist von Ankara“ gesprochen. Ich wollte damit ganz einfach Folgendes
  ausdrücken: Wir bauen eine europäische NATO , damit die NATO transatlantisch bleiben
  kann. Als Europäer übernehmen wir eben mehr Verantwortung, wir machen die NATO stärker,
  wir machen sie aber auch in der Lastenverteilung fairer, wir lösen uns von einseitigen
  Abhängigkeiten, und das dient unser aller Sicherheit. All das schafft neue Chancen
  zu transatlantischer und europäischer Zusammenarbeit. Das gilt, last, but not least
  auch für die Verteidigungsindustrie, bei Abstandswaffen in der Luftverteidigung
  und bei künstlicher Intelligenz, um nur einige Beispiele zu nennen. Wir wollen bei
  dem Thema der Abstandswaffen zügig vorankommen, europäisch und auch transatlantisch.
  Wir haben eine entsprechende europäische Erklärung hier in Ankara ja auch unterzeichnet.
  Wir haben gestern, und das haben Sie verfolgen können, mit Premierminister Carney
  aus Kanada und Jonas Støre aus Norwegen eine gemeinsame Beschaffung beschlossen.
  Wir haben vereinbart, dass wir in Zukunft eng zusammenarbeiten, und Kanada hat sich
  entschlossen, die U -Boote der 212-CD-Klasse, wie sie in der Fachsprache heißen,
  anzuschaffen. Das ist ein wirklich großartiges Vorhaben. Es ist Ausdruck einer strategischen
  Zusammenarbeit, die wir jetzt im gesamten Raum des Nordatlantiks auf Jahrzehnte
  anlegen. Wir werden miteinander eine Flotte von insgesamt 24 U -Booten in diesem
  Raum haben. Wir werden die Ausbildung harmonisieren. Wir werden die Wartung dieser
  U -Boote gemeinsam durchführen. Es wird also wirklich integrierte marine Streitkräfte
  geben, die hier entstehen. Das ist wirklich ein großer Fortschritt, nicht nur in
  der europäischen Zusammenarbeit, sondern auch in der Zusammenarbeit mit Kanada.
  Ich will Mark Carney auch noch einmal sehr herzlich danken, dass er diese Entscheidung
  in Kanada getroffen hat, aber ich will gleichfalls Boris Pistorius, Johann Wadephul,
  Katherina Reiche und ihren jeweiligen kanadischen Amtskollegen und norwegischen
  Amtskollegen danken. Wir alle haben dies, was wir gestern unterzeichnet haben, über
  die letzten Monate hinweg vorbereitet und haben dafür auch hart gearbeitet. Das
  trägt alles dazu bei, dass die Grundlagen unserer Freiheit, unserer Sicherheit und
  unseres Wohlstandes bewahrt bleiben und dass wir sie zu erneuern versuchen, und
  zugleich gibt es uns Chancen, unsere wirtschaftlichen Fähigkeiten einzubringen und
  weiterzuentwickeln. Das gilt auch für unser Engagement für die Ukraine. Auch das
  habe ich heute noch einmal unterstrichen. Ich will es hier nicht wiederholen, aber
  ich tue es dann doch: Die Ukraine verteidigt eben nicht nur ihre eigene Freiheit
  gegen die russische Aggression, sondern zugleich unsere, und damit dürfte dem Kreml
  langsam klar werden, dass Russland seine Kriegsziele nicht erreichen wird, sondern
  dass es jetzt Zeit wird, an den Verhandlungstisch zu kommen. Auch darüber habe ich
  mit Präsident Erdoğan gerade noch einmal ausführlich gesprochen. Wir haben uns auf
  deutsche Initiative hin schließlich verpflichtet, der Ukraine in den Jahren 2026
  und 2027 zusammen mit den europäischen Mitteln noch einmal insgesamt zweimal 70 Milliarden
  Euro zur Verfügung zu stellen. Das ist ein wichtiges Bekenntnis der europäischen
  Seite, dass wir eben noch mehr leisten wollen. Wir werden über Details schon am
  nächsten Montag in Paris in der sogenannten Koalition der Willigen sprechen. Deutschland
  trägt das Seine dazu bei. Wir sind mittlerweile der stärkste Unterstützer der Ukraine.
  Wir wollen damit den Krieg nicht befördern. Ich sage das auch noch einmal an alle
  nicht ganz unkritischen Bürgerinnen und Bürger in Deutschland: Wir tun dies nicht,
  um den Krieg zu befördern, sondern wir wollen ihn beenden, und wir wollen mit der
  notwendigen Hartnäckigkeit Präsident Putin an den Verhandlungstisch bringen. Deswegen
  war es heute wichtig, die transatlantische Einigkeit auszubauen, die uns beim G7
  -Treffen in Evian gelungen ist. Dort haben wir ja mit allen G7 -Partnern zusammen
  gefordert, Moskau müsse den Krieg beenden. Washington hat seitdem diesem Appell
  auch Taten folgen lassen, zum Beispiel, indem wichtige Ausnahmen von den Sanktionen
  ausgelaufen sind und nicht fortgesetzt werden. Das ist ein Fortschritt, den wir
  heute auch gemeinsam gewürdigt haben. Schließlich hat das Rahmenabkommen zwischen
  den Vereinigten Staaten und Iran in Ankara eine Rolle gespielt. Es ist jetzt die
  beste Chance, das iranische Atomprogramm dauerhaft zu beenden, die Straße von Hormus
  zu öffnen und neue Stabilität in den Nahen und Mittleren Osten zu bringen. Die Alliierten
  haben heute einvernehmlich deutlich gemacht: Wir werden nach Kräften helfen, diese
  Chance auch zu nutzen. Es war also alles in allem ein guter Tag hier in Ankara,
  der uns gemeinsam gelungen ist. Wir sind einen wichtigen Schritt auf dem Weg in
  die neue NATO vorangekommen. Ich will zusammenfassen: Die NATO ist mit dem heutigen
  Tag europäischer denn je, und doch bleibt sie transatlantisch fest verankert. Sie
  bleibt unerreicht stark, und vor allem: Sie bleibt einig. Lassen Sie mich abschließend
  vielleicht noch eine persönliche Beobachtung hinzufügen. Präsident Trump hat heute
  ausnahmslos über die gesamte Zeit an den Beratungen teilgenommen und ist auch die
  ganze Zeit im Sitzungssaal geblieben. Was mir erneut aufgefallen ist: Er hört auch
  den Vertretern kleinerer Mitgliedstaaten in der NATO aufmerksam zu, nimmt sehr intensiv
  wahr, was auch in kleineren Mitgliedstaaten geschieht und hat das mit einer großen
  Sympathie begleitet. In seinem Schluss statement kam der Satz vor, der mich persönlich
  etwas überrascht, aber auch sehr gefreut hat: There is a feeling of love in the
  air. Das ist ein Schlusssatz, mit dem man, glaube ich, einen solchen NATO -Gipfel,
  der auch unter medial so schwierigen Vorzeichen stand, gut abschließen kann. Ich
  fahre jedenfalls in dem sicheren Gefühl zurück nach Deutschland, dass wir einen
  großen Beitrag dafür geleistet haben, dass die NATO zusammenbleibt, dass sie stärker
  wird, dass sie europäischer wird und dass wir gemeinsam das tun, was wir uns vorgenommen
  haben, nämlich dem Frieden und der Freiheit in der Welt zu dienen. Frage: Herr Bundeskanzler,
  mit Spanien ist der US -Präsident … (ohne Mikrofon, akustisch unverständlich) umgegangen.
  Er hat das Land erneut scharf kritisiert und es unter anderem als furchtbaren Partner
  bezeichnet. Ist das für Sie ein Umgang … (ohne Mikrofon, akustisch unverständlich)
  Bundeskanzler Merz: Herr Kollege, ich kann nur das wiedergeben, was ich in der Sitzung
  selbst erlebt habe. Pedro Sánchez hat noch einmal dargelegt, dass die spanische
  Regierung jetzt wirklich größte Kraftanstrengungen unternimmt, die in Den Haag vereinbarten
  Ziele zu erreichen, und dass dies in der Sitzung auch auf große Zustimmung von Präsident
  Trump gestoßen ist. Das ist für mich der Maßstab des Umgangs, wie wir auch in diesen
  Gremien, wie wir in solchen Sitzungen miteinander und übereinander sprechen. Da
  kann ich nichts finden, was mir Anlass zur Kritik gäbe. Frage: Herr Bundeskanzler,
  … (ohne Mikrofon, akustisch unverständlich) hat sich der Präsident eben öffentlich
  offenbar etwas anders geäußert, als er das im NATO -Rat getan hat. Trübt das aus
  Ihrer Sicht das Bild der Einigkeit, das Sie hier … (ohne Mikrofon, akustisch unverständlich)
  aussenden wollen? Wie erklären Sie sich, dass er immer noch so kritisch über die
  NATO spricht, zum Beispiel auch, was die Finanzanstrengungen angeht, und sich öffentlich
  noch nicht so lobend geäußert hat … (ohne Mikrofon, akustisch unverständlich) Bundeskanzler
  Merz: Ich nehme ein differenziertes Bild wahr, auch in der öffentlichen Verlautbarung.
  Natürlich gibt es nach wie vor kritische Punkte, die er anspricht. Nach wie vor
  gibt es ein Ungleichgewicht zwischen den Verteidigungsanstrengungen der USA und
  denen der 31 übrigen Mitgliedstaaten der NATO . Aber er hat wirklich mehrfach anerkannt
  und mit großer Zustimmung begleitet, dass wir diese Anstrengungen unternehmen. Dass
  das Ganze natürlich spät kommt, viel früher hätte kommen müssen, dass auch frühere
  amerikanische Präsidenten bis zurück zu Barack Obama ‑ ‑ ‑ Selbst beide Bush , Bush
  Vater und Bush Sohn, haben das Thema des Burdensharings in der NATO angesprochen,
  ohne Erfolg. Dieser Präsident tut es jetzt auf eine andere Art. Aber das Ergebnis
  spricht für ihn. Wir alle tun mehr. Und noch einmal: Wir tun es nicht zum Gefallen
  einzelner Mitgliedstaaten der NATO , sondern wir tun es aus unserem eigenen Interesse. Vielleicht
  kann man es etwas salopper ausdrücken: Die Trittbrettfahrerei der Europäer ist jetzt
  halt zu Ende. Frage: Herr Bundeskanzler, eine Frage zu der Fähigkeitslücke, die
  schon vor zwei Jahren als eklatant beschrieben worden ist … (ohne Mikrofon, akustisch
  unverständlich) Da hat sich dann eine Gruppe von Staaten rund um Deutschland gebildet,
  die … (ohne Mikrofon, akustisch unverständlich) eigene Lösung entwickeln wollte.
  Damals vertraute man noch darauf, dass … (ohne Mikrofon, akustisch unverständlich)
  Tomahawk … (ohne Mikrofon, akustisch unverständlich) Jetzt ist es umso dringlicher.
  Die Briten haben heute Morgen angekündigt, dass … (ohne Mikrofon, akustisch unverständlich)
  versammeln wollten, die 50 Milliarden Dollar in den nächsten zehn Jahren zusagen,
  die jetzt investieren. Können Sie uns sagen, welches der deutsche Beitrag sein wird
  und wie Sie dieses Projekt sehen? Wie lange wird es dauern, bis diese Lücke gefüllt
  ist und die Europäer, in Anführungszeichen, über einen eigenen Tomahawk … (ohne
  Mikrofon, akustisch unverständlich) verfügen? Bundeskanzler Merz: Zunächst einmal:
  Wir haben ja schon entsprechende Waffen. Sie sind sehr kompliziert, und sie sind
  sehr teuer, aber wir haben sie schon. Wir haben sie nicht in ausreichendem Umfang.
  Dass das nachbeschafft werden muss und dass das auch mit anderen Systemen verbunden
  werden soll, ist in den letzten Wochen intensiv besprochen worden. Es hat auf britische
  und französische Initiative hin dazu auch eine entsprechende Verabredung gegeben.
  Das wird jetzt auf der Ebene der Verteidigungsminister und der Außenminister weiter
  ausgearbeitet. Wir sehen die Fähigkeitslücke, und wir werden sie so schnell wie
  möglich schließen. Darüber gibt es auch intensive Gespräche. Diese sind allerdings
  noch nicht abgeschlossen. Bundeskanzler Merz: Ich habe es eben mit dem Satz beantwortet:
  There is a feeling of love in the air. Ich würde es noch etwas präziser ausdrücken:
  Es ist nicht nur ein Gefühl der wirklichen Zuneigung und der gemeinsamen Verantwortung
  im Raum gewesen, es ist auch ein neues Gefühl der europäischen Verantwortung im
  Raum gewesen. Ich muss sagen, ich bin auch von den einzelnen Beiträgen der Kolleginnen
  und Kollegen aus den anderen europäischen Staaten wirklich tief beeindruckt. Ich
  bin auch die ganze Zeit im Saal geblieben und habe mir alle Beiträge angehört. Alle
  32 haben gesprochen. Ich bin wirklich tief beeindruckt davon, wie klar und deutlich
  dieses gemeinsame Verständnis zum Ausdruck kommt. Niemand, ganz gleich welcher Parteiengruppierung
  oder Familie er angehört – und es sind viele im Raum gewesen –, hat den grundsätzlichen
  Auftrag und die grundsätzliche Zusammengehörigkeit der NATO infrage gestellt. Dies
  an einem solchen Tag wie heute feststellen zu können, war nicht von Anfang an selbstverständlich.
  Natürlich haben auch Wortmeldungen und Wortbeiträge des einen oder anderen dazu
  beigetragen. Aber meine Erwartungen an diesen Gipfel in Ankara sind wirklich mehr
  als erfüllt worden. Ich sehe gerade auf der europäischen Seite ein neues Momentum.
  Ich darf das vielleicht auch einmal in aller Bescheidenheit sagen: Sicherlich ein
  Drittel der Sprecher hat die Rolle der Bundesregierung und die Rolle der Bundesrepublik
  Deutschland namentlich erwähnt. Das zeigt, dass unsere Bemühungen, auf der europäischen
  Seite der NATO zusammen mit Kanada jetzt hier einen neuen Geist der NATO Einzug
  halten zu lassen, wirklich erfolgreich sind. Wir werden daran weiterarbeiten müssen.
  Das ist mit einer Gipfelerklärung allein nicht getan. Aber die Substanz der NATO
  ist mit diesem Gipfel so gestärkt worden, wie wir es uns mit Worten im letzten Jahr
  in Den Haag gewünscht haben. Ich will auch noch mal ausdrücklich sagen: Die Verhandlungsführung
  von Mark Rutte als dem Generalsekretär der NATO ist wirklich außergewöhnlich erfolgreich
  und gut gewesen. Er ist in der Lage, die NATO zusammenzuhalten in einer sehr charmanten,
  sehr persönlichen und engagierten Art. Der Generalsekretär, den wir zurzeit haben,
  ist wirklich der Beste seiner Zeit. Das alles hat diesen Erfolg möglich gemacht.
  Frage: Sie saßen gestern Abend mit Trump am Tisch zusammen, als Sie sich unterhalten
  haben. Kam da irgendwann in dem Gespräch auch zur Sprache, wie ernst er den angekündigten
  Truppenabzug von 5.000 Soldaten aus Deutschland meint? Sind Sie sich vielleicht
  sogar sicherer geworden, dass er es nicht so ernst meint? Bundeskanzler Merz: Dieses
  Thema hat weder gestern Abend noch heute im Verlauf des Tages irgendeine Rolle gespielt.
  Frage: Herr Bundeskanzler, der US -Präsident hat ja auch wieder das Thema Grönland
  erwähnt. Das war nicht im Raum – das haben wir gehört –, aber draußen vor der Tür.
  Das hat zumindest die dänische Ministerpräsidentin doch ernst genommen. Sie hat
  darauf reagiert und gesagt, Dänemark würde dann Grönland verteidigen. Wäre das nicht
  in Ihren Augen, wenn das so käme, nach Ihrem Verständnis, ein Bündnisfall für die
  NATO nach Artikel 5? Noch einmal ganz kurz zum U -Boot- Deal gefragt: Hat der US
  -Präsident Sie irgendwie darauf angesprochen? Ich meine, das muss ihn doch ein bisschen
  wurmen, wenn Deutschland so einen großen U -Boot- Deal mit Kanada macht, auf das
  er ja auch schon einmal Anspruch erhoben hat. Möglicherweise kann er jetzt keine
  Sachen mehr an die USA ... ( ohne Mikrofon, akustisch unverständlich ). Bundeskanzler
  Merz: Wir haben nach der Diskussion im Januar, die in der Davos-Woche stattgefunden
  hat, unsere Position zu diesem Thema sehr klar benannt. Das gilt nicht nur für die
  europäischen NATO -Partner, das gilt auch für die gesamte Europäische Union. Es
  gibt seitdem einen Prozess zwischen den USA und der dänischen Regierung. An diesem
  Prozess wird nichts geändert. Wir haben auch aus der amerikanischen Delegation nichts
  Gegenteiliges gehört. Zu den U -Booten: Das hat Mark Carney angesprochen, voll des
  Lobes in der großen Runde. Trump hat das mit erkennbarem Wohlwollen zur Kenntnis
  genommen. Er hat an keiner Stelle da Kritik geübt. Ich glaube, die Kritik wäre auch
  überflüssig. Denn, ich sage mal, dass wir uns mit den Kanadiern und den Norwegern
  zusammen in diesem Bereich des NATO -Gebietes, das zunehmend das kritische NATO
  -Gebiet wird, gemeinsam besser schützen, das kann nur im Interesse der Vereinigten
  Staaten von Amerika sein. Wir haben eben mit dem Unternehmen thyssenkrupp Marine
  Systems ein Unternehmen, das in der Lage ist, wirklich die besten U -Boote der Welt
  zu bauen – und das findet sicherlich auch die Anerkennung der amerikanischen Regierung.
  Frage: Zwei Fragen. Erstens. Sie haben gerade von „ love in the air “ gesprochen.
  Wie viel „ love in the air “ ist denn beim Thema Tomahawk gewesen? Das war ja ein
  bisschen offen, ob das heute noch einmal besprochen wird oder nicht. ... ( ohne
  Mikrofon, akustisch unverständlich ) Da hat der Verteidigungsminister gesagt, es
  sei ein Prozess, aber man habe noch kein Ergebnis. Zusatzfrage: Eine zweite Frage:
  Mich würde einmal interessieren, wie Sie das denn deuten, wenn der amerikanische
  Präsident öffentlich über Grönland spricht und Spanien kritisiert. Alles, was wir
  von Ihnen hören, ist, wie toll und einig der Geist von Ankara im Gespräch untereinander
  gewesen ist. Wie erklären Sie sich diese sehr kontroverse und ambivalente Verhaltensweise?
  Bundeskanzler Merz: Zunächst einmal zum Thema Tomahawk : Da sind die Gespräche noch
  nicht abgeschlossen. Deswegen kann ich abschließend nichts dazu sagen. Aber diese
  Gespräche werden geführt. Wir wissen seit Trump eins, dass er sehr häufig mit massivem
  Auftritt Druck aufbaut. Ich will es noch einmal von der konstruktiven Seite aus
  sagen: Die letzten amerikanischen Präsidenten, die uns freundlich gebeten haben,
  macht doch jetzt endlich mal ein bisschen mehr für eure eigene Verteidigung, sind
  überall in Europa auf taube Ohren gestoßen. Jetzt kommen zwei Ereignisse zusammen:
  Das ist der Krieg in der Ukraine und das ist dieser amerikanische Präsident, der
  einmal unfreundlich sagt, es reicht. Ich kann ihm das nicht verübeln. Wenn Sie alleine
  mal die Zahlen sehen, die die Amerikaner für die NATO ausgeben und die wir für die
  NATO ausgeben. Ein Verhältnis von 80 zu 20 – 80 Amerika, 20 Europa, der Rest der
  NATO – ist inakzeptabel. Das war immer inakzeptabel. Jetzt sagt uns ein amerikanischer
  Präsident einmal etwas unfreundlicher: Freunde, es reicht. Jetzt müsst ihr mal ein
  bisschen mehr tun. So, wir machen jetzt mehr, und wir hören von ihm sehr große Zustimmung.
  Es gab sehr viel Zustimmung auch im Raum eben. Dass natürlich immer noch einiges
  nachgeholt werden muss, dass wir immer noch ein bisschen mehr tun müssen und wir
  immer noch einen Zeitplan einhalten müssen, den wir in Den Haag verabredet haben,
  das ist so und gehört dazu. Ich nehme das jedenfalls als sehr konstruktiv wahr,
  und es führt ja auch zu Ergebnissen. So, und wenn man Trump kennt und weiß, wie
  er spricht und wie er arbeitet, dann muss ich sagen: Ich kann damit gut umgehen,
  und ich kann mit dem Ergebnis sogar sehr, sehr gut leben, weil es ein besseres Ergebnis
  ist als das, das wir in den letzten Jahrzehnten erreicht haben. Frage: Herr Bundeskanzler,
  Sie haben ja gerade die 125 Milliarden Euro erwähnt, die die Bundesregierung in
  diesem Jahr für Verteidigung ausgibt. Sie haben die deutsche Führungsrolle, die
  hier gelobt wurde, und auch die kritischen Stimmen in Deutschland erwähnt. Jetzt
  sind Sie ja morgen im Bundestag. Es gibt einige, die sagen: Beim Elterngeld, bei
  der Gesetzlichen Krankenversicherung, also bei den ganzen innenpolitischen Themen
  Geld zu sparen und dann aber Geld für die Ukraine und für Verteidigung auszugeben,
  das finde ich nicht so gut. Was sagen Sie denen? Bundeskanzler Merz: Frau Kollegin,
  ich werde das morgen aufgreifen und auch noch einmal begründen, warum das aus meiner
  Sicht und auch aus der Sicht der Bundesregierung richtig ist, dass wir das jetzt
  tun. Es geht jetzt wirklich ernsthaft um die Verteidigung unserer Freiheit, des
  Friedens auf dem europäischen Kontinent und des Wohlstandes, den wir uns erarbeitet
  haben. Vielleicht haben viele von uns noch nicht so richtig – ich gebe zu, mir fällt
  es selber auch schwer – verinnerlicht, wie bedroht nach 80 Jahren Frieden und Freiheit
  in Europa genau dies jetzt ist. Ich werde versuchen, noch einmal darzulegen, dass
  der beste Wohlfahrtsstaat nichts taugt, wenn die Menschen nicht in Frieden und in
  Freiheit leben können. Ich habe das immer gesagt, auch schon in meiner ersten Regierungserklärung.
  Priorität für uns ist angesichts dieser Lage die Bewahrung der Freiheit und des
  Friedens auf dem Teil des Kontinents, auf dem wir leben und die Wiederherstellung
  des Friedens und der Freiheit in dem Teil, in dem sie zurzeit in Frage gestellt
  wird. Prioritäten zu setzen heißt: Bestimmte Dinge sind jetzt besonders wichtig,
  und andere Dinge müssen leider dahinter zurückstehen. Ich habe übrigens gerade Präsident
  Erdoğan in dem Gespräch gesagt: Auch deshalb, weil es unsere Gesellschaft mittlerweile
  sehr beschwert, nicht nur ökonomisch, sondern auch gesellschaftspolitisch, sollten
  wir alle Bemühungen unternehmen, die in unseren Kräften stehen, auch er, um diesen
  Krieg zu beenden. Deswegen sind wir ja so daran interessiert, Formate zu finden,
  Diskussionen zu haben, Wege zu finden, wie wir einen Beitrag von uns leisten können,
  diesen Krieg zu beenden. Dieser Krieg muss enden. Dann werden wir unsere Verteidigungsanstrengungen
  trotzdem auf Dauer aufrechterhalten müssen. Aber wir können dann wenigstens die
  Unterstützung der Ukraine in eine wirtschaftliche Zusammenarbeit mit der Ukraine
  überführen. Dann hätten wir auch ökonomisch wieder größere Freiräume. Aber das ist
  die Reihenfolge. Frage: Herr Bundeskanzler, danke für das Briefing. Es gibt seit
  Jahren Diskussionen in der NATO im Prinzip über eine Osterweiterung der NATO - Pipeline
  , des NATO - Pipeline systems zur Ostflanke. Jetzt hat der Generalsekretär etwas
  kryptisch davon gesprochen, dass man 27 Milliarden Euro für Investitionen in eine
  Modernisierung der Treibstoffinfrastruktur zur Seite gelegt habe. So hat er es,
  glaube ich, gesagt. Ist das jetzt ein Rahmenabkommen zur Verlängerung der Pipeline
  nach Osten, oder was bedeutet das? Bundeskanzler Merz: Richtig ist jedenfalls, dass
  die NATO -Streitkräfte – wir sind im sogenannten Operationsplan Deutschland ja auch
  dabei, uns mit diesen Themen innenpolitisch zu beschäftigen – Infrastruktur und
  Versorgung brauchen. Dazu gehört natürlich auch die Versorgung mit Energie, mit
  Sprit, mit Diesel, mit Benzin, mit Jetfuel . Darüber, wie das organisiert werden
  kann, sprechen wir schon seit geraumer Zeit. Das hat hier am Rande des Gipfels eine
  Rolle gespielt. Aber dazu gibt es keine finalen Entscheidungen, sondern fortgesetzte
  Diskussionen. Die Außenminister und die Verteidigungsminister haben einfach die
  Präsenz hier, in Ankara, genutzt, um diese Diskussion auch weiterhin fortzuführen.
  Aber soweit ich es bis jetzt sehe, gibt es keine finalen Entscheidungen. Frage:
  Herr Bundeskanzler, der US -Präsident hat ja auch angekündigt, dass er hart gegen
  Iran … (ohne Mikrofon; akustisch unverständlich) . Was denken Sie sich dabei, wenn
  Sie das hören? Unterstützen Sie das grundsätzlich in Anbetracht der Verletzung der
  … (ohne Mikrofon; akustisch unverständlich) von Iraner Seite aus auch? Was sagt
  man ihm eigentlich an solch einem Tag, während die Position der NATO ist, dass es
  etwas ist, das uns nichts angeht, seine Position aber ist „Ich wurde dabei alleingelassen“?
  Bundeskanzler Merz: Es hat in den Gesprächen sowohl gestern Abend als auch im Laufe
  des heutigen Tages natürlich eine Rolle gespielt. Wir haben gestern Abend ‑ ‑ ‑
  Ich will die Vertraulichkeit des Tischgespräches nicht verletzen. Aber er hat auch
  noch einmal versucht, es von seiner Seite aus zu erläutern. Wir haben ihm aus der
  europäischen Sicht heraus alle gesagt, dass es trotzdem jetzt eine belastbare und
  dauerhafte Vereinbarung mit dem Iran geben muss, die die Straße von Hormus dauerhaft,
  ohne irgendwelche Zölle oder irgendwelche Gebühren öffnet, und dass es vor allem
  zu einem Abkommen über das Atomprogramm des Iran kommen muss. Er kam gestern Abend
  beim Abendessen hinein und hat von dem Befehl berichtet, den er gerade für die letzte
  Nacht gegeben hatte, der dann auch ausgeführt worden ist. Wir haben ihm alle gesagt:
  Wir sollten trotzdem alles tun, auch wir, um hierbei zu einem Abkommen mit dem Iran
  zu kommen, das trägt und das in der Region vor allen Dingen auf Dauer die Waffen
  schweigen lässt. Aber die Verletzung des Abkommens geht ja nun eindeutig auf den
  Iran zurück. Da haben die amerikanischen Streitkräfte auf seinen Befehl hin hart
  zurückgeschlagen. Das ist etwas, was ich in meinem Redebeitrag heute auch noch einmal
  gesagt habe: Ja, es ist gerechtfertigt. Aber am Ende muss ein Abkommen mit dem Iran
  stehen, das das Atomprogramm auf Dauer beendet und die Straße von Hormus auf Dauer
  wieder öffnet. Frage: Die Türkei verfügt ja über die zweitgrößte Armee der NATO
  und nimmt aufgrund ihrer geografischen Lage ja eine Schlüsselrolle an der Südostflanke
  des Bündnisses ein. Dazu wollte ich Sie fragen: Welche konkreten Beiträge der Türkei
  werden Ihrer Meinung nach zu wenig gewürdigt? Haben Sie hierfür über eine engere
  Zusammenarbeit gesprochen? Bundeskanzler Merz: Zunächst einmal: Ich habe Präsident
  Erdoğan in unserem Gespräch eben noch einmal gesagt, dass wir allein durch die geostrategische
  Lage der Türkei ein hohes Interesse daran haben, mit diesem NATO -Partner eng zusammenzuarbeiten.
  Das tun wir auch. Wir planen auch die nächsten deutsch-türkischen Regierungskonsultationen.
  Dabei ist Deutschland dann der Gastgeber. Wir sehen auch den Erfolg, der zum Beispiel
  in Syrien möglich wurde. Ohne einen Beitrag des türkischen Staatspräsidenten wäre
  dies wahrscheinlich nicht möglich gewesen. Insofern trägt die Türkei hierbei zur
  Stabilisierung der Region enorm bei. Ich habe Präsident Erdoğan allerdings auch
  gebeten, seine Möglichkeiten zu nutzen und auch mit uns abzustimmen, die etwa im
  Hinblick auf Russland, auf Putin und auf die Beendigung des Ukrainekrieges gerichtet
  sein könnten. Insofern war es erstens ein sehr gutes Gespräch, erneut; wir haben
  uns schon mehrfach getroffen. Ich habe vor einigen Wochen ja auch einen offiziellen
  Besuch in der Türkei gemacht. Zum Zweiten: Ich weiß die Rolle der Türkei einzuschätzen,
  außenpolitisch, sicherheitspolitisch. Sie ist für uns ein wichtiger strategischer
  Bündnispartner.'
