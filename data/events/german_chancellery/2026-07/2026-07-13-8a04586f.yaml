title: Rede von Bundeskanzler Merz anlässlich der Eröffnung der Adenauer School of
  Government Unser Land ist das Ergebnis von vielen guten Entscheidungen
text: 'Bundeskanzler Merz warb in seiner Eröffnungsrede für mehr strategisches Denken.
  „Wir stehen wieder an einem historischen Wendepunkt.“ Mit dieser Botschaft eröffnete
  Bundeskanzler Friedrich Merz seine Rede zur Eröffnung der Adenauer School of Government
  an der Universität zu Köln. Die neue Fakultät soll künftige Führungskräfte auf die
  Herausforderungen einer zunehmend komplexen Welt vorbereiten und strategisches Denken
  sowie gute Regierungsführung stärken. Mit der Namenswahl soll Konrad Adenauer als
  historische Persönlichkeit gewürdigt werden. Als erster Bundeskanzler der Bundesrepublik
  steht er für den Aufbau demokratischer Institutionen nach 1945, für die Westbindung
  Deutschlands und für die Überzeugung, dass liberale und funktionierende Demokratien
  starke, handlungsfähige und verantwortungsvoll geführte Institutionen brauchen.
  „Unser Land, wie es sich heute darstellt – auch daran erinnert uns die Person von
  Konrad Adenauer –, das viele Gute in unserem Land, ist das Ergebnis von vielen guten
  Entscheidungen, von vielen gemeinsamen Kraftanstrengungen. Wenn wir in diesem Sinn
  den Weg weitergehen, dann liegen die besten Jahre nicht hinter uns; dann liegen
  sehr gute Jahre vor uns,“ so der Kanzler. Die Adenauer School of Government wurde
  2025 als zentrale wissenschaftliche Einrichtung der Universität zu Köln gegründet.
  Sie will sich als überparteiliches Forschungs- und Bildungszentrum für Public Governance
  etablieren und zukünftige Entscheidungsträgerinnen und Entscheidungsträger ausbilden.
  Ziel ist es, wissenschaftliche Auseinandersetzung mit den Herausforderungen guter
  Regierungsführung in Zeiten fundamentaler globaler Veränderungen zu verbinden. Sehr
  geehrter Herr Rektor der Universität zu Köln, sehr geehrte Damen und Herren Professorinnen
  und Professoren, liebe Studierende der Universität zu Köln, herzlichen Dank für
  den freundlichen Empfang heute Morgen hier zu dieser festlichen Eröffnung der neuen
  Fakultät und dieses Instituts an Ihrer Universität an Sie alle! Ich freue mich sehr,
  zu diesem Anlass heute Mittag bei Ihnen zu sein und zu Ihnen sprechen zu dürfen.
  Ich werde nicht anderthalb Stunden sprechen, wie es Konrad Adenauer vor genau 80 Jahren
  bei seiner berühmten Kölner Universitätsrede getan hat, und überlasse es Ihnen,
  ob Sie darüber erleichtert oder dadurch beschwert sind. Ich spreche kürzer, weil
  ich gleich gerne noch mit Ihnen in den direkten Dialog gehen möchte – aber nicht,
  meine Damen und Herren, weil es weniger zu sagen gäbe als 1946. Nein, die Herausforderungen,
  vor denen wir heute als Land und als Gesellschaft, vor denen wir in Deutschland
  und in Europa stehen, sind in vielerlei Hinsicht wieder so groß, so grundsätzlich
  und so zahlreich, wie sie es zur Zeit der Gründung der Bundesrepublik Deutschland
  auch waren. Sie alle wissen es: Wir haben es mit geopolitischen und auch geoökonomischen
  Machtverschiebungen zu tun, die wir so nicht mehr für möglich gehalten hätten. Wir
  haben es mit immensen technologischen Entwicklungssprüngen zu tun. Sie haben, Herr
  Professor Ockenfels, die künstliche Intelligenz angesprochen, die wir vermutlich
  in ihren ganzen Auswirkungen und in ihrer Dimension immer noch nicht wirklich einschätzen
  können. Wir haben es mit dem Klimawandel zu tun. Und wir haben es schließlich mit
  demografischen Umbrüchen in unserer Gesellschaft zu tun. Ich darf mir an dieser
  Stelle ausnahmsweise das Pathos der bundesrepublikanischen Anfangsjahre einmal ausleihen.
  Wir stehen wieder an einem historischen Wendepunkt – als Land, aber auch im freiheitlichen
  Europa. Unsere Entscheidungen heute werden im Guten oder im Schlechten folgenreicher
  sein, als dies zu Zeiten der historischen Ruhe der Fall war. Es kommt darum heute
  und in den nächsten Jahren sehr viel mehr auf gute Governance an – darauf, dass
  es uns und wie es uns gelingt, auf Basis unserer demokratischen Prozesse möglichst
  gerechte, möglichst effektive, möglichst effiziente und mutige politische Lösungen
  zu erarbeiten und dann auch wirklich umzusetzen. Es ist klar, dass es dafür ein
  Leitbild braucht, eine Idee, wo es hingehen soll. Aber es braucht ebenso strategische
  Vorausschau. Es braucht strategische Urteilskraft, die Fähigkeit, in Szenarien zu
  denken, komplexe Szenarien abzuwägen, um auf genau dieser Grundlage dann vorausschauende
  Entscheidungen zu treffen, mit denen wir die ‑ ja, es ist nicht mehr und nicht weniger
  – Neuordnung der Welt, die sich gerade vollzieht, selbstbewusst mitgestalten. Meine
  Damen und Herren, diesen – lassen Sie mich es so sagen – strategischen Arbeitsmuskel
  haben wir in unserem Land für lange Zeit nicht stark genug trainiert, um es vorsichtig
  zu formulieren. Das war scheinbar auch lange Zeit gar nicht nötig: in der Zeit der
  sogenannten Friedensdividende, der weitgehend regelbasierten Weltordnung, der offenen
  Märkte, denen sich die meisten verpflichtet fühlten. Wir haben in Deutschland nicht
  in dem Sinne eine sicherheitspolitische Kultur etabliert, wie sie zum Beispiel unsere
  französischen und britischen Nachbarn seit Jahrhunderten pflegen. Wir haben keine
  Tradition der großen Strategieschulen, weder im zivilen noch im militärischen Bereich.
  Wir haben auch keine Tradition ‑ bis auf wenige Ausnahmen, die sich in den letzten
  Jahren herausgebildet haben – der sogenannten Governance Schools . Es ist also allerhöchste
  Zeit, dass wir in diesem Bereich jetzt endlich aufholen, dass wir beginnen, strategischer
  zu denken, dass wir Entscheidungsträgerinnen und Entscheidungsträger, wie Sie hier
  heute zusammen sind, ausbilden, die strategisch handlungsfähig sind in einer Welt,
  die immer noch komplexer und immer noch schneller wird. Meine Damen und Herren,
  diese Komplexitätsdiagnose ist selbst nichts Neues; das wissen Sie. Auch die Geschwindigkeitsdiagnose
  ist es nicht; das wissen Sie auch. Moderne Gesellschaften sind geradezu per definitionem
  komplex, arbeitsteilig und mit technologischer Disruption konfrontiert. Neu ist,
  jedenfalls im Maßstab der letzten 30 Jahre, die machtpolitische Komplexität, mit
  der wir es zu tun haben. Neu ist auch, dass wir mit unseren Entscheidungen, ob wir
  das nun wollen oder nicht, Teil eines neuen Systemwettbewerbs sind. Wir haben uns
  als freiheitliche Gesellschaften nach außen und auch nach innen neu zu beweisen.
  Wir haben erneut zu beweisen, dass eine Gesellschaft, gegründet im Geist der Freiheit
  und für die Freiheit, eine solche Gesellschaft, die wir „liberale Demokratie“ nennen,
  auch wehrhaft sein kann, resilient sein kann, lernfähig sein kann, innovativ sein
  kann und letztendlich generationengerecht ist, Wohlstand schafft, Zusammenhalt ermöglicht
  und selbstbewusst nach innen und außen für ihre Werte auch einsteht. Nach dem sogenannten
  Kalten Krieg galt die Überlegenheit des freiheitlichen Gedankens geradezu als historisch
  belegt. Heute mehren sich die Zweifel daran. Statt – wie der immer wieder und häufig
  zitierte Francis Fukuyama – vom „Ende der Geschichte“ sprechen heute manche vom
  bevorstehenden Jahrhundert der Autokratien. Wir alle kennen den bisweilen geradezu
  ängstlichen Verweis auf China. Ob nun aus diesen Prognosen Wirklichkeit wird, hängt
  ganz wesentlich an den Entscheidungen, die wir heute und in den nächsten Jahren
  selbst treffen. Ich bin sehr zuversichtlich, meine Damen und Herren; sonst stände
  ich hier nicht. Ich bin wirklich zuversichtlich, dass wir diese Entscheidungen gemeinsam
  gut und zukunftsweisend treffen können und auch werden. Die Voraussetzung dafür
  ist allerdings, dass wir das Leitbild, dass wir den normativen Maßstab für gute
  Governance eben nicht aus dem Auge verlieren, nämlich die Wahrung von Freiheit und
  Frieden in Deutschland und in Europa. Politisch nennen wir diese unsere Freiheitsordnung
  seit langer Zeit „liberale Demokratie“. Gute Governance folgt in diesem Verständnis
  also immer demokratischen Prinzipien, umfasst Rechenschaft, Transparenz, Beteiligung,
  Gemeinwohlorientierung und auch das Werben um Konsens, das Ringen um Kompromisse.
  Ich sage das hier mit dieser Deutlichkeit, meine Damen und Herren, weil die Stimmen
  lauter werden, auch hier bei uns im Land, die die Problemlösungsfähigkeit und die
  Steuerungsfähigkeit unserer Demokratie mittlerweile ganz grundsätzlich infrage stellen.
  Ich spreche dabei nicht von berechtigter Kritik an mangelnder Effizienz, an der
  Langsamkeit und an Regulierungswut von manchen staatlichen oder europäischen Institutionen.
  Ich spreche von Stimmen, die im ganz Grundsätzlichen demokratische Prozesse eher
  als Störfaktor betrachten, die Effizienz und Demokratie in einen Widerspruch zueinander
  setzen, die das Loblied auf das sogenannte Durchregieren mit der harten Hand singen –
  oder das Loblied der Führerdemokratie, das einen homogenen Volkswillen behauptet,
  den es nach unserem Verständnis in einer freiheitlichen Demokratie nicht geben kann.
  Ich spreche also von Stimmen, die sehr laut anzweifeln, ob die ganzen Aushandlungsprozesse,
  die demokratisches Ringen ausmachen, überhaupt noch der Mühe wert sind. Ja, diese
  Aushandlungsprozesse machen Mühe. Sie bedeuten Anstrengung im täglichen Leben. Aber,
  meine Damen und Herren, die beste Antwort auf dieses ganz grundsätzliche Infragestellen
  unserer freiheitlichen Demokratie ist eine sehr praktische Antwort. Die beste Antwort
  darauf sind zukunftsweisende politische Entscheidungen. Daran arbeiten wir in der
  Bundesregierung. Daran arbeiten wir gemeinsam mit den Ländern. Daran arbeiten wir
  auch gemeinsam – und ich tue es mit besonderer innerer Überzeugung – mit unseren
  europäischen Partnern. Ich möchte heute sagen – auch mit, wenn Sie mir das erlauben,
  einem gewissen Stolz –: Wir haben insbesondere in den letzten Wochen gezeigt, dass
  wir in der sogenannten politischen Mitte zu umfassenden und guten Entscheidungen
  kommen können. Es braucht aber hin und wieder – und damit bin ich wieder bei Ihnen –
  auch eine grundsätzliche Selbstvergewisserung. Das wusste übrigens niemand besser
  als schon Konrad Adenauer. Lassen Sie mich darum die Gelegenheit heute nutzen, es
  einmal auch sehr grundsätzlich zu sagen: Aushandlungsprozesse, Interessenausgleich,
  Kompromissfindung – das ist Freiheit in der Praxis, und das ist eine freiheitliche
  Gesellschaft, nichts anderes. Unsere Demokratie legitimiert sich eben nicht zuerst
  über den Output, sondern über den Prozess der Entscheidungsfindung. Warum ist das
  so? Weil wir davon überzeugt sind, dass freie Menschen ein Anrecht darauf haben,
  ihr Schicksal selbst zu bestimmen, und sie darum nie und niemals nur Verfügungsmasse
  von staatlicher Entscheidung sein dürfen. Um es aus diesem Anlass heute erneut mit
  Konrad Adenauer zu sagen, mit Worten aus seiner schon erwähnten Kölner Universitätsrede:
  „Wer wirklich demokratisch denkt, muß Achtung vor dem anderen, vor dessen ehrlichen
  Wollen und Streben haben.“ Meine Damen und Herren, Regierung und Opposition heißt
  nicht, dass die einen recht haben und die anderen unrecht. Es kann auch umgekehrt
  sein. Aber genau darum ringen wir in einer demokratischen parlamentarischen Ordnung.
  Das ist der normative Kern. Das ist die DNA unserer Demokratie und auch die DNA
  der Bundesrepublik Deutschland. Wir sind aber zugleich davon überzeugt, dass die
  Ergebnisse des Regierens sogar besser werden, wenn eine Vielzahl von Perspektiven
  in den Entscheidungsprozess einfließt, und zwar besser im doppelten Sinne: gerechter,
  sodass sie unsere Gesellschaft stabilisieren, und außerdem kreativer und innovativer,
  weil ihnen ein Ideenwettbewerb vorausgeht und weil wir die Möglichkeit zur Selbstkorrektur
  sozusagen institutionalisiert haben. Das sind die Potenziale unseres demokratischen
  Systems. Aber Potenziale müssen auch genutzt werden. Ich wiederhole mich: Jetzt
  ist die Stunde, wo wir unsere Fähigkeit zur Selbstkorrektur unter Beweis stellen
  müssen. Jetzt ist die Stunde, wo wir unsere Fähigkeit zur nachhaltigen Problemlösung
  unter Beweis stellen müssen. – Ich kann für die deutsche Bundesregierung sagen,
  dass wir genau das als unsere Aufgabenbeschreibung verstehen. Der Staat kann diesen
  Beweis übrigens nicht allein erbringen. Aber zu einem wesentlichen Teil kann er
  das tun, etwa in Form der grundlegenden Staatsmodernisierung, in Form der grundlegenden
  Reform auch unserer sozialen Sicherungssysteme, nicht zuletzt angesichts der Demografie,
  in Form der Digitalisierung und Modernisierung unseres Staates, in Form der Erneuerung
  unserer Infrastruktur, gerade auch unserer kritischen Infrastruktur, in Form der
  Befähigung unserer Streitkräfte. In allen diesen Bereichen gab und gibt es den Bedarf
  der Kurskorrektur, der neuen Lösungen. Und in allen diesen Bereichen haben wir in
  der Bundesregierung im vergangenen Jahr genau diese Reformen aus diesem Grund ausgearbeitet,
  auf den Weg gebracht, zu einem nicht geringen Teil schon umgesetzt. Wir sind im
  Augenblick dabei, meine Damen und Herren, zentrale Fundamente, Teile des Fundaments
  unserer Bundesrepublik Deutschland, umfangreich zu erneuern, damit sie Freiheitsentfaltung
  auch derjenigen in unserem Land tragen und fördern, die jetzt heranwachsen, die
  jetzt jung sind, die in den nächsten Jahren geboren werden, damit unsere Wirtschaft
  ihre Innovationskraft wieder entfalten kann, damit wir unserer Verantwortung für
  den Frieden und die Freiheit in Europa wirklich nachkommen können. Dieser Reformprozess
  ist nicht abgeschlossen. Ich gehe so weit, zu sagen: Er wird nie abgeschlossen sein. ‑
  Aber auch darüber, wie er auf allen Ebenen unseres Landes ankommen und weitergehen
  kann, werden Sie in der Adenauer School of Government gemeinsam nachdenken. Unsere
  demokratische Praxis – damit meine ich nicht nur die Regierungspraxis, sondern die
  Praxis der Koordination und Steuerung in allen Teilbereichen unserer Gesellschaft –
  wird in Prozess und Ergebnis besser werden, wenn es Orte und Institutionen der Reflexion
  über politische Entscheidungsfindungsprozesse gibt. Hier entsteht so ein Ort. Hier
  entsteht eine solche Institution. Hier entsteht eine Ausbildungsstätte für zukünftige
  Entscheidungsträgerinnen und Entscheidungsträger im demokratischen Staat der Bundesrepublik
  Deutschland, für strategische Urteilskraft. Denken Sie also auch über die Grundfragen
  nach: Wie verbinden wir demokratische Prozesse und Verfahren noch besser mit Effizienz?
  Wo sind Ansatzpunkte, um ein halbwegs gemeinsames Verständnis von Problemlagen in
  der Gesellschaft gemeinsam zu definieren? Das sind keine Fragen, auf die wir abschließende
  Antworten in der Theorie finden werden. Meine Damen und Herren, trotzdem müssen
  wir uns in der Praxis des Regierens den Herausforderungen und Kontroversen stellen,
  die in ihnen zum Ausdruck kommen. Ich nenne an dieser Stelle nur zwei konkrete Beispiele,
  mit denen ich sagen möchte: Hier ist uns in der Bundesregierung Good Governance
  schon einmal ein bisschen gelungen. Da ist zum einen der Entwurf der Rentenreform.
  Ja, daran ist viel Kritik geübt worden – am Prozess, nicht am Ergebnis, sondern
  am Prozess, am Verfahren. Wie Sie wissen, haben wir es mit einem sehr umfassenden
  Reformpaket zu tun, das von einer Kommission – so hat es die Bundesarbeitsministerin
  genannt – als Gesamtkunstwerk erarbeitet worden ist. Die Kommission war ein Schlüssel
  zum Erfolg, und zwar sowohl mit Blick auf die Ergebnisse als auch mit Blick auf
  den demokratischen Prozess. Wir haben es nämlich ermöglicht, dass hinter verschlossenen
  Türen unter Hinzuziehung des besten Wissens aus unserem Land ein Konzept für einen
  ganzheitlichen Entwurf erarbeitet wurde. Genauso haben sie dort die Ruhe für eine
  offene und ehrliche Diskussion gehabt. Ein zweites Beispiel: Wir haben sehr früh
  in dieser Wahlperiode einen Nationalen Sicherheitsrat im Bundeskanzleramt eingerichtet,
  um genau darin besser zu werden, worin wir dringend besser werden müssen, nämlich
  in der strategischen Vorausschau, in der Koordination der Institutionen und Behörden,
  die mit der Sicherheit – im umfassenden Sinne des Wortes – unseres Landes und seiner
  Bevölkerung befasst sind. Wir haben mit dem Sicherheitsrat nun ein strategisches
  Entscheidungs- und Koordinierungsgremium für die Bundesregierung, aber auch zusammen
  mit den Ländern, mit den Rettungsorganisationen und, wenn notwendig, auch mit den
  Städten und Gemeinden. Das erlaubt es uns, viel flexibler und vorausschauender und
  vor allem schneller auf Risiken und konkrete Krisen zu reagieren, als dies bisher
  möglich war, nämlich aufgrund dieses institutionellen Designs. Meine Damen und Herren,
  über die Einrichtung eines solchen Sicherheitsrates ist in Deutschland über 30 Jahre
  diskutiert worden. Wir haben ihn in wenigen Monaten in der Bundesregierung geschaffen.
  Ich habe für die von mir geführte Bundesregierung den Anspruch, dass wir uns mit
  entsprechender Zielstrebigkeit auch der anderen Herausforderungen annehmen, vor
  denen wir stehen, dass wir ihnen mit Mut und mit Umsicht zugleich begegnen. Denn
  es sind ‑ hier wiederhole ich mich ‑ wirklich historische Zeiten eines Umbruchs.
  Lassen Sie mich in diesem Sinne noch ein weiteres Wort von Konrad Adenauer nennen,
  das in diesen Tagen nun einfach richtig ist. Es stammt aus Adenauers Regierungserklärung
  von 1954. Ich zitiere: „Seien wir uns ‑ und ich richte diese Worte weit über diesen
  Saal hinaus an alle Menschen im freien Europa, die guten Willens sind – des Ernstes
  dieser Zeit bewußt und zeigen wir uns ihren Erfordernissen gewachsen, auf daß spätere
  Generationen uns nicht als schwächlich und leichtfertig verurteilen.“ Meine Damen
  und Herren, diese von Konrad Adenauer 1954 genannten jüngeren Generationen sind
  heute wir, sowohl die Älteren als auch die Jüngeren hier im Saal. Uns ist viel Gutes
  aus dieser Zeit vererbt worden. Es ist geradezu ein historisch beispielloses Maß
  an Freiheit, Frieden und Sicherheit. Jetzt ist es an uns, an Ihnen, an uns allen,
  mit diesem Erbe pfleglich umzugehen. Setzen wir nicht leichtfertig aufs Spiel, was
  wir an diesem wunderbaren Land, und vor allem, was wir am geeinten Europa miteinander
  haben! Dafür brauchen wir den gebotenen Ernst. Dafür brauchen wir aber auch Freude
  an der Gestaltung, der politischen, der gesellschaftspolitischen Gestaltung. Wir
  brauchen Freude an der Freiheit, die wir haben. Wir brauchen Sie, die Studentinnen
  und Studenten. Wir brauchen Initiativen und Ausbildungsorte wie diesen hier, Räume
  des Austausches wie diesen hier, in denen Exzellenz aus ganz unterschiedlichen Fachrichtungen
  zusammenkommt. Wir brauchen engagierte Unternehmerinnen und Unternehmer, engagierte
  Politikerinnen und Politiker und vor allem engagierte Bürgerinnen und Bürger in
  den Städten, in den Gemeinden, in den Ländern, im Bund, in den politischen Parteien
  und in unserer ganzen Gesellschaft. Wissen Sie, genau das haben wir alles. Wir sind
  ein großartiges Land. Darauf dürfen wir stolz sein. Es ist nicht so vom Himmel gefallen.
  Unser Land, wie es sich heute darstellt – auch daran erinnert uns die Person von
  Konrad Adenauer –, das viele Gute in unserem Land, ist das Ergebnis von vielen guten
  Entscheidungen, von vielen gemeinsamen Kraftanstrengungen. Wenn wir in diesem Sinn
  den Weg weitergehen, dann liegen die besten Jahre nicht hinter uns; dann liegen
  sehr gute Jahre vor uns. Erlauben Sie mir, dass ich abschließend noch einmal ein
  herzliches Wort an die Stiftung und an Peter Harf richte. Danke, dass Sie mit Ihrem
  großartigen Engagement das möglich machen, zu dem wir uns heute hier zusammenfinden!'
