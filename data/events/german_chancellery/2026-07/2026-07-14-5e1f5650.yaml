title: Von Bundestag und Bundesrat verabschiedet Neues Gebäudemodernisierungsgesetz
text: 'Eigentümer sollen wieder selbst entscheiden können, welche Heizungsart sie
  einbauen. Foto: Lars Fröhlich / FUNKE Foto Services / imago Nach dem Bundestagsbeschluss
  hat das neue Gebäudemodernisierungsgesetz auch den Bundesrat passiert. Das Gesetz
  dient dazu, Gebäude klimafreundlicher zu heizen und Hauseigentümern die Entscheidungsfreiheit
  für ihre Heiztechnik zu lassen. Das Gebäudemodernisierungsgesetz ersetzt das alte
  Gebäudeenergiegesetz. Damit setzt die Bundesregierung ein zentrales Vorhaben aus
  dem Koalitionsvertrag um. Das Bundeskabinett hatte den Gesetzentwurf am 13. Mai
  auf den Weg gebracht. Die wesentlichen Änderungen können damit nach Verkündung in
  Kraft treten. „Wir ersetzen ein Gesetz, das viele Menschen verunsichert hat, durch
  eines, das auf Vertrauen, Technologieoffenheit und Machbarkeit setzt. Mit dem Gebäudemodernisierungsgesetz
  machen wir Klimaschutz wieder alltagstauglich: weniger Ideologie, mehr Pragmatismus,
  mehr Planungssicherheit und mehr Freiheit für Eigentümer, Mieter und Unternehmen“,
  sagte Bundeswirtschaftsministerin Katherina Reiche nach dem Kabinettbeschluss. Die
  Bundesregierung gestaltet die Gebäudemodernisierung mit dem Gesetz technologieoffener,
  flexibler, praxistauglicher und einfacher. Die gesetzliche Vorgabe eines einheitlichen
  Anteils von mindestens 65 Prozent erneuerbarer Energien bei der Wärmeversorgung
  für alle Neu- und Bestandsbauten entfällt. Eigentümerinnen und Eigentümer können
  selbst entscheiden, welche Heizungsart sie einbauen: So können neben Wärmepumpen,
  einem Fernwärmeanschluss, hybriden Heizungsmodellen oder einer Biomasseheizung weiterhin
  auch Gas- und Ölheizungen eingebaut werden. Grüngasquote und Biotreppe für klimaneutrale
  Brennstoffe: Brennstoffe für Heizungen müssen ab 2045 komplett klimaneutral sein.
  Die moderate Grüngas- oder Grünölquote und die Biotreppe sollen zu einer Reduzierung
  der Treibhausgasemissionen im Gebäudebereich beitragen. Mit der Biotreppe soll Gas
  oder Öl ab 2029 schrittweise ein verbindlicher Bioanteil beigemischt werden. Die
  Details der Grüngasquote (ab 2028) soll die Bundesregierung bis zum 1. Dezember
  2026 in einem gesonderten Gesetz festgelegen. Mieterinnen und Mieter werden vor
  überhöhten Nebenkosten infolge des Einbaus einer unwirtschaftlichen Heizung geschützt.
  Die Regierungsfraktionen im Bundestag haben zusätzlich eine Härtefallregelung für
  Vermietende bei der CO 2 -Kostenaufteilung aufgenommen. Die Bundesregierung setzt
  die Heizungs- und Gebäudeförderung (BEG) fort. Sie unterstützt Gebäudesanierungen
  weiter umfassend. Die Förderung wird jetzt noch sozial ausgewogener, effizienter
  und fokussierter ausgestaltet. Gebäudesanierungen und Heizungstausch senken den
  Energieverbrauch. Sie sind gut für Konjunktur und Klimaschutz. Die Förderung wird
   mit notwendigen Anpassungen ab dem 21.07.2026 fortgeführt. Darauf können sich  Bürgerinnen,
  Bürger und Unternehmen verlassen. Die neuen Förderbedingungen gelten bereits ab
  dem 21. Juli 2026 . Alle Informationen zur Antragstellung und zur weiteren Bearbeitung
  während der technischen Umstellungsphase vom 9. bis 20. Juli stellt die Kreditanstalt
  für Wiederaufbau (KfW) zur Verfügung. Fragen und Antworten zur neuen Bundesförderung
  für effiziente Gebäude (BEG) finden Sie auf energiewechsel.de . Die Bundesregierung
  wird das Gesetz 2030 mit Blick auf seinen Beitrag zu den Klimaschutzzielen im Gebäudesektor
  evaluieren. Zudem werden die Vorgaben der EU -Gebäuderichtlinie ( EU ) 2024/1275
  über die Gesamtenergieeffizienz von Gebäuden in nationales Recht umgesetzt.'
