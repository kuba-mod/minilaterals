title: Im Bundestag beschlossen Einsatz der Bundeswehr für UNIFIL endet
text: Im Rahmen der Mission im Libanon beteiligt sich die Fregatte Baden-Württemberg
  an der UNIFIL -Marineeinheit. Die Bundesregierung hat beschlossen, dass sich bewaffnete
  deutsche Streitkräfte ein letztes Mal an der UNIFIL -Mission im Libanon beteiligen.
  Dies dient dem Ziel, den operativen Auftrag der Mission bis zum 31. Dezember 2026
  abzuschließen. Der Deutsche Bundestag hat dem Beschluss nun zugestimmt. Das Mandat
  umfasst auch die Abwicklungsphase, in der die Bundeswehr ihre Soldatinnen und Soldaten
  zurückführt – sowie die Unterstützung der Vereinten Nationen ( UN ) und deren Mitgliedsstaaten
  beim Abzug bis zum 30. Juni 2027. Der Beschluss der Bundesregierung erfolgt vor
  dem Hintergrund der Resolution 2790 (2025) des Sicherheitsrats der Vereinten Nationen
  ( UN ) vom 28. August 2025. Diese hatte das UN -Mandat von UNIFIL letztmalig bis
  zum 31. Dezember 2026 verlängert – verbunden mit einer sich anschließenden Abwicklungsphase.
  Bis dahin sollen die operativen Aufgaben ausgeführt werden. Dazu gehören die Beteiligung
  mit einer Fregatte am UNIFIL -Marineverband, mit Stabspersonal im UNIFIL -Hauptquartier
  sowie mit Ausbildungspersonal für den Fähigkeitsaufbau der libanesischen Marine.
  Dafür können bis zu 300 Soldatinnen und Soldaten der Bundeswehr eingesetzt werden.
  Ab 1. Januar 2027 dürfen bis zu 80 Soldatinnen und Soldaten eingesetzt werden. Aufgrund
  der aktuellen Bedrohungs- und Sicherheitslage in der Region wurde die Ausbildung
  im März ausgesetzt. Sie soll aber schnellstmöglich wiederaufgenommen werden. Auch
  in der aktuellen Lage bleibt UNIFIL ein wichtiger Akteur für die Sicherheit und
  Stabilität im Libanon und der Region. Bis Ende 2026 konzentriert sich die Mission
  vor allem darauf, die libanesischen Streitkräfte dabei zu unterstützen, die Kontrolle
  über ihr eigenes Staatsgebiet zu übernehmen. Seit der Etablierung des UNIFIL -Marineverbandes
  im Jahr 2006 überwacht UNIFIL auch das Waffenembargo der Vereinten Nationen in den
  libanesischen Küstengewässern, wie es die Sicherheitsratsresolution 1701 vorsieht.
  Aufgrund der Ausbildung durch den UNIFIL -Marineverband hat die libanesische Marine
  erhebliche Fortschritte dabei erzielt, die eigenen Hoheitsgewässer zu überwachen.
  Sie ist inzwischen grundsätzlich in der Lage, alle technischen Prozeduren von der
  Abfrage bis hin zur Inspektion verdächtiger Schiffe eigenständig durchzuführen.
  Bis zum Ende des Mandats sollen diese Aufgaben daher weiter trainiert und unterstützt
  werden, um die libanesische Marine möglichst nachhaltig zu befähigen.
