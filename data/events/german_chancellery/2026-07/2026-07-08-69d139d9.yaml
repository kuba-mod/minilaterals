title: Pressestatement von Bundeskanzler Merz zum NATO-Gipfeltreffen NATO europäischer
  machen
text: „ Wir werden die NATO europäischer machen, damit sie transatlantisch bleiben
  kann“, so Kanzler Merz am Mittwoch in Ankara. „Wir haben in den meisten Mitgliedstaaten
  der Europäischen Union und in der NATO die Verteidigungsanstrengungen erheblich
  verbessert,“ betonte Bundeskanzler Friedrich Merz zu Beginn der Arbeitssitzung der
  Staats- und Regierungschefinnen und -chefs in Ankara. Das Ziel sei es, die NATO
  europäischer zu machen, damit sie transatlantisch bleiben könne. Ein Beispiel dafür
  sei die Verabredung, die Deutschland, Kanada und Norwegen über die Zusammenarbeit
  im U -Boot-Bau getroffen hätten. „ Das wird uns im gesamten Raum des Atlantiks auf
  Jahrzehnte miteinander verbinden ,“ sagte der Kanzler. „Wir werden der Ukraine weiter
  helfen,“ so Merz. Durch eine gemeinsame Initiative europäischer Staaten solle die
  Ukraine 2026 und 2027 jeweils 70 Milliarden Euro erhalten. Russland müsse den Krieg
  beenden. Um das zu erreichen, wollen die NATO -Mitgliedstaaten in der Sitzung noch
  mal alles tun und eine klare Botschaft an Russland senden. Meine Damen und Herren,
  wir gehen sehr gut vorbereitet in den NATO -Gipfel hier in Ankara. Ich möchte Präsident
  Erdoğan herzlich für seine Gastfreundschaft und die gute Vorbereitung seinerseits
  danken. Wir haben im letzten Jahr in Den Haag beschlossen, dass wir unsere Verteidigungsanstrengungen
  erheblich verstärken, und wir haben geliefert. Wir haben die Verteidigungsanstrengungen
  in den meisten Mitgliedsstaaten der Europäischen Union und in der NATO erheblich
  verbessert. Wir werden darüber heute sprechen. Wir werden die NATO europäischer
  machen, damit sie transatlantisch bleiben kann. Ein Beispiel dafür ist die Verabredung
  zwischen Kanada, Norwegen und Deutschland über die Zusammenarbeit im U -Boot-Bau,
  die wir gestern getroffen haben. Ich will die Gelegenheit nutzen, um Mark Carney
  und Jonas Støre für die lange vorbereitete Entscheidung über den U-Boot-Bau und
  die gemeinsame Beschaffung, die wir gestern öffentlich gemacht haben, sehr herzlich
  zu danken. Das wird uns im gesamten Raum des Atlantiks auf Jahrzehnte miteinander
  verbinden. Die Verteidigung wird auch aus dieser Sicht heraus sehr viel europäischer
  und sehr viel intensiver. Wir werden heute über weitere gemeinsame Anstrengungen
  sprechen. Ich bin mir sicher, dass wir von Ankara aus einen neuen Geist in der NATO
  haben werden, der die NATO stärker, der die NATO geschlossener macht. Wir werden
  natürlich auch über die Ukraine sprechen. Wir werden der Ukraine weiter helfen.
  Wir haben auch eine gemeinsame Initiative in Europa auf den Weg gebracht, die Ukraine
  für die beiden nächsten Jahre 2026 und 2027mit jeweils 70 Milliarden Euro weiter
  zu unterstützen. Es liegt jetzt ausschließlich an Russland, diesen Krieg zu beenden.
  Wir werden heute noch einmal alles tun, um das zu erreichen, und auch eine klare
  Botschaft an Moskau richten. Russland hat keine Chance, diesen Krieg zu gewinnen.
  Sie werden die Kriegsziele nicht erreichen. Je schneller wir diesen Krieg beenden,
  desto besser ist es für Europa, desto besser ist es für Russland und desto besser
  ist es für den Frieden in der Welt.
