title: Im Bundestag angenommen Mehr Digitalisierung in der Migrationsverwaltung
text: 'Künftig sollen biometrische Daten, die einmal eingereicht wurden, bei bestimmten
  Voraussetzungen wiederverwendet werden können. Die Bundesregierung hat einen Gesetzesentwurf
  beschlossen, der die Digitalisierung in der Migrationsverwaltung weiter vorantreibt.
  Ziel der Bundesregierung ist es, die Migrationsverwaltung zu entlasten und die Verwaltungsverfahren
  f ü r die betroffenen Personen zu beschleunigen. Um das zu erreichen, soll das Ausländerzentralregister
  (AZR) stärker für die Speicherung und den Austausch von Dokumenten und Daten genutzt
  werden, die für aufenthaltsrechtliche Verfahren notwendig sind. Biometrische Daten,
  die einmal eingereicht wurden, sollen innerhalb von sieben Jahren für die Neubeantragung
  eines befristeten elektronischen Aufenthaltstitels wiederverwendet werden können.
  Bei Kindern soll ein Zeitraum von fünf Jahren gelten. Das reduziert den Arbeits-
  und Zeitaufwand sowohl für die betroffenen Menschen als auch für die Ausländerbehörden,
  ohne dass es zu Abstrichen bei den Sicherheitsanforderungen kommt. Dokumente, die
  für ein Visumverfahren notwendig sind, werden künftig für drei Jahre in der Visadatei
  des Ausländerzentralregisters abgelegt. Dies erleichtert für die beteiligten Behörden
  den Zugriff auf die antragsbegründenden Unterlagen und beschleunigt insbesondere
  im Bereich der Fachkräfteeinwanderung die Verfahrensbearbeitung. Für ausländische
  Personen, die nicht über ein Ausweisdokument verfügen, sollen künftig sonstige Dokumente,
  die zur Identifikation geeignet sind, im Ausländerzentralregister gespeichert werden
  können. Dies erleichtert die Prüfung zur Identitätsklärung. Der Informationsaustausch
  zwischen Strafjustiz und den Ausländerbehörden soll verbessert werden: Gesetzlich
  vorgesehene Mitteilungen in Strafsachen, beispielsweise über die Einleitung eines
  Strafverfahrens, werden von Staatsanwaltschaften und Gerichten bisher oft postalisch
  an die zuständige Ausländerbehörde geleitet. Künftig werden sie zentral im AZR erfasst.
  Zusätzlich erhält die jeweils zuständige Ausländerbehörde automatisch eine gesonderte
  Benachrichtigung, sogenannte Push -Benachrichtigungen.'
