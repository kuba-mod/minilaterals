title: Pressekonferenz von Bundeskanzler Merz und dem algerischen Präsidenten Abdelmadjid
  Tebboune Wirtschaftliche Zusammenarbeit weiter vertiefen
text: '„Wir sind uns darin einig, dass wir unsere wirtschaftliche Zusammenarbeit weiter
  stärken wollen", betonte Kanzler Merz. Algerien und Deutschland verbinde eine lange
  Geschichte, sagte Bundeskanzler Merz in einer gemeinsamen Pressekonferenz beim Besuch
  des algerischen Staatspräsidenten Abdelmadjid Tebboune in Berlin. Zudem hob der
  Kanzler die Energiepartnerschaft mit Algerien hervor: „Algerien verfügt über bedeutende
  Rohstoffvorkommen, darunter Erdgas, Erdöl und auch seltene Erden." Das Land habe
  in den letzten Jahren einen sehr wichtigen Beitrag zur Energieversorgungssicherheit
  Europas geleistet und war zweitgrößter Pipelinegaslieferant der Europäischen Union.
  Man wolle auch den Export von Wasserstoff aus Algerien weiter voranbringen – gemeinsam
  mit Italien mit der Fortentwicklung eines südlichen Wasserstoffkorridors. Verschiedene
  Vereinbarungen zwischen deutschen und algerischen Unternehmen wurden anlässlich
  des Besuchs getroffen. „Wir sind uns darin einig, dass wir unsere wirtschaftliche
  Zusammenarbeit weiter stärken wollen", so der Kanzler. Das haben Deutschland und
  Algerien auch in einer Gemeinsamen Erklärung über eine strategische Agenda der bilateralen
  Partnerschaft zum Ausdruck gebracht. Beide Länder wollen unter anderem das Investitionsklima
  und die Rechtssicherheit weiter verbessern, um die bilateralen Handels- und Investitionsbeziehungen
  weiter zu stärken. Meine Damen und Herren, herzlich willkommen! Ich freue mich sehr,
  dass ich heute den algerischen Präsidenten in Berlin willkommen heißen darf. Herr
  Tebboune, herzlich willkommen im Bundeskanzleramt! Unsere beiden Länder, Deutschland
  und Algerien, verbindet eine lange Geschichte. Seit dem Jahr 1898 gibt es eine Auslandsvertretung
  in Algier. Seit mehr als 60 Jahren fördert das Goethe-Institut den Austausch zwischen
  den Menschen in Algerien und in Deutschland. Wir wollen diesen Austausch fortsetzen,
  beispielsweise auch über unsere politischen Stiftungen. Im Nationalmuseum in Cherchell
  arbeiten deutsche und algerische Fachleute gemeinsam daran, das archäologische Erbe
  des Landes zu erforschen, zu restaurieren und zu bewahren. Gemeinsam ‑ darüber haben
  wir ausführlich gesprochen ‑ ist uns das Interesse an Stabilität in der Region,
  nicht zuletzt im Blick auf das benachbarte Sahel. Wir sind uns darin einig, dass
  wir unsere wirtschaftliche Zusammenarbeit weiter stärken wollen. Wir haben eine
  ganze Reihe von Vereinbarungen zwischen deutschen und algerischen Unternehmen gesehen,
  die anlässlich Ihres Besuches, Herr Staatspräsident, unterzeichnet worden sind.
  Wir wollen hieran anknüpfen und haben auch über weitere Verbesserungen beim Investitionsklima
  und der Rechtssicherheit sowie über verlässliche, transparente Abläufe gesprochen.
  Dies haben wir auch in einer gemeinsamen Erklärung, die Ihnen vorliegt, so bekräftigt.
  Zweites Thema war die Energie- und Rohstoffzusammenarbeit. Algerien verfügt über
  bedeutende Rohstoffvorkommen, darunter Erdgas, Erdöl und auch seltene Erden. So
  hat Algerien in den letzten Jahren schon einen sehr wichtigen Beitrag zur Energieversorgungssicherheit
  Europas geleistet. Das Land war zum Beispiel der zweitgrößte Pipelinegaslieferant
  der Europäischen Union. Wir wollen auch den Export von Wasserstoff zwischen Algerien
  und Europa, zwischen Algerien und Deutschland weiter voranbringen. Wir werden dafür
  gemeinsam mit Italien die Entwicklung eines südlichen Wasserstoffkorridors vorantreiben.
  Wir haben schließlich, drittens, über die aktuelle regionale und geopolitische Lage
  gesprochen. Ich habe dem Herrn Präsidenten in diesem Zusammenhang auch unsere Haltung
  zum Krieg in der Ukraine erläutert. Wir werden und wir wollen den Druck auf Russland
  erhöhen, damit es sich endlich auf Friedensverhandlungen einlässt. Erlauben Sie
  mir, aus aktuellem Anlass zu sagen: Wir haben kurz vor Ihrem Besuch mit großer Bestürzung
  die Nachricht von dem Brand in einem Waisenhaus in der Nähe von Algier erhalten.
  Unter den Toten und Verletzten sind auch viele Kinder. Herr Präsident, ich möchte
  Ihnen und Ihrem Land namens der Bundesrepublik Deutschland meine tiefe Anteilnahme
  aussprechen und Sie bitten, dies auch den Familien der Opfer so weiterzugeben. In
  diesem Sinne noch einmal sehr herzlichen Dank für Ihren Besuch. Vielen Dank, sehr
  geehrter Herr Bundeskanzler. Erlauben Sie mir, dass ich, bevor ich hier meine Rede
  vor der Presse halte, all den Familien, deren Kinder in diesem Brand, der in einem
  Waisenhaus in der Hauptstadt Algeriens stattfand, ihr Leben lassen mussten, hier
  öffentlich meine Beileidsbekundung ausspreche. Möge Gott ihren Seelen gnädig sein.
  Ich hoffe, dass all jene, die schwere Verletzungen davongetragen haben, bald wieder
  genesen sein mögen. Sehr geehrter Herr Bundeskanzler, ich denke, dass unser beider
  Zusammenkommen hier in Deutschland angesichts der engen politischen und wirtschaftlichen
  Beziehungen zwischen unseren beiden Ländern, zwischen Deutschland und Algerien,
  heute ein ganz natürlicher Zustand ist. Uns verbinden sehr viele Punkte. Es gibt
  eine qualitative Veränderung innerhalb unserer Wirtschaften. Die Deutschen haben
  wir mit Energie versorgt. Wir versorgen aber nicht nur Deutschland, sondern Europa
  als Ganzes mit Gas. Wir möchten ein vertrauenswürdiger Lieferant von Gas sein. Wir
  kommen unseren Lieferverpflichtungen immer nach, sowohl gegenüber den Anrainerstaaten
  des Mittelmeeres als auch gegenüber Europa im Allgemeinen. Dieser Besuch hier hatte
  zum Zweck, die bilateralen Beziehungen zwischen Algerien und der mit uns eng befreundeten
  Bundesrepublik Deutschland im Bereich der Wirtschaft, im Bereich der Sicherheitszusammenarbeit
  und im Bereich der Politik zu intensivieren. Ich möchte hier auf den südlichen Wasserstoffkorridor
  als Leuchtturmprojekt verweisen, welches eine wichtige Rolle für erneuerbare Energien
  und deren Ausbau spielt. Wir sind sehr dankbar für die Unterstützung Deutschlands
  bei diesem Projekt. Es gibt viele große Projekte, die gerade gemeinsam durchgeführt
  werden. Hierbei spielt Deutschland eine wichtige Rolle. Deutsche Unternehmen sind
  in Algerien mehr und mehr präsent. Jedes Jahr werden es mehr. Wir haben einen One-Stop-Shop
  eingerichtet, um ausländische Direktinvestitionen zu erleichtern. Mehr als 900 Millionen
  Dollar an Investitionen konnten wir auf diese Art und Weise einwerben. Wir haben
  auch über die Zusammenarbeit im Sicherheitsbereich gesprochen und sind dort in die
  Details gegangen. Ich glaube, es gibt keine nennenswerten Schwierigkeiten in unseren
  Beziehungen. Die Beziehungen zwischen unseren beiden Ländern sind sehr, sehr gut. ‑
  Vielen Dank. Herr Bundeskanzler, wie schätzen Sie die Perspektiven für die deutsch-algerische
  Zusammenarbeit ein, insbesondere im Bereich der Investitionen, wo Algerien neue
  Dynamik entfaltet? Vielen Dank für die Frage. ‑ Ich habe dem Präsidenten gesagt,
  dass Deutschland sehr daran interessiert ist, die wirtschaftlichen Beziehungen zwischen
  Deutschland und Algerien auf ein neues Niveau zu heben, sie deutlich zu verbessern.
  Ich habe die Themen angesprochen, nämlich die Rohstoffe, die Automobilindustrie,
  weitere Rüstungs- und Ausrüstungsinvestitionen und die Energiepolitik. Wir haben
  ein großes Interesse daran, mit Algerien auch enge Wirtschaftsbeziehungen in der
  Energiepolitik weiterzuentwickeln. Wir haben das Thema Wasserstoff besprochen. Ich
  habe die Wasserstoffverbindung angesprochen, die durch das Mittelmeer über Italien
  nach Deutschland geführt werden soll. Dies sind hochinteressante Projekte für beide
  Seiten, und wir haben die Verabredung getroffen, dass wir mit Italien zusammen dieses
  Projekt, aber auch andere bilaterale Projekte in den nächsten Monaten energisch
  weiter vorantreiben; denn wir haben ein gegenseitiges Interesse daran, die wirtschaftlichen
  Beziehungen zwischen unseren beiden Ländern nachhaltig zu verbessern. Herr Bundeskanzler,
  eine kurze Frage zum anstehenden deutsch-französischen Treffen: Beide Länder leiten
  heute in Nörvenich die Nuklearkooperation ein. Welche Bedeutung hat diese Zusammenarbeit,
  und inwieweit hat Deutschland da Mitspracherechte? Herr Präsident, es gibt Bitten,
  den französischen Sportjournalisten Christophe Gleizes zu begnadigen. Erwägen Sie,
  dem nachzukommen? Ich will dem Ergebnis der deutsch-französischen Regierungskonsultationen,
  die heute Nachmittag beginnen und bis morgen Nachmittag andauern, nicht vorgreifen.
  Wir werden sehr umfassend über alle verteidigungspolitischen, aber auch über wirtschaftspolitische
  strategische Gemeinsamkeiten sprechen. Ich erlaube mir, in diesem Zusammenhang auf
  das Abschlusskommuniqué zu verweisen, das wir morgen zu verschiedensten Themen publizieren
  werden. Sehen Sie mir nach, wenn ich jetzt vor Beginn der Beratungen nicht in die
  Details gehe. Wir werden morgen auch einen Teil der Konsultationen im Rahmen des
  deutsch-französischen Sicherheits- und Verteidigungsrats auf dem Flughafen in Nörvenich
  abhalten. Insofern werden wir über viele Fragen miteinander sprechen, die das traditionell
  gute deutsch-französische Verhältnis noch einmal vertiefen. Aus Respekt vor dem
  algerischen Justizsystem möchte ich nicht auf diese Frage antworten, außer auf algerischem
  Boden. Ich bin gerade in Deutschland, nicht in Algerien, darum beantworte ich diese
  Frage nicht. Herr Präsident, gestern haben wir Ihre Erklärung zur Zusammenarbeit
  mit Deutschland gehört. In welchen Sektoren soll die Zusammenarbeit prioritär ausgebaut
  werden? Kann diese Zusammenarbeit als strategisch bezeichnet werden? Vielen Dank
  für diese Frage. ‑ Es besteht kein Zweifel daran, dass es sich hier um eine strategische
  Partnerschaft handelt; das sagen wir immer wieder. Seit unserer Unabhängigkeit im
  Jahre 1960 bis zum heutigen Tag haben wir starke, gute Beziehungen mit Deutschland,
  die keine Konflikte verursachen wird. Wir sprechen davon, die Beziehungen zu verbessern,
  obwohl sie bereits gut sind. Natürlich können wir die Zusammenarbeit auch in weiteren
  Bereichen ausbauen, etwa in der Produktion von sehr spezialisierten Medikamenten.
  Vielleicht haben Sie mitbekommen, dass wir vor Kurzem den Grundstein für ein Institut
  für die Behandlung von Zellen mit genetischen Methoden gelegt haben. Das ist ein
  Bereich, in dem Deutschland weltweit führend ist. Wir stützen uns auf unsere Freundschaft
  mit der Bundesrepublik Deutschland, um solche Projekte durchzuführen, die am Ende
  beiden Ländern zum Vorteil gereichen. Es sind sehr gute Beziehungen und es ist eine
  sehr gute Zusammenarbeit. Herr Bundeskanzler, Ihr Fraktionschef Jens Spahn und sein
  Ehemann sind per Leihmutterschaft in den USA Eltern geworden‑ ein Weg, der in Deutschland
  nicht möglich wäre und den auch Ihre CDU per Parteitagsbeschluss abgelehnt hat.
  Das ist mittlerweile also nicht mehr nur ein privates Thema, sondern es gibt auch
  eine politische Debatte dazu. Wie stehen Sie dazu, auch zur Leihmutterschaft generell?
  Haben Sie Herrn Spahn eigentlich gratuliert? Sie werden mir nachsehen, dass ich
  in Gegenwart eines hochrangigen Gastes zu diesen innenpolitischen Themen hier nur
  kurz Stellung nehme: Ich bin bereits am letzten Freitag von Jens Spahn darüber informiert
  worden, dass er und sein Mann Eltern werden. Ich habe ihm dazu gratuliert.'
