title: 'Öffentliche Bibliotheken dürfen zukünftig sonntags öffnen – Staatsminister
  Weimer: „Entspricht viel besser der Lebensrealität vieler Menschen“'
text: 'Der Koalitionsausschuss hat beschlossen, dass öffentlichen Bibliotheken künftig
  die Sonn- und Feiertagsöffnung ermöglicht werden soll. Damit sollen Bibliotheken
  anderen Kulturorten wie Konzerthäusern, Theatern, Kinos und Museen gleichgestellt
  werden. Dazu erklärt Staatsminister Wolfram Weimer: „Wir stärken Bibliotheken als
  lebendige Kultur- und Bildungsorte. Denn diese sind weit mehr als nur Ausleihe von
  Büchern, sie sind auch offene Räume für Begegnung und Austausch. Dass zukünftig
  mehr Bibliotheken auch sonntags öffnen dürfen, ist ein großer Gewinn für die kulturelle
  Teilhabe. Gerade Berufstätige und Familien bekommen so die Möglichkeit, Bibliotheken
  dann zu nutzen, wenn sie Zeit haben. Das macht den Zugang zu Wissen, Kultur und
  Gemeinschaft einfacher und passt besser zum Alltag vieler Menschen.“ Mit der geplanten
  Neuregelung setzt die Bundesregierung eine Vereinbarung des Koalitionsvertrags um.
  Sie trägt der gewandelten Rolle öffentlicher Bibliotheken Rechnung: Bibliotheken
  sind heute neben Buch- und Medienausleihe zu lebendigen Treffpunkten geworden. Hier
  kommen Menschen zum Lernen, Lesen und Arbeiten, für kulturelle Veranstaltungen,
  Austausch und gemeinsames Erleben zusammen. Als sogenannte „dritte Orte“ zwischen
  Zuhause und Arbeitsplatz leisten sie einen wichtigen Beitrag zu Bildung, Kultur
  und gesellschaftlichem Zusammenhalt. Dieses Angebot liegt im besonderen öffentlichen
  Interesse und soll künftig auch sonntags mehr Menschen offenstehen können. Der Schutz
  der Arbeitnehmerinnen und Arbeitnehmer ist dadurch gewährleistet, dass Bibliotheken
  unter Einbeziehung der örtlichen Personalvertretungen selbst über die Öffnung an
  Sonn- und Feiertagen entscheiden können. Somit bekommen Öffentliche Bibliotheken
  bundesweit größere Spielräume, ihre Angebote an den Bedürfnissen ihrer Besucherinnen
  und Besucher auszurichten.'
