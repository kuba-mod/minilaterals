date: '2026-07-20'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 20. Juli 2026
text: '(Vorsitzende Wefers eröffnet die Pressekonferenz und begrüßt StS Kornelius
  sowie die Sprecherinnen und Sprecher der Ministerien.) Ich habe eine Ankündigung
  zu machen. Der Bundeskanzler wird morgen , am Dienstag, den 21. Juli, um 12 Uhr
  den Präsidenten Aserbaidschans , Ilham Alijew, mit militärischen Ehren im Bundeskanzleramt
  empfangen . Anschließend wird es ein Vier-Augen-Gespräch mit Präsident Alijew geben.
  Dabei wird es um die Themen der Energie und der Rohstoffe, um den regionalen Friedensprozess
  zwischen Aserbaidschan und Armenien sowie um Fragen der internationalen Sicherheitspolitik
  gehen, natürlich um den Nahen und Mittleren Osten. Anschließend ist für 13.35 Uhr
  eine Pressekonferenz geplant. Das ist jetzt ein sehr kurzfristig anberaumter oder
  zumindest bekannt gegebener Besuch. Ist der eigentliche Anlass die morgige Unterzeichnung
  eines Vertrags? Können Sie irgendwas dazu sagen, worum es dabei geht? Ich nehme
  einmal an, es geht um Gas. Aber können Sie dazu irgendwas sagen? Der Besuch war
  länger geplant, die Terminansage war jetzt kurzfristig. Das ist ein technischer
  Hinweis. Genauso technisch ist der Hinweis auf die morgige Unterzeichnung eines
  Papiers. Dazu werden wir dann morgen, wenn es stattfinden wird, auch inhaltlich
  kommunizieren. Das war jetzt faktisch ein technischer Hinweis für die Anmeldung
  und für Ihre Vorbereitung. Ist das also ein Papier und nicht unbedingt ein Vertrag,
  sondern ‑ ‑ ‑ Die Antwort bleibt dieselbe: Ich werde es Ihnen morgen sagen. Ich
  hätte ganz gerne eine Frage an Herrn Wentzel zu genau demselben Thema angeschlossen:
  Können Sie uns sagen, wie groß die Hoffnung der Bundesregierung ist, dass man Gas
  aus Aserbaidschan beziehen kann? Ich würde da jetzt keine Hoffnungen und Mutmaßungen
  in den Raum stellen, sondern wir schauen einmal, was der Termin morgen bringen wird.
  Das heißt, Sie haben keine Hoffnung. Habe ich das richtig verstanden? Nein. Ich
  kommuniziere nicht über Hoffnungen. Ich möchte noch einmal darauf hinweisen, dass
  das ein technischer Hinweis war und wir damit aus Gründen, die mit dem Gast verabredet
  sind, jetzt keine Kommunikation verbinden. Es wird dann morgen in aller gebührenden
  Breite auch kommuniziert werden, ob es jetzt große, kleine oder gar keine Hoffnung
  gibt und welche Schwebstoffe auch immer vertraglich geregelt werden. Was sind denn
  neben dem Energiethema die Interessen, die Deutschland in Aserbaidschan hat? Ich
  hatte ja schon gesagt, dass es um den regionalen Austausch geht. Deutschland ist
  interessiert an dem Friedensprozess in der Region. Er ist sehr, sehr zentral für
  die Stabilisierung im Südkaukasus. Wir haben ein hohes Interesse an einem umfassenden
  Frieden zwischen Aserbaidschan und Armenien. Wir sind bereit, das gegenüber beiden
  Partnern zu unterstützen. Deutschland hat ebenfalls ein hohes Interesse daran, dass
  diese Schlüsselländer in der Nähe Irans und auch der arabischen Konfliktherde auch
  zur Stabilität in der breiteren Region beitragen können. Herr Kornelius, vor einigen
  Tagen gab es einen Medienbericht darüber, dass die Herren Pofalla und Herr Platzeck
  in Baku waren und sich dort mit russischen Vertretern getroffen haben. Meine Frage
  ist: Könnte es sein, dass dieser Besuch der beiden ehemals recht einflussreichen
  Politiker in Baku in irgendeinem Zusammenhang mit dem morgigen Besuch steht? Die
  Bundesregierung hat keine Kenntnis von einem Besuch ehemals einflussreicher Politiker,
  und insofern werden wir die auch nicht kommentieren. Ich glaube, der Kontakt zum
  aserbaidschanischen Staatspräsidenten ist direkt, intensiv und ‑ das wird sich morgen
  auch zeigen ‑ sehr positiv. Der Kanzler hat ja gestern eine Kabinettsumbildung angedeutet
  . Warum hält er sich denn diese Option offen? Der Kanzler hat gestern gesagt, dass
  das eine konjunktivische Möglichkeit ist, und ob er von dieser Möglichkeit gebraucht
  macht, werden wir dann sehen, wenn die Entscheidungen gefällt worden sind. Es wurde
  jetzt verkündet, dass die Nachfolge von Herrn Spahn bis zum 29. Juli in einer Sondersitzung
  der Fraktion festgelegt werden soll. Wird dieses Thema der Kabinettsumbildung aus
  Ihrer Sicht bis dahin auch erledigt sein? Die Entscheidung der Fraktion ist eine
  Entscheidung der Parteivorsitzenden von CDU und CSU, die den Vorschlag machen werden.
  Insofern bin ich als Regierungssprecher hierfür der falsche Ansprechpartner. Die
  Zeitpläne sind miteinander abgestimmt, und ich denke, dass wir dann in einigen Tagen
  auch mehr Klarheit darüber haben werden, wie genau die Sequenz und auch die Schrittfolge
  in den Gremien aussehen werden. Der Kanzler hatte den Rücktritt von Jens Spahn am
  Wochenende als unvermeidlich bezeichnet und dies auch mit Glaubwürdigkeit begründet.
  Wie steht der Kanzler denn jetzt aber zum Drogenbeauftragten Hendrik Streeck, der
  ja im Kern in derselben Situation ist? Da muss ich um Verständnis dafür bitten,
  dass wir uns an einer Debatte um Herrn Streeck nicht beteiligen. Es wird sehr viel
  in den Medien und sozialen Netzwerken spekuliert. Die Elternschaft von Prof. Streeck
  und die Geburt eines Sohnes wurde von ihm bestätigt, nicht mehr. Es gibt also keine
  öffentliche Äußerung über die Umstände, und das ist insofern auch zum Schutz des
  Kindes weiterhin familiäre Privatsphäre, die wir auch zu respektieren bitten. Dann
  stelle ich noch die Frage an das BMG, denn der Drogenbeauftragte ist ja in Ihrem
  Haus ansässig: Wie steht denn die Ministerin dazu? Hat die eine Meinung? Ich kann
  den Ausführungen des Regierungssprechers an der Stelle nichts hinzufügen. Der Bundeskanzler
  hatte ja gestern im ZDF-Interview angedeutet, dass es auch eine Möglichkeit für
  eine größere Kabinettsumbildung gäbe. Gibt es dafür schon konkrete Pläne? Ist das
  etwas, das er momentan aktiv verfolgt, oder wie sind da die Überlegungen? Wie Sie
  ja eben zu Recht gesagt haben, hat er von der Möglichkeit gesprochen, also die konjunktivische
  Form benutzt. Möglichkeiten gibt es immer. Das heißt, sie bestehen und werden wahrgenommen
  oder werden nicht wahrgenommen. Wenn eine Entscheidung gefallen ist, wird er das
  dann, glaube ich, mitteilen. Dann würde man ja annehmen, dass, wenn es auch in dieser
  Richtung Entscheidungen gibt, die praktisch als Gesamtpaket verkündet werden. Ob
  es jetzt Gesamtpakete, Teile oder Briefumschläge geben wird, kann ich Ihnen nicht
  sagen. Das ist eine Entscheidung über die Nachfolge im Fraktionsvorsitz, die jetzt
  die Parteivorsitzenden fällen. Ob sich daraus weitere Folgen ergeben und wann über
  diese Folgen dann entschieden werden würde, muss man jetzt einfach einmal dem Prozess
  überlassen. Der Prozess ist im Gange, und ich kann dem nicht vorgreifen. Es sind
  keine zeitlichen Termine gesetzt, außer dem, den Sie eben angedeutet haben. Herr
  Kornelius, ich hätte ganz gerne noch einmal nach Herrn Streeck nachgefragt. Sie
  haben jetzt gesagt, dass Sie das nicht kommentieren wollen. Aber die Erfahrung der
  Bundesregierung mit Herrn Spahn war ja, dass es ein paar Tage brauchte, bis man
  die Dimension der Debatte und in dem Fall auch der Empörung verstanden hat. Das
  hat der Kanzler gestern selbst eingeräumt. Deswegen hätte ich schon noch einmal
  ganz gerne nachgefragt: Wissen Sie denn etwas zu der Vaterschaft von Herrn Streeck?
  Ich würde nämlich annehmen, dass die Bundesregierung, da er Drogenbeauftragter der
  Bundesregierung ist, doch eigentlich wissen müsste, wie die Umstände sind. Herr
  Streeck hat die privaten Umstände seiner Vaterschaft nicht öffentlich gemacht. Er
  hat keine öffentliche Debatte darüber gesucht. Ich kann mich deswegen nicht an Spekulationen
  beteiligen und werde das auch nicht tun. Das ist eine private Angelegenheit. Zur
  politischen Einordnung ist natürlich auch wichtig, zu wissen: Herr Streeck hat keine
  politischen Forderungen vertreten, die seiner persönlichen Lebensführung entgegenstehen.
  Das heißt, es gibt bei ihm keine Frage der politischen Glaubwürdigkeit. Deswegen
  bitte ich doch, diese sehr klare Unterscheidung auch zu respektieren. Er ist aber
  schon noch CDU-Mitglied und war auch auf dem CDU-Bundesparteitag, bei dem es ja
  einen Beschluss gegen die Leihmutterschaft gab. Deswegen stellt sich ja die Frage.
  Sie sagen also, dass diese beiden Fälle nicht vergleichbar seien? Ich habe eben
  gesagt, dass ich von Herrn Streeck keine politische Forderung kenne, die seiner
  persönlichen Lebensführung entgegensteht. Ich möchte noch einmal darauf hinweisen,
  dass wir über die Umstände seiner Vaterschaft keine Informationen haben und sie
  insofern auch nicht kommentieren können. Könnte man also jetzt sagen, dass das Vergehen
  von Herrn Spahn dann eben war, dass er damit an die Öffentlichkeit gegangen ist,
  weswegen jetzt Konsequenzen gefolgt sind? Ich verfolge die öffentliche Debatte,
  und es gab sehr viele Analysen, was zu diesem Rücktritt geführt hat. Dem habe ich
  nichts hinzuzufügen. Aber bei Herrn Streeck kann ich hinzufügen, dass bei ihm kein
  Vorwurf der Doppelmoral zu erkennen ist und die geschützte Privatsphäre der Familie
  aufrechterhalten bleiben wird. Ich stelle noch einmal eine Frage, die sich sowohl
  an Herrn Kornelius als auch an Frau Schraff richtet, bezüglich der Gesetzesänderung.
  Eigentlich war ja vor der Debatte auch schon Status quo, dass Leihmutterschaften
  hier in Deutschland verboten sind. Jetzt hat das eine ganze Diskussion darüber ausgelöst,
  dass andere Länder anders damit umgehen. Deswegen stelle ich noch einmal die Frage,
  nur um das klarzustellen, ob geplant ist, hier möglicherweise rechtliche Änderungen
  in Deutschland vorzunehmen. Diese politische Debatte kennen wir seit einiger Zeit.
  Sie wurde intensiv geführt. Der jetzige Anlass bietet natürlich Gelegenheit, diese
  Debatte wieder zu beleben. Von der Bundesregierung gibt es im Moment keinen Vorstoß
  dafür, diese Gesetzeslage zu ändern. Herr Kornelius, wissen Sie denn, ob sich Herr
  Spahn momentan noch in den USA befindet? Ich kann keine Auskunft geben, was Mitglieder
  der Fraktion angeht. Das ist eine Parteisache. Ich bin auch darüber hinaus, wie
  gesagt, was die Regierungsbetroffenheit angeht, nicht in der Lage, das zu kommentieren.
  Ich habe noch eine Nachfrage zu dem Thema, dass keine Gesetzesänderung geplant sei.
  Es gab am Freitag die Frage, wie der Stand ist, was die Eizellspende angeht. Jetzt
  haben Sie so rigoros gesagt, es sei keine Änderung geplant. Betrifft das auch das
  Thema der Eizellspende? Dazu müsste das Fachministerium etwas sagen. Seit Freitag
  hat sich da jetzt auch keine Neuerung ergeben. Die Frage wurde ja Freitag schon
  gestellt, und wir haben da keinen neuen Stand zu vermelden. Freitag war ja die Frage,
  ob das, was die Ministerin angekündigt hat, schon in Arbeit ist. Jetzt hieß es,
  es sei gar nichts geplant. Das, finde ich, ist der Unterschied. Deswegen stelle
  ich die Frage: Ist es geplant, Änderungen bei der Eizellspende anzugehen, oder nicht?
  Es gilt das, was bis jetzt gesagt wurde. Im Koalitionsvertrag steht dazu nichts.
  Die Gespräche bzw. die Abstimmungen zwischen den betroffenen Ressorts laufen. Genau
  so wurde es auch am Freitag gesagt. Herr Kornelius, im Sommerinterview erklärte
  der Bundeskanzler , dass man es mit einer Vertrauenskrise der Demokratie insgesamt
  zu tun habe und man als Koalition daran arbeite. Können Sie noch einmal genauer
  ausführen, wie genau sich diese Vertrauenskrise für die Regierung zeigt und welche
  Verantwortung die Politik bzw. die Regierung selbst für die Entstehung dieser Vertrauenskrise
  trägt? Der Kanzler hat sich dazu geäußert, und seine Worte stehen da für sich. Es
  gibt jetzt keinen Anlass für mich, das zu vertiefen, analysieren oder interpretieren.
  Sie schreiben genug über Vertrauenskrisen, über demokratische Prozesse und über
  das Wahlverhalten. Der Kanzler hat darauf hingewiesen, dass extreme Parteien an
  Zuspruch gewinnen und dass die Mitte in einer Position steht, sich behaupten zu
  wollen. Das wird mit dem Begriff Vertrauenskrise ausgedrückt. Sehen Sie die schlechten
  Umfragewerte für die Bundesregierung eher in den äußeren Krisen begründet, die auch
  Auswirkungen auf Deutschland haben? Ich glaube, eine Analyse in einer solchen Breite
  kann und möchte ich hier nicht vornehmen. Die Bundesregierung möchte dieses Land
  reformieren, sie möchte dieses Land zukunftsfest machen. Sie hat sehr, sehr viele
  Reformen auf den Weg gebracht. Sie arbeitet nicht für Umfragewerte des nächsten
  Tages, sondern dafür, dieses Land voranzubringen, Stabilität zu schaffen, Arbeitsplätze
  zu schaffen, Wohlstand zu erhalten und Sicherheit zu schaffen. Das sind die Ziele
  der Bundesregierung. Zur Analyse, inwieweit sich das dann niederschlägt und welche
  Faktoren zu Umfragewerten beitragen, sind andere berufen. Analysen gibt es hinreichend
  und Sie können sich da bedienen. Es ist momentan nicht an mir, hier Angebote zu
  machen. Herr Kornelius, in Brühl war davon die Rede, dass eine Steuerungsgruppe
  eingesetzt werden solle, was eine mögliche Zusammenarbeit zwischen Deutschland und
  Frankreich im Bereich der nuklearen Abschreckung angeht. Können Sie uns ein paar
  Details nennen? Wer ist in dieser Steuerungsgruppe, wie soll die aussehen, gibt
  es da einen Zeitplan? Können Sie uns da also ein bisschen mit hineinnehmen? Ich
  möchte auch direkt meine Nachfrage stellen: Herr Swistek, wenn jetzt eine Übung
  stattfindet und die Bundeswehr konventionell beteiligt wäre, was heißt das dann
  konkret? Wie kann man sich das vorstellen? Können Sie da ein Beispiel nennen? Gibt
  es genauere Informationen dazu? Steht jetzt eine Rafale in Nörvenich oder stehen
  da zwei? Wenn ja, was machen sie dann da? Sie werden verstehen, dass die Frage der
  strategischen Verteidigungsfähigkeit Frankreichs und die Mitnahme auch anderer Partner
  in Europa natürlich auch eine französische Thematik ist und dass wir da auch einer
  gewissen Zurückhaltung unterliegen, was die Kommentierung angeht. Es ist richtig,
  dass beschlossen wurde, eine Steuerungsgruppe einzurichten. Ziel ist es natürlich,
  die Abschreckung in Europa zu erhöhen. Es wird in der zweiten Jahreshälfte 2026
  eine Teilhabe der Bundeswehr mit konventionellen Kräften an einer nuklearen Übung
  der französischen Streitkräfte geben. All dies baut auf der gemeinsamen Erklärung
  auf, die Deutschland und Frankreich vergangenes Jahr in Toulon getroffen haben.
  Das hat einen zwingenden komplementären, ergänzenden Charakter in der Zusammenarbeit
  mit der NATO und der Abschreckungsdoktrin des Nordatlantischen Bündnisses. Für uns
  ist immer wichtig zu betonen, dass der Grundpfeiler unserer Sicherheit und unserer
  Abschreckung die Allianz bleibt. Insofern ist diese Dimension komplementär zu verstehen.
  Auch andere Nationen leisten ihren Beitrag zur nuklearen Abschreckung, zum Beispiel
  Großbritannien. Ansonsten kann ich zu der Übung mitteilen, dass sie in der zweiten
  Jahreshälfte stattfinden wird, dass der Umfang momentan geprüft wird und dass wir
  die Details kommunizieren werden, sobald auch die Planung der Franzosen fortgeschritten
  ist. Das ist im Prinzip der Rahmen, den ich Ihnen geben kann. Die Arbeitsgruppe
  unterliegt einer gewissen Vertraulichkeit. Sie wird sich natürlich regelmäßig treffen,
  um verschiedene Dimensionen dieser strategischen Abschreckung zu diskutieren und
  auch fortzuentwickeln. Aber wie gesagt, Details dazu sind auch der Natur dieses
  Sachverhalts entsprechend vertraulich. Zu der anstehenden Übung hat der Regierungssprecher
  jetzt schon ausführlich geredet. Falls Sie sich auf die Übung bezogen haben, die
  letzte Woche im Vorgriff des deutsch-französischen Ministerrats bzw. des Deutsch-Französischen
  Verteidigungs- und Sicherheitsrates gelaufen ist: Darüber haben wir auch mit der
  Luftwaffe ausführlich berichtet. Wir haben Verfahren der Interoperabilität mit den
  beiden teilnehmenden französischen Rafale-Flugzeugen durchgeführt, wir haben Betankungen
  durchgeführt. Das sind grundlegende Prozesse, die dort durchgeführt wurden und die
  man in der Zusammenarbeit beüben muss. Das können Sie auch in den Social Media sehen;
  denn dort haben wir verschiedenste Berichte darüber veröffentlicht. Was die rotierende
  Entsendung von Rafale-Flugzeugen betrifft, so gehört das zu den Dingen, die sich
  noch in der Klärung befinden. Darüber werden wir zu gegebener Zeit berichten. Beim
  deutsch-französischen Treffen ging es auch um die massiven Exporte chinesischer
  Autos aus dem stark subventionierten chinesischen Markt. Da hieß es, man sei dabei,
  gemeinsam eine Strategie zu entwickeln. In welche Richtung gehen dabei die Gedanken?
  Gibt es da schon konkrete Vorstellungen? Wie ist diesbezüglich generell die Stimmung
  in der Europäischen Union? Gibt es da viel Unterstützung? Sie wissen, dass Deutschland
  und die Europäische Union ihre Wettbewerbsfähigkeit und Innovationsfähigkeit steigern
  müssen. Das hat der Bundeskanzler seit Monaten im Europäischen Rat in Brüssel unterstrichen.
  Nur wenn wir wirtschaftlich resilient sind, sind wir auch stark. Dazu gehört natürlich
  auch eine pragmatische Handelspolitik. Europa und Deutschland profitieren, aber
  benötigen auch einen offenen und vor allem einen fairen Welthandel. Deswegen müssen
  wir uns vor marktverzerrenden Praktiken schützen und Ungleichgewichte ansprechen.
  Das gilt für alle Handelspartner und damit natürlich auch für China. Das haben wir
  mit unseren französischen Freunden letzte Woche beim deutsch-französischen Ministerrat
  nochmals unterstrichen. Der Bundeskanzler hat wörtlich gesagt: „Ich möchte keinen
  neuen Handelskonflikt mit China, aber ich möchte einen offenen Dialog über diese
  Ungleichgewichte. Diese Ungleichgewichte gehen zu Lasten unserer Industrie, und
  daran kann auch China im Grunde kein Interesse haben.“ Das ist die Grundlage, auf
  der jetzt eine Politik entsteht. Diese Politik entsteht in enger Abstimmung mit
  Frankreich, aber natürlich auch mit der Europäischen Kommission, die in Handelsfragen
  zuständig ist. Der politische Rahmen ist gesetzt. Gibt es dazu jetzt auch eine konkrete
  Arbeitsgruppe, die sich mit der Ausarbeitung einer Strategie beschäftigt? Ich habe
  nicht gesagt, dass es eine Strategie in diesem klassischen Sinn gibt. Es gibt eine
  politische Entwicklung. Diese politische Entwicklung wird von den Fachabteilungen,
  sowohl was Handelsfragen wie auch europapolitische Fragen angeht, vorangetrieben
  und auch über den Sommer hinweg verfolgt. An Herrn Harmsen: Der Kanzler hat auf
  dem deutsch-französischen Ministerrat sehr ausdrücklich ausgeführt, dass Währungsunterbewertungen
  des Yuan ein großes Problem in der Handelsbilanz seien, und er sagte, er habe auch
  auf der EU-Ebene schon mehrfach darauf gedrängt, dass man sich um dieses Thema kümmert.
  Was sagt der Finanzminister dazu? Sieht auch er diese Unterbewertungen um bis zu
  30 Prozent? Auch der Finanzminister hat sich am Freitag zu diesem Thema geäußert.
  Er hat sich auch vor Ort im Interview mit Phoenix auf eher allgemeiner Linie geäußert
  und gesagt, dass es in einer rauer gewordenen Welt gemeinsame Antworten braucht.
  Es geht um mehr europäische Souveränität und mehr Wettbewerbsfähigkeit. Er hat dabei
  auch den europäischen Kapitalmarkt angesprochen, und er hat noch einmal die von
  ihm gemeinsam mit dem französischen Finanzminister Roland Lescure ins Leben gerufene
  Initiative der sechs größten Volkswirtschaften der EU angesprochen, die sich regelmäßig
  treffen und an einem Tisch zusammensitzen, um Elemente zu diskutieren. Da spielen
  solche Fragen sicherlich eine Rolle. Im Detail kann ich Ihnen jetzt von hier aus
  aber keinen Stand oder keine konkreten Maßnahmen ankündigen. Als Finanzminister
  ist er ja für dieses Thema zuständig. Deswegen war meine Erwartung eigentlich, dass
  er diesen Ball jetzt konkret aufnimmt und vielleicht Gespräche mit Peking oder mit
  Brüssel führt. Die Europäische Zentralbank hat dabei natürlich eine tragende Rolle.
  Wie gesagt, diese Themen spielen gerade im Dialog der E6, aber auch insgesamt im
  Gespräch der europäischen Finanzministerinnen und Finanzminister eine Rolle. Aber
  wie gesagt, wenn Sie nach konkreten Schritten fragen, habe ich Ihnen von hier aus
  heute nichts anzukündigen. Herr Kornelius, die Spritpreise sind wieder deutlich
  gestiegen. Der Benzinpreis liegt schon wieder über dem Stand vor dem Tankrabatt.
  Wann ist aus Sicht der Bundesregierung der Zeitpunkt für weitere Entlastungsmaßnahmen
  gekommen? Die Bundesregierung hat keinen Zeitplan für Entlastungsmaßnahmen. Die
  Bundesregierung hat sich dazu geäußert. Wir sehen nun häufig Schwankungen, die je
  nach Angriffslage in der Straße von Hormus wohl auch anhalten werden. Deswegen denke
  ich, dass wir mit dieser Situation noch eine Weile leben müssen. Habe ich das richtig
  verstanden: Momentan sind keine Entlastungsmaßnahmen wie der Tankrabatt, der von
  Anfang Mai an galt, geplant? Die Bundesregierung hat die Entlastungsmaßnahmen beendet.
  Momentan sind keine neuen Entlastungsmaßnahmen geplant. Herr Kornelius, da es im
  Mai die Entlastungsmaßnahmen gab und es sie jetzt nicht mehr gibt, Sie aber so argumentieren,
  dass man jetzt noch eine Weile damit leben müsse: Würden Sie im Nachhinein sagen,
  dass es ein Fehler war, zu diesem kurzfristigen Entlastungsmoment beigetragen zu
  haben, der ja doch sehr viel Geld gekostet hat? Auch damals gab es ja Warnungen,
  dass das eigentlich keine langfristige Maßnahme sein könnte. Was hat die damalige
  Senkung der Benzinpreise gebracht? Die damalige Entlastung hat zu einer Beruhigung
  und zu Berechenbarkeit beigetragen. Darüber hinaus kann ich jetzt keine Kommentierung
  abgeben, was für die Zukunft geplant ist. Wenn der damalige Tankrabatt für Beruhigung
  sorgen sollte: Warum soll jetzt keine Beruhigung stattfinden? Ich glaube, dass momentan
  keine Notwendigkeit besteht, über eine neue Maßnahme zu reden. Die Bundesregierung
  wird die Lage genau beobachten. Ansonsten habe ich gesagt, dass es momentan keine
  Planung gibt. Das können Sie beurteilen. Ich halte die Lage am Golf für weiterhin
  angespannt. Die Bundesregierung dringt darauf, dass es dort zu einer Beruhigung
  kommt, dass die Kriegsparteien zu einem Ende der Kampfmaßnahmen beitragen und dass
  die Straße von Hormus geöffnet wird. Die politischen Forderungen bleiben also unverändert.
  Der Tankrabatt sollte ja zur Beruhigung in Deutschland beitragen ‑ darauf bezog
  sich die Frage. Zur Beruhigung der Märkte. Zur medialen Beruhigung kann ich nichts
  beisteuern. Herr Swistek, mit den größten Ausgaben für die Bundeswehr und für die
  Rüstungsindustrie stellt sich die Frage, ob das Bundesministerium der Verteidigung
  eine langfristige strategische Teilhabe an Schlüsselunternehmen der Rüstungsindustrie
  ‑ Stichwort KNDS, TKMS, Rheinmetall ‑ als eine gute Politik ansieht. Sehen Sie es
  so, dass das für Ihre Planungssicherheit bei Großvorhaben oder für den Erhalt von
  Schlüsseltechnologien wichtig ist? Zur Frage von KNDS haben wir uns hier schon ausführlich
  geäußert. Natürlich ist die Rüstungsindustrie ein wichtiger Bestandteil und ein
  wichtiges Bindeglied für unseren Aufwuchs. Den Aufwuchs als Streitkräfte führen
  wir derzeit materiell und personell durch. Das ist aus der äußeren Bedrohungslage
  abgeleitet. Wir sind im engen Austausch mit der Industrie. Aber wenn Sie Fragen
  nach einer Beteiligung der Bundesregierung bei Rüstungsunternehmen haben, dann bin
  ich dafür der falsche Ansprechpartner. Dann muss die Bundesregierung gefragt werden.
  Meine Frage bezieht sich eher auf die Sicht des Bundesministeriums der Verteidigung
  selbst. Hielten Sie es für eine gute Idee, wenn das so stattfinden könnte? Zu spekulativen
  Fragen äußern wir uns nicht; haben Sie Verständnis dafür. Ich kann für das Bundeswirtschaftsministerium
  noch einmal auf den Koalitionsvertrag hinweisen, in dem festgelegt ist, dass eine
  Beteiligung an Schlüsselunternehmen der Sicherheits- und Verteidigungsindustrie
  von strategischer Bedeutung sein kann, um die Verteidigungsinteressen Deutschlands
  zu sichern. Das heißt, eine grundsätzliche Festlegung gibt es im Koalitionsvertrag.
  Über Einzelfälle spekulieren wir hier nicht bzw. informieren wir dann, wenn sie
  anstehen. Herr Wentzel, am Freitagabend kam der Referentenentwurf zum EEG . Bezüglich
  kleiner Solaranlagen auf Dächern gibt es darin zwar eine Abschwächung der vorherigen
  Position, aber dennoch gibt es nach wie vor breite Kritik an den Einschnitten, vor
  allem mit Blick auf diese kleinen Solaranlagen. Können Sie die Position der Ministerin,
  warum es zu diesen Einschnitten kommen soll, noch einmal erläutern? Ja, sehr gern.
  In der Tat konnten wir die Länder- und Verbändeanhörung zum EEG und zum Netzanschlusspaket
  am Freitag einleiten. Das sind zwei ganz entscheidende Gesetze, mit denen wir die
  Energiewende weiter vorantreiben. Sie wissen vielleicht, dass wir einen Anteil der
  Erneuerbaren im deutschen Stromsystem von über 50 Prozent haben. Ich glaube, 58 Prozent
  waren es in der letzten Statistik. Das heißt, wir sind seit Einführung des EEG vor
  mittlerweile 20 Jahren schon einen guten Schritt vorangekommen. Aber wie es solch
  ein nun einmal Fördersystem an sich hat, muss es auch dauerhaft an die Umstände
  angepasst werden. Die Ministerin hat seit Beginn der Legislaturperiode klargemacht,
  dass es einen Realitätscheck braucht ‑ wir haben ihn dann mit dem Energiewendemonitoring
  durchgeführt ‑, dass wir Überförderung abschaffen und mehr auf den Markt setzen
  müssen. Die Erneuerbaren sind in gewisser Hinsicht erwachsen geworden und müssen
  sich dann auch den Anforderungen des Strommarkts stellen. Das heißt, man muss dann
  liefern können, wenn es eine Nachfrage im Markt gibt, und nicht darauf setzen, immer
  dann, wenn die Sonne gerade scheint oder der Wind gerade weht, eine Abnahme zu staatlich
  garantierten Festpreisen zu finden. Zu den von Ihnen angesprochenen kleinen Solaranlagen:
  Dazu hatten wir uns in den vergangenen Monaten teilweise schon geäußert. Die klassische
  Dach-PV auf dem Eigenheim rechnet sich heutzutage dadurch, dass man Strombezug aus
  dem Netz vermeidet. Das heißt, man hat am Ende des Monats bzw. am Ende des Jahres
  eine geringere Stromrechnung, insbesondere in Kombination mit aufkommenden Technologien
  wie Wärmepumpen, Elektromobilität oder kleinen Batteriespeichern, die auch in vielen
  Eigenheimen mittlerweile Anwendung finden. Wenn sich diese Investitionen also auch
  so schon amortisieren, dann ist es nicht erforderlich, dass der Staat noch Steuergeld
  dazu gibt, das am Ende ja von allen Bürgerinnen und Bürgern über die Steuern eingesammelt
  wurde. Teilen Sie also die Analyse des Bundesverbands Solarwirtschaft nicht, dass
  das zu einem völligen Einbruch der Zahlen bezüglich des Einbaus dieser Dach-PV führen
  werde? Wie Sie vielleicht gesehen haben, enthält der jetzt in die Anhörung gegebene
  Entwurf Übergangsfristen. Die Einspeisevergütung soll in den nächsten Jahren langsam
  abschmelzen. Danach müssen die Anlagen ihren Strom, wenn Sie ihn ins Netz geben
  wollen, direkt oder über ein Vermittlungsunternehmen an den Strommarkt bringen.
  Dann gibt es auch noch vier Jahre lang einen Bonus, um diesen Übergang zu vereinfachen.
  Wir denken, dass wir damit ein sehr ausgewogenes Angebot machen und gehen davon
  aus, dass der Ausbau weitergeht. Herr Kornelius, welche Erwartungen hat die Bundesregierung
  an Andy Burnham, den neuen britischen Premierminister ? Zunächst einmal wird die
  Bundesregierung dem Premier ‑ mit Blick auf die Uhr wurde er vielleicht momentan
  gerade ernannt ‑ nach seiner Ernennung gratulieren und ihm alles Gute und ein gutes
  Gelingen hinsichtlich der anstehenden Aufgaben wünschen. Wir werden dann ein Glückwunschtelegramm
  veröffentlichen. Es wird einen sehr engen Kontakt geben. Die Erwartung ist, dass
  Deutschland und Großbritannien das sehr gute Verhältnis, das sie miteinander pflegen,
  die enge Verbindung, die Partnerschaft, die Freundschaft weiter ausbauen, dass sie
  auf dem aufbauen, was bisher geleistet wurde. Die Zusammenarbeit mit Keir Starmer
  war exzellent. Daran möchte man nahtlos anschließen. Wir haben 2025 den Kensington-Vertrag
  geschlossen. Das ist quasi das Fundament der Beziehungen, auch gerade nach dem Brexit.
  Auf diesem Vertrag aufbauend, freut sich der Bundeskanzler auf die Zusammenarbeit
  und auf die erste Begegnung mit Herrn Burnham. Rechnen Sie damit, dass sich das
  Vereinigte Königreich unter Burnham weiter an die EU annähern wird? Ich spekuliere
  nicht. Das sind innerbritische Entscheidungen. Wir werden sie natürlich eng begleiten
  und beobachten, aber alles, was die Zusammenarbeit zwischen Großbritannien und der
  Europäischen Union und Deutschland fördert, wird Unterstützung finden. Herr Kornelius,
  haben Sie schon Zusagen von Herrn Burnham, dass er das E3-Format, das unter Starmer
  doch relativ wichtig geworden ist, weiterführen wird? Herr Burnham muss erst einmal
  das Amt antreten. Ich denke, er wird die ersten Tage nutzen, um seine Mitarbeiter
  zu benennen und die Regierung aufzubauen. Dann wird es einen Kontakt geben, und
  dann werden wir auch inhaltlich sprechen. Rechnen Sie damit, dass er noch diese
  Woche nach Berlin kommt? Ich würde einen Besuch ankündigen, wenn er anzukündigen
  ist. Herr Burnham gilt als noch entschiedenerer Befürworter einer Rückkehr Großbritanniens
  in die EU. Haben Sie die Hoffnung, dass mit dem neuen Premierminister der Weg zurück
  in die EU wahrscheinlicher wird? Sie wissen, dass das im Kern eine innerbritische
  Entscheidung ist: die Gestaltung der Beziehungen zu den Partnern, zur Europäischen
  Union in Handelsfragen und darüber hinaus. Ich habe eben gesagt, dass wir alles
  unterstützen, was die Zusammenarbeit stärkt und intensiviert, und dazu gehört auch
  die Verbindung zur Europäischen Union.'
