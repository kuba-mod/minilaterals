title: Im Kabinett beschlossen Digitales Pass- und Ausweiszentralregister beschlossen
text: Im neuen digitalen Register werden alle ausgegebenen Reisepässe, Personalausweise
  sowie eID -Karten gespeichert. Das Bundeskabinett hat Eckpunkte für ein zentrales
  Pass- und Ausweisregister auf Bundesebene beschlossen. Damit entfällt die Registerführung
  bei über 6.000 Pass- und Ausweisbehörden in den Kommunen und bei den Auslandsvertretungen
  des Auswärtigen Amtes. Was bedeutet das konkret? Die Aufgabe der Führung des Zentralregisters
  wird dem Bund übertragen. Die Bundesdruckerei wird das Register als Beliehene führen.
  Denn dort werden die Aufträge bereits heute für die Pass- und Ausweisbehörden bearbeitet.
  Im Dokumentenregister werden alle ausgegebenen und unter Beachtung der Löschfrist
  gültigen Reisepässe, Personalausweise sowie eID -Karten nachgewiesen. Dazu gehören
  auch die von den Pass- und Ausweisbehörden dezentral erstellten vorläufigen beziehungsweise
  Ersatzdokumente. Die Speicherung umfasst sowohl die zentral bei der Bundesdruckerei
  produzierten, regulären Dokumente als auch dezentrale, von den Pass- und Ausweisbehörden
  vor Ort ausgestellte, vorläufige Reisepässe und Personalausweise, mit längstens
  einem Jahr Gültigkeit. Ausgenommen ist der biometrische Fingerabdruck, der wie bislang
  ausschließlich dezentral auf dem Chip des Ausweisdokuments gespeichert wird. Durch
  ein neues digitales und zentrales Antragsportal, das das Zentralregister ergänzt,
  soll es Bürgerinnen und Bürger ermöglicht werden, künftig ihre Neubeantragungen
  von Pässen und Ausweisen online vornehmen. Ein Besuch in der Behörde vor Ort ist
  dann lediglich noch für die Abgabe der biometrischen Daten erforderlich. Dies betrifft
  dann beispielsweise die Abgabe von Lichtbildern oder Fingerabdrücken. Die Bundesregierung
  setzt damit ein weiteres Vorhaben zur deutlichen Entlastung der Bürgerinnen und
  Bürger um und bringt das Pass- und Ausweisrecht auf einen modernen digitalen Stand.
  Auf Grundlage der beschlossenen Eckpunkte wird der entsprechende Gesetzentwurf bis
  zum Jahresende eingebracht.
