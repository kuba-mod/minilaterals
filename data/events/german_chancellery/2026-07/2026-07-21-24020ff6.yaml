date: '2026-07-21'
type: press_release
source_name: german_chancellery
title: Pressekonferenz von Bundeskanzler Merz und Aserbaidschans Präsidenten Alijew
  Berlin und Baku bauen Partnerschaft aus
text: 'Bei dem Besuch Alijews wurde auch eine Erklärung zwischen Deutschland und Aserbaidschan
  über eine strategische Agenda der bilateralen Partnerschaft unterzeichnet. Der 2025
  zwischen Aserbaidschan und Armenien geschlossene Friedensvertrag sei historisch
  und eröffne die Chance, diesen Jahrzehnte währenden Konflikt zu überwinden, betonte
  Bundeskanzler Friedrich Merz bei der Pressekonferenz mit Aserbaidschans Präsident
  Ilham Alijew. Von Frieden, Sicherheit und Stabilität im geopolitisch so wichtigen
  Südkaukasus würden auch Deutschland und die EU profitieren. „Was immer wir dazu
  beitragen können aus deutscher und europäischer Sicht, werden wir tun“, sagte der
  Kanzler nach dem Empfang des aserbaidschanischen Präsidenten im Bundeskanzleramt.
  Joint Declaration on a Strategic Agenda for the Bilateral Partnership between the
  Federal Republic of Germany and the Republic of Azerbaijan Meine Damen und Herren,
  herzlich willkommen. Ich freue mich, dass ich heute den Staatspräsidenten von Aserbaidschan,
  Ilham Alijew, in Berlin herzlich willkommen heißen darf. Wir holen heute Ihren Besuch
  nach, den wir schon für den März des laufenden Jahres geplant hatten. Wir mussten
  ihn wegen des Irankriegs verschieben. Das zeigt auch: Unsere Länder können sich
  in diesen Tagen großen Krisen und Kriegen nicht entziehen. Dies gilt für den Nahen
  und Mittleren Osten, dies gilt aber auch für den russischen Angriffskrieg gegen
  die Ukraine. Deutschland und Aserbaidschan sind von diesen Kriegen massiv in ihren
  sicherheitspolitischen und wirtschaftlichen Interessen getroffen. So unterschiedlich
  beide Konflikte im Einzelnen auch sind: Wir setzen uns überall für Verhandlungslösungen
  ein. Dabei leitet uns die Überzeugung, dass nur Verhandlungslösungen am Ende dauerhaft
  Frieden, Sicherheit und Stabilität bringen werden. Herr Präsident, Frieden, Sicherheit
  und Stabilität brauchen wir auch im Südkaukasus. Deutschland und die Europäische
  Union haben jedes Interesse daran, dass diese geopolitisch so wichtige Region zur
  Ruhe kommt. Herr Präsident, wir begrüßen Sie aus diesem Grunde besonders herzlich
  in Deutschland und beglückwünschen Sie zu dem Friedensvertrag, den Sie zwischen
  Aserbaidschan und Armenien besiegelt haben. Dies ist ein historischer Vertrag, und
  dieser historische Vertrag eröffnet die Chance, einen über Jahrzehnte währenden
  Konflikt zu überwinden. Was immer wir dazu vonseiten Deutschlands und Europas beitragen
  können, werden wir gern tun; denn eine größere Stabilität in der Region eröffnet
  auch neue Möglichkeiten für die verstärkte wirtschaftliche Zusammenarbeit unserer
  beiden Länder. Ich bin sehr froh, dass sich die Beziehungen unserer Länder dynamisch
  entwickeln. Präsident Steinmeier hat im Frühjahr 2025 als erstes deutsches Staatsoberhaupt
  Aserbaidschan besucht. In diesem Jahr findet ein intensiver Parlamentsaustausch
  statt. Wir legen heute mit der Zeichnung einer gemeinsamen Erklärung einen Grundstein
  für den Ausbau unserer Beziehungen. Zugleich wird heute – und Sie sind Teilnehmer
  dieser Zeremonie gewesen – die Gründung eines deutsch-aserbaidschanischen Wirtschaftsrats
  vereinbart. Das ist ein wichtiges Signal an die Unternehmen in beiden Ländern: Es
  ist uns ernst mit dem Ausbau der Beziehungen zwischen Deutschland und Aserbaidschan.
  Besondere Bedeutung hat auch vor dem Hintergrund der andauernden Krise im Mittleren
  Osten die Zusammenarbeit bei der Versorgung mit Erdöl und Erdgas über den südlichen
  Gaskorridor. Herr Präsident, wir haben ausführlich darüber gesprochen: Wir wollen
  hier unsere Energieversorgung mit Aserbaidschan weiter diversifizieren. Wir haben
  heute auch über den Ausbau von erneuerbaren Energien sowie über Wasserstoff gesprochen.
  Wir sind außerdem in konstruktiven Gesprächen zu einem Vorschlag Aserbaidschans
  für ein Investitionsprogramm. Dieses Programm könnte auch deutschen Firmen in Aserbaidschan
  neue Chancen eröffnen. Der Südkaukasus gewinnt auch als Verbindung zwischen Europa
  und Asien an Bedeutung. Neue Verkehrs- und Handelskorridore schaffen wirtschaftliches
  Potenzial, das wir gemeinsam heben wollen. Herr Präsident, Sie wissen es: Gerade
  für kleine und mittelständische Unternehmen sind Investitionen über große Distanzen
  häufig nicht einfach. Entscheidend sind immer auch die richtigen Rahmenbedingungen
  vor Ort. Auch hierüber haben wir heute gesprochen. Durch die beiden gemeinsamen
  Erklärungen des heutigen Tages sind wir einen großen Schritt weitergekommen. In
  diesem Sinne, Herr Präsident, noch einmal herzlichen Dank für Ihren Besuch in Berlin
  heute, und auf weiter gute Zusammenarbeit zwischen Aserbaidschan und Deutschland.
  Danke, Herr Bundeskanzler. – Zunächst vielen herzlichen Dank für die Gastfreundschaft
  und dafür, dass Sie mich zu diesem offiziellen Besuch eingeladen hatten. Ich bedanke
  mich dafür sehr herzlich. Ich bin sehr erfreut, noch einmal bei Ihnen in Ihrem Land
  zu sein. Ich bin mir sicher, dass die heute unterzeichneten Dokumente unsere Beziehungen
  auf ein neues Niveau heben werden. Der strategische Dialog wird jetzt beginnen;
  das hatten wir uns erwünscht und haben es heute auch erreicht. Zur Erweiterung der
  wirtschaftlichen Beziehungen zwischen unseren Ländern wurden heute Dokumente unterzeichnet.
  Ich bin mir sicher, dass der gemeinsame Wirtschaftsrat gut funktionieren wird und
  gute Erfolge erzielen wird. Unsere bilaterale Agenda ist ziemlich breit; das haben
  wir sowohl unter vier Augen als auch gemeinsam besprochen. Deutschland ist eine
  der führenden Wirtschaftsmächte der Europäischen Union und übt auch Einfluss im
  Südkaukasus aus. Die deutsch-aserbaidschanischen Beziehungen bestehen aber nicht
  nur aus bilateralen Beziehungen, sondern auch aus Beziehungen zur gemeinsamen Region,
  was einen enormen Beitrag zur Entwicklung leistet. Viele deutsche Firmen sind erfolgreich
  in Aserbaidschan tätig ‑ über 200 deutsche Firmen sind in Aserbaidschan aktiv. Ich
  bin mir sicher, dass sich diese Zahl weiter erhöhen wird und dass die deutschen
  Firmen in Aserbaidschan noch aktiver werden, was gemeinsame Investitionen betrifft.
  Dafür werden wir auch konkrete Vorschläge unterbreiten. Sie haben auch von der Zusammenarbeit
  im Energiebereich gesprochen. Auch in diesem Bereich haben wir Erfolge erzielt.
  Ab diesem Jahr wird das aserbaidschanische Erdgas auch nach Deutschland importiert.
  Damit wird das aserbaidschanische Erdgas heute in zehn Mitgliedstaaten der Europäischen
  Union geliefert, was natürlich ein enormer Beitrag zur Energiesicherheit ist. Aserbaidschan
  exportiert auch eigenes Erdöl nach Deutschland, und in Zukunft wird auch sogenannte
  grüne Energie in die EU beziehungsweise nach Europa exportiert. Die Zusammenarbeit
  im Bereich der Energiesicherheit wird also sehr breit sein. Auch der Bereich der
  Transitverbindungen hat eine große Bedeutung für die deutsch-aserbaidschanischen
  Beziehungen, und die deutschen Firmen erzielen Erfolge in diesem Bereich. Aserbaidschan
  vervollständigt seine Transportinfrastruktur. Aserbaidschan ist auch ein Mitglied
  des Konsultationsrates in Zentralasien geworden, und mit diesem Schritt ist Aserbaidschan
  in gewisser Weise zu einer Brücke zwischen Zentralasien und Europa geworden. Dadurch
  wird die Rolle Aserbaidschans in diesem Bereich weiter wachsen. Wir haben in vielen
  Bereichen konkrete Aktionspläne erarbeitet. Auch im Zusammenhang mit der heutigen
  Erklärung haben wir konkrete Maßnahmen vorbereitet. Es werden einige Arbeitsgruppen
  gebildet, damit die heute unterzeichneten Dokumente so schnell wie möglich umgesetzt
  werden. Ich möchte mich auch für den Beitrag Deutschlands zum Friedensprozess im
  Südkaukasus bedanken. Nach langen Jahren normalisieren sich die aserbaidschanisch-armenischen
  Beziehungen wieder. Die Paraphierung des Friedensabkommens in Anwesenheit des US
  -Präsidenten Donald Trump und die Tatsache, dass wir in Washington auch eine gemeinsame
  Erklärung unterzeichnet hatten, haben einem Konflikt ein Ende gesetzt, der mehr
  als 30 Jahre angedauert hat. Aserbaidschan hat gleich nach der Unterzeichnung dieses
  Abkommens tatkräftige Schritte eingeleitet. Heute bekommt Armenien aus Aserbaidschan
  sowohl Diesel als auch Benzinprodukte. Das ist ein großer Beitrag zur Energiesicherheit
  Armeniens. Beim Export und Import von Erdölprodukten gibt es aus gewissen Gründen
  gewisse Probleme; das müssen wir auch berücksichtigen. Gleichzeitig erweitert sich
  der Transport oder der Transit von Waren über aserbaidschanisches Territorium nach
  Armenien enorm. Die Transitwaren werden also über aserbaidschanisches Territorium
  nach Armenien gefahren. Wir erleben gerade nach vielen Jahren, in denen sich aserbaidschanische
  Gebiete unter Besatzung befanden, eine historische Phase. Aserbaidschan hat der
  Besatzung mit eigener Kraft ein Ende gesetzt. Aserbaidschan hat die vier Resolutionen
  des UN -Sicherheitsrates selbstständig verwirklicht, hat Armenien einen Frieden
  vorgeschlagen und hat eine positive Rückmeldung erhalten. In diesem Bereich spielen
  Deutschland und die deutsche Regierung eine große Rolle. Wir schätzen das sehr hoch,
  auch das deutsche Außenministerium. In den Verhandlungen gab es Treffen auf dem
  Niveau der Außenminister. Abschließend möchte ich gerne über die Beziehungen zwischen
  der EU und Aserbaidschan sprechen. Wir haben in diesem Jahr den Präsidenten des
  EU -Rates, Herrn Costa, und auch die Kommissionspräsidentin, Frau von der Leyen,
  in Aserbaidschan zu Besuch gehabt. Diese Besuche waren enorm wichtig. Sie haben
  dazu beigetragen, dass sich die Beziehungen zwischen der EU und Aserbaidschan verstärkt
  haben. Dass Deutschland eine führende Rolle unter den Mitgliedstaaten der EU spielt,
  spricht auch dafür, dass Deutschland in den europäisch-aserbaidschanischen Beziehungen
  eine große Rolle spielt, und ich bin mir sicher, dass Deutschland auch in Zukunft
  eine große Rolle dabei spielen wird. Noch einmal vielen Dank, Herr Bundeskanzler,
  für die Einladung! Danke dafür! Ich lade Sie auch gerne zu einem offiziellen Besuch
  nach Aserbaidschan ein. Frage: Ich habe eine Frage zum russischen Krieg gegen die
  Ukraine. Herr Bundeskanzler, vor wenigen Tagen gab es Meldungen in deutschen Medien
  darüber, dass es ein informelles deutsch-russisches Treffen in Baku gab, bei dem
  auch ehemalige hochrangige Politiker aus Regierungsparteien teilgenommen haben sollen.
  Über die Ergebnisse wird nicht berichtet. Es gibt hier in Berlin zwei Meinungen
  dazu, auch in Fachkreisen. Die einen sagen, solche Treffen seien als eine Art von
  „ back channel “ nützlich, sie könnten nicht schaden. Es gibt auch Kritiker, die
  sagen, das sei kontraproduktiv, weil das Russland ein Signal der Schwäche vermitteln
  könnte. Wie sehen Sie das? Herr Präsident, Sie haben vor Kurzem gesagt, die Beziehungen
  zwischen Aserbaidschan und Russland seien wieder völlig normalisiert worden. Was
  würden Sie dem russischen Präsidenten Wladimir Putin empfehlen, um den Krieg Russlands
  gegen die Ukraine zu beenden? Bundeskanzler Merz: Ich kann darauf eine ganz einfache
  Antwort geben: Mir ist von einem solchen Treffen nichts bekannt. Wir machen ja seit
  Monaten den Versuch, Präsident Putin zu einem Gespräch zu bewegen. Wir haben zusammen
  mit der Ukraine mehrfach auch auf der europäischen Ebene Gesprächsangebote vorgelegt.
  Präsident Putin weigert sich, zu solchen Gesprächen zu kommen. Insofern wiederhole
  ich, was ich auch in den letzten 14 Monaten von dieser Stelle aus leider immer wieder
  sagen musste: Es liegt allein an der russischen Regierung und am russischen Präsidenten,
  diesen Krieg zu beenden, und es liegt allein an ihm, in Gespräche und gegebenenfalls
  in Friedensverhandlungen einzutreten. Er weigert sich beharrlich, das zu tun, und
  solange er das tut, gibt es keine andere Möglichkeit, als der Ukraine in ihrem Überlebenskampf
  gegen die russische Aggression weiter zu helfen. Wir werden das tun. Wir werden
  das europäisch abgestimmt tun. Ich bin Präsident Alijew sehr herzlich dankbar, dass
  er diesen Krieg, die Ursache, den Verlauf und ein mögliches Ende dieses Krieges
  genauso einschätzt, wie ich es gerade hier gesagt habe. Präsident Alijew: Bezüglich
  des genannten Treffens, das in Baku stattfand, kann ich nur sagen: Wir haben die
  Informationen darüber aus der Zeitung „ Times “ erfahren. Wir hatten auch keine
  Informationen darüber gehabt. Aber die „ Times “ ist ein angesehenes Presseorgan,
  und wir haben das untersucht. Gestern, vor meiner Reise nach Berlin, habe ich vom
  aserbaidschanischen Grenzschutz eine Information darüber erhalten, ob die Personen,
  die in der „ Times “ erwähnt wurden, gleichzeitig in Aserbaidschan waren oder nicht.
  Ich kann Ihnen sagen: Ja, diese Information hat sich bestätigt. Am 12. Juli kamen
  zwei bekannte Personen mit dem Flug von Berlin nach Baku. Die eine war der frühere
  Verwaltungsadministrator Herr Pofalla, und die andere war Herr Platzeck. Die waren
  in Aserbaidschan zu Besuch, und sie sind dann am 14. Juli von Baku nach Berlin zurückgereist.
  Gleichzeitig kamen am 12. Juli der ehemalige Ministerpräsident Russlands, Herr Subkow,
  und der Leiter des Zivilgesellschaftsrates, Herr Fadejew, von Moskau nach Baku,
  der eine am 13., der andere dann am 14., und sie kehrten wieder nach Moskau zurück.
  Wir haben darüber keine Informationen erhalten, weder aus Russland noch aus Deutschland.
  Unser Gebiet wurde ohne unsere Informationen für so ein Treffen benutzt. Ich kann
  auch nichts darüber sagen, weil wir bei diesem Treffen nicht dabei waren. Aber diese
  Fluginformationen geben mir die Möglichkeit, zu sagen, dass ein geheimes Treffen
  in Baku stattgefunden hat. Wenn dieses Treffen zum Ende des Krieges zwischen Russland
  und der Ukraine beitragen sollte, können wir das nur begrüßen. Was Ihre zweite Frage
  angeht: Ich berate nur dann, wenn mein Rat verlangt wird und darum gebeten wird.
  Ich war vor Kurzem in Şuşa in Bergkarabach beim Global Media Forum. Ich habe dort
  eine Frage erhalten. Ich habe dort gesagt: In jedem Fall soll der Krieg schnell
  zu Ende gebracht werden. Es ist unser Ziel, dass dieser Krieg so schnell wie möglich
  zu Ende geht und dass in der Region wieder Friede herrscht. Bundeskanzler Merz:
  Wir haben genau darüber gesprochen. Wir haben auch dies zum Gegenstand unserer gemeinsamen
  Erklärung gemacht. Ich habe von Präsident Alijew ausgesprochen interessante Informationen
  über den Aufbau dieser Infrastruktur bekommen. Wir wollen versuchen, in den nächsten
  Jahren gerade die Zusammenarbeit im Bereich der Energieversorgung zu intensivieren.
  Wir haben aus deutscher Sicht ein hohes Interesse daran, unsere Gasimporte zu diversifizieren.
  Ich habe das in meinem Eingangsstatement gesagt. Aserbaidschan ist eines der wenigen
  Länder in der Region mit einem Überschuss an Energie. Es erzeugt also mehr, als
  es selbst verbraucht. Insofern ist Aserbaidschan für uns ein interessantes Partnerland,
  wenn es darum geht, auch die Energieversorgung in Deutschland sicherzustellen. Das
  würde insbesondere den Süden Deutschlands betreffen, weil die Infrastruktur bis
  dorthin ausgebaut ist oder ausgebaut werden kann. Insofern war das ein interessantes
  Gespräch. Es eröffnet auch neue Perspektiven in der Zusammenarbeit zwischen Aserbaidschan
  und Deutschland. Frage: Herr Präsident, können Sie sagen, in welchem Volumen Aserbaidschan
  bereit, in der Lage und willens wäre, Gas und Öl nach Deutschland zu liefern? Anfang
  des Jahres hat es angefangen, aber darin steckt wahrscheinlich noch sehr viel mehr
  Potenzial. In welchen Größenordnungen denken Sie? Herr Bundeskanzler, wann werden
  Sie einen Vorschlag für die Nachfolge von Herrn Spahn machen? Wird es noch diese
  Woche sein? Befürworten Sie, dass Herr Spahn sein Mandat im Bundestag behält? Präsident
  Alijew: Was die Erdölversorgung angeht, kann ich Folgendes sagen: Unser Wirtschaftsvolumen
  betrug ungefähr 1,5 Milliarden Dollar. Ein großer Teil davon war der deutsche Import
  nach Aserbaidschan. Der Rest war aserbaidschanischer Import. Am aserbaidschanischen
  Import hatte Rohöl einen großen Anteil. Die Erdöllieferungen umfassten ein Volumen
  von einigen hundert Millionen. Aserbaidschan kann sehr viel dazu beitragen, Deutschland
  ausreichend mit Erdöl zu versorgen. Dabei gibt es keine Probleme. Was Erdgas angeht,
  haben wir in diesem Jahr damit begonnen, Deutschland Erdgas zu liefern. Wir hatten
  im vergangenen Jahr eine Gesamtausfuhr von Erdgas in Höhe von 25 Milliarden Kubikmetern.
  Davon ging ein großer Teil nach Europa. Wir haben einen Vertrag mit deutschen Firmen
  über eine Dauer von zehn Jahren abgeschlossen. Nach Deutschland werden 1,5 Milliarden
  Kubikmeter Erdgas geliefert. Wir können die Importmenge natürlich erhöhen, aber
  dafür müssen wir Anfragen bekommen. Aber auch die vorhandenen Erdgasinfrastrukturen
  müssen erweitert werden. Sowohl die Erdgaspipeline TAP als auch die Erdgaspipeline
  TANAP arbeiten mit voller Stärke. Wir brauchen jetzt neue Verbindungen und neue
  Pipelines. Dafür brauchen wir auch Mittel für Investitionen, die getätigt werden
  sollen. Die europäischen Banken, insbesondere die Europäische Investitionsbank,
  haben wegen der sogenannten grünen Projekte ihre Unterstützung für Erdgas- und Erdölprojekte
  gestoppt. Diese Infrastruktur muss erst einmal erweitert werden. Wir brauchen dann
  Kredite von anderen Quellen. Es wäre natürlich nicht schlecht, wenn die europäischen
  Banken ihre diesbezügliche Entscheidung überdächten, insbesondere wenn wir berücksichtigen,
  dass sich die Krise im Nahen Osten heutzutage leider vertieft und die bisherigen
  Lieferketten dadurch zum Erliegen kommen. Auch die russischen Erdöl verarbeitenden
  Werke werden zerstört und gehen außer Betrieb, und Russland kann die natürlichen
  Partner nicht mit genügend Erdgas und Erdöl versorgen. All diese Ketten von Problemen
  gehen weiter. Ich denke, dass wir die grüne Agenda natürlich nicht vergessen dürfen,
  aber gleichzeitig sollten die europäischen Banken ihre Entscheidungen überdenken,
  damit die Erdgas- und Erdölprojekte, die Infrastrukturprojekte, wieder in Betrieb
  genommen werden und auch die Investitionsmittel dafür zur Verfügung gestellt werden.
  In diesem Fall kann Aserbaidschan die eigene Ausfuhr von Erdgas und Erdöl nach Europa
  und nach Deutschland zunehmend erhöhen. Bundeskanzler Merz: Zum Thema des Fraktionsvorsitzes:
  Wir werden nächsten Mittwoch mit einer Sondersitzung der Bundestagsfraktion die
  Wahlen hier in Berlin durchführen. Der Parteivorsitzende der CSU und ich, wir haben
  verabredet, der Fraktion zeitnah einen entsprechenden Vorschlag zu unterbreiten.
  Wir stehen dazu aber auch in Gesprächen mit der Bundestagsfraktion. Ich habe heute
  Morgen mit den Landesgruppenvorsitzenden eine ausführliche Videokonferenz abgehalten.
  Wir hören also in die Fraktion hinein, was auch ihre Anforderungen und Wünsche sind.
  Insofern werden wir uns damit noch etwas Zeit lassen, aber wir werden einen gemeinsamen
  Vorschlag machen. Im Hinblick auf die berufliche und politische Zukunft von Jens
  Spahn kann ich zunächst sagen: Ich weiß nicht, was er selbst vorhat. Wenn er darüber
  gern sprechen will, dann tue ich das selbstverständlich. Aber ich werde ihm keine
  Ratschläge geben, und ich werde sie ganz sicher auch nicht öffentlich geben. Bundeskanzler
  Merz: Darauf will ich gern eine Antwort geben. Seitdem wir vor viereinhalb Jahren
  die Gaslieferungen aus Russland gestoppt haben, suchen wir natürlich nach neuen
  Bezugsquellen. Dabei spielt Aserbaidschan eine wichtige Rolle. Das ist eine für
  uns wirtschaftlich interessante Perspektive. Wir haben auch andere Bezugsquellen
  gesucht und eröffnet. Insofern bin ich Präsident Alijew dankbar dafür, dass wir
  heute auch darüber sprechen konnten und auch die Möglichkeiten eines noch höheren
  Bezugs von Gas aus Aserbaidschan erörtert haben. Es ist auch Gegenstand unserer
  gemeinsamen Vereinbarung und wird auch Gegenstand der weiteren Gespräche sein, die
  wir mit Aserbaidschan führen.'
