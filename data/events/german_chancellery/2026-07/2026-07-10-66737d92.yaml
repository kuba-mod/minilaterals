title: Zustimmung im Bundesrat Immobilienbranche kann 44,9 Millionen Euro Bürokratie
  sparen
text: 'Bürokratierückbau in der Immobilienbranche: Für Immobilienmakler und Wohnimmobilienverwalter
  entfällt die Pflicht, sich regelmäßig weiterzubilden. Mit dem Gesetz zum Bürokratierückbau
  in der Gewerbeordnung und im Energieverbrauchskennzeichnungsgesetz schafft die Bundesregierung
  regelmäßige Weiterbildungen für Immobilienmakler und das Label für alte Heizungsanlagen ab.
  Sie hebt zudem Berichtspflichten auf mit Änderungen weiterer Rechtsvorschriften.
  Neu ist zudem die Ausweitung der Genehmigungsfiktion nach der Gewerbeordnung auf
  alle erlaubnispflichtigen Gewerbe. Das hat der Bundestag am 12. Juni beschlossen
  und ist damit dem Änderungsantrag des Bundestagsausschusses für Wirtschaft und Energie
  gefolgt. Die Genehmigungsfiktion sieht vor, dass ein Gewerbe als genehmigt gilt,
  wenn die zuständige Behörde nicht innerhalb von drei Monaten darüber entscheidet.
  Die wichtigsten Änderungen sollen nach Verkündung oder kurz danach in Kraft treten.
  Künftig müssen sich Immobilienmaklerinnen und -makler nicht mehr regelmäßig weiterbilden.
  Das spart der Branche voraussichtlich rund 44,9 Millionen Euro jährlich. Nach der
  Bundestagsbefassung bleibt die Weiterbildungspflicht für Wohnimmobilienverwalterinnen
  und -verwalter jedoch bestehen – anders als ursprünglich im Regierungsentwurf vorgesehen.
  Die Regierung vertraut darauf, dass die meisten Gewerbetreibenden ihren Beruf verantwortungsbewusst
  ausüben mit eigenem Interesse daran, ihr Wissen auf dem aktuellen Stand zu halten.
  Eine gesetzlich vorgegebene Weiterbildung, die auch Dokumentations- und Aufbewahrungspflichten
  zur Folge hat, ist deshalb verzichtbar. Die Maßnahme entspricht damit dem Auftrag
  aus dem Koalitionsvertrag, insbesondere mit Blick auf kleine und mittlere Unternehmen,
  auch den Weiterbildungsaufwand zu reduzieren. Weitere 10 Millionen Euro spart die
  Änderung des Energieverbrauchskennzeichnungsgesetzes ( EnVKG ). Er beendet die Pflicht
  der Bezirksschornsteinfeger, ein „Nationales Heizungslabel“ auf älteren Heizungsanlagen
  anzubringen. Seit Januar 2017 galt diese Pflicht. Das Heizungslabel stand im Nationalen
  Aktionsplan Energieeffizienz ( NAPE ) und sollte Energieeinsparungen und mehr Heizkesselaustausche
  bewirken. Eine Evaluation von 2020 zeigte hingegen, dass die Anzahl der Kesseltausche
  und die Energieeinsparungen deutlich hinter den Zielen des Aktionsplans zurückgeblieben
  sind.'
