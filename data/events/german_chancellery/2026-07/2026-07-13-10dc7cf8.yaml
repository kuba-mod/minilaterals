title: 'Pressestatement von Bundeskanzler Merz zum Treffen von Staats- und Regierungschefs
  zur Ukraine / der Koalition der Willigen Koalition der Willigen: Frieden für die
  Ukraine und Sicherheit für Europa'
text: 'Die Koalition der Willigen will den Friedensprozess der Ukraine weiter voranbringen
  und den Druck auf Russland erhöhen. Nach dem Gipfeltreffen der Koalition der Willigen
  in Paris hat Bundeskanzler Friedrich Merz die Bereitschaft aller Beteiligten bekräftigt,
  auch nach einem Waffenstillstand zur Sicherheit der Ukraine beizutragen. „Wir werden
  unsere enge Zusammenarbeit als Koalition der Willigen fortsetzen“, sagte Merz. Zusammen
  habe man in den letzten Wochen eine neue diplomatische und militärische Dynamik
  geschaffen – diese müsse nun genutzt werden. Der französische Staatspräsident Emmanuel
  Macron hatte die Staats- und Regierungschefinnen und -chefs der Koalition der Willigen
  zu einem Abendessen in den Élysée -Palast eingeladen. Anlässlich des französischen
  Nationalfeiertags am 14. Juli nahm der Bundeskanzler zudem an der Militärparade
  auf den Champs-Élysées teil. Die Koalition der Willigen ist ein Zusammenschluss
  von derzeit 35 Staaten und Organisationen, die sich gemeinsam mit der Ukraine für
  einen dauerhaften und gerechten Frieden für die Ukraine einsetzen sowie über Sicherheitsgarantien
  für eine souveräne Ukraine auch nach einem Waffenstillstand beraten. Bundeskanzler
  Merz vertritt Deutschland als eine der treibenden Kräfte neben Frankreich und Großbritannien
  in der Koalition. Merci, Monsieur le Présiden t, lieber Emmanuel Macron , lieber
  Keir Starmer , lieber Wolodymyr Selenskyj , liebe Kolleginnen und Kollegen! Auch
  ich möchte dem Staatspräsidenten der Französischen Republik sehr herzlich für die
  Einladung danken, heute nach Paris zu unserem Treffen der Koalition der Willigen
  zu kommen. Bevor ich darauf eingehe, erlaube ich mir, Keir Starmer ein persönliches
  Wort des Dankes zu sagen. Lieber Keir, du bist heute zum letzten Mal in dieser Runde
  dabei. Ich möchte mich persönlich bei dir für die gute Zusammenarbeit in den letzten
  14 Monaten bedanken. Sie war ausgesprochen intensiv. Sie ist sehr freundschaftlich
  geworden. Wir haben nicht nur für die Ukraine zusammengearbeitet; wir haben im letzten
  Jahr den ersten deutsch-britischen Vertrag seit über 130 Jahren miteinander abgeschlossen,
  einen Freundschaftsvertrag über die Zusammenarbeit zwischen dem Vereinigten Königreich
  und der Bundesrepublik Deutschland. Wir haben diesen Vertrag in den letzten Tagen
  in unseren beiden Parlamenten ratifiziert. Er ist also abgeschlossen, auch im parlamentarischen
  Sinne. Das stellt das Verhältnis zwischen Deutschland und Großbritannien auf eine
  neue Basis. Wir werden noch intensiver zusammenarbeiten. Ich freue mich darauf,
  mit deinem Nachfolger diese Zusammenarbeit fortzusetzen. Aber ich will auch ein
  Wort des Bedauerns sagen, dass du aus dem Amt ausscheidest. Wir haben wirklich sehr
  gut und sehr freundschaftlich zusammengearbeitet. Ich danke dir dafür. Wir haben
  in Berlin bei deinem letzten Besuch verabredet, dass auch unser persönliches Verhältnis
  gut bleibt und dass ich auch den einen oder anderen Rat von dir einholen darf. Ich
  werde das tun. Ich wünsche dir persönlich alles Gute. Auf eine weitere Fortsetzung
  unserer persönlichen Freundschaft! Ich will Präsident Macron für die Einladung heute
  am Vorabend des französischen Nationalfeiertags danken. Der 14. Juli ist für unsere
  französischen Nachbarn ein Fest der Freiheit. Lieber Wolodymyr , genau um diese
  Freiheit kämpft die Ukraine. Wir stehen euch bei, nicht nur weil es um die Freiheit
  der Ukraine geht, sondern wir stehen euch bei, weil es auch unsere Freiheit in ganz
  Europa ist, die mit diesem schrecklichen Angriffskrieg auf dem Spiel steht. Wir
  haben zusammen in den letzten Wochen eine neue Dynamik schaffen können. Das gilt
  auch für unsere diplomatischen Anstrengungen. Der Gipfel der G7 in Evian hat eine
  neue transatlantische Einigkeit gebracht. Emmanuel, danke für die gute Vorbereitung
  dieses G7 -Treffens! Danke für den Erfolg, den wir gemeinsam erzielen konnten! Wenige
  Tage später haben wir uns in Ankara zum NATO -Gipfel getroffen. Auch dieser NATO
  -Gipfel war gut vorbereitet, und er ist ein weiterer Erfolg geworden, weil wir gezeigt
  haben, dass alle 32 NATO -Staaten zusammenstehen, wenn es darum geht, die Freiheit
  in Europa zu verteidigen. Dieser Krieg gegen die Ukraine, gegen Europa, ist in eine
  neue Phase eingetreten. Die Ukraine erringt seit einigen Monaten beachtliche militärische
  Erfolge. Unsere Unterstützung hat daran einen ganz maßgeblichen Anteil. Der Kreml
  erzielt nun seinerseits keine nennenswerten Geländegewinne mehr. Immer mehr wird
  deutlich und immer mehr russische Bürgerinnen und Bürger müssen erkennen: Moskau
  wird sich in diesem Krieg nicht durchsetzen. Russland wird seine Kriegsziele nicht
  erreichen. – Diese diplomatischen und militärischen Entwicklungen der letzten Tage
  und Wochen wollen wir gemeinsam nutzen. Wolodymyr , wir stärken den tapferen Ukrainerinnen
  und Ukrainern den Rücken. Den Druck auf Russland erhöhen wir, auch mit dem, was
  wir heute hier besprochen haben. Wir tun das nicht, um den Krieg fortzusetzen, sondern
  wir tun das, um den Krieg so schnell wie möglich zu beenden. Unsere Botschaft an
  Russland lautet daher: Es wird Zeit, an den Verhandlungstisch zu kommen. Es wird
  Zeit, sich auf einen Waffenstillstand zu verständigen. Es wird Zeit, das unnötige
  Blutvergießen in der Ukraine zu beenden. Wir haben heute fünf Verabredungen getroffen,
  um auf dem Weg zum Frieden voranzukommen, auf die meine Vorredner schon zu sprechen
  gekommen sind. Ich will sie kurz noch einmal zusammenfassen: Erstens. Wir haben
  unsere Bereitschaft bekräftigt, auch nach einem Waffenstillstand einen Beitrag zur
  Sicherheit der Ukraine zu leisten. Das ist unverzichtbar für einen dauerhaften Frieden.
  Es braucht dafür ein robustes Monitoring. Es braucht glaubwürdige, bindende Sicherheitsgarantien
  und eine dauerhaft starke verteidigungsfähige Ukraine. Hier will die Koalition der
  Willigen eine wichtige Rolle spielen, in enger Zusammenarbeit mit den Vereinigten
  Staaten von Amerika. Wie wir im Einzelnen unsere Sicherheitsgarantien ausgestalten,
  das werden die Ukraine und ihre Partner entscheiden, nicht Moskau. Über Art und
  Umfang des deutschen Beitrages werden die Bundesregierung und der Deutsche Bundestag
  zu gegebener Zeit ebenfalls entscheiden. Zweitens. Wir haben verabredet, unsere
  Hilfe für Kyjiw zu verstärken. Beim NATO -Gipfel in Ankara haben wir auf unsere
  Initiative hin beschlossen, die Ukraine in diesem und im nächsten Jahr mit jeweils
  über 70 Milliarden Euro zu unterstützen. Besonders dringlich ist jetzt – und ich
  habe das im Kreis der Kollegen noch einmal angesprochen – die Frage der ukrainischen
  Luftverteidigung. Deutschland leistet als größter Unterstützer der Ukraine seinen
  Beitrag. Ich möchte die Kolleginnen und Kollegen bitten, auch noch einmal von dieser
  Stelle aus alles zu tun, was in ihrer Kraft steht, um die Luftverteidigung der Ukraine
  zu verstärken. Sie braucht das in diesen Tagen ganz besonders. Wir haben in den
  letzten Tagen auch andere Partner dafür gewinnen können, ihre Anstrengungen bei
  der Raketenabwehr jetzt noch einmal zu verstärken. Drittens haben wir uns zu Fragen
  der Verteidigungsindustrie abgestimmt. Wir werden die Herstellung von Flugabwehrsystemen
  und Abstandswaffen in Europa ausbauen. Heute haben wir verabredet, insbesondere
  beim Schutz gegen ballistische Raketen gemeinsam voranzugehen. Das wird auf Sicht
  auch der Ukraine helfen, Russlands Aggressionen auf Dauer standzuhalten. Es wird
  aber auch dazu beitragen, dass unsere Verteidigungsindustrien in Europa noch enger
  zusammenarbeiten und auch voneinander lernen. Viertens. Wir haben beraten, wie wir
  die Ukraine dabei unterstützen, sich auf einen möglichen weiteren Kriegswinter vorzubereiten,
  wenn er denn nötig sein sollte. Wir stärken die Infrastruktur, wir bauen resiliente
  Energienetze, wir setzen dringende Reparaturen um. Deutschland hilft auch hier mit
  aller Entschlossenheit. Schließlich hat das heutige Treffen gezeigt: Wir haben denselben
  Kompass. Er ist auf Frieden für die Ukraine und Sicherheit für Europa ausgerichtet.
  Die Ukraine ist bereit, den Krieg zu beenden. Sie war es immer. Auch wir sind offen
  für Friedensverhandlungen zwischen der Ukraine und Russland mit der Unterstützung
  Europas und der Vereinigten Staaten. Es liegt jetzt einzig und allein an Präsident
  Putin, diese Chance zu ergreifen. Bis dahin werden wir den Druck auf Moskau erhöhen.
  Wir werden unsere enge Zusammenarbeit als Koalition der Willigen fortsetzen. Vor
  allem stehen wir weiter fest an der Seite der Ukraine. Noch einmal: Wir tun es für
  die Freiheit, die wir morgen mit unseren französischen Nachbarn und Freunden hier
  in Paris feiern. Wir tun es für die Freiheit in ganz Europa.'
