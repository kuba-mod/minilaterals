date: '2026-07-22'
type: press_release
source_name: german_chancellery
title: Wirtschafts- und Arbeitsmarktreformen der Bundesregierung So stärken wir die
  deutsche Wirtschaft
text: 'Die Bundesregierung will mit gezielten Investitionsanreizen neues Wachstum
  schaffen. Die Bundesregierung will Wachstum ermöglichen und Arbeitsplätze sichern.
  Dafür schafft sie die Voraussetzungen. Denn die Wettbewerbsfähigkeit der Wirtschaft
  ist die Grundlage für den Wohlstand in Deutschland. Viele Schritte sind schon umgesetzt.
  So wurden 2026 die Energiekosten um zehn Milliarden Euro im Jahr verringert. Davon
  profitiert nicht nur die Wirtschaft, sondern alle Bürgerinnen und Bürger – jeden
  Tag. Das gilt auch für die Rekordinvestitionen in die Infrastruktur in Deutschland.
  Denn gute Straßen, Gleise, Schulen und Kitas kommen allen zugute, sie sind aber
  auch Voraussetzung für erfolgreiche Unternehmen. Die Arbeitswelt ist im Wandel.
  Neue Regelungen und Instrumente bieten Chancen für den Arbeitsmarkt, sorgen für
  gute Arbeit und stärken die Wettbewerbsfähigkeit des Wirtschaftsstandortes Deutschland.
  Mit dem Tariftreuegesetz hat die Bundesregierung den Wettbewerb um Aufträge des
  Bundes fairer gemacht. Auf dem Weg ist die Modernisierung der Arbeitsförderung:
  mit mehr digitalen Angeboten, Beschäftigungserprobungen und weniger Bürokratie beim
  Arbeitsschutz. Die geplante Flexibilisierung der Arbeitszeit kann die Vereinbarkeit
  von Beruf und Familie erleichtern und soll Unternehmen helfen, Auftragsspitzen abzufedern.
  Die Bundesregierung will mit gezielten Investitionsanreizen neues Wachstum schaffen.
  Das bereits vor einem Jahr beschlossene steuerliche Investitionssofortprogramm trägt
  dazu bei, den Standort Deutschland dauerhaft zu stärken und Arbeitsplätze zu sichern.
  Der Investitions-Booster ermöglicht degressive Abschreibungen von bis zu 30 Prozent
  bei Ausrüstungsinvestitionen zwischen dem 30. Juni 2025 und dem 1. Januar 2028.
  Was heißt das konkret? Unternehmen können Investitionen schneller refinanzieren.
  So kann eine Firma, die eine Maschine neu anschafft, die Kosten bereits im Jahr
  des Erwerbs bis zu 30 Prozent mit ihrem Gewinn verrechnen. Im zweiten und dritten
  Jahr können erneut bis zu 30 Prozent auf den restlichen Wert geltend gemacht werden.
  Das kommt allen Unternehmen gleichermaßen zugute, ist unkompliziert und wirkt in
  der Breite. Mit dem Investitions-Booster für E -Mobilität bei Unternehmen werden
  betrieblich genutzte Elektrofahrzeuge gefördert. Zusammen mit der Verlängerung der
  Kfz -Steuerbefreiung für reine Elektrofahrzeuge und dem Förderprogramm für E -Autos
  bringt das die E -Mobilität weiter voran und stärkt die wichtige Automobilbranche.
  Was heißt das konkret? Ein Unternehmen, das ein Elektrofahrzeug in den Fuhrpark
  aufnimmt, kann die Investition nun noch schneller abschreiben: 75 Prozent der Anschaffungskosten
  bereits im Investitionsjahr. Die Bundesregierung hat die Energiekosten für die Wirtschaft
  sowie für Bürgerinnen und Bürger spürbar und dauerhaft gesenkt. Das stärkt die internationale
  Wettbewerbsfähigkeit des Wirtschaftsstandortes. Die Absenkung der Stromsteuer für
  600.000 produzierende Unternehmen, der Zuschuss zu den Netzkosten und die Abschaffung
  der Gasspeicherumlage entlasten alle Verbraucherinnen und Verbraucher seit 2026
  um rund zehn Milliarden Euro im Jahr bei den Energiekosten . Was heißt das konkret?
  Haushalte, die Strom und Gas beziehen, können 2026 durchschnittlich etwa 160 Euro
  sparen (bei 3.500 kWh Stromverbrauch im Jahr / 20.000 kWh Gasverbrauch im Jahr).
  Von der dauerhaft niedrigen Stromsteuer werden nicht nur große, sondern vor allem
  auch die vielen mittelständischen Unternehmen, angefangen von der Fleischerei, der
  Bäckerei über energieintensive Industrieunternehmen bis hin zum Baugewerbe profitieren.
  Zudem hat die Bundesregierung Bürgerinnen und Bürger sowie Betriebe angesichts der
  im Zuge der Iran-Krise gestiegenen Spritpreise entlastet – insgesamt um rund 1,6
  Milliarden Euro. Das Sondervermögen Infrastruktur und Klimaneutralität ermöglicht
  Rekordinvestitionen, die das Land modernisieren, Beschäftigung sichern und die Innovationskraft
  Deutschlands stärken. Das Geld fließt unter anderem in gute Schulen und Kitas, moderne
  Verkehrswege, bezahlbare Wohnungen, moderne Krankenhäuser und sanierte Sportstätten.
  Davon profitiert das ganze Land. Was heißt das konkret? Das Sondervermögen ermöglicht
  einen Modernisierungsschub für Deutschland. Das bedeutet zum Beispiel mehr Investitionen
  in einen zuverlässigeren Bahnverkehr. Nach Angaben der Deutschen Bahn werden so
  deutschlandweit allein im Jahr 2026 mehr als 2.300 Weichen saniert und über 2.000
  Kilometer Strecke modernisiert. Die Bundesregierung will die Ladeinfrastruktur schneller
  ausbauen , um auch Unternehmen den Wechsel auf klimafreundliche Mobilität zu erleichtern. Ziel
  ist es, die Möglichkeiten für das Laden von Elektrofahrzeugen zu verbessern, indem
  ein flächendeckendes, bedarfsgerechtes und nutzerfreundliches Ladenetz entsteht.
  Für diesen Ausbau bildet d er Masterplan Ladeinfrastruktur 2030 den zentralen strategischen
  Rahmen. Was heißt das konkret? Der Ausbau der Ladeinfrastruktur wurde in den letzten
  Jahren deutlich beschleunigt: Die Anzahl der Ladepunkte stieg von September 2023
  bis Februar 2026 um rund 77 Prozent auf 195.380 . Seit Mai 2026 ist das Bundestariftreuegesetz
  in Kraft. Öffentliche Aufträge des Bundes gehen seither nur noch an Unternehmen,
  die ihre Beschäftigten nach Tarif bezahlen, während sie diese Aufträge ausführen,
  und ihnen hinsichtlich Urlaubsansprüchen oder Regelungen zu Höchstarbeitszeiten,
  Mindestruhezeiten und Ruhepausen tarifvertragliche Arbeitsbedingungen gewähren.
  Das macht den Wettbewerb um öffentliche Aufträge fairer, da tarifgebundene Unternehmen
  nicht mehr benachteiligt werden. Der Bund setzt mit dem Tariftreuegesetz Anreize
  für mehr Tarifbindung – eine wichtige Grundlage für bessere Löhne und gute Arbeitsbedingungen.
  Das Gesetz schränkt den Verdrängungswettbewerb über die Lohn- und Personalkosten
  genau zum richtigen Zeitpunkt ein: Mit dem Sondervermögen Infrastruktur werden in
  den kommenden Jahren zahlreiche öffentliche Aufträge vergeben. Was heißt das konkret?
  In den kommenden Jahren fließt viel Geld in die Modernisierung von Brücken, Krankenhäusern
  oder Schulbauten. Wer im Auftrag des Bundes arbeitet, wird nun auch besser geschützt
  und ordentlich bezahlt . Mit der Aktivrente schafft die Bundesregierung einen Anreiz
  für ältere Beschäftigte, länger zu arbeiten . Das soll helfen, den Fachkräftemangel
  abzufedern. Beschäftigte und Arbeitgeber profitieren gleichermaßen. Wer freiwillig
  im Ruhestand weiterarbeitet, für den bleibt der Hinzuverdienst bis zu einem Höchstbetrag
  steuerfrei. Und eine höhere Erwerbsquote stärkt die Wirtschaft. Mehr als 10.000
  Beschäftigte machten im ersten Halbjahr 2026 von diesem Angebot Gebrauch. Die Bundesregierung
  hat die Aktivrente am 15. Oktober 2025 auf den Weg gebracht. Sie ist zum 1. Januar
  2026 in Kraft getreten. Sie muss nicht beantragt werden. Der Arbeitgeber berücksichtigt
  den Freibetrag automatisch. Was heißt das konkret? Eine Arbeitnehmerin oder ein
  Arbeitnehmer überschreitet die Regelaltersgrenze – Vollendung des 67. Lebensjahres,
  einschließlich Übergangsregelung – und ist weiterhin sozialversicherungspflichtig
  beschäftigt. Die Aktivrente erlaubt es ihm nun, bis zu 2.000 Euro im Monat steuerfrei
  hinzuzuverdienen. Das bedeutet: Bis zu 24.000 Euro im Jahr als zusätzliches steuerfreies
  Einkommen. Die Körperschaftssteuer sinkt ab 2028 schrittweise. Das wurde bereits
  mit dem steuerlichen Investitionssofortprogramm beschlossen. Mit der ersten Körperschaftssteuersenkung
  nach mehr als 15 Jahren und der größten seit Jahrzehnten entlastet die Bundesregierung
  Unternehmen, um mehr Investitionen zu ermöglichen. Für energieintensive Industrieunternehmen
  hat die Bundesregierung über die bereits beschlossenen Entlastungen hinaus einen
  Industriestrompreis eingeführt. Unternehmen können ihn ab 2027 rückwirkend für das
  Gesamtjahr 2026 beantragen. Das stärkt die Wirtschaft im internationalen Wettbewerb
  – vom Taschentuch- oder Schraubenhersteller bis zur Stahl- und Kupferindustrie.
  Insgesamt steigt die geplante Entlastung im Jahr 2027 damit auf 13,3 Milliarden
  Euro und im gesamten Zeitraum bis 2030 auf 50,7 Milliarden Euro. Was heißt das konkret?
  Ein Unternehmen der Halbleiterfertigung mit einem Stromverbrauch von rund 175 GWh
  erhält alleine durch den neuen Industriestrompreis eine jährliche Entlastung in
  Höhe von etwa 3,6 Millionen Euro , ein Hersteller von Hygiene- und Haushaltsartikeln
  aus Papier (zum Beispiel Küchenrollen, Taschentücher, Toilettenpapier) mit einem
  Stromverbrauch von rund 400 GWh erhält eine jährliche Entlastung in Höhe von rund
  8,2 Millionen Euro . Die Bundesagentur für Arbeit (BA) soll moderner und digitaler
  werden. Das Kabinett hat am 15. Juli 2026 den Gesetzentwurf zur Modernisierung und
  Digitalisierung der Arbeitsförderung beschlossen. Ziel ist es, den Austausch zwischen
  Bürgerinnen und Bürgern, Unternehmen und Agenturen zu vereinfachen und die Vermittlung
  in Arbeit zu stärken. Digitale Antragsverfahren sollen einfacher und nutzerfreundlicher
  werden. Gespräche sollen, wenn möglich, per Video- Call geführt werden können. Mit
  der sogenannten Beschäftigungserprobung schafft die Bundesregierung ein rechtssicheres
  Instrument, das den direkten Wechsel von Job zu Job erleichtern kann. Das hilft
  Arbeitslosigkeit zu verhindern, bevor sie entsteht. Was heißt das konkret? Angebote
  wie digitale Antragstellung und Video- Calls erleichtern den Austausch mit den Arbeitsagenturen.
  Wer in Gefahr steht, seinen Arbeitsplatz zu verlieren, erhält mit der Beschäftigungserprobung
  die Möglichkeit, eine Beschäftigung in einem anderen Betrieb auszuprobieren. Das
  hilft auch den Unternehmen: Sie können auf diesem Weg neue Kolleginnen und Kollegen
  finden. Die Bundesregierung will den Arbeitsschutz vereinfachen, flexibilisieren
  und digitalisieren . Sichere und gesunde Arbeitsbedingungen sind – gerade in Zeiten
  des Fachkräftemangels – ein Standortvorteil Deutschlands und helfen, die Beschäftigten
  vor Verletzungen und Unfällen zu schützen. Die Bundesregierung plant Bürokratie
  im Arbeitsschutz abzubauen, ohne das Schutzniveau zu senken: Die Regelungen sollen
  stärker auf bestehende Gefährdungen ausgerichtet werden. Was heißt das konkret?
  Die Bundesregierung hält an den hohen Standards im Arbeitsschutz fest. Jedoch fallen
  beispielsweise Extra-Prüfungen für Wasserkocher oder Ladekabel im Büro weg. Das
  entlastet die Betriebe, ohne die Sicherheit zu beeinträchtigen. Die Koalition wird
  in den kommenden Monaten weitere Vorhaben angehen. So soll die sachgrundlose Befristung
  von Arbeitsverträgen auf bis zu 48 Monate ausgeweitet werden. Das soll aufstrebenden
  Unternehmen und Start-ups erleichtern, neue Jobs zu schaffen und Job suchenden ermöglichen,
  schneller neue Beschäftigung zu finden. Ein Gesetz zur Flexibilisierung der Arbeitszeit
  ist in Arbeit. Die Bundesregierung will auch nicht-tarifgebundenen Unternehmen eine
  wöchentliche anstelle der täglichen Höchstarbeitszeit ermöglichen. Tarifgebundene
  Unternehmen können ihre Arbeitszeitmodelle schon heute flexibel gestalten. Flexiblere
  Arbeitszeitmodelle können die Vereinbarkeit von Familie und Beruf vereinfachen und
  Unternehmen helfen, Auftragsspitzen abzufedern. Die Bundesregierung plant zudem,
  zum 1. Januar 2027 die Sonntags ö ffnungszeiten f ü r B ä ckereien und Konditoreien
  auszuweiten. Diese sind, anders als für Backstände beispielsweise an Tankstellen,
  bisher sehr eingeschränkt. Bibliotheken sollen künftig ihre Türen sonntags öffnen
  dürfen – wie andere Kultureinrichtungen auch. Sie sind Orte der Begegnung und des
  Austausches und ein wichtiges Kulturangebot für Menschen jeden Alters in Deutschland.
  Zudem will die Bundesregierung Sonn- und Feiertagszuschläge bis zu einem Stundenlohn
  von 75 Euro steuerfrei stellen, tarifvertraglich geregelte Zuschläge vollständig.
  Vorgesehen ist auch , den Kündigungsschutz für Hochverdiener zu flexibilisieren.
  Es soll eine Auflösung des Arbeitsverhältnisses mit Abfindungsoption ermöglicht
  werden. Ziel ist es, hochbezahlten Beschäftigten den Job wechsel zu erleichtern.
  Ebenso sind Änderungen bei den Mini jobs vorgesehen. Denn diese können vielen Menschen,
  vor allem Frauen, die Rückkehr von Teilzeit in Vollzeit erschweren. Dies kann in
  die Altersarmut führen.'
