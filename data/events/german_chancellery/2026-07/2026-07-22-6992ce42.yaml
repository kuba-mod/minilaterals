title: Im Kabinett beschlossen Junge Unternehmen mit Startup- und Scaleup-Strategie
  fördern
text: 'Startups und Scaleups schaffen Arbeitsplätze und stärken den Wirtschaftsstandort
  Deutschland. Die Gründungsdynamik bleibt trotz eines herausfordernden wirtschaftlichen
  Umfelds hoch: Rekordzahlen vom ersten Halbjahr 2026 mit über 3.000 Startup -Gründungen
  – bald so viele wie im ganzen Jahr 2025 – zeigen: „Junge Unternehmen können morgen
  die Champions sein, die auch für Beschäftigung und Wohlstand in Deutschland sorgen“,
  sagte der Bundeskanzler im Rahmen der Sommer-Pressekonferenz und betonte: „Wir haben
  die Chance, auf diesem Weg weiter voranzukommen.“ Startups und Scaleups sind schnell
  wachsende neue, junge Unternehmen. Laut Startup -Verband kommen sie überwiegend
  aus der Software branche. Mit frischen Ideen und neuem Wissen schaffen sie Arbeitsplätze
  und stärken den Wirtschaftsstandort Deutschland. Sie sind wichtige Innovatoren gerade
  im Bereich KI und bei anderen Schlüsseltechnologien. Die wichtigen Bereiche der
  Sicherheit und Verteidigung werden erstmals in der Strategie systematisch erfasst.
  Startups und junge Unternehmen aus diesen Bereichen erhalten so beispielsweise gleichberechtigten
  Zugang zu der Startup - und Scaleup -Förderung. Als Job motor gewinnen Startups
  und Scaleups zunehmend an Bedeutung. Im Jahr 2024 beschäftigten sie rund 522.000
  Menschen – etwa 26 Prozent mehr als noch vier Jahre zuvor. Sie leisten damit einen
  wachsenden Beitrag zu Beschäftigung und Wertschöpfung. In acht Handlungsfeldern
  wird die Bundesregierung ressortübergreifend konkrete Maßnahmen ergreifen, damit
  mehr junge Menschen ihr frisches Wissen und ihre Ideen mutig in eigenen Unternehmen
  umsetzen: Unterstützung für Startups: Mit dem Deutschlandfonds stellt die Bundesregierung
  neuen Unternehmen Anschubfinanzierung von mehr als 30 Milliarden Euro zur Verfügung.
  Mit weiteren 1,6 Milliarden Euro fördert sie technologiegetriebene Startups . Mit
  dem neuen Standortfördergesetz wird Startups ebenfalls der Zugang zum Kapitalmarkt
  erleichtert. Und: Der Hightech Gründerfonds investiert Risikokapital bis zu einer
  Million Euro pro Hightech-Startup . Weitere Informationen zur Startup - und Scaleup
  -Strategie und weiteren Informationen für Gründerinnen und Gründer finden Sie auf
  dem Existenzgründungsportal des Bundeswirtschaftsministeriums.'
