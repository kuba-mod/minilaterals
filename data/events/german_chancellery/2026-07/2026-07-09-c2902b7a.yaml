title: Regierungserklärung des Bundeskanzlers im Deutschen Bundestag „Wir sind ein
  starkes Land“
text: 'Die Koalition habe sich „als Regierung der Erneuerung auf den Weg“ gemacht,
  sagte Bundeskanzler Friedrich Merz im Deutschen Bundestag. Foto: picture alliance
  / dpa/ Andreas Gora „Wir sind ein starkes Land: wirtschaftlich, politisch und auch
  gesellschaftlich“, sagte Bundeskanzler Friedrich Merz i n seiner Regierungserklärung
  zur aktuellen politischen Lage im Deutschen Bundestag. Die Regierung habe sich vor
  gut einem Jahr auf den Weg gemacht, das Land zu erneuern. „Wir sind uns alle einig,
  dass die Mitte hier und heute zeigen muss, wir gestalten unser Land, wir modernisieren
  es und wir führen es in die Zukunft“, so Merz. Dass dies möglich sei, habe sich
  unter anderem in der vergangenen Woche gezeigt, als die die Regierung tragenden
  Parteien im Koalitionsausschuss ein großes Reformpaket vereinbart haben. „Diese
  Verabredungen zielen vor allem auf mehr Beweglichkeit für unsere Unternehmen, auf
  den Erhalt unseres Sozialstaats und auf die steuerliche Entlastung der Arbeitnehmerinnen
  und Arbeitnehmer“, betonte der Kanzler. Auch im ersten Jahr der von Bundeskanzler
  Merz geführten Regierung sei schon viel passiert, was jetzt anfange, Wirkung zu
  entfalten. Beispielhaft nannte der Kanzler die Aktivrente : „Die ersten Zahlen zeigen,
  dass mittlerweile mehr als 10.000 Beschäftigte im ersten Halbjahr 2026 in den Betrieben
  von diesem Angebot Gebrauch gemacht haben.“ Ebenfalls nannte er die zum 1. Juli
  in Kraft getretene Grundsicherung , „mit der wir Eigenverantwortung und Gegenleistung
  wieder einfordern bei denen, die das können“. „Wir stehen vor grundlegenden Reformen:
  Steuerreform, Rentenreform, Gesundheitsreform, Arbeitsmarkt. Das ist ein wuchtiges
  Paket, das keine Bundesregierung in den letzten Jahren in diesem Umfang angepackt
  hat“, sagte Bundeskanzler Merz. Er wünsche sich dabei einen optimistischen Blick:
  „Denn wir haben allen Anlass, mutig zu sein, uns etwas zu trauen und uns auch etwas
  zuzutrauen.“ Lesen Sie hier die Regierungserklärung in voller Länge. Dem Kanzler
  gehe es darum, „das Verhältnis der Generationen neu und gerecht auszutarieren und
  dafür auch die Chancen des Kapitalmarktes zu nutzen“. Im Koalitionsausschuss wurde
  vereinbart, die wegweisende Empfehlungen des Berichts der Alterssicherungskommission
  in einem Gesetzespaket umsetzen. Ziel ist eine doppelte Trendumkehr: Perspektivisch
  soll der Beitragssatz im Umlagesystem nicht mehr steigen, sondern sinken. Und das
  Versorgungsniveau nicht mehr sinken, sondern steigen. In der Einkommensteuer will
  die Regierung die unteren und mittleren Einkommen – wie im Koalitionsvertrag vereinbart
  – und gerade Familien entlasten. Dafür sollen höchste Einkommen etwas mehr belastet
  werden. Dies ist aus Sicht des Kanzlers ein „Beitrag zur sozialen Gerechtigkeit
  in unserem Land“. Er kündigte zudem an, dass die Regierung bis Herbst zusammen mit
  den Bundesländern auch Vorschläge für eine Vereinfachung des Steuerrechts vorlegen
  wolle. Der Kanzler betont: „Auf dem Arbeitsmarkt wollen wir und müssen wir mehr
  Dynamik erreichen.“ So soll die sogenannte sachgrundlose Befristung von Beschäftigungsverhältnis
  für einen längeren Zeitraum als bisher ermöglicht werden. Ziel sei, Arbeitgeberinnen
  und Arbeitgeber zu ermutigen, neue Mitarbeiterinnen und Mitarbeiter einzustellen.
  Die Bundesregierung will künftig alle Berichtspflichten aufheben. Wenn ein Ministerium
  eine Berichtspflicht beibehalten möchte, wer also an Bürokratie festhalten wolle,
  müsse dies neu begründen. „Das ist im Vergleich zu allen bisherigen Vereinfachungsgesetzen
  ein wirklicher Befreiungsschlag“, so Kanzler Merz. Bundeskanzler Merz verwies auf
  die Eröffnung der weltweit größten Leistungshalbleiterfabrik in Dresden: „Wir können
  und wir werden an den Wertschöpfungsketten der Zukunft nicht nur teilhaben, wir
  können davon auch profitieren und gewinnen.“ Positiv stimmten ihn auch die neuen
  Zahlen des Start-up -Verbands: „Von Januar bis Juni wurden in Deutschland über 3.000
  neue Firmen gegründet“, so Merz. Das sei fast so viel wie im ganzen Jahr 2025. Auch
  habe das statistische Bundesamt für die Monate im Mai und Juni einen deutlich höheren
  Produktionsanstieg vorausgesagt. „Das sind ermutigende Zeichen unserer Volkswirtschaft.“
  „Wir arbeiten intensiv an der Wiederherstellung der Verteidigungsfähigkeit unseres
  Landes“, so Merz. Ziel sei, Freiheit und Frieden in Europa zu sichern. Der gerade
  zu Ende gegangene NATO -Gipfel in Ankara habe gezeigt, dass die NATO geschlossen,
  stark und selbstbewusst sei. Zudem sagte der Kanzler, die Entscheidung Kanadas,
  seine U -Boot-Flotte mit deutscher und norwegischer Hilfe zu modernisieren, sei
  „ der größte internationale Rüstungsauftrag in der Geschichte der Bundesrepublik
  Deutschland“ . Er ermögliche eine Wertschöpfung von bis zu 100 Milliarden Euro über
  die nächsten Jahrzehnte und sichere tausende von Arbeitsplätzen in Deutschland.'
