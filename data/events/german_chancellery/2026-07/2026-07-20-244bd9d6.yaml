title: Bundeskanzler Merz empfängt den Präsidenten der Republik Aserbaidschan, Alijew
text: Bundeskanzler Friedrich Merz wird am 21. Juli 2026 um 12:00 Uhr den Präsidenten
  der Republik Aserbaidschan, Ilham Alijew, mit militärischen Ehren im Bundeskanzleramt
  empfangen. Im Mittelpunkt eines gemeinsamen Gesprächs werden Fragen zu Energie und
  Rohstoffen, der regionale Friedensprozess zwischen Aserbaidschan und Armenien sowie
  die internationale Sicherheitspolitik stehen. Im Anschluss ist eine gemeinsame Pressekonferenz
  geplant.
