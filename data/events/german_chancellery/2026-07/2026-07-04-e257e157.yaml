title: Bundeskanzler Merz telefoniert mit dem ukrainischen Staatspräsidenten Selenskyj
text: Bundeskanzler Friedrich Merz hat heute mit dem Präsidenten der Ukraine, Wolodymyr
  Selenskyj, telefoniert. Präsident Selenskyj informierte den Bundeskanzler über die
  Folgen der jüngsten russischen Luftangriffe auf Kyjiw und andere Teile der Ukraine.
  Der Präsident dankte dem Bundeskanzler für die deutsche Unterstützung, insbesondere
  bei der Luftverteidigung. Der Bundeskanzler bekräftigte, dass sich die Ukraine auf
  die fortgesetzte Unterstützung Deutschlands verlassen kann.
