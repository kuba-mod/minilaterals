date: '2026-07-16'
type: press_release
source_name: german_chancellery
title: Pressekonferenz von Kanzler Merz und Präsident Macron nach dem Deutsch-Französischen
  Ministerrat Sicheres Europa gemeinsam voranbringen
text: 'Kanzler Merz und der französische Präsident Macron bekräftigten die vertiefte
  Zusammenarbeit beider Länder in verschiedenen Bereichen. Angesichts globaler sicherheitspolitischer
  Bedrohungen und großer wirtschaftlicher Herausforderungen sei gemeinsames deutsch-französisches
  Handeln unerlässlich. „Die Freundschaft zu Frankreich und unser gemeinsamer Einsatz
  für ein einiges Europa sind der Kern der deutschen Außenpolitik“, betonte Bundeskanzler
  Friedrich Merz in der Pressekonferenz mit Frankreichs Präsident Emmanuel Macron
  nach dem Deutsch-Französischen Ministerrat am Freitag in Brühl. Um Europa voranzubringen,
  konzentrierten sich die Beratungen des Deutsch-Französischen Ministerrates auf drei
  große Fragen: Wie schützen wir uns in einer gefährlichen Welt? Wie stärken wir unsere
  Volkswirtschaften im globalen Wettbewerb? Und wie bringen wir Europa voran? Conclusion
  of the 26. Franco-German Ministerial Council (in Englisch) Schlussfolgerungen des
  26. Deutsch-Französischen Ministerrats (auf Deutsch) In Englisch Conclusion of the
  Franco-German Defence and Security Council (in Englisch) Schlussfolgerungen des
  Deutsch-Französischen Verteidigungs- und Sicherheitsrats (auf Deutsch) Bergisch
  Gladbach, 16. Juli 2026: Vor der imposanten Kulisse von Schloss Bensberg empfing
  Bundeskanzler Merz den französischen Präsidenten Macron zum Auftakt des 26. Deutsch-Französischen
  Ministerrates. Noch am Abend trafen sich die deutsche und die französische Delegation
  unter der Leitung des Bundeskanzlers und des französischen Präsidenten zu einem
  ersten Arbeitsgespräch. 17. Juli 2026: Im Helikopter ging es für Kanzler Merz und
  Präsident Macron am Morgen zum Fliegerhorst Nörvenich. In einem Hangar des Fliegerhorsts
  Nörvenich tagten die zuständigen Minister des Deutsch-Französischen Verteidigungs-
  und Sicherheitsrats unter der Leitung von Kanzler Merz und Präsident Macron . Vor
  dem Schloss Augustusburg empfing Bundeskanzler Friedrich Merz den französischen
  Präsidenten Macron mit militärischen Ehren. Bereits 1962 trafen sich der damalige
  Bundeskanzler Adenauer und der französische Präsident de Gaulle in dem historischen
  Schloss. 64 Jahre später setzen Merz und Macron die Freundschaft beider Länder und
  das gemeinsame deutsch-französische Handeln im europäischen Kontext fort. Im Gardensaal
  des Schlosses trafen sich anschließend die Ministerrinnen und Minister, Bundeskanzler
  Merz und Präsident Macron zur Plenarsitzung des Deutsch-Französischen Ministerrates.
  Bei dem Treffen standen besonders die Themen Wirtschaft, Wettbewerbsfähigkeit und
  Sicherheit im Fokus. Gleichzeitig beriet der Ministerrat über gemeinsame deutsch-französische
  Impulse für eine Reihe von Themen auf EU -Ebene. Zum Abschluss des Ministerrates
  traten Kanzler Merz und Präsident Macron vor die Presse. „Die Freundschaft zu Frankreich
  und unser gemeinsamer Einsatz für ein einiges Europa sind Kern deutscher Außenpolitik“,
  unterstrich der Bundeskanzler. Bergisch Gladbach, 16. Juli 2026: Vor der imposanten
  Kulisse von Schloss Bensberg empfing Bundeskanzler Merz den französischen Präsidenten
  Macron zum Auftakt des 26. Deutsch-Französischen Ministerrates. Noch am Abend trafen
  sich die deutsche und die französische Delegation unter der Leitung des Bundeskanzlers
  und des französischen Präsidenten zu einem ersten Arbeitsgespräch. 17. Juli 2026:
  Im Helikopter ging es für Kanzler Merz und Präsident Macron am Morgen zum Fliegerhorst
  Nörvenich. In einem Hangar des Fliegerhorsts Nörvenich tagten die zuständigen Minister
  des Deutsch-Französischen Verteidigungs- und Sicherheitsrats unter der Leitung von
  Kanzler Merz und Präsident Macron . Vor dem Schloss Augustusburg empfing Bundeskanzler
  Friedrich Merz den französischen Präsidenten Macron mit militärischen Ehren. Bereits
  1962 trafen sich der damalige Bundeskanzler Adenauer und der französische Präsident
  de Gaulle in dem historischen Schloss. 64 Jahre später setzen Merz und Macron die
  Freundschaft beider Länder und das gemeinsame deutsch-französische Handeln im europäischen
  Kontext fort. Im Gardensaal des Schlosses trafen sich anschließend die Ministerrinnen
  und Minister, Bundeskanzler Merz und Präsident Macron zur Plenarsitzung des Deutsch-Französischen
  Ministerrates. Bei dem Treffen standen besonders die Themen Wirtschaft, Wettbewerbsfähigkeit
  und Sicherheit im Fokus. Gleichzeitig beriet der Ministerrat über gemeinsame deutsch-französische
  Impulse für eine Reihe von Themen auf EU -Ebene. Zum Abschluss des Ministerrates
  traten Kanzler Merz und Präsident Macron vor die Presse. „Die Freundschaft zu Frankreich
  und unser gemeinsamer Einsatz für ein einiges Europa sind Kern deutscher Außenpolitik“,
  unterstrich der Bundeskanzler. (Die Protokollierung des fremdsprachlichen Teils
  erfolgte anhand der Simultandolmetschung.) Meine Damen und Herren, vor allem sehr
  geehrter Herr Präsident, lieber Emmanuel , am 4. September 1962 trafen sich General
  Charles de Gaulle und Bundeskanzler Konrad Adenauer hier im Schloss Augustusburg.
  Es war der erste Besuch eines französischen Staatsoberhauptes in Deutschland nach
  zwei Weltkriegen. Hier in Augustusburg hat de Gaulle Konrad Adenauer den Vorschlag
  unterbreitet, den wenige Monate später unterschriebenen Élysée -Vertrag abzuschließen.
  Auf dem Fundament dieses Vertrages und auf der Ergänzung dieses Vertrages um den
  Aachener Vertrag bauen wir auch heute beim deutsch-französischen Ministerrat auf.
  Unsere Arbeit zwischen Deutschland und Frankreich ist unerlässlich in einer Zeit,
  in der Russland unsere Sicherheit bedroht, in der die Volksrepublik China unsere
  Wirtschaft herausfordert und in der die transatlantische Partnerschaft an Selbstverständlichkeit
  verloren hat. Lieber Emmanuel , mit der Einladung hierher nach Augustusburg verbinde
  ich eine persönliche Botschaft an dich und an das französischen Volk: Die Freundschaft
  zu Frankreich und unser gemeinsamer Einsatz für ein einiges Europa sind der Kern
  der deutschen Außenpolitik. Wir zählen auf euch, und ihr könnt auf uns zählen. Ihr
  könnt euch auf uns verlassen. Ich bin dir persönlich sehr dankbar für das große
  Vertrauen und die Freundschaft, die uns verbinden, über die letzten Monate in gemeinsamer
  Regierungsverantwortung ganz besonders. Dass wir in diesen herausfordernden Zeiten
  eng zusammenstehen, ist von unschätzbarem Wert für unsere beiden Länder. Drei große
  Fragen haben uns heute und gestern beschäftigt. Die eine war: Wie schützen wir uns
  in einer gefährlichen Welt? Die zweite war: Wie stärken wir unsere Volkswirtschaften
  im globalen Wettbewerb? Und die dritte: Wie bringen wir Europa gemeinsam voran?
  Wir wollen diese Fragen gemeinsam beantworten. Wir wollen dies schnell tun, wir
  wollen dies konsistent tun, und wir wollen das mit einem realistischen Blick auf
  unsere politische Umgebung tun. Eine Schlüsselrolle für unsere Sicherheit spielt
  dabei unser gemeinsamer Einsatz für die Ukraine. Frankreich und Deutschland haben
  ganz wesentliche Beiträge dazu geleistet und werden sie weiter leisten – diplomatisch,
  militärisch und finanziell. Wir haben drei große Treffen hinter uns: den Gipfel
  der G7 in Évian , den NATO -Gipfel in Ankara und das Treffen der Koalition der Willigen
  am Montag und Dienstag dieser Woche in Paris. Alle diese Treffen zeigen: Unser Engagement
  hat Erfolg. Wir bestätigen das heute auch hier in Augustusburg. Wir setzen mit Entschlossenheit
  fort, was wir begonnen haben. Genau das haben wir heute vereinbart. Unser Ziel ist
  ein Frieden, der die Souveränität der Ukraine und die Sicherheit Europas wahrt.
  Ich nenne in diesem Zusammenhang nur ein Beispiel: Die Koalition der Willigen wird
  im Herbst auf französische Initiative ein Manöver abhalten. Deutschland wird sich
  beteiligen. Wir klären gemeinsam, wie diese Beteiligung im Einzelnen aussehen wird.
  Im heutigen Verteidigungs- und Sicherheitsrat haben wir zudem beschlossen, unsere
  strategische Zusammenarbeit zu vertiefen. Lieber Emmanuel , wir setzen damit um,
  was wir Anfang März bereits in einer gemeinsamen Erklärung verabredet haben. Wir
  haben den Rat heute Morgen im Fliegerhorst von Nörvenich abgehalten. Zugegen waren
  auch deutsche und französische Soldatinnen und Soldaten, erstmals mit einem nuklearfähigen
  französischen Rafale-Flugzeug. Das macht sichtbar: Wir schlagen in der Abschreckung
  einen neuen gemeinsamen Weg ein. In der neu geschaffenen strategischen Steuerungsgruppe
  durchdenken wir, mit welchem Mix an Fähigkeiten wir unsere gemeinsame Abschreckung
  in Zukunft weiter steigern können. Neben dieser Arbeit an einer gemeinsam Doktrin
  werden wir auch die konventionellen deutschen Kräfte noch in diesem Jahr an einer
  nuklearen Übung der französischen Streitkräfte beteiligen. Das ist komplementär
  zu unserer nuklearen Teilhabe und der Abschreckung in der NATO , an der wir festhalten.
  Herr Präsident, lieber Emmanuel , vor einem Monat sind wir schließlich zu dem Schluss
  gekommen, dass das gemeinsame FCAS -Flugzeug, das wir geplant hatten, an industriellen
  Differenzen gescheitert ist. Vor dieser ernüchternden Realität haben wir beide nicht
  die Augen verschlossen. Wir haben die notwendigen Konsequenzen gezogen. Ich danke
  dir dafür, dass wir das gemeinsam getan haben. Für mich war dies Ausdruck unserer
  belastbaren Partnerschaft. Wir haben heute einen neuen Arbeitsplan zur Kooperation
  in der Verteidigungsindustrie indossiert, den unsere Minister auf unsere Bitte hin
  ausgearbeitet haben. Er ist konkret, er ist realistisch, und er ist fokussiert.
  Er zeichnet unsere Zusammenarbeit für die nächsten Monate und Jahre vor. Wir werden
  zum Beispiel die wichtige Cloud -Lösung aus FCAS in anderem Rahmen fortentwickeln.
  Wir werden dort enger zusammenarbeiten, wo es für unsere Sicherheit den größten
  Unterschied macht. Das betrifft unter anderem integrierte Luftabwehr und Abstandswaffen,
  die wir gemeinsam entwickeln. Zugleich nutzen wir die Gelegenheit, um uns industriell
  gemeinsam besser aufzustellen, etwa beim deutsch-französischen Panzerbauer KNDS
  . Das macht uns sicherer, und es bringt unsere beiden Länder noch näher zueinander.
  Schließlich: Zur Stärkung unserer Wirtschaft setzen wir die Agenda um, die wir vor
  einem Jahr in Toulon gemeinsam beschlossen haben. Wir werden die europäische Industrie
  stärken, indem wir Innovation ermutigen. Wir fördern Spitzentechnologien wie zum
  Beispiel künstliche Intelligenz, Mikroelektronik und Fusionstechnologien. Wir wollen
  in der Energiepolitik das Projekt des südwestlichen Wasserstoffkorridors gemeinsam
  zum Erfolg führen. Und schließlich: In der Raumfahrt stimmen wir uns eng zu grundlegenden
  Fragen wie der Vergabe von Frequenzen für Satelliten sowie der europäischen Satellitenkonstellation
  IRIS - Square miteinander ab. Dieser Ministerrat, meine Damen und Herren, sendet
  auch einen gemeinsamen Impuls für Europa. Es stehen in den nächsten Monaten, im
  kommenden Halbjahr in der Europäischen Union wichtige Entscheidungen an. Wir haben
  mit unserem gemeinsamen Vorschlag neue Dynamik in den europäischen Erweiterungsprozess
  gebracht. Das betrifft die Integration der Ukraine, eines Landes wie Moldau und
  der Staaten des westlichen Balkans. Wir setzen diese Initiative fort. Wir stärken
  gemeinsam europäische Wettbewerbsfähigkeit. Wir arbeiten für unsere Integration,
  für eine tiefere Integration des europäischen Binnenmarkts. Wir kämpfen für entschiedenen
  Rückbau der Bürokratie. Wir setzen eine ehrgeizige Handelsagenda. Gegen unfaire
  Praktiken Dritter, wer immer das sein mag, wollen wir uns gemeinsam zur Wehr zu
  setzen und für faire Wettbewerbsbedingungen eintreten. Wir haben auch über den europäischen
  Haushalt gesprochen. Der mehrjährige Finanzrahmen muss tragfähig sein. Er soll am
  01.01.2028 für die dann folgenden sieben Jahre in Kraft treten. Wir wollen aber
  schon in diesem Jahr, wenn es möglich ist, einen gemeinsamen Abschluss des MFR erreichen.
  Das ist wichtig, damit Europa handlungsfähig bleibt. Meine Damen und Herren, erlauben
  Sie mir zum Schluss ein sehr persönliches Wort: Lieber Emmanuel , dies ist aller
  Voraussicht nach dein letzter deutsch-französischer Ministerrat. Ich will dir deshalb
  ganz besonders danken für das Vertrauen und auch den Elan, den dieser Rat geprägt
  hat und mit dem du diesen deutsch-französischen Ministerrat geprägt hast. Es ist
  für Lobreden zu früh. Wir wollen lieber in den nächsten Monaten weiter eng zusammenarbeiten,
  Vorhaben mit Schwung umsetzen und weitertreiben, was wir heute gemeinsam beschlossen
  haben. Insofern freue ich mich auf die gemeinsame Arbeit in den nächsten Monaten.
  Wir werden genau das tun, was uns immer ausgezeichnet hat, was den Geist der deutsch-französischen
  Zusammenarbeit ausgezeichnet hat: voller Vertrauen die gemeinsame Arbeit leisten,
  für Frankreich, für Deutschland, aber auch für die gesamte Europäische Union. Vielen
  Dank, Herr Bundeskanzler, vielen Dank, Friedrich. Sehr verehrte Damen und Herren
  Ministerinnen und Minister, sehr verehrte Anwesende! All denjenigen, die an der
  Vorbereitung dieses 26. deutsch-französischen Ministerrates und dieser Pressekonferenz
  teilgenommen haben: Der Bundeskanzler hat eigentlich alles gesagt. Ich werde versuchen,
  das kurz zu ergänzen. Für uns ist es eine sehr große Ehre, hier an diesem historischen
  Ort an Ihrer Seite zu stehen, denn er ist ein Symbol für die Versöhnung unserer
  beiden Staaten, zum einen, weil es der Ort des ersten Staatsbesuchs eines französischen
  Präsidenten, von Charles de Gaulle , in Deutschland war. Aber wenn man noch weiter
  in der Geschichte zurückgeht, dann gibt es da auch den Vertrag aus dem Jahr 1751,
  der die Einigkeit, Freundschaft und den guten Austausch zwischen Ludwig XV. und
  dem Erzbischof und Kurfürst von Köln zum Inhalt hat. Das war sozusagen der erste
  deutsch-französische Vertrag. Dieser 26. deutsch-französische Ministerrat stand
  unter dem Zeichen der Offenheit und der Willensbekundungen. Der Bundeskanzler hat
  es sehr klar gesagt: Wir erleben Zeiten, in denen die Herausforderungen ganz besonderer
  Art und ganz besonders stark sind. Es ist Krieg auf europäischem Boden. Es wird
  regelmäßig die Frage gestellt, wie solide die transatlantischen Beziehungen sind.
  Wir stehen vor technologischen Herausforderungen und Migrationsherausforderungen.
  Gleichzeitig haben wir einen ganz offenen Handelskrieg von chinesischer Seite. Das
  stellt viele unserer Grundlagen infrage, nicht nur auf wirtschaftlicher Ebene, sondern
  auch historisch, die für Europa grundlegend waren. Das bedeutet: Wir müssen auf
  deutsch-französischer Ebene noch viel enger zusammenarbeiten. Das haben wir bereits
  vor einem Jahr mit dem Stichwort „deutsch-französischer Reflex“ beschrieben. Heute
  ist es aber insbesondere eine Frage der Sicherheit. Denn wir wissen: Wenn Deutschland
  und Frankreich sich nicht einig sind, kommt Europa nicht voran. Wir kennen das.
  Wir wissen, was über die deutsch-französische Freundschaft gesagt wird. Aber in
  Wahrheit ist es tatsächlich so: Wenn Deutschland und Frankreich nicht zusammenstehen,
  kommt Europa nicht voran. Es ist die Grundvoraussetzung für europäischen Fortschritt.
  Davon ausgehend kann ich sagen: In unseren Gesprächen, ob in den Vieraugengesprächen
  oder in den erweiterten Gesprächen, haben wir tatsächlich einen sehr klaren Fahrplan
  zusammengestellt. Was Verteidigung und Sicherheit angeht, so hat der Bundeskanzler
  es sehr klar gesagt: Es ist uns nicht gelungen, alles umzusetzen, was wir uns vorgenommen
  hatten. Wir bedauern das. Das ist natürlich in jeglicher Hinsicht nicht besonders
  optimal. Wir sind uns bewusst, dass der FCAS gescheitert ist. Daraus haben wir Lehren
  gezogen. Denn wir wollen nun eine neue Governance auflegen, um dafür zu sorgen,
  dass für Verteidigungsprojekte die Governance auf Ministerebene, in den betroffenen
  Arbeitsgruppen und zwischen den Industrievertretern verbessert wird. Aber ich glaube,
  wir haben auch tatsächlich einen neuen Impuls, eine neue Dynamik angestoßen, die
  vor einem Jahr noch nicht ganz spürbar war. Das war das, was wir in den letzten
  Monaten sorgfältig aufgebaut haben. Das haben wir auch schon angekündigt, nämlich
  die erweiterte Abschreckung. Frankreich hat das angeboten. Deutschland hat das Angebot
  angenommen, und zwar sofort, denn damit ist auch Deutschland Teil dieser Vorreiterrolle
  in der strategischen nuklearen Abschreckung. Heute Morgen auf dem Fliegerhorst in
  Nörvenich haben wir Eurofighter gesehen und haben dort unseren Deutsch-Französischen
  Sicherheits- und Verteidigungsrat abgehalten, haben viele verschiedene Themen diskutiert,
  wie gesagt, die erweiterte Abschreckung und die ganze Bandbreite der möglichen Signale,
  die ausgestaltet werden können. Denn das können wir nur, wenn wir uns gegenseitig
  tief vertrauen. Das bedeutet, wir müssen gleichzeitig auch die konventionelle Abstützung,
  den konventionellen Schulterschluss hinzufügen. Das ist das, was wir erreicht haben,
  um zu konsolidieren, was wir in Toulon vereinbart haben. Dazu gehört das Projekt
  JEWEL . Das bedeutet, dass wir hier ein gemeinsames deutsch-französisches Angebot
  machen werden. Wir haben auch über das Thema „ Deep Precision Strike “ gesprochen,
  Präzisionsschläge in der Tiefe, wobei jeder unserer Minister ausloten wird, inwiefern
  er tatsächlich dazu beitragen kann, und zwar in Zusammenarbeit mit dem Vereinigten
  Königreich, wie gesagt, im Rahmen der erweiterten Abschreckung. Was die Abstandswaffen
  und die Luftabwehr angeht, werden wir auch in Bezug auf unseren SAMP/T mit unseren
  Partnern aus Italien Fortschritte erreichen, um da ein sehr klares Angebot machen
  zu können. In den kommenden Wochen werden wir uns auch mit der Strategie und der
  Governance von KNDS beschäftigen, sodass wir hier wirklich einen ganz neuen, starken
  Impuls in Sachen Verteidigungskooperation setzen. Was all das betrifft, was der
  Bundeskanzler über die Ukraine gesagt hat, glaube ich sagen zu können, dass wir
  durch unsere gemeinsame Arbeit in den letzten Wochen wirklich eine neue Wiederannäherung
  zwischen Europa und den USA schaffen konnten. Das heißt wir zum Beispiel in Ankara
  gesehen, wo die USA sich neu zugunsten der Ukraine engagiert haben. Wir haben gleichzeitig
  dafür gesorgt, dass Europa und seine Partner bereit sind, wie wir das Anfang der
  Woche in Paris gesagt haben, die Sicherheitsgarantien für die Ukraine bereitzustellen.
  Auch zum Thema Wirtschaft hatten wir sehr gute Gespräche. Da gibt es Dinge, in denen
  wir sehr gut vorankommen, und die konnten wir während dieses Ministerrats auch noch
  einmal konsolidieren. Das waren Arbeiten, die von unseren Ministern vorbereitet
  wurden, indem sie dem Fahrplan von Toulon gefolgt sind. Wir hatten vor Kurzem einen
  Gipfel über die digitale Souveränität in Berlin. Deutschland war geehrter Gast bei
  der VivaTech . All das sind Bestandteile dieser wirtschaftlichen Zusammenarbeit,
  die gut funktioniert. Es gibt starke Zusammenarbeit, Initiativen zur Frontier-AI
  -Initiative und die Gründung unserer französischen DARPA , also einer französischen
  Agentur, die das Gegenstück zu dem deutschen SPRIND darstellt. Wir sind auch fest
  entschlossen, Fortschritte in Sachen der kritischen Rohstoffe zu erreichen. Gleichzeitig
  haben wir eine weitere gemeinsame Agenda für die technologische Innovation aufgestellt,
  wie wir sie in Europa zu strategischen und anderen Themen voranbringen wollen. Dazu
  gehören, wie gesagt, kritische Rohstoffe, und wir konnten gute Fortschritte erreichen.
  Jetzt zum Thema Raumfahrt, Weltraum: Da gab es in den vergangenen Monaten einige
  Unwägbarkeiten, und zwar aufgrund der Positionen unserer jeweiligen Industrievertreter,
  die dazu geneigt waren, nationalen Lösungen den Vorzug zu geben. Wir ziehen es aber
  deutlich vor, über den Rhein hinaus und auch über den Atlantik hinaus die Kooperation
  voranzubringen. Ich glaube, auch da konnten wir gut vorankommen, weil wir gemeinsam
  unsere Unterstützung für das IRIS ²-Projekt zum Ausdruck gebracht haben – insbesondere
  auch für die Finanzierung, denn es ist wichtig, dass Europa tatsächlich Souveränität
  gewinnt gegenüber Angeboten, die aus China oder den USA kommen. Wir sind auch fest
  entschlossen, die Satellitenkonstellationen weiter zu fördern und zu konsolidieren,
  ob für zivile oder militärische Anwendungen. Aber abgesehen von dem, was ich gerade
  aufgezählt habe, kommt es vor allen Dingen darauf an, wie wir mit der Frequenzzuteilung
  in Europa umgehen; denn auch das ist ein extrem wichtiger Bestandteil für die europäische
  Souveränität. Wir haben die Arbeit bereits vor langer Zeit begonnen, haben das jetzt
  noch einmal verfestigt und vertieft und haben unsere Minister noch einmal beauftragt,
  das bis zum September voranzubringen, weil wir einen gemeinsamen Gipfel zum Thema
  Raumfahrt ausrichten werden. Da können wir dann auch gemeinsam neue europäische
  Initiativen unterstützen. Die europäische Souveränität haben wir auch im Auge, wenn
  wir über die Vereinfachung der Regularien und der Bürokratie auf europäischer Ebene
  sprechen. Auch da ist es die deutsch-französische Dynamik, die dazu beigetragen
  hat, dass wir Fortschritte erreichen konnten. Auch eine Vertiefung des Binnenmarktes
  in allen Bereichen verdanken wir der Arbeit unserer Teams. Nun haben wir uns darauf
  geeinigt, dass wir tatsächlich noch in diesem Halbjahr die Kapitalmarktunion, also
  die Union des Kapitals für Investitionen und für Spareinlagen, abschließen wollen.
  Das ist ja die Grundlage; denn wir brauchen eine Finanzierung für all die Innovationen –
  Quanten computing , KI –, die notwendig sind. Die Minister haben das mittlerweile
  schon strukturiert. Jetzt geht es um die Umsetzung, und ich denke, das sollten wir
  auch während des irischen Ratsvorsitzes noch umsetzen; denn auch Irland ist sehr
  dafür und unterstützt das. Das betrifft zum Beispiel auch die digitale Finanzwelt
  oder den digitalen Euro. Das haben wir alles neu bekräftigt und strukturiert. Wir
  hatten auch sehr gute Gespräche zum Thema China. Ich habe das Gefühl, dass wir uns
  zu diesem Thema noch nie so nah angenähert haben. Wir hatten in unserem Verhältnis
  zu China nicht die gleichen Erfahrungen gemacht, aber heute stellen wir, glaube
  ich, alle fest, dass wir ‑ ‑ ‑ Ich sage noch einmal ganz deutlich: Ich bin nicht
  antichinesisch eingestellt, das meine ich nicht, aber wir spüren in unseren Volkswirtschaften
  und in ganz Europa, dass jedes Jahr ein Handelsbilanzdefizit mit China von einer
  Milliarde Euro zustande kommt. Dadurch gehen Zehntausende von Arbeitsplätzen in
  Europa verloren. Dahinter steht mit China natürlich ein Land, das in Sachen Innovation
  eine Führungsrolle hat. Aber wenn wir nun Technologietransfers in unsere Länder
  fördern wollen, dann müssen wir uns dementsprechend aufstellen. Wir dürfen nicht
  einfach nur chinesische Produkte importieren, sondern wir brauchen eben Technologietransfer,
  ob im Bereich Chemie, im Automobilbereich oder in vielen anderen Industriebereichen.
  Diese Industriebereiche stehen unter Druck, weil China seine eigenen Industriezweige
  im Durchschnitt achtmal stärker unterstützt, als wir das tun können. Das sind Spielregeln,
  die wir neu aufstellen müssen. Dementsprechend haben wir ein neues Mandat an die
  Europäische Kommission gegeben, um die Instrumente aufzubauen, mit denen wir handelspolitisch
  unsere Volkswirtschaften schützen können. Wir haben die Minister für Finanzen, Auswärtiges
  und Wirtschaft darum gebeten, bis zum Ende des Jahres einen deutsch-französischen
  Fahrplan zu diesem Thema zu erstellen. Darüber hinaus wollen wir natürlich auch
  den Dialog mit China aufrechterhalten, und da wollen wir zum Beispiel auch über
  Währungsthemen sprechen; denn das ist ebenfalls grundlegend, um die Ungleichgewichte
  auszugleichen oder ausgewogener zu gestalten, wenn es um die Währung geht. Auch
  darüber werden wir weiter diskutieren. Was die weiteren Wirtschaftsthemen betrifft,
  kann ich sagen: Wir haben uns vorgenommen, bis zum Ende des Jahres den nächsten
  mittelfristigen Finanzrahmen der EU auszuarbeiten, um einen gemeinsamen Vorschlag
  zu unterbreiten. Wir wollen, dass das ein ausgewogener Haushalt wird und dass neue
  eigene Ressourcen mit eingebunden werden. Auch hier müssen wir, wie gesagt, einerseits
  ehrgeizig, andererseits aber auch pragmatisch vorgehen. Was die Erweiterung und
  die die internen Reformen der EU angeht, so haben wir, glaube ich, eine ganz ähnliche
  Vorgehensweise, die wir auch in den kommenden Monaten umsetzen werden. Wir haben
  unsere Minister darum gebeten, eine deutsch-französische Vereinbarung in Bezug auf
  die europäische Präferenz und die sogenannte ETS -Reform auszuarbeiten, also um
  den Emissionshandel zu reformieren, damit wir unsere CO 2 -Emissionsziele erreichen
  können. Dazu gehören auch all die Regularien im Zusammenhang mit der sogenannten
  Industrial-Accelerator -Verordnung, sodass wir wirklich einen sehr strukturierten
  Fahrplan haben, um einerseits unsere nationalen Interessen vertreten zu können,
  aber vor allen Dingen gleichzeitig den europäischen Standort verteidigen zu können –
  im richtigen Rhythmus, in der richtigen Geschwindigkeit und mit ordentlichen, angemessenen
  Schutzmaßnahmen. Drittens geht es in unserer Zusammenarbeit vor allen Dingen auch
  darum, unsere Zivilbevölkerung und die Demokratie, unsere Gesellschaft zu schützen.
  Wir haben eine Vereinbarung getroffen, um gegen irreguläre Migration vorgehen zu
  können, Schleuserkriminalität zu bekämpfen und das umzusetzen, was wir bereits auf
  europäischer Ebene im Zusammenhang mit dem Migrationspakt angestoßen haben. Wir
  wollen bei grenzüberschreitenden Themen konkrete Erfolge erreichen, sei es im Schienenverkehr
  oder bei der Mobilität der Arbeitnehmer, wenn es um Arbeitnehmerentsendungen oder
  grenzüberschreitende Ausbildung geht. Wir werden im Herbst einen deutsch-französischen
  Gipfel zu Sozialthemen ausrichten – auch im Dialog mit den Sozialpartnern –; denn
  es ist wichtig, diese Reformen voranzutreiben und auch hier so konvergent wie möglich
  vorzugehen. Wir werden gemeinsam Pläne schmieden, um die berufliche Weiterbildung
  in Sachen KI anzustoßen; denn das ist dringend notwendig. Für die Rentenreformen
  hatten wir diesen konvergenten Ansatz bereits, und wir müssen feststellen – das
  kann ich nicht leugnen –, dass diesbezüglich in Frankreich eine Verzögerung eingetreten
  ist. Deutschland hat ganz praktisch und klarsichtig eine Reform aufgelegt, die sozusagen
  all das infrage stellt, was infrage gestellt werden muss – ob es nun das Renteneintrittsalter
  oder die Beitragsjahre sind –, und das wird dann auch umgesetzt. Diese Themen können
  wir im Vorfeld der Präsidentschaftswahlen in Frankreich aber kaum mehr aufgreifen,
  obwohl wir natürlich sehen, dass wir, wenn es um die Demografie geht, mit ähnlichen
  Problemen konfrontiert sind. Wir haben auch darüber gesprochen, dass unser Engagement
  zugunsten des Deutsch-Französischen Jugendwerks weitergeführt wird, wir aber auch
  zusammenstehen, wenn es darum geht, gegen ausländische Einflussnahme vorzugehen.
  Wir haben noch einmal bestärkt, dass wie bei Arte europäisiert werden soll und mit
  France Médias Monde und Deutscher Welle ein „Informationsschutzschild“ – in Anführungszeichen –
  aufgebaut werden soll, so wie auch in Bezug auf den Schutz von Minderjährigen und
  den Jugendschutz in den sozialen Netzwerken. Gemeinsam wollen wir diese Agenda auch
  auf europäische Ebene heben; denn angesichts der Bedrohungen, die von der KI ausgehen
  können, schützen wir mit dem Jugendschutz wir gleichzeitig auch unsere Demokratie
  und unsere Zivilgesellschaften. Lieber Herr Bundeskanzler, ich möchte noch einmal
  bekräftigen, dass wir Ihnen für Ihre Unterstützung und für diese sehr guten Gespräche
  sehr dankbar sind. Denn wenn wir uns die Zeit nehmen, ausführlich über strategische
  Themen zu sprechen, können wir Fortschritte erreichen. Ich muss sagen, ich habe
  mit Freude festgestellt, dass auch das Vertrauensverhältnis zwischen unseren verschiedenen
  Ministern sehr gut ist und vorangekommen ist. Das ist wichtig, weil wir gemeinsam
  mit unseren Ministern einen neuen Fahrplan für die kommenden Wochen und Monate aufstellen
  wollen, damit wir bis September nicht nur für unsere binationalen Anliegen Fortschritte
  erreichen, sondern auch für Europa – in Sachen Industrie, in Sachen Kapitalmarktunion,
  in Sachen Handelspolitik gegenüber China. Das ist für uns ausschlaggebend und lebensnotwendig,
  genauso wie es das für Europa ist. Frage: Verehrter Herr Präsident, lieber Herr
  Bundeskanzler, Sie haben Pläne für die nächsten Monate gemacht, aber in weniger
  als einem Jahr – Sie haben es selbst gesagt – findet in Frankreich eine Präsidentschaftswahl
  statt. Es bestehen gute Chancen, dass das Rassemblement National aus diesen Wahlen
  als Gewinner hervorgeht. Wie sehen Sie in diesem Zusammenhang die Fortschritte auf
  militärischer Ebene, bzw. inwiefern denken Sie, dass Marine Le Pen den Fortbestand
  der deutsch-französischen Freundschaft infrage stellen könnte? Herr Bundeskanzler
  würden Sie im Fall eines Sieges von Rassemblement National in Frankreich Marine
  Le Pen für eine Partnerin halten? Könnten Sie mit ihr gemeinsame politische Anknüpfungspunkte
  finden? Bundeskanzler Merz: Vielen Dank für diese Frage. Wir haben uns in allem,
  was wir besprochen haben, ausschließlich daran ausgerichtet, was jetzt das Richtige
  und Notwendige für unsere beiden Länder, für die Europäische Union und für den europäischen
  Teil der NATO ist. In diesem Geist hat das G7 -Treffen in Evian stattgefunden, in
  diesem Geist hat das NATO -Treffen in Ankara stattgefunden, und in diesem Geist
  haben wir uns auch gestern und heute hier getroffen. Wir tun das Notwendige für
  unsere Freiheit, für unsere Sicherheit und für unsere gemeinsame Verteidigung. Emmanuel
  Macron wird nicht der nächste französische Präsident sein können, aber ich gehe
  davon aus, dass jeder Nachfolger bzw. jede Nachfolgerin sich genau an dem orientiert,
  was im Interesse unserer Länder das Richtige und das Notwendige ist. Ich kann aus
  deutscher Sicht nur sagen: Wir werden auch in Zukunft alles tun, um diese Zusammenarbeit
  mit unserem französischen Nachbarn so intensiv und so tief und vertrauensvoll wie
  möglich zu gestalten, ganz unabhängig davon, wie die Wählerinnen und Wähler in Frankreich
  entscheiden werden. Das gilt sowohl für den Élysée als auch für die Nationalversammlung.
  Die deutsche Hand bleibt immer ausgestreckt zur vertieften und vertrauensvollen
  Zusammenarbeit mit Frankreich, ganz unabhängig davon, wie die Wählerinnen und Wähler
  in unseren beiden Ländern entscheiden. Präsident Macron : Wenn ich mir diesen Kommentar
  erlauben darf: Sie sollten sich nicht allzu sehr auf die Umfragen verlassen. Ich
  kenne viele Leute, die im Juli 2016 schon gewählt waren, aber das waren dann nicht
  unbedingt die gleichen, die im Mai 2017 tatsächlich das Amt übernommen haben. Meine
  ganz bescheidene Anmerkung wäre also: Am 22. Mai 2027 wird gewählt. Ich würde noch
  hinzufügen: Vertrauen Sie dem französischen Volk. Sagen Sie nicht immer das Schlimmste
  voraus, sondern hoffen Sie auf das Beste, vertrauen Sie auf das Beste. Wir arbeiten
  für unsere Bevölkerung, wir arbeiten für unsere Länder, und das ohne Rücksicht auf
  unsere eigene Person. Die Entscheidungen, die wir getroffen haben, waren notwendig
  und richtig für unsere Sicherheit, für unseren Wohlstand, für unseren Frieden, und
  ich glaube, dass das Entscheidungen sind, die von den meisten unterstützt werden
  können. Die beste Agenda ist die, die wir so schnell wie möglich und so effizient
  wie möglich umsetzen können. In diesem Geiste arbeiten wir zusammen. Frage: Monsieur
  le Président , ich würde Sie gerne zur nuklearen Abschreckung fragen. Sie haben
  heute beschlossen, dass Deutschland sich erstmals an einer Nuklearübung Frankreichs
  beteiligt. Welche Schritte können Sie sich darüber hinaus für die Zukunft vorstellen?
  Können Sie sich perspektivisch vielleicht sogar vorstellen, französische Atomwaffen
  in Deutschland zu stationieren? Herr Bundeskanzler, können Sie sich eine nukleare
  Teilhabe ähnlich wie die, die mit den USA schon besteht, mit Frankreich vorstellen?
  Wären Sie bereit, das französische Atomprogramm mit zu finanzieren? Werden Sie diese
  Kooperation auch immer noch so gut finden, wenn Marine Le Pen die Wahl gewinnt und
  Präsidentin wird? Präsident Macron: Da möchte ich einem Vogel den Hals umdrehen
  (ein Gerücht aus der Welt schaffen) , wie man bei uns sagt: Das Prinzip der erweiterten
  Abschreckung, das wir vorgeschlagen bzw. angeboten haben, das wir mit dem Bundeskanzler
  diskutiert haben und das wir sehr ausführlich und detailliert vorbereitet haben,
  enthält keineswegs eine Kofinanzierung des französischen Nuklearprogramms. Das sage
  ich jetzt einmal ganz definitiv, um denjenigen den Wind aus den Segeln zu nehmen,
  die darüber spekulieren. Wir finanzieren das auf französischer Seite. Wir haben
  unseren eigenen Militärhaushalt in den vergangenen neun Jahren mehr als verdoppelt.
  Der kommende Militärhaushalt wird in den nächsten Wochen verabschiedet. Das ist
  also finanziert. Das Ziel besteht darin, dass wir die Sicherheit des europäischen
  Kontinents verbessern und dass wir bei unseren Gegnern mehr Unsicherheit schaffen –
  das ist ja das Ziel der Abschreckung. Es geht darum, dass wir eine gewisse strategische
  Nähe haben, dass wir unsere Geheimnisse untereinander diskutieren, dass wir gemeinsame
  Manöver machen, dass wir gemeinsame Industriepartnerschaften haben, dass unsere
  Teams zusammenarbeiten ‑ nicht nur die Minister, sondern auch die Militärangehörigen –
  und dass wir damit sozusagen Unsicherheit beim Gegner schaffen; denn das ist das
  Prinzip der Abschreckung. Deshalb können potenziell auch andere Partner zu dieser
  Strategie hinzukommen. Das ist auch nicht nur unser einziger Joker , wenn ich das
  so sagen darf. Es gibt Dinge, über die wir mit unseren Partnern diskutieren. Wir
  haben den Willen, mit Deutschland zusammen so weit zu gehen, wie es möglich ist –
  nicht nur auf der Grundlage des Vertrags von Aachen, sondern auf der Grundlage des
  Vertrauens, das zwischen uns beiden Ländern herrscht. Wie gesagt, wir wollen damit
  Unsicherheit bei unseren Gegnern säen; denn man muss ja davon ausgehen, dass die
  absolute Transparenz nicht immer angemessen ist. Wichtig ist aber, dass wir das
  immer gemeinsam entscheiden und dass wir darüber diskutieren. Ich sage es aber noch
  einmal: Die Finanzierung des französischen Nuklearprogramms läuft ausschließlich
  über Frankreich. Bundeskanzler Merz: Herr Kollege, vielen Dank. Ich komme vielleicht
  noch einmal zu der Entscheidung zurück, die wir heute getroffen haben: Wir haben
  eine strategische Steuerungsgruppe zwischen unseren beiden Ländern eingerichtet,
  die ausschließlich die Aufgabe hat, zu klären, wie wir unsere gemeinsame Abschreckung
  steigern können. Wir wollen uns verteidigen können, damit wir uns nicht verteidigen
  müssen – diesen Satz kennen Sie von mir. Ich habe das Angebot des französischen
  Staatspräsidenten, an dieser nuklearen Abschreckung gemeinsam mitzudenken, erstmalig
  angenommen. Zur historischen Einordnung: Es gab bereits ein Angebot von Charles
  de Gaulle an die Bundesrepublik Deutschland, den nuklearen Schutzschirm auch auf
  das deutsche Territorium zu erstrecken. Das ist von Deutschland aus nie angenommen
  worden. Das mussten wir auch nicht annehmen, weil wir in einer anderen Welt gelebt
  haben. Aber die Welt, in der wir heute leben, erfordert neue Antworten. Wir werden
  jetzt das erste Mal konventionell an einer solchen Übung teilnehmen, um herauszufinden,
  wo wir gemeinsame Ziele erreichen können, nämlich eine verbesserte Abschreckung
  in Europa. Dies wird komplementär zu dem bleiben, was wir gemeinsam, Deutschland
  und Frankreich, an nuklearer Teilhabe auch im NATO -Bündnis ausüben. Das heißt,
  wir steigern unsere Verteidigungsfähigkeit, indem wir ein Angebot im Hinblick auf
  die nukleare Abschreckung ernsthaft prüfen, das uns die französische Regierung gemacht
  hat. Wir gehen dabei Schritt für Schritt vor. Es kann sein, dass das in einer neuen
  Doktrin endet. Aber es ist viel zu früh, das heute schon zu sagen. Die Steuerungsgruppe
  hat nicht mehr und nicht weniger als den Auftrag, alle strategischen Optionen für
  uns zu erörtern und auch entsprechende Vorschläge zu machen, wie wir Schritt für
  Schritt unsere Verteidigungsfähigkeit verbessern können. Frage: Herr Bundeskanzler,
  Herr Präsident, können Sie uns, was FCAS angeht, Anmerkungen darüber machen, wie
  das nun fortgesetzt wird? Combat Cloud des FCAS , wie wird das weitergeführt? Wie
  steht es mit dem MGCS , mit dem künftigen Kampfpanzer? Noch eine Frage zum Nahen
  Osten: Sie haben vergangene Woche den Iran zu Ruhe und Friedlichkeit aufgerufen.
  Die USA haben erneut Attacken gefahren. Werden Sie auch die USA anrufen und um Ruhe
  bitten? Präsident Macron : Zu Ihrer ersten Frage: Ja, die FCAS -Projekte, also zur
  Combat Cloud , werden nach Plan fortgesetzt, so wie wir es terminiert hatten. Denn
  das Einzige, was eingestellt wurde, ist das gemeinsame Kampfflugzeug. Aber der Rest
  wird natürlich weiterentwickelt. Was den künftigen Kampfpanzer MGCS angeht, haben
  wir unser Engagement erneut bekräftigt und in dem Zusammenhang, wie gesagt, auch
  angestoßen, dass die Governance von KNDS neu strukturiert wird, um KNDS tatsächlich
  zu einem Wettbewerber ersten Ranges zu machen. Das bedeutet, dass zum Beispiel auch
  das Kapital neu zusammengesetzt wird, auch die Möglichkeit, dieses Unternehmen zum
  Beispiel als ein öffentliches Unternehmen zu strukturieren. Es ist nicht immer eine
  gute Lösung, wenn rein private Rüstungsanbieter auf unsere Bedarfe antworten müssen.
  Deswegen haben wir auf unserem Sicherheits- und Verteidigungsrat heute Morgen darüber
  gesprochen, wie wir das umgestalten können. Um noch auf den letzten Teil Ihrer Frage
  einzugehen: In Luzern wurde eine Vereinbarung vorbereitet, die dann im Rahmen des
  G7 -Treffens verabschiedet wurde. Wir haben sie auch unterstützt. Darin ist enthalten,
  dass die Straße von Hormus bedingungslos wiedereröffnet werden und dass gleichzeitig
  eine Waffenruhe in Libanon eingerichtet werden muss, und zwar im Verlauf von 60 Tagen.
  Ich würde Iran dazu aufrufen, diese Vereinbarung einzuhalten. Das war nicht in dieser
  Vereinbarung enthalten. Ich denke, es müssen wirklich alle wieder zur Ruhe kommen
  und sich an das halten, was sie unterzeichnet haben, nämlich die Wiedereröffnung
  der Straße von Hormus und die Weiterführung der Gespräche. Ich habe den Eindruck,
  dass aufgrund der Tatsache, dass Iran zuerst Schläge ausgeführt hat, die USA dann
  zurückgeschlagen haben. Das ist aber nicht die richtige Vorgehensweise. Diese Vereinbarung
  ist natürlich nicht perfekt, aber sie trägt zumindest dazu bei, dass eine Waffenruhe
  im Libanon geschaffen wird, die Verhandlungen weitergeführt werden und schlussendlich
  die Straße von Hormus wiedereröffnet wird. Das ist unser Hauptziel. Wir haben dafür
  vor einigen Wochen auch eine Ad-hoc-Mission eingesetzt. Ich habe auch mit dem Sultan
  von Oman gesprochen. Soweit ich weiß, entscheidet Iran nicht darüber, was für den
  Oman gut ist oder nicht. Bundeskanzler Merz: Vielleicht noch eine ergänzende Anmerkung
  zu FCAS : FCAS war nie allein ein neues Kampfflugzeug, sondern es war immer ein
  System. An diesem System halten wir fest, und wir bauen es weiter aus. Vielleicht
  ist die gesamte Umgebung, also zum Beispiel eine Cloud -Umgebung oder zum Beispiel
  die gesamte digitale Steuerung, in der längeren Perspektive viel wichtiger als ein
  neues Flugzeug. Insofern haben wir diese technologische Zusammenarbeit für diese
  Industrie gestern und heute Morgen wirklich auf ein neues Fundament gestellt. Ich
  bin mir sicher, dass dies auch Früchte tragen wird, zum einen im Sinne von Effizienzgewinnen
  – wir arbeiten wo immer möglich zusammen –, zum anderen aber auch in der Stärkung
  unserer Verteidigungsfähigkeit. Präsident Macron hat das Unternehmen KNDS angesprochen.
  Sie wissen es vermutlich; wir werden bemüht sein, einen ähnlich hohen Anteil oder
  sogar ziemlich genau den hohen Anteil von der Eigentümerfamilie zu übernehmen, sodass
  die Bundesrepublik Deutschland und Frankreich, auch was die Beteiligungsverhältnisse
  an diesem Unternehmen betrifft, gleichberechtigte Partner sein werden. Wir haben
  uns bereits mit der Familie und der französischen Regierung auf eine entsprechende
  Governance struktur verständigt, sobald es zum Erwerb dieses Anteils gekommen sein
  wird. Wir werden hier also gemeinsame strategische Entscheidungen treffen, nicht
  zuletzt auch im Hinblick auf einzelne Unternehmen, die im Markt tätig sind. Frage:
  Monsieur le Président , ich möchte nach den europäischen Zielen fragen, die Sie
  beide gemeinsam haben, und dann nach dem Finanzrahmen. Mir leuchtet noch nicht ganz
  ein, wo die Übereinstimmung zwischen Frankreich und Deutschland liegen könnte. Denn
  Frankreich hat immer Wert darauf gelegt, sehr hohe Agrarausgaben auch über die EU
  mitfinanzieren zu lassen. Können Sie skizzieren, wo Frankreich Deutschland bei der
  Begrenzung des Haushalts denn entgegenkommen könnte? Herr Bundeskanzler, der Präsident
  hat die Übereinstimmung in Fragen, wie man mit China umgeht, betont. Aber China
  weist einerseits Ihre Vorwürfe zurück, dass der Yuan so unterbewertet sei. Andererseits,
  gerade jetzt mit Blick auf die Klimaanlagen, weist China darauf hin, dass auch der
  Vorwurf der Überkapazitäten völlig falsch sei, weil die Europäer nach Klimaanlagen
  aus China schreien würden. Vielleicht können Sie eine Antwort auf die Frage geben,
  ob Sie wirklich zur Abwehr chinesischer Produkte bereit sind. Aus aktuellem Anlass
  muss ich die Frage nach Jens Spahn stellen. Es gibt einen ersten CDU -Landesverband,
  der seinen Rücktritt fordert, da er eine zentrale Figur in Ihrer Regierung ist.
  Was sagen Sie zu dem Vorwurf? Würden Sie Herrn Spahn verteidigen oder nicht? Präsident
  Macron : Zum Thema des Haushalts: Frankreich verteidigt natürlich ein großes Agrarbudget,
  aber damit sind wir nicht die Einzigen. Die Einigung über ein Agrarbudget kann man
  nicht allein erreichen, dazu braucht man andere. Es ist für mich jetzt das dritte
  Mal, dass ich diese Haushaltsverhandlungen führen muss. Ich weiß also, wovon ich
  spreche. Wir sind bereit, das zu tun, was man in Brüssel „ smart cuts “ nennt, also
  intelligente Kürzungen, Kürzungen, mit denen wir einverstanden sind. Das heißt,
  wir beginnen die Verhandlungen, um herauszufinden, wo wir Kürzungen vornehmen können,
  ohne dass unsere Prioritäten beeinträchtigt werden. Das heißt, wir müssen wissen,
  was wir brauchen. Wir brauchen einen europäischen Haushalt, der unsere gesamten
  politischen Interessen verteidigt. Dazu gehört nicht nur die Landwirtschaft. Denn
  es nutzt ja nichts, wenn wir digitale Souveränität haben, aber landwirtschaftlich
  abhängig sind von irgendjemand anderem. Das wäre ja Unsinn. Wir haben nach dem Krieg
  die Ernährungssouveränität durch unsere Landwirtschaft aufgebaut. Das muss also
  gleichzeitig gedacht werden. Nur so können wir die europäische Konvergenz erreichen.
  Dann sieht man, dass es natürlich Haushaltsbereiche gibt, die deutlich stärker ansteigen
  und auf die wir uns auch einigen können. Dann gibt es noch die Notwendigkeit, neue
  Politikbereiche zu bedienen, wie zum Beispiel den Raumfahrtsektor, den digitalen
  Sektor, die Verteidigung oder auch Quanten computing . Wenn wir da ehrgeizige Ziele
  erreichen und den Binnenmarkt verteidigen wollen, dann müssen wir das wirklich ausgleichen.
  Anders ist es nicht möglich. Egal wie Sie es nennen, sind das die wichtigen Säulen
  für den nächsten EU -Haushalt. Daher schauen wir in jedem Bereich, wie wir intelligente
  Einsparungen im Haushalt erreichen können. Dann müssen wir uns natürlich auch in
  Bezug auf das vorbereiten, was uns die Kommission in Sachen eigener Ressourcen unterbreiten
  will. Denn die EU kann ja auch eigene Einnahmen haben, sei es über eine Digitalsteuer
  oder über eine CO 2 -Steuer an der Grenze. Denn damit kann die EU ihren Haushalt
  steigern, ohne dass wir als beitragszahlende Länder unseren Beitrag steigern müssen.
  Das ist in diesem Geiste, in dem wir vorankommen und dann natürlich auch eine Vereinbarung,
  einen Kompromiss erreichen wollen. Zum Thema China: Die Zahlen sind doch recht eindeutig.
  Wir sehen, dass in China achtmal mehr Unterstützung für die Unternehmen geleistet
  wird, als der Durchschnitt in den OECD -Ländern beträgt. Gleichzeitig gibt es eine
  enorme Überkapazität in der Produktion, die vom chinesischen Binnenmarkt nicht aufgenommen
  wird. Wenn wir nicht versuchen, da ein Gleichgewicht zu schaffen, hätten wir wirklich
  das Nachsehen. Dementsprechend müssen wir auch die tarifären Maßnahmen neu überprüfen.
  Sie können sich vielleicht daran erinnern, dass die Kommission, als es um Elektrofahrzeuge
  aus China ging, einen sehr differenzierten Vorschlag gemacht hat, was die Unterstützung
  der Unternehmen angeht. Dieses Mal sind wir uns wirklich einig, weil die Feststellung
  einfach die gleiche ist. Wir können jetzt kein „ decoupling “ von China vornehmen.
  Wir müssen uns auf Technologie und kritische Rohstoffe einigen und dabei unsere
  Unternehmen schützen. Ob das Sicherungsmaßnahmen sind, das sind die Themen, die
  wir mit der Kommission besprechen. Das darf nicht anderthalb Jahre dauern. Denn
  wenn wir eine Maßnahme vornehmen und umsetzen, dann schützen wir damit unsere industrielle
  Basis, und China kann darauf direkt reagieren. Aber das muss schnell gehen. Denn
  wenn das jetzt nicht geschieht, dann bringt uns die Kommission letztendlich in eine
  unlösbare Situation. Wir müssen Europa und die europäischen Inhalte verteidigen.
  China hat chinesische Präferenzen und verteidigt den chinesischen Markt. Über das
  NAFTA-Abkommen verteidigen auch die USA ihren eigenen Markt. Also müssen wir es
  in der EU genauso tun. Wir beginnen, es zu tun, aber wir müssen schneller werden.
  Wir sind nun 27. Zum Haushalt tragen 27 Länder bei. Die Türken und andere sind Vertrauenspartner,
  aber sie tragen nicht zu unserem Haushalt bei. Auch unsere Handelspartner, Indien
  und andere, mit denen wir vertrauensvolle Verhältnisse und mit denen wir Handel
  pflegen, tragen nicht zu unserem EU -Haushalt bei. Den Haushalt bestreiten wir nur
  zu 27. Da müssen wir auch unsere Beschäftigung in der EU verteidigen. Um das, wie
  gesagt, detailliert auszudiskutieren und gemeinsame Vorschläge zu machen, haben
  wir darüber auch auf dem G7 -Gipfel in Évian gesprochen. Wir müssen den Aspekt der
  Währung mit einbeziehen, damit wir als Europäer mit China wirklich einen strategischen
  Dialog führen können. Denn heute steht der Yuan oder Renminbi in einem Verhältnis
  zum Euro, das nicht wahrheitsgetreu ist und nicht widerspiegelt, wie unsere Handelsbilanzen
  aussehen. Man kann Renminbi oder Yuan nicht gegen Euro aufwiegen. Das ist ein Problem
  für unsere Haushalts- und Handelsbilanz. Wir müssen mit Respekt vorgehen, aber bestimmt.
  Bundeskanzler Merz: Lassen Sie mich zunächst etwas zu Jens Spahn sagen. Mir ist
  bewusst, dass dieses Thema in seiner ganzen Dimension – menschlich, juristisch,
  gesellschaftlich, ethisch – im Augenblick sehr viele Menschen in Deutschland aus
  aktuellem Anlass bewegt. Wir haben dazu in Deutschland eine klare Rechtslage. Wir
  haben in der Partei, in der CDU , einen Parteitagsbeschluss. Ich sehe nicht, dass
  an der Rechtslage oder an dem Parteitagsbeschluss Änderungen vorgenommen werden
  sollen. Alles Weitere werden wir in der nächsten Sitzung des Präsidiums der CDU
  Deutschlands besprechen. Hier und heute hat das keine Rolle gespielt. Vielleicht
  erlauben Sie mir, etwas zu den beiden Themen von MFR und China zu sagen. Zunächst
  zum MFR : Wir beide haben verabredet, dass wir, wenn möglich, die Verhandlungen
  in der Europäischen Union bis Ende des Jahres abschließen wollen. Das heißt, wir
  wollen Ende des Jahres 2026 Klarheit darüber haben, was ab dem 1. Januar 2028 für
  dann sieben Jahre gilt. Das ist ein ehrgeiziger Zeitplan. Denn wir haben dabei viele
  Fragen zu beantworten. Aber wir sind uns in zwei Fragen heute schon sicher einig;
  denn eine davon ist bereits entschieden, und die zweite ist unstreitig. Die entscheidende
  Frage ist, dass wir die Kohäsionsfonds und die Agrarfonds in Zukunft in einem großen
  Fonds zusammenfassen. Darüber gibt es bereits eine Verordnung. Das ist politisch
  entschieden. Das Zweite ist: Wir müssen in der Europäischen Union auf die neuen
  Herausforderungen, denen wir ausgesetzt sind, neue Antworten geben. Neue Antworten
  zu geben, heißt, alte Antworten nicht mehr in der gleichen Weise zu geben. Insofern
  müssen wir jetzt mit neuen Prioritäten umgehen und versuchen, sie umzusetzen. Das
  wird nicht einfach. Aber Deutschland und Frankreich sind zwei der großen Beitragszahler.
  Ich sehe im Augenblick, aus dem Kopf heraus, keinen, der mehr in den europäischen
  Haushalt einzahlt als Deutschland und Frankreich. Insofern haben wir ein hohes Interesse
  daran, dass die Mittel im europäischen Haushalt effizient eingesetzt werden. Darüber
  werden wir intensiv diskutieren. Aber ich kann eines jedenfalls für uns, für Deutschland,
  ausschließen: Eine Ausdehnung des Verwaltungsetats der Europäischen Kommission mit
  2500 neuen Stellen in der EU -Kommission, das ist nun wirklich fern jeder Realität.
  Das ist mit meinen Vorstellungen von effizienter Verwaltung auch in der Europäischen
  Union nicht vereinbar. Das sollten wir, denke ich, der Kommission sehr schnell klarmachen.
  Über alles andere müssen wir sprechen; ich habe die Prioritäten angesprochen. Zum
  Thema des Umgangs mit der Volksrepublik China: Ich will, ergänzend zu dem, was Emmanuel
  Macron gesagt hat, noch einmal auf das währungspolitische Thema eingehen. Wenn es
  richtig ist, dass die chinesische Währung im Augenblick richtig bewertet ist, dann
  spricht nichts dagegen, sie frei konvertierbar in den Handel zu geben. Erst dann,
  wenn eine Währung frei konvertierbar ist, ist ihr tatsächlicher Außen- und Innenwert
  erkennbar. Wenn die chinesische Staatsführung also der Meinung ist, dass der Wert,
  den der Renminbi heute hat, der richtige Wert ist, dann spricht nichts dagegen,
  die Währung freizugeben und sie frei konvertierbar zu machen. Was die Handelsbilanzdefizite
  betrifft, so sehen wir in den letzten Jahren steil ansteigende Handelsbilanzdefizite
  zulasten der Europäischen Union. Es gibt heute kein einziges Land in der Europäischen
  Union mehr, keines, das noch eine positive Handelsbilanz mit China hätte. Insgesamt
  ist das jährliche Defizit der Europäischen Union auf über 300 Milliarden US -Dollar
  angewachsen. Das heißt, wir haben, so wie Emmanuel Macron es gerade gesagt hat,
  jeden Tag ein Handelsbilanzdefizit mit China von rund einer Milliarde Euro, jeden
  Tag. Dass dieses Ungleichgewicht von uns angesprochen werden muss, weil es zu Lasten
  unserer Industrie geht, das ist, denke ich, selbsterklärend. Es gibt gute Gründe
  für diese Ungleichgewichte. China hat in den letzten Jahren in einer geradezu bemerkenswerten
  Weise in der Wettbewerbsfähigkeit seiner Volkswirtschaft aufgeholt. China hat eine
  sehr hohe Produktivität. China hat aber auch eine Währung, die ich für drastisch
  unterbewertet halte, und es hat hochsubventionierte Überkapazitäten, die es vor
  allen Dingen in den europäischen Markt bringt, zum Beispiel in der Automobilindustrie.
  Darüber müssen wir sprechen. Ich möchte keinen neuen Handelskonflikt mit China,
  aber ich möchte einen offenen Dialog über diese Ungleichgewichte. Diese Ungleichgewichte
  gehen zu Lasten unserer Industrie, und daran kann auch China im Grunde kein Interesse
  haben. Denn wir sind voneinander abhängig. Die Europäische Union mit 450 Millionen
  Konsumenten ist der wichtigste Auslandsmarkt für die Volksrepublik China. Es ist
  also eine gegenseitige Abhängigkeit. Wir müssen aus dieser gegenseitigen Abhängigkeit
  heraus eine vernünftige Diskussion miteinander führen. Aber ich bin nicht bereit
  zu akzeptieren, dass es so bleiben kann wie gegenwärtig. Denn dies geht einseitig
  zu Lasten der Arbeitsplätze in Europa. Herzlichen Dank. Dank an Emmanuel Macron
  . Ihnen allen ein schönes Wochenende.'
