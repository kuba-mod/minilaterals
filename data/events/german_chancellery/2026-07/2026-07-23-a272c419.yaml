title: 'Bundeskanzler Merz erklärt zur Lage im Roten Meer:'
text: „Die Bundesregierung verurteilt die Angriffe der Huthi auf saudische Schiffe
  im Roten Meer auf das Schärfste. Sie müssen unverzüglich eingestellt werden. Jede
  Form einer Seeblockade ist inakzeptabel. Diese rücksichtslosen Angriffe gefährden
  die Freiheit der Schifffahrt und drohen die regionale Stabilität weiter zu untergraben.
  Wir stehen solidarisch an der Seite von Saudi-Arabien und unseren Partnern in der
  Region.“
