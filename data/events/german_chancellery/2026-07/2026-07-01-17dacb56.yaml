title: Entlastung für Luftfahrtbranche Luftverkehrsteuer ab 1. Juli gesenkt
text: 'Mit der Senkung der Luftverkehrsteuer soll die Luftfahrtbranche in Deutschland
  gestärkt werden. Seit Jahren ist der Luftverkehr in Deutschland in einer herausfordernden
  Lage: Hohe Gebühren, Abgaben und Betriebskosten belasten die Wettbewerbsfähigkeit
  im internationalen Vergleich. Etwa 1,5 Millionen Arbeitsplätze hängen hierzulande
  direkt oder indirekt an der Luftfahrt. Sie ist essentiell für Deutschlands wirtschaftliche
  Stärke, internationale Vernetzung und Exportkraft. Damit der Luftverkehrsstandort
  wieder attraktiv wird, hat die Bundesregierung beschlossen, die Steuersätze der
  Luftverkehrsteuer zum 1. Juli 2026 wieder auf das Niveau vor dem 1. Mai 2024 zu
  senken. Im Koalitionsausschuss vom 13. November 2025 hat sich die Regierungskoalition
  auf ein umfassendes Maßnahmenpaket zur Stärkung der Luftverkehrsbranche geeinigt.
  Die Senkung der Luftverkehrsteuer als Teil des Maßnahmenpakets wurde nun umgesetzt.
  Dem Gesetzentwurf hat der Bundestag am 21. Mai 2026 zugestimmt, der Bundesrat hat
  ihn am 12. Juni 2026 gebilligt. Die Senkung der Luftverkehrsteuer tritt zum 1. Juli
  2026 in Kraft. Der Beschluss sieht vor, die Steuersätze für Kurz-, Mittel- und Langstrecken
  zwischen 2,50 Euro und 11,40 Euro je Fluggast zu senken. Konkret bedeutet das: Damit
  setzt die Bundesregierung eine wichtige Maßnahme aus dem Koalitionsvertrag um. Die
  Luftfahrtindustrie als Schlüsselbranche soll gestärkt werden. Auswirkungen auf Ticketpreise:
  Die Senkung der Luftverkehrsteuer kann Belastungen abfedern und weitere Preissteigerungen
  verhindern. Die Entscheidungen über Weitergabe der Steuersenkung obliegen aber den
  Unternehmen.'
