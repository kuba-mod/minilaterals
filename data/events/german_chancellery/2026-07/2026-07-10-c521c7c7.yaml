title: Bundeskanzler Merz reist nach Paris
text: Bundeskanzler Friedrich Merz wird am 13. Juli 2026 nach Paris reisen und dort
  um 17:00 Uhr an einem Treffen der „Koalition der Willigen“ teilnehmen. Geplant ist
  der Austausch zu den Sicherheitsgarantien und die weitere Unterstützung für die
  Ukraine sowie die Abstimmung über Wege zu einem gerechten und dauerhaften Frieden
  für die Ukraine. Am 14. Juli 2026 wird Bundeskanzler Merz am Vormittag auf Einladung
  von Präsident Emmanuel Macron an den Feierlichkeiten zum französischen Nationalfeiertag
  teilnehmen. Zusammen mit dem französischen Präsidenten Macron wird Bundeskanzler
  Merz auf der Ehrentribüne auf dem Champs-Élysées der Militärparade beiwohnen.
