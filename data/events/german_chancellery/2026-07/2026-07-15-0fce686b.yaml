title: Im Kabinett beschlossen Genossenschaftsrecht soll modernisiert werden
text: Die Bundesregierung möchte die genossenschaftliche Rechtsform attraktiver machen
  – das soll auch durch eine beschleunigte Gründung von Genossenschaften geschehen.
  In drei Bereichen will die Bundesregierung das Recht der Genossenschaften reformieren.
  Damit setzt sie eine Vereinbarung aus dem Koalitionsvertrag um und trägt der fortschreitenden
  Digitalisierung im wirtschaftlichen und privaten Rechtsverkehr Rechnung. Die neuen
  Regelungen fördern die Digitalisierung bei Genossenschaften. Künftig soll die Textform
  genügen. Es genügt also eine elektronische Kommunikation. Eine eigenhändige Unterschrift
  entfällt. Zudem sollen digitale Sitzungen und Beschlussfassungen sowie die digitale
  Informationsversorgung der Genossenschaftsmitglieder erleichtert werden. Die Bundesregierung
  möchte die genossenschaftliche Rechtsform attraktiver machen. Das soll insbesondere
  durch die Beschleunigung der Gründung einer Genossenschaft geschehen. Erreicht werden
  soll dies mit einer Standardisierung der Gründungsgutachten, der Beschleunigung
  der Förderungszweckprüfung, einer Frist für Eintragungen im Genossenschaftsregister
  und durch die Erweiterung eines Registers bei der Wirtschaftsprüferkammer hin zu
  einer Datenbank über genossenschaftliche Prüfungsverbände. Schließlich sieht der
  Gesetzentwurf Maßnahmen gegen unseriöse Genossenschaften vor. So sollen die Rechte
  und Pflichten des genossenschaftlichen Prüfungsverbandes ausgeweitet sowie die Aufsicht
  des Staates über die genossenschaftlichen Prüfungsverbände gestärkt werden.
