date: '2026-07-13'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 13. Juli 2026
text: 'stellvertretender Regierungssprecher Meyer (Vorsitzender Szent-Iványi eröffnet
  die Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der
  Ministerien.) Ich habe eine Reise des Außenministers anzukündigen. Er wird heute
  und morgen zu Gesprächen mit seinem Amtskollegen Eide nach Norwegen reisen. Im Fokus
  des Besuchs stehen die Sicherheit im hohen Norden und die Herausforderungen in der
  Arktis. Die Außenminister werden das Hauptquartier der norwegischen Streitkräfte
  in Reitan und das 2007 geschaffene High North Center an der Universität Bodø besuchen.
  Die Sicherheit im hohen Norden ist untrennbar mit unserer eigenen Sicherheit verbunden.
  Die Region hat für Europa außerdem erhebliches wirtschaftliches Potenzial, sei es
  bei der Gewinnung von Wasserstoff, seltenen Erden oder dem Zugang zum Weltraum über
  die nordischen Weltraumbahnhöfe in Norwegen und Schweden. Am Mittwoch und Donnerstag
  wird Außenminister Wadephul dann zu Gesprächen mit seiner finnischen Amtskollegin
  Valtonen nach Finnland reisen . Auf dem Programm steht auch ein gemeinsamer Besuch
  auf dem Grenzpatrouillenschiff „Turva“ und der Zivilschutzanlage Merihaka. Auch
  ein gemeinsamer Besuch an der finnisch-russischen Grenze ist geplant. Deutschland
  engagiert sich mit seinen Partnern Norwegen und Finnland, um die NATO-Nord- und
  -Ostflanke zu sichern. Gemeinsam setzen wir uns außerdem mit aller Kraft für die
  Unterstützung der Ukraine ein. Ich würde gerne einmal mit dem Thema des Stromausfalls
  in Berlin und möglicher Telefonate zwischen dem Regierenden Bürgermeister und dem
  Kanzler anfangen. Herr Meyer, dazu gab es jetzt am Wochenende unterschiedliche ‑ man
  könnte auch sagen, sich widersprechende ‑ Aussagen. Ich gehe davon aus, dass Sie
  sich seither auch noch einmal intensiver mit der Frage beschäftigt haben. Gab es
  an dem Wochenende des ersten Stromausfalls ein Telefonat zwischen Herrn Wegner und
  dem Bundeskanzler? Ich nehme an, das Thema wird vielleicht einige von Ihnen interessieren;
  deshalb mache ich es vielleicht am Anfang etwas ausführlicher: Am Tag des Anschlags
  auf das Berliner Stromnetz, dem 3. Januar, und in den folgenden Tagen haben mehrere
  Gespräche und andere Formen der Kommunikation auf verschiedenen Ebenen zwischen
  der Berliner Landesregierung und dem Bundeskanzleramt stattgefunden. Dabei ging
  es unter anderem um eine mögliche Unterstützung des Landes Berlin durch Bundesbehörden.
  Der Bundeskanzler war vom ersten Tag an eingebunden und wurde fortlaufend auch über
  den Sachstand unterrichtet. Aus Sicht der Bundesregierung ist wichtig, für die Zukunft
  zu lernen. Es war gut, dass die Reparaturarbeiten früher abgeschlossen werden konnten
  als erwartet. Das war, glaube ich, auch ein Erfolg der gemeinsamen Kraftanstrengung.
  Die Zusammenarbeit mit den Behörden des Bundes hat hier gut funktioniert. Die Bundesregierung
  hat dem Land Berlin, das die Großschadenslage ausgerufen hat, damals personell und
  materiell geholfen, unter anderem mit Kräften des THW, der Bundespolizei und auch
  der Bundeswehr, um die betroffenen Bürgerinnen und Bürger in dieser für sie sehr
  schwierigen und belastenden Situation ohne Strom und Wärme zu unterstützen. Was
  die Lehren für die Zukunft sind, muss weiter analysiert werden. Wir arbeiten an
  verschiedenen Stellen auch daran, Dinge zu verbessern. Natürlich kann unsere kritische
  Infrastruktur nicht lückenlos geschützt werden, aber wir brauchen natürlich auch
  die notwendige Konsequenz aus diesem Vorfall. Sie haben jetzt nach einem möglichen
  Telefonat gefragt, das ja auch Gegenstand der Berichterstattung war. Dazu kann ich
  sagen: Dazu gab es ja auch ein gerichtliches Verfahren, und wir haben uns natürlich
  nach bestem Wissen und Gewissen informiert. Soweit es für uns feststellbar ist,
  und das ist, glaube ich, der entscheidende Punkt an dieser Stelle, hat der Bundeskanzler
  während der Dauer des fragegegenständlichen Stromausfalls in Berlin im Januar 2026
  kein persönliches Gespräch mit dem Regierenden Bürgermeister von Berlin Wegner geführt.
  Diese Information beruht auf den im Bundeskanzleramt verfügbaren Informationen.
  Noch einmal: Soweit das feststellbar ist, war das für uns so nicht zu substantiieren.
  Herr Meyer, ich hätte dazu eine Nachfrage. Könnten Sie vielleicht noch einmal schildern,
  warum ein Gerichtsverfahren notwendig war, damit das Kanzleramt zu diesem Thema
  Auskunft gibt? Ich knüpfe noch einmal an Äußerungen an, die Herr Kornelius hier
  in der RegPK am 7. Januar, glaube ich, gemacht hat. Da sagte er: „Der Bundeskanzler
  war intensiv in die Situation eingebunden. Er hat bereits am ersten Tag den Kontakt
  mit dem Kanzleramtsminister, dem Innenminister und dem Regierenden Bürgermeister
  gesucht und sich ausgetauscht.“ In welcher Form hat denn dieser Austausch des Kanzlers
  mit dem Regierenden Bürgermeister dann stattgefunden, wenn Sie ja jetzt sagen, es
  habe zumindest laut den Erinnerungen des Kanzlers kein Telefonat gegeben? Ich habe
  das ja, glaube ich, gerade schon einmal dargestellt. Noch einmal: Der Bundeskanzler
  war vom ersten Tag an eingebunden, wurde fortlaufend über den Sachstand informiert
  und war sozusagen auch über die Situation gebrieft, weil sie ja doch eine wirklich
  große Bedeutung für viele Menschen hatte, vor allen Dingen für die, die davon betroffen
  waren. Warum sozusagen jetzt hier ein Gerichtsverfahren angestrengt wurde, müsste
  man diejenigen fragen, die ein Gerichtsverfahren angestrengt haben. Wir haben uns
  hier deshalb entsprechend geäußert und tun das ja auch hier noch einmal öffentlich.
  Wir haben das auch in den vergangenen Tagen auf mehrere Anfragen hin bereits getan.
  Wir können deshalb noch einmal sagen: Soweit das für uns feststellbar ist ‑ das
  ist ja das Entscheidende, gerade auch vor Gericht; da können wir ja nicht etwas
  meinen oder spekulieren, sondern wir haben uns auch die Suche gemacht und versucht,
  das auch nachzuweisen ‑, können wir so ein Telefonat nach allen uns vorliegenden
  Informationen und nach bestem Wissen und Gewissen nicht bestätigen. Aber können
  Sie es dementieren, wenn die Senatssprecherin Richter noch einmal auf Nachfrage
  des RBB gesagt hat, am 4. Januar 2026 um 19.57 Uhr habe es ein vierminütiges Telefonat
  zwischen Merz und Wegner gegeben? Ich muss noch einmal auf die Worte „soweit feststellbar“
  verweisen. Wir müssen uns dann auf den Weg machen und versuchen, Dinge auch zu überprüfen.
  Das haben wir getan, und soweit wir es feststellen können, können wir so ein Gespräch
  nicht substantiieren und nicht bestätigen. Die andere Seite sagt ja sehr konkret,
  wann etwas passiert sein soll, und zwar vier Minuten lang. Das können Sie aber auch
  nicht dementieren, korrekt? Sie können nur sagen, dass Sie nicht wissen, ob das
  so gewesen ist. Das ist ja ein Vorgang, der jetzt sechs Monate her ist. Wenn man
  dann jetzt damit konfrontiert wird, dann muss man, noch einmal, die Dinge intern
  prüfen. Das haben wir getan. Soweit für uns feststellbar, hat der Bundeskanzler
  während der Dauer des fragegegenständlichen Stromausfalls in Berlin im Januar kein
  persönliches Gespräch geführt. Noch einmal: Das gilt, soweit das für uns feststellbar
  ist, auch sechs Monate danach. Ich würde das Gesundheitsministerium gerne etwas
  in Bezug auf Ebola fragen. Es gibt einen Fall in der Uniklinik Frankfurt, wo ein
  US-Bürger aus dem Kongo eingeliefert wurde. Können Sie uns sagen, ob das ein Einzelfall
  ist oder ob dort noch weitere Behandlungen geplant sind? Ich kann bestätigen, dass
  eine mit dem Ebolafieber infizierte Person, ein US-Staatsbürger, in der vergangenen
  Nacht zur Behandlung in die Uniklinik Frankfurt am Main gebracht wurde. Ich kann
  auch darauf verweisen, dass alle aktuellen Infos in FAQ-Form auf unserer Homepage
  stehen. Auch die Uniklinik Frankfurt hat mittlerweile schon kommuniziert. Sowohl
  wir als auch die Uniklinik Frankfurt werden auch weiterhin kontinuierlich alles
  aktualisieren und darüber informieren. Die Frage war, ob noch weitere ähnliche Fälle
  erwartet werden. Können Sie etwas dazu sagen, ob es eine Gefahr gibt? Ich kann zum
  jetzigen Zeitpunkt, wie gesagt, erst einmal bestätigen, dass eine Person in Frankfurt
  aufgenommen wurde. Was das Risiko angeht: Es bleibt weiterhin dabei, dass das für
  die deutsche Bevölkerung als sehr gering eingeschätzt wird. Ich hätte eine Frage
  an Frau Deschauer. Was können Sie heute zur Haltung der Bundesregierung zu einem
  möglichen Einfuhrverbot für Produkte aus israelischen Siedlungen in die EU sagen?
  Wie will sich die Bundesregierung dazu verhalten? Besten Dank. - Sie beziehen sich
  auf die Gespräche, die heute in Brüssel stattfinden. Heute findet ja die Sitzung
  des Rats für Außenbeziehungen statt. Der Außenminister ist vor Ort. Er hat sich
  auch schon vor der jetzt laufenden Sitzung öffentlich dazu geäußert. Insofern würde
  ich sehr gerne auf die öffentliche Ausführung des Außenministers und darauf verweisen,
  dass die Gespräche nun stattfinden. Ich glaube, im Grundsatz kann man sagen: Der
  Außenminister war in der vergangenen Woche noch einmal in Israel und hat sich dort
  mit seinem israelischen Amtskollegen ausgetauscht, auch und insbesondere über kritische
  Fragestellungen. Sie wissen, dass die israelische Siedlungspolitik für uns eine
  sehr zentrale, kritische Fragestellung ist, die wir hier immer wieder deutlich thematisiert
  haben, und das war auch Gegenstand seiner Gespräche vor Ort. Den jetzigen Beratungen
  im RfAB selbst kann und möchte ich nicht vorgreifen, aber ich denke, wir werden
  im Laufe der Wochen noch Gelegenheit haben, uns dann hier weiter darüber auszutauschen.
  Die Bundesregierung kritisiert es ja immer wieder, wenn andere Mitgliedstaaten bei
  außenpolitischen Fragen ausscheren. Wie wichtig ist aus Ihrer Sicht die Geschlossenheit
  bei diesem Thema? Das ist jetzt eine grundsätzlich andere Fragestellung, denke ich.
  Wie möchten Sie den Bezug herstellen? Na ja, die Frage ist ja, warum man andere
  Staaten immer einmal wieder kritisiert, wenn sie sozusagen gegen die Mehrheitslinie
  verstoßen, und man das dann selbst auch machen würde. Gut. Dann möchte ich noch
  einmal klarstellen, dass ich den Konnex, den Sie jetzt in Ihrer Prämisse herstellen,
  so nicht nachvollziehen kann, denn es gibt heute Besprechungen. Ich kann auch nicht
  erkennen, dass es da bisher ein einheitliches Meinungsbild gegeben hat. Die Fragestellung
  ist ja auch nicht zum ersten Mal Thema. Lassen Sie uns doch insofern die Gespräche
  vor Ort abwarten, die jetzt gerade im RfAB stattfinden. Ich beziehe mich auf einen
  Vorfall am 30. Juni im Fehmarnbelt, und zwar haben am fraglichen Tag fünf Schlauchboote
  von Greenpeace gegen die russische Schattenflotte im Fehmarnbelt demonstriert ,
  und dabei ist es zu einem Zwischenfall gekommen . Da hat ein russisches Kriegsschiff,
  die Korvette mit der Kennnummer 531, die Schlauchboote von Greenpeace angewiesen,
  nicht zu nah an den panamaischen Tanker „Kira K.“ zu fahren. Wie bewertet die Bundesregierung
  den Vorfall, dass russische Kriegsschiffe gegen Demonstrationen vor panamaischen
  Tankern in internationalen Seegewässern direkt vor der deutschen Küste aktiv vorgehen?
  Die Frage richtet sich an die Bundesregierung. Da niemand reagiert: Mir ist der
  Vorgang nicht bekannt; das tut mir leid. Deshalb kann ich darüber hier keine Auskunft
  geben. Wir schauen uns das einmal an. Das ist jetzt eine sehr spezifische Frage,
  auch die, wer dafür dann im konkreten Fall zuständig sein könnte. Aber noch einmal:
  Mir ist der Vorgang nicht bekannt. Deswegen will ich auch keine Zusage machen, was
  eine Nachlieferung angeht, weil wir uns erst einmal schlaumachen müssen. Herr Meyer,
  es gibt Berichte darüber, dass Deutschland die Produktion von 50 000 Angriffsdrohnen
  für oder in der Ukraine finanziert . Was können Sie dazu sagen? Wir haben die Berichterstattung
  auch zur Kenntnis genommen. Natürlich würden wir uns grundsätzlich zu einzelnen
  Vorhaben oder möglichen Dingen jetzt nicht äußern. Ich kann vielleicht generell
  darauf hinweisen, weil es vielleicht relevant ist, dass militärische Unterstützungsmaßnahmen
  der Bundesregierung zugunsten der Ukraine aus dem zugehörigen Ertüchtigungstitel
  entsprechend finanziert werden. In der Regel, noch einmal, informieren wir aber,
  wie es ja auch schon seit längerer Zeit gängige Praxis ist, nicht über einzelne
  Maßnahmen. Damit soll jetzt nicht etwas darüber gesagt sein, ob das zutreffend ist
  oder nicht. Dass wir uns grundsätzlich natürlich sehr, sehr dafür starkmachen, die
  Ukraine weiterhin intensiv zu unterstützen, ist völlig klar. Es gibt auch heute
  ein Treffen in Frankreich, auch explizit hinsichtlich der Frage, wie wir die Ukraine
  stärker unterstützen können, insbesondere auch beim Thema der Luftverteidigung.
  Das sage ich aber vielleicht ganz generell. Zu dem konkreten Vorgang, wie gesagt,
  gibt es von uns keinen Kommentar. Vielleicht stelle ich eine Nachfrage zur Koalition
  der Willigen: Kommt der Kanzler eigentlich mit einem konkreten Angebot für die Ukraine
  dorthin? Die Frage ist hier am Freitag schon einmal gestellt worden. Grundsätzlich
  haben wir natürlich ganz konkrete Angebote für die Ukraine, weil wir uns ja seit
  Monaten und Jahren durchaus auch erfolgreich und auch auf europäischer Ebene dafür
  eingesetzt haben, die Ukraine jetzt wirklich auch in den kommenden Jahren zu unterstützen.
  Sie wissen, dass auch beim NATO-Gipfel Unterstützungszusagen in Höhe von zweimal
  70 Milliarden Euro getätigt wurden. Das ist, glaube ich, ein ganz wichtiges Signal
  für die Ukraine. Auch heute beim Treffen der Koalition der Willigen kommen denjenigen
  zusammen, die wirklich sagen: Wir übernehmen Verantwortung dafür, dass die Ukraine
  in dem Abwehrkampf weiter standhalten kann. ‑ Wir übernehmen übrigens auch Verantwortung
  dafür, dass wir mögliche Zeitfenster in Zukunft nutzen, um diesen Krieg zu beenden.
  Denn das ist natürlich unser wichtigstes Interesse, dass wir für die Ukraine mit
  der Ukraine zu einem gerechten und nachhaltigen Frieden kommen. Insofern haben wir,
  so würde ich sagen, viel anzubieten. Deshalb ist das Gespräch heute im Rahmen der
  Verbündeten auch sehr wichtig für uns. Ich habe eine Frage an den Regierungssprecher.
  Im Iran ist eine Vergeltungsliste veröffentlicht worden, auf der sich auch der Kanzler
  befindet. Wie reagiert die Bundesregierung darauf? Wir haben diese Meldung zur Kenntnis
  genommen. Wir werden sie aber ganz sicher nicht kommentieren. Gibt es also keine
  konkreten Maßnahmen wie erhöhte Sicherheitsmaßnahmen oder so etwas? Ich würde sagen,
  die Sicherheitsmaßnahmen rund um den Bundeskanzler sind sehr, sehr hoch. Das gilt
  immer und grundsätzlich. Noch einmal: Zu den konkreten Meldungen, die wir diesbezüglich
  gesehen haben gibt es von der Bundesregierung keinen Kommentar. Es hat wahrscheinlich
  keinen Sinn, dennoch: Im politischen Berlin wird das ja als neue Qualität der Bedrohung
  bezeichnet. Könnten Sie sich auf diesen Weg begeben? Nein. Ich werde diese Meldung
  nicht dadurch aufwerten, dass ich sie hier kommentiere. Meine Frage geht wahrscheinlich
  an das Auswärtige Amt. Es geht um eine Erklärung unter Führung der USA, die Deutschland
  mitunterschrieben hat, China aufzufordern, internationales Recht im Südchinesischen
  Meer einzuhalten. Warum hat Deutschland das unterschrieben? Einige europäische Länder
  haben das ja nicht getan. Es gibt verschiedene Erklärungen. Anlass ist der Jahrestag
  des Schiedsspruchs zum Südchinesischen Meer im Fall der Philippinen und Chinas.
  Wir haben verschiedene Erklärungen im Rahmen der Europäischen Union. Die Hohe Vertreterin
  hat ein Statement im Namen der Europäischen Union veröffentlicht. Wir als Deutschland
  haben uns mit verschiedenen anderen Staaten noch mit einer Erklärung angeschlossen.
  Von der Systematik her ist es immer so ‑ ich denke, das Thema hatten wir schon ‑,
  dass es verschiedene Formen gibt, seine grundsätzliche Haltung auszudrücken. Das
  tut man auf die eine oder andere Weise und manchmal auch mehrfach. Es ist ein klares
  Zeichen dessen, dass sich Deutschland in der Sache zur Thematik UNCLOS und auch
  mit Blick auf das Südchinesische Meer verpflichtet fühlt und ein großes Augenmerk
  auf diese Fragestellung legt. Deswegen haben wir uns natürlich in der Sache mit
  anderen Staaten und im EU-Rahmen geäußert. Welche Erwartungshaltung ist vonseiten
  Deutschlands in Richtung Chinas damit verbunden? Die grundsätzliche Erwartungshaltung,
  die mit UNCLOS verbunden ist, ist, sich an entsprechende seevölkerrechtliche Regularien
  zu halten, die insbesondere auch in der Region, in der sich China befindet, eine
  maßgebliche Rolle spielen Ich habe eine Frage an das Familienministerium. Auf EU-Ebene
  geht es heute auch um ein Social-Media-Verbot oder ein Mindestalter für Jugendliche
  . Welche Haltung hat die Bundesregierung dazu, und inwieweit hat man sich schon
  eingebracht, was die Regularien angeht? Wir beobachten natürlich sehr genau, was
  auf EU-Ebene jetzt besprochen und möglicherweise auch beschlossen wird. Sie kennen
  die Haltung des Bundesministeriums. Wir haben die Empfehlungen der Expertenkommission
  vor wenigen Wochen entgegengenommen. Daran arbeiten wir. Die Ministerin hatte sich
  dazu auch geäußert und auch selbst den Vorschlag eines Social-Media-Verbots für
  Kinder unter 13 Jahren ins Gespräch gebracht. Das ist jetzt in der Klärung, und
  daran arbeiten wir. Wie zuversichtlich sind Sie, dass eine europäische Regelung
  gefunden werden kann? Denn es stehen verschiedene Altersgrenzen in Rede bzw. ein
  neuer Expertenbericht. Wir hoffen zumindest auf eine europäische Regelung. Es wäre
  natürlich am besten, wenn es eine europäische Lösung gäbe. Die Ministerin hat aber
  auch gesagt, wenn es sie nicht gebe, dann sei sie sehr offen für eine nationale
  Regelung. Meine Frage geht an Frau Ungrad oder Herrn Harmsen. Sie müssen sich vielleicht
  einigen. Es geht um Entlastungsmaßnahmen . Die Taskforce hatte Mitte April mehrere
  Optionen auf dem Tisch, zum Beispiel eine Senkung der Mehrwertsteuer auf Lebensmittel
  oder einen Direktauszahlungsmechanismus. Letztlich wurde es der Tankrabatt. Er ist
  jetzt ausgelaufen. Aber die Situation in der Straße von Hormus ist nach wie vor
  problematisch. Welche Vorschläge liegen denn jetzt fertig geprüft in der Schublade,
  und wie schnell könnten Entlastungen umgesetzt werden, sollte die Straße von Hormus
  blockiert bleiben? Das Thema von Entlastungsmaßnahmen liegt nicht nur im Bundeswirtschaftsministerium,
  sondern in der gesamten Bundesregierung. Gerade der Tankrabat ressortiert eher im
  BMF. Deswegen kann ich Ihnen jetzt kein Paket ankündigen. Wir beobachten die Lage
  genau. Für das Bundeswirtschaftsministerium kann ich sagen, dass wir unsere Krisenkommunikation
  weiterhin aufrechterhalten und mit den Unternehmen in Kontakt stehen. Die Situation,
  was Lieferungen von Öl und Gas angeht, beobachten wir innerhalb des Ministeriums
  und stehen mit den jeweiligen Anbietern in Kontakt. Derzeit ist die Lage weiterhin
  in Ordnung. Die Lieferungen finden statt. Es gibt keine Probleme. Wir müssen keine
  weiteren Ölreserven freigeben. Was auch noch unseren Bereich betrifft: Das Bundeskartellamt
  hat sich dazu geäußert, welche Auswirkungen der Tankrabatt und die Zwölfuhrregelung
  haben. Derzeit gibt es Überprüfungen, ob sich alle daran gehalten haben. Die ersten
  Verfahren haben schon begonnen. Aber es hat durchaus auch positive Auswirkungen
  gegeben. Sie sagten gerade, die Lage sei derzeit in Ordnung und Sie beobachteten
  das. Ab wann wäre der Zeitpunkt gegeben, an dem sich die Bundesregierung dazu entschließen
  würde, wieder einzugreifen? Wir spekulieren nicht. Es gibt keinen Tag X und keine
  Summe X, ab der wir sagen würden, wir würden eine bestimmte Reaktion hervorrufen.
  Wir beobachten die Lage und werden entsprechend handeln. Wir spekulieren hier nicht.
  Ich habe dazu eine Frage an das Verteidigungsministerium. Damals hat der Verteidigungsminister
  erst einmal zwei Minensuchboote , so meine ich, in Richtung des Roten Meeres geschickt.
  Meine erste Frage: Wo sind sie jetzt? Sind sie im Roten Meer? Meine andere Frage:
  Angesichts der eskalierenden Lage dort ist absehbar mit keiner Friedenslösung zu
  rechnen. Bleiben diese Boote dort, oder werden sie ins Mittelmeer zurückbeordert?
  Auf Ihre erste Frage kann ich Ihnen sagen, dass sich unsere Boote nach wie vor in
  Dschibuti aufhalten und dort weiterhin für einen möglichen Einsatz bereitstehen.
  Natürlich beobachten wir die Entwicklung dort sehr genau. Ich habe Ihnen zum jetzigen
  Zeitpunkt aber keine neuen Erkenntnisse zu geben, was einen möglichen Abzug oder
  Ähnliches betrifft. Sie sind nach wie vor dort vor Ort. Herr Meyer, wie bewertet
  die Bundesregierung die Eskalation ? Es ist jetzt quasi wieder wie am Anfang: Die
  US-Streitkräfte schlagen zu. Der Iran greift mehrere Länder in der Golfregion an. ‑
  Wie bewertet die Bundesregierung das? Irans Angriffe auf Nachbarstaaten und Handelsschiffe
  sind aus unserer Sicht inakzeptabel. Der Iran muss sie sofort einstellen. Trotz
  der Lage, die wir derzeit sehen, ist es wichtig, dass insbesondere der Iran jetzt
  ernsthaft verhandelt und dass Gespräche fortgeführt werden. Das Rahmenabkommen,
  das wir gesehen haben, ist aus unserer Sicht die beste Chance für Stabilität in
  der Region. Wir setzen darauf, dass es belastbare und dauerhafte Vereinbarungen
  mit Iran gibt, die die Straße von Hormus dauerhaft öffnen, ohne Zölle, ohne Gebühren.
  Es muss auch zu einem Abkommen über das iranische Atomprogramm kommen. Der Iran
  darf nicht in den Besitz der Atomwaffe kommen. Das hat der Bundeskanzler auch immer
  wieder betont. In diesem Sinne setzen wir uns auch in der aktuellen Lage dafür ein,
  dass es zu einem Waffenstillstand und dann auch einer stabilen Situation kommt.
  Frau Deschauer, das Auswärtige Amt hat den russischen Botschafter einbestellt .
  Es geht um eine Cyberkampagne gegen die Europäische Union . Was können Sie uns dazu
  sagen? Wie ist Deutschland von dieser Kampagne betroffen? Sie sagen es und haben
  es auf unserem X-Account vielleicht bereits sehen können. Wir haben heute Vormittag
  ‑ zeitlich müsste es jetzt zu Ende gegangen sein ‑ den russischen Botschafter ins
  Auswärtige Amt einbestellt. Dies steht in der Tat im Zusammenhang mit bösartigen
  Cyberaktivitäten. Lassen Sie mich kurz ausholen. Wir haben auch einen Bezug zu Brüssel.
  Kaja Kallas als Hohe Vertreterin der EU hat heute die Attribuierung einer Cyberkampagne
  eines Akteurs, der sich Turla nennt, für die Europäische Union vorgenommen. Diese
  Kampagne wurde an Russland attribuiert. Darin benennen die EU und ihre 27 Mitgliedstaaten
  die Verantwortung des 16. Zentrums des russischen Nachrichtendienstes FSB für eine
  über Jahre hinweg betriebene Kampagne bösartiger Cyberaktivitäten gegen Mitgliedstaaten
  der EU inklusive Deutschlands. Sie können im Rahmen der Erklärung nachvollziehen,
  welche Staaten betroffen sind. Gleichzeitig erläutern wir, dass in diesem Ökosystem
  bösartiger Cyberaktivitäten in Russland auch nicht-staatliche Akteure eine große
  Rolle haben. Deutschland hat diese gemeinsame Attribuierung nach Abschluss unseres
  nationalen Attribuierungsverfahrens zusammen mit Frankreich mit initiiert. Man muss
  sich das so vorstellen, dass wir auf Grundlage umfassender Analysen der deutschen
  Nachrichtendienste die Kompromittierung auch deutscher Stellen durch diesen Akteur
  und die von mir eben benannte Einheit nachweisen konnten. Dieser Fall steht exemplarisch
  für ein breiteres Muster. Seit vielen Jahren beobachten wir bösartige Cyberaktivitäten
  aus Russland gegen Deutschland, gegen die Mitgliedstaaten der EU sowie auch internationale
  Partner. In dem attribuierten Fall geht es auch um die Ukraine. Das war unter anderem
  auch die Thematik, die heute im Gespräch mit dem russischen Botschafter, in der
  Einbestellung, noch einmal verdeutlicht wurde. Ich möchte auch gern darauf hinweisen,
  dass heute im Rahmen der EU zusätzlich zu der Attribuierung im Rat für auswärtige
  Angelegenheiten auch neue Sanktionen gegen verschiedene russische Staatsangehörige
  sowie russische Unternehmen bzw. Hackergruppierungen verhängt werden, die ebenfalls
  im Rahmen bösartiger Cyberaktivitäten aktiv waren. Können Sie ein, zwei, drei konkrete
  Beispiele nennen, bei denen wir vermuten, dass genau diese Gruppierung in Deutschland
  zugeschlagen hat? Ich denke, Sie werden verstehen, dass ich dies hier leider nicht
  im Detail ausführen kann, weil dem auch nachrichtendienstliche Erkenntnisse zugrunde
  liegen. Aber ich kann darauf hinweisen, dass solche Attribuierungen immer mit sehr
  präziser, langfristiger und sorgfältiger Analyse von verschiedenen Stellen in der
  Bundesregierung vorgenommen werden. Das betrifft nicht nur das Auswärtige Amt, sondern
  auch verschiedene Ressorts. Ich werde Details also leider nicht nennen können. Aber
  wir haben hinreichende Gewissheit, sodass wir zu dieser Attribuierung gekommen sind.
  Ich habe eine Frage an den Regierungssprecher zum Tod von Lindsey Graham . Graham
  galt als wichtiger Vermittler zu Donald Trump. Wie ändert oder beeinflusst sein
  Tod die transatlantischen Beziehungen? Zunächst möchte ich erst einmal sagen, dass
  hier ein Mensch gestorben ist, worüber wir sehr traurig sind. Auch der Bundeskanzler
  hat bereits zum Tod des Senators kondoliert. US-Senator Lindsey Graham war ein wahrer
  Freund und Partner im transatlantischen Bündnis. Deshalb war es dem Bundeskanzler
  auch wichtig, dazu etwas zu sagen. Senator Graham hat sich gemeinsam mit weiteren
  Senatoren sehr für verschärfte Russland-Sanktionen, wie Sie auch gesagt haben, eingesetzt
  und sich erst in der letzten Woche mit Präsident Trump darauf verständigt. Wir setzen
  darauf, dass Grahams Vermächtnis weiterlebt und hoffen auf Umsetzung. Wir müssen
  den Druck auf Russland von allen Seiten erhöhen, damit Putin endlich zu echten Verhandlungen
  bereit ist. Wie gerade gesagt: Die Unterstützung in diesem Krieg und verschärfte
  Russland-Sanktionen sind sicherlich Teil des politischen Vermächtnisses von Senator
  Graham. Insofern hoffen wir, dass in diesem Sinne sein Vermächtnis fortgesetzt wird.
  Sehen Sie denn weitere einflussreiche Stimmen in den USA, die auch den härteren
  Kurs gegenüber Russland unterstützen? Wir sind ja mit unseren amerikanischen Partnern
  auch zur Ukraine auf verschiedenen Formaten im Austausch. Ich möchte zum Beispiel
  an das G7-Treffen in Frankreich erinnern, bei dem es ja eine gemeinsame Abschlusserklärung
  gab. Auch der Bundeskanzler hat mehrfach darauf hingewiesen, dass es dort die klare
  Aussage gab, dass Russland diesen Krieg beenden muss. Das waren durchaus wichtige
  Signale. Deshalb arbeiten wir weiter gemeinschaftlich daran, diesen Krieg zu einem
  Ende zu führen. Es geht darum, dass die Ukraine leben kann, dass sie ihre eigene
  Sicherheit mit Unterstützung der Partnerinnen und Partner, die sie hat, in der Zukunft
  gewährleisten kann. Daran werden wir mit unseren amerikanischen Partnern definitiv
  weiterarbeiten. Herr Meyer, ich habe eine Frage zu dem deutsch-französischen Ministertreffen
  , das ab Donnerstag in Brühl stattfindet, und überhaupt zur ganzen Woche. Da gibt
  es ja mehrere Treffen des Kanzlers mit dem französischen Präsidenten. In den letzten
  Wochen ist es ja nicht so rund gelaufen im deutsch-französischen Verhältnis mit
  FCAS etc. Ist das jetzt der Versuch, die deutsch-französischen Beziehungen wieder
  ein bisschen ins Lot zu bringen? Gibt es irgendwelche konkreten Projekte, die jetzt
  in Brühl beschlossen werden? Können wir da irgendwas Konkretes erwarten? Mich wundert
  Ihr Eindruck ein wenig, muss ich sagen. Denn ich glaube, das Verhältnis nicht nur
  zwischen Bundeskanzler Merz und Präsident Macron, sondern auch das Verhältnis der
  beiden Regierungen ist sehr gut. Wir arbeiten an verschiedensten gemeinsamen Themen.
  Ich will nur die Sicherheitslage, aber auch die wirtschaftliche Entwicklung in Europa
  nennen. Ich will zum Beispiel auch daran erinnern, dass der Staatspräsident zu einem
  großen Gipfeltreffen zum Thema Digitalisierung und KI hier in Berlin war. Ich glaube,
  das sind alles starke Belege dafür, dass diese deutsch-französische Achse in der
  kompletten Bandbreite unserer politischen Arbeit sehr, sehr intensiv zusammenarbeitet.
  Insofern steht diese Woche beispielhaft dafür, wie intensiv die Beziehung zu unseren
  französischen Partnern ist. Das ist ja nicht der erste deutsch-französische Ministerrat,
  sondern wir haben zum Beispiel bei unserem letzten Treffen in Toulon ja auch eine
  gemeinsame Wirtschaftsagenda vereinbart. Das heißt, hier werden wir sicher eine
  Zwischenbilanz ziehen und neue Projekte vereinbaren, in dieser Woche zum Beispiel
  im Hinblick auf die Wirtschaftsbeziehungen. Am Rande gibt es auch ein Treffen des
  deutsch-französischen Verteidigungs- und Sicherheitsrats auf Ebene der Verteidigungsminister
  und derjenigen, die sich insbesondere mit diesen Fragen auseinandersetzen. Auch
  da haben wir eine Reihe von Themen, die wir weiter gemeinsam voranbringen wollen.
  Alles Weitere folgt dann Ende der Woche nach dem Termin. Noch einmal ein anderes
  Thema, und zwar zur Hitze . Die Zahlen sind ja bekannt, die das Robert-Koch-Institut
  genannt hatte. Mehr als 5000 Menschen sind in der letzten Hitzewelle offensichtlich
  gestorben. Der Bundesumweltminister hat vergangene Woche angekündigt, dass er einen
  Gesetzentwurf vorlegen wird, um das Thema Hitzeschutz/Klimaanpassung zur Gemeinschaftsaufgabe
  zu machen. Nun würde mich interessieren, wie das Bundeskanzleramt das sieht und
  dazu steht. Ich würde dazu gerne auf das Protokoll der Regierungspressekonferenz
  vom Freitag verweisen; da war das hier lange Thema. Ich habe auch sehr viel dazu
  gesagt, was wir als Bundesregierung tun, um Länder und Kommunen zu unterstützen,
  die ja dafür verantwortlich sind, das dann sozusagen zu gewährleisten. Darauf würde
  ich Sie gerne verweisen, weil ich hier sonst alles noch einmal vortragen müsste.
  Das ist ein Thema, das uns sehr, sehr umtreibt, das uns beschäftigt und über das
  wir sicherlich weitere Gespräche innerhalb der Bundesregierung, auch über konkrete
  Vorschläge, führen werden. Da ging es auch um die Gemeinschaftsaufgabe, nur zur
  Sicherheit noch einmal nachgefragt? Ganz explizit, glaube ich, in der Tat nicht,
  sondern es ging vor allem darum, was wir schon tun. Es gibt ja formelle Zuständigkeiten.
  Natürlich ist das ganze Thema am Ende eine gesamtgesellschaftliche Aufgabe, jetzt
  mal jenseits von juristischen Zuständigkeiten, und so begreifen wir das auch. Deswegen
  unterstützen wir die zuständigen Länder und Kommunen eben auch dabei. Aber das geht
  sicherlich weit über staatliches Handeln hinaus. Arbeitgeber tragen in vielen Bereichen
  natürlich auch eine Verantwortung. Insofern ist das mit gesamtgesellschaftlicher
  Aufgabe gemeint. Noch einmal: Zu konkreten Vorschlägen, wie auch Dinge die zu verbessern
  sind, werden wir uns sicherlich in der Bundesregierung weiter austauschen. Darf
  ich da noch einmal nachfragen? Denn meine eigentliche Frage war ja, wie Sie zu dieser
  Idee stehen, das als Gemeinschaftsaufgabe zu definieren und dann möglicherweise
  auch nationale verpflichtende Vorgaben machen zu können, was Sie im Moment ja eben
  nicht können? Da würde ich noch einmal darauf verweisen, dass wir Länder und Kommunen
  bei der Finanzierung von Maßnahmen, insbesondere auch Klimaanpassungen, sehr, sehr
  stark unterstützen. Zu allem Weiteren führen wir die Gespräche dann intern. Ich
  glaube, es gibt auch im Koalitionsvertrag eine entsprechende Formulierung. Auf die
  würde ich verweisen. Ich hätte eine Frage ans Finanzministerium zur Tabaksteuer
  . Es soll wohl eine Formulierungshilfe gehen, die etwas stärker angehoben werden
  soll als ursprünglich geplant. Könnten Sie mir sagen, was die Bundesregierung dem
  Parlament konkret für die Umsetzung vorschlägt? Ich kann bestätigen, dass das korrekt
  ist. Wir haben letzte Woche Montag den Gesetzentwurf für eine Erhöhung der Tabaksteuer
  im Kabinett beschlossen. Das Vorhaben befindet sich jetzt im parlamentarischen Verfahren.
  Die Regierungsfraktionen haben uns, also das BMF, gebeten, einen Änderungsantrag
  durch eine Formulierungshilfe vorzubereiten. Zu Ihrer konkreten Frage würde ich
  mich jetzt hier aus Respekt vor dem Parlament nicht zu Details äußern. Das müssten
  Sie an die Regierungsfraktionen im Deutschen Bundestag richten. Hintergrund dieses
  offensichtlich doch geplanten stärkeren Anstiegs sind ja auch Haushaltsprobleme
  bzw. Finanzierungsfragen. Wie viel mehr Geld rechnen Sie denn jetzt durch diese
  Änderungen, die Sie nicht im Detail ausführen wollen, für den Haushalt? Wie viel
  weniger Menschen werden denn rauchen? Das rechnet man ja bei Tabaksteuern normalerweise
  dagegen. Noch einmal: Zu den konkreten Inhalten dieser Formulierungshilfe bzw. des
  geplanten Änderungsantrags würde ich Sie gerne an die Fraktionen verweisen. Wir
  haben ja schon letzte Woche betont: Die Erhöhung der Tabaksteuer dient der Haushaltskonsolidierung.
  Die ist notwendig, damit der Bund in Zukunft noch Handlungsspielräume hat. Minister
  Klingbeil hat sich ja letzte Woche Montag hier an dieser Stelle dazu geäußert. Aber
  die Erhöhung dient natürlich auch dem Schutz der öffentlichen Gesundheit und steht
  im Einklang mit dem Ziel der Bundesregierung, die Raucherquote von Jugendlichen
  und Erwachsenen zu senken. Aber, noch einmal: Zu konkreten Details dieser Formulierungshilfe
  bzw. des geplanten Änderungsantrags müssten Sie sich bitte an die Fraktionen im
  Bundestag wenden. An Herrn Kaminski vom BMI: Es hat ‑ das hat der Verfassungsschutz
  auch bestätigt ‑ offensichtlich Pläne von zwei russischen Spionen gegeben, von sogenannten
  Wegwerfagenten, in Deutschland Sprengstoffanschläge zu verüben . Sie sind an der
  Grenze zwischen Serbien und Ungarn festgenommen worden. Hat Deutschland eine Auslieferung
  beantragt? Was ist Ihnen über diese Festnahme hinaus bekannt? Ich hoffe, Sie haben
  Verständnis dafür, dass es sich dabei um laufende Ermittlungen handelt und ich mich
  dazu hier nicht äußern kann. Ich hätte eine Frage zu VW an Herrn Meyer und vielleicht
  auch an Frau Ungrad: Es war ja immer offen, wie viele Jobs bei VW abgebaut werden
  sollen. Es gab viele Medienberichte dazu. Jetzt hat Herr Blume zum ersten Mal in
  einem internen Interview selbst eine Zahl genannt. Es seien bis zu 50 000 Jobs,
  die wegfallen könnten. Dazu meine Frage an Sie: Ist das eine Größenordnung, bei
  der sich die Bundesregierung genötigt fühlt, einzugreifen, einzumischen, mitzureden?
  Auch das war hier am Freitag ganz ausführlich Thema. Deshalb würde ich Sie gerne
  dazu auf das Protokoll verweisen. Sonst würde ich drei Tage später das Gleiche wie
  am Freitag vortragen. Da war das hier umfassend Thema. Aber da war die Zahl 50 000
  von Herrn Blume noch nicht bekannt. Auch da war die Frage schon nach einem möglichen
  Stellenabbau etc. Die Gespräche, wie wir das verstehen, laufen derzeit in Wolfsburg
  noch, auch dazu, wie man das konkret ausgestaltet. Natürlich ‑ das gilt ganz allgemein ‑
  ist uns eine starke Automobilindustrie und insbesondere der Schutz von Arbeitsplätzen,
  auch von Standorten, sehr wichtig. Aber, noch einmal: Zum konkreten Fall möchte
  ich auf Freitag verweisen. Genau. So habe ich mich am Freitag auch geäußert. Ich
  habe eine Frage ans Gesundheitsministerium zum GKV-Sparpaket . Die Ministerin hat
  ja gesagt, damit werde die auf knapp 19 Milliarden Euro angewachsene Lücke geschlossen.
  Können Sie mal sagen, wie viel genau an Einsparvolumen jetzt zustande kommt und
  ob das dann gerade so ausreicht oder ob darin auch noch ein Polster ist, falls weitere
  Maßnahmen nötig sind? Für die ganz konkreten Zahlen würde ich Sie bitten, einfach
  einen Blick ins Gesetz zu werfen. Die Ministerin hat sich dazu ‑ das sagten Sie
  ja auch ‑ schon mehrfach geäußert, zuletzt zum Beispiel am Wochenende im Interview
  mit der „Frankfurter Allgemeinen Zeitung“. Darin hat sie auch noch einmal betont:
  Wir werden die Finanzlücke schließen und die Beitragssatzstabilität hinbekommen.
  Gibt es denn in dem Gesetz einen Puffer, falls die Kosten weiterhin steigen, oder
  erreicht man das Ziel so gerade? Wie gesagt, wir werden jetzt erst einmal die Finanzlücke
  schließen. Sie wissen auch, dass noch mehrere Strukturreformen für das Gesundheitswesen
  geplant sind. Einige haben wir schon angestoßen, die sind auf dem Weg. Andere kommen
  noch. Auch die Finanzkommission Gesundheit wird bis Ende des Jahres noch einmal
  konkrete Vorschläge für wirkliche Strukturreformen vorlegen. Das sehen wir dann
  als Gesamtpaket, um das Gesundheitswesen auch langfristig für die Zukunft weiter
  stabil aufzustellen. Ich würde das Familienministerium bemühen. Wie sehen denn die
  Pläne beim Unterhaltsvorschuss jetzt konkret aus? Welchen Zeitplan gibt es denn
  da? Vielen Dank für die Frage. Ich kann bestätigen, dass die Ministerin einen Gesetzentwurf
  zur Reform des Unterhaltsvorschusses sehr zeitnah auf den Weg geben wird. Das heißt,
  das ist im Moment noch in einem relativ frühen Stadium. Geplant ist ein Inkrafttreten
  ab dem 1. Januar 2027. Können Sie bestätigen, dass die Grenze bei 15 Jahren angesetzt
  werden soll? Der Vorschlag, der jetzt vorliegt, sieht vor, dass Unterhaltsvorschuss
  bis zum 16. Geburtstag, also bis zum 15. Lebensjahr ‑ je nachdem, wie man rechnet ‑,
  gezahlt wird. Im Moment wird bis 18 Jahre gezahlt. Die Idee, die jetzt auf dem Tisch
  liegt, sieht eine Absenkung auf den 16. Geburtstag vor. Vielleicht noch einmal zum
  Hintergrund: Historisch ist der Unterhaltsvorschuss ja einmal für Familien oder
  für Alleinerziehende mit kleinen Kindern vorgesehen gewesen. Vor der Reform von
  2017 ist Unterhaltsvorschuss nur bis zum Alter von zwölf Jahren und maximal 72 Monate
  gezahlt worden. Das ist dann 2017 auf 18 Jahre und unbegrenzt ausgeweitet worden.
  Die Idee jetzt ist eben, das wieder etwas einzugrenzen. Auch zum Unterhaltsvorschuss:
  Wie viele Kinder und Jugendliche würden nach Ihren Plänen ihren Anspruch auf Unterhaltsvorschuss
  zwischen dem 16. und 18. Geburtstag verlieren? Diese Zahl kann ich Ihnen gerade
  nicht vorlegen. Ich kann Ihnen nur die Gesamtzahl für 2025 nennen: Das sind 855 000
  Kinder. Ich weiß, das ist jetzt nicht die Zahl, nach der Sie fragen; diese müsste
  ich Ihnen nachliefern. Welches Einsparpotenzial sehen Sie für den Bund? Im Moment
  sind wir einfach noch in einer sehr frühen Phase. Ich bitte um Verständnis, dass
  wir uns erst dann dazu äußern können, wenn der Gesetzentwurf vorliegt. Können Sie
  bestätigen, dass es in diesem Zusammenhang auch Sanktionen gegen säumige Zahler
  geben soll, zum Beispiel in Form des Führerscheinentzugs? Die Reform des Unterhaltsvorschussgesetzes
  hat mehrere Ebenen, und die Absenkung der Bezugsgrenze ist nur eine davon. Es ist
  auch vorgesehen, säumige Zahler mehr in die Pflicht zu nehmen, und da gibt es tatsächlich
  die Idee eines vorübergehenden Fahrverbots für säumige Zahler. Es gibt noch einen
  anderen wesentlichen Punkt bei der staatlichen Durchsetzung von Unterhaltsansprüchen:
  Es soll hierfür auch rückgriffspezialisierte Einrichtungen in den Ländern geben.
  Die Länder sind ja für den Rückgriff zuständig, und es soll hier stärker gebündelt
  werden, um sie stärker zu unterstützen; denn für die Länder ist das in den letzten
  Jahren zu einem enormen Kosten- und auch Organisationsfaktor geworden. Herr Meyer,
  zum Wimbledon-Finale : Der Kanzler soll nach dem Spiel in die Kabine von Alexander
  Zverev gekommen sein. Was hat er ihm gesagt? Der Bundeskanzler hat sich gestern
  vor dem Spiel, aber auch nach dem Spiel öffentlich in den sozialen Kanälen geäußert
  und hat Herrn Sinner zum Sieg gratuliert. Er hat aber natürlich auch Alexander Zverev
  für seine herausragenden Leistungen in den letzten Wochen und auch für das herausragende
  Finale gestern herzlich gratuliert. Es war es ihm ein persönliches Anliegen, dort
  vor Ort zu sein; denn dass Deutsche im Wimbledon-Finale stehen, ist ja nicht etwas,
  was jeden Tag passiert. Ich glaube, in den vergangenen Jahren ist das Sabine Lisicki
  und Angelique Kerber gelungen; aber bei den Männern ist das schon sehr lange her.
  Insofern war es ihm ein großes Anliegen. Noch einmal: ganz starke Leistung ‑ vor
  allen Dingen aber natürlich auch Glückwunsch an Jannik Sinner. War in der „Royal
  Box“ auf dem Centre Court auch Zeit für Gespräche, die über das Spiel hinausgingen?
  Zu beidem verweigere ich die Aussage. ‑ Nein, es war ja auch in den Fernsehbildern
  zu sehen, dass es in der Box Austausch gab. Zu den Inhalten weiß ich allerdings
  nichts, und beim Hut muss ich leider auch passen. Das Verteidigungsministerium hat
  gerade mitgeteilt, dass Fürstenfeldbruck wieder Ausbildungsstandort wird. In der
  Pressemitteilung werden allerdings keine Zahlen genannt. Könnten Sie uns sagen,
  wie viele Menschen dort ausgebildet werden sollen und wie viele Ausbilder der Bundeswehr
  an diesem Standort eingesetzt werden sollen? Um hier vielleicht alle einmal mitzunehmen:
  Es ist tatsächlich die Entscheidung gefallen, dass das zweite Luftwaffenausbildungsbataillon
  in Fürstenfeldburg aufgestellt und stationiert wird. Tatsächlich ist dies nun die
  entscheidende Weichenstellung für die weitere Planung, sodass ich Ihnen die von
  Ihnen gerade erfragten Zahlen im Moment leider noch nicht nennen kann. Es ist aber
  zu betonen, dass das ein ganz wichtiger Schritt ist, um auch kurzfristig die Ausbildungskapazitäten
  zu erhöhen. Gerade im Zusammenhang mit dem neuen Wehrdienst haben wir immer wieder
  betont, wie wichtig das für uns ist. Für die Teilfragen darf ich Sie an die Kolleginnen
  und Kollegen der Luftwaffe verweisen; denn das wird natürlich in das bestehende
  Ausbildungssystem der Luftwaffe integriert, und die Kolleginnen und Kollegen können
  Ihnen im Zweifel auch schon nähere Informationen geben. Würden Sie da noch etwas
  nachliefern, oder sagen Sie, dass man sich direkt an die Luftwaffe wenden soll?
  Ich würde tatsächlich an die Luftwaffe verweisen; denn da sind Sie gleich bei den
  Experten. Das ist, glaube ich, sinnvoller, als wenn wir Stille Post spielen. An
  das BMI: Auf welchem Stand sind Sie mit den Vorhaben der KI-Unterstützung in Visumverfahren
  und in der Migrationsverwaltung und der Digitalisierung der Einbürgerungstests ?
  Ich müsste Ihnen beides nachliefern; gerade habe ich tatsächlich keinen aktuellen
  Stand dazu. Das wäre nett. ‑ Noch eine Frage: Wann können wir im Zusammenhang mit
  der Reform des Nachrichtendienstrechts eine Kabinettsbefassung erwarten? Wir befinden
  uns bei diesem Vorhaben in der Ressortabstimmung. Ein konkretes Datum kann ich noch
  nicht nennen.'
