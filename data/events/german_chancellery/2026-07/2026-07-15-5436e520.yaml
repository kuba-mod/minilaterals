title: Energiesteuersenkung im Mai und Juni Maßnahmen der Bundesregierung gegen hohe
  Spritpreise
text: 'In Folge des Iran-Nahost-Konflikts und der Sperrung der Schifffahrtsroute von
  Hormus ist der Ölpreis auf dem Weltmarkt um etwa 30 Prozent gestiegen. Die Auswirkungen
  des Iran-Nahost-Konflikts auf die Kraftstoffpreise bereiten vielen Menschen Sorgen.
  Aus diesem Grund hat die Regierungskoalition am 12. April beschlossen, die Energiesteuer
  für zwei Monate um ca. 17 Cent pro Liter Kraftstoff zu senken. Diese Regelung galt
  für die Monate Mai und Juni. Außerdem will sie das Kartellrecht weiter verschärfen.
  Seit dem 1. April ist zudem das Maßnahmenpaket der Bundesregierung wirksam, um gegen
  die vielen täglichen Preiserhöhungen an den Tankstellen und gegen missbräuchlich
  erhöhte Kraftstoffpreise vorzugehen. Das soll die Verlässlichkeit und Transparenz
  an den Tankstellen erhöhen und das Bundeskartellamt stärken. Die Senkung der Energiesteuer
  hat Verbraucherinnen und Verbraucher sowie Unternehmen schnell, direkt und unbürokratisch
  entlastet. Die unabhängige Monopolkommission und das Bundeskartellamt kommen zu
  dem Schluss, dass die Energiesteuersenkung bei Benzin und Diesel weitgehend bei
  Verbraucherinnen und Verbrauchern angekommen ist. Die Maßnahme hat gewirkt: Der
  Tankrabatt hat seine Funktion erfüllt, in einer Phase besonders hoher Kraftstoffpreise
  Preisspitzen effektiv abzufangen. Im Detail sorgte die Bundesregierung dafür, dass
  die Energiesteuersätze für Diesel und Benzin ab dem 1. Mai 2026 für zwei Monate
  um jeweils 14,04 Cent je Liter sanken. Zusammen mit dem darauf anfallenden Umsatzsteueranteil
  ergaben sich daraus eine Entlastung von bis zu 17 Cent brutto pro Liter. Dafür plante
  der Bund 1,6 Milliarden Euro ein. Es gibt deutliche regionale Unterschiede bei der
  Preisgestaltung an der Zapfsäule. Die Energiesteuer, die im Zuge des Tankrabatts
  für zwei Monate gesenkt wurde, ist lediglich ein Preisbestandteil des Kraftstoffpreises.
  Wie sich die Preise gestalten, liegt weiterhin vollständig in der Hand der Mineralölkonzerne
  bzw. Tankstellenbetreiber und ist von vielen Faktoren wie der Preisentwicklung von
  Rohöl oder Transportkosten abhängig. Andreas Mundt, Präsident des Bundeskartellamts
  sagte dazu: „Die Steuersenkung auf Kraftstoffe läuft Ende Juni aus, mit einem Anstieg
  der Kraftstoffpreise ist zu rechnen. Wir werden die Preisentwicklung sehr genau
  beobachten. Unternehmen dürfen die Situation nicht dazu nutzen, Preiserhöhungen
  vorzunehmen, die sich sachlich nicht rechtfertigen lassen. Entsprechenden Hinweisen
  werden wir konsequent nachgehen.“ Seit dem 1. April dürfen die Tankstellen in Deutschland
  nur noch einmal am Tag ihre Spritpreise erhöhen: um 12 Uhr. Preissenkungen sollen
  jederzeit möglich sein. Die neue Regel sorgt für Verlässlichkeit und mehr Transparenz
  für Autofahrerinnen und Pendler. Denn zuvor änderte sich der Spritpreis bis zu 22-mal
  pro Tag im Durchschnitt. Das war für Autofahrerinnen und Autofahrer sehr intransparent
  und ärgerlich. Bei Verstößen gegen das Verbot täglich mehrfacher Preiserhöhungen
  drohen nun Bußgelder bis zu 100.000 Euro. Nach einem Jahr wird die Bundesregierung
  über die Wirksamkeit und Wirkungen in der Praxis berichten. Die Marktransparenzstelle
  für Kraftstoffe im Bundeskartellamt bündelt und überwacht die Preisdaten von rund
  15.000 Tankstellen in Deutschland. Diese müssen jede Preisänderung innerhalb von
  fünf Minuten anzeigen. Sie werden beispielsweise an zugelassene Spritpreis-Apps
  und Service-Portale weitergegeben. Die Markttransparenzstelle wertet jetzt auch
  die Daten zur Einhaltung der neuen 12-Uhr-Regel aus. Jeder Verstoß wird dann den
  zuständigen Landesbehörden mitgeteilt. Ja, denn die Bundesregierung hat das Bundeskartellamt
  gestärkt: M it dem Kraftstoffpaket vom 1. April hat sie die kartellrechtliche Missbrauchsaufsicht
  bei marktbeherrschenden oder marktmächtigen Unternehmen aus dem Kraftstoffbereich
  verschärft. Damit kann das Bundeskartellamt nun gegen missbräuchliche Preiserhöhungen
  bei Kraftstoffen einfacher und schärfer vorgehen. Damit sollen insbesondere auch
  überhöhte Preise gegenüber freien Tankstellen verhindert werden. Bei Verdacht auf
  missbräuchlich überhöhte Kraftstoffpreise müssen die Unternehmen dann darlegen,
  dass die Erhöhungen gerechtfertigt sind. Verschärfte Kontrollen bei Kosten und Preisen
  sind eine Voraussetzung für Preisdämpfungen. Zudem soll das Bundeskartellamt strukturelle
  Wettbewerbsstörungen einfacher feststellen und damit schneller beheben können. Das
  Bundeskartellamt hat bereits reagiert und Raffinerien zur Auskunft über Preise aufgefordert.
  Es hat die zuständige Beschlussabteilung neu strukturiert, inhaltlich entlastet
  und personell aufgestockt, um die neuen Wettbewerbsregeln im Kraftstoffbereich möglichst
  effizient anwenden zu können. Mit der 12. Novelle des Gesetzes gegen Wettbewerbsbeschränkungen
  (GWB) will die Bundesregierung das Kartellrecht noch weiter verschärfen: Künftig
  müssen auch die Preiserhöhungen bei Super Plus gemeldet werden. Raffinerien und
  Kraftstoffgroßhandel müssen der Markttransparenzstelle künftig zusätzliche Daten
  melden. So soll die Marktaufsicht missbräuchlich überhöhte Preise noch effektiver
  ermitteln und sanktionieren können. Sie soll außerdem besser feststellen können,
  ob sinkende Rohstoffpreise auch schnell an Verbraucher weitergegeben werden, sobald
  sich die Marktlage wieder beruhigt. Von der Energiesteuer-Senkung profitierten insbesondere
  Autofahrerinnen und Autofahrer sowie Betriebe mit hohem Verbrauch in einer Phase
  besonders hoher Kraftstoffpreise. Die Bundesregierung analysiert stets die Lage
  der Spritpreisentwicklung und ist jederzeit handlungsfähig in Bezug auf mögliche
  weitere Maßnahmen. Zudem plant die Regierungskoalition zum 1. Januar 2027 eine Reform
  der Einkommenssteuer , um kleinere und mittlere Einkommen dauerhaft zu entlasten.
  Weitere Antworten auf häufig gestellte Fragen zur Energie und Energieversorgung
  finden Sie in unserem FAQ.'
