title: Im Bundestag beschlossen Spitzenförderung für den Spitzensport
text: 'Die Bundesregierung möchte Athletinnen und Athleten fördern, um den deutschen
  Sport noch leistungsfähiger zu machen. Um in internationalen Wettbewerben nachhaltig
  noch erfolgreicher zu werden, bedarf es im deutschen Spitzensport einer umfassenden
  gesetzlichen Neuausrichtung. Diese Neuausrichtung hat die Bundesregierung im Koalitionsvertrag
  vereinbart. Nach langen Verhandlungen mit dem Sport hat das Bundeskabinett nun das
  neue Sportfördergesetz auf den Weg gebracht. Der Bundestag hat am 10. Juli 2026
  über das Sportfördergesetz abgestimmt und mit kleinen Änderungen angenommen. Die
  Beratung im Bundesrat steht noch aus. Das Gesetz geht notwendige Reformschritte
  an und definiert erstmalig Ziele, Rahmenbedingungen und Fördervoraussetzungen der
  Sportförderung. Damit ist der Weg frei, um den deutschen Spitzensport wieder an
  die Weltspitze zu führen. Deutschland möchte wieder national und international sportlich
  erfolgreicher werden. Die Leistungsfähigkeit des Sports soll weiter geschärft werden.
  Zudem wird die aufgebaute Bürokratie zurückgefahren und besonders die Spitzensportförderung
  bürokratieärmer und transparenter gestaltet werden. Mit dem Gesetz entsteht Planungssicherheit,
  weil man die Förderung des Leistungssportes niederschreibt und nicht immer neu aushandeln
  muss, wie es vorher beim Beginn einer jeden neuen Legislaturperiode der Fall war.
  Es gibt mit dem Gesetz auch die Möglichkeit der unmittelbaren Förderung von erfolgs-
  und potenzialreichen Athletinnen und Athleten, damit man diese beruflich und persönlich
  unterstützt. Die Prozesse sollen einfacher und schneller vergeben werden. Dafür
  sollen die Prozesse auch digitaler gestaltet werden. Die Spitzensport-Agentur ist
  der zentrale Ansprechpartner bei der Spitzensportförderung und wird ihren Sitz in
  Leipzig haben. Sie wird von einem Stiftungsrat und einem Vorstand geführt. Der Stiftungsrat
  setzt sich aus nunmehr zehn Mitgliedern des Sports und der Politik zusammen; der
  Vorstand aus zwei gleichberechtigten Mitgliedern. Die Spitzensport-Agentur soll
  ihre Arbeit ab 2027 aufnehmen. Die Spitzensport-Agentur wird eine Vielzahl von Aufgaben
  erhalten: Verbandsf ö rderung: Unterst ü tzung von olympischen und paralympischen
  Verb ä nden sowie perspektivisch auch nicht-olympischen Verb ä nden. Individuelle
  Athletenf ö rderung: Fokus auf besonders erfolgs- und potenzialreiche Athletinnen
  und Athleten. Wissenschaftliche Unterst ü tzung: F ö rderung wissenschaftlicher
  Ma ß nahmen zur Leistungssteigerung. St ü tzpunktsystem: F ö rderung und gegebenenfalls
  auch Neuausrichtung von Olympia- und Bundesst ü tzpunkten. Kaderfestlegung: Bestimmung
  der Bundeskaderanzahl und sportart ü bergreifende Kaderkriterien. Den Athletinnen
  und Athleten sollen beste Rahmenbedingungen geboten werden, um Spitzenleistungen
  zu erzielen. Das geschieht zum einen durch eine individuelle Förderung (sogenanntes
  „Individualbudget“). So können Athletinnen und Athleten beruflich und persönlich
  unterstützt werden, damit sie sich auf die sportliche Entwicklung konzentrieren
  können. Zum anderen wird durch den Sportfachbeirat als Beratungsgremium direkt auf
  die Perspektive der Athletinnen und Athleten eingegangen. Außerdem wird erstmalig
  das Vorgehen gegen jede Form von interpersonaler Gewalt als Fördervoraussetzung
  verankert. Nein, die Spitzensport-Agentur gilt als einziger Ansprechpartner insbesondere
  für die Bundessportfachverbände. Die Förderung und Prozesse sollen bei der Agentur
  gebündelt werden. Es gibt also gerade weniger Verwaltung und mehr eigene sportfachliche
  Expertise. Nein, es gibt keine komplette Einstellung der Bundesförderung für weniger
  erfolgreiche Disziplinen. Die Verbände sollen die Möglichkeit haben, Nachwuchs zu
  generieren. Ja, im Rahmen des parlamentarischen Verfahrens wurden einige Änderungen
  im Gesetzentwurf festgelegt. So wird wird der Stiftungsrat als zentrale Aufsichtsgremium
  der Spitzensport-Agentur auf zehn Mitglieder aufgestockt, um dem organisierten Sport
  ( DOSB ) mehr Mitspracherecht einzuräumen. Der Deutsche Olympische Sportbund entsendet
  vier Sitze (inklusive eines Athletenvertreters). Hintergrund ist, dass mit Athletinnen
  und Athleten und nicht nur über sie entschieden werden solle. So können Sportlerinnen
  und Sportler selbst Verbesserungen einfordern.'
