title: Versorgungssicherheit in Deutschland Für eine verlässliche Stromversorgung
  – auch in Zukunft
text: 'Mit dem Gesetz soll sichergestellt werden, dass ausreichend flexible Kapazitäten
  auf dem Strommarkt verfügbar sind. Foto: picture alliance / ZB/euroluftbild.de Eine
  sichere Stromversorgung ist für unseren Alltag essenziell – und zentraler Standortfaktor
  für die Wirtschaft . Das Stromnetz in Deutschland ist seit vielen Jahren eines der
  zuverlässigsten in Europa. Das soll auch in Zukunft so bleiben – bei einem noch
  größeren Anteil erneuerbarer Energien und mit fortschreitendem Kohleausstieg. Aus
  diesem Grund hat die Bundesregierung einen Entwurf für ein „Strom-Versorgungssicherheits-
  und Kapazitätengesetz“ (StromVKG) auf den Weg gebracht. Damit soll sichergestellt
  werden, dass auch in Zukunft ausreichend flexible Kapazitäten auf dem Strommarkt
  verfügbar sind. So soll weiterhin eine stabile Versorgung im Stromsystem jederzeit
  gewährleistet bleiben – auch wenn die Sonne nicht scheint und der Wind nicht weht.
  Bundestag und Bundesrat haben das Gesetz nun verabschiedet. Lesen Sie hier Antworten
  auf die wichtigsten Fragen: Das StromVKG führt einen sogenannten Kapazitätsmarkt
  ein. Damit soll der Bedarf für eine sichere Versorgung mit Strom ab 2031 gedeckt
  werden. Bereits in den nächsten zwölf Monaten sollen steuerbare Kapazitäten im Umfang
  von insgesamt elf Gigawatt ausgeschrieben werden – also Stromkapazitäten, die flexibel
  ein- und ausgeschaltet werden können. In den Jahren 2027 und 2029 werden zwei weitere
  Ausschreibungen folgen. Ein Kapazitätsmarkt entlohnt Anbieter schon für die Bereithaltung
  von Leistung und nicht erst, wenn der von ihrer Anlage produzierte Strom abgenommen
  wird. Das schafft wichtige finanzielle Anreize für Investitionen in neue Anlagen
  sowie den Erhalt bestehender Kapazitäten – auch, wenn die Kraftwerke nur wenige
  Stunden im Jahr benötigt werden. Mit einem Zuschlag gehen aber auch Verpflichtungen
  einher. Anlagen müssen die zugesicherte Leistung zu relevanten Zeitpunkten nachweislich
  erbringen und Neuanlagen fristgerecht errichtet werden. Außerdem wird die Versorgungssicherheit
  durch ein sogenanntes Resilienzkriterium weiter verbessert. So wird sichergestellt,
  dass die zunächst ausgeschriebenen Langzeitkapazitäten beziehungsweise ihre wesentlichen
  Bauteile hauptsächlich im Europäischen Wirtschaftsraum gefertigt werden. Der Anteil
  erneuerbarer Energien soll bis 2030 auf 80 Prozent steigen. Die zusätzlichen Stromkapazitäten
  sind notwendig, um in Zeiten einzuspringen, in denen nicht genug Windkraft oder
  Solarenergie zur Verfügung stehen – sogenannte Dunkelflauten. Denn die erneuerbaren
  Energien können zwar schon jetzt oft einen Großteil des Strombedarfs in Deutschland
  decken, sind aber deutlich stärkeren Schwankungen ausgesetzt als herkömmliche Kraftwerke.
  Diese Schwankungen sollen die neuen, flexiblen Kapazitäten ausgleichen. Das Ziel
  ist klar: Die Versorgungssicherheit in Deutschland muss auch in Zukunft so hoch
  wie heute bleiben. Das neue Gesetz soll die Versorgungssicherheit im deutschen Stromnetz
  auch in Zukunft gewährleisten. Dafür muss der Strom dort vorhanden sein, wo er gebraucht
  wird. Das ist stärker im Süden und Westen Deutschlands der Fall - wegen der dort
  vermehrt vorhandenen energieintensiven Industrie. Diese Region wird als der „netztechnische
  Süden“ bezeichnet. Neue Kapazitäten sollen daher vor allem dort entstehen. Doch
  auch im „netztechnischen Norden“ (einschließlich Ostdeutschland) werden neue Kraftwerke
  zur Absicherung gegen Schwankungen in der Stromversorgung benötigt. Daher ist im
  nun verabschiedeten Gesetz gleichzeitig sichergestellt, dass auch Standorte in dieser
  Region erfolgreich an Ausschreibungen teilnehmen können. Wie genau der nun für 2031
  beschlossene Kapazitätsmarkt geregelt und finanziert wird, soll in einem weiteren
  „Gesetz zum Kapazitätsmarkt“ voraussichtlich in 2027 beschlossen werden. Dabei sind
  auch die beihilferechtlichen Vorgaben der Europäischen Union einzuhalten. Die Bundesregierung
  hat in jedem Fall die Belastung für die Verbraucher durch eine mögliche Umlage ab
  2031 im Blick. Sie entlastet bereits jetzt sowohl die Wirtschaft als auch die Bürgerinnen
  und Bürger bei den Energiekosten in großem Umfang und will dies auch zukünftig tun.
  Das StromVKG unterstützt die Klimaschutz‑ und Dekarbonisierungsziele in Deutschland.
  Alle über das Gesetz geförderten Kraftwerke müssen ab 2045 klimaneutral sein. Neue
  Gaskraftwerke, die gefördert werden, werden Wasserstoff‑ ready ausgelegt, um die
  zukünftige Dekarbonisierung zu ermöglichen. Das bedeutet, dass die Gaskraftwerke
  nur übergangsweise mit Erdgas betrieben werden. Langfristig soll Wasserstoff diese
  Funktion übernehmen. Nein. Das StromVKG ist eine notwendige Ergänzung zum Ausbau
  der erneuerbaren Energien. Diesen Ausbau treibt die Bundesregierung gleichzeitig
  weiter ambitioniert voran – sowohl bei der Solar- als auch der Windenergie. So ist
  der Anteil erneuerbarer Energien auf Rekordniveau und soll bis 2030 weiter auf 80
  Prozent steigen. Allerdings will die Bundesregierung den Ausbau besser mit dem Ausbau
  der Stromnetze synchronisieren. Das ist auch wichtig für bezahlbare Strompreise.
  Aus diesem Grund arbeitet sie derzeit an einem Netzanschlusspaket und einer Reform
  des Erneuerbaren-Energien-Gesetzes. Der Zubau soll zukünftig vor allem dort stattfinden,
  wo es noch freie Netzkapazitäten gibt. Der nun geplante Kapazitätsmarkt ermöglicht
  einen technologieoffenen Mix von unterschiedlichen Anlage-Arten. Sie müssen in erster
  Linie flexibel, aber auch darauf ausgelegt sein, bestimmte Zeitbedarfe zu überbrücken.
  In Frage kommen hauptsächlich Gaskraftwerke, Batterien und flexible Lösungen. Für
  einen Großteil der in den nächsten zwölf Monaten ausgeschriebenen Kapazitäten ist
  ein Langzeitkriterium vorgesehen. Das ist notwendig, um auch in langen Phasen schwacher
  Wind- und Solarstromeinspeisung – sogenannter Dunkelflauten – ausreichend Stromkapazität
  zu gewährleisten. Der verbleibende Teil der Ausschreibungen – in den kommenden 12
  Monaten zwei GW – adressiert ebenfalls neue Anlagen ohne Langzeitkriterium, um technologieoffen
  die verbliebenen Bedarfe für das Jahr 2031 zu decken. Weiteren Ausschreibungen in
  den Jahren 2027 und 2029 sollen sowohl neue als auch bestehende Anlagen adressieren
  – Kraftwerke, Batterien und flexible Lasten können gleichermaßen teilnehmen. Derzeit
  werden Schwankungen in der Energieversorgung noch unter anderem durch Strom aus
  Kohlekraftwerken ausgeglichen. Um den gesetzlich vereinbarten Ausstieg aus der Verstromung
  von Kohle bis 2038 zu verwirklichen, muss auch danach eine sichere Versorgung mit
  Strom, ohne Abstriche, zu jedem Zeitpunkt sichergestellt werden. Genau das leistet
  das nun beschlossene Gesetz. Die neu geschaffenen Kapazitäten können künftig Schwankungen
  im Stromnetz ausgleichen und sichern damit die Netzstabilität – auch für die Zeit
  nach dem Kohleausstieg. Mit dem nun von Bundestag und Bundesrat verabschiedeten
  „Gesetz zur Sicherung der Versorgungssicherheit Strom und zur Bereitstellung neuer
  Kapazitäten“ wird ein wichtiges Vorhaben des Koalitionsvertrages und eine Grundsatzeinigung
  der Koalition zur sogenannten Kraftwerksstrategie umgesetzt . Auch die Europäische
  Kommission hatte den Eckpunkten schon zugestimmt.'
