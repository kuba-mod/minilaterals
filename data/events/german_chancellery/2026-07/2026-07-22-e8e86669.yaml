title: Im Kabinett beschlossen Mehr Cyber sicherheit in der Bundesverwaltung
text: 'Mit dem Programm will die Bundesregierung Deutschland und den Staat widerstandsfähiger
  gegen Cyber angriffe machen. Mit dem Programm zur Steigerung der Cyber sicherheit
  in der Bundesverwaltung, kurz CyberGovSecure , hat das Kabinett eine Bündelung von
  Sofortmaßnahmen beschlossen. So wird der Schutz Deutschlands vor Cyber angriffen
  verbessert und seine digitale Widerstandsfähigkeit gestärkt. Damit setzt die Bundesregierung
  ein weiteres Koalitionsvorhaben erfolgreich um. Die Bundesregierung reagiert mit
  dem Programm auf die steigende Bedrohung durch Cyber angriffe und stärkt die Cyber
  sicherheit in der Bundesverwaltung. Ziel ist es, Deutschland und den Staat widerstandsfähiger
  gegen Cyber angriffe sowie andere hybride und konventionelle Bedrohungen zu machen.
  Denn Angriffe auf die IT -Systeme der Bundesverwaltung können die Funktions- und
  Handlungsfähigkeit des Staates erheblich beeinträchtigen. Mit dem Programm soll
  die ressortübergreifende Umsetzung der gesetzlichen Verpflichtungen zur Informationssicherheit
  unterstützt werden. Kurz gesagt: alle Ressorts und obersten Bundesbehörden sollen
  künftig einheitliche und bestmögliche Sicherheitsstandards für ihre IT nutzen. Das
  Bundesamt fü r Sicherheit in der Informationstechnik ( BSI ) hat neun Handlungsfelder
  identifiziert und erste Maßnahmen festgelegt: Weitere Handlungsfelder werden gemeinsam
  mit dem BSI ressortübergreifend abgestimmt und ergänzt. Angesichts der sich verschärfenden
  aktuellen Bedrohungslage – insbesondere im digitalen Raum – müssen die Anforderungen
  der bestehenden IT -Verfahren fortlaufend überprüft werden, damit die Cyber sicherheit
  der Bundesverwaltung weiterentwickelt und sichergestellt werden kann. Das nunmehr
  beschlossene Programm soll durch die Bündelung der Maßnahmen ressortübergreifend
  und mit strategischen Vorgaben die Cyber sicherheit effektiv steigern und auch in
  Zukunft sicherstellen. Ziel ist ein effektiverer Schutz gegen gezielte Spionagekampagnen,
  Angriffe auf IT -Dienstleister oder koordinierte Überlastungsangriffe. Das Programm
  ermöglicht eine klare und übergreifende Cyber sicherheit- Governance. Diese macht
  strategische Vorgaben und unterstützt alle Ressorts und obersten Bundesbehörden
  dabei, die Maßnahmen im Sinne einer effektiveren Cyber sicherheit umzusetzen. Die
  strategische Steuerung erfolgt durch einen Lenkungskreis unter Vorsitz des Bundesministeriums
  für Digitales und Staatsmodernisierung (BMDS). Die Koordination der operativen Umsetzung
  und Entwicklung des Programms liegt bei dem Chief Information Security Officer Bund
  (CISO Bund, ausgeübt durch die Präsidentin des BSI ) und den jeweiligen Informationssicherheitsbeauftragten
  der Ressorts. Ziel ist die Schaffung eines transparenten und aufwandsarmen Berichtswesen.
  Das Programm CyberGovSecure behandelt den Bereich der IT -Sicherheit in der gesamten
  Bundesverwaltung. CyberGovSecure stärkt die Bundesverwaltung von innen. Durch eine
  effektivere und höhere Cyber sicherheit und Resilienz der Bundesverwaltung stärken
  die Bundesregierung die Funktionsfähigkeit unseres Staates. Das parallel in der
  Konzeption befindliche Programm Cyberdome unterstützt den Aufbau einer gesamtstaatlichen
  Schutz-Infrastruktur in Deutschland. Gemeinsam bilden beide Programme einen wesentlichen
  und notwendigen Beitrag zur Stärkung der Cyber sicherheit in Deutschland.'
