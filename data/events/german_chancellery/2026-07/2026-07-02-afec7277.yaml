title: Regierungskoalition setzt Reformkurs fort „Wir wollen Deutschland wieder flottkriegen“
text: 'Die Koalition hat sich auf ein gemeinsames Paket verständigt, um das Land zukunftsfest
  aufzustellen. „Wir modernisieren unser Land und führen es in die Zukunft“, so Bundeskanzler
  Friedrich Merz am Morgen nach der Sitzung des Koalitionsausschusses. Mit insgesamt
  34 Maßnahmen wird die Regierungskoalition die Wettbewerbsfähigkeit erhöhen, Bürokratie
  zurückbauen, den Sozialstaat erhalten und Steuern senken. „Diese Koalition hat sich
  als Regierung der Erneuerung auf den Weg gemacht“, unterstrich der Bundeskanzler.
  Die Bürgerinnen und Bürger wollten Entscheidungen und keinen Streit. „Das haben
  wir geliefert.“ Die Regierungskoalition ist sich einig, dass der Bericht der Alterssicherungskommission
  wegweisende Empfehlungen zur Reform der Rente vorgelegt hat. Sie wird nun diese
  Empfehlungen in einem Gesetzespaket umsetzen. Ziel ist, die Rentenreform im Bundestag
  bis Ende 2026 zu verabschieden. „Das ist die zweite große Reform nach der Gesundheitsreform,
  nach der Reform der gesetzlichen Krankenversicherung“, erläuterte Kanzler Merz.
  „Wer unter Teuerung, Inflation und stagnierenden Löhnen am meisten leidet, wird
  entlastet“, sagte der Kanzler. Profitieren von der vereinbarten Steuerreform, die
  zum 1. Januar 2027 kommen wird, werden vor allem Familien und Menschen mit mittlerem
  und geringem Einkommen. So werden beispielsweise der Grundfreibetrag und der Kinderfreibetrag
  angehoben sowie das Kindergeld erhöht. Insgesamt werden sich die Entlastungen auf
  etwa zehn Milliarden Euro im Jahr belaufen. Kanzler Merz erklärte: „Wir rechnen
  mit bis zu 600 Euro pro Jahr für einen Durchschnittshaushalt.“ „Die Menschen sind
  bereit für Veränderung und Veränderungen funktionieren, wenn sie gerecht sind“,
  betonte Bundesfinanzminister Lars Klingbeil mit Blick auf die Einkommensteuerreform.
  Damit Arbeit sich mehr lohne, bekräftigte er, „damit Menschen in Zeiten, die anspruchsvoll
  und anstrengend sind, am Ende des Jahres etwas mehr Geld in der Tasche haben“. Dabei
  werde das Steuersystem gerechter, kündigte der Bundesfinanzminister an. „Die Spitzeneinkommen
  am obersten Ende werden einen größeren Beitrag leisten. Das ist eine Frage der Fairness“,
  sagte der Minister. Der Arbeitsmarkt wird reformiert. Die wichtigste Entscheidung
  betrifft nach Auffassung des Bundeskanzlers die sachgrundlose Befristung. Künftig
  kann sie bis zu 48 Monaten dauern. „Das ist besonders für junge Unternehmen, für
  Start-ups , aber auch für Betriebe, die expandieren wollen, eine wichtige Möglichkeit,
  auch neue Beschäftigung zu ermöglichen“, so der Bundeskanzler. Weiterhin werden
  beispielsweise die Obergrenzen für steuerlich begünstigte Sonn- und Feiertagszuschläge
  erhöht. Zudem wird ein Programm erarbeitet, um Jugendlichen ohne Schul- und Ausbildungsabschluss
  eine zweite Chance zu ermöglichen, Abschlüsse nachzuholen. Krankschreibungen können
  künftig nicht mehr telefonisch erfolgen, eine Krankschreibung ist demnächst ab dem
  ersten Krankheitstag notwendig. „Das ist eine harte Entscheidung, das wissen wir“,
  führte der Kanzler aus. „Aber wir können uns diesen Wettbewerbsnachteil durch lange
  Abwesenheiten in den Unternehmen nicht länger leisten.“ Vorgenommen hat sich die
  Regierungskoalition auch, bezahlbaren Wohnraum zu schaffen. Und zwar dort, wo der
  Markt ihn nicht ausreichend bietet. Hierfür wird eine Wohnungsbaugesellschaft eingerichtet,
  die den sozialen Wohnungsbau und industrielles, serielles Bauen unterstützt. Zudem
  wird es zum 1. Januar 2027 erhebliche zusätzliche Mittel für die Finanzierung von
  Wohnungsbau durch deutsche Banken geben. Zudem hat sich die Regierungskoalition
  darauf verständigt, dass Sozial- und Innenministerium noch in diesem Sommer gemeinsam
  einen Aktionsplan zur Bekämpfung des Sozialleistungsmissbrauchs mit gesetzlichen
  und untergesetzlichen Maßnahmen vorlegen. Geplant ist die Umsetzung bis Ende 2026.
  Deutschland wird schneller, einfacher und effizienter. Um das zu erreichen, hat
  sich die Regierungskoalition darauf verständigt, überflüssige Berichts- und Dokumentationspflichten
  abzubauen. „Wir heben alle Berichtspflichten gegenüber staatlichen Stellen generell
  auf. Wenn ein Ministerium Berichtspflichten erhalten will, muss es das neu begründen",
  erläuterte der Bundeskanzler. Außerdem werden in Zukunft viele Anträge als genehmigt
  gelten, wenn vier Monate nach Eingang keine andere Nachricht die Antragsteller erreicht.
  Zudem wird die Abgabe der Steuererklärung vereinfacht, um damit Steuerzahler von
  unnötigem Aufwand zu entlasten. „Deutschland wird bei all dem spüren: Es bewegt
  sich etwas. Der Alltag wird leichter“, ist sich der Kanzler sicher. „Deutschland
  kommt voran.“ Die meisten Steuerpflichtigen werden von der Einkommensteuerreform
  profitieren, auf die sich die Bundesregierung geeinigt hat. Am stärksten wirkt die
  Reform für untere und mittlere Einkommen und insbesondere Familien mit Kindern.
  Damit erleichtert die Koalition gezielt den Alltag von Familien. Aber auch gewerbliche
  Personenunternehmerinnen und -unternehmer wie etwa Handwerksbetriebe werden entlastet.
  Insgesamt geht es um eine steuerliche Entlastung in Höhe von rund zehn Milliarden
  Euro pro Jahr. Das ist gerade mit Blick auf die angespannte Haushaltslage ein sehr
  hoher Entlastungsbeitrag für die Bürgerinnen und Bürger. „Wer unter Teuerung, Inflation
  und stagnierenden Löhnen am meisten leidet, wird entlastet“, sagte Bundeskanzler
  Merz. Die Entlastung der unteren und mittleren Einkommen sei im Koalitionsvertrag
  vereinbart gewesen. Die Reform soll zum 1. Januar 2027 kommen. Die volle Wirkung
  ab 2028 kann eine berufstätige Familie mit zwei Kindern und einem zu versteuernden
  Gesamteinkommen von 60.000 Euro gegenüber heute um mehr als 600 Euro jährlich entlastet
  werden. Die Reform wird zudem Wachstum und Beschäftigung einen neuen Impuls geben.
  Umgesetzt wird die Entlastung durch die Anhebung des Grundfreibetrags, des Kinderfreibetrags
  sowie einer Erhöhung des Kindergeldes und des Arbeitnehmerpauschbetrags. Auch der
  Spitzensteuersatz soll erst etwas später greifen, nämlich ab einem zu versteuernden
  Einkommen ab 70.600 Euro. Das flacht den Steuertarif zwischen 17.800 und 70.600
  etwas ab. Ermöglicht wird diese Entlastung für die große Mehrheit vor allem dadurch,
  dass ein kleiner Teil der höchsten Spitzeneinkommen über den Reichensteuersatz etwas
  mehr beitragen wird: Der Satz von 45 Prozent gilt künftig ab einem zu versteuernden
  Einkommen von 250.000 Euro, ein Satz von 47 Prozent ab 280.000 Euro. Weitere Gegenfinanzierungsbausteine
  sind der Pauschalsteuersatz bei den sogenannten Mini-Jobs – er wird von zwei auf
  fünf Prozent angehoben. Zudem soll in den Jahren 2027 und 2028 ein Teil des Gewinns
  der Kreditanstalt für Wiederraufbau in Höhe von jeweils 500 Millionen Euro dafür
  genutzt werden. Handwerkerleistungen können weiterhin steuerlich abgesetzt werden,
  allerdings sinkt der Prozentsatz dafür moderat von 20 Prozent auf 15 Prozent – abgesetzt
  werden können dann bis zu 900 EUR pro Jahr. Vorher waren es jährlich bis zu 1200
  Euro. Steuererklärungen können lästig sein. Diese Last will die Bundesregierung
  den Steuerzahlern zukünftig erleichtern und sie von unnötigem Aufwand befreien.
  Daher soll die Abgabe der Steuererklärung einfacher werden. Bis zum Herbst 2026
  wird die Bundesregierung Vorschläge der Finanzminister des Bundes und der Länder
  in ein Steuervereinfachungsgesetz fließen lassen. Das wird die Abläufe nicht nur
  vereinfachen, sondern auch beschleunigen. Eingeführt werden soll in einem ersten
  Schritt eine automatisch vorausgefüllte, digitale Steuererklärung und eine Pflicht
  der Finanzämter zur Vergabe einer Steuernummer an Unternehmen innerhalb von maximal
  vier Wochen. Zudem soll die steuerliche Identifikationsnummer künftig ohne Einschränkung
  durch Sozialversicherungsträger genutzt und verarbeitet werden können. Das beschleunigt
  auch an dieser Stelle die Prozesse, vermeidet Fehler und bekämpft den Missbrauch.
  Die für diese Nutzung erforderliche gesetzliche Änderung wird die Bundesregierung
  bis zum 1.1.2027 umsetzen. Private Unternehmen in Deutschland sind der Treiber für
  Innovationen. Daher hat die Bundesregierung Ende 2025 den Deutschlandfonds gestartet
  und rund 30 Milliarden Euro zur Verfügung gestellt, um noch mehr privates Kapital
  für zentrale Zukunftsprojekte zu mobilisieren. Der Deutschlandfonds richtet sich
  an Industrie, Mittelstand, Start-ups, junge Wachstumsunternehmen, private und kommunale
  Energieversorger sowie Unternehmen der Verteidigungs- und Rohstoffwirtschaft. Mit
  staatlichen Garantien oder Beteiligungen verbessert der Deutschlandfonds die Bedingungen
  für private Akteure, ihr Geld in Deutschland anzulegen. So sollen private Investitionen
  von etwa 130 Milliarden Euro ausgelöst werden – ein Schlüsselfaktor für mehr Wachstum
  und Wettbewerbsfähigkeit. Die Koalition hat nun beschlossen, den Deutschlandfonds
  um eine so genannte Resilienz-Dimension zu verstärken. So sollen insbesondere Investitionen
  in den Bereichen der Rohstoffbeschaffung und der Energieinfrastruktur gestärkt und
  möglichst viel privates Kapital mobilisiert werden. Der Deutschlandfonds wird damit
  zu einem Eckpfeiler unserer wirtschaftlichen Sicherheitspolitik.'
