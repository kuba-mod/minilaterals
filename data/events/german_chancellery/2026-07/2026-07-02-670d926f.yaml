title: Zukunftstechnologie aus Deutschland Weltgrößte Fabrik für Leistungshalbleiter
  in Dresden eröffnet
text: 'Der Chiphersteller Infineon hat ein neues Werk in Dresden eröffnet. Auch Bundesdigitalminister
  Karsten Wildberger nahm an der Eröffnung teil. Der deutsche Halbleiterhersteller
  Infineon hat in Dresden die weltweit größte Fabrik für intelligente Leistungshalbleiter
  eröffnet. K ü nftig werden in der Smart Power Fab hochmoderne Halbleiter für Zukunftstechnologien
  gefertigt, etwa f ü r die Stromversorgung von KI -Rechenzentren, erneuerbare Energien,
  Stromnetze und selbstfahrende Autos. Bundeskanzler Friedrich Merz betonte bei seinem
  virtuellen Grußwort im Rahmen der Eröffnungsfeier, dass die Produktionserweiterung
  deutlich mache, wie es in Deutschland vorangehen kann. Das sei nicht nur ein wichtiges
  Signal für den Wirtschaftsstandort Sachsen, sondern auch von unmittelbarer strategischer
  Bedeutung für die digitale Souveränität, wirtschaftliche Resilienz und Unabhängigkeit
  in Deutschland. Lesen Sie hier die gesamte Rede des Kanzlers anlässlich der Eröffnung
  der Smart Power Fab von Infineon in Dresden. Bundesdigitalminister Karsten Wildberger
  unterstrich bei der Eröffnung, dass die Investition ein Statement für ein starkes
  digitales Deutschland im Herzen Europas sei und ein Beleg dafür, dass Deutschland
  in allen Schlüsselbereichen führende Unternehmen vorweisen könne. Die Fabrik wurde
  vom ersten Spatenstich 2023 innerhalb von nur drei Jahren – und damit schneller
  als geplant – fertiggestellt. Sie ist mit fünf Milliarden Euro Gesamtinvestitionen
  die größte Einzelinvestition in der Unternehmensgeschichte Infineons. Etwa 920 Millionen
  Euro davon stammen aus öffentlichen Fördermitteln im Rahmen des European Chips Act
  . Deutschlands Halbleiterindustrie ist Spitzenreiter in Europa. Mit der Hightech
  Agenda Deutschland und der nationalen Mikroelektronik-Strategie stärkt die Bundesregierung
  Forschung, Fachkräfte und industrielle Fertigung in dieser Zukunftsbranche. In der
  Smart Power Fab entstehen 1.000 neue hochqualifizierte Industriearbeitsplätze. Zudem
  ist mit weiteren indirekten Arbeitsplätzen in der Region zu rechnen, etwa bei Zulieferern
  und Forschungspartnern. Infineon verdoppelt damit die Produktionskapazität in Dresden.
  Der Halbleiterhersteller führt mit der Investition eine ostdeutsche Erfolgsgeschichte
  fort: Silicon Saxony bildet seit Jahrzehnten das Zentrum im größten Mikroelektronik-
  Cluster Europas: Jeder dritte Mikro chip Europas wird dort produziert.'
