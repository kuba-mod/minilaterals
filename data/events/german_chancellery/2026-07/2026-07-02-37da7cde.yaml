date: '2026-07-02'
type: press_release
source_name: german_chancellery
title: Rede von Bundeskanzler Merz anlässlich der Eröffnung der Smart Power Fab von
  Infineon in Dresden am 2. Juli 2026
text: 'sehr geehrter Herr Ministerpräsident, lieber Michael Kretschmer, ich bedauere
  sehr, dass ich heute nicht persönlich bei Ihnen in Dresden sein kann, denn die Bedeutung
  der Eröffnung Ihrer Smart Power Fab ist groß für Sie bei Infineon, für den Standort
  Sachsen und für die industrielle Zukunft unseres ganzen Landes, ja der ganzen Europäischen
  Union. Ich denke, vielen Menschen ist nicht bewusst, wie außerordentlich groß dies
  ist, das Investitionsprojekt als strategisch relevanter Produktionsort, als Symbol
  auch für unser Land. Wie Ihre Eröffnung, die wir heute feiern, ein Meilenstein für
  den Wirtschaftsstandort Deutschland ist, so sind diese Tage politisch auch entscheidende
  Tage in Berlin, und das ist der Grund, warum ich heute nicht bei Ihnen sein kann.
  Gestern hat der Koalitionsausschuss in wirklich sehr guter Atmosphäre getagt. Karsten
  Wildberger hat gerade schon einige der Ergebnisse genannt; ich konnte die letzten
  Minuten zuhören. Die Ergebnisse habe ich eben zusammen mit den Parteivorsitzenden
  von SPD und CSU der Presse vorgestellt, und genau darum kann ich heute nicht bei
  Ihnen sein. Aber ich möchte doch wenigstens auf diesem Weg berichten, was wir hinbekommen
  haben. Wir haben einiges hinbekommen, damit unser Standort wettbewerbsfähiger wird.
  Es sind insgesamt 34 Maßnahmen, und vielleicht darf ich Ihnen drei Dinge sozusagen
  exemplarisch nennen. Erstens, wir machen ernst mit der Reform des Arbeitsmarktes.
  Ich will nicht verhehlen, dass ich mir dabei noch ein bisschen mehr hätte vorstellen
  können. Aber wir beginnen jetzt wirklich, die Fesseln zu lösen, die unser System
  auch den Betrieben auferlegt. Die wichtigste Entscheidung betrifft die sogenannte
  sachgrundlose Befristung von Beschäftigungsverhältnissen. Die war bisher für 24 Monate
  zulässig. Wir werden sie nun auf eine Maximalzeit von 48 Monaten verdoppeln, und
  innerhalb dieses Zeitraums können befristete Verträge bis zu sechsmal verlängert
  werden. Das ist ein Instrument für die Neueinstellung von Mitarbeiterinnen und Mitarbeitern
  in nicht ganz einfachen Zeiten, insbesondere dann, wenn man nicht die Gewissheit
  hat, dass man den Arbeitsplatz wirklich auf Dauer halten kann. Wir bekommen sehr
  viel Zuspruch für diese Entscheidung, zum Beispiel aus der Start-up-Szene. Aber
  ich denke, das ist auch für ein Unternehmen wie Infineon an neuen Standorten eine
  gute Chance, Mitarbeiterinnen und Mitarbeiter einzustellen und zu versuchen, dass
  es klappt, dass man die Aufträge hat, dass man sie bezahlen kann, und dann kann
  man sie anschließend auch in dauerhafte Beschäftigungsverhältnisse übernehmen. Zweiter
  Punkt: Wir befinden uns nach Corona in einer schwierigen Lage, was den Krankenstand
  in den Unternehmen betrifft. Sie alle kennen die Zahlen. Wir schaffen jetzt die
  telefonische Krankschreibung ab und führen die verpflichtende Vorlage einer Arbeitsunfähigkeitsbescheinigung
  ab dem ersten Krankheitstag ein. Dafür gibt es heute direkt schon Kritik. Ja, das
  ist eine harte Entscheidung, aber wir können uns den Wettbewerbsrückstand durch
  den hohen Krankenstand im Vergleich zu anderen Ländern nicht länger leisten. Ich
  will es erläutern. Das ist die gesetzliche Regelung, die wir einführen. Die Betriebe
  können einzelvertraglich mit ihren Beschäftigten, mit Betriebsvereinbarungen mit
  der ganzen Belegschaft, aber auch in einem Tarifgebiet mit den Tarifvertragsparteien
  davon abweichen. Die gesetzliche Regelung ist hart. Aber wenn das Vertrauen zwischen
  den Beschäftigten und den Unternehmen besteht, es anders zu machen, dann können
  Sie es anders machen. Aber die gesetzliche Regelung ist jetzt sehr klar und sehr
  eindeutig. Drittens, zum Thema Bürokratierückbau: Der so wichtige Datenschutz, und
  das kennen Sie aus Ihrem Unternehmen, ist selbst zu einem Bürokratiemonster geworden.
  Wir machen ihn jetzt sehr viel schlanker. Wir vereinfachen die Regeln. Wir vereinfachen
  den Datenschutz, und wir bieten den Ländern an, ihre Landesdatenschutzbehörden aufzulösen,
  alles dem Bund zu übertragen. Wir werden in Zukunft vereinfachten Datenschutz aus
  einer Hand im Bund machen. Wir lassen im Übrigen zu, dass zwischen allen staatlichen
  Stellen in Zukunft die Daten ausgetauscht werden können, zwischen Sozialbehörden,
  Steuerbehörden, Ausländerbehörden, Einwohnermeldeämtern. Alle Daten können jetzt
  ausgetauscht werden, insbesondere, um sozialen Missbrauch zu verhindern. Das ist
  ein großer Schritt. Schließlich werden wir die Berichtspflichten aufheben. Wenn
  ein Ministerium in Zukunft Berichtspflichten erhalten will, dann muss es das neu
  begründen, also sozusagen um die Fortführung der alten Berichtspflichten kämpfen.
  Aber wir werden grundsätzlich alle Berichtspflichten aufheben. Wir arbeiten hier
  sozusagen nach dem Prinzip der Beweislastumkehr. Das ist im Vergleich zu bisherigen
  Vereinfachungsstrategien ein wirklicher Befreiungsschlag. Was ich Ihnen hier sage,
  sind nur drei Maßnahmen von 34. Hinzu kommen die Reform der gesetzlichen Krankenversicherung,
  die wir nächste Woche im Bundestag und im Bundesrat beschließen werden, und die
  Rentenreform, die wir von der Alterssicherungskommission vorgeschlagen bekommen
  haben, hinter die sich der Koalitionsausschuss gestern übrigens auch gestellt hat.
  Sie wird dann ‑ so haben wir es uns jedenfalls vorgenommen ‑ bis zum Ende des Jahres
  2026 umgesetzt. Ich kann also aus voller Überzeugung sagen: Es geht wirklich voran.
  Wir arbeiten. Der Wille ist groß, die notwendigen Strukturreformen jetzt anzugehen,
  um unser Land, unsere Wirtschaft, unsere Industrie fit zu machen für die Zukunft.
  Meine Damen und Herren, vor diesem Hintergrund ist die Eröffnung dieser, Ihrer Smart
  Power Fab, der weltweit größten Fabrik für Leistungshalbleiter, jetzt beispielhaft
  für diese Zukunft. Karsten Wildberger hat es gerade angesprochen. Das Tempo, in
  dem Sie dieses Projekt realisiert haben, innerhalb von etwa drei Jahren von der
  Baugenehmigung bis zur Eröffnung, ist für ein Projekt dieser Größenordnung und von
  solch hoher Komplexität enorm. Sie haben gezeigt, wie es in unserem Land vorangehen
  kann. Das wird jetzt der Regelfall. Das wird jetzt der Normalfall. Übrigens haben
  wir schon in der vergangenen Woche im Deutschen Bundestag das Infrastruktur-Zukunftsgesetz
  verabschiedet, dass jetzt das Bauen von Autobahnen, von Straßen, von Bahnverbindungen,
  von Wasserstraßen, von Flughäfen und von Bahnhöfen unter die Überschrift eines überragenden
  öffentlichen Interesses stellt. Alle anderen Interessen müssen dahinter ein bisschen
  zurückstecken. Das heißt, es wird in Zukunft wirklich deutlich schneller gehen.
  Wir zeigen, dass Anpacken möglich ist. Politik und Wirtschaft können Hand in Hand
  jetzt wirklich die Weichen für unsere Zukunft setzen. Deswegen ganz herzlichen Glückwunsch
  heute an Sie. Aber das, was Sie jetzt geschafft haben, in kurzer Zeit wirklich etwas
  Neues aufzubauen, das wollen wir in Zukunft in ganz Deutschland möglich machen.
  Sie nennen es Silicon Saxony. Sie sind europaweit schon heute der führende Standort
  für Halbleiterfertigung. Sie wissen es: Jeder dritte Chip wird in Ihrer Region produziert. ‑
  Mit dieser zusätzlichen Investition, rund fünf Milliarden Euro, wird dieses Ökosystem
  weiterhin gestärkt. Es entstehen, wenn ich es richtig gelesen habe, über 1000 weitere
  Arbeitsplätze für hochqualifizierte Mitarbeiterinnen und Mitarbeiter. Das ist nicht
  nur ein wichtiges Signal für den Wirtschaftsstandort Sachsen. Es hat unmittelbare
  strategische Bedeutung für unsere digitale Souveränität, für unsere wirtschaftliche
  Resilienz und Unabhängigkeit. Dafür meinen wirklich herzlichen Dank im Namen unseres
  ganzen Landes, der Bundesrepublik Deutschland! Schließlich: Es wird viel davon gesprochen,
  dass künstliche Intelligenz Wertschöpfungsprozesse und Industrien revolutionieren
  wird, transformieren wird, neu erschaffen wird. Ja, dabei sind wir mittendrin. Allein
  die Erwartung all dieser Veränderungen führt dazu, dass die globale Wirtschaft sich
  schon jetzt in einem radikalen Transformationsprozess befindet. Die Investitionen
  in Rechenzentren steigern sich jährlich von Rekord zu Rekord. Denn heute wird das
  Grundgerüst für die Industrien der Zukunft gelegt. Die Leistungshalbleiter, die
  bei Ihnen produziert werden, meine Damen und Herren, sind dabei wichtige Bausteine.
  Sie sind es auch für Elektromobilität und erneuerbare Energie. Sie sorgen also dafür,
  dass Deutschland und Europa an den fundamentalen wirtschaftlichen Transformationsprozessen
  unserer Zeit und an den Wertschöpfungsketten der Zukunft gewinnend teilhaben. In
  diesem Sinne danke an alle Beteiligten bei Infineon, in der Wissenschaft, in der
  Wirtschaft und in der Politik, die dieses Projekt möglich gemacht haben. Ich wünsche
  der neuen Fabrik, aber auch ganz konkret dem Unternehmen und den Beschäftigten in
  diesem Unternehmen ganz einfach viel Erfolg. In diesem Sinne, wenn auch nur digital,
  ganz herzliche Grüße aus Berlin, viel Erfolg, eine schöne Feier heute, und alles,
  alles Gute für die Zukunft, unsere gemeinsame Zukunft in Deutschland!'
