date: '2026-07-03'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 3. Juli 2026
text: 'Sprecherinnen und Sprecher •    Staatssekretär Kornelius •    Haberlandt (BMG)
  •    Prühl (BMAS) •    Bowinkelmann (BMI) •    Druckenthaner (BMDS) •    Sachter
  (BMF) •    Hinterseher (AA) •    Lorenzat (BMWE) •    Dr. Noack (BMVg) •    Büddicker
  (BMV) •    Dr. Valdés Cifuentes (BMJV) (Vorsitzende Buschow eröffnet die Pressekonferenz
  und begrüßt StS Kornelius sowie die Sprecherinnen und Sprecher der Ministerien.)
  (zu den Terminen des Bundeskanzlers ) Am 6. Juli wird die Kabinettssitzung stattfinden.
  Sie wird also in der kommenden Woche bereits am Montag stattfinden, unter Leitung
  des Bundeskanzlers um 14 Uhr. Grund dafür sind die Termine am Dienstag und Mittwoch.
  Am 7. und 8. Juli wird Bundeskanzler Merz am NATO-Gipfel in Ankara teilnehmen. Dort
  werden das Hauptthema die Fortschritte bei der Umsetzung der Beschlüsse des NATO-Gipfels
  von Den Haag sein. Es geht also um die Erhöhung der Verteidigungsausgaben und eine
  stärkere Verantwortungsübernahme der europäischen Alliierten für die gemeinsame
  transatlantische Sicherheit. Es wird außerdem um den Ausbau der Kapazitäten der
  Verteidigungsindustrie, eine engere Kooperation bei Rüstungsprojekten und schließlich
  natürlich um die militärische Unterstützung der Ukraine zur Verteidigung vor den
  russischen Angriffen gehen. Am kommenden Montag wird im Vorgriff auf den NATO-Gipfel
  hier in der Bundespressekonferenz ein Briefing stattfinden. Herr Kornelius, eine
  organisatorische Frage zum NATO-Thema: Können Sie uns bitte auch die Uhrzeit des
  Briefings sagen? Danke. - Jetzt die inhaltliche Frage: Die Bundesregierung hat ja
  angekündigt, und der Kanzler hat es am Mittwoch wiederholt, dass man noch einmal
  ein Finanzpaket für die Ukraine zusammenschnüren will. Der Außenminister hat sich
  dazu vorher auch geäußert. Eine Größenordnung von 30 bis 40 Milliarden Euro an bilateralen
  Hilfen war da angedacht. Wie zuversichtlich sind Sie, dass Sie diese Größenordnung
  an neuen Zusagen wirklich erreichen? Die Vorbereitungen auf den Gipfel und auch
  die Ausgestaltung dieses Themas der Lastenübernahme und der Lastenverteilung laufen
  noch. Ich möchte jetzt diesem Thema nichts vorwegnehmen, bin aber zuversichtlich,
  dass die Verbündeten, die bereits jetzt schon einen starken Beitrag zur Unterstützung
  der Ukraine leisten, diese Dynamik fortsetzen und verstetigen werden. Geht die Pflegereform
  am Montag ins Kabinett , oder was ist dabei genau der Fahrplan? Ich kann Ihnen den
  Kabinettsfahrplan nicht final nennen, weil er prinzipiell immer erst am Vorabend
  final feststeht. Deswegen würde ich mich da jetzt ungern festlegen. Aber wir haben
  ja gesagt, dass die Pflegereform noch vor der Sommerpause eingebracht werden soll.
  Allerdings haben wir bis zur Sommerpause auch noch einige Kabinettssitzungen. Wir
  wollen ja auch nicht, dass Ihnen die Themen ausgehen. Bei den Krankschreibungen
  herrscht jetzt ein bisschen Verwirrung, ab welchem Tag man zum Arzt gehen muss,
  um sich eine Krankschreibung zu besorgen, und wie das genau aussieht. Können Sie
  aufklären, was da genau die Idee der Koalition ist? In der Verabredung steht, dass
  es eine verpflichtende Vorlage der Arbeitsunfähigkeitsbescheinigung ab dem ersten
  Tag der Erkrankung gibt. Das heißt nicht, dass man am ersten Tag zum Arzt gehen
  sollte. Vielleicht sollte man das, wenn man krank ist, aber es besteht natürlich
  keine Pflicht. Das hat der Bundeskanzler gestern Abend auch in der Fernsehsendung
  gesagt. Zum Verständnis: Wie bekommt man dann die Arbeitsunfähigkeitsbescheinigung,
  die man ja schon am ersten Tag vorlegen muss? Die muss man ab dem ersten Tag vorlegen.
  Es war auch früher, vor der Pandemie, so, dass man dann die Arbeitsunfähigkeitsbescheinigung
  vorlegen musste. Ob man sie nach drei oder vier Tagen vorgelegt hat, war meiner
  Erinnerung nach nicht wichtig. Aber vielleicht kann das Gesundheitsministerium noch
  einmal die genauen zeitlichen Abläufe der bisherigen Regelungen klarstellen. Aber
  es heißt nicht, dass sie am ersten Tag vorgelegt werden muss. Die Regelung dieses
  Aspekts liegt in der Zuständigkeit des BMAS, wenn es um die Ausstellung von Arbeitsunfähigkeitsbescheinigungen
  geht. Vielleicht können die Kolleginnen und Kollegen dazu an dieser Stelle mehr
  sagen. Das ist am Ende die Ordentlichkeit. Zugleich können wir ergänzen, dass es
  auch weiterhin die Möglichkeit gibt, sich über eine Videosprechstunde eine Arbeitsunfähigkeitsbescheinigung
  ausstellen zu lassen. Sie hat heute bereits Vorrang vor der telefonischen Krankschreibung
  und soll auch gestärkt werden. Es ist ohnehin unser Anliegen, im Gesundheitswesen
  mehr digitale Angebote in die Versorgung und damit auch in die Arztpraxen zu bringen.
  Ich möchte noch einmal betonen, dass die Ausgestaltung dieser Regelung natürlich
  erst bevorsteht. Das heißt, wir werden hier jetzt keinerlei Detailausformulierungen
  bieten können, die dem gesetzgeberischen Verfahren vorbehalten sind. Deswegen möchte
  ich darauf verweisen, dass das Ganze jetzt auf der Basis der Koalition, also der
  Parteichefs, beschlossen wurde. Das ist in diesem Augenblick kein Regierungshandeln.
  Deswegen sind wir hier, was alle Beschlüsse des Koalitionsausschusses angeht, begrenzt
  aussagefähig. Direkt anschließend: Herr Haberlandt, können Sie uns aus der Sicht
  des Gesundheitsministeriums sagen, was Ihre Erklärung für diesen unterschiedlichen
  Krankenstand in den europäischen Ländern ist? Heute Morgen ‑ ich glaube, Herr Frei
  hat es gesagt ‑ ist wieder gesagt worden, dass Frankreich nur die Hälfte der Krankentage
  wie Deutschland habe. Gibt es bei Ihnen eine Erklärung dafür? Hängt das mit dem
  Alter oder mit dem Krankheitszustand der Gesellschaft zusammen? Womit? Dazu kann
  ich hier ad hoc nichts sagen. Aber ich hake gerne bei uns im Haus noch einmal nach
  und will das dann nachreichen. Dieses Zahlenwerk und den Vergleich auf europäischer
  Ebene habe ich gerade nicht zur Hand. Das wäre sehr gut, weil es eigentlich die
  Basis der Debatte ist, dass man erst einmal von den Zahlen ausgehend zu dieser Entscheidung
  kommt, dass man etwas ändern muss. Von daher müsste es eigentlich bei Ihnen irgendeine
  Erklärung geben. Herr Kornelius oder auch das Bundesgesundheitsministerium: Beruht
  die Entscheidung zur Abschaffung der telefonischen Krankschreibung auf konkreten
  Zahlen? Können Sie beispielsweise auch sagen, wie viele Bundesbürger letztes Jahr
  tatsächlich auf dieses Mittel der telefonischen Krankschreibung zurückgegriffen
  haben? Dazu gibt es Statistiken, die übrigens zeigen, dass nicht sehr viele darauf
  zurückgegriffen haben. Ich kann Ihnen die exakten Zahlen nicht liefern. Vielleicht
  ist das Gesundheitsministerium dazu in der Lage. Wie ich eben schon sagte, würde
  ich das genaue Zahlenwerk auch nachreichen. Aber exakt: Die Zahlen sind nicht sonderlich
  hoch. Um es vielleicht noch einmal kurz zu ergänzen: Hier geht es auch um ein Instrument,
  das während der Pandemie gegriffen hat. Dieses Instrument schafft man jetzt damit
  ab. Aber gleichzeitig, wie ich auch schon gesagt habe, gibt es die Möglichkeit der
  Videosprechstunde. Dann stellt sich natürlich die Frage, wieso man es, wenn die
  Zahlen so gering sind, dann überhaupt als Instrument nutzt. Aber Kritiker monieren
  vor allem die ansteigende Bürokratie, die Gefahr, sich anzustecken, und dass das
  eher zu längeren Krankschreibungen führt. Was entgegnet der Kanzler diesen Kritikern?
  Es gibt eine Fülle von Argumenten im großen Bereich des Gesundheitswesens, die für
  die eine oder andere Variante sprechen. Die Regierungskoalition hat sich jetzt für
  diesen Weg entschieden. Das ist der Weg, der auch schon vor der Pandemie in diesem
  Land galt. Die telefonische Krankschreibung war ein besonderes Instrument, um während
  der Pandemie Infektionen einzuschränken, die ja in dieser Phase sehr gefährlich
  waren. Der Weg zurück auf den Status quo ante bedeutet nicht, dass damit eine Verschlechterung
  der Situation einhergehen muss. An das Gesundheitsministerium: Wenn Sie den Weg
  der Videokonferenz so betonen, ist es dann vorstellbar, dass man gar nicht zum Arzt
  gehen muss, um die Krankschreibung abzuholen, sondern dass man die Krankschreibung
  auch digital vom Arzt zugeschickt bekommt? Die andere Frage ist: Wenn man nicht
  schon am ersten Tag zum Arzt gehen muss, aber die Krankschreibung vom ersten Tag
  an braucht, wie lange rückwirkend kann das dann funktionieren? Kann man heute „Lieber
  Arzt, ich brauche eine Krankschreibung für die vergangene Woche“ sagen, oder gibt
  es dafür feste Fristen? Nach meinem Stand gilt diese Frist, glaube ich, einen Tag
  rückwirkend. Aber ich denke, das BMAS ist informierter als ich, wie die genaue Regelung
  gerade aussieht. Zu Ihrer Detailfrage, wie es dann weitergeht, hat der Regierungssprecher
  ja auch schon gesagt, dass die Regelungsinhalte jetzt erarbeitet werden. Das war
  eine Einigung der Koalitionäre, der Chefs. Jetzt wird das daraufhin erarbeitet,
  und dann können wir auch zu den Details weitere Dinge sagen. Kann man, wenn man
  schon eine Videokonferenz mit einem Arzt macht, dann auch die Krankschreibung online
  von ihm nach Hause geschickt bekomme? Gibt es diese Möglichkeit? Wie gesagt, das
  sind Fragen, auf die die Antworten jetzt erarbeitet werden. Dazu werden wir uns
  dann gegebenenfalls äußern. Ich habe noch eine Nachfrage zu der Verabschiedung derGesundheitsreform
  , die ja nächste Woche ansteht. Bewirken diese Beschlüsse von gestern, auch wenn
  sie von den Parteivorsitzenden stammten, noch einmal Änderungen im Paket der Gesundheitsreform,
  das nächste Woche auf der Agenda steht? Dabei geht es zum Beispiel um die Infarktprophylaxe.
  Auch diese Frage der Krankschreibung könnte theoretisch in dem Paket, das ja sehr
  umfangreich ist, mit abgehandelt werden. Ist das geplant, Herr Kornelius, Herr Haberlandt?
  Ich glaube, die gesetzgeberische Umsetzung müssen wir jetzt den Fachleuten überlassen.
  Das wird jetzt natürlich sehr geprüft, überhaupt die Sequenz der Umsetzung der Koalitionsbeschlüsse.
  Wir haben es jetzt mit einer ganzen Fülle von Beschlüssen ‑ auch mit den Beschlüssen
  der Alterssicherungskommission ‑ zu tun. Dem können wir jetzt nicht vorweggreifen.
  Aber könnte es sein, dass es noch Änderungen gibt? Wenn ich das jetzt potenziell
  einschließen würde, dann ergäbe das ein falsches Bild. Ich kann es fachlich schlicht
  nicht beurteilen. In der geteilten deutschen Wirklichkeit aus privat und gesetzlich
  Versicherten, Beamten, Angestellten und Arbeitern muss man einmal sicherheitshalber
  nachfragen: Gelten alle diese Regelungen für Krankenschreibungen eigentlich auch
  uneingeschränkt für Beamte und Privatversicherte? Da würde ich für den Status quo
  an die Fachhäuser geben. Ich kann insoweit helfen, als die Frage, ab wann eine Krankschreibung
  benötigt wird, im Entgeltfortzahlungsgesetz geregelt ist. Das ist ein Gesetz, das
  in der Federführung des Arbeitsministeriums liegt. Darin steht momentan ‑ ich meine,
  es ist § 5 ‑, dass es nach dem dritten Tag gelten müsse. Es liegt aber natürlich
  auch in der Hoheit der Tarifparteien oder der Betriebe, das anders zu gestalten.
  Ob die Anwendung auch für Beamte existiert, ist, vermute ich, wiederum im Beamtenrecht
  geregelt. Das ist nicht Sache des BMAS. Das müsste ich im Detail leider nachreichen.
  Das würde ich gerne nachgereicht bekommen. Das Informationsfreiheitsgesetz war gestern
  der Punkt 32 auf Ihrer Liste. Dazu gab es ja viel Kritik, unter anderem vom DJV.
  Die Rede war von einem Angriff auf die Pressefreiheit. Können Sie noch einmal erklären,
  was die geplanten Einschränkungen mit Staatsmodernisierung zu tun haben? Denn unter
  dieser Überschrift wurde das ja präsentiert. Der Koalitionsausschusstext gibt Ihnen
  Aufschluss darüber, welche Zielsetzungen diese Reform haben wird. Es handelt sich
  natürlich nicht um eine Einschränkung der Pressefreiheit. Mir gibt das, ehrlich
  gesagt, keine richtige Auskunft. Können Sie vielleicht noch einmal erklären, was
  der Nutzen für die Bevölkerung ist, wenn Sie diese Änderungen vornehmen? Das hat
  auch einen sicherheitspolitischen Hintergrund. Das sind auch Nachjustierungen, die
  wegen der veränderten Sicherheitslage notwendig sind. Wir müssen auch Mitarbeitende
  vor Anfeindungen und Drohungen schützen. Das IFG hat auch dazu geführt, dass Staatsbedienstete
  in einer Breite in die Öffentlichkeit gezogen werden, die für diese Personen gefährdend
  ist. Wir haben hier eine komplexe Bedrohungslage. Wir sehen einen Schutzbedarf vor
  allem im Bereich der kritischen Infrastruktur, der Spionageabwehr und der Terrorismusbekämpfung.
  Dem allem soll die Novelle des Informationsfreiheitsgesetzes Rechnung tragen. Können
  Sie vielleicht noch einmal erläutern, warum das jetzt in solch einem großen Reformpaket
  mit drinsteckt? Dadurch steht ja auch ein bisschen der Verdacht im Raum, dass das
  ein bisschen versteckt wurde. Das ist ja ein Thema, das durchaus sehr viel Transparenz
  verdient hätte, oder wie sehen Sie das? Der Verdacht ist unbegründet. Die Fortentwicklung
  sieht ja auch vor, dass für alle, die ein Auskunftsrecht haben, das Auskunftsrecht
  erhalten bleibt. Warum genau macht man das jetzt in diesem Reformpaket? Gibt es
  einen Grund für den Zeitpunkt? Es gibt sehr viele Staatsmodernisierungsaspekte,
  die da sind. Das ist natürlich auch sicherheitsrelevant. Es sind einige andere sicherheitsrelevante
  Aspekte da. Warum also nicht? Ich habe eine Frage, wahrscheinlich an das Digitalministerium.
  Es geht um die Genehmigungsfiktion . Es gibt Berichte darüber, dass diese Genehmigungsfiktion,
  nach der eine Behörde innerhalb eines gewissen Zeitraums eine Entscheidung treffen
  muss ‑ sonst gilt ein Antrag als genehmigt ‑, die paradoxe Folge hat, dass Behörden
  jetzt zunehmend Ablehnungen aussprechen, damit sie diese Frist nicht reißen. Gestern
  ist im Koalitionsausschuss die sehr weitreichende Entscheidung vorgestellt worden,
  dass man jetzt eine Viermonatsfrist hat. Gibt es innerhalb der Bundesregierung nicht
  die Befürchtung, dass nun statt des erhofften Effekts, dass Anträge schneller bewilligt
  werden, eine Welle von Ablehnungen auf uns zurollt? Wie will man das verhindern?
  Der konkrete Punkt, den Sie ansprechen, betrifft, glaube ich, Änderungen im Verwaltungsverfahrensrecht,
  das beim Bundesinnenministerium liegt. Grundsätzlich ist es auch ein Ziel, das in
  der Föderalen Modernisierungsagenda ausgewiesen ist, dass nach einer gewissen Zeit
  ‑ in der Föderalen Modernisierungsagenda sind drei Monate genannt ‑ Anträge automatisch
  als genehmigt gelten, wenn Behörden nicht tätig werden. Das gibt Rechtssicherheit
  und Planungssicherheit, gerade bei Dingen, die turnusmäßig wiederkehren, also wenn
  man zum Beispiel Außengastronomie anmelden muss oder ein Gerüst aufbauen möchte.
  Das wird von den Ländern auch umgesetzt. Aus unserer Sicht ist das ein wichtiger
  Baustein, um Verwaltungen zu entlasten und um Unternehmen und Antragstellern Planungssicherheit
  zu geben. Ich kann insofern nur ergänzen, dass bei diesem Vorhaben auch die Länder
  beteiligt und entsprechend die verwaltungsgesetzlichen Regelungen auf Landesebene
  möglichst geprüft und entsprechend überarbeitet werden. Der Prozess ist entsprechend
  langfristig angelegt, laut dem gestrigen Programm mit einem Beschlussziel bis Ende
  kommenden Jahres. Insofern sind solche Bedenken natürlich zu berücksichtigen. Es
  bleibt auch genügend Zeit, diese Bedenken zu berücksichtigen, sofern es sie denn
  gibt. Gibt es bei Ihnen ähnliche Einschätzungen, also dass die Gefahr droht, dass
  es im Alltag genau in die andere Richtung funktioniert? Ich kann solch eine Einschätzung
  in keiner Weise bestätigen. Das würde ja diesem Beschluss von gestern widersprechen.
  Insofern teile ich das nicht. Ich habe eine Frage, vermutlich an das BMI: Die Obergrenze
  der Westbalkanregelung soll um die Hälfte reduziert werden - von jährlich 50 000
  auf 25 000 Personen, die pro Jahr kommen können. Ich hätte dafür gerne eine genaue
  Erklärung, bitte. Falls wir zuständig sind, müsste ich das nachreichen. Die Regelung
  betrifft ja den Arbeitsmarktzugang und beinhaltet das Ziel, diesen abzupuffern.
  Insofern kann ich Ihnen jetzt zu der konkreten Ausgestaltung nicht mehr sagen, als
  auch in dem Beschluss von gestern zu lesen ist. Bewirkt man damit in Zeiten des
  Fachkräftemangels nicht das Gegenteil? Vielleicht können Sie noch etwas dazu ausführen.
  Was das Ziel ist, haben Sie ja jetzt angedeutet. Das Ziel bleibt unverändert und
  ist auch schon im Koalitionsvertrag so festgelegt, also genau diese Balance zu finden,
  um den von Ihnen angesprochenen Fachkräftemangel zu decken, aber natürlich auch
  die Arbeitslosigkeit hier zu berücksichtigen. Deswegen wurde dieser Puffer eingebaut.
  Das ist sozusagen eine Feinjustierung, die jetzt vorgenommen werden soll. Herr Kornelius,
  zu dem Thema Minijobs gab es gestern in der Pressekonferenz die Interpretation des
  CSU-Vorsitzenden, dass er sich eigentlich bestätigt fühlt, dass er Änderungen gegenüber
  dem Rentenpaket haben möchte. Wurde zwischen den Parteivorsitzenden vielleicht im
  Nachgang der Pressekonferenz Klarheit geschaffen, was man nun eigentlich mit den
  Minijobs machen wird? Bleibt es bei der drastischen Einschränkung, wie es im Rentenpaket
  vorgesehen ist, oder interpretiert man das jetzt so, wie Herr Söder das getan hat,
  dass diese Änderungswünsche bei den Minijobs eigentlich weitgehend wieder kassiert
  werden? Die Ausgestaltung der Minijobregel aus dem Rentenpaket wird jetzt im Detail
  über die Sommerpause hinweg und bis in den Herbst hinein vorgenommen. Dabei wird
  auch das Thema der Minijobs eine Feinjustierung erfahren. Dem kann und möchte ich
  jetzt nicht vorweggreifen. Ich sehe diese Differenzen nicht unbedingt. Ich glaube,
  das Ziel der Koalition insgesamt ist, dass man der den Minijobs innewohnenden Gefahr
  einer Altersarmut durch die Nichtabsicherung im Rentensystem vorbeugt, also dass
  man die Menschen, die nur durch Minijobs abgesichert sind, nicht der Gefahr der
  Altersarmut aussetzt, und dass man gleichzeitig für das arbeitsmarktpolitische Instrument
  der Minijobs für die Bereiche, die notwendig sind, und vor allem für bestimmte Gruppen,
  die damit besonders angesprochen sind, wie Schüler und Studierende, eine gute Lösung
  findet, um sie weiter im Markt integriert zu halten. Stichwort Punkt 17, Außenwirtschaft
  und Handelsschutz : Angekündigt wird ein robuster Schutz gegen unfairen Wettbewerb.
  Es geht hierbei offensichtlich um die Volksrepublik China. Der Bundesfinanzminister
  hat gestern wortwörtlich gesagt: Ich fordere seit Längerem einen robusten Umgang
  mit China. - Das werde nun folgen. Dabei geht es ja viel um die Europäische Union.
  Welche Initiativen der Bundesregierung in der EU werden wir in Bezug auf den robusteren
  Umgang mit China erleben? Die Debatte in der Europäischen Union ist eine allgemeine
  Debatte über Marktungleichheiten und Marktzugänge. Es geht um Gewichtsverschiebungen,
  die wir global betrachten. Es handelt sich nicht um spezielle Länder. Handelspolitik
  ist natürlich europäische Politik. Deswegen wird jetzt auf dem europäischen Level
  mit den zuständigen Einheiten der Kommissare, aber auch hier mit den Fachministerien
  eine Lösung gesucht. Das geschieht unter Hochdruck, weil die Verschiebungen, die
  wir in diesen Fragen sehen, tatsächlich auch den deutschen Wachstumspfad und den
  Arbeitsmarkt sehr stark unter Druck setzen. Frau Sachter, wenn der Bundesfinanzminister
  gestern China ausdrücklich genannt hat, war das ein Versprecher, oder meinte er
  tatsächlich die Volksrepublik China? Der Regierungssprecher hat das gerade gut dargelegt.
  Ich habe dem nichts hinzuzufügen. Im Übrigen stehen die Worte von Lars Klingbeil
  für sich. Zur Entwicklung in Syrien: Wie reagiert die Bundesregierung auf einen
  israelischen Angriff in Syrien, Bombenanschläge in Damaskus und die Absicht der
  Netanjahu-Regierung, Palästinenser-Gefangene hinzurichten ? Warum schweigt die Bundesregierung
  zu diesen Ereignissen? Herr Kollege, ich bin mir nicht ganz sicher, ob ich die Frage
  richtig verstanden habe. Wenn es um den gestrigen Terroranschlag in Damaskus mit
  neun Toten geht, dann würde ich gerne sagen, dass wir mit Bestürzung von diesem
  schrecklichen Anschlag in Damaskus mit zahlreichen Toten und Verletzten erfahren
  haben. Unsere Gedanken und unser Mitgefühl sind bei den Opfern und bei deren Angehörigen.
  Deutschland ist ‑ das wissen Sie ‑ mit Syrien in besonderer Art und Weise verbunden
  und steht natürlich auch in diesen schweren Zeiten an der Seite der Syrerinnen und
  Syrer. Ansonsten ist die Sicherheitslage in Syrien, trotz Verbesserungen in den
  vergangenen Monaten, natürlich weiterhin volatil. In bestimmten Landesteilen hat
  die Regierung in Damaskus weiterhin keine vollständige Kontrolle. Wir sehen aber
  zugleich auch Fortschritte bei den Bemühungen, alle bewaffneten Gruppen im Land
  unter die Kontrolle der Regierung zu stellen und daneben die staatlichen Sicherheitskräfte
  aufzubauen und sie so weit auszubauen und zu professionalisieren, dass sie ihrer
  Rolle in einem syrischen Staat gerecht werden können. An das Digitalministerium:
  Die diesjährige Ecosia-Untersuchung kommt zu dem Ergebnis, dass praktisch alle Bundesministerien
  und -behörden ausschließlich US-Browser nutzen und nur etwa 16 Prozent eine europäische
  Suchmaschine als Standard gesetzt haben. Diese komplette US-Dominanz bei Browsern
  und Servern will die Bundesregierung erklärtermaßen ändern. Welche konkreten Schritte
  gibt es bisher und in welchem Zeitrahmen, um diese Abhängigkeit zu verringern? Ganz
  allgemein kann ich Ihnen dazu sagen, dass die IT-Architekturrichtlinie des Bundes
  keine Vorgaben hinsichtlich des zu verwendenden Browsers macht. Es ist den einzelnen
  Häusern freigestellt, welche Browser sie einsetzen. Wir testen aber im Digitalministerium
  auch offene Browser, auch offene Arbeitsplätze. An 200 Arbeitsplätzen testen wir
  aktuell zum Beispiel openDesk. Das ist ein Prozess, den wir uns anschauen. Es ist
  erklärtes Ziel dieser Bundesregierung, die digitale Souveränität zu stärken. Das
  tun wir, indem wir auch offene Lösungen testen. Zum Stichwort der digitalen Souveränität:
  Nach Angaben der Bundesregierung hat der Bund allein im letzten Jahr fast eine halbe
  Milliarde Euro für Microsoft-Lizenzen ausgegeben. Das ist im Verhältnis ein massiver
  Anstieg zu den Vorjahren. 2023 lag man beispielsweise noch bei lediglich 274 Millionen
  Euro. Wie erklärt die Bundesregierung diesen massiven Anstieg bei gleichzeitiger
  Verkündung von zunehmender digitaler Souveränität? Wir haben laufende Verträge mit
  Microsoft, die durch die Vorgängerregierung im letzten Jahr geschlossen wurden.
  Der Rahmenvertrag wurde auf vier Jahre geschlossen und ausgelegt. Ich habe schon
  gesagt: Wir testen parallel offene Office-Suiten. Das ist der eine Ansatz. Der Preisanstieg
  ‑ dazu muss ich noch einmal nachschauen ‑ hat natürlich auch etwas mit allgemeinen
