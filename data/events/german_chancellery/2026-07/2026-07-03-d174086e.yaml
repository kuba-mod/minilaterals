date: '2026-07-03'
type: press_release
source_name: german_chancellery
title: Pressekonferenz von Bundeskanzler Merz und den B3-Staats- und Regierungschefs
  „Die Sicherheit des Baltikums ist auch die Sicherheit Deutschlands“
text: 'Deutschland und die baltischen Staaten seien „enge Partner in der Europäischen
  Union und in der Europapolitik“, unterstrich der Kanzler. „Die Sicherheit des Baltikums
  ist auch die Sicherheit Deutschlands“, sagte Bundeskanzler Friedrich Merz beim Empfang
  von Estlands Premierminister Kristen Michal , Lettlands Staatspräsident Edgars Rinkēvičs
  und Litauens Staatspräsident Gitanas Nausėda in Berlin. Vor dem Hintergrund des
  bevorstehenden NATO -Gipfels in Ankara sei eine enge Abstimmung der Alliierten wichtiger
  denn je. An der Klarsicht und Entschlossenheit der baltischen Partner nehme sich
  die Bundesregierung ein Vorbild. Meine Damen und Herren, ich freue mich sehr, dass
  ich zum Ende der Woche drei Nachbarn in der Europäischen Union und in der NATO aus
  dem östlichen Teil Europas bei uns begrüßen darf, Präsident Gitanas Nausėda , Edgars
  Rinkēvičs und Kristen Michal . Wir haben heute verabredet, auch noch einmal über
  den NATO -Gipfel in der nächsten Woche zu sprechen, der ja am Dienstag und Mittwoch
  in Ankara stattfinden wird. Mir ist wichtig, dass wir auf der europäischen Seite
  so viel wie möglich miteinander koordiniert sind. Wir wollen gemeinsam mit unseren
  Verbündeten in Europa gut vorbereitet in diesen Gipfel gehen. Wir haben vorgestern
  deshalb im Bundeskabinett in der jährlich stattfindenden Sitzung im Bundesverteidigungsministerium
  über den NATO -Gipfel gesprochen und dies mit Generalsekretär Mark Rutte zusammen
  getan. Wir haben vor gut einer Woche hier im Bundeskanzleramt im sogenannten E5-Format,
  also mit Italien, Frankreich, Großbritannien und Polen, zusammengesessen, um uns
  abzusprechen. Ich befinde mich auch im engen Austausch mit Präsident Trump und mit
  Präsident Erdoğan , der ja in diesem Jahr der Gastgeber sein wird. Die Abstimmung
  mit Estland, Lettland und Litauen liegt uns am Herzen, und zwar weit über den NATO
  -Gipfel hinaus. Es freut mich deshalb, dass wir in diesem Kreis heute schon zum
  zweiten Mal zusammentreffen: das erste Mal am Rande der Münchner Sicherheitskonferenz
  und heute hier, in Berlin. Liebe Kollegen, wir Deutsche lernen auch von euch. Wir
  wollen das auch sehr deutlich sagen. Ihr habt erstens sehr viel früher als wir verstanden,
  dass wir für unsere Freiheit, unsere Sicherheit und unseren Wohlstand etwas tun
  müssen. Diese Bedrohung ist nicht abstrakt, sondern sie ist sehr konkret. An der
  Ostflanke der NATO , über die wir hier sprechen, ist sie mit Händen zu greifen.
  Russland verletzt ständig den Luftraum der NATO -Staaten. Russland führt hybride
  Angriffe im Internet durch. Russland zerstört Unterwasserkabel in der Ostsee. Moskau
  testet, wie geschlossen und entschlossen die NATO ist. Wohin dieser russische Revisionismus
  führen kann, erleben wir seit über vier Jahren Tag für Tag in der Ukraine. Ihr in
  den baltischen Staaten habt daraus längst eure Lehren gezogen. Das 3,5-Prozent-Ziel,
  das wir in der NATO vor einem Jahr gemeinsam in Den Haag verabredet haben, habt
  ihr heute schon längst erreicht und übertroffen. An dieser Klarsicht und an dieser
  Klarheit nehmen wir uns als Bundesregierung ein Beispiel. Wir nehmen die russische
  Bedrohung ebenfalls sehr ernst, und wir wappnen uns dagegen. Die 3,5-Prozent-Marke
  von Den Haag werden wir schon 2029 erreichen, also deutlich vor der verabredeten
  Frist. Wir zählen zweitens wie ihr zu den Unterstützern der Ukraine. Deutschland
  leistet seit geraumer Zeit in absoluten Zahlen die größte Unterstützung Kyjiws weltweit.
  Aber pro Kopf, pro Einwohner leisten Esten, Letten und Litauer mehr. Die baltischen
  Staaten haben sich vor Jahren verpflichtet, 0,25 Prozent ihres Bruttoinlandprodukts
  für Hilfen für die Ukraine zur Verfügung zu stellen. Das ist vorbildlich. Gemeinsam
  senden wir eine Botschaft an Russland: Russland kann diesen Krieg nicht gewinnen.
  Moskau muss an den Verhandlungstisch kommen, um einen Waffenstillstand entlang der
  heutigen Kontaktlinie auszuhandeln. Präsident Putin muss diesen Krieg beenden. Es
  liegt allein an ihm, das zu tun. In diese Anstrengungen wollen wir und werden wir
  die baltischen Staaten eng einbeziehen. Drittens sind die Balten enge Partner in
  der Europäischen Union und in der Europapolitik. Wir wollen gemeinsam den Beitritt
  der Ukraine zur Europäischen Union. Der ersten Öffnung von sogenannten Clustern
  müssen nun bald weitere folgen. Für die Zeit bis zum Beitritt habe ich ja eine sogenannte
  assoziierte Mitgliedschaft der Ukraine vorgeschlagen. Das ist ein, wie ich finde,
  sehr weitreichendes Angebot, das so noch kein Beitrittsland vorher bekommen hat.
  So könnten wir die Ukraine schon heute näher an die Europäische Union heranführen.
  Ich will aber ausdrücklich sagen, dass das kein Ersatz für die Vollmitgliedschaft
  ist, sondern es ist ein Schritt hin zur Vollmitgliedschaft, die aber noch einige
  Zeit in Anspruch nehmen wird. Wir haben uns als Mitglieder der Europäischen Union
  heute schließlich auch über den Mehrjährigen Finanzrahmen unterhalten. Wir teilen
  die gleiche Vision. Wir wollen einen fokussierten europäischen Haushalt, der Europa
  sicherer und wettbewerbsfähiger macht. Aber wir sind uns alle auch über die Dimension
  der Verhandlungen im Klaren, die in der Europäischen Union in den nächsten Monaten
  vor uns stehen. Zurück zum NATO -Gipfel: Der NATO -Gipfel in Ankara soll ein Erfolg
  werden. Wir wollen die NATO europäischer machen, damit sie transatlantisch bleiben
  kann. So sagen wir es ja immer wieder. Wir investieren deshalb als Europäer intensiv
  in unsere Sicherheit. Wir werden auch in der Verteidigungsindustrie zwischen unseren
  Ländern enger zusammenarbeiten. Das gilt auch und besonders für die baltischen Staaten,
  die daran ein hohes Interesse haben, wie wir umgekehrt ein hohes Interesse daran
  haben, mit den Staaten des Baltikums zusammenzuarbeiten. Unsere Unterstützung für
  die Ukraine wollen wir auch nochmals stärken. Wir haben einen entsprechenden „ pledge
  “ vorgeschlagen. Wir werden schließlich die Vereinigten Staaten weiterhin dabei
  unterstützen, den Krieg im Iran dauerhaft zu beenden. Liebe Kolleginnen und Kollegen,
  vielen Dank noch einmal für den Besuch in Berlin. Ich will etwas wiederholen, was
  ich beim Aufstellungsappell der Litauenbrigade in Vilnius vor knapp einem Jahr gesagt
  habe: Die Sicherheit des Baltikums ist auch die Sicherheit Deutschlands. – Insoweit
  sind wir eng miteinander verbunden. Daran orientieren wir uns, in Worten wie in
  Taten. Ich will auch hinzufügen, dass das Deutsch-Niederländische Korps in Estland
  diese Woche ja die Führungsrolle in der Verteidigung der NATO -Ostflanke übernommen
  hat. Das zeigt, dass wir hierbei gemeinsam als Europäer auf einem guten Weg sind,
  unsere Territorien zu schützen und dies auch gemeinsam gerade im östlichen Teil
  Europas zu tun. Das alles ist eine Investition in unsere Freiheit und in unsere
  Sicherheit. Es ist aber auch Ausdruck des tiefen Vertrauens, das uns als Staatengemeinschaft
  und auch als Ministerpräsidenten, Regierungschefs, Präsidenten miteinander verbindet.
  In diesem Sinne noch einmal sehr herzlichen Dank für das Kommen nach Berlin. Vielen
  Dank, Friedrich, für die Einladung! Lieber Friedrich, lieber Edgars, lieber Gitanas.
  Für uns ist es sehr wichtig, dass wir mit einem gemeinsamen Verständnis dafür, was
  Europa jetzt tun sollte, nach Ankara reisen. Der Gipfel muss hierbei liefern. Im
  letzten Jahr haben wir uns in Den Haag darauf geeinigt, mehr in die Verteidigung
  zu investieren. Diese Zusagen müssen jetzt in Fähigkeiten umgewandelt werden. Estland
  investiert bereits mehr als fünf Prozent seines BIP in die sogenannte Kernverteidigung
  der NATO , das heißt die Bündnisverteidigung. Wir benötigen aber auch eine engere
  Zusammenarbeit im Bereich der Verteidigungsindustrie und der gemeinsamen Beschaffung.
  Denn so können wir die Fähigkeitslücken schneller schließen. Die Sicherheit des
  baltischen Raums ist die Sicherheit der NATO . Wir kennen unseren Nachbarn nur zu
  gut. Wir begreifen die Bedrohung hier. Deshalb werden wir auch weiterhin die Vorneverteidigung
  der NATO an der östlichen Flanke stärken. Deutschland ist einer unserer engsten
  Bündnispartner und gehört zu denen, die einen wichtigen Beitrag für die Sicherheit
  im baltischen Raum leisten. In dieser Woche hat das 1. Deutsch-Niederländische Korps
  das Kommando für die Landstreitkräfte in Estland und Lettland übernommen. Deutschland
  spielt aber auch eine wichtige Rolle bei der Luftraumüberwachung im baltischen Raum,
  bei Baltic Sentry und Eastern Sentry . Wir schätzen die langfristige Verpflichtung
  sehr, die Deutschland gegenüber der Sicherheit in unserer Region gezeigt hat. Die
  Europäische Union kann diese Anstrengung verstärken. Eine stärkere Unterstützung
  für militärische Mobilität, für die Verteidigungsindustrie, für die kritischen Fähigkeiten
  und die östliche Grenze liegt im gemeinsamen europäischen Interesse. Die Ukraine
  bleibt unsere dringendste Sicherheitsaufgabe. Heute ist Russland schwächer, als
  es das seit Jahren gewesen ist. Das ist nicht zufällig so. Es ist das Ergebnis unseres
  Handelns. Unsere Strategie funktioniert. Lassen Sie uns den Druck auf Russland aufrechterhalten,
  nicht auf die Ukraine. Gleichzeitig aber zeigen die jüngsten groß angelegten Angriffe
  Russlands gegen Zivilisten, dass sich an den Zielen Russlands nichts geändert hat.
  Russland will immer noch die gesamte Ukraine und die Spaltung Europas erlangen.
  Deshalb müssen wir unsere Antwort darauf anpassen. Die Ukraine braucht mehr militärische
  Unterstützung, nicht weniger. Die EU hat deutlich mehr Mittel zugesagt, und die
  Bündnispartner müssen auch bilateral mehr tun. Estland wird weiterhin jedes Jahr
  mindestens 0,25 Prozent seines BIP in die militärische Unterstützung der Ukraine
  stecken. Letztes Jahr haben wir bereits 0,35 Prozent erreicht. Ein gerechter und
  dauerhafter Friede setzt aber auch voraus, dass es einen klaren Pfad zur Europäischen
  Union gibt. Die Ukraine ist schon lange bereit gewesen. Es ist nun an der EU , ihre
  Arbeit zu leisten, indem man auch die verbleibenden Cluster noch öffnet, und zwar
  unverzüglich. Das ist kein Gefallen, den wir der Ukraine tun. Es liegt im strategischen
  und wirtschaftlichen Interesse Europas. So können wir auch den Frieden in Europa
  schützen. Vielen Dank! Zunächst möchte ich dem Bundeskanzler für seine Gastfreundschaft
  danken. Ich danke den Kollegen, dass sie hier sind. Ich glaube, es ist sehr, sehr
  wichtig, dass wir uns hier so kurz vor dem NATO -Gipfel in Ankara treffen. Ich möchte
  auch sagen, dass mein Land Deutschland sehr dankbar dafür ist, dass es im baltischen
  Raum präsent ist. Die Tatsache, dass das Deutsch-Niederländische Korps jetzt die
  Verantwortung für die Verteidigung von Lettland und Estland übernommen hat, wird
  sehr stark gewürdigt und geschätzt. Uns ist bewusst, dass wir in einer sehr unsicheren
  Welt leben, in der man nicht vorhersehen kann, was passiert, in der man sich auf
  eine ganze Reihe von Provokationen und Aggressoren einrichten muss. Da ist es von
  größter Bedeutung, dass wir begreifen, dass die Mitgliedstaaten der NATO Lettland,
  Litauen und Estland unabhängig von den Provokationen, denen wir uns gegenübersehen,
  in einer direkten Konfrontation stehen werden, wenn wir angegriffen werden. Manchmal
  fehlt mir das ein bisschen bei den Diskussionen über die Sicherheit. Wenn man von
  der Sicherheit jedes Bündnismitgliedes spricht, spricht man ja gleichzeitig von
  der Sicherheit des ganzen Bündnisses. Dieses Bewusstsein muss da sein. Wir sind
  uns aber in fast allen Dingen einig, die wir vom Gipfel in Ankara erwarten. Erstens
  haben wir letztes Jahr in Den Haag entschieden, dass wir fünf Prozent des BIP für
  Verteidigung ausgeben wollen. Nun verwandelt sich diese Zahl in reale Fähigkeiten.
  Es geht nicht mehr nur um Geld, sagt man manchmal. Es geht auch darum, dass wir
  das richtige Gerät beschaffen, die richtigen Rüstungsgüter und auch die Verteidigungsindustrie
  jedes Mitgliedstaates dazu heranziehen. Zweitens glaube ich, dass es ebenso wichtig
  ist, dass die NATO , obwohl es hier und da Diskussionen öffentlicher und privater
  Art gibt, bekräftigt, dass sie dennoch geschlossen hinter diesem Fünf-Prozent-Ziel
  und den Verpflichtungen steht, die ein jeder Mitgliedstaat der NATO eingegangen
  ist. Mein eigenes Land, Lettland, gibt schon dieses Jahr fast fünf Prozent aus.
  Wir haben ein Verteidigungsausgabengesetz, in dem wir eine fünfprozentige Ausgabenschwelle
  haben. Wir hoffen sehr, dass auch die anderen Bündnispartner sich an die Zusage
  des letzten Jahres halten, die wir in Den Haag abgegeben haben. Noch eine letzte
  Anmerkung: Ich glaube, wir sind uns auch dahingehend einig, dass wir weiterhin die
  Ukraine unterstützen müssen. Wir leisten unseren Teil. Entscheidungen wie die PURL
  -Initiative, wie weitere Initiativen finden nächste Woche, so hoffen wir, auch die
  Unterstützung des Bündnisses. Ich hoffe auch, dass es uns gelingen wird, uns auf
  einen gemeinsamen Ansatz zu einigen, wenn wir uns der hybriden Bedrohung durch Russland
  und Belarus und Bedrohungen anderer Art entgegenstellen müssen. Aber, Herr Bundeskanzler,
  ich möchte Ihnen und auch meinen Kollegen aus den beiden Partnerländern für den
  offenen Austausch danken, den wir heute hatten. Er war sehr hilfreich. Wir können
  uns auf den Gipfel gemeinsam vorbereiten. Ganz, ganz herzlichen Dank dafür. Jetzt
  setze ich meine Brille auf, und dann haben wir alle vier eine Brille auf der Nase!
  Herr Bundeskanzler, lieber Friedrich, lieber Edgars, lieber Kristen, erlauben Sie
  mir zunächst, Bundeskanzler Friedrich Merz herzlich dafür zu danken, dass er uns
  hier heute, sozusagen am Vorabend, also wenige Tage vor dem NATO -Gipfel in Ankara,
  zusammengebracht hat. Wir sind uns voll und ganz einig, was die Ziele des Gipfels
  in Ankara anbetrifft. Der Erhalt der transatlantischen Geschlossenheit sollte unsere
  höchste Priorität bleiben. Ein starkes transatlantisches Bindeglied ist der Eckpfeiler
  unserer kollektiven Sicherheit und Verteidigung. Europa muss mehr Verantwortung
  für seine eigene Sicherheit übernehmen. Ein stärkeres Europa innerhalb einer stärkeren
  NATO , das sollte unser gemeinsames strategisches Ziel bleiben. Der Gipfel muss
  hinsichtlich der Umsetzung der Zusage, dass wir fünf Prozent unseres BIP in die
  Verteidigung stecken werden, greifbare Fortschritte erzielen. In diesem Jahr hat
  mein Land bereits 5,38 Prozent des BIP in die sogenannte Kernverteidigung, also
  die Bündnisverteidigung, gesteckt. Weitere 1,5 Prozent gehen in die Dual-Use -Infrastruktur
  und infrastrukturbezogene Investitionen. Die gesamten Ausgaben Litauens für Verteidigung
  und Sicherheit nähern sich sieben Prozent des BIP an. Das heißt, sie liegen deutlich
  über dem Ziel, das wir uns in Den Haag gesetzt haben. Eine Stärkung der Abschreckung,
  der Verteidigung, vor allem im Bereich der Luftverteidigung, ist genauso wichtig.
  Ich begrüße hierfür den neuen Plan der NATO zur integrierten Luftverteidigung und
  Flugkörperabwehr. Der Übergang von der Luftraumüberwachung hin zu einer erweiterten
  Luftverteidigungsmission ist ein Meilenstein. Die Stationierung der deutschen Brigade
  in Litauen im nächsten Jahr wird eine deutliche Verstärkung unseres Verteidigungsdispositivs
  sein. Wir fragen uns auch, was die Litauer von deutschen Soldaten, Soldatinnen und
  Offizieren auf den Straßen unserer Städte halten werden. Aber wenn Sie ihnen die
  Frage stellen, dann werden Sie Ihnen antworten, dass sie sie mehr als willkommen
  heißen. Ich glaube, dass das der beste Beleg, der beste Beweis, das beste Beispiel
  für unsere Solidarität und Freundschaft ist. Wir müssen auch das US -geführte nukleare
  Abschreckungsdispositiv innerhalb der NATO verstärken. Ich habe vor wenigen Tagen
  eine Verfassungsänderung auf den Weg gebracht, die das Ziel hat, die bestehende
  Beschränkung über die mögliche Nutzung von Nuklearwaffen in Litauen zu beseitigen.
  Diese Änderung würde Litauen in die Lage versetzen, Vorkehrungen der NATO für eine
  kollektive nukleare Abschreckung mit zu unterstützen und sich daran zu beteiligen.
  Abschließend möchte ich sagen, dass wir beim Gipfel in Ankara demonstrieren müssen,
  dass die NATO geschlossen ist, geschlossen bleibt, entschlossen bleibt, bereit bleibt,
  Fortschritte auf dem Weg zur NATO 3.0 zu machen. Indem wir in unsere kollektive
  Verteidigung, die Stärkung des transatlantischen Bindeglieds investieren und weiterhin,
  solange es notwendig sein wird, an der Seite der Ukraine stehen, stärken wir nicht
  nur die Sicherheit unserer Nationen, sondern auch die Zukunft der gesamten euroatlantischen
  Gemeinschaft. Herr Bundeskanzler, Sie haben eben erwähnt, dass Deutschland das NATO
  -Ziel bei den Verteidigungsausgaben früher erreichen möchte, nämlich 2029. Gestern
  hat der US -Präsident die deutschen Anstrengungen als lächerlich bezeichnet. Was
  antworten Sie ihm darauf? An die Adresse der baltischen Staats- und Regierungschefs:
  Die Zielvorgabe für das Fünf-Prozent-Ziel ist 2035. Glauben Sie, dass das ehrgeizig
  genug ist? Wäre es Ihnen lieber, wenn das früher erreicht würde? Ich würde sagen,
  dass das als Ziel ehrgeizig genug ist. Wir liegen ja sehr nah an Belarus und der
  Russischen Föderation. Wir sind bereit und auch schon jetzt entschlossen, mehr zu
  leisten, um schon jetzt greifbare Ergebnisse zu erzielen. Das war ja auch der Grund,
  warum wir unter den verschiedenen politischen Parteien in Litauen den politischen
  Konsens erzielt haben, schon jetzt 5,4 Prozent zu erreichen. Dies ist eine Zielvorgabe
  nicht nur für ein Jahr, sondern auch über einen längeren Zeitraum hinweg. Ich hoffe
  sehr, dass wir die Verteidigungsausgaben bis zum Jahr 2030 und wahrscheinlich auch
  darüber hinaus auf dem gleichen Niveau halten können. Was aber meiner Meinung nach
  von großer Bedeutung ist, ist, dass wir in Den Haag fünf Prozent als Ziel gewählt
  haben und uns dafür entschieden haben. Wichtig ist vor allem, dass alle Staaten
  mitmachen und abliefern, was die fünf Prozent anbetrifft, so wie es mit dem Erreichen
  bis 2035 geplant ist. Es wäre doch sehr widersprüchlich und auch kontrovers, wenn
  einige Länder jetzt deutlich mehr tun und dieses Ziel in einigen Jahren erreichen
  würden und andere Länder bei zwei oder zweieinhalb Prozent verweilen würden. Das
  würde eine natürliche Spaltung des Bündnisses in zwei oder drei Teile bedeuten,
  was für den Geist der kollektiven Verteidigung im Bündnis und für die Solidarität
  im Bündnis nicht gut wäre. Zunächst haben wir ja das Ziel beschlossen. Wenn wir
  das tun, sollten wir auch an der Umsetzung arbeiten. Das sollten wir gemeinsam tun.
  Herr Kollege, wir haben das im letzten Jahr in Den Haag verabredet. Sie können sich
  daran erinnern, dass wir zuvor eine Debatte über drei Prozent, 3,5 Prozent oder
  fünf Prozent hatten. Wir haben fünf Prozent verabredet, und Deutschland verdoppelt
  seinen Verteidigungsetat innerhalb von vier Jahren. Das ist die größte Kraftanstrengung,
  die wir jemals unternommen haben, um unsere Verteidigungsfähigkeit zu stärken. Insofern
  brauchen wir uns hier vor niemandem zu verstecken. Wir werden das auch in aller
  Bescheidenheit zum Ausdruck bringen, und wir tun dies auch als der größte Mitgliedstaat
  der Europäischen Union mit der Verantwortung innerhalb Europas. Die Tatsache, dass
  ich heute die drei Kollegen eingeladen habe, nach Berlin zu kommen, und die Tatsache,
  dass ich in der letzten Woche die vier Kollegen aus dem E5-Format eingeladen hatte,
  nach Berlin zu kommen, zeigt, dass wir uns auf der europäischen Seite hier eng miteinander
  abstimmen und entschlossen sind, unseren Beitrag zur Verteidigung der NATO zu leisten
  und insbesondere unseren Beitrag zur Verteidigung Europas zu leisten. Das sollte
  auch jeder anerkennen, der sich mit diesen Zahlen beschäftigt, und ich werde diese
  Zahlen, ohne sie zu übertreiben, auch nennen, wenn wir in der nächsten Woche in
  Ankara zusammentreten. Erstens. Wenn wir hier über die Verteidigungsausgaben sprechen,
  haben wir ja schon eine gewisse Geschichte. 2014 haben wir uns ja darauf geeinigt,
  2,5 Prozent auszugeben. Diese Unentschlossenheit, die wir ja über Jahre hinweg gesehen
  haben, hat auch sicherlich einen Beitrag dazu geleistet, dass sich Russland daran
  gewagt hat, diesen umfassenden Angriff durchzuführen. Wenn wir also diese fünf Prozent
  nicht erreichen, vor allem diejenigen Länder, die eine Grenze mit Russland haben,
  dann werden wir – das muss man ganz ehrlich sagen – sehr viel mehr zu zahlen haben,
  wenn Russland uns angreift. Denn die Verteidigungsausgaben sind ja auch eine Form
  der Abschreckung. Das darf man nicht vergessen. Noch ein letzter Punkt: Wenn wir
  von den Verteidigungsausgaben sprechen, versuche ich eigentlich immer zu unterstreichen,
  wie wichtig es ist, sich die Zahlen und die Haushaltsmittel anzuschauen. Aber es
  geht auch um die Fähigkeiten. Gleichzeitig aber unterstreiche ich, dass wir auch
  berücksichtigen müssen, dass wir großartige Bündnispartner haben, die schon in unseren
  Ländern vertreten sind. Deutschland ist ein Beispiel. Wir haben die Multinationale
  Brigade, die die Kanadier anführen. Einige europäische Partner leisten also schon
  einen großen Beitrag zu unserer Sicherheit. Sie stellen enorme militärische Fähigkeiten
  bereit. Dieses entschlossene Engagement seitens der Bündnispartner müsste auch berücksichtigt
  werden, wenn wir von Verteidigungsausgaben sprechen. Man darf nicht vergessen, was
  bereits dadurch an der östlichen Flanke der NATO geschehen ist, dass unsere Bündnispartner
  gekommen sind und vor Ort sind. Das ist also ein etwas komplexeres Thema als nur
  die Zahlenfrage. Auch ich möchte hinzufügen, dass jeder, der jemals einen Haushalt
  hat vorlegen müssen und Ziele erreichen muss, verstehen wird, was es bedeutet, fünf
  Prozent für die Verteidigung auszugeben. Jeder weiß, dass das nicht leicht ist,
  auch wenn wir das alle unterstützen. Aber wenn man öffentliche Ausgaben dafür kürzt
  oder die Steuern erhöhen muss, dann sind sich zumindest die Regierungsvertreter
  bzw. die Vertreter in der Verwaltung dessen bewusst, was das bedeutet. Die Verteidigungsausgaben
  für die Bündnisverteidigung liegen in meinem Land in diesem Jahr bei 5,4 Prozent.
  Wenn man dann noch die 1,5 Prozent hinzunimmt, die wir für die weiter gefasste Sicherheit
  ausgeben, dann bringt uns das eher auf 6,6 oder fast 7 Prozent, wie Gitanas es ja
  auch schon selbst unterstrich. Das machen wir jetzt nicht, um anzugeben, sondern
  weil wir uns der echten Bedrohung bewusst sind, der wir uns hier seitens unseres
  Nachbarn gegenübersehen. Wir kennen unseren Nachbarn. Wir wissen, dass das einfach
  getan werden muss. Zweitens. Die NATO ist ein kollektives Bündnis. Wir arbeiten
  füreinander, wir beschützen einander. Deutschland ‑ das wurde ja bereits angesprochen ‑
  tut sehr viel für die Sicherheit in den baltischen Staaten, und ich bin sehr dankbar,
  dass Friedrich uns auch noch vor dem Gipfel hierhin eingeladen hat. Das ist mehr
  als symbolisch. Für die Staaten im baltischen Raum bedeutet es sehr viel, dass es
  hier diese gemeinsame Abstimmung gibt. Wenn man das jetzt mit den Daten, den Angaben
  vergleicht, und wenn Sie dann sagen, es sei teuer, etwas zu schützen, den Frieden
  zu bewahren: Sie glauben, das sei teuer? Vergleichen Sie das doch einmal mit einer
  Situation, in der Sie Daten verlieren, Ihr Telefon verlieren. Das Gleiche gilt für
  den Frieden. Wenn Sie den Frieden an Russland verlieren, dann erhält man ihn nicht
  wieder. Dafür gibt es kein Backup . Ich habe eine Frage an die Vertreter aus den
  baltischen Staaten. Russland hat in den vergangenen Tagen eine Reihe von Grenzübergängen
  geschlossen, Übergänge nach Lettland und Estland. Darf ich Sie fragen, ob Sie sich
  Sorgen machen, dass sich Russland, das ja jetzt doch Druck ausgesetzt ist, demnächst
  in eine rasche Eskalation mit den baltischen Staaten begeben wird? Herr Bundeskanzler,
  der Präsident hat eben gesagt, dass Litauen das verfassungsmäßige Verbot der Stationierung
  von Atomwaffen abschaffen möchte. Finnland ist einen ähnlichen Weg gegangen. Ist
  das eigentlich eine Maßnahme, die Sie befürworten oder in der Sie eine eher unnötige
  Eskalation mit Russland sehen? Vielen Dank. – Zunächst möchte ich sagen: Im Moment
  gibt es keine unmittelbare Bedrohung der baltischen Staaten oder der NATO , denn
  das ist ja identisch, die baltischen Staaten und die NATO . Die Grenzübergänge sind
  für Züge geschlossen worden. Russland hat jene geschlossen, die ohnehin keinen großen
  Nutzen gebracht haben. Es hat also einige Schritte gegen die Balten und die baltischen
  Mitglieder der EU eingeleitet. Der Plan funktioniert. Es geht ja darum, die Lebensadern
  zu beschneiden, die Luft abzuschneiden. Wir sind sehr deutlich in dem, was wir sagen.
  Sie können ja sehen, was in Russland infolge des Drucks passiert. Es hat keinen
  Treibstoff mehr. Da gibt es schon eine Verknappung in den Großstädten. Das gibt
  Ihnen vielleicht auch einen Eindruck davon, was in Russland passiert. Russland hat
  ja gesagt, das sei eine große Maßnahme. Es gewinnt bisher aber nicht. Es spürt den
  Druck. Ich würde deshalb also sagen, dass das nur ein Schritt ist, den die Russen
  ergriffen haben, weil sie uns gerne ein bisschen an der Grenze näher rücken, um
  Druck auszuüben. Aber wir üben weiterhin Druck aus, was die Ukraine anbetrifft.
  Vielleicht darf ich kurz erwähnen, dass Litauen nicht auf der Liste der Länder steht,
  in denen der Eisenbahnverkehr unterbrochen ist bzw. die Übergänge geschlossen wurden.
  Der Grund dafür liegt darin, dass Russland davon abhängig ist, dass es hier einen
  glatten Verkehr nach Kaliningrad gibt, und das ist nur möglich, indem man unser
  Territorium überquert. Natürlich gibt es auch alternative Transportwege über den
  Seeweg, aber diese Möglichkeiten sind begrenzt, und Russland hat zurzeit große Probleme
  bei der Nutzung der Seewege oder dabei, sie sogar hochzufahren. Es ist also eine
  technische Entscheidung – so sehen wir das –, und wir sollten daraus nicht den Schluss
  ziehen, dass das hier eine Art von Vorbereitung eines nächsten Eskalationsschrittes
  ist. Ich glaube nicht, dass das der Fall ist. Kurz gesagt: Auch wir analysieren
  das so. Die Schließung einer Eisenbahnverbindung steht in größerem Zusammenhang
  mit wirtschaftlichen Gründen und hat weniger politische Bedeutung oder die Bedeutung
  einer Provokation. Es ist jene Eisenbahnverbindung geschlossen worden, die am seltensten
  genutzt wird. Man sollte hier keine zu weitreichenden Schlussfolgerungen hinsichtlich
  der Absichten Russlands ziehen. Welche Botschaft senden wir an unsere Bündnispartner
  und an unsere Freunde? Ihr müsst wachsam bleiben. Wir müssen wachsam bleiben. Wir
  können nicht vorhersehen, was Russland in diesem oder im nächsten Jahr tun wird.
  Die Botschaft, die wir an unsere Öffentlichkeit und auch an die NATO zu richten
  bemüht sind, ist, dass die NATO eine klare Botschaft aussenden sollte, dass die
  baltischen Staaten ein fester Bestandteil der NATO sind und dass, wenn es einen
  Angriff gegen die NATO gibt, dieser Angriff entsprechend zurückgeschlagen werden
  wird. Manchmal neigt man dazu, eben diesen Aspekt in der Diskussion zu vergessen,
  bei all diesen riesigen Mengen an Informationen, die auf uns einprasseln. Es ist
  nicht immer leicht, auszusortieren, wo es eine richtige Analyse gegeben hat. Russland
  hat ja auch Desinformationskampagnen geführt. Präsident Nausėda hat uns eben noch
  einmal darüber informiert, dass es eine Initiative gibt, die Verfassung in Litauen
  im Hinblick auf das bestehende Verbot der Stationierung von Atomwaffen zu ändern.
  Es scheint in Litauen, wie wir hören, einen großen und breiten gesellschaftspolitischen
  und auch politischen Konsens zu geben, diese Verfassungsänderung vorzunehmen. Das
  ist zunächst einmal eine Entscheidung der Politik in Litauen. Es zeigt aber auch
  zugleich, wie in diesem Land die Bedrohung aus Russland ernst genommen wird und
  wie das Land bereit ist, sich auch in dieser Hinsicht zu verteidigen. Insofern habe
  ich es hier nicht nur nicht zu kritisieren, sondern mit Respekt zur Kenntnis zu
  nehmen, dass Litauen auch in dieser Hinsicht bereit ist, das Land und damit das
  NATO -Territorium zu verteidigen. Das hat nichts mit aggressivem Vorgehen oder der
  Provokation einer Eskalation zu tun. Hierbei geht es um das Ziel, das mein Land
  verfolgt, dass wir alle Mittel der Abschreckung nutzen wollen und wir gerne auch
  Teil dieser nuklearen Abschreckung, die die NATO zu bieten hat, sein möchten. Deshalb
  wollen wir die Hindernisse, auch wenn sie rechtlicher Art sein sollten, aus dem
  Weg schaffen, falls der Bedarf entsteht.'
