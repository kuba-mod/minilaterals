title: Bundeskanzler Merz gratuliert dem Premierminister des Vereinigten Königreichs
  Großbritannien und Nordirland, Andrew Burnham
text: Sehr geehrter Herr Premierminister, zu Ihrem Amtsantritt als Premierminister
  möchte ich Ihnen meinen herzlichen Glückwunsch aussprechen. Das Vereinigte Königreich
  und Deutschland sind einander enge Verbündete und Partner. Gerade in diesen Zeiten
  beweist sich unsere tiefe Verbundenheit. Sehr gern möchte ich mich mit Ihnen zu
  den vor uns liegenden Herausforderungen austauschen und lade Sie daher gern zu einem
  baldigen Besuch nach Berlin ein. Für die vor Ihnen liegenden Aufgaben wünsche ich
  Ihnen viel Erfolg, Kraft und gutes Gelingen. Mit freundlichen Grüßen Friedrich Merz
  Bundeskanzler der Bundesrepublik Deutschland
