title: Mindestlöhne Altenpflege gestiegen Mehr Geld für Pflegekräfte
text: 'Auch mehr Befugnisse und weniger Bürokratie sollen die Berufe in der Pflege
  stärken. Foto: ullstein bild/Westend61/Uwe Umstätter Die Mindestlöhne in der Altenpflege sind
  zum 1. Juli 2026 gestiegen. Die Bundesregierung hatte die Empfehlungen der Pflegekommission
  per Verordnung umgesetzt. Nun wurde der erste Anpassungsschritt der Regelung wirksam.
  Im kommenden Jahr ist eine weitere Erhöhung vorgesehen. Die Anpassungen sind nach
  Qualifikationsstufen gestaffelt und gelten einheitlich im gesamten Bundesgebiet.
  Die Löhne waren zuletzt zum 1. Juli 2025 gestiegen. Für Pflegehilfskräfte liegen
  die Mindestlöhne damit bei 16,52 Euro brutto pro Stunde, für qualifizierte Pflegehilfskräfte
  bei 17,80 Euro und für Pflegefachkräfte bei 21,03 Euro. Außerdem bleibt es beim
  Mehrurlaub für Beschäftigte in der Altenpflege. Der Anspruch auf zusätzlichen bezahlten
  Urlaub über den gesetzlichen Urlaubsanspruch von 20 Tagen hinaus, beträgt weiterhin
  neun Tage pro Kalenderjahr bei einer 5-Tage-Woche. Die Pflegekommission hatte ihre
  Empfehlungen im November vergangenen Jahres überreicht. Mit der 7. Pflegearbeitsbedingungenverordnung
  wurden die empfohlenen Pflegemindestlöhne wie auch der Anspruch auf Mehrurlaub allgemein
  verbindlich - ungeachtet etwaiger höherer Ansprüche aus Arbeits- oder Tarifvertrag.
  Die Verordnung tritt am 1. Juli 2026 in Kraft und gilt bis 30. September 2028. Bundesarbeitsministerin
  Bärbel Bas hatte die Vorschläge der Kommission begrüßt: Pflegekräfte leisteten Herausragendes,
  sagte Bas. Für dieses „Anpacken und Dabeibleiben” seien gute Löhne zentral, „damit
  sich auch in Zukunft Menschen gern für den Pflegeberuf entscheiden und die Versorgung
  von Pflegebedürftigen sichergestellt ist”, so die Ministerin im November. Bundesgesundheitsministerin
  Nina Warken hatte erklärt, die Löhne für Pflege- und Betreuungskräfte hätten sich
  in den vergangenen Jahren bereits spürbar verbessert, lägen durchschnittlich sogar
  höher als von der Pflegekommission nun festgelegt. Neben der finanziellen Komponente
  wolle die Bundesregierung die Berufe in der Pflege auch durch mehr Befugnisse und
  weniger Bürokratie stärken, um die Attraktivität dieser Berufsbilder weiter zu erhöhen.
  In Deutschland arbeiten rund 1,3 Millionen Beschäftigte in Einrichtungen, die unter
  den Pflegemindestlohn fallen. Dort, wo der spezielle Pflegemindestlohn nicht zur
  Anwendung kommt, etwa in Privathaushalten, gilt der allgemeine gesetzliche Mindestlohn
  . Die Pflegekommission legt alle zwei Jahre eine Empfehlung zur künftigen Höhe des
  Mindestlohns vor. Ihre Empfehlungen orientieren sich an der Tarifentwicklung und
  der wirtschaftlichen Lage. Die Kommission hat acht Mitglieder: vier von Arbeitgeberseite
  und vier von Arbeitnehmerseite. Sie amtiert jeweils für fünf Jahre. Die aktuelle
  Kommission hat ihre Arbeit im Jahr 2021 aufgenommen.'
