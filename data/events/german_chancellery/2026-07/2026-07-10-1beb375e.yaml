title: Zwei Millionen Euro für unabhängige Verlage – Bewerbungsstart für den Deutschen
  Verlagspreis 2026
text: 'Die Bewerbungsphase für den Deutschen Verlagspreis 2026 hat begonnen. Ab sofort
  können sich unabhängige Verlage wieder für die Auszeichnung bewerben. Mit dem Preis
  würdigt die Bundesregierung bereits zum achten Mal Verlage, die sich durch außergewöhnliche
  Programme, ein spezielles kulturelles Engagement sowie innovative Projekte oder
  die besondere Qualität ihrer verlegerischen Arbeit auszeichnen. Dafür stellt der
  Bund insgesamt zwei Millionen Euro zur Verfügung. Die Preisverleihung wird am 9.
  Oktober 2026 im Rahmen der Frankfurter Buchmesse stattfinden. Staatsminister für
  Kultur und Medien, Wolfram Weimer, sagte zum Start der Bewerbungsphase: „Unabhängige
  Verlage spüren mit Mut, viel Herzblut und Ausdauer literarische Entdeckungen abseits
  des Mainstreams auf. Sie eröffnen Einblicke in andere Perspektiven und Lebensentwürfe.
  Diese wertvolle verlegerische Vielstimmigkeit in unserem Land bewahrt unsere Demokratie
  vor Einfalt, vor einer Monopolisierung der Meinungen – darum wollen wir sie mit
  dem Deutschen Verlagspreis unterstützen.“ Neuer Innovationspreis für zukunftsweisende
  Projekte Wie in den vergangenen Jahren werden bis zu drei Verlage mit einem Spitzenpreis
  und einer Prämie von 50.000 Euro geehrt. Weitere bis zu 79 Verlage können in diesem
  Jahr Preise in Höhe von jeweils 18.000 Euro erhalten. Darüber hinaus können bis
  zu drei Verlage mit einem Jahresumsatz von mehr als drei Millionen Euro ein undotiertes
  Gütesiegel erhalten. Erstmals in diesem Jahr kann neben dem Nachhaltigkeitspreis
  ein Innovationspreis vergeben werden. In dieser Kategorie kann ein Verlag für kreative,
  zukunftsorientierte Maßnahmen, Projekte oder digitale Formate ausgezeichnet werden,
  die Impulse in die Verlagsbranche geben können. Sowohl der Nachhaltigkeitspreis
  als auch der Innovationspreis sind mit jeweils 24.000 Euro dotiert. Staatsminister
  Weimer erklärte dazu: „Wir wollen neue Impulse in der Branche würdigen und haben
  deshalb mit dem Innovationspreis einen weiteren Sonderpreis eingeführt. In diesem
  Jahr zeichnen wir zum ersten Mal Verlage aus, die kreative digitale Wege gehen oder
  zukunftsweisende Modelle im Verlagswesen gestalten.“ Jörg Thadeusz übernimmt Juryvorsitz
  Die Jury für den Deutschen Verlagspreis 2026 wird nach dem turnusmäßigen Ausscheiden
  bisheriger Jurymitglieder teilweise neu besetzt. In diesem Jahr gehören Alexander
  Cammann, Isabel Fargo Cole, Ines Dettmann, Katharina Holzmann, Prof. Dr. Friedhelm
  Marx und Deniz Utlu dem Fachgremium an. Den Vorsitz der Jury übernimmt der Journalist,
  Moderator und Autor Jörg Thadeusz. Weiterentwickeltes Verfahren zur Preisträgerfindung
  Die Auswahl der auszuzeichnenden Verlage trifft der Beauftragte der Bundesregierung
  für Kultur und Medien (BKM) auf Grundlage der Empfehlungen der Jury. Sie bewertet
  und gewichtet die eingereichten Bewerbungen in einer Gesamtschau. Zur fachlichen
  Beratung können sowohl die Jury als auch BKM während des Auswahlprozesses bei Bedarf
  ein Gremium hinzuziehen, das mit den Partnern des Preises, dem Börsenverein des
  Deutschen Buchhandels und der Kurt-Wolff-Stiftung, besetzt ist. Das weiterentwickelte
  Verfahren dient einer transparenten und sorgfältigen Bewertung etwaiger Fragestellungen
  im Auswahlprozess und stärkt den verantwortungsvollen Austausch der beteiligten
  Partner. Bewerbungen für den Deutschen Verlagspreis 2026 sind bis zum 24. Juli 2026
  unter www.deutscher-verlagspreis.de/ einzureichen. Die Teilnahmebedingungen sind
  abrufbar unter www.deutscher-verlagspreis.de/teilnahme'
