title: Renten- und Gesundheitspolitik der Bundesregierung So reformieren wir unsere
  Sozialversicherungen
text: 'Damit die Sozialversicherungen auch künftig finanzierbar und verlässlich bleiben,
  geht die Bundesregierung grundlegende Reformen an. Die Sozialversicherungen bilden
  die zentrale Säule unseres Sozialstaates. Sie sichern uns ab – im Alter, bei Arbeitslosigkeit,
  bei Krankheit und bei Pflegebedürftigkeit. Doch unsere Sozialsysteme sind unter
  enormen finanziellen Druck geraten – aufgrund des demografischen Wandels, aber auch
  aufgrund der aktuellen konjunkturellen Schwäche. Deshalb sind tiefgreifende Reformen
  notwendig. Ziel ist, die Sozialversicherungen nachhaltig zu stabilisieren und zukunftsfest
  zu machen. Das heißt: Sie müssen finanzierbar bleiben und uns gleichzeitig weiterhin
  bei Krankheit und im Alter absichern. Damit das gelingt, müssen alle ihren Beitrag
  leisten. Wichtig dabei ist, die Lasten fair zu verteilen – über alle Bevölkerungs-
  und Einkommensgruppen sowie Generationen hinweg. Unsere gesetzliche Rente wird –
  als Teil des Generationenvertrags – im Umlageverfahren organisiert: Die aktuellen
  Beitragszahlungen der Erwerbstätigen werden direkt zur Auszahlung der gegenwärtigen
  Renten verwendet. Wenn nun die Gesellschaft altert, müssen immer weniger Beitragszahler
  für immer mehr Rentnerinnen und Rentner aufkommen. Als Folge dieser demografischen
  Entwicklung würden die Beiträge steigen und das Rentenniveau sinken. Deshalb soll
  das Rentensystem mit einer großen Reform langfristig gesichert werden. Denn wir
  müssen uns auch künftig auf die Rente verlassen können. Die Bundesregierung hat
  im ersten Jahr ihrer Amtszeit bereits eine Reihe von Rentengesetzen auf den Weg
  gebracht. Die Vorhaben gehen auf den Koalitionsvertrag zurück. Die Gesetze stärken
  die drei Säulen der Altersvorsorge: die gesetzliche, die betriebliche und die private.
  Die Bundesregierung hat bereits Mitte Dezember 2025 Eckpunkte für eine Frühstart-Rente
  beschlossen: Kinder sollen ab dem sechsten Lebensjahr eine staatliche Förderung
  in Höhe von monatlich zehn Euro für ein Altersvorsorgedepot erhalten. Die junge
  Generation erhält dadurch ein Startkapital für ihre private Altersvorsorge . An
  diese Maßnahmen soll nun eine grundlegende Reform unseres Rentensystems anknüpfen.
  Die Bundesregierung hatte dafür Anfang 2026 die Alterssicherungskommission eingesetzt.
  Ende Juni legte das Gremium seine Empfehlungen für eine ausgewogene Reform vor.
  Ziel dabei ist: Die Rente soll auf Dauer finanzierbar und verlässlich bleiben. Und:
  Sie soll die Lasten gerecht verteilen – über alle gesellschaftlichen Gruppen, über
  alle Generationen hinweg. Der Koalitionsausschuss beschloss Anfang Juli, die Empfehlungen
  umfassend und zügig umzusetzen. Laut Kommission soll mit der Reform eine Trendumkehr
  gelingen: Sie soll ermöglichen, dass der Beitragssatz in der Rentenversicherung
  auf Dauer sinkt und sich das Gesamtversorgungsniveau aus gesetzlicher Rente, betrieblicher
  und privater Altersvorsorge erhöht. Kern der neuen Rente ist eine zusätzliche, verpflichtende
  Kapitalrente . Die Erträge aus der Kapitalrente sollen zu einem steigenden Rentenniveau
  führen und die Rente leistungsstark und finanzierbar halten. Lesen Sie hier mehr
  zu den 33 Empfehlungen der Alterssicherungskommission. Was heißt das konkret? Junge
  Menschen sollen besonders von der gesetzlichen Kapitalrente profitieren. Ein 47-jähriger
  Durchschnittsverdiener würde bis zum Renteneintritt 150 Euro Kapitalrente zusätzlich
  erwirtschaften, eine 22-jährige Berufseinsteigerin sogar 777 Euro Kapitalrente.
  Stabile Beiträge, bessere Notfallversorgung und Unterstützung für Pflegebedürftige:
  Eine gute Gesundheitsversorgung muss für alle Menschen erreichbar und bezahlbar
  bleiben. Gleichzeitig stehen die gesetzlichen Kranken- und Pflegeversicherungen
  vor großen Herausforderungen: steigende Ausgaben, eine älter werdende Gesellschaft
  und zunehmender Fachkräftebedarf. Die Bundesregierung hat daher unter anderem Reformen
  in der gesetzlichen Krankenversicherung, der Notfallversorgung und der Pflege auf
  den Weg gebracht. Damit schafft sie die Voraussetzungen für ein leistungsfähiges
  und zukunftsfestes Gesundheits- und Pflegesystem. Mit dem GKV -Beitragssatzstabilisierungsgesetz
  stärkt die Bundesregierung die finanzielle Grundlage der gesetzlichen Krankenversicherung.
  Ziel ist, den Anstieg der Ausgaben zu begrenzen und die Beiträge für Versicherte
  sowie Arbeitgeberinnen und Arbeitgeber verlässlich zu halten. Dafür werden bestehende
  Strukturen weiterentwickelt und Einsparpotenziale genutzt, ohne die medizinische
  Versorgung grundsätzlich infrage zu stellen. Warum ist das notwendig? Die Ausgaben
  der gesetzlichen Krankenversicherung sind in den vergangenen Jahren um knapp acht
  Prozent pro Jahr gestiegen, während die Beitragseinnahmen 2025 nur um rund fünf
  Prozent zunahmen. Für 2027 wird mit einer Deckungslücke von 15,3 Milliarden Euro
  gerechnet, die bis 2030 auf rund 40 Milliarden Euro anwachsen könnte. Ohne Gegensteuern
  wäre der Beitragssatz auf bis zu 19,3 Prozent gestiegen. Was heißt das konkret?
  Ohne eine umfassende Reform der Finanzen der gesetzlichen Krankenversicherung müsste
  die Finanzierungslücke von circa 40 Milliarden Euro im Jahr 2030 ungefähr zur Hälfte
  über steigende Zusatzbeiträge getragen werden. Bezogen auf ein Bruttogehalt von
  3.500 Euro pro Monat entspräche das je Versicherten einer geschätzten jährlichen
  Mehrbelastung von rund 380 Euro im Jahr, welche durch die Reform vermieden wird.
  Krankenkassen sparen künftig stärker bei Verwaltung und Werbung statt bei den Versicherten.
  Die Werbeausgaben der Kassen werden gedeckelt, ebenso die Vergütung außertariflich
  beschäftigter Führungskräfte bei Krankenkassen, Landesverbänden und Medizinischen
  Diensten. So tragen auch die Kassen selbst zur Stabilisierung bei. Versicherte profitieren
  zudem davon, dass der Bund sich künftig stärker an den Gesundheitskosten für Menschen
  in der Grundsicherung beteiligt. Dadurch wird die Finanzierung der gesetzlichen
  Krankenversicherung breiter aufgestellt. Auch Maßnahmen wie der höhere Beitrag der
  Pharmaunternehmen zur Finanzierung der gesetzlichen Krankenversicherung tragen dazu
  bei, den Anstieg der Krankenkassenbeiträge zu begrenzen. Was heißt das konkret?
  Der Bund übernimmt erstmals einen wachsenden Anteil an versicherungsfremden Leistungen.
  Für die Gesundheitskosten von Grundsicherungsempfängerinnen und -empfängern steigt
  der Bundeszuschuss spürbar: von 250 Millionen Euro 2027 auf zwei Milliarden Euro
  ab 2031. Gleichzeitig werden Mittel gezielter für die Kernversorgung eingesetzt:
  Leistungen mit begrenztem medizinischen Zusatznutzen wie etwa die Erstattung von
  Cannabis-Blüten oder homöopathischen Mitteln entfallen künftig. Das Gesetz zur Stabilisierung
  der Beitragssätze in der gesetzlichen Krankenversicherung tritt nach der Verkündung
  in Kraft; weitere Regelungen folgen zum 1. Januar 2027 und zum 1. Januar 2028. Bundesgesundheitsministerin
  Nina Warken hat zudem die FinanzKommission Gesundheit eingesetzt. Diese erarbeitet
  bis Ende 2026 Vorschläge für eine nachhaltige Weiterentwicklung der Finanzierung
  der gesetzlichen Krankenversicherung. Die Notfallreform ist vom Bundeskabinett beschlossen
  und befindet sich im parlamentarischen Verfahren. Parallel werden die notwendigen
  Strukturen für den Ausbau der 116117 und die Einrichtung Integrierter Notfallzentren
  vorbereitet. Damit schafft sie die Grundlage für eine bessere Steuerung von akuten
  medizinischen Fällen . Ziel ist: Menschen sollen im medizinischen Notfall schneller
  die richtige Hilfe bekommen – und Notaufnahmen sollen dort entlastet werden, wo
  eine andere Versorgung besser geeignet ist. Künftig werden die verschiedenen Angebote
  stärker miteinander verbunden: Was heißt das konkret? Wer krank ist und unsicher
  ist, wohin er sich wenden soll, erhält schneller Orientierung. Ein Beispiel: Eine
  Person hat am Wochenende starke Ohrenschmerzen. Statt direkt in eine überfüllte
  Notaufnahme zu gehen, kann sie die 116 117 kontaktieren. Dort erfolgt eine medizinische
  Einschätzung und die Weiterleitung an die passende Stelle – etwa eine Bereitschaftsdienstpraxis
  oder ein Notfallzentrum. Gleichzeitig bleiben die Notaufnahmen für diejenigen frei,
  die wirklich dringend eine Krankenhausversorgung benötigen . Pflege betrifft viele
  Familien. Pflegebedürftige Menschen und ihre Angehörigen brauchen Unterstützung,
  die im Alltag funktioniert . Aber: Die Pflegeversicherung wird 2026 mit einem deutlichen
  Minus abschließen. Ohne Reform würde das Defizit nach jüngsten Schätzungen im Jahr
  2027 über 7,6 Milliarden Euro betragen, 2028 würde das Defizit bereits auf über
  15 Milliarden Euro anwachsen. Mit der geplanten Pflegereform will die Bundesregierung
  die soziale Pflegeversicherung langfristig sichern und die Unterstützung für Pflegebedürftige
  und Angehörige verbessern. Geplant sind unter anderem bessere Unterstützung für
  pflegende Angehörige, eine Stärkung ambulanter Pflegeangebote und die Weiterentwicklung
  der Versorgungsstrukturen.'
