title: Pressestatement von Bundeskanzler Merz vor seiner Reise zum NATO-Gipfeltreffen
  in Ankara „Brauchen eine starke und geeinte NATO“
text: 'Es sei wichtig, in Ankara ein „ Zeichen der Stärke und der Geschlossenheit“
  zu setzen, so Bundeskanzler Friedrich Merz. „Russland bleibt eine ernsthafte Bedrohung“,
  betonte Bundeskanzler Merz vor Abflug zum NATO -Gipfeltreffen in Ankara. Umso wichtiger
  sei es, „dass wir in Ankara ein Zeichen der Stärke und der Geschlossenheit setzen“.
  Auf deutsche Initiative solle es eine Vereinbarung dazu geben, die Ukraine mit neuen,
  weiteren Mitteln auszustatten. Der Kanzler wünsche sich, „dass es uns gemeinsam
  gelingt, einen Geist von Ankara zu wecken“. Die Botschaft, die von dem Gipfel ausgehe,
  solle sein: „Wir bauen eine europäischere NATO , damit die NATO transatlantisch
  bleiben kann.“ Schönen guten Tag, meine Damen und Herren! Herzlich willkommen auf
  dem Weg nach Ankara! Der NATO -Gipfel in Ankara findet in bewegten Zeiten statt.
  In diesen Zeiten brauchen wir eine starke und geeinte NATO als Garant unserer Freiheit
  und für unsere Sicherheit. Wir haben vor einem Jahr beim NATO -Gipfel in Den Haag
  verabredet, unsere Verteidigungsausgaben deutlich zu erhöhen. Seitdem haben wir
  viel erreicht. Deutschland hat seine Verteidigungsausgaben im Jahr 2026 bereits
  auf 124 Milliarden Euro erhöht. Seit 2022, seit dem Jahr des Beginns des Krieges
  Russlands gegen die Ukraine, haben wir unsere Ausgaben für Verteidigung verdoppelt.
  Wir leisten diesen Kraftakt nicht, um irgendjemandem einen Gefallen zu tun. Wir
  leisten diesen Kraftakt, weil es notwendig ist für unsere Verteidigung und für unsere
  Sicherheit. Denn Russland bleibt eine ernsthafte Bedrohung. Jeden Tag testet Moskau
  unsere Entschlossenheit durch Cyber angriffe, durch Sabotage, durch Ausspähversuche
  und durch gezielte Desinformationen. Umso wichtiger ist, dass wir in Ankara ein
  Zeichen der Stärke und der Geschlossenheit setzen. Wir haben das auf deutscher Seite
  intensiv vorbereitet. Ich habe in den letzten Wochen, wie Sie wissen, mehrfach Verbündete
  aus dem europäischen Raum zu Vorbereitungstreffen nach Berlin eingeladen. Ich stehe
  mit Generalsekretär Rutte, mit Präsident Trump und mit Präsident Erdoğan in engem
  Austausch insbesondere zur Vorbereitung dieses NATO -Gipfels in Ankara. Ich wünsche
  mir, dass es uns gemeinsam gelingt, einen Geist von Ankara zu wecken. Von diesem
  Gipfel soll die Botschaft ausgehen: Wir bauen eine europäischere NATO , damit die
  NATO transatlantisch bleiben kann. Wir untermauern das nicht nur verteidigungspolitisch,
  wir untermauern das auch mit unserer Verteidigungsindustrie. Premierminister Mark
  Carney hat in der vergangenen Nacht erklärt – das haben Sie mitbekommen –, dass
  sich Kanada für die Beschaffung deutsch-norwegischer U -Boote der 212- CD -Klasse
  entschieden hat. Das ist einer der größten Rüstungsaufträge, wenn nicht der größte,
  in der Geschichte der Bundesrepublik Deutschland. Das ist nicht nur wirtschaftlich
  eine schöne Nachricht, das ist auch eine gute Nachricht für unsere gemeinsame Sicherheit.
  Es ist zugleich auch eine gute Nachricht für die deutsche Wirtschaft. Wir werden
  zum Auftakt des Gipfels mit dieser Entscheidung ein starkes Zeichen für die transatlantische
  und die europäische Zusammenarbeit setzen. Denn das ist wirklich ein strategisches
  Vorhaben, das Kanada, Deutschland und Norwegen für Jahrzehnte als Partner im nordatlantischen
  Raum bindet. Es ist Ausdruck einer auf Dauer angelegten Partnerschaft. Diese Partnerschaft
  fußt auf gemeinsamen Interessen und auf gemeinsamen Werten. Sie reicht auch weit
  über die Sicherheits- und Verteidigungspolitik hinaus. Mit Mark Carney und meinem
  norwegischen Amtskollegen Jonas Gahr Støre arbeite ich seit Monaten intensiv an
  dieser Partnerschaft. Darauf werden wir in Ankara und danach weiter aufbauen. Beim
  Gipfel wird uns auch der Krieg in der Ukraine beschäftigen. Ankara könnte einen
  Einschnitt in diesem Krieg markieren. Dem Kreml dürfte langsam klar sein, dass sich
  Russland in diesem Krieg nicht durchsetzen wird und dass es seine Kriegsziele nicht
  erreichen wird. Auf deutsche Initiative soll es deshalb eine Vereinbarung geben,
  die Ukraine mit neuen, weiteren Mitteln auszustatten. 2026 und 2027 werden die europäischen
  Alliierten noch einmal 70 Milliarden Euro zusätzlich zur Verfügung stellen. Wir
  wollen zudem versuchen, die Einigkeit auszubauen, die uns beim G7 -Gipfel in Évian
  gelungen ist. Dort haben wir, wie Sie wissen, zusammen mit Präsident Trump sehr
  eindeutig gefordert, dass Moskau diesen Krieg beenden muss. Es liegt an Moskau.
  Dies ist unsere gemeinsame Überzeugung. All das stärkt die NATO , die heute europäischer
  ist denn je und doch transatlantisch verankert bleibt. In diesem Sinn hoffe ich
  auf ein gutes Treffen in Ankara, auf einen guten NATO -Gipfel und auf eine gute
  Fortsetzung der transatlantischen Zusammenarbeit mit einem deutlich gestärkten europäischen
  Pfeiler.'
