date: '2026-07-17'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 17. Juli 2026
text: 'Sprecherinnen und Sprecher •    stellvertretender Regierungssprecher Hille
  •    Deschauer (AA) •    Nübel (BMG) •    Engelke (BMJV) •    Harmsen (BMF) •    Bowinkelmann
  (BMI) •    Dr. Noack (BMVg) •    Lorenzat (BMWE) •    Zimmermann (BMUKN) (Vorsitzender
  Szent-Iványi eröffnet die Pressekonferenz und begrüßt SRS Hille sowie die Sprecherinnen
  und Sprecher der Ministerien.) Schönen guten Tag auch von mir! Es ist schön, Sie
  zu sehen. Es ist nicht ganz so voll wie am Mittwoch, aber voller, als ich gedacht
  hatte. Schön, dass Sie da sind! Wie üblich am Freitag der Blick auf die Termine
  des Bundeskanzlers in der kommenden Woche. Wie vor der Sommerpause üblich, nimmt
  die Anzahl der Termine ab. Ich darf Sie heute konkret auf zwei Termine hinweisen.
  Am Sonntag, den 19. Juli, ist der Bundeskanzler zu Gast im ZDF-Sommerinterview ,
  und zwar am Abend zur üblichen Sendezeit. Also eine Fernsehempfehlung für Sonntag:
  ZDF-Sommerinterview. Am kommenden Mittwoch findet, wie üblich, um 10 Uhr im Bundeskanzleramt
  die Sitzung des Bundeskabinetts statt. Damit bin ich für heute auch schon am Ende
  der Termine. Ich schließe direkt an. Außenminister Wadephul wird von Montag, den
  20. Juli, bis Freitag, den 24. Juli, nach Mauretanien, Nigeria und Südafrika reisen
  , um dort politische Gespräche zu führen. Der Außenminister reist somit erneut innerhalb
  weniger Monate auf den afrikanischen Kontinent, um unsere Partnerschaften mit wichtigen
  Partnern weltweit zu stärken. Europa und Afrika sind nicht nur geografisch eng verbunden,
  sondern auch politisch, wirtschaftlich und in Sicherheitsfragen. In Mauretanien
  wird der Außenminister Gespräche mit seinem Amtskollegen sowie mit dem Staatspräsidenten
  führen. Außerdem wird er ein Projekt des UN-Büros für Verbrechensbekämpfung besuchen,
  in dem es um Extremismusprävention und Deradikalisierung geht. Am Dienstag wird
  er in Lagos mit Vertreterinnen und Vertretern der nigerianischen Wirtschaft zusammenkommen.
  Am Mittwoch wird der Außenminister in Abuja Gespräche mit seiner nigerianischen
  Amtskollegin sowie dem Kommissionspräsidenten der Westafrikanischen Wirtschaftsgemeinschaft
  ECOWAS führen. Am Donnerstag wird der Außenminister Gespräche mit seinem südafrikanischen
  Amtskollegen sowie mit dem Staatspräsidenten führen. Außerdem wird er eine Rede
  am South African Institute for International Affairs halten. Der Außenminister wird
  auf seiner Reise auch von einer Wirtschaftsdelegation sowie Mitgliedern des Deutschen
  Bundestags begleitet. Dementsprechend wird es in den Gesprächen auch darum gehen,
  welche Chancen es für deutsche Unternehmen gibt und wie mehr Wohlstand durch private
  Investitionen geschaffen werden kann. Eine Frage an das Gesundheitsministerium und
  vielleicht auch an das Ministerium für Justiz und das Familienministerium. Frau
  Warken hatte im März angekündigt, dass sie sich mit den Ministerinnen Prien und
  Hubig über eine mögliche Freigabe der Eizellspende austauschen will. Die Frage ist,
  wie da der Stand der Dinge ist, ob man da schon vorangekommen ist. Ich kann gerne
  den Anfang machen; ich habe da allerdings nichts Neues mitzuteilen. Gibt es Ergänzungen?
  - Es sieht nicht danach aus. Wenn das jetzt indirekt auf das Thema Leihmutterschaft
  abzielt, dann ist meine Frage an Herrn Hille: Der Kanzler hat gestern unter Verweis
  darauf, dass er einen hochrangigen Staatsgast neben sich hat, nicht weiter auf die
  Frage geantwortet, inwieweit die CDU-Beschlusslage möglicherweise im Widerspruch
  steht zu dem, was da aktuell berichtet wird. Sieht er einen solchen Widerspruch,
  oder steht er eindeutig zur Beschlusslage? Herr Kollege, wie Sie selbst schon gesagt
  haben, hat sich der Bundeskanzler gestern zwar kurz, aber er hat sich geäußert.
  Das wiederhole ich gerne noch einmal. Der Bundeskanzler hat Jens Spahn und seinem
  Mann gratuliert. Ansonsten bleibt auch mir der Verweis darauf, dass wir in Deutschland
  eine Rechtslage haben und - Sie haben es gerade auch erwähnt - dass es in der CDU
  einen Parteitagsbeschluss gibt. Darüber hinaus muss ich Sie allerdings enttäuschen.
  Ich sitze hier als Regierungssprecher und kann deshalb weitere Ausführungen zu diesem
  Thema von dieser Stelle nicht machen. Ich habe dazu eine Frage an das Justizministerium:
  Wie weit ist die geplante Reform des Familienrechts und Abstammungsrechts ? Was
  ist da geplant? Vielleicht können Sie dazu den aktuellen Stand sagen. Die zweite
  Frage dazu: Es ging in diesem Zusammenhang immer um die sogenannte Mit-Mutterschaft.
  Eine Mit-Vaterschaft war bislang immer ausgeschlossen. Dass ein Kind zwei Väter
  hat, ist im deutschen Recht nach wie vor eigentlich nicht möglich. Ich weiß, dass
  Sie zum aktuellen Fall nichts sagen, aber ich frage mich: Gibt es in dieser Konstellation
  nur einen rechtlichen Vater? Kurz zum Thema Familienrecht und Abstammungsrecht:
  Die Ministerin hatte sich dazu gestern und auch schon in Interviews geäußert, dass
  sie sich zum Beispiel eine Ko-Mutterschaft vorstellen könnte. Aber das ist natürlich
  etwas, was politisch entschieden werden muss und wofür es derzeit nicht unbedingt
  die Mehrheiten gibt. Ihre Frage kann ich so beantworten: Qua Abstammungsrecht gibt
  es immer nur zwei rechtliche Eltern. Die Frau, die das Kind geboren hat, ist immer
  die rechtliche Mutter. Das, was Sie meinen, trifft also zu. Meine Frage geht auch
  an das Justizministerium. Korrigieren Sie mich, aber ich glaube, Sie sind federführend
  beim Menschenhandelstrafrecht. Davon ist ausbeuterische Leihmutterschaft ausdrücklich
  umfasst. Das führt mich zu der Frage: Wie kann man eine ausbeuterische Leihmutterschaft
  feststellen? Wie unterscheidet sie sich von einer Leihmutterschaft, die nicht ausbeuterisch
  ist? Ich glaube, am Ende ist es eine Auslegungssache der Gerichte, wie das gehandhabt
  wird. Ansonsten wurde zum Thema Leihmutterschaft in Deutschland schon darauf hingewiesen,
  dass wir hier Regelungen haben, die sich zum Beispiel im Embryonenschutzgesetz finden.
  Mehr kann ich dazu nicht sagen. Herr Hille, der Kanzler sagte bei dem Sommergespräch
  am Mittwoch, er hätte grundsätzlich nichts gegen eine Übernahme der Commerzbank
  durch die UniCredit . Wenn dem so ist, wieso nimmt die Regierung nicht das Gesprächsangebot
  der Italiener an, das ja schon seit Längerem vorliegt? Herr Kollege, da kann ich
  - das ist relativ komfortabel für mich - von dieser Position auf das verweisen,
  was der Kanzler am Mittwoch genau an dieser Stelle auf diesem Stuhl gesagt hat.
  Unsere Grundlinie kennen Sie. Den Worten des Kanzlers muss ich jetzt von hier aus
  nicht noch etwas hinzufügen. Unter welchen Bedingungen wäre die Regierung bereit,
  ihren 12-Prozent-Anteil an der Commerzbank an die UniCredit zu verkaufen? Genau
  das meine ich mit: Weitere Ausführungen dazu werde ich nicht machen. Ich verweise
  auf das, was der Kanzler am Mittwoch hier von dieser Stelle gesagt hat. Damit muss
  ich Sie sozusagen alleine lassen. Aber es gibt einen Bericht, wonach die Bundesregierung
  zu diesem Thema Gespräche mit der UniCredit vorbereitet. Können Sie dazu etwas sagen?
  Da kennen Sie auch schon unsere übliche Antwort. Sie verweisen auf Berichte. Das
  ist nicht unsere Gesprächsgrundlage. Wir kommentieren üblicherweise keine Presseberichterstattung.
  Eine Nachfrage an das Finanzministerium: Können Sie dazu etwas sagen? Eine Frage
  an das Innenressort: Am Mittwoch hat Minister Dobrindt beim Besuch seines österreichischen
  Kollegen noch mal erklärt, dass die Dauer der Binnenkontrollen davon abhängt, wie
  das Gemeinsame Europäische Asylsystem funktioniert, das im Juni in Kraft getreten
  ist, und dass Deutschland aktiv mit eigenen Kräften an den Außengrenzen vor Ort
  ist. Da würde mich interessieren: Wie viele sind das derzeit? Ist das alles im Rahmen
  von Frontex, bzw. ist geplant, diese Kräfte auch mit Blick auf die Schnellverfahren
  an den Außengrenzen aufzustocken? Zu der Frage, wie viele Kräfte unter deutscher
  Beteiligung im Frontex-Einsatz an den Außengrenzen der EU sind, würde ich Sie bitten,
  sich an Frontex zu wenden. Die können Ihnen die Kräftezahl bestimmt tagesaktuell
  mitteilen. Ist mit Blick auf die Einrichtung der Lager an den Außengrenzen bzw.
  der Durchführung der Schnellverfahren geplant, dort auch deutsche Kräfte vor Ort
  zu haben? Zu der Frage, ob dort deutsche Kräfte vor Ort sind oder nicht, würde ich
  Sie auch bitten, sich an Frontex zu wenden. Ich habe jetzt keine Informationen,
  die ich Ihnen mitteilen kann. Zum Thema Grenzkontrollen: Die EU-Kommission hat die
  Mitgliedstaaten noch mal aufgefordert, Grenzkontrollen an den Binnengrenzen einzustellen.
  Notifiziert ist es für Deutschland, soweit ich weiß, bis September. Beabsichtigt
  die Bundesregierung, die Notifizierung noch einmal zu verlängern? Das wird mit Betrachtung
  der Lage entschieden. Bundesinnenminister Dobrindt hat sich zuletzt bei dem angesprochenen
  Treffen mit dem österreichischen Innenminister Karner dazu geäußert, dass es das
  Ziel bleibt, die Grenzkontrollen so schnell wie möglich beenden zu können, dass
  dies aber auch vom Gelingen der Umsetzung von GEAS abhängt und dass entsprechend
  zu einem Zeitpunkt mit Blick auf die Lage entschieden wird, ob eine Verlängerung
  der Binnengrenzkontrollen über den 15. September hinaus notwendig ist. Bis wann
  müsste denn eine Verlängerung notifiziert werden? Das müsste nach meiner Kenntnis
  vier Wochen vor Ende der Frist notifiziert werden. Zur Trump-Rede von gestern Abend:
  Möchte die Bundesregierung sich dazu äußern? Herr Kollege, Sie können davon ausgehen,
  dass wir das zur Kenntnis genommen haben. Aber auch da gilt das, was wir immer bei
  diesen Themen sagen: Das kommentieren wir von dieser Stelle aus nicht. Der US-Präsident
  hat auch das Thema einer Einflussnahme auf Wahlen angesprochen. Wie ist denn da
  der aktuelle Stand bei uns in Deutschland? Was meinen Sie mit „Einflussnahme auf
  Wahlen“ und „aktueller Stand in Deutschland“? Wir lehnen natürlich, falls das sozusagen
  der Zielpunkt ist, jegliche Einflussnahmen auf Wahlen ab, in Deutschland und auch
  in anderen Ländern. Das versteht sich von selbst, denke ich. Aber ansonsten müssten
  Sie bitte ausführen, was Sie genau meinen. Vor allem ausländische Einflussnahme.
  Der US-Präsident sprach davon, dass mittlerweile viele Wählerakten im Besitz ausländischer
  Regierungen sind. Wie sieht es hier in Deutschland aus? Trifft das auch auf deutsche
  Wähler zu? Da kann ich noch einmal das betonen, was ich gerade gesagt habe, und
  das liegt in unserem Verständnis von Demokratie: Wir lehnen natürlich jeglichen
  Einfluss auf Wahlen aus dem Ausland ab, insbesondere auf unsere Wahlen in Deutschland.
  Aber das gilt auch für alle anderen Wahlen. Für Wahlen entscheidend sind die Menschen,
  die in einem Staat leben und zur Wahl gehen. Es dürfen keine wie auch immer gearteten
  anderen Kräfte darauf einwirken. Eine Sache hat Trump so gut wie gar nicht erwähnt,
  und zwar die Lage im Iran . Wie ist denn aus Sicht der Bundesregierung aktuell die
  Situation? Ich denke, Sie verfolgen genauso wie wir die Abläufe dort, die sich ja
  häufig sehr dynamisch entwickeln. Unsere Grundhaltung bleibt klar: Der Iran muss
  seine Angriffe auf die Nachbarn in der Region und auch auf andere dringend einstellen.
  Wir rufen alle Beteiligten zur Fortsetzung der Verhandlungen auf und sind der Überzeugung,
  dass das Rahmenabkommen die beste Chance bleibt, für Stabilität in der Region zu
  sorgen. Es ist völlig klar, dass es eine belastbare und dauerhafte Vereinbarung
  mit dem Iran geben muss, die die Straße von Hormus dauerhaft öffnet, ohne Zölle
  und ohne Gebühren. Natürlich muss es auch ein Abkommen zum iranischen Atomprogramm
  geben. Um das auch noch einmal ganz klar zu sagen: Der Iran darf nicht in den Besitz
  von Atomwaffen kommen. Das haben wir hier und vor allem auch der Bundeskanzler immer
  wieder betont. Eine kurze Nachfrage an das Verteidigungsministerium: Was passiert
  denn mit den beiden deutschen Schiffen, die schon in der Nähe der Region sind? Bleiben
  sie dort erst einmal? Das sind unsere beiden Boote, die „Mosel“ und die „Fulda“.
  Der Sachstand ist unverändert. Sie sind zusammen mit anderen Partnern vor Ort in
  Dschibuti und werden logistisch nachversorgt. Eine Entscheidung wird dann sicherlich
  transparent dargestellt. Aktuell gibt es dort keine Entwicklungen. Frau Deschauer,
  der Minister hat in einem Interview gesagt, die Europäische Union sollte darüber
  reden, ob man das UNIFIL-Mandat , das zum Jahresende abläuft, dann eventuell mit
  einem europäischen Mandat ersetzen sollte. Können Sie uns dazu etwas sagen? Wie
  ist da der Stand der Dinge? Ja. Das gibt mir auch die Gelegenheit, klarzustellen,
  dass der Minister das so nicht im Wortlaut gesagt hat. Es geht nicht um ein Ersetzen
  der UNIFIL-Mission, die jetzt noch läuft und die ihr Mandat bis zum Ende dieses
  Jahres am 31. Dezember erfüllt, dort einen wichtigen Beitrag leistet und die Mandatsdauer
  natürlich bestmöglich ausschöpfen soll. Ziel bleibt es insgesamt, die libanesischen
  Streitkräfte zu befähigen und so zu stärken, dass der libanesische Staat selbst
  auf dem eigenen Staatsgebiet die Hoheitsgewalt effektiv umsetzen kann. Wovon der
  Außenminister gesprochen hat, das wird im Rahmen eines Interviews, das in den kommenden
  Stunden in Gänze veröffentlicht werden wird, deutlich werden. Es geht darum, dass
  wir natürlich ein Interesse an der Stabilität des Libanon haben und sowohl im UN-Rahmen
  als auch im EU-Rahmen und natürlich auch als Europäer gemeinsam einen Blick darauf
  haben und sicherlich auch beraten, inwiefern die Europäische Union im Rahmen einer
  zivil-militärischen Missionen dort möglicherweise einen Beitrag leisten kann. Aber
  es geht nicht, um Ihren Wortlaut aufzugreifen, um ein Ersetzen einer bestehenden
  Mission. An das Gesundheits- und an das Finanzministerium: Einige gesetzliche Krankenkassen
  haben durch Fehlinvestitionen ziemlich viel Geld verloren. Es ist noch nicht klar,
  wer daran Schuld hat. Aber die Frage ist, was das aus Ihrer Sicht für Konsequenzen
  hat und ob die Bundesregierung im Zweifel bezüglich der fehlenden Gelder einspringt
  oder Beitragserhöhungen verhindert. Wie möchte man damit umgehen? Sie spielen wahrscheinlich
  auf die Berichterstattung bezüglich des Immobilienfonds an, richtig? Ich kann Ihnen
  dazu ganz grundsätzlich gern Folgendes mitteilen: Die staatliche Aufsicht über die
  insgesamt 93 Krankenkassen ist zwischen Bundes- und Landesbehörden aufgeteilt. Die
  Krankenkassen, die einen Zuständigkeitsbereich über mehr als drei Bundesländer haben,
  unterliegen der Aufsicht des BAS. Die übrigen Krankenkassen unterliegen der Landesaufsicht.
  Generell tätigen die Krankenkassen ihre Vermögensanlagen eigenverantwortlich. Eine
  Anzeige- oder Genehmigungspflicht besteht diesbezüglich nicht. Es gelten aber umfassende
  Vorgaben. Zum Beispiel müssen Mittel so angelegt werden, dass ein Verlust ausgeschlossen
  erscheint und ein angemessener Ertrag erzielt wird. Es gibt auch einen verbindlichen
  Katalog der Anlagemöglichkeiten. Das BMG hat an dieser Stelle demnach also keine
  Zuständigkeit. Ich möchte auch die Anlagepraxis der betroffenen Krankenkassen hier
  nicht kommentieren. Die Aufsicht liegt beim BAS bzw. bei den Landesbehörden. Die
  Recherchen der ARD belegen relativ deutlich, dass das Geld einfach weg ist. Ich
  habe noch nicht verstanden, was die Konsequenzen für diejenigen sind, die in diesen
  Krankenkassen versichert sind. Dafür müssten Sie sich zunächst an die Krankenkassen
  wenden. Das kann ich ad hoc nicht beurteilen. Der Bundesaußenminister war in den
  vergangenen Tagen unter anderem in Finnland und hat mehr Zivilschutz angemahnt .
  Wenn ich es richtig sehe, ressortiert das Thema beim BMI. Inwiefern wird der Bundesinnenminister
  diesen Anstoß aufgreifen? Wir brauchen keinen Anstoß in dem Sinne, weil wir beim
  Zivilschutz schon große Schritte vorangegangen sind und weiterhin große Schritte
  gehen. Denn es ist ganz klar, dass wir uns im Zivilschutz und auch in der Verzahnung
  der zivilen und militärischen Verteidigung wesentlich resilienter aufstellen müssen.
  Wir haben diese Botschaft mit dem Pakt für Bevölkerungsschutz vor wenigen Wochen
  zusammen mit Verteidigungsminister Pistorius am Berliner Hauptbahnhof kommuniziert
  und gesagt, dass wir in dem ganzen Bereich des Bevölkerungsschutzes bis 2029 allein
  zehn Milliarden Euro zur Verfügung stellen werden. Davon werden auch die Ausstattung,
  der Auftrag und die Ausbildung der Institutionen, die in diesem Bereich tätig sind
  ‑ das betrifft etwa das THW und das BBK ‑, sehr profitieren. Aus dem politischen
  Raum gibt es Stimmen, die sagen, es fehle noch eine Gesamtstrategie, was den Zivilschutz
  angehe, also zum Beispiel Zielvorgaben. Für wann ist mit einer solchen Gesamtstrategie
  für den Zivilschutz zu rechnen? Ich kann jetzt nicht genau kommentieren, was damit
  gemeint sein soll. Ich habe gerade das gemeinsame Ziel skizziert, dass wir uns im
  Bevölkerungsschutz resilienter aufstellen, den Auftrag schärfen, die Ausstattung,
  wie angesprochen, und auch die Ausbildung der Personen verbessern müssen. Wir haben
  auch im Bereich der Kommunikation an die Bevölkerung etwa mit Informationsmaterialien
  wie Flyern oder mit neuen Angeboten im Schul- und Bildungsbereich einen Fokus darauf,
  dass die Bevölkerung sensibilisiert und resilienter wird. In der vergangenen Woche
  liefen zum Beispiel Meldungen über die Agenturen, wie erfolgreich die Erste-Hilfe-Ausbildung
  und besondere Ausbildungsgänge im Bevölkerungsschutz von Schülerinnen und Schülern
  bereits angenommen werden. Eine Frage an das Verteidigungsministerium in Bezug auf
  die Regierungsumbildung in der Ukraine : Herr Pistorius und Herr Fedorow hatten
  in den vergangenen sechs Monaten ein sehr enges Arbeitsverhältnis aufgebaut. Jetzt
  gibt es einen erneuten Wechsel. Was bedeutet das für die Zusammenarbeit in Sachen
  der Verteidigung? Die Zusammenarbeit ist eng, und auch das Verhältnis war gut. Das
  konnten Sie auch dem Zitat entnehmen, das unser Minister dazu gegeben hat. Die Unterstützung
  der Ukraine wird ganz genau so und auch so intensiv weitergehen, wie sie bisher
  gelaufen ist. Selbstverständlich tauschen wir uns auch weiterhin auf allen Ebenen
  aus. Weiter kann ich die Regierungsumbildung in der Ukraine leider nicht kommentieren.
  Entwicklungshilfeministerin Radovan fordert, dass die Ausgaben für Ukrainehilfe
  aus ihrem Etat künftig ähnlich wie Verteidigungsausgaben nicht mehr unter die Schuldenbremse
  fallen sollen. Wie ist die Haltung des Kanzlers dazu, Herr Hille, und was sagt der
  Finanzminister? Herr Kollege, ehrlich gesagt habe ich noch nicht wahrgenommen, dass
  das so ist. Von daher fällt es mir schwer, das jetzt zu kommentieren. Aber als Dachbotschaft:
  Grundsätzlich haben wir den Haushalt ja aufgestellt. Alles Weitere gälte es dann,
  so es weiteren Veränderungsbedarf gibt, innerhalb der Bundesregierung zu beraten.
  Ansonsten habe ich dazu keinen anderen Stand, den ich Ihnen mitteilen könnte. Ich
  habe das Gefühl, dass ich heute nur dafür da bin, zu sagen, dass ich nichts hinzufügen
  kann. Aber das ist auch in dem Fall so. Ein neues Thema, und zwar Fischstäbchen,
  gern an das Bundeswirtschaftsministerium, aber auch an Herrn Hille: Können Sie erklären,
  ob Sie Fischstäbchen für systemrelevant halten oder wie die Bundesregierung begründet,
  dass sie sich beim Sanktionspaket gegen Russland dafür eingesetzt hat, die Fischimporte
  auszulassen? Ich kann das maximal mit einer persönlichen Note beantworten. Ich esse
  gerne Fischstäbchen. Aber das wird Sie nicht zufriedenstellen. Ansonsten würde ich
  tatsächlich auf die dafür zuständigen Kolleginnen und Kollegen verweisen. Für Sanktionen
  ist das AA federführend. Ich habe dazu keine eigenen Erkenntnisse. Für Fischstäbchen
  per se nicht, aber ich kann noch einmal darauf hinweisen, dass die Verhandlungen
  über Sanktionspakete in Brüssel natürlich wie immer vertraulich ablaufen und dass
  die Diskussionen dort entsprechend fortgesetzt werden. Zu Ihrer Ursprungsfrage nach
  der Systemrelevanz: Dafür ist das AA definitiv nicht zuständig. Herr Hille, wie
  geht man dann damit um, wenn man auf der einen Seite in der Regel versucht, andere
  europäische Partner davon zu überzeugen, die Sanktionen auf allen Ebenen hochzufahren
  ‑ das ist ja, wenn ich es richtig verstehe, nach wie vor die Haltung der deutschen
  Bundesregierung ‑, aber dann auf der anderen Seite selbst nicht dazu bereit ist,
  eventuell auf Fischstäbchen zu verzichten? Frau Kollegin, ich habe das starke Gefühl,
  dass das eine sehr starke Zuspitzung auf das Fischstäbchen ist und dass dies das
  Ganze etwas aus dem Gesamtzusammenhang rückt. Die Kollegin Deschauer hat gerade
  den Gesamtrahmen erklärt, in dem Sanktionsregime beschlossen werden. Dem kann ich,
  ehrlich gesagt, nicht mehr hinzufügen. Dem liegt natürlich immer eine Gesamtbetrachtung
  zugrunde, die innerhalb des Verbundes in der Europäischen Union getroffen wird.
  Herr Hille, es gab ja Beispiel auch keine Einigung auf eine Anpassung des Ölpreisdeckels.
  Wie bewerten Sie die Geschlossenheit der EU an dieser Stelle, was die Sanktionen
  gegenüber Russland angeht? Wir können die Fischstäbchen dabei außen vor lassen.
  Grundsätzlich ‑ das würde ich gern vorausschicken ‑ ist das übergeordnete Ziel,
  den Druck auf Russland aufrechtzuerhalten und weiter zu verstärken. Es gibt seit
  langer Zeit Verhandlungsbereitschaft auf ukrainischer Seite. Die einzige Seite,
  die einzige Person, die sich weigert, in Verhandlungen einzutreten, ist der russische
  Präsident. Dementsprechend ist es die Linie der Bundesregierung, aber auch der Europäischen
  Union, den Druck auf Russland auszuweiten. Dabei kommt den Sanktionen natürlich
  eine entscheidende Rolle zu. Deshalb sind wir in der Europäischen Union jetzt schon
  beim 21. Sanktionspaket. Das zeigt, denke ich, den gemeinsamen Willen und auch die
  Geschlossenheit. Denn ansonsten wären wir nicht beim 21., sondern beim ersten oder
  zweiten Sanktionspaket. Nach meinem Dafürhalten gibt es also eine große Geschlossenheit
  in der Europäischen Union auf dem Kurs, den hohen Druck auf Russland weiterhin aufrechtzuerhalten.
  Dazu gehört auch, dass die Sanktionen ihre Wirkung entfalten, was man sieht, wenn
  man sich anschaut, wie die Lage in Russland tatsächlich ist. Von daher sehen wir
  uns auf dem richtigen Kurs und werden ihn auch konsequent weiterbeschreiten. Ich
  möchte noch eine Ergänzung liefern, weil wir gerade auch über das Thema Öl und über
  die Tatsache, dass die vertraulichen Gespräche im Rahmen des 21. Sanktionspakets
  weiter vonstattengehen, gesprochen haben. Es ist doch völlig klar: Die Bundesregierung
  war immer und ist immer noch einer der wichtigsten Unterstützer und Forderer, der
  sich konstruktiv einbringt, wenn es darum geht, den russischen Finanzhahn zunehmend
  auszutrocknen und da sozusagen den Wasserlauf dünner werden zu lassen. Das ist seit
  geraumer Zeit die Haltung der Bundesregierung. Auch im Zentrum des 21. Sanktionspaket
  steht tatsächlich die Frage des Umgangs mit dem Ölpreisdeckel. Insofern ist es schon
  eine gute Nachricht ‑ um das einmal so einzuordnen ‑, dass dieser Deckel zunächst
  bis zum 23. Juli eingefroren ist. Die Verhandlungen gehen natürlich weiter. Die
  Sommerpause in Brüssel hat bereits begonnen, aber das Thema ist wichtig und die
  Lage ist ernst genug, um die Verhandlungen weiter voranschreiten zu lassen und insbesondere
  der russischen Kriegswirtschaft den Zufluss durch Öleinnahmen zu beschneiden. Das
  ist die Priorität. Ich glaube, ich verrate nicht zu viel, wenn ich sage, dass sicherlich
  nicht die Bundesregierung, sondern verschiedene andere Länder im Laufe der bereits
  20 bestehenden Sanktionspakete gelegentlich versucht haben, durchaus substanzielle
  Partikularinteressen einzubringen. Die Bundesregierung schaut im Rahmen dessen aber
  immer sehr konstruktiv auf das Ergebnis, und das tun wir auch jetzt genau. Wir wollen
  das 21. Sanktionspaket ermöglichen, und das bereits seit geraumer Zeit. Zum Thema
  Wassermangel an das Umweltministerium: Der Minister warnt vor ernsthaften Konflikten
  um Wasser in Deutschland. Was genau versteht der Minister darunter, und zwischen
  welchen Akteuren erwartet er diese Konflikte? Ich denke, die Akteure sind allgemein
  bekannt: Das ist natürlich ein Spannungsverhältnis zwischen allen, die vor Ort Wasser
  verbrauchen, und das kann sehr unterschiedlich sein. In der einen Region gibt es
  industrielle Großverbraucher, in der anderen nicht; in der einen Region gibt es
  mehr Wasserentnahme durch Landwirtschaft, in der anderen weniger. Natürlich gibt
  es auch private Akteure. Man kann jetzt also nicht ein Schema F nennen, was damit
  gemeint ist, sondern es kommt immer auf die ganz konkrete Konkurrenzsituation vor
  Ort an. Der Minister hat auch darauf aufmerksam gemacht, dass diese Probleme bei
  der Wasserversorgung nicht das ganze Land gleichermaßen treffen; vielmehr wird es
  immer von den konkreten Entwicklungen eines Jahres abhängen. Aber natürlich gibt
  es Regionen ‑ auch das ist allgemein bekannt ‑, die schon jetzt stärker unter Trockenheit
  und Dürre leiden. Der Minister hat beispielhaft Berlin erwähnt, wo wir auch niedrige
  Pegelstände bzw. abnehmenden Wasserfluss in der Spree sehen. Er hat für dieses Thema
  also sensibilisiert, und Sie wissen ja, dass wir mit verschiedenen Instrumenten
  schon länger daran arbeiten, insbesondere über den natürlichen Klimaschutz ‑ es
  gibt beispielsweise ein Aktionsprogramm Natürlicher Klimaschutz ‑, aber auch über
  die Wiedervernässung von Mooren. Wir können konkret da aktiv werden, wo wir das
  natürliche Potenzial, dass Wasser gehalten wird, entweder reaktivieren oder eben
  stärken, sodass in der nächsten Situation, in der es bedingt durch weniger Regenfälle
  etc. weniger neuen Wasserzufluss gibt, die Natur Wasser besser speichern kann. Zum
  anderen liegt Wasserwirtschaft in der Zuständigkeit der Länder. Deshalb gibt es
  da auch intensive Kooperationen zwischen Bund und Ländern. In der Bund-Länder-Arbeitsgruppe
  sind auch neue Leitlinien zum besseren Umgang mit Wasserkonkurrenzsituationen in
  Arbeit. Da ist der Bund stark beratend aktiv. Das gemeinsame Verständnis unter allen
  Beteiligten ist aber auch, dass es eine One-size-fits-all-Lösung, also ein Schema
  F für alle Lösungen ‑ quasi wie einheitliche Grenzwerte ‑, nicht gibt. Man muss
  vielmehr Leitlinien erarbeiten, die speziell auf die Situation vor Ort zugeschnitten
  sind. Ich denke, solche Leitlinien sollen noch in diesem Herbst verabschiedet werden.
  Das liegt jetzt aber hauptsächlich in der Hoheit der Länder, und wir arbeiten da
  mit. Es ist vielleicht noch ein bisschen früh, aber ich möchte trotzdem einmal das
  Bundeswirtschafts- und vor allem Energieministerium fragen: Die EU hat einen neuen
  Electrification Action Plan und außerdem eine Revision des ETS-Systems veröffentlicht.
  Haben Sie schon eine erste Einschätzung dazu, wie Sie das finden? Der ist tatsächlich
  gerade erst reingekommen. Dazu müssen wir uns erst noch positionieren; da bitte
  ich um Geduld.'
