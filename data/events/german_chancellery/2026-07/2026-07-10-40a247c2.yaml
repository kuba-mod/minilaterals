date: '2026-07-10'
type: press_release
source_name: german_chancellery
title: Fragen und Antworten zu Energie und Energieversorgung Genug Energie für Deutschland,
  den Urlaub und die Tankstelle?
text: 'Bundeskanzler Merz hat das klare Ziel betont, dass zentrale Produkte wie Diesel
  und Benzin verfügbar bleiben müssen. Die Versorgung in Deutschland mit LNG , Rohöl
  und Rohölprodukten ist derzeit gesichert. Lieferungen finden weiter statt. Die Lage
  rund um die Straße von Hormus zeigt, wie verletzlich insbesondere die globalen Energiemärkte
  in Krisen reagieren – in manchen Ländern werden Öl und Gas knapper und die Preise
  steigen weltweit. Für die Bundesregierung hat die sichere Versorgung mit Energie
  in Deutschland höchste Priorität – für die Wirtschaft und für die Mobilität ihrer
  Bürgerinnen und Bürger. Die kurzfristige Energiesteuersenkung und die Verschärfung
  des Kartellrechts zeigen: Die Regierung handelt bei Bedarf schnell und entlastet
  Wirtschaft und Bürgerinnen und Bürger gezielt. Gleichzeitig stellen sich im Alltag
  viele Fragen: Die Marktlage ist insgesamt angespannt, aber die physische Versorgung
  mit Kerosin ist in Deutschland derzeit gesichert. Gemeinsam mit anderen Mitgliedsstaaten
  der Internationalen Energieagentur (IEA) hat Deutschland strategische Ölreserven
  freigegeben - darunter Flugbenzin - und damit das Angebot erhöht. Weitere Reserven
  stehen zur Verfügung. Kerosin wird zudem in Deutschland in eigenen Raffinerien aus
  Rohöl hergestellt. Deutschland hat eigene Raffinerien und damit einen Vorteil gegenüber
  Ländern, die komplett von Importen abhängig sind. Deutschland bezieht nur etwa sechs
  Prozent seines Rohöls aus dem Nahen Osten. Rohöl wird vor allem aus Norwegen, den
  USA , Libyen, und Großbritannien bezogen. Echte Versorgungsengpässe gibt es derzeit
  in Asien. Dort sind die Lieferstrukturen für Öl und Kerosin anders. Das betrifft
  als wirtschaftliches Problem alle Unternehmen, die dort tätig sind. Der Luftverkehr
  ist für den Wirtschaftsstandort Deutschland wesentlich und die Bundesregierung tauscht
  sich laufend mit den Transportbranchen, mit der Industrie und der Energiewirtschaft,
  der EU -Kommission und den europäischen Partnern aus. Die EU und die Bundesregierung
  werden entschlossen reagieren, sollten sich bei der Kerosinversorgung Engpässe abzeichnen.
  Auch dies ist momentan schwer zu beanworten. Entscheidend wird ebenfalls die Frage
  sein, wie lang der Iran-Krieg mit seinen Auswirkungen andauert. Generell lässt sich
  sagen, dass die Kerosinpreise umso mehr steigen werden, je länger der Konflikt andauert.
  Dies dürfte sich auch auf die Ticketpreise auswirken. Erfahren Sie von der Flug-Annullierung,
  holen Sie weitere Informationen ein. Erkundigen Sie sich am besten bei den Ansprechpartnern
  der Airline nach der Sachlage und den Grund für die Flugstreichung. Lassen Sie sich
  den Grund der Annullierung bestätigen. Für eine mögliche Kostenerstattung empfiehlt
  es sich, Belege und Nachweise (zum Beispiel für Mahlzeiten oder Taxikosten) zu sammeln
  und diese gemeinsam mit dem Ticket bei der Fluggesellschaft einzureichen. Weitere
  Informationen finden Sie in den Fragen und Antworten zu Fluggastrechten. Ob eine
  Flugverbindung gestrichen wird, entscheidet allein die jeweilige Airline in ihrer
  unternehmerischen Verantwortung. Daher lässt sich diese Frage pauschal und zum derzeitigen
  Zeitpunkt nicht seriös beantworten. Einige Fluggesellschaften haben einige unrentable
  Flüge aus dem Programm genommen. Sollte die Krise länger andauern, könnten zunächst
  weitere Flugverbindungen entfallen, die wenig nachgefragt sind und sich für die
  Airlines kaum mehr rechnen. Konkrete Aussagen lassen sich dazu momentan nicht machen.
  Um Preissteigerungen darüber hinaus nach Möglichkeit zu verhindern, hat die Bundesregierung
  eine Senkung der Luftverkehrsteuer beschlossen. Sie soll zum 1. Juli wieder das
  Niveau von vor dem 1. Mai 2024 erreichen. Ziel ist vor allem, den Luftverkehrsstandort
  Deutschland wettbewerbsfähiger zu machen. Festzuhalten bleibt, dass die Airlines
  selbst über die Preisgestaltung ihrer Flugangebote entscheiden. Sollten Airlines
  Flüge annullieren, ist dies natürlich für jeden Einzelnen sehr ärgerlich. Üblicherweise
  gibt es jedoch bei einer Annullierung ein Angebot für eine Umbuchung oder eine Erstattung
  des Ticketpreises. Die EU -Kommission klärt derzeit, ob ein möglicher kriegsbedingter
  Kerosinmangel ein sogenannter „außergewöhnlicher Umstand“ ist und prüft, ob die
  europäische Fluggastrechteverordnung angepasst werden muss. Liegt kein „außergewöhnlicher
  Umstand“ vor, kann nach der EU -Fluggastrechte-Verordnung eine Ausgleichszahlung
  verlangt werden, wenn ein EU -Flug weniger als 14 Tage im Voraus annulliert wurde.
  Je nach Flugstrecke können dies zwischen 250 und 600 Euro sein. Mit dem digitalen
  Vorab- Check des Bundesministeriums für Justiz und Verbraucherschutz kann man sich
  ebenfalls bei einer Annullierung oder Verspätung schnell und einfach informieren.
  Beim Justiz-Service erfahren Sie, welche Voraussetzungen für eine Entschädigung
  vorliegen müssen. Der Online dienst zeigt zudem verschiedene Möglichkeiten auf,
  wie die Entschädigungen eingefordert werden können. Die unabhängige Monopolkommission
  und das Bundeskartellamt kommen zu dem Schluss, dass die Energiesteuersenkung bei
  Benzin und Diesel weitgehend bei Verbraucherinnen und Verbrauchern angekommen ist.
  Die Maßnahme hat gewirkt: Der Tankrabatt hat seine Funktion erfüllt, in einer Phase
  besonders hoher Kraftstoffpreise Preisspitzen effektiv abzufangen. Das Bundeskartellamt
  beobachtet die Preisentwicklung. Insbesondere im Nachgang zur Energiesteuersenkung
  hat die Markttransparenzstelle die Entwicklungen eng überwacht, bevor ab dem 20.
  Mai die Monopolkommission – ein unabhängiges Beratergremium der Regierung – das
  tägliche Monitoring übernahm. Es gibt deutliche regionale Unterschiede bei der Preisgestaltung
  an der Zapfsäule. Die Energiesteuer, die im Zuge des Tankrabatts für zwei Monate
  gesenkt wurde, ist lediglich ein Preisbestandteil des Kraftstoffpreises. Wie sich
  die Preise gestalten, liegt weiterhin vollständig in der Hand der Mineralölkonzerne
  beziehungsweise Tankstellenbetreiber und ist von vielen Faktoren wie der Preisentwicklung
  von Rohöl oder Transportkosten abhängig. Andreas Mundt, Präsident des Bundeskartellamts
  sagte dazu: „Die Steuersenkung auf Kraftstoffe läuft Ende Juni aus, mit einem Anstieg
  der Kraftstoffpreise ist zu rechnen. Wir werden die Preisentwicklung sehr genau
  beobachten. Unternehmen dürfen die Situation nicht dazu nutzen, Preiserhöhungen
  vorzunehmen, die sich sachlich nicht rechtfertigen lassen. Entsprechenden Hinweisen
  werden wir konsequent nachgehen.“ Von der Energiesteuersenkung profitierten insbesondere
  Autofahrerinnen und Autofahrer sowie Betriebe mit hohem Verbrauch in einer Phase
  besonders hoher Kraftstoffpreise. Die Bundesregierung analysiert stets die Lage
  der Spritpreisentwicklung und ist jederzeit handlungsfähig in Bezug auf mögliche
  weitere Maßnahmen. Zudem plant die Regierungskoalition zum 1. Januar 2027 eine Reform
  der Einkommenssteuer, um kleinere und mittlere Einkommen dauerhaft zu entlasten.
  Aktuell gilt: Die Versorgung in Deutschland ist gesichert. Bundeskanzler Merz hat
  das klare Ziel betont, dass zentrale Produkte wie Diesel, Benzin und Flugbenzin
  auch weiter verfügbar bleiben müssen. Die Bundesregierung hat bereits einen kleinen
  Teil der Ölreserven – darunter auch Kraftstoffe – freigegeben, um damit das Angebot
  im Markt zu stabilisieren. „Für den Fall, dass sich die Lage verschärfen sollte,
  sind wir auf Maßnahmen vorbereitet“, so der Bundeskanzler. Mineralölprodukte – also
  etwa Benzin und Diesel – werden überwiegend in Deutschland aus importiertem Rohöl
  hergestellt. Deutschland bezieht nur etwa sechs Prozent seines Rohöls aus dem Nahen
  Osten. Rohöl wird vor allem aus Norwegen, den USA , Libyen und Großbritannien bezogen.
  Spritpreis- Apps und Service-Portale helfen dabei, Preise zu vergleichen. Die zugelassenen
  Dienste bekommen ihre Daten von der Markttransparenzstelle. Sie erhebt aktuelle
  Kraftstoffpreise und stellt sie zur Verfügung. Vereinzelt gibt die Transparenzstelle
  auch Tipps , wann man am besten tankt, zum Beispiel nach Inkrafttreten der Spritpreisregel.
  Zum 1. Januar 2026 wurde die Pendlerpauschale dauerhaft auf 38 Cent ab dem ersten
  Kilometer erhöht. Zuvor galt dieser Satz erst ab dem 21. Kilometer. Wer täglich
  pendelt, profitiert damit deutlich stärker. Außerdem können Steuerpflichtige mit
  geringen Einkünften weiterhin die Mobilitätsprämie erhalten. Derzeit ist der deutsche
  Markt versorgt mit Öl und Gas. Die hohen Preise bewirken bereits einen verantwortungsvollen
  und sparsamen Umgang mit Energie. Ein sparsamer Umgang ist hilfreich in der derzeitigen
  Lage. Daher sind derzeit keine weiteren Energiesparmaßnahmen geplant. Die Bundesregierung
  wird die Entwicklungen weiterhin genau beobachten. Sollte es notwendig werden, besteht
  die Möglichkeit, Maßnahmen zur Sicherstellung der Energieversorgung zu aktivieren.
  Nein. Es gibt in Deutschland keine Energieversorgungskrise – anders als in den Jahren
  2022 und 2023. Unsere Energieversorgung mit Öl, Kraftstoffen, Gas und Strom ist
  derzeit gesichert, die Lage bleibt aber sehr dynamisch. Dies zeigt sich derzeit
  vor allem in den Preisentwicklungen, die aber ebenfalls nicht das Ausmaß der Jahre
  2022 und 2023 haben. Betroffen von den Knappheiten ist momentan vor allem Asien,
  das etwa 80 Prozent seines Rohöls aus dem Nahen Osten bezieht. Deutschland bezieht
  nur wenig Rohöl aus dem Nahen Osten, anders als asiatische Länder. Außerdem hat
  sich Deutschland seit 2022 breiter aufgestellt und bezieht die Energieträger aus
  verschiedenen Quellen. Die Bundesregierung hat bereits auf die Entwicklungen auf
  dem Kraftstoffmarkt reagiert. Sie senkt kurzfristig die Mineralölsteuer für zwei
  Monate und entlastet damit private Haushalte und Unternehmen um 1,6 Milliarden Euro.
  Und sie sorgt für mehr Transparenz beim Tanken. Dafür schärft sie das Kartellrecht,
  damit die Kartellbehörden schnellstmöglich und wirksam gegen missbräuchliche Kraftstoffpreise
  vorgehen können. Das Bundesministerium für Wirtschaft und Energie (BMWE) hat zudem
  mit anderen Ländern der IEA einen Teil der nationalen Ölreserven freigegeben, um
  das Angebot auf den Märkten zu stabilisieren. Die „ Task Force Energieversorgung“
  der Bundesregierung liefert dauernd ein vorausschauendes und umfassendes Lagebild
  und ermöglicht die operative Steuerung von Maßnahmen auf allen Ebenen: Für den Fall,
  dass sich die Lage verschärfen sollte, ist die Bundesregierung vorbereitet. Für
  Deutschland beobachtet und bewertet dafür auch die Bundesnetzagentur die Lage fortlaufend.
  Die Bundesnetzagentur schätzt die Gefahr einer angespannten Gasversorgung im Augenblick
  als gering ein. Gleichwohl werden Maßnahmen zur Krisenvorbereitung getroffen und
  kontinuierlich weiterentwickelt. Die physische Versorgung mit Rohöl, Raffinerieprodukten
  wie Benzin, Diesel und Kerosin ist in Deutschland derzeit weiter gesichert, bestätigt
  auch der Nationale Sicherheitsrat . Deutschland hat gemeinsam mit anderen Mitgliedsstaaten
  der Internationalen Energieagentur einen Teil der strategischen Ölreserven, darunter
  auch Flugbenzin, freigegeben. Es können zudem noch weitere Mengen freigeben werden.
  Die 32 Mitgliedstaaten der IEA haben sich im März auf Vorschlag der IEA darauf verständigt,
  Ölreserven im Umfang von insgesamt 400 Millionen Barrel (gut 54 Millionen Tonnen)
  freizugeben. Die Freigaben haben auch zu einer Entspannung auf den internationalen
  Ölmärkten beigetragen. Zweck der Reserven ist die Sicherstellung der Versorgungssicherheit.
  Deutschland hat die Freigabe am 18. März erteilt. Deutschlands Notfallreserve für
  etwa 90 Tage umfasst insgesamt etwa 20 Millionen Tonnen Rohöl und Ölprodukte. Die
  IEA hatte Deutschland gebeten, 2,6 Millionen Tonnen aus seiner Reserve freizugeben.
  Davon wird nicht alles sofort vom Markt abgenommen. Die Bundesregierung beobachtet
  die volatile Lage sehr genau und handelt, wenn nötig, um die Energieversorgung in
  Deutschland zu sichern. Das hat oberste Priorität. Die Gasspeicher sind für die
  Jahreszeit ausreichend gefüllt. Derzeit wird bereits wieder eingespeichert. Das
  heißt, dass die Füllstände steigen. Auch mit Blick auf den kommenden Winter gibt
  es bereits ausreichend Vorbuchungen. Die Füllstände sind zwar derzeit auf einem
  relativ niedrigen Niveau. Auch hier zahlt sich aber aus, dass die Gasversorgung
  auf einer breiteren und flexibleren Grundlage beruht als in der Vergangenheit. So
  kann kurzfristig durch Pipeline gas sowie LNG sichergestellt werden, das jederzeit
  ausreichend Gas in Deutschland vorhanden ist. Gasspeicher haben also bei der Energieversorgung
  relativ an Bedeutung verloren. Anders als in der Energiekrise 2022 infolge des russischen
  Überfalls auf die Ukraine gibt es derzeit keine physische Knappheit in der Gasversorgung.
  Deutschland verfügt über ausreichende Import- und Speichermöglichkeiten von Gas.
  Dank neuer LNG -Terminals und Pipelines ist die Versorgung in den letzten Jahren
  deutlich breiter und flexibler aufgestellt. Das zeigt sich auch an den Preisen am
  Gasmarkt: Sie sind derzeit zwar – nach einem deutlichen Preissprung im Februar –
  weiterhin erhöht, haben aber inzwischen wieder etwas nachgelassen und sind noch
  deutlich entfernt von den Preisspitzen in 2022. Gleichwohl ist und bleibt es sinnvoll,
  mit dem vorhandenen Gas verantwortungsvoll umzugehen. Wichtigster Gas-Lieferant
  in Deutschland ist Norwegen (etwa 44 Prozent), vor Belgien und den Niederlanden.
  Anlandungen an den deutschen LNG -Terminals machen rund 10 Prozent des importierten
  Gases aus. Über 90 Prozent des über die deutschen LNG -Terminals anlandenden Erdgases
  stammen aus den USA . Es ist das Ziel der Bundesregierung, die Abhängigkeiten im
  Energiebereich insgesamt zu reduzieren und damit die Energiesicherheit zu erhöhen.
  Dazu gehören neben dem Ausbau der Erneuerbaren Energien auch die Erschließung und
  Nutzung heimischer Energiequellen, einschließlich ausgewählter konventioneller Gasvorkommen.
  Bisher deckt Deutschland nur einen sehr geringen Teil seines Gasbedarfs aus eigenen
  Quellen. Welche Heizungsart bei einer Modernisierung oder im Neubau wirtschaftlich
  und sinnvoll ist, ist von vielen Faktoren abhängig. Die Bundesregierung hat das
  Ziel, bei der Energieversorgung technologieoffene Entscheidungen zu ermöglichen.
  Dafür wird das neue Gebäudemodernisierungsgesetz sorgen. Damit sollen beim Heizungstausch
  künftig auch wieder moderne Gas- und Ölheizungen zulässig bleiben. Die Preisentwicklungen
  für Öl- und Gas machen deutlich, dass die Wärmepumpe oftmals eine wirtschaftliche
  Option ist. Derzeit sind die Preise an den Strommärkten stabil und fallen sogar
  teilweise. Deutschland hat es also mit einer grundlegend anderen Situation zu tun
  als in der Energiekrise 2022. Grund für den damaligen Anstieg war der hohe Preis
  für Gas. Im Strommarkt bestimmt immer die Kraftwerksart den Strompreis („ Merit-Order
  -Prinzip“), die zur Deckung der Nachfrage noch benötigt wird. Das sind häufig Gaskraftwerke.
  So wird sichergestellt, dass jeweils immer die kostengünstigsten Kraftwerke Strom
  erzeugen, um die Stromnachfrage zu decken und gleichzeitig Kraftwerke, die nur selten
  zum Einsatz kommen, auch noch ihre Kosten decken können. Steigen die Gaspreise und
  ist Gas zur Stromproduktion notwendig (etwa weil nicht ausreichend Erneuerbare Energien
  zur Verfügung stehen), steigen oft auch die Strompreise. Das ist aber derzeit nicht
  in größerem Umfang festzustellen. Die Situation an den Energiemärkten bleibt gleichwohl
  volatil. Die Bundesregierung hat die Lage und Entwicklung daher weiter genau im
  Blick. Und sie hat Verbraucherinnen und Verbraucher sowie die Wirtschaft bei den
  Energiepreisen schon deutlich entlastet – um mehr als 10 Milliarden Euro alleine
  in 2026. Mehr Unabhängigkeit von fossilen Energiequellen hilft nicht nur beim Klimaschutz,
  sie schützt auch vor Preisausschlägen an den Rohstoffmärkten und geopolitischen
  Krisen. Das gilt sowohl beim Verkehr als auch beim Wohnen und in der Industrie.
  Auch daher treibt die Bundesregierung den Ausbau der Erneuerbaren Energien ambitioniert
  voran – sowohl der Solar- als auch der Windenergie. So ist der Anteil Erneuerbarer
  Energien weiterhin auf Rekordniveau. Diesen Ausbau will die Bundesregierung besser
  mit dem Ausbau der Netze synchronisieren. Das ist auch wichtig für bezahlbare Strompreise.
  Aus diesem Grund arbeitet sie derzeit an einem Netzanschlusspaket und einer Reform
  des Erneuerbaren-Energien-Gesetzes. Der Zubau soll zukünftig vor allem dort stattfinden,
  wo es noch freie Netzkapazitäten gibt.'
