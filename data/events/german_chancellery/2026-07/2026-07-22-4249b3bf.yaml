title: Besuch von Bundeskanzler Merz beim irischen Premierminister Martin in Dublin
text: Bundeskanzler Friedrich Merz wird am 28. Juli 2026 den irischen Taoiseach Micheál
  Martin in Dublin, Irland, besuchen. Anlass des Besuchs ist der am 1. Juli 2026 übernommene,
  halbjährige Vorsitz Irlands im Rat der Europäischen Union. Neben dem nächsten Mehrjährigen
  Finanzrahmen wird es um Themen wie die Wettbewerbsfähigkeit der Union, die europäische
  Erweiterungsagenda sowie um bilaterale Beziehungen gehen. Der Besuch findet im Rahmen
  eines gemeinsamen Mittagessens statt. Eine gemeinsame Pressekonferenz ist geplant.
