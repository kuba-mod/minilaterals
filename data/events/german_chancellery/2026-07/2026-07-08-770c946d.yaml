title: NATO -Gipfel in Ankara Zeichen der Einigkeit und Stärke setzen
text: 'Die 32 Staats- und Regierungschefinnen und -chefs sind zum NATO -Gipfel in
  Ankara zusammengekommen. Bundeskanzler Merz hat beim NATO -Gipfel in Ankara gemeinsam
  mit den Staats- und Regierungschefinnen und -chefs der NATO -Mitgliedstaaten wichtige
  Vorhaben beschlossen, darunter mehr europäische Verantwortung für die euro-atlantische
  Sicherheit und eine stärkere Unterstützung der Ukraine. Nach dem Gipfeltreffen zog
  Friedrich Merz eine positive Bilanz. So würden die im letzten Jahr in Den Haag beschlossenen
  Maßnahmen von den NATO -Staaten umgesetzt. „Wir lassen den Worten des letzten Jahres
  Taten folgen“, bekräftigte der Kanzler in seinem Abschlussstatement . Das betreffe
  vor allem die Erhöhung der Verteidigungsausgaben. Diese waren 2025 auf dem NATO
  -Gipfel in Den Haag beschlossen worden. Die NATO habe sich auf dem Gipfel stark
  und einig gezeigt und die Alliierten bekannten sich zum Artikel 5 des NATO -Vertrags.
  „ Wir werden die NATO europäischer machen, damit sie transatlantisch bleiben kann“,
   sagte Bundeskanzler Merz v or Beginn der ersten Arbeitssitzung der Staats- und
  Regierungschefinnen und -chefs der NATO -Staaten am Mittwoch. Statement by Prime
  Minister Mark Carney, Chancellor Friedrich Merz and Prime Minister Jonas Gahr Støre
  Bereits vor seiner Abreise zum NATO -Gipfel hatte der Bundeskanzler betont: „Ich
  wünsche mir, dass es uns gemeinsam gelingt, einen Geist von Ankara zu wecken.“ Merz
  wolle, dass die NATO europäischer werde, damit die NATO transatlantisch bleiben
  könne. Das Treffen der Staats- und Regierungschefs der NATO -Staaten habe er in
  zahlreichen Vorbereitungstreffen in Berlin mit Verbündeten intensiv vorbereitet,
  so Merz. Auch mit NATO -Generalsekretär Rutte , US -Präsident Trump sowie mit dem
  türkischen Präsidenten Erdoğan habe Merz in engem Austausch gestanden. Ein Beispiel
  für das gute Zusammenspiel der Mitglieder sei die Verabredung zwischen Kanada, Norwegen
  und Deutschland über die Zusammenarbeit im U -Boot-Bau, die am Dienstag getroffen
  worden sei. „Das wird uns im gesamten Raum des Atlantiks auf Jahrzehnte miteinander
  verbinden“, so Merz. Zudem wies Kanzler Merz darauf hin, dass die Verteidigungsanstrengungen
  in den meisten Mitgliedstaaten der EU und der NATO erheblich verbessert worden seien.
  Ankara, 7. Juli 2026: Am Flughafen von Ankara wurden Bundeskanzler Friedrich Merz
  und seine Frau Charlotte mit Blumen begrüßt. Der Kanzler nahm in der türkischen
  Hauptstadt am zweitägigen NATO -Gipfel teil. Begleitet wurde er unter anderem von
  Bundesverteidigungsminister Boris Pistorius. Zum Auftakt der politischen Gespräche
  traf Kanzler Merz den ukrainischen Präsidenten Wolodymyr Selenskyj . Zentrales Thema
  war die weitere militärische Unterstützung der Ukraine gegen den russischen Angriffskrieg.
  Im Anschluss traf sich Bundeskanzler Friedrich Merz mit dem kanadischen Premierminister
  Mark Carney und dem norwegischen Ministerpräsidenten Jonas Gahr Støre . Kanada plant
  die Beschaffung von zwölf U-Booten aus deutsch-norwegischer Entwicklung. Für den
  Kanzler ist dies „nicht nur wirtschaftlich eine schöne Nachricht, das ist auch eine
  gute Nachricht für unsere gemeinsame Sicherheit“. Ankara, 8. Juli 2026: Am zweiten
  Tag des Gipfeltreffens standen die Arbeitssitzungen aller Staats- und Regierungschefinnen
  und -chefs der 32 NATO -Mitgliedstaaten auf der Agenda. Wiedersehen unter Freunden
  und Verbündeten: Bundeskanzler Friedrich Merz und der französische Präsident Emmanuel
  Macron begrüßten sich vor der ersten Arbeitssitzung der Staats- und Regierungschefinnen
  und -chefs in Ankara. Fester Bestandteil eines jeden politischen Gipfeltreffens:
  das Familienfoto der Staats- und Regierungschefinnen und -chefs. Kurz vor Beginn
  der Arbeitssitzung können die politischen Berater noch letzte Informationen mit
  ihren Regierungschefs austauschen. Die Staats- und Regierungschefinnen und -chefs
  der 32 NATO -Mitglieder wollen unter anderem mehr Verantwortung Europas für die
  euro-atlantische Sicherheit. „Wir werden die NATO europäischer machen, damit sie
  transatlantisch bleiben kann“, sagte Bundeskanzler Merz. Im Rahmen des NATO -Gipfels
  traf Friedrich Merz auch den Gastgeber, den türkischen Präsidenten Recep Tayyip
  Erdoğan . Mit ihm tauschte er sich in einem bilateralen Gespräch aus. Ankara, 7.
  Juli 2026: Am Flughafen von Ankara wurden Bundeskanzler Friedrich Merz und seine
  Frau Charlotte mit Blumen begrüßt. Der Kanzler nahm in der türkischen Hauptstadt
  am zweitägigen NATO -Gipfel teil. Begleitet wurde er unter anderem von Bundesverteidigungsminister
