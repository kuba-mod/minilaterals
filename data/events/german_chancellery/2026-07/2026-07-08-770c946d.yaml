  und Regierungschefinnen und -chefs. Kurz vor Beginn der Arbeitssitzung können die
  politischen Berater noch letzte Informationen mit ihren Regierungschefs austauschen.
  Die Staats- und Regierungschefinnen und -chefs der 32 NATO -Mitglieder wollen unter
  anderem mehr Verantwortung Europas für die euro-atlantische Sicherheit. „Wir werden
  die NATO europäischer machen, damit sie transatlantisch bleiben kann“, sagte Bundeskanzler
  Merz. Im Rahmen des NATO -Gipfels traf Friedrich Merz auch den Gastgeber, den türkischen
  Präsidenten Recep Tayyip Erdoğan . Mit ihm tauschte er sich in einem bilateralen
  Gespräch aus. Auch die weitere militärische Unterstützung der Ukraine gegen den
  russischen Angriffskrieg haben die Staats- und Regierungschefinnen und -chefs zugesagt.
  Auf deutsche Initiative gab es eine Vereinbarung, die Ukraine 2026 und 2027 noch
  einmal mit jeweils 70 Milliarden Euro militärisch zu unterstützen. Weitere Themen
  waren der Ausbau der Kapazitäten der Verteidigungsindustrie und eine engere Kooperation
  der NATO -Mitgliedstaaten bei Rüstungsprojekten. Die Staats- und Regierungschefinnen
  und -chefs der 32 NATO -Mitgliedstaaten kommen regelmäßig in einem der Mitgliedsländer
  zusammen, um richtungsweisende Entscheidungen für die gemeinsame Verteidigung und
  die Weiterentwicklung des Bündnisses zu treffen.'
