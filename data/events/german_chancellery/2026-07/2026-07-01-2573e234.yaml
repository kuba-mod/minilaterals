title: Im Kabinett beschlossen Militärische Infrastruktur schneller ausbauen
text: 'Gebäude wie beispielsweise Truppenunterkünfte, Depots und Anlagen der Bundeswehr
  sollen schneller ausgebaut, modernisiert und gebaut werden. Die Bundeswehr steht
  vor der größten infrastrukturellen Erneuerungsaufgabe seit ihrer Gründung. Dazu
  gehören, dass Liegenschaften, Depots und Übungsanlagen schneller ausgebaut, modernisiert
  und neuerrichtet werden sollen. Zudem soll die Anbindung an den Straßen- und Bahnverkehr
  erfolgen. Dafür hat die Bundesregierung den Entwurf eines Bundeswehr-Infrastrukturbeschleunigungsgesetzes
  beschlossen. Grund für die Anpassungen sind die Herausforderungen durch die veränderte
  sicherheitspolitische Lage in Europa, die Verpflichtungen Deutschlands gegenüber
  der NATO sowie die beschlossene Erhöhung der Truppenstärke. Das bisherige Planungs-
  und Genehmigungsrecht ist nicht ausreichend auf die notwendigen Vorhaben zur Verbesserung
  der Verteidigungsfähigkeit ausgerichtet, sondern auf den Bedarf der zivilen Infrastruktur.
  Mit dem Gesetzentwurf soll dies geändert und ein zentrales Vorhaben aus dem Koalitionsvertrag
  umgesetzt werden. Künftig soll unter anderem die Bundeswehrverwaltung mit eigenen
  Behörden die militärischen Baubedarfe selbst ausführen können. Damit wird die bisherige
  Regelung ergänzt, wonach Bauaufgaben des Bundes von den Bundesländern ausgeführt
  werden. Vor allem soll die Planung und Umsetzung von Bauvorhaben beschleunigt werden,
  indem braurechtliche Vorschriften angepasst und neu geschaffen werden. Dazu wurden
  auch Ausnahmen im Umwelt- und Naturschutzrecht vorgesehen. Auch weitere Gesetze
  sollen Abläufe in der Bundeswehr vereinfachen und verbessern: Im Landbeschaffungsgesetz
  und Schutzbereichsgesetz werden die Verfahren beschleunigt und der Anwendungsbereich
  an die heutigen Bedarfe angepasst. Darunter fällt auch, dass Liegenschaften für
  den beschlossenen Bundeswehr-Zuwachs wieder aktiviert werden sollen. Der Gesetzentwurf
  enthält auch eine Anpassung im Soldatengesetz, um den Dienst in der Bundeswehr attraktiver
  zu machen. Für Soldatinnen und Soldaten, für die keine Unterbringungspflicht gilt,
  sollen beispielsweise Unterkünfte bereitgestellt werden, die die berufliche Mobilität
  und die Unterbringung am Dienstort verbessern. Die Gesamtpersonalstärke der Bundeswehr
  nimmt mit zweistelligen Zuwachsquoten weiter zu. Im April 2026 lag der Zuwachs mit
  9.500 Neueinstellungen bei einem Plus von 11 Prozent gegenüber April 2025. Mit aktuell
  rund 185.920 Soldatinnen und Soldaten verzeichnet die Bundeswehr einen Zuwachs von
  3.400 Personen im Vergleich zu 2025. Für diesen personellen Aufwuchs wird auch mehr
  Infrastruktur benötigt – für Unterbringung, Ausbildung sowie den damit verbundenen
  Zuwachs an militärischem Material.'
