title: Press conference with Chancellor Merz following the Defence Cabinet meeting
  Making NATO more European
text: 'At the joint press conference, Federal Chancellor Merz emphasised: “We want
  to make NATO as a whole more European.” For the second time in this parliamentary
  term, the Federal Cabinet met at the Ministry of Defence. NATO Secretary General
  Mark Rutte attended the meeting as a guest. The meeting focused on security and
  defence issues. The Cabinet adopted several decisions aimed at strengthening the
  Bundeswehr and making society more resilient. The Minister of Defence and the NATO
  Secretary General also took part in the subsequent press conference. In his statement,
  Chancellor Merz also addressed the topics discussed at the meeting and emphasised
  that Germany was pressing ahead with its security policy. “This is what is needed
  in a global context in which we, as Europeans, must and want to take responsibility
  quickly and decisively for ensuring our freedom, our security and also our prosperity”,
  said Merz. The Cabinet meeting was also held in preparation for the upcoming NATO
  summit, which will take place in Ankara on 7 and 8 July. The meeting follows on
  the discussions held last week in Berlin with counterparts from France, the United
  Kingdom, Italy and Poland within the E5 format and coordination with US President
  Donald Trump. Read the transcript of the press conference here : (in German only)'
