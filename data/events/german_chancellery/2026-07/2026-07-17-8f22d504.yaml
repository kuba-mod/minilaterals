date: '2026-07-17'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Pressekonferenz von Bundeskanzler Merz zu aktuellen Themen der
  Innen- und Außenpolitik am 15. Juli 2026
text: 'Meine Damen und Herren, Herr Szent-Iványi, vielen Dank für die Einladung. Ich
  freue mich, dass ich hier sein kann, noch nicht zu Beginn der Sommerpause, aber
  zum Ende der Sitzungszeit des Deutschen Bundestages vor der sitzungsfreien Zeit.
  Wir werden in der Bundesregierung noch weiterhin Gesetzgebungsarbeit leisten, auch
  über die Sommerpause hinweg, weil wir im September, Oktober, November einige große
  Vorhaben auf der Tagesordnung haben. Darauf werde ich gleich noch zu sprechen kommen.
  Ich will vielleicht mit dem ersten Halbjahr 2026 abschließen. Wir haben in der vergangenen
  Woche alle Vorhaben, die wir eingeplant hatten, durch den Bundestag und auch durch
  den Bundesrat gebracht. Das war uns wichtig. Das war zum Beispiel wichtig für das
  Investitionszukunftsgesetz, mit dem wir die gesamte Planung und Durchführung von
  Infrastrukturvorhaben für Straßen, für Wasserstraßen, für Schienenwege, aber auch
  für sonstige Vorhaben der Infrastruktur deutlich erleichtern. Das geht jetzt in
  Zukunft sehr viel schneller als in der Vergangenheit, weil wir diesen Ausbau unter
  die Überschrift des überragenden öffentlichen Interesses gestellt haben, mit der
  Folge, dass andere Abwägungen zurücktreten müssen. Wir können jetzt unsere Infrastruktur
  mit dem Geld, das wir haben, auch planungsrechtlich sehr viel schneller ausbauen.
  Das war eine wichtige Gesetzgebung. Wir haben am Freitag im Bundestag und am selben
  Tag auch im Bundesrat die umfassende Reform der gesetzlichen Krankenversicherung
  durchgebracht. Auch dieses Vorhaben hatten wir über viele Monate vorbereitet. Wir
  hatten eine entsprechende Kommission eingesetzt, die Vorschläge gemacht hat, und
  auf der Basis dieser Vorschläge ist innerhalb von zwei Wochen der Gesetzgebungsvorschlag
  fertig gewesen. Zwei weitere Wochen später waren wir damit im Kabinett. Das alles
  ist sehr zügig gegangen. Ich will den beteiligten Ressorts auch noch einmal ausdrücklich
  Dank sagen, insbesondere Nina Warken als zuständiger Gesundheitsministerin, die
  das in einer wirklich hohen Professionalität und mit einer großen Geschwindigkeit
  erfolgreich gemacht hat. Wir haben das dann im Deutschen Bundestag noch einmal ausführlich
  diskutiert und am Freitag verabschiedet. Das war eine wichtige Reform der Bundesregierung,
  der weitere folgen. Wir haben die Pflegeversicherung noch vor uns. Sie wird im Herbst
  auf die Tagesordnung kommen. Dann haben wir das große, umfassende Vorhaben der Neuordnung
  der Alterssicherung in Deutschland. Das betrifft die gesetzliche Rentenversicherung.
  Das betrifft aber eben auch die zusätzliche private und betriebliche Altersvorsorge,
  die privat und betrieblich kapitalgedeckt sein sollen, mit dem Vorschlag der Einbeziehung
  von Kapitaldeckungselementen in die gesetzliche Rentenversicherung, was ich ja schon
  mehrfach herausgehoben habe, weil ich das für einen sehr wichtigen Vorschlag ansehe.
  Das Ganze steht unter der Überschrift: Wie kommen wir zur Wettbewerbsfähigkeit unserer
  Wirtschaft zurück? ‑ Wir haben viel erreicht, aber es ist noch lange nicht genug.
  Das Thema preislicher Wettbewerbsfähigkeit ist nicht nur eine Frage der Lohnzusatzkosten,
  sondern es ist auch eine Frage etwa der hohen bürokratischen Lasten. Deswegen bin
  ich sehr dankbar, dass wir heute Morgen bereits zum zweiten Mal in dieser Wahlperiode
  ein sogenanntes Entlastungskabinett haben konnten, eine Kabinettssitzung, in der
  wir uns praktisch ausschließlich mit der Entlastung und mit der Abschaffung gesetzlicher
  Regelungen beschäftigen. Die erste Sitzung des Bundeskabinetts dazu hatten wir im
  November des vergangenen Jahres, die zweite heute. Wir haben erneut wirklich gute
  Vorschläge auf der Grundlage der Vorarbeit von Karsten Wildberger verabschiedet,
  die in Zukunft auch die Bürokratie in Deutschland weiter zurückdrängen. Diese Aufgabe
  wird uns auf Dauer gestellt sein. Das ist nichts, was wir heute abgeschlossen haben.
  Ich habe auch den Mitgliedern der Bundesregierung gesagt: Das nächste Entlastungskabinett
  kommt zum Ende des Jahres, und dann werden wir mit diesem Thema erneut versuchen,
  die Bürgerinnen und Bürger, aber auch die Unternehmen in Deutschland von hohen bürokratischen
  Lasten zu entlasten. Diese Vorhaben sind nötig und zum Teil seit vielen Jahren überfällig.
  Wir packen das an, und wir sind damit nach meiner Einschätzung auch auf einem guten
  Weg. Aber noch einmal: Das alles ist noch nicht ausreichend, um wieder dahin zu
  kommen, wo ich uns gerne sehen möchte, nämlich als eine der leistungsstarken Volkswirtschaften
  in Europa. Das alles erfordert weit mehr, und dafür sind wir, wie Sie alle wissen,
  ja auch an der Arbeit. Vielleicht erlauben Sie mir einige abschließende Bemerkungen
  zur Außenpolitik und zur Europapolitik, bevor wir in die Diskussion bzw. in die
  Frage- und Antwortrunde gehen. Ich habe von Anfang an sehr viel Wert darauf gelegt,
  dass die Bundesrepublik Deutschland wieder eine stärkere Rolle in der Europäischen
  Union spielt. Ich meine, dass uns das gut gelungen ist. Das ist nicht allein mein
  Verdienst; das ist auch die Arbeit der Kolleginnen und Kollegen in den jeweiligen
  Ressorts. Wir teilen in der gesamten Bundesregierung den Geist, dass wir, die Deutschen,
  dass die deutsche Bundesregierung eine besondere Verantwortung dafür trägt, zum
  Gelingen der europäischen Politik beizutragen. Das tun wir, wissend, dass wir auch
  da noch eine ganze Reihe von Herausforderungen zu bestehen haben. Ich will nur das
  Thema des mittelfristigen Finanzrahmens nennen, das uns im zweiten Halbjahr intensiv
  beschäftigen wird. Aber was gelungen ist: Wir haben eine übereinstimmende Auffassung
  zum Thema der Vollendung des europäischen Binnenmarktes und der Wiederherstellung
  der Wettbewerbsfähigkeit der europäischen Industrie. ‑ Ich habe ja auch mit ausgelöst,
  dass wir uns im Februar im Europäischen Rat sowohl mit Enrico Letta als auch mit
  Mario Draghi, die beide ja wirklich sehr fundamentale, gute Berichte geschrieben
  haben, der eine zum Thema des Binnenmarkts und der andere zum Thema der Wettbewerbsfähigkeit,
  einen ganzen Tag mit den 27 Staats- und Regierungschefs der Europäischen Union Zeit
  genommen haben, diese Themen zu diskutieren. Die Kommission hat jetzt Arbeitsaufträge
  bekommen, die sie Schritt für Schritt umsetzt. Wir haben uns eine sehr ehrgeizige
  Tagesordnung für das Jahr 2026 und für das Jahr 2027 gesetzt, um genau diese Vorschläge
  umzusetzen, damit wir uns in dem Umfeld, in dem wir uns als Europäer bewegen ‑ nach
  wie vor die gesamte liberale globale Ordnung unter Druck, die regelbasierte Ordnung
  unter Druck ‑ besser behaupten können. Ich weise immer wieder darauf hin, dass wir
  in dieser Europäischen Union 100 Millionen Einwohner mehr sind als die Einwohner
  der Vereinigten Staaten von Amerika. Wir könnten also sehr viel stärker sein, wenn
  wir besser zusammenarbeiten würden. Ich möchte das befördern, und ich möchte versuchen,
  das zu erreichen. Das geht weit über die strategische, militärische Zusammenarbeit
  hinaus, obwohl diese im Augenblick auch durch den Krieg in der Ukraine und die weiteren
  Herausforderungen, vor die wir gestellt sind, natürlich im Vordergrund steht. Ich
  will auch noch einmal eine kurze Bewertung des NATO-Gipfels, des G7-Treffens und
  des letzten Europäischen Rates geben. Das alles an Ereignissen, Veranstaltungen,
  großen Konferenzen, bei denen wir als Bundesrepublik Deutschland gefordert sind,
  reiht sich jetzt hintereinander, aber wir werden dem Anspruch auch zunehmend wieder
  gerecht. Wir haben auch in der militärischen, technologischen Zusammenarbeit einige
  Erfolge erzielt. In diesem Zusammenhang will ich noch einmal das Abkommen bzw. die
  Übereinkunft nennen, die wir zwischen Kanada, Norwegen und Deutschland im Hinblick
  auf den U-Boot-Bau getroffen haben. Das ist nicht nur eine militärisch-strategische
  Entscheidung; das ist auch eine wirtschaftspolitisch wichtige Entscheidung für unser
  Land. Wir werden Aufträge im hohen zweistelligen Milliardenbereich für die Werften
  in Deutschland und für die Zulieferer in Deutschland haben. Ich bin den Norwegern
  und den Kanadiern wirklich sehr dankbar dafür, dass sie mit uns diesen Weg gehen
  und dass wir das in Ankara so verabreden konnten. Das sind sozusagen Mosaiksteine
  aus einem großen Bild. Wir waren vorgestern Abend mit der sogenannten Koalition
  der Willigen noch einmal in Paris zusammen ‑ der französische Staatspräsident hatte
  noch einmal eingeladen ‑ mit einer wirklich sehr guten Beteiligung und haben auch
  die klare Entschlossenheit von uns allen zum Ausdruck gebracht, der Ukraine in dem
  andauernden Krieg, den Russland gegen die Ukraine führt, weiter zu helfen. Auch
  da will ich sagen: Ich bin zufrieden mit dem, was wir an Übereinstimmung in der
  Europäischen Union und darüber hinaus in der sogenannten Koalition der Willigen
  haben, was die Verteidigung und Unterstützung der Ukraine betrifft. Vielleicht eine
  abschließende Bemerkung zu den innenpolitischen Themen: Ich weiß ja, dass das hin
  und wieder kritisch gesehen wird. Ich empfinde die Bezeichnung „Außenkanzler“, die
  aus Ihren Reihen kommt, nicht als eine Kritik, sondern ich empfinde das auch als
  eine zutreffende Beschreibung. Denn die Außenpolitik, die Innenpolitik, die äußere
  Sicherheit, die innere Sicherheit, all das lässt sich nicht mehr voneinander trennen.
  Schauen Sie nur auf den gesamten Bereich der Migrationspolitik: Wenn es uns nicht
  gelungen wäre in der Europäischen Union eine gemeinsame Haltung dazu zu finden,
  wenn es uns nicht gelingen würde mit verschiedenen Staaten auf der Welt darüber
  zu sprechen und Rückführungen zu ermöglichen, dann wäre das innenpolitisch nicht
  so erfolgreich möglich gewesen, wie es der Bundesinnenminister erreicht hat. ‑ Insofern
  stehen Außenpolitik und Innenpolitik genauso in einem inneren Zusammenhang wie Wirtschaftspolitik,
  Außenwirtschaftspolitik und Außenpolitik. Das alles lässt sich nicht mehr voneinander
  trennen. Deswegen kann ich Ihnen heute aus meiner Sicht sagen: Ich bin zwar nie
  zufrieden mit dem, was wir erreicht haben, solange wir nicht deutlich besser dastehen,
  als wir im Augenblick dastehen, aber ich muss sagen, die Koalition hat Tritt gefasst.
  Wir befinden uns auch persönlich-menschlich in einem sehr guten Verhältnis miteinander.
  Die einzelnen Ressorts arbeiten gut zusammen. Ich arbeite mit Lars Klingbeil und
  Bärbel Bas gut zusammen in den Themen, die wir gemeinsam auf den Weg zu bringen
  versuchen. Deswegen bin ich zuversichtlich, dass uns das im zweiten Halbjahr 2026
  weiterhin gelingt, wohlwissend, dass wir nach wie vor vor großen Aufgaben stehen,
  wohlwissend, dass sich die Lage jederzeit über Nacht noch einmal vollständig verändern
  könnte und wir dann vor weiteren größeren Aufgaben stehen. Aber nehmen Sie es so,
  wie ich es für mich jedenfalls sage: Wir sind darauf vorbereitet, nicht zuletzt
  auch ‑ dies ist meine letzte Bemerkung ‑ durch die Einrichtung des Nationalen Sicherheitsrates.
  Wir haben jetzt mehrere Sitzungen dieses Nationalen Sicherheitsrates gehabt. Sie
  sind geheim. Die Themen, über die gesprochen wurde, werden nur nachher bekannt gegeben,
  ohne ins Detail zu gehen. Aber ich kann Ihnen sagen: Wir haben damit eine Institution
  geschaffen, die im Kanzleramt wirklich im umfassenden Sinne Sicherheitspolitik definiert:
  innere Sicherheit, äußere Sicherheit, Versorgungssicherheit, bis hin zu den Themen,
  die uns in diesen Tagen beschäftigen, auch Schutz der Bevölkerung zum Beispiel vor
  Hitzewellen. Diese Themen besprechen wir in einem solchen Gremium. Ich bin auch
  dankbar dafür, dass sich die Länder dazu bereiterklärt haben, durch zwei Vertreter
  an den Beratungen dort teilzunehmen. Wir integrieren also sozusagen auch die Länder
  in diese Aufgabe, die aus meiner Sicht nicht allein der Bund stemmen kann. Wir leben
  in einem föderalen Staat, und da haben die Länder und auch die Kommunen natürlich
  eine wichtige Rolle zu spielen. Dass es uns gelingt, uns im Nationalen Sicherheitsrat
  miteinander vertraulich und vertrauensvoll gut zu koordinieren und abzustimmen,
  dafür bin ich dankbar. In Deutschland ist über einen nationalen Sicherheitsrat 30 Jahre
  lang diskutiert worden. Wir haben diese Institution innerhalb von vier Monaten eingerichtet.
  Sie ist jetzt knapp ein Jahr im Amt, und ich kann nur sagen: Ich bin den Kolleginnen
  und Kollegen dankbar dafür, dass wir diese Institution haben, in der wir, wie gesagt,
  vertraulich und notfalls auch geheim sprechen können, um den Herausforderungen zu
  begegnen, vor die wir uns innenpolitisch und außenpolitisch gestellt sehen. Insofern
  schließe ich: Das erste Halbjahr 2026, das schon seit zwei, drei Wochen abgeschlossen
  ist, schließe ich mit der Zuversicht ab, dass wir auch im zweiten Halbjahr gute
  Politik für Deutschland machen. Herr Bundeskanzler, im September finden drei Landtagswahlen
  statt. In zwei Bundesländern könnte die AfD stärkste Kraft werden. Haben Sie das
  Gefühl, dass Ihre Koalition in den vergangenen Wochen alles unternommen hat, um
  dieses Szenario zu verhindern und die Wähler in Ostdeutschland zu überzeugen, oder
  sehen Sie für die kommenden Wochen noch Nachholbedarf? Frau Kollegin, wir haben
  viel getan. Wir haben auch große Reformen abgeschlossen und weitere auf den Weg
  gebracht. Die Bilanz ist positiv. Die Bundesregierung hat ihren Rhythmus gefunden,
  trotz mancher Kritik. Wir haben geliefert, und wir haben die Dimension der Aufgaben,
  die vor uns stehen, erkannt. Sie wissen, dass ich selbst gern und oft im Osten unterwegs
  bin. Ich versuche, die Menschen dort auch von dem zu überzeugen, was wir für richtig
  halten. […] Können Sie garantieren, dass Ihre CDU in Sachsen-Anhalt nicht mit der
  AfD zusammenarbeitet? Würden Sie es akzeptieren, wenn man mit den Linken zusammenarbeitet?
  Herr Bundeskanzler, Sie haben voriges Jahr hier gesagt, für die Reformen gebe es
  ein Zeitfenster bis zur Hälfte der Legislaturperiode, danach werde es schwierig.
  Das wäre also Anfang nächsten Jahres. Gibt es denn Dinge jenseits der bereits beschlossenen,
  die Sie bis dahin unbedingt noch durchbringen wollen? Sie haben ja eben gesagt,
  das sei noch nicht zu Ende. Sie haben die Bürokratie erwähnt. Gibt es noch weitere
  Dinge, oder glauben Sie, dass man das zweite Halbjahr im Wesentlichen dafür braucht,
  um das, was jetzt angestoßen wurde, überhaupt zu finalisieren und auf die Strecke
  zu bringen? Herr Kollege, wahr ist ‑ das zeigen die Erfahrungen der letzten Jahrzehnte ‑,
  dass die erste Hälfte einer Wahlperiode immer die wichtigere ist, was nicht heißt,
  dass man in der zweiten Hälfte die Hände in den Schoß legt. Wir müssen ja auch jederzeit
  in der Lage sein, auf tagespolitische Ereignisse zu reagieren. Was wir für diese
  Wahlperiode langfristig planen können, steht im Koalitionsvertrag. Ich erlaube mir,
  auch noch einmal den Hinweis zu geben, dass das, was wir vor zwei Wochen im Koalitionsausschuss
  noch einmal vorgelegt haben ‑ das waren insgesamt 34 verschiedene Vorhaben ‑, sehr
  umfassend ist und uns weit über das Jahr 2026 hinaus beschäftigen wird. Aber aus
  meiner Sicht, wenn man es einmal strategisch einzuordnen versucht, sind es innenpolitisch
  zwei Themen, die besonders wichtig sind, ohne damit andere in irgendeiner Weise
  herabzusetzen. Aber es sind zwei Themen, die aus meiner Sicht besonders wichtig
  sind. Das Erste: Wir müssen die Alterssicherung auf ein neues Fundament stellen.
  Dafür haben wir die Vorschläge. Das, was die Kommission erarbeitet hat, ist wirklich
  wegweisend. So weitreichend hat es noch nie Vorschläge gegeben, die auch in sich
  stimmig und geschlossen sind. Das Zweite: Ich habe das Thema der Bürokratie angesprochen.
  Wenn wir es jetzt wirklich schaffen, die Beweislast bei Berichts- und Dokumentationspflichten
  umzukehren, dass wir alle abschaffen und die Ministerien, die sie unbedingt behalten
  wollen, es überzeugend begründen können, warum sie sie behalten wollen, dann haben
  wir einen Paradigmenwechsel in der gesamten Bürokratie und dem, was wir Bürokratie
  nennen, hinbekommen. Das würde ich gern im zweiten Halbjahr 2026 sehen. Durch die
  Beschlüsse, die Sie schon gefasst haben, steigen ja die Lohnnebenkosten nicht ganz
  unbeträchtlich. Stichworte sind Kapitalrente und Beitragsbemessungsgrenze in der
  GKV. Können Sie sich vorstellen, noch einmal einen Anlauf zu unternehmen, um sie
  herunterzubringen, beispielsweise ‑ solche Vorschlägen gibt es ja ‑ durch eine Mehrwertsteuererhöhung,
  um die Arbeitskosten zumindest nicht noch weiter steigen zu lassen? Ich teile die
  Einschätzung, dass wir bei den Arbeitskosten nach wie vor ein Problem haben. Sie
  sind zu hoch. Das sind vor allen Dingen die Lohnzusatzkosten, die wir haben, durch
  Sozialversicherungsbeiträge, durch bürokratische Lasten der Unternehmen. Wir versuchen,
  die Reformen so zu machen, dass die Beiträge nicht weiter steigen. Das sind gewaltige
  Kraftanstrengungen. Schauen Sie einfach nur bei der GKV: Zwei Prozentpunkte Sozialversicherungsbeitrag
  sind 40 Milliarden Euro Beiträge, aufzubringen von den Beschäftigten und den Unternehmen.
  Wenn es uns gelingt, einen solchen Beitragssatzanstieg zu verhindern, dann haben
  wir damit also schon viel erreicht, aber wir haben immer noch nicht die abstrakte
  Höhe reduziert. Der Vorschlag, den die Kommission hinsichtlich der Rentenversicherung
  gemacht hat, ist in der Tat so. Aber der Unterschied ist, dass die Lohnzusatzkosten
  jetzt aufgeteilt werden. Der eine Teil fließt in die Umlage. Das sind die Beiträge,
  die für die Rentenversicherung sozusagen der aktiven Rentner notwendig sind. Der
  andere Teil, die zwei Prozentpunkte, fließt auf ein Kapitalkonto der Beschäftigten,
  also in die eigene Altersversorgung. Das ist ‑ ich sage es noch einmal ‑ ein wirklicher
  Paradigmenwechsel auch für die Alterssicherung. Ich habe immer gesagt, dass die
  Menschen in Deutschland für Alter und Gesundheit mehr sparen müssen. An dieser Stelle
  kommt es zum Ausdruck. Ich bin wirklich sehr dankbar dafür, dass wir in der Koalition
  einen Konsens darüber haben, dass bei der Altersversorgung kapitalgedeckt gespart
  wird und nicht für die Umlage. Das ist der entscheidende Wechsel, der bevorsteht.
  Deswegen ist der Vorschlag der Kommission richtig, selbst wenn es nominell zunächst
  einmal auch eine Anhebung der Sozialversicherungsbeiträge bedeutet, aber sie fließen
  eben nicht mehr in die Umlage, sondern sie fließen in den Aufbau eines eigenen Kapitalstocks,
  und das ist wirklich wichtig. Herr Bundeskanzler, wir haben uns ja immer wieder
  einmal auch mit Zitaten von Ihnen beschäftigt, auch mit Zitaten, die unterwegs gefallen
  sind. Ich sage nur: Schule im Sauerland und Iran. ‑ Jetzt lese ich in der „Westfalenpost“
  von einer Pressekonferenz am Biggesee in Ihrem Wahlkreis und dass dort vorher gesagt
  worden sei, Zitate aus der Pressekonferenz müssten vorher mit dem Bundespresseamt
  abgestimmt werden. Nun interessiert mich natürlich, ob das stimmt und was dahinter
  stecken könnte. Das kann ich Ihnen sagen. Erstens war der Biggesee der Hennesee.
  Das ist aber eine Marginalie; sie ist vielleicht unerheblich. Entscheidend war,
  dass das ein Pressehintergrundgespräch war. Üblicherweise werden, wie Sie alle wissen,
  Zitate aus Pressehintergrundgesprächen freigegeben. Nichts anderes hat auch vorgestern
  in Meschede stattgefunden. Die „Westfalenpost“ schreibt, es sei eine Pressekonferenz
  gewesen. War das dann falsch? Es war ein Pressehintergrundgespräch mit der Bitte,
  Zitate abzustimmen, wenn sie wörtlich gedruckt werden. Herr Bundeskanzler, in der
  letzten Hitzewoche sind nach Zahlen des RKI zusätzliche 4000 bis 5000 Menschen durch
  die Hitze gestorben. Wenn ich nichts verpasst habe, dann gibt es dazu bisher keine
  öffentliche Äußerung von Ihnen, weder zu den Toten noch zu den vielen Überstunden
  und der großen Arbeit der Rettungsdienste und aller anderer. Mich würde interessieren,
  warum das so ist. Sie haben wahrscheinlich, Herr Kollege, gerade gehört, dass ich
  dazu etwas gesagt habe. Wir beobachten die Lage natürlich sehr genau. Es gibt verschiedenste
  Äußerungen aus den Reihen der Bundesregierung dazu. Ich werde selbstverständlich
  auch in den nächsten Tagen und Wochen, wenn sich diese Wetterentwicklungen fortsetzen,
  die Lage weiter beobachten und dazu gegebenenfalls auch öffentlich etwas sagen.
  Wie beurteilen Sie, da damit die Auswirkungen der Klimakrise jetzt immer konkreter
  werden, aus dieser Sicht die Diskussion, die aus Ihrer Partei ja immer noch vorangetrieben
  wird, über die Aufweichung und Verschiebung der deutschen Klimaschutzziele? Wir
  haben eine Diskussion nicht nur in meiner Partei, sondern in ganz Deutschland und
  in ganz Europa über die Frage, wie wir Klimapolitik mit Wirtschaftspolitik gut verbinden
  können. Meine persönliche Auffassung war immer, dass wir niemals leugnen dürfen,
  dass es auch vom Menschen gemachten Klimawandel gibt und dass wir alles tun müssen,
  um das Problem in den Griff zu bekommen, dass wir das aber am besten schaffen, wenn
  wir in Deutschland mit den Fähigkeiten, die wir haben, Technologien entwickeln,
  die so gut sind, dass andere sie auch nutzen wollen. Das wäre der beste Beitrag,
  den Deutschland leisten könnte, um das Problem des Klimawandels weltweit in den
  Griff zu bekommen. Herr Bundeskanzler, im Koalitionsvertrag heißt es mehrfach, Sie
  wollten Familien fördern und in den Mittelpunkt stellen. Es gibt viele Formulierungen
  dazu. Nun plant Ihre Regierung ‑ ich zähle nur ein paar Beispiele auf ‑ Kürzungen
  der Rentenansprüche pflegender Angehöriger, eine erhebliche Kürzung beim Unterhaltsvorschuss
  für Alleinerziehende mit säumigen unterhaltszahlenden Partnern und eine zweimonatige
  Elterngeldkürzung, Streichung des Sofortzuschlags für von Armut besonders betroffene
  Kinder. Das trifft vor allem Frauen und ihre Kinder in den unteren Einkommensgruppen.
  Wie ist das mit dem Geist Ihres Koalitionsvertrages vereinbar? Ich nehme als Beispiel
  den von Ihnen zitierten Unterhaltsvorschuss. Wir haben seit 2017 eine Änderung des
  Unterhaltsvorschussgesetzes, das von der damaligen Familienministerin vorgeschlagen
  und konzipiert worden ist. Seitdem haben sich die Leistungen vervierfacht, innerhalb
  von acht Jahren. Wir sehen hier Entwicklungen, die wir finanziell einfach nicht
  weiter tragen können. Der Unterhaltsvorschuss ist ein Vorschuss. Eigentlich gibt
  es andere, die zum Unterhalt verpflichtet sind, nämlich diejenigen ‑ das sind in
  der Regel die Väter ‑, die ihren Verpflichtungen nicht nachkommen. Deswegen wollen
  wir versuchen, das zu korrigieren, ohne dass die Kinder davon betroffen sind. Wir
  wollen versuchen, diejenigen, die den Unterhalt leisten müssen, stärker heranzuziehen.
  Wir wollen versuchen, auch die Situation der Betroffenen weiter zu verbessern. Aber
  das geht nicht, indem wir es einfach so weiterlaufen lassen wie in den letzten Jahren.
  Wir wollen und müssen hierbei insbesondere auf die finanzielle Situation der Städte
  und Gemeinden Rücksicht nehmen. Die Städte und Gemeinden in Deutschland haben zurzeit
  in ihren Haushalten ein jährliches Defizit von bis zu 30 Milliarden Euro. Das können
  wir nicht auf Dauer aufrechterhalten. Die finanzielle Leistungsfähigkeit der Städte
  und Gemeinden ist so massiv bedroht, wie sie es in der Geschichte der Bundesrepublik
  Deutschland noch nie war. Deswegen wenden wir uns diesem Thema zu. Ich habe den
  Ministerpräsidenten im vergangenen Jahr bei einer Einladung, die ich ausgesprochen
  habe, gesagt: Ich bin bereit, über alle diese Themen zu reden. ‑ Das betrifft zum
  Teil Bundesgesetze, die aber von den Ländern und den Gemeinden ausgeführt und bezahlt
  werden müssen. Wir haben nicht zuletzt auf Grundlage dieses Gesprächs im vergangenen
  Jahr bei der letzten Ministerpräsidentenkonferenz zwischen Bundesregierung und allen
  16 Ministerpräsidenten einvernehmlich verabredet, dass wir an diesen Dingen gemeinsam
  etwas ändern. Unter anderem war auch das Unterhaltsvorschussgesetz dabei. Das wurde
  von den Ministerpräsidenten und der Bundesregierung einstimmig so beschlossen. Sie
  sagten eben, Sie wollen das ändern, ohne dass Kinder davon betroffen sind. Ihre
  Ministerin plant im Moment aber, den Vorschuss zwischen dem 16. und 18. Geburtstag
  komplett zu streichen. Das sind zwei Jahre, und das trifft natürlich 16- bis 18-Jährige.
  Das Unterhaltsvorschussgesetz ist ein Gesetz über einen Unterhaltsvorschuss. Die
  Unterhaltsleistungen, die Kindergeldleistungen sind davon nicht betroffen. Es ist
  ein Vorschuss, der gezahlt wird, damit diejenigen, die darauf angewiesen sind, Unterhalt
  zu bekommen, ihn haben, auch wenn diejenigen, die ihn leisten müssten, nicht bezahlen.
  Deswegen sprechen wir auch darüber, wie wir die Rückerstattung verbessern können.
  Das Unterhaltsvorschussgesetz galt früher bis zum 12. Lebensjahr. Es ist dann bis
  zum 18. Lebensjahr ausgeweitet worden. Jetzt überlegen wir, es wieder bis zum 16. Lebensjahr
  zu reduzieren, weil wir davon ausgehen, dass durch Schule und Betreuung die Eltern
  oder die Mütter bzw. die alleinstehenden Elternteile in der Lage sind, Arbeit aufzunehmen,
  was wir ja alle gemeinsam wollen. Das ist eine Abwägung, die wir vornehmen. Es ist
  keine abgeschlossene Gesetzgebung. Wir werden darüber in der Koalition noch ausführlich
  sprechen. Herr Bundeskanzler, die Wirtschaft trägt ihre Reformen mit, ist aber durchaus
  enttäuscht; denn man ist ja bei der kapitalgedeckten Rente in Vorleistung gegangen.
  Es ist schon erstaunlich: Sie haben selber immer kritisiert, dass die sozialversicherungspflichtigen
  Abgaben wie eine zweite Steuer wirken und die Lohnnebenkosten in Deutschland teurer
  machen, aber da ist eigentlich nichts passiert. Auch die Wochenarbeitszeit ist einfach
  einmal abgeräumt worden. Deswegen gibt es bei den Arbeitgebern und bei den Verbänden
  Gegrummel, dass das nicht ausreiche. Wir sehen ja auch täglich, wie viele Arbeitsplätze
  verloren gehen. Was wird die Regierung diesbezüglich unternehmen? Zunächst einmal
  würde ich sagen, Herr Kollege: Bei den Sozialversicherungen haben wir wirklich größte
  Kraftanstrengungen unternommen, um den weiteren Anstieg zu stoppen. Ich hoffe, dass
  uns das mit dem, was wir an Gesetzgebung gemacht haben, für die Jahre 2027 und 2028
  auch wirklich gelingt. Wir haben das Arbeitszeitgesetz nicht abgeräumt. Das ist
  nach wie vor ein unerfüllter Auftrag aus dem Koalitionsvertrag, und wir haben in
  der Bundesregierung einen Diskussionsprozess ‑ und im Übrigen auch einen Prozess
  der Beteiligung der Sozialpartner ‑, wie wir in Deutschland bei der Wochenarbeitszeit
  flexibler sein könnten. Darüber diskutieren wir. Ich gehe davon aus, dass wir im
  Herbst einen Gesetzentwurf aus dem Bundesministerium für Arbeit und Soziales bekommen.
  Wir wollen hier den Arbeitsmarkt offener, flexibler machen, und das betrifft insbesondere
  die nicht tarifgebundenen Unternehmen. Die tarifgebundenen Unternehmen haben durch
  die Tarifverträge schon heute alle Möglichkeiten, auch die Arbeitszeitmodelle flexibel
  zu gestalten. Die nicht tarifgebundenen Unternehmen haben diese Möglichkeit nicht,
  und wir wollen den nicht tarifgebundenen Unternehmen deshalb mehr Freiräume einräumen.
  Da steht im Herbst also weitere Gesetzgebung an. Mit den steigenden Sozialabgaben
  bei der Rente meine ich nicht die zwei Prozentpunkte kapitalgedeckter Vorsorge,
  sondern den Anstieg auf über 22 Prozent. Ich finde es auch persönlich enttäuschend,
  dass man, wenn man das schon angeht und eine Reform macht, diese Kosten nicht stoppt
  und sozialversicherungsfremde Leistungen nicht aus der Versicherung herausnimmt,
  um damit die Arbeit auch billiger zu machen, und das Ganze zum Beispiel in die Steuer
  packt. Das ist aber nicht passiert, sondern Sie sind da den anderen Weg gegangen,
  und demnächst sind es real über 22 Prozent. Bei der gesetzlichen Krankenversicherung
  gehen wir diesen Weg, wenn auch langsam, aber die Staatsfinanzen erlauben im Augenblick
  nicht die vollständige Übernahme in den Bundeshaushalt. Wir zahlen heute aus dem
  Bundeshaushalt ‑ ich sage das jetzt einmal nur für die gesetzliche Krankenversicherung ‑
  zurzeit 144 Euro pro Monat pro Versichertem bzw. pro Leistungsempfänger aus der
  Grundsicherung in die gesetzliche Krankenversicherung, und es wird ab dem nächsten
  Jahr eine beständig steigende zusätzliche Leistung aus dem Bundeshaushalt in die
  gesetzliche Krankenversicherung geben. Bei der Rentenversicherung ist die Definition
  der sogenannten versicherungsfremden Leistungen etwas schwieriger. Es ist trotzdem
  so, dass wir aus dem Bundeshaushalt schon heute 125 Milliarden Euro in die gesetzliche
  Rentenversicherung einzahlen, damit die gesetzliche Rentenversicherung zahlungsfähig
  bleibt. Es kann also niemand ernsthaft behaupten, wir hätten in der Rentenversicherung
  noch versicherungsfremde Leistungen, die von den Beitragszahlern bezahlt werden.
  Das wird alles ‑ und zwar mehr als alles ‑ aus dem Bundeshaushalt bezahlt. Trotzdem
  bleibt richtig, dass die Rentenversicherungsbeiträge hoch sind. Sie sind hoch, weil
  die Zahl der Rentner steigt und die Zahl der Beitragszahler allenfalls stagniert
  bzw. eher tendenziell weiter sinkt. Die Demografie hat Auswirkungen auf die Rentenversicherung.
  Deswegen wollen wir ja diese Reform im Herbst auch machen. Wir wollen eine Reform
  machen, die auf Dauer den Anstieg der Rentenversicherungsbeiträge dämpft und umkehrt
  und auf Dauer die Leistungen aus einem neuen Gesamtversorgungssystem ‑ so haben
  wir es im Koalitionsvertrag genannt ‑ steigen lässt, weil wir eine kapitalgedeckte
  zusätzliche Altersversorgung haben werden ‑ und zwar nicht nur in der privaten und
  in der betrieblichen Altersversorgung, sondern auch in der gesetzlichen Rentenversicherung.
  Das ist ja ‑ ich habe es an anderer Stelle schon einmal gesagt ‑ die eigentlich
  geniale Idee der Rentenreformkommission bzw. der Alterssicherungskommission, wie
  sie korrekterweise hieß, die gesagt hat: Warum führt ihr nicht in der Rentenversicherung,
  wo alle Daten vorhanden sind und alle Zahlungsströme bekannt sind, dieses Kapitalkonto
  ein, das individualisiert ist? Das ist übrigens der entscheidende Unterschied zwischen
  dem, was die Kommission jetzt vorgeschlagen hat, und dem, was die FDP früher einmal
  wollte. Die FDP wollte ja zunächst zehn Milliarden und dann weitere Milliarden in
  die Rentenversicherung einzahlen, um daraus Kapitalerträge für die Rentenversicherung
  zu erzielen. Diese Idee habe ich immer für falsch gehalten. Was die Kommission jetzt
  richtig macht, ist zu sagen: Wir geben jedem Versicherten vom ersten Tag an, an
  dem Zahlungen geleistet werden, ein individualisiertes, dem Staat auf Dauer entzogenes
  eigenes Kapitalkonto, und da wächst dann über die Jahre etwas auf. Ich gebe zu:
  Das wird dauern. Wir hätten das schon vor 30 Jahren machen sollen, so wie die Schweden,
  die Dänen, die Niederländer und viele andere auf der Welt, die das längst gemacht
  haben. Wir fangen jetzt aber wenigstens damit an, den Kapitalmarkt auch für die
  Altersversorgung wirklich systematisch zu nutzen, und das ist der eigentliche Wert
  dieser Reform. Herr Bundeskanzler, Ihre Regierung macht so viele neue Schulden wie
  keine andere Bundesregierung vor Ihnen. Wie begründen Sie das, warum machen Sie
  so viele Schulden? Wie hängt das mit Ihrem Auftritt im Wahlkampf zusammen, wo Sie
  ja eigentlich für die Schuldenbremse und gegen die zusätzliche Schuldenaufnahme
  eingetreten sind? Sie werden sich möglicherweise daran erinnern, dass ich schon
  lange vor der Bundestagswahl den einen oder anderen Hinweis gegeben habe, dass wir
  nach der Wahl wohl auch über die Schuldenbremse reden müssen. Ich habe das unter
  anderem auf einem Wirtschaftsforum der „Süddeutschen Zeitung“ gar nicht weit von
  hier im November 2024 schon gesagt. Wahr ist aber auch, dass ich nach der Bundestagswahl
  und vor dem Zusammentritt des neuen Deutschen Bundestages gesehen habe, dass wir
  insbesondere in der außen- und sicherheitspolitischen Lage, in der wir uns befinden,
  eine andere Antwort geben müssen, als wir sie bis dahin gegeben haben. Ein Auslöser,
  in diese Diskussion und dann auch in die Entscheidungsfindung einzutreten, war für
  mich unter anderem die Lage in der Ukraine und auch der Umgang mit der Ukraine durch
  den ein oder anderen Partner auf der Welt. Das hat bei mir ausgelöst, dass ich gesagt
  habe: Wir können das nicht weiter so finanzieren wie bisher, wir brauchen insbesondere
  in der Verteidigungspolitik eine große Kraftanstrengung. Diejenigen, mit denen wir
  das verhandelt haben, die Sozialdemokraten und die Grünen, waren überhaupt nur dazu
  bereit, diesen Weg zu gehen, wenn wir ein ähnliches Programm auch für die Infrastruktur
  auflegen. Das wiederum war für mich nur dann akzeptabel, wenn wir damit einhergehend
  auch die gesamte Frage der Planungs- und Genehmigungsverfahren auf eine völlig neue
  Grundlage stellen, so wie wir das am letzten Freitag im Infrastruktur-Zukunftsgesetz
  im Bundesrat verabschiedet gesehen haben. Insofern passt das zusammen. Ich gebe
  zu ‑ das habe ich auch schon gesagt und will das hier wiederholen ‑, das ist eine
  erhebliche Belastung meiner persönlichen Glaubwürdigkeit, die ich nur dann ausgleichen
  kann, wenn wir im Ergebnis durch die Gesetzgebung, die wir heute machen, nachweisen
  können, dass wir auf diese Weise erstens wieder verteidigungsfähig werden ‑ ich
  glaube, auf diesem Weg sind wir gut vorangekommen ‑, zweitens aber auch in unserer
  Volkswirtschaft wieder wettbewerbsfähig werden und dann auch wieder tendenziell
  sinkende Schuldenstände haben. Das Gute an dem, was wir im Augenblick haben, ist:
  Erstens ist das Rating der Bundesrepublik Deutschland an den Kapitalmärkten ist
  zurzeit nicht infrage gestellt; wir können uns zu guten Bedingungen refinanzieren.
  Zweitens sind wir nach wie vor der Stabilitätsanker in der Währungsunion. Wenn das
  nicht mehr gegeben wäre ‑ das eine oder das andere ‑, dann wäre bei mir allerdings
  der Punkt erreicht, wo ich auch dem Finanzminister sagen würde: Das können wir so
  nicht weiter vertreten. Dann müssten wir sehr hart auf die Bremse treten. Das ist
  im Augenblick aber nicht der Fall. Wann wird die Reform der Schuldenbremse kommen,
  und wie soll sie aus Ihrer Sicht am besten aussehen? Wir werden aus der von uns
  eingesetzten Kommission jetzt ja mindestens zwei, möglicherweise sogar drei unterschiedliche
  Vorschläge bekommen. Anders als bei der Alterssicherungskommission und der GKV-Finanzreformkommission
  bekommen wir aus dieser Kommission offensichtlich nicht einen einheitlichen Vorschlag.
  Das heißt, wir bleiben vor demselben Dilemma stehen, das da lautet: Wie sind die
  Vorstellungen der Koalitionsparteien im Hinblick auf die zukünftige Ausgestaltung
  der Schuldenbremse? Die Schuldenbremse steht im Grundgesetz. Wir haben die Ausnahmen
  für den Verteidigungsbereich und für den Infrastrukturbereich verfassungskonform
  verabschiedet. Wenn wir jetzt noch einmal an das Grundgesetz herangehen würden oder
  müssten, dann bräuchten wir dazu nicht nur eine einheitliche Meinung in der Koalition,
  die wir zurzeit nicht haben, sondern dann bräuchten wir dazu auch die Grünen und
  eine weitere Gruppe von Abgeordneten aus dem Deutschen Bundestag, weil wir selbst
  mit den Grünen zusammen die notwendige verfassungsändernde Mehrheit nicht haben.
  Die Hürden für eine erneute Änderung der Schuldenbremse sind also extrem hoch, sowohl
  in der Sache als auch im Verfahren. Insofern bin ich nicht sehr zuversichtlich,
  dass es uns gelingt, die Änderung der Schuldenbremse in dieser Regierung noch einmal
  auf den Weg zu bringen. Noch einmal zum Thema Wahlen: Herr Bundeskanzler, werden
  Sie persönliche Konsequenzen ziehen, wenn die AfD nach den Wahlen im Herbst einen
  Ministerpräsidenten stellt? Noch einmal konkret gefragt: Sie sagten eben, es gebe
  Parteitagsbeschlüsse. Aber hätten Sie denn ein Problem damit, wenn sich Sven Schulze
  in Sachsen-Anhalt mit den Stimmen der Linken wählen lässt? Herr Bundeskanzler, Sie
  haben die Grünen gerade schon erwähnt. Auf dem Parteitag in Baden-Württemberg hatten
  Sie gesagt, die Union und die SPD seien die verbliebenen Parteien der demokratischen
  Mitte. Warum haben Sie die Grünen nicht erwähnt? Ich habe es gerade in Ihrer Rede
  auf dem Parteitag in Baden-Württemberg nachgelesen. Ich habe noch eine Nachfrage
  zu einer Antwort, die Sie gerade gegeben haben, als es um die Schuldenbremse ging
  und inwieweit man sie reformieren könne. Da haben Sie gesagt: Wir bräuchten die
  Grünen und eine weitere Gruppe aus dem Bundestag. Wer ist dann die weitere Gruppe
  aus dem Bundestag? Wir bräuchten weitere Abgeordnete aus dem Deutschen Bundestag,
  die bereit wären, einer Grundgesetzänderung zuzustimmen. Wir bräuchten mehr Abgeordnete,
  als CDU/CSU, SPD und Grüne zurzeit miteinander haben. Da wir keine Gespräche, keine
  Verhandlungen mit der AfD führen, bleibt die Linkspartei. Ob wir mit denen über
  eine solche Frage sprechen sollen, weiß ich nicht. Im Augenblick ist es auch gar
  nicht notwendig, diese Frage zu beantworten, weil wir in der Koalition keinen geeinten
  Vorschlag zur Änderung des Grundgesetzes haben. Ich sehe ohnehin in dieser Wahlperiode
  kaum Möglichkeiten, das Grundgesetz zu ändern. Übrigens tut es dem Grundgesetz auch
  ganz gut, wenn es einmal eine Zeit lang in Ruhe gelassen wird. Das Grundgesetz ist
  durch die Änderungen der letzten Jahrzehnte nicht unbedingt nur besser geworden.
  Es ist doppelt so umfangreich geworden wie bei seiner ersten Fassung. Es ist nicht
  überall besser und es ist vor allem nicht überall verständlicher geworden. Insofern
  muss ich sagen: Wenn es in dieser Wahlperiode keine Grundgesetzänderung gibt, dann
  ist das nichts, was mich beunruhigt. Herr Merz, der Regierende Bürgermeister von
  Berlin hat mit Blick auf den Anschlag auf das Berliner Stromnetz zu Protokoll gegeben,
  er habe mit Ihnen am 4. Januar um 19.57 Uhr etwa vier Minuten lang telefoniert.
  Ihr Amt hat das nicht bestätigt. Welche Version stimmt denn nun? Konnten Sie das
  in der Zwischenzeit rekonstruieren? Herr Kollege, es ist und bleibt so, dass ich
  grundsätzlich keine Auskünfte gebe über Telefonate, die ich geführt habe. Ich gebe
  weder die Tatsache als solche der Öffentlichkeit bekannt, noch spreche ich über
  den Inhalt meiner Telefonate. Daran wird sich auch in Zukunft nichts ändern. Mit
  anderen Worten: Die Behauptung von Herrn Wegner steht jetzt sozusagen haltlos in
  der Luft? Noch einmal, Herr Kollege: Ich habe das, was andere sagen, nicht zu bewerten.
  Ich spreche bei Telefonaten, die ich führe, weder über die Tatsache, dass sie stattgefunden
  haben, noch über den Inhalt in irgendeiner Weise öffentlich. Herr Bundeskanzler,
  Sie haben auf das Treffen des Koalitionsausschusses mit den 34 Vorhaben verwiesen.
  Nach diesem Treffen haben Sie die Bürger gebeten, diesen Reformprozess zu unterstützen.
  Was meinen Sie damit genau, was sollte jeder Einzelne Ihrer Ansicht nach tun? Haben
  Sie ein persönliches Wort an die vielen Unterstützer und Anhänger der AfD, die die
  stärkste Partei im Moment laut Umfrage ist? Ja, Frau Kollegin, das habe ich so gesagt,
  und ich habe es auch so gemeint, wie ich es gesagt habe. Wir leben in einem demokratischen
  Rechtsstaat, und da ist das Volk der Souverän. Wir haben einen Auftrag auf Zeit,
  und wir versuchen, diesen Auftrag so gut wie möglich zu erfüllen. Wir können ihn
  aber nur dann gut erfüllen, wenn wir dazu auch die Zustimmung einer Mehrheit der
  Bevölkerung ‑ jedenfalls auf Dauer ‑ gewinnen bzw., wenn wir sie verloren haben,
  zurückgewinnen. […] Wir versuchen, die Freiheit und den Frieden dieses Landes zu
  erhalten, wir versuchen, die wirtschaftliche Lage zu verbessern, und wir sind nach
  bestem Wissen und Gewissen darum bemüht, unser Land zu stabilisieren und voranzubringen.
  Wir wollen keine gesellschaftspolitischen Konflikte, sondern wir wollen ein höchstmögliches
  Maß an gesellschaftspolitischer Übereinstimmung. Wissen Sie, es gibt Begegnungen
  und Ereignisse im Kleinen, die mich persönlich sehr berühren und die mich in meiner
  Absicht, dies politisch fortzusetzen, auch sehr bestätigen. Ich nenne als Beispiel
  einmal die Gedenkfeier des gestrigen Tages in Bad Neuenahr-Ahrweiler aus Anlass
  des Jahrestages der Katastrophe, die dort vor fünf Jahren passiert ist. Wenn man
  sieht, welchen Zusammenhalt es in einer solchen Stadt gibt, wenn man sieht, wie
  die Menschen jenseits aller persönlichen parteipolitischen Präferenzen in der Mitte
  der Gesellschaft zusammenarbeiten, wenn man sieht, wie da Hilfsorganisationen aus
  ganz Deutschland mit angepackt haben, mitgeholfen haben, dann sieht man auch, welche
  Kraft in unserem Land steckt und welche Bereitschaft zum Anpacken, zum Mithelfen
  da ist. An diese Kraft möchte ich gerne auch immer wieder appellieren, wenn es um
  die großen politischen Themen unseres Landes geht. Wir tun das, was wir heute tun,
  für unser Land, und wir tun es vor allem, um unseren Kindern und Enkelkindern die
  Chance zu geben, genauso gut, genauso frei und genauso friedlich zu leben, wie wir
  in den letzten 70, 75 oder 80 Jahren in Deutschland das große Privileg hatten. Das
  ist das, was mich antreibt, und davon versuche ich auch die Wählerinnen und Wähler
  zu überzeugen ‑ selbst diejenigen, die sich mit, sagen wir einmal, großer Kritik
  und zum Teil großer Aggressivität öffentlich gegen die Bundesregierung stellen.
  Das ist für mich aber kein Grund aufzugeben. Im Gegenteil, ich werde meine Bemühungen
  fortsetzen und wo immer notwendig auch verstärken. Wenn Sie sagen bzw. darauf hinweisen,
  die Menschen sollten sich nicht nur über Social Media informieren: Was wäre denn
  Ihr Appell, wie sollen die Menschen über, was Sie machen ‑ aus Ihrer Sicht die guten
  Reformen ‑ erfahren? Glauben Sie, dass noch Zeit ist, die Menschen wirklich zu erreichen?
  Frau Kollegin, es ist selten zu früh und nie zu spät. Das ist immer möglich, selbstverständlich.
  Wenn ich mir erlauben darf, das zu sagen: Sie in den Medien sind ein Teil unserer
  politischen Ordnung. Ich bin heute auch hier bei Ihnen, um zu versuchen, genau das
  zum Ausdruck zu bringen, und Sie werden es in der Weise, die Sie für richtig halten,
  transportieren. Unsere Kommunikation mit der Öffentlichkeit findet auch über Sie
  statt, und ich versuche das in der mir bestmöglichen Weise zu tun. Ich bin ja auch
  viel im Land unterwegs und nehme viele Einladungen an ‑ auch zu vielen Gesprächen,
  die nicht unter dem Scheinwerfer der Öffentlichkeit stattfinden. Ich glaube, dass
  ich mir ein Urteil darüber bilden konnte, was in Deutschland nach wie vor möglich
  ist und welche Kraft nach wie vor in unserem Land steckt, und diese Kraft versuche
  ich zu mobilisieren. Herr Bundeskanzler, schön, dass Sie auch Fragen der ausländischen
  Presse beantworten. ‑ Ich habe eine Frage in Bezug auf einen Podcast des RND. Da
  war davon die Rede, dass Sie sich mit dem Chef von Axel Springer getroffen und über
  die AfD gesprochen haben und dass er Sie zur Zusammenarbeit mit der AfD gedrängt
  haben soll. Was würde mit dem internationalen Image der Bundesrepublik Deutschland
  passieren, wenn die AfD zum Beispiel in einem Bundesland regieren würde? Zunächst
  einmal will ich zu dem zitierten Gespräch oder den Gesprächen sagen: Ich werde weder
  darüber sprechen, ob ein solches Gespräch stattgefunden hat, noch werde ich über
  Inhalte von Gesprächen, die ich führe, etwas sagen. Da werde ich in jeder Hinsicht
  die Vertraulichkeit wahren. Ich komme aus den Niederlanden, und da hat man die radikale
  Rechte um Geert Wilders an der Regierung beteiligt. Dieses Experiment ist ziemlich
  schnell kläglich gescheitert. Was würde passieren, wenn man so etwas in Deutschland
  machen würde, und was lernen Sie quasi aus den Ergebnissen in den Niederlanden?
  Für Deutschland lerne ich daraus gar nichts, weil es für Deutschland etwas anderes
  ist. Wenn in Deutschland eine rechtsradikale Partei in eine Regierung käme, hätte
  das eine völlig andere Bedeutung, als wenn das in einem anderen Land in der Europäischen
  Union geschieht. Das hängt auch mit unserer Geschichte zusammen. Deswegen ist das
  für mich weder ein Maßstab, noch ein Beispiel, noch ein Lernobjekt. Das ist schlicht
  und ergreifend etwas anderes. Ich werde in Deutschland alles tun, was in meiner
  Kraft steht, um es zu verhindern. Herr Bundeskanzler, Sie haben eben gesagt, die
  Koalition arbeite inzwischen erfolgreich und habe ihren Rhythmus gefunden. Ergibt
  sich für Sie daraus, dass man diese Koalition als ein Projekt denken sollte, das
  über diese Legislaturperiode hinausgeht? Haben Sie sich selbst schon entschieden,
  ob Sie für eine zweite Amtszeit zur Verfügung stehen? Herr Kollege, vielen Dank. ‑
  Ich habe die Koalition nie als Projekt bezeichnet, sondern ich habe immer gesagt:
  Es ist eine Arbeitskoalition. Das ist zurzeit auch die einzige parlamentarische
  Mehrheit in der Mitte, die wir in Deutschland haben können. Insofern ist das eine
  Koalition, die für diese Wahlperiode im Amt ist und für diese Wahlperiode ihre Arbeit
  macht. Über alles andere denke ich heute nicht nach. Es gibt Äußerungen von Ihnen,
  die zumindest darauf hindeuteten, dass Sie Interesse daran hätten, noch länger zu
  machen. Wann ist für Sie der Zeitpunkt gekommen, so eine Entscheidung zu treffen?
  Das kann ich Ihnen noch nicht sagen, Herr Kollege. Der Zeitpunkt ist jedenfalls
  jetzt nicht da. Ich konzentriere mich auf die Arbeit, die wir in der Koalition leisten
  müssen und die absorbiert mich wirklich vollständig. Herr Bundeskanzler, Sie sind
  vor einem Jahr mit dem Versprechen einer Wirtschaftswende angetreten. Die Menschen
  würden schon im Sommer einen Unterschied merken, dass Ihre Regierung etwas verändert.
  Ein Jahr später machen sich die Deutschen große Sorgen um den Wirtschaftsstandort
  Deutschland. Deshalb noch mal von heute aus gefragt: Bis wann dürften die Menschen
  denn einen Unterschied oder einen wirtschaftlichen Aufschwung erwarten? Frau Kollegin,
  die Reformen, die wir auf den Weg bringen, dauern länger als gedacht. Ich weiß aber
  auch, dass es nicht nur von uns abhängt. Wir sind im letzten Jahr in der Bundesregierung
  in einem sich abzeichnenden Aufschwung hinein angefangen. Der ist sehr stark infrage
  gestellt bzw. beschädigt worden durch die amerikanische Zollpolitik und die globalen
  Ungleichgewichte, die wir an verschiedenen Stellen sehen, nicht zuletzt im Hinblick
  auf massiv subventionierte Importe und auf eine deutlich unterbewertete Währung
  des einen oder anderen Wettbewerbers. ‑ Das ist die Situation, mit der wir heute
  konfrontiert sind. Ich bleibe trotzdem zuversichtlich, dass uns das Stück für Stück
  gelingt. Wir haben Entscheidungen getroffen, die in der deutschen Wirtschaft auch
  auf Zustimmung stoßen. Wir sehen, dass in verschiedenen Branchen wieder eingestellt
  wird. Gleichwohl sehen wir andere, in denen nach wie vor Unternehmen und Unternehmensteile
  geschlossen werden. Ich gebe Ihnen ein Beispiel ‑ das ist ein Beispiel, das ich
  auch gerne nehme, um meinen Optimismus zu begründen ‑: Wir haben im letzten Jahr
  in Deutschland 3500 Start-up-Gründungen gehabt. Das war die Höchstzahl, 30 Prozent
  mehr als im Vorjahr. Wir sind in diesem Jahr schon im ersten Halbjahr bei 3000.
  Das heißt, junge Unternehmen werden in Deutschland gegründet. Junge Menschen gründen
  in Deutschland Unternehmen. Es sind nicht immer nur Jüngere, aber meistens sind
  es Jüngere, die diese Unternehmen gründen. Das heißt, wir haben eine sehr stark
  ansteigende Zahl von Unternehmensneugründungen in Deutschland ‑ und diejenigen Unternehmen,
  die heute neu gegründet werden, können morgen die Champions sein, die auch für Beschäftigung
  und Wohlstand in Deutschland sorgen. Deswegen sehe ich diese Zahlen ‑ ‑ ‑ Für mich
  ist das Glas immer halb voll und nie halb leer. Ich glaube, wir haben die Chance,
  auf diesem Weg weiter voranzukommen und im nächsten Jahr wieder deutlich bessere
  Zahlen zu sehen als in diesem. Weil Sie die Reformen gerade angesprochen haben,
  die deutlich länger dauern als gedacht: Könnten Sie den Fahrplan noch einmal skizzieren?
  Was muss noch passieren in der zweiten Jahreshälfte oder vielleicht auch schon im
  nächsten Jahr? Ich habe Ihnen ja gerade die Reformvorschläge genannt, die auf dem
  Tisch liegen. Ich habe die beiden großen Themen genannt, die für mich in dieser
  Zeit innenpolitisch besonders wichtig sind. Daran können Sie aber keine Zahlen ablesen,
  wohin sich die wirtschaftliche Entwicklung im nächsten Jahr begibt. Ich hoffe, dass
  wir aus dieser strukturellen Wachstumskrise herauskommen. Wir tun in der Bundesregierung
  alles dafür, um das hinzubekommen. Ich gebe allerdings auch zu bedenken: Das hängt
  nicht allein von uns ab. Schauen Sie die Entwicklung des Ölpreises an. In dem Augenblick,
  in dem der Ölpreis deutlich über 100 Dollar für den Barrel Öl geht, haben wir ein
  massives Energieversorgungsproblem zusätzlich. Das heißt, wir können innenpolitisch
  viel tun, aber wir können nicht alles tun. Wir sind stark von der Weltkonjunktur,
  von der Weltwirtschaft abhängig. Ein Land wie Deutschland ist immer stark von der
  Exportwirtschaft abhängig. Wenn die gut läuft, läuft es für Deutschland insgesamt
  gut. Wenn der Export schlecht läuft, dann ist es für uns alle ein Problem. Wir haben
  also einen Teil in der eigenen Hand, aber bei weitem nicht alles. Herr Bundeskanzler,
  ich hätte ganz gerne zum Thema China gefragt, weil das sowohl die Außenpolitik,
  die Wirtschaftspolitik als auch die Innenpolitik beschäftigt. Sie haben mehrfach
  in den letzten Wochen gesagt ‑ eine Sache, die viele überrascht hat ‑, dass Sie
  wegen der Unterbewertung des Yuan unbedingt mit den Chinesen reden wollen. Viele
  haben noch nicht ganz verstanden, wie Sie das eigentlich machen wollen. Was schwebt
  Ihnen da genau vor? Wollen Sie mit den Chinesen verhandeln? Soll das die EZB machen?
  Was soll passieren, wenn sich die Chinesen auf so einen Dialog nicht einlassen?
  Herr Kollege, vielen Dank. Ich habe dieses Thema in der Tat bereits zweimal im Europäischen
  Rat angesprochen. Ich habe auch die Kommissionspräsidentin gebeten, das im Europäischen
  Rat der Wirtschafts- und Finanzminister der Eurozone zu tun, also im ECOFIN-Rat.
  Das ist eine Aufgabe, die jetzt insbesondere der Vorsitzende der ECOFIN-Gruppe,
  der Eurogruppe, übernehmen muss. Wir haben eine gemeinsame Währungspolitik in Europa,
  im Euroraum, und da müssen wir auch die Interessen gemeinsam wahrnehmen. Wir können
  auf Dauer nicht akzeptieren, dass Länder auf der Welt, insbesondere dann, wenn sie
  große Wettbewerber sind, künstlich ihre Währung im Außenverhältnis niedrig bewerten
  und dadurch Wettbewerbsvorteile wahrnehmen, die sie ohne eine solche Währung nicht
  hätten. Ich gebe zu: Wir haben in Deutschland auch schon einmal längere Phasen gehabt,
  in denen die D-Mark, die wir damals noch hatten, unterbewertet war. Das ist ein
  Teil unseres Erfolgsmodells gewesen. Dagegen hat es in der Europäischen Union immer
  wieder auch erhebliche Vorbehalte gegeben. Ich will mal nur daran erinnern: Historisch
  ist eine der Antworten, die wir in Europa gegeben haben, das von Helmut Schmidt
  und Giscard d''Estaing in den 70er Jahren entwickelte europäische Währungssystem
  gewesen, in dem man sich auf Wechselkurskorridore verständigt hat. Das ist kein
  Vorbild, keine Blaupause für das, was mir mit anderen vorschwebt. Aber Verabredungen
  zu treffen, dass zum Beispiel Länder, die sehr stark exportieren, auch Schritt für
  Schritt ihre Kapitalmärkte öffnen, dass sie Schritt für Schritt auch die freie Konvertibilität
  der eigenen Währung ermöglichen, das halte ich für zwingend notwendig. Wir können
  es jedenfalls aus europäischer Sicht ‑ da spreche ich gar nicht mehr nur aus deutscher
  Sicht ‑ nicht auf Dauer akzeptieren, dass wir in einen Wettbewerb gehen müssen,
  in dem wir auf der anderen Seite eine um 25 bis 30 Prozent zu niedrig bewertete
  Währung sehen. Wir können hier machen, was wir wollen. Wenn das nicht korrigiert
  wird, dann werden wir immer die Nachteile zu spüren bekommen, nicht zuletzt durch
  sehr hohe Importe, durch subventionierte Produkte und letztendlich auch durch Preise,
  die mit dem, was an freien, offenen Märkten, Währungsmärkten, an Preisen herausgebildet
  wird, nicht konkurrieren können. Es gibt ja auch Verhandlungen mit China, ob chinesische
  Hersteller nicht auch deutsche Automobilwerke übernehmen, weil es hier Absatzprobleme
  gibt. Haben Sie damit eigentlich grundsätzlich Probleme oder würden Sie zum Beispiel
  im Fall von Volkswagen befürworten, dass chinesische Investoren da einsteigen? Das
  müssen die jeweiligen Unternehmen entscheiden, ob sie das wollen oder nicht. Das
  ist dann jeweils eine Frage der Eigentümer. Ich sehe das als eine Notlösung an,
  nicht als eine Lösung der eigenen strukturellen Probleme. Aber, noch einmal, das
  ist keine Frage, die die Politik zu entscheiden hat. Das ist eine Entscheidung,
  die die Unternehmen und in den Unternehmen die Eigentümer entscheiden müssen. Herr
  Bundeskanzler, noch einmal eine Frage mit Blick auf die Rekordhitzewelle jetzt Ende
  Juni 2026: Da haben viele ja ein klares Bekenntnis von Ihnen zu verstärkten Klimaschutzmaßnahmen
  vermisst. Man gewinnt langsam den Eindruck, dass Klimaschutz für Sie eher ein nachrangiges
  Thema ist. Darum die Nachfrage: Bleibt neben den ganzen politischen Baustellen,
  die derzeit herrschen, dafür einfach nicht die Zeit? Wenn Sie mal größere Reden
  von mir hören, Parteitagsreden, aber auch andere, dann lasse ich kaum eine Gelegenheit
  aus, darauf hinzuweisen, dass wir hier wirklich ein fundamentales Problem haben,
  das wir auch gemeinsam lösen müssen. Das betrifft natürlich auch den aktuellen Sachverhalt,
  den Gesundheitsschutz der Bevölkerung. Das hat für Bund, Länder und Gemeinden Priorität.
  Dazu sind wir auch mit den Ländern und den Gemeinden in einem engen Austausch. Wir
  sind hier mit den begrenzten Möglichkeiten der Bundespolitik, aber natürlich jederzeit
  bereit, auch mit den Ländern und den Städten und Gemeinden über Maßnahmen zu sprechen,
  die wir gemeinsam ermöglichen können. Das ist völlig klar. Aber wir sehen auch die
  großen Ursachen, und dazu zählt der Klimawandel. Ich habe eben schon gesagt: Wir
  sind ohne jede Einschränkung als Bundesregierung engagiert. Wir haben uns ja auch
  an diesem großen Fonds beteiligt, der jetzt in Brasilien zum Schutz der Regenwälder
  aufgelegt wird. Ich habe das bei meinem Besuch in Brasilien mit Zustimmung der gesamten
  Bundesregierung auch angekündigt. Der Bundesumweltminister hat es anschließend mit
  der Absprache, die wir getroffen haben, konkretisiert, dass wir jetzt zehn Jahre
  hintereinander 100 Millionen Euro aus dem Bundeshaushalt zur Verfügung stellen,
  um dieses Programm in Brasilien zum Erfolg zu bringen. Wir sind da also wirklich
  engagiert. Aber wahr ist auch: Wir können den Klimawandel allein aus Deutschland
  oder Europa heraus nicht aufhalten. Deswegen wird eine zweite große Aufgabe sein,
  mit dem Klimawandel zu leben. Das muss sich im Baurecht niederschlagen. Das muss
  sich in der Gesundheitsvorsorge niederschlagen. Das muss auch im Schutz von besonders
  vulnerablen Gruppen zum Ausdruck kommen. Ich nenne einmal nur das Beispiel Krankenhäuser
  und Altenheime. Da sind wir mit Bund, Ländern und Gemeinden gemeinsam unterwegs,
  um alles zu tun, was in unserer Kraft steht, um die Menschen zu schützen. Sie haben
  gerade auch die Verteilung zwischen Bund und Ländern angesprochen. Viele Experten
  fordern ja eine Art gesamtstaatliche Leitlinie, insbesondere für Klimaanpassungsmaßnahmen,
  statt die Verantwortung dann an die Länderebene oder an die Kommunen weiterzugeben.
  Wie stehen Sie dazu? Das ist keine Frage der Abgabe oder des Weitergebens von Verantwortung.
  Da stehen wir gemeinsam als Bund, Länder und Gemeinden in der Verantwortung. Genau
  an solchen Konzepten wird gearbeitet. Herr Bundeskanzler, Sie haben immer wieder
  betont, dass die Wiederherstellung der Verteidigungsfähigkeit Deutschlands eine
  Priorität der Bundesregierung ist. Das heißt ja im Umkehrschluss, dass Deutschland
  jetzt und auf absehbare Zeit nicht verteidigungsfähig ist. Bereitet Ihnen das schlaflose
  Nächte? Soweit würde ich nicht gehen. Aber mir bereitet das Sorge, dass wir zurzeit
  nicht da sind, wo wir sein müssten. Denn wir sehen ja die Bedrohung, die uns sozusagen
  jeden Tag vor Augen geführt wird. Wir haben es mit massiver Sabotage zu tun, wir
  haben es mit Ausspähversuchen zu tun, wir haben es mit Angriffen auf unsere Datennetze
  zu tun. Das sind alles Formen der hybriden Kriegsführung gegen Deutschland. Ich
  habe schon einmal den Satz gesagt, den ich auch wiederhole: Wir leben nicht im Krieg,
  aber wir leben auch nicht mehr im Frieden. ‑ Diese Bedrohung ernst zu nehmen, ist
  zunächst einmal eine politische Aufgabe. Sie zu beschreiben, sie zu begründen, sie
  zu erläutern, das ist eine Bringschuld der Politik. Wir müssen den Menschen in Deutschland
  erklären, warum wir das so sehen, und dann müssen wir daraus die richtigen und notwendigen
  Konsequenzen ziehen. Ich denke, wir tun das zurzeit im Umfang wie kaum ein zweites
  Land. Wir tun es, weil wir in der geostrategischen Mitte Europas liegen, weil wir
  das Hauptzielland von dem sind, was wir zurzeit „hybride Kriegsführung gegen Deutschland“
  nennen, und wir tun das, weil wir es unserer Bevölkerung und unserem Land schuldig
  sind, die Verteidigungsfähigkeit, wie Sie mich richtig zitiert haben, wiederherzustellen.
  Wir sind auf dem Weg ein gutes Stück vorangekommen. Ich sage mal: Meine Besorgnis
  um die Verteidigungsfähigkeit unseres Landes nimmt zurzeit nicht zu. Wir sehen auf
  der einen Seite die eindeutigen Vorbereitungen für weitere Aggressionen von Russland
  aus. Die gehen weit über die Ukraine hinaus. Sie bedrohen das Baltikum, sie bedrohen
  Moldau, sie bedrohen andere Teile Europas, sie bedrohen uns durch die Form, die
  ich gerade beschrieben habe. Aber wir sind in einem rasanten Aufholprozess, unsere
  Verteidigungsfähigkeit wieder hinzubekommen. Da muss ich sagen: Ich bin auch dankbar
  dafür, dass wir darüber in der Bundesregierung überhaupt keinen Dissens haben, noch
  nicht einmal im Detail. Wir diskutieren allenfalls über die richtigen Systeme, über
  die richtigen Antworten, über die richtigen technologischen Entwicklungen, über
  die richtigen Kooperationen. Was übrigens in dem Zusammenhang wirklich beeindruckend
  ist, das sind die Fähigkeiten, die die Ukraine in den letzten vier Jahren entwickelt
  hat, von denen wir heute profitieren. Hier sind wir also wirklich auf einem Weg,
  von dem ich sagen muss: Ja, wir stellen innerhalb kürzester Zeit, die möglich ist,
  unsere Verteidigungsfähigkeit wieder her. Gehen Sie nichtsdestoweniger davon aus,
  dass Russland eben diese zeitliche Lücke bis zur vollständigen Wiederherstellung
  der Verteidigungsfähigkeit nutzen wird? Ich gehe davon aus, dass wir unverändert
  ein ausreichend hohes Maß an Abschreckung in der NATO haben. Auch das war für mich
  ein Grund, sehr zufrieden auf den G7-Gipfel und auch auf den NATO-Gipfel zurückzublicken.
  Sowohl das Treffen der G7 in Evian als auch das Treffen der NATO in Ankara waren
  in dieser Hinsicht wirklich ein Erfolg. Es gibt keinerlei Differenzen in der NATO
  um die Notwendigkeit der Verteidigungsfähigkeit in Europa, auch für die europäischen
  NATO-Partner. Insofern: Abschreckung funktioniert, wohl wissend, dass wir in Zukunft
  sehr viel mehr selber tun müssen. Dieser Satz ist richtig: Die NATO muss europäischer
  werden, damit sie transatlantisch bleiben kann. ‑ Den Satz versuchen wir zu erfüllen.
  Meine Frage bezieht sich auf das Thema Steuern. Sie haben ja im jüngsten Koalitionsausschuss
  eine Steuerreform beschlossen, die für weite Teile der Mittelschicht noch nicht
  mal die Inflation ausgleicht. Das hatte sogar die Ampelkoalition hinbekommen. Warum
  tun Sie sich so schwer damit, Ausgaben zu kürzen, um den Bürgern tatsächlich mehr
  Netto zu verschaffen? Frau Kollegin, wir haben ja in den letzten Wochen eine sehr
  intensive Diskussion auch um den Haushalt 2027 geführt. Wir haben gleichzeitig in
  der Koalition verabredet, dass wir eine Einkommensteuerreform mit einem Entlastungsvolumen
  von rund 10 Milliarden Euro machen. Das betrifft insbesondere die mittleren und
  unteren Einkommen. Der Hinweis von Herrn Kollegen von vorhin ist gleichzeitig richtig,
  dass die ganz niedrigen Einkommen über die Einkommensteuer kaum noch zu entlasten
  sind. Da sind die Sozialversicherungsbeiträge das größere Problem. Deswegen versuchen
  wir auch beides hinzubekommen, Stabilisierung der Sozialversicherungsbeiträge und
  Entlastung über die Steuer. Wir haben bei den sogenannten Subventionen oder den
  Finanzhilfen weitgehend ausgeschöpft, was wir machen können. Ich gebe Ihnen ein
  Beispiel, über das immer wieder kontrovers diskutiert wird: Dieses sogenannte Dieselprivileg
  ist eine Steuererleichterung für das Transportgewerbe, das Diesel braucht. Das hat
  mit einem Privileg für Autofahrer nichts zu tun, die werden dafür unterschiedlich
  besteuert. Das, was wir zum Beispiel beim Auto als Dienstwagenprivileg bezeichnen,
  ist eine Möglichkeit für die deutsche Automobilindustrie, die Autos auch in Unternehmensflotten
  hinein zu verkaufen. In einer solchen Phase, in der die deutsche Automobilindustrie
  unter massivem Wettbewerbsdruck aus dem Ausland steht, jetzt die Bedingungen für
  den Erwerb von Autos in Deutschland, gerade im Flottenbereich, zu verschlechtern,
  wäre keine gute Idee ‑ einmal abgesehen davon, dass man sich darüber streiten kann,
  ob das überhaupt ein Privileg ist oder nicht nur eine Pauschalierung des Arbeitsaufwandes
  oder des Aufwandes, den man für ein dienstlich genutztes Fahrzeug hat. Insofern:
  Wenn es dann ins Detail geht, wird es schwierig. Alle diejenigen, die mir immer
  wieder sagen „mach doch mal endlich Subventionsabbau“, denen stelle ich dann die
  Gegenfrage „was hätten Sie denn gern?“, und dann kommt in der Regel kaum eine wirklich
  tragfähige Antwort. Insofern ist das etwas schwieriger, als es sich vielleicht manchmal
  anhört. Herr Merz, nur zwei kurze offene Fragen, die ich habe: Sie sagten am 9. März
  2026, einzelne Verlagshäuser in Deutschland würden Sie dazu auffordern, eine andere
  Mehrheit im Bundestag zu suchen. Da Axel Springer genau das über Herrn Döpfner dementiert,
  wen meinten Sie damit? Die Aussage bleibt so stehen, wie ich sie damals aus dem
  Kontext heraus gemacht habe und bedarf keiner weiteren Erläuterung. Die andere offene
  Frage ist zu den US-Mittelstreckenwaffen in Deutschland, zur Vereinbarung in Ankara
  in der letzten Woche. Anders als in der früheren Vereinbarung wird sowohl die Stationierung
  als auch der Betrieb der Mittelstreckenraketen in nationaler Eigenregie durch die
  Bundeswehr erfolgen. Für mich ist offen: Wie sieht es mit dem Einsatz dieser Waffensysteme
  aus? Sind Sie im Fall der Fälle der Letztentscheider und nicht der US-Präsident?
  Wenn wir diese Waffen erwerben, gilt für diese Waffen wie für alle anderen Waffensysteme
  auch: Das entscheidet die NATO. Innerhalb des Spannungsfalles oder des Verteidigungsfalles
  geht die Befehls- und Kommandogewalt auf den Bundeskanzler über. Das sind die Bestimmungen
  unseres Grundgesetzes und die sind völlig unabhängig von jeder Waffengattung. Herr
  Bundeskanzler, nach 14 Monaten im Amt, was empfinden Sie, nicht andere, rückblickend
  als den schwächsten Moment Ihrer Amtszeit als Bundeskanzler? Herr Kollege, darüber
  müsste ich länger nachdenken. Genau. ‑ Aus welchen Fehlern haben Sie denn gelernt?
  Herr Kollege, ich bin ein lernfähiges System und lerne jeden Tag dazu. Es geht um
  die Commerzbank. Da scheint eine Übernahme durch die Unicredit mittlerweile kaum
  noch aufzuhalten zu sein. Unicredit verfügt mittlerweile fast über die Hälfte der
  Anteile. Macht es für Sie eigentlich noch Sinn, diese Übernahme jetzt als Bundesregierung
  zu verhindern? Oder wann, anders gefragt, ist für Sie der Zeitpunkt gekommen, wo
  Sie Ihren Widerstand gegen eine solche Übernahme aufgeben und eher aktiv dabei mithelfen,
  eine europäische Großbank zu schaffen? Herr Kollege, wir verhindern nicht diese
  Fusion oder diese Übernahme. Wir haben auch den Versuch nie unternommen. Wir haben
  immer nur gesagt: Die Art und Weise, wie die Commerzbank attackiert worden ist,
  stößt nicht auf unsere Zustimmung. Wenn ich das sage, dann hat das sozusagen zwei
  Aspekte: Der eine ist eine politische Beurteilung dieses Sachverhaltes, die nicht
  im Widerspruch dazu steht, dass wir in Europa große Banken brauchen, die wettbewerbsfähig
  sind, auch gegenüber den großen amerikanischen Banken. Das Zweite ist: Ich spreche
  auch hier als Vertreter eines Aktionärs. Die Bundesrepublik Deutschland hat nach
  wie vor rund 12 Prozent Anteile an der Commerzbank. Wir gehören zu denen, die das
  Angebot der Übernahme dieser Aktien nicht angenommen haben. Das wird auch im Augenblick
  nicht anders diskutiert. Wir müssen ansonsten akzeptieren, dass die Eigentümer der
  Commerzbank zu einem beachtlichen Teil anders entschieden haben. Aber so ist die
  marktwirtschaftliche Ordnung. In der marktwirtschaftlichen Ordnung entscheiden die
  Eigentümer über die Struktur, die sie gerne haben möchten und nicht die Politik.
  Was wir zu bewerten haben, ist die Art und Weise, wie es stattgefunden hat. Das
  haben wir als offensiv, zum Teil als aggressiv empfunden. Wir erlauben uns auch,
  die Frage nach dem Geschäftsmodell zu stellen. Denn die Commerzbank hat eine wichtige
  Rolle in der Mittelstandsfinanzierung, in der Außenhandelsfinanzierung für die Bundesrepublik
  Deutschland. Ich würde es sehr ungern sehen, wenn diese Funktion in Zukunft nicht
  mehr ausgeübt würde. Wenn Sie jetzt über die Art und Weise reden, wäre es da nicht
  sinnvoll, einmal mit Herrn Orcel direkt über die Art und Weise zu sprechen? Denn
  der ist ja dafür verantwortlich, wie dieser Übernahmeversuch stattfindet. Die Gespräche
  muss nicht unbedingt der Bundeskanzler führen, aber die Gespräche werden aus der
  Bundesregierung heraus mit Herrn Orcel geführt ‑ wir nehmen da sowohl die politische
  Verantwortung als auch unsere Verantwortung als Aktionär gegenüber der Commerzbank
  schon wahr ‑, auch mit der Commerzbank und innerhalb des Vorstandes der Commerzbank.
  Herr Merz, noch einmal eine Frage zur Landtagswahl in Sachsen-Anhalt. Sie haben
  Ihre klare Haltung zur AfD deutlich gemacht. Nach der Wahl wird es aber mindestens
  mal schwierig werden, Mehrheiten jenseits der AfD zu finden. Wenn eine Zusammenarbeit
  mit der Linkspartei die einzige Möglichkeit wäre, eine AfD-Regierung zu verhindern,
  würden Sie dann noch einmal über diesen Unvereinbarkeitsbeschluss nachdenken? Wie
  sehen Sie denn die Linkspartei? Kann man mit der Partei zusammenarbeiten? Herr Bundeskanzler,
  die Frauen sind in den zentralen Gruppen, die die Steuerung in der Koalition übernehmen,
  sehr, sehr unterrepräsentiert. Es gibt im Koalitionsausschuss eine und in der Sherpa-Gruppe,
  die jetzt zuletzt eine wichtige Rolle gespielt hat, überhaupt keine. Fehlt nicht
  der weibliche Blick? Mancher sagt, so eine Regelung wie die Krankschreibung ab dem
  ersten Tag ist ein Resultat dieser Männergruppe. Herr Kollege, ich sehe zu dieser
  Frage mindestens genauso viel Zustimmung seitens der Frauen wie der Männer. Da sehe
  ich, ehrlich gesagt, keine qualitativen Unterschiede. Wahr ist trotzdem, dass wir
  in der Politik insgesamt ein Problem haben. Wir haben zu wenig Frauen in den Bundestagsfraktionen.
  Das gilt für meine Fraktion leider ganz besonders. Wir bemühen uns darum, das zu
  lösen. Ich versuche überall, wo ich kann, auch Frauen zu motivieren, in die Politik
  zu gehen, sich für politische Ämter und Aufgaben zur Verfügung zu stellen. Die Tatsache,
  dass wir im Koalitionsausschuss nicht anders besetzt sind, hängt damit zusammen,
  dass wir ihn funktional besetzt haben, nicht nach Geschlecht, und das ist das Ergebnis.
  Ich hätte es gerne anders, aber wir haben den Koalitionsausschuss nach den Funktionen
  besetzt, die im Parlament und in der Regierung bestehen, und das Ergebnis ist so,
  wie es ist. Frau Bas nimmt diese Rolle allerdings als einzige Frau in dieser Gruppe
  sehr aktiv und, wie ich finde, auch sehr konstruktiv wahr. Bei den Plänen zur Pflege
  werden es ebenfalls die Frauen sein, die wohl sehr stark darunter leiden. Ist die
  Maßnahme, die Rentenbeiträge zu reduzieren, wirklich dazu angetan, einen Spareffekt
  auf dem Rücken der Frauen zu erzielen? Denn das ist die Gruppe, die im Wesentlichen
  die Pflege übernimmt. Die Entscheidung darüber, Herr Vitzthum, haben wir noch nicht
  endgültig getroffen. Die Pflegeversicherungsreform ist zurzeit auf dem Weg. Wir
  befinden uns in der Ressortabstimmung. Wir werden dabei über Details auch noch zu
  sprechen haben. Ich sehe den Punkt, den Sie angesprochen haben, auch kritisch. Aber
  insgesamt müssen wir dazu kommen, dass die Pflegeversicherung auch deutlich weniger
  ausgibt. Wir haben zurzeit eine große Lücke zwischen Einnahmen und Ausgaben, und
  diese Lücke müssen wir schließen, und da bin ich dankbar für jeden Vorschlag, der
  unterbreitet wird und der anders ist, als nur zu sagen, was alles nicht geht. Wir
  müssen diese Pflegeversicherung reformieren, und wir müssen sie auf ein tragfähiges
  Fundament stellen. Ich habe eine Frage zur EZB. Christine Lagarde wird wahrscheinlich
  früher als geplant von ihrem Amt zurücktreten. Es gibt im nächsten Jahr viele wichtige
  Wahlen in Frankreich, Spanien und Italien. Können Sie vielleicht beschreiben, welche
  Qualifikationen die beste Kandidatin oder der beste Kandidat haben sollte? Christine
  Lagarde ist als EZB-Präsidentin bis Oktober 2027 gewählt. Ich finde, dass sie ihre
  Aufgabe wirklich ganz hervorragend gut erfüllt. Sie vertritt die Interessen des
  Euroraums als Zentralbankpräsidentin, wie ich finde und mir zu sagen erlaube, wirklich
  hervorragend, auch gegenüber anderen großen Währungsräumen. Sobald die Nachfolge
  zeitlich ansteht, werden wir darüber nachdenken und Entscheidungen treffen. Im Augenblick
  sehe ich nicht, dass wir eine kurzfristige Entscheidung treffen müssen. Wird Deutschland
  versuchen, sich diesen Posten zu sichern? Im Augenblick sehe ich nicht, dass wir
  eine kurzfristige Entscheidung treffen müssen. Herr Merz, Sie haben gerade ein Plädoyer
  für Frauen in der Politik gehalten. Sollte Bundespräsident Steinmeier von einer
  Frau im Amt beerbt werden? Das Amt des Bundespräsidenten der Bundesrepublik Deutschland
  ist nicht erblich. Diese Frage werden wir nach den Landtagswahlen im September besprechen.
  Ich will ausdrücklich sagen: Der Respekt vor der Bundesversammlung gebietet es,
  abzuwarten, bis die endgültige Zusammensetzung feststeht. Das wird im September
  der Fall sein. Durch die Landtagswahlen am 6. und am 20. September kann sich die
  Zusammensetzung der Bundesversammlung noch einmal ändern. Ich gehe davon aus, dass
  das nicht fundamental sein wird, aber sie kann sich noch einmal ändern. Dann werden
  wir in den Koalitionsparteien und gegebenenfalls auch mit anderen Parteien darüber
  nachdenken. Ich werde versuchen, dazu einen Vorschlag zu entwickeln, aber das werde
  ich erst im letzten Quartal des Jahres tun, nicht heute. Ich würde gerne über Ihre
  Umfragewerte sprechen, Herr Merz. Laut einer Civey-Umfrage sind es gerade 81 Prozent
  der Menschen, die mit Ihrer Arbeit unzufrieden sind. Meine Frage wäre: Ärgert Sie
  das? Können Sie sich vorstellen, dass die Umfragewerte mit den angestoßenen Reformen
  besser werden? Können Sie das nachvollziehen? […] Ich versuche auch mit meinem Team,
  Fragen zu beantworten: Was können wir besser machen? Was müssen wir besser machen?
  Müssen wir besser kommunizieren? Müssen wir vielleicht auch unsere Politik überprüfen?
  - Das tun wir ständig. Es hat sicherlich auch eine Erwartungshaltung in der Bevölkerung
  gegeben, die wir bis jetzt nicht erfüllt haben. Wir werden aber natürlich auch massiv
  angegriffen. Auch das gehört zur Wahrheit dazu. Ich beschwere mich darüber nicht.
  Ich nehme das so, wie es ist. Ich empfinde diese demoskopische Lage, wenn Sie so
  wollen, eher als Ansporn, die Arbeit fortzusetzen, sie gut zu machen, sie richtig
  zu machen, gut zu vermitteln, gut zu erklären, sodass wir aus dieser Umfragesituation,
  die uns ja in der Koalition insgesamt betrifft ‑ ‑ ‑ Das betrifft ja nicht nur eine
  Person. Es ist die Union, es ist die SPD, die zurzeit bei einer Wahl in Deutschland
  wahrscheinlich keine Mehrheit für diese Koalition hätten. Das ist etwas, das mich
  beschwert und an dem wir auch gemeinsam arbeiten. Jetzt stehen die Landtagswahlen
  in Sachsen-Anhalt und Mecklenburg-Vorpommern mit einer sehr starken AfD an. Alle
  schauen darauf. Werden Sie noch einmal in diese Bundesländer, vor allem nach Sachsen-Anhalt,
  reisen und mit den Menschen ins Gespräch kommen? Welche Themen wollen Sie dabei
  vor allem ansprechen, um die Menschen vielleicht noch einmal von Ihrer Arbeit zu
  überzeugen? […] Ich werde versuchen, die Menschen, die mir zuhören, davon zu überzeugen,
  dass wir mit den Themen, die wir in der Koalition behandeln und beschließen, auf
  dem richtigen Weg sind. Ich werde versuchen, ein bisschen ein Zielbild, auch ein
  Leitbild zu entwickeln: Wo wollen wir als Bundesrepublik Deutschland hin? - Ich
  habe eben versucht, das sowohl außenpolitisch als auch europäisch und innenpolitisch
  zu skizzieren. Ich werde dazu auch immer wieder sagen: Das was wir heute machen,
  entscheidet das Schicksal unserer Kinder und Enkelkinder. - Ich möchte eines Tages
  aus der Rückschau auf diese Zeit vor allen Dingen die Frage beantworten können:
  Habt ihr damals, haben wir damals das Richtige gemacht, um den nachfolgenden Generationen
  ein lebens- und liebenswertes Land zu überlassen? - Das ist der Maßstab, an dem
  ich mich orientiere, und das werde ich auch zu vermitteln versuchen. Ich habe immer
  gesagt, dass wir uns unsererseits nicht in amerikanische Wahlen einmischen ‑ das
  haben wir auch immer beibehalten ‑, und ich möchte umgekehrt nicht, dass sich die
  amerikanische Regierung oder regierungsnahe Institutionen in die deutschen Wahlen
  einmischen. Vielleicht noch ein ergänzender Hinweis: Es ist illegal, politische
  Parteien in Deutschland aus dem Ausland heraus zu finanzieren. Das ist illegal,
  und ich gehe davon aus, dass sich insbesondere unsere Freunde auf der Welt an diese
  rechtlichen Regeln, die wir uns in Deutschland gegeben haben, auch halten. Herr
  Bundeskanzler, ich habe eine Frage zur Ukraine; die haben Sie schon mehrmals erwähnt.
  Heute ist die EU-Kommissionspräsidenten in Kyjiw. Sie haben vor einigen Wochen eine
  assoziierte Mitgliedschaft für die Ukraine vorgeschlagen, und der ukrainische Präsident
  Selenskyj hat das abgelehnt. Wie geht es in dieser Frage jetzt weiter? Danke, dass
  Sie das Thema noch einmal ansprechen, weil ich diesen Vorschlag ja nicht nur für
  die Ukraine gemacht habe, sondern ihn auch für die Ukraine gemacht habe. Ich habe
  zusammen mit Emmanuel Macron dann noch einmal einen weitergehenden Vorschlag auch
  für die Westbalkanstaaten gemacht. Wir haben im Grunde im Augenblick die fünf Westbalkanstaaten
  und Moldau und Ukraine als die potenziellen neuen Mitglieder der Europäischen Union,
  die darauf warten, dass die Europäische Union die nächsten Schritte tut. Heute wird
  das nächste Verhandlungscluster mit der Ukraine geöffnet. Das wird die Präsidentin
  heute bekannt geben. Mein Vorschlag ist von Wolodymyr Selenskyj nicht abgelehnt
  worden. Es gibt ein Problem an diesem Vorschlag, und das ist ein innenpolitisches
  Problem der Ukraine. Die Formulierung einer assoziierten Mitgliedschaft ist vom
  Vorgänger von Wolodymyr Selenskyj im Jahr 2013 gewählt worden, als der Ukraine ein
  Assoziierungsvertrag mit der Europäischen Union vorgeschlagen worden ist. Das ist
  damals als die assoziierte Mitgliedschaft bezeichnet worden, und deswegen ist dieser
  Begriff in der Ukraine nicht wirklich positiv besetzt. Ich habe mit Selenskyj mehrfach
  darüber gesprochen. In der Sache selbst gibt es keinen Widerspruch. Die Ukrainer
  sehen, dass wir Schritt für Schritt die Mitgliedschaft in der Europäischen Union
  herbeiführen sollten, und sie sehen auch gleichzeitig, dass es so schnell, wie sie
  es einmal gedacht haben, nicht geht. Meine Absicht ist, dass wir Moldau und der
  Ukraine, aber auch den Westbalkanstaaten jetzt konkret die Beitrittsperspektive
  in die Europäische Union eröffnen. Wir haben seit 13 Jahren kein neues Mitglied
  mehr in die Europäische Union aufgenommen, obwohl wir einer ganzen Reihe von Ländern
  in Europa den Beitritt in die Europäische Union versprochen haben. Jetzt gibt es
  zwei Möglichkeiten. Entweder, wir nehmen dieses Versprechen zurück und sagen „Es
  geht nicht“ ‑ das wäre nach meinem Gefühl die schlechteste Lösung für alle ‑, oder
  aber wir sagen: Es dauert, die Prozesse sind schwierig, aber wir gehen jetzt einmal
  Schritt für Schritt weiter und unternehmen den nächsten Schritt mit einer solchen
  assoziierten Mitgliedschaft, die man auch anders nennen kann, aber mit einer Mitgliedschaft
  in der Europäischen Union ohne Stimmrecht in den Institutionen, aber immerhin so
  eng an die Europäische Union angebunden, dass die Mitgliedschaft in der Europäischen
  Union dem dann sozusagen folgt. - Das war der Grund für diesen Vorschlag, den ich
  gemacht habe, und ich habe im Europäischen Rat und auch von den Beteiligten dafür
  sehr viel Zustimmung erhalten. Aber es ist wahr, die Prozesse sind kompliziert.
  Aber mein fester Wille ist es, auch in den nächsten Wochen und Monaten alles dafür
  zu tun, damit wir als Europäer glaubwürdig mit dem Versprechen bleiben, das wir
  anderen europäischen Staaten gegeben haben, nämlich offen zu sein für die Mitgliedschaft
  in der Europäischen Union. Wenn wir diese Glaubwürdigkeit verlieren, dann verlieren
  wir mehr als unsere Glaubwürdigkeit. Dann verlieren wir diese Länder, und das wäre
  geostrategisch das Schlechteste, das uns Europäern passieren kann, und auch darüber
  diskutieren wir im Europäischen Rat. Noch einmal: Ich freue mich darüber, dass ich
  viel Zustimmung erhalten habe, aber natürlich müssen auch noch viele Hürden genommen
  werden. In der Ukraine könnte der Eindruck entstehen, dass die Frage der EU-Mitgliedschaft
  irgendwie mit künftigen Friedensverhandlungen mit Russland verbunden sein könnte
  oder daran gekoppelt sein könnte. Damit hätte Russland indirekt ein Vetorecht. Ist
  dieser Eindruck korrekt? Nein, der Eindruck ist nicht richtig. Die Ukraine hat durch
  die Schlussakte der OSZE und durch die Charta von Paris Bündnisfreiheit auch von
  Russland, damals noch der Sowjetunion, zugesagt bekommen, und an dieser Zusage halten
  alle fest, die Europäer und auch die Ukraine. Dass wir natürlich zuallererst diesen
  Krieg beenden müssen und dass wir alles tun müssen, damit dieser schreckliche Krieg
  zu Ende geht, ist unsere gemeinsame Überzeugung. Aber wir müssen auch diese europäische
  Perspektive für die Ukraine offenhalten, sonst würden wir wirklich einen Betrug
  am Volk der Ukraine begehen, wenn wir das nicht täten. Deswegen habe ich diesen
  Vorschlag unterbreitet.'
