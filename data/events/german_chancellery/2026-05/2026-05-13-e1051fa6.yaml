title: Newsletter Verbraucherschutz aktuell / Ausgabe 7
text: 'Das Bundeskabinett hat das neue Gebäudemodernisierungsgesetz beschlossen. Es
  dient dazu, Gebäude klimafreundlicher zu heizen und dabei Hauseigentümern die Entscheidungsfreiheit
  für ihre Heiztechnik zu lassen. Unsere Gesetzliche Krankenversicherung steht unter
  enormem finanziellem Druck. Mit dem Gesetz zur Stabilisierung der Beitragssätze
  hat die Bundesregierung eine der größten Sozialreformen der vergangenen Jahrzehnte
  auf den Weg gebracht. Darum geht es. Die private Altersvorsorge wird grundlegend
  reformiert. Sie bietet höhere Flexibilität und bessere Renditechancen – und löst
  die Riester-Rente ab. Welche Änderungen vorgesehen sind und was dies für Sparerinnen
  und Sparer bedeutet. Die Fragen und Antworten im Überblick. Seit die Bundesregierung
  im Amt ist, treibt sie den Politikwechsel in zentralen Bereichen voran. Insgesamt
  hat sie bislang 190 Gesetze auf den Weg gebracht - besonders in den Bereichen Wirtschaft,
  Sicherheit, Migration und gesellschaftlicher Zusammenhalt. Im Fokus stehen Investitionen
  in Verteidigung, Straßen, Schulen, Digitalisierung, Sicherheitsbehörden und in eine
  moderne Verwaltung. Für die Bundesregierung hat die sichere Versorgung mit Energie
  höchste Priorität: für die Wirtschaft und die Mobilität der Bürgerinnen und Bürger.
  Damit verbinden sich viele Fragen: Was bedeutet mögliche Kerosinknappheit für meinen
  Urlaubsflug? Wird es wieder Energiesparmaßnahmen geben? Können die Strompreise steigen?
  Hier finden Sie die Antworten. Um die hohen Spritpreise abzufedern, wurde die Energiesteuer
  seit 1. Mai um bis zu 17 Cent pro Liter abgesenkt. Gleichzeitig wurde die Krankenhausreform
  angepasst, um vor allem die Klinikversorgung im ländlichen Raum zu sichern. Die
  Broschüre informiert über den allgemeinen und besonderen Kündigungsschutz, die ordentliche
  und außerordentliche Kündigung sowie die Kündigung von befristeten Arbeitsverträgen.
  Zudem wird aufgezeigt, für wen das Kündigungsschutzgesetz gilt und wie es wirkt.
  Anzeigepflichtige Entlassungen und Kündigungsfristen werden erklärt. Der Schulabschluss
  markiert einen wichtigen Meilenstein im Leben junger Menschen – und gleichzeitig
  den Beginn eines neuen Kapitels voller Herausforderungen und Entscheidungen. Die
  Verbraucherzentralen geben Schulabgängerinnen und Schulabgängern mit einer digitalen
  Vortragsreihe vom 18. bis zum 21. Mai 2026 Starthilfe, um den Einstieg in ein eigenständiges
  Leben zu erleichtern. Der Deutsche Ernährungstag richtet sich an alle Akteurinnen
  und Akteure, die einen Beitrag zur Etablierung lokaler‑regionaler Vernetzungs‑ und
  Versorgungsstrukturen leisten – von Kommunen, lokalen Unternehmen sowie Erzeugerinnen
  und Erzeugern über Forschungseinrichtungen bis hin zu Vertreterinnen und Vertretern
  der Zivilgesellschaft. Mit dem Bundespreis Verbraucherschutz werden Menschen, Projekte
  und Initiativen ausgezeichnet, die haupt- oder ehrenamtlich für die Interessen von
  Verbraucherinnen und Verbrauchern kämpfen. Nach einer Vielzahl an Nominierungen
  hat die Jury nun eine Vorauswahl getroffen: Zehn Finalistinnen und Finalisten stehen
  fest. Jetzt sind Sie gefragt: Im Verbrauchervoting können Sie ab 28. Mai Ihren Favoriten
  auswählen.'
