title: Die Regierung lädt ein Grußwort des Bundeskanzlers zum Tag der offenen Tür
  der Bundesregierung 2026
text: 'Bundeskanzler Merz freut sich darauf, mit den Gästen ins Gespräch zu kommen.
  am 20. und 21. Juni ist es wieder so weit: Wir laden Sie herzlich ein zum Tag der
  offenen Tür der Bundesregierung. An beiden Tagen öffnen die Bundesministerien, das
  Kanzleramt und das Bundespresseamt ihre Türen. Werfen Sie einen Blick hinter die
  Kulissen der Bundespolitik. Die Bundesregierung hat in ihrem ersten Jahr die Weichen
  gestellt – für mehr Wohlstand, Sicherheit und Zusammenhalt. Gemeinsam arbeiten wir
  Schritt für Schritt daran, unsere Wirtschaft wieder wettbewerbsfähig zu machen:
  Entlastungen, Bürokratierückbau, grundlegende Reformen im Gesundheitswesen und bei
  der Altersversorgung, Investitionen in Innovationen und Digitalisierung, Sicherheit,
  Infrastruktur und Energieversorgung sind zentrale Handlungsfelder. Kommen Sie mit
  uns darüber ins Gespräch und informieren sich aus erster Hand über die Regierungsarbeit.
  Natürlich sind viele Ministerinnen und Minister sowie auch ich persönlich vor Ort.
  Wir freuen uns, Sie bei unserem Tag der offenen Tür begrüßen zu dürfen!'
