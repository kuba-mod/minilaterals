title: Schwerpunkte der Bundesregierung Koalition auf Kurs für einen Politikwechsel
text: 'Die Bundesregierung hat ihre Schwerpunkte für die Legislatur festgelegt. Die
  Bundesregierung hat rasch und entschlossen die zahlreichen Herausforderungen angepackt,
  die sich Deutschland stellen. Ziel ist die umfassende Erneuerung des Landes, durch
  die Stärken aus- und Schwächen abgebaut werden, neue Sicherheit entsteht und der
  Zusammenhalt wächst. Nachfolgend die Schwerpunkte der Regierungsagenda: Deutschland
  soll starke Industrienation und Mittelstandsland bleiben – und zugleich KI - und
  Gründer-Nation werden. Die Bundesregierung will den Wirtschaftsstandort stärken
  – insbesondere durch Entlastungen, Bürokratierückbau, gezielte Innovationsförderung
  und Investitionen in Digitalisierung, Infrastruktur und Energieversorgung. Denn
  Ziel ist: neues Wirtschaftswachstum und gute Arbeit . Erste wichtige Schritte sind
  gemacht: Das steuerliche Investitionssofortprogramm ist bereits in Kraft getreten.
  Der Investitions-Booster ermöglicht degressive Abschreibungen, die Körperschaftssteuer
  wird schrittweise sinken. Zudem werden Energiekosten reduziert und der Innovationsstandort
  mit der Hightech-Agenda gestärkt. Das Bürgergeld wurde reformiert und wird zu einer
  neuen Grundsicherung für Arbeitssuchende umgestaltet. Die Rente bleibt verlässlich
  und stabil, da das Rentenniveau bis 2031 bei 48 Prozent abgesichert wird. Die Bundesregierung
  will Deutschland wieder stark und wettbewerbsfähig machen, deshalb zielt sie auf
  wirkungsvolle Entlastungen und stabile Finanzen . Das 500 Milliarden Euro starke
  Sondervermögen ermöglicht eine historisch einmalige Modernisierungsoffensive in
  Wirtschaft und Infrastruktur. Die Bundesregierung sagt gleichzeitig lähmender Überregulierung
  auf breiter Ebene den Kampf an. Ein zentrales Vorhaben ist die beschlossene Modernisierungsagenda.
  Ziel ist eine leistungsfähige und moderne Verwaltung, die Bürgerinnen und Bürger
  sowie die Wirtschaft unterstützt und den Alltag erleichtert. Die Bundesregierung
  setzt auf eine umfassende Sicherheitsoffensive. Sicherheits-, Zivilschutz- und Katastrophenschutzbehörden
  werden gestärkt. Sie bekommen zeitgemäße, auch digitale Befugnisse, neue Fähigkeiten
  und ausreichend Personal. Ziel ist ein sicheres Zusammenleben , geordnete Migration
  und stärkere Integration . Zum Schutz der freiheitlich-demokratischen Grundordnung
  will die Bundesregierung entschlossen gegen jegliche Form des Extremismus vorgehen.
  Der Schutz des jüdischen Lebens soll durch eine Verschärfung des Strafrechts ausgebaut
  werden. Außerdem hat die Bundesregierung die Weichen für eine grundsätzliche Wende
  in der Migrationspolitik gestellt: mit schnelleren Asylverfahren, klarer Rückführungsoffensive
  und Zurückweisungen. Parallel dazu soll Integration stärker gefördert werden, durch
  beispielsweise Fortsetzung der Integrationskurse und frühkindliche Sprachförderung.
  Die Bundesregierung stellt Familien in den Mittelpunkt und will Kindern und Jugendlichen
  ein gutes Aufwachsen ermöglichen. Sie wird das Elterngeld reformieren . Gute medizinische
  Versorgung und Pflege, bessere Bildungschancen und der Kampf gegen Desinformation
  sind weitere wichtige Ansatzpunkte, um den Zusammenhalt in Deutschland zu stärken.
  Wohnen soll für alle bezahlbar und umweltverträglich sein, zugleich muss der akute
  Mangel an Wohnraum behoben werden. Deswegen hat die Bundesregierung den „Wohnungsbau-Turbo“
  gestartet und die Mietpreisbremse verlängert. Sport ist Motor für Integration, Gesundheit
  und gesellschaftliche Teilhabe. Länder, Kommunen und Vereine werden deswegen bei
  der Modernisierung und Sanierung von Sportstätten mit mindestens einer Milliarde
  Euro unterstützt. In der internationalen Politik setzt die Bundesregierung auf die
  Grundsätze der regelbasierten internationalen Ordnung, Engagement für Frieden, Menschenrechte,
  Klimaschutz und globale Partnerschaften. Eine verantwortungsvolle Außenpolitik und
  ein geeintes Europa sind und bleiben ein Schwerpunkt der Bundesregierung. Deutschland
  unterstützt die Ukraine in ihrem erbitterten Abwehrkampf gegen den Aggressor Russland
  weiterhin umfassend und zuverlässig – militärisch, zivil, humanitär und politisch.
  Deutschland und Europa werden kontinuierlich in die Lage versetzt, mehr Verantwortung
  für ihre Sicherheit und Verteidigung zu übernehmen. Die Ausgaben für Verteidigung
  steigen deshalb bis zum Ende der Legislaturperiode spürbar. Das Planungs- und Beschaffungswesen
  der Bundeswehr wurde reformiert und beschleunigt, um militärische Ausrüstung schneller
  zu beschaffen und einen effizienten Einsatz der finanziellen Mittel sicherzustellen.
  Vor dem Hintergrund der aktuellen Entwicklungen und angesichts der immer komplexeren
  Weltlage hat die Bundesregierung einen Nationalen Sicherheitsrat (NSR) im Bundeskanzleramt
  eingerichtet. Aufgabe dieses Gremiums ist es, die gesamtstaatliche Sicherheitsarchitektur
  Deutschlands zu stärken. Dazu soll er Wissen bündeln und ein Lagebild generieren,
  Strategieentwicklung und strategische Vorausschau leisten und die gesamtstaatliche
  Resilienz stärken. Weitere Ausführungen zu den Vorhaben der Bundesregierung finden
  Sie im Koalitionsvertrag .'
