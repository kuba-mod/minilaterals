title: Ergebnisse der 170. Steuerschätzung Schwächeres Wachstum führt zu Steuerausfällen
text: 'Minister Klingbeil betonte: Das oberste Ziel der Bundesregierung bleibe, Arbeitsplätze
  zu sichern, neue Jobs zu schaffen und für Wirtschaftswachstum zu sorgen. „Die heutige
  Steuerschätzung zeigt, wie sehr uns der Iran-Krieg wirtschaftlich schadet“: Mit
  diesen Worten kommentiert Bundesfinanzminister Lars Klingbeil die Ergebnisse der
  170. Steuerschätzung. Danach müssen Bund, Länder und Gemeinden in den kommenden
  Jahren mit erheblichen Mindereinnahmen rechnen. Insgesamt beläuft sich das erwartete
  Minus dieses Jahr auf etwa 17,8 Milliarden Euro. Davon entfallen etwa 9,9 Milliarden
  Euro auf den Bund. Die Länder müssen mit 3,0 Milliarden Euro weniger auskommen,
  und die Kommunen mit 4,3 Milliarden Euro. Die restliche Summe betrifft Abführungen
  an die Europäische Union. Bis 2030 rechnen die Steuerschätzer für Bund, Länder und
  Kommunen mit 87,5 Milliarden Euro weniger Steuereinnahmen. Für Bundesfinanzminister
  Klingbeil ist klar, dass die geringeren Steuereinnahmen mit der schwächeren Wachstumserwartung
  aufgrund des Iran-Kriegs zusammenhängen. Der Krieg und der daraus resultierende
  Energiepreis-Schock bremsten die positive wirtschaftliche Dynamik vorerst aus. Für
  den Bundeshaushalt 2027 bringe die aktuelle Steuerschätzung keine Entlastung. Für
  bereits erwartete Steuermindereinnahmen des Bundes sei in den Eckwerten für den
  Haushalt 2027 Vorsorge getroffen. Als wichtigstes Ziel nannte Klingbeil, wieder
  zu einem höheren Wirtschaftswachstum zu kommen, Arbeitsplätze zu sichern und neue
  Jobs zu schaffen. „Wir setzen deshalb auf Investitionen und Reformen, um Deutschland
  stärker zu machen.“ Zudem brauche es eine strikte Konsolidierung des Haushalts.'
