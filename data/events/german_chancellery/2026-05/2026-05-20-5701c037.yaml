  ob es eine Wehrpflicht gibt oder nicht, entscheidet ja nicht das BMVg. Wir haben
  vielmehr immer betont: Wenn es dazu kommen sollte, weil die sicherheitspolitische
  Lage oder der Aufwuchs der Streitkräfte es erfordert, dann würde es einen größeren
  politischen Prozess geben, an dem ein neues parlamentarisches Verfahren, ein Gesetzgebungsverfahren
  hängt. Insofern entscheidet darüber nicht das BMVg. Wir sind mit den Zahlen soweit
  zufrieden. Die Zahlen sprechen für sich: Wir haben zweistellige Zuwachsprozentzahlen
  bei den Einstellungen und bei den Bewerbungen. Wir haben im Februar/März eher einen
  Abgang, was aber durch die vorgenommene Lebensplanung der jungen Menschen bedingt
  ist, die sich für den Sommer in Richtung Studium oder in Richtung Ausbildung neu
  orientieren. Diese saisonale Schwankung gibt es, und wir haben sie mit Pressemitteilungen
  im Februar und März auch offen kommuniziert. Da sind wir jetzt durch, das zeigen
  auch die Zahlen. Der April war ein sehr starker Einstellungsmonat; da haben wir
  3700 Einstellungen verzeichnen können. Wenn dieser Weg so weitergeht, werden wir
  die personellen Zielzahlen dieses Jahr und in den nächsten Jahren erreichen. Dafür
  tun wir alles ‑ mit Attraktivität, mit einer sinnstiftenden Tätigkeit, mit neuen
  Ausbildungsmethoden, mit einer modernen Ausbildung. Wir sehen, dass diese Maßnahmen
  aktuell greifen und dass der Personalaufwuchs einen positiven Trend aufzeigt. Wir
  haben auch einmal zum Taschenrechner gegriffen: 203 000 Soldaten bis 2031 sind ja
  das Ziel; so steht es auf der Webseite. Da wäre die Frage: Ist das noch aktuell?
  Der Aufwuchs ist ja genau so groß, dass das genau erreicht werden würde, wenn es
  jedes Jahr so weitergeht. Deswegen die Frage: Steht dieses Ziel noch? Ich würde
  doch gerne noch einmal zu der Wehrpflicht nachfragen; denn dieses Thema wird ja
  auch öffentlich diskutiert und interessiert viele Menschen. Kann man nicht sagen,
  dass es, wenn dieses Ziel erreicht wird, eher nicht auf eine Wehrpflicht hinausläuft?
  Die Zahl, die Sie gerade genannt haben, ist eine Zahl, die nach meiner Kenntnis
  nicht mehr aktuell ist. Wenn die Zahl dort noch steht, obwohl sie nicht mehr aktuell
  ist, tut es mir leid. Dann werde ich das meinen Leuten einmal mitteilen. Wir haben
  im Gesetzgebungsverfahren für das Wehrdienstmodernisierungsgesetz aber offen kommuniziert ‑
  das wissen Sie ‑, dass es einen Zielkorridor für den Aufwuchs der Bundeswehr gibt.
  Dieser gibt für jedes Jahr vor ‑, welchen Aufwuchs wir bis 2035 erreichen wollen.
  Die Zahlen, die dort als Korridor angegeben sind, sind für uns die maßgeblichen
  Zahlen. Zu diesen Zahlen müssen wir ab nächstem Jahr auch dem Parlament berichten.
  Ich habe noch eine Nachlieferung zu den mutmaßlichen IStGH-Haftanträgen: Uns liegen
  keine Erkenntnisse zu etwaigen Haftbefehlen oder Anträgen auf den Erlass von Haftbefehlen
  gegen israelische Staatsangehörige seitens des IStGH vor. Auch haben wir keine Kenntnisse
  über etwaige Ermittlungen des IStGH in Bezug auf Israel und Palästina. Grundsätzlich
  ist anzumerken, dass der IStGH die Existenz von Haftbefehlen in vielen Fällen unter
  Verschluss hält und sie erst im Falle eines konkreten Rechtshilfeersuchens bekannt
  gibt, um die Verhaftung von gesuchten Personen zu ermöglichen ‑ das vielleicht als
  Einordnung betrifft. Seit 2025 ist es im Übrigen der Anklagebehörde des IStGH auf
  Beschluss des Gerichts untersagt, die Existenz von bloßen Haftbefehlsanträgen bekannt
  zu geben ‑ ich hatte vorher Haftbefehle gesagt, aber es geht um Haftbefehlsanträge.
  Auch noch als Einordnung: Deutschland als starker Verfechter des Internationalen
  Strafgerichtshofs und des Völkerstrafrechts steht zur Unabhängigkeit der Justiz
  und insbesondere des IStGH. Ich habe auch noch eine Nachlieferung (zur Entwicklung
  der Personalstärke der Bundeswehr ), weil mir das erst im Nachgang unseres Gesprächs
  eingefallen ist: Die neue Zielzahl ist 460 000 Soldatinnen und Soldaten für die
  Streitkräfte bis Mitte der Dreißigerjahre, kombiniert aus mindestens 260 000 aktiven
  Soldatinnen und Soldaten und mindestens 200 000 Reservistinnen und Reservisten.
  Das ist die neue Zielzahl. Die Zahl, die Sie genannt haben, ist eine alte Zielzahl.
  Ich bedanke mich daher für den Tipp. Manchmal tauchen in der Suche ja noch Artikel
  auf, die gegebenenfalls noch nicht angepasst wurden. Wir werden das angehen. Wir
  dürfen auch nicht vernachlässigen, dass die Kapazitäten, die wir für den Aufwuchs
  brauchen, auch erst anwachsen müssen. Wir können aktuell nicht 40 000 oder 50 000
  junge Menschen einstellen; denn dann müssten wir von der aktiven Truppe, die den
  Kernauftrag Landes- und Bundesverteidigung hat, sehr viele Ausbilder abziehen und
  müssten auch Unterbringungsmöglichkeiten bereitstellen, die wir aktuell noch gar
  nicht haben. Insofern ist dieses Ziel unrealistisch. Deswegen gibt es diesen parlamentarisch
  gebilligten Aufwuchspfad, der für die nächsten Jahre graduellen Aufwuchs sicherstellt.
  Auf diesem Pfad bewegen wir uns, und die aktuellen Personalzahlen geben uns recht,
  dass dieser Weg ‑ ich habe es angedeutet: Attraktivität, Sinnstiftung, aber auch
  ein gutes Angebot mit interessanten Jobs und einem guten Umfeld ‑ greift. Ich möchte
  aber noch einmal die Zielzahlen betonen. Ich finde es schade, dass wir diese Zahlen
  nicht aktualisiert haben; wir werden uns darum aber kümmern.'
