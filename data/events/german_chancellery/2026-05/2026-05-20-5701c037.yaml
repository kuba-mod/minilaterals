date: '2026-05-20'
type: press_release
source_name: german_chancellery
title: Regierungspressekonferenz vom 20. Mai 2026
text: 'stellvertretender Regierungssprecher Meyer (Vorsitzende Buschow eröffnet die
  Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der Ministerien.)
  Wir haben heute in der Tat eine ziemlich volle Kabinettssitzung mit einigen Beschlüssen
  zur Modernisierung unseres Landes gehabt, die ich auch kurz vortragen möchte. Das
  Kabinett hat heute unter anderem den Entwurf für das Digitale Identitätengesetz
  beschlossen. Damit schafft die Bundesregierung die rechtliche Grundlage für die
  Nutzung der sogenannten EUDI-Wallet in Deutschland. Das ist die digitale europäische
  Brieftasche für verschiedene persönliche Nachweise. Zum Beispiel wird der Personalausweis
  als digitaler Zwilling in der Wallet hinterlegt. Perspektivisch können immer mehr
  persönliche Dokumente wie die Geburtsurkunde, der Führerschein oder auch Fahrtickets
  abgespeichert werden. Anwendungsbereiche sind, glaube ich, klar, insbesondere der
  Identitätsnachweis in Onlineverfahren, das Abholen von Paketen etc. Die EUDI-Wallet
  wird es Bürgerinnen und Bürgern ab dem kommenden Jahr ermöglichen, sich zuverlässig
  und sicher online auszuweisen oder Nachweise zu erbringen. Das bedeutet eine wesentliche
  Vereinfachung in vielen Lebensbereichen und Wirtschaftsbereichen. Bürgerinnen und
  Bürgern steht zukünftig ein zentraler und vertrauenswürdiger Zugang für Verwaltungsdienstleistungen,
  Bankgeschäfte, Onlineverträge oder andere digitale Anwendungen zur Verfügung. Unternehmen
  können Kundinnen und Kunden sicher identifizieren und europaweit neue Geschäftsmodelle
  entwickeln. Die Wallet startet im Januar in einer ersten Ausbaustufe. Diese betrifft
  die Identifizierung und die Authentifizierung. In weiteren Ausbaustufen werden dann
  Funktionen wie das digitale Signieren von Dokumenten folgen. Die Wallet wird kostenlos
  und freiwillig nutzbar sein, während analoge Dienste weiterhin bestehen bleiben.
  Vorteile sind klar: Die Anwendung ermöglicht sichere und nahtlose elektronische
  Transaktionen zwischen Unternehmen, Bürgerinnen und Bürgern und öffentlichen Verwaltungen
  grenzüberschreitend in der gesamten Europäischen Union. Das ist ein echter Mehrwert,
  nicht nur für den Wirtschaftsstandort, sondern auch für die Bürgerinnen und Bürger.
  Die Bundesregierung hat darüber hinaus heute die angekündigte Reform der Fahrschulausbildung
  auf den Weg gebracht. Dafür hat das Kabinett den Gesetzentwurf zur Änderung des
  Fahrlehrergesetzes und anderer straßenverkehrsrechtlicher Gesetze beschlossen. Ein
  weiterer Baustein der Reform wird die Verordnung zur Modernisierung der Fahrschulausbildung
  sein. Deren Kabinettsbehandlung wird gesondert erfolgen. Ziel der Reform ist es,
  den Führerschein deutlich bezahlbarer zu machen und die Fahrschulausbildung moderner
  zu gestalten. Wichtig ist, dass dabei die Qualität der Ausbildung und das Sicherheitsniveau
  erhalten bleiben. Ich will es einmal in meinen Worten sagen: Vieles ist zu kompliziert
  und dadurch auch teuer geworden, was den Führerschein betrifft. Deshalb entschlacken
  wir jetzt. Im Einzelnen sieht die Reform Folgendes vor: Die Präsenzpflicht für den
  Theorieunterricht fällt weg. Jeder kann selbst entscheiden, sich das Wissen per
  App zu Hause oder hybrid in einer Fahrschule oder wie bisher in Präsenz anzueignen.
  Die einzelnen Fahrschulen können entscheiden, in welcher Form sie Theorieunterricht
  anbieten. All dies senkt Kosten und spart Zeit für Fahrschüler. Darüber hinaus wird
  das komplexe Bewertungssystem bei der Theorieprüfung vereinfacht. Der Umfang des
  Fragenkatalogs wird deutlich reduziert. Fragen zur Verkehrssicherheit bilden bei
  der Theorieprüfung einen besonderen Fokus und müssen richtig beantwortet werden.
  Das gilt also weiterhin. Wir haben hier also weiterhin ein hohes Qualifikationsniveau.
  Künftig gibt es keine Vorgaben mehr über die Anzahl von Sonderfahrten. Hierbei ist
  die Einschätzung der Fahrlehrer zum Leistungsstand der Fahrschüler gefragt. Fahrten
  über Land, auf der Autobahn und in der Nacht sind aber nach wie vor geregelt. Die
  Fahrlehrerschaft wird spürbar von Bürokratie befreit, vor allem von umfangreichen
  Dokumentations- und Aufzeichnungspflichten. Durch den Abbau starrer organisatorischer
  Vorgaben erhalten die Fahrschulen mehr Gestaltungsspielraum. Weniger starre Vorgaben
  gibt es auch für Fahrschüler. Sie können künftig auch unter Anleitung von nahestehenden
  Personen Fahrpraxis erwerben, ergänzt durch die praktische Ausbildung in der Fahrschule.
  Damit haben viele unserer Nachbarn in vielen europäischen Ländern bereits sehr gute
  Erfahrungen gemacht. Auch das wird helfen. Noch ein wichtiger Serviceaspekt: Preise
  und Erfolgsquoten aller Fahrschulen sollen künftig online in einer Mobilithek zur
  Verfügung stehen. Eltern und Fahrschüler erhalten so einen besseren Qualitätsvergleich.
  Nach Abschluss der parlamentarischen Beratung in Bundestag und Bundesrat sollen
  Gesetz und Verordnung Ende des Jahres in Kraft treten. Damit soll die Reform vollständig
  wirksam werden. Ich glaube, das ist eine gute Nachricht, insbesondere für Familien
  mit Kindern, die sich über die Frage des Führerscheins zunehmend Gedanken machen.
  Die Bundesregierung hat außerdem die vom Bundesinnenminister vorgelegten Eckpunkte
  zum Pakt für den Bevölkerungsschutz beschlossen. Mit dem Pakt reagiert die Bundesregierung
  auf die veränderte Sicherheitslage in Europa, die Folgen des russischen Angriffskrieges
  gegen die Ukraine sowie die zunehmenden Anforderungen durch Naturkatastrophen und
  hybride Bedrohungen. Es gilt jetzt, den Bevölkerungsschutz als einen Bereich der
  zivilen Verteidigung im Rahmen der Gesamtverteidigung umfassend zu modernisieren.
  Die Koordinierung zwischen Bund, Ländern und Kommunen wird weiterentwickelt. Zivile
  und militärische Planung sollen künftig stärker miteinander verzahnt werden. Außerdem
  wird die Bundesregierung die Rahmenbedingungen und die Attraktivität des Ehrenamtes
  verbessern. Um es einmal konkret zu machen: Der Bund wird bis 2029 insgesamt zehn
  Milliarden Euro in den Bevölkerungsschutz investieren und dazu die Bereichsausnahme
  von der Schuldenbremse nutzen. Vorgesehen sind unter anderem Investitionen in eine
  hochmoderne Ausstattung der größtenteils ehrenamtlichen Einsatzkräfte, in moderne
  Warn- und Kommunikationssysteme, in die weitere Stärkung des THW mit resilienten
  Standorten einschließlich Logistikzentren sowie in die Verbesserung der Trinkwasser-
  und Notstromversorgung. Dann gibt es zwei weitere Themen, die heute ebenfalls Thema
  im Kabinett waren. Deshalb möchte ich sie kurz erwähnen. Wie Sie möglicherweise
  bereits wissen, ist gestern das Portal für das Förderprogramm von Elektroautos freigeschaltet
  worden. Seit gestern können Bürgerinnen und Bürger, die die Förderbedingungen erfüllen,
  einen Antrag stellen. Das Förderprogramm trägt zur klimafreundlichen Mobilität bei
  und soll die Nachfrage von Verbrauchern nach emissionsarmen Fahrzeugen im Straßenverkehr
  stärken. Es ist ein Meilenstein für den Hochlauf der Elektromobilität in Deutschland.
  Wir haben in der Förderung insbesondere die Menschen im Blick, die sich ohne Hilfe
  des Staates kein E-Auto leisten können. Insofern handelt es sich um ein zielgerichtetes
  Programm, das unteren und mittleren Einkommensgruppen zugutekommt. Familien profitieren
  in besonderem Maße von der Förderung, weil Kinder die Förderhöhe um bis zu 6000 Euro
  anheben können. Die Zunahme klimafreundlicher Mobilität ist ein wichtiges Anliegen
  dieser Bundesregierung. Gleichwohl halten wir an technologieoffenen Lösungen fest.
  Zu den Fahrzeugen, die gefördert werden können, gehören auch Plug-in-Hybride und
  E-Pkws, die einen kleinen Verbrennungsmotor zur Reichweitenverlängerung haben, sogenannte
  Range Extenders. Die Elektroautoförderung ist auch eine industriepolitische Maßnahme,
  die dazu beiträgt, den Automobilstandort Deutschland zu stärken und dessen Wettbewerbsfähigkeit
  zu sichern. Durch den gezielten Umstieg auf Elektromobilität fördert die Bundesregierung
  die Unabhängigkeit Deutschlands von Ölimporten und von krisenhaften Entwicklungen,
  wie wir sie zum Beispiel derzeit im Nahen Osten sehen. Das Antragsverfahren ist
  rein digital und kann in kurzer Zeit vollzogen werden. Voraussetzung ist lediglich
  die Anmeldung über BundID in Verbindung mit einer Onlinefunktion des Personalausweises
  oder über ein ELSTER-Zertifikat. Es ist auch möglich, dass das Autohaus die Anmeldung
  übernimmt, um die Förderung darüber laufen zu lassen. Bundesminister Schneider hat
  heute berichtet, dass der Start wirklich gut war. Ich glaube, dieses Programm hat
  alle Möglichkeiten, auch wirklich eine Erfolgsgeschichte zu werden. Ein weiterer
  Punkt: Die Bundesforschungsministerin hat heute im Kabinett zur Hightech Agenda
  Deutschland und zur Veröffentlichung von Technologieroadmaps vorgetragen. Was verbirgt
  sich dahinter? Mit der im Juli letzten Jahres beschlossenen Hightech Agenda richtet
  die Bundesregierung die Forschungs-, Technologie- und Innovationspolitik mit einem
  klaren Fokus auf Wertschöpfung, Wettbewerbsfähigkeit und technologische Souveränität
  völlig neu aus. Die Bundesministerin für Forschung, Technologie und Raumfahrt stellt
  dazu heute erste Roadmaps für sechs Schlüsseltechnologien der Hightech Agenda vor.
  Es geht hierbei um die künstliche Intelligenz, Quantentechnologie, Mikroelektronik,
  Biotech, Fusion und Batterietechnologien. Diese Roadmaps bündeln die verschiedenen
  Aktivitäten von Bund und Ländern zur Erreichung der Ziele der Agenda und hinterlegen
  sie mit Meilensteinen und Indikatoren. Sie liefern dabei hinaus Anknüpfungspunkte
  für Beiträge weiterer Partner. Seit Beginn des Jahres hat das Bundesforschungsministerium
  zu allen Schlüsseltechnologien umfassende Stakeholderkonsultationen durchgeführt,
  das heißt, mit Leuten gesprochen, die sich auskennen, die dann auch die Grundlage
  für die einzelnen Roadmaps bilden. Wir investieren damit in Innovation, in Zukunft,
  in Technologieführerschaft und haben hierbei nicht nur Roadmaps vorgelegt, sondern
  klar auch überprüfbare Ziele für die kommenden Monate vorgelegt, die unser Land
  wirklich technologisch auf ein neues Level heben werden und unser Land nach vorne
  bringen. - So weit war es das zum Kabinett. Meine Frage geht an das BMV. Es geht
  unter Fahrlehrern das Gerücht um, dass jetzt die Versicherungsbeiträge für Leute,
  die die Laienausbildung machen, erheblich steigen werden. Haben Sie das auf dem
  Schirm? Fürchten Sie, dass durch möglicherweise steigende Versicherungsbeiträge
  dann die Einsparung beim Führerschein wieder aufgefressen wird? Das ist ein guter
  Punkt. Dazu würde ich Sie ein bisschen um Geduld bitten. Ich kann wahrscheinlich
  gleich noch etwas nachliefern. Könnten Sie vielleicht etwas zur Evaluierung der
  ganzen Reform, also auch zum Zeitplan, sagen? Zum Zeitplan hatte sich ja eben auch
  schon der Regierungssprecher geäußert. Wir hoffen, dass es, wenn alles planmäßig
  verläuft, Anfang 2027 in Kraft treten wird. Es gab ja in der jüngeren Vergangenheit
  Reformprojekte der Bundesregierung, bei denen anschließend betroffene Organisationen
  klagten, dass das mit ihnen unzureichend abgesprochen worden sei. Wie ist es hierbei
  gelaufen? Es gibt ja einen Verband sowohl der Fahrlehrer und Fahrlehrerinnen als
  auch von Fahrschulen. Inwiefern waren sie in die Erarbeitung des Reformkatalogs
  eingebunden? Ich kann Ihnen dazu sagen, dass es dazu Abstimmungen auch mit den Verbänden
  gab und sie auch mit einbezogen wurden. Heißt „Abstimmung“, dass man sie in Kenntnis
  gesetzt hat, was geplant wird, oder sind die Organisationen aufgefordert worden,
  eigene Vorschläge einzubringen? Gab es dazu tatsächlich einen ernsthaften Konsultationsprozess?
  Es gab Gespräche und auch die Länder- und Verbändeanhörung dazu. Ich habe eine kurze
  Frage (zur Freischaltung des Antragsportals für das E-Auto-Förderprogramm für Privatpersonen
  ), und zwar würde mich noch interessieren, was eigentlich der Gedanke dabei war,
  auch Fahrzeuge mit Range Extender darin einzubeziehen. Bei den Plug-in-Hybriden,
  die zwar klimamäßig nichts nützen, kann ich mir noch vorstellen, dass es daran ein
  wirtschaftspolitisches Interesse gibt, weil deutsche Konzerne dabei stark vertreten
  sind. Aber Range Extender werden nach meinem Kenntnisstand bisher nur von japanischen
  und chinesischen Herstellern hergestellt, sodass das der ursprünglichen Idee, damit
  speziell auch europäische Fahrzeuge zu fördern, nicht nur nicht entspricht, sondern
  sogar voll zuwiderläuft. Was ist denn eigentlich der Hintergedanke dieser Förderung
  von Range Extendern? Sie haben schon sehr richtig gesagt, dass wir mit der insgesamten
  Förderung auch ein industriepolitisches Signal setzen möchten. Wie Sie auch ausgeführt
  haben, werden bei diesen Programmen verschiedene Modelle gefördert. Wir sehen den
  Schwerpunkt aber beim rein elektrischen Antrieb. Das bestätigen ja auch erst einmal
  die Zahlen. Der stellvertretende Regierungssprecher hat gerade schon angesprochen,
  dass gestern das Portal für das Förderprogramm von Elektroautos freigeschaltet worden
  ist. Ich kann vielleicht noch die Zahlen nachliefern: Seitdem das Portal online
  gegangen ist, gab es 17 640 eingegangene Anträge bis 10.30 Uhr bei der BAFA. Diese
  hohe Zahl zeigt, dass ein großes Interesse daran besteht. Von daher ist diese Förderung
  für uns insgesamt ein zielführendes Signal: Wir wollen damit den elektrischen Autoantrieb
  voranbringen, ein deutliches Zeichen setzen und auch mit der sozialen Staffelung
  vorangehen wollen. Das verstehe ich alles. Das ist auch alles interessant. Es ist
  aber keine Antwort auf meine Frage, warum auch Range Extender in die Förderung einbezogen
  werden. Minister Schneider hat dazu gestern noch einmal geäußert, dass die Antragszahlen,
  die für die ersten vier Monate 2026 vorlagen ‑ das hat er auch noch einmal in der
  gestrigen Pressekonferenz ausgeführt ‑, dafürsprechen, dass sich die Käuferinnen
  und Käufer hierzulande für Marken aus Deutschland entscheiden. Das ist für uns das
  wichtige Signal. Ich habe eine kurze Nachfrage dazu: Können Sie sagen, wie viele
  der vorliegenden Anträge auf reine Elektroautos entfallen und wie viele auf Hybride?
  Dazu müssten wir bei der BAFA nachfragen. Ich weiß aber nicht, ob sie das detailliert
  so zur Verfügung stellt. Das müsste ich schauen. Ich habe Ihnen eine Reise nach
  Schweden anzukündigen: Außenminister Wadephul wird morgen Nachmittag zum NATO-Außenministertreffen
  nach Helsingborg reisen . Auf der Agenda steht vor allem die Vorbereitung des NATO-Gipfels,
  der im Juli in Ankara stattfindet. NATO-Generalsekretär Rutte hatte dazu drei Prioritäten
  benannt, nämlich die Lastenverteilung im Bündnis, das Thema der Rüstungskooperation
  und den russischen Angriffskrieg in der Ukraine. Diese drei Schwerpunkte unterstützen
  wir selbstredend. Sie wissen, dass der Außenminister im vergangenen Jahr gerade
  beim Fünf-Prozent-Ziel mit in die Führung gegangen ist. Die Bundesregierung hat
  das sehr früh indossiert. Insofern ist das natürlich ein Ziel, das wir sehr stark
  unterstützen. Der Außenminister wird am Rande des Treffens auch bilaterale Gespräche
  führen. Anschließend reist er am Freitagnachmittag nach Prag weiter. Er wird dort
  mit seinem polnischen Amtskollegen und seiner ungarischen Amtskollegin an einem
  Panel des Global Security Forums teilnehmen. Herr Hinterseher, wir können vielleicht
  gleich mit einem Thema anfangen, das damit zusammenhängt: Wird in Schweden möglicherweise
  auch die Ankündigung von NATO-Oberbefehlshaber Grynkewich eine Rolle spielen, dass
  die USA kein Bataillon mit weitreichenden Mittelstreckenwaffen Tomahawk nach Deutschland
  verlegen und hier stationieren werden? Stimmt diese Information? Ist die Bundesregierung
  ‑ vielleicht kann auch Herr Meyer etwas dazu sagen ‑ informiert worden? In diesem
  Zusammenhang: Wird die Bundesregierung, wenn das so stimmt, jetzt selbst Tomahawks
  von den Amerikanern erwerben? Grundsätzlich haben wir die Ankündigung von der US-Seite
  natürlich zur Kenntnis genommen. Das hat uns jetzt auch nicht völlig überrascht.
  Wir haben uns hier auch schon mehrfach dazu geäußert. Wir konzentrieren uns darauf,
  die NATO weiter zu stärken. Die NATO ist deshalb so stark, weil sie am Ende ein
  Verteidigungsbündnis ist, von dem alle Seiten sehr stark profitieren. Sie wissen
  auch, dass wir als Deutschland in unterschiedlichen Ausprägungen in den kommenden
  Monaten und Jahren deutlich mehr Verantwortung übernehmen werden. Deshalb schauen
  wir mit großer Zuversicht auf den NATO-Gipfel und auf die weiteren Gespräche. Wie
  gesagt, arbeiten wir gemeinsam an einer starken NATO. Die zweite Frage war, ob die
  Bundesregierung jetzt überlegt oder ob sie auch schon in die Richtung denkt, selbst
  Tomahawks von den Amerikanern zu kaufen und sie dann hier sozusagen unter deutscher
  Obhut zu stationieren. Um das einmal klarzustellen: Es stimmt also, dass die Amerikaner
  nicht nur ein Bataillon nicht stationieren wollen, sondern auch die zugehörigen
  Tomahawks nicht, richtig? Ich bin ein bisschen überrascht, weil wir uns dazu Anfang
  Mai hier umfassend geäußert hatten. Die Ankündigung ist nicht neu. Der Bundeskanzler
  hat sich dazu geäußert. Wir haben uns hier dazu geäußert. Auch Bundesminister Pistorius
  hat sich mehrfach im Fernsehen, in diversen Interviews zur Situation geäußert. Er
  hat auch dargestellt, welche Schritte jetzt unternommen werden. Ich habe das auch
  hier erläutert. Ich habe erläutert, dass wir im Grunde ein Dreischrittverfahren
  machen. Der erste Schritt ist, dass wir probieren, marktverfügbare Systeme zu kaufen.
  Sie wissen, dass eine Anfrage bei den Amerikanern läuft. Auch der SACEUR hat gestern
  bestätigt, dass dieses Verfahren läuft und die US-Regierung noch nicht entschieden
  hat, so wie ich es hier auch dargestellt habe. Bei dem Kauf marktverfügbarer Systeme
  geht es aber auch um weitreichende Drohnensysteme, die relativ kostengünstig sind,
  um zum Beispiel gegnerische Luftverteidigung massiv zu übersättigen. Auch das haben
  wir hier dargestellt. Danach gibt es den zweiten Pfeiler. Das ist der Pfeiler der
  Eigenentwicklung. Dabei gehen wir über den European Long-Range Strike Approach,
  ELSA, größtenteils gemeinsam mit den Briten vor und werden dort im Schwerpunkt zwei
  Systeme entwickeln. Das eine sind weitreichende Marschflugkörper mit einer Reichweite
  von ca. 2000 Kilometern. Das andere ist ein hypersonischer Gleiter. Die dritte Komponente
  ist dann, dass wir eigene Fähigkeiten im Bereich der TAURUS-Modernisierung stärken.
  Es lief ja auch im letzten Jahr schon die 25-Millionen-Euro-Vorlage ‑ sie ist durchgegangen ‑
  zur Serienreifmachung des TAURUS NEO. Das sind die drei großen Handlungsfelder,
  in denen wir uns bewegen. Deswegen bin ich ein bisschen überrascht. Diese Informationen
  und das, was gestern gesagt wurde, sind eigentlich nicht neu. Ich würde gern noch
  (zur Reise des Bundesaußenministers nach Helsingborg und Prag ) nachfragen. Herr
  Hinterseher, Sie haben jetzt vor allem angesprochen, welche Themen Herr Rutte auf
  die Agenda gesetzt hat. Gibt es denn Themen, die Außenminister Wadephul mitnimmt
  und die er dort vielleicht auch speziell mit Blick auf das Verhältnis zu den USA
  ansprechen möchte? Ich hatte ja gesagt, dass wir die Schwerpunkte, die dort gesetzt
  und für die Agenda vorgesehen sind, vollumfänglich unterstützen und dabei teilweise
  auch selbst sehr stark engagiert sind ‑ natürlich auch bei der Unterstützung der
  Ukraine, um das noch beispielhaft zu nennen. Es verhält sich aber natürlich wie
  immer: Gerade was die am Rande dieses Treffens stattfindenden bilateralen Gespräche
  betrifft, die ich angekündigt habe, äußern wir uns im Vorfeld nicht zu Details.
  Könnten Sie „bilaterale Gespräche“ vielleicht einengen? Wird es bilaterale Gespräche
  beispielsweise auch mit der US-Seite geben, oder mit welchen Partnerstaaten wollen
  Sie vor Ort sprechen? Der Kreis ergibt sich natürlich aus den NATO-Mitgliedstaaten,
  die dort vertreten sein werden. Dort gibt es dann natürlich verschiedene Formate,
  in denen wir uns besprechen werden. Ich nenne jetzt beispielhaft einmal das E3-Format,
  das Ihnen allen bekannt ist. Ich möchte aber, wie gesagt, den Gesprächen selbst
  nicht vorgreifen und würde Sie bitten, einfach dem Fortgang des Treffens zu folgen.
  Wir werden zu den Gesprächen, die dann stattgefunden haben, natürlich auch umfassend
  informieren. Dazu muss ich einmal nachfragen, Herr Hinterseher: Ist ein bilaterales
  Treffen mit Herrn Rubio geplant oder nicht? Ich habe weder das eine noch das andere
  gesagt. Ich habe gesagt, dass wir über die Gespräche, die im Fortgang des Treffens
  stattfinden werden, im Nachgang informieren werden. Wirtschaftsministerin Katherina
  Reiche wird in der kommenden Woche, genauer gesagt vom 26. bis 29. Mai, nach China
  reisen . Vor Ort wird sie bei Stationen in Peking und der südchinesischen Wirtschaftsmetropole
  Kanton politische Gespräche führen und eine Wirtschaftsveranstaltung sowie örtliche
  Unternehmen besuchen. Die Reise fügt sich in die Strategie der Bundesregierung ein,
  das künftige Kooperationspotenzial auszuloten und gleichzeitig den Dialog mit der
  chinesischen Regierung fortzusetzen. Die Ministerin wird von einer Wirtschaftsdelegation
  begleitet. Wie sieht diese Begleitung denn genau aus? Fliegen die alle zusammen?
  Es steht keine Regierungsmaschine zur Verfügung, deshalb muss per Linienflug geflogen
  werden. Zu den einzelnen Flugbewegungen der Wirtschaftsdelegation kann ich mich
  hier nicht äußern. Das liegt uns nicht vor. Die Ministerin fliegt auch per Linienflug.
  Können Sie sagen, wie groß die Wirtschaftsdelegation ist? Exakt kann ich es Ihnen
  noch nicht sagen. Die Zahl kann ich nachreichen. Ich kenne die Zahl jetzt nicht
  exakt. Könnten Sie noch etwas zu dem Ziel oder zu den Plänen der Reise sagen? Geht
  es dabei also beispielsweise um Rohstoffe, um den Abbau von Handelshindernissen?
  Gibt es also ein konkretes Vorhaben, das die Ministerin mit dieser Reise verfolgt?
  Es geht zum einen um Kooperationsziele ‑ das hatte ich gerade erwähnt ‑, zum Beispiel
  bei der Entwicklung von Energietechnologien, und darum, sich darüber auszutauschen.
  Aber natürlich ist es angesichts der geopolitischen Spannungen und der schwierigen
  Lage, in der sich die Wirtschaft derzeit befindet, gerade im Rohstoffbereich wichtig
  für die Bundesregierung, sich resilienter aufzustellen und auch einen fairen Wettbewerb
  einzufordern. Das sind sicherlich Themen, die in China eine Rolle spielen werden,
  sicherlich auch, das Gesamtgewicht der Europäischen Union, was den Markt angeht,
  dort zur Sprache zu bringen. Ich habe noch eine Nachfrage. Klar liegt der Fokus
  hier auf der Wirtschaft. Aber gerade auch im Zusammenspiel mit der Außenpolitik
  wird ja vonseiten der Bundesregierung viel auf China geschaut. Wie stimmen Sie sich
  da ab? Haben Sie sich da mit dem Kanzleramt und dem AA im Vorfeld dieser Reise abgestimmt,
  oder findet das noch statt? Generell wird sich bei solchen Reisen immer vorher über
  außen- und geopolitische Fragen innerhalb der Bundesregierung abgestimmt. Könnten
