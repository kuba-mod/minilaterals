title: Fragen und Antworten Diese Führerscheine müssen umgetauscht werden
text: 'Mit der Befristung der neuen Führerscheine sollen Fälschungen erschwert werden,
  da Passfoto und Personendaten regelmäßig aktualisiert werden. Ob grauer Lappen,
  rosa Pappe oder weiße Plastikkarte: Nach der Dritten EU -Führerscheinrichtlinie
  sind bis zum 19. Januar 2033 alle Pkw - und Motorradführerscheine, die vor dem 19.
  Januar 2013 ausgestellt wurden, in den neuen EU -Führerschein umzutauschen. So soll
  sichergestellt werden, dass alle in der EU noch in Umlauf befindlichen Führerscheine
  ein einheitliches und fälschungssicheres Muster erhalten. Für den Führerschein-Umtausch
  gelten in Deutschland gestaffelte Fristen. Bei Führerscheinen mit Ausstellungsdatum
  ab dem 1. Januar 1999 gilt das Ausstellungsjahr des Führerscheins: Wo finde ich
  das Ausstellungsdatum? Das Ausstellungsdatum des Kartenführerscheins ist auf der
  Vorderseite im Feld 4a eingetragen. Fahrerlaubnisinhaber, deren Geburtsjahr vor
  1953 liegt, müssen den Führerschein bis zum 19. Januar 2033 umtauschen, unabhängig
  vom Ausstellungsjahr des Führerscheins. Allgemein gilt: Führerscheine, die ab dem
  19. Januar 2013 ausgestellt wurden, sind nicht mehr unbegrenzt, sondern nur noch
  15 Jahre lang gültig - danach müssen sie erneuert werden. Beim Umtausch des Führerscheins
  handelt es sich um eine rein verwaltungstechnische Angelegenheit – die Fahrerlaubnis
  selbst bleibt unverändert bestehen. Zusätzliche ärztliche Untersuchungen oder sonstige
  Prüfungen wie eine Wiederholung der Fahrprüfung sind damit nicht verbunden. Für
  den Motorradführerschein gelten dieselben Umtauschfristen wie beim Pkw -Führerschein.
  Zukünftig muss auch er spätestens alle 15 Jahre verlängert werden. Eine nochmalige
  Prüfung oder ein Gesundheitszeugnis sind dafür ebenfalls nicht erforderlich. Für
  den Umtausch des Führerscheindokuments ist grundsätzlich die Fahrerlaubnisbehörde
  des aktuellen Wohnsitzes zuständig. Es empfiehlt sich, frühzeitig einen Termin zu
  buchen. Für den erfolgreichen Führerscheinumtausch sind folgende Dokumente vorzulegen:
  Wurde der alte Papierführerschein nicht von der Behörde des aktuellen Wohnsitzes
  ausgestellt, ist eine sogenannte Karteikartenabschrift der ursprünglich ausstellenden
  Behörde erforderlich. Diese lässt sich per Post, telefonisch oder auch online beantragen
  und an die aktuelle Fahrerlaubnisbehörde schicken. Anders als bisher verlieren die
  Dokumente nach 15 Jahren ihre Gültigkeit. Sie müssen dann – wie zum Beispiel der
  Personalausweis oder der Reisepass – erneuert werden. Für die ab dem 19. Januar
  2013 ausgestellten Führerscheine gilt die 15-Jahres-Gültigkeitsbefristung bereits.
  Mit der Befristung sollen Fälschungen erschwert werden, da Passfoto und Personendaten
  regelmäßig aktualisiert werden. Eine ärztliche Untersuchung oder eine Überprüfung
  der Fahreignung müssen bei der Neubeantragung nicht nachgewiesen werden. Wer vergisst,
  seinen Führerschein rechtzeitig zu erneuern, begeht eine Ordnungswidrigkeit und
  muss mit einem Verwarnungsgeld von zehn Euro rechnen. Die Länder können in Ausnahmefällen
  von einer Geldbuße absehen. Mehr zum Führerschein-Umtausch erfahren Sie auf der
  Internetseite des Bundesverkehrsministeriums .'
