title: Fragen und Antworten zur Entlastungsprämie Steuerfreie Prämie für Beschäftigte
text: 'Der Vorschlag einer Entlastungsprämie sah eine steuer- und abgabenfreie Auszahlung
  an Beschäftigte vor. Foto: mauritius images / Westend61 / Arman Zhenikeyev Die Preissteigerungen
  infolge des Iran-Kriegs stellen viele Bürgerinnen und Bürger in Deutschland vor
  große finanzielle Herausforderungen. Die Bundesregierung will schnell für Entlastung
  sorgen und hat ein Energiesofortprogramm sowie weitere Unterstützungsmaßnahmen für
  Arbeitnehmerinnen und Arbeitnehmer beschlossen. Das Kabinett hat einen Teil dieses
  Gesamtpakets im Umlaufverfahren auf den Weg gebracht – die Möglichkeit, eine Entlastungsprämie
  in Höhe von bis zu 1.000 Euro auszuzahlen. Der Deutsche Bundestag stimmte dem Vorhaben
  am 24. April zu. Der Bundesrat verweigerte seine Zustimmung. Am 13. Mai informierte
  der Sprecher der Bundesregierung darüber, dass das Vorhaben der Entlastungsprämie
  nach der Ablehnung durch den Bundesrat nicht weiter verfolgt wird. Die Bundesregierung
  hält jedoch an dem Plan fest, angesichts der gestiegenen Energiepreise eine Entlastung
  für die Bürgerinnen und Bürger zu erzielen. Die folgenden Informationen beziehen
  sich auf die ursprünglichen Planungen zur Entlastungsprämie. Das Vorhaben wird nach
  der Ablehnung durch den Bundesrat nicht weiter verfolgt. Unternehmen können diese
  Möglichkeit nutzen, es besteht aber keine Pflicht. Die Bundesregierung will die
  Rahmenbedingungen dafür schaffen, dass Arbeitgeber Leistungen zur Abmilderung der
  gestiegenen Preise bis zu einem Betrag von 1.000 Euro steuer- und abgabenfrei an
  ihre Arbeitnehmer auszahlen können. Das ist ein Angebot an die Wirtschaft, ihre
  Beschäftigten – abhängig von der jeweiligen betrieblichen Lage – zu entlasten. Die
  Unternehmen sind flexibel in der Ausgestaltung. Die Betriebe, die sich für die Auszahlung
  der Prämie entscheiden, können diese als Betriebskosten steuerlich geltend machen.
  Nein. Wenn sich der Arbeitgeber dazu entscheidet, die Entlastungsprämie zusätzlich
  zum Arbeitslohn auszuzahlen, erfolgt dies im Rahmen der Lohnabrechnung und muss
  auch dort ausgewiesen werden. Die Entlastungsmaßnahme der Bundesregierung soll die
  steuer- und abgabenfreie Auszahlung der Entlastungsprämie bis zu einem Betrag in
  Höhe von 1.000 Euro ermöglichen. Voraussetzung ist, dass die Leistung zusätzlich
  zum Arbeitslohn gewährt wird, also insbesondere nicht im Wege einer Entgeltumwandlung
  finanziert wird. Unternehmen können die gezahlten steuer- und sozialabgabenfreien
  Prämien als Betriebsausgabe geltend machen. Dadurch entstehen dem Bund Mindereinnahmen.
  Zur Gegenfinanzierung wird die Tabaksteuer schon im Jahr 2026 erhöht. Die Bundesregierung
  rechnet damit, dass sich die Energiepreise mittelfristig wieder entspannen werden.
  Daher ist die Steuerbefreiung für die Auszahlung der Prämie zeitlich befristet.
  Die steuer- und abgabenfreie Zahlung durch die Arbeitgeber soll im Zeitraum vom
  Tag nach der Verkündung des Gesetzes bis zum 30. Juni 2027 möglich sein. Die Möglichkeit,
  eine Entlastungsprämie durch die Arbeitgeber auszuzahlen, ist Teil eines größeren
  Maßnahmenpakets , das in der derzeit sehr angespannten Situation auf den Energiemärkten
  für Unterstützung sorgt. Kurzfristig senkt die Bundesregierung für zwei Monate die
  Mineralölsteuer für Benzin und Diesel. Sie sorgt damit für eine spürbare Entlastung
  für private Haushalte sowie Unternehmen bei den Kraftstoffpreisen um rund 1,6 Milliarden
  Euro. Die Verschärfung des Kartellrechts soll dazu beitragen, missbräuchliches Verhalten
  im Kraftstoffmarkt schneller festzustellen und konsequent zu verfolgen. Darüber
  hinaus geht es um langfristige Entlastungen: Mit Wirkung zum 1. Januar 2027 wird
  die Regierungskoalition eine große Reform der Einkommenssteuer zur dauerhaften Entlastung
  kleiner und mittlerer Einkommen umsetzen. Das Bundeskabinett hat im Umlaufverfahren
  eine Formulierungshilfe beschlossen. Ein sogenanntes Umlaufverfahren kann beispielsweise
  eingeleitet werden, wenn ein Gesetzesvorhaben beschleunigt werden soll oder eine
  mündliche Beratung der Kabinettsmitglieder nicht erforderlich ist. Sie können dann
  in einem schriftlichen Verfahren zustimmen. Für das Umlaufverfahren ist der Chef
  des Bundeskanzleramtes zuständig. Eine Formulierungshilfe der Bundesregierung für
  die Koalitionsfraktionen ist gängige Praxis.'
