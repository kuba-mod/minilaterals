title: Überblick Ein Jahr Bundesregierung
text: '190 Gesetze hat die Bundesregierung seit ihrem Amtsantritt auf den Weg gebracht.
  Insgesamt hat die schwarz-rote Bundesregierung in den ersten zwölf Monaten 190 Gesetze
  auf den Weg gebracht (Stand 6. Mai 2026) und besonders in den Bereichen Wirtschaft,
  Sicherheit, Migration und gesellschaftlicher Zusammenhalt wichtige Weichen gestellt.
  Im Fokus stehen Investitionen in Verteidigung, Straßen, Schulen, Digitalisierung,
  Sicherheitsbehörden und in eine moderne Verwaltung. Ziel ist es, Deutschland wieder
  wettbewerbsfähig zu machen und so wirtschaftlich stark aufzustellen. Neben den Reformen
  von Gesundheits- und Sozialsystemen werden dafür auch Verfahren beschleunigt und
  die Infrastruktur modernisiert. Deutschland soll eine starke Industrienation und
  Mittelstandsland bleiben. Zeitgleich muss es die Innovationskraft weiter ausbauen.
  Zu den wichtigsten Maßnahmen der Bundesregierung zählen das Investitions-Sofortprogramm,
  ein neuer Deutschlandfonds, das Standortfördergesetz, die Hightech Agenda und Entlastungen
  bei Energiekosten. Das steuerliche Investitionssofortprogramm ist bereits am 19.
  Juli 2025 in Kraft getreten. Es dient dem schnellen Anschub wachstumswirksamer Investitionen
  – zugleich verbunden mit langfristigen Entlastungen. Konkret schafft die Bundesregierung
  degressive Abschreibungen von bis zu 30 Prozent für Ausrüstungsinvestitionen nach
  dem 30. Juni 2025 und vor dem 1. Januar 2028. Mit der ersten Körperschaftssteuersenkung
  nach mehr als 15 Jahren entlastet die Bundesregierung Unternehmen, um Investitionsanreize
  zu setzen. Die Bundesregierung löst den Investitionsstau auf. Das Sondervermögen
  Infrastruktur und Klimaschutz mit 500 Milliarden Euro ist nun angelaufen. Alles,
  was gebaut werden soll und geplant ist, kann gebaut werden. Damit saniert die Regierung
  beispielsweise Schulen, Brücken, Straßen und Schienen. In der kurzen Zeit bis Jahresende
  2025 konnte der Bund bereits 24 Milliarden Euro aus dem Sondervermögen investieren.
  Insgesamt betrugen die Investitionen des Bundes im vergangenen Jahr 87 Milliarden
  Euro – im Vergleich zu 2024 eine Steigerung um 17 Prozent. Für 2026 plant der Bund
  einen weiteren Aufwuchs der Investitionen auf über 120 Milliarden Euro. Gleichzeitig
  wird der Staat effizienter und bürgernäher. So wird das Kindergeld antraglos ab
  Geburt ausgezahlt und der Führerschein digital. Die Bundesregierung reduziert die
  Energiekosten spürbar und dauerhaft. Das soll sowohl die internationale Wettbewerbsfähigkeit
  des Wirtschaftsstandorts stärken als auch die Verbraucherinnen und Verbraucher in
  Deutschland entlasten. Seit Anfang 2026 sind Maßnahmen in Kraft, die rund zehn Milliarden
  Euro im Jahr an Entlastung von Energiekosten für alle Verbraucherinnen und Verbraucher
  bedeuten. Die Maßnahmen umfassen unter anderem die Abschaffung der Gasspeicherumlage,
  niedrigere Netzentgelte und Stromsteuersenkung für produzierende Unternehmen und
  Land- und Forstwirtschaft. Als Reaktion auf die Lage in Nahost senkt die Bundesregierung
  für zwei Monate kurzfristig die Mineralölsteuer um circa 17 Cent pro Liter für Benzin
  und Diesel – mit dem Energiesofortprogramm . Das entlastet die Bürgerinnen und Bürger
  und die Unternehmen an der Tankstelle um rund 1,6 Milliarden Euro. Zudem wurde mit
  dem Kraftstoffmaßnahmenpaket das Kartellrecht verschärft. Die sicherheitspolitische
  Lage in Europa und auf der Welt hat Deutschland veranlasst, seine Verteidigung neu
  und umfassender auszurichten. Investitionen in Bundeswehr, Zivil- und Bevölkerungsschutz
  und Sicherheitsbehörden stärken Deutschland. Auch Kriminalität, Extremismus und
  organisierte Netzwerke werden entschlossener verfolgt. Das Bundespolizeigesetz wurde
  reformiert und die Drohnenabwehr verbessert. Mit dem KRITIS-Dachgesetz sind erstmals
  einheitliche Mindeststandards für den Schutz kritischer Infrastrukturen festgelegt
  worden. Zudem setzt die Bundesregierung neue europäische Cybersicherheitsstandards
  um und hat eine Nationale Wirtschaftsschutzstrategie beschlossen. Unter Vorsitz
  des Bundeskanzlers wurde der Nationale Sicherheitsrat eingerichtet. Damit wurde
  die Sicherheitsarchitektur Deutschlands an entscheidender Stelle umgebaut, um die
  Handlungsfähigkeit der Bundesregierung in Fragen der nationalen Sicherheit zu stärken.
  Die deutschen Verteidigungsausgaben steigen deutlich. Die Reform des Planungs- und
  Beschaffungswesens wird zu einem effizienten Einsatz der zusätzlichen Mittel beitragen.
  Ein neues Wehrdienstmodell soll die Bundeswehr attraktiver machen und beruht zunächst
  auf Freiwilligkeit. Deutschland stärkt die europäische Verteidigungsfähigkeit innerhalb
  der NATO . Die Außen- und Sicherheitspolitik der Bundesregierung baut systematisch
  auch neue Partnerschaften auf, um sich auf eine Welt der Großmächte einzustellen.
  Das folgt der Einsicht, dass europäische und transatlantische Zusammenarbeit alleine
  nicht genügen wird, um in der neuen Ordnung wirkungsvoll eigene Anliegen zu wahren.
  Der Bundeskanzler hat hier einen Schwerpunkt gesetzt, unter anderem durch Reisen
  zu und Gespräche mit seinen Amtskollegen aus Indien, der Türkei, Brasilien, Südafrika
  und aus den Golf-Staaten. Dies hat neue Anstöße zu strategischer Zusammenarbeit
  gegeben. Bundeskanzler Friedrich Merz verfolgt seit seinem Amtsantritt eine Europapolitik,
  die auf die Stärkung der europäischen Sicherheits‑ und Verteidigungsfähigkeit, eine
  engere deutsch‑französische Zusammenarbeit, die wirtschaftliche Wettbewerbsfähigkeit
  der EU und eine handlungsfähigere, souveränere Union ausgerichtet ist. Im Fokus
  stehen die Notwendigkeit wirtschaftlicher Reformen und die fortgesetzte Unterstützung
  der Ukraine. Für die Bundesregierung ist und bleibt Europa der zentrale Rahmen für
  Deutschlands außen‑ und sicherheitspolitisches Handeln. Die Bundesregierung hat
  eine Wende bei der Migration eingeleitet: Verfahren laufen schneller, Regeln werden
  konsequenter angewandt. Erstmals seit 2015 ist Deutschland nicht mehr das Land mit
  den höchsten Asylzahlen in Europa, sondern liegt auf Platz vier hinter Frankreich,
  Spanien und Italien. Dazu beigetragen haben unter anderem konsequente Zurückweisungen
  an den Grenzen, die Abschaffung der Einbürgerung nach drei Jahren sowie des Familiennachzugs
  für subsidiär Schutzberechtigte. Auf der europäischen Ebene wurde das Gemeinsame
  Europäische Asylsystem reformiert. Ab Juni 2026 gelten einheitlichere Regeln für
  mehr Ordnung, Sicherheit und Fairness. Für Deutschland bedeutet das schnellere Verfahren
  und eine spürbare Entlastung. Aufgrund der demografischen Entwicklung und steigender
  Belastungen für die Sozialsysteme muss die Bundesregierung den Sozialstaat langfristig
  sichern. Dazu haben mehrere Kommissionen – beispielsweise die Kommission zur Sozialstaatsreform
  oder die Finanzkommission Gesundheit – Vorschläge erarbeitet, die nun schrittweise
  umgesetzt werden. Auf Grundlage der Empfehlungen der Finanzkommission Gesundheit
  hat die Bundesregierung den Entwurf eines Gesetzes zur Stabilisierung der Beitragssätze
  auf den Weg gebracht. Das Ziel: die Beitragssätze dauerhaft zu stabilisieren und
  gleichzeitig ein hohes Niveau an Gesundheitsversorgung auch weiterhin sicherzustellen.
  Dazu wurde ein Bündel von Maßnahmen beschlossen, das die Lasten verteilt. Alle müssen
  einen Beitrag leisten – Ärzte, Krankenhäuser, Apotheken, Hersteller, Versicherte,
  Arbeitgeber. Das Rentenniveau wurde bis 2031 bei 48 Prozent stabilisiert und die
  Einführung der Mütterrente III zum 1. Januar 2027 vorbereitet. Mit der Aktivrente
  wurden neue Hinzuverdienstmöglichkeiten geschaffen. Außerdem wurde die betriebliche
  Altersvorsorge gestärkt. Die Bundesregierung hat zudem eine Reform der privaten
  Altersvorsorge auf den Weg gebracht und mit der Frühstart-Rente wichtige Anreize
  geschaffen, schon im Kindesalter finanzielle Vorsorge für das Alter zu treffen.
  Das Bürgergeld ist durch die neue Grundsicherung ersetzt worden mit dem Ziel, dass
  Sozialleistungen gerechter und treffsicherer werden. Der gesetzliche Mindestlohn
  liegt seit 1. Januar 2026 bei 13,90 Euro brutto in der Stunde. Mehr als sechs Millionen
  Menschen profitieren von der Erhöhung. Steigende Mieten und knapper Wohnraum belasten
  viele Menschen. Mit dem Wohnungsbau-Turbo werden Planungs- und Genehmigungsverfahren
  beschleunigt und zusätzlicher Wohnraum geschaffen; zusätzlich wurde die Mietpreisbremse
  verlängert. Ein weiterer Schwerpunkt liegt auf Bildung und Familie. Länder und Kommunen
  erhalten über das Investitionsprogramm Ganztagsausbau die notwendige Zeit, um die
  Investitionsmittel des Bundes sinnvoll einzusetzen und qualitativ hochwertige Betreuungsangebote
  auszubauen. Mit dem DigitalPakt 2.0 werden die digitale Infrastruktur in Schulen
  und eine verlässliche Administration ausgebaut. Im Januar 2026 wurde die Agrardieselrückerstattung
  wieder eingeführt . Dies entlastet die Höfe um jährlich 430 Millionen Euro und gleicht
  Wettbewerbsnachteile aus. Zudem sind durch die Abschaffung der Stoffstrombilanz
  bürokratische Pflichten entfallen. Die Aufnahme des Wolfes in das Jagdrecht verbessert
  den Schutz von Weidetieren. Für mehr Tierschutz sorgt zudem die geplante Videoüberwachung
  in Schlachthöfen.'
