title: Rede des Kanzlers zum einjährigen Bestehen des Bundesministeriums für Digitales
  und Staatsmodernisierung Erste sichtbare Erfolge bei Digitalisierung und Bürokratierückbau
text: 'Bundeskanzler Merz dankte Minister Wildberger und den Mitarbeiterinnen und
  Mitarbeitern des BMDS für die „Pionierarbeit“ im letzten Jahr. Bundeskanzler Friedrich
  Merz hat an den Feierlichkeiten anlässlich des einjährigen Bestehens des Bundesministeriums
  für Digitales und Staatsmodernisierung teilgenommen. Die Gründung des Ministeriums
  sei „vielleicht eine der wichtigsten Zukunftsentscheidungen, die wir in der Bundesregierung
  für unser Land getroffen haben“, betonte der Kanzler. Die Arbeit zeige bereits erste
  sichtbare Erfolge. Merz nannte die Verabschiedung der Modernisierungsagenda Bund
  und der Föderalen Modernisierungsagenda . „Wir werden diese beiden Agenden jetzt
  parallel konsequent umsetzen, für weniger Bürokratie, für mehr Digitalisierung,
  für schnellere und effizientere Verfahren“. Ziel sei ein Staat, „der einfach, schnell
  und bürgernah ist, einen Staat, der digital ist, der die Menschen wirklich bei dem
  unterstützt, was sie wollen“, so der Kanzler. Sehr geehrter Herr Minister, lieber
  Karsten Wildberger, liebe Kolleginnen und Kollegen aus dem Deutschen Bundestag,
  sehr geehrte Staatssekretäre, Abteilungsleiterinnen, Abteilungsleiter, Mitarbeiterinnen
  und Mitarbeiter dieses neuen Ministeriums, herzlichen Glückwunsch zum ersten Geburtstag!
  Ich bin wirklich dankbar, dass ich die Gelegenheit habe, heute hier zu sein, denn
  ich möchte Ihnen etwas sagen: Sie haben im letzten Jahr wirklich Pionierarbeit geleistet,
  mit einem neuen Ministerium und mit einem Minister, der bereit gewesen ist, aus
  der Privatwirtschaft in die Politik zu wechseln. Lieber Karsten Wildberger, ich
  will Ihnen, ich will dir danken, dass du dich auf dieses Abenteuer Politik eingelassen
  hast. Das ist nicht selbstverständlich und das muss auch nicht immer gelingen. Aber
  ich kann in diesem Falle – du, Karsten, bist überhaupt das erste Mal in deinem langjährigen,
  erfolgreichen Berufsleben aus der Privatwirtschaft in die Politik gewechselt; das
  gilt im Übrigen auch für Katherina Reiche, die ähnlich, aber mit politischer Erfahrung,
  aus der Privatwirtschaft sozusagen nur in die Politik zurückgekehrt ist – sagen:
  Dieses Experiment ist gelungen, meine Damen und Herren, und dafür bin ich persönlich
  sehr, sehr dankbar! Meine Damen und Herren, das ist gelungen, weil Sie dazu beigetragen
  haben: die Leitungsebene, aber auch die Mitarbeiterinnen und Mitarbeiter, die es
  möglich gemacht haben, eben diese Pionierarbeit in diesen 366 Tagen zu leisten.
  Ihr Haus, dieses Ministerium, kann mittlerweile selbstbewusst im Ressortkreis der
  Bundesregierung auftreten. Ich gehe noch einen Schritt weiter: Sie sind heute in
  unserer Regierung nicht mehr wegzudenken. Wenn es Sie nicht gäbe, würde etwas in
  der Bundesregierung fehlen, und es würde uns allen auffallen. Meine Damen und Herren,
  dieses Team, das Sie hier haben, ist aus insgesamt sechs früheren Ressorts der Bundesregierung
  zusammengesetzt, und nun, seit wenigen Wochen, sind sie auch hier in der Friedrichstraße
  zusammen. Das zeigt, wie aus Vielfalt Stärke entstehen kann. Ich danke Ihnen, ich
  danke den Aufbaustäben, ich danke allen, die später und nach und nach dazugekommen
  sind. Dieses Jahr war ein großer Kraftakt für Sie alle. Aber Sie sind vorangekommen,
  und Sie haben enorme Fortschritte erzielt, auch gegen manche Widerstände. Die soll
  es ja zu Beginn der Zusammenarbeit mit dem einen oder anderen Ressort gegeben haben,
  mit anderen Häusern der Bundesregierung. Aber es ist eine Zusammenarbeit, die Sie
  heute leben wie kein zweites Ressort. Denn Sie sind ein Querschnittsressort, das
  alle Ressorts der Bundesregierung mittelbar und unmittelbar betrifft. Deswegen war
  die Entscheidung, dieses Ministerium zu gründen – ich gebe zu, ja, es war meine
  Idee, aber ich musste sie auch in der eigenen Partei, in der Union, und in der Koalition
  mit der SPD durchsetzen, vielleicht eine der wichtigsten Zukunftsentscheidungen,
  die wir in der Bundesregierung für unser Land getroffen haben. Manche haben dabei
  gewarnt, dass die Gründung eines solchen Ministeriums vielleicht sogar eher behindert
  und verhindert. Aber Sie alle, meine Damen und Herren, haben in den letzten 366
  Tagen unter anspruchsvollsten Bedingungen genau das Gegenteil bewiesen. Wir werden
  gleich noch einen kurzen Film schauen und dann den Zeitstrahl mit den Meilensteinen
  sehen. Ich freue mich auf den Rundgang. Aber lassen Sie mich zuvor noch dies sagen:
  Sie tun hier viel und Entscheidendes für die Menschen, für die Verwaltung, für die
  Wirtschaft, für die Unternehmen in Deutschland, und Ihre Arbeit zeigt bereits erste
  sichtbare Erfolge. Ich will die Beispiele nennen, und, Karsten, du hast sie angesprochen:
  Wir haben ein zentrales Rahmenwerk für die Staatsmodernisierung vorgelegt, nämlich
  die Modernisierungsagenda für Staat und Verwaltung des Bundes, und – nicht zu unterschätzen,
  im Gegenteil, und ich bin dankbar, dass Ralph Brinkhaus auch mich vor einigen Tagen
  noch einmal nachdrücklich genau darauf hingewiesen hat – wir haben erstmals in der
  Geschichte der Bundesrepublik Deutschland am 4. Dezember 2025 eine umfassende Föderale
  Modernisierungsagenda mit allen 16 Bundesländern beschlossen, und zwar eine verbindliche
  Agenda dafür, wie wir jetzt auch in den Ländern in die Umsetzung kommen. Wir sind
  ein föderaler Staat. Ohne die Länder, ohne die Selbstverwaltung der Kommunen geht
  es nicht. Ich bin froh und dankbar, zu lesen und zu hören, dass es mittlerweile
  Länder gibt, die da schon vorangehen, die in Umsetzung einzelner Teile dieser Modernisierungsagenda
  für ganz Deutschland Kabinettsbeschlüsse gefasst haben. Wir werden diese beiden
  Agenden jetzt parallel konsequent umsetzen, für weniger Bürokratie, für mehr Digitalisierung,
  für schnellere und effizientere Verfahren. Sie haben im Herbst des letzten Jahres,
  und auch daran möchte ich heute gerne erinnern, den Gipfel für europäische digitale
  Souveränität ausgerichtet. Meine Damen und Herren, Emmanuel Macron und ich haben
  daran als Ihre Gäste teilgenommen, und ich werde von Emmanuel Macron bis heute ganz
  regelmäßig auf diesen wichtigen Meilenstein angesprochen, den wir hier auch für
  Folgeprojekte gemeinsam gesetzt haben, etwa die Initiative für souveräne Arbeitsplätze
  oder die European Frontier AI Initiative , die Deutschland und die Europäische Union
  bei der Entwicklung von Speerspitzen- KI jetzt voranbringen soll. Vielleicht ist
  der Tag auch geeignet, darauf hinzuweisen, dass wir auch in Europa Fortschritte
  machen. Es hat bis 5 Uhr heute Morgen gedauert, aber im Europäischen Rat und im
  Trilog zwischen Parlament, Kommission und Rat ist es gelungen, die bestehende Regulierung
  für die Künstliche Intelligenz wieder ein Stück zurückzunehmen, Doppelregulierung
  zu vermeiden und insbesondere dem deutschen Maschinenbau die Perspektive zu eröffnen,
  mit dieser zurückgenommenen europäischen Regulierung jetzt Schritt mit den Ländern
  wie etwa der Volksrepublik China oder den Vereinigten Staaten von Amerika in der
  Entwicklung von Produkten und von Prozessen gerade im Maschinenbau zu halten. Meine
  Damen und Herren, mit der ersten Sitzung des Entlastungskabinetts – Karsten, du
  hast das angesprochen – haben wir mit dem Bürokratierückbau bereits begonnen, damals
  im Umfang von etwa drei Milliarden Euro. Wir haben das auf den Weg gebracht. Aber
  ich sage sehr anspruchsvoll: Wir müssen beim nächsten Mal noch mehr liefern. Am
  15. Juli wird nach bisherigem Plan die nächste Sitzung des Bundeskabinetts stattfinden,
  bei der wir uns ganz überwiegend mit Entlastung befassen wollen. Ich will die Gelegenheit
  nutzen, an alle Ressorts zu appellieren, jetzt wirklich Beiträge zu liefern, die
  in einem größeren Umfang den Rückbau von Bürokratie in Deutschland ermöglichen.
  Wir haben dafür auch ein entsprechendes Portal geschaffen. Wir haben die Möglichkeit
  für Bürgerinnen und Bürger, für Unternehmen aus Deutschland geschaffen, sich dort
  zu melden und Vorschläge zu machen. Wenn ich es richtig weiß, Karsten, sind mittlerweile
  mehr als 20 000 Vorschläge dort eingegangen. Wir sollten sie mit KI auswerten, sortieren,
  ordnen und so vorbereiten, dass sie für die Sitzung am 15. Juli kabinettsreif werden.
  Lassen Sie es mich zusammenfassen, meine Damen und Herren: Ihre Arbeit ist wirklich
  entscheidend für Deutschland. Wir brauchen einen Staat, der einfach, schnell und
  bürgernah ist, einen Staat, der digital ist, der die Menschen wirklich bei dem unterstützt,
  was sie wollen. Wir brauchen schnelle Netze, wir brauchen die beste digitale Infrastruktur,
  und wir brauchen eine Wirtschaft, die die Chancen unseres digitalen Zeitalters auch
  nutzt, statt von Bürokratie und von Überregulierung gebremst zu werden, eben für
  Wachstum und für Arbeitsplätze. Ich komme heute Mittag zurück aus Hamburg, und erlauben
  Sie mir, dass ich auch diesen Hinweis gebe: Der Erste Bürgermeister der Stadt Hamburg
  war ganz stolz, dass für 250 000 Ummeldungen innerhalb des Stadtgebietes von Hamburg
  nun ein digitales Portal zur Verfügung steht, für 250 000 Ummeldungen und Anmeldungen
  im Einwohnermeldeamt, die nur noch digital vollzogen werden können. Das ist die
  gute Nachricht. Die weniger gute Nachricht ist, dass zurzeit nur ungefähr zehn Prozent
  der Bevölkerung von dieser Möglichkeit einer digitalen Anmeldung bzw. Ummeldung
  in der Stadt Hamburg Gebrauch machen. Meine Damen und Herren, wir müssen für die
  Nutzung digitaler Portale und digitaler Möglichkeiten auch werben. Die Bevölkerung
  soll auch mitmachen. Sie soll auch entsprechend Anreize dafür erhalten, dass sie
  mit uns auf diesen Weg der digitalen Vernetzung unseres Landes geht. In diesem Sinne
  möchte ich auf Sie gerne weiter vertrauen. Ich tue das. Ich möchte darauf vertrauen,
  dass wir unser Zielbild durchsetzen, dass wir den Durchbruch für Deutschland erzielen,
  einen Durchbruch für die Menschen, für die Verwaltung, für die Unternehmen in Deutschland.
  Dabei haben Sie die volle Unterstützung der Bundesregierung. Sie haben meine persönliche
  Unterstützung bei dem, was Sie hier in diesem Hause tun. Ich will es sagen, lieber
  Karsten: Noch einmal herzlichen Dank für deine Bereitschaft, die Seiten zu wechseln
  und das Abenteuer Politik mit uns gemeinsam zu gestalten. Ohne dich wäre es ärmer
  in dieser Bundesregierung. Herzlichen Dank, dass du dabei bist!'
