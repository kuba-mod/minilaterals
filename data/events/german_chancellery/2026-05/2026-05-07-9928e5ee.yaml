title: 'Bund investiert Millionen in die Zukunft national bedeutsamer Kultureinrichtungen
  in ganz Deutschland – Staatsminister Weimer: „Kulturelle Leuchttürme wirksam stärken“'
text: 'Mit einem deutlichen Bekenntnis zur Unterstützung der kulturellen Infrastruktur
  stellt Staatsminister Wolfram Weimer rund 27 Millionen Euro über das Förderprogramm
  „Investitionen in national bedeutsame Kultureinrichtungen“ (INK) für die Sanierung
  und Modernisierung von Kultureinrichtungen in ganz Deutschland bereit. Gefördert
  werden ab 2026:'
