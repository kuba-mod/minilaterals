title: Aktuelle Gesetze und Regelungen Was ist neu im Juni 2026?
text: 'Käuferinnen und Käufer können seit dem 20. Mai 2026 bis zu 6.000 Euro Zuschuss
  online über das E -Auto-Förderportal beim Bundesamt für Wirtschaft und Ausfuhrkontrolle
  (BAFA) beantragen. Die Förderhöhe unterscheidet sich je nach Fahrzeug, Einkommen
  und Familiengröße. Damit soll es insbesondere Familien ermöglicht werden, sich erstmals
  ein Elektroauto kaufen zu können. Gefördert werden sowohl der Kauf als auch das
  Leasing. Europa zieht an einem Strang und setzt ein gemeinsames europäisches Asylsystem
  um (GEAS). Asylverfahren werden ab dem 12. Juni europaweit schneller, einfacher,
  fairer und einheitlicher gestaltet. Ziel sind weniger Doppelanträge in Deutschland
  und die Entlastung der Kommunen. Seit langem deckt die Zahl der Spendernieren den
  Bedarf nicht, weshalb Betroffene oft viele Jahre auf eine Nierenspende warten. Neben
  der postmortalen Nierenspende ist auch eine Lebendspende möglich. Allerdings: Bei
  Verwandten sind manche Spender-Empfänger-Paare nicht kompatibel. Bei ihnen ist eine
  Organtransplantation nicht möglich, zum Beispiel wegen einer Blutgruppen- oder Gewebe-Unverträglichkeit.
  Dafür wird künftig die sogenannte Überkreuz-Lebendnierenspende möglich. Dabei werden
  zwei inkompatible Spenderpaare zusammengebracht, die „über Kreuz“ spenden können.
  Weitere Informationen zu Überkreuz-Lebendnierenspenden Der Verbraucherschutz bei
  Vertragsschlüssen im Internet wird verbessert: Mit einem einfachen Klick sollen
  künftig online geschlossene Verträge widerrufen werden können. Anbieter werden verpflichtet,
  ab dem 19. Juni 2026 eine klar erkennbare und jederzeit zugängliche Schaltfläche
  zu schaffen. Seit 1. Juni können Privatpersonen und Gesellschaften des Privatrechts
  lokal erzeugte Energie gemeinsam verbrauchen oder mit den Nachbarn teilen, zum Beispiel
  in einem Haus oder innerhalb einer Straße. Das vereinfacht die Nutzung von Solarstrom
  vor Ort, flexibilisiert das Stromsystem und stärkt damit die heimische Energieversorgung.
  Ab dem 14. Juni 2026 gilt eine neue Kennzeichnungspflicht für Honig. Auf jedem Glas
  müssen alle Ursprungsländer mit exakten Prozentangaben stehen. Die alte Pauschalangabe
  „Mischung aus EU - und Nicht- EU -Ländern“ fällt weg. Für Verbraucher bedeutet das
  volle Transparenz über die Herkunft. Vor dem Stichtag abgefüllte Gläser dürfen noch
  abverkauft werden. Weitere Informationen zur Kennzeichnung von Honig Ab dem 14.
  Juni gibt es strengere Vorgaben für die Kennzeichnung von Milchprodukten. Für Hersteller
  werden die Voraussetzungen konkretisiert, um Produkte als „wärmebehandelt“, „pasteurisiert“,
  „laktosefrei“ oder „frisch“ zu kennzeichnen. Für bestimmte Produkte, Rezepturen
  und Verpackungsbestände gelten Übergangsfristen, um eine schrittweise Anpassung
  zu ermöglichen. Weitere Informationen zur Kennzeichnung von Milchprodukten Die Bundesregierung
  hat für die Fußball-Weltmeisterschaft der Männer in diesem Sommer Ausnahmen zum
  Lärmschutz beschlossen. Das ermöglicht Public Viewing der Übertragungen teilweise
  auch bis spät in der Nacht. Die Verordnung gilt seit dem 20. Mai bis zum 31. Juli
  2026.'
