title: 'Staatsminister Weimer zur Biennale in Venedig: „Deutscher Pavillon ist ein
  Highlight der Biennale. Solidarität mit israelischen Künstlern in Venedig“'
text: 'Staatsminister für Kultur und Medien, Wolfram Weimer, besucht am Freitag und
  Samstag die Biennale in Venedig und war unter anderem im Deutschen, Ukrainischen
  und Israelischen Pavillon und hat dort mit Künstlerinnen und Künstlern gesprochen.
  So hat Weimer am Freitagnachmittag auch den Israelischen Pavillon besucht und sagte
  danach: „Es ist wichtig, dass Deutschland auf der Biennale Solidarität mit Israel
  und israelischen Künstlern zeigt. Ich bin sehr beeindruckt gewesen von der Installation
  des Künstlers Belu-Simion Fainaru, der den israelischen Pavillon gestaltet hat.“
  Fainaru darf nicht am Wettbewerb der Biennale teilnehmen. Weimer sagte dazu: “Belu-Simion
  Fainaru selbst sagte mir, er sei in Venedig völlig isoliert.“ Es sei traurig zu
  hören, dass es mit keinem Künstler oder Kurator auf der Biennale Interaktionen gäbe.
  Belu-Simion Fainaru sagte nach der Begegnung: „Der Besuch des deutschen Kulturstaatsministers
  Wolfram Weimer bedeutet im gegenwärtigen Klima viel – nicht nur für mich als Künstler,
  der Israel bei der Biennale vertritt, sondern für jüdische und israelische Künstlerinnen
  und Künstler weltweit. Immer häufiger erleben sie Boykotte und Ausgrenzung, weil
  sie jüdisch sind oder aus Israel kommen. Gerade in einer Zeit, in der Dialog und
  Verständigung dringender denn je gebraucht werden, geraten selbst Orte wie die Biennale
  unter Druck – Orte, die internationale Begegnung und kulturellen Austausch ermöglichen.
  Der Besuch von Wolfram Weimer setzt hier ein wichtiges Zeichen.“ Zum Besuch des
  Deutschen Pavillons sagt Weimer: „Der Deutsche Pavillon hat mich sehr begeistert.
  Es ist zum ersten Mal eine grandiose künstlerische Aufarbeitung der deutschen Teilung
  und DDR-Geschichte. Unser Pavillon ist für mich eins der Highlights der diesjährigen
  Biennale. Der Pavillon ist auch ein Vermächtnis der Künstlerin Henrike Naumann,
  die im Februar nach kurzer schwerer Krankheit verstorben ist. Ihre kreative Arbeit
  bleibt unvergessen und es ist gut, dass Henrike Naumann zusammen mit der Künstlerin
  Sung Tieu den Pavillon noch vollenden konnte. Für mich sind beide herausragende
  Künstlerinnen. Mein besonderer Dank gilt der Generalsekretärin des Instituts für
  Auslandsbeziehungen, Gitte Zschoch, für die tolle Arbeit vor Ort.“ Zum ukrainischen
  Pavillon sagt Staatsminister Weimer: „Die Ausstellung „Security Guarantees“ von
  Zhanna Kadyrova im ukrainischen Pavillon ist auch ein Überlebenszeichen der ukrainischen
  Kunst. Die Videoinstallation zeigt auf beeindruckende Weise die 6000 Kilometer lange
  Reise – auch durch von Russland besetztes Gebiet – bis nach Venedig. Es ist so wichtig,
  dass die Ukraine hier erlebt und gesehen werden kann. Die Biennale ist somit auch
  sichtbares Symbol der gelebten Kunstfreiheit.“'
