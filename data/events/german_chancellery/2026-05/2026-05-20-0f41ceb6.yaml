title: 'E-Auto-Prämie: Für einen schnellen Hochlauf der E-Mobilität Start des E-Auto-Förderprogramms'
text: 'Förderfähig sind sowohl Kauf als auch Leasing von Neuwagen. Foto: Janine Schmitz/Photothek
  via Getty Images Bundesumweltminister Carsten Schneider hat den Startschuss für
  das E-Auto -Förderportal beim Bundesamt für Wirtschaft und Ausfuhrkontrolle ( BAFA
  ) gegeben. Privatpersonen, die sich für den Umstieg auf ein neues E-Auto oder Plug-in-Hybride
  beziehungsweise Fahrzeuge mit Range Extender entschieden haben, können eine Förderung
  zwischen 1.500 und 6.000 Euro erhalten. Die Förderhöhe unterscheidet sich je nach
  Fahrzeug, Einkommen und Familiengröße. Damit soll es insbesondere Familien ermöglicht
  werden, sich erstmals ein Elektroauto kaufen zu können. Gefördert werden sowohl
  der Kauf als auch das Leasing von Neuwagen. Insgesamt werden von der Bundesregierung
  für das Programm drei Milliarden Euro aus dem Klima- und Transformationsfonds bereitgestellt.
  Diese reichen für geschätzt 800.000 Fahrzeuge bis 2029. Die Prämie kann auch rückwirkend
  für Autos beantragt werden, die seit dem 1. Januar 2026 erstmalig zugelassen wurden.
  Das Programm ist ein Meilenstein für den Hochlauf der Elektromobilität in Deutschland
  und unterstützt die Bestrebungen zur Unabhängigkeit von fossilen Energieträgern.
  Zugleich profitiert die heimische Automobilwirtschaft von der Elektro-Prämie. Bundesminister
  Carsten Schneider betonte bei der offiziellen Freischaltung des Förderportals: „Wir
  tun mit diesem Förderprogramm etwas für die Umwelt, für die Autoindustrie und für
  die Haushalte, die sich sonst kein Elektroauto leisten könnten. Das ist angesichts
  der geopolitischen Lage wichtiger denn je. Denn die aktuelle fossile Krise ist längst
  nicht vorbei und könnte jederzeit wiederkommen. Elektromobilität ist unsere Chance,
  unabhängig zu werden von teurem Diesel und Benzin.“ So läuft die Beantragung ab:
  Das Antragsverfahren läuft vollkommen digital und ist über die BAFA -Adresse https://foerderzentrale.gov.de
  zu erreichen. Zudem bietet das BAFA telefonisch und online Hilfe und Unterstützung
  bei der Antragstellung unter 06196 908–1009 oder per Mail unter elektromobilitaet@bafa.bund.de
  Gefördert werden Autos mit rein batterieelektrischem Antrieb, batterieelektrischem
  Antrieb mit Range Extender oder mit Plug-in-Hybrid -Antrieb. Bei Fahrzeugen mit
  Plug-in -Betrieb oder Range Extender sind bestimmte klimaschutzrelevante Anforderungen
  zu erfüllen. Für Brennstoffzellenfahrzeuge sind im Förderprogramm dieselben Fördersätze
  vorgesehen wie für reine E-Autos. Anträge auf Förderung können gestellt werden bis
  zu einer Einkommensgrenze von 80.000 Euro zu versteuerndem Haushaltsjahreseinkommen.
  Diese Einkommensgrenze steigt – für bis zu zwei Kinder – je Kind um 5.000 Euro.
  Das heißt: Sie liegt bei Familien mit zwei oder mehr Kindern damit bei maximal 90.000
  Euro zu versteuerndem Haushaltsjahreseinkommen. Jeder Neukauf eines Elektroautos
  unter diesen Einkommensgrenzen wird mit mindestens 3.000 Euro gefördert. Jeder Kauf
  eines Autos mit Plug-in-Hybrid -Antrieb oder Range Extender mit 1.500 Euro. Pro
  Kind gibt es 500 Euro zusätzlich. Es werden bis zu zwei Kinder berücksichtigt. Die
  Förderung beträgt damit maximal 1.000 Euro zusätzlich. Zudem wird eine soziale Staffelung
  eingeführt: Bei einem zu versteuernden Haushaltsjahreseinkommen unter 60.000 Euro
  erhöht sich die Förderung um 1.000 Euro. Bei einem Einkommen von unter 45.000 Euro
  gibt es weitere 1.000 Euro dazu. Familien mit zwei Kindern und niedrigem Einkommen
  können also eine Förderung bis zu 6.000 Euro beantragen.'
