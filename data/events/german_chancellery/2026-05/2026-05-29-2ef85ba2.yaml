title: Bundesregierung aktuell
text: 'in der Antike war das Orakel der Ort, an dem Priester (oder Priesterinnen)
  die Vorhersage der Götter entgegennahmen, um so dem Schicksal zumindest ein bisschen
  den Weg zu weisen. Heute ist die Sache deutlich profaner: Die Bundesregierung vertraut
  bei ihrer Zukunftsplanung nicht auf Handreichungen der Götter, sondern auf einer
  Übersicht, mit der sich zumindest die künftige Kabinetts- und damit Gesetzesplanung
  vorhersagen lässt. Wie stets zur Sommerpause ballen sich die Vorhaben. Übrigens
  werden darunter auch – so widersprüchlich es klingt – Gesetze oder Beschlüsse zur
  Abschaffung von Gesetzen zu finden sein. Vor der Sommerpause plant die Bundesregierung
  nämlich ein sogenanntes Entlastungskabinett. Der Entlastung und Verbesserung dienen
  drei Vorhaben, die in dieser Woche auf den Weg gebracht wurden. Auf den Bau-Turbo
  folgte in dieser Woche der zweite Streich im Reigen der Baugesetzgebung: das Upgrade
  des Baugesetzbuchs. Das neue Gesetz hilft Gemeinden, schneller planen zu können.
  Die Umweltprüfung wird vereinfacht und vollständig digitalisiert. Wer bauen will,
  soll sein Verfahren online verfolgen können. Das Vorkaufsrecht der Gemeinden für
  Schrottimmobilien wird erleichtert. Um sich besser gegen Starkregen oder Hitze zu
  wappnen, können Kommunen im gesamten Stadtgebiet mehr Grün schaffen. Ein wichtiger
  Sicherheits-Faktor für Unternehmen ist die Sicherheit im Netz. Damit Angriffe aus
  dem Cyberraum leichter abgewehrt werden können, wurde im Kabinett der Gesetzentwurf
  für das Cybersicherheitsgesetz beschlossen. Cyberangriffe können großen Schaden
  anrichten, sie gefährden die kritische Infrastruktur etwa bei der Energieversorgung
  oder in Krankenhäusern. Damit unser Alltag funktioniert, brauchen wir ein sicheres
  Internet und stabile Netze. Tritt dieses Gesetz in Kraft, kann Deutschland besser
  vor schweren digitalen Angriffen geschützt werden. Die Sicherheitsbehörden des Bundes
  sollen Cyberangriffe schneller erkennen, stoppen und damit Schäden begrenzen können.
  Menschenhandel war kein Phänomen der Kolonialzeit, auch heute nutzen Kriminelle
  die Notlage häufig von Frauen, aber auch von Männern und Kindern. Sie beuten sie
  sexuell aus, zwingen sie zur Prostitution oder in harte Arbeit und verkaufen Kinder.
  Täter und Täterinnen werden nun stärker ins Visier genommen und härter bestraft,
  Opfer besser beschützt. Auch Nutznießer der Zwangsarbeit können sich strafbar machen.
  Künftig zählen auch der Zwang zur Leihmutterschaft, illegale Adoption und Zwangsheirat
  als Menschenhandel. Was in den kommenden Wochen zur Entscheidung ansteht? Befragen
  Sie das Orakel. Oder diesen Newsletter. Bundesinnenminister Dobrindt am 27.05.2026:
  „Zukünftig werden wir den Angreifer ins Visier nehmen. Uns geht es um Gefahrenabwehr.
  Das heißt, wir greifen die Bedrohung an, wir wenden uns gegen den Angreifer direkt.
  Wir schalten seine Angriffsmöglichkeiten aus. Das ist das, was wir unter aktiver
  Cybersicherheit verstehen. Wer uns angreift, der muss damit rechnen, dass wir seine
  Infrastruktur stören und auch zerstören werden.“ Bundesbauministerin Hubertz am
  27.05.2026: „Wir haben ein klares Ziel: mit mehr Priorität für den Wohnungsbau,
  weg mit Hindernissen bei der Digitalisierung und echte Handlungsmacht bei der Bekämpfung
  von Schrottimmobilien. Das sind die Herausforderungen, mit denen unsere Kommunen
  und damit auch die Bürgerinnen und Bürger kämpfen. Das Baugesetzbuch-Upgrade gibt
  Rückenwind für die kommunale Planung und wird ein Instrumentenkoffer für Klimaanpassung,
  beschleunigtes Bauen und mehr Wohnraum.“ „In der Nacht auf Pfingstsonntag hat Russland
  zivile Ziele in der Ukraine massiv attackiert. Erneut kam dabei das Oreschnik-Raketensystem
  zum Einsatz. Die Bundesregierung verurteilt diese rücksichtslose Eskalation scharf.
  Deutschland steht weiter fest an der Seite der Ukraine.“ Dieser Tag erinnert daran:
  Informationen in Leichter Sprache sind wichtig. Für Menschen mit Lern-Schwierigkeiten.
  Für Menschen, die nicht so gut Deutsch können. Für Menschen, die nicht so gut lesen
  können. Wir freuen uns über Ihr Feedback: Nutzen Sie bitte dafür das Kontaktformular
  (nicht die Antwortfunktion auf diese E-Mail).'
