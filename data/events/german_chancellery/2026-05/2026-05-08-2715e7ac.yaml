title: Im Bundesrat beschlossen Justiz digitalisieren, Verfahren vereinfachen
text: 'Verfahren der Zwangsvollstreckung werden nun einfacher und Prozesse zunehmend
  digitaler: Das hat das Kabinett beschlossen. Die Bundesregierung bringt die Digitalisierung
  in Deutschland voran, auch im Bereich der Zwangsvollstreckungen. Der Gesetzentwurf
  zur Digitalisierung von Zwangsvollstreckungen wurde nun im Bundesrat beschlossen.
  Damit setzt sie wichtige Vorhaben des Koalitionsvertrags um: die Fortführung der
  Digitalisierung der Justiz und einen konsequenten Bürokratieabbau für Staat und
  Verwaltung. Verfahren der Zwangsvollstreckung werden deutlich vereinfacht und Prozesse
  zunehmend digitalisiert. Die Gesetzlichen Krankenkassen, insbesondere in ihrer Funktion
  als Einzugsstellen für den Gesamtsozialversicherungsbeitrag, werden weiterhin vom
  Formularzwang bei der Vollstreckung öffentlichrechtlicher Forderungen ausgenommen
  . Dadurch werden die Kosten und der Verwaltungsaufwand bei Vollstreckungsaufträgen
  an Gerichtsvollzieher deutlich reduziert. Die Bundesregierung strebt langfristig
  den Aufbau einer Datenbank für Vollstreckungstitel an. Diese soll letztlich auch
  dem Schutz des Schuldners dienen und ein hohes Niveau an Sicherheit vor Fälschung
  und Manipulation gewährleisten. Die Datenbank wird die Verfahren in der Zwangsvollstreckung
  weiter vereinfachen. Der Deutsche Bundestag hat vor allem Änderungen vorgenommen,
  die die Pflicht von Kreditinstituten betreffen, einen sicheren Übermittlungsweg
  für die elektronische Zustellung von Dokumenten einzurichten. Weitere Änderungen
  betreffen den Zeitpunkt, zu dem die einzelnen Regelungen in Kraft treten.'
