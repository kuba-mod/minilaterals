title: Umsetzung der EU-Datenverordnung Daten besser nutzen – mit Verantwortung
text: 'Auch Smart Devices wie Fitness- Tracker oder Smartwatches fallen unter die
  Verordnung des EU Data Acts . Der Data Act steht für einen fairen Datenzugang und
  eine faire Datennutzung. Nutzerinnen und Nutzer sollen eigenständig über die Verwendung
  und Weitergabe der Daten ihrer vernetzten Geräte entscheiden können. Zugleich geht
  es auch um einen fairen Wettbewerb in Europa. Durch den Data Act erhalten Unternehmen
  einen besseren Datenzugang, können innovative datenbasierte Geschäftsmodelle entwickeln
  und das ökonomische Potenzial von Industrie-Daten stärker nutzen. Betroffen vom
  Data Act sind unter anderem Smart Devices wie Fitness- Tracker , Smart-Home -Geräte
  oder Sprachassistenten. Auch Geräte, bei denen man es zunächst nicht erwartet, –
  etwa smarte Rasenmäher oder Waschmaschinen – sind oft digital vernetzt. Die Verordnung
  gilt für alle vernetzten Geräte, die Daten über ihre Nutzung oder ihre Umgebung
  verarbeiten und diese in elektronischer Form übermitteln können. Kommunikationsdienste
  fallen nicht in den Anwendungsbereich. Verbraucherinnen und Verbraucher können durch
  den Data Act über die Verwendung und Weitergabe von Daten entscheiden. Darüber hinaus
  enthält die Verordnung Regeln zum Schutz von nicht-personenbezogenen Daten, die
  in der EU gespeichert sind. Hier gelten Sicherheitsvorkehrungen, um den Zugriff
  ausländischer Regierungen auf diese Daten zu verhindern. Daten sind die Grundlage
  für Innovationen: Unternehmen können damit neue Geschäftsmodelle entwickeln, wovon
  insbesondere Start-ups sowie kleinere und mittlere Unternehmen profitieren. Darüber
  hinaus enthält die Datenverordnung Maßnahmen zur Erhöhung der Fairness und des Wettbewerbs
  auf dem europäischen Cloud -Markt und schützt Unternehmen vor missbräuchlichen Vertragsklauseln.
  Sie sorgt für Rechtssicherheit beim internationalen Datenaustausch. Die Bundesnetzagentur
  wird als zuständige Behörde für die Anwendung und Durchsetzung im nationalen Recht
  eingesetzt. Sie ist verantwortlich für die Überwachung der Einhaltung der Vorschriften
  und hat umfangreiche Durchsetzungsbefugnisse. Außerdem ist der Bundesbeauftragte
  für Datenschutz und Informationsfreiheit ( BfDI ) für die Überwachung der Verarbeitung
  personenbezogener Daten verantwortlich. Das Bundeskabinett beschloss die Umsetzung
  des EU Data Acts in Deutschland am 29. Oktober. Dafür billigte das Kabinett den
  Entwurf des Durchführungsgesetzes zu der EU -Richtlinie. Der Deutsche Bundestag
  simmte dem Gesetzentwurf am 26. März zu. Der Bundesrat erteilte seine Zustimmung
  am 8. Mai.'
