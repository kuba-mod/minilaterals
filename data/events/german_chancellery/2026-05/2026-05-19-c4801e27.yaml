title: Bundeskanzler Merz gratuliert dem Ministerpräsidenten der Republik Irak, Ali
  al-Zaidi
text: Sehr geehrter Herr Ministerpräsident, zu Ihrer Wahl zum Ministerpräsidenten
  der Republik Irak übermittle ich Ihnen meine herzlichsten Glückwünsche. Irak und
  Deutschland sind durch vielfache Verflechtungen und enge Beziehungen miteinander
  verbunden. Ich freue mich darauf, gemeinsam mit Ihnen die starke Zusammenarbeit
  zwischen unseren Ländern zu vertiefen. Für die vor Ihnen liegenden Aufgaben wünsche
  ich Ihnen viel Erfolg und eine glückliche Hand. Mit freundlichen Grüßen Friedrich
  Merz Bundeskanzler der Bundesrepublik Deutschland
