date: '2026-05-07'
type: press_release
source_name: german_chancellery
title: Rede von Bundeskanzler Merz beim Großen Übersee-Tag in Hamburg Kurs mitbestimmen
  für ein starkes Deutschland
text: 'Kanzler Merz hat beim Überseetag in Hamburg mit Blick auf Reformen betont,
  dass es schrittweise vorangehe. Bei seiner Rede beim Großen Übersee-Tag im Hamburger
  Rathaus sprach Bundeskanzler Friedrich Merz unter anderem über den aktuellen Epochenbruch,
  der mit einer Einschränkung des Freihandels und Protektionismus einhergeht. Im Bereich
  der Wettbewerbsfähigkeit der Volkswirtschaft sei man in einem Reformprozess, sagte
  Merz. So habe die Bundesregierung die Körperschaftssteuer gesenkt, Abschreibungsmöglichkeiten
  verbessert und ein beispielloses Investitionsprogramm auf den Weg gebracht. „Wir
  setzen eine ehrgeizige Digitalisierungs- und Staatsmodernisierungsagenda um“, erklärte
  der Kanzler weiter. Berichts-, Dokumentations- und Nachweispflichten würden weiter
  reduziert. Zudem solle Energie wieder bezahlbar werden. Daher arbeite die Bundesregierung
  „an langfristig tragfähigen Weichenstellungen durch eine Energiewende im Geiste
  des Pragmatismus, eine Energiewende mit dem Fokus auf Kosteneffizienz und Versorgungssicherheit.“
  Der Übersee-Tag erinnert an die Verleihung der Hafenrechte an die Stadt Hamburg
  durch Kaiser Friedrich Barbarossa 1189. Er findet seit 1950 jährlich statt, der
  Große Übersee-Tag alle zwei Jahre. Sehr geehrter Herr Präsident des Übersee-Clubs,
  lieber Herr Vogelsang, sehr geehrter Herr Erster Bürgermeister, sehr geehrte Vertreter
  und Vertreterinnen des Diplomatischen und des Konsularischen Korps , liebe Kolleginnen
  und Kollegen der Parlamente, sehr geehrte Ehrenbürger der Freien und Hansestadt
  Hamburg, meine sehr geehrten Damen und Herren, herzlichen Dank für Ihre Einladung
  und die freundliche Begrüßung zu diesem traditionsreichen Ereignis am heutigen Tag!
  Man wird vermutlich so schnell keinen zweiten Ort in der Bundesrepublik Deutschland
  mit vergleichbarer Tradition eines gemeinsamen Austausches über die Grundsatz- und
  Zukunftsfragen unseres Landes finden wie den hier. Nun sind wir mit dem Wort „traditionsreich“
  manchmal schnell bei der Hand. Aber hier gilt es nun wirklich, schon allein aufgrund
  der Reden, die seit den 1920er-Jahren hier gehalten werden. Sie sind sozusagen eine
  kleine Geschichte der Weimarer Republik und dann der Bundesrepublik Deutschland.
  Ich hatte die Ehre, vor 26 Jahren schon einmal Ihr Gast zu sein. Ich habe mir zum
  Anlass des heutigen Tages meine eigene damalige Rede aus dem Jahr 2000 noch einmal
  angesehen. Damals habe ich kritisch, auch etwas selbstkritisch, davon gesprochen,
  dass wir in der Politik unsere politischen Entscheidungen zu häufig nicht im Kontext
  eines größeren Zusammenhangs begründen. „Punktualismus“ habe ich das damals genannt.
  Nun, dieser Blick auf den größeren Zusammenhang ist heute vermutlich noch wichtiger
  als vor einem Vierteljahrhundert. Sie haben es, Herr Vogelsang, angesprochen und
  Sie, Herr Bürgermeister, auch: Wir erleben einen Epochenbruch, den wir seit geraumer
  Zeit mit zunehmender Besorgnis begleiten, einen Epochenbruch, den wir mitgestalten
  müssen. Meine Damen und Herren, ich möchte also diese Gelegenheit heute gern zum
  Anlass nehmen, mir den Raum zu nehmen, wie es die Kultur des Übersee-Clubs ja vorsieht,
  etwas mehr vom Grundsätzlichen und etwas weniger vom Täglichen zu sprechen. Ich
  möchte mit dem Ziel beginnen, dem sich die Arbeit der von mir geführten Bundesregierung
  von Anfang an unterordnet, mit dem Ziel, das alle Dringlichkeit erklärt, mit dem
  Ziel, das alle Mühen wert ist. Dieses Ziel ist auf den ersten Blick bescheidener
  als bei manchem großen politischen Projekt, vielleicht auch bescheidener als bei
  manchem großen ideologischen Projekt. Denn das Ziel ist genau das Gegenteil von
  Ideologie und Dogmatismus. Unsere Politik ist ganz einfach – und das sage ich hier,
  in diesem traditionsreichen Haus – aus dem Geist der Freiheit für die Freiheit gemacht.
  Der Philosoph Joachim Ritter, der unweit von hier in Geesthacht bei Hamburg geboren
  worden ist, gab es uns in den richtigen Worten mit auf den Weg: „Die Politik“, so
  sagt er, „kann nicht selbst das Glück schaffen, das sie herbeiführen und sichern
  soll; dies bleibt Sache der Einzelnen und ihres persönlichen Lebens.“ Ja, meine
  Damen und Herren, die Politik darf sich nicht anmaßen, sozusagen die Zukunft für
  jeden Einzelnen und bis ins Detail vorzugeben. Aber sie muss und sie kann für eine
  Zukunft arbeiten, in der es Freiheit gibt, und das ist mein und auch unser Zielbild
  für unser Land, dass es eben keine neuen Verhältnisse der Unterdrückung, der Willkür,
  des Zwangs in Deutschland und in Europa gibt, dass auch künftig alle Generationen
  ihren Mut, ihre Fantasie entfalten können, dass sie innovativ zum Wohl aller sein
  dürfen, dass Platz ist für Dialog, für Aufstieg, für die Selbstentfaltung aller
  Bürgerinnen und Bürger unseres Landes. Wir sind in den letzten 76 Jahren in der
  Bundesrepublik Deutschland sehr erfolgreich darin gewesen, genau eine solche Freiheitsordnung
  zu verwirklichen. Es ist uns etwas gelungen in unserem Land, nach und nach auch
  in Europa, das uns dem Menschheitstraum der Freiheit so nahegebracht hat wie wohl
  kaum jemals zuvor in unserer Geschichte. Gleichzeitig müssen wir heute feststellen:
  Diese historische Leistung steht heute auf dem Spiel. Die Gründe und Ursachen dafür
  liegen zum Teil bei uns selbst. Zum Teil liegen sie im beschleunigten geopolitischen
  und geoökonomischen Wandel, den wir derzeit erleben und zum Teil erleiden und bei
  dem wir uns gleichzeitig bemühen wollen, ihn mitzugestalten. Lange hat sich die
  Welt insgesamt – zumindest war das unser Eindruck – parallel zu unserem Land und
  parallel zu Europa in diese Richtung entwickelt, im Sinne dieses liberalen Zielbildes.
  Aber der weltpolitische, auch der welthistorische Wind hat sich gedreht, und das
  spüren wir alle mit wachsender Intensität. Diese liberale Weltordnung, sie gibt
  es so nicht mehr. Diese Institutionen, die die, wie wir gesagt haben, regelbasierte
  Ordnung gewährleistet haben, büßen massiv an Gestaltungskraft ein. Sie sind zu einem
  beachtlichen Teil gar nicht mehr in der Lage, diese regelbasierte Weltordnung, wie
  wir sie kennengelernt haben, auch durchzusetzen. Wir sind im Gegenteil in eine neue
  Ära offener Großmachtpolitik eingetreten, des Kampfes um Einflusssphären in der
  gesamten Welt. Wir erleben eine neue Vermachtung auch der Weltwirtschaft. Wir erleben
  die Einschränkung des Freihandels, wir erleben Protektionismus, wir sehen Zölle,
  wir sehen einen ungebremsten Subventionswettlauf. Wir erleben in diesen Tagen auch
  die Einschränkung der freien Seefahrt, die – wer wüsste das besser als Sie alle
  hier in Hamburg? – am Beginn der Moderne, der Industrialisierung, der Globalisierung,
  des wirtschaftlichen Aufstieges unseres Landes, unseres Kontinentes, ja, der ganzen
  Welt stand. Meine Damen und Herren, Sie wissen es, aber lassen Sie mich es noch
  einmal für uns alle auch in Erinnerung rufen. 80 bis 90 Prozent des Welthandels
  gehen über die Meere, und der Umfang dieser Seefracht hat sich in den letzten 50 Jahren
  versechsfacht. Wir sehen allein an diesen Zahlen, was offene Seewege und ein offener
  und freier Handel bedeuten. Sie haben es gesagt, Herr Dr. Vogelsang: Für eine Industrie-
  und Handelsnation, wie wir es sind, für die internationale Wirtschaft überhaupt,
  ist die uneingeschränkte Nutzung der globalen Seewege, ist maritime Sicherheit von
  tatsächlich existenzieller Bedeutung. Das heißt, Sicherheit und Wettbewerbsfähigkeit
  einer Volkswirtschaft sind heute mehr denn je zwei Seiten derselben Medaille. Wie
  schnell wir in diesen Bereichen vorankommen – Sicherheit und Wettbewerbsfähigkeit –,
  entscheidet maßgeblich darüber, wie gut, wie frei, wie wohlhabend wir in Deutschland
  im weiteren Verlauf des 21. Jahrhunderts leben werden. Wir haben also in beiden
  Bereichen erheblichen Handlungsbedarf. Wirtschaftlich und auch technologisch haben
  wir in Deutschland Vorsprung eingebüßt, zum Teil durch versäumte Reformen, zum Teil
  durch grobe Fehleinschätzungen in der Vergangenheit. Unsere Volkswirtschaft wächst
  seit spätestens 2019 nicht mehr. Wir erleben zugleich einen Rückgang der Industrieproduktion.
  Wir sehen stagnierende private Investitionen. Die günstigen externen Bedingungen
  der vergangenen Jahre haben über lange Zeit verdeckt, dass sich bei uns erhebliche
  Standortprobleme verfestigt haben. Die Innovationskraft in unserem Land, die wir
  unverändert haben und von der viele von Ihnen ja auch berichten können, wird an
  zu vielen Stellen zugleich gehemmt und blockiert. Die Steuern sind nach wie vor
  zu hoch. Energie ist zu teuer. Die Bürokratie ist ausufernd. Die Sozialversicherungsbeiträge
  liegen schwer auf den Arbeitskosten. Meine Damen und Herren, das ist sozusagen die
  Sollseite unserer Gegenwart. Das ist die Mängelliste, mit der die Bundesregierung
  ihre Arbeit aufgenommen hat. Heute, am ersten Tag des zweiten Jahres, will ich es
  Ihnen deshalb noch einmal sehr deutlich sagen: Wir haben uns in der Koalition darauf
  verständigt, dass wir in den vier Jahren, für die uns Regierungsverantwortung übertragen
  worden ist, diese Mängel im Grundsätzlichen angehen wollen. Nur mit kosmetischen
  Korrekturen, nur mit Stückwerk werden wir den Herausforderungen, vor denen wir in
  unserem Land stehen, nicht gerecht werden können. Mein Eindruck ist, dass das Bewusstsein
  dafür im ganzen Land, bei den Bürgerinnen und Bürgern unseres Landes, durchaus vorhanden
  ist. Manchmal habe ich den Eindruck, die Bürgerinnen und Bürger unseres Landes sind
  in der Realität schneller und besser angekommen als Teile der Politik. Die meisten
  jedenfalls – und das sind nicht nur Sie – haben das richtige Gefühl, den richtigen
  Instinkt, dass über ihre Zukunft heute entschieden wird. Sie sind bereit, ihren
  Beitrag für die Modernisierung unseres Gemeinwesens zu leisten. Wir haben damit
  im Bereich der Sicherheitspolitik sehr schnell begonnen. Wir investieren massiv
  in innere und äußere Sicherheit, in glaubhafte Abschreckung und in die Resilienz
  unserer Infrastruktur, auch und gerade der maritimen Infrastruktur. Wir wollen – so
  haben wir es gesagt – die Bundeswehr schnellstmöglich zur stärksten konventionellen
  Armee Europas machen. Wir stärken damit vor allem auch den europäischen Pfeiler
  des nordatlantischen Bündnisses. Wir haben die Sicherheitspolitik der Bundesregierung
  im umfassenden Sinne neu ausgerichtet. Nach über 30-jähriger Diskussion haben wir
  innerhalb von vier Monaten, gleich zu Beginn der Tätigkeit der Bundesregierung,
  den Nationalen Sicherheitsrat in Deutschland eingerichtet. Wir haben jetzt erstmalig
  in Deutschland ein Gremium, das im umfassenden Sinne sicherheitspolitische Analysen
  vornimmt, in Auftrag gibt, auswertet und gemeinsam mit allen relevanten Institutionen
  unseres Landes und, Herr Bürgermeister, unter Einschluss der Länder und gegebenenfalls
  der Gemeinden sowie aller Hilfsorganisationen in der Lage ist, Hilfe zu organisieren,
  zu koordinieren und auch aus einer Hand vorzubereiten. Im Bereich der Wettbewerbsfähigkeit
  unserer Volkswirtschaft sind wir inmitten eines Reformprozesses. Ich sage gleich
  vorweg, das mag nun wieder punktualistisch klingen, aber das lässt sich bei einem
  Bericht aus dem laufenden Maschinenraum der Politik nicht ganz verhindern. Ich weise
  deshalb darauf hin, dass jede der vielen Einzelmaßnahmen, die wir in der Bundesregierung
  schon getroffen haben und weiterhin treffen und an denen wir weiterhin arbeiten,
  einer Grundsatzentscheidung und einer Gesamtschau folgt, nämlich der Gesamtschau
  und der Grundsatzentscheidung für mehr Freiheit, für mehr Selbstverantwortung, einer
  Grundsatzentscheidung für mehr Wettbewerbsfähigkeit unseres Landes. Wir wollen,
  um es mit anderen Worten zu sagen, dem ordnungspolitischen Grundgedanken der Bundesrepublik
  Deutschland, diesem Gedanken, der unser Land groß gemacht hat, wieder zur Geltung
  verhelfen. Das bedeutet in der Praxis die Stärkung und nicht die Schwächung von
  Eigenverantwortung, die Stärkung und nicht die Schwächung unternehmerischer Freiheit,
  die Korrekturen am Sozialstaat, aber nicht seine Beseitigung, sodass er dort wieder
  zielgenau und wirksam werden kann, wo er wirklich gebraucht wird. Wir haben in diesem
  Sinne im vergangenen Jahr unmittelbar nach dem Antritt der Regierung die Körperschaftssteuer
  gesenkt. Wir haben die Abschreibungsmöglichkeiten verbessert, um den Unternehmen
  Investitionsanreize zu geben. Wir haben ein beispielloses Investitionsprogramm auf
  den Weg gebracht, das übrigens auch den Wasserstraßen in unserem Land zugutekommt.
  Wir setzen eine ehrgeizige Digitalisierungs- und Staatsmodernisierungsagenda um
  und eine gemeinsam beschlossene föderale Modernisierungsagenda mit den Ländern.
  Danke, Herr Bürgermeister, dass Sie das aufgegriffen haben! Ich ermutige und ermuntere
  alle Bundesländer, dem Beispiel anderer zu folgen, und so wie in Hamburg, so wie
  in Nordrheinwestfalen die ersten Entscheidungen schon zu treffen, bevor der Bund
  sie für alle getroffen hat. Lassen Sie uns gemeinsam auf diesem Weg eines nachhaltigen
  Rückbaus unserer Bürokratie weiter vorangehen! Wir werden Berichts-, Dokumentations-
  und Nachweispflichten weiter reduzieren. Wir werden Unternehmensgründungen in Deutschland
  beschleunigen, vereinfachen und digitalisieren. Wir wollen und müssen Energie wieder
  bezahlbar machen. Wir arbeiten an langfristig tragfähigen Weichenstellungen durch
  eine Energiewende im Geiste des Pragmatismus, eine Energiewende mit dem Fokus auf
  Kosteneffizienz und Versorgungssicherheit. Last, but not least : Der internationale
  Nordsee-Gipfel, den wir vor wenigen Monaten auch hier in Hamburg abgehalten haben,
  ist eine wichtige Wegmarke. Denn wir haben gemeinsam mit unseren Partnern der Nordseeanrainerstaaten
  einen sehr konkreten Aktionsplan zur Planung und Koordinierung von Energieprojekten
  in der Nordsee verabschiedet, der nun zügig implementiert wird. Auch das will ich
  hinzufügen: Wir haben hier in Hamburg mit der dänischen Ministerpräsidentin ein
  bilaterales Abkommen, den Bornholm Energy Hub , vereinbart und aus der Taufe gehoben,
  das erste Projekt dieser Art in Europa, dem jetzt mehrere vergleichbare folgen werden.
  Meine Damen und Herren, wir sind nun also mitten in der zweiten Reformrunde einer
  umfassenden Modernisierung unserer sozialen Sicherungssysteme. Eine grundlegende
  Reform unseres Gesundheitssystems haben wir in der vergangenen Woche im Kabinett
  verabschiedet. Es ist eine wirklich historische Reform, die größte Reform seit über
  20 Jahren in diesem Bereich. Der Gesetzentwurf wird schon im nächsten Jahr zu Kostenentlastungen
  der gesetzlichen Krankenversicherung in Höhe von 16 Milliarden Euro führen. Bis
  2030 steigt das Volumen der Kostenentlastungen auf fast 40 Milliarden Euro. Täten
  wir das nicht, müssten die Beiträge allein für die gesetzliche Krankenversicherung
  um zwei Prozentpunkte steigen. Noch in diesem Monat folgt die Reform der sozialen
  Pflegeversicherung, und noch vor der Sommerpause werden wir die Eckpunkte einer
  großen Rentenreform im Kabinett behandeln, alles mit dem Ziel, die soziale Sicherung
  in Deutschland zu erhalten, sie aber auch finanzierbar zu erhalten und die Sozialbeiträge
  zu stabilisieren. Ja, meine Damen und Herren, das ist politische Kärrnerarbeit,
  die wir hier verrichten. Wir holen in wenigen Monaten eine Arbeit nach, die zum
  Teil seit Jahren versäumt worden ist. Ich weiß, dass es auch vielen von Ihnen immer
  noch nicht schnell genug geht. Ich weiß, dass Sie alle unter dem Lärm, der im Maschinenraum
  der Demokratie nun einmal herrscht, auch ein wenig leiden. Aber wir arbeiten in
  der Bundesregierung mit dem Anspruch, dass das, was wir tun, für mehrere Jahre,
  vielleicht für ein Jahrzehnt in der Zukunft tragfähig ist. Das heißt auch, dass
  es von der Mehrheit der Bürgerinnen und Bürger unseres Landes mitgetragen werden
  muss. Ein Reformprozess ist eben genau das: Reform und Prozess. Es geht schrittweise
  voran. Aber unterschätzen Sie deswegen nicht meine Entschlossenheit bei dieser Aufgabe
  und die Entschlossenheit der Bundesregierung als Ganzes. Wir wissen, was auf dem
  Spiel steht. Wir wissen, dass über unsere Entscheidungen heute morgen die Geschichte
  urteilen wird. Vor allem über ausbleibende Entscheidungen würde diese Geschichte
  hart urteilen. Das, was wir in den nächsten Monaten und Jahren also entscheiden,
  wird erheblichen Einfluss darauf nehmen, wie unser Land in der neuen Weltordnung
  positioniert ist, wie aber auch Europa positioniert sein wird. Wir sind – das wissen
  wir alle – mit Abstand das bevölkerungsreichste und wirtschaftlich stärkste Land
  der Europäischen Union. Das ist keine deutsche Hybris, sondern die geostrategische
  Lage unseres Landes. Ohne ein starkes Deutschland gibt es keine gute Zukunft für
  das europäische Freiheitsprojekt. Mit einem starken Deutschland in einem starken
  Europa haben wir Europäerinnen und Europäer dagegen alle Chancen, den Kurs mitzubestimmen,
  den die Welt einschlägt, und zwar im Sinne der Freiheit und des Friedens. Erlauben
  Sie mir daher, auch das mit Nachdruck noch einmal zu sagen, gewissermaßen in der
  guten Tradition Ihres Clubs, denn die Pioniere der europäischen Einigung haben ja
  alle hier gesprochen: Konrad Adenauer, Valéry Giscard d’Estaing , Helmut Kohl, François
  Mitterrand und andere. Unsere Aufgabe heute ist es, weitere überfällige Einigungsschritte
  zu gehen, konkret, die sicherheits- und verteidigungspolitische Zusammenarbeit zu
  vertiefen, den Binnenmarkt weiter zu stärken und in einer koordinierten Kraftanstrengung
  die Wettbewerbsfähigkeit unserer Unternehmen zu verbessern. Für Europa haben wir
  einen solchen Fahrplan, um diese Aufgaben zu bewältigen. Die Berichte von Enrico
  Letta und Mario Draghi für eine Reform des europäischen Binnenmarktes und für die
  Verbesserung der Wettbewerbsfähigkeit der Europäischen Union liegen uns vor. Es
  ist höchste Zeit, ihren Empfehlungen auch entschlossen zu folgen. Dafür brauchen
  wir eine Wachstums- und Wettbewerbsfähigkeitsagenda. Ich bin sehr dankbar, dass
  wir eine solche Agenda maßgeblich auch auf mein Betreiben hin bei unserem sogenannten
  Retreat der Staats- und Regierungschefs der Europäischen Union Mitte Februar in
  Alden Biesen entworfen haben, dass wir sie dann bei der Sitzung des Europäischen
  Rates im März in Brüssel mit konkreten Aufträgen, Projekten und Fristen hinterlegt
  und sie nun beim informellen Europäischen Rat vor wenigen Tagen auf der Insel Zypern
  als politischen Plan auch fest miteinander beschlossen haben, Parlament, Rat und
  Kommission. Wenn Europa den Weg in Richtung von mehr Binnenmarkt und mehr Wettbewerbsfähigkeit
  jetzt wirklich entschlossen geht, dann liegen genau darin gerade für Deutschland
  auch enorme Wachstums- und Innovationspotenziale. Denn die Neusortierung der Welt,
  meine Damen und Herren, ist nicht nur eine Bedrohung. Ja, das ist sie. Aber sie
  ist genauso auch eine Chance für uns, für uns in Deutschland, für uns in Europa.
  Eine Mehrheit der Staaten der Welt zieht bei Weitem immer noch den Weg des Freihandels,
  des Multilateralismus, des Miteinanders dem autokratischen Weg der Abschottung vor.
  Wir als Europa haben mit 450 Millionen Einwohnerinnen und Einwohnern, 100 Millionen
  Einwohner mehr als in den Vereinigten Staaten von Amerika, ein Angebot zu machen,
  das die großen aufstrebenden Staaten und Märkte annehmen wollen und auch schon angenommen
  haben. Sehen wir uns etwa die Reihe der neuen Handelsabkommen an, die innerhalb
  kurzer Zeit abgeschlossen worden sind oder sich im Abschluss befinden, zuallererst
  – Sie haben es genannt – das MERCOSUR -Abkommen mit den südamerikanischen Staaten.
  Gehen wir diesen Weg also weiter. Er wird alle beteiligten Volkswirtschaften stärker,
  unabhängiger und widerstandsfähiger machen. Meine Damen und Herren, ich komme noch
  einmal zum Beginn meiner Rede zurück. Die Reden, die hier im Übersee-Club gehalten
  worden sind, ergeben eine wunderbare Chronik der Geschichte der Bundesrepublik Deutschland.
  Wir können im Rückblick ziemlich klar sehen, dass Veränderung zum Guten wie auch
  zum Schlechten meist aus Situationen hervorgegangen ist, in denen sich die Krisen
  geballt und verdichtet haben, in denen gehandelt werden musste. Es spricht alles
  dafür, dass wir heute wieder in einer solchen Zeit leben. Das zu wissen, das sollte
  uns alle anspornen, unser Bestes zu geben. Wir haben etwas zu verteidigen. Wir haben
  aber auch ein Zielbild, auf das es sich hinzustreben lohnt. Wir haben auch etwas
  zu beweisen, denn ob wir es nun wollen oder nicht, hat die neue Weltordnung auch
  die Gestalt eines Systemwettbewerbs. Wir hören selbst in der transatlantischen Welt
  die Frage laut werden, ob nicht Autokratien vielleicht doch erfolgreicher sein könnten
  als Demokratien, ob nicht illiberale Ordnungen schneller und besser sind als liberale
  Ordnungen. So, wie es aussieht, reicht es auch nicht mehr, Worte und gelebte Worte
  dagegenzusetzen, so wichtig es bleibt, dass wir von Menschenwürde, von menschlicher
  Freiheit, von demokratischen Werten und Tugenden sprechen und hierzulande auch danach
  leben. Aber in einer Welt, in der militärische Stärke und wirtschaftliche Stärke
  wieder harte Währungen sind, müssen wir wehrhafter und müssen wir wieder innovativer
  und wettbewerbsfähiger werden. Die Bundesrepublik Deutschland ist dazu gut in der
  Lage. Europa ist dazu gut in der Lage. Ohne Anstrengung wird das allerdings nicht
  gehen. Es wird aber auch nicht ohne Zuversicht und ohne ein Grundvertrauen in unser
  Land, in unsere Gesellschaft, in unsere Institutionen, in unsere demokratische Ordnung
  gehen. Wenn Sie mir diese Bemerkung zum Schluss noch erlauben, sage ich: Es wird
  nicht ohne den Geist der starken und stolzen Hansestädte gehen. Sie sind buchstäblich
  unser Tor zur Welt und stehen für eben genau diese Weltoffenheit und für die Freiheit
  im Denken, die wir uns alle erhalten wollen. Das zeigen nicht zuletzt auch die acht
  Stipendiatinnen und Stipendiaten des Übersee-Clubs, die wir gleich hier sehen werden
  und die in die Welt hinausgehen, zum Beispiel nach Tansania, nach Südkorea, nach
  Indien. Meine Damen und Herren, in der ordnungsverliebten antiken Welt hat so mancher
  Denker – das wissen Sie vermutlich – mit großem Argwohn auf die Städte am Meer geblickt.
  Man war der Meinung, dass die naturgegebene Weltoffenheit, der rege Handel mit anderen
  Regionen, das Umherschweifen, wie es genannt wurde, zur See die Sitten der Stadtgemeinschaft
  früher oder später korrumpieren, verderben und verweichlichen werde. Herr Bürgermeister,
  nicht zuletzt diese stolze Stadt hat bewiesen, dass das Gegenteil der Fall ist.
  Es liegt ein Segen auf diesem Umherschweifen, auf dem Handel, auf der Weltoffenheit
  und dem Streben nach Freiheit. Diesen Beweis zu erbringen, das ist unsere Aufgabe
  heute und morgen in Deutschland und in Europa.'
