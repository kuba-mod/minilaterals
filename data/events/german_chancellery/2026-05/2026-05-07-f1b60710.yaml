date: '2026-05-07'
type: press_release
source_name: german_chancellery
title: Rede des Bundeskanzlers beim IHK-Tag 2026 Wirtschaftswachstum als Voraussetzung
  für Wohlstand
text: 'Bundeskanzler Merz rief in seiner Rede auf, der demokratischen und marktwirtschaftlichen
  Ordnung zu vertrauen. Bei seiner Rede vor den Teilnehmenden des IHK -Tags 2026 sprach
  Bundeskanzler Friedrich Merz über die aktuellen geopolitischen und strukturellen
  Herausforderungen für die deutsche Wirtschaft. Er versprach nach der Reform der
  gesetzlichen Krankenversicherung auch weitere Sozialreformen auf den Weg zu bringen.
  Mit vielfältigen Maßnahmen stärke die Bundesregierung zudem die Wettbewerbsfähigkeit
  von Unternehmen, so Merz – von Energiekostenentlastungen über verbesserte Abschreibungsmöglichkeiten
  bis zu Bürokratieabbau. Als Beispiel für die Stärkung Europas sieht Bundeskanzler
  Merz die neuen EU -Freihandelsabkommen, etwa MERCOSUR . Beim IHK -Tag 2026 diskutierten
  Vertreterinnen und Vertreter aus 79 IHKs, Wirtschaft, Politik und Wissenschaft.
  Gemeinsam sollten konkrete Impulse für eine „Vereinfachungsagenda für Deutschland“
  entwickelt werden. Sehr geehrter Herr Präsident, lieber Herr Adrian, liebe Frau
  Melnikow, meine sehr geehrten Damen und Herren, herzlichen Dank für die freundliche
  Begrüßung am heutigen Tag – am ersten Tag im zweiten Jahr der nicht mehr ganz neuen
  Bundesregierung. Ich will zunächst sagen: Ich freue mich, dass ich hier sein kann,
  und ich möchte zunächst beginnen mit einem sehr herzlichen Dank an Sie. Ich will
  das auch mit einem Wort der Wertschätzung für Ihre Arbeit verbinden. Die Industrie-
  und Handelskammern und die Außenhandelskammern setzen sich wie kaum eine andere
  Institution in Deutschland und im Ausland für unser Land ein, für deutsche Unternehmen
  und auch für die Rahmenbedingungen der deutschen Unternehmen, die sie im Inland
  und im Ausland vorfinden. Sie haben einen direkten Draht zu den Unternehmen unseres
  Landes. Sie vertreten vom kleinen Betrieb über den Mittelstand bis zur Großindustrie
  die Breite und Tiefe unserer Volkswirtschaft. Sie vertreten die deutsche Wirtschaft
  in ihrer ganzen Vielfalt, und sie treten für Rahmenbedingungen ein, die den Anliegen
  aller Unternehmen Rechnung tragen und nicht nur einzelner Branchen. Dafür will ich
  Ihnen herzlich danken, und ich will das Angebot, Herr Adrian, auf eine noch tiefere
  Partnerschaft und einen noch tieferen Austausch gern annehmen. Wir brauchen es 
  ich nehme es an. Meine Damen und Herren, Ausgewogenheit und ein weiter Horizont,
  das ist genau das, was wir in diesen Monaten in der wirtschaftspolitischen und auch
  in der sozialpolitischen Debatte in unserem Land dringend und mehr brauchen. Denn
  die Lage ist – und ich kann es mit der Analyse kurz machen – herausfordernd, und
  das gleich doppelt. Die Lage ist geoökonomisch herausfordernd; denn die geoökonomischen
  Umwälzungen treffen uns, treffen unsere Wirtschaft und treffen auf angestaute, strukturelle
  Probleme unseres Landes. Zusammengenommen – um dies auch den Vertretern der Medien
  zu sagen: das sage ich hier ohne jede Larmoyanz – ist dies seit dem Zweiten Weltkrieg
  vermutlich die herausforderndste Zeit für eine Bundesregierung, für eine Gesellschaft
  und nicht zuletzt auch für sie, für die Wirtschaft. Wir alle spüren das in diesen
  Monaten sehr deutlich; denn die Welt sortiert sich neu. Sie tut das eruptiv, sie
  tut das mitunter höchst unfriedlich und sie tut es rasend schnell. Wir finden zum
  Teil im Wochentakt neue Krisenlagen, die wiederum täglich ihre Gestalt ändern und
  sich ausweiten. Das alles lässt sich nicht draußen halten, das lässt sich nicht
  auslagern in ein Feld namens Außenpolitik. Es betrifft uns unmittelbar und hierzulande.
  Es schadet uns und es zeigt, dass eben auch wir uns ändern müssten. Die jüngsten
  schweren Folgen dieses neuen Unfriedens haben wir kurzfristig – und in der Tat nur
  kurzfristig – mit Maßnahmen zur Dämpfung der Energiepreise abgefedert. Ich will
  aber genauso deutlich sagen: Der Staat kann die Bürgerinnen und Bürger unseres Landes,
  er kann die Unternehmen nicht vor allen Verwerfungen der Märkte schützen. Wir können
  vorübergehende Preisspitzen abfedern, und das haben wir auch getan. Auf eine neue
  Lage müssen wir uns aber gemeinsam einstellen. Wichtiger ist noch: Wir müssen uns
  nicht nur einstellen, wir müssen uns selbst verändern und unser Land tragfähiger
  aufstellen. Zu den guten Nachrichten unserer Tage gehört aber: Europa hat das verstanden,
  und wir haben begonnen, uns zu verändern. Wir haben begonnen, uns zu stärken. Europa
  ist aufgewacht. Europa hat sich aufgemacht, auch eine neue Macht zu werden. Europa
  stärkt sich. Europa ist wirtschaftlich und sicherheitspolitisch auf einem neuen
  Weg. Europa identifiziert die Machtmittel, die es hat, und wir halten sie für den
  Einsatz auch bereit. Wir knüpfen gleichzeitig auf der ganzen Welt neue Handels-
  und Rohstoffpartnerschaften. Ich nenne als Beispiel nur das in diesen Tagen in Kraft
  getretene Abkommen mit vier südamerikanischen Staaten, das MERCOSUR -Abkommen. 25 Jahre
  haben wir darüber diskutiert. Vor wenigen Tagen ist es in Kraft getreten. Ich sage
  das, meine Damen und Herren, mit einem lachenden und einem weinenden Auge zugleich;
  denn erstmalig seit Jahrzehnten in der Geschichte der Handelspolitik der Europäischen
  Union haben Deutschland und Frankreich nicht gemeinsam abgestimmt. Ich bedauere
  das zutiefst, aber am Ende des Tages stand für mich die Frage im Vordergrund: Gibt
  es mit der deutschen Stimme im Europäischen Rat eine Mehrheit für das Inkrafttreten
  dieses Abkommens, auch unter Inkaufnahme eines unterschiedlichen Abstimmungsverhaltens
  zwischen Deutschland und Frankreich? Ich habe mich für diesen Weg entschieden, und
  erst dadurch ist die Mehrheit im Europäischen Rat für dieses Abkommen möglich geworden.
  Ich habe zu Beginn des Jahres einen gut vorbereiteten und geplanten Besuch in Indien
  unternommen. Ich habe damit das Treffen der Kommissionspräsidentin und des Präsidenten
  des Europäischen Rates vier Wochen später vorbereitet, und es ist vier Wochen später
  gelungen, ein Freihandelsabkommen mit Indien abzuschließen. Wenn alles gut geht,
  wird es nicht wieder Jahre dauern, sondern binnen Jahresfrist zu einem Inkrafttreten
  dieses Abkommens kommen. Es ist dankenswerterweise ein Abkommen ohne Agrarteil;
  das macht die Verabschiedung in den meisten Mitgliedstaaten Europas einfacher. Alles
  dies zeigt: Wir richten uns neu aus. Wir richten unsere Handelspolitik in Europa
  neu aus. In einer Zeit, in der die sogenannte regelbasierte Ordnung von vielen Seiten
  infrage gestellt wird, suchen wir neue Partnerschaften, suchen wir Gleichgesinnte,
  suchen wir große Wirtschaftsnationen, die mit uns den Weg der offenen Märkte und
  des freien Handels weitergehen wollen. Aber, meine Damen und Herren, auch wir selbst,
  auch wir in Deutschland, müssen uns ändern. Wir müssen die strukturellen Probleme
  angehen, die wir seit vielen Jahren vor uns herschieben und die damit seit vielen
  Jahren stetig größer geworden sind. Das ist auch die Antwort auf genau die Frage,
  die Sie hier heute und gestern diskutieren: Wie wird Wirtschaften in Deutschland
  wieder einfacher? Ja, es geht darum, die Standortbedingungen zu verbessern und die
  Voraussetzungen für mehr Wirtschaftswachstum zu schaffen. Sie wissen zugleich: Unsere
  wirtschaftliche Entwicklung stagniert seit mindestens sieben Jahren. Andere Länder
  wachsen zum Teil deutlich stärker – Herr Adrian, Sie haben es gesagt. Für die kommenden
  Jahre sagt man uns zurzeit ein jährliches Potenzialwachstum von weniger als einem
  halben Prozent voraus. Meine Damen und Herren, das ist inakzeptabel, das ist zu
  wenig und daran müssen wir grundlegend etwas ändern. Um es all denjenigen, die Wachstum
  gerne kritisieren, noch einmal zu sagen: Wirtschaftliches Wachstum ist kein Selbstzweck.
  Wirtschaftswachstum ist nicht eine statistische Größe, sondern es ist die Voraussetzung
  für den Wohlstand unseres Landes. Wirtschaftliches Wachstum ist die Voraussetzung
  für den Erhalt von Arbeitsplätzen und für das Entstehen neuer Arbeitsplätze. Wirtschaftswachstum
  ist die Voraussetzung für Steuereinnahmen des Staates, mit denen wir Straßen, Schienen,
  Schulen, Universitäten, innere und äußere Sicherheit finanzieren können. Wachstum
  auch ist die Voraussetzung für einen leistungsfähigen Sozialstaat, für eine gute
  Gesundheitsversorgung, für eine auskömmliche Versorgung im Alter. Deswegen muss
  die Reihenfolge auch für die Koalition klar sein: erst Wachstum und dann Verteilung,
  und nicht umgekehrt. Wir bewegen uns in Deutschland ‑ das ist in diesem Raum hier
  ein Allgemeinplatz – seit Jahren weit unter unseren Möglichkeiten. Aber die gute
  Nachricht in diesem Zusammenhang ist: Wir können das ändern. Wir können das ändern,
  wenn wir lernen, dass es unternehmerische Initiative ist – was ich Ihnen hier sage,
  meine Damen und Herren, werde ich in wenigen Tagen wortgleich auf dem DGB -Bundeskongress
  sagen: Es ist unternehmerische Initiative, die unser Land trägt. Wir müssen mit
  dem Misstrauen aufhören, mit dem viele dieser Initiative begegnen. Wir müssen unternehmerische
  Initiative entfesseln, ermöglichen und mit Vertrauen in die Zukunft begleiten, und
  nicht mit beständigem Misstrauen. Wir können es ändern, wenn wir die arbeitenden
  Menschen in unserem Land in den Blick nehmen und auch sie entlasten. Denn nicht
  nur Unternehmen sind mit zu hohen Kosten belastet; auch die Arbeitnehmerinnen und
  Arbeitnehmer in Deutschland, die im Durchschnitt fast die Hälfte ihres Einkommens
  für Sozialversicherungsbeiträge und Steuern aufwenden müssen, sind zu hoch belastet.
  Wir liegen in Europa an der Spitze der Skala. Ein wohlhabendes Land wie Luxemburg
  liegt zehn Prozentpunkte unter den Kostenbelastungen des Arbeitsplatzes ‑ von den
  Vereinigten Staaten von Amerika ganz zu schweigen, die etwa bei der Hälfte liegen.
  Wir können das ändern, meine Damen und Herren, wenn wir endlich ehrlich auf die
  Altersstruktur unserer Gesellschaft schauen und auch die notwendigen Schritte für
  eine nachhaltige Finanzierung unserer sozialen Sicherungssysteme insgesamt angehen.
  Wir können das ändern, wenn wir insgesamt unser Leben und Arbeiten wieder in ein
  tragfähiges Verhältnis setzen zur wirtschaftlichen Stärke und Unabhängigkeit, die
  wir in diesen eruptiven und unfriedlichen Zeiten so dringend brauchen. Ich sage
  es deshalb immer wieder: Wir können nicht einfach so weitermachen wie in den letzten
  20 Jahren. Wir müssen bereit sein zu Veränderungen, um zu erhalten, was uns gemeinsam
  wichtig ist. Nun bin ich, meine Damen und Herren, zugleich so unbescheiden, darauf
  hinzuweisen, dass wir seit einem Jahr, seit dem Antritt der von mir geführten Bundesregierung,
  in diesem Wissen auch handeln. Ich sehe uns und die Regierung und damit auch das
  ganze Land in einem Reformprozess – mit der Betonung auf beiden Worthälften: Reform
  und Prozess. Es ist ein Prozess, den ich antreiben und beschleunigen möchte, aber
  der nicht von oben einfach angeordnet werden kann, sondern der diskutierend und
  alles in allem in einem bewährten Tempo der parlamentarischen Demokratie vor sich
  geht. Ja, autoritäre Systeme mögen schneller und einfacher entscheiden. Besser ist
  es auf Dauer meistens nicht. Deswegen vertraue ich darauf, meine Damen und Herren,
  dass unsere parlamentarische Demokratie funktioniert. Ich will es noch etwas deutlicher
  sagen: Ich vertraue darauf, dass unsere parlamentarische Demokratie in der Mitte
  funktioniert. Ich werde im Deutschen Bundestag keine anderen Mehrheiten suchen als
  die, die ich in der Bundesregierung habe. Allen, die immer wieder sagen – ich sage
  es etwas salopp –: „Schmeißt die doch raus, macht alleine weiter und sucht euch
  andere Mehrheiten“, sage ich: wechselnde Mehrheiten oder gar eine Minderheitsregierung
  in Deutschland wird nicht zu besseren Ergebnissen, sondern zu gar keinen Ergebnissen
  mehr führen. Deswegen werde ich diesen Weg nicht gehen. Da der Beifall hier an der
  einen oder anderen Stelle etwas zögerlich kommt, meine Damen und Herren – ja, ich
  kenne die Stimmung, die in großen Teilen der Wirtschaft und mittlerweile auch des
  Mittelstandes um sich greift, ganz gut: Glaubt irgendjemand im Ernst, dass eine
  Abschottung von Europa, dass eine Abschottung von Einwanderung in unseren Arbeitsmarkt,
  dass „Deutschland zuerst“ der richtige Ausdruck ist für ein Land, das im internationalen
  Wettbewerb steht und mehr als viele andere auf der Welt darauf angewiesen ist, Partner
  auf der Welt zu haben? Glaubt dies wirklich jemand im Ernst? Nein, meine Damen und
  Herren, ich bin angetreten, um dieses Land nach vorn zu bringen, aber ich bin nicht
  angetreten, um es den radikalen Kräften zu überlassen. Nun will ich einige Themen
  dieses Reformprozesses heute aufrufen. Ich habe es oft gesagt: Die Probleme bei
  der Wettbewerbsfähigkeit unserer Volkswirtschaft sind vor allem Probleme der preislichen
  Wettbewerbsfähigkeit. Die Kosten in Deutschland sind zu hoch. Es sind die Lohnnebenkosten,
  oder besser: die Lohnzusatzkosten. Sie sind zu hoch, und sie drohen, immer weiter
  zu steigen. Ohne Reformen hätten wir in den nächsten zehn Jahren einen Anstieg der
  Sozialversicherungsbeiträge auf bis zu 50 Prozent zu befürchten. Wir wollen das
  verhindern. Deswegen haben wir die Reform der gesetzlichen Krankenversicherung im
  Kabinett bereits beschlossen. Gerade hier sind die Ausgaben in den letzten Jahren
  deutlich stärker gestiegen als die Einnahmen, ohne dass es dabei ein Mehr an Qualität
  und Leistung im System gegeben hätte. Unser Gesetzentwurf – er wurde Mittwoch vergangener
  Woche im Bundeskabinett verabschiedet – wird schon im nächsten Jahr zu Entlastungen
  in Höhe von rund 16 Milliarden Euro führen. Bis 2030 steigt das Volumen auf fast
  40 Milliarden Euro. Wir verhindern damit einen Beitragssatzanstieg von ziemlich
  genau zwei Prozentpunkten, meine Damen und Herren. Das heißt, wenn diese Reform
  auch durch den Deutschen Bundestag geht, dann werden die Beitragssätze der gesetzlichen
  Krankenversicherung für viele Jahre nachhaltig stabil bleiben. Ich sage es ganz
  unbescheiden noch einmal: Das ist eine historische Reform, die größte Reform in
  diesem Bereich seit über 20 Jahren. Wir schaffen damit für viele Jahre Sicherheit,
  Sicherheit für die Menschen, die in diesem System arbeiten, für die Unternehmen,
  für den Mittelstand, aber auch für diejenigen, die auf eine funktionierende Gesundheitsvorsorge
  und ‑versorgung in Deutschland angewiesen sind. Das Paket verlangt allen etwas ab.
  Aber es muss auch gerecht zugehen und als gerecht empfunden werden. Wir werden damit
  diese Säule unseres Sozialstaates jetzt stabil halten. Wir wenden uns genauso den
  anderen Säulen zu. Für jeden, der es sehen will, ist das ein Zeichen: Die Koalition
  ist entscheidungswillig; und sie ist entscheidungsfähig. Wir können Kompromisse,
  auch wenn es dabei manchmal etwas rumpelt. Meine Damen und Herren, wir werden es
  noch im Monat Mai für die Pflegeversicherung fortsetzen und auch dort die Finanzen
  auf eine stabile Grundlage stellen. Das härteste Brett wird sicherlich die Reform
  der gesetzlichen Rentenversicherung sein. Die von uns eingesetzte Expertenkommission
  wird dazu in wenigen Wochen ihre Vorschläge vorlegen. Ich verspreche Ihnen, dass
  wir dann, im Sommer, auch die dafür notwendigen politischen Entscheidungen treffen
  wollen. Es sage bitte niemand, solche Kommissionen könnten nicht hilfreich sein.
  Meine Damen und Herren, das Ergebnis der FinanzKommission Gesundheit haben wir innerhalb
  von zwei Wochen in einen Regierungsentwurf übersetzt und innerhalb von zwei weiteren
  Wochen im Bundeskabinett verabschiedet. Ohne diese Hilfe einer solchen Kommission,
  zusammengesetzt aus Experten aller Richtungen, mit sorgfältigster Vorbereitung und
  auch außerhalb der aufgeregten politischen Debatte, hätten wir es in dieser Geschwindigkeit
  nicht möglich machen können. Ich erhoffe mir dasselbe auch von der Rentenkommission,
  denn auch dabei ist das Ziel das gleiche: Wir wollen die Beiträge stabil halten. Das
  geht allerdings nur – das ist und bleibt meine feste Überzeugung –, indem wir länger
  arbeiten und in Deutschland mehr kapitalgedeckte Vorsorge ermöglichen. Das alles
  ist keine Bösartigkeit von mir. Es ist schlicht und ergreifend die Summe aus Demografie
  und Mathematik. Dem kann sich auch niemand aus rein ideologischen Gründen entgegenstellen,
  jedenfalls dann nicht, wenn er gute Absichten hat. Es übersteigt nämlich die Kräfte
  von zwei Beitragszahlern, wenn sie in Zukunft eine Person in der Rente finanzieren
  sollen. Wenn wir es gut machen – und wir wollen es gut machen –, dann wird das die
  Einlösung einer bis heute nicht eingelösten Reformidee – erlauben Sie mir, dass
  ich das als Christdemokrat so sage – der katholischen Soziallehre, nämlich der Beteiligung
  der Arbeitnehmerinnen und Arbeitnehmer am Produktivvermögen unserer Volkswirtschaft.
  Diese Beteiligung ist nur über eine Beteiligung an der Entwicklung auf dem Kapitalmarkt
  möglich. Deshalb ist dieses Reformvorhaben keine Bedrohung, sondern eine große Chance,
  nämlich die Chance, die drei Säulen der Altersversorgung, die gesetzliche Rente,
  die private kapitalgedeckte Vorsorge und die betriebliche kapitalgedeckte Vorsorge,
  verlässlich so in ein neues Gesamtversorgungsniveau einzufügen, dass wir nicht mehr
  über Haltelinien diskutieren müssen, sondern eben über ein Gesamtversorgungsniveau
  im Alter diskutieren können, das zumindest für diejenigen, die heute 50 Jahre und
  jünger sind, deutlich über dem Niveau liegt, das wir heute in der gesetzlichen Rentenversicherung
  erreichen. Nach meiner festen Überzeugung bleibt nur so die Rente in Deutschland
  wirklich sicher. Der zweite Bereich, den ich kurz ansprechen möchte, meine Damen
  und Herren, ist der Bereich der Unternehmenssteuern. Die Steuerlast in Deutschland
  ist für die Unternehmen zu hoch. Das muss sich ändern, damit sich Investitionen
  in Deutschland wieder stärker lohnen. Ich will die Stichworte nennen, die zeigen,
  dass wir uns des Problems bewusst sind und dass wir uns seiner angenommen haben,
  denn es war eine unserer ersten Maßnahmen, dass wir die Abschreibungsmöglichkeiten
  verbessert haben und dass wir die Körperschaftsteuer Schritt für Schritt von heute
  15 Prozent auf dann zehn Prozent absenken werden. Wenn dieser Satz im Jahr 2032
  erreicht ist, dann hat Deutschland im internationalen Vergleich wieder ein wettbewerbsfähiges
  Niveau. Ich will ergänzen: Personenunternehmen entlasten wir durch die parallele
  Senkung des Thesaurierungssteuersatzes. Erlauben Sie mir in diesem Zusammenhang,
  zu sagen: Ja, wir wollen auch eine Einkommensteuerreform ermöglichen. – Wir wissen,
  dass ein großer Teil der Unternehmen und, vermute ich, ein großer Teil der hier
  anwesenden Repräsentanten der Unternehmen nicht der Körperschaftsteuer unterliegen,
  sondern der Einkommensteuer. Deswegen sei es noch einmal öffentlich gesagt: Eine
  weitere Anhebung der Einkommensteuersätze für die Unternehmen der Privatwirtschaft
  in Deutschland ist nicht vorstellbar. Ich sage es noch einmal etwas präziser: Die
  Durchschnittssteuerbelastung der Unternehmen, die nach der Einkommensteuer veranlagt
  werden, ist in Deutschland zu hoch. Wir müssten sie eigentlich senken. Die Steuerschätzung,
  die wir gerade eben bekommen haben, lässt die Spielräume dafür noch einmal kleiner
  werden. Aber wir werden auch das mit dem Koalitionspartner intensiv zu diskutieren
  haben. Nur als Fußnote: Machen Sie sich bitte keine Sorgen darum, dass die Rufe
  nach einer höheren Erbschaftsteuer in meiner Partei oder in dem Teil der Regierung,
  den meine Partei repräsentiert, auf Gehör stoßen. Wir werden es nicht machen. Meine
  Damen und Herren, der dritte Bereich sind die viel zu hohen Energiepreise. Unser
  Sofortprogramm, das wir im letzten Jahr bereits verabschiedet haben, hat kurzfristig
  die Energiekosten reduziert. Wir haben die Gasspeicherumlage abgeschafft. Wir haben
  die Netzentgelte gesenkt. Wir haben die Stromsteuer für Unternehmen des produzierenden
  Gewerbes reduziert. Sie ist mit Genehmigung der Kommission jetzt auch entfristet.
  Das ist eine Entlastung von ungefähr zehn Milliarden Euro im Jahr. Hinzu kommt der
  Industriestrompreis. Er wurde gerade ebenfalls von der Europäischen Kommission genehmigt.
  Die Deckelung der Stromkosten energieintensiver Unternehmen für die Hälfte der verbrauchten
  Strommenge auf fünf Cent pro Kilowattstunde ist genehmigt. Das heißt, dass auch
  weiterhin industrielle Grundstoffe bei uns hier im Land hergestellt werden können.
  Das betrifft Chemie, Stahl, Maschinenbau, viele andere Unternehmen, die auf Energie
  angewiesen sind. Das ist ein wichtiges Stück der Unabhängigkeit, der strategischen
  Unabhängigkeit für unser Land in diesen Zeiten. Meine Damen und Herren, wir tun
  auch noch mehr: Wir wollen den Ausbau der Netze und der erneuerbaren Energien stärker
  auf Kosteneffizienz trimmen. Dazu muss beides besser aufeinander abgestimmt werden.
  Die Bundeswirtschaftsministerin hat hierfür Vorschläge erarbeitet. Ich hoffe, dass
  wir sie in der Koalition auch gemeinsam verabschieden können. Wir senken durch eine
  Überarbeitung des Erneuerbare-Energien-Gesetzes die Kosten, etwa durch die Anpassung
  der Photovoltaikförderung. Auch das steigert die Kosteneffizienz insgesamt. Wir
  steigen aus dem Automatismus aus, dass jede Anlage unabhängig davon, ob der Strom
  gebraucht wird oder nicht, über Steuermittel bezahlt wird. Meine Damen und Herren,
  langfristig werden wir in Deutschland ein größeres Energieangebot brauchen, um die
  Energiepreise zu stabilisieren und, wenn möglich, zu senken. Wir setzen dafür auf
  neue, flexible Gaskraftwerke, ergänzend zum Ausbau der Erneuerbaren, die wir nicht
  infrage stellen. Wir werden am nächsten Mittwoch, am 13. Mai, die Kraftwerkstrategie
  im Kabinett verabschieden und auch damit die Ausschreibungen für neue Gaskraftwerke
  in Deutschland, die die Grundlastfähigkeit gewährleisten sollen, ermöglichen. Last,
  but not least: Wir wollen das erste Fusionskraftwerk der Welt in Deutschland errichten.
  Sagen Sie bitte nicht, das sei Utopie und nur Zukunft. Auf der Hannover Messe vor
  zwei Wochen konnten wir sehen, dass das nicht utopisch, sondern sehr realistisch
  ist und dass Deutschland in dieser Forschung zur absoluten Spitze gehört. Meine
  Damen und Herren, ich komme schließlich, viertens, zu den Bürokratiekosten. Sie
  sind der Problembeschreibung zu Recht müde. Eine überbordende Bürokratie bremst
  die Unternehmen in unserem Land, bremst Sie. Wir wollen das ändern. Die ersten Erleichterungen
  sind im Kabinett beschlossen. Ich nenne nur den sogenannten Bauturbo, das Vergabebeschleunigungsgesetz
  und die Aufhebung der Berichtspflichten etwa beim Lieferkettensorgfaltspflichtengesetz.
  Auch der Bürokratierückbau ist ein hartes Brett. Max Weber hat das ganz richtig
  und allgemeingültig gesagt. Er hat übrigens nicht von einem dicken Brett, sondern
  von einem harten Brett gesprochen. Politik sei ein starkes, langsames Bohren von
  harten Brettern mit Leidenschaft und Augenmaß zugleich. So hat er es ausgedrückt.
  Ja, meine Damen und Herren, ich bin zuversichtlich, dass wir in diesem Anlauf weiterkommen.
  Denn es gibt jetzt ein Ministerium, das sich hochprofessionell genau und nur darum
  kümmert. Darf ich das auch einmal an dieser Stelle sagen? Ich bin unverändert sehr
  dankbar dafür, dass es uns, dass es mir gelungen ist, mit Karsten Wildberger jemanden
  aus der Privatwirtschaft zu gewinnen, der dieses Ministerium in Deutschland führt
  und mittlerweile in ganz Europa Maßstäbe für Staatsmodernisierung und Digitalisierung
  setzt. Wir arbeiten mit Karsten Wildberger bereits eine beschlossene Modernisierungsagenda
  für Staat und Verwaltung ab. Wir haben das erste Mal in der Geschichte der Bundesrepublik
  Deutschland eine föderale Modernisierungsagenda mit den Ländern beschlossen, am
  4. Dezember letzten Jahres, über 200 ambitionierte und sehr konkrete Projekte, die
  zum Teil in den Ländern schon umgesetzt werden und in den Ländern auf dieser Ebene
  auch bereits Wirkung entfalten. Ich will Ihnen nur ein Beispiel nennen: Die sogenannte
  digitale Brieftasche, mit der sich die Bürger schon ab dem nächsten Jahr nicht nur
  gegenüber staatlichen Institutionen, sondern gegenüber jedermann, der danach fragt,
  digital ausweisen und identifizieren können, wird europaweit gelten. Wir arbeiten
  parallel an einem ähnlichen Projekt auf der europäischen Ebene für die Unternehmen
  in ganz Europa. Das ist inzwischen auch soweit bekannt, dass sich herumgesprochen
  hat, dass wir ein digitales Bürokratiemeldeportal eingerichtet haben, in dem Sie
  als Unternehmen und als Unternehmer und auch alle anderen Bürgerinnen und Bürger
  unseres Landes Vorschläge zum Bürokratierückbau unterbreiten können, das EinfachMachen-Portal.
  Ich nenne es hier deshalb, weil wir weiter daran arbeiten, Berichtspflichten, Dokumentationspflichten
  und Nachweispflichten zu reduzieren. Wir wollen die Unternehmensgründung in Deutschland
  erleichtern, beschleunigen und digitalisieren. Wir werden im Juli, voraussichtlich
  am 15. Juli, ein weiteres sogenanntes Entlastungskabinett haben. Eines hatten wir
  bereits im November. Das ist eine Kabinettssitzung, bei der wir uns fast ausschließlich
  mit Entlastungen, mit der Abschaffung von Regulierung beschäftigen werden und nicht
  neue Gesetze beschließen, sondern vorhandene Gesetze abschaffen wollen. Meine Damen
  und Herren, wir meinen es wirklich ernst. Das sind nicht nur Ankündigungen, sondern
  das ist ein Blick in die Werkstatt der Bundesregierung. Wir kommen jetzt tatsächlich
  voran, und wir arbeiten hart daran, dass es weitergeht. Erlauben Sie mir schließlich
  noch einmal einen Blick auf die Europäische Union. Die EU -Kommission hat auch auf
  mein Drängen hin, auf das Drängen der 27 Staats- und Regierungschefs der Europäischen
  Union, eine echte Wende hingelegt. Sie konzentriert sich jetzt ebenfalls auf den
  Rückbau von Regulierung. Wir haben am 12. Februar erstmalig seit Jahrzehnten eine
  Auszeit für alle 27 Staats- und Regierungschefs der Europäischen Union genommen,
  in Alden Biesen, in dem alten Gründungsschloss des Deutschen Ordens, und haben uns
  einen ganzen Tag mit Enrico Letta und Mario Draghi mit der Frage beschäftigt, wie
  wir den europäischen Binnenmarkt vertiefen können und wie wir die Wettbewerbsfähigkeit
  der Europäischen Union verbessern können. Wir haben im Monat März, wenige Wochen
  später, eine Agenda der Europäischen Kommission diskutiert, und wir haben sie in
  der vorletzten Woche zwischen Rat, Kommission und Parlament bei einer informellen
  Tagung des Rates auf Zypern verbindlich miteinander verabredet. Wir werden jetzt
  in der Europäischen Union zügig an diesen Vorschlägen arbeiten und versuchen, sie
  auch durch die Institutionen zu bringen. Unter den Faktoren, die unser Wachstumspotenzial
  national hemmen, ist schließlich auch der Fachkräftemangel mit am wichtigsten. Ich
  will ihn kurz ansprechen. Der demografische Wandel betrifft nicht nur unsere sozialen
  Sicherungssysteme. Wir brauchen auch im Arbeitsmarkt jede Arbeitskraft, die verfügbar
  ist, um die Alterung unserer Gesellschaft bestmöglich auszugleichen. Das bedeutet:
  Wir müssen die richtigen Anreize setzen, damit die Menschen in unserem Land mehr
  arbeiten. Gerade im Sozialstaat müssen wir die Erwerbsanreize stärken und nicht
  schwächen. Meine Damen und Herren, auch damit haben wir begonnen. Wir haben das
  sogenannte Bürgergeld abgeschafft und durch die neue Grundsicherung ersetzt. Der
  Vermittlungsvorrang für die Menschen, die arbeiten können, ist ab dem 1. Juli 2026
  wieder eingeführt. Das wird zu einem Paradigmenwechsel in der Arbeitsverwaltung
  in Deutschland bei der Behandlung der Arbeitslosigkeit führen. Wir setzen bei den
  Älteren Anreize für längeres Arbeiten, zum Beispiel durch die Aktivrente, die seit
  dem 1. Januar 2026 in Kraft ist. Wir haben schon zuvor das sogenannte Vorbeschäftigungsverbot
  für Menschen im Rentenalter im selben Unternehmen, in dem sie vorher tätig waren,
  abgeschafft. Wir möchten auch – daran halten wir fest –, dass mehr in Vollzeit gearbeitet
  wird. Dazu trägt auch der beabsichtigte Umstieg von täglicher Höchstarbeitszeit
  auf Wochenarbeitszeit bei, den wir im Koalitionsvertrag verabredet haben. Dieser
  Umstieg bedeutet mehr Flexibilität sowohl für Sie als Arbeitgeber als auch für die
  Arbeitnehmerinnen und Arbeitnehmer in unserem Land. Wir wollen zugleich die Vereinbarkeit
  von Familie und Beruf noch besser fördern. Schließlich: Wir müssen dringend attraktiver
  für Fachkräfte aus dem Ausland werden. Das ist übrigens erneut einer der Gründe,
  warum ich davor warne, politisch auf Kräfte in unserem Land zu setzen, die uns nach
  innen und außen abschotten wollen, meine Damen und Herren. Die Bundesregierung,
  wir handeln in Verantwortung für unser Land, wenn wir uns jetzt aufmachen, das modernste,
  digital gestützte Einwanderungssystem zu errichten, das es in Europa gibt – wir
  nennen es Work-and-Stay -Agentur –, durch das die Einwanderung in unseren Arbeitsmarkt
  ganz überwiegend digital und dann in kürzester Zeit ermöglicht werden soll. Das
  ist wahrscheinlich das aufwendigste Digitalprojekt der Bundesregierung für diese
  Wahlperiode, weil es Arbeitserlaubnis, Anerkennung der Berufsqualifikation und Aufenthaltserlaubnis
  in Deutschland in einem System bündelt, digitalisiert und in kürzester Zeit für
  beide Seiten verfügbar macht, nämlich für die Arbeitnehmer, die nach Deutschland
  kommen wollen, um hier zu arbeiten, und für die Arbeitgeber, die nach entsprechenden
  Mitarbeiterinnen und Mitarbeitern suchen. Meine Damen und Herren, ich will schließlich
  bekräftigen, dass wir uns für die Modernisierung unserer Infrastruktur in unserem
  Land viel vorgenommen haben. Straßen, Brücken, Schienenwege dürfen nicht erst dann
  saniert und ausgebaut werden, wenn sie zu Sicherheitsrisiken werden. Über eine Pünktlichkeit
  von 60 Prozent im Fernverkehr der Bahn brauchen wir hoffentlich nicht zu diskutieren;
  das ist nicht hinnehmbar. Die finanziellen Möglichkeiten, dies und anderes zu ändern,
  sind jetzt da. Sie wissen es. Wir haben 500 Milliarden Euro für Infrastruktur und
  Klimaneutralität mobilisiert. 400 Milliarden Euro davon gibt der Bund selbst aus,
  100 Milliarden die Länder. Allein für Verkehrsprojekte wird der Bund bis 2029, also
  in dieser Wahlperiode, 169 Milliarden Euro einsetzen, so viel wie noch nie in einem
  vergleichbaren Zeitraum bevor. Neben der Verkehrsinfrastruktur investieren wir weiterhin
  auch in die digitale Infrastruktur unseres Landes. Meine Damen und Herren, mit der
  gerade beschlossenen Rechenzentrumsstrategie wird Deutschland seine digitalen Kapazitäten
  so weit ausbauen wie nie zuvor. Wir planen bis zum Jahr 2030 eine Verdopplung der
  Rechenkapazität in Deutschland im Vergleich zum Jahr 2025. Das schafft Arbeitsplätze,
  und das bedeutet, dass unser Land die Zukunft der digitalen Chancen wirklich ergreifen
  kann. Erlauben Sie mir, dass ich in diesem Zusammenhang auch im Hinblick auf den
  Finanzmarkt und den Kapitalmarkt in Deutschland und in Europa eine Anmerkung mache.
  Ja, wir brauchen große Banken in Europa. Für komplexe Finanzierungen, für Börsengänge,
  auch für die Begleitung an Investitionsplätze in der ganzen Welt brauchen wir auch
  große Banken. Aber das bedeutet nicht, meine Damen und Herren, dass jede Art von
  Übernahme ohne Einschränkung willkommen ist. Feindliches und aggressives Vorgehen
  lehnen wir entschieden ab. Dafür gibt es auch klare rechtliche Grenzen. Die deutsche
  Finanzaufsicht – ich nenne es beim Namen – hat der italienischen UniCredit im Zusammenhang
  mit der versuchten Übernahme der Commerzbank kürzlich bußgeldbewehrt untersagt,
  „Aussagen über die Zielgesellschaft zu tätigen, die die gegenwärtige wirtschaftliche
  Lage der Zielgesellschaft und deren Zukunftschancen in plakativer, reißerischer
  oder unsachlicher Weise negativ darstellen“. Ende des Zitats. Meine Damen und Herren,
  mit Blick auf die Bank, die gemeint ist, will ich es bei allem Verständnis für marktwirtschaftliche
  Prozesse und auch Entscheidungsrechte und Befugnisse der Eigentümer ganz klar sagen:
  So geht das nicht. So geht man nicht mit Instituten wie einer Bank in Deutschland,
  der Commerzbank, um. So wird Vertrauen zerstört und nicht neues Vertrauen ermöglicht.
  Meine Damen und Herren, Herr Präsident, ich will zum Schluss noch einmal das ganze
  Bild kurz aufmachen. Das, was in unserem Land jetzt geschehen muss und womit wir
  vor einem Jahr begonnen haben, ist lange Jahre, vielleicht auch Jahrzehnte unterblieben.
  Es ist einfach liegen geblieben. Jetzt müssen wir es tun, nicht handstreichartig,
  nicht mit einem großen Wurf, nicht über Nacht, sondern in einer Form, in der alle
  Argumente gehört und alle Interessen abgewogen werden, kurz: demokratisch. Mein
  Anspruch ist, dass das, was wir jetzt tun, für mehrere Jahre, vielleicht sogar für
  das vor uns liegende Jahrzehnt in die Zukunft hinein tragfähig ist. Das heißt auch,
  dass es von einer Mehrheit der Bürgerinnen und Bürger in unserem Land angenommen
  und mitgetragen wird. Denn all das zu ändern, was wir heute ändern müssen, das werden
  wir nicht so hinbekommen, dass niemand etwas davon bemerkt. Es wird Veränderungen
  für alle bedeuten. Alle werden etwas geben müssen, um dafür vielleicht etwas zu
  bekommen, nämlich unsere gemeinsame Zukunft, neue Tragfähigkeit unserer freiheitlichen
  Lebensweise in einer sich so gründlich verändernden Welt. Lassen Sie es mich vielleicht
  noch etwas persönlicher sagen: Ich möchte dieses Land in eine Zukunft führen, in
  der die Mischung wieder stimmt, die Mischung aus der Freiheit, den eigenen Weg zu
  gehen und Erfolg zu haben, der Sicherheit, in einer wachsenden Wirtschaft seinen
  Platz zu finden und im Alltag Dinge für sich und die Familie stemmen zu können,
  und schließlich der Sicherheit, dass wir uns als Land in Europa, gegen jeden Versuch
  verteidigen können, uns und unser freiheitliches Lebensmodell anzugreifen. Angesichts
  der Größe dieser Aufgabe kommt es nicht allein auf die Regierung an. Es müssen alle
  mittun und auch bereit sein, Verlust und Gewinn mit einem Blick auf das Wohl des
  Ganzen unseres Landes abzuwägen. Ich will daher an Sie appellieren: Bei aller Kritik,
  auch berechtigten Kritik, vertrauen Sie in den Weg von Demokratie und vielstimmiger
  Diskussion, und wirken Sie auf diesem Weg bitte weiter konstruktiv mit! Winken Sie
  nicht ab! Setzen Sie nicht auf Kräfte, die unser Land nach innen und nach außen
  isolieren wollen! Das Potenzial für diesen Aufbruch ist in Deutschland nach wie
  vor vorhanden. Unser Land ist stark, trotz aller Probleme. Wir haben viel Fleiß,
  viel Wissen, viel industrielle Substanz. Wir haben einen starken Mittelstand. Wir
  haben Sie, meine Damen und Herren. Die Hannover Messe vor wenigen Tagen hat so viel
  Innovationslust und Innovationsfähigkeit gezeigt, gerade auf dem Feld etwa der industriellen
  KI , die zu ganz anderen Wertschöpfungsmöglichkeiten beiträgt, mehr als es bisher
  auch nur erahnt werden konnte. Ich jedenfalls war beeindruckt davon, wie viele junge
  Menschen auf dieser Hannover Messe gezeigt haben, wie sie neue Unternehmen gründen.
  Übrigens, bei allen Zahlen: Das Jahr 2025 war ein Rekordjahr für die Gründung von
  Start-up -Unternehmen in unserem Land. Junge Menschen gründen keine Unternehmen
  und keine Start-ups, wenn sie voller Verzagtheit und Pessimismus in die Zukunft
  schauen. Sie tun das, weil sie unserem Land, weil sie unserer Gesellschaft, weil
  sie unserer demokratischen und marktwirtschaftlichen Ordnung vertrauen. Tun wir
  es bitte auch, meine Damen und Herren! Wir werden in Europa und in der Welt in wachsendem
  Maße wieder als Stabilitätsfaktor und auch als Investitionsstandort wahrgenommen.
  Natürlich wird es bei allem, was wir vorschlagen, bei allem, was ich Ihnen sage,
  immer auch kritische Stimmen geben. Warum auch nicht? Aber ich bitte alle Teilnehmer
  an dieser Debatte um Fairness und um den Blick auf das Ganze, um den Blick auf das
  Gemeinwesen unseres Landes, um den Blick, meine Damen und Herren, auf Deutschland,
  unser Land.'
