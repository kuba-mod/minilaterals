title: Im Bundesrat beschlossen Ausländische Abschlüsse schneller anerkennen
text: 'Die Beschleunigung der Anerkennungsverfahren ausländischer Berufsabschlüsse
  ist ein wichtiger und notwendiger Schritt in Reaktion auf den wachsenden Fachkräftemangel.
  Die bisher oft aufwendigen Anerkennungsverfahren ausländischer Berufsqualifikationen
  in Heilberufen werden schneller, einfacher und digitaler: Der Bundesrat hat einem
  Gesetz zur Beschleunigung der Anerkennungsverfahren zugestimmt. Die Neuregelung soll
  noch in diesem Jahr in Kraft treten und wird für Ärztinnen und Ärzte, Zahnärztinnen
  und Zahnärzte, Apothekerinnen und Apotheker sowie Hebammen gelten. Aufgrund des
  demografischen Wandels werden sich Fachkräfteengpässe auch in Heilberufen weiter
  verschärfen. Mit dem Abbau bürokratischer Hürden will die Bundesregierung dem Fachkräftemangel
  im Gesundheitsbereich begegnen. Mit dem Gesetz werden medizinische Fachkräfte, die
  ihren Abschluss im Ausland erworben haben, in Deutschland zukünftig rascher in ihren
  Berufen arbeiten können. Bundesgesundheitsministerin Nina Warken hatte bei der Vorstellung
  des Gesetzesentwurfs im Oktober 2025 gesagt: „Um die gesundheitliche Versorgung
  auch in Zukunft zu sichern, brauchen wir neben attraktiven Ausbildungsbedingungen
  in Deutschland auch qualifizierte Fachkräfte aus dem Ausland. Damit diese in Deutschland
  arbeiten können, sind einheitliche und zügige Anerkennungsverfahren notwendig.“
  Abstriche bei den hohen Standards an Patientensicherheit und Versorgungsqualität
  gibt es nicht. Es geht bei dem Gesetz lediglich darum, Anerkennungsverfahren zu
  beschleunigen. Die fachlichen Anforderungen werden nicht reduziert.'
