title: Schwerpunkte der Bundesregierung Verantwortungsvolle Außenpolitik und ein geeintes
  Europa
text: 'Ein Schwerpunkt der Bundesregierung ist eine verantwortungsvolle Außenpolitik
  und ein geeintes Europa. Deutschland arbeitet eng mit seinen Partnern in Europa
  und der Welt zusammen. Um den Umbrüchen auf dem Globus Rechnung zu tragen, wird
  die deutsche Außen- und Sicherheitspolitik einem Grundsatz folgen: Deutschland will
  sich verteidigen können, um sich nicht verteidigen zu müssen. Dabei bleibt die Bundesregierung
  dem Völkerrecht, der Charta der Vereinten Nationen, dem Selbstbestimmungsrecht der
  Völker und den universellen Menschenrechten verpflichtet. Vor dem Hintergrund der
  aktuellen Entwicklungen und angesichts der immer komplexeren Weltlage hat die Bundesregierung
  einen Nationalen Sicherheitsrat im Bundeskanzleramt eingerichtet. Aufgabe dieses
  neuen Gremiums ist es, die Sicherheitspolitik zu koordinieren, Strategieentwicklung
  und strategische Vorausschau zu leisten und die Willensbildung voranzubringen. Zudem
  wird ein Nationaler Krisenstab gegründet und ein Nationales Lagezentrum im Bundeskanzleramt
  aufgebaut. Die größte Bedrohung für die deutsche und europäische Sicherheit geht
  derzeit von Russland aus. Das Land rüstet weiter massiv auf und führt einen brutalen,
  völkerrechtswidrigen Angriffskrieg gegen die Ukraine. Die Unterstützung der Ukraine
  ist für die neue Bundesregierung von zentraler Bedeutung. Gleichzeitig setzt sie
  sich mit ihren Verbündeten für eine Strategie hin zu einem nachhaltigen Frieden
  ein, in dem die Ukraine aus einer Position der Stärke agieren kann. Das deutsche
  Bekenntnis zur Europäischen Union bleibt unverrückbar. Im Weimarer Dreieck wird
  sich die Bundesregierung eng mit den Nachbarn Frankreich und Polen abstimmen. Dies
  stärkt die EU als Ganzes. Angesichts des Konfliktes im Nahen Osten steht Deutschland
  unverbrüchlich an der Seite Israels – seine Existenz und Sicherheit sind deutsche
  Staatsräson. Deutschland setzt sich für einen Frieden in der Region ein, gerade
  seit dem Angriff der Hamas vom 7. Oktober 2023 und auch im Konflikt um das iranische
  Atomprogramm . Mit Blick auf China ist klar: Das Land bleibt ein wichtiger Partner
  in der Wirtschaft sowie bei der Bewältigung globaler Herausforderungen – in seinem
  außenpolitischen Handeln gibt es jedoch auch Elemente systemischer Rivalität. Deutschland
  wird seine China-Politik regional einbetten und im Sinne eines strategischen De-Riskings
  einseitige Abhängigkeiten abbauen. Multilaterale Organisationen sind essentiell,
  um gemeinsame Wege in der Außenpolitik zu finden und Konflikte friedlich beizulegen.
  Die Bundesregierung will die Vereinten Nationen stärken und setzt auf Partnerschaften
  in EU , NATO , OSZE , G7 und G20 . An einer werte- und interessengeleiteten Entwicklungspolitik
  hält die Bundesregierung fest, strebt aber grundlegende Veränderungen an, die aktuelle
  geopolitische und ökonomische Realitäten stärker abbilden und gestalten. Die NATO
  ist ein tragender Pfeiler der transatlantischen Partnerschaft und Garant der europäischen
  Sicherheit. Die Bundesregierung bekennt sich zur nuklearen Teilhabe und einer fairen
  Lastenteilung. Den europäischen Pfeiler in der NATO will sie stärken. Bei der Weiterentwicklung
  der Gemeinsamen Sicherheits- und Verteidigungspolitik ( GSVP ) wird die Bundesregierung
  eine Führungsrolle übernehmen. Deutschland muss und wird – ebenso wie seine europäischen
  Partner – seine Verteidigungsfähigkeit und seine Verteidigungsbereitschaft beständig
  weiter ausbauen. Die Bundeswehr soll zur konventionell stärksten Armee Europas werden.
  Die deutschen Verteidigungsausgaben werden deswegen deutlich weiter steigen. Die
  schon im Kabinett beschlossene Reform des Planungs- und Beschaffungswesens  wird
  zu einem effizienten Einsatz der zusätzlichen Mittel beitragen, die durch die Reform
  der Schuldenbremse im März 2025 speziell für Verteidigungsinvestitionen zur Verfügung
  stehen. Die Bundesregierung hat außerdem ein neues Wehrdienstmodell eingeführt.
  Es soll die Bundeswehr attraktiver machen, aber zunächst auf Freiwilligkeit basieren.
  Geplant ist, auch Reserve und Heimatschutz weiter zu stärken, indem sie besser ausgestattet,
  sowie strukturell und gesellschaftlich besser verankert werden. Die Bundesregierung
  wird alle Möglichkeiten ausschöpfen, um die Handlungsfähigkeit und strategische
  Souveränität der EU zu stärken. Deutschland wird ein starker und verlässlicher Partner
  sein, der sich mit Überzeugung, Ideen und Engagement einbringt. Die Bundesregierung
  wird insbesondere die Grundwerte der EU – wie Demokratie, Rechtsstaatlichkeit, Menschenrechte
  und Gleichheit – entschlossen verteidigen. Um Rechtsstaatsverstöße effektiver zu
  bekämpfen, sollen die bestehenden Schutzinstrumente intensiver genutzt werden. Dazu
  gehören Vertragsverletzungsverfahren, die Zurückhaltung von EU -Geldern sowie die
  Möglichkeit, Mitgliedschaftsrechte wie Stimmrechte im Rat der EU zu suspendieren.
  Eine Europäische Verteidigungsunion, gemeinsame Regeln für Verteidigungsgüter und
  eine engere Abstimmung im Krisenmanagement sind zentrale Ziele der Bundesregierung.
  Die Weiterentwicklung des Binnenmarkts – also der freie Verkehr von Personen, Waren,
  Dienstleistungen und Kapital innerhalb der EU – sieht die Bundesregierung als zentrales
  Element, die europäische Wirtschaftskraft besonders bei Energie, Medizin, Digitalem
  und Verkehr auszubauen. Es soll auch mehr privates Kapital für Investitionen in
  europäische Projekte mobilisiert werden. Attraktive Investitionsbedingungen durch
  vereinfachte Genehmigungsverfahren und Bürokratieabbau sollen die EU als Industriestandort
  zusätzlich stärken. Dies ist der Bundesregierung besonders wichtig. Zudem wird eine
  Energieunion mit einer stärkeren Vernetzung der Energiemärkte gefördert. Die Bundesregierung
  setzt sich zudem für verstärkte Investitionen in Bildung, Forschung, Innovation
  und Schlüsseltechnologien wie Künstliche Intelligenz und Raumfahrt ein. Das sichert
  die technologische Souveränität Europas. Mitgliedstaaten und Wirtschaft sollen drei
  Prozent des BIP für Forschung und Entwicklung investieren. Die Erweiterung der Europäischen
  Union ist wichtig. Sie muss mit EU -internen Reformen einhergehen, um die institutionelle
  Stärke und Entscheidungsfähigkeit zu sichern. Das Konsensprinzip im Europäischen
  Rat und die Einstimmigkeit im Rat der EU sollen aus Sicht der Bundesregierung effizienter
  gestaltet werden, unter anderem durch eine verstärkte Zusammenarbeit in einem „Europa
  der verschiedenen Geschwindigkeiten“. Dialog und Zusammenarbeit mit Nachbarstaaten
  sollen intensiviert und dabei auch die Europäische Politische Gemeinschaft als Plattform
  genutzt werden. Das Vereinigte Königreich bleibt einer der engsten Partner der EU
  .'
