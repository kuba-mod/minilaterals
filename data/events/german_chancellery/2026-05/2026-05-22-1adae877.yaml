date: '2026-05-22'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 22. Mai 2026
text: 'Sprecherinnen und Sprecher •    stellvertretender Regierungssprecher Hille
  •    Jenning (BMVg) •    Kleinschmidt (BMUKN) •    Hinterseher (AA) •    Royaee
  (BMZ) •    Schraff (BMG) •    Teichmann (BMBFSFJ) •    Chagheri (BMAS) •    Ungrad
  (BMWE) (Vorsitzende Buschow eröffnet die Pressekonferenz und begrüßt SRS Hille sowie
  die Sprecherinnen und Sprecher der Ministerien.) Einen schönen guten Tag auch von
  mir! Wie am Freitag üblich blicken wir auf die kommende Woche und die öffentlichen
  Termine des Bundeskanzlers . In dieser Woche habe ich zwei Terminankündigungen dabei.
  Am Mittwoch, den 27. Mai, leitet der Bundeskanzler wie üblich um zehn Uhr das Bundeskabinett
  . Der zweite Termin findet im Anschluss daran statt, ebenfalls am Mittwoch, den
  27. Mai. Dann empfängt der Bundeskanzler den Sachverständigenrat zur Begutachtung
  der gesamtwirtschaftlichen Entwicklung zu einem Gespräch im Bundeskanzleramt. Der
  Austausch im Rahmen eines Mittagessens findet von 12.30 Uhr bis 14 Uhr statt. Im
  Mittelpunkt des Gesprächs werden die wirtschaftliche Lage und insbesondere das Frühjahrsgutachten
  stehen. Das Frühjahrsgutachten stellt der Sachverständigenrat ‑ dies als kleiner
  Servicehinweis für die Bundespressekonferenz ‑ am gleichen Tag, am 27. Mai, um zehn
  Uhr hier in der Bundespressekonferenz vor. An dem Gespräch nehmen neben dem Bundeskanzler
  Finanzminister Klingbeil, Arbeits- und Sozialministerin Bas, Gesundheitsministerin
  Warken und die Parlamentarische Staatssekretärin aus dem Bundeswirtschaftsministerium,
  Connemann teil. Ich darf Ihnen heute eine Reise ankündigen. Verteidigungsminister
  Pistorius wird in der kommenden Woche, am Dienstagnachmittag, nach Kanada fliegen.
  Am Mittwoch wird er in Ottawa sein und am Vormittag die Rüstungsindustriemesse CANSEC
  besuchen. Im Zuge dessen wird er dort eine Rede halten. Diese Rede auf einem Panel
  werden wir via Livestream übertragen, sodass Sie sie auch von hier aus verfolgen
  können. Am Abend nimmt der Verteidigungsminister in der Botschaftsresidenz an dem
  Festakt anlässlich von 75 Jahren deutsch-kanadischer Beziehungen teil und wird in
  diesem Kontext ein Grußwort halten. Am Donnerstag wird er seine Reise fortsetzen
  und nach Montreal reisen. Dort stehen die Besuche mehrerer Rüstungsfirmen im Fokus,
  die auch für uns in Deutschland Relevanz haben. Die Pressearbeit dazu ist noch nicht
  final abgestimmt, aber ich kann Ihnen sagen, dass wir Sie dann natürlich auch hier
  in bewährter Form über die öffentlichen Äußerungen des Ministers informieren werden.
  Erstens: Mit Blick auf Kanada zeichnet sich ja ein U-Boot-Geschäft ab. Der Finanzminister
  war unlängst in Kanada und hat dafür geworben. Wird auch das ein Thema der Reise
  des Verteidigungsministers sein? Wie weit und wie konkret sind diese Pläne für ein
  solches U-Boot-Geschäft? Zweitens: Pistorius selbst hat sich am Mittwoch schon recht
  deutlich geäußert, was einen eigentlich geplanten zweiten Teil dieser Nordamerikareise
  betrifft, nämlich einen US-Anteil, und zu verstehen gegeben, dass er ‑ das war zumindest
  am Mittwoch noch so ‑ in Ermangelung von Gesprächspartnern in den USA noch nicht
  sagen könne, ob er tatsächlich dorthin fahren werde. Was ist der Stand der Dinge?
  Ihren Äußerungen entnehme ich jetzt, dass der US-Teil nach jetzigem Stand erst einmal
  entfällt. Aber arbeiten Sie weiter daran? Wie bewertet das Haus, dass es so schwierig
  ist, an adäquate Gesprächspartner in Washington für den Bundesverteidigungsminister
  zu kommen? Zunächst zu Ihrer ersten Frage: Sie können sich sicher sein, dass in
  der nächsten Woche natürlich auch die angesprochene U-Boot-Kooperation Thema sein
  wird. Sie wissen, dass wir dazu in Verhandlungen stehen. Aber ich muss Sie an dieser
  Stelle wie so oft um Verständnis dafür bitten, dass ich weder den bereits laufenden
  Gesprächen vorgreifen kann, noch den Gesprächen, die wir in der kommenden Woche
  führen werden, sodass ich Ihnen hierzu keine weiteren Details mitteilen kann. Zu
  Ihrer zweiten Frage: Es ist richtig, dass wir die Prüfung, ob sich im Anschluss
  an die Kanadareise auch ein USA-Anteil anschließen wird, noch nicht final abschließen
  konnten. Hierzu sind wir weiterhin in den Planungen und werden Sie natürlich schnellstmöglich
  in Kenntnis setzen. Auch dazu darf ich noch einmal auf die Worte verweisen, die
  der Minister selbst am Mittwoch gefunden hat. Sie haben es ja selbst schon gesagt.
  In Amerika gibt es in der kommenden Woche eine Sitzungspause, sodass geschaut werden
  muss, inwiefern Termine gefunden werden können und Personen vor Ort sind. Wir sind
  noch in der Abstimmung, ob sich Termine finden. Wenn sich dort etwas ergibt, dann
  halten wir sie darüber natürlich auf dem Laufenden. Frau Jenning, auch noch zum
  Thema Kanada : Diese Woche, denke ich, wurde bekannt, dass es eine Kandidatur für
  den NATO-Militärausschuss gibt, für den ja eigentlich der aktuelle GI vorgesehen
  ist. Wie blickt man denn auf diese Beobachtung, auch darauf, dass sie direkt vor
  dem Besuch von Pistorius angekündigt wurde? Wir haben natürlich zur Kenntnis genommen,
  dass diese Kandidatur bekannt gegeben wurde. Das ist der ganz normale Ablauf. Das
  steht natürlich jedem frei. Ich werde das von dieser Stelle aus nicht bewerten,
  weder die Kandidatur als solche noch den Zeitpunkt. (zur Reise des Bundesverteidigungsministers
  nach Kanada ) Wird der Minister von TKMS begleitet? Ich kann Ihnen sagen, dass die
  Delegation sowohl Pressevertreter als auch Vertreter der Verteidigungsindustrie
  umfasst sowie auch MdBs. Es entzieht sich derzeit meiner Kenntnis, ob auch Mitglieder
  von TKMS dabei sein werden. Das betrifft ja das U-Boot-Geschäft, das infrage steht.
  Wird sich der Minister bei den Kanadiern denn für TKMS aussprechen, damit der Auftrag
  eben nicht an die Südkoreaner geht? Ich möchte den Gesprächen nicht vorgreifen.
  Wie sich der Minister dazu positioniert, das wird er in der kommenden Woche selbst
  mitteilen. Dem werde ich von dieser Stelle aus nicht vorgreifen. Bundesumweltminister
  Carsten Schneider wird vom 26. Mai bis zum 29. Mai nach Mexiko reisen , um im Rahmen
  seines Antrittsbesuchs die mexikanische Umweltministerin Alicia Bárcena Ibarra zu
  treffen. Gemeinsam werden sie den strategischen Plan Mexikos zu Frauenrechten, Klima-
  und Menschenrechten vorstellen. Zudem besichtigt er Projekte der vom Bundesumweltministerium
  finanzierten Internationalen Klimaschutzinitiative, die sich unter anderem Küstenschutz,
  Biodiversitätsschutz und dezentraler Energieversorgung widmen. Dabei wird der Minister
  unter anderem im Celestún-Biosphärenreservat eine lokale Fischereikooperative zum
  Thema nachhaltiger Lieferketten treffen. Mexiko ist eines der wichtigsten Partnerländer
  Deutschlands im Umwelt- und Klimabereich. Die Reise dient zudem der Vorbereitung
  eines gemeinsamen deutsch-mexikanischen Co-Vorsitzes innerhalb der Wasserkonferenz
  der Vereinten Nationen, die im Dezember dieses Jahres stattfinden wird. Auch wird
  der Beitritt Mexikos zum Klimaklub gewürdigt und die Zusammenarbeit im Bereich der
  Kreislaufwirtschaft gestärkt. Das Mikrofon bleibt bei Ihnen, weil Sie noch eine
  Nachlieferung haben. Genau. Sie bezieht sich auf eine Frage, in der es um den Anteil
  von Plug-in-Hybriden an den Anträgen der E-Auto-Förderung ging. Die Zahlen, die
  ich gleich nennen werde, beziehen sich auf den Stand von gestern Mittag. Dazu haben
  wir vom BAFA eine kleine Auswertung bekommen. Insgesamt sind im Rahmen der E-Auto-Förderung
  bislang knapp 23 000 Anträge eingegangen. Mehr als 90 Prozent der gestellten Anträge
  entfielen auf rein batterieelektrische Fahrzeuge oder Brennstoffzellenfahrzeuge.
  Das heißt, zehn Prozent, der Rest, beziehen sich auf Plug-in-Hybride und Range Extender.
  Dafür habe ich keine genaue Aufschlüsselung; das wird quasi gemeinsam erfasst. Vielleicht
  auch ganz interessant ist eine kurze Auflistung mit Blick auf die Einkommensklassen.
  Knapp 50 Prozent der 23 000 Anträge wurden von Haushalten mit einem zu versteuernden
  Haushaltsjahreseinkommen von bis zu 45 000 Euro gestellt. Noch eine andere Sicht
  darauf: Knapp 70 Prozent der 23 000 Anträge wurden von Haushalten mit einem zu versteuernden
  Haushaltsjahreseinkommen von bis zu 60 000 Euro gestellt. Noch ein Hinweis: Diese
  Zahlen beziehen sich auf die gestellten Anträge, nicht auf bewilligte. Bisher liegen
  noch keine bewilligten Anträge vor. In meiner Frage geht es um die acht Deutschen,
  die aus der Gazaflotille zurückgekommen sind. Haben Sie Informationen über ihren
  Zustand? Werden Sie sich mit ihnen ein wenig austauschen, um zu erfahren, was sie
  da erlebt haben? Ich kann Ihnen gern den aktuellen Stand dazu mitteilen. Nach unserem
  Kenntnisstand konnten die 400 Aktivistinnen und Aktivisten der Global Sumud Flotilla,
  darunter acht deutsche Aktivistinnen und Aktivisten, in die Türkei ausgeflogen werden.
  Sie sind gestern Abend in Istanbul gelandet. Was haben wir bislang konsularisch
  getan? ‑ Unsere Botschaft in Tel Aviv war in die konsularische Betreuung der deutschen
  Staatsangehörigen eingebunden. Sie steht auch in fortlaufendem Austausch und hat
  Informationen bei der israelischen Seite eingefordert. Das deutsche Generalkonsulat
  in Istanbul war gestern bei der Ankunft der deutschen Staatsangehörigen am Flughafen
  in Istanbul präsent, hatte kurzzeitig die Möglichkeit zum Austausch mit der Gruppe
  und konnte auch ermöglichen, dass Telefonate zum Beispiel nach Hause geführt werden.
  Wir stehen den Angehörigen der betroffenen deutschen Staatsangehörigen natürlich
  weiterhin als Ansprechpartner zur Verfügung und mit ihnen in Kontakt. Zur Einordnung:
  Vor einer Abschiebung aus Israel hatten wir keinen konsularischen Zugang in Israel
  erhalten. Weil Sie explizit nach Verletzungen der Aktivistinnen und Aktivisten fragten:
  Unsere Kolleginnen und Kollegen in Istanbul haben bei Ankunft der deutschen Aktivistinnen
  und Aktivisten in Erfahrung bringen können, dass mehrere von ihnen Verletzungen
  aufwiesen. Medizinische Untersuchungen und Behandlungen wurden nach unserem Kenntnisstand
  vor Ort in Istanbul eingeleitet. Worauf ich hier hinweisen möchte, ist, dass eine
  menschenwürdige Behandlung unserer Staatsangehörigen für uns absolute Priorität
  hat und dass wir uns selbstredend für unsere deutschen Staatsangehörigen dort einsetzen.
  Dazu gehört vor allem die körperliche Unversehrtheit. In diesem Zusammenhang erwarten
  wir natürlich auch Aufklärung. Denn die Vorwürfe, die zum Teil im Raum stehen, sind
  gravierend. Es gibt ja auch einen politisch Verantwortlichen, der sich da, wie Sie
  wissen, in unsäglicher Art und Weise verhalten hat, der Polizeiminister Israels.
  Dazu hatten sich auch verschiedene Stellen Deutschlands schon geäußert und die erniedrigende
  Behandlung der Festgenommenen entsprechend verurteilt. Das ist aus unserer Sicht
  ein unsägliches Verhalten. Wissen Sie, wann die Deutschen zurück nach Deutschland
  fliegen werden? Das kann ich Ihnen nicht sagen. Wie gesagt, leisten wir vor Ort
  konsularische Hilfe und Unterstützung. Das wird dann bestimmt im Rahmen der individuellen
  Betreuung stattfinden. Der Außenminister hat das Verhalten Itamar Ben-Gvirs als
  vollkommen inakzeptabel bezeichnet. Das ist deutlich. Gleichwohl ist es sprachlich
  eigentlich dann doch eine schwache Form des Protestes. Warum hat die Bundesregierung,
  anders als zum Beispiel Polen, Frankreich, Spanien, Portugal und die Niederlande,
  nicht den israelischen Botschafter einbestellt, oder hat sie es inzwischen getan?
  Ich kann Ihnen, Herr Kollege, gerne noch einmal den ganzen Wortlaut wiedergeben.
  Er hat gesagt, das ist richtig: „Das Verhalten von Minister Ben-Gvir gegenüber den
  Aktivistinnen und Aktivisten der Flottille ist vollkommen inakzeptabel. Es widerspricht
  den Werten, für die Deutschland mit Israel gemeinsam stehen will, fundamental. Daher
  bin ich meinem Kollegen Gideon Sa’ar dankbar für die klaren Worte, die er für dieses
  unsägliche Verhalten gefunden hat.“ Über das Verhalten von Herrn Ben-Gvir möchte
  ich auch festhalten: Die Behandlung der Aktivistinnen und Aktivisten, darunter eben
  deutsche Staatsangehörige ‑ das ist uns ja erst gestern zur Kenntnis gelangt ‑,
  ist aus unserer Sicht ebenso völlig inakzeptabel. Wir verurteilen dieses Vorgehen
  klar und deutlich, und wir fordern eben die entsprechende Transparenz in der Aufarbeitung,
  die jetzt hergestellt werden muss. Damit haben Sie den zweiten Teil der Frage aber
  nicht beantwortet. Der Kenntnisstand dürfte bei den genannten Staaten Polen, Spanien,
  Niederlande etc. ähnlich gewesen sein. Die haben das auch erst gestern erfahren.
  Gleichwohl haben die die jeweiligen israelischen Botschafter eingestellt. Das ist
  ein weiteres Signal, über die Erklärung eines Ministers hinaus. Warum hat Deutschland
  das bislang nicht getan, oder haben Sie inzwischen den Botschafter einbestellt?
  Wie gesagt, diese Entwicklung und vor allem der Sachstand, den ich hier vorgetragen
  habe, ist relativ neu. Der ist von gestern Abend. Wir haben bereits gesagt, und
  diese Ablehnung kommunizieren wir auch sehr deutlich, dass wir in diesem Vorgehen
  eine Sachverhaltsaufklärung fordern. Die Vorwürfe, die im Raum stehen, sind aus
  unserer Sicht eben absolut gravierend, und deswegen erwarten wir eine lückenlose
  und transparente Aufklärung. Darüber hinaus habe ich Ihnen heute nichts anzukündigen,
  aber das ist das Vorgehen, das ich Ihnen an dieser Stelle und zum jetzigen Zeitpunkt
  mitzuteilen habe. Herr Hinterseher, sind unter den acht Deutschen misshandelte Personen?
  Ich glaube, dazu hatte ich gerade etwas ausgeführt. Unser Konsularteam in Istanbul
  hat Verletzungen festgestellt. Alles Weitere fordern wir jetzt eben von der israelischen
  Seite. Wir stehen in Kontakt mit den Personen. Wir fordern von der israelischen
  Seite entsprechende Aufklärung, denn aus unserer Sicht ist es nicht nachvollziehbar,
  wie sich der Gesundheitszustand, der sich uns dargestellt hat, ergibt. Es könnte
  sein, dass man die Deutschen fragt, was mit ihnen passiert ist, warum sie verletzt
  sind. Sie haben jetzt gerade auch von Verurteilungen gesprochen. Können Sie uns
  noch einmal, basierend auf Völkerrecht, humanitärem Völkerrecht usw., sagen, welche
  Normen da verletzt wurden? Ich kann Ihnen hier keine rechtliche Auslegung darbieten,
  denn uns fehlen Informationen dazu. Wenn Sie eine Rechtsberatung oder Rechtsauslegung
  haben möchten, dann müssen Sie sich an einen Rechtsbeistand wenden. Das kann ich
  für Sie hier nicht leisten. Was ich sagen kann, ist, dass wir im Zusammenhang damit
  Aufklärung fordern. Das ist unsere Position. Ich glaube, die habe ich gerade in
  aller Deutlichkeit dargelegt. Die Frage richtet sich an das BMZ, an das BMG, aber
  auch an das AA. Gibt es bereits Hilfen der Bundesregierung im Ebolaausbruchsgebiet
  im Kongo und in Uganda , oder sind diese geplant? Wenn ja, welche genau? Das BMZ
  hat schon vor Jahren die Pandemievorsorge in der Region durch Frühwarnsysteme und
  Kommunikationssysteme unterstützt. Erste Unterstützungsmaßnahmen des BMZ in der
  deutschen Entwicklungszusammenarbeit sind bereits angelaufen, insbesondere zur Pandemieprävention
  in der Ostafrikanischen Gemeinschaft sowie über die sogenannte Schnell Einsetzbare
  Expertengruppe Gesundheit. Das läuft gerade an. Wichtig zu sagen ist natürlich auch,
  dass der Zugang in die Region zum Teil schwierig ist. Aber insgesamt sind wir gerade
  dabei, alle möglichen Mittel über diese bereits bestehenden Maßnahmen zu initiieren.
  Können Sie das noch ein bisschen genauer sagen? Wenn ich Sie richtig verstanden
  habe, haben Sie im Moment nur, in Anführungsstrichen, Experten in der Region, aber
  die waren ohnehin schon da. Sie planen aber noch mehr. Aber wenn, was denn, in welchem
  Umfang, oder ist das noch offen, und bis wann? Zum Beispiel ‑ ich kann das auch
  noch einmal im Einzelnen nachreichen ‑ unterstützen wir über die Schnell Einsetzbare
  Expertengruppe Gesundheit die lokale Beschaffung von Schutzausrüstung für kirchliche
  Gesundheitseinrichtungen als Sofortmaßnahme. Wir unterstützen die Ausweitung von
  Sensibilisierungsmaßnahmen für die Bevölkerung und von Gesundheitsfachkräften, vor
  allen Dingen in Kooperation mit kirchlichen Trägern in Nordkivu, und schulen medizinisches
  Personal vor Ort bzw. bereiten Schulungen vor Ort in dem Bereich vor. Dann gibt
  es die aktive Unterstützung der Aktivierung und Implementierung des kontinentalen
  sogenannten Incident Management Support System der afrikanischen Gesundheitsbehörde
  CDC. Das sind die Maßnahmen, die ich jetzt konkret vortragen kann und die gerade
  am Anlaufen sind. Um Fragen zur aktuellen Krise zu beantworten, müsste ich noch
  einmal ins Detail gehen und nachreichen, was noch an weiteren Maßnahmen nachkommen
  wird. Wie viele Personen sind da also jetzt im deutschen Auftrag? Waren die schon
  vorher da, oder haben Sie die jetzt hingeschickt? Hingeschickt haben wir jetzt aktuell
  niemanden. Das sind Expertinnen, die vor Ort sind. Aber werden die von Deutschland
  bezahlt, oder was ist der deutsche Beitrag? Ich habe eine etwas allgemeiner gefasste
  Frage zu dem Komplex. Manche Menschen haben sich, als vom neuerlichen Ebolaausbruch
  die Rede war, Sorgen gemacht, eine neuerliche Pandemie könnte anstehen. Deshalb
  die Frage an das BMG: Wie weit sind die Vorbereitungen auf ein solches Szenario
  ‑ das kann ja auch losgelöst von einem akuten Ebolageschehen wieder virulent werden ‑
  auch für Deutschland? Welche Lehren hat man aus der vergangenen Pandemie gezogen,
  beispielsweise für die Absprachen zwischen Bund und Ländern und die Bevorratung
  kritischen Materials? Was ist da der Stand der Dinge? Was können Sie uns dazu sagen?
  Grundsätzlich, weil Sie Ebola erwähnt haben: Das Risiko, das von Ebola ausgeht,
  wird für Deutschland als sehr gering eingeschätzt, und es besteht für die Bevölkerung
  und andere Patienten in der Charité keine Gefahr; das noch einmal vorweg. Ansonsten,
  was die Resilienz unseres Gesundheitssystems und die Sicherstellung der Gesundheitsversorgung
  angeht: Das ist natürlich nicht nur wegen möglicher Pandemien, sondern auch angesichts
  der angespannten sicherheitspolitischen Lage von zentraler Bedeutung. Deutschland
  ist natürlich auch aufgrund der Erfahrungen während der Coronapandemie heute besser
  auf eine Pandemie vorbereitet. Dennoch gibt es noch Handlungsbedarf, um das Gesundheitssystem
  krisenfest zu machen. Um die richtigen Lehren aus der Pandemie zu ziehen, hat der
  Bundestag, wie Sie wissen, die Enquete-Kommission eingerichtet. Die arbeitet. Wir
  haben aber auch schon unsere Lehren aus der Pandemie gezogen und die Strukturen
  in Deutschland gestärkt. Ich möchte Ihnen hier exemplarisch ein paar Beispiele nennen.
  Ich kann jetzt hier nicht alles aufführen, aber die wichtigsten nennen. Wir überwachen
  das Infektionsgeschehen besser, zum Beispiel durch das Abwassermonitoring und eine
  genomische Überwachung. Das ist wichtig bei der Früherkennung von neuen Viren oder
  dem Erkennen von Ausbruchswellen. Zudem haben wir ein Infektionsradar mit aktuellen
  Daten, zum Beispiel zu aktuellen Geschehen von Atemwegserkrankungen, eingerichtet.
  Dann haben wir den Pakt für den Öffentlichen Gesundheitsdienst mit Geld gestärkt,
  und damit ist es uns auch gelungen, ihn zu stärken. Wir haben das auch in eine Modernisierung
  gesteckt. Mehr Digitalisierung und Personalaufbau sind da die Stichworte. Der Nationale
  Pandemieplan wird gerade in einem umfassenden Prozess mit den Bundesländern überarbeitet
  und soll bis Ende dieses Jahres veröffentlicht werden. Nicht zuletzt haben wir ja
  auch noch Änderungen am Infektionsschutzgesetz angekündigt und arbeiten daran. Das
  wird in dieser Legislaturperiode angegangen, und dabei werden auch die Änderungsvorschläge
  der Bundesländer und natürlich die Ergebnisse der Enquete-Kommission zur Aufarbeitung
  der Coronapandemie einfließen. Das wäre schon einmal so ein Abriss über das, was
  wir getan haben. Zur Flottille noch eine Nachreichung, weil Sie, glaube ich, danach
  fragten: Nach unserem Kenntnisstand sind die acht deutschen Aktivistinnen und Aktivisten
  derzeit noch in der Türkei. So ist unser Kenntnisstand, denn wir konnten nur sieben
  Personen am Flughafen Istanbul über unser Konsularteam in Empfang nehmen. Ich glaube,
  eine Person wurde direkt in ein Krankenhaus eingeliefert. Weil sie so schwer misshandelt
  worden ist? Ich kann aus Gründen des Persönlichkeitsschutzes hier nichts weiter
  ausführen, Herr Kollege. Ich habe das, soweit ich es eben wiedergeben kann, jetzt
  wiedergegeben. Ich habe eine Frage an das Familienministerium zum Elterngeld . Der
  Finanzminister erwartet ja, dass es da Kürzungen geben soll. Wie weit sind die Pläne
  fortgeschritten? Was sagt das Ministerium oder die Ministerin zu dem Vorwurf bzw.
  zu der Kritik, dass damit wahrscheinlich die jüngere Generation wieder einmal belastet
  wird? Vielen Dank für die Frage. - Wie Sie vielleicht wissen, hat sich die Ministerin
  heute gegenüber der „WELT“ geäußert, und sie hat betont, dass sie sich als Teil
  der Regierung solidarisch daran halten will, was der schwarz-rote Koalitionsausschuss
  an Einsparungen beschlossen hat. Sie will aber auch an konstruktiven Lösungen arbeiten.
  Sie hat in diesem gleichen Interview klar gemacht, dass sie im Familien- und im
  Bildungsbereich um jeden Cent kämpfen will. Wie die Einsparziele jetzt konkret erreicht
  werden können, wird die Ministerin mit der Regierung und den Fraktionen verhandeln.
  Es ist ihr aber wichtig, klarzumachen, dass sie das Elterngeld für eine Errungenschaft
  hält, die sie außerordentlich wertschätzt und die sie so reformieren will ‑ das
  steht ja nämlich auch für uns an ‑, dass es ein attraktiver Zuschuss für die Familien
  bleibt. Es ist ihr wichtig zu sagen, dass bei all den Sparzwängen, die wir in dieser
  Bundesregierung haben, die Familien trotzdem das Signal erhalten, dass wir sie unterstützen.
  Der Deutsche-Welle-Korrespondent Alican Uludağ ist in der Türkei gestern aus der
  U-Haft entlassen worden, aber der Prozess zur Unterdrückung der Meinungsfreiheit
  gegen ihn geht weiter. Kann das Auswärtige Amt dazu irgendetwas sagen? Fordern Sie
  die Aussetzung des Prozesses? Ich glaube, Staatsminister Weimer hatte sich bei der
  Festnahme bereits dazu geäußert, und darauf würde ich verweisen: Das ist die Forderung
  der Bundesregierung. Zum neuen Sachstand kann ich sagen: Wir sind natürlich sehr
  erleichtert über die Entlassung des Journalisten der Deutschen Welle aus der Untersuchungshaft.
  Wir werden den Prozess gegen ihn, der weiterhin läuft, weiter genau beobachten.
  Auch gestern war ein Vertreter der Deutschen Botschaft beim Prozess anwesend. Aus
  unserer Sicht leistet die Deutsche Welle in der Türkei und weltweit äußerst wichtige
  Arbeit, und es ist wichtig, dass Sie und andere Journalistinnen und Journalisten
  weltweit frei berichten können. Wie gefährdet ist Ihrer Ansicht nach die Pressefreiheit
  in der Türkei? Wir haben hier verschiedentlich darauf hingewiesen, wie wir die Rückschritte,
  die wir in der Vergangenheit im Bereich der Presse- und Meinungsfreiheit in der
  Türkei durchaus feststellen konnten, beurteilen. Die Türkei möchte EU-Mitgliedstaat
  werden. Dafür sind Kriterien vor allem in den Bereichen der Presse- und Meinungsfreiheit,
  aber auch der Grundfreiheiten allgemein einzuhalten. Daran messen wir die Türkei
  natürlich auch ‑ übrigens auch als Mitglied des Europarats. Dazu sehe ich keine
  weiteren Fragen. Dann Herr Kollege, haben Sie das nächste Thema? Ich interessiere
  mich für die Krisenreaktionsübung der Bundesregierung am Mittwoch. Da wurde geübt,
  wie man mit einem entführten Passagierflugzeug umgehen würde. In der Mitteilung
  stand, dass der Bundeskanzler zwei Eurofighter-Kampfjets geschickt habe, die dieses
  Flugzeug abgefangen und zur Landung begleitet haben. Jetzt fragen wir uns: Wie können
  zwei Eurofighter-Kampfjets ein entführtes Passagierflugzeug zur Landung bringen?
  Die Beantwortung des ersten Teils ‑ sozusagen des politischen Teils ‑ kann ich übernehmen.
  Wenn es dann zum Militärtaktischen geht, würde ich an die Kollegin vom BMVg verweisen.
  Dafür gibt es eingespielte Verfahren. Aber zunächst einmal: Es ist zutreffend, wie
  Sie gerade geschildert haben, dass das Bundeskabinett in einem größeren Verbund
  am Mittwoch eine solche Krisenreaktionsübung durchgeführt hat. Es ging dabei im
  Grunde darum, Handlungssicherheit in Krisenzeiten zu erproben. Genau das wurde bei
  dieser Übung gemacht. Dazu, wie dann die Verfahren stattfinden ‑ dass Eurofighter
  oder andere Luftfahrzeuge Flugzeuge zum Abdrängen oder an den Boden bringen ‑, kann
  vielleicht die Kollegin vom BMVg noch etwas sagen. Ansonsten kann man nur darauf
  verweisen, dass das erprobte Verfahren sind und die Bundeswehr und die Pilotinnen
  und Piloten der Bundeswehr auch genau für diese Fälle trainiert sind. Auch außerhalb
  solcher Krisenreaktionsübungen ist das ein klassisches Übungsszenario in der Bundeswehr,
  soweit ich weiß. Ich kann dazu vielleicht ein paar Kleinigkeiten ergänzen. ‑ Zunächst
  darf ich hier auch noch einmal betonen, was auch unser Minister in diesem Zusammenhang
  betont hat, nämlich dass die eingesetzten Piloten unserer Alarmrotte gezeigt haben,
  dass wir gerade auch für solche gefährlichen Situationen top ausgebildet sind und
  natürlich auch auf ebendiese Situationen vorbereitet sind. Das üben wir auch in
  anderen Übungsszenarien. Erlauben Sie mir noch einen allgemeinen Einschub: Wir haben
  hier auch schon oft betont, wie wichtig solche Übungen sind. Denn am Ende gilt auch
  im militärischen Bereich, dass nur das in Fleisch und Blut übergehen kann, was man
  täglich übt. Sie werden sich nicht wundern, dass ich jetzt nicht komplett in Einzelheiten
  und Details gehen kann, wie ein solcher Abfangvorgang und auch die Begleitung zu
  einer Landung vonstattengeht. Aber natürlich ist es so, dass dann unsere Eurofighter
  aufsteigen und auch über Sichtkontakt arbeiten und zum Beispiel durch Bewegung des
  Flugzeuges auf sich aufmerksam machen und zum Beispiel durch Flügelschwenken oder
  ähnliches darauf aufmerksam machen, dass eine Befolgung stattzufinden hat. Jetzt
  ist heute nicht Oberst Müller hier, der das im Zweifel ein bisschen detaillierter
  und besser erklären könnte als ich, aber grundsätzlich gilt, dass wir über diesen
  Sichtkontakt arbeiten. Aber wie gesagt, die genauen Details obliegen dann der operativen
  Führung, sodass ich die hier auch nicht ausführen kann. Der frühere Verteidigungsminister
  Jung hatte damals ‑ ich glaube, vor 20 Jahren ‑ einmal gesagt, er würde so ein entführtes
  Passagierflugzeug auch abschießen lassen. Gilt das auch noch für die aktuelle Bundesregierung?
  Herr Kollege, da ist die Rechtslage ja ziemlich eindeutig. Da verweise ich auf das
  Urteil des Bundesverfassungsgerichts im sogenannten Renegade-Fall. Ansonsten werden
  Sie von mir nicht erwarten, Aussagen aus der Vergangenheit hier noch einmal zu kommentieren.
  An Herrn Hille: Wolodymyr Selenskyj hat für heute eine Videoschalte mit der E3 angekündigt.
  Was ist das Ziel dieser Schalte? Wird es darum gehen, einen europäischen Unterhändler
  für die Verhandlungen zwischen Russland und der Ukraine zu bestimmen? Frau Kollegin,
  Wie Sie wissen, sind wir in engem Kontakt mit unseren Partnern in Europa und auch
  mit dem ukrainischen Staatspräsidenten. Ich kann Ihnen jetzt aber keine besonderen
  Termine ankündigen. Im Moment liegen auch mit dem Brief des Bundeskanzlers zum Thema
  EU‑Mitgliedschaft Themen auf dem Tisch, aber wir sind im ständigen Beratungsprozess
  mit den Partnern in Europa und auch dem ukrainischen Präsidenten. Ist das ein Dementi,
  was diese konkrete Schalte angeht? Das ist weder eine Bestätigung noch ein Dementi.
  Das ist das, was ich gerade gesagt habe. An das Bildungsministerium: Es gibt Pläne
  der Gedenkstätte Yad Vashem, in Deutschland ein Bildungszentrum zum Holocaust zu
  errichten . Drei Standorte sind im Gespräch. Nun heißt es, eine Entscheidung könnte
  Ende Mai fallen. Trifft das zu? Zeichnet sich schon ab, welcher Standort das Rennen
  macht? Mein Stand ist, dass es möglicherweise am kommenden Mittwoch zu einer Entscheidung
  kommt. Wie Sie vielleicht wissen, hat Yad Vashem im September letzten Jahres drei
  Länder als potenzielle Standorte für die Errichtung eines Holocaust-Bildungszentrums
  in Deutschland veröffentlicht: Das sind Bayern, Nordrhein-Westfalen und Sachsen.
  Der Auswahlprozess und die Kontakte dazu liefen direkt zwischen Yad Vashem und den
  Ländern. Die Bundesregierung nimmt hierauf keinen Einfluss. Deswegen würde ich Sie
  bitten, sich entweder an Yad Vashem oder an die Länder selbst zu wenden. Wie gesagt,
  mein Stand ist, dass es am kommenden Mittwoch möglicherweise eine Entscheidung dazu
  gibt. Zum Thema Kuba : Der US-Flugzeugträger Nimitz wurde jetzt in der Karibik verortet,
  und US‑Präsident Trump spielt weiterhin öffentlich mit Invasionsplänen. Hat die
  Bundesregierung dazu eigene Erkenntnisse? Drängen Sie den amerikanischen Partner,
  eine mögliche Invasion sein zu lassen? Oder unterstützt die Bundesregierung einen
  „regime change“ in Kuba, Herr Hille? Ich kann das gerne übernehmen. ‑ Ich weiß nicht,
  woher Sie die Prämisse oder die Ankündigung einer Invasion nehmen, Herr Kollege.
  Wir haben Berichte zur Kenntnis genommen, dass es einen Flugzeugträgerverband gibt,
  der in die Karibik einläuft. Das haben wir zur Kenntnis genommen. Sehen Sie es mir
  aber nach, dass wir nicht jedes einzelne Manöver von Alliierten kommentieren. Wir
  haben im Januar ja am Beispiel Venezuela erlebt, wie schnell es gehen kann. ‑ Die
  Frage, ob die Bundesregierung einen „regime change“ in Kuba unterstützen würde,
  haben Sie jetzt aber nicht beantwortet. Ich glaube, wir haben uns hier öfter dazu
  verhalten. Sie wissen, dass wir dem Begriff „regime change“ grundsätzlich sehr kritisch
  gegenüberstehen. An das BMAS: Ist die Ankündigung bzw. die Forderung der Wirtschaftsministerin,
  Frühverrentungsprogramme zu beenden , mit Ihrem Haus als zuständiges Ressort abgesprochen
  gewesen? Es wird Sie nicht erstaunen, dass ich Äußerungen auch aus dem politischen
  Raum an dieser Stelle nicht kommentiere. Sie wissen, dass zum Thema Rente gerade
  die unabhängige Alterssicherungskommission tagt. Wir schauen, was dabei Ende Juni
  herauskommt, und dann folgt alles Weitere zum Thema Rente. Wenn eine Ministerkollegin
  sich äußert, ist das für mich etwas anderes als Äußerungen aus dem politischen Raum.
  Sind in Ihrem zuständigen Ressort irgendwelche Maßnahmen im Hinblick auf die Beendigung
  von Frühverrentungsprogrammen in Arbeit oder sind Sie bereit, über solche Programmstopps
  zu reden? Ich kommentiere an dieser Stelle nicht die Äußerungen anderer Ministerinnen
  oder Minister. Aus unserem Haus habe ich Ihnen dazu heute nichts anzukündigen. Heute
  tagt noch einmal die Taskforce der Koalition zur Energiekrise ; es soll vor allem
  um die Versorgungssicherheit gehen. An das BMWE: Sieht die Bundesregierung über
  die gegenwärtigen Maßnahmen hinaus weiteren Handlungsbedarf bei diesem Thema? Unsere
  Taskforce tagt gemeinsam innerhalb der Regierung, aber auch mit verschiedenen Unternehmen,
  mit verschiedenen Branchen. Das findet weiterhin statt, mindestens einmal die Woche.
  Die Ministerin lässt sich jeden Tag in einer Extralage zur Versorgungssicherheit
  briefen. Derzeit sehen wir keine Probleme in der Versorgungssicherheit. Das betrifft
  LNG, aber genauso auch Öl. Die Freigaben wurden größtenteils abgeschöpft. Falls
  es noch weiteren Bedarf gibt, haben wir noch sehr viel in unserer Erdölreserve und
  könnten hier auch weiter zur Verfügung stehen. Diese Problematik steht momentan
  aber nicht an. derzeit ist die Versorgung also gesichert. Herr Hinterseher, haben
  Sie die völkerrechtliche Bewertung des Maduro-Kidnappings vom 3. Januar 2026 und
  des Angriffskriegs der USA und Israel auf Iran dabei? Ich habe Ihnen hier heute
  keinen neuen Stand mitzuteilen. Wann können wir mit beiden Bewertungen rechnen?
  Ich habe gesagt, dass ich Ihnen heute keinen neuen Stand mitzuteilen habe. Ich habe
  den Ausführungen, die wir hier in der Vergangenheit schon sehr oft hatten ‑ ich
  denke, das Thema wurde tatsächlich en détail besprochen ‑, auch nichts hinzuzufügen.
  Sollte sich daran etwas ändern, werden wir es Ihnen mitteilen. Ich habe eine Frage
  zu KNDS . Frau Ungrad, 40 Prozent, das wurde in Regierungskreisen als Beteiligungsziel
  genannt, hinter dem jetzt auch Ihr Haus als federführendes Ressort steht. Die Frage
  lautet: Ist das so? Werden Sie tatsächlich mit diesem Ziel verhandeln? Welche Signale
  gibt es von den deutschen Eigentümerfamilien, die Aktien tatsächlich auch in diesem
  Umfang abzutreten, so sie denn im Laufe des Sommers an der Börse ausgegeben werden?
  Der Koalitionsvertrag legt fest, dass eine Beteiligung an Schlüsselunternehmen der
  Sicherheits- und Verteidigungsindustrie von strategischer Bedeutung ist. Die deutschen
  Anteilseigner von KNDS wollen ihre Beteiligung verkaufen. Das Unternehmen soll dafür
  unter anderem noch in diesem Jahr an die Börse gebracht werden, wie Sie wissen.
  KNDS hat für die deutschen Sicherheitsinteressen eine große Bedeutung. Zum Schutz
  der verteidigungsindustriellen Schlüsseltechnologien im Bau gepanzerter Fahrzeuge
  strebt die Bundesregierung eine Beteiligung von 40 Prozent am Unternehmen an. Das
  entspricht ungefähr der Beteiligung des französischen Staats nach einem Börsengang.
  Wir wollen ja auf Augenhöhe mit Frankreich gehen. Wir befinden uns derzeit in Verhandlungen
  mit dem Unternehmen, also mit der Wegmann-Holding, und natürlich auch mit dem französischen
  Staat. Aber weil die Verhandlungen laufen, kann ich Ihnen dazu jetzt keine Details
  nennen. Okay, aber ein Detail dazu, wie es abgewickelt werden soll, ist ja schon
  bekannt, nämlich über die KfW. Dazu ist die Frage: Ist das im Etat der KfW bereits
  dargestellt? Wird es dafür Mittel aus dem Bundeshaushalt geben? Wie wird dieser
  Milliardenbetrag, der durch diese Transaktion ganz sicher auf den Bund zukommen
  wird, etatisiert? Was ein 40-Prozent-Paket dann monetär bedeutet, hängt natürlich
  davon ab, wie dann der Börsenkurs ist, wenn der Börsengang tatsächlich auch vollzogen
  wird; aber klar ist ja, dass es auf mehrere Milliarden Euro hinauslaufen wird. Wir
  befinden uns jetzt erst einmal in den Verhandlungen mit der WEGMANN-Gruppe. Sie
  müssen auch erst einmal beendet sein, damit wirklich die Beteiligung stattfindet.
  Dann können wir uns auch gern zu weiteren Punkten äußern. Aber erst einmal muss
  diese Verhandlung abgeschlossen werden. Darüber hinaus kann ich ‑ es tut mir leid ‑
  nicht spekulieren. Werden denn Gewinne direkt als Einnahmen in den Bundeshaushalt
  einfließen, wenn die Beteiligung realisiert wird, oder was geschieht mit ihnen?
  Auch das gehört zu den Details, zu denen ich mich jetzt nicht äußern kann, weil
  erst einmal überhaupt diese 40 Prozent zustande kommen müssen. Ja, aber auf der
  Grundlage bisheriger Staatsbeteiligungen muss es dazu ja eine Systematik geben.
  Vielleicht könnten Sie auf dieser Grundlage antworten. Ich kann mich zu Spekulationen,
  wie es dann genau ausgestaltet wird, jetzt nicht äußern und bitte um Verständnis
  und um noch etwas Geduld.'
