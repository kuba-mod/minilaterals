date: '2026-05-05'
type: press_release
source_name: german_chancellery
title: Pressekonferenz von Kanzler Merz und Portugals Ministerpräsident Montenegro
  Klarer Kompass für Sicherheit und Wohlstand in Europa
text: 'Bundeskanzler Friedrich Merz empfing den portugiesischen Ministerpräsidenten
  Luís Montenegro im Bundeskanzleramt. Angesichts der instabilen Lage in der Straße
  von Hormus stehe Deutschland bereit, die Freiheit der Seewege auch militärisch zu
  sichern. Das sagte Bundeskanzler Friedrich Merz bei einer Pressekonferenz zum Besuch
  des portugiesischen Ministerpräsidenten Luís Montenegro in Berlin. Ein erstes Schiff
  sei bereits zur Vorstationierung ins östliche Mittelmeer unterwegs. Meine Damen
  und Herren, herzlich willkommen! Ich freue mich, dass ich heute am frühen Abend
  sehr herzlich im Kanzleramt in Berlin den Premierminister von Portugal, Luís Montenegro,
  willkommen heißen darf. Ich freue mich sehr, dass wir uns heute Abend in Berlin
  sehen. Wir sind ja, durch das Alphabet bestimmt, Sitznachbarn bei den Meetings des
  Europäischen Rates und insofern bei den Treffen des Europäischen Rates jetzt schon
  einige Male ganz eng beieinander gewesen. Vor wenigen Tagen hat Portugal den Jahrestag
  der sogenannten Nelkenrevolution und das 50. Jubiläum der ersten freien demokratischen
  Parlamentswahlen gefeiert. Ich möchte herzlich zu diesem Jubiläum gratulieren. In
  diesen 50 Jahren sind unsere Länder, sind Deutschland und Portugal enge Partner
  und Verbündete geworden, gute Freunde in der Europäischen Union, in der NATO und
  auch in unserem bilateralen Verhältnis. Wir werden heute vor allem über eine Stärkung
  unserer wirtschaftlichen Zusammenarbeit sprechen. Die Voraussetzungen dafür sind
  sehr gut. Deutschland ist für Portugal der zweitgrößte Handelspartner, und umgekehrt
  sind zahlreiche deutsche Unternehmen heute schon in Portugal sehr erfolgreich aktiv.
  Insbesondere unsere IT -Expertise ist in Portugal sehr nachgefragt. Dazu stehen
  auch unsere beiden Minister für Digitalisierung und Staatsmodernisierung in einem
  engen Austausch, und sie arbeiten an sehr konkreten Projekten zur weiteren Digitalisierung
  unserer Gesellschaften. Zweitens. Portugal wächst im Bereich der Luftfahrt. Es ist
  kein Geheimnis: Ich sehe große Chancen für beide Seiten, zum Beispiel auch durch
  eine Zusammenarbeit der Lufthansa und der portugiesischen Airline TAP. Wir können
  schließlich im Bereich der Verteidigung enger zusammenwachsen. Eine Entscheidung
  zur Beschaffung des Boxer-Systems, die in Portugal zurzeit erwogen wird, würde die
  Verzahnung unserer Streitkräfte weiter erhöhen und verbessern. Wir arbeiten schließlich
  auf der europäischen Ebene eng zusammen, wenn es um Wettbewerbsfähigkeit und Verteidigung
  geht. Das ist auch unsere gemeinsame Richtschnur für den zukünftigen Mehrjähriger
  Finanzrahmen, über den wir ja intensiv in der Europäischen Union diskutieren. Wir
  beide teilen die Überzeugung, dass die Europäische Union ambitionierte Handelsabkommen
  benötigt, wie wir sie zum Beispiel mit MERCOSUR , gerade vor wenigen Tagen in Kraft
  getreten, aber auch mit Indien, Indonesien und mit einigen anderen Ländern verhandeln.
  Wir sprechen heute natürlich auch über die Lage in der Straße von Hormus. Mit der
  Seefahrernation Portugal teilen wir das Bewusstsein für die Bedeutung freier und
  sicherer Seewege. Die iranische Blockade dieses Seeweges, der Straße von Hormus,
  schadet unserer Wirtschaft, sowohl in Portugal als auch in Deutschland. Wir setzen
  uns deshalb gemeinsam dafür ein, die Freiheit der Seewege so schnell wie möglich
  wiederherzustellen, und wenn die entsprechenden Voraussetzungen gegeben sind ‑ das
  wissen Sie ‑, dann steht Deutschland bereit, sich auch militärisch für die dauerhafte
  Aufrechterhaltung der Freiheit der Seewege einzusetzen. Dazu ist ein erstes deutsches
  Schiff bereits in das östliche Mittelmeer unterwegs, wo es vorstationiert wird.
  Ich habe im Übrigen auch vor dem Europäischen Rat vor zehn Tagen dafür geworben,
  den Sanktionsdruck auf Teheran zu erhöhen, wenn die Straße von Hormus weiter blockiert
  bleibt. Unsere gemeinsame Botschaft lautet: Der Iran muss an den Verhandlungstisch
  kommen. Er muss aufhören, auf Zeit zu spielen. Er darf nicht länger die Region und
  die ganze Welt zur Geisel nehmen. Das militärische Nuklearprogramm muss endgültig
  und für immer beendet werden, und es darf auch keine weiteren Schläge gegen Israel
  und unsere Partner in der Region geben. – Die jüngsten Angriffe gegen zivile Infrastruktur
  in den Vereinigten Arabischen Emiraten habe ich in der letzten Nacht schon auf das
  Schärfste verurteilt. Auch über die Bedrohung durch Russland werden Luís Montenegro
  und ich uns heute erneut austauschen. Die Unterstützung der Ukraine gegen den russischen
  Angriffskrieg bleibt eine höchste Priorität. Ich will die Gelegenheit auch gerne
  nutzen, Portugal ausdrücklich für das Engagement in der NATO zu danken. Portugal
  bekennt sich zum 5-Prozent-Ziel. Portugal sichert mit uns die Ostflanke und hilft
  bei der Ausbildung ukrainischer Soldaten auch in Deutschland. Das ist Solidarität
  im Bündnis. Dafür, lieber Luís, sehr herzlichen Dank. Wir sind uns im Übrigen einig:
  Eine starke, einige NATO ist gut für Europa und für die Vereinigten Staaten von
  Amerika. In diesen unruhigen Zeiten folgt Deutschland deshalb einem klaren transatlantischen
  Kompass. Wir erfüllen die Verabredungen des Haager Gipfels schnell und entschieden.
  Das tun wir nicht nur in unserem Interesse, sondern im gemeinsamen Interesse und
  auch aus tiefster Überzeugung. Darauf können sich unsere Verbündeten verlassen,
  diesseits und jenseits des Atlantiks. In diesem Sinne noch einmal, lieber Luís,
  herzlich willkommen in Berlin! Ich freue mich sehr auf unseren Austausch und auf
  unser Gespräch. Ich wünsche Ihnen allen einen guten Abend! Zunächst möchte ich mich
  für die Worte und für die Willkommensworte von Friedrich Merz bedanken. Der ist
  mein Sitznachbar, wie er bereits gesagt hatte, beim Europäischen Rat. Ich möchte
  mich bei der Gelegenheit auch für die Worte, die Sie an Portugal gerichtet haben,
  bedanken. Im letzten Monat, im April, hatten wir die Feierlichkeiten, mit denen
  wir also die 52 Jahre der Nelkenrevolution und die 50 Jahre der Wahlen, der Bildung
  des ersten demokratischen Parlaments in unserem Land und eben auch des Inkrafttretens
  unserer Verfassung begangen haben. Ich möchte das unterstreichen, was der Herr Bundeskanzler
  Merz gesagt hat. Unser Treffen heute hier in Berlin hat zwei wichtige Ziele, und
  zwar zum einen, unseren politischen Dialog in allen Bereichen zu stärken, auf bilateraler
  Ebene, aber auch auf europäischer Ebene, auf multilateraler Ebene und in allen Organisationen,
  zu denen wir gehören und in denen wir eben auch aktiv engagiert sind. Das ist auch
  eine Gelegenheit für uns, unsere schon sehr guten wirtschaftlichen Beziehungen weiter
  zu vertiefen. Das ist die größte Volkswirtschaft Europas auf der einen Seite und
  auf der anderen Seite diejenige, die von einigen Zeitschriften zur Volkswirtschaft
  des Jahres 2025 gekürt wurde. Deswegen will ich noch einmal daran erinnern, dass
  wir dieses Potenzial heben und unsere Kapazitäten zur Schaffung von Reichtum zugunsten
  unserer Bevölkerungen weiterentwickeln. Herr Bundeskanzler Friedrich Merz hat bereits
  gesagt, wie wichtig Deutschland in der wirtschaftlichen Dynamik Portugals ist. Bei
  ausländischen Direktinvestitionen ist Deutschland an vorderster Front in unserem
  Land und auch, was die Anerkennung unserer Fähigkeiten und die Faktoren unserer
  Wettbewerbsfähigkeit betrifft, seien es unsere qualifizierten Arbeitskräfte, sei
  es unsere Fähigkeit, Energie zu wettbewerbsfähigen Preisen zu erzeugen, oder auch
  die Anerkennung einer Agenda der Reformen der letzten Jahre in Portugal. Denn das
  ist die Grundlage für unseren Handelsaustausch, und das führt letztendlich dazu,
  dass Deutschland einer der wichtigsten Handelspartner Portugals ist. Last, not least
  sind natürlich auch sehr viele Portugiesen hier in Deutschland zu Hause. Im Moment
  sind es circa 140.000. Inzwischen leben auch sehr viele Deutsche in Portugal. Es
  sind bereits in etwa 25.000, die sich dort niedergelassen haben. Darüber hinaus
  gibt es natürlich auch die Touristen, die uns Jahr für Jahr besuchen und unser Angebot
  in der Gastronomie, bezüglich der Monumente und von Meer, Sonne und gutem Wetter
  genießen können, sodass sie nach einem arbeitsreichen Jahr eine schöne Zeit bei
  uns im Land verleben. Deutschland ist der zweitgrößte Lieferant für Waren und Dienstleistungen
  und der drittwichtigste Abnehmer. Wir wissen, dass viele deutsche Unternehmen heute
  eine sehr wichtige Rolle in unserer Wirtschaft spielen, immer mehr auch im Bereich
  der neuen Technologien und bei der Anpassung an neue Herausforderungen. Diesbezüglich
  möchte ich sagen, dass unsere Exporte im Technologiebereich 2025 im Vergleich zum
  Vorjahr um 150 Prozent angestiegen sind. Das zeigt auch, wie eng unsere wirtschaftlichen
  Beziehungen sind und wie immer enger sie werden, und zwar sowohl zugunsten unserer
  Länder als auch der Europäischen Union. Unsere Wettbewerbsfähigkeit im Bereich der
  Technologie ist eine Stärkung unseres europäischen Beitrags. Es ist eine Partnerschaft,
  die wir für die Zukunft weiterentwickeln wollen mit mehr Produktivität, mehr Investitionen,
  auch mit einer gemeinsamen Agenda. Vereinfachung, Bürokratieabbau, das ist eigentlich
  ein Markenzeichen Deutschlands, aber auch der portugiesischen Regierung. Das ist
  auch etwas, was wir meistens gemeinsam in die Sitzungen des Europäischen Rates tragen,
  sodass wir das auch in Europa weiterverbreiten, dass wir also die Bürokratie vereinfachen
  und den Staat agiler gestalten in der Beziehung zwischen den Bürgern und den Unternehmen
  auf der einen Seite und der öffentlichen Verwaltung auf der anderen Seite. Darüber
  hinaus möchte ich sagen: Viel von dem, was Bundeskanzler Merz bezüglich der Vertiefung
  unserer strategischen Autonomie und der Umsetzung des Prinzips einer immer größeren
  Diversität bei unseren Handelspartnern gesagt hat, teile ich. Wir beide treten für
  die Umsetzung der Abkommen ein, die die Europäische Union mit anderen Regionen schließt,
  insbesondere mit MERCOSUR . Dieses Abkommen wurde 25 Jahre lang ausgehandelt. Am
  1. Mai ist es vorläufig in Kraft getreten. Wir wollen, dass es sehr schnell bestätigt
  wird und permanent Grundlage der Beziehung zwischen unserer Region und der anderen
  Region ist. Gleichzeitig geht es aber auch um Indien, Indonesien und andere Regionen,
  auch am Persischen Golf, was hier gesagt wurde. Das ist sehr wichtig. Das ist auch
  wichtig für die Entwicklung unseres Binnenmarktes und eine so homogene Entwicklung
  unserer Europäischen Union wie möglich, sodass alle Zugang zu dieser Entwicklung
  haben. Ein letzter Kommentar noch: Ich schließe mich Ihren Worten bezüglich der
  internationalen Situation an. Auf dieser Ebene, auf der multilateralen Ebene, unterstützen
  wir die Ukraine militärisch, politisch und auch finanziell. Das ist natürlich prioritär
  für die Zukunft Europas und die Wahrung der Rechte der Europäer, damit sich Europa
  auch wirtschaftlich weiterentwickeln kann. Das heißt, obwohl momentan auch andere
  Regionen in den Nachrichten aufscheinen, dürfen wir nicht vergessen, dass die Ukraine
  wirklich eine ganz prioritäre Angelegenheit ist. Dann möchte ich noch sagen, dass
  auch die Bedeutung der NATO und der Stärkung der europäischen Säule der NATO nicht
  unterschätzt werden dürfen. Daran arbeiten wir mit. Wir beteiligen uns an Missionen
  der NATO . Herr Bundeskanzler Merz hat es gesagt, und ich möchte es unterstreichen:
  Portugal hat in der Vergangenheit das Erreichen des Zweiprozentziels bei den Verteidigungsausgaben
  um vier Jahre vorgezogen. Wir haben das in sechs oder sieben Monaten geschafft.
  Das war eine zusätzliche Anstrengung bei der Mobilisierung von Ressourcen, die wir
  geleistet haben. Aber natürlich war das die Umsetzung des Bekenntnisses, das wir
  bei der NATO abgegeben haben; wir sind also konsequent bei der Erfüllung unserer
  Rolle. Wir arbeiten eng zusammen mit anderen Partnern in der NATO , aber auch in
  anderen Foren, die vielleicht europäische Länder mit einbeziehen, aber nicht Mitglieder
  der Europäischen Union sind, also im Rahmen der NATO , aber auch der Vereinten Nationen.
  Abschließend noch in Bezug auf eine große Sorge heute, und zwar die Situation im
  Nahen Osten und die Befahrbarkeit der Straße von Hormus: Wir treten dafür ein –
  und setzen das auch um –, dass der diplomatische Weg geachtet und noch verstärkt
  werden muss. Die Konflikte kann man nicht durch Faktoren der Division, der Spaltung
  lösen. Es geht vielmehr um die Fähigkeit, einen Dialog zwischen den beiden Parteien
  zu führen. Wir müssen jene, die einen Fehler begehen, davon überzeugen, dass sie
  einen Fehler begehen und ihre Entscheidungen vielleicht überdenken sollten. Das,
  was Iran tut, ist inakzeptabel, und zwar zum einen in Bezug auf die Bestrebung der
  Erlangung atomarer Fähigkeiten und zum anderen mit Blick auf die Auswirkungen auf
  den internationalen Handel und die Befahrbarkeit der Straße von Hormus, aber auch
  mit Blick auf die nicht nachvollziehbaren Angriffe auf andere Länder der Region.
  Deswegen möchte ich noch einmal unterstreichen, was der Herr Bundeskanzler gesagt
  hat, nämlich dass wir die Gelegenheit nutzen werden, diese Fragen weiter zu vertiefen
  und unseren Beitrag für die Erreichung von Frieden, zur Gewährleistung normaler
  Handelsbeziehungen sowie zur Vermeidung einer Zuspitzung dieser Konflikte zu leisten.
  Frage: Herr Premierminister, Herr Bundeskanzler, ich möchte eine Frage an Sie beide
  stellen: Soll Europa einfach weiter die Drohungen aus den USA bezüglich der Erhöhung
  der Zolltarife zur Kenntnis nehmen, oder sollte vielleicht etwas stärker darauf
  geantwortet werden? Premierminister Montenegro: Ich denke, dass Europa die Position,
  die ich gerade angesprochen habe, unterstreichen sollte: die Kraft der Argumente
  im Rahmen eines Dialogs bzw. von Verhandlungen und die Umsetzung dessen, was vereinbart
  wurde. Europa muss schnell und konsequent sein bei der Umsetzung des Handelsabkommens
  mit den USA . Wir alle müssen diese Verantwortung übernehmen: unsere Seite, aber
  auch die USA . Was unsere Zusammenarbeit innerhalb der NATO betrifft, so muss jeder
  die Verantwortung übernehmen, die sich aus dem Nordatlantikpaktvertrag und aus den
  Verpflichtungen ergibt, die wir gegenseitig eingegangen sind. Diese Position verfolgt
  Portugal, und das ist auch die Position, von der wir hoffen, dass sie letztendlich
  auch von unseren Partnern umgesetzt wird. Bundeskanzler Merz: Ich teile die Einschätzung
  des Kollegen Montenegro. Es wird ja morgen in Brüssel weitere Verhandlungen und
  Gespräche geben. Es wäre gut, wenn wir jetzt schnell zu einem Abkommen auf der Basis
  der Vereinbarung von Turnberry aus dem letzten Jahr kommen. Wir brauchen vor allen
  Dingen für die Exportwirtschaft Planungssicherheit. Diese lang andauernde Unsicherheit
  schadet beiden Seiten des Atlantiks, schadet der Wirtschaft in den USA genauso wie
  der Wirtschaft in Europa. Deswegen würde ich es sehr begrüßen, wenn jetzt schnellstmöglich
  auf der Basis der Verabredungen des letzten Jahres auch hier zu einer verbindlichen
  handelspolitischen Vereinbarung auf beiden Seiten die Hand gereicht wird und wir
  hier zu einem Abschluss kommen. Frage: Herr Bundeskanzler, ich würde da gerne anknüpfen:
  Zu dem geplanten US -Truppenabzug werden jetzt immer mehr Einzelheiten bekannt.
  Es soll sich um eine Kampfbrigade in Vilseck handeln, und die Mittelstreckenwaffen
  sollen auch nicht in Deutschland stationiert werden. Werden Sie versuchen, da noch
  einmal zu intervenieren und mit Präsident Trump das Gespräch zu suchen, um da vielleicht
  noch Änderungen herbeizuführen? Da die Bundesregierung morgen ein Jahr alt wird:
  Wie werden Sie das morgen in der Kabinettssitzung begehen und was wünschen Sie sich
  zu diesem ersten Geburtstag? Bundeskanzler Merz: Wir werden morgen eine ganz normale
  Kabinettssitzung haben, mit einer ganzen Reihe von Themen, die wir morgen auch entscheiden.
  Ich werde zu Beginn der Kabinettssitzung ein paar kollegiale Worte sagen, mich für
  die Zusammenarbeit der letzten zwölf Monate bedanken und auf die nächsten 36 Monate
  schauen, in denen wir noch viel Arbeit vor uns haben. Wir sprechen mit den Amerikanern
  schon seit vielen Wochen. Wir haben auch eine intensive Diskussion begonnen, nachdem
  die Vereinigten Staaten von Amerika ihre neue nationale Sicherheitsstrategie verabschiedet
  haben. Darin sind auch Truppenreduzierungen und neue Prioritäten für die amerikanische
  Seite vorgesehen. Es geht im Grunde genommen um die transatlantische Sicherheit
  von beiden, sowohl der europäischen als auch der amerikanischen NATO -Partner. Hier
  spielt auch Kanada eine wichtige Rolle. Wir haben ein gemeinsames Interesse daran,
  dass wir den transatlantischen Raum weiter schützen. Ich denke einmal, auf dieser
  Basis werden wir auch zu guten Ergebnissen kommen.'
