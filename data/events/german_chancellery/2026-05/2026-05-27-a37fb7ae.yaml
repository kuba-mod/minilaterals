title: 'Bundeskabinett beschließt Investitionsverpflichtung für Mediendienste – Staatsminister
  Weimer: „Filmbooster startet jetzt mit 250 Millionen Euro durch“'
text: 'Die Bundesregierung hat heute den Gesetzentwurf von Staatsminister Wolfram
  Weimer für eine Investitionsverpflichtung für Streamingdienste und Sender beschlossen.
  Demnach müssen sie künftig mindestens 8 Prozent ihres Jahresumsatzes in den Filmstandort
  Deutschland investieren. Hinzu kommen Subquoten für deutschsprachige Inhalte, unabhängige
  Produzenten und die Herstellung neuer Werke sowie Vorgaben für eine faire Rechteteilung
  mit unabhängigen Produzenten. Mit dem heutigen Beschluss stehen nun auch die im
  vergangenen Jahr verdoppelten Filmfördermittel des Bundes in Höhe von 250 Millionen
  Euro pro Jahr zu Verfügung. Zusammen mit den Mitteln der jurybasierten kulturellen
  Filmförderung und der Filmförderungsanstalt stellt der Bund ab sofort jährlich mehr
  als 300 Millionen Euro für Filmproduktionen bereit. Hinzu kommen die Länderförderungen.
  Der Staatsminister für Kultur und Medien, Wolfram Weimer: „Mit dem heutigen Kabinettsbeschluss
  zünden wir für den deutschen Film eine neue Stufe im internationalen Standortwettbewerb.
  Wir haben über Parteigrenzen hinweg entschieden, mit dem Filmbooster so viel Geld
  in die heimische Filmbranche zu geben, wie nie zuvor. Zugleich nehmen wir die Streaminganbieter
  und Sender deutlich in die Pflicht, geben ihnen über die Öffnungsklausel aber auch
  Spielraum. Damit kann die gesamte Filmwirtschaft nun erstmals wirklich verlässlich
  über Jahre hinaus planen. Nun ist es an der Branche, diese Chance zu nutzen, um
  Filmhits ‚made in Germany‘ in Serie zu produzieren.“ Bundesfinanzminister Lars Klingbeil:
  „Deutschland hat eine großartige Filmszene. Diesen Filmstandort und seine Vielfalt
  stärken wir weiter. Unser Ziel ist, dass mehr Aufträge nach Deutschland und Europa
  gehen. Wir wollen, dass europäische Inhalte gestreamt werden. Und wir fördern die
  Arbeit unabhängiger Produzentinnen und Produzenten. Dafür verbessern wir die Rahmenbedingungen
  für die deutsche und europäische Filmbranche – mit verdoppelter Filmförderung und
  mit dem Investitionspakt. Wer am deutschen und europäischen Filmmarkt gute Geschäfte
  macht, der muss hier auch seinen Beitrag leisten.“ Neben der Basisinvestitionsquote
  von 8 Prozent setzt das Mediendienste-Investitionsverpflichtungs-Gesetz (MedienInvestVG)
  zudem Anreize für weitergehende freiwillige Selbstverpflichtungen: Ab einer Investitionsquote
  von 12 Prozent oder mehr ist es den Medienunternehmen erlaubt, von bestimmten Detailvorgaben
  des Gesetzes abzuweichen. Ziel dieser Öffnungsklausel ist es, signifikante Aufträge
  für die deutsche Filmwirtschaft sicherzustellen, ohne unverhältnismäßig in die Geschäftsmodelle
  der Streamer und Sender einzugreifen. Die in der vergangenen Legislaturperiode angestoßene
  Filmförderreform basiert auf vier Säulen: dem reformierten Filmförderungsgesetz
  (FFG), der jurybasierten kulturellen Filmförderung, dem überjährigen Mittelaufwuchs
  des Bundes auf 250 Millionen Euro und der Investitionsverpflichtung für Mediendienste-Anbieter.'
