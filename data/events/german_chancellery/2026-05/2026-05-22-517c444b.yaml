title: 127,5 Millionen Euro für das Nürnberger Zeppelinfeld und die Kongresshalle
text: 'Im Rahmen eines gemeinsamen Pressetermins haben Dr. Wolfram Weimer, Staatsminister
  für Kultur und Medien, Dr. Markus Söder, Ministerpräsident des Freistaates Bayern,
  Markus Blume, Bayerischer Staatsminister für Wissenschaft und Kunst heute symbolische
  Förderbescheide in Höhe von 127,5 Millionen Euro an den Oberbürgermeister der Stadt
  Nürnberg, Marcus König, übergeben. Aus dem Bundeskulturetat werden insgesamt 90,6
  Millionen Euro im Rahmen des parlamentarisch initiierten Förderverfahrens KulturInvest
  zur Verfügung gestellt. Der Freistaat Bayern stellt rund 37 Millionen Euro zur Verfügung.
  Mit den Mitteln sollen der Erhalt der historischen Bausubstanz und die kulturelle
  Nutzung der Kongresshalle sowie die Weiterentwicklung der Zeppelintribüne und des
  Zeppelinfelds als Lern- und Begegnungsort ermöglicht werden. Der Zeugniswert dieser
  Bauten wird erhalten bleiben, um unmittelbar am historischen Ort über ihre Entstehung
  und Nutzung während der NS-Zeit sowie über den Umgang bis in die Gegenwart zu informieren.
  Kulturstaatsminister Weimer sagte im Vorfeld: „Wo einst Ausgrenzung und Gleichschaltung
  geplant waren, entstehen nun Räume für freie Kunst, kritisches Denken und demokratischen
  Dialog. Denn wir brauchen Orte, die uns zusammenbringen: Orte, an denen Geschichte
  sichtbar bleibt, an denen Menschen gemeinsam Kultur erleben. Orte, die Verbindung
  schaffen. Kulturbauten sind deshalb mehr als Architektur: Sie sind ein wichtiger
  Teil des gesellschaftlichen Miteinanders und die Bausteine unserer kulturellen Identität.
  Unsere Botschaft ist klar: Geschichte wird hier nicht überdeckt oder verdrängt,
  sondern sichtbar gemacht. Dafür gebührt nicht zuletzt dem Deutschen Bundestag großer
  Dank, der regelmäßig Gelder für Investitionen in Kulturbauten im ganzen Land bereitstellt.“
  Bereits seit Jahrzehnten setzt sich die Stadt Nürnberg intensiv mit der nationalsozialistischen
  Vergangenheit auseinander. Eine wichtige Rolle für die Geschichtsvermittlung und
  Demokratiebildung spielt hierbei das ehemalige Reichsparteigelände. Die geplanten
  Bauvorhaben sowie die künftige Nutzung der Kongresshalle für Kunst und Kultur sind
  Meilensteine auf dem erinnerungskulturellen Weg, den Nürnberg eingeschlagen hat.
  Marcus König, Oberbürgermeister der Stadt Nürnberg, sagt: „Nürnberg war Stadt der
  Reichsparteitage, und die baulichen Relikte des Nationalsozialismus sind steingewordene
  Inszenierungen der NS-Diktatur. Daraus erwächst für uns eine dauerhafte Verantwortung,
  sich diesem Erbe zu stellen. Dort, wo Nationalsozialisten Macht demonstrieren wollten,
  schaffen wir heute auf dem ehemaligen Reichsparteitagsgelände Räume für Freiheit,
  Bildung, Kunst und kritischen Dialog. Wir sind dankbar, dass der Bund und der Freistaat
  Bayern uns dabei unterstützen. Die finanzielle Förderung ist ein klares Signal:
  Die Auseinandersetzung mit der Geschichte ist keine lokale Aufgabe, sondern eine
  gesamtgesellschaftliche Verpflichtung von nationaler Bedeutung.“ Ministerpräsident
  Dr. Markus Söder: „Ein wichtiges Zeichen gegen das Vergessen: Das Reichsparteitagsgelände
  in Nürnberg steht wie kaum ein anderer Ort in Deutschland für die architektonisch
  inszenierte Macht des Nationalsozialismus und das dunkelste Kapitel unserer Geschichte.
  Gerade deshalb tragen wir Verantwortung: Für das Erinnern, Erklären und Widersprechen.
  Denn Demokratie ist nicht selbstverständlich. Hass und Propaganda zeigen auch in
  unserer Gegenwart, wie fragil Freiheit sein kann. Bund und Freistaat stehen zu ihrer
  Verantwortung für den Erhalt dieses historischen Ortes. Insgesamt investieren wir
  zusammen rund 128 Millionen Euro. Für die Sanierung der Zeppelintribüne, des Zeppelinfelds
  und des Bahnhofs Dutzendteich war es uns besonders wichtig, dass sich der Bund mit
  50 Prozent beteiligt. Damit übernehmen Bund und Freistaat gemeinsam 75 Prozent der
  förderfähigen Kosten. Unser Auftrag ist klar: Wir dürfen die Geschichte niemals
  vergessen. Wer erinnert, schützt Demokratie.“ Kongresshalle als Ort des Gedenkens
  und Weiterdenkens Die Kongresshalle ist eine der größten baulichen Hinterlassenschaften
  aus der NS-Zeit. In dem Monumentalbau sollte während der Reichsparteitage der sogenannte
  Parteikongress der NSDAP stattfinden. Mit Kriegsbeginn 1939 wurden die Bauarbeiten
  fast komplett eingestellt – zurück blieb ein unvollendeter Rohbau mit zwei Kopfbauten
  und einem offenen Innenhof, der das Halleninnere gebildet hätte. Nach der Sanierung
  soll die Kongresshalle mit neuem inhaltlichem Konzept zu einem Ort des Gedenkens
  und Weiterdenkens entwickelt werden. Kunst- und Wissenschaftsminister Markus Blume:
  „Bund, Land und Kommune setzen den nächsten Meilenstein für eines der wichtigsten
  Kultur- und Erinnerungsprojekte der Nachkriegsgeschichte: Das ehemalige Reichsparteitagsgelände
  entwickelt sich Schritt für Schritt zu einem Ort des Erinnerns, des Weiterdenkens
  und des Miteinanders. Bis heute liegt über diesem historischen Ort ein Geist der
  Ungeheuerlichkeit. Nürnberg setzt dieser historischen Wucht bewusst die freiheitlich-demokratische
  Kraft von Kunst und Kultur entgegen. Die Kongresshalle birgt ein einzigartiges Potential,
  neue Wege der Erinnerungskultur zu eröffnen. Ich danke der Stadt Nürnberg für Ihren
  Mut, innovative Wege zu gehen und auf die verbindende Kraft von Kunst und Kultur
  zu bauen – als Ausdruck einer lebendigen, offenen und demokratischen Erinnerungskultur.“
  Die in der Kongresshalle geplanten „Ermöglichungsräume“ schaffen auf über 7 000
  Quadratmeter gemeinsam mit der neuen Spielstätte des Staatstheaters die Basis für
  die künstlerische Arbeit in der Kongresshalle. BKM unterstützt die künftige kulturelle
  Nutzung der Kongresshalle und fördert die grundsätzliche Nutzbarmachung und den
  Substanzerhalt mit 29,5 Millionen Euro der insgesamt 59 Millionen Euro. 14,75 Millionen
  Euro trägt das Bayerische Staatsministerium für Wissenschaft und Kunst. Die Stadt
  Nürnberg und der Freistaat Bayern beteiligen sich je mit einem Viertel der Kosten.
  Für die Schaffung der „Ermöglichungsräume“ stellt BKM weitere 20 Millionen Euro
  der Gesamtkosten von 44 Millionen Euro zur Verfügung. Aus dem Kulturfonds Bayern
  werden diese Flächen mit einer Million Euro unterstützt. Dieser Betrag wurde zudem
  von der CSU-Fraktion im Bayerischen Landtag um 675.000 Euro aus den Mitteln der
  Fraktionsinitiativen aufgestockt. Lern- und Begegnungsort Zeppelintribüne und Zeppelinfeld
  mit Bahnhof Dutzendteich Auf dem Reichsparteitagsgelände in Nürnberg sind das Zeppelinfeld
  und die Zeppelintribüne die einzigen Bauten, die in der NS-Zeit fertiggestellt,
  genutzt und heute noch im Wesentlichen erhalten sind. Die Weiterentwicklung zum
  Lern- und Begegnungsort des Zeppelinfeldes und der Tribüne umfasst mehrere Maßnahmen:
  Die bauliche Sicherung gewährleistet, dass die Zeppelintribüne einschließlich des
  „Goldenen Saales“ im Innern und die Wallanlage auf dem Zeppelinfeld erhalten bleiben
  und als begehbare Exponate fungieren können. Im Mittelbau der Tribüne wird eine
  Ausstellung eingerichtet. Der ehemalige Bahnhof Dutzendteich wird als Ankunfts-
  und Informationsort erschlossen. Jährlich besuchen über eine Millionen Interessierte
  das ehemalige Reichsparteitagsgelände. Die Fertigstellung des Projekts ist für das
  Jahr 2030 geplant. Die Gesamtkosten belaufen sich auf 88,3 Millionen Euro. BKM stellt
  hierfür 41,1 Millionen Euro zur Verfügung, aus dem Etat des Bayerischen Staatsministeriums
  für Unterricht und Kultus fließen 20,57 Millionen Euro in das Vorhaben. Die übrigen
  Kosten trägt die Stadt Nürnberg. Anna Stolz, Bayerische Staatsministerin für Unterricht
  und Kultus sagt: „Mit dem Zeppelinfeld, der Zeppelintribüne und dem Bahnhof Dutzendteich
  auf dem früheren Reichsparteitagsgelände der Nationalsozialisten hat die Stadt Nürnberg
  ein historisch schwer belastetes Erbe übernommen. Es ist mir ein besonderes Anliegen,
  dort Lern- und Begegnungsorte gegen das Vergessen und Verharmlosen zu schaffen.
  Wir haben die besondere Chance, die einstigen Propagandabauten in einen Ort der
  Begegnung und des Dialogs zu verwandeln. Wir wollen fundiertes Wissen vermitteln,
  Diskussionen ermöglichen und so Verständnis und Zusammenhalt in einer vielfältigen
  Gesellschaft stärken.“'
