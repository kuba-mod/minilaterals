  beenden wollten, und zwar auch hinsichtlich der Angriffe der Israelis auf den Libanon
  , der fast vernichtet wurde. Ich greife den Ball einmal auf. Ich habe jetzt vor
  allem „Libanon“ verstanden und kann gerne dazu sagen, dass wir die Entwicklung im
  Süden des Libanon mit großer Sorge beobachten, dass eine weitere Eskalation die
  Gefahr einer zusätzlichen Destabilisierung einer ohnehin schon fragilen Lage birgt
  und dass die vereinbarte Waffenruhe ein wichtiger Schritt hin zur Deeskalation war
  und ist und auch bleiben soll. Deswegen ist es notwendig, dass alle Konfliktparteien
  diese einhalten. Herr Schöneck, was sagt das BMZ zu der Kritik einiger Hilfsorganisationen,
  dass die Kürzung der Mittel der Entwicklungszusammenarbeit die Versorgung in der
  jetzigen Ebolalage in der Demokratischen Republik Kongo und der Region zusätzlich
  geschwächt haben könnte? Grundsätzlich ist es so, dass die Unterstützung ‑ sei es
  von der Bundesregierung oder auch von anderen internationalen Partnern ‑ bei der
  Prävention einen ganz entscheidenden Baustein beiträgt. Die Bundesregierung ist
  seit Langem sowohl im Kongo als auch in der Region aktiv, um dort Kapazitäten von
  Regierungen, von Kliniken, von Laboren auszubauen, um in entsprechenden Fällen,
  wie jetzt im Fall des Ebola-Ausbruchs, schnell aktiv werden zu können. Mit Blick
  auf die aktuelle Situation kommen viele Faktoren zusammen. Da mag ich keinen Schluss
  ziehen, was am Ende den Ausbruch tatsächlich befeuert hat oder mit dazu beigetragen
  hat. Klar ist aber, in die Zukunft geblickt, dass Einschnitte bei der Präventionsunterstützung
  entsprechende Auswirkungen haben werden. Deutschland bleibt hier aktiv und ein verlässlicher
  Partner, um gerade in diesem Bereich multilaterale, eng koordinierte internationale
  Unterstützung in der Region und in den konkret betroffenen Ländern weiter zu leisten.
  Die Ministerin hatte letzte Woche angekündigt hatte, über 500 Schutzanzüge für medizinisches
  Personal zu liefern und auch einen Schulungsmarathon bei der Schnell Einsetzbaren
  Expertengruppe Gesundheit einzuleiten. Wie ist denn der aktuelle Stand? Geht das
  noch darüber hinaus? Denn die Zahlen steigen ja. Wir sind vor Ort eng darüber im
  Austausch, welche Bedarfe bestehen und welche Unterstützung noch konkret geleistet
  werden kann. Die schnelle Einsatzgruppe bereitet sich auf einen Einsatz vor, und
  diese schnelle Unterstützung konnte eben über die bereits ausgebildeten lokalen
  Fachkräfte und über die von Deutschland bereits in die Prävention gesteckten Mittel
  erreicht werden. Lokale Fachkräfte wurden ausgebildet, auch von der schnellen Einsatzgruppe,
  um dann eben schnell reagieren zu können. Das ist ein wichtiges Instrument. Die
  Einsatzgruppe bereitet sich jetzt auch selbst auf einen konkreten Einsatz vor. Wie
  bereits gesagt, sind wir eng darüber im Austausch, welche Unterstützung konkret
  noch gebraucht wird und was wir dazu beitragen können. Herr Schöneck, Sie haben
  mehrfach gesagt, Deutschland bleibe da aktiv. Können Sie einmal sagen, wie sich
  die Haushaltsmittel für diesen Bereich in den letzten fünf Jahren entwickelt haben?
  Wie viel haben wir ausgegeben? Ist das gestiegen, ist das runtergegangen? Wie schaut
  das konkret aus? Ich kann Ihnen da keine konkreten Zahlen nennen. Relevant ist allerdings ‑
  und das meine ich mit der Verlässlichkeit, die Deutschland hier auch für die internationale
  Gemeinschaft mit beiträgt ‑, dass wir dieses Thema und die enge Koordinierung dazu
  weiter vorantreiben, um hier unabhängig von gesunkenen Haushaltsmitteln weiter verlässlich
  relevante Unterstützung zu leisten. Deutschland ist führender internationaler Unterstützer
  von Impfinitiativen und von multilateralen Initiativen zur Gesundheitsvorsorge.
  Wir haben hierbei in diesem und im vergangenen Jahr noch einmal erneut massiv Beiträge
  geleistet, die auch für die kommenden Jahre ein sicheres Weiterarbeiten ermöglichen.
  Das sind Beiträge, die für die nächsten vier, fünf Jahre zugesichert wurden und
  so auch für die Organisationen und für die Initiativen Sicherheit schaffen, hier
  weiter aktiv bleiben zu können. Aber Sie müssen diese Mittel doch benennen können.
  Die sind ja im Haushalt Ihres Hauses festgeschrieben. Vielleicht können Sie das
  nachtragen? Das Präventionsengagement ist kein einzelner Haushaltstitel, den wir
  so klar beziffern könnten. Die Prävention erfolgt über verschiedenstes Engagement,
  das wir in der Region, die jetzt betroffen ist, aber auch weltweit leisten. Das
  geht über bilaterale Zusammenarbeit unmittelbar mit staatlichen wie überregionalen
  Partnern ‑ zum Beispiel der East African Community, der EAC, mit der wir zusammenarbeiten ‑;
  das geht über multilaterale Initiativen, in die Deutschland Mittel investiert, um
  genau hier präventiv wirken zu können; das geht über kleinere NGO-Initiativen, die
  vor Ort aktiv sind. Insofern ist eine konkrete Bezifferung, was die Präventionsleistung
  angeht, in der Form nicht möglich. Natürlich lässt sich benennen, was wir in einzelne
  Initiativen hineingeben. Wenn Sie das interessiert, können wir da gegebenenfalls
  noch etwas nachreichen. Dazu würde ich dann bitten, dass Sie vielleicht konkrete
  Initiativen benennen. Ganz grundsätzlich ist es eben so, dass sich Prävention aus
  vielen verschiedenen Bausteinen zusammensetzt, bei denen wir engagiert sind, und
  nicht aus einem einzelnen Haushaltstitel. Herr Hille, die Landesmedienanstalten
  arbeiten derzeit unter dem Arbeitstitel „WeiterentwicklungPublic Value“ an Modellen,
  nach denen soziale Netzwerke verpflichtet werden sollen, Inhalte von Medien, die
  als staatlich verlässlich eingestuft werden, algorithmisch zu bevorzugen, inklusive
  einer Quotenregelung für solche Inhalte. Wie bewerten der Kanzler und sein Kulturstaatsminister
  diese Pläne vor dem Hintergrund der Pressefreiheit und des Gebots staatlicher Neutralität
  gegenüber Medienangeboten? Wie Sie sich vorstellen können, haben wir die Berichterstattung
  und die genannten Überlegungen der Landesmedienanstalten, die Sie gerade skizziert
  haben, zur Kenntnis genommen. Weil es darüber einiges Geraune gibt, möchte ich für
  die Bundesregierung noch einmal ganz klar sagen, dass die Presse- und Meinungsfreiheit
  in Deutschland natürlich ein ganz hohes Gut ist. Die freie und vielfältige Berichterstattung
  ist zentral für die demokratische Meinungsbildung, und selbstverständlich richtet
  sich die Bundesregierung danach und achtet diese freie und vielfältige Berichterstattung.
  Im Detail würde ich ‑ und da bitte ich um Verständnis ‑ etwaige Pläne von Landesmedienanstalten
  jetzt aber nicht weiter kommentieren; denn wie Sie dem Namen schon entnehmen können,
  sind Landesmedienanstalten keine Anstalten des Bundes. Natürlich fällt das erst
  einmal unter die Ländergesetzgebung, aber Sie wissen so gut wie ich, dass die Bundesregierung
  über Gremien und verschiedenste Abstimmungsprozesse durchaus Einfluss auf die medienpolitische
  Debatte hier im Land hat. Deswegen: Habe ich Sie da richtig verstanden, dass sich
  die Bundesregierung auf Bundesebene im Zweifel gegen diese skizzierte Reform stellen
  würde? Ich weiß nicht, woraus Sie diese Parenthese und diese Schlussfolgerung ziehen.
  Ich habe das gesagt, was ich gerade gesagt habe, und das sage ich sehr gerne noch
  einmal, weil es von großer Bedeutung ist: Natürlich ist für die Bundesregierung
  die Presse- und Meinungsfreiheit ein ganz hohes Gut, das es zu schützen und zu achten
  gilt. Das tut diese Bundesregierung. An das BMAS: In zehn Tagen trifft die Entgelttransparenzrichtlinie
  in Kraft und wird damit geltendes Recht. Die EU hat die Richtlinie vor drei Jahren
  beschlossen. Trotz dieser langen Vorlaufzeit gibt es noch kein Gesetz für die nationale
  Umsetzung ‑ meines Wissens gibt es bisher nicht einmal einen Entwurf. Dabei ist
  die Richtlinie auch hochrelevant für die meisten Arbeitgeber und für Millionen Arbeitnehmer.
  Was entgegnen Sie dem Vorwurf, dass die Bundesregierung im Umgang mit der Richtlinie
  politische Arbeitsverweigerung betreibe? Ich danke Ihnen herzlich für die ausführliche
  Einführung und würde für die Beantwortung an das Frauenministerium übergeben. Vielen
  Dank für die Überleitung und vielen Dank für die Frage. ‑ Grundsätzlich kann ich
  dazu sagen, dass wir uns in der Frühkoordinierung des Gesetzentwurfs befinden. Die
  EU-Entgelttransparenzrichtlinie wird substanziell wirksam und mit Augenmaß umgesetzt.
  Das BMBFSFJ hat alle Vorbereitungen getroffen, um das Gesetzgebungsverfahren einzuleiten.
  Richtig ist aber: Dazu sind noch einige Abstimmungen notwendig, sodass wir die Frist
  zur Umsetzung Anfang Juni nicht werden halten können ‑ im Übrigen genauso wie zahlreiche
  andere europäische Staaten. Das ist in derart komplexen Gesetzgebungsverfahren nicht
  unüblich.'
