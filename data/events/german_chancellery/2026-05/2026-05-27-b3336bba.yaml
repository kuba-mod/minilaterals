date: '2026-05-27'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 27. Mai 2026
text: 'stellvertretender Regierungssprecher Hille (Vorsitzende Wolf eröffnet die Pressekonferenz
  und begrüßt SRS Hille sowie die Sprecherinnen und Sprecher der Ministerien.) Einen
  schönen guten Tag auch von mir, insbesondere auch an die Gäste aus dem AA. Schön,
  dass Sie diesen sonnigen Mittwoch lieber mit uns verbringen als draußen in der Sonne.
  Das werte ich auch als positives Zeichen. Wie mittwochs üblich, hat das Bundeskabinett
  getagt und wie auch in den vergangenen Wochen konsequent und fleißig gearbeitet
  und einen ganzen Schwung an Gesetzen beschlossen. Ich habe fünf besonders wichtige
  für Sie mitgebracht. Ich bitte deshalb auch schon kurz um Entschuldigung, dass es
  vielleicht eine Minute länger dauert. Das erste Gesetz ist sozusagen aus der Kategorie
  „Deutschland sicherer machen“: Die Bundesregierung hat heute den Entwurf eines Gesetzes
  zur Stärkung der Cybersicherheit beschlossen. Die Bedrohungslage im Cyberraum ist
  hoch. Auch Deutschland ist Adressat von Cyberangriffen, die mitunter hochprofessionell
  durchgeführt werden und großes Schadenspotenzial beinhalten können. Die Gewährleistung
  einer verlässlichen und sicheren Nutzung der Informationstechnologie und der zugrunde
  liegenden Kommunikationsinfrastruktur ist aber essenzielle Voraussetzung für das
  Funktionieren unseres Gemeinwesens, Deutschlands wirtschaftlichen Erfolg, den gesellschaftlichen
  Zusammenhalt sowie die nationale Sicherheit. Ziel der Bundesregierung ist es deshalb,
  die Cybersicherheit weiter zu stärken und unsere Sicherheitsbehörden in die Lage
  zu versetzen, bei schwerwiegenden Gefahren Cyberangriffe auch aktiv verhindern,
  stoppen oder zumindest abmildern zu können. Dem trägt das verabschiedete Gesetz
  Rechnung, das schwerpunktmäßig eine Erweiterung der Befugnisse des Bundesamts für
  Sicherheit in der Informationstechnik, kurz BSI, des Bundeskriminalamtes, BKA, und
  der Bundespolizei vorsieht. Das Gesetz ist ein Meilenstein in der Cybersicherheit
  und schafft jetzt die rechtlichen Möglichkeiten für das, was die Sicherheitsorgane
  heute technisch schon können. Das zweite Gesetz würde ich in die Kategorie „Modernisierung,
  Vereinfachung und Digitalisierung“ einordnen: Das Bundeskabinett hat die von der
  Bundesbauministerin vorgelegte grundlegende Novelle des Baugesetzbuches beschlossen.
  Die Bundesregierung schafft mit der Novelle des Baugesetzbuches und des Raumordnungsgesetzes
  wesentliche Rahmenbedingungen, damit in Deutschland mehr Wohnraum einfacher und
  schneller gebaut werden kann und Städte und Gemeinden auch in Zukunft lebenswert
  bleiben. Ich möchte Ihnen hier einige wesentliche Punkte kurz erläutern. Erstens:
  In Städten und Gebieten mit angespanntem Wohnungsmarkt kann zukünftig ein überragendes
  öffentliches Interesse für die Wohnbebauung bei der Aufstellung der Bebauungspläne
  geltend gemacht werden. Zweitens: Die Umweltprüfung wird vereinfacht, das Bauleitplanverfahren
  gestrafft und vollständig digitalisiert ausgestaltet. Mehrfachbeteiligungen werden
  reduziert. Drittens: Das Beteiligungsverfahren zur Aufstellung von Raumordnungsplänen
  und bei Raumverträglichkeitsprüfungen wird ebenfalls vollständig digitalisiert.
  Das heißt, dass bei der Bürgerbeteiligung künftig „digital only“ gilt. Viertens:
  Außerdem werden zur Stärkung der Gemeinwohlorientierung im Gesetzentwurf Regelungen
  getroffen, damit die Kommunen etwa gegen sogenannte Schrottimmobilien leichter vorgehen
  können oder Milieuschutzgebiete durch erweiterte Vorkaufsrechte künftig besser schützen
  können. Zugleich soll das Baugesetzbuch an bestehende Herausforderungen wie die
  veränderte Sicherheits- und Versorgungslage sowie die Folgen des Klimawandels angepasst
  werden und so die Resilienz von Städten und Gemeinden stärken. Mit dem Gesetzentwurf
  setzt die Bundesregierung die im Koalitionsvertrag enthaltenen zentralen Regelungsaufträge
  der föderalen Modernisierungsagenda und des Bund-Länder-Pakts für Planungs-, Genehmigungs-
  und Umsetzungsbeschleunigung um. Zum dritten Gesetz, das zur Kategorie „Modernisierung
  und Vereinfachung und Beschleunigung“ zu rechnen ist: Die Bundesregierung hat heute
  das Siebte Gesetz zur Änderung der Verwaltungsgerichtsordnung beschlossen. Die umfassenden
  Änderungen sind Teil des Pakts für den Rechtsstaat und modernisieren die Gerichtsordnung
  im Verwaltungsrecht. Unter anderem sollen Verwaltungsgerichte weiter entlastet,
  sollen Gerichtsverfahren beschleunigt und soll offensichtlich aussichtslosen Gerichtsverfahren
  mit einem Zahlungsvorschuss besser begegnet werden. Damit setzt die Bundesregierung
  weitere Vorhaben aus dem Koalitionsvertrag um, treibt die Modernisierung und Digitalisierung
  in der Justiz voran und stärkt die Wehrhaftigkeit des Rechtsstaats. Dann habe ich
  ein viertes Gesetz, das heute beschlossen wurde, mitgebracht, das ebenfalls in die
  Kategorie „Deutschland sicherer machen“ zu rechnen ist: Die Bundesregierung hat
  den Entwurf eines Gesetzes zur Stärkung der strafrechtlichen Verfolgung des Menschenhandels
  und der sexuellen Ausbeutung beschlossen. Ziel des Gesetzes ist es, den Kampf gegen
  Menschenhandel in Deutschland zu stärken und Täterinnen und Täter konsequenter zur
  Rechenschaft ziehen zu können. Die Bundesregierung setzt damit die EU-Richtlinie
  zur Verhütung und Bekämpfung des Menschenhandels und zum Schutz seiner Opfer in
  nationales Recht um. Die Richtlinie sieht eine Erweiterung des Tatbestands des Menschenhandels
  um die Ausbeutung von Leihmutterschaft, Zwangsheirat und illegaler Adoption vor.
  Zur wirksameren Bekämpfung des Menschenhandels wird zudem die umfassende Kriminalisierung
  der Nachfrageseite vorgeschrieben. Der Gesetzentwurf sieht vor, die Tatbestände
  des Menschenhandels sowie die Tatbestände im Bereich der Prostitution und sonstiger
  sexueller Handlungen gegen Entgelt, insbesondere zum Nachteil von Kindern und Jugendlichen,
  inhaltlich und systematisch grundlegend zu überarbeiten. Darüber hinaus wird ein
  neuer Einstellungstatbestand für Betroffene von Menschenhandel und Ausbeutung geschaffen.
  Wurden diese als unmittelbare Folge des Menschenhandels zu Straftaten gezwungen,
  soll von Strafe abgesehen werden können. Dann ‑ gleich haben Sie es geschafft ‑
  ein fünftes Gesetz, diesmal aus der Kategorie „Filmförderung“: Das Bundeskabinett
  hat heute den vom Beauftragten der Bundesregierung für Kultur und Medien vorgelegten
  Entwurf für das ‑ Achtung, es ist ein langer Name ‑ Mediendienste-Investitionsverpflichtungs-Gesetz
  beschlossen ‑ sozusagen den „Filmbooster“. Damit sollen Streamingdienste sowie Fernsehsender
  mit Mediatheken, die vom deutschen Zuschauermarkt und den Fördermaßnahmen des Bundes
  profitieren, künftig stärker an der Finanzierung europäischer Film- und Serienproduktionen
  beteiligt werden. Konkret geht es darum, acht Prozent des Nettoumsatzes bzw. der
  Programmkosten zu reinvestieren, um dauerhaft ein solides Grundvolumen an Investitionen
  in den deutschen Produktionsstandort zu sichern. Der Bund flankiert diese Investitionen
  mit der bereits vereinbarten überjährigen Nahezuverdopplung seiner Filmfördermittel
  auf 250 Millionen Euro pro Jahr. Auch damit setzt die Bundesregierung ein zentrales
  Ziel des Koalitionsvertrages um und vollendet die Reform der Filmförderung des Bundes.
  So weit waren dies für den Einstieg die Beschlüsse des Bundeskabinetts von heute.
  Ich habe eine Frage an das Umweltministerium. Es geht um das Upgrade des Baugesetzbuches
  . Demnach können Städte und Gemeinden mit angespanntem Wohnungsmarkt ein überragendes
  Interesse für den Wohnungsbau erklären. Wie bewertet das Umweltministerium diese
  Pläne? Wie stellt Umweltminister Schneider sicher, dass die Belange des Umweltschutzes
  nicht beschnitten werden? Vielleicht sage ich zunächst einmal: Das überragende öffentliche
  Interesse, das Sie auch schon angesprochen haben, führt zu keinem absoluten Vorrang.
  Das heißt ‑ das können Sie auch sehen ‑, dass die wichtigen Umweltbelange in den
  Grundsätzen des Baugesetzes ausdrücklich genannt bleiben. Sie können darin auch
  nachlesen, dass beispielsweise der Schutz der natürlichen Lebensgrundlagen, der
  sparsame und schonende Umgang mit Grund und Boden sowie die Begrenzung der Bodenversiegelung
  auf das notwendige Maß beachtet werden müssen. Das alles wird bei den Behörden also
  auch weiterhin Berücksichtigung finden. Allgemein sei dazu vielleicht noch ein Satz
  gesagt: Auch das Umweltressort muss feststellen, dass es nun einmal eine drängende
  Wohnungsnot gibt, der man auch begegnen muss. Dabei ist auch abzuwägen, wie man
  den zuständigen Behörden mehr Möglichkeiten geben kann, um der Wohnungsnot zu begegnen.
  In diesem Fall hat das eine gute Balance ergeben. Zum Thema der Cybersicherheit
  an das BMI als Verfassungsministerium: Warum hat das BKA jetzt die Zuständigkeit
  bei Cyberangriffen bekommen? Nach dem Grundgesetz liegt die Gefahrenabwehr schließlich
  prinzipiell bei den Ländern. Zunächst möchte ich darauf hinweisen, dass Minister
  Dobrindt sich um 12.30 Uhr zu genau diesem Gesetz geäußert hat. Insofern würde ich
  darauf verweisen. Sie haben vollkommen recht: Die Gefahrenabwehr liegt bei den Ländern,
  und es bleibt auch mit diesen Gesetzentwürfen dabei. ‑ Was wir mit diesen Gesetzentwürfen
  vorhaben, ist eine aktivere Cyberabwehr im Rahmen der Kompetenzen der Bundesbehörden,
  als es jetzt möglich ist. Dazu zählt nicht nur das BKA, sondern auch die Bundespolizei
  und vor allem auch das Bundesamt für Sicherheit in der Informationstechnik. Insofern
  werden grundgesetzliche Regelungen oder die grundsätzliche Kompetenzverteilung hierbei
  nicht angetastet. Wenn das BKA bei Cyberangriffen zuständig ist und es ja als Gefahrenabwehr
  gilt, dann habe ich immer noch nicht verstanden, warum das BKA es jetzt machen darf,
  obwohl die Länder dafür zuständig sind. Es gibt ja die Cyberabwehr nicht nur innerhalb
  Deutschlands, sondern auch im multinationalen Verbund. Daran ist das BKA natürlich
  jetzt schon übernational oder über Deutschland hinaus mitbeteiligt. Genau darum
  geht es unter anderem auch: Wenn, sagen wir jetzt einmal, ein Cyberangriff von einem
  Server bzw. einer Domain aus dem Ausland kommt, geht es auch darum, dass das BKA
  zusammen mit anderen Partnern, den Sicherheitsbehörden anderer Länder, die Befugnisse
  erhält, tätig zu werden. Dazu gehört zum Beispiel, diese Domain vom Netz nehmen
  zu lassen, Maßnahmen gegen den Betreiber, gegen den Provider durchführen zu lassen,
  und im Verbund aktiv in der gemeinsamen Cyberabwehr gestärkt zu werden. Frau Ungrad,
  ich habe jetzt in der Aufzählung das Energieeffizienzgesetz nicht gehört. Entnehme
  ich dem, dass es heute nicht beschlossen wurde? Können Sie sagen, warum? Das haben
  Sie genau richtig gesehen. Es ist heute nicht im Kabinett gewesen. Wir befinden
  uns noch in der Ressortabstimmung, sind aber jetzt auf der Zielgeraden. Der Bundesrat
  hat am 8. Mai die Bundesregierung aufgefordert, eine Strategie zur Füllung der Gasspeicher
  vorzulegen. Ist der Beschluss mittlerweile im Bundeswirtschaftsministerium angekommen?
  Welche Strategie verfolgt die Bundesregierung? Die Füllung der Gasspeicher ist eine
  Aufgabe des Marktes. Er funktioniert auch. Die Speicher sind derzeit zu rund 30 Prozent
  gefüllt. Die meisten Einspeicherungen beginnen für die Wintermonate ohnehin erst
  in den Sommermonaten, sogar erst im September. Wir sind also auf jeden Fall noch
  auf der Zielgeraden. Die Bundesregierung, auch das Wirtschaftsministerium und die
  Ministerin natürlich, sind der Auffassung, dass es weiterhin eine Aufgabe des Marktes
  ist und schon immer war. Wenn der Staat diese Einspeicherung übernehmen sollte,
  dann würde das sehr, sehr viel Steuergeld kosten. Es kann nicht das Ziel sein, dem
  Markt diese Aufgabe wegzunehmen. Ungeachtet dessen haben wir uns ja auch schon dazu
  geäußert, dass wir an einer strategischen Gasreserve arbeiten. Das kann aber nur
  ein kleiner Teil sein und auch dann nicht, um Preiseffekte abzudämpfen, sondern
  nur, wenn es zum Beispiel extreme Ereignisse gibt, die Pipelines betreffen oder
  Ähnliches, sodass dann ein Rückgriff erfolgen kann. Hierzu befinden wir uns gerade
  in Abstimmung innerhalb des Hauses. Sie liegt in den letzten Zügen und wird dann
  innerhalb der Bundesregierung beschlossen werden. Der Bundesrat sieht es ja offenbar
  anders und ist nicht der Meinung, dass der Markt es regelt. Wie gehen Sie denn mit
  dieser Forderung um? Ich sehe es jetzt nicht so, dass der Bundesrat das dezidiert
  gesagt hat. Wir befinden uns ja auch mit den Ländern in Kontakt und erfahren dabei
  auch Zustimmung, dass der Markt es weiterhin regelt. Noch einmal gesagt: Es funktioniert
  ja auch. Es hat auch im letzten Winter funktioniert, obwohl immer gesagt worden
  ist, es funktioniere nicht. Es hat funktioniert. Es gab keinen Versorgungsengpass.
  Dementsprechend sehen wir das auch weiterhin so. Zum Thema Propagandavideo der Initiative
  Neue Soziale Marktwirtschaft, also des arbeitgebernahen Verbands, das das BMWE am
  Wochenende geteilt hat: Weil Sie, Frau Ungrad, eingeräumt haben, dass das mit Einverständnis
  der Ministerin geteilt worden ist, würde mich interessieren, ob für Ihr Ministerium
  eigentlich das staatliche Neutralitätsgebot gilt. Grundsätzlich möchte ich erst
  einmal sagen, dass die Ministerin und das BMWE an der Kampagne selbst keinen Anteil
  haben, es keine Absprachen oder Ähnliches gab. Ein striktes Neutralitätsgebot gilt
  allein für amtliche Äußerungen im Zusammenhang mit dem Recht politischer Parteien
  auf Chancengleichheit. Im Übrigen gilt bei der amtlichen Öffentlichkeitsarbeit der
  verfassungsrechtliche Grundsatz der Sachlichkeit. Dieser ist hier nach unserer Auffassung
  gewahrt worden. Haben Sie schon einmal solche Interessensverbandsvideos geteilt?
  Das wäre mir neu. Das ist das eine. Zum anderen: Decken sich eigentlich die Interessen
  dieses Verbandes mit denen aller Deutschen, die das Ministerium ja vertritt? Zum
  ersten Punkt: Das kann ich nicht kommentieren. Das weiß ich nicht. Das Zweite ist:
  Dazu, dass wir an diesem Video keinerlei Zusammenarbeit hatten, hatte ich mich jetzt
  umfassend geäußert. Es ist vom Bundeswirtschaftsministerium kommentiert worden.
  Dementsprechend habe ich mich hier umfassend dazu geäußert, dass für uns der Grundsatz
  der Sachlichkeit in dem Fall vorlag. Meine Frage richtet sich an das Bundesjustizministerium.
  Herr Engelke, vorausschauend: Im Juni werden sich die Justizministerinnen und ‑minister
  der Länder treffen. Hamburg hat den Vorsitz. Es gibt wohl einen Beschlussvorschlag,
  in dem dafür plädiert wird, Vergewaltigungen nicht bereits nach fünf Jahren verjähren
  zu lassen. Ich möchte jetzt genau auf diese Verjährungsfrist von fünf Jahren zu
  sprechen kommen. Wie ist sie, die 2016 eingeführt wurde, geeignet, um Opfern Gerechtigkeit
  widerfahren zu lassen? Dem BMJV ist es ein wichtiges Anliegen, dass Sexualstraftaten
  konsequent rechtsstaatlich verfolgt werden können. Voraussetzung hierfür ist, dass
  es auch sachgerechte Regelungen zur Verjährung gibt, die die wichtigen Interessen
  auch mitberücksichtigen. Das BMJV prüft derzeit, ob Änderungen in der Verjährungsregel
  für Straftaten nach eben § 177 Strafgesetzbuch angezeigt sind. Diese Prüfung soll
  zeitnah abgeschlossen werden. Ich kann hier jetzt aber nicht anstehenden Beschlüssen
  oder Verhandlungen von Landesministerkonferenzen vorweggreifen. Ich hätte noch eine
  Nachfrage: Wie ist es konkret in Fällen, in denen Opfer erst später erfahren, dass
  sie überhaupt Opfer geworden sind? Wir haben es in Frankreich mit Gisèle Pelicot
  gesehen. Das ist ein Anliegen, das ich vorhin meinte: Auch uns ist wichtig, dass
  es sachgerechte Verjährungsregelungen gibt, denn wir wissen, dass solche Regelungen
  auch im Interesse der Betroffenen sein müssen. ‑ Es wird ein Teil unserer Prüfung
  sein, dass berücksichtigt wird, dass Opfer solcher schwerwiegenden Straftaten diese
  häufig erst mit zeitlicher Verzögerung anzeigen. Auch das ist Gegenstand unserer
  Prüfung. Ergänzend kann ich mit Blick auf solche Fälle aber auch darauf hinweisen,
  dass bereits jetzt eine Verjährung für Taten nach § 177 des Strafgesetzbuchs erst
  mit der Vollendung des 30. Lebensjahres des Opfers beginnt. Dies zum Kontext. An
  das Ministerium für Bildung und Forschung: Vor ein paar Wochen hieß es in der Koalition,
  dass man sich bei der BAföG-Reform geeinigt habe. Das gehe jetzt ins Kabinett, sodass
  die Erhöhung, wie vorgesehen, noch zum Wintersemester in Kraft treten könne. Stimmt
  es, dass der Punkt heute wieder von der Tagesordnung des Kabinetts genommen wurde,
  und wenn ja, warum? Ich antworte gern für das Bundesministerium für Forschung, Technologie
  und Raumfahrt. Bei uns ressortiert das BAföG. Ich kann darauf hinweisen, dass sich
  meine Kollegin dazu vor ein, zwei Wochen schon einmal geäußert hat. Darauf verweise
  ich gern. Über die im Koalitionsvertrag der Regierungsparteien festgehaltene Reform
  des BAföG finden derzeit Abstimmungen innerhalb der Bundesregierung statt. Die Abstimmungen
  sind noch nicht abgeschlossen. Den Ergebnissen kann ich nicht vorgreifen. Wird es
  denn überhaupt zu einer Erhöhung kommen, oder fällt das jetzt alles unter den ja
  auch im Koalitionsvertrag festgehaltenen Finanzierungsvorbehalt? Zum Finanzierungsvorbehalt
  kann ich mich natürlich nicht äußern. Ich kann aber gern noch einmal betonen, was
  wir an dieser Stelle schon einmal gesagt haben, nämlich, dass uns die Belange der
  jungen Menschen in Studium und in schulischer Ausbildung sehr wichtig sind. Das
  ist dem BMFTR ein sehr großes Anliegen. Deswegen hat das BMFTR unmittelbar nach
  Beginn der Legislaturperiode auch die Arbeiten für die Erstellung eines Referentenentwurfs
  aufgenommen. Dazu stehen wir mit allen Beteiligten im Austausch. Die Ansage der
  Ministerin, von Frau Warken, war, dass man bis Mitte Mai einen Entwurf zur Pflegereform
  vorlegen werde. Mitte Mai ist nun vorbei. Die Frage ist: Schaffen Sie es überhaupt
  noch im Monat Mai? Zunächst einmal bitte ich um Verständnis dafür, dass wir aufgrund
  der laufenden Abstimmung jetzt keinen Zeitplan bekannt geben werden. Ziel bleibt
  es, den Referentenentwurf zeitnah vorzulegen. Wie Sie wissen, ist das eine große
  Reform, die neben finanziellen Themen auch strukturelle Themen behandelt. Wir sind
  dabei schon weit vorangekommen, aber ein paar Detailfragen sind noch offen. Diese
  werden regierungsintern diskutiert. Wir werden es schnellstmöglich vorlegen, und
  dann geht es ins Verfahren. Zeitnah, das ist ja ein sehr dehnbarer Begriff. Für
  manche ist das Weihnachten. Was ist denn aus Ihrer Sicht zeitnah? Vor der Sommerpause,
  nach der Sommerpause? Das ist Semantik. Wie gesagt, wird gerade regierungsintern
  diskutiert. Wir werden jetzt keinen Zeitplan veröffentlichen. Es wird zeitnah vorgelegt,
  und dann soll es im Sommer auch eine Kabinettsbefassung geben. Das ist der Plan.
  Meine Frage geht ebenfalls an das Gesundheitsministerium. Es ist mehr eine Verständnisfrage
  zu Zahlen, die in den vergangenen Tagen kursierten. Es geht um die Bürgergeldempfänger
  und die Zuschüsse aus dem Bundeshaushalt dazu. Es ist von den 250 Millionen Euro
  die Rede, die ab 2027 aufsteigend gezahlt werden sollen. Ist diese Summe zusätzlich
  zu den 144 Euro im Monat pro Kopf für Bürgergeldempfänger zu verstehen, die ja jetzt
  schon aus dem Bundeshaushalt bezahlt werden, oder ist das miteinander verrechnet?
  Kommen diese 250 Millionen Euro on top? Soweit ich weiß ‑ ich weiß nicht, ob der
  Regierungssprecher die genauen Zahlen hat ‑, ist das eine zusätzliche Übernahme
  dieser Kosten, beginnend mit 250 Millionen, dann 500 Millionen, eine Milliarde,
  1,5 Milliarden und zwei Milliarden. Die Frage geht an das Arbeitsministerium. Heute
  wird berichtet, dass die Zahl der Teilzeitbeschäftigten noch einmal zugenommen habe,
  bei Männern und Frauen. In den letzten Monaten gab es eine aufgeregte Debatte, wie
  man gerade mit dem Thema der Teilzeit umgehen solle. Deswegen hätte ich von Ihnen
  gern einen Kommentar zu den neuen Zahlen. Sind die Bedenken, die damals geäußert
  wurden, berechtigt gewesen? Sehen Sie diese Entwicklung mit Sorge? Neue Zahlen,
  die Sie gerade angesprochen haben, kann ich nicht kommentieren, weil sie mir gar
  nicht bekannt sind. Ganz grundsätzlich ist bei Teilzeit immer zu beachten, dass
  Deutschland eines der Länder mit der höchsten Frauenerwerbsbeteiligung überhaupt
  ist, auch mit der höchsten Erwerbsbeteiligung von älteren Menschen, und dass diese
  häufiger in Teilzeit arbeiten. Wenn ich es richtig verstehe, dann führen Sie den
  Anstieg darauf zurück, dass jetzt zum Beispiel auch ältere Menschen verstärkt arbeiten?
  Mir ist tatsächlich kein Anstieg bekannt. Wenn es jetzt einen akuten Anstieg gab,
  dann muss ich das prüfen lassen und gegebenenfalls eine Antwort nachreichen. Aber
  zumindest bislang war es immer so, dass Deutschland international betrachtet zwar
  mit einer relativ hohen Teilzeitquote auffällt, dass diese sich aber durch die hohe
  Erwerbstätigkeit von Frauen und Älteren erklären lässt. Das sind neue Zahlen des
  Statistischen Bundesamtes. Deswegen wäre es nett, wenn Sie ‑ ‑ ‑ Ich lasse es gern
  prüfen. Falls es etwas nachzureichen gibt, reichen wir es nach. Ich lasse es gern
  prüfen. Ist es das Ziel Ihres Ministeriums, dass weniger in Teilzeit gearbeitet
  wird, dass also weniger Frauen arbeiten, dass weniger Ältere arbeiten? Das Ziel
  des Ministeriums ist es, dass Menschen von ihrer Arbeit gut leben können. Das ist
  bei Vollzeiterwerbtätigkeit eher möglich als bei Teilzeiterwerbstätigkeit, gerade
  bei geringfügiger Teilzeit. Es liegt aber nicht allein im Möglichkeitshorizont des
  BMAS, das zu ändern, weil das ja oft mit Betreuungssituationen usw. zu tun hat.
  Ja, genau. Darum frage ich ja, weil ja andere Regierungsmitglieder die Teilzeit
  als Feind ausgerufen haben. Für das BMAS ist, denke ich, immer das sogenannte Normalarbeitsverhältnis,
  also unbefristet und möglichst in Vollzeit, das Idealbild, weil man damit am ehesten
  seinen Lebensunterhalt und übrigens später auch sein Ruhestandsleben am besten finanzieren
  kann. Aber es ist nicht im Ermessen des BMAS, die Lebensentwürfe von Menschen zu
  ändern und jetzt für mehr Kitaplätze zu sorgen. Auf eine Kleine Anfrage zur EU-Sanktionierung
  deutscher Staatsbürger ‑ für Interessierte: Bundestagsdrucksache 21/5217 ‑ verweist
  das Auswärtige Amt im Namen der Bundesregierung bei Frage 21, wie EU-sanktionierte
  deutsche Staatsbürger angesichts eingefrorener Konten und hoher Anwaltskosten überhaupt
  den Rechtsweg gegen ihre Listung finanzieren sollen, auf genehmigungspflichtige
  Ausnahmetatbestände, konkret auf Artikel 3 der EU-Verordnung. Das heißt konkret,
  dass die Gegenseite des Rechtsstreits faktisch darüber entscheidet, ob und in welcher
  Höhe der Kläger, also der jeweilige EU-Sanktionierte, seinen Anwalt bezahlen darf.
