title: Bundeslagebild Cybercrime 2025 Internetkriminalität auf hohem Niveau
text: 'Das Bundeslagebild Cybercrime 2025 zeigt: Die Zahl der digitalen Angriffe mit
  Schadsoftware ist gestiegen, so Bundesinnenminister Dobrindt. Besonders schwere
  Cyber delikte sowie Angriffe auf Unternehmen, Behörden und kritische Infrastrukturen
  nehmen zu, das zeigt das Bundeslagebild Cybercrime . 2025 wurden dabei rund 334.000
  Cybercrime fälle registriert. Aufgrund eines erheblichen Dunkelfeldes dürfte die
  tatsächliche Bedrohung allerdings deutlich höher liegen. Die Ergebnisse im Überblick:
  Im Cybercrime -Bereich gewinnen KI - Tools an Bedeutung. Kriminelle nutzen KI ,
  um Angriffe effizienter und professioneller durchzuführen. KI bietet aber auch Chancen
  für die IT -Sicherheit und hilft, Schwachstellen früh zu identifizieren. 1.041 Ransomware
  -Angriffe wurden im Jahr 2025 angezeigt – das entspricht einem Anstieg um zehn Prozent
  gegenüber 2024. Betroffen sind vor allem Unternehmen und öffentliche Einrichtungen.
  Die durchschnittlichen Lösegeldzahlungen stiegen dabei an, die Gesamtsumme lag bei
  rund 15,5 Millionen US - Dollar . Gleichzeitig zahlen immer weniger Betroffene Lösegeld.
  Das deutet auf eine höhere Resilienz vieler Unternehmen hin. Ransomware sind Schadprogramme.
  Sie zielen auf die Blockade eines Computer systems oder die Verschlüsselung von
  Betriebs- und Nutzerdaten ab. Die Zahl der Überlastungsangriffe – sogenannte DDoS
  -Attacken – stieg im Jahr 2025 um 25 Prozent. 36.706 Fälle wurden registriert. Solche
  Angriffe sind auch das bevorzugte Vorgehen von hacktivistischen Akteuren. Betroffen
  waren vor allem Behörden, Verwaltungen, Verkehrs- und Logistikunternehmen. Aufgrund
  seiner simplen, aber effektiven Funktionsweise ist Phishing weiterhin ein beliebter
  Eintrittsvektor. Die Verbraucherschutzzentrale Nordrhein-Westfalen verzeichnete
  in Deutschland im Jahr 2025 382.470 Phishing-Mails . Dies stellt zwar einen Rückgang
  um rund 10 Prozent im Vergleich zu 2024 dar, dennoch blieb die Anzahl der verzeichneten
  Phishing-Mails auf einem hohen Niveau. Das Bundeslagebild Cybercrime und weitere
  Informationen finden Sie auf der Webseite des BKA . Informationen zu Schutzmaßnahmen
  für Verbraucherinnen und Verbraucher, Unternehmen sowie Behörden finden Sie beim
  Bundesamt für Sicherheit in der Informationstechnologie .'
