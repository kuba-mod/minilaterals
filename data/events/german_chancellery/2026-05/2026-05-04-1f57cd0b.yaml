  Ich mache mir weder Ihre Unterstellung, wie der Bundeskanzler reagiert hat, noch
  Ihre Darstellung, wie Sie dies emotional empfunden haben, zu eigen. Ich glaube,
  uns allen war bewusst, dass die Fragestellerin in einer emotional schwierigen Situation
