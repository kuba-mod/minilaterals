  Vorgang von der konsularischen Seite her, und alles Weitere liegt nicht in der Zuständigkeit
  des Auswärtigen Amts. Wie gesagt, ich kann mir das nicht vorstellen. Zum Thema Afghanistan
  , Herr Giese: Räumen Sie ein, dass die Beziehungen zum Talibanregime mittlerweile
