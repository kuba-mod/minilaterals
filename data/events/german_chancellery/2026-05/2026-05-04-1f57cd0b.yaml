  ausgeweitet würden, wenn es denn Anzeichen für eine Nichtweitergabe der Steuersenkung
  gäbe. An das Auswärtige Amt: Im westafrikanischenMaliverändern sich gerade dieKräfteverhältnisse
  . Die nordöstliche Stadt Kidal ist jetzt wieder in Händen von Dschihadisten und
