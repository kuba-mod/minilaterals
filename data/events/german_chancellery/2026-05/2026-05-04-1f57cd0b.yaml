  gekommen sind und was die Überlegungen dahinter waren. Gleichzeitig habe ich auch
  eine Frage an das Wirtschaftsministerium: Inwiefern ist das auch in eine Gesamtpharmastrategie
  eingebettet, die ja aus dem Pharmadialog hervorgehen sollte und auf die wir auch
  noch warten? Vielleicht können Sie dazu noch etwas sagen. Was die Begründung für
  die Ausnahmen angeht, kann ich Ihnen jetzt an dieser Stelle keine Details nennen,
  weil wir aus den vertraulichen Gesprächen ja auch nicht im Einzelnen berichten.
  Das Ergebnis kennen Sie. Ansonsten kann ich gerne prüfen, ob ich Ihnen dazu etwas
  nachreichen kann. Selbstverständlich ist das eingebettet, aber ich kann hier auch
  noch keine Details einer Strategie nennen. Letzte Woche hat Bundeskanzler Merz im
  „SPIEGEL“-Interview erklärt, er nehme für sich in Anspruch, ein Bundeskanzler zu
  sein, der besonders intensiv auf den Osten schaut. Der Kanzler führt das leider
  nicht weiter aus, und die „SPIEGEL“-Kollegen haben auch nicht nachgefragt. Deswegen
  möchte ich fragen, Herr Kornelius: Könnten Sie uns denn zwei, drei konkrete politische
  Maßnahmen des Kanzlers nennen, die diesen Anspruch untermauern? Der Bundeskanzler
  war in dem ersten Jahr der Amtszeit sehr häufig im Osten. Er hat regelmäßig Kontakt
  mit den Ministerpräsidenten des Ostens. Auch der Bürgerdialog in Salzwedel ist nicht
  zufällig in Salzwedel gelandet. Die Entwicklung des Ostens steht in den Bund-Länder-Gesprächen,
  in der Ministerpräsidentenkonferenz, permanent auf der Tagesordnung, auch im Länderfinanzausgleich
  und hinsichtlich des Zustands der Kommunen. Es gibt also eine ganze Reihe von Themen.
  Er hat sich sehr intensiv um die Ansiedelung von Infrastruktur und von Zukunftstechnologie,
  etwa im Silicon Valley um Dresden herum, gekümmert. Es gibt also eine Reihe von
  Gründen, die diese Aussage auch untermauern. Okay, aber abgesehen von PR-Floskeln
  und öffentlichen Terminen zielte meine Frage eher darauf ab, ob es denn für die
  ostdeutsche Öffentlichkeit messbare Faktoren gibt, die man tatsächlich nachvollziehen
  kann, etwa im Bereich der Personalentscheidungen, der Infrastruktur oder auch der
  Repräsentanz von ostdeutschen Führungspositionen, die der Kanzler konkret angeht?
  Der Bundeskanzler hat im Osten von Deutschland die gleiche Agenda wie im Westen.
  Es geht um den Wirtschaftsaufschwung. Es geht darum, dass Stabilität in den Arbeitsmarkt
  kommt, dass es Neuansiedlungen gibt. Gerade hierbei ist der Osten wichtig. Das ganze
  Thema des Energieausbaus ist im Osten wichtig, jetzt gerade auch das Thema der Raffinerie
  in Schwedt usw. Es gibt also eine ganze Reihe von Themen, die den Bundeskanzler
  ständig beschäftigen und bei denen er zum Wohle auch der Ostdeutschen arbeitet,
  wobei ich Ihre Teilung zwischen einem ostdeutschen und einem westdeutschen Augenmerk
  nicht ganz nachvollziehe. Es geht darum, das Land insgesamt zu stärken. Ich habe
  eine Frage an das Landwirtschaftsressort. Der Minister hat ja angekündigt, die Lebensmittel-Notfallreserve
  neu zu organisieren. Was stellt er sich da konkret vor? Das Bundesministerium für
  Landwirtschaft, Ernährung und Heimat hat die politische Verantwortung für die Versorgung
  der Bevölkerung im Ernstfall. Dementsprechend hat sich der Minister im Interview
  mit der FUNKE Mediengruppe dazu geäußert und gesagt, dass wir ein Update, eine Modernisierung
  der staatlichen Lebensmittelvorsorge brauchen und quasi sofort verfügbare Lebensmittel
  lagern wollen. Derzeit werden Rohprodukte, also Getreide, Reis, Erbsen, Linsen und
  auch Kondensmilch, eingelagert. Der Vorschlag sieht vor, auch Lebensmittel, die
  man direkt essen und mit denen man dadurch Hunger sofort lindern kann, einzulagern.
  Darunter kann man sich Linseneintopf, Dosenravioli, aber auch vieles andere, vorstellen.
  Dadurch könnten Versorgungsengpässe, ausgelöst durch militärische Krisen, aber auch
  durch andere Schadensereignisse wie Natur- oder Umweltkatastrophen, besser überbrückt
  werden. Schließlich kann in solchen Fällen nicht ausgeschlossen werden, dass die
  Strom- und Energieversorgung nicht fehlerfrei funktioniert und die Produkte dann
  nicht zubereitet werden können. Denken Sie an den Stromausfall im vergangenen Jahr
  in Berlin zurück, als viele Haushalte mehrere Tage lang ohne Strom waren. Der Vorschlag
  bedeutet ein zusätzliches Sicherheitsnetz. Für diese zeitgemäße Lebensmittelreserve
  soll die private Lebensmittelwirtschaft stärker in die Vorratshaltung eingebunden
  werden. Der Minister hat sich auch zur Finanzierung geäußert. Sie wissen, dass die
  Haushaltsaufstellung gerade läuft. Zu regierungsinternen Gesprächen können wir uns
  nicht äußern. Aber der Minister hat klargemacht, dass er sich dafür einsetzen wird,
  dass die entsprechenden Mittel bereitgestellt werden können. Für wie viele Tage
  müsste solch eine Raviolireserve angelegt werden? Ich weiß, es sorgt für Erheiterung,
  aber es ist tatsächlich ein sehr ernstes Thema. Dosenravioli sind nur ein Beispiel
  für Lebensmittel, die sofort verzehrfertig wären. Das Konzept wird erstellt. Es
  gibt Konzepte für die bisher eingelagerten Lebensmittel. Aus Sicherheitsgründen
  kann ich mich dazu nicht näher einlassen. Derzeit wird für einen bestimmten Zeitraum
  vorgesorgt. Dieser Zeitraum ist abgedeckt, und das soll auch in Zukunft so sein.
  Herr Giese, wir warten seit vier bzw. zwei Monaten auf die völkerrechtlichen Bewertungen
  der Bundesregierung , zum einen zum Thema der Entführung von Maduro seitens der
  USA und zum anderen zum Thema des amerikanisch-israelischen Angriffs auf Iran .
  Haben Sie das mittlerweile für uns dabei? Das war hier sehr ausgiebig Thema. Die
  Kautelen, die es in beiden Themen gibt, haben wir hier besprochen. Es gibt eine
  rechtliche und eine tatsächliche Seite. Seitdem hat sich nichts Neues ergeben. Wenn
  es ein Update gibt und ich Ihnen dazu etwas zu verkünden habe, dann bekommen Sie
  es augenblicklich. Warum müssen wir so lange warten, jetzt seit zwei bis vier Monaten,
  wenn die Bundesregierung bei Russland nach 24 Stunden wusste, dass das ein illegaler
  Angriffskrieg ist? Können Sie uns sagen, wie viele Beamte sich im AA aktuell den
  Kopf über diese völkerrechtlichen Bewertungen zerbrechen? Es muss ja eine Menge
  Arbeit sein. Ich weiß nicht, ob wir dieses Thema jetzt noch einmal komplett aufmachen
  wollen. Ich würde mich dabei sehr wiederholen. Wir haben es schon sehr häufig besprochen.
  Es geht um eine rechtliche Frage; es geht aber auch um eine Tatsachenfrage. Die
  amerikanische Seite hat sich auch auf nachrichtendienstliche Erkenntnisse bezogen,
  die uns nicht vollinhaltlich vorliegen. Diese braucht es, um die Einschätzung rechtlich
  vorzunehmen. Wie die amerikanische Seite ihr Vorgehen sieht, hat sie dargestellt.
  Sie sieht sich völkerrechtlich im Recht. Wir nehmen das zur Kenntnis. Wie gesagt,
  haben wir nicht alle Tatsachen dazu. Wir haben das hier schon sehr häufig besprochen,
  und das ist die Antwort, die Sie heute von mir dazu wieder bekommen. Da wir gerade
  bei dem Metathema der Einordnung sind: Die US-Regierung hat am 1. Mai per „executive
  order“ eine drastische Verschärfung der extraterritorialen Sanktionen gegen Kuba
  verhängt, die praktisch jedes deutsche oder europäische Unternehmen treffen können,
  das im Sektor von Energie, Bergbau, Finanzen oder Sicherheit auf Kuba tätig ist.
  Wie bewertet die Bundesregierung diese neue extraterritoriale Sanktionsausweitung
  der USA? Sieht sie darin eine Verletzung der Souveränität der EU und ihrer Mitgliedstaaten,
  ja oder nein? Die amerikanische Sanktionspolitik ist Sache der amerikanischen Regierung.
  Ich werde das von hier aus nicht kommentieren. China hat in Reaktion erstmals seine
  „blocking rule“ aktiviert und chinesischen Unternehmen die Befolgung der US-Sanktionen
  ausdrücklich untersagt. Ein ähnliches Instrument liegt auch der Bundesregierung
  bzw. der EU vor. Setzt sich die Bundesregierung auf EU-Ebene für die Aktivierung
  dieses europäischen Blockingmechanismus ein, um deutsche Unternehmen zu schützen?
  Wenn nicht: Warum lässt die EU bzw. die Bundesregierung ihre Unternehmen nicht vor
  US-Sanktionen schützen, obgleich die Chinesen dies für ihre Unternehmen tun? Wie
  Sie schon richtig gesagt haben, ist das ein EU-Instrument. Über dieses EU-Instrument
  wird EU-gemeinschaftlich entschieden. Dazu gibt es, wenn dazu aufgefordert wird,
  eine Debatte. Einer solchen Debatte würde ich hier aber ungern vorgreifen wollen.
  Am Ende wird ein Ergebnis verkündet. Aber dazu habe ich Ihnen derzeit überhaupt
  nichts mitzuteilen. Wie immer, wenn es um EU-Entscheidungen geht, teilen wir nicht
  mit, wie interne Debatten verlaufen. Wird es heute in Griechenland noch eine Pressebegegnung
  mit dem Außenminister geben?'
