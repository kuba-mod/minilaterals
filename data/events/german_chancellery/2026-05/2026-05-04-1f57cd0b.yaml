  Ministerbezüge leiten sich möglicherweise daraus ab, aber die Bundesminister haben
  schon seit geraumer Zeit und nicht erst seit dieser Legislaturperiode auf Erhöhungen
  ihrerseits verzichtet. Diesen Schritt hätten Sie wieder getan, und Ihre Unterstellung,
  dass sie hier quasi eine automatische Erhöhung ihrer Bezüge in Kauf genommen haben,
  ist nicht korrekt. Darauf bezieht sich die Aussage des Bundeskanzlers. Bei diesem
  Bürgerdialog in Salzwedel reagierte der Bundeskanzler auf die Wortmeldung dieser
  todkranken Frau zunächst mit einer schroffen Zurückweisung, statt Mitgefühl zu zeigen.
  Da würde mich interessieren: Hält der Kanzler dieses Antwortverhalten auch im Nachhinein
