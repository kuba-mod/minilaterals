date: '2026-05-04'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 4. Mai 2026
text: '(Vorsitzender Szent-Iványi eröffnet die Pressekonferenz und begrüßt StS Kornelius
  sowie die Sprecherinnen und Sprecher der Ministerien.) (zum angekündigten Abzug
  von US-Truppen aus Deutschland ) An Herrn Kornelius und sicherlich auch an Herrn
  Müller die Frage zu US-Mittelstreckenwaffen, die ja nun nicht kommen: Welche strategischen
  Folgen hat die US-Entscheidung im Hinblick auf die europäische Abschreckungsfähigkeit
  gegenüber Russland und wie will die Bundesregierung die bestehende Fähigkeitslücke
  jetzt schließen? Sie wissen ja, dass diese Verlegung als temporäre Maßnahme angelegt
  war, dass Deutschland mit den europäischen Partnern seit geraumer Zeit diese sogenannten
  Deep-Strike-Fähigkeiten entwickelt. Es gibt ein Programm dafür; das nennt sich European
  Long-Range Strike Approach ‑ oder ELSA genannt. Dieses Programm ist natürlich auch
  eine Reaktion auf die russische Aufrüstung mit weitreichenden Waffensystemen. Sie
  wissen von der Iskander-Stationierung in Kaliningrad und anderen Plätzen. Das ist
  eine Bedrohung für Europa, die wir mit dieser Abwehrstrategie zu durchkreuzen versuchen.
  Deswegen ist es jetzt wichtig, dass Europa, dass wir in Deutschland die Entwicklung
  der eigenen Systeme mit Nachdruck umsetzen. Auf den Weg gebracht sind sie. Ansonsten
  ist die Entscheidung tatsächlich in einen größeren Rahmen eingebettet, den gestern
  auch der Bundeskanzler noch einmal ausführlich beschrieben hat. Vielleicht von der
  operativen Sicht her: Die Verteidigung des Bündnisses, die Verteidigung Europas,
  ist ja in den NATO-Verteidigungsplänen festgelegt. Dort werden die Fähigkeiten durch
  die Nationen nach Rücksprache mit der NATO bereitgestellt. Sie haben den Prozess
  im letzten Jahr mitverfolgt. Wir haben keine Anzeichen, dass die Nationen nicht
  ihre Beiträge zu diesem Fähigkeitsportfolio stellen. Deswegen sehe ich jetzt hier
  auch keine Auswirkungen auf die operative Verteidigungsfähigkeit. Vielleicht etwas
  detaillierter ausgeführt zu ELSA oder zu unseren Deep-Precision-Strike-Fähigkeiten:
  Wir haben parallel zu der US-Anfrage und der geplanten temporären Stationierung
  maßgeblich Maßnahmen angestoßen, um unsere eigenen DPS-Fähigkeiten zu stärken. Da
  ist zum einen ‑ Kategorie 1 will ich es nennen ‑, dass wir sowohl unsere aktuellen
  Taurus-Bestände modernisieren als auch auf den Nachfolger Taurus Neo gehen. Wir
  haben Ende 2024 die Modernisierung unserer eigenen Fähigkeiten angestoßen und Ende
  2025 ‑ das können Sie bei uns gerne nachlesen ‑ die Serienreifmachung des Taurus
  Neo auch durch den Haushaltsausschuss billigen lassen, sodass diese beiden Programmpunkte
  jetzt erfolgreich weitergeführt werden. Die zweite Säule war die Stationierung bzw.
  der Kauf marktverfügbarer Systeme. Die dritte Säule ist, wie angesprochen, ELSA.
  ELSA beinhaltet mehrere Säulen. Das betrifft zum Beispiel manche Drohnensysteme
  mit längeren Reichweiten. Das betrifft aber auch seegestützte, landgestützte Systeme.
  Deutschland und vor allem Großbritannien haben sich zusammengetan, um den Punkt
  „Fähigkeiten über 2000 Kilometer“ gemeinsam zu entwickeln. Dort ‑ auch dazu haben
  wir berichtet ‑ gibt es schon „implementation arrangements“. Das ist also schon
  auf einem sehr, sehr guten Weg. Es wird natürlich etwas Zeit brauchen, weil es Entwicklungslösungen
  sind. Aber das ist die dritte Säule, die hier ausgefüllt werden soll. Herr Müller,
  ich würde ganz gerne verstehen, ob Sie von der US-Seite überhaupt eine offizielle
  Benachrichtigung erhalten haben, was jetzt nicht mehr kommen soll. Die SM-6, wenn
  ich es richtig in Erinnerung habe, war ja der eine Teil, der andere Teil waren die
  Tomahawk. Gibt es da also eine formelle Aufschlüsselung dessen, was jetzt an Fähigkeiten
  nicht zur Verfügung gestellt werden soll? Welche davon sollen bislang nach Plänen
  der Bundeswehr ersetzt werden? Zum zweiten Teil kann ich sagen, was ich gerade ausgeführt
  habe. Die Planungen in diesen drei Kategorien laufen. Natürlich ist die Beschaffung
  marktverfügbarer Systeme ‑ das war die zweite Kategorie ‑ immer noch geplant. Sie
  wissen, dass es bei der US-Seite eine Voranfrage gibt. Das ist ein laufender Prozess.
  Damit ist genau die gleiche Fähigkeit gemeint, die stationiert werden sollte und
  gegebenenfalls ja noch wird. Wir reden ja nicht von einer finalen Absage. Zum ersten
  Themenfeld kann ich sagen, dass wir zu diesen Themen im Austausch mit der US-Administration
  sind. Wenn ich das richtig in Erinnerung habe, hat der Verteidigungsminister im
  Juli des vergangenen Jahres einen sogenannten Letter of Request an Pete Hegseth
  gestellt mit der Anfrage nach neuen Typhon-Systemen, was dann eigentlich ein erster
  Schritt zu eigenen Beständen an neuen Tomahawks wäre, also losgelöst von der US-Stationierung.
  Gibt es da einen neuen Stand? Wie ich gerade meinte: Das ist die zweite Säule, der
  Kauf marktverfügbarer Systeme. Der Prozess läuft. Gibt es da einen neuen Stand zu
  diesem Letter of Request? Haben sie eine Zusage, eine Absage gegeben, oder gibt
  es keine Antwort darauf? Herr Kornelius, würden Sie als Sprecher der Bundesregierung
  sagen, dass auf die US-Partner im Militärischen noch Verlass ist? Das transatlantische
  Bündnis ist seit Jahrzehnten gewachsen. Die amerikanische Präsenz in Europa ist
  stark und entschlossen. Wir haben jetzt in enger Abstimmung die Planung zur Sicherung
  des Nahen und Mittleren Ostens in einer Phase nach dem Krieg gegen Iran. Insofern
  kann ich in keiner Weise sehen, dass dieses Verhältnis nicht funktioniert. Herr
  Kornelius, wir sprechen gerade von nicht eingehaltenen Zusagen. Der Partner bricht
  Völkerrecht. Darauf basierte ja die Frage. Ich hatte in der Antwort versucht zu
  skizzieren, dass die Beziehung umfassender ist und wir eine sehr belastbare und
  breite Beziehung haben, die wir bei der Beurteilung des Gesamtbildes selbstverständlich
  zugrunde legen müssen. Herr Kornelius, vielleicht können Sie noch einmal ganz konkret
  sagen, wie Sie den geplanten Truppenabzug von US-Soldaten bewerten und einordnen?
  Der Bundeskanzler hat sich dazu gestern geäußert. Ich muss da keine weitere Bewertung
  vornehmen. Sie wissen, dass es sich um ein Kontingent handelt, das von der jetzigen
  amtierenden Regierung in den USA nicht stationiert wurde. Das war eine vorläufige
  Stationierung einer Einheit, die mit Blick auf die Bedrohung aus Russland in der
  Ukraine stationiert wurde, die aber auch eine schnelle Einsatzfähigkeit hat. Diese
  Einheit wird nun verlegt. Herr Kornelius, Sie hatten von einer sehr breiten und
  belastbaren Beziehung gesprochen. Der Kanzler hat gestern, soweit ich mich erinnere,
  gesagt, es gebe in diesem Jahr noch mehrere Gelegenheiten, Donald Trump zu treffen.
  Können Sie einmal sagen, wann die nächste sein wird? Das nächste Treffen wird spätestens
  der G7-Gipfel in Evian sein. Wir haben dann im Herbst G20. Es wird noch vor der
  Sommerpause einen NATO-Gipfel in Ankara geben. Das sind jetzt die drei Termine,
  zu denen zumindest geplant ist, dass die Staats- und Regierungschefs der jeweiligen
  Bündnisse anreisen. Gibt es vorher eventuell noch ein Telefonat zum Glätten der
  Wogen oder so? Der Bundeskanzler ist ständig im Austausch; vor allem ist auch die
  Arbeitsebene ständig im Austausch miteinander. Über konkrete Telefontermine unterrichten
  wir in der Regel anschließend. Vorab kann ich das leider nicht machen. Herr Kornelius,
  der Kanzler hat gestern gesagt, China würde genau beobachten, inwieweit Deutschland
  die Ukraine unterstützt. Können Sie etwas genauer ausführen, was er damit gemeint
  hat? Das, was er gesagt hat. China wird es genau beobachten. Das ist ja ein normales
  Verhalten von Großmächten, dass sie geopolitische Bewegungen beobachten und auch
  Entscheidungen dieser Natur zur Kenntnis nehmen. Warum hat er denn genau den Bezug
  zu China erwähnt? Er hätte ja auch andere Länder nennen können. Herr Müller, könnten
  Sie noch einmal auf die Zeitachse eingehen, von der Sie bei der dritten Säule ausgehen,
  sprich ELSA? Wann soll dieses System eigentlich einsatzbereit sein? Genau kann ich
  es nicht sagen. Ganz einfach: Wir haben zwar ein „implementation arrangement“ und
  die Nationen, vor allem Großbritannien und Deutschland, sind sich einig, diese Fähigkeiten
  unter dem ELSA-Dach weiterzuentwickeln. Das wird dann aber noch von der industrieseitigen
  Angebotslage und der Technologieverfügbarkeit und -entwicklung abhängig sein. Deswegen
  vermag ich jetzt hier zur Zeitlinie nichts zu sagen. Natürlich ist unser Ziel ‑ es
  war ja auch ELSA darauf angesetzt, und deswegen wurden mit Großbritannien sehr schnell
  die nächsten formellen Schritte eingeleitet ‑, maximal schnell zu sein und diese
  Fähigkeit, die es vorher in diesem Portfolio bei uns nicht gab ‑ Sie wissen, Taurus
  war von der Reichweite das Maximale ‑, aufgrund der geopolitischen Lage und der
  Bedrohungslage entsprechend schnell einführen zu können. Das heißt vor 2030 oder
  erst in den 2030ern? Wie gesagt, über Zahlen kann ich aktuell nichts sagen. Es ist
  doch auch die Frage nach einer Zahl, weil Trump ja gesagt hat, aus Deutschland würden
  „viel mehr“ als die zunächst angekündigten 5000 US-Soldaten abgezogen. Hat irgendjemand
  in der Bundesregierung ein Wissen oder eine Ahnung davon, was „viel mehr“ konkret
  bedeuten könnte? Da müssten Sie in der amerikanischen Regierung nachfragen. Ich
  habe dazu keine näheren Kenntnisse. Die Bundesregierung ist nicht im Kontakt mit
  dem US-Verteidigungsministerium oder dem Präsidenten, was dieses „viel mehr“ bedeutet?
  Das kann ja alles sein, von 1000 bis noch einmal 5000. Das muss doch für die Bundesregierung
  interessant sein. Ich will darüber jetzt nicht öffentlich spekulieren. Sie können
  sicher sein, dass wir ein intensives und enges Kooperationsverhältnis auf der Arbeitsebene
  haben. Herr Müller, noch eine Nachfrage zu dem, was die Kollegin gefragt hatte.
  Können Sie denn sagen ‑ wir gucken immer auf das Jahr 2029 ‑, welche dieser DPS-Fähigkeiten
  bis 2029 bei der Bundeswehr einsatzbereit sind? Das sind erst einmal unsere Fähigkeiten,
  die wir haben und die wir aktuell pflegen. Denn ‑ das muss man ganz klar sagen ‑
  in den Jahren davor, bevor sich die Sicherheitslage 2021 rapide geändert hat, wurden
  sie auch nicht in dem Maße gepflegt. Das ist einfach so. Sie kennen die Diskussion
  über Taurus. Darüber hinaus muss man jetzt abwarten, wie sich sowohl die Kaufmöglichkeiten
  als auch die Entwicklungsmöglichkeiten weiterentwickeln. Ich möchte noch einmal
  ganz klar sagen: An den DPS-Fähigkeiten Deutschlands hängt in Gänze nicht die Abschreckung
  der Verteidigungsfähigkeit Europas. Das ist ein wichtiger Puzzlebaustein, den wir
  aufbauen wollen, weil wir ja auch die qualitativ stärkste konventionelle Streitmacht
  Europas aufbauen wollen. In den NATO-Verteidigungsplänen sind diese Fähigkeiten
  eben mit Anteilen der Nationen hinterlegt. Da haben wir in Europa durchaus Fähigkeiten
  mit unseren Partnern gemeinsam. Da bleibt keine Lücke. Das habe ich ja vorhin klargemacht.
  Wenn eine Nation gegebenenfalls geografisch etwas verändert, heißt das nicht, dass
  diese Fähigkeit nicht verfügbar ist, sondern die wird weiterhin ein wichtiger Bestandteil
  sein, sowohl die amerikanischen Fähigkeiten als auch die Fähigkeiten in Europa.
  Dafür haben wir in Europa NATO-Hauptquartiere, die diese Verteidigungspläne, und
  zwar immer wieder, konsequent durchplanen und durchspielen und diese anpassen. Wenn
  es eine Verschiebung in Fähigkeiten gibt, dann gibt es diese. Sie hatten das ja
  mitbekommen, als wir über die Militärstrategie und das Fähigkeitsprofil der Bundeswehr
  geredet haben. Es zählt nicht unbedingt das System, sondern es zählt, welchen Effekt
  sie erzeugen und welche Fähigkeiten sie auf die Back stellen können. Das ist, was
  die NATO über die Verteidigungspläne gewährleistet. Herr Kornelius, die Tomahawk-Stationierung
  war ja vom Amtsvorgänger Olaf Scholz ohne Einbindung des Bundestages eingeleitet
  worden, und diese Mittelstreckenraketen hätten ja auch unter ausschließlicher Befehls-
  und Einsatzkontrolle der USA gestanden. Ist der Kanzler nicht insgeheim froh, dass
  er sich aus diesem umstrittenen Projekt jetzt so relativ elegant herauslösen kann?
  Ich glaube, Stationierungsfragen und Abschreckungsfragen sind keine Gefühlsfragen,
  das sind Fragen der politischen Vernunft. Deswegen werden sie nicht mit froh oder
  unfroh beantwortet. Ich denke, dass wir, wie Herr Müller das eben auch gesagt hat,
  weiterhin an einem umfassenden Abschreckungspaket arbeiten ‑ national, europäisch,
  auch mit den Verbündeten und vor allem im NATO-Rahmen. Deswegen ist es das Ziel
  der Bundesregierung, hier auch keine Lücke entstehen zu lassen und das auch einvernehmlich
  mit dem Bundestag zu regeln. Das heißt, wenn ich Sie richtig verstehe, grundsätzlich
  sieht auch Kanzler Merz kein Problem darin, dass die USA hier Mittelstreckenraketen
  stationiert, die auch atomar bestückt und ohne jegliche deutsche Kontrolle hätten
  abgefeuert werden können? Von einer atomaren Bestückung haben wir alle nicht gesprochen.
  Es gibt atomare Verteidigungspläne für Europa. Die Stationierungsfrage stellt sich
  momentan nicht. Es stellt sich die Frage, wie wir diese Verteidigungslücke, wie
  wir diese Abschreckungslücke schließen. Daran arbeiten wir mit hoher Geschwindigkeit.
  Herr Kornelius, ist denn die Ankündigung von Donald Trump, möglicherweise weit mehr
  als 5000 Soldaten aus Deutschland abzuziehen, anders als eine Drohung zu verstehen?
  Gibt es innerhalb der Bundesregierung Überlegungen, dass man unsererseits die Instrumente
  auf den Tisch legt und noch einmal über Ramstein redet? Ich habe keinerlei Anlass,
  hier über Inhalte oder Äußerungen des amerikanischen Präsidenten zu spekulieren.
  Der amerikanische Präsident ist derjenige, der die Äußerungen tätigt. Deswegen müssten
  Sie dort nach Motiven fragen. Die Bundesregierung möchte diese Themen intern mit
  den Partnern in den USA besprechen. Wir werden uns sehr kooperativ auf sachbezogener
  Ebene miteinander austauschen und werden da auch zu konstruktiven Ergebnissen kommen.
  Steht die die uneingeschränkte Nutzung von Ramstein noch einmal zur Debatte? Die
  Stationierung der amerikanischen Truppen in Europa dient auch dem amerikanischen
  Interesse. Es gibt Einrichtungen, die die USA hier nutzen. Wir haben unseren Anteil
  geleistet und sind dabei, ihn zu leisten. Ich muss nicht daran erinnern, dass wir
  vor einem Jahr das Fünf-Prozent-Ziel auf die Tagesordnung der NATO gehoben haben.
  Damit haben wir die NATO in die Richtung gebracht, dass sie amerikanische Verteidigungsfähigkeiten
  matcht, dass sie da also eine Parallelität herstellt. Die USA spielen eine wichtige
  Führungsrolle im Verteidigungsbündnis. Dafür steht übrigens auch Ramstein. Uns sind
  die US-Streitkräfte dort hochwillkommen. Wir sind froh, dass die USA den strategischen
  Wert dieses Standortes auch schätzen. Herr Müller, Deutschland unterstützt ja bekanntlich
  die Ukraine oder die Deep-Strike-Fähigkeiten der Ukraine mit einem Programm, das
  mehrere hundert Millionen Euro schwer ist. Meine Frage in diesem Zusammenhang: Wäre
  dann auch ein Weg rückwärts denkbar, dass sich Deutschland zum Ersatz der amerikanischen
  Mittelstreckenraketen, die dann wegfallen, aus ukrainischen Beständen, zum Beispiel
  aus dem Flamingo-System, bedient? Zum Vergleich der Systeme kann ich, ehrlich gesagt,
  wenig sagen, weil mir auch technische Details nicht vorliegen. Inwieweit ein Long-Range-Drohnensystem
  und ein Raketensystem, das seit 30 Jahren am Markt ist und entsprechende Evolutionen
  durchlaufen hat, (dazu geeignet wären), das kann ich nicht bewerten. Vielleicht
  haben Sie das Statement von Minister Pistorius von letzter Woche, als wir den Industriedialog
  mit der Ukraine bei uns im Haus hatten, verfolgt. Da hat er ganz klar gesagt, dass
  wir von den Fähigkeiten, die dort entwickelt werden ‑ die Systeme durchlaufen dort
  schnelle Innovationszyklen und werden hoch innovativ in kurzer Zeit entwickelt ‑,
  natürlich auch profitieren wollen. Dafür gibt es die Joint Ventures, dafür gibt
  es den regelmäßigen Erfahrungsaustausch auf Truppenebene, beim deutschen Heer zum
  Beispiel, aber natürlich auch industriell im Bereich der Rüstung. Das Voneinanderlernen
  ist auf jeden Fall einer der Schwerpunkte der strategischen Partnerschaft. Also
  gegebenenfalls auch bei Mittelstreckenraketen? Das muss sich ergeben, das muss man
  sehen. Wie gesagt, ich kann die Systeme nicht vergleichen; deswegen kann ich dazu
  keine Einschätzung abgeben. Ich hätte eine Frage zu der am letzten Donnerstag beschlossenen
  Einigung zum Gebäudeenergiegesetz , die den Mieterschutz betrifft. Ich vermute,
  angesprochen sind hier das Bauministerium, das Justizministerium, das Umweltministerium
  und das Wirtschaftsministerium, die alle daran mitgewirkt haben. Die SPD-Seite hat
  ja immer darauf gedrängt, dass die Mehrkosten, die durch den Einbau einer Gasheizung
  anfallen, nicht von den Mietern getragen werden dürfen. Wenn ich Ihre Einigung jetzt
  richtig verstehe, darf aber die Hälfte der anfallenden Mehrkosten doch von den Mietern
  getragen werden, und die Vermieter müssen nur die Hälfte zahlen. Da würde mich zum
  einen interessieren: Was hat den Ausschlag gegeben, dass man plötzlich doch mit
  einer halben Zusatzbelastung der Mieter einverstanden ist. Ich möchte dazu außerdem
  noch nachfragen: Diese hälftige Aufteilung gilt ja auch für den CO 2 -Preis. Dieser
  wurde bisher aber anders aufgeteilt, nämlich zu zwischen null und 95 Prozent für
  den Vermieter. Das heißt, in manchen Fällen werden die Vermieter da sogar bessergestellt
  als bisher. Was hat den Ausschlag dafür gegeben, die Vermieter stärker aus der Verantwortung
  zu nehmen? Vielleicht möchte zuerst das BMWE als Federführer etwas dazu sagen; dann
  könnte ich mich anschließen. Ich die hier gerne noch einmal die Grundsatzeinigung
  skizzieren. Das letzte Puzzlestück beim Gebäudemodernisierungsgesetz konnte ja geschlossen
  werden, und Sie haben recht: Eine Einigung konnte gefunden werden. Die Umsetzung
  der mietrechtlichen Vorschriften wurde geeint. Diese erfolgt im CO 2 -Kostenaufteilungsgesetz.
  Für neu eingebaute Heizungsanlagen gilt ab dem 1. Januar 1929 eine gesetzlich vorgeschriebene
  vierstufige Biotreppe, die Sie alle kennen. Für die Stufen eins bis drei teilen
  sich Mieter und Vermieter die Kosten für den anteiligen Preisbestandteil biogener
  Kraftstoffe jeweils zur Hälfte. Dazu bedarf es Regelungen, die jetzt im parlamentarischen
  Verfahren entsprechend eingeführt werden. Sie haben es auch angesprochen: Die anfallenden
  Kohlendioxidkosten werden ab dem 1. Januar 2028 ebenfalls hälftig zwischen Mieter
  und Vermieter aufgeteilt. Drittens: Anfallende Gasnetzentgelte werden ab dem 1. Januar
  2028 ebenfalls hälftig zwischen Mieter und Vermieter aufgeteilt. ‑ So viel noch
  einmal zu den Rahmenbedingungen. Ich kann dazu vielleicht noch ergänzen: Die Ministerin
  hat sich letzte Woche auch noch einmal dazu geäußert, dass das ein großer Kompromiss
  ist, der jetzt zwischen den Fraktionen und zwischen den beteiligten Ministerien
  erreicht worden ist. Die Ministerin hat auch noch einmal betont: Das ist jetzt der
  Kompromiss in Bezug auf Wahlfreiheit und Technologieoffenheit, bei dem man den Mieterschutz
  noch einmal deutlich gestärkt hat. Das ist jetzt also das Ergebnis, wie es der Kollege
  auch schon vorgestellt hat. Ich habe dem erst einmal nichts hinzuzufügen. Ich habe
  jetzt aber keine Antwort auf die Frage, inwieweit es eine Verbesserung ist, wenn
  die Vermieter beim CO 2 sogar weniger zahlen, und inwieweit es eigentlich ein Erfolg
  für Sie sein kann, wenn nur die Hälfte der Mehrkosten von den Vermietern getragen
  werden. Wie gesagt, das ist ein Kompromiss, den wir jetzt erzielt haben, und es
  ist eine entscheidende Stärkung für den Mieterschutz. Darüber hinaus geht es jetzt
  darum, die konkreten Regelungen auszuarbeiten. Da würde ich mich zu den internen
  Abstimmungen auch nicht äußern. Ich würde es ganz gerne verstehen: Tatsächlich bedeutet
  die Aufteilung des CO 2 -Preises an der Stelle zumindest für manche, nämlich für
  die Mieter in schlecht gedämmten Gebäuden bzw. Gebäuden mit Heizanlagen, die zu
  viel CO 2 ausstoßen, eine Verschlechterung gegenüber dem Status quo. Da würde ich
  von Ihnen gerne erklärt bekommen: War diese Mehrbelastung für Mieter jetzt nötig?
  Das Entscheidende ist ja, dass vor allen Dingen auch die Vermieter mit einbezogen
  werden. Diese 50-50-Lösung ist eine griffige Lösung, die wir im Rahmen dieses Kompromisses
  erzielt haben. Insofern werden die Mieter ja bessergestellt. Das kann ich gerade
  intellektuell noch nicht ganz nachvollziehen. Helfen Sie mir an der Stelle vielleicht
  einfach auf die Sprünge: Inwiefern ist eine Schlechterstellung gegenüber dem Status
  quo eine Besserstellung? Wie gesagt, in den Verhandlungen zu diesem Kompromiss,
  den wir jetzt zu der Anpassung des GMG erzielt haben, haben wir eine Verbesserung
  erreicht, indem eben auch die Vermieter mit einbezogen werden und insofern die Mieter
  bessergestellt werden. Es betrifft ja auch nicht nur die CO 2 -Entgelte, sondern
  auch andere Nebenkosten. Mehr kann ich dazu an dieser Stelle nicht sagen. Herr Greve,
  Sie haben eben gesagt, wir alle würden die Biotreppe kennen. Es wäre schön, wenn
  wir die kennen würden; meines Erachtens kennt die bisher niemand. Wie hoch sie über
  die zehn Prozent hinaus, die als erster Schritt für 2029 festgelegt sind, ausfallen
  wird, weiß ich jedenfalls noch nicht. Helfen Sie mir da noch einmal, damit wir die
  alle kennen. Ich meinte natürlich, dass Sie das Instrument der Biotreppe und die
  entsprechenden Ankündigungen kennen. Den Ausarbeitungen im parlamentarischen Verfahren
  kann ich hier aber nicht vorgreifen. Das heißt auf gut Deutsch: Die gibt es nach
  wie vor nicht? Dazu habe ich hier nichts weiter mitzuteilen. Herr Kirschner, können
  Sie noch einmal grundsätzlich erklären, warum Eigentümer von Immobilien weiterhin
  Öl- und Gasheizungen einbauen können? Ich glaube, zu diesem Thema haben wir hier
  jetzt alles gesagt. Der Kollege hat es auch schon ausgeführt: Es ist eben ein Kompromiss,
  den wir in der Koalition soweit erzielt haben. Jetzt geht es um die Ausformulierung
  der konkreten Regelungen, und dann folgt ja auch noch das parlamentarische Verfahren.
  Die Frage stützt sich darauf, dass schon die alten Kompromisse angesichts der Notwendigkeit
  des Klimaschutzes zu wenig waren. Da musste ja jede neu eingebaute Heizung mit mindestens
  65 Prozent erneuerbaren Energien betrieben werden, und das fällt jetzt weg. Inwiefern
  ist das also in irgendeiner Weise zukunftsfähig? Abgesehen von den Auswirkungen
  auf das Klima müssen die Mieter dann ja noch mehr für CO 2 zahlen. Wem nützt das?
  Zum Mieterschutz habe ich ja schon ausgeführt. Ich weiß nicht, ob das BMWE noch
  etwas zur Wahlfreiheit des Vermieters bei der Heizung sagen möchte. Ich denke aber,
  wir haben hier jetzt alles gesagt ‑ ‑ Die Frage war jetzt aber: Inwiefern schützt
  das Mieter? Was die Mieter schützt, ist der Kompromiss, den wir erreicht haben.
  Möchte das Wirtschaftsministerium noch etwas ergänzen? Ich kann gerne noch ergänzen,
  dass die vom Koalitionsausschuss eingesetzte Verhandlungsgruppe hier jetzt ein sehr
  gutes Ergebnis erzielt hat. Kleinteilige Vorschriften des Gebäudeenergiegesetzes ‑
  angefangen von der 65-Prozent-Quote für erneuerbare Energien über Zwangsberatungen
  beim Heizungstausch bis zu Heizungsverboten genauso wie Betriebsverboten für bestimmte
  Heizungen in verschiedenen Gebäudetypen ‑ sind gemäß Koalitionsvertrag abgeschafft
