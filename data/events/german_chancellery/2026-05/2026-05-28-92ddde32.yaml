title: Fragen und Antworten Was ist Leichte Sprache?
text: 'Leichte Sprache erleichtert Menschen mit Lernschwierigkeiten das Verstehen.
  Aber auch Menschen mit bestimmen Erkrankungen profitieren davon. Texte in Leichter
  Sprache informieren in einer verständlicheren Form. Sie richten sich an Menschen
  mit Einschränkungen beim Lesen und Verstehen. Texte in Leichter Sprache sind ein
  Zusatzangebot. Sie ersetzen nicht den Originaltext und verdrängen nicht die Standard-
  oder Fachsprache. Texte in Leichter Sprache haben keine Rechtskraft. Wesentliches
  Merkmal der Leichten Sprache ist es, dass übersetzte Texte immer von mindestens
  zwei Personen aus der Zielgruppe auf Verständlichkeit überprüft werden. Leichte
  Sprache orientiert sich an einem festen Regelwerk, das Sprach- und Rechtschreibregeln
  umfasst sowie Empfehlungen zu Typografie und Mediengebrauch. Das heißt: Texte werden
  durch Leichte Sprache verständlicher – weil einfache Wörter, kurze Sätze, ein aktiver und
  verbaler Schreibstils, ein bestimmter Textaufbau und visuelle Gestaltung verwendet
  werden. Zum Beispiel beginnt jeder Satz auf einer neuen Zeile. Entwickelt wurde
  die Leichte Sprache aus der Behindertenrechtsbewegung und von Menschen mit geistiger
  Behinderung beziehungsweise mit Lernschwierigkeiten. Die Leichte Sprache erleichtert
  aber nicht nur Menschen mit Lernschwierigkeiten das Verstehen. Von ihr profitieren
  auch Menschen, die etwa unter funktionalem Analphabetismus leiden oder an bestimmten
  Erkrankungen wie Aphasie (erworbene Sprachstörung), prälingualer Hörschädigung oder
  Demenz. Nur wer informiert ist, kann mitreden und mitbestimmen. Dies gilt auch für
  Menschen mit kognitiven Einschränkungen oder Lernschwierigkeiten. Leichte Sprache
  dient damit der Barrierefreiheit. Barrierefreiheit ist ein verbrieftes Recht, das
  sich unter anderem aus Artikel 9 der UN -Behindertenrechtskonvention ergibt. Barrierefreiheit
  ist die Grundlage für die umfassende Information und Teilhabe aller Bürgerinnen
  und Bürger – egal ob mit oder ohne Behinderungen. Laut Behindertengleichstellungsgesetz
  (BGG) und der Barrierefreie-Informationstechnik-Verordnung (BITV 2.0) sind alle
  Träger öffentlicher Gewalt verpflichtet, ihre digitalen Angebote barrierefrei zu
  gestalten. Auch die Bundesregierung bietet Informationen in Leichter Sprache sowie
  in Gebärdensprache an. Die Bundesregierung hat Mitte Februar 2026 eine Reform des
  Behindertengleichstellungsgesetzes beschlossen. Das Gesetz sieht unter anderem vor,
  dass ein Bundeskompetenzzentrum für Leichte Sprache und Deutsche Gebärdensprache
  eingerichtet wird. Es soll die Bundesministerien und ihre nachgeordneten Behörden
  dabei beraten, Informationen in Gebärdensprache und Leichter Sprache zur Verfügung
  zu stellen. Im Publikationsportal der Bundesregierung können aktuell bereits Informationen
  der Ministerien in Leichter Sprache heruntergeladen werden.'
