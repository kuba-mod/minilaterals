title: Maßnahmen der Bundesregierung gegen Gewalt Schutz vor Gewalt gegen Frauen
text: 'Frauen, die Hilfe oder Beratung suchen, können sich beispielsweise telefonisch
  oder online an das Hilfetelefon „Gewalt gegen Frauen“ (116 016) wenden. Es gibt
  viele Erscheinungsformen von Gewalt gegen Frauen: körperliche Gewalt, sexualisierte
  Gewalt und sexuelle Belästigung, psychische Gewalt und strukturelle Gewalt, die
  persönliche Freiheiten und Lebenschancen einschränkt. Hier finden Sie eine Übersicht
  mit Hintergründen zu verschiedenen Formen der Gewalt . Das Hilfetelefon „Gewalt
  gegen Frauen“ ist ein bundesweites Beratungsangebot für Frauen, die Gewalt erlebt
  haben oder noch erleben. Unter der Nummer 116 016 und via Online -Beratung werden
  Betroffene aller Nationalitäten, mit und ohne Behinderung – 365 Tage im Jahr, rund
  um die Uhr unterstützt. Auch Angehörige, Freundinnen und Freunde sowie Fachkräfte
  werden anonym und kostenfrei beraten. Unter der Nummer 116 016 und via Online-Beratung
  unterstützt das Hilfetelefon „Gewalt gegen Frauen“ Betroffene rund um die Uhr. Zudem
  finden v on Gewalt betroffene Frauen auf der Webseite des Vereins Frauenhauskoordinierung
  e.V. Kontakte zu Frauenhäusern. Der Verein wird vom Bundesfamilienministerium gefördert
  und unterstützt deutschlandweit Frauenhäuser und Fachberatungsstellen fachlich und
  bei ihrer politischen Arbeit. Jede Frau hat das Recht auf ein Leben ohne Gewalt
  und frei von Bedrohung. Das gilt im öffentlichen Raum, in den eigenen vier Wänden
  und auch im digitalen Raum. Die Bundesregierung arbeitet deshalb entschlossen daran,
  Gewalt zu bekämpfen, Strukturen zu verbessern und Betroffenen die Unterstützung
  zu geben, die sie brauchen. Die Bundesregierung hat einen neuen Gewaltschutz auf
  den Weg gebracht. Dieser verankert erstmals die elektronische Fußfessel bundeseinheitlich
  und stärkt den Schutz vor häuslicher Gewalt. Durch verpflichtende Anti-Gewalt-Trainings
  sollen Gewaltspiralen durchbrochen werden. Betroffene von schweren Straftaten sollen
  im Verfahren vor Gericht leichter professionelle Unterstützung erhalten können.
  Dazu hat die Bundesregierung einen Gesetzentwurf zur Stärkung der Rechte von Verletzten
  auf den Weg gebracht. Wer sogenannte K.-o. -Tropfen zur Begehung einer Vergewaltigung
  oder eines Raubes einsetzt, soll zukünftig mit mindestens fünf Jahren Freiheitsstrafe
  rechnen. Der entsprechende Gesetzentwurf wurde von der Bundesregierung beschlossen.
  Hass, Deepfakes und Beleidigungen im Netz treffen vor allem Frauen. Das Bundesministerium
  für Justiz und Verbraucherschutz hat ein digitales Gewaltschutzgesetz vorgelegt.
  Ziel ist es, es den Betroffenen künftig leichter zu machen, gegen Verletzungen ihrer
  Persönlichkeitsreche im Netz vorzugehen und etwa Accounts per richterlicher Anordnung
  sperren zu lassen, wenn diese massiv ihre Rechte verletzen. Zudem sollen Strafbarkeitslücken
  bei pornografischen Deepfakes und anderen Formen bildbasierter sexualisierter Gewalt
  schließen. Ziel ist zudem, das Herstellen und Verbreiten pornografischer Deepfakes
  künftig unter Strafe zu stellen. Das im Februar 2025 verabschiedete Gewalthilfegesetz
  (GewHG) etabliert ab 2032 einen Rechtsanspruch auf kostenlosen Schutz und Beratung
  für von Gewalt betroffene Frauen und deren Kinder in Deutschland. Es verpflichtet
  Länder und Kommunen zu einem bedarfsgerechten Ausbau von Frauenhäusern und Beratungsstellen,
  um bundesweit einheitliche Hilfe unabhängig vom Wohnort zu sichern. Der Bund unterstützt
  die Länder zwischen 2027 und 2036 mit 2,6 Milliarden Euro, um den Ausbau zu finanzieren.'
