title: Hilfe für die Ukraine Was tut die EU für die Ukraine?
text: 'Die EU steht an der Seite der Ukraine und hat umfassende Hilfsmaßnahmen eingeleitet.
  Seit Beginn des russischen Angriffskriegs gegen die Ukraine hat die EU strenge Sanktionen
  verhängt, umfangreiche Hilfsmaßnahmen gestartet und finanzielle Unterstützung bereitgestellt.
  Auch die langfristige Wiederaufbauhilfe ist ein zentrales Anliegen der EU . Mit
  der Verabschiedung des 20. EU-Sanktionspakets im April 2026 wird der Druck auf Russland
  weiter erhöht. Die Ukraine wird zudem in ihrer Verteidigungsfähigkeit mit einem
  90-Milliarden-Euro-Kredit der Europäischen Union substanziell unterstützt. Hier
  ein Überblick über die ergriffenen Maßnahmen. Die Europäische Union hat gemeinsam
  mit ihren internationalen Partnern massive Sanktionen gegen Russland beschlossen.
  Sie zielen insbesondere darauf, die russische Wirtschaft und die politische Elite
  massiv zu schwächen - die Sanktionen zeigen Wirkung. Diese Bereiche sind betroffen:
  Die EU -Staaten haben sich im April 2026 auf ein 20. Sanktionspaket gegen Russland
  geeinigt. Die Sanktionen zielen darauf ab, die Energieeinnahmen Russlands zu verringern,
  Russlands Bankensystem einzuschränken und den Betrieb der Schattenflotte einzudämmen.
  Die neuen Maßnahmen sollen den Druck auf Russland erhöhen, ernsthafte Verhandlungen
  zu Bedingungen aufzunehmen, die für die Ukraine akzeptabel sind. Weitere Informationen
  zu den Sanktionen gegen Russland finden Sie hier sowie auf der Webseite des Rates
  der EU und des Europäischen Rates: EU -Sanktionen gegen Russland erklärt . Die Staats-
  und Regierungschefinnen und -chefs der EU haben bei ihrem Gipfel in Brüssel im Februar
  2024 eine gemeinsame Entscheidung über den Mehrjährigen Finanzrahmen (MFR) getroffen.
  Damit verbunden ist ein klares Bekenntnis zur finanziellen Unterstützung der Ukraine
  in Höhe von 50 Milliarden Euro. Bis 2027 sollen jährlich zwölf Milliarden Euro als
  Finanzmittel für die Ukraine bereitgestellt werden. Diese Einigung umfasst eine
  Mittelverstärkung von knapp 65 Milliarden Euro, davon 50 Milliarden Euro für die sogenannte
  Ukraine-Fazilität , also Kreditmöglichkeiten, die bei Bedarf in Anspruch genommen
  werden können. Mit der Ukraine-Fazilität will die EU dem Land zwischen 2024 und
  2027 berechenbare und flexible Unterstützung bieten. Um die finanziellen Interessen
  der EU zu schützen, soll die Fazilität mit einem robusten Rahmen für Transparenz,
  Rechnungsprüfung und Kontrolle ausgestattet werden. Im Oktober 2024 verabschiedete
  die EU ein neues Finanzhilfepaket . Es besteht aus einer außerordentlichen Makrofinanzhilfe
  sowie einem Kooperationsmechanismus für Darlehen. Finanziert werden soll der Kooperationsmechanismus
  durch außerordentliche Einnahmen aus eingefrorenem russischem Staatsvermögen. Von
  der außerordentlichen Makrofinanzhilfe wurden bisher 18,1 Milliarden Euro an die
  Ukraine ausgezahlt. Um den Finanzierungsbedarf der Ukraine für 2026 und 2027 zu
  decken, wird die EU ein Darlehen in Höhe von 90 Milliarden Euro durch EU -Anleihen
  auf den Kapitalmärkten bereitstellen. Am 23. April 2026 wurde das Unterstützungsdarlehen
  verabschiedet. Die EU finanziert die Lieferung von Waffen und Ausrüstung an die
  ukrainischen Streitkräfte. Rund 17 Milliarden Euro zusätzlicher militärischer Hilfe
  für die Ukraine wurden innerhalb der Europäischen Friedensfazilität beziehungsweise
  von den einzelnen Mitgliedstaaten bilateral bereitgestellt. Finanziert werden damit
  unter anderem gepanzerte Fahrzeuge, Panzer, schwere Artillerie und Munition. Die EU-Mitgliedstaaten
  haben beim Rat für Auswärtige Angelegenheiten die militärische Unterstützungsmission
  zur Unterstützung der ukrainischen Streitkräfte (EUMAM Ukraine) beschlossen. Die
  Ukraine hat deutlich gemacht, dass ihr Bedarf an Unterstützung bei der Ausbildung
  ihrer Streitkräfte im Verteidigungskampf gegen den russischen Überfall auf ihr Land
  weiterhin hoch ist. Im Rahmen von EUMAM wurden bis Anfang 2026 rund 87.000 ukrainische Soldatinnen
  und Soldaten aus- und weitergebildet. Das Programm ist offen für die Beteiligung
  von Drittstaaten. Die ukrainischen Soldaten werden ausschließlich auf dem Territorium
  der EU-Mitgliedstaaten ausgebildet. Die EU -Innenministerinnen und -minister haben
  am 4. März 2022 einstimmig die Richtlinie über den vorübergehenden Schutz der Kriegsflüchtlinge
  aktiviert. Seither wurde mehr als vier Millionen Flüchtlingen aus der Ukraine Sicherheit
  und Schutz gewährt. Der vorübergehende Schutz wurde bis zum 4. März 2027 verlängert.
  Der Schutzstatus bedeutet: Ausführliche Informationen zur Umsetzung der Richtlinie
  über den vorübergehenden Schutz finden Sie auf der Website der Europäischen Kommission
  . Neben der Verlängerung des vorübergehenden Schutzes erörtern die Mitgliedstaaten
  derzeit eine Empfehlung des Rates zur Vorbereitung eines koordinierten Übergangs
  aus dem vorübergehenden Schutz (Ausstiegsstrategie aus dem vorübergehenden Schutz).
  Die Empfehlung befasst sich unter anderem mit dem Wechsel zu anderen rechtlichen
  (Aufenthalts-)Titeln, der Ermöglichung einer schrittweisen Rückkehr in die Ukraine
  und der Bereitstellung von mehr Information über die verfügbaren Optionen. Am 27.
  April 2022 hat die EU -Kommission mehr als 3,5 Milliarden Euro Vorfinanzierung an
  die Mitgliedstaaten gezahlt, um sie bei der Versorgung der Kriegsflüchtlinge aus
  der Ukraine zu unterstützen. Die Zahlungen für die Aufbauhilfe für den Zusammenhalt
  und die Gebiete Europas (REACT-EU) erfolgten durch den Einsatz von Kohäsionsmitteln
  zugunsten von Flüchtlingen in Europa ( Cohesion Action for Refugees in Europe /CARE).
  Darüber hinaus werden den Mitgliedstaaten aus dem Fonds im Bereich Inneres 2021
  bis 2027 umfangreiche Mittel bereitgestellt, damit sie angemessene Aufnahmeeinrichtungen
  und wirksame Asylverfahren für die ukrainischen Flüchtlinge gewährleisten können.
  Weitere Informationen zur finanziellen Unterstützung der Kriegsflüchtlinge finden
  Sie auf den Seiten des Europäischen Rates . Neben der finanziellen Unterstützung
  hat die EU -Kommission eine Solidaritätsplattform geschaffen, über welche die Mitgliedstaaten
  sich über ihre Aufnahmekapazitäten austauschen können. Zudem stellen verschiedene
  Webseiten der EU Informationen für Kriegsflüchtlinge aus der Ukraine bereit – zum
  Beispiel zu Themen wie Aufnahmeverfahren und Sozialleistungen. Die EU -Kommission
  versucht, gezielt operativ tätig zu werden, um die Effizienz und Sicherheit beim
  Grenzmanagement zu gewährleisten. Zudem unterstützen EU -Agenturen die Mitgliedstaaten
  mit Personal und Fachwissen, sodass Wartezeiten reduziert und ein hohes Maß an Sicherheit
  aufrechterhalten werden kann. Zwischen 2022 und 2026 hat die EU 1,4 Milliarden Euro
  und die Mitgliedsstaaten 3,4 Milliarden Euro an humanitärer Hilfe für die vom Krieg
  in der Ukraine betroffene Zivilbevölkerung bereitgestellt. Mit dem Geld wird eine
  breite Palette an Hilfe finanziert. Essen, Wasser, lebenswichtige Haushaltsartikel,
  Gesundheitsversorgung, psychosoziale Unterstützung, Notunterkünfte, Schutz und Bargeldhilfe
  zur Deckung der Grundbedürfnisse. Darüber hinaus wurden der Ukraine von den EU -Mitgliedstaaten
  und Partnern über das Katastrophenschutzverfahren der Union 155 000 Tonnen Sachleistungen
  im geschätzten Wert von über 970 Millionen Euro geliefert, darunter unter anderem
  Unterkünfte, Energie und medizinische Ausrüstung. Die EU setzt sich für wirksame
  Instrumente zum nachhaltigen Wiederaufbau der Ukraine ein. Durch den Krieg ist bereits
  viel Infrastruktur in der Ukraine zerstört worden. Hierzu zählen unter anderem zerstörte
  Schulen, Krankenhäuser, Kraftwerke, Bahnhöfe und ein Drittel der Energieinfrastruktur.
  Zusammen mit der Hilfe der internationalen Staatengemeinschaft wurde am 26. Januar
  2023 die Geberkoordinierungsplattform eingerichtet, die den Wiederaufbauprozess
  in der Ukraine koordiniert. Über sie können sich internationale Geber und Finanzinstitute
  eng abstimmen, damit die Unterstützung kohärent, transparent und nachvollziehbar
  erfolgt. Auf der Plattform Wiederaufbau Ukraine können sich Kommunen in Deutschland
  und hier ansässige Unternehmen sowie Wissenschaft und Zivilgesellschaft gezielt
  über den Wiederaufbau in der Ukraine informieren, sich engagieren und miteinander
  vernetzen. Im Februar 2024 beschloss die Europäische Union die Einrichtung der Ukraine-Fazilität,
  eines speziellen Finanzierungsinstruments. Ziel ist es, der Ukraine zwischen 2024
  und 2027 eine verlässliche finanzielle Unterstützung zu bieten, um deren Erholung,
  Wiederaufbau und Modernisierung voranzutreiben. Insgesamt stehen für dieses Programm
  50 Milliarden Euro zur Verfügung. Seit Juni 2024 laufen EU -Beitrittsverhandlungen
  mit der Ukraine. Es ist ein wichtiges Zeichen, dass die Zukunft der Ukraine und
  ihrer Bürgerinnen und Bürger in der Europäischen Union liegt. Im September 2025
  hat die Ukraine das Screening-Verfahren der Verhandlungskapitel mit der Europäischen
  Kommission abgeschlossen. Im April 2026 empfing Bundeskanzler Friedrich Merz den
  ukrainischen Präsidenten Wolodymyr Selenskyj zu Deutsch-Ukrainischen Regierungskonsultationen
  in Berlin. Beide Regierungen verständigten sich auf eine gemeinsame Erklärung über
  eine strategische Partnerschaft. Deutschland bekräftigt, laut Bundeskanzler Merz,
  weiterhin seine Unterstützung für die Mitgliedschaft der Ukraine in der EU und unterstützt
  nachdrücklich die sofortige Eröffnung aller Verhandlungscluster. Deutschland wird
  die Anpassung des innerstaatlichen Rechts der Ukraine an den Acquis communautaire
  der EU sowie demokratische und Reformprozesse in der Ukraine weiter unterstützen.
  Eine Zeitleiste sowie weitere Informationen zur Heranführung der Ukraine an die
  Europäische Union finden Sie auf den Seiten der Europäischen Kommission . Die EU
  -Kommission koordiniert die medizinischen Hilfsgüter und Katastrophenschutzmittel,
  die von den Mitgliedsstaaten bereitgestellt werden. Ganz konkret heißt das: Bedürftige
  in der Ukraine und in den Nachbarländern Polen, Slowakei und Moldau werden mit Millionen
  von Gütern versorgt – darunter Fahrzeuge, medizinische Ausrüstung, Zelte, Decken
  und Schlafsäcke. Ein wesentlicher Beitrag der Hilfsgüter kommt aus den Beständen
  von rescEU, einem von der EU angelegten Notfallbestand an Hilfsmitteln. Mehr Informationen
  zum EU-Katastrophenschutz finden Sie auf der Webseite des Europäischen Rates . Was
  ist das EU -Katastrophenschutzverfahren? Das EU -Katastrophenschutzverfahren ist
  ein Abkommen der Europäischen Union, das eine verstärkte Zusammenarbeit der Mitgliedstaaten
  im Fall von Katastrophen regelt. Aktuell findet im Kontext des Angriffskrieges auf
  die Ukraine die bislang umfassendste Aktivierung des Verfahrens statt. Seit Beginn
  des russischen Angriffskriegs gegen die Ukraine gibt es zahlreiche Berichte, die
  darauf hindeuten, dass dort schwere Menschenrechtsverletzungen und Kriegsverbrechen
  verübt wurden und weiterhin stattfinden. Die Spitzen der Europäischen Union haben
  wiederholt die willkürlichen Angriffe Russlands auf zivile Einrichtungen und die
  Bevölkerung verurteilt. Dabei betonen sie die Notwendigkeit, das humanitäre Völkerrecht
  uneingeschränkt zu wahren. Die EU und ihre Mitgliedstaaten stehen der Ukraine vollumfänglich
  zur Seite und setzen sich dafür ein, dass die Verantwortlichen für diese grausamen
  Verbrechen juristisch zur Rechenschaft gezogen werden. Im März 2022 haben alle EU-Mitgliedstaaten
  zusammen mit anderen Partnerländern beschlossen, gemeinsam den Internationalen Strafgerichtshof
  mit der Lage in der Ukraine zu befassen.'
