title: Energiesteuersenkung im Bundesrat beschlossen Schnelle Hilfen für Verbraucher
  und Wirtschaft auf dem Weg
text: Um die hohen Spritpreise abzufedern, wird die Mineralölsteuer für zwei Monate
  gesenkt. Angesichts der hohen Energiepreise hat sich die Regierungskoalition aus
  CDU , CSU und SPD auf spürbare Entlastungen für Bürgerinnen und Bürger sowie Unternehmen
  geeinigt. Zentrales Element ist die Senkung der Energieölsteuer. Sie soll um circa
  17 Cent pro Liter für zwei Monate reduziert werden. Das hat nach dem Bundestag nun
  auch der Bundesrat am 24. April in einer Sondersitzung beschlossen. Ab dem 1. Mai
  werden die Energiesteuersätze für Diesel und Benzin für zwei Monate um 14,04 Cent
  je Liter gesenkt. Zusammen mit dem darauf anfallenden Umsatzsteueranteil ergibt
  sich daraus eine Entlastung von bis zu 17 Cent brutto pro Liter. Bundeskanzler Friedrich
  Merz betonte, dieser Schritt werde „sehr schnell die Lage für die Autofahrer und
  für die Betriebe im Land verbessern und vor allem für diejenigen, die vor allem
  aus beruflichen Gründen sehr viel mit dem Auto unterwegs sind“. Mit diesen Maßnahmen
  will die Regierungskoalition kurzfristig die Bürgerinnen und Bürger sowie die Wirtschaft
  entlasten und gleichzeitig strukturelle Reformen einläuten. Die Koalition sei hier
  auf einem guten gemeinsamen Weg, betonte Kanzler Merz. Zugleich sei auch klar, dass
  wir noch vieles zu tun haben. „Das ist erst der Anfang“, so Merz.
