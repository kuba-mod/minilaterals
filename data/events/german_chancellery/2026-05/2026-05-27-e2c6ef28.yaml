title: Bundeskanzler Merz gratuliert dem Premierminister von Niue, Herrn Dalton Tagelagi
text: Sehr geehrter Herr Premierminister, zu Ihrer Wiederwahl zum Premierminister
  von Niue gratuliere ich Ihnen herzlich. Ich freue mich darauf, gemeinsam mit Ihnen
  die Zusammenarbeit zwischen unseren Ländern aufzubauen und weiter zu entwickeln.
  Für Ihre bevorstehenden Aufgaben wünsche ich Ihnen viel Erfolg und stets gutes Gelingen.
  Mit freundlichen Grüßen Friedrich Merz Bundeskanzler der Bundesrepublik Deutschland
