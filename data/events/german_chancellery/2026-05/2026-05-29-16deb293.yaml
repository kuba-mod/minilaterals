title: Bundeskanzler Merz empfängt den ungarischen Ministerpräsidenten Magyar
text: Bundeskanzler Friedrich Merz wird am 2. Juni 2026 um 12 Uhr den ungarischen
  Ministerpräsidenten Péter Magyar zu seinem Antrittsbesuch mit militärischen Ehren
  im Bundeskanzleramt empfangen. In ihrem anschließenden Gespräch werden neben bilateralen
  und europapolitischen Themen auch die weitere Unterstützung der Ukraine sowie die
  euro-atlantische Sicherheit im Mittelpunkt stehen.
