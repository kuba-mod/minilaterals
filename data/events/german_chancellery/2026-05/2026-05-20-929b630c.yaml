title: Lärmschutz-Ausnahmen zur Fußball-Weltmeisterschaft 2026 Public Viewing bis
  in die Nacht
text: Damit Fußballfans auch bei der kommenden WM mitjubeln können, hat die Bundesregierung
  vorübergehend den Lärmschutz angepasst. Die Bundesregierung hat für die Übertragungen
  der Spiele der Fußball-Weltmeisterschaft der Männer in diesem Sommer wieder eine
  befristete Verordnung vorgelegt. Diese sieht Ausnahmen vom Lärmschutz für Public
  Viewing -Veranstaltungen vor. Die Bundesregierung kommt damit dem Wunsch der Bundesländer
  nach. Denn sie haben keine Befugnisse im Lärmschutzrecht. Einem Public Viewing der
  WM -Übertragungen auch teilweise bis spät in die Nacht hat der Bundesrat nun auch
  formal zugestimmt. Die Fußball- WM der Männer wird in diesem Jahr vom 11. Juni bis
  19. Juli in Mexiko, Kanada und den USA ausgetragen. Die Live -Übertragungen der
  Spiele werden damit in Deutschland eher in die späteren Abendstunden fallen. Sowohl
  die 72 Spiele der Vorrunde als auch die 32 Spiele der Finalrunde werden teilweise
  während der Nachtzeit von 22 bis 6 Uhr Mitteleuropäischer Sommerzeit stattfinden.
  Trotzdem wird das Interesse an öffentlichen Übertragungen, oft auch im Freien, hierzulande
  voraussichtlich groß sein. Die generelle Regelung zum Lärmschutz greift grundsätzlich
  um 22 Uhr. Zudem gilt auch ein Mindestschutzanspruch der Bevölkerung gegen nächtliche
  Lärmstörungen. Ausnahmen sind wie in diesem konkreten Falle möglich. Es besteht
  jedoch kein Anspruch darauf, dass Public Viewing -Veranstaltungen erlaubt werden.
  Die Fußball-Weltmeisterschaft ist mit 104 Spielen an 34 Tagen, verschiedenen Zeitzonen
  und vielen Anstoßzeiten sehr umfangreich. Deshalb muss jede Veranstaltung einzeln
  geprüft werden. Die zuständige Behörde vor Ort entscheidet dann nach sorgfältiger
  Abwägung, ob sie erlaubt wird.
