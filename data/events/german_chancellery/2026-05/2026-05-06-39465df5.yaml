date: '2026-05-06'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 6. Mai 2026
text: 'stellvertretender Regierungssprecher Hille (Vorsitzender Szent-Iványi eröffnet
  die Pressekonferenz und begrüßt SRS Hille sowie die Sprecherinnen und Sprecher der
  Ministerien.) Vielen Dank, Herr Szent-Iványi! Ein herzliches Willkommen auch von
  mir hier, von dieser Position aus. Heute ist ein für Deutschland besonderes Datum.
  Die Hiesigen wissen es, die Gäste wahrscheinlich nicht. Heute ist die Bundesregierung
  nämlich auf den Tag seit genau einem Jahr im Amt . Auch wenn öffentlich vielleicht
  in Teilen ein etwas anderes Bild besteht, ist in diesen zwölf Monaten aus unserer
  Sicht ziemlich viel passiert. Ich möchte die Gelegenheit hier nutzen, noch einmal
  ein paar Eckpunkte, sozusagen wichtige Wegmarken, in Erinnerung zu rufen, denn in
  den ersten zwölf Monaten hat die schwarz-rote Koalition den Politikwechsel in zentralen
  Bereichen vorangetrieben und wichtige Entscheidungen für die Zukunft unseres Landes
  getroffen. Für die Fans von Zahlen ‑ ich weiß, dass es hier einige von ihnen gibt ‑
  habe ich auch ein paar Zahlen mitgebracht: Insgesamt hat die Bundesregierung in
  den ersten zwölf Monaten 190 Gesetze und Maßnahmen beschlossen, das Ganze in 43 Kabinettssitzungen
  und ‑ das sage ich für die Vollständigkeit ‑ auch mit drei Umlaufverfahren. Als
  kleiner Vergleich: Bei der Ampelregierung waren es im gleichen Zeitraum 94 Gesetze
  und Maßnahmen. Insbesondere zu den Themen der wirtschaftlichen Stärke, von Sicherheit,
  Migration und des gesellschaftlichen Zusammenhalts hat die Bundesregierung richtungsweisende
  Entscheidungen auf den Weg gebracht. Zu den zentralen Maßnahmen in diesen Bereichen
  zählen das Investitionssofortprogramm, Entlastungen bei Energiekosten für Wirtschaft
  und Verbraucher, die Beschleunigung des Wohnungsbaus mit dem sogenannten Bau-Turbo,
  die Modernisierungsagenden für Bund und Länder, das erste Rentenpaket, die Aktivrente,
  massive Investitionen in die Verteidigung, die Einführung des neuen Wehrdienstes,
  das KRITIS-Dachgesetz, die Reform des Bürgergeldes sowie Regelungen zur drastischen
  Reduzierung der irregulären Migration. Diese Auflistung ist natürlich bei Weitem
  kein vollständiger Katalog und soll nur noch einmal die Breite und den Umfang der
  Maßnahmen deutlich machen, die die Bundesregierung in den ersten zwölf Monaten auf
  den Weg gebracht hat. Aber ‑ auch dabei braucht man nicht drum herum zu reden ‑
  die Herausforderungen, vor denen Deutschland innen- wie außenpolitisch steht, sind
  natürlich nach wie vor enorm. Dessen sind wir uns bewusst. Wir haben allerdings
  aus unserer Sicht auch allen Grund für Zuversicht, denn Deutschland ist nach unserer
  Überzeugung ein starkes Land. Dieses Land hat enormes Potenzial, in vielen Feldern
  führend in der Welt zu sein. Dieses Potenzial müssen wir gemeinsam heben und wieder
  mehr in den Vordergrund stellen. Wir sind der Überzeugung: „Das kann Deutschland“,
  das können wir alle miteinander. ‑ Wir, die schwarz-rote Koalition, werden Deutschland
  natürlich weiter erneuern und unser Land durch Reformen stärken, zum Beispiel im
  Sozialstaats- und Gesundheitswesen, in der Energiepolitik, bei der Infrastruktur
  oder auch dem Steuersystem. Das Ziel dabei ist ganz klar: Deutschland soll auch
  künftig ein freies, sicheres, gerechtes und wohlhabendes Land bleiben. Dafür arbeitet
  diese Koalition und wird das auch weiter genauso tun. Herr Hille, zu Ihren Zahlen:
  Ich kenne die Definition eines Gesetzes, das die Regierung auf den Weg bringt. Was
  ist denn eine Maßnahme, oder können Sie dann noch einmal unterteilen, wie viele
  Ihrer 190 Maßnahmen denn Gesetze sind? Der allergrößte Teil sind Gesetze. Weil wir
  wissen, dass Leute wie Sie die Dinge ganz genau nehmen, haben wir auch noch den
  Begriff der Maßnahmen mit dazu genommen. Der allergrößte Teil besteht also aus Gesetzen.
  Aber es gibt darum herum natürlich auch noch Dinge wie Aktionspläne, die aber einen
  sehr geringen Anteil dieser 190 Maßnahmen ausmachen. Weil ich es sehr genau nehme,
  frage ich: Können Sie mir diesen geringen Anteil nennen? Wie viele Gesetze waren
  es denn bei Ihnen? Das können wir sicherlich tun. Ich kann es jetzt, in diesem Moment,
  von dieser Position aus nicht. Aber wir sorgen dafür, dass Ihnen das noch einmal
  aufgedröselt wird. Können Sie ein bisschen zum Ablauf der heutigen Sitzung sagen?
  War es business as usual, oder hat der Kanzler eine kleine Ansprache gehalten, oder
  gab es vielleicht wieder ein Fässchen aus dem Sauerland? Es war eine ganz normale
  Kabinettssitzung, auch wenn es heute, an diesem Tag, natürlich eine besondere war.
  Sie wissen ja, dass wir aus den Sitzungen üblicherweise nicht wirklich wörtlich
  etwas berichten. Aber weil es heute solch eine besondere Sitzung war, würde ich
  davon eine kleine Ausnahme machen und Ihnen kurz einen Einblick geben, weil der
  Bundeskanzler zu Beginn natürlich ein paar Sätze an das Kabinett, an die Mitglieder
  der Bundesregierung gerichtet hat: Der Bundeskanzler hat sich in allererster Linie
  natürlich erst einmal für die Zusammenarbeit bedankt, hat darauf hingewiesen, dass
  die ersten zwölf Monate eine durchaus herausfordernde Zeit waren, es aber gemeinsam
  gelungen ist, eine ganze Reihe wichtiger Dinge auf den Weg zu bringen. Der Bundeskanzler
  hat seinem Wunsch Ausdruck verliehen, dass alle die Absicht teilen, die Koalition
  für die kommenden drei Jahre gemeinsam weiterhin erfolgreich führen zu wollen. Wörtlich
  hat er gesagt: Es gibt zu dieser Koalition keine Alternative. ‑ Ebenfalls wörtlich
  hat er gesagt: Wir sind staatspolitisch gemeinsam in der Verantwortung, den Erfolg
  zu suchen. ‑ Der Bundeskanzler wünscht sich für das weitere Zusammenwirken einen
  kollegialen Geist, gegenseitiges Vertrauen und hofft auch, dass der Optimismus nicht
  zu kurz kommt, denn wenn wir den verlieren, dann ist es zu spät. Wurde vielleicht
  doch mit einem Kaltgetränk angestoßen? Die Kabinettssitzungen sind, wie Sie wissen,
  üblicherweise morgens um 10 Uhr. Dabei gibt es warme Getränke wie Kaffee, aber nichts
  Besonderes in diesem Fall. Gibt es dazu weitere Fragen? ‑ Das ist nicht der Fall.
  Dann kommen wir zur Kabinettssitzung. Das Kabinett hat natürlich auch einige Entscheidungen
  getroffen. Zu den zwei wichtigsten habe ich Ihnen etwas mitgebracht. Die Bundesregierung
  hat heute die letztmalige Fortsetzung der Beteiligung bewaffneter deutscher Streitkräfte
  an der United Nations Interim Force in Lebanon beschlossen, bekannt unter dem Namen
  UNIFIL . Der operative Auftrag wird bis zum 31. Dezember 2026 fortgeführt und in
  einer sich anschließenden sechsmonatigen Phase in eine geordnete Abwicklung der
  Mission überführt. Das Mandat soll somit insgesamt bis zum 30. Juni 2027 verlängert
  werden. Natürlich muss der Deutsche Bundestag dem noch zustimmen. Die Mandatsobergrenze
  bleibt unverändert und wird in der Rückführungsphase ab dem 1. Januar 2027 signifikant
  reduziert. Der deutsche militärische Beitrag soll für die verbleibende operative
  Phase weiterhin die Führung und Beteiligung mit einer seegehenden Einheit am UNIFIL-Marineverband,
  mit Stabspersonal im UNIFIL-Hauptquartier und mit Ausbildungspersonal für den Fähigkeitsaufbau
  der libanesischen Marine umfassen. Der Beschluss der Bundesregierung erfolgt vor
  dem Hintergrund der Resolution 2790 des Sicherheitsrates. Das Bundeskabinett hat
  heute auch eine Formulierungshilfe zum Thema von Reallaboren beschlossen. Was sich
  sehr technisch anhört, ist eine wichtige Grundlage für Innovation und Fortschritt,
  die wir erzielen wollen. Denn Innovationen sollen sich in Deutschland freier entwickeln
  können. Das hat sich die Bundesregierung im Koalitionsvertrag und auch in der Staatsmodernisierungsagenda
  vorgenommen. Ziel ist es, Deutschland als leistungsstarken Innovations- und Industriestandort
  weiter zu stärken. Dafür will die Bundesregierung die Rahmenbedingungen so gestalten,
  dass Innovationen besser erprobt werden können. Sogenannte Reallabore ermöglichen
  das unter fast realen Bedingungen, teils außerhalb des geltenden Rechts, aber unter
  behördlicher Begleitung. Das hilft auf zwei Wegen. Erstens können sich neue Technologien,
  Produkte, Dienstleistungen oder Ans ä tze freier entwickeln, halten dabei aber Schutzstandards
  ein. Zweitens können sich Gesetze und Verordnungen durch den Testraum besser an
  diese Entwicklungen anpassen, um sowohl Risiken als auch Anforderungen besser Rechnung
  zu tragen. Dafür hat das Bundeskabinett heute eine Formulierungshilfe für eine Änderung
  des Entwurfs eines Reallaboregesetzes beschlossen. Er wird in Bundeserprobungsgesetz
  umbenannt. Dieses neue Stammgesetz regelt Reallabore übergreifend, innovationsfreundlicher
  und verbindlicher. Ziel ist es dabei auch, Zeit im Innovationsprozess zu sparen
  und Kosten von Verwaltungs- und Genehmigungsverfahren zu senken. Dafür gibt es eine
  neue allgemeine Erprobungsklausel im Gesetz. Sie ermöglicht es testweise, digitale
  oder vereinfachte Verfahren vor Ort zu erproben und auszuwerten. Bei positiver Bewertung
  können solche Verfahren anschließend bundesweit als Regelung vorgeschlagen werden.
  Das ist sozusagen Vereinfachung im Kleinen, um es bei Gelingen auf das Große übertragen
  zu können. Für echte Freiräume und neue Ideen und dabei gleichbleibende Schutzstandards
  enthält die Formulierungshilfe sieben konkrete Experimentierklauseln für einzelne
  Gesetze, die wir Ihnen bei Bedarf gern erläutern können. Aber mit Blick auf die
  Uhr möchte ich es an dieser Stelle dabei bewenden lassen. Ich habe noch den Hinweis,
  dass das Bundeskabinett heute auch den Berufsbildungsbericht beschlossen hat. Sie
  können aber alle Zahlen nachlesen, sodass ich ebenfalls mit Blick auf die Uhr auf
  eine vertiefte Betrachtung verzichten würde. Aber natürlich haben Sie die Gelegenheit,
  wenn Ihnen dazu Fragen auf den Nägeln brennen, auch diese hier loszuwerden. Bundesfinanzminister
  Klingbeil wird am 8. und 9. Mai auf Einladung seines kanadischen Amtskollegen François-Philippe
  Champagne nach Toronto reisen . Am 8. Mai findet im Anschluss an einen gemeinsamen
  Besuch des kanadischen Flugzeugbauers Bombardier um 11.15 Uhr eine gemeinsame Pressekonferenz
  statt. Im Anschluss daran findet ebenfalls gemeinsam ein Roundtable der beiden Minister
  mit deutschen und kanadischen Wirtschaftsvertretern statt. Außerdem nimmt Bundesfinanzminister
  Klingbeil mit seinem Amtskollegen am Global Progress Action Summit teil und trifft
  sich mit Olivia Chow, der Bürgermeisterin Torontos. Kanada ist für uns ein enger
  Partner, politisch wie wirtschaftlich. Minister Klingbeil möchte sich bei seinem
  Besuch eng zu aktuellen politischen Themen austauschen, die Beziehung weiter vertiefen
  und mögliche weitere Kooperationsfelder ausmachen. Außerdem wird er in Kanada für
  vertiefte wirtschaftliche Verbindungen und den Standort Deutschland werben. Wird
  dort auch das Verhältnis und die Diskussion zwischen Kanada und den USA und Deutschland
  und den USA eine Rolle spielen? Sowohl der Finanzminister als auch die Bundesregierung
  insgesamt und auch die kanadische Seite haben ihre Positionen zu den aktuellen geopolitischen
  Konflikten sehr deutlich gemacht. Ich kann natürlich den Gesprächen wie üblich nicht
  vorgreifen, aber natürlich wird es in solchen Gesprächen auch immer um die wirtschaftliche
  Lage gehen. Dabei ist, denke ich, das Thema schwierig auszuklammern. Wie gesagt:
  Sowohl vonseiten der Bundesregierung als auch von unserem Minister und der kanadischen
  Seite ist ja immer sehr deutlich signalisiert worden, dass der Konflikt jetzt schnell
  diplomatisch gelöst werden muss. Bundesverkehrsminister Schnieder besucht vom 11.
  bis zum 14. Mai Japan . Er wird sich dort unter anderem mit seinem Amtskollegen
  Kaneko, dem Minister für Raumordnung, Infrastruktur, Verkehr und Tourismus, sowie
  dem Minister für Japans Wachstumsstrategie, Minoru Kiuchi, treffen. Auf dem Programm
  stehen auch Fahrten mit dem japanischen Hochgeschwindigkeitszug Shinkansen. Japan
  als viertgrößte Volkswirtschaft der Welt ist für Deutschland als drittgrößte Volkswirtschaft
  ein wichtiger Partner im asiatischen Raum, mit dem wir nicht nur auf dem Feld des
  Handels, sondern auch im Verständnis von Demokratie und Werten eng verbunden sind
  sowie gemeinsame Interessen teilen. Gab es Positionierungen des Kanzlers auf seinen
  offiziellen Kanälen zur Amokfahrt in Leipzig ? Wie Sie sich vorstellen können, ist
  der Bundeskanzler natürlich bestürzt über diese sinnlose Gewalttat, die in Leipzig
  stattgefunden hat. Wir trauern mit den Angehörigen, und unser Mitgefühl gilt den
  Opfern. Der Bundeskanzler war am Montag sehr zeitnah mit dem Oberbürgermeister von
  Leipzig in Kontakt. Offizielle Stellungnahmen sind das aber nicht, auf den offiziellen
  Kanälen, oder? Meines Wissens habe ich als stellvertretender Regierungssprecher
  eine offizielle Funktion, in der ich hier sitze. Ich ‑ ‑ ‑ Ich habe ja gerade eben
  die wichtigen Sätze dazu gesagt. Eine Nachfrage noch: Gab es das Vorhaben, am Gedenkgottesdienst
  teilzunehmen? Wurde das erörtert? Ich würde gern zu Leipzig ergänzen. Der Bundesverkehrsminister
  hat gestern im Berliner Hauptbahnhof ‑ da waren wir zusammen und haben eine Gedenkminute
  für den damals ums Leben gekommenen Zugbegleiter eingelegt ‑ auch eine Schweigeminute
  für die Opfer von Leipzig eingelegt. Im Moment findet in Leipzig der Gipfel des
  Internationalen Transportforums, ITF, statt. Im Zuge dessen wird sich der Bundesverkehrsminister
  vor Ort mit dem Leipziger Oberbürgermeister treffen und mit weiteren Mitgliedern
  unserer Hausleitung vor Ort der Opfer gedenken. Herr Greve, seit gestern ist der
  Entwurf für das Gebäudemodernisierungsgesetz da. Darin kann man sehen, dass es kein
  Enddatum mehr für die Verwendung fossiler Brennstoffe geben soll. Andererseits gibt
  es das Klimaschutzgesetz, in dem Klimaneutralität für 2045 festgeschrieben ist.
  Wieso organisieren Sie einen Widerspruch zwischen diesen beiden Gesetzen? Dazu kann
  ich erst einmal sagen, dass wir mit dem Gesetz nun in der Ressortabstimmung und
  auch in der Länder- und Verbändeanhörung sind. Insofern laufen die regierungsinternen
  Abstimmungen dazu. Zu etwaigen Details dieser regierungsinternen Abstimmungen kann
  ich mich noch nicht äußern. Aber grundsätzlich sind natürlich alle unsere Gesetze
  darauf aufgebaut, die Klimaziele zu erreichen. Zu diesen stehen wir. Der Gebäudesektor
  ist ein Teil, ein wichtiger Teil, aber nicht der alleinige. Die Koalition setzt
  weiterhin auch auf die Wärmepumpe als bereits heute klimaneutrale, effiziente Heizung.
  Insofern kann ich keinen Widerspruch erkennen. Die Ressortabstimmung läuft. Die
  internen Beratungen laufen. Wir streben zeitnah natürlich auch einen Kabinettsbeschluss
  an, in dem alle Details enthalten sind. Wieso räumen Sie das Enddatum für fossile
  Brennstoffe ab, wenn Sie zum Klimaschutz stehen? Ich kann dem nichts hinzufügen.
  Wir sind noch in der Abstimmung. Zum Kabinettsentwurf, zu dem finalen Ergebnis,
  werde ich mich dann entsprechend äußern können. Eines verstehe ich nicht ganz. Das
  ist ja der Entwurf, den das Wirtschafts- und das Bauministerium jetzt offiziell
  vorgelegt haben. Insofern müssten Sie doch begründen können, warum Sie darin das
  bisher vorgesehene Verbot fossiler Brennstoffe ab 2045 aktiv streichen. Das ist
  ja keine Zwischenversion, sondern das ist Ihr fertiger Gesetzentwurf. Gibt es dafür
  eine Begründung? Ich kann hier vielleicht aufklären. Es gab Verwirrung in den Vorentwürfen.
  In der Erläuterung zum Gesetzgebungsverfahren gab es einen Passus mit einer veralteten
  Formulierung. Insofern kann ich nur darauf hinweisen, dass das eine veraltete Formulierung
  von 2019 war, die in einer Vorversion auftauchte und auf die Sie, glaube ich, abzielen.
  Aber ich kann hier noch einmal bekräftigen: Wir stehen zum im Koalitionsvertrag
  verankerten Bekenntnis, 2045 klimaneutral zu sein und die Klimaschutzziele einzuhalten.
  Dazu stehen wir voll und ganz. Nein, darauf bezog sich meine Frage nicht. Dazu hätte
  ich gleich noch gefragt. Meine Frage war erst einmal die folgende: Sie streichen
  § 72, in dem bisher stand, dass nach 2044 keine fossilen Brennstoffe mehr für Heizung
  verwendet werden dürfen. Warum streichen Sie diese Formulierung aus dem Gesetz?
  Wie gesagt, kann ich mich zu den Details hier und heute noch nicht verhalten. Dazu
  verweise ich auf meine Antwort von eben. Wie sieht denn der Zeitplan konkret aus?
  Wie wird es damit weitergehen? Sie wissen ja, dass in den Fraktionen bereits intensive
  Arbeit geleistet wurde, auch zwischen BMWSB und BMWE. Insofern sind wir, denke ich,
  schon ein gutes Stück vorangekommen. Ich rechne auch in diesem Fall mit einem zeitnahen
  Kabinettsbeschluss. Aber ich kann hier keine Termine ankündigen. Was sagt Ihr Haus
  zu den Vorwürfen von Verbänden, dass die Zeit für eine Stellungnahme für sie offensichtlich
  sehr kurz bemessen sei? Es ist sehr wichtig, dass in der Länder- und Verbändeanhörung
  entsprechende Stellungnahmen eingehen. Gleichzeitig wollen wir natürlich schnell
  zu Klarheit und Beschlüssen kommen. Insofern muss immer sorgsam abgewogen werden.
  Wir nehmen das zur Kenntnis. Ich habe noch zwei weitere Fragen zum Gesetz. Zum einen
  wird vorn im Gesetzentwurf angegeben, dass das für Bürgerinnen und Bürger zu Einsparungen
  in Höhe von über fünf Milliarden Euro pro Jahr führe. Ich kann das nicht nachvollziehen.
  Wie kommt diese Zahl zustande? Ich hätte gedacht, dass es eher teurer würde, da
  jetzt durch Ihr Gesetz alle Biogas usw. kaufen müssen. Der Erfüllungsaufwand bei
  Gesetzen wird mit der Datenbank des Statistischen Bundesamtes abgeglichen und geschätzt.
  Das ist auch nachvollziehbar. Auf ondea.de kann man das nachschauen. Der Erfüllungsaufwand
  für das alte Gebäudeenergiegesetz durch die entsprechenden Paragrafen, die man sich
  dort anschauen kann, belief sich auf 5,039 Milliarden Euro. Durch Streichung dieser
  Paragrafen entsteht insofern, wenn dieser Erfüllungsaufwand als Sachkosten für Bürgerinnen
  und Bürger nicht mehr enthalten ist und nicht nötig wird, ein entsprechendes Gegengewicht.
  Ja, das habe ich in dieser Datenbank gefunden, aber ich verstehe es trotzdem nicht.
  Gehen Sie davon aus, dass jetzt durch dieses Gesetz keine neuen Heizungen mehr eingebaut
  werden müssen oder so? Diese Summe entspricht doch irgendwie vielen Hunderttausend
  Heizungen. Wie kommt die zustande? Ich verstehe es wirklich ganz einfach nicht.
  Der Erfüllungsaufwand für das alte Gesetz betrug eben die entsprechenden fünf Milliarden
  Euro, und durch Streichung der entsprechenden Pflichtanforderungen an Heizungseinbauten,
  die gesetzlich verortet wurden, entfällt eben der Erfüllungsaufwand. Insofern ist
  das so zu erklären. Sie nannten das Enddatum für fossile Brennstoffe im Gesetz gerade
  ein Detail. In dem Heizungsgesetz ist das doch aber eine zentrale Aussage. Es geht
  ja darum, wie lange Gasheizungen betrieben werden können usw. Wieso ist das nur
  ein Detail? Das möchte ich nicht als ein Detail falsch verstanden wissen. Es ist
  zentral, dass wir die Klimaneutralität erreichen, und das Gebäudemodernisierungsgesetz
  wird dazu einen wesentlichen Beitrag leisten. Es ist eben ein Teil. Sie kennen die
  verschiedenen Sektoren, und die Vorschläge, die von den Koalitionsfraktionen erarbeitet
  wurden und durch die beiden Häuser in diesen Gesetzentwurf gegossen wurden, werden
  jetzt innerhalb der Regierung beraten. Dem kann ich nicht weiter vorgreifen. Aber
  ich möchte das nicht als Detail abtun ‑ das ist mir noch einmal wichtig ‑, sondern
  das ist zentraler Gegenstand in diesem Gesetz und in dem Prozess. Da muss ich jetzt
  natürlich nachfragen, warum Sie diese zentrale Aussage abräumen. Jetzt wollte ich
  noch einmal nach dem nachfragen, was Sie eben schon erwähnt haben, nämlich dass
  in der ersten Version, die Sie am Vormittag an das Kabinett verschickt haben, dieser
  Satz stand, dass ein nahezu klimaneutraler Gebäudebestand bis zum Jahr 2050 statt
  eines vollständig klimaneutralen bis 2045, was ja der aktuellen Gesetzeslage entspricht,
  angestrebt werde. Hinsichtlich dessen, was dann hinterher als Versehen bezeichnet
  und in der am Nachmittag in die Verbändeanhörung geschickten Version wieder herausgestrichen
  wurde, würde mich interessieren: Wie kann denn so ein Versehen entstehen, dass man
  ein vollkommen falsches Klimaziel, das merkwürdigerweise auch noch so ein bisschen
  an das erinnert, was die Ministerin neulich auf einer Konferenz gefordert hat, in
  so einem Gesetzentwurf steht? Ich habe mich dazu ja eben schon geäußert. Das war
  ein Redaktionsversehen. Das war in dieser Erklärpräambel ein alter Entwurf aus 2019.
  Die Ministerin steht klar zu den Klimazielen und bekennt sich dazu. Ich habe den
  Koalitionsvertrag erwähnt. Hierzu stehen wir auch voll und ganz. Insofern rate ich
  noch einmal dazu, auf die finale Gesetzesfassung, die dann mit dem Kabinettsbeschluss
  kommen wird, zu warten. Wie kommen Formulierungen von 2019 ‑ das ist ja die vorletzte
  Regierung ‑ in aktuelle Entwürfe hinein? Können Sie mir also die Arbeitsabläufe
  im Ministerium erklären? Wie kann sowas passieren technisch? Ich habe dem nichts
  weiter hinzuzufügen. Das ist eine regierungsinterne Abstimmung, und ich kann hier
  nicht zu der einzelnen Erstellung von Dokumenten Stellung nehmen. Aber können Sie
  verstehen, dass einen das verwundert? Ich nehme Ihr Erstaunen da natürlich zur Kenntnis,
  aber kann das nicht weiter kommentieren. Dann könnte ich noch einmal hinsichtlich
  Herrn Kreutzfeldt s Frage (zum einjährigen Bestehen der Bundesregierung ) für Aufklärung
  sorgen, was das Stichwort 190 angeht. Da war ich nämlich gerade nicht ganz sauber.
  Die Zahl 190 meint tatsächlich reine Gesetzentwürfe. Das, was ich als Maßnahmen
  bezeichnet habe, kommt noch obendrauf, Dinge wie Verordnungen, Strategiepläne, Eckpunkte.
  Es geht um 190 Gesetzentwürfe. Dann war das aber wahrscheinlich auch in Ihrem U2-Papier
  von letzter Woche falsch. Da waren es 175 Gesetze und Maßnahmen. Es sind also 15
  dazugekommen. Waren es dann auch nur Gesetze? Ja, wahrscheinlich müsste das in der
  Analogie so sein. Die Steigerung zwischen der Zeit von vor zwei Wochen und jetzt
  kommt sozusagen einfach durch den Zeitfortschritt zustande. Wir hatten noch einmal
  eine Woche mehr, wir hatten letzte Woche noch einmal eine Kabinettssitzung. Dadurch
  sind einfach noch einmal Dinge obendrauf gekommen. An das Umweltministerium, das
  ja für den Klimaschutz zuständig ist, würde ich gerne noch die Frage stellen, ob
  es mittlerweile ‑ als die Eckpunkte kamen, gab es die ja noch nicht ‑ eine Abschätzung
  aus Ihrem Hause gibt, wie sich diese Änderung, die Wiederzulassung von Öl- und Gasheizungen
  , auf die Klimaschutzziele auswirken wird und wie Sie es beurteilen, dass laut Gesetzentwurf
  die Klimawirkung erstmals im Jahr 2030 überprüft werden soll, und das auch noch
  ohne Mitwirkung Ihres Ministeriums, sondern nur durch das Bau- und das Wirtschaftsministerium.
  Das war jetzt sehr viel. Falls ich einen Aspekt vergesse, dann sehen Sie es mir
  nach und erinnern mich daran. Dann ist es kein absichtliches Übersehen. Erst einmal
  schließe ich mich dem Kollegen des Wirtschaftsministeriums darin an, dass wir uns
  ja jetzt gerade in der Ressortabstimmung befinden. Das heißt, wir als Umweltministerium
  prüfen diesen Entwurf jetzt und bringen uns in die Ressortabstimmung ein. Insofern,
  wie immer, kann ich mich jetzt nicht hier schon vorzeitig dazu einlassen. Wir befinden
  uns noch in der Prüfung und in der internen Positionierung und Abstimmung. Aus unserer
  Sicht ‑ so viel kann ich aber vorab schon sagen ‑ ist, und das hat ja auch der Kollege
  gerade mit seinem Bekenntnis bestätigt, allen Beteiligten klar, was das klare Ziel
  und die Verpflichtung der Klimaneutralität durch das Klimaschutzgesetz ist, was
  der Rahmen ist. Es stimmt, dass das in dem Entwurf jetzt für die Vierzigerjahre
  nicht ausbuchstabiert ist. Aus unserer Sicht ist jetzt aber entscheidend, dass wir
  für die kommenden Jahre erst einmal Klarheit haben, und dann gibt es die von Ihnen
  genannte Revisionsklausel, die ja am Ziel der Klimaneutralität ausgerichtet ist.
  Auch wenn das jetzt unbefriedigend für Sie enden mag, will ich jetzt wieder zum
  Anfang zurückkommen. Für den Rest gilt: Da befinden wir uns noch in den Ressortabstimmungen.
  Was die Berechnung betrifft: Auch da gilt natürlich erst einmal der Vorbehalt der
  Ressortabstimmungen. Aber um das damit jetzt nicht nur irgendwie gefühlt abzublocken:
  Wir sind ja nicht federführend für diesen Gesetzentwurf zuständig. Insofern sehe
  ich uns da jetzt auch nicht vorrangig in der Pflicht, derartige Berechnungen vorlegen
  zu müssen. Aber was man schon sagen kann und was ja vorgestern ein Thema war, Stichwort
  „CO 2 -Anteil für die Vermieter und die Änderung“: Ich will nur den Hinweis geben,
  dass diese Halbe-Halbe-Aufteilung aus unserer Sicht durchaus den Vorteil hat, dass
  die ja jetzt auch breiter gefasst ist. Wir erwarten durchaus gestiegene Netzkostenentgelte.
  Auch andere Kosten werden voraussichtlich so steigen, dass für die meisten Haushalte
  unseres Erachtens schon heute ersichtlich sein wird, dass die klimafreundliche Option
  auch ökonomisch die sinnvollste ist. Meine Frage richtet sich an Herrn Hille. Sie
  haben ja am Anfang auch auf die Zukunft und darauf, was am Standort Deutschland
  alles noch so passieren könnte, Lust gemacht. Jetzt hat das Unternehmen BioNTechangekündigt,
  die Produktion in Deutschland komplett einzustellen . Angeblich werden bis zu 1860
  Jobs gestrichen. Was bedeutet das denn für den Wettbewerbsstandort? Na ja, Sie können
  natürlich davon ausgehen, dass wir das wahrgenommen und zur Kenntnis genommen haben.
  Aber ich verweise auch darauf, dass das natürlich eine unternehmerische Entscheidung
  ist, die das Unternehmen BioNTech da trifft und die es gestern auch öffentlich mit
  dem Strategiewechsel hin zur Krebsmedizin auf mRNA-Basis begründet hat. Diese und
  andere unternehmerische Entscheidungen nehmen wir grundsätzlich zur Kenntnis, aber
  kommentieren sie inhaltlich nicht. Aber falls dahinter bei Ihnen die Sorge steht,
  dass es Probleme bei der Impfstoffversorgung oder dergleichen geben könnte, kann
  ich Ihnen die nehmen; denn im Hinblick auf die Coronaimpfstoffproduktion und auch
  die Impfstoffversorgung bleibt festzustellen, dass diese auch von anderen Unternehmen
  gewährleistet werden kann. Insoweit geht die Bundesregierung aktuell davon aus,
  dass die Impfstoffversorgung für die deutsche Bevölkerung auch weiter sichergestellt
  ist. Dürfte ich bitte auch eine Reaktion vom Wirtschaftsministerium erfragen, Herr
  Greve? Ich kann mich dem vollends anschließen. Wir haben die Entscheidung zur Kenntnis
  genommen und stehen mit dem Unternehmen in Kontakt. Damit ist ja auch immer die
  CureVac-Frage verbunden. Wir gehen davon aus, dass sich BioNTech an die Vereinbarung
  mit dem Bund im Zusammenhang mit der Übernahme von CureVac hält. Ich stelle doch
  noch einmal eine Nachfrage, weil man ja schon sagen könnte, dass es hier auch um
  kritische Infrastruktur geht. Man erinnert sich ja noch an die Pandemie. Es gibt
  ja auch Initiativen, sich von den USA unabhängiger zu machen, in dem Fall vor allem
  von Pfizer. Sehen Sie da nicht den Handlungsbedarf, dass man solche für den Gesundheitsschutz
  zentralen Industrien nach Möglichkeit in Deutschland oder zumindest in Europa hält?
  Na ja, ich kann noch einmal darauf hinweisen, dass die Aufstellung von Unternehmen
  natürlich grundsätzlich eine Unternehmensentscheidung ist. BioNTech geht jetzt mehr
  in die Richtung der mRNA-basierten Krebsimpfstoffe. Wir sind der Auffassung, dass
  das, was da jetzt an Impfstoffproduktion verloren geht, wenn man so will, durch
  andere Unternehmen gewährleistet werden kann, sodass das, was ich gerade gesagt
  habe, gilt. Die Impfstoffversorgung ist aus Sicht der Bundesregierung für die deutsche
  Bevölkerung gesichert. Also auch unabhängig von Lieferungen aus Übersee? Die Impfstoffversorgung
  ist gesichert. Das kann ich nur noch einmal unterstreichen. Die Frage richtet sich
  an das BMWE. Israel liefert laut eigenen Angaben auf Anfrage Ihres Hauses Kerosin
  nach Deutschland . Können Sie das bestätigen? Ich kann grundsätzlich gerne noch
  einmal die Situation im Kerosinbereich einordnen. Es gibt derzeit keine physischen
  Knappheiten in Deutschland, aber wir beobachten die Lage natürlich sehr, sehr aufmerksam
  und befinden uns im ständigen Austausch mit den Akteuren der Branche. Sie wissen:
  Am 20. April hat ein Kerosin-Round-Table mit Vertretern der Mineralölwirtschaft
  und der Luftfahrtindustrie stattgefunden, und auch dabei konnten wir uns eng mit
  der Branche austauschen. Gleichzeitig diversifizieren wir natürlich, wo wir können.
  Beim Ankauf von Gas- bzw. Rohölprodukten machen die Unternehmen allerdings die Verträge.
  Insofern flankieren wir etwaige Lieferungen. Das BMWE befindet sich mit mehreren
  Ländern in konstruktiven Gesprächen, darunter auch mit Israel. Israel und Deutschland
  sind, wie Sie wissen, auch über eine Energiepartnerschaft sehr eng miteinander verbunden,
  und im Rahmen dieser Energiepartnerschaft hat Israel in Aussicht gestellt, durch
  Lieferungen von Kerosin und Erdgas zu unterstützen. Details und Mengen liegen mir
  nicht vor, da die Unternehmen entsprechende Verträge machen. Zuletzt wurde ja betont,
  dass aktuell kein Kerosinmangel bestehe. Wie passt das denn dann jetzt zusammen?
  Ist das jetzt akut, oder ist das eher eine Planung für die Zukunft? Das habe ich
  deutlich zu machen versucht. Es gibt aktuell keine Knappheiten, und wir befinden
  uns mit der Branche auch entsprechend intensiv im Austausch. Sie wissen, dass wir
  uns an der Freigabe der IEA hinsichtlich verschiedener Mengen von Rohölprodukten
  beteiligt haben, die wir dem Markt aus den Reserven angeboten haben. Diese wurden
  teilweise abgenommen. Auch in Bezug auf Jet-Kraftstoff waren es 50 000 Tonnen. Die
  wurden nicht komplett abgenommen. Die bieten wir jetzt in einer nächsten Runde wieder
  an. Das sind auch keine neuen Mengen, sondern es sind die Mengen, die eben nicht
  versteigert wurden. Insofern bleibt die Lageeinschätzung gleich: Es gibt derzeit
  keine physischen Engpässe, aber die Krise am Golf besteht fort, und natürlich bereiten
  wir uns weiter auf die Lage vor. Insofern sind solche Dinge wie bestehende Energiepartnerschaften
  dabei ein wertvoller Beitrag. Aber die Lage ist weiterhin die gleiche. Zunächst
  frage ich Herrn Hille, wohl wissend, dass dieses Thema Montag hier schon Thema gewesen
  ist, nämlich der Auftritt des Kanzlers in Salzwedel . Ich möchte jetzt die Frage
  aus einer anderen Perspektive stellen, nämlich aus einer christlichen Perspektive,
  die die Partei des Kanzlers auch vertritt, nämlich in Hinsicht auf Werte wie Empathie,
  Menschlichkeit, Anteilnahme. Wie ist es dann zu erklären, dass sich der Kanzler
  seitdem weder entschuldigt hat noch seine Äußerung erklärt hat? Hat der Kanzler
  vor, sich bei dieser Frau, die eben sterbenskrank ist, zu entschuldigen? Ist das
  vorgesehen? Wie Sie richtig sagen, war das Montag ja hier schon ein Thema. Ich kann
  nur noch einmal betonen, dass derartige Schicksale natürlich auch der Bundeskanzler
  wahrnimmt und sie ihn betroffen machen. Aber ich werde jetzt hier mit Ihnen nicht
  sozusagen in einen Austausch darüber eintreten, was wir tun werden. Da sind wir
  wieder im Bereich von hypothetischen Fragen. Der Bundeskanzler hat sich in dem Dialog
  in Salzwedel geäußert, wie er sich geäußert hat. Natürlich gehen ihm menschliche
  Schicksale nahe. Nur weil er nicht in einer aus Ihrer Sicht adäquaten Art und Weise
  reagiert hat, heißt das nicht, dass der Bundeskanzler von solchen Schicksalen nicht
  betroffen ist. Aber wir sind in der Politik, und da geht es um politische Entscheidungen
  ‑ und darum ging es ja in diesem Bürgerdialog. Entschuldigung, Herr Hille, es geht
  nicht darum, ob mir die Antwort oder das Verhalten des Kanzlers gefällt. Darum geht
  es ja nicht. Diese Äußerung ist um die Welt gegangen, auch in das Land, aus dem
  ich herkomme. Viele sagen sich ja ‑ das ist auch ein AfD-Narrativ ‑: Was uns passiert,
  interessiert die politische Klasse nicht. Dem Kanzler war es in dem Sinne offenbar
  wichtiger, einer sterbenskranken Frau eine Rüge zu geben und zu sagen: Nee, das,
  was Sie sagen, ist falsch. Formulieren Sie Ihre Frage, Frau Kollegin? Noch einmal
  die Frage: Wie kann es passieren, dass der Kanzler sich dazu nicht mehr geäußert
  hat, obwohl es immens viele Reaktionen, auch aus dem Ausland, dazu gegeben hat?
  Ich verstehe Ihr sehr individuelles Interesse mit Bezug auf einzelne Personen. Aber
  wir machen Politik ja nicht für uns, wir machen Politik dafür, dass wir alle die
  bestmöglichen Rahmenbedingungen haben. In diesem Zusammenhang geht es darum, dass
  wir das Gesundheitssystem zukunftsfähig machen. Dafür haben wir in der vergangenen
  Woche mit der Reform der GKV maßgebliche Entscheidungen im Bundeskabinett getroffen.
  Das sind die Themen, die für uns von besonderer Bedeutung sind, weil sie über die
  Zukunft unseres Landes entscheiden. Noch einmal: Natürlich gehen dem Bundeskanzler
  derartige Schicksale nahe, aber der Bundeskanzler ist vor allem dazu da, Deutschland
  voranzubringen, und genau damit hat er sich beschäftigt. Sie haben vom Gesundheitssystem
  gesprochen. Das war ja vorhin der Blick in die Zukunft. Wie kann ein Gesundheitssystem
  denn als Paket so geschnürt werden, dass dieses nicht die Beerdigungskosten einer
  Bürgerin eines der reichsten Länder der Welt beinhaltet? Wie passt das zusammen,
  Herr Hille? Es geht nicht um Persönlichkeit von mir, um mein persönliches Interesse,
  es geht darum, dass die Menschen das wissen wollen. Auch das ist jetzt wieder eine
  Zuspitzung, eine sehr starke Zuspitzung auf eine Fallkonstellation. Ich werde hier
  jetzt nicht in die Detailanalyse dieser Konstellation gehen. Ich kann Ihnen nur
  sagen, sozusagen als Dachbotschaft zum Thema: Es geht darum, die Gesundheitsversorgung
  in diesem Land für uns alle für die Zukunft festzumachen. Dafür muss die Gesundheitsversorgung
  einerseits gut, aber auch bezahlbar sein. Das ist Aufgabe von Politik, dafür die
  richtigen Rahmenbedingungen aufzustellen. Es gibt ganz viel, was wir uns alle wünschen.
  Aber wir ‑ das ist die zentrale Aufgabe von Politik ‑ sind damit beschäftigt, dafür
  zu sorgen, dass diese Wünsche und das, was bezahlbar ist, zueinander gebracht werden.
  Das ist der Schritt, in dem wir uns befinden, und dafür haben wir in der vergangenen
  Woche diesen Vorschlag zur Reform der GKV vorgelegt. Herr Hille, viele Bundestagabgeordnete
  machen sich Sorge, dass der Verzicht auf die Stationierung von Tomahawk-Raketen
  und ein Abzug amerikanischer Soldaten aus Deutschland das Leben von Millionen Menschen
  gefährden könnte. Teilt die Bundesregierung diese Einschätzung oder diese Sorge?
  Wie ist die deutsche-amerikanische Beziehung derzeit, insbesondere nach den neuen,
  von den USA verhängten Zollen? Lange Frage, kurze Antwort: Nein, die Bundesregierung
  teilt diese Befürchtung, diese Einschätzung in keiner Weise. Und wie beurteilen
  Sie die deutsch-amerikanische Beziehung? Glauben Sie, dass die Beziehungen zwischen
  den USA und Deutschland in ihrer schwierigsten Phase sind? Auch da gehe ich jetzt
  nicht in eine Qualifizierung von gut, besser, schlechter, sondern Politik beginnt
  mit dem Betrachten der Wirklichkeit. Wir sind enge Partner der USA in der NATO.
  Wir sind in regelmäßigem Austausch. Der Bundeskanzler hat den amerikanischen Präsidenten
  mehrfach getroffen, er ist auch regelmäßig mit ihm telefonisch in Kontakt. Sie sehen
  sich auf größeren Veranstaltungen wie G7, G20 oder auf dem NATO-Gipfel ‑ Anfang
  Juli findet er in Ankara statt ‑, sodass wir auf verschiedenen Ebenen in intensivem
  Austausch sind. Das gilt auch für den Bundesaußenminister und den Bundesverteidigungsminister
  mit den jeweiligen Counterparts. Die Lage zwischen dem Bundeskanzler und dem amerikanischen
  Präsidenten ist in der letzten Zeit angespannt. Hat der Bundeskanzler Pläne, in
  den nächsten Tagen wieder mit dem amerikanischen Präsidenten zu telefonieren? Auch
  da muss ich Sie leider vertrösten. Sie wissen, wie wir da verfahren. Wir kündigen
  Termine des Bundeskanzlers jeweils am Freitag für die kommende Woche an. Über Telefonate
  unterrichten wir immer rückblickend, wenn sie stattgefunden haben. Ansonsten habe
  ich dazu jetzt keine weitere Ankündigung zu machen. Der US-Präsident hat sich in
  einer sehr hässlichen Form auf seinen Social-Media-Kanälen in Bezug auf den Bundeskanzler
  geäußert. Er hat sinngemäß gesagt, er sei durch mit dem Kanzler. Wie hat der Kanzler
  diese Botschaft wahrgenommen, und wie ordnet er das ein? ‑ Haben Sie das nicht gelesen?
  Ich weiß nicht, worauf Sie Bezug nehmen. Ich weise nur darauf hin, dass es durchaus
  Dinge gibt, die nicht von Absendern kommen, die sie vorgeben zu sein. Ich weiß ehrlicherweise
  nicht, worauf Sie sich beziehen. Er hat auf seinem eigenen Social-Media-Kanal eine
  sehr hässliche “message“ über den Kanzler. ‑ Das haben Sie nicht gelesen? Na ja,
  dann kann man nicht darüber sprechen. Dann haben wir noch einen Nachtrag zu Leipzig.
  Bundesverkehrsminister Patrick Schnieder wird heute Abend um 19.15 Uhr in der Grimmaischen
  Straße in Leipzig einen Kranz bzw. Blumen niederlegen, um der Opfer der Amokfahrt
  von Montag zu gedenken. Mit dabei sind auch die beamtete Staatssekretärin Frau Dr. Stutz
  und der Parlamentarische Staatssekretär Christian Hirte. Der Oberbürgermeister der
  Stadt Leipzig ist informiert. Gestern hat UniCredit den Aktionären der Commerzbank
  ein offizielles Übernahmeangebot unterbreitet. Wie reagiert die Bundesregierung
  darauf? Die Position der Bundesregierung ist bekannt: Die Bundesregierung unterstützt
  die Strategie der Eigenständigkeit der Commerzbank, und für die Bundesregierung
  wäre eine feindliche, aggressive Übernahme insbesondere mit Blick darauf, dass es
  sich um eine systemrelevante Bank handelt, nicht akzeptabel. Jetzt werden erst einmal
  Vorstand und Aufsichtsrat der Commerzbank das Angebot der UniCredit prüfen und eine
  Empfehlung an die Aktionäre der Commerzbank abgeben. Für uns ist klar: Die Commerzbank
  spielt eine wichtige Rolle bei der Finanzierung der deutschen Wirtschaft und des
  deutschen Mittelstands. Sie ist außerdem bedeutender Arbeitgeber und zentral für
  den Finanzstartort Frankfurt. Beides gilt es auch in Zukunft sicherzustellen. Nun
  gäbe es ja auch die Möglichkeit, dass der Bund seine Anteile an der Commerzbank
  aufstockt. Gibt es Überlegungen in diese Richtung? Zu hypothetischen Fragen äußern
  wir uns an dieser Stelle nicht. Ich kann aber noch einmal das unterstreichen, was
  der Kollege gesagt hat, und auch noch einmal betonen, dass dieses Vorgehen der UniCredit
  aus unserer Sicht völlig unangebracht und unfair ist. An das Verteidigungsministerium
  zur Frage der Fregatten der Klasse F126 . Rheinmetall soll sich jetzt bereiterklärt
  haben ‑ man weiß ja, dass sie schon länger daran arbeiten ‑ das Projekt für 12 Milliarden
  Euro plus die zwei Milliarden Euro, die ohnehin schon in das Projekt gesteckt wurden,
  zu übernehmen. Können Sie das bestätigen? Das kann ich nicht bestätigen, weil das
  Verfahren noch läuft. Sie wissen, dass wir bei der F126 bemüht sind, einen Generalunternehmerwechsel
  einzuleiten. Dafür gibt es umfangreiche Abstimmungen, die zwei Großunternehmen und
  das BMVg betreffen. Diese Abstimmungen sind nicht abgeschlossen; deswegen kann ich
  diese Meldungen nicht bestätigen. Der Prozess läuft, und wenn es dort zu einem Abschluss,
  zu einem Ergebnis kommt, wird natürlich das Parlament informiert. Es werden wahrscheinlich
  auch entsprechende Vorlagen benötigt werden. Dann werden wir auch darüber unterrichten.
  An das Auswärtige Amt zu der deutsch-italienischen gemeinsame Erklärung in Bezug
  auf das Kidnappen der Global Sumud Flotilla : Am Sonntagabend ist ein brasilianischer
  Aktivist zusammen mit seinem spanischen Kollegen vor die Kamera getreten; beide
  wiesen deutliche Anzeichen körperlicher Gewalt auf. Die brasilianische und die spanische
  Regierung haben sich dann zusammengetan, um die Freilassung zu erreichen. Können
  Sie uns einen aktuellen Stand über die Bemühungen der Bundesregierung bezüglich
  der festgenommenen Aktivistinnen und Aktivisten mitteilen? Das war hier auch am
  Montag Thema, da habe ich darüber gesprochen. Seitdem hat sich nichts verändert.
  Wir sind in Kontakt über unsere Konsulate, die dafür in diesem Raum zuständig sind,
  und stehen auch mit den Personen, die das wünschen, in konsularischem Kontakt. Ich
  habe die Pressekonferenz am Montag zwar über Livestream verfolgt, habe aber trotzdem
  die Frage: Können Sie seit Montag ‑ ohne jetzt ins Detail gehen zu müssen ‑ Fortschritte
  verzeichnet oder nicht? Wie gesagt, wir sind da in Kontakt. Wenn ich etwas Weiteres
  mitzuteilen hätte, dann würde ich das vielleicht am Freitag tun. Wie gesagt, das
  ist ein Prozess. Wie unsere Position ist, haben wir in der gemeinsamen Erklärung
  mit Italien sehr deutlich gemacht.'
