title: Bedrohungen der Sicherheit im Luftraum Krisenreaktionsübung der Bundesregierung
  erfolgreich durchgeführt
text: Die Luftwaffe hält kontinuierlich zwei Alarmrotten in Wittmund in Niedersachsen
  und in Neuburg an der Donau in Bayern bereit. Zu ihnen gehören jeweils zwei Eurofighter.
  Ein Flugzeug wird entführt und soll möglicherweise als Waffe eingesetzt werden –
  das Kabinett entscheidet unter Leitung des Bundeskanzlers, wie diese kritische Situation
  bewältigt wird. In einer Krisenreaktionsübung hat die Bundesregierung Verfahrensabläufe
  zum Schutz vor Bedrohungen aus dem Luftraum geübt. In einer Phase geopolitischer
  Umbrüche hat sich die Bedrohungslage deutlich verschärft. Daher stärkt der Nationale
  Sicherheitsrat (NSR) die Sicherheitsarchitektur Deutschlands und bündelt ressortübergreifend
  sicherheitspolitische Kompetenzen und Wissen. Mit der Beauftragung von Krisenreaktionsübungen
  trägt er außerdem zur Steigerung der gesamtgesellschaftlichen Resilienz bei, indem
  sich Bund, Länder und Sicherheitsbehörden auf den Umgang mit Krisenszenarien vorbereiten.
  Die Bundesregierung hat unter Leitung des Bundeskanzlers am 20. Mai erfolgreich
  eine solche ressortübergreifende Krisenreaktionsübung durchgeführt. An der Umsetzung
  der Übung waren das Bundeskanzleramt sowie die Bundesministerien der Verteidigung,
  des Innern und für Verkehr beteiligt. In einem konkreten Szenario wurde die Reaktion
  auf die fiktive Entführung eines zivilen Flugzeugs im deutschen Luftraum (einem
  sogenannten „Renegade“) geübt. Ziel der Übung war es, in einer zeitkritischen und
  potentiell gefährlichen Lage eine schnelle Entscheidung des Kabinetts herbeizuführen.
  Diese Entscheidung wurde sodann durch die Bundeswehr und Sicherheitsbehörden real
  umgesetzt. In der Übung wurde auf Grundlage dieser Kabinettsentscheidung das entführte
  Flugzeug von einer Alarmrotte der Bundeswehr , bestehend aus zwei Eurofighter Kampfflugzeugen,
  abgefangen und bis zur Landung auf einem Flugplatz in Norddeutschland begleitet.
  Bundeskanzler Friedrich Merz koordinierte die Maßnahmen während der Krisenreaktionsübung.
  Die Sicherheit im deutschen Luftraum wird von der DFS Deutsche Flugsicherung GmbH
  kontinuierlich überwacht und koordiniert. Bei gravierenden Verstößen wird grundsätzlich
  unterschieden zwischen einer „Luftnotlage“ (unvorhergesehener Notfall) und einem
  „Renegade“ (Begriff für die Entführung eines zivilen Luftfahrzeugs in krimineller
  oder terroristischer Absicht). Für die Abwehr von Gefahren im deutschen Luftraum
  ist das ressortübergreifende Nationale Lage- und Führungszentrum für die Sicherheit
  im Luftraum (NLFZ SiLuRa) in Uedem zuständig. Dafür hält die Luftwaffe kontinuierlich
  zwei Alarmrotten – auch Quick Reaction Alert genannt – in Wittmund in Niedersachsen
  und in Neuburg an der Donau in Bayern bereit. Zu ihnen gehören jeweils zwei Eurofighter,
  die innerhalb weniger Minuten an jedem Ort im deutschen Luftraum sein können. Bei
  Verdacht eines Renegade berät der Verteidigungsminister den Bundeskanzler über die
  Notwendigkeit der Beteiligung der Bundesregierung an einer Entscheidung zum weiteren
  Vorgehen. In einem solchen Fall werden auf Anordnung des Bundeskanzlers in einer
  Telefonkonferenz des Kabinetts Maßnahmen abgestimmt und angewiesen. Die Übung erfolgte
  in enger Zusammenarbeit zwischen den beteiligten Ministerien, der Bundeswehr und
  Sicherheitsbehörden. Sie hat demonstriert, dass die notwendigen Mittel und Strukturen
  verfügbar sind, um auf Bedrohungen der Sicherheit im Luftraum schnell und angemessen
  reagieren zu können.
