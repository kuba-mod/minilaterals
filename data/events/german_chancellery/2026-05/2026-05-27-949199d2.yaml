title: Im Kabinett beschlossen Modernisierungsschub für die Verwaltungsgerichte
text: 'Durch einen flexibleren Einsatz von Richterinnen und Richtern soll die Justiz
  entlastet werden. Das Kabinett hat das Siebte Gesetz zur Änderung der Verwaltungsgerichtsordnung
  und anderer Gesetze (7. VwGOÄndG ) beschlossen. Die Änderungen sind Teil des mit
  den Bundesländern gemeinsam vereinbarten Paktes für den Rechtsstaat. Die Bundesregierung
  setzt hiermit weitere wichtige Vorhaben aus dem Koalitionsvertrag um, um den Rechtsstaat
  zu modernisieren, zu digitalisieren und wehrhafter zu machen. Eine starke Verwaltungsgerichtsbarkeit
  ist in Zeiten instabiler weltweiter Rechtsstaatlichkeit unverzichtbar. Sie beschützt
  Grundrechte und kontrolliert behördliches Handeln. Seit den Gesetzesnovellierungen
  von 1996 und 2001 hat sich das rechtliche und insbesondere tatsächliche Umfeld der
  Verwaltungsgerichte stark verändert. Eine Modernisierung ist längst überfällig.
  Die Verwaltungsverfahren sollen effizienter, schneller und einfacher werden. Damit
  will die Bundesregierung sowohl die Gerichte als auch die Bürgerinnen und Bürger
  entlasten und Kosten einsparen. Die Verwaltungsgerichte sollen entlastet werden:
  Richterinnen und Richter können flexibler und und stärker am jeweiligen Verfahren
  orientiert eingesetzt werden. Es sollen mehr Entscheidungen durch Einzelrichterinnen
  und -richter getroffen werden können. Die Sperrfrist für den Einsatz von Proberichtern
  als Einzelrichter an den Gerichten soll auf ein halbes Jahr verkürzt werden. Das
  Bundesverwaltungsgericht soll in mehr erstinstanzlichen Verfahren als bisher in
  einer reduzierter Besetzung mit drei Richtern entscheiden können. Damit sollen die
  personellen Ressourcen an den Gerichten flexibler genutzt werden können. Bei behördlichen
  Verfahren werden Hürden abgebaut. Das spart Zeit und Geld. Es soll zukünftig möglich
  sein, Widerspruch gegen einen Verwaltungsakt auch in einfacher elektronischer Weise
  (zum Beispiel per E-Mail ) einlegen zu können. Auch sollen Behörden die Anordnung
  der sofortigen Vollziehung auf einfache elektronische Weise begründen können. Gleichzeitig
  sollen die Vorschriften der Rechtsbehelfsbelehrung um eine Verpflichtung zur Belehrung
  über die Form und das fristauslösende Ereignis erweitert werden. Das schafft Rechtsklarheit
  und führt zu effizienteren Verfahren. Die Bundesregierung stärkt die Gerichte gegen
  querulatorische Klagen, indem offensichtlich aussichtslose und rechtsmissbräuchliche
  Verfahren erst nach Zahlung eines Gerichtskostenvorschusses betrieben werden können.
  Diese Verfahren nehmen Gerichte zeitlich stark in Anspruch. Mit der Änderung und
  finanziellen Hürde sollen Gerichte weiter entlastet werden. Gerichte sollen resilienter
  und wehrhafter werden und besser gegen den sogenannten exekutiven Ungehorsam vorgehen.
  Wirkt ein Hoheitsträger, also zum Beispiel eine Stadt oder ein Bundesland, bei der
  Vollstreckung nicht mit, soll der Höchstbetrag für das Zwangsgeld von 10.000 Euro
  auf 25.000 Euro erhöht werden. Außerdem soll das Zwangsgeld einem anderen nicht
  beteiligten öffentlichen Rechtsträger oder einer gemeinnützigen Einrichtung zufließen
  (Ausschluss „linke Tasche, rechte Tasche“). Dadurch werden Rechtsklarheit und klarere
  Regeln bei der Rechtsvollstreckung geschaffen. Die neuen Regelungen für das verwaltungsgerichtliche
  Verfahren werden auch auf die Prozessordnungen der Arbeits-, Sozial- und Finanzgerichte
  übertragen, soweit dies geboten ist.'
