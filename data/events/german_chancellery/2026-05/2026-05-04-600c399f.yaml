title: Schwerpunkte der Bundesregierung Wirkungsvolle Entlastungen, stabile Finanzen,
  moderner Staat
text: 'Ein Schwerpunkt der Bundesregierung ist das Wachstum in Deutschland voranzubringen.
  Die Bundesregierung will Deutschland wieder stark und wettbewerbsfähig machen. Mit
  einem Sondervermögen von 500 Milliarden Euro soll eine umfassende Modernisierung
  der Infrastruktur und ein beschleunigter Übergang zur Klimaneutralität ermöglicht
  werden. Steuerliche Entlastungen und gezielte Investitionsanreize fördern private
  und öffentliche Investitionen. Gleichzeitig setzt die Bundesregierung auf eine umfassende
  Digitalisierung und Bürokratierückbau, um Verwaltung und Wirtschaft effizienter
  zu gestalten und Innovationen voranzutreiben. Diese Maßnahmen sollen Unternehmen
  sowie Bürgerinnen und Bürgern den Alltag erleichtern: Solide Finanzen sind ein Gebot
  der Generationengerechtigkeit. Alle Maßnahmen des Koalitionsvertrags stehen deshalb
  unter Finanzierungsvorbehalt. Die Bundesregierung hat zudem mit den Haushaltsaufstellungen
  begonnen, ihre eigenen Aufgaben und Ausgaben eingehend zu überprüfen. Um Kosten
  zu senken, ist unter anderem vorgesehen, die eigenen Verwaltungsausgaben um neun
  Prozent zu senken und die Stellen in der Bundesverwaltung bis 2029 um acht Prozent
  zu reduzieren. Noch nie wurden so viele Investitionsmittel bereitgestellt wie in
  dem 500 Milliarden Euro starken Sondervermögen für Infrastruktur und Klimaneutralität.
  Geplant ist, für einen massiven Modernisierungsschub in Schienen, Straßen, Brücken
  und digitale Infrastruktur zu sorgen. Das Programm ist auf zwölf Jahre angelegt.
  In dieser Legislaturperiode will der Bund bis zu 150 Milliarden Euro investieren.
  Für Investitionen seitens der Länder und Kommunen ist ein Anteil von 100 Milliarden
  Euro vorgesehen. Weitere 100 Milliarden Euro aus dem Sondervermögen sollen schrittweise
  in den Klima- und Transformationsfonds fließen. Vorgesehen ist, diesen effizienter
  und sozialer auszugestalten. Die Bundesregierung setzt sich für den Abbau überflüssiger
  Regulierungen auf breiter Ebene ein. Sie treibt die Staatsmodernisierung voran und
  hat deshalb alle entsprechenden Kompetenzen in einem Ministerium gebündelt. Regeln
  und Dokumentationspflichten sollen reduziert oder vereinfacht werden. Mit den Maßnahmen
  der Modernisierungsagenda Bund und der föderalen Modernisierungsagenda soll der
  Staat schneller, digitaler, effizienter und bürgerfreundlicher werden. Bund und
  Länder verfolgen das Ziel, Bürokratie abzubauen, Verfahren zu beschleunigen und
  staatliche Strukturen so zu modernisieren, dass Verwaltung, Bürgerinnen und Bürger
  sowie Wirtschaft spürbar entlastet werden. Ziel ist es, die Bürokratiekosten allein
  für die Wirtschaft um etwa 16 Milliarden Euro zu reduzieren. Für kürzere Planungs-
  und Genehmigungsverfahren hat die Bundesregierung das Infrastruktur-Zukunftsgesetz
  auf den Weg gebracht. Es soll den Bau neuer Schienen, Straßen und Brücken beschleunigen.
  Die Bundesregierung will Deutschland als Spitzenstandort für digitale Zukunftstechnologien
  aufstellen. Bis 2030 sollen mindestens 3,5 Prozent des Bruttoinlandsprodukts für
  Forschung und Entwicklung aufgewendet werden. Innovationen fördern soll auch das
  neue Gesetz zu Reallaboren, das Bundeserpobungsgesetz . Es ermöglicht Testläufe
  fast im Echtzeitbetrieb für neue Entwicklungen. In sogenannten Reallaboren können
  neue Entwicklungen, Anwendungen und Innovationen unter fast realen Bedingungen getestet
  werden – teils außerhalb des geltenden Rechts, aber immer unter behördlicher Begleitung.
  Das dient auch einer schnelleren und besseren Anpassung des Rechts an Innovationen.
  Ein zentrales Vorhaben für Innovationen ist auch die Hightech Agenda Deutschland
  . Mit der Hightech-Agenda fördert die Bundesregierung zentrale Technologien, damit
  Deutschland nicht nur ein Top-Forschungsstandort ist, sondern auch wieder ein wettbewerbsfähiger
  Technologie- und Innovationsstandort wird. Eine dieser zentralen Technologien ist
  die Künstliche Intelligenz ( KI ). Für deren Weiterentwicklung startet die Bundesregierung
  eine KI -Offensive. Die Umsetzung der europäischen KI -Verordnung schafft einen
  innovationsfreundlichen und verlässlichen Rechtsrahmen für Künstliche Intelligenz
  in Deutschland. Der Ausbau der Kapazität von Rechenzentren ist eine notwendige Grundlage,
  um KI -gestützte Lösungen und Anwendungen zu entwickeln. Deshalb will die Bundesregierung
  die Rechenzentrumskapazitäten in Deutschland bis 2030 mindestens verdoppeln. Zu
  den ersten großen Maßnahmen zur Umsetzung der Hightech-Agenda gehören die Mikroelektronik-Strategie
  der Bundesregierung und der Aktionsplan „Deutschland auf dem Weg zum Fusionskraftwerk“
  . Auch die Raumfahrt ist eine Zukunfts- und Schlüsseltechnologie und zentral für
  Deutschlands Sicherheit und militärische Fähigkeiten. Deshalb will die Bundesregierung
  sowohl die Europäische Weltraumorganisation als auch Deutschlands Raumfahrtindustrie
  stärken und das nationale Raumfahrtprogramm ausbauen.'
