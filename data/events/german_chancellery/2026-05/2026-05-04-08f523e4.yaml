title: 'Staatsminister Weimer setzt Kulturbauten-Initiative fort – Weimer: „Kulturbauten
  sind die Bausteine unserer kulturellen Identitäten“'
text: 'Die Bundesregierung stärkt auch in diesem Jahr die kulturelle Infrastruktur
  mit weiteren Investitionen und fördert gezielt kulturelle Einrichtungen und Kulturdenkmäler
  von nationaler Bedeutung. Staatsminister für Kultur und Medien, Wolfram Weimer,
  sagte heute Fördermittel in Höhe von über 35 Millionen Euro für Projekte zu. Die
  Mittel kommen aus dem parlamentarisch initiierten Förderverfahren „KulturInvest“.
  Bei einem Empfang im Bundeskanzleramt gratulierte er den anwesenden Projektbeteiligten
  zu den ausgewählten Vorhaben: Staatsminister Weimer sagte im Vorfeld: „Die Projekte
  zeigen die Vielfalt der deutschen Kulturlandschaft. Sie alle zeichnen sich durch
  ihre ganz eigene regionale Besonderheit aus. Und doch bilden alle zusammen ein großes
  Ganzes. Sie sind die Bausteine, aus denen unsere kulturellen Identitäten entstehen.“
  Staatsminister Weimer ergänzte: „Kulturbauten sind die Klammer um Vergangenheit,
  Gegenwart und Zukunft unserer Kulturnation. Über Generationen hinweg laden sie ein
  zur Begegnung und zum Dialog über Werte, Erinnerungen und gemeinsame Erfahrungen.
  Mein besonderer Dank gilt dem Deutschen Bundestag für die Bereitstellung der Mittel.“
  Mit gezielten Investitionen in Einrichtungen und Denkmäler von nationaler Relevanz
  stärkt der Bund Orte, die das kulturelle Erbe bewahren. Im Rahmen des Förderverfahrens
  „KulturInvest” wurden bislang über 200 Maßnahmen mit knapp einer Milliarde Euro
  aus dem Kulturhaushalt bewilligt.'
