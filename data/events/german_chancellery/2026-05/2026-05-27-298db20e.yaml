title: Bundeskanzler Merz gratuliert dem Premierminister der Salomonen, Herrn Matthew
  Cooper Wale
text: Sehr geehrter Herr Premierminister, zu Ihrem Amtsantritt als Premierminister
  der Salomonen gratuliere ich Ihnen herzlich. Deutschland und die Salomonen verbindet
  eine partnerschaftliche Zusammenarbeit, die wir auch künftig erfolgreich fortsetzen
  möchten. Für die vor Ihnen liegenden verantwortungsvollen Aufgaben wünsche ich Ihnen
  viel Erfolg, Kraft und eine glückliche Hand. Mit freundlichen Grüßen Friedrich Merz
  Bundeskanzler der Bundesrepublik Deutschland
