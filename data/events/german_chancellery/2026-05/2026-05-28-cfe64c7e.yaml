title: Gedenken an Völkermord an den Herero und Nama Dem Weg der Versöhnung verpflichtet
text: 'Gefangene Herero 1904/05 in Ketten: Die Kolonialmacht führte Krieg gegen die
  lokale Bevölkerung. Namibia erinnert mit einem offiziellen Gedenktag am 28. Mai
  an das Schicksal der Herero und Nama: Nach Schätzungen starben 100.000 Menschen
  aus diesen Bevölkerungsgruppen von 1904 bis 1908 während der Gräueltaten in der
  Kolonialzeit. Auch für Deutschland ist das Andenken an die Opfer und der Weg zur
  Versöhnung wichtig. 2021 machte die Bundesregierung deutlich, dass Deutschland Namibia
  und die Nachkommen der Opfer um Verzeihung bitten will. Sie erkannte den Völkermord,
  der im damaligen Deutsch-Südwestafrika begangen wurde, und die moralische, historische
  und politische Verantwortung hierfür an. In diesem Sinne unterstrich Bundespräsident
  Frank-Walter Steinmeier 2024 in seiner Rede beim Staatsbegräbnis für den ehemaligen
  namibischen Präsidenten Hage Geingob: „Versöhnung bedeutet nicht, die Vergangenheit
  hinter sich zu lassen, sondern Verantwortung für die eigene Vergangenheit zu übernehmen.“
  Warum ist der 28. Mai in Namibia ein Gedenktag? Die Regierung Namibias rief den
  28. Mai zum „ Genocide Remembrance Day “ aus – nach jahrelanger Debatte um einen
  Gedenktag, der für alle betroffenen Gemeinschaften in Namibia akzeptabel sein sollte.
  Der Gedenktag erinnert an das Datum, an dem 1908 die Schließung aller damals so
  bezeichneten Konzentrationslager in Deutsch-Südwestafrika angeordnet wurde. Er wurde
  2025 zum ersten Mal begangen. Von 1884 bis 1915 war das Deutsche Reich Kolonialmacht
  im heutigen Namibia. Die deutschen Soldaten bekämpften die lokale Bevölkerung mit
  militärischer Gewalt und dehnten ihr Herrschaftsgebiet immer weiter aus. In der
  Zeit von 1904 bis 1908 führten die deutschen Kolonialherren einen Vernichtungskrieg
  gegen die Herero und Nama. Generalleutnant Lothar von Trotha befahl die völlige
  Vernichtung der Herero im Oktober 1904 und der Nama im April 1905. 100.000 Menschen
  starben durch Gewalt, sie verdursteten oder kamen in Lagern um. Diese Verbrechen
  gelten als der erste Völkermord des 20. Jahrhunderts. Ein zentrales Anliegen Deutschlands
  ist die Aufarbeitung der Gräueltaten von 1904 bis 1908. Eine enge Zusammenarbeit
  besteht unter anderem bei Rückführung von Kulturgütern, dem Kulturerhalt, der wissenschaftlich-historischen
  Forschung wie auch der Förderung bilateraler Kulturprojekte. Im Mai 2021 wurde eine
  Gemeinsame Erklärung zur Aufarbeitung der deutschen Kolonialverbrechen von Deutschland
  und Namibia paraphiert. Hierzu finden noch weitere Gespräche beider Seiten statt.
  Wichtig aber bleibt: Die Verbrechen der deutschen Kolonialherrschaft sind das dunkelste
  Kapitel deutsch-namibischer Beziehungen. Die Anerkennung deutscher Schuld und die
  Bitte um Entschuldigung sind wichtige Schritte, um gemeinsam die Verbrechen aufzuarbeiten
  und die Zukunft zu gestalten.'
