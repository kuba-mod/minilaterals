title: Im Kabinett beschlossen Jahresbericht 2025 zur Rüstungskontrolle
text: Die Internationale Atomenergie-Organisation ( IAEO, englisch IAEA ) hat die
  Hauptaufgabe, die friedliche Nutzung der Kernenergie weltweit zu fördern und zu
  überwachen. Die Sicherheitslage hat sich weltweit drastisch verändert. Damit stehen
  die globale Rüstungskontrolle, Abrüstung und Nichtverbreitung vor enormen Herausforderungen.
  Zu diesem Ergebnis kommt die Bundesregierung in ihrem „Bericht zum Stand der Bemühungen
  um Rüstungskontrolle, Abrüstung und Nichtverbreitung sowie über die Entwicklung
  der Streitkräftepotenziale für das Jahr 2025“. Der sicherheitspolitische Schwerpunkt
  der Bundesregierung liegt auf der Stärkung der Abschreckungs- und Verteidigungsfähigkeit.
  Ziel ist, dass die Bürgerinnen und Bürger in Deutschland auch künftig in Frieden,
  Freiheit und Sicherheit leben können. Laut Bericht geht die größte Bedrohung weiterhin
  von Russland aus, das seinen Angriffskrieg gegen die Ukraine mit unverminderter
  Härte fortführt und weiter massiv militärisch aufrüstet. Eine gesicherte Verteidigungsfähigkeit
  und glaubhafte Abschreckung durch die NATO sind vor diesem Hintergrund von zentraler
  Bedeutung für die Sicherheit Deutschlands und Europas. Die USA versuchen, zusätzlich
  zu Russland, auch China zu Gesprächen zur nuklearen Rüstungskontrolle zu bewegen.
  China führt seine Produktion von Kernsprengköpfen kontinuierlich fort und verfügt
  inzwischen über das drittgrößte Nuklearwaffenarsenal weltweit. Bislang zeigt China
  jedoch keine Bereitschaft, sich rüstungspolitisch zu binden. Für die Bundesregierung
  ist der nukleare Nichtverbreitungsvertrag (NVV) der Eckpfeiler der internationalen
  nuklearen Ordnung. Der Vertrag gilt seit 1970 und soll verhindern, dass sich Atomwaffen
  weiter verbreiten, die friedliche Nutzung der Kernenergie fördern und zur Abrüstung
  von Atomwaffen beitragen. Von Iran fordert die Bundesregierung die volle Transparenz.
  Außerdem drängt sie auf Zugang der Internationalen Atomenergie-Organisation (IAEO)
  zu den umstrittenen iranischen Atomanlagen. Nordkorea wird zudem aufgefordert, sein
  Atomwaffenprogramm vollständig und überprüfbar einzustellen. Neue Technologien,
  insbesondere Biotechnologie, Künstliche Intelligenz ( KI ) und Quantentechnologie,
  stellen weitere Herausforderungen dar. Deren Chancen und Risiken müssen im Kontext
  der Rüstungskontrolle noch besser erfasst werden. Die Bundesregierung setzt sich
  international für Regelungen in Bezug auf Systeme mit autonomen Funktionen sowie
  für eine verantwortungsvolle Nutzung von KI im militärischen Bereich ein.
