title: '81 Jahre Ende des Zweiten Weltkriegs – Staatsminister Weimer: „Auseinandersetzung
  mit der Vergangenheit bleibt zentral“'
text: Der 8. Mai markiert mit der Kapitulation der deutschen Wehrmacht das Ende des
  Zweiten Weltkriegs in Europa. Damit ging ein von Deutschland ausgehender Vernichtungskrieg
  zu Ende, der Millionen Menschenleben kostete und unermessliches Leid über Europa
  und die Welt brachte. „Der 8. Mai ist ein Tag der Befreiung – von der nationalsozialistischen
  Terrorherrschaft, von Krieg und Gewalt. Zugleich ist er ein Tag der Mahnung. Die
  Auseinandersetzung mit unserer Vergangenheit ist und bleibt eine zentrale Aufgabe
  der Gesellschaft,“ sagte Staatsminister für Kultur und Medien, Wolfram Weimer. „Die
  nationalsozialistischen Verbrechen dürfen nicht relativiert oder infrage gestellt
  werden,“ so Weimer weiter. „Wer heute versucht, unsere Vergangenheit umzudeuten
  oder die Verantwortung Deutschlands kleinzureden, gefährdet das Fundament unseres
  demokratischen Selbstverständnisses. Gerade deshalb braucht es eine lebendige Erinnerungskultur,
  die zeigt, wohin Ausgrenzung, Hass und autoritäres Denken führen und dass Freiheit,
  Rechtsstaatlichkeit und Menschenrechte keine Selbstverständlichkeit sind, sondern
  immer wieder neu verteidigt werden müssen.“ In der Nacht vom 8. auf den 9. Mai 1945
  unterzeichneten die Oberkommandierenden der Wehrmacht in Berlin die bedingungslose
  Kapitulation Deutschlands und besiegelten damit das Ende des Zweiten Weltkriegs
  in Europa. Heute befindet sich am authentischen Ort das mit den Mitteln des Beauftragten
  der Bundesregierung für Kultur und Medien (BKM) geförderte Museum Berlin-Karlshorst,
  das den Vernichtungskrieg und das Kriegsende und deren menschliche, gesellschaftliche
  und politische Folgen vermittelt. Dreizehn Jahre nach der Eröffnung hat in diesem
  Frühjahr mit Unterstützung des BKM die Überarbeitung der Dauerausstellung begonnen,
  die aktuelle Entwicklungen sowie neuere Forschungsergebnisse mit erweiterten europäischen
  Perspektiven einbeziehen und Vermittlungsformate zeitgemäßer gestalten soll. Künftig
  wird am Museum Berlin-Karlshorst auch die „Plattform deutsch-russische Geschichte“
  angesiedelt sein. Dieses Netzwerk von Expertinnen und Experten hat die Aufgabe,
  die deutsch-russischen Beziehungen zu erforschen und einer breiteren Öffentlichkeit
  zugänglich zu machen. Dabei wird sie sich auch kritisch mit Geschichtsmythen der
  aktuellen russischen Regierung auseinandersetzen.
