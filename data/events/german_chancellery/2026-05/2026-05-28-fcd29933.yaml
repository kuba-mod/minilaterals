title: Schwerpunkte der Bundesregierung Sicheres Zusammenleben, geordnete Migration,
  stärkere Integration
text: 'Ein Schwerpunkt der Bundesregierung: Migration ordnen und Integration stärken.
  Ein handlungsfähiger Staat ist die Grundlage für Sicherheit, Stabilität und Wohlstand.
  Um in einer zunehmend vernetzten und komplexen Welt, sowohl auf interne als auch
  externe Herausforderungen effektiv zu reagieren, setzt die Bundesregierung auf eine
  umfassende Sicherheitsoffensive. Darüber hinaus soll Migration klarer gesteuert
  und besser geordnet werden. Ziel ist es, den Schutz der Bürgerinnen und Bürger zu
  gewährleisten und die demokratische Ordnung zu festigen. Die Bundesregierung startet
  eine Sicherheitsoffensive : Sicherheits-, Zivilschutz- und Katastrophenschutzbehörden
  sollen gestärkt werden. Sie bekommen zeitgemäße, auch digitale Befugnisse, neue
  Fähigkeiten und ausreichend Personal. Die Bundesregierung richtet einen Nationalen
  Sicherheitsrat unter dem Vorsitz des Bundeskanzlers ein. Damit soll die Fülle an
  Kompetenz und Wissen in Fragen der inneren, äußeren, wirtschaftlichen und digitalen
  Sicherheit künftig noch besser gebündelt und genutzt werden. Drohnenabwehr und Waffenkontrollen
  – die Bundespolizei braucht Befugnisse, die den heutigen Gefahrenlagen entsprechen.
  Deshalb reformiert die Bundesregierung das Bundespolizeigesetz umfassend. Mit den
  Änderungen im Zweiten Gesetz zur Änderung des Luftsicherheitsgesetzes wird die Drohnenabwehr
  weiter verbessert. Mit dem Gesetz zur Umsetzung der Richtlinie (EU) 2017/541 zur
  Terrorismusbekämpfung und zur Anpassung des Strafrahmens bei geheimdienstlicher
  Agententätigkeit verschärft die Bundesregierung die Strafvorschriften bei terroristischen
  Handlungen und Spionage. Um den Einsatz der Bundespolizistinnen und -polizisten
  sicherer zu machen, schafft die Bundesregierung mit einer Änderung des Gesetzes
  über die Ausübung unmittelbaren Zwangs durch Vollzugsbeamte des Bundes ( UZwG )
  die Rechtsgrundlage für eine flächendeckende Ausstattung mit Distanz-Elektroimpulsgeräten
  („ Taser “). Um wirksam die Kriminalität im Netz zu bekämpfen, ermöglicht die Bundesregierung
  die vorsorgliche Speicherung von IP-Adressen . Anbieter von Internetzugangsdiensten
  werden verpflichtet, diese für drei Monate zu speichern. IP--Internetprotokoll -Adressen
  sind insbesondere relevant für die Aufklärung von kinderpornographischen Straftaten,
  Cyber -Betrug, Hasskriminalität im Netz aber auch bei Fällen krimineller Handelsplattformen
  oder beim Online -Betrug ( Fakeshops ). Gerade wenn es um terroristische und andere
  schwere Straftaten geht, sind Polizei und Strafverfolgungsbehörden auf zeitgemäße
  Instrumente angewiesen. Das ermöglicht die Bundesregierung mit dem Gesetzespaket
  zum Ausbau der digitalen Befugnisse. Straftaten mit explosionsgefährlichen Stoffen,
  wie etwa Geldautomatensprengungen, haben in den letzten Jahren stark zugenommen.
  Deshalb passt und verschärft die Bundesregierung das Sprengstoffgesetz sowie das
  Strafgesetzbuch . Mit dem KRITIS -Dachgesetz werden erstmalig bundeseinheitliche
  und sektorübergreifende Mindeststandards für den Schutz kritischer Infrastrukturen
  festlegt. Mit dem NIS 2-Umsetzungs- und Cyber stärkungsgesetz setzt die Bundesregierung
  neue europäische Sicherheitsstandards in deutsches Recht um – für Wirtschaft und
  Verwaltung. Um die Cybersicherheit zu stärken und die Sicherheitsbehörden des Bundes
  in die Lage zu versetzen, bei schwerwiegenden Gefahren Cyberangriffe auch aktiv
  verhindern, stoppen oder zumindest abmildern zu können, hat die Bundesregierung
  das Gesetz zur Stärkung der Cybersicherheit auf den Weg gebracht. Darüber hinaus
  hat die Bundesregierung Eckpunkte für mehr Cyber sicherheit sowie eine Nationale
  Wirtschaftsschutzstrategie beschlossen. Mit den Änderungen im Gewaltschutzgesetz
  verankert die Bundesregierung erstmals bundeseinheitlich die elektronische Fußfessel
  und stärkt den Schutz vor häuslicher Gewalt. Die Bundesregierung verstärkt den Kampf
  gegen Organisierte Kriminalität . Mit einem Aktionsplan wird gegen kriminelle Strukturen
  entschlossen vorgegangen – mit Künstlicher Intelligenz, mehr Personal und einem
  verbesserten Informationsaustausch. Mit dem Gesetzentwurf zur Stärkung der strafrechtlichen
  Verfolgung des Menschenhandels und der sexuellen Ausbeutung wird der Kampf gegen
  Menschenhandel und der sexuellen Ausbeutung in Deutschland gestärkt und Täterinnen
  und Täter konsequenter zur Rechenschaft gezogen. Der Bundesregierung ist es wichtig,
  jedweder Destabilisierung der freiheitlichen demokratischen Grundordnung entgegenzuwirken.
  Deswegen zielt sie auf: Deutschland ist und bleibt ein Einwanderungsland – aber
  mit klaren Regeln. Das Grundrecht auf Asyl bleibt unangetastet. Diese wesentlichen
  Maßnahmen einer konsequenteren Migrationspolitik will die Bundesregierung angehen:
  Mit dem Gesetz zur Bestimmung von sicheren Herkunftsstaaten durch Rechtsverordnung
  und Abschaffung des anwaltlichen Vertreters bei Abschiebungshaft und Ausreisegewahrsam
  will die Bundesregierung Asylverfahren beschleunigen und Rückführungen schneller
  und effizienter umsetzen. Ziel ist es, unter anderem die Einstufung sicherer Herkunftsstaaten
  zu vereinfachen. Das Gesetz zur Aussetzung des Familiennachzugs zu subsidiär Schutzberechtigten
  ist am 24.07.2025 in Kraft getreten. Damit wird dieser bis zum 23.07.2027 ausgesetzt.
  Deutschland ist geprägt von Menschen unterschiedlicher Herkunft. Es gilt den sozialen
  Zusammenhalt zu stärken. Dazu muss Integration gefördert , aber auch mehr als bisher
  gefordert werden. Eine gelungene Integration führt über den Zugang zu Sprache, Bildung
  und Arbeit. Geplante wesentliche Maßnahmen der Bundesregierung sind deshalb: Mit
  dem Sechsten Gesetz zur Änderung des Staatsangehörigkeitsrechts stellt die Bundesregierung
  klar: Einbürgerung setzt eine dauerhaft gewachsene Bindung an Deutschland voraus
  – sprachlich, sozial, wirtschaftlich und kulturell. Der Erwerb der Staatsangehörigkeit
  soll Ausdruck nachhaltiger Integration sein. Die bisherige Möglichkeit einer Fristverkürzung
  auf drei Jahre entfällt. Die Bundesregierung bekennt sich zur europäischen Solidarität
  in der Asyl- und Migrationspolitik. Sie setzt die Beschlüsse zum Gemeinsamen Europäischen
  Asylsystem (GEAS) in nationales Recht um. Ziel ist eine gerechtere Verteilung und
  eine schnellere Bearbeitung von Asylanträgen in Europa. Darüber hinaus setzt die
