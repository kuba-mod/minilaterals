title: Gesetz in Kraft Für eine höhere Tarifbindung
text: 'Bauarbeiten auf der Autobahn A3 im Ruhrgebiet: Aufträge des Bundes sind ein
  bedeutender Wirtschaftsfaktor. Unternehmen müssen ihren Beschäftigten seit 1. Mai
  2026 tarifvertragliche Arbeitsbedingungen gewähren, wenn sie Aufträge des Bundes
  ausführen. Das betrifft beispielsweise die Entlohnung, Urlaubsansprüche und Regelungen
  zu Ruhezeiten. Das Bundestariftreuegesetz ist nun in Kraft getreten. Das Gesetz
  gilt für Vergaben auf Bundesebene ab 50.000 Euro. Bürokratie, Nachweispflichten
  und Kontrollen sind auf ein absolutes Minimum begrenzt: Im Vergabeverfahren kann
  ein Tariftreueversprechen als einfache, unbürokratische Erklärung abgegeben werden.
  Bundesarbeitsministerin Bärbel Bas hatte zu dem Vorhaben erklärt: „Lohn- Dumping
  mit Steuergeld schieben wir einen Riegel vor.” Unternehmen, die ihre Beschäftigten
  nach Tarif bezahlen, dürften keinen Nachteil haben. Bisher waren tarifgebundene
  Unternehmen im Wettbewerb oft benachteiligt: Sie kamen bei Vergaben häufig nicht
  zum Zug oder bewarben sich erst gar nicht. Denn nichttarifgebundene Konkurrenten
  konnten ihre Waren und Dienstleistungen aufgrund geringerer Personalkosten meist
  günstiger anbieten. Das verzerrte den Wettbewerb. Die Zahl der tarifgebundenen Betriebe
  und der Beschäftigten für die ein Tarifvertrag gilt, ist in den vergangenen Jahren
  stetig gesunken. Früher waren drei von vier Arbeitsplätzen tarifgebunden; heute
  ist es nur noch jeder zweite. Dies wirkt sich nachteilig auf Löhne und Arbeitsbedingungen
  aus. Mit dem Bundestariftreuegesetz setze der Bund einen Anreiz für mehr Tarifbindung,
  so Bas. Tarifverträge seien „die Basis für anständige Löhne und gute Arbeitsbedingungen“.
  Einige Bundesländer haben bereits ähnliche Regelungen. Künftig wird das Gesetz den
  Verdrängungswettbewerb über die Lohn- und Personalkosten auch auf Bundesebene einschränken.
  Und das kommt zum passenden Zeitpunkt: Mit dem Sondervermögen Infrastruktur werden
  in den kommenden Jahren zahlreiche öffentliche Aufträge vergeben. Viel Geld wird
  in die Modernisierung von Brücken, Krankenhäusern, Schulbauten fließen. Und da solle,
  wer im Auftrag des Bundes arbeite „auch ordentlich bezahlt werden“, so Ministerin
  Bas.'
