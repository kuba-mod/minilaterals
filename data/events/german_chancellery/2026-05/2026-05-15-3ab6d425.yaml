title: Bundesregierung aktuell
text: 'Bundeskanzler Friedrich Merz war am Freitag zu Gast beim Katholikentag in Würzburg.
  Das war aus doppelter Hinsicht ein symbolischer Termin für den Kanzler: Erstens,
  weil das Treffen der katholischen Laien und Gläubigen auch eine Demonstration ist
  für gesellschaftliches Engagement, Ausgleich und Zusammenhalt; damit steht der Katholikentag
  für die besten Werte, die sich eine Gesellschaft wünschen kann. Und zweitens findet
  das Treffen unter dem Leitwort "Hab Mut, steh auf!" statt. Diesen Mut braucht das
  gesamte Land - genauso wie die Lust am Aufbruch. Denn die anstehenden Reformen sind
  am besten zu bewältigen, wenn sie mit Zuversicht und Courage angegangen werden.
  Auf diesem Weg hat das Kabinett in dieser Woche zwei wichtige Entscheidungen getroffen
  – das Gesetz zur Gebäudemodernisierung und die Kraftwerksstrategie. Beide Entscheidungen
  haben mit Energie zu tun und mit Sicherheit. Bei den neuen Leitlinien zur Gebäudemodernisierung
  haben Hauseigentümer künftig mehr Freiheit bei der Entscheidung, welche Heizung
  sie einbauen können. Bisher galt, dass die Wärme in der Wohnung zu mindestens 65
  Prozent aus erneuerbarer Energie erzeugt werden musste. Jetzt bekommen die Eigentümer
  mehr Entscheidungsfreiheit. Wärmepumpe, Fernwärme, hybride Heizungsmodelle, Biomasseheizung
  – oder doch weiter Gas- und Öl? Der Trend zu klimaneutralen Techniken ist ungebrochen,
  auch das neue Gesetz wird ihn nicht brechen. Aber das starre Korsett wird gelockert,
  Technologieoffenheit ist das Zauberwort. Und das entlastet Bürgerinnen und Bürger
  im Saldo um rund 5,1 Milliarden Euro, die Wirtschaft um rund 2,3 Milliarden Euro.
  Und Mieter werden zusätzlich geschützt, wenn sie durch den Einbau einer unwirtschaftlichen
  Heizung erhöhte Nebenkosten befürchten müssen. Auch die Kraftwerksstrategie schließt
  eine gefährliche Lücke auf dem Weg hin zur Klimaneutralität. Weil alte und klimaschädliche
  Kraftwerke oder die Atomkraftwerke stillgelegt werden, wächst die Sorge vor den
  wind- und sonnenarmen Tagen. In dieser sogenannten Dunkelflaute, wenn Kollektoren
  oder Windräder keinen Strom erzeugen, werden künftig moderne Gaskraftwerke anspringen.
  Bereits in den nächsten zwölf Monaten soll eine Erzeugungs-Kapazität von elf Gigawatt
  ausgeschrieben werden. Eine wichtige Entscheidung für die Versorgungssicherheit,
  gerade für energieintensive Industrien. Das Kabinett hat, drittens, eine wichtige
  Entscheidung zum Schutz besonders von Frauen getroffen. Die Zahl der Straftaten,
  die mit Hilfe von K.o.-Tropfen begangen werden, hat zugenommen. Deswegen hat die
  Bundesregierung jetzt das Strafmaß heraufgesetzt: Bei Sexual- oder Raubdelikten
  mit Hilfe der K.o.-Tropfen gilt künftig eine Mindestfreiheitsstrafe von fünf statt
  bisher drei Jahren. Das wird eine hoffentlich abschreckende Wirkung entfalten. Warum
  ich diese Entscheidungen der Woche aufzähle: weil es voran geht, Schritt für Schritt,
  auch mit den großen Reformvorhaben zum Arbeitsmarkt, zur Rente, Gesundheit, dem
  Haushalt und einer Steuerreform. Dazu hat in dieser Woche der Koalitionsausschuss
  getagt und ein Verfahren verabredet. Gewerkschaften und Arbeitgeber werden auf diesem
  Weg eingebunden. „Hab Mut, steh auf“, heißt es auf dem Katholikentag. Das Motto
  gilt weit darüber hinaus. Gutes Telefonat mit Donald Trump auf seiner Rückreise
  aus China. Wir sind uns einig: Iran muss jetzt an den Verhandlungstisch. Die Straße
  von Hormus muss geöffnet werden. Teheran darf keine Nuklearwaffen haben. Wir haben
  auch über eine Friedenslösung für die Ukraine gesprochen und uns vor dem NATO-Gipfel
  in Ankara abgestimmt. Die USA und Deutschland sind starke Partner in einer starken
  NATO. Bundeskanzler Friedrich Merz, 15. Mai 2026 auf X werden energieintensive Unternehmen
  bei der Umstellung auf innovative, klimafreundliche Produktionsverfahren gefördert.
  Die EU-Kommission hat die deutsche Beihilfe genehmigt, das Bundeswirtschaftsministerium
  das Gebotsverfahren eröffnet. Wir freuen uns über Ihr Feedback: Nutzen Sie bitte
  dafür das Kontaktformular (nicht die Antwortfunktion auf diese E-Mail).'
