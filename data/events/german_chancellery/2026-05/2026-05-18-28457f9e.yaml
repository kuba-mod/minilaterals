date: '2026-05-18'
type: press_release
source_name: german_chancellery
title: Pressestatements von Kanzler Merz und Bulgariens Ministerpräsident Radev Deutschland
  und Bulgarien setzen auf Wettbewerbsfähigkeit und Europas Stärke
text: 'Bundeskanzler Merz und Bulgariens Ministerpräsidenten Rumen Radev betonten
  die enge Partnerschaft zwischen Deutschland und Bulgarien in Wirtschaft und EU -Politik
  Der bulgarische Ministerpräsident Rumen Radev wurde von Bundeskanzler Merz im Bundeskanzleramt
  empfangen. Sein Besuch so kurz nach dem Amtsantritt als bulgarischer Ministerpräsident
  am 8. Mai unterstreiche, wie eng Bulgarien und Deutschland in Europa verbunden seien.
  Angesichts der enormen sicherheitspolitischen Herausforderungen sei eine enge Abstimmung
  in Europa wichtiger denn je. Zudem bekräftigte Merz die Bedeutung Deutschlands als
  größter Handelspartner Bulgariens. In den Bemühungen um einen gerechten Frieden
  in der Ukraine werde man nicht nachlassen, sagte der Kanzler. (Die Protokollierung
  des fremdsprachlichen Teils erfolgte anhand der Simultandolmetschung.) Meine Damen
  und Herren, herzlich willkommen und ein besonders herzliches Willkommen dem neuen
  bulgarischen Ministerpräsidenten Rumen Radev zu seinem ersten Besuch außerhalb des
  eigenen Landes, zehn Tage nach seiner Wahl zum Ministerpräsidenten! Wir freuen uns
  sehr, dass Sie heute in Berlin sind – und ganz herzlichen Glückwunsch zum ersten
  Platz im Eurovision Song Contest mit „Bangaranga“! Ganz Europa ist im Rausch dieses
  Songs, und das wird wahrscheinlich der Ohrwurm des Sommers 2026 werden. Ihr Besuch
  so kurz nach der Amtseinführung und nach dem Amtsantritt unterstreicht, wie eng
  unsere beiden Länder miteinander verbunden sind. Wir fühlen uns geehrt und danken
  sehr dafür, dass Sie heute nach Berlin gekommen sind. Es gibt viele tausend Bulgarinnen
  und Bulgaren, die in Deutschland leben. Wir sind auch wirtschaftlich sehr eng miteinander
  verbunden. Deutschland ist der größte Handelspartner. Für Bulgarien und in der Europäischen
  Union sind wir seit vielen Jahren gute Partner. Ich freue mich, diese Verbindung
  unter Ihrer Führung jetzt auch in der Europäischen Union fortzusetzen und im Europäischen
  Rat gemeinsam Europa zu stärken. Denn das ist unser gemeinsames Anliegen, so haben
  wir es eben auch besprochen. Ich muss das sagen: Ich bin sehr dankbar, dass die
  Stärkung der Wettbewerbsfähigkeit der Europäischen Union eines unserer gemeinsamen
  zentralen Anliegen für die Europäische Union ist. Wir müssen dafür den Binnenmarkt
  vertiefen, wir müssen Bürokratie konsequent zurückbauen und wir müssen unsere internationalen
  Handelsbeziehungen weiter ausbauen. Wir haben beim informellen Europäischen Rat
  auf Zypern mit dem Europäischen Parlament, dem Rat und der Europäischen Kommission
  dazu eine gemeinsame Verabredung getroffen, einen Fahrplan unterzeichnet, der Maßnahmen
  und Zeitziele beinhaltet. Viele dieser Maßnahmen sollen noch im Jahr 2026 verabschiedet
  werden. Viele weitere sollen in den Folgejahren folgen. Wir brauchen zugleich ein
  souveränes und wirtschaftlich starkes Europa, auch mit einem reformierten Mehrjährigen
  Finanzrahmen. Wir werden in diesem Jahr versuchen festzulegen, wohin wir die europäischen
  Gelder in Zukunft lenken wollen. Für mich und auch für die Bundesregierung ist dabei
  klar: Wir brauchen Investitionen in unsere Prioritäten Wettbewerbsfähigkeit und
  Verteidigung. Deswegen unterstützen wir ja auch den von der Kommission vorgelegten
  Vorschlag eines Mehrjährigen Finanzrahmens, der nachdrücklich diese Ziele unterstützt
  – Souveränität, Wettbewerbsfähigkeit und Verteidigung. Uns ist wichtig, auch mir
  persönlich: Übermäßige Verschuldung darf es in der Europäischen Union nicht geben.
  Diese Verschuldung bedroht heute schon vielen Ortes die Souveränität, sie bindet
  auch die Handlungsfähigkeit. Einige Länder geben heute mehr für Zinsen aus als für
  Verteidigung. In eine solche Lage dürfen wir in der Europäischen Union insgesamt
  nicht kommen. Mit Blick auf unsere enormen sicherheitspolitischen Herausforderungen
  war eine enge Abstimmung in Europa nie wichtiger als heute. Wir werden in unseren
  Bemühungen für einen dauerhaften und gerechten Frieden auch in der Ukraine nicht
  nachlassen. Auch darüber haben wir heute gesprochen. Wir erhöhen weiter den Druck
  auf Moskau. Auf Europas konsequente Unterstützung kann sich Kyjiw verlassen. Moskau
  muss verstehen, dass es verhandeln muss. Europa steht bereit, an den Verhandlungstisch
  zu kommen, mit der Ukraine, mit Russland und mit den Vereinigten Staaten. Ich bin
  froh und dankbar, lieber Rumen Radev, dass Bulgarien diesen Weg in europäischer
  Solidarität mitgehen will. Dass Europa seit dem Antritt der neuen ungarischen Regierung
  zu einer neuen Geschlossenheit und Entschlossenheit gefunden hat, wird uns dem Frieden
  ein Stück näherbringen. Meine Damen und Herren, heute vielleicht eine letzte Botschaft
  an den Iran: Teheran darf nicht länger die Region und die ganze Welt zur Geisel
  nehmen. Das militärische Nuklearprogramm muss überprüfbar beendet werden. Es darf
  keine Schläge gegen Israel und unsere Partner in der Region geben. Iran muss die
  freie und gebührenfreie Durchfahrt durch die Straße von Hormus wieder ermöglichen.
  Wir werden uns dafür weiter einsetzen. Sie wissen, dass ich am letzten Freitag mit
  Präsident Trump telefoniert habe. Wir waren uns über die Ziele und die Notwendigkeit
  einer Verhandlungslösung einig. In diesem Sinne noch einmal: Sehr herzlichen Dank
  für das Kommen nach Berlin, für den ersten Besuch, für den Antrittsbesuch heute.
  Ich freue mich auf unsere Zusammenarbeit in der Europäischen Union. Ich freue mich
  aber auch auf die Vertiefung der bilateralen Beziehungen zwischen Deutschland und
  Bulgarien. Bulgarien wird unter Ihrer Führung ein wichtiger und interessanter Investitionsstandort,
  auch für die deutsche Wirtschaft. Es gibt attraktive Investitionsbedingungen in
  Bulgarien. Das stärkt uns gemeinsam in der Europäischen Union, aber auch zwischen
  unseren beiden Ländern. Insofern kann ich nur noch einmal sagen: Auf gute Zusammenarbeit,
  bilateral, aber auch in der Europäischen Union! Sehr geehrter Herr Bundeskanzler,
  sehr verehrte Damen und Herren, ich danke herzlich für diesen warmherzigen Empfang,
  auch für die Einladung. Für mich und für meine Delegation ist es eine große Ehre,
  hier in Berlin zu sein. Es ist gar nicht zufällig, dass mein erster Besuch als Ministerpräsident
  der Republik Bulgarien in Ihrem Land ist. Deutschland ist unser strategischer Verbündeter,
  Partner und langjähriger Freund. Deutschland ist ein führender Investor in Bulgarien
  und mit einem jährlichen Umsatz von 12 Milliarden Euro Warenumtausch Bulgariens
  größter Handels- und Wirtschaftspartner. Das ist eine Zahl, die jedes Jahr steigt.
  Ich habe den Bundeskanzler mit der sozial-ökonomischen Entwicklung in Bulgarien
  und mit den Ergebnissen der durchgeführten außerordentlichen Parlamentswahlen vor
  einem Monat vertraut gemacht. Bulgarien ist ein Land mit einem bedeutenden Potenzial,
  und das nicht nur wegen der strategischen geografischen Lage des Landes, das Mitteleuropa
  und den Balkan miteinander verbindet, mit der großen Region des Schwarzen Meeres,
  die immer bedeutender wird, und auch mit dem nahen und weiteren Osten. Bulgarien
  hat es in den vergangenen Jahren geschafft, die Interkonnektivität zu erweitern
  und wichtige europäische digitale Transportnetze zu verbinden. Mithilfe der deutschen
  Investitionen haben wir es geschafft, eine moderne Verarbeitungsindustrie und weitere
  Industrien zu entwickeln. Wir haben hochtechnologische Produktionskapazitäten im
  Automobilsektor, in der Elektronik, der Mechatronik, der Weltraumtechnologie und
  der Verteidigungswirtschaft eingeführt. Wir haben ein nachhaltiges Start-up- und
  IT -System aufgebaut, in dem AI eine immer wichtigere Rolle spielt. Wir haben es
  geschafft, den deutschen Tourismus zu allen Jahreszeiten zu erhöhen, und ich hoffe,
  dass diese Tendenz fortgeführt wird; denn dies freut mich wirklich. Das Wichtigste
  ist aber, dass Bulgarien sich nicht nur als ein Peripherieland sieht, sondern sich
  zu einem wichtigen Industrie- und Logistikpartner Deutschlands und Europas umgewandelt
  hat. Wir verdanken das vor allen Dingen der Hingabe, dem Talent und dem Ehrgeiz
  unserer Landsleute, erfolgreich zu sein. Der Herr Bundeskanzler hat mich hier überrascht,
  indem er den Sieg Bulgariens beim Eurovision Song Contest angesprochen hat. Auch
  das ist ein Zeichen für die Talente meines Volkes, und wir hoffen, dass das Interesse
  Deutschlands auch in ein Investitionsinteresse gipfelt. Ich möchte hier auch darauf
  hinweisen, dass wir in den letzten fünf Jahren aufgrund politischer Instabilität
  und von Defiziten bei der Rechtsstaatlichkeit in Bulgarien nicht in der Lage waren,
  unsere Potenziale voll auszuschöpfen. Nun hat sich das aber geändert: Zum ersten
  Mal seit 30 Jahren haben wir eine politische Kraft, die die Wahlen mit einer sehr
  breiten gesellschaftlichen Unterstützung gewonnen hat und auch eine überzeugende
  Mehrheit im Parlament hat. Mehr noch, wir haben jetzt eine neue technokratisch geprägte
  und sehr energetische Regierung, die ein klares Programm aufgestellt hat. Wir wollen
  die Rechtsstaatlichkeit stärken. Wir wollen den Weg für eine beschleunigte wirtschaftliche
  Entwicklung des Landes öffnen: über die Einführung von Hochtechnologieproduktion
  und KI -Lösungen, durch die Stärkung der Energiesicherheit, durch Beschleunigung
  von Infrastruktur- und Energieprojekten sowie durch die Steigerung der Produktivität.
  Von besonderer Bedeutung ist dabei ‑ darüber haben wir mit Herrn Merz gerade gesprochen ‑
  die gezielte und offensive Gewinnung internationaler Investitionen. Wir haben auch
  ganz eindeutig unsere Verantwortung für die wirtschaftliche und energetische Sicherheit
  Europas erklärt. Dafür sind wir hier ‑ das möchte ich betonen ‑, denn wir glauben
  daran, dass Bulgarien und Deutschland zusammen eine neue Seite in ihren Beziehungen
  eröffnen können. Es geht nicht nur um Handel und Investitionen, sondern es geht
  auch um gemeinsame Lösungen, damit wir gemeinsam zur strategischen Autonomie und
  zur neuen industriellen Sicherheit Europas beitragen, und zwar über hochtechnologische
  Produktion, über modern produzierte, sichere, zuverlässige Energie und natürlich
  über transparentes Management der Länder. Wir haben uns in dieser Hinsicht immer
  auf Deutschland verlassen, und das wollen wir auch in Zukunft tun. Diese Ziele unter
  Bedingungen globaler politischer Unsicherheit sowie angesichts von Kriegen und Konflikten
  in unserer Nachbarschaft zu erreichen, erfordert, dass Europa eine deutlich stärkere
  Rolle in der Diplomatie übernimmt und größere Anstrengungen unternimmt, deeskalierend
  zu wirken und zum Frieden zurückzufinden. Das, was der Herr Bundeskanzler gerade
  ausgeführt hat, nämlich dass Europa bereit ist und darauf hinarbeitet, dass Gespräche
  zwischen den USA, Europa, der Ukraine und Russland stattfinden, ist außerordentlich
  wichtig für unsere Zukunft. Wir brauchen aber auf jeden Fall noch etwas, und zwar
  eine klare Strategie für eigene europäische Verteidigungskapazitäten. Dafür müssen
  wir unsere Wettbewerbsfähigkeit erhöhen und unsere verteidigungsindustrielle Basis
  stärken. Die Beziehungen zu Deutschland entwickeln sich in dieser Hinsicht sehr
  intensiv, und ich hoffe, dass das auch in Zukunft so weitergeht. Unser Augenmerk
  liegt derzeit stark auf Wettbewerbsfähigkeit und Verteidigung, aber wir dürfen auch
  die Kohäsionspolitik und auch die gemeinsame Agrarpolitik nicht vergessen, denn
  das sind Schlüssel zum Wichtigsten: zur sozialwirtschaftlichen Heranführung und
  zur Vereinheitlichung Europas. Ich habe hier auch unsere Sorge mitgeteilt, dass
  der neue Mechanismus zur Planung des Mehrjährigen Finanzrahmens Bulgarien in die
  Situation bringt, einen zweimal höheren Beitrag zahlen zu müssen, und zwar vor dem
  Hintergrund zusätzlicher Ausgaben für die Einführung des Euro bei uns. Ich hoffe
  aber, dass wir über Dialog und gemeinsame Überlegungen eine wahre Bilanz, einen
  guten Weg erreichen werden. Denn das sind zwei Ziele, die sich keineswegs widersprechen
  dürfen; sie müssen sich gegenseitig ergänzen. Wir haben unsere Genugtuung hinsichtlich
  der Bemühungen, die von beiden Seiten geleistet wurden, geäußert, was die innere
  Sicherheit und die Bekämpfung der illegalen Migration, der grenzüberschreitenden
  Kriminalität und des Terrorismus betrifft. Ganz besonders sind unsere ausgezeichneten
  Beziehungen auf dem Gebiet der Kultur, der Bildung, der Wissenschaft und des Tourismus
  hervorzuheben. Noch etwas Wichtiges ‑ damit mache ich Schluss ‑ ist der Umstand,
  dass mehr als 400 000 bulgarische Staatsangehörige hier in Deutschland leben, arbeiten
  und lernen. Sie tragen natürlich auch zur Entwicklung der deutschen Wirtschaft bei.
  Gleichzeitig gibt es immer mehr deutsche Staatsangehörige, die nach Bulgarien ziehen
  und auch zeitweilig oder länger in Bulgarien leben. Das ist eine wichtige Brücke,
  um die Entwicklung unserer Beziehungen zu fördern. Verehrter Herr Bundeskanzler,
  mein lieber Friedrich, ich bedanke mich noch einmal für den wirklich sehr herzlichen
  Empfang. Ich bin überzeugt, dass die Gespräche, die wir geführt haben, nur der Anfang
  einer sehr fruchtbaren Zusammenarbeit im Sinne der Prosperität unserer beiden Völker
  und im Sinne des Friedens und der Sicherheit in Europa sind. Frage: Meine Frage
  richtet sich an beide, an den Bundeskanzler und an den Ministerpräsidenten. Es geht
  um die Verteidigung, von der Sie gerade gesprochen haben, und zwar um die gesamte
  Verteidigungspolitik Europas. Kann Bulgarien nach dem Vertrag mit Rheinmetall noch
  weitere ähnliche Verträge erwarten, die die gemeinsame Produktion betreffen, zum
  Beispiel die Drohnenherstellung oder die Produktion von Teilen für Airbus? Wie werden
  sich die Beziehungen zwischen Bulgarien und Deutschland in der gemeinsamen Verteidigungspolitik
  konkret entwickeln? Ministerpräsident Rumen Radev: Diese wichtigen Fragen haben
  wir natürlich auch angeschnitten und besprochen, denn die Verteidigung ist eine
  sehr große Herausforderung für uns, für Europa bzw. für uns und für unsere Kapazitäten.
  Wir arbeiten daran. Außer Rheinmetall gibt es potenzielle Möglichkeiten für viele
  andere Projekte, zum Beispiel für die industrielle Zusammenarbeit in allen gemeinsamen
  Bereichen. Ich will hier nicht nur IRIS-T-Systeme nennen, sondern auch den gemeinsamen
  europäischen Schild für die Luftverteidigung und außerdem die gemeinsamen Bemühungen,
  verschiedene Munition für die multifunktionalen Patrouillenschiffe zu beschaffen,
  die wir gemeinsam mit Deutschland produzieren. Sie tragen sehr stark zur Entwicklung
  des bulgarischen Schiffsbaus und überhaupt zur Integration der gesamten Ausstattung
  und der Bewaffnung bei. Auch RBS15 – das sind die Antischiffsysteme – und weitere
  konkrete Projekte gibt es. Für uns ist es wichtig, nicht nur aus Deutschland anzukaufen,
  zu beschaffen. Für uns ist es wichtig, auch eine industrielle Zusammenarbeit zu
  entwickeln, damit wir dann imstande sind, diese modernen, hochtechnologischen Plattformen
  zu unterhalten, damit auch wir in Bulgarien später einen Teil des Designs und auch
  der Produktion haben, sodass die bulgarische Verteidigungsindustrie sich vollwertig
  den großen europäischen Projekten anschließen kann. So, wie wir es mit Rheinmetall
  machen, wollen wir jetzt auch weitermachen. Dabei verlassen wir uns sehr stark auf
  Deutschland. Was die Drohnenproduktion betrifft, ist dieses Thema bereits verhandelt
  worden. Bulgarien wird auf diesem Gebiet, bei der Produktion von Drohnen und Antidrohnensystemen,
  immer besser. Das kann ich hier ganz verantwortungsvoll erklären. Sie wissen auch
  aus den Medien, dass ein gemeinsames Projekt zur Produktion von Eurodrohnen zwischen
  Deutschland und Frankreich gescheitert ist. Aber wir sind bereit für die Serienproduktion
  derselben Drohnenklasse durch eine bulgarische Firma. Das ist auch eine Information,
  die ich hier zur Verfügung stelle. Wenn wir von einem Programm sprechen, dann meinen
  wir natürlich nicht nur Waffen. Die Verteidigung hängt heutzutage immer mehr von
  KI ab. Es gibt ein gemeinsames, großes Projekt für den Aufbau einer Gigafabrik in
  Bulgarien durch eine deutsche Firma. Es ist ein sehr leistungsstarker Investor.
  Ich glaube, dass es bezeichnend für die Zukunft sein wird, dass unsere gemeinsame
  nützliche Zusammenarbeit erst weiterentwickelt wird. Bundeskanzler Friedrich Merz:
  Ich will das unterstreichen, was Ministerpräsident Rumen Radev gerade gesagt hat.
  Ich lege ja sehr viel Wert darauf, dass wir in der Europäischen Union zu einer engeren
  Industriekooperation kommen, und zwar mit dem Ziel, die Zahl der Systeme zu verringern,
  die Stückzahlen deutlich zu erhöhen und damit auch die Preise zu reduzieren, weil
  wir einfach zu wenig produzieren, bei zu vielen Systemen. Wir werden eine europäische
  Verteidigungsfähigkeit nur dann hinbekommen, wenn wir unsere industriellen Fertigkeiten
  kombinieren und wenn wir in der Europäischen Union dafür sorgen, dass wir weniger
  kompliziert sind, dass wir weniger Systeme haben und dass wir die Systeme, die wir
  haben, in sehr viel größeren Stückzahlen bauen. Dann werden wir eine Chance haben,
  aus den vorhandenen Mitteln das Beste zu machen, und das Beste heißt europäische
  Verteidigungsfähigkeit. Ich bin dem bulgarischen Ministerpräsidenten sehr dankbar
  dafür, dass wir das in der strategischen Dimension dessen, was wir hier besprechen,
  vollkommen übereinstimmend sehen. Denn genau das ist das Ziel. Wir brauchen europäische
  Souveränität, und europäische Souveränität heißt europäische Verteidigungsfähigkeit.
  Frage: Ich habe eine Frage an Sie, Herr Bundeskanzler, und auch an Sie, Herr Ministerpräsident.
  Zunächst an Sie, Herr Bundeskanzler: Sie haben die Frage der Verhandlungen mit Russland
  gerade angesprochen. Zuletzt wurde diskutiert, ob es möglicherweise Unterhändler
  geben könne. Dabei wird ein Name immer wieder genannt, nämlich der von Bundeskanzlerin
  a. D. Merkel. Können Sie sie sich als Unterhändlerin vorstellen? Wenn nicht, wen
  könnten Sie sich denn vorstellen? An Ministerpräsident Radev die Frage: Welche Maßnahmen
  ergreifen Sie, um die Medienfreiheit in Ihrem Land zu garantieren und auch die von
  einigen Experten befürchtete russische Desinformation in Bulgarien zurückzufahren?
  Bundeskanzler Merz: Wir sind in der Tat mit unseren europäischen Partnern schon
  seit langer Zeit in einem intensiven Dialog über unsere gemeinsamen Wege hin zu
  einer Friedenslösung; das wissen Sie. Wir diskutieren auch in diesen Tagen intensiv
  über diese Frage. Aber Sie werden Verständnis dafür haben, dass ich über Namen hier
  natürlich keine öffentlichen Spekulationen bestärken oder gar selbst auslösen werde.
  Wichtig ist, dass Russland bereit ist, an den Verhandlungstisch zu kommen und Gespräche
  zu führen. Diese Gespräche werden dann zwischen der Ukraine und Russland geführt,
  mit der Unterstützung der Amerikaner und der Europäer. Aber zuerst müssen die Kampfhandlungen
  eingestellt werden und muss Russland bereit sein, Verhandlungen zu führen. Bis jetzt
  hat Russland auf jedes Verhandlungsangebot mit noch intensiverem Beschuss auch ziviler
  Infrastruktur und des Landes der Ukraine reagiert. Das muss aufhören. Das ist die
  Voraussetzung dafür, dass es überhaupt Gespräche geben kann. Ministerpräsiden Radev:
  In unserer politischen Kraft, in unserer Regierung betrachten wir die Medienfreiheit
  mit größter Aufmerksamkeit. Ohne freie Medien ist es für uns undenkbar, eine Demokratie
  zu haben, gibt es keine effiziente Bekämpfung der Korruption und keine effiziente
  Bekämpfung hybrider Bedrohungen. Bei der Stärkung der Medien sehen wir zwei wichtige
  Punkte. An erster Stelle steht die Transparenz des Eigentums der Medien. An zweiter
  Stelle sehen wir die Sicherung der finanziellen Unabhängigkeit der bulgarischen
  nationalen Medien. Das ist das nationale Fernsehen und der nationale Rundfunk. Ich
  selbst habe Fälle kennen gelernt, in denen diese beiden öffentlich-rechtlichen Medien
  von einem unsicheren Haushalt abhängig waren, einem Haushalt, der von der entsprechenden
  Regierung sehr unterschiedlich entwickelt werden kann, je nachdem, ob diese großen
  nationalen Medien der Regierung gegenüber günstig eingestellt sind oder nicht. Ich
  spreche hier zwar als Ministerpräsident, aber ich will es trotzdem erklären. Für
  uns ist es ganz wichtig, eine stabile, konsequente Finanzierung dieser öffentlich-rechtlichen
  Medien zu sichern, die nicht von der Regierung und nicht vom Parlament abhängt.
  Erst dann werden wir tatsächlich freie Medien haben. Frage: Sie beide haben den
  Mehrjährigen Finanzrahmen der EU erwähnt. Wie wird in diesem Zusammenhang sichergestellt,
  dass sich die Erhöhung der Verteidigungsausgaben im Rahmen des nächsten Mehrjährigen
  Finanzrahmens nicht negativ auf die Kohäsionspolitik und die Agrarpolitik auswirken
  wird? Ich darf daran erinnern, dass die Lebensmittelpreise in Bulgarien immer weiter
  ansteigen. Ministerpräsident Radev: Das ist eine außerordentlich wichtige Frage
  für Bulgarien. Wie ich bereits erwähnte, ist es unheimlich wichtig, dass wir in
  diesem Mehrjährigen Finanzrahmen ein Gleichgewicht erreichen. So, wie er jetzt geplant
  ist, mit dem neuen Mechanismus, wirkt sich dieser Mechanismus doppelt auf Bulgarien
  aus. Er wirkt sich einerseits auf die Einnahmen aus. Wir werden weniger Einnahmen
  haben. Andererseits werden wir zweimal höhere Ausgaben als Beiträge zum europäischen
  Haushalt haben. Für uns ist besonders wichtig, eine nachhaltige Kohäsions- und Landwirtschaftspolitik
  zu haben, weil das auch zu einer politischen Stabilität im Lande führt. Das bedeutet,
  dass die Lage der Versorgung mit Lebensmitteln in Bulgarien sicher ist. Denn wir
  müssen neben der Verteidigung auch an die Sicherheit der Lebensmittelversorgung
  denken. Denn sowohl die COVID-Krise, die Energiekrise als auch die großen Unterbrechungen
  der globalen Versorgungsnetze zeigen uns, dass wir die Lebensmittelsouveränität
  erhalten müssen. Wenn wir alle Faktoren auf den Tisch legen ‑ da bin ich sicher ‑,
  sowohl die militärische Sicherheit und Verteidigung als auch die Wettbewerbsfähigkeit,
  ohne die Europa eigentlich dramatisch ins Hintertreffen gerät, und wenn wir dann
  auch die Sicherheit der Lebensmittelversorgung auf den Tisch legen, dann müssen
  wir als Gesamtlösung die gesamte Sicherheit Europas erreichen. Erst dann hat Europa
  die Möglichkeit, zu einem globalen Faktor auf der Weltkarte zu werden, wie wir uns
  das alle wünschen. Bundeskanzler Merz: Wir werden in den nächsten Wochen sehr intensive
  Verhandlungen in der Europäischen Union zu führen haben. Die Präsidentschaft aus
  Zypern wird noch im Monat Juni Vorschläge vorlegen, wie wir weiterverhandeln. Ich
  will aus meiner Sicht sagen: Wir müssen vier Ziele erreichen. Wir müssen eine vernünftige
  Agrarpolitik fortsetzen, wir müssen eine gute Kohäsionspolitik fortsetzen, und wir
  müssen gleichzeitig neue Prioritäten für Wettbewerbsfähigkeit und Verteidigung setzen.
  Je weniger Bürokratie wir in Europa haben, je offener die Märkte sind, je weniger
  Regulierung wir haben, umso weniger Geld müssen wir für Wettbewerbsfähigkeit ausgeben.
  Wettbewerbsfähigkeit ist nicht nur eine Frage öffentlicher Mittel, sondern ist vor
  allem eine Frage offener Märkte und eines guten Wettbewerbs. Insofern stehen wir
  da vor schwierigen Abwägungen. Es wird schwierige Verhandlungen geben. Ich will
  aus meiner Sicht sagen: Ich hoffe sehr, dass es uns gelingt, diese Verhandlungen
  noch im Jahr 2026 abzuschließen, weil es in dem Superwahljahr 2027 in Europa ziemlich
  schwierig werden dürfte, und ab dem 1. Januar 2028 soll der neue mittelfristige
  Finanzplan gelten. Insofern sind wir jetzt unter Zeitdruck, aber wir werden uns
  die Zeit auch nehmen müssen, um solide Verhandlungen zu führen und dann zu gemeinsamen
  guten Ergebnissen zu kommen. Aber noch einmal: Das werden schwierige und sehr langwierige
  Verhandlungen, die sich möglicherweise bis ganz an das Ende des Jahres 2026 hinstrecken
  werden. Frage: Herr Bundeskanzler, Sie haben vergangenen Freitag mit US -Präsident
  Trump telefoniert. Haben Sie die Gelegenheit genutzt, mit ihm über den geplanten
  US -Truppenabzug zu sprechen? Haben Sie versucht, ihn davon zu überzeugen, dass
  er von diesen Plänen Abstand nimmt? Haben Sie Aufschluss darüber gewonnen, ob die
  Tomahawk-Marschflugkörper wie 2024 geplant in Deutschland stationiert werden? Eine
  Nachfrage an Sie beide zu den Verhandlungen zwischen der Ukraine und Russland, ganz
  unabhängig von einzelnen Namen oder Personen: Sind Sie dafür, dass sich die Europäer
  jetzt schon auf einen Unterhändler oder eine Unterhändlerin verständigen, die oder
  der für alle spricht? Bundeskanzler Merz: Ich will den Gesprächen nicht vorgreifen,
  die wir in den nächsten Tagen und Wochen zu führen haben. Das ist zum jetzigen Zeitpunkt
  nicht geplant. Aber wir führen jetzt die Gespräche auf der europäischen Ebene, wir
  führen die Gespräche im E3 -Format weiter, und wir hoffen vor allem, dass wir die
  Bereitschaft Moskaus etwas stärken können, an den Verhandlungstisch zu kommen. Bevor
  die russische Regierung nicht zu verhandeln bereit ist, müssen wir auch auf unserer
  Seite keine Entscheidungen über die Vertretung treffen. Ich habe mit Präsident Trump
  über zwei große Themen gesprochen, zum einen über den Irankrieg und die weiteren
  Maßnahmen. Wir haben zum Zweiten über die Ukraine und die weiteren Schritte gesprochen,
  die wir dort gehen wollen. Das war insgesamt ein sehr gutes Gespräch, ein sehr kollegiales
  Gespräch. Wir haben auch verabredet, dass wir es spätestens dann fortsetzen werden,
  wenn wir uns in wenigen Wochen in Evian beim G7 -Treffen treffen werden. Dort werden
  diese Themen dann auch noch einmal alle besprochen werden, und dort werden wir auch
  ziemlich viel Zeit haben, um sie dann auch in Ruhe weiter zu besprechen. Ministerpräsident
  Radev: Es ist nicht wichtig, ob wir einen Verhandlungsführer haben oder ein ganzes
  Team haben. Nein, das Wichtigste ist, dass überhaupt Gespräche geführt werden und
  dass Europa imstande ist, die Balance zwischen militärischen, politischen und wirtschaftlichen
  Instrumenten zu kombinieren. Denn ein auf Erschöpfung ausgerichteter Kampf schwächt
  alle, sowohl politisch als auch sozial als auch wirtschaftlich. Deswegen hoffen
  wir, dass diese Gespräche so schnell wie möglich anfangen.'
