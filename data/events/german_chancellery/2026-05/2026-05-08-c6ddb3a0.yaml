date: '2026-05-08'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 8. Mai 2026
text: 'stellvertretender Regierungssprecher Meyer (Vorsitzender Szent-Iványi eröffnet
  die Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der
  Ministerien.) Herr Meyer, wie hat denn der Bundeskanzler in einer Zeit, die nicht
  gerade von positiven Schlagzeilen geprägt ist, nach solch einer Entscheidung im
  Bundesrat zum Thema der Entlastungsprämie reagiert? Ich will vielleicht einmal sachlich
  in das Thema einsteigen, da es dazu ja mehrere Fragen gibt. Ich will auch die Maßnahmen,
  um die es hier ging, einordnen. Alle Arbeitgeber sollten die Option erhalten, ihren
  Beschäftigten eine Entlastungsprämie in Höhe von bis zu 1000 Euro steuer- und abgabenfrei
  zu zahlen. Das war ein Element des Maßnahmenpakets, das die Bundesregierung beschlossen
  hat. Dazu zählt insbesondere auch die Energiesteuersenkung, die wir ja schon umgesetzt
  haben und die auch schon wirkt. Die Gesetzesänderung hat der Bundestag bereits am
  24. April beschlossen. Wir haben zur Kenntnis genommen, dass der Bundesrat zumindest
  der Entlastungsprämie heute nicht zugestimmt hat. Die Bundesregierung bedauert diese
  Entscheidung des Bundesrats sehr. Sie hält an dem Plan fest, angesichts der gestiegenen
  Energiepreise eine Entlastung für die Bürgerinnen und Bürger zu erzielen. Ich will
  vorsorglich sagen, dass dazu natürlich alle ihren Beitrag leisten müssen, Bund und
  Länder. Über die weiteren Verfahrensschritte wird die Bundesregierung zeitnah entscheiden.
  Das weitere Verfahren wird nun geklärt. Es werden sicherlich auch weitere Gespräche
  mit den Ländern erfolgen. Zum weiteren Verfahren: Wird das ein zentrales Thema in
  der Sitzung des Koalitionsausschusses nächste Woche sein? Die weiteren Verfahrensschritte
  werden jetzt geklärt. Wie gesagt, ist für uns wichtig, dass wir Bürgerinnen und
  Bürger in dieser schwierigen Situation, die sich insbesondere durch gestiegene Energiepreise,
  aber auch weitere gestiegene Preise zeigt, möglichst entlasten wollen; daran halten
  wir fest. Dazu zählt perspektivisch natürlich auch eine Reform der Einkommensteuer.
  Aber wir sehen eben auch die Möglichkeit der Entlastungsprämie, weil sie schnell
  wirkt und weil sie eine Möglichkeit ist, Arbeitnehmerinnen und Arbeitnehmer gezielt
  zu unterstützen. Wie gesagt, werden die weiteren Gespräche nun erfolgen. Die inhaltliche
  Kritik der Länder bezüglich der Ablehnung sieht ja so aus, dass sie sagen, dass
  die Belastung durch Steuerausfälle zu zwei Dritteln von Kommunen und Ländern getragen
  würde, während die zur Kompensation vorgesehene Erhöhung der Tabaksteuer alleine
  dem Bund zugutekäme, es also eine Asymmetrie bei Entlastung und Belastung gäbe.
  Akzeptieren Sie diese Kritik der Länder grundsätzlich? Nach meinem Verständnis wurden
  von unterschiedlichen Ländern auch unterschiedliche Argumente vorgetragen, die aus
  ihrer Sicht für oder gegen diese Prämie sprechen. Das kann ich nicht weiter einordnen.
  Dafür kann ich auch keine Begründung liefern. Das müssen die Länder, die sich entschieden
  haben, es abzulehnen, auch selbst beantworten. Für uns ist wichtig ‑ Sie wissen
  das ‑, dass es im Bereich der Steuer am Ende ein komplexes Zusammenwirken unterschiedlicher
  Ebenen gibt. Das betrifft übrigens auch den Fall, der eintritt, wenn es an anderer
  Stelle zu Mehreinnahmen kommt. Insofern sage ich noch einmal: Entlastungsmaßnahmen
  müssen am Ende auch gemeinschaftlich getragen werden. So blicken wir auch auf diesen
  Sachverhalt. Es wäre schön, wenn die Bundesregierung trotzdem Zahlenwerke vorlegen
  könnte, aus denen hervorgeht, dass nach ihrer Auffassung eine Kompensation der Ausfälle
  stattfindet. Meine Zusatzfrage ist: Unter den Ländern, die abgelehnt haben, ist
  auch Bayern, CSU-regiert. Ein Koalitionspartner spricht sich gegen den Vorschlag
  der Bundesregierung aus. Wie bewerten Sie das? Ich würde ungern in das Abstimmungsverhalten
  einzelner Länder einsteigen. Das kann ich von dieser Stelle aus nicht tun. Ich kann
  für die Bundesregierung sprechen. Wir sind klar für eine Entlastung an dieser Stelle
  gewesen, haben alles, was dafür notwendig ist, auf den Weg gebracht und haben auch
  umfangreiche Gespräche mit den Ländern geführt. Noch einmal: Ich glaube, es ist
  jetzt wichtig, dass Bund und Länder auch an dieser Stelle für die Zukunft zusammenrücken
  und im weiteren Verfahren besprechen, wie eine Entlastung am Ende umgesetzt werden
  kann. Ich habe eine Frage an das BMF. Welche Szenarien gibt es, in denen die Länder
  tatsächlich auch entlastet werden können, in denen es also eine Kompensation gibt?
  Können Sie noch etwas zu den Zahlen sagen, also dazu, wie viel Last bei den Ländern
  liegt, wie viel beim Bund liegt und wie die Gegenfinanzierung aussehen soll? Ich
  fange von hinten an: Bisher haben wir so, wie es aktuell ausgestaltet war, bei einer
  Laufzeit bis Juni 2027 mit Steuermindereinnahmen in Höhe von 2,8 Milliarden Euro
  gerechnet, von denen 1,1 Milliarden Euro auf den Bund entfallen. Jetzt, im weiteren
  Vorgehen, kann ich einerseits den Gesprächen innerhalb der Bundesregierung, aber
  andererseits auch gegebenenfalls anstehenden Gesprächen mit den Ländern an der Stelle
  nicht vorweggreifen. Dafür bitte ich um Verständnis. Herr Meyer, ich probiere es
  auch noch einmal. Apropos CSU in der Bundesregierung bzw. bayerisches Verhalten:
  Der bayerische Ministerpräsident hat doch der Entlastungsprämie zugestimmt. Wie
  erklären Sie sich denn jetzt, dass das von Herrn Söder geführte Bayern sie abgelehnt
  hat? Ganz grundsätzlich will ich doch darauf hinweisen, dass es nicht völlig unüblich
  ist, dass der Bundesrat Vorschläge, die die Bundesregierung oder, wie in diesem
  Falle, der Bundestag gemacht hat, auch einmal ablehnt. Das ist nicht völlig unüblich.
  Das hat es auch in der Vergangenheit immer einmal wieder gegeben. Insofern würde
  ich in einzelne Abstimmungsverhalten jetzt auch nicht zu viel hineininterpretieren.
  Entscheidend für uns ist, dass wir eine Entlastung von Arbeitnehmerinnen und Arbeitnehmern
  in dieser Situation erreichen wollen. Deshalb haben wir die Energiesteuern auch
  für zwei Monate gesenkt. Wir sehen auch die Effekte dazu. Auch darüber gab es mit
  den Bundesländern intensive Gespräche. Wir werden im weiteren Verlauf über eine
  Einkommensteuerreform sprechen. Auch dabei werden wir sicherlich das Gespräch mit
  allen Akteuren, die beteiligt sind, suchen. Noch einmal: Wir wollen diese Entlastung
  und halten als Bundesregierung daran fest. Das heißt, Sie glauben nicht, dass aus
  diesem Entlastungsprämienwunsch jetzt ein Belastungspaket für die Bundesregierung
  geworden ist? Ich habe noch eine ganz kurze Verfahrensfrage: Wird denn die Bundesregierung
  den Vermittlungsausschuss anrufen? Wie gesagt ‑ die Abstimmung ist ja nun, glaube
  ich, noch nicht einmal eine Stunde her ‑, stimmen wir uns über das weitere Verfahren
  jetzt ab und werden dann informieren. Ist die Bundesregierung von der Mehrheitsentscheidung
  des Bundesrates überrascht worden, oder haben Sie das vorher avisiert? Haben Sie
  damit gerechnet? Ich glaube, das ist am Ende gar nicht entscheidend. Klar ist, dass
  wir in den letzten Tagen und Wochen Gespräche geführt haben. Insofern war auch die
  Kritik natürlich bekannt. Wir nehmen das jetzt so zur Kenntnis. Wie gesagt, wollen
  wir eine Entlastung. Wir werden weiterhin daran arbeiten. Ob es entscheidend ist
  oder nicht, ist ja nicht meine Frage gewesen, sondern, ob Sie vorher Kenntnis davon
  hatten, dass es im Bundesrat auf eine solche Ablehnung hinauslaufen könnte. Es gab
  ja auch mit den Ländern intensive Gespräche. Deshalb waren uns natürlich die Positionen
  auch bekannt. Es gab natürlich auch in diesen Gesprächen Angebote, die der Bund
  gemacht hat. Es wurden verschiedene Dinge ausgetauscht. Insofern wird die Bundesregierung
  von solchen Dingen nicht überrascht. Trotzdem hätten wir uns natürlich gewünscht,
  dass es hierbei zu einer Zustimmung kommt, weil wir von der Maßnahme, wie gesagt,
  überzeugt sind. Vielleicht auch noch zur Einordnung an den Kollegen, weil Sie gerade
  von einer Ablehnung Bayerns sprachen: Ich kann das konkrete Abstimmungsverhalten
  jetzt von hier aus nicht genau nachvollziehen. Aber es lohnt sich vielleicht auch
  nachzuschauen, weil, glaube ich, auch einige Enthaltungen dabei gewesen sind. Ich
  weiß es in dem konkreten Fall jetzt nicht genau. Ich müsste noch einmal nachschauen.
  Es folgt der Blick auf die kommende Woche . Er beginnt mit den öffentlichen Terminen
  des Bundeskanzlers am Dienstag, den 12. Mai. An diesem Tag wird der Bundeskanzler
  von 9 bis 10 Uhr zu Gast auf dem Bundeskongress des Deutschen Gewerkschaftsbundes
  sein. Er wird dort eine Rede halten. Der Kongress findet im Estrel Congress Center
  in Berlin statt. Am Mittwoch, den 13. Mai, wird der Bundeskanzler wie üblich um
  10 Uhr das Bundeskabinett leiten. Am Donnerstag, an Christi Himmelfahrt ‑ das ist
  der 14. Mai ‑, wird der Bundeskanzler ab 11.15 Uhr an der Verleihung des Internationalen
  Karlspreises zu Aachen teilnehmen. In diesem Jahr erhält ihn der Ministerpräsident
  der Italienischen Republik a. D. und ehemalige Präsident der Europäischen Zentralbank,
  Professor Mario Draghi. Die Veranstaltung findet im Krönungssaal des Aachener Rathauses
  statt. Der Bundeskanzler wird dort die Festansprache halten und dabei die Verdienste
  des Preisträgers um die europäische Einigung würdigen. Am Freitag, den 15. Mai,
  wird der Bundeskanzler den 104. Deutschen Katholikentag in Würzburg besuchen. Dort
  wird er an einer Podiumsveranstaltung teilnehmen. Der Titel der Veranstaltung lautet
  „Gemeinsam Zukunft gestalten“. So weit war es das zu den Terminen. Ich fange mit
  einer Terminankündigung an: Die Bundesministerin für Forschung, Technologie und
  Raumfahrt, Dorothee Bär, wird am 13. und 14. Mai in die Niederlande reisen. In Den
  Haag wird die Ministerin Antrittsgespräche mit ihrer neuen niederländischen Amtskollegin
  Rianne Letschert sowie mit der neuen niederländischen Wirtschaftsministerin Heleen
  Herbert führen. Im Mittelpunkt der Gespräche steht die deutsch-niederländische Zusammenarbeit
  in Forschung, Innovation und Raumfahrt. Im Anschluss wird die Ministerin weiter
  nach Amsterdam reisen. Dort wird sie auf das deutsche eisbrechende Forschungsschiff
  „Polarstern“ zusteigen. Die „Polarstern“ befindet sich zum Abschluss ihrer aktuellen
  Antarktisforschungssaison nach 183-tägiger Expedition auf dem Weg nach Bremerhaven.
  An Bord der „Polarstern“ wird die Ministerin mit Vertreterinnen und Vertretern des
  Alfred-Wegener-Instituts, des Helmholtz-Zentrums für Polar- und Meeresforschung,
  über aktuelle Forschungsprogramme in der Arktis und in der Antarktis sprechen. Für
  unser Verständnis des Klimawandels sind die Polarregionen von essenzieller Bedeutung.
  Mit Nachwuchsforschenden aus Westafrika, die im Rahmen der WASCAL Floating University
  unter Leitung des Kieler GEOMAR an Bord sind, wird sie über die internationale Ausbildung
  in der Meeresforschung sprechen. Die „Polarstern“ wird am 15. Mai in Bremerhaven
  einlaufen. Moderne Forschungsschiffe sind eine unverzichtbare Plattform einer modernen,
  transferorientierten Klima- und Biodiversitätsforschung auf unseren Meeren und Ozeanen.
  Auch ich habe Ihnen eine Reiseankündigung zu machen. Die Bundesbildungsministerin
  Karin Prien wird Anfang der Woche nach Brüssel reisen . Dort wird sie am Montag
  an einer Sitzung des Jugendministerrates und am Dienstag an einer Sitzung des Bildungsministerrates
  teilnehmen. Schwerpunkte der beiden Ratssitzungen sind unter anderem das Programm
  Erasmus+, eine jugendfreundliche Politik innerhalb der EU, Fragen zu widerstandsfähigen
  Bildungs- und Ausbildungssystemen in Krisenzeiten sowie der Rolle von Lehrkräften
  im Zeitalter von KI. Im Rahmen der Reise finden unter anderem Gespräche mit Bildungsministerinnen
  und ‑ministern aus Frankreich, Polen, Österreich und Irland statt. Darüber hinaus
  ist ein Treffen mit der EU-Kommissarin Hadja Lahbib geplant. Spielt das Großthema
  des Zugangs junger Menschen zu Social Media und Internet in irgendeiner Weise eine
  Rolle? Auch das wird bei unterschiedlichen Gesprächsformaten, die die Ministerin
  dort besucht, Thema sein. Gibt es eine spezifische Haltung, mit der Ihre Ministerin
  als Vertreterin der Bundesregierung hineingeht, einen deutschen Ansatz, wenn man
  so will? Sie wissen ja, dass sich die Bundesministerin mit dem Thema des Kinder-
  und Jugendschutzes in der digitalen Welt sehr intensiv befasst. Sie hat dazu im
  letzten Herbst eine Expertenkommission eingerichtet, die vor Kurzem eine Bestandsaufnahme
  dazu veröffentlicht hat. Die Ministerin hat immer wieder betont, wie wichtig ihr
  diese Fragen sind. Sie hat dazu auch eine Position, vor allem wenn es darum geht,
  Kinder und Jugendliche im Internet fit zu machen. Aber ‑ das betont sie auch immer
  wieder ‑ sie wartet die Handlungsempfehlungen der Expertenkommission ab, die wir
  jetzt Ende Juni erwarten. Mit ihrer persönlichen Haltung wird sie natürlich in die
  Gespräche und in den Austausch gehen. Sie wird auch daran interessiert sein, was
  andere Mitgliedsstaaten zu diesem Thema zu sagen haben. Wie ist denn die persönliche
  Haltung der Ministerin? Ist sie einer Zugangsbeschränkung für junge Menschen zugeneigt?
  Sie hat immer wieder betont, dass sie bei der Frage der Zugangsbeschränkungen auch
  Sympathien hat, ohne dass sie sich jetzt auf ein Alter festgelegt hat. Sie hat aber
  auch immer wieder betont, wie wichtig es ist, dass die Plattformen auf EU-Ebene
  reguliert werden müssen, und sie hat immer wieder betont, dass es wichtig ist, dass
  es auch funktionierende Systeme der Altersverifikation gibt, damit Kinder und Jugendliche
  altersgerechte Inhalte im Internet sehen und konsumieren können. Sie hat aber auch
  betont ‑ das tut sie wirklich mit aller Regelmäßigkeit ‑, wie wichtig es ist, dass
  Kinder und Jugendliche auch eine Teilhabe am Internet haben. Ich hätte eine Frage
  an das BMI, und zwar geht es um Jesiden . 2023 hat der Bundestag den Völkermord
  an den Jesiden anerkannt und sich verpflichtet, ihnen hilfreich zur Seite zu stehen.
  Trotzdem werden Jesiden jetzt abgeschoben. Ist das Versprechen von damals heute
  nichts mehr wert? Grundsätzlich kann ich Ihnen dazu sagen, dass der Vollzug des
  Aufenthaltsrechts und damit insbesondere die Durchführung und Rückführung in die
  Zuständigkeit der Länder fällt und wir hier als Bund nur unterstützen. Inwiefern
  gehen Sie der Verpflichtung nach, die Jesiden zu unterstützen und ihnen tatsächlich
  hilfreich zu sein, wie Sie es auch im Bundestag beschlossen haben und auch als Bundesregierung
  dafür stehen? Wenn Sie nach den Abschiebungen fragen, habe ich da nichts hinzuzufügen.
  An das Verteidigungsressort: Gibt es schon konkrete Pläne für die Vier-Milliarden-Euro-Investitionen
  der Bundeswehr im Osten ? Es gibt ja für alle Bundesländer Aufbaupläne, was die
  Infrastruktur und auch die Verstärkung der örtlichen Personal- und Liegenschaftsstrukturen
  sowie Bundeswehrstrukturen in Gänze angeht. Ich glaube, Bernsdorf ‑ korrigieren
  Sie mich gerne ‑ ist einer der Stützpunkte, der mit einem neuen Bataillon aufgebaut
  werden soll. Das haben wir aber vor zwei, drei Jahren schon kommuniziert. Da laufen
  die Pläne und die Abstimmungen. Darüber hinaus gibt es natürlich im Rahmen des Fähigkeitsaufbaus
  Pläne. Ich kann hier aber noch nicht im Detail über einzelne Standorte reden. Wie
  Sie wissen, haben wir Infrastrukturbedarfe, die durch den Aufwuchs begründet sind.
  Das betrifft die ganze Bundesrepublik, und dabei wird auch der Osten maßgeblich
  beteiligt sein. Eine Nachfrage noch: Geht es dabei auch darum, dass man stillgelegte
  Kasernen und alte Übungsflächen wiederbelebt? Das gilt für die ganze Bundesrepublik.
  Sie wissen, dass wir gerade ein Moratorium haben, aktuell keine Liegenschaften mehr
  abgeben und eine Liste von rund 200 Liegenschaften überprüfen, die schon an die
  BIMA abgegeben wurden, aber noch nicht veräußert wurden. Das betrifft die ganze
  Bundesrepublik. Hierzu laufen aktuell die Prüfungen sowie die lokalen und regionalen
  Abstimmungen. Wenn die Abstimmungen beendet sind, werden wir auch zu den jeweiligen
  Liegenschaften berichten. An Herrn Meyer und Herrn Greve: Wie beurteilen die Bundesregierung
  und das Wirtschaftsministerium den Ausgang der Gespräche zwischen US-Präsident Donald
  Trump und EU-Kommissionspräsidentin Ursula von der Leyen zu der anstehenden Umsetzung
  des Zollabkommens ? Ich kann dazu sagen, dass die Bundesregierung weiterhin der
  Meinung ist, dass die Vereinbarung vom letzten Jahr zwischen der Europäischen Union
  und den USA möglichst rasch umgesetzt werden muss. Das hat der Bundeskanzler zuletzt
  auch immer wieder betont. Wichtig ist hier eine geschlossene Haltung der Europäischen
  Union. Die Bundesregierung stimmt sich auch im aktuell laufenden Trilogverfahren
  weiterhin mit den europäischen Partnern und Institutionen ab ‑ immer mit dem Ziel,
  hier zu einer schnellen Verständigung zu kommen. Dem schließe ich mich vollends
  an. Die Ministerin ist dazu natürlich auch im Austausch mit dem zuständigen Kommissar
  Šefčovič. Ansonsten deckt sich die Haltung komplett. Wir setzen uns für die Einhaltung
  durch beide Seiten ein und unterstützen dies konstruktiv. An das Verkehrsministerium
  (zum Zustandsbericht der DB InfraGO ): Wir haben gestern ja gelernt, dass sich das
  Schienennetz nicht verbessert hat, also so schlecht oder so gut wie vorher ist.
  Was der Minister eigentlich vorhatte, nämlich die Pünktlichkeit in einem absehbaren
  Rahmen zu erhöhen, ist also nicht so einfach umzusetzen. Es gab auch die Idee von
  Friedrich Merz, dass man Züge aus dem Verkehr herausnehmen sollte, damit die Züge,
  die dann noch fahren, zuverlässiger sind. Wird der Minister vielleicht noch einmal
  an Frau Palla herantreten, damit man das macht, oder schließt er das aus? Sie sprechen
  den Zustandsbericht der DB InfraGO an, den die Bahn vorgelegt hat. Den nehmen wir
  natürlich zur Kenntnis. Er dient dazu, seitens der DB den Infrastrukturzustand mit
  einer Notenlogik darzustellen. Die Bahnchefin selbst und auch Herr Nagl haben sich
  gestern schon dazu geäußert. Frau Palla hatte auch betont, dass die Talsohle der
  ungebremsten Alterung unserer Schienenstruktur erreicht scheint. Minister Schnieder
  hat immer betont, dass wir wirklich in einem Modernisierungsjahrzehnt stehen. Wir
  haben im vergangenen Jahr rund 20 Milliarden Euro in die Sanierung des Schienennetzes
  investiert. In diesem Jahr sind es weitere 23 Milliarden Euro, und ungefähr 28 000
  Baustellen sind geplant. Es geschieht also eine ganze Menge. Wir setzen wirklich
  darauf, unsere Infrastrukturen auf Vordermann zu bringen und dadurch auch die verschiedenen
  Ziele zu erreichen. Aber zu der konkreten Frage, ob man Züge aus dem Verkehr herausnehmen
  sollte oder nicht, möchten Sie nichts sagen? Frau Nieke, ich habe gerade ein bisschen
  gestockt, weil Sie meinten, die Talsohle scheine aus Ihrer Sicht erreicht. Warum
  scheint sie nur erreicht zu sein? Ist sie es noch nicht? Ich hatte hiermit nur die
  Äußerung von Frau Palla zitiert, die für sich alleine steht. Das war jetzt nicht
  die Haltung des Bundesverkehrsministeriums. Aus Ihrer Sicht ist die Talsohle also
  erreicht? Wie gesagt, die DB hat gestern ihren Netzzustandsbericht vorgelegt, den
  wir, wie ich auch sagte, zur Kenntnis genommen haben. Wir sehen die Zahlen. Der
  Minister war in der Vergangenheit eher der Meinung, dass wir realistisch sein müssen
  und dass wir wirklich mitten in einem Modernisierungsjahrzehnt stehen, in dem es
  viele Baustellen gibt. Und er hat auch das Motto aufgerufen, dass wir zu einem „Comeback
  der Infrastruktur“ kommen. Das heißt, wir setzen jetzt alles daran, unsere Infrastrukturen
  wieder voranzubringen. An das Verteidigungsministerium: Die Nichtbeantwortungsquote
  der Fragebogen zur Wehrpflicht , deren Beantwortung für junge Männer verpflichtend
  ist, liegt bei 28 Prozent. Mehr als ein Viertel der Angeschriebenen geben eine solche
  verpflichtende Antwort also nicht. Wie bewerten Sie das und wie gehen Sie damit
  um? Die in den letzten Tagen medial dargestellten Rücklaufquoten sind nicht zutreffend.
  Wir haben vor ca. 50 Minuten eine Pressemitteilung mit den richtigen Rücklaufquoten
  bzw. den Rücklaufquoten, die uns nach der Auswertung aktuell vorliegen, herausgegeben.
  Aktuell haben wir einen Rücklauf in der ersten Frist von 86 Prozent. Wenn wir dann
  noch die Antworten nach der Ermahnung bzw. Erinnerung dazurechnen, liegen wir bei
  über 90 Prozent Rücklauf. Diese Zahlen sind sehr gut. Wir haben seit Beginn des
  Jahres 206 000 Anschreiben verschickt. Wie Sie wissen, läuft dann nach Empfang des
  Anschreibens eine Vierwochenfrist. Wenn diese Frist nicht eingehalten wird, erfolgt
  eine Erinnerung. So kommen diese Zahlen zustande. Deswegen ist unser Ziel, für die
  weitere Auswertung noch auf einen breiteren Datenbestand zu warten. Von den 206 000
  verschickten Anschreiben entfällt ja ungefähr die Hälfte auf die Männer, und der
  Rest sind Personen anderen Geschlechtes, die nicht antworten müssen. Zu den nicht
  Antwortpflichtigen: Es kursiert die Zahl, dass der Rücklauf bei den angeschriebenen
  Frauen bzw. Personen anderer Geschlechtszugehörigkeit bei nur drei Prozent liegt.
  Stimmt das? Ich kann bestätigen, dass bei Personen anderen Geschlechtes der Gesamtrücklauf
  bei ungefähr drei Prozent liegt, ja. Haben Sie damit gerechnet? Ist das enttäuschend
  für Ihr Ministerium? Ist darin eine explizite Verweigerungshaltung zu sehen? Ich
  sehe keine explizite Verweigerungshaltung. Wir haben ja durch die Natur des Wehrdienstes
  an sich eine gewisse Präferenz des männlichen Geschlechts. Das ist in der reinen
  Berufsbetrachtung einfach so, und das sehen wir natürlich auch in den Bewerberzahlen.
  Die Beantwortung ist für Personen anderen Geschlechtes freiwillig. Das wird über
  das Grundgesetz in die weiteren Gesetze, die Folgegesetze abgeleitet. Es ist also
  das gute Recht dieser Personen, auf das Schreiben dann nicht zu antworten. Die Erfassung
  der männlichen 18-Jährigen hat ja primär den Zweck der Wehrerfassung. Wir wollen
  ja einen Datenabgleich vornehmen und auch wissen, wer, wann über welche Wege erreichbar
  wäre und zur Verfügung steht. Das ist unsere Aufgabe als Streitkräfte, die wir aufgrund
  der sicherheitspolitischen Lage jetzt wieder reaktiviert haben, was ja vor zwölf
  Jahren normale Praxis war. Ich sehe das insofern nicht kritisch. Das ist Teil der
  Freiheit, die der Gesetzgeber mit dem Gesamtprozess bewusst gelassen hat. In Ihrer
  Pressemitteilung hatten Sie geschrieben, aus den positiven Rückläufern des Fragebogens
  seien schon Musterungen und auch schon Einstellungen erfolgt. Haben Sie dazu ein
  paar Zahlen? Da möchte ich mit Zahlen noch warten, weil wir natürlich, wie ich gesagt
  habe, den Datenbestand über die nächsten Monate noch etwas auffüllen wollen. Die
  Statistik und die Zahlen müssen immer auf einer gewissen Grundgesamtheit beruhen.
  Richtig ist aber: Wenn es unter den Rückläufern Interessierte gibt, dann werden
  diese vom Bundesamt für das Personalmanagement der Bundeswehr kontaktiert. Sie bekommen
  dann Informationen, wenn sie das möchten, und bekommen Beratungstermine angeboten;
  da wird also der weitere Prozess besprochen. Dadurch haben wir in den ersten Monaten
  sowohl Beratungs- und Assessmenttermine und Einplanungen gehabt, und daraus abgeleitet
  haben wir in diesem Jahr auch schon Einstellungen gehabt. Eine Rücklaufquote von
  drei Prozent bei den jungen Frauen wirkt schon wie eine Art Mittelfinger an die
  Bundeswehr. Wissen Sie denn, wie viele von diesen drei Prozent dann sagen, dass
  sie gemustert werden möchten oder Interesse haben? Wie ich gerade gesagt habe: Sowohl
  bei den Rückläufen von Personen anderen Geschlechts als auch bei den Rückläufen
  von Männern warten wir mit diesen Zahlen noch, bis wir die Grundgesamtheit erhöht
  haben. Die Bewertung dieser Zahl überlasse ich Ihnen. Ich habe von Messen und Besuchsbildungsveranstaltungen
  ein anderes Bild; da nehmen wir durchaus auch ein Interesse seitens der weiblichen
  oder seitens der anderen Teile der Bevölkerung wahr. Die weitere Bewertung überlasse
  ich aber Ihnen. Weil Sie gerade selbst die Demokratie angesprochen haben: Heute
  gibt es landesweit Schulstreiks gegen die Wehrpflicht. Begrüßt das Bundesverteidigungsministerium
  diese demokratische Mobilisierung? Ich erinnere mich noch an Plakate der Bundeswehr
  mit Slogans wie: „Wir kämpfen auch dafür, dass du gegen uns sein kannst.“ Wir begrüßen,
  dass wir in einer Demokratie leben, in der jeder ‑ in gewissen Grenze natürlich,
  ohne die Rechte anderer zu verletzen ‑ seine Meinung äußern darf, und das auch auf
  diesen Wegen. Das ist das Tolle an diesem Land. Was passiert denn mit denjenigen,
  die sich so gar nicht melden? Wie reagieren Sie auf die, was müssen die befürchten?
  Haben Sie Zahlen zum Unterschied zwischen Ost und West bei der Rückläuferquote?
  Zur jetzigen Kommunikation habe ich keine Zahlen. Ich weiß auch nicht genau, ob
  wir diese Linie ‑ Süd, Nord, Ost, West ‑ noch aufmachen. Auch beim Personalkörper
  in der Bundeswehr ziehen wir diese Linie nicht mehr. Ich finde es nach über 30 Jahren
  ehrlich gesagt auch nicht mehr zeitgemäß, diese Einteilung zu machen. Zu den Konsequenzen:
  Der Gesetzgeber hat im Wehrdienstmodernisierungsgesetz ganz klar geschrieben, dass
  es eine Ordnungswidrigkeit darstellen kann, wenn man diverse Pflichten nicht erfüllt,
  und dass dies auch mit Bußgeld belegt werden kann. Dieses Bußgeld wird dann im Ordnungswidrigkeitsverfahren
  näher beschrieben. Rein theoretisch wären zwischen 5 und 1000 Euro Bußgeld möglich.
  Es gibt bei uns intern die Festlegung, dass das Bußgeld maximal 250 Euro ausfallen
  wird. Natürlich wird dann immer auf den jeweiligen Fall geschaut. Das ist also eine
  Maximalgrenze. Es kann ja zum Beispiel auch Fahrlässigkeit vorliegen. Vom Gesetzgeber
  ist im Ordnungswidrigkeitengesetz festgelegt, dass die jeweilige Verwaltungsbehörde
  dann auch die Prokura für diese Festlegung hat. Im Wehrdienstmodernisierungsgesetz
  ist festgelegt, dass die Karrierecenter oder ‑ je nach Verfehlung ‑ das Bundesamt
  für das Personalmanagement der Bundeswehr diese Verwaltungsbehörde darstellen. Das
  ist im Gesetz ganz klar geregelt; das ist also das Verfahren. Was das weitere Verfahren
  betrifft, so ist das alles im Ordnungswidrigkeitengesetz geregelt; darauf will ich
  gar nicht eingehen. Was-wäre-wenn-Fälle sind darin abgebildet. Wann werden diese
  Bußgeldbescheide überhaupt verschickt? Wenn die erste Vierwochenfrist abgelaufen
  ist, folgt die Nachfrist. Die Prozesse für den Fall, dass dann keine Antwort erfolgt,
  werden gerade erarbeitet. Unser Fokus bei den ganzen Verfahren liegt ja auf der
  Freiwilligkeit, und die laufen wirklich gut. Seit dem ersten Tag laufen die Datenabfrage,
  die Datenanalyse, die Auswertung usw. sehr gut. Auch über diesen Fall macht man
  sich jetzt Gedanken bzw. hat man sich schon die ganze Zeit gemacht. Die Prozesse
  werden gerade aber finalisiert, sage ich einmal. Dann wird es gemäß Ordnungswidrigkeitengesetz
  diese Bußgeldbescheide geben, die von den beiden genannten Entitäten versendet werden.
  Ich möchte noch einmal betonen: Gefordert ist hier das Ausfüllen eines Fragebogens,
  wofür ich wahrscheinlich zwischen vier und acht Minuten brauche, und der Zweck ist
  ein Datenabgleich. Keiner muss da ankreuzen, dass er zur Bundeswehr möchte. Es geht
  vielmehr darum, die Daten abzugleichen und dann kann man sich bzw. soll man sich
  äußern, wie man zu einem möglichen Wehrdienst bei der Bundeswehr steht und ob man
  gewisse Qualifikationen mitbringt, die gegebenenfalls notwendig sind. Ich denke,
  dass der Gesetzgeber es den jungen Männern zutrauen kann, diese vier bis acht Minuten
  aufzuwenden, um einen Fragebogen auszufüllen. Aber wenn das Bußgeld dann bezahlt
  wird, ist man einfach fein raus? Ich bin kein Jurist. Da, muss ich wirklich einmal
  sagen, muss ich auch auf das Ordnungswidrigkeitengesetz verweisen. Darin sind dann
  die Fälle genannt, über gerichtliche Maßnahmen oder Vollstreckungen usw. usf. Ich
  kann es nicht genau sagen. Werden Sie denn diese 250 Euro, die bei dem Bußgeld maximal
  möglich sind, ausreizen? Ich meine, die Bundeswehr braucht ja offenbar jeden Cent
  für die Aufrüstung. Das Ziel ist, dass wir bei Vorsatz natürlich bis zu den 250 Euro
  gehen, ja. Aber ist das vom individuellen Fall abhängig? Wird dann quasi „Okay,
  wir sagen ‚50 Euro‘, und das gilt für jeden“ gesagt oder nicht? Die zuständige Verwaltungsbehörde
  wird das vornehmen. Es liegt ja immer daran, wie ich gesagt habe, dass entweder
  vom Karrierecenter oder vom Bundesamt für Personalmanagement ‑ das ist vom Gesetzgeber
  so geregelt ‑ auch diese Höhen im Rahmen eines Bußgeldkataloges festgelegt werden
  können, und dort wird dann nach der Beurteilung auch entschieden, welche Höhe es
  ist. Wenn, wie von Ihnen gerade beschrieben, mit entsprechender Rückmeldung eine
  Beantwortung vorsätzlich unterbleibt, dann kann man auch vom Vorsatz ausgehen, und
  dann wird sicherlich auch die maximale Höhe ausgereizt werden. Dies ist die Frage
  an das Innenministerium, und zwar zu den iranischen Aktivitäten hier in Deutschland
  nach Ausbruch desIran-USA-Krieges . Wie hat sich dadurch die Sicherheitslage verändert?
  Hat sie sich verändert? Früher war ja immer von einem hohen, aber sozusagen gleichbleibenden
  Gefährdungspotenzial die Rede. Gibt es da neue Erkenntnisse über die Aktivitäten?
  Ich kann Ihnen dazu sagen, dass wir uns weiterhin mit einer hohen abstrakten Gefährdungslage
  konfrontiert sehen und dass die Sicherheitsbehörden einzelnen Hinweisen in Bezug
  auf iranische Operationen nachgehen, vor allem gegen amerikanische und jüdische
  Einrichtungen oder Personen und auch gegen Regimekritiker in Deutschland. Auch Aktivitäten
  von iranischen Proxys sind weiterhin einzukalkulieren. Wir bewerten die Gefährdungslage
  fortlaufend, sind hochwachsam und passen entsprechende Schutzmaßnahmen bei Bedarf
  an. Haben Sie denn seit dem Ausbruch der Gefährdung, seit Ausbruch des Krieges,
  jetzt eine Steigerung der Aktivitäten festgestellt? Ich habe eine Frage zum Thema
  Russland. EU-Ratspräsident Costa hat sich in einem „FT“-Interview zu möglichen Gesprächen
  bzw. Verhandlungen mit Russland unter Putin geäußert . Ich darf das vielleicht einmal
  ganz kurz zitieren, und die Frage schließe ich dann an. Er sagte: Ich bin im Gespräch
  mit den 27 Staats- und Regierungschefs der EU, um zu erörtern, wie wir uns am besten
  organisieren und was wir konkret mit Russland besprechen müssen, wenn der richtige
  Zeitpunkt dafür gekommen ist. - Die Frage ist: Gibt es eine Veränderung in der Haltung
  der Bundesregierung, und in welchem Format finden diese Gespräche statt, die Herr
  Costa da anspricht? Erst einmal ist es ja gut und richtig, dass auch Herr Costa
  auf die Geschlossenheit der Europäischen Union bei diesem Thema hingewiesen hat.
  Die ist natürlich auch uns besonders wichtig. Wir haben immer betont, dass mögliche,
  potenzielle Gespräche mit der russischen Seite nur dann zielführend sind, wenn sie
  in enger Kooperation, in enger Koordinierung der europäischen Partner, aber auch
  mit unseren ukrainischen Partnern stattfinden und wenn sie dann auf ein verhandeltes
  Kriegsende bezogen sind. Wann dieser Zeitpunkt gekommen ist und wann es auch eine
  Bereitschaft dafür gibt ‑ wir sehen ja momentan erneut und wiederholt, dass Russland
  und Wladimir Putin offensichtlich kein Interesse an ernsthaften Verhandlungen haben;
  wir rufen ihn dazu nachdrücklich auf ‑, darüber möchte ich nicht spekulieren. Aber
  noch einmal: Uns ist ein abgestimmtes europäisches Vorgehen wichtig, ein abgestimmtes
  Vorgehen mit den ukrainischen Partnern und natürlich ein klarer Fokus auf eine Beendigung
  dieses Krieges, für die wir seit Monaten und Jahren arbeiten. Gibt es dafür ein
  Format, auf das sich Herr Costa bezieht, oder sind das regelmäßige Konsultationen?
  Ich kann jetzt nicht über ein konkretes Format berichten. Den Austausch zwischen
  den europäischen Staats- und Regierungschefs gibt es auf unterschiedlichen Ebenen.
  Es gibt unterschiedliche Möglichkeiten, sich auszutauschen, auch auf den Ebenen
  darunter. Wie gesagt, konkret auf diese Frage hin habe ich jetzt keine Information
  über ein Format. Es ist richtig, dass wir uns europäisch darüber abstimmen. Es gab
  immer wieder Versuche, auch Russlands, Europa in diesen Fragen zu spalten. Wir haben
  stark dagegen angearbeitet, auch erfolgreich, was sich zuletzt auch noch einmal
  in der Möglichkeit gezeigt hat, jetzt ein Darlehen an die Ukraine auszuzahlen, das
  es ihr ermöglicht, sich weiterhin gegen diesen russischen Angriffskrieg zu wehren.
  Das heißt, noch einmal, die Geschlossenheit der EU ist hier unser größtes Anliegen.
  Herr Giese, der Außenminister ist diese Woche beim Besuch des israelischen Außenministers
  aufgefallen, als er gesagt habe, Israel habe jedes Recht, im Südlibanon zu sein.
  Können Sie uns einmal sagen, welche Rechte das genau sind, sodass die Israelis den
  Südlibanon besetzen dürfen? Wenn Sie diese gesamte Pressekonferenz verfolgt haben,
  dann haben Sie gehört, dass der israelische Außenminister zuvor betont hat, dass
  Israel keine Gebietsansprüche im Libanon hegt. Der Außenminister hat sich in seiner
  Aussage auf einen temporären Einsatz der israelischen Armee im Süden Libanons bezogen,
  der auf die Verteidigung gegen Angriffe durch die Hisbollah gerichtet ist. In diesem
  Kontext stehen auch diese Aussagen. Wie gesagt, wenn Sie darauf Bezug nehmen, was
  im Rahmen dieser Pressekonferenz gesagt worden ist, dann gebe ich vielleicht noch
  einmal den Hinweis auf den Wortlaut. Der Außenminister hat gesagt: Libanon darf
  nicht ein Kriegsschauplatz werden, auf dem es Zivilistinnen und Zivilisten sind,
  die den Preis zahlen, auf dem die junge Generation in Ruinen ihrer Elternhäuser
  aufwächst. Dadurch wird auch Israels Nachbarschaft nicht sicherer. - In diesem Zusammenhang,
  glaube ich, ist verständlich, was der Außenminister gemeint hat. Ich habe es mir
  angehört. Darum frage ich. Wie gesagt, hier geht es um die israelische Besatzung
  des Südlibanons. Die Israelis vertreiben systematisch die Bevölkerung. Das ist nicht
  nur die libanesische Meinung, sondern mittlerweile die UN-Meinung. Schiitische Dörfer
  werden von der israelischen IDF ausradiert, und Herr Wadephul hat die Gegenwehr
  der Hisbollah auf das Schärfste verurteilt. Wie geht das? Ich habe Ihnen gerade
  erklärt und auch noch einmal vorgelesen, was da gesagt worden ist. Das war ein sehr,
  sehr ausgewogenes Statement, und der Außenminister hat sehr, sehr klar gemacht,
  dass dort keine dauerhafte Besatzung infrage stehen darf, sondern dass es um eine
  Gegenwehr Israels gegen Angriffe geht. Wir haben da zur Zurückhaltung aufgerufen,
  und, wie gesagt, wenn Sie das komplett gesehen haben, dürfte Ihnen klar gewesen
  sein, dass es sich dabei um eine sehr, sehr ausgewogene Haltung der Bundesregierung
  handelt. Sie werden auch die aktuellen Bilder von weitgehend zerstörten Siedlungen
  im Südlibanon kennen, die durch israelische Angriffe zerstört wurden. Hat Israel
  auch dazu jedes Recht? Noch einmal: Ich habe darauf hingewiesen, was der Außenminister
  gesagt hat. Ich glaube, das war sehr, sehr abgewogen. Ganz klar ist: Zivilbevölkerung
  und zivile Infrastruktur im Libanon müssen unbedingt geschützt werden. Die Bevölkerung
  darf auch nicht dauerhaft an der Rückkehr gehindert werden. Das kommunizieren wir
  sehr, sehr klar und deutlich. Darüber soll es ja auch Gespräche zwischen den USA
  und Libanon geben. Meines Wissens sollen Gespräche in der kommenden Woche in Washington
  stattfinden. Wir begrüßen mit großem Nachdruck, dass es da direkte Friedensgespräche
  zwischen Israel und der libanesischen Regierung gibt. Sie bieten das Potenzial für
  eine Zukunft als Nachbarn ‑ das wünschen wir uns auch in Deutschland ‑, indem beidem
  gleichermaßen Rechnung getragen wird, nämlich Israels legitimen Sicherheitsinteressen
  und Libanons Recht auf territoriale Integrität und Souveränität. Diese Souveränität
  wird ja auch von der Hisbollah jeden Tag verletzt. Nun sind aber zerstörte Siedlungen
  vielleicht nicht für ewig, aber doch temporär, für einen längeren Zeitraum, zerstört.
  Hält der Außenminister die Härte und den Umfang der israelischen Angriffe, die durch
  diese zerstörten Siedlungen dokumentiert werden, für angemessen? Wie gesagt, in
  dieser Woche fand dazu eine Pressekonferenz statt, und auf der hat sich der Außenminister
  sehr, sehr ausführlich geäußert. Ich habe gerade gesagt, was die Faktoren sind,
  die dabei in den Fokus genommen worden sind. Wir haben da eine sehr, sehr klare
  Aussage in Bezug auf den Erhalt von ziviler Infrastruktur getroffen und gesagt,
  dass diese nicht zerstört werden darf und dass es keine dauerhafte Vertreibung geben
  darf. Das ist die Haltung der Bundesregierung. Herr Giese, nach internationalem
  Recht darf sich eine Bevölkerung, darf sich ein Volk gegen fremde Besatzungen wehren,
  auch im bewaffneten Widerstand. Genau das verurteilt aber die Bundesregierung, obwohl
  die Israelis illegalerweise Gebiete im Südlibanon besetzen. Warum? Ich glaube, wir
  haben sehr, sehr, sehr deutlich gemacht, dass sich die Israelis gegen die Hisbollah
  zur Wehr setzen, nicht gegen den Staat Libanon. Das ist etwas anderes. Es ist die
  Terrororganisation Hisbollah, die die Souveränität auch des Libanons, wie gesagt,
  jeden Tag untergräbt, Israel mit Raketen angreift und die Bevölkerung dort seit
  sehr, sehr langer Zeit in Angst und Schrecken versetzt, und dagegen darf sich Israel
  verteidigen. Indem Israel die Bevölkerung im Südlibanon in Angst und Schrecken versetzt
  und die muslimische Mehrheit, die schiitischen Menschen, vertrieben werden? Ich
  glaube, wir haben da die Argumente ausgetauscht, ehrlich gesagt. Ich habe noch einmal
  eine Frage an das Verteidigungsministerium. Gibt es eigentlich inzwischen Erkenntnisse,
  was den Truppenabzug der Amerikaner angeht? Stehen Sie dazu in Kontakt? Hat man
  Ihnen mittlerweile mitgeteilt, wo diese 5000 Soldaten abgezogen werden sollen? Wir
  hatten am Montag darüber gesprochen, und darüber hinaus habe ich keine weiteren
  Informationen mitzuteilen. Ich weiß, aber jetzt sind wir zwei Tage weiter. Herr
  Giese und Herr Meyer, es noch einmal um das Gedenken an das Ende des Zweiten Weltkriegs
  . Das wird ja von Moskau wie üblich gefeiert. Es wird auch der slowakische Premierminister
  erwartet. Wie bewerten Sie das? Das bewerte ich gar nicht. Ich möchte, was den 8. Mai
  angeht, noch einmal auf die Äußerung des Bundeskanzlers von heute auf X hinweisen:
  „Der 8. Mai 1945 brachte Befreiung - für Millionen von Menschen, für Deutschland,
  für Europa. Er mahnt, niemals zu vergessen, wozu Hass führen kann. Er verpflichtet,
  für ein freies, demokratisches und solidarisches Deutschland in einem starken Europa
  einzustehen.“ Wie bewerten Sie die Drohung der russischen Außenamtssprecherin hinsichtlich
  eines Vergeltungsschlags, falls es Störungen bei diesen Feierlichkeiten geben sollte,
  verbunden mit der Aufforderung an die ausländischen Botschaften in Kyjiw, sich dann
  rechtzeitig in Sicherheit zu bringen? Ich glaube, der Bundesaußenminister hat sich
  dazu bereits geäußert. Ich kann von dieser Stelle aus aber auch noch einmal sagen,
  dass die öffentlichen Drohungen Russlands, Kyjiw anzugreifen, völlig inakzeptabel
  sind. Sie sind Teil einer rücksichtslosen Eskalationstaktik. Lassen Sie mich auch
  klarmachen, dass wir weiter an der Seite der Ukraine stehen und uns hier auch mit
  Sicherheit nicht einschüchtern lassen. Ich habe das Statement des Bundeskanzlers
  auch gesehen. Ist es Absicht, dass er die Befreier nicht nennt, nur um Russland
  bzw. die Sowjetunion nicht zu nennen? Möglicherweise hat das auch etwas mit der
  Zeichenbegrenzung auf X zu tun; das weiß ich in dem Fall nicht. Wie gesagt, ich
  glaube, die Aussage des Bundeskanzlers zum Tag der Befreiung für Millionen von Menschen,
  für Deutschland, für Europa ist sehr klar. Es ist ein ganz wichtiger Tag, der unser
  Land aus dieser Schreckensherrschaft der Nazis befreit hat, und deshalb war es ihm
  auch wichtig, diesen Post abzusetzen. Ich glaube, das ist historisch klar dokumentiert.
  Diese Frage geht an das Auswärtige Amt. Wir hatten am Montag das Thema, dass deutsche
  Staatsbürger zu denen gehörten, die als Mannschaften einer Hilfsflottille von israelischen
  Streitkräften nach Kreta verbracht wurden. Sind die inzwischen eigentlich alle wieder
  in Deutschland? Ich glaube, vor einigen Tagen war die Meldung, dass sozusagen diese
  Boatpeople der anderen Art zurückgeführt würden. Sind noch deutsche Staatsbürger
  auf Kreta und werden eventuell konsularisch betreut? Ich würde dazu ganz kurz „unter
  drei“ gehen. Herr Giese, Sie wollen ja nicht über Einzelfälle Auskunft geben. Die
  Frage war, ob konsularische Hilfe all denen, die sozusagen in Griechenland festsaßen
  und sie haben wollten, angeboten wurde. Hat das stattgefunden? Ja, selbstverständlich.
  Wir haben allen, die daran Interesse hatten, konsularische Unterstützung zukommen
  lassen. Herr Giese, das Auswärtige Amt arbeitet für die deutschen Bürgerinnen und
  Bürger. Sie waren Opfer der illegalen Aktion der Israelis. Warum hat der Außenminister
  diese illegale Aktion der Israelis nicht verurteilt? Ich denke, wir haben uns dazu
  gemeinsam mit Italien sehr klar geäußert und unterstrichen, dass sich Israel da
  selbstverständlich an internationales Recht halten muss. Das war am Mittwoch der
  vergangenen Woche. Diese Formulierung kann ich Ihnen zukommen lassen. Das können
  Sie vielleicht noch einmal recherchieren. Das war sehr klar. Das habe ich gesehen.
  Das war eine Aufforderung, sich an internationales Recht zu halten. Dann ist es
  passiert, und dann ist der Außenminister des Landes, das sich nicht daran gehalten
  hat, hier gewesen, und der Außenminister Deutschlands, der die Deutschen schützen
  soll, hat nichts gesagt. Warum nicht? Das ist die Frage. Wir berichten grundsätzlich
  nicht aus vertraulichen Gesprächen. Eine Frage an das BMG: Wann legt die Ministerin
  die Pflegereform vor? Ich hatte eher an ein Tagesdatum gedacht. Leider kann ich
  Ihnen jetzt kein konkretes Datum mitteilen. Wie gesagt, bleibt es bei ihrer Aussage,
  dass das Mitte Mai der Fall sein wird. An das BMF: Könnten Sie eine Bilanz ziehen,
  wie es mit dem Tankrabatt bisher läuft? Der Kanzler hat gesagt, es gehe so leidlich.
  Die Preise sind immer noch hoch. Wenn ich es richtig im Kopf habe, hatten wir das
  Thema am Montag. Zum jetzigen Zeitpunkt kann ich Ihnen keinen neuen Stand mitteilen.
  Wir beobachten das und werden uns die Entwicklung weiter anschauen. Dann lassen
  wir Ihr Mikrofon gleich offen, Herr Keller, weil Sie sich verabschieden wollen.
  Vielen Dank! Zehn Minuten habe ich noch, sehr gut! Nach dreieinhalb Jahren in der
  Pressestelle, davon drei Jahre hier in der RegPK, endet meine Zeit in der Pressestelle
  im BMF vorerst. Als ich vor drei Jahren das erste Mal hier saß, dachte ich nicht,
  dass ich einmal sagen würde: Ich werde es vermissen! ‑ Es hat hier Spaß gemacht,
  aber Sie verzeihen mir, dass ich nicht nur mit einem weinenden Auge, sondern auch
  mit einem lachenden Auge gehe, weil ich nämlich das Privileg habe, für drei Jahre
  vom BMF an das Haus von Herrn Giese abgeordnet zu werden. Ich werde als Finanzreferent
  an einer deutschen Botschaft arbeiten. Ich danke den Kollegen auf dieser Seite für
  die immer sehr faire und kollegiale Zusammenarbeit. Ich danke den Kollegen aus den
  Fachabteilungen bei uns im Haus dafür, dass sie mit teilweise sehr kurzen Fristen
  dafür gesorgt haben, dass ich immer gut ausgestattet war. Ich danke den ehemaligen
  und aktuellen Kollegen der Pressestelle dafür, dass sie, wann immer ich hier saß,
  ihr Bestmögliches getan haben, um mich zu unterstützten. Ich danke auch Ihnen zum
  einen für das Interesse an unseren Themen, aber auch persönlich dafür, dass Sie
  mich hier immer vor Herausforderungen gestellt haben, an denen ich mich auch persönlich
  weiterentwickeln konnte. Deswegen kann ich auch jedem aus unserem Haus oder aus
  anderen Häusern, der zuschaut, nur nahelegen, dass es eine gute Sache ist, das hier
  auch gern einmal zu tun. Ich glaube fest an den Satz „Man sieht sich immer zweimal
  im Leben“, und zwar nicht als Drohung, sondern als Aussicht. Deswegen: Auf Wiedersehen!
  Lieber Herr Keller, Sie waren uns immer ein sehr kompetenter Gesprächspartner. Danke
  dafür und alles Gute auf Ihrem weiteren Berufsweg! Darf man verraten, wohin Sie
  gehen? Ich kenne die Gepflogenheiten: Herr Giese muss dann gegebenenfalls ergänzen.
  Ich glaube, es spricht nichts dagegen, zu sagen, dass ich an die Botschaft in Brasília
  gehe.'
