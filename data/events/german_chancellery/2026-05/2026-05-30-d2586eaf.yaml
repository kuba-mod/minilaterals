title: 'Kulturstaatsminister verleiht 76. Deutschen Filmpreis Weimer: „Deutscher Film
  von seiner besten Seite“'
text: 'Der Staatsminister für Kultur und Medien, Wolfram Weimer, hat heute in Berlin
  gemeinsam mit der Präsidentin und dem Präsidenten der Deutschen Filmakademie, Vicky
  Krieps und Florian Gallenberger, den Deutschen Filmpreis 2026 verliehen. Die Goldene
  Lola für den besten Film ging an Mascha Schilinski, Louise Peter für „IN DIE SONNE
  SCHAUEN“. Der Staatsminister für Kultur und Medien, Wolfram Weimer: „Die Preisträgerinnen
  und Preisträger des heutigen Abends haben den deutschen Film von seiner besten Seite
  gezeigt: lebendig und innovativ – vor und hinter der Kamera. Der Deutsche Filmpreis
  würdigt diese Leistungen und macht sichtbar, welche kulturelle Bedeutung der Film
  für unser Land hat. Gerade das vergangene Jahr war ein Jahr großer Publikumserfolge,
  die Millionen Menschen für das gemeinsame Filmerlebnis im Kino begeistert haben.
  Auch bei den großen internationalen Filmfestivals haben deutsche Filme breite Anerkennung
  erfahren. Das ist ein starkes Signal für die Wettbewerbsfähigkeit und die kreative
  Kraft unseres Filmstandorts. Umso wichtiger war es der Bundesregierung bei der Filmförderreform,
  beides mit einen kräftigen Investitionsschub und den passenden Rahmenbedingungen
  weiter zu stärken. “ Die Preisträgerinnen und Preisträger des 76. Deutschen Filmpreises
  sind: BESTER SPIELFILM Goldene Lola IN DIE SONNE SCHAUEN Produktion: Maren Schmitt,
  Lucas Schmidt, Lasse Scharpen ∙ Studio Zentral Regie: Mascha Schilinski · Drehbuch:
  Mascha Schilinski, Louise Peter Lola in Silber GELBE BRIEFE Produktion: Ingo Fliess
  ∙ if... Productions Film, Haut et Court, Liman Film Regie: İlker Çatak · Drehbuch:
  İlker Çatak, Ayda Meryem Çatak, Enis Köstepen Lola In Bronze ACH, DIESE LÜCKE, DIESE
  ENTSETZLICHE LÜCKE Produktion: Janine Jackowski, Jonas Dornbach, Maren Ade ∙ Komplizen
  Film, Sentana Filmproduktion, Doll Filmproduktion, Warner Bros. Film Productions
  Germany Regie & Drehbuch: Simon Verhoeven BESTER DOKUMENTARFILM SIRI HUSTVEDT –
  DANCE AROUND THE SELF Produktion: Irene Höfer ∙ Medea Film Factory, Dschoint Ventschr
  Filmproduktion Regie: Sabine Lidl BESTER KINDERFILM ZIRKUSKIND Produktion: Katharina
  Bergfeld, Martin Heisler ∙ Flare Film Regie & Drehbuch: Julia Lemke, Anna Koch BESTE
  REGIE Mascha Schilinski · IN DIE SONNE SCHAUEN BESTES DREHBUCH Mascha Schilinski,
  Louise Peter · IN DIE SONNE SCHAUEN BESTE WEIBLICHE HAUPTROLLE Senta Berger · ACH,
  DIESE LÜCKE, DIESE ENTSETZLICHE LÜCKE BESTE WEIBLICHE NEBENROLLE Lena Urzendowsky
  · IN DIE SONNE SCHAUEN BESTE MÄNNLICHE HAUPTROLLE August Diehl · DAS VERSCHWINDEN
  DES JOSEF MENGELE BESTE MÄNNLICHE NEBENROLLE Michael Wittenborn · ACH, DIESE LÜCKE,
  DIESE ENTSETZLICHE LÜCKE BESTE KAMERA/BILDGESTALTUNG Fabian Gamper · IN DIE SONNE
  SCHAUEN BESTER SCHNITT Evelyn Rack · IN DIE SONNE SCHAUEN BESTES SZENENBILD Cosima
  Vellenzer (Szenenbild), Maike Kiefer (Set Dec) · IN DIE SONNE SCHAUEN BESTES KOSTÜMBILD
  Sabrina Krämer · IN DIE SONNE SCHAUEN BESTES MASKENBILD Anne-Marie Walther, Irina
  Schwarz · IN DIE SONNE SCHAUEN BESTE FILMMUSIK Marvin Miller · GELBE BRIEFE BESTE
  TONGESTALTUNG Claudio Demel, Billie Mind, Kai Tebbel, Sebastian Heyser, Jürgen Schulz
  · IN DIE SONNE SCHAUEN BESTE VISUELLE EFFEKTE Michael Wortmann, Frank Schlegel ·
  MOMO EHRENPREIS DES DEUTSCHEN FILMPREISES Wim Wenders BESUCHERSTÄRKSTER FILM DAS
  KANU DES MANITU Regie & Produktion: Michael Bully Herbig BERND EICHINGER PREIS Thomas
  Wöbke und Philipp Trauer Der Deutsche Filmpreis ist seit 1951 die bedeutendste Auszeichnung
  des deutschen Films. Mit seiner langen Tradition würdigt er als Schaufenster des
  deutschen Films dessen Vielfalt und stärkt zugleich die Aufmerksamkeit für den deutschen
  Kinofilm im In- und Ausland. Über die Gewinnerinnen und Gewinner stimmen die über
  2.400 Mitglieder der Deutschen Filmakademie e.V. in einem zweistufigen Verfahren
  ab. Die Verleihung des Deutschen Filmpreises ist eine Veranstaltung der Deutschen
  Filmakademie in Zusammenarbeit mit dem Beauftragten der Bundesregierung für Kultur
  und Medien, produziert von der DFA Produktion GmbH. Sie fand in diesem Jahr wieder
  im Palais am Funkturm statt. Weitere Informationen zum Deutschen Filmpreis 2026,
  dem Wahlverfahren und zur Arbeit der Deutschen Filmakademie stehen bereit unter
  www.deutsche-filmakademie.de und www.deutscher-filmpreis.de .'
