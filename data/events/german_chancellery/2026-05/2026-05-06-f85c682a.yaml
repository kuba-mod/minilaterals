title: Cabinet decision Bundeswehr mission for UNIFIL concludes
text: As part of the mission in Lebanon, the frigate North Rhine-Westphalia is participating
  in the UNIFIL Maritime Task Force. The Federal Government has decided that armed
  German forces will take part in the UNIFIL mission in Lebanon for the last time.
  The aim is to complete the mission’s operational mandate by 31 December 2026. The
  German Bundestag still needs to approve the resolution. The mandate also includes
  the winding-down phase, during which the Bundeswehr will repatriate its soldiers
  – as well as support for the United Nations (UN) and its member states around the
  withdrawal through 30 June 2027. The Federal Government’s decision was reached in
  light of the backdrop of United Nations (UN) Security Council Resolution 2790 (2025)
  of 28 August 2025. That resolution extended UNIFIL’s UN mandate for the last time
  through 31 December 2026 – in conjunction with a subsequent winding-down phase.
  Until then, operational duties will still be carried out. This includes participation
  with a frigate in the UNIFIL Maritime Task Force, with staff personnel at UNIFIL
  headquarters and with training personnel for the development of the Lebanese Navy’s
  capabilities. Up to 300 Bundeswehr soldiers may be deployed for this purpose. From
  1 January 2027, up to 80 soldiers may be deployed. Due to the current threat and
  security situation in the region, training was suspended in March. However, it is
  set to be resumed as soon as possible. Even in the current situation, UNIFIL remains
  an important player for security and stability in Lebanon and the region. Through
  the end of 2026, the mission will focus primarily on supporting the Lebanese armed
  forces in taking control of their own territory. Since the establishment of the
  UNIFIL Maritime Task Force in 2006, UNIFIL has also been monitoring the United Nations
  arms embargo in Lebanese coastal waters, as stipulated in Security Council Resolution
  1701. Thanks to the training provided by the UNIFIL Maritime Task Force, the Lebanese
  navy has made considerable progress in monitoring its own territorial waters. In
  principle, it is now able to carry out all technical procedures independently, from
  querying to inspecting suspicious ships. These tasks will therefore continue to
  be trained and supported through the end of the mandate in order to empower the
  Lebanese Navy as sustainably as possible.
