title: Bundeskanzler Merz gratuliert dem Premierminister von Antigua und Barbuda,
  Gaston A. Browne
text: Sehr geehrter Herr Premierminister, zu Ihrer erneuten Ernennung zum Premierminister
  von Antigua und Barbuda übermittle ich Ihnen meine herzlichsten Glückwünsche. Antigua
  und Barbuda sind Deutschland durch gemeinsame Werte verbunden. Ich freue mich darauf,
  mit Ihnen die bilaterale und multilaterale Zusammenarbeit fortzuführen und weiter
  zu vertiefen. Für die vor Ihnen liegenden Aufgaben wünsche ich Ihnen viel Erfolg
  und eine glückliche Hand. Mit freundlichen Grüßen Friedrich Merz Bundeskanzler der
  Bundesrepublik Deutschland
