title: Im Kabinett beschlossen Investitionspakt und Film booster starten
text: 'Für mehr Filmhits „ made in Germany “: Der Bund reformiert die Filmförderung.
  Streamingdienste und Sender stärker in die Verantwortung nehmen: Das ist das Ziel
  des Gesetzentwurfs für eine Investitionsverpflichtung, die das Kabinett heute beschlossen
  hat. Streaming dienste und Sender, die vom deutschen Markt profitieren, werden darin
  zu Investitionen in europäische audiovisuelle Werke verpflichtet. Damit soll der
  Produktionsstandort Deutschland nachhaltig gestärkt, Marktpluralität gesichert und
  die Wettbewerbsfähigkeit der Film- und Serienlandschaft dauerhaft gefördert werden.
  „Unser Ziel ist, dass mehr Aufträge nach Deutschland und Europa gehen. Wir wollen,
  dass europäische Inhalte gestreamt werden. Und wir fördern die Arbeit unabhängiger
  Produzentinnen und Produzenten“, erklärt Bundesfinanzminister Klingbeil. „Dafür
  verbessern wir die Rahmenbedingungen für die deutsche und europäische Filmbranche.“
  Gleichzeitig erhielten Streaming dienste und Sender über die Öffnungsklausel aber
  auch Spielraum, betont Staatsminister Weimer. Mindestens acht Prozent ihres Jahresumsatzes
  müssen Streaming dienste und Sender künftig in den Filmstandort Deutschland investieren.
  Hinzu kommen Subquoten für deutschsprachige Inhalte, unabhängige Produzenten und
  die Herstellung neuer Werke sowie Vorgaben für eine faire Rechteteilung mit unabhängigen
  Produzenten. Neben der Basisinvestitionsquote von acht Prozent setzt das Mediendienste-Investitionsverpflichtungs-Gesetz
  (MedienInvestVG) zudem Anreize für weitergehende freiwillige Selbstverpflichtungen:
  Ab einer Investitionsquote von zwölf Prozent oder mehr ist es den Medienunternehmen
  erlaubt, von bestimmten Detailvorgaben des Gesetzes abzuweichen. Ziel dieser Öffnungsklausel
  ist es, signifikante Aufträge für die deutsche Filmwirtschaft sicherzustellen, ohne
  unverhältnismäßig in die Geschäftsmodelle der Streamer und Sender einzugreifen.
  250 Millionen Euro stellt der Bund nun jedes Jahr für die wirtschaftliche Filmförderung
  bereit. Zusammen mit den Mitteln der jurybasierten kulturellen Filmförderung und
  der Filmförderungsanstalt stehen damit jährlich mehr als 300 Millionen Euro für
  Filmproduktionen zur Verfügung. Hinzu kommen die Länderförderungen. „Damit kann
  die gesamte Filmwirtschaft nun erstmals wirklich verlässlich über Jahre hinaus planen“,
  erklärt Staatsminister Weimer. „Nun ist es an der Branche, diese Chance zu nutzen,
  um Filmhits ‚ made in Germany ‘ in Serie zu produzieren.“ Die Erhöhung der Mittel
  für die wirtschaftliche Filmförderung und die Investitionsverpflichtung für Mediendienste-Anbieter
  sind die beiden letzten Bausteine der Reform der Filmförderung des Bundes, die in
  der vergangenen Legislaturperiode angestoßen wurde. Die Reform des Filmförderungsgesetzes
  (FFG) und der jurybasierten kulturellen Filmförderung sind bereits umgesetzt.'
