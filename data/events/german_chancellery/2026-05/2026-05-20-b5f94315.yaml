date: '2026-05-20'
type: press_release
source_name: german_chancellery
title: Rede von Kanzler Merz beim ZVEI-Summit 2026 „Ein Aushängeschild der internationalen
  Wettbewerbsfähigkeit“
text: 'Künstliche Intelligenz und die Mikroelektronik seien die Schlüsseltechnologien
  für die Elektro- und Metallindustrie, betonte Kanzler Merz. Ein Produktionswachstum
  im letzten Jahr von zwei Prozent - und dies gegen den allgemeinen Trend: Für diese
  Leistung der Elektro- und Digitalindustrie bedankte sich Bundeskanzler Friedrich
  Merz bei seiner Rede beim Verbandstreffen ZVEI-Summit 2026 in Berlin. Der Kanzler
  erwähnte zahlreiche Maßnahmen, mit der die Bundesregierung die Wirtschaft weiter
  ankurbeln wolle, dazu gehörten weitere Investitionsanreize und der Rückbau von Bürokratie.
  Priorität sei es, dass Deutschland ein starker Industriestandort bleibe und ein
  Innovationsstandort an der Spitze werde. Wichtig sei auch, die Vertiefung des europäischen
  Binnenmarktes voranzutreiben, auch mit einer Kapitalmarktunion für mehr private
  Investitionen in Europa. Sehr geehrter Herr Präsident, lieber Daniel Hager, meine
  sehr geehrten Damen und Herren, herzlichen Dank für die freundliche Begrüßung und
  die Einladung, heute auf diesem Gipfel, auf Ihrer Verbandstagung, zu sprechen. Ich
  nehme zunächst einmal diesen Anlass gern wahr, um nicht nur Ihnen, Herr Hager, zu
  Ihrer Wahl zu gratulieren, sondern auch um Ihnen, Herr Kegel, herzlichen Dank für
  Ihre Arbeit zu sagen, die Sie in den letzten Jahren geleistet haben, für das gute
  Miteinander, auch aus Ihrem Verband heraus. Herzlichen Dank für Ihre Arbeit! Alles
  Gute für Sie! Und noch einmal: Danke, dass Sie so lange und so erfolgreich an der
  Spitze dieses Verbandes gestanden haben! Lieber Herr Hager, herzlichen Glückwunsch
  auch namens der Bundesregierung. Sie übernehmen als Unternehmer Verantwortung für
  diese Branche, für einen Verband, den wir in Deutschland kennen, schätzen, von dem
  wir wissen, wie stark er ist. Sie haben die Zahl gerade selber noch einmal genannt:
  über 200 Milliarden Euro Umsatz allein in der Elektro- und Digitalindustrie der
  Bundesrepublik Deutschland. Das sind mehr als 5 Prozent der wirtschaftlichen Leistung
  unseres Landes. Gegen den allgemeinen Trend haben Sie es geschafft, im letzten Jahr
  ein Produktionswachstum von 2 Prozent zu erreichen. Meine Damen und Herren, ich
  will das mit einem Wort des Dankes an Sie alle verbinden. Sie arbeiten in Ihren
  Unternehmen jeden Tag in der Elektro- und Digitalindustrie. Sie tun das in einem
  schwieriger gewordenen nationalen, in einem schwieriger gewordenen europäischen
  und vor allem in einem sehr viel schwieriger gewordenen internationalen Umfeld.
  Aber Sie zeigen, was Deutschland immer noch kann, und Sie können immer noch mit
  dem überzeugen, was Sie in Ihren Unternehmen tun. Ich will es einfach so sagen:
  Sie sind ein Aushängeschild der internationalen Wettbewerbsfähigkeit der deutschen
  Wirtschaft. Herzlichen Dank für das, was Sie leisten! Sie beweisen diese internationale
  Wettbewerbsfähigkeit Ihrer Industrie trotz geopolitischer Spannungen und Konflikte,
  die zu erheblichen Unsicherheiten und auch zur Unterbrechung von Lieferketten geführt
  haben. Sie beweisen das trotz eines verschärften globalen Systemwettbewerbs, der
  die Weltwirtschaft gerade fundamental verändert und auch wieder Protektionismus
  befördert. Meine Damen und Herren, lassen Sie mich das an dieser Stelle sagen: Wir
  werden wahrscheinlich die Dimension der Veränderung, die wir im Augenblick durch
  neue Machtpolitik, durch neue Geostrategien sehen, erst in einigen Jahren richtig
  einordnen können. Die ganze Dimension dessen, was zurzeit auf der Welt geschieht,
  ist nicht im üblichen Auf und Ab einer konjunkturellen Entwicklung ‑ heute der Ab-
  und morgen wieder der Aufschwung ‑, sondern es ist auch eine ganz grundlegende Veränderung
  geostrategischer Machtpolitik. Wie sie aussieht, das sehen wir in den USA, das sehen
  wir in China, das sehen wir in Russland, und das sehen wir gerade in diesen Stunden
  beim Besuch des russischen Staatspräsidenten in China. Meine Damen und Herren, vor
  diesem Hintergrund müssen wir uns als Europäer bewähren. Wir müssen mit diesen schwierigen
  Rahmenbedingungen umgehen, und wir müssen sie systematisch angehen. Deswegen wollen
  wir Innovation und Investitionen ermöglichen, vor allem in unsere Infrastruktur.
  Deswegen sind wir mitten dabei, die sozialen Sicherungssysteme unseres Landes zu
  reformieren, wissend, dass das eine schwierige Aufgabe ist. Aber die ersten Gesetzgebungsvorschläge
  sind gemacht. Ein großer weiterer wird im Laufe des Jahres folgen. Wir wollen die
  Lohnzusatzkosten begrenzen, sie nicht weiter steigen lassen, und wir wollen gleichzeitig
  die sozialen Sicherungssysteme in einer älter werdenden Gesellschaft zukunftsfest
  machen. Meine Damen und Herren ‑ ich sage das ohne jede Wehleidigkeit, ohne jede
  Larmoyanz ‑, das ist ziemlich viel auf einmal. Ich habe es beim DGB-Bundeskongress
  gesagt und wiederhole es hier: Die Herausforderung, vor der wir stehen, ist kein
  böser Wille, ist nicht Bösartigkeit, sondern ist ganz einfach die Summe aus Demografie
  und Mathematik, und dem kann sich niemand entziehen. Wir haben einiges für niedrigere
  Energiekosten getan, wissend, dass wir noch mehr tun müssen. Wir haben die Kraftwerkstrategie
  im Kabinett bereits verabschiedet, nachdem sie in Brüssel genehmigt worden ist.
  Wir werden in Deutschland neue Gaskraftwerke bauen, damit wir grundlastfähige Stromerzeugung
  auch zu den Zeiten haben, in denen wir keinen Sonnenschein, keinen Wind haben und
  noch nicht ausreichend speichern können. Wir sind den Weg zu niedrigen Unternehmenssteuern
  gegangen; das wurde schon im letzten Jahr vor der parlamentarischen Sommerpause
  im Bundesgesetzblatt veröffentlicht. Dadurch entstehen große Abschreibungsmöglichkeiten,
  so groß wie in den letzten Jahrzehnten nicht, mit praktisch dreimal 30 Prozent Abschreibung
  in drei Jahren, für zwei Drittel der Investitionen. Wir wissen aber auch: Diese
  Investitionen muss man verdienen. Das wissen nicht alle in Berlin, aber viele. Abschreibungen
  muss man verdienen, sonst sind sie nichts wert. Deswegen werden wir auf diesem Weg
  auch weitergehen. Wir haben die Unternehmenssteuern bereits perspektivisch gesenkt.
  Wir stehen vor einer intensiven Diskussion über die Reform der Einkommensteuer.
  Lassen Sie mich auch dies hier sehr klar und deutlich sagen: Wir müssen gerade auch
  die Personengesellschaften in Deutschland in den Blick nehmen und dürfen sie mit
  Einkommensteuer nicht höher belasten. Die durchschnittliche Steuerlast in Deutschland
  muss sinken und nicht weiter steigen. Das gilt auch und vor allem für die Ertragssteuern
  ‑ und das ist nicht nur die Körperschaftssteuer, das sind auch die Einkommensteuern.
  Wir bauen Bürokratie ehrgeizig zurück, wir modernisieren Staat und Verwaltung. Meine
  Damen und Herren, wir haben hier übrigens, genau an dieser Stelle vor gut einem
  Jahr, den Koalitionsvertrag unterzeichnet. Wir haben in diesem Koalitionsvertrag
  sehr weitgehend die Vorschläge aufgenommen, die zuvor die „Initiative für einen
  handlungsfähigen Staat“ vorgelegt hatte; eine überparteiliche Initiative vom früheren
  Präsidenten des Bundesverfassungsgerichts Andreas Voßkuhle, vom früheren Innenminister
  Thomas de Maizière, von Peer Steinbrück und Julia Jäkel. Ich will ein herzliches
  Wort des Dankes an Julia Jäkel sagen, die gerade heute im „Handelsblatt“ einen zweiseitigen
  Meinungsbeitrag veröffentlicht hat, in dem sie auf die Fortschritte hinweist, die
  wir bereits in der Modernisierung und Digitalisierung unseres Landes erreicht haben.
  Manches davon ist noch nicht sichtbar, vieles davon müsste besser kommuniziert werden.
  Aber, meine Damen und Herren, allein die Tatsache, dass wir in Deutschland erstmalig
  in unserer Geschichte ein eigenständiges Bundesministerium für Digitales und Staatsmodernisierung
  haben und allein die Tatsache, dass wir einen erfahrenen Manager aus Ihrer Industrie
  berufen haben, der sich dieser Aufgabe mit großer Leidenschaft zuwendet, ist ein
  ermutigendes Zeichen. Wir sind auf dem richtigen Weg, was Digitalisierung und Modernisierung
  unseres Staates betrifft. Nun hat Carl Friedrich Gauß, den Sie vermutlich kennen,
  der die Grundlagen der modernen Elektrotechnik mitgelegt hat, einmal gesagt: „Nichts
  ist getan, wenn noch etwas zu tun übrig ist.“ Ja, meine Damen und Herren, es ist
  noch sehr viel zu tun übrig, und wir werden das gemeinsam anpacken müssen. Wir haben
  in den vergangenen zwölf Monaten viele Entscheidungen getroffen, die auf ein Ziel
  ausgerichtet sind, nämlich wettbewerbsfähiger zu werden und wieder Wachstum zu bekommen.
  All diese Entscheidungen, vom Bau neuer Gaskraftwerke bis zur Stärkung der steuerlichen
  Anreize, im Alter länger zu arbeiten ‑ das ist am 1. Januar 2026 in Kraft getreten ‑,
  sind keine Kleinigkeiten. Wir müssen auch einmal umschalten und bereit sein, dass
  nicht alles schlecht ist, dass wir vorangehen, dass wir gemeinsam, Sie in der Industrie
  und wir in der Politik, auch liefern. Ich verstehe zugleich die Kritiker, denen
  es nicht schnell genug geht. Aber es geht auch an der Wirklichkeit vorbei, immer
  nur einen Niedergang zu beklagen, Trübsal zu blasen und auf einen großen Big Bang
  zu warten. Den wird es nicht geben. Wir sind in einem Reformprozess. Dieses Wort
  besteht aus zwei Teilen, Reform und Prozess, und in diesem Prozess kommen wir voran.
  Ich habe die Absicht, in den kommenden Monaten mit der Bundesregierung weiter entscheidend
  voranzukommen. Denn diese Bundesregierung, wir, wir wollen und wir müssen Erfolg
  haben. Wir wollen zeigen, dass aus der politischen Mitte unseres Landes heraus Lösungen
  möglich sind, dass wir auch die Probleme richtig erkennen. Ja, Herr Präsident, wir
  haben nicht nur ein Umsetzungsproblem, wir haben in beachtlichen Teilen unserer
  Gesellschaft immer noch ein Erkenntnisproblem. Es ist eine gemeinsame Aufgabe, die
  wir leisten müssen. Wir müssen auch die Arbeitnehmerinnen und Arbeitnehmer, wir
  müssen die Vertretungen der Arbeitnehmerinnen und Arbeitnehmer, besonders die, davon
  überzeugen, dass jetzt ein Aufbruch nötig ist und nicht ein Verharren, ein Stillstand
  und nur Verteilung dessen, was wir haben. Wir müssen mehr erwirtschaften, damit
  wir unseren Staat, unsere Wirtschaft, auch unseren Sozialstaat zukunftsfähig machen.
  All das ist Voraussetzung für eine wachsende Wirtschaft. Nur eine wachsende Wirtschaft
  kann Fundament für Wohlstand, Sicherheit und Freiheit in Deutschland sein. Deshalb
  ist es die Priorität der von mir geführten Bundesregierung, dass Deutschland ein
  starker Industriestandort bleibt und ein Innovationsstandort an der Spitze wird.
  Es ist gerade Ihre Industrie, meine Damen und Herren, die für die technologische
  und damit für die wirtschaftliche Zukunft unseres Landes entscheidend ist. Ich war
  wie viele von Ihnen vor wenigen Wochen auf der Hannover Messe. Ich habe auf meinem
  Rundgang dort gleich mehrere Stände von Mitgliedsunternehmen Ihres Verbandes besucht.
  Was dort an bahnbrechenden Ideen zu sehen war, an Ambition, an Begeisterung, an
  Ehrgeiz, an Können, von Robotik über künstliche Intelligenz bis hin zur E-Mobilität,
  meine Damen und Herren, das war beeindruckend, das war ermutigend. Ich habe von
  dieser Messe viel Ermutigung auch für unsere Arbeit hier in Berlin mitgenommen.
  Es hat deutlich gemacht, zu was wir volkswirtschaftlich nach wie vor in der Lage
  sind. Wirklich, es ist eine Quelle für Zuversicht in unserem Land. Ich danke Ihnen
  allen, die daran beteiligt waren und die in unserem Land diese mutmachenden Erfahrungen
  auch ermöglichen. Dasselbe habe ich im Übrigen in Hannover aus meinem Treffen mit
  den Unternehmerinnen und Unternehmern der Initiative „Made for Germany“ mitgenommen.
  Meine Damen und Herren, es ist ein großes Potenzial und eine große Dynamik, ein
  großer Wille zur Investition, zur Innovation in unserem Land vorhanden. Lassen Sie
  mich nur die Zahlen sagen: Mehr als 100 Unternehmen haben sich dieser Initiative
  angeschlossen. Sie haben für die nächsten fünf Jahre über 800 Milliarden Euro an
  Investitionen in den deutschen Standort zugesagt, gerade in Zukunftstechnologien
  unseres Landes. Dabei wird es nicht nur darum gehen, neue Zukunftstechnologien zu
  entwickeln; darin sind wir in Deutschland schon ziemlich gut. Es geht auch darum,
  diese neuen Technologien jetzt schnell und effizient in die Praxis zu übersetzen
  und international zu skalieren. Hier haben wir noch Aufholbedarf, und das ist Ihre
  und unsere Aufgabe gemeinsam. Wir leisten in der Bundesregierung einen Beitrag für
  die schnelle Umsetzung von Forschung in Wertschöpfung ‑ durch gezielte Investitionen,
  durch Fördermittel und durch die Stärkung digitaler Infrastruktur. Sie haben es
  genannt, Herr Präsident: Die Hightech Agenda Deutschland gibt hier Schub, unter
  dem Motto „From Lab to Fab“, vom Laboratorium in die Fabrik. Gerade heute vor wenigen
  Stunden haben wir im Bundeskabinett mit der Bundesministerin Dorothee Bär die Technologie-Roadmaps
  zu den einzelnen Schlüsseltechnologien der Agenda vorgestellt. Zwei dieser Schlüsseltechnologien
  sind besonders wichtig für Sie, für die Elektro- und für die Digitalindustrie ‑ Sie
  haben es genannt ‑, die künstliche Intelligenz und die Mikroelektronik. In beiden
  Technologien, meine Damen und Herren, verfügt Deutschland über gute, ja allerbeste
  Voraussetzungen, nämlich über eine starke industrielle Basis, exzellente Forschungseinrichtungen
  und Wissenschaftler und, was für KI besonders wichtig ist, hervorragende Datenressourcen.
  Aber lassen Sie mich auch da ein offenes Wort sagen: Ich habe am Rande des vorletzten
  Weltwirtschaftsforums in Davos mit dem Chef von Microsoft, mit Satya Nadella gesprochen.
  Er hat mir gesagt: Ihr Deutschen, Ihr wisst gar nicht, welches Potenzial Ihr habt,
  gerade in den Daten eurer mittelständischen Unternehmen. Ihr müsst sie nur gemeinsam
  besser nutzen. Ja, meine Damen und Herren, wir wollen diese Daten zusammen mit Ihnen
  besser nutzbar machen. Dafür müssen wir in Deutschland mehr über Datensicherheit
  und weniger über Datenschutz sprechen. Auch das ist eine gemeinsame politische Aufgabe,
  die wir haben. Genau daran arbeiten wir. Wir fördern industrielle KI , national
  und europäisch. Wir schaffen ein leistungsfähiges KI -Ökosystem in ganz Europa.
  Deutschland und Frankreich zusammen hatten übrigens hier an dieser Stelle im November
  des letzten Jahres einen Digitalgipfel veranstaltet ‑ einige von Ihnen werden daran
  teilgenommen haben ‑, auf dem wir mit unseren französischen Nachbarn gezeigt haben,
  was wir gemeinsam schaffen wollen, wenn es darum geht, Europa weiter zu digitalisieren.
  Mir war in diesem Zusammenhang wichtig ‑ danke, dass Sie das angesprochen haben ‑,
  dass wir uns im Rahmen des sogenannten KI -Omnibus dafür eingesetzt haben, Maschinen
  vom AI Act weitgehend auszunehmen. So können wir jetzt am Standort Deutschland die
  Chancen künstlicher Intelligenz gerade in dieser Branche voll ausschöpfen. Meine
  Damen und Herren, Regulierung ‑ das habe ich auch schon an anderer Stelle gesagt ‑
  muss Innovationen ermöglichen und darf Potenziale nicht begrenzen. KI wird in diesem
  Sinne in den nächsten Jahren vieles verändern ‑ Sie haben darüber gesprochen und
  werden hier heute und morgen auch weiter darüber sprechen. Ich möchte, dass wir
  in Deutschland ein zentraler Spieler für die nächste KI -Generation werden und ähnlich
  hohe Ambitionen haben wir in der Mikroelektronik. Die Herausforderungen in diesem
  Bereich, gerade bei den Halbleitern, kennen Sie alle. Wir sind der größte Mikroelektronikstandort
  der Europäischen Union, und die Bundesregierung fördert das durch gezielte Initiativen
  und Investitionen über die Hightech Agenda. Mit unserer Mikroelektronik-Strategie
  stärken wir vorhandene technologische Kapazitäten in Europa. Wir sichern die Mindestkapazitäten
  in kritischen Bereichen und wir entwickeln verlässliche Partnerschaften, um Abhängigkeiten
  zu reduzieren. Auch das gehört zum ganzen Bild dazu: Wir suchen und finden als Europäer
  neue Partnerschaften auf der Welt, etwa mit dem MERCOSUR-Abkommen ‑ Brasilien war
  Partnerland auf der Hannover Messe ‑ oder mit dem bevorstehenden Abschluss eines
  Abkommens mit Indien über die Zusammenarbeit mit der größten Volkswirtschaft der
  Welt. Diese Länder sind daran interessiert, mit uns, mit den Europäern zusammen,
  gerade in diesen Bereichen der modernsten Technologien eng zusammenzuarbeiten. Denn
  Mikroelektronik ist Grundlage unserer technologischen Souveränität. Chips, Sensoren,
  Halbleiter: All diese Dinge sind für uns von existenzieller Bedeutung. Und wenn
  ich sage, dass wir das wollen, dann will ich auch sagen: Sie in der Elektro- und
  Digitalindustrie sollten auch die entsprechenden Möglichkeiten haben, und die Politik
  soll dafür die Bedingungen schaffen, damit uns dies alles gelingen kann. Meine Damen
  und Herren, diese Bedingungen sind heute nicht nur national; sie sind auch und vor
  allem europäische Bedingungen. Gerade für Ihre Branche gibt es einen großen Hebel
  für Wachstum, nämlich eine weitere Vertiefung des europäischen Binnenmarktes. Ja,
  wir haben auf dem Papier einen der größten Märkte der Welt. In der Praxis sieht
  es leider immer noch anders aus. Aber auch hier ist seit dem letzten Jahr ein neuer
  Weg eingeschlagen. Europa konzentriert sich wieder auf die Rahmenbedingungen für
  neue wirtschaftliche Stärke, mit weniger Bürokratie, schnelleren Verfahren und einem
  echten gemeinsamen Markt für Investitionen, Daten, Kapital und Technologien. Wir
  haben auf der Grundlage der hervorragenden Berichte der beiden früheren italienischen
  Ministerpräsidenten Mario Draghi und Enrico Letta unter den Staats- und Regierungschefs
  der Europäischen Union im Februar einen Maßnahmenkatalog beschlossen, den wir jetzt
  ganz systematisch abarbeiten. An die jüngeren Unternehmensgründer gerichtet will
  ich sagen: Das sogenannte 28. Regime, das wir „EU Inc.“ nennen, also „Incorporated“,
  ist eine neue Gesellschaftsrechtsform mit einem einheitlichen Rechtsrahmen für alle
  europäischen Staaten. Das soll ab dem 1. Januar 2027 möglich sein, insbesondere
  für Start-ups und innovative Unternehmen. Wir wollen sie in die Lage versetzen,
  einfacher in allen Mitgliedstaaten zugleich zu gründen, zu arbeiten und zu wachsen.
  Wir treiben in diesem Zusammenhang auch die Kapitalmarktunion voran, um private
  Investitionen in Europa zu fördern. Zu viele Start-ups verlassen unseren Kontinent
  in der Wachstumsphase, weil sie anderswo schneller Kapital finden und einfacher
  skalieren können. Das wollen wir ändern, damit mehr Kapital dort ankommt, wo neue
  Technologien entstehen, wo industrielle Wertschöpfung wächst und wo gute Arbeitsplätze
  erhalten und neue geschaffen werden können. Meine Damen und Herren, dass dies nicht
  alles nur eine Beschreibung von mir ist, sondern dass es Realität in der Europäischen
  Union ist, zeigen die Schlussfolgerungen des letzten Europäischen Rates im März
  in Brüssel. Sie weisen genau in diese Richtung: Es muss jetzt um ein wirtschaftlich
  wettbewerbsfähiges und souveränes Europa gehen. Meine Damen und Herren, so stehen
  wir gemeinsam vor großen Herausforderungen. Sie in der Elektro- und Digitalindustrie
  treiben diese Schlüsseltechnologien von morgen mit an. Herr Präsident, Sie haben
  Ihr Motto genannt: Die Zukunft ist elektrisch. Ich möchte aus meiner Sicht gerne
  hinzufügen: Die Zukunft ist elektrisch, digital ‑ so wie Sie es gesagt haben ‑ und
  europäisch. Die Zukunft entsteht auch nicht irgendwann und irgendwo. Sie entsteht
  jetzt durch die Leistung der Beschäftigten in Ihren Betrieben, durch Sie, durch
  Ihre Leistung als Unternehmerinnen und Unternehmer in den Büros, in den Laboren,
  in den Fertigungsstraßen. Es geht jetzt um unseren gemeinsamen Erfolg in der Bundesrepublik
  Deutschland. Es geht um die Frage, ob Deutschland und Europa auch in den nächsten
  Jahren technologisch souverän, wirtschaftlich stark und international wettbewerbsfähig
  bleiben können. Ich bin davon überzeugt ‑ und ich stünde nicht hier, wenn ich es
  nicht wäre ‑: Wir haben dafür alle Voraussetzungen. Die Bundesregierung ist entschlossen,
  die Rahmenbedingungen Schritt für Schritt weiter zu verbessern. Deswegen bin und
  bleibe ich der Überzeugung: Es liegen nicht die besten Jahre hinter uns, sondern
  es liegen sehr gute Jahre vor uns ‑ wenn wir es richtig machen, wenn wir gemeinsam
  anpacken, wenn wir zeigen, dass wir die Ärmel aufkrempeln können, dass wir arbeiten
  können, dass wir etwas schaffen können, dass wir frei sind und dass wir die Chancen
  und Gelegenheiten, die wir haben, gemeinsam nutzen. In diesem Sinne, meine Damen
  und Herren: Lassen Sie uns gemeinsam genau daran arbeiten, und zwar nicht nur, weil
  wir es für uns wollen. Das wäre Motiv genug; aber das Wichtige ist, dass wir verstehen,
  in welcher Zeit wir leben, und dass wir die Herausforderung, vor der wir stehen,
  richtig einordnen. Diese Herausforderung ist eigentlich ganz einfach, aber sie ist
  gleichzeitig schwer zu bestehen: Wir müssen gemeinsam das Ziel haben, auch unseren
  Kindern und unseren Enkelkindern die Chance zu geben, im Frieden, in Freiheit, in
  Wohlstand und in einem funktionierenden Sozialstaat Bundesrepublik Deutschland zu
  leben. Das ist alles andere als selbstverständlich. Diese Herausforderung ist uns
  jetzt gestellt, unserer Generation, die wir das ungeheure Glück gehabt haben, über
  acht Jahrzehnte in Frieden, in Freiheit, in Wohlstand, in einem Sozialstaat und
  in einer Demokratie zu leben. Meine Damen und Herren, daran zu arbeiten, jenseits
  aller persönlichen Neigungen und Präferenzen und aller parteipolitischen Festlegungen,
  das ist Ihre Aufgabe, das ist unsere Aufgabe, das ist unsere gemeinsame Aufgabe.'
