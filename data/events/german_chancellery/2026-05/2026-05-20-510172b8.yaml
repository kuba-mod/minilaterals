title: Im Kabinett beschlossen Die digitale Brieftasche kommt
text: Viele persönliche Nachweise sollen mit der EUDI -Wallet künftig über das Smartphone
  abrufbar sein. Das Bundeskabinett hat den Entwurf für das Digitale Identitätengesetz
  (DIdG) beschlossen und damit den Weg für die Einführung der EUDI -Wallet bereitet.
  Mit ihr können Bürgerinnen und Bürger ihre Identität künftig per Smartphone nachweisen
  und digitale Dokumente nutzen. Das erleichtert zahlreiche Alltagsprozesse und funktioniert
  europaweit. Die Europäische Brieftasche für die digitale Identität – kurz EUDI -Wallet
  – ist die digitale Brieftasche auf dem Smartphone. Sie speichert, verwaltet und
  validiert verschiedene persönliche Nachweise. Beispielsweise wird der Personalausweis
  als „digitaler Zwilling“ in der Wallet hinterlegt sein. Perspektivisch können immer
  mehr persönliche Dokumente, wie die Geburtsurkunde, der Führerschein oder auch Fahrtickets
  abgespeichert werden. Nutzerinnen und Nutzer können sich damit elektronisch ausweisen
  oder Nachweise erbringen. Bürgerinnen und Bürgern steht künftig ein zentraler und
  vertrauenswürdiger Zugang für Verwaltungsdienstleistungen, Bankgeschäfte oder Online
  -Verträge zur Verfügung – ohne zusätzliche Identifikationsverfahren. Viele solcher
  Vorgänge lassen sich dann schneller und einfacher erledigen. Die Anwendung ermöglicht
  sichere und nahtlose elektronische Transaktionen zwischen Unternehmen, Bürgerinnen
  und Bürgern und öffentlichen Verwaltungen, und zwar grenzüberschreitend in der gesamten
  Europäischen Union. Auch Unternehmen können Kundinnen und Kunden mithilfe der Wallet
  sicher identifizieren und europaweit neue Geschäftsmodelle entwickeln. Das ist ein
  echter Mehrwert für den Wirtschaftsstandort Deutschland und für den Binnenmarkt
  in Europa. Die Wallet startet im Januar 2027 in einer ersten Ausbaustufe – zunächst
  mit den Funktionen Identifizierung und Nachweise. Im Laufe des kommenden Jahres
  sollen die Möglichkeiten schrittweise erweitert werden um das digitale Signieren,
  den pseudonymen Log-in und die Transaktionsfreigabe für Zahlungen. Nein. Die Wallet
  wird kostenlos und freiwillig nutzbar sein. Analoge Dienste bleiben weiterhin bestehen.
  Ja. Mit der EUDI -Wallet wird es erstmals in Europa ein in allen Mitgliedstaaten
  geltendes, sicheres digitales Identifikationsmittel geben. Die zugrundliegende EU
  -Verordnung gibt den gemeinsamen, rechtsverbindlichen Rahmen für digitale Identität
  vor. Die Wallet ermöglicht es, jederzeit selbstbestimmt über die eigenen Daten zu
  verfügen. Die Bundesregierung trifft Maßnahmen, um Datenschutz und Datensicherheit
  sicherzustellen. Mit der EUDI -Wallet steht erstmalig ein elektronisches Identifizierungsmittel
  für das Sicherheitsniveau „hoch“ auf mobilen Endgeräten zur Verfügung. Im Sinne
  des Rückbaus von Bürokratie sollen Personen, die ihren Personalausweis zuletzt im
  Alter von mindestens 70 Jahren beantragt haben, diesen unbegrenzt weiterverwenden
  können. Hintergrund ist, dass mit steigendem Lebensalter die Situationen zurückgehen,
  in denen der Ausweis aktiv benötigt wird. Die Neubeantragung kann im hohen Alter
  gleichzeitig als sehr aufwändig empfunden werden. Die Neuregelung soll Behördengänge
  reduzieren, wodurch Bürgerinnen und Bürger sowie die Verwaltung gleichermaßen entlastet
  werden. Außerdem soll durch eine Änderung des Passgesetzes die Notwendigkeit entfallen,
  nach einem Umzug den Wohnort im Reisepass zu aktualisieren. Eine Aktualisierung
  soll zwar weiterhin möglich, aber nicht mehr verpflichtend sein. So können Präsenztermine
  in Bürgerämtern vermieden werden. Mit dem Kabinettsbeschluss zum Digitale Identitätengesetz
  bringt die Bundesregierung konkrete Erleichterungen für Bürgerinnen und Bürger auf
  den Weg. Die Neuregelungen sind Teil der föderalen Modernisierungsagenda mit mehr
  als 200 konkreten Maßnahmen für weniger Bürokratie, beschleunigte Verfahren und
  effizientere staatliche Strukturen.
