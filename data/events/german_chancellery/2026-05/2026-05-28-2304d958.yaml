title: Bundeskanzler Merz gratuliert dem Ministerpräsidenten der Republik Slowenien,
  Janez Janša
text: Sehr geehrter Herr Ministerpräsident, ich gratuliere Ihnen herzlich zu Ihrem
  erneuten Amtsantritt. Die Wirtschaften und Gesellschaften unserer Länder sind tief
  miteinander vernetzt, unsere bilateralen Beziehungen von gegenseitigem Vertrauen
  gekennzeichnet. Ich freue mich darauf, diese gemeinsam mit Ihnen - auch im Rahmen
  der EU und der NATO - weiter zu intensivieren. Für die vor Ihnen liegenden Aufgaben
  wünsche ich Ihnen viel Kraft und Erfolg. Mit freundlichen Grüßen Friedrich Merz
  Bundeskanzler der Bundesrepublik Deutschland
