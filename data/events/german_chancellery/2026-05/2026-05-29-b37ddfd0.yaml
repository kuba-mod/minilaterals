title: Bundeskanzler Merz nimmt am EU-Westbalkan-Gipfel in Montenegro teil
text: Am Freitag, den 5. Juni, wird der Bundeskanzler nach Montenegro reisen und dort
  am EU-Westbalkan-Gipfel teilnehmen. Neben den 27 EU-Mitgliedsstaaten und den EU-Institutionen
  sind die sechs Partnerländer des westlichen Balkans - Albanien, Bosnien und Herzegowina,
  Serbien, Montenegro, Nordmazedonien sowie Kosovo - eingeladen. Die Staats- und Regierungschefinnen
  und -chefs werden sich mit dem Thema Erweiterung sowie einer engeren Zusammenarbeit
  im Bereich der Wirtschafts-, Migrations-, Sicherheits- und Außenpolitik befassen.
  Das Treffen unterstreicht den regelmäßigen Austausch mit dem westlichen Balkan und
  knüpft an den letzten Gipfel am 17. Dezember 2025 in Brüssel an. Ziel ist es, die
  europäische Perspektive zu bekräftigen und die umfassende Unterstützung der EU für
  den westlichen Balkan hervorzuheben. Der Bundeskanzler wird mit den Teilnehmenden
  aus EU und Westbalkan über seine Vorschläge sprechen, die Beitrittsverhandlungen
  zu beschleunigen und die Länder auf diesem Weg bereits enger in die EU einzubinden.
