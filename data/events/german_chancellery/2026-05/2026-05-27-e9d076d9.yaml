title: Reise der Bundeswirtschaftsministerin nach China Wettbewerb zu beiderseitigem
  Nutzen
text: 'Um die Handelsbeziehungen ging es beim Treffen von Bundeswirtschaftsministerin
  Katherina Reiche und dem Handelsminister Chinas, Wang Wentao . Bundeswirtschaftsministerin
  Katherina Reiche ist nach China gereist, um dort bis zum 29. Mai Peking und die
  südchinesische Wirtschaftsmetropole Kanton zu besuchen. „Unser gemeinsames Interesse
  ist es, diese Beziehung stabil, verlässlich und zukunftsfähig weiterzuentwickeln“,
  erklärte Ministerin Reiche vor Ort. Nach Gesprächen mit Minister Wang, dem Zentralen
  Entwicklungskomitee und Vize-Minister Zhou sagte die Ministerin: „Wir suchen den
  Dialog mit China, weil es faire Wettbewerbsbedingungen braucht. Wettbewerb ist gut
  und sorgt dafür, dass man gemeinsam besser wird. Aber Wettbewerb muss so gestaltet
  und organisiert sein, dass er zu beiderseitigem Nutzen ist." Die deutsch-chinesischen
  Wirtschafts- und Handelsbeziehungen sind weitreichend. Mit einem Außenhandelsumsatz
  von mehr als 250 Milliarden Euro war die Volksrepublik 2025 wieder Deutschlands
  wichtigster Handelspartner – wie bereits von 2016 bis 2023. „ Eine moderne Wirtschaftsbeziehung
  braucht Kooperation. Sie braucht Kooperation und Wettbewerb. Wettbewerb macht Stärker.
  Kooperation schafft Stabilität und Innovation schafft gemeinsamen Fortschritt“,
  so die Ministerin weiter. Bei der Reise geht es um gemeinsame Ziele, zum Beispiel
  bei der Entwicklung von Energietechnologien, und den Austausch darüber. Damit fügt
  sich die Reise in die Strategie der Bundesregierung ein, künftiges Kooperationspotenzial
  auszuloten und gleichzeitig den Dialog mit der chinesischen Regierung fortzusetzen.
  Schon im Februar war Bundeskanzler Friedrich Merz zum Staatsbesuch in China. Der
  Kanzler hatte auch die Planung deutsch-chinesischer Regierungskonsultationen angekündigt. Für
  die Qualität der Partnerschaft sei die Frage nach der Gestaltung des Wettbewerbs
  von großer Bedeutung, hatte Merz betont. Denn der Handel zwischen zwei der drei
  größten Volkswirtschaften der Welt entfalte eine große Kraft, auch über die eigenen
  Grenzen hinaus, betonte der Bundeskanzler bei seinem Besuch im Februar. Als Beispiel
  hatte er die bis zu 120 zusätzlichen Flugzeuge genannt, die China bei Air bus aktuell
  bestellt habe. Weitere Vertragsabschlüsse seien in Aussicht. Mit 5.200 deutschen
  Unternehmen ist China insgesamt einer der wichtigsten deutschen Auslandsstandorte
  – mit Schwerpunkt bei der Automobil-, Maschinenbau- und Elektroindustrie.'
