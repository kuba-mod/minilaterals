title: Im Kabinett beschlossen Novelle des Baugesetzbuchs
text: 'Durch den Vorrang für Wohnungsbau soll der angespannte Wohnungsmarkt entlastet
  werden. Mit der Reform des Städtebau- und Raumordnungsrechts sollen Planen und Bauen
  in Deutschland einfacher, digitaler und schneller werden. Ziel ist es, Kommunen
  zu entlasten, Wohnraum schneller zu bauen und Städte besser auf die anstehenden
  Herausforderungen vorzubereiten. Denn Städte und Gemeinden müssen große Herausforderungen
  bewältigen: Sie sollen mehr Wohnraum schaffen und müssen dabei viele Interessen,
  Nutzungszwecke und Bedürfnisse in Einklang bringen, ohne Lebensqualität und Umwelt
  zu beeinträchtigen. Zudem müssen sie sich besser an die Folgen des Klimawandels
  anpassen. Planungsprozesse dauern oft zu lange, denn die bestehenden Regelungen
  sind kompliziert und die Verfahren oft undurchsichtig. Das bedeutet hohen Aufwand
  für alle. Zudem fehlen den Kommunen wirkungsvolle und zeitgemäße Instrumente, die
  Digitalisierung hängt hinterher. Daher schafft die Bundesregierung mit der Novelle
  von Baugesetzbuch und Raumordnungsgesetz moderne und praxistaugliche Werkzeuge,
  um die Kommunen und Städte handlungsfähiger zu machen – ob beim dringend benötigten
  Wohnungsbau, beim Kampf gegen Schrottimmobilien, bei der Anpassung an den Klimawandel
  oder der nachhaltigen Stadtentwicklung. Das Kabinett hat die Novelle des Baugesetzbuchs
  und Raumordnungsgesetzes beschlossen. Mit der Novelle des Bau- und Raumordnungsgesetzes
  setzt die Bundesregierung zentrale Regelungsaufträge der Föderalen Modernisierungsagenda
  und des Bund-Länder-Pakts für Planungs-, Genehmigungs- und Umsetzungsbeschleunigung
  um. Damit Städte und Gemeinden auch in Zukunft lebenswert bleiben, braucht es Regeln
  – festgehalten im Raumordnungsgesetz (ROG) und Baugesetzbuch (BauGB) . Das ROG schafft
  die übergeordnete Strategie: Es sorgt dafür, dass Regionen ausgewogen wachsen –
  mit sinnvoll verteilten und aufeinander abgestimmten Flächen sowie dem Schutz von
  Natur und Landschaft. Das BauGB liefert das konkrete Handwerkszeug für die Kommunen:
  Es regelt, wo und wie gebaut werden darf und wie Konflikte zwischen unterschiedlichen
  Nutzungen fair gelöst werden.'
