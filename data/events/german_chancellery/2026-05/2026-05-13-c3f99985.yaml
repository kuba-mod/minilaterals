title: Im Kabinett beschlossen Schärferes Recht gegen heimliche Betäubung
text: 'Beim Einsatz von K.-o. -Tropfen sollen zukünftig härtere Strafen gelten. Das
  Bundeskabinett hat einen Gesetzentwurf zur Änderung des Strafgesetzbuches zur Stärkung
  des strafrechtlichen Schutzes vor sogenannten K.-o. -Tropfen beschlossen. Damit
  werden Taten mit Einsatz von K.-o. -Tropfen, aber auch sämtlicher gefährlicher Mittel,
  die der Täter bei der Tat verwendet, härter bestraft. Der Einsatz von K.-o. -Tropfen
  ist besonders perfide und hinterhältig sowie für die Opfer sehr gefährlich. Die
  Nachwirkungen können weitreichend sein: Betroffene leiden meist lange an körperlichen
  beziehungsweise psychischen Folgen. Der Einsatz von K.-o. -Tropfen oder sämtlicher
  gefährlicher Mittel soll nunmehr als besonders schwere Form des sexuellen Übergriffs
  oder des Raubs gewertet werden. Die Mindestfreiheitsstrafe erhöht sich von drei
  auf fünf Jahre. Damit sendet die Bundesregierung ein klares Signal: Solche Taten
  werden hart verfolgt und bestraft. Die Strafverschärfung ist Teil des zentralen
  Anliegens der Bundesregierung, den Schutz vor Gewalt zu intensivieren. Der Gesetzentwurf
  sieht vor, künftig in §-Paragraph 177 Absatz 8 Nummer 1 StGB und §-Paragraph 250
  Absatz 2 Nummer 1 StGB klarstellend die „gefährlichen Werkzeuge“ und „Mittel“ gleichermaßen
  aufzuführen. Damit wird der Einsatz gefährlicher Mittel der Verwendung einer Waffe
  oder eines gefährlichen Werkzeugs bei einem sexuellen Übergriff oder einem Raub
  gleichgestellt. Die Bundesregierung schafft Rechtsklarheit. Hintergrund der Änderung
  ist eine BGH -Entscheidung vom 8. Oktober 2024, laut der K.-o. -Tropfen nicht als
  „gefährliches Werkzeug“ im Sinne des StGB zu verstehen sind. Damit unterfielen die
  häufig vorkommenden Fälle der Verwendung von K.-o. -Tropfen bei Sexualstraftaten
  unter den Auffangtatbestand mit einer Mindestfreiheitsstrafe von lediglich drei
  Jahren. Nunmehr wurde der Strafrahmen aufgrund vergleichbaren Unrechtsgehalts von
  einer Tat mit einem „gefährlichen Mittel“ und einer Tat mit „gefährlichem Werkzeug“
  angepasst. Mit K.-o. -Tropfen sind verschiedene Drogen und Substanzen gemeint. Die
  farb- und geruchlose Flüssigkeit – in der Regel ist es Gammahydroxybutyrat (GHB)
  – wirkt schnell, setzt das Opfer rasch außer Gefecht. Die Wirkung der Droge ist
  dabei sehr individuell. In der Regel sind die Opfer über mehrere Stunden bewusstseinsgetrübt.
  Das heißt, sie haben keine Kontrolle über ihr Verhalten und können sich meist später
  auch nicht mehr erinnern. Auch ohne eine Folgestraftat richten die K.-o. -Tropfen
  erheblichen Schaden im Körper des Opfers an: Überdosiert können sie eine Atemlähmung
  verursachen und sogar zum Tod führen. Nein. Mit der gesetzlichen Änderung werden
  nicht nur der Einsatz von K.-o. -Tropfen, sondern sämtlicher gefährlicher Mittel,
  also zum Beispiel auch andere Gifte, erfasst. Sexuelle Gewalt mit Einsatz von K.-o.
  -Tropfen ist Gewalt in einer besonders schlimmen Form – und sie trifft vor allem
  Frauen. Das Strafrecht soll darauf eine harte Antwort geben, denn wirksamer Gewaltschutz
  erfordert konsequente Strafen. Die Bundesregierung gibt den Strafverfolgungsbehörden
  und Gerichten die gesetzlichen Möglichkeiten, die Tatbegehung mit Einsatz von K.-o.
  -Tropfen härter zu bestrafen. Darüber hinaus kann e ine höhere Mindeststrafe präventiv
  eine abschreckende Wirkung für Täter entfalten. Aus dem Statistischen Bericht der
  Strafverfolgung geht nicht hervor, welches Tatmittel bei sexuellen Übergriffen eingesetzt
  worden ist. Klare Aussagen zu Fällen mit sogenannten K.-o. -Tropfen sind daher nicht
  möglich. Die Dunkelziffer bei diesen Taten ist hoch, da viele Betroffenen aus unterschiedlichsten
  Gründen von einer Anzeige absehen. Ebenfalls ist die Nachweisbarkeit erschwert:
  K.-o. -Tropfen sind nur sehr kurz im Körper nachweisbar, oft nur wenige Stunden.'
