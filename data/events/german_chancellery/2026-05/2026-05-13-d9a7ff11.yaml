title: Bundeskanzler Merz gratuliert der Präsidentin der Republik Costa Rica, Laura
  Fernández
text: Sehr geehrte Frau Präsidentin, zu Ihrem Amtsantritt als Staatspräsidentin von
  Costa Rica übermittle ich Ihnen meine herzlichen Glückwünsche. Costa Rica und Deutschland
  sind seit Langem durch enge und vertrauensvolle Beziehungen verbunden. Ich freue
  mich darauf, gemeinsam mit Ihnen unsere bilaterale und multilaterale Zusammenarbeit
  fortzuführen und weiter zu vertiefen. Mit freundlichen Grüßen, Friedrich Merz Bundeskanzler
  der Bundesrepublik Deutschland
