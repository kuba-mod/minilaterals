title: Bundeskanzler Merz telefoniert mit dem Präsidenten der Argentinischen Republik,
  Javier Milei
text: Bundeskanzler Merz hat heute mit dem argentinischen Präsidenten Javier Milei
  telefoniert. Beide unterstrichen die freundschaftlichen Beziehungen zwischen Deutschland
  und Argentinien. Der Bundeskanzler und der Präsident waren sich einig, dass sie
  künftig insbesondere in den Bereichen Wirtschaft, Energie und Sicherheit noch enger
  zusammenarbeiten wollen, auch im Rahmen der G20.
