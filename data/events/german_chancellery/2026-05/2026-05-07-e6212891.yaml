title: Das kann Deutschland Aus Wirtschaft wieder Wachstum machen
text: 'Die Bundesregierung hat bereits zentrale Weichen für Wachstum, Arbeitsplätze
  und Wohlstand gestellt – mit dem Ziel, die deutsche Wirtschaft wieder auf Wachstumskurs
  zu bringen. Die Bundesregierung hat die Wirtschaftswende eingeleitet. Das Ziel ist
  klar: Der Wirtschaftsstandort Deutschland soll fit für die Zukunft und international
  wieder wettbewerbsfähig werden. Dafür hat die Bundesregierung zentrale Weichen gestellt.
  Die größte Unternehmenssteuerreform seit mehr als 15 Jahren, umfangreiche Anreize
  für mehr Investitionen, niedrigere Energiekosten und ein entschiedener Bürokratierückbau
  machen deutlich: Die Stärkung der Wirtschaft in Deutschland hat für die Bundesregierung
  erste Priorität – für mehr Wachstum und sichere Arbeitsplätze. Die Bundesregierung
  stärkt nicht nur die Wirtschaft – auch Bürgerinnen und Bürger will sie umfangreich
  entlasten: Sie sollen ebenfalls von niedrigeren Energiekosten profitieren, zudem
  wurde die Pendlerpauschale dauerhaft auf 38 Cent angehoben, die Mietpreisbremse
  wurde verlängert und die Mütterrente ausgeweitet. Mehr zu den Entlastungen für Bürgerinnen
  und Bürger finden Sie hier. Die Bundesregierung entlastet Unternehmen gezielt bei
  den Steuern: Die schrittweise Senkung der Körperschaftsteuer ab 2028 reduziert die
  Unternehmenssteuerbelastung deutlich. Das ist im internationalen Wettbewerb wichtig
  für die hiesigen Unternehmen. Und es stärkt den Wirtschaftsstandort Deutschland.
  Die Körperschaftsteuer wird in fünf Schritten jedes Jahr um ein Prozent gesenkt,
  und zwar von 15 auf zehn Prozent. Ab 2032 beträgt die Gesamt-Steuerbelastung für
  Unternehmen dann knapp 25 Prozent, statt aktuell knapp 30 Prozent. Zudem will die
  Bundesregierung eine lebendige Gastronomiekultur in Deutschland. Daher gilt seit
  dem 1. Januar 2026 der reduzierte Umsatzsteuersatz für Speisen in der Gastronomie
  von sieben Prozent – bislang galten 19 Prozent. Die Landwirtschaft wird darüber
  hinaus mit der vollständigen Wiedereinführung der Agrardiesel-Rückvergütung dauerhaft
  steuerlich entlastet. Die Bundesregierung schafft umfangreiche Investitionsanreize
  für Unternehmen. Der Investitions-Booster ermöglicht degressive Abschreibungen von
  bis zu 30 Prozent für Ausrüstungsinvestitionen bis zum 31. Dezember 2027. Das kommt
  allen Unternehmen zugute und ist unkompliziert umzusetzen. Darüber hinaus werden
  mit einem Investitions-Booster für E-Mobilität betrieblich genutzte Elektrofahrzeuge
  gefördert. Um Investitionen in Forschung zu fördern, wurde außerdem die Forschungszulage
  ausgebaut. Neben dem Standortfördergesetz und dem Deutschlandfonds leistet auch
  die Initiative „ Made for Germany “ , in der über 60 Unternehmen Investitionszusagen
  von mehr als 700 Milliarden Euro für die nächsten drei Jahre abgegeben haben, einen
  wichtigen Beitrag für mehr private Investitionen in Deutschland. Zudem wird ein
  neuer Persönlicher Beauftragter des Bundeskanzlers zentraler Ansprechpartner für
  ausländische Investoren sein und den Investitionsstandort Deutschland international
  vertreten. Deutschlands Wirtschaft braucht international wettbewerbsfähige, dauerhaft
  niedrige, und planbare Energiepreise. Aus diesem Grund entlastet die Bundesregierung
  ab dem 1. Januar 2026 Wirtschaft, Bürgerinnen und Bürger zusammen um rund 10 Milliarden
  Euro bei den Energiekosten : Außerdem beabsichtigt die Bundesregierung, Bürgerinnen
  und Bürger sowie Unternehmen angesichts der infolge der Iran-Krise gestiegenen Kraftstoffpreise
  zu entlasten. Dazu soll die Mineralölsteuer für Benzin und Diesel für einen Zeitraum
  von zwei Monaten um etwa 17 Cent pro Liter gesenkt werden – insgesamt im Umfang
  von rund 1,6 Milliarden Euro. Zur Unterstützung energieintensiver Industriebetriebe
  hat die Bundesregierung einen Industriestrompreis eingeführt, der erstmals ab dem
  Abrechnungsjahr 2026 gilt. Damit wird die Wettbewerbsfähigkeit der Wirtschaft auf
  internationaler Ebene gestärkt – von der Halbleiterfertigung über die Papierherstellung
  bis hin zur Stahlindustrie. Der Industriestrompreis ergänzt die Strompreiskompensation
  , die dauerhaft bestehen und auf zusätzliche Branchen ausgeweitet werden soll. Die
  Bundesregierung macht ernst mit dem Bürokratierückbau . Dafür hat sie bereits in
  den ersten Monaten wichtige Gesetzesvorhaben auf den Weg gebracht: Mit dem Bundesministerium
  für Digitales und Staatsmodernisierung hat die Bundesregierung zudem erstmals ein
  zentrales Ressort geschaffen, das sich ausschließlich der Digitalisierung und Modernisierung
  des Landes widmet. Auch das ein wichtiges Zeichen dieses Aufbruchs – damit aus Wirtschaft
  wieder Wachstum wird.'
