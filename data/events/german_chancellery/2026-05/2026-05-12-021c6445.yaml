title: 'EU stellt Weichen für Förderprogramm Agora-EU – Staatsminister Weimer: „Mit
  selbstbewusster Kultur- und Medienpolitik Europas Souveränität stärken“'
text: 'Der Rat der Europäischen Union für Bildung, Jugend, Sport und Kultur hat heute
  in Brüssel den Entwurf des neuen Kultur- und Medienförderprogramms Agora-EU von
  2028 bis 2034 beschlossen. Für Deutschland stimmte Staatsminister Wolfram Weimer
  zu. Auf seine Initiative hin enthält der Entwurfstext insbesondere auch den Kampf
  gegen Antisemitismus als Programmauftrag. Der Staatsminister für Kultur und Medien:
  „Unser Ziel ist eine selbstbewusste Kultur- und Medienpolitik, die Europas Souveränität
  stärkt. Mit Agora-EU können wir künftig breit angelegte pan-europäische Projekte
  entwickeln, die unser kulturelles Selbstverständnis widerspiegeln und ein Gegengewicht
  zur monopolartigen Dominanz großer Online-Plattformen bilden. In diesem Sinne unterstützt
  der heutige Beschluss ausdrücklich auch den Aufbau europäischer Medienplattformen.“
  Staatsminister Weimer weiter: „Mit Blick auf die wachsende Zahl antisemitischer
  Übergriffe in ganz Europa ist es mir besonders wichtig, in diesem Förderprogramm
  den Kampf gegen Antisemitismus zu verankern. Allen Formen des Antisemitismus, auch
  unter dem Deckmantel vermeintlicher Israel-Kritik, müssen wir entschieden entgegengetreten.
  Auch hier haben wir breite Unterstützung gefunden und diesen Aspekt deutlich im
  Verordnungsentwurf positioniert.“ Der heutige Ratsbeschluss gilt als wichtige Weichenstellung
  für die weiteren Verhandlungen zum endgültigen Verordnungstext. Diese finden im
  Trilog-Format zwischen Rat, Kommission und Europäischem Parlament statt. Die Verordnung
  soll noch 2026 beschlossen werden. Das Budget für das neue Programm wird gesondert
  im Rahmen der Verhandlungen zum Mittelfristigen Finanzrahmen (MFR) der Europäischen
  Union verhandelt. Neben dem Beschluss zum Agora-Programm rief Staatsminister Weimer
  in der heutigen Ratssitzung das Thema der Novellierung der Richtline über audiovisuelle
  Mediendienste (AVMD-RL) auf. Gemeinsames Ziel von Bund und Ländern sei es, Wettbewerbsverzerrungen
  zwischen großen Online-Akteuren und klassischen Medien zu korrigieren, betonte der
  Staatsminister: „Wenn Plattformen heute eine ähnliche Rolle für die öffentliche
  Meinungsbildung spielen, wie einst etwa das lineare Fernsehen, dann müssen sie sich
  auch an den Maßstäben messen lassen, die für dieses entwickelt wurden. Deshalb müssen
  wir die Wettbewerbsbedingungen der digitalen Medienarena neu austarieren und zu
  fairen Spielregeln für alle kommen. Dabei setzen wir auf einen Mix aus Regulierung
  und insbesondere auch Deregulierung, zum Beispiel dort, wo längst überholte Werbebeschränkungen
  die Refinanzierbarkeit klassischer Medien bedrohen.“ Weimer weiter: „Für diesen
  Ansatz habe ich intensiv geworben und bin umso dankbarer, dass uns zahlreiche EU-Partner
  in der heutigen Ratssitzung unterstützt haben. Was wir jetzt brauchen, ist ein ebenso
  ambitionierter Vorschlag der EU-Kommission zur AVMD-Novelle, der die Medienvielfalt
  Europas souverän verteidigt.“ Im Vorfeld der Ratssitzung hatte Staatsminister Weimer
  eine Reihe bilateraler Gespräche mit Mitgliedern des Europäischen Parlaments, insbesondere
  Vizepräsidentin des Europäischen Parlaments, Sabine Verheyen, geführt. Auch mit
  der Vizepräsidentin der Europäischen Kommission für Technologische Souveränität,
  Sicherheit und Demokratie, Henna Virkkunen, hat sich der Staatsminister ausgetauscht.'
