title: Unterstützung für die Ukraine BBK koordiniert Hilfe und Großspenden für Ukraine
text: Das BBK koordiniert und organisiert vielfältige Hilfe für die Ukraine. Das Bundesamt
  für Bevölkerungsschutz und Katastrophenhilfe ( BBK ) ist ein zentraler Knotenpunkt
  der staatlichen Hilfe Deutschlands für die Ukraine. Die Behörde nimmt internationale
  Hilfeersuche entgegen, koordiniert und stimmt diese ab. Hierbei geht es besonders
  um hochspezialisierte Güter wie Beatmungsgeräte, Sanitätsmaterial oder Schutzausrüstung,
  die in die Krisengebiete gebracht werden. Seit Beginn des russischen Angriffskrieges
  gegen die Ukraine wurden staatliche Hilfsgüter und Großspenden im Wert von rund
  259 Millionen Euro über den UCPM ( Union Civil Protection Mechanism ) in die Ukraine
  gebracht. Diese Hilfsgüter umfassen eine Vielzahl von dringend benötigten Materialien,
  die maßgeblich zur Unterstützung der betroffenen Bevölkerung beitragen. Das BBK
  richtet sich nach den Bedarfsanforderungen nach Hilfsgütern, welche die ukrainische
  Regierung offiziell über den UCPM gestellt hat. So soll sichergestellt werden, dass
  die Hilfe zielgerichtet und bedarfsorientiert und mit allen 33 Staaten, die den
  UCPM gemeinsam nutzen, koordiniert ist. In enger Zusammenarbeit mit dem Bundesministerium
  für Gesundheit ( BMG ) und anderen Bundesressorts prüft das BBK auch große Spendenangebote
  aus der deutschen Wirtschaft. Für registrierte Spenden koordiniert das BBK die Umsetzung
  und vermittelt auf Wunsch schnell, sicher und zuverlässig den Transport. Auch der
  Transport und die Verlegung ukrainischer Erkrankter und Verletzter, die über staatliche
  Hilfeleistungsersuchen in Deutschland aufgenommen werden, werden vom BBK koordiniert.
  Dabei greift das BBK auf die etablierten Strukturen des Kleeblattkonzeptes zurück,
  welches sich bereits während der Covid-19-Pandemie für Patiententransporte bewährt
  hat.
