date: '2026-05-21'
type: press_release
source_name: german_chancellery
title: Rede des Bundeskanzlers bei den German Startup Awards Weichenstellung für eine
  innovative Wirtschaft
text: 'Kanzler Merz forderte in seiner Rede Zuversicht, um die bestehenden Probleme
  anzugehen. Bundeskanzler Friedrich Merz unterstrich in seiner Eröffnungsrede der
  German Startup Awards in Berlin die Bedeutung von mutigen Unternehmensgründerinnen
  und -gründern für den Wirtschaftsstandort Deutschland: „Ohne Sie geht es nicht.
  Ohne Innovationsfähigkeit, ohne Wettbewerbsfähigkeit geht es in unserem Land nicht.“
  Die Bundesregierung arbeite weiter daran, Deutschland zu einem gründungsfreundlichen
  Standort zu machen und Startups Wachstumsmöglichkeiten zu eröffnen. Mit der Hightech
  Agenda wären etwa die Weichen gestellt worden, „um Deutschland wieder zum Innovationsvorreiter
  zu machen“, sagte der Kanzler. Und um die „Beschleunigung von Unternehmensgründungen
  mit Fähigkeiten aus anderen Ländern zu ermöglichen“, habe man den Aufbau der Work-and-Stay
  -Agentur auf den Weg gebracht. Es brauche Zuversicht, um die bestehenden Probleme
  zu lösen, forderte Merz zum Abschluss: Deutschland habe „alle Chancen, die Herausforderungen
  zu meistern“. Die German Startup Awards fanden zum siebten Mal statt. Mit der Preisverleihung
  würdigt der Bundesverband Deutsche Startups die Menschen hinter erfolgreichen Startups
  in Deutschland. Der Verband wurde 2012 gegründet und hat heute 1.200 Mitglieder.
  Im Jahr 2025 sind in Deutschland 3.568 Startups gegründet worden – eine Rekordzahl
  . Liebe Verena, liebe Kolleginnen und Kollegen, meine sehr geehrten Damen und Herren,
  herzlichen Dank für diese überaus freundliche Begrüßung und die gute Stimmung hier
  im Saal. Es macht große Freude, Sie heute Abend so festlich gekleidet zu sehen.
  Ich habe mit Erlaubnis Ihrer Vorsitzenden, Verena Pausder, heute Abend noch meine
  Arbeitsbekleidung an. Aber ich muss Ihnen sagen, dass ich ja auch gar nicht für
  einen längeren Verbleib hier vorgesehen bin. Auf dem Tisch vor mir steht folgende
  Karte: „Dieser Tisch macht am Ende der Preisverleihung Platz für die Tanzfläche.
  Nimm alles mit, was nicht tanzen kann.“ Beim nächsten Mal, Verena, plant für mich
  einen anderen Tisch ein. Dann komme ich auch im Smoking und bleibe ein bisschen
  länger. Noch einmal vielen Dank, auch für deine sehr zuversichtlichen Worte! Meine
  Damen und Herren, schön, dass wir heute Abend hier sind, dass wir zusammen sein
  können, dass Sie diese Preisverleihung nun schon zum wiederholten Male in Berlin
  veranstalten. Ich werde in diesen Tagen sehr häufig gefragt: Wofür macht ihr das
  eigentlich alles? Wofür steht ihr in der Bundesregierung? Was wollt ihr für Deutschland
  erreichen? Ich will versuchen, das mit ganz wenigen Worten zu beantworten: Diejenigen,
  die das große Glück gehabt haben, so wie ich, über viele Jahrzehnte in Freiheit,
  in Frieden, im Wohlstand und mit einem immer größer werdenden Maß an sozialem Ausgleich
  in Deutschland zu leben, stehen heute in der Verantwortung dafür, dass unsere Kinder
  und Enkelkinder die gleichen Chancen haben, in den nächsten Jahren und Jahrzehnten
  in Freiheit, in Frieden, im Wohlstand und mit einem hohen Maß an sozialer Gerechtigkeit
  zu leben. Das ist unser Ziel, meine Damen und Herren: weiterhin in Freiheit und
  Frieden in Deutschland leben zu können. Wenn ich das heute so zu Ihnen sage, dann
  gebe ich zu, dass ich das vor vier, fünf Jahren so in dieser Form noch nicht gesagt
  hätte. Es war für uns alle selbstverständlich. Seien wir doch ehrlich miteinander:
  Wir haben es als selbstverständlich angenommen, dass wir in Freiheit leben, dass
  wir in Frieden leben, dass wir in ständig steigendem Wohlstand leben und dass wir
  auch einen Sozialstaat haben, der funktioniert. Heute stehen alle diese Gewissheiten
  auf dem Prüfstand, und nichts ist mehr sicher: unsere Freiheit nicht, der Frieden
  nicht, der Wohlstand nicht und der Sozialstaat nicht. Dies nun so aufzustellen und
  so hinzubauen, dass wir das auch in den nächsten Jahren und Jahrzehnten miteinander
  schaffen können, ist für uns alle – nicht nur für uns in der Politik – die wichtigste
  Aufgabe. Es ist auch Ihre Aufgabe. Es ist unsere gemeinsame Aufgabe als Gesellschaft
  der Bundesrepublik Deutschland. Deswegen freue ich mich über die große Zuversicht,
  die ich heute Abend hier im Raum sehe. Ich freue mich ganz einfach, hier zu sein.
  Meine Damen und Herren, Sie alle sind Risiken eingegangen. Sie gehen jeden Tag ins
  Risiko. Sie alle, als Gründerinnen und Gründer, als Investorinnen und Investoren,
  arbeiten an genau einer solchen Zukunft unseres Landes mit. Sie wissen es, wir wissen
  es: Unsere Wirtschaft muss in sehr vielen Bereichen innovativer und dynamischer
  werden – vor allem, wenn wir uns den harten geoökonomischen und geostrategischen
  und geopolitischen Bedingungen stellen, die um uns herum entstanden sind. Ich habe
  keinen Zweifel daran, dass uns das gelingen kann. Aber wir müssen dafür die Antriebskräfte,
  die wir haben, besser nutzen. Wir müssen die Antriebskräfte auf die Straße bringen.
  Das bringen Sie mit. Das bringen Sie mit Ihren Gründungen mit, und das bringen Sie
  mit Ihren Geschäftsideen mit. Ich sage das nicht, weil ich heute Abend hier bei
  Ihnen stehe. Du hast es gesagt, und es steht auch in unserem Koalitionsvertrag,
  und als wir den geschrieben haben, war keiner von Ihnen dabei: Ohne Sie geht es
  nicht. Ohne Innovationsfähigkeit, ohne Wettbewerbsfähigkeit geht es in unserem Land
  nicht. Das sind die Werte, für die Sie mit Ihrer ganzen Leidenschaft stehen. Dabei
  haben Sie jede Unterstützung verdient. Meine Unterstützung und die der Bundesregierung
  der Bundesrepublik Deutschland haben Sie, meine Damen und Herren. All das, was Sie
  vorhaben, ist nicht nur indirekt, sondern direkt für die Sicherung unserer Freiheit
  in Deutschland und in ganz Europa unersetzbar. Ich will es sehr grundsätzlich sagen,
  und ich nenne hier nur die Stichworte: technologische Souveränität, New-Space -Sektor,
  Sicherheit und Verteidigung. Meine Damen und Herren, Verena Pausder hat es einmal
  so gesagt: Staatlicherseits sollten wir Ihnen den roten Teppich ausrollen. Ja, meine
  Damen und Herren, genau so ist es. Wir wollen es auch tun. Wir tun es bzw. haben
  in der Bundesregierung damit begonnen, es zu tun. Wir haben mit einem grundlegenden
  Reformprozess für unser Land begonnen. Wir haben mit Weichenstellungen begonnen,
  die auch Start-ups und Scale-ups dorthin bringen, wo sie hingehören: „ front and
  center “ der Wirtschafts- und Innovationspolitik unseres Landes. Ich sage ganz bewusst
  „Reformprozess“ mit der Betonung auf beiden Worthälften: „Reform“ und „Prozess“.
  Denn so etwas Grundlegendes, wie wir es vorhaben und wie es nach so vielen Jahren
  des Stillstandes auch notwendig geworden ist, kann nicht einfach nur von oben verordnet
  und dann innerhalb weniger Tage umgesetzt werden. Es braucht dafür den Rückhalt
  der Mitte unserer Gesellschaft, wenn es wirklich auf Dauer tragfähig sein soll.
  Für das, was nötig ist, werbe ich jeden Tag, auch heute hier bei Ihnen. Wir bekommen
  dafür auch manchen Unmut ab, so wie zum Beispiel letzte Woche beim Deutschen Gewerkschaftsbund.
  Aber, meine Damen und Herren, liebe Freundinnen und Freunde – wenn ich das sagen
  darf –: Das gehört dazu. Das nehme ich in Kauf. Wir sind nicht nur dazu da, zu gefallen.
  Wir sind auch dazu da, Widerstände in unserem Lande zu überwinden. Ich bin entschlossen,
  diese Widerstände zusammen mit Ihnen zu überwinden. Wo stehen wir in diesem Reformprozess?
  Wir haben gleich zu Beginn, schon im letzten Jahr, eine Unternehmenssteuerreform
  mit sehr hohen Abschreibungsmöglichkeiten und einer dann sukzessive sinkenden Körperschaftsteuer
  verabschiedet und in Kraft gesetzt. Wir werden dann zehn Prozent Körperschaftsteuer
  in Deutschland haben. Ich weiß, es kommt die Gewerbesteuer dazu, und für viele Start-ups
  – gerade für Personengesellschaften – auch die Einkommensteuer. Deswegen wollen
  wir auch auf diesem Weg der Absenkung der steuerlichen Belastung weitermachen. Wir
  haben auch eine ganze Reihe von kurz-, mittel- und langfristigen Entscheidungen
  getroffen, um die Energiepreise zu senken. Das ist für uns eine große Herausforderung,
  gerade vor dem Hintergrund der geopolitischen Entwicklung. Aber wir sind die ersten
  Schritte gegangen. Das Gleiche gilt für die Reform der sozialen Sicherungssysteme.
  Rentenversicherung, Krankenversicherung, Pflegeversicherung, sie alle müssen zukunftsfest
  gemacht werden. Die Krankenversicherung haben wir im Kabinett verabschiedet. Sie
  befindet sich jetzt im parlamentarischen Prozess. Ich hoffe sehr, dass es uns gelingt –
  und ich appelliere an die Kolleginnen und Kollegen aus dem Deutschen Bundestag,
  dies vor der parlamentarischen Sommerpause zu verabschieden, sodass Sicherheit und
  Planungssicherheit besteht. Die Pflegeversicherung muss folgen. Zur Rentenversicherung:
  Wir werden von der von uns eingesetzten Rentenreformkommission ein umfassendes Paket
  vorgestellt bekommen. Meine Damen und Herren, auch hier spielt etwas mit, das für
  Sie wichtig ist: Wir müssen und wir werden mit dieser Reform auch den Kapitalmarkt
  stärker nutzen und für die Absicherung des Einkommens im Alter öffnen. Wir haben
  eine neue Idee bzw. wir haben eine alte Idee neu aufgebaut oder zum Leben erweckt,
  die da lautet: stärkere Beteiligung der Arbeitnehmerinnen und Arbeitnehmer am Produktivvermögen
  unserer Volkswirtschaft. Du hast die drei Billionen eben genannt, die auf Sparkonten
  und Sichteinlagen in Deutschland liegen. Da gehören sie nicht hin! Sie gehören in
  den Kreislauf unserer Volkswirtschaft, sie müssen angelegt werden, und sie müssen
  vor allem dafür sorgen, dass die Menschen in Deutschland eine stärkere Vermögensbildung
  in ihre Hand nehmen und dass sie damit auch für das Alter besser abgesichert sind.
  Meine Damen und Herren, das ist nicht Hexenwerk, das ist auch nicht Bösartigkeit,
  das ist schlicht und ergreifend Demografie und Mathematik, nichts anderes. Wir wollen
  es und wir werden es machen. Wir haben es im Koalitionsvertrag mit dem Wort eines
  neuen Gesamtversorgungsniveaus verabschiedet bzw. vereinbart, bestehend aus drei
  Säulen der Altersversorgung, nämlich der gesetzlichen Rentenversicherung, aber auch
  der privaten und der betrieblichen Altersvorsorge. Nur, meine Damen und Herren,
  überfällig in unserem Land waren und bleiben die Digitalisierung und die Modernisierung
  unseres Staates. Deutschland muss ganz einfach schneller werden, einfacher werden
  und digitaler werden, eigentlich alles schon gestern. Ich habe darum vor einem Jahr
  die Entscheidung getroffen, dass wir dies auch institutionell in das Zentrum unserer
  Regierungsarbeit stellen, und zwar durch ein Ministerium für Digitales und Staatsmodernisierung.
  Ich bin sehr froh, dass ich für diese Aufgabe einen erfahrenen Mann aus der Wirtschaft
  gewinnen konnte, der sich mit Transformationen auskennt, der sich mit Digitalisierung
  auskennt, von dem Sie alle gehört haben, den Sie vermutlich – viele von Ihnen jedenfalls –
  kennen, ein Mann aus der Privatwirtschaft, Karsten Wildberger, der dieses Amt hervorragend
  ausübt und der genau diese Beschleunigung bei der Digitalisierung und der Staatsmodernisierung
  jetzt zu seiner wichtigsten Aufgabe gemacht hat. Wir haben eine Rechenzentrumsstrategie
  beschlossen, um die digitalen Kapazitäten in Deutschland weiter massiv auszubauen.
  Meine Damen und Herren, innerhalb von fünf Jahren werden wir die Rechenkapazitäten,
  die in Deutschland bestehen, verdoppeln, und auch das hätte ich nicht gewagt, vor
  zwei oder drei Jahren von dieser Stelle aus vorauszusagen. Wir werden mit dieser
  Strategie vermutlich zusammen mit anderen Europäern in der Lage sein, Rechenkapazitäten
  zur Verfügung zu stellen, die uns im Zeitalter von Cloud und Quantencomputing sehr
  viel unabhängiger machen, vielleicht sogar unabhängig von den Vereinigten Staaten
  von Amerika und vor allen Dingen auch von der Volksrepublik China machen. Das machen
  wir! Wir holen hier in großen Schritten auf. Das Ganze wird begleitet von einer
  Modernisierungsagenda des Bundes und einer föderalen Modernisierungsagenda zwischen
  Bund und Ländern. Das sind mehr als 200 Vorhaben, die wir mit den Ländern verbindlich
  verabredet haben, und viele der Länder gehen bereits jetzt in ihren jeweiligen Landesparlamenten
  an die Gesetzgebung und schnüren Gesamtpakete für den Rückbau der Bürokratie, für
  Planungsbeschleunigung, für die Digitalisierung unseres Landes. Das alles sind aus
  meiner Sicht ermutigende Zeichen. Das ist aus meiner Sicht nicht zuletzt auch der
  Aufbau digitaler Plattformen, auf denen wir auch Arbeiten erledigen können, die
  für uns als Staat wichtig sind. Erlauben Sie mir, dass ich auch dies in diesem Zusammenhang
  hinzufüge, gerade in Ihrer Szene: Wir brauchen Menschen aus vielen Ländern der Welt,
  die bereit sind, in Deutschland zu arbeiten, zu uns zu kommen und hier auch ihre
  Fähigkeiten zur Verfügung zu stellen. Wir werden das mit einer Work-and-Stay -Agentur
  begleiten, die auf einer digitalen Plattform die Arbeitsgenehmigung, die Aufenthaltsgenehmigung
  und die Anerkennung der Berufsabschlüsse ermöglicht. Vielleicht ist das sogar das
  anspruchsvollste Projekt der Bundesregierung in der Digitalisierung unserer Verwaltung
  für diese Wahlperiode, weil wir hier auch noch viele Widerstände überwinden müssen.
  Viele Länder wollen die Zuständigkeiten behalten. Die Ausländerbehörden tragen Sicherheitsbedenken
  vor. Wir sehen die Anerkennung der Berufsabschlüsse auf viele Institutionen verteilt,
  nicht in einer Hand. Das ist ein sehr anspruchsvolles Projekt, aber wir wollen es
  machen, auch, um die Beschleunigung von Unternehmensgründungen mit Fähigkeiten aus
  anderen Ländern zu ermöglichen. Wenn alles nach Plan verläuft, und es verläuft nach
  Plan, sogar ein bisschen besser und schneller als gedacht, werden wir zum 2. Januar
  2027 in Deutschland die sogenannte digitale Brieftasche einführen, mit der sich
  alle Bürger eben ab dem nächsten Jahr gegenüber allen staatlichen und privaten Institutionen
  ausweisen können, auch gegenüber Banken, gegenüber Einzelhandelsgeschäften, gegenüber
  Behörden. Wir haben zugleich Weichen gestellt, um Deutschland wieder zum Innovationsvorreiter
  zu machen. Viele von Ihnen werden unsere Hightech Agenda Deutschland kennen. Wir
  priorisieren, und wir fördern damit gezielt sechs Schlüsseltechnologien, die aus
  unserer Sicht zentral für den technologischen Fortschritt in Deutschland sind. Sie
  kennen die Themen: künstliche Intelligenz, Quantentechnologie, Mikroelektronik,
  Biotechnologie, Fusionstechnologie, klimaneutrale Energieerzeugung, Technologien
  für die klimaneutrale Mobilität. Das sind sechs Schlüsseltechnologien, die unser
  Land kann, die wir noch stärker machen wollen. Wir haben auch den Ehrgeiz, das erste
  Fusionskraftwerk der Welt in Deutschland ans Netz gehen zu lassen. Wir sind bei
  der Erforschung und Entwicklung von Fusionsenergie führend auf der Welt, meine Damen
  und Herren. Wir haben hier einen großen Ehrgeiz. Das federführende Ministerium,
  das jetzt wieder Bundesministerium für Forschung, Technologie und Raumfahrt heißt,
  zeigt ja genau in diese Richtung. Wir priorisieren damit auch das Thema der Raumfahrt,
  und zwar entlang eines marktbezogenen Ansatzes. Wir wollen die zunehmende Zahl an
  Start-ups und kleinen und mittleren Unternehmen in dieser Branche für Souveränität
  in Deutschland und in Europa stärken, damit wir dies eben auch mit der Raumfahrt
  im Weltall ermöglichen können. Lassen Sie mich hinzufügen: Auch im Bereich von Sicherheit
  und Verteidigung wollen wir Start-ups Wachstumsmöglichkeiten eröffnen. Hier liegen
  erhebliche Innovationspotenziale, die sehr positive Spillover -Effekte auf den gesamten
  zivilen Bereich versprechen. Wir haben das in der Vergangenheit gezeigt. Ich sehe
  auch den einen oder anderen bzw. die eine oder andere, die in München auf der letzten
  Sicherheitskonferenz mit einer ganzen Reihe von Start-up -Unternehmen dabei waren,
  die in der Verteidigungstechnologie unterwegs sind, gerade aus Deutschland heraus
  – einige von denen übrigens zusammen mit der Ukraine –, und die sensationelle Erfolge
  erzielen, gerade bei der Modernisierung unserer Verteidigungstechnologie. Meine
  Damen und Herren, das Wirtschaftsministerium erarbeitet derzeit eine ressortübergreifende
  Strategie für Start-ups und Scale-ups . Wir wollen sie als Arbeitsagenda jetzt in
  die Ressortabstimmung geben. Bildung, Ausgründungen, Transfer, Sicherheit und Verteidigung,
  Bürokratierückbau, Vergabe und Wettbewerb und Fachkräfte, das alles wird in dieser
  Strategie adressiert. Genauso gilt das für den großen Bereich der Wachstumsfinanzierung.
  Lassen Sie mich dazu ein Wort sagen. Ich weiß, dass da in Deutschland und in Europa
  noch manches im Argen liegt und wie hier tatsächlich auch der Schuh drückt. Liebe
  Verena, wir haben uns ja über dieses Thema schon in der Vergangenheit ausgetauscht,
  nicht zuletzt übrigens an diesem denkwürdigen 6. November 2024, als ich das letzte
  Mal bei Ihnen gewesen bin, an dem Tag, an dem morgens Trump kam und abends die Ampel
  ging. Ja, meine Damen und Herren, dieses Event von damals habe ich in mehrfach guter
  Erinnerung, jedenfalls mit den Gesprächen bei Ihnen. Wir haben damals über die Frühfinanzierung
  gesprochen. Wir sind in Deutschland dabei weit vorangekommen. 2025 war ein Rekordjahr
  für Start-up -Gründungen; du hast es gerade gesagt. Wir müssen aber auch in der
  Wachstumsfinanzierung, in der zweiten und dritten Phase, besser werden. Wir müssen
  es so gut machen – ich will es auch wirklich klar sagen –, dass die Unternehmen,
  die Sie gründen, nicht in den entscheidenden Wachstumsphasen dann auf Kapitalmärkte
  angewiesen sind, die außerhalb der Europäischen Union und außerhalb der Bundesrepublik
  Deutschland liegen. Unser Ziel muss es sein, und es ist das Ziel, dass wir über
  Forschung, Innovation, Patente, Produkte aus Deutschland und aus Europa auch in
  Deutschland und in Europa dauerhaft Wohlstand für uns generieren. Wir kennen den
  Königsweg dorthin. Er liegt in der Vollendung des europäischen Binnenmarktes und
  in der Schaffung einer wirklichen europäischen Kapitalmarktunion. Ich setze mich
  deshalb in Brüssel sehr dafür ein, dass wir in dieser Hinsicht vorankommen und dass
  wir auch mit dem konsequenten Rückbau der Bürokratie und bei der Umsetzung der europäischen
  Start-up - und Scale-up -Strategie vorankommen. Auch in diesem Zusammenhang: Das
  28. Regime, das die EU -Kommission vorgeschlagen hat, meine Damen und Herren, müssen
  wir in Deutschland ermöglichen. Danke für den Beifall und die Zustimmung, aber bitte
  helfen Sie mir gerade aus Ihrer Szene heraus auch dabei, mit guten Argumenten die
  Widerstände zu überwinden, die es auch in Deutschland gegen dieses Regime noch gibt.
  Dies ist nicht in erster Linie eine Frage von Mitbestimmung, sondern dies ist in
  erster Linie eine Frage der Ermutigung junger Unternehmen, Start-ups und Scale-ups
  in Deutschland zu gründen und sie in ganz Europa vom ersten Tag an auch für die
  Märkte zu öffnen. Das ist die entscheidende Frage, die wir gemeinsam beantworten
  müssen. Ich bitte dabei auch sehr um Ihre argumentative Unterstützung, damit wir
  dafür auch eine notwendige Mehrheit im Deutschen Bundestag bekommen. Schließlich:
  Wir unterstützen als Bundesregierung Start-ups in allen Finanzierungsphasen mit
  unseren branchenoffenen Start-up -Finanzierungsinstrumenten. Sie kennen das alles
  gut. Wir haben im letzten Jahr ja mit der Hightech -Gründerinitiative einen entsprechenden
  Fonds aufgelegt. Wir gehen auch mit dem Sonderpreis der German Start-up Awards und
  der Auszeichnung hier sorgfältig um. Wir haben im Dezember den Deutschlandfonds
  gestartet, über den wir mit öffentlichen Mitteln und privaten Möglichkeiten entsprechende
  Garantien stimulieren, um Zukunftsinvestitionen in Technologie und Infrastruktur
  voranzubringen. Wir stärken den Weg von Wagniskapital durch unser Standortfördergesetz,
  das insbesondere den Kapitalmarktzugang für junge und kleine Unternehmen erleichtern
  soll. Wir mobilisieren privates Kapital. Die WIN-Initiative soll mit 2.0 weiter
  gestärkt werden, und ich lade Sie an dieser Stelle ausdrücklich ein, meine Damen
  und Herren, mit Ihrem Know-how , mit Ihren Fähigkeiten, mit Ihren Erfahrungen daran
  teilzunehmen und sich an der Entwicklung dieser Initiative aktiv zu beteiligen.
  Meine Damen und Herren, das sind einige der Weichenstellungen, die wir vorgenommen
  haben. Wir haben in den letzten zwölf Monaten einiges erreicht. Wir müssen noch
  eine ganze Menge tun. Wir stehen vor vielen Entscheidungen, die wir noch durchsetzen
  müssen. Aber lassen Sie mich abschließend dies sagen: Wir haben in Deutschland alle
  Chancen. Die Probleme, die wir haben, sind zum ganz großen Teil selbstverschuldet,
  nicht alle, aber die meisten. Deswegen können wir die meisten Probleme, die wir
  in Deutschland haben, auch selbst lösen. Das geht aber nicht, indem wir mit schmerzverzerrtem
  Gesicht jeden Morgen aufstehen und an die Schreibtische gehen, ins Büro gehen, in
  den Bundestag oder in die Regierung gehen, sondern das geht nur, wenn wir mit dieser
  Zuversicht, die aus diesem Saal heraus zu spüren ist, die Themen anpacken, wenn
  wir auch den jüngeren Menschen in Deutschland sagen, dass dieses Land alle Chancen
  hat, die Herausforderungen zu meistern, und dass dieses Land alle Chancen hat, ein
  Land in Freiheit, im Frieden, im Wohlstand und in sozialer Gerechtigkeit zu bleiben.
  Das setzt aber voraus, dass wir jetzt gemeinsam die Ärmel aufkrempeln, hart arbeiten
  an dem, was wir erreichen wollen, und das Ganze mit Zuversicht verbinden und, wenn
  es denn mit Zuversicht gelingt, auch mit einem festlichen Abend, so wie bei Ihnen
  heute Abend. Ich gratuliere Ihnen dazu. Ich gratuliere allen Preisträgern. Ich freue
  mich, dass Sie heute Abend ausgezeichnet werden. Denken Sie bitte immer daran: Ja,
  Demokratie ist manchmal lästig, und Demokratie ist manchmal schwierig, aber sie
  ist von allen Alternativen immer noch die beste Staatsform, die wir haben. Nur sie
  ermöglicht Freiheit, nur sie ermöglicht Offenheit, nur sie ermöglicht Toleranz und
  gegenseitiges Verständnis. Dafür werbe ich heute Abend auch bei Ihnen, und wenn
  wir es gemeinsam richtig machen, dann überträgt sich diese Stimmung, die Sie heute
  Abend haben und die sich schon bei mir bemerkbar macht in dem, was ich Ihnen sagen
  möchte, meine Damen und Herren, auf unser ganzes Land. Wir haben es verdient. Unser
  Land hat es verdient. Lassen Sie uns gemeinsam daran arbeiten. Herzlichen Dank!'
