title: Krisenreaktionsübung des Bundeskabinetts
text: Die Bundesregierung hat am 20. Mai 2026 eine Krisenreaktionsübung zur Entführung
  eines zivilen Flugzeugs im deutschen Luftraum (sogenanntes „Renegade“- Szenario)
  erfolgreich durchgeführt. Ziel der Übung war es, in einer zeitkritischen und potentiell
  für die öffentliche Sicherheit Deutschlands gefährlichen Lage in Echtzeit eine Entscheidung
  des Kabinetts unter Vorsitz des Bundeskanzlers herbeizuführen. Der Beschluss wurde
  sodann durch die Bundeswehr und Sicherheitsbehörden real umgesetzt. Die Übung erfolgte
  in Umsetzung eines Beschlusses des Nationalen Sicherheitsrats.
