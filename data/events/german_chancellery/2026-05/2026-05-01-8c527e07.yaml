title: Europäische Handelspolitik EU-MERCOSUR-Abkommen vorläufig in Kraft
text: 'Durch den Abbau von Zöllen und weniger Handelshemmnisse bei Exportgütern sollen
  Wachstum, Innovation und Beschäftigung gestärkt werden. Am 1. Mai 2026 ist der Handelsteil
  des EU - MERCOSUR -Abkommens vorläufig in Kraft getreten. Zuvor hatten die MERCOSUR
  -Staaten Argentinien, Brasilien, Paraguay und Uruguay das Abkommen ratifiziert und
  die EU mit der Übermittlung einer Verbalnote an den MERCOSUR die vorläufige Anwendung
  bestätigt. Die Bundesregierung begrüßt die vorläufige Anwendung des Abkommens. So
  könne die Wirtschaft auf beiden Seiten früher davon profitieren. EU -Kommissionspräsiden
  tin Ursula von der Leyen bezeichnete die vorläufige Anwendung als eine gute Nachricht
  „für EU -Unternehmen jeder Größe, für unsere Verbraucher und für unsere Landwirte,
  die wertvolle neue Exportmöglichkeiten erhalten und gleichzeitig in sensiblen Sektoren
  umfassend geschützt sind.“ Die Europäische Union und die MERCOSUR -Staaten Argentinien,
  Brasilien, Paraguay und Uruguay hatten am 17. Januar ein Partnerschaftsabkommen
  und ein Interims-Handelsabkommen unterzeichnet. EU -Kommissionspräsidentin Ursula
  von der Leyen war dazu nach Paraguay gereist. Bundeskanzler Friedrich Merz hatte
  die Einigung zum EU - MERCOSUR -Abkommen im Januar als „Meilenstein in der europäischen
  Handelspolitik und ein wichtiges Signal unserer strategischen Souveränität und Handlungsfähigkeit“
  hervorgehoben . Das Abkommen stärke die Wirtschaft und die Handelsbeziehungen mit
  den Partnern in Südamerika – „das ist gut für Deutschland und für Europa“. Die 25
  Jahre Verhandlungen bezeichnete Kanzler Merz jedoch als „zu lang“. Es komme darauf
  an, die nächsten Freihandelsabkommen zügiger abzuschließen. Die Gespräche über ein
  Abkommen hatten bereits 1999 begonnen. In einer Zeit globaler Umbrüche steht das
  MERCOSUR -Partnerschaftsabkommen als Zeichen für regelbasierte internationale Zusammenarbeit. Kern
  des Abkommens ist der Handelsteil, der durch den Abbau von Zöllen und weniger Handelshemmnisse
  neue Impulse für Wachstum, Innovation und Beschäftigung setzen soll. Bereits jetzt
  unterstützt der Handel mit MERCOSUR mehr als 600.000 Arbeitsplätze in der Europäischen
  Union. Das Abkommen schafft eine der weltweit größten Freihandelszonen mit über
  700 Millionen Einwohnerinnen und Einwohnern. Durch die Abschaffung der hohen MERCOSUR
  -Zölle könnten EU -Exporteure jährlich mehr als vier Milliarden Euro an Zöllen einsparen.
  Gleichzeitig werden die strengen EU -Vorschriften für die Lebensmittelsicherheit
  sowie die Gesundheit von Menschen, Tieren und Pflanzen beibehalten. Darüber hinaus
  trägt das Abkommen zu resilienteren und diversifizierten Lieferketten bei. Unternehmen
  aus der EU , insbesondere der exportorientierte deutsche Mittelstand, erhalten einen
  besseren Zugang zu einem bislang noch vergleichsweise wenig erschlossenen Markt
  in Südamerika mit über 260 Millionen Menschen. Als zentrale gemeinsame Werte verankert
  das MERCOSUR -Abkommen die Achtung der demokratischen Grundsätze, der Menschenrechte,
  der Grundfreiheiten und der Grundsätze der Rechtsstaatlichkeit sowie die Nichtverbreitung
  von Massenvernichtungswaffen. Zudem verpflichten sich die Vertragsparteien zur Einhaltung
  des Pariser Klimaschutzabkommens und des UN -Übereinkommens zu Klimaänderungen.
  Die Vertragspartner verpflichten sich zudem, internationale Umwelt-, Arbeits- und
  Sozialstandards wirksam umzusetzen. Damit wird das Partnerschaftsabkommen einem
  gestiegenen Anspruch an verantwortungsvolle und nachhaltige internationale Zusammenarbeit
  gerecht. Das EU - MERCOSUR -Abkommen gliedert sich in zwei Teile: ein umfassendes
  Partnerschaftsabkommen und ein Interims-Handelsabkommen, das nun vorläufig angewendet
  werden kann. Das Interims-Handelsabkommen umfasst ausschließlich den Handelsteil
  des MERCOSUR -Abkommens und gilt als sogenanntes EU - only -Abkommen. Es soll also
  bis zum vollständigen Inkrafttreten des Partnerschaftsabkommens als eigenständiges
  Abkommen fungieren. Eine Ratifizierung durch die EU -Mitgliedstaaten ist nicht erforderlich.
  Anfang Januar hatte der Rat der Europäischen Union der Unterzeichnung und vorläufigen
  Anwendung beider Abkommen zugestimmt. Anders als das Handelsabkommen muss das Partnerschaftsabkommen
  nach der Zustimmung des Europäischen Parlaments noch von allen nationalen Parlamenten
  ratifiziert werden. Das Europäische Parlament hatte am 21. Januar beschlossen, den
  Europäischen Gerichtshof anzurufen, um die Übereinstimmung des Abkommens mit den
  EU -Verträgen zu prüfen. Aus diesem Grund tritt das Abkommen lediglich vorläufig
  in Kraft. Für die endgültige Anwendung muss das Europaparlament dem Handelsabkommen
  noch zustimmen.'
