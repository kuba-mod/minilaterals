date: '2026-05-13'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 13. Mai 2026
text: '(Vorsitzende Wefers eröffnet die Pressekonferenz und begrüßt StS Kornelius
  sowie die Sprecherinnen und Sprecher der Ministerien.) Ich habe eine Reihe von Nachrichten.
  Es ist ein Tag voller Nachrichten und voller Entscheidungen. Deswegen fangen wir
  mit den Terminen des Bundeskanzlers an, die wir heute bereits mitteilen, weil am
  Freitag hier ja keine Regierungspressekonferenz stattfinden wird. Am Montag, den
  18. Mai, wird der Bundeskanzler um 17 Uhr den neuen bulgarischen Ministerpräsidenten
  , Rumen Radev, mit militärischen Ehren im Bundeskanzleramt empfangen . Es ist der
  Antrittsbesuch von Ministerpräsident Radev. Anschließend wird es ein Gespräch zu
  Themen der bilateralen Zusammenarbeit, zu europapolitischen Themen, zur internationalen
  Sicherheitspolitik geben. Es ist eine Pressekonferenz geplant. Am Dienstag, den
  19. Mai, wird der Bundeskanzler um 10 Uhr den Bundespräsidenten der Schweiz , Guy
  Parmelin, zu dessen Antrittsbesuch im Bundeskanzleramt empfangen . Auch hierbei
  wird es Gespräche zu bilateralen Themen, europapolitischen Fragen und zur Sicherheitspolitik
  geben. Um 11 Uhr ist eine Pressekonferenz geplant. Am Mittwoch, den 20. Mai, wird
  der Bundeskanzler wie üblich um 10 Uhr eine Sitzung des Kabinetts leiten. Im Anschluss,
  ab 13 Uhr, wird Bundeskanzler Merz am eSummit des Verbandes der Elektro- und Digitalindustrie
  auf dem EUREF-Campus in Berlin teilnehmen. Er wird dort die Eröffnungsrede halten
  und anschließend an einem moderierten Gespräch teilnehmen. Am Donnerstag, den 21. Mai,
  wird der Bundeskanzler gegen 19 Uhr die Eröffnungsrede bei den German Startup Awards
  2026 im Palais am Funkturm halten. Mit dieser Preisverleihung würdigt der Bundesverband
  Deutsche Startups e. V. Gründerinnen und Gründer, Investoren, Newcomer und Impactunternehmen
  aus dem deutschen Start-up-Ökosystem und vergibt einen Sonderpreis. Dieser Termin
  ist presseöffentlich. Dann komme ich zum Kabinett , das Sie auch heute Morgen bereits
  verfolgt haben. Ich fasse trotzdem noch einmal die wichtigsten Themen zusammen.
  Ein Gesetzentwurf von besonderer Bedeutung war die Änderung des Strafgesetzbuches
  zum Schutz vor sogenannten K.-o.-Tropfen . Die Gesetzesanpassung ist ein Baustein
  des wichtigen Vorhabens der Bundesregierung, sexualisierte Gewalt und Gewalt gegen
  Frauen zu bekämpfen. Der heimliche Einsatz von K.-o.-Tropfen bei einem Sexual- oder
  auch bei einem Raubdelikt ist besonders verwerflich. Die Betroffenen werden wehrlos
  gemacht. Sie kennen die Methoden. Es kann schwerwiegende Folgen nach sich ziehen.
  Mit der Gesetzesänderung wird dieser Gefährlichkeit nun Rechnung getragen. Künftig
  gilt: Verwendet der Täter bei einem Sexual- oder Raubdelikt K.-o.-Tropfen, greift
  eine Mindestfreiheitsstrafe von fünf Jahren. ‑ Bisher griff für diese Fälle lediglich
  eine Mindestfreiheitsstrafe von drei Jahren. Damit ist jetzt auch auf diesem Gebiet
  eine stärkere Rechtsklarheit geschaffen und ein hoffentlich abschreckendes Signal
  gesetzt. Das Kabinett hat zweitens das Gebäudemodernisierungsgesetz beschlossen.
  Sie wissen, dass sich die Bundeswirtschaftsministerin und die Bundesbauministerin
  heute Morgen ausführlich dazu geäußert haben. Deshalb will ich es nur kurz wiederholen:
  Dieses Gebäudemodernisierungsgesetz ersetzt das alte Gebäudeenergiegesetz. Dieses
  ist auch als „Heizungsgesetz“ bekannt. Die Gebäudemodernisierung wird jetzt technologieoffen
  gestaltet. Sie ist praxistauglicher und einfacher. Das ist ein zentrales Vorhaben
  des Koalitionsvertrages, das über sehr viele Wochen verhandelt wurde und jetzt zur
  Umsetzung kommt. Kern ist die Entscheidung, dass die pauschale Vorgabe von mindestens
  65 Prozent erneuerbarer Energie bei der Wärmeversorgung für Neu- und Bestandsbauten
  entfällt. Beim Austausch der Heizung hat der Eigentümer nun mehr Entscheidungsfreiheit über
  die Heizungsart. Künftig können neben der Wärmepumpe, einem Fernwärmeanschluss,
  hybriden Heizungsmodellen und einer Biomasseheizung weiterhin auch Gas- und Ölheizungen
  eingebaut werden. Mit dem Gesetz wird der Wandel hin zu klimafreundlichen Heizsystemen
  gleichwohl natürlich unterstützt. Wärmepumpen erhalten weiterhin eine Förderung.
  Mit der moderaten Grüngas- oder Grünölquote sowie der Biotreppe schaffen wir auch
  Instrumente, um die Treibhausgasemissionen zu reduzieren und damit auch im Gebäudebereich
  zu den Klimazielen beizutragen. Mieter werden vor überhöhten Nebenkosten durch den
  Einbau einer unwirtschaftlichen Heizung geschützt. Das Gesetz wird im Jahr 2030
  mit Blick auf die Klimaschutzziele im Gebäudesektor evaluiert. Dann gibt es das
  Thema der umgangssprachlichen Kraftwerksstrategie: den Gesetzentwurf zur Sicherung
  der Versorgungssicherheit Strom und zur Bereitstellung neuer Kapazitäten , StromVKG.
  Das ist faktisch die Kraftwerksstrategie, die jetzt per Gesetz umgesetzt wird. Die
  Bundesregierung setzt also auch hiermit ein zentrales Thema aus dem Koalitionsvertrag
  um. Es wird der gesetzliche Rahmen für die notwendigen Investitionen in steuerbare
  Kraftwerksleistungen geschaffen. Sie wissen, dass wir für Systemstabilität in der
  Energieversorgung sorgen wollen und müssen. Das ist wichtig, weil nur so der zentrale
  Standortfaktor für die Wirtschaft, die Energiesicherheit, garantiert werden kann.
  Wir haben die Kraftwerksstrategie vor einiger Zeit angeschoben. Sie wurde mit EU-Recht
  abgeglichen. Sie wissen, dass in den nächsten zwölf Monaten Kapazitäten im Umfang
  von elf Gigawatt ausgeschrieben werden. Für einen Großteil dieser Kapazitäten ist
  ein Langzeitkriterium vorgesehen, das die besonderen Herausforderungen für das Stromsystem
  während langer Phasen schwachen Windes und schwacher Solarstromeinspeisung ‑ das
  sind die sogenannten Dunkelflauten ‑ in den Mittelpunkt stellt. Anlagen müssen über
  einen Zeitraum von mindestens zehn Stunden unterbrechungsfrei Strom bereitstellen
  können, um an dieser Ausschreibung teilnehmen zu können. Der verbleibende Teil adressiert
  ebenfalls neue Anlagen, wobei das Langzeitkriterium keine Anwendung findet. Ich
  erspare Ihnen viele Details. Sie wissen das auch schon. Es wurde wahrscheinlich
  auch heute Morgen thematisiert. Wir werden in den Jahren 2027 und 2029 zwei weitere
  Ausschreibungen auf Basis des Monitorings zur Versorgungssicherheit durchführen,
  um die Bedarfe für 2031 zu decken. Das Gesetz wird natürlich auch die Dekarbonisierungsziele
  unterstützen. Alle über das Gesetz geförderten Kraftwerke müssen ab dem Jahr 2054
  klimaneutral sein. Es gibt gern mehr Details auf Nachfrage. Ich möchte außerdem
  darauf hinweisen, dass die Bundeswirtschaftsministerin heute im Kabinett auf Wunsch
  des Kabinetts einen ausführlichen Bericht über Energiesicherheit, also die Situation
  der Versorgung mit Öl, Gas, Kerosin , gegeben hat. Die Botschaft auch hierbei ist,
  dass wir natürlich angesichts der Verknappung, die die Schließung der Straße von
  Hormus ausgelöst hat, auch in Deutschland die Weltmarktsituation spüren, dass wir
  in Deutschland dennoch kein akutes Versorgungsproblem haben. Im Gegenteil haben
  wir auch festgestellt, dass unsere Maßnahmen, die kartellrechtlich und durch die
  Missbrauchsaufsicht durchgeführt werden, wirken. Bei den Kraftstoffen haben wir
  zuletzt einen Rückgang der Preise beobachten können. Die Institute sprechen von
  einem Rückgang von 75 bis 80 Prozent. Die Monopolkommission könnte in der nächsten
  Zeit beim Tankrabatt eine Umsetzung von bis zu 90 Prozent feststellen. Das heißt,
  dass wir feststellen, dass diese Maßnahme wirkt. Auch beim Thema Kerosin können
  wir aktuell keinen Versorgungsengpass feststellen. Die Flughäfen sind laut den betroffenen
  Unternehmen ausreichend versorgt. Es ist allerdings auch hierbei ein deutlicher
  Preisanstieg zu sehen, auch mit Auswirkungen auf den Flugplan. Das ist die unternehmerische
  Entscheidung der Fluggesellschaften. Aber auch hierbei sind die Reserven für dieses
  Jahr ausreichend, um nicht zu sagen: beruhigend ausreichend. Beim Thema Gas ‑ auch
  hierum ging es in dem Vortrag der Bundeswirtschaftsministerin ‑ wird die Versorgung,
  die wir aus globalen Quellen für uns sichergestellt haben, ausreichen. Der Wegfall
  der katarischen Gasmenge wird kompensiert. Das hat zwar auch Preisauswirkungen;
  aber die Marktlage ist auch hierbei stabil. Der Bundeskanzler hat in der Kabinettssitzung
  festgestellt, dass wir kein Versorgungsproblem haben und dass wir keine Veranlassung
  sehen, einen Krisenmodus einzuschlagen. So weit geht der Bericht aus dem Kabinett.
  Bundesfinanzminister Lars Klingbeil wird am 18. und 19. Mai, also nächsten Montag
  und Dienstag, zum G7-Treffen der Finanzminister und Notenbankchefs nach Paris reisen,
  also unter französischer G7-Präsidentschaft. Natürlich ist dem Bundesfinanzminister
  gerade in der aktuellen internationalen Lage der Austausch mit seinen G7-Amtskollegen
  besonders wichtig. Dabei steht natürlich die Lage der Weltwirtschaft und des Welthandels
  im Vordergrund. Natürlich sind auch die Straße von Hormus ‑ sie war gerade schon
  Thema ‑ und all die wirtschaftlichen Auswirkungen des Irankriegs Themen für die
  G7-Finanzminister. Sie sind dies schon seit Beginn des Irankrieges und sind es weiterhin.
  Sie werden natürlich auch am Montag und Dienstag in Paris eine Rolle spielen. Ebenso
  wird die weitere Unterstützung der Ukraine eine Rolle spielen. Auch das Thema der
  finanziellen Unterstützung ist ein zentrales Thema, das die G7-Finanzminister regelmäßig
  beschäftigt. Natürlich gibt es weitere geopolitische und geoökonomische Fragen,
  die die Minister miteinander besprechen. Herr Klingbeil wird sich am Montag in Paris
  auch dazu äußern. Herr Kornelius, ich hätte eine Frage zu der 1000-Euro-Entlastungsprämie.
  Ich habe verstanden, dass die Koalition sie jetzt vom Tisch genommen hat. Diese
  Prämie war aber ja an ein Steuerberatungsgesetz angehängt. Deswegen habe ich noch
  die folgende Frage: Werden Sie trotzdem den Vermittlungsausschuss anrufen, um dieses
  Gesetz dann möglicherweise vorzutreiben, oder startet das dann im Bundestag ebenfalls
  einfach wieder bei null? Ja, Sie haben recht: Das Vorhaben der 1000-Euro-Prämie
  wird nicht weiterverfolgt. ‑ Das Gesetz ist gleichwohl, was diesen zweiten Teil
  angeht, relevant. Es wird jetzt nach einem neuen Verfahrensweg gesucht, dieses Gesetz
  auch in das notwendige Verfahren einzuspeisen und dem Bundestag zuzuleiten. Zu einem
  neuen Verfahrensweg gibt es ja eigentlich nur zwei Optionen: Man macht es einfach
  noch einmal mit erster Lesung im Bundestag, fängt neu an, oder man geht in den Vermittlungsausschuss.
  Die Variante des Vermittlungsausschusses kann ich [für das Paket] ausschließen.
  Herr Kornelius, es war auch im Nachgang der Sitzung des Koalitionsausschusses die
  Rede davon, dass der Bundeskanzler plane, jetzt zu einem Dialog mit den Sozialpartnern
  einzuladen. Vielleicht können Sie noch ein bisschen zum Termin sagen. Was wird der
  Zweck sein? Ist das nur ein loser Austausch oder vielleicht mehr? Welche Sozialpartner,
  also welche Verbände, haben Sie dabei im Blick? Ich bitte um ein bisschen Verständnis.
  Der Koalitionsausschuss hat ja gestern Abend sehr lange getagt. Er ist übrigens
  ein Parteigremium und kein Regierungsgremium. Deswegen bin ich möglicherweise auch
  nicht ganz der richtige Ansprechpartner. Ich kann Ihnen sagen, dass verabredet wurde,
  dass natürlich der Dialog auch mit den Sozialpartnern gesucht wird und weiterhin
  gesucht wird. Er findet ja bereits statt. Nicht alle Termine sind immer öffentlich
  bekannt. Aber der Dialog findet statt. Ich glaube, gestern gab es ein Treffen des
  Bundeskanzlers mit dem DGB, über das hinreichend berichtet wurde. Insofern gibt
  es auch hierbei Austausch. Die Gespräche, die jetzt verabredet werden, finden auch
  in einem Rahmen statt, der vor allem möglichst geregelt und ohne unnötigen öffentlichen
  Druck stattfinden soll. Deswegen kann ich Ihnen zu dem Prozess, der im Koalitionsausschuss
  verabredet wurde, keinen Zeitplan nennen. Termine werden jetzt intern diskutiert.
  Auch der Kreis der Beteiligten wird erst angesprochen, ehe man sich öffentlich darauf
  festlegt. Das ist ein geregeltes Verfahren, ein geordnetes Verfahren, das jetzt
  in Gang tritt. Insofern: Warten wir es ab. Der Rahmen ist gesetzt. Die Bundesregierung
  hat das Ziel und die Absicht, bis zur Sommerpause noch große Reformen auf den Weg
  zu bringen. Das Verfahren ist, wie Sie wissen, bereits seit Beginn des Jahres mit
  einem Sherpaprozess angestoßen, auch mit einem Koalitionsausschuss, der schon über
  zwei Tage dauerte. Nun wird es noch einmal aufgenommen, und auch hier werden noch
  einmal Anstrengungen unternommen, in einem geregelten Verfahren bei den großen Reformthemen,
  die Sie kennen, zu einem Ergebnis zu kommen. Vielleicht noch eine Nachfrage zu einem
  Detail, die sich an Herrn Kall richten würde: Wenn die Entlastungsprämie jetzt wegfällt
  ‑ da war ja vorgesehen, dafür die Tabaksteuer zu erhöhen ‑, freuen Sie sich jetzt
  über zusätzliches Geld, das Sie erst einmal nicht fest verplanen müssen, oder ist
  damit auch diese geplante vorgezogene Erhöhung der Tabaksteuer hinfällig? Genau,
  Sie haben Recht, das war vorgezogen in dem Sinne, dass bei der Tabaksteuer ja der
  nächste Erhöhungsschritt schon im Koalitionsvertrag angelegt war. Er war jetzt nicht
  alleine gedacht als Gegenfinanzierung für konkrete Entlastungsmaßnahmen, sondern
  wird auch einen Beitrag zur Haushaltskonsolidierung leisten. Insofern ist die Erhöhung
  der Tabaksteuer auch in den Eckwerten enthalten; in dem Katalog, mit dem wir die
  sogenannten Handlungsbedarfe festlegen. Die bisher verbleibende Lücke wurde mit
  den Eckwerten geschlossen. Damit haben wir einen verbindlichen Plan. Die Lücke wird
  jetzt in der weiteren Haushaltsaufstellung final geschlossen. Auch da ist die Tabaksteuer
  ein Instrument. Insofern wird das weiterverfolgt und der Gesetzentwurf dazu erarbeitet.
  Vielleicht insgesamt zum Thema Entlastung: Die Bundesregierung wird natürlich weiterhin
  beobachten, wie schwer die wirtschaftlichen Auswirkungen des Irankriegs sind, wie
  hart sie Menschen und Unternehmen in Deutschland treffen und welche weiteren Maßnahmen
  notwendig sind. Auch dann wird man natürlich wiederum über Gegenfinanzierung sprechen
  müssen. Insofern ist das eine Frage, die uns an der Stelle, unabhängig vom Instrument,
  sicher weiter beschäftigt. Herr Kornelius, Sie haben jetzt schon einmal angerissen,
  wie dieser Arbeitsprozess rudimentär aussehen wird. Können Sie das konkretisieren?
  Man sagt ja, man habe sich jetzt für die großen Reformvorhaben auf einen gemeinsamen
  Arbeitsprozess geeinigt. Was können wir da noch erfahren? Auch hier bitte ich um
  Verständnis, dass jetzt die Details dieses Arbeitsprozesses in dem vertraulichen
  Rahmen des Koalitionsausschusses ausgearbeitet bzw. umgesetzt werden. Es gibt das
  prinzipielle Verständnis, dass dieser Prozess nun stattfindet. Sie kennen die großen
  Themen, die diskutiert werden. Wir reden von Steuer, Arbeitsmarkt, Rente, Bürokratierückbau.
  Das sind die vier großen Sachen. Wir haben gleichzeitig den Haushalt 2027. Es gibt
  die Vereinbarung, dass der Haushalt 2027 unter Schonung der Rücklage fertiggestellt
  wird. Wir haben gleichzeitig die Zusage oder die Verabredung, dass der CO ₂ -Preis
  für das kommende Jahr stabil gehalten wird und der Prozess nun beginnt. Sie wissen
  aus dem vorherigen Prozess, dass dazu Sherpaverfahren vorgesehen waren. Ich glaube,
  man kann sagen, dass der Blick auf dieses Reformvorhaben insgesamt zeigt, dass es
  sich hier um zusammenhängende Systeme handelt, die alle entweder haushaltswirksam
  oder steuerwirksam, kostenwirksam oder einsparwirksam sind. All diese Elemente müssen
  am Ende zusammengeführt werden. Deswegen kann man sich das jetzt nicht als versäultes
  Verfahren vorstellen, sondern als ein in sich greifendes System, das am Ende zusammengeführt
  werden muss. Eine Nachfrage zur Einkommensteuerreform: Gibt es da einen konkreten
  Zeitplan? Ich kann Ihnen keinen Zeitplan mitteilen. Aber, noch einmal: Das Ziel
  ist es, bis zur Sommerpause zu einem Ergebnis zu kommen. Auch wenn das schon gefragt
  wurde, noch einmal zum genauen Ablauf, sofern Sie es sagen können: Der SPD-Fraktionschef
  und, ich glaube, auch der Unionsfraktionschef haben ja einen Brief herumgeschickt,
  in dem das geplante Verfahren noch ein bisschen genauer erläutert wird. Da heißt
  es unter anderem, dass der Bundeskanzler die Sozialpartner zu einem direkten Dialog
  mit dem Koalitionsausschuss ins Kanzleramt einlädt. Heißt das, beim nächsten Koalitionsausschuss,
  der, glaube ich, für Mitte Juni geplant ist, wird dieses Format stattfinden? Oder
  würde man möglicherweise noch vorher so ein Format machen, um dann im Koalitionsausschuss
  regulär im Juni, Mitte Juni, schon Entscheidungen zu fällen? Ich verstehe Ihr Interesse
  nach genauen Daten und Formaten, um auch die innere Spannung aufrechtzuerhalten.
  Ich kann Ihnen versichern, dass es nicht an innerer Spannung bei Ihnen fehlen wird.
  Ich kann Ihnen gleichwohl keine Termine nennen, auch nicht die Verfahren nennen.
  Das Gespräch mit den Sozialpartnern ist eine Selbstverständlichkeit im Rahmen einer
  so umfassenden Reformbemühung. Ich habe eben gesagt, dass es bereits Gespräche gab,
  zum Teil mit einzelnen Sozialpartnern, zum Teil in Dialogformen. Jetzt gab es die
  gegenseitige Versicherung, dass man dieses noch einmal systematisiert, auch in dem
  Format des Koalitionsausschusses, also mit den Teilnehmern dort. Wann und in welcher
  Teilnehmersortierung das stattfindet, das werden wir gegebenenfalls später mitteilen.
  Jetzt war ja eigentlich die Strategie, dass man über diese verschiedenen Reformen
  getrennt voneinander als Einzelmaßnahmen, sozusagen als Einzelprojekte, entscheidet.
  Jetzt klingt es eher so, dass es ein Gesamtpaket wird. Ist dieser Eindruck richtig,
  dass das jetzt eigentlich doch wieder die Idee ist? Ich kann Ihre Ausgangsprämisse
  nicht bestätigen, dass es eine Strategie gab. In dieser Stadt ist alles sofort eine
  Strategie. Ich glaube, es geht jetzt um ein pragmatisches Verfahren, wie man dieses
  große Reformvorhaben voranbringt. Sie wissen, dass es sich um komplexe Fragen handelt
  und dass die Abstimmung dieser Prozesse ‑ das habe ich eben schon einmal versucht
  zu erläutern ‑ notwendig ist, weil sie alle in Wechselwirkung zueinanderstehen.
  Deswegen wird man zu einem gewissen Zeitpunkt auch die verschiedenen Themen zusammenführen
  müssen. Der Koalitionsausschuss hat gestern den übergeordneten Rahmen gesetzt. Er
  hat sich tatsächlich noch einmal ein Bild verschafft, wo man steht. Es ist auch
  richtig festzustellen, dass die Vorarbeit für diesen Prozess schon wirklich weit
  gediehen ist, weil selbst vor dem letzten Koalitionsausschuss in der Villa Borsig
  enorme Vorarbeiten im Sherpaprozess geleistet wurden. Darauf wird das nun aufbauen
  und weitergeführt werden. Aber in exakt welchem Rahmen und in welchem Zeitkorsett
  das sein wird, das vermag ich nicht mitzuteilen. Da die Entlastungsprämie jetzt
  quasi Geschichte ist: Es war ja immer der Hintergrund, dass man die Bevölkerung
  für die Kostensteigerungen entlasten wollte, die im Zuge des Irankriegs auf die
  Bürgerinnen und Bürger zugekommen sind. Wird es denn weitere Entlastungsschritte
  an anderer Stelle geben, möglicherweise bei der Steuerreform Ende des Jahres, möglicherweise
  eine Ausweitung des Tankrabatts? Sind da Überlegungen in der Bundesregierung im
  Gange? Sie wissen, dass das Thema Energiekosten auch ein ganz zentrales Thema des
  Reformprozesses ist und die Energiekosten in Deutschland gesenkt werden müssen,
  auch um die Wettbewerbsfähigkeit aufrecht zu erhalten. Das gilt sowohl für die Industrie,
  für den Mittelstand, für die Handwerker, aber natürlich auch für die einzelnen Haushalte.
  Die Bundesregierung weiß, dass diese Aufgabe ihr nun quasi fortdauernd im Lastenbuch
  steht. Deswegen wird dieses Thema auch in diesem Reformprozess, den ich gerade beschrieben
  habe, eine Rolle spielen. In welcher Form das sein wird, kann ich Ihnen momentan
  nicht sagen. Die 1000-Euro-Entlastungen sind ja auch am Widerstand der Länder gescheitert,
  weil man offenbar vorher nicht genug miteinander geredet hat. Was ändert sich jetzt
  an diesen Absprachen, an diesen Strukturen? Dürfen wir jetzt Ihre vagen Äußerungen
  so verstehen, dass man Ankündigungen jetzt erst prüft und eint, bevor man damit
  in die Öffentlichkeit geht? Zum zweiten Teil der Frage: Das ist eine interpretatorische
  Sache. Das überlasse ich Ihrem Kommentargefühl; das haben Sie sicherlich. Zum ersten
  Teil der Frage: Bund und Länder sind in enger Abstimmung. Sie sind immer in enger
  Abstimmung. Es gab auch vor dem 1000-Euro-Paket ein Abstimmungsverfahren. Ich gehe
  jetzt nicht auf die Details ein. Aber der Koalitionsausschuss hat gestern auch dieses
  Thema abgeschlossen. Er hat es hinter sich gelassen und betreibt jetzt keine Schuldzuweisungen.
  Deswegen werde ich jetzt keine Schlüsse aus diesem Verfahren für die Zukunft ziehen.
  In der Regel ist das Abstimmungsverfahren zwischen Bund und Ländern eng, und alle
  sind sich bewusst, dass natürlich bei Mitbestimmungsgesetzen und bei Betroffenheit
  der Länder eine Absprache stattfinden muss. Herr Kornelius, nur noch einmal zum
  Verständnis: Sie haben gerade gesagt, bis zum Sommer soll alles unter Dach und Fach
  sein. Heißt das, die Zeitplanung, die gestern vereinbart wurde, geht bis dahin?
  Ich habe gesagt, dass angestrebt ist, bis zum Sommer zu einem Ergebnis zu kommen,
  unter Dach und Fach und so. Ich würde prinzipiell für eine moderate Begriffswahl
  und wenig interpretatorische Purzelbäume plädieren. In den letzten Wochen haben
  Sie festgestellt, dass manchmal die Ableitungsebene deutlich stärker in der Betrachtung
  der Probleme vertreten war als die Sachebene. Wir versuchen, es auf der Sachebene
  zu halten. Die Sachebene ist sehr, sehr detailliert. Insofern überlasse ich das
  jetzt dem Koalitionsausschuss, dort in der Sache weiterzuarbeiten. Wir werden bis
  zur Sommerpause sehen, wie weit das Verfahren ist. Ein Abschluss, wie Sie ihn in
  unserem demokratischen Prozess kennen, wird sicherlich nicht in allen Verfahren
  möglich sein; denn das muss ja dann auch in Gesetzgebung gegossen werden. Der Bundestag
  ist selbstverständlich beteiligt und wird das Verfahren mitbestimmen. Die Länder
  wurden eben erwähnt. Insofern: Lassen Sie der Demokratie ihren Lauf. Wird es wieder
  einen Herbst der Reformen geben? Das ist ein Stöckchen, das Sie mir gern hinhalten
  können. Dieser Begriff wurde nicht von mir geprägt und wird da nicht verwendet werden.
  Wenn ich aber trotzdem die Gelegenheit nutzen darf: Seit einem Jahr hat die Bundesregierung
  eine Reform nach der anderen auf den Weg gebracht. Wir können Ihnen gerne noch einmal
  unsere Bilanzzettel zuschicken. Es gibt enorm viele Sachthemen. Allein heute hat
  das Kabinett mit den K.‑o.‑Tropfen, dem Gebäudemodernisierungsgesetz und der Kraftwerkstrategie
  drei richtig große Reformvorhaben auf den Weg gebracht. Ich wünsche mir immer eine
  sachliche Beurteilung und nicht immer eine Labelisierung und manchmal auch Belustigung
  über Themen. Insofern freue ich mich heute über diesen Tag. Ganz kurz noch einmal
  nachgefragt, Herr Kornelius: Ist denn konkret vor der Sommerpause eine MPK zu den
  Reformen geplant? Über konkrete Planungen kann ich Ihnen hier nicht berichten. Das
  habe ich eben schon einmal gesagt. Wenn es nötig ist, wird das Gespräch mit den
  Ministerpräsidenten gesucht werden. Natürlich ist ein Thema wie die Steuerreform
  auch für die Länder relevant, und dann müssen die Länder einbezogen werden. In welcher
  Form das sein wird, kann ich nicht mitteilen, weil es dazu jetzt wirklich keine
  konkrete Planung gibt. Ich würde gerne noch einmal das Stichwort CO₂-Bepreisung
  ansprechen. Können Sie einmal darlegen, was jetzt dazu nötig ist, dass es 2027 keine
  Erhöhung geben wird? Vielleicht noch die Frage ans Finanzministerium, welche Auswirkungen
  das auf den Haushalt des KTF hat. Ich kann Ihnen sagen, dass der CO ₂ -Preis angesichts
  der aktuell hohen Energiepreise nicht erhöht werden soll, dass der entsprechende
  gesetzliche Mechanismus dafür ausgesetzt wird. Das wären zusätzliche Belastungen
  von etwa 2,8 Milliarden Euro für die Bürger und Bürgerinnen, aber vor allem für
  die Wirtschaft. Das wird jetzt umgesetzt. Zur Konkretisierung ‑ das weiß ich nicht ‑
  können vielleicht das Wirtschaftsministerium und das Finanzministerium etwas sagen.
  Die Federführung ist mittlerweile im BMUKN. Weil Sie mich auch gefragt haben, vielleicht
  einige Sätze für das BMF: Auch aus unserer Sicht ist es aufgrund der hohen Energiepreise
  ein ganz wichtiges Signal, den CO ₂ -Preis stabil zu halten. Das schafft auch Planungssicherheit,
  das schafft Verlässlichkeit. Zum KTF, zum Klima- und Transformationsfonds, wird
  es einen sogenannten Wirtschaftsplan geben; das ist sozusagen der Haushalt des KTF.
  Dieser Wirtschaftsplan wird genauso wie zum Beispiel der Wirtschaftsplan zum Sondervermögen
  für Infrastruktur parallel zum Bundeshaushalt von der Bundesregierung beschlossen
  werden. Dort wird das entsprechend berücksichtigt. Die genauen Kosten ‑ Herr Kornelius
  hat ja eine Zahl genannt ‑ hängen dann von diesem Preiskorridor ab und davon, wie
  weit es dort bei den Versteigerungen der Emissionszertifikate geht. Das werden wir
  entsprechend in den Wirtschaftsplan zum KTF einplanen. Dürfte ich nachfragen, dann
  wegen der technischen Umsetzung, ob das Umweltministerium dazu noch kurz etwas sagen
  kann? Ist da jetzt noch einmal ein Gesetzgebungsverfahren nötig oder wie wird das
  umgesetzt? Vielleicht ist es noch einmal wichtig zu erklären, woher wir kommen.
  Wir hätten ja für das Jahr 2027 ursprünglich die Einführung von ETS 2, also des
  Emissionshandels für Heizen und Verkehr, auf europäischer Ebene gesehen. Wenn Sie
  sich erinnern: Ende letzten Jahres wurde es auf europäischer Ebene verschoben, sodass
  ein Regelungsbedarf für das Jahr 2027 entstand. 2028 soll der ETS 2 nun laut der
  Absprachen eingeführt werden. Somit hatten wir erst einmal eine Situation, in der
  wir nicht wussten, welcher CO ₂ -Preis für 2027 gilt. Dieser Regelungsbedarf ist
  jetzt geheilt. Wir haben also festgelegt, dass der CO ₂ -Preis, der in diesem Jahr
  gilt, auch im nächsten Jahr wieder gilt. Das ist eine gute Nachricht. Denn das Instrument
  wirkt ja einerseits in die Richtung, dass es ein Preissignal für fossile Brennstoffe
  geben soll. Da haben wir gerade schon gehört, das ist angesichts der hohen Energiepreise
  derzeit nicht nötig. Aber gleichzeitig werden hier auch die Einnahmen genutzt, um
  erneuerbare Energien und Technologien, die der Klimaneutralität dienen, zu fördern
  ‑ und das ist eben weiterhin abgesichert. Das meinen wir, wenn wir von Planungssicherheit
  und Verlässlichkeit sprechen. Zu Ihrer zweiten Frage: Ja, es muss jetzt hier das
  entsprechende Gesetz, das Brennstoffemissionshandelsgesetz, angepasst werden, und
  daran machen wir uns jetzt. Wir haben jetzt den Auftrag vom Koalitionsausschuss
  bekommen. Auf jeden Fall ist das eine gute Nachricht, weil der Regelungsbedarf,
  der gewesen ist, jetzt gedeckt ist. Sie hatten auch nach der Auswirkung auf den
  KTF gefragt. Klar, das bedeutet geringere Einnahmen, aber die genaue Höhe ‑ ich
  habe jetzt einen Korridorwert genannt ‑ muss im Zuge des Haushaltsplanaufstellungsverfahrens
  bestimmt werden. Das wird in der nächsten Woche geschehen. Daran noch einmal anknüpfend,
  auch wenn Sie sagen, Sie können die genaue Höhe jetzt noch nicht nennen: Wenn das
  auf den KTF durchschlägt, bedeutet das dann auch, dass es Konsequenzen für das Geld
  haben wird, das für das Klimaschutzprogramm zur Verfügung gestellt wurde? Also könnte
  sich das dahin auswirken, dass dafür jetzt weniger Geld zur Verfügung steht? Das
  ist jetzt so eine konjunktivische Frage. Ich würde sie ehrlicherweise nicht gerne
  beantworten, weil der KTF deutlich größer ist und wir die genaue Verteilung, die
  aus dem KTF vorgenommen wird, dann in dem Verfahren bestimmen. Eine direkte Wenn-dann-Konsequenz
  sehe ich da momentan also nicht. Eine Frage an das Bundeswirtschaftsministerium:
  Trotz der beruhigenden Nachrichten von Herrn Kornelius gerade zur Kerosinversorgung
  fordern immer noch Flugverkehrsverbände, dass auf Bundesebene und auf europäischer
  Ebene ein Krisenplan entwickelt wird. In den Sommerferien wird die Zahl der Flüge
  steigen, und die Situation im Iran und in der Straße von Hormus sind immer noch
  nicht gelöst. Befürchtet man für die Flüge einen Versorgungsengpass bei der Kerosinversorgung
  und dass dieser zulasten der Reisenden bzw. Bürger geht? Plant das Bundeswirtschaftsministerium
  irgendwelche Maßnahmen, um diese möglichen Engpässe zu vermeiden? Ja, Sie sprechen
  einen Krisenplan an. Ich denke, wir haben hier in den letzten Wochen klargemacht,
  dass wir diese Krise sehr aktiv managen und beobachten. Ende April gab es bezüglich
  des konkreten Themas Kerosin einen Austausch mit allen beteiligten Stakeholdern
  im Ministerium, also mit der Mineralölwirtschaft und den Luftverkehrsunternehmen.
  Herr Kornelius hat ja gerade die Lage dargestellt. Es gibt keine Versorgungsengpässe
  in Deutschland. Wir sehen die Preiseffekte aufgrund der Knappheiten, die auf den
  globalen Märkten entstanden sind. Gleichzeitig sind alle Flughäfen mit Kerosin versorgt.
  Wir haben durch die Raffineriestruktur in Deutschland ‑ die Ministerin war ja gerade
  bei der Raffinerie der PCK Schwedt zu Besuch ‑ einen großen Anteil an Eigenversorgung
  mit Kerosin. Insofern beobachten wir das weiter sehr genau. Konkrete Maßnahmen sind
  zurzeit nicht geplant. Der Bundesrat hat der Bundesregierung am Freitag aufgegeben,
  eine Strategie zu entwickeln, damit die Gasspeicher für den Winter angemessen gefüllt
  werden. Was plant die Bundesregierung denn dazu? Zu den Gasspeichern haben wir uns
  in den vergangenen Wochen, auch die Ministerin, immer wieder geäußert. Wir setzen
  auf eine marktliche Befüllung der Gasspeicher und betonen gleichzeitig: Die Gasspeicher
  haben nicht die Rolle, die sie vor drei, vier Jahren hatten. Es ist also weiter
  eine Befüllung der Gasspeicher geplant. Das soll durch die Unternehmen erfolgen
  und nicht auf Maßnahmen der Bundesregierung hin. Gleichzeitig sehen wir durch den
  Aufbau der LNG-Infrastruktur, der LNG-Terminals, dass wir unsere Winterversorgungssicherheit
  nicht alleine durch die Gasspeicher decken müssen. Der Bundesrat sieht das ja offenbar
  anders. Was machen Sie denn mit dem Auftrag? Heften Sie den einfach ab oder was
  passiert damit? Ich muss sagen, dass ich die konkrete Form dieses Auftrags nicht
  kenne. Davon wird dann auch die Reaktion der Bundesregierung abhängen, ob es da
  zu einer Gegenäußerung kommt oder ob darauf anderweitig reagiert wird. Das kann
  ich gerade nicht beantworten. Vielleicht darf ich ergänzen, dass der Bundesrat oder
  die Länder intensiv mit dem Bund in Kontakt stehen, sowohl über die Strukturen,
  die das BMWE hat, als auch über direkte Kontakte. Es gab auch bei der letzten Sitzung
  des Nationalen Sicherheitsrates die Beteiligung der Länder, auch exakt wegen dieser
  Frage. Insofern ist da ein reger Austausch im Geiste einer guten Kooperation, wie
  wir es hier kennen. Deswegen, glaube ich, werden da auch die Fragen beantwortet.
  Ich darf außerdem darauf hinweisen, dass wir die Preisentwicklung auf dem Gasmarkt
  genau beobachten. Wir sehen dort sehr positive Entwicklungen. An das Wirtschaftsministerium:
  Es gibt Berichte, wonach die SEFE 2023, nachdem Russland Gaslieferungen blockiert
  hatte, aktiv in Verhandlungen getreten sei, damit wieder LNG nach Deutschland habe
  geliefert werden können. Das sind Gaslieferungen, die weiterhin laufen und dem Kreml
  auch Geld bringen. Inwiefern war das Wirtschaftsministerium darin eingebunden? Welche
  Konsequenzen hat man möglicherweise gezogen, sollte man nicht eingebunden gewesen
  sein? Die Berichterstattung haben wir natürlich zur Kenntnis genommen. Sie wissen,
  dass die SEFE ein privatwirtschaftlich organisiertes Unternehmen ist und ihre Geschäfte
  grundsätzlich eigenständig und eigenverantwortlich führt. Dementsprechend sind wir
  nicht in alle Gespräche, die das Unternehmen führt, eingebunden. Als Gesellschafterin
  haben wir dennoch einen Überblick über die Aktivitäten. Zu dem maßgeblichen Zeitpunkt
  waren Lieferungen von russischem Gas nicht sanktioniert, sondern die Russische Föderation
  hatte Sanktionen gegen die SEFE als Nachfolgerin der Gazprom Germania erlassen,
  um die ins Eigentum des Bundes übergegangene SEFE gezielt zu treffen. Die Lieferungen
  wurden später wieder aufgenommen. Aber Sie wissen, dass mittlerweile im 19. Sanktionspaket
  gegen Russland und in der REPowerEU-Verordnung ein Einfuhrverbot für russisches
  LNG ab 2027 erreicht wurde. Das ist etwas, wofür sich die Bundesregierung immer
  eingesetzt hat und was sie begrüßt. Herr Wentzel, Sie sagen selbst, dass Russland
  die Gaslieferungen boykottiert hat. Dann hat man sich aus Deutschland aktiv darum
  bemüht, dass sie wieder aufgenommen werden. Das waren ja nicht irgendwelche Gespräche,
  sondern das war gerade nach dem Beginn des russischen Angriffs. Wie sehr war das
  BMWE darin eingebunden, und warum hat man es nicht einfach bei dem Boykott, der
  ja von russischer Seite ausgesprochen worden war, belassen? Wie gesagt, war das
  BMWE in einzelne Gespräche nicht eingebunden, sondern die SEFE hat sich offensichtlich
  um die Einhaltung der von ihr geschlossenen Verträge bemüht. Aber die Details müssen
  Sie bei der SEFE erfragen. Zum Ausfall der Lieferungen aus Katar , die vorher erwähnt
  wurden: Sind Schadenersatzforderungen im Gespräch? Für wann rechnet man mit der
  Aufnahme der weiteren Lieferungen? Mit welchen Maßnahmen wurden sie jetzt ersetzt?
  Am Ende sind es ja die Energieversorgungsunternehmen, die die Lieferungen sicherstellen
  und sich am Weltmarkt versorgen. Wir haben in den letzten Wochen auch immer wieder
  dargestellt, dass wir Pipelinegas aus Norwegen und dass wir LNG-Gas haben, das eben
  an einem globalen, sehr flüssigen Markt bezogen werden kann. Schadensersatzforderungen
  wären daher Sache der Unternehmen. Am Ende hängt alles davon ab, wie sich die Situation
  in der Straße von Hormus in den nächsten Wochen entwickelt. Es stand ja einmal in
  Aussicht, dass es auch Kerosinlieferungen aus Israel geben sollte. Wie ist diesbezüglich
  der aktuelle Stand? War das vielleicht auch Thema des Berichtes der Ministerin heute
  im Kabinett? Sind diese Lieferungen weiterhin aktuell, oder werden sie angesichts
  der gesicherten Versorgungslage vielleicht gar nicht mehr benötigt? Auch dafür gilt
  das, was ich eben gesagt habe. Grundsätzlich ist es erst einmal Sache der Unternehmen,
  wie sie sich mit internationalen Lieferverträgen versorgen. In der Tat haben wir
  als Bundeswirtschaftsministerium es aber flankiert, dass die Unternehmen Gespräche
  mit Israel führen. Mir wäre nicht bekannt, dass das jetzt wieder vom Tisch wäre.
  Herr Wentzel, Südostasien ist von der Blockade der Straße von Hormus besonders betroffen.
  Inwieweit gibt es Absprachen und Sicherheiten, dass die Flugzeuge, die von Deutschland
  aus irgendwohin in die Welt fliegen, dann dort vor Ort betankt werden und wieder
  zurückfliegen können? Über die Energieversorgung in anderen Ländern kann die Bundesregierung
  natürlich nur bedingt entscheiden. Das ist aber etwas, wozu zum Beispiel im Rahmen
  der Internationalen Energieagentur Absprachen stattfinden. Sie haben zum Beispiel
  die gemeinsame Freigabe aus den Ölreserven zu Beginn des Krieges mitbekommen. Ansonsten
  ist es an den Fluggesellschaften, darauf zu achten, dass sie sich vor Ort versorgen
  können. Ich habe eine Frage zum Gebäudemodernisierungsgesetz , und zwar an das Umwelt-
  und Klimaministerium. Was hat den Umwelt- und Klimaminister dazu bewogen, doch zuzustimmen,
  obwohl er wegen eines möglichen weiteren Betriebs von Heizungen über das Jahr 2044
  hinaus mit fossilen Brennstoffen offenbar Bedenken hatte? Der Bundesumweltminister
  hat in den Verhandlungen sehr deutlich gemacht, dass es ihm wichtig ist, dass im
  Gebäudemodernisierungsgesetz auch ein Bezug zum Klimaschutzgesetz gezogen wird,
  um sicherzustellen, dass Deutschland 2045 in allen Bereichen klimaneutral wird.
  Das haben wir nun geschafft. Das gilt also auch für alle Heizungssysteme. In dem
  Gesetz ist sichergestellt, dass 2030 quasi ein Checkpoint eingerichtet wird, dass
  man also eine Evaluation vornimmt, um zu schauen, ob wir auf dem richtigen Weg sind,
  um eventuell noch nachzusteuern. Aber das Wichtigste ist, dass man für die nächsten
  Jahre Klarheit hat. Es wird deutlich, auch angesichts dessen , was rundum passiert,
  dass die klimafreundliche Lösung auch die günstigste Lösung sein wird. Insofern
  müssen wir ein bisschen schauen, wie sich die Realität entwickelt. Wir erleben seit
  2019 hohe Verkaufszahlen bei Wärmepumpen. Auch immer mehr E-Autos werden verkauft.
  Wir erleben also gerade, dass sich Deutschland auf die Klimaneutralität zubewegt.
  Trotz allem haben wir natürlich Wert darauf gelegt, dass die Verbindung zwischen
  Klimaschutzgesetz und Gebäudemodernisierungsgesetz festgelegt ist. Aufgrund dessen
  konnte der Minister zustimmen. Wurde während der Kabinettssitzung darüber gesprochen,
  ob die Klimaziele auf diese Weise erreichbar sind oder ob sie eventuell verschoben
  werden? Nein, dieses Thema hat sich nicht gestellt, weil sie, wie der Kollege ausgeführt
  hat, erreicht werden und weil diese Thematik in den Vorgesprächen, in den durchaus
  anspruchsvollen Verhandlungen, die zu dem Gesetz geführt haben, befriedigend beantwortet
  wurde. Dies vielleicht noch zur Ergänzung: Das Gebäudemodernisierungsgesetz ist
  ein Bestandteil neben vielen anderen Regelungen im Baubereich, die vorgenommen worden
  sind, um sich auf die Klimaneutralität 2045 einzustellen. Ich würde dafür werben,
  das im Gesamtkontext zu sehen. Es gibt ein Zusammenspiel verschiedener Regelungen.
  Im Laufe des Jahres müssen wir mit dem Umweltbundesamt schauen, wie die Prognosen
  für 2027 sind und ob die Klimawirkung erreicht werden kann, wenn das Gesetz gilt,
  auch im Zusammenspiel mit allen anderen Dingen, die wir tun, und den Dingen, die
  in der Realität passieren. Dazu vielleicht der Hinweis in Bezug auf Klimawirkung:
  Wir kommen jetzt in ein geregeltes Verfahren der Evaluation ‑ das kennen Sie aus
  dem Klimaschutzgesetz ‑, in dem wir schauen, was im vergangenen Jahr war und was
  im kommenden Jahr möglich ist, wo wir dabei stehen und wo es eventuell Nachsteuerungsbedarf
  gibt. Jetzt haben wir einen zusätzlichen Checkpoint 2030. Herr Kornelius, können
  Sie noch etwas zum Zeitplan sagen? Bis wann sollte das Heizungsgesetz nach den Vorstellungen
  der Bundesregierung in Kraft gesetzt sein? Ziel ist die Verabschiedung bis zur Sommerpause.
  Meine Frage richtet sich an das Umweltministerium, das Bauministerium und das Wirtschaftsministerium.
  Wichtige Klimamodelle wurden kürzlich vom IPCC zurückgezogen, darunter auch die
  Modellgruppe RCP8.5 , die von einer extremen Annahme für die Klimaentwicklung ausging.
  Inwieweit haben Ihre Ministerien dies zur Kenntnis genommen, und welche Auswirkungen
  hat das auf bisherige politische Entscheidungen und bereits in der Planung befindliche
  Gesetzentwürfe? Mit Blick auf die Uhr würde ich die Ministerien bitten, ob sie sich
  zu dieser sehr breit gefassten Frage vielleicht ein bisschen kurzfassen könnten.
  Die Antwort würde ich aufgrund der Federführung ohnehin beim BMUKN sehen. Ich möchte
  auf das Gebäudemodernisierungsgesetz verweisen. Dort steht ganz vorn, auf der ersten
  Seite: Die Klimagesetze gelten weiterhin und damit eben auch die Klimaziele. ‑ Insofern
  gibt es für uns erst einmal keinen Bedarf, das anzupassen. Wie auch Herr Kornelius
  schon gesagt hat, stand das Ziel der Klimaneutralität 2045 jetzt nicht zur Debatte.
  Vielmehr wird es durch die neue Gesetzeslage jetzt noch bekräftigt. Wurden die Klimamodelle,
  die jetzt zurückgezogen wurden, beim Gebäudemodernisierungsgesetz konkret berücksichtigt,
  und kann es sein, dass es daran rückwirkend noch Veränderungen gibt? Diese Klimamodelle
  nutzt man nicht für ein einzelnes Gesetz. Es geht ja immer sozusagen um die Gesamtausrichtung,
  die langfristige Ausrichtung, die man vornehmen muss. Dabei werden verschiedene
  Dinge eine Rolle spielen. Ob nun genau dieses Modell quasi der Gamechanger gewesen
  ist, sodass man nun alles ändern müsste, davon ist mir nichts bekannt. Mir ist klar
  ‑ das ist etwas, was wir immer sehen können ‑, dass es nicht nur um Klimaschutz
  geht, sondern auch um eine industriepolitische Entscheidung, die wir in Deutschland
  erleben, dass uns erneuerbare Energien und auch Umwelttechnologien auf die Klimaneutralität
  vorbereiten, aber gleichzeitig auch neue Geschäftsmodelle und eine andere Wirtschaftsform
  ermöglichen, die zukunftsfest ist und uns von fossilen Brennstoffen unabhängig macht.
  Das ist, denke ich, im aktuellen Kontext das Ausschlaggebende. Ich habe eine Frage
  im Nachgang des Kanadabesuchs des Finanzministers. Der Minister wurde bei seinen
  Gesprächen in Kanada auch mit dem Wunsch konfrontiert, dass Kanada der EU beitreten
  wolle. Kanada ist ein sehr enger Partner. Das hat bei dem Besuch eine große Rolle
  gespielt, war auch ein Grund für den Besuch, war Grund, weiter über diese Partnerschaft
  zu sprechen. Im Rahmen dieser Partnerschaft auch mit der Europäischen Union wurde
  der kanadische Finanzminister zum Beispiel schon zu Treffen des ECOFIN-Rates, also
  der Finanzministerinnen und Finanzminister der EU-Mitgliedsstaaten, eingeladen,
  was sporadisch auch weiterhin passiert. Darüber entscheidet die jeweilige Ratspräsidentschaft.
  Darüber wurde gesprochen. Ansonsten ist das vielleicht eine Frage für das Auswärtige
  Amt, darüber möchte ich gar nicht weiter spekulieren. Aber es gibt eine sehr enge
  Partnerschaft, und sie zeigt sich eben an solchen Punkten wie beim ECOFIN. Herr
  Kornelius, Finnlands Präsident unterstützt das Vorhaben. Wie steht die Bundesregierung
  zu einem EU-Beitritt Kanadas? Ein Beitritt Kanadas hat momentan nicht die oberste
  Priorität. Die Europäische Union und Kanada pflegen ein enorm enges Verhältnis.
  Kanada ist NATO-Mitglied. Kanada ist in viele transatlantische Beziehungen eingebunden.
  Wir haben durch das Freihandelsabkommen eine große Bandbreite an Optionen der Kooperation
  miteinander geschaffen. Auf diesem Weg werden wir weitergehen. Meine Frage richtet
  sich an das Bundesinnenministerium. Nächste Woche findet der Sudetendeutsche Tag
  zum ersten Mal in Tschechien statt, und zwar in Brünn. Bundesminister Dobrindt hat
  seine Teilnahme schon bestätigt. Aber inzwischen wird in Tschechien eine sehr hitzige
  Debatte geführt. Der tschechische Außenminister hat der „Frankfurter Allgemeinen
  Zeitung“ gesagt, Herr Dobrindt werde in Brünn keine gute Zeit haben. Wie beurteilen
  Sie diese Aussage? Plant der Bundesminister trotzdem, nach Brünn zu fahren und dort
  eine gute Zeit zu haben? Die Aussage des tschechischen Außenministers werde ich
  von hier aus nicht bewerten. Das wäre, denke ich, nicht meine Aufgabe. Die Teilnahme
  des Herrn Innenministers Dobrindt in Brünn am Sudetendeutschen Tag ist weiterhin
  geplant. Ich habe eine Frage zur Reise des Finanzministers nach Kanada, vielleicht
  auch mit Bezug auf das Bundesverteidigungsministerium: Wird ein Thema der Gespräche
  in Kanada auch die Involvierung ‑ ‑ ‑ Nein, Kanada ist schon vorbei. Er fährt jetzt
  nach Paris. Ja, aber ich habe mich schon davor gemeldet. Das ist eine ganz kurze
  Frage. ‑ Wird die Involvierung Kanadas in das gemeinsame Projekt Deutschlands und
  Norwegens hinsichtlich des Tarn-U-Bootes vom Typ 212CD ein Thema der Gespräche sein?
  Geht es jetzt noch um die Reise des Finanzministers? Das gemeinsame U-Boot-Projekt
  zwischen Deutschland und Norwegen und das Angebot gegenüber Kanada, das schon auf
  der Reise des Bundesverteidigungsministers nach Kanada eine große Rolle gespielt
  hat, haben auch bei der Reise des Bundesfinanzministers nach Kanada eine Rolle gespielt.
  Der Bundesfinanzminister hat darüber gesprochen, dass das in seinen Gesprächen sowohl
  mit dem kanadischen Finanzminister als auch mit dem kanadischen Premierminister
  ein Thema war. Sie mögen vielleicht noch einmal auf die Äußerungen während der Reise
  schauen. Inhaltlich wäre das Sache des BMVg. Ich habe eine Frage an das Verteidigungsministerium,
  und zwar zu dem Zerstörer , der an der Ostseeküste Position bezogen hat. Wie bewerten
  Sie das, Herr Müller? Ist das so vom Seerecht gedeckt? Die Antwort auf die zweite
  Frage vorweg: Ja, wir sehen aktuell keine Indikation dafür, dass das nicht vom Seerecht
  gedeckt wäre. Zur Gesamteinschätzung: Das ist nichts Ungewöhnliches. Wir sehen seit
  geraumer Zeit eine zunehmende Präsenz der russischen Seestreitkräfte in diesem Bereich,
  vor allem im Bereich der Ostsee. Möglicherweise ist es auch eine Reaktion auf die
  gestiegene NATO-Präsenz in der Region. Sie wissen, dass die NATO nach den hybriden
  Vorfällen in der Ostsee die Aktivität Baltic Sentry aufgebaut hat, maßgeblich durch
  Deutschland unterstützt, auch das CTF Baltic, das Hauptquartier, das wir betreiben
  bzw. wozu wir einen Stab einsetzen. Wir bauen unser Lagebild auf, und wir tauschen
  uns mit den Partnern aus. Seitdem wir diese Aktivität durchführen, haben wir keine
  diesbezüglichen hybriden Vorfälle mehr erlebt. Wie ich gesagt habe, erleben wir
  an strategischen Punkten in der Ostsee eine zunehmende Präsenz mit Zerstörern, mit
  Fregatten, mit Korvetten. Möglicherweise besteht auch ein Zusammenhang mit der russlandseitigen
  Überwachung der Schattenflotte. Aber aktuell sehen wir nur Normverhalten. Wir sind
  dort also nicht beunruhigt. Wir haben dort natürlich Fühlung; so will ich es in
  der Marinesprache sagen. Die NATO ist in diesem Gebiet, was die Aufklärung und die
  Lagebilderstellung angeht, natürlich immer dabei. Wir haben die SNMG1, also die
  Standing NATO Maritime Group eins, die in der Ostsee operiert. Wir haben dort ein
  deutsches Flaggschiff in der Führungsfunktion. Natürlich werden wir uns mit diesen
  Verbänden ganz genau anschauen, was dort in der Ostsee passiert. Das ist unsere
  Aufgabe und die Aufgabe der Verbündeten. Natürlich erfolgt auch ein ressortübergreifender
  Austausch. Die Bundespolizei See ist maßgeblich beteiligt, wenn es um die deutschen
  Territorialgewässer und die ausschließliche Wirtschaftszone geht. Das sind die Punkte,
  die ich zu dem Thema aktuell darstellen kann. Ich möchte noch zum Stichwort der
  Schattenflotte nachfragen. Heißt das, dass Sie schon einen möglichen oder direkten
  Zusammenhang sehen? Möglicherweise geht es um den Schutz der Schattenflotte, wenn
  immer größere russische Kriegsschiffe auch in der Ostsee Position beziehen? Eine
  direkte Korrelation oder den Auftrag dieser Schiffe kann ich nicht bestätigen. Aber
  wir wissen ja, dass Schiffe dieser Schattenflotte dort operieren. Der Zusammenhang
  ist natürlich naheliegend, dass die russische Seite auch dort Kräfte positioniert,
  um auch selbst ein eigenes Lagebild über die Situation in der Ostsee zu haben. Meine
  Frage geht an das Wirtschaftsministerium. Wir haben gestern von Ihrem Ministerium
  gelesen, dass derzeit Gespräch mit den Inhabern von KNDS über einen möglichen Bundeseinstieg
  liefen. Medienberichten zufolge planen die Inhaber schon in den nächsten Wochen
  oder in ein bis zwei Monaten einen Börsengang. Können Sie eine Frist oder einen
  Zeithorizont für das Ende dieser Gespräche nennen? Das Unternehmen KNDS hat für
  die Sicherheitsinteressen Deutschlands große Bedeutung. Mit Blick auf den geplanten
  Börsengang, den Sie erwähnten, prüft die Bundesregierung einen möglichen Bundeseinstieg.
  Jetzt laufen die Gespräche, und so, wie wir das von dieser Stelle aus ja meistens
  sagen, kann ich leider keinen konkreteren Zeitplan und keine Fristen nennen. Will
  das Bundesverteidigungsministerium vielleicht etwas zur Wichtigkeit oder Dringlichkeit
  dieser Gespräche für die Bundesregierung sagen? Mein Kollege hat alles gesagt. Wir
  haben auch hier an dieser Stelle schon bestätigt, dass Sicherheitsinteressen natürlich
  berührt sind. Darüber hinaus wurde alles gesagt. Herr Kornelius, am Montagabend
  gab es einen Bericht in der „WELT“, laut dem Brüsseler Diplomaten den Auftritt von
  Merz in der Schule in Marsberg als dumm und unbegreiflich bezeichnet und auch von
  einem Merzfaktor bei der Entscheidung von Trump, keine Tomahawk-Raketen nach Deutschland
  zu verlegen, gesprochen hätten. Wie bewertet die Bundesregierung diese Aussagen,
  und wie beurteilen Sie den aktuellen Stand der transatlantischen Beziehungen ? Die
  Bundesregierung bewertet auf anonymen Quellen basierende Zeitungsberichte prinzipiell
  nicht. Die deutsch-amerikanischen Beziehungen sind sehr gut, sind sehr konstruktiv.
  Es finden auf allen Ebenen Gespräche statt. Insofern habe ich diesem Bericht nichts
  hinzuzufügen. Herr Kaminski, heute Morgen gab es Presseberichte darüber, dass sich
  der Verfassungsschutzfür einen französischen Anbieter und nicht mehr für Palantir
  entschieden hat . Können Sie das bestätigen? Ist das eine Tendenz, die auch in anderen
  untergeordneten Behörden so ist? Wird also Abschied von den Gedanken genommen, dass
  man Palantir auf Bundesebene einführt? Ganz grundsätzlich kann ich Ihnen dazu sagen,
  dass Anfang des Jahres im Rahmen des Bund-Länder-Programms P20 ‑ das ist ein Programm,
  mit dem Polizeien von Bund und Länder sowie Sicherheitsbehörden gemeinsam die Datenstruktur
  und die Digitalisierung vorantreiben wollen ‑ beschlossen wurde, dass es einen Aufbau
  von Fähigkeiten für Auswertung und Analyse im Rahmen eines modularen und hybriden
  Ansatzes geben soll. Diese Fähigkeiten sollen aus einer Kombination von Komponenten
  bestehen: einzelne Module, also Bestandsprodukte, Eigenentwicklungen und auch marktverfügbare
  Kaufprodukte, also etwas, das man hinzukaufen kann. Die weitere Ausgestaltung dessen
  befindet sich gerade im fachlichen Prüfungsprozess. Wenn ich das richtig verstanden
  habe, wird also nicht zu 100 Prozent Palantir gekauft, aber möglicherweise zu einem
  Teil. Das ist eine technologieoffene Frage. Es gibt keinen Fokus auf einen bestimmten
  Hersteller oder Ähnliches. Ich würde gerne noch einmal nachfragen. Die Frage, ob
  Software von ChapsVision jetzt für das Bundesamt für Verfassungsschutz gekauft wurde,
  haben Sie bislang, glaube ich, nicht beantwortet. Deswegen noch einmal konkret gefragt:
  Trifft es zu, dass diese Software eingekauft wurde? Da würde ich um Verständnis
  dafür bitten, dass sich das Bundesamt für Verfassungsschutz zu Angelegenheiten,
  die konkrete nachrichtendienstliche Erkenntnisse oder Tätigkeiten betreffen, nicht
  äußern kann. Das könnte ein Sicherheitsproblem sein, weil das Rückschlüsse auf die
  Arbeitsweise des BfV zulassen würde. Soll denn noch Software anderer Anbieter gekauft
  werden, auch für andere Sicherheitsbehörden, oder ist man vielleicht auch mit Blick
  auf das Bundesamt für Verfassungsschutz mit dem Angebot, das man jetzt hat und das
  Sie ja nicht kommentieren möchten, ausreichend versorgt? Wie ich gerade schon gesagt
  hatte bzw. dem Kollegen gesagt hatte, befindet sich die weitere Ausgestaltung dieser
  Komponentenzusammensetzung der einzelnen Module, wozu halt auch das Hinzukaufen
  von Produkten gehört, gerade in der fachlichen Prüfung. Laut Recherchen der „New
  York Times“ gibt es Hinweise auf Misshandlungen, Folter und systematische sexuelle
  Gewalt gegen palästinensische Inhaftierte in israelischen Haftanstalten . Hierzu
  wollte ich fragen, wie die Bundesregierung diese Berichte von Folter und systematischer
  sexueller Gewalt gegen Palästinenser in israelischen Gefängnissen bewertet. Wir
  haben diese Berichte natürlich zur Kenntnis genommen. Ganz grundsätzlich dazu: Die
  Bundesregierung verurteilt sexualisierte Gewalt natürlich in allen Kontexten. Zu
  den genannten Fällen liegen uns keine eigenen Erkenntnisse vor. Was ganz, ganz wichtig
  ist, ist, dass diesen Vorwürfen jetzt nachgegangen wird und dass die Täter auch
  zur Rechenschaft gezogen werden. Die Recherchen decken sich ja mit UN-Berichten
  aus der Vergangenheit. Würde die Bundesregierung unterstützen, dass unabhängige
  Stellen Zugang zu den Gefängnissen in Israel bekommen, um dies zu untersuchen? Das
  ist eine Politik, die die Bundesregierung schon seit langer Zeit verfolgt. Wir setzen
  uns dafür ein, dass das Internationale Komitee vom Roten Kreuz Zugang zu palästinensischen
  Gefangenen erhält. Das ist eine Politik der Bundesregierung, die wir seit langer
  Zeit verfolgen. Herr Kornelius, Gewerkschafterinnen und Gewerkschafter kennen am
  besten die Sorgen Ihrer Mitglieder, ob im Handels-, Bildungs- oder Migrationsbereich.
  Wenn der Kanzler beim DGB in seiner Rede die Delegierten mit Wörtern wie Demografie
  und Mathematik einschulen und die Reform geradezu quasi übersetzen muss, dann braucht
  man keine Glaskugel, um zu wissen, wie die Reaktionen der Gewerkschafterinnen und
  Gewerkschafter sein werden. War der Kanzler nicht gebrieft, was es bedeutet, vor
  Gewerkschafterinnen und Gewerkschafter mit dieser Betriebstemperatur aufzutreten,
  oder lässt er sich grundsätzlich nicht beraten? Meine Frage bezieht sich auch ein
  bisschen auf Ihre Aufgabe als sein Medienberater, weil es ja schon oft missliche
  Reaktionen in Bezug auf seine Reden gab. Ich streiche jetzt einmal den kommentierenden
  Teil Ihrer Frage, versuche, sie sachlich zu beantworten, und würde Sie auch bitten,
  sachlich zu fragen. Die Reaktion der Delegierten ist, glaube ich, menschlich. Das
  Land hier ist in einer krisenhaften Lage. Die Menschen sind verunsichert. Es ist
  verständlich, dass man diese Verunsicherung dann auch ausdrückt. Der Bundeskanzler
  hat in seiner Rede sehr argumentativ für die Reformen geworben. Er hat, wie Sie
  wissen, wenn Sie die Rede gehört haben, den Menschen die gleichen Reformpläne vorgelegt,
  wie er sie zum Beispiel auch der Industrie und dem Handwerk vorlegt. Insofern gibt
  es da keinen Unterschied in der Sprache. Die Botschaft ist, dass man das Ruder hier
  nur gemeinsam herumreißen kann, also auch gemeinsam mit den verschiedenen Sozialpartnern.
  Wir haben vorhin sehr lange über die Kooperation auch mit den Sozialpartnern gesprochen.
  Das muss ich jetzt hier nicht wiederholen. Insofern, glaube ich, war die Botschaft:
  Dieser Weg, der auch schmerzhaft sein kann, muss gemeinsam gegangen werden. Wie
  hat der Kanzler dann im Nachhinein auf die Reaktion reagiert, oder wie bewertet
  er diese Reaktion? Es gibt jetzt keine öffentliche Reaktion des Kanzlers im Nachhinein,
  und die Bewertung habe ich Ihnen gerade eben genannt. Ich habe eine Frage an das
  BMAS und an das BMWE. Frau Bas hat auf dem DGB-Kongress erneut einen nationalen
  Aktionsplan für Tarifbindung angekündigt. Der sollte ja eigentlich schon Ende 2025
  vorgelegt werden. Ist man sich darüber inzwischen mit dem Wirtschaftsministerium
  einig, und wird der noch vor der Sommerpause kommen? Da laufen weiterhin die regierungsinternen
  Abstimmungen. Mehr kann ich dazu im Moment nicht sagen. An das Wirtschaftsministerium:
  Hat man sich da verhakt? Können Sie sagen, wo man sich verhakt hat? Will man diesen
  Aktionsplan gemeinsam vor der Sommerpause auf den Weg bringen? Wie üblich, äußern
  wir uns zu regierungsinternen Abstimmungen nicht näher im Detail. Dann stelle ich
  doch noch einmal die Nachfrage an das BMAS: Was macht denn Frau Bas so zuversichtlich,
  dass sie diesen Aktionsplan demnächst vorlegen wird? Das habe ich ja nicht gesagt.
  Ich habe gesagt: Wir reden darüber. Wir gehen natürlich nach wie vor davon aus,
  dass wir den vorlegen werden. Wir haben ja auch schon ein Tariftreuegesetz verabschiedet,
  und nach dem nationalen Aktionsplan sind wir ja auch verpflichtet, den vorzulegen.
  Aber zu dem genauen Zeitplan kann ich eben nichts sagen. Ist es das Ziel, in der
  kommenden Woche die Pflegereform ins Kabinett zu bekommen? In das Kabinett? Nein,
  das haben wir nie kommuniziert. Ich weiß es nicht. Ich kann zum Zeitplan eigentlich
  gar nichts sagen. Es ist so, dass die interne Abstimmung zur Pflegereform läuft.
  Aber wird sie dann kommende Woche wenigstens vorgestellt, weil Mitte Mai ja das
  Ziel war? Genau, wir hatten Mitte Mai gesagt. Das ist das Ziel, und es ist ja auch
  noch Mitte Mai. Wir haben bis jetzt ja kein konkretes Datum genannt. Sie können
  davon ausgehen, dass wir Sie rechtzeitig informieren werden, wenn der Termin feststeht,
  und wir Sie dann einladen werden.'
