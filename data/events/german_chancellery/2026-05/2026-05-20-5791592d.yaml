title: Im Kabinett beschlossen Auf den Ernstfall gut vorbereitet sein
text: 'Mit Investitionen in Ausrüstung und Fortbildung soll auch das THW zukünftig
  noch besser für den Bevölkerungsschutz gerüstet sein. Deutschland und Europa sehen
  sich seit Jahren neuen konkreten Bedrohungen ausgesetzt – sei es der völkerrechtswidrige
  russische Angriffskrieg auf die Ukraine, die steigende Gefahr durch Naturkatastrophen
  oder die zunehmenden hybriden Angriffe. Die Bundesregierung handelt, um sich auf
  den Ernstfall vorzubereiten. Mit den im Kabinett beschlossenen Eckpunkten zum Pakt
  für den Bevölkerungsschutz leistet die Bundesregierung einen umfassenden Modernisierungsschub
  im Bevölkerungsschutz und der Zivilen Verteidigung. Die Zusammenarbeit im Bevölkerungsschutz
  von Bund, Ländern und Kommunen wird künftig deutlich besser koordiniert. Die Verzahnung
  ziviler und militärischer Planung wird gestärkt. Hierfür wird ein Steuerungsstab
  Kommando Zivile Verteidigung im Bundesministerium des Innern/ BBK eingerichtet und
  die Zivile Alarmplanung (ZAP) ausgebaut. Der Bund entwickelt mit den Ländern ein
  gemeinsames digitales Lagebild Inland für den Bevölkerungsschutz , damit alle Verantwortlichen
  eine einheitliche Informationsgrundlage für ihre Einsätze haben, digital und in
  Echtzeit. Der Bund wird zudem bis zum Jahr 2029 insgesamt zehn Milliarden Euro in
  den Bevölkerungsschutz investieren. Vorgesehen sind unter anderem umfangreiche Investitionen
  in eine hochmoderne Ausstattung der größtenteils ehrenamtlichen Einsatzkräfte, moderne
  Warn- und Kommunikationssysteme, die weitere Stärkung des Technischen Hilfswerks
  ( THW ) mit resilienten Standorten einschließlich Logistikzentren sowie die Verbesserung
  der Trinkwasser- und Notstromversorgung. Auch das bundesweite Warnsystem soll weiter
  verbessert werden. Dazu wird ein stabiles, digitales und zentral in Echtzeit ansteuerbares
  Instrumentarium geschaffen. Die NINA--Notfall-Informations- und Nachrichten- App
  Warn- App wird weiter optimiert und um Empfehlungen für öffentliche Zufluchtsorte
  überall im Land ergänzt. Die Sirenenförderung wird fortgesetzt: Bis 2027 wird die
  zentrale Ansteuerung der Sirenen über das Warnsystem ermöglicht, um überall in Deutschland
  die Menschen mit Warnungen zu erreichen. Einen zentralen Baustein des Pakts bildet
  die Wissensvermittlung an Einsatzkräfte und Bevölkerung: Nur wer gut informiert
  ist, kann sich gut vorbereiten und weiß, was zu tun ist, wenn es darauf ankommt.
  Weiter ausgebaut wird die Aus- und Fortbildung der Einsatzkräfte für den Zivilschutz
  auf allen Ebenen. Hierfür werden neue, bundesweit einheitliche Ausbildungsstandards
  entwickelt. Damit Kinder früh lernen, wie in einem Ernstfall gehandelt werden muss,
  soll das Thema Zivilschutz außerdem Teil des Schulunterrichts werden. Der Begriff
  Bevölkerungsschutz ist eine zusammenfassende Bezeichnung für alle Einrichtungen
  und Maßnahmen, die der Gefahrenabwehr und Hilfe zum Schutz der Zivilbevölkerung
  im Krisen- oder Katastrophenfall dienen. Man unterscheidet den Zivilschutz und den
  Katastrophenschutz. Der Bund ist nach dem Grundgesetz für den Zivilschutz (Schutz
  im Verteidigungs- und Spannungsfall) zuständig, während die Länder für den Katastrophenschutz
  (Schutz vor dem Eintritt und den Folgen einer Naturkatastrophe) zuständig sind.
  Das Bundesamt für Bevölkerungsschutz und Katastrophenhilfe (BBK) und das THW haben
  im Bereich des Bundes den gesetzlichen Auftrag, die Bevölkerung im Verteidigungsfall
  zu schützen.'
