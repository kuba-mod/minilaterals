title: Im Kabinett beschlossen Stärkung der Cybersicherheit
text: Für Erkennung und Abwehr von Cyberangriffen sollen angemessene und rechtssichere
  gesetzliche Grundlagen geschaffen werden. Die Sicherheit und Handlungsfähigkeit
  von Staat, Wirtschaft und Gesellschaft in einem modernen, hoch technologisierten
  und digitalisierten Industrieland wie Deutschland beruhen in hohem Maße auf funktionierenden
  digitalen Prozessen und Infrastrukturen. Seit Jahren steigt jedoch die Zahl von
  Cyber angriffen durch staatliche und nichtstaatliche Akteure. Deutschland ist als
  führende Wirtschaftsnation in Europa verstärkt im Fokus hochprofessioneller Cyber
  angriffe mit großem Schadenspotenzial. Angesichts der geopolitischen Lage gewinnen
  zudem auch hybride Bedrohungen zunehmend an Bedeutung. Dieser sicherheitspolitischen
  Herausforderung begegnet die Bundesregierung, indem sie die Erkennung und Abwehr
  von Cyber angriffen ausbaut und hierzu wirksame, angemessene und rechtssichere gesetzliche
  Grundlagen schafft. Einen entsprechenden Gesetzentwurf hat sie nun beschlossen.
  Bundesinnenminister Alexander Dobrindt erklärte in der Pressemitteilung des BMI
  , dass „bisher bei Angriffen reagiert wurde, in dem versucht wurde die Angriffe
  in schadlose Bereiche des Netzes umzuleiten. Zukünftig werden wir den Angreifer
  ins Visier nehmen seine Server, seine Software, seine Strategie.“ Mit dem Gesetzentwurf
  zur Stärkung der Cybersicherheit werden die Sicherheitsbehörden in die Situation
  versetzt, dass sie das, was sie heute technisch können, auch rechtlich sicher anwenden
  können. Damit soll die Aufklärung und die Erkennung konkreter Angriffe und langfristig
  laufender Angriffskampagnen verbessert werden. Zudem soll die Entdeckung konkreter
  Vorbereitungshandlungen durch das Bundesamt für Sicherheit in der Informationstechnik
  ( BSI ) ausgebaut werden. Insbesondere gegen groß angelegte Cyber angriffe mit hohem
  Schadenspotenzial bieten präventive Maßnahmen in den eigenen IT -Systemen allein
  keinen hinreichenden Schutz. Es müssen daher für die Polizeien des Bundes und das
  BSI ergänzend Möglichkeiten zur Unterbindung solcher Cyber angriffe geschaffen werden,
  um gravierende Folgeschäden abwenden oder minimieren zu können.
