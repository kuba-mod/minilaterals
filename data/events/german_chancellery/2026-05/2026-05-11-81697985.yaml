title: Ministerin Reiche besucht die Erdöl-Raffinerie PCK Schwedt Sichere Energieversorgung
  und Perspektiven für die Region schaffen
text: 'Ministerin Reiche und Brandenburgs Ministerpräsident Woidke schafften verlässliche
  Perspektiven für die Beschäftigten in Schwedt. Foto: picture alliance/BMWE/photothek.de
  Juliane Sonntag Bundeswirtschaftsministerin Katherina Reiche hat gemeinsam mit dem
  brandenburgischen Ministerpräsidenten Dietmar Woidke den Industriestandort Schwedt
  im Nordosten Brandenburgs besucht. Im Mittepunkt des Besuchs in der Uckermark standen
  die Sicherung der Energieversorgung, die Verlängerung der Beschäftigungssicherung
  in der PCK Raffinerie Schwedt und neue Investitionsimpulse für die industrielle
  Entwicklung in der Region. Ministerin Reiche und Ministerpräsident Woidke überreichten
  einen symbolischen Förderbescheid in Höhe von rund 350 Millionen Euro für ein Joint
  Venture zur Herstellung synthetischer Kraftstoffe auf Basis von grünem Wasserstoff
  und biogenem Kohlendioxid. Zudem gaben sie eine erneute Verlängerung der bestehenden
  Regelungen zur Beschäftigungssicherung der PCK-Raffinerie bis Ende 2026 bekannt
  und schafften so verlässliche Perspektiven für die Beschäftigten in Schwedt . Ministerin
  Reiche betonte, dass Bund und Land an der Seite des Standorts stehen. Die Verlängerung
  der Beschäftigungssicherheit gebe „Perspektive und Sicherheit“. Das Ziel sei, Schwedt
  langfristig zu stärken, industrielle Wertschöpfung zu sichern und neue Perspektiven
  für die Region zu schaffen. Ministerpräsident Woidke unterstrich, dass die PCK ein
  zentraler Pfeiler der Versorgungssicherheit und ein strukturbestimmendes Unternehmen
  für Ostdeutschland sei – und “weiter und dauerhaft bleiben“ werde. Von dem Treffen
  gehe das Signal aus: „Wir lassen die Region nicht im Stich.“ Seit einigen Jahren
  steht die Raffinerie unter anderem wegen der geopolitischen Situation infolge des
  russischen Überfalls auf die Ukraine vor erheblichen Herausforderungen. Zuletzt
  hatte Kasachstan mitgeteilt, dass es kein Öl mehr über die Druschba- Pipeline liefern
  wird. Diese Pipeline beliefert auch die Raffinerie in Schwedt. Ministerin Reiche
  sagte dazu, dass die Bundesregierung in guten Gesprächen mit der polnischen Regierung
  zu alternativen Bezugswegen sei. Bislang habe die PCK den Wegfall der kasachischen
  Lieferungen gut verkraftet. Die Versorgungssicherheit mit Mineralölprodukten ist
  in Deutschland insgesamt nicht gefährdet. Bei dem Förderbescheid, den Ministerin
  Reiche und Ministerpräsident Woidke überreichten haben, geht es insbesondere um
  die die Produktion von nachhaltigem Flugkraftstoff ( eSAF ). Das Projekt ist ein
  wichtiger Schritt zur Dekarbonisierung der europäischen Luftfahrt und stärkt den
  Aufbau regionaler Kraftstoffversorgungsketten. Konkret gefördert wird das Projekt
  „Brandenburg" eSAF " – ein Joint Venture von ENERTRAG SE und Zaffra B.V . Das Ziel
  ist die Herstellung synthetischer Kraftstoffe auf Basis von grünem Wasserstoff und
  biogenem Kohlendioxid. Mit einer ab 2030 avisierten Produktion von rund 30.000 Tonnen
  handelt es sich dabei um das derzeit größte Vorhaben zur Produktion von synthetischen
  Kraftstoffen in Deutschland. Die PCK Raffinerie Schwedt an der Oder ist ein zentrales
  Erdölverarbeitungswerk in Ostdeutschland. Sie beschäftigt mehr als 1.000 Menschen
  und ist für die Versorgung der Region mit Kraftstoffen zentral. Auf dem Gelände
  der Raffinerie sind zahlreiche weitere Unternehmen angesiedelt.'
