title: Rede von Kanzler Merz zur Verleihung des Internationalen Karlspreises zu Aachen
  an Mario Draghi „Europa muss sich heute behaupten“
text: 'Kanzler Friedrich Merz würdigte Karlspreisträger Mario Draghi als Wegweiser
  – auch mit Blick auf Europas Finanzen: Es brauche einen investitionsorientierten,
  „Draghi- proofed “ Haushalt ohne neue Schulden In seiner Laudatio auf den italienischen
  Politiker Mario Draghi anlässlich der Verleihung des Internationalen Karlspreises
  zu Aachen hat Bundeskanzler Friedrich Merz ein Europa gezeichnet, das aus einer
  Phase des „falschen Optimismus“ erwache und sich in einer neu sortierenden Welt
  neu behaupten müsse. Merz griff dabei Draghis Warnung auf: „Ein Europa, das seine
  Interessen nicht verteidigen kann, wird seine Werte auf lange Sicht nicht bewahren
  können“. Der Bundeskanzler zeichnete Mario Draghi in seiner Laudatio als entscheidende
  Figur der Eurorettung und als intellektuellen Wegweiser für Europas Zukunft. Er
  lobte dessen Mut in der Eurokrise: „Sie haben sich in bedrohlicher Zeit um den Euro
  gekümmert, und Sie haben den Euro und die Währungszone stabilisiert.“ Das habe sich
  ausgezahlt. Draghis Analysen seien „schonungslos“, seine Empfehlungen „sehr konkret“
  und seine Antworten „klar und ambitioniert“. Bundeskanzler schloss sich der Bezeichnung
  „Super-Mario“ für den mit dem diesjährigen Karlspreis geehrten Draghi an. Sehr geehrter
  Herr Oberbürgermeister, lieber Michael Ziemons, sehr geehrter Vorsitzender des Karlspreisdirektoriums,
  lieber Armin Laschet, Seine Königliche Hoheit Guillaume V., Großherzog von Luxemburg,
  sehr geehrte Frau Präsidentin der Europäischen Kommission, liebe Ursula von der
  Leyen, sehr geehrte Kollegen Ministerpräsidenten, lieber Kyriakos Mitsotakis, lieber
  Edi Rama, sehr geehrte Frau Präsidentin der Europäischen Zentralbank, liebe Christine
  Lagarde , sehr geehrter Ministerpräsident des Landes Nordrhein-Westfalen, lieber
  Hendrik Wüst, sehr geehrte Preisträgerinnen und Preisträger des Karlspreises aus
  den vergangenen Jahren, sehr geehrte Mitglieder der Landesregierung, liebe Kolleginnen
  und Kollegen aus den Parlamenten, dem Europäischen Parlament, dem Deutschen Bundestag
  und dem nordrhein-westfälischen Landtag, Exzellenzen, meine sehr geehrten Damen
  und Herren, vor allem lieber Mario Draghi! Promotion am Massachusetts Institute
  of Technology in Cambridge in den USA , Professor für Finanzwissenschaft, Exekutivdirektor
  bei der Weltbank in Washington , Generaldirektor im italienischen Finanzministerium,
  in dieser Funktion beteiligt an den Verhandlungen über die Wirtschafts- und Währungsunion
  im Vertrag von Maastricht, Dozent an der Kennedy School of Government in Harvard,
  Investmentbanker, Vorsitzender des Wirtschafts- und Finanzausschusses der Europäischen
  Union, Gouverneur der italienischen Notenbank, Präsident der Europäischen Zentralbank,
  italienischer Ministerpräsident – meine Damen und Herren, das sind nicht fünf Lebensläufe,
  sondern einer, Auszüge des beruflichen Lebens von Mario Draghi. Ich denke, Sie werden
  verstehen, dass seine Freunde ihn „Super-Mario“ nennen. Man muss sich über die zähe
  Disziplin und strenge Konsequenz bei einem Mann nicht wundern, der wie Sie, lieber
  Mario Draghi, ein bekennender Bewunderer von Ignatius von Loyola sind, dem Gründer
  des Jesuitenordens im 16. Jahrhundert. Sie sind auch Schüler einer Jesuitenschule
  in Rom gewesen. Der ganz einfache Satz heute lautet: Sie, lieber Mario Draghi, haben
  sich um Europa verdient gemacht – der ist so einfach, dieser Satz –, und Sie tun
  es immer noch. Aber wo soll man anfangen, und wie soll man abschließen? Das Wichtigste
  vielleicht: Sie haben sich in bedrohlicher Zeit um den Euro gekümmert, und Sie haben
  den Euro und die Währungszone stabilisiert, mit Mitteln, die umstritten waren. Das
  war mutig. Sie haben etwas riskiert. Es hätte scheitern können. Aber es ist gelungen,
  und es hat sich ausgezahlt. Der Euro ist heute unangefochten, und das ist und bleibt
  ein großes Verdienst, für das wir, die Europäer, Ihnen, lieber Mario Draghi, dankbar
  sind, zutiefst dankbar! Dass das so kam, ist mit Ihnen freilich auch anderen zu
  verdanken, die in jener Krisenzeit Verantwortung getragen haben. Ich will an den
  verstorbenen Karlspreisträger Wolfgang Schäuble erinnern. Auch er ist ein Retter
  des Euro gewesen, indem er standhaft auf den Zusammenhang von Währungsberuhigung
  und Reformen in den Euro-Ländern hingewiesen hat. In Anwesenheit von Kyriakos Mitsotakis,
  dem griechischen Ministerpräsidenten, dürfen wir sagen: Dieser Reformweg war für
  Griechenland, für viele Menschen in Ihrem Land, Herr Ministerpräsident, hart. Aber
  er hat sich als richtig herausgestellt. Ihr Land, lieber Kyriakos, kann längst aus
  eigener Kraft und sogar vorzeitig die Kredite zurückzahlen, die damals notwendig
  waren. Die Anstrengungen haben sich gelohnt, und wir sind dankbar dafür und gratulieren
  Ihnen und dem ganzen griechischen Volk, wie Sie das hinbekommen haben! Als Sie,
  lieber Mario Draghi, im Oktober des letzten Jahres den Prinzessin-von-Asturien-Preis
  entgegengenommen haben, da haben Sie gesagt: „Europa zu bauen, war eine zentrale
  Mission meines Berufsweges. Heute aber sind die Aussichten für Europa so schwierig,
  wie ich selbst es noch nicht erlebt habe. Nahezu jedes Prinzip, auf dem die Union
  errichtet worden ist, steht heute unter Druck.“ Einige Wochen zuvor haben Sie gesagt:
  „Jahrelang glaubte die Europäische Union, dass das wirtschaftliche Gewicht ihres
  450 Millionen Konsumenten starken Marktes dem Kontinent politische Macht und Einfluss
  in der internationalen Handelspolitik verschaffen würde. 2025 wird uns als das Jahr
  in Erinnerung bleiben, in dem diese Illusion zerbrochen ist.“ Ja, meine Damen und
  Herren, wir haben uns in Europa zu sehr darauf verlassen, dass die Kraft der humanistischen,
  europäisch-westlichen Ideen die Welt insgesamt so wie von Zauberhand in ein Reich
  der Freiheit und des Friedens verwandeln würde. Wir haben uns geirrt. Aber den Irrtum
  dieses falschen Optimismus heute einzusehen, heißt nicht, die Zuversicht aufzugeben,
  dass Menschen in Freiheit und Frieden miteinander leben können. Europa hat die Chance,
  die neue Weltordnung daraufhin mitzugestalten, dass in ihr Normen und Regeln statt
  Willkür und das Recht des Stärkeren gelten. Wir haben die Chance. Denn es liegt
  ja ganz einfach auf der Hand, und Herr Oberbürgermeister, Sie haben das in Ihren
  sehr eindringlichen Worten gesagt: Diese Welt sortiert sich gerade neu. Wir erleben
  inzwischen wöchentliche Krisenlagen. In dieser Situation muss Europa einen klaren
  Kurs und einen kühlen Kopf bewahren. Wir müssen selbstbewusst unsere eigenen Interessen
  gestalten, und wir müssen bereit sein, für die Wahrung dieser Interessen auch etwas
  einzusetzen. Ich zitiere Sie einmal mehr, lieber Mario Draghi. Gerade vor wenigen
  Wochen haben Sie es gesagt: „Ein Europa, das seine Interessen nicht verteidigen
  kann, wird seine Werte auf lange Sicht nicht bewahren können.“ Ja, meine Damen und
  Herren, wir, wir Europäer, Europa, müssen uns heute behaupten, und ich sage: Europa
  hat das verstanden. Europa ist aufgewacht. Europa stärkt sich wirtschaftlich und
  sicherheitspolitisch. Europa baut seine Verteidigungsfähigkeit im Rahmen der NATO
  zügig aus. Europa identifiziert die Machtmittel, die es hat, und hält sie auch für
  den Einsatz bereit. Europa knüpft überall in der Welt neue Handelspartnerschaften
  und verringert so Abhängigkeiten. Europa unterstützt entschlossen die Ukraine in
  ihrem Abwehrkampf gegen Russland. Meine Damen und Herren, wir treffen uns heute
  zur Preisverleihung im Jahr 2026 im fünften Jahr in Folge im Schatten dieses Krieges.
  2023 waren Wolodymyr Selenskyj und das ukrainische Volk der Preisträger. Wir sagen
  es heute erneut, wie vor drei Jahren: Wir unterstützen die Ukraine in ihrem Kampf
  für die Freiheit, weil es der Kampf auch für unsere Freiheit ist! Wir Europäer entdecken
  unsere Kraft und unsere Fähigkeit vor allem dann, wenn wir entschlossen zusammenstehen.
  Um auch das zu sagen: Wir wollen helfen, diesen schrecklichen Krieg so schnell wie
  möglich zu beenden. Die Angriffe der letzten Nacht sprechen eine andere Sprache.
  Gesprächsbereitschaft erfordert Gesprächsbereitschaft auf beiden Seiten. Last, but
  not least: Wir Europäer entscheiden selbst, wer für uns spricht, niemand anderes.
  Nicht nur sicherheitspolitisch, auch wirtschaftlich hat Europa durchaus Machtmittel
  – andere sind auch von uns abhängig, nicht nur wir von ihnen –, und wenn wir zeigen,
  dass wir notfalls bereit sind, diese wirtschaftliche Macht auch einzusetzen, dann
  können wir sehr viel erreichen. Europa hat sich aufgemacht, eine Macht zu werden.
  Eine Macht, die dem Sturm dieser neuen Zeit trotzt und die zugleich – das bleibt
  unser Anspruch – mit Freiheit und Recht, mit Frieden und Wohlstand für sich wirbt,
  für sich einnimmt, die Bürgerinnen und Bürger unseres Europas für sich gewinnt.
  Es geht in dieser neuen europäischen Entschlossenheit überall um wirtschaftliche
  Stärke und um militärische Verteidigungsfähigkeit. Noch dieses Jahr wird sich in
  den Verhandlungen zum Mehrjährigen Finanzrahmen entscheiden, ob wir hierfür die
  richtigen Weichen stellen. Ich will die Gelegenheit nutzen, hierzu gerade mit Blick
  auf die Vorschläge unseres heutigen Preisträgers unsere Sicht der Dinge darzulegen.
  Der EU -Haushalt ist in seinem Inhalt und seiner Struktur über die letzten Jahrzehnte
  hinweg praktisch unverändert geblieben. Immer noch legen wir geradezu planwirtschaftlich
  sieben Jahre im Voraus fest, wer wie viele Mittel aus diesem Haushalt erhalten soll,
  und immer noch fließen mehr als zwei Drittel der europäischen Mittel in Umverteilung
  und Subventionen. Aber den Herausforderungen des 21. Jahrhunderts begegnen wir nicht
  mit einem Haushalt des 20. Jahrhunderts. Eine grundlegende Modernisierung ist daher
  unerlässlich. Nicht weniger deutlich hat es Mario Draghi formuliert. Er fordert
  uns auf, unsere gemeinsamen Mittel auf die Finanzierung gemeinsamer Investitionen
  auszurichten, und ich stimme zu. Ein souveränes Europa braucht einen Draghi-„ proofed
  “-Haushalt. Deshalb unterstützen wir die Reformbemühungen der EU -Kommission für
  den kommenden Mehrjährigen Finanzrahmen so nachdrücklich. Verschlankte Strukturen,
  Investitionen in Wettbewerbsfähigkeit und Verteidigung, der Fokus auf europäische
  Mittel für europäische Politik, all das ist nötig, weil die Mittel begrenzt sind.
  Wir müssen heute eben mehr denn je neue Prioritäten setzen. Einige meinen nun, wir
  könnten uns dieser schmerzhaften Aufgabe entziehen, indem wir neue Schulden, europäische
  Schulden, auflegen, indem wir reguläre Ausgaben durch Schulden finanzieren. Diesen
  Weg kann Deutschland schon aus verfassungsrechtlichen Gründen nicht mitgehen, und,
  meine Damen und Herren, wir brauchen auch für zukünftige Krisen noch Ressourcen.
  Im Übrigen: Realität ist, dass übermäßige Verschuldung Souveränität bedroht und
  Handlungsfähigkeit begrenzt. Lassen Sie es mich offen aussprechen: Einige Länder
  geben heute schon aufgrund ihrer immensen Verschuldung mehr für Zinsen aus als für
  Verteidigung. In solche Lagen dürfen wir den europäischen Haushalt nicht führen.
  Wir müssen auch in zukünftigen Krisensituationen unabhängig, handlungsfähig, kurzum
  souverän bleiben. Gerade deshalb wollen wir jetzt wirklich die Potenziale heben,
  die im europäischen Binnenmarkt immer noch gefesselt liegen, die Potenziale eines
  europäischen Marktes, der größer ist als der der Vereinigten Staaten von Amerika,
  damit wir den Binnenmarkt endlich wieder so beleben, wie wir ihn einstmals gedacht
  haben. Ich war, und einige von Ihnen wissen das, bei der Entwicklung der europäischen
  Binnenmarktgesetzgebung Anfang der Neunzigerjahre in Brüssel und in Straßburg dabei.
  Ich habe erlebt, zu welchen Reformen die Europäische Union in der Lage ist, wie
  dynamisch wir sein können, auch und gerade in Zeiten des Umbruchs. Innerhalb nur
  einer Wahlperiode hat das Europäische Parlament damals die Vorschläge des früheren
  Kommissionspräsidenten Jacques Delors zur Vollendung des Binnenmarktes umgesetzt.
  Auf Problemerkenntnis folgte in kürzester Zeit Lösung, mit der eine Wachstumsdynamik
  bisher nicht gekannten Ausmaßes in Europa ihren Anfang nahm. Auch hier bin ich wieder
  bei Mario Draghi. Auch er hat uns in seinem Bericht vom September 2024 genaue Vorschläge
  gemacht. Mario Draghi hat mit seiner schonungslosen Analyse zur Zukunft der europäischen
  Wettbewerbsfähigkeit ein grundlegendes Umsteuern der Europäischen Union angemahnt.
  Seine Problemanalyse ist sehr präzise. Er zeigt Schwächen der EU bei der Anwendung
  neuer Technologien auf. Er macht deutlich, dass Europa zwar eine etablierte Wirtschaftsstruktur
  hat, aber zu wenig dynamisch ist, dass Forschungsergebnisse zu wenig und zu langsam
  in Geschäftsmodelle übersetzt werden, dass gerade junge und innovative Unternehmen
  deutlich stärker im Binnenmarkt wachsen können müssten. Was seinen Bericht besonders
  auszeichnet: Er bleibt nicht bei der Problemanalyse stehen. Er leitet sehr konkrete
  Handlungsempfehlungen ab. Seine Antworten sind klar und ambitioniert. Das alles
  spiegelt die Persönlichkeit von Mario Draghi wider. In unseren Begegnungen habe
  ich Mario Draghi als einen nachdenklichen, besonnenen Menschen kennengelernt, der
  ruhig und analytisch nach konstruktiven Lösungen sucht und dem das europäische Gemeinwohl
  am Herzen liegt wie kaum etwas anderes. Wir haben uns als europäische Staats- und
  Regierungschefs mit Mario Draghi zu unserem Retreat im Februar dieses Jahres in
  Alden Biesen, ganz nah an Aachen, in Belgien getroffen. Was er und Enrico Letta,
  ebenfalls ein ehemaliger italienischer Ministerpräsident, uns da so eindringlich
  ans Herz gelegt haben, war in Form und Inhalt überragend. Ich finde es bemerkenswert
  und erlaube mir das auch zu sagen: Ich bin dankbar dafür, dass uns zwei Italiener
  hier in der besten Tradition von Alcide De Gasperi den europäischen Weg gewiesen
  haben! Die jüngsten Schlussfolgerungen des Europäischen Rats im März atmen genau
  diesen Geist der Empfehlungen und Erkenntnisse von Mario Draghi und Enrico Letta,
  und so muss es sein: Ein kluger, erfahrener Mann macht gründlich durchdachte Vorschläge
  genau zur rechten Zeit, und die gegenwärtig in Europa Verantwortung Tragenden greifen
  das auf und gießen es in verbindliche Beschlüsse, nutzen es also zur Stärkung Europas.
  Meine Damen und Herren, Kyriakos Mitsotakis ist heute der weitere Laudator auf Mario
  Draghi. Ein Grieche und ein Deutscher verneigen sich vor einem Italiener. Diese
  Art des Zusammenwirkens über Grenzen hinweg ist doch das Beste an Grundbedingung
  eines Erfolges in Europa! Im Übrigen eine weitere Referenz an Italien: Wir haben
  gerade vor wenigen Wochen einige Weichen zwischen Deutschland und Italien zu stellen
  begonnen. Bei den deutsch-italienischen Regierungskonsultationen zu Beginn des Jahres
  in Rom haben wir gemeinsame Vorschläge für eine Reformagenda in Europa entwickelt,
  die von Mario Draghis Ideen inspiriert war. Die Zusammenarbeit mit der italienischen
  Regierung und mit der Ministerpräsidentin Giorgia Meloni selbst ist eng und geht
  in eine gemeinsame Richtung. Auch dafür sind wir dankbar in Deutschland. Meine Damen
  und Herren, wenn wir es richtig machen, dann werden diese Jahre der großen welthistorischen
  Bewegung im Rückblick Jahre der Weiterentwicklung und der Stärkung eines geeinten
  Europas sein. Das Direktorium des Karlspreises hat die Zuerkennung des diesjährigen
  Karlspreises an Mario Draghi als ein bewusst gesetztes Zeichen an die Entscheidungsträger
  in Brüssel bezeichnet. Ich zitiere das Direktorium: „Wir fordern die Europäische
  Kommission und die europäischen Staats- und Regierungschefs auf, jetzt den Draghi-Report
  umzusetzen.“ Ich kann für meine Person und, denke ich, für fast alle Staats- und
  Regierungschefs der Europäischen Union nur sagen, und ich will damit schließen:
  Die Aufforderung, lieber Mario Draghi, ist angekommen. Wir sind in der Umsetzung.
  Herzlichen Glückwunsch, Mario Draghi, zum Internationalen Karlspreis in Aachen im
  Jahr 2026. Herzlichen Dank für Ihr großartiges Lebenswerk im Dienst Europas!'
