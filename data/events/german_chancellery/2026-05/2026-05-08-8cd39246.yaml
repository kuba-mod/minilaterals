title: Bundesregierung aktuell
text: 'wer vor dem Hamburger Übersee-Club spricht, der sollte seine Worte wohl wählen.
  Die Tradition der Rede zum Übersee-Tag gebietet es, den Horizont zu weiten und sich
  über das Tagesgetümmel hinaus mit den historischen Grundlinien der Zeit zu beschäftigen.
  So haben es alle Bundeskanzler dieses Landes getan – und daran hat sich auch Friedrich
  Merz gehalten, als er am Donnerstag der Einladung gefolgt ist und im Festsaal des
  Hamburger Rathauses seine Rede hielt. Es traf sich, dass diese Rede auf den Jahrestag
  der Aufnahme der Regierungsgeschäfte fiel. Der Bundeskanzler rief in Erinnerung,
  worum es dieser Regierung gehen muss: um die Bewahrung von Freiheit und Liberalität
  in einer von Krisen und Konflikten zugeschütteten Zeit. Dem ist alles untergeordnet,
  dem dienen alle Reformen und finanziellen Anstrengungen der vergangenen Wochen und
  Monate. Diese Botschaft geht schnell verloren, gerade im Getöse der Jahrestags-Berichterstattung,
  und in einer Zeit, in der sich der Konflikt stets besser verkauft als der Erfolg.
  Denn bei aller berechtigten Kritik, die an diesem Jahrestag an die Bundesregierung
  gerichtet ist: Seit einem Jahr wird im Maschinenraum der Demokratie auch heftig
  geschuftet, um den Reformstau im Land aufzulösen und die Krisen in der Welt zu beenden.
  Wirtschaftliche Stärke, Sicherheit, Migration und gesellschaftlicher Zusammenhalt
  - hier hat die Bundesregierung viel erreicht. In den ersten zwölf Monaten hat sie
  190 Gesetze auf den Weg gebracht. Die Liste ist lang: ein Investitions-Sofortprogramm,
  Entlastung bei Energiekosten, der Bau-Turbo mit seinen Planungs-Erleichterungen
  für Kommunen, das Sondervermögen für die Infrastruktur und Klimaschutz. Damit werden
  Schulen, Brücken, Straßen und Schienen saniert. Gleichzeitig wird der Staat effizienter,
  digitaler, schneller. Wir haben massiv in unsere Verteidigung investiert und einen
  neuen Wehrdienst eingeführt. Das KRITIS-Dachgesetz schützt die kritische Infrastruktur
  – seit dem Anschlag auf das Berliner Stromnetz muss man die Notwendigkeit niemandem
  mehr erklären. Aus dem Bürgergeld wird die Grundsicherung, mit deren Hilfe die Rückkehr
  in Arbeit beschleunigt werden soll. Verschiedene Entscheidungen haben die irreguläre
  Migration um zwei Drittel gegenüber 2023 reduziert. Und schließlich steht die anspruchsvolle
  Konsolidierung des Haushalts an mit einer Kombination von Investitionen, Strukturreformen
  und Sparmaßnahmen. Vieles ist geschafft und vieles bleibt zu tun. Einer der größten
  Erfolge: In der letzten Woche wurde die Gesundheitsreform für die Stabilisierung
  der Beiträge im Kabinett verabschiedet – eine Dekadenreform, die vom Problembewusstsein
  dieser Regierung zeugt. Weitere Reformen stehen an – so zum Beispiel bei der Pflege,
  der Rente oder dem Steuersystem. Auch außen- und sicherheitspolitisch war dieses
  Jahr anspruchsvoll, vollgepackt mit Reisen, Gipfeln, Besuchen und Konsultationen,
  die alle einem Ziel dienen: Deutschland pflegt und stärkt das Netz seiner Partner
  und Verbündeten, um in einer zunehmend zügellosen Zeit Regeln zu setzen und Berechenbarkeit
  zu schaffen. 31 Länder hat der Bundeskanzler in seinem ersten Jahr besucht, um Deutschlands
  Interessen zu vertreten, Sicherheit zu bauen, und um Exporte und Wachstum zu fördern.
  Auch wenn viele Entscheidungen zügig getroffen wurden, gab es auch Momente der Ernüchterung,
  verbunden mit der Erkenntnis, dass alles nicht so schnell geht wie erhofft. Die
  Regierung lebt vom Kompromiss der Koalitionspartner. So funktioniert das Regieren
  in einer parlamentarischen Demokratie. Am Ende bleibt das große Ziel: Freiheit und
  Liberalität zu ermöglichen, Wohlstand und Sicherheit zu wahren. Das sind keine abstrakten
  Werte. Das ist im Idealfall die Summe vieler kleiner Entscheidungen dieser Regierung.
  „Es geht um die Frage, haben wir was erreicht in den letzten zwölf Monaten. Und
  da fällt meine Antwort anders aus als in vielen Berichten und Kommentaren. Wir haben
  noch längst nicht alles erreicht, aber wir haben viel erreicht." „Bei den Brücken
  haben wir umgerechnet die Fläche von 178 Fußballfeldern saniert, deutlich mehr als
  ein Drittel angesichts einer Gesamtfläche von 450 Fußballfeldern, die angepackt
  werden muss.“ Bundesverkehrsminister Schnieder zur 1-Jahres-Bilanz  beim Sondervermögen
  für Infrastruktur und Klimaneutralität Wir freuen uns über Ihr Feedback: Nutzen
