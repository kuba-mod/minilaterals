title: Fragen und Antworten Maßnahmen für mehr Cybersicherheit
text: 'Mit gezielten Maßnahmen stärkt die Bundesregierung die digitale Sicherheit
  in Deutschland. Foto: mauritius images / NicoElNino / Alamy / Alamy Stock Photos
  Das Bundeslagebild Cyber kriminalität zeigt, dass die Bedrohung durch Cyber kriminalität
  in Deutschland auf hohem Niveau bleibt. Besonders schwere Cyber delikte sowie Angriffe
  auf Unternehmen, Behörden und kritische Infrastrukturen nehmen zu. 2025 wurden rund
  334.000 Cybercrime fälle registriert. Die tatsächliche Bedrohung dürfte aufgrund
  eines erheblichen Dunkelfeldes deutlich höher liegen. Zudem markiert der russische
  Angriff auf die Ukraine eine Zeitenwende – auch in der Cyber sicherheitspolitik.
  Die Bundesregierung hat ihre Schutzmaßnahmen seit Kriegsbeginn deutlich hochgefahren.
  Ziele sind, eine starke Sicherheitsarchitektur aufzubauen, ein höchstmögliches Schutzniveau
  gegen Cyber angriffe zu erreichen und Cyber kriminalität effektiv zu bekämpfen.
  Damit die Behörden in Deutschland Cybergefahren koordiniert entgegentreten können,
  soll das Bundesamt für Sicherheit in der Informationstechnik ( BSI ) zu einer zentralen
  Anlaufstelle für Bund und Länder ausgebaut werden. Eine solche Zentralstelle ermöglicht
  nicht nur die dauerhafte Kooperation zwischen den Akteuren, hier können auch gemeinsame
  Informationssysteme eingerichtet und genutzt werden. Darüber hinaus will die Bundesregierung
  das Nationale Cyber abwehrzentrum und den Nationalen Cyber -Sicherheitsrat weiterentwickeln
  und stärken. Die 2016 aufgesetzte und 2021 evaluierte Cyber sicherheitsstrategie
  beschreibt die grundsätzliche, langfristige Ausrichtung der Cyber sicherheitspolitik
  der Bundesregierung in Form von Leitlinien, Handlungsfeldern und strategischen Zielen.
  So sollen alle Akteure zielgerichtet und abgestimmt zusammenwirken können. Um die
  föderale Zusammenarbeit zwischen Bund und Ländern zu unterstützen, sind die Cyber
  sicherheitsstrategie für Deutschland und die Cyber sicherheitsstrategien der Länder
  eng miteinander verzahnt. Eingebettet in die Europäische Cyber sicherheitsstrategie
  ist sie zudem ein Beitrag zur Gestaltung der digitalen Zukunft Europas. Zur Zeit
  wird die Cyber sicherheitsstrategie weiterentwickelt, um die Vorgaben des aktuellen
  Koalitionsvertrags umzusetzen. Die Konsequenzen, die das Bundesinnenministerium
  und die Sicherheitsbehörden aus der Zeitenwende gezogen haben und ziehen, müssen
  ebenfalls in der Strategie Berücksichtigung finden. Die Bundesregierung möchte mit
  der Nationalen Wirtschaftsschutzstrategie den Weg zu einem ganzheitlichen Wirtschaftsschutz
  ebnen und die Widerstandsfähigkeit deutscher Unternehmen stärken. Der mit der Strategie
  verfolgte staatlich organisierte Wirtschaftsschutz zielt auf die Stärkung der Widerstandsfähigkeit
  der Wertschöpfungs- und Lieferketten sowie von Forschung, Innovation und Entwicklung
  deutscher Unternehmen ab. Im Fokus steht dabei insbesondere der Schutz vor physischen,
  digitalen und hybriden Bedrohungen. Die Bundesregierung hat Eckpunkte für mehr Cybersicherheit
  beschlossen. Diese sehen einen sogenannten Cyberdome zur Verteidigung im Netz vor
  – und zielen auf mehr Befugnisse und Übungen ab. Neue digitale Ermittlungsbefugnisse
  der Sicherheitsbehörden ermöglichen die automatisierte Datenanalyse und den automatisierten
  biometrischen Internetabgleich und machen die Arbeit der Sicherheitsbehörden so
  deutlich effektiver. Mit dem Gesetzespaket wird die gesetzliche Grundlage geschaffen,
  sodass Bundeskriminalamt und Bundespolizei moderne Technologien zur Gefahrenabwehr
  und zum Schutz der Bevölkerung gegen Kriminalität und Terrorismus nutzen können.
  Das Gesetz zur Stärkung der Cyber sicherheit sieht mehr Befugnisse für das Bundesamt
  für Sicherheit in der Informationstechnik ( BSI ), das Bundeskriminalamt (BKA) und
  die Bundespolizei (BPol) vor. Auf diese Weise soll die Aufdeckung und Aufklärung
  konkreter Angriffe und langfristig laufender Angriffskampagnen verbessert werden.
  Das Bundesamt für Sicherheit in der Informationstechnik soll konkrete Vorbereitungshandlungen
  besser erkennen. Die IP -Adresse ist oft die erste oder einzige Spur, die Täter
  im digitalen Raum hinterlassen. Mit dem Gesetz zur IP -Adressenspeicherung werden
  Internetzugangsdienstanbieter verpflichtet IP -Adressen vorsorglich für drei Monate
  zu speichern. Die Speicherung hilft bei der Aufklärung aller Straftaten im Netz.
  Um die deutsche Wirtschaft widerstandsfähiger zu machen, hatte die Bundesregierung
  zuletzt mit der Umsetzung der EU -Richtlinie NIS2 Unternehmen in der Europäischen
  Union zu höheren Cybersicherheitsstandards und strengeren Meldepflichten verpflichtet
  und mit dem KRITIS -Dachgesetz erstmals einheitliche Schutzvorgaben für die kritischen
  Infrastrukturen, zum Beispiel im Energie-, Gesundheits- oder IT -Sektor, geschaffen.
  Das Bundesamt für Sicherheit in der Informationstechnik ( BSI ) ist die zentrale
  Cyber -Sicherheitsbehörde des Bundes. Es erarbeitet praxisorientierte Mindeststandards
  und zielgruppengerechte Handlungsempfehlungen zur IT - und Internet-Sicherheit,
  um Anwenderinnen und Anwender bei der Vermeidung von Risiken zu unterstützen. BSI
