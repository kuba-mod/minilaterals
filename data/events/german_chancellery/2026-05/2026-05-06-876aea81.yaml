title: Cabinet decision Annual report on arms control 2025
text: The main task of the International Atomic Energy Agency (IAEA) is to promote
  and monitor the peaceful use of nuclear energy worldwide. The security situation
  has changed drastically worldwide. This poses enormous challenges for global arms
  control, disarmament and non-proliferation. The Federal Government reached this
  conclusion in its “Report on the status of arms control, disarmament and non-proliferation
  efforts and the development of armed forces potential for 2025”. The Federal Government’s
  security policy focuses on strengthening deterrence and defence capabilities. The
  aim is to ensure that the citizens of Germany can continue to live in peace, freedom
  and security in the future. According to the report, the greatest threat continues
  to come from Russia, which is continuing its war of aggression against Ukraine with
  undiminished vigour and continuing its massive military build-up. Against this backdrop,
  secure defence capabilities and credible deterrence by NATO are of central importance
  for the security of Germany and Europe. In addition to Russia, the USA is also trying
  to persuade China to take part in talks on nuclear arms control. China continues
  to produce nuclear warheads and now has the third largest nuclear arsenal in the
  world. Thus far, however, China has shown no willingness to commit to any defence
  policy. For the Federal Government, the Nuclear Non-Proliferation Treaty (NPT) is
  the cornerstone of the international nuclear order. The treaty has been in force
  since 1970 and aims to prevent the proliferation of nuclear weapons, promote the
  peaceful use of nuclear energy and contribute to the disarmament of nuclear weapons.
  The Federal Government is demanding full transparency from Iran. It is also pressing
  for the International Atomic Energy Agency (IAEA) to be given access to the controversial
  Iranian nuclear facilities. North Korea is also called upon to completely and verifiably
  end its nuclear weapons programme. New technologies, in particular biotechnology,
  artificial intelligence (AI) and quantum technology, pose further challenges. Their
  opportunities and risks must be better understood in the context of arms control.
  The Federal Government is working internationally to establish regulations relating
  to systems with autonomous functions and for the responsible use of AI in the military
  sector.
