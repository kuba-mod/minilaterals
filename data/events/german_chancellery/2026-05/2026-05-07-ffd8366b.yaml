title: Ein Jahr Bundesministerium für Digitales und Staatsmodernisierung Das Rathaus
  aufs Sofa der Menschen bringen
text: 'In Zukunft kann einfach über die Deutschland- App der Wohnsitz angemeldet werden.
  Mit dem Bundesministerium für Digitales und Staatsmodernisierung ( BMDS ) hat die
  Bundesregierung erstmals ein zentrales Ressort geschaffen, das sich ausschließlich
  der Digitalisierung und Modernisierung des Landes widmet. Der Rückbau von Bürokratie
  und die Modernisierung der digitalen Infrastruktur haben eine übergeordnete Bedeutung
  für die Wettbewerbsfähigkeit Deutschlands. Zum einjährigen Bestehen besuchte Bundeskanzler
  Friedrich Merz das Ministerium. Er nannte die Gründung des Ressorts als „vielleicht
  eine der wichtigsten Zukunftsentscheidungen, die wir in der Bundesregierung für
  unser Land getroffen haben“. Die Arbeit des Ministeriums sei entscheidend. Denn
  „wir brauchen einen Staat, der einfach, schnell und bürgernah ist, einen Staat,
  der digital ist, der die Menschen wirklich bei dem unterstützt, was sie wollen“,
  so der Kanzler. Bundesminister Karsten Wildberger zog zum Jubiläum eine erste Bilanz:
  „Wir haben den Netzausbau beschleunigt, neue Ansätze bei der Digitalisierung des
  Landes erprobt, KI in Verwaltungsprozess gebracht und die Staatsmodernisierung vorangetrieben.
  Die Weichen sind gestellt – jetzt geht es darum, bei der Umsetzung unserer Projekte
  mit genau diesem Tempo und Elan weiterzumachen.“ Das BMDS hat im ersten Jahr bereits
  maßgebliche Schritte eingeleitet, um bürokratische Hürden spürbar zurückzubauen
  und die Verwaltung effizienter aufzustellen. Meilensteine mit einem Abbauvolumen
  von mehreren Milliarden Euro waren die Verabschiedung der Modernisierungsagenda
  des Bundes , der föderalen Modernisierungsagenda sowie das erste Entlastungskabinett
  im November. Viele Maßnahmen der Bundesregierung sind bereits umgesetzt und wirken
  in der Praxis: Der „Bau-Turbo“ spart Zeit und Kosten beim Wohnungsbau. Der Bürokratierückbau
  in der Pflege bedeutet konkrete Erleichterungen – unter anderem für Pflegepersonal,
  Pflegebedürftige sowie ihre Angehörigen. Der digitale Fahrzeugschein kann seit November
  2025 bequem auf dem Smartphone mitgeführt werden, Kindergeld soll ab dem kommenden
  Jahr in zwei Stufen ohne Antrag bezogen werden können. Weitere Beschlüsse werden
  Schritt für Schritt spürbare Wirkung zeigen – auch für Unternehmen. Mit dem Infrastruktur-Zukunftsgesetz
  sollen wichtige Bauprojekte zukünftig im „im überragenden öffentlichen Interesse“
  liegen – das beschleunigt die Umsetzung. Zudem ist geplant, dass Anträge von Unternehmen
  künftig als genehmigt gelten, wenn eine Behörde nicht in einer bestimmten zeitlichen
  Frist widerspricht – auch das wird zu großer Zeitersparnis führen. Deutschland braucht
  eine leistungsstarke digitale Infrastruktur – störungsfreien Mobilfunk und flächendeckende
  Glasfaseranschlüsse. Schon kurz nach Amtsantritt hat die Bundesregierung erreicht,
  dass der Ausbau von Mobilfunk- und Glasfasernetzen schneller stattfinden kann. Das
  BMDS unterstützt den Glasfaserausbau zusätzlich mit der vereinfachten Gigabitförderung
  . Die Bundesregierung will Deutschland zu einem attraktiven und führenden Standort
  für Rechenzentren weiterentwickeln. Leistungsstarke Rechenkapazitäten sind die Grundlage
  für digitale und auf Künstlicher Intelligenz basierender Dienstleistungen und Innovationen.
  Die vorgelegte Rechenzentrumsstrategie bündelt Ziele und Maßnahmen, damit sich die
  IT -Anschlussleistung von Rechenzentren in Deutschland bis 2030 gegenüber 2025 verdoppelt
  – und die Anschlussleistung für High Performance Computing (HPC) und KI mindestens
  vervierfacht. Weitere Projekte unter Federführung des BMDS zeigen, wie Deutschland
  mit digitalen Lösungen und Künstlicher Intelligenz moderner, schneller und alltagstauglicher
  wird: Wie der Staat schlanker, bürgernäher und verständlicher werden kann, zeigt
  das Beispiel der Deutschland- App . Die App wurde innerhalb von nur zwei Monaten
  entwickelt. Derzeit wird sie noch intern getestet. Ab Sommer 2026 vollziehen die
  Kommunen den Praxis-Test, bevor die Bürger- App dann im Laufe des darauffolgenden
  Jahres allen Menschen in Deutschland zur Verfügung stehen soll. Bürgerinnen und
  Bürgern wird in vielen Belangen der Behördengang erspart werden. In Zukunft können
  Bürgerinnen und Bürger beispielsweise die Wohnsitzanmeldung einfach über die Deutschland-
  App per Smartphone erledigen. Damit das technisch möglich ist, arbeitet im Hintergrund
  der App eine KI -basierte Verwaltungsplattform. Von den derzeit 8.500 Verwaltungsdienstleistungen
  in Deutschland werden Schritt für Schritt immer mehr Services über die Deutschland-
  App angeboten werden. Zum Funktionieren der App trägt Künstliche Intelligenz bei;
  sie identifiziert, katalogisiert und analysiert. Eng verbunden mit der Deutschland-
  App ist die EUDI - Wallet , eine digitale Brieftasche. Dabei handelt es sich um
  ein europäisches Projekt, das Deutschland nun umsetzt. Die Wallet ist ein europäischer
  Identitätscontainer für verschiedene persönliche Nachweise. Der Personalausweis
  wird als "digitaler Zwilling" in der Wallet hinterlegt sein. Nutzerinnen und Nutzern
  können sich mit der EUDI - Wallet schnell und einfach zum Beispiel bei Online -Einkäufen,
  für den Abschluss von Handy -Verträgen oder auch bei der Autovermietung digital
  ausweisen. Die Wallet erfüllt höchste Sicherheitsstandards und ist nutzerfreundlich.
  Perspektivisch können immer mehr persönliche Dokumente, wie die Geburtsurkunde,
  der Führerschein oder auch Fahrtickets abgespeichert werden. Ab dem 2. Januar 2027
  soll sie in Deutschland verfügbar sein. Um effizienter in Deutschland zu werden,
  müssen komplexe Plan- und Genehmigungsverfahren vereinfacht und beschleunigt werden.
  Davon profitieren alle in Deutschland – auch die Wirtschaft. Im Projekt SPARK hat
  das BMDS KI -Module entwickeln lassen, die komplexe verwaltungsrechtliche Planungs-
  und Genehmigungsverfahren unterstützen. Die KI -Assistenz übernimmt typische Kernaufgaben
  und entlastet Behörden. Damit trägt sie dazu bei, dass zum Beispiel Straßen und
  Wohnungen schneller genehmigt und gebaut werden können. Eine Agentische KI wird
  beispielsweise bei Planfeststellungsverfahren für Autobahnen den Verwaltungsaufwand
  vereinfachen. Sie prüft dabei, ob alle wichtigen Unterlagen vorliegen und vollständig
  sind. Der KI fällt schnell auf, wenn Dokumente lückenhaft ausgefüllt sind oder gänzlich
  nachgereicht werden müssen. Dabei übernimmt die Agentische KI aber niemals ganz
  den Verwaltungsvorgang. Mitarbeitende in den Behörden treffen letztendlich die finale
  Entscheidung stets selbst. Die KI erleichtert ihre Arbeit, wird aber auch zukünftig
  ihre Arbeitskraft nicht ersetzen können.'
