date: '2026-05-12'
type: press_release
source_name: german_chancellery
title: Rede von Bundeskanzler Merz beim 23. Bundeskongresses des Deutschen Gewerkschaftsbundes
  Den Sozialstaat zukunftsfähig machen
text: 'Bundeskanzler Merz betonte beim Bundeskongress des DGB , dass es bei den geplanten
  Reformen der Bundesregierung auch auf Zusammenarbeit ankomme. In seiner Rede beim
  23. Ordentlichen Bundeskongresses des Deutschen Gewerkschaftsbundes ( DGB ) warb
  Bundeskanzler Friedrich Merz für tiefgreifende Reformen. Die Lage sei in doppelter
  Hinsicht herausfordernd, denn „geoökonomische Umwälzungen“ stießen auf „aufgestaute
  strukturelle Probleme“. Das ergebe einen enormen Handlungsdruck für Politik, Gesellschaft
  und Unternehmen. „ Die Verantwortung der Politik insgesamt für alle Menschen in
  unserem Land bleibt da natürlich unberührt“, so Kanzler Merz. „Aber miteinander
  zu reden, miteinander nach Lösungen zu suchen, das war noch nie ein falscher Weg.“
  Der Reformprozess gelinge nur, wenn „wir unter Kompromissen an einem Strang ziehen,
  wie es in der sozialen Marktwirtschaft und in der Sozialpartnerschaft in unserem
  Land schon so oft und so erfolgreich in den vergangenen Jahrzehnten gelungen ist“,
  sagte der Bundeskanzler. „ Es müssen alle mittun und bereit sein, Verlust und Gewinn
  mit einem Blick auf das Wohl des Ganzen unseres Landes abzuwägen.“ Der 23. Ordentliche
  Bundeskongress des Deutschen Gewerkschaftsbundes ( DGB ) tagt vom 10. bis 13. Mai
  2026 in Berlin. Unter dem Motto „Stärker mit uns“ beraten die Delegierten über den
  Kurs für die kommenden Jahre. Sehr geehrte Frau Vorsitzende, sehr geehrte Frau Fahimi,
  sehr geehrte liebe Frau Hannack, Herr Körzell, Frau Piel, sehr geehrte Vertreterinnen
  und Vertreter der deutschen Gewerkschaften, liebe Kolleginnen und Kollegen aus dem
  Deutschen Bundestag, sehr geehrte internationale Gäste, meine Damen und Herren,
  herzlichen Dank für die freundliche Begrüßung heute Morgen auf Ihrem Gewerkschaftskongress!
  Zunächst Ihnen, Frau Fahimi, und Ihren wiedergewählten und gewählten Kolleginnen
  und Kollegen herzlichen Glückwunsch zu Ihrer Wahl und alles Gute für Ihre Arbeit
  in den nächsten vor Ihnen und uns gemeinsam liegenden Jahren! Ich sage das aus wirklich
  innerer Überzeugung, weil ich mich darüber freue. Ich werde gleich noch in einem
  anderen Zusammenhang dazu etwas sagen. Es finden ja in diesen Tagen auch weitere
  Wahlen statt, die für die DGB -Gewerkschaften ebenso wichtig sind. Es laufen bis
  Ende Mai die Betriebsratswahlen. Ich will die Gelegenheit nutzen, allen neu gewählten
  und wiedergewählten Betriebsrätinnen und Betriebsräten hier im Raum ebenfalls herzlich
  zu gratulieren. Wenn ich es bis jetzt richtig sehe, dann liegt die Wahlbeteiligung
  in diesem Jahr höher als vor vier Jahren. Das ist ein erfreuliches Zeichen. Es hat
  Ursachen. Meine Damen und Herren, die bisherigen Ergebnisse sind für Sie, für die
  DGB -Gewerkschaften, ja auch insgesamt sehr positiv. So zum Beispiel, wenn ich die
  Zahlen richtig lese: 80 Prozent der Mandate in der Metall- und Stahlindustrie gingen
  bisher an die IG Metall, Frau Benner. Auch die IG BCE hat in ihrem Organisationsbereich,
  Herr Vassiliadis, als stärkste Kraft Erfolg gehabt. Ich gratuliere Ihnen dazu. Ich
  sage es auch aus einer bestimmten persönlichen Überzeugung. Ich bin und bleibe ein
  Befürworter des Prinzips der Einheitsgewerkschaft, wissend, dass das seit einigen
  Jahren nicht mehr so selbstverständlich ist. Wir haben in den Betrieben heute zum
  Teil konkurrierende Gewerkschaften, und wir haben auch Konkurrenz von einer Seite,
  die Sie und wir nicht wollen. Deswegen gratuliere ich Ihnen besonders zu diesem
  Erfolg, den Sie da erzielt haben. Meine Damen und Herren, wir feiern auch in diesem
  Jahr 50 Jahre Mitbestimmungsgesetz. Dieses Gesetz ist und bleibt eine der tragenden
  Säulen der sozialen Marktwirtschaft, denn diese soziale Marktwirtschaft verbindet
  eben Markt und Wettbewerb mit Sozialversicherung, Mitbestimmung und Tarifautonomie.
  Alle diese Elemente zusammen sorgen dafür, dass wirtschaftlicher Erfolg in unserem
  Land möglich ist und dass er vor allem zum allgemeinen Wohlstand unseres Landes
  beiträgt. Es gibt keine starke Wirtschaft ohne starke Unternehmen. Es gibt keine
  starke Wirtschaft ohne starke Arbeitnehmerinnen und Arbeitnehmer, und es gibt keine
  starke Wirtschaft ohne deren wirkungsvolle Vertretung. Ohne Sie geht es also nicht,
  meine Damen und Herren – und dazu möchte ich mich ausdrücklich bekennen. Denn Mitbestimmung
  ist gelebte Demokratie im betrieblichen Alltag. Das sage ich als jemand, der in
  seinem Berufsleben überwiegend gute Erfahrungen mit mitbestimmten und in mitbestimmten
  Unternehmen gesammelt hat. Das ist eine Stärke unseres Landes. Denn Geschäftsführungen
  und Betriebsräte, Anteilseigner und Arbeitnehmervertreter wissen am besten und in
  der Regel besser als die Politik, was in Betrieben funktioniert, was Beschäftigte
  bei der Arbeit unterstützt und was zugleich die Unternehmen als Ganze wirtschaftlich
  erfolgreich macht. Wir wollen deshalb in dieser Wahlperiode des Deutschen Bundestages
  und in unserer Amtszeit die betriebliche Mitbestimmung weiter stärken. Wir wollen,
  das wissen Sie, dass Online -Betriebsversammlungen möglich sind. Es sollen Online
  -Betriebsratssitzungen als Alternative zu Präsenzformaten ermöglicht werden, und
  wir wollen auch, dass Betriebsratswahlen online durchgeführt werden können. Wir
  stärken in der Koalition Tarifbindung und tarifliche Strukturen. Das ist etwas,
  wir wissen es, was beide Sozialpartner wollen. Das Bundestariftreuegesetz ist gerade
  in diesen Tagen in Kraft getreten. Es stellt sicher, dass die Vertragspartner des
  Bundes bei der Ausführung öffentlicher Aufträge nach Tarif bezahlen. Das war eine
  langjährige Forderung von Ihnen, des Deutschen Gewerkschaftsbundes. Wir haben das
  in ein entsprechendes Gesetz umgesetzt, und jetzt wurde es in Kraft gesetzt, meine
  Damen und Herren. Sie sehen an diesem Beispiel: Sie werden in unserem Land gehört.
  Sie haben immer Gelegenheit, Ihre Positionen, Ihre Meinung einzubringen, auch bei
  den Dialogen und den sogenannten Gipfeln, die wir im Bundeskanzleramt schon hatten,
  zum Beispiel zum Stahl, zur Automobilindustrie und zur chemischen Industrie. Über
  allem steht: Wir brauchen diese gemeinsame Suche nach Wegen, die unser Land insgesamt
  voranbringen. Dieses Miteinander von Staat und Sozialpartnern hat sich in der Vergangenheit
  in unserem Land immer wieder bewährt. Die Verantwortung der Politik insgesamt für
  alle Menschen in unserem Land bleibt da natürlich unberührt. Aber miteinander zu
  reden, miteinander nach Lösungen zu suchen, das war noch nie ein falscher Weg. Ich
  danke Ihnen allen auch für Ihre Beteiligung an dieser Art des gemeinsamen Suchens
  und Ringens nach Lösungen. Meine Damen und Herren, den besten gemeinsamen Weg zu
  finden, das muss uns gerade heute wieder gelingen. Denn die Lage – Frau Fahimi,
  Sie haben es angesprochen – ist herausfordernd und sie ist anspruchsvoll. Sie ist
  es gleich in doppelter Hinsicht: Wir sehen geoökonomische Umwälzungen, die auf aufgestaute
  strukturelle Probleme stoßen. Zusammen ergibt das einen Handlungsdruck, der wohl
  seit Jahrzehnten für Politik, Gesellschaft und Unternehmen nicht mehr so groß wie
  gegenwärtig war. Wir alle spüren das in diesen Wochen und Monaten: Um uns herum
  sortiert sich die Welt neu. Sie tut das nicht langsam, gemächlich und überschaubar.
  Sie tut das eruptiv. Sie tut es zum Teil höchst unfreundlich und unfriedlich, und
  sie tut es vor allem rasend schnell. Wir werden zum Teil im Wochenrhythmus mit neuen
  Krisenlagen konfrontiert, deren Gesicht sich zum Teil auch mehrfach am Tag ändert.
  Das alles lässt sich für uns als Bundesrepublik Deutschland nicht draußen halten
  oder in ein Gebiet namens Außenpolitik auslagern, für das dann einige Experten zuständig
  sind. Es betrifft uns unmittelbar, es betrifft uns hierzulande, es schadet uns zum
  Teil, und es zeigt, dass auch wir uns verändern müssen. Steigende Energiepreise,
  steigende Produktionskosten, steigende Lebenshaltungskosten für die Familien, steigende
  Bürokratiekosten für die Betriebe, dazu Sorgen um die Arbeitsplätze, das ist heute
  die Realität in vielen Unternehmen, für viele Familien, für die Menschen in unserem
  Land – und das spüren auch Sie, meine Damen und Herren. Wir haben ganz konkret die
  Auswirkungen des Krieges im Iran zu beurteilen und zu bewerten. Wir haben einiges
  kurzfristig abgefedert, mit Maßnahmen etwa zur Dämpfung der steigenden Energiepreise.
  Aber der Staat kann die Bürger und die Unternehmen nicht vor allen Verwerfungen,
  die wir erleben, schützen. Wir können vorübergehende Preisspitzen abfangen, und
  das haben wir auch getan. Wir haben auch institutionell dafür gesorgt, dass zum
  Beispiel das Bundeskartellamt mit einer verschärften Missbrauchsaufsicht die Möglichkeit
  bekommt, auffällige Preiserhöhungen besser zu überprüfen und gegebenenfalls auch
  sanktionieren zu können. Das Bundeskartellamt nutzt diese Möglichkeiten. Wichtiger
  aber ist, meine Damen und Herren – lassen Sie mich das offen ansprechen –: Wenn
  wir unseren Wohlstand langfristig erhalten wollen, wenn wir Freiheit und Frieden
  in unserem Land langfristig sichern wollen, dann müssen auch wir selbst uns ändern.
  Denn es sind nicht nur die äußeren Krisen, die uns zusetzen. Die Herausforderungen
  sind auch deshalb so groß, weil wir uns selbst über viel zu lange Zeit hinweg Probleme
  bereitet haben, die wir nun lösen müssen. Wir haben es schlicht versäumt, unser
  Land zu modernisieren. Dies rächt sich nun im Schatten der großen Transformationskräfte;
  ich nenne nur die Demografie und die Digitalisierung. Deutschland muss sich also
  aufraffen. Deutschland muss die strukturellen Probleme angehen, die wir seit vielen
  Jahren vor uns herschieben und die damit stetig größer geworden sind. Sie wissen
  es, wir wissen es alle: Unsere wirtschaftliche Entwicklung stagniert seit Jahren,
  seit mindestens sieben Jahren, während andere Länder um uns herum wachsen, zum Teil
  sehr deutlich. Für die kommenden Jahre sagt man uns heute ein sogenanntes Potenzialwachstum
  von weniger als einem halben Prozent voraus. Meine Damen und Herren, das ist für
  unser Land, das ist für unseren Wohlstand, das ist für unsere Volkswirtschaft einfach
  zu wenig. Damit auch dies klar gesagt wird: Wirtschaftswachstum für sich genommen
  ist kein Selbstzweck, sondern ist Voraussetzung für den Wohlstand unseres Landes.
  Ohne Wachstum gibt es keine neuen Arbeitsplätze. Ohne Wachstum gibt es keine Steuereinnahmen
  des Staates, mit denen wir dann Straßen, Schienen, Schulen, Universitäten bauen
  können, mit denen wir innere und äußere Sicherheit finanzieren können. Ohne Wachstum
  gibt es auch keinen leistungsfähigen Sozialstaat, keine gute Gesundheitsversorgung,
  keine auskömmliche Rente. Meine Damen und Herren, damit ist der Befund klar: Wir
  bewegen uns in Deutschland seit Jahren weit unter unseren Möglichkeiten. Die gute
  Nachricht ist: Wir können das ändern. Wir können das ändern, wenn wir wieder lernen
  – ich sage das übrigens vor Unternehmensvertretern genauso wie heute hier vor Ihnen
  –, wir können das ändern, wenn wir endlich wieder gemeinsam anerkennen, dass unternehmerische
  Leistung und Initiative überhaupt erst die Voraussetzungen dafür sind, dass die
  marktwirtschaftliche Ordnung in unserem Land gedeiht. Wir müssen unternehmerische
  Initiative ermöglichen, wir dürfen ihr nicht mit grundsätzlichem Misstrauen begegnen.
  Wir können das zweitens ändern, wenn wir auch die arbeitenden Menschen in unserem
  Land wieder mehr in den Blick nehmen und auch sie entlasten. Meine Damen und Herren,
  wir können es schließlich ändern, wenn wir endlich auch auf die Altersstruktur unserer
  Gesellschaft blicken und die notwendigen Schritte für die nachhaltige Finanzierung
  unserer sozialen Sicherungssysteme unternehmen. Ich sage es deshalb immer wieder:
  Wir können nicht einfach so weitermachen wie in den letzten 20 Jahren. Wir müssen
  bereit sein zu Veränderungen, um zu erhalten, was uns in unserem Land gemeinsam
  wichtig ist. Ich will auch das sagen: Die leider mittlerweile jährlich über 100.000
  Industriearbeitsplätze fallen in Deutschland ja nicht deshalb weg, weil wir unsere
  Standortbedingungen in dieser sich so dramatisch ändernden Welt gerade gründlich
  genug neu aufgestellt haben. Sie fallen weg, weil wir genau das jetzt zu lange schon
  nicht getan haben. Lassen Sie uns das also als Land endlich gemeinsam tun, vernünftig
  und gemeinsam! Natürlich kann man dabei auch auf der Bremse stehen. Das ist auch
  eine Position. Aber, meine Damen und Herren, der Platz, von dem aus man unser Land
  zum Guten gestaltet, ist nicht die Bremse. Wir müssen wirtschaftlich stärker werden,
  und davon hängt schließlich alles ab. Geopolitische, geoökonomische und soziale
  Sicherheit kann es nur mit wirtschaftlicher Stärke geben. Wir können, um es noch
  deutlicher zu sagen, die sozialen Versprechen, die wir uns ja geben wollen und die
  wir uns auch gegeben haben, nur halten, wenn wir wirtschaftlich wieder stark werden.
  Nun, meine Damen und Herren, bin ich so unbescheiden, darauf hinzuweisen, dass wir
  seit etwa einem Jahr, seit dem Amtsantritt der von mir geführten Bundesregierung,
  in diesem Wissen auch handeln. Ich sehe uns, ich sehe die Regierung und ich sehe
  unser Land in einem Reformprozess, mit der Betonung auf beiden Worthälften, Reform
  und Prozess, einem Prozess, der, wie es in einer Demokratie richtig und üblich ist,
  diskutierend und, alles in allem, in einem bewährten Tempo der parlamentarischen
  Demokratie vor sich geht. Ich will einige Felder dieser Reformen und dieses Reformprozesses
  nennen. Ich habe es schon einige Male gesagt: Unsere Probleme bei der Wettbewerbsfähigkeit
  unserer Volkswirtschaft sind vor allem Probleme der preislichen Wettbewerbsfähigkeit.
  Die Kosten in unserem Land sind zu hoch, und ich meine damit ausdrücklich, und ich
  will es hier sagen, so wie an anderer Stelle auch: Das sind nicht die Nettolöhne.
  Aber es sind die Steuern und Abgaben, es sind die Energiekosten, es sind die Bürokratiekosten.
  Alles das kostet in unserem Land Arbeitsplätze. Machen wir weiter wie bisher, haben
  wir in den nächsten zehn Jahren einen Anstieg der Sozialversicherungsbeiträge auf
  knapp 50 Prozent. Meine Damen und Herren, wir wollen das verhindern. Es geht aber
  nicht um Sozialabbau, es geht um Reformen, und diese Reformen sollen uns zukunftsfähig
  machen. Sie sollen vor allem der jungen Generation neue Chancen eröffnen. Reformen
  sollen Jobs erhalten und neue Jobs schaffen. Darum geht es. Deshalb planen wir die
  Einsparungsmaßnahmen im Bereich der gesetzlichen Krankenversicherung. Hier sind
  die Ausgaben in den letzten zehn Jahren deutlich stärker gestiegen als die Einnahmen,
  ohne dass dem ein Mehr an Leistung oder Qualität gegenübersteht. Unser Gesetzentwurf,
  vor zwei Wochen im Kabinett verabschiedet, bedeutet, dass die Beitragssätze in der
  gesetzlichen Krankenversicherung für lange Zeit stabil bleiben können. Wir schaffen
  damit für lange Jahre Sicherheit, meine Damen und Herren, für die Menschen, für
  die, die in diesem System arbeiten, für die Unternehmen, für den Mittelstand, für
  die Arbeitnehmerinnen und Arbeitnehmer. Dieses Paket verlangt allen etwas ab, allen,
  meine Damen und Herren. Alle müssen ihren Beitrag leisten: Leistungserbringer, Hersteller,
  Versicherte, Arbeitgeber und Krankenkassen. Wir, meine Damen und Herren, begrenzen
  die Ausgaben in allen Bereichen. Auf der Einnahmenseite sind die Vorschläge maßvoll.
  Zuzahlungen etwa binden wir an die Preisentwicklung, so wie wir das jetzt 20 Jahre
  nicht getan haben. Belastungsgrenzen bleiben bestehen und sorgen dafür, dass Versicherte
  nicht unzumutbar belastet werden. Auch, meine Damen und Herren, die beitragsfinanzierte
  Mitversicherung bleibt im Grundsatz bestehen, wird aber modifiziert, wobei bestehende
  Betreuungspflichten berücksichtigt bleiben. Das alles wird für viele spürbar sein,
  aber es ist notwendig, um die Versorgung zu sichern und die Beitragslast für die
  Unternehmen, für Arbeitgeber und Sie, für die Arbeitnehmerinnen und Arbeitnehmer
  in unserem Land, zu begrenzen. Wir haben damit diese Säule unseres Sozialstaats
  jetzt so aufgestellt, dass sie stabil bleiben kann, und wir wenden uns genauso den
  anderen Säulen zu. Für jeden, der es sehen will, ist das ein Zeichen, meine Damen
  und Herren: Die Koalition ist entscheidungswillig, und sie ist entscheidungsfähig.
  Wir können Kompromisse. Wir werden das für die Pflege noch im Mai fortsetzen und
  auch hier die Finanzen auf eine stabile Grundlage stellen. Schließlich wird das
  härteste Brett sicherlich die Reform der gesetzlichen Rentenversicherung sein. Die
  eingesetzte Expertenkommission wird dazu in wenigen Wochen ihre Vorschläge vorlegen.
  Wir werden dann im Sommer auch hier die notwendigen politischen Entscheidungen treffen.
  Meine Damen und Herren, das alles ist keine Bösartigkeit von mir oder von der Bundesregierung.
  Ja, meine Damen und Herren, das ist Demografie und Mathematik, und es übersteigt
  ganz einfach die Kräfte von zwei Beitragszahlern, wenn sie in Zukunft eine Person
  in der Rente finanzieren sollen. Deshalb werden wir und müssen wir die beiden kapitalgedeckten
  Säulen der Alterssicherung stärken. Wenn wir es richtig machen, und wir werden es
  richtig machen, dann werden wir im Übrigen eine bis heute nicht eingelöste Reformidee
  der katholischen Soziallehre umsetzen, nämlich die bessere Beteiligung der Arbeitnehmerinnen
  und Arbeitnehmer am Produktivvermögen unserer Volkswirtschaft und an der Vermögensentwicklung
  der Volkswirtschaften weltweit. Meine Damen und Herren, diese Beteiligung ist nur
  möglich über die Beteiligung an den Entwicklungen auch auf den Kapitalmärkten. Wir
  haben das bereits im Vorgriff auf die Rentenreform mit einem Altersvorsorgedepot
  ermöglicht, das am 1. Januar 2027 in Kraft treten wird. Das Gesetz ist verabschiedet,
  genauso wie schon zum 1. Januar 2026 die Aktivrente in Kraft getreten ist, mit der
  ältere Arbeitnehmerinnen und Arbeitnehmer einen hohen wirtschaftlichen Anreiz bekommen,
  länger in ihren Betrieben zu bleiben, nachdem wir auch das gesetzliche Vorbeschäftigungsverbot,
  das bis dahin bestand, abgeschafft haben. Meine Damen und Herren, schauen wir nach
  Skandinavien und in viele andere Länder in Europa, die das alles längst gemacht
  haben. Schauen wir aber bitte auch auf den einen oder anderen Tarifvertrag, den
  Sie in Ihren Reihen in diese Richtung geschlossen haben. Deswegen will ich es noch
  einmal sagen: Diese Reformvorhaben sind keine Bedrohung, sondern sie sind eine große
  Chance. Sie sind eine große Chance, meine Damen und Herren. Drei starke Säulen –
  gesetzlich, betrieblich und privat – werden in ein neues Verhältnis zueinander treten
  und zusammen, so haben wir es im Koalitionsvertrag geschrieben, ein verlässliches
  Gesamtversorgungsniveau ergeben, das insgesamt höher sein wird, als es allein die
  gesetzliche Rente erreichen kann, und das, meine Damen und Herren, gilt in Zukunft
  vor allem für diejenigen, die wie die meisten Arbeitnehmerinnen und Arbeitnehmer
  im Osten praktisch gar keine oder nur eine sehr geringe zusätzliche Altersversorgung
  haben. Nur so bleibt die Altersversorgung auf Dauer sicher. Meine Damen und Herren,
  damit auch dies klar ist: Niemand in diesem Land schlägt Kürzungen der gesetzlichen
  Rente vor. Sie wären im Übrigen auch gar nicht zulässig. Es gibt umgekehrt aber
  auch keinen nachhaltigen Wohlstand, wenn diejenigen, die ihn erarbeiten, nicht auch
  auf diese Weise an ihm teilhaben. Deshalb wollen wir und werden wir das machen.
  Reform heißt nämlich, meine Damen und Herren, Gewinn für alle, auch für die Arbeitnehmerinnen
  und Arbeitnehmer in Deutschland. Das gilt schließlich auch für die Empfehlungen
  der Sozialstaatskommission, die ihre Vorschläge Anfang des Jahres vorgelegt hat
  und deren Vorschläge wir umsetzen wollen. Es geht hier um eine grundlegende Neuordnung
  von Sozialleistungen hin zu einem einfachen, einheitlichen, weitgehend digitalen,
  effizienten System. Ein Konzept dafür werden wir noch in diesem Jahr vorlegen, und
  auch das wird eine der tiefgreifendsten Reformen unseres Sozialstaates. Meine Damen
  und Herren, mein Vorgänger im Amt hat am 9. Mai 2022, also vor ziemlich genau vier
  Jahren und kurz nach dem Beginn des Ukrainekrieges, vor diesem Gremium die Zusage
  gegeben, dass die weltpolitischen Veränderungen, die er damals zu Recht als Zeitenwende
  bezeichnet hat, keine Auswirkungen auf die Sozialpolitik und keine Auswirkungen
  auf die Situation der Arbeitnehmerinnen und Arbeitnehmer in Deutschland haben werden.
  Auch wenn es schwierig ist, muss ich Ihnen heute sagen, dass diese Zusage zumindest
  zu optimistisch war. Die Realität ist, dass sich heute niemand mehr den Veränderungen
  entziehen kann und diese Veränderungen auch sehr praktische Auswirkungen auf die
  wirtschaftliche Situation eines jeden Einzelnen haben. Wir werden jetzt Prioritäten
  setzen müssen. Wir werden nicht mehr alles gleichzeitig machen können. Deshalb erwarte
  ich auch von den verantwortungsvollen Repräsentanten der deutschen Wirtschaft wie
  von der Arbeitnehmerschaft eine Offenheit für Veränderungen. Nur wenn wir Prioritäten
  setzen, meine Damen und Herren, können wir unseren Sozialstaat auch erhalten, auf
  den wir ja auch alle, so hoffe ich jedenfalls, zu Recht stolz sind. Nun höre ich
  in diesen Tagen, dieser Sozialstaat solle als Ballast abgeworfen werden. Ich weiß
  nicht, vor wem und was da gewarnt werden soll. Ich will es für mich und für die
  ganze Bundesregierung jedenfalls sagen: Mit mir wird das nicht geschehen. Aber den
  notwendigen Reformprozess, meine Damen und Herren, gehen wir weiter. Wir gehen ihn
  weiter, um unseren Sozialstaat zukunftsfähig zu machen und um ihn im Kern zu erhalten.
  Meine Damen und Herren, der Weg dieses nötigen Reformprozesses, auf den wir uns
  vor einem Jahr begeben haben, betrifft natürlich viele weitere Politikfelder. Ich
  kann heute nicht über alle sprechen, aber einige Stichworte erlauben Sie mir dennoch
  zu nennen. Wir haben in der Energiepolitik umgesteuert. Mit unserer neuen realistischen
  und pragmatischen Energiepolitik können wir die Preise in den Griff bekommen. Wir
  führen Regulierung zurück, beseitigen Hürden für unternehmerische Initiative und
  modernisieren Staat und Verwaltung auf der Bundesebene und auch auf der Ebene der
  Länder und Gemeinden, mit denen wir zusammen eine ehrgeizige Föderale Modernisierungsagenda
  erstellt haben. Wir investieren in beispiellosem Umfang in Infrastruktur und Klimaneutralität,
  auch massiv in die digitale Infrastruktur unseres Landes. Ich nenne Ihnen nur ein
  Beispiel. Mit der gerade beschlossenen Rechenzentrumsstrategie planen wir, bis zum
  Jahr 2030 die Rechenkapazität in Deutschland im Vergleich zum Jahr 2025, also innerhalb
  von fünf Jahren, zu verdoppeln. Das schafft neue Arbeitsplätze und bedeutet, dass
  unser Land die Chancen der digitalen Transformation auch ergreifen kann. Wir schaffen
  damit wirklich bessere Bedingungen für Innovation und technologische Entwicklung.
  Die Hightech Agenda Deutschland mit ihrer Konzentration auf Wettbewerbsfähigkeit,
  Wertschöpfung und Souveränität wird uns hier im weltweiten Vergleich wieder dorthin
  bringen, wo wir eigentlich hingehören, nämlich sehr weit vorn. Meine Damen und Herren,
  erlauben Sie mir, dass ich zum Schluss noch einmal das etwas größere Bild zeichne.
  Das, was in unserem Land jetzt geschehen muss und womit wir vor einem Jahr begonnen
  haben, ist lange Jahre – ich habe es gesagt –, vielleicht Jahrzehnte liegen geblieben.
  Es ist liegen geblieben, und wir müssen es jetzt tun. Mein Anspruch ist: Das, was
  wir jetzt tun, muss möglichst für Jahre, am besten für ein Jahrzehnt tragen. Das
  heißt auch, es muss von der Mehrheit der Bürgerinnen und Bürger unseres Landes mitgetragen
  werden. Denn alle werden etwas geben müssen, und dafür werden wir viel bekommen,
  nämlich gemeinsame Zukunft, Stabilität und Sicherheit für unser Land und für unsere
  freiheitliche Lebensweise in einer sich grundlegend verändernden Welt. Denn dafür
  tun wir das. Ich will unser Land mit Ihnen, mit allen, in eine Zukunft führen, in
  der das Lebensgefühl wieder stimmt, ein Gefühl der Freiheit, den eigenen Weg zu
  gehen und Erfolg zu haben, ein Gefühl der Sicherheit, in einer wachsenden Wirtschaft
  seinen Platz zu finden und im Alltag die Dinge für sich und die Familie auch wirklich
  stemmen zu können, und das alles in der Gewissheit, dass wir uns als Land in Europa
  gegen jeden Versuch verteidigen können, uns und unser freiheitliches Lebensmodell
  anzugreifen. Meine Damen und Herren, angesichts der Größe dieser Aufgabe kommt es
  nicht allein auf die Regierung an. Es müssen alle mittun und bereit sein, Verlust
  und Gewinn mit einem Blick auf das Wohl des Ganzen unseres Landes abzuwägen. Auch
  wenn es der eine oder andere kritisch sieht, beteiligen Sie sich daran, wo Sie es
  tun können! Ihre Stimme gehört in dieser vielfältigen Diskussion, die unsere Demokratie
  ausmacht, dazu. Wir wollen in unserer Demokratie den Ausgleich aller Interessen
  und Gesichtspunkte. Beteiligen Sie sich wie bisher konstruktiv an dieser Arbeit
  von Kompromissen! Im Verhältnis zu dem großartigen Maß an sozialer Sicherheit, das
  wir in unserem Land schon haben und das wir für die Zukunft erhalten wollen, sind
  die Veränderungen, zu denen wir heute bereit sein müssen, nicht zu groß. Das Potenzial
  dafür in unserem Land ist vorhanden. Unser Land ist stark. Wir haben viel Fleiß,
  viel Wissen, eine großartige industrielle Substanz, einen starken Mittelstand, aktive,
  engagierte Arbeitnehmerinnen und Arbeitnehmer. Die Hannover Messe vor wenigen Wochen,
  wenn ich darauf noch einmal kurz zu sprechen kommen darf – ich sehe einige, die
  auch da gewesen sind –, hat uns doch gezeigt, wie viel Innovationsfähigkeit und
  Innovationsbegeisterung in unserem Land vorhanden ist, gerade auf dem Feld der industriellen
  KI , die zu ganz anderen Wertschöpfungsmöglichkeiten beiträgt, mehr jedenfalls,
  als wir bisher erahnt haben. Ich war zugleich davon beeindruckt, wie viele junge
  Menschen Unternehmen in Deutschland gründen. Wir haben im Jahr 2025 die höchste
  Zahl an Unternehmensgründungen in der Start-up -Szene seit Jahren gehabt. Das ist
  ein Ausdruck von Zuversicht und von Mut, auch die Zukunft in Deutschland zu gestalten.
  Zu diesem großen Potenzial, meine Damen und Herren, gehören auch Sie, die Arbeitnehmerinnen
  und Arbeitnehmer, die Gewerkschaften, die Betriebsräte. Ohne Sie können wir dieses
  Potenzial nicht entfalten. Zu diesem Potenzial gehören die Unternehmen genauso wie
  die Handwerker, Pflegekräfte, Erzieher, Lehrerinnen und Lehrer und Wissenschaftler,
  alle, die an den Chancen des Einzelnen und am Miteinander in unserem Land arbeiten.
  Wir wollen das alles bewahren und in die Zukunft führen. Natürlich, bei allem, was
  wir vorschlagen, wird es immer auch kritische Stimmen geben, wie auch nicht! Aber,
  meine Damen und Herren, ich bitte alle Teilnehmer an dieser Debatte um Fairness
  und um den Blick aufs Ganze, um den Blick auf das Wohl unseres Gemeinwesens nicht
  zu verstellen. Dieser Prozess gelingt nur, wenn wir bei aller Diskussion, die in
  unserem Land notwendig ist, auf das gemeinsame Wohl hin orientiert bleiben, wenn
  wir unter Kompromissen an einem Strang ziehen, wie es in der sozialen Marktwirtschaft
  und in der Sozialpartnerschaft in unserem Land schon so oft und so erfolgreich in
  den vergangenen Jahrzehnten gelungen ist. Ich möchte uns diese Kultur des Miteinanders
  erhalten. Aber ich weiß auch, dass wir um Entscheidungen, nach langen Diskussionen
  vorher, nicht herumkommen. Wir werden uns vor diesen Entscheidungen nicht drücken.
  Ich bitte Sie, auf diesem Weg konstruktiv mitzugehen, damit unser Land eine gute
  Zukunft hat und damit unsere Kinder und Enkelkinder die gleichen Chancen in den
  nächsten Jahren und Jahrzehnten in Deutschland haben wie wir, wie sie unsere Generationen
  in den letzten Jahren wahrnehmen konnten. Denn darum geht es. Es geht darum, dass
  nachfolgende Generationen in Deutschland die gleichen Chancen haben, in Freiheit,
  in Frieden, in Wohlstand und mit einem sehr hohen Maß an sozialer Gerechtigkeit
  ihr Leben zu gestalten. Dafür steht diese Bundesregierung, und dafür stehe ich auch
  ganz persönlich.'
