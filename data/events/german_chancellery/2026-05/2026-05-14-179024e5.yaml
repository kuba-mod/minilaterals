title: Speech by Chancellor Merz on the awarding of the International Charlemagne
  Prize of Aachen to Mario Draghi “Europe must assert itself today”
text: 'Chancellor Friedrich Merz recognised Charlemagne Prize winner Mario Draghi
  as a trailblazer – including with regard to Europe’s finances: an investment-oriented,
  “Draghi-approved” budget without new debt is needed, Merz said. Photo: Federal Government/Henning
  Schacht In his laudatory speech for the Italian politician Mario Draghi at the award
  ceremony for the International Charlemagne Prize in Aachen, Federal Chancellor Friedrich
  Merz portrayed a Europe that is emerging from a phase of “false optimism” and has
  to reassert itself in a world that is reorganising itself. Merz took up Draghi’s
  warning: “A Europe that cannot defend its interests will not be able to preserve
  its values in the long term.” In his laudatory speech, the Federal Chancellor described
  Mario Draghi as a decisive figure in saving the euro and an intellectual guide for
  Europe’s future. He praised his courage in the euro crisis: “You took care of the
  euro at a threatening time, and you stabilised the euro and the currency zone.”
  This has paid off, Merz said, adding that Draghi’s analyses are “relentless”, his
  recommendations “very specific” and his answers “clear and ambitious”. The Federal
  Chancellor agreed with the nickname “Super Mario” for Draghi, who was honoured with
  this year’s Charlemagne Prize. Read the transcript of the Federal Chancellor’s speech
  here :'
