title: Bundeskanzler Merz empfängt den Bundespräsidenten der Schweizerischen Eidgenossenschaft,
  Parmelin
text: Bundeskanzler Friedrich Merz wird am 19. Mai 2026 um 10 Uhr den Bundespräsidenten
  der Schweizerischen Eidgenossenschaft, Guy Parmelin, zu dessen Antrittsbesuch im
  Bundeskanzleramt begrüßen. In einem gemeinsamen Gespräch wird man sich neben der
  bilateralen Zusammenarbeit auch zu europapolitischen sowie außen- und sicherheitspolitischen
  Fragen austauschen.
