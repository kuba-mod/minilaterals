title: Joint Statement from the leaders of the United Kingdom, Italy, France, Germany,
  Canada, Australia, New Zealand, Norway, Netherlands, Spain, Belgium and the EU High
  Representative for Foreign Affairs and Security Policy on the situation in the West
  Bank
text: 'Over the past few months, the situation in the West Bank has deteriorated significantly.
  Settler violence is at unprecedented levels. The policies and practices of the Israeli
  government, including a further entrenchment of Israeli control, are undermining
  stability and prospects for a two-state solution. International law is clear: Israeli
  settlements in the West Bank are illegal. Construction projects in the E1 area would
  be no exception. The E1 settlement development would divide the West Bank in two
  and mark a serious breach of international law. Businesses should not bid for constructions
  tenders for E1 or other settlement developments. They should be aware of legal and
  reputational consequences of participating in settlement construction including
  the risk of involving themselves in serious breaches of international law. We call
  on the Government of Israel to end its expansion of settlements and administrative
  powers, ensure accountability for settler violence and investigate allegations against
  Israeli forces, respect the Hashemite custodianship over Jerusalem’s Holy Sites
  and the historic status quo arrangements, and lift financial restrictions on the
  PA and the Palestinian economy. We strongly oppose those, including members of the
  Israeli government, who argue for annexation and forcible displacement of the Palestinian
  population. We reaffirm our unwavering commitment to a comprehensive, just and lasting
  peace based on a negotiated two-state solution in accordance with relevant UN Security
  Council resolutions where two democratic states, Israel and Palestine, live side
  by side in peace and security within secure and recognized borders. Deutsche Höflichkeitsübersetzung
  Gemeinsame Erklärung der Staats- und Regierungschefs des Vereinigten Königreichs,
  Italiens, Frankreichs, Deutschlands, Kanadas, Australiens, Neuseelands, Norwegens,
  Niederlanden, Spanien, Belgien und die Hohe Vertreterin der EU für Außen- und Sicherheitspolitik
  zur Lage im Westjordanland In den letzten Monaten hat sich die Lage im Westjordanland
  erheblich verschlechtert. Die Gewalt durch Siedler hat ein noch nie dagewesenes
  Ausmaß erreicht. Die Politik und Vorgehensweise der israelischen Regierung, einschließlich
  einer weiteren Verfestigung der israelischen Kontrolle, untergraben die Stabilität
  und die Aussichten auf eine Zwei-Staaten-Lösung. Das Völkerrecht ist unmissverständlich:
  israelische Siedlungen im Westjordanland sind illegal. Bauprojekte im Gebiet E1
  wären keine Ausnahme. Die Siedlungserschließung im Gebiet E1 würde das Westjordanland
  zweiteilen und wäre ein schwerwiegender Bruch internationalen Rechts. Wirtschaftsunternehmen
  sollten sich nicht an Bauausschreibungen für das Gebiet E1 oder an anderen Projekten
  zur Siedlungserschließung beteiligen. Sie sollten sich der rechtlichen und auch
  der rufschädigenden Folgen bewusst sein, die ihre Beteiligung am Siedlungsbau hätte,
  einschließlich des Risikos, an schweren Verstößen gegen das Völkerrecht beteiligt
  zu sein. Wir fordern die Regierung Israels auf, die Ausweitung der Siedlungen und
  ihrer administrativen Kompetenzen zu beenden, die Rechenschaftspflicht für Gewalttaten
  durch Siedler sicherzustellen und Anschuldigungen gegen israelische Streitkräfte
  nachzugehen, die haschemitische Obhut über die heiligen Stätten Jerusalems und die
  historischen Status-Quo-Regelungen zu respektieren sowie die der Palästinensischen
  Behörde und der palästinensischen Wirtschaft auferlegten finanziellen Beschränkungen
  aufzuheben. Wir stellen uns entschieden denjenigen entgegen, einschließlich Mitgliedern
  der israelischen Regierung, die sich für eine Annexion des Westjordanlandes sowie
  die gewaltsame Vertreibung der palästinensischen Bevölkerung aussprechen. Wir bekräftigen
  unser unerschütterliches Bekenntnis zu einem umfassenden, gerechten und dauerhaften
  Frieden auf der Grundlage einer verhandelten Zwei-Staaten-Lösung im Einklang mit
  den einschlägigen Resolutionen des VN-Sicherheitsrats, eine Lösung, nach der zwei
  demokratische Staaten, Israel und Palästina, in Frieden und Sicherheit innerhalb
  sicherer und anerkannter Grenzen nebeneinander existieren.'
