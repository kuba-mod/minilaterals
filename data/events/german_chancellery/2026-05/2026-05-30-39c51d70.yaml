title: 'Im Bundesgesetzblatt verkündet Mehr Beratung, weniger Bürokratie: Steuerberatung
  soll modernisiert werden'
text: Das Beratungsangebot zur Steuererklärung soll erweitert und vereinfacht werden.
  Mit dem Neunten Gesetz zur Änderung des Steuerberatungsgesetzes sollen die Regelungen
  für die Steuerberatung modernisiert, vereinfacht und von Bürokratie befreit werden.
  Zugleich soll Verbraucherinnen und Verbrauchern ein breiteres Angebot eröffnet werden.
  Das Kabinett hat das Gesetz zur Änderung des Steuerberatungsgesetzes am 14. Januar
  2026 beschlossen. Der Bundestag stimmte bereits am 24. April zu. Der Bundesrat verweigerte
  jedoch seine Zustimmung aufgrund der enthaltenen Regelung für eine steuer- und sozialversicherungsfreie
  Entlastungsprämie. Der Bundestag hat daher auf Initiative der Regierungsfraktionen
  die Gesetzesänderung ohne die Entlastungsprämie beschlossen. Nach der Verkündung
  im Gesetzblatt am 29.6.2026 treten die verschiedenen Teile des Gesetzes nun nach
  und nach in Kraft, die meisten Regelungen am 1. September 2026. In einer sogenannten
  Tax Law Clinic sollen Studierende durch die unentgeltliche Steuerrechtsberatung
  für andere Studierende unter der Anleitung von qualifizierten Beraterinnen und Beratern
  eigene praktische Erfahrungen sammeln können. Das Konzept soll Studierenden eine
  praxisnahe Ausbildung ermöglichen. Zudem hat das Kabinett die Änderung weiterer
  steuerrechtlicher Vorschriften beschlossen. Eine Änderung bei der Gewerbesteuer
  soll für mehr Steuergerechtigkeit sorgen. Dazu dient die im Koalitionsvertrag vereinbarte
  Anhebung des Mindesthebesatzes für die Gewerbesteuer auf 280 Prozent. Die Änderung
  ist am 30.6.2026 in Kraft getreten.
