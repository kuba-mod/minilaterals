title: Bundeskanzler Merz empfängt den bulgarischen Ministerpräsidenten Radev
text: Bundeskanzler Friedrich Merz wird am 18. Mai 2026 um 17 Uhr den neuen bulgarischen
  Ministerpräsidenten Rumen Radev zu seinem Antrittsbesuch mit militärischen Ehren
  im Bundeskanzleramt begrüßen. In einem sich anschließenden Gespräch werden Themen
  der bilateralen Zusammenarbeit, Fragen der Europa- und der internationalen Sicherheitspolitik
  im Mittelpunkt stehen.
