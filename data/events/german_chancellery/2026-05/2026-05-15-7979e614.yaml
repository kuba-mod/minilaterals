title: Besuch des Bundeskanzlers beim Deutschen Katholikentag Wie Zukunft gelingen
  kann
text: 'Beim Deutschen Katholikentag tauschte sich Kanzler Merz zu Themen wie Teilhabe
  und Engagement, Klimaschutz sowie Nutzen und Risiken sozialer Medien aus. Bei einer
  Podiumsdiskussion beim Deutschen Katholikentag sprach Bundeskanzler Friedrich Merz
  über die Frage, wie sich die Zukunft positiv gestalten lasse. Er hob dabei die Chancen
  hervor, die es in Deutschland für junge Menschen gebe. Auf die Frage nach mehr Teilhabemöglichkeiten
  ermutigte Merz zu langfristigem Engagement, gerade auf der kommunalen Ebene, weil
  dort über viele konkrete Fragen des Zusammenlebens entschieden werde. Bundeskanzler
  Merz ging auch auf Fragen zur Klimaschutzpolitik der Bundesregierung ein. Klimaschutz
  brauche eine leistungsfähige Klimatechnologie, um wirklich weltweite Effekte zu
  erzielen, erklärte der Kanzler. Genau daran arbeite die Bundesregierung, etwa durch
  die Regelungen zur Abscheidung und Speicherung von CO 2 . Würzburg, 15. Mai 2026:
  Fünf Tage lang fand der 104. Deutsche Katholikentag in der Großstadt am Main statt.
  Kanzler Merz war am Freitag zu Besuch. Bei einer Podiumsdiskussion zum Thema „Gemeinsam
  Zukunft gestalten“ sprach er mit Jugendlichen und beantwortete Fragen aus dem Publikum.
  Merz hob dabei die Chancen hervor, die es in Deutschland für junge Menschen gebe
  und diskutierte zu Themen wie Teilhabe und Engagement, Klimaschutz und soziale Medien.
  Im Anschluss besuchte er die Kirchenmeile, die über kirchliche Projekte und Organisationen
  informiert. Der diesjährige Katholikentag brachte etwa 60.000 Menschen im Schnittfeld
  von Kirche, Gesellschaft und Politik zusammen. Leitwort in diesem Jahr ist das Bibelzitat
  „Hab Mut, steh auf“. Das Programm umfasste rund 900 Veranstaltungen, die von Gottesdiensten
  über Diskussionsforen bis hin zu Kinder- und Kulturevents reichen. Zum Abschluss
  bedankte sich der Bundeskanzler bei den vielen Freiwilligen, die zum Gelingen der
  Großveranstaltung beigetragen haben. Würzburg, 15. Mai 2026: Fünf Tage lang fand
  der 104. Deutsche Katholikentag in der Großstadt am Main statt. Kanzler Merz war
  am Freitag zu Besuch. Bei einer Podiumsdiskussion zum Thema „Gemeinsam Zukunft gestalten“
  sprach er mit Jugendlichen und beantwortete Fragen aus dem Publikum. Merz hob dabei
  die Chancen hervor, die es in Deutschland für junge Menschen gebe und diskutierte
  zu Themen wie Teilhabe und Engagement, Klimaschutz und soziale Medien. Im Anschluss
  besuchte er die Kirchenmeile, die über kirchliche Projekte und Organisationen informiert.
  Der diesjährige Katholikentag brachte etwa 60.000 Menschen im Schnittfeld von Kirche,
  Gesellschaft und Politik zusammen. Leitwort in diesem Jahr ist das Bibelzitat „Hab
  Mut, steh auf“. Das Programm umfasste rund 900 Veranstaltungen, die von Gottesdiensten
  über Diskussionsforen bis hin zu Kinder- und Kulturevents reichen. Zum Abschluss
  bedankte sich der Bundeskanzler bei den vielen Freiwilligen, die zum Gelingen der
  Großveranstaltung beigetragen haben. Weitere Podiumsteilnehmerinnen waren Lisa Quarch,
  die Geistliche Leiterin des Bundes der Deutschen Katholischen Jugend (BDKJ) sowie
  Amy Kirchhoff, Generalsekretärin der Bundesschülerkonferenz. Beide diskutierten
  mit Bundeskanzler Merz auch über Nutzen und Risiken sozialer Medien, sowie über
  Zukunftsängste, mit denen Jugendliche teilweise zu kämpfen hätten. Der Bundeskanzler
  ging dabei auf die schwierige Lage ein, der man sich in Deutschland und Europa stellen
  müsse. „Wir haben so viele Möglichkeiten, wir haben so tolle Unternehmen in Deutschland
  und in Europa“, zeigte sich Merz überzeugt. Das hätte Effekte auf den Klimaschutz
  und auf die Wirtschaft. Denn Unternehmen könnten damit Geld verdienen. „Dann wird
  daraus etwas, bei dem die Menschen mitgehen, bei dem wir das Ziel erreichen und
  gleichzeitig unseren Wohlstand sichern, und das möchte ich erreichen“, unterstrich
  der Kanzler. Im Anschluss besuchte der Bundeskanzler die Kirchenmeile des Katholikentages.
  Dort informierten etwa 250 Stände über zahlreiche kirchliche Organisationen und
  Projekte. Etwa 60.000 Menschen brachte der diesjährige Deutsche Katholikentag vom
  13. bis 17. Mai 2026 in Würzburg zusammen. Angeboten wurden etwa offene Diskussionen
  im Schnittfeld von Kirche, Gesellschaft und Politik. Das Leitwort im Jahr 2026 war
  das Bibelzitat: „Hab Mut, steh auf“. Das Programm umfasste rund 900 Veranstaltungen,
  unter anderem Gottesdienste, Diskussionsforen sowie Kinder- und Kulturevents. Veranstaltet
  wird der Katholikentag vom Zentralkomitee der deutschen Katholiken (ZdK). Gastgeber
  ist jeweils die Diözese des Austragungsortes, 2026 war es das Bistum Würzburg.'
