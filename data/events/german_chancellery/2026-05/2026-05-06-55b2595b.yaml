title: Im Kabinett beschlossen Wirtschaftliche Lage wirkt sich auf Ausbildungsmarkt
  aus
text: 'Mit einer Reihe von Initiativen trägt die Bundesregierung dazu bei, die berufliche
  Bildung zu fördern. Der im Bundeskabinett vorgestellte und beschlossene Berufsbildungsbericht
  2026 gibt einen Überblick über die Ausbildungssituation im Berichtsjahr 2025. Beleuchtet
  werden dabei sowohl langfristige Trends als auch aktuelle Herausforderungen auf
  dem Ausbildungsmarkt. Es wird deutlich: Die wirtschaftliche Lage hatte Einfluss
  auf die Ausbildungsbilanz, zugleich gibt es aber auch ermutigende Entwicklungen.
  So zeigt der Bericht einen Rückgang der neu abgeschlossenen Ausbildungsverträge
  im letzten Jahr; auch blieben 2025 mehr junge Menschen als im Vorjahr bei der Ausbildungsplatzsuche
  erfolglos. Zudem verringerte sich das Angebot an Ausbildungsstellen. Gleichzeitig
  ist die Zahl der unbesetzten Berufsausbildungsstellen deutlich gesunken. Rund 476.000
  duale Ausbildungsverträge wurden im Jahr 2025 abgeschlossen. Das entspricht einem
  Rückgang von 10.300 Verträgen (-2,1 Prozent) im Vergleich zum Vorjahr. In der schulischen
  Berufsausbildung im Gesundheits-, Bildungs- und Sozialwesen ist die Zahl der Anfängerinnen
  und Anfänger im Jahr 2025 dagegen erneut deutlich gestiegen (+3,8 Prozent). Das
  ist mit Blick auf den hohen Fachkräftebedarf in diesen Bereichen ein gutes Zeichen.
  Deutlich zurückgegangen ist das Angebot an Ausbildungsplätzen: Bundesweit wurden
  530.300 Ausbildungsstellen angeboten und damit 25.300 Stellen (-4,6 Prozent) weniger
  als 2024. Dem rückläufigen Angebot an Ausbildungsplätzen steht – wie im Vorjahr
  – eine leicht steigende Nachfrage der Bewerberinnen und Bewerber gegenüber (+0,7
  Prozent). 2025 blieben deutlich weniger Ausbildungsstellen unbesetzt: Mit 54.400
  Stellen blieben 15.000 weniger Stellen unbesetzt als im Vorjahr – ein Rückgang von
  21,6 Prozent. Gleichzeitig hatten etwa 84.400 junge Menschen zum Stichtag 30. September
  noch keinen Ausbildungsplatz gefunden und hielten deshalb ihren Vermittlungswunsch
  weiter aufrecht. Im Vergleich zum Vorjahr ist ihre Zahl um 14.000 (+19,9 Prozent)
  gestiegen. Ob die Suche nach einem Ausbildungsplatz erfolgreich verläuft oder eine
  offene Stelle besetzt werden kann, hängt laut Berufsbildungsbericht auch mit der
  Branche und der Region zusammen, in der der Ausbildungsplatz angeboten wird. So
  ist zum Beispiel die Zahl der gemeldeten betrieblichen Ausbildungsstellen in Berufen
  der Lebensmittelherstellung und des Verkaufs, der Gastronomie und im Hoch- und Tiefbau
  2025 erneut sehr viel höher als die Zahl der gemeldeten Bewerberinnen und Bewerber.
  Deutlich weniger gemeldete betriebliche Ausbildungsstellen als Bewerberinnen und
  Bewerber gab es hingegen im Friseurhandwerk, in der Softwareentwicklung, in Kfz
  -Berufen sowie in Büro- und Verwaltungsberufen. Auch regionale Unterschiede lassen
  sich feststellen: So haben es etwa Bewerberinnen und Bewerber in Berlin, Hessen
  und Nordrhein-Westfalen schwerer als in Thüringen oder Bayern. Umso mehr gilt für
  Jugendliche mit Interesse an einer Ausbildungsstelle, möglichst mobil und flexibel
  zu sein – sowohl mit Blick auf die Region als auch auf den Wunschberuf. Der demografische
  Wandel, der Fachkräftemangel sowie die digitale und ökologische Wende stellen Wirtschaft
  und Gesellschaft vor große Herausforderungen: Um diese zu bewältigen, sind Betriebe
  auf gut qualifizierten Nachwuchs angewiesen. Die Bundesregierung trägt daher mit
  einer Reihe von Initiativen dazu bei, die berufliche Bildung zu fördern sowie mehr
  junge Menschen für eine duale Ausbildung zu begeistern. Mit der neuen Qualifizierungsoffensive
  Berufliche Bildung wird – wie im Koalitionsvertrag vereinbart – das System der beruflichen
  Bildung gestärkt. Die Offensive soll die Voraussetzungen verbessern, um Fachkräfte
  zu gewinnen und zu qualifizieren. Auch der von der „Allianz für Aus- und Weiterbildung“
  organisierte „Sommer der Berufsausbildung“ soll dabei helfen, junge Menschen stärker
  für die Perspektive berufliche Bildung zu begeistern. Der „Allianz für Aus- und
  Weiterbildung“ gehören neben der Bundesregierung auch Sozialpartner und Verbände
  an.'
