source_name: german_chancellery
title: Kampagne „Das kann Deutschland“
text: 'Bürgerinnen und Bürger über die Regierungsarbeit eindeutig und anschaulich
  zu informieren – das ist das Ziel der Kampagne „Das kann Deutschland“. Die politischen
  Veränderungen sollen sichtbar werden. Vertrauen und Zuversicht in das, was unser
  Land kann, sollen gestärkt werden. Die Kampagne wird den Bürgerinnen und Bürgern
  auf Plakatwänden, als Anzeige, im Internet und auf digitalen Kanälen begegnen. Sie
  soll während der gesamten Legislaturperiode laufen. Es ist entscheidend für die
  Bundesregierung, Deutschland wieder wettbewerbsfähig, zukunftsfähig und sicherer
  zu machen. Wie das geht? Die ersten eingeleiteten Maßnahmen sollen bald wirken.
  Was haben Sie davon? Ein Beispiel ist bezahlbare Energie: Seit 1. Januar 2026 werden
  Bürgerinnen, Bürger und die Wirtschaft zusammen um rund 10 Milliarden Euro bei den
  Energiekosten entlastet. Haushalte, die Strom und Gas beziehen, können durchschnittlich
  um 160 Euro sparen. Mit 6,5 Milliarden Euro Bundeszuschuss sinken die Strom-Netzentgelte.
  Die Gasspeicherumlage fällt weg. Für 600.000 produzierende Unternehmen, Land- und
  Forstwirtschaft ist die Stromsteuer ab 2026 auf Dauer niedrig - auf europäischem
  Mindestmaß. Das hilft vielen mittelständischen Betrieben – angefangen von der Fleischerei,
  der Bäckerei über energieintensive Industrieunternehmen bis hin zum Baugewerbe.
  Mehr Fahrt aufnehmen soll der Wohnungsbau mit dem neuen Wohnungsbau-Turbo. So können
  Städte und Gemeinden künftig auf die Aufstellung eines Bebauungsplans verzichten.
  Das spart Kosten und Zeit. Die Bundesregierung will das hohe Tempo halten: dabei
  haben die Themen Staatsmodernisierung, Sicherung des Sozialstaats, Bürokratierückbau
  und Digitalisierung Priorität. Mehr Informationen zu den Themen Wirtschaft, Infrastruktur
  sowie Sicherheit und Verteidigung finden Sie hier: Die Kampagne „Das kann Deutschland“
  finden Sie nicht nur im Internet auf bundesregierung.de, sondern auch auf den digitalen
  Kanälen der Bundesregierung wie WhatsApp , Facebook und Instagram .'
