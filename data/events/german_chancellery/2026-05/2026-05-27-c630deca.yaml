title: Im Kabinett beschlossen Kampf gegen Menschenhandel stärken
text: Mit dem Gesetzentwurf will die Bundesregierung Täterinnen und Täter konsequenter
  zur Rechenschaft ziehen. Menschen­handel ist verboten, doch er gehört längst nicht
  der Vergangen­heit an. Auch in unserer Zeit ist diese Form verachtenswerter, menschlicher
  Ausbeutung in unterschiedlicher Ausprägung immer noch vorhanden. Unter Menschenhandel
  versteht im Allgemeinen das Anwerben, Befördern, Weitergeben, Beherbergen oder Aufnehmen
  von Menschen durch Gewalt oder ähnliche Mittel oder durch Ausnutzung einer bestimmten
  Schwächesituation mit dem Ziel, diese Menschen für eigene Zwecke auszubeuten. Dabei
  werden Notlagen, widrige Lebensumstände oder die Arglosigkeit der Betroffenen häufig
  in besonders niederträchtiger Art und Weise ausgenutzt. Menschenhandel kann unterschiedlichen
  Formen der Ausbeutung dienen. Häufig geht es um sexuelle Ausbeutung – etwa durch
  Zwangsprostitution – oder um Arbeitsausbeutung – etwa bei körperlich besonders belastenden
  Tätigkeiten im Niedriglohnsektor. Die Bundesregierung setzt nun mit ihrem Gesetzentwurf
  zur Stärkung der strafrechtlichen Verfolgung des Menschenhandels und der sexuellen
  Ausbeutung ein deutliches Signal zur Bekämpfung dieser „modernen Sklaverei“ und
  wird die strafrechtlichen Tatbestände inhaltlich und systematisch grundlegend überarbeiten.
  Ziel des Gesetzentwurfs ist es, den Kampf gegen Menschenhandel in Deutschland zu
  stärken und Täterinnen und Täter konsequenter zur Rechenschaft zu ziehen. Die Bundesregierung
  setzt damit die EU -Richtlinie zur Verhütung und Bekämpfung des Menschenhandels
  und zum Schutz seiner Opfer in nationales Recht um. Zukünftig sollen auch die Ausbeutungsformen
  der Leihmutterschaft, der Adoption und der Zwangsheirat erfasst sein. Damit wird
  der kontinuierlich steigenden Anzahl und Relevanz von Straftaten im Zusammenhang
  mit Menschenhandel Rechnung getragen, die zu anderen Zwecken als der sexuellen Ausbeutung
  oder der Ausbeutung von Arbeitskräften begangen werden. Der Gesetzentwurf sieht erstmals
  eine Nachfragestrafbarkeit in Bezug auf alle Ausbeutungsformen des Menschenhandels
  vor. Bislang kennt das deutsche Strafrecht eine Nachfragestrafbarkeit in Bezug auf
  Menschenhandel nur, soweit es um die Inanspruchnahme von sexuellen Dienstleistungen
  geht, also wenn es sich um ein Opfer von Zwangsprostitution oder anderer sexueller
  Ausbeutung handelt. Künftig soll sich aber auch strafbar machen, wer andere Dienste
  von Personen in dem Wissen in Anspruch nimmt, dass diese Personen Opfer von Ausbeutungen sind,
  beispielsweise im Rahmen eines Bauvorhabens. Auch Kinder und Jugendliche werden
  von Tätern ins Visier genommen, mit falschen Versprechungen gelockt und ausgebeutet.
  Der Schutz von Kindern und Jugendlichen vor der Ausbeutung bei sexuellen Handlungen
  gegen Entgelt soll durch neue Tatbestände verbessert werden. Die Straftatbestände
  zur Veranlassung, Ausbeutung und Inanspruchnahme entgeltlicher sexueller Handlungen
  von Kindern und Jugendlichen werden neu strukturiert, ausgeweitet und mit höheren
  Strafen belegt. Betroffene von Menschenhandel werden in Zusammenhang mit ihrer Ausbeutungssituation
  häufig dazu gebracht, andere Straftaten zu begehen. Um diese Zwangslage deutlicher
  hervorzuheben, wird eine zusätzliche Möglichkeit geschaffen, das Strafverfahren
  gegen diese Betroffenen einzustellen.
