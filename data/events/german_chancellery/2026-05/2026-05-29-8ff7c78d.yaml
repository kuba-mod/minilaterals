title: Deutsche Nachhaltigkeitsstrategie Nachhaltigkeitsziele als Leitlinie der Bundesregierung
text: 'Nachhaltigkeit soll für alle Bürgerinnen und Bürger zugänglich gemacht werden.
  Foto: Getty Images/i-Stock/FG Trade Latin Die Bundesregierung hat 2002 zum ersten
  Mal eine Deutsche Nachhaltigkeitsstrategie ( DNS ) aufgelegt. Seitdem wird sie regelmäßig
  alle vier Jahre aktualisiert und legislaturübergreifend getragen. Die Nachhaltigkeitspolitik
  steht somit für Kontinuität im Regierungshandeln und orientiert sich seit 2015 an
  den 17 globalen Nachhaltigkeitszielen . Die Nachhaltigkeitsziele seien die Richtschnur
  für ein freies, sicheres, gerechtes und wohlhabendes Deutschland, betonte Kanzleramtsminister
  Thorsten Frei auf der Jahreskonferenz des Rates für Nachhaltige Entwicklung . Vor
  dem Hintergrund aktueller Herausforderungen seien sie mehr als eine Vision, die
  Orientierung bietet. Mit den Nachhaltigkeitszielen ließe sich auch eine gute Zukunft
  für alle gestalten. Nachhaltigkeit sei kein „ nice-to-have ”, sondern ein „ must-have
  ”, so Frei. Im Januar 2025 wurde die aktuelle Deutsche Nachhaltigkeitsstrategie
  Weiterentwicklung 2025 PDF, 2 MB, barrierefrei ( DNS ) beschlossen. Sie steht unter
  dem Titel „Transformation gemeinsam gerecht gestalten” und legt den Fokus auf sechs
  Transformationsbereiche, in denen großer Handlungsbedarf besteht, um die Ziele bis
  2030 zu erreichen: Daneben beschreibt sie das Regierungshandeln anhand von fünf
  Instrumenten, um die Ziele zu erreichen: Bei allem Handeln berücksichtigt die Deutsche
  Nachhaltigkeitsstrategie auch grenzüberschreitende Auswirkungen des nationalen Handelns.
  Die Maßnahmen müssen so ausgestaltet sein, dass sie die Umsetzung der Nachhaltigkeitsziele
  in anderen Ländern nicht behindern. An der Weiterentwicklung beteiligt waren das
  Bundeskanzleramt, alle Ministerien, das Presse- und Informationsamt der Bundesregierung,
  verschiedene Nachhaltigkeitsakteure und Bürgerinnen und Bürger. Die Bundesregierung
  will auch im Bereich Nachhaltigkeit überflüssige Bürokratie abbauen. Berichtspflichten
  sollen reduziert werden und aus der aktuellen Strategie soll ein bürgernaher Aktionsplan
  entstehen. Der Staatssekretärsausschuss für Nachhaltige Entwicklung und Zukunftsfragen
  hat den Auftrag, den Plan auf den Weg zu bringen. Wichtig dabei ist der Wechsel
  zu einem handlungsorientierten Format, damit die Maßnahmen nachhaltiger Entwicklung
  auch Wirkung zeigen. Der Fokus wird stärker auf aktuelle politische, wirtschaftliche
  und gesellschaftliche Herausforderungen und der Zeitenwende liegen und alle Dimensionen
  der Nachhaltigkeit abdecken: die ökonomische, ökologische und soziale. Der Aktionsplan
  wird von sogenannten Missionen – ressortübergreifende und interdisziplinäre Arbeitsgruppen
  – begleitet und entwickelt. Geplant sind Missionen in folgenden Handlungsfeldern:
  Hier gelangen Sie zur Deutschen Nachhaltigkeitsstrategie Weiterentwicklung 2025
  PDF, 2 MB, barrierefrei , zur Deutschen Nachhaltigkeitsstrategie Weiterentwicklung
  2025 in Leichter Sprache PDF, 2 MB, barrierefrei sowie zur Übersetzung dieses Artikels
  in Leichte Sprache . Here you can access the Continued development of the German
  Sustainability Strategy .'
