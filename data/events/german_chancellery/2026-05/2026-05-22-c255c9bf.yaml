title: Bundesregierung aktuell
text: 'das Kabinett hat in der vergangenen Woche erneut Beschlüsse gefasst, die unser
  Leben einfacher machen werden. Die Idee hinter der digitalen Brieftasche, genannt
  EUDI-Wallet, ist simpel: Wichtige Dokumente wie der Personalausweis oder der Führerschein
  sollen aufs Smartphone. Von dort kann sie jeder einsetzen, wie er möchte. Wer ein
  Bankkonto eröffnen oder einen Handyvertrag abschließen, ein Auto mieten oder ein
  Paket abholen will, nutzt einfach die Daten aus dem Wallet. All das bleibt natürlich
  freiwillig, und natürlich ist auch für die Datensicherheit gesorgt. Auch beim Führerschein
  wird vieles einfacher. Die Fahrschulausbildung wird modernisiert und flexibler.
  Beispielsweise kann der Theorieunterricht digital oder hybrid stattfinden – das
  spart Zeit, kostet weniger (die Fahrschulen müssen keine Klassenzimmer vorhalten)
  und ist spätestens seit der Pandemie Teil des Lebensalltags vieler Menschen. Auch
  die Zahl der Pflichtstunden wird reduziert – das senkt die Kosten, die im Vergleich
  zu unseren europäischen Nachbarn höher sind. Und schließlich: Ein Parlamentsbeschluss
  von Mitte April wurde jetzt umgesetzt. Seit Dienstag können Förderanträge für Elektroautos
  gestellt werden. Der Kauf von E-Autos wird auch rückwirkend zum 1. Januar 2026 bezuschusst.
  Besonders unterstützt werden Menschen mit kleineren und mittleren Einkommen sowie
  Familien. Je nach Situation ist eine Förderung von bis zu 6.000 Euro möglich. Wir
  wollen, dass klimafreundliche Mobilität bezahlbar ist. Und wenn am Ende gute Arbeitsplätze
  in Deutschland erhalten bleiben, dann ist der Erfolg doppelt gesichert. All diese
  guten Nachrichten gehen häufig unter in der Krisenberichterstattung. Aber dass gute
  Nachrichten auch Spaß machen können, haben am Donnerstag hunderte Unternehmerinnen
  und Unternehmer aus der Start-up-Szene gezeigt: Sie haben in Berlin die Besten der
  Besten ausgezeichnet. Der Bundeskanzler hielt eine Rede und war sichtlich amüsiert
  von der Tatsache, dass er als bekennender Krawattenträger einmal underdressed auftreten
  musste unter all den partywütigen Gästen in Ballkleid und Smoking. Ob mit Hoodie
  oder Fliege: Die Start-ups machen gute Laune, sie bauen die nächste Erfolgsgeschichte.
  Ihr Wir freuen uns über Ihr Feedback: Nutzen Sie bitte dafür das Kontaktformular
  (nicht die Antwortfunktion auf diese E-Mail).'
