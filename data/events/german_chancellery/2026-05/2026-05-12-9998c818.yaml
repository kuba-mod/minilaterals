title: Jahresbilanz 2025 Zoll zieht erfolgreiche Bilanz
text: 'Neben seiner Rolle als Sicherheitsbehörde trägt der Zoll erheblich zu den Haushaltseinnahmen
  des Bundes bei. Foto: picture alliance / Eibner-Pressefoto „Der Zoll sorgt für faire
  Wettbewerbsbedingungen, bekämpft Kriminalität und sichert wichtige Einnahmen für
  unser Land“. Mit diesen Worten würdigte Bundesfinanzminister Lars Klingbeil die
  Arbeit der rund 49.000 Beschäftigen des Zolls. Allein im Jahr 2025 leitete der Zoll
  bundesweit rund 12.600 Ermittlungsverfahren im Bereich der grenzüberschreitenden
  Betäubungsmittelkriminalität ein. Er stellte rund 69 Tonnen Betäubungsmittel sicher
  und leitete branchenübergreifend mehr als 52.100 Ordnungswidrigkeitenverfahren und
  rund 98.200 Strafverfahren ein – beim Kampf gegen Schwarzarbeit und illegale Beschäftigung.
  Ein Schwerpunkt der Arbeit des Zolls ist die Bekämpfung von Drogenschmuggel. Insgesamt
  stellten die Beschäftigten des Zolls im vergangenen Jahr bundesweit mehr als 54
  Tonnen Marihuana und rund 6,5 Tonnen Kokain sicher. Der Seeweg bleibt dabei die
  zentrale Schmuggelroute, insbesondere für Kokain. „Hinzu kamen über 250 Millionen
  illegale Zigaretten, 7.500 verbotene Waffen und vieles mehr“, sagte der Bundesfinanzminister.
  Die Zahlen zeigen, dass Deutschland weiterhin das Ziel von Kriminellen ist. Durch
  Schwarzarbeit sei ein Schaden von rund 675 Millionen Euro entstanden. „Schwarzarbeit
  ist keine Kleinigkeit, sie ist illegal, da werden hart arbeitende Menschen um ihren
  verdienten Lohn gebracht und ausgebeutet“, betonte Klingbeil. Die Bundesregierung
  geht deswegen verstärkt dagegen vor. Im letzten Jahr hat sie ein Gesetz verabschiedet,
  mit dem unter anderem die Finanzkontrolle Schwarzarbeit (FKS) gestärkt wurde. Neben
  seiner Rolle als Sicherheitsbehörde trägt der Zoll erheblich zu den Haushaltseinnahmen
  des Bundes bei – und sichert damit die Handlungsfähigkeit Deutschlands. Insgesamt
  betrugen die Einnahmen im vergangenen Jahr etwa 157 Milliarden Euro. Sie setzten
  sich zusammen aus: „Im Kampf gegen organisierte Kriminalität ist es entscheidend,
  den Spuren des Geldes zu folgen, um an die Täter ranzukommen und auch Strukturen
  zu zerschlagen“, sagte Klingbeil. Zoll und Bundeskriminalamt sollen deshalb zur
  effektiveren Bekämpfung der Organisierten Kriminalität rechtlich, technisch und
  personell gestärkt werden. Die Bundesregierung hat im Februar 2026 einen Aktionsplan
  beschlossen - zum Schutz der inneren Sicherheit und des Wirtschafts- und Finanzstandortes
  Deutschland. Weitere Informationen zur Zolljahresbilanz 2025 lesen Sie beim Bundesfinanzministerium
  .'
