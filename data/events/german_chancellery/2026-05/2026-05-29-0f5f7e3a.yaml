date: '2026-05-29'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 29. Mai 2026
text: '(Vorsitzende Wolf eröffnet die Pressekonferenz und begrüßt StS Kornelius sowie
  die Sprecherinnen und Sprecher der Ministerien.) Vielen Dank, und guten Tag auch
  von meiner Seite. Wir haben die öffentlichen Termine des Bundeskanzlers für die
  kommende Woche: Diese starten am Dienstag, den 2. Juni. An diesem Tag wird der Bundeskanzler
  gegen 10 Uhr eine Rede beim Ostdeutschen Wirtschaftsforumin Bad Saarow halten. Im
  Anschluss wird er mit Vertreterinnen und Vertretern aus der Industrie und den Gewerken
  über Infrastruktur und über die wirtschaftlichen Rahmenbedingungen am Standort Deutschland
  diskutieren. Unter dem Motto „Eine neue (Un)Ordnung“ wird es um die veränderten
  globalen Rahmenbedingungen für Deutschlands Wettbewerbsfähigkeit und hier ganz besonders
  mit dem Blick auf Ostdeutschland gehen. Es wird einen Livestream zur Rede des Kanzlers
  geben. Anschließend, zurück im Bundeskanzleramt, wird der Bundeskanzler um 12 Uhr
  den neuen ungarischen Ministerpräsidenten Péter Magyar mit militärischen Ehren empfangen
  . Das wird der Antrittsbesuch im Bundeskanzleramt sein. Dort wird es dann Gespräche
  zu bilateralen und europapolitischen Fragen geben. Es wird auch um die Unterstützung
  der Ukraine sowie die euroatlantische Sicherheit gehen. Um 13 Uhr wird es dann eine
  Pressekonferenz geben. Danach wird sich der Bundeskanzler von 14 bis 15 Uhr mit
  40 jungen engagierten Bürgerinnen und Bürgern aus verschiedenen Mitgliedsorganisationen
  des Deutschen Bundesjugendrings treffen. Die Teilnehmenden sind zwischen 17 und
  26 Jahre alt. Ziel des Treffens ist ein direkter Austausch zu aktuellen jugendpolitischen
  Themen. Der Deutsche Bundesjugendring vertritt die Interessen von rund 6 Millionen
  engagierten Kindern und Jugendlichen in Deutschland. Im Bundesjugendring sind 28 Jugendverbände,
  16 Landesjugendringe und sieben Anschlussverbände organisiert. Insofern deckt diese
  Mitgliedsorganisation ein breites Spektrum des gesellschaftlichen Engagements ab.
  Dieser Termin wird nicht presseöffentlich sein. Am Mittwoch um 10 Uhr wird wie gewohnt
  das Kabinett unter Leitung des Bundeskanzlers tagen. Am Freitag, den 5. Juni, wird
  der Bundeskanzler nach Montenegro reisen und dort am EU-Westbalkan-Gipfel teilnehmen.
  Neben den 27 EU-Mitgliedstaaten und den EU-Institutionen sind sechs Partnerländer
  des westlichen Balkans ‑ Albanien, Bosnien und Herzegowina, Serbien, Montenegro,
  Nordmazedonien sowie Kosovo ‑ eingeladen. Die Staats- und Regierungschefinnen und
  ‑chefs werden sich mit dem Thema der Erweiterung sowie einer engen Zusammenarbeit
  im Bereich der Wirtschafts-, Migrations-, Sicherheits- und Außenpolitik befassen.
  Das Treffen unterstreicht den regelmäßigen Austausch mit dem westlichen Balkan und
  knüpft an den letzten Gipfel am 17. Dezember 2025 in Brüssel an. Ziel ist es, die
  europäische Perspektive zu bekräftigen und die umfassende Unterstützung der EU für
  den westlichen Balkan hervorzuheben. Der Bundeskanzler wird mit den Teilnehmenden
  aus EU und Westbalkan über seine Vorschläge sprechen, die Beitrittsverhandlungen
  zu beschleunigen und die Länder auf diesem Weg enger in die EU einzubinden. Außenminister
  Wadephul befindet sich seit heute in New York . Dort wird er unter anderem an einer
  Sitzung der UN-Generalversammlung zu Mediation in Konflikten ‑ das wird am kommenden
  Montag sein ‑ und auch an den Wahlen zur Nachfolge der Präsidentin der Generalversammlung
  ‑ das wird am Dienstag sein ‑ teilnehmen. Heute wird der Außenminister mit Vertreterinnen
  und Vertretern kleiner Inselstaaten zusammenkommen und sich austauschen. Diese Staaten
  sind von den Folgen des Klimawandels besonders betroffen. Außerdem wird sich der
  Außenminister mit Vertreterinnen und Vertretern der Länder austauschen, die sich
  wie wir besonders intensiv im UN Peacekeeping engagieren und vor einem Jahr auch
  die Berliner Konferenz zu UN Peacekeeping unterstützt haben. Weiterhin ist das Gespräch
  mit hochrangigen Vertretern der Vereinten Nationen geplant; es sind auch Gespräche
  mit anderen Außenministerkollegen geplant. Wie Sie wissen, werden am Mittwoch in
  der Generalversammlung der Vereinten Nationen die nichtständigen Mitglieder des
  UN-Sicherheitsrats für die Jahre 2027 und 2028 gewählt. Die Bewerbung für einen
  nichtständigen Sitz im Sicherheitsrat der Vereinten Nationen für diese Jahre ist
  Ausdruck unseres politischen Willens, einen aktiven Beitrag für Frieden und Sicherheit
  in der Welt zu leisten. Für diesen Zweck ist der Außenminister bereits jetzt in
  New York und wird intensiv weiter für einen nichtständigen Sitz Deutschlands im
  Sicherheitsrat der Vereinten Nationen werben. Im Anschluss wird der Außenminister
  am Donnerstag nach Mexiko-Stadt reisen. Er wird dort unter anderem seinen mexikanischen
  Amtskollegen Roberto Velasco Álvarez zu Gesprächen treffen. Die beiden Außenminister
  werden zusammen die binationale Kommission zwischen Deutschland und Mexiko leiten,
  auf der zentrale Themen der bilateralen Zusammenarbeit besprochen werden. Am Freitag
  stehen dann Wirtschaftstermine sowie der Besuch des Goethe-Instituts auf dem Programm.
  Mexiko ist für uns ein zentraler Partner sowie einer der beiden strategischen Partner
  der Europäischen Union in Lateinamerika, mit dem uns vieles verbindet, wie der Einsatz
  für die internationale Ordnung. Ein Anliegen der Reise wird es auch sein, unsere
  Beziehung gerade im Wirtschaftsbereich zu stärken. Herr Kornelius, ich hätte angesichts
  des Besuchs des ungarischen Ministerpräsidenten, der heute in Brüssel ist, ganz
  gern gewusst, ob die Bundesregierung eigentlich die Freigabe der eingefrorenen EU-Mittel
  an Ungarn befürwortet. Sie wissen ja, dass die Freigabe Teil eines europäischen
  Prozesses ist, den die Kommission steuert. Diesen wollen wir hier nicht vorwegnehmen.
  Natürlich hat sich die Situation für Ungarn jetzt geändert. Ich bin mir sicher,
  dass dieses Thema in Brüssel auf der Agenda steht. Es liegt jetzt nicht an mir,
  hier einzelne Konditionen zu nennen. Sie sind ja bekannt. Es geht auch um die Auflösung
  von Blockaden. Dabei gibt es einige Themen, die aufgerufen sind. Ungarn scheint
  daran zu arbeiten. Die genaue Bewertung müssen wir den Institutionen überlassen.
  Herr Kornelius, vielleicht habe ich es überhört. Es gibt Berichte, dass der Kanzler
  am Montag auch an einer Klausurtagung in Nordrhein-Westfalen teilnehmen werde. Können
  Sie dazu etwas sagen? Sie ist eine Parteiveranstaltung, die Klausurtagung. Heißt
  das, dass er nicht als Kanzler teilnehmen wird, sondern als CDU-Vorsitzender? Ich
  weiß nicht, ob er eine Persönlichkeitsspaltung erlebt. Er wird natürlich als Bundeskanzler
  teilnehmen. Aber Veranstalter ist die CDU Nordrhein-Westfalen. Insofern ist dieser
  Termin offiziell kein Kanzlertermin. Aber ich habe Sie jetzt so verstanden, dass
  er schon teilnehmen wird, richtig? (zur Bewerbung Deutschlands um einen nicht ständigen
  Sitz im UN-Sicherheitsrat ) Frau Deschauer, welche Chancen räumen Sie Deutschland
  für diese Bewerbung ein? Wir sind sehr zuversichtlich und guter Dinge. Frau Deschauer
  und Herr Kornelius, was hat der Außenminister und was hat der Bundeskanzler in den
  vergangenen Tagen und Wochen konkret getan, um noch einmal für eine positive Abstimmung
  zu werben? Ich habe ja, glaube ich, gerade die Reise und auch noch einmal wirklich
  die Zielgerade beschrieben. Der Außenminister ist auch noch einmal in New York,
  um sehr intensive Gespräche zu führen. Ich glaube, wir haben die Zeit gut genutzt
  und uns sehr intensiv mit sehr vielen internationalen Partnern besprochen. Es geht
  darum, für das Angebot, das Deutschland darlegt, zu werben. Am Ende ist es eine
  geheime Wahl. Das Ergebnis werden wir am Mittwoch, den 3. Juni, feststellen. Aber
  ich glaube, man kann sagen, dass es ein Ansatz des Teams Bundesregierung ist, dass
  sich die entscheidenden Akteure seit Übernahme der Bundesregierung, insbesondere
  der Außenminister, in sehr intensiven Gesprächen und auch sehr vielen Reisen aktiv
  eingebracht haben. Der Bundeskanzler hat sich daran stark beteiligt. Er hat telefoniert.
  Das Thema ist seit Monaten auf der Agenda der Bundesregierung. Es wurde häufig im
  Kabinett erwähnt. Alle Kabinettsmitglieder waren gebeten und aufgerufen, sich zu
  beteiligen, durch alle Ressorts hinweg. Es gibt überall Auslandskontakte. Insofern
  sind wir zuversichtlich, dass dieses Werben auch Erfolg haben wird. Inwiefern sind
  Sie in der Bundesregierung nervös? Es handelt sich ja um eine Kampfkandidatur. Es
  gibt drei Kandidaten für zwei Plätze. Das ist ja ausdrücklich etwas Außergewöhnliches.
  Dem würde ich nicht zustimmen. Das ist etwas ziemlich Übliches. Das ist in den verschiedenen
  Regionalgruppen mal so, mal so. Das ist auch in der Regionalgruppe, in der wir kandidieren
  ‑ sie heißt „westeuropäische und andere Staaten“ ‑, des Öfteren vorgekommen. Sie
  erleben hier große Zuversicht. Genau das ist das, womit wir an den Mittwoch herangehen.
  Frau Deschauer, Sie sagen, Sie sähen dem mit großer Zuversicht entgegen. Haben Sie
  denn einen Überblick über die Stimmen, mit denen Deutschland rechnen kann, bzw.
  vielleicht einen Überblick über Wackelkandidaten, die man bis dahin noch überzeugen
  muss? Sie können sich vorstellen, dass ich nicht jeden Überblick, über den ich persönlich
  Kenntnis habe, mit Ihnen teile. Insofern muss ich Sie leider enttäuschen. Es ist
  auch nicht unwichtig, darauf hinzuweisen, dass es sich um eine geheime Wahl handelt.
  Insofern können wir am Ende nicht in die Abstimmungsbox hineinschauen. Herr Kornelius
  und Frau Deschauer, können Sie bitte noch einmal beschreiben, worin der große Wert
  der deutschen Mitgliedschaft im UN-Sicherheitsrat liegt? Was kann Deutschland dort
  machen, was zum Beispiel Österreich nicht machen könnte? Sie reizen mich jetzt zu
  einem geopolitischen Grundsatzvortrag. Das erspare ich Ihnen. Aber ich möchte natürlich
  darauf hinweisen, dass wir in einer Zeit leben, in der gerade eine Mittelmacht wie
  Deutschland, eingebettet in der Europäischen Union, Gemeinschaftsinteressen vertritt
  und für Werte steht, die in diesen Zeiten wertvoll sind: für regelbezogenes Handeln,
  für Berechenbarkeit, für Rechtstreue. Die Vereinten Nationen sind bei aller Unfertigkeit
  ein wichtiges Gremium, vielleicht das wichtigste Weltgremium, in dem diese Werte
  zum Ausdruck kommen können. Deutschland ist bereit, diese Werte dort einzubringen
  und mit seiner Kraft, die es als drittgrößte Wirtschaftsnation der Erde natürlich
  hat, auch zu untermauern. Deswegen, glaube ich, würden wir einer Weltordnung, die
  wir in der Bundesregierung alle anstreben, mit solch einer Kandidatur und auch solch
  einem Sitz Nachdruck verleihen. Wenn ich Folgendes ergänzen darf: Wir bringen auch
  nicht ganz unerhebliche Erfahrungen mit ein. Deutschland war bereits sechsmal als
  nichtständiges Mitglied im UN-Sicherheitsrat vertreten, zuletzt in den Jahren 2019
  und 2020. Wir kandidieren in einem turnusmäßigen Rhythmus alle acht Jahre. Das bringt
  sehr viel Erfahrung und Expertise mit sich. Das heißt, Deutschland ist gut aufgestellt.
  Das Auswärtige Amt ist sehr gut aufgestellt und bringt Kolleginnen und Kollegen
  mit, die auch bereits Erfahrung aus vorherigen Sitzperioden einbringen werden. Wir
  sind von Tag eins an operativ. Insofern ist das schon ein nicht zu unterschätzendes
  Asset, das wir an diesem wichtigen Tisch mitbringen würden. Hat man in den letzten
  Tagen oder Wochen eigentlich versucht, Österreich noch dazu zu bewegen, die Kandidatur
  zurückzuziehen? Auch das hat es ja schon häufiger gegeben. Ich weiß nicht, ob es
  das schon häufiger gegeben hat, aber das Verfahren und wie wir uns in der Gruppe
  der „westeuropäischen Anderen“, wie diese Gruppe ja heißt, zusammenfinden und besprechen,
  würde ich gar nicht kommentieren wollen. Das heißt nicht, dass es unüblich ist,
  sich auch einmal in einer Konkurrenzsituation zu befinden. Das gab es schon in der
  Vergangenheit und das gab es auch schon für Deutschland. Ich meine, es war die vorvorletzte
  Kandidatur ‑ das müssten die Jahre 2011 und 2012 gewesen sein ‑, in der wir ebenfalls
  in einer Dreierkonstellation unterwegs waren und uns dann sozusagen auf dem Weg
  im Fotofinish zusammen mit Portugal durchgesetzt haben. Insofern: Mal gibt es einen
  sogenannten „clean slate“, mal nicht. Ich glaube, für die meisten Staaten ist inzwischen
  berechenbar, dass wir uns alle acht Jahre für dieses wichtige Gremium bewerben und
  interessieren, und sie können das auch in ihre eigenen Überlegungen mit einbeziehen,
  wenn sie kandidieren. Frau Deschauer, die Chancen einer Kandidatur stehen ja auch
  im Zusammenhang mit anderen politischen Fragen. Vor diesem Hintergrund: Welche Rolle
  spielt die aktuelle Situation in Gaza in den Gesprächen, die der Außenminister derzeit
  noch führt, insbesondere vor dem Hintergrund, dass sich viele stimmberechtigte Staaten
  die diesbezügliche deutsche Position genau anschauen? Ich glaube, dieses Thema spielt
  insgesamt weltweit ‑ das merken wir hier gemeinsam seit mehreren Jahren ‑ eine sehr
  erhebliche Rolle, weil es uns alle bewegt, beschäftigt und wir auch als Bundesregierung
  bestrebt sind, eine dauerhafte Befriedung der Lage in Nahost zu erreichen ‑ so schwer
  das auch ist ‑ und daran auch mitzuwirken. Ich werde hier jetzt nicht prognostizieren
  können, in welcher Art und Weise einzelne Mitgliedstaaten ihre Wahlentscheidung
  treffen. Diese Entscheidung ist außerdem geheim; insofern wird man auch im Nachgang
  vermutlich weder erfahren können, wer genau wie in einer solchen geheimen Wahl abgestimmt
  hat, noch was die letztendlichen Beweggründe für die jeweilige Entscheidung sind.
  Ich würde denken ‑ wie ich es beschrieben habe ‑: So wie alle großen weltpolitischen
  Fragestellungen, die uns hier beschäftigen, ist sicherlich auch die Lage im Nahen
  Osten derzeit und auch auf absehbare Zeit eines der Kernthemen in den Vereinten
  Nationen. Können Sie uns sagen, welche Position der Außenminister einnehmen wird,
  wenn er gefragt wird, was die deutsche Regierung von den jüngsten Ankündigungen
  Netanjahus hält, weitere Gebiete Gazas militärisch zu besetzen ? Ich habe den Minister
  aufgrund der Zeitverschiebung noch nicht selbst sprechen können. Die Berichte über
  solche Ankündigungen nehmen wir aber mit Sorge zur Kenntnis. Wenn dies so einträte,
  würde es vor allem auch das Bereitstellen von weiterer und lebenswichtiger humanitärer
  Hilfe, insbesondere für die Bevölkerung, erschweren. Sie wissen auch, dass es die
  Position der Bundesregierung ist und des Außenministers, dass eine Teilung von Gaza
  nicht dauerhaft sein kann und sich nicht zementieren darf. Sollte diese Ankündigung,
  die wir jetzt über Berichte vernommen haben, umgesetzt werden, dann wäre auch das
  nicht im Einklang mit dem 20-Punkte-Plan und der sich daraus ergebenden Friedensperspektive,
  die wir als Bundesregierung sehr unterstützen. Das ist unsere Richtschnur, das ist
  unsere Marschroute. Dazu gehört natürlich auch, dass sich die Konfliktparteien an
  diesen 20-Punkte-Plan halten. Dazu gehört mittel- bis langfristig, so schwer es
  auch ist, auch die Entwaffnung der Hamas. (zu den Terminen des Bundeskanzlers )
  Können Sie noch mal erklären, weshalb der Kanzler am Montag an der Tagung in NRW
  teilnehmen wird? Das ist eine Parteiveranstaltung. Der Kanzler ist Vorsitzender
  der CDU, und deswegen wird er daran teilnehmen. Das ist auch eine Landesdelegiertenversammlung.
  Die CDU-Mandatsträger aus Nordrhein-Westfalen kommen regelmäßig zu Treffen zusammen,
  und das ist der Grund dieser Zusammenkunft. Was ist der Zweck des heutigen Treffens
  mit den Sozialpartnern ? Es gibt die Kritik, dass es diese Formate mit Arbeitgebern
  und Gewerkschaften zuletzt so nicht gegeben hat. Arbeiten Sie für den 10. Juni an
  einem gemeinsamen Text zu konkreten Reformvorhaben? Was ist der Überbau dieses neuen
  Gesprächsprozesses, von dem der Kanzler wohl erst überzeugt werden musste? Sie haben
  jetzt zwei Punkte genannt, denen ich widerspreche. Erstens sehe ich keine Kritik
  an dem Treffen. Ich komme direkt von dem Treffen und kann sagen: Es herrschte eine
  äußerst konstruktive und zustimmende Haltung unter allen Gesprächsteilnehmern und
  ‑teilnehmerinnen, die in dem Raum versammelt waren. Deswegen nehme ich das als sehr
  positives Zeichen. Zweitens musste der Kanzler nicht überzeugt werden, sondern dieses
  Treffen ist verabredet. Es wurde außerdem verabredet, dass jetzt eine Vertraulichkeit
  hergestellt wird, damit sich diese Gespräche in Ruhe entfalten können. Es wäre auch
  falsch von mir, das hier jetzt zu kommentieren, während die Sitzung vermutlich noch
  läuft oder gerade eben erst zu Ende ist. Ich kann Ihnen sagen: Es ist konstruktiv,
  es ist offen. Es geht darum, eine Agenda bzw. einen Rahmen zu setzen, in dem man
  sich unterhalten möchte, und den Erwartungsrahmen zu setzen. Mehr, glaube ich, wird
  dazu heute zumindest vonseiten der Bundesregierung nicht bekanntgegeben werden.
  Gehört die Arbeitszeitgesetzgebung, die auch auf dem DGB-Kongress eine Rolle gespielt
  hat, aus Ihrer Sicht zu den Themen, über die am 10. Juni gesprochen werden wird?
  Ich gebe jetzt keine Tagesordnung und keine Themenordnung bekannt, weil das eine
  Flut von Nachfragen auslösen würde. Es ist Vertraulichkeit verabredet worden. Sie
  können sich aber sicher sein, dass der gesamte Rahmen der Reformvorhaben der Bundesregierung
  Gegenstand der Unterhaltung sein wird. Sie haben für den 10. Juni gerade den Begriff
  „Unterhaltung“ gewählt. Welchen Charakter soll dieses Treffen eigentlich haben?
  Ist das etwas Formloses? Soll da etwas beschlossen werden? Geht die Bundesregierung
  mit einem eigenen Konzept in dieses Treffen, oder lässt man die Partner kommen und
  sagt dann: „Legt mal auf den Tisch, was ihr so habt“? Ich verstehe Ihr Interesse,
  das Ergebnis dieses Gesprächs oder dieser Unterhaltung jetzt schon zu präjudizieren
  bzw. vorher einzurahmen. Ich habe eben gesagt, dass ich das nicht tun werde. Deswegen
  bleibe ich dabei, dass ich über Charakter, Ergebnis, Ziele usw. kein Urteil abgebe.
  Wer ist denn heute bei dem Treffen eigentlich dabei? Die Sozialpartner und Vertreter
  der Bundesregierung. Herr Kornelius, seit drei Tagen berichtet jede Zeitung und
  jeder TV-Sender über ein Gerücht unter dem Stichwort „Kanzlertausch“ . Jetzt fehlt
  noch eine offizielle Stellungnahme. Können Sie die hier liefern? Sie haben zu Recht
  von einem Gerücht oder von Spekulationen gesprochen. Deswegen werde ich mich dazu
  nicht äußern. Sie haben gestern in seiner Rede einen sehr zupackenden und tatendurstigen
  Kanzler gehört. Die Bundesregierung und der Bundeskanzler sind auf den Reformprozess
  konzentriert. Das ist das Thema, das im Mittelpunkt der Arbeit steht. Alle anderen
  Themen sind nicht relevant. Würden Sie sagen, dass die Geschichte aus Ihrer Sicht
  nur eine reine Medienkampagne ohne Substanz ist? Ich habe in den letzten Tagen so
  viel Einordnung gelesen, dass ich nicht noch eine hinzufügen möchte. Hatten der
  Bundeskanzler und Hendrik Wüst zu diesem Thema seit Bekanntwerden dieses Gerüchtes
  Kontakt? Auch dazu werde ich keine Auskunft geben. Der Bundeskanzler hat mit den
  Mitgliedern des Präsidiums und der Führung der CDU ständig Kontakt. Der Bundeskanzler
  ist auch auf Terminen. Wann genau er mit wem wozu schreibt, telefoniert, spricht
  oder sich trifft, das unterliegt einer gewissen Vertraulichkeit. Wir haben die öffentlichen
  Termine des Kanzlers mitgeteilt, und darüber hinaus habe ich keine Mitteilungen
  zu machen. Ich glaube, das große Interesse an dem Termin am Montag deutet darauf
  hin, dass Sie den Terminplan bereits ein Stück weit überblicken. Herr Kornelius,
  könnten Sie einmal schildern, wie Sie die Stimmung im Kanzleramt aktuell wahrnehmen?
  Die Stimmung im Kanzleramt ist sehr gut und konstruktiv. Wie gesagt, ich komme gerade
  von einem Vorbereitungstreffen der Sozialpartner und der Bundesregierung ‑ aller
  Teile der Bundesregierung und des Koalitionsausschusses ‑, die sich auf ihr Treffen
  vorbereiten. Es ist ein sehr emsiges Klima, es ist ein sehr zielorientiertes Klima,
  weil alle Beteiligten in der Regierung, aber auch außerhalb und sogar in den Medien
  wissen, dass jetzt wichtige Entscheidungen bevorstehen. Ich glaube, wenn zielgenau
  darauf hingearbeitet werden soll, sollte man sich an der Sache orientieren und Nebendebatten
  möglichst vorbeirauschen lassen. Jetzt war aber wahrnehmbar, dass nicht alle das
  einfach an sich haben vorbeirauschen lassen; vielmehr gab es aus dem Umfeld des
  Kanzlers in den vergangenen Tagen jede Menge zu lesen. Ganz so positiv, wie Sie
  das jetzt schildern, wirkte das nicht, sondern da war durchaus eine gewisse Verärgerung
  oder auch Genervtheit herauszuhören. Würden Sie das so teilen oder wollen Sie das
  jetzt noch einmal richtigstellen? Herr Kornelius, können Sie uns sagen, wie der
  Kanzler persönlich mit dieser Form von veröffentlichtem Gerücht bzw. umherschwirrender
  Meinung umgeht? Es gibt hochrangige Politiker, die solche Dinge schlicht und einfach
  ignorieren und sie abperlen lassen. Ist das auch der Umgang des Kanzlers damit?
  Oder nimmt er die Sachen amüsiert zur Kenntnis und sagt: Was schert es die Eiche
  usw.? Wie ist der Umgang damit? Ich weiß nicht, als welche Baumart sich der Kanzler
  nun bezeichnen würde, aber ‑ ‑ ‑ Es gibt sehr viele Gehölze im Sauerland, die wetterfest
  sind. ‑ Ich glaube, seinen Gemütszustand konnten Sie bei seinem öffentlichen Auftritt
  vorgestern Abend sehr gut erkennen. Deswegen habe ich dem nichts hinzuzufügen. Sie
  sehen ihn sehr entschlossen und zielgerichtet auf die diversen Entscheidungstermine,
  die uns bevorstehen, hinarbeiten. Meine Frage hat aber durchaus einen ernst gemeinten
  Kern; denn die Art und Weise des Umgangs mit einer solchen diskursiven Öffentlichkeit
  ist, glaube ich, auch für den Amtsträger relevant. Vielleicht können Sie also doch
  etwas darüber sagen: Nimmt er diese Berichte persönlich zur Kenntnis oder lässt
  er sich nur über Sie und andere informieren, oder perlt das grundsätzlich ab? Ich
  gebe jetzt hier keine Charakterdeutungen. Sie können sich aber sicher sein, dass
  er sich auf die Arbeit konzentriert. Es gibt einen politischen Kern der Arbeit,
  der mit dem, was öffentlich reflektiert wird, sehr wenig zu tun hat. Ich glaube,
  es ist dieser Kern, auf den er sich konzentriert. Herr Kornelius, wie bewerten Sie
  den Einschlag einer mutmaßlichen russischen Drohne in Rumänien und was folgt dann
  daraus? Ja, die Bundesregierung hat sich auch gerade öffentlich auf X geäußert,
  parallel zu unserem Treffen hier. Darin hat sich der Bundeskanzler so geäußert,
  dass er in dem Drohnenvorfall in Rumänien die russische Entschlossenheit sieht,
  diesen Krieg weiter zu eskalieren. Deutschland steht natürlich fest an der Seite
  der NATO-Verbündeten, zu denen Rumänien gehört. Das zeigt erneut, dass wir uns als
  NATO und als Bündnis sehr entschlossen diesen Drohungen entgegenstellen, dass wir
  die Drohungen an der Ostflanke ernst nehmen müssen und dass wir selbstverständlich
  bereitstehen, jeden Zentimeter des Territoriums der Allianz zu verteidigen. Darf
  ich nachfragend an Herrn Müller die Frage richten, was es denn für die Bundeswehr
