  aufnehmen wird. Wie gesagt, sind auch die Vorbestellungen deutlich umfangreicher
  als im vergangenen Jahr. Wie ich auch schon am Mittwoch gesagt habe, muss es der
  Markt richten. Das ist die Aufgabe des Marktes. Das hat auch immer funktioniert.
  Wir sind auch in Gesprächen mit der Bundesnetzagentur, mit den Verteilnetzbetreibern,
  mit den Gasspeicherbetreibern. Sie sehen am Ende auch, dass es der Markt richten
  muss und hier keine staatliche Befüllung erfolgen kann, die den Markt verzerren
  würde. Herr Kall, eine internationale Studie hat für Deutschland im vergangenen
  Jahr ein Wachstum der besonderen Art festgestellt: Die Zahl der deutschen Bürger
  , die über ein Finanzvermögen ‑ nicht Firmenvermögen, sondern Finanzvermögen ‑ von
  mehr als 100 Millionen Euro verfügen, ist gegenüber dem Vorjahr um mehr als ein
  Viertel angestiegen, von unter 4000 auf 5000. Das ist eine wachsende Zunahme von
  Vermögensungleichheit. Wie nimmt der Finanzminister diese Entwicklung zur Kenntnis
  und sieht er Möglichkeit und Notwendigkeit, hier entgegenzuwirken, sprich Teile
  dieser Gewinne abzuschöpfen? Selbstverständlich sieht der Bundesfinanzminister diese
  Entwicklung. Er sieht wachsende Ungleichheiten mit Sorge und will dem insbesondere
  durch mehr Steuergerechtigkeit entgegenwirken. Das kann man nur bedingt über die
  Einkommensteuer machen, weil es hier insbesondere auch um Ungleichheiten zwischen
  Belastung von Kapital und Arbeit, von Vermögen, von leistungsbezogenem Einkommen
  geht. Er hat dazu wiederholt ‑ einmal natürlich in seiner Funktion in der Regierung
  als Finanzminister, aber auch in seiner Funktion als SPD-Vorsitzender ‑ seine Position
  dargelegt. Ich würde gern darauf verweisen und das jetzt hier nicht ausführlicher
  ausführen, weil es da insbesondere um die unterschiedlichen Positionen und Blicke
  der Parteien geht. Ja, aber eine Zunahme der Zahl der Menschen, die von dieser Situation
  der Ungleichheit profitieren, die gleichzeitig über mehr als ein Viertel des deutschen
  Finanzvermögens verfügen, um über 25 Prozent, das ist eine Schere, die sich öffnet.
  Deswegen interessiert mich schon: Welche Möglichkeiten sieht der Finanzminister,
  spezifisch mit dieser Gruppe umzugehen, die am stärksten von wachsender Ungleichheit
  des Vermögens profitiert, und diesen Trend zu bremsen? Wie gesagt: Da es dabei primär
  um parteipolitische Positionen geht, würde ich gerne darauf verweisen. Da werden
  Sie sehr viele Äußerungen von Herrn Klingbeil finden. Was die Erbschaftssteuer und
  Ähnliches angeht, all das gehört zum Thema Steuergerechtigkeit. Darauf würde ich
  hier gerne verweisen, weil es da sozusagen nicht um das aktuelle Handeln der Bundesregierung
  geht. Unser Schwerpunkt liegt gerade auf der Einkommensteuerreform. Was weitere
  Schritte angeht, würde ich, wie gesagt, gern auf die vielen Äußerungen, die alle
  öffentlich bekannt sind, verweisen.'
