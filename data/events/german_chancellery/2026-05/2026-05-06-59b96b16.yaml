date: '2026-05-06'
type: press_release
source_name: german_chancellery
title: Rede des Kanzlers beim NRW-Unternehmertag 2026 Für ein Land in Freiheit, in
  Frieden und im Wohlstand
text: '„W ir müssen die strukturellen Probleme angehen, die wir seit vielen Jahren
  nun vor uns herschieben“, betonte Bundeskanzler Merz in seiner Rede beim NRW -Unternehmertag.
  Bundeskanzler Friedrich Merz hat an dem NRW -Unternehmertag in Düsseldorf teilgenommen.
  In seiner Rede dankte er den Unternehmen und würdigte ihre Arbeit. Zeitgleich thematisierte
  er die geoökonomischen und strukturellen Herausforderungen, vor denen die Wirtschaft
  derzeit stehe. Dadurch leide auch die wirtschaftliche Entwicklung Deutschlands,
  die Voraussetzung für den Erhalt des Wohlstandes und der Leistungsfähigkeit des
  Landes sei. Auch deshalb befinde sich Deutschland in einem Reformprozess. Teile
  dieses Prozesses sind laut Kanzler Merz Maßnahmen, die die preislichen Wettbewerbsfähigkeit,
  den Bereich der Unternehmenssteuern und die Bürokratiekosten betreffen. Die Bundesregierung
  arbeite daran, diese Herausforderungen anzugehen und die Zukunftsfähigkeit Deutschlands
  zu sichern – „ eines Landes in Freiheit, eines Landes im Frieden, eines Landes im
  Wohlstand und mit einer gesicherten sozialen Absicherung“, betonte Kanzler Merz.
  Der NRW - Unternehmertag findet jährlich mit rund 500 Teilnehmenden in Düsseldorf
  statt. Vertreterinnen und Vertreter aus Unternehmen, Verbänden, berufsständischen
  Kammern sowie aus Politik, Gewerkschaften, Verwaltung, Gerichtsbarkeit, Kirchen,
  Wissenschaft und Medien beschäftigen sich dort mit gesellschaftspolitisch aktuellen
  Themen. Gastgeber ist die Landesvereinigung der Unternehmerverbände NRW . Lieber
  Arndt Kirchhoff, lieber Herr Pöttering, sehr geehrter Herr Erzbischof, Herr Oberbürgermeister,
  sehr geehrte Mitglieder der nordrhein-westfälischen Landesregierung, liebe Kolleginnen
  und Kollegen aus dem nordrhein-westfälischen Landtag, Exzellenzen, meine sehr geehrten
  Damen und Herren, herzlichen Dank für die Einladung zum NRW -Unternehmertag des
  Jahres 2026 in Düsseldorf! Herzlichen Dank für die freundliche Begrüßung und für
  die Philippika Ihres Vorsitzenden! Ich freue mich sehr, dass ich heute hier sein
  kann. Ich freue mich, dass ich Gelegenheit habe, einmal den Blick auf unser Land
  zu richten und auch zu erläutern, welche Wege wir in der Bundesregierung gehen und
  welche wir in den nächsten drei Jahren dieser Wahlperiode weitergehen wollen. Lassen
  Sie mich zunächst sagen: Ich bin auch dankbar, in Düsseldorf zu sein. Es ist auch
  meine Landeshauptstadt, die Hauptstadt der wirtschaftsstärksten Region der gesamten
  Europäischen Union, eines Landes mit großen, klangvollen Namen der Industrie, aber
  auch eines Landes mit gut 700.000 kleinen und mittleren Unternehmen. Dies ist das
  industrielle Herz nicht nur der Bundesrepublik Deutschland, sondern dies ist der
  dichteste industrielle Ballungsraum der gesamten Europäischen Union. Deswegen weiß
  ich zu schätzen, was Sie leisten, was Sie tun in Ihren Unternehmen. Ich weiß es
  für die großen Unternehmen, ich weiß es aber auch für die vielen hunderttausend
  kleinen und mittleren Unternehmen. Ich will trotz aller Kritik, die ich gleich aufgreifen
  werde, doch einmal ein herzliches Wort des Dankes für die Arbeit sagen, die Sie
  in Ihren Unternehmen jeden Tag leisten, trotz schwierigster Bedingungen. Sie sind
  diejenigen, die unser Land wirtschaftlich am Laufen halten. Herzlichen Dank für
  Ihre Arbeit, die Sie leisten! Nun ist die Lage, die wir antreffen, in der Tat herausfordernd.
  Sie ist es gleich in doppelter Hinsicht. Sie ist es geoökonomisch, und diese Umwälzungen,
  die wir zurzeit auf der Welt erleben, treffen auf angestaute strukturelle Probleme
  unseres Landes. Zusammen ergibt das einen Handlungsdruck, der wohl der größte ist,
  den wir in den letzten Jahrzehnten, wenn nicht sogar seit dem Ende des Zweiten Weltkrieges
  gesehen haben. Wir alle spüren in diesen Wochen und Monaten: Das ist nicht nur eine
  konjunkturelle Krise, das ist nicht nur eine strukturelle Verwerfung, das alles
  findet statt in einer Welt, die sich grundlegend neu ordnet. Wir sind Zeitzeugen,
  meine Damen und Herren, eines tiefgreifenden Epochenbruches, so wie ihn jede Generation
  einmal erlebt. Wir, diejenigen, die nach dem Zweiten Weltkrieg geboren sind, haben
  bisher einfach nur Glück gehabt. Aber jetzt, 80 Jahre nach dem Ende des Zweiten
  Weltkrieges, erleben wir ihn, so wie jede Generation in den Jahrhunderten zuvor,
  auch unseren, erst nach 80 Jahren. Aber jetzt ist dieser Epochenbruch da. Dieser
  Epochenbruch ist eruptiv, er ist mitunter höchst unfreundlich, und er geht vor allem
  rasend schnell. Wöchentlich sehen wir neue Herausforderungen, neue Krisenlagen,
  und wiederum täglich ändern sie ihr Gesicht. Das alles lässt sich nicht einfach
  draußen halten oder auslagern in ein Feld namens Außenpolitik. Das ist tägliches
  Erleben in Deutschland. Es betrifft uns hierzulande, es fordert uns, und es zeigt
  uns, dass wir uns eben in vielfältiger Hinsicht ändern müssen. Aber, meine Damen
  und Herren, wir haben das verstanden, und vielen Dank, lieber Arndt Kirchhoff, dass
  du es erwähnt hast. Wir haben es auch in Europa verstanden. Denn das gehört zu den
  guten Nachrichten in diesen nicht einfachen Tagen und Wochen: Europa hat es verstanden,
  und wir haben in der Europäischen Union begonnen, dies gemeinsam aufzugreifen und
  die Dinge zu verändern. Wir stärken uns. Wir rüsten im wahrsten Sinne des Wortes
  auf. Wir sorgen dafür, dass dieses Europa wirtschaftlich und sicherheitspolitisch
  wieder stärker wird. Europa identifiziert die Machtmittel, die es hat, und wir halten
  sie auch für den Einsatz bereit. Wir knüpfen in Europa auf der ganzen Welt neue
  Handels- und Rohstoffpartnerschaften, so jüngst – vor wenigen Tagen in Kraft getreten –
  ein Abkommen, über das mehr als 25 Jahre verhandelt wurde, das MERCOSUR -Abkommen
  mit vier großen südamerikanischen Staaten. Es war kein Zufall, dass das größte Land
  dieser Gruppe, nämlich Brasilien, vor wenigen Tagen Partnerland der Bundesrepublik
  Deutschland auf der Hannover Messe war. Wir verkaufen uns in Europa, meine Damen
  und Herren, nicht länger unter Wert. Aber richtig ist auch: Wir selbst, wir selbst
  in Deutschland, müssen uns aufraffen, und wir müssen die strukturellen Probleme
  angehen, die wir seit vielen Jahren nun vor uns herschieben und die damit stetig
  größer geworden sind. Unsere wirtschaftliche Entwicklung – lieber Arndt, du hast
  es gesagt – stagniert seit mehr als acht Jahren, fast ein Jahrzehnt, und andere
  Länder wachsen in dieser Zeit, zum Teil deutlich. Für die kommenden Jahre sagt man
  uns, wenn es so bleibt, wie es ist, nur noch ein jährliches Wachstumspotenzial von
  weniger als einem halben Prozent voraus. Das ist nicht genug! Daran müssen wir arbeiten.
  Das ist zu wenig. Meine Damen und Herren, ich sage allen Wachstumskritikern: Wachstum
  ist kein Selbstzweck. Das ist keine statistische Größe, die man einmal hat oder
  einmal weniger hat. Wachstum ist die Voraussetzung für den Erhalt unseres Wohlstands.
  Wachstum ist die Voraussetzung für den Erhalt unserer Arbeitsplätze. Wachstum ist
  die Voraussetzung für die Steuereinnahmen unseres Staates, mit denen dieser Staat
  Straßen, Schienen, Schulen, Universitäten, innere und äußere Sicherheit finanzieren
  kann, und Wachstum ist auch die Grundvoraussetzung für einen leistungsfähigen Sozialstaat
  Bundesrepublik Deutschland. Es gibt keine gute Gesundheitsvorsorge, keine auskömmliche
  Rente, keine Pflege ohne Wachstum. Ich sage das deswegen so deutlich, weil wir aus
  dieser „ No-growth “-Denke herauskommen müssen, aus dieser Denke, wir könnten alles
  so schön lassen, wie es heute ist, und dann bliebe alles gut. Nein, meine Damen
  und Herren, wir bewegen uns in Deutschland seit Jahren unter unseren Möglichkeiten.
  Die gute Nachricht ist: Wir können das ändern. Wir können das ändern, wenn wir endlich
  wieder lernen – das sage ich hier, und ich werde es in wenigen Tagen auf dem DGB
  -Bundeskongress ganz genauso sagen –, wenn endlich wieder anerkannt wird, dass unternehmerische
  Leistung und Initiative die Voraussetzung für das Gedeihen unserer marktwirtschaftlichen
  Ordnung ist. Ohne die geht es nicht. Mit ihr geht es und kann es auch gut gehen.
  Wir müssen mit dem Misstrauen gegen die marktwirtschaftliche Ordnung aufhören. Wir
  müssen unternehmerische Initiative auch wieder ermöglichen, und wir müssen Sie entlasten.
  Wir wollen und wir werden auch die arbeitenden Menschen in unserem Land mehr in
  den Blick nehmen und auch sie entlasten. Wir wollen endlich ehrlich auf die Altersstruktur
  unserer Gesellschaft blicken und die notwendigen Schritte für eine nachhaltige Finanzierung
  unserer sozialen Sicherungssysteme unternehmen. Wir wollen insgesamt unser Leben
  und unser Arbeiten wieder in ein tragfähiges Verhältnis zueinander setzen, auch
  in ein tragfähiges Verhältnis zur wirtschaftlichen Leistungsfähigkeit und Unabhängigkeit,
  die wir in diesen eruptiven und unfriedlichen Zeiten so dringend brauchen. Ich sage
  es deshalb hier und auch immer wieder: Wir können nicht einfach so weitermachen
  wie in den letzten 20 Jahren. Wir müssen bereit sein zu Veränderungen, um zu erhalten,
  was uns gemeinsam wirklich wichtig ist. Nun bin ich, meine Damen und Herren, so
  unbescheiden, darauf hinzuweisen, dass wir seit einem Jahr, und es ist genau heute
  am Tag ein Jahr, in der Bundesregierung genau dabei sind, nach diesem Wissen und
  nach diesem Erkennen auch zu handeln. Ich sehe uns, ich sehe die Bundesregierung,
  aber ich sehe auch unser Land in einem Reformprozess, mit der Betonung auf beiden
  Teilen dieses Wortes, in einem Prozess der Reformen. Beide Worthälften sind wichtig.
  Das ist ein Prozess, den ich antreiben, den ich weiter antreiben und den ich beschleunigen
  möchte, aber der, und auch das gehört dazu, in einer Demokratie nicht einfach angeordnet
  werden kann, der mühsam Schritt für Schritt durch eine Regierung, durch die Parlamente
  gemeinsam erreicht werden muss. Ja, unsere Demokratie ist manchmal langsam. Sie
  ist manchmal mühsam. Aber, meine Damen und Herren, es gibt dazu keine bessere Alternative.
  In einem autoritären System eben einmal von oben anzuordnen, mag schneller gehen.
  Es ist am Ende des Tages immer die schlechtere Lösung. Nun will ich heute einige
  Themen dieses Reformprozesses aufrufen. Ich habe es auch schon einige Male gesagt:
  Unsere Probleme bei der Wettbewerbsfähigkeit unserer Volkswirtschaft sind vor allem
  Probleme der preislichen Wettbewerbsfähigkeit. Für unser Land, für das Arbeiten
  und Wirtschaften in Deutschland sind die Kosten einfach zu hoch. Arndt, du hast
  es angesprochen. Das sind die Lohnnebenkosten, oder besser: die Lohnzusatzkosten.
  Sie sind einfach zu hoch, und sie drohten bisher immer weiter zu steigen. Ohne Reformen
  – nur, um diese Zahl einmal kurz zu sagen – haben wir in den nächsten zehn Jahren
  einen Anstieg der Sozialversicherungsbeiträge auf knapp 50 Prozent zu erwarten,
  von heute 42 Prozent. Meine Damen und Herren, wir wollen und wir werden das verhindern.
  Der erste Schritt auf dem Weg in diese Richtung ist getan. Denn aus genau diesem
  Grund haben wir im Kabinett heute vor einer Woche die Krankenversicherungsreform
  beschlossen. Dies ist – erneut in aller Bescheidenheit – die umfassendste Reform
  der gesetzlichen Krankenversicherung seit 20 Jahren. Denn in diesen letzten 20 Jahren
  sind die Ausgaben ständig stärker gestiegen als die Einnahmen, ohne dass dadurch
  ein Mehrwert im gesamten System unserer Krankenversicherung zu erkennen gewesen
  wäre. Unser Gesetzentwurf, den wir vergangene Woche verabschiedet haben, wird schon
  im nächsten Jahr zu Einsparungen in Höhe von knapp 16 Milliarden Euro führen. Bis
  zum Jahr 2030, also bis zum Ende dieser Wahlperiode, steigt das Volumen der Einsparungen
  auf knapp 40 Milliarden Euro. Wir sparen also allein mit dieser Reform der gesetzlichen
  Krankenversicherung rund 40 Milliarden Euro. Das sind, umgerechnet, zwei Beitragssatzpunkte
  in der gesetzlichen Krankenversicherung. Ich hoffe, dass es gelingt, dieses große
  Reformwerk noch vor der Sommerpause durch den Deutschen Bundestag zu bringen. Damit
  werden die Beiträge zur gesetzlichen Krankenversicherung in Deutschland auf lange
  Zeit stabil bleiben. Das ist – noch einmal in aller Bescheidenheit – eine wirklich
  historische Reform. Aber wir erhalten damit unser System. Wir erhalten eine leistungsfähige
  Gesundheitsversorgung, zu der allerdings im Zuge dieser Reform dann auch alle ihren
  Beitrag leisten müssen. Wir haben damit diese Säule unseres Sozialstaats stabil
  gemacht, und wir werden das genauso in den anderen Säulen tun. Für jeden, der es
  sehen will, ist das ein Zeichen, meine Damen und Herren: Die Koalition ist entscheidungswillig,
  und sie ist trotz allen Diskussionen entscheidungsfähig. Wir können Kompromisse
  in der Koalition. Wir werden das für die Pflege noch in diesem Monat Mai fortsetzen
  und auch dort die Finanzen auf eine stabile Grundlage stellen. Und schließlich:
  Die von uns eingesetzte Expertenkommission über die Rentenversicherung – das wird
  das dickste Brett der nächsten Monate sein ‑ wird dazu in wenigen Wochen sehr konkrete
  Vorschläge unterbreiten. Wir werden im Sommer dann auch dafür die notwendigen Entscheidungen
  treffen und in ein entsprechendes Gesetzgebungsverfahren gehen. Das Ziel ist erneut:
  Die Beiträge sollen nicht mehr steigen. Das wird aber auch nur gehen – ich bin für
  die Hinweise dankbar –, indem wir mehr arbeiten und gleichzeitig eine bessere kapitalgedeckte
  Altersvorsorge ermöglichen. Meine Damen und Herren, es ist keine Schnapsidee von
  mir, sondern es sind ganz einfach Demografie und Mathematik. Es übersteigt ganz
  einfach die Kräfte von zwei Beitragszahlern, zukünftig eine Person in der Rente
  zu finanzieren. Das geht nicht; das können wir nicht, und das werden wir auch nicht
  zulassen. Wenn wir es richtig machen – und ich hoffe, wir werden es richtig machen –,
  dann wird das zugleich die Einlösung eines der ältesten Versprechen der marktwirtschaftlichen
  Ordnung und, wenn Sie so wollen, sogar der christlichen Soziallehre sein, dass wir
  nämlich durch die Stärkung der zweiten und der dritten Säule in der Altersversorgung
  eine bessere Beteiligung der Arbeitnehmerinnen und Arbeitnehmer in Deutschland am
  wachsenden Produktivvermögen unserer Volkswirtschaft ermöglichen. Möglicherweise
  haben Sie es übersehen: Wir haben bereits im Vorgriff auf diese Rentenreform zum
  1. Januar 2027, ein neues Vorsorgedepot beschlossen – es steht im Bundesgesetzblatt –,
  staatlich gefördert, womit es möglich ist, große Summen steuer- und abgabenfrei
  kapitalgedeckt zu sparen. Der Paradigmenwechsel hin zum Kapitalmarkt für breite
  Schichten der Bevölkerung ist in der Bundesregierung vollzogen, meine Damen und
  Herren. Dann brauchen wir in Zukunft, jedenfalls für diejenigen, die heute 50 Jahre
  oder jünger sind, nicht mehr über eine Haltelinie in der Rentenversicherung von
  48 Prozent oder Ähnliches zu sprechen. Denn dann sprechen wir über ein neues Gesamtversorgungsniveau
  für das Alter, das deutlich über dem Niveau liegt, das heute aus der Rentenversicherung
  und aus zu kleinen Säulen der betrieblichen und privaten Altersvorsorge möglich
  ist. Hier besteht eine sehr konkrete Perspektive, gerade für diejenigen, die heute
  50 Jahre und jünger sind. Der zweite Bereich, den ich kurz ansprechen will, ist
  der Bereich der Unternehmenssteuern. Auch sie sind zu hoch. Die Steuerlast in Deutschland
  für die Unternehmen ist zu hoch. Das muss sich ändern; das wollen wir ändern, und
  wir haben es auch schon in einem wesentlichen Teil geändert. Ich will die Stichworte
  nennen, die zeigen, dass wir das Problem gesehen und uns seiner angenommen haben.
  Es war eine unserer ersten Maßnahmen, die noch vor der parlamentarischen Sommerpause
  des Jahres 2025 in Kraft getreten sind, die Abschreibungsmöglichkeiten zu verbessern
  – dreimal 30 Prozent für Investitionen – und die Körperschaftssteuer von aktuell
  15 Prozent sukzessive auf zehn Prozent zu senken. Wenn dieser Satz im Jahr 2032
  erreicht sein wird, dann wird Deutschland wieder ein im internationalen Vergleich
  wettbewerbsfähiges Niveau bei der Unternehmensbesteuerung haben. Ich will hinzufügen,
  weil ich weiß, dass es nicht nur Kapitalgesellschaften sind, sondern zu einem ganz
  großen Teil auch Personengesellschaften des Mittelstandes: Wir entlasten parallel
  auch durch die Senkung des Thesaurierungssteuersatzes, und wir wollen keine Erhöhung
  der Einkommenssteuer, sondern, wenn es mit den Sozialdemokraten möglich ist, eine
  Senkung der Einkommenssteuer gerade und vor allem für die Personengesellschaften
  und für die mittelständische Wirtschaft. Meine Damen und Herren, ich will es hier
  noch einmal sehr klar und sehr deutlich sagen: Mit uns wird es keine Erhöhung der
  Einkommenssteuerlast zulasten des Mittelstandes und der Personengesellschaften in
  Deutschland geben. Diejenigen, die davon träumen, müssen wissen, dass das mit dieser
  Koalition und auch mit mir als Bundeskanzler der Bundesrepublik Deutschland nicht
  zu machen ist. Weiterhin geht es um die sehr hohen Energiepreise. Wir haben ein
  Sofortprogramm verabschiedet, das kurzfristig die Energiekosten reduziert. Die Gasspeicherumlage
  ist abgeschafft. Die Netzentgelte sind gesenkt. Die Reduzierung der Stromsteuer
  für Unternehmen des produzierenden Gewerbes ist entfristet. Das ist eine Entlastung
  in Höhe von rund zehn Milliarden Euro im Jahr für die Wirtschaft. Hinzu kommt der
  Industriestrompreis, gerade von der Europäischen Kommission genehmigt. Die Deckelung
  der Stromkosten energieintensiver Unternehmen für die Hälfte des Stromverbrauchs,
  der Strommenge, auf fünf Cent pro Kilowattstunde ist jetzt möglich. Das heißt, dass
  auch weiterhin – ich sage das insbesondere hier im Land Nordrhein-Westfalen – industrielle
  Grundstoffe bei uns im Land hergestellt werden können. Auch das ist ein wichtiges
  Zeichen strategischer Unabhängigkeit in diesen Zeiten. Meine Damen und Herren, wir
  wollen noch mehr tun. Wir bringen überhaupt einen neuen Pragmatismus und Realismus
  in die Energiepolitik unseres Landes zurück. Wir trimmen den Ausbau der erneuerbaren
  Energien stärker auf Kosteneffizienz. Dazu muss beides auch besser aufeinander abgestimmt
  werden. Die Bundeswirtschaftsministerin hat hierfür konkrete Vorschläge unterbreitet.
  Ich appelliere an die Sozialdemokraten, uns auf diesem Wege zu folgen. Das ist kein
  Ausbremsen des Ausbaus der erneuerbaren Energien. Im Gegenteil, wir bekennen uns
  dazu, die erneuerbaren Energien weiter auszubauen. Aber wir brauchen grundlastfähige
  Stromerzeugung. Wir wollen keinen Strom mehr erzeugen, der nicht gebraucht wird,
  aber dafür aus öffentlichen Mitteln hoch bezahlt werden muss, meine Damen und Herren.
  Schließlich – ich will es auch, weil es in Nordrhein-Westfalen von großer Bedeutung
  ist, nicht verschweigen –: Wir brauchen ein größeres Energieangebot. Angebot und
  Nachfrage bestimmen den Preis. Das Angebot ist zu klein. Meine Damen und Herren,
  deswegen setzen wir auf eine Kraftwerkstrategie, die auch den Bau neuer Gaskraftwerke
  ermöglicht, jedenfalls für die Grundlast. Dieses Konzept, die Kraftwerkstrategie,
  wurde uns in Brüssel bereits genehmigt. Wir werden sie voraussichtlich am Mittwoch
  der nächsten Woche, also heute in einer Woche, im Kabinett verabschieden. Meine
  Damen und Herren, auf der Hannover Messe vor zwei Wochen haben wir gesehen, dass
  vieles möglich ist, unter anderem eine große Begeisterung für die Fusionsenergie.
  Arndt, du hast es angesprochen. Deutschland ist führend auf der Welt in der Erforschung
  von Fusionskraftwerken. Wir haben den Ehrgeiz, das erste Fusionskraftwerk der Welt
  in Deutschland ans Netz gehen zu lassen. In Hannover haben wir gesehen, wir realistisch
  das ist. Ich komme auf Hannover noch einmal zurück. Aber lassen Sie mich zunächst
  ein weiteres großes Problem ansprechen, nämlich die Bürokratiekosten. Ja, eine überbordende
  Bürokratie bremst die Unternehmen in unserem Land. Sie bremst Sie, die Unternehmen,
  aus. Wir wollen das ändern. Die ersten Erleichterungen haben wir im Kabinett bereits
  beschlossen. Ich nenne nur das Vergabebeschleunigungsgesetz und die Aufhebung verschiedenster
  Berichtspflichten. Meine Damen und Herren, ich bin zuversichtlich, dass wir mit
  diesem Thema weiterkommen. Das gilt insbesondere deshalb, weil wir erstmalig in
  der Geschichte der Bundesrepublik Deutschland ein Ministerium in der Bundesregierung
  haben, das sich hochprofessionell genau und nur darum kümmert, nämlich um Digitalisierung
  und Staatsmodernisierung. Karsten Wildberger, der aus der Privatwirtschaft kommt
  und hier in Nordrhein-Westfalen gut bekannt ist, arbeitet eine bereits beschlossene
  Modernisierungsagenda für Staat und Verwaltung aus und gemeinsam mit den Ländern
  eine föderale Modernisierungsagenda voller ambitionierter und konkreter Projekte
  ab. Ich teile den Dank Ihres Vorsitzenden, meine Damen und Herren, an die Landesregierung
  von Nordrhein-Westfalen für die Initiativen, die hier in Nordrhein-Westfalen unter
  der Federführung der Staatskanzlei bereits auf den Weg gebracht worden sind. Das,
  was hier in Nordrhein-Westfalen beschlossen wird, meine Damen und Herren, ist Teil
  der von uns gemeinsam zwischen Bund und Ländern erstmalig in dieser Form am 4. Dezember
  des vergangenen Jahres beschlossenen Modernisierungsagenda für unsere Wirtschaft
  und für unsere Verwaltung. Insgesamt sind es 237 verschiedene Maßnahmen, die wir
  mit den Ländern im Konsens beschlossen haben, Einzelmaßnahmen zu weniger Bürokratie,
  schnelleren und digitalen Verfahren, effizienten staatlichen Strukturen, besserer
  Rechtsetzung. Sie sind sehr konkret; sie werden umgesetzt. Und gestern, ja, hat
  das Landeskabinett hier erste Gesetzentwürfe verabschiedet zur Abschaffung von Schriftformen,
  zur Abschaffung von Berichtspflichten, zur Erprobung von Verwaltungsvereinfachungen
  in den Kommunen durch eine Abweichungsmöglichkeit vom Landesrecht und vom Bundesrecht.
  Wir haben heute Morgen im Kabinett in Berlin einen weiteren Schritt zur Erprobung
  von bestimmten Abweichungen von kommunalen, landesrechtlichen und bundesrechtlichen
  Regeln beschlossen. Das ist auf dem Weg und bereits in der Umsetzung. Hier in Nordrhein-Westfalen
  sind viele dieser Erleichterungen aus der Modernisierungsagenda – zum Beispiel eine
  Genehmigungsfiktion in der Landesbauordnung oder eine Anzeigefreiheit von Bauverfahren
  entsprechend der Musterbauordnung – bereits umgesetzt. Sie sind gemacht; sie sind
  Teil unserer gemeinsamen föderalen Modernisierungsagenda. Ich bin für dieses Tempo
  sehr dankbar; ich will das ausdrücklich an die Kollegen der Landesregierung aus
  Nordrhein-Westfalen sagen. Nordrhein-Westfalen wird damit Schrittmacher im Rahmen
  dieser föderalen Modernisierungsagenda unseres Landes. Dies sind übrigens Vorschläge
  aus einer Kommission unter der Schirmherrschaft des Bundespräsidenten, die uns auch
  während der Koalitionsverhandlungen im letzten Jahr Pate gestanden haben. Meine
  Damen und Herren, ich hoffe, dass dies alles das Vertrauen der Bürgerinnen und Bürger,
  auch das Vertrauen in den Staat wiederherstellt. Lassen Sie mich ein Beispiel aus
  dieser Agenda nennen, das jetzt ebenfalls ganz schnell in die Umsetzung geht: Ich
  nenne die digitale Brieftasche, mit der sich die Bürgerinnen und Bürger schon ab
  dem nächsten Jahr gegenüber sämtlichen Stellen, auch staatlichen Stellen, ausweisen
  können. Sie können sich damit digital identifizieren, europaweit. Wir arbeiten auch
  auf der europäischen Ebene an einem vergleichbaren Projekt, sodass Bürgerinnen und
  Bürger aus ganz Europa mit einer solchen Wallet demnächst sämtliche Behördengänge,
  alle Identifikationen, machen können. Wir reduzieren die Berichts-, Dokumentations-
  und Nachweispflichten, und wir werden auch die Unternehmensgründungen in Deutschland
  weiter beschleunigen, vereinfachen und digitalisieren. Für den 15. Juli, kurz vor
  der Parlamentarischen Sommerpause, haben wir im Bundeskabinett verabredet, ein weiteres
  sogenanntes Entlastungskabinett durchzuführen – eine Kabinettssitzung, in der wir
  uns nicht mit neuer Regulierung befassen und sie verabschieden werden, sondern bestehende
  Regulierung aufheben werden. Wir haben dazu, das Bundeswirtschaftsministerium und
  das Digitalministerium zusammen, extra ein Portal eingerichtet, bei dem Sie sich
  alle melden können, mittels dem wir mittlerweile über 20.000 Vorschläge gesammelt
  haben, die wir jetzt KI -gestützt auswerten. Wir werden jetzt gemeinsam daran arbeiten,
  diese Gesetzgebung ganz konkret zu vereinfachen, Entlastungen für die Wirtschaft
  und für die Unternehmen in Deutschland zu ermöglichen. Meine Damen und Herren, ich
  meine es, wir meinen es wirklich ernst mit dem, was ich hier sage, und ich will
  nach Jahren der Ankündigungen hier endlich vorankommen. Der Rahmen dafür ist übrigens
  erneut nicht allein Deutschland, sondern Europa. Auch darauf lassen Sie mich zurückkommen
  und dazu noch ein Wort sagen. Die Kommission hat auf mein Drängen, auf Drängen der
  Bundesregierung und auf Drängen der Staats- und Regierungschefs der Europäischen
  Union, am 12. Februar ‑ ‑ ‑ Die meisten von Ihnen hier im Rheinland werden sich
  erinnern; da war Weiberfastnacht im Rheinland. An diesem Donnerstag, 12. Februar,
  haben wir einen ganzen Tag in der Nähe von Lüttich im Gründungsschloss des Deutschen
  Ordens in Alden Biesen zusammengesessen und uns zusammen mit Mario Draghi und Enrico
  Letta ausschließlich mit der Frage beschäftigt: Was können wir tun, damit die gesamte
  europäische Industrie angesichts dieser globalen Herausforderungen wieder wettbewerbsfähiger
  und besser wird? Daraus ist ein konkreter Aktionsplan beschlossen worden, den wir
  in der letzten Woche im Europäischen Rat, Parlament und Kommission unterschrieben
  haben, mit verbindlichen Vereinbarungen für das Jahr 2026 und 2027, welche Schritte
  wir im Hinblick auf Vereinfachung, Deregulierung und Entbürokratisierung gehen wollen.
  Wenn Sie heute Abend nach Hause kommen, meine Damen und Herren, dann werden Sie
  hoffentlich in den Nachrichten sehen, dass heute Kommission, Rat und Parlament eine
  deutliche Vereinfachung der KI -Regulierung in der Europäischen Union beschließen
  werden – etwas, das noch in der letzten Woche gescheitert war, weil es keine Einigung
  im Europäischen Rat gab. Ich habe das Wochenende damit verbracht, die Staats- und
  Regierungschefs der Europäischen Union anzurufen und sie zu ermutigen, einem Vorschlag
  zu folgen, den die Kommission auf unser Drängen hin zur Deregulierung der KI gemacht
  hat, sodass wir demnächst im Maschinenbau genau dieselben Wettbewerbsbedingungen
  für den Einsatz von künstlicher Intelligenz in Deutschland und in ganz Europa wie
  in den USA und in China haben. Das gelingt uns gerade in diesen Minuten gemeinsam
  im Europäischen Rat, in der Europäischen Kommission, zusammen mit dem Europäischen
  Parlament. Ich will es einmal konkret machen, was wir gegenwärtig versuchen zu erreichen:
  Meine Damen und Herren, wir haben die finanziellen Möglichkeiten geschaffen, viele
  Dinge jetzt zu ändern und auch zu ermöglichen. Von den 500 Milliarden Euro für Infrastruktur
  und Klimaneutralität gibt der Bund 400 Milliarden Euro selbst aus, 100 Milliarden
  Euro die Länder, davon 21 Milliarden Euro das Land Nordrhein-Westfalen. Wir werden
  alleine für Verkehrsprojekte in den nächsten Jahren bis 2029 knapp 170 Milliarden
  Euro einsetzen, so viel wie noch nie in einem vergleichbaren Zeitraum. Das gilt
  auch und gerade hier für Nordrhein-Westfalen. Wir wollen vermeiden, dass wir ähnliche
  dramatische Sperrungen erleben wie mit der Rahmedetalbrücke auf der A45. Meine Damen
  und Herren, das alles setzt voraus, dass wir noch ein Gesetz im Deutschen Bundestag
  verabschieden; ich will das hier offen ansprechen. Das Infrastruktur-Zukunftsgesetz,
  das wir im letzten Jahr kurz vor Weihnachten im Kabinett verabschiedet haben, ist
  bis heute noch nicht im Deutschen Bundestag verabschiedet worden, weil Teile der
  Koalition der Meinung sind, dass man das, was wir da aufgeschrieben haben, nämlich
  ein überragendes öffentliches Interesse an diesem Infrastrukturausbau, jetzt noch
  einmal durch ein Naturschutzflächenbedarfsgesetz konterkarieren sollte. Ich appelliere
  an die Sozialdemokraten auch von dieser Stelle aus noch einmal, jetzt wirklich zu
  einer Entscheidung im Deutschen Bundestag zu kommen, damit wir diese Mittel, die
  wir bereitgestellt haben, auch einsetzen können, damit Planungsverfahren in Zukunft
  in ganz Deutschland so schnell gehen wie in einer Ausnahmesituation an der A45 mit
  dieser Brücke, die damals gesprengt worden ist, die wir dann kurz vor Weihnachten
  wieder haben freigeben können. Die ganze Bauzeit war gerade einmal drei Jahre. Das,
  was in einer Ausnahme auf der A45 möglich wurde, wollen wir mit diesem Gesetz zum
  Regelfall in Deutschland machen. Das setzt aber voraus, dass das Gesetz im Deutschen
  Bundestag auch verabschiedet wird. Meine Damen und Herren, erlauben Sie mir, dass
  ich zum Schluss noch einmal das ganze Bild öffne. Das, was in unserem Land jetzt
  geschehen muss und womit wir vor einem Jahr begonnen haben, das ist lange Jahre
  oder auch Jahrzehnte unterblieben. Es ist einfach liegengeblieben, und wir müssen
  es jetzt tun. Das geht nicht handstreichartig, nicht mit einem großen Wurf, sondern
  das geht in einer Form, in der alle Argumente gehört, abgewogen und alle Interessen
  angehört werden – kurz gesagt: das heißt demokratisch. Mein Anspruch ist, dass das,
  was wir tun, jetzt für mehrere Jahrzehnte in der Zukunft tragfähig ist, und das
  heißt auch, dass es von der Mehrheit der Bürgerinnen und Bürger in unserem Lande
  mitgetragen wird. Alle werden dazu etwas beitragen müssen, um dafür viel zu bekommen,
  nämlich die Zukunftsfähigkeit unseres Landes ‑ eines Landes in Freiheit, eines Landes
  im Frieden, eines Landes im Wohlstand und mit einer gesicherten sozialen Absicherung.
  Ich will unser Land in eine Zukunft führen, in der das Lebensgefühl wieder stimmt
  – ein Gefühl aus Freiheit, den eigenen Weg zu gehen und auch Erfolg zu haben; ein
  Gefühl der Sicherheit, in einer wachsenden Wirtschaft seinen Platz zu finden, auch
  im Alltag die Dinge für sich zu entscheiden und für die Familien ermöglichen zu
  können; das Gefühl einer Sicherheit, dass wir uns als Land in Europa gegen jeden
  Versuch verteidigen können, uns und unser freiheitliches Lebensmodell anzugreifen.
  Das ist es, meine Damen und Herren, worum es eigentlich und in Wahrheit geht. Wir
  müssen unser Lebensmodell, nicht nur unser Wirtschaftsmodell, gegen die Feinde der
  Freiheit von außen und von innen verteidigen. Angesichts der Größe dieser Aufgabe
  kommt es jetzt nicht allein auf die Regierung an. Ja, es kommt auch auf uns an.
  Aber, meine Damen und Herren, es müssen alle mittun, auch bereit sein, Verlust und
  Gewinn mit einem Blick auf das Wohl des Ganzen, auf unser Land, abzuwägen. Ich will
  deswegen zum Schluss auch an Sie appellieren: Vertrauen Sie in den Weg von Demokratie
  und vielstimmiger Diskussion und wirken Sie auf diesem Weg weiter an dem, was wir
  uns vorgenommen haben, konstruktiv mit. Winken Sie dabei bitte nicht ab. Setzen
  Sie nicht auf Kräfte, die unser Land nach innen und nach außen abschotten wollen.
  Das Potenzial für diesen Aufbruch haben wir in Deutschland. Unser Land ist stark.
  Wir haben fleißige Mitarbeiterinnen und Mitarbeiter in den Betrieben. Wir haben
  hervorragende Wissenschaftler. Wir haben sehr gute Unternehmensführer. Wir haben
  unverändert eine starke industrielle Substanz in Deutschland, und wir haben einen
  starken Mittelstand, um den uns die Welt beneidet. Meine Damen und Herren, wir haben
  Sie – und deswegen komme ich noch einmal auf die Hannover Messe zu sprechen. Gerade
  diese Hannover Messe hat gezeigt, welche Innovationsfähigkeit und welche Freude
  an der Innovation auch in Deutschland unverändert möglich ist. Das gilt auch und
  vor allem auf dem Gebiet der industriellen KI , die uns zu ganz neuen, ganz anderen
  Wertschöpfungsmöglichkeiten befähigt, mehr als wir das wahrscheinlich bisher alle
  zusammen erahnt haben. Ich war jedenfalls beeindruckt, wie die Stimmung dort war,
  vor allem bei vielen jungen Menschen, die auf der Hannover Messe waren und gezeigt
  haben, was sie tun. Und bitte, bei aller Kritik: Das Jahr 2025 war das Rekordjahr
  für Start-up -Gründungen in Deutschland. Es gab kein Jahr vorher, in dem in Deutschland
  so viele Start-up -Unternehmen gegründet worden sind wie im Jahr 2025. Wer als junger
  Mensch in Deutschland im Jahr 2025 ein Start-up -Unternehmen gründet, auch ein älterer,
  der ist kein Pessimist, der ist ein Optimist und der glaubt an die Standortqualitäten,
  der glaubt an die Fähigkeiten und der glaubt an die Zukunft unseres Landes. Meine
  Damen und Herren, tun wir es auch gemeinsam, und dann kommen wir auch aus dieser
  Krise heraus.'
