title: Verteidigungsminister Pistorius in Kanada Zusammenarbeit mit Kanada stärken
text: 'Bundesverteidigungsminister Boris Pistorius gemeinsam mit seinem kanadischen
  Amtskollegen David McGuinty bei der kanadischen Rüstungsmesse CANSEC . Foto: picture
  alliance / ZUMAPRESS.com / Justin Tang Verteidigungsminister Boris Pistorius ist
  nach Kanada gereist, um mit den kanadischen Partnern Gespräche über weitere Möglichkeiten
  der Intensivierung der Verteidigungskooperation zu führen. Dabei besuchte Pistorius
  die kanadische Rüstungsmesse CANSEC in Ottawa. Die Rüstungszusammenarbeit mit Kanada
  soll ausgeweitet werden. Zur Verbesserung der Abschreckungsfähigkeiten der NATO
  ist die sicherheits- und verteidigungspolitische Zusammenarbeit zwischen Deutschland
  und Kanada unverzichtbar. Mit gemeinsamen Missionen wie Arctic Sentry und zukunftsweisenden
  Rüstungsprojekten beweist die NATO , dass die Verbündeten gemeinsam und entschlossen
  für die Stabilität des transatlantischen Raumes einstehen. Beide Länder teilen demokratische
  Werte und das gemeinsame Interesse an stabilen Seewegen im Nordatlantik und einer
  sicheren Arktisregion. Der Nordatlantik ist für die NATO eine strategisch zentrale
  Region. Die Freiheit der Seewege, der Schutz kritischer Unterwasserinfrastruktur
  und die Überwachung der Schifffahrtsrouten sind gemeinsame Prioritäten. Regelmäßige
  Besuche werden genutzt, um die militärische Zusammenarbeit zu vertiefen und neue
  Initiativen auch mit weiteren Verbündeten zu vertiefen.'
