title: Bundeskanzler Merz gratuliert dem bulgarischen Ministerpräsidenten Rumen Radev
text: Sehr geehrter Herr Ministerpräsident, ich gratuliere Ihnen herzlich zu Ihrem
  Amtsantritt. Deutschland und Bulgarien sind einander eng verbunden und pflegen langjährige
  freundschaftliche Beziehungen. Ich freue mich darauf, diese Bindungen gemeinsam
  mit Ihnen weiter zu vertiefen und als verlässliche Partner in der Europäischen Union
  und in der NATO in geopolitisch herausfordernden Zeiten weiter gut und eng zusammenzuarbeiten.
  Ich würde mich freuen, Sie bald persönlich in Berlin zu empfangen. Für die vor Ihnen
  liegenden Aufgaben wünsche ich Ihnen viel Kraft und Erfolg. Mit freundlichen Grüßen
  Friedrich Merz Bundeskanzler der Bundesrepublik Deutschland
