date: '2026-05-11'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 11. Mai 2026
text: '(Vorsitzende Wefers eröffnet die Pressekonferenz und begrüßt StS Kornelius
  sowie die Sprecherinnen und Sprecher der Ministerien.) Ich habe eine Frage zu der
  Entlastungsprämie an Herrn Kornelius: Wird der Bund den Vermittlungsausschuss einschalten,
  oder ist die Prämie, wie es Markus Söder angedeutet hatte, tot? nach der Entscheidung
  des Bundesrats sind erst wenige Tage vergangen. Sie wissen, dass die Bundesregierung
  diese Entscheidung bedauert. Sie hält natürlich an dem Plan fest, angesichts der
  gestiegenen Energiepreise eine Entlastung für Bürgerinnen und Bürger zu erzielen.
  Über die weiteren Verfahrensschritte wird die Bundesregierung zeitnah entscheiden.
  Über das genaue Verfahren, also auch zu der Frage, die Sie gestellt haben, kann
  ich momentan keine Auskunft geben. Das werden wir nach der Entscheidung der Koalitionsspitze
  sicherlich kommunizieren. Ist es richtig, dass vor der Entscheidung in der vergangenen
  Sitzung des Koalitionsausschusses keinerlei Rücksprache mit der Wirtschaft gehalten
  wurde? Die Verfahrensabläufe vermag ich an dieser Stelle jetzt nicht nachzuvollziehen.
  Viele Dinge geschehen, auch ohne dass die Öffentlichkeit sie wahrnimmt. Der Austausch
  mit der Wirtschaft ist ja kontinuierlich. Die Kommunikation anschließend, auch in
  der Ausgestaltung des Gesetzes, war intensiv und auch in dem Sinne gehalten, die
  Wirtschaft von dieser Maßnahme zu überzeugen, zum Beispiel auch in der Form, dass
  sie in Tarifvereinbarungen hätte aufgenommen werden können. Aber das ist jetzt verschüttete
  Milch, wie man so schön sagt. Das heißt, wir werden jetzt abwarten, wie sich die
  Regierung auf einen nächsten Schritt verständigen wird, und das dann entsprechend
  umsetzen. Wie erklären Sie sich, dass es am Freitag ja doch recht überraschend keine
  Mehrheit im Bundesrat für dieses Gesetz gab? Ich bin nicht Teil des Bundesrates.
  Dazu müssen Sie die Ländervertreter fragen. Die Länder haben ihre Bedenken angemeldet.
  Die Gesprächsbereitschaft des Bundes war da. Klar ist, dass Entlastungen von Bund
  und Ländern gleichermaßen getragen werden müssen. Das heißt, sie müssen ihren Beitrag
  leisten. Eine Aufarbeitung der diversen Schritte auf diesem Weg möchte ich hier
  nicht vornehmen. Aber das Ergebnis des Bundesrats steht ja dann für sich. Es gibt
  ja auch schon Kritik an Herrn Meister, dem Staatsminister im Kanzleramt für die
  Bund-Länder-Zusammenarbeit. Ist dabei aus Ihrer Sicht alles richtig gelaufen? Wie
  gesagt, gehe ich jetzt nicht in die Details der verschiedenen Absprachen. Es ist
  naturgemäß so, dass es sehr viele unterschiedliche Sichten auf die Gespräche und
  auf die Vorbereitungsphase gibt. Ausschnitte davon lesen Sie in diversen Medien.
  Aber ein gesamtes Bild, glaube ich, werden wir nicht rekonstruieren können. Es gab
  in den letzten Momenten vor der Abstimmung bzw. am Tag davor auch noch Verabredungen,
  dass man den Tagesordnungspunkt noch einmal von der Tagesordnung nimmt, um ihn neu
  zu verhandeln. An diese Verabredung fühlte sich anschließend niemand gebunden. Insofern,
  glaube ich, sollten wir hier jetzt nicht mit Schuldzuweisungen hausieren gehen,
  sondern uns auch nach vorn orientieren und schauen, wie wir ein künftiges Verfahren
  gestalten und wie wir künftig Entlastungsmaßnahmen entscheiden, sodass sie auch
  bei den Bürgerinnen und Bürgern ankommen. Ministerpräsidentin Schwesig hat sich
  beschwert und gefordert, dass bei solchen Fragen öfter eine MPK einberufen werden
  solle. Wäre die Bundesregierung dafür offen? Ich glaube, die Ministerpräsidenten
  tagen häufig. Sie haben eingespielte Wege der Kommunikation. Der richtige Weg der
  Klage wäre das direkte Gespräch und nicht die Fernsehtalkshow. Herr Kornelius, ich
  verstehe es vielleicht einfach noch nicht ganz genau. Hält Herr Merz denn weiterhin
  daran fest, dass es eine solche steuerliche Entlastungsprämie in Höhe von 1000 Euro
  geben sollte? Dann wäre der konsequente Schritt ja die Anrufung des Vermittlungsausschusses.
  Die Bundesregierung ‑ das habe ich eben schon einmal gesagt ‑ wird sehr zeitnah
  über die nächsten Schritte entscheiden. Sie hält gerade aufgrund der gestiegenen
  Energiepreise an der Idee einer Entlastung der Bürgerinnen und Bürger fest. Auf
  welchem Weg diese Entlastung kommt, und zu all den Fragen, die Sie nun verständlicherweise
  auch beantwortet haben wollen, muss die Koalitionsspitze entscheiden. Das werden
  wir dann entsprechend kommunizieren. Da bei dem Thema ja die Zeit auch ein bisschen
  pressiert ‑ es gab ja schon in der Vergangenheit das Thema, dass es für eine solche
  Entlastungsprämie zumindest für dieses Jahr bereits etwas spät ist ‑, würde ich
  gern wissen: Wie sieht denn Ihr Zeitplan aus? Gibt es im Vergleich zu einer solchen
  klassischen steuerlichen Entlastungsprämie für Arbeitnehmer auch alternative Möglichkeiten,
  die Sie jetzt noch in den engeren Kreis Ihrer Erwägungen mit einbeziehen? Vielleicht
  hat Herr Kornelius, vielleicht aber auch das BMF noch etwas zu Instrumenten mitzuteilen.
  Ich möchte hier jetzt nicht über Instrumente spekulieren. Es gibt sehr viele Instrumente.
  Das wissen Sie. Eine einmalige Prämie ist kein ausschließliches Instrument. Deswegen,
  denke ich, werden jetzt noch einmal alle Optionen geprüft. Was den Zeitdruck angeht,
  so teile ich Ihre Einschätzung. Deswegen wird es auch sehr zeitnah eine Entscheidung
  geben. Herr Kornelius, der Wortbestandteil „Prämie“ kam nur in Ihrer letzten Antwort
  vor, nämlich im Hinblick darauf, dass eine Prämie keine ausschließliche Maßnahme
  sei. Darf man daraus schließen, dass die Bundesregierung auch andere Formen der
  Entlastung in Erwägung zieht, die nicht diesen Prämiencharakter haben, der vom Bundesrat
  abgelehnt wurde? Ich möchte jetzt hier nicht in semantische Debatten über das Wort
  „Prämie“ einsteigen. Aber ich habe eben gesagt, dass die Bundesregierung alle Optionen
  prüft und zeitnah darüber entscheiden wird, welches denn der richtige Weg ist, um
  den Bürgerinnen und Bürgern eine Entlastung zukommen zu lassen. Semantik ist ‑ wenn
  ich das anmerken darf ‑ neben Grammatik der zweite Bestandteil von Sprache, der
  Sprache überhaupt erst zur Kommunikation werden lässt. Ja, ich verstehe es also
  so, dass Sie am Ziel der Entlastung festhalten, aber nicht notwendigerweise in Form
  einer Prämie, die von den Unternehmern zu zahlen wäre, richtig? Wie Sie es verstehen,
  das muss ich Ihnen überlassen. Ich habe das, was ich gesagt habe, eben gesagt. Schlussfolgerungen
  können Sie selbst daraus ziehen. Herr Kornelius, wird der Bundeskanzler schon in
  der morgigen Sitzung des Koalitionsausschusses darauf drängen, dabei zumindest eine
  alternative Regelung auf den Weg zu bringen? Ist er optimistisch, dass das morgen
  gelingt? Ich werde hier jetzt keinen unnötigen Zeitdruck gestalten. Ich glaube,
  dass sich alle beteiligten Parteien über die Dringlichkeit der Situation im Klaren
  sind. Aber ich werde jetzt keine Fristen oder Termine setzen. Das werden wir dann
  schlicht abwarten müssen. Hat er eigentlich mittlerweile das Gespräch mit dem bayerischen
  Ministerpräsidenten gesucht? Dessen Abstimmungsverhalten ist ja ein bisschen merkwürdig
  gewesen: Er hat in der Villa Borsig dafürgestimmt und jetzt im Bundesrat dagegengestimmt
  oder sich enthalten ‑ ich bin mir gerade nicht ganz sicher; aber er hat jedenfalls
  nicht dafürgestimmt ‑ und hat diese Bonuszahlung ja mittlerweile für tot erklärt.
  Hat der Bundeskanzler dazu das Gespräch gesucht, weil das Verhalten ja ein paar
  Fragen aufwirft? Sie können sich sicher sein, dass sich der Bundeskanzler und die
  Parteivorsitzenden der an der Koalition beteiligten Parteien ständig im Gespräch
  befinden. Über einzelne Gespräche kann ich hier jetzt nicht berichten. Aber es ist
  ein kontinuierlicher Austausch auch in dieser Frage. Weil die Verbindung zu der
  Einkommensteuerreform gezogen wurde, habe ich eine Frage an das BMF: Hat das BMF
  mittlerweile ein Konzept für eine Einkommensteuerreform, über das man im morgigen
  Koalitionsausschuss reden könnte? Wie wir und der Minister in der letzten und vorletzten
  Woche schon mehrfach angekündigt haben, wird intensiv an einem Konzept gearbeitet.
  Zum genauen Zeitpunkt der Vorlage kann ich aktuell nichts mitteilen. Herr Kornelius
  oder auch Frau Wetter, hinter dieser Niederlage im Bundesrat steckt ja ein tiefergehendes
  Problem, nämlich das Problem, dass die Länder es inzwischen total leid sind, dass
  der Bund ständig Aufgaben beschließt, die sie und die Kommunen dann finanziell belasten.
  Nun gibt es seit Monaten Gespräche darüber, wie man dieses Problem einmal dauerhaft
  lösen kann. Wieso kommt man dabei eigentlich nicht voran? Ich würde die Prämisse
  nicht teilen. Diese Gespräche laufen. Es sind sehr komplexe Verhandlungen. Die Bund-Länder-Finanzbeziehungen
  sind vielleicht das Komplizierteste, was wir uns in diesem Staat geschaffen haben.
  Das wissen Sie besser als ich. Ich glaube, dass es gute Gründe dafür gibt, dieses
  Gespräch sehr, sehr gründlich zu führen. Die Verteilung des Steueraufkommens im
  Land ist so geregelt, wie sie geregelt ist. Die Länder haben ihren großen Anteil
  daran. Sie haben auch eine große Last zu tragen. Ich glaube, in der Frage der fairen
  Verteilung von Lasten stellen wir fest, dass in einer Zeit, in der alle Haushalte
  zur Sparsamkeit aufgerufen sind, natürlich auch Zwänge entstehen und dadurch die
  entsprechenden Nervositäten aufkommen. Ist man denn auf diesem Weg überhaupt schon
  irgendwie vorangekommen, oder gibt es dabei eigentlich Stillstand, wie man von außen
  den Eindruck hat? Bund und Länder haben sich ja schon auf Parallelitäten in den
  Reformprogrammen geeinigt. Das Thema der Konnexität, das Sie ansprechen, ist tatsächlich
  sehr schwierig. Dazu müssten wir zu gegebener Zeit einen Sachstand liefern. Momentan
  kann ich Ihnen dazu keinen neuen Stand nennen. Mich würde wirklich interessieren,
  was Ihr Konzept zur Gegenfinanzierung war, weil die Kritik der Länder ja ist, dass
  die Tabaksteuererhöhung nur dem Bundeshaushalt zur Verfügung stehe, aber die Mindereinnahmen
  sowohl von Bund als auch von Ländern getragen würden. Was war Ihre Idee, um auch
  den Ländern eine Gegenfinanzierung zu ermöglichen? Ich denke auch, dass die Tabaksteuer
  allein nicht zur Gegenfinanzierung ausgereicht hätte und deswegen bereits andere
  Formen der Gegenfinanzierung zur Debatte standen. Die Details der Gespräche kann
  ich auch hier an dieser Stelle nicht wiedergeben, vor allem nicht für die Länder.
  An das BMG: Wie geht es mit den vier betroffenen Deutschen weiter? Wie schätzt die
  Bundesregierung das Risiko ein, das von dem Hantavirus ausgeht? Seitens des BMG
  können wir erst einmal bestätigen, dass heute früh um 2.30 Uhr vier deutsche Kontaktpersonen
  im Uniklinikum Frankfurt eingetroffen und alle weiterhin ohne Symptome sind. Im
  Verlauf des heutigen Tages wird der Weitertransport der Kontaktpersonen in die jeweiligen
  Bundesländer, also nach Berlin, Baden-Württemberg, Bayern und Sachsen, erfolgen.
  Der Transport selbst wird durch die betroffenen Bundesländer und Kommunen bzw. auch
  die kommunalen Feuerwehren organisiert werden. Das Risiko schätzen wir für die Bevölkerung
  weiterhin als sehr gering ein. Dazu befinden wir uns auch kontinuierlich im Austausch
  mit dem Robert Koch-Institut. Befinden Sie sich auch im Austausch mit anderen betroffenen
  EU-Ländern? Sicherlich wird es einen Austausch geben. Ich kann Ihnen jetzt nichts
  Genaues dazu sagen. Vielleicht möchte das Auswärtige Amt dazu noch etwas ergänzen.
  Aber beim Transport gab es auf jeden Fall den Austausch mit den Niederlanden und
  weiteren beteiligten Nationen. In Bezug auf den Rücktransport und dem, was im Verantwortungsbereich
  des Auswärtigen Amtes ist, noch eine Ergänzung: Wir haben beim Rücktransport der
  Personen mit deutscher Staatsangehörigkeit sehr eng mit unseren europäischen Partnern
  zusammengearbeitet, auch unter Berücksichtigung der Wohnorte der betroffenen Personen,
  sodass auch einige deutsche Staatsangehörige die Insel mit dem durch die Niederlande
  organisierten Flugzeug verlassen konnten. Der Bundesminister des Auswärtigen hat
  seinem niederländischen Amtskollegen ganz herzlich für diese Unterstützung gedankt.
  Die Weitertransporte ab Eindhoven erfolgten unter Federführung des RKI. Insofern
  liegt damit, denke ich, das Thema der Nachverfolgung und der jetzigen Kontakte eher
  beim RKI als beim Auswärtigen Amt, weil es um Seuchenprävention geht. Wie wird diese
  Quarantäne denn überwacht? Ich meine, bei Corona waren die kommunalen Gesundheitsbehörden
  dafür zuständig. Ist das diesmal auch so? Inwieweit steht das BMI dazu im engen
  Austausch mit den kommunalen Behörden? Die Quarantäne wird, wie Sie schon gesagt
  haben, über die kommunalen Gesundheitsämter überwacht und auch angeordnet. Momentan
  erwarten wir, dass es eine häusliche Quarantäne geben wird, auch in Bezug zur Inkubationszeit
  von bis zu 45 Tagen. Allerdings gibt es, angesiedelt am RKI, den Ständigen Arbeitskreis
  der Kompetenz- und Behandlungszentren für Krankheiten durch hochpathogene Erreger,
  den sogenannten STAKOB, der das natürlich begleitet und auch mit Rat und Tat zur
  Seite steht. In den USA wurde, so meine ich, die Quarantäne zentral geregelt. Warum
  macht man das hier nicht so? Das liegt am Infektionsschutzgesetz, würde ich meinen,
  in dem die Kompetenzen und Zuständigkeiten klar zugewiesen sind, und zwar in dem
  Fall Ländern und Kommunen. Es gab Spekulationen über einen fünften Fall in der Berliner
  Charité. Können Sie dazu etwas sagen? Unseres Wissens handelt es sich nicht um einen
  fünften Fall, sondern um eine der Kontaktpersonen. Weitere Informationen zu Einzelfällen
  möchte ich an dieser Stelle nicht kundtun. Wir bleiben bei unserer Linie, dass wir
  uns zu Einzelfällen in diesem Geschehen nicht äußern wollen. Dabei geht es auch
  um Persönlichkeitsrecht usw. Können Sie sagen, ob es bei diesem Fall Symptome gab?
  Das haben Sie bei den anderen vier ja auch getan. Nach unserem Wissen sind die vier
  Kontaktpersonen, die gestern Abend in Eindhoven in den Niederlanden gelandet und
  heute früh im Universitätsklinikum Frankfurt eingetroffen sind, symptomfrei. Aber
  die Frage war ob die Person in Berlin auch symptomfrei ist. Ich meine, mich jetzt
  nicht zu weit aus dem Fenster zu lehnen, wenn ich sage, dass auch diese Person symptomfrei
  ist, weil sie eine der vier Personen ist, die gestern Abend angekommen und heute
  im Universitätsklinikum Frankfurt zu Begutachtung erschienen sind. Wenn ich mich
  richtig erinnere, dann gab es noch unter der Ampel den Plan, das Infektionsschutzgesetz
  zu überarbeiten. Ist das schon in irgendeiner Form geschehen? Denn das IfSG ist
  ‑ Sie haben es gerade angesprochen ‑ ein durchaus kompliziertes, fast so hübsch
  wie das deutsche Verteilungswesen zwischen Finanzämtern verschiedener Ebenen. Dazu
  habe ich aktuell nichts mitzuteilen. Es tut mir leid, aber ich habe Ihre Antwort
  auf meine Fragte nicht richtig verstanden. Entweder war es ein bisschen widersprüchlich,
  oder ich habe es nicht richtig mitbekommen. Ich habe Sie so verstanden, dass es
  vier Fälle gebe. Ein Fall davon, ein symptomfreier Fall, sei vorher im Universitätsklinikum
  Frankfurt gewesen und sei jetzt in der Charité in Berlin. Meiner persönlichen Kenntnis
  nach ist es so, dass die Person, die in Berlin eintreffen wird, eine der vier Kontaktpersonen
  ist. Aber lassen Sie mich das noch einmal prüfen; ich werde es gegebenenfalls korrigieren.
  Das ist jedenfalls mein letzter Stand. (zum russischen Angriffskrieg gegen die Ukraine
  ) Herr Kornelius, ist es richtig, dass für die Bundesregierung ein Vermittler Gerhard
  Schröder nicht infrage kommt? Wenn ja, warum nicht? Die Bundesregierung wird sich
  weiterhin an den Vermittlungsbemühungen beteiligen. Sie hat dies auch in der letzten
  Zeit intensiv getan, wie Sie wissen. Es gibt auch für die russische Seite ein klar
  definiertes Vermittlerumfeld. Russland weiß insofern, wer der Ansprechpartner in
  Europa ist, falls es ernsthaft verhandeln will. Diese Personen sind bekannt. Sind
  die Äußerungen Putins aus Ihrer Sicht eine Chance für eine stärkere europäische
  Rolle in einem Friedensprozess? Europa hat seinen Anteil an diesem Friedensprozess
  immer reklamiert. Es liegt auch an Russland, die Beteiligung Europas zu akzeptieren
  und zu sehen. Die Bedingungen für einen Waffenstillstand sind auch öffentlich hinreichend
  dargelegt. Insofern warten wir auf substanzielle Signale aus Moskau, dass es auf
  der Grundlage dieser Fakten, die schon seit Wochen und Monaten bekannt sind, tatsächlich
  Verhandlungen führen möchte. Herr Kornelius, Zurückweisung, das ist die eine Sache.
  Hat denn ein Gespräch oder ein Kontakt zwischen der Bundesregierung und Herrn Schröder
  stattgefunden? Aus den Reihen des Koalitionspartners gibt es Stimmen, die sagen,
  man müsse das ernsthaft prüfen. Ist der Vizekanzler eher in Übereinstimmung mit
  seinen Parteifreunden oder mit der Linie der Bundesregierung, also vor allem des
  Kanzlers? Die Bundesregierung spricht hier mit einer Stimme. Die Bundesregierung
  hat klargemacht, dass es in Europa Ansprechpartner für die ukrainischen Friedensbemühungen
  gibt. Es ist keine theoretische Frage, aber Vermittlungen müssen in der Zustimmung
  aller Konfliktparteien möglich sein. Das ist die wahrscheinlich wichtigste Voraussetzung
  überhaupt für ein Gelingen von Vermittlungen. Ansonsten werden Verhandlungen geführt
  werden, wie sie klassischerweise geführt werden. Die Wege sind bekannt. Bevor wir
  alle hier sehr nervös werden, darf ich vielleicht noch einmal darauf hinweisen,
  dass Russlands Präsident Putin auch Bedingungen genannt hat. Diese Bedingungen unterscheiden
  sich nicht von denen in seinen bisherigen Äußerungen. Er hat gefordert, dass ein
  Friedensvertrag bereits erreicht sein müsse und dass dieser an einer langen historischen
  Perspektive ausgerichtet sein müsse. Das Dechiffrieren dieser Worte, das wir seit
  vielen Jahren kennen, heißt: An diesen Konditionen hat sich wenig geändert. ‑ Deswegen
  hat die Bundesregierung auf diese Äußerung von ihm so reagiert, wie sie gestern
  reagiert hat. Stimmt Sie der Hinweis, dass der Zeitpunkt des Endes eines Krieges
  näher rücke, irgendwie hoffnungsvoll? Dieser Hinweis steht im Widerspruch zu vielen
  anderen Äußerungen, die der Präsident an dieser Stelle getan hat. Ein erster Test
  dafür, ob dieses Ende näherkommen könnte, wäre zum Beispiel eine Verlängerung der
  Waffenruhe bzw. ein einseitiges Moratorium. Ich bin mir sicher, dass sich viele
  auf dieses Signal verständigen könnten. Aber ich sehe momentan an den Äußerungen
  des russischen Präsidenten noch keinen substanziellen Fortschritt. Heißt das, dass
  das Angebot aus Ihrer Sicht nicht ehrlich ist? Das ist eine Bewertung, die ich hier
  nicht vornehmen möchte. Das haben Sie getan. Aber wir haben unsere Position klargemacht
  und drängen weiterhin darauf, dass wir wirklich in vernünftige Verhandlungen eintreten
  können. Sie wissen, dass wir in der Unterstützung der Ukraine nicht nachlassen werden,
  weder bilateral noch in der Europäischen Union. Die Verteidigungsfähigkeit der Ukraine
  ist durch das 90-Milliarden-Euro-Darlehen der Europäischen Union gestärkt worden
  und damit auf absehbare Zeit gesichert. Die EU hat weiterhin keinen Anlass, an ihren
  Sanktionsmaßnahmen zu rütteln. Das 20. Sanktionspaket ist jetzt in Kraft getreten.
  Das 21. Sanktionspaket ist in Vorbereitung. Wir sehen, dass Russlands Volkswirtschaft
  geschwächt ist und dass sich die Situation in der Ukraine für Russland natürlich
  nicht verbessert. Insofern steht unsere Feststellung nach wie vor, dass ernsthafte
  und substanzielle Verhandlungen jederzeit möglich sind und solche Verhandlungen
  unter Einbeziehung der europäischen Partner stattfinden müssen. Herr Kornelius,
  aus Ihren Antworten habe ich immer noch nicht ganz herauslesen können, was explizit
  dagegen spricht, den Vorschlag aufzunehmen und Altbundeskanzler Gerhard Schröder
  tatsächlich als Vermittler einzusetzen. Können Sie das noch einmal ausführen? Ich
  habe eben gesagt, dass Russland sehr gut weiß, wer in Europa seine Ansprechpartner
  sind, Ansprechpartner, die auf Zustimmung aller Konfliktparteien stoßen. Deswegen
  äußere ich mich hier nicht zu einzelnen Personen oder Vorschlägen, sondern setze
  den Rahmen, in dem solche Verhandlungen stattfinden. Diese Verhandlungen werden
  ansonsten nicht fruchtbar sein. Vielleicht ist es der russischen Seite nicht bekannt.
  Aber da Sie es so explizit sagen: Wer sind denn die von beiden Kriegsparteien anerkannten
  Vermittler, die man ansprechen könnte? Die Europäische Union war bereits in verschiedenen
  Vermittlungsformaten beteiligt, auch in Gesprächen. Russland ist nicht darauf eingegangen,
  diese Gespräche anzunehmen. Aber Europa steht bereit. Ich denke, in der jetzigen
  Situation braucht es keinen Vermittler, den es in einer neutralen Form ja auch nicht
  gibt. Ich nenne keine konkreten Namen, aber Sie wissen, dass die Europäische Union
  und vor allem das E3-Format, dem auch Großbritannien angehört, das nicht mehr Mitglied
  der Europäischen Union ist, bereitstehen, an der Seite der USA in substanzielle
  Verhandlungen mit Russland einzutreten. Diese Bereitschaft wird nicht angenommen.
  Herr Kornelius, ich will es doch noch einmal mit einem anderen Namen probieren,
  der auch irgendwie ins Gespräch gekommen ist, was die möglichen Ansprechpartner
  für Vermittlungen angeht. Könnte dazu auch der Bundespräsident zählen? Wir müssen
  wirklich über seriöse Vorschläge reden, die von allen Parteien angenommen werden.
  Ich rate hier, deutsche Befindlichkeiten hintanzustellen und vielleicht auch den
  Spaltungsversuch zu erkennen, der in diesen Vorschlägen liegt. Deswegen werden wir
  auf die Basis der Seriosität zurückkehren. Die Seriosität gebietet uns, dass wir
  auf den eingespielten Gesprächskanälen weiterarbeiten, dass Russland die Kondition,
  die es für solche Gespräche stellt, fallen lässt, dass es auch die Ausweglosigkeit
  der Kriegssituation erkennt und, wenn es tatsächlich diesen Krieg zu einem schnellen
  Ende führen möchte, auch in ernsthafte Gespräche darüber eintritt. Ich habe an das
  BMVg eine Frage dazu, wie man denn nun die Lücke bei den Tomahawk-Raketen oder ähnlich
  vergleichbaren Waffensystemen nach der Absage der USA schließen könnte. Wie konkret
  sind aus Sicht des BMVg mögliche Gespräche mit US-Herstellern über einen direkten
  Kauf bzw. auch über ein deutsch-amerikanisches Joint Venture? Könnte man auch in
  der Türkei kaufen? Die Berichte sind mir bekannt. Ich habe die nicht zu kommentieren.
  Ich habe mich am letzten Montag hier umfassend dazu geäußert, welche Möglichkeiten
  es gibt. Ich habe dabei die drei Säulen skizziert, einmal, dass wir unsere eigenen
  Systeme TAURUS und TAURUS NEO modernisieren oder auf den Weg bringen, einmal, dass
  wir im Bereich von ELSA sowohl die Entwicklung der Marschflugkörper im 2000-Kilometer-Bereich
  als auch eines hypersonischen Gleiters voranbringen. Das sind konkrete Planungen,
  hinsichtlich der es schon verschiedenste Dokumente und Absichtserklärungen gibt.
  Die dritte Säule waren die marktverfügbaren Systeme. Dort gibt es Prüfungen, welche
  Systeme verfügbar sind, was Sinn ergibt. Es wird sicherlich oder wahrscheinlich
  auch in den Low-Cost-Bereich geschaut werden, weil wir an der Ukraine sehen, dass
  eine Übersättigung der gegnerischen Luftverteidigung in der heutigen Zeit natürlich
  ein wichtiges Mittel ist. Das können zum Beispiel Langstreckendrohnen liefern. In
  diesen Bereichen wird geprüft, wird gesichtet, aber ich kann jetzt zu aktuellen
  Berichten oder auch zu Herstellern aktuell nichts mitteilen. Zu den marktverfügbaren
  Systemen würden aber eben auch die genannten Beschaffungsvorhaben gehören, also
  ein Kauf von Tomahawk-Raketen in den USA oder eben von türkischen Systemen? Der
  Kauf in den USA war ja über eine Absichtserklärung schon verkündet worden. Die Reihenfolge
  war ja: 2023 gab es den Start von ELSA, 2024 wurde die mögliche Stationierung zwischen
  beiden Ländern besprochen, und 2025 gab es dann die Regierungsanfrage für Werfer
  vom Typ Typhon mit Tomahawk-Systemen. Diese Anfrage ist ja weiterhin „ongoing“.
  Ich will also kein System ausschließen, ich möchte aber auch kein System bewusst
  hinzunehmen. Das ist eine Marktsichtung, das ist eine Prüfung. Das Typhon-Tomahawk-System
  ist Ihnen bekannt, und wenn es dort Entwicklungen gibt und wenn dort in eine Vorbeschaffung,
  Serienprüfung, Qualifizierung eingestiegen wird, werden wir sicherlich über das
  Parlament informieren, was dann auch der normale Weg ist. Herr Müller, habe ich
  es richtig in Erinnerung, dass man als Deutschland, also als Bundesrepublik, jetzt
  nicht direkt bei US-Herstellern Waffensysteme bestellen kann, sondern dass das immer
  über die US-Regierungsstellen abläuft? Nach meiner Kenntnis ist das nicht immer
  der Fall. Wir haben Verträge, soweit ich weiß. Ich werde noch einmal hineinschauen,
  ob ich etwas nachliefern kann. Aber diese Foreign-Military-Sales-Programme und die
  Direktprogramme sind beide möglich, soweit ich weiß. Das stelle ich einmal unter
  Vorbehalt. Ich werde schauen, dass ich während der RegPK noch etwas herausbekomme.
  In April hatte die Bundesregierung hier in der BPK erklärt, der Wegfall der Pipelineleistung
  aus Kasachstan werde den Raffineriebetrieb in Schwedt nicht signifikant einschränken,
  und die Versorgungssicherheit sei weder regional noch für Deutschland gefährdet.
  Die brandenburgische Taskforce sprach dagegen nur von einer Rohölversorgung im Mai
  von bis zu 80 Prozent, während BMWE-Staatssekretär Wetzel zusätzliche Lieferungen
  über Danzig lediglich als Gegenstand von Gesprächen bezeichnete. Da würde mich interessieren,
  auf welcher konkreten und belastbaren Versorgungsplanung denn vor diesem Hintergrund
  die wiederholten Zusicherungen, die Versorgung von Brandenburg und Berlin seien
  gesichert, beruht. Bezüglich der konkreten Auslastungszahlen müssen Sie sich an
  die Raffinerie selbst wenden, an das PCK. Aber Sie wissen, dass die ausbleibenden
  Lieferungen aus Kasachstan nur rund ein Fünftel der Menge ausmachen, die das PCK
  bezieht. Das hat bisher nach unseren Informationen zu keinen signifikanten Absenkungen
  der Auslastung geführt. Aber, wie gesagt, die Details dazu müssen Sie in Schwedt
  direkt erfragen. Gleichzeitig kann ich noch einmal betonen: Die Rolle des PCK für
  Nordostdeutschland ist wichtig. Die Ministerin ist jetzt gerade vor Ort, zusammen
  mit dem Ministerpräsidenten aus Brandenburg, und wird weitere Maßnahmen zur Stabilisierung
  mit den Akteuren vor Ort besprechen. Gleichzeitig haben Sie auch auf die Gespräche
  mit Polen hingewiesen. Diese laufen. Hierzu habe ich heute aber keine Ergebnisse
  anzukündigen. Sie haben auch schon auf die Zentralität von PCK Schwedt hingewiesen.
  Mehr als 90 Prozent der Versorgung von Berlin und des Nordostens mit Benzin, Diesel,
  Kerosin und Heizöl hängen davon ab. Gleichzeitig haben Sie mich, was irgendwie belastbare
  Liefermengen angeht, jetzt an PCK Schwedt selbst verwiesen. Wie können Sie dann
  aber sagen, eine Versorgungssicherheit sei gewährleistet, wenn Sie hier der Öffentlichkeit
  gar keine konkreten Zahlen liefern könnten? Wir sprechen mit der Branche, wir sprechen
  mit Akteuren, wir sprechen intensiv mit dem PCK, und insofern ist die Versorgung
  derzeit gesichert, und die Versorgung ist insoweit diversifiziert, dass dort hohe
  Auslastungszahlen vorhanden sind. Wie gesagt, für die Details möchte ich Sie bitten,
  sich an das PCK Schwedt selbst zu wenden. Aber Gespräche laufen, wir stehen intensiv
  in Kontakt, um das zu sichern, und das unterstreicht der heutige Termin vor Ort.
  Herr Greve, ich wollte dann doch noch einmal nach der wunderbaren Pipeline von Rostock
  nach Schwedt nachfragen. Da gibt es ja seit Jahren die Planung, diese Pipeline etwas
  umfangreicher zu gestalten, was die Volumina angeht. Ich würde gerne wissen: Wo
  stehen wir denn da jetzt aktuell, was dieses langjährige Vorhaben angeht? Ich kann
  hier heute nur allgemein antworten. Wir setzen auf zukunftsorientierte Maßnahmen
  zur Stärkung des Standortes, schauen gemeinsam mit allen Partnern und Beteiligten
  darauf. Aber ich habe heute hier auch keine Ankündigung zur Pipeline zu machen.
  Können Sie etwas zum Zeitplan der Gespräche mit Polen sagen, weil die Zeit ja so
  drängt? Die Gespräche laufen, und den Ergebnissen kann ich hier heute nicht vorbeigreifen.
  Ich wollte nur noch einmal bestätigen, dass es sich bei dem von Ihnen angesprochenen
  Verdachtsfall (einer Hantavirusinfektion ), der heute in der Charité erwartet wird,
  um eine der vier symptomfreien Kontaktpersonen handelt, die gestern Abend in Eindhoven
  waren und heute in Deutschland in der Uniklinik Frankfurt vor Ort sind. Die Frage
  geht an das Verteidigungsministerium. Offenbar entwickeln Rheinmetall und Deutsche
  Telekom zusammen ein Drohnenabwehrsystem . In welcher Weise ist die Bundeswehr in
  dieses Projekt eingebunden, oder schaut sie nur zu, was die Firmen da so entwickeln?
  Ich bin nicht über jedes Projekt, das aktuell noch firmenseitig entwickelt wird,
  informiert. Natürlich gibt es den Austausch mit der Industrie. Wir haben verschiedenste
  Formate, auch diese SVI-Formate, über die wir regelmäßig informieren. Wir haben
  Sichtungstage, an denen wir uns auch anschauen, welche aktuellen Technologien entwickelt
  werden, was gegebenenfalls möglich wäre, was nützlich wäre. Im Bereich der Drohnenabwehr
  haben wir in den letzten Jahren deutliche Fortschritte gemacht. Wir haben in dem
  Bereich Rammdrohnen, also direkte Netzwerferdrohnen. Wir haben elektromagnetische
  Störsachen. Wir haben Laser. In der Lasertechnologie gibt es starke Fortschritte.
  Unsere Drohnenabwehreinheiten, die wir speziell aufgebaut haben, waren auch schon
  im Ausland bei unseren Partnern. Da passiert also eine ganze Menge. Wie gesagt,
  in jedes System habe ich jetzt persönlich keinen Einblick. Dass es hier auf der
  Arbeitsebene eine Kommunikation über grundsätzliche Rahmenbedingungen der Drohnenabwehr
  gibt, kann natürlich sein. Aber erst einmal liegen Innovationen und Ideen ja firmenseitig
  vor und werden dann kommuniziert und als Angebot dargestellt. Eine Ausnahme ist
  zum Beispiel das Innovationszentrum. Da arbeiten ja Start-ups, klassische Industrie,
  Truppe und das Beschaffungsamt direkt vor Ort an Ideen. Aber da gibt es auch immer
  erst einen Impuls und eine Bedarfsanforderung der Bundeswehr. Die ist mir in dem
  Fall aber jetzt nicht bekannt. Ich frage auch deswegen nach, weil offenbar das gesamte
  Funknetz der Deutschen Telekom einbezogen werden soll. Das ist ja dann doch ein
  relativ großes Vorhaben. Vielleicht könnten Sie eruieren, gegebenenfalls nachliefern,
  inwiefern die Beteiligung der Hochschule der Bundeswehr, die an diesem Projekt offenbar
  mitwirkt, dann eben doch eine Form des Mitwirkens der Bundeswehr bei dem Vorhaben
  darstellt. Ich kann mich da gerne noch einmal umhören. Wenn ich etwas nachliefern
  kann, kann ich es nachliefern. Die Beteiligung der Bundeswehrhochschulen ist ja
  im Rahmen von Forschung und Entwicklung ein übliches Verfahren. Ich selbst habe
  zum Beispiel an einer Bundeswehrhochschule studiert. Dass man dort mit der Industrie
  im Rahmen von Studienarbeiten und Diplomarbeiten zusammenwirkt und einfach Aufträge,
  quasi Teilaspekte beleuchtet, ist in der heutigen Zusammenarbeit zwischen Industrie
  und Bundeswehrhochschule Standard. Der EU-sanktionierte deutsche Journalist und
  Staatsbürger Hüseyin Doğru sollte eigentlich am 7. Mai in Brüssel bei einer Veranstaltung
  zu Grundrechtseingriffen durch EU-Sanktionen im EU-Parlament sprechen. Das Büro
  der BSW-Abgeordneten Ruth Firmenich versuchte dafür zehn Tage lang, eine Ein- und
  Ausreisegenehmigung bei den mutmaßlich zuständigen deutschen Stellen zu erhalten.
  Angefragt wurden die Zentralstelle für Sanktionsdurchsetzung, das Auswärtige Amt,
  die Bundespolizei, die Ständige Vertretung Brüssel, das Bundesinnenministerium sowie
  das für die ZfS zuständige Finanzministerium. Alle genannten Ministerien und Behörden
  erklärten sich für nicht zuständig und verwiesen auf die jeweils andere Stelle.
  Da würde mich interessieren: Wer ist denn jetzt in der Bundesregierung bzw. im nachgeordneten
  Bereich konkret zuständig, wenn ein deutscher Staatsbürger unter EU-Sanktionen für
  einen einzelnen parlamentarischen Termin eine Aus- und Wiedereinreisegenehmigung
  braucht? Das sollte in einem Rechtsstaat ja hoffentlich irgendwie definiert sein.
  Fangen wir im Zweifel bei Herrn Giese an! Was ich Ihnen mitteilen kann, ist: Mir
  ist dieser Fall bekannt. Es ging um eine Reise einer einzelnen Privatperson nach
  Brüssel. Zu solchen Einzelreisen kann ich Ihnen jetzt keine weiteren Informationen
  geben, weil mir auch die genauen Hintergründe nicht bekannt sind. Was ich Ihnen
  sagen kann, ist, dass man keine Ausreisegenehmigung braucht. Das ist Quatsch. Ansonsten
  müsste man schauen, wer für die Sanktionsdurchsetzung im konkreten Fall zuständig
  ist. Wie gesagt, ich kann das jetzt nur vertretend sagen. Wenn es um Finanzsanktionen
  geht, wären wahrscheinlich die Bundesbank oder das BMF zuständig. Bei anderen Dingen
  wären das BMI oder die Bundespolizei zuständig. Dabei geht es um den konkreten Einzelfall
  dieser Reise, und ich glaube nicht, dass dies hier der geeignete Ort ist, um diese
  einzelnen Reisen von einzelnen Personen durchzusprechen. Es ist ja kein Einzelfall.
  Es ist der einzige deutsche Staatsbürger, der in einem EU-Land, und zwar dem hier,
  in dem wir alle sitzen, in Deutschland, EU-sanktioniert ist. Sie wissen so gut wie
  ich, dass diese EU-Sanktion nicht nur mit einer Kontenblockierung einhergeht, sondern
  auch mit einem kompletten Ein- und Ausreiseverbot aus dem EU-Raum. Das haben Sie
  jetzt als Quatsch bezeichnet. Aber diese Aus- und Einreisesperre in den EU-Raum
  ist ja auch offiziell Teil des EU-Sanktionspakets gegen Hüseyin Doğru. Ich verstehe,
  aber Brüssel gehört doch zur EU, oder nicht? Aber ich habe verstanden, dass man
  außerhalb der EU jetzt Ausreisegenehmigungen braucht, um aus der EU auszureisen.
  Übernehmen Sie jetzt den Job von Herrn Giese? Nein. Ich versuche zu verstehen, was
  Sie fragen, und es ist meine Aufgabe, hier die Sitzungsleitung auszuüben. Das Problem
  in dem konkreten Fall ist, dass Hüseyin Doğru als deutscher Staatsbürger, in Deutschland
  lebend, von der EU mit einem EU-Instrument sanktioniert wurde, das eigentlich nur
  für Leute außerhalb des EU-Raums gedacht ist, und deswegen gibt es diese Ein- und
  Ausreisesperre in den gesamten EU-Raum. Deswegen stellt sich diese Frage. Die Tatsache,
  dass alle genannten Behörden und Ministerien gesagt haben, dass sie dazu nichts
  sagen können, zeigt ja auch auf, dass es da eine Problematik gibt. Aber ich nehme
  jetzt ins Protokoll, dass Herr Giese sagt, dass das alles Quatsch ist, und Herr
  Hüseyin Doğru kann sich frei im gesamten EU-Raum bewegen. Ich habe gesagt, Ihre
  Aussage, dass es eine Ausreisegenehmigung für deutsche Staatsangehörige aus Deutschland
  gibt, ist Quatsch. Das heißt, Herr Doğrukann sich völlig frei im EU-Raum bewegen?
  Er braucht keine Ausreisegenehmigung aus Deutschland. Das ist nicht die Zuständigkeit
  Deutschlands. Doch, wenn er wieder nach Deutschland einreisen will. Ich dachte,
  Sie meinten in ein anderes Land. Das kann jedes Land für sich selber entscheiden.
  Ich glaube, das wird hier jetzt etwas ausführlich für alle anderen. Eine Frage an
  das Digitalministerium : Nach Medienberichten, die sich auf eine Kleine Anfrage
  einer Bundestagsfraktion berufen, schafft es Ihr Haus nicht, die vielen offenen
  Stellen zu besetzen. Woran liegt das? Den Medienbericht haben wir gesehen. Ich möchte
  dem Eindruck, der hier vermittelt wird, dass der Aufbau des Hauses schleppend verläuft,
  hier entschieden widersprechen. Das Digitalministerium ist seit dem ersten Tag arbeits-
  und handlungsfähig gewesen. Ich finde, unsere Bilanz kann sich sehen lassen. Wir
  haben in kurzer Zeit zwei Modernisierungsagenden verhandelt und verabschiedet. Wir
  haben im Kabinett die Modernisierungsagenda Bund und Föderal und drei Wochen nach
  Amtsantritt den beschleunigten Netzausbau beschlossen. Wir stellen hier ein überragendes
  öffentliches Interesse fest. Es gibt zahlreiche Initiativen für mehr digitale Souveränität,
  neue Ansätze bei der Verwaltungsdigitalisierung. ‑ Unsere Bilanz finden Sie auf
  der Website. Wie Sie der Antwort auf die parlamentarische Anfrage entnehmen können,
  sind es vor allem Stellen in unseren Querschnittsabteilungen, die nicht besetzt
  sind, also in der Abteilung S ‑ Service ‑, der Zentralabteilung bei uns, oder auch
  in der Hausleitung. Das ist dem Umstand geschuldet, dass wir über 2000 Bewerbungen
  auf die 150 offenen Stellen aus dem Starterpaket bekommen haben. Diese mussten sehr
  sorgfältig abgearbeitet werden. Wir haben im Herbst die Bewerbungsgespräche geführt.
  Jetzt wurden aus diesen 2000 Bewerbungen 150 Personen ermittelt, die zu uns kommen
  wollen. Das ist dann auch immer eine Einzelverhandlung mit den Häusern. Das sind
  alles Stellen aus der Bundesverwaltung; da muss man also auch mit dem Counterpart
  sprechen. Die Besetzung dieser Stellen läuft. Wir sind zuversichtlich, dass die
  sehr zeitnah abgeschlossen werden kann. Ein Großteil kommt noch vor dem Sommer.
  Zum Herbst sollte ein Großteil tatsächlich da sein. Das heißt, wenn ich das richtig
  verstehe, die 550 Stellen, die laut der Antwort momentan im Ministerium da sind,
  sind die bereits besetzten? Die 109 unbesetzten Stellen kommen noch obendrauf, und
  dann ist das Ministerium vollständig? (zum geplanten Kauf von Tomahawk-Marschflugkörpern
  und Typhon-Raketenwerfern in den USA ) Eine Nachreichung an den Kollegen bezüglich
  Foreign Military Sales: In den USA ist auch der Direktkauf möglich. Im Bereich Foreign
  Military Sales hat man den Vorteil, auf endverhandelte Regierungsverträge der US-Seite
  zuzugreifen, zum Beispiel Rahmenverträge, und sie dann zu den Konditionen zu beschaffen.
  Die Exportgenehmigung ist darin schon inbegriffen, während man beim Direktkauf den
  normalen Weg, den es auch in Deutschland gibt ‑ Verhandlungen über die endgültigen
  Verträge; das umfasst auch Lieferfristen, Lieferzeiten und Exportgenehmigungen ‑,
  also den ganzen Prozess, durchlaufen muss. Beides hat Vor- und Nachteile; aber,
  der Vollständigkeit halber, beides ist möglich. Dann direkt dazu die Nachfrage,
  ob die Tomahawk-Beschaffung über den einen oder den anderen Pfad verläuft. Wo ist
  also der Antrag gestellt worden? Vor einem Jahr. Die Erstanfrage lief über Foreign
  Military Sales.'
