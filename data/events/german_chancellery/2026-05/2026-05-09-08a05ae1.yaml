title: Bundeskanzler Merz gratuliert dem Ministerpräsidenten von Ungarn, Péter Magyar
text: Sehr geehrter Herr Ministerpräsident, zu Ihrem Amtsantritt gratuliere ich Ihnen
  herzlich. Deutschland und Ungarn sind auf vielfältige Weise eng miteinander verbunden
  und Partner in der Europäischen Union und der NATO. Ich freue mich darauf, mit Ihnen
  gemeinsam diese Verbindungen zum Wohle unserer beiden Länder zu intensivieren und
  weiter auszubauen. Es würde mich sehr freuen, Sie schon bald persönlich in Berlin
  begrüßen zu dürfen. Für die vor Ihnen liegenden Aufgaben wünsche ich Ihnen Erfolg
  und eine glückliche Hand. Mit freundlichen Grüßen Friedrich Merz Bundeskanzler der
  Bundesrepublik Deutschland
