title: Den Bundesrat passiert Besserer Verbraucherschutz bei Kreditverträgen
text: 'Umsetzung der EU-Richtlinie: Verbraucherschutz bei Kreditverträgen wird gestärkt.
  Verbraucherinnen und Verbraucher genießen in Zukunft einen deutlich besseren rechtlichen
  Schutz beim Abschluss von Kreditgeschäften. Zudem wird durch die Ausweitung des
  Anwendungsbereichs des Verbraucherdarlehensrechts der europäische Binnenmarkt gefördert.
  Um bei abgeschlossenen Kreditverträgen Risiken zu minimieren und die Verbraucherinnen
  und Verbraucher vor der Schuldenfalle zu bewahren, hatte das Bundeskabinett einen
  Gesetzentwurf zur Umsetzung der EU -Richtlinie 2023/2225 über Verbraucherkreditverträge
  beschlossen. Dieser sieht umfangreiche verbraucherschützende Regelungen vor. Die
  Bundesregierung setzt damit die Verbraucherkreditrichtlinie der Europäischen Union
  in deutsches Recht um, die europaweit einheitliche Standards im Verbraucherschutz
  bei Kreditgeschäften garantiert. Im Bundestag wurde das Gesetz zudem um eine Rechtsgrundlage
  für die Förderung von E-Autos ergänzt. Der Bundesrat hat dem Gesetzentwurf nun zugestimmt.
  Der Bundestag hat beschlossen, Debitkarten mit Zahlungsaufschub aus dem Anwendungsbereich
  der Regelungen auszunehmen. Ferner wurde eine Vorschrift zum sogenannten Scoring
  ( Verfahren zur Ermittlung der Bonität eines Verbrauchers oder eines Unternehmens)
  im Bundesdatenschutzgesetz neu gefasst. Zusätzlich wurde eine zuwendungsrechtliche
  Regelung für das von der Bundesregierung aufgelegte Förderprogramm für „ klimaneutrale
  Mobilität für Haushalte mit kleinen und mittleren Einkommen “ beschlossen. Die dafür
  notwendige Gesetzesgrundlage – das Gesetz zur Förderung klimaneutraler Mobilität
  – war Teil des Änderungsantrags der Koalitionsfraktionen zum Gesetzentwurf der Bundesregierung
  zur Umsetzung der EU -Richtlinie 2023/2225 über Verbraucherkreditverträge. Danach
  soll die Förderung grundsätzlich für E-Fahrzeuge gelten, die erstmals nach dem 1.
  Januar 2026 zugelassen worden sind. Das soll auch dann der Fall sein, wenn der zugrundeliegende
  Vertrag bereits vor Beantragung der Förderung geschlossen worden ist. Die Regelung
  soll einerseits vorbeugen, dass Bürgerinnen und Bürger mit dem Kauf zögern. Andererseits
  soll die Umsetzung durch ein einstufiges Förderverfahren, bei dem die Antragstellung
  nach der erstmaligen Zulassung des Fahrzeugs erfolgt, möglichst bürokratiearme sein.'
