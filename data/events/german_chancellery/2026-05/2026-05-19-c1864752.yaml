title: Pressekonferenz von Bundeskanzler Merz und dem Bundespräsidenten der Schweiz,
  Guy Parmelin „Enge und vertraute Nachbarn“ in einer Welt im Umbruch
text: 'Die wirtschaftliche Zusammenarbeit und die weltweiten Konflikte waren Thema
  der Gespräche von Bundeskanzler Merz und dem Schweizer Bundespräsidenten Parmelin
  . Deutschland und die Schweiz seien „sprachlich, wirtschaftlich und geografisch
  eng miteinander verbunden“, sagte Bundeskanzler Friedrich Merz in einer gemeinsamen
  Pressekonferenz beim Besuch des Schweizer Bundespräsidenten Guy Parmelin am Dienstag
  in Berlin. Täglich würden zehntausende Pendlerinnen und Pendler die Grenze ganz
  selbstverständlich überqueren, wovon die Wirtschaft in beiden Ländern profitiere.
  Die andauernde iranische Blockade der Straße von Hormus nannte der Bundeskanzler
  einen „großen Schaden für uns beide“, da Deutschland und die Schweiz sehr stark
  vom Export abhängig seien. „Wir leben von offenen Handelswegen und niedrigen Zöllen
  auf der Welt.“ Merz forderte, die Freiheit der Seewege schnellstmöglich wiederherzustellen
  und forderte den Iran abermals auf, an den Verhandlungstisch zu kommen. Meine Damen
  und Herren, herzlich willkommen und ein besonders herzliches Willkommen dem amtierenden
  Bundespräsidenten der Schweiz, Guy Parmelin. Bienvenue à Berlin ! Herr Präsident,
  ich freue mich, dass ich die Gelegenheit habe, Sie heute in Berlin zu empfangen.
  Wir haben ja sehr gute Beziehungen zueinander, und ich will Ihnen für die Gastfreundschaft
  bei der gegenwärtigen Eishockey-Weltmeisterschaft danken, auch wenn ich zugeben
  muss, dass das Spiel gestern Abend nicht nur Freude ausgelöst hat. Aber die deutsche
  Mannschaft hat leidenschaftlich gekämpft, und am Ende haben die Schweizer Gastgeber
  ihre ‑ ‑ ‑ Nein, aber selbst wenn wir es vertieft hätten, wäre es keine Belastung
  unserer Beziehungen geworden. Aber die Schweiz ist ein guter Gastgeber, und Sie
  sind gestern Abend Ihrer Favoritenrolle gerecht geworden. Dazu gratulieren wir herzlich.
  Sie sind wieder einmal hervorragende Gastgeber, wie zuletzt auch bei der Fußball-Europameisterschaft
  der Frauen. Meine Damen und Herren, die Schweiz und Deutschland sind sprachlich,
  wirtschaftlich und geografisch eng miteinander verbunden. Für zehntausende Pendler
  ist das tägliche Wechseln von einem Land in das andere selbstverständlich. Jeden
  Tag auch die Grenze zu überqueren, wird praktisch gar nicht mehr wahrgenommen. Davon
  profitiert die Wirtschaft auf beiden Seiten. Deutschland ist der größte Handelspartner
  der Schweiz. Diese Beziehungen wollen wir weiter ausbauen. Wir investieren in die
  nötige Infrastruktur, etwa durch den in diesem Jahr beginnenden Bau des Pfaffensteigtunnels.
  Dieser Tunnel wird eine bessere Anbindung der Grenzregion an den neuen Stuttgarter
  Hauptbahnhof bringen. Aber für unsere Wettbewerbsfähigkeit sind auch andere Infrastrukturvorhaben
  wichtig und von großer Bedeutung. Ich begrüße es daher sehr, dass die Europäische
  Union und die Schweiz ihre Abkommen nun vertiefen und modernisieren wollen. Das
  dient beiden Seiten. Wir wünschen uns von uns aus eine zügige Umsetzung für unsere
  beiden Länder. Wir sind zwei Länder, die sehr stark vom Export abhängig sind, und
  wir leben von offenen Handelswegen und niedrigen Zöllen auf der Welt. Deswegen ist
  die iranische Blockade der Straße von Hormus für uns beide ein großer Schaden. Wir
  setzen deshalb mit unseren Partnern darauf, die Freiheit der Seewege so schnell
  wie möglich wiederherzustellen. Wenn die entsprechenden Voraussetzungen erfüllt
  sind, wird Deutschland auch bereitstehen, wie Sie alle wissen, sich mit militärischen
  Fähigkeiten dafür zu engagieren. Dafür muss aber der Iran an den Verhandlungstisch
  kommen. Er muss aufhören, auf Zeit zu spielen, er darf nicht länger die Region und
  die ganze Welt zur Geisel nehmen, und vor allem muss das militärische Nuklearprogramm
  beendet werden. Unter dem Vorsitz der Schweiz hat sich auch die OSZE erstmalig seit
  Beginn des russischen Angriffskriegs auf einen Haushalt einigen können. Das ist
  eine beachtliche diplomatische Leistung, zu der wir gerne beigetragen haben und
  zu der wir gratulieren. Die Schweiz bemüht sich wie Deutschland um ernsthafte Verhandlungen
  auch über ein Ende des russischen Krieges gegen die Ukraine. Wir teilen miteinander
  die Überzeugung, dass ein tragfähiger Frieden nur gemeinsam mit der Ukraine, mit
  Russland, mit den USA und mit den Europäern erreicht werden kann. Bis es so weit
  ist, bleibt für uns die konsequente Unterstützung der Ukraine von höchster Bedeutung.
  Das gilt für militärisches Gerät und Ausrüstung ebenso wie für zivile Hilfsgüter.
  Kyjiw weiß, die Regierung der Ukraine, der Präsident der Ukraine, sie alle wissen,
  dass sie sich auf Deutschland und Europa verlassen können. Herr Bundespräsident,
  noch einmal herzlich willkommen! Deutschland und die Schweiz sind enge und vertraute
  Nachbarn. In einer Welt im Umbruch arbeiten wir zwischen unseren beiden Ländern
  sehr eng und vertrauensvoll zusammen. Wir tun das im gemeinsamen Interesse. Wir
  teilen auch viele Werte und Grundüberzeugungen miteinander. Deswegen noch einmal
  sehr herzlichen Dank für Ihren Besuch. Herzlichen Dank für die gute Zusammenarbeit
  zwischen der Schweiz und Deutschland. Wir wollen Sie gerne auch weiter im beiderseitigen
  Interesse vertiefen. Meine Damen und Herren, danke für Ihre Worte, Herr Bundeskanzler,
  und die Gelegenheit zum Austausch. Deutschland und die Schweiz verbindet weit mehr
  als nur die gemeinsame Sprache. Wir teilen eine starke Innovationskraft und die
  Fähigkeit, uns rasch an sich verändernde Bedingungen anzupassen. Der Bundeskanzler
  und ich haben heute intensiv über Wettbewerbsfähigkeit, Innovation, Stabilität gesprochen.
  Dabei haben wir auch das zunehmend herausfordernde internationale Umfeld mitberücksichtigt.
  Für die Schweiz ist klar: Deutschland ist unser wichtigster Handelspartner. Täglich
  überqueren Waren, Ideen und Menschen unsere gemeinsame Grenze. Zehntausende Arbeitsplätze
  sind auf eine reibungslose Zusammenarbeit zwischen unseren beiden Ländern angewiesen.
  Umso entscheidender ist es, gemeinsam unsere Wettbewerbsfähigkeit zu stärken. Für
  die Schweiz bedeutet dies, langfristig in Bildung und Forschung zu investieren,
  mit Offenheit und Verlässlichkeit. Unser Land zählt zu den innovationsstärksten
  Volkswirtschaften der Welt. Dies verdanken wir nicht nur unseren Unternehmen und
  Hochschulen, sondern auch unserer engen Einbettung in den europäischen Wirtschafts-
  und Forschungsraum und hier insbesondere der Zusammenarbeit mit Deutschland. Aus
  diesem Grunde wollen wir diese Kooperation noch weiter ausbauen. Ein konkretes Beispiel
  für diese enge Zusammenarbeit ist die in wenigen Wochen bevorstehende Eröffnung
  des ETH Campus in Heilbronn. Gemeinsame Forschungsprojekte an Universitäten, die
  engen Kooperationen von Start-ups bis zur Industrie oder verzahnte Wertschöpfungsketten
  in Schlüsselbranchen zeigen, dass Innovation heute grenzüberschreitend entsteht.
  Vor diesem Hintergrund habe ich Bundeskanzler Merz und seine Delegation über die
  innenpolitischen Schritte beim Ratifizierungsprozess des Vertragspakets zwischen
  der Schweiz und der EU informiert. Dessen Ziele sind Planungssicherheit, Investitionsschutz
  und fairer Wettbewerb. Diese Wettbewerbsfähigkeit und entsprechende Innovationen,
  aber auch unsere Demokratien benötigen ein Umfeld von Frieden und Sicherheit. Die
  internationale Lage führt uns täglich vor Augen, wie instabil dies ist, und die
  Kriege in der Ukraine und im Nahen und Mittleren Osten stellen uns vor große politische,
  wirtschaftliche und gesellschaftliche Herausforderungen. Gleichzeitig erleben wir
  tiefgreifende geopolitische Verschiebungen. Auch hier teilen die Schweiz und Deutschland
  ein gemeinsames Verständnis von Verantwortung für den Erhalt der demokratischen
  Institutionen, für die Achtung des Völkerrechts und für die Sicherheit unserer Bürgerinnen
  und Bürger. Die Schweiz ist sich ihrer Verantwortung bewusst. Als neutrales Land
  leistet sie neben humanitärer Hilfe wichtige Beiträge zur internationalen Stabilität
  durch diplomatische Vermittlung und als Gastgeberin von Dialogformaten. Darüber
  hinaus engagiert sich die Schweiz aktiv in internationalen Organisationen, etwa
  mit ihrem diesjährigen Vorsitz der OSZE . Gleichzeitig stehen wir überzeugt an der
  Seite jener, die sich für das Völkerrecht, für freie Märkte und für Kooperation
  einsetzen. Ich möchte abschließend betonen: Die Schweiz ist bereit, Verantwortung
  zu übernehmen bei uns in Europa und darüber hinaus. Besten Dank, Herr Bundeskanzler,
  für die Einladung zu dem heutigen Treffen und den konstruktiven Austausch. Ich freue
  mich auf weitere Begegnungen im Laufe meines Präsidialjahres – es bleiben noch ungefähr
  sieben Monate. Frage : Herr Bundeskanzler, ich weiß, Deutschland wurde gestern von
  den Schweizern bei der Eishockey- WM filetiert. Ich hoffe, Sie sind trotzdem gnädig
  gestimmt. Inwieweit können und wollen Sie die Schweiz gegen die höheren Stahlzölle
  unterstützen, damit sie nicht als Drittland eingestuft wird oder größere Kontingente
  erhalten kann? Bundespräsident Parmelin , haben Sie die Frage nach der neuen EU
  -Regel, dass die Schweiz die Kosten der arbeitslosen Grenzgänger übernimmt, mit
  Bundeskanzler Merz angesprochen? Falls ja, wie war seine Reaktion? Bundeskanzler
  Merz : Wir haben intensiv über die gegenwärtige Lage in der Handelspolitik gesprochen
  und auch beide die Hoffnung zum Ausdruck gebracht, dass wir möglichst bald mit den
  Vereinigten Staaten von Amerika zu einem Vertrag, zu einer Übereinkunft über die
  Zölle kommen. Wir müssen jetzt abwarten, wie die Verhandlungen zwischen Europa und
  der Administration in Washington verlaufen, aber wir beide hoffen, dass wir diesen
  Konflikt so schnell wie möglich beilegen können und dass wir dann auch eine verlässliche
  Grundlage für den gegenseitigen Handel haben – und das gilt dann auch für den bilateralen
  Handel zwischen der Schweiz und Deutschland. Bundespräsident Parmelin : Was die
  neue EU -Regel bei der Arbeitslosenversicherung betrifft, so muss die EU darüber
  definitiv entscheiden. Dann gibt es eine Diskussion im Gemischten Ausschuss und
  dann diskutieren wir darüber. Wir werden sehen, ob wir eine Lösung bzw. eine Einigung
  finden. Ich habe darüber informiert, dass eine solche Diskussion parallel zu der
  Diskussion über das EU -Paket in der Schweiz stattfindet. Natürlich sind im Land
  und im Parlament jetzt Diskussionen im Gange. Das ist der vorgesehene Ablauf, aber
  das hilft nicht. Frage : Herr Bundeskanzler, eine innenpolitische Frage, wenn Sie
  erlauben: Sie werden heute Nachmittag vor der SPD -Fraktion auftreten, und am 10. Juni
  trifft sich die Koalition mit den Sozialpartnern. Was für einen Empfang erwarten
  Sie da heute bei der SPD ? Erwarten Sie Applaus oder auch ein paar Buhrufe? Kann
  man diesen Auftritt insgesamt als Zeichen werten, dass die Koalitionspartner den
  Ernst der Lage jetzt erkannt haben, und kann man diese letzten Versöhnungszeichen
  als Zeichen für einen schwarz-roten Stimmungsumschwung sehen? Ganz kurz noch an
  den Schweizer Präsidenten: Die Schweiz hat im Juni die Volksbefragung zu der sogenannten
  10-Millionen-Regelung. Fürchten Sie nicht, dass ein positives Votum, eine Zustimmung,
  zum Ende der Personenfreizügigkeit mit der EU führen würde? Haben Sie darüber schon
  mit Ihren EU -Partnern gesprochen? Würden Sie in diesem Fall auf eine Sonderregelung
  für die Schweiz hoffen? Bundeskanzler Merz : Herr Kollege, ich folge einer Einladung
  des Fraktionsvorsitzenden der SPD -Bundestagsfraktion – ein Jahr, nachdem wir die
  Koalition begonnen haben. Eigentlich sollte dieser Termin schon vor zwei Wochen
  stattfinden. Ich konnte zu diesem Zeitpunkt aber nicht teilnehmen, weil wir in der
  eigenen Bundestagsfraktion die Wahlen zum Fraktionsvorstand hatten, bei denen die
  beiden Parteivorsitzenden ja auch das Vorschlagsrecht für den Fraktionsvorsitzenden
  haben; deswegen musste ich an diesem Tag in der eigenen Bundestagsfraktion sein
  und bleiben. Ich habe mit Matthias Miersch aber verabredet, dass ich diesen Termin
  heute wahrnehme. Ich freue mich auf die Begegnung mit den Kolleginnen und Kollegen
  der SPD -Bundestagsfraktion. Ich war zum letzten Mal vor einem Jahr dort. Dies ist
  ein Zeichen der guten Zusammenarbeit und des festen Willens, die Koalition auch
  zum gemeinsamen Erfolg zu führen. Ich freue mich wirklich auf die Begegnung mit
  den Kollegen und Kolleginnen dort, und ich bin mir sicher, dass wir eine sehr gute
  Diskussion miteinander haben werden – auch über die Themen, die wir in den nächsten
  Tagen und Wochen miteinander weiter auf den Weg bringen wollen. Bundespräsident
  Parmelin : Was die 10-Millionen-Initiative betrifft, so haben wir am 14. Juni eine
  Volksabstimmung mit Doppelmehrheit, da mit dieser Entscheidung eine Änderung der
  Verfassung verbunden wäre. Die Diskussionen laufen, und es sind natürlich scharfe
  Diskussionen. Hypothetisch gesagt: Wenn am 14. Juni mit Ja entschieden wird, dann
  ändert das rechtlich aktuell nichts, das ist klar. Diese Initiative will zum Beispiel
  nicht sofort eine Abschaffung der FZA . Das heißt aber, dass der Bundesrat ein Gesetz
  zugunsten des Parlaments vorbereiten muss. Es bleibt eine Marge an Manövern für
  das Parlament. Sobald dieses Gesetz am Ende ist, ist auch wieder ein Referendum
  möglich. So könnte es in der Zukunft kommen. Aber aktuell läuft die Kampagne. Das
  sind scharfe Diskussionen in der Schweiz. Wir wollen das Resultat nicht antizipieren.
  Das ist aktuell knapp in den Umfragen. Frage : Zwei Fragen an Sie, Herr Merz; die
  erste schließt an die Frage der Kollegin nach den Stahlzöllen an. Wenn die jetzt
  wie angedacht umgesetzt werden, dann drohen Schweizer Stahlproduzenten ja Zölle
  von 50 Prozent. Werden Sie sich in Brüssel jetzt noch dafür engagieren, dass die
  Schweiz da einen Sonderweg bekommt? Daran angeschlossen grundsätzlich die Frage:
  Haben Sie angesichts der aktuellen Weltlage eigentlich Verständnis für Schweizer
  Sonderwege? Bundeskanzler Merz : Ich kenne die besondere Situation der Schweiz in
  mehrfacher Hinsicht. Sie werden verstehen, dass unser Augenmerk zunächst einmal
  darauf gerichtet ist, jetzt so schnell wie möglich den Zollkonflikt mit den USA
  beizulegen. Ich bin da verhalten zuversichtlich, dass uns das in den nächsten Tagen
  und Wochen gelingt. Wir haben jetzt den Zeitplan bis zum 4. Juli miteinander verabredet.
  Das ist das Datum, zu dem Präsident Trump gerne eine Lösung hätte. Ich habe voll
  und ganz Verständnis dafür, dass wir hier auch mit der Schweiz zu einem entsprechenden
  Übereinkommen kommen sollten. Wir haben kurz darüber gesprochen. Aus meiner Sicht
  kann ich nur sagen: So geringe Zölle wie möglich sind zum gegenseitigen Nutzen unserer
  beiden Länder. Wir vertreten beide Länder, die stark im Export tätig sind. Deswegen
  haben wir beide ein hohes Interesse daran, auch Zölle im bilateralen Handel zwischen
  der EU und der Schweiz so niedrig wie möglich zu haben. Das ist eine Aufgabe, die
  uns gestellt ist und der wir auch gerecht werden wollen. Frage : Herr Bundespräsident,
  explizit keine Frage zum Eishockey. Sie sprechen ja davon, dass die Schweiz Verantwortung
  übernehmen möchte. In Ihrem Land ist ein neuralgischer Punkt der Energieversorgung
  für ganz Europa, und die Schweiz bewegt sich auf ein Prozent Verteidigungsausgaben
  zu. Haben Sie darüber gesprochen, ob und wie die Schweiz womöglich mehr tun will
  oder sollte in Bezug auf gesamteuropäische Verteidigung und vor allem hybride Angriffe?
  Herr Bundeskanzler, der russische Präsident ist auf dem Weg zu einem Treffen mit
  Präsident Xi . Wie blicken Sie auf diese Begegnung? Was erwarten Sie? Und wie blicken
  Sie auf die neuesten Umfragen, die ein weiteres Ansteigen der AfD auf 29 Prozent
  zeigen? Bundespräsident Parmelin : Wir haben nicht direkt über die Kosten für die
  Verteidigung diskutiert. Gestern war mein Kollege Martin Pfister hier, er hatte
  Diskussionen mit seinen Kollegen hier. Wir wollen, dass das Parlament ‑ ‑ ‑ Der
  Bundesrat will, dass wir in Europa besser in Fragen der Verteidigung kooperieren.
  Natürlich sind wir neutral, aber es gibt Möglichkeiten, diese Kooperation zu verbessern.
  Das Parlament und der Bundesrat haben schon entschieden, mehr Mittel für die Verteidigung
  einzubringen. Natürlich sind wir aktuell tief, aber die Zeichen gehen klar in diese
  Richtung. Jetzt muss man Mehrheiten im Parlament und vielleicht in der Bevölkerung
  finden. Denn wenn zum Beispiel eine Mehrwertsteuererhöhung kommt, muss die Bevölkerung
  mit Doppelmehrheit entscheiden. Die Diskussionen laufen, aber wir sind auch Teil
  der europäischen Sicherheitsarchitektur. Mit Respekt auf unsere Neutralität: Es
  sind verschiedene Maßnahmen möglich. Ich habe auch Bundeskanzler Merz darüber informiert.
  Wo sind wir in der Schweiz aktuell beim Kriegsmaterialgesetz? Das Parlament hat
  ein neues Gesetz angenommen. Mit diesem Gesetz gibt man dem Bundesrat mehr Flexibilität.
  Eine Wiederausfuhr ist für gewisse Länder nicht mehr möglich, es gibt immer Bedingungen.
  Aber hier wird es ein Referendum geben. Man muss abstimmen, wahrscheinlich vor Ende
  des Jahres. Wir wissen noch nicht, ob es September oder November sein wird, weil
  gewisse Milieus diese Änderung nicht wollen. Bundeskanzler Merz : Wir haben über
  dieses Thema auch im Hinblick auf mögliche Exportbeschränkungen gesprochen. Es gibt
  viele deutsche Unternehmen, die daran interessiert sind, mit Schweizer Unternehmen
  der Verteidigungsindustrie enger zusammenzuarbeiten. Wir haben natürlich ein hohes
  Interesse daran, dass es dann im Falle gemeinsamer Produktion nicht zu Exportbeschränkungen
  kommt, wenn wir die Materialien, die produziert werden, brauchen. Insofern bin ich
  dankbar, dass es hier eine entsprechende gesetzliche Klarstellung in der Schweiz
  gegeben hat. Sie alle erinnern sich vermutlich auch an die Munitionsbeschaffung,
  die einmal aus einer Produktion aus der Schweiz heraus schwierig war. Wir beobachten
  den Besuch von Präsident Putin in Beijing natürlich sehr genau. Wir haben auch verschiedene
  Äußerungen aus der vorangegangenen Begegnung zwischen Präsident Xi Jinping und Präsident
  Trump mit Aufmerksamkeit wahrgenommen. Wir erwarten jetzt nicht einen grundlegenden
  Wechsel in den strategischen Beziehungen zwischen Russland und China. Wir verbinden
  mit diesem Besuch die Hoffnung, dass Präsident Xi auf Präsident Putin einwirkt,
  diesen Krieg in der Ukraine zu beenden, den er nicht gewinnen kann, im Gegenteil,
  der jeden Tag mit hohen Verlusten an Menschenleben für Russland einhergeht. Die
  innenpolitischen Themen behandeln wir weiter. Wir beobachten natürlich die demoskopische
  Lage. Ich werde den Kolleginnen und Kollegen in der SPD -Bundestagsfraktion heute
  Nachmittag auch noch einmal sagen, was der Zweck dieser Koalition ist, wo wir gemeinsam
  hinwollen. Ich bin mir sicher, dass wir ein gemeinsames Verständnis von der Arbeit
  haben, die jetzt in den nächsten Tagen und Wochen vor uns liegt.'
