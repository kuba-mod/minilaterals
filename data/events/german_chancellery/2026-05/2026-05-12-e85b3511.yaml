date: '2026-05-12'
type: press_release
source_name: german_chancellery
title: Bundeskanzler beim 17. Petersberger Klimadialog Deutschland ist ein verlässlicher
  Partner in der Klimapolitik
text: 'Umwelttechnologien wachsen seit 2010 am schnellsten, sagte Merz. Bundeskanzler
  Friedrich Merz nahm am 22. April 2026 am 17. Petersberger Klimadialog in Berlin
  teil. In seiner Rede am zweiten Veranstaltungstag stellte er die Klimapolitik in
  den Kontext aktueller geopolitischer und wirtschaftlicher Umbrüche und betonte die
  Notwendigkeit einer engen Vernetzung von Wirtschafts-, Energie-, Klima und Innovationspolitik.
  Dabei sei es wichtig, dass diese Verflechtung sich in Allianzen widerspiegelt: „Gemeinsam
  mit unseren europäischen Partnern, gemeinsam mit Partnern auf der ganzen Welt, gemeinsam
  mit der Wirtschaft“. Der Kanzler unterstrich, dass das Pariser Klima-Abkommen trotz
  aller Herausforderungen eine bedeutende Errungenschaft bleibe und gleichzeitig eine
  zentrale Grundlage für das Handeln der Bundesregierung im Klimaschutz darstelle.
  Gleichzeitig machte er deutlich, dass Deutschland seinen Beitrag leisten wolle,
  aber auch das Engagement anderer Staaten erwarte. Klimaschutz dürfe die industrielle
  Basis in Deutschland nicht gefährden, sondern müsse Innovation, Wettbewerbsfähigkeit
  und gesellschaftliche Akzeptanz sichern. Der Petersberger Klimadialog (PKD) wurde
  2010 ins Leben gerufen. Seitdem bringt er jährlich eine Auswahl an Ländern zusammen,
  um die Weltklimaverhandlungen am Ende des Jahres vorzubereiten. Der erste Klimadialog
  fand auf dem namensgebenden Petersberg in Bonn statt, bevor der Veranstaltungsort
  nach Berlin verlegt wurde. Der PKD wird immer gemeinsam mit dem Land oder den Ländern
  organisiert, welche die nächste Weltklimakonferenz leiten werden. Gastgeber des
  17. PKD war das Bundesumweltministerium zusammen mit der Türkei und Australien,
  die die nächste COP31 vorbereiten. Hier finden Sie die Originalrede des Bundeskanzlers
  beim 17. Petersberger Klimadialog auf Englisch. Sehr geehrter Herr Bundesminister
  Carsten Schneider, sehr geehrter Herr Minister Murat Kurum , sehr geehrter Herr
  Fatih Birol , sehr geehrter Herr Simon Stiell, sehr geehrter Herr Gunnar Groebler,
  sehr geehrte Frau Stephanie Pfaeifer, sehr geehrter Herr José Antonio Cabrera ,
  sehr geehrte Damen und Herren Ministerinnen und Minister, meine sehr geehrten Damen
  und Herren, ich begrüße Sie sehr herzlich hier in Berlin. Zum wiederholten Mal findet
  der Petersberger Klimadialog vor dem Hintergrund rasanter geopolitischer und geoökonomischer
  Veränderungen statt. Im Deutschen haben wir die Redewendung „die Ereignisse überschlagen
  sich“. Sie beschreibt eine Situation, in der Wandel eruptiv und mit immer größerer
  Geschwindigkeit erfolgt. In solchen Zeiten ist die Gefahr groß, den Blick für das
  Große und Ganze zu verlieren. Aber gerade in diesen Zeiten bedeutet politische Verantwortung,
  eine breitere Perspektive zu behalten. Wir alle – die Regierungen, die Unternehmen,
  die Gesellschaft – wollen eine Weltordnung im Sinne von Frieden, Freiheit und guten
  Lebensbedingungen mitgestalten. Dafür sind wir aufgefordert, uns mehr denn je mittel-
  und langfristige Ziele zu setzen und auf diese Ziele fokussiert hinzuarbeiten. Wir
  müssen Mitstreiter und Verbündete suchen und Allianzen zum allseitigen Interesse
  schließen. Und wir sind aufgefordert, vor den Erkenntnissen der Wissenschaft nicht
  die Augen zu verschließen, sondern uns das stetig wachsende Wissen umfassend zunutze
  zu machen. In diesem Sinne brauchen wir eine multilaterale, ambitionierte und wirksame
  Klimapolitik. Eine Klimapolitik, die die Unterstützung der Bevölkerung findet und
  dafür sorgt, dass unsere Volkswirtschaften wettbewerbsfähig bleiben. Ich möchte
  daher gleich zu Beginn unterstreichen, was ich im vergangenen Jahr in Belém gesagt
  habe: Deutschland bleibt bei diesen Bemühungen ein verlässlicher Partner. Wir sehen,
  dass der Klimawandel ernst ist, und Deutschland ist entschlossen, sich bei seiner
  Bekämpfung kraftvoll einzubringen. Wir stehen zum Übereinkommen von Paris und zu
  unseren Klimazielen. Wir setzen auf Innovation und Technologie. Effektive und vorausschauende
  Klimapolitik entsteht aus einer Verschränkung von Klima-, Wirtschafts-, Energie-
  und Innovationspolitik. Und wo immer wir hier Erfolge verzeichnen können, wird Klimapolitik
  zugleich globale Sicherheits- und Wohlstandspolitik. Wir sehen, dass die fortschreitende
  Erderwärmung bestehende Konflikte überall in der Welt verschärft und neue Konflikte
  zu verursachen droht. Sie treibt die ökonomischen Folgekosten in die Höhe, weil
  extreme Wetterereignisse und Umweltzerstörung Produktionsstandorte, Lieferketten
  und kritische Infrastruktur bedrohen. Außerdem steht in diesen Tagen einer andauernden
  Krise im Nahen und Mittleren Osten zu erwarten, dass die geopolitische und damit
  auch die geoökonomische Lage bis auf Weiteres turbulent bleiben. Wir müssen kurz-
  und mittelfristig von volatilen Rohstoffmärkten ausgehen. Wir müssen uns darauf
  einstellen, dass Akteure Lieferkettenabhängigkeiten politisch ausnutzen. Für die
  deutsche Bundesregierung ist eine zentrale Antwort darauf eine verschränkte Klima-,
  Wirtschafts-, Energie- und Innovationspolitik – im Bündnis mit unseren europäischen
  Partnern, im Bündnis mit Partnern weltweit, im Bündnis mit der Industrie. Dieser
  Ansatz kann auch auf die nötige Unterstützung in unserer Gesellschaft bauen. Reale
  Fortschritte beim Klimaschutz, bei der strategischen Unabhängigkeit oder bei der
  Wohlstands- und Freiheitssicherung gelingen nur in einer starken Partnerschaft mit
  der Industrie. Dort entstehen die Innovationen, dort entstehen die neuen Technologien,
  die unsere Zukunft gestalten. Ich freue mich daher, dass das Thema Industrietransformation
  im Mittelpunkt des heutigen Austausches steht. In dieser Transformation liegen so
  viele Chancen, die wir noch viel besser nutzen können – von neuen Geschäftsideen
  über neue Märkte bis hin zu globalem Wachstum. Die Clean-Tech -Industrie ist inzwischen
  zu einem globalen Wachstumsmotor geworden. Laut IEA wird sich der globale Clean-Tech
  -Markt bis 2035 nahezu verdreifachen und voraussichtlich auf rund 2 Billionen US‑Dollar
  anwachsen. In Deutschland ist die Clean-Tech -Branche seit 2010 um 50 Prozent stärker
  gewachsen als die deutsche Bruttowertschöpfung insgesamt - einschließlich Kreislaufwirtschaft,
  Solar- und Windenergie, einschließlich Wasserstoff. Es ist die Überzeugung der Bundesregierung,
  dass wir diesen Fortschritt und diese Innovationskraft am besten sichern und fördern,
  indem wir gute Rahmenbedingungen dafür sicherstellen: freien, fairen Wettbewerb
  im Rahmen einer regelgeleiteten Weltwirtschaft – und getragen von gut ausgebildeten
  Arbeitskräften, schnelleren Planungs- und Bauverfahren und wettbewerbsfähigen Energiepreisen.
  Dabei muss aber klar sein: Klimaschutz darf die industrielle Grundlage in Deutschland
  und anderen Ländern nicht gefährden. Ein Wandel, der zur Deindustrialisierung führt,
  wird von der Bevölkerung nicht mitgetragen werden. Und er wird letztendlich Innovationen
  behindern. Deutschland und Europa setzen in diesem Sinne ganz gezielt darauf, das
  Netz der EU -Handelspartnerschaften auszubauen. Wir haben jüngst mit Indien und
  MERCOSUR Handelsabkommen geschlossen. Und im vergangenen Monat hat die EU -Kommissionspräsidentin
  eine politische Einigung mit Australien für ein weiteres Freihandelsabkommen erzielt.
  Diese Abkommen auf Basis gemeinsamer Interessen und zu beiderseitigem Nutzen sind
  die Schlüssel dazu, die Planungssicherheit für Unternehmen wiederherzustellen und
  aufrechtzuerhalten. Wir stärken sie damit in ihrer Fähigkeit, die Technologien der
  Zukunft zu entwickeln – Technologien, die die Welt insgesamt im Klimaschutz voranbringen
  werden. Ein weiteres Schlüsselstück der europäischen und deutschen Klimapolitik
  bleibt auch die CO 2 -Bepreisung. Wir haben hier ein marktwirtschaftliches und technologieoffenes
  Instrument für die Transformation der Industrie zur Klimaneutralität. Auf EU -Ebene
  haben wir mit dem EU -Emissionshandelssystem ETS 1 seit 20 Jahren ein erfolgreiches
  System. Und es ist erfolgreich, gerade weil es ein marktwirtschaftliches System
  ist. Es erlaubt uns, Klimaschutz zu betreiben und gleichzeitig die Wettbewerbsfähigkeit
  unserer Industrien zu schützen. Deshalb setze ich mich in der EU auch nachdrücklich
  dafür ein, das ETS 1-System zu erhalten und zukunftsfest zu machen, indem wir es
  im Zuge der anstehenden Reviews mit klarem Fokus auf die Aufrechterhaltung der Wettbewerbsfähigkeit
  nachjustieren. Hierbei muss auch die Zukunft der energieintensiven Industrien berücksichtigt
  werden. viele Fortschritte sind uns bereits gelungen. Wir haben als Weltgemeinschaft
  bewiesen, dass wir im Angesicht gemeinsamer Herausforderungen gemeinsam an Lösungen
  arbeiten können. Das Übereinkommen von Paris ist und bleibt trotz aller Herausforderungen
  eine große Errungenschaft. Seit Paris hat sich der Ausbau der erneuerbaren Energien
  global fast verdoppelt. Und mit dem Paket von Dubai liegt jetzt ein internationaler
  Beschluss zur globalen Verdreifachung von Erneuerbaren und zur Verdopplung der Energieeffizienz
  bis 2030 vor. In den Mitgliedstaaten der EU implementieren wir seit 2022 mit RePowerEU
  einen ehrgeizigen Plan für die Stärkung unserer gemeinsamen Energiesicherheit und
  Souveränität. Die Klimapolitik hat in den vergangenen Jahrzehnten Fortschritte gemacht.
  Der Weg mag nicht immer geradlinig sein und unser Tempo wäre im besten Fall höher.
  Aber gemeinsam machen wir Fortschritte. Ich bringe es gerne auf diese Faustformel:
  Deutschland stellt heute ungefähr ein Prozent der Weltbevölkerung, gleichzeitig
  sind wir aber für ungefähr 2 Prozent der weltweiten CO 2 -Emissionen verantwortlich.
  Wir wollen perspektivisch unseren gerechten Anteil zur Lösung beitragen. Wir erwarten
  aber auch von anderen Ländern der Welt, dass sie ihren Beitrag leisten. Wir werden
  auf dreierlei Weise auf dieses Ziel hinarbeiten. Wir werden es erstens unseren Unternehmen
  ermöglichen, ihre Innovationskraft frei zu entfalten. Mit einer starken und innovativen
  Industrie stehen Deutschland die Mittel zur Verfügung, viele dieser Herausforderungen
  anzugehen. Wir werden zweitens den Nexus Klima-Frieden-Sicherheit im Zentrum unseres
  internationalen Engagements verankern. Mehr Investitionssicherheit, mehr Versorgungssicherheit
  und eine geringere Abhängigkeit von importierten fossilen Brennstoffen kommen ebenfalls
  dem Klimaschutz zugute. Drittens: Deutschland bleibt international ein Akteur für
  mehr Klimaschutz. Wir werden die öffentliche Klimafinanzierung weiterhin erheblich
  unterstützen. Mit den Just Energy Transition Partnerships und weiteren Formaten
  der Wirtschafts- und Energiekooperation unterstützen wir bereits heute in vielen
  Ländern die Energiewende. Wenn multilaterale Prozesse langsam sind, können uns konkrete
  Allianzen gleichgesinnter Akteure weit nach vorne bringen. Deutschland pflegt Klimapartnerschaften
  mit Ländern, die von den Folgen des Klimawandels potenziell besonders betroffen
  sind. Auch das gehört zu unserer Klimapolitik: Wir erkennen an, dass die Auswirkungen
  des Klimawandels ungleich verteilt sind – und oft sind diejenigen am stärksten betroffen,
  die das Problem am wenigsten verursacht haben. Mit unseren Partnerschaften wollen
  wir daher in den Partnerländern nicht nur direkt unterstützen, sondern auch die
  Widerstandsfähigkeit stärken, Investitionen ermöglichen und langfristig wirtschaftliche
  Chancen sichern. Meine Regierung arbeitet überdies eng mit kleinen Inselstaaten
  zusammen, für die der Anstieg des Meeresspiegels oftmals zur existenziellen Bedrohung
  wird. Ich freue mich, dass ich vor zwei Tagen mit Präsident Lula meine zugesagte
  Unterstützung für die Tropical Forest Forever Facility (TFFF) bekräftigen und konkretisieren
  konnte. Wir beabsichtigen, über die nächsten zehn Jahre insgesamt 1 Milliarde Euro
  bereitzustellen. Dieser neue, kapitalmarktbasierte Fonds soll Länder dauerhaft dabei
  unterstützen, tropische Regenwälder zu erhalten. Bekanntlich sind die Regenwälder
  zentrale Ökosysteme für das Weltklima. Sehr geehrte Damen und Herren, ich bin überzeugt,
  dass Deutschland, dass Europa, dass unser aller Länder gemeinschaftlich in der Lage
  sind, unsere Welt sicherer und lebenswerter zu machen. Wir wollen den Wohlstand
  für die Menschen überall auf der Welt mehren. Wir wollen die gemeinsame Herausforderung
  des Klimaschutzes bewältigen. Dafür braucht es Verlässlichkeit. Dafür braucht es
  gegenseitiges Vertrauen. Es braucht vertiefte Zusammenarbeit. Es braucht gute Rahmenbedingungen
  für unsere Volkswirtschaften, sodass sie ihre Innovationskraft entfesseln können.
  Es braucht eine breite öffentliche Unterstützung. Deutschland steht in diesem Geist
  als Partner bereit.'
