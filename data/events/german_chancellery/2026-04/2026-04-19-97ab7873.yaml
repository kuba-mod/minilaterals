  The countries also aim to cooperate on research, technology and space travel, as
  well as in the areas of the environment and climate, labour law and fair trade.
  Intergovernmental consultations primarily take place between the relevant ministers.
  Among those taking part in the consultations on behalf of Germany was Federal Minister
  of Finance Lars Klingbeil. The objectives of the partnerships were set out in writing
  at the signing ceremony. Minister for Economic Cooperation and Development Reem
  Alabali Radovan and Brazil''s Minister of the Environment and Climate Change João
