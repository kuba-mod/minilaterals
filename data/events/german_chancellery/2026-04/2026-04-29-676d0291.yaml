title: Im Kabinett beschlossen Für schnellen und effizienten Stromnetz-Ausbau
text: 'Mehr Freileitungen statt Erdkabel sollen den Ausbau der Stromnetze begünstigen.
  Die Bundesregierung will einen schnelleren und günstigeren Ausbau der Stromnetze
  ermöglichen. Dafür hat das Kabinett den Entwurf eines Zweiten Gesetzes zur Änderung
  des Bundesbedarfsplangesetzes beschlossen. Leistungsfähige Hochspannungsnetze sind
  für eine sichere, bezahlbare und nachhaltige Energieversorgung unverzichtbar. Die
  Bundesministerin für Wirtschaft und Energie, Katherina Reiche, unterstrich, dass
  das neue Gesetz dem Netzausbau in Deutschland neue Impulse gebe und die Energiewende
  konsequent fortführe. „Gleichzeitig legen wir den Grundstein für den weiteren kosteneffizienten
  Ausbau der Stromnetze, indem wir die neuen Stromautobahnen wieder als Freileitung
  realisieren.“ Beides entlaste Verbraucherinnen und Verbraucher. Das Bundesbedarfsplangesetz
  regelt, wo und wie Höchstspannungsnetze in Deutschland vordringlich gebaut werden
  sollen. Das ist in der Regel bei Engpässen im Übertragungsnetz notwendig. Die gesetzliche
  Festlegung beschleunigt die nachfolgenden Verwaltungsverfahren. Erdkabel – also
  unterirdisch verlegte Stromleitungen – sind zwar weiterhin möglich, in der Regel
  sollen dem Gesetzentwurf zufolge künftig beim Bau neuer Stromtrassen aber Freileitungen
  zum Einsatz kommen. Das ist deutlich kostengünstiger und dürfte daher in Zukunft
  auch zu niedrigeren Netzentgelten für alle Verbraucherinnen und Verbraucher beitragen.
  Teil des Gesetzes ist außerdem der Bundesbedarfsplan, der eine Liste mit konkreten,
  energiewirtschaftlich notwendigen Vorhaben zum Leitungsbau enthält. Insgesamt werden
  13 Netzausbauvorhaben geändert und 45 weitere Netzausbauvorhaben in den Bundesbedarfsplan
  aufgenommen. Unter anderem soll auch die Anbindung an Nachbarstaaten und an Offshore
  -Anlagen verbessert werden. Ein Vorhaben ist dann energiewirtschaftlich notwendig,
  wenn damit Engpässe im Übertragungsnetz behoben werden können. Diese Engpässe entstehen
  unter anderem durch den Ausbau der erneuerbaren Energien. So muss der Strom teilweise
  über weite Strecken von den Stromerzeugern zu den Verbraucherinnen und Verbrauchern
  gelangen: Erzeugt wird er beispielsweise aus Windenergie im Norden und Osten sowie
  auf See, wo der Wind besonders stark weht. Die größten Stromverbraucher – allen
  voran große Industriebetriebe – befinden sich aber im Süden und Westen Deutschlands.
  Kann der Strom aufgrund zu geringer Übertragungskapazitäten nicht transportiert
  werden, müssen die Kraftwerke gedrosselt und Kraftwerke an anderen Stellen aktiviert
  werden. Diese sogenannten Redispatch -Maßnahmen erzeugen hohe Kosten. Auch aus diesem
  Grund ist ein schneller, effizienter Ausbau der Übertragungsnetze ein wichtiger
  Beitrag, um die Kosten der Energieversorgung zu verringern. Die Entlastung privater
  Haushalte und der Wirtschaft bei den Energiepreisen ist ein zentrales Ziel der Bundesregierung.
  Dafür hat sie früh umfassende Beschlüsse gefasst.'
