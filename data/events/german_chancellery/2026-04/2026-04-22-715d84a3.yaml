title: Im Kabinett beschlossen Finanzielle Gerechtigkeit nach Scheidung im Alter stärken
text: 'Ziel der Reform ist es, sicherzustellen, dass alle während der Ehe erworbenen
  Ansprüche auch tatsächlich gerecht zwischen den Ehepartnern aufgeteilt werden. Foto:
  picture alliance/dpa-tmn/Christin Klose Die Bundesregierung hat mit einem Kabinettsbeschluss
  eine Reform des Versorgungsausgleichs bei Scheidungen auf den Weg gebracht und will
  damit für mehr Gerechtigkeit bei der Aufteilung von Vorsorgeanrechten im Alter sorgen.
  Künftig sollen vergessene oder verschwiegene Ansprüche nachträglich ausgeglichen
  werden können, zudem wird der Versorgungsausgleich auf bestimmte Altersvorsorgen
  von Unternehmern ausgeweitet. Im Falle einer Ehescheidung werden die während der
  Ehe erworbenen Vorsorgeanrechte – etwa aus der gesetzlichen Rentenversicherung –
  zwischen den Eheleuten hälftig geteilt. Arbeitsleistungen von Ehepartnern sind gleichwertig,
  egal ob sie im Beruf oder in der Familie erbracht werden. Der Versorgungsausgleich
  ist grundsätzlich Bestandteil jeder Scheidung. Bislang gilt: Wurde einmal gerichtlich
  über den Versorgungsausgleich entschieden, können vergessene oder verschwiegene
  Anrechte später nicht mehr geltend gemacht werden. Das kann im Einzelfall zu ungerechten
  Ergebnissen führen. Daher sieht der Gesetzentwurf nun die Möglichkeit eines nachträglichen
  schuldrechtlichen Ausgleichs in Gestalt eines Zahlungsanspruchs vor. Das heißt:
  Im Alter entsteht ein monatlicher Anspruch auf Ausgleich der bislang zum Beispiel
  nicht berücksichtigten Rentenanrechte. Ziel ist es, sicherzustellen, dass alle während
  der Ehe erworbenen Ansprüche auch tatsächlich gerecht zwischen den Ehepartnern aufgeteilt
  werden. Eine weitere Änderung betrifft Unternehmerinnen und Unternehmer: Künftig
  sollen auch betriebliche Anrechte, die auf eine Kapitalleistung gerichtet sind,
  beim Versorgungsausgleich berücksichtigt werden. Bislang werden solche Ansprüche
  lediglich beim Zugewinn ausgeglichen. Die vorgesehene Neuerung betrifft vor allem
  Geschäftsführerinnen und -geschäftsführer, die zugleich beherrschende Gesellschafter
  sind, also maßgeblich Unternehmensentscheidungen beeinflussen können. Die geplante
  Änderung hat insbesondere drei Vorteile: Durch die Anpassung soll eine Gleichbehandlung
  der betrieblichen Anrechte von Arbeitnehmern und Unternehmern erreicht werden. Zudem
  wird auch hier ein gerechter Ausgleich zwischen geschiedenen Ehepartnern angestrebt.
  Zuletzt kann Bürokratie abgebaut werden, da die bislang oft schwierige Abgrenzung
  zwischen Zugewinn- und Versorgungsausgleich wegfällt. Im Rahmen des Versorgungsausgleichs
  werden bei einer Ehescheidung grundsätzlich alle in der Ehezeit erworbenen Vorsorgeanrechte
  hälftig geteilt. Das sind zum Beispiel Ansprüche in der gesetzlichen Rentenversicherung,
  der Beamtenversorgung sowie einer betrieblichen oder privaten Altersvorsorge. Der
  Zugewinnausgleich teilt im Scheidungsfall den Vermögenszuwachs während einer Ehe
  zwischen den Eheleuten auf.'
