title: Im Kabinett beschlossen Handelsabkommen zwischen EU und Mexiko baut Zölle ab
text: 'Das Handelsabkommen zwischen der EU und Mexiko trägt dazu bei, europäische
  Lieferketten breiter aufzustellen und so die Abhängigkeit von einzelnen Ländern
  zu verringern. Die Europäische Union und Mexiko vertiefen ihre wirtschaftliche Zusammenarbeit.
  Die Bundesregierung hat den nächsten Schritt dafür freigemacht, indem sie der Unterzeichnung
  und vorläufigen Anwendung des Modernisierten Globalabkommens der EU mit Mexiko zugestimmt
  hat – sowohl im Namen der EU als auch für Deutschland selbst. Es soll das bisher
  geltende ersetzen. Das Abkommen baut unter anderem Zölle ab und beseitigt Handelshemmnisse.
  Es leistet zudem einen Beitrag zu vielfältigeren europäischen Lieferketten und damit
  zu weniger Abhängigkeit von einzelnen Ländern. Damit setzt die Bundesregierung ihr
  Ziel aus dem Koalitionsvertrag um: das Abkommen mit Mexiko zu unterstützen und die
  Ratifizierung des Abkommens zu beschleunigen. Mit dieser Entscheidung bekennt sich
  die Bundesregierung zu einem Meilenstein europäischer Außenwirtschafts- und Partnerschaftspolitik.
  Das modernisierte Globalabkommen wird die vielseitigen Beziehungen zwischen der
  EU und Mexiko als bedeutendem Staat Lateinamerikas vertiefen. Die Verhandlungen
  dazu wurden bereits 2016 aufgenommen. Ein zentraler Bestandteil ist der umfangreiche
  Handelsteil. Er soll zunächst durch ein vorgeschaltetes Interims-Handelsabkommen
  in Kraft treten. Für europäische Unternehmen – insbesondere den exportorientierten
  Mittelstand – bedeutet das Abkommen einen verbesserten Zugang zu einem Markt mit
  über 130 Millionen Menschen. Auch der Zugang zu öffentlichen Aufträgen wird erleichtert
  und gezielte Unterstützungsmaßnahmen für kleine und mittlere Unternehmen fördern
  die Wirtschaft. Weitgehend geschützt bleiben dabei die Agrarprodukte, wie Rohrzucker,
  durch vereinbarte Quoten. Bereits 2018 vereinbarte Quoten für Rind- und Geflügelfleisch
  sowie Ethanol wurden im Rahmen der jüngeren Verhandlungen sogar gesenkt. Das Nachhaltigkeitskapitel
  im Handelsteil enthält unter anderem Vereinbarungen zur Umsetzung von wesentlichen
  internationalen Arbeits-, Umwelt- und Klimaübereinkommen. Mit seinem Inkrafttreten
  ersetzt das modernisierte Globalabkommen eine Reihe bestehender Abkommen und Verträge.
  Dazu gehören das Vorgängerabkommen vom 1. Oktober 2000, der Vertrag zur Förderung
  und den gegenseitigen Schutz von Kapitalanlagen zwischen Deutschland und Mexiko
  aus dem Jahr 1998 sowie dreizehn weitere bilaterale Investitionsschutzverträge anderer
  EU -Mitgliedstaaten mit Mexiko. Das modernisierte Globalabkommen ist ein gemischtes
  Abkommen und muss daher nach der Unterzeichnung von der EU und allen Mitgliedstaaten
  entsprechend ihrer jeweiligen verfassungsrechtlichen Vorgaben ratifiziert werden.'
