title: Frühjahrsprojektion Bundesregierung senkt Wachstumserwartung
text: Bundeswirtschaftsministerin Katherina Reiche hat in Berlin die Frühjahrsprojektion
  der Bundesregierung vorgestellt. Vor dem Hintergrund des Konflikts im Nahen Osten
  senkt die Bundesregierung ihre Wachstumserwartung für das deutsche Bruttoinlandsprodukt
  auf 0,5 Prozent für das Jahr 2026. Das sagte Bundeswirtschaftsministerin Reiche
  bei der Vorstellung der Frühjahrsprojektion in Berlin. Die wirtschaftliche Entwicklung
  präsentiert sich aktuell ungünstiger als es zur Jahreswende erwartet wurde. Der
  Konflikt im Nahen Osten und die faktische Sperrung der Straße von Hormus führen
  weltweit zu Engpässen und Preisanstiegen für Energie und andere Rohstoffe zum Ende
  des ersten Quartals. Insbesondere die höheren Preise treffen auch Unternehmen und
  private Haushalte in Deutschland. Trotz der daraus folgenden Kaufkraftverluste bleibt
  der private Konsum eine Stütze der deutschen Wirtschaft und die Binnennachfrage
  Treiber für die Erholung der deutschen Wirtschaft. Auch Steuerimpulse sowie Staatsaufträge
  – insbesondere in den Bereichen Infrastruktur und Verteidigung – werden zu Anlageinvestitionen
  und zur gesamtgesellschaftlichen Belebung beitragen. Zölle und andere protektionistische
  Maßnahmen belasten den internationalen Handel zusätzlich zum Irankrieg. Dadurch
  und durch verminderte Wettbewerbsfähigkeit bleibt die deutsche Exportentwicklung
  schwach. Wesentlich für die weitere wirtschaftliche Entwicklung sind auch die Entwicklungen
  des Konfliktes im Nahen Osten. Entsprechend bestehen erhebliche Ungewissheiten.
  Diese Situation führt zu einer anderen Erwartung der Bundesregierung als noch zum
  Jahresanfang. Sie rechnet nun nur noch mit einem verhaltenen Anstieg des preisbereinigten
  Bruttoinlandsprodukts ( BIP ) um 0,5 Prozent für das Jahr 2026. Fiskalische Impulse
  könnten spürbar werden und die Belastungen sich schrittweise verringern, falls sich
  der Konflikt bald beruhigt. Für 2027 rechnet die Bundesregierung mit einem realen
  BIP -Zuwachs von 0,9 Prozent. Die Regierung rechnet mit einer Inflationsrate von
  2,7 Prozent für 2026 und 2,8 Prozent im kommenden Jahr. „Mit dem Kraftstoffmaßnahmenpaket
  und mit dem Energie-Sofortprogramm haben wir als Bundesregierung schnell und entschlossen
  reagiert, um die Bürger und unsere Unternehmen zu entlasten“, sagte sie. Das helfe
  zwar kurzfristig, löse aber nicht die strukturellen Ursachen der deutschen Wachstumsschwäche.
  Reiche betonte, es brauche tiefgreifende Reformen für eine wieder wettbewerbsfähige
  Wirtschaft. Das zählen nach Angaben der Ministerin die im internationalen Vergleich
  zu hohe Steuer- und Abgabenlast, eine weitere Senkung der Energiekosten sowie den
  Bürokratieabbau. Die Frühjahrsprojektion folgt dem Jahreswirtschaftsbericht, der
  Anfang des Jahres vorgestellt wurde und dient als Grundlage für die Steuerschätzung
  sowie die Haushaltsplanungen von Gebietskörperschaften und Sozialversicherungen.
