title: Press conference by Federal Chancellor Merz and Ireland’s Prime Minister Martin
  Side by side in the European Union
text: 'Ireland’s forthcoming EU Council Presidency was also a topic of discussion
  during the inaugural visit of the Irish Prime Minister, Micheál Martin. “Germany
  and Ireland also stand side by side in the European Union”, said Federal Chancellor
  Friedrich Merz at the start of the press conference with Irish Taoiseach Micheál
  Martin. In this way, he underlined the talks’ focus on European policy. Ireland
  will take over the Presidency of the Council of the European Union from 1 July to
  31 December 2026. There was said to be broad agreement on the key issues for Ireland’s
  Presidency of the Council: strengthening European competitiveness and the timely
  finalisation of the new EU budget. The Federal Chancellor also spoke with his Irish
  guest about the situation in the Middle East and the Russian war of aggression in
  Ukraine. All of these issues are also expected to be discussed at the informal meeting
  of European heads of state and government in Cyprus next week. The Presidency of
  the EU Council rotates every six months between the Member States of the Union. During
  this time, the respective country chairs the meetings of the Council, organises
  its work and represents the Council in dealings with other EU institutions. To this
  end, the Council Presidency can also set its own political priorities. Further information
  can be found on the EU Council Presidency page. Read the transcript of the press
  conference here (in German only):'
