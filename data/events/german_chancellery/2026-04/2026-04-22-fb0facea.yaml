title: Im Kabinett beschlossen Bundeswehr beteiligt sich weiterhin an Friedensmission
  KFOR in Kosovo
text: 'Bundeswehr-Soldaten vom Aufklärungsteam in der Nähe von Pristina in Kosovo:
  Deutschland engagiert sich für Frieden und Sicherheit in der Region. Die Beteiligung bewaffneter
  deutscher Streitkräfte an der internationalen Sicherheitspräsenz in Kosovo ( KFOR
  ) wird fortgesetzt. Das hat das Kabinett am 22. April 2026 beschlossen. Insgesamt
  können unverändert bis zu 400 deutsche Soldatinnen und Soldaten eingesetzt werden. Damit
  wird auch gewährleistet, dass die Bundeswehr bei einer Verschlechterung der Sicherheitslage
  schnell und flexibel reagieren kann. Im Vordergrund der Mission KFOR steht, die
  Republik Kosovo politisch zu stabilisieren und die Friedensregelung militärisch abzusichern.
  Stabilität und Frieden in Kosovo sind nicht nur wichtig für die Region selbst, sondern
  auch für Deutschland, die NATO , die EU und Europa als Ganzes. Langfristiges Ziel
  bleibt die Übergabe der Sicherheitsverantwortung an die kosovarischen Sicherheitsinstitutionen.
  Deutsche Soldatinnen und Soldaten unterstützen als Teil der NATO die Sicherung der
  öffentlichen Ordnung und beteiligen sich in verschiedenen Bereichen an der demokratischen
  Stabilisierung des Landes. Sicherheit und Frieden in der Region sollen so nachhaltig
  hergestellt werden. Obwohl sich die Sicherheitslage in Kosovo seit 2023 wieder stabilisiert
  hat, kann sie sich jederzeit wieder zuspitzen. Im Rahmen gewaltsamer Einzelaktionen
  wurden unter anderem wiederholt Kräfte der Kosovo Police beschossen und verletzt.
  Ende November 2024 erfolgte ein Sprengstoffanschlag auf kritische Infrastruktur,
  den Ibar-Lepenc- Wasserkanal, der zentral für Wasser- und Stromversorgung des ganzen
  Landes ist. Die kosovarische Regierung geht weiterhin gegen Parallelstrukturen und
  Netzwerke der Organisierten Kriminalität im Norden des Landes vor. Angesichts des
  weiterhin bestehenden kurzfristigen Eskalations- und Konfliktpotenzials ist es notwendig,
  dass KFOR -Truppen in der Region präsent bleiben. KFOR ist zentraler Stabilitätsanker
  in der Region. Der deutsche Beitrag zu KFOR umfasst weiterhin die Beteiligung mit
  Personal im KFOR -Hauptquartier in Pristina und an den multinationalen Aufklärungskräften.
  Neben der Beteiligung an KFOR setzt die Bundesregierung sich im Sinne der integrierten
  Sicherheit auch im zivilen Bereich für Stabilität und Frieden auf dem Balkan ein.
  Zentrales Anliegen der Bundesregierung ist eine nachhaltige und rechtsverbindliche
  Normalisierung der Beziehungen zwischen Kosovo und Serbien. Die Bundesregierung
  unterstützt den EU -geführten Normalisierungsdialog zwischen beiden Ländern. Grundlage
  des Einsatzes sind die Resolution 1244 des Sicherheitsrates der Vereinten Nationen
  vom 10. Juni 1999 und der Einsatzbeschluss der NATO vom 30. Januar 1999. Die deutschen
  Streitkräfte handeln hierbei innerhalb und nach den Regeln eines Systems gegenseitiger
  kollektiver Sicherheit im Sinne des Artikels 24 Absatz 2 des Grundgesetzes. Mit
  dem Mandat wird Verteidigungsminister Boris Pistorius zeitlich unbegrenzt ermächtigt,
  die deutschen Fähigkeiten für den Einsatz bereitzustellen. Die Ermächtigung erlischt,
  wenn das Mandat der Vereinten Nationen endet oder der Einsatzbeschluss der NATO
  nicht verlängert wird.'
