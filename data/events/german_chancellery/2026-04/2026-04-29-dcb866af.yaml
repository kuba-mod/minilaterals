date: '2026-04-29'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 29. April 2026
text: 'stellvertretender Regierungssprecher Meyer (Vorsitzende Hamberger eröffnet
  die Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der
  Ministerien.) Heute ist in der Tat ein wichtiger Tag für die Bundesregierung, aber
  auch, denke ich, für unser Land. Denn wir haben mit der weitreichenden Reform der
  gesetzlichen Krankenversicherung und den Eckwerten für den Bundeshaushalt 2027 nun
  tiefgreifende Reformen eingeleitet, die notwendig sind, um unser Land mittel- und
  langfristig stärker zu machen. Wir bringen vieles in Ordnung, was zu lange liegen
  geblieben ist. Wir gehen strukturelle Probleme an. Wir finden in der demokratischen
  Mitte gerechte Kompromisse für schwierigste gesellschaftliche Aufgaben. Wir sichern
  dadurch die Handlungsfähigkeit unseres Landes in geo- und wirtschaftspolitisch sehr
  angespannten Zeiten. Große Koalition für große Aufgaben, auch das ist ein Leitsatz
  dieser Bundesregierung. Wir sind spätestens mit dem heutigen Tag in der nächsten
  Phase tiefgreifender Strukturreformen für unser Land angekommen. Wir sind überzeugt
  davon, dass unser Land alles hat, um sich aus einer schwierigen Lage herauszuarbeiten.
  Dafür stellen wir jetzt und sicherlich auch in den kommenden Wochen die Weichen.
  Nun zu den Entscheidung des Kabinetts im Einzelnen: Wie Sie wissen, hat das Bundeskabinett
  heute die Eckwerte des Regierungsentwurfs zum Bundeshaushalt 2027 und des Finanzplans
  2026 bis 2030 beschlossen. Der Bundesfinanzminister hat Ihnen, wenn Sie eben hier
  vor Ort waren, die Details an dieser Stelle bereits umfassend vorgestellt. Deshalb
  nur wenige Anmerkungen zum Rahmen: Mit dem Eckwertebeschluss belegt die Bundesregierung
  ihre uneingeschränkte Handlungsfähigkeit, auch in Zeiten außergewöhnlicher globaler
  Unwägbarkeiten. Zu nennen sind hier sicherlich der russische Angriffskrieg gegen
  die Ukraine, die aktuelle Irankrise mit ihren erheblichen Auswirkungen auf die Energiemärkte
  und die wirtschaftliche Entwicklung, aber auch andere geopolitische Entwicklungen,
  die sicherlich Einfluss auf unser Land haben. Wie der Bundeskanzler vorhin gesagt
  hat, gibt es bedeutende Bereiche, für die wir weiterhin viel und auch mehr Geld
  ausgeben müssen als ursprünglich geplant. Das gilt insbesondere für unsere Verteidigungsfähigkeit
  und unsere Sicherheit im Bündnis. Hier stehen wir im Wort und müssen Prioritäten
  setzen. Die Entwicklungen im vergangenen Jahr, zuletzt auch im Iran, zeigen auch,
  wie wichtig die Investitionen in unsere Verteidigungsfähigkeit sind. Wir wollen
  uns verteidigen können, damit wir uns nicht verteidigen müssen. Es gibt andere Bereiche,
  in denen wir sparen müssen. Das gilt insbesondere für den Bereich der staatlichen
  Verwaltung. Darauf hat sich der Kanzler vorhin in seiner Pressekonferenz nach der
  Kabinettssitzung bezogen. Der Staat muss schlanker und effizienter werden, auch
  im Sinne der Bürgerinnen und Bürger. Eine konsequente Digitalisierung und Modernisierung
  ist ein wesentlicher Treiber dafür. Unsere zentralen finanzpolitischen Prioritäten
  haben weiterhin Bestand und bilden einen Dreiklang. Erstens: Wir ermöglichen dringend
  benötigte Investitionen für neues Wachstum, mehr Beschäftigung und die Stärkung
  der inneren und äußeren Sicherheit. Für die Bündnis- und Verteidigungsfähigkeit
  sehen die Eckwerte daher einen deutlichen Anstieg des Verteidigungshaushalts um
  knapp 28 Prozent auf etwa 106 Milliarden Euro vor. Für Wachstumsimpulse und die
  Modernisierung der Infrastruktur setzen wir weiterhin auf öffentliche Investitionen,
  um unseren Rückstand aufzuholen. Insgesamt sind 2027 knapp 119 Milliarden Euro für
  Investitionen in unsere Gesellschaft, in unser Land vorgesehen. Zweitens: Es braucht
  Strukturreformen, um für ein besseres wirtschaftliches Umfeld zu sorgen und unsere
  Sozialsysteme auf zukunftsfeste Beine zu stellen. Wir werden gleich noch auf die
  GKV-Reform eingehen, die heute im Kabinett beschlossen wurde. Schon seit Beginn
  der Legislaturperiode haben wir mit dem Investitionssofortprogramm, der Reform der
  privaten Altersvorsorge oder auch der Aktivrente viel umgesetzt. Drittens: Wichtiger
  denn je ist die Konsolidierung des Haushalts. Alle staatlichen Aufgaben müssen auf
  ihre Notwendigkeit hin überprüft werden. Dies ist Fokus des Eckwertebeschlusses
  und der kommenden Wochen bis zum Regierungsentwurf für den Haushalt 2027. Die Bundesregierung
  hat heute den Entwurf eines Gesetzes zur Stärkung digitaler Ermittlungsbefugnisse
  in der Polizeiarbeit , den Entwurf eines Gesetzes zur Stärkung digitaler Ermittlungsbefugnisse
  zur Abwehr von Gefahren des internationalen Terrorismus sowie den Entwurf eines
  Gesetzes zur Änderung der Strafprozessordnung digitaler Ermittlungsmaßnahmen beschlossen.
  Dies trage ich hier im Paket vor, weil sie ein Stück weit zusammengehören. Das Gesetzespaket
  dient der Stärkung der Sicherheitsbehörden und ist ein wichtiger Baustein der im
  Koalitionsvertrag vereinbarten Sicherheitsoffensive der Bundesregierung. Wir stärken
  damit die Handlungsfähigkeit der Polizei- und Strafverfolgungsbehörden, schaffen
  Rechtssicherheit und führen die Arbeit im Bereich der Polizei und der Strafverfolgungsbehörden
  auch in die digitale Realität hinüber. Sie bekommen zeitgemäße digitale Befugnisse
  zur Gefahrenabwehr und Strafverfolgung, um den aktuellen Herausforderungen durch
  internationalen Terrorismus, Extremismus, schwere und organisierte Kriminalität
  sowie internationale Krisen begegnen zu können. Drittens. Die Bundesregierung hat
  heute den Entwurf eines Gesetzes zur Durchführung der Cyberresilienz-Verordnung
  beschlossen. In der europäischen Verordnung werden erstmalig EU-einheitliche Regeln
  zur Cybersicherheit von Produkten mit digitalen Elementen festgelegt. Cybersicherheit
  gilt fortan als grundlegende Produkteigenschaft und damit als zwingende Voraussetzung
  für den Marktzugang für Produkte mit digitalen Elementen wie zum Beispiel Smart-TVs
  oder Smartphones. Damit zahlen wir weiter auf das Konto der Stärkung der Cybersicherheit
  in Europa ein und setzen einen weiteren Baustein in dem wichtigen Vorhaben des Koalitionsvertrags,
  der Bekämpfung von Cyberangriffen, um. Der zügige Ausbau der erneuerbaren Energien
  und der im Zuge der Energiewende steigende Strombedarf erfordern einen schnellen
  Ausbau des deutschen Stromnetzes. Deshalb haben wir heute den Entwurf eines Zweiten
  Gesetzes zur Änderung des Bundesbedarfsplangesetzes beschlossen. Mit dem Gesetz
  werden die Voraussetzungen für einen beschleunigten, bedarfsgerechten und kosteneffizienten
  Ausbau des Übertragungsnetzes geschaffen. Das bezieht sich insbesondere auch auf
  Freileitungen, die dabei eine wichtige Rolle spielen. Zudem sieht der Gesetzentwurf
  eine Aufhebung des gesetzlich verankerten Erdkabelvorrangs vor. Auch das ist ein
  wichtiges Vorhaben. Die Bundesregierung hat den Entwurf eines Gesetzes zur Änderung
  des Rechts der Wohn- und Geschäftsraummiete beschlossen, auch als Mietrechtspaket
  diskutiert. Wohnraum muss bezahlbar bleiben. Damit setzen wir den Koalitionsvertrag
  um. Der Entwurf sieht eine Begrenzung für den Anstieg von Indexmieten in angespannten
  Wohnlagen vor. Oberhalb einer Grenze von jährlich drei Prozent sollen Indexsteigerungen
  nur noch zur Hälfte berücksichtigt werden können. In Ausnahmesituationen mit extremen
  Preissteigerungen werden Mietende geschützt. Außerdem enthält der Gesetzentwurf
  neue Regeln für Kurzzeitvermietungen und die Vermietung von möbliertem Wohnraum.
  Mit diesen neuen Regeln sollen Rechtsunsicherheiten behoben werden. Bei der Vermietung
  von möbliertem Wohnraum in angespannten Wohnungsmärkten sollen Vermieterinnen und
  Vermieter den Zuschlag für Möbel gesondert ausweisen müssen. Außerdem soll klargestellt
  werden, dass der Möblierungszuschlag angemessen sein muss. Die Handhabung soll unbürokratisch
  sein. Beim Zuschlag von maximal zehn Prozent der Nettokaltmiete wird die Angemessenheit
  vermutet. Um Obdachlosigkeit zu verhindern, erlauben wir Mieterinnen und Mietern,
  denen wegen Mietrückständen ordentlich gekündigt wurde, eine Kündigung einmalig
  durch Nachzahlung der Miete abzuwenden. Kleinmodernisierungen sollen erleichtert
  werden. Dazu soll die Wertgrenze auf 20 000 Euro angehoben werden. Anpassungen der
  Miete können so unbürokratisch berechnet werden. Auch das ist ein Vorhaben, über
  das wir in der Bundesregierung sehr intensiv diskutiert und für das wir zur heutige
  Kabinettssitzung eine Einigung gefunden haben. Das Bundeskabinett hat heute den
  Entwurf eines Zweiten Gesetzes zur Änderung des Düngegesetzes beschlossen. Ziel
  ist es, eine wirksame Verringerung der Nitratbelastung in Grund- und Oberflächengewässern
  zu erreichen. Dafür wird ein bundesweites Monitoring eingeführt. Wie sich die Düngung
  auf die Gewässer auswirkt, soll mit Hilfe der Bewirtschaftungs- und Düngedaten der
  Betriebe flächendeckend überprüft werden, wobei zur Vermeidung von Doppelmeldungen
  die Daten zwischen den eingebundenen Behörden ausgetauscht werden dürfen. Die Bundesregierung
  kommt mit dieser Gesetzesänderung zugleich ihren Zusagen gegenüber der EU-Kommission
  nach. Die Rentenanpassung zum 1. Juli steht fest. Das Kabinett hat dazu heute die
  Rentenwertbestimmungsverordnung 2026 beschlossen. In den alten und neuen Bundesländern
  steigt der Rentenwert von gegenwärtig 40,79 Euro auf 42,52 Euro. Dies entspricht
  einer Rentenanpassung um 4,24 Prozent. Damit beträgt die Rentenanpassung zum vierten
  Mal seit fünf Jahren über vier Prozent. Der Grund für die Erhöhung ist die gute
  Lohnentwicklung. Sie führt erneut zu einer Rentenanpassung, die die Kaufkraft der
  Rentnerinnen und Rentner stärkt. Da mit dem Rentenpaket 2025 die Haltelinie von
  48 Prozent bis 2031 verlängert wurde, wird der Rentenwert zum 1. Juli so hoch festgesetzt,
  dass das Rentenniveau von 48 Prozent erreicht wird. Schließlich hat das Kabinett
  heute den Entwurf eines Gesetzes zur Stabilisierung der Beitragssätze in der gesetzlichen
  Krankenversicherung beschlossen, eine Großreform, die wir heute bereits an unterschiedlichen
  Stellen vorgestellt haben. Mit diesem Gesetz werden zahlreiche Empfehlungen aus
  dem Bericht der FinanzKommission Gesundheit vom 30. März 2026 umgesetzt. Ziel ist
  es, damit die Beitragssätze im Bereich der gesetzlichen Krankenversicherung ab 2027
  für Arbeitnehmerinnen und Arbeitnehmer, aber auch für Unternehmen dauerhaft zu stabilisieren
  und die strukturelle Deckungslücke zwischen Einnahmen und Ausgaben von geschätzt
  15 Milliarden Euro im Jahr 2027, aufwachsend auf 40 Milliarden Euro im Jahr 2030,
  zu schließen. Das nun getroffene Maßnahmenpaket ist breit angelegt und bezieht alle
  Bereiche und Beteiligte des Gesundheitswesens mit substanziellen Beiträgen ein.
  Das war uns besonders wichtig. Alle müssen einen Beitrag zu dieser Reform leisten,
  Leistungserbringer wie Ärzte, Krankenhäuser, Apotheken, Hersteller, aber auch Versicherte,
  Arbeitgeber und Krankenkassen selbst. Die Gesamtentlastung durch das Gesetz hat
  allein 2027 ein Volumen von 16,3 Milliarden Euro. Sie wächst in den Folgejahren
  weiter auf. Mit den beschlossenen Einsparmaßnahmen schaffen wir eine Grundlage für
  weitere Maßnahmen, mit denen wir das Gesundheitssystem strukturell fit für die Zukunft
  machen wollen. Die Bundesregierung strebt an, das Gesetzgebungsverfahren noch vor
  der Sommerpause abzuschließen. Der Außenminister ist gerade von einer Reise zurückgekehrt
  und auf dem Weg zu einer anderen Reise. Ich kündige bereits heute eine Reise für
  Montag an. Der Außenminister wird zu Gesprächen mit seinem griechischen Amtskollegen
  und mit dem griechischen Premierminister nach Griechenland reisen . Nachmittags
  wird es eine Pressekonferenz vor Ort geben. Wir werden Sie auf dem üblichen Wege
  dazu informiert halten. Griechenland ist unser strategischer Partner im östlichen
  Mittelmeer und unser enger Partner in EU und NATO. Wir wollen die Zusammenarbeit
  gerade auch in den Bereichen von Wirtschaft und Sicherheit ausbauen. Auf dem Programm
  steht daher auch der Besuch eines Unternehmens und einer Werft. Griechenland wird
  im zweiten Halbjahr 2027 die EU-Ratspräsidentschaft übernehmen. Insofern spielen
  natürlich auch europäische Themen und Fragestellungen eine Rolle in den Gesprächen.
  (zu den Gesetzesvorhaben zur Stärkung digitaler Behördenbefugnisse ) Herr Hosemann
  und Frau Singer, was genau ist aus Ihrer Sicht denn der inhaltlich große Fortschritt
  für die Ermittlungsbehörden, der mit diesen Gesetzen erreicht werden kann? Können
  Sie das für mich einmal kurz fassen? Der große Fortschritt ist der, dass die Sicherheitsbehörden
  damit zeitgemäße digitale Befugnisse erhalten. Der Bundesinnenminister hat sich
  dazu gerade in einer Pressekonferenz geäußert. Er hat mehrfach betont, dass die
  Sicherheitsbehörden gestärkt werden sollen. Er hat ebenfalls betont, dass sie Fähigkeiten
  umsetzen können, die die Ermittlungen heutzutage verlangen. Deshalb werden die Gesetze
  zu den digitalen Ermittlungsbefugnissen neu aufgelegt. Ich darf für das BMJV ergänzen.
  In unserem Bereich ändern wir die Strafprozessordnung. Bei uns geht es nur um die
  Verfolgung von Straftaten und nicht um die Gefahrenabwehr. Wir schaffen neue Rechtsgrundlagen.
  Die Maßnahmen, von denen wir sprechen, sind grundrechtssensibel. Dabei sind Grundrechte
  berührt. In einem Rechtsstaat braucht es für den Einsatz entsprechender Instrumente
  gesetzliche Grundlagen. Diese schaffen wir für die Zwecke der Strafverfolgung. Die
  beiden Ermittlungsinstrumente, um die es geht, hat die Kollegin schon angesprochen,
  erstens den automatisierten biometrischen Bildabgleich mit den öffentlich verfügbaren
  Bildern im Internet und zweitens die automatisierte Datenanalyse. Es geht also zunächst
  einmal darum, dem Einsatz solcher Instrumente eine gesetzliche Ermöglichung zu schaffen
  und klare Leitplanken aufzustellen, unter welchen Voraussetzungen es überhaupt denkbar
  ist, dass solche Instrumente zum Einsatz kommen. Wir beschaffen sie nicht und bestellen
  nicht morgen eine Software, sondern wir schaffen nur die rechtlichen Rahmenbedingungen,
  unter denen der Einsatz entsprechender Instrumente möglich ist. Herr Meyer, es gibt
  viele Befürchtungen, dass dies Palantir Tür und Tor öffnen würde. Wie schauen Sie
  bzw. der Bundeskanzler darauf? Ich will noch einmal deutlich machen ‑ der Bundesinnenminister
  hat das heute im Kabinett recht anschaulich geschildert ‑, mit welch riesigen Datenmengen
  unsere Behörden teilweise zu tun haben. Dabei stoßen die Möglichkeiten zur händischen
  Durchsuchung natürlich an ihre Grenzen. Deshalb gehört das, denke ich, ein Stück
  weit zur Modernisierung der Polizeiarbeit und zur Arbeit der Strafverfolgungsbehörden
  dazu. Die Kolleginnen und Kollegen haben ja gerade darauf hingewiesen, dass wir
  einen rechtlichen Rahmen schaffen. Weitere Entscheidungen sind damit nicht verbunden.
  Ich probiere es bei Frau Singer. Weil jetzt ja auch der biometrische Abgleich von
  Bildern aus dem Internet durch das BKA und die Bundespolizei erlaubt werden soll,
  würde ich gern wissen, warum Ihr Ministerium den biometrischen Datenabgleich ins
  nicht europäische Ausland auslagern möchte, gerade weil es ja in der EU geltende
  Einschränkungen dafür gibt. Zu dieser Detailfrage kann ich gerade nichts sagen.
  Es tut mir leid. Nur zur Erinnerung: Das BMI ist für Bundespolizei usw. zuständig
  und auch für Grundrechte. Vielleicht darf ich aber noch einmal darauf hinweisen,
  dass für den Einsatz des biometrischen Bildabgleichs in allen Gesetzentwürfen sehr
  hohe Schranken vorgesehen sind. Bei dem von Ihnen konkret angesprochenen Thema geht
  es um die Abwehr schwerer Gefahren für die nationale Sicherheit. Es sind klare Schwellen
  benannt. Das Szenario, das Sie angesprochen haben, kommt nur unter ganz bestimmten
  Voraussetzungen überhaupt in Frage. Aber ist es falsch, dass die Bundesregierung
  prüfen lässt, den biometrischen Abgleich ins Nicht-EU-Ausland auszulagern, damit
  man die KI-Regeln umgehen kann? Darauf habe ich doch gerade geantwortet. Es gibt
  eine gesetzliche Regelung dafür. Darin sind bestimmte, ganz konkrete Schwellen benannt.
  Es kommt überhaupt nur bei ganz spezifischen Gefahrenlagen in Betracht. In der normalen
  Strafverfolgung zum Beispiel ist das Szenario, das Sie beschrieben haben, nicht
  möglich. Ich probiere es doch noch einmal mit Herrn Meyer, weil Sie eben gesagt
  haben ‑ den genauen Wortlaut habe ich nicht mehr im Kopf ‑, es gebe keine direkte
  Schlussfolgerung, die daraus abzuleiten wäre. Aber wäre es nicht an der Zeit, eine
  Schlussfolgerung wenigstens hinsichtlich dessen zu ziehen, was man nicht möchte?
  Wir haben heute dieses Paket beschlossen, das mehrere rechtliche Änderungen beinhaltet.
  Diese rechtlichen Änderungen sind technik- und produktneutral ausgestaltet worden.
  Darum ging es jetzt. Es ging darum, Möglichkeiten zu schaffen. Für alles Weitere,
  was daraus folgt, werden jetzt normale Prüfverfahren erfolgen. Aber dazu habe ich
  heute nichts anzukündigen. Ich bin fast ein bisschen verwundert, weil man Ihre Fragen,
  wenn man die ganze Vorgeschichte nicht kennt, so verstehen könnte, als ob sich Mitglieder
  der Bundesregierung noch nie zu dem, was Sie jetzt aufgeworfen haben, geäußert hätten.
  Aber es gibt ja sehr klare Statements, auch zu dem von Ihnen namentlich genannten
  Softwareanbieter. Daher ja meine Nachfragen hier, wie es denn aktuell ausschaue.
  Denn es ist ja längst nicht so, dass sich alle eindeutig verhalten hätten. Das geht
  an die entsprechenden beteiligten Ministerien und natürlich auch an Herrn Meyer.
  Wenn Sie sich dazu noch weiter verhalten wollen, dann sehr gern. Ansonsten sind
  wir mit dem Thema für heute durch, denke ich. Das Mikrofon bleibt sowieso bei Ihnen,
  weil wir jetzt zur Cyberresilienz kommen. Dazu hatten Sie sich auch direkt gemeldet.
  Frau Singer, Sie sind ja für die Umsetzung des Cyber Resilience Act zuständig, wenn
  ich es richtig in Erinnerung habe. Welcher Aufwand wird sich dadurch Ihrer Erwartung
  nach für deutsche Firmen ergeben? Welcher Aufwand sich für deutsche Firmen ergibt,
  wird sich noch zeigen. Jetzt geht es erst einmal darum, dass die nationale Rechtsgrundlage
  für die europäische Cyberresilienz-Verordnung geschaffen wird. Mit dem Gesetz zur
  Durchführung der europäischen Cyberresilienz-Verordnung schaffen wir die nationale
  Rechtsgrundlage, damit das Bundesamt für Sicherheit in der Informationstechnik als
  zuständige Marktüberwachungsbehörde und notifizierende Behörde unter der Cyberresilienz-Verordnung
  tätig werden kann. Ich habe es so in Erinnerung, dass man, wenn man ein Durchführungsgesetz,
  eine Begleitgesetz oder ein sonstiges Gesetz macht, durchaus auch versucht, zu quantifizieren,
  welche Betroffenheiten es gibt und welcher Aufwand entsteht. Vielleicht ist das
  in einem mir entgangenen Teil der Staatsmodernisierung eingespart worden. Gibt es
  dazu nichts, was Sie hier vortragen könnten? Ich kann dazu leider nichts sagen.
  Aber ich kann versuchen, es herauszufinden, und werde es Ihnen dann nachreichen.
  Frau Singer, fallen auch die Banken unter diese Zuständigkeit? Denn auch sie müssen
  sich ja für die Cyberresilienz wappnen, zumal es eine Aufforderung vom Bundesamt
  für Sicherheit in der Informationstechnik gab, dass man sich gegen Schwachstellen
  nun verstärkt wappnen müsse, weil es jetzt die KI Mythos gebe. Auch die Antwort
  darauf muss ich leider nachrechnen. Ich versuche, das noch im Laufe der RegPK zu
  tun. Herr Meyer, eine Nachfrage an Sie, weil die Frage verschiedene Ressorts betrifft.
  Wie groß ist der Druck der Bundesregierung auf den US-Anbieter Anthropic, auch deutschen
  Behörden diese KI zur Verfügung zu stellen, die ja anscheinend Schwachstellen von
  Behörden und bei IT-Dienstleistungen sehr schnell aufdecken kann und damit auch
  Hackern ermöglicht, dort anzugreifen? Gibt es irgendwelche Kontakte zwischen der
  Bundesregierung und der Firma? Wir beschäftigen uns mit den Entwicklungen natürlich
  sehr intensiv. Zu einzelnen Unternehmen oder einzelnen Produkten habe ich hier jetzt
  nichts anzukündigen. Ich weiß nicht, ob das BMDS noch ergänzen mag. Die gesamte
  Entwicklung im Bereich künstlicher Intelligenz bietet wahnsinnige Chancen, stellt
  uns aber in vielen Bereichen auch vor große Herausforderungen. Deshalb haben wir
  innerhalb der Bundesregierung natürlich Expertise aufgebaut und ziehen sie zusammen.
  Aber noch einmal: Zu einzelnen Produkten oder Anbietern habe ich nichts anzukündigen.
  Ich habe ‑ so würde ich es nennen ‑ eher einen technischen Hinweis. Wir hatten das
  Thema, so meine ich, vor zwei Wochen in der Regierungspressekonferenz, als die Nachricht
  das erste Mal aufkam. Damals hatten sich sowohl das BMI als auch wir dazu geäußert.
  Natürlich beobachten wir die aktuellen Entwicklungen kontinuierlich. Im konkreten
  Fall gibt es auch einen Austausch zwischen dem Bundesamt für Sicherheit in der Informationstechnik
  und dem Hersteller. Ich verweise im Weiteren auf die Ausführungen von BSI-Präsidentin
  Plattner, die sich vor zwei Wochen in diesem Zusammenhang geäußert hat. (zum Entwurf
  eines Zweiten Gesetzes zur Änderung des Düngegesetzes ) Wenn wir dieses seltene
  Thema hier schon aufwerfen, dann würde ich doch ganz gern die zuständigen Ministerien
  ganz kurz zu einer Sache befragen, nämlich zur Nitratausbringung, gemeinhin bekannt
  als Dünger oder als Gülle. Wie wollen Sie sicherstellen, dass die Daten, die Ihnen
  von den landwirtschaftlichen Betrieben gemeldet werden, integer sind? Gibt es ein
  unabhängiges Feststellungsverfahren zur Integritätsfeststellung der Daten? Denn
  seitens der Landwirte gibt es ja ein durchaus vitales Interesse daran, mehr auszubringen,
  als Ihnen erlaubt ist. Vielen Dank für die Frage. Das gibt mir die Möglichkeit,
  noch einmal einen Schritt zurück zu gehen, ein bisschen zu erklären. Wir haben heute
  das Düngegesetz geändert. Unser Ziel ist, ein stärker am Verursacherprinzip orientiertes
  System für die Düngung auf den Äckern und Feldern auf den Weg zu bringen, insbesondere
  in den mit Nitrat belasteten Gebieten. Mit der Änderung des Düngegesetzes haben
  wir jetzt erst die Rechtsgrundlage für das erforderliche Wirkungsmonitoring geschaffen.
  Das Wirkungsmonitoring wird in der Verordnung in Folge geregelt. Das heißt, wir
  haben heute die Ermächtigungsgrundlage im Kabinett beschlossen. Wir arbeiten jetzt
  weiter an der genauen Ausgestaltung dieses Wirkungsmonitorings. Ich bitte um Verständnis,
  dass ich jetzt Details noch nicht vorgreifen kann. Wichtig ist uns einfach: Diejenigen,
  die das Grundwasser belasten, sollen künftig stärker in die Pflicht genommen werden,
  und wer jetzt schon gewässerschonend wirtschaftet, soll künftig entlastet werden.
  Es gibt insbesondere eine Region Deutschlands, der Nordwesten oder Westen Niedersachsens,
  in der es durchaus auch zu Einbringungen oder Eintragungen von jenseits der Grenze
  kommt, teilweise durch importiertes, teilweise durch dort ausgebrachtes Nitrat.
