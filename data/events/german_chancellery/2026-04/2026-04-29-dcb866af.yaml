  offenen Gewässern gemacht sind. Sie müssen wissen, dass das ja meistens antimagnetische
  Rümpfe sind, die für eben diese Minenaufklärung und auch, um möglichst keine Minen
  auszulösen, spezielle Strukturen und spezielle Formen haben. Diese Minenjagdboote
  sind einfach für eine etwas langsamere Fahrt als zum Beispiel Korvetten oder Schnellboote
  ausgelegt. So kommt es zu der ca. zweiwöchigen Transitzeit. Können Sie uns ins Bild
  setzen, wie viele Soldatinnen und Soldaten auf solch einem Schiff sind und dann
  dort unterwegs sein werden? Üblicherweise sind zwischen 40 und 45 Soldatinnen und
  Soldaten dabei. Ich habe erst einmal eine Nachreichung an den Kollegen zum Cyber
  Resilience Act : Sie hatten nach dem Aufwand für die Wirtschaft gefragt. Das Durchführungsgesetz
  selbst verursacht keine Kosten. Die EU-Kommission geht davon aus, dass durch mehr
  sichere Produkte weniger Cybersicherheitsvorfälle passieren und dadurch Kosten gespart
  werden. Außerdem enthält der Gesetzesvorschlag ganz im Sinne des Koalitionsvertrags
  Unterstützungsmaßnahmen für die betroffenen Wirtschaftsakteure, die das BSI erarbeiten
  und anbieten wird. Dann habe ich noch eine Antwort. Sie hatten nach den Banken gefragt.
  Wenn Banken Hersteller von digitalen Produkten sind und sie in Verkehr bringen,
  fallen auch sie unter den Cyber Resilience Act.'
