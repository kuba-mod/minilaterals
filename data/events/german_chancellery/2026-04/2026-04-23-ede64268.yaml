title: Im Wortlaut Pressestatement von Bundeskanzler Merz zum Start des informellen
  Europäischen Rates am 23. April 2026 in Zypern
text: Ich freue mich, dass wir Gelegenheit haben, auf der schönen Insel Zypern mit
  der Ratspräsidentschaft über die Themen unserer Zeit zu sprechen. Wir werden über
  die Ukraine sprechen. Ich bin sehr dankbar, dass das Darlehen der Europäischen Union
  jetzt endgültig freigegeben worden ist. Wir werden aber auch über den Konflikt im
  Iran sprechen, und wir werden über den mehrjährigen Finanzrahmen der Europäischen
  Union sprechen. Es sind viele Themen. Ich bin sehr dankbar für die großzügige Gastfreundschaft.
  Ich freue mich auf die guten Beratungen mit den Kolleginnen und Kollegen im Europäischen
  Rat.
