title: Im Kabinett beschlossen Im medizinischen Notfall optimal versorgt
text: 'Die Reform soll die Notfallversorgung verbessern und die Notaufnahmen entlasten.
  Derzeit können sich Hilfesuchende telefonisch an zwei Stellen wenden – an die 116
  117 der Kassenärztlichen Vereinigungen und an die Notrufnummer 112. Das führt in
  manchen Fällen zu Fehlsteuerungen. Mit der Reform der Notfallversorgung will die
  Bundesregierung beide Stellen in einem Gesundheitsleitsystem digital miteinander
  vernetzen. Außerdem will die Bundesregierung den Aufbau sogenannter Integrierter
  Notfallzentren angehen. Bisher ist die 116 117 in erster Linie als Terminservicestelle
  bekannt. Sie soll nun zusätzlich als Rufnummer für Hilfe in akuten Fällen ausgebaut
  werden. Wer die 116 117 wählt, soll eine fachliche Ersteinschätzung zu notwendigen
  Maßnahmen erhalten: Reicht es aus, am nächsten Werktag den Hausarzt aufzusuchen?
  Ist doch die direkte Fahrt in die Notfallstelle notwendig? Oder muss ein Rettungswagen
  beauftragt werden? Dieses Verfahren soll auch die Notaufnahmen entlasten. Im Rettungsdienst
  bleibt es bei der bekannten Notfallnummer 112 – sie ist weiterhin erste Wahl bei
  schweren Unfällen, Herzinfarkten oder anderen lebensbedrohlichen Notfällen. Im Ablauf
  ändert sich nichts: Nach Anruf beim Notruf 112 wird nach einer gründlichen Ersteinschätzung
  durch die Leitstelle entschieden, welches Rettungsmittel entsandt werden muss. Bundesgesundheitsministerin
  Nina Warken sagte zu den Reformplänen : „Die Reform ist ein weiterer Baustein, um
  Hilfesuchende besser durch das Gesundheitssystem zu der jeweiligen Versorgungsebene
  zu steuern, die am besten helfen kann. Dadurch werden sowohl Notaufnahmen als auch
  Rettungsdienste entlastet.“ 116 117 und 112 werden digital enger verknüpft. Die
  medizinische Ersteinschätzung basiert auf der gleichen, standardisierten Patientenabfrage
  für den Fall, dass das jeweils andere System zuständig ist und einspringen muss.
  Welcher Partner welche Fälle übernimmt, klären sie untereinander. Außerdem sollen
  die Akteure vor Ort besser vernetzt werden. Geplant ist, in ganz Deutschland an
  ausgewählten Krankenhäusern sogenannte Integrierte Notfallzentren aufzubauen – bestehend
  aus einer zentralen Ersteinschätzungsstelle, einer Notdienstpraxis und der Notaufnahme
  eines Krankenhauses. Die Ersteinschätzungsstelle entscheidet als zentrale Leitstelle
  über die passende Weiterbehandlung im Notfallzentrum. Für Kinder und Jugendliche
  sollen, wo besonderer Bedarf besteht, zusätzliche Zentren entstehen. Die Standorte
  für die Einrichtungen sollen innerhalb von sechs Monaten ab Inkrafttreten des Gesetzes
  feststehen. Die Kassenärztlichen Vereinigungen werden zudem verpflichtet, durchgängig
  eine telemedizinische Beratung und Hausbesuche in akuten Fällen anzubieten. Die
  Telemedizin bietet die Chance, die Versorgung von Patientinnen und Patienten zu
  verbessern und gleichzeitig Ärztinnen und Ärzte zu entlasten. Außerdem hilft sie,
  die Zahl der Fahrten mit Rettungsdiensten zu senken. Die Digitalisierung der medizinischen
  Notfallrettung und die Vernetzung der Leitstellen wird über einen Zeitraum von fünf
  Jahren aus dem Sondervermögen Infrastruktur und Klimaneutralität des Bundes mit
  insgesamt 225 Millionen Euro gefördert. Fragen und Antworten zur geplanten Reform
  der Notfallversorgung finden Sie auf der Website des Bundesgesundheitsministeriums.'
