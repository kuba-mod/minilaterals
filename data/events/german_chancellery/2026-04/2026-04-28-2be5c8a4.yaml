title: Neue Städtebauförderung in Kraft Mehr Mittel für lebenswerte Städte und Gemeinden
text: 'Mit der Städtebauförderung sollen attraktive und nachhaltige Wohnräume geschaffen
  werden. Erstmals stellt der Bund im Jahr 2026 Städten und Gemeinden eine Milliarde
  Euro für die Städtebauförderung bereit. Damit werden attraktive und nachhaltige
  Wohn- und Lebensräume in den kommenden Jahren mit deutlich mehr finanziellen Mitteln
  unterstützt. Nachdem alle Länder die entsprechende Verwaltungsvereinbarung unterzeichnet
  haben, ist diese am 14. April 2026 in Kraft getreten. Die so gestärkte Förderung
  ist nicht nur eine Investition in die Zukunft der Städte, sondern auch in den sozialen
  Zusammenhalt insgesamt. Denn lebenswerte Städte und Kommunen sind wichtig für das
  gesellschaftliche Zusammenleben, für attraktive Arbeitsplätze und für die Akzeptanz
  der Demokratie. Die Stärkung des Zusammenhaltes ist eines der zentralen Themen der
  Bundesregierung, das sie mit zahlreichen Schritten umsetzt. „Ob neue Treffpunkte
  im Kiez, mehr Grün in der Stadt oder eine klimafitte Infrastruktur: Die Städtebauförderung
  gibt Kommunen den Rückenwind, um Quartiere lebendig, nachhaltig und zukunftsfähig
  zu gestalten“, sagte dazu Verena Hubertz, Bundesministerin für Wohnen, Stadtentwicklung
  und Bauwesen. Aufgeteilt ist die Städtebauförderung auf drei Programme: Lebendige
  Zentren, sozialer Zusammenhalt und Wachstum beziehungsweise nachhaltige Erneuerung.
  Antragsberechtigt für die Städtebauförderung des Bundes sind Städte und Gemeinden.
  Die nun in Kraft getretene Vereinbarung zwischen Bund und Ländern gilt für die Jahre
  2026 und 2027 – und soll noch weiter erhöht werden: Bis zum Ende der Legislaturperiode
  sollen die Bundesmittel schrittweise weiter auf insgesamt 1,58 Milliarden Euro steigen.
  Damit wird die Finanzierung des Städtebaus in dieser Wahlperiode fast verdoppelt.'
