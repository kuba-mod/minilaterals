date: '2026-04-23'
type: press_release
source_name: german_chancellery
title: Newsletter Verbraucherschutz aktuell / Ausgabe 6
text: 'Die stark gestiegenen Kraftstoffpreise in Folge des Nahost-Konflikts bereiten
  vielen Menschen Sorgen. Aus diesem Grund hat die Regierungskoalition am 12. April
  beschlossen, die Mineralölsteuer für zwei Monate zu senken und eine 1.000-Euro-Entlastungsprämie
  für Beschäftigte zu ermöglichen. Bereits seit 1. April sind Preisänderungen an Tankstellen
  nur noch einmal am Tag zulässig. Hier erhalten Sie den Überblick. Die Bundesgesundheitsministerin
  hat ihre Vorschläge für die Reform der GKV vorgestellt. Der Gesetzentwurf ist nun
  in Arbeit. U m das anstehende Defizit von 15 Milliarden Euro in 2027 und von bis
  zu 40 Milliarden Euro bis 2030 auszugleichen, sollen zahlreiche Empfehlungen der
  FinanzKommission Gesundheit umgesetzt werden. Es gibt zu wenig Wohnraum in Deutschland.
  Das Förderprogramm „Gewerbe zu Wohnen“ soll nun helfen, dies zu ändern. Gefördert
  wird der Umbau von leerstehenden Gewerbeimmobilien zu Wohnungen. Die wichtigsten
  Fragen und Antworten zu dem Programm im Überblick. Der deutsche Automarkt kommt
  in Schwung: Im März 2026 wurden rund 294.000 Pkws neu zugelassen. Ein Plus von 16
  Prozent gegenüber dem Vorjahresmonat. Besonders stark wächst die Nachfrage nach
  Elektroautos. Inzwischen fährt fast jedes dritte neue Auto zumindest teilweise elektrisch.
  Die Bundesregierung fördert Elektroautos mit Steuervorteilen und rückwirkend ab
  Januar 2026 auch wieder mit einer Kaufprämie. Hier sind die Details. Ab sofort können
  Verbraucherinnen und Verbraucher einfacher nachweisen, wenn die gebuchte mobile
  Internetverbindung deutlich zu langsam ist. Dafür hat die Bundesnetzagentur eine
  neue App und eine Handreichung mit konkreten Vorgaben veröffentlicht. Künstliche
  Intelligenz (KI) ist im digitalen Alltag omnipräsent. Das nutzen Cyberkriminelle
  für sich: KI verändert auch Online-Betrug. Wie gut sind Verbraucherinnen und Verbraucher
  darauf vorbereitet? Diese Broschüre gibt einen ersten Überblick zum Thema Eheliche
  Lebensgemeinschaft, Getrenntleben der Eheleute, Scheidungs- und Scheidungsfolgenrecht
  unter Berücksichtigung des Zugewinnausgleichs, des Unterhaltsrechts sowie des Rechts
  des Versorgungsausgleichs.'
