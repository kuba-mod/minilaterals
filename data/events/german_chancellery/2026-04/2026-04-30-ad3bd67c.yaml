title: Fragen und Antworten zum Deutschlandticket Ein Ticket für ganz Deutschland
text: 'Von Sylt bis in den bayerischen Wald: Quer durch Deutschland mit nur einem
  Ticket. Grafik: Bundesregierung/Shutterstock/YesPhotographers Das Deutschlandticket
  für den gesamten öffentlichen Personennahverkehr ( ÖPNV ) ist eine Erfolgsgeschichte,
  die sich zum 1. Mai zum dritten Mal jährt. Aktuell nutzen rund 14,5 Millionen Kundinnen
  und Kunden das umfangreiche Angebot. Seit Januar 2026 kostet es monatlich 63 Euro
  . Die vereinfachte Tarifstruktur und die Möglichkeit, das Ticket online zu kaufen
  und zu nutzen, haben zum Erfolg des Deutschlandtickets beigetragen. Alle Fakten
  zum Deutschlandticket im Überblick. Seit Januar 2026 kostet das Deutschlandticket
  monatlich 63 Euro. Darauf hatten sich die Verkehrsministerinnen und Verkehrsminister
  der Länder am 18. September 2025 auf einer Sonderkonferenz verständigt. Die Länder
  können auf ihre Kosten weitere Vergünstigungen etwa für Azubi-, Schüler- oder Sozialtickets
  anbieten. Nähere Informationen stellen die Verkehrsunternehmen oder der Verbund
  vor Ort zur Verfügung. Die Verkehrsministerkonferenz der Länder entscheidet eigenständig
  ohne Einfluss des Bundes über die Preisgestaltung des Deutschlandtickets. Grund
  ist die gesetzliche Zuständigkeit der Länder für den Öffentlichen Personennahverkehr.
  Kundinnen und Kunden können das Deutschlandticket bei allen Verkehrsunternehmen
  und -verbünden erwerben. Bei welchem Anbieter in Ihrer Umgebung das Deutschlandticket
  abonniert werden kann, ist auf der offiziellen Web-Seite zum Deutschlandticket zu
  finden. Das Deutschlandticket ist bundesweit gültig und ermöglicht deutschlandweite
  Fahrten im ÖPNV und SPNV aller teilnehmenden Verkehrsunternehmen, Landestarife und
  Verkehrsverbünde sowie im verbundfreien Raum. Reisende können also alle Busse und
  Bahnen des öffentlichen Regional- und Nahverkehrs in ganz Deutschland nutzen. Ausgenommen
  sind der Fernverkehr (zum Beispiel IC , EC , ICE ), private Anbieter wie FlixTrain
  oder FlixBus sowie Fahrten in der ersten Klasse. Es gibt aber einige wenige Ausnahmen,
  weitere Informationen darüber, wo das Deutschlandticket überall gültig ist, gibt
  es bei der Deutschen Bahn. Das Deutschlandticket ist personengebunden und nicht
  auf andere Personen übertragbar. Fahrgäste müssen bei möglichen Kontrollen ihre
  Identität nachweisen. Kinder unter sechs Jahren fahren weiterhin kostenlos mit. Eine
  unentgeltliche Mitnahme von Personen über sechs Jahren ist nicht möglich. Arbeitgeberinnen
  und Arbeitgeber erhalten die Möglichkeit, ihren Beschäftigten das Deutschlandticket
  als Jobticket bereitzustellen. Wenn sie dabei einen Zuschuss von mindestens 25 Prozent
  auf den Ausgabepreis des Tickets leisten, können zusätzlich fünf Prozent Rabatt auf
  den Ausgabepreis gewährt werden. Bund und Länder haben sich darauf verständigt,
  das Deutschlandticket ab dem Sommersemester 2024 in rabattierter Form auch als Semesterticket
  anzubieten. Der Fahrpreis für das Deutschlandsemesterticket beträgt 60 Prozent des
  Fahrpreises des regulären Deutschlandtickets. Das Ticket hat dieselben Merkmale
  wie das normale Deutschlandticket: Es gilt für eine Person in der 2. Klasse in allen
  Verkehrsmitteln des ÖPNV in ganz Deutschland und ist nicht übertragbar. Ob und wann
  genau das Semesterticket an einzelnen Hochschulen eingeführt wird, hängt von den
  Verhandlungen zwischen den Verkehrsunternehmen, Verkehrsverbünden und Landestariforganisationen
  mit den Hochschulen und Studierendenvertretungen ab. Durch die Nutzung des Deutschlandtickets
  lassen sich CO2 -Emissionen einsparen, die auf rund 2,5 Millionen Tonnen jährlich
  beziffert werden. Zur dieser Schätzung kommt eine Studie des Gutachterkonsortiums
  unter Leitung der infas . Das entspricht einer Reduktion der Emissionen des privaten
  Pkw -Verkehrs um etwa drei Prozent. Der Bund beteiligt sich zur Hälfte an den Kosten
  für das Deutschlandticket. So stellte er 2023, 2024 und 2025 jeweils 1,5 Milliarden
  Euro zur Verfügung. Diesen Betrag wird der Bund nun auch langfristig bis 2030 leisten.
  Diese langfristige Absicherung gibt Sicherheit für Verbraucherinnen, Verbraucher,
  Länder und Verkehrsbetriebe. Denselben Betrag steuern die Länder bei. Diese Mittel
  sollen die Verkehrsunternehmen des Öffentlichen Personennahverkehr unterstützen
  – als Ausgleich für Mindereinnahmen, die durch das Angebot des Deutschlandtickets
  entstehen. Das Deutschlandticket resultiert aus dem Neun-Euro-Ticket , das auf Initiative
  der Bundesregierung in den Sommermonaten 2022 angeboten und 52 Millionen Mal verkauft
  wurde. An den Erfolg dieser zeitlich befristeten Aktion soll das Deutschlandticket
  als dauerhaftes Angebot anknüpfen. Wie schon das Neun-Euro-Ticket soll auch das
  Deutschlandticket die Bürgerinnen und Bürger angesichts der gestiegenen Energiepreise
  finanziell entlasten. Gleichzeitig soll es die Attraktivität des ÖPNV deutlich erhöhen,
  einen Anreiz zum Umstieg vom Auto auf Bus und Bahn setzen – und somit dazu beitragen,
  die Klimaziele zu erreichen.'
