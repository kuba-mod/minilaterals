title: 'Besuch der Stiftung Preußische Schlösser und Gärten zu Gemälden Anthonis van
  Dycks – Weimer: „Untersuchung dieser Werke ist Beispiel modernster Forschungspraxis“'
text: 'Kulturstaatsminister Weimer besuchte am heutigen Vormittag das Wissenschafts-
  und Restaurierungszentrum (WRZ) der Stiftung Preußische Schlösser und Gärten Berlin-Brandenburg
  (SPSG). Anlass ist ein bis 2027 andauerndes Forschungsprojekt, welches sich mit
  dem stiftungseigenen Bestand der flämischen Malerei beschäftigt. Aktuell werden
  dort fünf großformatige Gemälde des Malers Anthonis van Dyck aus seinen unterschiedlichen
  Schaffensphasen untersucht. Die Gemälde hängen normalerweise in den Liegenschaften
  der SPSG, in der Bildergalerie im Park Sanssouci, im Neuen Palais und im Schloss
  Oranienburg. Kulturstaatsminister Wolfram Weimer: „Die Stiftung Preußische Schlösser
  und Gärten Berlin-Brandenburg ist weit mehr als eine Bewahrerin historischer Bauten
  und Gärten: Sie gehört zu den zentralen Institutionen der deutschen und europäischen
  Kulturlandschaft und verfügt über eine Gemäldesammlung von internationalem Rang
  – von Cranach dem Älteren und dem Jüngeren über Caravaggio, Watteau bis zu den flämischen
  Malern Rubens und van Dyck. Die Untersuchungen der gezeigten fünf Werke aus unterschiedlichen
  Schaffensphasen von Anthonis van Dyck sind ein Beispiel modernster Forschungspraxis.
  Die Stiftung sichert auf diese Weise kulturelles Erbe von internationaler Bedeutung,
  fördert Forschung und stärkt Deutschland als internationalen Kulturstandort.“ Anthonis
  van Dyck (1599-1641) war neben seinem Lehrmeister Peter Paul Rubens (1577-1640)
  einer der bedeutendsten Künstler Antwerpens und ist als einer der einflussreichsten
  Portraitmaler der Kunstgeschichte und Hofmaler König Karls I. von England bekannt.
  Die derzeitigen Forschungen der SPSG umfassen nicht nur die Werke von Anthonis van
  Dyck, sondern ihren gesamten herausragenden Bestand von etwa 200 Gemälden der flämischen
  Malerei. Hierzu gehören neben Anthonis van Dyck Spitzenwerke wie von Peter Paul
  Rubens, Jacob Jordaens und Thomas Willeboirts Bosschaert.  Die Ergebnisse dieser
  interdisziplinären Forschungen sollen in einen Bestandskatalog aufgenommen werden,
  der aktuell erarbeitet wird.'
