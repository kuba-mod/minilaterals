title: Im Kabinett beschlossen Leitplanken für Investitionen, Reformen und Konsolidierung
text: 'Nach der Sitzung des Kabinetts hat sich Bundesfinanzminister Klingbeil zu dem
  Regierungsentwurf geäußert. Mit den Eckwerten des Regierungsentwurfs zum Bundeshaushalt
  2027 und des Finanzplans des Bundes 2026 bis 2030 setzt die Bundesregierung die
  Leitplanken für künftige Investitionen, Reformen und Konsolidierung. Oberstes Ziel
  ist es, Arbeitsplätze zu sichern, neue Jobs zu schaffen und nachhaltiges Wirtschaftswachstum
  zu fördern. Wegen der angespannten Haushaltslage bleibt der Konsolidierungsdruck
  weiterhin groß. Es gilt daher das Prinzip, in die Zukunft zu investieren und zugleich
  massiv zu konsolidieren. Die Eckwerte bilden die Grundlage für das weitere Haushaltsaufstellungsverfahren.
  Die wichtigsten Zahlen im Überblick: Verteidigungshaushalt: 106 Milliarden Euro
  Investitionen in Infrastruktur: 118,5 Milliarden Euro Neuverschuldung: 110,8 Milliarden
  (Kernhaushalt) Die weltpolitische Lage hat sich in den letzten Jahren dramatisch
  verändert, vor allem auch in Europa. Russland setzt seinen Angriffskrieg in Europa
  gegen die Ukraine und seine erheblichen hybriden Bedrohungen unvermindert fort.
  Dazu kommen die globalen Auswirkungen der kriegerischen Auseinandersetzungen zwischen
  den USA , Israel und Iran. Bundeskanzler Merz betonte nach der Kabinettsitzung deshalb,
  dass es bedeutende Bereiche gebe, für die man weiter viel Geld ausgeben müsse. „Das
  gilt insbesondere für unsere Verteidigungsfähigkeit und unsere Sicherheit im Bündnis.
  Wir stehen hier im Wort und wir müssen gleichzeitig Prioritäten setzen“, betonte
  Merz. Der Handlungsbedarf bleibt hoch: Für die Bündnis- und Verteidigungsfähigkeit
  sehen die Eckwerte daher einen deutlichen Anstieg des Verteidigungshaushalts um
  knapp 28 Prozent auf etwa 106 Milliarden Euro vor. Die Investitionsoffensive wird
  2027 weiter fortgeführt: Deutschlands Infrastruktur soll umfassend modernisiert
  werden. Dafür investiert die Bundesregierung massiv in die Verkehrsinfrastruktur,
  Digitalisierung und Klimaschutz, Schulen, Kindergärten, Wohnungsbau und moderne
  Krankenhäuser. Von den Investitionen profitiert auch die Wirtschaft erheblich: Für
  Wachstumsimpulse und die Modernisierung der Infrastruktur stehen 2027 118,5 Milliarden
  Euro bereit. Grundlegende Reformen sind essentiell, um die Sozialsysteme auf zukunftsfeste
  Beine zu stellen und für ein besseres wirtschaftliches Umfeld zu sorgen. Die Bundesregierung
  hat dafür einen wichtigen Schritt getan. Mit dem Kabinettbeschluss für die beitragssatzstabilisierenden
  Maßnahmen der gesetzlichen Krankenversicherung und Verbesserung des Gesundheitssystems
  handelt es sich um eines der größten Reformprojekte der letzten Jahrzehnte. Merz
  betonte, er blicke jetzt zuversichtlich auf die weiteren Reformen. Bundesfinanzminister
  Klingbeil erklärte, es gelte nun mit den Reformen und Investitionen, Deutschlands
  Stärke zu festigen und das Land krisenfester zu machen. Kanzler Merz hob außerdem
  hervor, dass es Bereiche gebe, in denen gespart werden müsse – insbesondere im Bereich
  der staatlichen Verwaltung. „Der Staat muss schlanker und effizienter werden. Eine
  konsequente Digitalisierung und Modernisierung ist hierfür ein wesentlicher Treiber.“
  Der Fokus des Eckwertebeschlusses und der kommenden Wochen bis zum Regierungsentwurf
  für den Haushalt 2027 liegt daher auf einem strikten Konsolidierungskurs. Um deutliche
  Einsparungen und Reformen vorzunehmen, hat sich die Bundesregierung auf ein Maßnahmenpaket
  zur Haushaltskonsolidierung geeinigt. Dazu gehören, Bürokratie drastisch abzubauen,
  IT -Verfahren zu beschleunigen und die Verwaltung zu modernisieren. Finanzhilfen
  und Steuervergünstigungen sollen zurückgefahren werden. Die Bundesregierung wird
  eine Plastik- und eine Zuckerabgabe einführen und die Tabaksteuer erhöhen. Die sozialen
  Sicherungssysteme werden durch Strukturreformen effizienter und damit zukunftsfest
  gemacht. Diese und weitere Maßnahmen werden jetzt in den kommenden Wochen von den
  Ressorts ausgearbeitet und fließen in den Regierungsentwurf des Haushalts 2027 ein.
  Er soll voraussichtlich Anfang Juli im Kabinett beschlossen werden. Weitere Infos
  lesen Sie beim Bundesfinanzministerium.'
