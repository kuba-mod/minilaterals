title: Rede des Kanzlers zum Auftakt des Girls’ Day „Wir können auf euch nicht verzichten“
text: '„Es gibt im 21. Jahrhundert für junge Frauen so viele Möglichkeiten wie nie
  zuvor“, sagte Kanzler Merz. Bundeskanzler Friedrich Merz hat zwanzig Schülerinnen
  aus drei Berliner Schulen zur Auftaktveranstaltung des Girls’ Day im Kanzleramt
  empfangen. Dort hatten die Mädchen und jungen Frauen durch einen Technikparcours
  die Möglichkeit, spielerisch unterschiedliche MINT -Berufsbilder kennenzulernen.
  Im Anschluss stellten die jungen Teilnehmerinnen Bundeskanzler Friedrich Merz die
  verschiedenen Stationen des Technikparcours vor. Die Schülerinnen zeigten dem Kanzler
  unter anderem eine Rennbahn mit einem autonom gesteuerten Fahrzeug. Außerdem demonstrierten
  sie verschiedene KI -Anwendungen und erklärten, wie Cyber angriffe entstehen und
  wie sie verhindert werden können. Der Kanzler warb dafür, dass mehr junge Frauen
  MINT -Berufe ergreifen. Denn diese Bereiche würden immer wichtiger für die Unternehmen
  in Deutschland. „Wir können auf euch nicht verzichten, gerade in den technischen
  Berufen“, sagte Merz an die jungen Frauen gerichtet. Zugleich sprach sich der Bundeskanzler
  auch für mehr junge Männer in sozialen Berufen aus: Veranstaltungen wie der Girls’
  Day und Boys’ Day sollen helfen, Rollenbilder zu überwinden und „dafür zu sorgen,
  dass wir unser Potenzial, das wir in Deutschland haben, besser ausschöpfen.“ Der
  „Girls’ Day - Mädchenzukunftstag “ findet im Jahr 2026 am 23. April statt. Es ist
  eines der größten Berufsorientierungsprojekte für Schülerinnen weltweit, mit dem
  Ziel, mehr Mädchen für technisch-naturwissenschaftliche Berufe zu begeistern – Berufe
  in Branchen, die traditionell von Männern dominiert werden. Parallel zum Girls’
  Day findet seit 2011 auch der bundesweite Boys’ Day statt, bei dem Schüler die Möglichkeit
  haben, soziale, erzieherische oder pflegerische Berufe zu entdecken. Berlin, 22.
  April 2026: In diesem Jahr empfing der Kanzler zwanzig Schülerinnen aus drei Berliner
  Schulen im Bundeskanzleramt – zur Auftaktveranstaltung zum bundesweiten Girls’Day
  , der am 23. April stattfindet. Seit über 20 Jahren eröffnet der amtierende Bundeskanzler
  oder die amtierende Bundeskanzlerin gemeinsam mit der Initiative D21 den Girls’Day
  . Damit wird die Bedeutung des Aktionstags unterstrichen, der Mädchen ermutigt,
  ihre beruflichen Möglichkeiten jenseits klassischer Rollenbilder zu entdecken und
  neue Wege in MINT -Berufe zu gehen. Im Mittelpunkt des Auftaktprogramms stand ein
  interaktiver Parcours , an dem fünf Mitgliedsorganisationen der Initiative D21 (Fsas
  Technologies , die Bundesdruckerei, HiSolutions , IBM und Pfeifer & Langen) praxisnahe
  Einblicke in unterschiedliche MINT -Berufe gaben. Die Schülerinnen konnten dabei
  selbst ausprobieren, Fragen stellen und Technik unmittelbar erleben. In seiner Begrüßungsrede
  sprach sich der Bundeskanzler gegen ein zu enges Rollenverständnis aus: „Ich werbe
  nicht nur dafür, dass junge Frauen in die technischen Berufe gehen, ich werbe auch
  dafür, dass junge Männer in die sozialen Berufe gehen.“ Eindringlich appellierte
  der Kanzler an die jungen Frauen und Mädchen, auch mehr Berufe aus dem MINT -Bereich
  zu ergreifen: „ Wir können auf euch nicht verzichten, gerade in den technischen
  Berufen. Ich werbe sehr dafür, dass wir das gemeinsam besser machen in Deutschland!“
  Berlin, 22. April 2026: In diesem Jahr empfing der Kanzler zwanzig Schülerinnen
  aus drei Berliner Schulen im Bundeskanzleramt – zur Auftaktveranstaltung zum bundesweiten
  Girls’Day , der am 23. April stattfindet. Seit über 20 Jahren eröffnet der amtierende
  Bundeskanzler oder die amtierende Bundeskanzlerin gemeinsam mit der Initiative D21
  den Girls’Day . Damit wird die Bedeutung des Aktionstags unterstrichen, der Mädchen
  ermutigt, ihre beruflichen Möglichkeiten jenseits klassischer Rollenbilder zu entdecken
  und neue Wege in MINT -Berufe zu gehen. Im Mittelpunkt des Auftaktprogramms stand
  ein interaktiver Parcours , an dem fünf Mitgliedsorganisationen der Initiative D21
  (Fsas Technologies , die Bundesdruckerei, HiSolutions , IBM und Pfeifer & Langen) praxisnahe
  Einblicke in unterschiedliche MINT -Berufe gaben. Die Schülerinnen konnten dabei
  selbst ausprobieren, Fragen stellen und Technik unmittelbar erleben. In seiner Begrüßungsrede
  sprach sich der Bundeskanzler gegen ein zu enges Rollenverständnis aus: „Ich werbe
  nicht nur dafür, dass junge Frauen in die technischen Berufe gehen, ich werbe auch
  dafür, dass junge Männer in die sozialen Berufe gehen.“ Eindringlich appellierte
  der Kanzler an die jungen Frauen und Mädchen, auch mehr Berufe aus dem MINT -Bereich
  zu ergreifen: „ Wir können auf euch nicht verzichten, gerade in den technischen
  Berufen. Ich werbe sehr dafür, dass wir das gemeinsam besser machen in Deutschland!“
  Ich will erst einmal den Schülerinnen ein ganz herzlich Willkommen im Bundeskanzleramt
  sagen. Ich freue mich sehr, dass wir uns heute sehen und dass wir diese Veranstaltung
  anlässlich des Girl’s Day 2026 heute hier sozusagen im Kanzleramt beginnen dürfen.
  Es ist ja vielleicht bei euch allen angekommen: Es hat eine Mondmission gegeben.
  Wer hat sie gesehen? Wer hat mitgefiebert? Ja, also jedenfalls die meisten. Die
  ganze Mission hieß wie? Man sagt, es sei eine bemannte Raumfahrtmission gewesen.
  Was ist daran falsch? Nein, nicht Frauen; es war eine dabei; immerhin. Es war also
  eine Frau dabei. Es war die amerikanische Physikerin Christina Koch oder „ Coach
  “, wie man in Amerika sagt, eine Astronautin, Physikerin und Elektroingenieurin.
  Wer von euch hat vor, in einen dieser Bereiche zu gehen? Elektrotechnik? Nein. Physik?
  Nein. Vielleicht doch! Ich wollte einfach gerne diese Mission zum Anlass nehmen,
  einmal zu sagen, – und sie ist übrigens sicher wieder auf der Erde gelandet – :
  Es gibt im 21. Jahrhundert für junge Frauen so viele Möglichkeiten wie nie zuvor,
  aber wir müssen mehr für die sogenannten MINT -Berufe werben, also Mathematik, Informatik,
  Naturwissenschaften, Technik. Diese Bereiche werden immer wichtiger, auch für unser
  Land. Sie werden immer wichtiger für die Unternehmen in Deutschland. Wenn ihr euch
  nicht, wenn sich diese Generation junger Frauen, junger Mädchen nicht auf den Weg
  macht, auch mehr Berufe aus den technischen Bereichen zu erlernen – sei es im Handwerk,
  sei es in den akademischen Berufen –, dann fehlt uns etwas in Deutschland. Deswegen
  will ich aus meiner Sicht ganz einfach einmal sagen: Wir können auf euch nicht verzichten,
  gerade in den technischen Berufen. Ich werbe sehr dafür, dass wir das gemeinsam
  besser machen in Deutschland! Es gibt übrigens umgekehrt auch bei den Jungs immer
  noch einige Defizite. Die Jungs sind viel zu selten in den sozialen Berufen tätig,
  viel zu wenig in den Berufen, die so klassische Frauenberufe sind. Deswegen wollen
  wir auch ein bisschen mehr über das Rollenverständnis reden. Ich werbe nicht nur
  dafür, dass junge Frauen in die technischen Berufe gehen, ich werbe auch dafür,
  dass junge Männer in die sozialen Berufe gehen und dass wir da besser werden in
  Deutschland. Ich glaube, da haben wir noch eine Menge vor uns, und deswegen machen
  wir den Girls'' Day , und deswegen machen wir auch den Boys'' Day . Wir machen beides.
  Wir werben für das eine wie für das andere, und beides soll ein bisschen helfen,
  dieses Rollenbild ein bisschen zu überwinden und dafür zu sorgen, dass wir unser
  Potenzial, das wir in Deutschland haben, besser ausschöpfen. Das technische Potenzial
  ist bei euch riesengroß. Es gibt tolle Vorbilder. Es gibt Frauen, die in vielen
  Bereichen Pioniergeschichte geschrieben haben, bis in unsere Tage hinein. Jetzt
  ist es Christina Koch . In diesem Sinne also herzlich willkommen! Ich freue mich,
  dass wir gleich einmal diesen kleinen Parcours miteinander besuchen oder abgehen
  werden und dass ich ihn kennenlerne. Aber ich will zunächst noch einmal eine kleine
  ehrenvolle Aufgabe erfüllen. Es hat nämlich unter euch eine Schätzfrage gegeben,
  die heute Morgen beantwortet werden sollte. Zur Erinnerung, die Frage war: Wie viel
  Prozent aller Auszubildenden in MINT -Berufen in Deutschland waren im Schuljahr
  2024/2025 weiblich? Die Antwort ist: 14,1 Prozent, verdammt wenig. Damit ist auch
  klar, wer gewonnen hat. Es ist die Kleine – ich glaube, du bist das –, Rama Abo
  Alnar. Wie viel hast du geschätzt? Genau, also noch ein bisschen schlechter. Aber
  ich gratuliere! Der Gutschein ist einer für einen Besuch im Verstehbahnhof in Fürstenberg
  an der Havel. Wenn du willst, nimm gerne auch noch andere mit zu diesem Besuch.
  Schaut euch das an. Aber 13,5 oder, tatsächlich, 14,1 Prozent, das ist zu wenig!
  Deswegen sind wir heute hier und versuchen ein bisschen Werbung für Frauen in technischen
  Berufen zu machen. Das ist der Preis. Herzlichen Glückwunsch!'
