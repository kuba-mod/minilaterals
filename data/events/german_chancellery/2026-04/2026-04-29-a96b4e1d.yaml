title: Im Kabinett beschlossen Polizei- und Strafverfolgungsbehörden stärken
text: 'Mit dem Ausbau von digitalen Befugnissen haben Polizei- und Strafverfolgungsbehörden
  insbesondere bei schweren Straftaten mehr Möglichkeiten. Internationaler Terrorismus,
  Extremismus sowie schwere und organisierte Kriminalität fordern die Innere Sicherheit
  in Deutschland heraus. Hinzu kommen internationale Krisen, die sich – mehr denn
  je – auch auf die Sicherheitslage in unserem Land auswirken. Das Gesetzespaket zum
  Ausbau der digitalen Ermittlungsbefugnisse dient dazu, die Polizei- und Strafverfolgungsbehörden
  zu stärken. Das Gesetz umfasst digitale Ermittlungsbefugnisse, insbesondere zur
  automatisierten Datenanalyse und zum Bildabgleich für die Gefahrenabwehr und Strafverfolgung.
  Diese ermöglichen den Ermittlungsbehörden einen sachgerechten Umgang mit immer weiter
  steigenden Datenmengen unter Einsatz von KI . Anhand der automatisierte Datenanalyse
  können relevante Zusammenhänge und Querverbindungen erkannt werden. Terroristische
  und kriminelle Strukturen können auf diese Weise besser erkannt werden. Die Befugnisse
  zum automatisierten biometrischen Abgleich von öffentlich verfügbaren Daten aus
  dem Internet dienen dem Ziel, etwa im Falle von Fahndungen, Personen zu identifizieren,
  zu lokalisieren, aber auch weiterführende Hinweise auf den Sachverhalt zu erhalten.
  KI und andere digitale Tools bei der Verfolgung von Straftaten wichtige Dienste
  leisten. Zugleich ist klar: Nicht alles was technisch möglich ist, ist in einem
  Rechtsstaat zulässig. Es braucht gesetzliche Leitplanken für den Einsatz von digitalen
  Instrumenten. Dem dient das Gesetzespaket. Das Gesetzespaket ist ein wichtiger Baustein
  der im Koalitionsvertrag vereinbarten Sicherheitsoffensive der Bundesregierung.
  Weiterführende Informationen finden Sie beim Bundesministerium des Innern und beim
  Bundesministerium der Justiz und für Verbraucherschutz .'
