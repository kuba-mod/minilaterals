  möglichen EU -Beitritt der Ukraine oder zur Perspektive ihrer eigene Rente. Der
  EU-Projekttag bringt jedes Jahr rund um den Europatag Politikerinnen und Politiker
  in Schulen, um mit Jugendlichen über Europa zu sprechen. Ziel ist es, Interesse
  an der EU zu wecken und politische Zusammenhänge verständlich zu machen. Das Format
  wurde 2007 während der deutschen EU ‑Ratspräsidentschaft eingeführt. Schulen können
  die Veranstaltungen flexibel gestalten, vor Ort oder digital. Laut Bundesregierung
  stärkt der Projekttag das europäische Bewusstsein junger Menschen spürbar.'
