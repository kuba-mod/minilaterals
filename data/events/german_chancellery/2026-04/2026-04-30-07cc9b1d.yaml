title: 'EU-Projekttag an Schulen Europa im Klassenzimmer: Kanzlerbesuch am Carolus-Magnus-Gymnasium'
text: 'Bei den Gesprächen mit den Jugendlichen wurden viele aktuelle Themen diskutiert.
  Im Rahmen des jährlich stattfindenden EU -Projekttages an Schulen hat Bundeskanzler
  Friedrich Merz das Carolus-Magnus-Gymnasium im nordrhein-westfälischen Marsberg
  (Nordrhein-Westfalen) besucht – und sich dort den Fragen der Schülerinnen und Schüler
  gestellt. Im Mittelpunkt standen aktuelle europäische und internationale Themen,
  die die Jugendlichen direkt ansprachen. Auch Regierungssprecher Stefan Kornelius
  und seine Stellvertreter, Steffen Meyer und Sebastian Hille, sind im Rahmen des
  EU -Schulprojekttages an unterschiedlichen Bildungseinrichtungen zu Gast. Kern der
  Besuche ist ein offener Austausch mit den jungen Menschen über ihre Sichtweisen,
  Hoffnungen und Perspektiven auf Europa und die Welt. Schnell wurde deutlich, dass
  Kanzler Merz eine klare Meinung vertritt: Einen schnellen EU -Beitritt der Ukraine
  bezeichnete er als unrealistisch. Die von Präsident Wolodymyr Selenskyj angestrebten
  Zielmarken von 2027 oder 2028 seien nicht machbar. „Wir können in die Europäische
  Union kein Land aufnehmen, das im Krieg ist“, erklärte der Bundeskanzler. Neben
  einem stabilen Friedenszustand nannte er weitere Voraussetzungen wie Rechtsstaatlichkeit,
  Korruptionsbekämpfung und offene Grenzen – Voraussetzungen, die Zeit bräuchten.
  Zugleich warnte der Bundeskanzler aber davor, die Ukraine politisch zu isolieren.
  Die EU müsse glaubwürdige Perspektiven bieten, besonders falls ein Friedensschluss
  territoriale Zugeständnisse erfordere. „Das muss glaubwürdig von uns beantwortet
  werden “ , betonte er. Auf dem jüngsten EU -Gipfel habe er deshalb Vorschläge für
  eine schrittweise Integration eingebracht. Dazu gehöre etwa, ukrainische Vertreterinnen
  und Vertreter ohne Stimmrecht in EU -Institutionen einzubinden. Diese Ideen seien
  auf „überraschend große Zustimmung“ gestoßen, so der Kanzler. Ein weiteres Thema
  war unter anderem die Rolle der Vereinigten Staaten im Iran-Konflikt . In der Diskussion
  mit den Schülerinnen und Schülern äußerte Merz Zweifel daran, dass die USA , den
  Krieg im Iran rasch beenden könne. Die USA seien „ ohne jede Strategie in diesen
  Krieg gegangen“ und die Lage sei inzwischen ziemlich „vertrackt“ – mit spürbaren
  Folgen auch für die deutsche Wirtschaft. Deutschland halte dennoch an seinem Angebot
  fest, sich mit Minensuchbooten an der Sicherung der Straße von Hormus zu beteiligen
  – vorausgesetzt, dass die Kampfhandlungen enden, betonte der Bundeskanzler. Marsberg,
  27. April 2026: Der EU-Projekttag ist ein Erfolgsprojekt. Seit 2007 besuchen Politikerinnen
  und Politiker bundesweit Schulen, um über Europa zu diskutieren. Nicht nur der Bundeskanzler
  beteiligte sich, auch Kabinettsmitglieder bis hin zu Landes- oder Europa-Parlamentariern
  suchten den Austausch in den Schulen. Die Schülerinnen und Schüler stellten Bundeskanzler
  Merz zunächst verschiedene Europa-Projekte vor. Auf die Bühne der Aula sprach der
  Bundeskanzler mit den Schülerinnen und Schülern – unter anderem über ein mögliches
  Ende des russischen Angriffskriegs. Hierfür ist für den Bundeskanzler eine stärkere
  Einbindung der Ukraine in die Europäische Union eine wichtige Voraussetzung. Die
  Jugendlichen stellten viele Fragen, auch über aktuelle weltweite Konflikte, die
  ihnen Sorgen bereiten. Das Ziel des EU -Schulprojekttages ist es, Schülerinnen und
  Schüler für Europa zu begeistern. Das stand auch im Fokus beim Gespräch mit dem
  ersten Regierungssprecher Stefan Kornelius. Er war bei der 11. Jahrgangsstufe des
  Käthe-Kollwitz-Gymnasiums in München zu Gast. Demokratisches Zusammenleben und eine
  starke EU entscheiden über unsere Zukunft – das betonte Stefan Kornelius beim EU
  -Schulprojekttag. Ebenfalls am Montag besuchte der stellvertretende Regierungssprecher
  Steffen Meyer die Ruth-Cohn-Schule in Berlin. Bei einem Rundgang mit der Schulleiterin
  und dem Schülersprecher verschaffte er sich einen Eindruck von dem Oberstufenzentrum
  und verweilte kurz im Spielraum der Bibliothek. In einem Gespräch sprachen die Schülerinnen
  und Schüler des sozialpädagogischen Zweiges mit dem stellvertretenden Regierungssprecher
  und stellten ihre Fragen: Von den Spritpreisen über Situation am Wohnungsmarkt bis
  hin zu aktuellen internationalen Themen und Frauenrechten. Steffen Meyer besprach
  mit den jungen Menschen auch über unterschiedliche Informationsquellen und wies
  auf die Social Media-Kanäle der Bundesregierung hin. Berlin, 30. April 2026: Auch
  der Stellvertretende Regierungssprecher Sebastian Hille hat am EU -Projekttag an
  der Max-Bill-Schule in Berlin teilgenommen. Bei einem Rundgang konnte er einen Blick
  in verschiedene Werkstätten werfen. So zum Beispiel bei den angehenden Tischlern.
  Ebenfalls von Schülerinnen und Schülern des Oberstufenzentrums selbst nachgebaut:
  ein Mauerstück zum 30jährigen Jubiläum des Mauerfalls. Bei der Diskussion stellten
  Schülerinnen und Schüler aus dem Bildungsgang Tischlerei sowie dem Leistungskurs
  Politik Fragen zu vielen Themenbereichen: so zum Beispiel zum Nahostkonflikt, einem
  möglichen EU -Beitritt der Ukraine oder zur Perspektive ihrer eigene Rente. Marsberg,
  27. April 2026: Der EU-Projekttag ist ein Erfolgsprojekt. Seit 2007 besuchen Politikerinnen
