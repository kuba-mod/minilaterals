date: '2026-04-22'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 22. April 2026
text: '(Vorsitzender Feldhoff eröffnet die Pressekonferenz und begrüßt StS Kornelius
  sowie die Sprecherinnen und Sprecher der Ministerien.) Die erste Entscheidung des
  Bundeskabinetts betrifft das Versorgungsausgleichsrecht . Die Bundesregierung will
  die finanzielle Gerechtigkeit im Alter stärken und deshalb das Recht des Versorgungsausgleichs
  punktuell anpassen. Den von der Bundesjustizministerin vorgelegten Gesetzentwurf
  hat das Kabinett heute beschlossen. Sie wissen, dass im Zuge einer Ehescheidung
  die in der Ehe erworbenen Vorsorgeanrechte aus der gesetzlichen Rentenversicherung
  bereits nach geltendem Recht zwischen den Eheleuten gerecht zu teilen sind. Bislang
  können verschwiegene oder vergessene Anrechte aber nicht mehr geltend gemacht werden,
  wenn gerichtlich bereits über den Versorgungsausgleich entschieden wurde. Diese
  fehlende Korrekturmöglichkeit kann im Einzelfall zu ungerechten Lösungen führen.
  Daher sieht der Gesetzentwurf jetzt die Möglichkeit eines nachträglichen schuldrechtlichen
  Ausgleichs in Gestalt eines Zahlungsanspruchs vor. Das heißt, dass im Alter dann
  monatlich die Hälfte der zum Beispiel vergessenen Rente überwiesen werden muss.
  Zudem sollen Rentenansprüche von Unternehmen, die auf eine Kapitalleistung gerichtet
  sind, künftig im Rahmen des Versorgungsausgleichs berücksichtigt werden. Solche
  Ansprüche werden zurzeit nur im Zugewinnausgleich, nicht aber im Versorgungsausgleich
  ausgeglichen. Diese Änderung spielt insbesondere bei beherrschenden Gesellschafter-Geschäftsführern
  eine Rolle. All dies dient nicht nur dem gerechten Ausgleich bei geschiedenen Ehen,
  sondern sorgt auch für eine Gleichbehandlung betrieblicher Altersversorgung von
  Arbeitnehmern und Unternehmern. Dann haben wir eine weitere Mitteilung: Die Bundesregierung
  hat heute den Entwurf eines Gesetzes zur Einführung einer IP-Adressspeicherung und
  Weiterentwicklung der Befugnisse zur Datenerhebung im Strafverfahren beschlossen.
  Sie wissen, dass dies ein Gesetz mit einer langen Vorlaufzeit und einer enormen
  Wirkung ist. Die Bundesregierung setzt also nun ein starkes Zeichen. Dieses Gesetz
  ist zu lange ergebnislos diskutiert worden. Ziel des Gesetzentwurfs ist es, die
  Ermittlungsbefugnisse der Strafverfolgungs- und Sicherheitsbehörden besonders im
  Kampf gegen Internetkriminalität deutlich zu stärken. Dabei geht es für die Behörden
  konkret um einen Ermittlungsansatz, den eine IP-Adresse liefern kann. Bei den im
  Internet begangenen Straftaten stellt die IP-Adresse, die einem Anschlussinhaber
  zugeordnet werden kann, oft den einzigen Ermittlungsansatz dar. Man spricht dabei
  von digitalen Spuren, die Täter im Netz hinterlassen. Besonders relevant ist die
  IP-Adressspeicherung bei sexuellem Kindesmissbrauch im Internet, bei Cyberbetrug
  und bei Hasskriminalität im Netz. Die notwendige Bestandsabfrage der Strafverfolgungs-
  und Polizeibehörden bei den Internetzugangsanbietern hat nur dann Erfolg, wenn die
  Daten auch noch gespeichert sind. Aus diesem Grund wird für Internetzugangsanbieter
  eine Verpflichtung zur Speicherung von IP-Adressen für einen Zeitraum von drei Monaten
  eingeführt. Zusätzlich wird das Instrument der Sicherungsanordnung geschaffen. Damit
  können die Strafverfolgungsbehörden die Sicherung von Verkehrsdaten für bis zu drei
  Monate anordnen, sofern die rechtlichen und tatsächlichen Voraussetzungen einer
  Datenerhebung noch nicht vorliegen. Schließlich regelt dieser Gesetzentwurf, dass
  eine sogenannte Funkzellenabfrage nicht nur bei Verdacht einer besonders schweren
  Straftat, sondern schon bei Straftaten von erheblicher Bedeutung zulässig ist. Das
  Bundeskabinett hat außerdem den Entwurf eines Gesetzes zur Reform der Notfallversorgung
  beschlossen. Auch das ist von enormer Tragweite, besonders für die medizinische
  Notfallversorgung im ländlichen Raum. Die Bundesregierung bringt hierbei einen Baustein
  der umfangreichen Gesundheitsreform auf den Weg. Ministerin Warken hat gerade um
  12 Uhr im Gesundheitsministerium in einer Pressekonferenz darüber informiert; deswegen
  stelle ich es hier nur in Kürze dar: Ziel des Gesetzes ist es, die medizinische
  Notfallversorgung zu verbessern sowie Notaufnahmen und Rettungsdienste zu entlasten.
  Dies soll langfristig auch zu Einsparungen führen. Mit der Reform soll die 116117
  der Kassenärztlichen Vereinigung zur Rufnummer für Hilfen in akuten Fällen ausgebaut
  und enger mit der Notfallnummer 112 vernetzt werden. So kann die Patientenversorgung
  besser gesteuert werden. Zudem sollen an ausgewählten Krankenhäusern flächendeckend
  sogenannte integrierte Notfallzentren aufgebaut werden. Sie bestehen dann aus einer
  zentralen Ersteinschätzungsstelle, einer Notdienstpraxis und schließlich der Notaufnahme
  eines Krankenhauses. Schließlich werden die Kassenärztlichen Vereinigungen verpflichtet,
  durchgängig telemedizinische Beratungen und Hausbesuche in akuten Fällen anzubieten.
  Schließlich gibt es noch zwei Mitteilungen über die Verlängerung von militärischen
  Missionen: Die Bundesregierung hat heute die Fortsetzung der Beteiligung bewaffneter
  deutscher Streitkräfte an der NATO-geführten Mission Kosovo Force, KFOR , und der
  EU-geführten Sicherheitsoperation in Bosnien-Herzegowina, kurz EUFOR Althea , beschlossen.
  Der Bundestag muss den Mandaten, die bis zum 30. Juni 2027 gelten sollen, noch zustimmen.
  Das KFOR-Mandat ist grundsätzlich unbefristet. Die Mandatsobergrenze bleibt unverändert:
  bei KFOR 400, bei EUFOR 50 Soldatinnen und Soldaten. (zum Entwurf eines Gesetzes
  zur Einführung einer IP-Adressspeicherung und Weiterentwicklung der Befugnisse zur
  Datenerhebung im Strafverfahren ) Ich würde Herrn Kornelius ganz gern eine Frage
  stellen, weil es ja so ein lang diskutiertes und großes Thema ist: Ich würde gern
  wissen, wie sehr Sie darauf vertrauen, dass es diesmal tatsächlich EuGH-konform
  ist. Die Debatte darüber hat ja 20 Jahre auf dem Buckel. Es ist richtig, die Debatte
  ist sehr, sehr lange geführt worden. Deswegen ist der Gesetzgebungsprozess auch
  mit der nötigen Akribie und Absicherung gelaufen. Die zuständigen Häuser haben sich
  eng abgestimmt. Das BMJV kann dazu sicherlich detaillierter Auskunft geben. Außerdem
  haben sich die zuständigen Minister dazu heute auch schon geäußert. Insofern bin
  ich sehr hoffnungsfroh, dass wir Rechtsprüfungen diesmal mit einem positiven Ergebnis
  bestehen. Dann möchte ich an dieser Stelle direkt das BMJV mit ansprechen, aber
  vielleicht auch das BMI mit einbeziehen: Es geht am Ende ja um ein Defizit der Zugriffsmöglichkeiten
  für die Strafverfolger bei den Anschlusszuordnungen. Ist das aus Ihrer Sicht tatsächlich
  ein Problem der Provider, oder ist es nicht eher ein Problem bei den Ermittlungsbehörden,
  da dort, sage ich einmal, die Prozesse viel zu langsam sind? Reichen drei Monate
  denn überhaupt? Es geht dabei nicht um ein Defizit in den Zugriffsmöglichkeiten,
  sondern es geht konkret darum, dass die Daten zu dem Zeitpunkt, zu dem zugegriffen
  wird, noch vorhanden sind. An den Zugriffsmöglichkeiten als solchen wird ja nichts
  geändert. Frau Maier, könnten Sie einmal erklären, warum diese Regelung jetzt erforderlich
  ist? Das ist ja eine wichtige Vorgabe des EuGH gewesen. Dazu hat sich die Ministerin
  ja schon hinreichend und vielfach geäußert. Sie hat gerade auch zusammen mit ihrem
  Kollegen Herrn Dobrindt eine Pressekonferenz dazu gegeben. Die Erforderlichkeit
  sehen wir anhand dessen, dass uns Ermittlerinnen und Ermittler immer wieder mitteilen,
  dass ihre Ermittlungen ins Leere laufen, weil die IP-Adressen zu dem Zeitpunkt,
  zu dem sie sie benötigen, nicht mehr verfügbar sind. Aber Ihr eigenes Haus hatte
  noch unter der Ampelregierung gesagt, dass die allermeisten Fälle aus empirischer
  Sicht auch ohne diese Speicherung möglich sind. Ist das immer noch Ihr Stand, oder
  haben sich die Zahlen jetzt massiv geändert? Ihr Haus hatte gesagt, auch ohne Anwendung
  der Vorratsdatenspeicherung würden 91 Prozent der bekannt gewordenen Fälle, die
  Herr Kornelius vorhin genannt hatte, aufgeklärt werden können bzw. verfolgt werden
  können. Noch einmal zur Klarstellung: Es geht hierbei nicht um eine Vorratsdatenspeicherung.
  Es geht um eine IP-Adressenspeicherung. Das ist etwas grundsätzlich anderes. Ich
  habe es gerade ausgeführt und habe dem, was ich gerade gesagt habe, nichts hinzuzufügen.
  Das möchte ich dann doch kurz noch einmal zum Anlass nehmen, nachzufragen. Ist es
  aus Ihrer Sicht denn tatsächlich durch irgendetwas gerechtfertigt, eine dreimonatige
  Speicherung von IP-Adressenzuordnungen auf Vorrat, so wie sie auch im Gesetz bezeichnet
  wird, nicht als Vorratsdatenspeicherung zu bezeichnen? Inwiefern soll das keine
  Vorratsdatenspeicherung sein? Ich glaube, die Prämisse, die Sie aufstellen, mache
  ich mir erst einmal nicht zu eigen. Es geht hierbei ja eben nicht darum, dass irgendwelche
  Bewegungsprofile erstellt werden oder Ähnliches erstellt wird, sondern es geht nur
  darum, dass IP-Adressen vorgehalten werden. Frau Maier, dann stelle ich doch noch
  einmal diese Nachfrage: Gerade im Zusammenwirken mit der Sicherungsanordnung und
  der Ausweitung der Funkzellenabfrage, wie in diesem Gesetzentwurf vorgesehen, möchte
  ich gern wissen, inwiefern Sie glauben, dass wir hierbei nicht an der gleichen Stelle
  stehen werden wie vor zehn Jahren und vor 20 Jahren, dass wir am Ende wieder einen
  EuGH-Beschluss haben, der sagt, dass das nichts war? Wenn Sie sich die Entscheidung
  des EuGH von 2024 ins Gedächtnis rufen, stellen Sie fest, dass es dabei ja Leitlinien
  gibt. An denen orientieren wir uns auch. Im Rahmen dieser Leitlinien befinden wir
  uns auch mit diesem Gesetzentwurf. Sie möchten hier wirklich argumentieren: Wenn
  Daten für drei Monate auf Vorhalt gespeichert werden, dann ist es etwas anderes,
  als die Daten auf Vorrat zu speichern. Es ist ein Unterschied. Die IP-Adressenspeicherung
  ist keine Vorratsdatenspeicherung. Herr Kornelius, der Kanzler hat ja mit seinen
  Aussagen beimBankenverband jetzt eine Rentendebatte ausgelöst. Was genau hat er
  denn mit der Aussage, die gesetzliche Rente sei künftig nur noch eine Basisabsicherung,
  genau bezweckt? Ich muss Ihnen, glaube ich, widersprechen. Es ist keine Rentendebatte
  ausgelöst worden. Dieses Land diskutiert seit langer Zeit über die Rente. Die Bundesregierung
  hat eine Kommission eingesetzt, deren Ergebnisse wir noch in diesem Sommer erwarten.
  Danach wird eine Rentenreform auf den Weg gebracht. Die Äußerung des Bundeskanzlers
  stellt keinen Dissens zu den Plänen der Koalition dar. Sie wissen, dass wir drei
  Säulen der Altersvorsorge kennen: die gesetzliche Rentenversicherung, die betriebliche
  Altersversorgung und die private Altersversorgung. Diese drei Säulen werden neu
  zueinander gewichtet. Darauf läuft die Äußerung des Bundeskanzlers hinaus. Die betriebliche
  Säule haben wir bereits mit dem Zweiten Betriebsrentenstärkungsgesetz gestärkt.
  Das ist seit Mitte Januar in Kraft. Wir haben die private Altersvorsorge gestärkt.
  Sie wissen, dass am 27. März im Bundestag dazu ein Gesetz verabschiedet wurde. Vom
  Kabinett wurden Eckpunkte für die Frühstart-Rente im Dezember beschlossen. Auch
  das ist ein Teil einer kapitalgedeckten Rentenvorsorge. Sie sehen also, dass die
  Dynamik in diese Richtung läuft. Insofern war diese Bemerkung des Bundeskanzlers
  in einen größeren Prozess eingebettet. Es gibt aber dennoch viel Kritik seitens
  des Koalitionspartners. Daher die Frage direkt an das BMAS: Inwiefern sieht denn
  die Ministerin die gesetzliche Rente künftig nur noch als Basisabsicherung an? Haben
  Sie vielen Dank. Sie werden sich nicht wundern, dass ich hier an dieser Stelle die
  Worte des Kanzlers weder interpretieren noch kommentieren will. Aber die Ministerin
  selbst hat sich ja gestern geäußert. Das macht es mir leicht. Deswegen zitiere ich
  sie gern auch noch. Sie hat gestern gesagt: „Eine ordentliche Rente nach einem Leben
  voller Arbeit ist eine Frage der Leistungsgerechtigkeit. Wir haben als Bundesregierung
  gemeinsam die Alterssicherungskommission auf den Weg gebracht, die derzeit unter
  Hochdruck Vorschläge erarbeitet, wie die Alterssicherung auch in den kommenden Jahrzehnten
  stabil, gerecht und nachhaltig bleibt.“ Sie hat auch darauf hingewiesen, dass viele
  Menschen nur die gesetzliche Rente haben, gerade in Ostdeutschland. „Deshalb wird
  die gesetzliche Rente weiter ein wichtiger Baustein sein.“ Sie hat aber auch noch
  einmal deutlich gemacht, dass in der Koalition fest miteinander vereinbart ist,
  „dass wir erst die Kommission arbeiten lassen und, wenn die Vorschläge auf dem Tisch
  liegen, entschlossen handeln. Daran halte ich mich.“ Herr Kornelius, ich beziehe
  mich auf den Satz „die gesetzliche Rentenversicherung allein wird allenfalls noch
  die Basisabsicherung für das Alter sein“. Wir sehen das in der transkribierten Form.
  Stand das und auch das Wort „allenfalls“ so im Redemanuskript? Wir machen hier keine
  Textvergleiche mit dem Manuskript. Es gilt das gesprochene Wort. Das gilt für Sie
  wie für den Kanzler. Können Sie mir erklären, was sich denn dahinter verbirgt? „Basisabsicherung“
  hatten wir vorher schon gehört, auch in anderen Texten. Aber was muss ich mir unter
  „allenfalls noch die Basisabsicherung“ vorstellen? Ich glaube, das ist jetzt eine
  Textexegese, die den Rahmen hier übersteigt. Ich kann nur noch einmal sagen, dass
  wir in einen großen Rentenreformprozess eingebettet sind. Es wird eine der größten
  Sozialgesetzreformen werden, die dieses Land seit Jahrzehnten erlebt hat. Wir sind
  mitten in der Vorbereitung. Das Arbeitsministerium hat eben auch sehr ausführlich
  die Äußerung der Ministerin geschildert. Dabei gibt es keinen Dissens zwischen Frau
  Bas und dem Bundeskanzler. Die Reformdynamik steht. Das Element der privaten Altersvorsorge
  wird ein wichtiger Bestandteil sein. Darauf hat der Bundeskanzler hingewiesen. Weil
  Sie gerade meinten, dass die betriebliche Altersvorsorge gestärkt worden sei, die
  private Säule gestärkt worden sei, kann man die Debatte so verstehen, dass die gesetzliche
  Säule jetzt geschwächt werden soll, Herr Kornelius, korrekt? Das ist Ihre Interpretation,
  der ich mich nicht anschließen kann. Würden Sie behaupten, dass es jetzt um die
  Stärkung der gesetzlichen Rente geht? Ich behaupte nichts. Ich habe gesagt, was
  ich gesagt habe. Behauptungen oder Interpretationen müssen Sie vornehmen. Warum
  stärken Sie die betriebliche Säule, die private Säule, aber nicht die gesetzliche?
  Wir haben ja jetzt eine große Rentenreform in der Vorbereitung. Das Ergebnis der
  Arbeit der Kommission muss abgewartet werden. Das würde ich uns allen raten. Dann
  können wir die Gewichtung der Säulen zueinander besser beurteilen und auch sagen,
  ob sie nun gestärkt, geschwächt oder stabilisiert wurden. Die Äußerung des Kanzlers
  hat für heftige Reaktionen vor allem bei Menschen mit niedrigem Einkommen gesorgt.
  Die Argumentation, die wir von dort hören, ist: Wir sind schlicht und einfach bei
  insgesamt steigenden Lebenshaltungskosten, die das, was wir verdienen, völlig auffrisst,
  überhaupt nicht in der Lage, beim besten Willen nicht, privat vorzusorgen. ‑ Was
  ist die Antwort des Kanzlers auf diese sich aus der Lebensrealität entwickelnde
  Befürchtung oder Sorge? Der Bundeskanzler wird jetzt nicht diese Rentendebatte vorwegnehmen,
  die wir nach dem Vorliegen des Berichts der Kommission dann tatsächlich führen werden.
  Er hat gestern einen Satz gesagt. Die Dynamik, die sich aus diesem Satz ergeben
  hat, übrigens auch von Menschen mit nicht niedrigen Einkommensgruppen ‑ so habe
  ich es wahrgenommen ‑, zeugt davon, dass es hier um ein großes Reformvorhaben geht,
  das wir wirklich vor der Brust haben, das wir jetzt angehen müssen. Es werden alle
  Einkommensgruppen in diesem Reformprozess bedacht. Es muss eine Stärkung des Systems
  insgesamt geben, weil wir alle wissen, dass das System so auf Dauer nicht finanzierbar
  ist. Sie sagen, eine Antwort kann es eigentlich erst geben, wenn die Kommissionsvorschläge
  vorliegen. So verstehe ich Sie. Ist der Kanzler überrascht von der spontanen Sorge,
  Befürchtung und auch dem Widerspruch, der überwiegend doch von Menschen mit geringeren
  Einkommensgruppen kommt? Hat ihn das überrascht? Das müssten Sie mir konkretisieren.
  Ich habe jetzt möglicherweise den Reaktionsüberblick nicht so gut, wie Sie ihn haben.
  Ich habe sehr viele politische Äußerungen wahrgenommen, habe aber auch wahrgenommen,
  dass es, glaube ich, inzwischen eine Einordnung gibt, die dann doch wieder dazu
  beiträgt, dass wir zur Tagesordnung übergehen können. Um es auf den Punkt zu bringen:
  Viele haben jetzt Angst, dass sie vielleicht bald, weil sie nur die gesetzliche
  Rentenversicherung haben, Flaschen sammeln müssen. Ist es das Ziel des Bundeskanzlers,
  dass mehr Rentner Flaschen sammeln sollen? Was erwarten Sie für eine Antwort auf
  diese Frage? Die Kollegin hat ja gerade die Problematik beschrieben. Wenn es ihm
  allenfalls um eine Basisabsicherung geht: Jetzt gibt es schon Rentner in Deutschland,
  die zu wenig Geld haben und Flaschen sammeln müssen. Das ist ja für viele ein Horrorszenario.
  Die ehrliche Antwort auf Ihre Frage ist: Nein. Noch einmal zu der Rentenkommission:
  Hat der Kanzler da jetzt schon etwas ausgeplaudert? War das das vorgezogene Fazit
  oder ist das der Rahmen, den er der Kommission gesetzt hat? Es handelt sich um einen
  Satz, damit nicht um einen Rahmen, und er greift kein Ergebnis vorweg oder präjudiziert.
  Haben Sie mittlerweile ein genaueres Datum, wann die Kommission ihre Ergebnisse
  vorlegen wird? Da muss ich leider passen, aber vielleicht weiß das Ministerium schon
  etwas. Unterstützend kann ich dazu sagen, dass wir in dieser Legislatur beispielsweise
  neben der Stärkung der Betriebsrente oder der Einführung der Aktivrente oder Frühstartrente
  bereits die Haltelinie für die gesetzliche Rente bis 2031 verlängert haben. Auch
  das sollte nicht in Vergessenheit geraten. Konkret zur Alterssicherungskommission,
  die ja gerade arbeitet und tagt: Das ist eine eigene Kommission, die gebildet wurde,
  über die ich auch keinen Kenntnisstand habe. Wir haben immer wieder gesagt, dass
  wir Ende Juni die Ergebnisse der Kommission erwarten. Daraus wird sich dann politisches
  Handeln ergeben. Herr Kornelius, der Kanzler hat in seiner Rede beim Bankenverband
  auch die SPD aufgefordert, Blockaden aufzulösen. Dann hat er ein paar Beispiele
  genannt, etwa die Energiepolitik. In welchen Themenfeldern blockiert denn die SPD
  momentan aus Sicht des Kanzlers? Fallen die Reformen der Sozialsysteme aus Sicht
  des Kanzlers darunter? Ich glaube, der Bundeskanzler hat sich auf die unterschiedlichen
  Energiegesetzesvorhaben bezogen. Wir sehen ja auch, dass dort jetzt tatsächlich
  die Ressortabstimmung eingeleitet wurde. Mit Blick auf die Kabinettsitzung in der
  nächsten Woche ‑ es stehen ja sehr große Projekte auf der Tagesordnung ‑ wollte
  ich nachfragen: Bleibt es dabei, dass am 29.04. das Kabinett sowohl die Gesundheitsreform
  als auch Eckpunkte zum Haushalt und möglicherweise zur Einkommensteuerreform beschließen
  soll? Sie wissen, dass diese beiden sehr, sehr großen und bedeutsamen Vorhaben unter
  hoher Dynamik, unter hohem Tempo verhandelt werden und zustande kommen. Deswegen
  überlasse ich jetzt dem Prozess erst einmal den Raum. Die Kabinettstagesordnung
  wird sich rechtzeitig zu Beginn der Woche verfestigt haben. Sie wissen, dass Kabinettsbeschlüsse
  sehr kurzfristig geändert werden können oder noch hereinkommen können. Die Planung
  zumindest ist, dass die Themen so eingebracht werden, wie Sie es vorzeichnen. Für
  alle drei Themen, die ich genannt hatte, also Gesundheitsreform, Eckpunkte zum Haushalt
  und zur Einkommensteuerreform? Nein, für Gesundheitsreform und für Haushalt. Das
  ist die Planung. Wie gesagt, die Planung ist dynamisch. Deswegen möchte ich es hier
  nicht abschließend festlegen. Eine kurze Nachfrage zur Gesundheitsreform: Was wird
  denn dort verabschiedet? Die SPD hat ja schon Änderungsbedarf angemeldet. Soll das
  Kabinett jetzt erst den Entwurf von Gesundheitsministerin Warken verabschieden und
  die Änderungen kommen danach? Oder versucht man jetzt schon, die SPD-Änderungswünsche
  mit einzubauen? Sie wissen, dass der Gesetzentwurf momentan in der Anhörungsphase
  ist. Vielleicht kann das Gesundheitsministerium hier noch Details geben. Der Gesetzentwurf
  wird sich im Lichte dieser Anhörungen entwickeln und dann in dieser finalen Form
  eingebracht werden. Dem habe ich nichts hinzuzufügen. Das Ganze ist in der Abstimmung,
  die Gespräche laufen. Ich habe noch eine Frage zum Kabinett, zu den Bundeswehreinsätzen
  . Herr Hinterseher oder Herr Müller, können Sie uns die Exit-Szenarien von KFOR
  und EUFOR nennen? Zu jedem guten Militäreinsatz gehört ein Exit-Szenario. Eine dauerhafte
  Normalisierung ‑ dabei geht es jetzt um KFOR ‑ zwischen Kosovo und Serbien über
  die vollständige Umsetzung des Ohrid-Abkommens sowie andere Dialogverpflichtungen
  hinaus ist für uns zentral, auch für den Weg von Serbien und Kosovo in die EU. Mittelfristig
  ist auch eine verstärkte Verantwortungsübernahme durch nationale kosovarische Einsatzkräfte
  der Kosovo Security Force erforderlich, um für die Schaffung eines sicheren Umfelds
  in Kosovo zu sorgen. Dazu bedarf es fortwährender internationaler Beratung und auch
  internationaler Unterstützung, sowohl bilateral als auch durch das NATO Advisory
  und Liaison Team, das unter deutscher Leitung im Rang eines Brigadegenerals ‑ dazu
  können Sie vielleicht noch ausführen ‑ geführt wird. Mit dem fortgesetzten Engagement
  im Rahmen von KFOR übernimmt Deutschland Verantwortung für Frieden und Sicherheit
  in der Region. Auf dem Weg hin zu einer umfassenden politischen Lösung im Kosovo-Serbien-Dialog,
  der der Bundesregierung ja ein besonders wichtiges Anliegen ist, wird KFOR derzeit
  weiter als Sicherheitsgarant gebraucht. Das wäre die Antwort auf die Frage nach
  dem Exit-Szenario für KFOR. Bei EUFOR haben wir natürlich einen etwas anderen Fall.
  Aber die Operation kann beendet werden, sofern die EU in ihrer Bewertung zu dem
  Schluss gelangt ‑ da gilt natürlich die Berücksichtigung der Einschätzungen und
  Bedarfe von Bosnien und Herzegowina ‑, dass die Fortschritte auf dem Weg zu einer
  dauerhaften Stabilität im Land selbsttragend sind. Das heißt konkret, dass die Stabilisierungsaufgaben
  nach dem Dayton-Abkommen erfüllt werden und dass demokratisch kontrollierte Sicherheitskräfte
  von Bosnien und Herzegowina dauerhafte Stabilität selbst garantieren können. Das
  ist aktuell nicht vollumfänglich gewährleistet. Insofern wird die Operation aktuell
  weiter benötigt. Ich kann vielleicht nur ergänzen, dass natürlich die Operationen,
  die Einsätze der Bundeswehr, auf Mandaten des Deutschen Bundestages erfolgen. Sowohl
  das internationale Mandat als auch das Bundestagsmandat unterliegen einer regelmäßigen
  Überprüfung. Die Ziele der jeweiligen Operations- und Einsatzformen sind immer auch
  im Bundestagsmandat niedergeschrieben. Sie werden regelmäßig im Rahmen des parlamentarischen
  Verfahrens besprochen, abgestimmt und dann gebilligt. Es geht um ein Eckpunktepapier
  , das ARD, ZDF und mehrere große Verlage gestern veröffentlicht haben. Da geht es
