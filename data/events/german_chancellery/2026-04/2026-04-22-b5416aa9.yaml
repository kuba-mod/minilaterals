  Gesetze national zu erlassen, sich aber auch im europäischen Gesetzgebungsverfahren
  einzubringen, um Ausbeutung von Medieninhalten durch KI zu verhindern. Herr Kornelius,
  hat die Bundesregierung das zur Kenntnis genommen, und teilen Sie die Sorge, die
  in dem Eckpunktepapier zum Ausdruck kommt? Die Bundesregierung wird das sicher in
  dem Fachbereich zur Kenntnis genommen haben; das ist wohl so. Wir kennen die Probleme,
