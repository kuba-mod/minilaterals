  eine Aufgabe der Kommission, sie zu evaluieren. Die Frage ist, wie sich die Bundesregierung
  dazu verhält. Sieht sie dort aktuell einen Überarbeitungsbedarf, also im Sinne einer
  Nachschärfung? Dazu habe ich Ihnen derzeit nichts mitzuteilen. Dann würde ich mich
  über eine Nachlieferung freuen, falls sich dazu Erkenntnisse einstellen sollten.
  Herr Kornelius, inwiefern sind heute oder morgen Treffen von Regierungsmitgliedern
  mit dem Schahsohn geplant? Es sind keine Treffen von Regierungsvertretern geplant.
  Eine Frage an den Regierungssprecher und ans Auswärtige Amt: Welche Bedeutung hat
  denn Herr Pahlavi für die Bundesregierung insgesamt und für das Auswärtige Amt?
  Er ist ja nicht nur ein Privatmann. Doch, er ist ein Privatmann, der natürlich für
  eine Bewegung steht oder von einer Bewegung getragen wird. Die Bundesregierung sieht
  keinen Anlass, mit ihm das Gespräch zu suchen. Die Ansprechpartner für Iran sind
  momentan das Regime in Iran. Wir erwarten, dass eine unserer Grundforderungen gehört
  wird, nämlich, dass das iranische Volk die freie Entscheidung hat, über seine Führung
  zu bestimmen. Das ist der politische Zielpunkt der Bundesregierung. Ich kann dem
  wenig hinzufügen. Wir haben immer gesagt ‑ das hat der Regierungssprecher gerade
  ausgeführt ‑, dass es an der iranischen Bevölkerung liegen soll und muss, selbst
  über die Zukunft ihrer eigenen Regierung zu entscheiden. Ich glaube, da haben wir
  von hier keine Ratschläge zu erteilen. Darüber hinaus haben wir diplomatische Beziehungen
  zu Iran, wie Sie wissen, und die pflegen wir im Rahmen des aktuell noch Möglichen.
  Aber es ist ja so, dass gerade das Auswärtige Amt immer wieder Vertreterinnen und
  Vertreter von zivilgesellschaftlichen Gruppen, Exil, Opposition usw. einlädt und
  auch das Gespräch sucht. Warum hat sich der Bundesaußenminister oder Ihr Haus jetzt
  entschieden, das Gespräch mit Herrn Pahlavi nicht zu suchen? Na ja, wir informieren
  uns fortlaufend über die Lage in und um Iran. Das Auswärtige Amt steht im ständigen
  Austausch mit der iranischen Zivilgesellschaft, mit Aktivistinnen und Aktivisten,
  mit Menschenrechtsverteidigerinnen und Menschenrechtsverteidigern, mit Thinktanks,
  mit Wissenschaftlern, Wissenschaftlerinnen, Künstlerinnen, Kunstschaffenden. Wir
  haben also einen sehr regen Austausch und Kontakt mit der iranischen Seite, mit
  Exil-Iranerinnen und Iranern. Darüber hinaus habe ich hier heute nichts darzubieten.
  Herr Kornelius, Sie und auch Herr Hinterseher sagten, die Bundesregierung habe das
  Gespräch nicht gesucht. Gab es denn Versuche aus dem Lager Pahlavi ‑ so sage ich
  es einmal ‑, mit relevanten Regierungsvertretern und -vertreterinnen ins Gespräch
  zu kommen, die Sie dann abgelehnt haben? Herr Hinterseher, sind bei Ihnen Versuche
  angekommen? Wir haben Kenntnis von dem Aufenthalt. Aber ich habe Ihnen ja, auch
  schon am Montag, gesagt, dass ein Austausch mit Vertretern des Auswärtigen Amts,
  übrigens der ganzen Bundesregierung, nicht geplant ist. Ja, das habe ich gehört.
  Die Frage ist aber gewesen: Gab es Versuche von Herrn Pahlavi oder seines Umfeldes,
  mit Regierungsinstitutionen ins Gespräch zu kommen? Ich verstehe das Erkenntnisinteresse,
  aber wir bieten hier nicht die ganze Bandbreite unserer Kontakte dar, die teilweise
  vertraulich geschehen. Darüber hinaus habe ich Ihnen heute nichts mitzuteilen. Herr
  Kornelius, sind denn aus Sicht des Bundeskanzlers die Tage des Regimes weiterhin
  gezählt? Sie sehen ja die Situation im Iran. Die Bundesregierung hat ihre Position
  stets klar gemacht. Die Bundesregierung dringt darauf, dass es jetzt zu einer friedlichen
  Beilegung des Krieges, zu einem Waffenstillstand, kommt und sich dann das iranische
  Volk in freier Selbstbestimmung eine neue Führung geben kann. Die Hoffnung darauf
  lässt nicht nach. Die Forderung besteht weiterhin, dass das nukleare Anreicherungsprogramm,
  das Raketenprogramm Irans und die Bedrohung der Nachbarschaft eingestellt werden.
  Wir haben ein breites außenpolitisches Interesse an der Stabilität in der Region,
  die sich weit über Iran hinaus erstreckt. Insofern arbeitet die Bundesregierung
  auf dieses Ziel hin. Ich beziehe mich jetzt natürlich auf die Aussagen des Kanzlers
  in den ersten drei Monaten des Jahres und auch nach Ausbruch des amerikanisch-israelischen
  Angriffskriegs. Da hat er gesagt: Die Tage des Regimes sind gezählt, das Mullahregime
  geht jetzt bald zu Ende. Die Realität sieht mittlerweile anders aus. Jetzt will
  der Bundeskanzler wieder mit dem Regime, auch direkt, verhandeln. Darum frage ich
  mich, ob für ihn dieses Regime immer noch kurz vorm Ende ist. Dementsprechend könnte
  man ja einmal mit dem Schahsohn reden. In der Äußerung des Bundeskanzlers steckt
  die Botschaft, dass dieses Regime keine Legitimation hat, und bei dieser Aussage
  bleibt der Bundeskanzler. Sie verstehen, glaube ich, dass die internationale Politik
  häufig von solchen Situationen geprägt ist, dass man auch mit einem System, dem
  man keine Legitimation zubilligt, den Kontakt suchen muss, um einer internationalen
  Situation, einer Spannung, einer Anspannung, einem Krieg einen politischen Prozess
  entgegenzusetzen. Die Bundesregierung hat gesagt, Russland lasse kein kasachisches
  Öl mehr nach Schwedt durch. Herr Kornelius und Herr Wenzel, was sind die Folgen
  davon? Könnte es irgendeine Form von Kompensation für dieses kasachische Öl geben?
  Denn daran hängt ja auch die Treibstoffversorgung von Teilen Polens und Ostdeutschlands.
  Da haben Sie recht. Ich kann Ihnen sagen, dass die Treibstoffversorgung sichergestellt
  ist, dass der Wegfall der Leistung aus der Pipeline, die Sie genannt haben, den
  Raffineriebetrieb in Schwedt nicht signifikant einschränken wird. Wir arbeiten an
  Alternativmöglichkeiten, gerade auch zur Versorgung mit Kerosin. Insofern ändert
  sich an der prinzipiellen Einschätzung der Versorgungslage durch die Bundesregierung
  momentan nichts. Ist das eine Momentaufnahme? Fürchten Sie, dass vielleicht schon
  in ein oder zwei Wochen ein Mangel entstehen könnte, oder für wie lange gilt das?
  Wie Sie wissen, ist alles in unserem Leben eine Momentaufnahme, vor allen in diesen
  Zeiten. Will das Wirtschaftsministerium ergänzen? Herr Wentzel, wenn ich es richtig
  verstanden habe, dann ging es bei dem kasachischen Öl um Pipelineöl, also nicht
  um auf separatem Wege noch zu importierendes Öl. Gibt es überhaupt Pipelinealternativen,
  die Sie momentan nutzen können, oder müssen Sie auf dem Seewege Öl herantransportieren,
  was möglicherweise eine gewisse Versorgungsunterbrechung, wenn ich so sagen darf,
  mit sich brächte? Wir importieren Rohöl aus Norwegen, den USA und bisher über die
  genannte Druschbapipeline. Ob es weitere Pipelines neben der Druschbapipeline gibt,
  da bin ich, ehrlich gesagt, gerade überfragt. Die Antwort muss ich nachreichen.
  Nun ist das Ölpipelinenetz in Deutschland auch nicht in alle Richtungen nutzbar.
  Ich möchte daher im Nachgang um eine Darlegung bitten, inwieweit überhaupt Pipelinemöglichkeiten
  beispielsweise für das norwegische Öl nach Schwedt bestehen, falls Sie es nicht
  jetzt schon aus dem Effeff beantworten können. Das kann ich in der Tat nicht aus
  dem Effeff beantworten. Aber ich unterstreiche noch einmal, was der Regierungssprecher
  gerade gesagt hat. Die Versorgungssicherheit ist gewährleistet. Die Bundesnetzagentur
  als Treuhänderin der Rosneft Deutschland wird in allen weiteren Entscheidungen die
  Sicherstellung der Versorgungssicherheit weiterhin berücksichtigen. Wie Sie wissen,
  gibt es eine Pipeline von Rostock nach Schwedt. Das heißt, auch über die Seeversorgung
  über Rostock lässt sich Schwedt mit Rohöl versorgen. Teils über See, teils per Pipeline.
  Nach Schwedt kann kein Schiff. Technisch gesehen, nur sehr leichte Schiffe. Aber
  das ist das, was ich eben meinte: entweder Pipeline oder Schiffsversorgung. Rostock,
  das ist offenkundig keine Pipeline-, sondern ‑ Die Rede ist oft von Kerosin und
  der Kerosinversorgung . Herr Müller, wie ist das für die Luftwaffe ? Kann sie sich
  autark mit Kerosin versorgen? Werden die Bedarfe der Luftwaffe bevorzugt behandelt?
  Es ist ja immer die Rede von dem NATO-Pipelinenetz. Aber das Flugzeugkerosin muss
  ja irgendwie eingespeist werden. Wir haben das Thema hier schon am Montag behandelt,
  und ich habe dazu ausgeführt. Die Versorgung der Bundeswehr erfolgt in der Regel
  über das NATO-Pipelinesystem oder über ganz normalen Einkauf über „contractors“,
  die vor Ort in die Tanklager kommen. Wir haben erhebliche Tank- und Reservemöglichkeiten
  an den jeweiligen Stützpunkten und zentral, sodass die Versorgung der Streitkräfte
  für Übungsbetrieb, Grundbetrieb und Einsatzbetrieb sichergestellt ist. Da wir jetzt
  beim Thema der Benzinpreise sind, habe ich eine Frage an das BMWE. Der ADAC hat
  eine Analyse veröffentlicht, wonach das Österreichmodell mit der einmaligen Erhöhungsmöglichkeit
  um 12 Uhr die Spritpreise verteuert hat. Teilt das Ministerium diese Einschätzung?
  Sie wissen, dass wir Analysen, die wir nicht selbst in Auftrag gegeben haben, zur
  Kenntnis nehmen und nicht kommentieren. Das Gesetz sieht eine Evaluierung der neuen
  Regelung vor, die im Kraftstoffmaßnahmenpaket eingeführt wurde. Mir ist noch keine
  Evaluierung des BMWE bekannt. Gibt es schon Überlegungen für Nachbesserungen? Die
  gesetzliche Evaluierung ist binnen eines Jahres vorgesehen. Das ist natürlich die
  langfristige, fundierte Evaluierung. Wir beobachten aber die Lage auch weiterhin
  aktiv. Ich habe eine Frage zum Thema der Sicherheit von Raffinerien . Ich weiß nicht
  genau, an wen sie geht. Weltweit haben jetzt, glaube ich, schon über 40 Raffinerien
  gebrannt oder brennen noch. Es wird Sabotage vermutet. Wie werden die deutschen
  Raffinerien gesichert? Sind sie überhaupt gesichert? Wer kann mir das beantworten?
  Die Federführung bei diesem Thema würde ich beim BMI vermuten, das für die kritische
  Infrastruktur zuständig ist. An der Stelle kann ich auf die Frage von dem Kollegen
  die Information nachreichen, dass auch die Lieferungen aus Norwegen über Pipeline
  erfolgen, nicht über Schiffe. Sie haben es in Ihrer Frage schon gesagt. Solche kritische
  Infrastruktur muss natürlich gesichert werden. Wie es sich ganz konkret in Bezug
  auf Raffinerien verhält, müsste ich Ihnen nachliefern. Das wäre nett. Haben Sie
  vielleicht irgendwelche Bedrohungserkenntnisse? Die Sicherheitsbehörden sammeln
  selbstverständlich Erkenntnisse bzw. schauen sich die Sicherheitssituation an, gerade
  auch in Bezug auf die kritische Infrastruktur. Grundsätzlich beobachten die Sicherheitsbehörden
  die Sicherheitslage in Deutschland, richtig. Meine Frage geht wahrscheinlich an
  das Finanzministerium, eventuell auch an das Wirtschaftsministerium. Es gibt Berichte
  über mögliche Absichten der Deutschen Telekom , die US-Konzerntochter T-Mobile komplett
  zu übernehmen . Können Sie das bestätigen? Können Sie dazu etwas sagen? Denn der
  Bund ist ja ein großer Anteilseigner der Telekom. Nein. Es tut mir leid. Das sind
  Spekulationen, die wir ja grundsätzlich nicht kommentieren. Sie wissen, dass wir
  uns, wenn Spekulationen oder angebliche Informationen eine Relevanz für die Kapitalmärkte
  haben, grundsätzlich nicht äußern können. In diesem Fall sind es, wie gesagt, einfach
  Spekulationen. Ähnlich wie bei der Commerzbank ist das Problem dabei auch ein wenig,
  dass in dieser größeren Unternehmung der deutsche Unternehmensanteil doch sehr stark
  schrumpfen würde. Ist das generell ‑ ich frage nicht explizit auf die Telekom gerichtet ‑
  eine Entwicklung, die die Bundesregierung beunruhigt, oder sieht sie ihr, im Grunde
  genommen, gelassen entgegen? Ich weiß nicht, ob das Wirtschaftsministerium etwas
  dazu sagen will. Für das Finanzministerium kann ich sagen: Sie fragen ganz klar
  im Kontext der Nachrichten, die es jetzt zur Telekom gibt. Deswegen bleibt es dabei,
  dass wir uns zu Spekulationen nicht äußern. Das Thema der Commerzbank ist ein anderes
  Thema, zu dem sich die Bundesregierung ja immer wieder geäußert hat. Eine grundsätzliche
  Linie der Bundesregierung oder des Bundeswirtschaftsministeriums zu internationalen
  Unternehmen und dazu, wie stark der Standort in Deutschland innerhalb eines solchen
  Unternehmen sein muss, ist mir nicht bekannt. Herr Kall, plant die Bundesregierung,
  ihre Anteile an der Deutschen Telekom zu veräußern? Ich kenne keine solche Pläne.
  Es bleibt dabei, dass wir uns zu den aktuellen Spekulationen nicht äußern. Ich weiß,
  dass das hypothetisch ist, aber frage es trotzdem: Es gibt Überlegungen, den Standort
  der Deutschen Telekom dann ins Ausland zu verlagern. Wäre das aus Sicht der Bundesregierung
  überhaupt akzeptabel? Das ist eine hypothetische Frage zu Spekulationen. Dazu können
  wir uns schon gar nicht verhalten. Meine Frage geht an das Bundeswirtschaftsministerium
  und das Innenministerium. Die Telekom ist ja kein Telekommunikationsanbieter beliebiger
  Art, sondern sie ist ein ganz besonderes Telekommunikationsunternehmen. Diese kritische
  Infrastruktur ist auch für die Betriebsfähigkeit der Bundesrepublik äußerst relevant.
  Gibt es in irgendeiner Form eine Art von Einstufung, dass sich die Telekom als sozusagen
  staatswichtiges Unternehmen nicht mehrheitlich in ausländischer Hand befinden darf?
  Das ist mir nicht bekannt. Ich mache mich gern schlau dazu, falls es dazu etwas
  gibt. Ansonsten gilt wieder: BMI, kritische Infrastruktur. Sie haben nach den Besitzverhältnissen
  der Telekom gefragt. Dazu kann ich ‑ ‑ ‑ Das ist eher eine Frage der Auswirkung.
  Wäre es nach deutschem Recht bzw. nach Einschätzung der Bundesregierung überhaupt
  zulässig, dass sich die Mehrheit der Deutschen Telekom nicht in deutscher Hand befindet?
  Hätte die Bundesregierung eine Untersagungsmöglichkeit? Vielleicht kann ich grundsätzlich
  noch einmal auf die Möglichkeit von Investitionsprüfungen hinweisen. Sie nicken;
  vielleicht hat Ihre Frage ohnehin darauf abgezielt. Ob das in diesem Fall eine Rolle
  spielt, darüber vermag ich nicht zu spekulieren, aber die Investitionsprüfungen
  geben der Bundesregierung die Möglichkeit, Investitionen in Unternehmen in Deutschland
  daraufhin zu überprüfen, ob sie die öffentliche Sicherheit und Ordnung beeinträchtigen,
  und dann gegebenenfalls Maßnahmen zu ergreifen oder Anordnungen zu erlassen. Herr
  Kornelius, FCAS ist ein Dauerthema. Jetzt gibt es die nächste Meldung. Danach habe
  der französische Verteidigungsminister gesagt, dass die Mediatoren noch zusätzliche
  zehn Tage forderten, um vielleicht doch noch eine Lösung zwischen den deutschen
  und den französischen beteiligten Industrieunternehmen hinzubekommen. Ist die Bundesregierung
  mit dieser Verlängerung der Frist einverstanden? Ist das abgesprochen? Wie Sie wissen,
  haben Bundeskanzler Merz und Präsident Macron am 18. März eine Mediation zwischen
  den Industrien vereinbart. Wir können dazu mitteilen, dass Deutschland und Frankreich
  in den nächsten Tagen darüber beraten werden. Einen konkreter Termin für eine Entscheidung
  des Bundeskanzlers nennen wir an dieser Stelle nicht. Ich muss trotzdem nachfragen,
  weil Herr Macron und der Bundeskanzler morgen und übermorgen aufeinandertreffen.
  Ist ausgeschlossen, dass sie auf Zypern über dieses Thema sprechen? Ich schließe
  nie etwas aus. Die beiden sehen sich häufig. Auf Zypern wäre die nächste Gelegenheit.
  Herr Hinterseher, es geht um die Abstimmung über die Aussetzung des EU-Assoziierungsabkommens
  mit Israel , die es gestern unter den Außenministern gab. Der Koalitionspartner
  SPD sieht es kritisch, dass Herr Wadephul dieser Aussetzung nicht zugestimmt hat.
  Ich hätte gern eine Erklärung dafür, warum die Bundesregierung diesen von Spanien
  und einigen anderen Ländern gewünschten Schritt nicht mitgegangen ist. Ich weiß
  nicht, ob Sie die gestrigen Äußerungen des Außenministers beim Außenrat gesehen
  haben. Er hat dort ausführlich begründet, wie wir diese Sache sehen. Sie haben möglicherweise
  auch gesehen, welche weiteren Forderungen mit Blick auf Israel er dort formuliert
  hat. Uns geht es darum, im Dialog mit der israelischen Regierung unsere Position
  klar und deutlich zu machen und natürlich auch kritische Fragen in aller Deutlichkeit
  ansprechen zu können. Wir sind davon überzeugt, dass wir das am besten in einem
  kritischen Dialog tun können. Das tun wir, wann immer es notwendig ist, etwa im
  Zusammenhang mit der Wiedereinsetzung der Todesstrafe oder auch mit Blick auf die
  grassierende Siedlergewalt im Westjordanland. Gleichzeitig wollen wir nicht, dass
  diese Maßnahmen die israelische Zivilgesellschaft oder andere Bereiche treffen,
  die vielleicht ‑ ich will es einmal so formulieren ‑ sachfremd sind. Damit könnte
  ein konstruktiver Dialog und eine Verbesserung der Lage erschwert werden. Wir haben
  gestern noch einmal betont, dass wir dabei auf Dialog setzen. Das war die Begründung
  dafür. Wir haben das Thema auch hier schon ein paarmal behandelt. Können Sie noch
  einmal sagen, wo die Bundesregierung von der israelischen Regierung wirklich irgendein
  Zugeständnis erreicht hat? Sie haben die anhaltende Gewalt der Siedler auf der Westbank
  erwähnt. Da scheint es doch wenig Entgegenkommen der israelischen Seite zu geben.
  Genau dieses Thema fehlt vermutlich in keinem der Gespräche der deutschen Seite
  mit der israelischen Seite. Dieses Thema sprechen wir natürlich fortlaufend kritisch
  an, weil die Siedlergewalt und vor allem auch die Zunahme der Siedlergewalt seit
  einigen Jahren aus unserer Sicht extrem besorgniserregend ist. Wir versuchen, in
  einem Dialog, wovon wir immer noch überzeugt sind, eine Verbesserung der Lage zu
  bewirken. Diesen Ansatz verfolgen wir an der Stelle weiter. Nimmt die Bundesregierung
  bzw. das Auswärtige Amt in Kauf, dass man in Europa und auf globaler Ebene das israelische
  Vorgehen in Libanon, auf der Westbank, in Gaza deckt, also israelische Kriegsverbrechen,
  die hier immer wieder Thema waren, andauernde Völkerrechtsverstöße, die Sie selbst
  hier einbringen, potenziellen Genozid in Gaza? Die Bundesregierung steht dafür,
  diese Verbrechen in Europa zu decken. Kann die Bundesregierung damit leben? Ich
  würde der Prämisse, die Sie in Ihrer Fragestellung mitschwingen lassen, widersprechen.
  Wir sprechen die Dinge sehr klar an, bei denen wir eine klare Analyse haben, zum
  Beispiel bei Völkerrechtsbrüchen hinsichtlich des Siedlungsbaus im Westjordanland,
  die die Bundesregierung auf allen Ebenen sehr klar anspricht. Darüber hinaus gibt
  es übrigens auch ‑ das vielleicht als Ergänzung zu Ihrer Frage vorhin‑ bereits Sanktionen
  der Europäischen Union gegen radikale Siedler. Dieser Diskussion verweigern wir
  uns auf europäischer Ebene mitnichten, sondern wir führen sie konstruktiv. Aber
  es geht ja nicht nur um Siedler und die Westbank, sondern den anderen europäischen
  Staaten geht es auch um den potenziellen Völkermord in Gaza. Sie haben in Ihrer
  vorherigen Frage so viele Teilaspekte in eine Frage gesteckt, dass es mir schwerfällt ‑ ‑ ‑
  Ich sage, es fällt mir schwer, Ihnen auf Basis dieser Vermengung und Verquickung
  verschiedener Sachverhalte eine Antwort dazu geben zu können. Deswegen habe ich
  einen Teilaspekt herausgegriffen. Aber die Sachverhalte werden von den anderen europäischen
  Staaten zusammen ‑ ‑ ‑ Lassen Sie Herrn Hinterseher doch bitte ausreden. Wie gesagt,
  ich glaube, ich kann hier jetzt nicht in eine Diskussion mit Ihnen darüber einsteigen.
  Ich habe versucht, die Frage zu beantworten, soweit ich sie beantworten kann. Natürlich
  betrachten wir all diese Teilaspekte sowie die sich daraus in den jeweiligen Kontexten ‑
  etwa in Gaza oder im Libanon ‑ ergebenden Sachverhalte. Dabei steht für uns die
  Achtung des Völkerrechts immer an oberster Stelle; das fließt dort also mit ein.
  Gleichwohl müssen wir die einzelnen Aspekte separat betrachten. Das tun wir auch,
  glaube ich, indem wir hier über die letzten Tage und Wochen Ihre Fragen dazu sehr
  ausführlich beantwortet haben. An Herrn Kornelius und/oder Herrn Hinterseher: Die
  zyprische EU-Ratspräsidentschaft hat gerade bekannt gegeben, dass Ungarn seinen
  langanhaltenden Widerstand gegen die Auszahlung des 90-Milliarden-Euro-Kredits an
  die Ukraine aufgegeben hat. Das Hilfspaket kann jetzt also ausgezahlt werden. Wie
  bewertet die Bundesregierung diese Freigabe und das Ende dieser Blockade durch die
  scheidende ungarische Regierung? Wir begrüßen diese Entscheidung. Sie wissen, dass
  für die Auszahlung technisch noch eine einstimmige Änderung der Verordnung über
  den mehrjährigen Finanzrahmen durch den Rat nötig ist. Dazu hat heute der Ausschuss
  der Ständigen Vertreter das notwendige Verfahren eingeleitet. Soweit Ungarn im schriftlichen
  Verfahren nicht widerspricht, ist dann die Änderung nach Ablauf der 24-Stunden-Frist
  möglich, und dann können die 90 Milliarden Euro ausgezahlt werden. Hat dieses Hilfspaket,
  haben diese 90 Milliarden Euro in irgendeiner Weise Auswirkungen auf die Hilfslieferungen
  und Unterstützungsleistungen, die von Deutschland kommen? Die Finanzierungszusage
  der Europäischen Union hat vor allem eine politische Wirkung, weil sie zeigt, dass
  Europa die Ukraine weiterhin bedingungslos unterstützt, sodass die Ukraine die Mittel
  dafür hat, den staatlichen Betrieb weiter zu versorgen und aufrechtzuerhalten. Sie
  wissen, dass die Finanzhilfe nicht nur in militärische Mittel fließt, sondern auch
  in andere Aspekte der Aufrechterhaltung der Staatlichkeit der Ukraine. Gleichzeitig
  ist natürlich der Kern die militärische Beschaffung. Diese militärische Beschaffung
  muss finanziert werden, und über die jeweiligen einzelnen Stränge der Beschaffung
  müssen wir im Detail reden. Die Hauptbotschaft ist aber, dass die Ukraine nun für
  absehbare Zeit eine stabile Grundlage hat, auf der sie den Aggressionskrieg abwehren
  kann. Das ist auch eine klare Botschaft an Russland. Russland muss wissen, dass
  Europa nicht darin nachlässt, die Ukraine zu unterstützen, und dass dieser Krieg
  aussichtslos ist und nun mit Friedensverhandlungen beendet werden sollte. An das
  Auswärtige Amt: Es gibt einen diplomatischen Streit zwischen Taiwan und China .
  Ein taiwanisches Regierungsmitglied wollte nach Eswatini in Südafrika reisen. Der
  Vorwurf ist, China habe durch Einfluss verhindert, dass drei Länder eine Überfluggenehmigung
  erteilen. Können Sie das kommentieren? Ich kenne die Medienberichte zu dieser Frage.
  Ich kann Ihnen darüber hinaus heute keine Informationen darbieten. Ansonsten möchten
  wir natürlich auch nicht die Entscheidung von Drittstaaten bewerten, und wir haben
  auch keine Kenntnisse, was genau dazu geführt hat. In dem EU-Notfallplan für Kerosin
  , der heute vorgestellt wurde, gibt es viele Vorschläge zu freiwilligen Maßnahmen
  wie Homeoffice. Wie steht die Bundesregierung dazu grundsätzlich? Der Verkehrskommissar
  hat gestern den Vorschlag in den Raum gestellt, dass es bei einem Kerosinmangel
  in einigen EU-Staaten, zum Beispiel Italien, einen Solidaritätsmechanismus geben
  könnte. Wie steht die Bundesregierung dazu? Die Bundesregierung hat in den letzten
  Tagen ausführlich über die Versorgungssicherheit kommuniziert. Das Wirtschaftsministerium
  kann dazu als federführendes Ressort gleich vielleicht auch noch etwas sagen. Sie
  wissen, dass Versorgungssicherheit für uns alle sehr wichtig ist. Vor allem möchten
  wir, dass hier keine Sorge, keine Angst vor Versorgungsengpässen entsteht. Wir können
  deswegen bestätigen, dass wir momentan keine Versorgungsnotlage bei Treibstoffen
  haben, auch bei Kerosin nicht. Wir haben unsere Öl-, Kraftstoff- und Treibstoffversorgung
  diversifiziert. Wir haben zuverlässige Lieferwege, wir haben zuverlässige Raffinerieinfrastruktur.
  Wir haben auch eine sehr gut ausgebaute Reservestruktur. Das heißt, wir halten die
  Energieträger vor und können die jederzeit einsetzen, um auf eine angespannte Marktlage
  zu reagieren. Mit den europäischen Partnern sind wir im Austausch. Wir nutzen die
  Instrumente, die Sie nennen, um gegenseitig Stabilität zu schaffen. Das geschieht
  natürlich alles marktabhängig; denn Sie wissen auch, dass wir nicht losgelöst von
  der Weltmarktsituation agieren können. Wir sehen natürlich, dass der Kerosinpreis
  hoch ist. Wir sehen auch, dass wir eventuell im Flugverkehr beeinträchtigt sind,
  weil andere Weltregionen die Flugintensität aus Kerosinmangel nicht aufrechterhalten
  können. ‑ Was war noch der letzte Teil? Der Solidaritätsmechanismus, also der Vorschlag,
  dass Deutschland zum Beispiel an Italien und andere Länder Kerosin abgeben könnte,
  wenn wir genug hätten, diese Länder aber vielleicht nicht mehr. Das müsste das BMWE
  beantworten, falls es da schon Erkenntnisse gibt. Ich unterstreiche gerne erst einmal
  die Äußerungen des Regierungssprechers. Ich kann auch sagen, dass wir begrüßen,
  dass die EU-Kommission im Rahmen dieses Pakets jetzt weitere Transparenz- und Datenerhebungsmechanismen
  insbesondere für den Kerosinmarkt vorgeschlagen hat. Zu dem, was Sie Solidaritätsmechanismus
  nennen, laufen jetzt die Gespräche. Da gibt es noch keine Position, die ich hier
  mitteilen kann. Das ist ja auch eine Frage der Vorbildfunktion: Gibt es seitens
  der Bundesregierung intern Vorgaben, weniger zu fliegen respektive das eigene Flugverhalten
  einzuschränken und stattdessen die Bahn zu nehmen? Ich glaube, die Bundesregierung
  ist sich prinzipiell der Situation bewusst. Sie sehen schon seit vielen Jahren,
  dass die Behörden gerade mit ihren Reisetätigkeiten sehr verantwortungsvoll umgehen.
  Es gibt in den Häusern vor allem für Inlandsreisen unterschiedliche Vorgaben, die
  aber auf dasselbe Ziel hinauslaufen, nämlich das energieschonendste Beförderungsmittel
  zu wählen. Da gibt es aufgrund der aktuellen Entwicklung jetzt aber keine verschärften
  Incentivierungen, auf alternative Verkehrsmittel auszuweichen? Ich glaube, dass
  die Grundtendenz bereits in diese Richtung geht. Wäre es aus Sicht des Bundeskanzlers
  hilfreich, wenn die Deutschen ihre Urlaubspläne überdenken und gegebenenfalls auf
  Urlaubsflüge verzichten? Der Bundeskanzler möchte sich nicht in die Urlaubsplanung
  der Bürgerinnen und Bürger einmischen. Aber er mischt sich ja in die Versorgungslage
  ein, und das ist als Regierungschef ja auch richtig. Die Versorgungslage betrifft
  eben auch Urlaubsflüge. Es gibt ein Recht auf Urlaub, aber es gibt ja kein Recht
  auf einen Urlaubsflug. Das ist Luxus und da könnte man sparen. Der Bundeskanzler
  ist davon überzeugt, dass die Bürgerinnen und Bürger mündig genug sind, um ein eigenes
  gutes Urteil zu fällen. Wir geben die Grundlagen dafür, indem wir für Energiesicherheit
  sorgen und indem wir jeder Panik vorbeugen möchten.'
