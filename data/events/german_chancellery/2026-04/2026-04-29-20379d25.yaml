title: Implementation of the Common European Asylum System in Germany Common European
  solutions in migration policy
text: 'The implementation of the CEAS--Common European Asylum System limits irregular
  migration and enables faster asylum procedures. By reforming the Common European
  Asylum System (CEAS), Europe is creating standardised rules for greater order, security
  and fairness. For Germany, this means fewer multiple applications, faster procedures
  and a significant reduction in the workload for municipalities and authorities.
  The reform thus strengthens both the trust of citizens in the management of migration
  and cohesion within Europe. The Common European Asylum System (CEAS--Common European
  Asylum System) is the European Union’s response to the challenges of migration policy.
  From June 2026, the same rules on how asylum procedures should be carried out will
  apply to all EU states. This is to ensure that decisions are made according to the
  same standards everywhere – regardless of which country the application has been
  submitted in. The Federal Cabinet also agreed on changes that go beyond the implementation
  of the CEAS--Common European Asylum System reform. These include in particular:
  Although Germany has no external EU borders apart from with Switzerland, it is often
  a destination country for so-called secondary migration – i.e. uncontrolled onward
  movement to other EU Member States. With the new system, every application will
  be registered throughout the EU under the Eurodac Regulation . This creates clarity
  as to which state is responsible and prevents multiple applications. The expansion
  of the database will create a reliable basis for gaining a better understanding
  of migration movements and reducing irregular secondary migration. The new system
  will bring order, security and legal certainty: Yes, the following changes, among
  others, were passed in the German Bundestag: The legal regulations will come into
  force in several stages.'
