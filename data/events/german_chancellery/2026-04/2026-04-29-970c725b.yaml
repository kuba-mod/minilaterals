title: 'Im Kabinett beschlossen Gewässerschutz stärken: Düngerecht wird überarbeitet'
text: 'Das neue Düngegesetz schützt das Grundwasser vor Belastungen aus der Landwirtschaft.
  Die Bundesregierung will das Düngerecht neu ausrichten und das Grundwasser, Flüsse
  und Meere vor schädlichen Nährstoffeinträgen aus der Landwirtschaft schützen. Die
  Nitratbelastung soll dabei wirksam verringert werden. Gleichzeitig bleibt Düngen
  weiterhin möglich. Langfristig will die Bundesregierung im Einklang mit dem maßgeblichen
  EU -Recht ein System der Düngung schaffen, das besonders gewässerschonende Betriebe
  entlastet. Wer dagegen das Grundwasser belastet, wird stärker in die Pflicht genommen.
  Dafür will die Bundesregierung ein bundesweites Monitoring einführen. Die Grundlage
  sind die Bewirtschaftungs- und Düngedaten der Betriebe. Damit soll flächendeckend
  überprüft werden, wie sich die Düngung auf die Gewässer auswirkt. Für das Monitoring
  soll so weit wie möglich auf Daten zurückgegriffen werden, die bereits von der Verwaltung
  erhoben werden oder bereits von den Betrieben zu dokumentieren sind. Ziel ist es,
  zusätzlichen Aufwand möglichst zu vermeiden. Da mehrere Behörden involviert sein
  werden, sieht der Gesetzentwurf vor, unnötige Bürokratie zu verhindern: Entgegen
  der Regel sollen die eingebundenen Behörden die betreffenden Daten austauschen dürfen.
  So wird vermieden, dass Betriebe Daten doppelt melden müssen. Wie im Koalitionsvertrag
  vereinbart, hat die Bundesregierung bereits im Juli 2025 die Stoffstrombilanzierung
  aufgehoben. Entsprechend werden die bisherigen Regelungen dazu auch im neuen Düngegesetz
  gestrichen. Das soll Recht und Verwaltung erheblich vereinfachen. Mit ihrem Gesetzentwurf
  kommt die Bundesregierung ihren Zusagen gegenüber der EU -Kommission nach. Für die
  Umsetzung der EU -Nitratrichtline hat sie verbindlich zugesagt, ein erweitertes
  Monitoring einzurichten. Mit dem Gesetz werden außerdem die nationalen Rechtsgrundlagen
  zur Durchführung der EU -Düngeprodukteverordnung geschaffen. Dazu gehört das Einrichten
  und Überwachen von Konformitätsbewertungsstellen, die EU -Düngeprodukte zertifizieren.
  So sollen EU -weit einheitliche Qualitäts- und Sicherheitsstandards für das Inverkehrbringen
  von Düngeprodukten geschaffen werden. Für die Befugnisse und das Überwachen der
  Konformitätsbewertungsstellen wird die Bundesanstalt für Landwirtschaft und Ernährung
  zuständig sein.'
