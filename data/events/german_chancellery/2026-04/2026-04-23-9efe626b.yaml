title: Die Bundesregierung zur Verlängerung des Waffenstillstands zwischen den USA
  und Iran
text: Die Bundesregierung begrüßt die Verlängerung des Waffenstillstands zwischen
  den Vereinigten Staaten und Iran. Sie eröffnet eine wichtige Chance, die diplomatischen
  Verhandlungen in Islamabad fortzusetzen, um Frieden zu schließen und eine Eskalation
  des Krieges abzuwenden. Diese Gelegenheit sollte auch Teheran ergreifen. Den Iran
  fordert die Bundesregierung auf, sein militärisches Atomprogramm einzustellen und
  Israel sowie andere Nachbarstaaten nicht länger zu bedrohen. Die Straße von Hormus
  muss dauerhaft, zuverlässig und ohne Einschränkungen oder Gebühren geöffnet werden.
  Gelingt eine umfassende Übereinkunft, ist die Bundesregierung bereit, mit ihren
  Partnern schrittweise bestehende restriktive Maßnahmen zu lockern. Blockiert der
  Iran dagegen weiterhin die Straße von Hormus, steht die Bundesregierung bereit,
  zusätzliche Sanktionen zu erörtern. Sobald ein anhaltendes Ende der Kampfhandlungen
  erreicht ist, steht die Bundesregierung gemeinsam mit ihren Partnern bereit, im
  Einklang mit internationalem Recht sowie unter Einhaltung nationaler Verfahren zur
  freien Schifffahrt in der Straße von Hormus beizutragen. Die Bundesregierung wird
  weiter auf diplomatischem Weg darauf hinwirken, dass der Krieg im Süden des Libanon
  zu einem dauerhaften Ende kommt. ---- The Federal Government welcomes the extension
  of the ceasefire between the United States and Iran. This presents an important
  opportunity to resume diplomatic negotiations in Islamabad with the aim of making
  peace and averting further escalation of the war. Teheran should seize this opportunity.
  The Federal Government calls upon Iran to end its nuclear weapon program and to
  cease threatening Israel and other neighboring states. The Strait of Hormuz must
  be kept open permanently, reliably, and without any restrictions or tolls. If a
  comprehensive agreement can be reached, the Federal Government is prepared to work,
  in close coordination with partners, towards gradually easing existing restrictive
  measures. If, however, Iran continues to block the Strait of Hormuz, the Federal
  Government stands ready to consider additional sanctions. Once a lasting end to
  hostilities has been achieved, the Federal Government, together with its partners,
  stands ready to contribute to the free navigation of the Strait of Hormuz in accordance
  with international law and in compliance with national procedures. The Federal Government
  will continue to work through diplomatic channels to bring the war in southern Lebanon
  to a lasting end.
