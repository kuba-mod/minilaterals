date: '2026-04-24'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 24. April 2026
text: 'Sprecherinnen und Sprecher •    stellvertretender Regierungssprecher Hille
  •    Abboud (BMZ) •    Fichtner (BMUKN) •    Dr. Schneidewindt (BMFTR) •    Hinterseher
  (AA) •    Müller (BMVg) •    Galle (BMLEH) •    Singer (BMI) •    Greve (BMWE) •    Dr.
  Laiadhi (BMF) (Vorsitzender Feldhoff eröffnet die Pressekonferenz und begrüßt SRS
  Hille sowie die Sprecherinnen und Sprecher der Ministerien.) Vielen Dank, Herr Feldhoff. ‑
  Schön, Sie alle zu sehen, und schön, dass Sie sich kurz vor dem Wochenende noch
  einmal Zeit nehmen, mit uns hier die Bundespressekonferenz zu verleben. Ich habe
  wie üblich am Freitag die Termine des Bundeskanzlers mit dabei. Ich kann schon so
  viel sagen: Der Bundeskanzler hat in der kommenden Woche ein volles und in diesem
  Falle, finde ich, besonders abwechslungsreiches Programm. Los geht es am Montag,
  dem 27. April. Da wird der Bundeskanzler von 10 Uhr bis 11.30 Uhr im Rahmen des
  EU-Projekttages an Schulen das Carolus-Magnus-Gymnasium in Marsberg besuchen. Für
  alle, die gerne dabei sein wollen: Marsberg ist im Sauerland, im Wahlkreis vom Bundeskanzler.
  Dort wird der Kanzler mit den Schülerinnen und Schülern eine Podiumsdiskussion zu
  Europathemen führen. Zudem werden die Schülerinnen und Schüler dem Kanzler einige
  Europaprojekte ihrer Schule vorstellen. Der gesamte Termin ist presseöffentlich.
  Ganz grundsätzlich: Die Bundesregierung ruft in jedem Jahr zur Teilnahme am EU-Projekttag
  an Schulen auf. Im Mittelpunkt stehen dabei Schülerinnen und Schüler, die mit Politikerinnen
  und Politikern von Landes-, Bundes- oder Europaebene ins Gespräch kommen sollen.
  Ziel ist es, Themen aus Europa näher an Schülerinnen und Schüler zu bringen und
  zu zeigen, wie wichtig demokratisches Zusammenleben und die Europäische Union für
  uns alle ist. Am Mittwoch, dem 29. April, da leitet der Bundeskanzler wie üblich
  um 10 Uhr das Bundeskabinett . Im Anschluss an die Kabinettssitzung wird der Zentralverband
  des Bäckerhandwerks , der ZDB, dem Bundeskanzler um 11 Uhr den „Deutschen Brotkorb“
  überreichen . Anlass ist der Tag des deutschen Brotes am 5. Mai. Der Bundeskanzler
  hat immer wieder seine Verbundenheit mit dem Bäckerhandwerk deutlich gemacht. Zuletzt
  war er auch bei der Verleihung des Großen Stutenkerls im Januar in Dortmund. Mit
  dem Treffen würdigt er einmal mehr die Bedeutung der Bäckerbranche und unterstreicht
  seinen Respekt vor der Leistung der vielen kleinen und großen Bäckereibetriebe überall
  in Deutschland. Dieser Termin ist nicht presseöffentlich. Anschließend hält der
  Bundeskanzler als Schirmherr die Eröffnungsrede zur 14. Nationalen Maritimen Konferenz
  . Der Beginn der Veranstaltung ist gegen 15 Uhr in der Nordseehalle inEmden . Im
  Mittelpunkt der Konferenz stehen die Wettbewerbsfähigkeit und die herausragende
  Bedeutung der maritimen Wirtschaft für Deutschland als Industrie- und Handelsnation,
  aber auch für unsere Sicherheit. Auch Bundeswirtschaftsministerin Katherina Reiche
  wird bei der Konferenz mit dabei sein. Die Nationale Maritime Konferenz, kurz NMK,
  ist das zentrale Forum der Bundesregierung für Fragen der maritimen Wirtschaft.
  Mit rund 800 Teilnehmerinnen und Teilnehmern ist sie zugleich das bedeutendste maritime
  Branchentreffen in Deutschland. Auch diese Veranstaltung ist presseöffentlich. Im
  Anschluss an die Konferenz fährt der Bundeskanzler weiter zu einem Besuch der Firma
  Akkermann Transporte in Moormerland , der etwa gegen 16.20 Uhr beginnen soll. Akkermann
  Transporte ist ein familiengeführtes Transportunternehmen aus Ostfriesland, das
  sich seit mehr als 90 Jahren auf Logistiklösungen spezialisiert. Bei diesem Termin
  spricht der Bundeskanzler auch mit Vertretern der lokalen Industrie- und Handelskammer
  sowie der Handwerkskammer Ostfriesland und dem Bundesverband Güterverkehr, Logistik
  und Entsorgung. Der Unternehmensbesuch ist presseöffentlich und im Anschluss an
  den Besuch ist auch ein Pressestatement geplant. Am Donnerstag, dem 30. April, reist
  der Bundeskanzler zu seinem Antrittsbesuch beim Deutschen Heer nach Munster in Niedersachsen.
  Nach der Begrüßung durch den Inspekteur des Heeres, Generalleutnant Dr. Christian
  Freuding, nehmen der Bundeskanzler sowie Bundesfinanzminister Lars Klingbeil, in
  dessen Wahlkreis Munster liegt, an einer dynamischen Vorführung teil und besichtigen
  anschließend Fahrzeuge und Material des Heeres. Dabei erhalten sie einen Einblick
  in dessen aktuelle wie zukünftige Fähigkeiten und Ausrüstung. Bei dem Besuch wird
  der Bundeskanzler natürlich auch Gelegenheit zum Gespräch mit Soldatinnen und Soldaten
  haben. Gegen 11.35 Uhr ist ein Pressestatement des Bundeskanzlers geplant. Am Nachmittag
  ist der Bundeskanzler schließlich zu Gast beim Tag des Lokaljournalismus in Salzwedel
  . Dort wird er um 14 Uhr im Kulturhaus die Fragen von Bürgerinnen und Bürgern beantworten.
  Dieses Townhall-Format wird von lokalen Medienhäusern veranstaltet. Der Tag des
  Lokaljournalismus setzt bundesweit ein gemeinsames Zeichen für die Relevanz lokaler
  journalistischer Arbeit. Die Bundesregierung und der Bundeskanzler unterstützen
  diese Initiative und sind sich bewusst, dass Lokaljournalismus eine zentrale Rolle
  für die Demokratie spielt. Er stärkt die demokratische Teilhabe, indem er politische
  Entscheidungen vor Ort transparent macht, Vertrauen schafft und Menschen miteinander
  verbindet. So bildet der Lokaljournalismus auch in einer sehr schnellen digitalen
  Welt eine Säule der demokratischen Grundversorgung im Alltag. Der Bundeskanzler
  will mit seiner Teilnahme am Tag des Lokaljournalismus die Bedeutung lokaler Medien
  hervorheben. Ich denke, ich habe Ihnen nicht zu viel versprochen, als ich gesagt
  habe, dass das Programm für die kommende Woche erstens ein volles und zweitens ein
  sehr abwechslungsreiches Programm ist. Bundesentwicklungsministerin Reem Alabali
  Radovan wird am Montag zum Regionalen Weltgesundheitsgipfel nach Nairobi reisen.
  Dort wird sie politische Gespräche führen, unter anderem mit dem kenianischen Präsidenten
  William Ruto. Außerdem wird sie sich mit deutschen und kenianischen Pharmaunternehmen
  austauschen, die bei der Herstellung von Medikamenten für den afrikanischen Markt
  kooperieren. Kenia ist ein Pilotland für den neuen integrierten Wirtschaftsansatz,
  den das Entwicklungsministerium mit seiner aktuellen Reform verfolgt. Direkt im
  Anschluss reist Entwicklungsministerin Alabali Radovan nach Paris . Dort wird sie
  am Mittwoch und Donnerstag auf Einladung der französischen G7-Präsidentschaft am
  zweitägigen Treffen der G7-Entwicklungsministerinnen und -minister teilnehmen. Im
  Mittelpunkt dieser Beratungen wird die künftige Ausrichtung der Entwicklungszusammenarbeit
  stehen. Auch der Umgang mit den Folgen der aktuellen Krisen im Nahen Osten, von
  deren Auswirkungen viele Entwicklungsländer betroffen sind, wird natürlich ein Thema
  sein. Von Montag bis Mittwoch wird Bundesumweltminister Carsten Schneider Albanien
  und Montenegro besuchen. Er wird dort seine Amtskollegen sowie in Montenegro auch
  den Premierminister treffen. Er wird außerdem Naturschutzgebiete besuchen, um sich
  über Maßnahmen zum Schutz der einzigartigen Natur in der Region zu informieren.
  Die Reise steht im Kontext der Beitrittsverhandlungen beider Länder zur Europäischen
  Union, die wir sehr unterstützen. Das Umweltrecht spielt dabei eine zentrale Rolle;
  denn wenn beide Länder jetzt EU-Umweltstandards einführen, ist das eine große Chance
  für die Umwelt, für sauberes Wasser und eine intakte Natur und zugleich auch für
  die wachsende Cleantech-Wirtschaft sowie für die wirtschaftliche Zusammenarbeit
  zwischen Deutschland und diesen beiden Ländern. Weil es so viel Interesse dazu gab,
  möchte ich Ihnen ausnahmsweise außerdem eine Reise von Umweltstaatssekretär Jochen
  Flasbarth zur Santa-Marta-Konferenz in Kolumbien ankündigen, bei der es um die Abkehr
  von fossilen Energien weltweit geht. Gastgeber sind Kolumbien und die Niederlande.
  Nach deren Angaben werden dort nächste Woche Dienstag und Mittwoch mehr als 60 Staaten
  vertreten sein. Kontext sind die Weltklimakonferenzen. Sie wissen vielleicht, dass
  vor drei Jahren in Dubai erstmals eine Abkehr von fossilen Energien beschlossen
  wurde. Jetzt geht es darum, den nächsten Schritt zu gehen und konkreter zu werden.
  Die Konferenz in Santa Marta kann dazu beitragen. Deutschland wird sich mit seinen
  Erfahrungen beim Kohleausstieg, beim Ausbau der erneuerbaren Energien, bei der CO
  2 -Bepreisung und zuletzt auch mit dem Klimaschutzprogramm, das wir hier im März
  vorgestellt haben, einbringen. Die Bundesministerin für Forschung, Technologie und
  Raumfahrt wird am Montag und Dienstag auf Einladung der für Raumfahrt zuständigen
  norwegischen Ministerin nach Norwegen reisen. Themen Ihrer Reise sind sowohl die
  Polar- und Klimaforschung als auch das Thema Raumfahrt. In beiden Themenbereichen
  ist Norwegen ein zentraler Partner für Deutschland. Ministerin Bär wird dort zusammen
  mit ihrer Ministerkollegin den offiziellen Start der deutsch-norwegischen Arbeitsgruppe
  für Raumfahrt bekanntgeben. Die Arbeitsgruppe wurde von Bundeskanzler Merz während
  seiner Norwegenreise vor einigen Wochen mit dem norwegischen Ministerpräsidenten
  ins Leben gerufen. Zudem werden die Ministerinnen ein Unternehmen im Bereich der
  Satellitenkommunikation besuchen. Zum zweiten Themenkomplex, der Polar- und Klimaforschung,
  wird sich die Ministerin am Norwegischen Polarinstitut mit Forschenden austauschen.
  Das NPI ist ein Kooperationspartner des deutschen Alfred-Wegener-Instituts. Zuletzt
  reist die Ministerin auf die norwegische Insel Andøya. Hier betreibt das Leibniz-Institut
  für Atmosphärenphysik, Kühlungsborn, in Zusammenarbeit mit einem norwegischen Partner
  das ALOMAR-Observatorium als weltweit führende Forschungseinrichtung. Ich darf Ihnen
  die Reise des Außenministers am Montag zu den Vereinten Nationen nachNew York ankündigen.
  Dort wird der Außenminister an einer offenen Debatte des UN-Sicherheitsrats zum
  Thema maritime Sicherheit teilnehmen und sprechen. Außerdem ist geplant, dass er
  an der Überprüfungskonferenz des Atomwaffensperrvertrags teilnimmt. Weiterhin sind
  Gespräche mit dem Generalsekretär der Vereinten Nationen und anderen ranghohen Vertreterinnen
  und Vertretern der Vereinten Nationen sowie anderen anwesenden Außenministern geplant.
  Zentrale Themen dieser Reise sind einerseits die Situation in der Straße von Hormus,
  der Umgang der internationalen Gemeinschaft mit Iran, die nukleare Nichtverbreitung
  und auch die Stärkung des multilateralen Systems. (zur Entgegennahme des „Deutschen
  Brotkorbs“ des Zentralverbands des Deutschen Bäckerhandwerks ) Herr Hille, das Bäckerhandwerk
  hat in der Vergangenheit sehr intensiv darauf gedrungen, bei Energiepreisen deutlich
  mehr Entlastung zu bekommen. Hat Herr Merz irgendetwas für das Bäckerhandwerk im
  Gepäck, außer einer Brezel oder eines Stutenkerls? Herr Kollege, ich darf in Erinnerung
  rufen, was wir Anfang des Jahres an Energiepreisentlastungen beschlossen haben,
  nämlich eine Senkung der Stromsteuer auch für produzierendes Gewerbe. Soweit ich
  mich auskenne, fällt das Bäckerhandwerk genau in diese Kategorie des produzierenden
  Gewerbes und hat von daher am Anfang des Jahres von der Senkung der Stromsteuer
  profitiert. Uns ist natürlich bewusst, dass Energiepreise für Unternehmen, insbesondere
  auch im Handwerk, ein großer Kostenfaktor sind. Deshalb haben wir das so entschieden
  und dadurch dazu beigetragen, dass diese Kosten zumindest ein wenig reduziert werden.
  Herr Hille, meine Frage geht in eine ähnliche Richtung: Sowohl die Länder als auch
  die Hafenbetreiber fordern mehr Geld, unter anderem auch für den Ausbau der Häfen,
  um die Ziele, die Sie genannt haben, zu erreichen, also die Stärkung des Standorts
  Deutschland. Wird der Kanzler in Emden auch Versprechen abgeben? Sie wissen, wie
  das mit Themen ist, die in der Zukunft liegen: So gerne wir uns vorausschauend insbesondere
  zu vermeintlichen Versprechen, Zusagen oder dergleichen äußern, muss ich Sie um
  etwas Geduld bitten. Die Konferenz findet in der kommenden Woche statt, und genau
  um über die Herausforderungen für den maritimen Standort Deutschland zu sprechen,
  haben wir dieses Format. Genau da sind diesen Themen richtig aufgehoben, und alles
  andere besprechen wir dann gerne, wenn die Veranstaltung gelaufen ist. Herr Hille,
  der maritime Fokus der deutschen Öffentlichkeit liegt ja im Moment bei Versuchen,
  einen gestrandeten Wal in der Ostsee zu retten. Gestatten Sie daher, dass ich zu
  diesem Punkt frage: Wie nimmt der Kanzler diese Rettungsversuche und diese öffentliche
  Aufmerksamkeit wahr? Hat er eine Meinung dazu? Sollte man dieses Tier vielleicht
  einfach sterben lassen? Herr Kollege, ich bin immer wieder überrascht bzw. geradezu
  begeistert von Ihrer Kreativität, wie Sie von der Maritimen Konferenz jetzt zu diesem
  Thema kommen. Das ist ein Thema, das viele Menschen zu verfolgen scheinen. Für den
  Bundeskanzler habe ich aber keine besondere Perspektive darauf zu werfen. Man darf
  aber davon ausgehen, dass er sowohl die Berichterstattung als auch das große öffentliche
  Interesse und, wenn man so will, die Anteilnahme zur Kenntnis nimmt. Hat er sich
  darüber nicht in einer Weise, die Sie uns mitteilen können, geäußert und gesagt,
  wie er das findet bzw. was er davon hält? Herr Kollege, wie Sie es schon antizipieren,
  habe ich mit dem Bundeskanzler zu diesem Thema in der Tat noch kein Wort gewechselt.
  Von daher kann ich Ihnen auch keinen frischen Puls des Bundeskanzlers dazu geben.
  Ich gehe davon aus, dass er dieses Thema, da es in der Öffentlichkeit so präsent
  ist, natürlich auch wahrgenommen hat. Eine kurze Nachfrage zur Klarheit, Herr Hille:
  Habe ich das richtig verstanden, das ist der Antrittsbesuch beim Deutschen Heer
  nach einem Jahr als Bundeskanzler? Sie haben es richtig verstanden: beim Deutschen
  Heer. Es gab ja diverse Termine des Bundeskanzlers bei der Bundeswehr, aber dieser
  Besuch in Munster an dem großen Standort der Panzertruppe ist der erste Antrittsbesuch,
  wenn man so will, beim Deutschen Heer, das ist richtig. Sie hatten, glaube ich,
  gesagt, er verschaffe sich dort einen Einblick in dessen aktuelle Fähigkeiten und
  Ausrüstung. Lassen sich der Kanzler und der Vizekanzler dort die aktuellen Fähigkeiten
  rund um DLBO präsentieren? Auch da gilt das, was ich gerade schon einem Kollegen
  von Ihnen gesagt habe: Das sind Dinge, die in der Zukunft liegen, und üblicherweise
  werden diese Besuche ja von den Besuchten, also in diesem Fall von der Bundeswehr,
  vorbereitet. Ich kann nicht voraussehen, was dem Bundeskanzler dort an Fähigkeiten
  vorgeführt wird. Ich bin mir aber sicher, dass das Herr alles aufbieten wird, was
  es zu bieten hat, und das ist eine ganze Menge. Vielleicht kann Herr Müller das
  ergänzen, falls er das weiß. Es würde mich wundern, wenn das am Standort Munster
  nicht zur Sprache kommen würde. Das DLBO-Projekt ist ja in vollem Gange, die Tests
  finden andauernd statt ‑ aktuell gibt es wieder einen Großtest. Ich bin mir sicher,
  dass dem Herrn Bundeskanzler im Rahmen der Fähigkeitspräsentation dort auch das
  Thema DLBO sowie die Entwicklungen und der Fortschritt bei der Digitalisierung des
  Heeres in Gänze präsentiert werden. Da gibt es ja nicht nur das DLBO-Projekt, sondern
  auch rundherum ist noch eine ganze Menge vorhanden: Satellitenkommunikation, weitreichende
  Netze, zellulare Netze usw. Ich bin mir sicher, dass dort eine Gesamtfähigkeitspräsentation
  stattfinden wird; denn das Herr will sich ja präsentieren, auch mit Blick in die
  Zukunft. Sie wissen von Loitering Munition, aber auch von anderen Drohnensystemen;
  auch die Mittleren Kräften werden eingeführt. In diesem ganzen Themenkomplex wird
  sicherlich auch der Digitalfunk eine Rolle spielen. Frau Abboud, das Treffen mit
  Präsident Ruto ist natürlich hochkarätig. Was für ein Ziel verfolgen Sie da? Im
  eigenen Land ist er gerade auch von der jungen Generation immer wieder sehr stark
  herausgefordert worden. Die Ministerin macht sich auch für die junge Generation,
  für die Zukunft stark. Mit welcher Zielsetzung gehen Sie in diese Gespräche? Den
  Gesprächen mit Herrn Ruto kann ich jetzt nicht vorgreifen. Ich kann im Vorfeld aber
  auf jeden Fall sagen, dass es auf dieser Reise konkret um den Gesundheitsbereich
  und die Kooperation von deutschen und kenianischen Unternehmen geht. Sie hatten
  gesagt, das sei ein Pilotansatz. Können Sie dazu bitte noch ein paar Sätze sagen?
  Ich habe gesagt, es wäre ein Pilotland in Bezug auf den wirtschaftlichen Ansatz,
  den der Reformprozess des BMZ verfolgt. Herr Fichtner, Sie haben gesagt, Deutschland
  werde sich bei der Santa-Marta-Konferenz in Kolumbien mit seinen Erfahrungen beim
  Kohleausstieg einbringen. Können Sie genauer erläutern, was genau da eingebracht
  wird? Warum reist der Minister nicht selbst, warum reist Herr Flasbarth? Das ist
  ja eine Konferenz, auf der Länder auch über gute Beispiele berichten und zu der
  viele Länder zusammenkommen, die sich dafür interessieren, was in anderen Ländern
  schon funktioniert hat. Insofern sind wir nicht die Einzigen, die dort Dinge einbringen;
  das tun andere auch. Bei uns ist der Kohleausstieg etwas, bei dem man, glaube ich,
  gut lernen kann, wie man das als einen sozial gerechten Strukturwandel organisiert
  und wie man gleichzeitig organisiert, dass die erneuerbaren Energien als Alternative
  kosteneffizient ausgebaut werden. Beim Stromverbrauch liegt der Anteil erneuerbarer
  Energien bei uns ja inzwischen bereits bei 55 Prozent. Das sind Dinge, die auch
  weltweit auf Interesse stoßen werden. Ansonsten habe ich Ihnen berichtet, was der
  Umweltminister macht. Auch das ist ein wichtiges Thema. Er engagiert sich sehr für
  die Heranführung der Westbalkanstaaten an die Europäische Union und auch dafür,
  das Verständnis zwischen Ost- und Westeuropa zu verstärken. Deswegen sind wir als
  Leitungsteam des Umweltministeriums jetzt zu dieser Aufstellung geraten. Das ist
  eine starke Präsenz durch den Umweltstaatssekretär. (zur Reise der Bundesforschungsministerin
  nach Norwegen ) Können Sie vielleicht noch ein paar Sätze zur deutsch-norwegischen
  Arbeitsgruppe für Raumfahrt sagen? Wie ist die besetzt und was ist deren Ziel? Zum
  einen hatte ich ja darauf hingewiesen, dass der Bundeskanzler diese Arbeitsgruppe
  zusammen mit dem norwegischen Ministerpräsidenten beim kürzlich stattgefundenen
  gemeinsamen Treffen angekündigt bzw. eingerichtet hat. Was jetzt passieren wird,
  ist, dass die beiden Ministerinnen die sogenannten „terms of reference“ unterzeichnen
  werden. Es geht dabei dann auch darum, weitere Möglichkeiten für eine Vertiefung
  der deutschen europäischen Kooperation auch in dem Bereich auszuloten und umzusetzen.
  An das Bundeslandwirtschaftsministerium: Frau Galle, gestern ist ein Urteil des
  Bundesverwaltungsgerichts gefallen, das in Bezug auf Putenmast festgestellt hat,
  dass die freiwilligen Selbstverpflichtungen, die es da bisher von der Wirtschaft
  gibt, nicht ausreichen. Bislang ist die Putenmast noch nicht gesetzlich geregelt.
  Auch die Fachpresse schreibt jetzt schon, dass das den Druck auf die Politik erhöht,
  zu einer gesetzlichen Regelung bei Verordnungen zu kommen. Wie blickt der Bundeslandwirtschaftsminister
  darauf? Wie geht die Politik jetzt mit diesem Urteil um? Vielen Dank für die Frage.
  – Vorweggeschickt, unabhängig von dem Urteil: Der Tierschutz ist der Bundesregierung
  ein wichtiges Anliegen und als Staatsziel auch im Grundgesetz verankert. Die Bundesregierung
  hat sich im Koalitionsvertrag auf verschiedenste Vorhaben geeinigt und vorgenommen,
  den Tierschutz mit diesen Vorhaben zu stärken. Konkret zu dem Urteil, das gestern
  erfolgt ist: Die schriftliche Urteilsbegründung liegt uns noch nicht vor. Wir werden,
  sobald sie uns vorliegt, dieses Urteil sorgfältig prüfen. Die Frage zum Thema der
  Grenzkontrollen geht an das BMI. Teilen Sie die aktuelle Einschätzung der Bundespolizei,
  dass die Grenzkontrollen langfristig nur eingeschränkte Effekte haben, weil die
  zurückgewiesenen Migranten häufig wiederholt einzureisen versuchen? Ich gehe davon
  aus, dass Sie sich auf einen eingestuften Bericht der Bundespolizei beziehen, der
  heute Morgen in der Presse war. Deshalb kann ich Ihnen dazu keinen Kommentar geben.
  Ich kann Ihnen aber sagen, dass die vorübergehend eingeführten lageabhängigen Binnengrenzkontrollen
  ein Element in der aktuellen Migrationspolitik sind. Sie funktionieren, und deshalb
  wurden sie auch im März verlängert. Im September wird evaluiert werden, ob es zu
  einer weiteren Verlängerung kommen wird. Ich kann Ihnen gerne auch noch die anderen
  Bausteine der Migrationspolitik erläutern. Wir haben ja verschiedene Elemente darin.
  Die Grenzkontrollen sind ein Element davon. Es gibt auf nationaler Ebene und auf
  internationaler Ebene sowie auf EU-Ebene einige Elemente, die zu dieser gesamten
  Migrationspolitik beitragen. Aber würden Sie es von der Erkenntnislage her auch
  so sehen, dass der Rückgang der Zahlen auch mit den veränderten Rahmenbedingungen
  zusammenhängt, also zum Beispiel mit der veränderten Sicherheitslage in bestimmten
  Ländern wie Afghanistan und den eingeschränkten Weiterreisemöglichkeiten durch die
  Transitländer? Sehen Sie das auch so? Ich habe den Bericht gar nicht erwähnt, Sie
  haben den erwähnt! Ja, genau, gut. Aber diese Erkenntnisse kann ich nur in einen
  gröberen Rahmen einordnen. Wenn Sie sich also auf die Binnengrenzkontrollen beziehen,
  kann ich Ihnen darauf nur sagen, wie gerade schon erwähnt, dass das ein Element
  der Migrationspolitik ist. Dann nehme ich den Ball auf, Frau Singer, und weise jetzt
  einfach kurz darauf hin, dass die Bundespolizei ja selbst auch die Zahlen mehrfach
  Aufgegriffener zur Verfügung stellt. Insofern ist das ja eigentlich der Aspekt,
  um den es hier anscheinend geht, und nicht die Frage eines irgendwie eingestuften
  Berichtes. Wie sehen Sie also die Entwicklung bei den Binnengrenzkontrollen, was
  das Mehrfachaufgreifen derselben Person, der identischen Person, betrifft? Ich kann
  Ihnen dazu jetzt keine weiteren Informationen geben. Ich kann, wie gesagt, schon
  sagen, dass wir die Binnengrenzkontrollen im März verlängert haben. Das wissen Sie,
  und Sie wissen auch, dass das immer für ein halbes Jahr geschieht. Im September
  wird evaluiert werden, ob das weitergeführt werden wird. Da möchte ich dann doch
  noch einmal darum bitten, dass das eventuell nachgereicht wird, wenn es technisch
  irgendwie möglich ist. Denn es kann nicht sein, dass mit Verweis auf als geheim
  eingestufte Unterlagen oder als vertraulich eingestufte Unterlagen Dinge, die per
  se erst einmal öffentlich sind, durch das zuständige Bundesministerium öffentlich
  nicht kommentiert werden. Das ist unmöglich. Entschuldigung, das geht nicht. Es
  hieß zu Beginn der Woche, im Nationalen Sicherheitsrat sei beschlossen worden, dass
  man stärker gegen die russische Schattenflotte vorgehen möchte. Können Sie einmal
  skizzieren, wie das konkret aussehen wird? Herr Kollege, da würde ich gerne darauf
  verweisen, dass, wie Sie ja wahrscheinlich wissen, jetzt auch der Weg für das 20. Sanktionspaket
  der EU frei ist, und ein entscheidender Teil dieses Paketes sind ja weitere Sanktionen
  gegen die russische Schattenflotte. Ich glaube, das taugt als Hinweis für die Beantwortung
  dieser Frage. Vielleicht frage ich trotzdem noch einmal in Richtung des BMI. Ich
  glaube, das ist zuständig. Bislang wurden ja auch für Russland fahrende Schiffe
  in deutschen Gewässern nicht besonders behelligt, selbst wenn bekannt war, dass
  sie keinen ausreichenden Versicherungsschutz oder gefälschte Registrierungen haben.
  Warum war man da bislang so zögerlich? Zum Thema der Schattenflotte kann ich Ihnen
  leider nichts sagen. Ich kann es gegebenenfalls nachreichen. Wenn ich das richtig
  verstanden habe, ist mit dem neuen Sanktionspaket das erste Mal etwas verhängt worden,
  was wir vorher so noch nicht kannten, nämlich ein Ausfuhrverbot in einen anderen
  Staat, in dem Fall Kirgistan, für Hochtechnologie respektive für Computertechnologie.
  Da würde ich gerne wissen: Gibt es irgendein relevantes Handelsvolumen seitens Deutschlands
  mit Kirgistan? Es geht natürlich um den Export aus Kirgistan nach Russland zu sanktionierten
  Zwecken. Ich weiß nicht, wer das zuständige Ministerium ist, vermutlich das BMWE.
  Ich muss es noch einmal genau verstehen. Könnten Sie das bitte noch einmal wiederholen?
  Es geht darum, dass nach Kirgistan jetzt keine Computerbauteile mehr exportiert
  werden dürfen, weil die nach Russland reexportiert werden. Das ist die Idee im Sanktionspaket.
  Wenn ich das richtig verstanden habe, ist jetzt zum ersten Mal in einem Sanktionspaket
  enthalten, dass genau diese Technologien wegen Auffälligkeiten in der Handelsstatistik
  eben nicht mehr in ein entsprechendes Land exportiert werden dürfen. Haben Sie irgendwelche
  Erkenntnisse darüber, dass das für Deutschland relevant ist? Ich habe dazu aktuell
  keine Erkenntnisse vorliegen, aber würde schauen, ob ich dazu gegebenenfalls etwas
  nachreichen kann. Herr Kollege, ich kann Ihnen natürlich zu den Details und den
  Handelsvolumina nichts sagen. Tatsächlich ist richtig, was Sie sagten, dass es darum
  geht, dass wir im Rahmen der Sanktionsumgehung erstmals dieses Anti-Umgehungsinstrument
  anwenden und den Export bestimmter Produkte nach Kirgistan sanktionieren, damit
  sie eben nicht weiter nach Russland gelangen können. Deshalb, ja, kommt das erstmals
  zur Anwendung. Allerdings kann ich Ihnen die Detailfrage nach den Handelsvolumina
  an dieser Stelle nicht beantworten. Die Frage geht an das Auswärtige Amt. Es geht
  um die Journalistenkollegin Eva Maria Michelmann , die seit Mitte Januar in Syrien
  vermisst wurde. Ich glaube, seit gestern hat das Auswärtige Amt direkten Kontakt
  zu ihr hergestellt, und zwar offenbar in einer Haftanstalt, die unter Kontrolle
  der syrischen Regierung steht. Was können Sie uns über den Zustand sagen, in dem
  sich Frau Michelmann befindet, und worauf zielt die Arbeit der konsularischen Betreuung
  ab? Ich hatte ja auch diese Woche hier schon einmal über das Thema gesprochen, kann
  diesen neuen Stand allerdings tatsächlich bestätigen. Ich kann Ihnen mitteilen,
  dass wir nach intensiven und auch hochrangigen Bemühungen auf verschiedenen Kanälen
  gestern tatsächlich direkten Zugang zu Frau Michelmann erhalten haben. Die Kolleginnen
  und Kollegen der deutschen Botschaft in Beirut ‑ ich hatte ausgeführt, dass sie
  sich grundsätzlich um konsularische Fälle auch in Syrien kümmert ‑ und der deutschen
  Botschaft in Damaskus betreuen sie jetzt weiterhin konsularisch. Grundsätzlich ist
  es so: Wenn uns ein Fall zur Kenntnis gelangt, dann bemühen wir uns natürlich intensiv
  um den Kontakt. Diesen Kontakt haben wir in der Vergangenheit herzustellen versucht,
  und jetzt ist es gelungen. Ich hatte zwei konkrete Frageinhalte, auf die Sie nicht
  eingegangen sind, zum einen, wie der Zustand von Frau Michelmann nach drei Monaten
  ‑ das darf man ja vermuten ‑ Haft ist. Was können Sie uns darüber sagen? Besteht
  da irgendeine medizinische Gefahr? Worauf zielt die Arbeit, die Betreuung ab? Versuchen
  Sie, die deutsche Staatsbürgerin aus der Haft freizubekommen? Auch darüber, glaube
  ich, hatte ich am Mittwoch schon gesprochen. Bitte sehen Sie es mir nach, dass ich
  aus Gründen des Persönlichkeitsschutzes hier keine Detailinformationen preisgeben
  kann. Das ist etwas, das wir bei konsularischen Fällen grundsätzlich so halten und
  auch in diesem Fall, Herr Kollege. Frage an den Regierungssprecher: Ist der Bundeskanzler
  vom Signal-Hack betroffen? Herr Kollege, ich verstehe die Frage, aber ich hoffe,
  dass Sie auch meinen Hinweis verstehen, dass wir über die Art und Weise, in der
  wir in der Bundesregierung kommunizieren, natürlich grundsätzlich keine Auskunft
  geben, weder über die Kommunikationsmittel noch über die -wege. Aber seien Sie sich
  sicher, dass die Kommunikation der Bundesregierung, des Bundeskanzlers, der Bundesminister
  auf sicheren Kanälen läuft. Na ja, so sicher bin ich da aber, ehrlich gesagt, nicht,
  wenn ich mir die Berichterstattung anschaue. Wie besorgt ist die Bundesregierung?
  Können Sie das angesichts der ganzen aktuellen Informationen, die ja auch öffentlich
  bekannt sind, wenigstens sagen? Das würde ich mit dem allgemeinen Verweis beantworten,
  dass es natürlich grundsätzlich im Cyberraum eine ganze Reihe von Gefahren gibt,
  der man gewahr sein muss. Jeder ist aufgerufen, in seiner persönlichen Kommunikation
  größte Sensibilität walten zu lassen und eben nicht Dinge zu klicken oder in Verteiler
  aufzunehmen, die nicht sicher sind. Ich schicke also sozusagen den Appell für einen
  sensiblen, verantwortungsvollen Umgang eines jeden in den Saal, aber Weiteres kann
  ich Ihnen dazu nicht sagen, Herr Kollege. Dann würde ich dann doch ganz gerne noch
  einmal eine Runde mit dem BMI drehen, als das Haus, das für den Geheimschutz auch
  innerhalb der Bundesregierung zuständig ist. Ich würde gerne wissen, wie Sie denn
  mit dieser Situation der Phishingattacke über Signal ‑ es sind ja keine Hacks, Signal
  ist ja nicht kompromittiert ‑ umgehen. Haben Sie Maßnahmen unternommen, um noch
  weiter zu sensibilisieren, auch innerhalb der Bundesverwaltung und der Bundesregierung,
  oder wie muss ich mir das seitens Ihrer Zuständigkeiten praktisch vorstellen? Wie
  Sie wissen, hat das BfV ja bereits im Februar gemeinsam mit dem BSI vor einer Phishingkampagne
  über den Messengerdienst Signal gewarnt. Die gegen hochrangige Ziele aus Politik,
  Militär und Diplomatie sowie Investigativjournalistinnenen und -journalisten gerichteten
  Angriffe werden wahrscheinlich durch einen staatlich gesteuerten Cyberakteur durchgeführt,
  und die aktuellen Erkenntnisse zeigen, dass die Kampagne weiterhin aktiv ist und
  an Dynamik gewinnt. Das BfV und das BSI haben deshalb am 17. April, also jetzt erst
  vor Kurzem, eine aktualisierte Warnung herausgegeben. Dass die aktualisierte Warnung
  notwendig war, scheint ja auch auf gewisse, jetzt bekannter gewordene Vorfälle zurückzuführen
  sein. Warum verfangen solche Warnungen offenkundig selbst bei Spitzenpolitikern
  nicht? Darauf kann ich Ihnen jetzt leider keine Antwort geben. Ich kann mich da
  nur dem Regierungssprecher anschließen, der gerade erwähnt hat, dass ‑ ‑ ‑ Ich formuliere
  es anders. Gibt es ein strukturelles Problem mit der faktischen IT-Sicherheit bei
  Verantwortungsträgern in der und um die Bundesregierung herum? Das würde ich verneinen.
  Ich kann Ihnen aber keine weitere Information dazu geben, außer dem, was ich gerade
  gesagt habe. Die Präsidentin der Europäischen Kommission , Ursula von der Leyen,
  hat die Türkei kürzlich in eine Reihe mit Russland und China gestellt und damit
  eine deutlich verschärfte sicherheitspolitische Einordnung vorgenommen. Teilt die
  Bundesregierung diese Bewertung der Türkei als sicherheitspolitischen Risikofaktor?
  Wie bewertet die Bundesregierung in diesem Zusammenhang das Spannungsverhältnis
  zwischen der sicherheitspolitischen Zusammenarbeit wie etwa in der NATO und der
  sich verschärfenden innenpolitischen Lage in der Türkei wie zum Beispiel durch die
  Verhaftung von oppositionellen Politikerinnen und Politikern? Ich verstehe Ihre
  Frage, aber sehen Sie es mir nach, dass wir es so handhaben, wie wir das üblicherweise
  tun: Wir kommentieren nicht die Äußerungen von anderen Spitzen, sei es im Staat
  oder in der Europäischen Kommission. Das sind die Worte von Ursula von der Leyen,
  und ich bitte dann auch, entsprechende Fragen an Ursula von der Leyen zu richten.
  In der Türkei ist ja jetzt gerade ein frisches Social-Media-Gesetz verabschiedet
  worden. Da würde ich natürlich ganz gerne wissen, weil wir es in der Vergangenheit
  ja auch so gehandhabt haben, dass wir beispielsweise das Auswärtige Amt fragen,
  wie es denn diese Entwicklung betrachtet, was daraus vielleicht für Deutschland
  zu lernen ist oder ob möglicherweise aus Ihrer Sicht dort Schwierigkeiten bestehen,
  die Rückwirkungen auf das deutsch-türkische Verhältnis haben. Ich kann ganz grundsätzlich
  ausführen ‑ wir haben uns in der Vergangenheit auch dazu geäußert ‑, dass wir natürlich
  die Entwicklungen der Presse- und Meinungsfreiheit in der Türkei auch kritisch betrachten
  und auch kritisch thematisieren. Zu dem einzelnen Gesetz, das Sie jetzt ansprechen,
  habe ich leider hier gerade keine Erkenntnisse darzubieten. Soll es dazu etwas geben,
  würde ich Ihnen das gerne nachreichen, Herr Kollege. Ich bin mir sehr sicher, dass
  es dazu in Ihrem Hause respektive spätestens in der Botschaft Erkenntnisse gibt.
  Darauf freue ich mich dann. Vielen Dank. Meine Frage geht zunächst an Herrn Hille,
  aber ich möchte gerne auch von Herrn Hinterseher möglichst eine Äußerung bekommen.
  Es sieht ja jetzt so aus ‑ zumindest liegt der Nachrichtenagentur Reuters eine E-Mail
  aus dem Pentagon vor ‑, dass intern in der US-Administrationüberlegt wird, wie man
  mit Bündnispartnern umgeht, die nicht die eigenen Ansprüche erfüllen. Spanien scheint
  da im Visier zu sein. Da wird über mögliche Suspendierung aus der NATO diskutiert.
  Herr Hille, was davon ist bei Ihnen bereits angekommen? Frau Kollegin, Sie zitieren
  ja selbst die Presseberichterstattung, und es tut mir leid, dass ich auch da nichts
  anderes als das tun kann, was wir üblicherweise tun. Sie kennen unsere Haltung.
  Wir kommentieren Presseberichterstattung nicht, ansonsten kämen wir ja hier nicht
  mehr von der Bank herunter. Grundsätzlich gilt natürlich das, was wir zur NATO immer
  sagen: Die NATO ist der zentrale Pfeiler unserer Verteidigung. Der Bundeskanzler
  persönlich hat sich an die Spitze gesetzt, die Verteidigungsausgaben in Deutschland,
  in Europa und in der NATO deutlich zu erhöhen. Wir arbeiten daran, die NATO zukunftsfähiger
  zu machen. Wir wollen uns unabhängiger machen von anderen Kräften, und in diesem
  Spiel nimmt die Bundesregierung und nimmt der Bundeskanzler eine wichtige Rolle
  ein. Ich habe eine kurze Nachfrage, auch explizit mit Blick auf die Solidarität
  mit Spanien, denn da waren ja einige nach einem Auftritt im Oval Office enttäuscht.
  Ich verstehe jetzt nicht ganz, auf was Sie ‑ ‑ ‑ Spanien ist meines Wissens NATO-Mitglied,
  und ich sehe keinen Grund dafür, dass sich daran irgendetwas ändert. Zum Teil ist
  das beantwortet worden, Herr Hille. Ist Spanien aus Sicht der Bundesregierung ein
  wichtiger und vertrauenswürdiger NATO-Partner? Ich habe gerade, Herr Kollege, ja
  schon grundsätzlich ein paar Sätze zur Bedeutung und zur Rolle der NATO sowie zu
  den Zielen, die wir in der NATO verfolgen, gesagt. Angeführt vom Bundeskanzler ‑ Sie
  erinnern sich an den NATO-Gipfel; in Den Haag, meine ich, war er ‑ konnten wir es
  in der NATO erreichen, deutlich größere Beiträge der Nationalstaaten an den Verteidigungskosten
  zu vereinbaren, und genau das ist der richtige Weg zur Stärkung der NATO, so wie
  sie jetzt ist. Aber auch die Frage der Erhöhung der Beiträge ist eine Dimension,
  die ja nur Sinn ergibt, solange ein Staat dann eben auch Mitglied des Bündnisses
  ist. Deswegen stelle ich vor dem Hintergrund einer zu stärkenden Rolle der europäischen
  NATO-Partner noch einmal die Frage: Ist Spanien aus Sicht der Bundesregierung ein
  wichtiger, verlässlicher, Partner der NATO auf der europäischen Seite? Entschuldigung,
  ich wollte gerne auch noch Herrn Hinterseher zu der Frage hören, wie das Auswärtige
  Amt diese mögliche Abwertung durch die US-Administration in Richtung Spanien bewertet.
  Frau Kollegin, ich kann nichts Weiteres dazu beitragen, als der stellvertretende
  Regierungssprecher gerade gesagt hat. Wie gesagt, die NATO ist ein Defensivbündnis,
  ein Verteidigungsbündnis, und ist als Allianz genau dann besonders stark, wenn alle
  Mitglieder zusammenhalten. Deshalb gab es diese Beschlüsse im letzten Sommer, auch
  die eigenen Fähigkeiten zu erhöhen. Genau in diesem Moment, in dem die NATO zusammenhält
  und zusammensteht, ist sie besonders stark und erfüllt ihren Zweck, nämlich eine
  Aggression gegen die NATO-Alliierten abzuschrecken. Der bayerische Ministerpräsident
  würde ja eine Kandidatur von Ilse Aigner als Bundespräsidentin unterstützen . Schließt
  sich denn der Kanzler dem an? Ich und wir haben das natürlich zur Kenntnis genommen.
  Aber Sie wissen selbst, wie die Zeitabläufe sind. Die Bundesversammlung wird im
  nächsten Jahr stattfinden. Sie wissen, wie die Benennung von Kandidaten stattfindet.
  Das ist die Aufgabe der Parteien. In diesem Spiel habe ich als Regierungssprecher
  keine Rolle und werde das deshalb nicht weiter kommentieren. Eine halbe Rolle rückwärts,
  weil mir gerade noch etwas zum Thema der Tanker bzw. der Schattenflotte eingefallen
  ist. Ich würde ganz gerne noch wissen: Liegt die „Eventin“ immer noch vor Rügen?
  Was sind denn jetzt eigentlich die Zukunftsaussichten für diesen einen Tanker, der
  sich sozusagen in deutsche Gewässer verirrt hat? Der ist ja jetzt doch etwas serviceintensiver,
  wenn ich es richtig in Erinnerung habe. Ich vermute, einmal an den Zoll, also quasi
  das BMF, und vielleicht auch an das Bundesumweltministerium. Da bin ich mir nicht
  ganz sicher, ob das auch eine Einschätzung dazu hat, was denn die Gefahrenlage angeht,
  die von diesem Tanker ausgeht. Ich habe Ihnen da tatsächlich keinen neuen Stand
  mitzuteilen. Es ist also so, wie Sie beschrieben haben. Ich habe dazu keine eigenen
  Erkenntnisse. Dann würde ich mich natürlich freuen, falls sich doch noch irgendwelche
  Informationen auftun, wenn sie nachgeliefert würden. Herr Hille der Tankrabatt ist
  ja jetzt durch den Bundestag und den Bundesrat gegangen. Sie hatten hier vor zwei
  Wochen gesagt, was ein Erwartungsmanagement in Sachen Spritpreise angeht, wären
  Sie eher vorsichtig. Man könne jetzt nicht erwarten, auch bei einer anhaltenden,
  nachhaltigen Waffenruhe, dass die Preise an den Tankstellen sofort sinken. Stichwort
  „Erwartungsmanagement“: Wie ist das mit den 17 Cent? Sinkt das ab Mai um 17 Cent?
  Ehrlich gesagt, erinnere ich mich nicht daran, dass ich das in diesem Zusammenhang
  gesagt haben soll. Ich erinnere mich an Aussagen, die aber vor dem Beschluss des
  Koalitionsausschusses getätigt wurden. Damals war das richtig. Aber wir haben jetzt
  natürlich eine andere Sachlage. Ja, der Tankrabatt, wie Sie ihn genannt haben, zielt
  natürlich darauf ab, die Verbraucherinnen und Verbraucher an der Zapfsäule beim
  Tanken deutlich zu entlasten, und zwar ‑ Sie haben die Zahl ja genannt ‑ um 17 Cent.
  Mit dem Beschluss heute im Bundestag und in der Sondersitzung des Bundesrates, die
  jetzt gerade laufen müsste ‑ vielleicht ist es sogar schon durch ‑, kann das zum
  1. Mai wie geplant in Kraft treten. Damit wird der Liter Sprit um ca. 17 Cent günstiger.
  Nun hat der Präsident des Kartellamtes schon gesagt, er würde erst einmal nichts
  tun können, wenn am 2. oder 3. Mai diese 17 Cent nicht weitergegeben würden. Aber
  die Bundesregierung hat mehrfach darauf hingewiesen, auch Herr Greve, dass man das
  Kartellrecht scharf gemacht habe. Was erwarten Sie vom Kartellamt ab dem 2. oder
  3. Mai? Wir erwarten das, was in einem funktionierenden Rechtsstaat, wie Deutschland
  einer ist, Standard ist, dass geltende Regeln angewendet werden. Dass ich jetzt
  aber nicht antizipiere, was möglicherweise passieren könnte, wenn das nicht eintreten
  würde, sehen Sie mir bitte nach. Das ist mir ein bisschen zu viel Konjunktiv. Das
  können wir sehr gern besprechen, wenn das Ende kommender Woche der Fall sein sollte.
  Aber verstehe ich Sie richtig, dass Sie davon ausgehen, dass die 17 Cent weitergegeben
  werden? Natürlich. Das ist das Ziel und die Erwartung an alle Beteiligten in diesem
  Geschäftsgeflecht, ohne dass ich jetzt sagen kann, wen das im Detail zu welchem
  Prozentanteil betrifft. Die Bundesregierung hat diese Entlastung beschlossen, um
  die Verbraucherinnen und Verbraucher an der Zapfsäule zu entlasten. Dementsprechend
  ist die Erwartung der Bundesregierung und des Bundeskanzlers, dass sich diese Entlastung
  natürlich auch bei den Verbraucherinnen und Verbrauchern findet. Hat die Bundesregierung
  in ihren sicherlich stattfindenden Kontakten mit Vertretern der Mineralölwirtschaft
  denn Signale erhalten, dass man dort gewillt ist, diese Entlastung direkt weiterzugeben,
  oder gibt es solche Signale nicht? Wir erwarten, dass sich diese Entlastung, die
  heute von Bundestag und Bundesrat beschlossen worden ist, nachdem die Bundesregierung
  sie vorgeschlagen hat, bei den Verbraucherinnen und Verbrauchern ankommt. Für den
  Fall, dass das nicht eintritt, haben wir sowieso schon ein Kartellrecht gehabt,
  bei dem wir aber jetzt ‑ der Bundeskanzler hat meiner Erinnerung nach davon gesprochen,
  die Zähne zu schärfen ‑ die Zähne geschärft haben, um in genau solchen Fällen noch
  besser ‑ um im Bild zu bleiben; dann sind wir auch fast wieder im Wasser, Herr Kollege ‑
  zubeißen zu können. Wale haben, glaube ich, nicht unbedingt Zähne, mit denen sie
  zubeißen. Deshalb habe ich auch vom Wasser und nicht vom Wal gesprochen. Gab es
  seitens der Mineralölwirtschaft Signale dafür, dass man dort sagt: „Ja, gehen Sie
  davon aus; wir werden das weitergeben“? Denn Ihre Erwartungshaltung ist das eine.
  Aber wie reagiert die andere Seite in Kontakt darauf? Gab es solche Signale? Herr
  Kollege, es ist ja nicht nur meine Erwartungshaltung, sondern es ist die Erwartungshaltung
  der Bundesregierung, des Bundeskanzlers, aller der Bundesregierung angehörenden
  Ministerinnen und Minister, dass das, was wir zur Entlastung der Verbraucherinnen
  und Verbraucher an der Zapfsäule beschlossen haben, auch bei den Verbraucherinnen
  und Verbrauchern ankommt. Punkt. Herr Hille, können Sie darlegen, warum der Tankrabatt
  eine gute Idee ist, obwohl quasi alle führenden Wirtschaftswissenschaftler des Landes
  davon abgeraten haben, auch Mitglieder der Koalition im Vorfeld davon abgeraten
  und teilweise sogar Mitglieder der Bundesregierung es für keine gute Idee hielten?
  Wir haben hier, denke ich, schon sehr häufig zu diesem Thema gesprochen. Ich kann
  es von daher ganz kurz machen. Das ist eine gute Idee, weil die Bürgerinnen und
  Bürger, die Folgen, die sich aus dem Konflikt im Iran ‑ Straße von Hormus und was
  alles noch daran hängt ‑ ergeben, an der Zapfsäule und am Ende in ihrem Portemonnaie
  merken. Genau diese Lage hat die Bundesregierung wahrgenommen und sich deshalb dazu
  entschlossen, Entlastungen umzusetzen, die bei den Bürgerinnen und Bürgern ankommen.
  Dafür ist dieses Instrument das am schnellsten umsetzbare und aus unserer Sicht
  zielgerichtete Instrument, um diese Entlastungen im Portemonnaie der Bürgerinnen
  und Bürger, der Verbraucherinnen und Verbraucher zu erreichen. Der US-Investor Pincus
  will die Berliner Softwarefirma PSI übernehmen , was insofern relevant ist, weil
  sie Software für Energiesysteme und den Betrieb von Energienetzen produziert. Ist
  das dem BMWE bekannt? Ist das für Sie in irgendeiner Form relevant im Hinblick auf
  kritische Infrastruktur, dass dort ein Eingriff möglich sein müsste bzw. nötig wäre?
  Ich kenne mich in den Mechanismen, die Sie zur Verfügung haben, nicht sehr gut aus.
  Sie wissen, dass wir uns grundsätzlich nicht zu etwaigen Investitionsprüfverfahren
  oder Ähnlichem äußern. Mir liegen keine Erkenntnisse vor, die ich hier teilen könnte.
  Ich werde noch einmal nachschauen. Sollte sich das ändern, würde ich etwas nachreichen.'
