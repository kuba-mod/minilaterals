title: Bundesregierung aktuell
text: 'auch in dieser Woche dominierte die große Aufbruch-Agenda der Bundesregierung
  die Debatte. Sie wissen längst: Es geht um die größte Reform unseres Gesundheitssystems
  seit Jahren, es geht um das Rentensystem, einen ausgeglichenen Haushalt und am Ende
  auch um eine Steuerreform und Verbesserungen im Arbeitsrecht. Das ist eine ambitionierte
  Agenda, die so viele Bürgerinnen und Bürger betrifft, dass es völlig normal ist,
  wenn sich nun ein gewaltiger Chor aus Lob und Kritik erhebt. So funktioniert unsere
  Demokratie: Alle wollen und sollen gehört werden, die Interessen werden über Abgeordnete
  und Lobby vertreten, und selbstverständlich zwingt eine Koalitionsregierung per
  se zu Kompromissen. Wenn alle Parteien gleiche Ziele verfolgten, wäre der Wettbewerb
  der Demokraten aufgelöst. Lassen Sie sich von diesem Getöse aus Meinungen, Wünschen,
  auch handfester Kritik und mitunter unflätigen Debattenbeiträgen nicht beirren.
  Mir fällt die Häufung der Verben „fordert“, „mahnt“, „kritisiert“, „lehnt ab“ auf.
  So ergibt sich der Eindruck eines schier unlösbaren Konfliktes, eines epischen Streits.
  Umso besser, wenn auch mal ein Lob oder eine konstruktive Stimme zu hören ist. Am
  Ende nämlich – und das kann ich aus unzähligen internen Gesprächen berichten – gibt
  es eine große Entschlossenheit, diese mutigen und längst überfälligen Reformen auf
  den Weg zu bringen. Die Woche des Bundeskanzlers begann auf der Hannover Messe,
  wo er mit dem Partnerland Brasilien und dessen Staatspräsident Lula da Silva die
  enge Zusammenarbeit zwischen Europa und Lateinamerika demonstrierte. Die neue geopolitische
  Realität hat auch ihren Harem: Plötzlich wird der Wert von Beziehungen sichtbar,
  die bisher eher eine Nebenrolle spielten. Fortschritt auch im Kabinett am Mittwoch,
  wo nach langen Jahren ein Gesetzentwurf verabschiedet wurde, der die Aufklärung
  von Kriminalität im Internet erleichtern wird. Weil die Verbreitung von Kinderpornographie
  endemisch zunimmt, weil Online-Betrug und Hasskriminalität im Netz wachsen, muss
  der Rechtsstaat die Werkzeuge in die Hand bekommen, um dagegen vorgehen zu können.
  Die Bundesregierung hat nun einen Gesetzentwurf auf den Weg gebracht, mit dem Internet-Zugangsanbieter
  verpflichtet werden sollen, IP-Adressen für einen Zeitraum von drei Monaten zu speichern.
  Oftmals sind diese Daten der einzige Ansatz für Ermittlungen. Die Woche endete für
  den Kanzler mit dem informellen Europäischen Rat auf Zypern. Bei informellen Räten
  geht es auch ein bisschen informell zu, was den Staats- und Regierungschefs mehr
  Freiheit in ihren Gesprächen gibt. Das fördert den Zusammenhalt unter den Europäern
  – zumal es sich um den ersten Rat nach der Wahl in Ungarn handelte. Viele Blockaden
  konnten wortwörtlich über Nacht aufgelöst werden. Da sind sie also, die guten Nachrichten
  in einer problembeladenen Welt. Es lohnt sich, daran zu erinnern. Ich zumindest
  kenne niemanden im politischen Betrieb der Mitte, der nicht lieber gute als schlechte
  Nachrichten produziert. „Wir können auf euch nicht verzichten, gerade in den technischen
  Berufen. Ich werbe sehr dafür, dass wir das gemeinsam besser machen in Deutschland!“
  Bundeskanzler Merz zu den Schülerinnen beim Girls'' Day im Kanzleramt am 22. April.
  Wir freuen uns über Ihr Feedback: Nutzen Sie bitte dafür das Kontaktformular (nicht
  die Antwortfunktion auf diese E-Mail).'
