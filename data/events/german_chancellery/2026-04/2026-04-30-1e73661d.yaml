title: Bundesregierung aktuell
text: 'es war ein Kraftakt. Nach langen Verhandlungen hat die Bundesregierung in dieser
  Woche Beschlüsse von großer Tragweite gefasst. Zum einen hat das Kabinett die Eckpunkte
  des Bundeshaushalts festgezurrt; zum anderen wurde die größte Sozialstaatsreform
  der letzten Jahrzehnte beschlossen – das Gesetz zur Stabilisierung der Beitragssätze
  in der gesetzlichen Krankenversicherung. Hinter diesem Wortungetüm verbirgt sich
  eine nicht minder komplexe Reform. Umso erfreulicher, dass sie endlich geglückt
  ist. Das Gesundheitssystem in Deutschland ist vorbildlich, aber leider ist es auch
  enorm teuer. Wäre die Reform nicht geglückt, dann wäre der sogenannte Faktor Arbeit
  mit zusätzlich 40 Milliarden Euro in den kommenden beiden Jahren belastet worden.
  Faktor Arbeit: Hinter diesem Begriff verbergen sich die Menschen - Beitragszahlerinnen
  und Beitragszahler, und natürlich auch die Arbeitgeber. Wenn die Kosten steigen,
  steigen die Beträge für alle – und das wurde nun verhindert. So ist die Reform auch
  ein starkes Zeichen an die Wirtschaft: Die Arbeitskosten bleiben beim Thema Gesundheit
  unter Kontrolle. Ein Beispiel aus der Reform: Die Finanzkommission Gesundheit hat
  analysiert, dass am Knie mitunter zu schnell operiert wird. Deshalb soll es künftig
  eine zweite ärztliche Meinung eingeholt werden. Geplant ist auch eine Zuckerabgabe
  auf gesüßte Getränke, in erster Linie ein Instrument zur gesundheitlichen Prävention.
  Der Herstellerabschlag im Arzneimittelbereich soll höher und übergangsweise auf
  3,5 Prozent festgelegt werden. Die Zuzahlung von Versicherten bei Arzneimitteln
  soll auf 7,50 Euro steigen. Auch beim Haushalt sind die Prioritäten gesetzt: Wir
  investieren für mehr Wachstum, für Beschäftigung und in die Modernisierung Deutschlands.
  Die Eckwerte werden auch einen schlankeren und effizienteren Staat erzwingen. Dazu
  kommt das große Thema Sicherheit, das auch im kommenden Jahr den Haushalt prägen
  wird. Ein erstes Bild von der Bundeswehr der Zukunft konnte der Bundeskanzler übrigens
  am Donnerstag gewinnen. Friedrich Merz war beim Heer in Munster, das eine beeindruckende
  Übung auf dem Gefechtsfeld der Zukunft veranstaltete. Die vernetzte und digitalisierte
  Truppe schreckt mit modernster Aufklärungs- und Drohnentechnik ab. KI bei der Bundeswehr
  heißt: kann ich. Und so wird es mit den Reformen weiter gehen. Die Eckwerte des
  Haushalts müssen jetzt ausverhandelt werden. Das wird – ich muss immer wieder darauf
  hinweisen – in einer Demokratie nicht ohne Geräusche passieren. Die Koalitionspartner
  haben ihre Interessen und werden sie nun ausdiskutieren. Der Sparbedarf für den
  Haushalt wird hier noch die eine oder andere schwere Entscheidung erzwingen. Und
  danach geht weiter: Im Sommer will die Bundesregierung die Rentenreform in Angriff
  nehmen, bis Ende des Jahres die Einkommensteuerreform. Das alles zeigt: Die Bundesregierung
  bringt die Reformen auf den Weg, die viel zu lange haben auf sich warten lassen.
  Alle Umfragen zeigen, dass die Menschen im Land diese Entscheidungen auch erwarten.
  Und die Bundesregierung muss nun zeigen: Wir können Kompromisse. „Wir können nicht
  einfach so weitermachen wie in den letzten 20 Jahren. Wir müssen zeigen, dass wir
  uns verändern können. Kranken-, Pflege- und Rentenversicherung sind drei große Reformprojekte.
  Wir hoffen, dass daraus mehr Zuversicht entsteht“. Bundeskanzler Merz auf X am 29.
  April 2026 Wir freuen uns über Ihr Feedback: Nutzen Sie bitte dafür das Kontaktformular
  (nicht die Antwortfunktion auf diese E-Mail).'
