title: Pressestatement von Bundeskanzler Merz und Bundesministerin Warken im Anschluss
  an die Kabinettssitzung „Gesundheit muss bezahlbar bleiben“
text: 'Bundesministerin Warken und Bundeskanzler Merz wollen steigende Krankenkassenbeiträge
  verhindern. Bundeskanzler Friedrich Merz und Bundesgesundheitsministerin Nina Warken
  haben nach dem Kabinett ein Pressestatement zur geplanten Reform der gesetzlichen
  Krankenkassen abgegeben. „Wir haben innerhalb kürzester Zeit diese große Reform
  unseres Gesundheitssystems auf den Weg gebracht“, erklärte Bundeskanzler Friedrich
  Merz. Ziel sei es, die Beiträge stabil zu halten, Kosten zu senken und das System
  langfristig finanzierbar zu machen. Das beschlossene Maßnahmenpaket sei sehr breit
  angelegt: Alle müssten ihren Beitrag leisten – „Ärzte, Krankenhäuser, Apotheken,
  die pharmazeutische Industrie, Versicherte und auch Arbeitgeber.“ Meine Damen und
  Herren, herzlich willkommen heute Morgen im Bundeskanzleramt! Entgegen den üblichen
  Gewohnheiten wende ich mich heute nach der Kabinettssitzung direkt an Sie. Ich tue
  das an der Seite unserer Bundesgesundheitsministerin, Nina Warken, denn heute ist
  ein besonderer Tag, auch für die Bundesregierung. Denn wir haben heute Morgen eine
  Reform der gesetzlichen Krankenversicherung beschlossen, die wir durchaus historisch
  nennen dürfen. Wir haben in einer großen Kraftanstrengung innerhalb kürzester Zeit
  Vorschläge der von uns eingesetzten FinanzKommission Gesundheit geprüft, sie angepasst
  und in ein Gesetz überführt, das heute die erste wichtige Hürde genommen hat, nämlich
  im Bundeskabinett. Wir haben innerhalb kürzester Zeit diese große Reform unseres
  Gesundheitssystems auf den Weg gebracht. Mit dieser Reform schaffen wir für lange
  Jahre Sicherheit für die Menschen in Deutschland, für die Versicherten, aber auch
  für alle, die mit diesem Gesundheitssystem zusammenarbeiten. Es geht für uns vor
  allen Dingen um Beitragsstabilität und um dauerhafte Verlässlichkeit unseres Gesundheitssystems.
  Wir machen mit dieser Reform das Gesundheitssystem in Deutschland für alle bezahlbar.
  Denn Gesundheit muss bezahlbar bleiben für die Bürgerinnen und Bürger in unserem
  Land, und wenn die Beiträge auf längere Zeit nicht steigen müssen, dann ist das
  eine wichtige Botschaft. Das ist aber auch eine wichtige Botschaft für Unternehmen,
  für den Mittelstand, für das Handwerk. Sie alle bekommen Planungssicherheit, weil
  sie eben nicht mehr mit ständig steigenden Beiträgen in der gesetzlichen Krankenversicherung
  rechnen müssen. Wir verhindern mit dem weiteren Anstieg auch einen Anstieg der Arbeitskosten.
  Das ist die zentrale Botschaft, auch an die Beschäftigten und an die Unternehmen.
  Die Reform bringt Klarheit für Ärztinnen und Ärzte, sie bringt Klarheit für Pflegerinnen
  und Pfleger, sie bringt Klarheit für die pharmazeutische Industrie, für die gesamte
  Gesundheitsbranche. Jeder weiß nun, woran er ist, womit er rechnen kann, welche
  Leistungen noch bezahlt werden können und welche eben auch nicht mehr. Diese Reform
  der Krankenversicherung stellt eine der größten Sozialstaatsreformen der letzten
  Jahrzehnte dar. Das ist so. Im Bereich der gesetzlichen Krankenversicherung hat
  es eine solche Reform das letzte Mal vor gut 20 Jahren gegeben; so lange ist es
  her. Wir haben in dieser Zeit leider zu viel ausgegeben. Diese Dynamik mussten wir
  stoppen, um das System insgesamt bezahlbar zu halten. Lassen Sie mich einige Zahlen
  nennen. Ohne die heute beschlossene Reform hätten uns bereits 2027 geschätzt 15 Milliarden
  Euro zur Finanzierung der gesetzlichen Krankenversicherung gefehlt. Dieses Defizit
  wäre bis zum Jahr 2030 auf 40 Milliarden Euro pro Jahr angewachsen. Ohne die heute
  beschlossene Reform würde die gesetzliche Krankenversicherung für alle sehr viel
  teurer, denn die jetzt schon hohen Beiträge der Versicherten müssten unausweichlich
  weiter – um die geschätzten zwei Prozentpunkte – steigen. Damit würden auch die
  Kosten für den Faktor Arbeit weiter steigen, mit verheerenden Folgen für alle, für
  Wirtschaft, Konjunktur und am Ende auch für den Arbeitsmarkt. Ohne die heute beschlossene
  Reform würde auch eine der wichtigsten Säulen unseres Sozialstaats auf Dauer instabil
  werden, und deswegen haben wir sie heute beschlossen. Das nun getroffene Maßnahmenpaket
  ist dabei sehr breit angelegt. Es bezieht alle Bereiche und Beteiligten des Gesundheitswesens
  ein, denn es soll gerecht zugehen in unserem Land. Daher müssen alle einen Beitrag
  leisten, Ärzte, Krankenhäuser, Apotheken, die pharmazeutische Industrie, Versicherte
  und auch Arbeitgeber. Ja, meine Damen und Herren, damit zeigt die Koalition heute,
  dass sie entscheidungswillig und entscheidungsfähig ist. Wir können Kompromisse,
  und wir handeln sie aus, auch wenn es dann manchmal zwischendurch etwas wackelt.
  Aber das gehört dazu. Ich kann es nicht oft genug wiederholen: So ist eben Demokratie.
  Ich blicke jetzt zuversichtlich auf die weiteren Reformen, die wir vorhaben, die
  wir uns vorgenommen haben. Zeitnah wird die Reform der Pflegeversicherung auf den
  Weg gebracht werden – die Bundesgesundheitsministerin wird dazu schon sehr bald
  ihren Gesetzentwurf vorlegen –, und wir werden noch in diesem Sommer die Reform
  der gesetzlichen Rentenversicherung in Angriff nehmen. Das ist die zweite große
  sozialpolitische Reform, die wir uns dann vornehmen. Wir sind aber bei der gesetzlichen
  Krankenversicherung auch noch nicht am Ende. Die FinanzKommission Gesundheit wird
  ihre Arbeit fortsetzen. Den heute kurzfristigen Maßnahmen in der gesetzlichen Krankenversicherung
  müssen weitere mittel- bis langfristig wirkende Strukturreformen folgen. Aber bevor
  ich das noch im Einzelnen erläutern will, will ich an dieser Stelle Nina Warken
  wirklich sehr herzlich für ihre großartige Arbeit danken, die sie in den letzten
  zwölf Monaten geleistet hat, insbesondere in den letzten Wochen. Sie hat mit sehr
  viel Mut, mit Augenmaß, mit Ehrlichkeit, mit Empathie eine Reform vorgelegt, die
  beispielhaft ist für all die großen Reformen, die wir in der Koalition noch leisten
  wollen. Ich will dir einfach ganz herzlich auch noch einmal persönlich danken, liebe
  Nina. Der Entschlossenheit und dem Tempo, das du hier vorgelegt hast, gebührt allergrößte
  Anerkennung, und du weißt, dass ich dich dabei immer unterstützt habe. Der Ball
  liegt nun im Parlament. Die Koalitionsfraktionen sollen den Gesetzentwurf jetzt
  zügig beraten und beschließen. Wir wollen, dass diese große Reform noch vor der
  parlamentarischen Sommerpause abgeschlossen werden kann und im Bundesrat dann auch
  beschlossen werden kann. Das Reformpaket ist nicht zustimmungspflichtig. Es braucht
  dann also auch kein langes Verfahren mehr im Bundesrat, sondern es kann dann mit
  der parlamentarischen Sommerpause zügig auch in Kraft gesetzt werden. Ich will kurz
  ergänzen, bevor ich Nina Warken gerne das Wort übergebe: Wir haben heute im Bundeskabinett
  mit den Eckwerten des Regierungsentwurfs zum Bundeshaushalt 2027 auch die Konsolidierung
  des Bundeshaushalts beschlossen. Ich will dem Finanzminister, Lars Klingbeil, danken,
  dass er diese Eckwerte vorbereitet und heute vorgelegt hat. Er ist in diesem Augenblick
  im Haushaltsausschuss des Deutschen Bundestages. Es ist verabredet, dass wir das
  heute an unterschiedlichen Stellen auch vertreten. Aber es ist für uns, für die
  Koalition, damit der dritte Haushalt, den wir innerhalb von zwölf Monaten auf den
  Weg bringen. Es gibt bedeutende Bereiche, für die wir weiter viel Geld ausgeben
  müssen, auch mehr als ursprünglich geplant. Das gilt insbesondere für unsere Verteidigungsfähigkeit
  und unsere Sicherheit im Bündnis. Wir stehen hier im Wort, und wir müssen gleichzeitig
  Prioritäten setzen. Die Entwicklungen im letzten Jahr, auch nicht zuletzt im Iran
  in den letzten Monaten, zeigen, wie wichtig die Investitionen in unsere Verteidigungsfähigkeit
  sind. Wir wollen uns verteidigen können, damit wir uns nicht verteidigen müssen.
  Diesen Satz kennen Sie von mir, und dem ist auch der Haushalt untergeordnet. Es
  gibt andere Bereiche, in denen wir sparen müssen, insbesondere im Bereich der staatlichen
  Verwaltung. Der Staat muss schlanker und effizienter werden. Eine konsequente Digitalisierung
  und Modernisierung ist hierfür ein wesentlicher Treiber. Wir sind hier auf einem
  guten Weg. Die Maßnahmen müssen aber erst wirken, um ihr ganzes Einsparungspotenzial
  auch zu entfalten. Aber ich will hier ein Beispiel nennen, das nach meiner Auffassung
  auch durchaus stärker betont werden kann: Für die Bundesbehörden gehen wir mit gutem
  Beispiel voran. Die Stelleneinsparung für das Haushaltsjahr in Höhe von zwei Prozent
  kommt faktisch einem Einstellungsstopp für die Bundesverwaltung gleich. Ausgenommen
  sind davon nur die Sicherheitsbereiche. Für 2027 haben wir den bestehenden Handlungsbedarf
  damit in großen Teilen adressiert. Aber es liegt in den kommenden Wochen und Monaten
  noch viel Arbeit vor uns, um die erforderlichen Details des Bundeshaushaltes 2027
  auch auszuarbeiten. Damit, meine Damen und Herren, will ich das Wort gerne an Nina
  Warken übergeben, aber dies Ganze noch einmal wirklich mit dem Dank dafür verbinden,
  wie sie in den letzten Wochen ihre Arbeit geleistet hat und was wir heute gemeinsam
  auch im Kabinett auf den Weg bringen konnten. Das ist eine gemeinsame Arbeit der
  Koalition. Hier gibt es keine Gewinner und keine Verlierer. Hier hat sich niemand
  gegen den anderen durchgesetzt oder etwas verhindert, sondern wir haben hier gemeinsam
  einen wirklich guten Gesetzentwurf miteinander verabschiedet. Ich will es noch einmal
  sagen: Ich hoffe, dass wir das jetzt auch schnell durch das parlamentarische Verfahren
  bringen. Aber dazu wird dann auch Nina Warken noch etwas sagen. Sehr geehrter Herr
  Bundeskanzler, sehr geehrte Damen und Herren, herzlichen Dank zum einen für die
  persönliche Unterstützung, die Unterstützung des Bundeskanzleramts, aber zum anderen
  natürlich auch allen beteiligten Ressorts für die gemeinsame Kraftanstrengung! Nicht
  einmal einen Monat, nachdem die eingesetzte FinanzKommission Gesundheit die Empfehlungen
  vorgelegt hat, haben wir heute einen Gesetzentwurf zur Stabilisierung der gesetzlichen
  Krankenversicherung beschlossen. Es war tatsächlich ein Kraftakt. Es war ein ambitionierter
  Zeitplan. Es hat aber auch ganz klar gezeigt, dass wir als Bundesregierung dazu
  imstande sind, schnell umfassende Reformen auf den Weg zu bringen. Nach Jahren der
  Beitragserhöhungen der Krankenkassen legen wir dem Bundestag und dem Bundesrat jetzt
  eine ausgewogene Grundlage vor, um die gesetzliche Krankenversicherung endlich wieder
  auf ein solides finanzielles Fundament zu stellen. Klar ist: Ohne diese Reformen
  wären die Belastungen für alle, für die Versicherten und für die Unternehmen, in
  den nächsten Jahren wesentlich höher. – Wir haben jetzt ein ausgeglichenes Paket
  beschlossen, das alle Beteiligten mit einbezieht. Es gilt der Grundsatz: Niemand
  wird ausgenommen, und alle müssen ihren Beitrag leisten. Wir folgen damit im Wesentlichen
  zwei Leitlinien, zum ersten: Wir können nicht immer weiter mehr Geld ausgeben als
  von den Krankenkassen eingenommen wird. – Das ist eigentlich eine einfache Regel.
  Wir setzen sie jetzt auch tatsächlich um. Wir werden die Ausgabensteigerungen in
  Zukunft an die Einnahmen koppeln. Das ist keine pauschale Kürzung, sondern eine
  Begrenzung der Mehrausgaben. Das klingt simpel, bedeutet aber einen verantwortungsvollen
  Umgang mit den Beitragsgeldern der Versicherten. Viel zu lange wurde von diesem
  Grundsatz abgewichen. Die zweite Leitlinie ist, dass Ausgaben nur noch dann getätigt
  werden können, wenn dadurch nachweislich die Versorgung der Versicherten verbessert
  wird. Das bedeutet, dass Ausgaben, die ihr Ziel verfehlt haben, wieder zurückgedreht
  werden müssen. Meine Damen und Herren, die Reform verlangt allen Seiten eine ganze
  Menge ab. Das ist mir durchaus bewusst, und das möchte ich auch ausdrücklich anerkennen.
  Dennoch steht für mich außer Frage, dass wir diese Reform brauchen und dass sie
  längst überfällig ist. In dem Zusammenhang ist mir wichtig, noch zwei Punkte zu
  betonen: Bei allen Maßnahmen, die die Versicherten belasten, sei es die Erhöhung
  der Zuzahlungsgrenzen oder die Absenkung des Festzuschusses für den Zahnersatz,
  standen die bisher bestehenden Härtefallregelungen für uns nie zur Disposition.
  Das Zweite ist: Die nun geplante Regelung für die Mitversicherung von Ehepartnern
  in der gesetzlichen Krankenversicherung ist deutlich abgemildert umgesetzt gegenüber
  dem, was in den letzten Wochen diskutiert oder auch von der Kommission vorgeschlagen
  wurde. – Der Gesetzentwurf ist sozialverträglich und belastet niemanden über Gebühr.
  Er ist auch gerecht, weil wir jetzt auch über die GKV hinaus den notwendigen Einstieg
  in die Steuerfinanzierung der Kosten für die Bürgergeldempfänger schaffen, in einen
  höheren, angemessenen Beitrag des Bundes in diese Finanzierung. Für Versicherte
  und Unternehmen schafft der Gesetzentwurf Planbarkeit. Die Mehrbelastungen bleiben
  über Jahre konstant und zeigen deutlich, dass wir überwiegend auf der Ausgabenseite
  ansetzen. Das ist auch ein wichtiges Zeichen für den Standort Deutschland. Wir müssen
  diese Effizienz zwingend erreichen und ein nachhaltig finanziertes Gesundheitssystem
  haben. Denn nur ein solches kann die Versorgung in Zukunft tatsächlich sicherstellen.
  Wir wollen eine verlässliche Gesundheitsversorgung für unsere Bürgerinnen und Bürger,
  und sie muss auf einer finanziell stabilen Grundlage stehen. Deswegen freue ich
  mich auch auf die weiteren parlamentarischen Beratungen und hoffe auf ein zügiges
  parlamentarisches Verfahren. Danach werden wir auch die übrigen strukturellen Reformen
  angehen, das Primärversorgungssystem, die Notfallreform, ein Gesetz zum Bürokratieabbau.
  Die Kommission wird uns weitere Vorschläge vorlegen, die wir dann auch zügig umsetzen
  wollen. Heute ist der erste Schritt gemacht, ein stabiles Fundament für die gesetzliche
  Krankenversicherung. Die weiteren Schritte gehen wir dann auch gemeinsam. Frage:
  Herr Bundeskanzler, Sie haben von „historisch“ gesprochen. Aber man kann fragen,
  ob die Ambitionen nicht doch etwas heruntergeschraubt wurden, weil die Kommission
  ja sehr viel größere Einsparvorschläge unterbreitet hat und die Bundesministerin
  ja erst einmal von Einsparungen in Höhe von über 19 Milliarden Euro ausging, zumal
  die Regierungsfraktionen ihrerseits angekündigt haben, dass im parlamentarischen
  Verfahren Punkte noch geändert würden. Deswegen die Frage: Reicht das Volumen wirklich
  aus? Hätte man es nicht höher ansetzen sollen? Bundeskanzler Friedrich Merz: Der
  entscheidende Punkt ist, dass wir das drohende Defizit, das für das Jahr 2027 bei
  15 Milliarden Euro liegt, jetzt mehr als ausgleichen. Wir haben sogar noch einen
  kleinen Puffer. Der ist allerdings in der Tat durch die Beratungen der letzten Wochen
  ein wenig kleiner geworden, aber er ist nach wie vor vorhanden. Jetzt gibt es aber
  keinen Spielraum mehr, im Sinne dieses Reformvorhabens weitere Korrekturen nach
  unten vorzunehmen; insofern muss dieser Betrag der Einsparungen jetzt auch im parlamentarischen
  Verfahren beibehalten werden. Wenn es im parlamentarischen Verfahren Vorschläge
  geben sollte, irgendetwas an der Reform zu ändern, dann muss es also an anderer
  Stelle ausgeglichen werden. Es ist das gute Recht des Deutschen Bundestages, entsprechende
  Vorschläge zu machen. Wir werden uns an dieser Debatte natürlich auch im Parlament
  beteiligen. Wir haben aber das Einsparziel erreicht, das mit den Vorschlägen der
  FinanzKommission Gesundheit auch mehr als erreicht worden wäre. Insofern sind wir
  im grünen Bereich. Wahr ist aber: Es geht nicht noch weniger. Insofern gibt es jetzt
  sozusagen einen gewissen Puffer, aber wir haben eine Punktlandung gemacht. Frage:
  Herr Bundeskanzler, Ihre Kanzlerschaft jährt sich nächste Woche zum ersten Mal.
  Sie haben gesagt, in der Koalition ruckele es auch mal. Der Eindruck, der zuletzt
  entstanden ist, ist eher der, dass es da auch mal rumst. Der Vizekanzler hat gesagt,
  er lasse sich auch mal anbrüllen. Gelegentlich werden Vergleiche zur Ampel gezogen.
  Können Sie garantieren, dass diese Koalition noch drei Jahre bis zum Ende der Legislaturperiode
  hält? Bundeskanzler Merz: Garantieren kann niemand für nichts. Ich will auch noch
  einmal klarstellen: Ich brülle niemanden an. Wir haben natürlich hin und wieder
  Diskussionen, auch streitige Diskussionen. Aber Sie sehen an dem Beispiel des heutigen
  Tages, dass wir handlungswillig und handlungsfähig sind. Wir haben heute zwei große
  Entscheidungen getroffen: Wir haben die Eckwerte für den Haushalt 2027 mit der Finanzplanung
  2026 bis 2030 verabschiedet – das hat die frühere Koalition schon aufgegeben, das
  hat sie gar nicht mehr gemacht; Finanzeckwerte sind in den Kabinettsberatungen gar
  nicht mehr auf der Tagesordnung gewesen –, und wir haben heute mit der GKV -Reform
  etwas gemacht, was seit 20 Jahren überfällig ist, oder sagen wir einmal, seit zehn
  Jahren eigentlich hätte gemacht werden müssen. Das zeigt, dass diese Koalition handlungsfähig
  ist, und wir treffen gute Entscheidungen. Frage: Herr Bundeskanzler, am Anfang Ihrer
  Amtszeit waren Sie sehr bemüht um ein einvernehmliches, gutes Verhältnis mit dem
  US -Präsidenten. In den letzten Wochen haben Sie die Tonlage gegenüber Trump aber
  spürbar verschärft. Können Sie uns vielleicht ein bisschen teilhaben lassen an Ihren
  Beweggründen für diese strategische oder jedenfalls rhetorische Neuausrichtung gegenüber
  dem US -Präsidenten? Haben Sie die Hoffnung auf ein kooperatives Verhältnis mit
  Trump aufgegeben, und was heißt das für das transatlantische Verhältnis? Bundeskanzler
  Merz: Nein, ganz und gar nicht. Das persönliche Verhältnis zwischen dem amerikanischen
  Präsidenten und mir ist jedenfalls aus meiner Sicht unverändert gut. Ich habe nur
  von Anfang an Zweifel gehabt an dem, was mit dem Irankrieg begonnen wurde, und deswegen
  habe ich das auch zum Ausdruck gebracht. Wir leiden in Deutschland und in Europa
  erheblich unter den Folgen etwa der Schließung der Straße von Hormus. Das hat unmittelbare
  Auswirkungen auf unsere Energieversorgung und das hat massive Auswirkungen auf unsere
  wirtschaftliche Leistungsfähigkeit. Insofern dränge ich darauf, dass dieser Konflikt
  beigelegt wird. Wir sind nach wie vor in guten Gesprächen miteinander. Der Bundesaußenminister
  ist heute Morgen aus New York zurückgekehrt und hat von vielfältigsten Gesprächen
  berichtet, die er dort auch mit der amerikanischen Regierung geführt hat. Wir sind
  also nach wie vor, um es englisch bzw. amerikanisch zu sagen, „ on good speaking
  terms “.'
