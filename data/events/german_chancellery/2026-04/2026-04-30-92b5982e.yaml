title: 'Staatsminister Weimer zum Tag der Pressefreiheit: „Pressefreiheit ist die
  Grundbedingung der Demokratie“'
text: 'Zum Tag der Pressefreiheit am 3. Mai erklärt der  Staatsminister für Kultur
  und Medien, Wolfram Weimer, vorab: „Der Tag der Pressefreiheit erinnert uns an das
  Grundrecht der Meinungsfreiheit: Jeder soll sagen, was er denkt, und soll es auch
  berichten können. Das ist die unverzichtbare Grundbedingung der Demokratie. Leider
  erleben wir in der Welt, dass die Räume der Freiheit immer enger werden. Ein Land
  nach dem anderen verabschiedet sich gerade von der Pressefreiheit und damit von
  der Demokratie. Vielen Journalisten wird ihre Arbeit durch politischen Druck unmöglich
  gemacht. Sie werden bedroht, verfolgt oder gefoltert. Deswegen ist dieser Tag so
  wichtig, um auf die mutigen Journalistinnen und Journalisten in Ländern wie Venezuela,
  in Russland, im Iran und vielen anderen aufmerksam zu machen.“'
