title: Pressestatement des Bundeskanzlers anlässlich seines Besuchs beim Deutschen
  Heer Bundesregierung setzt auf Aufwuchs und Stärkung der Bundeswehr
text: 'Bei seinem Truppenbesuch bekräftigte Kanzler Merz, dass die Bundeswehr konsequent
  gestärkt wird, um kurzfristig verteidigungsfähig und langfristig zukunftsfähig zu
  sein. Bundeskanzler Merz besuchte gemeinsam mit Vizekanzler und Bundesminister der
  Finanzen Lars Klingbeil das Deutsche Heer auf dem Truppenübungsplatz Munster, um
  sich persönlich ein Bild von Einsatzfähigkeit und Ausrüstung der Truppe zu machen.
  Dabei wurde deutlich: Die Fähigkeiten und die Ausrüstung des Heeres seien beeindruckend,
  gleichzeitig bleibe noch viel zu tun, um die Abschreckungs- und Verteidigungsbereitschaft
  weiter zu erhöhen. Dafür wurden bereits wichtige Maßnahmen angestoßen – von höheren
  Verteidigungsausgaben bis hin zu neuen Beschaffungen und strukturellen Anpassungen.
  Dennoch seien weitere Kraftanstrengungen nötig. Die Bundeswehr leiste damit einen
  zentralen Beitrag für eine starke NATO und eine verlässliche transatlantische Partnerschaft.
  Meine Damen und Herren, noch einmal einen schönen guten Tag von meiner Seite! Ich
  freue mich sehr, heute meinen Antrittsbesuch beim deutschen Heer in Munster auf
  dem Truppenübungsplatz machen zu dürfen. Ich bin gern in Begleitung des Vizekanzlers
  und Bundesministers der Finanzen Lars Klingbeil hier, denn Munster ist sein Wahlkreis.
  Insofern ist das auch für mich ein Besuch in seinem Wahlkreis. Ich freue mich sehr
  darüber, und – ich darf das sagen – der Aufwuchs und die Stärkung der Bundeswehr
  ist ein Anliegen der gesamten Bundesregierung. Wir freuen uns, zu sehen, was daraus
  wird, denn Sicherheit und Freiheit sind keine Selbstverständlichkeit. Unsere Verantwortung
  für die Menschen im Land sowie für die Alliierten und Partner in der NATO machen
  es einfach notwendig, dass wir unserer Führungsrolle in der NATO und in Europa auch
  militärisch gerecht werden. Ich komme heute persönlich hierher, um mich auch von
  den Fortschritten zu überzeugen, die ich in der Ausrüstung und in der Kampfführung
  des Heeres sehe. Ich muss sagen, dass es beeindruckend ist, zu sehen, wozu das Heer
  heute fähig ist. Mit größtem persönlichem Engagement leisten die Soldatinnen und
  Soldaten ihren Dienst. Sie leisten den Dienst im Heer jeden Tag hervorragend für
  unser Land. Ich möchte mich dafür beim Inspekteur des Heeres, General Freuding,
  stellvertretend für alle Soldatinnen und Soldaten, ausdrücklich bedanken. Herzlichen
  Dank, dass wir heute Ihre Gäste sein dürfen! Bitte richten Sie den Soldatinnen und
  Soldaten auch noch einmal unseren Dank und unsere hohe Anerkennung für das, was
  Sie tun, aus. Wir haben gesehen, was Sie können. Aber wir sehen auch, dass noch
  ein gehöriges Stück des Weges vor uns liegt. Die gesamte Bundeswehr befindet sich
  im Umbruch. Wir müssen im Hier und Heute abschreckungs- und verteidigungsbereit
  sein, fähig zum „ fight tonight “. Gleichzeitig müssen wir uns auf die Herausforderungen
  von morgen und übermorgen vorbereiten. Dies wird weiterhin mit größten Kraftanstrengungen
  verbunden sein. Die Bedrohungen und die Art und Weise, wie Konflikte auf der Welt
  heute geführt werden, haben sich fundamental verändert. Sie werden sich auch noch
  weiter verändern. Auch das haben Sie uns heute hier eindrucksvoll gezeigt. In der
  Konsequenz heißt das für uns: Beschaffung, Strukturen, personelle Ausstattung und
  Infrastruktur müssen allesamt auf diese Veränderungen und neuen Herausforderungen
  ausgerichtet sein und synchronisiert werden. – Die ersten Schritte sind getan. Die
  Bundesregierung wird alles dafür tun, dass unsere Soldatinnen und Soldaten auch
  in Zukunft den Auftrag erfüllen können, den wir ihnen politisch geben, den Auftrag,
  der da lautet: Wir wollen weiterhin in Freiheit, in Frieden und in Sicherheit leben.
  Was die Bundeswehr hier in Munster leistet, ist nicht nur eindrucksvoll, sondern
  es ist ein wichtiger und unverzichtbarer Beitrag zu einer starken, einigen NATO
  . Diese Arbeit leisten wir hier, aber auch an anderen strategisch wichtigen Standorten
  in Deutschland, Seite an Seite mit den Vereinigten Staaten von Amerika, Seite an
  Seite mit den Bündnispartnern in der gesamten NATO . Es ist ein gutes Zeichen, dass
  erst gestern der kommandierende General der US -Streitkräfte in Europa und Afrika
  hier in Munster war und diese Übung auch engstens begleitet. Denn diese Arbeit leisten
  wir Schulter an Schulter zum gegenseitigen Nutzen und in tiefer transatlantischer
  Verbundenheit. In den vergangenen zwölf Monaten hat die Bundesregierung höchste
  Anstrengungen unternommen, um die Sicherheit Deutschlands zu stärken. Die Haushaltseckwerte,
  die das Kabinett gestern in Berlin beschlossen hat, sehen einen wuchtigen Aufwuchs
  des Verteidigungshaushaltes vor. Die Bundeswehr wächst mit einem ehrgeizigen Zeitplan.
  Massive Beschaffungsvorhaben sind auf den Weg gebracht. Der Motor unserer Verteidigungsindustrie
  ist wieder angesprungen. Dies alles ist eine notwendige Investition in die deutsche
  und in die europäische Sicherheit. Genauso ist es ein Beitrag zu einer erneuerten
  transatlantischen Partnerschaft. Ich habe das mehrfach betont. Wir setzen und in
  diesem Geist auch dafür ein, die iranische Blockade der Straße von Hormus jetzt
  schnell zu beenden. Wenn die entsprechenden Voraussetzungen gegeben sind, dann steht
  Deutschland bereit, sich auch militärisch zu engagieren, um die Freiheit der Seewege
  zu gewährleisten. Vor dem Europäischen Rat in der vergangenen Woche auf Zypern habe
  ich dafür geworben, den Sanktionsdruck auf Teheran noch einmal zu erhöhen. Denn
  wenn die Straße von Hormus blockiert bleibt, dann führt das zu massiven wirtschaftlichen
  Schäden für uns alle. Unsere Botschaft lautet daher: Der Iran muss an den Verhandlungstisch
  kommen. Er muss aufhören, auf Zeit zu spielen. Er darf nicht länger die ganze Region
  und letztendlich die ganze Welt zur Geisel nehmen. Das militärische Nuklearprogramm
  im Iran muss beendet werden. Es darf keine Schläge mehr gegen Israel und die Partner
  in der Region geben. Zu all diesen Fragen stehen wir in einem engen und vertrauensvollen
  Kontakt mit unseren Partnern, auch und gerade in Washington . Wir tun das im gemeinsamen
  transatlantischen Interesse. Wir tun es mit gegenseitigem Respekt und fairer Lastenteilung.
  Dabei folgen wir gerade in dieser unruhigen Phase einem klaren Kompass. Dieser Kompass
  bleibt auf eine starke NATO und eine verlässliche transatlantische Partnerschaft
  ausgerichtet. Uns und auch mir persönlich – das wissen Sie – liegt diese transatlantische
  Partnerschaft besonders am Herzen. In diesem Sinne noch einmal herzlichen Dank und
  auch den Soldatinnen und Soldaten der Bundeswehr viel Erfolg bei dem, was sie im
  Interesse der Sicherheit und der Freiheit unseres Landes leisten! Ich persönlich
  bin tief beeindruckt von dem, was wir hier sehen konnten. Ich denke, ich darf das
  auch im Namen von Lars Klingbeil sagen. Das war wirklich eine überzeugende Vorführung
  dessen, was wir in den letzten Monaten und Jahren aufgeholt haben. Aber genauso
  klar ist auch, dass wir diese Arbeit weiter voranbringen müssen. Dazu wünsche ich
  dem Heer, den Soldatinnen und Soldaten des Heeres, stellvertretend Ihnen, Herr Generalinspekteur,
  wirklich jeden Erfolg. Sie können sich auf die Unterstützung der Politik verlassen.'
