title: Fuel prices and structural reforms Governing coalition agrees on rapid aid
  for consumers and the economy
text: In order to cushion the impact of high fuel prices, fuel tax is to be reduced
  for two months. In view of the high energy prices, the governing coalition of the
  CDU , the CSU and the SPD has agreed on tangible relief measures for citizens and
  companies. A key element is the reduction in fuel tax, which is to be reduced by
  around 17 cents per litre for two months. Federal Chancellor Friedrich Merz emphasised
  that this step would “very quickly improve the situation for car drivers and businesses
  in the country, and especially for those who travel a lot by car, particularly for
  professional reasons”. With these measures, the governing coalition aims to provide
  short-term relief for citizens and the economy while simultaneously introducing
  structural reforms. Chancellor Merz emphasised that the coalition was on the right
  track here, while also making it clear that there is still a lot to do. “This is
  just the beginning”, said Merz.
