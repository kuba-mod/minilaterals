date: '2026-04-24'
type: press_release
source_name: german_chancellery
title: Beschluss der Europäischen Union Neues Sanktionspaket gegen Russland
text: 'Deutschland und die EU stehen fest an der Seite der Ukraine. Die EU ‑Mitgliedstaaten
  haben das 20. Sanktionspaket gegen Russland angenommen. Damit bekräftigt die Europäische
  Union ihr festes Bekenntnis zu einer freien und souveränen Ukraine. Die neuen Maßnahmen
  sollen den Druck auf Russland erhöhen, ernsthafte Verhandlungen zu Bedingungen aufzunehmen,
  die für die Ukraine akzeptabel sind. Jeder weitere Angriff auf die zivile Infrastruktur
  verlängert das Leid der ukrainischen Bevölkerung. Das Paket umfasst weitreichende
  Schritte zur Schwächung des russischen Energiesektors. Insgesamt 36 neue Einträge
  betreffen Unternehmen entlang der gesamten Öl‑Wertschöpfungskette. Die EU erweitert
  zudem die Maßnahmen gegen die russische Schattenflotte und listet weitere Schiffe
  sowie einen großen Seeversicherer. Damit stehen nun 632 Schiffe auf der EU ‑Liste.
  Für den Verkauf von Tankschiffen aus der EU gelten künftig strengere Sicherheitsvorkehrungen,
  darunter eine verpflichtende „ No Russia “-Klausel. Zusätzlich werden die Häfen
  Murmansk, Tuapse und erstmals ein Drittlandhafen in Indonesien gelistet. Das Paket
  schafft außerdem die Grundlage für ein künftiges Seeverkehrsverbot für russisches
  Rohöl und Erdölerzeugnisse. Wartungsdienste für russische LNG ‑Tanker und Eisbrecher
  werden untersagt. Auch LNG ‑Terminaldienste dürfen nicht mehr für russische Betreiber
  erbracht werden. Die EU schließt zwanzig weitere russische Banken vom Binnenmarkt
  aus. Insgesamt sind nun siebzig Institute betroffen. Auch Banken in Kirgisistan,
  Laos und Aserbaidschan, die Russland bei der Umgehung von Sanktionen unterstützen,
  unterliegen neuen Transaktionsverboten. Geschäfte mit russischen Krypto‑Dienstleistern
  und dezentralen Plattformen werden vollständig untersagt. Die Nutzung des Stablecoins
  RUBx sowie des digitalen Rubels werden verboten. Zudem werden Zahlungsdienste blockiert,
  die internationale Transaktionen zur Umgehung von Sanktionen ermöglichen. Neue Ausfuhrverbote
  betreffen Waren im Wert von über 365 Millionen Euro, darunter Kautschuk und landwirtschaftliche
  Maschinen. Zusätzlich werden Exportkontrollen für militärisch relevante Güter wie
  Sprengstoffe, Laborglas oder Hochleistungsschmierstoffe verschärft. Cyber sicherheitsdienste
  für Russland werden eingeschränkt. Auf der Importseite führt die EU neue Verbote
  für Metalle, Chemikalien und Mineralien im Wert von über 530 Millionen Euro ein.
  Die Einfuhr von Ammoniak wird künftig kontingentiert. Die EU listet 58 weitere Unternehmen
  und Personen, die an der Herstellung militärischer Güter beteiligt sind, darunter
  Drohnenproduzenten. Auch Firmen aus Drittstaaten wie China, den Vereinigten Arabischen
  Emiraten, Usbekistan, Kasachstan und Belarus werden erfasst, wenn sie Russland mit
  Dual‑Use ‑Gütern oder Waffensystemen beliefern. Erstmals aktiviert die EU ihr Antiumgehungsinstrument.
  Die Kirgisische Republik hat systematisch versäumt, die Weiterleitung sensibler
  EU ‑Güter nach Russland zu verhindern. Insgesamt werden 60 Organisationen neu gelistet,
  darunter 32 in Russland und 28 in Drittstaaten. Das Paket umfasst 120 weitere Einträge.
  Betroffen sind 33 Einzelpersonen und 83 Einrichtungen. Dazu zählen Oligarchen, Verantwortliche
  für die Deportation ukrainischer Kinder, Propagandisten sowie Akteure, die am Diebstahl
  kulturellen Erbes beteiligt sind. Die EU stärkt den Schutz europäischer Unternehmen
  vor missbräuchlichen Klagen in Russland. Gerichte der Mitgliedstaaten können künftig
  Geldbußen gegen Personen verhängen, die solche Verfahren initiieren. Unternehmen
  können Schadensersatz verlangen, wenn entsprechende Urteile in Drittstaaten vollstreckt
  werden. Zudem werden Transaktionsverbote gegen Akteure verhängt, die unrechtmäßige
  Enteignungen oder den Diebstahl geistigen Eigentums europäischer Firmen ausnutzen.
  Die EU geht verstärkt gegen Propaganda vor. Spiegelmedien, die Inhalte gelisteter
  russischer Staatsmedien verbreiten, werden blockiert. Im Forschungsbereich wird
  die Annahme von Finanzmitteln der russischen Regierung untersagt. Dies betrifft
  Hochschulen, Forschungsinstitute und verbundene Personen in der EU . Auf der Seite
  des Europäischen Rates finden Sie einen ausführlichen Überblick über die EU -Sanktionen
  gegen Russland. Die Europäische Union hat am 23. Oktober 2025 ihr 19. Sanktionspaket
  gegen Russland beschlossen. Ziel ist es, den Druck auf die russische Kriegswirtschaft
  weiter zu erhöhen und Schlupflöcher zu schließen. Die Maßnahmen richten sich gegen
  zentrale Wirtschaftsbereiche wie Energie, Finanzen, Handel, Dienstleistungen und
  Sonderwirtschaftszonen. Auch Personen und Organisationen, die an der Entführung
  und Indoktrination ukrainischer Kinder beteiligt sind, werden sanktioniert. Ab dem
  1. Januar 2027 gilt ein vollständiges Einfuhrverbot für russisches Flüssigerdgas
  ( LNG ) aus langfristigen Verträgen. Für kurzfristige Verträge greift das Verbot
  sechs Monate nach Inkrafttreten. Die Ausnahmen für Öl- und Gaseinfuhren von Rosneft
  und Gazprom Neft in die EU entfallen. Transaktionen mit diesen Unternehmen sind
  künftig verboten. Die EU sanktioniert erstmals Drittlandunternehmen, darunter chinesische
  Raffinerien und Händler, die russisches Rohöl kaufen. Die Liste der russischen Schattenflotte
  wird um 117 Schiffe erweitert – insgesamt sind nun 557 Schiffe gelistet. Sie dürfen
  keine EU -Häfen anlaufen und keine Dienstleistungen empfangen. Hafeninfrastruktur
  in Drittländern, die für Russlands Kriegsführung relevant ist, kann künftig gelistet
  werden. Energiebezogene Dienstleistungen wie geologische Prospektion und Kartierung
  werden zusätzlich verboten. Exportverbote betreffen Güter mit doppeltem Verwendungszweck,
  fortschrittliche Technologien, Baumaterialien, Salze, Erze und Kautschukprodukte
  im Wert von 155 Mio. Euro. Neue Einzelsanktionen treffen Unternehmen und Personen
  aus Russland, den Vereinigten Arabischen Emiraten und China, die militärische Güter
  liefern oder herstellen. 45 Organisationen – darunter 28 in Russland und 17 in Drittländern
  – werden gelistet, weil sie Sanktionen umgehen oder den militärisch-industriellen
  Komplex unterstützen. Fünf russische Banken unterliegen neuen Transaktionsverboten.
  Die russischen Zahlungssysteme Mir und SBP sowie SPFS-Nutzer in Belarus und Kasachstan
  werden sanktioniert. Erstmals werden Sanktionen gegen eine Rubel-gestützte Stablecoin
  (A7A5), deren Emittenten in Kirgisistan und eine Handelsplattform verhängt. Auch
  eine Kryptowährungsbörse in Paraguay wird sanktioniert. EU -Betreibern ist es untersagt,
  Kryptodienste und bestimmte Fintech -Dienste für Russland anzubieten. Transaktionsverbote
  gelten auch für fünf Banken aus Zentralasien, die Russlands Kriegswirtschaft unterstützen.
  Zwei russische Sonderwirtschaftszonen (Alabuga und Technopolis Moskau) unterliegen
  einem umfassenden Vertragsverbot. Dienstverbote betreffen digitale Fähigkeiten,
  KI -Dienste und weltraumgestützte Dienste. Für nicht verbotene Dienstleistungen
  an die russische Regierung gilt künftig eine Vorabgenehmigungspflicht. Rückversicherungsdienstleistungen
  für russische Schiffe und Luftfahrzeuge sind für bis zu fünf Jahre nach Verkauf
  an Drittländer verboten. Russische Diplomaten müssen künftig Reisen innerhalb der
  EU vorab anmelden. 69 neue Einträge auf der Sanktionsliste betreffen Oligarchen,
  Energieunternehmen, Goldproduzenten, Schattenflottenbetreiber und chinesische Staatsunternehmen.
  Elf weitere Personen, die an der Entführung und Indoktrination ukrainischer Kinder
  beteiligt sind, werden gelistet. Ein neues Aufnahmekriterium soll künftige Sanktionen
  gegen Verantwortliche erleichtern. Die EU hat am 18. Juli 2025 das 18. Sanktionspaket
  gegen Russland angenommen – eines der bislang schärfsten Maßnahmenpakete. Es zielt
  insbesondere auf den russische Energie-, Banken- und Militärsektor ab. Außerdem
  richtet es sich wieder gegen Sanktionsumgehungen und zieht Russland für seine Verbrechen
  gegen ukrainische Kinder und das kulturelle Erbe zur Rechenschaft. Im Energiesektor
  wurde die Preisobergrenze für russisches Rohöl von 60 auf 47,60 US -Dollar pro Barrel
  gesenkt. Künftig soll sie anhand eines dynamischen Ölpreisdeckels regelmäßig angepasst
  werden, und zwar stets 15 Prozent unter dem Weltmarktpreis. Das neue Maßnahmenpaket
  umfasst auch Sanktionen gegen die sogenannte „russische Schattenflotte“. Weitere
  105 Schiffe, die unter Umgehung bisheriger Sanktionen russisches Öl transportieren,
  wurden von der EU gelistet – insgesamt sind nun 444 Schiffe betroffen. Zudem ist
  die Einfuhr von Erzeugnissen aus russischem Rohöl, die in Drittstaaten raffiniert
  wurden, verboten. Jegliche Transaktionen im Zusammenhang mit den Gaspipelines Nord
  Stream 1 und 2 sind ebenfalls untersagt, sodass eine Wiederinbetriebnahme ausgeschlossen
  ist. Die finanziellen Sanktionen zielen darauf ab, Russlands Zugang zum europäischen
  Finanzsystem weiter einzuschränken. Insgesamt wurden 45 russische Banken vollständig
  ausgeschlossen. Erstmals weitet die EU ihre Maßnahmen auch auf Finanzinstitute in
  Drittstaaten wie China und der Türkei aus – insbesondere dann, wenn sie Sanktionen
  umgehen oder mit Kryptowährungen arbeiten. Die Bereitstellung von Bank software
  an russische Institutionen wurde ebenfalls untersagt, um technische Unterstützung
  für Finanztransaktionen zu verhindern. Handelspolitisch richtet sich das Paket insbesondere
  gegen den russischen militärisch-industriellen Komplex. Die Liste verbotener Dual-Use-
  Güter wurde deutlich erweitert und umfasst nun auch CNC -Maschinen sowie chemische
  Komponenten, die zur Herstellung von Treibstoffen dienen können. Sanktionen wurden
  auch gegen Unternehmen aus Russland, China, Hongkong und der Türkei verhängt, die
  militärisch relevante Güter liefern und somit zur russischen Kriegsführung beitragen.
  Belarus wurde ebenfalls einbezogen: Acht belarussische Firmen, die Russland bei
  sicherheitsrelevanten Lieferungen unterstützen, sind betroffen. Das Sanktionspaket
  richtet sich gezielt gegen Personen, die für die Deportation und ideologische Umerziehung
  ukrainischer Kinder verantwortlich sind – über 80 Akteure wurden sanktioniert. Ebenso
  betroffen sind Personen, die das kulturelle Erbe der Ukraine in besetzten Gebieten
  manipulieren. Die EU setzt damit ein klares Zeichen gegen Menschenrechtsverletzungen
  und für strafrechtliche Verantwortung. Am 20. Mai 2025 hat die EU das 17. Sanktionspaket
  gegen Russland verabschiedet. Dieses Paket zielt darauf ab, Russlands Zugang zu
  zentraler Militärtechnologie zu unterbinden und die Einnahmen aus dem Energiesektor,
  die den Krieg gegen die Ukraine finanzieren, erheblich zu reduzieren. Besonders
  im Fokus steht die sogenannte „Schattenflotte” russischer Öltanker sowie deren Betreiber
  und ein großes russisches Ölunternehmen. Zusätzlich ist dieses Sanktionspaket Teil
  eines umfassenderen Maßnahmenpakets der EU . Es richtet sich auch gegen Russlands
  hybride Aktivitäten, Menschenrechtsverletzungen im Inland und den Einsatz von Polizeigewalt
  durch russische Streitkräfte in der Ukraine, die unter drei weiteren Sanktionsregimen
  behandelt werden. Die EU hat ihr bislang größtes Sanktionspaket gegen die sogenannte
  russische „Schattenflotte” verabschiedet. Die Zahl der betroffenen Schiffe wurde
  verdoppelt, sodass nun 342 Tanker mit Hafenzugangssperren und Dienstleistungsverboten
  belegt sind. Diese Schiffe transportieren russisches Öl unter riskanten und unregulierten
  Bedingungen und unterstützen damit Russlands Energiesektor. Ziel der Maßnahmen ist
  es, die operative Kapazität dieser Flotte zu zerschlagen und somit die Öleinnahmen
  zu reduzieren, die Russlands Kriegswirtschaft finanzieren. Zusätzlich verhängt die
  EU gezielte individuelle Sanktionen gegen Unternehmen und Akteure, die die Schattenflotte
  ermöglichen. Dazu gehören Schifffahrtsfirmen aus den Vereinigten Arabischen Emiraten,
  der Türkei und Hongkong sowie eine bedeutende Versicherungsgesellschaft der russischen
  Öltransportbranche. Seit der Einführung der EU -Sanktionen und der Ölpreisobergrenze
  sind die russischen Einnahmen erheblich gesunken – um 38 Milliarden Euro insgesamt.
  Die EU verhängt Sanktionen gegen über 45 russische Unternehmen und Einzelpersonen,
  die das russische Militär mit Drohnen, Waffen, Munition, Ausrüstung und wichtigen
  Komponenten unterstützen. Zusätzlich werden russische und chinesische Akteure ins
  Visier genommen, die dem russischen Militär- und Industriesektor Werkzeugmaschinen
  liefern. Auch aus Drittstaaten werden Unterstützer sanktioniert. Darüber hinaus
  erweitert die EU ihre Exportbeschränkungen für sogenannte Dual-Use -Güter und Technologien,
  um die militärische Infrastruktur Russlands weiter einzuschränken. 31 neue Einheiten
  werden wegen der Umgehung bestehender Handelsverbote gelistet. Zusätzlich verschärft
  die EU ihre Maßnahmen gegen den Export von Gütern, die Russlands Verteidigungs-
  und Sicherheitssektor stärken, darunter chemische Vorprodukte für energetische Materialien
  sowie Ersatzteile für Werkzeugmaschinen. Die EU verhängt weitere Sanktionen gegen
  „Surgutneftegaz”, eines der wichtigsten russischen Ölunternehmen, das erhebliche
  Einnahmen für die russische Regierung generiert und damit direkt zur Kriegsführung
  beiträgt. Zudem wurde ein bedeutendes russisches Öltransportunternehmen auf die
  Sanktionsliste gesetzt. Die EU hat 75 weitere Personen und Organisationen auf ihre
  Sanktionsliste gesetzt – insgesamt sind nun über 2400 Personen und Unternehmen betroffen.
  Diese Maßnahmen beinhalten das Einfrieren von Vermögenswerten und ein Verbot für
  EU -Bürgerinnen und -Bürger sowie Unternehmen, finanzielle Mittel bereitzustellen.
  Zudem unterliegen natürliche Personen einer Reisebeschränkung und dürfen nicht in
  die EU einreisen oder dort durchreisen. Zum dritten Jahrestag der russischen Invasion
  in die Ukraine hat die Europäische Union ihr 16. Sanktionspaket beschlossen. Darauf
  einigten sich die EU -Außenministerinnen und -minister am 24. Februar 2025 . Ziel
  ist es, den wirtschaftlichen und politischen Druck auf Russland weiter zu erhöhen.
  Das Paket umfasst verschärfte Maßnahmen gegen die russische Schattenflotte, weitgehende
  Handelsbeschränkungen sowie Sanktionen im Finanzsektor und gegen russische Medien.
  Die EU hatte bereits zuvor knapp 80 Schiffen das Einlaufen in Häfen untersagt und
  Unternehmen verboten, ihnen Dienstleistungen anzubieten. Nun werden 73 weitere Schiffe
  auf die Sanktionsliste gesetzt. Zudem wurden Regeländerungen vorgenommen, die es
  ermöglichen, nicht nur die Betreiber, sondern auch Eigentümer und Kapitäne dieser
  Schiffe mit Sanktionen zu belegen. Die Schattenflotte besteht aus Schiffen mit undurchsichtigen
  Eigentumsverhältnissen, die zur Umgehung von Sanktionen genutzt werden. Russland
  setzt zunehmend auf überalterte Tanker aus Drittstaaten, da eigene Schiffe nicht
  mehr so einfach einsetzbar sind. Neben dem Transport von Rohöl gibt es zudem Befürchtungen,
  dass diese Schiffe für Sabotageaktionen gegen Unterwasserinfrastrukturen genutzt
  werden könnten. Ein zentrales Element des neuen Pakets sind weitgehende Handelsrestriktionen.
  Unter anderem wird der Import von russischem Aluminium und Aluminiumlegierungen
  erheblich eingeschränkt. Zusätzlich wird der Export bestimmter Produkte untersagt,
  die für die russische Rüstungsindustrie von Bedeutung sind. Dazu zählen: Außerdem
  wurde ein Verbot von Transaktionen mit russischen Häfen und Flughäfen beschlossen,
  die bei der Umgehung der westlichen Ölpreisobergrenze eine Rolle spielen. Die EU
  hat weitere Maßnahmen im Finanzbereich ergriffen, um Russland wirtschaftlich zu
  schwächen. Dazu gehören: Die EU hat ferner ihre Liste von sanktionierten Einzelpersonen,
  Organisationen und Einrichtungen weiter ausgebaut, die mit Russlands militärisch-industriellem
  Komplex zusammenarbeiten. Neu hinzugefügt wurden 48 weitere Persone n und 35 Unternehmen
  und Organisationen . Diese unterliegen nun Vermögenssperren und EU -Einreiseverboten.
  Mit den neuen Maßnahmen hat die EU die Rundfunklizenzen von acht russischen Medienunternehmen
  ausgesetzt. Dies ist Teil der Bestrebungen, die Verbreitung von Propaganda und Desinformation
  aus Russland innerhalb der EU einzudämmen. Mit dem 16. Sanktionspaket erhöht die
  EU erneut den wirtschaftlichen und politischen Druck auf Russland. Die Maßnahmen
  zielen darauf ab, den Preis für die Fortführung des Krieges zu erhöhen. Die EU zeigt
  sich weiterhin entschlossen, Sanktionen zu verschärfen, sollte Russland seinen Angriffskrieg
  fortsetzen. Die EU hat im Dezember 2024 ein weiteres Sanktionspaket gegen Russland
  beschlossen, um die Umgehung bestehender Maßnahmen zu erschweren und den russischen
  militärisch-industriellen Komplex weiter zu schwächen. Erstmals sind auch chinesische
  Unternehmen betroffen, die Russland mit militärisch nutzbaren Komponenten versorgen.
  Der Rat hat 84 neue Listungen beschlossen, darunter 54 Einzelpersonen und 30 Organisationen,
  die zur Destabilisierung der Ukraine beitragen. Betroffen sind unter anderem Mitglieder
  der Militäreinheit, die das Kinderkrankenhaus Ochmatdyt in Kyjiw bombardierte, sowie
  Manager russischer Energieunternehmen. Erstmals wurden Sanktionen gegen chinesische
  Unternehmen verhängt, die Russland mit Drohnen-Komponenten und Mikroelektronik beliefern.
  Um Sanktionsumgehungen zu verhindern, wurden insgesamt 79 Schiffe aus Drittländern
  gelistet, die zur sogenannten Schattenflotte gehören. Diese Schiffe werden genutzt,
  um die Preisobergrenze für russisches Öl zu umgehen und den Energiesektor Russlands
  zu stützen. Auch Schiffe, die militärische Ausrüstung transportieren oder am Diebstahl
  ukrainischen Getreides beteiligt sind, wurden sanktioniert. 32 weitere Organisationen
  wurden sanktioniert, darunter Unternehmen in China, Indien, Iran, Serbien und den
  Vereinigten Arabischen Emiraten . S ie unterliegen somit strengeren Ausfuhrbeschränkungen
  für Güter und Technologien mit doppeltem Verwendungszweck sowie für Güter und Technologien,
  die zur technologischen Stärkung des russischen Verteidigungs- und Sicherheitssektors
  beitragen können. Der Rat untersagt ferner die Anerkennung russischer Gerichtsurteile,
  die europäische Unternehmen an rechtlichen Schritten außerhalb Russlands hindern
  sollten. Zudem wurden Maßnahmen zur wirtschaftlichen Stabilität eingeführt, darunter
  Regelungen zur Freigabe von Barguthaben europäischer Zentralverwahrer und verlängerte
  Fristen für den geordneten Rückzug europäischer Unternehmen aus Russland. Die EU
  hat angesichts des anhaltenden Angriffskriegs Russlands gegen die Ukraine ein weiteres
  Sanktionspaket beschlossen. Darauf einigten sich die EU -Außenministerinnen und
  -minister am 24. Juni. Das 14. Sanktionspaket zielt insbesondere darauf ab, gegen
  die Umgehung von bereits bestehenden Sanktionen besser vorgehen zu können. Darüber
  hinaus sieht es Auflagen für russisches Flüssigerdgas (LNG) vor. Politische Parteien,
  Stiftungen und Nichtregierungsorganisationen dürfen keine Finanzmittel aus Russland
  mehr annehmen, und gegen 69 Personen und 47 Einrichtungen wurden Sanktionen verhängt.
  Das neue Sanktionspaket betrifft insbesondere Unternehmen, die durch Finanztransaktionen
  und Lieferungen verbotener EU -Waren gegen die bestehenden Sanktionen verstoßen
  haben. Unter den neu gelisteten Unternehmen befindet sich beispielsweise auch eines,
  das daran beteiligt war, den Transport von Waffen von Nordkorea nach Russland zu
  ermöglichen und damit EU -Sanktionen zu umgehen. Weiterhin werden auch russische
  Rüstungsunternehmen gelistet. Zukünftig wird es insbesondere verboten sein, russisches
  LNG in europäischen Häfen zum Weitertransport in Länder außerhalb der EU umzuladen.
  Zudem werden russische LNG-Exportprojekte mit einem Investitions- und Bereitstellungsverbot
  belegt. Die Sanktionen betreffen inzwischen über 2.200 Personen, Unternehmen und
  Institutionen. Zu den neu in die Sanktionsliste aufgenommenen Personen gehören:
  mehrere Geschäftsleute, Propagandisten und Persönlichkeiten des öffentlichen Lebens,
  Angehörige der Armee und der Justiz, Personen, die für die Deportation ukrainischer
  Kinder verantwortlich sind, sowie Angehörige des Föderalen Sicherheitsdienstes der
  Russischen Föderation, die an der religiösen Verfolgung auf der illegal annektierten
  Krim beteiligt sind, und der Regierung. Sie unterliegen einem Reiseverbot in oder
  durch die EU , ihre Vermögenswerte werden eingefroren und EU -Bürgerinnen und -Bürger
  dürfen ihnen keine Gelder zur Verfügung stellen. Die Europäische Union hat anlässlich
  des zweiten Jahrestages des völkerrechtswidrigen Angriffes Russlands auf die Ukraine
  ein neues Sanktionspaket gegen Russland verabschiedet. Damit werden die Vermögen
  von weiteren knapp 200 Personen, Unternehmen und Institutionen in der EU eingefroren
  . In diesem Zusammenhang soll auch die russische Drohnenproduktion erheblich sanktioniert
  werden. Von den aktuellen Sanktionen sind Unternehmen betroffen, die zur militärischen
  und technologischen Stärkung Russlands oder zur Entwicklung von dessen Verteidigungs-
  und Sicherheitssektor beitragen. Ein Verkauf militärisch nutzbarer Güter an sie
  aus der EU wird damit unterbunden. Ziel ist es, den Druck auf die Betroffenen weiterhin
  hoch zu halten, um die Kriegsmaschinerie von Wladimir Putin weiter zu schwächen.
  Der am 24. Februar 2024 in Kraft getretene Beschluss stellt die größte Erweiterung
  der Sanktionsliste bisher dar: Neben 106 Einzelpersonen wurden auch 88 Einrichtungen
  in die EU -Sanktionsliste aufgenommen, die nun mehr als 2.000 Einträge enthält.
  Die neuen Sanktionen sollen Russland daran hindern, sensible Komponenten für Entwicklung
  und Bau von Kampfdrohnen zu erwerben. Es werden nun auch Unternehmen gelistet, die
  Russland mit wichtigen Drohnenkomponenten versorgen, und es werden Sanktionen in
  bestimmten Sektoren verhängt, um Schlupflöcher zu stopfen und die Kriegsführung
  mit Drohnen zu erschweren. Insgesamt wurden 27 weitere Unternehmen aus Russland
  und Drittländern in die Liste aufgenommen. Diese Firmen arbeiten eng mit dem russischen
  militärisch-industriellen Komplex zusammen. Für diese Unternehmen gelten nun strengere
  Ausfuhrbeschränkungen für Güter und Technologien mit doppeltem Verwendungszweck
  sowie für Güter und Technologien, die zur technologischen Stärkung des russischen
  Verteidigungs- und Sicherheitssektors beitragen könnten. Bereits im Dezember 2023
  wurden die Sanktionen gegen Russland verschärft. Kern des 12. Sanktionspakets waren
  Ein- und Ausfuhrverbote, etwa das Verbot der Ausfuhr russischen Diamanten nach Europa.
  Ferner wurden die Einsatzmöglichkeiten von Tankschiffen zur Umgehung der Ölpreisobergrenze
  stärker überwacht. Die Pflichten im Zusammenhang mit dem Aufspüren von Vermögenswerten wurden
  verschärft und harte Maßnahmen gegen Unternehmen aus Dritt-Staaten ergriffen, die
  Sanktionen umgehen. Schließlich wurde die 12. Sanktionsliste erweitert. Vermögenswerte
  von über 140 natürlichen und juristischen Personen wurden eingefroren. Die Bundesregierung
  unterstützt die EU -Sanktionen gegen Russland vollumfänglich und setzt sich dafür
  ein, dass die EU -Mitgliedstaaten weiterhin gemeinsam und entschlossen auf den Angriffskrieg
  Russlands gegen die Ukraine und die völkerrechtswidrigen Annexionen ukrainischer
  Regionen reagieren. Auf der Seite der Europäischen Kommission finden Sie ausführliche
  Informationen zum zwölftem Sanktionspaket. Die EU hat gemeinsam mit ihren internationalen
  Partnern in den vergangenen Monaten bereits massive Sanktionen in den Bereichen
  Finanzen, Energie, Transport, Beschränkungen gegen Personen und Einrichtungen sowie
  Visabeschränkung beschlossen. Die bisherigen Sanktionen hier im Überblick: Um die
  massiven Sanktionen vollständig und lückenlos umzusetzen, hat die Bundesregierung
  eine Taskforce eingesetzt. Diese Taskforce wird in gemeinsamer Federführung des
  Bundesministeriums für Wirtschaft und Klimaschutz sowie des Bundesministeriums der
  Finanzen geleitet. Die EU hat ebenfalls eine Taskforce eingerichtet. Individuelle
  Einschränkung von Personen und Einrichtungen: Die beschlossenen Sanktionen richten
  sich zusätzlich auch gegen zahlreiche Individuen und Einrichtungen in Russland und
  im Ausland, die den Krieg gegen die Ukraine unterstützen oder zu verantworten haben.
  Das betrifft auch Staatspräsident Putin und Außenminister Lawrow, Mitglieder des
  russischen Nationalen Sicherheitsrates, Duma-Abgeordnete, Kreml-Sprecher Peskow,
  Vertreter des Militärs und zahlreiche Oligarchen. Unter Berücksichtigung früherer
  Sanktionen gegen Einzelpersonen, die nach der Annexion der Krim im Jahr 2014 verhängt
  wurden, hat die EU rund 1.800 Organisationen Einzelpersonen mit Sanktionen belegt.
  Eine Übersicht bietet der Europäische Rat .'
