title: Humanitarian, financial and military aid How Germany is supporting Ukraine
text: 'In the hope for peace, Germany stands firmly alongside Ukraine Photo: Tobias
  Schwarz/AFP via Getty Images The Russian war of aggression against Ukraine is causing
  immeasurable suffering. Countless people have already lost their lives. Even in
  the fifth year of the war, Russia is relentlessly continuing its attacks. Germany
  stands resolutely by Ukraine’s side and has been linked in a strategic partnership
  with the country since April 2026. Following approval of the EU ’s 20 th package
  of sanctions in April 2026, we have kept up the pressure on Russia. Ukraine has
  been given considerable support in its defence capabilities with a 90-billion euro
  loan from the European Union. Since the Russian invasion of Ukraine on 24 February
  2022, the Federal Government has provided Ukraine with – or set aside for the coming
  years –  bilateral civilian support amounting to some 41 billion euros, and military
  support of around 55.5 billion euros. Support for Ukraine: You can find an overview
  of the key areas of aid provided by the Federal Government in this list here PDF,
  214 KB, barrier-free (only German). Through the German Development Bank (Kreditanstalt
  für Wiederaufbau, KfW), the Federal Government finances the repair and maintenance
  of electricity‑ and heating systems, provides replacement parts, and supports the
  reconstruction of power plants that have been destroyed. At the same time, air defence
  is being strengthened through the procurement and provision of air defence systems
  to protect the energy infrastructure from further attacks. The Federal Foreign Office
  (AA) is also involved in the physical protection of nuclear power plants and supports
  the International Atomic Energy Agency (IAEA) in the deployment of experts. Humanitarian
  aid activities are financed in close cooperation with international organisations
  and non-governmental organisations so that medical supplies, food, clean water and
  other emergency aid can reach people close to the front lines quickly. Millions
  of internally displaced persons and returning refugees likewise need support. The
  widely scattered unexploded ordnance and mines are also particularly dangerous for
  the civilian population in Ukraine. In addition to clearing and mapping these explosive
  devices, the Federal Foreign Office also enables information campaigns to train
  people in how to deal with this daily threat. Germany is Ukraine’s biggest supporter
  – including in the military sphere: aid comprises equipment and weapons deliveries
  from Federal Armed Forces ‑stocks as well as deliveries from industry, which are
  financed by the Federal Government’s defence equipment aid. The systems supplied
  include air defence‑, artillery‑ and combat vehicles, armoured transport vehicles,
  small arms, ammunition, medical supplies and protective clothing. In addition, Germany
  has trained almost 26,000 Ukrainian soldiers in Germany since the start of the war.
  More than one million Ukrainian refugees, above all women and children, have found
  protection in Germany since the start of the full-scale war. The Federal Government
  financially supports the federal states and local authorities with accommodation
  and care, for example through flat-rate relief contributions and the provision of
  federally-owned properties as accommodation. If necessary, refugees receive state
  support, access to vocational German language courses, further training and integration
  offers, as well as help with finding work from job centres. The support portal Germany4Ukraine
  enables online applications for residence permits, courses and applications for
  financial support. The free hotline “Nummer gegen Kummer” (“Number against Sorrow”)
  is available in Ukrainian and Russian. According to a study by the Federal Institute
  for Population Research, just over half of Ukrainians were in employment three years
  after their arrival. The Federal Employment Agency publishes further figures on
  the employment situation of refugees every month. In order to ensure Ukraine’s economic
  stability, Germany is supporting small and medium-sized enterprises in particular,
  as well as the training of skilled labour. The “UkraineConnect” financing instrument,
  with an initial volume of 45 million euros, grants attractive loans for investments
  by companies from Germany and Europe. For their part, Ukrainian companies can benefit
  from low-interest loans. Ukrainian managers are also supported via the “Partnering
  in Business with Germany” programme. In addition, the Federal Government is providing
  billions in subsidies via an account managed by the International Monetary Fund
  (IMF) in order to strengthen the Ukrainian state’s capacity to act. Within the context
  of its responsibility to make amends for Nazi injustice, the Federal Government
  also supports Holocaust survivors in Ukraine through the Jewish Claims Conference.
  The reconstruction of Ukraine requires national and international coordination.
  To achieve this, short-term and long-term support must be closely aligned. The national
  platform “Wiederaufbau Ukraine” (“Reconstruction Ukraine”) and the G7 Donor Coordination
  Platform have been set up to coordinate reconstruction efforts. The Federal Government
  is also working on financing instruments such as the “European Flagship Fund for
  the Reconstruction of Ukraine”, which will generate private funds for reconstruction,
  and on further refining the Business Development Fund into a kind of Ukrainian development
  bank. The Federal Government is also committed at an international level as part
  of the Ukraine Donor Platform to develop a coordinated approach for supporting Ukraine. To
  ensure sustainable reconstruction, Germany is also advising the Ukrainian government
  on reforms for EU accession, in particular in the areas of anti-corruption and transparency. The
  Federal Foreign Office is playing its part in promoting the rule of law and decentralisation
  in Ukraine through contributions to the Council of Europe Action Plan for Ukraine
  (2023-2026). The Federal Foreign Office is financing the clearance of mines and
  explosive ordnance, equipping Ukraine’s disaster management and supporting the Federal
  Criminal Police Office (Bundeskriminalamt, BKA) in securing evidence of and documenting
  war crimes. Medical care is being supported both in Ukraine and for Ukrainian refugees
  in Germany. Targeted support is being provided for bilateral healthcare projects
  in Ukraine. These include measures in the areas of telemedicine, prosthetics and
  rehabilitative care structures. The evacuation of sick and injured people for medical
  treatment in Germany is also being supported. In the area of career guidance, BerufeNavi,
  together with the KAUSA‑ regional offices and the BOFplus‑ programme, supports people
  entering into training and the job market. The National Academic Contact Point Ukraine
  (NAKU) provides information about study opportunities in Germany, and since July
  2025 the German Academic Exchange Service ( Deutsche Akademische Austauschdienst,
  DAAD) has been supporting the establishment of a German‑Ukrainian university network.
  In addition, Germany provides advice on the reconstruction of the Ukrainian research
  system and supports integration into the European Research Area. Culture and independent
  media are central pillars of a democratic society. The Federal Government has set
  up special programmes to protect cultural professionals, academics and students
  and is ensuring the security of cultural assets, museums, archives and libraries.
  With the Hannah Arendt Initiative, Germany is also supporting Ukrainian media professionals
  so that they can continue to report – including from areas affected by fighting.'
