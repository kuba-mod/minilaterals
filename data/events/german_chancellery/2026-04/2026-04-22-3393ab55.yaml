title: Approved by the Cabinet Federal Armed Forces to continue their participation
  in the KFOR peace mission in Kosovo
text: 'Bundeswehr soldiers from the reconnaissance team near Pristina in Kosovo: Germany
  is committed to peace and security in the region. The participation of German armed
  forces in the international security presence in Kosovo (Kosovo Force ( KFOR ))
  will be continued. This was decided by the Federal Cabinet on 22 April 2026. Up
  to 400 German soldiers may continue to be deployed, unchanged. This also ensures
  that the Bundeswehr (Federal Armed Forces) can react quickly and flexibly if the
  security situation deteriorates. The KFOR mission is focused on bringing about political
  stability in the Republic of Kosovo and providing military support for the peace
  settlement. Stability and peace in Kosovo are not only important for the region
  itself, but also for Germany, NATO , the EU and Europe as a whole. The long-term
  goal remains the handover of security responsibility to the Kosovan security institutions.
  As part of NATO , German soldiers are helping to secure public order and participating
  in the democratic stabilisation of the country in various areas, the aim being to
  establish long-term security and peace in the region. Although the security situation
  in Kosovo has stabilised again since 2023, it could deteriorate again at any time. In
  the course of violent individual actions, Kosovo Police forces have been repeatedly
  shot at and injured, among other things. At the end of November 2024, there was
  a bomb attack on critical infrastructure, the Ibar-Lepenc canal, which is central
  to the water and electricity supply for the entire country. The Kosovan government
  continues to take action against parallel structures and organised crime networks
  in the north of the country. In view of the continuing potential for escalation
  and conflict in the short term, it is necessary for KFOR troops to remain present
  in the region. KFOR is a central anchor of stability in the region. The German contribution
  to KFOR continues to include the participation of personnel in the KFOR headquarters
  in Pristina and in multinational reconnaissance forces. In addition to its participation
  in KFOR , the Federal Government is also working in the civilian sector to promote
  stability and peace in the Balkans in the spirit of integrated security. The Federal
  Government’s central concern is the sustainable and legally binding normalisation
  of relations between Kosovo and Serbia. The Federal Government is supporting the
  EU -led normalisation dialogue between the two countries. The deployment is based
  on United Nations Security Council Resolution 1244 of 10 June 1999 and the NATO
  deployment decision of 30 January 1999. As such, German armed forces are acting
  within and in accordance with the rules of a system of mutual collective security
  pursuant to Article 24(2) of the Basic Law. The mandate authorises Defence Minister
  Boris Pistorius, for an unlimited period, to make German capabilities available
  for deployment. The authorisation expires when the United Nations mandate ends or
  if the NATO deployment decision is not extended.'
