title: Für Klimaneutralität in 2045 Künftiger Kraftstoff wird klimafreundlicher
text: Die Gesetzes-Novelle macht das Tanken Schritt für Schritt klimafreundlicher.
  Kraftstoffanbieter sind nach dem Bundes-Immissionsschutzgesetz bereits seit Jahren
  verpflichtet, die CO2 -Emissionen ihrer Kraftstoffe um einen gewissen Prozentsatz
  zu mindern. Mit dem neuen Gesetz soll diese Minderung nun verstärkt werden – etwa
  durch die Beimischung nachhaltiger Biokraftstoffe, durch den Einsatz von grünem
  Wasserstoff in Raffinerien oder durch die Bereitstellung von Strom für Elektrofahrzeuge.
  Die Bundesregierung hatte im Dezember letzten Jahres den Entwurf eines zweiten Gesetzes
  zur Weiterentwicklung der Treibhausgasminderungsquote (THG-Quote) im Kabinett beschlossen.
  Dabei hatte es die Vorgaben der EU -Richtlinie zu erneuerbaren Energien sowie der
  EU -Verordnung zur verstärkten Nutzung nachhaltiger Flugkraftstoffe ReFuelEUAviation
  aufgenommen. Mit ambitionierteren Vorgaben und weiteren Anpassungen hat nun der
  Bundestag die Gesetzesnovelle verabschiedet. Ziel ist es, dieses zentrale Instrument
  zur Förderung von erneuerbaren Energien im Verkehrsbereich zu stärken und damit
  Rechts- und Planungssicherheit für die beteiligten Akteure zu schaffen. Der Klimaschutz
  soll damit auch im Verkehrssektor gestärkt und der Hochlauf der Wasserstoffwirtschaft
  in Deutschland unterstützt werden. Zudem werden die Vorgaben zum nationalen Vollzug
  der EU -weit einheitlichen Quoten für nachhaltige Flugkraftstoffe im Bundes-Immissionsschutzgesetz
  umgesetzt. Wichtig ist, dass die Quote technologieoffen erreicht werden kann. Das
  setzt Anreize für zukunftsfeste und zukunftsweisende Lösungen. Damit wird ein realistischer
  und kosteneffizienter Beitrag zur Erreichung der Klimaziele geleistet. Im Einzelnen
  wird dazu die nationale THG -Minderungsquote bis 2040 fortgeschrieben, sie steigt
  von derzeit 10,6 Prozent schrittweise auf 65 Prozent. Das sind 6 Prozentpunkte mehr
  als der vom Kabinett verabschiedete Entwurf vorsah. Die Deckelung der konventionellen
  Biokraftstoffe soll von derzeit 4,4 Prozent bis 2032 auf 5,8 Prozent steigen. Das
  dient der Marktstabilisierung und hilft zugleich der Landwirtschaft und der heimischen
  Produktion. Biokraftstoffe sind zudem als preiswerte Anrechnungsoptionen für die
  THG -Quote sofort verfügbar. Auch die Anrechenbarkeit von Ladestrom aus Biogas auf
  die THG -Quote ab Januar 2028 wurde im Gesetzgebungsverfahren neu in die Novelle
  aufgenommen. Biogasanlagen können damit Strom für Ladesäulen liefern. Darüber hinaus
  wird die Unterquote für fortschrittliche Biokraftstoffe aus Reststoffen angehoben
  und eine neue Unterquote für grünen Wasserstoff und Folgeprodukte eingeführt, womit
  Investitionsanreize gesetzt werden. Nicht zuletzt werden Maßnahmen zur Betrugsprävention
  ergriffen. Nach dem Bundes-Klimaschutzgesetz müssen bis 2045 die Treibhausgas-Emissionen
  so weit gemindert werden, dass Deutschland netto betrachtet klimaneutral werden
  kann. Um dies zu erreichen, müssen auch im Kraftstoffbereich die Emissionen signifikant
  verringert werden.
