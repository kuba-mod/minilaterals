title: Press conference by Chancellor Merz after the European Council in Cyprus Closer
  ties between Ukraine and the EU
text: 'In addition to the wars in Iran and Ukraine, the EU ’s Multiannual Financial
  Framework was a central topic. Following the conclusion of the informal Council
  of the European Union in Cyprus, Federal Chancellor Friedrich Merz spoke about the
  key topics of the meeting: further support for Ukraine, the situation in the Middle
  East with the rise in energy prices and the negotiations on the Multiannual Financial
  Framework. He warned against an inflated EU budget and rejected new debt plans.
  The meeting included a discussion with President Zelensky on the situation in Ukraine
  and with heads of state and leading representatives of the Gulf region on the situation
  in the Middle East. In addition, the President of the EU Parliament presented a
  “roadmap to strengthen the competitiveness of the EU ” together with the Cypriot
  Council Presidency, explained Chancellor Merz. The Council, Parliament and Commission
  have now officially signed this, Merz said. He reported that many measures are still
  expected to be adopted in 2026. Read the transcript of the press conference here
  (in German only):'
