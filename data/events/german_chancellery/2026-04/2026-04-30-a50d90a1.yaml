title: Bürgergespräch mit dem Bundeskanzler zum Tag des Lokaljournalismus Bundeskanzler
  betont Bedeutung lokaler Medien
text: Beim Bürgergespräch in Salzwedel betont Friedrich Merz die zentrale Bedeutung
  von Lokaljournalismus für Demokratie und Zusammenhalt. Auf Einladung regionaler
  Lokalzeitungen und Medienhäuser tauschte sich Bundeskanzler Merz im sachsen-anhaltinischen
  Salzwedel mit Bürgerinnen und Bürgern aus. Dabei setzte er ein klares Zeichen für
  die Bedeutung von Lokalzeitungen. Sie seien unverzichtbar für eine zuverlässige
  Berichterstattung, über das Geschehen vor Ort. Trotz aller Veränderungen in der
  Medienlandschaft hoffe er, dass regionale Zeitungen die Menschen auch in Zukunft
  erreichen und informieren. Im Bürgergespräch kamen zahlreiche Themen zur Sprache
  – von Rente über Landwirtschaft bis hin zu Gesundheit und Jugendhilfe und mehr.
  Beim Thema Altersvorsorge betonte der Bundeskanzler, dass es ihm wichtig ist, „dass
  die Bevölkerung insgesamt an einer Entwicklung unserer Volkswirtschaft teilnimmt,
  die wir über kapitalgedeckte private und betriebliche Altersversorgung besser machen.“
  Auch zur Energiesicherheit wurde vor dem Hintergrund der Lage in der Straße von
  Hormus diskutiert. Der Bundeskanzler verwies auf die kurzfristig beschlossenen Entlastungsmaßnahmen
  wie die Senkung der Mineralölsteuer ab 1. Mai, räumte aber auch ein, dass die Preissprünge
  dadurch nicht voll kompensiert werden können. Ein Versorgungsproblem sehe er derzeit
  nicht für Deutschland, auch wenn die Verknappung auf den globalen Märkten ein wichtiges
  Signal für die Preisentwicklung in Deutschland sei. „Insofern ist alles darauf gerichtet
  – auch von meiner Person aus – jeden Beitrag zu leisten, der möglich ist, um die
  Straße von Hormus wieder zu öffnen“, sagte der Kanzler. Zum Abschluss des Gesprächs
  wurde über den Stil von politischen Debatten gesprochen. Der Bundeskanzler sprach
  sich für eine sachliche, auch kontroverse, aber respektvolle Debattenkultur aus.
  Er wünsche sich, „dass wir eine vernünftige, in der Sache notfalls auch harte politische
  Auseinandersetzungen miteinander führen, dass wir uns aber auch zuhören, dass wir
  auch Argumente gelten lassen und dass wir auch immer mit dem Anspruch in eine Diskussion
  gehen, der andere könnte auch recht haben.“ Der bundesweite Tag des Lokaljournalismus
  am 5. Mai setzt ein gemeinsames Zeichen f ü r die Bedeutung lokaler journalistischer
  Arbeit. Die Bundesregierung und der Bundeskanzler unterst ü tzen diese Initiative
  und betonen, dass Lokaljournalismus eine zentrale Rolle f ü r eine funktionierende
  Demokratie spielt. Er st ä rkt die demokratische Teilhabe, indem er politische Entscheidungen
  vor Ort transparent macht, Vertrauen schafft und Menschen miteinander verbindet.
