title: Statement des Kanzlers vor dem Europäischen Rat auf Zypern „Neue Prioritäten
  setzen“
text: 'Vor dem Europäischen Rat auf Zypern hat Bundeskanzler Merz einen Ausblick auf
  die Inhalte der Beratungen gegeben. Beim informellen Europäischen Rat auf Zypern
  stehen die EU -Finanzen der nächsten Jahre im Fokus. Bundeskanzler Merz hat vor
  den Beratungen betont, dass es für den Finanzrahmen ab 2028 neue Prioritäten brauche.
  Man werde nicht umhinkommen, Ausgaben im EU -Haushalt zu überprüfen und gegebenenfalls
  zu kürzen. Eine höhere gemeinsame Verschuldung komme dabei ebenso wenig neue europäische
  Anleihen infrage. „Das ist keine Position, die Deutschland teilt“, so Kanzler Merz.
  Guten Morgen allerseits! Wir werden heute unter anderem über das Thema europäische
  Finanzen und über den mittelfristigen Finanzplan für die Jahre ab 2028 sprechen.
  Ich habe meinen Kolleginnen und Kollegen schon gesagt: Wir werden neue Prioritäten
  setzen müssen. Das bedeutet, dass wir auch an anderer Stelle die Ausgaben des europäischen
  Haushaltes reduzieren müssen. Was aus deutscher Sicht nicht in Frage kommt, ist
  eine höhere Verschuldung, und was auch nicht in Frage kommt, sind europäische Anleihen
  am Kapitalmarkt. Das ist keine Position, die Deutschland teilt; das wissen die Kolleginnen
  und Kollegen. Viele sind mit mir derselben Meinung. Darüber werden wir heute aber
  intensiv zu sprechen haben. Das ist jedenfalls die Position der Bundesrepublik Deutschland,
  der deutschen Bundesregierung: Europa muss mit dem Geld, das wir haben, auskommen,
  und das heißt, dann müssen wir auch neue Prioritäten setzen.'
