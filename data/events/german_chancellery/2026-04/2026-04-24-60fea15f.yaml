title: Bundeskanzler Merz besucht das Carolus-Magnus-Gymnasium in Marsberg anlässlich
  des EU-Projekttages an Schulen 2026
text: Am Montag, den 27. April, wird der Bundeskanzler von 10:00 bis 11:30 Uhr im
  Rahmen des „EU-Projekttages an Schulen“ das Carolus-Magnus-Gymnasium in Marsberg
  besuchen. Dort wird der Kanzler eine Podiumsdiskussion mit den Schülerinnen und
  Schülern zu Europa-Themen führen. Zudem werden die Schülerinnen und Schüler dem
  Kanzler einige Europa-Projekte ihrer Schule vorstellen. Die Bundesregierung ruft
  in jedem Jahr – in enger Zusammenarbeit mit den Ländern – zur Teilnahme am EU-Schulprojekttag
  auf. Im Mittelpunkt steht dabei, dass Schülerinnen und Schüler mit Politikerinnen
  und Politikern auf Landes-, Bundes- und europäischer Ebene sowie mit Mitarbeiterinnen
  und Mitarbeitern der EU-Institutionen und der öffentlichen Verwaltung in Deutschland
  zum Thema Europa ins Gespräch kommen. Den EU-Projekttag gibt es seit 2007. Organisiert
  wird er gemeinsam vom Bund und den Ländern.
