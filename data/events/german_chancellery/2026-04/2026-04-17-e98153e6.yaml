title: Press statement by the Chancellor at the conference on securing the Strait
  of Hormuz For stability in the Middle East
text: 'According to Chancellor Merz in Paris, the first condition for German involvement
  in a military operation would be an end to the war — and a sound legal basis. Federal
  Chancellor Friedrich Merz discussed the situation in the Strait of Hormuz with numerous
  heads of state and government in Paris. At the invitation of French President Emmanuel
  Macron and British Prime Minister Keir Starmer, he took part in a conference there
  with Italian Prime Minister Giorgia Meloni — and spoke afterwards of their broad
  consensus. “We speak with one voice — for stability in the Middle East and a secure
  energy supply in Europe,” said the Chancellor on X. The opening of the Strait of
  Hormuz announced by Iran is “good news” and must be take place in full compliance
  with international maritime law and without imposing any restrictions. Read the
  transcript of the press conference here (in German only):'
