title: Maßnahmenpaket beschlossen Beiträge in der gesetzlichen Krankenversicherung
  stabilisieren
text: 'Das Finanzdefizit in der gesetzlichen Krankenversicherung soll geschlossen
  werden. Update zur FinanzKommission Gesundheit: Die von Bundesministerin Nina Warken
  eingesetzte FinanzKommission Gesundheit hat am 30. März 2026 ihre Ergebnisse vorgelegt.
  Die Regierungskoalition aus CDU , CSU und SPD hat entschieden, die meisten Vorschläge
  der Kommission aufzugreifen. Der Gesetzentwurf zur Stabilisierung der Beitragssätze
  in der gesetzlichen Krankenversicherung wurde im April vom Kabinett verabschiedet.
  Die Kommission wird ihre Arbeit fortsetzen und soll Ende 2026 weitere Vorschläge
  für Strukturreformen vorlegen. Mehr zu den geplanten Entlastungen lesen Sie hier.
  Das Bundeskabinett hatte im Oktober 2025 eine Formulierungshilfe für die Fraktionen
  der CDU / CSU und der SPD beschlossen, um die Finanzierungslücke im Jahr 2026 von
  rund zwei Milliarden Euro in der gesetzlichen Krankenversicherung zu schließen.
  Ziel ist es, die finanzielle Lage der Krankenkassen zu verbessern und damit einen
  weiteren Anstieg des durchschnittlichen GKV -Zusatzbeitragssatzes im Jahr 2026 zu
  vermeiden. Das Maßnahmenpaket ist vom Deutschen Bundestag eingebracht und vom Bundesrat
  gebilligt worden. Es enthält folgende Elemente: Das Maßnahmenpaket ist ein erster
  Schritt. Langfristig sollen strukturelle Maßnahmen greifen, die derzeit vorbereitet
  werden. Bundesministerin Warken hatte dazu eine FinanzKommission Gesundheit eingesetzt,
  die Ende März 2026 weitere Vorschläge für finanzwirksame Maßnahmen vorgelegt hat.
  Ende 2026 sollen zudem Vorschläge für Strukturreformen folgen.'
