title: Pressestatement von Bundeskanzler Merz zum Besuch bei Akkermann Transporte
  in Moormerland Moderner Mittelstand in Deutschland
text: 'Kanzler Merz zeigte sich bei seinem Besuch des familiengeführten Logistikunternehmens
  beeindruckt von Mittelstandsunternehmen wie diesem. Bundeskanzler Friedrich Merz
  hat in Moormerland das Logistikunternehmen Akkermann besucht. Der Kanzler traf auch
  Vertreter der regionalen Wirtschaft aus der Handwerkskammer, der Industrie- und
  Handelskammer und dem Bundesverband Güterkraftverkehr, Logistik und Entsorgung zum
  Austausch. Der Kanzler machte bei seinem Besuch deutlich, „welche überragende Bedeutung
  die maritime Wirtschaft für uns alle hat“. Wichtig sei, so der Bundeskanzler, die
  strategische Bedeutung von Wasserwegen und Häfen richtig einzuordnen. Es bestehe
  ein großes Interesse daran, „dass hier im Norden in Deutschland auch die Hafeninfrastruktur
  und die Wasserwege gut ausgebaut werden“. Zudem müssten die Arbeitskosten sinken,
  damit Mittelstandsunternehmen wie dieses auch in Folgegenerationen weiter bestünden.
  Meine Damen und Herren, herzlichen Dank, dass Sie mit dabei sind im schönen Friesland,
  von Emden kommend! Ich freue mich, dass Gitta Connemann mir die Gelegenheit gegeben
  hat, heute die Firma Akkermann zu besuchen. Der Auftakt waren der Tag in Emden und
  die maritime Wirtschaft. Ich habe versucht, darauf hinzuweisen, welche überragende
  Bedeutung die maritime Wirtschaft für uns alle hat. Es ist wichtig, dass wir das
  im Blick behalten und auch aus der bundespolitischen Sicht heraus die strategische
  Bedeutung von Wasserwegen und Häfen richtig einordnen. Das gilt sowohl für unsere
  Volkswirtschaft als auch für unsere Sicherheit. Insofern haben wir auch in der Bundesregierung
  ein wichtiges Augenmerk auf die Hafeninfrastruktur gerichtet und versuchen auch
  mit den Ländern zusammen, die dafür zuständig sind, eine entsprechende Entwicklung
  zu ermöglichen. Die maritime Wirtschaft insgesamt ist ein wichtiger Teil unserer
  Volkswirtschaft. Ich habe darauf hingewiesen und ich will es hier gerne noch einmal
  wiederholen: 90 Prozent des globalen Handels gehen über Wasserwege. Insofern haben
  wir ein hohes Interesse daran, dass hier im Norden in Deutschland auch die Hafeninfrastruktur
  und die Wasserwege gut ausgebaut werden. Ich spreche mich auch erneut für die Vertiefung
  der Ems aus, damit wir, was den Zugang gerade von den Werken angeht, die dort an
  der Ems liegen – das ist bei Weitem nicht nur eine große Werft, das sind auch viele
  andere –, die Chance haben, Wasserwege dann auch mit größeren Schiffen zu befahren
  und zu nutzen. Wir haben hier eine sehr intensive Diskussion mit der IHK und mit
  der Handwerkskammer über Standortbedingungen und die mittelständische Wirtschaft
  geführt. Ich habe das den Gastgebern gesagt: Das ist wie bei mir zu Hause auch.
  Wir haben eine große Zahl von kleineren und mittleren Unternehmen, aber auch von
  Unternehmen, die weltweit erfolgreich tätig sind, in den ländlichen Regionen. Die
  ländlichen Regionen sind für Deutschland einfach enorm wichtig, auch in ihrer ganzen
  Struktur. Insofern wollen wir uns intensiv darum bemühen, auch Arbeitsplätze und
  Wettbewerbsfähigkeit in den ländlichen Regionen zu erhalten. Ich will mich ausdrücklich
  bei Gitta Connemann bedanken, die ja als Mittelstandsbeauftragte der Bundesregierung
  sehr intensiv tätig ist, auch gerade für den Mittelstand. Es gibt keine stärkere
  Stimme für den Mittelstand als Gitta Connemann in Deutschland. Ich muss sagen: Ich
  finde es auch immer eindrucksvoll, wenn ich dann einmal so wie hier heute bei der
  Firma Akkermann, bei der IHK , bei der Handwerkskammer bin und auch sehe, mit welch
  großem Engagement sie da unterwegs ist und mit welch großer Zustimmung sie auch
  diese Arbeit macht. Wir wollen das gemeinsam hinbekommen, auch in der Koalition
  in Berlin. Wir haben heute Morgen die größte Reform der gesetzlichen Krankenversicherung
  im Kabinett verabschiedet, die es in den letzten zwei Jahrzehnten gab. Damit stabilisieren
  wir die Beiträge zur gesetzlichen Krankenversicherung. Die nächste Reform wird schon
  in wenigen Wochen folgen, nämlich die Reform der sozialen Pflegeversicherung. Dann
  folgen im Sommer die Reform der gesetzlichen Rentenversicherung und über den Jahreswechsel
  eine Steuerreform. Die wichtigste Botschaft ist für Arbeitnehmerinnen, Arbeitnehmer
  und für Unternehmen: Arbeit und Leistung müssen sich lohnen! Deswegen müssen wir
  bei den Kosten herunter, wir müssen bei den Arbeitskosten herunter. Wenn wir das
  machen, dann haben wir alle Chancen, solche Unternehmen wie dieses, das zurzeit
  von drei Generationen geführt wird, nämlich der zweiten, der dritten und der vierten,
  auch in der fünften Generation zu erleben und zu sehen. Das ist genau mein Wunsch,
  dass wir heute unsere Arbeit machen, die es morgen auch der jungen Generation ermöglicht,
  sichere Arbeitsplätze in gut geführten Unternehmen zu haben. Insofern noch einmal
  auch der Familie Akkermann und Ihnen, Akkermann Senior, herzlichen Dank für die
  Gastfreundschaft hier in Ihrem Betrieb! Es hat große Freude gemacht, heute bei Ihnen
  zu sein. Herzlichen Dank!'
