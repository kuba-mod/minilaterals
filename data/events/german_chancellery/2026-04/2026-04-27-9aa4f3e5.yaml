  Urteil des Verwaltungsgerichts Koblenz zur Kenntnis genommen. Jetzt bekommen wir
  die Entscheidungsbegründungen zugeliefert. Wir werden diese sorgfältig prüfen und
  über die Einlegung von Rechtsbehelfen entscheiden. Welche Auswirkungen hat diese
  Entscheidung auf die Fortführung der Grenzkontrollen? Meinen Sie jetzt ganz konkret
  heute oder ‑ ‑ ‑ Wie gesagt, ich kann mich da nur wiederholen. Wir bekommen jetzt
  erst einmal die Entscheidungsbegründung, und dann werden wir uns dazu verhalten.
  Der Bund hat seit der Zeitenwende 2022 innerhalb von vier Jahren nach eigenen Angaben
  47 000 Beschaffungsverträge zu Rüstungsgütern im Wert von insgesamt 111 Milliarden
  Euro abgeschlossen. Frau Jenning, da würde mich interessieren: Wie viele dieser
  Rüstungsgüter sind denn bis Stichtag 1. April 2026 funktionsfähig in den Dienst
  der Bundeswehr gestellt worden? Sie werden mir nachsehen, dass ich Ihnen jetzt keine
  Liste präsentieren kann und ich Ihnen hier quasi nicht meinen nächsten Aktenvortrag
  halten und sagen kann, welche Beschaffungen tatsächlich bei uns auf den Hof gekommen
  sind. Sie wissen aber, dass wir hier immer bemüht sind, transparent zu kommunizieren.
  Wenn entsprechende Beschaffungen bei uns ankommen, dann kommunizieren wir das auch.
  Das halten wir auf unseren Seiten nach, und auf die muss ich Sie an dieser Stelle
  verweisen. 47 000 Rüstungsverträge in vier Jahren, das heißt ja: rund 30 Abschlüsse
  pro Tag. Eine ähnliche Antwort, die Sie mir jetzt gegeben haben, haben Sie vor wenigen
  Tagen der Linksfraktion auf eine Kleine Anfrage gegeben. Das verwundert ja doch,
  dass man bei diesem Ausmaß an Rüstungsvergaben keinen Überblick hat, ob die entsprechenden
  Rüstungsgüter funktionsfähig der Bundeswehr zugeleitet werden. Können Sie uns erklären,
  wieso die Bundeswehr sagt, sie hat dazu keine Übersicht? Wir sprechen ja immer vom
  dreistelligen Milliardenbetrag. Ich habe nicht gesagt ‑ das mache ich mir auch nicht
  zu eigen ‑, dass wir nicht wüssten, ob unsere Verträge erfüllt werden und was bei
  uns auf den Hof kommt. Sie können sich sicher sein: Wenn wir Verträge schließen,
  dann verlaufen die natürlich nicht im Sand, sondern dann geht es darum, dass diese
  Fähigkeiten, diese Beschaffungen, bei uns ankommen. Sie wissen, wie viele großvolumige
  Beschaffungsformen wir auch in den letzten Jahren geschlossen haben. Ich darf Sie
  auf die sogenannten 25-Millionen-Euro-Vorlagen verweisen. Daneben gibt es weitere
  und zahlreiche Verträge, die unterhalb dieser Schwelle sind und entsprechend nicht
  durch das Parlament gehen, die aber selbstverständlich von uns nachgehalten werden.
  Ich darf an der Stelle auch darauf verweisen, dass es bürokratisch im Zweifel gar
  keinen Sinn machen würde, diese Tabellen zu führen. Aber natürlich verlaufen unsere
  Verträge nicht im Sand, sondern das, was wir bestellen, was wir beauftragen, kommt
  auch bei uns an. Frau Jenning, aber es muss doch so sein, dass, wenn Aufträge erteilt
  werden, Sie dann auch monitoren, wann diese Aufträge erfüllt sind und, wenn es in
  Etappen geschieht, zu welchem Zeitpunkt welche Auftragserfüllung geleistet ist.
  Anders ist doch ein Beschaffungs- und Monitoringvorgang gar nicht darstellbar. Warum
  sind Sie dann nicht in der Lage, dem Fragesteller, den Parlamentariern zu sagen,
  wie die Auftragserfüllungssituation zum Stichtag 1. März gewesen ist? Warum geht
  das nicht? Erst einmal darf ich um Verständnis bitten, dass mir persönlich die konkrete
  Antwort jetzt nicht bekannt ist, sodass ich auch die Begründung der Kolleginnen
  und Kollegen dazu nicht kenne. Aber auch da gilt ganz allgemein und vielleicht nicht
  nur in Bezug auf diese Frage: Sie wissen, dass wir gerade im parlamentarischen Fragewesen
  sehr eng an Fristen gebunden sind. Zum Teil ist es gar nicht möglich, diesen Aufwand
  zu betreiben. Es gibt eben nicht zu allen Dingen einfach eine Excel-Tabelle, wo
  man irgendwie auf einen Knopf drückt und dann hat man die, sondern es ist zum Teil
  natürlich vielschichtiger, sodass ich auf das verweisen möchte, was ich gerade schon
  geantwortet habe. Könnten Sie ‑ das ist dann jetzt eine Nachfrage aus dem journalistischen
  Raum ‑ bitte versuchen nachzuliefern, welche dieser Aufträge zum 1. März definitiv
  bei Ihnen, wie Sie sagen, auf dem Hof gelandet sind? Wenigstens das müsste doch
  festzustellen möglich sein. Ich kann Ihnen nicht versprechen, dass diese Nachreichung
  in dieser Form möglich ist. Aber was ich zum Beispiel ganz klar einmal machen kann ‑ ‑ ‑
  Deswegen habe ich auf unsere Seiten verwiesen. Manchmal muss man vielleicht ein
  bisschen suchen. Sie wissen, wir haben einen großen nachgeordneten Bereich. Ich
  weiß, dass das BAAINBw das für das vergangene Jahr auch vorhält, dass da zum Beispiel
  sehr transparent aufgelistet ist, wie viel wo angekommen ist; das ist da also auch
  zahlenmäßig eingeordnet. Da findet man viel auf unseren Seiten. Sofern ich die Möglichkeit
  habe, im Rahmen des pressefachlichen Auskunftsanspruchs etwas nachzureichen, machen
  wir das gerne. Ich kann Ihnen da aber nichts versprechen.'
