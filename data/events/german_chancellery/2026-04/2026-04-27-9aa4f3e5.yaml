date: '2026-04-27'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 27. April 2026
text: 'stellvertretender Regierungssprecher Hille (Vorsitzende Hamberger eröffnet
  die Pressekonferenz und begrüßt SRS Hille sowie die Sprecherinnen und Sprecher der
  Ministerien.) Bundesbildungsministerin Karin Prien reist am Mittwoch nach Kanada
  . Sie ist dann vom 30. April bis zum 2. Mai in Calgary und vom 2. Mai bis zum 4. Mai
  in Ottawa. Ein Schwerpunkt der Reise ist die datengestützte Qualitätsentwicklung
  im Bildungssystem. Die Ministerin selbst nennt Kanada immer wieder als Vorbild für
  gute Bildungspolitik mit guten Ergebnissen bei Schülerinnen und Schülern bei ähnlichen
  Herausforderungen wie in Deutschland. Im Rahmen der Reise finden unter anderem Gespräche
  mit dem Bildungsminister von Alberta, Demetrios Nicolaides, sowie mit Vertreterinnen
  und Vertretern von verschiedenen Schulbehörden statt. Die Ministerin besucht zudem
  Schulen und Universitäten, um sich vor Ort auszutauschen. Außenminister Wadephul
  wird am Mittwoch nach Marokko reisen. Marokko ist für die Bundesregierung ein zentraler
  Partner, der auch als wichtiges Bindeglied zwischen dem europäischen und dem afrikanischen
  Kontinent fungiert. Außenminister Wadephul wird in Rabat zu Konsultationen mit seinem
  marokkanischen Amtskollegen Nasser Bourita zusammentreffen. Das Format des strategischen
  Dialogs findet alle zwei Jahre auf Ebene der Außenminister statt. Zuletzt war der
  marokkanische Außenminister dafür im Juni 2024 in Berlin. Die bilateralen Beziehungen
  zwischen Deutschland und Marokko haben sich zuletzt positiv entwickelt, gerade auch
  mit Blick auf den wirtschaftlichen Austausch zwischen unseren beiden Ländern. Deutschland
  und Marokko begehen in diesem Jahr außerdem das 70-jährige Jubiläum ihrer diplomatischen
  Beziehungen. Neben bilateralen Themen und den Wirtschaftsbeziehungen zwischen den
  beiden Ländern werden sicherlich regionale Fragen wie die Lage im Nahen Osten sowie
  in der Sahelregion Thema sein. Außenminister Wadephul wird auf seiner Reise von
  einer Wirtschaftsdelegation unter Leitung des parlamentarischen Staatssekretärs
  aus dem BMWE begleitet. Es geht in Marokko ja auch um den Status der Westsahara.
  Akzeptiert die Bundesregierung durch die Unterstützung des Autonomieplans den marokkanischen
  Anspruch auf die Westsahara? Ich glaube, Sie kennen die Position der Bundesregierung
  zum Status der Westsahara. Sie ist bekannt und auch unverändert. Der Status der
  Westsahara ist ungeklärt und Gegenstand eines Verhandlungsprozesses, der unter UN-Ägide
  stattfindet. Das ist auch wichtig; denn nur so kann eine gerechte, dauerhafte und
  für alle Seiten annehmbare politische Lösung erreicht werden. Wir betrachten aber
  den von Marokko vorgestellten Autonomieplan als ernsthafte und glaubwürdige Bemühungen
  Marokkos und als eine gute Grundlage für eine einvernehmliche Lösung. Was sagen
  Sie zu der Kritik, dass das Selbstbestimmungsrecht der Menschen dort verletzt würde?
  Ich glaube, ich möchte dem strategischen Dialog, in dem sicherlich auch solche Fragestellungen
  mit Blick auf die Westsaharafrage Gegenstand des Austauschs sein werden, nicht vorgreifen.
  Die Reise findet am Mittwoch statt. Lassen Sie uns dazu im Gespräch bleiben. Habe
  ich Sie richtig verstanden, dass die Frage der Westsahara auf jeden Fall auf dem
  Agendaplan des Außenministers stehen wird? Ich glaube, „auf jeden Fall“ kann man
  nie so ganz genau sagen, weil man Gesprächen nicht vorgreifen kann. Es ist aber
  eine relevante internationale Fragestellung, die auch Marokko beschäftigt ‑ Ihr
  Kollege hat hier eben eine Frage dazu gestellt. Insofern ist es sicherlich eine
  Fragestellung, die für die Gespräche von Relevanz sein kann. Die Vereinten Nationen
  schlagen ein Referendum vor, um die Statusfrage der Westsahara zu lösen. Was ist
  die Haltung der Bundesregierung in Bezug auf diesen Referendumsansatz? Die Haltung
  der Bundesregierung ist so, wie ich sie benannt hatte, dass der Status ungeklärt
  ist, es einen Verhandlungsprozess unter UN-Ägide gibt und wir uns jetzt natürlich
  erst einmal auf die Reise begeben. Wenn sich dabei ein Austausch zu dem Thema ergibt,
  dann kann ich hier in den kommenden Tagen sicherlich aktuellere Informationen dazu
  geben. Frau Deschauer, Sie hatten die Sahelregion angesprochen. Dort ist am Wochenende
  auch einiges passiert. Ich wüsste gern, mit welcher Sorge bezüglich dieses Themas
  der Außenminister nach Marokko fährt. Das tut er schon sehr besorgt. Ich glaube,
  Sie sprechen insbesondere Mali an. Dort hat es am Wochenende koordinierte und massive
  Angriffe gegeben. Das haben wir mit Sorge zur Kenntnis genommen. Wir haben insbesondere
  auch die deutschen Staatsangehörigen, die sich noch in der Region befinden ‑ es
  sind nicht mehr sehr viele ‑, per Landsleutebrief informiert. Sie wissen, dass für
  Mali seit geraumer Zeit eine Reisewarnung und auch eine Ausreiseempfehlung besteht.
  Diese möchte ich hier sehr gern erneuern. Die Lage scheint sich etwas stabilisiert
  zu haben; gleichwohl bleiben die Sicherheitslage insgesamt und die politische Lage
  volatil. Unserer Kenntnis nach gibt es vereinzelt noch kommerzielle Flüge, die tagsüber
  das Land verlassen können. Wir fordern deutsche Staatsangehörige auf, das Land erst
  gar nicht zu bereisen bzw., wenn sie sich dort befinden, sich zunächst in einer
  sicheren Umgebung aufzuhalten, und der Ausreiseaufforderung nachzukommen, wenn die
  Möglichkeit besteht. Ich würde die Frage gern an das BMI weiterreichen: Hält die
  Bundesregierung das Migrationsabkommen, das unter der Ampelregierung geschlossen
  wurde, für erfolgreich? Die Migrationsabkommen werden, soweit sie gut liefen, weitergeführt.
  Können Sie das vielleicht auch mit Zahlen unterlegen? Wie viele ausreisepflichtige
  Marokkaner wurden bereits zurückgeführt? Wie viele Fachkräfte konnten seitdem gewonnen
  werden? Die genauen Zahlen habe ich gerade nicht vorliegen. Ich kann sie aber gern
  nachreichen. Frau Deschauer, Marokko möchte sich als wichtiger Lieferant strategischer
  Mineralien positionieren, auch durch Ausbeutung von Rohstoffen in der Westsahara
  selbst. Hat die Europäische Union, hat Deutschland basierend auf dem Abkommen mit
  den USA, das schon von Marokko und den USA unterzeichnet wurde, Interesse an Rohstoffen
  und strategischen Mineralien aus Marokko? Ich hatte gesagt, dass im Grundsatz ein
  breiter Dialog geführt wird, der verschiedene Aspekte umfasst. Sie verstehen aber
  sicherlich, dass ich vor dem strategischen Dialog nicht tiefer darauf eingehen möchte.
  Ich glaube, die Anschlussfragen dazu betreffen dann auch andere Ressorts hier am
  Tisch. Weil Sie den strategischen Dialog angesprochen haben, frage ich nach strategischen
  Mineralien. An Herrn Hille und zuständigkeitshalber an Frau Singer: Inwieweit betrifft
  die Phishingattacke über Signal Bundesregierungsmitglieder? Konnte hierzu bereits
  eine Attribution, also eine Zuweisung der Urheberschaft durch die zuständigen Behörden,
  vorgenommen werden? wir haben hier schon am Freitag über dieses Thema gesprochen ‑
  Sie waren ja auch dabei. Ich kann dazu gern noch einmal die drei Grundlinien nennen.
  Es wird Sie nicht wundern, dass wir das natürlich wahrgenommen haben und eng begleiten.
  Ich muss dennoch um Verständnis dafür bitten, dass wir zu den Kommunikationswegen
  und den Kommunikationsmitteln, die innerhalb der Bundesregierung genutzt werden,
  nicht ins Detail gehen. Seien Sie sich aber dessen gewiss ‑, dass für die offizielle
  Kommunikation speziell abgesicherte Kommunikationskanäle genutzt werden ‑ auch das
  habe ich am Freitag schon gesagt. Frau Hamberger, was den zweiten Teil angeht, können
  wir gern kurz „unter zwei“ gehen. Dann kann ich dazu auch noch etwas sagen. Herr
  Hille, ich wüsste von Ihnen gerne ‑ wir haben das ja auch vor einigen Wochen schon
  gefragt ‑, ob in Richtung spezifischer Akteure ermittelt werden könnte. Der militärische
  Geheimdienst der Niederlande hatte schon vor Wochen in einem Fall von Phishing gesagt,
  dass Russland dahinterstecke. Gibt es ein Bewusstsein innerhalb der Bundesregierung,
  dass dabei etwas verpasst wurde und man das vielleicht auch zu leichtgenommen hat?
  Es gibt für die Bedeutung, die Relevanz dieses Themas ein Bewusstsein in der Bundesregierung.
  Seien Sie sich sicher, dass wir dieses Thema mit größtmöglicher Sensibilität begleiten
  und dass die Sicherheitsbehörden fortlaufend all diese Themen und Cyberangriffe
  auf diversen Kanälen im Blick haben und fortlaufend auch immer wieder Sensibilisierungen
  aussprechen; denn natürlich sind wir uns darüber bewusst, was das heutzutage für
  eine Bedeutung bekommen hat und wie sensibel der Umgang mit Kommunikation sein muss.
  Aber selbst die größte Sensibilität schützt nicht zwingend davor, dass dennoch einmal
  etwas passiert. Dann geht es darum, schnell zu reagieren. Das haben wir getan. Ist
  es möglich, zu benennen, welche Ministerien zum jetzigen Stand betroffen sind? Dazu
  sage ich zum dritten Mal den Satz ‑ und schiebe voraus, dass ich um Verständnis
  dafür bitte ‑, dass wir über die Kommunikationsmittel und die Kommunikationswege
  der Bundesregierung aus guten Gründen keine Auskunft geben. An Frau Deschauer: Politische
  Aktionen oder auch Mutmaßungen erzeugen ja manchmal Reaktionen. Der deutsche Botschafter
  in Moskau wurde, glaube ich, zur Stunde wegen des Vorwurfs des Kontakts der deutschen
  Regierung zu Terroristen ins russische Außenministerium einbestellt. Sehen Sie das
  als eine Revanchemaßnahme gegen den Verdacht an, dass Russland oder russische Akteure
  hinter den Phishingversuchen stecken? Ich sehe das vor allem als eine völlig haltlose
  Maßnahme an. Die Vorwürfe, die Russland äußert, sind völlig haltlos und unbegründet.
  Erwägen Sie die Einbestellung des russischen Botschafters in Deutschland, nachdem
  jetzt der deutsche Botschafter in Moskau einbestellt wurde? Ich glaube, Sie würden
  das auf dem üblichen Wege erfahren. Insofern habe ich Ihnen jetzt, in dem Moment,
  in dem wir hier sitzen, nichts anzukündigen. Gleichwohl würden wir das auf dem üblichen
  Wege tun. Ich würde gern noch eine Frage an Frau Singer richten: Wenn ich es richtig
  verstehe, geht es bei der Signal-Kommunikation, die möglicherweise betroffen ist,
  um Endgeräte, die nicht innerhalb der IT-Sicherheitsinfrastruktur des Bundes laufen,
  sondern um parallel genutzte Infrastrukturen. Meines Wissens ist es nach der Verschlusssachenanweisung
  zumindest auf SINA-Geräten nicht möglich, Signal zu nutzen. Daher würde ich gern
  wissen, inwiefern es in Ihrem Haus Überlegungen gibt, die sicherheitsgehärtete Variante
  der Kommunikation auch Dritten, die staatlich relevant sind ‑ beispielsweise Parteien ‑,
  besser zur Verfügung zu stellen bzw. dabei weitere Kriterien aufzustellen. Sie haben
  Recht, dass es auf den SINA-Geräten der Bundesregierung, die Sie angesprochen haben,
  andere Kommunikationsmöglichkeiten gibt. Inwieweit das für weitere Personen bzw.
  im weiteren Umfeld zur Verfügung gestellt werden kann oder soll, kann ich aktuell
  nicht beantworten. Gibt es denn nach zwei Monaten, die wir jetzt mit diesem Signal-Phishingangriff
  verbringen, wenigstens Überlegungen, irgendwelche erweiterten Schutzmaßnahmen zur
  Verfügung zu stellen? Dass der politische Raum nicht mit dem Regierungshandeln endet,
  ist ja offenkundig. Ich kann aktuell weder ausschließen noch bestätigen, dass es
  solche Überlegungen gibt Ich habe eine konkrete Frage an das Justizministerium und
  das Bildungsministerium: Möchten Sie bestätigen oder dementieren, dass Ihre Ministerinnen
  bei dem Signal-Fall betroffen sind? Ich kann dazu nur auf das verweisen, was der
  Regierungssprecher gesagt hat. Ich beziehe mich auf Berichterstattung des „SPIEGEL“
  und der „dpa“ vom Wochenende. Darin werden Ihre beiden Ministerinnen explizit genannt.
  Das könnten Sie ja dementieren. Ich muss mich dem an dieser Stelle leider anschließen:
  Ich kann an dieser Stelle weder etwas dementieren noch etwas bejahen. Frau Jenning,
  die Zahl der Kriegsdienstverweigerer ist drastisch gestiegen. Können Sie schon sagen,
  was dabei schiefläuft, junge Menschen zum Wehrdienst zu motivieren? Zuerst darf
  ich ganz klar machen, dass ich mir nicht zu eigen mache, dass dabei etwas schiefginge.
  Auch die Verknüpfung zwischen den Anträgen auf Krieg sdienstverweigerung und dem
  neuen Wehrdienst möchte ich so nicht stehen lassen. Vielleicht zur Einordnung, um
  alle mitzunehmen: Sie wissen, dass das Recht auf Krieg sdienstverweigerung ein zentrales
  Gut unserer Demokratie ist. Das heißt, selbstverständlich besteht nach wie vor die
  Möglichkeit, den Krieg sdienst zu verweigern. Das gilt auch für alle Statusgruppen.
  Das heißt, sowohl aktive Soldatinnen und Soldaten als auch Reservistinnen und Reservisten,
  aber auch Ungediente können den Krieg sdienst verweigern. Zur Einordnung einmal
  zum Verfahren: Wir als Bundeswehr sind tatsächlich nur die Poststelle für diese
  Anträge. Das heißt, sie werden bei uns gestellt, dann aber an das Bundesamt für
  Familie und zivilgesellschaftliche Aufgaben weitergeleitet. Vielleicht nehmen wir
  das als Abholpunkt. Tatsächlich stellen wir schon seit einigen Jahren, nämlich seit
  Beginn des russischen Angriffskrieges auf die Ukraine einen Anstieg der KDV-Anträge
  fest. Im vergangenen Jahr ‑ um eine Bezugsgröße zu nennen ‑ hatten wir insgesamt
  rund 7700 solcher Anträge. Zum Stichtag des 31. März liegen wir aktuell bei rund
  3500 solcher Anträge. Allerdings ist dieser Trend, ehrlich gesagt, nicht sehr überraschend.
  Gerade auch durch den Umstand des neuen Wehrdiensts beschäftigen sich viel mehr
  junge Menschen mit der Bundeswehr. Das ist ja genau die Debatte, die wir wollen.
  Der Output, dass sich dann auch mehr Menschen dazu entscheiden, einen solchen Antrag
  zu stellen, ist deswegen nicht überraschend. Weil auch von einem signifikanten Anstieg
  gesprochen wird, will ich als Beispielgröße Folgendes nennen: Im Jahr 2010, also
  noch zu Zeiten der Wehrpflicht, hatten wir rund 131 000 Anträge. Insofern: Ja, natürlich
  können wir einen Anstieg verzeichnen. Er begründet sich aber in erster Linie dadurch,
  dass die gesellschaftliche Debatte da ist. Insofern empfinden wir das nicht so,
  als gehe etwas schief. Im Gegenteil, wir haben auch an dieser Stelle schon häufig
  über die Freiwilligenzahlen und den Personalstand gesprochen. Wir verzeichnen durchaus
  einen positiven Trend. Das vergangene Jahr war das einstellungsreichste Jahr seit
  der Aussetzung der Wehrpflicht. Auch in den jüngsten Monaten dieses Jahres erkennen
  wir einen positiven Trend. Würden Sie also sagen, es sei eine gute Nachricht, dass
  es mehr Verweigerungen gibt? Es klingt bei Ihnen so, als würden sich deswegen mehr
  Menschen damit beschäftigen und es deswegen zu diesem Anstieg kommen. Es ist nicht
  entscheidend, ob wir das als gut oder schlecht bewerten, sondern das ist einfach
  eine Entwicklung, die läuft und die Ausfluss der Debatte ist, die geführt wird.
  Natürlich ist unser Ziel der Personalaufwuchs; das ist ganz klar. Aber das ist für
  uns sozusagen kein Alarmzeichen. Es ist nicht so, dass wir das Gefühl haben, nicht
  mehr als attraktive Arbeitgeberin wahrgenommen zu werden, sondern das ist einfach
  eine Entwicklung, die parallel läuft. Meine Frage geht an das BMVg oder gegebenenfalls
  an das Familienministerium. Haben Sie eine Übersicht über die Status- und Altersgruppen?
  Wer genau verweigert? Vielleicht kann ich es erst einmal für die Statusgruppen einordnen.
  Tatsächlich machen aktive Soldatinnen und Soldaten den kleinsten Teil aus. Wenn
  wir auf dieses Jahr schauen, dann sehen wir, dass es nicht einmal zwei Prozent sind.
  Insgesamt sind es 64. Den größten Anteil macht natürlich der Bereich der Ungedienten
  aus. Für 2026 sind es jetzt etwas über 3000 Anträge, die von Ungedienten gestellt
  wurden. Zum Altersband kann ich Ihnen keine Auskunft geben. Dazu liegt mir nichts
  vor. Sind Sie mit dem Rücklauf auf Ihre Fragebogenaktion zufrieden? Können Sie uns
  aktuelle Zahlen dazu nennen? Ich darf auf das verweisen, was der Minister am Wochenende
  gesagt hat. Vielleicht haben Sie es gesehen. Der Verteidigungsminister hat sich
  dazu am Wochenende eingelassen und gesagt, dass er zum jetzigen Zeitpunkt zufrieden
  sei, dass wir aber etwas Zeit bräuchten, um valide Zahlen zu haben, bevor wir etwas
  zu Rückläuferquoten sagen könnten. Ich darf auch darauf verweisen, dass der Minister
  gesagt hat, dass zum Sommer damit zu rechnen sei, dass wir mit konkreteren Quoten
  an die Öffentlichkeit gingen. Frau Jenning, jetzt wurden beide Aspekte schon angesprochen,
  Krieg sdienstverweigerungen und der Fragebogen. Haben Sie irgendwelche Anzeichen
  dafür, dass, sobald Sie den Fragebogen verschicken, als Antwort Krieg sdienstverweigerungen
  kommen? Können Sie also zwischen beidem einen sachlichen Zusammenhang, eine Korrelation
  feststellen? Das wird bei uns so nicht statistisch ausgewertet, dass ich sagen könnte:
  Wenn Max Mustermann den Fragebogen bekommt, dann haben wir zwei Wochen später den
  Antrag auf Krieg sdienstverweigerung. ‑ Das wird einfach nicht statistisch erfasst.
  Wie Sie die Quoten für sich bewerten, dass mit ansteigendem Versand der Fragebögen
  auch die Zahl der Krieg sdienstverweigerungsanträge steigt, überlasse ich Ihnen.
  Aber diese Verknüpfung würde ich so nicht herstellen. Dann würde ich es anders machen.
  Sie haben schon gesagt, Sie hätten nicht alle statistischen Daten dabei. Ich glaube,
  viele Kollegen hier würden sich darüber freuen, wenn es eine saubere statistische
  Aufbereitung ‑ ich weiß nicht, ob von Ihnen oder von Herrn Lenz ‑ darüber, welche
  Altersgruppen verweigert haben und wann verweigert wurde, geben würde. Das wäre
  tatsächlich sehr hilfreich für unsere Arbeit. Ich kann gern schauen, was möglich
  ist. Ich will Ihnen aber nicht zu viel Hoffnung machen, dass wir alle statistischen
  Details so erheben. Ich bin mir sehr sicher, dass ich Ihnen Angaben zu einer Korrelation
  zwischen den Zeitpunkten, zu denen ein Fragebogen und zu denen ein Antrag kommt,
  auch nicht nachreichen kann. Aber bezüglich der Altersbänder können wir gern schauen,
  was uns vorliegt. Frau Jenning, ich habe etwas gezuckt, als Sie den Referenzrahmen
  2010 gebracht haben. Das war ja noch vor der Aussetzung der Wehrpflicht und ist
  ja eine ganz andere Kategorie. Im Jahr 2024 haben im ganzen Jahr fast so viele Menschen
  den Krieg sdienst verweigert wie jetzt bereits in den ersten drei Monaten. Sind
  Sie sicher, dass Sie das jetzt nicht als problematisch ansehen? Das ist einfach
  ein Trend, den man beobachten muss. In unserer Verfassung ist festgelegt, dass man
  die Möglichkeit hat, den Dienst an der Waffe zu verweigern. Diese Möglichkeit eröffnen
  wir natürlich. Deswegen hinkt meines Erachtens auch der Vergleich mit der Zeit der
  Wehrpflicht ‑ 2010 hatte ich als Referenz genannt ‑ nicht, weil sich die Menschen,
  gerade junge Menschen, jetzt in der Diskussion damit auseinandersetzen und sich
  fragen, ob sie den Dienst bei uns antreten wollen oder nicht. Dass aus dieser Beschäftigung,
  wenn man darüber nachdenkt und sich überlegt, ob man das will oder nicht, natürlich
  auch der Aspekt kommt, einen förmlichen Antrag zu stellen, ist für uns nicht überraschend.
  Das müssen wir beobachten. Nichtsdestoweniger sehen wir auch, dass sich die für
  uns entscheidende Linie, nämlich der Personalzuwachs, in die richtige Richtung bewegt.
  Insofern wird bei uns natürlich beides betrachtet, aber nicht als so bedrohlich
  erachtet, wie es hier vielleicht dargestellt wurde. Sehen Sie einen Zusammenhang
  mit der Debatte um die zumindest gesetzlich bestehende Genehmigungspflicht für Auslandsreisen?
  Als Lernfrage: Kann man sich durch eine Krieg sdienstverweigerung dieser Genehmigungspflicht
  entziehen? Wie Sie wissen und wie wir hier auch schon besprochen haben, ist diese
  Genehmigungspflicht ausgesetzt. Das heißt ‑ das darf ich hier noch einmal ganz ausdrücklich
  betonen ‑, dass sich niemand bei uns abmelden muss, wenn er ins Ausland gehen will.
  Insofern sehe ich diese Verknüpfung so nicht. Können Sie sagen, ob Sie einen Anstieg
  der Zahl der Krieg sdienstverweigerungen seit dieser Debatte gesehen haben? Tatsächlich
  liegen mir die Zahlen insgesamt für den Jahresverlauf vor. Das kann ich jetzt nicht
  zu einem Stichtag abrufen, sodass ich Ihnen sagen könnte ‑ über Ostern gab es ja,
  glaube ich, die Diskussion ‑, am Ostermontag oder an dem Dienstag nach Ostern sei
  das explodiert. Das können wir so nicht nachvollziehen. Wenn ich die Zahlenentwicklung
  insgesamt sehe, dann halte ich das aber auch für fernliegend. Die französische Verteidigungsministerin
  hat den Vermittlern zwischen der französischen und der deutschen Seite beim Thema
  FCAS eine Frist bis Dienstag gesetzt. Was erwarten Sie, was morgen passieren wird?
  Wird es ein Statement des französischen Verteidigungsministeriums geben? Was werden
  wir morgen über den Fortgang des FCAS-Projekts erfahren? Die Frage geht an das Verteidigungsministerium.
  Ich kann Ihnen nicht sagen, was aus Frankreich oder aus anderen Nationen vielleicht
  kommt. Ich kann Ihnen für uns nur sagen, dass wir bezüglich FCAS natürlich insbesondere
  mit dem Bundeskanzleramt im engen Austausch stehen. Zum jetzigen Zeitpunkt kann
  ich Ihnen keine weiteren Informationen geben. Aber vielleicht ist es ganz sinnvoll,
  wenn ich noch ergänze. Denn Bundeskanzler Merz und Präsident Macron haben sich erst
  in der vergangenen Woche auch zu diesem Thema ausgetauscht. Das Ergebnis dessen
  war, dass sich die Verteidigungsminister jetzt mit nächsten Schritten befassen sollen.
  Wenn der Staatspräsident seine Verteidigungsministerin beauftragt, Gespräche zu
  führen, dann gehe ich davon aus, dass diese Gespräche zwischen den Verteidigungsministerien
  geführt werden. Herr Hille, ist das GKV-Sparpaket an diesem Mittwoch im Kabinett?
  Das wurde ja bereits so angekündigt. Wir sind optimistisch, dass das, wie angekündigt,
  am Mittwoch im Kabinett sein wird. Frage ans BMF: Inwiefern ist auch das BMF für
  die Einführung einer Zuckersteuer? Sie wissen, dass die Bundesregierung an einem
  Gesamtpaket von Reformen arbeitet. Dazu kann auch die Zuckersteuer zählen. Minister
  Klingbeil ist dafür offen. Jetzt gilt es, die weiteren Beratungen abzuwarten. Wird
  die Ministerin bezüglich Ihres Entwurfs denn bis Mittwoch hart bleiben? Wie schon
  gesagt wurde, dauern die regierungsinternen Beratungen derzeit an. Wir sind optimistisch,
  dass das Gesetz am Mittwoch ins Kabinett geht. Aber bis dahin warten wir die Beratungen
  ab und geben keine Wasserstandsmeldung ab. Können wir also davon ausgehen, dass
  sich nichts mehr ändert? Es gibt eine Untersuchung, wonach die Zwölfuhrregel beim
  Tanken nicht den Verbrauchern zugutekommt, sondern den Margen vieler Unternehmen.
  Hält die Bundesregierung noch an diesem Werkzeug fest, und sieht man gegebenenfalls
  die Notwendigkeit nachzusteuern? Die Frage geht an Herrn Hille oder das BMWE. Ich
  kann gern starten. Zunächst ist festzuhalten, dass die Zwölfuhrregel nur ein Teil
  des Kraftstoffmaßnahmenpaketes ist. Ziel des gesamten Paketes ist es, den Wettbewerb
  im Kraftstoffbereich zu stärken. Daher sollte man die Wirkung des gesamten Pakets
