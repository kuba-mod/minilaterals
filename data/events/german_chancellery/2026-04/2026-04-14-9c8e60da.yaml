title: Press conference on German-Ukrainian intergovernmental consultations “We are
  partners for a secure Europe”
text: 'Germany and Ukraine want to intensify their cooperation in areas such as the
  development of weapons systems. Federal Chancellor Friedrich Merz received Ukrainian
  President Volodymyr Zelenskyy for German-Ukrainian intergovernmental consultations
  in Berlin. The first consultations in over 20 years set the course for a strategic
  partnership. “Our cooperation is more effective today, our trusting partnership
  stronger and our friendship and the bond between our societies deeper than ever,”
  said Merz at the end of the meeting. Both governments agreed on a joint declaration
  that further strengthens this partnership. Ukraine and Germany also signed agreements
  on security cooperation and on industrial reconstruction in Ukraine. Read the transcript
  of the press conference here (German only):'
