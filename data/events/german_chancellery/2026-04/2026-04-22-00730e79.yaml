title: 'Staatsminister Weimer eröffnet Medientage Mitteldeutschland: „Brauchen einen
  starken, unabhängigen Kultur- und Medienraum in Europa“'
text: 'Der Staatsminister für Kultur und Medien, Wolfram Weimer, hat heute in Leipzig
  die Medientage Mitteldeutschland eröffnet. In einer medienpolitischen Grundsatzrede
  nahm der Staatsminister aktuelle Herausforderungen der Medienordnung in den Blick.
  Im Fokus standen die tiefgreifenden Veränderungen durch Digitalisierung, Künstliche
  Intelligenz und globale Plattformen sowie deren Auswirkungen auf die Meinungsvielfalt
  und die demokratische Öffentlichkeit. Weimer betonte hierbei die Bedeutung eines
  gemeinsamen europäischen Vorgehens. Staatsminister Wolfram Weimer: „Um anspruchsvollen
  Qualitätsjournalismus und echte Vielfalt zu sichern, brauchen wir einen starken,
  unabhängigen Kultur- und Medienraum in Europa. Entscheidend wird es dabei sein,
  unabhängige journalistische Inhalte und tragfähige Geschäftsmodelle durch europäische
  Lösungen zu stärken. Angesichts der globalen Wirkmacht von Big-Tech-Akteuren wird
  uns das nur durch eine dauerhafte Zusammenarbeit gelingen. Deshalb setze ich mich
  in Brüssel für die Entwicklung paneuropäischer Medienplattformen und für die Weiterentwicklung
  der Richtlinie über Audiovisuelle Mediendienste ein. Oberstes Ziel ist es dabei,
  faire Wettbewerbsbedingungen zwischen Plattformen und klassischen Medien zu schaffen.
  Genauso wichtig ist aber auch der Erhalt bestehender kostenfreier werbefinanzierter
  Erlösmodelle.“ Die 27. Ausgabe der Medientage Mitteldeutschland findet auf dem Gelände
  der Media City Leipzig statt. Ausrichter ist die Arbeitsgemeinschaft Medientage
  Mitteldeutschland e.V.. Mitglieder sind unter anderem die Landesmedienanstalten
  von Sachsen-Anhalt und Thüringen, der MDR, das ZDF, die Sächsische Staatskanzlei
  sowie die Staatskanzlei Thüringen, die Stadt Leipzig und die Mitteldeutsche Medienförderung.
  Weitere Informationen stehen bereit unter https://medientage-mitteldeutschland.de/'
