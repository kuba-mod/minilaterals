title: 'Pressestatement von Bundeskanzler Merz zu Beginn des Nordsee-Gipfels Kanzler
  Merz vor Nordsee-Konferenz: Energieversorgung in der Nordsee voranbringen'
text: 'Bundeskanzler Friedrich Merz hat die teilnehmenden Staats- und Regierungschefs
  zum dritten internationalen Nordsee-Gipfel empfangen. Es gehe vor allem darum, den
  Bau neuer Windenergieanlagen auf See - sogenannte Offshore-Anlagen - zügig voranzubringen.
  Und zum anderen werde auch in Hamburg die Sicherheit im Hohen Norden Thema der Gespräche
  in Hamburg. Zudem dankte der Bundeskanzler der Hansestadt für ihre Gastfreundschaft.
  Deutschland richtet in Hamburg am 26.1.2026 nach Einladung durch Bundeskanzler Merz
  und Bundeswirtschafts- und Energieministerin Reiche erstmals den Nordsee-Gipfel
  aus. Weitere Informationen lesen Sie bitte hier . Meine Damen und Herren, herzlich
  willkommen in Hamburg bei diesem winterlichen Wetter. Trotz des Wetters freue ich
  mich sehr, dass ich Gelegenheit habe, den dritten Nordsee-Gipfel als Gastgeber hier
  in Hamburg durchzuführen. Ich freue mich, dass die Kolleginnen und Kollegen aus
  den Anrainerstaaten der Nordsee meiner Einladung gefolgt sind. Wir wollen uns heute
  über zwei große Themen unterhalten. Erstens: die Energieversorgung unserer Länder.
  Sie wissen, dass wir bereits eine große Zahl von Offshore-Anlagen gebaut haben.
  Das soll zügig weiter vorangehen. Zweitens: Ein großes Thema, das uns seit vielen
  Jahren beschäftigt und in den letzten Wochen eine besondere Aktualität bekommen
  hat, ist die Sicherheit in der Nordsee. Auch das wird ein Thema unserer Gespräche
  heute hier in Hamburg sein. Ich danke der Stadt Hamburg herzlich für die Gastfreundschaft
  und dafür, dass sie uns aufnimmt. Ich möchte den Bürgerinnen und Bürgern der Stadt
  sagen: Haben Sie ein wenig Nachsicht mit den Einschränkungen, die damit heute einhergehen ‑
  sie dienen einem guten Zweck. Ich will mich auch persönlich dafür einsetzen, dass
  wir dieses Konzept, dieses Projekt weiter voranbringen: erstens die Energieversorgung
  durch den Bau von Offshore-Anlagen im interessantesten wirtschaftlichen Raum, den
  wir dafür haben, und zweitens das Thema Sicherheit im Norden, das uns auch auf dieser
  Konferenz begleiten wird. Schön, dass Sie dabei sind ‑ beim nächsten Mal dann wieder
  im Warmen und im Trockenen.'
