title: Newsletter Nachhaltigkeit aktuell – Ausgabe 02/2026
text: 'Beim 17. Petersberger Klimadialog warb Bundeskanzler Merz für eine Klimapolitik,
  die ehrgeizig, international abgestimmt und wirtschaftlich tragfähig ist. In Zeiten
  geopolitischer Unsicherheiten müssen Klima-, Wirtschafts- und Energiepolitik enger
  verzahnt werden. Das Bundeskabinett hat ein Klimaschutzprogramm verabschiedet, um
  bis 2030 25 Millionen Tonnen CO2 einzusparen. Damit können die Klimaziele für 2030
  und 2040 erreicht werden. Das Programm wurde unter Federführung des Bundesumweltministeriums
  erarbeitet. Seit Oktober 2025 ist das Sondervermögen für Infrastruktur und Klimaneutralität
  einsatzbereit. Bund und Länder stehen am Anfang einer Investitionsoffensive, die
  über zwölf Jahre angelegt ist. Die wichtigsten Fragen und Antworten zum Sondervermögen
  im Überblick. Deutschland und Brasilien wollen ihre bilateralen Verbindungen weiter
  vertiefen. Bei den 3. Deutsch-Brasilianischen Regierungskonsultationen in Hannover
  hob Bundeskanzler Friedrich Merz die Bedeutung einer starken und dynamischen strategischen
  Partnerschaft hervor. Die Industrie soll klimafreundlicher werden – dank einer starken
  Wasserstoff-Infrastruktur. Mit dem Wasserstoffbeschleunigungsgesetz schafft die
  Bundesregierung wichtige Rahmenbedingungen. Das Gesetz ist im April in Kraft getreten.
  Nachhaltiges Handeln ist auch im Verwaltungsalltag möglich. Schritt für Schritt
  nähert sich das Presse- und Informationsamt der Bundesregierung seinem Ziel: einer
  umweltfreundlichen und klimaneutralen Arbeitsweise bis 2030. Nun wurde die Umwelterklärung
  2025 veröffentlicht. Das Bundesumweltministerium hat die Klimabilanz der Bundesverwaltung
  für 2023 veröffentlicht. Dabei zeigen sich messbare Verbesserungen zum Beispiel
  beim Gebäudebetrieb, der Energieversorgung und der Mobilität. Somit unterstreicht
  der Bund seine Verantwortung für den Klimaschutz und auch seine Vorbildfunktion.
  Die Reform der gesetzlichen Krankenversicherung ist eine der größten Sozialstaatsreformen
  der vergangenen Jahrzehnte. Bundeskanzler Merz würdigte den Beschluss als „historisch“
  und erklärte, dass die Beiträge stabil und das Gesundheitssystem verlässlich bleiben
  müssen. Beim Auftakt des bundesweiten Girls’ Days präsentierten Berliner Schülerinnen
  dem Kanzler einen innovativen Technik-Parcours im Kanzleramt. Bundeskanzler Merz
  betonte, wie wichtig es sei, dass mehr junge Frauen auch Berufe aus den technischen
  Bereichen erlernen. Mehr Tarifbindung, mehr Lohngerechtigkeit, fairerer Wettbewerb:
  Öffentliche Aufträge des Bundes sollen nur noch an Unternehmen gehen, die ihre Beschäftigten
  nach Tarif bezahlen. Der Bundesrat hat dem von der Bundesregierung vorgelegten Tariftreuegesetz
  zugestimmt. Es gibt zu wenig Wohnraum in Deutschland. Das Förderprogramm „Gewerbe
  zu Wohnen“ soll nun helfen, dies zu ändern. Gefördert wird der Umbau von leerstehenden
  Gewerbeimmobilien zu Wohnungen. Die wichtigsten Fragen und Antworten zu dem Programm
  im Überblick. Mit dem neuen Düngerecht soll die Nitratbelastung von Grund- und Oberflächengewässern
  verringert werden. Dafür wird ein bundesweites Monitoring eingeführt. Zudem wird
  EU-Recht für den Handel mit Düngemitteln national umgesetzt. Die Treibhausgas-Emissionen
  sollen auch im Verkehrssektor substantiell geringer werden, damit Deutschland bis
  2045 klimaneutral werden kann. Dafür hat der Bundestag die Gesetzesnovelle der Bundesregierung
  zur Treibhausgas-Minderungsquote verabschiedet. Für einen Umstieg auf ein E-Auto
  sind ausreichende Lademöglichkeiten eine wichtige Voraussetzung. Die Bundesregierung
  treibt deshalb den Ausbau weiter voran – mit einem neuen Förderprogramm für Ladeinfrastruktur
  an und in Mehrparteienhäusern. Das USB-C-Ladekabel wird in der EU ab dem 28. April
  auch für alle neu angebotenen Laptops Pflicht. Für alle anderen elektronischen Kleingeräte
  gilt diese Regelung bereits seit Ende 2024. Damit soll weniger Elektroschrott entstehen.
  Das Gemeinschaftswerk Nachhaltigkeit ist eine Initiative zur Förderung von Nachhaltigkeitsengagement
  in Deutschland. Die offene Webplattform macht nachhaltige Aktivitäten sichtbar,
  vernetzt und inspiriert zu neuem Engagement. Durch Aktionswochen, Gemeinschaftsziele,
  Wettbewerbe und Innovationsprozesse werden Lösungen für eine nachhaltige Entwicklung
  aufgezeigt. Auch Bundeskanzleramt und Bundespresseamt sind Mitglieder.'
