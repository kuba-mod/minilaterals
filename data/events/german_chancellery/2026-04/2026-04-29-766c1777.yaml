title: Im Kabinett beschlossen Besserer Schutz für Mieterinnen und Mieter
text: Für den besseren Schutz von Mieterinnen und Mietern will die Bundesregierung
  Lücken im sozialen Mietrecht schließen. Gerade in Ballungsräumen fällt es vielen
  Menschen immer schwerer, eine bezahlbare Wohnung zu finden. Das liegt auch daran,
  dass der Anwendungsbereich und die Handhabung der Mietpreisbremse meist unklar sind.
  Daher will die Bundesregierung mit einer Gesetzesänderung den Schutz von Mieterinnen
  und Mietern verbessern. Damit wird ein weiterer Punkt aus dem Koalitionsvertrag
  umgesetzt. Eine Maßnahme ist die Begrenzung der Indexmiete. Bisher wird nur die
  Ausgangsmiete begrenzt. Künftig sollen jährliche Indexsteigerungen, die drei Prozent
  übersteigen, nur noch zur Hälfte mieterhöhend berücksichtigt werden. Mietsteigerungen
  werden also begrenzt. Bei Indexmieten werden Erhöhungen an den Preisindex für Lebenserhaltung
  des statistischen Bundesamtes gekoppelt. Wenn sich also der Preisindex erhöht, erhöht
  sich im gleichen Verhältnis die Indexmiete des Mietvertrages. Mit dem Gesetz werden
  auch Regeln für Kurzzeitvermietungen und Vermietung möblierter Wohnungen geschaffen.
  So gibt es nun erstmals eine klare zeitliche Höchstgrenze für Kurzzeitmietverträge.
  Nur dieser Zeitraum ist dann von der Mietpreisebremse ausgenommen. Damit wird den
  Mieterinnen und Mietern Sicherheit verschafft. Auch die Vermietung möblierter Wohnungen
  wird klarer geregelt. So muss nach dem Gesetz der Zuschlag für Möbel gesondert aufgeführt
  werden. Zudem muss der Möblierungszuschlag auch angemessen sein. Entscheidend ist
  der Zeitwert. Bei einer vollmöblierten Wohnung wird ein Möblierungszuschlag von
  maximal zehn Prozent der Nettokaltmiete als angemessen angesehen. Vorgesehen ist
  darüber hinaus eine Ausweitung der Regelung über die sogenannte Schonfristzahlung.
  Das betrifft Mieterinnen und Mieter, denen wegen Mietrückständen gekündigt wurde.
  Zahlen sie die Miete nach, soll eine Kündigung einmalig abwendet werden können.
