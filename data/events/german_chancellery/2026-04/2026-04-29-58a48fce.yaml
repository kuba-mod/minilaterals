title: Start des Gestaltungswettbewerbs für das Denkmal für die polnischen Opfer des
  Zweiten Weltkrieges und die Opfer der deutschen Besatzung in Polen 1939-1945
text: 'Der Bund hat den internationalen Gestaltungswettbewerb für das „Denkmal für
  die polnischen Opfer des Zweiten Weltkriegs und der deutschen Besatzung in Polen
  1939–1945“ gestartet. Für die Teilnahme am Gestaltungswettbewerb können sich Künstlerinnen,
  Künstler, Künstlergruppen sowie Architektinnen und Architekten noch bis zum 5. Mai
  2026 bewerben. Für den Wettbewerb und die anschließende Realisierung des Denkmals
  stellt der Bund insgesamt fünf Millionen Euro zur Verfügung. Über 80 Jahre nach
  dem Ende des Zweiten Weltkriegs soll im Zentrum der Bundeshauptstadt auf dem Gelände
  der früheren Kroll-Oper unweit des Bundeskanzleramts und des Deutschen Bundestages
  ein Ort des Gedenkens an die Opfer nationalsozialistischer Verbrechen in Polen entstehen.
  Das „Denkmal für die polnischen Opfer des Zweiten Weltkrieges und die Opfer der
  deutschen Besatzung in Polen 1939-1945“ erinnert auch an die polnischen Bürgerinnen
  und Bürger, die in den deutschen Konzentrationslagern und anderen Lagern ausgebeutet,
  gequält und ermordet wurden. Der Auftakt des Gestaltungswettbewerbs wird von einer
  zweitägigen deutsch-polnischen Konferenz von Expertinnen und Experten zur Erinnerungskultur
  begleitet. Eröffnet wird die Konferenz heute durch den Staatsminister für Kultur
  und Medien, Wolfram Weimer, und seine polnische Amtskollegin, der Ministerin für
  Kultur und nationales Erbe, Marta Cienkowska. Im Vorfeld sagte Staatsminister Weimer:
  „Mit dem Start des Wettbewerbs beginnt die konkrete Ausgestaltung dieses für Vergangenheit
  und Zukunft so wichtigen Denkmals. Die Errichtung des Denkmals ist eines der bedeutsamsten
  erinnerungspolitischen Projekte Deutschlands. Mehr als 80 Jahre nach dem Ende des
  Zweiten Weltkriegs geben wir dem Gedenken an die Millionen Opfer des deutschen Angriffskrieges
  auf Polen und der anschließenden Besatzung endlich eine sichtbare, dauerhafte Form.
  Rund fünf Millionen Menschen in Polen verloren ihr Leben. Sie wurden Opfer des Nationalsozialismus,
  der auf Vernichtung und die Auslöschung der polnischen Identität zielte. Dass wir
  dieses Denkmal nun auf den Weg bringen, ist Ausdruck unserer historischen Verantwortung
  und ein wichtiges Zeichen gegenüber Polen.“ „Auf der Landkarte des Nachkriegs-Gedenkens
  gibt es noch immer weiße Flecken. Und einer davon – ein außergewöhnlich wichtiger
  – beginnt nun, gefüllt zu werden. Die deutsche Regierung hat, gemeinsam mit anderen
  Organen, einen Raum gefunden für ein Mahnmal des Gedenkens an die polnischen Opfer
  des Zweiten Weltkriegs und der deutschen Besatzung Polens 1939-1945. Es ist ein
  besonderer Ort, denn er ist von der Geschichte gezeichnet. Genau dort, in der früheren
  Kroll-Oper, begründete Adolf Hitler den Angriff auf Polen am 1. September 1939“,
  sagte Marta Cienkowska, polnische Ministerin für Kultur und nationales Erbe. „Dass
  wir heute hier sind, ist nicht zufällig geschehen. Das ist das Ergebnis von jahrelanger
  Arbeit, Gesprächen, Spannungen, Appellen, Debatten – auch solcher, die im Bundestag
  geführt wurden. Es ist das Ergebnis des Mutes vieler Kreise, die nicht einverstanden
  waren zu schweigen. Und für diese Konsequenz, für diese Anstrengung gilt es heute,
  Dankbarkeit auszudrücken“, fügte sie hinzu. Uwe Neumärker, Direktor Stiftung Denkmal
  für die ermordeten Juden Europas erklärte: „Als Bundesstiftung, die den gesetzlichen
  Auftrag hat, aller Opfer des Nationalsozialismus würdig zu gedenken, begrüßen wir
  die Schaffung eines zentralen Orts im Herzen der deutschen Hauptstadt, der dem Leid
  der polnischen Staatsbürger während der Besatzungsherrschaft zwischen 1939 und 1945
  gewidmet ist. Er soll sowohl der Dimension deutscher Verbrechen gerecht werden als
  auch individuelle Schicksale sichtbar machen, um Empathie zu fördern. Angesichts
  der bislang noch begrenzten Vertrautheit der Deutschen mit unserem Nachbarland Polen,
  dem neben Frankreich wichtigsten Partner in Europa, ist das Denkmal der erste Schritt
  auf dem Weg zur Gründung eines Deutsch-Polnischen Hauses als Stätte des Gedenkens,
  der Begegnung und des Verstehens. Historisches Wissen, gemeinsames Erinnern und
  konstruktiver Dialog sind die entscheidenden Grundlagen für die Stärkung unserer
  Freundschaft und des europäischen Gedankens.“ Die Expertenkonferenz soll der fachlichen
  Vorbereitung der Wettbewerbsauslobung dienen. Hierzu werden Erfahrungen und Expertenstimmen
  aus verschiedenen Ländern zusammengeführt, die über Wissen und Praxis bei der Realisierung
  ähnlicher Projekte verfügen oder sich mit Fragen der Erinnerungspolitik befassen.
  Konzipiert und vorbereitet wurde die Konferenz durch die Stabsstelle „Deutsch-Polnisches
  Haus“ bei der Stiftung Denkmal für die ermordeten Juden Europas gemeinsam mit dem
  Zentrum für Historische Forschung Berlin der Polnischen Akademie der Wissenschaften.
  Die Stabstelle wird durch den Beauftragten der Bundesregierung für Kultur und Medien
  (BKM) gefördert und begleitet die Planungen zur Realisierung des Denkmals. Die Errichtung
  des Denkmals geht auf einen Beschluss des Deutschen Bundestages zurück. Im Jahr
  2025 wurde bereits ein temporärer Gedenkort auf dem Gelände der früheren Kroll-Oper
  errichtet. Auf diesem Gelände wird im Anschluss an den Wettbewerb ein dauerhaftes
  Denkmal entstehen. Den Gestaltungswettbewerb richtet das Bundesamt für Bauwesen
  und Raumordnung (BBR) aus. Weitere Informationen zum Bewerbungsverfahren sind auf
  Deutsch und Polnisch hier abrufbar. Informationen zum Hintergrund des Denkmals finden
  Sie hier .'
