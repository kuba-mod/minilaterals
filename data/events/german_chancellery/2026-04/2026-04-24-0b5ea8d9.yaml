title: Humanitäre, finanzielle und militärische Hilfe So unterstützt Deutschland die
  Ukraine
text: 'In der Hoffnung auf Frieden steht Deutschland fest an der Seite der Ukraine.
  Foto: Tobias Schwarz/AFP via Getty Images Der russische Angriffskrieg gegen die
  Ukraine verursacht unermessliches Leid. Unzählige Menschen haben bereits ihr Leben
  verloren. Auch im nunmehr fünften Kriegsjahr gibt Russland in seinen Angriffen nicht
  nach. Deutschland steht weiter entschlossen an der Seite der Ukraine und ist seit
  April 2026 auch in strategischer Partnerschaft mit dem Land verbunden. Mit der Verabschiedung
  des 20. EU -Sanktionspakets im April 2026 erhöhen wir den Druck auf Russland weiter.
  Die Ukraine wird in ihrer Verteidigungsfähigkeit mit einem 90-Milliarden-Euro-Kredit
  der Europäischen Union substanziell unterstützt. Die Bundesregierung hat seit Beginn
  des russischen Angriffskriegs am 24.02.2022 bilaterale zivile Unterstützung für
  die Ukraine in Höhe von rund 41 Milliarden Euro geleistet und militärische Unterstützung
  in Höhe von circa 55,5 Milliarden Euro geleistet beziehungsweise für die kommenden
  Jahre bereitgestellt. Unterstützung für die Ukraine: Einen Überblick über wichtige
  Bereiche von Hilfsleistungen der Bundesregierung finden Sie in diesem Download PDF,
  214 KB, barrierefrei . Die Bundesregierung finanziert über die Kreditanstalt für
  Wiederaufbau (KfW) die Reparatur und den Erhalt von Strom‑ und Wärmeanlagen, stellt
  Ersatzteile bereit und unterstützt den Wiederaufbau zerstörter Kraftwerke. Gleichzeitig
  wird die Luftverteidigung durch die Beschaffung und Bereitstellung von Flugabwehrsystemen
  gestärkt, um die Energieinfrastruktur vor weiteren Angriffen zu schützen. Das Auswärtige
  Amt (AA) engagiert sich zudem beim physischen Schutz von Kernkraftwerken und unterstützt
  die Internationale Atomenergie-Organisation (IAEO) bei der Entsendung von Expertinnen
  und Experten. Humanitäre Hilfsaktivitäten werden in enger Zusammenarbeit mit internationalen
  Organisationen und Nichtregierungsorganisationen finanziert, sodass medizinische
  Versorgung, Lebensmittel, sauberes Wasser und weitere Nothilfen insbesondere die
  Menschen in Frontnähe schnell erreichen. Millionen Binnengeflüchtete und zurückkehrende
  Geflüchtete benötigen ebenfalls Unterstützung. Besonders gefährlich für die Zivilbevölkerung
  in der Ukraine sind auch die großflächig verstreuten Blindgänger und Minen. Neben
  dem Räumen und Kartografieren dieser Sprengkörper ermöglicht das Auswärtige Amt
  Informationskampagnen, um die Menschen im Umgang mit der täglichen Bedrohung zu
  schulen. Deutschland ist der größte Unterstützer der Ukraine – auch im militärischen
  Bereich: Die Hilfe umfasst Ausrüstungs- und Waffenlieferungen aus Bundeswehr‑Beständen
  sowie Lieferungen aus der Industrie, die durch Ertüchtigungshilfen der Bundesregierung
  finanziert werden. Zu den gelieferten Systemen zählen Flugabwehr‑, Artillerie‑ und
  Gefechtsfahrzeuge, geschützte Transportfahrzeuge, Handwaffen, Munition, Sanitätsmaterial
  und Schutzbekleidung. Darüber hinaus hat Deutschland seit Kriegsbeginn fast 26.000
  ukrainische Soldatinnen und Soldaten in Deutschland ausgebildet. Mehr als eine Million
  ukrainische Geflüchtete, vor allem Frauen und Kinder, haben seit Beginn des vollumfänglichen
  Krieges in Deutschland Schutz gefunden. Die Bundesregierung unterstützt die Länder
  und Kommunen finanziell bei der Unterbringung und Versorgung, etwa durch pauschale
  Entlastungsbeiträge und die Bereitstellung bundeseigener Liegenschaften als Unterkünfte.
  Geflüchtete erhalten bei Bedarf staatliche Unterstützung, Zugang zu Berufssprachkursen,
  Weiterbildungs- und Eingliederungsangeboten sowie Hilfe der Jobcenter bei der Arbeitssuche.
  Das Hilfe‑Portal Germany4Ukraine ermöglicht die Online ‑Beantragung von Aufenthaltstiteln,
  Kursen sowie Anträgen für finanzielle Unterstützung. Die kostenfreie Hotline „Nummer
  gegen Kummer“ steht in ukrainischer und russischer Sprache zur Verfügung. Laut einer
  Studie des Bundesinstituts für Bevölkerungsforschung war drei Jahre nach Ankunft
  etwas mehr als die Hälfte der Ukrainerinnen und Ukrainer erwerbstätig. Die Bundesagentur
  für Arbeit veröffentlicht monatlich weitere Zahlen zur Beschäftigungssituation der
  Geflüchteten. Um die wirtschaftliche Stabilität der Ukraine zu sichern, fördert
  Deutschland insbesondere kleine und mittlere Unternehmen sowie die Fachkräfteausbildung.
  Das Finanzierungsinstrument „ UkraineConnect “ mit einem Startvolumen von 45 Millionen
  Euro vergibt attraktive Darlehen f ü r Investitionen von Unternehmen aus Deutschland
  und Europa. Ukrainische Unternehmen können ihrerseits von zinsgünstigen Krediten
  profitieren. Ukrainische Führungskräfte werden außerdem über das Programm „ Partnering
  in Business with Germany “ unterstützt. Zusätzlich leistet die Bundesregierung milliardenschwere
  Zuschüsse über ein vom Internationalen Währungsfonds (IWF) verwaltetes Konto, um
  die staatliche Handlungsfähigkeit der Ukraine zu stärken. Im Rahmen seiner Verantwortung
  für die Wiedergutmachung nationalsozialistischen Unrechts unterstützt die Bundesregierung
  über die Jewish Claims Conference auch die Holocaust-Überlebenden in der Ukraine.
  Der Wiederaufbau der Ukraine erfordert nationale und internationale Koordination.
  Dazu müssen kurzfristige und langfristige Unterstützung ineinandergreifen. Zur Koordination
  des Wiederaufbaus wurden die nationale Plattform „Wiederaufbau Ukraine“ und die
  G7 ‑Plattform zur Geberkoordination eingerichtet. Außerdem arbeitet die Bundesregierung
  an Finanzierungsinstrumenten wie dem „ European Flagship Fund for the Reconstruction
  of Ukraine“ , der private Mittel für den Wiederaufbau generieren wird, sowie an
  der Weiterentwicklung des Business Development Fund zu einer Art ukrainischer Kreditanstalt
  für Wiederaufbau. Darüber hinaus engagiert sich die Bundesregierung international
  im Rahmen der Ukraine Donor Plattform für einen koordinierten Ansatz zur Unterstützung
  der Ukraine. Für einen nachhaltigen Wiederaufbau berät Deutschland die ukrainische
  Regierung zudem zu Reformen für den EU-Beitritt, insbesondere im Bereich Anti-Korruption
  und Transparenz. Über Einzahlungen in den Aktionsplan Ukraine (2023-2026) des Europarates
  leistet das Auswärtige Amt einen Beitrag zur Förderung der Rechtsstaatlichkeit und
  Dezentralisierung in der Ukraine. Das Auswärtige Amt finanziert die Räumung von
  Minen und Kampfmitteln, stattet den Katastrophenschutz der Ukraine aus und unterstützt
  das Bundeskriminalamt (BKA) bei der Spurensicherung und Dokumentation von Kriegsverbrechen.
  Die medizinische Versorgung wird sowohl in der Ukraine als auch für Geflüchtete
  in Deutschland unterstützt. Bilaterale Projekte zur Gesundheitsversorgung in der
  Ukraine werden gezielt gefördert. Dabei geht es etwa um Maßnahmen im Bereich Telemedizin,
  Prothetik und rehabilitative Versorgungsstruktur. Auch die Evakuierung von Kranken
  und Verletzten zur medizinischen Behandlung in Deutschland wird unterstützt. Im
  Bereich berufliche Orientierung unterstützt der BerufeNavi zusammen mit den KAUSA
  ‑Landesstellen und dem BOFplus ‑Programm Menschen auf dem Weg in Ausbildung und
  Arbeit. Die Nationale Akademische Kontaktstelle Ukraine (NAKU) informiert über Studienmöglichkeiten
  in Deutschland, und seit Juli 2025 f ö rdert der Deutsche Akademische Austauschdienst
  (DAAD) den Aufbau eines deutsch‑ukrainischen Hochschulnetzwerks. Dar ü ber hinaus
  ber ä t Deutschland beim Wiederaufbau des ukrainischen Forschungssystems und unterst
  ü tzt die Integration in den europ ä ischen Forschungsraum. Kultur und unabhängige
  Medien sind zentrale Pfeiler einer demokratischen Gesellschaft. Die Bundesregierung
  hat Sonderprogramme zum Schutz von Kulturschaffenden, Wissenschaftlerinnen und Wissenschaftlern
  und Studierenden eingerichtet und sorgt für die Sicherung von Kulturgütern, Museen,
  Archiven und Bibliotheken. Mit der Hannah-Arendt-Initiative unterstützt Deutschland
  zudem ukrainische Medienschaffende, damit diese weiterhin – auch aus von Kampfhandlungen
  betroffenen Gebieten – berichten können.'
