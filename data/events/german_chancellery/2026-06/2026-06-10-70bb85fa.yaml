title: Im Kabinett beschlossen Schiedsverfahrensrecht wird modernisiert
text: 'Schiedsrechtliche Gerichtsverfahren sollen unter anderem durch eine stärkere
  Digitalisierung effizienter gestaltet werden. Foto: picture alliance / Axel Heimken/dpa
  Die Bundesregierung hat den von Bundesjustizministerin Stefanie Hubig vorgelegten
  Gesetzentwurf zur Modernisierung des Schiedsverfahrensrechts beschlossen. Künftig
  sollen Schiedsvereinbarungen nicht mehr nur schriftlich, sondern auch in anderer
  Weise, beispielsweise in Textform geschlossen werden können. Das entspricht den
  internationalen schiedsrechtlichen Entwicklungen und dem üblichen Vorgehen im Geschäftsverkehr.
  Eine neue Regelung zur Veröffentlichung von Schiedssprüchen sorgt dafür, dass schiedsrechtliche
  Rechtsprechung aus Deutschland vermehrt wahrgenommen wird und dadurch an Einfluss
  innerhalb der internationalen Rechtspraxis gewinnen kann. Unternehmen müssen jedoch
  keine Beeinträchtigung des Schutzes ihrer Geschäftsgeheimnisse befürchten. Durch
  Anonymisierung beziehungsweise Pseudonymisierung lässt sich die Vertraulichkeit
  sensibler Informationen sicherstellen. Für einstweilige Anordnungen durch Schiedsgerichte
  sieht der Gesetzentwurf klarere Regelungen zur Vollstreckbarkeit vor, um eine effektive
  Rechtsdurchsetzung abzusichern. Landen schiedsrechtliche Streitigkeiten vor staatlichen
  Gerichten, sollen die Verfahren unter anderem durch eine stärkere Digitalisierung
  effizienter gestaltet werden. Außerdem wird es deutlich mehr Möglichkeiten geben,
  Verfahrensschritte auf Englisch durchzuführen. Unter besonderen Voraussetzungen
  kann das Verfahren vollständig auf Englisch erfolgen. Die jetzige Reform des Schiedsverfahrensrechts
  knüpft an die 2025 erfolgte Einführung von Commercial Courts als Teil der staatlichen
  Gerichtsbarkeit an und soll Deutschland als Wirtschafts- und Justizstandort weiter
  voranbringen. Die Schiedsgerichtsbarkeit ist Teil der außergerichtlichen Streitbeilegung.
  In einem Schiedsverfahren entscheidet ein Dritter verbindlich über den Streit der
  Parteien. Die Entscheidung des Schiedsgerichts, der Schiedsspruch bindet die Parteien
  wie ein Urteil eines staatlichen Gerichts.'
