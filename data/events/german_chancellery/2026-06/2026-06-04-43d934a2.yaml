title: Newsletter Verbraucherschutz aktuell / Ausgabe 8
text: 'Die Bundesregierung hat ein klares Ziel: Mehr Wohnraum schaffen, Bürokratie
  abbauen und Schrottimmobilien bekämpfen. Nach dem „BauTurbo", der bereits seit 2025
  in Kraft ist, hat das Kabinett nun die Novelle des Baugesetzbuchs und des Raumordnungsgesetzes
  beschlossen. Kommunen erhalten damit echte Handlungsmacht. Bürgerinnen und Bürger
  profitieren von schnelleren und unkomplizierteren Genehmigungsverfahren, flexibleren
  Nachverdichtungsmöglichkeiten und einem vergrößerten Angebot an Wohnraum. Das Bundeskabinett
  hat beschlossen, für mehr Cybersicherheit die Befugnisse des BSI, des BKAs und der
  Bundespolizei zu erweitern. Dieser Beschluss reiht sich ein in ein ganzes Maßnahmenpaket.
  Hier finden Sie den Überblick. Zudem zeigt der aktuelle Cybersicherheitsmonitor
  ein Paradoxon: Obwohl das Wissen der Bürger über die Bedrohung zunimmt, ergreifen
  immer weniger erforderliche Schutzmaßnahmen. Was das BSI rät, erfahren Sie in untenstehender
  Linksammlung. Das Bundeskabinett hat eine Reform der Fahrschulausbildung auf den
  Weg gebracht: Der Führerscheinerwerb soll deutlich bezahlbarer, digitaler und verkehrssicher
  werden. Fahrschulen sollen von Bürokratie entlastet werden. Fast 42.000 Anträge
  auf E-Auto-Förderung sind seit dem Start des Förderportals vor zwei Wochen bei der
  BAFA eingegangen. Über 90 Prozent betreffen reine E-Autos. Die weiteren 10 Prozent
  entfallen auf Plug-in Hybride und E-Autos mit Range Extender. Nahezu jeder zweite
  Antrag kommt von Haushalten mit weniger als 45.000 Euro Einkommen. Der „Widerrufsbutton“
  wird eingeführt: Verbraucher können damit einen Online-Vertrag genauso einfach widerrufen,
  wie sie ihn abgeschlossen haben. Dank „Energy Sharing“ können sich Nachbarn Solarstrom
  teilen. Bei Nierentransplantationen sind jetzt auch Überkreuz-Lebendspenden möglich.
  Die Herkunft von Honig muss klar auf dem Etikett deklariert werden. Diese und weitere
  Neuregelungen im Überblick. Das Bundesforschungsministerium will die Forschung im
  Bereich der Frauengesundheit stärken. Bislang berücksichtigen viele Studien und
  Therapiekonzepte Unterschiede zwischen den Geschlechtern noch zu wenig – sogar bei
  der Volkskrankheit Krebs. Gefördert werden deshalb Projekte, die geschlechtersensible
  Aspekte systematisch in die Krebsforschung integrieren. In einer Woche ist es soweit:
  Die Fußball-WM startet. Um möglichst vielen Fußballfreunden ein gemeinsames Schauen
  und Mitfiebern zu ermöglichen, hat die Bundesregierung Ausnahmen zum Lärmschutz
  beschlossen. Das ermöglicht Public Viewing teilweise auch bis spät in der Nacht.
  Die zuständigen Behörden vor Ort entscheiden über die Details. Die Arbeitszeit in
  der Pflege so zu gestalten, dass sie zu verschiedenen Lebenssituationen passt und
  gleichzeitig die Bedürfnisse der Beschäftigten erfüllt, ist eine große Herausforderung.
  Der INQA-Experimentierraum "Pflege:Zeit" nahm sich dieser an und fasste die Ergebnisse
  in der vorliegenden Broschüre zusammen.'
