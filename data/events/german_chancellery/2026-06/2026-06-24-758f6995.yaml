title: 'Statement des Kanzlers vor der Regierungsbefragung im Deutschen Bundestag
  Reform der Rente: „Ein großer Schritt“'
text: 'Kanzler Merz stellt sich turnusgemäß einer Befragung durch die Abgeordneten
  im Deutschen Bundestag. Die von der Bundesregierung eingesetzte Alterssicherungskommission
  hatte am Dienstag ihren Bericht zur Rentenreform an die Bundesregierung übergeben.
  „Die Ergebnisse dieser Kommission sind wirklich weitreichende Reformvorschläge zur
  dauerhaften Stabilisierung unserer Alterssicherungssysteme“, betonte der Bundeskanzler
  in seinem Eingangs statement vor der Regierungsbefragung im Deutschen Bundestag.
  Dies sei ein großer Schritt hin zu einem wirklich neuen System unserer Altersversorgung,
  bekräftigte er mit Blick auf die Rentenreform, die bis zum Jahresende im Deutschen
  Bundestag verabschiedet werden soll. Er dankte den Mitgliedern der Kommission für
  ihre „großartige Arbeit“. Lesen Sie hier das Statement des Bundeskanzlers in voller
  Länge. Ein zentraler Bestandteil der neuen Rente sei ihre Weiterentwicklung um eine
  zusätzliche, verpflichtende Kapitalrente, so Bundeskanzler Friedrich Merz. Ihre
  Erträge sollen zu einem steigenden Rentenniveau führen. In anderen Ländern Europas
  wurde längst der Kapitalmarkt in die Alterssicherungssysteme einbezogen. Das hätten
  wir auch in Deutschland schon vor langer Zeit gemeinsam tun sollen, so der Kanzler.
  Die Vorschläge der Kommission fügten sich nach Auffassung des Bundeskanzlers gut
  in Entscheidungen ein, die die Bundesregierung bereits getroffen habe. Er nannte
  das am 1. Januar 2026 in Kraft getretene Gesetz über die sogenannte Aktivrente,
  von der bereits rund 10.000 Beschäftigte Gebrauch gemacht hätten. Die Aktivrente
  ermögliche es, über das Regeleintrittsalter in die Rente hinaus weiterzuarbeiten
  und dafür bis zu 24.000 Euro steuerfrei im Jahr dazuzuverdienen. Zum 1. Januar 2027
  trete zudem das bereits beschlossene sogenannte Altersvorsorge-Depot in Kraft, so
  der Bundeskanzler weiter. Damit würden Menschen in der privaten Altersversorgung
  zusätzlich steuerlich gefördert und unterstützt. Zudem betonte der Bundeskanzler,
  dass die preisliche Wettbewerbsfähigkeit des Standortes Deutschlands gestärkt werden
  müsse. „Wir werden sehr konkrete weitere Vorschläge machen, wie wir auch den Arbeitsmarkt
  in Deutschland verbessern, wie wir die Wettbewerbsfähigkeit unserer Volkswirtschaft
  verbessern“, erklärte der Bundeskanzler. Dies seien große Herausforderungen, doch
  Merz zeigte sich zuversichtlich, dass die Aufgaben, die diese Regierung lösen müsse,
  auch gelöst werden könnten. Der Bundeskanzler nimmt dreimal im Jahr an der Regierungsbefragung
  im Plenum des Deutschen Bundestages teil: jeweils in den letzten Sitzungswochen
  vor Ostern, vor der Sommerpause und vor Weihnachten. Zu Beginn der Regierungsbefragung
  hält der Kanzler in der Regel ein kurzes Statement. Im Anschluss beantwortet er
  rund eine Stunde lang die Fragen der Abgeordneten.'
