title: Press conference by Federal Chancellor Merz and Federal Minister Bärbel Bas
  on the presentation of the report by the Pensions Commission “Reform proposals that
  give us hope”
text: Federal Chancellor Merz thanked the Pensions Commission for the “balanced package
  comprising a total of 33 individual measures”. The Pensions Commission has presented
  a balanced package comprising 33 individual measures for “the most challenging reform
  project of our time”, said Federal Chancellor Friedrich Merz at the joint press
  conference with Federal Minister of Labour and Social Affairs Bärbel Bas and the
  co-chairs of the Pensions Commission, Frank-Jürgen Weise and Constanze Janda. Prior
  to that, the Chancellor and the Minister had received the Commission’s final report.
  Federal Chancellor Merz said that the recommendations were “of the utmost importance”
  – for the welfare state, for the country as a business location, but above all for
  society. Federal Minister of Labour and Social Affairs Bärbel Bas said that this
  was the first time a comprehensive plan for all generations had been put forward.
  “If we go ahead with this reform as it currently stands, things will be better for
  everyone”, said Bas. You can find the full report from the Pensions Commission here
  (german). PDF, 1 MB, barrier-free
