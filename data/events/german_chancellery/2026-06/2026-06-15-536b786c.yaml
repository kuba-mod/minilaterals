title: Statement von Bundeskanzler Friedrich Merz zur Vereinbarung zwischen den Vereinigten
  Staaten und Iran
text: Die Bundesregierung begrüßt, dass sich die Vereinigten Staaten und Iran auf
  ein Rahmenabkommen geeinigt haben. Zu diesem diplomatischen Durchbruch gratuliert
  sie Präsident Trump und der iranischen Seite. Sie dankt allen Partnern, die mitgeholfen
  haben, dies zu ermöglichen. Das Abkommen kann den Weg zu einer Erholung der Weltwirtschaft
  und einer Stabilisierung der Region bahnen. Nun gilt es, das Vereinbarte zielstrebig
  umzusetzen. Die Straße von Hormus muss dauerhaft und uneingeschränkt für die freie
  Schifffahrt geöffnet werden. Weitere Verhandlungen müssen in den nächsten Wochen
  sicherstellen, dass Iran sein militärisches Nuklearprogramm nachprüfbar beendet.
  Es darf keine weiteren Angriffe gegen Israel und andere Nachbarn in der Region geben.
  Die Bundesregierung unterstützt und befördert weiter alle entsprechenden diplomatischen
  Anstrengungen. Dazu steht sie in engem Austausch mit den Vereinigten Staaten, den
  europäischen Partnern und den Staaten der Region.
