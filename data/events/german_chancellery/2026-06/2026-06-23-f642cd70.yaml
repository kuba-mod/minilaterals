title: '„Schriftliches Kulturgut erhalten“: Neu aufgelegtes Programm fördert 92 Projekte
  – Staatsminister Weimer: „Unser kollektives Gedächtnis wird für kommende Generationen
  bewahrt“'
text: 'Mit dem in 2026 neu aufgelegten Förderprogramm „Schriftliches Kulturgut erhalten“
  wurden jetzt 92 Projekte zur Bewahrung historischer Originale ausgewählt, die mit
  insgesamt rund 1,5 Millionen Euro gefördert werden. Das Förderprogramm stößt schon
  in seinem ersten Jahr auf großes Interesse: Rund 200 Projektanträge gingen ein.
  Staatsminister Wolfram Weimer: „Schriftliches Kulturgut ist unverzichtbarer Bestandteil
  unseres kollektiven Gedächtnisses. Ohne authentische Quellen wäre eine lebendige
  Auseinandersetzung mit Geschichte und Kultur nicht möglich. Gerade in Zeiten, in
  denen historische Fakten zunehmend infrage gestellt werden, sind Archive, Bibliotheken
  und Museen als Orte der Überlieferung für unsere Demokratie wichtiger denn je. Es
  ist unsere gesamtstaatliche Aufgabe, dieses Erbe für kommende Generationen zu bewahren
  und für die Gesellschaft zugänglich zu machen. Der erfolgreiche Start des Förderprogramms
  ist deshalb eine großartige Nachricht für den Originalerhalt in Deutschland.“ Das
  neue Programm wird von Bund und Ländern finanziert und löst die bisherigen Förderlinien
  KEK-Modellprojektförderung und BKM-Sonderprogramm zur Erhaltung des schriftlichen
  Kulturguts ab. Die Zusammenlegung der beiden Förderlinien seit dem 1. Januar 2026
  schafft ein vereinfachtes und bürokratiereduziertes Förderangebot. Drei Beispiele
  zeigen die Bandbreite der 2026 bewilligten Förderprojekte: Im Landesarchiv Thüringen
  werden besonders wertvolle Zeugnisse der Erinnerungskultur gesichert: Dabei handelt
  es sich um rund 10.000 Karteikarten, die als sogenannte Tagesnachweise der Arbeitskommandos
  des NS-Konzentrationslagers Buchenwald die Zwangsarbeit dokumentieren. Ein auf drei
  Jahre angelegtes Förderprojekt der Sächsischen Landesbibliothek – Staats- und Universitätsbibliothek
  Dresden (SLUB) widmet sich der Stenografischen Sammlung, die als einzigartige Fachbibliothek
  53.000 Objekte umfasst, vom 16. Jahrhundert bis heute. Im Förderprojekt der Stiftung
  Neue Synagoge Berlin – Centrum Judaicum wird einer der meistangefragten Bestände
  der Einrichtung restauriert: die Fragebögen für Mitglieder der Jüdischen Gemeinde
  zu Berlin aus dem Zeitraum 1945 bis 1990. Das Förderprogramm „Schriftliches Kulturgut
  erhalten“ unterstützt den Erhalt wertvoller Originale. Die Förderprojekte werden
  auf Basis von Empfehlungen des Fachbeirats der Koordinierungsstelle für die Erhaltung
  des schriftlichen Kulturguts (KEK) ausgewählt. Die Mittel werden gemeinsam von BKM
  und der Ländergemeinschaft über die Kulturstiftung der Länder bereitgestellt. Insgesamt
  wurden über die KEK seit 2010 bereits 1.338 Projekte mit einem Volumen von mehr
  als 29,1 Millionen Euro bewilligt. Die gesamte Liste der geförderten Projekte finden
  Sie hier: https://www.kek-spk.de/pressemitteilungen'
