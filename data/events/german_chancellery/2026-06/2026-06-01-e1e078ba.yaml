title: Jugend forscht 2026 Deutschlands beste Nachwuchstalente ausgezeichnet
text: 'Bundesbildungsministerin Prien betonte im Rahmen der Auszeichnung der diesjährigen
  Preisträgerinnen und Preisträger: „Die Welt von morgen wird durch die MINT -Fächer
  geprägt sein." Foto: Stiftung Jugend forscht e. V./Schaeffler „Wir suchen die Forscher
  von morgen!“ Mit diesem Aufruf startete der damalige stern-Chefredakteur Henri Nannen
  vor 61 Jahren die erste Wettbewerbsrunde von Jugend forscht. Seither haben mehr
  als 350.000 Kinder und Jugendliche an Deutschlands bekanntestem Nachwuchswettbewerb
  teilgenommen. Seine Bedeutung ist bis heute ungebrochen: Gerade angesichts großer
  gesellschaftlicher und technologischer Herausforderungen braucht Deutschland junge
  Menschen, die ihre Talente in Mathematik, Informatik, Naturwissenschaften und Technik
  ( MINT ) entfalten und mit ihren Ideen die Zukunft mitgestalten. Bundesbildungsministerin
  Karin Prien ist überzeugt: „Die Welt von morgen wird durch die MINT -Fächer – Mathematik,
  Informatik, Naturwissenschaften und Technik – geprägt sein. Überall ist die Wissenschaft
  gefragt. Ihre Bedeutung ist gar nicht hoch genug einzuschätzen.“ Sowohl für Wissenschaft
  und Forschung als auch für die Politik gelte deshalb, dass „das Denken in Schubladen
  uns nicht weiterbildet“. Vielmehr gehe es darum, Probleme zu sehen, Fragen zu stellen
  – über Ressort- und Fachbereichsgrenzen hinaus. Dabei sei die Nutzung von Daten
  und Künstlicher Intelligenz „für nahezu jede Forschungsarbeit heute unerlässlich“.
  Deshalb sei es wichtig, dass junge Menschen früh die Freude am Forschen für sich
  entdecken und ihre Ideen in die Tat umsetzen können. „Dies zu unterstützen ist eines
  meiner wichtigsten Ziele“, bekräftigte Prien. Beim „Gipfeltreffen“ der besten Jungforscherinnen
  und Jungforscher Deutschlands in Herzogenaurach wurden jetzt die Siegerinnen und
  Sieger der 61. Wettbewerbsrunde „Jugend forscht“ gekürt. Unter ihnen ist Tim Kammel
  (18 Jahre) aus Lemgo. Der Gymnasiast befasste sich mit der Physik von Sanduhren.
  Anhand eines eigenen Versuchsaufbaus analysierte er den Effekt unterschiedlicher
  Öffnungsgrößen und Trichterformen auf das Strömungs- und Laufverhalten des Sands
  und entwickelte eine Computersimulation der Dynamik. Die Ergebnisse könnten dazu
  beitragen, technische Prozesse wie beispielsweise das Entleeren großer Getreidesilos
  besser zu verstehen. Für seine experimentelle Kreativität, methodische Vielseitigkeit
  und Disziplin erhielt Tim Kammel den „Preis des Bundeskanzlers für die originellste
  Arbeit”. Der Jungforscher wird seine Arbeit Bundeskanzler Friedrich Merz persönlich
  vorstellen können: Am Dienstag, 15. September 2026, wird es einen feierlichen Empfang
  im Bundeskanzleramt in Berlin geben. Dazu sind auch alle weiteren Prämierten herzlich
  eingeladen. Der besondere Preis des Bundeskanzlers wurde 1971 erstmals ausgelobt.
  Er unterstreicht die große Bedeutung der Förderung des Forschungsnachwuchses und
  die Wertschätzung, die diesem bundesweiten Wettbewerb zukommt. Die Einladung aller
  Bundessiegerinnen und Bundessieger sowie Platzierten zu einem Empfang im Bundeskanzleramt
  gehört seit 1981 zur Tradition des Wettbewerbs. Unter dem Motto „Maximale Perspektive“
  hatten sich in diesem Jahr 11.327 Jungforscherinnen und Jungforscher aus ganz Deutschland
  angemeldet – eine Steigerung um fast 10 Prozent gegenüber 2025 ( 10.350) . Der Anteil
  von Mädchen erreicht mit 41 Prozent den zweithöchsten Wert in der Jugend forscht
  Geschichte. „Das belegt eindrucksvoll, wie attraktiv der Wettbewerb für junge Menschen
  ist“, so die Bundesbildungsministerin. Insgesamt wurden 6.302 Forschungsprojekte
  eingereicht (2025: 5.664). Für den Bundeswettbewerb, der gleichzeitig Finale und
  Höhepunkt der aktuellen Wettbewerbsrunde ist, hatten sich in Veranstaltungen auf
  Regional- und Landesebene 159 Jugendliche qualifiziert. Die jeweils besten fünf
  Projekte pro Fachgebiet werden mit Geld- und Sachpreisen wie beispielsweise Forschungspraktika
  und Stipendien ausgezeichnet. Götz Anft (19) aus Niedersachsen befasste sich mit
  Filamenten für den 3D-Druck und untersuchte, ob unterschiedliche Feuchtigkeitsgehalte
  dieser drahtförmigen Kunststoffwerkstoffe die Druckqualität und die mechanischen
  Eigenschaften eines Druckmodells beeinflussen. Die Ergebnisse zeigten, dass ein
  reduzierter Feuchtigkeitsgehalt die Druckqualität positiv beeinflusst und etwa die
  Oberflächenbeschaffenheit der gedruckten Modelle verbessert. Jamila-Cate Tran (20)
  aus Niedersachsen zeigte in einer statistischen Studie, dass sogenannte „SGLT-2-Hemmer“,
  die sowohl bei Diabetes den Blutzucker senken als auch nach einer Nierentransplantation
  Nieren und Herz schützen, ebenso Patientinnen und Patienten nach Nierentransplantationen
  helfen können, die nicht an Diabetes erkrankt sind. Schwere Nierenprobleme verringerten
  sich um 36 Prozent, die Sterblichkeit war um 45 Prozent niedriger. Levi Jekic (16),
  Lennart Antritter (16) und Alexander Kluge (18) aus Bayern analysierten eine komplexe
  Metallverbindung aus Bismut, Zinn, Zink und Aluminium, die beim Verzinken von Stahl
  zum Schutz vor Korrosion verwendet wird. In einer Vielzahl von Messreihen fanden
  sie ein Mischungsverhältnis, das verhindert, dass die Legierung bei hohen Temperaturen
  spröde und brüchig wird. Alexander Leukert (17) und Leon Heinisch (18) aus Baden-Württemberg
  zeigten mit einer selbst programmierten Simulation ("Stern-Planet-Mond-System"),
  wie ein Satellit auf stabilen Bahnen sicher durch ein komplexes System aus mehreren
  Himmelskörpern navigieren kann. Beide entdeckten, dass insbesondere in der Nähe
  bestimmter Punkte zwischen Planet und Monden kleine, geschlossene Bahnen möglich
  sind. Aktuell läuft künstliche Intelligenz zumeist in großen, energieintensiven
  Rechnernetzen. Als Alternative entwickelte Malte Rauschenbach (15) aus Bayern eine
  Art Übersetzer, der KI -Modelle energiesparend und effizient in lokale Hardware
  für verschiedene Einsatzzwecke überträgt. Konkret programmierte der Jungforschende
  ein System, das neuronale Netze so umformt, dass sie auf flexibel anpassbaren Computerchips
  laufen können – vereinfacht gesagt sind es Bausteine, die sich für eine Aufgabe
  „umbauen“ lassen. Ben Waldmann (17) aus Thüringen untersuchte, welche Rolle sogenannte
  Axion-Sterne (dichte Ansammlungen extrem leichter Teilchen, die Gas anziehen könnten)
  im frühen Universum spielten. Er entwickelte ein eigenes Rechenmodell und konnte
  damit die frühe Entstehung der ersten Sterne erklären. Das Ergebnis deutet darauf
  hin, dass Axion-Sterne stabile Zentren bilden, Gas lokal stark verdichten und so
  den Kollaps von Gaswolken begünstigen. Stefan Weiß (20) aus Bayern konstruierte
  einen tragbaren Multifunktions-Kalibrator. Mit ihm lassen sich Digitalmultimeter
  – also Messinstrumente für Spannung, Strom und Widerstand – einfach und präzise
  testen. Damit taugt das Konzept als kostengünstiges und leistungsfähiges Werkzeug
  für Ausbildung, Labor und Reparatur. Als Schirmherr von Jugend forscht stiftet Bundespräsident
  Frank-Walter Steinmeier jedes Jahr den „Preis für eine außergewöhnliche Arbeit”.
  In diesem Jahr geht er an Viyona und Aarav Singh (beide 14) aus Sunnyvale, Kalifornien
  (USA). Die Zwillinge zeigten, dass sich die seltenen, spiegelbildlichen Varianten
  bestimmter Proteine mithilfe physikbasierter Modelle besser als mittels KI -basierter
  Modelle vorhersagen lassen. Um das „ KI -Versagen“ zu erklären, kommen beide anhand
  ihrer Untersuchungen zu dem Ergebnis, dass eine Kombination mit physikbasierten
  Modellen erforderlich ist, um eine wesentlich genauere Strukturvorhersage zu ermöglichen.
  Auch Bundesbildungsministerin Karin Prien ehrt die Jungforscherinnen und Jungforscher
  jährlich mit einem „Preis für die beste interdisziplinäre Arbeit“: Julian Scharnowski
  (20) aus Baden-Württemberg konstruierte eine spezielle, kostengünstige Vakuumpinzette.
  Mit ihr lassen sich mittels Unterdruck winzige Elektronikbauteile präzise auf Platinen
  platzieren. Seine Messungen zeigten, dass die Vakuumpinzette leise, stabil und zuverlässig
  arbeitet – und preiswerter ist als vergleichbare Profiwerkzeuge. Der „Preis für
  die innovativste Arbeit“, mit dem Bundesforschungsministerin Dorothee Bär junge
  Forscherinnen und Forscher auszeichnet, die mit ihrem Projekt eine besonders originelle,
  zukunftsweisende Lösung entwickeln, erhält Vincent Nack aus Bayern. Der 19-Jährige
  entwickelte ein KI -gestütztes System zum Schutz vor Telefonbetrug. Seine selbst
  programmierte Software prüft in Textform umgewandelte Gesprächsinhalte vollautomatisch
  und kann alle Formen von Täuschung in Echtzeit erkennen. Speziell Seniorinnen und
  Senioren soll die automatische Funktionsweise eine einfache Handhabung ermöglichen.
  Der Startschuss für die 62. Wettbewerbsrunde erfolgt am 1. Juli 2026 bis zum 30.
  November 2026 können sich junge Menschen mit ihren Projekten hier bewerben: Jugend
  forscht .'
