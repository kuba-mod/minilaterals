title: Pressestatement von Bundeskanzler Merz auf dem Gipfeltreffen der G7 Tag der
  Hoffnung in Évian
text: 'Bundeskanzler Merz betonte, am ersten Gipfeltag hätten die G7 gezeigt, „dass
  wir in den großen Fragen handlungsfähig und dass wir uns einig sind“. Der erste
  Tag des G7 -Gipfeltreffens im französischen Evián-les-Bains hat ganz im Zeichen
  der Gespräche zur Ukraine und zu Iran gestanden. Bundeskanzler Friedrich Merz betonte
  am Abend, die Gespräche seien „ von einer wirklich großen transatlantischen und
  europäischen Einigkeit und von europäischem Teamspiel“ geprägt gewesen. Die Einigung
  zum Iran eröffne eine große Chance für die Stabilität in der Region und für die
  Erholung der Weltwirtschaft. Der Bundeskanzler habe US -Präsident Donald Trump zugesagt,
  dass Deutschland seinen Teil dazu beitrage werde, damit der Frieden gelingt. Die
  G7 -Staaten seien zudem einig in der Bewertung der Lage in der Ukraine. Das sei
  „eine sehr gute Nachricht“, so Merz. Die „ nicht zuletzt dank massiver europäischer
  und auch deutscher Hilfe“ bessere Lage in der Ukraine eröffne „vielleicht erstmals"
  die Chance auf einen Frieden. „Diese Chance wollen wir als G7- Partner jedenfalls
  gemeinsam nutzen.“ Sowohl für die Ukraine als auch für die Golfregion sei der erste
  Tag also „ein Tag der Hoffnung“ gewesen, der gezeigt habe, dass die G7 -Staaten
  in den großen Fragen handlungsfähig und einig sind. Meine Damen und Herren, noch
  einmal herzlich willkommen von meiner Seite aus in Évian – schön, dass Sie alle
  in großer Zahl dabei sind. Wir haben den ersten Tag fast hinter uns. Die ersten
  24 Stunden haben ganz im Zeichen der Beratungen zu Iran und Ukraine gestanden. Die
  Beratungen waren aus meiner Sicht von einer wirklich großen transatlantischen und
  europäischen Einigkeit und von europäischem Teamspiel geprägt. Präsident Trump hat
  uns zunächst über das Rahmenabkommen informiert, das er mit dem Iran abgeschlossen
  hat. Wir haben diese Einigung als G7 -Partner alle nachdrücklich begrüßt. Diese
  Einigung eröffnet jetzt eine große Chance für die Stabilität der Region und für
  eine Erholung der Weltwirtschaft. Wir sehen das im Übrigen seit gestern in den Märkten,
  sowohl was die Aktienmärkte betrifft, als auch was die Ölpreisentwicklung betrifft.
  Wir sind jetzt gerade bei 80 US ‑Dollar für den Barrel Öl. Das ist eine wirklich
  gute Entwicklung, und sie zeigt auch, dass hier offensichtlich auch etwas gut gelungen
  ist und auch angenommen wird. Es muss jetzt sehr schnell der Einstieg in die zweite
  Verhandlungsphase gelingen. Insbesondere die Straße von Hormus muss schnell und
  uneingeschränkt geöffnet werden, und Iran muss sein Nuklearprogramm nachprüfbar
  beenden. Der vereinbarte Frieden muss einfach halten, und zwar auch im Libanon.
  Darüber sind wir uns einig, auch mit den Gästen, die heute da waren – Ägypten, Katar
  und die Vereinigten Arabischen Emirate – und die übereinstimmend sehr dankbar waren
  für das, was in den letzten Tagen oder vielleicht Stunden gelungen ist. Ich habe
  Präsident Trump zugesagt: Wir wollen unseren Teil dazu beitragen, dass der Frieden
  gelingt. Dazu kann auch gehören, dass wir mit militärischen Mitteln helfen, die
  freie Schifffahrt von Hormus auf Dauer zu ermöglichen, sobald die entsprechenden
  Voraussetzungen dafür, die Sie alle kennen, gegeben sind. Wir haben schließlich
  intensiv über den Krieg in der Ukraine gesprochen. An diesen Beratungen hat heute
  Morgen Präsident Selenskyj teilgenommen. Neu ist, dass sich alle G7 -Partner in
  der Bewertung der Lage einig sind. Das ist eine, wie ich finde, sehr gute Nachricht;
  denn der Krieg hat in den letzten Tagen und Wochen eine neue Dynamik bekommen. Die
  Ukraine hat sich nicht zuletzt dank massiver europäischer und auch deutscher Hilfe
  eine neue Position der Stärke erkämpft. Aus meiner Sicht ist jetzt ziemlich klar:
  Russland kann diesen Krieg militärisch nicht gewinnen. – Außerdem ächzt die russische
  Wirtschaft unter diesem Krieg, auch unter der Last der Sanktionen. Das kann vielleicht
  erstmals eine Chance auf einen Frieden eröffnen. Diese Chance wollen wir als G7
  -Partner jedenfalls gemeinsam nutzen. Ich will auch das noch sagen: Die Gespräche,
  die wir untereinander und die wir auch mit dem amerikanischen Präsidenten geführt
  haben, in den offiziellen Runden, aber auch in den Begegnungen am Rande, geben mir
  einen gewissen Optimismus. Wir wollen unsere Unterstützung für Kyjiw weiter verstärken.
  Wir wollen gleichzeitig den Druck auf Russland erhöhen, um Russland an den Verhandlungstisch
  zu bringen. Auch darüber bestand Einigkeit. Wir haben heute gemeinsam mit Präsident
  Selenskyj den amerikanischen Präsidenten wissen lassen, dass wir zu Friedensgesprächen
  bereit sind. Allerdings müssen diese Gespräche am richtigen Punkt ansetzen. Nicht
  hinnehmbar ist und bleibt Russlands Forderung, dass die Ukraine den freien Teil
  des Donbass aufgeben muss. Vielleicht darf ich einen der Teilnehmer aus der Runde
  zitieren, der, wie ich finde, auch historisch richtig gesagt hat: Russland war immer
  gut in der Defensive und dabei, Angriffe abzuwehren, aber ist in seiner Geschichte
  nie sehr erfolgreich gewesen, Aggressionskriege zu führen, also Offensiverfolg zu
  haben. – Ich hatte heute und auch schon gestern Abend den Eindruck, dass sich Präsident
  Trump nach und nach für diese Einschätzung öffnet und mit uns zusammen jetzt einen
  Weg sucht, diesen Krieg zu beenden. Sowohl für die Ukraine als auch für die Golfregion
  war das heute hier in Évian also ein Tag der Hoffnung. Es war auch ein Tag, an dem
  wir als G7 gezeigt haben, dass wir in den großen Fragen handlungsfähig und dass
  wir uns einig sind. Vielleicht darf ich diese Schlussbemerkung machen: Die Behauptung,
  dass dieses Format nicht mehr zeitgemäß sei, teile ich ausdrücklich nicht. Wir haben
  hier auch Gäste gehabt, zu unterschiedlichen Themen und in unterschiedlicher Zusammensetzung.
  Dies zeigt, dass wir als Europäer zusammen mit den Amerikanern und mit Japan und
  auch mit den Gästen, die heute aus der Golfregion und aus anderen Regionen der Welt
  hier waren, Handlungsfähigkeit entwickeln und auch in der Lage sind, gemeinsame
  Aktionen durchzuführen. Insofern gehe ich am heutigen Tag zunächst einmal einigermaßen
  zuversichtlich in das Abendprogramm, was immer auch wir morgen im Laufe des Tages
  noch besprechen. Frage : Herr Bundeskanzler, Sie haben die gute Stimmung und auch
  die gemeinsame Analyse bezüglich der Ukraine betont. Aber was folgt konkret daraus?
  Haben Sie eine Zusage von US -Präsident Trump , dass er neue Sanktionen gegen Russland
  mitträgt und dass die Europäer wirklich am Verhandlungstisch sitzen können? Bundeskanzler
  Friedrich Merz : Ich darf vielleicht, ohne die Vertraulichkeit der Beratungen zu
  strapazieren, sagen: Was uns allen Grund zur Zuversicht gibt, ist die Formulierung
  von Präsident Trump , Russland müsse diesen Krieg beenden. Ich finde, das ist eine
  klare Botschaft. Russland muss diesen Krieg beenden. Wir haben mit ihm sehr ausführlich
  darüber gesprochen, auch über die nächsten Schritte, auch über mögliche weitere
  Sanktionen. Wir haben ihm erläutert, was die Europäische Union in den nächsten Tagen
  tun wird, noch in dieser Woche – wir werden darüber ja am Donnerstag und Freitag
  in Brüssel sprechen –, und ich habe ihn sehr kooperativ gesehen. Ich habe ihn auch
  sehr aufmerksam zuhören gesehen. Insofern noch einmal: Es gibt mir einen gewissen
  Grad des Optimismus, dass wir hier als Europäer und als Amerikaner zusammen, gemeinsam
  alles unternehmen, um den Krieg zu beenden. Aber er ist noch nicht zu Ende, und
  solange er nicht zu Ende ist, gibt es keinen Grund, zufrieden zu sein. Bundeskanzler
  Merz : Das ist jedenfalls an keiner Stelle infrage gestellt worden, und es war ja
  immer auch unsere Haltung, dass wir gesagt haben, dass die Ukraine und Russland,
  aber auch Europa und Amerika am Tisch sitzen müssen, und das ist an keiner Stelle
  heute irgendwo streitig gewesen. Frage : Herr Bundeskanzler, kann man das Abkommen
  mit dem Iran wirklich als Erfolg bezeichnen? Es gibt ja viel Kritik daran, dass
  dem Iran zu viele Zugeständnisse gemacht worden sind. Wie schnell kann der Bundestag
  jetzt das Mandat für den Militäreinsatz in der Straße von Hormus auf den Weg bringen?
  Ist aus Ihrer Sicht ein UN -Mandat zwingend? Bundeskanzler Merz : Über die beiden
  letzten Fragen werden wir sowohl in der Regierung als dann auch gegebenenfalls im
  Deutschen Bundestag noch zu sprechen haben. Dafür sind die Voraussetzungen im Augenblick
  noch nicht erfüllt. Wir haben immer gesagt: Wir sind bereit, uns zu beteiligen.
  – Wir haben ja auch bereits die ersten Minenräumboote oder Schiffe in die Region
  entsandt. Wir sind vorbereitet, aber wir haben noch keine Entscheidung getroffen,
  weder in der Bundesregierung noch im Parlament. Wir müssen natürlich auch die Rechtsgrundlage
  klären. Das ist eine Frage, die wir noch nicht abschließend behandelt haben. Aber
  dass wir grundsätzlich bereit sind, uns an der Sicherung dieses Friedens auch zu
  beteiligen, ist immer die gemeinsame Position auch innerhalb der Bundesregierung
  gewesen, schon seit Wochen. Jetzt kommt es halt darauf an, wie stabil das ist, was
  erreicht worden ist. Ich bin, wie gesagt, zuversichtlich, dass das trägt, und alles,
  was wir aus dem Iran hören, deutet ja darauf hin, dass auch der Iran das akzeptiert,
  weil er einfach akzeptieren muss, dass die amerikanische militärische Überlegenheit
  ihm gar keine andere Wahl lässt. Ich habe Präsident Trump gestern Abend schon gesagt:
  Du siehst an diesem Beispiel, dass eine klare militärische Stärke auch in der Lage
  ist, diplomatische Lösungen herbeizuführen. – Wenn dasselbe dann auch für die Ukraine
  gilt, dann haben wir vielleicht sogar an zwei kritischen Stellen in der Welt die
  Chance, dem Frieden etwas näherzukommen. Frage : Was, glauben Sie, bedeutet die
  Einigung für das iranische Volk? Bundeskanzler Merz : Das ist besonders schwer zu
  sagen, weil es hier natürlich zunächst einmal um die äußeren Bedingungen des Friedens
  ging. Wir haben die Einschätzung miteinander ausgetauscht, dass das gegenwärtige
  Regime möglicherweise – ich sage das jetzt aber unter allen Vorbehalten – weniger
  Repressionen gegen das eigene Volk im Inneren ausübt. Aber das ist nichts, was wir
  als garantiert ansehen können. Wir können nur unserer Hoffnung und auch der Forderung
  noch einmal Ausdruck verleihen, dass die Bevölkerung im Iran jetzt die Chance hat,
  auch politisch an allen zukünftigen Entscheidungen mitzuwirken, und dass dieses
  Regime aufhört, den Druck nach innen permanent weiter zu erhöhen. Wir haben jedenfalls
  immer wieder auch über die vielen Opfer gesprochen, die dort in den letzten Wochen
  und Monaten durch dieses Mullahregime zu beklagen waren, das mit einer brutalen
  Aggressivität und mit völlig inakzeptablen Mitteln gegen die eigene Bevölkerung
  und gegen die Demonstrationen im eigenen Land vorgeht. Aber auch das ist eine Frage,
  die sich heute allenfalls vorläufig beantworten lässt.'
