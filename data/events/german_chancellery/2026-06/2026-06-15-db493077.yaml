  und das Digitalministerium, weil beide zuständig sind: Haben Sie eigene Erkenntnisse
  zu dem Anthropic-Vorgang , und wenn ja, wie sehen sie aus? Wie fällt die Reaktion
  darauf aus, dass eine amerikanische Behörde praktisch den Zugang zu einem an sich
  offenen Tool beschränken kann? Was sagt das über die deutsche und europäische digitale
  Souveränität aus? Wir werden diese Entscheidung nicht öffentlich kommentieren. Generell
  verfolgt die Bundesregierung die KI-Entwicklung auch von sehr wirkmächtigen Tools
  im Sicherheitsbereich sehr genau. Wir stehen in Kontakt mit Anthropic und anderen
  Herstellern. Das Bundesamt für Sicherheit in der Informationstechnik wäre noch gefragt,
  also das Innenministerium. Sie haben nichts, oder? Herr Hille, wenn ich es richtig
  gelesen habe, dann ist künstliche Intelligenz auf dem G7-Gipfel Thema. Ist dieses
  Thema womöglich Anlass, das auch im Rahmen der Regierungschefs zu besprechen? Ich
  korrigiere Sie nur ungern, aber zumindest nach der Liste der Themenschwerpunkte,
  die ich gerade beim Thema G7 genannt habe, kann ich das nicht sagen. Ich finde das
  auf der Liste nicht, was aber, wie das immer so ist, nicht heißt, dass es nicht
  angesprochen wird. „Schaun mer mal, dann sehn mer scho.“ Herr Druckenthaner, könnten
  Sie zumindest ein wenig erläutern, wo denn die Brisanz dieses Themas liegt? Die
  Bitkom zum Beispiel hat heute Morgen gesagt, dass ohne die Nutzung dieser amerikanischen
  Modelle ein Wettbewerbsnachteil für die deutsche Industrie entstehe. Die EU-Kommission
  untersucht es. Erstens: Warum verwendet die deutsche Industrie amerikanische KI-Modelle
  und keine europäischen Modelle? Zweitens: Warum unterstützt die Bundesregierung
  nicht den Aufbau eines leistungsfähigen deutschen oder europäischen KI-Modells?
  Ich denke, das tun wir. Der Digitalminister hat mehrfach betont, dass wir auf dem
  Gebiet natürlich souveräner werden müssen und auch eigene KI-Modelle größer machen
  müssen. Fakt ist aber aktuell, dass bestimmte Modelle den Markt dominieren, die
  Technologieführer sind. Angesichts dessen wäre es verkehrt, sich von dieser technologischen
  Entwicklung abzuschneiden. Wir fahren sozusagen zwei Linien: zum einen weiterhin
  mit Partnern zusammenarbeiten, zum anderen aber auch die eigenen Kompetenzen auf
  dem Gebiet ausbauen und stärken. Dazu gehört es zum Beispiel, die Rahmenbedingungen
  für KI-Innovationen zu verbessern. Die Organisatoren des Superrechners in Jülich
  sagen, würde man den Rechner nur für drei Monate einsetzen, könnte man ein genauso
  leistungsfähiges Modell hier in Europa entwickeln. Dazu braucht es aber eine politische
  Entscheidung. Warum tut man das nicht? Ich kann jetzt diese Äußerungen aus Jülich
  nicht kommentieren, aber ich kann Ihnen versichern, dass wir alles tun, um auf diesem
  Gebiet große Fortschritte zu machen. Ich kann hier auch noch einmal die Fusion von
  Cohere und Aleph Alpha erwähnen, die hier in der Bundespressekonferenz bekannt gegeben
  wurde und wo unser Minister auch sehr aktiv im Hintergrund war, auch mit seinem
  kanadischen Counterpart. Ich kann darauf verweisen, dass wir uns auf europäischer
  Ebene dafür einsetzen, auch bei den Regeln ein bisschen mehr Innovationsfreiheit
  zu gewähren; denn wenn wir die Regeln bei uns zu komplex machen, dann spielt das
  natürlich den Hyperscalern in die Hände. Bei eigenen Auftragsvergaben legen wir
  deshalb Souveränitätskriterien fest. Wir hatten vor zwei Wochen auch einen größeren
  Auftrag über eine KI-Cloud in der Verwaltung an ein heimisches Konsortium vergeben.
  All das sind Maßnahmen, die dazu beitragen, dass wir heimische Player auf dem Gebiet
  stärken. An das Bundesforschungsministerium: Der heute erscheinende nationale Bildungsbericht
  zeigt ja, dass die Chancenungleichheit wieder größer wird. Vor diesem Hintergrund:
  Gibt es inzwischen eine Einigung auf eine BAföG-Reform , und ist absehbar, wann
  sie ins Kabinett kommt? Der Stand hat sich bei uns eigentlich nicht geändert. Die
  Ministerin hat sich gestern noch einmal geäußert, meine Kolleginnen und Kollegen
  haben sich letzte Woche geäußert, und auch der Regierungssprecher hat dazu schon
  Stellung genommen. Wir befinden uns in intensiven Abstimmungen innerhalb der Bundesregierung,
  und denen kann ich hier nicht vorgreifen. Können Sie absehen, ob diese intensiven
  Abstimmungen noch vor der Sommerpause beendet sein werden? Bei diesen Abstimmungen
  geht es unter anderem, wie die Ministerin gestern auch im Interview beim Bayerischen
  Fernsehen gesagt hat, um Themen des Gesundheitsministeriums, beispielsweise wie
  die Krankenversicherungsbeiträge dann übernommen werden. Das sind alles Detailabstimmungen,
  in denen wir momentan stecken. Dem Ergebnis dieser Abstimmungen kann ich einfach
  nicht vorgreifen. An das Finanzministerium, und zwar wieder einmal zum Thema Commerzbank
  . Die UniCredit hat heute Morgen in einer Mitteilung angedroht, die Sitze im Aufsichtsrat
  neu zu besetzen oder in dem Sinne zu verändern, dass sie am Ende in der Lage wäre,
  das Commerzbank-Management zu feuern. Was ist die Sicht der Bundesregierung auf
  diese Dinge? Die Bundesregierung hat als Anteilseigner ja auch selbst die Möglichkeit,
  den Aufsichtsrat zum Teil zu besetzen. Ich bitte da um Ihr Verständnis: Wir äußern
  uns wie üblich nicht zu hypothetischen Fragen, gerade angesichts der enormen Kapitalmarktrelevanz
  in diesem Fall. Ansonsten ist unsere Position ja bekannt. Das ist ja wieder einmal
  ein relativ aggressiver Vorstoß gewesen von Herrn Orcel gewesen. Finden Sie dieses
  Vorgehen normal, oder würden Sie sagen, dass das schon etwas Außergewöhnliches ist?
  Das würde ich von dieser Stelle nicht kommentieren. Sie wissen, wie unsere Position
  zu feindlichen Übernahmen ist; die haben wir ja von dieser Stelle und auch an anderer
  Stelle deutlich gemacht. Dabei würde ich es belassen. An Herrn Limmer: Laut Bundesjustizministerin
  Hubig arbeite man zurzeit am Entwurf einesGesetzes , das die Unterwanderung von
  Gerichten durch die Wahl von Schöffen verhindern soll. Warum werden dabei potenzielle
  Rechtsextremisten hervorgehoben, und wie will man eine Verfassungstreue gesichert
  feststellen? Ich kann auf jeden Fall erst einmal bestätigen, dass wir in diesem
  Bereich an einem Gesetzentwurf arbeiten. Dazu hat sich die Ministerin vergangene
  Woche auch gegenüber dem RND geäußert. In dem Entwurf soll klar geregelt werden,
  dass nur solche Personen Schöffen werden können, die sich verfassungstreu verhalten.
  Daneben soll der Entwurf auch Regelungen vorsehen, die das Problem der möglichen
  Blockaden von Schöffenwahlen adressieren. Weitere Details zu den Inhalten kann ich
  jetzt noch nicht nennen, weil der Entwurf eben noch in der Ausarbeitung ist. Wo
  lagen denn die Defizite der bisherigen Regelungen? Zum Beispiel ist es ja in der
  Vergangenheit vorgekommen, dass Schöffenwahlen blockiert wurden, und es gab eben
  keine konkrete Regelung, um diesen Zustand zu adressieren und damit umzugehen. Entsprechende
  Gesetzeslücken wollen wir hier schließen. Kanzler Merz hatte am 30. April beim Bürgerdialog
  in Salzwedel eine krebskranke Frau nach allgemeiner Einschätzung recht rüde abgekanzelt
  und ihr faktenwidrig eine Falschbehauptung unterstellt. Die Frau hat in Folge eine
  Entschuldigung vom Kanzler gefordert. In Reaktion hat ihr jetzt das Bundeskanzleramt
  eine Autogrammkarte zugeschickt. Laut Bundeskanzleramt habe Frau Dronsch erklärt,
  sie hätte sich das ausdrücklich gewünscht. Sie selbst widerspricht dem allerdings
  vehement und sagt ‑ ich habe heute mit ihr telefoniert ‑, sie habe sich niemals
  eine Autogrammkarte gewünscht, sondern lediglich eine persönliche Entschuldigung
  des Kanzlers. Herr Hille, könnten Sie da für Aufklärung sorgen? Hat sich Frau Dronsch,
  wie vom Kanzleramt behauptet, tatsächlich eine Autogrammkarte gewünscht oder eine
  Entschuldigung des Kanzlers? Wenn Letzteres: Was hindert den Kanzler daran, diesem
  Wunsch Folge zu leisten? Erstens noch einmal zu dem, was Sie skizziert haben, was
  dort auf dem Bürgerforum passiert sein soll: Der Bundeskanzler hat dort auf Kritik
  und eine Vorhaltung reagiert. Das haben wir auch an dieser Stelle, glaube ich, mindestens
  einmal, wenn nicht mehrfach schon bearbeitet. Ich denke, es ist ein ganz übliches
  Vorgehen im Austausch zwischen zwei Diskutanten, dass man Kritik, die geäußert wird,
  auch zurückweisen darf, ohne dass man dann gleich wie von Ihnen zusammengefasst
  eingeordnet wird. Das Zweite ist: Sie wissen, wie wir an dieser Stelle mit Gesprächen
  auf politischer Ebene und auch solchen bilateralen Gesprächen umgehen. Wir werden
  an dieser Stelle nicht aus vertraulichen Gesprächen berichten und werden uns auch
  nicht an irgendeinem Schwarzer-Peter-Spiel beteiligen. Frau Dronsch beschreibt die
  ihr zugesandte Autogrammkarte als klassische Standardkarte, die tausendfach verteilt
  wird, mit einer aufgedruckten, nicht handschriftlichen Unterschrift. Das Bundespresseamt
  wiederum spricht von einer persönlichen Unterschrift des Kanzlers. Können Sie uns
  da noch aufklären? Handelt es sich um eine aufgedruckte Unterschrift oder um eine
  persönlich erzeugte Unterschrift des Kanzlers? Ich komme mir langsam wie auf einer
  Börse für Autogrammkarten vor. Ich werde hier jetzt nicht in eine Exegese von Arten
  von Autogrammkarten einsteigen; sehen Sie es mir nach. Ich hätte die Bundesregierung
  gerne nach den US-Abzugsplänen für Europa gefragt, die bekannt geworden sind: Herr
  Hille, wie besorgt es die Bundesregierung, dass der Schutz Europas nicht mehr gewährleistet
  ist, wenn die USA hier jetzt in so großem Umfang militärische Kräfte ‑ Flugzeuge,
  Tankflugzeuge etc. ‑ abziehen? Ich weiß nicht genau, auf was Sie jetzt aktuell Bezug
  nehmen. Wir haben hier ja mehrfach darüber gesprochen, dass sich die USA neu aufstellen
  und die Kräfte in der NATO neu zugeschnitten werden. Dazu haben gerade die Kolleginnen
  und Kollegen des BMVg schon häufiger Stellung genommen. Die Überprüfung der weltweiten
  US-Truppenpräsenz sowie eine mögliche Anpassung in Europa ist lange angekündigt
  gewesen. Aus Sicht der Bundesregierung liegt die Präsenz von US-Truppen in Europa
  sowohl in unserem als natürlich auch im amerikanischen Interesse. Wir als Europäer
  sind dabei, unsere Präsenz, unseren Anteil in der NATO, deutlich zu erhöhen. Wir
  haben verschiedentlich über das Thema Verteidigungsausgaben gesprochen, aber auch
  über das, was wir an Fähigkeiten zur Verfügung stellen. Das waren ja die Ergebnisse
  des NATO-Gipfels in Den Haag. Jetzt blicken Sie wahrscheinlich voraus auf den NATO-Gipfel,
  der Anfang Juli in Ankara stattfindet. In dieser Perspektive ist das zu sehen. Das
  ist nichts, was uns jetzt überrascht hat ‑ es sei denn, Sie haben noch ganz neue
  Erkenntnisse. Ich würde da gerne noch um eine Präzisierung bitten, vielleicht auch
  von Herrn Swistek: Es gab Berichte, dass die USA jetzt auch weniger Flugzeuge bei
  der NATO anmelden, nämlich statt 154 Flugzeugen der Typen F-15 und F-16 jetzt nur
  noch 100, und auch weniger Tankflugzeuge und Aufklärungsflugzeuge. Ist das aus Sicht
  des Verteidigungsministeriums ein Problem oder können europäische Kräfte das ersetzen?
  Da gilt das, was wir hier üblicherweise zu solchen Medienberichten sagen: Das kommentieren
  wir nicht. Was das NATO Force Model insgesamt angeht, so haben wir die Meldungen
  dazu zur Kenntnis genommen. Grundsätzlich ist das NATO Force Model ein Rahmen, in
  dem die Mitgliedsstaaten militärische Fähigkeiten für das Bündnis einmelden. Innerhalb
  dieses Rahmens werden auch in der Folge der Beschlüsse von Den Haag die europäischen
  Verbündeten eine größere Verantwortung übernehmen, wie ich gerade schon skizziert
  habe. Deutschland wird in diesem Prozess seinen Beitrag leisten. Weitere Planungsdetails
  nennen wir nicht, und wir greifen einem weiteren Prozess innerhalb der NATO auch
  nicht vor. Weil es um die Fähigkeit zur Abwehr von Bedrohungen geht: Was ist die
  Erwartung an das Gemeinsame Abwehrzentrum Hybrid , das morgen eröffnet wird? Wie
  soll die personelle Aufstellung dieses Abwehrzentrums aussehen? Das ist korrekt,
  wir eröffnen morgen das Gemeinsame Abwehrzentrum Hybrid, in dem Informationen aus
  unterschiedlichen Sicherheitsbereichen zusammenlaufen werden. Zum Beispiel werden
  dort Sabotage, Desinformation, Staatsterrorismus und transnationale Repressionen
  beobachtet werden. Die beteiligten Behörden erstellen gemeinsame Lagebilder, tauschen
  Informationen aus und koordinieren dann die Reaktion darauf. Nur zur Klarstellung:
  Es entsteht da keine neue Behörde. Das ist vielmehr eine Plattform, die die Fähigkeiten
  der bestehenden Sicherheitsbehörden bündelt. An das Verkehrsministerium: Laut einer
  Analyse der EVG könnte der Einstieg von Italo in den deutschen Fernverkehrsmarkt
  zahlreiche Städte vom Fernverkehr ausschließen. Wie bewerten Sie das? Zunächst einmal
  begrüßen wir Wettbewerb auf der Schiene ‑ der Minister auch. Da sieht man, wie attraktiv
  das deutsche Schienennetz ist. Zu einzelnen Spekulationen, wie auch der, die am
  Wochenende in den Medien war, nehmen wir keine Stellung. Die EVG fordert eine politische
  Einflussnahme bei der Trassenvergabe. Sehen Sie da Optionen? Das ist ja sehr klar
  geregelt. Wir haben im deutschen Schienennetz allein im Schienengüterverkehr 257 Eisenbahnverkehrsunternehmen,
  im Schienenpersonennahverkehr 125, und 34 im Schienenpersonenfernverkehr. Die können
  alle ihre Trassen anmelden. Das ist ein bewährtes Verfahren, und die InfraGO bzw.
  am Ende die Bundesnetzagentur entscheiden darüber.'
