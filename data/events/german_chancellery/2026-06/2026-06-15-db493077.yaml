date: '2026-06-15'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 15. Juni 2026
text: 'stellvertretender Regierungssprecher Hille (Vorsitzende Buschow eröffnet die
  Pressekonferenz und begrüßt SRS Hille sowie die Sprecherinnen und Sprecher der Ministerien.)
  Bundeswirtschafts- und Energieministerin Katherina Reiche wird in dieser Woche am
  Donnerstag und Freitag in die Türkei reisen. Die Türkei ist ein strategisch wichtiger
  Partner für Deutschland und liegt auf Rang 14 deutscher Exportziele. Im Mittelpunkt
  der Reise stehen die deutsch-türkische Wirtschafts- und Energiepartnerschaften,
  die wichtige Bausteine der deutschen Wirtschaftssicherheit sein können. Ministerin
  Reiche wird vor Ort an Sitzungen der Joint Economic and Trade Commission, also der
  JETCO, und des deutsch-türkischen Energieforums teilnehmen. Beide Formate dienen
  bereits seit Jahren dazu, die bestehende Partnerschaft zu vertiefen. Zudem wird
  sie die Gelegenheit zum direkten Austausch mit verschiedenen Ministerkollegen haben.
  Frau Ungrad, nimmt die Ministerin a) Journalisten und b) Wirtschaftsvertreter mit?
  Journalisten werden mitgenommen und um die 30 Wirtschaftsvertreter. Die Zahl ist
  ungefähr. Das bitte ich zu beachten. Frau Ungrad, nur der Info halber für mich:
  Gab es einen Mitreiseaufruf oder dergleichen? Oder habe nur ich den nicht bekommen?
  Es gab einen Mitreiseaufruf, und alle, die sich gemeldet haben, fahren auch mit.
  Bundesgesundheitsministerin Nina Warken reist am Dienstag zum Rat für Beschäftigung,
  Sozialpolitik, Gesundheit und Verbraucherschutz der Europäischen Union , kurz EBSCO,
  nach Luxemburg . Im Mittelpunkt der Gespräche mit den EU-Amtskolleginnen und -kollegen
  steht die Stärkung des deutschen und europäischen Standorts für Arzneimittel, Biotechnologie
  und Medizinprodukte. Auf der Tagesordnung steht insbesondere ein Austausch zum Critical
  Medicines Act. Mit der Verordnung zählt die Europäische Union auf die Förderung
  der Produktion kritischer Arzneimittel wie Antibiotika oder Insulin innerhalb Europas
  und beabsichtigt, die Abhängigkeit von Drittstaaten bei der Wirkstoffherstellung
  zu verringern. Weitere Themen sind der sogenannte Biotech Act zur Stärkung des Biotechnologiesektors
  und die Revision der europäischen Medizinprodukteverordnung für effizientere Zulassungsverfahren
  und einen schnelleren Zugang zu innovativen Medizinprodukten. Im Rahmen des EBSCO-Rats
  kommen die Gesundheitsministerinnen und -minister zweimal im Jahr zusammen, um über
  die Initiativen der Europäischen Kommission zu beraten. (zur Ankündigung einer Rahmenvereinbarung
  zwischen den USA und Iran ) Ich habe zwei Fragen. Zum einen: Wie erleichtert ist
  die Bundesregierung, dass eine Öffnung der Straße von Hormus jetzt in Aussicht steht,
  gerade wenn man sich die Wirtschaftsprognosen für das Jahr anschaut? Und die zweite
  Frage: Wie könnte denn eine Beteiligung der Bundesregierung oder Deutschlands bei
  der Öffnung vor Ort aussehen? Ich weiß nicht, ob Sie es wahrgenommen haben: Der
  Bundeskanzler hat sich dazu ja heute Nacht bereits in einem persönlichen Statement
  und auch in einem E4-Statement geäußert. Ich kann das kurz noch einmal paraphrasieren
  und Ihnen sagen, dass der Bundeskanzler sich heute bereits positiv geäußert hat.
  Die Bundesregierung begrüßt, dass sich die USA und Iran auf ein Rahmenabkommen geeinigt
  haben. Der Bundeskanzler gratuliert dem amerikanischen Präsidenten Trump und der
  iranischen Seite zu diesem diplomatischen Durchbruch. Das Abkommen ‑ das war Ihre
  Frage ‑ kann den Weg zur Erholung der Weltwirtschaft und zur Stabilisierung der
  Region bahnen. Man muss in dem Zusammenhang natürlich auch deutlich machen: Jetzt
  gilt es, das Vereinbarte zielstrebig umzusetzen. Die Straße von Hormus muss dauerhaft
  und uneingeschränkt für die freie Schifffahrt geöffnet werden. Weitere Verhandlungen
  müssen sicherstellen, dass der Iran sein militärisches Nuklearprogramm nachprüfbar
  beendet. Es darf keine weiteren Angriffe gegen Israel und andere Nachbarn in der
  Region geben. Die Bundesregierung ‑ auch das haben Sie gerade gefragt ‑ unterstützt
  und befördert weiter alle entsprechenden diplomatischen Anstrengungen. Zudem sind
  wir bereit, unseren Teil zur Wiedereröffnung der Straße von Hormus beizutragen,
  unter den bekannten Voraussetzungen, die wir hier ja auch schon vielfach besprochen
  haben. Das heißt, es muss eine völkerrechtliche Grundlage geben; ein Bundestagsmandat
  und ein tragfähiges politisches und militärisches Gesamtkonzept müssen vorliegen.
  Dazu ‑ auch das wird Sie nicht überraschen ‑ stehen wir in engem Austausch mit den
  Vereinigten Staaten, unseren europäischen Partnern und auch den Staaten der Region.
  Eine Frage ans BMVg: Wird sich die deutsche Marine an der Räumung der Minen in der
  Straße von Hormus beteiligen? Wenn ja, wie weit sind die Pläne da schon fortgeschritten?
  Was ich an dieser Stelle sagen kann: Wir haben ja in den letzten Wochen wiederholt
  durch Pressemitteilungen, aber auch Einladungen an die Presse, über potenzielle
  Beiträge informiert, die wir leisten können. Wir haben Sie auch darüber informiert,
  dass wir zwei Einheiten schon vorausstationiert haben, die sich im östlichen Mittelmeer
  befinden. Das Minenjagdboot „Fulda“ und der Tender „Mosel“ werden dort aktuell personell
  und materiell für jede Entwicklung vorbereitet. Sie führen Übungen durch, um sich
  auf verschiedene Entwicklungen, auch Bedrohungslagen, einzustellen. Das ist das,
  was wir derzeit vorgesehen haben. Wie der Regierungssprecher gerade sagte, müssen
  natürlich verschiedene Vorbedingungen, wie der Kanzler und unser Minister es immer
  wieder erwähnt haben, erfüllt werden. Es liegt natürlich in der Natur des Militärs,
  dass wir verschiedene Entwicklungen vorausdenken, antizipieren und dafür auch Planungen
  gemacht haben. Sobald eine politische Entscheidung getroffen wird und die Bedingungen
  passen, können wir dann entsprechend weiter agieren. Herr Hille, ich hätte ganz
  gerne zunächst einmal gewusst, wieso der Bundeskanzler eigentlich zufrieden ist.
  Denn in diesem Abkommen, wenn ich das richtig sehe, wird nur eine von drei Forderungen,
  die die Bundesregierung und auch die Europäer aufgestellt haben, wirklich angesprochen,
  nämlich das Atomabkommen, das Sie erwähnt haben. Aber es gibt keinerlei Verpflichtung
  Irans, die Proxys in der Region nicht mehr zu unterstützen, und es steht auch gar
  nichts drin zu dem ballistischen Programm, das ja für die Europäer wegen der weitreichenden
  Raketen sehr wichtig ist. Vielleicht können Sie das noch einmal erläutern, wieso
  man so zufrieden ist, obwohl diese beiden zentralen Punkte, also zwei von dreien,
  gar nicht angesprochen werden. Gut, dass Sie das ansprechen. Das gibt mir die Gelegenheit,
  das noch einmal zu betonen oder richtig zu intonieren. Ich habe ja nicht davon gesprochen,
  dass wir und der Bundeskanzler final mit dem zufrieden sind, was jetzt vorliegt.
  Aber man muss anerkennen ‑ und das haben wir hier ja verschiedentlich deutlich gemacht ‑:
  Es braucht ein Abkommen, um in die Nähe eines Friedens kommen zu können. Alles,
  was in diese Richtung führt, ist positiv. Wir sind jetzt an einem Punkt, an dem
  zum ersten Mal die beiden beteiligten Parteien und auch der Vermittler Pakistan
  in Aussicht stellen, dass ein solches Abkommen geschlossen werden kann. Das ist
  ein erster Schritt in die richtige Richtung. Deshalb begrüßt der Bundeskanzler das,
  weil es hinführen soll auf eine grundsätzlichere Lösung dieses Konfliktes, für die
  wir uns immer eingesetzt haben. Wenn ich noch einmal nachfragen darf: Die Europäer
  haben dann ja auch noch einen Teil beizutragen, nicht nur bei der Straße von Hormus,
  sondern auch, was die Aufhebung der Sanktionen angeht. Ist da in der Bundesregierung
  schon eine Entscheidung gefallen, dass die Sanktionen gegen Iran jetzt aufgehoben
  werden? Da verweise ich gerne noch einmal auf das Statement der E4, das wir in der
  vergangenen Nacht verschickt, beschlossen haben. Darin ist genau dieser Punkt angesprochen.
  Ich zitiere aus der Erklärung: „Wir stellen in Aussicht, entsprechende Sanktionen
  aufzuheben, sofern Iran klare und überprüfbare Schritte in Bezug auf sein Atomprogramm
  unternimmt.“ Okay, also jetzt ist noch keine Entscheidung gefallen? Das ist an Bedingungen
  geknüpft. Meine Frage geht wahrscheinlich an das BMWE. Die Ölpreise sind ja mit
  Blick auf diese Nachricht stark gefallen. Gibt es denn in der Bundesregierung eine
  Erwartung, wie schnell sich das auch an den Tankstellenpreisen reflektieren sollte?
  Die Erwartung ist, dass sich das an den Tankstellenpreisen eindeutig widerspiegelt.
  Zu genauen Zahlen kann ich jetzt aber nicht spekulieren. Können Sie vielleicht noch
  ganz kurz skizzieren ‑ wir hatten ja in den vergangenen Wochen hier sehr ausführlich
  das Thema Kerosin ‑, was das in dem Zusammenhang für diese Versorgungslage bedeutet?
  Wir hatten das, glaube ich, in der letzten oder vorletzten Regierungspressekonferenz
  schon erläutert, dass es derzeit keine Probleme mit der Versorgungslage bei Kerosin
  gibt, aber auch bei Rohöl und Ähnlichem. Die Internationale Energieagentur hat ja
  auch dazu aufgerufen, derzeit keine weiteren Lagerbestände mehr freizugeben; das
  sei nicht notwendig. Auch die Fluggesellschaften haben uns signalisiert, dass es
  derzeit kein Problem gibt. Man muss natürlich immer die geopolitische Lage im Blick
  behalten. Deshalb habe ich das Wort „derzeit“ benutzt; das muss man immer eingeschränkt
  dazu sagen. Aber wir sehen derzeit, wie gesagt, kein Problem darin. Laut US-Präsident
  Trump soll ja die Straße bereits am Freitag für die Minenräumung geöffnet werden.
  Wie schnell kann denn der deutsche Beitrag vor Ort sein? Die Frage geht an das BMVg.
  Die beiden Einheiten, die beiden Boote befinden sich jetzt im östlichen Mittelmeer.
  Sie brauchen natürlich etwas Transitzeit, sieben bis zehn Tage, bis sie dort wären.
  Wir haben aber auch andere Fähigkeiten angezeigt, wie Sie unseren Pressemitteilungen
  entnehmen können, die dann, wenn die Vorbedingungen stimmen, auch schneller da sein
  könnten. Das geht dann in den Bereich Drohnen etc. Dafür ist ja ein Bundestagsbeschluss
  notwendig. Kann der dann gegebenenfalls auch nachgeholt werden? Zum Thema Bundestagsbeschluss
  würde ich gerne an den Regierungssprecher abgeben. Ansonsten kann ich sagen: Die
  Vorbereitungen laufen intern auf der Arbeitsebene. Ich kann darauf eher grundsätzlich
  antworten, dass nach den Vorgaben bei uns für alle derartigen Einsätze der Bundeswehr
  ein Bundestagsmandat nötig ist. Ich erinnere mich aber, dass das in der Vergangenheit
  ‑ ohne dass Sie mich da jetzt festnageln ‑ auch ziemlich zügig herbeigeführt werden
  konnte. Das ist ja jetzt keine Situation, die ganz neu vom Himmel fällt. Ohne dass
  ich Ihnen jetzt ein konkretes Datum nennen kann: Ich wäre optimistisch, dass das
  in einem solchen Zeitrahmen erledigt werden kann. Noch einmal zu den Sanktionen:
  Herr Hille, es geht ja vermutlich um die EU-Sanktionen. Oder gibt es spezielle Sanktionen,
  die nur von diesen vier Staaten, die die Erklärung abgegeben haben, verhängt sind?
  Oder, falls es sich tatsächlich um EU-Sanktionen handelt: Wie wollen die vier Staaten
  sichergehen, dass die EU-Sanktionen aufgehoben werden? Das geht ja nicht durch Quartettbeschluss.
  Sie haben recht: Es geht im Wesentlichen um EU-Sanktionen, aber es gibt ja auch
  durch den Snapback wieder eingesetzte UN-Sanktionen. Um das einmal einzuordnen:
  Es gibt ja Sanktionen gegen Iran, und die existieren aus völlig unterschiedlichen
  Gründen, seien es Verstöße gegen die Nichtverbreitung von Massenvernichtungswaffen,
  gegen Menschenrechte oder das Liefern von Raketen und Drohnen, zum Beispiel an Russland
  zur Unterstützung des Aggressionskriegs gegen die Ukraine. Sollte es jetzt zu einer
  umfassenden Verhandlungslösung mit Iran kommen, dann würde sich in der Folge sicherlich
  auch die Stellung Irans in der internationalen Gemeinschaft verbessern können. Für
  eine Aufhebung der Sanktionen müsste Iran natürlich belegen, dass es diese Politik,
  die bislang verfolgt wurde, eben auch nachhaltig aufgegeben hat und sich davon abwendet.
  Davon muss dann die Weltgemeinschaft oder eben auch die Europäische Union überzeugt
  werden. Die EU-Maßnahmen, also EU-autonome Maßnahmen, können nur bei Einstimmigkeit
  der 27 EU-Mitgliedsstaaten aufgehoben werden. Die UN-Sanktionen können nur durch
  eine Entscheidung des UN-Sicherheitsrats aufgehoben werden. Die Nachfrage geht dann
  doch an Herrn Hille. Das Wort der Drecksarbeit ist ja nicht dadurch ausradiert,
  dass es ein Jahr her ist. Bedauert der Bundeskanzler im Lichte der aktuellen Lage,
  dass er diesen ziemlich scharfen Begriff vor einem Jahr verwendet hat? Ehrlich gesagt,
  verstehe ich den Zusammenhang, den Sie da jetzt aufmachen, nicht. Das Thema ist
  im vergangenen Jahr, glaube ich, ausgiebig bearbeitet worden. Jetzt liegt eine Rahmenvereinbarung
  auf dem Tisch, und es geht darum, damit umzugehen. Dazu habe ich Ihnen hier gerade
  die Grundhaltung der Bundesregierung und des Bundeskanzlers einmal kurz erläutert.
  Herr Hille, was erwarten Sie denn bezüglich einer möglichen Mission in der Straße
  von Hormus? Was könnte diesbezüglich beim G7-Gipfel besprochen werden? Sie sagten
  gerade, es könne dann alles zügig gehen, auch mit dem Bundestagsmandat. Welche Kriterien
  legen Sie denn dann aber dafür an? Ab wann könnte man sagen, dass wir jetzt über
  dieses Bundestagsmandat reden? Bei dem zweiten Teil der Frage müssten Sie mir gleich
  noch einmal damit helfen, zu verstehen, auf welchen Punkt Sie hinauswollen. Zum
  ersten Teil der Frage, Stichwort G7: Da kommen jetzt natürlich eine Reihe wichtiger,
  verantwortlicher Personen zusammen, und es ist immer hilfreich ‑ dazu dient ja auch
  ein solcher Gipfel wie der G7-Gipfel ‑, dass man sich persönlich über die großen
  Themen, die im Moment auf der Agenda stehen, austauscht. Dabei hängen natürlich
  der Konflikt im Iran und alles Weitere, was daran hängt ‑ konkret die Mission in
  der Straße von Hormus ‑, als ein Thema zusammen. Bezüglich anderer Themen ‑ nur
  damit es nicht heißt, dazu habe Herr Hille nichts gesagt ‑: Natürlich wird es auch
  um die Ukraine gehen, und wir können gleich, wenn Interesse besteht, auch noch einmal
  tiefer in die weiteren Themen einsteigen, die beim G7-Gipfel eine Rolle spielen
  werden. Aber grundsätzlich ist es natürlich hilfreich, erst recht in einer solchen
  Phase, wenn man jetzt mit vielen verantwortlichen Staats- und Regierungschefs auf
  der Welt zusammensitzt, im ersten Teil der Woche in Évian und zweiten Teil der Woche
  ‑ dann ja auch nicht ganz unerheblich ‑ mit den Staats- und Regierungschefs der
  EU beim ER in Brüssel. Der zweite Teil der Frage bezog sich noch einmal so ein bisschen
  auf diesen Aspekt des Zeitplans. Es wird ja eine Art vollständiges Abkommen ab Freitag
  erwartet, und ab dann, hat Präsident Trump gepostet, werde man mit der Minenräumung
  beginnen. Deswegen stelle ich eben noch einmal die Frage nach dem Zeitplan. Wenn
  Sie sagen, dann werde der Bundestag voraussichtlich zügig entscheiden, ab wann wird
  denn dann quasi hier die Messlatte angelegt „Okay, wir halten das alles für ein
  sicheres Abkommen, und ab dann steigen wir quasi hier in die Diskussion ein“? Nur
  für das Protokoll: Ich bin nicht der Sprecher des Bundestages, und der Bundestag
  entscheidet in solchen Fragen, wie derartige Sachen aufgesetzt werden, natürlich
  in eigener Hoheit. Ich habe auch nicht gesagt, dass es so kommen wird, sondern ich
  habe mich mit Verweis auf Entscheidungen aus der Vergangenheit optimistisch gezeigt,
  dass das auch zügig gehen kann. Ein erster Schritt ist üblicherweise ein Mandat
  der Bundesregierung, das wir dann beschließen und das dann im Bundestag debattiert
  wird. Es sind natürlich auch andere Einbringungswege denkbar. Ich will Sie jetzt
  nicht mit den Details unseres parlamentarischen Systems langweilen, aber wenn man
  Beschleunigungsmomente braucht, dann können auch Fraktionen etwas einbringen. Ich
  bin aber überfragt, ob das in Sachen von Mandaten schon einmal der Fall war. Wir
  reden hier ja jetzt die ganze Zeit von einer Rahmenvereinbarung oder einem Memorandum
  of Understanding, oder wie immer Sie es nennen wollen. Da würde mich erst einmal
  interessieren: Haben Sie Kenntnis von den Inhalten dieses Abkommens oder dieser
  Vereinbarung? So, wie ich den Bundesaußenminister heute Morgen verstanden habe,
  kennt man das noch nicht im Detail, und es liegt auch noch nichts vor, was irgendwie
  verschriftlicht wäre. Es gibt schon divergierende Interpretationen dessen, was da
  zwischen der iranischen und der amerikanischen Seite vereinbart wurde. Der Präsident
  sagt, mit der Vereinbarung sei dauerhaft sichergestellt, dass es eine mautfreie
  Durchfahrt gebe. Die iranische Nachrichtenagentur Fars, die relativ nah an den Revolutionsgarden
  ist, behauptet das Gegenteil. Es sei eine Klausel hinzugefügt worden, die eben das
  Erheben von Durchfahrtsgebühren ermögliche, um die iranische und omanische Souveränität
  über diese Straße zu bekräftigen. Von daher würde mich erst einmal interessieren,
  auf welcher Grundlage wir hier eigentlich sprechen. Wir haben natürlich viele der
  Äußerungen und auch verschiedene Interpretationen bzw. Deutungen in Medienberichten
  gesehen. Unsere Aufgabe ist es jetzt, das Ganze im direkten Kontakt mit unseren
  engsten Partnern auch mit Substanz zu unterfüttern. Weitere bestätigte Details zu
  den Inhalten der möglichen Verhandlungsvereinbarung dieser Absichtserklärung liegen
  uns, wie es der Außenminister heute früh auch gesagt hat, aktuell nicht vor. Aber
  Sie können davon ausgehen, dass das gerade ein sehr dynamischer Prozess ist. Dann
  hätte ich noch eine Nachfrage, die dann wahrscheinlich an Herrn Hille geht. Wenn
  man sagt, man brauche eine internationale Mandatierung in irgendeiner Form, welche
  Qualität müsste dieses Abkommen, wenn es am Freitag unterschrieben wird, haben,
  und welche Formen der internationalen Mandatierung sind für die Bundesregierung
  vorstellbar? Richtig ist, dass die Grundlagen für uns sind ‑ ich nenne sie gerne
  noch einmal ‑, dass wir eine völkerrechtliche Grundlage haben, ein Bundestagsmandat,
  ein tragfähiges politisches und militärisches Gesamtkonzept. Dann werden wir uns
  an einer etwaigen Mission in der Straße von Hormus beteiligen. Ich würde jetzt nicht
  in die Exegese einsteigen, was die Qualität angeht. Die Frage ist ja zum Beispiel,
  ob Sie ein UN-Mandat brauchen oder ob es eine andere Möglichkeit gibt. Muss es ein
  völkerrechtlich verbindliches Abkommen sein, dass ja dann zwei Menschen unterschreiben
  müssten, oder reicht Ihnen da auch weniger? Auch da würde ich jetzt, ohne dass ich
  Völkerrechtsexperte bin, nicht tiefer einsteigen. Unsere Kriterien habe ich Ihnen
  gerade genannt. Sie haben recht: Wir sprechen von einem Rahmenabkommen. Aber wie
  ich eingangs auf die Frage von dem Kollegen ja schon gesagt habe, nehmen wir das
  als ersten Schritt in die richtige Richtung wahr und begrüßen, dass es sich in diese
  Richtung bewegt, weil alles, was nicht Kampf und Konflikt bedeutet, in diesem Fall
  eine Entwicklung in die richtige Richtung ist. Alles Weitere wird sich dann in der
  Bearbeitung der nächsten Tage und Wochen erweisen müssen. Der nächste Schritt ist
  jetzt, dass diese Rahmenvereinbarung verbindlich durch eine Unterschrift fixiert
  wird. Wie wir es aufnehmen, soll das offensichtlich Ende der Woche in der Schweiz
  stattfinden. Auf Basis dessen werden dann weitere Schritte möglich, die ich jetzt
  aber ‑ ich bitte um Verständnis ‑ auch nicht im Detail antizipieren werde. Nein.
  Im Grunde ist es genau das. Es ist eine Substanz- und Faktenfrage. Ich hatte ja
  gerade ausgeführt, dass wir, was die genaue Sachverhaltsaufklärung hinsichtlich
  dieses Abkommens angeht, gerade noch bemüht sind. Sobald man dazu kommt, kann man
  daraus alles ableiten. Aber erst einmal ist es ja gut, dass es eine inkrementelle
  Verbesserung dessen gibt, was wir bis jetzt hatten. Insofern geht das, wie es gerade
  auch gesagt wurde, in die richtige Richtung, und alles Weitere wird man sich jetzt
  in der Folge ansehen müssen. Eine Ergänzung noch, in Verbindung mit der Frage der
  Kollegin von gerade zum Stichwort G7: Auch dafür bietet der G7-Gipfel ja möglicherweise,
  ohne dass ich zu tief in Spekulationen über das einsteige, was in den nächsten Stunden
  und Tagen stattfinden wird, einen Rahmen. Es wird jedenfalls einen unmittelbaren
  Kontakt mit dem amerikanischen Präsidenten geben, und das könnte in dieser Frage
  ja hilfreich und zielführend sein. Der Kollege sprach gerade die Gebühren an, die
  jetzt offenbar doch in das Abkommen hineinverhandelt wurden. Kurze Nachfrage: Haben
  Sie dazu schon weitere Details, und hat die Regierung einen Ehrgeiz, sich in diesen
  Verhandlungen dafür einzusetzen, dass diese nicht anfallen werden? Nein, weitere
  Details sind mir nicht bekannt. Ich weiß nicht, ob der Kollege Hinterseher da noch
  Details nennen kann. Ich kann nur noch einmal das unterstreichen, was ich gerade
  gesagt habe: Für uns ist wichtig, dass die Straße von Hormus dauerhaft und uneingeschränkt
  für die freie Schifffahrt ‑ dauerhaft und uneingeschränkt für die freie Schifffahrt! ‑
  geöffnet wird. Wir sind natürlich bereit, befinden uns in Gesprächen und führen
  auch weiterhin Gespräche, um jegliche Initiativen, die in die richtige Richtung
  führen, nämlich in die Richtung eines stabilen Abkommens, zu begleiten und zu befördern.
  Steckt in „uneingeschränkt“ auch „ohne Gebühren“ drin? Sind Gebühren eine Schranke?
  Wir haben das ja in der Vergangenheit hier auch schon mehrfach dargelegt. Deswegen
  ist es auch nichts Neues, dass wir uns für eine freie, sichere und gebührenfreie
  Schifffahrt in der Straße von Hormus einsetzen. Wir als Bundesregierung sind entschlossen
  und stehen bereit ‑ das haben wir jetzt auch mehrfach dargelegt ‑, gemeinsam mit
  Partnern dazu beizutragen, unseren Beitrag für die Freiheit der Schifffahrt in der
  Straße von Hormus zu leisten. Herr Swistek, ist die Regierung nach dem Scheitern
  des Kampfflugzeugprojekts FCAS besorgt, was das gemeinsame deutsch-französische
  Panzerprojekt MGCS angeht? Zum Projekt MGCS kann ich Ihnen vielleicht ein paar einordnende
  Punkte nennen. Da befinden wir uns in einem guten Austausch mit Frankreich, aber
  in der Tat gab es in den letzten Wochen ein paar Anpassungen, die insbesondere vor
  dem Hintergrund der Erfahrungen und Lehren aus dem russischen Angriffskrieg in der
  Ukraine vorgenommen wurden. Deutschland und Frankreich haben daher gemeinsam beschlossen,
  sich auf den Kern des Programms MGCS zu fokussieren, auf die Erforschung und Entwicklung
  sowie Demonstrationen von sogenannter zukunftsgerichteter Hochtechnologie für den
  Einsatz und die Führung bemannter und unbemannter gepanzerter Gefechtsfahrzeuge.
  Das Programm MGCS verfolgt damit nun plattformunabhängig den Ansatz, welcher die
  Nutzung von Technologien in einer Vielzahl von bemannten und unbenannten Gefechtsfahrzeugen
  ermöglichen soll. Schnittstellen und Architekturen werden entsprechend offen ausgelegt.
  Deutschland hält an der gleichberechtigten und vertrauensvollen Zusammenarbeit mit
  Frankreich in diesem Programm fest. Das gilt unabhängig von anderen Entwicklungen
