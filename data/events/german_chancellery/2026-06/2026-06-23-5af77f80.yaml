title: Speech by Federal Chancellor Merz on the occasion of the 2026 Day of Industry
  “Prosperity for young people”
text: 'Following his speech, Federal Chancellor Merz took part in a panel discussion
  with Peter Leibinger, President of the Federation of German Industries (BDI). Photo:
  Federal Government/Henning Schacht “It is now the younger generation that demands
  our full attention and focus,” said Federal Chancellor Friedrich Merz at the Day
  of Industry (TDI) organised by the Federation of German Industries (BDI) at the
  EUREF – European Energy Forum – campus in Berlin. The central task of politics is
  to make the right decisions today, so that future generations can also enjoy the
  prospects of prosperity and security. Progress on international trade agreements,
  the unity of the G7 countries and new economic partnerships are important signs
  of greater stability, reliability and predictability. Looking to the future, Merz
  identified four key areas of action which, in his view, are crucial to ensuring
  prosperity for the younger generation: an effective high-tech agenda, more start-ups,
  greater computing capacity and improved defence capabilities. “After prosperity
  for all, the next step must now be prosperity for young people,” emphasised the
  Federal Chancellor. Read the transcript of the speech here (in German):'
