date: '2026-06-17'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 17. Juni 2026
text: 'Sprecherinnen und Sprecher •    stellvertretender Regierungssprecher Meyer
  •    Deschauer (AA) •    Wentzel (BMWE) •    Chagheri (BMAS) •    Müller (BMVg)
  •    Singer (BMI) •    Link (BMV) (Vorsitzende Hamberger eröffnet die Pressekonferenz
  und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der Ministerien.) (zu
  möglichen Verhandlungen über ein Ende des russischen Angriffskrieges in der Ukraine
  ) Ich habe eine Frage zum G7-Gipfel. Der Bundeskanzler hat vor dem Gipfel gesagt,
  er würde mögliche Gespräche mit Russlands Präsident Wladimir Putin von europäischer
  Seite aus gern mit Donald Trump abstimmen bzw. besprechen. Gibt es dazu etwas zu
  berichten? Wurde das thematisiert? Was ist das Ergebnis? Ich bin mir nicht ganz
  sicher, ob Sie den Bundeskanzler in der Frage ganz richtig zitiert haben. Aber klar
  ist natürlich ‑ Sie haben recht ‑, dass wir uns fortlaufend dafür einsetzen, dass
  wir zu echten und ernsthaften Gesprächen über einen dauerhaften Frieden in der Ukraine
  kommen. Natürlich war es auch wichtig, im Rahmen der G7 darüber zu beraten. Was
  wir sagen können, ist, dass wir wirklich eine neue Dynamik in der Diskussion rund
  um die Ukraine sehen. Die Ukraine hat sich eine neue Position der Stärke erkämpft,
  aus eigener Kraft, aus eigener Widerstandsfähigkeit und natürlich auch durch die
  starke Unterstützung, die wir aus Europa und auch aus Deutschland politisch, diplomatisch,
  aber natürlich auch finanziell und militärisch in den vergangenen Monaten und Jahren
  gegeben haben. Aus unserer Sicht ist klar, dass Russland diesen Krieg militärisch
  nicht gewinnen kann. Das zeigt sich immer deutlicher. Auch die Wirtschaft in Russland
  ächzt unter diesem Krieg. Deshalb wollen wir diese Dynamik mit den G7-Partnern auch
  nutzen, um einen neuen Anlauf zu starten und wirklich zu ernsthaften Friedensgesprächen
  zu kommen. Ein Waffenstillstand ist dafür eine Grundbedingung und Voraussetzung.
  Darüber haben wir uns natürlich auch im Rahmen der G7 ausgetauscht. Sie haben sicherlich
  zur Kenntnis genommen, dass es im Anschluss auch eine gemeinsame Erklärung gab,
  die die Ukraine noch einmal explizit thematisiert, die auch besagt, den Druck bzw.
  den Sanktionsdruck auf Russland weiter hochzuhalten, um Russland an den Verhandlungstisch
  zu bekommen. Insofern war es gestern ein sehr wichtiges Thema am ersten Tag des
  G7-Gipfels. Für wann rechnet die Bundesregierung mit Namen für Kandidaten, die diese
  Verhandlungen mit Putin für Europa führen könnten? Darüber werde ich jetzt nicht
  spekulieren, und ich werde auch keine Prognosen für die Zukunft abgeben. Noch einmal:
  Wichtig ist, dass wir eine neue Dynamik haben. Diese neue Dynamik wollen wir jetzt
  wirklich nutzen. Russland muss an den Verhandlungstisch kommen. Wir tun alles, was
  wir tun, damit das in Zukunft auch gelingt. ‑ Noch einmal: Es ist eine neue Dynamik.
  Diese Dynamik wollen wir gemeinsam mit unseren Partnern nutzen. Herr Meyer, wie
  sind denn aktuell die Drähte der Bundesregierung oder vielleicht auch der E3 nach
  Moskau? Gibt es dazu irgendetwas, was Sie beschreiben könnten, oder herrscht dabei
  kompletter Stillstand? Dazu habe ich derzeit nichts, was ich hier weiter ausführen
  möchte. Am Ende haben wir in den vergangenen Wochen und Monaten ja gesehen, dass
  die Bereitschaft zu ernsthaften Friedensgesprächen vor allen Dingen auf russischer
  Seite fehlte. Deshalb ist es, glaube ich, gerade so wichtig. Ich will noch einmal
  erklären, warum wir hierbei so vorgehen: Es ist wichtig, dass die Ukraine in der
  Lage ist, militärisch standzuhalten und auch deutlich zu machen ‑ das tut sie gerade
  sehr stark, auch durch die starke Unterstützung, aber natürlich auch durch die eigene,
  wirklich bewundernswerte Widerstandsfähigkeit des ukrainischen Volkes ‑, dass Russland
  diesen Krieg nicht gewinnen kann, und dass andererseits der Druck auf Russland auch
  wirtschaftlich erhöht und gezeigt wird, dass dieser Krieg immer, immer teurer wird.
  Deshalb ist das unser Weg nach vorn. So versuchen wir, Russland dazu zu bewegen,
  jetzt wirklich ernsthaft mit uns, mit den Ukrainern, aber natürlich auch mit unseren
  amerikanischen Partnern über Wege zum Frieden zu sprechen. Herr Meyer, Sie haben
  den Ausdruck „neue Dynamik“ jetzt mehrfach verwendet. Der Kanzler hat gestern auf
  diesen Halbsatz von Trump abgehoben, dass sich die G7 jetzt einig seien, weil Trump
  dabei gesagt habe, Russland solle jetzt einen Deal machen. Ist das wirklich sozusagen
  die ganz große Akzentverschiebung aus Sicht der Bundesregierung? Die Aussagen von
  Trump haben sich ja bisher in diesem Kriegsgeschehen immer dadurch ausgezeichnet,
  dass er an dem einen Tag das eine und an dem anderen Tag das andere gesagt hat.
  Das ist sicherlich ein Aspekt, wenn wir auf die neue Dynamik blicken, die ich gerade
  versucht habe zu beschreiben. Aber wir sehen sie eben auch auf anderen Feldern.
  Wir sehen sie zum Beispiel im Kriegsverlauf, der immer deutlicher macht, dass es
  Russland sehr schwer fällt, diesen Krieg militärisch zu gewinnen. Wir sehen es eben
  auch in der wirtschaftlichen Entwicklung. Das sorgt insgesamt für die neue Dynamik,
  die wir aktuell sehen. Wir bleiben dabei natürlich auch vorsichtig optimistisch,
  weil noch große Schritte zu gehen sind und weil wir auf russischer Seite nach wie
  vor keine ernsthafte Bereitschaft sehen, in Verhandlungen einzusteigen. Deshalb
  noch einmal: Wir sehen diese Dynamik, und wir wollen sie jetzt nutzen. Herr Meyer,
  die G7 hat ja nun neue Sanktionen gegen Russland im Öl- und Gassektor angekündigt.
  Worum geht es bei diesen Sanktionen speziell im Öl- und Gassektor konkret? Es gibt
  ja schon Entscheidungen zum Beispiel zur Einfuhr russischen Öls, die, glaube ich,
  ab 2027 verboten werden soll. Wie sieht das konkret aus? Ich kann noch einmal für
  alle sagen: Die G7-Staaten haben sich auf neue Sanktionen gegen den russischen Energiesektor
  verständigt, insbesondere auf Öl und Gas. Zudem wurde vereinbart, weitere Militärhilfen
  für die Ukraine unter anderem zur Stärkung der Luftabwehr bereitzustellen. Das ist
  sozusagen die Rahmenvereinbarung, die die G7 hierzu getroffen hat und die in den
  nächsten Tagen und Wochen aus den unterschiedlichen Blickwinkeln der G7-Partner
  sicherlich konkretisiert werden muss. Aber das beantwortet ja nicht die Frage. Worum
  geht es bei den neuen Sanktionen konkret? Steht das schon fest? Wie gerade gesagt,
  ist der Rahmen klar beschrieben. Die nächsten Schritte, die konkreten Schritte,
  werden dann auf unterschiedlichen Ebenen erfolgen. Zum Thema des Irans und der Sicherung
  der Straße von Hormus: Der Kanzler hat noch einmal bekräftigt, dass Deutschland
  bereit sei, sich daran zu beteiligen. Dazu bräuchte es zunächst einmal ein neues
  Mandat der Bundesregierung. Können Sie etwas zu den Vorbereitungen und dem Zeitplan
  sagen? Auch da begrüßen wir in der Tat die Entwicklungen. Das hat der Bundeskanzler
  gestern auch getan. Wir sehen in der Einigung, die wohl am Freitag unterzeichnet
  werden soll, eine Chance für Stabilität in der Region und auch für eine Erholung
  der Weltwirtschaft. Es wird danach sicherlich um eine Konkretisierung gehen, was
  mögliche Mandatsfragen angeht. Wir haben immer gesagt, dass wir grundsätzlich dazu
  bereit sind, uns insbesondere an einer Absicherung der Straße von Hormus zu beteiligen,
  wenn bestimmte Bedingungen erfüllt sind. Wir bereiten uns darauf vor. Aber eine
  Entscheidung ‑ es gibt eine Reihe offener Fragen, die sich nach wie vor stellen ‑
  ist zum jetzigen Zeitpunkt noch nicht erfolgt. Herr Meyer, inwiefern halten Sie
  es für möglich, dass der Bundestag bereits nächste Woche über ein solches Mandat
  abstimmt? Ich würde jetzt ungern über Zeitpläne spekulieren. Sie sagen ja richtigerweise,
  dass auch der Bundestag dabei ein gewichtiges Wort mitzureden hat. Deshalb gehen
  wir hierbei wirklich Schritt für Schritt für Schritt vor. Das ist, glaube ich, auch
  wichtig. Wir bereiten uns natürlich vor. Wir denken immer in Szenarien, um auch
  auf mögliche Entwicklungen vorbereitet zu sein, und führen dann die Gespräche. Aber
  noch einmal: Das machen wir Schritt für Schritt. Spekulieren über den weiteren Zeitablauf
  möchte ich an dieser Stelle nicht. Inwiefern ist für ein solches Mandat aus Sicht
  der Bundesregierung denn ein Mandat der Vereinten Nationen zwingend notwendig? Sie
  sprechen eine Frage an, die sich zum Beispiel stellt, nämlich die Rechtsgrundlage
  für ein solches Mandat. Genau das wird sicherlich Teil der Diskussionen sein, die
  auch in den nächsten Tagen und Wochen erfolgen werden. Ich habe eine Frage, quasi
  auch zum sogenannten Iranabkommen, aber nicht zu der wirtschaftlichen Seite für
  den Transport von was auch immer, sondern zu der operativen: Ist es nun ein Deal,
  Herr Meyer oder Frau Deschauer, oder ist es wirklich ein Operationsplan? Es bewegt
  ja seit 48 Stunden die Welt, dass gesagt wird, dass Israel natürlich keine Hisbollahraketen
  will und Iran keine Präsenz Israels im Libanon will. Wie kommt man da heraus? Hat
  die Bundesregierung ein Rezept bzw. eine Meinung dazu? Ich würde dazu wirklich auf
  die Worte des Bundeskanzlers ‑ ich glaube, auch der Außenminister hat sich in den
  vergangenen 24 Stunden dazu geäußert ‑ verweisen. Er hat sich ja auch recht umfangreich
  dazu geäußert und sich auch noch einmal zum Libanon geäußert. Noch einmal: Entscheidend
  ist am Ende, dass ein solches Abkommen und vor allem das Ende der Kämpfe dann auch
  wirklich halten. ‑ Das ist ganz entscheidend, um dann überhaupt die nächsten Schritte
  gehen zu können. Zum Iran, vielleicht auch an Frau Deschauer: Ursprünglich war jetzt
  ‑ vielleicht nicht von der Bundesregierung, aber zumindest von der US-Regierung ‑
  das Ziel eines Regimechange ausgegeben worden. Der Bundesaußenminister hat ja auch
  gesagt, dass das Regime jegliche Legitimation verloren habe. Jetzt scheint es mit
  dem Abkommen ja so zu sein, dass sich die Regierung in Teheran wieder stabilisiert
  hat. Wie bewerten Sie die innenpolitische Lage im Iran aktuell? Sie wissen, dass
  es dort Vertreter des Regimes gibt, die in handelnder Position sind, de facto dort
  die Gewalt über das Staatsgebiet ausüben, sicherlich weiterhin ihr repressives Regime
  gegenüber der Zivilbevölkerung ausüben ‑ ‑ ‑ Man hat immer wieder Berichte von Todesstrafen,
  die verhängt werden, zur Kenntnis zu nehmen, die wir sehr verurteilen. Das ist die
  aktuelle Lage. Sie wissen, dass die Gesprächspartner von iranischer Seite definiert
  werden. Dort gibt es einen Außenminister. Dieser war schon vor Februar Außenminister.
  Er ist es weiterhin. Es gibt weitere Gesprächspartner, insbesondere gegenüber den
  verhandelnden Akteuren ‑ das sind regionale Akteure ‑ und auch gegenüber den Vereinigten
  Staaten von Amerika. Das ist die Sachlage. Das kann ich einfach so schildern. Da
  wir gerade beim Thema Irans sind: Frau Deschauer ‑ die Frage stellt ja sonst immer
  der Kollege Jung ‑, wir warten jetzt seit dem 28. Februar noch auf die völkerrechtliche
  Bewertung des Auswärtigen Amts zum Angriffskrieg von USA und Israel gegen den Iran.
  Sind Sie denn damit mittlerweile weitergekommen? Sie sagen es, Herr Kollege: Wir
  haben uns hier schon verschiedentlich zu dem Gesamtthemenkomplex ausgetauscht. Ich
  habe dem heute nichts hinzuzufügen. Ja, ausgetauscht haben wir uns. Das stimmt.
  Aber zur Frage, wie das Auswärtige Amt diesen Angriff gegen den Iran völkerrechtlich
  bewertet, haben Sie immer auf die komplexe Situation verwiesen und gesagt, die völkerrechtliche
  Bewertung dauere noch an. Vielleicht ist ja der 17. Juni ein guter Tag dafür. Ich
  sagte ja, dass wir unserem Austausch, den wir hier geführt haben, auch die Bundesregierung
  in Gänze, heute nichts hinzuzufügen haben. Ich habe eine Frage an Herrn Meyer, aber
  vielleicht auch an das Wirtschaftsministerium: Wie sehr waren Sie in die Vorbereitung
  der Reise von Herrn Spahn , die ja sehr kurz war und bei der er sich ja sehr deutlich
  zur deutschen Chinapolitik geäußert hat, eingebunden? Obwohl es ja eine CDU/CSU-Reise,
  eine Parteireise war, wüsste ich doch gern, ob es dazu vorher Absprachen gegeben
  hat und wie Sie die Reise bewerten, sofern Sie schon wissen, was er dort gesagt
  hat. Eine Bewertung der Reise würde ich jetzt nicht abgeben. Dazu müssen Sie sich
  an die CDU/CSU-Fraktion wenden. Grundsätzlich kann ich sagen, dass es natürlich
  auch mit Herrn Spahn immer wieder Austausch über die Grundlinien auch der deutschen
  Politik und der Regierungspolitik gibt, weil er als Fraktionschef natürlich eine
  herausgehobene Position hat. Konkret in Bezug auf die Reise habe ich in der Tat
  nichts mitzuteilen. Mir ist dazu auch nichts Konkretes bekannt. Heißen Sie es denn
  grundsätzlich gut, dass der Fraktionsvorsitzende in China für einen gerade in der
  Wirtschaftspolitik schärferen Kurs gegenüber China eintritt? Ich glaube, es ist
  nicht meine Aufgabe, jetzt für die Bundesregierung zu bewerten, wie sich der CDU/CSU-Fraktionschef
  vor Ort in China positioniert hat. Ich muss gestehen, dass ich die genaue Positionierung
  auch gar nicht kenne. Insofern noch einmal: Der Bundeskanzler war selbst vor Ort.
  Auch die Wirtschaftsministerin war vor Kurzem vor Ort. Weitere Vertreter waren vor
  Ort, etwa der Außenminister und der Vizekanzler, und haben dort die Position der
  Bundesregierung vertreten. Darauf konzentrieren wir uns hier. Meine Frage geht an
  das BMAS. Es soll ja ein neues Regelbedarfsermittlungsgesetz geben. Was ist diesbezüglich
  der Stand der Dinge? Können Sie die wichtigsten Inhalte schon skizzieren und sagen,
  wann es gegebenenfalls ins Kabinett kommt? Uns liegt jetzt die Einkommens- und Verbrauchsstichprobe
  mit wirklich umfangreichen Erhebungen des Statistischen Bundesamts vor. Das ist
  die statistische Grundlage für die Berechnung für das neue Regelbedarfsermittlungsgesetz.
  Das ist ein gängiger Vorgang, der ungefähr alle fünf Jahre stattfindet. Das Statistische
  Bundesamt ermittelt damit das Konsumverhalten und die Ausgaben der unteren Einkommensgruppen.
  Auf dieser Grundlage wird das neue Regelbedarfsermittlungsgesetz erstellt. Es soll
  im nächsten Jahr in Kraft treten, aber alles Weitere müsste ich Sie noch abzuwarten
  bitten. Ich kann Ihnen heute noch keine Inhalte nennen, auch keinen Kabinetttermin.
  Wäre eine Senkung der Regelsätze theoretisch überhaupt möglich, oder geht das wegen
  Bestandsschutzregelungen nicht? Die Bestandsschutzregelungen stehen im jetzigen
  Gesetz. Über das neue Gesetz kann ich inhaltlich noch nichts sagen. Thema auf der
  Innenministerkonferenz ist auch der ständige Vorwurf des Sozialgeldmissbrauchs .
  Dagegen wollte die Ministerin härter vorgehen. Was ist diesbezüglich geplant bzw.
  schon umgesetzt? Das ist das Thema von Sozialleistungsmissbrauch. Zur Innenministerkonferenz
  selbst kann ich nichts sagen, aber ich kann gern allgemein etwas zu dem Thema sagen.
  Die Ministerin hat sich dazu schon mehrfach geäußert. Die überwältigende Mehrheit
  der Leistungsberechtigten verhält sich absolut regelkonform. Klar ist aber auch,
  dass Sozialleistungsmissbrauch der Akzeptanz des Sozialstaats schadet und unfair
  gegenüber denjenigen ist, die das System mit Steuern und Beiträgen finanzieren.
  Die Ministerin hat schon mehrfach deutlich gemacht, dass ihr der Kampf gegen Sozialleistungsmissbrauch
  wichtig ist. Sie möchte diejenigen schützen, die Hilfe brauchen, und sie möchte
  klare Konsequenzen dort, wo Leistungen missbräuchlich in Anspruch genommen werden.
  Dementsprechend stärken wir die Instrumente, um Sozialleistungsmissbrauch besser
  aufzudecken und zu bekämpfen. Dabei gibt es verschiedene Punkte. Die Bundesagentur
  für Arbeit wird künftig eine koordinierende Rolle übernehmen und Strukturen aufbauen,
  um komplexe und überregionale Missbrauchsstrukturen besser zu erkennen und verfolgen
  zu können. Dazu wird es ein Kompetenzzentrum Leistungsmissbrauch bei der BA geben.
  Es nimmt am 1. Juli erst einmal zentral in Nürnberg seine Arbeit auf, ab nächstem
  Jahr sukzessive auch in der Fläche. Darüber hinaus sieht der Koalitionsvertrag vor,
  die Bekämpfung organisierten Sozialleistungsmissbrauchs insgesamt weiter voranzutreiben.
  Dazu laufen regierungsinterne Beratungen. Die Ministerin hat sich bereits dazu geäußert,
  dass wir mit einem Aktionsplan gegen Sozialleistungsmissbrauch ins Kabinett gehen
  werden. Die genauen Inhalte bleiben abzuwarten. Ich habe eine Frage an das Verteidigungsministerium.
  Können Sie erklären, warum die Anzahl von Tieren , die in der Bundeswehr für Versuche
  verwendet werden, Verschlusssache ist? Vorab: In der Bundeswehr gibt es Tierversuche
  im Rahmen der wehrwissenschaftlichen Forschung. Das ist nicht neu. Wir haben darüber
  schon mehrfach berichtet. Sie wissen, dass wir sanitätsdienstliche oder wehrwissenschaftliche
  Forschung haben, die darauf ausgerichtet ist, Schutz und Versorgung für die Soldatinnen
  und Soldaten sicherzustellen. Dafür gibt es auch Tierversuche, wobei die tierschutzrechtlichen
  Vorgaben natürlich immer eingehalten werden. Davon getrennt sind die Tiere zu sehen,
  die wir in Nutzung haben, etwa Mulis ‑ darüber haben wir hier schon einmal gesprochen ‑
  oder Diensthunde. Die Zahlen dieser Tierversuche sind seit Jahren rückläufig. Aktuell
  haben wir noch keinen Anstieg. Die parlamentarische Anfrage, auf die Sie anspielen,
  wurde dahin gehend beantwortet. Aufgrund der Bedrohungslage, aufgrund des Aufwuchses
  der Streitkräfte und aufgrund der Projekte, die dahinter stehen, auch in der wissenschaftlichen
  Forschung, ist es wahrscheinlich, dass das Mittel der Tierversuche in den nächsten
  Jahren wieder häufiger genutzt wird, als es aktuell genutzt wird. Wir schlüsseln
  sie nicht öffentlich auf, weil hinter jedem Versuch ein wehrwissenschaftliches Forschungsprojekt
  steht. Über diese wehrwissenschaftliche Forschung berichten wir dem Parlament. Das
  ist eingestuft. Deswegen unterliegen auch die Zahlen einer Einstufung. Aber welche
  Erkenntnisse können Geheimdienste aus der bloßen Anzahl ziehen? Warum wird das nicht
  öffentlich gemacht? Wie ich gesagt habe, haben wir eine Verknüpfung zu den Projekten.
  Es brächte Ihnen auch nichts, einzelne Zahlen zu kennen, weil Sie nicht wüssten,
  ob wir damit zum Beispiel eine Blutentnahme an einem Schaf meinen. Wenn man eine
  bakterielle Nährlösung herstellen will, dann nimmt man zum Beispiel einem Schaf
  Blut ab. Das gilt als Tierversuch. Deswegen bringt Ihnen die reine Anzahl ohne Zuordnung
  der Tiere und des Hintergrundes gar nichts. Mit dieser Einordnung würden wir Einstufungen
  berühren, die andere nutzen können. Herr Müller, eine kurze Verständnisfrage: Was
  sind die dominierenden Tiere bei diesen Tierversuchen? Ratten? Affen? Schafe hatten
  Sie erwähnt. Das kann ich im Detail gar nicht sagen. Ich weiß nur, dass wir einen
  Bereich haben, der nicht in die Kategorie von Tierversuchen fällt. Wir haben zum
  Beispiel ein Forschungsprojekt, das aber durch eine externe Firma geführt wird,
  in dem zum Beispiel Kakerlaken eine Rolle spielen. Das fällt nach meiner Kenntnis
  nicht unter diese Vorgaben. Aber im Bereich der sanitätsdienstlichen Forschungseinrichtungen,
  wenn es um Impfstoffe oder um Schutz vor Kampfstoffen geht, reden wir natürlich
  über kleinere Säugetiere. Diese Frage geht an das Auswärtige Amt. Haben Sie einen
  Kommentar zum Fall des erschossenen Künstlers in Polen , oder können Sie sagen,
  ob Sie davon ausgehen, dass das von staatlichen Stellen ausgegangen ist? Ich kann
  darauf verweisen, dass sich der Polenbeauftragte der Bundesregierung, Knut Abraham,
  dazu schon heute früh in einem Interview im Radio geäußert hat. Ich denke, unser
  Maßstab und Anspruch muss sein, dass der Vorfall von den polnischen Behörden vollumfänglich
  aufgeklärt wird. Wir vertrauen darauf, dass dies erfolgt. Eine Ermordung verurteilen
  wir natürlich. Der Polenbeauftragte hat auch gesagt, dass es, sollte sich der Verdacht
  erhärten, dass gewisse Stellen dahinter stehen, natürlich ein gravierender Vorfall
  wäre. Aber darüber hinaus kann ich jetzt, ohne dass von polnischer Seite schon Aufklärung
  betrieben und kommuniziert wurde, keine Kommentierung abgeben. Frau Deschauer, können
  Sie die Formulierung „gewisse Stellen“ konkretisieren? Ja. Vielleicht hören Sie
  das Interview nach. Es lief heute Morgen um 7.15 Uhr im Deutschlandfunk. Das ist
  eine wichtige Quelle. Der Polenbeauftragte wurde auch gefragt, ob möglicherweise
  eine russische Provenienz vorliege. Das hat er beantwortet. Herr Link, es gab eine
  Antwort der Bundesregierung auf eine Kleine Anfrage des Grünen-Abgeordneten Al-Wazir,
  aus der hervorgehe ‑ so wird es zumindest interpretiert ‑, dass für die Jahre 2026
  und 2027 kein Geld für Neu- und Ausbauprojekte der Deutschen Bahn da sei. Das betrifft
  viele Projekte. Was können Sie dazu sagen? Dazu kann ich sagen, dass unser Ministerium
  großes Interesse daran hat, dass neben der mit Nachdruck und hoher Priorität verfolgten
  dringenden Sanierung und Modernisierung des Bestandnetzes auch der Aus- und Neubau
  der Schieneninfrastruktur in Deutschland deutlich vorankommt, um die Zuverlässigkeit
  des Schienennetzes insgesamt zu verbessern. Das zeigt nicht zuletzt die große Zahl
  von im Bau befindlichen Projekten. Daher arbeitet das BMV daran, die Finanzierbarkeit
  der notwendigen Planungen und baulichen Umsetzungen auch für weitere dringende Vorhaben
  im Rahmen der verfügbaren Haushaltsmittel sicherzustellen. Denn wir wollen die Wettbewerbsfähigkeit
  unserer Wirtschaft und die Mobilität unserer Bürgerinnen und Bürger sicherstellen,
  indem wir dringend benötigte und baureife Projekte umsetzen. Wie viel Geld genau
  fehlt denn für das Jahr 2027? Das ist ja eine relativ einfache Geschichte. Es gibt
  einen Haushaltsplan und eine mittelfristige Finanzplanung. Die Zahlen, welche Mittel
  erforderlich sind, um alle Projekte, so wie sie da stehen, zu finanzieren, und welche
  Mittel dafür im Moment in der mittelfristigen Finanzplanung vorgesehen sind, sind
  in der kleinen Anfrage ja sehr exakt aufgeführt. Da wir uns im Moment in laufenden
  Haushaltsverhandlungen befinden, ist es relativ denklogisch, dass wir versuchen,
  möglichst viel Geld zu bekommen, um möglichst viel davon umsetzen zu können. Herr
  Meyer, derzeit wird ja wild spekuliert, ob es sich bei dem personalisierten Trikot
  der deutschen Nationalmannschaft, welches Bundeskanzler Merz US-Präsident Trump
  beim G7-Gipfel überreicht hatte , um ein Originaltrikot des DFB-Shops handelt oder
  um ein Fake. Da würde mich interessieren: Entspricht denn die Beflockung mit dem
  Namen „Trump“ und der Rücknummer 47 der regulären Personalisierung, wie sie im DFB-Fanshop
  angeboten wird? Falls nein, handelt es sich bei dieser Beflockung um eine andere
  offizielle oder vom DFB zugelassene Variante? Es handelt sich hierbei um ein Fantrikot
  für den DFB, das jeder ‑ auch Sie; Sie haben sich jetzt für das Argentinien-Trikot
  entschieden ‑ theoretisch erwerben könnte. Das war eine freundschaftliche Geste
  zum Geburtstag. Das ist das, was dahintersteckt. Die ganzen Spekulationen ranken
  sich ja darum, dass auf den tatsächlich standardisierten Trikots so ein DFB-Druck
  ist, also auch die Rückennummer. Die fehlt bei Trump. Deswegen ist es ja vermutlich
  nicht dieses direkt offizielle Trikot, wenn ich Sie richtig verstehe. Können Sie
  dann noch die Quelle angeben, von der Sie das bezogen haben? Wo das gekauft wurde,
  weiß ich schlichtweg nicht. Noch einmal: Es handelt sich um ein normales Trikot.
  Die Beflockung mit der Nummer 47 wurde deshalb organisiert ‑ auch dazu gab es Nachfragen ‑,
  weil er der 47. Präsident ist. Das ist, wie gesagt, eine freundschaftliche Geste
  zum Geburtstag. Es gibt einen Brief von vor allem Start-up-Unternehmern , unterzeichnet
  von noch einigen mehr. Die fordern Erleichterungen für Start-ups, beispielsweise,
  dass man die private Rentenvorsorge dort mehr mitfinanzieren kann, dass es flexiblere
  Kündigungsregeln für Topverdiener und insgesamt weniger Bürokratie gibt. Die wünschen
  sich, dass das Ganze jetzt auch schon direkt in die nächsten Koalitionsverhandlungen
  einfließt, in die Reformbemühungen Anfang Juli, weil man keine Zeit mehr habe. Ist
  das etwas, von dem sie sich Hoffnungen machen können, dass das schon direkt berücksichtigt
  wird? Gibt es darauf eine Reaktion, gerne von Herrn Meyer, aber vielleicht auch
  von den zuständigen Ministerien? Ja, wir haben die Initiative natürlich zur Kenntnis
  genommen. Es ist, glaube ich, auch richtig, dass sich jetzt viele mit unterschiedlichen
  Perspektiven einbringen, auch in diese Debatte. Das werden wir uns sicherlich genau
  anschauen und auch auswerten. Manche Vorschläge, die ich da gesehen habe, kommen
  mir aus manchen Diskussionen auch durchaus bekannt vor. Noch einmal: Es ist, glaube
  ich, völlig normal, dass sich unterschiedliche Vertreter dazu auch positionieren.
  Am Ende ist ja der Geist das Entscheidende, und der Geist ist, und den haben wir
  ja auch schon rund um den Sozialpartnerdialog oder die Gespräche mit Arbeitgebern
  und Gewerkschaften gesehen: Wir arbeiten ja am Ende gemeinsam daran, dieses Land
  voranzubringen und diesen Standort, vor allem den Wirtschaftsstandort, wirklich
  wieder stark zu machen. Insofern würde ich auch diese Initiative einmal so einordnen.
  Das kann ich für das Wirtschaftsministerium gerne unterstreichen und noch einmal
  die herausragende Wichtigkeit betonen, die die Start-up- und die Scale-up-Branche
  insgesamt für den Wirtschaftsstandort haben. Das ist etwas, das wir als Ministerium
  sehr im Blick haben. Wir entwickeln als Bundesregierung, wie Sie vielleicht wissen,
  die Start-up- und Scale-up-Strategie. Der Entwurf enthält ca. 120 Maßnahmen. Wir
  hoffen, dass wir uns dann auch bald im Kabinett als Bundesregierung zu dieser Strategie
  bekennen können, um den Standort für Start-ups und Scale-ups weiter zu verbessern.
  Ich habe eine Frage an das BMI bezüglich Grenzkontrollen . Die Stadt Aachen kritisiert
  die anhaltenden Grenzkontrollen an der deutsch-niederländischen Grenze. Jetzt ist
  GEAS in Kraft. Die Zahlen gehen herunter. Die Bundesregierung hat auch immer gesagt,
  das sei keine Dauerlösung. Worauf warten Sie also? Was sagen Sie der Stadt Aachen?
  Vielen Dank für die Frage. - Wir hatten das Thema auch schon in den vergangenen
  Wochen rund um die Inkraftsetzung von GEAS angesprochen. Es ist so, dass die Grenzkontrollen
  weiterhin bestehen bleiben. Der Minister hat auch öfter bzw. wiederholt gesagt,
  dass wir darauf schauen, wenn der Außengrenzschutz funktioniert, dass wir dann auch
  den Binnengrenzschutz wieder lockern können. Aber das ist aktuell noch nicht der
  Fall. Haben Sie irgendeinen Zeithorizont dafür, was Sie so einer Stadt wie Aachen
  sagen können? Das betrifft viele Pendler, betrifft die örtliche Wirtschaft. Die
  deutsch-niederländische Grenze ist eine, über die auch viele hin- und herfahren.
  Haben Sie dafür irgendeinen Zeitraum? Ich meine, es ist jetzt sehr vage, „wenn die
  Außengrenzen irgendwie besser geschützt sind“ zu sagen. Das könnte auch nie der
  Fall sein. Ja, wir kennen die Situation. Wir kennen sie auch an der niederländischen
  Grenze. Wir kennen sie an anderen Grenzen. Aber einen Zeithorizont kann ich Ihnen
  leider nicht nennen. Konkret nachgefragt: Das muss ja in Brüssel immer für drei
  Monate notifiziert werden, soweit ich weiß. Wie ist es denn aktuell? Wann müsste
  die Bundesregierung wieder erneut beantragen, die Grenzkontrollen für drei Monate
  weiterzuführen? Soviel ich weiß, sind das sechs Monate, und die aktuellen Binnengrenzkontrollen
  laufen bis zum September. Heißt das, Sie würden danach noch einmal weitere sechs
  Monate beantragen? Das kann ich jetzt noch nicht beantworten. Das wird erst kurzfristig
  entschieden. Es geht um das Verteidigungsabkommen zwischen Deutschland und Polen
  , das ja heute in Warschau unterzeichnet wird. Herr Müller, wie wichtig ist dieses
  Abkommen? Warum wurde so etwas nicht schon früher unterzeichnet? Es gibt ein Abkommen
  aus dem Jahr 2011, soweit ich weiß, auf dem wir aufbauen. Letzte Woche ‑ ich glaube,
  nach der Kabinettssitzung am Mittwoch ‑ hatte der stellvertretende Regierungssprecher
  hier dazu noch einmal ausführlicher erklärt, was dahintersteht. Nach der Zeichnung
  wird es heute auch noch eine Pressekonferenz vor Ort geben, und Bundesminister Pistorius
  und sein Amtskollege werden sich dort äußern. Deswegen möchte ich nicht alles vorwegnehmen.
  Grundsätzlich kann ich aber sagen, dass mit diesem Abkommen in allen Dimensionen
  die Zusammenarbeit mit Polen gestärkt und weiter ausgebaut wird. Mit Polen machen
  wir schon ganz viel; wir haben ein gemeinsames Corps ‑ Multinational Corps Northeast ‑,
  das sich größtenteils um das Baltikum und die NATO-Verteidigung kümmert. Wir haben
  gemeinsame Projekte zum Beispiel im Bereich Air Policing und Schutz der Ostflanke,
  in deren Rahmen wir auch mit Patriot-Systemen und Eurofightern drüben sind. Wir
  haben eine ganz enge Kooperation bei der Ausbildung. Zum Beispiel war bei mir im
  Lehrgang ein polnischer Stabsoffizier dabei. Genauso waren wir zum Beispiel in der
  Akademie in Warschau und haben dort Lehrgänge besucht. Das ist also eine Zusammenarbeit,
  die wir über die Jahre schon immer sehr intensiv geführt haben, und jetzt wollen
  wir diese Zusammenarbeit eben in gewissen Bereichen vertiefen. Dazu gehören die
  Bereiche Schutz der Ostsee, NATO Pipeline System, Logistik, Military Mobility. Bei
  Letzterem geht es um die Frage: Wie können Truppen, wenn wir sie brauchen, schneller
  durch Deutschland und Polen an die Ostflanke gelangen, und wie kann man das möglichst
  schnell und auch unkompliziert regeln? Das sind die Themen, die gerade kommen. Nebenbei
  geht es auch noch um die Themen Cyber und Weltraum, und es gibt diverse Konsultationsformate
  auf verschiedenen Ebenen. Da gibt es also ein ganzes Paket, das auf das Abkommen
  von 2011 gestrickt wird. Heute ist auch ein besonderer Tag; denn heute ist das 35-jährige
  Jubiläum des deutsch-polnischen Freundschaftsvertrag. Deswegen wurde dieser Tag
  auch gewählt, und ich würde gerne auf die Pressekonferenz verweisen, in der heute
  noch mehr Details kommen werden. An Frau Deschauer oder Herrn Meyer: Wie würden
  Sie die politischen Beziehungen zwischen Deutschland und Polen gerade beschreiben?
  Wie viel Luft ist noch nach oben? Die Beziehungen sind eng, vertrauensvoll und tief.
  Wir sind Partner im Herzen Europas, und das Ganze gestaltet sich auch dadurch heute
  sehr konkret. Neben der Unterzeichnung heute in Polen und neben der Pressekonferenz
  findet heute das Deutsch-Polnische Forum im Auswärtigen Amt statt. Das ist eine
  sehr wichtige Veranstaltung, an der sehr viele Vertreterinnen und Vertreter deutsch-polnischer
  Organisationen und aus Zivilgesellschaft und Politik teilnehmen werden. Es sind
  über 700 Gäste. Insbesondere ist der polnische Außenminister hier in Berlin und
  wird sich mit dem deutschen Außenminister austauschen; es wird auch eine Pressekonferenz
  geben. Teile der gerade parallel stattfindenden Veranstaltungen sind live und werden
  auch gestreamt. Insofern ist das ein sehr enges, wichtiges Verhältnis, das der deutschen
  Bundesregierung in all ihren Facetten am Herzen liegt und das wir eng pflegen. Das
  wäre jetzt ein sehr positives Bild; Sie sind ja sonst auch oft dialektischer, Frau
  Deschauer. Gibt es in dieser deutsch-polnischen Beziehung auch kritische Punkte,
  etwa was Nord Stream, ausstehende Auslieferungen etc. angeht? Gibt es auch Punkte,
  bei denen das Auswärtige Amt sagt ‑ wie die Kollegin auch schon meinte ‑, dass es
  noch Luft nach oben gäbe? Zu einem vertrauensvollen Austausch mit einem engen EU
  - und NATO-Partner gehört natürlich immer, dass man sich über alle Facetten der
  Beziehungen austauscht und alle Fragestellungen im vertraulichen Rahmen thematisiert.
  Ich glaube, das findet zu dieser Stunde statt, auch im bilateralen Gespräch des
  Außenministers mit seinem polnischen Amtskollegen. Insofern können Sie nachher,
  wenn Sie das möchten, im Livestream der Pressekonferenz lauschen und den beiden
  Außenministern zuhören, wie sie ihre Beziehungen bewerten. Eine kleine Rückblende:
  Vorhin gab es hier eine Pressekonferenz mit den neuen, immer noch besorgniserregenden
  Antisemitismuszahlen der RIAS , Dr. Klein und co. Die generelle Interpretation war:
  Die Judenfeindlichkeit ‑ wenn ich es einmal so bezeichne ‑ ist immer noch groß.
  Andere ‑ Antisemitismusforscher Moshe Zimmermann, Avi Primor etc. ‑ sagen: Nein,
  das alles muss man im Zusammenhang mit dem 7. Oktober 2023 und dem Regime oder der
  Regierung Netanjahu betrachten. Gibt es eine einhellige Interpretationsrichtung
  im Kabinett für diese Zahlen, die Sie ja sicherlich schon kennen? Ich kann kurz
  anfangen: Wir kennen die Zahlen. RIAS verwendet andere Erfassungskriterien als die
  PMK-Statistik, die wir hier vorgestellt haben. Der Anstieg der Antisemitismuszahlen
  ist aber auch bei uns weitgehend bekannt; insofern teilen wir die große Besorgnis.
  Es ging mir um den Blick auf die möglichen Ursachen, auch wenn man das natürlich
  nicht empirisch ermitteln kann. Sind es die jüngeren Vorgänge in Israel im Nahen
  Osten oder die in Deutschland anhaltende Judenfeindlichkeit, die es ja auch schon
  vor Herrn Netanjahu gab? Wenn sich die Frage an RIAS richtet, dann bitte ich Sie
  auch, sie dort zu stellen. Wir hatten zu unseren Zahlen ausführlich Auskunft gegeben.
  Jenseits der Frage nach der Interpretation der Zahlen möchte ich, weil das auch
  dieser Bundesregierung sehr wichtig ist, noch ergänzen, dass wir uns mit aller Kraft
  für den Kampf gegen Antisemitismus einsetzen, egal in welcher Form er auftritt.
  Antisemitismus ist inakzeptabel, und es gibt eine große Einigkeit innerhalb dieser
  Bundesregierung, gegen jede Form von Antisemitismus einzustehen und im Zweifel auch
  dagegen vorzugehen.'
