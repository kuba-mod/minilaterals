title: Im Kabinett beschlossen Digitales Deutschland vorantreiben
text: Die Bundesregierung will den Ausbau von Glasfaser- und Mobilfunknetzen noch
  effektiver vorantreiben. Leistungsfähige digitale Infrastrukturen sind die Grundlage
  für eine moderne und resiliente Gesellschaft, eine zukunfts- und wettbewerbsfähige
  deutsche Wirtschaft und wesentliche Bedingung für eine weitreichende digitale Transformation
  Deutschlands. Damit ist der Ausbau von Glasfaser- und Mobilfunknetzen von zentraler
  Bedeutung für die Leistungsfähigkeit der Infrastruktur, Innovationskraft und Wettbewerbsfähigkeit.
  Mit den durch das Kabinett beschlossenen Änderungen im Telekommunikationsgesetz
  (TKG) soll der flächendeckende Ausbau von Glasfaser- und Mobilfunknetzen noch effektiver
  vorangetrieben werden. Bereits im letzten Jahr wurden erste Weichen und Rahmenbedingungen
  für den Netzausbau gelegt und der Ausbau als überragendes öffentliches Interesse
  deklariert. Mit den aktuellen Änderungen werden vor allem europäische Vorgaben umgesetzt.
  Mit den jetzigen gesetzlichen Anpassungen wird der Ausbau der Glasfaser bis in jedes
  Gebäude und jede Wohnung sowie der Ausbau der Mobilfunknetze insgesamt vorangetrieben.
  Dabei helfen effizientere Verfahren, weniger Bürokratie und mehr Beschleunigung
  insgesamt. Dazu gehören Fristverkürzungen bei Genehmigungsverfahren, Stärkung genehmigungsfreier
  Maßnahmen und Vereinfachung durch ein optionales Anzeigeverfahren, wo bisher Genehmigungen
  erforderlich sind. Mehr Transparenz und verlässliche Rahmenbedingungen durch Änderungen
  im Bereich der Marktregulierung vereinfachen Verfahren. Mit den TKG -Änderungen
  2026 werden Vorgaben aus dem EU -Recht ins deutsche Recht umgesetzt, die Gigabit-Infrastruktur-
  und Roaming -Verordnung. Der Netzausbau ist für die digitale Infrastruktur in Deutschland
  unumgänglich. Deswegen hat die Bundesregierung im letzten Jahr das Thema „Telekommunikationsnetze“
  rechtlich als von „überragendem öffentlichen Interesse“ eingestuft, um die Vorhaben
  bei behördlichen Abwägungen zu priorisieren. Dadurch werden Vorhaben zum Netzausbau
  in Genehmigungsverfahren bei der Abwägung der unterschiedlichen Belange in der Regel
  Vorrang eingeräumt. Die Regelung ist bis Ende 2030 befristet, da bis dahin der flächendeckende
  Glasfaser- und Mobilfunkausbau erreicht werden kann. Der Ausbau von Glasfaser- und
  Mobilfunknetzen soll beschleunigt, besser koordiniert und mit messbaren Zielen transparenter
  gesteuert werden. Dazu haben die gemeinsamen Akteure – der Bund, die Länder, Kommunen
  und die Telekommunikationsbranche – am 8. Juni 2026 das Memorandum of Understanding
  „Bestes Netz für Deutschland“ unterzeichnet. Es regelt weitere Investitionen beim
  Netzausbau, um allein im Jahr 2026 rund 5,6 Millionen Glasfaseranschlüsse für die
  Bürgerinnen und Bürger Deutschlands bereitzustellen. Die gemeinsame Absichtserklärung
  schafft zugleich einen klaren Rahmen für die Fortführung des Dialogs.
