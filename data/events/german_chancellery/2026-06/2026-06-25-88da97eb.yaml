title: Rede von Bundeskanzler Merz anlässlich der Ukraine Recovery Conference 2026
  „F est an der Seite der Ukraine“
text: 'Russland werde den Krieg nicht gewinnen, betonte Bundeskanzler Merz bei der
  Ukraine Recovery Conference . „D ie Unterstützung Europas für Kyjiw ist unerschütterlich“
  , betonte Bundeskanzler Merz bei der Eröffnung der Ukraine Recovery Conference 2026
  (UCR) im polnischen Danzig. Die militärische und zivile Unterstützung für die Ukraine
  sind nach wie vor von grundlegender Bedeutung. „Sicherheit, Investitionen, Reformen,
  Menschen. Das sind die vier Bausteine für die wirtschaftliche Erholung der Ukraine
  “, sagte der Bundeskanzler. Gemeinsam mit seinen Partnern sei Deutschland bereit,
  die Ukraine in all diesen vier Bereichen konkret zu unterstützen. „D ie Ukraine
  ist in einer neuen Position der Stärke “, so Merz. An Russland sendete der Kanzler
  eine klare Botschaft: Russland werde diesen Krieg nicht gewinnen. Man sei bereit,
  den Druck auf die bereits angeschlagene russische Wirtschaft zu erhöhen. „ Die Zeit
  ist gekommen, um in Verhandlungen einzutreten, die Frontlinie einzufrieren und das
  Töten zu beenden “, forderte der Bundeskanzler. Wiederaufbau der Ukraine: Die durch
  den russischen Angriffskrieg verursachten Verluste und Schäden sind immens und mit
  öffentlichen Mitteln allein nicht zu bewältigen. Im Mittelpunkt der URC 2026 stehen
  die weitere internationale Unterstützung der Ukraine und die Mobilisierung von privaten
  Investitionen für den Wiederaufbau. Öffentliche und private Akteure müssen hier
  eng zusammenarbeiten. Neben Bundeskanzler Merz nahm auch Entwicklungsministerin
  Alabali Radovan an der Konferenz teil. Auch sie warb für internationale Investitionen
  in den Wiederaufbau der Ukraine. Sehr geehrter Herr Ministerpräsident, lieber Donald,
  sehr geehrte Frau Ministerpräsidentin Swyrydenko aus der Ukraine, sehr geehrte Präsidentinnen
  und Präsidenten, Ministerpräsidentinnen und Ministerpräsidenten, Exzellenzen, meine
  Damen und Herren, liebe Freunde der Ukraine, die militärische und zivile Unterstützung
  für die Ukraine ist nach wie vor von grundlegender Bedeutung. Lugano, London, Berlin,
  Rom und nun heute hier in Danzig – die Ukraine Recovery Conference hat sich inzwischen
  als das große internationale Treffen für die wirtschaftliche Erholung der Ukraine
  etabliert. Deshalb freue ich mich, heute mit Ihnen hier zu sein – als ein Zeichen
  unseres unerschütterlichen Engagements. Meine Damen und Herren, liebe Freunde, es
  gibt noch einen weiteren Aspekt, der die diesjährige Konferenz insbesondere für
  einen deutschen Bundeskanzler zu etwas Besonderem macht. Donald, Sie haben es uns
  gerade in Erinnerung gerufen: An diesem Ort, nur wenige Minuten von hier entfernt,
  hat vor mehr als 87 Jahren der Zweite Weltkrieg begonnen. Vor 35 Jahren haben Deutschland
  und Polen den Vertrag über gute Nachbarschaft unterzeichnet. Dieses Jubiläum ist
  ein Meilenstein der deutsch-polnischen Beziehungen. Lieber Donald, seit 35 Jahren
  stellen Deutsche und Polen eines unter Beweis: Selbst nach den abscheulichen Verbrechen,
  die die Deutschen zwischen 1939 und 1945 in Polen und an der polnischen Bevölkerung
  begangen haben, sind Frieden, gute Nachbarschaft und Freundschaft möglich. Ich bin
  dem polnischen Volk hierfür zutiefst dankbar. Und heute zeigt sich folgendes Gesamtbild:
  Als Europäer stehen wir fest zusammen, nicht nur, um unsere Sicherheit oder den
  Wohlstand auf unserem Kontinent zu verteidigen. Wir stehen fest zusammen, um die
  Freiheit auf unserem Kontinent zu verteidigen. Und deshalb stehen wir fest an der
  Seite der Ukraine. Und, meine lieben Freunde und Kolleginnen und Kollegen, gerade
  erleben wir eine neue Dynamik. Vom G7 -Gipfel, dem Europäischen Rat letzte Woche
  und dem gestrigen E5 -Treffen in Berlin gingen starke Signale der europäischen und
  transatlantischen Einigkeit und Unterstützung für die Ukraine aus. Die Ukraine mit
  ihren mutigen Bürgerinnen und Bürgern wird sich als starke und souveräne Nation
  und als zukünftiges Mitglied der europäischen Familie behaupten. Zu Beginn dieses
  Jahres, in einem der kältesten Winter seit Langem, stand der ukrainische Energiesektor
  besonders unter Druck, da Russland schonungslos Heizanlagen und Kraftwerke angriff.
  Um dem entgegenzuwirken, haben wir unsere Anstrengungen intensiviert, was auch erhebliche
  zusätzliche Beiträge für den „ Ukraine Energy Support Fund “ und die Bereitstellung
  von Blockheizkraftwerken umfasst. Ich sage das, weil wir jetzt handeln müssen, um
  die Ukraine auf den nächsten Winter vorzubereiten. Meine Damen und Herren, liebe
  Freunde, verehrte Kolleginnen und Kollegen, lassen Sie mich vier Punkte nennen,
  bei denen wir gemeinsam spürbare Fortschritte machen und Europa seine Zusagen gegenüber
  der Ukraine mit Leben füllt. Erstens: Sicherheit. Sicherheit ist die Grundlage für
  alles. Wiederaufbau, Investitionen und eine nachhaltige Entwicklung sind langfristig
  nur möglich, wenn Sicherheit herrscht. Ich möchte Polen dafür danken, dass den Themen
  Sicherheit und Verteidigung auf der diesjährigen Konferenz hier in Danzig besondere
  Aufmerksamkeit gewidmet wird. Unsere militärische Unterstützung für die Ukraine
  bleibt weiter intensiv: Wir liefern kontinuierlich moderne Flugabwehrsysteme, die
  dabei helfen, ukrainische Städte und ukrainische Infrastruktur vor russischen Angriffen
  zu schützen. Es entstehen deutsch-ukrainische Joint Ventures, die eine zentrale
  Rolle in Bezug auf bemerkenswerte und beeindruckende innovative Technologien und
  die Stärkung unserer gemeinsamen Sicherheit spielen. Indem wir die Sicherheit der
  Ukraine stärken, stärken wir die Sicherheit Europas. Zweitens: Investitionen. In
  Rom haben wir die Idee eines Europäischen Flaggschiff-Fonds für den Wiederaufbau
  der Ukraine verkündet. Hier in Danzig werden wir dieses Versprechen heute einlösen.
  Der Fonds bringt Deutschland, Polen, Italien und Frankreich zusammen. Wir wollen
  substanzielle private Investitionsmittel für strategische Sektoren der Ukraine mobilisieren:
  Infrastruktur, Energie, Industrie, Logistik. Der Grund dafür ist ganz einfach: Staatliche
  Förderung allein wird bei Weitem nicht ausreichen, um ein Land wiederaufzubauen,
  das so immense Zerstörungen erlitten hat. Mit einem ersten öffentlichen Paket von
  bis zu 220 Millionen Euro schaffen wir das notwendige Vertrauen und die Mechanismen
  zur Risikoteilung, die erforderlich sind, damit sich private Investoren jetzt engagieren.
  Indem wir heute investieren und langfristig Kapital zusichern, sendet Europa eine
  klare Botschaft: Wir glauben fest an die Zukunft der Ukraine in der europäischen
  Familie! Drittens: Reformen. Investitionen sind unabdingbar für die wirtschaftliche
  Erholung, und sie erfordern Vertrauen. Vertrauen wiederum hängt von starken Institutionen
  ab. Aus diesem Grund sind die Reformen, die im Zusammenhang mit dem EU -Beitrittsprozess
  der Ukraine vorgenommen werden, so wichtig. Kontinuierliche Fortschritte bei der
  Korruptionsbekämpfung und der Stärkung der Rechtsstaatlichkeit sind unerlässlich,
  um das Vertrauen von Bürgerinnen und Bürgern, internationalen Partnern und Investoren
  gleichermaßen zu wahren. Dass die deutsche Wirtschaft hier auf der Ukraine Recovery
  Conference 2026 so stark vertreten ist, zeigt, dass Deutschland und der deutsche
  Privatsektor bereit sind, zu wirtschaftlicher Erholung und Wohlstand beizutragen.
  Und schließlich viertens: die Menschen. Vor zwei Jahren, auf der Wiederaufbaukonferenz
  in Berlin, haben wir die Fachkräfte-Allianz für die Ukraine ins Leben gerufen –
  eine einzigartige, von vielen Akteuren getragene Plattform für die Ausbildung von
  Ukrainerinnen und Ukrainern. Seitdem konnte die Allianz die beeindruckende Summe
  von 1,2 Milliarden Euro für laufende und künftige Berufsbildungsinitiativen mobilisieren.
  Dieses Projekt spiegelt unsere Überzeugung wider, dass es bei einem Wiederaufbau
  nicht nur darum geht, Zerstörtes neu zu errichten, sondern auch darum, in die Menschen
  zu investieren, die die Zukunft der Ukraine gestalten werden. Also meine Damen und
  Herren, Sicherheit. Investitionen. Reformen. Menschen. Das sind die vier Bausteine
  für die wirtschaftliche Erholung der Ukraine. Gemeinsam mit unseren Partnern sind
  wir bereit, die Ukraine in allen vier Bereichen zu unterstützen. Das heutige Treffen
  in Danzig stellt einen Moment der Hoffnung dar. Die Ukraine ist in einer neuen Position
  der Stärke. In Moskau sickert langsam die Erkenntnis durch: Russland wir diesen
  Krieg nicht gewinnen. Meine Damen und Herren, die Unterstützung Europas für Kyjiw
  ist unerschütterlich. Wir sind entschlossen, den Druck auf die ohnehin schon belastete
  Wirtschaft Russlands zu erhöhen. Seit dem G7 -Gipfel in Évian herrscht ein neues
  Gefühl der transatlantischen Einigkeit. Heute senden wir eine klare Botschaft an
  Russland: Die Zeit ist gekommen, um in Verhandlungen einzutreten, die Frontlinie
  einzufrieren und das Töten zu beenden. Ich möchte erneut der polnischen Regierung
  und Ihnen persönlich, lieber Donald, ebenso wie allen Anwesenden hier im Saal, für
  die Ausrichtung dieser wichtigen Konferenz danken. Und Ihnen allen: Danke, dass
  sie an der Seite der Ukraine stehen. Vielen Dank!'
