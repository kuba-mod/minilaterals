title: Pressestatements von Kanzler Merz und dem Präsidenten der Republik Senegal,
  Faye Deutschland bleibt verlässlicher Partner
text: 'Bundeskanzler Merz empfing den Präsidenten der Republik Senegal Faye mit militärischen
  Ehren im Bundeskanzleramt. Deutschland und Senegal pflegen vielfältige und gute
  Beziehungen, etwa in den Bereichen Entwicklungszusammenarbeit und Wirtschaft. Das
  hat Bundeskanzler Friedrich Merz beim Besuch des Präsidenten der Republik Senegal,
  Bassirou Diomaye Faye , betont. Der wirtschaftliche Austausch zwischen Deutschland
  und Senegal habe sich „in den letzten Jahren erfreulich positiv entwickelt“, machte
  Merz bei seinem Pressestatement vor der Unterredung mit Faye deutlich. Ihn hat der
  Kanzler im Bundeskanzleramt mit militärischen Ehren empfangen. Senegals Präsident
  Faye hatte sich für verschiedene Termine in Deutschland aufgehalten. Er nahm unter
  anderem gemeinsam mit Bundesentwicklungsministerin Alabali Radovan am Deutsch-Senegalesischen
  Wirtschaftstag in Berlin teil. Es gebe immer mehr deutsche Unternehmen, die am senegalesischen
  Markt aktiv werden möchten. „Wir wollen das als Bundesregierung unterstützen“, bekräftigte
  der Bundeskanzler und verwies auf die Instrumente der Außenwirtschaftsförderung
  und der Entwicklungszusammenarbeit. Insbesondere die junge Bevölkerung des Senegals
  brauche Perspektiven. „Wir fördern Investitionen und Ausbildung für zukunftsträchtige
  Berufe“, so Merz. Der Bundeskanzler hob daneben auch das Engagement des Senegals
  für die Sicherheit und Stabilität im Sahel hervor. Er bedankte sich bei seinem Gast,
  „dass Sie sich als regionaler Vermittler für Dialog, Integration und die Stärkung
  der Regionalorganisation ECOWAS einsetzen.“ Deutschland und Senegal pflegen eine
  Sicherheitspartnerschaft, die auch künftig intensiv fortgesetzt werden solle, sagte
  Merz. Deutschland stehe als verlässlicher Partner zur Seite. Meine Damen und Herren,
  herzlich willkommen! Ich freue mich, dass ich heute im Kanzleramt in Berlin den
  Präsidenten der Republik Senegal herzlich begrüßen darf. Präsident Faye ist zum
  ersten Mal in Berlin, und ich freue mich sehr, dass er zu Besuch ist. Sein Programm
  hier in Deutschland – er hat schon Gespräche geführt – hat einen Fokus, und wir
  werden weiter über Wirtschaft und Investitionen sprechen. Der wirtschaftliche Austausch
  zwischen Deutschland und Senegal hat sich in den letzten Jahren erfreulich positiv
  entwickelt. Es gibt immer mehr deutsche Unternehmen, die am senegalesischen Markt
  aktiv werden wollen. Wir wollen das als Bundesregierung unterstützen. Senegal ist
  ein dynamisches Land mit einer sehr jungen Bevölkerung. Diese Bevölkerung braucht
  Perspektiven, und hier setzen unsere Instrumente der Außenwirtschaftsförderung und
  der Entwicklungszusammenarbeit an. Wir fördern Investitionen und Ausbildung für
  zukunftsträchtige Berufe. So profitieren beide Seiten gleichermaßen von der Kooperation.
  Ich verrate kein Geheimnis, wenn ich sage: Investitionen brauchen stabile Rahmenbedingungen.
  Um dieses Ziel zu erreichen, ist der Compact with Africa gegründet worden, den Deutschland
  2017 ins Leben gerufen hat. Senegal ist Mitglied der ersten Stunde. Ich begrüße
  daher die bisherigen Reformen der senegalesischen Regierung, etwa das neue Investitionsgesetz.
  Gleichzeitig möchte ich Sie zu weiteren Schritten in dieser Richtung ermutigen;
  denn, meine Damen und Herren, Stabilität ist auch ein gutes Stichwort für das zweite
  Thema, das uns beschäftigt. Senegal befindet sich in unruhiger Nachbarschaft. Instabilität,
  organisierte Kriminalität, islamistisch motivierte Anschläge: Das kennzeichnet die
  Region leider immer noch zu sehr. Im Sahel sterben weltweit die meisten Menschen
  durch Terroranschläge. Daher begrüße ich sehr, dass der Senegal und Sie persönlich,
  Herr Präsident, sich so intensiv für Sicherheit und Stabilität im Sahel in Ihrer
  unmittelbaren Nachbarschaft engagieren; denn ein stabiler Sahel liegt auch in unserem
  nationalen deutschen Interesse. Die prekäre Sicherheitslage dort verstärkt Armut
  und treibt Menschen in die Flucht. Die Menschen im Sahel brauchen dagegen eine Perspektive
  für ein Leben in Frieden. Daher danken wir Ihnen, dass Sie sich als regionaler Vermittler
  für Dialog, Integration und die Stärkung der Regionalorganisation ECOWAS einsetzen.
  Unsere beiden Länder pflegen seit Langem auch eine Sicherheitspartnerschaft. Diese
  vertrauensvolle Zusammenarbeit wollen wir auch künftig intensiv fortsetzen. Mit
  Deutschland, Herr Präsident, steht Ihnen ein verlässlicher Partner zur Seite. Ich
  freue mich deswegen auf den Austausch mit Ihnen und heiße Sie noch einmal sehr herzlich
  in Berlin willkommen. Vielen Dank! Sehr geehrter Herr Bundeskanzler, zunächst einmal
  möchte ich Ihnen für den Empfang hier danken und für die Aufmerksamkeit, die uns
  zuteil geworden ist, seitdem wir in Deutschland angekommen sind. Das spiegelt auch
  die Qualität der Beziehungen zwischen dem Senegal und Deutschland wider. Wir haben
  eine lange Tradition der Freundschaft und der engen und vertrauensvollen Zusammenarbeit.
  Wir sind sehr zufrieden mit der Qualität unserer bilateralen Zusammenarbeit, die
  auf gemeinsamen Werten von Frieden, Demokratie und Achtung der Menschenrechte sowie
  des Völkerrechts aufbaut. Diese Zusammenarbeit umfasst heute vor allem die Bereiche
  Gesundheit, Förderung von erneuerbaren Energien – ganz besonders der Solarenergie
  –, Energieeffizienz und Berufsausbildung, mit mehreren Projekten und Programmen,
  die derzeit laufen. Darüber hinaus schätzt der Senegal die Unterstützung Deutschlands
  bei der Bewältigung von Gesundheitsfragen und der Coronapandemie sowie im Rahmen
  der Umsetzung des Impfstoffzentrums sehr. Auf Grundlage der Compact-with-Africa
  -Initiative, die Sie gerade erwähnt haben, haben wir auch entsprechenden Maßnahmen
  beschlossen, um das Interesse der deutschen Unternehmen im Senegal anzuziehen. Das
  heißt, dieser Besuch ist die Gelegenheit, unserer Partnerschaft neue Dynamik zu
  verleihen, insbesondere in den prioritären Bereichen unserer nationalen Agenda,
  etwa im Hinblick auf den Wandel zur Agenda 2050 für den Senegal. Wir werden über
  die unterschiedlichen Wege und Möglichkeiten sprechen, wie wir unsere wirtschaftlichen
  und Handelsbeziehungen durch Investitionen noch weiter stärken können, indem wir
  noch stärker die Privatwirtschaft einbeziehen. Die deutschen Unternehmen haben ihren
  Platz im Senegal – umso mehr, da wir die Qualität der Produkte und Dienstleistungen
  aus Deutschland schätzen. Unser Gespräch wird sich auch um andere prioritäre Themen
  drehen, etwa die Situation im Sahel und in Afrika. Dort sind unsere beiden Länder
  aktiv im Kampf gegen den Terrorismus. Wir sind uns der Tatsache bewusst, dass Stabilität
  und Frieden unserer beiden Kontinente eng miteinander verbunden sind. Über Afrika
  hinaus sind Sicherheit und Frieden in der Welt angesichts von Spannungsherden und
  Extremismus in unterschiedlichen Weltregionen – im Nahen und Mittleren Osten, Amerika
  und Asien – ein Thema. Es geht um Deeskalation, um Toleranz und um ein Ende von
  Feindseligkeiten. Stattdessen möchten wir Verhandlungslösungen für Krisen finden –
  für ein besseres weltweites Gleichgewicht und für eine bessere und offenere Regierungsführung,
  die inklusiver ist. Zum Schluss möchte ich Ihnen, Herr Bundeskanzler Merz, noch
  einmal für Ihre Einladung danken. Das sind die Einführungsworte, die ich hier mit
  Ihnen teilen wollte. Vielen Dank!'
