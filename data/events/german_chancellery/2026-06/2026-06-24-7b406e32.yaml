title: Bundeskanzler Merz gratuliert dem Premierminister der Republik Cabo Verde,
  Francisco Carvalho
text: Sehr geehrter Herr Premierminister, zu Ihrer Ernennung zum Premierminister der
  Republik Cabo Verde gratuliere ich Ihnen herzlich. Deutschland und Cabo Verde sind
  durch vertrauensvolle Beziehungen und geteilte Werte verbunden. Für die vor Ihnen
  liegenden Aufgaben wünsche ich Ihnen Erfolg und gutes Gelingen. Ihr Friedrich Merz
  Bundeskanzler der Bundesrepublik Deutschland
