title: Speech by Friedrich Merz, Chancellor of the Federal Republic of Germany at
  the Ukraine Recovery Conference on 25. June 2026 in Gdańsk
text: 'Dear Primeminister, Dear Donald, Dear Primeminister Svyrydenko from Ukraine,
  Presidents and Prime Ministers, Excellencies, Ladies and gentlemen, Dear Friends
  of Ukraine! Military and civilian support for Ukraine remains fundamentally important.
  From Lugano to London, Berlin, Rome and now and today Gdańsk, the Ukraine Recovery
  Conference has become the major international gathering on recovery for Ukraine.
  That is why I am pleased to be here with you today – as a sign of our unwavering
  commitment. Ladies and gentlemen, dear friends: There is another dimension which
  makes this year’s Conference special for a German chancellor in specific: Donald,
  you reminded us: More than 87 years ago at this place - not far from here,a few
  minutes –World War II began. Thirty-five years ago, Germany and Poland signed their
  Treaty of Good Neighbourship. This anniversary is a landmark of German-Polish relations.
  Dear Donald, for 35 years, Poles and Germans have proven: Even after the outrageous
  crimes Germans committed in Poland and to the Polish people between 1939 and 1945,
  peace, good neighbourhood and friendship are possible. I am deeply grateful to the
  Polish people for this. And today, the big picture is the following: As Europeans,
  we stand shoulder to shoulder not just to defend security or defend prosperity on
  our continent. We are standing shoulder to shoulder to defend freedom on our continent.
  And that is why we are standing shoulder to shoulder with Ukraine. And dear friends
  and colleagues, in these days we are seeing a new dynamic. The G7 Summit, the European
  Council last week and the E5 meeting in Berlin yesterday have sent strong signals
  of European and transatlantic unity and support for Ukraine. Ukraine and its brave
  people will prevail as a strong and sovereign nation and as a future member of the
  European family! At the beginning of this year, during one of the coldest winters
  in a long time, the Ukrainian energy sector faced particular pressure as Russia
  relentlessly attacked heating and power plants. To counter this, we intensified
  our efforts – including significant additional contributions to the Ukraine Energy
  Support Fund and the provision of combined heat and power units. I’m saying this
  because we must act now to prepare Ukraine for next winter. Ladies and gentlemen,
  friends and colleagues, Today, Germany is Ukraine’s biggest bilateral supporter.
  Since 2022, we have provided Kyiv with 41 billion Euros in bilateral civilian support. During
  our intergovernmental consultations in April, we elevated our relationship to a
  strategic partnership. Allow me to highlight four areas where we are making tangible
  progress together and where Europe is delivering for Ukraine. Security is the foundation
  of everything. Reconstruction, investment and sustainable development are only possible
  in the long term with security. I would like to commend Poland for giving security
  and defence a prominent place at this year’s Conference here in Gdansk. That is
  why our military support to Ukraine remains strong: we are constantly delivering
  modern air defence systems which help to protect Ukraine’s cities and infrastructure
  from Russian attacks. We are seeing new German-Ukrainian joint ventures appear which
  play a key role in remarkable und impressive innovative technologies and enhancing
  our common security. To strengthen Ukraine’s security is to strengthen Europe’s
  security. In Rome, we announced the idea of a European Flagship Fund for the Reconstruction
  of Ukraine. Today, here in Gdańsk, we are delivering on what we promised. The Fund
  brings together Germany, Poland, Italy and France. We want to mobilise substantial
  private investment in strategic sectors of Ukraine’s economy: infrastructure, energy,
  industry, logistics. The reason behind that is quite simple: Public funding alone
  will never be enough to rebuild a country that has suffered such massive destruction.
  With an initial public package of up to 220 million euros, we are creating the confidence
  and the risk-sharing mechanism that private investors need to engage now. By investing
  now and committing long-term capital, Europe is sending a clear message: we believe
  in Ukraine’s future within the European family! Investments are crucial for recovery
  and they require confidence. And confidence depends on strong institutions. That
  is why the reforms – undertaken in the context of Ukraine’s EU accession process
  – are so important. Continued progress in the fight against corruption and in strengthening
  the rule of law is essential for maintaining the trust of citizens, international
  partners and investors alike. The strong German business presence at the URC 2026 here
  shows that Germany and its private sector are ready to contribute to recovery and
  prosperity. Two years ago, at the URC in Berlin, we created the Skills Alliance
  for Ukraine – a unique multi-stakeholder platform dedicated to training Ukrainians.
  Since then, the Alliance has mobilised an impressive 1.2 billion euros for current
  and upcoming vocational training initiatives. This initiative reflects our conviction
  that reconstruction is not only about rebuilding what was destroyed, but also about
  investing in the people who will shape Ukraine’s future. Security. Investment. Reforms.
  People. These are the building blocks for Ukraine’s recovery. Together with our
  partners, we stand ready to support Ukraine in all four areas. Today’s meeting in
  Gdańsk marks a moment of hope. Ukraine is in a new position of strength. It is beginning
  to dawn on Moscow: Russia will not win this war. Ladies and gentlemen, Europe’s
  support to Kyiv is unwavering. We are determined to increase pressure on Russia’s
  already strained economy. Since Évian - the G7 - there is a new sense of transatlantic
  unity. Today, we are conveying a clear message to Russia: Time has come to enter
  into negotiations, to freeze the frontline and to end the killing. Thanks to the
  Polish Government again and to you in person, Donald, and to all the people here
  in this room for hosting this important conference. And thanks to all of you for
  standing with Ukraine. Many thanks!'
