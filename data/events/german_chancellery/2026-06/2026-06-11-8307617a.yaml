title: Rede von Bundeskanzler Merz bei der Eröffnung der ILA 2026 Europa als Kontinent
  der Luftfahrt stärken
text: 'Di e Luft- und Raumfahrtindustrie sichere auch „unsere Souveränität und unsere
  Fähigkeit zur Landes- und Bündnisverteidigung“ , sagte Kanzler Merz zur Eröffnung
  der ILA . Bei seiner Rede zur Eröffnung der Internationalen Luft- und Raumfahrtausstellung
  (ILA) in Berlin stellte Bundeskanzler Friedrich Merz unter anderem die neue Luftfahrtstrategie
  der Bundesregierung vor. „ Im Zentrum unserer Strategie stehen Wettbewerbsfähigkeit
  und Innovation in einer der Zukunftsbranchen unseres Landes “, betonte der Kanzler.
  Schönefeld, 10. Juni 2026: Bundeskanzler Friedrich Merz hat die Internationale Luft-
  und Raumfahrtmesse (ILA) am Flughafen Berlin Brandenburg eröffnet. Mehr als 750
  Aussteller aus 37 Ländern präsentieren auf der Messe Zukunftstechnologien aus den
  Bereichen Luftfahrt, Weltraum-Sicherheit und Verteidigung: Aviation , Space und
  Defence . Erwartet werden zur Ausstellung rund 100.000 Teilnehmende sowie rund 330
  Delegationen aus mehr als 60 Ländern. Unter dem Motto „ Pioneering Aerospace “ ist
  die ILA erneut internationaler Treffpunkt der Luft- und Raumfahrtindustrie. Bei
  der Eröffnung stellte Kanzler Merz die neue Luftfahrtstrategie der Bundesregierung
  vor. „Im Zentrum unserer Strategie stehen Wettbewerbsfähigkeit und Innovation in
  einer der Zukunftsbranchen unseres Landes“, betonte Bundeskanzler Merz in seiner
  Eröffnungsrede. Die neue Luftfahrtstrategie ziele darauf ab, Deutschland als einen
  starken Luftfahrtstandort sichern und weiterentwickeln zu wollen, so der Kanzler.
  „Die Luft- und Raumfahrtindustrie ist eine strategische Schlüsselbranche“, sagte
  Kanzler Merz. Der Erfolg beruhe auf Innovationen, die auch immer „Souveränität,
  Sicherheit und Zukunftsfähigkeit“ bedeuten, betonte der Kanzler. „Unsere Luft- und
  Raumfahrtindustrie sichert nicht nur Innovation und Wirtschaftskraft. Sie sichert
  eben auch unsere Souveränität und unsere Fähigkeit zur Landes- und Bündnisverteidigung“,
  resümierte Kanzler Merz. Schönefeld, 10. Juni 2026: Bundeskanzler Friedrich Merz
  hat die Internationale Luft- und Raumfahrtmesse (ILA) am Flughafen Berlin Brandenburg
  eröffnet. Mehr als 750 Aussteller aus 37 Ländern präsentieren auf der Messe Zukunftstechnologien
  aus den Bereichen Luftfahrt, Weltraum-Sicherheit und Verteidigung: Aviation , Space
  und Defence . Erwartet werden zur Ausstellung rund 100.000 Teilnehmende sowie rund
  330 Delegationen aus mehr als 60 Ländern. Unter dem Motto „ Pioneering Aerospace
  “ ist die ILA erneut internationaler Treffpunkt der Luft- und Raumfahrtindustrie.
  Bei der Eröffnung stellte Kanzler Merz die neue Luftfahrtstrategie der Bundesregierung
  vor. „Im Zentrum unserer Strategie stehen Wettbewerbsfähigkeit und Innovation in
  einer der Zukunftsbranchen unseres Landes“, betonte Bundeskanzler Merz in seiner
  Eröffnungsrede. Die neue Luftfahrtstrategie ziele darauf ab, Deutschland als einen
  starken Luftfahrtstandort sichern und weiterentwickeln zu wollen, so der Kanzler.
  „Die Luft- und Raumfahrtindustrie ist eine strategische Schlüsselbranche“, sagte
  Kanzler Merz. Der Erfolg beruhe auf Innovationen, die auch immer „Souveränität,
  Sicherheit und Zukunftsfähigkeit“ bedeuten, betonte der Kanzler. „Unsere Luft- und
  Raumfahrtindustrie sichert nicht nur Innovation und Wirtschaftskraft. Sie sichert
  eben auch unsere Souveränität und unsere Fähigkeit zur Landes- und Bündnisverteidigung“,
  resümierte Kanzler Merz. Sehr geehrter Herr Präsident des BDLI , lieber Herr Schöllhorn,
  sehr geehrter Herr Ministerpräsident Woidke, liebe Kolleginnen und Kollegen aus
  dem Bundeskabinett, Doro Bär und Patrick Schnieder, liebe Kolleginnen und Kollegen
  aus dem Deutschen Bundestag, Herr Generalleutnant Holger Neumann für die Bundeswehr,
  herzlichen Dank für die sehr freundliche Begrüßung auf der ILA 2026 am heutigen
  Tag! Es ist in der Tat so: Doro Bär, Patrick Schnieder und ich, wir kommen direkt
  aus der Sitzung des Bundeskabinetts, und wir haben heute Morgen in der Tat die neue
  Luftfahrtstrategie der Bundesregierung beschlossen. Deutschland war immer ein Pionier
  der Luftfahrt. Unsere letzte Luftfahrtstrategie stammt aus dem Jahr 2014. Unsere
  neue Luftfahrtstrategie zielt darauf ab, dass wir Deutschland nicht nur als einen
  starken Luftfahrtstandort sichern und weiterentwickeln. Im Zentrum unserer Strategie
  stehen Wettbewerbsfähigkeit und Innovation in einer der Zukunftsbranchen unseres
  Landes, damit wir in Deutschland und – Sie haben es richtigerweise gesagt, Herr
  Präsident, Herr Schöllhorn – Europa weltweit führende Luftfahrtnationen und ein
  Kontinent der Luftfahrt bleiben können. Wir denken dabei Luftverkehr, Luftfahrtindustrie
  und militärische Luftfahrt zusammen, und wir identifizieren Handlungsfelder und
  benennen die wichtigsten Maßnahmen. Die Luftfahrtstrategie ist ein Signal an Sie
  alle, meine Damen und Herren aus dieser Industrie. Ihre Branche ist wichtig für
  Deutschland und für Europa. Die Luft- und Raumfahrt ist eine strategische Schlüsselbranche.
  Trotz der aktuell krisenhaften Zeiten, trotz der sonst schwachen Konjunktur erwirtschaften
  Sie Rekordumsätze und verzeichnen einen Beschäftigungshöchststand. Herzlichen Dank
  an Sie alle, meine Damen und Herren, dass Sie das in Ihren Unternehmen möglich machen.
  Diese Erfolge beruhen vor allem auf einem: Sie beruhen auf Innovationen, und diese
  Innovationen stehen auch im Zentrum der diesjährigen ILA , die ich heute zum ersten
  Mal als Bundeskanzler eröffnen darf. Innovationen bedeuten auch immer Souveränität,
  Sicherheit und Zukunftsfähigkeit. Meine Damen und Herren, schon hier auf dem Rollfeld
  hinter mir – Sie sehen es – zeigt sich mit dem A320neo von Air bus Deutschlands
  und Europas Stärke als global führender Standort des zivilen Flugzeugbaus besonders
  eindrucksvoll: hohe Treibstoffeffizienz, moderne Aerodynamik, innovative Triebwerke,
  zukunftsweisende Kabinenkonzepte. Die A320-Familie, und auch das haben Sie gerade
  gesagt, steht für Wertschöpfung und Beschäftigung in Deutschland und in Europa,
  bei Air bus und bei den sehr vielen Zulieferern, die auch heute hier vertreten sind.
  Ich will es auf einen Nenner bringen: Deutschland will die europäische Zukunftsgeschichte
  und Erfolgsgeschichte von Air bus fortschreiben. Das Kurz- und Mittelstreckenflugzeug
  der nächsten Generation, das Next-Generation-Single-Aisle -Flugzeug, sollte auch
  wieder in Deutschland mit Programmverantwortung in Hamburg gebaut werden. Meine
  Damen und Herren, wir wollen auch dafür am Luftfahrtforschungsprogramm festhalten
  und die Möglichkeiten der Hightech Agenda nutzen. Die Luftfahrtstrategie weist genauso
  in diese Zukunft: Digitalisierung und Dekarbonisierung, eine emissions- und lärmarme
  Luftfahrt mit klimaneutralen Kraftstoffen sowie elektrischen und auf Wasserstoff
  basierenden Antrieben. Die Luftfahrtindustrie ist eben eine Innovationsindustrie,
  und sie ist eine Wachstumsbranche wie zurzeit keine andere in Deutschland und in
  Europa. Ich wiederhole die Schätzungen, die ich schon beim 100. Geburtstag der Lufthansa
  in Frankfurt vor einigen Wochen zitiert habe: Weltweit wird sich der Luftverkehr
  bis zum Jahr 2050 noch einmal verdoppeln. In den kommenden 20 Jahren werden auf
  der Welt mehr als 40.000 neue Flugzeuge gebraucht. Meine Damen und Herren, und trotzdem,
  trotz dieser Wachstumsperspektive steht die Luftverkehrswirtschaft vor großen Herausforderungen.
  Deswegen haben wir schon im vergangenen November ein umfassendes Maßnahmenpaket
  geschnürt. In aller Kürze: Die E-Kerosin-Quote haben wir gestrichen, die Flugsicherungsgebühr
  haben wir gesenkt, die letzte Erhöhung der Luftverkehrssteuer haben wir zurückgenommen,
  und wir übernehmen jetzt auch die Flugsicherungskosten für die deutschen Regionalflughäfen.
  Das Paket wird den Luftverkehr aus Deutschland insgesamt um rund eine halbe Milliarde
  Euro, um rund 500 Millionen Euro entlasten. Wir werden die Lage weiter eng beobachten
  und prüfen, welche weitergehenden Schritte nötig und möglich sind. Mir ist wichtig,
  dass die Maßnahmen der Luftverkehrsstrategie, die wir heute Morgen beschlossen haben,
  jetzt auch wirklich umgesetzt werden, und das werden wir auch mit einer Steuerungsgruppe
  aus der Bundesregierung heraus nachhalten. Meine Damen und Herren, unsere Luft-
  und Raumfahrtindustrie sichert nicht nur Innovation und Wirtschaftskraft. Sie sichert
  eben auch unsere Souveränität und unsere Fähigkeit zur Landes- und Bündnisverteidigung.
  Wir haben in den letzten Monaten den Rahmen dafür geschaffen, in die notwendige
  Verteidigungsfähigkeit Deutschlands und Europas zu investieren. Gerade in der Luft-
  und Raumfahrt müssen wir Schlüsselkompetenzen und Zukunftstechnologien stärken.
  Die Luftwaffe, die Bundeswehr, fliegt den Eurofighter , in Kürze auch über uns und
  hier über dem Messegelände. Der Eurofighter ist ein erfolgreiches Beispiel für europäische
  Rüstungskooperationen, die wir gemeinsam betreiben, weiterentwickeln und auch exportieren.
  Deswegen erlauben Sie mir, Herr Schöllhorn, auch an dieser Stelle noch einmal ein
  Wort zu FCAS . Präsident Macron und ich haben es uns in dieser Frage eines deutsch-französischen
  Kampfflugzeuges wirklich nicht leicht gemacht. Über Monate haben wir zusammen mehrere
  Anläufe unternommen, um die beteiligten Unternehmen zu einer Einigung zu bewegen,
  und nach einem Mediationsverfahren, das wir angestrengt haben und das durchgeführt
  worden ist, haben Präsident Macron und ich uns schließlich geeinigt. Wir sind zu
  der geteilten Einschätzung gelangt, dass die Unternehmen beim Bau eines gemeinsamen
  Kampfflugzeuges nicht zueinander finden. Diese Realität erkennen wir an. Präsident
  Macron und ich haben deshalb am vergangenen Freitag vereinbart, den Bau eines gemeinsamen
  Kampfflugzeuges nicht weiter zu verfolgen. Damit, meine Damen und Herren, lösen
  wir eine langjährige Blockade auf, wir eröffnen der Industrie neue Möglichkeiten,
  beim Bau moderner Kampfflugzeuge auf anderen Wegen weiter voranzukommen. Den eigentlichen
  Kern von FCAS werden wir als europäisches System der Systeme, als „ System of Systems
  “, weiterführen, und hierin liegt eine große Chance eines zentralen deutsch-französischen
  verteidigungsindustriellen Zukunftsprojekts, das wir gemeinsam verwirklichen wollen.
  Wie sich das umsetzen lässt, werden jetzt unsere Verteidigungsminister bis zum nächsten
  deutsch-französischen Regierungstreffen in Deutschland, das wir im Juli abhalten
  werden, erarbeiten. Aber auch bei dem bleiben wir nicht stehen. Beim deutsch-französischen
  Ministerrat in Deutschland im Juli werden unsere Verteidigungsminister einen umfassenden
  gemeinsamen zeitgemäßen Arbeitsplan zur verteidigungsindustriellen Zusammenarbeit
  formulieren. Auch in dieser Hinsicht gilt: Wir wollen einige wenige relevante, aber
  dann auch machbare Vorhaben, die einen echten Unterschied für unsere gemeinsame
  Sicherheit ausmachen, verwirklichen. Wir wollen auch eine bessere Governance für
  unsere Vorhaben entwickeln. Ein Schlüsselvorhaben in diesem Zusammenhang ist unsere
  im März begründete Zusammenarbeit bei der nuklearen Abschreckung. Auch dazu ein
  Wort: In der Umsetzung der Initiative von Präsident Macron zur „ forward nuclear
  deterrence “ wollen wir weiter entschlossen gemeinsam vorangehen, und es wird andere
  europäische Staaten geben, die sich an dieser Initiative beteiligen. Wir folgen
  dabei einem klaren deutsch-französischen, aber auch einem klaren europäischen Kompass.
  Wir stärken gemeinsam Europas Verteidigung und auch Europas Verteidigungsindustrie.
  Das ist zwingend für unsere Sicherheit und unsere Souveränität. Es ist nicht zuletzt
  auch gut für unsere gemeinsame Industrie. Schließlich – wir haben es heute Morgen
  beim ersten Rundgang auch gesehen – wollen wir auch in der Drohnentechnologie in
  Deutschland unsere Potenziale nutzen. Zwei Unicorns aus Deutschland zählen zu den
  innovativsten Unternehmen auf der ganzen Welt. Mit der Luftfahrtstrategie werden
  wir diese technologischen Stärken künftig noch intensiver für unsere Verteidigung
  erschließen. Ich freue mich deshalb, dass ich auch gleich bei Quantum Systems an
  der Vorstellung eines neuen Projekts teilnehmen darf. Meine Damen und Herren, der
  Bundesverteidigungsminister hat im vergangenen Herbst angekündigt, dass wir mit
  35 Milliarden Euro unsere Verteidigungsarchitektur im All aufbauen. Auch so werden
  wir Europas Souveränität, Verteidigungsfähigkeit und technologische Resilienz stärken,
  auch und nicht zuletzt im Rahmen der NATO . Diese Investitionen sind, gemeinsam
  mit denen des Raumfahrtministeriums, liebe Doro Bär, die größten Investitionen,
  die Deutschland je in der Raumfahrt getätigt hat. Der Weltraum ist nicht nur entscheidend
  für unsere Sicherheit, der Weltraum wird immer mehr Teil auch unseres Wirtschaftsraumes.
  Schlüsseltechnologien, um ihn zu erschließen, sind dabei Trägersysteme. Ein Modell
  der Ariane 6, die im Sommer 2024 zum ersten Mal erfolgreich gestartet ist, werde
  ich gleich besuchen. Bei Trägerraketen erwartet die ESA einen Nachfrageboom. Bis
  in die 2030er-Jahre werden jedes Jahr Hunderte kleinere und mittlere Satelliten
  aus Europa ins All zu bringen sein. Europa muss jetzt schnell sein. Der von uns
  unterstützte Trägerwettbewerb der ESA soll den Aufbau wettbewerbsfähiger europäischer
  Startdienstleistungen vorantreiben. Ja, und im März dieses Jahres hatte ich Gelegenheit,
  den Raketenstartplatz in Norwegen zu besuchen. Wir sind voller Erwartung, dass Isar
  Aerospace noch im Juni der Start einer Trägerrakete von Andøya aus gelingt und rasch
  weitere Missionen folgen und Rocket Factory Augsburg und Hylmpulse bald nachziehen.
  Das kann der Beginn einer europäischen Raumfahrtökonomie sein, die unsere industrielle
  Zukunft, meine Damen und Herren, sehr stark prägen wird. Sie sehen also: Die ILA
  weckt Zuversicht für einen neuen Aufbruch, sie weckt Begeisterung für Technologie,
  und sie macht einfach Lust auf eine gemeinsame Zukunft. Auf dieser größten Luft-
  und Raumfahrtmesse Europas präsentiert sich Deutschland als ein Land, das die Zukunft
  des Fliegens lebt und in sie investiert, das einen attraktiven Standort für die
  gesamte Luftfahrtindustrie darstellt, das mit Innovationen der zivilen und militärischen
  Luft- und Raumfahrt an der Weltspitze steht. Deswegen bin ich heute, meine Damen
  und Herren, gern hier. Weil ich sie mit vielen von Ihnen teile: Es ist eben auch
  die Leidenschaft für die Fliegerei. Mein Dank gilt dem BDLI , der Messe Berlin und
  den Ländern Berlin und Brandenburg für die Ausrichtung dieser Messe. Ich will mich
  herzlich bei der Europäischen Kommission für die Unterstützung als strategischer
  Partner der Messe bedanken. Ich wünsche schließlich, meine Damen und Herren, allen
  Ausstellern und Besucherinnen und Besuchern erfolgreiche Messetage auf der ILA 2026.
  Ich eröffne hiermit die ILA 2026 in Berlin-Brandenburg. Herzlichen Dank!'
