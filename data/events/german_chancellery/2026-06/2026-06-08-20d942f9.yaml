title: Staatsmodernisierung und Bürokratierückbau Modernisierungsagenda von Bund und
  Ländern zeigt erste Fortschritte
text: 'Die Bundesregierung und die Länder wollen digitaler und effizienter werden,
  damit Bürgerinnen und Bürger sowie Unternehmen weniger Zeit mit Bürokratie verbringen.
  Bund und Länder treiben die Staatsmodernisierung voran, um Verwaltung schneller,
  digitaler und weniger bürokratisch zu machen. Dafür haben der Bund und die Länder
  die Föderale Modernisierungsagenda beschlossen. Erste Erfolge sind die digitale
  Fahrzeugzulassung, die digitale Wohnsitzanmeldung, weniger Berichtspflichten und
  schnellere Planungs- und Genehmigungsverfahren. Unter dem Motto „Staatsmodernisierung
  mit Wirkung“ kamen in Berlin hochrangige Vertreter aus Bundes- und Landespolitik,
  Wissenschaft und Zivilgesellschaft zusammen, um sich über gemeinsame Fortschritte
  auszutauschen. Der Austausch, der vom Bundesministerium für Digitales und Staatsmodernisierung
  und der Berlin-Brandenburgischen Akademie der Wissenschaften, organisiert wurde, zeigte:
  Die Entlastung von Bürgerinnen und Bürgern sowie Unternehmen zeigt Wirkung. Der
  Bund hat seinerseits bereits zahlreiche Entlastungen final umgesetzt oder auf den
  Weg gebracht. Dazu gehören beispielsweise folgende Maßnahmen: Für Bundesminister
  Karsten Wildberger ist Staatsmodernisierung eine Frage des Vertrauens – das Fundament
  der Demokratie. „Wir haben keine Zeit mehr zu warten. Die Menschen erwarten zu Recht,
  dass der Staat schlanker, schneller und digitaler wird,“ sagte Wildberger. Umso
  wichtiger sei es, dass sich der Staat für weniger Bürokratie, schnellere Verfahren
  und eine Entlastung der Menschen einsetze: dadurch könne auch dem Misstrauen gegenüber
  dem Staat erfolgreich begegnet werden. Die Bundesregierung und die Länder hätten
  bereits zahlreiche Maßnahmen und Initiativen auf den Weg gebracht. Entscheidend
  sei nun, dass die Wirkung bei den Menschen im Alltag ankomme. Bundesarbeitsministerin
  Bärbel Bas betonte, dass die Menschen gerade auch einen Sozialstaat erleben wollten,
  der auf der Höhe der Zeit sei – und zwar digitaler, transparenter und schneller.
  Papierformulare müssten der Vergangenheit angehören, Angaben zu persönlichen Daten
  sollten künftig nur ein einziges Mal gemacht werden müssen. Bas verwies auf das
  digitale Sozialportal, dass das Ministerium einrichten werde. „Mehr Digitalisierung,
  weniger Bürokratie, das bringt uns nach vorne.“ Bindeglied der gemeinsamen Anstrengungen
  von Bund und Ländern für einen effizienteren Staat ist die Föderale Modernisierungsagenda.
  Sie umfasst insgesamt mehr als 200 Maßnahmen für schnelle und klare Verfahren auf
  allen staatlichen Ebenen, leistungsfähige Strukturen, digitale Services und eine
  praxistaugliche Rechtsetzung. Die Föderale Modernisierungsagenda haben der Bundeskanzler
  und die Regierungschefs der Länder im Dezember 2025 beschlossen. Bund und Länder
  haben sich dabei verpflichtet, die Bürokratiekosten um 25 Prozent zu senken – und
  die Verwaltung durch mehr als 200 Maßnahmen effizienter zu gestalten. Bereits im
  Oktober 2025 hat das Bundeskabinett die Modernisierungsagenda Bund beschlossen –
  Schwerpunkte sind hier zum Beispiel der Bürokratierückbau und digitale Services
  sowie die Nutzung von Künstlicher Intelligenz in der Verwaltung.'
