title: Pressebegegnung mit Bundeskanzler Merz beim Treffen im E5-Format „Wir stehen
  für eine starke NATO“
text: 'Die Staats- und Regierungschefinnen und -chefs der E5 tauschten sich im Bundeskanzleramt
  aus. Bundeskanzler Friedrich Merz hat den französischen Staatspräsidenten Emanuel
  Macron, den britischen Premierminister Keir Starmer, die italienische Ministerpräsidentin
  Georgia Meloni und den polnischen Ministerpräsidenten Donald Tusk zu einem Treffen
  im E5 -Format im Bundeskanzleramt empfangen. NATO -Generalsekretär Mark Rutte nahm
  virtuell an dem Gespräch teil. Im Mittelpunkt des Treffens stand die Vorbereitung
  auf den NATO -Gipfel, der am 7. und 8. Juli 2026 in Ankara stattfinden wird. Zudem
  haben die Teilnehmerinnen und Teilnehmer des Treffens die weitere Unterstützung
  der Ukraine gegen den russischen Angriffskrieg und die Situation in Iran und Libanon
  besprochen. (Die Protokollierung des fremdsprachlichen Teils erfolgte anhand der
  Simultandolmetschung.) Meine Damen und Herren, herzlich willkommen in Berlin! Es
  sind jetzt noch zwei Wochen bis zum NATO -Gipfel in Ankara. Diesen wichtigen Gipfel
  wollen wir gemeinsam zu einem Erfolg machen. Das dient unserer Sicherheit in gefährlichen
  Zeiten, es festigt unsere transatlantischen Beziehungen, und es bringt uns als Europäer
  zusammen. Deshalb freue ich mich sehr, dass Emmanuel Macron , Giorgia Meloni, Keir
  Starmer und Donald Tusk heute meiner Einladung nach Berlin gefolgt sind, um genau
  dieses Treffen in Ankara in zwei Wochen vorzubereiten. Lieber Keir, danke ganz besonders
  an dich, dass du heute hier bist. Du hast viel für eine sehr starke NATO und ein
  einiges Europa geleistet. Ich möchte dir bei dieser Gelegenheit besonders herzlich
  für das Teamspiel danken, das wir gehabt haben. Ich sage das auch mit einem gewissen
  Bedauern darüber, dass du aus dem Amt ausscheiden wirst. Aber umso dankbarer bin
  ich für die gute Zusammenarbeit, die wir in den letzten Monaten gehabt haben. Ganz
  herzlichen Dank für diese Freundschaft und für diese gute Zusammenarbeit! Meine
  Damen und Herren, Mark Rutte war in unserer Arbeitssitzung eben aus Washington zugeschaltet.
  In wenigen Stunden wird er Präsident Trump sprechen. Insofern dient auch dies einer
  guten Vorbereitung eines transatlantischen Treffens. Ich selbst werde später Präsident
  Trump , Gastgeber Präsident Erdogan und andere Partner über unsere Gespräche unterrichten.
  Als fünf große europäische Staaten setzen wir heute fünf Botschaften. Erstens. Wir
  stehen gemeinsam für eine NATO , die stark und einig die Sicherheit im euroatlantischen
  Raum im Interesse aller Alliierten wahrt. Zweitens. Wir wollen die Allianz erneuern.
  Wir stärken ihren europäischen Pfeiler. Was wir vor einem Jahr beim Haager Gipfel
  beschlossen haben, lösen wir jetzt ein. Wir steigern unsere Verteidigungsausgaben
  auf 3,5 Prozent. Die Bundesregierung will diese Marke schon 2029 erreichen. Auch
  Frankreich, Großbritannien, Italien und Polen investieren massiv in ihre Verteidigung.
  Das legt das Fundament für eine ausgewogene, ausgewogenere transatlantische Partnerschaft.
  Drittens. Wir gehen diesen Weg gemeinsam. Ich sage mit Bedacht: Nationale Alleingänge
  in unserer Verteidigungspolitik wären ein Irrweg. Wir wollen mehr Zusammenarbeit,
  transatlantisch und europäisch. Für uns Deutsche leitet sich das aus unserer Geschichte,
  unserer Geografie und unserem Grundgesetz ab. Unsere Nachbarn sollen sich sicherer
  fühlen, wenn Deutschland stärker wird. Deshalb wollen wir Deutschland, seine Streitkräfte
  und seine Verteidigungsindustrie fest in der Allianz und in Europa verankern. Daran
  haben wir ein tiefes eigenes Interesse. Teamwork brauchen wir auch, um die großen
  Aufgaben zu bewältigen, vor denen unsere Verteidigungsindustrie steht. Das gilt
  für Luftverteidigung, das gilt für Abstandswaffen, das gilt für künstliche Intelligenz
  und andere moderne Schlüsselsysteme. Diese gemeinsame Arbeit treiben wir, wo immer
  möglich, gemeinsam voran. Viertens. Wir wollen in Ankara ein starkes Zeichen der
  Unterstützung für die Ukraine setzen. Die Bundesregierung schlägt vor, dass wir
  Kyjiw als europäische NATO -Alliierte eine starke Finanzierungszusage geben. Die
  Botschaft an Russland lautet: Die Ukraine bleibt stark. Europas Unterstützung lässt
  nicht nach. – Seit dem G7 -Gipfel von Evian können wir hinzufügen: Transatlantisch
  sind wir uns einig wie lange nicht. Wir hoffen, dass Moskau daraus Schlüsse zieht.
  Es wird Zeit, in Friedensgespräche einzutreten. Schließlich, fünftens, begrüßen
  wir, dass sich die Vereinigten Staaten und Iran über ein Rahmenabkommen geeinigt
  haben. Die Folgeverhandlungen in Bürgenstock in der Schweiz, die nun angelaufen
  sind, unterstützen wir. Wir werden unseren Teil beitragen, wenn die Voraussetzungen
  gegeben sind. Auch diese Botschaft soll vom Gipfel in Ankara ausgehen. Ich freue
  mich auf unsere weiteren Beratungen heute Abend und begrüße noch einmal die Kolleginnen
  und Kollegen aus der europäischen Nachbarschaft, unsere transatlantischen Verbündeten
  und unsere guten europäischen Partner. Ich freue mich sehr, dass ihr heute Abend
  in Berlin seid! Vielen Dank, lieber Friedrich, dass du uns hier in Berlin empfangen
  hast. Liebe Kolleginnen und Kollegen, der Bundeskanzler hat perfekt zusammengefasst,
  was in Ankara auf der Agenda steht. Wir wollen hier unsere Gespräche über die Ukraine
  und Iran unter uns fortsetzen. Wir befinden uns an einem Zeitpunkt, an dem sich
  Europäer und Amerikaner wieder annähern. Das hat bereits beim G7 -Gipfel in Évian
  begonnen, wurde dann auch beim Europäischen Rat letzte Woche in Brüssel fortgesetzt
  und wird auch mit dem NATO -Gipfel in Ankara und dem Treffen der Koalition der Freiwilligen
  zur Unterstützung der Ukraine am 13. Juli fortgesetzt werden. Zur Ukraine: Ich denke,
  was in den letzten Tagen passiert ist – und das ist sehr wichtig –, ist eine Klärung
  unserer gemeinsamen Position. Die Tatsache, dass wir, alle Mitglieder der G7 , zum
  ersten Mal seit 18 Monaten einen gemeinsamen Text unterzeichnet haben und dass die
  Amerikaner mit uns gemeinsam die territoriale Integrität der Ukraine unterstützen,
  dass sie die Infrastruktur unterstützen wollen und auch Sanktionen gegen Russland
  verhängen wollen, zeigt, dass wir auf demselben Weg sind. Das wollen wir weiter
  konsolidieren. Die Entscheidung bezüglich des Erdöls, des Erdgases und der Sanktionen,
  die gefallen ist, geht in diese Richtung. Das wurde vor einigen Tagen beschlossen.
  Wir wollen hier weitermachen. Auch unsere Gespräche in Ankara gehen in diese Richtung,
  auch anschließend am 13. Juli in der Koalition der Freiwilligen. Zum Frieden im
  Nahen Osten und der Einigung zwischen Iran und den Vereinigten Staaten: Der Bundeskanzler
  hat es ganz klar gesagt. Wir unterstützen das. Das ist wichtig. Wir wollen uns auch
  daran beteiligt, etwa an der Ad-hoc-Mission für Hormus. Natürlich gilt es noch,
  die Bedingungen dafür zu definieren. Das heißt, es geht um die friedliche Beilegung
  und auch um die Hilfe für einen dauerhaften Frieden im Libanon und die Beibehaltung
  seiner vollen Souveränität. Neben der Ukraine und dem Nahen und Mittleren Osten
  wird der Gipfel in Ankara sehr entschlossen den europäischen Pfeiler der NATO hervorheben.
  Das haben unsere Gespräche hier auch gezeigt. Wir engagieren uns. Wir erhöhen unsere
  Kapazitäten und unsere Verteidigungshaushalte und wollen als Europäer gemeinsame
  Lösungen erarbeiten und gemeinsam zur Steigerung unserer Abschreckungsfähigkeiten
  zusammenarbeiten. Unser Budget dafür ist in den letzten Jahren gestiegen. Das ist
  ein Zeichen dafür und zeigt unsere Entschlossenheit, gemeinsam zu handeln und unsere
  industrielle Partnerschaft weiter auszubauen. Ich möchte jetzt nicht wiederholen,
  was Bundeskanzler Friedrich Merz bereits gesagt hat. Seine Ausführungen waren diesbezüglich
  sehr vollständig. Ich freue mich, hier alle meine Kollegen zu treffen. Es ist eine
  ganz besondere Freude, hier neben dem britischen Premierminister Keir Starmer zu
  stehen. Ich denke, er hat in den letzten Jahren viel beigetragen, nicht nur zur
  Stärkung der Rolle Großbritanniens in Europa und in der NATO . Er hat wirklich großen
  Mut, Würde und Anständigkeit an den Tag gelegt. Das wissen wir alle sehr zu schätzen.
  Das hat wirklich einen Weg geöffnet, und da gibt es keinen Weg zurück. Denn er hat
  mutige Entscheidungen für sein Land getroffen, an unserer Seite. Wir hatten das
  Glück, ihn im Laufe der letzten Jahre neben uns zu wissen. Das sind wirklich gute
  strategische Entscheidungen für Großbritannien. Ich bedanke mich sehr dafür. Einen
  schönen guten Nachmittag allen! Sehr vielen Dank, dass Sie alle hier sind. Danke
  Bundeskanzler Merz, danke, Friedrich, dafür, dass du diese Initiative ergriffen
  hast! Auch ich möchte Ministerpräsident Starmer für die ausgezeichnete Zusammenarbeit
  danken, die wir in diesen Monaten zwischen Italien und dem Vereinigten Königreich
  sowie zwischen Europa und dem Vereinigten Königreich hatten. Noch einmal vielen
  Dank, Keir! Diese Gelegenheit bietet uns natürlich auch die Chance, darüber zu reden,
  wie wir die schwerwiegenden Herausforderungen, vor die die Geschichte uns stellt,
  angehen können, in einem historischen Moment, in dem sich die Sicherheitsarchitektur
  weltweit extrem schnell ändert. Wir alle gehen von demselben Bewusstsein aus. Europa
  will seine Verantwortung in Bezug auf Sicherheit und Verteidigung übernehmen, und
  zwar insbesondere im Hinblick auf eine stärkere europäische Komponente innerhalb
  der transatlantischen Allianz unter Hervorhebung der Exzellenzen, die wir vorweisen
  können, und um unsere industrielle Basis in Europa zu stärken. Alle Mitgliedsstaaten
  der NATO haben im letzten Jahr in Den Haag gewisse Verpflichtungen übernommen, und
  zwar nicht nur in klassischer Art. Es betrifft eben auch einen umfassenderen Aspekt
  der strategischen Resilienz. Es geht auch darum, die Daten von Familien und von
  Unternehmen zu verteidigen. Das bedeutet, unsere Grenzen zu schützen. Das bedeutet,
  dass wir weiterhin einen multidimensionalen Ansatz angehen wollen. Das muss sich
  auf alle Fronten unserer Allianz beziehen, um unsere Freiheit und unsere Souveränität
  gegenüber den systemischen Risiken einer Welt zu verteidigen, die immer instabiler
  und immer mehr wettbewerbsgeprägt ist. Wir wissen, dass es darum geht, dass wir
  bei künstlicher Intelligenz eine Führungsrolle übernehmen sollten. Insofern möchte
  Italien hierbei auch mit dem eigenen Know-how einen Beitrag leisten, um die atlantische
  Allianz zu stärken. Sie bleibt eines der konstitutiven Elemente des Westens. Bei
  unseren Arbeiten werden wir natürlich auch die wesentlichen internationalen Themen
  angehen, also die Ukraine und der Nahe Osten. Was die Ukraine betrifft, versuchen
  wir einen gerechten und dauerhaften Frieden anzustreben. Aber das ist nicht möglich,
  wenn wir nicht weiterhin versuchen, Kyjiw zu unterstützen, bis man einen dauerhaften
  und gerechten Frieden haben kann. Italien wird sich diesbezüglich weiterhin engagieren,
  insbesondere im Hinblick auf energetische Resilienz. Präsident Selenskyj hat dies
  gerade auch in den letzten Tagen, während des G7 -Gipfels und der Sitzung des Europäischen
  Rates, noch einmal bekräftigt. Was den Nahen Osten betrifft, ist es natürlich ein
  sehr positives Zeichen, dass es die Unterschrift zwischen den Vereinigten Staaten
  und Iran gegeben hat. Aber wir alle wissen, dass das Umfeld noch sehr unsicher ist
  und dass wir unseren Beitrag leisten müssen, um das ganze System besser zu sichern.
  Es geht dabei eben auch noch um die Sicherheit der Schifffahrtsrouten. Die Straße
  von Hormus hat für uns alle eine strategische Priorität. Diesbezüglich hat Italien
  bereits seine Bereitschaft signalisiert, mitzuhelfen, wobei natürlich auch noch
  die entsprechenden Voraussetzungen geschaffen werden müssen. In der nächsten Zeit
  stehen also wichtige Entscheidungen und Termine an. Vielen Dank, Friedrich! Es ist
  mir wirklich eine große Freude, heute hier bei euch sein zu können. Danke für deine
  freundlichen Worte. Es war mir ein großes Privileg, mit dir zusammenzuarbeiten.
  Ich bin stolz auf die Arbeit, die wir in den vergangenen zwei Jahren gemeinsam geleistet
  haben, um unsere Beziehungen zu unseren Bündnispartnern in Europa und überall in
  der Welt wieder aufzubauen. Großbritannien setzt sich wieder für Anstand, Respekt
  und Rechtsstaatlichkeit ein. Die G7 – ich möchte dir, Emmanuel, noch einmal für
  die Ausrichtung eines erfolgreichen Gipfels danken – hat beim letzten Mal ihre unerschütterliche
  Unterstützung der Ukraine bekundet. Heute bekräftigen wir das hier. Wir wollen das
  neue Momentum, das die Ukraine entwickelt hat, auch weiterhin nutzen. Der Ukraine
  ist es gelungen, Russland auf dem Schlachtfeld zurückzudrängen. Das sind klare Anzeichen
  dafür, dass Russland auch in anderen Bereichen schwächelt. Die Wirtschaft lässt
  nach. Dies ist somit ein wirklich wichtiger Moment, in dem wir den Druck auf die
  Volkswirtschaft Russlands durch die Verhängung weiterer Sanktionen und durch unsere
  Unterstützung der Ukraine erhöhen müssen. Wir sind entschlossen, das voranzubringen.
  Das ist auch das Thema Nummer eins, das in zwei Wochen auf der Tagesordnung der
  NATO stehen wird. Das zweite Thema des Gipfels befasst sich damit, eine stärker
  europäisch geprägte NATO zu gründen. Das haben wir immer wieder angesprochen, aber
  wir glauben, dass es bei diesem Gipfel nun wirklich an der Zeit ist, dieses Thema
  voranzutreiben. Unser Ziel sollte die Stärkung der europäischen Führungsrolle und
  der Fähigkeiten Europas in Übereinstimmung und Abstimmung mit den Vereinigten Staaten
  sein. Denn wir wissen, worum es geht und was wir brauchen, um unsere Bürger zu schützen,
  Gefahren abzuwehren und das erfolgreichste militärische Bündnis in unserer Geschichte
  zu bewahren. Das wird angesichts der offensichtlichen und wachsenden Bedrohungen,
  denen wir uns gegenübersehen, die strategische Herausforderung bleiben. Wir sind
  bereit, unsere Rolle voll und ganz zu spielen. Wir haben den höchsten Anstieg der
  Verteidigungsausgaben seit dem Ende des Kalten Kriegs zu verzeichnen, und wir werden
  weitere Schritte einleiten. Wir gehen weiter in dieser Richtung voran und entwickeln
  noch im Vorfeld des NATO -Gipfels unseren Verteidigungsinvestitionsplan – nicht
  nur im Hinblick darauf, wie viel wir für die Verteidigung ausgeben, sondern wir
  wollen insgesamt überprüfen, wie wir unser Geld ausgeben, damit wir aus den Erfahrungen
  lernen und uns für heute und für die Zukunft vorbereiten. Ich würde gern noch einen
  letzten Punkt ansprechen. Es ist ganz offensichtlich, dass diese Erneuerung der
  europäischen Verteidigung durch einen Generationswandel in der europäischen Zusammenarbeit
  im Bereich der Verteidigungsindustrie getrieben werden muss. Wir sprechen hier von
  der modernen Kriegsführung. Zum einen muss man den Gegner in die Enge treiben, aber
  wir müssen auch besser werden im Bereich der Innovation und der Produktion; wir
  müssen den Gegner in diesen Bereichen überflügeln. Technologische Entwicklung ist
  die Grundlage für militärische Macht, und jetzt ist der Moment gekommen, unsere
  Zusammenarbeit zu stärken und gleichzeitig Arbeitsplätze, die Wirtschaft, das Wachstum
  und Chancen für uns alle voranzutreiben. – Vielen Dank. Herr Premierminister, lieber
  Keir, lieber Freund, ich möchte hier nur einen Satz dazu sagen: Es war sehr schön
  und sehr angenehm, mit dir zusammenzuarbeiten. Europa, Polen und, ich denke, auch
  Großbritannien, wir alle haben uns sicherer gefühlt dank deines Engagements. In
  vielen Dimensionen sind wir wieder zu einer Einheit geworden. Dank deiner Arbeit
  konnte man eine Weile den Brexit vergessen. Das werde ich noch lange in Erinnerung
  behalten. Heute sind wir hier gemeinsam in diesem E5 -Format versammelt, um zu bekräftigen,
  dass unsere Länder die europäische und die transatlantische Einheit bewahren wollen.
  Polen hat keinen Zweifel daran gehabt und wird auch in Zukunft keinen Zweifel daran
  haben, dass die Zukunft Europas, die Zukunft der westlichen Welt, die Zukunft der
  Ukraine in diesem dramatischen Moment – für die Ukraine ist er dramatisch – davon
  abhängt, inwieweit wir die europäische und die transatlantische Einheit bewahren.
  Daher ist es vor dem NATO -Gipfel in Ankara so wichtig, dass wir ganz eindeutig
  sagen: Trotz der Umstände und trotz der Emotionen – es gibt immer Emotionen, überall
  und bei allen Menschen – werden wir die europäische Einheit verteidigen. Auch während
  des Kriegs stehen wir für die Ukraine in ihrer Konfrontation mit Russland ein. Wir
  werden auch die transatlantischen Bande verteidigen, auch wenn einige Politikerinnen
  und Politiker das nicht immer sehr wertschätzen. Polen wird auch alles tun – danke
  Friedrich für diese Initiative; denn das hilft mir dabei –, damit die Länder, die
  von der aggressiven Politik Russlands direkt bedroht sind, also die Länder der Ostflanke,
  auch in allen Formaten repräsentiert werden. Ohne Polen, ohne die skandinavischen
  Länder, ohne die baltischen Länder, ohne Rumänien wird es schwierig, in dieser Konfrontation
  von Zivilisationen mit aggressiven Nachbarn im Osten irgendetwas zu erreichen. Ich
  möchte hier unterstreichen, dass das für Polen eine ganz praktische Dimension hat.
  Daher werden wir morgen – unabhängig davon, was noch alles in der Zwischenzeit geschieht –
  die Konferenz zum Wiederaufbau der Ukraine abhalten. Dort werden die Leiter hunderter
  von Firmen sein, und es werden Diplomatinnen und Diplomaten kommen. Dies wird ein
  weiterer Beitrag Polens und Europas zum Wiederaufbau und zur Hilfe für die Ukraine
  sein. Es geht dort also darum, wie es in dem Land nach dem Krieg weitergehen soll.
  Sehr wichtig ist, dass wir heute schon fast sieben Prozent für Verteidigung ausgeben.
  Wir möchten, dass das in Ankara gehört wird, dass das ein lautes Echo finden wird.
  Ich denke, dass sich alle stärker engagieren sollten, was Verteidigungsfähigkeit
  in Europa und in den einzelnen Ländern angeht. Ich denke, dass wir immer zu einer
  gemeinsamen Meinung, zu einem gemeinsamen Standpunkt in diesen schwierigen Fragen
  kommen werden. Es ist ein Zeichen der Einheit. Morgen haben wir die Konferenz in
  Gdańsk , auf der ich auch mit anderen Staats- und Regierungschefs zusammenkommen
  werde.'
