title: Tag der offenen Tür der Bundesregierung Offene Türen für offene Gespräche
text: 'Das Bundespresseamt lädt zum Tag der offenen Tür ein. Traditionell im Sommer
  laden das Presse- und Informationsamt der Bundesregierung und das Bundeskanzleramt
  dazu ein, die Arbeit der Bundesregierung kennenzulernen. Am 20. und 21. Juni 2026
  waren die Türen wieder geöffnet. Auf die Gäste wartete ein abwechslungsreiches Programm
  mit Spitzengesprächen, Workshops und Mitmachaktionen für die ganze Familie. Im Bundespresseamt
  drehte sich unter dem Motto „Das kann Deutschland“ alles um den direkten Austausch
  mit der Bundesregierung. Ein Publikumsmagnet am Samstag war die Kinder- und Jugendpressekonferenz
  mit Regierungssprecher Stefan Kornelius. Hier übernahmen die jüngsten Besucherinnen
  und Besucher die Rolle der Presse und fragten nach, was sie schon immer über Politik
  und Regierung wissen wollten. Ein weiteres Highlight des ersten Veranstaltungstages
  war der Talk von Forschungsministerin Dorothee Bär mit den ESA -Astronauten Alexander
  Gerst und Matthias Maurer sowie Polarforscherin Stefanie Arndt. Hier wurde vor allem
  zu Technik „ Made in Germany “ debattiert. Am Sonntag waren weitere sieben Bundesministerinnen
  und Bundesminister im Bundespresseamt zu Gast, um mit dem Moderationsteam und den
  Talk gästen über aktuelle Themen zu diskutieren. Auch das wechselhafte Wetter tat
  dem Interesse der Besucherinnen und Besucher keinen Abbruch. Bundesaußenminister
  Johann Wadephul betonte in seinem Gespräch, als europäischer Teamplayer Sicherheitspolitik
  machen zu wollen. Darüber hinaus waren die Situation im Nahen Osten, das Verhältnis
  zu Frankreich, Deutschlands Einfluss im „globalen Süden“ und die Unterstützung der
  Ukraine Themen, die die zahlreichen Gäste im Bundespresseamt besonders interessierten.
  Bundesbauministerin Verena Hubertz forderte bei ihrem Auftritt im BPA , in Zukunft
  digitaler, klimaneutraler und pragmatischer zu bauen. Sie betonte: Wer baut, solle
  besser an Fördermittel kommen und weniger Bürokratie bewältigen müssen. Gesprächspartnerin
  Chiara Monteton, Dachdeckerin und Influencerin , gab dabei Einblicke in Dachsanierungen,
  durch die neuer Wohnraum entsteht. Ein weiteres Thema der Talks : Deutschland soll
  schneller werden. Auch auf Baustellen. Mit dem Infrastruktur-Zukunftsgesetz hat
  die Bundesregierung dafür die Weichen gestellt. Bundesverkehrsminister Patrick Schnieder
  und der Vorsitzende der Geschäftsführung der Autobahn GmbH , Michael Güntner, beantworteten
  Fragen von Brückensanierung über Ladstationen bis Tempolimit. Zwei Ministerinnen
  ein Anliegen: Den Schutz vor Gewalt – sowohl in Familien und Partnerschaften als
  auch im Internet – wollen Bundesfamilienministerin Prien und Bundesjustizministerin
  Hubig weiter verbessern. Dabei betonten die Ministerinnen, dass neben gesetzlichen
  Maßnahmen vor allem die Prävention in bereits jungen Jahren wichtig sei. Bundesdigitalminister
  Wildberger kündigte im Bühnengespräch an, Deutschland digitaler und besser funktionierend
  machen zu wollen. Ein zentraler Ansatz sei der Abbau von Bürokratie – sowohl für
  Bürgerinnen und Bürger als auch für die Verwaltung. Gleichzeitig soll Deutschland
  digital unabhängiger werden, etwa durch den Aufbau eigener Rechenzentren. Aus dem
  Publikum gab es besonders viele Fragen und Anregungen zu digitalen Anwendungen wie
  der EUDI - Wallet . Zum Abschluss war Bundesfinanzminister Klingbeil zu Gast. Er
  warb um Zuversicht und zeigte sich überzeugt: „Wir sind ein starkes Land“. Die bestehenden
  Probleme könnten durch Reformen selbst gelöst werden. Ein besonderer Höhepunkt erwartete
  die Besucherinnen und Besucher am Sonntagnachmittag im Bundeskanzleramt: Bundeskanzler
  Merz stand den Gästen beim Kanzlertalk Rede und Antwort. Die wichtigsten Themen
  waren die Notwendigkeit von Reformen,  die internationale Krisen und die wirtschaftliche
  Lage in Deutschlands. Wer wissen wollte wie es ist, Entscheidungen als Ministerin
  oder Minister zu treffen, hatte im Bundeskanzleramt in einem Planspiel die Möglichkeit
  in die Rolle von Ministerinnen oder Ministern zu schlüpfen. Ziel des Planspiels
  war es, gemeinsame Beschlüsse zu erarbeiten. Auch das Bundespresseamt widmete sich
  in diesem Jahr erstmals interaktiven Mitmachangeboten. Im Confrontation Game konnten
  Besucherinnen und Besucher Position zu aktuellen gesellschaftlichen Fragen beziehen.'
