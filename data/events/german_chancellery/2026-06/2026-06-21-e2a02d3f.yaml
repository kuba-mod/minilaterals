title: Grußwort von Kanzler Merz beim zweiten Nationalen Veteranentag „Sie verdienen
  unsere Hochachtung an jedem Tag im Jahr“
text: 'Als Veteranen gelten alle aktiven und ehemaligen Soldatinnen und Soldaten,
  vom Wehrdienstleistenden über Zeit- und Berufssoldaten bis hin zu Reservistinnen
  und Reservisten. Bundeskanzler Friedrich Merz hat die Festveranstaltung zum zweiten
  Nationalen Veteranentag rund um das Reichstagsgebäude in Berlin besucht. Damit drückte
  er seine besondere Wertschätzung und Anerkennung für die Leistungen der rund zehn
  Millionen Veteraninnen und Veteranen in Deutschland aus. Vor Ort informierte er
  sich über die zahlreichen Facetten der Veteranenarbeit und unternahm einen Rundgang
  über das Veranstaltungsgelände mit der Präsidentin des Deutschen Bundestages und
  Schirmfrau des Nationalen Veteranentages, Julia Klöckner. Im Anschluss sprach der
  Kanzler ein Grußwort an die Veteraninnen, Veteranen und Gäste der Veranstaltung.
  „Sie verdienen unseren Dank, ja, unsere Hochachtung, nicht nur an einem Tag wie
  heute, am Veteranentag, sondern an jedem Tag im Jahr“, betonte der Kanzler. Unter
  dem Motto „ Veterans, Family & Friends “ würdigt der Nationale Veteranentag 2026
  nicht nur die Veteraninnen und Veteranen der Bundeswehr, sondern auch ihr persönliches
  Umfeld. Denn Familien, Freundinnen und Freunde tragen häufig im Hintergrund dazu
  bei, dass Dienst und Einsatz bewältigt werden können. Mit ihrem Verständnis, ihrer
  Unterstützung und ihrem Zusammenhalt leisten sie einen wertvollen Beitrag, der an
  diesem Tag ebenfalls sichtbar gemacht werden soll. Am 25. April 2024 beschloss der
  Deutsche Bundestag, einen Nationalen Veteranentag zu etablieren, um Dienst, Einsatz
  und Leistungen ehemaliger und aktiver Soldatinnen und Soldaten der Bundeswehr angemessen
  zu würdigen. Der Veteranentag findet dabei stets am 15. Juni statt, die Zentralveranstaltung
  jeweils am darauffolgenden Samstag. Darüber hinaus finden bundesweit weitere feierliche
  Veranstaltungen wie Gottesdienste und öffentliche Gelöbnisse statt. liebe Besucherinnen
  und Besucher des diesjährigen Veteranentages hier in Berlin, ich heiße Sie herzlich
  willkommen zu einem Tag, der heute zum zweiten Mal Ihnen, liebe Veteraninnen und
  Veteranen, gewidmet ist. Wir feiern diesen Tag gemeinsam. Wir feiern ihn nicht nur
  in Berlin, sondern wir feiern ihn in ganz Deutschland. Als Veteranen gelten – ich
  vermute, viele von Ihnen wissen es – alle aktiven und ehemaligen Soldatinnen und
  Soldaten, vom Wehrdienstleistenden über Zeit- und Berufssoldaten bis hin zu unseren
  Reservistinnen und Reservisten. Meine Bundeswehrzeit liegt nun schon 50 Jahre zurück.
  Ich habe meinen Wehrdienst geleistet und wurde im Panzerartilleriebataillon ausgebildet.
  Ich bin also sozusagen Veteran. Meine Damen und Herren, wenn ich heute als Bundeskanzler
  der Bundesrepublik Deutschland vor Ihnen stehe, dann möchte ich gern sagen: Wir
  wollen unseren Veteraninnen und Veteranen Anerkennung, Respekt und höchste Wertschätzung
  entgegenbringen. Es sind mittlerweile über zehn Millionen Menschen in Deutschland,
  die sich in den Dienst unserer Streitkräfte, in den Dienst der Bundeswehr gestellt
  haben oder immer noch in ihrem Dienst sind. Es sind also zehn Millionen Staatsbürgerinnen
  und Staatsbürger, die sich dazu entschieden haben, unserem Land in den Streitkräften
  zu dienen. Dieser Dienst bedeutet, dass sie im äußersten Fall mit ihrem Leben für
  die Sicherheit und für die Freiheit unseres Landes einstehen. Unser Leben in Freiheit
  ist ‑ das sehen Sie wie wir alle mit neuer Dringlichkeit – nicht selbstverständlich.
  Sie, liebe Veteraninnen und Veteranen, leben und lebten mit Ihrem Dienst in der
  Bundeswehr diese Erkenntnis. Freiheit gibt es nicht umsonst. Sie muss verteidigt
  werden. Unser Friede muss gesichert werden. Sie, die Veteraninnen und Veteranen,
  haben und hatten den Mut, aus dieser Tatsache eine sehr persönliche Konsequenz zu
  ziehen, eine Verpflichtung einzugehen, eine Verpflichtung, wie sie weitreichender
  nicht sein kann. Für viele wie auch für mich ist die Zeit bei der Bundeswehr mit
  guten und prägenden Erfahrungen verbunden, mit der Erfahrung von Kameradschaft,
  von Gemeinschaft, auch mit der Erfahrung, mit dem eigenen Einsatz etwas zum gemeinsamen
  großen Auftrag beizutragen. Für manche bedeutet es aber auch, verwundet zu werden
  an Körper und Seele. An diese Tatsache sollten wir heute denken. Wie wichtig ganz
  praktische Unterstützung für Sie und ihre Familien ist, das zeigt sich auch heute
  hier auf diesem Gelände. Es sind Zahlen, mit denen sich Schicksale verbinden. Über
  3.400 Bundeswehrangehörige sind seit Gründung der Bundeswehr in Ausübung ihres Dienstes
  ums Leben gekommen; 120 starben bei Einsätzen im Ausland. An sie, an die Verstorbenen,
  an die Opfer, erinnert das Ehrenmal der Bundeswehr am Bendlerblock in Berlin, und
  an sie erinnern auch wir uns heute. Wir sind in Gedanken bei ihnen. Wir sind in
  Gedanken vor allem bei den Familien, bei den Hinterbliebenen. Auch hinter Ihnen
  allen, meine Damen und Herren, liebe Veteraninnen und Veteranen, stehen Familien,
  stehen Freundinnen und Freunde. Sie tragen Ihre Erfahrungen mit, die guten wie die
  schlechten. Dafür verdienen sie unser aller Dank. Sie alle gehören in die Mitte
  unserer Gesellschaft, sichtbar und hörbar. Schön, dass Sie heute alle hier sind!
  Wir alle, Gesellschaft, Politik, Bundeswehr, die Wirtschaft, wir haben gemeinsam
  die Verantwortung, unser Land sicher zu machen. Gemeinsam stehen wir genau dafür
  ein. Für die Bundesregierung bedeutet das: Wir nehmen die sicherheitspolitischen
  Umbrüche und die damit verbundenen sicherheitspolitischen Aufgaben sehr ernst. Wir
  stärken unsere Streitkräfte für unsere Abschreckungs- und Verteidigungsfähigkeit.
  Wir wollen Freiheit, und wir wollen Frieden in Deutschland und in Europa auch und
  gerade für kommende Generationen bewahren und sichern. In diesem Sinne, liebe Veteraninnen
  und Veteranen: Sie verdienen unseren Dank, ja, unsere Hochachtung, nicht nur an
  einem Tag wie heute, am Veteranentag, sondern an jedem Tag im Jahr. Die Bundesregierung
  und ich ganz persönlich als Bundeskanzler und auch die deutsche Bevölkerung vertrauen
  auf Sie, und wir alle zusammen unterstützen Ihren Auftrag. Lassen Sie uns in diesem
  Sinne die begonnene Tradition eines deutschen Veteranentages fortsetzen, mit guten
  Begegnungen, mit Nachdenklichkeit, mit Mitgefühl, aber auch mit der Erfahrung, einer
  großen Gemeinschaft anzugehören, etwas Gemeinsames zu tun und etwas Gemeinsames
  zu erreichen, nicht mehr, aber eben auch nicht weniger als Freiheit und Frieden
  in unserem Land und Freiheit und Frieden auf dem europäischen Kontinent. Ich danke
  Ihnen allen sehr herzlich für Ihr Kommen heute.'
