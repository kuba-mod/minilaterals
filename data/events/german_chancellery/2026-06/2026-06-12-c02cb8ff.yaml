title: Im Bundesrat beschlossen Immobilienverträge werden einfacher, schneller, digitaler
text: Der Gesetzentwurf sieht eine umfassende digitale Kommunikation rund um die Beurkundung
  von Immobilienverträgen vor. Die Bundesregierung hat ein Gesetz zur Digitalisierung
  des Vollzugs von Immobilienverträgen auf den Weg gebracht. Es umfasst auch gerichtliche
  Genehmigungen von notariellen Rechtsgeschäften und steuerliche Anzeigen der Notare.
  In der Bundesrepublik Deutschland werden jährlich über eine Millionen Kaufverträge
  über Grundstücke sowie andere Arten von Grundstücksübertragungen beurkundet. Der
  Vollzug eines solch notariell beurkundeten Immobilienvertrags erfordert, dass zwischen
  Notarinnen und Notaren, Gerichten und verschiedenen Verwaltungsstellen Informationen
  und Dokumente ausgetauscht werden – dies soll in Zukunft digitaler und effizienter
  geschehen. Der beschlossene Gesetzentwurf sieht eine umfassende digitale Kommunikation
  von Notariaten, Behörden und Gerichten in diesen Bereichen auf Grundlage eines gemeinsamen
  Dateistandards vor. Dieser verhindert Medienbrüche, vereinfacht und beschleunigt den
  Vollzug von Immobilientransaktionen. Zudem verringert er sowohl den Zeit- und Sachaufwand
  als auch die Bürokratiekosten. Bürgerinnen und Bürger, die Wirtschaft und die Verwaltung
  profitieren unmittelbar von einem beschleunigten Vollzug von Immobilienverträgen
  und der zügigeren Eigentumsumschreibungen im Grundbuch. Im parlamentarischen Verfahren
  wurden insbesondere Änderungen mit Blick auf den elektronischen Austausch zwischen
  Notaren und der Verwaltung vorgenommen.
