date: '2026-06-03'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 3. Juni 2026
text: 'Sprecherinnen und Sprecher •    stellvertretender Regierungssprecher Meyer
  •    Haberlandt (BMG) •    Ungrad (BMWE) •    Giese (AA) •    Stempfle (BMVg) •    Singer
  (BMI) •    Dr. Blankenheim (BMV) •    Schuler (BMAS) •    Dr. Valdés Cifuentes (BMJV)
  •    Ernoult (BMF) •    Druckenthaner (BMDS) •    Royaee (BMZ) (Vorsitzende Küfner
  eröffnet die Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher
  der Ministerien.) Heute Morgen hat das Bundeskabinett getagt. Wie immer ging es
  um einige internationale Themen. Aber es wurden auch zahlreiche Beschlüsse gefasst.
  Zwei möchte ich Ihnen hier kurz vorstellen. Das Kabinett hat heute den Entwurf eines
  Aktionsprogramms der Bundesregierung zur Umsetzung der Nationalen Kreislaufwirtschaftsstrategie
  beschlossen. Die Bundesregierung setzt damit ein zentrales Vorhaben des Koalitionsvertrags
  im Umweltbereich um. Mit dem Aktionsprogramm verfolgt die Bundesregierung eine ganze
  Reihe von Zielen: mehr Ressourcenschonung und damit auch mehr Umweltschutz, mehr
  Rohstoffsouveränität, weil wir unabhängiger von Importen werden, mehr Wettbewerbsfähigkeit
  und Wachstum durch größere Versorgungssicherheit für die heimische Wirtschaft und
  am Ende auch mehr zukunftsfähige Arbeitsplätze. Hierzu hat Bundesminister Schneider,
  wenn ich richtig informiert bin, bereits informiert. Das Bundeskabinett hat dazu
  in seiner heutigen Sitzung die Stellungnahme der Bundesregierung zum Entwurf der
  Aufgabenplanung der Deutschen Welle bis zum Jahr 2029 beschlossen. Die Stellungnahme
  der Bundesregierung zu inhaltlichen Aspekten der Aufgabenplanung erfolgt auf der
  Grundlage des Deutsche-Welle-Gesetzes. Die Bundesregierung hebt darin erneut die
  unverzichtbare Rolle der Deutschen Welle für die Darstellung Deutschlands und seiner
  Perspektiven auf universelle Werte wie Freiheit, Menschenrechte und Rechtsstaatlichkeit
  in der Welt hervor. Die Deutsche Welle ist hierbei eine Stimme der Freiheit. In
  diesem Sinne hat die Bundesregierung auch ihre Stellungnahme abgegeben. Herr Meyer,
  vielleicht können Sie noch ein bisschen mehr aus der Stellungnahme nennen. Es gab
  ja einige Punkte der anstehenden Kürzungen beim deutschsprachigen Programm der Deutschen
  Welle und die Einstellung des griechischen Programms, die auf Kritik gestoßen sind.
  Geht die Stellungnahme auf diese konkreten Punkte ein? Generell will ich darauf
  hinweisen, dass es im Rahmen des Gesetzes über die Deutsche Welle auch das übliche
  Verfahren ist, dass es eine Planung gibt und dass dann die Bundesregierung, aber
  auch der Bundestag dazu Stellung nehmen. Die Entscheidungen liegen am Ende in der
  Hoheit des Senders. Sie haben nach ein paar Details gefragt. Wie gesagt, ist der
  Bericht relativ umfassend. Im Hinblick auf die zugespitzte geopolitische Dynamik
  ist aus Sicht der Bundesregierung eine stärkere Konzentration auf die Kernaufgaben
  der Deutschen Welle notwendig. Dabei sieht die Bundesregierung die Kerntätigkeit
  der Deutschen Welle vor allem in Zielregionen, in denen die Berichterstattung auf
  deutsche und europäische Interessen einzahlt. Maßgeblich ist dabei ihr Beitrag zur
  Versorgung eingeschränkter Informationsräume mit unabhängiger und verlässlicher
  Berichterstattung. Das heißt, dass der Geist auch dieses Berichts unter der Überschrift
  der Prioritätensetzung steht. Noch einmal: Die Deutsche Welle wird ihre Krisenreaktionsfähigkeit
  stärker dahingehend ausbilden müssen, dass sie auch ohne den stetigen Mittelaufwuchs
  der vergangenen Jahre ‑ ‑ ‑ Wir haben in den vergangenen zehn Jahren einen enormen
  Mittelaufwuchs gesehen. Gleichzeitig zwingt uns natürlich auch die haushalterische
  Situation wie auch in vielen anderen Bereichen zur Priorisierung. Das gilt sicherlich
  auch hier. Mich würde einmal Folgendes interessieren: Der Bundesfinanzminister hatte
  mit Blick auf die Aufstellung des Haushalts im Kabinett eine Deadline für den 20. Mai
  gesetzt. Dabei geht es um zahlreiche Gesetzentwürfe. Mich hat ein bisschen gewundert,
  dass zu diesem Thema jetzt noch nichts im Kabinett war. Es geht ja wirklich um das
  Schließen einer 20-Milliarden-Euro-Lücke, auch um Einnahmeverbesserungen, Stichwort
  Zuckerabgabe, Stichwort Tabaksteuer. Könnten Sie dazu einmal einen Stand geben,
  wie weit dieser Prozess ist? Ich weiß nicht, ob die Darstellung, dass entsprechende
  Gesetze bis zu einem bestimmten Datum vorliegen müssten, ganz richtig ist. Was aber
  richtig ist, ist, dass sich das Bundeskabinett auf Eckwerte für den Bundeshaushalt
  verständigt hat und wir uns jetzt im normalen Haushaltsaufstellungsverfahren befinden,
  das wir bis zur Sommerpause abschließen wollen, und dass es dabei natürlich auch
  Zusagen aus allen Häusern gegeben hat, einen Beitrag zur Konsolidierung, aber auch
  zur Zukunftsfähigkeit der öffentlichen Finanzen zu leisten. Diese Zusagen müssen
  eingehalten werden. Darauf hat der Finanzminister hingewiesen. Darauf wird auch
  der Bundeskanzler hinweisen. Damit befinden wir uns im normalen Verfahren der Haushaltsaufstellung,
  die sicherlich noch bis zum Sommer auch weiterhin intern abgestimmt wird. Ich habe
  eine Nachfrage dazu an das BMG: Wann wird denn das BMG seinen Referentenentwurf
  zur Zuckerabgabe vorlegen? Das BMG ist mit der Ausarbeitung beauftragt. Derzeit
  laufen aber die regierungsinternen Gespräche. Ihnen kann ich nicht vorgreifen. Auch
  zum Kabinett: Eigentlich sollte heute ja auch eine Novelle des Energieeffizienzgesetzes
  verabschiedet werden. Wurde das heute nicht verabschiedet, oder haben Sie es jetzt
  nur nicht genannt? Das Energieeffizienzgesetz befindet sich weiterhin in der Ressortabstimmung.
  Aber ich bin optimistisch, dass wir uns auf der Zielgeraden befinden. Wir sind noch
  nicht ganz über das Ziel gesprungen. Aber wir befinden uns auf der Zielgeraden,
  sodass ich denke, dass das Energieeffizienzgesetz bald ins Kabinett kommen kann.
  Von der DIHK hat es Kritik an den Energieeinsparzielen gegeben, die in dem Gesetz
  verankert sind. Wie sieht die Bundesregierung diese Kritik? Prinzipiell teilen wir
  die Skepsis der Wirtschaft an absoluten und großflächigen Einsparzielen. Anders
  als in dem Artikel beschrieben, halten wir die Erreichung der Einsparziele bis 2030
  aber für ohne Wachstumseinbußen machbar. Voraussetzung ist natürlich, dass die Investitionen
  fließen. Aber wir sind ja dabei, das umzusetzen. Meine Frage geht auch an das BMG:
  Es gab im Kabinett offensichtlich eine Verordnung zum Apothekenhonorar . Demnach
  würde ein Fixbestandteil des Honorars erhöht werden. Meine Frage ist: Wie würden
  diese Mehrausgaben mit Blick auf stabile Beiträge zum allgemeinen Sparkurs passen?
  Dazu hat sich die Ministerin in den vergangenen Wochen und Monaten schon mehrfach
  geäußert. Das Packungsfixum ist im Koalitionsvertrag festgeschrieben. Darauf haben
  sich die Parteien geeinigt. Das wird nun umgesetzt. Die Sparmaßnahmen in der GKV
  bzw. das Sparpaket ist ein separates Gesetzesvorhaben, das sich jetzt im parlamentarischen
  Verfahren befindet. Noch eine technische Frage: Es ist es eine Verordnung. Bedarf
  sie der Zustimmung des Bundesrats, oder reicht es, wenn das Kabinett sie beschließt?
  Für diesen einen Punkt sind erstaunlicherweise wir zuständig. Eine Zustimmung durch
  den Bundesrat oder den Bundestag ist für die Verordnung nicht erforderlich. Ich
  möchte das Thema der Ukraine aufrufen. Es gab jetzt zum Start des Wirtschaftsforums
  in St. Petersburg Drohnenangriffe. Das hat offensichtlich eine große Symbolwirkung.
  Mich würde interessieren, wie die Bundesregierung das bewertet. Ich habe diese Meldung
  zur Kenntnis genommen. Ich habe keine genaueren Kenntnisse, was in Bezug auf dieses
  Wirtschaftsforum genau geschehen ist. Wenn Sie mich dazu allgemein fragen, mache
  ich vielleicht die Anmerkung, dass es ja auch eine Reihe von Personen aus Deutschland
  gibt, die dorthin reisen. Ich glaube, man muss das, was da passiert, in einen gewissen
  Zusammenhang setzen. Ganz klar ist: Seit Beginn des russischen Angriffskrieges gegen
  die gesamte Ukraine, der von Tag eins an auch von schlimmsten Verbrechen gegen die
  ukrainische Zivilbevölkerung geprägt ist, verfolgen die Bundesregierung und die
  EU die grundsätzliche Linie, Kontakte mit russischen Regierungsvertretern auf ein
  Minimum zu beschränken. Erst in der Nacht zum Dienstag gab es wieder massive russische
  Angriffe auf die Ukraine mit mehr als 20 getöteten Zivilistinnen und Zivilisten.
  Das zeigt, wie wichtig es ist, den Druck gegen Russland aufrechtzuerhalten, diesen
  verbrecherischen Angriffskrieg zu beenden, der wirklich gegen die Zivilbevölkerung
  geführt wird. Vor diesem Hintergrund dann den Eindruck einer Normalität in unserem
  Verhältnis zu erwecken, beispielsweise durch die Teilnahme an staatlich organisierten
  Propagandaveranstaltungen, läuft den außen- und sicherheitspolitischen Grundsätzen
  der Bundesregierung zuwider. Deswegen hat das Auswärtige Amt der AfD auch explizit
  von den Reisen abgeraten und sie informiert, dass die Bundesregierung diese Reisen
  nicht unterstützen wird. Gibt es denn eine Bewertung der aktuellen militärischen
  Lage? Hat man das Gefühl, dass sich das Blatt wendet? Der Minister hat die Ukraine
  besucht und dazu auch ganz klar Stellung genommen. Es ist es in der Tat so, dass
  die Ukrainer es geschafft haben, erobertes Gebiet zurückzuerobern. Das zeigt, dass
  die Kooperationen, die es auf industrieller Ebene gibt, durchaus Wirkung zeigen.
  Abschließend beurteilen kann man das sicherlich nicht. Das ist natürlich auch ein
  dynamischer Prozess. Aber in der Tat gibt es auf ukrainischer Seite ein Momentum,
  das es vorher so nicht gab. Ich kann mit Blick auf die ganz aktuelle Lage vielleicht
  noch ergänzen, dass wir in den letzten Tagen erneut massive russische Angriffe in
  der Ukraine gegen Zivilisten und die zivile Infrastruktur mit zahlreichen Toten
  und Verletzten gesehen haben. Sie nehmen inzwischen wirklich ein erschreckendes
  Ausmaß an. Für die Menschen in Kyjiw und Dnipro war die Nacht auf Dienstag, den
  2. Juni, erneut ein Albtraum. Zigtausende Menschen mussten erneut Zuflucht in Schutzräumen
  und U-Bahnen suchen. Das zeigt, dass Putin seine rücksichtslosen Angriffe auf Zivilisten
  trotz des Drucks und der Standfestigkeit der Ukraine fortsetzt. Russland kennt dabei
  offensichtlich keine Grenzen. Wir verurteilen dieses Vorgehen Russlands auf das
  Schärfste. Ob diese Eskalation auch etwas mit Druck zu tun hat, unter dem Russland
  steht, das sei einmal dahingestellt. Aber auch vor dem Hintergrund dessen, was ich
  gerade beschrieben habe, kann ich noch einmal in aller Klarheit und Kürze sagen,
  dass eine Teilnahme an dem Wirtschaftsforum in St. Petersburg aus Sicht der Bundesregierung
  deutschen Interessen klar zuwiderläuft. Herr Meyer und Herr Giese, es ist bekannt
  geworden, dass die Bundesregierung jetzt langsam sehe, dass sich ein Fenster für
  Gespräche mit Russland öffne. Können Sie vielleicht noch ein bisschen erläutern,
  wie man zu dieser Einschätzung kommt, wenn es gleichzeitig eine Verstärkung der
  russischen Angriffe auf die Ukraine gibt? Wir haben immer wieder darauf hingewiesen,
  dass wir ein großes Interesse daran haben, dass dieser Krieg zu einem Ende kommt.
  Das ist im Interesse der Ukraine und der Menschen in der Ukraine; das ist im Interesse
  der Europäischen Union; das ist im deutschen Interesse. Darauf wirken wir natürlich
  ‑ wir tun das seit Wochen, Monaten und Jahren ‑ auf unterschiedliche Weise hin.
  Das hat etwas mit militärischer Unterstützung zu tun. Das hat etwas mit finanzieller
  Unterstützung der Ukraine zu tun, die dafür sorgt, dass die Ukraine hier nicht fällt,
  sondern standhalten kann. Das ist sicherlich auch die Basis für einen langfristigen
  Frieden. Das hat aber auch mit einer politischen Unterstützung zu tun. Wir haben
  immer gesagt: Sollte sich solch ein Zeitfenster öffnen, dann sind wir natürlich
  bereit, hier auch unseren Beitrag zu leisten. ‑ Ich will zum Beispiel an die Berliner
  Gespräche Ende letzten Jahres erinnern, bei denen wir das bereits sehr konkret getan
  und auch erste Fortschritte erzielt haben. Ein Fortschritt in dieser Entwicklung,
  ein Friedensprozess, der scheitert nicht an uns, der scheitert sicherlich nicht
  an der Ukraine, sondern der scheitert aktuell an Wladimir Putin. Gibt es eigentlich
  bei diesen Gesprächsüberlegungen auch schon Abstimmungen mit den wichtigsten Partnern,
  also Frankreich und Großbritannien? Die Abstimmungen sind laufend, auch in den unterschiedlichen
  Formaten. Wir haben jetzt einige Gipfel vor der Brust. Auch da wird die Ukraine
  sicherlich eine ganz zentrale und wichtige Rolle spielen. Wir haben natürlich auch
  immer gesagt, dass in diesen Gesprächen, die wir im europäischen Rahmen mit unseren
  ukrainischen Partnern führen, sicherlich auch mit den USA, ein paar Grundsätze für
  uns gelten. Sie heißen: nichts ohne die Ukraine, sicherlich kein deutscher Sonderweg,
  sondern Teamwork mit den Europäern und eine enge Koordinierung mit den USA. ‑ Das
  sind die Parameter, unter denen wir jetzt auch weitere Gespräche führen. Apropos
  Einschätzungen zur Ukraine: In Kyjiw wurde in der vergangenen Woche der NS-Kollaborateur
  und ehemalige OUN-Führer Andrij Melnyk im Rahmen einer Staatszeremonie auf dem Nationalen
  Militärfriedhof beigesetzt , in Anwesenheit von Präsident Selenskyj, der Melnyk
  als Helden bezeichnete. Aus der von Melnyk geleiteten OUN-Abspaltung ging später
  die SS-Division „Galizien“ hervor. Die Holocaustgedenkstätte Yad Vashem sowie das
  israelische Außenministerium haben die Ehrung scharf kritisiert und erklärt, diese
  untergrabe die moralische Integrität, die für das Gedenken an den Holocaust unerlässlich
  sei. Dazu würde mich interessieren: Wie bewertet die Bundesregierung diese staatliche
  Ehrung eines NS-Kollaborateurs durch die ukrainische Staatsführung? Teilt sie die
  Kritik von Yad Vashem an dieser Ehrung? Mir ist dieser Vorgang nicht bekannt, sorry.
  Deutschland unterstützt die Ukraine mit milliardenschwerer finanzieller Hilfe, darunter
  auch mit Mitteln für staatliche Strukturen, Erinnerungspolitik und Kulturarbeit.
  Kann denn die Bundesregierung ausschließen, dass deutsche Steuergelder, sei es direkt
  oder indirekt über Budgethilfen, in die Finanzierung solcher Staatszeremonien für
  NS-Kollaborateure oder auch in die angekündigte Errichtung eines Pantheons herausragender
  Ukrainer oder auch in die angekündigte Überführung von Bandera aus München in besagtes
  Pantheon geflossen sind? Vielleicht können Sie uns zumindest das kommunizieren.
  Die Unterstützung, die wir der Ukraine leisten, insbesondere in dem Verteidigungskampf
  gegen den mörderischen Angriffskrieg Russlands, wird ordentlich verwendet. Das wird
  auch nachgeschaut. Zum Rest Ihrer Frage: Wie gesagt, mir ist dieser Fall nicht bekannt.
  Die Unterstellungen, die in Ihrer Frage in Bezug auf bestimmte Sachverhalte enthalten
  sind, die sich in der Ukraine abspielen sollen oder auch nicht, möchte ich zurückweisen,
  weil mir dazu nichts bekannt ist. Die polnische Regierung und die israelische Regierung
  haben sich offiziell beschwert. Dass das dem AA entgangen sein soll, wage ich zu
  bezweifeln. Können Sie das nachreichen? Ich schaue, was ich Ihnen dazu sagen kann.
  Wie gesagt, Sie berichten von einem innerukrainischen Vorgang, der mir nicht bekannt
  ist. Wenn ich Ihnen dazu etwas sagen kann ‑ ‑ ‑ Herr Kollege, wir sind nicht für
  Dialoge hier, sondern es sind ja alle Kollegen an Fragen interessiert. Sie hatten
  Ihre Frage und Nachfrage. Sie können sich gern noch einmal melden, wenn Sie auf
  die Liste möchten. Ich würde zu den US-Zöllen fragen. Es gab es ja neue Zolldrohungen
  gegen die EU und weitere Handelspartner. Herr Meyer, könnten Sie das kommentieren?
  Wir haben das, worauf Sie anspielen, jetzt über Medienberichte zur Kenntnis genommen.
  Unser voller Fokus liegt aber darauf, dass das bestehende Zollabkommen, das die
  EU-Kommission mit Unterstützung Deutschlands mit der US-Regierung getroffen hat,
  jetzt zur Umsetzung kommt. Da sind wir auf einem guten Weg. Wir sind sehr optimistisch,
  dass auf dieser Basis dann ein endgültiges Abkommen beschlossen wird und auch in
  Kraft tritt. Begründet werden die Pläne mit unzureichenden Maßnahmen gegen Produkte
  aus Zwangsarbeit. Können Sie diese Vorwürfe nachvollziehen? Wie gesagt, haben wir
  das zur Kenntnis genommen. Wir können das nicht abschließend bewerten. Zunächst
  einmal geht es ja, denke ich, um eine Ankündigung und eine erste Untersuchung. Noch
  einmal: Unser Fokus liegt wirklich komplett auf der Umsetzung des bestehenden Zolldeals.
  Es ist viel Arbeit hineingeflossen. Wir sind auf der Zielgeraden und werden das
  umsetzen. Herr Meyer, mir ist das noch nicht ganz klar. Sie sind dafür, dass das
  Zollabkommen jetzt tatsächlich nicht nur fertig verhandelt, sondern umgesetzt wird,
  obwohl unklar ist, ob die amerikanische Seite dann noch Zölle in Höhe von zehn Prozent
  aufschlägt. Habe ich das richtig verstanden? Wir setzen auf die Einhaltung des Abkommens,
  das wir mit den USA haben. Auf beiden Seiten wurden entsprechende Zusagen gemacht.
  Das wollen wir umsetzen und dafür sorgen, dass das in Kraft tritt. Ich muss noch
  einmal nachfragen, nur damit das klar wird. Heißt eine Einhaltung für Sie, dass
  Sie es ablehnen, dass höhere Zölle als die vereinbarten 15 Prozent auf europäische
  Waren erhoben werden? Wir setzen natürlich darauf, dass unsere Absprachen mit der
  US-Seite gelten, und haben auch keinen Zweifel daran. Es geht um die „return hubs“
  . Dazu gab es eine Einigung auf EU-Ebene . Ihr müssen aber noch der Europäische
  Rat und das Parlament zustimmen. Dazu eine Frage ans BMI: In welchem Rahmen soll
  das geschehen? Sollen sich die europäischen Innenminister noch einmal beraten? Wann
  wird diese Abstimmung sein, und wie wird Deutschland abstimmen? Ich kann Ihnen konkret
  zum Stand sagen, dass es derzeit innerhalb der EU eine Gruppe von fünf Ländern gibt,
  nämlich zusätzlich zu Deutschland die Niederlande, Dänemark, Österreich und Griechenland,
  die sich intensiv mit dem Prozess der „return hubs“ auseinandersetzen und bereits
  am 5. März eine Roadmap dazu aufgesetzt haben. Zum weiteren Vorgehen müssten Sie
  tatsächlich bei der EU nachfragen, also im Rat oder im Parlament, wann die nächsten
  Abstimmungen sind. Können Sie oder kann vielleicht Herr Meyer sagen, wie Deutschland
  abstimmen wird und ob es über diese Abstimmung noch Diskussionen oder Verhandlungen
  geben wird und wie sie aussehen? Wir begrüßen grundsätzlich erst einmal die Einigung
  der Unterhändler von Kommission, Mitgliedstaaten und Europäischem Parlament und
  werden innerhalb der Bundesregierung im Vorfeld einer endgültigen Abstimmung das
  Weitere besprechen. Eine Frage an das Bundesinnenministerium: Verfügt das Bundesministerium
  über Informationen über eine mögliche Zusammenarbeit zwischen fundamentalistischen
  Christen und Rechtsextremisten in Deutschland? Es geht um Informationen, nach denen
  es eine Zusammenarbeit zwischen christlichen Fundamentalisten und Rechtsextremisten
  in Deutschland und europaweit gibt. Es tut mir leid, ich kann Ihnen dazu aktuell
  nichts sagen. Darüber liegen mir keine Kenntnisse vor. Ich habe eine Frage an das
  BMI, und zwar zu den Einbürgerungszahlen . Können Sie die Ursache dafür benennen
  oder eine Interpretation, warum sie aktuell so hoch sind? Ich kann das leider nicht
  weiter interpretieren. Ich kann Ihnen noch einmal die Zahlen nennen, aber ich nehme
  an, Sie kennen sie bereits. Das kam ja vom Statistischen Bundesamt. Die Syrerinnen
  und Syrer sind wieder an erster Stelle. Danach kommen die Personen aus der Türkei
  und der Russischen Föderation. Wenn Sie noch genauer nachfragen wollen, was einzelne
  Staatsangehörigkeiten betrifft, kann ich versuchen, Ihnen darauf eine Antwort zu
  geben. Ja, gern. Sie haben die Syrer ganz vorn genannt. Haben Sie dazu ein paar
  Erklärungen? Mir liegt keine Erklärung vor. Es ist eine Einzelentscheidung jeder
  einzelnen Person, ob sie sich einbürgern lässt oder nicht. Wir sehen, dass die Syrer
  bei den Einbürgerungen zwar wieder an erster Stelle sind, allerdings ist ihre Zahl
  im Vergleich zum Vorjahr deutlich gesunken. Es gab ein Minus von 51 Prozent. Das
  können Sie auch der Pressemitteilung des Statistischen Bundesamtes entnehmen. Frau
  Singer, vielleicht können Sie eine Einordnung vornehmen, wie das Bundesministerium
  diese Entwicklung und die höheren Zahlen sieht. Ist es aus Ihrer Sicht zu begrüßen,
  dass die Zahlen gestiegen sind, oder sehen Sie die Entwicklung mit Sorge? Ich habe
  nichts hinzuzufügen. Es ist, wie gesagt, eine Entscheidung jedes einzelnen Individuums,
  ob es sich einbürgern lässt oder nicht. Die Zahl der Einbürgerungen von US-Bürgern
  ist um hundert Prozent gestiegen. Haben Sie dafür eine Erklärung? Das ist korrekt.
  Das haben wir auch gesehen. Aber auch dafür liegt mir keine Erklärung vor. Eine
  Frage zur China-Strategie der EU : Die EU-Kommission hatte am Freitag eine Orientierungsdebatte
  zu den Handelsbeziehungen und hat die derzeitigen Beziehungen mit China als nicht
  nachhaltig bezeichnet. Teilt die Bundesregierung diese Einschätzung, und was folgt
  daraus? An wen richtet sich die Frage? An das Wirtschaftsministerium oder an mich?
  Grundsätzlich ist es erst einmal gut, dass sich die Europäische Kommission jetzt
  vertieft mit diesem Thema beschäftigen wird. Das hat sicherlich auch etwas mit dem
  Zulauf auf die nächsten Gipfel auf europäischer Ebene zu tun, auf denen man das
  Thema sicherlich weiter vertiefen kann. Für uns in Deutschland und der EU ist die
  wichtigste Aufgabe die Steigerung unserer eigenen Wettbewerbs- und Innovationsfähigkeit.
  Nur dann, wenn wir wirtschaftlich stark sind, sind wir am Ende auch resilient und
  können uns auch unabhängig machen. Zentral sind für die Bundesregierung daher Maßnahmen,
  durch die die Resilienz europäischer Unternehmen und die des Binnenmarktes gestärkt
  werden können. Darauf liegt unser Fokus. Ich kann vielleicht noch gleichlautend
  ergänzen. Das BMWE ist grundsätzlich offen für Diskussionen, wie ein regelbasierter
  Ansatz verbessert werden kann und wie EU-Handelsschutzinstrumente verankert werden
  können. Aber es ist wichtig, dass das im Rahmen eines regelbasierten Ansatzes bleibt
  und einen Ausgleich zwischen Hersteller- und Verwenderinteressen findet. Das hat
  Ministerin Reiche auch immer wieder betont. Herr Meyer, Sie haben die kommenden
  Gipfel angesprochen, also den EU-Gipfel am 18. Juni. Eine der diskutierten Maßnahmen
  ist es, Zölle nicht nur für einzelne Produkte zu verhängen, sondern breiter anzuwenden,
  möglicherweise für gesamte chinesischen Importe. Würde die Bundesregierung eine
  solche Maßnahme unterstützen? Ich kann dem nächsten Gipfel natürlich nicht vorgreifen.
  Wir werden im Vorfeld über die Agenda und die Tagesordnung informieren. Wie gesagt,
  sind wir an dieser Stelle ‑ auch Frau Ungrad hat bereits darauf hingewiesen ‑ grundsätzlich
  offen für Diskussionen, auch darüber, wie der Handelsschutz im Rahmen eines regelbasierten
  Ansatzes verbessert werden kann. Wichtig ist aber, Instrumente abzuwägen und sehr
  sorgfältig zu prüfen. Auch Verwender- und Herstellerinteressen sind dabei zu berücksichtigen.
  Wir drängen natürlich auch immer darauf ‑ das wird Sie nicht überraschen ‑, dass
