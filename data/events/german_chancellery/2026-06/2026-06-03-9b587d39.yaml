  „The Pioneer“-Veranstaltung ja? Herr Kollege, Sie fragen uns ja sehr wortreich,
  und ich antworte dann nicht nur wortreich, sondern auch mit Inhalt. Das habe ich
  beantwortet. Gleich auf Ihre erste Frage habe ich das konkret beantwortet; das können
  Sie gerne noch einmal nachlesen. Herr Kollege, ich lasse jetzt keine Nachfrage zu,
  weil Sie mehrfach die identische Frage gestellt haben. Ja, aber Sie haben ja nun
  hinreichend festgestellt, was die Antwort ist, und es gibt keinen weiteren Erkenntnisgewinn.
  Deswegen würde ich jetzt das nächste Thema aufrufen. Im Nachgang zum Hamburger Olympia-Referendum
  die Frage an Herrn Meyer: Hat die Bundesregierung sich eigentlich schon zum gescheiterten
  Referendum geäußert, und was sagen Sie dazu? Ich muss gestehen: Ich weiß nicht sicher,
  ob wir uns dazu schon geäußert haben. Aber Sie wissen, dass wir eine deutsche Olympia-Bewerbung
  unterstützen. Wir haben das Ergebnis in Hamburg zur Kenntnis genommen. Wir respektieren
  natürlich diese demokratische Entscheidung, wollen aber auch darauf hinweisen, dass
  wir mit München, mit dem Ruhrgebiet und mit Berlin weitere Kandidaten im Rennen
  haben. Deshalb sehen wir diesem weiteren Prozess auch hoffnungsvoll entgegen. Wir
  wollen Olympische Spiele in Deutschland und unterstützen da auch die Bewerbung des
  DOSB. Sie sagten es gerade bereits: Die Bundesregierung unterstützt eine deutsche
  Olympia-Bewerbung ausdrücklich. ‑ Ziehen Sie denn sonst irgendwelche Rückschlüsse
  für sich selbst aus diesem Referendum? Noch einmal: Ich glaube, das muss man respektieren.
  Ich glaube, so hat sich auch der DOSB geäußert, der das ja veranstaltet. Dafür gibt
  es ja auch Referenden, dass die Bürgerinnen und Bürger sich vor Ort ein Bild machen
  können. Wir hatten ein sehr klares Votum in München dafür. Wir hatten auch in anderen
  Regionen ein sehr klares Votum dafür. Wie gesagt, jetzt geht es in den weiteren
  Prozess und auf den freuen wir uns. Nur eine kurze Verständnisfrage, Herr Meyer:
  Der slowakische Ministerpräsident Fico hatte jüngst erklärt, dass unser aller Kanzler
  vorhatte, ihn am 29. Mai zu besuchen und dort auch das Thema „Teilnahme von Fico
  an der 9. Mai-Parade“ zu thematisieren, Herr Merz hätte das dann aber kurzfristig
  abgesagt. Können Sie das so bestätigen?'
