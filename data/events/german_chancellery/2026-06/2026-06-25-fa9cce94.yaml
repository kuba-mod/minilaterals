title: 'Bund-Länder Treffen im Bundeskanzleramt Schneller, effizienter, digitaler:
  Zukunft Deutschlands ankurbeln'
text: 'Bundeskanzler Merz ist mit den Bundesministerinnen und Bundesministern sowie
  den Regierungschefinnen und Regierungschefs der Länder zusammengekommen. Bund und
  Länder haben sich zu ihrer ersten regulären Konferenz in diesem Jahr im Bundeskanzleramt
  getroffen. Im Fokus der Besprechung des Bundeskanzlers mit den Regierungschefinnen
  und Regierungschefs der Länder standen die Modernisierung und Entbürokratisierung
  Deutschlands. Außerdem ging es unter anderem um die Außen- und Verteidigungspolitik,
  den Pakt für den Rechtsstaat, die Finanzlage der Kommunen und die Finanzbeziehungen
  zwischen Bund und Ländern sowie energiepolitische Fragen. Am Ende ist deutlich geworden:
  Bund und Länder arbeiten bereits gut, kooperativ und erfolgreich zusammen und wollen
  in Zukunft bei aktuellen Themen noch intensiver kooperieren. Mehr Informationen
  und Beispiele zu dem Programm von Bund und Ländern PDF, 195 KB, nicht barrierefrei
  zur Staatsmodernisierung und zum Bürokratierückbau finden Sie hier. Beim Thema Staatsmodernisierung
  ziehen Bund und Länder mit großer Kraft an einem Strang: Denn sie ist Voraussetzung
  eines funktionierenden und handlungsfähigen Deutschlands. Und nur in einen handlungsfähigen
  Staat vertrauen Bürgerinnen und Bürger. Daher ist es das gemeinsame Ziel, den Staat
  grundlegend zu modernisieren, schneller und effizienter zu gestalten. Denn das Ziel
  ist, das Leben der Bürgerinnen und Bürger leichter zu machen und die Wirtschaft
  zu entlasten. Um die Modernisierung voranzutreiben, wurden mehrere Vorhaben – auch
  gemeinsam von Bund und Ländern – ins Leben gerufen: Die Föderale Modernisierungsagenda
  ist ein im Dezember 2025 zwischen Bund und Ländern beschlossener Maßnahmenkatalog.
  Bereits im Oktober 2025 hat die Bundesregierung die Modernisierungsagenda Bund verabschiedet.
  Zusätzlich ist der Pakt für Planungs-, Genehmigungs- und Umsetzungsbeschleunigung
  in der finalen Phase. Viele Maßnahmen wurden bereits umgesetzt und waren Gegenstand
  der Gespräche. Es wurde der Fortschrittsbericht zur Föderalen Modernisierungsagenda
  beschlossen und der Zwischenbericht des Beschleunigungspaktes vorgestellt. Deutlich
  wurde: bei den rund 400 Maßnahmen der Programme kommen Bund und Länder gut voran.
  Insbesondere unnötige Behördengänge sollen verringert werden: So wird das Kindergeld
  zukünftig automatisch ausgezahlt und das Verfahren für das Elterngeld wird einfacher
  gestaltet, die Wohnsitzummeldung oder die Beantragung des Personalausweises, die
  An- oder Abmeldung eines Autos kann digital erfolgen. Gleichzeitig wird der Ausbau
  der Infrastrukturen, sei es die Energie- und Verkehrsinfrastruktur oder der Glasfaser-
  und Mobilfunkausbau vorangetrieben. Bundeskanzler Merz betonte: „Wir haben jetzt
  auch die Mittel, dieses Geld schnell umzusetzen in gute Infrastruktur.“ Kommunen
  und Unternehmen sollen ebenfalls durch die Abschaffung von Berichts- und Dokumentationspflichten
  entlastet werden. Bund und Länder einig über Staatsmodernisierung – Deutschland
  wird effektiver Erster Fortschrittsbericht zur Föderalen Modernisierungsagenda Zweiter
  Monitoring-Bericht zum Pakt für Planungs-, Genehmigungs- und Umsetzungsbeschleunigung
  Bund und Länder haben sich auf eine Finanzreform zur Entlastung vor allem der Kommunen
  geeinigt. Denn Städte und Gemeinden stehen vor gewaltigen finanziellen Herausforderungen.
  Der Bundesregierung ist es wichtig, dass Städte, Landkreise und Gemeinden über eine
  ausreichende Finanzausstattung verfügen. Bund und Länder haben daher über eine faire
  Aufgaben- und Finanzierungsverteilung zwischen Bund, Ländern und Kommunen beraten.
  Laut Kanzler Merz haben die Gemeinden vor allem bei der Kinder- und Jugendhilfe,
  dem Bereich des Bundesteilhabegesetzes und beim Unterhaltsvorschuss mit stark steigenden
  Kosten zu kämpfen. Deshalb haben Bund und Länder nun eine erstmalige Einigung erzielt,
  die der Regel folgt: „Wer bestellt, bezahlt“. Die Neuregelung soll ab dem 1. September
  gelten. (Redaktioneller Hinweis: Im Nachgang der Konferenz haben sich Bund und Länder
  auf den 1. Oktober verständigt). Konkret wurde vereinbart, dass der Bund keine Leistungsgesetze
  mehr beschließt, die für die Gemeinden und gegebenenfalls die Länder keinen entsprechenden
  Kostenausgleich vorsehen. Bundeskanzler Merz sprach von einem „neuen Geist des föderalen
  Miteinanders.“ Der neue Mechanismus soll bei neuen Leistungsgesetzen oder bei Änderungen
  solcher Gesetze greifen. Falls die finanziellen Mehrkosten bei Ländern und Kommunen
  bei mehr als 200 Millionen Euro liegen, soll der Bund 80 Prozent übernehmen. Ein
  weiteres wichtiges Anliegen wurde nach langen und intensiven Verhandlungen von Bund
  und Ländern beschlossen: der gemeinsame Pakt für den Rechtsstaat. Ziel des Paktes
  ist die Modernisierung der Justiz. Der Beschluss beinhaltet, dass d er Bund eine
  halbe Milliarde Euro bereitstellen wird, um 2.000 Stellen an den Gerichten und für
  die Digitalisierung zu schaffen. Bund und Länder haben erkannt, dass nur gemeinsam
  die Sicherung und Modernisierung des Rechtsstaats erreicht werden kann: Denn nur
  eine funktionsfähige, unabhängige und leistungsstarke Justiz kann den Rechtsstaat
  aufrechterhalten. Die Justiz schützt die Grundrechte der Bürgerinnen und Bürger
  und löst Streitigkeiten und Konflikte. Nur durch eine gute und effiziente Strafverfolgung
  wahrt die Justiz den Rechtsfrieden und damit das Vertrauen der Menschen und auch
  der Wirtschaft in den Rechtsstaat. Der Zuzug internationaler Studierender und Forschender
  ist von zentraler Bedeutung für den Forschungs- und Wirtschaftsstandort Deutschland.
  Bund und Länder wollen deshalb gemeinsam weiter daran arbeiten, attraktive Rahmenbedingungen
  für die Einreise und den Aufenthalt internationaler Studierender und Forschender
  zu schaffen. Die zuständigen Ministerien auf Bundes- und Landesebene sollen deshalb
  die Visa-Vergabe für Fachkräfte aus der Wissenschaft und für Studierende weiter
  vereinfachen, indem sich beispielsweise Hochschulzulassungsverfahren stärker auf
  die rechtlichen Anforderungen von Visaverfahren ausrichten. Ein verbessertes Zusammenspiel
  zwischen Zulassungs- und Visaverfahren soll Reibungsverluste minimieren und Prozesse
  beschleunigen. Bei der Ministerpräsidentenkonferenz (MPK) kommen die Regierungschefinnen
  und -chefs der 16 Bundesländer zusammen. Die Konferenzen befassen sich mit Themen
  der Bundes- und Länderebene oder auch mit aktuellen internationalen Fragen. Zweimal
  im Jahr kommen die Länderchefinnen und -chefs anschließend mit dem Bundeskanzler
  zusammen. Im jährlichen Wechsel übernimmt ein Bundesland nach festgelegter Reihenfolge
  den Vorsitz der MPK – derzeit Rheinland-Pfalz. Den Ko-Vorsitz hat aktuell Niedersachsen
  inne.'
