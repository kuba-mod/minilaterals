date: '2026-06-25'
type: press_release
source_name: german_chancellery
title: Pressekonferenz nach dem Bund-Länder-Treffen „Neuer Geist des föderalen Miteinanders“
text: '„ Wir bringen unser Land voran“, betonte Bundeskanzler Merz in der Pressekonferenz
  nach der Ministerpräsidentenkonferenz. Bei der ersten gemeinsamen Konferenz zwischen
  Bund und Ländern in diesem Jahr wurde schnell deutlich: Der Schulterschluss zwischen
  Bund und Ländern funktioniert, die gemeinsamen Linien sind sichtbar und die Solidarität
  und der Zusammenhalt sind stärker denn je, um die notwendigen Reformen und Neuerungen
  für dieses Land umzusetzen. Im Mittelpunkt der Beratungen standen die Staatsmodernisierung,
  die Entbürokratisierung des Landes und die Finanzbeziehungen von Bund und Ländern.
  Bund und Länder haben aufgezeigt, vor welchen Herausforderungen sie stehen - und
  zeitgleich verdeutlicht, dass sie die Lösung dieser Herausforderungen nur gemeinsam
  angehen wollen. Die Geschlossenheit zwischen Bund und Ländern ist auch auf der Pressekonferenz
  immer wieder von beiden Seiten betont worden. Mehr Informationen und Beispiele zu
  dem Programm von Bund und Ländern PDF, 195 KB, nicht barrierefrei zur Staatsmodernisierung
  und zum Bürokratierückbau finden Sie hier. Großes Thema der gemeinsamen Pressekonferenz
  war die angespannte Finanzlage der Kommunen. Bund und Länder haben sich auf eine
  Finanzreform zur Entlastung der Städte und Gemeinden verständigt. Der Bundeskanzler
  betonte, dass man bei dem Thema das erste Mal einen Beschluss gefasst habe. Dieser
  folge dem Grundsatz: „Wer bestellt, bezahlt“. Merz sprach von einem „neuen Geist
  des föderalen Miteinanders“. Die Regelung solle ab dem 1. September gelten. (Redaktioneller
  Hinweis: Im Nachgang der Konferenz haben sich Bund und Länder auf den 1. Oktober
  verständigt). Ab dann will der Bund keine Leistungsgesetze mehr beschließen, die
  für Gemeinden und gegebenenfalls die Länder keinen entsprechenden Kostenausgleich
  vorsehen. Das sei bisher ein großes Problem gewesen. Gerade bei der Kinder- und
  Jugendhilfe, dem sogenannten Teilhabegesetz und dem Unterhaltsvorschussgesetz seien
  die Kosten für Kommunen stark gestiegen. Kanzler Merz machte deutlich, dass Bund
  und Länder bei der Modernisierung des Staates eng zusammenarbeiten und dafür sorgen,
  „dass wir Maßnahmen umsetzen“. Insgesamt gebe es rund 400 beschlossene Maßnahmen,
  mit denen man sehr gut vorankomme. Er bekräftigte nochmals das Ziel der Staatsmodernisierung:
  „Wir machen damit das Leben der Bürgerinnen und Bürger in Deutschland einfacher.“
  Als Beispiele nannte der Kanzler das Kindergeld, das in Zukunft automatisch gezahlt
  werde. Zudem erspare man den Bürgerinnen und Bürgern unnötige Behördengänge, und
  auch ein Auto könne nun digital an- und abgemeldet werden. Gleichzeitig werde Tempo
  bei den Infrastrukturvorhaben gemacht. Für die Zukunft zeigte sich Merz zuversichtlich:
  „Wir kommen voran!“ Bund und Länder einig über Staatsmodernisierung – Deutschland
  wird effektiver Erster Fortschrittsbericht zur Föderalen Modernisierungsagenda Zweiter
  Monitoring-Bericht zum Pakt für Planungs-, Genehmigungs- und Umsetzungsbeschleunigung
  Sehr geehrter Herr Bundeskanzler, lieber Gordon Schnieder, ich darf mich erst einmal
  ganz herzlich bedanken. Denn ich finde, diese Ministerpräsidentenkonferenz, vor
  allem die gemeinsame Runde, die wir mit dem Bundeskanzler und dem Bundeskabinett
  haben, hat große Schritte nach vorn gebracht. Ich will mit zwei ganz zentralen Themen,
  an denen wir gearbeitet haben, anfangen. Wir haben uns sehr intensiv mit der Frage
  beschäftigt, ob wir uns auch auf Bundesebene auf das, was zwischen den Ländern und
  den Kommunen geregelt ist – wer ein Gesetz auf den Weg bringt, der muss auch die
  Kosten tragen –, verständigen können. Ich bin sehr dankbar. Wir haben das, was unter
  dem Begriff der Veranlassungskonnexität immer wieder diskutiert wurde, jetzt vereinbart
  und sind uns einig geworden, und zwar, wie ich finde, in einem fairen Miteinander
  und mit einem fairen Ergebnis. Ich will die Zahlen kurz nennen. Es gibt eine Schwelle,
  ab der die ganze Regelung greift. Das sind 200 Millionen. Es gibt einen Anteil,
  der fixiert ist, 80 Prozent. Ich glaube, das ist ein fairer Ausgleich, den wir haben.
  Es gibt, ehrlich gesagt, auch eine Symmetrie, also mit neuen Gesetzen, die später
  kommen. Dann gibt es auch ein Zurück. Denn es ist völlig klar: Wenn der Bund am
  Ende Entscheidungen trifft, die wieder zur Reduzierung der Kosten führen, dann muss
  es auch ein Zurück der Mittel geben. Das ist, glaube ich, die Art und Weise, wie
  Bund und Länder gemeinsam arbeiten müssen. Wir haben das mit der großen Herausforderung
  verbunden, die wir bei den Kommunen sehen. Die Belastungssituation bei den Kommunen
  ist immens; das muss man sagen. Es ist gar nicht einmal die Einnahmesituation allein;
  es ist vor allen Dingen die Ausgabensituation. Die Ausgaben haben sich enorm gesteigert.
  Wir standen vor der großen Herausforderung: Was können wir tun, und zwar immer mit
  Blick darauf, dass auf der einen Seite Respekt vor den Menschen, über die wir reden,
  und ihre Würde ganz zentral sind und wir auf der anderen Seite trotzdem sagen: Gibt
  es nicht Möglichkeiten, den Aufwuchs der Kosten deutlich zu minimieren? Auch da,
  finde ich, haben wir in intensiver Arbeit der Länder mit dem Bund und den kommunalen
  Spitzenverbänden ein gemeinsames Ergebnis erzielt. Wir haben es heute auf den Weg
  gebracht; es gibt eine gemeinsame Positionierung. Das kann jetzt in die Reformen
  einfließen und umgesetzt werden und stellt sicher, dass auf der einen Seite ganz
  zentrale Themen, die auch den Menschen wichtig sind, um die es geht, gesichert bleiben
  und auf der anderen Seite Dinge wie Poollösungen und Vereinfachung komplexer Verfahren
  jetzt wirklich im Mittelpunkt der Umsetzung stehen. Dass uns das gemeinsam gelungen
  ist, ist, würde ich sagen, schon ein Novum. Denn der klassische Weg wäre gewesen:
  Der Bund macht Gesetze, und die Länder sagen, ob sie es denn wollen oder nicht. ‑
  Ich finde, wenn man einen handlungsfähigen Staat will, dann braucht man eine Gemeinsamkeit
  von Bund und Ländern. Ich finde, das haben wir hier eindrucksvoll unter Beweis gestellt.
  Vielleicht darf ich das sagen: Wir wollen bei anderen Themen – Stichwort „Energie“,
  „wirtschaftliche Entwicklung“ – diese Gemeinsamkeit von Bund und Ländern zukünftig
  viel stärker nutzen. Der letzte Aspekt, den ich nennen will: Wir haben beim Thema,
  wie wir die Dinge einfacher und schneller machen können, Staatsmodernisierung, Bürokratieabbau,
  genau das auch bewiesen. Da ist es gerade die hervorragende Zusammenarbeit mit Herrn
  Wildberger, die die Länder praktizieren, bei der wir Input geben, bei der der Bund
  mit uns zusammenarbeitet und wir wirklich zeigen: Wenn wir dieses Land voranbringen
  wollen, dann darf das nicht an föderalen Grenzen scheitern und dann dürfen föderale
  Grenzen keine Hürden sein, sondern dann müssen wir sie gemeinsam überwinden. Deswegen
  bin ich sehr dankbar, dass wir das heute hier gemeinsam darstellen und vertreten
  können und dass wir, glaube ich, auch das ganz wichtige Zeichen senden: Dieser Staat
  ist handlungsfähig, und das wollen wir damit unter Beweis stellen. Ich will mich
  dem Dank anschließen. Wir haben heute eine sehr gut vorbereitete und auch sehr gut
  durchgeführte Sitzung der Ministerpräsidentenkonferenz gehabt. Ich will bei dieser
  Gelegenheit Gordon Schnieder, dem Ministerpräsidenten des Landes Rheinland-Pfalz,
  noch einmal ein herzliches Willkommen sagen. Er hat die Aufgabe des Vorsitzes der
  MPK gleich mit übernommen. Dank an Olaf Lies, der jetzt in den stellvertretenden
  Vorsitz gewechselt ist. Ich habe also sozusagen die beiden Koordinatoren der Länder
  hier neben mir sitzen, mit denen zusammen wir diese Themen vorbereitet und heute
  gut besprochen und entschieden haben. Herr Lies hat schon auf das Thema hingewiesen.
  Wir hatten ein großes Thema, das wir uns ziemlich genau vor einem Jahr vorgenommen
  haben, nämlich die Klärung der Frage, wie Bund und Länder jenseits der verfassungsrechtlichen
  Regeln, die wir ja haben, zum Beispiel bei Steuergesetzen, miteinander umgehen,
  wenn der Bund Leistungsgesetze beschließt, die die Länder und die Gemeinden bezahlen
  müssen. Das ist in der Tat ein großes Problem. Wir sehen insbesondere bei den Gemeinden
  in Deutschland einen sehr hohen Kostenaufwuchs, insbesondere in den Bereichen der
  Kinder- und Jugendhilfe, des sogenannten Teilhabegesetzes und des Unterhaltsvorschussgesetzes.
  Wir haben verabredet, dass wir in Zukunft, ab dem 1. September (redaktioneller Hinweis:
  Im Nachgang der Konferenz haben sich Bund und Länder auf den 1. Oktober verständigt)
  , keine Gesetze dieser Art mehr machen, die den Gemeinden und gegebenenfalls auch
  den Ländern keinen entsprechenden Kostenausgleich geben. Das folgt dem Grundsatz:
  Wer bestellt, bezahlt. Diesen Grundsatz werden wir demnächst im Verhältnis zwischen
  Bund und Ländern gemeinsam einhalten. Das will ich auch mit besonderem Dank sagen.
  Im vergangenen Jahr, ziemlich zu Beginn meiner Amtszeit, habe ich alle Ministerpräsidenten
  eingeladen. Wir haben uns hier in Berlin getroffen. Wir haben uns genau darauf verständigt,
  darauf, dass wir einen neuen Geist des föderalen Miteinanders praktizieren. Dies
  haben wir heute bei einem wirklich großen und wichtigen Thema das erste Mal in einen
  Beschluss gefasst, der, wie gesagt, ab dem 1. September (redaktioneller Hinweis:
  Im Nachgang der Konferenz haben sich Bund und Länder auf den 1. Oktober verständigt)
  gilt, und zwar für beide Seiten. Wenn wir entlasten, dann wird der Bund gegebenenfalls
  Umsatzsteueranteile zurückbekommen. Wenn wir belasten, dann werden die Länder und
  gegebenenfalls die Gemeinden Umsatzsteuerpunkte von uns bekommen. Wir alle haben
  angespannte Haushaltssituationen. Wir werden also in Zukunft gemeinsam und auch
  aus einem gemeinsamen Interesse heraus, darauf achten, dass wir das, was wir beschließen,
  auch gemeinsam bezahlen, sei es auf der Ebene des Bundes, der Länder oder der Gemeinden.
  Deswegen will ich noch einmal sagen: Ausdrücklich herzlichen Dank an alle, die daran
  so aktiv mitgewirkt haben! Das Thema der Bund-Länder-Staatsmodernisierung und des
  Digitalisierungspaktes, den wir am 4. Dezember des vergangenen Jahres miteinander
  beschlossen haben, ist heute sozusagen mit einem Statusbericht begleitet worden.
  Ich will mich ausdrücklich dem Dank an den Kollegen Karsten Wildberger anschließen,
  der nicht nur für den Bund, sondern auch in der Zusammenarbeit mit den Ländern dafür
  sorgt, dass wir wirklich Schritt für Schritt in die Digitalisierung und in die Staatsmodernisierung
  gehen und dass das nicht nur eine Aufgabe des Bundes ist, sondern dass wir das auch
  föderal verstehen, mit den Ländern, mit den Gemeinden zusammen. Bund und Länder
  arbeiten dabei wirklich eng zusammen und sorgen dafür, dass wir diese Maßnahmen
  schnell umsetzen. Uns wurden auch Zwischenberichte zum Pakt für Planungs- und Genehmigungsbeschleunigung
  vorgelegt. Sie zeigen, dass wir bei den rund 400 Maßnahmen – ich will es noch einmal
  betonen: 400 gemeinsam beschlossene Maßnahmen – sehr gut vorankommen. Wir machen
  damit das Leben der Bürgerinnen und Bürger in Deutschland einfacher. Das gilt zum
  Beispiel für das Kindergeld, das in Zukunft automatisch gezahlt wird. Wir ersparen
  den Bürgerinnen und Bürgern unnötige Behördengänge. Auch ein Auto kann nun digital
  an- und abgemeldet werden. Sei es bei der Kommunikation oder beim E-Mail-Standard,
  wir sind wirklich auf einem guten Weg. Wir machen Tempo auch bei den Infrastrukturvorhaben.
  Ich will den Kolleginnen und Kollegen der beiden Bundestagsfraktionen, von CDU /
  CSU und SPD , ausdrücklich Danke dafür sagen, dass wir in dieser Woche, am heutigen
  Tag, das Infrastruktur-Zukunftsgesetz beschlossen haben. Dieses Gesetz geht jetzt
  in den Bundesrat und kann in der übernächsten Woche im Bundesrat beschlossen werden,
  sodass wir jetzt mit einer ganz erheblich beschleunigten Genehmigungspraxis in Bezug
  auf die großen Infrastrukturvorhaben in Deutschland rechnen dürfen. Wir haben nicht
  nur Geld, wir haben jetzt auch die Mittel, um dieses Geld schnell in gute Infrastruktur
  umzusetzen. Sie sehen an diesen Beispielen: Wir kommen voran. Das alles hat Vorlauf,
  das hat auch gedauert, aber jetzt geht es doch Zug um Zug. Wir haben am Dienstag
  dieser Woche hier gesessen und gemeinsam die Vorschläge der Alterssicherungskommission
  entgegengenommen, und wir haben zugesagt, dass wir sie umsetzen wollen. Ich will
  es zum zweiten Mal in dieser Woche von dieser Stelle aus sagen: Wir haben auch im
  Verhältnis zwischen Bund und Ländern ein neues Kapitel der föderalen, kollegialen,
  kooperativen Zusammenarbeit aufgeschlagen. Ich bin sehr dankbar dafür, dass wir
  uns auch von einem gemeinsamen Verständnis der Notwendigkeit der Staatsmodernisierung
  leiten lassen. Das ist heute auch in dieser Ministerpräsidentenkonferenz in einer,
  wie ich finde, wirklich ausgesprochen guten Atmosphäre zum Ausdruck gekommen. Wir
  bringen unser Land voran. Dies ist meine erste Pressekonferenz im Rahmen einer Sitzung
  der MPK . Ich bin am 18. Mai ins Amt gekommen und durfte dann direkt den Vorsitz
  der MPK übernehmen. Die Kolleginnen und Kollegen haben es mir leicht gemacht. Vielen
  Dank besonders auch an Olaf Lies, mit dem ich mich in den letzten Tagen abstimmen
  konnte, aber auch Dank an Michael Kretschmer, der das vorher gemacht hat und mich
  dabei ebenfalls unterstützt hat. Der Bundeskanzler hat es gerade gesagt: Wir befinden
  uns mitten in den großen Reformen. Ich bin sehr froh und dankbar, dass die Vorschläge
  aus der Kommission in dieser Einstimmigkeit am Dienstag auf den Tisch gekommen sind.
  Ich betone hier auch noch einmal, dass ich nichts davon halte, dass wir zum jetzigen
  Zeitpunkt einzelne Punkte herausnehmen und sie schon öffentlich zerreden, sondern
  dass wir uns das Gesamtpaket anschauen. Ich glaube, das ist das, was auch die Menschen
  in diesem Land von uns erwarten. Sie erwarten zu Recht, dass wir gemeinsame Lösungen
  finden. Auch wenn das eine oder andere belastend ist, habe ich in den letzten Jahren
  immer wieder gemerkt, dass die Bürgerinnen und Bürger wissen, dass wir hier Reformbedarf
  haben und dass nicht nur gute Nachrichten herüberkommen. Aber wenn wir in eine ordentliche,
  erklärende Kommunikation gehen, dann können wir das den Menschen auch beibringen,
  dann gewinnen wir sie auch an unsere Seite. Immer dann, wenn Bund und Länder eng
  und vertrauensvoll zusammenarbeiten, gelingt es uns auch, das Land voranzubringen,
  und ich bin dankbar, dass genau das uns heute hier auch wieder gelungen ist. Das
  ist auch das Signal, das wir heute senden können: Dieser Staat funktioniert. Wir
  kommen nicht nur ins Handeln, sondern wir sind mittendrin. Die Situation der Kommunen
  liegt uns allen besonders am Herzen. Das, was wir gerade im letzten Jahr mit rund
  30 Milliarden Euro an Defiziten erlebt haben, zeigt: Dort ist etwas in Schieflage
  geraten. Aber gerade vor Ort, bei den Kommunen, entscheidet sich, ob Politik tatsächlich
  handlungsfähig ist. Es geht darum, dass wir auch dort, wo sich Menschen abgehängt
  fühlen, weil sie glauben, der Staat funktioniere nicht – auf der untersten Ebene,
  dort, wo am schnellsten entschieden werden kann, wo am schnellsten die Umsetzung
  geschehen kann, wo wir die Schulen sanieren können, wo wir für verlässliche Kitas
  sorgen können, wo die Straßen auch wieder in ordentlichen Zustand gesetzt werden –,
  zeigen, dass der Staat doch funktioniert, und dass wir das Vertrauen derer, die
  möglicherweise die etablierten Parteien in diesem Vertrauen hinter sich gelassen
  haben, dann auch wieder zurückgewinnen. Deswegen brauchen wir finanzielle Gestaltungskraft,
  auch wieder bei den Kommunen. Die Länder sind bereit und waren das auch, ihren Anteil
  zu übernehmen, kommen aber auch an finanzielle Grenzen. Genauso sehen wir, dass
  sich auch der Bund in schwierigen Situationen befindet, dass auch dort eine schwierige
  haushalterische Situation herrscht. Deswegen bin ich froh, dass wir uns heute hier
  auf diese Veranlassungskonnexität geeinigt haben, verständigt haben – 80 Prozent,
  Bagatellgrenze 200 Millionen – und dass wir uns dort gemeinschaftlich auf den Weg
  machen. Es ist auch in der Konferenz angeklungen: Wir reden dann schon im nächsten
  Jahr über ein Entlastungspotenzial bei den Kommunen von drei Milliarden, und das
  ist über die nächsten Jahre anwachsend. Das ist ein klares und deutliches Zeichen
  auch nach draußen: Wir – der Bund, die Länder – werden der Verantwortung für die
  Kommunen gerecht. Deswegen bin ich dankbar, dass wir diese Einmütigkeit heute gezeigt
  haben. Das ist für mich ein ganz bedeutendes Signal in Richtung der Kommunen, aber
  eben auch in Richtung der Menschen im Land. Die Staatsmodernisierung ist genannt
  worden. Ich möchte mich beim Kollegen Wildberger auch ganz herzlich für den Weg
  bedanken, auf den man sich hier bundesseitig gemacht hat. Dabei geht es um Bürokratieabbau,
  dabei geht es um das „ Once-Only “-Prinzip, dabei geht es um Genehmigungsfiktion,
  all das, was das Leben der Menschen in diesem Land dann auch wirklich erleichtert.
  Für mich war noch ein dritter Punkt heute wichtig, und auch der wurde auf den Weg
  gebracht, der Pakt für den Rechtsstaat. Die Menschen können sich zu Recht darauf
  verlassen, dass diese Regierung und die Länder miteinander handeln, dass man auch
  innerhalb einer überschaubaren Zeit Recht bekommt, dass der Rechtsstaat hier auch
  innerhalb einer überschaubaren Zeit durchgreift. Wir haben uns mit den drei Säulen
  auf den Weg gemacht: Digitalisierung, aber auch Verfahrensbeschleunigung und insbesondere
  Personal. In diesem Pakt für den Rechtsstaat stecken 2.000 zusätzliche Stellen aufseiten
  der Richterinnen und Richter, der Staatsanwältinnen und Staatsanwälte, und zehn Prozent
  der Stellen können dann auch für unterstützendes Personal genutzt werden, eben im
  Bereich der IT -Infrastruktur. Aber auch das ist ein deutliches Signal für die Menschen
  in diesem Land, gerade das Rechtsbedürfnis, und das innerhalb eines überschaubaren
  Zeitraums, dann künftig auch zu befriedigen. Auch da bin ich dankbar, dass das Bund
  und Ländern gelungen ist. Von daher bleibt mir heute nach meiner ersten MPK -Sitzung
  zum Abschluss nur, Dank zu sagen für die Aufnahme in den Länderkreis, aber gerade
  auch in Richtung des Bundeskanzlers und der Bundesregierung für das gute Miteinander
  mit den 16 Regierungschefinnen und -chefs. Auch dafür, lieber Friedrich Merz, herzlichen
  Dank! Es geht darum, wenn diese Signale auch über die nächsten Reformen jetzt nach
  draußen gelangen, dass wir uns nicht öffentlich verzanken, dass wir nicht einzelne
  Dinge öffentlich zerreden, sondern dass wir in einer erklärenden Kommunikation die
  Gesamtpakete an den Start bringen. Da kommen ja noch einige. Da kommt noch die Pflege,
  da kommen noch Steuerreformen. Wenn wir über das alles in dieser Tonalität sprechen,
  die wir diese Woche jetzt auch erkennen konnten und die wir während unserer vertrauensvollen
  Konferenz jetzt auch mit den Ergebnissen erleben konnten, dann, bin ich sicher,
  wirkt das auch nach draußen. Dann bekommen wir auch die Ruhe und dieses Vertrauen
  wieder zurück, auf das wir so lange gewartet haben. Vielen Dank. Frage : Ich habe
  zunächst eine Frage an die beiden Ministerpräsidenten zum Thema der Reformen. Es
  sind ja jetzt nicht alle Länder der Meinung der Bundesregierung, dass man die Rentenreform
  oder die Vorschläge der Rentenkommission eins zu eins umsetzen sollte. Die Ministerpräsidentin
  von Mecklenburg-Vorpommern hat sich dagegen ausgesprochen. Ist das eine Einzelmeinung?
  Haben sich also heute alle anderen 15 Ministerpräsidenten hinter diese Vorschläge
  gestellt? Wie genau stellen Sie sich die bessere Einbindung beim Thema der Einkommensteuer
  vor? Sie haben ja heute Nachmittag schon gefordert, dass die Länder dabei besser
  eingebunden werden müssten. Herr Bundeskanzler, sehen Sie diese Einigkeit bei der
  Rentenreform in der Koalition jetzt als ein Momentum an, das Sie auch in die Sitzung
  des Koalitionsausschusses in der nächsten Woche tragen können? Können Sie sich also
  vorstellen, dass dort im selben Stil Einigungen bei den schwierigen Themen der Steuer
  und des Arbeitsmarktes erzielt werden können, sodass quasi ein Gesamtkunstwerk für
  den kompletten Reformbereich entstehen kann? Ministerpräsident Lies: Ich kann gerne
  starten. Das Ergebnis der Alterssicherungskommission halte ich für ein sehr ausgewogenes
  Ergebnis. Es ist natürlich kein Gesetz – das muss man sagen –, sondern das sind
  sauber definierte Punkte, die in Summe eine Lösung beschreiben. Jetzt kommt das
  Gesetz in die Umsetzung, und dabei gibt es immer noch einmal Handlungsbedarf. Wie
  setzt man das um? Was ist mit dem Vertrauensschutz? Welchen Teil nimmt man, Stichwort
  Minijobs? Wo lässt man es vielleicht, wo lässt man es nicht? Diese Themen kann man
  im Verlauf klären. Aber man darf jetzt nicht den Eindruck erwecken, dass man jetzt
  Bausteine herausnimmt, die man mag, und Bausteine herausnimmt, die man nicht mag,
  sondern wenn, dann muss es darum gehen, im Prozess, in der Umsetzung zu sehen, wie
  wir die Dinge gestalten können, wie wir sie umsetzen wollen. Aber ich halte das
  Paket insgesamt für ein ausgewogenes Paket. Ministerpräsident Schnieder: Da kann
  ich Olaf Lies auch nur unterstützen; das sehe ich auch so. Das war auch kein Thema
  der MPK . Wir haben jetzt nicht mit 16 Kolleginnen und Kollegen dagesessen und über
  das Paket gesprochen. Es geht mir darum, dass dieser gelungene Vorschlag, der auf
  dem Tisch liegt, jetzt nicht in Einzelteile zerlegt wird und öffentlich in den Zank
  gebracht wird. Dabei können wir über Punkte reden, zum Beispiel über Minijobs. Da
  habe ich jetzt die ersten Kritikpunkte nur einseitig gehört. Dass wir über die Minijobs
  ganz, ganz viele Frauen in die Altersarmut ziehen, und das mit offenem Auge, und
  sie dann wieder in der Soziallast lassen, ist komplett ausgeblendet. Das ist meine
  Bitte, die ich nach draußen gebracht habe: Jeder hat gute Gründe dafür und dagegen.
  Es geht darum, dass wir diese Themen jetzt als Paket – das ist ein Vorschlag – in
  den Koalitionsausschuss bringen, in die Kabinette bringen, in ein Gesetzgebungsverfahren
  bringen und darüber politisch ringen und politisch streiten, aber nicht mit öffentlichem
  Zerreden und öffentlichem Gezanke. Dann bin ich fest davon überzeugt, dass hervorragende
  Ergebnisse dabei herauskommen, weil die Menschen in diesem Land wissen: Es muss
  sich etwas ändern, sonst steigen die Beiträge, und die Rentenzahlungen werden noch
  geringer. Das ist allen bewusst. Da müssen wir jetzt erklärend kommunizieren, und
  das am besten in einer Geräuschkulisse, die dem Ganzen auch angemessen ist. Bundeskanzler
  Merz : Ich kann das nur unterstreichen. Ich sehe dieses Momentum schon seit geraumer
  Zeit. Wir haben das ja auch in großer Übereinstimmung am Dienstagmorgen von hier
  aus vorgestellt. Ich gehe auch mit großer Zuversicht in die nächsten Tage. Wir werden
  ja Ende nächster Woche dann auch noch einmal die Sitzung des Koalitionsausschusses
  haben – die bereiten wir seit längerer Zeit sehr intensiv vor –, und wir werden
  das auch unter den Parteivorsitzenden besprechen. Wir sind uns alle darüber im Klaren,
  dass wir mehr machen müssen. Wir haben ein ziemlich großes Aufgabenpaket vor uns,
  und im Mittelpunkt steht für mich dabei die Wiederherstellung der preislichen Wettbewerbsfähigkeit
  unserer Volkswirtschaft. Wir verlieren zurzeit pro Tag. zwischen 300 und 500 Arbeitsplätze.
  Jeden Tag gehen eine zweistellige Zahl von Unternehmen in die Insolvenz. Das heißt,
  wir müssen jetzt wirklich sehen, dass wir schnell aus dieser schwierigen Lage herauskommen.
  Es muss jetzt schnell wieder dafür gesorgt werden, dass die Arbeitsplätze in Deutschland
  sicher und die Unternehmen international und national wettbewerbsfähig sind. Das
  steht für uns im Vordergrund. Das ist sozusagen die Überschrift, und unter dieser
  Überschrift müssen wir jetzt ganz systematisch ein paar Punkte besprechen und auch
  umsetzen. Frage : Herr Bundeskanzler, gilt die Vereinbarung bei der Konnexität auch
  für Steuergesetze und für die Umsetzung von EU -Gesetzgebungen? An die beiden Ministerpräsidenten:
  Bei den Themen der Steuerreform, die diskutiert wird, und der Gesundheitsreform,
  die jetzt nicht erwähnt wurde, entsteht schon ein bisschen der Eindruck, dass die
  Länder damit enorme Probleme haben. Deswegen noch einmal ganz konkret die Frage:
  Sind Sie da eher im Bremserhäuschen, oder sind Sie auch bereit, bei der Gesundheitsreform
  und bei der Steuerreform Sachen mittragen, die auch für die Länder neue Belastungen
  sind? Ministerpräsident Lies: Ich will das gerne noch mal aufgreifen. Wir haben
  uns sowohl bei dem Thema Gesundheitsreform, das ja sehr stark mit der Frage der
  Finanzierung der Krankenhäuser zusammenhängt, wie auch bei dem Thema der Einkommenssteuerreform
  klar gesagt: Wenn es eine Lösung gibt, dann kann sie nicht zulasten der Kommunen
  gehen – ich will mich einmal ausschließlich auf die Kommunen beschränken. Denn wir
  können jetzt nicht auf der einen Seite Entscheidungen treffen, die eine zukünftige
  Stabilität der Finanzierung der Kommunen gewährleisten – Stichwort Konnexität –
  und die durch die Vereinbarungen, die wir getroffen haben, mindestens ein Mindern
  des Anwachsens, also eine Reduzierung der Belastungen hervorrufen, dann können wir
  nicht an anderer Stelle zu Entscheidungen kommen, die wieder zu einer Belastung
  der Kommunen führen; denn sowohl was das Thema Gesundheit und Krankenhausfinanzierung,
  wie auch was das Thema strukturelle Finanzierung angeht, ist da wirklich Land unter.
  Insofern sind wir uns da einig: Wir haben die Kommunen im Blick. Man merkt, ich
  betone ganz besonders die Kommunen; denn wir haben ein gemeinsames Verständnis dafür,
  dass wir die in den Blick nehmen müssen. Den Rest, also wie wir damit umgehen, können
  wir, Bund und Länder, miteinander besprechen, und da haben wir sehr deutlich gemacht:
  Wir reden miteinander und schauen uns das sehr genau an. Wir müssen aber ganz besonders
  die schwierige Situation der kommunalen Seite im Blick haben. Gordon Schnieder hat
  es gerade gesagt: Da spüren die Menschen am allerersten, ob die Handlungsfähigkeit
  des Staates gewährleistet ist. Da sind wir uns, glaube ich, einig, und dafür bin
  ich übrigens auch sehr dankbar. Bundeskanzler Merz: Ich will das hier sehr klar
  beantworten; denn die Frage ist wichtig gewesen, Herr Kollege: Das, was wir mit
  der Veranlassungskonnexität verabredet haben, gilt für Leistungsgesetze, die sozusagen
  Zahlungsverpflichtungen auslösen. Es gilt nicht für Steuergesetze ‑ da hat das Grundgesetz
  eine abschließende Regelung betroffen ‑ und es gilt auch nicht für Gesetze, die
  uns durch die Europäische Union oder durch die Verfassungsrechtsprechung sozusagen
  auferlegt werden. Das war eine Diskussion, die auch aus Sicht des Bundes wichtig
  war. Wir können durch eine solche Verabredung mit den Ministerpräsidenten das Grundgesetz
  nicht ändern. Im Grundgesetz steht die Steuerverteilung, und im Grundgesetz stehen
  auch die entsprechenden steuerrechtlichen Rahmenbedingungen. Wir können und wollen
  uns auch nicht sozusagen an Vorschläge oder Anforderungen binden, die durch Rechtsprechung
  und Rechtsetzung der Europäischen Union von uns umgesetzt werden müssen. Das war
  auch das gemeinsame Verständnis mit den Ländern, und dafür bin ich dankbar, weil
  die Länder auf diese Weise auch anerkannt haben, dass es bestimmte Entscheidungen
  des Bundes gibt, auf die wir dispositiv keinen Einfluss haben, sondern die wir umsetzen
  müssen. Dass das dann von Bund und Ländern gemeinsam getragen werden muss, ist mit
  den Ländern im Konsens entschieden worden. Ministerpräsident Schnieder : Noch kurz
  zur Ergänzung: Gold-Plating wird ausgeglichen – also nur eine Eins-zu-eins-Umsetzung.
  Ministerpräsident Schnieder: Sobald eine Bundesregierung auf die Idee kommt, da
  noch einmal draufzulegen, wird ausgeglichen. Darauf haben wir dann auch Wert gelegt.
  Ansonsten: Es gab bisher ein gutes Miteinander, auch in Sachen GKV -Reform. Wir
  sehen gerade, wie stark die Kommunen finanziell belastet sind. Für Rheinland-Pfalz
  bedeutet das im Krankenhausbereich eine Mehrbelastung von rund 500 Millionen Euro.
  Gerade in den kleinen Krankenhäusern in den ländlichen Regionen haben wir zu einem
  hohen Anteil freie Trägerschaften, und ich habe die Sorge, dass die ihren Versorgungsauftrag
  zurückgeben und wir dort in eine Zeit der Rekommunalisierung dieser Krankenhäuser
  kommen. Dann werden wir in einem hohen Maße zusätzliche Fehlbeträge zu kompensieren
  haben. Deswegen werde ich dort weiter politisch darum ringen, auch die Fragestellung
  der sachfremden Leistungen in der GKV zu klären. Ich kämpfe auf rheinland-pfälzischer
  Seite auch weiter dafür, die Dynamisierung der Herstellerabschläge – insbesondere
  bei patentgeschützten Arzneimitteln – zurückzuführen. Das ist alles noch im Fluss;
  das ist aber ein ganz normales politisches Ringen, ein ganz normal Umgang miteinander.
  Da gab es draußen bisher auch keinen lauten Ton; vielmehr sind das berechtigte Interessen,
  die wir miteinander austauschen. Am Ende schauen wir dann – und das haben wir dann
  auch zu respektieren –, wie der Bundesgesetzgeber das durch das Parlament bringt.
  Dann werden wir schauen, ob wir da auf Bundesratsebene noch Korrekturbedarf sehen
  oder ob wir dann sagen, dass wir den Weg gemeinsam gehen müssen. Ich bin dankbar,
  dass wir heute die Zusage erhalten haben, dass wir bei der anstehenden Steuerreform
  in einem sehr engen Austausch stehen, weil die Belastungen eben auch bei uns ankommen.
  Aber ich sage auch: Es ist richtig, dass wir dort keine Symmetrie haben – nicht
  nur, weil es im Grundgesetz so geregelt ist, sondern auch, weil wir eine Steuerreform
  nicht vornehmen würden, wenn wir uns davon keine Stärkung der Wirtschaftskraft und
  daraus resultierende Mehreinnahmen erwarten könnten. Ich wüsste auch nicht, wie
  man das über die Zeit berechnen soll. Deswegen ist es aus meiner Sicht eine gute
  Entscheidung, das nicht getan zu haben. Auch da gehen wir Hand in Hand diesen Weg
  von Bund und Ländern gemeinsam. Frage : Ich würde gerne noch einmal zu dem konkreten
  Punkt der Einsparungen bei den Leistungsgesetzen nachfragen. Sie haben gesagt, ab
  September gebe es keine Gesetze dieser Art mehr. Mich interessiert aber, wie genau
  bei den jetzt bestehenden Gesetzen gespart wird. Herr Lies hat das Pooling angesprochen.
  Könnten Sie vielleicht noch einmal sagen, genau was für Maßnahmen Sie besprochen
  haben, was das angeht? Es stand auch in Rede, über das Wunsch- und Wahlrecht zu
  sprechen. Was haben Sie da vor? Noch einmal zu der Entlastungssumme: Herr Schnieder,
  beziehen sich die drei Milliarden Euro, die Sie genannt haben, auf genau diesen
  Bereich, also auf die Einsparungen bei diesen Leistungsgesetzen? Bundeskanzler Merz:
  Wir haben eine Grundsatzeinigung erzielt, dass wir uns bei diesen Leistungsgesetzen
  jetzt weiter genau anschauen, wo wir einsparen können. Erste Vorschläge dazu liegen
  auf dem Tisch, und es hat dazu auch eine Arbeitsgruppe gegeben, die schon sehr intensiv
  vorberaten hat, was wir tun können. Sie haben die Stichworte genannt, aber da ist
  nichts Endgültiges entschieden. Das wird in den nächsten Tagen und Wochen weiter
  beraten. Wir wollen auch sehen, dass wir das in diesem Jahr auf den Weg bringen;
  denn die Zeit drängt. Die Kommunen befinden sich in einer sehr prekären Finanzsituation,
  und deswegen wollen wir diese Entlastung für die Kommunen so schnell wie möglich
  auf den Weg bringen. Ministerpräsident Schnieder: Ich glaube, man sollte noch einmal
  in den Vordergrund heben, dass es darum geht, dass diese Kostenspirale und der Druck
  nicht weiter nach oben gehen. Vielmehr brauchen wir eine Abbremsung. Dazu liegen
  jetzt alle Vorschläge auf dem Tisch, und diese Vorschläge gehen wir gemeinsam an.
  Da ist eine Menge möglich, aber Olaf Lies hat eben auch gesagt: mit Respekt und
  Würde. Es bringt jetzt auch nichts, Leute auf die Palme zu bringen, ohne zu wissen,
  was wir jetzt miteinander beschließen – auch das beginnt gerade. Das tut der Gesellschaft
  nicht gut. Es sind alle aufgerufen, mit in die Diskussion zu gehen. Aber außer einem
  breiten Strauß mit drei großen Bereichen, in die wir nun näher schauen müssen, liegen
  noch keine Entscheidungen auf dem Tisch. Das ist wirklich ein Aufruf, den ich mache:
  Jetzt sind alle dazu aufgerufen, mit zu diskutieren und zu ringen. Man sollte aber
  nicht schon am ersten Tag Personengruppen auf den Baum bringen, sodass es nachher
  schwierig wird, die Tür wieder zu öffnen. Ich glaube, es gehört auch dazu, dass
  wir diesen Weg gemeinsam gehen, und wir sind dazu gerne bereit.'
