title: Gemeinschaftswerk Nachhaltigkeit Nachhaltig handeln – und zwar gemeinsam
text: 'Das Gemeinschaftswerk Nachhaltigkeit zielt darauf, Nachhaltigkeit in der Gesellschaft
  im Rahmen der 17 globalen Nachhaltigkeitsziele voranzubringen. Das Gemeinschaftswerk
  Nachhaltigkeit wurde auf Initiative von Bund und Ländern vom Rat für Nachhaltige
  Entwicklung (RNE) aufgebaut und startete im September 2022. Seit dem 1. Januar 2025
  ist Engagement Global für das Gemeinschaftswerk verantwortlich. Die vier Regionalen
  Netzstellen Nachhaltigkeitsstrategien (kurz: RENN ), deren Zuständigkeiten sich
  auf den Norden, die Mitte, den Süden und den Westen Deutschlands erstrecken, sind
  auch Ansprechpartner für das Gemeinschaftswerk. Die Webplattform des Gemeinschaftswerks
  Nachhaltigkeit macht verschiedene gesellschaftliche und staatliche nachhaltige Aktivitäten
  sichtbar, vernetzt und inspiriert zu neuem Engagement. Auf Veranstaltungen werden
  Menschen und Ideen zusammengeführt und neue Allianzen geschmiedet. Durch Aktionswochen
  , Gemeinschaftsziele, Wettbewerbe und Innovationsprozesse werden Lösungen für eine
  nachhaltige Entwicklung entwickelt. Jeder kann mitmachen und sich im Gemeinschaftswerk
  Nachhaltigkeit registrieren . Voraussetzung ist die Zustimmung zur Mitmacherklärung.
  Diese enthält unter anderem folgende Punkte: Die Bundesregierung unterstützt das Gemeinschaftswerk
  Nachhaltigkeit gemeinsam mit Organisationen aus der Zivilgesellschaft, der Wirtschaft,
  der Wissenschaft, der Kultur, den Kommunen und den Ländern.'
