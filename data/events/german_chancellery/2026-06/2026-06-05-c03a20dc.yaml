title: Federal Chancellor’s press conference after the EU -Western Balkans Summit
  “A good day for Europe”
text: 'The Chancellor also held talks with the host of the summit, Montenegrin Prime
  Minister Milatovic. “The clear message from today is and will remain that we want
  you, and we want the countries in this region to become members of the European
  Union soon”, emphasised Federal Chancellor Friedrich Merz after the EU -Western
  Balkans Summit in Montenegro. In Tivat, the heads of state and government of the
  European Union and the heads of the EU institutions met with representatives of
  the six partner countries of the Western Balkans – Albania, Bosnia and Herzegovina,
  Serbia, Montenegro, North Macedonia and Kosovo. Prior to the summit, Germany and
  France had jointly presented proposals on how the accession negotiations could be
  simplified and accelerated. They had been met with broad approval both in the European
  Council and among the Western Balkan states, said Merz. The informal talks at the
  summit gave him hope that a good solution would be found “very soon”. Read the transcript
  of the press conference here (in German only):'
