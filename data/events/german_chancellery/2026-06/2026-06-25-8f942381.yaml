title: Beschlüsse von Bund und Ländern für einen modernen Staat
text: 'Mit den heute vorgelegten Berichten zur föderalen Modernisierungsagenda und
  des Pakts für Planungs-, Genehmigungs- und Umsetzungsbeschleunigung kommen Bund
  und Länder bei der Modernisierung des Landes mit großen Schritten voran. Im Fokus
  steht dabei der digitale Staat, der seine Bürgerinnen und Bürger in allen Lebenslagen
  unterstützt. Ein Staat mit moderner Energie- und Verkehrsinfrastruktur, schnellen
  Netzen und zügigen und bürokratiearmen Verfahren. Davon profitieren neben den Bürgerinnen
  und Bürgern auch die Unternehmen. Für spürbare Erleichterungen im Leben der Menschen
  sorgen zum Beispiel der antraglose Bezug von Kindergeld und ein deutlich erleichtertes
  Verfahren für das Elterngeld. Unnötige Behördengänge werden künftig vermieden, z.B.
  durch die digitale Wohnsitzummeldung bei einem Umzug oder auch die weitgehend digitale
  Beantragung des Personalausweises. Auch das eigene Auto kann schnell und bequem
  digital vom heimischen Sofa aus angemeldet werden. Es kann auch schneller gebaut
  werden: Energie- und Verkehrsinfrastruktur, wie der Ersatz von maroden Brücken,
  erhalten höchste Priorität, Planung und Genehmigung werden viel einfacher. Damit
  können diese Vorhaben schneller vom Sondervermögen Infrastruktur und Klimaneutralität
  finanziert werden. Bund und Länder werden auch künftig bei der Umsetzung der Staatsmodernisierung
  konzentriert und effektiv zusammenarbeiten. Weitere Beispiele für die Modernisierung
  des Staates und den Bürokratierückbau finden Sie im Anhang PDF, 195 KB, nicht barrierefrei
  . Bundeskanzler Friedrich Merz: „Die Bürgerinnen und Bürger fordern zurecht eine
  funktionierende Infrastruktur und einen leistungsfähigen Staat, der ihren Bedürfnissen
  gerecht wird. Zusammen mit den Ländern zeigen wir deutlich: die Probleme sind nicht
  nur erkannt, sondern wir liefern auch Lösungen. Die enge Zusammenarbeit mit den
  Ländern ist dabei elementar. Wir modernisieren unseren Staat gemeinsam mit den Ländern
  nachhaltig.“ Bundesminister für Digitales und Staatsmodernisierung, Dr. Karsten
  Wildberger: „Wir erleben einen historisch engen Schulterschluss zwischen Bund und
  Ländern beim Bürokratierückbau. Der Bund arbeitet konsequent an seinen Entlastungsvorhaben
  und die Länder flankieren dies breit von ihrer Seite. Darüber freuen wir uns ausdrücklich.
  Die Richtung stimmt, aber wir müssen das Tempo weiter anziehen, um im Alltag der
  Menschen noch schneller einen spürbaren Unterschied zu machen.“ Vorsitzender der
  MPK und Ministerpräsident von Rheinland-Pfalz, Gordon Schnieder: „Dank der konstruktiven
  Zusammenarbeit zwischen Bund und Ländern bringen wir unseren Staat schneller voran.
  Zukunftsfähigkeit entsteht durch Modernisierung, Innovation und Vertrauen. Unser
  gemeinsames Ziel ist ein handlungsfähiger Staat, der Innovationen ermöglicht, gute
  Arbeitsplätze sichert und eine starke Wirtschaft gewährleistet.“'
