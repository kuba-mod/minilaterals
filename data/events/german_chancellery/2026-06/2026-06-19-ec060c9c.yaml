title: In Kraft getreten Mehr Verbraucherschutz bei Online -Verträgen
text: 'Verbraucher bekommen mehr Rechtssicherheit bei Online-Verträgen. Verträge,
  die über das Internet geschlossen werden, sollen einfacher widerrufen werden können.
  Aus diesem Grund werden Anbieter künftig verpflichtet, eine klar erkennbare und
  jederzeit zugängliche Schaltfläche zu schaffen. Das besagt das Gesetz zur Änderung
  des Verbrauchervertrags- und des Versicherungsvertragsrechts sowie zur Änderung
  des Behandlungsvertragsrechts. Zudem soll die Pflicht zur „angemessenen Erläuterung“
  gestärkt werden: Die Anbieter von Finanzdienstleistungen müssen sicherstellen, dass
  die Verbraucherinnen und Verbraucher die wesentlichen Vertragsinhalte verstehen.
  Das bedeutet im Online -Bereich auch, dass Verbraucherinnen und Verbraucher zusätzlich
  eine direkte persönliche Kontaktaufnahme verlangen können. Der Widerruf eines Vertrags
  über Finanzdienstleistungen soll künftig nur noch innerhalb von zwölf Monaten und
  14 Tagen möglich sein. Für Lebensversicherungen soll eine Ausschlussfrist von 24
  Monaten und 30 Tagen gelten. Das schafft Rechtssicherheit für Verbraucherinnen und
  Verbraucher sowie Unternehmen. Die bisher unbegrenzte Widerrufsmöglichkeit wird
  somit klar begrenzt und langwierige Rechtsstreitigkeiten werden vermieden. Außerdem
  sollen Unternehmen die Vertragsbedingungen künftig nicht mehr in Papierform übermitteln
  müssen. Mit der Änderung soll der zunehmenden Digitalisierung Rechnung getragen
  werden. Zudem bestimmt das Gesetz, dass Patientinnen und Patienten künftig einen
  grundsätzlichen Anspruch auf eine kostenlose erste Kopie ihrer Patientenakte haben.
  Damit setzt die Bundesregierung eine Forderung des Europäischen Gerichtshofs um.'
