title: 'Schärfung des Auftrags der Deutschen Welle: Kabinett unterstützt Fokus auf
  Freiheit, Innovation und Dialog – Staatsminister Weimer: „Die Deutsche Welle wird
  die kräftige Stimme der Freiheit in einer autokratisch werdenden Welt"'
text: 'Das Bundeskabinett hat heute die Stellungnahme der Bundesregierung zur Aufgabenplanung
  der Deutschen Welle (DW) für 2026 bis 2029 beschlossen. Die Bundesregierung begrüßt
  darin ausdrücklich, dass die DW den verantwortungsvollen Einsatz von KI, die technologische
  Modernisierung und die Sicherung journalistischer Standards in den zunehmend von
  KI beeinflussten Informationsräumen als zentrale Zukunftsaufgabe beschreibt. Zustimmend
  hebt die Bundesregierung auch das Bekenntnis der DW zur Bekämpfung von Antisemitismus
  hervor. Die hierfür bestehenden internen Prüf- und Kontrollmechanismen sollten laut
  Stellungnahme in der Praxis konsequent angewandt, regelmäßig überprüft und bei Bedarf
  weiterentwickelt werden. Zudem betont die Bundesregierung den Beitrag der DW-Berichterstattung
  zur freien Meinungsbildung in eingeschränkten Informationsräumen im Ausland. Dabei
  sieht sie die Kerntätigkeit der DW künftig vor allem in Regionen, in denen ihre
  unabhängige Berichterstattung auf deutsche und europäische Interessen einzahlt.
  Staatsminister für Kultur und Medien, Wolfram Weimer: „Die Deutsche Welle ist Deutschlands
  mediale Botschafterin im Ausland. Sie trägt unsere Perspektiven auf universelle
  Werte wie Freiheit, Menschenrechte und Rechtsstaatlichkeit in die Welt. Angesichts
  der sich zuspitzenden geopolitischen Dynamik wird es umso wichtiger, dass sich die
  DW stärker auf Zielregionen konzentriert, die für Deutschland und Europa besonders
  relevant sind. Maßgeblich für die Arbeit der Deutschen Welle wird künftig daher
  nicht die größtmögliche globale Reichweite sein, sondern dass sie mit ihrer Berichterstattung
  in eingeschränkten Informationsräumen die freie Meinungsbildung im Ausland stärkt,
  Desinformation durch autokratische Akteure entgegenwirkt und somit mittelbar auch
  zur Stärkung europäischer Resilienz beiträgt. Zudem wird sie ihre eigene Krisenreaktionsfähigkeit
  so ausbilden müssen, dass sie auch ohne den stetigen Mittelaufwuchs der vergangenen
  Jahre flexibel auf veränderte Informationsbedarfe reagieren kann. Diese Priorisierung
  ist in erster Linie Angelegenheit des Senders, wird sich aber auch in der Reform
  des Deutsche-Welle-Gesetzes widerspiegeln.“ Federführend zuständig für die Novelle
  des Deutsche-Welle-Gesetzes ist der Staatsminister für Kultur und Medien. Sein Haus
  erarbeitet derzeit einen entsprechenden Referentenentwurf. Ziel ist es, den gesetzlichen
  Arbeitsauftrag des deutschen Auslandssenders schärfer zu konturieren und so zur
  Stärkung der DW beizutragen. Finanziert wird die DW in diesem Jahr mit rund 415
  Millionen Euro aus dem Kultur- und Medienetat der Bundesregierung. Allein im Zeitraum
  2018 bis 2025 wurde der Zuschuss um nahezu 100 Millionen Euro erhöht. Die Deutsche
  Welle ist der Auslandssender Deutschlands. Sie produziert multimediale Informationsangebote
  in 30 Sprachen, mit Inhalten in Fernsehen, Hörfunk und Internet. In ihrer Aufgabenplanung
  stellt die Deutsche Welle – entsprechend der Vorgaben des Deutsche-Welle-Gesetzes
  – alle vier Jahre ihre Programmziele, Schwerpunktvorhaben und ihre Beiträge zur
  Aus- und Fortbildung von Medienschaffenden dar.'
