title: Statement des Bundeskanzlers vor dem Europäischen Rat „Klare Schritte in Richtung
  Erweiterung“
text: 'In seinem Statement vor dem Europäischen Rat sprach Bundeskanzler Merz über
  die Themen der anstehenden Beratungen. Vor dem Beginn des Europäischen Rates in
  Brüssel hat Bundeskanzler Friedrich Merz einen Ausblick auf die Themen der anstehenden
  Beratungen gegeben. Das wichtigste Thema sei und bleibe die Wettbewerbsfähigkeit
  der europäischen Industrie, so Kanzler Merz in seinem Statement . In diesem Zusammenhang
  dankte er der Europäischen Kommission für die Vorlage regelmäßiger Fortschrittsberichte
  zu Wettbewerb und Bürokratieabbau. „ Das gelingt Schritt für Schritt – es dauert
  lange, aber es gelingt“, sagte der Bundeskanzler. Mit Blick auf die Erweiterungspolitik
  zeigte sich der Kanzler erfreut über die Eröffnung der Verhandlungscluster in den
  Beitrittsgesprächen mit der Ukraine und Moldau. „ Das sind klare Schritte in Richtung
  Erweiterung der Europäischen Union“, so Merz. Als drittes Thema kündigte der Bundeskanzler
  den Beginn der ersten Debatte über den zukünftigen Finanzrahmen der EU an. „ Ich
  habe aus meiner Sicht klar gemacht: Neue europäische Schulden kann es nicht geben“,
  betonte Kanzler Merz. Schönen guten Tag, meine Damen und Herren! Wir treffen uns
  heute in Brüssel zum Europäischen Rat. Ich bin sehr dankbar, dass wir nach einem
  erfolgreichen G7 -Treffen in Évian heute die Beratungen über die europäischen Themen
  fortsetzen können. Das wichtigste Thema ist und bleibt aus meiner Sicht die Wettbewerbsfähigkeit
  der europäischen Industrie. Ich will der Europäischen Kommission und insbesondere
  Ursula von der Leyen sehr herzlich dafür danken, dass sie dem Europäischen Rat jetzt
  regelmäßig – so auch heute und morgen – Fortschrittsberichte über den Stand der
  gegenwärtigen Gesetzgebung gibt. Wir wollen ja systematisch die europäische Bürokratie
  zurückentwickeln, zurückbauen. Das gelingt Schritt für Schritt – es dauert lange,
  aber es gelingt. Wir werden auch über die Wettbewerbssituation der gesamten Welt
  und über geoökonomische Ungleichgewichte sprechen. Wir haben das schon in Évian
  getan, und wir haben darüber auch ein gemeinsames Schlussstatement der G7 -Staats-
  und Regierungschefs abgegeben, das von meinen Kolleginnen und Kollegen im Europäischen
  Rat sehr aufmerksam wahrgenommen wird. Wir werden uns auch über die Frage, wie die
  Gleichgewichte in der Währungspolitik zu gewährleisten sind, zu unterhalten haben.
  Des Weiteren werden wir über die Erweiterung der Europäischen Union sprechen. Sie
  wissen, dass ich dazu mit Emmanuel Macron eine entsprechende Initiative ergriffen
  habe. Ich bin sehr dankbar, dass es in dieser Woche bereits Entscheidungen gegeben
  hat, dass die Europäische Kommission das sogenannte Cluster 1 für die Verhandlungen
  mit der Ukraine und mit Moldau geöffnet hat. Das sind klare Schritte in Richtung
  Erweiterung der Europäischen Union. Wir alle wissen, dass das lange dauern wird,
  aber die ersten Schritte müssen gemacht werden. Insofern haben wir heute und morgen
  Themen, die für die Zukunft der Europäischen Union von großer Bedeutung sind. Ich
  will nicht verheimlichen, dass wir auch ein sehr schwieriges Thema haben, nämlich
  die Frage des zukünftigen Finanzrahmens der Europäischen Union. Das werden wir im
  Laufe des Jahres noch intensiv zu diskutieren haben. Dazu wird es morgen eine Orientierungsdebatte
  geben – wo stehen wir, wo wollen wir hin? Ich habe aus meiner Sicht klar gemacht:
  Neue europäische Schulden kann es nicht geben; der Haushalt muss ausgeglichen sein.
  Deswegen werden wir noch im zweiten Halbjahr eine große Kraftanstrengung unternehmen
  müssen, um den Haushalt für die Jahre ab 2028 zu beschließen. Das ist aber eine
  Aufgabe, die uns eher im zweiten Halbjahr bevorsteht als im ersten. Frage: Herr
  Bundeskanzler, es gibt nun eine Iran- US -Absichtserklärung. Wie kann die EU , wie
  kann auch Deutschland ganz konkret helfen, die Straße von Hormus zu sichern? Das
  hatten Sie ja auch schon … ( akustisch unverständlich ) Bundeskanzler Merz: Ich
  will zunächst einmal sagen, dass ich sehr begrüße, dass Präsident Trump gestern
  in Paris das Abkommen mit Iran unterzeichnet hat. Es ist ein großer Schritt nach
  vorn, dass dort die Waffen schweigen und dass auch die freie Durchfahrt durch die
  Straße von Hormus wieder gewährleistet wird. Wir werden in Ruhe im deutschen Kabinett
  darüber zu beraten haben, was das dann auch für uns an Möglichkeiten eröffnet, behilflich
  zu sein. Ich habe immer gesagt, dass wir uns vorstellen können, dort zum Beispiel
  mit Minenräumern dafür zu sorgen, dass das, was jetzt vereinbart wurde, auch militärisch
  abgesichert wird. Das erfordert aber eine klare Rechtsgrundlage, das erfordert ein
  Mandat des Deutschen Bundestags. Das wird auch im Lichte der Entwicklung der nächsten
  Tage in Ruhe in Deutschland beraten werden. Bundeskanzler Merz: Wir wissen, dass
  die amerikanische Regierung seit der Neufassung der amerikanischen Sicherheitsstrategie
  ihre Truppenpräsenz auf der ganzen Welt überprüft. Das gilt auch für Europa und
  das gilt auch für Deutschland. Wir wissen seit vielen Monaten, dass es so ist. Deswegen
  haben wir auch immer gesagt, dass wir die Verteidigungsfähigkeit Europas stärken
  müssen. Wir unternehmen große Kraftanstrengungen, um uns selbst zu stärken. Wir
  tun das aus Deutschland heraus. Wir tun das zusammen mit den anderen Europäern.
  Wir haben hierbei eine sehr gute Koordinierung, eine sehr gute Abstimmung mit den
  europäischen NATO -Partnern. Das geht über die Grenzen der Europäischen Union hinaus.
  Ich bin dankbar, dass wir das mit Norwegen und mit Großbritannien intensiv diskutieren.
  Wir stärken die europäischen NATO -Staaten, wir stärken den europäischen Pfeiler
  der NATO . Wir wissen, dass wir mehr tun müssen, und wir tun es. Frage: … ( auf
  Englisch, ohne Dolmetschung ) Bundeskanzler Merz: Ich teile diese Wortwahl ausdrücklich
  nicht. Wir werden auch darüber zu sprechen haben. Das ist ein Thema, das im Europäischen
  Rat noch ausführlich diskutiert werden muss. Aber noch einmal: Diese Wortwahl teile
  ich ausdrücklich nicht.'
