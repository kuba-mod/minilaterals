date: '2026-06-08'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 8. Juni 2026
text: 'Sprecherinnen und Sprecher •    Staatssekretär Kornelius •    Stratmann (BMAS)
  •    Druckenthaner (BMDS) •    Ernoult (BMF) •    Böhm (BMFTR) •    Hinterseher
  (AA) •    Greve (BMWE) •    Lenz (BMBFSFJ) •    Dr. Hosemann (BMJV) •    Bowinkelmann
  (BMI) •    Müller (BMVg) •    Zimmermann (BMUKN) •    Haberlandt (BMG) (Vorsitzender
  Feldhoff eröffnet die Pressekonferenz und begrüßt StS Kornelius sowie die Sprecherinnen
  und Sprecher der Ministerien.) Herr Kornelius, ich möchte ganz gern im Nachgang
  des gestrigen Treffens und der dazu veröffentlichten Erklärung fragen, was jetzt
  daraus folgt. Es gibt jetzt eine gemeinsame Position Frankreichs, Großbritanniens,
  Deutschlands und der Ukraine . Sind andere EU-Partner dabei mit einbezogen? Versucht
  man, das beim EU-Gipfel nächste Woche zu klären? Vielleicht können Sie den Prozess
  ein bisschen beschreiben. Der Prozess ist fortlaufend. Er wurde auch nicht erst
  gestern begonnen, sondern er hat schon einen längeren Vorlauf. Es gab bereits im
  vergangenen Jahr unter amerikanischer Führung Gespräche mit der Ukraine und mit
  Russland. Jetzt wurde auch im E3-Rahmen noch einmal über den Stand der Dinge diskutiert.
  Sie haben das Statement gelesen, das gestern veröffentlicht wurde und das die Grundlage
  für alle weiteren Handlungen ist, auch mit den verschiedenen Punkten, die als Forderungen
  der E3 nun im Raum stehen. Die Debatte wird jetzt natürlich im Kreis der europäischen
  Partner erweitert. Die europäischen Partner werden über das Ergebnis sehr zeitnah
  unterrichtet. Bei der Sitzung des Europäischen Rates in der kommenden Woche wird
  das Thema auf der Tagesordnung stehen, genauso wie es beim G7-Treffen zu Beginn
  der nächsten Woche auf der Tagesordnung stehen wird. In der vergangenen Woche hieß
  es in Regierungskreisen, man erwarte, dass es Monate dauern werde, bis der Gesprächsprozess
  beginne, weil Russland noch keine Signale gegeben habe, dass es überhaupt einlenken
  wolle. Hat sich daran irgendetwas geändert? Ich glaube, die harten Kämpfe dieser
  Tage zeigen, dass es Wochen bis Monate dauern kann, eine Gesprächsbereitschaft festzustellen
  und sich auf die Bedingungen zu einigen, unter denen solche Gespräche überhaupt
  stattfinden können. All dies dient nun der Vorbereitung. Wir befinden uns auch angesichts
  einer neuen, veränderten Situation in der Ukraine selbst und an der Front in einer
  Phase der Neuorientierung. Ich glaube, Sie verfolgen alle auch die Berichterstattung
  über die Situation in Russland. All dies gibt Anlass, darüber nachzudenken, wie
  dieser Krieg beendet werden kann. Die Bundesregierung wird weiterhin die Ukraine
  unterstützen. Wir wissen, dass nur eine starke Ukraine und Druck auf Russland Putin
  zum Einlenken bewegen werden. Herr Kornelius, was ist in diesem Statement und in
  der Positionierung der E3 neu? Sie haben ja das Statement gelesen. Aus den Punkten,
  die Sie am Ende des Statements lesen, können Sie auch herausfiltern, welche Positionen
  die E3 vertreten. Sie kennen den Prozess, der davor stattgefunden hat. Der Vergleich
  dieses Prozesses mit dem Statement ergibt den Neuigkeitswert. Das müssen Sie schon
  selbst lesen. Die fünf Punkte, die genannt werden, sind die Voraussetzungen, unter
  denen Europa bzw. die E3 diesen Prozess nun sehen. Aber neu ist, glaube ich, dass
  dieser Prozess nun mit neuer Wucht in Europa beginnt. Neu ist auch, dass wir den
  Verhandlungsprozess, den die USA maßgeblich geleitet haben, aufnehmen und weiterführen
  und dies auch in enger Abstimmung mit den USA tun. Die Abstimmung mit dem ukrainischen
  Präsidenten gestern hat gezeigt, dass dies alles im Einvernehmen geschieht. Nun
  muss dieser Kreis erweitert werden. Es braucht die größtmögliche Unterstützung aller
  europäischen Partner, um dann tatsächlich in Richtung von Frieden zu drängen. Dem
  Vernehmen nach gab es in den vergangenen Tagen in Moskau ein Treffen des früheren
  Bundeskanzlers Gerhard Schröder und des russischen Staatschefs Wladimir Putin .
  Gab es in diesem Zusammenhang Kommunikation zwischen Vertreterinnen und Vertretern
  der Bundesregierung und Gerhard Schröder? Von diesem Treffen habe ich auch gelesen.
  Ich habe von diesem Treffen aber keine nähere Kenntnis. Gab es Kommunikation mit
  Gerhard Schröder? Das kann ich Ihnen nicht sagen. Es gibt zu diesem Treffen von
  mir hier keine Informationen. Die Bundesregierung hat dieses Treffen nicht begleitet.
  (zum Treffen der Staats- und Regierungschefs der E3 mit dem ukrainischen Präsidenten
  ) Es soll in Osteuropa Unwohlsein ‑ so nenne ich es einmal ‑ über die gestrigen
  Beschlüsse und Gespräche gegeben haben. Ich wüsste ganz gern, ob dies bei der Bundesregierung
  schon angekommen ist und was Sie dazu sagen. Nein, das ist nicht angekommen. Die
  europäischen Partner sind eng eingebunden und sind auch über das Ergebnis informiert
  oder werden im Zuge der nächsten Stunden und Tage über das Ergebnis informiert.
  Ich habe noch eine kurze Nachfrage zum Treffen Gerhard Schröders mit Wladimir Putin
  : Haben Sie eigentlich die Erwartung, dass Herr Schröder, immerhin Altkanzler, die
  Bundesregierung im Nachhinein über seine Gespräche informiert, oder gibt es diese
  Erwartung gar nicht? Ich äußere keine Erwartung dazu, wohin Herr Schröder fährt.
  (zum Treffen der Staats- und Regierungschefs der E3 mit dem ukrainischen Präsidenten
  ) Eine Frage an Herrn Kornelius: Warum sind Polen und Italien nicht sofort dabei?
  Auch Polen und Italien sind in den Prozess eingebunden. Es gibt einen permanenten
  Austausch mit allen europäischen Partnern. Das Format der E3 ist ein bewährtes Format.
  Es hat sich in den letzten Wochen und Monaten immer wieder als vorteilhaft erwiesen,
  die Schritte auch im kleinen Kreis vorzubereiten. Das bedeutet aber nicht, dass
  die anderen europäischen Partner nicht einbezogen sind. Es ist eine der großen Bedingungen
  für Deutschland, dass es keinen Sonderweg gibt, sondern dass es ein enges Teamwork
  mit den Europäern und eine Koordinierung gibt. Dafür sorgt die Bundesregierung.
  (zum Treffen Gerhard Schröders mit Wladimir Putin ) Herr Kornelius, ist Ihnen bekannt,
  ob Herr Schröder als Privatperson gereist ist oder als ehemaliger Bundeskanzler
  möglicherweise auf Kosten der Amtsausstattung? Würden Sie uns das nachreichen, sofern
  es Ihnen bekannt würde? Ich kenne die Reiserichtlinien für Herrn Schröder nicht.
  Aber soweit wir das ergründen können, würde ich das nachliefern. Dann kommen wir
  zu dem größeren Komplex der Reformen. Ich würde sagen, der Tankrabatt fällt auch
  unter Reformen. Ja, er hat aber natürlich leider auch mit Geopolitik zu tun. Ich
  selbst habe vor einigen Wochen schon einmal gefragt. Darauf hieß es: Ja, wenn es
  so weit ist, reden wir darüber. ‑ Es sieht im Irankrieg gerade nicht danach aus,
  dass es bald zu Ende ginge. Daher würde ich gern meine Frage mit dem aktuellen Bezug
  wiederholen: Wie sieht es jetzt mit dem Tankrabatt aus? Ist eine Verlängerung geplant?
  Wird darüber nachgedacht? Ich kann Ihnen antworten, dass der Tankrabatt, wie Sie
  wissen, noch bis Ende des Monats läuft und dass dann zeitig über dessen Schicksal
  entschieden wird. Das heißt, das könnte dann auch zwei Tage vor Monatsende kommen
  oder so? Ich spekuliere jetzt nicht über potenzielle Zeitrahmen und Fristen. Sie
  wissen, dass verschiedene Gremien tagen. Wir sehen mit großem Interesse, wie sich
  die Benzinpreise entwickeln. Wir stellen fest, dass die Benzinpreise sich nach unten
  bewegen, dass der Tankrabatt erstens wirkt und dass zweitens auch die Marktkräfte
  wieder stärker wirken. Das beobachtet die Bundesregierung mit Wohlwollen. Herr Kornelius,
  ich wüsste ganz gern, was die Bundesregierung von dem DGB-Vorschlag hält, dass Betriebsrenten
  für Unternehmen verpflichtend werden sollen. Ist das eine Position, die sich der
  Kanzler zu eigen machen würde? Ich glaube, dass die Bundesregierung jetzt keine
  Positionen vorab festlegt. Die Bundesregierung wartet auf die Empfehlung der Rentenkommission.
  Natürlich stellen wir fest, dass sehr viele politische Akteure, auch der DGB, Vorstellungen
  zu diesem zentralen Reformprojekt haben. Das wird natürlich auch gespeichert, registriert
  und zur Kenntnis genommen. Am Mittwoch besteht die Gelegenheit, sich darüber auszutauschen.
  Die Bundesregierung wird sich aber nicht auf eine Position festlegen, ehe nicht
  auch die Empfehlung der Rentenkommission vorliegt. Frau Bas hat gestern den Eindruck
  erweckt, dass die Rentenkommission ihre Empfehlungen nicht erst am 29. Juni, sondern
  möglicherweise schon Mitte des Monats vorlegt. Gibt es dazu nähere Informationen,
  entweder vom BMAS oder von Ihnen? Die Worte von Frau Bas stehen für sich. Aber das
  BMAS hat eventuell nähere Erkenntnisse. Schöner hätte ich es wahrscheinlich nicht
  sagen können. Grundsätzlich wissen Sie ‑ wir hatten ja auch in der vergangenen Woche
  schon darüber gesprochen ‑, dass die Kommission unabhängig arbeitet. Es gibt einen
  Einsetzungsbeschluss der Bundesregierung. Darin ist vorgesehen, dass die Empfehlungen
  der Kommission bis zum Ende des zweiten Quartals dieses Jahres vorgelegt werden.
  Das wäre dann also bis zum 30. Juni. Alles, was darüber hinaus gestern gesagt worden
  ist, steht an der Stelle für sich. Herr Kornelius, Bundeskanzler Merz hat ja wiederholt
  und mit großem Nachdruck von den Bürgern dieses Landes eingefordert, wieder mehr
  zu arbeiten, um die wirtschaftliche Lage Deutschlands zu verbessern. Gleichzeitig
  begibt sich der Bundestag ab dem 10. Juli für ganze zwei Monate, bis zum 7. September,
  in die Sommerpause . Unter anderem der Verband der Familienunternehmen hat jetzt
  eine Einkürzung der parlamentarischen Sommerpause gefordert. Dazu würde mich interessieren:
  Wie genau erklärt denn die Bundesregierung den Bürgern diesen offenkundigen Widerspruch
  zwischen der Aufforderung an die Bevölkerung, mehr zu arbeiten, und einer zweimonatigen
  parlamentarischen Pause, in der zentrale Reformprojekte erst einmal liegen bleiben?
  Wie Sie wissen, führen wir diese Debatte ungefähr jedes Jahr einmal, nämlich vor
  der Sommerpause. Wie Sie ebenfalls wissen, gehen die Mitglieder des Bundestags nicht
  zwei Monate an den Strand und legen die Füße hoch, sondern die Abgeordneten arbeiten
  weiter. Es finden auch häufig Ausschusssitzungen statt. Die Beratungen gehen weiter.
  Ansonsten, glaube ich, muss nicht jeder Beitrag zur frühen Befüllung des Sommerlochs
  heute schon befriedigend beantwortet werden. Es gibt ja zahlreiche Reformpakete,
  wie schon erwähnt, die erst einmal noch der Bearbeitung harren. Dazu würde mich
  interessieren: Ist der Kanzler denn bereit, mit gutem Beispiel voranzugehen und
  auf eigenen Urlaub zu verzichten, solange die zentralen Vorhaben wie die Rentenreform
  etc. noch nicht angegangen sind? Erstens: Warten Sie einmal ab, was alles angegangen
  wird. Zweitens kann ich mich an den letzten Sommer erinnern, der auch von einer
  sehr durchgehenden Arbeitsphase geprägt war. Der Bundeskanzler ist immer im Dienst.
  Insofern ist das ebenfalls eine hypothetische Frage, die Sie dann über die Sommerpause
  hinweg auch für sich beantworten können, soweit Sie keinen Urlaub machen. Herr Kornelius,
  könnten Sie noch einmal mit Blick auf das Treffen am Mittwochabend schildern, welche
  Erwartungen Sie haben und was vielleicht auch den Arbeitgebern, den Arbeitnehmern
  und den Gewerkschaften als Arbeitsauftrag mit auf den Weg gegeben wurde, welche
  Themen, weil wir ja aktuell über sehr viele Reformen sprechen? Worüber soll dabei
  konkret gesprochen werden? Ich werde jetzt nicht zu sehr ins Detail gehen. Aber
  die Regierungskoalition wird sich am Mittwoch, wie Sie wissen, mit den Gewerkschaften
  und den Arbeitgeberverbänden treffen. Der Bundeskanzler hat sich dazu in den letzten
  Tagen mehrmals geäußert. Es ist ein Gespräch zum Austausch politischer Positionen
  und Ideen auf Einladung der Regierungsparteien. Es ist keine Sitzung des Koalitionsausschusses.
  Darauf möchte ich ausdrücklich hinweisen, weil es immer wieder fälschlicherweise
  als eine Sitzung des Koalitionsausschusses beschrieben wird. Der Koalitionsausschuss
  ist ein festes Format. Das ist es nicht. Wir werden bei diesem Termin einen intensiven
  Dialog mit Gewerkschaften und Wirtschaftsverbänden fortführen. Die Themen, die auf
  der Tagesordnung stehen, sind die Themen, die Sie aus der allgemeinen Reformdebatte
  kennen. Sie wissen, dass der Bundeskanzler auch am Wochenende noch einmal die Erwartung
  geäußert hat, dass Arbeitgeber und Arbeitnehmer gemeinsame Vorschläge vorlegen.
  In den letzten Tagen haben sich die Akteure in vielen Runden getroffen. Inwieweit
  es zu diesem Wunsch tatsächlich eine Antwort gibt, werden wir dann am Mittwoch sehen.
  Es geht der Bundesregierung darum, zu hören und die Partizipation dieser Teilnehmer
  bzw. der Sozialpartner zu ermöglichen. Das ist das vornehmliche Ziel dieses Treffens.
  Herr Kornelius, dürfte ich noch einmal nachfragen, weil Sie „die allgemeinen Reformthemen“
  gesagt haben? Es wird ja gerade von Einkommenssteuerreform über Arbeitszeit bis
  Rente über alles diskutiert. Soll all das dort dann auch mit Arbeitgebern und Arbeitnehmern
  diskutiert werden? Wenn Sie es mir erlauben, möchte ich noch eine Halbfrage anhängen,
  weil Sie die Aussagen von Herrn Merz vom Wochenende erwähnt haben. Dabei stellte
  der Bundeskanzler ja auch noch einmal klar, dass es danach nicht in eine Art konzertierter
  Aktion münden solle. Könnten Sie vielleicht noch einmal ausführen, warum der Kanzler
  ein solches Treffen nicht verstetigen möchte? Es war nie gedacht, dass es eine Verstetigung
  dieses Treffens gibt. Es war als Austausch im Rahmen einer Reformdebatte gedacht,
  die wir seit Wochen und Monaten führen. Diese Reformdebatte ist breit angelegt.
  Ich möchte es nicht überfordern; im Kern geht es um drei oder um vier Themen: Es
  geht um die Frage der Besteuerung, es geht um die Frage der Sozialreformen, es geht
  um Bürokratierückbau, und es geht um arbeitsrechtspolitische Fragen. Zu all diesen
  Elementen werden sowohl Arbeitgeber als auch Arbeitnehmer Positionen haben. Diese
  kennen Sie bereits. Man wird nach dem Austausch besser als zuvor feststellen können,
  inwieweit Reformen in einem Korridor des Konsenses stattfinden oder nicht. Eine
  Ebene ist jetzt nicht erwähnt worden, nämlich die der Länder. Wenn man sich die
  Kommentare der letzten Tage zu den bekannt gewordenen Reformvorschlägen innerhalb
  der Bundesregierung anschaut, dann zeigt sich sehr großer Widerstand. Es fängt bei
  Gesundheit an und geht über Pflege bis zu anderen Punkten, z. B. ob Beamte einbezogen
  werden sollen. Plant der Kanzler auch noch ein separates Treffen mit den Ländern
  , wohlgemerkt zeitnah, also nicht die nächste MPK? Es wird die nächste MPK geben.
  Außerdem findet ständig ein Austausch auch mit Ministerpräsidenten statt. Soweit
  die Länder betroffen sind, werden sie natürlich einbezogen. Aber nun geht es erst
  einmal darum, sich zu den Kernreformen innerhalb der Bundesregierung zu verständigen.
  Die nächsten Schritte folgen danach. Gibt es die Zielvorstellung der Bundesregierung,
  dass man möglichst viele Gesetze zustimmungsfrei verabschiedet, um mögliche Blockaden
  im Bundesrat zu verhindern? Dazu gibt es keine quantifizierbare Festlegung. (zum
  Treffen der Koalitionsparteien mit Arbeitgebern und Gewerkschaften zu anstehenden
  Reformvorhaben ) Herr Kornelius, auch zu dem Treffen am Mittwoch würde mich interessieren:
  Gibt es eine feste Agenda? Wie lange soll das Ganze gehen, oder ist das sozusagen
  ein loser Austausch? Wie es gerade eben hier auch schon angeklungen ist, sind es
  wirklich Riesenthemen, von der Einkommensteuerreform bis zu den anderen Sachen,
  Arbeitszeit usw. Wie lange soll das Treffen gehen? Gibt es eine Tagesordnung, die
  vielleicht auch noch mitgeteilt wird? Richtig, das Gespräch ist für die Zeit von
  19 Uhr bis 22 Uhr angesetzt. Natürlich wird es strukturiert stattfinden. Die einzelnen
  Themencluster werde ich Ihnen momentan nicht liefern können, weil wir das natürlich
  auch dem Gespräch und den Vorgesprächen vorbehalten. Insofern bitte ich Sie, sich
  dazu noch etwas zu gedulden. Herr Kornelius ‑ ich glaube, ich muss das BMDS auch
  mit nach vorn bitten ‑, ein wesentlicher Teil der Reformen basiert auch auf möglichen
  digitalen Erweiterungen oder Veränderungen an den Prozessen. Vertraut der Bundeskanzler
  weiterhin darauf, dass die angekündigte EUDI-Wallet tatsächlich zum Jahresstart
  2027 zur Verfügung steht. Das Thema der digitalen Modernisierung ist eines der zentralen
  Reformthemen überhaupt beim Thema des Bürokratieabbaus und der Staatsmodernisierung.
  Beim Wallet ist tatsächlich das Fachministerium in der Führung. Der Bundeskanzler
  schließt sich dieser Meinung an. Die Einführung der EUDI-Wallet liegt im Zeitplan.
  Deutschland wird zum 2. Januar 2027 eine funktionsfähige Wallet bereitstellen und
  diese anschließend kontinuierlich um weitere Funktionen erweitern, wie bei einem
  Vorhaben in dieser Komplexität international üblich. Das Projekt liegt, wie gesagt,
  im Zeitplan. Wir hatten zum einjährigen Jubiläum des BMDS auch einen Einblick gegeben,
  die Wallet demonstriert und Anwendungsfälle gezeigt. Das war in einer Liveumgebung.
  Sie ist also schon operativ. Sie wird jetzt sehr umfassend getestet, auch mit Blick
  auf Sicherheit. Wir befinden uns auch in Gesprächen mit der Wirtschaft, um möglichst
  viele, ganz praktische Anwendungsfälle, z. B. den Altersnachweis im Supermarkt oder
  beim Onlineshopping, schon mit Beginn der Wallet anbieten zu können, denn Otto Normalverbraucher
  hat 1,5 Verwaltungskontakte im Jahr. Das fliegt dann mit den Anwendungen in der
  Wirtschaft. Dazu laufen die Gespräche noch. Über 150 Unternehmen testen gerade in
  einer „sandbox“ Anwendungsfälle. Dabei sind wir zuversichtlich, dass einige auch
  schon zum Start am 2. Januar live sind. Herr Druckenthaner, erlauben Sie mir die
  Nachfrage an der Stelle. Sie unterscheiden explizit zwischen einer Wallet und einer
  EUDI-Wallet. Was kommt zum 2.1.2027? Ich weiß, worauf Sie anspielen, Herr Kollege.
  Es geht darum, dass die EU ja auch bestimmte Anforderungen an diese Wallet formuliert.
  Diese werden wir, so gut es geht, zum 1.1.2027 oder 2.1.2027 erfüllen. Allerdings
  sind diese noch nicht ausbuchstabiert; da ist also auch noch die EU unter Zugzwang
  oder Lieferdruck. Sobald diese Kriterien alle da sind, werden wir eine vollumfängliche
  EUDI-Wallet bereitstellen. Wir wollen jetzt auch nicht länger warten, sondern wollen
  den Bürgerinnen und Bürgern sehr zeitnah die digitale Identität geben, die sie brauchen,
  um sich online ausweisen zu können. Weil das Thema Besteuerung und Einkommenssteuerreform
  angesprochen wurde, eine Frage an das Finanzministerium: Wenn ich mich richtig erinnere,
  wurde im Mai gesagt, dass man in den letzten Zügen sei oder an einem Entwurf arbeite.
  Wie ist denn der aktuelle Zeitplan? Wann wird das BMF seinen Vorschlag für eine
  Einkommenssteuerreform präsentieren? Derzeit wird über die Reform der Einkommenssteuer
  in der Koalition intensiv beraten. Der Bundesfinanzminister führt hierzu derzeit
  viele vertrauliche Gespräche. Das Ziel ist in der Tat klar: Die Einkommenssteuer
  für kleine und mittlere Einkommen soll gesenkt werden. So ist es auch im Koalitionsvertrag
  vereinbart. Sie sprachen eben über den Zeitraum. Die Koalition hat, wie Sie wissen,
  bereits beschlossen, dass die Reform zum 1. Januar 2027 in Kraft treten soll. Vielleicht
  noch einmal ganz grundsätzlich zur Einkommensteuerreform: Bundesfinanzminister Klingbeil
  hat immer wieder gesagt, worum es ihm bei dieser Reform geht. Es geht darum, kleine
  und mittlere Einkommen merklich zu entlasten. Es geht darum, dass diejenigen, die
  jeden Tag den Laden am Laufen halten, am Ende tatsächlich mehr in der Tasche haben.
  Diese Entlastung muss natürlich auch realistisch finanziert werden. Daran arbeiten
  wir derzeit sehr intensiv, wie eben schon angesprochen. Der weitere Zeitplan und
  die genaue inhaltliche Ausgestaltung hängen natürlich ganz unmittelbar an den aktuellen
  Beratungen innerhalb der Koalition. Frau Ernoult, nach meinem Verständnis war der
  Zeitplan bislang so, dass die Reform auf jeden Fall noch im Juni vorgestellt werden
  sollte und man sich dann auch in der Koalition Ende Juni, Anfang Juli beim Treffen
  des Koalitionsausschusses einigt. Ist das weiterhin der Zeitplan, oder wird der
  jetzt grundsätzlich in Frage gestellt? Wie gesagt, die Koalition hat sich darauf
  geeinigt, dass am 1. Januar 2027 eine Einkommensteuerreform in Kraft treten soll.
  Das kann ich Ihnen zum aktuellen Zeitplan sagen. Ansonsten möchte ich auf das verweisen,
  was ich eben gesagt habe. Wir arbeiten mit Hochdruck daran. Das ist das definitiv
  erklärte Ziel. Der genaue Zeitplan, die genaue Ausgestaltung sind gerade Gegenstand
  der Beratung innerhalb der Koalition. Die Arbeitsministerin und SPD-Co-Vorsitzende
  Bärbel Bas hat gestern gesagt, dass die Entlastung auf jeden Fall oberhalb der Marke
  von 500 Euro pro Jahr liegen müsse. Ist das die Zielgröße, die auch der Finanzminister
  im Auge hat? Da bitte ich um Verständnis, dass ich zum aktuellen Zeitpunkt keine
  Zielmarken benennen kann und ich jetzt aus meiner Position als Sprecherin für das
  BMF auch die Worte der Arbeitsministerin nicht einordnen kann. Wie gesagt, habe
  ich eben auch auf die Worte von Herrn Klingbeil zu dem Thema verwiesen. Er hat immer
  wieder unterstrichen, dass die kleinen und mittleren Einkommen merklich entlastet
  werden sollen. Ist es die Zielvorstellung von Herrn Klingbeil, dass gerade die kleinen
  und mittleren Einkommen so entlastet werden, dass mögliche Zusatzbelastungen, die
  jetzt bei Gesundheits- oder anderen Sozialreformen anfallen, dadurch ausgeglichen
  werden? Da bitte ich um Verständnis, dass ich mich aktuell nicht weiter mit Querverbindungen
  oder Verknüpfungen in Bezug auf die Einkommenssteuer äußern kann. Meinen Worten
  kann ich zum aktuellen Zeitpunkt nichts hinzufügen. Ist denn davon auszugehen, dass
  die Reichen im Land zur Gegenfinanzierung der Entlastung nicht beitragen werden?
  Ihre Prämisse in der Frage, Herr Kollege, möchte ich zunächst einmal zurückweisen.
  Wie Sie wissen, hat sich Herr Klingbeil auch mit Blick darauf, wie er eine gerechte
  Verteilung sieht, geäußert. Darauf möchte ich an der Stelle verweisen. Wie gesagt,
  Sie haben mir eine Frage gestellt zu der Vorstellung über die Verteilung. Herr Klingbeil
  hat sich in verschiedenen Formaten bereits genau dazu geäußert, nicht zuletzt auch
  zum Thema Vermögensverteilung. In Deutschland hat sich der Minister immer wieder
  geäußert. Er hat seine Grundüberzeugung hier auch immer wieder klargemacht: Menschen,
  die sehr hohe Vermögen und Einkommen haben, sollen ihren gerechten Beitrag dazu
  leisten, dass es gesamtgesellschaftlich gerechter zugeht. Eine Nachfrage an Herrn
  Kornelius, Stichwort Einkommenssteuerreform: Ist es weiter Ziel des Bundeskanzlers,
  dass man in der Koalition eine Einigung über eine Einkommenssteuerreform vor der
  parlamentarischen Sommerpause erzielt? Herr Kollege, ich verstehe Ihr Bedürfnis,
  Zielmarken, rote Linien, Stöckchen oder was auch immer zu finden und zu setzen.
  Wir haben zu keinem der Reformpunkte einen finalen Zeitpunkt genannt. Das Ziel ist,
  diese Reformen in einem Prozess abzuarbeiten. Prozesse sind aus ihrer Natur her
  fortlaufende Ereignisse. Wann eine Einkommenssteuerreform oder andere Reformelemente
  in welchem Stadium des politischen und parlamentarischen Verfahrens angelangt sein
  werden, werden wir dann sehen. Sie sehen mich etwas überrascht, weil ich durchaus
  Zielmarken wahrgenommen habe, die zuletzt von der Bundesregierung in verschiedenen
  Reformbereichen sehr offensiv verkündet wurden. Ja, aber nie definitiv und sozusagen
  nie für ganz konkrete Zielpunkte. Also, wir können Eckpunkte besprechen, wir können
  Gesetzentwürfe besprechen, wir können parlamentarische Verfahren besprechen. Wie
  Sie wissen, läuft jedes politische Vorhaben in vier, fünf Wellen durch den Prozess.
  Insofern möchte und kann ich mich auch bei der Einkommenssteuerreform nicht festlegen,
  wann eine solche Reform, wenn sie denn verhandelt wurde, welches Stadium erreicht
  hat. Nicht zur Einkommenssteuerreform, sondern zum BAföG , was ja auch eine soziale
  Reform ist, wenn man so will. Ich hätte dazu eine Frage an das Forschungsministerium.
  Die Ministerin hatte ja gesagt, sie habe vernommen, dass es im parlamentarischen
  Raum zur BAföG-Reform vielleicht keine Zustimmung mehr gebe. Mich würde da interessieren:
  Sind in dieser Woche Gespräche zwischen der Ministerin und dem Parlament geplant,
  und wie sind da die aktuellen Diskussionen? Es wäre schön, wenn Sie uns da kurz
  auf den neuesten Stand bringen könnten. Ich kann Ihnen dazu sagen, dass sich dazu
  in der letzten Woche mein Kollege sehr ausführlich dazu eingelassen hat. Ich kann
  gerne noch einmal betonen, dass im BMFTR, wie die Ministerin ja gesagt hat, weiterhin
  konzentriert daran gearbeitet wird, dass die Reform des BAföG Ende Juli auch im
  Kabinett beraten werden kann. Es finden Abstimmungen innerhalb der Bundesregierung
  statt. Dem können wir nicht vorweggreifen. ‑ Das ist also der aktuelle Sachstand,
  den ich Ihnen mitteilen kann. Wird es diese Woche noch Gespräche zwischen der Ministerin
  und den Parlamentariern dazu geben? Ich kann Ihnen sagen, dass grundsätzlich intensive
  Abstimmungen innerhalb der Bundesregierung stattfinden. Innerhalb der Bundesregierung,
  aber auch mit dem Parlament? Da müssten Sie sich an den parlamentarischen Raum wenden.
  Ich kann Ihnen keine weiteren Einzelheiten geben. Ich habe eine Frage zum Telefonat
  , das der Bundeskanzler am Freitag vor einer Woche mit dem argentinischen Präsidenten
  geführt hat. Leider kam ich beim letzten Mal nicht dazu, die Frage noch zu stellen.
  Herr Kornelius, könnten Sie uns sagen, wie der Bundeskanzler mittlerweile die Reformen,
  die der argentinische Präsident in seinem Land ergreift, bewertet? Ich glaube nicht,
  dass Gegenstand des Telefonats die argentinische Innenpolitik war. Der Kanzler hat,
  kurz bevor er Bundeskanzler wurde, gesagt, der argentinische Präsident ruiniere
  sein Land und er trete die Menschen mit Füßen. Würde er das heute immer noch sagen?
  Der Bundeskanzler hat in diesem Telefonat nicht die argentinische Politik beurteilt.
  Herr Milei und der Bundeskanzler haben sich über die Situation in der internationalen
  Politik ausgetauscht und darüber ein ausreichend tiefes Gespräch geführt. Schon
  vor etlichen Monaten ‑ ich glaube, es war im November ‑ ist im Kabinett der Rechtskreiswechsel
  für ukrainische Flüchtlinge beschlossen worden. Sie sollen dann Asylbewerberleistungen
  und nicht Grundsicherung bekommen, was damals noch Bürgergeld hieß. Allerdings hängt
  das im parlamentarischen Verfahren. Wird das jetzt insofern nachgebessert, auch
  auf Kabinettsebene, als dass man den Stichtag ändert? In dem ursprünglichen Entwurf
  stand: ab 1. April. Das ist ein bisschen komplex. Da hat man dann drei Gruppen,
  darunter die eine Gruppe der ukrainischen Flüchtlinge, die nach dem Stichtag, aber
  vor dem Inkrafttreten nach Deutschland gekommen sind. Wie wollen Sie das auflösen?
  Die Frage richtet sich entweder an Herrn Kornelius oder an das BMAS, würde ich vermuten.
  Oder an den parlamentarischen Raum? Sie haben es ja gerade schon beschrieben. Danach
  habe ich nicht gefragt. Was machen Sie? Ich kann Ihnen natürlich an der Stelle kurz
  den Arbeitsstand wiedergeben: Tatsächlich gab es, wie Sie das gerade beschrieben
  haben, den Beschluss im Kabinett. Wie üblich geht das Ganze dann in den parlamentarischen
  Raum. Im Moment finden auch noch Gespräche mit den Ländern statt. Insofern bleiben
  die für den Moment noch abzuwarten, bevor ich Ihnen sagen kann, was danach wieder
  ins Kabinett geht. Werden Sie ‑ Stand jetzt ‑ den Stichtag ändern? Wird sich das
  Kabinett noch einmal mit dieser Sache befassen müssen? Ich glaube, ich habe Ihnen
  das gerade schon beantwortet. Es gab einen Kabinettsbeschluss. Wie üblich schließen
  sich daran Beratungen im parlamentarischen Raum an. Die laufen derzeit, und das
  bleibt momentan abzuwarten. Eine Frage an das Auswärtige Amt: Die Regierung von
  Netanjahu will das Läuten von Kirchenglocken zum Gebetsruf in Jerusalem und im Westjordanland
  verbieten. Hält die Bundesregierung das für eine Rassendiskriminierung oder nicht?
  Ich kenne jetzt die zugrunde liegenden Details Ihrer Fragestellung nicht. Die Bundesregierung
  tritt natürlich überall auf der Welt für Religionsfreiheit sowie Presse- und Meinungsfreiheit
  ein, also für die Grundfreiheiten, und das natürlich auch im Westjordanland. Thema
  iranischer Angriff auf Israel und die Eskalation am Wochenende: Das Weiße Haus,
  der US-Präsident, hatte ja Israel aufgefordert, auf die Vergeltungsschläge zu verzichten,
  um den Deal mit dem Iran nicht zu gefährden. War die Bundesregierung involviert?
  Unterstützt die Bundesregierung die Vergeltungsschläge Israels? Die Bundesregierung
  war nicht involviert. Die Bundesregierung unterstützt die Bemühungen des US-Präsidenten
  um ein Abkommen. Das ist sicher. Wir rufen Iran auf, die Angriffe einzustellen und
  ernsthaft zu verhandeln. Israel hat natürlich das Recht auf Selbstverteidigung gegen
  Angriffe. Aber gleichzeitig gilt der Appell an alle Seiten zu deeskalieren und die
  diplomatische Lösung, über die jetzt tatsächlich schon lange verhandelt wird, weiter
  voranzutreiben. Das ist die Position der Bundesregierung. Jetzt haben Sie ja, wenn
  man es so verstehen kann, zwei Positionen. Einerseits sagen Sie, die Iraner sollen
  die Angriffe sein lassen, andererseits, dass beide Seiten deeskalieren sollen. Sie
  fordern also, wenn ich es jetzt richtig verstanden habe, auch Israel auf, nicht
  weiter anzugreifen? Ich habe gesagt: Die Bundesregierung ruft alle Beteiligten zur
  Deeskalation auf. ‑ Darin ist Israel natürlich einbezogen. Eine Frage ans BMWE:
  Wie bewerten Sie angesichts der neuen Angriffe die Energieversorgungslage in Deutschland
  , also mit Kerosin und Benzin? Inwieweit bedeutet das auch eine neue Bewertung der
  Lage und eines neuen Monitorings eventuell? Vielen Dank für die Frage. Ich habe
  am Freitag dazu ja auch schon hier Stellung bezogen. Natürlich hat sich die Lage
  noch einmal verschärft, aber es ist zu früh, um jetzt umfassend Rückschlüsse daraus
  zu ziehen. Ich wiederhole es gerne: Derzeit liegen uns keine Meldungen für physische
  Knappheiten in Europa vor. Das wird sich kurzfristig auch nicht ändern. Natürlich
  denken wir in Szenarien, natürlich gucken wir uns die Situation weiter sehr, sehr
  genau an. Wir stehen mit den Unternehmen, mit den Verbänden in engem Austausch.
  Die Unternehmen melden uns aber derzeit keine Engpässe im Bereich Kerosin. Insofern
  gilt es hier weiter, sehr aktiv zu beobachten. Natürlich schauen wir mit Sorge auf
  die Eskalation der letzten 24 Stunden. Aber derzeit gibt es keine Veränderung der
  Lage in diesem Bereich. Herr Kornelius oder Herr Hinterseher, wie schätzen Sie die
  Auswirkungen der Uneinigkeit zwischen den USA und Israel auf die Friedenschancen
  in der Region ein? Ich kann da keine Einschätzung vornehmen. Wir haben alle die
  Medienberichte aus der Nacht gesehen. Wir haben verschiedene Aktivitäten gesehen,
  die auch gerade der Regierungssprecher für die Bundesregierung kommentiert hatte.
  Eine dauerhafte Lösung dieses Konflikts kann nur durch Verhandlungen erzielt werden.
  Ich glaube, darüber besteht Einigkeit. Die Gespräche zwischen Iran und den USA dürfen
  aus unserer Sicht auch durch die aktuelle Lage nicht gefährdet werden. Denn das
  ist die Voraussetzung, um zu einer diplomatischen Lösung zu kommen. Aber eben die
  Uneinigkeit zwischen den USA und Israel? Ich glaube, wir sind der falsche Adressat
  für die Frage. Wir haben die Medienberichterstattung dazu vernommen. Ich würde gerne
  noch einmal zurückgehen ‑ ich bitte dafür um Verständnis ‑ und auf die Frage des
  Kollegen Bezug nehmen. Es gibt ja im Auswärtigen Amt einen Beauftragten, der sich
  um die Religionsfreiheit weltweit kümmert, Herr Rachel. War Herr Rachel zuletzt
  in Verbindung mit der israelischen Regierung, wenn es darum geht, dass Angehörige
  christlicher Kirchen in Israel zunehmend unter Druck stehen? Ich glaube, diese Tatsache
  ist uns bewusst. Das ist auch eine Entwicklung, die wir mit Sorge beobachten. Sie
  wissen, dass der Außenminister im vergangenen Jahr bei einer seiner Reisen in den
  Nahen Osten im Westjordanland auch in Taybeh war, ein ursprünglich sehr christlich
  geprägtes Dorf im Westjordanland, und dort diese Sorge persönlich vorgetragen hat.
  Was die Reisen von Herrn Rachel angeht, müsste ich Ihnen nachreichen, wann die letzte
  Reise nach Israel und Palästina war. Herr Hinterseher, Sie haben ja gesagt, die
  Gespräche dürfen nicht gefährdet werden. Aus Irans Perspektive werden die Gespräche
  ja gefährdet durch israelische Angriffe auf Libanon. Das wird so explizit als Begründung
  gegeben. Sehen Sie auch den Zusammenhang im Auswärtigen Amt? Wir hatten ja gerade
  darauf hingewiesen, dass wir alle Akteure zur Zurückhaltung und zur Rückkehr zum
  Waffenstillstand aufrufen. Es gibt ja einen Waffenstillstand, der an der einen oder
  anderen Stelle immer wieder brüchig wird. Wir rufen alle Akteure auf, diesen auch
  im Libanon einzuhalten. Deshalb werden wir auch weiter unsere Mittel, Wege und Kanäle
  einsetzen, um gegenüber allen Seiten darauf hinzuwirken, dass sich eine Eskalation
  nicht weiter verfestigt. Aber es ist klar: Das gilt auch für die Lage im Libanon.
  Ohne Waffenstillstand im Libanon wird es auch keine Lösung für den Konflikt zwischen
  Iran und Israel geben. In diesem Gesamtkomplex ‑ Sie wissen, da hängt vieles mit
  vielem zusammen ‑ sehen wir natürlich auch diese Situation im Libanon, wo wir dazu
  aufrufen, dass der Waffenstillstand eingehalten wird. Hat es seit gestern Abend
  schon direkten Austausch gegeben zwischen dem, wie Sie sagen, immer in intensivem
  Austausch mit Israel stehenden Außenminister Deutschlands und dem israelischen Außenminister?
  Das müsste ich Ihnen nachliefern. Das kann ich Ihnen zur Stunde nicht sagen. Aber
  der Kanzler hat sich bisher zum Beispiel nicht bei Herrn Netanjahu gemeldet, um
  quasi die europäische oder die deutsche Position einzubringen, nämlich die Waffenruhe
  beziehungsweise die iranisch-amerikanischen Verhandlungen nicht zu gefährden? Ist
  vielleicht davon auszugehen, dass es noch passiert? Na ja, die israelische Regierung
  wird die deutsche Position natürlich übermittelt bekommen. Es gibt regelmäßig Gespräche
  zwischen dem israelischen Premierminister und dem Bundeskanzler. Aber für heute
  ist nichts geplant. An Herrn Kornelius und Herrn Hinterseher: Bundeskanzler Friedrich
  Merz hat im Rahmen des EU-Westbalkan-Gipfel betont, dass die Erweiterung der EU
  aus seiner Sicht seit vielen Jahren überfällig sei. Was ist der Gewinn für Deutschland
  und die EU bei einer schnellen Aufnahme der Westbalkanstaaten? Woran lag es, dass
  bei Serbien und Montenegro, wo der Beitrittsprozess ja schon am weitesten fortgeschritten
  war, die Verhandlungen in Stocken geraten sind? Das sind jetzt umfassende Fragen. ‑
  Die Stabilität des Westbalkans ist die Stabilität Europas. Deswegen hat Deutschland
  ein hohes Interesse daran, dass die Region stabil ist. Je enger sie an die Europäische
  Union angebunden ist oder sogar durch die Mitgliedschaft eingebunden ist, desto
  höher der Garant für Stabilität. Das ist natürlich auch ein Wachstums- und ein Prosperitätsversprechen,
  nicht nur für den Westbalkan, sondern auch für die Staaten der Europäischen Union.
  Dazu müssen die Bedingungen für die Aufnahme erfüllt sein. Wir haben jetzt mit dem
  gemeinsamen Vorschlag von Präsident Macron und Bundeskanzler Merz die klare Botschaft
  an die Westbalkanstaaten gesandt, dass wir diese Region schnellstmöglich in die
  Europäische Union aufnehmen mögen. Ziel ist es, die volle Mitgliedschaft aller Staaten
  der Westbalkanregion zu erreichen. Gleichzeitig muss der Prozess jetzt intensiviert
  werden und sozusagen auch in konkrete Schritte umgewandelt werden. Dem dient diese
  Initiative. Ich glaube, das ist „in a nutshell“ die Strategie in allem. Die Analyse
  über die Beitrittsprozesse von Serbien und Montenegro lesen Sie in den Fortschrittsberichten.
  Die wurden auch in den bilateralen Gesprächen in Montenegro zwischen dem Bundeskanzler
  und den jeweiligen Vertretern geführt. Montenegro hat nach dem allgemeinen Verständnis
  sehr große Fortschritte erzielt. Was Serbien betrifft, so hat die Europäische Union
  auch öffentlich klar gemacht, dass sie ein Ende der Schaukelpolitik erwartet. Das
  ist der Stand der jeweiligen Fortschrittsbewegungen. Der Leiter der Holocaust-Gedenkstätte
  Yad Vashem, Dani Dayan, wurde letzte Woche auf die ukrainische Mirotworez-Liste
  der Staatsfeinde der Ukraine gesetzt, weil er die staatliche Ehrung des Nazi-Kollaborateurs
  Andrij Melnyk kritisiert hatte. Da würde mich interessieren: Wie bewertet die Bundesregierung
  diese Listung? Plant sie, gegenüber der ukrainischen Regierung auf die Löschung
  der Webseite hinzuwirken? Dieser Vorgang ist mir nicht bekannt, tut mir leid. Gut,
  die Antwort hatten wir schon einmal, aber eine Nachfrage sei mir noch erlaubt: Zumindest
  das Auswärtige Amt hat sich nicht immer so unwissend gezeigt, was diese Listung
  und diese Liste angeht, auch vor dem Hintergrund, dass dort auch Altkanzler Schröder,
  Sahra Wagenknecht oder auch der ehemalige Staatssekretär im AA Wolfgang Ischinger
  aufgeführt wird. Ich zitiere kurz aus der Bundesdrucksache 19/11668: „Die Bundesregierung
  verurteilt Mirotworez in aller Deutlichkeit und fordert von der ukrainischen Regierung
  und den ukrainischen Behörden, auf die Löschung der Seite hinzuwirken.“ Bleibt die
  Bundesregierung bei dieser Einschätzung der Vorgängerregierung? Wenn ja, wann hat
  sie in bilateralen Gesprächen das letzte Mal auf die Löschung dieser Seite hingewirkt?
  Es tut mir leid, aber wie ich gerade ausgeführt hatte, ist mir dieser Vorgang nicht
  bekannt, und mir ist auch die Drucksache 19/11668 leider nicht so lebhaft bekannt,
  dass ich Ihnen das stante pede beantworten kann. Das müssten wir gegebenenfalls
  nachliefern; sehen Sie es uns nach. Aber Sie haben ja letzte Woche bereits etwas
  nachgeliefert. Das heißt, Sie haben durchaus Wissen von dieser Sache. Ihr Pressebüro ‑
  die Anzahl der Leute ist ja überschaubar ‑ hat mir dazu bzw. zu dieser ganzen Causa ‑
  Ehrung von Melnyk ‑ am Freitag durchaus eine Antwort geschickt. Jetzt zu sagen,
  man wisse nichts von dem Vorfall, kaufe ich vielleicht noch Herrn Kornelius ab,
  aber nicht Ihnen, Herr Hinterseher. Es war, glaube ich, eine andere Anfrage, die
  Sie uns schriftlich nachgeliefert hatten, auf die Sie eine Antwort bekommen hatten.
  Da ging es nämlich um die Frage des Gedenkens, und die Antwort kann ich gerne noch
  einmal für alle vorlesen: Das Auswärtige Amt sowie die gesamte Bundesregierung setzen
  sich für das Gedenken an die Opfer der Menschheitsverbrechen des SS-Regimes und
  die unabhängige wissenschaftliche Erforschung und Aufarbeitung der Geschichte ein.
  Mit der Ukraine steht das Auswärtige Amt in einem engen und vertrauensvollen Austausch.
  Auch das Gedenken an die Opfer der NS‑Verbrechen und die unabhängige und transparente
  Aufarbeitung der Geschichte spielen dabei eine wichtige Rolle. Die Bundesregierung
  verurteilt den völkerrechtswidrigen russischen Angriffskrieg gegen die Ukraine und
  unterstützt die Ukraine in ihrer Selbstverteidigung. Weil das ja letzte Woche Teil
  ihrer Frage war, wollte ich es ganz zitieren. Die Frage damals ‑ die auch bis jetzt
  nicht beantwortet ist ‑ war, wie die Bundesregierung die Kritik von Yad Vashem an
  der offiziellen Ehrung des Nazi-Kollaborateurs Melnyk bewertet. Diese Kritik hat
  jetzt ja zu der Listung auf der Mirotworez-Liste geführt. Ich sehe mich nicht veranlasst,
  eine Kritik von Yad Vashem hier für die Bundesregierung zu kommentieren. Gut zu
  wissen, dass Sie gut finden, es zu wissen. Auch an das Auswärtige Amt: Heute Morgen
  haben mehrere führende Friedens- und Konfliktforschungsinstitute ihr Gutachten für
  das Jahr 2026 vorgestellt. Darin fordern sie die Bundesregierung auf, Verstöße gegen
  das Völkerrecht, insbesondere auch von Partnern wie Israel und den USA, klar zu
  benennen und mehr Mechanismen zur Rüstungskontrolle zu schaffen. Mich würde interessieren:
  Wie bewerten Sie diesen Bericht und wie gehen Sie mit den Forderungen, die auch
  an Sie gerichtet sind, um? Auch hier, Herr Kollege, würde ich den Bericht, den ich
  nicht vorliegen habe und noch nicht kenne, den wir uns aber mit Sicherheit sehr
  genau ansehen werden, nicht kommentieren. Ansonsten haben wir uns, glaube ich, zu
  den Sachverhalten Ihrer Frage hier schon sehr oft geäußert, gerade auch was Fragen
  der Rüstungsexportkontrolle angeht. Dabei würde ich es gerne belassen. Findet angesichts
  der Niederlage jetzt bei der Abstimmung in der UN-Generalversammlung bezüglich der
  beiden jetzt angesprochenen Themen noch einmal ein Nachdenken bei Ihnen statt? Oder
  würden Sie sagen, dass die Politik so fortgeführt wird? Es fällt mir wieder schwer,
  das in dieser Allgemeinheit zu beantworten. Wir hatten ja ‑ übrigens auch der Minister ‑
  letzte Woche zu dieser natürlich sehr enttäuschenden Niederlage bei der Bewerbung
  um einen nichtständigen Sitz für den VN-Sicherheitsrat sehr ausführlich Stellung
  genommen. Darüber hinaus habe ich Ihnen heute nichts anzubieten. Ich glaube, auch
  mein Kollege Herr Giese hat hier am Freitag sehr ausführlich dazu Stellung genommen.
  Wir warten seit dem 3. Januar bzw. seit dem 28. Februar dieses Jahres auf die völkerrechtliche
  Bewertung Ihres Hauses in Sachen Maduro-Kidnapping und Angriffskrieg der USA und
  Israels auf Iran. Haben Sie die mit dabei? Ich habe Ihnen keinen neuen Stand anzubieten.
  Herr Hinterseher, wir sprechen jetzt mittlerweile von Monaten, die diese Einschätzung
  dauert. Im Fall der militärischen Bedrohungsakrobatik von Trump gegenüber Kuba ist
  das ja auch der Fall. Können Sie einmal sagen, was in diesen drei genannten Fällen ‑
  Entführung eines Staatschefs, Angriffskrieg gegen einen souveränen Staat, militärische
  Bedrohung gegen Kuba ‑ dazu führt, dass es über Monate hinweg nicht zu Erkenntnisgewinn
  im AA kommt? Das ist jetzt im Prinzip noch einmal die gleiche Frage, aber in anderer
  Fragestellung verpackt. Das sind übrigens drei Sachverhalte, zu denen wir uns hier
  separat in den jeweiligen Einzelfällen auch geäußert hatten. Insofern habe ich Ihnen
  hier keinen neuen Stand darzubieten, der diese drei unterschiedlichen Sachverhalte
  zusammenführen würde. Das heißt, die Bundesregierung würde nach wie vor keinen der
  drei Fälle als einen Völkerrechtsbruch bewerten? So, wie sie angelegt ist, ist das
  eine rhetorische Frage, glaube ich. Nein, das ist ein ernsthaftes Interesse. Sie
  haben bisher ja keine Einschätzung formuliert. Ich hatte die Frage gerade ja beantwortet.
  Sie haben gesagt, dass da nichts vorliegt, aber eine Einschätzung haben Sie nicht
  formuliert. Herr Kollege, ich glaube, Sie müssen mit der Antwort des Auswärtigen
  Amts jetzt zufrieden sein. Es tut mir vielleicht auch leid für Ihr Erkenntnisinteresse,
  aber ich habe das Gefühl, dass wir an dieser Stelle nicht zu weiterem Erkenntnisgewinn
  kommen ‑ jedenfalls nicht im Sinne Ihrer Fragestellung. Meine Frage richtet sich
  entweder an das Familienministerium oder an den Regierungssprecher und ausdrücklich
  nicht an das Justizministerium: Das Allgemeine Gleichbehandlungsgesetz , das es
  seit 20 Jahren gibt, wird jetzt reformiert. Das ist schon durch das Kabinett gegangen,
  und demnächst steht die erste Beratung im Bundestag an. Ich wüsste gerne, wer in
  der Bundesregierung sich warum dagegen ausgesprochen hat, dass auch staatliche Stellen
  mit einbezogen werden sollen. Man kann sich ja nach dem AGG zivilrechtlich wehren,
  zum Beispiel gegen einen Vermieter, der einen nicht einlädt, weil ihm der Name nicht
  passt, oder gegen einen Arbeitgeber, der einen wegen einer körperlichen Behinderung
  oder des fortgeschrittenen Alters nicht einstellt, aber gegenüber staatlichen Stellen
  geht das nicht. Was haben Sie eigentlich dagegen? Ich kann dazu nur allgemein sagen,
  dass wir uns mit den vorgeschlagenen AGG-Änderungen darauf konzentrieren, wie wir
  Vorgaben des europäischen Rechts hier umsetzen. Bei mehreren EU-Vorgaben ist die
  Umsetzung eibedürftig. So müssen die Richtlinien über Standards für die Gleichbehandlung
  bis zum Sommer umgesetzt werden. Ziel ist es jetzt, die Richtlinien ohne überschießende
  Regelungen umzusetzen und gleichzeitig den Diskriminierungsschutz effektiv weiterzuentwickeln.
  Ihre Frage, wer jetzt genau etwas dagegen hat, kann ich an dieser Stelle nicht beantworten.
  Ich möchte jetzt auch nicht zur internen Positionierung Auskunft geben, möchte das
  aber vielleicht doch noch einmal kommentieren. Ihre Fragestellung hätte man ja so
  verstehen können, als ob der Staat nach Gutdünken diskriminieren kann. Das ist aber
  eben nicht der Fall. Dazu muss man auch nicht das AGG ändern; vielmehr sind staatliche
  Stellen schon aufgrund des Grundgesetzes daran gebunden, Menschen nicht zu diskriminieren,
  sondern sie gleichzubehandeln. Der eigentliche Zweck des AGG ist ja gerade, auch
  Privatpersonen, die sich eben nicht an das Grundgesetz als solches halten müssen,
  in die Pflicht zu nehmen und da Diskriminierungsverbote aufzustellen. Die Tatsache,
  dass das AGG die staatlichen Stellen nicht als Adressat nennt, ist aber nicht Ausweis
  eines Defizit des Diskriminierungsschutzes in Deutschland. Selbstverständlich ‑
  dazu haben wir auch bei anderer Gelegenheit gesprochen ‑ ist vorstellbar, das AGG
  fortzuentwickeln und den Diskriminierungsschutz in Deutschland zu stärken. Da geht
  es aber eben um die Frage, ob man diesen privatrechtlichen Diskriminierungsschutz
  nicht noch ausbauen kann. Ich hätte dazu noch eine Nachfrage ‑ wer auch immer von
  Ihnen sich da berufen fühlt ‑: Meinen Sie nicht, dass man es für die Betroffenen
  mit einer solchen Regelung einfacher machen würde, sich Recht zu verschaffen, zumal
  sich ja ein Viertel aller Fälle ‑ ich glaube, das war die Zahl, die Sie genannt
  hatten ‑, die bei der Beauftragten aktenkundig werden, auf Kontakt mit staatlichen
  Stellen beziehen? Ich kann mich zu den einzelnen Fällen jetzt nicht verhalten. Wer
  durch staatliche Stellen diskriminiert wird, dem steht aber schon heute der verwaltungsgerichtliche
  Rechtsschutz offen. (zu den Einreisepraxis der USA im Rahmen der Fußball-Weltmeisterschaft
  ) Es hat in den letzten Tagen Berichte gegeben, dass schottischen Fans die Einreise
  nicht genehmigt wurde. Das sind offenbar noch verlaufende Verfahren. Diese Fans
  hatten über ESTA versucht, sich Touristenvisa zu besorgen. Herr Bowinkelmann, gibt
  es Hinweise darauf, dass auch deutsche Fans möglicherweise nicht in die USA einreisen
  können, weil zunächst genehmigten ESTA-Anträgen jetzt plötzlich wieder die Genehmigung
  entzogen wurde? Mir liegen diesbezüglich keine Erkenntnisse vor. Herr Hinterseher,
  haben Sie Erkenntnisse zu dem Komplex? Ich kann dazu nur ganz grundsätzlich etwas
  sagen: Wir weisen darauf hin, dass weder eine gültige ESTA-Genehmigung noch ein
  US-Visum einen Anspruch auf Einreise in die USA begründen. Die endgültige Entscheidung
  treffen immer die US-Grenzschutzbeamten. Deshalb wäre die Frage wahrscheinlich an
  die USA zu richten. Das ist klar, aber da es eben in Schottland ‑ mir ist jetzt
  kein anderes Land bekannt ‑ mehrere Fälle gab, in denen plötzlich ein Nein auftauchte,
  nachdem es vorher eine Genehmigung gab, wäre ich daran interessiert zu wissen, ob
  das möglicherweise auch deutsche Fans betrifft. Mit meinem momentanen Wissensstand
  kann ich Ihnen dazu nichts sagen. Wir überprüfen unsere Reise- und Sicherheitshinweise
  laufend und passen sie lageabhängig an. Sollten sich da Zeichen mehren oder dergleichen,
  dann würde das natürlich abgebildet. Ich möchte aber diese Gelegenheit nutzen, um
  allen, die vorhaben, in die USA zu reisen, zu raten, sich auf ELEFAND zu registrieren
  und auch die Reise- und Sicherheitshinweise des Auswärtigen Amtes zu verfolgen.
  Herr Kornelius, Sportstaatsministerin Schenderlein wird zu einem Spiel der Mannschaft
  nach Toronto reisen, also nach Kanada. Ist es Absicht vonseiten der Regierung, die
  USA-Einreise zu meiden? Nein, ich glaube, das liegt am Spielplan. Die deutsche Mannschaft
  spielt auch in Toronto. Warum sollte die Staatsministerin insofern nicht dorthin
  reisen? Aber es geht jetzt ja um die Einreise in die USA. Bezüglich der Einreise
  nach Kanada hören wir nichts, da scheint es keine Probleme zu geben. Dementsprechend
  könnte man ja vorangehen und sagen, dass man die Einreise in die USA meidet. Ich
  glaube, da gibt es keinen Zusammenhang. An das Auswärtige Amt ‑ gerne auch an den
  Regierungssprecher, aber vor allen Dingen erst einmal an Herrn Hinterseher ‑: Dem
  vorläufigen Ergebnis zufolge hat die Partei von Regierungschef Pashinjan die Parlamentswahl
  in Armenien gewonnen. Wie wird das hier aufgenommen? Die Parlamentswahl am gestrigen
  Sonntag wurde im Vorfeld als eine richtungsweisende Wahl für Armeniens Reformkurs
  beschrieben. Daher war es aus unserer Sicht besonders wichtig, dass über den Ausgang
  dieser Wahl einzig die Bürgerinnen und Bürger Armeniens entscheiden. Faire, freie
  Wahlen ohne Desinformation, ohne hybride Einflussnahme von außen sind extrem wichtig.
  Wir begrüßen deshalb nachdrücklich, dass die OSZE bzw. ODIHR auf Einladung der armenischen
  Regierung eine Wahlbeobachtungsmission entsenden konnte. Auch Deutschland hat sich
  an dieser Wahlbeobachtung beteiligt. Die Arbeit der Wahlbeobachter ist umso wichtiger
  angesichts besorgniserregender Berichte über versuchte externe Einflussnahme auf
  den Wahlkampf, insbesondere seitens Russlands. Dem vorläufigen amtlichen Ergebnis
  zufolge hat es mit etwas unter 60 Prozent eine höhere Wahlbeteiligung gegeben als
  noch 2021. Ich glaube, das werten wir schon einmal als sehr gutes Zeichen. Dem vorläufigen
  Ergebnis zufolge, das Sie erwähnt hatten, hat der bisherige Premierminister Pashinjan
  die Wahl gewonnen. Er hat angekündigt, seine Regierungsarbeit und seinen Reformkurs
  fortsetzen zu wollen. Hierzu scheint er dem vorläufigen Ergebnis zufolge eine sehr
  stabile Mehrheit zu haben. Unseren Erkenntnissen zufolge, die natürlich auf diesen
  ersten Einschätzungen beruhen, ist die Wahl weitgehend ruhig und ohne größere Zwischenfälle
  verlaufen. Aber jetzt werden wir natürlich die weitere Berichterstattung auch dieser
  Wahlbeobachtungsmission erst einmal abzuwarten haben. Herr Müller, die AfD Sachsen-Anhalt
  hat am Wochenende ein Wahlkampfvideo online verbreitet. Darin zu sehen ist der Spitzenkandidat
  der Landes-AfD während des Sachsen-Anhalt-Tags in Bernburg. Dieser Spitzenkandidat
  geht in diesem Video auf einen Stand der Bundeswehr zu, die dort zugegen war, und
  er wird dort ‑ so der Anschein ‑ sehr freundschaftlich, sehr jovial von Vertretern
  der Bundeswehr in Uniform begrüßt. Wie steht das Verteidigungsministerium dazu,
  dass die AfD die Bundeswehr hier augenscheinlich für Wahlkampfzwecke ausnutzt? Bei
  dem Umgang mit Parteien bzw. Politikerinnen und Politikern gibt es für die Bundeswehr
  ganz klare Regeln. Für Besuche in Kasernen gibt es zum Beispiel eine Schutzfrist
  von sechs Wochen vor Wahlen. Es gibt auch die Regel, dass bei diesen Informationsbesuchen
  keine eigene Pressearbeit gemacht wird und kein Videobildmaterial zur Verfügung
  gestellt wird, das dann durch die Parteien genutzt werden kann, und zwar unabhängig
  davon, welche Partei es ist. Der Sachsen-Anhalt-Tag fand im öffentlichen Raum statt;
  hier war das also anders gelagert und es gab kein Fotografierverbot. Alle Teilnehmer
  der Bundeswehr sind auch belehrt worden, dass von ihnen Film- und Fotoaufnahmen
  gemacht werden können. Die Partei, die Sie angesprochen haben, ist eine im Landesparlament
  vertretene Partei und hat damit entsprechende Informationsrechte, die sie bei der
  Bundeswehr auch einfordert, zum Beispiel durch Truppenbesuche, wie ich bereits sagte,
  oder auch im öffentlichen Raum bei solchen Veranstaltungen. Sie wird dort, im Grunde
  genommen, wie jede andere Partei wahrgenommen, und ihre Fragen werden beantwortet.
  Ob die Angehörigen der Bundeswehr, die dort gefilmt wurden ‑ es waren ca. 150 Angehörige
  der Bundeswehr auf einer Strecke von ca. 300 Metern ‑, vorab darüber informiert
  wurden, dass die Partei im Nachgang solch eine Art von Werbefilm erstellt, kann
  ich aktuell noch nicht sagen. Das weiß ich nicht. Unser Anspruch ist ganz klar ‑ wir
  haben ihn hier schon mehrfach dargestellt ‑, dass wir in der Bundeswehr ganz klar
  zur freiheitlich-demokratischen Grundordnung stehen, und zwar ausnahmslos, und dass
  wir alle Strömungen ‑ und damit meine ich alle ‑, die diese Demokratie gefährden,
  alle Formen von Extremismus, alles, was Antisemitismus und das Verletzten von Rechten
  Dritter beinhaltet, ablehnen und konsequent ahnden. Wir wissen, dass unsere Soldatinnen
  und Soldaten dazu stehen. Danke. ‑ Ist Ihnen das konkrete Video demzufolge bekannt?
  Ist es nicht problematisch, wenn dort ein hochrangiger Vertreter der Bundeswehr
  offenkundig so freundschaftlich auftritt? Wie ich sagte, sind wir auch rechtlich
  verpflichtet, gewisse Informationen zu geben. Dazu weise ich auch noch auf das Neutralitätsgebot
  nach § 15 des Soldatengesetzes hin. Man darf vor Ort nicht für eine Partei, die
  man mag oder vertritt, Werbung machen. Das kommt noch zu all den anderen Regeln
  hinzu, die ich genannt habe. Zu beurteilen, ob in diesem Falle eine gewisse Grenze
  auch in der öffentlichen Wahrnehmung der Bundeswehr überschritten wurde, dafür sind
  die truppendienstlichen Vorgesetzten zuständig. Sie müssen sich auch den Gesamtkontext
  anschauen. Das zu beurteilen obliegt nicht mir hier an dieser Stelle; das obliegt
  den truppendienstlichen Vorgesetzten, die das im Gesamtkontext bewerten. Meine Frage
  geht zunächst einmal an das Umweltministerium. Frau Rehlinger hat in einem Brief
  an den Bundeskanzler davor gewarnt, dass die Verteilung neuer Emissionsrechte nach
  dem ETS-1-Emissionsrechtesystem die Investitionen gerade der Stahlkonzerne in grüne
  Produktion unterlaufe. Teilt das Umweltministerium die Sorge, dass die Zuteilung
  neuer kostenloser Emissionen diese Anstrengungen in CO 2 -armer Produktion gefährde?
  Grundsätzlich sehen wir im Emissionshandel und der Planbarkeit, die er gibt, ein
  zentrales Instrument des Klimaschutzes in der EU. Gleichwohl hat sich Umweltminister
  Schneider selbst auch dafür eingesetzt, zu schauen, wo man der Industrie unter Wahrung
  des Kerns des Emissionshandels beim Übergang helfen kann. Was den konkreten Brief
  betrifft, unabhängig davon, dass wir uns zu einzelnen Äußerungen oder Initiativen
  wie solch einem Brief nicht spezifisch äußern, will ich gern schauen, was ich Ihnen
  in diesem Kontext noch an Nachreichung bieten kann. Herr Kornelius, in dem Brief
  steht auch, die Bundesregierung solle die Zusage einhalten, dass die Bahn künftig
  nur noch grünen Stahl einsetzt, der hier in Deutschland produziert wird. Können
  Sie uns sagen, ob dies nach wie vor Ziel der Bundesregierung ist oder nicht? Herr
  Kollege, der Brief ist etwa zwei oder drei Stunden alt. Es ist offenbar ein öffentlicher
  Brief. Die Eigenart, Briefe öffentlich zu schreiben und zwei Stunden später öffentliche
  Antworten einzufordern, wird vom Bundeskanzler nicht geteilt. Deswegen kann ich
  Ihnen hier auch keine Antwort dazu geben. Möglicherweise wäre es möglich, so einen
  Brief direkt zu schreiben und dann auch eine direkte Antwort zu bekommen. Die Thematik
  hinsichtlich des Emissionshandels wurde vom Kollegen eben beschrieben. Das wird
  vom Bundeskanzler geteilt. Der Bundeskanzler hat ein Interesse an einer starken
  Stahlindustrie in Deutschland. Zum grünen Stahl gibt es Debatten, auch zur Benutzung
  grünen Stahls durch die Deutsche Bahn. Aber das ist kein Thema, das wir zwei Stunden
  nach Versand eines elektronischen Briefes an Nachrichtenagenturen öffentlich kommentieren.
  Wenn ich das kurz hinzufügen darf: Der Brief trägt das Datum des 5. Juni. Ich weiß
  natürlich nicht, ob er dem Kanzleramt postalisch zugestellt wurde; ich vermute aber,
  nicht. Von daher müsste der Brief dem Kanzleramt schon seit mindestens drei Tagen
  vorliegen. Deswegen wäre es tatsächlich klasse, wenn es noch eine Antwort auch auf
  diesen Brief ‑ ‑ ‑ Ich bemühe mich, aber Sie kennen das Wochenende und die Mühlen
  der Bürokratie und der Post. Ich habe eine Frage an das Gesundheitsministerium .
  Am Mittwoch startet in Bonn ein weiterer Prozess , bei dem es um Maskengeschäfte
  geht. Es geht um 480 Millionen Euro plus Zinsen. Viele Prozesse hat das BMG bislang
  ja verloren, wenn ich es richtig sehe. Mit welcher Erwartung blicken Sie auf diesen
  Prozess, und haben Sie diesbezüglich Ihre Taktik möglicherweise noch verändert?
  Gerichtliche Verfahren kommentieren wir an dieser Stelle grundsätzlich nicht. Es
  geht um 480 Millionen Euro plus Zinsen für etwaige Zahlungen, also um mehr als eine
  halbe Milliarde Euro. Wie gehen Sie damit um? Sind dafür Rückstellungen angelegt?
  Gibt es dazu Gespräche oder vielleicht auch Vereinbarungen mit dem Finanzministerium?
  Wie gesagt, kommentieren wir gerichtliche Verfahren und alles darauf Aufbauende
  an dieser Stelle nicht. Es ging in meiner Frage nicht um das Gerichtsverfahren,
  sondern um Kostenrisiken. Herr Kornelius, gestern war ja ein historischer Tag für
  den deutschen Sport: der erste männliche Grand-Slam-Sieger seit 30 Jahren. Ich habe
  vom Bundeskanzler bisher nur einen kleinen Instagram-Post gesehen, in dem er gratuliert.
  Können wir davon ausgehen, dass er sich noch persönlich bei Herrn Zverev meldet?
  Ich würde einen Instagram-Post nicht als klein bezeichnen. Sie als Instagram-Nutzer
  wissen ganz genau, dass das eine große Wirkung entfaltet. Dieser Glückwunsch ist
  ernst gemeint. Über die direkten Kontakte kann ich Ihnen momentan keine Auskunft
  geben. Hat das gestern irgendeine Bedeutung für die Bundesregierung? Der Bundeskanzler
  war gestern Abend zur Zeit des Tennisspiels in London. Das Ergebnis wurde in das
  Treffen hineingereicht. Alle Beteiligten haben sich mit dem Bundeskanzler darüber
  sehr gefreut. (zur Religionsfreiheit in Israel ) Herr Kollege, ich hatte Ihnen eine
  Nachlieferung bezüglich der Reise von Herrn Rachel als Beauftragtem für Religions-
  und Weltanschauungsfreiheit zugesagt. Die letzte Reise in die palästinensischen
  Gebiete und nach Israel war vom 27. bis zum 30. September. Dabei gab es Gespräche
  mit Vertretern aller großen Religionen in der Region. Zur Reise des früheren Bundeskanzlers
  Gerhard Schröder kann ich Ihnen mitteilen, dass es sich um eine Reise als Privatperson
  in Eigenverantwortung handelte.'
