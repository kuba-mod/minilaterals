title: Speech by Federal Chancellor Merz at the Ukraine Recovery Conference 2026 “Standing
  firmly by Ukraine’s side”
text: 'Russia will not win the war, Federal Chancellor Merz emphasised at the Ukraine
  Recovery Conference. “Europe’s support to Kyiv is unwavering”, emphasised Federal
  Chancellor Merz upon the opening of the Ukraine Recovery Conference 2026 (UCR) in
  Gdańsk, Poland. Military and civilian support for Ukraine remains fundamentally
  important. “Security. Investment. Reforms. People. These are the building blocks
  for Ukraine’s recovery”, said the Federal Chancellor. Together with its partners,
  he said, Germany is prepared to provide concrete support to Ukraine in all four
  of these areas. “Ukraine is in a new position of strength”, said Merz. The Chancellor
  sent a clear message to Russia: Russia will not win this war. Germany and its partners
  are prepared to increase the pressure on the already struggling Russian economy.
  “The time has come to enter into negotiations, freeze the front line and put an
  end to the killing”, the Federal Chancellor urged. Reconstruction of Ukraine: The
  losses and damage caused by Russia’s war of aggression are immense and cannot be
  dealt with by public funds alone. The focus of URC 2026 is on continuing international
  support for Ukraine and mobilising private investment for reconstruction. Public
  and private sector organisations must work closely together in this area. Alongside
  Federal Chancellor Merz, Development Minister Alabali Radovan also attended the
  conference. She, too, called for international investment in Ukraine’s reconstruction.'
