title: Regierungserklärung des Bundeskanzlers vor dem Europäischen Rat „Ohne Europa
  geht es nicht“
text: 'Der Kanzler forderte in seiner Regierungserklärung Reformen für ein starkes
  Deutschland und ein sicheres, souveränes Europa. Bundeskanzler Friedrich Merz hat
  in seiner Regierungserklärung im Vorfeld des Europäischen Rates Mitte Juni in Brüssel
  deutlich gemacht, dass Deutschland einen klaren Kurs der Erneuerung einschlagen
  müsse. Nur so könne das Land wirtschaftlich, technologisch und sicherheitspolitisch
  widerstandsfähiger werden. Deutschland stehe vor tiefen Veränderungen. „Wir alle
  haben die Verantwortung, unser Land weiterzuentwickeln“, sagte der Bundeskanzler.
  Hierbei setze die Bundesregierung bewusst auf Modernisierung, stärkere Verteidigungsfähigkeit
  und eine zukunftsfeste Wirtschaft. Für den Bundeskanzler ergibt sich daraus der
  Anspruch, Deutschland entschlossen auf die kommenden Herausforderungen vorzubereiten.
  Kanzler Merz machte auch deutlich: Deutschlands Zukunft hänge untrennbar mit einem
  starken, souveränen und handlungsfähigen Europa zusammen . In einer Welt wachsender
  geopolitischer Spannungen könne kein europäischer Staat allein bestehen. Nur ein
  geeintes Europa sichere langfristig Wohlstand, Stabilität und Sicherheit. „Deutschland
  kann nur erfolgreich sein, wenn Europa erfolgreich ist“, so der Bundeskanzler. Lesen
  Sie hier die Regierungserklärung in voller Länge. In seiner Regierungserklärung
  konstatierte Kanzler Merz, dass Deutschland lange zentrale Risiken wie geopolitische
  Spannungen, internationale Konkurrenz und den demografischen Wandel unterschätzt
  habe und warnte davor, „die Augen vor diesen Realitäten zu verschließen“. Stattdessen
  müsse sich das Land „auf allen Feldern wieder besser aufstellen“ – ein Anspruch,
  den die Bundesregierung mit einem umfassenden Reformkurs verfolge. Er reiche von
  stärkerer Verteidigungsfähigkeit über steuerliche Entlastungen und einer realistischen
  Energiepolitik bis hin zu Digitalisierung, Technologieoffensive und tiefgreifenden
  Sozial‑ und Verwaltungsreformen. Bundeskanzler Merz mahnte in seiner Rede eindringlich,
  dass „die Zeit drängt“, weil weiterhin Arbeitsplätze verloren gehen und Unternehmen
  unter hohen Kosten und Bürokratie leiden würden. Lange verschobene Aufgaben würden
  nun entschlossen angegangen, um das Fundament des Landes so zu erneuern, dass es
  „für viele Jahre trägt“. Bundeskanzler Friedrich Merz richtete dabei einen Appell
  an gemeinsame Verantwortung: Politik, Wirtschaft und Gesellschaft müssten ihren
  Beitrag leisten, Lasten fair verteilen und Reformen nicht blockieren. Zugleich warb
  er um Vertrauen in die gemeinsame Fähigkeit, Lösungen zu finden. Europa ist für
  den Kanzler der unverzichtbare Rahmen für Deutschlands Sicherheit. Angesichts neuer
  Bedrohungen betonte er in seiner Regierungserklärung, dass die EU militärisch, wirtschaftlich
  und politisch widerstandsfähiger werden müsse, um Herausforderungen wie den russischen
  Angriffskrieg abzuwehren. „Ohne Europa geht es nicht. Mit Europa haben wir eine
  gute Chance“, versicherte der Bundeskanzler. Zugleich sieht er Europa als Schlüssel
  zur wirtschaftlichen Stärke. Offener Handel, ein leistungsfähiger Binnenmarkt und
  der Abbau von Bürokratie seien entscheidend, damit europäische Unternehmen im globalen
  Wettbewerb bestehen können. Europa werde weltweit als „zuverlässiger Partner geschätzt
  und aufgesucht“ und diese Position müsse auch zum Vorteil Deutschlands weiter ausgebaut
  werden, so Merz. Europa ist für Bundeskanzler Merz ein gemeinsames Werteprojekt,
  das die Grundlage für Frieden, Stabilität und Zusammenhalt auf dem Kontinent bildet.
  Freiheit, Demokratie und Rechtsstaatlichkeit seien keine Selbstverständlichkeit,
  sondern Errungenschaften, die immer wieder verteidigt und erneuert werden müssten.
  In einer Welt, in der autoritäre Systeme erstarken und internationale Normen unter
  Druck geraten, müsse Europa „eine Macht für Freiheit und Wohlstand, für Frieden
  und Demokratie“ bleiben. Diese Werte seien der Kern europäischer Identität – und
  zugleich der Maßstab, an dem sich Europas Handeln nach innen und außen orientieren
  müsse.'
