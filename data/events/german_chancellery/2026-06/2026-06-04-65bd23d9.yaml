title: Schwerpunkte der Bundesregierung Starker Zusammenhalt, standfeste Demokratie
text: 'Die Bundesregierung stärkt den sozialen Zusammenhalt und die standhafte Demokratie.
  Den sozialen Zusammenhalt stärken: Das ist ein wichtiges Ziel der Bundesregierung.
  Um das zu erreichen, will sie Familien unterstützen, die Bildungschancen erhöhen
  sowie eine gute medizinische Versorgung und Pflege sichern. Zudem will die Bundesregierung
  den Sport und das ehrenamtliche Engagement stärken und für mehr bezahlbaren Wohnraum
  sorgen. Die Bundesregierung stellt Leistungsträgerinnen und -träger sowie Familien
  in den Mittelpunkt. Sie arbeitet dafür, das Leben in Deutschland einfacher, bezahlbarer
  und gerechter zu machen. Denn ob im Beruf, in der Familie oder im Ehrenamt: Leistung
  verdient Respekt und Anerkennung. Die Bundesregierung stellt Familien in den Mittelpunkt und
  will Kindern und Jugendlichen ein gutes Aufwachsen ermöglichen. Um das zu erreichen,
  plant sie unter anderem das Elterngeld zu reformieren und dabei die Einkommensgrenze
  sowie den Mindest- und Höchstbetrag spürbar zu erhöhen. Zudem soll das Kindergeld
  kontinuierlich steigen und nach der Geburt automatisch ausgezahlt werden. Ein zentrales
  Familienportal soll künftig Leistungen digital bündeln, damit Familien einfach und
  unbürokratisch erfahren, welche Leistungen ihnen konkret zustehen und wie sie diese
  bekommen. Die Bundesregierung investiert in den Neubau, Ausbau, die Sanierung und
  Modernisierung von Krippen und Kitas, damit Eltern Beruf und Familie besser vereinbaren
  können. Auch das Ausbauziel für die Ganztagsbetreuung in Grundschulen verfolgt sie
  konsequent weiter. Darüber hinaus will die Bundesregierung den Kinder- und Jugendschutz
  stärken. Sie möchte sicherstellen, dass sich Kinder und Jugendliche in der digitalen
  Welt sicher bewegen können. Zudem plant die Bundesregierung, eine Strategie „Mentale
  Gesundheit für junge Menschen“ zu entwickeln. Im Mittelpunkt der Strategie sollen
  die Prävention und Früherkennung psychischer Erkrankungen stehen. Um die Chancengerechtigkeit
  aller Kinder in Deutschland zu erhöhen, soll eine verpflichtende Sprach- und Entwicklungsdiagnostik
  für alle Vierjährigen eingeführt werden. Auf mehr Qualität in der frühkindlichen
  Bildung zielt auch die zusätzliche Förderung für Sprach-Kitas und die Ausweitung
  des Startchancenprogramms für Schulen mit sozial benachteiligten Kindern auf Kitas.
  Den Teilhabebetrag des Bildungs- und Teilhabepakets will die Bundesregierung von
  15 auf 20 Euro erhöhen. Zudem sollen mehr Kinder in Kitas und Schulen ein kostenloses
  Mittagessen bekommen. Mit dem DigitalPakt 2.0 werden die digitale Infrastruktur
  in Schulen und eine verlässliche Administration ausgebaut. Zudem werden ein Digitalpakt
  Weiterbildung und ein Förderprogramm zur digitalen Teilhabe aufgelegt. Das BAföG
  soll umfassend modernisiert werden. Auch das Aufstiegs- BAföG soll attraktiver und
  unbürokratischer werden. Die Bundesregierung setzt auf eine große Pflegereform.
  Zügig will sie die strukturellen Herausforderungen in diesem Bereich angehen. Eine
  Kommission aus Bund, Ländern und kommunalen Spitzenverbänden hat bereits Mitte Dezember
  2025 Vorschläge für eine Reform vorgelegt. Ziel ist, die Pflegeversicherung nachhaltig
  zu finanzieren und die ambulante sowie die häusliche Pflege zu stärken. Derzeit
  erarbeitet das Bundesgesundheitsministerium dazu einen Gesetzentwurf. Das Bundeskabinett
  hat am 29. April 2026 das Gesetz zur Stabilisierung der Beitragssätze in der gesetzlichen
  Krankenversicherung beschlossen. Mit diesem Gesetz werden zahlreiche Empfehlungen
  aus dem Bericht der FinanzkommissionGesundheit vom 30. März 2026 umgesetzt. Ziel
  ist es damit die GKV -Beitragssätze ab 2027 dauerhaft zu stabilisieren. Die Bundesregierung
  hat die Krankenhausreform angepasst und praxisnäher gestaltet. Ein Ziel: die Klinikversorgung
  im ländlichen Raum sicherstellen. Die Reform wird seit Beginn des vergangenen Jahres
  schrittweise umgesetzt. Das Anpassungsgesetz ist Mitte April 2026 in Kraft getreten.
  Zur Reform der Notfallversorgung hat die Bundesregierung einen Gesetzentwurf beschlossen.
  Das Gesetz soll dafür sorgen, dass Menschen in einer akuten medizinischen Notlage
  jederzeit schnell und hochwertig versorgt werden – egal, wo sie wohnen. Patientinnen
  und Patienten sollen außerdem einen schnelleren Zugang zu Facharzt-Terminen erhalten.
  Hierfür soll ein „Primärarztsystem“ sorgen, in dem Haus- sowie Kinderärztinnen und
  -ärzte als erste Anlaufstellen den Bedarf und einen Zeitkorridor für den Facharzt-Termin
  festlegen. Sport hat eine enorme Bedeutung für die Gesundheitsförderung, Rehabilitation,
  Inklusion und Integration. Deswegen will die Bundesregierung den Sport mit zielgerichteten
  Maßnahmen stärken. Die Gesellschaft wird vom Ehrenamt getragen. Deshalb will die
  Bundesregierung das ehrenamtliche Engagement stärken und besser schützen. Sie hat
  dafür eine Reihe von steuerlichen Verbesserungen beschlossen. Ehrenamtliche und
  Vereine werden u.a. durch weniger Bürokratie und eine Erhöhung der Übungsleiter-
  und Ehrenamtspauschale entlastet. Für den Freiwilligendienst und das Freiwillige
  Soziale Jahr werden mehr Stellen und mehr Finanzmittel für ein höheres Taschengeld
  zur Verfügung gestellt. Wohnen soll für alle bezahlbar und umweltverträglich sein,
  zugleich muss der akute Mangel an Wohnraum behoben werden. Deswegen startet die
  Bundesregierung eine Offensive für Investitionen, Steuerentlastungen und Entbürokratisierung
  im Bereich Bauen und Wohnen. Mit dem „ Wohnungsbau-Turbo können Städte und Gemeinden
  schneller grünes Licht für den Bau neuer und bezahlbarer Wohnungen geben. Die Mietpreisbremse
  in angespannten Wohnungsmärkten soll für vier Jahre verlängert werden. Beide Gesetzentwürfe
  hat die Bundesregierung, wie im Koalitionsvertrag versprochen, in den ersten 100
  Tagen auf den Weg gebracht. Weitere Maßnahmen zur Planungs- und Genehmigungsbeschleunigung
   sowie zur Senkung der Baukosten werden folgen. Auch sollen Indexmieten, möblierte
  und Kurzzeitvermietungen stärker reguliert werden. Mit einer geänderten Modernisierungsumlage
  sollen Investitionen in Wohnungsbestände angereizt und Mieten trotzdem bezahlbar
  bleiben. Wer günstig vermietet, wird künftig steuerlich belohnt. Den sozialen Wohnungsbau
  fördert der Bund mit der Rekordsumme von 23,5 Milliarden Euro bis 2029. Zudem soll
  ein Investitionsfonds künftig den kommunalen Wohnungsbau unterstützen. Das Heizungsgesetz
  soll durch ein neues, technologieoffenes, flexibles und einfaches Gebäudeenergiegesetz
  abgelöst werden, bei dem die erreichbare CO2 -Vermeidung den zentralen Faktor darstellt.
  Die Sanierungs- und Heizungsförderung wird fortgesetzt. Und auch für eine lebenswerte
  und nachhaltige Zukunft in den ländlichen Regionen setzt sich die Bundesregierung
  ein. Gezielte Investitionen sollen die dortige Wertschöpfung stärken. Denn attraktive
  ländliche Räume sind wichtig für den gesellschaftlichen Zusammenhalt und für die
  Akzeptanz der Demokratie. Der Umgang mit Desinformation spielt für die Bundesregierung
  eine zentrale Rolle . Im Fokus steht die Notwendigkeit, manipulierte Informationen
  – insbesondere im digitalen Raum – zu bekämpfen, um die demokratischen Prozesse
  und den gesellschaftlichen Zusammenhalt zu schützen.'
