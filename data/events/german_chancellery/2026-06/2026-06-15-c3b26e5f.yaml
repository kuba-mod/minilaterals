title: Statement von Kanzler Merz vor dem Abflug zum G7-Gipfeltreffen in Évian-les-Bains
  Mit Teamgeist g lobale Herausforderungen annehmen
text: 'Kanzler Merz hat vor seinem Abflug zum G7 -Gipfel betont, dass man neue geopolitische
  Risiken nur gemeinsam lösen könne. Bei einem Statement vor Aufbruch zum G7 -Gipfel
  in Évian-les-Bains in Frankreich hat Bundeskanzler Friedrich Merz die „ausgesprochen
  bewegte Phase der Weltpolitik“ in den Blick genommen. Sie fordere, eröffne „aber
  auch einige Chancen“, sagte der Kanzler. Mit Bezug auf den Iran verwies er auf die
  guten Entwicklungen der vergangenen Tage. Deutschland unterstütze und fördere diese
  Anstrengungen. Auch beim Krieg in der Ukraine zeige sich eine neue positive Dynamik,
  über die in Évian-les-Bains auch mit US -Präsident Donald Trump gesprochen werden
  soll. Trotz dieser positiven Anzeichen bleiben die geopolitischen Probleme die größte
  Herausforderung für die Weltwirtschaft. Deshalb wollen die G7 die Wachstumsagenda
  voranbringen, den geopolitischen Risiken gemeinsam begegnen und die eigene Wettbewerbsfähigkeit
  stärken, bekräftigte der Kanzler. Dafür brauche es „verlässliche Handelsbeziehungen“
  und „einen fairen globalen Wettbewerb“. Zudem gelte es, die G7 selbst weiterzuentwickeln.
  Deutschland spiele dabei eine wichtige Rolle, „mit transatlantischem und europäischem
  Teamgeist.“ Der G7 -Gipfel findet vom 15. bis 17. Juni 2026 auf Einladung des französischen
  Staatspräsidenten Emmanuel Macron im französischen Évian-les-Bains statt. Lesen
  Sie hier die wichtigsten Informationen. Meine Damen und Herren, herzlich willkommen!
  Ich breche gleich zum Treffen der G7 in Évian auf. Dieser Gipfel findet in einer
  ausgesprochen bewegten Phase der Weltpolitik statt. Die Lage fordert uns. Sie eröffnet
  aber auch einige Chancen. Zu Recht wird Präsident Emmanuel Macron als Gastgeber
  geopolitische Fragen in den Mittelpunkt dieses Treffens stellen. In den letzten
  Tagen und Stunden haben sich im Mittleren Osten einige gute Entwicklungen gezeigt.
  Ich begrüße sehr, dass sich die Vereinigten Staaten und Iran auf ein Friedensmemorandum
  geeinigt haben. Zu diesem diplomatischen Durchbruch gratuliere ich Präsident Trump
  und der iranischen Seite. Ich danke allen Partnern, die mitgeholfen haben, dies
  zu ermöglichen, namentlich Pakistan und Katar. Das Abkommen kann nun den Weg zu
  einer Erholung auch der Weltwirtschaft und einer Stabilisierung der Region bahnen.
  Jetzt gilt es, das Vereinbarte zielstrebig umzusetzen. Die Straße von Hormus muss
  dauerhaft und uneingeschränkt für die freie Schifffahrt geöffnet werden. Weitere
  Verhandlungen müssen in den nächsten Wochen sicherstellen, dass Iran sein militärisches
  Nuklearprogramm nachprüfbar und auf Dauer beendet. Die Vereinbarung muss auch im
  Libanon halten. Wie wichtig das ist, haben wir auch gestern wieder gesehen. Die
  Bundesregierung unterstützt und befördert weiterhin alle entsprechenden und dahin
  gehenden Anstrengungen. Wir wollen uns mit unseren Partnern bei der Gewährleistung
  freier Schifffahrt in der Straße von Hormus engagieren. Das tun wir, sobald die
  entsprechenden Voraussetzungen gegeben sind. Dazu werden wir in Évian mit den Vereinigten
  Staaten, mit Präsident Trump , mit den europäischen Partnern und den Staaten der
  Region beraten. Auch der Krieg in der Ukraine wird uns notwendigerweise wieder beschäftigen.
  Seine Dynamik hat sich in den vergangenen Tagen ungeachtet der Angriffe, die wir
  in der vergangenen Nacht gesehen haben, deutlich zugunsten der Ukraine verändert.
  Dazu hat auch unsere deutsche und europäische Hilfe für Kyjiw maßgeblich beigetragen.
  Die Ukraine ist heute in einer neuen Position der Stärke. Russland kann militärisch
  nicht gewinnen. Zudem ist seine Wirtschaft angeschlagen. Ich sage mit der sehr gebotenen
  Vorsicht und Zurückhaltung: Erstmals kann sich hier langsam ein Fenster für die
  Diplomatie öffnen. Auch hierin liegt eine Chance. Darüber haben Keir Starmer , Emmanuel
  Macron und ich, wie Sie wissen, am Sonntag der letzten Woche in London ja mit Präsident
  Selenskyj auch ausführlich beraten. Wir haben gemeinsam fünf Eckpunkte formuliert,
  über die wir in Évian auch mit Präsident Trump sprechen wollen. Dies können erste
  Schritte – aber, noch einmal, alles im Konjunktiv – eines neuen diplomatischen Anlaufs
  hin zu Friedensverhandlungen zwischen der Ukraine, Russland, Europa und den Vereinigten
  Staaten sein. Die geopolitische Lage bleibt trotzdem ein Stresstest für die ganze
  Weltwirtschaft. Wir wollen diesen Test bestehen. Deshalb wollen wir in der G7 auch
  über eine Wachstumsagenda miteinander sprechen. Wir wollen das voranbringen. Wir
  brauchen verlässliche Handelsbeziehungen, und wir brauchen einen fairen globalen
  Wettbewerb. Den neuen geopolitischen Risiken wollen wir, wo immer möglich, jetzt
  auch gemeinsam weiter begegnen. Deshalb stärken wir unsere eigene Wettbewerbsfähigkeit,
  und wir bauen die Zusammenarbeit untereinander aus, gerade bezüglich Schlüsselthemen
  wie zum Beispiel kritischer Rohstoffe und resilienter Lieferketten. Das alles kann
  uns widerstandsfähiger machen. Es stabilisiert zugleich die internationale Ordnung.
  In Évian wollen und müssen wir die G7 selbst weiterentwickeln. Dazu gehört, dass
  wir hartnäckig an der transatlantischen Partnerschaft arbeiten. Entscheidend wird
  sein, dass wir weiter massiv in einen starken europäischen Pfeiler der NATO investieren.
  Deutschland spielt dabei, wie Sie wissen, eine wichtige Rolle, mit transatlantischem
  und europäischem Teamgeist. Wir wollen die G7 aber auch stärker für neue Partner
  öffnen. Ich freue mich deshalb, dass Präsident Macron auch Amtskollegen aus Indien,
  Brasilien, Korea, aus der Golfregion und aus Afrika eingeladen hat. Ich bin also
  froh, dass Emmanuel Macron der Gastgeber ist. Die letzten Tage haben gezeigt, ob
  es sich um die Ukraine handelt oder um strategische Rüstungsvorhaben: Wir können
  gemeinsam auch schwere Entscheidungen treffen. Dafür bin ich dankbar. In diesen
  bewegten Zeiten kommt es auf das deutsch-französische Verhältnis und auf die deutsch-französische
  Freundschaft mehr denn je an. Sie wissen, dass ich auch persönlich hier engagiert
  bin und bleibe, aus tiefster Überzeugung, dass Deutschland und Frankreich wichtige
  Motoren für die gesamte europäische Integration sind, aber auch für unser gemeinsames
  transatlantisches Verhältnis.'
