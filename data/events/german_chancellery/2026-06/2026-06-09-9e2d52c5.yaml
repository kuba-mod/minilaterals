title: Rede des Kanzlers bei startsocial-Preisverleihung 2026 Bundeskanzler ehrt soziales
  Engagement
text: 'Die Gewinner des Sonderpreises bekamen die Auszeichnung von Schirmherr Kanzler
  Merz persönlich. Der „SV Triebel“ sei mehr als das „normale Standardprogramm eines
  Dorfvereins“, sagte Merz. Bei der feierlichen Preisverleihung des 22. startsocial
  -Wettbewerbs im Bundeskanzleramt hat Bundeskanzler Friedrich Merz das ehrenamtliche
  Engagement der ausgezeichneten Initiativen gewürdigt. Als Schirmherr des Wettbewerbs
  dankte er den Preisträgerinnen und Preisträgern stellvertretend für die Millionen
  Menschen, die sich in Deutschland freiwillig engagieren. „Deutschland ist ein Land
  des Ehrenamts“, betonte der Bundeskanzler. Das freiwillige Engagement vieler Bürgerinnen
  und Bürger mache Deutschland zu einem „lebenswerten und liebenswerten Land“. Die
  25 ausgezeichneten Initiativen zeigten mit ihren Ideen, ihrer Tatkraft und ihrer
  Ausdauer, wie gesellschaftlicher Zusammenhalt gestärkt und Demokratie im Alltag
  gelebt werden könne. Merz hob hervor, dass ehrenamtlich Engagierte zu den Leistungsträgerinnen
  und Leistungsträgern der Gesellschaft gehörten. Sie übernähmen Verantwortung, gestalteten
  das Gemeinwesen aktiv mit und trügen dazu bei, dass Demokratie lebendig bleibe.
  Die Bundesregierung wolle deshalb die Rahmenbedingungen für Vereine und ehrenamtliches
  Engagement weiter verbessern und bürokratische Hürden abbauen. Im Rahmen der Veranstaltung
  wurden sieben Initiativen mit Geldpreisen in Höhe von insgesamt 35.000 Euro ausgezeichnet.
  Den Sonderpreis des Bundeskanzlers verlieh Friedrich Merz persönlich an den „SV
  Triebel“ aus dem Vogtland. Der Verein schaffe mit seinem vielfältigen Angebot Gemeinschaft
  und Zusammenhalt im ländlichen Raum und sei weit mehr als ein klassischer Sportverein.
  „Dieser Verein ist ein soziales Zentrum und wichtiger Begegnungsort“, sagte der
  Bundeskanzler und würdigte insbesondere die starke Einbindung von Kindern und Jugendlichen.
  Lieber Herr Dr. Düsedau, liebe Christiane Schenderlein, vor allem Sie, meine Damen
  und Herren, liebe Gäste, Engagierte, sehr geehrte Vertreterinnen und Vertreter der
  Förderunternehmen, meine Damen und Herren, ich habe schon mein ganzes Leben, vor
  allen Dingen in der Zeit, in der ich auf dem Land gelebt habe, Begegnungen mit Menschen
  gehabt und bin auch selbst Teil dieser Gemeinschaft gewesen:  in Vereinen, in Verbänden,
  im Sport, in der Musik, in der Literatur, in Heimatvereinen, in Schützenvereinen
  in meiner Heimat. Deutschland ist ein Land des Ehrenamts. Um es einmal in Zahlen
  auszudrücken: Jede Dritte oder jeder Dritte in Deutschland engagiert sich in der
  Freizeit ehrenamtlich.  – Das zeigt jedenfalls eine Untersuchung, die wir gemacht
  haben, und das zeigt vor allem: Es ist ein bemerkenswertes Engagement im Querschnitt
  unserer Gesellschaft in ganz Deutschland. Das macht Deutschland zu einem so lebenswerten
  und liebenswerten Land. Ich sage Ihnen allen zunächst einmal, stellvertretend für
  die vielen Millionen Menschen, die in unserem Land ehrenamtlich arbeiten, herzlichen
  Dank dafür, dass Sie alle dies tun. Ich sage Ihnen das heute, stellvertretend, für
  Ihren Einsatz, für Ihren unermüdlichen Einsatz, für Ihren wichtigen Einsatz für
  ein besseres Miteinander in unserem Land. Sie fragen sich nicht nur, was Sie tun
  können, damit wir Deutschland besser machen können, sondern Sie machen es, damit
  wir besser zusammenleben können. Sie beantworten diese Frage ganz praktisch mit
  Ihrem freiwilligen Engagement. Sie sind im besten Sinne des Wortes Leistungsträgerinnen
  und Leistungsträger unserer Gesellschaft. Sie halten vieles am Laufen, was ohne
  Sie nicht laufen würde. Sie gestalten unser Land, was ohne Sie nicht möglich wäre.
  Die vergangenen Monate waren für Sie vermutlich noch arbeitsintensiver als sonst.
  Denn Sie zählen jetzt zu den 25 besten Stipendiatinnen und Stipendiaten des startsocial
  -Jahrgangs 2026. Alle 25 Projekte, nicht nur die sieben, die heute einen Preis erhalten,
  zeigen, wie Sie mit Ihren Ideen, mit Ihrer Tatkraft, mit Ihrer Ausdauer unsere Gesellschaft
  voranbringen. Sie übernehmen Verantwortung, und vor allem machen Sie Deutschland
  zu einer lebendigen Demokratie. Demokratie lebt nicht nur von Parlamenten, nicht
  nur von Parteien, sie lebt auch von ehrenamtlichem Engagement. Es ist nämlich nachgewiesen,
  dass Gesellschaften, die ein hohes Maß an freiwilligem, ehrenamtlichem Engagement
  aufweisen, auch die stabileren Demokratien sind. Auch deshalb unterstützt die Bundesregierung,
  auch deshalb unterstütze ich dieses ehrenamtliche Engagement. Sie mögen es an einem
  weiteren Zeichen sehen: Ich habe mit der Regierungsbildung im vergangenen Jahr hier
  im Kanzleramt ein neues Amt geschaffen. Wir bemühen uns ja darum, die Zahl der Ämter
  und Bediensteten etwas zu reduzieren, aber an dieser Stelle war es mir besonders
  wichtig. Wir haben mit Christiane Schenderlein zum ersten Mal in der Geschichte
  des Bundeskanzleramtes eine Staatsministerin, die für Sport und Ehrenamt zuständig
  ist und die auch mitverantwortlich dafür ist, dass wir so etwas wie heute zusammen
  mit Ihnen machen können. Erlauben Sie mir, auch der Kollegin Christiane Schenderlein
  einmal ein herzliches Wort des Dankes für Ihre Arbeit hier im Bundeskanzleramt zu
  sagen. Wir wollen in der Bundesregierung mit dem Zukunftspakt Ehrenamt weitere große
  Schritte gehen, auch ganz konkret umsetzen, was wir nennen, unterstützen, vereinfachen,
  wertschätzen. Das richtet sich insbesondere an die 27 Millionen Menschen in Deutschland,
  die sich ehrenamtlich engagieren. Wir haben uns Ziele gesteckt: Wir wollen das Vereinsrecht
  vereinfachen, wir wollen den Datenschutz modernisieren und an die neuen Chancen
  anpassen, wir wollen das Zuwendungsrecht verbessern – bis hin zum Steuerrecht –,
  sodass alles einfacher und bürokratieärmer wird, auch für Ihre Vereine, in denen
  Sie tätig sind, damit die Zivilgesellschaft, deren Vertreter Sie ja im besten Sinne
  des Wortes sind, mehr Luft zum Atmen bekommt. Wir wollen ganz einfach die Rahmenbedingungen
  noch weiter für diejenigen verbessern, die sich in unserem Land engagieren. Nun,
  meine Damen und Herren, bevor ich zur Preisverleihung komme, möchte ich mich bei
  meinen Vorrednerinnen und Vorrednern für ihre wertschätzenden Worte an die sechs
  Preisträger bedanken, aber vor allem für die Unterstützung, die ihre Unternehmen
  als Hauptsponsoren für diesen Wettbewerb geben und die sie auch mit materiellen
  Zuwendungen unterstützen. Ganz herzlichen Dank dafür, dass Sie das tun! Das ist
  das Rückgrat der Arbeit dieser Institution. Vielen Dank an Sie! Nun können Sie sich
  vorstellen, dass es nicht ganz einfach ist, unter einer so großen Vielzahl und Bandbreite
  von herausragenden Projekten eines auszuwählen, das am heutigen Tag den Sonderpreis
  des Bundeskanzlers erhält. Wir hatten wirklich die Qual der Wahl, aber die Entscheidung
  ist getroffen. Der Verein, den ich heute auszeichnen darf, beschreibt sich in den
  sozialen Medien selbst mit den Worten: Ein kleiner Dorfverein aus dem Vogtland – nur
  Ehrenamt, keine großen Strukturen, aber ganz viel Herz. Der Verein liegt in einem
  Ort mit nur knapp 600 Einwohnern, in allen Ortsteilen zusammen 1200. Von den 600 Einwohnern
  sind 272 als Mitglieder in diesem Verein aktiv, zum Teil ganze Familien. Das Vereinsleben
  und die Vereinsangebote begleiten die Mitglieder teilweise auf dem ganzen Lebensweg.
  Manche bleiben dem Verein von der Schulzeit bis ins hohe Seniorenalter treu. Das
  erwähnte „ganz viel Herz" entspricht also offenbar auch der Wahrheit im Miteinander.
  Es ist der SV Triebel, der Sportverein Triebel. Er bietet mehr als Bewegungsangebote.
  Er bietet für Jung und Alt Fußball, Tischtennis, Dart, Tanzen, Turnen. Alle halten
  sich fit. Neben Sportfesten und Turnieren organisiert der Verein Kinderfeste, Familienfeste,
  Dorfweihnachten, und gleich in zwei Dorfteilen gibt es Nachmittagsangebote und Ferienfreizeiten
  für Kinder und Jugendliche. Meine Damen und Herren, Sie hören es: Das ist mehr als
  das normale Standardprogramm eines Dorfvereins. Dieser Verein ist ein soziales Zentrum
  und wichtiger Begegnungsort der Dorfbewohnerinnen und Dorfbewohner. Die Vereinsmitglieder
  sagen selbst: Mit diesem Verein ist ihr Dorf viel attraktiver, denn er schafft Gemeinschaft
  und Zusammenhalt im ländlichen Raum, und das jetzt schon seit über 75 Jahren. Besonders
  ist, dass Kinder und Jugendliche hier mitbestimmen, selbst Verantwortung übernehmen
  und lernen, den eigenen Fähigkeiten zu vertrauen. Rund 120 Kinder und Jugendliche
  erleben im SV Triebel, dass sie dazugehören, dass sie sich einbringen und etwas
  verändern können. Sie planen die eigenen Aktivitäten mit und setzen sie gemeinsam
  mit vielen freiwilligen Betreuerinnen und Betreuern um: vom Kochen und Basteln über
  Ausflüge bis hin zur Gestaltung eines neuen Spielplatzes. Wir zeichnen heute aus:
  Sandy Schwabe, die erste Vorsitzende, und Lena Richter, die zweite Vorsitzende vom
  SV Triebel. Mit Ihrer wertvollen Arbeit ermöglichen Sie Ihren Vereinsmitgliedern
  nicht nur sportliche Aktivitäten, sondern einen großen Zusammenhalt und ein Miteinander
  in diesem Dorf. Das ist geprägt von Respekt, Vielfalt und Teamgeist. Für dieses
  großartige Projekt zeichne ich Sie aus mit dem Sonderpreis des Bundeskanzlers!'
