title: 'Die Regierung lädt ein Tag der offenen Tür: Auf einen Blick hinter die Kulissen
  des Regierungsviertels'
text: 'Die Bundesregierung öffnet ihre Türen – eine Gelegenheit der Begegnungen und
  des Austauschs. Traditionell im Sommer laden das Bundeskanzleramt, die Bundesministerien
  sowie das Presse- und Informationsamt der Bundesregierung wieder dazu ein, die Arbeit
  der Bundesregierung kennenzulernen. Am 20. und 21. Juni 2026 sind hier die Türen
  geöffnet und halten ein reichhaltiges Programm für Erwachsene und Kinder bereit.
  Wer wissen möchte, wo Politik entsteht und wie die Bundesregierung arbeitet, erhält
  an diesem Wochenende seltene Einblicke hinter die Kulissen des politischen Berlins.
  Dabei bietet sich die Gelegenheit, Regierungsvertreterinnen und -vertreter zu treffen.
  Aber auch die Mitarbeiterinnen und Mitarbeiter freuen sich darauf, mit den Gästen
  ins Gespräch zu kommen. Das gesamte Programm aller teilnehmenden Häuser finden Sie
  in unserem Veranstaltungskalender online. Die Bundesregierung arbeitet daran, Deutschland
  nach vorne zu bringen. Beim Tag der offenen Tür können sich die Besucherinnen und
  Besucher vor Ort ein eigenes Bild davon machen, was die Bundesregierung in gut einem
  Jahr ihrer Regierungsarbeit bereits erreicht hat. Die teilnehmenden Häuser informieren
  aus erster Hand anschaulich und unterhaltsam über die Themen, die das Land aktuell
  bewegen. Das Programm ist breit gefächert und bietet etwas für jede Altersgruppe:
  Dazu gehören Hausführungen und Ausstellungen, Expertengespräche und Mitmachaktionen
  für Groß und Klein. Wer sich beispielsweise über Diplomatie informieren und schon
  immer mal das Büro von Bundesminister Johann Wadephul sehen will, schaut im Außenministerium
  vorbei. Einblicke in die Praxis des Zolls gibt es beim Finanzministerium. Und im
  Innenministerium kann man Fallschirmsprünge der GSG9 miterleben und erfahren, was
  es mit dem „Protokoll“ – etwa bei einem Trauerakt – auf sich hat. Außerdem gibt
  es an vielen Orten Live -Musik und ein umfangreiches Kinderprogramm zum Spielen,
  Basteln und Mitmachen. Im Bundespresseamt und im Bundeskanzleramt erwarten Sie unter
  anderem die Kinderpressekonferenz mit dem Regierungssprecher Stefan Kornelius, der
  Kanzlertalk mit Bundeskanzler Friedrich Merz und Bühnengespräche mit Bundesministerinnen
  und -ministern. Ergänzt wird das Programm durch Workshops und Mitmachaktionen. Einen
  Einblick und die Programmübersicht finden Sie in unserem Beitrag . Liebe Bürgerinnen
  und Bürger, am 20. und 21. Juni ist es wieder so weit: Wir laden Sie herzlich ein
  zum Tag der offenen Tür der Bundesregierung. An beiden Tagen öffnen die Bundesministerien,
  das Kanzleramt und das Bundespresseamt ihre Türen. Werfen Sie einen Blick hinter
  die Kulissen der Bundespolitik. Die Bundesregierung hat in ihrem ersten Jahr die
  Weichen gestellt – für mehr Wohlstand, Sicherheit und Zusammenhalt. Gemeinsam arbeiten
  wir Schritt für Schritt daran, unsere Wirtschaft wieder wettbewerbsfähig zu machen:
  Entlastungen, Bürokratierückbau, grundlegende Reformen im Gesundheitswesen und bei
  der Altersversorgung, Investitionen in Innovationen und Digitalisierung, Sicherheit,
  Infrastruktur und Energieversorgung sind zentrale Handlungsfelder. Kommen Sie mit
  uns darüber ins Gespräch und informieren sich aus erster Hand über die Regierungsarbeit.
  Natürlich sind viele Ministerinnen und Minister sowie auch ich persönlich vor Ort.
  Wir freuen uns, Sie bei unserem Tag der offenen Tür begrüßen zu dürfen! Ihr Friedrich
  Merz'
