date: '2026-06-05'
type: press_release
source_name: german_chancellery
title: Pressekonferenz des Bundeskanzlers nach dem EU-Westbalkan–Gipfel „Ein guter
  Tag für Europa“
text: 'Auch ein Gespräch des Kanzlers mit dem Gastgeber des Gipfels, dem montenegrischen
  Ministerpräsidenten Milatovic, fand statt. „Die klare Botschaft des heutigen Tages
  ist und wird bleiben: Wir wollen euch, und wir wollen, dass die Staaten dieser Region
  bald Mitglieder der Europäischen Union werden“, betonte Bundeskanzler Friedrich
  Merz nach dem EU -Westbalkan-Gipfel in Montenegro. In Tivat hatten sich die Staats-
  und Regierungschefs der Europäischen Union und die Spitzen der EU-Institutionen
  mit Vertretern der sechs Partnerländer des westlichen Balkans – Albanien, Bosnien
  und Herzegowina, Serbien, Montenegro, Nordmazedonien sowie Kosovo – ausgetauscht.
  Deutschland und Frankreich hatten vor dem Gipfel gemeinsam Vorschläge vorgelegt,
  wie die Beitrittsverhandlungen vereinfacht und beschleunigt werden könnten. Diese
  seien sowohl im Europäischen Rat als auch bei den Westbalkanstaaten auf breite Zustimmung
  gestoßen, so Merz. Die informellen Gespräche auf dem Gipfel ließen ihn hoffen, dass
  man „sehr bald“ zu einer guten Lösung kommen werde. Meine Damen und Herren, wir
  haben heute eine sehr erfolgreiche Begegnung mit den Westbalkanstaaten gehabt. In
  der Regel finden ja zweimal im Jahr die Treffen der europäischen Staats- und Regierungschefs
  mit den sechs Staats- und Regierungschefs der Beitrittskandidaten aus dem Westbalkan
  statt. Das Treffen im Dezember letzten Jahres war einigermaßen desillusionierend;
  es herrschte eine schwierige Stimmung. Diesmal war es deutlich anders. Sie haben
  alle gesehen, dass Präsident Macron und ich einen Vorschlag über den weiteren Prozess
  gemacht haben. Ich muss sagen, ich bin ausgesprochen dankbar, dieser gemeinsame
  Vorschlag von Präsident Macron und mir auch auf breite Zustimmung im Europäischen
  Rat und bei den Westbalkanstaaten gestoßen ist und wir jetzt einen Prozess beginnen,
  der die schrittweise Heranführung der Westbalkanstaaten an die Europäische Union
  ermöglicht. Die klare Botschaft des heutigen Tages ist und wird bleiben: Wir wollen
  euch, und wir wollen, dass die Staaten dieser Region bald Mitglieder der Europäischen
  Union werden. Das Ziel ist und bleibt die volle Mitgliedschaft aller Staaten der
  Westbalkanregion, weil wir ein strategisches Interesse daran haben, diese Staaten
  an uns, an die Europäische Union zu binden. Umgekehrt haben diese Staaten auch den
  Willen, Mitglieder der Europäischen Union zu werden. Wir werden jetzt jedenfalls
  einen schrittweisen Prozess einleiten, der darin besteht, dass wir zunächst einmal
  den Weg in die Institutionen öffnen, sodass es zum Beispiel möglich sein wird, als
  Beobachter an den Sitzungen des Europäischen Rates und vielleicht auch des Europäischen
  Parlaments – das muss das Parlament in eigener Zuständigkeit entscheiden – teilzunehmen.
  Wir geben jetzt wirklich ein klares politisches Signal, dass die Prozesse beschleunigt
  werden; auch das ist unser gemeinsamer Wille. Es wird jetzt keine Ausreden mehr
  geben, sondern es wird sehr konkrete, allerdings auch individuelle, auf die einzelnen
  Mitgliedstaaten des Westbalkans bezogene Prozesse geben. Wir sind hier in Montenegro.
  Montenegro ist ganz offensichtlich das am weitesten vorangeschrittene Land aus dieser
  Gruppe. Auch der gesamte Prozess über die Mitgliedschaft in der Europäischen Union
  kann bald abgeschlossen werden. Andere werden noch etwas länger brauchen. Ein Land
  hat noch gar keinen Antrag gestellt, keinen Antrag stellen können. Insofern wird
  das jetzt Schritt für Schritt gehen. Ich kann aber noch einmal sagen – und bin sehr
  dankbar dafür –: Es gibt eine große Zustimmung auf beiden Seiten, der Europäischen
  Union und den Mitgliedstaaten der Europäischen Union sowie den Westbalkanstaaten,
  dem Vorschlag von Präsident Macron und mir zu folgen, diesen Prozess jetzt etwas
  anders zu strukturieren, als wir das bisher getan haben. Ansonsten würde es bis
  zum Abschluss aller Beitrittsverhandlungen und der Ratifizierung dauern, bis überhaupt
  einmal jemand in Brüssel dabei ist. Das ändern wir jetzt, und wir werden diesen
  Prozess jetzt auch noch etwas ausarbeiten. Es wird dazu auch Beschlüsse geben müssen;
  aber die informellen Gespräche, die hier heute stattgefunden haben, lassen mich
  hoffen, dass wir jetzt sehr bald zu einer wirklich guten Lösung kommen und auch
  das klare Signal an die Bevölkerung und das klare Bekenntnis an die Mitgliedstaaten
  geben: Wir wollen euch. Es wird auch konkrete Schritte geben, die das praktisch
  umsetzen, zum Beispiel die Teilnahme dieser Staaten am europäischen Zahlungssystem
  SEPA , die Beteiligung an Erasmus+ und die Ermöglichung, am Roaming in der Europäischen
  Union teilzunehmen. Das sind konkrete Schritte, die wir jetzt einleiten können,
  ohne dass die Vollmitgliedschaft zur Voraussetzung gemacht wird. Insofern ist heute,
  glaube ich, nicht nur ein sonniger Tag, sondern auch ein guter Tag für Europa, ein
  guter Tag für diese Region hier. Wie wir alle wissen, hat diese Region historisch
  immer wieder eine besondere Rolle gespielt hat und ist nach wie vor mit erheblichen
  Spannungen belastet. Wir können diese Spannungen aber auflösen, indem wir der Region
  jetzt insgesamt die Perspektive zum Beitritt in die Europäische Union etwas konkreter
  dargelegt haben und darüber auch ein Einvernehmen erzielt haben. Frage: Herr Bundeskanzler,
  können Sie sagen, ob das Angebot, das Sie gerade formuliert haben, auch für Serbien
  gilt, oder wird Serbien ausdrücklich ausgenommen? Eine andere Frage: Warum bewirbt
  sich Deutschland erneut für die Mitgliedschaft im UN -Sicherheitsrat? Sehen Sie
  eine Mitverantwortung dafür, dass die Kandidatur am Mittwoch gescheitert ist? Bundeskanzler
  Merz: Was Serbien betrifft, so ist die Antwort klar und eindeutig ja. Wir haben
  auch mit Präsident Vučić noch einmal ein individuelles Gespräch geführt ‑ ich mit
  ihm heute Morgen und zusammen mit Präsident Macron sowie den beiden Vertretern der
  EU , Ratspräsident Costa und Kommissionspräsidentin Ursula von der Leyen. Wir haben
  ihm sehr klar gesagt, was wir erwarten, aber wir haben ihm auch das klare Angebot
  gemacht, dass Serbien der Weg in die Europäische Union offensteht. Allerdings muss
  sich Serbien auch entscheiden, wo es steht. Eine Schaukelpolitik zwischen Russland,
  China und Europa kann es nicht geben. Serbien muss sich dann klar entscheiden, wo
  es seine Zukunft sieht. Wenn die Antwort aus Serbien „Europa“ ist, dann ist die
  Antwort aus Europa „Serbien“. Wir bewerben uns für die Periode 2035/36 erneut als
  Mitglied des UN -Sicherheitsrates. Wir werden das diesmal längerfristig von Anfang
  an gut vorbereiten. Es gibt noch ein weiteres Land aus der westeuropäischen Gruppe,
  das sich ebenfalls bewerben wird. Ich werde auch in der Europäischen Union dafür
  werben, dass es bei diesen beiden Ländern bleibt, dass es also nicht wieder konkurrierende
  Bewerbungen aus Europa, insbesondere konkurrierende Bewerbungen aus der Europäischen
  Union gibt. Diese Bewerbung von uns ist vor vielen, vielen Jahren, aber auch sehr
  spät eingereicht worden. Wir haben sie sozusagen übernommen und haben uns im Koalitionsvertrag
  entschieden, an der Bewerbung festzuhalten. Wie wir im Ergebnis gesehen haben, hat
  das nicht ausgereicht. Wir wollen es beim nächsten Mal besser machen. Zusatzfrage:
  Und Ihre eigene Verantwortung? Einige sagen ja, Sie hätten sich mehr engagieren
  müssen. Bundeskanzler Merz: Wir lassen das im Auswärtigen Amt jetzt noch einmal
  ausführlich analysieren. Ich will zunächst einmal für die Bundesregierung nur sagen:
  Der Bundesaußenminister, Jo Wadephul, und auch ich persönlich, wir haben alles getan,
  um diese Bewerbung erfolgreich werden zu lassen. Ich will insbesondere Johann Wadephul
  ausdrücklich ein Wort des Dankes für sein großes Engagement über ein Jahr sagen.
  Er hat kaum eine Kabinettssitzung ausgelassen, um alle Kabinettsmitglieder zu bitten,
  diese Bewerbung zu unterstützen. Wir hatten nur ein Jahr Zeit, um unsere Bewerbung
  in einem schwierigen Umfeld mehrheitsfähig zu machen. Das ist uns in der Kürze der
  Zeit leider nicht gelungen. Deshalb noch einmal: Wir machen es beim nächsten Mal
  besser. Bundeskanzler Merz: Ich lese viel, was aus Amerika kommt. Ich lese zum Teil
  auch unterschiedliche Nachrichten über die Frage der Truppenstationierung der Vereinigten
  Staaten von Amerika in Europa. Wir werden auf dem G7 -Treffen in Évian in zwei Wochen
  informell und sehr formell auf dem NATO -Gipfel in Ankara Gelegenheit haben, dies
  mit der amerikanischen Regierung und dem amerikanischen Präsidenten zu diskutieren.
  Meine Botschaft ist und bleibt: Wir sind in einer Sicherheitsgemeinschaft der NATO
  . Wir garantieren uns gegenseitig Sicherheit. Dies sollte für Europa genauso gelten
  wie für Amerika. Wir hoffen, dass wir die Amerikaner dafür gewinnen können, ihr
  Engagement auf dem europäischen Kontinent aufrechtzuerhalten. Es liegt nach unserem
  festen Dafürhalten auch im Interesse Amerikas, dies zu tun. Aber noch einmal: Wir
  werden darüber diskutieren. Frage: Herr Bundeskanzler, der ukrainische Präsident
  hat den russischen Präsidenten zu direkten Gesprächen aufgefordert. Ist das aus
  Ihrer Sicht der richtige Zeitpunkt? Werden die Europäer dabei sicher mit am Tisch
  sitzen; erwarten Sie das? Werden Sie bei dem bevorstehenden E3-Treffen auch darüber
  sprechen, in welchem Format die Europäer mit am Tisch sitzen? Bundeskanzler Merz:
  Zunächst einmal begrüße ich sehr, dass Präsident Selenskyj erneut ein Angebot gemacht
  hat, zu sprechen. Ich will es betonen: Erneut. Das ist nicht das erste Mal, dass
  er anbietet, direkte Gespräche mit dem russischen Präsidenten zu führen. Wir werden
  uns, wie Sie mittlerweile wissen, am Sonntag in London im sogenannten E3-Format,
  also Präsident Macron, Ministerpräsident Starmer und ich, mit Präsident Selenskyj
  treffen und die weiteren Schritte besprechen. Wir sind gesprächsbereit. Aus meiner
  Sicht ist es ganz selbstverständlich, dass die Europäer in einem solchen Gesprächsformat
  am Tisch sitzen. Es ist ein ureigenes europäisches Interesse, dass wir Frieden in
  diesem Teil Europas haben. Auf der europäischen Seite wird es nicht am Willen zu
  Gesprächen fehlen. Was fehlt, ist die Bereitschaft des russischen Präsidenten, in
  Gespräche einzutreten. Das Angebot von unserer Seite ist da. Ich begrüße deshalb
  sehr, dass Präsident Selenskyj es in diesem Brief noch einmal unterstrichen hat.
  Unsere Bereitschaft zu Gesprächen ist jetzt erneut dokumentiert. Frage: Herr Bundeskanzler,
  Deutschlands Autorität, Ihre, hier oder dann auch in London, hängt davon ab, dass
  Deutschland am Mittwoch die Reformen hinbekommt. Wird es die Vier-plus-vier-Gespräche
  geben? Was ist Ihre Erwartung? Ist das eine konzertierte Aktion, ist das ein Bündnis
  für Arbeit, oder ist das eine ganz kleine Formation, eine Eintagsfliege? Bundeskanzler
  Merz: Wir werden am Mittwochabend in Berlin in einem etwas größeren Kreis das fortsetzen,
  was in den letzten Wochen und Monaten in kleineren Kreisen immer schon stattgefunden
  hat. Wir haben einen intensiven Dialog mit den Sozialpartnern, mit den Gewerkschaften
  wie mit den Arbeitgeber- und Industrieverbänden. Wir werden jetzt das erste Mal
  mit dem Koalitionsausschuss und vier Vertretern der Gewerkschaften sowie vier Vertretern
  der Arbeitgeber- und Industrieverbände zu einem gemeinsamen Treffen zusammenkommen.
  Ich habe die vier Vertreter der Gewerkschaften und die vier Vertreter der Arbeitgeber-
  und Industrieverbände gebeten, bis dahin noch einmal den Versuch zu unternehmen,
  uns gemeinsame Vorschläge zu unterbreiten, wie sie denn den Standort sehen und was
  sie erwarten, um die Wettbewerbsfähigkeit des Standortes zu stärken. Das ist ein
  Meinungsaustausch. Es bleibt natürlich bei der Verantwortung der Sozialpartner,
  die Tarifpolitik gut und richtig zu machen, und es wird bei der Verantwortung der
  Politik bleiben, die politischen Entscheidungen zu treffen. Aber wenn wir zu einem
  größeren Konsens kämen, dann würde das die Arbeit der Bundesregierung und auch die
  Arbeit des Deutschen Bundestages sicherlich erleichtern. Ich erwarte also zunächst
  einmal, dass die Sozialpartner am Mittwochabend ihrerseits sagen, was die gemeinsamen
  Gespräche denn ergeben haben, wenn sie bis dahin – so hoffe ich – stattgefunden
  haben. Alles Weitere werden wir dann im Lichte der Beratungen von Mittwochabend
  zu entscheiden haben. Bundeskanzler Merz: Wir haben heute Morgen sowohl vom Staatspräsidenten
  als auch vom Ministerpräsidenten von Montenegro wirklich sehr ermutigende Zeichen
  gehört und auch sehr beeindruckende Belege dafür gesehen, wie weit das Land in seiner
  Entwicklung ist. Wir können es ja im Übrigen auch hier, wo wir heute sind, sehen.
  Es ist ein beeindruckendes Land. Wenn es richtig ist, was ich gehört habe, dann
  bin ich übrigens der erste Bundeskanzler, der Montenegro überhaupt jemals besucht,
  aber jetzt natürlich unter besonderen Umständen. Dieses Land ist sehr weit und steht
  kurz vor der Beitrittsreife. Insofern werden wir das in Brüssel jetzt gemeinsam
  zu besprechen haben. Ich hoffe sehr, dass wir die nächsten Schritte jetzt sehr schnell
  unternehmen und auch dem Land und vor allem der Bevölkerung das klare Signal geben:
  Ihr habt eure Hausaufgaben gemacht, und ihr könnt Mitglied der Europäischen Union
  werden. Ganz unweit von hier liegt Kroatien. Kroatien ist vor 13 Jahren Mitglied
  der Europäischen Union geworden und war vor 13 Jahren das letzte Land, das der Europäischen
  Union von heute beigetreten ist. Wir haben seit 13 Jahren kein neues Mitglied mehr
  in die Europäische Union aufgenommen. Deswegen ist es jetzt Zeit zu zeigen, dass
  wir nach wie vor die Erweiterung der Europäischen Union um europäische Länder ernst
  meinen. Dabei geht es insbesondere um diejenigen, die den Erweiterungsprozess für
  sich selbst vorbereitet haben, und zwar sehr erfolgreich. Dieses klare Zeichen von
  heute hier zu setzen, war mir auch persönlich wichtig. Ich habe mit beiden, mit
  dem Staatspräsidenten und dem Ministerpräsidenten, individuelle Gespräche geführt,
  und ich muss sagen: Es ist sehr ermutigend, zu sehen, was dieses Land in den letzten
  Jahren erreicht hat. Es ist jetzt Zeit für den Beitritt zur Europäischen Union.'
