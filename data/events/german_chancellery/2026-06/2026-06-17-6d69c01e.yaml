title: 'Seit 2008 G7/G20: Übersicht der Gipfeldokumente und -erklärungen'
text: 'Zum Abschluss eines Gipfels oder zu besonderen Anlässen geben die Staats- und
  Regierungsspitzen der teilnehmenden Länder gemeinsame Erklärungen heraus. Deutschland
  übernahm 2022 zum siebten Mal die G7 -Präsidentschaft. Weitere Dokumente dazu finden
  Sie hier auf Deutsch und Englisch im Überblick. Erklärung der Staats- und Regierungschefs:
  Aufgrund der Verletzung der Souveränität und territorialen Unversehrtheit der Ukraine
  durch Russland beschlossen die Staats- und Regierungschefs der G7 im Jahr 2014,
  sich wieder ohne Russland im G7 -Kreis zu treffen. Die G7 unterstrich damit, dass
  sie eine Wertegemeinschaft ist, die den Bruch des Völkerrechts nicht unwidersprochen
  hinnimmt. G20 -Gipfel als Videokonferenz am 21./22. November 2020: G20 -Gipfel 2010
  am 26./27. Juni 2010 in Toronto, Kanada:'
