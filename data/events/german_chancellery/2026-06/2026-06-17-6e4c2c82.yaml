date: '2026-06-17'
type: press_release
source_name: german_chancellery
title: Statement von Bundeskanzler Merz zum Abschluss des G7-Gipfeltreffens in Évian-les-Bains
  Starkes Zeichen der Einigkeit
text: 'Kanzler Merz bezeichnete es als Erfolg, dass beim G7 -Gipfel eine gemeinsame
  Sprache zu den großen außen- und sicherheitspolitischen Fragen gefunden wurde. Bundeskanzler
  Friedrich Merz hat zum Abschluss des G7 -Gipfels in Évian-les-Bains in Frankreich
  die gemeinsame Gipfelerklärung zu Iran und zur Ukraine als Erfolg bezeichnet. Gerade
  in der gemeinsamen Sprache zur Ukraine stecke die „sehr klare Botschaft“, dass die
  Unterstützung aus dem Kreis der G7 -Staaten heraus so stark wie selten zuvor ist.
  Die gemeinsame Hartnäckigkeit habe sich ausgezahlt, auch wenn es weiter ein schwieriger
  Weg zum Frieden bleibe. „Aber wir sind einen Schritt weitergekommen“, so der Kanzler.
  Dies gelte auch für den Nahen Osten. Die Einigung der Vereinigten Staaten mit Iran
  sei ein „großer Erfolg“. Ihm müssten nun weitere Verhandlungen folgen. Bundeskanzler
  Merz betonte erneut, dass Deutschland auch hier helfen werde. Dies könne ein militärisches
  Engagement in der Straße von Hormus mit entsprechendem Bundestagsmandat beinhalten.
  Schließlich sei zudem die notwendige Diskussion um geoökonomische Ungleichheiten
  vorangekommen. Ein Teil davon seien währungspolitische Ungleichgewichte, über die
  weiter gesprochen werden müsse. Bei kritischen Rohstoffen und Künstlicher Intelligenz
  sei zudem eine noch engere Zusammenarbeit verabredet worden. Meine Damen und Herren,
  zunächst einmal zwei Vorbemerkungen: Erstens, wir sind ein bisschen später als geplant.
  Das hängt damit zusammen, dass wir heute Morgen später angefangen haben. Es hat
  noch eine ganze Reihe von Vorbesprechungen gegeben. Die zweite Vorbemerkung, die
  ich machen möchte, bevor ich zum Inhalt komme: Ich möchte Präsident Macron für die
  wirklich sehr gute Führung durch diesen G7 -Gipfel, aber auch die sehr gute Vorbereitung
  in den letzten Wochen herzlich danken. Sie wissen, dass auch wir uns mit ihm zusammen
  intensiv auf diesen G7 -Gipfel in Évian vorbereitet haben. Ich muss im Ergebnis
  sagen: Es hat sich in mehrfacher Hinsicht gelohnt. Ich ziehe auch am zweiten Tag
  des G7 -Gipfels eine positive Bilanz. Wir haben gestern in verschiedenen Formaten
  eine noch engere Zusammenarbeit bezüglich kritischer Rohstoffe und künstlicher Intelligenz
  verabredet. Wir werden über künstliche Intelligenz auch gleich noch mit den Tech
  -Unternehmen beim Mittagessen sprechen. Aber bestimmend bleibt, und das war heute
  Morgen auch so, das ganze Thema der Geopolitik und der geopolitischen Ungleichgewichte.
  Wir haben uns bereits in der Nacht auf eine gemeinsame Gipfelerklärung zum Iran
  und zur Ukraine geeinigt. Das war ein hartes Stück Arbeit, aber es hat sich gelohnt,
  denn es ist das erste Mal überhaupt seit dem Amtsantritt von Präsident Trump , dass
  wir bei einem G7 -Gipfel eine gemeinsame Erklärung abgeben und eine gemeinsame Sprache
  zu den großen außen- und sicherheitspolitischen Fragen unserer Zeit finden. Das,
  finde ich, ist wirklich ein Erfolg. In der Sache steckt in unserer Erklärung nämlich
  eine sehr klare Botschaft: Die Unterstützung der Ukraine ist aus diesem Kreis heraus
  so stark wie selten zuvor. Alle G7 -Partner werden ihren militärischen und ihren
  finanziellen Beitrag für die Ukraine verstärken. – Ebenso deutlich ist die Botschaft
  an Russland: Alle G7 -Partner werden den Druck auf Moskau erhöhen, auch durch Sanktionen.
  – Das setzt einen neuen Ton, auch in der transatlantischen Einigkeit und Entschlossenheit.
  Es bringt uns vielleicht Friedensverhandlungen einen entscheidenden Schritt näher.
  Wir haben dafür in den letzten Wochen systematisch gearbeitet. Ich will es noch
  einmal wiederholen: Keir Starmer , Emmanuel Macron und ich haben in London zusammen
  mit Wolodymyr Selensky j unsere Positionen abgestimmt und gut vorbereitet. Unsere
  diplomatischen Berater haben sich auch mit den USA und mit den anderen europäischen
  Partnern abgestimmt, insbesondere mit Italien und mit Polen, die über den gesamten
  Prozess hinweg in unsere Beratungen und in unsere Überlegungen einbezogen waren.
  Gelungen ist das, weil wir die Gunst der Stunde genutzt haben; denn es lag ja auf
  der Hand, dass wir sozusagen eine Verbindung zwischen dem, was in der Ukraine notwendig
  bleibt, und dem, was jetzt mit dem Iran möglich war, herstellen. Auch zum Iran setzen
  wir in Évian eine klare Botschaft. Als G7 begrüßen wir die Einigung, die zwischen
  Präsident Trump und der iranischen Führung erzielt werden konnte. Das ist ein wirklich
  großer Erfolg. Wir sehen es auch heute, zum Beispiel beim Ölpreis. Dass er jetzt
  weiter zurückgeht, ist ein gutes Zeichen, und offensichtlich werden auch die Lieferbeziehungen
  systematisch wieder aufgenommen. Diesem Abschluss dieser Vereinbarung müssen nun
  auch weitere Verhandlungen folgen, insbesondere eine zweite Verhandlungsrunde. Wir
  sind uns über das Ziel völlig einig. Die Straße von Hormus muss ohne jede Einschränkung
  offen sein, ohne Wenn und Aber, und Iran muss sein Nuklearprogramm dauerhaft und
  nachweisbar beenden. Der Frieden muss halten, und das gilt nicht nur für den Iran,
  das gilt auch für den Libanon, insbesondere für den Südlibanon. Über die dortige
  Lage haben wir uns ausführlich unterhalten. Deutschland wird helfen. Es liegt in
  unserem Interesse, dass der Frieden hält. Wir brauchen einen stabilen Nahen und
  Mittleren Osten. Wir brauchen eine Klarheit bei den Seewegen und freie Seewege.
  Wir brauchen stabile Energiepreise. Unsere Hilfe kann auch ein militärisches Engagement
  vor Hormus beinhalten. Ein entsprechendes Mandat wird die Bundesregierung dem Bundestag
  vorschlagen, wenn und sobald die entsprechenden Voraussetzungen gegeben sind. Meine
  Damen und Herren, abschließend: Demokratie ist schwierig, und Diplomatie braucht
  Hartnäckigkeit, aber wir sind aus dieser Runde der demokratischen Staaten heraus,
  denke ich, in diesen zwei Tagen erfolgreich gewesen. Wir werden jetzt weitere Gespräche,
  weitere Verhandlungen in verschiedenen Zusammensetzungen führen müssen. Aber hier
  in Évian hat sich unsere gemeinsame Hartnäckigkeit ausgezahlt. Keine Frage, es bleibt
  ein weiterhin schwieriger Weg zum Frieden. Aber wir sind einen Schritt weitergekommen,
  im Iran und auch in der Ukraine. Abschließend erlauben Sie mir, zu sagen, dass wir
  auch in der notwendigen Diskussion über geoökonomische Ungleichgewichte einen Schritt
  weitergekommen sind. Ich habe in meinen Anmerkungen noch einmal auf die währungspolitischen
  Probleme hingewiesen. Wir begegnen einer Volkswirtschaft mit einer unterbewerteten
  Währung in der Größenordnung zwischen 25 und 30 Prozent gegenüber anderen Wirtschaftsräumen.
  Das ist ein so massiver Wettbewerbsnachteil, über den wir sprechen müssen, und wir
  haben auch verabredet, dass wir darüber sprechen. Über das Format muss noch abschließend
  Einigkeit erzielt werden. Aber währungspolitische Ungleichgewichte sind eben auch
  ein Teil geoökonomischer Ungleichgewichte, und dieses Thema haben wir heute noch
  einmal – auch auf meine Intervention hin – besprochen. Ich habe es auch abschließend
  noch einmal mit Präsident Trump besprochen, der das seinerseits ebenso sieht, weil
  er ja auch in Amerika davon betroffen ist. Insofern gibt es auch hier noch einmal
  eine sozusagen abschließende Bewertung eines Sachverhalts, der aber sehr viel weitere
  Arbeit von uns gemeinsam erfordert. Frage: Herr Bundeskanzler, Ihnen stehen ja jetzt
  zwei weitere Gipfel bevor, der EU -Gipfel in Brüssel und der NATO -Gipfel in Ankara.
  Beim EU -Gipfel wird es ja auch um die Ukraine gehen. Erwarten Sie dort Unterstützung
  dafür, dass die E3 im Sinne aller Europäer den diplomatischen Prozess für Europa
  fortführt? Was den NATO -Gipfel angeht: Erwarten Sie dadurch, dass es jetzt Entspannung
  zwischen Europa und Präsident Trump gegeben hat, dass auch der NATO -Gipfel einfacher
  für Sie werden wird? Bundeskanzler Merz: Herr Kollege, zunächst einmal werden wir
  morgen und übermorgen in Brüssel zum regulären Europäischen Rat zusammentreffen,
  und dabei wird natürlich das Ergebnis des G7 -Treffens von hier und heute eine Rolle
  spielen. Es werden ja auch drei Mitglieder, die Mitglieder der G7 sind, in Brüssel
  dabei sein, Giorgia Meloni , Emmanuel Macron und ich; Keir Starmer leider nicht.
  Wir werden natürlich auch berichten. Ich habe es eben schon gesagt: Wir haben uns
  ja in allen Fragen der Ukraine auch immer eng mit allen Europäern abgestimmt, insbesondere
  mit Polen und mit Großbritannien. Ich habe ja auch bereits für die nächste Woche
  zu einem Treffen nach Berlin im sogenannten E5-Format eingeladen. Wir werden bei
  dieser Gelegenheit auch noch einmal auf den G7 -Gipfel und auf den Europäischen
  Rat zurückschauen. Wir werden aber auch in dem Format noch einmal den NATO -Gipfel
  vorbereiten. Sie sehen also: Es sind verschiedene Formate, aber ich bemühe mich
  immer darum, niemanden auszuschließen, aber doch schon mit den größeren Mitgliedstaaten,
  die gleichzeitig G7 -Mitglieder sind, Mitglieder des Europäischen Rates sind, ein
  bisschen auch die Führungsrolle zu übernehmen ‑ immer abgestimmt mit anderen, immer
  mit voller Transparenz dessen, was wir tun. Insofern haben wir, glaube ich, jetzt
  auch viele Voraussetzungen geschaffen, um den NATO -Gipfel zu einem Erfolg zu machen.
  Der wichtigste Durchbruch war im letzten Jahr. Dadurch, dass wir uns fast alle auf
  Ziele von 3,5 plus 1,5 Prozent verständigt haben, ist im letzten Jahr der Grundstein
  für eine erfolgreiche NATO , insbesondere ihres europäischen Teils, gelegt worden,
  und ich vermute, das wird auch beherrschend sein für das NATO -Treffen in Ankara
  Anfang Juli. Insofern sind die Voraussetzungen geschaffen, dass wir jetzt die beiden
  folgenden großen Konferenzen, nämlich den Europäischen Rat morgen und übermorgen
  und dann Anfang Juli den NATO -Gipfel in Ankara gut bestehen werden. Ja, ich bin
  da zuversichtlich. Bundeskanzler Merz: (auf Englisch; ohne Dolmetschung) Zusatzfrage:
  (auf Englisch; ohne Dolmetschung) Bundeskanzler Merz: (auf Englisch; ohne Dolmetschung)
  Frage: Herr Bundeskanzler, eine Frage zum Iran: Die Bundesregierung arbeitet bereits
  an einem Mandatstext für einen etwaigen Bundeswehreinsatz in der Straße von Hormus.
  Für wann streben Sie eine Befassung im Kabinett und Bundestag an? Wie zuversichtlich
  sind Sie, dass US -Präsident Trump die Hilfe von Ihnen dann auch tatsächlich als
  eine Art Tauschgeschäft versteht und seinen Worten in Bezug auf die Ukraine auch
  Taten folgen lässt und die Ukraine dann auch handfest weiter unterstützt? Bundeskanzler
  Merz: Wir bereiten das in der Tat vor. Das haben wir aber auch schon vor einigen
  Wochen getan, das ist nichts Neues. Ich habe immer gesagt – wir haben das auch gemeinsam
  in der Bundesregierung so festgelegt –: Wenn es dort zu einer Feuerpause oder, besser
  noch, zu einem Waffenstillstand kommt, dann sind wir bereit, das auch militärisch
  abzusichern. Das steht aber unter dem Vorzeichen einer ganzen Reihe von Voraussetzungen,
  die noch nicht erfüllt sind. Deswegen gibt es da auch keine unmittelbare Eile. Die
  parlamentarische Sommerpause wird nach der ersten Juliwoche beginnen. Wir haben
  jetzt also im Grunde genommen noch zwei reguläre Sitzungswochen des Deutschen Bundestages
  vor uns, in die wir gehen könnten. Ich denke, wenn wir zu einer entsprechenden Beschlussfassung
  in der Bundesregierung kommen, dann werden wir eher in die letzte Sitzungswoche
  vor der Sommerpause gehen als in die nächste. Insofern gibt es im Augenblick keinen
  Zeitdruck. Frage: Herr Bundeskanzler, Sie reden hier in Évian auch über die Diversifizierung
  von Rohstoffen, um Abhängigkeiten zu verringern, zum Beispiel von China. Wie groß
  soll denn der Anteil chinesischer Rohstoffe in Zukunft sein? Halten Sie es für sinnvoll,
  den im Zweifel auch für Unternehmen zu begrenzen? Eine Frage zum US -Präsidenten.
  Wie ist denn Ihr persönliches Verhältnis zu Donald Trump nach diesem Gipfel? Bundeskanzler
  Merz: Ich beginne mit der zweiten Frage zuerst. Sie haben das möglicherweise auch
  gesehen – Sie konnten dort ja teilweise auch Bildaufnahmen machen –: Wir haben sehr
  offen miteinander über die Themen gesprochen. Wir haben auch sehr konstruktiv über
  die Dinge gesprochen, die uns hier auf diesem Gipfel beschäftigt haben. Insofern
  gibt es da überhaupt keine Einschränkungen, auch nicht im persönlichen Miteinander.
  Das gilt übrigens nicht nur für mich, sondern das gilt auch für alle anderen. Ich
  muss sagen: Ich habe diesen G7 -Gipfel als sehr konstruktiv und auch von einem wirklich
  gemeinsamen Geist getragen erlebt, und da hat es an keiner Stelle irgendwelche persönlichen
  Störungen gegeben. Im Gegenteil, es gab eine hohe politische Übereinstimmung zu
  den großen Themen, über die wir gesprochen haben. Was kritische Rohstoffe betrifft,
  so war es gut und wichtig, dass wir Gastländer eingeladen hatten, um heute Vormittag
  auch über diese Themen zu sprechen. Der indische Staatspräsident war da, der brasilianische
  Staatspräsident war da, der koreanische Staatspräsident war da. Wir haben mit den
  Gästen sehr intensiv über die Frage gesprochen, wie wir diversifizieren können.
  Das wollen wir. Wir werden keine Quoten vorgeben, aber wir werden Abhängigkeiten
  systematisch reduzieren. Vielleicht darf ich noch abschließend sagen: Was mich persönlich
  sehr beeindruckt hat, war ein Statement von William Ruto , dem kenianischen Präsidenten,
  der wirklich mit großem Nachdruck gesagt hat: Schaut auf Afrika und nehmt uns ernst.
  Ich hatte gestern beim Abendessen Gelegenheit, mit ihm und seiner Frau ausführlich
  über die Entwicklung in Kenia und auch in diesem Teil dieses afrikanischen Kontinents
  zu sprechen. Ich muss sagen, ich nehme auch als Aufgabe mit, gerade mit dem afrikanischen
  Kontinent und gerade mit den Ländern, die sich zurzeit wirklich weiterentwickeln,
  die Gespräche zu vertiefen; denn auch da haben wir sehr viele Möglichkeiten, unsere
  Rohstoffabhängigkeiten zu diversifizieren. Noch einmal: Es ist nicht unsere Aufgabe,
  Quoten vorzugeben; das werden wir auch den Unternehmen gegenüber nicht tun. Die
  politische Aufgabe für uns besteht darin, Märkte zu öffnen, Handelsbeziehungen zu
  ermöglichen, Freihandelsabkommen zu schließen. Da nehme ich den Appell von William
  Ruto auch als wirkliche Ermutigung mit, etwas zu tun, was wir in der Vergangenheit
  vielleicht zu wenig getan haben. Frage: Herr Bundeskanzler, eine innenpolitische
  Frage: In zwei Wochen wollen Sie über das Reformpaket entscheiden. Wenn man sich
  die Fliehkräfte in der SPD und auch in der Union anschaut: Wie zuversichtlich sind
  Sie, dass da ein Paket mit tiefgreifenden Maßnahmen gelingt? Wie wollen Sie mit
  der Bevölkerung über die Zumutungen, die beispielsweise bei der Umsetzung der Rentenreformen
  entstehen werden, in Austausch treten? Bundeskanzler Merz: Frau Kollegin, ich sehe
  weder Fliehkräfte noch Zumutungen. Das sind Kategorien, in denen ich nicht denke.
  Wir haben in der Koalition eine Verabredung, dass wir auf dem Weg der innenpolitischen
  Reformen jetzt auch wirklich vorangehen. Das wollen wir tun. Die nächsten Schritte
  werden folgen. Wir werden bereits in der nächsten Woche, genauer gesagt am nächsten
  Dienstag – der Termin ist ja mittlerweile öffentlich –, die Vorschläge der Rentenkommission
  entgegennehmen. Ich bin zuversichtlich, dass wir da gute Vorschläge bekommen werden.
  Dann wird die Botschaft sein: Wir wollen unser Land so reformieren, dass auch nachfolgende
  Generationen, auch junge Generationen die Chance haben, in Freiheit zu leben, im
  Frieden zu leben und im Wohlstand zu leben. Dafür müssen wir die Voraussetzungen
  schaffen. Das sind keine Zumutungen, sondern das sind Erwartungen, die an die Regierung
  richtigerweise gerichtet werden, und diese Erwartungen wollen wir erfüllen, indem
  wir unserem Land eine Perspektive für die nächsten Jahre – und ich sage immer wieder:
  vielleicht sogar für das nächste Jahrzehnt – eröffnen, die es den Bürgerinnen und
  Bürgern in unserem Land und vor allen Dingen den jungen Menschen in Deutschland
  ermöglicht, mit Deutschland eine gute Geschichte zu verbinden und in unserem Land
  eine Zukunft zu sehen. Noch einmal: Das sind weder Fliehkräfte noch Zumutungen,
  sondern das sind gemeinsame Anstrengungen und wirklich gute Botschaften, die wir
  gerade auch für die junge Bevölkerung in Deutschland haben werden. Frage: Herr Bundeskanzler,
  in der Abschlussdeklaration ist von Waffenproduktion unter Lizenz in der Ukraine
  die Rede. Um welche Waffen geht es? Könnten da deutsche Rüstungskonzerne involviert
  sein? Ganz kurz noch ein anderes Thema: Ist es gerechtfertigt, in dieser Runde nicht
  über die Klimakatastrophe zu reden, um dem amerikanischen Präsidenten entgegenzukommen?
  Bundeskanzler Merz: Die Themen sind abgesprochen gewesen und vorher auch mit allen
  Gipfelteilnehmern besprochen gewesen. Das waren die Hauptthemen, die wir verabredet
  haben. Um welche Lizenzen es da geht, wird im Einzelnen zwischen den beteiligten
  Staaten besprochen werden. Da geht es in der Tat um umfassende Lizenzerteilungen,
  auch von amerikanischen Unternehmen an europäische Hersteller. Ich bin sehr dankbar,
  dass da auch von Präsident Trump und der gesamten amerikanischen Delegation wirklich
  ein hohes Maß an Kooperationsbereitschaft erkennbar geworden ist. Wir alle haben
  das Problem, dass wir zurzeit zu wenig produzieren. Das kann durch Lizenzerteilungen
  an Unternehmen ausgeglichen werden, die diese Produktionskapazitäten haben. Das
  sind eben auch europäische und das sind auch ukrainische Unternehmen.'
