title: Im Kabinett beschlossen Impulse für die Zukunft der deutschen Entwicklungspolitik
text: 'Auch die Unterstützung beim Ausbau erneuerbarer Energien im Globalen Süden
  ist Teil der deutschen Entwicklungspolitik. Foto: Photothek via Getty Images/Thomas
  Imo Das Bundeskabinett hat beschlossen, eine entwicklungspolitische Nord-Süd-Kommission
  (ENSK) zur Stärkung der internationalen Partnerschaften einzusetzen. Die Kommission
  wird unabhängig arbeiten und mit Vertreterinnen und Vertretern aus Politik, Wissenschaft,
  Privatwirtschaft, Gewerkschaften, Zivilgesellschaft und internationalen Organisationen
  aus dem Globalen Süden und Globalen Norden besetzt werden. Sie wird aus rund 20
  Mitgliedern und zwei Ko-Vorsitzenden bestehen. Laura Chinchilla, die Präsidentin
  Costa Ricas von 2010 bis 2014, und Olaf Scholz, Bundeskanzler a.D. , werden gemeinsam
  den Vorsitz der Kommission übernehmen. Für Bundesentwicklungsministerin Reem Alabali
  Radovan ist es ein wichtiges Signal und eine große Freude, dass sich mit Chinchilla
  und Scholz „zwei weltweit hoch geschätzte und multilateral erfahrene Co-Vorsitzende
  für diese Aufgabe einsetzen werden.“ Zu den noch herauszuarbeitenden Empfehlungen
  zählen Vorschläge für neue Partnerschaftsmodelle und Impulse für die Zukunft der
  deutschen Entwicklungspolitik. „Wenn Deutschland auch in Zukunft global mitgestalten
  will, brauchen wir stabile Partnerschaften mit Ländern des Globalen Südens“,  sagte
  Alabali Radovan nach der Kabinettsitzung und ergänzte: „Ziel der neuen entwicklungspolitischen
  Nord-Süd-Kommission ist es, unsere partnerschaftlichen Beziehungen zu den Ländern
  des Globalen Südens weiter zu intensivieren und ein globales Netzwerk auszubauen“.
  Die Kommission soll auch eine Schlüsselrolle bei der Erarbeitung gemeinsamer Lösungen
  für globale Herausforderungen der Entwicklungsagenda einnehmen. Die Agenda 2030
  der Vereinten Nationen spielt dort als internationales Referenzdokument eine zentrale
  Rolle. Auch zu einem Rahmenwerk für die Zeit nach 2030 soll die Kommission Empfehlungen
  erarbeiten. Sie wird zudem einen strategischen Begleitkreis erhalten, der Vertreterinnen
  und Vertreter aus Parlament, anderen Bundesressorts, Privatwirtschaft, Gewerkschaften,
  Wissenschaft, Politischen Stiftungen, Zivilgesellschaft, Organisationen der deutschen
  Entwicklungszusammenarbeit und der Jugend zusammenbringen wird. Der Start der Kommission
  mit ihren beiden Vorsitzenden erfolgt am 30. Juni 2026 im Rahmen der Hamburg Sustainability
  Conference in Hamburg.'
