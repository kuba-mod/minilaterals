title: Press briefing with Federal Chancellor Merz at the E5 meeting “We are committed
  to a strong NATO ”
text: 'The heads of state and government of the E5 held discussions at the Federal
  Chancellery. Federal Chancellor Friedrich Merz welcomed French President Emanuel
  Macron, British Prime Minister Keir Starmer, Italian Prime Minister Georgia Meloni
  and Polish Prime Minister Donald Tusk to a meeting of the E5 at the Federal Chancellery.
  NATO Secretary General Mark Rutte took part in the meeting via video call. The meeting
  focused on preparations for the NATO summit, which is set to take place in Ankara
  on 7 and 8 July 2026. In addition, the participants at the meeting discussed additional
  support for Ukraine in the face of Russia’s war of aggression, as well as the situation
  in Iran and Lebanon. Read the transcript of the press statements here (in German):'
