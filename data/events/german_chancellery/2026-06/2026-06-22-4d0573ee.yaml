title: Bundesregierung strebt Beteiligung an Rüstungskonzern KNDS an
text: 'Der Sicherheits- und Verteidigungsindustrie kommt durch die anhaltende russische
  Bedrohung für Europa und den Angriffskrieg auf die Ukraine eine zentrale Bedeutung
  zu. Aus Sicht der Bundesregierung macht es diese geopolitische Lage erforderlich,
  die Kapazitäten der Verteidigungsindustrie auszubauen. Dabei will die Bundesregierung
  besonders bilaterale und europäische Rüstungskooperationen stärken. Der Zusammenarbeit
  mit Frankreich fällt dabei eine Schlüsselrolle zu. Die Bundesregierung strebt daher
  eine Beteiligung in Höhe von 40 Prozent der Anteile an KNDS an. Mit dieser Beteiligung
  beabsichtigt die Bundesregierung, den Interessen des Bundes angesichts der Bedeutung
  des Unternehmens Rechnung zu tragen. Eine Beteiligung Deutschlands an KNDS wird
  den langfristigen Einfluss auf ein für die europäische Sicherheits- und Verteidigungsfähigkeit
  strategisch bedeutendes Unternehmen sichern. Zugleich werden die nationale industrielle
  Wertschöpfung sowie die technologische Souveränität und der Schutz von Sicherheitsinteressen
  und Schlüsseltechnologien in Deutschland gestärkt. In engem Dialog und auf Augenhöhe
  mit unseren französischen Partnern wird sich die Bundesregierung für eine erfolgreiche
  und zukunftsgerichtete Entwicklung des Unternehmens einsetzen. Die Vereinbarung
  und die gesamte Transaktion stehen unter dem Vorbehalt der Zustimmung des Haushaltsausschusses
  des Deutschen Bundestages. Die Bundesregierung beabsichtigt, den Umfang der Beteiligung
  – unter Beibehaltung gleicher Governance-Rechte im Unternehmen wie Frankreich –
  später wieder zu reduzieren. Zu KNDS: KNDS ist ein deutsch-französischer Rüstungskonzern,
  der aus dem Zusammenschluss von Krauss-Maffei Wegmann (KMW)⁠ und Nexter hervorgegangen
  ist und zu den führenden europäischen Herstellern von Landsystemen zählt. Das Unternehmen
  produziert unter anderem Kampfpanzer (Leopard 2), Artilleriesysteme, Schützenpanzer
  und Munition. Mit mehr als 11.000 Beschäftigten gehört KNDS heute zu den strategisch
  bedeutenden Rüstungsunternehmen Europas und leistet einen wichtigen Beitrag zur
  militärischen Stärke Europas sowie zur Unterstützung der Ukraine. KNDS ist ein Unternehmen,
  das für Deutschland industrie-, sicherheits- und verteidigungspolitische Bedeutung
  hat. Das Unternehmen ist ein relevanter Anbieter für die Bundeswehr. Zugleich ist
  es ein wichtiger Teil der deutschen Sicherheits- und Verteidigungsindustrie mit
  einer Vielzahl an Standorten in Deutschland.'
