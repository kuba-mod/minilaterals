title: 'Tausende Gäste strömen zum Tag der offenen Tür der Bundesregierung: Viele
  Highlights am Sonntag geplant'
text: 'Die Bundesregierung lädt an diesem Wochenende zum „Tag der offenen Tür“ ein.
  Bei warmem Sommerwetter entschieden sich viele Bürgerinnen und Bürger für Politik
  statt Badesee. Tausende Besucherinnen und Besucher nutzten die Gelegenheit, einen
  Blick hinter die politischen Kulissen im Bundeskanzleramt, der Bundesministerien
  und des Presse- und Informationsamts der Bundesregierung zu werfen. Im Gespräch
  mit dem Bundeskanzler und vielen Regierungsmitgliedern Und auch am morgigen Sonntag
  können die Gäste vielen Regierungsmitgliedern live begegnen. Viele Ministerinnen
  und Minister freuen sich darauf, sich und ihre Themen vorzustellen und mit den Besucherinnen
  und Besuchern direkt ins Gespräch zu kommen. Bundeskanzler Friedrich Merz wird am
  Sonntag, den 21.  Juni, um 16 Uhr, auf der Bühne im Bundeskanzleramt zu Gast sein.
  Zuvor wird dort der Chef des Bundeskanzleramts, Thorsten Frei, auf der Bühne über
  die Regierungsarbeit sprechen. Das Bundespresseamt bietet ebenfalls ein vielfältiges
  Programm mit interessanten Talkrunden rund um aktuelle politische Themen, wie Reformen
  und Bauen, innere und äußere Sicherheit, Verkehr und Deutschland 2.0. Als Gäste
  werden am Sonntag u.a. die Bundesminister Klingbeil, Wadephul, Wildberger und Schnieder
  sowie die Bundesministerinnen Hubertz, Prien und Hubig erwartet. Rundherum ist ein
  buntes Rahmenprogramm geplant. Es gibt zudem viele Möglichkeiten sich bei heißem
  Wetter abzukühlen. Das ausführliche Programm finden Sie unter: http://www.bundesregierung.de/tag-der-offenen-tuer
  Sicherheitsvorschriften Alle Häuser sind bemüht, ihren Gästen ein schönes Besuchserlebnis
  zu bieten. Doch es wird auch um Verständnis gebeten: Ohne Sicherheitsvorkehrungen
  geht es nicht. Für das Bundeskanzleramt entsprechen die Sicherheitskontrollen denen
  auf Flughäfen. Um die Wartezeiten nicht zu verlängern, wird empfohlen, auf größere
  Taschen und Gepäckstücke zu verzichten. Besucherinnen und Besucher müssen sich durch
  einen Personalausweis oder ein anderes Ausweisdokument mit Lichtbild ausweisen können.'
