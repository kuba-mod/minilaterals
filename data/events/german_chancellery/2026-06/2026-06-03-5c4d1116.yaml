title: Bundeskanzler Merz zur Wahl der nichtständigen Mitglieder für den Sicherheitsrat
  der Vereinten Nationen für die Periode 2027/28
text: „Wir haben uns mit Überzeugung beworben. Wir haben das Ziel nicht erreicht.
  Mein Glückwunsch gilt allen gewählten Staaten, besonders unseren direkten Mitbewerbern
  Portugal und Österreich. Mit beiden Ländern verbindet uns eine enge europäische
  Partnerschaft und die gemeinsame Verantwortung in den Vereinten Nationen. Die Aufgaben,
  die uns in den Vereinten Nationen gestellt sind, ändern sich durch dieses Ergebnis
  nicht. Deutschland bleibt ein verlässlicher Stützpfeiler des multilateralen Systems.
  Diese Verantwortung tragen wir mit Entschlossenheit. Mein Dank gilt allen, die unsere
  Bewerbung mit Engagement und Sachverstand vorangetrieben haben, im Auswärtigen Amt,
  an unseren Auslandsvertretungen und in vielen Hauptstädten der Welt. Diese Arbeit
  war richtig, und sie wird Deutschland langfristig zugutekommen.”
