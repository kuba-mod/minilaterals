title: Im Kabinett beschlossen Reform für einen bezahlbaren und modernen Führerschein
text: 'Die Digitalisierung der Theorie soll Kosten senken und Zeit sparen. Günstiger,
  digitaler, moderner: So soll künftig der Erwerb des Führerscheins ausgestaltet sein.
  Wichtiges Ziel ist, die hohen Durchschnittspreise von etwa 3.400 Euro zu senken.
  Das soll vor allem durch mehr Digitalisierung und Transparenz erreicht werden. Dabei
  bleiben die Qualität der Ausbildung und das hohe Sicherheitsniveau erhalten. Schwerpunkt
  der Reform sind konkrete Verbesserungen für Fahrschülerinnen und Fahrschüler, beispielsweise
  durch einen digitalen und effizienteren Theorieunterricht. Zugleich sollen die Fahrschulen
  entlastet werden, insbesondere durch weniger bürokratische Hürden. Bundesverkehrsminister
  Patrick Schnieder betonte: „Unser Ziel ist klar: Eine moderne und sichere Fahrausbildung
  für alle. Mobilität ist Teil der öffentlichen Daseinsvorsorge – sie darf kein Privileg
  sein.“ Für den Start der Reform der Fahrschulausbildung hat das Bundeskabinett einen
  Gesetzentwurf zur Änderung des Fahrlehrergesetzes und anderer straßenverkehrsrechtlicher
  Gesetze beschlossen. Ein weiterer Baustein der Reform ist die Verordnung zur Modernisierung
  der Fahrschulausbildung. Sie wurde am 10. Juni im Kabinett beschlossen. Beides befindet
  sich nun im parlamentarischen Verfahren. Der Bürokratierückbau ist eines der Kernanliegen
  der Bundesregierung ist und bildet daher auch einen zentralen Bestandteil dieser
  Reform. Die Fahrlehrerschaft wird spürbar von Bürokratie befreit, vor allem von
  umfangreichen Dokumentations- und Aufzeichnungspflichten. Durch den Abbau starrer
  organisatorischer Vorgaben erhalten die Fahrschulen mehr Gestaltungsspielraum. Darüber
  hinaus sind unter anderem folgende Maßnahmen geplant:'
