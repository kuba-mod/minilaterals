title: Sitzung des Nationalen Sicherheitsrates im Juni 2026
text: Der Nationale Sicherheitsrat ist heute unter dem Vorsitz des Bundeskanzlers
  zusammengetreten. Um Deutschlands Resilienz in Krisenfällen zu stärken, hat der
  Nationale Sicherheitsrat unter anderem beschlossen, die sogenannten Sicherstellungs-
  und Vorsorgegesetze zu überprüfen und sie an die aktuellen sicherheits- und verteidigungspolitischen
  Herausforderungen anzupassen. Diese Gesetze dienen dazu, in Krisenlagen die Versorgung
  der Bevölkerung und der Streitkräfte mit lebenswichtigen Gütern und kritischer Infrastruktur
  sicherzustellen. Auch wurde die Gesamtkonzeption der militärischen Verteidigung
  vorgestellt und notwendige Entscheidungen zur Gesamtverteidigung auf den Weg gebracht.
  Des Weiteren hat der Nationale Sicherheitsrat die Folgen fortgeschrittener KI-Modelle
  für die Cybersicherheit in Deutschland bewertet und beschlossen, ein KI-Sicherheitsinstitut
  zu gründen. Dieses Institut soll unsere Kapazitäten zur Analyse der Fähigkeiten
  moderner KI-Modelle inkl. ihrer Risiken bündeln, den Informationsaustausch mit vergleichbaren
  ausländischen Instituten intensivieren und auf einheitliche Standards im Umgang
  mit KI mit internationalen Partnern hinwirken. Ferner haben sich die Mitglieder
  des Nationalen Sicherheitsrates unter anderem zur aktuellen sicherheitspolitischen
  Lage im Nahen und Mittleren Osten ausgetauscht. Zudem teilt der Regierungssprecher
  mit, dass der Leiter der Abteilung für Außen-, Sicherheits- und Entwicklungspolitik
  des Bundeskanzleramtes die Leitung der Stabsstelle Nationaler Sicherheitsrat im
  Bundeskanzleramt übernommen hat.
