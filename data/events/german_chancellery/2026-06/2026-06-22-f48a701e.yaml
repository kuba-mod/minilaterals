date: '2026-06-22'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 22. Juni 2026
text: '(Vorsitzende Buschow eröffnet die Pressekonferenz und begrüßt StS Kornelius
  sowie die Sprecherinnen und Sprecher der Ministerien.) Herr Kornelius, was bedeutet
  die Rücktrittsankündigung von Keir Starmer für das Treffen ( der Staats- und Regierungschefs
  der E5 )? Wir haben das Statement von Premierminister Starmer über seinen Rückzug
  und auch den weiteren Zeitplan zur Kenntnis genommen. Die Bundesregierung hat in
  Keir Starmer immer einen verlässlichen und engen Partner in außenpolitischen und
  gerade die Ukraine betreffenden Fragen gehabt. Das geplante Treffen im E5-Format
  ist Teil der Vorbereitung des NATO-Gipfels. Wir gehen weiterhin davon aus, dass
  es wie geplant stattfinden kann. Wie wirkt sich denn der Streit zwischen Polen und
  der Ukraine auf das E5-Format aus? Die Debatte zwischen Polen und der Ukraine bezieht
  sich auf historische Fragen. Die Bundesregierung kommentiert das nicht. Wir gehen
  davon aus, dass alle Akteure gerade mit Blick auf die Ukraine konstruktiv weiterarbeiten.
  Ich möchte aber noch einmal betonen, dass das E5-Treffen im Kern der Vorbereitung
  des NATO-Gipfels in Ankara dient und insofern auch eine andere Stoßrichtung hat.
  Herr Kornelius, noch einmal nur zur Sicherheit: Gehen Sie davon aus, dass Herr Starmer
  an dem Treffen hier noch teilnimmt? Wir setzen unsere Planung so fort wie die Tage
  zuvor. Sie haben jetzt gesagt, dass es im Kern darum gehen wird. Aber Sie kennen
  die Debatten der vergangenen Woche darüber, wer dann im besten Fall für Europa spricht,
  wenn es überhaupt Verhandlungen mit Russland geben wird. Wird auch das Thema der
  Beratung sein, nachdem jetzt ja immerhin auch Polen und Italien bei dem Treffen
  mit dabei sind? Auch dazu kann ich nur auf das verweisen, was der Bundeskanzler
  nach der Sitzung des Europäischen Rates am Freitag sagte, nämlich dass nun die Substanz
  und die Frage, wie die Ukraine auf Friedensverhandlungen vorbereitet werden kann
  und sich selbst vorbereitet, im Vordergrund steht. Die Frage, wer für die Europäische
  Union spricht, muss zu diesem Zeitpunkt nicht beantwortet werden. Wir werden das
  entscheiden, wenn es dann zu diesen Gesprächen kommt. Etwas Formales: Können Sie
  sagen, wann das Treffen beginnt? Ist eine Information der Öffentlichkeit mit einer
  PK geplant? Nach jetzigem Planungsstand beginnt das Treffen am Mittwochnachmittag,
  am Spätnachmittag, etwa um 16.45 Uhr. Es wird im Bundeskanzleramt stattfinden. Der
  Generalsekretär der NATO, Mark Rutte, wird zugeschaltet. Im Mittelpunkt des Treffens
  ‑ das hatte ich eben schon gesagt ‑ stehen die Vorbereitung des NATO-Gipfels in
  Ankara am 7. und 8. Juli und natürlich auch die Unterstützung der Ukraine und als
  drittes die Situation im Nahen und Mittleren Osten. Es wird am Ende, um ca. 18 Uhr,
  eine gemeinsame Pressebegegnung geben. Die Vorbereitungen dazu sind noch im Gang.
  Herr Kornelius, Keir Starmer hat in seiner Rücktrittserklärung ja betont, dass die
  Erfolge seiner zweijährigen Regierungszeit eigentlich unübersehbar gewesen seien,
  ökonomisch und außenpolitisch. Gleichwohl sei der Druck auf ihn innenpolitisch enorm
  gewachsen, unter anderem wegen Fragen, die mit Migration usw. zu tun haben. Dabei
  sei seine Popularität schlicht und einfach nicht mehr gegeben gewesen. Sieht die
  Bundesregierung in diesem Erklärungsmuster irgendwelche Dinge, die sie lernen kann?
  Die Bundesregierung kommentiert jetzt die inneren Motive in Großbritannien nicht.
  Ich kann sagen, dass Großbritannien für uns und für die Europäische Union immer
  ein wichtiger Partner war und bleiben wird. Wir stehen natürlich vor denselben Herausforderungen
  und wissen, dass der Brexit für beide Seiten in all seinen Aspekten ein Einschnitt
  war, sowohl ökonomisch als auch mit Blick auf andere Motive, die dabei eine Rolle
  gespielt haben könnten. Wir sind stets bestrebt, dass wir mit der britischen Regierung
  eine sehr enge Kooperation fortführen, um auch die Hindernisse, die sich dadurch
  aufgetürmt haben, zu mindern. Meine Frage zielte darauf ab, dass laut Starmer ein
  Unterschied zwischen seinen Popularitätswerten im Inneren und von ihm genannten
  Erfolgen in seiner Politik gegeben sei. Darin sieht die Bundesregierung keine Parallelen
  zu ihrer Situation? Nein, wir bewerten jetzt die Situation in Großbritannien nicht
  und ziehen deswegen auch keine Parallelen dazu. Herr Kornelius, ich habe noch eine
  Nachfrage, weil Sie gerade den Brexit angesprochen haben. Der designierte Nachfolger
  von Herrn Starmer gilt ja als sehr viel entschiedenerer Befürworter einer Rückkehr
  des Königreichs in die EU. Wäre die Bundesregierung dafür offen? Die Bundesregierung
  wartet jetzt zunächst einmal die Entwicklungen in Großbritannien ab. Sie freut sich
  auf die enge Zusammenarbeit mit einem künftigen Premierminister. Sie wissen, dass
  sich das Brexitreferendum jetzt zum zehnten Mal jährt. Morgen ist, glaube ich, der
  Tag. Alle Entwicklungen, die sich mit Blick auf die Europäische Union ergeben, sind
  natürlich der britischen Regierung bzw. der britischen Bevölkerung vorbehalten.
  Wir werden dann sicherlich eine konstruktive Antwort finden, Großbritannien auch
  weiterhin eng an unserer Seite zu haben. Was wäre der Bundesregierung lieber, ein
  Großbritannien, das man an die EU annähert, oder ein Mitglied Großbritannien? Dazu
  nehme ich jetzt keine Hierarchisierung vor. Das ist auch keine Alternative, die
  sich momentan stellt. Es gibt viele Formen der Zusammenarbeit. Jede Form der engen
  Anbindung und der Abstimmung hilft der europäischen Zusammenarbeit. Großbritannien
  ist ein starkes und wichtiges Land auf dem europäischen Kontinent. Deswegen gehört
  es an die Seite der EU. Ich würde auch noch einmal auf die Beliebtheitswerte zurückkommen.
  Herr Starmer tritt ja genau deswegen zurück. Ist das kein Anlass für den Kanzler,
  über seine eigenen Beliebtheitswerte nachzudenken und diese zu reflektieren? Zum
  Thema der Ukraine: Polen hat Selenskyj seinen höchsten Orden aberkannt. Kyjiw verurteilt
  dies als Beleidigung. Wird die Konferenz zum Wiederaufbau der Ukraine in Danzig
  trotzdem stattfinden? Ja, unseres Wissens findet diese Konferenz statt. Diese Konferenz
  findet unseres Wissens statt. Der Bundeskanzler plant die Teilnahme, so wie wir
  das vergangenen Freitag angekündigt haben. Der ukrainische Präsident hat am 21. Juni
  auf seinem offiziellen X-Account erklärt, die G7, darunter auch Deutschland, habe
  den letzten groß angelegten ukrainischen Drohnenangriff gegen Moskau abgenickt und
  unterstützt. Dazu würde mich zunächst interessieren: Kann die Bundesregierung diese
  Darstellung so bestätigen? Ich kenne die Darstellung, die Sie geschildert haben,
  nicht. Deswegen kann ich sie auch nicht kommentieren. Meine Hoffnung liegt wie immer
  beim Auswärtigen Amt. Dabei muss ich aber leider auch passen. Es tut mir leid. Das
  ist ja keine Kleinigkeit. Ich versuche es trotzdem noch einmal: Die Drohnen trafen
  zum großen Teil nach aktuellem Wissensstand zivile Wohnhäuser und zivile Energieinfrastruktur.
  Dazu würde mich ganz grundsätzlich interessieren: Unterstützt die Bundesregierung
  auch Angriffe gegen die genannten zivilen Infrastrukturen wie Wohngebäude und Energieanlagen?
  Sie wissen, dass dieser Krieg seit vielen Jahren, von Russland ausgehend, die zivile
  Infrastruktur genauso betrifft wie die militärische Infrastruktur. Eine genaue Schadensbilanz
  der letzten Angriffe kann ich nicht ziehen. Insofern teile ich Ihre Prämisse auch
  nicht. Unser Appell an die Kriegsparteien ist allgemein, jetzt an den Verhandlungstisch
  zurückzukehren bzw. sich überhaupt erst einmal dort einzufinden. Die Aufforderung
  gilt für Russland, das sich bisher jeder politischen Annäherung verweigert. Der
  Zeitpunkt, dass dieser Krieg nun politisch gelöst wird, ist gekommen. Sie sehen
  auch durch die Angriffe der letzten Tage, dass Russland allen Grund hat, über eine
  politische Lösung nachzudenken. Dann machen wir mit dem nächsten Thema ‑ ‑ ‑ Dann
  würde ich noch eine kurze Nachfrage ‑ ‑ ‑ Sie hatten bereits drei Fragen, Herr Kollege,
  Sie wissen, dass das eigentlich schon mehr als ‑ ‑ ‑ Zwei Nachfragen und eine Frage!
  Sie wissen, dass das eigentlich weniger üblich ist. Ich würde das Thema, wenn es
  sonst kein Interesse daran gibt, gern wechseln. Ich habe an Herrn Müller und an
  Herrn Giese jeweils eine Frage. Herr Müller, es hieß ja in den letzten Monaten bzw.
  Jahren immer wieder, dass man für Litauen mehr als genug Bewerber habe und es zu
  viele seien. In den vergangenen Tagen kam dann heraus, dass es nicht genug gebe
  und dass man voraussichtlich von der Freiwilligkeit abrücken und in die Verpflichtung
  übergehen werde. Wie kann es passieren, dass man es so lange so kommuniziert hat
  und jetzt die Umkehr machen muss? Man hört ja auch, dass in Litauen nicht alles,
  was es für die Soldatinnen und Soldaten attraktiver machen soll, prickelnd sein
  soll: Unterkünfte, die Ernährung usw. Wie will man es besser machen? Herr Giese,
  in der „WELT“-Berichterstattung von Herrn Jungholt stand, dass das Auswärtige Amt
  die Zone für Litauen falsch berechnet habe, was jetzt auch Auswirkungen auf die
  Besoldung der Soldatinnen und Soldaten vor Ort habe. Wie konnte das passieren, und
  wie will man damit umgehen? Müssen die Soldaten es jetzt zurückbezahlen, oder was
  ist der Stand der Dinge? Ich beginne mit der ersten Fragestellung. Der Minister
  hat sich gestern sehr ausführlich in einem Interview geäußert. Wahrscheinlich ist
  Ihnen das Interview bekannt. Darin hat er im Grunde Ihre Fragen beantwortet. Natürlich
  haben wir viele Freiwillige. Aber der Minister hat auch dargestellt, dass wir vor
  allen Dingen in den Fachverwendungen in der Gesamtheit der Bundeswehr schon auch
  an unsere Grenzen stoßen. Das sind Logistiker und ABC-Kräfte. IT ist immer ein Thema,
  vor allen Dingen in der heutigen Zeit, in der viel mehr in die Digitalisierung geht.
  10 000 freiwillige Panzergrenadiere helfen nicht, wenn man eben auch Spezialverwendungen
  bedienen muss. Solch eine Brigade ist ein in sich geschlossenes Konstrukt, das in
  allen Bereichen funktionieren muss, auch mit den Fachverwendungen. Der Minister
  hat gestern gesagt, dass wir in den anderen Bereichen sehr gut mit den Freiwilligen
  auskommen werden und den Prozess noch abwarten müssen. Aber es ist wahrscheinlich,
  dass wir im Bereich der Fachverwendungen in die Verpflichtung gehen müssen. Aber
  es läuft erst einmal über die Gespräche, und dann wird auch die persönliche Situation
  berücksichtigt. Das hat der Minister ganz gut dargestellt. Zu Ihren Worten zu den
  Rahmenbedingungen: Ich kenne das anders. Als ich in Litauen war und mich dort unterhalten
  habe, waren die Rahmenbedingungen, vor allem Familienbetreuung, Kita, Schule, Wohnmöglichkeiten,
  Transport, eigentlich sehr gut. Wir arbeiten weiterhin an einer Verbesserung. Das
  ist ganz klar. Auch die litauischen Verbündeten machen dabei sehr viel, wenn es
  um Bahnverbindungen und gegebenenfalls Flugverbindungen geht. Wir haben mit dem
  Artikelgesetz Rahmenbedingungen geschaffen. Wir haben über die Personalführung Rahmenbedingungen
  geschaffen, auch für die Rückkehr, den freien Wunschort bei der Rückkehr usw. Die
  Rahmenbedingungen sind gut und werden sich noch weiter verbessern, denn wir haben
  damit ja gewissermaßen einen Blueprint. Zum ersten Mal bauen wir eine solche Brigade
  auf, und wir werden in den nächsten Jahren natürlich aus den Erkenntnissen lernen.
  Aber meine Erfahrung und meine Gespräche ergeben, dass die Soldaten, die sich dafür
  entschieden haben, dort sehr gut ankommen und vor allen Dingen auch auf eine sehr
  dankbare und sehr freundliche Bevölkerung stoßen. Zu Ihrer Frage hinsichtlich der
  Berichterstattung, die es gab, sage ich noch einmal etwas zum Grundsatz: In der
  Tat tritt für alle Beamte des Bundes, wenn sie ins Ausland entsendet werden, neben
  die normale Besoldung noch eine zusätzliche Auslandsbesoldung. Wie wird sie berechnet? ‑
  Das unternimmt eine externe Firma, die weltweit Daten erhebt und zu dieser Datenerhebung
  gemeinsam mit dem Auswärtigen Amt eine Berechnungsmethode entwickelt hat. In diesem
  Jahr haben wir festgestellt, dass es im vergangenen Jahr bei der zuständigen Firma
  einen Datenübertragungsfehler gab. Dieser Fehler aus dem Jahr 2025 hat dazu geführt,
  dass die Zonenstufen an einigen Dienstorten zu hoch angesetzt worden sind. Dieser
  Fehler ist behoben. Zu Ihrer Frage, was nun mit den überbezahlten Geldern passiert:
  Wir prüfen dazu einen Regress gegenüber der Firma, bei der dieser Fehler entstanden
  ist. Diese Berechnungsmethode ist  auch bei allen möglichen anderen öffentlichen
  Stellen angewendet worden, die ihre eigenen Mitarbeiter ins Ausland entsenden. Insofern
  ist das ein größeres Thema. Was ich in Bezug auf die Beamten sagen kann, jedenfalls
  mit Blick auf das Auswärtige Amt, ist, dass es keine Nachforderungen geben wird.
  Dafür fehlt eine Rechtsgrundlage, weil die Zonenstufeneinordnung rechtmäßig erfolgt
  ist. Rechtmäßige Verwaltungsakte lassen sich nur unter sehr engen Bedingungen zurücknehmen.
  Hierbei ist klar, dass es ein Fehler dieser Firma ist und kein Fehler der Beamtinnen
  und Beamten, die daran, dass diese Berechnung richtig ist, glauben mussten. Ich
  erlaube mir noch eine Ergänzung: Das sehe ich für die Soldatinnen und Soldaten vor
  Ort genauso. Nach einer ersten Überschlagsrechnung liegt die Auswirkung bei den
  niedrigeren Dienstgraden ungefähr im hohen zweistelligen Bereich pro Monat. Bei
  den höheren Dienstgraden wird die Auswirkung nach aktuellem Stand bei unter 200 Euro
  sein. Aktuell prüfen wir intern Maßnahmen, um diese Auswirkungen zu mitigieren,
  damit es keinen Nachteil für die Soldatinnen und Soldaten gibt. Was man dabei machen
  kann, befindet sich gerade noch in der Prüfung. Das ist aktuell die Basis für die
  Brigade Litauen, speziell auf die Zonenstufe in Litauen bezogen. Es betrifft ja
  auch andere Bereiche. Herr Giese, nur um sicherzugehen: Erwägt die Bundesregierung
  dementsprechend jetzt keine Klage gegen diese Firma, die mutmaßlich den Fehler gemacht
  hat? Ich habe ja schon gesagt, dass wir prüfen, ob es eine Regressmöglichkeit gibt.
  Herr Müller, laut dem litauischen Verteidigungsminister liegt der Aufbau der Brigade
  deutlich vor dem Zeitplan. Teilen Sie diese Einschätzung? Erst einmal: Auch ich
  bin völlig zufrieden, dass wir vonseiten des litauischen Partners dieses Feedback
  bekommen. Es gibt immer mehrere Aspekte. Der litauische Verteidigungsminister hat
  natürlich auch seinen Aspekt im Blick. Die „host nation“, die Gastgebernation, ist
  für den Aufbau der Infrastruktur zuständig, für Truppenübungsplätze, Zufahrten,
  Kasernengelände. Es ist gut, zu hören, dass wir diese Entwicklung haben. Der Minister
  hat sich gestern auch dazu geäußert, dass wir Ende 2027, also Ende nächsten Jahres,
  eine einsatzbereite und voll ausgestattete Brigade in Litauen haben werden, und
  dazu werden alle Partner ihr Bestes geben. Vom Personal haben wir gerade gesprochen;
  im Bereich Technik sind neue Leopard-2-Panzer im Zulauf, und wir haben die „loitering
  munition“ jetzt speziell auf die Brigade Litauen zugeschnitten. Im Bereich Drohnenabwehr
  gibt es ganz spezielle Pakete, die für Litauen zugeschnitten werden. All das hat
  das Ziel, dass wir, sobald die Infrastruktur steht, die Verbände, die wir derzeit
  in Deutschland aufstellen ‑ es geht ja nicht nur um die Brigade, die aktuell mit
  2000 Mann dort ist, sondern auch um zwei Bataillone plus weitere Einheiten, die
  wir jetzt sozusagen mit den Freiwilligen befüllen ‑, im zweiten Halbjahr 2027 nach
  Litauen verlegen. Insofern teilen wir diese Einschätzung und unterstützen sie vollends.
  Wie sieht es denn mittlerweile mit der Rückmeldung von den Soldatinnen und Soldaten
  aus? Sieht die genauso aus? Ich glaube, Sie beziehen sich jetzt auf die erste Frage
  von Frau Kollegin. ‑ Natürlich wird es immer Einzelaspekte, Individualaspekte geben,
  die man sich dann noch einmal anschauen muss. Aktuell sind 500 fest vor Ort stationiert;
  der Rest ist ja Teil der rotierenden „Multinational Brigade“ ‑ das, was früher einmal
  EFP, also die Enhanced Forward Presence war; ist jetzt ja integriert. Diese fest
  Stationierten fühlen sich nach meiner Kenntnis vor Ort sehr wohl, weil die Rahmenbedingungen,
  wie ich es angesprochen habe, wirklich gut sind. Der andere Anteil sind, wie gesagt,
  die rotierenden Elemente. Das wurde bewusst rotierend gelassen, damit die Erkenntnisse,
  die wir in Litauen gewonnen haben, immer wieder auch vor Ort weitergegeben werden.
  Diese Rotation funktioniert seit inzwischen über zehn Jahren sehr gut. An das Auswärtige
  Amt und gegebenenfalls auch an das BMI: Ein Kollege vom NDR hat berichtet, dass
  sechs weitere Taliban-Diplomaten bzw. Konsularbeamte nach Deutschland kommen dürfen,
  um weitere Abschiebungen zu ermöglichen. Trifft das zu und wenn ja, warum war das
  nötig? Ich kann vielleicht gerne anfangen, und dann kann das BMI vielleicht noch
  ergänzen. Die Berichterstattung am Wochenende haben Sie zur Kenntnis genommen. Wie
  Sie wissen, führen wir seit geraumer Zeit technische Gespräche mit den De-facto-Machthabern
  in Afghanistan. Das Ziel der Bundesregierung ist dabei ganz klar, nämlich die Abschiebemöglichkeiten
  nach Afghanistan zu verbessern und Straftäter dorthin zurückzubringen. Dafür ist
  es erforderlich, dass hier die entsprechenden Vorbereitungen durchgeführt werden.
  In der vergangenen Woche fanden Gespräche statt, die zum Ergebnis hatten ‑ das ist
  dann eher eine Materie des BMI ‑, dass die Anzahl der Rückführungen deutlich erhöht
  werden kann. Das ist ein erfreuliches Ergebnis. Dafür müssen natürlich die Voraussetzungen
  geschaffen werden: Für mehr Rückführungen müssen mehr Pässe ausgestellt werden,
  es müssen mehr Identitäten geprüft werden etc., wie Sie sich vorstellen können.
  Dazu wird es auch erforderlich sein, dass hier mehr Konsularbeamte daran mitarbeiten,
  genau das zu ermöglichen, was die Bundesregierung zum Ziel hat. Die Zahl, die Sie
  genannt haben, kann ich nicht bestätigen. Das wird eine niedrigere Anzahl sein.
  Es ist kolportiert worden, es seien sechs Personen. Es werden aber nicht mehr als
  vier Personen sein. Ich kann das, was der Kollege gesagt hat, eigentlich nur vollumfänglich
  unterstreichen. Wir haben im Koalitionsvertrag festgeschrieben bzw. vereinbart,
  dass Rückführungen nach Afghanistan stattfinden werden, und das sind jetzt die Schritte,
  die dafür eingeleitet werden. Herr Giese, können Sie sagen, in welchem Zeitraum
  diese vier zusätzlichen Konsularbeamten nach Deutschland kommen? Oder sind die vielleicht
  schon da? Nein, die sind noch nicht da. Die werden in der nächsten Zeit kommen ‑
  ich würde mich jetzt nicht auf einen Zeitraum festlegen wollen ‑, gerade um diese
  Ziele auch umzusetzen. Wie gesagt, das ist eine Angelegenheit, die die Bundesregierung
  mit großem Nachdruck betreibt. Das ist ein Ziel, das wir uns gemeinsam gesetzt haben,
  und insofern ist es in unserem Interesse, dass diese Steigerung auch schnell beginnt.
  Um das aber noch einmal ganz klar zu sagen: Vor jeder Einreise steht natürlich eine
  Visumsprüfung, und die werden wir sehr genau durchführen, so wie wir das immer machen,
  auch mit Blick auf die öffentliche Sicherheit und Ordnung. Wir werden uns diese
  Leute also natürlich ganz genau anschauen. An Frau Singer: In der Berichterstattung
  wirkte es so, als ob jetzt eine sehr große Zahl von Rückführungen stattfinde. Können
  Sie uns eine ungefähre Größenordnung geben? Wie viele Afghanen, die ausreisepflichtig
  sind und die Sie jetzt schnell zurückbringen möchten, gibt es in Deutschland überhaupt?
  Eine konkrete Zahl kann ich Ihnen dazu nicht nennen. Wie Sie wissen, sind die Länder
  für die Abschiebungen zuständig, und wir als Bund unterstützen da. Wir beginnen
  ja mit Straftätern und Gefährdern, und wenn diese Personen identifiziert sind und
  vollziehbar ausreisepflichtig sind, dann werden diese Personen zurückgeführt. Sie
  müssen mir ja keine genaue Zahl nennen, aber vielleicht können Sie eine Größenordnung
  nennen? Da kann ich Ihnen leider keine Größenordnung geben. Wir hatten die Möglichkeit
  von drei Charterflügen pro Monat genannt. Sie können Sie sich vielleicht selbst
  überlegen, wie viele Personen in so ein Charterflugzeug passen. Geht es in der Planung
  immer noch nur um Straftäter oder auch um Personen aus Afghanistan, die ausreisepflichtig,
  aber keine Straftäter sind? Ich kann da nur noch einmal auf den Koalitionsvertrag
  verweisen. Darin steht, dass die Rückführungen nach Afghanistan stattfinden werden,
  beginnend mit Straftätern und Gefährdern. Sie hatten jetzt auf die Größe der Charter
  verwiesen. In der Vergangenheit war das durchaus sehr unterschiedlich, wenn ich
  mich richtig erinnere ‑ mal 80, mal rund 20. Sind wir jetzt eher bei einer Chartergröße
  von 20 oder von 80? Ich kann Ihr Interesse verstehen, ich kann Ihnen dazu aber keine
  genauere Auskunft geben. Herr Kornelius, können Sie sagen, wann das Treffen der
  Sozialpartner im Kanzleramt mit Herrn Frei heute Nachmittag beginnt? Können Sie
  ein bisschen umreißen, ob es da heute um ein spezifischeres Thema oder nur noch
  einmal um einen allgemeinen Fahrplan geht? Oder will man sich dort auf Einzelthemen
  konzentrieren? Können Sie uns da eine Idee geben? Dieses Treffen, das am frühen
  Nachmittag beginnt, wird sich mit der Nacharbeit des Sozialpartnertreffens, das
  bereits stattgefunden hat ‑ wie Sie wissen, fand das Haupttreffen vor, ich glaube,
  zwei Wochen statt ‑ befassen. Es gibt für das heutige Treffen eine Tagesordnung,
  die sich an die Gespräche von vor zwei Wochen anlehnt. Ich kann Ihnen keine speziellen
  Punkte nennen. Es ist auch ein internes Treffen. Es wird eine Nacharbeit sein. Insofern
  werden wir auch keine Ergebnisse kommunizieren können. Ist schon klar, ob es in
  den wenigen Wochen bis zur Sommerpause ein Nachfolgetreffen geben wird? Ist es vielleicht
  nicht nur ein Nachfolgetreffen, sondern möglicherweise auch ein Vorbereitungstreffen
  für das, was morgen kommen soll? Ich frage deswegen, weil die Reaktion der Sozialpartner ‑
  sowohl von einzelnen Wirtschaftsverbänden als auf von Gewerkschaften ‑ auf die schon
  bekannt gewordenen Vorschläge der Rentenkommission durchaus sehr kritisch waren.
  Wird auch das heute Nachmittag ein Thema sein? Das kann ich nicht ausschließen.
  Das ist aber nicht das zentrale Thema. Wir warten den morgigen Bericht der Rentenkommission
  ab und haben die vielfältigen Äußerungen dazu zur Kenntnis genommen. Gleichzeitig
  gibt es aber noch viele andere Themen, die die Sozialpartner betreffen und die sie
  wahrscheinlich besprechen werden. Würden Sie an die Sozialpartner appellieren, dass
  man mit der Reaktion auf die morgen offiziell vorgestellten Vorschläge zur Rentenreform
  etwas zurückhaltender sein sollte? Wir appellieren gar nicht. Ich glaube, jeder
  ist sich seiner Verantwortung in dieser Debatte bewusst. Das wird eine bedeutende
  Reform werden. Ich vermute, dass die Bundesregierung zu den Letzten gehört, die
  sich äußern. Wir halten uns an die verabredeten Zeiten und Spielregeln, und das
  bedeutet, dass wir morgen den Bericht entgegennehmen und anschließend ein Urteil
