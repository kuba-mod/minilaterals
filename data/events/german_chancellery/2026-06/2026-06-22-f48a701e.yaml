  Frage mehr hatten, das ist wahr. Das würde ich nicht gegeneinander aufrechnen; denn
  das Kindergartenalter haben wir verlassen. Deshalb möchte ich jetzt, dass Sie zur
  Kenntnis nehmen, Wenn Sie nur bei einer Person intervenieren und das bei anderen
  durchlassen, finde ich das problematisch! dass ich dieses Frageverhalten wahrgenommen
  habe und jetzt, da wir nur noch fünf Minuten Zeit haben, sage, dass Herr Kollege
  mit einem neuen Thema an der Reihe ist. Herr Kornelius, was ist Ihre Antwort auf
  die Kritik der kommunalen Spitzenverbände , die hier im Saal vor knapp einer Stunde
  geäußert wurde? Die Bundesregierung ist sich sehr bewusst, dass die finanziellen
  Herausforderungen für die Kommunen momentan gewaltig sind. Sie wissen, dass das
  kommunale Finanzdefizit 2025 bei 31,9 Milliarden Euro liegt. Es ist aber auch so,
  dass momentan Verhandlungen zwischen Bund und Ländern laufen. Sie wissen, dass eine
  Ministerpräsidentenkonferenz bevorsteht. Wir alle haben das Interesse, zu einer
  fairen Finanzverteilung zwischen Bund, Ländern und Gemeinden zu kommen. Die Zuständigkeit
  für die auskömmliche Finanzierung der Kommunen liegt, wie Sie auch wissen, bei den
  Ländern. Ich möchte, ohne der Diskussion am Donnerstag vorzugreifen, sagen, dass
  dort auch die Finanzzusammenarbeit im Mittelpunkt stehen wird. Das betrifft natürlich
  die Frage der Veranlassungskonnexität und den effiziente Ressourceneinsatz bei den
  Leistungsgesetzen. Das ist das Schlüsselwort, das in den Verhandlungen jetzt ganz
  an der Spitze steht. Wir werden am Donnerstag nach der Ministerpräsidentenkonferenz
  sicherlich über mögliche Ergebnisse berichten können. Unter anderem wurden die nicht
  funktionierenden Kommunikationskanäle ins Kanzleramt kritisiert. Sehen Sie an der
  Stelle Handlungsbedarf? Ich kann diese Kritik nicht verstehen und denke, dass Bund
  und Länder in einem sehr intensiven Austausch stehen. Die Finanzinteressen der Kommunen
  werden von den Ländern wahrgenommen. Möglicherweise gilt diese Kritik der Kommunikationsbeziehung
  zu den Ländern. Meine Frage geht an das Bundesfinanzministerium. Es geht um das
  Erbschafts- und Schenkungssteuergesetz . Arbeiten Sie an einer Reform? Hintergrund
  ist die aktuelle Zahlenlage. Bayern ‑ das wird ja auf Landesebene umgesetzt ‑ hat
  im vergangenen Jahr fast 2,4 Milliarden Euro an Steuern, die bei Schenkungen fällig
  gewesen wären ‑ das sind drei Viertel des veranschlagten Steueraufkommens ‑, erlassen,
  und zwar aufgrund von Bedürftigkeit der Beschenkten. Die Schenkungssteuer fällt
  erst bei Vermögen ab 26 Millionen Euro an. Da fällt es schwer, sich Bedürftigkeit
  vorzustellen. Wie geht die Bundesregierung mit dieser Problematik um? Zu diesen
  Fragestellungen hat sich der Bundesfinanzminister beim Tag der offenen Tür geäußert.
  Er sieht dabei Aufholbedarf und hat sich mit Blick auf die Erbschaftsteuer und auch
  mit Blick auf die Vermögensteuer geäußert. Von daher würde ich Sie dazu auf die
  Aussagen des Bundesfinanzministers verweisen. Es geht jetzt aber weder um Erbschafts-
  noch Vermögenssteuer, sondern um Schenkungssteuer. Das ist ja ein eigener Sachverhalt.
  Deswegen bitte ich um eine Auskunft oder auch Nachlieferung hier. Von fachkundigen
  Experten, die das beobachten, wird festgestellt, dass Menschen mit großem Vermögen
  ihr Vermögen rechtzeitig, bevor ein Erbfall eintritt, verschenken und dann eben
  von der Verschonungsregelung Gebrauch machen. Das ist faktisch ein Umgehungstatbestand.
  Wie reagiert der Bundesfinanzminister darauf? Will er die Regeln so gestalten, dass
  eine solche Umgehung nicht mehr möglich ist? Erbschaft- und Schenkungsteuerrecht
  sind gemeinsam in einem Gesetz geregelt. Das heißt, eine eventuelle Änderung würde
  gemeinsam vorgenommen werden. Ganz grundsätzlich kann ich Ihnen sagen, dass wir
  erst einmal das Bundesverfassungsgerichtsurteil abwarten. Wir erwarten eine Entscheidung
  noch in diesem Jahr. Deshalb würde ich jetzt noch um etwas Geduld bitten. Ich habe
  eine Frage zu KNDS . Wissen wir schon, wie viel Deutschland für die Anteile zu bezahlen
  bereit wäre? Wissen wir im Allgemeinen mehr über die Beträge? Wir machen zu dem
  avisierten Kaufpreis keine konkreten Angaben. Der Kaufpreis wird sich am Börsenwert
  bzw. am Firmenwert orientieren. Das wird sich im Laufe des Abwicklungsprozesses
  herausstellen. Korrekt? ‑ Das Wirtschaftsministerium geht d’accord. Die Frage stand
  im Raum, wie die Bundestagsabgeordneten zu Jemen informiert wurden. Ich kann noch
  ergänzen: Die Fraktionen wurden informiert. Das kann ich bestätigen. Die Ausschüsse
  als solche wurden mit dem Thema bislang nicht befasst. Können Sie ein Datum oder
  ein Jahr nennen?'
