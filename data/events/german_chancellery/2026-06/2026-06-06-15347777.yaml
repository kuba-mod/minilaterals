title: Tag der Bundeswehr Bundeswehr öffnete ihre Tore für Besucher
text: 'Beim Tag der Bundeswehr demonstrierten Soldatinnen und Soldaten, wie hier in
  Eckernförde, ihren Arbeitsbereich. Einmal im Jahr öffnet die Truppe ihre Tore und
  lädt Bürgerinnen und Bürger ein, einen exklusiven Blick hinter den Kasernenzaun
  zu werfen – unter dem zentralen Motto: „Wir sind da.“ Am 6. Juni 2026 konnten sich
  Besucher ein eigenes Bild von der Truppe machen, mit Soldatinnen und Soldaten ins
  Gespräch kommen und dabei Technik und Gerät erleben. Bundeskanzler Friedrich Merz
  kam nach Rostock auf das Gelände des Fliegerhorst Laage und richtete ein Grußwort
  an die Soldatinnen und Soldaten sowie an das Publikum. Verteidigungsminister Boris
  Pistorius besuchte die Universität der Bundeswehr München und das Dienstleistungszentrum
  München in Neubiberg. Nach der feierlichen Leutnantsbeförderung schaute sich Pistorius
  verschiedene Stationen an und beantwortete Fragen von Besucherinnen und Besuchern.
  Bundeskanzler Friedrich Merz war beim Tag der Bundeswehr zu Gast beim Luftwaffenstützpunkt
  Rostock-Laage. Vor Ort kam er nicht nur mit Soldatinnen und Soldaten, sondern auch
  mit Besucherinnen und Besuchern ins Gespräch. Der Bundesminister der Verteidigung,
  Boris Pistorius, war zu Gast bei einem Beförderungsappell an der Bundeswehr-Universität
  in München. Hier ließ er sich auch Technik und Gerät demonstrieren. Neben Fragen
  stand er auch für das eine oder andere Foto zur Verfügung. Bundeskanzler Friedrich
  Merz war beim Tag der Bundeswehr zu Gast beim Luftwaffenstützpunkt Rostock-Laage.
  Vor Ort kam er nicht nur mit Soldatinnen und Soldaten, sondern auch mit Besucherinnen
  und Besuchern ins Gespräch. Der Bundesminister der Verteidigung, Boris Pistorius,
  war zu Gast bei einem Beförderungsappell an der Bundeswehr-Universität in München.
  Hier ließ er sich auch Technik und Gerät demonstrieren. Neben Fragen stand er auch
  für das eine oder andere Foto zur Verfügung. Außerdem besuchte Pistorius den Standort
  des Kommandos Sanitätsdienstliche Einsatzunterstützung in Weißenfels. Vor der Kulisse
  von Schloss Neu-Augustusburg war die große Bandbreite des Sanitätsdienstes der Bundeswehr
  erlebbar. Zudem präsentierten sich Fähigkeiten des Heeres, der Luftwaffe, der Marine
  und des Cyber - und Informationsraums. Das ganztägige Programm richtete sich an
  alle Generationen. Neben Informationsangeboten sorgten musikalische Beiträge, Mitmachaktionen
  und gastronomische Angebote für einen abwechslungsreichen Besuch. Die Karriereberater
  der Bundeswehr waren ebenfalls vor Ort und informierten über die vielfältigen militärischen
  und zivilen Berufswege der Bundeswehr. Der Tag der Bundeswehr fand bundesweit an
  zehn verschiedenen Standorten statt. 2015 hat die Bundeswehr den Tag erstmalig durchgeführt.'
