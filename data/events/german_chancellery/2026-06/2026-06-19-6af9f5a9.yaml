title: Bundesregierung aktuell
text: 'wenn Sie am Wochenende in Berlin sind – oder einen guten Anlass suchen, in
  die Hauptstadt zu kommen – dann lade ich Sie herzlich ein: Die Bundesregierung öffnet
  ihre Türen. Am Samstag und Sonntag bieten das Bundeskanzleramt, die Ministerien
  und auch das Bundespresseamt Einblicke in ihre Arbeit. Wenn Sie also schon immer
  mal hinter die Kulissen des politischen Betriebs schauen wollten, dann kommen Sie
  vorbei. Der Bundeskanzler sowie Ministerinnen und Minister werden vor Ort sein und
  freuen sich darauf, mit Ihnen ins Gespräch zu kommen. Ein persönliches Highlight
  ist für mich die Pressekonferenz mit Kindern und Jugendlichen am Samstag. Schon
  im vergangenen Jahr haben mich die Fragen der Nachwuchsreporterinnen und -reporter
  beeindruckt. Warum: Die Kinder haben einen unverstellten Blick und sind von ehrlicher
  Neugier getrieben. Manchmal wünschte ich, Sie könnten häufiger im Maschinenraum
  dabei sein. Die vergangene Woche hätte sich jedenfalls gelohnt. Die kleine Europatour
  des Bundeskanzlers ging vom französischen É vian nach Brüssel – von Format zu Format,
  wie es in der Kulissen-Sprache so schön heißt. Format eins bildete die Gruppe der
  Sieben, G7 genannt – ein diesmal besonders erfreuliches Treffen. In den großen Themen
  der Zeit – Frieden und Sicherheit, wirtschaftliche Stärke und fairer Handel – gab
  es ermutigende Signale. In Évian-les-Bains am Genfer Sees haben die Franzosen eine
  Bilderbuchkulisse für ihr Treffen der Staatenlenker gefunden. Aber ehrlich gesagt:
  Bis auf das erste Abendessen in einem Holzpavillon auf der Wiese hoch über dem blaugrünen
  Wasser haben die Präsidenten und Regierungschefs wenig Zeit für Beschaulichkeiten.
  Der streng durchgetaktete Zeitplan treibt sie von den Verhandlungssälen in die kleinen,
  für bilaterale Gespräche hergerichteten Kammern und von dort in die Delegationsbüros
  mit ihren Besprechungsecken, ehe es wieder zurück in den Saal geht. Die Badehose
  braucht da niemand auszupacken. Der genius loci schien dennoch Harmonie zu garantieren.
  Erstmals seit dem Amtsantritt von Präsident Trump gelang eine gemeinsame Gipfelerklärung
  zu außen- und sicherheitspolitischen Fragen. Neue Sanktionen gegen den russischen
  Energiesektor sollen den Druck auf Moskau erhöhen. Der Bundeskanzler sprach von
  einem „Tag der Hoffnung“. Diese Hoffnung wurde genährt von der amerikanischen und
  der iranischen Erklärung zur Beendigung der Kämpfe. Sollte die Straße von Hormus
  geöffnet, das Atomprogramm eingestellt und die Angriffe der iranischen Proxis in
  der Region beendet werden, dann wäre das ein bedeutender Moment für die Region.
  Für uns Deutsche verbindet sich mit diesem Abkommen vor allem die Hoffnung auf ökonomische
  Stabilität und niedrigere Energiepreise. Zurück zu den Gipfeln der Woche. Format
  zwei ist denkbar groß: die Versammlung der Präsidenten und Regierungschefs der Europäischen
  Union. Auch das Ratstreffen bietet die Chance zu wichtigen Klärungsprozessen wie
  etwa zum Haushalt der Union. Aus deutscher Perspektive sind die Vorstellungen mancher
  europäischer Partner überzogen. Bis zu den finalen Verhandlungen – hoffentlich Ende
  des Jahres – wird sich noch viel bewegen müssen. Aber eigentlich ist es immer ein
  kleines Wunder, wie sich 27 selbstbewusste Staaten am Ende zum Wohl der großen gemeinsamen
  Idee zusammenraufen. Bei all diesen großen weltbewegenden Themen bleibt eines entscheidend:
  das Gespräch. Wer zuhört, versteht besser, und wer Fragen stellt, zwingt zu gedanklicher
  Klarheit und zu Antworten. Genau dafür öffnen wir als Bundesregierung an diesem
  Wochenende unsere Türen. Ich freue mich auf den Austausch – und auf Ihren Besuch.
  Im Rahmen des Deutsch-Polnischen Forums sind Kulturgüter an Polen zurückgegeben
  worden, die während der deutschen Besatzung im Zweiten Weltkrieg entzogen oder verlagert
  wurden. Es handelt sich um ein mittelalterliches Fragment der Hymne „Gaude Mater
  Polonia“, um Eisenbahnminiaturen und Zubehör aus dem Verkehrsmuseum Warschau und
  den Jagiellonen-Ring aus dem Schmuckmuseum Pforzheim. Die Rückgaben sind Ausdruck
  der deutschen Verantwortung gegenüber Polen. Wir freuen uns über Ihr Feedback: Nutzen
  Sie bitte dafür das Kontaktformular (nicht die Antwortfunktion auf diese E-Mail).'
