  Wir werden auch weiterhin dafür sorgen, dass die Energieversorgungssicherheit in
  Deutschland gewährleistet bleibt. Ja, diese Abläufe sind ja noch geläufig. Die Frage
  ist natürlich, ob das, was sich jetzt mindestens als Verdacht herausstellt, nämlich
  dass es sich um eine gezielte russische Intervention gehandelt habe, seinerzeit
  auch schon ein Verdacht der Bundesregierung gewesen ist. Eine solche Bewertung vorzunehmen,
  spielte jetzt aus meiner Sicht ein bisschen zu stark in die Ermittlungen hinein.
  Es war damals erforderlich, die Treuhandverwaltung einzurichten, um die Energieversorgungssicherheit
  zu gewährleisten, und das ist das, wobei ich es dann belassen würde. Ich habe eine
  Frage an das Landwirtschaftsministerium. Der Bauernverband hat gestern die Forderung
  erhoben, den Tankrabatt auf Diesel bis nach der Erntesaison zu verlängern. Ist das
  eine Forderung, die Herr Rainer annimmt und in das Kabinett trägt, oder ist er beim
  Finanzminister und dem Kanzler, die den Tankrabatt auslaufen lassen wollen? Danke
  für die Frage. - Ich will vorher noch einmal kurz sagen: Heute startet in Freiburg
  der Bauerntag. Das ist für die Branche eine sehr wichtige Veranstaltung. Vielleicht
  kann ich das noch einmal kurz einordnen: Wer sich heute dafür entscheidet, Landwirt
  bzw. Landwirtin zu werden, der entscheidet sich nicht für den einfachsten Weg, der
  übernimmt eine enorme Verantwortung, nämlich die Verantwortung dafür, uns tagtäglich
  zu ernähren. Das ist eine Verantwortung, die Rückendeckung braucht. Unser Ziel ist,
  dass die Höfe eine Zukunft haben. Starke, wettbewerbsfähige Höfe sind das Fundament
  unserer Versorgung und ein zentraler Baustein, auch, was die strategische Unabhängigkeit
  Europas angeht. Mit diesem Mindset geht der Minister in den Bauerntag und freut
  sich auf die dortigen Gespräche. Zum Tankrabatt kann ich mangels Zuständigkeit des
  BMLEH keine weiteren Auskünfte geben. Da gilt das, was hier von dieser Stelle aus
  schon gesagt wurde.'
