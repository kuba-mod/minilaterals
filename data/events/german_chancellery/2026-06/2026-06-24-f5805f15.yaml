date: '2026-06-24'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 24. Juni 2026
text: 'stellvertretender Regierungssprecher Meyer (Vorsitzende Küfner eröffnet die
  Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der Ministerien.)
  Heute Morgen hat das Kabinett getagt und einige Beschlüsse gefasst. Über zwei der
  Beschlüsse möchte ich Sie gern kurz informieren. Das Kabinett hat den Gesetzentwurf
  zur Beschleunigung der Umsetzung der Energieeffizienzrichtlinie beschlossen. Die
  Bundesregierung führt damit die Vorgaben des Energieeffizienzgesetzes weitgehend
  auf EU-Recht zurück. Zudem werden bisher noch nicht in nationales Recht umgesetzte
  Teile der EU-Energieeffizienzrichtlinie umgesetzt. Wir verhindern damit weitgehend
  eine Übererfüllung von EU-Vorgaben, das sogenannte Gold-Plating, und erreichen eine
  erhebliche Entlastung der Wirtschaft. Die Anforderungen für Unternehmen beim Einrichten
  von Energie- und Umweltmanagementsystemen werden angepasst. Die Verpflichtungen
  im Bereich der Abwärme werden entbürokratisiert. Für viele gerade kleine und mittlere
  Unternehmen entfallen zahlreiche Berichtspflichten. Wir entlasten auch konkret im
  Bereich der Rechenzentren. So werden die Energieeffizienzvorschriften für bestehende
  Rechenzentren praxisgerechter ausgestaltet, wie in der Rechenzentrumsstrategie vorgesehen.
  Für neue Rechenzentren wird die Übergangsfrist für das Erreichen der Effizienzwerte
  von zwei Jahren auf vier Jahre verlängert. Auch die Nutzung von erneuerbaren Energien
  wird praxisgerechter ausgestaltet. Nunmehr müssen Rechenzentren ab 2030 bilanziell
  vollständig auf erneuerbare Energien setzen. Wir schaffen damit konkrete Erleichterungen
  auch für Investitionen in Rechenzentren in Deutschland. Die erreichte Entlastungswirkung
  lässt sich beziffern. Durch das Gesetz sparen Unternehmen jährlich rund 760 Millionen
  Euro und einmalig 2,9 Milliarden Euro an Erfüllungsaufwand ein. Der Gesetzentwurf
  soll insgesamt zu mehr Energieeffizienz führen und leistet damit einen wirksamen
  Beitrag zum Erreichen der Klimaschutzziele. Dies erreichen wir unter anderem durch
  die Verankerung des Grundsatzes „Energieeffizienz an erster Stelle“ für größere
  Investitionsentscheidungen oder durch jährliche Sparvorgaben beim Energieverbrauch
  öffentlicher Einrichtungen. Die Bundesregierung hat überdies die Einsetzung einer
  entwicklungspolitischen Nord-Süd-Kommission beschlossen . Damit geht ein weiteres
  Vorhaben aus dem Koalitionsvertrag in die Umsetzung. Frau Alabali Radovan und Herr
  Wadephul haben darüber heute im Nachgang der Kabinettssitzung bereits kurz informiert.
  Ziel ist es, zukunftsorientierte Empfehlungen zu erarbeiten, um die entwicklungspolitischen
  Beziehungen zu den Ländern des globalen Südens auszubauen und zu vertiefen. Die
  Kommission soll auch eine Schlüsselrolle bei der Erarbeitung gemeinsamer Lösungen
  für globale Herausforderungen der Entwicklungsagenda einnehmen. Die Agenda 2030
  der Vereinten Nationen spielt dort als internationales Referenzdokument eine zentrale
  Rolle. Auch zu einem Rahmenwerk für die Zeit nach 2030 soll die Kommission Empfehlungen
  erarbeiten. Die Kommission wird unabhängig arbeiten und mit Vertreterinnen und Vertretern
  aus Politik, Wissenschaft, Privatwirtschaft, Gewerkschaften, Zivilgesellschaft und
  internationalen Organisationen aus dem Globalen Süden und dem Globalen Norden besetzt
  sein. Die Kommission wird aus rund 20 Mitgliedern und zwei Co-Vorsitzenden, je eine
  Person aus dem Globalen Norden und dem Globalen Süden, bestehen. Als nächster Schritt
  werden zeitnah die Kommissionsmitglieder ausgewählt und bekannt gegeben. Es ist
  keine ganz neue Meldung, aber möchte es hier doch noch einmal betonen, weil wir
  sehr froh sind, dass wir zwei wirklich tolle Persönlichkeiten dafür gewinnen konnten:
  Den Vorsitz werden die ehemalige costa-ricanische Staatspräsidentin Laura Chinchilla
  und Bundeskanzler a. D. Olaf Scholz übernehmen. Ich habe eine Frage für Herrn Swistek.
  Es geht um die F126 , die auch für die Niederlande ganz interessant ist. Das Projekt
  wird jetzt erst einmal nicht weitergeführt . Das Ministerium hat bereits über zwei
  Milliarden Euro für dieses Projekt ausgegeben. Wie steht es um Rückforderung von
  Damen? Ich möchte mit einer generellen Einordnung beginnen. Wir haben heute Morgen
  um ungefähr 10.30 Uhr eine Pressemitteilung dazu herausgegeben. Das Bundesministerium
  der Verteidigung hat sich dazu entschlossen, das Projekt F126 zu beenden und jetzt
  eine Beauftragung von acht Fregatten der Klasse MEKO A-200 einzuleiten. Ursprünglich
  waren sechs Fregatten der Klasse F126 vorgesehen, aber aufgrund der erheblichen
  und gravierenden Verzögerungen im Projekt ‑ das waren Kostensteigerungen, aber auch
  Zeitverzögerungen und Risiken beim Wechsel des Generalunternehmers ‑ sind wir zu
  dieser Entscheidung gelangt. Wie Sie wissen, war ursprünglicher Generalauftragnehmer
  Damen Schelde Naval Shipbuilding. Dieses Unternehmen konnte die vertraglich vereinbarten
  Leistungen zeitlich und finanziell nicht mehr einhalten. Der Vertrag wurde von der
  vorherigen Regierung im Jahr 2020 geschlossen. Es war vereinbart, dass das erste
  Schiff bereits Mitte 2028 mit einer Anfangsbefähigung ausgeliefert wird und alle
  sechs Fregatten bis 2033 bei der Marine zur Verfügung stehen. Das Auftragsvolumen
  betrug insgesamt rund zehn Milliarden Euro. Aufgrund sich bereits im vergangenen
  Jahr abzeichnender gravierender Zeit- und Kostenverzögerungen haben wir im vergangenen
  Jahr den Wechsel des Generalunternehmers hin zu NVL prüfen lassen. Die Prüfung hat
  ergeben, dass das Gesamtvolumen bei dem Wechsel auf 15,2 Milliarden Euro anwachsen
  und es weiterhin zeitliche Verzögerungen geben würde. Das ergäbe zusammen mit den
  bereits erbrachten Leistungen bei Damen ‑ ich kürze das jetzt etwas ab ‑ ein Gesamtvolumen
  von 18,8 Milliarden Euro, vom Ursprungswert auf 18,8 Milliarden Euro. Hinzu kommt,
  dass angezeigt wurde, dass Damen auf einen Verzicht auf Schadensersatzansprüche
  bestanden habe. Das Ganze haben wir für rechtlich bedenklich gehalten. Jetzt laufen
  juristische Modalitäten, die das Ganze noch einmal prüfen. Warum ist es besonders
  wichtig, dass wir diese Fähigkeit ‑ es geht um die Fähigkeit der U-Boot-Jagd ‑ zeitnah
  bekommen? ‑ Die Fähigkeit zur U-Boot-Jagd ist eine wesentliche Aufgabe, die wir
  auch in der NATO angezeigt haben, die aber über die letzten Jahrzehnte teilweise
  vernachlässigt wurde, nicht nur hier in Deutschland, sondern in der NATO generell.
  Die Seeverbindungslinien in der Nordsee und der Ostsee, aber auch im Nordatlantik
  sind wichtig für unsere Versorgung und für unsere Sicherheit. Wir haben aktuell
  eine Bedrohung auch durch U-Boote und Unterwasserfähigkeiten, die es erforderlich
  macht, dass wir diese Fähigkeit aufbauen. Das haben wir angezeigt, und wir brauchen
  diese Fähigkeit zeitnah. Dementsprechend war es jetzt notwendig, dass dieser Schritt
  eingeleitet wird. Es ist jetzt schon das zweite Mal, dass ein großes Projekt im
  Bereich der Verteidigung scheitert. Vorher betraf es FCAS. Was kann Deutschland
  tun, damit das nächste große Projekt ein Erfolg wird? Auf Ihre Frage würde ich so
  antworten: Die Entscheidung ist getroffen worden, weil wir auch eine Verantwortung
  für unseren Haushalt, für das Geld und für unsere Bürger haben. Dementsprechend
  konnten wir nicht mehr weiter dabei zusehen, dass dieses Projekt zeitlich und finanziell
  aus dem Rahmen läuft. So ähnlich verhält es sich ja auch bei anderen Projekten.
  Können Sie aufschlüsseln, wie viel Geld für das Projekt bisher genau geflossen ist?
  Die Einzelheiten werden noch juristisch geprüft. Das kann ich Ihnen jetzt ad hoc
  nicht sagen. Ich hatte Ihnen aufgezeigt, wie hoch die Gesamtkosten waren. Bereits
  erbrachte Leistungen müssten einen Umfang von ungefähr 3,5 Milliarden Euro [ Anmerkung:
  siehe S.5/6, Zahl nicht bestätigt ] haben. Eben war schon die Rede von Schadensersatz.
  Wie sähe der Zeitplan dafür aus? Das liegt nicht in unseren Händen. Das wird durch
  die entsprechenden Fachstellen juristisch geprüft. Dazu kann ich Ihnen keine Auskunft
  geben. Rheinmetall hat erwartet, diesen Auftrag zu gewinnen. Das hat die Firma auch
  ihren Investoren gesagt und für diesen Auftrag Naval Vessels Lürssen gekauft. Hatte
  das BMVg Rheinmetall versprochen, dass Rheinmetall die F126 bauen werde, oder war
  die Firma zu selbstbewusst? Wir versprechen so etwas nicht. Es gibt Vertragsvereinbarungen,
  die irgendwann geschlossen werden, und vorher prüft man Projekte, so wie wir es
  getan haben. Dann sind wir zu Entscheidungen gekommen. Die Rheinmetall-Aktien sind
  gerade gesunken. Könnte das einen negativen Einfluss auf die KNDS-Aktien haben?
  KNDS hat heute angegeben, dass das Unternehmen an die Börse gehen werde. Für Fragen
  rund um Aktien, Wertpapiere und die Börse bin ich der falsche Ansprechpartner. Dazu
  kann ich keine Auskunft geben. Ich würde an dieser Stelle auch nicht über Aktienkurse
  und Entwicklung spekulieren wollen. Stimmt es, dass Damen formell gesehen immer
  noch Generalauftragnehmer war, obwohl bereits klar war, dass das Unternehmen nicht
  länger als Generalauftragnehmer fungieren würde? Bezüglich dieser rechtlichen Details
  habe ich jetzt keine Einblicke und kann jetzt auch nichts dazu sagen. Ich möchte
  noch einmal auf das eingehen, was die Kollegen schon gefragt haben. Bisher war die
  Rede davon, dass 2,3 Milliarden Euro in dieses Projekt geflossen seien. Sie würden
  diese Zahl jetzt auf 3,5 Milliarden Euro anheben. Dann möchte ich auf die erste
  Frage der Kollegin eingehen, die Sie ja nicht beantwortet haben. Sehen Sie da eine
  Möglichkeit? Bemühen Sie sich darum, die 2,3 Milliarden oder 3,5 Milliarden Euro
  zurückzubekommen, oder sind sie auf Nimmerwiedersehen versenkt? Die Differenz, die
  ich gerade aufgeführt hatte, war das Ergebnis meiner schnellen Kopfrechnung aufgrund
  dessen, was ich ausgeführt habe. Das würde ich so nicht wiederholen. Es sind Kosten
  im Milliardenbereich entstanden, und wir prüfen rechtlich, wie damit umgegangen
  wird, auch mit den Schadensersatzansprüchen. Wissen Sie also selbst noch nicht,
  wie viel Geld dabei ‑ ‑ ‑ Ich kann das jetzt nicht auf eine Kommastelle genau sagen,
  genau. Herr Swistek, können Sie sagen, was das aus militärischer Sicht für die Verteidigungsfähigkeit
  Deutschlands bedeutet? Dieses Projekt ist ja schon länger gelaufen, sechs Jahre
  oder so. Wenn ich mich richtig erinnere, dann hätten diese Fregatten schon in drei
  Jahren fertig und auslieferungsfähig sein sollen. Was heißt das jetzt für die Marine?
  Wie kann man diese Lücke füllen? Bei einem neuen Auftrag wird es ja mutmaßlich sehr
  viel länger dauern, bis die Schiffe fertig sein werden. Ich hatte vorhin bereits
  ausgeführt, dass die erste Auslieferung ursprünglich für 2028 vorgesehen war. Wir
  haben bereits vor mehreren Monaten die Prüfung einer Beschaffung der MEKO A-200
  eingeleitet, weil diese schneller verfügbar ist. Qualitativ sind das natürlich zwei
  Fregattentypen. Ich könnte jetzt ein bisschen länger im Detail dazu sprechen; das
  würde aber wahrscheinlich auch den Kollegen die Zeit ein bisschen rauben. Sie sind
  unterschiedlich gebaut. Die F126 war deutlich größer vorgesehen. Es war vorgesehen,
  dass sie aufwuchsfähig ist etc. Die MEKO A-200 ist etwas kleiner. Sie ist modular,
  kann aber auch wieder angepasst werden. Was beide haben, ist die U-Boot-Jagdfähigkeit.
  Die Entscheidung dazu wurde auch mit der Marine getroffen, weil die Marine am besten
  weiß, welche Fähigkeiten wie benötigt werden und was diese Schiffe leisten müssen.
  Das heißt, man hat die Marine in die Entscheidung mit einbezogen. Man hat nachgefragt,
  ob die MEKO das leisten kann, was wir der NATO angezeigt haben und was wir auch
  zeitnah brauchen. Das heißt aber, dass die Fähigkeit der Bundeswehr, U-Boot-Angriffe
  oder U-Boot-Spähaktionen abzuwehren, für die nächsten Jahre minimiert ist, richtig?
  Das würde ich so nicht sagen. Zum einen haben wir derzeit noch entsprechende Fähigkeiten
  in der Marine, und zum anderen laufen schon die Seefernaufklärer zu. Auch diese
  sind auf U-Boot-Jagd spezialisiert. Dabei handelt es sich um die P-8. Wir beüben
  sie und setzen sie auch schon ein. Darüber haben wir auch berichtet. Insbesondere
  im Nordatlantik, aber auch im Mittelmeer sind sie schon Übungen geflogen. Damit
  haben wir schon einmal eine Teilkomponente, eine Fähigkeit der U-Boot-Jagd. Sie
  wissen vielleicht aus unserer Berichterstattung, dass wir im Rahmen des NATO-Verteidigungsministertreffens
  vergangene Woche mit Norwegen und Großbritannien eine Absichtserklärung getroffen
  haben, dass wir es als in unserer Zuständigkeit stehend ansehen, die U-Boot-Jagd
  im Nordatlantik weiter zu stärken und gemeinsam zu stärken. Dafür brauchen wir diese
  Fähigkeiten. Können Sie uns einen Zeithorizont für die neuen Schiffe geben? Sie
  sagten, ursprünglich hätten alle bis 2033 ausgeliefert sein sollen. Wie ist die
  Planung jetzt? Ich schaue in meine Unterlagen. ‑ Aktuell habe ich keine Zeitlinie,
  die ich Ihnen nennen könnte. Wenn meine Kollegen dazu etwas zurückmelden, dann würde
  ich am Ende auf Sie zurückkommen und die Frage noch einmal aufnehmen. Sie haben
  dargelegt ‑ das ist aus Sicht Ihres Hauses auch verständlich ‑, was alles Tolles
  die MEKO kann. Was kann sie denn nicht so gut, wie es die F126 könnte? Ich habe
  ja ausgeführt: Sie wäre größer, aufwuchsfähig, hätte mehr Personal und hätte neue,
  zusätzliche Fähigkeiten aufnehmen können. Sie hätte statt einem Helikopter zwei
  Helikopter aufnehmen können. Wir haben das aber intensiv geprüft, und das ist für
  die Anforderungen, die wir leisten müssen, aktuell nicht notwendig. Viel wichtiger
  ist es, dass wir diese Fähigkeit zeitnah bekommen. Die Hauptfähigkeit U-Boot-Jagd ‑
  so habe ich das verstanden ‑ wäre damit möglich? So gesehen: War die F126 dann nicht
  ohnehin eine Art Holzweg, wenn man für das gleiche Geld mehr an anderen Schiffen,
  die Ähnliches können, bekommt? Müssten Sie insofern nicht darüber glücklich sein,
  dass das jetzt gestoppt wurde? Ihre Interpretation mache ich mir jetzt nicht zu
  eigen. Die F126 war, wie ich gerade ausgeführt habe, ursprünglich für Aufwuchsfähigkeit
  vorgesehen. Wenn ich Schiffe einsetze, möchte ich hin und wieder vielleicht auch
  Spezialfähigkeiten ‑ Drohnen etc. ‑ oder Stäbe an Bord mitnehmen. Da hat man eben
  Flexibilität. Diese Flexibilität ist damit etwas reduziert. Trotzdem können die
  MEKO-Fregatten die Aufträge vollkommen erfüllen. Herr Swistek, können Sie vielleicht
  noch einmal die aktuelle Bedrohungslage durch U-Boote skizzieren, vielleicht auch
  mit Blick auf die Ostsee? Ich nehme an, es geht da vor allen Dingen um russische
  U-Boote. In der Tat ist die größte Bedrohungslage, die wir militärisch im Bereich
  Unterwasser wahrnehmen, durch russische U-Boote gegeben. Sie kennen auch die Berichterstattung:
  Es wird immer wieder berichtet, wie russische U-Boote im Nordatlantik agieren. Vor
  wenigen Wochen haben auch die Briten in ihrer ausschließlichen Wirtschaftszone russische
  U-Boote aufgespürt, detektiert und herausgeleitet. Trotz aller militärischer Einschränkungen,
  die Russland durch seinen in der Ukraine geführten Angriffskrieg verspürt, ist die
  maritime Dimension, zumindest bei den U-Booten, bisher nicht so stark betroffen.
  Ein Großteil dieser U-Boote, insbesondere der Anteil mit nuklearer Zweitschlagfähigkeit
  Russlands, ist in der Nordflotte beheimatet. Das heißt, wenn diese U-Boote in die
  weite Welt geschickt werden, kommen sie über den Atlantik, über den Nordatlantik.
  Wir wissen aus vielen Beobachtungen, dass diese U-Boote dann im Nordatlantik auch
  Übungen abhalten, bei denen unter anderem Europa als Ziel abgebildet wird. Noch
  eine Nachfrage: Auch bei der MEKO sieht es jetzt so aus, als ob sie teurer wird
  als ursprünglich veranschlagt. Sehen Sie es als ein strukturelles Problem, dass
  die Unternehmen erst einmal einen günstigeren Preis veranschlagen, der dann aber
  immer weiter steigt? Sehen Sie da irgendwelche Maßnahmen, die Sie ergreifen könnten,
  damit das nicht bei jedem neuen Projekt immer wieder so passiert? Es gibt eine Differenz
  zwischen der im Haushalt veranschlagten Summe und dem, was jetzt als verbindliches
  Angebot vorgelegt wurde. Das andere war eine industrielle Kostenschätzung, die noch
  nicht ein verbindliches Angebot war. Da gab es eine Kostensteigerung, die ‑ da müssten
  Sie sich aber an das Unternehmen wenden ‑ sicherlich auch mit der Inflation etc.
  zu begründen ist. Natürlich haben wir ‑ das ist aber nur ein ganz kleiner Anteil,
  der ungefähr fünf Prozent dieser Kostensteigerungen ausmacht ‑ auch noch Anpassungen
  an den Bedarfsforderungen vorgenommen, die wir gestellt haben, um das Spektrum der
  Fähigkeiten, die wir benötigen, besser abzubilden. Sie sehen es also nicht grundsätzlich
  als Problem, dass die Kosten immer wieder aus dem Ruder laufen? Herr Meyer, der
  ukrainische Präsident will nicht zur Wiederaufbaukonferenz in Danzig kommen. Wie
  bewertet das die Bundesregierung? Jetzt warten wir erst einmal ab, wie das am Ende
  entschieden wird. Ich kann auf jeden Fall sagen, dass der Bundeskanzler am morgigen
  Donnerstag dorthin reisen wird. Das ist ihm auch sehr wichtig, weil wir natürlich
  weiterhin klar machen wollen und es auch notwendig ist, dass wir bereits jetzt weiter
  am Wiederaufbau der Ukraine arbeiten, und diesem Thema für uns eine hohe politische
  Aufmerksamkeit zukommt. Insofern kann ich für den Bundeskanzler sagen, dass er mit
  großer Zuversicht zu diesem Termin reist. Hat die Absage irgendeinen sonstigen Einfluss
  auf das, was Deutschland auf der Konferenz einbringen wird? Was genau wird Deutschland
  eigentlich anbieten? Da würde ich in der Tat auf den Termin verweisen, dem ich an
  dieser Stelle nicht vorgreifen möchte. Dass Deutschland die Ukraine auf verschiedensten
  Ebenen ‑ militärisch, politisch, aber natürlich auch wirtschaftlich ‑ sehr stark
  unterstützt und übrigens auch politisch auf dem Weg in die Europäische Union unterstützt,
  ist, glaube ich, in den vergangenen Monaten und Jahren immer stärker deutlich geworden.
  Dementsprechend werden wir unser Engagement und unsere Unterstützung fortsetzen ‑
  nicht nur für die Ukraine, sondern auch für die europäischen Sicherheitsinteressen
  und sicherlich auch für die eine oder andere wirtschaftliche Frage im Zusammenhang
  mit der Ukraine. Ich habe eine Frage zu der Bahnpanne an das Bundesverkehrsministerium
  richtet: Offensichtlich hat der Ausfall einesKommunikationssystems ausgereicht,
  um den Verkehr flächendeckend lahmzulegen. Wie bewertet die Bundesregierung die
  Anfälligkeit des Bahnnetzes? Ich würde zuerst gerne allgemein darauf eingehen. Der
  Minister ist heute Nacht vom Lagezentrum über die umfangreichen Störungen bei der
  Bahn informiert worden. Es geht dabei um den Ausfall des digitalen Bahnfunks GSM-R.
  Der Minister möchte sich an dieser Stelle auch bei allen Reisenden für die Unannehmlichkeiten
  entschuldigen und bedauert die entstandenen Beeinträchtigungen, die so nicht auftreten
  sollten, sehr. Diesen Vorfall im Detail aufzuklären, ist jetzt Sache der Bahn. Hierbei
  geht es vor allem um die betrieblichen Abläufe, Fragen von Redundanz und vor allem
  das Thema Resilienz. Ich würde aber gerne einmal festhalten, dass hier alle betrieblichen
  Notfallprozesse der Bahn gegriffen haben, wie sie uns auch mitgeteilt hat. Das heißt,
  die Ursachenanalyse ist unmittelbar gestartet worden, und es gab ein Backupsystem,
  das dann die Aufgaben des Hauptsystems übernommen hat, sodass der Bahnbetrieb stufenweise
  wieder aufgenommen werden konnte. Die Bahn hat mitgeteilt, dass der planmäßige Austausch
  einer technischen Komponente ursächlich für die Störung des digitalen Bahnfunks
  gewesen ist. Wie es genau zu dieser Störung kam, muss jetzt natürlich die Bahn analysieren.
  Nichtsdestotrotz ‑ jetzt komme ich endlich zu Ihrer Frage ‑ ist das Thema Resilienz
  genau das Thema, das der Minister auf die Tagesordnung gesetzt hat. Das ist für
  uns ein sehr wichtiges Thema. Es geht darum, die Digitalisierung der Schiene weiter
  voranzutreiben. Ich habe ja davon gesprochen, dass aktuell noch das alte Bahnfunksystem
  in Betrieb ist, und wir wollen auf den neuen Digitalfunkstandard FRMCS ‑ Future
  Railway Mobile Communication System ‑ wechseln, der auf 5G-Basis funktioniert. Das
  ist der Standard, den wir sowohl bei der Infrastruktur als auch auf der Fahrzeugseite
  einführen wollen. Die Leistungsvereinbarung mit der DB InfraGO soll dies klären,
  und darüber werden dann auch die Mittel bereitgestellt. Genau das ist der wichtige
  Punkt: Wir geben bis 2029 insgesamt rund zehn Milliarden Euro für die Digitalisierung
  der Schiene aus. Das ist ein Kernthema, da müssen wir hinkommen. Das heißt, das
  sogenannte Future Railway Mobile Communication System, das auch Teil des European
  Rail Traffic Management ist, soll den auf 2G-Basis laufenden GSMR-Zugfunk, der jetzt
  betroffen war, ersetzen. Sie haben gesagt, dass die Bahn den Ausfall mit dem Austausch
  einer technischen Komponente begründet. Können Sie uns schon sagen, was das für
  die Sicherheit der Fahrgäste bedeutet hat? Hat diese Störung im laufenden Betrieb
  irgendwelche Auswirkungen für die Leute im Zug gehabt? Meiner Kenntnis nach und
  nach dem, was uns die Bahn mitgeteilt hat, nein. Diese Frage müssten Sie aber an
  die Bahn richten. Sabotage und Einfluss von außen schließen Sie definitiv aus? Das
  hat die Bahn meiner Kenntnis nach ausgeschlossen. Der Güterverkehr ist immer noch
  nicht richtig angelaufen. Es ist absehbar, dass ein immenser wirtschaftlicher Schaden
  entstanden ist. Wird sich die Bundesregierung daran beteiligen, diesen Schaden zu
  beheben? Es ist Aufgabe der Bahn, jetzt erst einmal dafür zu sorgen, dass der Betrieb
  wieder stabil läuft. Nach Angaben der Bahn ist der normale Zugverkehr heute Morgen
  wieder gut angelaufen, und heute Vormittag hätte der Güterverkehr auch anlaufen
  sollen. Dazu müssten Sie sich direkt an die Bahn wenden. Sieht die Bundesregierung
  oder sieht der Verkehrsminister sich denn nicht in der Verantwortung, den immensen
  Schaden, der da entstanden ist, irgendwie zu schmälern oder da Entschädigungen zu
  leisten? Der Minister hat sich heute Morgen schon sehr früh zu Wort gemeldet und
  hat auch eine umfassende Aufklärung seitens der Bahn gefordert. Man muss sich jetzt
  im Detail anschauen, wie es dazu kommen konnte, welche Auswirkungen das hat und
  wie man so etwas künftig verhindern kann. Ist der Minister denn mit dem Krisenmanagement
  und damit, wie das jetzt alles abgelaufen ist, zufrieden? Die Bahn hat sofort mit
  der Aufklärung begonnen. Dennoch ist natürlich festzuhalten, dass es 90 Minuten
  gedauert hat, bis das Problem behoben werden konnte. Im Rahmen der Aufklärung muss
