title: Im Kabinett beschlossen Weniger Bürokratie – mehr Energieeffizienz
text: 'Pragmatische Lösung für die Wirtschaft: Rechenzentren müssen nun ab 2030 bilanziell
  vollständig auf Erneuerbare Energien setzen – statt wie bisher ab 2027. In der EU
  gelten gemeinsame Regeln, um Energie zu sparen und sie effizient einzusetzen. Die
  entsprechende EU -Energieeffizienzrichtlinie ist seit Oktober 2023 in Kraft. Die
  Bundesregierung hat nun einen Gesetzentwurf vorgelegt, der die EU -Vorgaben möglichst
  bürokratiearm und praxisorientiert umsetzt. Die Bundesregierung will die Vorgaben
  des bestehenden Energieeffizienzgesetzes weitgehend auf EU -Recht zur ü ckführen.
  Das heißt: Um Bürokratie zurückzubauen, entfallen bestehende Verpflichtungen oder
  sie werden zielgerichtet angepasst, wenn sie ü ber die EU -Richtlinie hinausgehen.
  Die Bundesregierung verhindert damit weitgehend eine Ü bererf ü llung von EU -Vorgaben
  und entlastet die Wirtschaft erheblich. Unnötige Pflichten für Unternehmen, etwa
  zur Einführung von Energie- und Umweltmanagementsystemen sowie Berichtspflichten,
  sollen wegfallen. Verpflichtungen im Bereich der Abwärme werden entbürokratisiert.
  Durch das Gesetz sparen Unternehmen rund 760 Millionen Euro j ä hrlich und 2,9 Milliarden
  Euro einmalig an Erf ü llungsaufwand ein. Die Bundesregierung will zudem die Rahmenbedingungen
  für den Betrieb von Rechenzentren in Deutschland verbessern. Energieeffizienzvorschriften
  f ü r bestehende Rechenzentren sollen praxisgerechter ausgestaltet sein, wie in
  der Rechenzentrumsstrategie vorgesehen. Die Nutzung von Erneuerbaren Energien wird
  pragmatischer ausgestaltet: Nunmehr m ü ssen Rechenzentren ab 2030 bilanziell vollst
  ä ndig auf Erneuerbare Energien setzen statt wie bisher ab 2027. Das erleichtert
  Investitionen in Rechenzentren in Deutschland. Der Gesetzentwurf soll insgesamt
  zu mehr Energieeffizienz f ü hren – und leistet damit einen wirksamen Beitrag zum
  Erreichen der Klimaschutzziele. Das gelingt unter anderem durch die Verankerung
  des Grundsatzes „ Energieeffizienz an erster Stelle “ f ü r gr öß ere Investitionsentscheidungen
  oder durch j ä hrliche Sparvorgaben beim Energieverbrauch ö ffentlicher Einrichtungen.'
