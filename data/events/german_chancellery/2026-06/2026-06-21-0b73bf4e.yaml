title: 'Tag der offenen Tür: Ein großes Dankeschön an die vielen interessierten Besucherinnen
  und Besucher'
text: 'Mit den Auftritten des Bundeskanzlers und zahlreicher Regierungsmitglieder
  ist am Sonntag der Tag der offenen Tür der Bundesregierung zu Ende gegangen. Auch
  in diesem Jahr hat die Bundesregierung ihre Türen für interessierte Bürgerinnen
  und Bürger geöffnet und am Sonnabend und Sonntag ein vielfältiges Programm geboten.
  Dabei verzeichneten das Kanzleramt, die Bundesministerien und das Presse- und Informationsamt
  der Bundesregierung trotz großer Hitze und vereinzelter Unwetter insgesamt mehr
  als 80.000 Besuche. Auf großes Interesse bei den Gästen stieß erneut das Bundeskanzleramt.
  Bundeskanzler Friedrich Merz und Kanzleramtschef Thorsten Frei sprachen dort am
  Sonntag mit Bürgerinnen und Bürgern über ihre Regierungsarbeit. Ein weiteres Highlight:
  die Kinder- und Jugendpressekonferenz mit Regierungssprecher Stefan Kornelius im
  Presse- und Informationsamt der Bundesregierung. Das große Interesse bei den vielen
  Bürgerdialogen der Regierungsmitglieder zeigt: Gerade in diesen heraufordernden
  Zeiten ist der direkte und respektvolle Dialog besonders wichtig. Ein herzliches
  Dankeschön geht an alle Gäste, die sich am Wochenende die Zeit nahmen, bei der Bundesregierung
  vorbeizuschauen. Weitere Informationen finden Sie hier.'
