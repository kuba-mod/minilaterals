title: Im Kabinett beschlossen Deutschlands Stimme für die Welt
text: Die Bundesregierung würdigte auch die Rolle der DW in Ländern mit eingeschränkter
  Medienfreiheit. „Die Deutsche Welle ist Deutschlands mediale Botschafterin im Ausland.
  Sie trägt unsere Perspektiven auf universelle Werte wie Freiheit, Menschenrechte
  und Rechtsstaatlichkeit in die Welt“, erklärte der Staatsminister für Kultur und
  Medien, Wolfram Weimer, im Anschluss an die  Sitzung des Bundeskabinetts. Beschlossen
  wurde dort die Stellungnahme der Bundesregierung zur Aufgabenplanung der Deutschen
  Welle (DW) für den Zeitraum 2026 bis 2029. Die Deutsche Welle ist der Auslandssender
  Deutschlands. Sie wird fast ausschließlich aus dem Etat des Beauftragten der Bundesregierung
  für Kultur und Medien ( BKM ) finanziert. Für das Jahr 2026 beträgt der Zuschuss
  des Bundes rund 415 Millionen Euro. Allein im Zeitraum 2018 bis 2025 wurde der Zuschuss
  um nahezu 100 Millionen Euro erhöht. In ihrer Stellungnahme begrüßt die Bundesregierung
  den Fokus der DW auf Künstliche Intelligenz, technologische Modernisierung und journalistische
  Standards. Auch das Bekenntnis zur Bekämpfung von Antisemitismus wird hervorgehoben.
  Außerdem würdigt die Bundesregierung die Rolle der DW in Ländern mit eingeschränkter
  Medienfreiheit. Die Kerntätigkeit der DW sieht die Bundesregierung künftig stärker
  in der Versorgung eingeschränkter Informationsräume, die im deutschen und europäischen
  Interesse liegen, mit unabhängiger und verlässlicher Berichterstattung. Maßgeblich
  sei künftig nicht die größtmögliche globale Reichweite, sondern dass die DW mit
  ihrer Berichterstattung die freie Meinungsbildung im Ausland stärkt, Desinformation
  durch autokratische Akteure entgegenwirkt und so mittelbar auch zur Stärkung europäischer
  Resilienz beiträgt. „Zudem wird sie ihre eigene Krisenreaktionsfähigkeit so ausbilden
  müssen, dass sie auch ohne den stetigen Mittelaufwuchs der vergangenen Jahre flexibel
  auf veränderte Informationsbedarfe reagieren kann“, so Staatsminister Weimer. Angesichts
  der angespannten Haushaltslage müsse auch die DW ihre Mittel künftig effizienter
  einsetzen. Diese Priorisierung sei in erster Linie Angelegenheit des Senders, werde
  sich aber auch in der Reform des Deutsche-Welle-Gesetzes widerspiegeln, so Weimer.
  Ein Entwurf zur Weiterentwicklung des Gesetzes wird derzeit durch BKM erarbeitet.
  Ziel ist es, den gesetzlichen Auftrag der DW an die veränderten geopolitischen,
  technologischen und medienpolitischen Rahmenbedingungen zeitgemäß anzupassen und
  somit zu ihrer Stärkung beizutragen. Weshalb nimmt die Bundesregierung Stellung
  zur Aufgabenplanung der DW ? So sieht es das Deutsche-Welle-Gesetz vor. Alle vier
  Jahre erstellt die DW eine Aufgabenplanung mit Programmzielen und Schwerpunkte.
  Im Rahmen des gesetzlich vorgesehenen Beteiligungsverfahrens wird der Entwurf anschließend
  an die Bundesregierung übermittelt, die innerhalb von sechs Wochen Stellung zu den
  inhaltlichen Schwerpunkten nimmt. Die endgültige Entscheidung über die Aufgabenplanung
  trifft jedoch die DW unter Einbeziehung ihrer Gremien.
