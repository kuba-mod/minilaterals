title: 'Einweihung des Mahnmals für die im Nationalsozialismus verfolgten und ermordeten
  Zeugen Jehovas – Staatsminister Weimer: „Wir schließen eine Lücke in unserer Erinnerungskultur.“'
text: 'Gemeinsam mit der Präsidentin des Deutschen Bundestages, Julia Klöckner, hat
  der Staatsminister für Kultur und Medien, Wolfram Weimer, heute im Berliner Tiergarten
  das Mahnmal für die im Nationalsozialismus verfolgten und ermordeten Zeugen Jehovas
  der Öffentlichkeit übergeben. Bei der feierlichen Einweihung waren neben dem Künstler
  Matthias Leeck auch zahlreiche Angehörige der Opfergruppe und etwa 700 Gäste anwesend.
  Staatsminister Weimer sagte im Vorfeld: „Mit diesem Mahnmal erhält eine lange Zeit
  weniger bekannte Opfergruppe des Nationalsozialismus einen sichtbaren Ort des Erinnerns
  und Gedenkens. Damit setzen wir ein Zeichen für religiöse Toleranz und erinnern
  an Menschen, die sich in den 1930er Jahren - mit als Erste - dem totalitären Anspruch
  der Nationalsozialisten widersetzt haben. Menschen, die für ihren Glauben und ihre
  Überzeugung gelitten haben, die verfolgt und gejagt wurden, die Folter und Konzentrationslager
  erlitten, die umgebracht wurden.“ Das Mahnmal erinnert an die Zeugen Jehovas, die
  ab 1933 in Deutschland und ab 1938 im nationalsozialistisch beherrschten Europa
  systematisch verfolgt wurden. Die Nationalsozialisten inhaftierten über 15.500 Frauen
  und Männer; 4.200 in Konzentrationslagern, wo sie den „lila Winkel“ tragen mussten.
  Mindestens 1.750 Zeugen Jehovas verloren ihr Leben. 282 von ihnen wurden wegen Kriegsdienstverweigerung
  hingerichtet. Die Diskriminierung der Zeugen Jehovas setzte sich auch in der DDR
  fort, die die Religionsgemeinschaft 1950 verbot. Die Errichtung des Mahnmals geht
  auf den Beschluss des Deutschen Bundestages vom 22. Juni 2023 zurück. Der Beauftragte
  der Bundesregierung für Kultur und Medien finanzierte das Vorhaben. Die Umsetzung
  übernahm die Stiftung Denkmal für die ermordeten Juden Europas. Der Künstler Matthias
  Leeck hat für den Gedenkort eine Bronzeskulptur in der Form eines Baums entworfen.
  Staatsminister Weimer sagte: „Erinnerungskultur hat die Aufgabe, Verfolgungs- und
  Opfergeschichten sichtbar zu machen. Das Mahnmal schließt eine Lücke in unserer
  Erinnerungskultur und stärkt das Bewusstsein für die Gefahren der Intoleranz, Ausgrenzung
  und staatlicher Willkür.“ Im Anschluss an die Einweihungszeremonie traf Staatsminister
  Weimer Jugendliche, die im Rahmen des Projektes „Gedächtnis der Namenlosen“ eine
  stetig wachsende Datenbank mit Biographien verfolgter Zeugen Jehovas erarbeitet
  haben. Diese Daten bilden die Grundlage für eine interaktive Karte zu den Orten
  des Widerstandes und der Verfolgung. Historische Dokumente und Fotos sowie Videoclips,
  die während der Arbeit der Jugendlichen entstanden, werden die biographischen Informationen
  auf der interaktiven Karte ergänzen. Das Projekt ist Teil des Programms „JUGEND
  erinnert vor Ort & engagiert“, das vom Beauftragten der Bundesregierung für Kultur
  und Medien und der Stiftung EVZ gefördert.'
