title: Bundeskanzler Merz gratuliert der Ministerpräsidentin des Königreichs Dänemark,
  Mette Frederiksen
text: Sehr geehrte Frau Ministerpräsidentin, zu Ihrer erneuten Ernennung übermittle
  ich Ihnen meine herzlichen Glückwünsche. Ich freue mich darauf, gemeinsam mit Ihnen
  die sehr gute Zusammenarbeit zwischen Deutschland und Dänemark weiter zu vertiefen.
  Für die vor Ihnen liegenden verantwortungsvollen Aufgaben wünsche ich Ihnen gutes
  Gelingen, viel Erfolg und eine glückliche Hand. Mit freundlichen Grüßen Friedrich
  Merz Bundeskanzler der Bundesrepublik Deutschland
