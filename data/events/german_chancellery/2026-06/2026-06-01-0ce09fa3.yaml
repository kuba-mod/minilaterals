date: '2026-06-01'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 1. Juni 2026
text: '(Vorsitzende Küfner eröffnet die Pressekonferenz und begrüßt StS Kornelius
  sowie die Sprecherinnen und Sprecher der Ministerien.) Einen schönen guten Morgen.
  Ich dachte, ich beginne die Woche einmal mit einer freudvollen Nachricht, denn das
  Bundesumweltministerium feiert Geburtstag. Wir werden diese Woche 40 Jahre alt.
  Zu diesem Jubiläum wird Bundesumweltminister Carsten Schneider morgen eine Festveranstaltung
  eröffnen. Auslöser für die Gründung des BMU am 6. Juni 1986 war die Reaktorkatastrophe
  von Tschernobyl. Heute feiert das BMUKN zu seinem Jubiläum das Engagement der vielen
  naturverbundenen Menschen in Deutschland, die sich Tag für Tag für unsere Umwelt,
  unsere Natur und unser Klima eingesetzt haben und weiterhin einsetzen. Zu den Gästen:
  Bundeskanzlerin a. D. Angela Merkel hält die Festrede zur vier Jahrzehnten Umweltpolitik
  in Deutschland. Unter den Gästen sind außerdem die ehemaligen Bundesministerinnen
  und ‑minister Steffi Lemke, Svenja Schulze, Barbara Hendricks, Peter Altmaier und
  Jürgen Trittin. Ihre Perspektiven ergänzen im Programm aus der Zivilgesellschaft
  Luisa Neubauer von Fridays for Future, Michael Vassiliadis von der Industriegewerkschaft
  Bergbau, Chemie, Energie, Wolfgang Ehmke von der Bürgerinitiative Lüchow-Dannenberg,
  Franziska Tanneberger vom Greifswald Moor Centrum und Milena Glimbovski von Original
  Unverpackt. Tschernobyl war ja nicht nur der Anlass für die Gründung des Ministeriums,
  sondern ist weiterhin eine andauernde Problembaustelle. Wird das im Festakt in irgendeiner
  Weise eine Rolle spielen? Gibt es besondere Monitoring- oder Forderungskataloge
  in Bezug auf die nach wie vor vor sich hin strahlende Reaktorruine in der Ukraine?
  Natürlich wird auch dieses Thema bei den Feierlichkeiten eine Rolle spielen. Es
  gibt verschiedene Panels, bei denen die verschiedenen Phasen des Bundesumweltministeriums
  diskutiert werden. Insofern wird es dort auch eine Rolle spielen. Darüber hinaus
  haben wir, glaube ich, an verschiedenen anderen Stellen schon deutlich gemacht,
  wie wir unsere Expertise vor Ort in Tschernobyl einbringen, und entsprechende Forderungen
  bei der IAEA platziert. Es ist insofern nichts Neues, was wir mit dem Jubiläum verbinden,
  sondern es sind weiterhin laufende Prozesse. Frau Jenning, Ihr Gesetz zur Stärkung
  der Reserve trifft auf Kritik aus der Wirtschaft. Arbeitgeberpräsident Dulger sagt,
  dass sich das bisherige Modell der doppelten Freiwilligkeit bewährt habe, um die
  Interessen zwischen Bundeswehr und Wirtschaft auszugleichen. Wie reagieren Sie als
  BMVg auf diese Kritik? Sie wissen, dass die veränderte Sicherheitslage einen ganz
  deutlichen Aufwuchs der Bundeswehr verlangt, und zwar sowohl qualitativ als auch
  quantitativ. Wir haben an dieser Stelle auch immer betont, dass das eben nicht nur
  die aktive Truppe betrifft, sondern insbesondere auch die Reserve, denn unsere Reservistinnen
  und Reservisten leisten sowohl im Frieden als auch im Grundbetrieb und im Einsatz
  einen wertvollen Beitrag. Sie übernehmen Schlüsselaufgaben auf Augenhöhe der aktiven
  Truppe. Das sei dazu vorangeschickt, warum es so wichtig ist, dass wir die Reserve
  in all diesen Punkten entsprechend mitdenken. Deswegen ist es für uns besonders
  wichtig, dass sie gut ausgebildet sind und insbesondere ihre Qualifikation halten
  und auch weiterbilden können. Deswegen ist es unser Anspruch, dass die Reservistinnen
  und Reservisten regelmäßig und verlässlich aktiven Dienst leisten. Das ist ein ganz
  wesentlicher Baustein in dem Reservestärkungsgesetz, das Sie ansprechen. Genau an
  dieser Stelle muss ich hervorheben, dass wir uns noch in einer ganz frühen Phase
  dieses Gesetzgebungsverfahrens befinden. Sie wissen, dass es jetzt den Referentenentwurf
  gibt. Dieser ist auch öffentlich einsehbar. Sie können ihn auf unserer Internetseite
  einsehen. Natürlich ist es jetzt Teil des Prozesses, den wir ausdrücklich wünschen,
  dass wir jetzt in den Austausch gehen und dabei natürlich auch die Verbände, insbesondere
  die Arbeitgeberverbände, mitnehmen und uns mit ihnen austauschen. Sie kennen auch
  den Satz, dass kein Gesetzentwurf am Ende so aus dem parlamentarischen Verfahren
  herauskommt, wie er hineingegangen ist. Das ist jetzt einfach Teil dieser Diskussion.
  Sehen Sie mir insofern nach, dass ich auf die einzelnen Argumente jetzt nicht eingehe,
  sondern hier nur sagen kann, was für uns wichtig ist. Dabei ist es eben so, dass
  die sicherheitspolitischen Anforderungen einfach verlangen, dass wir von dieser
  sogenannten doppelten Freiwilligkeit Abstand nehmen und es diesen verlässlichen
  und regelmäßigen Dienst gibt, damit alle am Ball bleiben. Ich habe noch eine Nachfrage,
  auch auf die Gefahr hin, dass Sie sagen, dass auch das zu den Details gehört, zu
  denen Sie noch nichts sagen wollen: Haben Sie nicht die Befürchtung, dass potenzielle
  Freiwillige durch diesen, wie Sie sagen, verlässlichen Dienst bzw. diese Verpflichtung
  schon von vornherein vom Wehrdienst abgeschreckt werden? Diese Befürchtung teile
  ich nicht, weil wir ja niemanden überraschen. Es geht auch hierbei darum, dass wir
  es nicht nur transparent diskutieren, sondern auch transparent regeln. So ist auch
  ganz klar, dass die Regelungen, die am Ende im Reservestärkungsgesetz stehen, mit
  in Kraft treten und erst dann entsprechend wirken. Auch das haben wir immer offen
  kommuniziert. Dass wir auf unsere Reservistinnen und Reservisten angewiesen sind,
  ist auch kein Geheimnis, das erst jetzt aufpoppt. Man kann es natürlich so negativ
  betrachten, wie es bei Ihnen jetzt ein bisschen herauskommt. Aber es gibt natürlich
  auch ganz viele positive Aspekte, weil wir nicht nur dafür sorgen, dass die Qualifikationen,
  die man bei uns von der Truppe bekommt, weiter ausgeprägt werden, sondern natürlich
  sind sie ein wichtiger Teil für uns. Das heißt, sie sind auf Augenhöhe Teil der
  Truppe. Es wird ja auch so sein, dass wir sie natürlich weiterbilden und die Reservistinnen
  und Reservisten mit Qualifikationen versehen. Auch der Aspekt, weiterhin Teil der
  Truppe zu sein und Kameradschaft zu erleben, ist durchaus positiv, sodass wir kein
  Abschreckungsmoment erkennen. Laut dem Gutachten der Wissenschaftlichen Dienste
  des Bundestages war die Allgemeinverfügung zur Aussetzung der Abmeldepflicht für
  wehrfähige Männer rechtswidrig. Sehen Sie diesbezüglich jetzt Handlungsbedarf? Das
  von Ihnen angesprochene Gutachten ist uns natürlich bekannt und liegt uns auch seit
  heute Vormittag vor. Sehen Sie mir deswegen nach, dass ich jetzt nicht auf das Gutachten
  als solches eingehe und es kommentiere. Ganz klar ist natürlich, dass wir es intern
  auswerten. Aber vielleicht ist die viel wichtigere Botschaft in diesem Zusammenhang,
  dass wir als BMVg hier bereits vorgesorgt haben. Denn in dem Referentenentwurf zum
  Reservestärkungsgesetz, der, wie gesagt, seit der vergangenen Woche auch online
  steht, haben wir bereits eine entsprechende Änderung am Wehrpflichtgesetz aufgenommen.
  Das heißt, die Regelung zu Auslandsaufenthalten nach § 3 Wehrpflichtgesetz, um das
  es hier geht, wird darin dann ausdrücklich auf den Spannungs- und Verteidigungsfall
  beschränkt. Damit nutzen wir jetzt den schnellstmöglichen Weg, um im Rahmen dieses
  Gesetzgebungsverfahrens für weitere Rechtssicherheit zu sorgen und auch mögliche
  Unklarheiten auszuräumen. Die Allgemeinverfügung, die Sie eben ansprachen, gilt
  für diesen Übergangszeitraum, bis das Reservestärkungsgesetz in Kraft tritt. Insofern
  ist für Sie und alle Interessierten vielleicht das ganz Entscheidende, dass sich
  an der Sache nichts ändert und auch weiterhin keine Genehmigung für Auslandsaufenthalte
  eingeholt werden muss. (zur Kritik am Entwurf eines Gesetz zur Stärkung der Reserve
  ) Nun ist mit diesem Reservistenthema auch Herr Dulger vom Arbeitgeberverband in
  der Presse gewesen und hat gesagt, man solle es abwägen, da die Wirtschaft natürlich
  auch an Arbeitskräften festhalten möchte. Was ist denn die grundsätzliche Linie
  der Bundesregierung in dieser Sache, auch beim Wehrdienst? Was hat Vorrang, Kriegstauglichkeit
  herzustellen, oder der Fachkräftemangel bzw. die Wirtschaft am Laufen zu halten?
  Von unserer Seite aus bzw. aus meiner fachlichen Zuständigkeit haben wir gesagt,
  dass es uns genau darauf ankommt, dass wir es abwägen. Die einzelnen Kriterien kann
  ich Ihnen hier nicht aufzeigen. Für uns ist natürlich ganz wichtig, dass wir einen
  Einklang finden. Auch das ist uns wichtig. Das Gesetz sieht auch vor, dass wir natürlich
  auch Arbeitgeber anhören. Es geht ja gar nicht darum, sie sozusagen auszuklammern.
  Das heißt, weder jetzt im Prozess, in dem es um die Detailformulierung geht, noch
  im Nachhinein, wenn das Reservestärkungsgesetz in Kraft getreten ist, soll es über
  ihre Köpfe hinweggehen. Es wird beispielsweise weiterhin die Möglichkeit geben,
  Anträge auf Zurückstellung oder Ähnliches zu stellen, wenn klar ist, dass ein Arbeitnehmer
  völlig unabkömmlich ist. Auch diese Dinge werden darin enthalten sein. Nichtsdestoweniger
  ist für uns entscheidend ‑ das ist quasi das Interesse, hinter dem auch ich als
  Sprecherin hier stehe ‑, dass wir eine verlässliche Reserve aufbauen und auch dafür
  sorgen, dass sie am Ball bleibt, wie ich es eben gesagt habe. Meine Frage richtet
  sich an das BMF. Herr Harmsen, laut internen Zahlen der Deutschen Rentenversicherung
  Bund könnte die gesetzliche Rente teurer werden als bislang geplant und der Beitragssatz
  bereits 2028 auf 19,9 Prozent steigen. Wie ordnen Sie das ein? Gibt es Bedarf nachzusteuern?
  Ich würde das von hier aus jetzt erst einmal nicht kommentieren. Sie wissen, dass
  wir an der Aufstellung des Bundeshaushalts für 2027 arbeiten. Sie wissen, dass wir
  in der Regierung insgesamt an verschiedenen Reformen arbeiten. Solange diese Prozesse
  noch laufen, würde ich jetzt auch einzelne Zahlen oder Kommentare oder Äußerungen
  von außen nicht einordnen und auch nicht kommentieren. Herr Kornelius, auch ich
  wollte Sie noch nach diesem Reservestärkungsgesetz fragen. Auf den BDA-Einwand ist
  ja eingegangen worden. Die Bundesregierung, gerade der Kanzler, hatte ja eigentlich
  den Anspruch, dass die Unternehmen nun auch von bürokratischen Lasten entlastet
  werden. Ist das jetzt nicht wieder eine zusätzliche Aufgabe, die auf die Unternehmen
  zurollt? Was ist die Position des Kanzlers? Ich glaube, dabei muss man differenzieren.
  Es gibt nötige Maßnahmen, die wahrscheinlich auch ein Stück weit mit bürokratischem
  Aufwand einhergehen. Dazu gehören das Reservestärkungsgesetz und überhaupt der Aufbau
  einer Reserve. Aber auch das lässt sich mit modernen Mitteln schlank gestalten.
  Das wird jetzt ausgestaltet. Der Kanzler beobachtet den Gesetzgebungsprozess. Ansonsten
  schließe ich mich den Kommentaren der Kollegin an. Dann würden Sie in der Abwägung,
  was wichtiger ist, sagen, dass der Aufbau der Reserve jetzt erst einmal Vorrang
  hat, richtig? Die Interessen müssen gehört werden. Dabei muss ein Ausgleich geschaffen
  werden. Man muss es bürokratiearm und sozusagen handhabbar gestalten. Die Einwände
  werden gehört. Dazu ist jetzt der richtige Zeitpunkt. Das wird dann eben im Verfahren
  hoffentlich einvernehmlich geklärt. (zum Gutachten der Wissenschaftlichen Dienste
  des Bundestages zur Aussetzung der Genehmigungspflicht nach Wehrpflichtgesetz )
  Noch einmal zurück zu diesem Gutachten der Wissenschaftlichen Dienste, nur damit
  ich es richtig verstehe: Klar ist, dass das Problem mit der Verwaltungsvorschrift
  im Reservestärkungsgesetz geheilt werden soll. Dennoch ist es ja so, dass in der
  Zwischenzeit ein zumindest juristisch kritikwürdiger Zustand besteht. Sieht man
  denn in der Zwischenzeit, bis das Reservestärkungsgesetz verabschiedet ist, die
  Notwendigkeit zu handeln? Ich habe ja eingangs erwähnt, dass ich um Nachsicht bitte,
  dass ich hier innerhalb von wenigen Stunden keine juristische Auswertung mit Ihnen
  machen kann, was dieses mehrere Seiten umfassende Gutachten betrifft. Deswegen gibt
  es den Hinweis, dass wir das nicht nur zur Kenntnis nehmen, sondern in unserem Haus
  auch entsprechend auswerten werden. Allerdings ist festzuhalten, dass es unser Ziel
  und unser Anspruch ist, eine bürokratiearme Handhabung zu ermöglichen. Sie wissen,
  dass § 3 Wehrpflichtgesetz, so wie er jetzt im Gesetz steht, zum einen nicht bußgeldbewehrt
  ist und zum anderen ja quasi nahelegt, dass diese Genehmigung jedem zu erteilen
  ist, weil die anderen Voraussetzungen dafür einfach nicht vorliegen. Insofern ist
  die Allgemeinverfügung, so wie sie jetzt im Raum steht und in Kraft ist, eine begünstigende
  Regelung, die keinerlei Rechtsunsicherheit schafft, sondern vielmehr deutlich macht,
  dass selbstverständlich jeder frei reisen kann, sodass ich mit dem Kenntnisstand,
  den ich jetzt habe, sage: Damit können wir genau diese Zeit überbrücken, weil wir
  eben keine Rechtsunsicherheit schaffen. ‑ Es ist ja auch im Gesetz selbst grundsätzlich
  festgelegt, dass der Exekutive, nämlich uns als Haus, die Möglichkeit eingeräumt
  wurde, für Ausnahmen zu sorgen, sodass wir zum jetzigen Stand davon ausgehen, dass
  wir diesen Zeitraum mit dieser Allgemeinverfügung überbrücken können. Auch noch
  zu dem Gutachten: Dabei werden Ihrem Ministerium ja grobe handwerkliche Fehler unterstellt,
  nicht nur die Illegalität an sich. Wer übernimmt dafür Verantwortung? Ich habe ja
  gerade gesagt, dass wir das jetzt auswerten werden. Auch das kennen Sie. Ich darf
  einmal auf einen allgemeinen Spruch verweisen: Wenn Sie drei Juristen fragen, dann
  haben Sie fünf Meinungen. ‑ Insofern sind in dem Gutachten natürlich diese Punkte
  enthalten. Wir werden sie auswerten. Aber Sie sehen mir nach, dass ich hier jetzt
  nicht irgendwelche Schuldzuweisungen oder Ähnliches vornehme, sondern das werden
  wir jetzt prüfen. Dann wird sich zeigen, ob diesbezüglich über das, was wir jetzt
  eingereicht haben, hinaus noch weiterer Handlungsbedarf besteht. Aber irgendjemand
  wird dafür verantwortlich gewesen sein. Dementsprechend ist die Frage: Muss dafür
  dann auch Verantwortung übernommen werden, weil ja offensichtlich ist, dass das
  illegal war? Dass es offensichtlich illegal gewesen sei ‑ das sage ich hier ganz
  ausdrücklich ‑ mache ich mir nicht ‑ ‑ zu eigen. Ich habe gerade mehrfach betont,
  dass ich das Gutachten als solches hier jetzt nicht bewerten werde und dass ich
  hier auch nicht die Rechtsmeinung des Hauses wiedergeben werde und kann, weil uns,
  wie gesagt, das Rechtsgutachten jetzt seit wenigen Stunden vorliegt. Insofern habe
  ich meinen Ausführungen nichts hinzuzufügen. Frau Jenning, damit machen Sie es sich
  meiner Meinung nach ein bisschen zu leicht, weil das BMVg aus dem Kreise des Bundestages
  bereits kurz nach Erscheinen der Allgemeinverfügung darauf hingewiesen wurde, dass
  es in der Allgemeinverfügung eventuell Rechtsfehler gebe. Dabei hat das BMVg das
  mit einer Drei-Sätze-Antwort relativ lapidar abgetan. Daher ist die Frage des Kollegen
  schon berechtigt. Warum ist man also nicht frühzeitiger auf diese Bedenken eingegangen?
  Wer übernimmt dafür letztlich die Verantwortung? Auch da muss ich Sie enttäuschen.
  Es wird bei meiner Antwort bleiben. Ich werde jetzt hier keine Verantwortungszuweisung
  vornehmen, sondern es bleibt dabei, dass wir uns mit der Argumentation, die jetzt
  auch die Wissenschaftlichen Dienste entsprechend aufbereitet haben, auseinandersetzen
  werden. Das wird bei uns juristisch intensiv geprüft. Wenn sich daraus noch weiterer
  Handlungsbedarf ergibt, dann werden wir auch nachziehen. Jetzt haben Sie die Frage
  aber nicht beantwortet. Warum sind Sie damals nicht auf die Einwände eingegangen,
  die es aus dem Bundestag gab? Sie haben am 15. April eine schriftliche Frage aus
  dem Bereich der Linksfraktion bekommen. Darin wurde genau auf diese Rechtsunsicherheit
  und auf die möglichen Probleme hingewiesen. Darauf wurde nicht reagiert. Warum nicht?
  Sie wissen, dass wir es hier nie so handhaben, dass ich jetzt bezüglich der internen
  Bewertungsprozesse reagiere, die bei uns im Haus stattgefunden haben. Die ganz allgemeine
  Einschätzung, wie sie sozusagen im Moment ist, habe ich auf die Frage des Kollegen
  hin eben kundgetan: Es handelt sich um eine begünstigende Regelung, und es ging
  uns darum, bürokratiearm vor allen Dingen auch für die jungen Männer Rechtssicherheit
  zu schaffen, damit sie bedenkenlos reisen können. ‑ Inwiefern die Bewertungsprozesse
  intern gelaufen sind ‑ das sehen Sie mir nach ‑, kann und werde ich hier im Detail
  nicht skizzieren. Stimmen Sie zu, dass strukturell Ihr Ministerium für etwaige Rechtsfehler
  in einer Verordnung Verantwortung trägt? Das ist jetzt tatsächlich sehr pauschal.
  Dem stimme ich so pauschal nicht zu. Auch dabei gilt ‑ ich muss mich jetzt wiederholen ‑,
  dass wir uns jetzt in dieser Prüfung befinden und die Argumente, die hierzu entsprechend
  geteilt sind, natürlich auch aufnehmen werden. Ganz allgemein ist natürlich auch
  festzuhalten ‑ das wissen Sie auch; das hat jetzt nichts mit Rechtfertigung zu tun ‑,
  dass das Gesetz auch durch ein parlamentarisches Verfahren gegangen ist. Auch das
  haben wir hier schon häufig betont. Uns war dann daran gelegen ‑ das hat auch der
  Minister sehr deutlich gemacht ‑, dass wir für die breite Bevölkerung Rechtssicherheit
  schaffen. Inwiefern Sie daraus jetzt allgemeine strukturelle Dinge herleiten wollen,
  dazu kann ich mich hier nicht einlassen. Warum ist es Ihnen nicht möglich, zu erklären,
  ob ein Ministerium im Grundsatz Verantwortung für die Rechtstreue oder auch Rechtsfehlerhaftigkeit
  von Verordnungen und Verfügungen des Hauses trägt? Sie formulieren Ihre Frage natürlich
  allgemein. Aber es ist ja auch klar, dass es nicht auf Allgemeinheit abzielt, sondern
  eben auf diese Norm. Im Übrigen möchte ich hier noch einmal betonen, dass wir entsprechend
  reagiert haben, und zwar völlig unabhängig von einem Gutachten des Wissenschaftlichen
  Dienstes des Bundestages. In dem Referentenentwurf, den Sie einsehen können, ist
  genau diese Regelung angepackt worden. Wir ziehen hier die Legislative mit ein und
  würden diese Änderung auch an dieser Stelle herbeiführen. Insofern kann und will
  ich mir hier nicht zu eigen machen, sondern zurückweisen, dass wir uns zurückgelehnt
  und das gar nicht mehr angefasst hätten, sondern wir haben hier entsprechend vorgesorgt.
  Noch eine Lernfrage: Wer ist für das Inkraftsetzen oder Außerkraftsetzen von Verwaltungsvorschriften
  im BMVg zuständig? Auch da haben wir natürlich einen Ablauf. Ich weiß nicht, was
  Sie jetzt von mir erhoffen. Sie hoffen jetzt wahrscheinlich, dass ich hier einzelne
  Namen oder Ähnliches sage. Das werde ich natürlich nicht machen. Das war ein interner
  Prozess ‑ der Gesamtentscheidungsprozess war sozusagen intern ‑, dass wir diese
  Allgemeinverfügungen in Kraft gesetzt haben, um hier entsprechend für Rechtssicherheit
  zu sorgen. Sie hätten uns gar keine Namen geben müssen. Sie haben ja ein Organigramm,
  aus dem klar ersichtlich sein wird, wer für Verwaltungsvorschriften zuständig ist.
  Ich stelle fest, dass Sie das hier nicht beantworten können oder wollen. Es ist
  einfach so, dass die Allgemeinverfügung so in Kraft getreten ist, um die Rechtssicherheit
  zu machen. Ich kann mich jetzt hier wiederholen; das führt uns alle nicht weiter.
  Sie werden von mir weder eine Abteilung noch einen Namen hören, sondern das ist
  eine Hausentscheidung gewesen. Wie die intern zustande gekommen ist, dazu äußern
  wir uns hier grundsätzlich nicht. Frau Jenning, dann will ich noch einmal von der
  Allgemeinverfügung und dem Gutachten weggehen. Hat das BMVg vielleicht die Wirkung
  dieses Paragraphen 3 Absatz 2 unterschätzt, dass diese Genehmigungspflicht so eine
  Welle schlagen wird? Die gab es ja schon, die gab es ja schon im alten Wehrpflichtgesetz
  und wurde jetzt durch das Wehrdienstmodernisierungsgesetz reaktiviert. Also hat
  man einfach diese Wirkung ein bisschen unterschätzt? Nein, wir haben keine Wirkung
  unterschätzt. Der Minister hat ja auch sofort betont, dass für uns ganz entscheidend
  ist, dass wir in der sicherheitspolitischen Lage, in der wir uns gerade befinden,
  die Reise uneingeschränkt möglich ist. So haben wir auch den Absatz ausgelegt, dass
  die Exekutive hier die Möglichkeit hat, Ausnahmeregelungen zu treffen. Das haben
  wir getan und somit für Rechtssicherheit gesorgt. Aber auch erst nach Monaten, nachdem
  das Gesetz wieder in Kraft getreten ist. Dazwischen ist ja eine lange Zeit vergangen.
  Bis zu dem Zeitpunkt, an dem das Reservistengesetz geändert wird, wird auch wieder
  eine sehr lange Zeit vergehen. Wie konnte es also dazu kommen, dass man das nicht
  von Anfang an besser geregelt hat? Das hätte man ja auch schon im Gesetzgebungsprozess
  selbst regeln können, der ja bereits Ende letzten Jahres abgeschlossen war. Da ich
  vermute, wo Sie mich hintreiben wollen, gebe ich Ihnen den Satz, den Sie unbedingt
  haben wollen: Die Regelung, wie sie jetzt im Wehrpflichtgesetz steht, war sicherlich
  ein Fehler bzw. eine Ungenauigkeit. Wir sind dem sofort nachgekommen, indem wir
  mit der schnellsten Möglichkeit, nämlich einer solchen Allgemeinverfügung, für Rechtssicherheit
  gesorgt haben. Wenn wir nun diesen Weg des parlamentarischen Gesetzgebungsverfahrens
  gehen müssen, um das auch über die Legislative entsprechend klarzustellen, dann
  bleibt uns natürlich nur diese Möglichkeit, das in einem laufenden Gesetzgebungsverfahren
  einzubringen. Das machen wir jetzt mit dem Reservestärkungsgesetz, um da möglichst
  schnell für Klarstellung zu sorgen. Aber dass die Norm so drinstand, wie sie drinstand,
  ist, wenn Sie es so wollen, ein Versehen. Es geht um den Monitoringbericht zum Sondervermögen
  . Die Bundesregierung hat ja in der Öffentlichkeit große Erwartungen geweckt, dass
  mit dem Sondervermögen schnell Defizite gebessert werden können. Jetzt wird deutlich,
  dass das alles längst nicht so schnell geht wie geplant. Wie blickt der Bundeskanzler
  auf diese Zahlen und welche Erwartungen hat er für das kommende, für dieses Jahr?
  Sie wissen, dass die Rekordinvestitionen im Sondervermögen für die Infrastruktur
  verwendet werden sollten. Die Bundesregierung hat mit dem ersten Monitoringbericht
  Gewissheit darüber gewonnen, dass die Wachstumsimpulse, die intendiert waren, auch
  eingetreten sind. Nach einer ersten Abschätzung dürfte das reale Bruttoinlandsprodukt
  um rund 0,5 Prozent höher ausfallen, als es ohne diese Ausgaben des Sondervermögens
  ausgefallen wäre. Jetzt sehen wir, dass die Investitionen zwar Wirkung entfalten,
  aber dass wir auch am Anfang der Gesamtlaufzeit dieses Sondervermögens von zwölf
  Jahren stehen. Der Bericht wird jetzt in seinen Details beobachtet werden müssen.
  Das wird das BMF auch im Detail tun. Wir werden dafür sorgen, dass auch im zweiten
  Halbjahr von 2026 die zusätzlichen Mittel bei Bürgerinnen und Bürgern ankommen.
