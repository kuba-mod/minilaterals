  die korrekten Zahlen nennen? Wie viel kostet die BAföG-Erhöhung in diesem Jahr und
  wie viel würde sie bis zum Ende der Legislaturperiode kosten? Denn es kursieren
  in der Tat Zahlen von 67 Millionen Euro in diesem Jahr bis zu einer Milliarde Euro
  bis zum Ende der Legislaturperiode. Den laufenden Abstimmungen kann ich hier grundsätzlich
  nicht vorgreifen. Es gilt, was ich zuvor gesagt habe. Aber wie kommen Sie dann darauf,
  dass die 67 Millionen Euro nicht stimmen? Ich habe meiner Aussage nichts hinzuzufügen.
  Zum Thema Libanon an Herrn Giese. Wie bewerten Sie die Ankündigung von Benjamin
  Netanjahu, wieder Luftangriffe auf Ziele im Raum Beirut durchzuführen? Der Außenminister
  hat sich dazu gestern geäußert und seine große Sorge zur Eskalation in Libanon gebracht.
  Ich werde es hier nicht in Gänze verlesen ‑ den Wortlaut können Sie auch online
  finden ‑, aber zusammenfassend hat er betont, dass alle Konfliktparteien dringend
  aufgefordert sind, die Kampfhandlung einzustellen und zum Waffenstillstand zurückzukehren.
  Er hat auch gesagt ‑ das möchte ich hier noch einmal unterstreichen ‑: „Wenn es
  aber Zivilistinnen und Zivilisten sind, die den Preis einer militärischen Eskalation
  zahlen und Teile des Libanon dauerhaft unbewohnbar werden, macht das Israels Nachbarschaft
  langfristig nicht sicherer. Bei seinem Vorgehen gegen die Hisbollah muss Israel
  Zivilistinnen und Zivilisten sowie zivile Infrastruktur schützen.“ ‑ Das gilt natürlich
  auch für den Raum Beirut. ‑ „Der Schlüssel zu einer Stabilisierung des Libanon liegt
  in einer Stärkung des libanesischen Staates“ Wichtig ist insbesondere natürlich
  auch eine Fortführung der direkten Gespräche, die zwischen Libanon und Israel in
  Washington stattfinden und für die die amerikanische Regierung auch sehr wirbt.
  Die Meldungen aus der letzten Nacht dazu haben Sie sicherlich auch gehört. An das
  BMZ: Die Entwicklungsministerin ist heute im Libanon . Inwiefern beeinflussen die
  aktuellen Entwicklungen ihre Reise? Es ist richtig, Ministerin Alabali Radovan ist
  jetzt zu Gesprächen im Libanon eingetroffen. Sie wird mit Regierungsvertreterinnen
  und ‑vertretern sprechen. Sie wird sich auch die Lage der Binnenvertriebenen, die
  natürlich durch die Kampfhandlung weiter verschärft wird, anschauen und mit unseren
  Partnern von den UN-Organisationen vor Ort ‑ UNDP, UNICEF ‑ weitere Unterstützung
  beraten. Ich glaube, die Aktivitäten und Geschehnisse der letzten Stunden zeigen,
  wie dringlich es ist, dass sich auch die Bundesregierung vor Ort solidarisch zeigt.
  Es ist von großem Interesse für die Stabilität der Region, dass die Regierung im
  Libanon sowie die Strukturen vor Ort gestärkt werden ‑ sowohl im Hinblick auf die
  Versorgung der Bevölkerung als auch auf die Aufgaben, die im Zusammenhang mit der
  Entwaffnung und der späteren Einhegung der Hisbollah auf die Zentralregierung zukommen.
  Wenn Sie mir noch eine Ergänzung erlauben: Wie schon gesagt, geht es auch um die
  humanitäre Lage der Menschen, die dort vertrieben worden sind. Damit die sich verbessern
  kann, ist es natürlich wichtig, dass die Menschen wieder in den Süden zurückkehren
  können. Das fordern wir ein. Vielleicht noch in Ergänzung dessen, was mein Kollege
  gesagt hat: Deutschland ist einer der größten humanitären Geber im Libanon und in
  der Region. Angesichts der rasant steigenden Bedarfe hat Außenminister Wadephul
  zuletzt insgesamt 188 Millionen Euro für humanitäre Hilfsmaßnahmen in der gesamten
  Region angekündigt. Speziell in Bezug auf den Libanon haben wir unsere Maßnahmen
  so umgesteuert, dass sich die humanitäre Hilfe für dieses Jahr bereits auf 51 Millionen
  Euro aufsummiert. Damit sind wir zurzeit der größte bilaterale humanitäre Geber
  im Libanon. Herr Giese, Sie haben gerade gesagt, dass die Bundesregierung einfordere,
  dass die Menschen in den Südlibanon zurückkehren können. Das ist nun ausdrücklich
  nicht das Ziel der israelischen Regierung, die ja systematisch alle Wohngebäude
  in der von ihr beanspruchten Pufferzone zerstört hat. Wie wollen Sie erreichen,
  dass die Menschen überhaupt zurückkehren können? Gibt es da Wiederaufbauhilfe Deutschlands?
  In Bezug auf die humanitäre Unterstützung, für die das Auswärtige Amt zuständig
  ist, habe ich mich gerade geäußert. Was die Zerstörung von ziviler Infrastruktur
  angeht, so haben wir hier bereits mehrfach darüber gesprochen und gesagt ‑ auch
  ich persönlich habe das geäußert ‑, dass wir das ablehnen. Zivile Infrastruktur
  kann nicht das direkte Ziel von Kampfhandlungen sein. Das haben wir auch gegenüber
  der israelischen Seite betont, und das hat auch der Außenminister beim Besuch des
  israelischen Außenministers Sa‘ar hier in Berlin sehr, sehr deutlich gesagt. Wie
  gesagt, das macht Israel nicht sicherer und führt zu weiteren Fluchtbewegungen.
  Die Lösung dazu sind Verhandlungen. Wie gerade eben schon gesagt: Verhandlungen
  finden statt; direkte Gespräche zwischen dem Libanon und der israelischen Seite
  finden in Washington statt. Daran gilt es anzuknüpfen. Dafür wirbt die Bundesregierung.
  Sehen Sie einen Zusammenhang zwischen dem Vorgehen Israels im Libanon und im Gazastreifen
  ? Es gab letzte Woche ja die Ankündigung, dass die israelische Armee auch da weiter
  vorrücken solle, um eine Pufferzone einzurichten. Ich finde es jetzt ein bisschen
  schwer zu sagen, was der konkrete Zusammenhang zwischen diesen beiden Maßnahmen
  ist. Ich würde die Maßnahmen separat sehen. Wenn Sie von mir dazu einen Kommentar
  wollen: Auch wir haben die Ankündigung von Premierminister Netanjahu bezüglich der
  70 Prozent wahrgenommen. Das erfüllt uns mit großer Sorge. Es gibt einen 20-Punkte-Plan,
  dem auch Israel zugestimmt hat, und den gilt es weiter umzusetzen. Auch die israelische
  Regierung muss Interesse daran haben, daran weiterzuarbeiten. Diese Ankündigung
  steht dazu im Widerspruch. Herr Giese, Sie haben gesagt, der Außenminister habe
  seine Sorge ausgedrückt. Haben Sie auch konkrete Druckmittel, um Einfluss auf die
  beiden Konfliktparteien zu nehmen, damit diese ihr Verhalten ändern? Was machen
  Sie konkret? Ich will jetzt nicht ins Detail gehen, aber Sie können davon ausgehen,
  dass der Bundesminister wirklich 24/7 mit allen Beteiligten in der Region im Kontakt
  steht. Er hat einen sehr, sehr engen Kontakt mit seinem israelischen Amtskollegen,
  und er spricht auch immer wieder mit seinem Amtskollegen aus dem Libanon und mit
  anderen Staaten in der Region. Es ist die Arbeit der Diplomatie, dass man diese
  Kontakte etablieren muss, um gemeinsam an einer Lösung zu arbeiten. Wie gesagt,
  die Lösung ist schon einmal verhandelt worden, und sie wurde in dem 20-Punkte-Plan
  festgeschrieben. Den gilt es jetzt umzusetzen, und daran arbeiten wir mit. Verteidigt
  sich Israel im Libanon, Herr Giese? Wie Israel sein Vorgehen im Libanon begründet,
  wissen Sie selbst. Da geht es um die Abwehr gegen Angriffe der Hisbollah. Dass diese
  Angriffe stattfinden, werden Sie auch nicht in Abrede stellen. Die Hisbollah hat,
  glaube ich, heute Nacht verkündet, wieder Nahariya und eine andere Ortschaft im
  Norden Israels mit Raketen angegriffen zu haben; das ist also ein Fakt. Gegen solche
  Angriffe darf man sich selbstverständlich wehren. Über den Umfang und die Art und
  Weise, wie man sich dagegen wehren kann, gibt es eine Debatte, und da ist Israel
  aufgefordert darzustellen, inwiefern das im Einklang mit dem Völkerrecht steht.
  Darüber, was die Grenzen sind und was man nicht machen darf, haben wir gerade eben
  schon gesprochen. Es geht um Angriffe gegen zivile Infrastruktur; da muss man sich
  an die internationalen Regeln halten. Aber dass es ein Selbstverteidigungsrecht
  gegen praktisch tagtäglich stattfindende Raketeneingriffe gibt, sollte hier, glaube
  ich, keine Frage sein. Korrigieren Sie mich, aber Sie sind ja nicht der Sprecher
  der israelischen Regierung. Ist das, was Israel dort auf fremdem Territorium macht,
  aus Sicht der Bundesregierung Verteidigung? Wie gesagt, die Bundesregierung ist
  hier keine der am Konflikt beteiligten Parteien. Sie fragen mich nach einer Einschätzung
  von außen. Ich habe Ihnen wiedergegeben, was die israelische Regierung dazu äußert.
  Nach den Regeln der Vereinten Nationen muss Israel, wenn es Gewalt im Verhältnis
  zu einem anderen Staat anwendet, begründen, warum diese Gewaltanwendung legal ist.
  Insofern ist Israel aufgefordert darzustellen, inwiefern das im Einklang mit dem
  Völkerrecht geschieht. Dass es dieses Selbstverteidigungsrecht allerdings auch nach
  der UN-Charta gibt, ist unbestritten. Herr Giese, der Außenminister hat in seiner
  Erklärung gestern, wie Sie eben schon ausführten, auch gesagt, der richtige Kanal,
  um den Krieg zwischen Israel und der Hisbollah und die israelische Besatzung im
  Libanon zu beenden, seien die Verhandlungen zwischen Israel und der libanesischen
  Regierung. Das mag richtig sein, hat allein aber bisher nicht ausgereicht, um eine
  weitere Eskalation zu verhindern. Bedeutet die Tatsache, dass der Minister sagt,
  das sei der richtige Kanal, dass er den französischen Antrag auf eine Dringlichkeitssitzung
  des UN-Sicherheitsrats zum Vorgehen der israelischen Armee im Libanon nicht unterstützt?
  Das bedeutet es nicht. Diese Dinge, stehen nicht im Widerspruch zueinander, ganz
  im Gegenteil. Selbstverständlich wird das höchste Gremium für Frieden in der Welt,
  der VN-Sicherheitsrat, dazu tagen können. Wir sind derzeit noch nicht Mitglied im
  Sicherheitsrat. Wir hoffen, dass diese Woche entschieden wird, dass wir es von nächstem
  Jahr an werden können. Aber selbstverständlich unterstützen wir das. Wie gesagt,
  werden wir nicht gefragt. Wir sind nicht Mitglied. Aber dass der VN-Sicherheitsrat
  über dieses Thema spricht, das ist ganz klar. Nach meinen Informationen wird das
  heute geschehen. Frankreich hat das beantragt, und in der heutigen Sitzung des Sicherheitsrates
  wird das besprochen werden. Der Erfolg von Politik bemisst sich ja nicht nur an
  der Intensität der Bemühungen, sondern auch an ihren Ergebnissen. Wie würden Sie
  jenseits der Hilfsangebote und vor allem auch mit Blick auf die Einhaltung der Regeln
  des Völkerrechts die Einflussmöglichkeiten der Bundesregierung auf die ja auch nach
  Ihrem eigenen Bekunden besorgniserregende Situation im Libanon, im Gazastreifen
  und im Westjordanland aktuell einschätzen? Sagen Sie bitte nicht, dass Sie dazu
  schon Stellung genommen hätten. Denn die Situation verändert sich ständig, und deswegen
  fragen wir auch stets neu nach diesen Dingen. Das ist eine so allgemeine Frage,
  dass es mir ein bisschen schwer fällt, eine Antwort darauf zu finden, was die Einflussmöglichkeiten
  der Bundesregierung auf einer Skala von eins bis zehn seien. So, wie Sie es fragen,
  ist das ein bisschen schwer zu beantworten. Sehen Sie es mir insofern nach. Wir
  tun das, was wir können. Wir sprechen mit allen. Wir unterstützen. Wir sind hinter
  den Kulissen tätig. Nicht alles davon ist für die Regierungspressekonferenz geeignet,
  aber wir sind wirklich dabei, alles dafür zu tun, dass es zu keiner weiteren Eskalation
  kommt. Wie sich das am Ende bemisst, das werden wir sehen. Nicht alle Erfolge sind
  als Erfolge sichtbar. Wir wollen uns ja die Alternativhypothese nicht ausmalen.
  Es könnte ja durchaus auch schlimmer kommen. Es wurde bereits ein Waffenstillstand
  erreicht, auch wenn er ‑ das will ich überhaupt nicht abstreiten ‑ äußert brüchig
  ist. Ihn gilt es zu verstetigen. Dafür gibt es direkte Gespräche zwischen Israel
  und Libanon. Solche Gespräche gab es seit Jahrzehnten nicht. Jetzt einfach zu sagen:
  „Alles ist schrecklich, und wir arbeiten nicht weiter daran“, das wäre, denke ich,
  nicht die Lösung, für die das Auswärtige Amt steht, sondern wir werden weiterhin
  mit den Mitteln der Diplomatie daran arbeiten, dass es besser wird. Herr Kornelius,
  der Bundeskanzler bzw. die Bundesregierung hat ja schon einmal einen temporären
  Stopp von Waffenlieferungen an Israel verfügt, weil nicht erkennbar gewesen sei,
  welche Strategie Israel mit seinen Militäraktionen eigentlich verfolge. Ist die
  Art und Weise, in der Israel jetzt sowohl in Gaza als auch im Südlibanon und, im
  Grunde genommen, auch auf der Westbank vorgeht, ein Anlass, über einen erneuten
  Stopp von Waffenlieferungen nachzudenken? Der Bundeskanzler nimmt auf seinen Wegen,
  mit den Gesprächskanälen, die er nutzt, Einfluss auf die Politik im Nahen Osten.
  Er ist dabei in enger Abstimmung mit dem Außenminister. Sie haben eben die Erfolgsparameter
  oder Ziele der Bundesregierung auch in den Worten des Kollegen gehört. Insofern
  ist das der Rahmen, in dem sich die Bundesregierung gerade bewegt. Neben der Kraft
  des Wortes, die in Verhandlungen und Appellen eine Rolle spielen, gibt es aber auch
  die Wirkung von Taten. Ein Lieferstopp ist eine Tat, die über die Kraft des Wortes
  eindeutig hinausgeht. Deswegen noch einmal die Frage: Erwägt der Kanzler, auch um
  ein Zeichen gegenüber der israelischen Regierung zu setzen, einen erneuten Stopp
  der Lieferung von Rüstungsgütern? Ich habe die Frage eben bereits beantwortet. Herr
  Giese, Sie selbst haben eben auf den UN-Sicherheitsrat verwiesen. Unterminiert die
  begrenzte Wirkung des deutschen Einflusses auf Israel möglicherweise die Kandidatur
  für den UN-Sicherheitsratssitz etwas, weil viele Länder möglicherweise den Eindruck
  haben, dass Deutschland bei den engsten Verbündeten nicht sehr viel bewegen könne?
  Meine Kollegin Kathrin Deschauer hat sich in der vergangenen Woche zu unserer Sicherheitsratskandidatur
  und zur Reise des Außenministers nach New York geäußert, der sich bereits seit vergangenem
  Freitag in New York aufhält und noch einmal für einen nicht ständigen Sitz Deutschlands
  wirbt. Sie hat geäußert, dass wir zuversichtlich seien. Das will ich noch einmal
  unterstreichen. Im Übrigen kann ich das Ergebnis von Mittwoch jetzt nicht vorwegnehmen.
  Es ist klar, dass es eine strittige Kandidatur ist und dass wir bis zur letzten
  Sekunde darum werben müssen. Es gibt starke andere Bewerber, die auch gute Gründe
  haben, gewählt zu werden. Insofern bleiben wir dran und werden bis zum letzten Moment
  daran arbeiten, dass wir das Vertrauen der Weltgemeinschaft bekommen, das sich in
  der Abstimmung in der Generalversammlung zeigen wird. Das war nicht genau meine
  Frage. Die Frage zielte auf die Machtlosigkeit der deutschen Politik auch in Bezug
  auf das Vorgehen Israels ab. Die Bundesregierung argumentiert ja damit, dass sie
  sagt, man wolle Einfluss haben, auch über diesen Sitz. Aber wenn erkennbar wird,
  dass der Einfluss sehr minimal ist, wo liegt dann der Mehrwert der deutschen Präsenz
  im Sicherheitsrat? Ich denke, das ist eine sehr binäre Sicht. Der Einfluss Deutschlands
  bemisst sich an sehr vielen Parametern. Die Weltgemeinschaft ist sich durchaus bewusst,
  welche Kraft und welche Vorstellung von regelgebundener Arbeit in der Weltpolitik
  Deutschland mitbringt, auch in den Sicherheitsrat. Das wird sicherlich und hoffentlich
  in der Entscheidung honoriert. Herr Kornelius, Frau Deschauer hat hier am Freitag
  gesagt, sie sei guter Dinge, dass Deutschland bei der Wahl am kommenden Mittwoch
  gute Chancen habe. Aber es geht nicht nur darum, dass Deutschland ein robuster Beitragszahler
  und die viertgrößte Wirtschaft ist, wie Sie auch hier dargelegt haben, sondern es
  geht um den politischen Einfluss. Der Kollege hat es gerade angesprochen. Wie kann
  man die Länder davon überzeugen, dass Deutschland zu Frieden in der Welt beitragen
  könnte, als Mehrwert, und auch dazu, dass das Völkerrecht beachtet wird? Deutschland
  hat die internationale Gemeinschaft sehr irritiert und sehr verstört, zum Ersten
  im Zusammenhang mit dem Umgang mit Israels Vorgehen gegen die palästinensische Bevölkerung
  und zum Zweiten durch die Einordnung des Angriffs gegen den Iran. Drittens wird
  in Deutschland seit Tagen diskutiert, ob der Kanzler ausgewechselt werden könne.
  Andere Länder bekommen das mit. Das führt nicht nur zu den Unsicherheiten für die
  jeweiligen Sektoren wie Wirtschaft usw., und das ist nicht nur Wasser in die Windmühle
  der AfD, sondern wie kann Deutschland damit glaubhaft machen ‑ ‑ ‑ ‑ Ich finde es
  nicht lustig, dass es ‑ ‑ ‑ Aber die Frage! Es ist zehn Minuten nach halb eins Uhr,
  und wir müssen los. Ich finde, es ist keine Wertschätzung, wenn Sie lachen, während
  ich gerade dabei bin, meine Frage zu stellen. Das finde ich kein Zeichen der Wertschätzung.
  Aber abschließend: Wie kann Deutschland der internationalen Gemeinschaft glaubhaft
  machen, dass ein Sitz Deutschlands im UN-Sicherheitsrat in diesen zwei Faktoren,
  die der Kollege angesprochen hat, beitragen kann und einen Mehrwert bedeuten würde?
  Ich denke, die deutsche Außenpolitik steht seit Jahren für ein hohes Maß an Verlässlichkeit,
  an Regelgebundenheit und an der Fähigkeit, im Rahmen von Bündnissen konstruktiv
  zu arbeiten, sei es innerhalb der Europäischen Union, sei es in der NATO oder sei
  es in der Weltgemeinschaft und in den Vereinten Nationen. Es gibt eine lange Geschichte
  der deutschen Konstruktivität in all diesen Bereichen. Ich denke nicht, dass wir
  das jetzt hier in einem seminarartigen Vortrag auflösen müssen. Ich glaube, dass
  sich die Weltgemeinschaft dieser Rolle bewusst ist. Deutschland wirbt dafür und
  wird auch im Nahen Osten seinen Einfluss nutzen, gerade gegenüber Israel, wo die
  Bundesregierung nach wie vor gehört wird und Hebel hat, die sie tatsächlich einsetzt.
  Herr Kornelius, es geht nicht um ein Seminar. Es geht um die Auflistung von Fakten.
  Die internationale Gemeinschaft insbesondere des globalen Südens war sehr irritiert
  und hat Deutschland für seine unsouveräne Haltung gegenüber der israelischen Regierung
  im Zusammenhang mit der palästinensischen Bevölkerung sehr kritisiert. In der Presse
  und der medialen Berichterstattung im globalen Süden kann man das auch nachlesen.
  Entschuldigung, aber dazu will ich etwas sagen. Sie zitieren hier einen globalen
  Süden, der aus sehr vielen verschiedenen Ländern besteht. Diese Behauptung in dieser
  Art und Weise möchte ich komplett zurückweisen. Das stimmt überhaupt nicht. In Lateinamerika
  können Sie das nachlesen, Herr Giese. Es gibt Stimmen, die Kritik äußern. Aber in
  dieser Allgemeinheit, dass der komplette globale Süden so denke, überhaupt schon
  in dieser Generalisierung, das würde ich zurückweisen. Die Art und Weise, in der
  Sie Deutschland eingeschätzt haben, hat nichts mit den Fakten zu tun. Ich habe gesagt:
  Länder des globalen Südens.'
