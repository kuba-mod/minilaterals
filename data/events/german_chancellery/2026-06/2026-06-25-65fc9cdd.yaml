title: Rede von Bundeskanzler Merz anlässlich des Sommerfests des Parlamentskreises
  Mittelstand der CDU/CSU-Bundestagsfraktion am 26. Juni 2026 in Berlin
text: 'liebe Kolleginnen und Kollegen aus der Bundesregierung, liebe Kolleginnen und
  Kollegen aus dem Deutschen Bundestag, aus den Landtagen und aus unseren Wahlkreisen,
  herzlichen Dank für die sehr freundliche Begrüßung und herzlichen Dank für die Bereitschaft,
  heute Abend etwas später zu beginnen als sonst; denn wir hatten bis vor wenigen
  Minuten die Ministerpräsidentenkonferenz. Die Buchstaben PKM haben mich heute also
  schon in anderer Reihenfolge begleitet: Es war dann erst einmal die MPK. Ich sage
  das deshalb, weil Gordon Schnieder heute mit dabei ist. Lieber Gordon, ich möchte
  dir auch heute bei dieser Gelegenheit noch einmal Dank und Gratulation zu deinem
  Wahlsieg in Rheinland-Pfalz sagen. Das ist für uns alle ein tolles Ergebnis gewesen.
  Du bist aber nicht nur seit etwa fünf Wochen der Ministerpräsident des Landes Rheinland-Pfalz,
  sondern du bist mit diesem Amt auch gleich der Vorsitzende der Ministerpräsidentenkonferenz
  in Deutschland geworden. Ich will nach dieser ersten gemeinsamen Sitzung heute sagen:
  Du hast das supergut und professionell gemacht. Wir haben gemeinsam etwas beschlossen,
  meine Damen und Herren, was insbesondere für die Städte und Gemeinden und für unsere
  Kommunen in Deutschland wichtig ist. Wir werden in Zukunft Leistungsgesetze im Bund
  nur noch dann beschließen, wenn der Bund sie gleichzeitig in vollem Umfang [ umfasst
  laut Beschluss 80 Prozent der Gesamtkosten, Red. ] an die Städte und Gemeinden bezahlt.
  Liebe Freundinnen und Freunde, wir haben das etwas schwierig „Konnexitätsprinzip“
  genannt. Was verbirgt sich dahinter? Dahinter steht ‑ und ich spreche hiermit bestimmt
  auch viele an, die heute hier zu Gast sind ‑, dass wir in der Union der gemeinsamen
  und festen Überzeugung sind, dass nicht die europäische Ebene, dass nicht die Bundesebene,
  dass nicht die Länder, sondern dass für uns und unsere Demokratie die Städte und
  Gemeinden ‑ unsere Dörfer, unsere Städte, unsere Kreise ‑ die wichtigste politische
  Ebene sind, auf der die Menschen der Politik begegnen. Wir haben heute Nachmittag
  nach langer und guter Vorbereitung in großem Einvernehmen einstimmig miteinander
  beschlossen, dass wir in Zukunft so vorgehen und dass wir dafür sorgen, dass wir
  die Städte und Gemeinden in Deutschland entscheidungsfähig, handlungsfähig halten
  und dass sie die Leistungsgesetze, die wir ihnen geben, in Zukunft auch aus eigenen
  Mitteln finanzieren können. Das stellt unsere Demokratie auf ein neues Fundament.
  Ich sage das mit diesen Worten, und das ist nicht übertrieben. Es sorgt dafür, dass
  die wichtigste politische Ebene in Deutschland wieder handlungsfähig wird. Lieber
  Gordon Schnieder, das ist vor allem dein Verdienst ‑ es ist dein Verdienst, diese
  Ministerpräsidentenkonferenz heute so geführt zu haben, dass wir das zwischen Bund
  und Ländern einstimmig miteinander entscheiden konnten. Herzlichen Dank für diese
  wegweisende und wichtige Entscheidung, die wir heute gemeinsam treffen konnten!
  Wir haben der Presse das Ergebnis gerade eben gemeinsam mit dem niedersächsischen
  Ministerpräsidenten Olaf Lies ‑ der dabei eine wichtige Rolle für die Ministerpräsidenten
  der sozialdemokratisch geführten Länder gespielt hat ‑ in demselben Presseraum des
  Bundeskanzleramts vorgestellt, in dem wir am Dienstagmorgen um 9 Uhr zusammen mit
  der Bundesarbeitsministerin und mit den Vertreterinnen und Vertretern der Alterssicherungskommission
  waren. Liebe Freunde, über das Ergebnis ist viel gesprochen und viel diskutiert
  worden; ich muss es im Einzelnen nicht noch einmal referieren. Aber diese beiden
  Entscheidungen, die wir in dieser Woche nach sorgfältiger Vorbereitung der Alterssicherungskommission
  einvernehmlich zwischen Bund und Ländern und einvernehmlich in der Koalition getroffen
  haben, sind Entscheidungen, die weit über diese Wahlperiode hinausreichen. Sie zeigen,
  dass Deutschland handlungsfähig ist, dass die Regierung entschlossen ist, Entscheidungen
  zu treffen und Reformen auf den Weg zu bringen, und sie zeigen, dass wir aus der
  politischen Mitte unseres Landes heraus die wichtigen Aufgaben anpacken und dass
  wir sie auch umsetzen, so, wie wir es am Dienstagmorgen gemeinsam verabredet haben.
  Ja, wir werden noch mehr tun müssen ‑ das wissen wir ‑, und wir werden in den nächsten
  Tagen im Koalitionsausschuss zusammentreten und uns über Arbeitsmarktreformen, über
  eine Steuerreform und viele weitere Themen zu unterhalten haben. Für uns und für
  mich persönlich steht dabei ein wichtiges Ziel im Vordergrund: nicht Umverteilung,
  sondern die Wiederherstellung der Wettbewerbsfähigkeit unserer Unternehmen. Meine
  Damen und Herren, liebe Freundinnen und Freunde, ich sage das hier, und Sie wissen,
  dass dies hier meine politische Heimat seit vielen, vielen Jahren, ja seit Jahrzehnten
  ist. Deswegen auch noch einmal herzlichen Glückwunsch zu diesem 50. Sommerfest,
  lieber Christian! Das ist der Mittelstand in Deutschland. Das ist Handwerk, das
  sind junge Unternehmen, das sind etablierte Unternehmen, das sind Familienunternehmen.
  Mittelstand, das sind diejenigen ‑ ich sage es einmal so salopp, wie wir es schon
  einmal sagen ‑, die lebenslänglich Deutschland gebucht haben! Das sind die Unternehmen,
  die nicht einmal einfach schnell an andere Standorte ausweichen können, sondern
  die mit ihren Mitarbeitern, mit ihren Familien darauf angewiesen sind, dass dieser
  Standort funktioniert, dass dieses Land funktioniert. Deswegen müssen wir jetzt
  in der Koalition, und die Sozialdemokraten wissen das genauso gut wie wir, einige
  Entscheidungen treffen, die genau diesem Ziel dienen, der Wiederherstellung der
  Wettbewerbsfähigkeit der Unternehmen. Die Unternehmen, das sind nicht die Unternehmer
  allein. Das sind Millionen Beschäftigte in Ihren Betrieben, die darauf warten, dass
  wir Entscheidungen treffen und dieses Land wieder auf die Beine stellen, dass dieses
  Land wieder nach vorn kommt. Ich möchte Ihnen heute noch einmal sagen: Unterschätze
  bitte niemand meine Entschlossenheit, diesen Weg jetzt auch zu gehen und dafür zu
  sorgen, dass wir das in diesem Jahr hinbekommen. Denn dies ist das entscheidende
  Jahr der laufenden Wahlperiode. In diesem Jahr müssen die Weichen richtig gestellt
  werden, und dafür weiß ich Sie an unserer Seite, dafür weiß ich euch an meiner Seite.
  Herzlichen Dank für diese großartige Zusammenarbeit, auch mit dem PKM! Liebe Freundinnen
  und Freunde, jetzt sage bitte niemand, das seien sozusagen Ankündigungen für das,
  was wir dann alles in der Zukunft gerne machen wollen. Ja, das sind auch Erwartungen.
  Aber es sind auch Berichte richtig, die sagen, was wir schon gemacht haben. Am 1. Januar
  2026 ist die Aktivrente in Kraft getreten. Ich habe mir die Zahlen geben lassen.
  Sie sind sehr vorläufig ‑ sehr vorläufig ‑ und noch nicht wirklich sicher, aber
  es ist eine fünfstellige Zahl von Beschäftigten in den Betrieben, die von diesem
  Angebot Gebrauch machen, länger zu arbeiten und dafür bis zu 24 000 Euro im Jahr
  an zusätzlich steuerfreiem Einkommen zu haben. Das, was Carsten Linnemann einmal
  entworfen hat ‑ diese Aktivrente ist sein Projekt gewesen ‑, funktioniert. Sie ist
  in Kraft, und es läuft. Wir geben damit einen Anreiz für ältere Beschäftigte, länger
  in den Betrieben zu bleiben. Wir haben das mit der neuen Rente jetzt nicht nur als
  Konzept vorliegen. Wir haben bereits im Vorgriff darauf eine Entscheidung in der
  Koalition getroffen, die beschlossen ist. Zum 1. Januar 2027 wird das sogenannte
  Altersvorsorgedepot in Kraft treten. Wir haben etwas völlig Neues gemacht, um den
  Menschen eine Kapitalbildung, eine Vermögensbildung zu ermöglichen, anders, als
  das früher mit vielen Garantien und hohen Kosten einherging. Das ist in Kraft, und
  am 1. Januar 2027 können alle Menschen in Deutschland davon Gebrauch machen. Warum
  nenne ich diese beiden Beispiele ganz besonders? Wir stellen unseren Arbeitsmarkt
  um. Wir stellen die Vergütungssysteme um. Wir stellen die Alterssicherungskonzepte
  um. Liebe Freundinnen und Freunde, ich wiederhole hier etwas, was ich auf dem Tag
  der Deutschen Industrie am Dienstag dieser Woche schon einmal gesagt habe: Wir alle,
  wie wir hier zusammen sind, sind die Erben von Ludwig Erhard. So fühlen wir uns.
  Das Buch „Wohlstand für Alle“ steht im Bücherschrank eines jeden von uns. Die meisten
  von uns haben es mindestens einmal gelesen. Das Buch ist Anfang 1957 erschienen.
  Wenn Ludwig Erhard vor fast 70 Jahren dem Land in einer schwierigen Lage, als das
  Land nach zwei Weltkriegen in Trümmern lag, Wohlstand für alle versprochen hat,
  dann können wir heute die zweite Auflage dieses Buches schreiben. Der Titel muss
  da lauten: Wohlstand auch für die junge Generation. ‑ Auch die Jugend in unserem
  Land hat Anspruch darauf, dass wir heute die Bedingungen dafür schaffen, dass sie
  in Freiheit, in Frieden, im Wohlstand und mit einem hohen Maß an sozialer Gerechtigkeit
  lebt, ähnlich wie meine Generation dies über Jahre und Jahrzehnte zu erleben das
  große Glück hatte. Das ist sozusagen meine Schlussbetrachtung, liebe Freundinnen
  und Freunde. Ich will es mit Bedacht und Ernsthaftigkeit sagen. Wir feiern heute
  zum 50. Mal ein großartiges Fest. Es ist nicht allen Menschen auf dieser Welt und
  auch nicht allen Menschen in Europa vergönnt, so zu feiern, wie wir es heute tun.
  Ich war heute Morgen in Danzig, auf der vierten großen Konferenz zum Wiederaufbau
  der Ukraine, und habe dort die Ministerpräsidentin der Ukraine getroffen. Liebe
  Freundinnen und Freunde, lasst uns einmal etwas wertschätzen, dass wir das große
  Glück haben, in einem solchen Land zu leben wie Deutschland. Es ist ein großes Glück,
  dass wir in diesem Land leben dürfen. Damit einher geht aber auch die große Verpflichtung,
  nachfolgenden Generationen genauso zu ermöglichen, in einem solchen Land zu leben,
  und damit einher geht auch die Verpflichtung, in unserem eigenen Interesse dafür
  zu sorgen, dass Freiheit, Friede und wirtschaftliche Zukunft in Europa nicht nur
  auf uns begrenzt bleiben, sondern dass auch andere Teile wie jetzt die Ukraine die
  Chance bekommen, wieder in Freiheit, im Frieden und im Wohlstand zu leben. Wenn
  uns das gemeinsam gelingt, dann zeigen wir eine Stärke Europas, die zum Besten gehört,
  was dieser europäische Kontinent zu leisten in der Lage ist. Deshalb engagiere ich
  mich so für Europa. Deshalb bin ich so viel unterwegs in dieser Europäischen Union.
  Deshalb habe ich gestern Abend Keir Starmer, Emmanuel Macron, Giorgia Meloni und
  Donald Tusk nach Berlin eingeladen. Sie alle sind hier gewesen. Sie schauen auch
  auf Deutschland und sagen: Lasst uns das gemeinsam tun, was jetzt die wichtigste
  Aufgabe für dieses Europa ist! Lasst uns gemeinsam dafür sorgen, dass nicht nur
  wir, sondern auch die nächste Generation eine Chance hat, so zu leben, wie wir bis
  heute die Chance gehabt haben, es zu tun! In diesem Sinne wünsche ich Ihnen und
  uns ein schönes Fest, einen 50. Geburtstag mit diesem Sommerfest des PKM. Bleiben
  Sie uns gewogen, bleiben wir zusammen, sorgen wir dafür, dass Deutschland ein liebenswürdiges,
  ein lebenswertes Land ist und bleibt, und machen wir es noch ein bisschen besser
  für die nachfolgende Generation!'
