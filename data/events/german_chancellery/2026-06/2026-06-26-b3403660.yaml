title: Bundeskanzler Merz empfängt die Staats- und Regierungschefs der baltischen
  Länder Lettland, Estland und Litauen
text: Bundeskanzler Friedrich Merz wird am 3. Juli 2026 die Staats- und Regierungschefs
  der drei baltischen Staaten Lettland, mit Staatspräsident Edgars Rinkēvičs, Estland,
  mit Ministerpräsident Kristen Michal, und Litauen, mit Staatspräsident Gitanas Nausėda,
  zu einem Treffen im sog. B3+1-Format im Bundeskanzleramt empfangen. Bei ihrem Gespräch
  werden die Vorbereitung des am 7./8. Juli 2026 stattfindenden NATO-Gipfels in Ankara,
  sicherheits- und verteidigungspolitische Themen sowie die weitere Unterstützung
  der Ukraine im Mittelpunkt stehen.
