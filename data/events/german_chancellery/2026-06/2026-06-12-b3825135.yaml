date: '2026-06-12'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 12. Juni 2026
text: 'stellvertretender Regierungssprecher Hille (Vorsitzender Feldhoff eröffnet
  die Pressekonferenz und begrüßt SRS Hille sowie die Sprecherinnen und Sprecher der
  Ministerien.) Vielen Dank, Herr Feldhoff. Schönen guten Tag auch von mir. Schön,
  Sie zu sehen! Wie üblich am Freitag beginnen wir mit dem Blick auf die Termine des
  Bundeskanzlers in der kommenden Woche. Los geht es am Montag, dem 15. Juni; da wird
  der Bundeskanzler nämlich nach Frankreich reisen. Dort wird er auf Einladung des
  französischen Staatspräsidenten Macron am G7-Gipfel teilnehmen, der von Montag,
  dem 15. Juni, bis Mittwoch, dem 17. Juni, dort stattfindet. Die Staats- und Regierungschefs
  der G7 werden sich dort in mehreren Arbeitssitzungen zu globalen Fragen austauschen.
  Daneben wird sich, wie das bei solchen Gipfeln üblich ist, natürlich auch die Gelegenheit
  zu bilateralen Gesprächen ergeben. Ein ausführliches Briefing zur Reise nach Frankreich
  hat eben auch hier in der Bundespressekonferenz stattgefunden. Deshalb würde ich
  mich jetzt kurz halten und es bei diesen Infos belassen. Ein kleiner Servicehinweis ‑
  nicht, dass Sie den Termin vermissen ‑: Am Mittwoch findet keine Kabinettssitzung
  statt, weil der G7-Gipfel parallel in Évian stattfindet. Aus Évian reist der Bundeskanzler
  dann weiter nach Brüssel, wo er am Donnerstag und Freitag an der regulären Tagung
  des Europäischen Rates teilnehmen wird. Kernthemen beim ER sind die Stärkung der
  Wettbewerbsfähigkeit im Kontext globaler wirtschaftlicher Herausforderungen, der
  nächste Mehrjährige Finanzrahmen, kurz MFR, sowie die Entwicklungen im Nahen Osten.
  Daneben wird es selbstverständlich um die fortwährende Unterstützung der Ukraine
  sowie das Thema EU-Erweiterung gehen. Der Bundeskanzler hat sich dazu, wie Sie sicherlich
  auch verfolgt haben, gestern bereits in der Regierungserklärung im Bundestag geäußert
  und das eingeordnet. Wenn er aus Brüssel zurück ist, geht es weiter am Sonntag,
  dem 21. Juni. Da nimmt der Bundeskanzler nämlich an der Festveranstaltung zum 2. Nationalen
  Veteranentag teil, der rund um das Reichstagsgebäude in Berlin stattfindet. Der
  Bundeskanzler wird dort zwischen 14.30 Uhr und 15.30 Uhr vor Ort sein. Damit möchte
  er seine besondere Wertschätzung für die Leistung der rund zehn Millionen Veteraninnen
  und Veteranen in Deutschland ausdrücken und sich über die zahlreichen Facetten der
  Veteranenarbeit informieren. Der Bundeskanzler begibt sich dafür gemeinsam mit der
  Präsidentin des Deutschen Bundestages und Schirmherrin des Nationalen Veteranentags,
  Julia Klöckner, sowie in Begleitung der Stellvertreterin des Generalinspekteurs
  der Bundeswehr, Generaloberstabsarzt Dr. Nicole Schilling, zunächst auf einen Rundgang
  über das Veranstaltungsgelände. Nach dem Rundgang spricht der Bundeskanzler gegen
  15.20 Uhr ein Grußwort auf der Hauptbühne. Der ganze Termin inklusive des Rundgangs
  ist natürlich presseöffentlich. Dann möchte ich auch noch die Gelegenheit für einen
  kleinen Werbeblock in eigener Sache nutzen; denn am gleichen Wochenende, am Samstag
  und Sonntag, dem 20. und 21. Juni, findet der Tag der offenen Tür der Bundesregierung
  statt. Das Kanzleramt, die Bundesministerien und auch das Bundespresseamt öffnen
  die Tore für Besucherinnen und Besucher. Wie Sie wissen, ist diese Bundesregierung
  seit etwas mehr als einem Jahr im Amt. Gemeinsam wollen wir unser Land nach vorne
  bringen. Beim Tag der offenen Tür haben die Besucherinnen und Besucher die Gelegenheit,
  einen Blick in die Arbeitsräume der Politik zu werfen und sich darüber zu informieren,
  wie weit die Bundesregierung in ihrem ersten Jahr gekommen ist. Am Sonntagnachmittag
  um 16 Uhr wird auch der Bundeskanzler vor Ort im Bundeskanzleramt dabei sein. Der
  Chef des Bundeskanzleramts, Thorsten Frei, wird am Sonntagvormittag gegen 11.20 Uhr
  auf der Bühne im Bundeskanzleramt sein. Die Bundesministerien freuen sich darauf,
  sich und ihre Themen vorzustellen und mit den Besucherinnen und Besuchern ins Gespräch
  zu kommen. Natürlich ist auch das Bundespresseamt mit dabei und bietet wieder ein
  vielfältiges Programm mit hochkarätig besetzten Talkrunden. Zahlreiche Ministerinnen
  und Minister der Bundesregierung und weitere spannende Gäste stellen sich den Fragen
  der Bürgerinnen und Bürger. Unter anderem dabei sind Bundesminister Klingbeil, Wadephul,
  Wildberger und Schnieder sowie die Bundesministerinnen Bär, Hubig, Prien und Hubertz.
  Weil das besonders beliebt ist, möchte ich auch darauf hinweisen, dass auch die
  Astronauten Alexander Gerst und Matthias Maurer mit auf einem Podium dabei sein
  werden. Ein besonderes Highlight für die kleinen Besucher des Tags der offenen Tür
  ist immer die Kinder- und Jugendpressekonferenz, die am Samstag bei uns im BPA stattfindet
  und wo Kinder und Jugendliche Regierungssprecher Stefan Kornelius Fragen stellen
  können, die er hoffentlich alle beantworten kann. Wen es im Detail interessiert,
  der findet alle Informationen auf unserer Website www.bundesregierung.de . So weit
  der Blick auf die kommende Woche und der kleine Werbeblock in eigener Sache. Ich
  habe jetzt außerdem noch die große Freude, herzliche Grüße der Bundesregierung und
  auch des Bundeskanzlers persönlich über den Atlantik zu unserer Nationalmannschaft
  zu schicken. Denn seit gestern ‑ Sie haben es alle verfolgt ‑, läuft die Fußball-Weltmeisterschaft
  der Männer . Unsere Mannschaft steigt am Sonntag gegen Curaçao ein. Wir wünschen
  unserem Team alles, alles Gute, schöne Spiele, viele Tore und natürlich viel Erfolg.
  Lasst es krachen, Männer. Wir sind stolz auf euch. Wir stehen hinter euch. Ich habe
  auch eine Reiseankündigung im Gepäck: Der Bundesminister für Landwirtschaft, Ernährung
  und Heimat , Alois Rainer, wird vom 13. bis zum 19. Juni nach Japan und China reisen.
  Ziel der Reise ist es, die Zusammenarbeit mit zwei zentralen Handelspartnern weiter
  zu vertiefen. Japan ist nach China Deutschlands zweitwichtigster Handelspartner
  in der Region und enger Werte- und Kooperationspartner. China ist als weltgrößter
  Lebensmittelmarkt von herausragender Bedeutung für die deutsche Agrar- und Ernährungswirtschaft.
  Die Reise unterstreicht daher auch das Ziel der Bundesregierung, die internationale
  Wettbewerbsfähigkeit der deutschen Land- und Ernährungswirtschaft zu stärken und
  neue Märkte zu erschließen. Deshalb wird der Minister auf der Reise auch von einer
  Wirtschaftsdelegation begleitet. In beiden Ländern stehen politische Gespräche mit
  den Amtskollegen an. In Japan wird der Fokus vor allem auf Ernährungsvorsorge, resilienten
  Versorgungs- und Landwirtschaftssystemen sowie Innovationen im Bereich der Landwirtschaft
  liegen. Deutschland hat eine Landtechnikbranche, die an der Weltspitze steht. Hier
  gibt es viele neue Chancen für die Branche. In China wird es vor allem darum gehen,
  die Wiedereröffnung des chinesischen Marktes für deutsche Fleischexporte voranzutreiben,
  die nach dem Ausbruch der afrikanischen Schweinepest seit 2020 in Deutschland unterbrochen
  sind. Ach ich möchte eine Reihe ankündigen: Die Bundesministerin für Forschung,
  Technologie und Raumfahrt , Dorothee Bär, wird am 17. und 18. Juni anlässlich der
  Start-up-Messe VivaTech nach Paris reisen . Am 17. Juni trifft die Ministerin in
  einem Antrittsbesuch den französischen Wirtschaftsminister Roland Lescure. Sie trifft
  außerdem den französischen Forschungsminister Philippe Baptiste und den Generaldirektor
  der ESA, Josef Aschbacher. Darüber hinaus hat die Ministerin verschiedene Programmpunkte
  auf der Start-up-Messe VivaTech, bei der Deutschland in diesem Jahr anlässlich des
  zehnjährigen Jubiläums Partnerland ist. Am Abend des 17. Juni eröffnet die Ministerin
  gemeinsam mit Minister Karsten Wildberger die Startup Germany Night, ein Vernetzungsevent
  für Startups und Forschungseinrichtungen. Am 18. Juni gibt die Ministerin mit einem
  Grußwort den Startschuss für den deutschen Stand „Germany @ VivaTech“. Auf einem
  Panel der Hauptbühne der VivaTech zum Thema Sprunginnovationen diskutiert sie gemeinsam
  mit dem französischen Minister für Wirtschaft, Roland Lescure, und dem französischen
  Minister für Forschung, Philippe Baptiste, die Ergebnisse der Franco-German Task
  Force on Breakthrough Innovations. Frankreich ist für Deutschland ein besonders
  wichtiger Partner in der europäischen und internationalen Zusammenarbeit. Das gilt
  insbesondere für die Wissenschaft und Forschung. An Herrn Hille und Frau Deschauer
  nicht unmittelbar zum G7–Gipfel, aber damit zusammenhängend: Es gibt es jetzt Gerüchte,
  dass am Wochenende möglicherweise in Europa, möglicherweise in Genf, ein Abkommen
  zwischen den USA und dem Iran unterzeichnet werden könnte. Haben Sie aus Ihren Kontakten
  zu allen anderen Beteiligten oder vielleicht sogar von den USA Signale, dass das
  so sein könnte? Erstens haben wir hier vor der RegPK ja gerade ein Briefing gehabt,
  in dem es, soweit ich das mitbekommen habe, auch um diese Themen ging. Darauf würde
  ich verweisen. Ansonsten möchte ich noch einmal unterstreichen, dass aus Sicht der
  Bundesregierung eine rasche diplomatische Lösung vordringlich ist. Für uns ist auch
  ganz klar, welche Bedingungen dafür gelten müssen. Das sind die gleichen, die wir
  immer nennen, und das muss drei Ziele beinhalten: Iran muss aufhören, Israel und
  seine Nachbarn zu bedrohen, es braucht eine schnelle und klare Verständigung über
  die freie Schifffahrt in der Straße von Hormus und es braucht ein überprüfbares
  Ende des iranischen Nuklearprogramms. Wir haben ‑ das überrascht Sie nicht ‑ ein
  fundamentales Interesse an einem diplomatischen Erfolg. Davon hängt die Stabilität
  in der Region ab, davon hängt die Entwicklung der Weltwirtschaft und auch unserer
  eigenen Wirtschaft ab. Von daher unterstützen wir alles, was in Richtung einer diplomatischen
  Lösung in der Region führt. In der Tat überrascht das nicht. Aber, Frau Deschauer,
  hatte vielleicht der Außenminister heute oder in den vergangenen Tagen Kontakt mit
  seinem iranischen Kollegen Araghchi? Wir sprechen hier über eine presseöffentlich
  bekannte Äußerung, auf die Sie sich jetzt beziehen, mit Blick auf eine, wie der
  stellvertretende Regierungssprecher es schon sagte, möglicherweise bevorstehende
  Einigung. Wir können für die Bundesregierung nur unterstreichen, dass das sehr wünschenswert
  wäre. Wir haben immer gesagt, dass es große Bedeutung hätte, eine diplomatische
  Lösung unter Wahrung unserer Kerninteressen herbeizuführen. Wir stehen im Kontakt
  mit relevanten Ansprechpartnern. Zu dieser ergänzenden Fragestellung habe ich jetzt
  aber nichts mitzuteilen. Sie können oder wollen also nicht sagen, ob er mit Herrn
  Araghchi telefoniert hat? Ich habe Ihnen dazu einfach nichts mitzuteilen. Das würde
  ich auf dem üblichen Wege machen, wenn ich das wollte, aber ich habe Ihnen dazu
  nichts mitzuteilen. Herr Hille, können Sie erklären, warum keineKabinettssitzung
  stattfinden wird? Früher war es ja so, dass, wenn der Kanzler abwesend ist, der
  Vizekanzler eine Kabinettssitzung leitet. Warum ist es diesmal nicht so? Es gibt
  beide Varianten, wie Sie richtigerweise schildern. In diesem Fall wird eben wegen
  der parallel stattfindenden G7-Tagung in Évian am Mittwoch keine Kabinettssitzung
  geben. Aber so es Dinge zu entscheiden gibt, gibt es ja auch jenseits der physischen
  Zusammenkunft die Möglichkeit, im sogenannten Umlaufverfahren Beschlüsse zu fassen.
  Das heißt also nicht, dass sozusagen für diese Woche Stillstand der Rechtspflege
  herrschen wird, sondern nur, dass keine physische Kabinettssitzung stattfinden wird.
  Ich habe nur vorsorglich gefragt. Soll dies dann auch im Sommer die Praxis sein?
  Da kommen erfahrungsgemäß auch wieder Wochen, in denen der Kanzler nicht anwesend
  ist. Wird dann auch keine Kabinettssitzung stattfinden? Ich halte erstens das Verfahren,
  wie es in der kommenden Woche stattfinden wird, nicht für ungewöhnlich. Das gibt
  es immer wieder. Das Verfahren im Sommer wird noch einmal ein anderes sein. Es ist
  ja auch erprobt. Es gibt eine kurze Phase im Zentrum der Sommerpause, in der aller
  Voraussicht nach ‑ dabei muss man ja auch immer vorsichtig sein ‑, abhängig von
  all dem, was noch passiert, keine Kabinettssitzungen stattfinden werden. Aber das
  sind einzelne, wenige Wochen. Und dann gibt es auch noch, wie Sie schon geschildert
  haben, die Vertretung durch den Vizekanzler. Ich habe einen kleinen Transparenz-
  und Werbehinweis: Auch die Bundespressekonferenz beteiligt sich am Tag der offenen
  Tür der Bundesregierung , auch wenn sie natürlich Wert darauf legt, dass sie nicht
  Teil der Bundesregierung ist. Aber auch in diesem Saal finden Pressekonferenzen
  mit insgesamt sechs Bundesministern statt. An den Stellen, an denen Fragen vorgesehen
  sind, werden sie diesmal den Zuschauern überlassen und nicht von uns kommen. (zur
  Fußball-Weltmeisterschaft der Männer ) Herr Hille, wann folgt denn den krachenden
  transatlantischen Fußballgrößen eine mögliche physische Unterstützung der deutschen
  Mannschaft durch die Mitglieder der Bundesregierung? Die folgt bereits beim zweiten
  Spiel. Bei diesem wird nämlich die Staatsministerin für Sport und Ehrenamt, Christiane
  Schenderlein, in Kanada sein und unserer Mannschaft live die Daumen drücken, neben
  allen, die hier am Fernsehschirm der deutschen Mannschaft die Daumen drücken werden.
  Das Spiel findet in Toronto statt. Gibt es innerhalb der Bundesregierung eine Art
  Koordination oder Abstimmung, wer wann auf welcher Ebene herüberreist? Ich sage
  es einmal so: Den Kanzler kann man sich ja auch beim Endspiel vorstellen. Gibt es
  solch eine Vorplanung oder Koordination? Ich hoffe, dass wir Anlass dazu haben,
  hier noch einmal darüber zu sprechen, wann noch andere Vertreter der Bundesregierung
  zur Fußball-Weltmeisterschaft reisen werden; denn dann wäre unsere Mannschaft relativ
  erfolgreich unterwegs. Das wünschen wir uns doch alle. Herr Hille, es gibt weitere
  Einreisebeschränkungen: Jetzt hat es die Fans der Elfenbeinküste getroffen, die
  nicht mehr einreisen können. Vorher gab es schon andere, auch Schiedsrichter, die
  nicht einreisen können. Wie kommentiert die Bundesregierung das? Wir nehmen das
  natürlich wahr, weisen aber auch darauf hin, dass das alles Fragen sind, die die
  Länder betreffen, in denen die Veranstaltung, also die Fußball-Weltmeisterschaft,
  stattfindet. Wünschenswert ist natürlich, dass so viele Fans, Mannschaften und Sportler
  wie möglich teilnehmen können. Wenn aber veranstaltende Länder berechtigte Anlässe
  haben ‑ davon gehe ich aus ‑, Personen nicht einreisen zu lassen, dann ist das eine
  Frage, die diese veranstaltenden Länder beantworten müssen. Insofern würde ich bitten,
  Fragen gegebenenfalls in diese Richtung zu adressieren. Klar, das müssen die Amerikaner
  beantworten. Aber es geht ja auch um Fairness und Wettbewerbsgleichheit. Wenn Fans
  bestimmter Nationen en bloc nicht einreisen dürfen, dann könnte man ja auch sagen,
  dass es kein fairer Wettbewerb mehr ist. Wie ich gerade gesagt habe, ist es natürlich
  wünschenswert, dass so viele Fans sowie Sportlerinnen und Sportler wie möglich an
  ‑ ich mache es jetzt einmal allgemeiner, gar nicht nur auf diese Weltmeisterschaft
  bezogen ‑ sportlichen Wettkämpfen teilnehmen können. Die Regelung der Einreise obliegt
  aber den veranstaltenden Ländern. Natürlich spielt auch der Sport eine Rolle ‑ in
  diesem Fall die FIFA, die sich gegebenenfalls mit den Veranstaltern dazu auseinandersetzen
  muss. Wir können das zur Kenntnis nehmen, haben aber keinerlei Möglichkeiten, darauf
  Einfluss zu nehmen, und halten das auch nicht für nötig. Meine Frage bezieht sich
  direkt darauf. FIFA-Chef Infantino hat ja schon erklärt, er sei nicht zuständig.
  Die Einreiseeinschränkungen, ‑beschränkungen bzw. ‑verhinderungen betreffen ja nicht
  nur Fans. Es betrifft Mannschaften. Es betrifft Schiedsrichter. Das heißt, das gesamte
  Gefüge dieser Weltmeisterschaft ist unter dem Fairnesskriterium doch ins Wanken
  geraten. Warum ist die Bundesregierung als Regierung einer, sagen wir einmal, „lead
  nation“ in Sachen Weltfußball nicht in der Lage, gegenüber der US-Regierung mindestens
  verbal oder schriftlich darauf zu dringen, darum zu bitten, eine faire Durchführung
  dieser Weltmeisterschaft zu ermöglichen? Warum sagen Sie nur „wir nehmen das zur
  Kenntnis“? Sie haben doch die Möglichkeit. Es freut mich natürlich sehr, was Sie
  uns alles an Möglichkeiten und Einfluss zumessen. Aber wir müssen die Dinge doch
  ein wenig abschichten und separat betrachten. Ich habe Ihnen gerade den Grundsatz
  gesagt, dass es natürlich wünschenswert ist, dass so viele Sportlerinnen und Sportler
  und auch Fans wie möglich ungehindert an Sportveranstaltungen teilnehmen können.
  Aber es liegt nicht in unserem Einfluss, was für eine Art von Sicherheitserkenntnissen
  oder dergleichen in den veranstaltenden Ländern herrschen. Das ist dann eine Frage,
  die Sie ‑ dabei gibt es sich gleich die Hand mit der Autonomie des Sports ‑ an die
  veranstaltenden Sportverbände richten müssten, weil das die Frage nach sich zieht,
  in welchen Ländern Veranstaltungen stattfinden. Es ist nicht die Rolle der Bundesregierung,
  das einzuschätzen, sondern ich kann nur noch einmal das unterstreichen, was ich
  jetzt auf die letzten zwei Fragen schon gesagt habe: Es ist wünschenswert, aber
  nicht von uns beeinflussbar und am Ende auch deshalb nicht zu beurteilen. Wenn wir
  schon dabei sind: Können Sie uns denn berichten, dass es innerhalb der Bundesregierung
  oder des Kanzleramts auch eine Art Tippspiel gibt, an dem vielleicht auch der Kanzler
  teilnimmt? Was wäre denn vielleicht das wünschenswerte Ziel aus Sicht des Kanzlers
  und der Bundesregierung, das die DFB-Elf erreichen sollte? Sie wissen ja, dass der
  Bundeskanzler ein bekennender, um nicht zu sagen ein leidenschaftlicher Fußballfan
  ist. Dementsprechend freut er sich natürlich auf die Fußball-Weltmeisterschaft,
  insbesondere auf die Spiele der deutschen Mannschaft. Sie können davon ausgehen,
  dass er die Spiele natürlich, so das irgendwie möglich ist, verfolgen wird und,
  sollte das aus irgendeinem bisher nicht bekannten Grund nicht möglich sein, natürlich
  engstens über den Verlauf informiert wird. Was die Frage nach möglichen Tippspielen
  innerhalb des Kanzleramtes oder auch der Ministerien angeht, kann ich Ihnen das
  nicht beantworten. Das sind selten offizielle Vorgänge, sondern ‑ Sie kennen das
  vermutlich bei Ihnen aus den Redaktionen auch ‑ privat organisierte Zusammenschlüsse.
  Wer dabei möglicherweise in welchem Mitglied ist und mit tippt, kann ich Ihnen nicht
  sagen. Mich würde beim Thema China interessieren, welche Einfuhrbeschränkungen es
  eigentlich noch für Agrargüter aus Deutschland gibt und welches Volumen das hat.
  Es hat auf den letzten Kanzlerreisen, auch schon bei Herrn Scholz, immer wieder
  das Versprechen gegeben, dass China seine Märkte für bestimmte Produkte wieder öffnen
  würde, von Äpfeln bis Hühnerfüße, glaube ich. Können Sie uns sagen, wo dabei noch
  Restriktionen bestehen? Ja, das kann ich gern machen. Vielleicht zur Einordnung:
  Für Äpfel und Hühnerfüße ist der Markt geöffnet. Bei Hühnerfüßen wurde er im Rahmen
  der Kanzlerreise ‑ ich glaube, im Februar war es ‑ geöffnet. Bei Äpfeln ist es schon
  seit 2024 wieder möglich, sie nach China zu exportieren. Unser Fokus, unser großes
  Ziel ist ganz klar der Schweinefleischexport. Wie ich gerade schon gesagt habe,
  wurden die Exporte nach China nach dem Ausbruch der Afrikanischen Schweinepest bei
  uns 2020 gesperrt. Vor der Sperre, also 2019, erreichten die Schweinefleischexporte
  aus Deutschland ungefähr 600 000 Tonnen. Das hat einen Wert von 1,2 Milliarden Euro.
  Nach Angaben der Branche kann die Öffnung des chinesischen Marktes hier pro Mastschwein
  einen Effekt von 6 bis 7 Euro haben. Ein Mastschwein mit 100 Kilogramm Schlachtgewicht
  erzielt derzeit ungefähr einen Preis von 150 bis 160 Euro. Das wäre also nicht unwesentlich.
  Es gibt jetzt mehrere Fragen im Zusammenhang mit der Zeitplanung . Nachdem sich
  bei der Gesundheit, bei den gesetzlichen Krankenkassen größere Lücken auftun, könnte
  es sein, dass der Zeitplan noch einmal verschoben wird. Bisher ist die Abstimmung
  ja geplant. Ich weiß nicht, ob ich jetzt Herrn Hille als Übergeordneten oder das
  Gesundheitsministerium frage. Herr Bovenschulte hat schon gesagt, dass es ein Vermittlungsverfahren
  geben werde, wenn am Zeitplan mit der Verabschiedung am 26. Juni festgehalten wird.
  Glaubt man, dass man das noch vermeiden kann, auch wenn der Bundesrat nicht zustimmungspflichtig
  ist? Es würde es ja trotzdem in der Umsetzung verzögern. Darauf kann ich gern antworten.
  Vielleicht fange ich von hinten an: Das Vermittlungsverfahren ist ja eine laufende
  Diskussion. Dazu haben wir jetzt noch keine konkreten Handlungen gesehen. Das wird
  im Bundesrat diskutiert werden. Es ist heute vielleicht auch Thema im Bundesrat,
  welche Forderungen überhaupt gestellt werden, auf welche Anträge man sich unter
  den Ländern überhaupt einigt. Was den Zeitplan betrifft, möchte ich mich jetzt nicht
  auf konkrete Daten festlegen, aber im Prinzip halten wir am Zeitplan fest. Er ist
  ambitioniert. Im Herbst werden die Zusatzbeiträge berechnet werden. Das Ziel bleibt,
  dass die Maßnahmen im Gesetz in diese Berechnung mit einfließen. Wenn ich mich nicht
  ganz täusche, ist die Abstimmung im Bundestag schon für den 26. Juni angesetzt.
  Dazu müsste ich mich noch einmal kundig machen. Das steht heute so in der Bundestagsplanung.
  Das ist gut möglich. Das kann ich gern nachliefern. Aber wir haben, wie gesagt,
  die Berechnung der Zusatzbeiträge im Herbst im Blick. Herr Elsässer, ist die Ministerin
  bereit, am Gesetzentwurf noch Änderungen für den Pharmabereich vorzunehmen? Es hat
  doch sehr drastische Warnungen einzelner Unternehmen gegeben, dass sie ihre Investitionen
  in Deutschland wegen der geplanten Neuregelung für Medikamentenpreise deutlich zusammenstreichen.
  Auch diese Diskussion verfolgen wir mit. Sie ist uns durchaus bewusst. Ich kann
  Ihnen jetzt keine konkreten Details zu Änderungen von Maßnahmen im Gesetz mitteilen.
  Das alles ist Teil der parlamentarischen Beratung. Wir glauben, dass Deutschland
  insgesamt ein attraktiver Standort für die Pharmabranche ist und auch bleibt. Herr
  Wentzel, darf ich die Frage an Sie weitergeben? Ich glaube, Ihre Ministerin hat
  sich dazu heute geäußert. Haben Sie konkrete Vorstellungen, wie man der Pharmabranche
  unter die Arme greifen kann? In der Tat ist die Pharmabranche eine Schlüsselindustrie
  für Deutschland. Die Worte der Ministerin stehen natürlich für sich. Ich würde auch
  davon absehen, zu diesem Stadium des Verfahrens hier einzelne Maßnahmen in Gesetzes,
  die in anderer Federführung liegen, zu kommentieren. (zum Treffen der Bundesregierung
  mit Arbeitgeberverbänden und Gewerkschaften zu anstehenden Reformvorhaben ) Es geht
  um das Treffen am Mittwoch. Der Kanzler hat sich gestern dazu geäußert und in der
  Regierungserklärung gesagt, es sei gut gewesen. Es gab auch ein Statement, in dem
  stand, dass es den Standort Deutschland gestärkt habe. Herr Hille, ich frage Sie
  jetzt, da Sie ja dafür bekannt sind, auch gern einmal Tacheles zu reden: Wie war
  das Treffen am Mittwoch denn nun wirklich? Ich überlege die Formulierung, um Ihrem
  Anspruch, Tacheles zu reden, gerecht zu werden. Aber was sollte ich den Worten des
  Bundeskanzlers von gestern noch hinzufügen? Der Bundeskanzler hat darauf verwiesen,
  dass es ein konstruktiver, konzentrierter Austausch in sehr guter Atmosphäre gewesen
  ist. Ich kann Ihnen sozusagen noch einmal das Ideendach bauen. ‑ Sie schütteln mit
  dem Kopf. Das brauchen Sie nicht. Es war wichtig ‑ das war auch das Ziel dieses
  Termins ‑, erstens miteinander ins Gespräch zu kommen, weil die Aufgaben, die vor
  uns liegen, so groß sind und das ganze Land und viele Bereiche betreffen, und zweitens
  bei diesem Termin ein gemeinsames Verständnis von dem zu entwickeln, was vor uns
  liegt. Das hat ‑ das hat der Bundeskanzler ja gesagt ‑ in konstruktiver, konzentrierter,
  guter Atmosphäre stattgefunden. Noch als Anmerkung zu den Äußerungen, die von anderen
  Teilnehmern jetzt zu lesen waren, nicht von Seiten der Politik, sondern von Arbeitgebern
  und Arbeitnehmervertretern, also den Gewerkschaften: Sie scheinen sich meiner Auffassung
  nach damit zu decken, wie wir das Gespräch beurteilen. Aber können Sie für die Bundesregierung
  vielleicht sagen, bei welchen Themen die Bundesregierung die Sozialpartner am weitesten
  auseinandersieht, oder zumindest, wo die größten Herausforderungen bestehen? Ich
  will Sie wirklich nicht über Gebühr strapazieren. Sie kennen die Themen, um die
  es geht. Sie wissen, was da in Rede steht. Ich werde jetzt keine Qualifizierung
  machen und sagen, bei dem einen Thema sei es ein bisschen so, bei dem anderen Thema
  ein bisschen so, sondern wir haben eine gemeinsame Sicht auf die Herausforderungen
  hergestellt, die vor uns als Gesellschaft und natürlich vor uns als Politik stehen.
  Das ist ein großer, wichtiger Schritt in dem Prozess, der in den kommenden Wochen
  stattfindet. Von allen Seiten wurde betont, man wolle weitere Gespräche führen.
  Nennen Sie uns doch ein wenig den Zeitplan. Denn die Zeit drängt ja. Pi mal Daumen
  haben wir noch zwei Wochen bis zum 1. Juli. Können Sie uns sagen, in welchen Formaten
  und wann man sich wieder zusammensetzt? Auch dazu kann ich auf das verweisen, was
  der Bundeskanzler gesagt hat. Wir haben es auch in der Pressemitteilung nach dem
  Gespräch formuliert. Wir werden den Dialog zu einzelnen Themen des Treffens fortführen
  und zu gegebener Zeit darüber informieren, in welcher Form diese Gespräche stattfinden.
  Habe ich es richtig verstanden, dass die gegebene Zeit noch nicht gekommen ist?
  Das ist Ihre Ableitung, aber ich würde dem nicht widersprechen. Wir werden zu gegebener
  Zeit darüber informieren, in welcher Form ‑ das beinhaltet auch das Wann ‑ solche
  Gespräche stattfinden. Aber noch einmal zur Einordnung: Wir fokussieren uns immer
  sehr stark auf einzelne Formate und einzelne Termine. Das heißt nicht, dass es nicht
  auch jenseits dieser Termine regelmäßige Kontakte gibt, mit Arbeitnehmervertreterinnen
  und ‑vertretern, also Gewerkschaftsvertretern, mit den Vertretern der Wirtschaftsverbände.
  Natürlich gibt es zwischen Politik, der Bundesregierung, und wichtigen Playern der
  Gesellschaft auf Arbeitgeber- und Arbeitnehmerseite ständig Kontakte. Dafür braucht
  es nicht zwingend immer derartige Formate. Solche Formate sind wichtig, um dann
  mehrere zusammenzuführen. Aber gehen Sie davon aus, dass wir in einem regelmäßigen
  Austausch mit den relevanten Playern in diesen Bereichen stehen. Ich möchte zu der
  Entscheidung der Taskforce, dass der Tankrabatt auslaufen soll, fragen. Hält sich
  die Bundesregierung daran? Ist das das letzte Wort? Läuft er aus? Ja, oder an den,
  der es beantworten möchte. Erst einmal ist, denke ich, immer wieder wichtig zu sagen:
  Der Tankrabatt gilt noch. Er ist für Mai und Juni beschlossen. Wir sprechen hier
  regelmäßig, um nicht zu sagen, in fast jeder Regierungspressekonferenz, über die
  Lage. Wir analysieren das und evaluieren sehr genau, was bei den Energieträgern
  und bei den Spritpreisen passiert. Die Regierungsfraktionen haben sich jetzt deutlich
  positioniert und öffentlich geäußert. Dem muss ich von dieser Stelle aus nichts
  hinzufügen. Aber die Frage war, ob das das letzte Wort war. Wird vielleicht doch
  noch einmal darüber nachgedacht, wenn sich die Lage in den nächsten zwei Wochen
  ändert? Die Entscheidungen werden am Ende im Deutschen Bundestag getroffen. Die
  Entscheidung für den ersten Tankrabatt hat die Bundesregierung vorgelegt. Das wird
  dann im Deutschen Bundestag beschlossen. So ist es in unserem System. Wenn die Regierungsfraktionen
  sich so klar positionieren, dann habe ich dem von dieser Stelle aus jetzt nichts
  hinzuzufügen. Natürlich können Sie davon ausgehen, dass diese Positionierung in
  die Beratungen einfließt. Auch wenn Sie gern Tacheles hören, will ich diesbezüglich
  nicht weiter gehen. Ich habe eine Nachreichung. Es bleibt dabei, dass ich jetzt
  keine einzelnen Termine kommentiere. Aber das Ziel ist, das GKV-Beitragssatzstabilisierungsgesetz
  vor der Sommerpause zum Abschluss zu bringen. (zum Gespräch der Botschafter Deutschlands,
  Frankreichs und Großbritanniens mit dem stellvertretenden Außenminister der Russischen
  Föderation in Moskau ) Warum hat das Treffen stattgefunden? Was ist dabei herausgekommen?
  Wird es Folgetreffen geben? Ich kann es vielleicht sehr kurz machen. Auf der Webseite
  unserer Botschaft Moskau gibt es eine Erklärung. Sie ist in russischer Sprache abgefasst,
  aber ich kann Ihnen kurz wiedergeben, was wir dazu kommuniziert haben. Es ist richtig,
  dass sich die Botschafter der sogenannten E3-Staaten ‑ das sind Deutschland, Frankreich
  und Großbritannien ‑ gestern mit dem stellvertretenden Außenminister Galusin getroffen
  haben. Sie haben die jüngste Eskalation Russlands im Zuge des russischen Angriffskriegs
  gegen die Ukraine und auch die verstärkten Desinformationskampagnen, die wir in
  diesem Kontext wahrnehmen, sehr deutlich verurteilt. Sie haben in Antwort auf die
  russische Seite auch das E3-Statement der E3-Staats- und ‑Regierungschefs von Sonntag
  erläutert. Dabei ging es vor allem auch um den Punkt, dass die E3 den Aufruf von
  Präsident Selenskyj zu direkten Gesprächen zwischen Russland und der Ukraine unterstützen,
  und zwar unter einer aktiven Beteiligung der USA und Europas. Das wurde dort noch
  einmal mit Nachdruck erläutert, mit der Perspektive eines Waffenstillstandes und
  um weitere Verhandlungen zu ermöglichen. Wissen Sie, ob es Folgetreffen geben wird?
  Das kann ich Ihnen jetzt nicht sagen. Das ist ein Treffen, das gestern stattgefunden
  hat, zu genau diesen Aspekten und Themen. Das ist der aktuelle Stand. Aber grundsätzlich
  wissen Sie ja, dass es der Bundesregierung ein Kernanliegen ist, dass dieser Angriffskrieg
  bald endet. Das könnte Wladimir Putin jederzeit tun. Dem geben wir im Rahmen des
  Statements, aber auch im Rahmen dieses Treffens Nachdruck. Sie können es auf der
  Webseite unserer Botschaft in Moskau noch einmal nachlesen. Frau Deschauer, in Europa
  gibt es ja eine Debatte darüber, wer eigentlich für Europa mit Russland spricht.
  Ist im Rahmen der EU abgesprochen worden, dass gerade diese drei Botschafter losmarschieren?
  Ist das quasi eine Vorwegnahme, dass im E3-Format mit Moskau gesprochen werden soll?
  Das würde ich so gar nicht schlussfolgern wollen, sondern das war ein wichtiger
  Termin, der auch schon vor längerer Zeit terminiert worden war. Ich habe ja erläutert,
  was auch Thema des Gesprächs war. Sie können sich sicher sein, dass die Bundesregierung,
  aber auch die Partner im E3-Format zu allen relevanten Fragestellungen, die die
  Sicherheit, die Verteidigungsfähigkeit und die Perspektive eines friedlichen Europas
  angehen, in regelmäßigem Austausch mit den anderen europäischen Partnern stehen.
  Ich denke, es ist kein Geheimnis, dass die Gruppierung dieser drei Staaten in verschiedenen,
  auch anderen Kontexten ein sehr gut funktionierendes Arbeitsformat ist. Aber natürlich
  werden alle relevanten Fragestellungen, die unseren Frieden und die Sicherheit in
  Europa betreffen, auch im breiteren Rahmen besprochen und abgestimmt. Nur damit
  ich keinen Fehler mache: Ging die Initiative von den E3 aus, von den Botschaftern,
  oder wurden sie einbestellt? Frau Deschauer, die deutsche Journalistin Frau Michelmann
  ist in Syrien seit fünf Monaten in Haft . Mich würde interessieren, wie der Stand
  bezüglich ihrer Rückkehr ist bzw. wann Sie das letzte Mal konsularischen Kontakt
  zu der Inhaftierten hatten. Was den letzten Teil Ihrer Frage angeht, müsste ich
  mich noch einmal im Laufe dieser Sitzung schlaumachen. Der Stand ist meines Wissens
  unverändert und auch dahingehend unverändert, dass wir uns als Bundesregierung mit
  Hochdruck dafür einsetzen. Frau Michelmann hat ja vor einigen Wochen erstmals Kontakt
  mit unserer Botschaft, die vor Ort tätig ist, erhalten können. Sie wissen, dass
  wir mit der Botschaft in Damaskus vor Ort sind und in Beirut in der Region. Wir
  setzen uns hochrangig ein. Aber ich habe jetzt, glaube ich, keinen aktuell neueren
  Stand über die letzte Aussprache hinaus, die wir hier in der Bundespressekonferenz
  geführt hatten. Trotzdem verwundert es ja. Sie ist ja jetzt seit fünf Monaten in
  Haft. Das ist ja recht lange. Es ist auch nicht so ganz klar, was ihr jetzt vorgeworfen
  wird. Wieso macht sich nicht der Außenminister persönlich für ihre Rückkehr stark?
  Liegt das an ihrer politischen Haltung, oder liegt es daran, dass es übergelagerte
  Interessen im deutsch-syrischen Verhältnis gibt, zum Beispiel, was die Rückkehr
  von Flüchtlingen betrifft, die wichtiger als dieses Einzelschicksal einer deutschen
  Journalistin sind? Ich glaube, Sie verbinden schon Ihre Fragestellungen mit verschiedenen
  Behauptungen, denen ich mich jetzt erst einmal gar nicht anschließen würde. Ich
  kann Ihnen vielmehr noch einmal sagen, dass sich die Bundesregierung auch hochrangig
  für eine deutsche Staatsangehörige einsetzt. Das geht damit einher, dass wir sie
  konsularisch betreuen. Ich kann Ihnen mitteilen ‑ das habe ich jetzt noch einmal
  aktueller von den Kollegen bekommen ‑, dass kürzlich weitere Haftbesuche durch Beschäftigte
  der deutschen Botschaft in Damaskus möglich waren. Sie wird von uns konsularisch
  betreut. Das ist das, was ich Ihnen dann auch aus Gründen der Persönlichkeitsrechte
  an dieser Stelle sagen kann. Das haben wir Ihnen, glaube ich, schon einmal hier
  erläutert. Frau Michelmann war ja zunächst entführt worden und dann nach längerem
  Verschwinden aufgetaucht. Können Sie uns etwas darüber sagen, was ihr eigentlich
  von denen, die sie inhaftieren, vorgeworfen wird? Das kann ich nicht. Das gehört
  zu dem Gesamtthemenkomplex, den ich, glaube ich, hier schon einmal erläutert habe,
  genauso wie meine Kollegen. Wir setzen uns auch hochrangig ein, und wir sind vor
  Ort konsularisch vertreten. Konsularischer Zugang besteht. Für alles Weitere bitte
  ich um Verständnis, dass ich mich dazu hier nicht äußern kann. Liegt dieser Satz
  „Das kann ich Ihnen nicht sagen“ darin begründet, dass es offenbar noch keine offizielle
  Anklage gegen Frau Michelmann gibt, oder sind es andere Gründe? Das liegt an dem
  Grund, den wir, glaube ich, seit Tag eins hier erwähnen: Wir werden auch aus Gründen
  der Persönlichkeitsrechte solche Konsularfälle nicht weiter öffentlich kommentieren.
  Dafür bitte ich um Verständnis. Das ist eine sehr grundsätzliche Angelegenheit.
  Ich hätte eine Frage an Frau Deschauer bezüglich einer Äußerung der EU-Außenbeauftragten
  Kaja Kallas. Die soll in Mexiko Israels Politik in den besetzten Gebieten mit Südafrikas
  Apartheidpolitik verglichen haben. Ich hätte ganz gerne gewusst, ob Sie sich diese
  Einordnung zu eigen machen. Das würde ich nicht tun. Ich würde aber auch grundsätzlich
  nicht jede Aussage von anderen Außenministerinnen und Außenministern oder der Hohen
  Repräsentantin kommentieren. Aber, wenn ich kurz nachfragen darf, Sie spricht da
  ja für Europa. Ist das ein Problem? Ich habe die Aussage tatsächlich jetzt auch
  so nicht vorliegen. Das heißt, wenn ich mir das im Rahmen dieser Sitzung noch näher
  anschauen kann ‑ ‑ ‑ Aber ich bitte auch um Verständnis dafür, dass wir nicht jede
  einzelne Aussage kommentieren. Die grundsätzliche Haltung der Bundesregierung zu
  dem Konflikt kennen Sie, und das ist die Haltung, die wir hier vertreten. Darauf
  würde ich Sie gerne verweisen. Wir haben uns hier schon darüber ausgetauscht. Ich
  habe Fragen zu zwei verschiedenen Komplexen. Ich beginne mit dem einen, Frau Deschauer.
  Der US-amerikanische Verteidigungsminister Pete Hegseth hat nach einem Besuch in
  Guantanamo gefordert oder die Meinung geäußert, dass sämtliche dort noch einsitzenden
  15 Häftlinge hingerichtet werden sollen , auch ohne vorheriges Gerichtsurteil. Ist
  jemand, der solche Auffassungen vertritt, eigentlich noch ein Gesprächspartner für
  die Bundesregierung? Der Gesprächspartner für den Außenminister ist der amerikanische
  Außenminister. Aber ich sage Ihnen sehr grundsätzlich, dass Deutschland überall
  in der Welt mit Nachdruck gegen die Todesstrafe eintritt. Das tun wir öffentlich
  und nichtöffentlich, und das ist, glaube ich, eine Grundsatzposition, die ich hier
  noch einmal unterstreichen kann. In diesem Fall ist es ja aber ein Unterschied,
  ob Todesstrafen, auch wenn man prinzipiell gegen sie ist, immerhin nach einem Gerichtsverfahren
  verhängt werden. Das, was Hegseth gefordert hat, ist ja die Todesstrafe ohne Gerichtsverfahren.
  Das sind Hinrichtungen. Ist das nicht eine andere Art von Aussage und dann vielleicht
  auch Beziehung? Ich glaube, ich bleibe bei dem, was ich gesagt habe. Es ist sehr
  klar und deutlich, wie sich die Bundesregierung in dieser Angelegenheit positioniert.
  Ein zweites Thema, das geht an das Wirtschaftsministerium: Trifft es zu, dass das
  Wirtschaftsministerium für externe, sage ich einmal, Imageberatung durch zwei Agenturen
  pro Jahr mehr als zwei Millionen Euro ausgeben möchte , über mehrere Jahre hinweg?
  Ich kann bestätigen, dass wir eine Kommunikationsagentur im Rahmen einer öffentlichen
  Ausschreibung engagiert haben. Das ist eine Rahmenvereinbarung. Das heißt, die dort
  festgelegten Summen sind der maximale Rahmen, der ‑ je nachdem, wie viele Leistungen
  abgerufen werden ‑ dann die Obergrenze festlegt. Aber in welcher Höhe tatsächlich
  Mittelabflüsse entstehen, fußt eben darauf, wie viele Leistungen tatsächlich abgerufen
  werden; vielleicht so weit. Aber nach meinem Kenntnisstand haben Sie gegenüber dem
  Haushaltsausschuss bis zu 2,2 Millionen Euro pro Jahr mit mehrfacher Verlängerung,
  was sich dann auf acht bis neun Millionen summieren kann, angemeldet. Wie verträgt
  sich diese Ausgabe, unabhängig davon, wie viel dann nachher tatsächlich abgerufen
  wird, mit dem Beschluss des Koalitionsvertrages, Kosten für externe Beratungen zu
  senken? Es ist grundsätzlich nicht unüblich, dass sich die Bundesregierung dort,
  wo spezifische Expertise notwendig ist, extern unterstützen lässt. Am Ende kann
  das auch günstiger sein, dadurch, dass eben nur die Leistungen, die man ganz spezifisch
  braucht, beauftragt werden und nicht für alles Experten in der Bundesregierung vorgehalten
  werden. Darf ich noch eine Nachfrage stellen? Die Frage war ja aber gewesen, ob
  das, was Sie sich genehmigen lassen wollen, in der Substanz dem Passus der Verabredung
  des Koalitionsvertrages widerspricht, solche Kosten zu senken. Was ist die Begründung
  dafür? Im Koalitionsvertrag ist eine grundsätzliche politische Entscheidung getroffen
  worden, die nicht vorwegnimmt, dass in einzelnen konkreten Bedarfsfällen natürlich
  externe Leistung weiterhin durch die Bundesregierung genutzt werden kann. Ich hätte
  auch noch eine Frage an das Wirtschaftsministerium, und zwar betrifft das die Ölreserven
  . Es hat gestern einen Bericht darüber gegeben, dass die freigegebenen Ölreserven
  fast aufgebraucht seien, also vom Markt aufgenommen wurden. Ich hätte ganz gerne
  gewusst, ob Sie uns da Zahlen nennen können und ob jetzt weitere Mengen von Deutschland
  freigegeben werden. Das kann ich gerne einmal einordnen. In der Tat ‑ Sie erinnern
  sich vielleicht ‑ hatten wir im Rahmen der Internationalen Energieagentur, IEA,
  vereinbart, dass sämtliche Mitgliedstaaten zu Beginn des Irankonflikts aus ihren
  strategischen nationalen Ölreserven Vorräte freigeben, um den Markt zu stabilisieren.
  Auf Deutschland entfiel dabei ein Anteil von 2,6 Millionen Tonnen oder 19,51 Millionen
  Barrel. Diese Freigabe aus den deutschen Vorräten haben wir in Chargen vorgesehen,
  und in einer ersten Charge oder Tranche wurden eben 400 000 Tonnen Rohöl, 150 000 Tonnen
  Dieselkraftstoff und 50 000 Tonnen Kerosin freigegeben. Diese Mengen wurden jetzt
  nahezu vollständig vom Markt aufgenommen, aber auch in einer Weise, die uns zeigt,
  dass für eine weitere Freigabe derzeit kein Bedarf besteht. Nichtsdestoweniger können
  wir, wenn sich zeigt, dass der Markt weitere Mengen aufnehmen würde, eben ohne Weiteres
  weitere Tranchen bis zu diesen 2,6 Millionen Tonnen, die ich am Anfang genannt habe,
  freigeben. Diese 2,6 Millionen Tonnen sind auch nicht die gesamten nationalen Ölreserven.
  Das heißt, wir befinden uns da weiterhin in einer sicheren Versorgungslage. Das
  war ja hier vor einigen Wochen schon einmal Thema gewesen. Damals hieß es, dass
  die Mengen nicht abgerufen wurden. Man hat das damit begründet, dass die Marktlage
  hier in Deutschland eben sehr entspannt sei. Deswegen wundert es mich jetzt so ein
  bisschen, dass der Markt, oder wer immer das jetzt gekauft hat, diese Ölmengen doch
  benötigt hat, sonst hätte er sie ja nicht gekauft. Die Marktpreise waren ja auch
  relativ hoch. Was ist Ihre Erklärung dafür, dass das jetzt doch alles aufgekauft
  wurde? Ich kann die Preisentwicklung über die Zeit hinweg nicht genau einschätzen.
  Dazu liegen mir die Zahlen nicht vor. Aber was wir damals gesagt haben, vor einigen
  Wochen, war eben, dass sie nicht sofort aufgenommen wurden. Das war damals richtig.
  Jetzt wurden sie eben im Laufe der Wochen nach und nach vom Markt absorbiert. Genau,
  aber meine Frage bezog sich darauf, warum. Denn ich verstehe die Argumentation nicht.
  Entweder der Markt braucht es nicht, und dann muss man auch keine weiteren Mengen
  freigeben, oder der Markt braucht es doch, weil er nämlich die ganzen Ölreserven,
  die freigegeben wurden, anscheinend aufgekauft hat. Der Markt hat keine physischen
  Knappheiten, die dazu führen, dass sämtliche Mengen, die in den Markt gegeben werden,
  sofort aufgekauft werden. Aber das heißt ja nicht, dass ein Angebot, das da ist,
  nicht im Laufe der Zeit im Rahmen der betriebswirtschaftlichen Prozesse der Unternehmen
  auch genutzt werden kann. Auch an das Wirtschaftsministerium : Es gibt heute Mittag
  eine große Demo von Stahlkochern vor Ihrem Ministerium . Die Stimmung ist ziemlich
  aufgebracht. Dabei wurde auch ein Sarg getragen, der die Stahlindustrie symbolisieren
  soll. Können Sie die Wut der Stahlkocher verstehen? Ich kann grundsätzlich sagen,
  dass die Stahlindustrie eine zentrale Grundstoffindustrie ist und eine wichtige
  Rolle für vollständige Wertschöpfungsketten in Europa hat. Deutschland ist der größte
  Stahlproduzent der EU, und die Branche befindet sich in einer herausfordernden wirtschaftlichen
  Lage. Das erkennen wir ausdrücklich an. In den vergangenen Jahren haben die deutschen
  und europäischen Stahlunternehmen wichtige Wettbewerbsfähigkeit und Marktanteile
  verloren. Der Koalitionsvertrag formuliert deswegen klar das Ziel, die Stahlindustrie
  am Standort Deutschland zu erhalten und weiterzuentwickeln. Dafür ergreifen wir
  umfassende Maßnahmen in zentralen Handlungsfeldern, wie eben bei den Energiepreisen,
  bei Leitmärkten und bei der Unterstützung der Dekarbonisierung.'
