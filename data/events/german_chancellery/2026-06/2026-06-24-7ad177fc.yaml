title: E5 Leaders’ Statement
text: 'Against the backdrop of the current threats and challenges to the security
  environment, leaders of France, Germany, Italy, Poland and United Kingdom met today
  in Berlin. The Secretary General of NATO joined the meeting from Washington. Leaders
  affirmed their unwavering commitment to Euro-Atlantic security and the transatlantic
  bond, recognising the vital role the US continues to play in the Alliance. They
  agreed to collectively work towards a successful NATO summit in Ankara hosted by
  President Erdogan on 7-8 July 2026. They expressed their strong determination to
  build a stronger Europe in a stronger NATO and to pursue their respective defence
  industrial endeavors in the closest possible cooperation. Leaders decided to move
  forward in five specific areas: Höflichkeitsübersetzung : Erklärung der Staats-
  und Regierungschefs der E5 Vor dem Hintergrund der aktuellen Bedrohungen und Herausforderungen
  für die Sicherheitslage haben sich die Staats- und Regierungschefinnen und -chefs
  Deutschlands, Frankreichs, Italiens, Polens und des Vereinigtes Königreichs heute
  in Berlin getroffen. Der Generalsekretär der NATO nahm an dem Treffen von Washington
  aus teil. Die Staats- und Regierungschefinnen und -chefs bekräftigten ihr unerschütterliches
  Bekenntnis zur euro-atlantischen Sicherheit und zum transatlantischen Verhältnis,
  wobei sie anerkannten, dass die Vereinigten Staaten weiterhin eine entscheidende
  Rolle im Bündnis spielen. Sie kamen überein, gemeinsam auf einen erfolgreichen NATO-Gipfel
  am 7. und 8. Juli in Ankara mit Präsident Erdoğan als Gastgeber hinzuarbeiten. Sie
  brachten ihre feste Entschlossenheit zum Ausdruck, ein stärkeres Europa innerhalb
  einer stärkeren NATO aufzubauen und bei ihren jeweiligen rüstungsindustriellen Anstrengungen
  so eng wie möglich zusammenzuarbeiten. Die Staats- und Regierungschefinnen und -chefs
  beschlossen Fortschritte in fünf Bereichen:'
