title: Statement by President Emmanuel Macron, Chancellor Friedrich Merz, Prime Minister
  Giorgia Meloni and Prime Minister Keir Starmer
text: 'We warmly welcome the announcement of the memorandum of understanding between
  the US and Iran. We congratulate the United States, the Iranian government and all
  those involved, including Pakistan, Qatar and all other mediators, on this diplomatic
  breakthrough. This is a moment of opportunity to restore regional stability and
  stabilise the global economy. It is now vital that the detailed negotiations are
  concluded and this agreement is implemented rapidly and comprehensively. We are
  ready to support that effort. The urgent re-opening of the Strait of Hormuz with
  unconditional and unrestricted freedom of navigation is essential. We are committed
  to playing our part to achieve this – in accordance with our respective constitutional
  requirements – including through a strictly defensive and independent mission to
  reassure commercial shipping and conduct mine clearance operations. Iran must never
  acquire a nuclear weapon. We stand ready to work with the US, Iran and the IAEA
  to this end. We are prepared to lift relevant sanctions in response to clear, verifiable
  steps by Iran on its nuclear programme. We will work intensively with the US, Iran
  and regional partners to seize this moment, maintain momentum and achieve a long-term
  diplomatic settlement. We also reaffirm our full support to the stability, sovereignty
  and territorial integrity of Lebanon and the importance of a robust ceasefire. List
  of signatory countries: Albania, Australia, Belgium, Bulgaria, Canada, Comoros,
  Croatia, Cyprus, Czechia, Denmark, Dominican Republic, Estonia, Finland, Greece,
  Hungary, Iceland, Ireland, Japan, Kosovo, Latvia, Lithuania, Malta, Moldova, Montenegro,
  Netherlands, North Macedonia, Norway, Poland, Portugal, Romania, Serbia, Slovenia,
  Spain, Sweden, Trinidad and Tobago - Deutsche Höflichkeitsübersetzung - Erklärung
  von Präsident Emmanuel Macron, Bundeskanzler Friedrich Merz, Ministerpräsidentin
  Giorgia Meloni und Premierminister Keir Starmer Wir begrüßen ausdrücklich die Ankündigung
  einer Absprache zwischen den USA und Iran. Wir gratulieren den Vereinigten Staaten,
  der iranischen Regierung sowie allen Beteiligten, darunter Pakistan, Katar und alle
  anderen Vermittler, zu diesem diplomatischen Durchbruch. Wir haben jetzt die Chance,
  regionale Stabilität wiederherzustellen und die Weltwirtschaft zu stabilisieren.
  Es kommt nun darauf an, die Verhandlungen im Einzelnen abzuschließen und diese Vereinbarung
  schnell und umfassend umzusetzen. Wir sind bereit, diese Bemühungen zu unterstützen.
  Die dringliche Öffnung der Straße von Hormus einhergehend mit bedingungsloser und
  uneingeschränkter Freiheit der Schifffahrt ist unabdingbar. Wir sind entschlossen,
  unseren Teil zur Erreichung dieses Ziels im Einklang mit unseren jeweiligen verfassungsrechtlichen
  Erfordernissen beizutragen, auch durch eine ausschließlich defensive und unabhängige
  Mission zur Absicherung der Handelsschifffahrt und zur Minenräumung. Iran darf niemals
  in den Besitz einer Kernwaffe kommen. Wir sind bereit, hierfür mit den USA, Iran
  und der IAEO zusammenzuarbeiten. Wir sind darauf vorbereitet, im Falle klarer, überprüfbarer
  Schritte Irans in Bezug auf sein Atomprogramm einschlägige Sanktionen aufzuheben.
  Wir werden intensiv mit den USA, Iran und den regionalen Partnern zusammenarbeiten,
  um diese Chance zu ergreifen, die Dynamik aufrechtzuerhalten und eine langfristige
  diplomatische Lösung herbeizuführen. Außerdem bekräftigen wir unsere volle Unterstützung
  für die Stabilität, Souveränität und territoriale Unversehrtheit Libanons und betonen
  die Bedeutung eines robusten Waffenstillstands. Liste der Länder, die sich der Erklärung
  angeschlossen haben: Albanien, Australien, Belgien, Bulgarien, Kanada, Komoren,
  Kroatien, Zypern, Tschechien, Dänemark, Dominikanische Republik, Estland, Finnland,
  Griechenland, Ungarn, Island, Irland, Japan, Kosovo, Lettland, Litauen, Malta, Moldau,
  Montenegro, Niederlande, Nordmazedonien, Norwegen, Polen, Portugal, Rumänien, Serbien,
  Slowenien, Spanien, Schweden, Trinidad und Tobago'
