title: Bundesregierung gedenkt zum 12. Mal der Opfer von Flucht und Vertreibung
text: 'Am 20. Juni 2026 begeht die Bundesregierung mit der 12. Gedenkstunde im Konzerthaus
  Berlin den diesjährigen Gedenktag für die Opfer von Flucht und Vertreibung. Seit
  2015 wird mit diesem Gedenktag jährlich am 20. Juni an die Opfer von Flucht und
  Vertreibung weltweit sowie insbesondere an die deutschen Vertriebenen erinnert.
  Die Bundesregierung knüpft mit diesem Datum an den Weltflüchtlingstag der Vereinten
  Nationen an und erweitert das Flüchtlingsgedenken um das Schicksal der Vertriebenen.
  Nach einer Begrüßung durch den Bundesminister des Innern, Alexander Dobrindt, folgt
  ein Film mit Eindrücken der Arbeit des DRK-Suchdienstes nach dem 2. Weltkrieg. Im
  Anschluss moderiert Dominik Tomenendal ein Podiumsgespräch von Mitarbeitern des
  DRK-Suchdienstes und des Volksbundes Deutsche Kriegsgräberfürsorge. Danach stellen
  Jugendliche in einem Film und auf der Bühne ihren Einsatz und ihr ehrenamtliches
  Engagement für den Volksbund Deutsche Kriegsgräberfürsorge vor. Das Schlusswort
  hält der Präsident des Bundes der Vertriebenen, Stephan Mayer. Ablauf 13:00 Uhr
  Beginn der Gedenkstunde Musik Begrüßung Alexander Dobrindt, MdB Bundesminister des
  Innern Film Eindrücke der Arbeit des DRK-Suchdienstes nach dem 2. Weltkrieg Podiumsgespräch
  Mitarbeiter des DRK-Suchdienstes und des Volksbundes Deutsche Kriegsgräberfürsorge
  e. V. Moderation: Dominik Tomenendal Musik Film Jugendliche im Einsatz für Erinnerungskultur
  im Volksbund Deutsche Kriegsgräberfürsorge e. V. Vorstellung Jugendliche zu ehrenamtlichem
  Engagement im Volksbund Deutsche Kriegsgräberfürsorge e. V. Musik Schlusswort Stephan
  Mayer, MdB Präsident des Bundes der Vertriebenen e. V. Nationalhymne Die musikalische
  Gestaltung übernehmen Stipendiatinnen und Stipendiaten der Stiftung Kurt-Sanderling-Akademie
  des Konzerthausorchesters Berlin.'
