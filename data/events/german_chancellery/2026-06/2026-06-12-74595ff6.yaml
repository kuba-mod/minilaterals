title: Im Bundesrat Apotheken stärken und Arzneimittelversorgung sichern
text: Mit dem Gesetzentwurf zur Weiterentwicklung der Apothekenversorgung sollen Apotheken
  gestärkt werden – besonders im ländlichen Raum. Apotheken sind unverzichtbar für
  die Arzneimittelversorgung der Bevölkerung und eine wichtige, unkomplizierte Anlaufstelle
  für Bürgerinnen und Bürger bei Fragen zur Gesundheit. Allerdings stehen vor allem
  kleinere und ländliche Apotheken vor Herausforderungen durch Fachpersonalmangel,
  Strukturwandel und sinkende Wirtschaftlichkeit. Nach dem Bundestag hat nun auch
  der Bundesrat grünes Licht für den Gesetzentwurf zur Weiterentwicklung der Apothekenversorgung
  gegeben. Das Bundeskabinett hatte ihn am 17. Dezember 2025 beschlossen. Damit kann
  das Gesetz nun nach seiner Verkündung in Kraft treten. Ziel des Gesetzentwurfs ist
  es, verbesserte wirtschaftliche Rahmenbedingungen für inhabergeführte Apotheken
  zu schaffen, um ein flächendeckendes Netz von Apotheken für eine wohnortnahe Arzneimittelversorgung
  der Bevölkerung zu erhalten. Gleichzeitig benötigen Apotheken bessere Möglichkeiten
  bei der Gewinnung von Fachkräften und müssen diese flexibler als bisher einsetzen
  können. Mit den im Gesetzentwurf vorgesehenen Maßnahmen werden öffentliche Apotheken
  vor allem im ländlichen Raum gestärkt. Zudem können Apothekerinnen und Apotheker
  durch Bürokratieabbau ihre Versorgungsaufgaben mit mehr Eigenverantwortung und Flexibilität
  wahrnehmen. Apotheken haben gerade in den letzten Jahren bewiesen, dass sie weitere
  Aufgaben in der Gesundheitsversorgung der Bevölkerung übernehmen und damit zum Patientennutzen
  insbesondere auf dem Land beitragen können. Künftig sollen sie deshalb mehr Abgaberechte
  für Arzneimittel erhalten, beispielsweise bei der Anschlussversorgung chronisch
  Kranker. Außerdem sollen Apotheken mehr Impfungen durchführen können. Auch pharmazeutische
  Dienstleistungen – wie labordiagnostische Tests oder auch Präventionsleistungen
  – sollen angeboten werden können.
