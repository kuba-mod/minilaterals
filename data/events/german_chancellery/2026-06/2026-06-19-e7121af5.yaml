title: Statement des Bundeskanzlers vor Europäischem Rat „Im Geiste guter europäischer
  Zusammenarbeit“
text: 'Der Kanzler bekräftigte vor dem Europäischen Rat seine Ablehnung einer weiteren
  Verschuldung der EU . Vor Beginn der Beratungen des Europäischen Rates hat Bundeskanzler
  Friedrich Merz auf eine rasche Entscheidung beim kommenden EU -Finanzrahmen ab 2028
  gedrängt. Dies sei wichtig „für die Planbarkeit des gesamten Budgets der Europäischen
  Union“, so der Kanzler. Den aktuellen Vorschlag lehne die Bundesregierung ab: „Die
  Zahlen müssen runter“, sagte der Kanzler. Zugleich forderte er Gespräche über die
  Einnahmen der EU . Man könne „nur so viel Geld ausgeben, wie wir haben“. Besonders
  deutlich formulierte der Kanzler seine Ablehnung neuer Schulden: „ Wir dürfen nicht
  in eine weitere Verschuldung der Europäischen Union gehen.“ Deutschland teile diese
  Haltung mit mehreren Mitgliedstaaten, auch wenn es „nicht die Mehrheit“ sei. Bundeskanzler
  Merz zeigte sich zuversichtlich, dass „im Geiste guter europäischer Zusammenarbeit“
  ein Kompromiss gefunden werde. Guten Morgen, meine Damen und Herren! Wir gehen in
  den zweiten Tag des Europäischen Rates. Heute wird das Thema des Mittelfristigen
  Finanzrahmens ab 2028 auf der Tagesordnung stehen. Ich möchte, dass wir in diesem
  Jahr zu einer Entscheidung kommen. Das ist wichtig, denke ich, auch für die Planbarkeit
  des gesamten Budgets der Europäischen Union. Wir müssen über die Höhe des Budgets
  sprechen. Der auf dem Tisch liegende Vorschlag ist deutlich zu hoch. Die Zahlen
  müssen runter. Wir müssen uns auch über die Einnahmen der Europäischen Union unterhalten.
  Denn wir können nur so viel Geld ausgeben, wie wir haben. Ich werde heute im Europäischen
  Rat noch einmal meine Bitte wiederholen, nicht in eine weitere Verschuldung der
  Europäischen Union zu gehen. Das dürfen wir nicht. Deswegen ist die deutsche Position
  hier sehr klar. Ich teile sie auch mit einer ganzen Reihe weiterer Mitgliedstaaten
  der Europäischen Union. Das ist nicht die Mehrheit, aber wir müssen zu einem einstimmigen
  Ergebnis kommen. Deswegen gehe ich davon aus, dass wir heute im Geiste guter europäischer
  Zusammenarbeit dieses sehr kontroverse Thema diskutieren und es so diskutieren,
  dass wir im zweiten Halbjahr 2026 zu einem gemeinsamen Ergebnis kommen. Noch einmal:
  Der gegenwärtige Vorschlag ist in seiner abstrakten Höhe viel zu hoch. Es muss ein
  neuer Vorschlag auf den Tisch. Dann müssen wir uns über Einnahmen- und Ausgabenstruktur
  unterhalten. Das wird eine sehr spannende Diskussion.'
