title: Fragen und Antworten Mit Blutspenden Leben schenken
text: 'Jährlich werden in Deutschland mehr als 3,5 Millionen Blutspenden benötigt.
  Eine Blutabnahme dauert nur zehn Minuten und kann Leben retten. In Deutschland werden
  jährlich mehr als drei Millionen Blutspenden gebraucht – zum Beispiel für Unfallopfer,
  bei Operationen, bei Transplantationen oder für die Behandlung von Krebserkrankungen.
  Wir können auf Blutkonserven und Blutprodukte nicht verzichten. Hinzu kommt: Blutkonserven
  sind nicht lange haltbar. Eine Blutkonserve muss außerdem zum Empfänger passen.
  Nur wenn die Blutgruppen kompatibel sind, kann der Patient versorgt werden. Fehlen
  Blutgruppen wie A, B, AB oder 0, kann es zu gefährlichen Versorgungsengpässen in
  den Kliniken kommen. Vor allem im Sommer werden Blutkonserven häufig knapp. Durch
  Urlaubs- und Ferienzeiten sinkt die Spendenbereitschaft. Gerade dann ist es besonders
  wichtig, zur Blutspende zu gehen. Daher: Jede einzelne Spende wird dringend gebraucht!
  Neben dem sogenannten „Vollblut“ kann man auch einen Bestandteil des Blutes spenden,
  nämlich Blutplasma. Es wird zum Beispiel für Menschen mit schweren Blutverlusten
  eingesetzt. Blutplasma kann häufiger gespendet werden als Vollblut. Neben Blutplasma
  kann man auch andere Blutbestandteile spenden. Hier ist ein Überblick über die verschiedenen
  Blutspendearten . Vor einer Blutspende sollte man ausreichend essen und trinken.
  So ist der Körper besser auf den Blutverlust vorbereitet. Außerdem muss man sich
  vorher anmelden und kurz die Gesundheit checken lassen. Die Blutabnahme selbst dauert
  dann nur etwa zehn Minuten. Und danach heißt es: Ausruhen, mindestens 30 Minuten.
  Wie die Blut- und Plasmaspende genau abläuft und weitere Informationen finden Sie
  bei beim Bundesinstitut für Öffentliche Gesundheit . In Deutschland gibt es zahlreiche
  Möglichkeiten, Blut zu spenden – sowohl in festen Instituten als auch bei mobilen
  Spendeterminen. Diese virtuellen Karte von blutspenden.de zeigt Blutspendedienste
  in der Nähe. Innerhalb von zwölf Monaten dürfen Frauen höchstens viermal und Männer
  höchstens sechsmal Blut spenden. Außerdem müssen zwischen den Blutspenden mindestens
  acht Wochen liegen. Bei der Plasmaspende kann deutlich häufiger gespendet werden
  und die Abstände sind kürzer. Denn die Plasmaspende ist schonender für den Körper.
  Das Mindestalter für eine Blutspende liegt bei 18 Jahren. Eine Höchstaltersgrenze
  gibt es seit 2023 nicht mehr. Außerdem muss das Körpergewicht bei mindestens 50
  Kilogramm liegen, damit der Blutverlust gut verkraftet wird. Zudem muss das Blut
  einen bestimmten Hämoglobin-Wert haben, damit der Körper den Blutverlust gut ausgleichen
  kann. Manche Menschen können vorübergehend oder dauerhaft kein Blut spenden – zum
  Beispiel bei bestimmten Erkrankungen, Infektionen, wenn bestimmte Medikamente genommen
  werden oder nach bestimmten Auslandsreisen. Auch während der Schwangerschaft und
  Stillzeit darf kein Blut gespendet werden. Nach einer Tätowierung oder einem Piercing
  ist eine Blutspende erst wieder nach vier Monaten möglich. Lesen Sie hier mehr zu
  Voraussetzungen zum Blutspenden .'
