title: Bundeskanzler Merz gratuliert dem Ministerpräsidenten der Republik Lettland,
  Andris Kulbergs
text: Sehr geehrter Herr Ministerpräsident, zu Ihrem Amtsantritt übermittle ich Ihnen
  meine herzlichen Glückwünsche. Ich freue mich auf die weitere enge und freundschaftliche
  Zusammenarbeit im Rahmen der Europäischen Union und der NATO zum Wohle unserer Länder
  sowie für die Sicherheit in Europa. In einer Zeit besonderer Herausforderungen wünsche
  ich Ihnen für Ihre verantwortungsvolle Aufgabe stets eine glückliche Hand. Mit freundlichen
  Grüßen Friedrich Merz Bundeskanzler der Bundesrepublik Deutschland
