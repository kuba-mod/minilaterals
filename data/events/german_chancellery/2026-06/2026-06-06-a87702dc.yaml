title: Organspende im Überblick Fragen und Antworten zur Organspende
text: 'Die eigene Entscheidung für eine Organspende dokumentieren ist wichtig. Das
  geht mit dem Organspendeausweis oder dem Eintrag ins digitale Organspende-Register.
  Wenn wichtige Organfunktionen verloren gehen, kann eine Organtransplantation Lebensqualität
  zurückgeben oder sogar Leben retten. Für viele Menschen, die auf eine Organspende
  warten, ist die Transplantation die letzte Hoffnung. Allerdings werden weniger Organe
  gespendet als benötigt. Daher werden Patientinnen und Patienten, die aus medizinischen
  Gründen eine Transplantation brauchen, in Wartelisten aufgenommen. Derzeit werden
  in Deutschland über 8.000 Spenderorgane benötigt (Stand 31. Dezember 2025). Die
  meisten Menschen warten auf eine Spenderniere. Es gibt nur wenige Erkrankungen,
  die eine Organspende nach dem Tod ausschließen. Und es gibt kein Höchstalter, bis
  zu dem eine Spende möglich ist. Damit Organe gespendet werden können, muss eine
  Zustimmung zur Organspende vorliegen. Außerdem muss bei der verstorbenen Person
  der unumkehrbare Ausfall der gesamten Hirnfunktionen, der Hirntod, festgestellt
  worden sein. Wenn diese Voraussetzungen erfüllt sind, entscheiden die Ärztinnen
  und Ärzte im Einzelfall, ob sich Organe für eine Transplantation eignen. Neben der
  Organspende nach dem Tod ist auch eine Lebendorganspende möglich. Hier werden Organe
  oder Organteile von lebenden Menschen übertragen. Derzeit werden in Deutschland
  vor allem Nieren und Teile der Leber auf diese Art und Weise transplantiert. Dies
  ist unter anderem nur dann zulässig, wenn sich die spendende und die empfangende
  Person nahestehen. Das ändert sich nun für eine bestimmte Organtransplantation:
  Am 1. Juni 2026 ist ein Gesetz zur Reform der Lebendorganspende in Kraft getreten,
  das den Organspender- und Organempfängerkreis bei Lebendnierenspenden erweitert.
  Zum Ablauf einer Organspende und Transplantation lesen Sie mehr beim Bundesinstitut
  für Öffentliche Gesundheit. Mit dem neuen Gesetz soll die Bereitschaft zur Organ-
  und Gewebespende in Deutschland gefördert werden. Denn Betroffene warten oft jahrelang,
  manchmal bis zu acht Jahre, auf ein Spendeorgan. Die Reform enthält insbesondere
  folgende Neuerungen: Die Voraussetzungen für die sogenannte Überkreuzlebendnierenspende
  werden geschaffen. Unter einer Überkreuzlebendnierenspende wird die Spende einer
  Niere zwischen zwei oder mehr in sich inkompatiblen Organspendepaaren verstanden.
  Außerdem soll eine „nicht gerichtete anonyme Nierenspende“ in Deutschland möglich
  werden. In diesem Fall wird eine Niere an einen unbekannten Empfänger oder eine
  unbekannte Empfängerin übertragen. Diese Spendenform ist durch eine altruistische
  Motivation geprägt, da die Spende ohne persönliche Beziehung erfolgt und ausschließlich
  dem Zweck dient, einer unbekannten Person zu helfen. Die Person, die sich für diese
  Art des Spendens entscheidet, hat dabei keinerlei Einfluss auf die Empfängerin oder
  den Empfänger der Spende. Weitere Informationen zur Reform der Lebendorganspende
  erhalten Sie beim Bundesgesundheitsministerium . Grundvoraussetzung für eine Organspende
  ist der Hirntod – der endgültige, unumkehrbare Ausfall des gesamten Gehirns. Zwei
  Fachärzte müssen unabhängig voneinander den Hirntod feststellen. Diese sogenannte
  Hirntoddiagnostik folgt klaren Regeln, die in einer Richtlinie der Bundesärztekammer
  definiert sind. Zum Beispiel müssen die Untersuchungen mit einem zeitlichen Abstand
  wiederholt werden, um den Hirntod sicher festzustellen. Hier finden sich nähere
  Informationen zur Hirntoddiagnostik . Der Hirntod kommt nur selten vor, so dass
  nur wenige Verstorbene überhaupt für eine Organspende in Frage kommen. Eine kurze
  Zeit lang ist es möglich, das Herz-Kreislauf-System der oder des Verstorbenen künstlich
  aufrechtzuerhalten. In dieser Zeit können die Organe weiterhin durchblutet und dann
  transplantiert werden. Organe dürfen nur entnommen werden, wenn der verstorbene
  Mensch vor seinem Tod einer Organspende zugestimmt hat – zum Beispiel durch die
  Eintragung im Organspende-Register, durch einen Organspendeausweis oder eine Patientenverfügung.
  Wenn dies nicht vorliegt, werden die Angehörigen gefragt. Sie treffen dann eine
  Entscheidung im Sinne der oder des Verstorbenen. Diese Entscheidung ist für die
  Angehörigen schwierig und geschieht in einer emotional sehr belastenden Situation.
  Daher sollte jede und jeder noch zu Lebzeiten eine persönliche Entscheidung zur
  Organspende treffen. Diese Entscheidung sollte dokumentiert sein. Und sie sollte
  auch mit den Angehörigen besprochen werden – das schafft Klarheit im Ernstfall.
  Seit März 2024 können Bürgerinnen und Bürger einer Organspende auch digital zustimmen.
  Das digitale Organspende-Register speichert die Entscheidung für oder gegen eine
  Spende in einem zentralen elektronischen Verzeichnis. Es ist eine digitale Möglichkeit,
  die Entscheidung zur Organspende rechtlich verbindlich zu dokumentieren – neben
  dem bisherigen Organspendeausweis und der Patientenverfügung. Alle Bürger und Bürgerinnen
  ab 16 Jahren können sich kostenlos eintragen. Organspendeausweis und Patientenverfügungen
  bleiben weiterhin gültig. Bürgerinnen und Bürger können ihre Zustimmung jederzeit
  wieder digital zurücknehmen. Beim Bundesinstitut für Arzneimittel und Medizinprodukte
  (BfArM) können sich Bürgerinnen und Bürger digital registrieren. Um sich im Organspende-Register
  eintragen zu können, muss die Onlineausweisfunktion des Personalausweises aktiviert
  sein. Das dient der Sicherheit. Wie das Organspende-Register genau funktioniert,
  erklären ein Video und FAQs . Das Organspende-Register ermöglicht einen Zugriff
  jederzeit und von überall. Dadurch können sich Ärztinnen und Ärzte im Notfall schnell
  und sicher über eine Zustimmung informieren. Die Zustimmung kann nicht „verloren
  gehen“. Das Register stellt sicher, dass die persönliche Entscheidung berücksichtigt
  wird. Das Bundesinstitut für Arzneimittel und Medizinprodukte (BfArM) führt das
  Organspende-Register. Es speichert die persönlichen Daten geschützt. Das Organspende-Register
  ist nicht öffentlich einsehbar. Zugreifen können nur autorisierte Stellen wie Transplantationsbeauftragte
  in Krankenhäusern. Ja, nach wie vor können Bürgerinnen und Bürger Entscheidung für
  eine Organspende mit dem bisherigen Organspendeausweis dokumentieren. Hier kann
  man einen Organspendeausweis online ausfüllen und ausdrucken oder auch eine Plastikkarte
  für die Geldbörse bestellen. Beim Bundesinstitut für Öffentliche Gesundheit gibt
  es ein Infotelefon speziell zum Thema Organspende. Unter der gebührenfreien Rufnummer
  0800 90 40 400 können Bürgerinnen und Bürger montags bis freitags von 9 bis 18 Uhr
  all ihre Fragen stellen. Hier lassen sich Erfahrungsberichte von Menschen finden,
  die mit der Organspende in Berührung gekommen sind. Weitere Antworten auf Fragen
  gibt es auf den Seiten des Bundesgesundheitsministeriums und beim Bundesinstitut
  für Öffentliche Gesundheit.'
