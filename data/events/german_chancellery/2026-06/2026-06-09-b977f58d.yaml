title: Kulturstaatsminister Weimer würdigt bei den Feierlichkeiten in der Sagrada
  Família in Barcelona insbesondere das deutsche Turmkreuz
text: 'Staatsminister für Kultur und Medien Wolfram Weimer ist für zwei Tage nach
  Barcelona gereist. Mit seinem Besuch unterstreicht Staatsminister Weimer die Bedeutung
  des deutsch-spanischen Kulturaustauschs sowie die verbindende Kraft von Kultur,
  Architektur und religiösem Erbe in Europa. Höhepunkt der Reise ist die morgige Teilnahme
  des Staatsministers an der Heiligen Messe in der Basilika Sagrada Família und der
  Weihe des Christus-Turms durch Papst Leo XIV. Die Feierlichkeiten finden anlässlich
  des 100. Todestages Antoni Gaudís statt. Als Ehrengäste werden unter anderem das
  spanische Königspaar Felipe VI. und Letizia erwartet. Vorab erklärte Staatsminister
  Weimer: „Die Sagrada Família gehört zu den großen Wundern Europas. Antoni Gaudí
  hat hier ein Bauwerk geschaffen, das Architektur, Kunst und Glauben auf einzigartige
  Weise vereint und Millionen Menschen bewegt. Hundert Jahre nach seinem Tod wirkt
  seine Vision lebendiger denn je.“ Mit der Montage eines begehbaren Kreuzes auf dem
  Christus-Turm wurde die Sagrada Família Anfang 2026 vollendet. Die Kirche erreicht
  damit ihre endgültige Höhe von 172,5 Metern und überragt das Ulmer Münster, das
  mehr als 135 Jahre als höchster Kirchturm der Welt galt, um rund elf Meter. Für
  die Öffentlichkeit soll das Kreuz voraussichtlich ab 2027 zugänglich sein und einen
  Rundblick über Barcelona ermöglichen. Das fast 100 Tonnen schwere Kreuz aus Stahl
  und Glas wurde vom Stahlbauunternehmen Gartner im bayerischen Gundelfingen gefertigt.
  Staatsminister Weimer besuchte das Stahlbauwerk bereits im Mai 2026 und informierte
  sich vor Ort über die Fertigung und technische Umsetzung des Kirchturmkreuzes für
  die Sagrada Família. „Mit dem Kreuz für den Christus-Turm ist in Gundelfingen ein
  außergewöhnlicher deutscher Beitrag zur Vollendung eines der berühmtesten Bauwerke
  der Welt entstanden“, so Staatsminister Weimer. „Die Sagrada Família verbindet Menschen
  über Länder, Generationen und Kulturen hinweg – und nun auch deutsche Ingenieurskunst
  mit einem Meisterwerk europäischer Kulturgeschichte. Wer vor diesem Bauwerk steht,
  spürt die Kraft von Geschichte, Glauben und menschlicher Schaffenskraft. Solche
  Orte stiften Identität, schaffen Zusammenhalt und erinnern uns daran, was Europa
  kulturell verbindet. Dieses Erbe zu bewahren und an kommende Generationen weiterzugeben,
  ist auch eine wichtige Aufgabe der Kulturpolitik des Bundes.“ Zu Beginn seines Aufenthalts
  hat Staatsminister Weimer heute den Präsidenten der Regionalregierung von Katalonien,
  Salvador Illa i Roca, zu einem bilateralen Gespräch getroffen. Dabei ging es insbesondere
  um medienpolitische Themen wie Urheberrecht und KI sowie die Plattformregulierung.
  Auf dem Programm stehen weitere Gespräche mit Vertreterinnen und Vertretern aus
  der Kulturbranche und der Besuch verschiedener Kultureinrichtungen, darunter das
  Goethe-Institut Barcelona sowie der Pavillon Mies van der Rohe.'
