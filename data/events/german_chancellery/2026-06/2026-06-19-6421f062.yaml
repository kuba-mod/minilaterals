title: Press conference of the Federal Chancellor after the European Council “We have
  shown that we, as Europeans, are capable of taking action”
text: 'Following the European Council meeting, Merz said that a number of issues “of
  great importance to the European Union” had been discussed. Following the discussions
  held at the European Council, Federal Chancellor Friedrich Merz gave a positive
  assessment of the outcome and highlighted the key decisions shaping Europe’s future.
  He emphasised the need for a realistic EU ‑-financial framework, the strengthening
  of competitiveness, new trade defence mechanisms and a closely coordinated European
  approach to the war in Ukraine‑. According to Merz, it is particularly important
  that Europe remains capable of taking action – both within the EU and in the G7
  ‑-forum. The discussions also focused on progress regarding EU ‑ enlargement, preparations
  for possible peace talks on Ukraine and the situation in the Middle East. Federal
  Chancellor Merz stressed that the ceasefire negotiated between the US and Iran in
  southern Lebanon must be observed as a matter of urgency. Read the transcript of
  the press conference here (in German only):'
