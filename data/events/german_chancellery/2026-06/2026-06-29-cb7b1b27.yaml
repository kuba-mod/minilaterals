  können, wie sehr wir jetzt mit der chinesischen Regierung auf eine Konfrontation
  bei Handelsfragen und Sanktionen zusteuern. In der Pressemitteilung haben wir noch
  einmal das Interesse an dem Austausch über handels- und wirtschaftspolitische Fragestellungen
  betont. Das ist auch der Tenor der Vorgehensweise der Ministerin; das hatten wir
  ja schon mehrfach gesagt. Die chinesische Seite wird vorschlagen, dass sie ähnlich
  wie mit den USA eine Art Board einrichtet, also zwischen der EU und China, und man
  Handels- und Zollstreitigkeiten, auch Währungsstreitigkeiten dort behandelt. Trifft
  das auf Zustimmung der Bundesregierung? Das ist ja erst einmal eine europäische
  Angelegenheit; das muss europäisch gelöst werden. Wir sind ja auch mit der Kommission
  und mit den anderen Mitgliedstaaten im Gespräch, wie hier unsere Vorgehensweise
  ist. Zu gewissen Vorschlägen der chinesischen Seite kann ich mich hier jetzt konkret
  nicht äußern. Herr Kornelius, der Bundeskanzler hat jetzt mehrfach die Kritik geäußert,
  dass die chinesische Währung unterbewertet ist, bis zu 30 Prozent. Er hat auch,
  zum Beispiel auf dem EU-Gipfel in Brüssel, Vorschläge gemacht, wie man dieses Problem
  eventuell mit gemeinsamen Gremien zwischen der EU, anderen und China lösen könnte.
  Ist das konkret weiterverfolgt worden? Sie haben die Äußerungen beim Europäischen
  Rat oder nach dem Europäischen Rat gehört; die waren ja schon sehr konkret. Das
  ist jetzt in den entsprechenden Gremien in Abstimmung und wird dort weiterverfolgt
  und verfeinert. Das wird dann sicherlich auch Gegenstand der Gespräche sein. Können
  Sie noch einmal sagen, was eigentlich die Gremien sind? Das ist mir nämlich nicht
  ganz klar. Denn einerseits geht es um die EU, andererseits geht es um internationale
  Gremien, die sehr, sehr viele Länder mit einbeziehen würden ‑ die USA, außereuropäische
  Länder. Ja, deswegen braucht es eben eine größere Koordination, auch eine Verständigung
  darüber, ob und welche Instrumente hier wirkungsvoll wären und welche Form von Ansprache
  gerechtfertigt ist. Da kann ich momentan noch keine detaillierteren Skizzen geben,
  in welchem Abspracherhythmus oder in welcher Sequenz das geklärt wird. Frau Singer,
  ich habe eine Frage zu Bodycams bei der Bundespolizei . Laut der GdP droht im kommenden
  Jahr ein gravierender Mangel an einsatzfähigen Bodycams. Können Sie das bestätigen?
  Ich möchte grundsätzlich erst einmal sagen, dass wir die Äußerungen von Gewerkschaften
  nicht kommentieren. Da handelt es sich um ein laufendes Ausschreibungsverfahren.
  Dazu kann ich mich leider nicht äußern. Können Sie vielleicht sagen, was die Folgen
  wären, wenn der bisherige Anbieter seinen Support nicht verlängern würde? Ich möchte
  dazu aktuell an dieser Stelle nicht spekulieren. Ich habe noch eine Frage zum BAföG
  an das Bundesforschungsministerium. Der Kanzler hatte in der Regierungsbefragung
  am Mittwoch gesagt, es werde in den nächsten Tagen dazu eine Einigung geben und
  der Gesetzentwurf werde noch im Juli im Kabinett beschlossen. Können Sie bestätigen,
  dass der Gesetzentwurf aus Ihrem Haus im Juli entscheidungsreif ist und im Kabinett
  beschlossen wird? Das ist das, was die Kolleginnen, glaube ich, auch in der Vergangenheit
  schon gesagt haben, nämlich dass wir alles dafür tun, dass der Gesetzesentwurf Ende
  Juli ins Kabinett kann. Ist denn eine Erhöhung der Wohnkostenpauschale, die ja in
  Aussicht gestellt wurde, dann noch zum 1. Oktober 2026 möglich? Wie gesagt, haben
  sich meine Kolleginnen auch dazu, glaube ich, in der Vergangenheit hier schon geäußert.
  Wir sind an dem Gesetzentwurf dran, tun alles dafür, dass er Ende Juli ins Kabinett
  kommen kann, und befinden uns in den internen Abstimmungen. Ich habe noch eine Frage
  an Herrn Kornelius zu einem Thema, das am Freitag schon einmal angesprochen wurde
  ‑ aber da war noch nicht ganz klar, was der Hintergrund ist ‑, nämlich VW bzw. die
  Pläne zum Abbau von Stellen 100 000 Beschäftigter . Dazu wüsste ich ganz gern, wie
  sehr sich die Bundesregierung und auch der Bundeskanzler angesichts der Dimension
  jetzt mit diesem Thema beschäftigen werden. Wir haben die Lage der Automobilbranche
  sehr genau im Blick. Die Bundesregierung steht mit der Automobilwirtschaft, aber
  auch mit den Industriezweigen, die damit zusammenhängen, im regelmäßigen Austausch.
  Wir befinden uns wie die Industrie insgesamt in einem schwierigen Fahrwasser. Das
  ist durch die vielen Punkte der Transformation ausgelöst worden, vor allem hin zur
  Elektromobilität, aber auch den herausfordernden internationalen Wettbewerb. Wir
  sehen, dass die Industrie großem Anpassungsdruck unterliegt, dass die tradierten
  Strukturen die Wettbewerbsfähigkeit nicht mehr garantieren können. Die Bundesregierung
  wird diesen Prozess weiterhin flankieren und eben auch im Austausch mit der Industrie
  besprechen. Sie kennen die einzelnen Punkte, mit denen wir auf diese Veränderungen
  eingehen, zum Beispiel die Förderung von Elektroautos, die Sonderabschreibungen
  für Elektrofirmenfahrzeuge, den flächendeckenden Ausbau der Ladeinfrastruktur, aber
  auch den Einsatz in Brüssel für mehr Technologieoffenheit, mehr Flexibilität und
  Wettbewerbsfähigkeit. Überhaupt sind die ganzen Themen der Wettbewerbsfähigkeit,
  des Arbeitsrechtes und der Anregung der Kaufkraft, die jetzt auch im Koalitionsausschuss
  behandelt werden, alles Faktoren, die den Standort Deutschlands bzw. die Wettbewerbsfähigkeit
  hier in Deutschland verbessern können. Deswegen sind wir uns bewusst, dass wir mit
  der Industrie in diesem sehr, sehr komplexen Umfeld eigener Reformaufgaben, aber
  auch von außen aufgedrängter Hindernisse momentan in einer schwierigen Phase stehen.
  Wir wollen diese Phase gemeinsam mit der Industrie durchstehen. Die niedersächsische
  Landesregierung und damit die Politik hat ja offenbar einen anderen Ansatz als einige
  im Management bei VW. Die niedersächsische Landesregierung sagt, dass sich Probleme
  nicht dadurch lösen lassen, dass man jetzt Werke schließt, sondern man muss bessere
  Produkte auf die Straße bringen. Ich wüsste ganz gern, welcher Philosophie der Kanzler
  zuneigt: starkem Personalabbau oder eher, andere strukturelle Themen anzugehen.
  Wie Sie wissen, kommentieren wir Medienberichte oder auch Aussagen aus dem politischen
  Umfeld über mögliche Maßnahmen etwa bei VW nicht direkt. Aber unabhängig von den
  Äußerungen ist es unser Ziel, die Schließungen von Standorten in Deutschland zu
  verhindern. Dazu müssen die richtigen Rahmenbedingungen gesetzt sein und eben auch
  Wettbewerbsanreize gesetzt werden, damit sich diese Standorte auch weiterhin rentieren.
  Prinzipiell ist es aber immer die Entscheidung der Unternehmen, die sie betriebswirtschaftlich
  treffen müssen. Sie wissen auch, dass eines der Markenzeichen der deutschen Automobilwirtschaft
  die enge Sozialpartnerschaft ist. Die Bundesregierung appelliert in dieser Situation
  deswegen an die beteiligten Sozialpartner, ihrer Verantwortung auch gerecht zu werden.
  Es tut mir leid; ich habe noch eine Frage dazu, und zwar an das Wirtschaftsministerium
  oder an Herrn Kornelius. Es gab ja auch immer Diskussionen darüber, ob chinesische
  Hersteller gefährdete Automobilstandorte in Deutschland übernehmen können. Würde
  die Bundesregierung angesichts dieser von Ihnen beschriebenen schwierigen Lage unterstützen,
  dass chinesische Hersteller bisherige Werke deutscher Hersteller hier übernehmen
  oder teilweise übernehmen? Die Bundesregierung kommentiert jetzt diesen Aspekt nicht.
  Ich glaube, das oberste Ziel habe ich genannt: Es ist der Erhalt der Standorte der
  deutschen Hersteller und die Garantie für Arbeitsplätze. ‑ Aber prinzipiell ist
  natürlich jede Investition in Deutschland, die auch Arbeitsplätze schafft, wertvoll.'
