date: '2026-06-29'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 29. Juni 2026
text: 'Sprecherinnen und Sprecher •    Staatssekretär Kornelius •    Schraff (BMG)
  •    Stolzenberg (BMUKN) •    Ungrad (BMWE) •    Reck (BMV) •    Kall (BMF) •    Hinterseher
  (AA) •    Swistek (BMVg) •    Singer (BMI) •    Dr. Schneidewindt (BMFTR) (Vorsitzende
  Buschow eröffnet die Pressekonferenz und begrüßt StS Kornelius sowie die Sprecherinnen
  und Sprecher der Ministerien.) Müssen sich die Bundesregierung und das Gesundheitsministerium
  nach dem Wochenende eventuell auf künftige Hitzewellen mit einem zentralen Aktionsplan
  vorbereiten, wie es unter anderem die Bundestagsfraktion der Grünen fordert? Ist
  da etwas in Vorbereitung? Ich kann Ihnen zum Thema Hitze sagen, dass der Schutz
  der Gesundheit vor Hitze für die Bundesregierung ein wichtiges Anliegen ist, dass,
  wie Sie wissen, die Länder für die konkreten Maßnahmen zuständig sind und wir als
  BMG den Hitzeschutzplan für Gesundheit aufgelegt haben. Mehr kann ich dazu nicht
  mitteilen. Da gibt es keinen neuen Stand. Ich möchte dazu verschiedene Hinweise
  geben. Konkret zu Ihrer Frage: Im Umweltministerium läuft ein Forschungsprojekt,
  um herauszufinden, ob es einen nationalen Hitzeaktionsplan geben könnte und wie
  er ausgestaltet werden sollte. Wichtig ist immer, dabei zu verstehen: Wir sind in
  einer föderalen Struktur. Es gibt eine Kompetenzverteilung. Hitzeschutz/Klimaanpassung
  ist Sache der Länder und Kommunen. Das ist kein Feigenblatt oder so. Wir würden
  gerne mehr tun, aber wir können nur das tun, was wir dürfen. Wir tun schon recht
  viel, was die Förderung von Modellprojekten angeht. Das ist das, was uns gestattet
  ist. Mit diesem Forschungsprojekt wollen wir schauen, ob wir vielleicht noch weiter
  gehen können. Gleiches gilt für das Thema Gemeinschaftsaufgabe Klimaanpassung, was
  eine Lösung für eine dauerhafte gemeinsame Finanzierung von Klimaanpassung und Hitzeschutz
  von Bund und Ländern wäre. Das sind Prozesse, die Sie hier schon hundertmal gehört
  haben. Das sind dicke Bretter, die man bohrt. Das, was jetzt sofort hilft, ist das,
  was Städte selber tun können. Ich habe es selber bei mir zu Hause gesehen: Dort
  wurden kurzfristig Cooling-Center eingerichtet, in die Menschen gehen konnten, um
  sich abzukühlen, in die Menschen gehen konnten, die vielleicht in einer Dachwohnung
  in einem Mehrfamilienhaus wohnen. Dort wurden Malls geöffnet, die sonst am Wochenende
  nicht geöffnet sind. Das sind Dinge, die sofort helfen können. Aber natürlich müssen
  wir auch die langfristigen Maßnahmen im Blick behalten. Dazu gehört, mehr Grün in
  die Stadt zu bekommen und Hitzewarnpläne aufzusetzen, die lokal funktionieren. Es
  gibt viele gute Beispiele in Städten und Gemeinden in Deutschland. Man sollte auch
  in den Blick nehmen, was schon gut funktioniert. Noch ein Hinweis auf das Interview
  von Umweltminister Carsten Schneider heute Morgen im Deutschlandfunk: Er verweist
  auf die 100 Milliarden Euro, die aus dem Sondervermögen für Infrastruktur und Klimaneutralität
  zur Verfügung stehen. Die sind auch für Klimaanpassung gedacht. Das heißt, die Länder,
  die ja selbst zuständig sind, können dieses Geld auch dafür verwenden. Direkt dazu:
  Die 100 Milliarden Euro sind nicht nur für Klimaanpassung, sondern auch für Verwaltungsdigitalisierung,
  Verkehr, Bildung - also ein großer Katalog. Heißt das in der Konsequenz, dass die
  Länder und Kommunen das Geld einfach falsch priorisieren und falsch ausgeben, wenn
  da jetzt Forderungen kommen, dass es mehr braucht? Meines Wissens sind sie für die
  Themen Wasserresilienz und Klimaanpassung priorisiert. Dafür können sie dann auch
  verwendet werden. Weiter wollen und dürfen wir als Bund auch gar nicht reinreden.
  Wir tun sogar viele Dinge darüber hinaus, wenn wir sagen, wir fördern zum Beispiel
  die Ansiedlung von Stadtbäumen oder machen natürlichen Klimaschutz, der für Entsiegelung
  sorgt. Das sind auch Dinge, bei denen wir Kommunen unterstützen und sie nicht allein
  lassen. Ich habe noch eine Rückfrage zu der Finanzierung. Sie sprachen gerade die
  Gemeinschaftsaufgabe Klimaanpassung an. Dazu an Sie, aber auch an Herrn Kornelius:
  Wie ist da gerade der Stand? Im Koalitionsvertrag wurde festgehalten, dass man prüfen
  will, das ins Grundgesetz aufzunehmen. Wie ist da der Stand? An Herrn Kornelius:
  Will der Bundeskanzler das weiterhin ins Grundgesetz aufnehmen? Das ist nach wie
  vor auch Beschlusslage der Umweltministerkonferenzen. Das können Sie in den Protokollen
  immer nachlesen. Die Umweltminister wollen das gerne. Da muss allerdings eine sehr
  große Hürde genommen werden. Wir reden hier über große Mehrheiten im Bundestag und
  Bundesrat. Das heißt, so etwas braucht sehr lange Vorbereitungszeit. Man muss auch
  akzeptieren, dass das nicht etwas ist, was man sofort entscheidet, sondern was erst
  nach und nach entwickelt werden muss. Wir haben unsere Vorarbeiten geleistet, dass
  die Prozesse mit den Ländern laufen. Das ist das, was ich dazu sagen kann. Von der
  breiten Perspektive der Bundesregierung kann ich Ihnen sagen, dass die Bundesregierung
  natürlich am nationalen Klimaschutzgesetz mit seinen ambitionierten Zielen festhält.
  Dieses Klimaschutzgesetz hat seinen Emissionsminderungspfad mit dem Ziel der Klimaneutralität
  2045 festgeschrieben. Die Klimaziele bleiben also auch in den jeweiligen Etappen
  bestehen. Wir werden mit den Programmen, die uns zur Verfügung stehen, und auch
  mit den Haushaltsmitteln, die Sie eben genannt haben, die notwendige Anpassung und
  die Anpassungsstrategien vorantreiben. Das ist nicht wenig Geld. Es wird natürlich
  auch vielfältig eingesetzt. Sie wissen, dass wir ein Zentrum KlimaAnpassung betreiben,
  das alle Interessierten, vor allem Kommunen und Städte, auch berät, gerade zum Thema
  der Extremwetterprävention. Es gibt ein Programm „Natürlicher Klimaschutz in Kommunen“.
  Das ist ein Modellprojekt. Dabei geht es natürlich um die klassischen Themen für
  Städte wie die Verschattung, die Bepflanzung, die Entsiegelung usw. Das sind sozusagen
  die Metathemen. Insofern hat die Bundesregierung auch für diese Wettersituation
  in den Klimaschutzprogrammen ihre Vorsorge geleistet. Wenn es dann zu diesen Wetterereignissen
  kommt, stellen wir immer fest, dass es uns berührt, dass es die Menschen tatsächlich
  sehr stark trifft und wir deswegen unsere Anstrengungen sehr zügig vorantreiben
  müssen. Die Frage haben Sie jetzt aber nicht beantwortet. Die Frage, ob der Bundeskanzler
  weiterhin für die Aufnahme einer Gemeinschaftsaufgabe Klimaanpassung ins Grundgesetz
  wäre. Der Bundeskanzler hat seine Position dazu nicht geändert. Ich habe eine Frage
  an das Wirtschaftsministerium: Lässt sich eigentlich beziffern oder abschätzen,
  welcher volkswirtschaftliche Schaden durch solche Hitzetage entsteht, also nicht
  nur an Anlagen wie Schienen, sondern auch durch Ausfälle, Krankheiten usw.? Wenn,
  dann würde sich das auf die Wirtschaft beziehen. Derzeit gibt es keine Erkenntnisse,
  was es für Schäden geben könnte. Man muss auch bedenken, dass das jetzt eine kurze
  Spanne war. Das müsste langfristig beobachtet werden. Ich möchte aber noch einmal
  grundsätzlich sagen, dass es zweigeteilt ist. Bei der Energieversorgung sind auch
  die Unternehmen für eine gewisse Anpassung zuständig. Dazu gehören die fortlaufende
  Systembeobachtung durch die Netzbetreiber, aber auch die Vorgaben zum Hochwasserschutz,
  die berücksichtigt werden müssen. Wir als Bundeswirtschaftsministerium bzw. als
  Bundesregierung wollen die Grundlagen dafür schaffen, dass Unternehmen in Sachen
  klimafreundliche Produktion besser aufgestellt sind, zum Beispiel durch Förderungen.
  Ich möchte zwei Beispiele nennen: Die CO ₂ -Differenzverträge, CCfD, und die Bundesförderung
  Industrie und Klimaschutz, BIK, fördern die Umstellung der energieintensiven Industrie
  auf CO ₂ -arme Produktionsverfahren. Genauso gibt es eine Förderung bei den IPCEI-Wasserstoffen,
  also die Förderung, die wir seitens des Bundes und der Länder zum Ausbau von Wasserstoffelektrolyse
  und Wasserstoffnetzen sowie natürlich auch für den Stahlbereich machen. Das sind
  Dinge, bei denen wir als Bundesregierung auch mit unterstützen können, dass die
  Produktion durch klimafreundliche Stoffe besser umgesetzt werden kann. Aber zu dem
  erstgenannten, zu Ihrer eigentlichen Frage, liegen uns derzeit noch keine Erkenntnisse
  vor. Ich habe eine Nachfrage an das Verkehrsministerium. Müssen wir uns eigentlich
  auf Dauer darauf einrichten, dass bei Hitze deutsche Autobahnen aufbrechen und nicht
  mehr benutzbar werden, dass die Deutsche Bahn schon Tage vorher anfängt zu warnen:
  „Reisen Sie bitte nicht!“, dass permanent Züge ausfallen usw.? Wird das Normalzustand,
  oder sieht die Bundesregierung auch Möglichkeiten, dagegenzuhalten? Wir halten ja
  dagegen. Im Falle der Autobahnen sind wir dabei, Blow-ups zukünftig zu verhindern.
  Dort, wo sie auftreten, werden dann neue Materialien eingesetzt, um zukünftige Vorkommnisse
  dieser Art weitestgehend zu minimieren. Was die Bahn angeht: Vor Böschungsbränden
  sind wir zum Beispiel bei dieser Hitze nicht gefeit. Aber auch da gibt es etablierte
  Verfahren, wie man den Böschungsbewuchs klein hält. Was die technische Ausstattung
  angeht, wird die Bahn auch immer besser. Aber ein Stück weit müssen sich auch die
  Verkehrsunternehmen, so wie wir uns alle an die Hitze gewöhnen müssen, an diese
  Temperaturen anpassen. Das ist kein Prozess, der von heute auf morgen geht. Herr
  Kornelius, noch einmal zu der Rolle des Bundeskanzlers: In einigen anderen europäischen
  Ländern ist das Thema Hitze von den Staats- und Regierungschefs zur Chefsache erklärt
  worden. Hat der Bundeskanzler nicht das Gefühl, dass dieses Thema so allüberwölbend
  ist ‑ gerade nach diesem Wochenende, aber auch nach der letzten Woche ‑, dass man
  vielleicht auch das zur Chefsache machen sollte, trotz der Zuständigkeiten von Ländern
  und Kommunen? Das ist ja ein Thema, das anscheinend alle Ebenen angeht. Man muss
  bei solchen Maßnahmen aufpassen, ob man nicht Erwartungen weckt, die dann nicht
  erfüllt werden. Die Erklärung zur Chefsache ist ja noch keine Lösung für ein Problem.
  Die Klimastrategie der Bundesregierung wirkt. Sie funktioniert. Die Mittel sind
  da und werden eingesetzt. Die Kommunen und die Länder greifen da ineinander. Wir
  haben es mit einer extremen Situation zu tun. Ich würde aber auch nicht pauschal
  von den Autobahnen oder den Zügen reden, die nicht funktionieren oder nicht befahrbar
  sind. Ich habe keine Statistik gesehen. Ich denke, sie gibt es auch nicht. Man muss
  das proportional betrachten. Mir fehlt dazu jetzt, ehrlich gesagt, die Urteilskraft.
  Mein persönliches empirisches Urteil am Wochenende war positiv, sowohl auf der Autobahn
  als auch im Zug. Wie auch immer: Es bringt nichts, wenn wir alle subjektive Erfahrungen
  austauschen und sagen: Die Welt geht unter. ‑ Es ist ein extremes Wetter. Wir wissen
  das. Eine Chefsache wird das Wetter nicht ändern. Deswegen müssen wir, glaube ich,
  die Anstrengungen und das Ineinandergreifen der Maßnahmen verstärken. Es gibt gute
  Hitzeschutzpläne. Es gibt gute Maßnahmen, die auch in den Kommunen umgesetzt werden.
  Am Ende führen, glaube ich, auch das Ineinanderwirken verschiedener Ebenen oder
  Initiativen, die auf lokaler Ebene stattfinden, wie die eben geschilderten, zum
  Erfolg. Dann kommen wir da, glaube ich, gut voran. Natürlich löst eine Erklärung
  zur Chefsache noch keine Probleme. Aber es ist eben darauf hingewiesen worden, dass
  einige Kommunen bessere Lösungen haben als andere. Wäre es nicht angebracht, dass
  sich Bund, Länder und Kommunen zusammensetzen und dafür sorgen, dass diese guten
  Ideen, die vielleicht an einigen Stellen existieren, dann auch flächendeckend in
  Deutschland umgesetzt werden? Die jeweiligen Stellen ‑ die Umweltminister, die Gesundheitsminister ‑
  sind ja miteinander verzahnt. Ich bin sicher, dass es auf den jeweiligen Ebenen
  auch Bund-Länder-Gespräche gibt, um dort die Erfahrungen auszutauschen und zu koordinieren.
  Das können die Ressorts sehr gut in Eigenverantwortung lösen. Dort ist die Kompetenz,
  und dann muss es gelöst werden. Ich möchte das gerne ergänzen. Es gibt natürlich
  diese fachlichen Austausche, aber es gibt auch eine gesetzliche Pflicht. Wir haben
  das Klimaanpassungsgesetz von 2024. Es sieht vor, dass die Länder dafür sorgen sollen,
  dass es flächendeckend Klimaanpassungskonzepte gibt. Teil dieser Klimaanpassungskonzepte
  sind natürlich Hitzeschutzpläne. Das sind Dinge, die sie in ihren Ländern vorantreiben
  müssen. Das heißt, wir haben den fachlichen Austausch, wir haben aber auch eine
  gesetzliche Pflicht. Ich habe eine Frage an das Bundesverkehrsministerium. Die Blow-ups
  sind ja kein neues Phänomen. Wie hoch wird der Investitionsbedarf da seitens Ihres
  Hauses geschätzt? Ist das bei den angekündigten Investitionen ‑ Stichwort: Sondervermögen ‑
  in die Verkehrsinfrastruktur schon inkludiert, oder kommt das jetzt noch mal on
  top? Dazu liegen mir keine aktuellen Zahlen vor. Die Maßnahmen werden, soweit ich
  weiß, aus dem aktuell laufenden Haushalt bzw. von der Autobahn GmbH direkt bezahlt.
  Das ist ja nicht neu, sondern in den letzten Jahren schon passiert. Wieso liegt
  da nichts vor? Weil das größtenteils Dinge sind, die im operativen Tagesgeschäft
  passieren und die nicht von langer Hand planbar sind. Von daher sind wir und die
  Autobahn GmbH dort, wo diese Schäden auftreten, im Einsatz und erneuern diese Streckenabschnitte
  entsprechend, sodass zukünftig solche Geschehnisse minimiert werden können. Darüber
  hinaus haben wir das natürlich auf dem Schirm. Ich habe einen Sprecher von der Autobahndirektion
  vom Wochenende im Ohr, Stichwort A 2. Er hat gesagt, das liege einfach nur daran,
  dass die Autobahn zu alt sei. Das Alter von Autobahnen kennt man ja. Das Alter von
  Autobahnen kennt man in der Regel, ja. Deswegen wiederhole ich mich gern: Dort,
  wo diese Schäden auftreten ‑ bei den älteren Autobahnen, bei denen das der Fall
  sein kann ‑, wird solch ein Schaden dann, wenn er aufgetreten ist, entsprechend
  mit neuen, dickeren Betondecken bzw. mit Asphalt so ausgebessert, dass zukünftige
  Schäden minimiert werden können. Frau Ungrad, ist es für Sie relevant, welchen volkswirtschaftlichen
  Schaden diese Hitzewoche hatte? Es gibt ja Institute, die dazu schon Berechnungen
  angestellt haben. Werden Sie das nachrechnen oder ausrechnen? Ist das für Sie relevant?
  Alle Informationen sind für das Bundeswirtschaftsministerium immer relevant. Wir
  werden das auch auswerten. Aber ich kann Ihnen jetzt aktuell nichts dazu sagen.
  Zum einen müssen wir Dinge auswerten. Wir müssen schauen, was das für Studien sind,
  wie der Hintergrund ist, welche Erhebungen gemacht worden sind und welche Schlüsse
  dann zu ziehen sind. Aber aktuell kann ich Ihnen dazu noch nichts sagen. Herr Kornelius,
  angesichts dessen, was wir besprochen haben und besprechen: Der Nationale Sicherheitsrat
  wurde ja auch gegründet, um sich zum Beispiel mit Naturkatastrophen zu befassen.
  Ist es denkbar, dass er sich auch mit einer solchen Frage, bundesweit übergreifend,
  beschäftigen könnte? Ich schließe im Leben das meiste nicht aus. Die Frage geht
  an das Gesundheits- und an das Finanzministerium: Wir haben im Moment noch die Krankenhausreform
  und die Pflegereform vor uns. Hat diese Hitzewelle möglicherweise noch Auswirkungen
  darauf, wie genau diese beiden Reformen designt sind? Fließt dafür möglicherweise
  auch noch zusätzliches Geld, um Klimaanpassungsmaßnahmen zu erhöhen? Was die Gesundheitsreform
  angeht: Wie Sie wissen, befindet sich das Beitragssatzstabilisierungsgesetz gerade
  in den parlamentarischen Beratungen. Zu etwaigen Änderungen und auch aktuellen Anpassungen
  kann ich an dieser Stelle nichts sagen. Ich möchte auch den Gesprächen nicht vorgreifen.
  Dasselbe gilt für die Pflegereform. Dazu kann ich für das BMF nichts ergänzen. An
  das BMWE: Es gab auch Berichte über Brände an Transformatoren. Würden Sie sagen,
  dass das deutsche Stromnetz für diese Hitze ausreichend fit ist? Das deutsche Stromnetz
  ist, prinzipiell gesehen, was die Umfassendheit angeht, eines der besten in Europa.
  Aber nichtsdestotrotz ‑ das habe ich Ihnen am Anfang gesagt ‑ sind die Netzbetreiber
  für eine fortlaufende Prüfung und Systembeobachtung selbst zuständig. Wir haben
  auch eine Krisenkommunikation innerhalb des Bundeswirtschaftsministeriums mit den
  Netzbetreibern ‑ zum einen in Bezug auf Gas, aber auch auf Strom‑ , in der über
  eventuelle Auswirkungen oder Probleme berichtet wird. Wir lassen uns auch monatlich
  einmal darüber informieren. Bei bestimmten Situationen kann diese Krisenkommunikation
  jederzeit einberufen werden. Das kann natürlich öfter stattfinden. Über größere
  Probleme liegen uns aber keine Erkenntnisse vor. An das Bundesgesundheitsministerium:
  Es gab in den vergangenen Tagen, gerade am Wochenende, auch diverse Berichte über
  extrem hohe Temperaturen in Krankenhäusern, in Notaufnahmen, in Patientenzimmern
  etc. Der WHO-Chef hat dringend mehr Hitzeschutz angemahnt. Wie schätzen Sie den
  Status quo des Hitzeschutzes im Gesundheitssystem in Deutschland, gerade in Krankenhäusern,
  ein? Wie jetzt schon mehrfach gesagt wurde, sind wir als Bund für die konkrete Situation
  in den Krankenhäusern nicht zuständig. Das ist uns aber selbstverständlich ein wichtiges
  Anliegen. Wir tun, was wir können und was wir dürfen. Wir können aber nichts an
  der föderalen Ordnung ändern. Ich möchte an dieser Stelle noch einmal darauf hinweisen
  ‑ das wurde hier schon mehrfach gesagt ‑: Der Bund stellt den Krankenhäusern mit
  dem Transformationsfonds insgesamt 29 Milliarden Euro bereit, um die Krankenhauslandschaft
  in Deutschland nachhaltig weiterzuentwickeln und an neue Anforderungen anzupassen.
  Förderfähig sind auch Projekte zur Modernisierung und zum Neubau von Kliniken, die
  nach aktuellen Baustandards errichtet werden. Dann kann natürlich auch den Anforderungen
  des Klimawandels Rechnung getragen werden. Eigene Förderprogramme haben wir nicht.
  Es ist nicht unsere Aufgabe, das jetzt zu bewerten, sondern wir stehen im Austausch
  mit den Ländern und Kommunen und geben Hilfestellungen und Hinweise. Wir haben Hitzeschutzpläne
  aufgelegt, in denen wir Maßnahmen empfehlen. Wir geben im Übrigen auch einiges an
  Geld aus, um die Bevölkerung zu informieren. Aber ich meine, Sie als Bundesgesundheitsministerium
  sind doch die Zentrale für Expertise zu diesen Fragen und sollten einen ganz guten
  Überblick haben, wie der Status quo in Deutschland ist - trotz Föderalismus. Wie
  gesagt, das liegt in der Zuständigkeit der Länder. Wenden Sie sich vielleicht an
  die Krankenhausgesellschaft. Wir können das nicht so kleinteilig überwachen. Das
  ist auch gar nicht unsere Aufgabe. Der Tankrabatt läuft aus. Es gibt ja verschiedene
  Untersuchungen, nach denen er zum Beispiel nicht vollständig weitergegeben wurde.
  Er war auch relativ teuer. Welches Fazit zieht die Bundesregierung zu diesem Instrument?
  Die Bundesregierung teilt das Fazit der unabhängigen Monopolkommission. Die Steuersenkungen
  sind weitgehend bei den Verbraucherinnen und Verbrauchern angekommen. Wir stellen
  also fest, dass die Maßnahmen wirken, dass der Tankrabatt seine Funktion erfüllt
  hat, besonders in einer Phase, in der die Kraftstoffpreise besonders hoch waren,
  und dass dadurch diese Preisspitzen abgefangen werden konnten. Herr Kall oder Herr
  Kornelius, sind von der Bundesregierung weitere andere Maßnahmen geplant, die das
  Auslaufen des Tankrabatts ersetzen sollen, weil ja die Lage in der Kriegsregion
  nach wie vor nicht stabil ist? Dafür gilt weiterhin, dass die Bundesregierung die
  Auswirkungen dieser Krise, des Irankriegs, sehr genau beobachtet und sehr genau
  auf die ökonomischen Auswirkungen und darauf, welche Bereiche der deutschen Wirtschaft
  und welche Bürgerinnen und Bürger ‑ Pendler etc. ‑ besonders betroffen sind, schaut.
  Wir teilen erst einmal das, was der Regierungssprecher gesagt hat: Der Tankrabatt
  hatte eine wichtige Funktion, nämlich eine deutlich dämpfende Wirkung, was die Preisentwicklung
  anging. Was weitere Maßnahmen angeht, schauen wir auf die Auswirkungen. Wir schließen
  da nichts aus. Wir bleiben in einem sehr engen Kontakt mit der Taskforce, die es
  in den Regierungsfraktionen gibt, und haben natürlich mögliche Maßnahmen in der
  Schublade, wenn das notwendig wird. Aber aktuell setzen wir weiter darauf, dass
  es eine gewisse Beruhigung gibt, dass es hoffentlich wieder verlässlich freie Seewege
  durch die Straße von Hormus und damit auch eine gewisse wirtschaftliche Beruhigung
  geben wird, die die Institute dann auch voraussagen. Aber wir sind vorbereitet für
  den Fall, dass das nicht so sein sollte und es weitere Maßnahmen braucht. Es gilt
  auch weiterhin, dass das Bundeskartellamt die Befugnis hat, bei missbräuchlich erhöhten
  Preisen einzugreifen. Das heißt also, wenn ein Tankstellenbetreiber bzw. eine Mineralölgesellschaft
  einen wirtschaftlichen Vorteil durch Missbrauch erlangt hat, dann kann dieser Übergewinn
  abgeschöpft werden. Welche Optionen liegen denn in dieser Schublade? Darüber werden
  wir dann mit den Regierungsfraktionen, mit der besagten Taskforce, beraten und Maßnahmen
  dann verkünden, wenn sie anstehen. Aber Sie können sicher sein, dass die Bundesregierung
  natürlich handlungsfähig ist und sehr genau auf die weiteren wirtschaftlichen Auswirkungen
  dieses Krieges schaut. Herr Kall, wie teuer war denn der Tankrabatt am Ende, tatsächlich
  diese 1,6 Milliarden Euro, die dafür veranschlagt worden sind, oder war er günstiger
  oder teurer? Das werden wir hoffentlich in den kommenden Wochen den Monatsberichten
  des BMF entnehmen können, in denen wir die Steuereinnahmen jeweils aufschlüsseln.
  Aktuell haben wir noch keine finalen Zahlen vorliegen. Es geschieht immer etwas
  ‑ ein paar Wochen ‑ zeitverzögert, dass diese Zahlen wirklich bundesweit vorliegen.
  Die Frage geht an das AA, BMVG oder gegebenenfalls auch das BMI. Können Sie ein
  Update geben, was die deutsche Hilfe nach dem Erdbeben in Venezuela angeht? Was
  wurde schon geleistet, und was soll noch folgen? Ja, ich kann gerne den Anfang machen.
  Weiterhin gilt natürlich, dass wir jetzt sehr schnell, gezielt und koordiniert Hilfe
  leisten, wie wir das am Freitag auch angekündigt hatten, um die Bevölkerung in Venezuela
  schnellstmöglich unterstützen zu können. Das Ziel ist natürlich mit gewissen Hindernissen
  versehen; das ist klar. Die Hilfe selbst ist angelaufen. Das Auswärtige Amt hat
  bereits unmittelbar nach dem Beben mit der Katastrophenhilfe begonnen. Die ersten
  deutschen Helfer sind bereits am Donnerstagabend nach Venezuela aufgebrochen. Durch
  die schnelle Analyse konnten wir uns dann rasch mit anderen europäischen Staaten
  koordinieren und auch genau das an Hilfe anbieten ‑ natürlich nicht in dem Maß ‑,
  was vor Ort gebraucht wird. Zwei deutsche Such- und Rettungsteams des Technischen
  Hilfswerks und der deutschen Organisation @fire sind bereits vor Ort im Einsatz.
