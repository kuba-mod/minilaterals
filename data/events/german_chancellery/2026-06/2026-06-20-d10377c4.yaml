title: 'Die Kinderpressekonferenz beim Tag der offenen Tür der Bundesregierung Neugier
  kennt kein hitzefrei: Kinder fragen den Regierungssprecher'
text: 'Die jungen Besucherinnen und Besucher haben viele Fragen für den Regierungsprecher
  mitgebracht. Was tut die Bundesregierung für die Bildung? Warum muss die Bundeswehr
  wachsen? Und sollte Deutschland wieder auf Atomkraft setzen? Dieser und vielen weiteren
  Fragen stellte sich Regierungssprecher Stefan Kornelius in der Kinder- und Jugendpressekonferenz
  beim Tag der offenen Tür der Bundesregierung. Gut 90 Kinder und Jugendliche aus
  Berlin und aus ganz Deutschland nutzten die Gelegenheit, ihre Fragen direkt an den
  Sprecher der Bundesregierung zu richten. Dabei zeigte sich schnell: Die jungen Gäste
  hatten sich gut vorbereitet und brachten ein breites Spektrum an Themen mit. Von
  Bildungspolitik über Sicherheit und Verteidigung bis hin zu Energiefragen war alles
  vertreten. Auch die sommerlich warmen Temperaturen konnten die Neugier der Kinder
  und Jugendlichen nicht bremsen. Mit großem Interesse verfolgten sie die Antworten
  und beteiligten sich engagiert an der Diskussion. Kaum war eine Frage beantwortet,
  gingen bereits die nächsten Hände nach oben. Manche Fragen ließen sich kurz und
  prägnant beantworten, andere erforderten ausführlichere Erläuterungen. Besonders
  schnell ging es bei der Frage nach dem Lieblingsessen des Bundeskanzlers. Die Antwort
  lautete: Kirschjoghurt. Bei anderen Themen wurde es komplexer: So erläuterte Kornelius
  zur Atomenergie, dass bei der Diskussion über eine mögliche Rückkehr zur Kernenergie
  auch die Frage der dauerhaften Lagerung hochradioaktiver Abfälle mitgedacht werden
  müsse. Neben politischen Themen interessierten sich die Kinder und Jugendlichen
  auch für den Alltag des Regierungssprechers. Kornelius berichtete, dass er Fahrten
  durch Berlin häufig nutzt, um E-Mails zu beantworten, zu telefonieren oder Nachrichten
  zu schreiben. Sein Terminkalender sei meist eng getaktet. Breiten Raum nahm die
  Diskussion um die Verteidigungsfähigkeit Deutschlands ein. Warum investiert Deutschland
  so viel in die Bundeswehr? Brauchen wir überhaupt eine starke Armee? Regierungssprecher
  Kornelius nahm sich die Zeit, um die sicherheitspolitischen Herausforderungen zu
  erklären. Deutschland müsse in der Lage sein, sich zu verteidigen. „Das nennt man
  Abschreckung“, so der Regierungssprecher. Zur Veranschaulichung griff er auf ein
  Beispiel aus dem möglichen Alltag vieler Kinder zurück: Wer auf dem Schulhof stark
  wirke, werde oft seltener bedrängt. Regierungssprecher Kornelius warb dafür, einzelne
  Gruppen der Gesellschaft nicht gegeneinander auszuspielen. Dazu verglich er die
  Gesellschaft mit einem großen Körper, bei dem alle Teile gut zusammenarbeiten müssen.
  Die Aufgabe des Staates sei es, unterschiedliche Interessen auszugleichen – etwa
  bei Fragen der Rente, der Pflege oder des Gesundheitssystems. Entscheidend sei,
  dass die Menschen das Gefühl haben können: „Es geht fair zu.“ Zum Abschluss versammelten
  sich die Kinder und Jugendlichen gemeinsam mit dem Regierungssprecher zu einem Erinnerungsfoto
  im Bundespresseamt. Dreimal in der Woche – montags, mittwochs und freitags – findet
  die Regierungspressekonferenz im Haus der Bundespressekonferenz statt. Dort stehen
  die Sprecherinnen und Sprecher der Bundesregierung und der Bundesministerien den
  Fragen der Hauptstadtjournalistinnen und -journalisten zur Verfügung. Auch die Bundespressekonferenz
  öffnet am 20. und 21. Juni 2026 ihre Türen für das Publikum. Das Programm finden
  Sie in dieser Übersicht .'
