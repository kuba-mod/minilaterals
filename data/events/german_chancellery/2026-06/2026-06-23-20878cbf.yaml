date: '2026-06-23'
type: press_release
source_name: german_chancellery
title: Rede von Bundeskanzler Merz anlässlich des Tags der Industrie 2026 „Wohlstand
  für die Jugend“
text: 'Im Anschluss an seine Rede hat Bundeskanzler Merz an einem Bühnengespräch mit
  dem BDI -Präsidenten Peter Leibinger teil. „Jetzt ist die junge Generation diejenige,
  die unsere gesamte Zuwendung und Aufmerksamkeit verlangt“, erklärte Bundeskanzler
  Friedrich Merz beim Tag der Industrie (TDI) des Bundesverbandes der Deutschen Industrie
  (BDI) auf dem EUREF -Campus in Berlin. Die zentrale Aufgabe der Politik sei es,
  heute die richtigen Entscheidungen zu treffen, damit auch die nächsten Generationen
  die Chancen auf Wohlstand und Sicherheit erhalten. Fortschritte bei internationalen
  Handelsabkommen, die Geschlossenheit der G7 -Staaten sowie neue wirtschaftliche
  Partnerschaften seien wichtige Signale für mehr Stabilität, Verlässlichkeit und
  Planbarkeit. Mit Blick auf die Zukunft benannte Merz vier zentrale Handlungsfelder,
  die aus seiner Sicht entscheidend seien, um Wohlstand für die junge Generation zu
  sichern: eine wirksame Hightech Agenda, mehr Start-ups , mehr Rechenkapazität, bessere
  Verteidigungsfähigkeit. „ Nach Wohlstand für alle muss jetzt folgen, Wohlstand für
  die Jugend,“ betonte der Bundeskanzler. Sehr geehrter Herr Präsident, lieber Herr
  Leibinger, liebe Kolleginnen und Kollegen aus dem Deutschen Bundestag und dem Europäischen
  Parlament, herzlichen Dank für die freundliche Begrüßung. Lieber Herr Leibinger,
  herzlichen Dank – ich denke, ich darf das im Namen aller sagen – für Ihre Rede.
  Danke für Ihre Bereitschaft zum Optimismus. Dieser Optimismus – Sie haben es beschrieben –
  beruht auf der Stärke, die wir immer noch haben. Diese Stärke wollen und müssen
  wir nutzen und zum Teil auch ganz neu beleben. Danke für den konstruktiven Beitrag,
  den Sie nicht nur heute leisten, sondern auch in vielen Diskussionen und Begegnungen.
  Danke für Ihre Bereitschaft mitanzupacken. Meine Damen und Herren, ich will zu Beginn
  meiner Rede noch einmal kurz zurückblicken, nicht um sozusagen der Gegenwart auszuweichen,
  sondern um das ganze Bild zu zeigen. Vor ziemlich genau einem Jahr, als ich zuletzt
  hier gesprochen habe, hatte die Bundesregierung ihre Arbeit gerade aufgenommen.
  Wir waren mit einem neuen Zollregime aus den USA konfrontiert. Es wehte ein scharfer
  Wind über den Atlantik. Wir sahen die Anfänge der militärischen Auseinandersetzung
  im Mittleren Osten. Der russische Angriffskrieg ging ins vierte Jahr. Innenpolitisch
  hatten wir einen gehörigen Reformbedarf diagnostiziert. Wir waren uns einig, dass
  wir diese Reformen nicht alle bis ins letzte Detail im Koalitionsvertrag vorverhandeln
  konnten. Wir haben die Vorarbeiten für große Reformen in verschiedene Kommissionen
  gegeben und ihnen die Arbeit anvertraut. Wir haben uns an die Arbeit gemacht, die
  Punkte, die wir im Koalitionsvertrag verabredet hatten, aufzunehmen und abzuarbeiten.
  Das Thema Ihres damaligen Tages der Industrie war: Neue Zeiten, neue Antworten. Meine
  Damen und Herren, diese neuen Zeiten, die neue geopolitische und auch geoökonomische
  Realität, die Transformation in der Arbeitswelt und in der Gesellschaft nicht zuletzt
  durch künstliche Intelligenz, die friedlose Welt um uns herum, all das setzt uns
  als ein global vernetztes Land, als eine exportorientierte Volkswirtschaft, auch
  als ein Land, das völkerrechtlich dem Multilateralismus verbunden ist, bis heute
  unter massiven Druck. Einige Antworten auf diese Herausforderungen waren im vergangenen
  Jahr schon klar, ganz zuvorderst diese: Wir mussten als Europäer neu an unserer
  Geschlossenheit und an unserer Unabhängigkeit arbeiten. Wir mussten mehr Verantwortung
  übernehmen. Wir mussten Verantwortung für einen echten Gestaltungsanspruch in Europa
  und darüber hinaus übernehmen. Mit diesem Ziel haben wir unsere Arbeit aufgenommen.
  Auf dieses Ziel arbeiten wir unverändert hin. Ich kann den diesjährigen Tag der
  Industrie nutzen, um ein erstes Resümee zu ziehen. Wie weit sind wir auf unserem
  Weg – Sie haben es mit genau diesen Worten in Ihrer Rede ja auch angesprochen –
  zu mehr Resilienz und Souveränität – das sind die zentralen Themen Ihrer Konferenz
  in diesem Jahr – gekommen? Nun, meine Damen und Herren, es gibt gerade in diesen
  Tagen auch in dieser Hinsicht verschiedentlich Anlass für vorsichtigen Optimismus.
  Erstens: Die USA und der Iran befinden sich in Friedensverhandlungen, mit allen
  Schwierigkeiten, die damit einhergehen. Zweitens: Das Europäische Parlament hat
  in der vergangenen Woche das Zollabkommen mit den Vereinigten Staaten von Amerika
  gebilligt. Drittens: Wir haben beim in der vergangenen Woche stattgefundenen G7
  -Gipfel in Évian in Frankreich im Umgang mit Russlands Angriffskrieg auf die Ukraine
  einen neuen Konsens gefunden. Wir haben die Reihen geschlossen, auch und nicht zuletzt,
  weil wir zuvor als Europäer entschlossen und geeint aufgetreten sind. Ich kann in
  diesem Zusammenhang überhaupt sagen: Was wir früher einmal den Westen genannt haben,
  dieser Westen hat in Évian seit Langem wieder einmal Einigkeit gezeigt. Viertens
  schließlich: Vor vier Wochen ist das modernisierte Abkommen zwischen der Europäischen
  Union und Mexiko unterzeichnet worden. Seit dem 1. Mai, also seit jetzt fast zwei
  Monaten, wird das Handelsabkommen mit den MERCOSUR -Staaten vorläufig angewendet.
  Das alles klingt so selbstverständlich. Aber, meine Damen und Herren, das Abkommen
  mit den MERCOSUR -Staaten ist mehr als 25 Jahre verhandelt worden, und ich musste
  eine Entscheidung treffen, die mir persönlich außergewöhnlich schwer gefallen ist,
  nämlich die Entscheidung, erstmalig in der Geschichte der Handelspolitik der Europäischen
  Union einem Abkommen zuzustimmen, dem Frankreich seine Zustimmung nicht gegeben
  hat. Ohne uns wäre eine qualifizierte Mehrheit für dieses Abkommen nicht erreichbar
  gewesen. Um das handelspolitische Bild vollständig zu machen: Die Verhandlungen
  mit Indien, Australien und Indonesien sind abgeschlossen, mit Malaysia, den Philippinen
  und Thailand sind sie auf einem sehr guten Weg. Früher hat man das, was ich gerade
  beschrieben habe, Außenpolitik genannt, allenfalls Handelspolitik. Heute, meine
  Damen und Herren, ist es mehr denn je Wirtschaftspolitik. Das lässt sich nicht mehr
  voneinander trennen. Denn all das, was ich gerade aufgeführt habe, trägt zu mehr
  Sicherheit, zu mehr Verlässlichkeit, zu mehr Planbarkeit in einer Welt bei, in der
  Lieferketten und Rohstoffversorgung zu den zentralen Bedingungen des Erfolgs einer
  Volkswirtschaft geworden sind. Es trägt damit, meine Damen und Herren, zu Ihrer
  Fähigkeit bei, so, wie Sie es sagen, Produkte lokal, global und in globalen Netzwerken
  zu erzeugen. Herr Präsident, lieber Herr Leibinger, Sie haben das gerade so treffend
  als ein Alleinstellungsmerkmal unserer Industrie beschrieben. Diese Ergebnisse in
  der Außenpolitik, in der Europapolitik und in der Handelspolitik gehen auch, jedenfalls
  in ganz erheblichen Teilen, auf unseren selbstbewussten Einsatz als Bundesregierung
  und als Europäer für den freien Handel, für die internationale Zusammenarbeit, eben
  für den Multilateralismus zurück. Mit diesem Einsatz machen wir und mache ich genau
  so weiter. Aber wahr ist auch: Das ändert nichts daran, dass wir in vielerlei Hinsicht
  noch sehr viel besser werden müssen. Meine Damen und Herren, zu erwarten ist, dass
  das, was ich an globalem Umfeld, an Krisen, an Kriegen beschrieben habe, das, was
  wir Ausnahmezustand nennen, der normale Zustand der nächsten Jahre und vielleicht
  Jahrzehnte bleiben wird. Wir werden deshalb ganz erheblich an unserer Krisenresilienz
  und an unserer Reaktionsfähigkeit arbeiten müssen. Wir können auch nur dann so resilient
  und souverän bleiben, wenn wir hier, im Inneren, stark sind, wenn wir hier wachsen,
  wenn wir hier im Wettbewerb gewinnen und am Ende die wichtigsten Versprechen erfüllen,
  die ein Staat geben kann, so, wie Sie es gesagt haben: Wohlstand und Sicherheit
  für seine Bürgerinnen und Bürger. Genau daran arbeiten wir. An welchem Punkt stehen
  wir nach gut einem Jahr mit dieser Arbeit? Ich habe heute Morgen den Abschlussbericht
  der Alterssicherungskommission, die wir als Bundesregierung eingesetzt haben, mit
  Vorschlägen zur Reform des Rentensystems entgegengenommen. Danke übrigens, dass
  Sie bereit waren, den zeitlichen Ablauf des Tages der Industrie heute dafür anzupassen.
  Meine Damen und Herren, wir werden uns einig sein, dass das ein guter Grund war.
  Denn wir sind sehr dankbar dafür, dass der Bericht nun vorliegt, und vor allem auch
  dafür, dass die Kommission ihn in seiner Gesamtheit trägt. Es gibt keine abweichenden
  Voten. Damit haben wir, wie übrigens auch bei der Kommission zur Reform des Gesundheitswesens,
  eine sehr substanzielle und durchdachte Vorlage. Ich habe mit der Bundesarbeitsministerin
  verabredet, dass wir die Vorschläge als Gesamtkunstwerk – so hat sie es ausgedrückt,
  und ich mache mir diesen Begriff zu eigen – jetzt vollständig in Gesetzessprache
  übersetzen. Die wichtigste Botschaft dieser Reform ist vielleicht die: Wir führen
  eine zusätzliche kapitalgedeckte, individualisierte gesetzliche Kapitalrente ein.
  Damit wird der Trend, den wir bisher erleben, in zwei Richtungen umgekehrt: Der
  Beitragssatz im Umlagesystem steigt perspektivisch nicht mehr, er sinkt, und das
  Versorgungsniveau sinkt nicht, sondern steigt in den 2040er- und 2050er Jahren an.
  An diesem Beispiel sehen Sie übrigens, dass wir nicht Rentenpolitik für eine Wahlperiode
  machen. Wir machen Rentenpolitik und Altersvorsorgepolitik für die nächste Generation.
  Ich werde darauf gleich noch zurückkommen. Durch diesen Einstieg in eine kapitalgedeckte
  Altersversorgung können gerade junge Menschen wieder darauf vertrauen, selbst eine
  verlässliche Altersversorgung zu bekommen. Wir sprechen von einem neuen Gesamtversorgungsniveau.
  Meine Damen und Herren, die Nutzung des Kapitalmarkts in der gesetzlichen Rentenversicherung
  ist vielleicht die entscheidende Weichenstellung für die Zukunftsfähigkeit und Stabilität
  unseres Rentensystems. In diesem Kreis hier brauche ich das, denke ich, nicht länger
  zu erläutern oder auszuführen. Daneben enthält der Vorschlag der Kommission weitere
  wichtige Maßnahmen wie zum Beispiel die Abschaffung der sogenannten Rente mit 63.
  Das reduziert auch weitere Anreize für Frühverrentung und koppelt das Renteneintrittsalter
  in Zukunft an die Entwicklung der Lebenserwartung. Das ist eine langjährige Forderung
  aus der Wissenschaft, auch aus der Wirtschaft. Wir werden es jetzt in der Koalition
  umsetzen. Ich will ganz ehrlich sagen, ich hätte nicht erwartet, dass die Kommission
  einen so weitreichenden Vorschlag unterbreitet und auch einen Vorschlag unterbreitet,
  der im Hinblick auf die zusätzliche kapitalgedeckte Altersversorgung unter geringstmöglichem
  bürokratischen Aufwand umsetzbar ist. Meine Damen und Herren, Sie alle wissen, dass
  diese Reform nur eine von vielen ist, die wir uns vorgenommen haben. Ich weiß, vielen
  hier im Saal geht das alles nicht schnell genug, und ich gebe zu: auch mir nicht.
  Aber das kann ich Ihnen zugleich zusichern: Der Wille, die notwendigen Schritte
  zu gehen, die Dinge voranzutreiben, die Dinge auch gut zu machen, ist bei mir groß,
  und er ist in der ganzen Bundesregierung groß. Lassen Sie mich in diesem Zusammenhang
  Dank für die Gespräche sagen, die wir geführt haben, nicht zuletzt für das Gespräch,
  das wir, Herr Leibinger, vor zwei Wochen mit Ihnen, den weiteren Spitzenvertretern
  der Wirtschaftsverbände und den jeweiligen Vorsitzenden der Gewerkschaften hatten.
  Dieses Gespräch war vertrauensvoll. Es war konstruktiv. Ich will mich dafür bei
  Ihnen und allen weiteren Gesprächspartnern noch einmal sehr herzlich bedanken. Denn
  dies zeigt den Geist, in dem wir zusammenarbeiten. Wir als Koalition entwickeln
  in diesen Tagen weitere Vorschläge, die wir dem Land gemeinsam unterbreiten wollen.
  Das klingt so selbstverständlich, ist aber hochanspruchsvoll. Denn, meine Damen
  und Herren, wir machen in der Koalition miteinander das aus, was auch das Land mit
  sich ausmacht. Wir haben miteinander auch schon einiges ausgemacht, was gerade auf
  Resilienz und Souveränität unseres Landes und der gesamten Europäischen Union einzahlt.
  Wir arbeiten intensiv an der Wiederherstellung unserer Verteidigungsfähigkeit. Wir
  arbeiten an einer neuen, pragmatischen und realistischen Energiepolitik – Katherina
  Reiche hat dies heute Morgen hier dargestellt –, vor allem mit dem Ziel, die Preise
  in den Griff zu bekommen. Wir arbeiten an einer ambitionierten Innovations- und
  Technologiepolitik. Überhaupt ist die Fähigkeit zur Innovation eine der deutschen
  Kernkompetenzen. Deutschland gehört mit seiner industriellen Basis und mit Blick
  zum Beispiel auch auf Patentanmeldungen weiterhin zur Weltspitze. Aber wir müssen
  besser darin werden, unsere traditionellen Stärken in der Forschung, in der Entwicklung
  und in der Fertigung in neue Geschäftsmodelle und Wertschöpfungsketten zu übersetzen.
  Gerade bei der Entwicklung und Nutzung digitaler Spitzentechnologien haben wir einen
  großen und leider immer noch wachsenden Nachholbedarf. Die Bundesregierung hat die
  Innovationspolitik deshalb neu ausgerichtet. Das, meine Damen und Herren, ist mein
  erster von vier weiteren Lichtblicken, die ich heute gerne kurz mit Ihnen teilen
  will. Mit der Hightech Agenda Deutschland – Doro Bär hat das hier vorgestellt –
  konzentrieren wir uns auf sechs Schlüsseltechnologien, auf künstliche Intelligenz,
  Quantentechnologien, Mikroelektronik, Biotechnologie, Fusionstechnologie und klimaneutrale
  Energieerzeugung sowie Technologien für die klimaneutrale Mobilität. Wir legen einen
  besonderen Fokus auf Sprunginnovationen, auf Verteidigungstechnologie und technologische
  Souveränität. Ich hätte diesen Begriff vor zwei Jahren nur mit großer Zurückhaltung
  verwendet, wenn überhaupt. Aber wir haben genau hier in diesem Raum vor etwa einem
  halben Jahr zusammen mit der französischen Regierung, Staatspräsident Macron und
  ich, einen gemeinsamen Digitalgipfel zwischen Deutschland und Frankreich ermöglicht,
  auf dem wir uns genau dies zum Ziel gesetzt haben, Europa, geführt durch Deutschland
  und Frankreich, auch technologisch wieder nach vorn zu bringen und auch unabhängiger
  von anderen zu werden. Wir legen einen besonderen Wert auf diese technologische
  Souveränität, auch in der gesamten Hightech Agenda, die die Brücke von der Forschung
  zur industriellen Anwendung, zur Wertschöpfung und letztendlich zur Erhöhung unserer
  Wettbewerbsfähigkeit insgesamt sein soll. Darauf richten wir auch unsere Förderpolitik
  aus. Unser Land, meine Damen und Herren, muss sich bei alldem nicht verstecken.
  Sie haben es gesagt, Herr Leibinger. Wir haben kluge Ideen, kluge Menschen, weltweit
  führende Grundlagenforschung, eine unglaubliche Tiefe an Expertise. Allzu oft scheitern
  wir nicht an fehlender Innovationskraft, sondern an der Vermarktung und der Skalierung.
  Deshalb, zweitens: Meine Damen und Herren, im Jahr 2025 sind in Deutschland rund
  30 Prozent mehr Start-ups gegründet worden als im Jahr zuvor, in absoluten Zahlen
  über 3500 neue Unternehmen, meistens mit jungen Menschen, die den Mut haben, etwas
  Neues auszuprobieren, anzupacken und auch Verantwortung zu übernehmen. Hier entstehen
  Innovation und eine neue wirtschaftliche Dynamik. Aber damit aus diesen Start-ups
  erfolgreiche Unternehmen werden können, damit sie auch zur Resilienz und Souveränität
  beitragen, brauchen sie Kapital. Europäisches Kapital muss dabei eine viel größere
  Rolle spielen als in den letzten Jahren und Jahrzehnten. Um es noch deutlicher zu
  sagen: Ich möchte, dass diese Unternehmen in Europa eine Zukunft haben, dass sie
  sich auch in Europa finanzieren können und dass wir alle zusammen von der Wertschöpfung
  dieser Unternehmen in Europa und ganz besonders in Deutschland profitieren. Das
  setzt voraus, dass wir einen breiteren und tieferen Kapitalmarkt in Deutschland
  und in Europa haben als gegenwärtig. Meine Damen und Herren, das ist nicht nur die
  Beschreibung dessen, was wir wollen, sondern wir haben es bereits konkret mit einigen
  Elementen entschieden. Wir haben mit einer Milliarde Euro einen der größten Kapitaldachfonds
  geschaffen, die es in Europa bisher gibt. Deshalb haben wir auch genau diesen Deutschlandfonds
  aufgelegt, über den wir mit öffentlichen und privaten Mitteln Garantien für private
  Investitionen auslösen können. Auch an dieser Stelle wird die geplante Kapitalrente
  einen spürbaren und strategisch wichtigen Unterschied machen. Meine Damen und Herren,
  das, was wir in der Rentenpolitik tun, hat ja eine zweite Seite. Durch die Beiträge
  kommen in Zukunft jährlich mindestens 30 Milliarden Euro zusammen, die für den deutschen
  Kapitalmarkt und für die Investitionen der Unternehmen in Deutschland zur Verfügung
  stehen. Das ergibt innerhalb kürzester Zeit einen erheblichen zusätzlichen Kapitalstock,
  der unter anderem für Investitionen in die Zukunft unseres Landes zur Verfügung
  stehen wird, insbesondere für Wachstumsfinanzierung. Drittens, Rechenkapazität:
  Meine Damen und Herren, Rechenkapazität ist das Rückgrat moderner Wertschöpfungsprozesse.
  Darin stecken gewaltige Potenziale für die Steigerung unserer Innovationskraft und
  Produktivität. Dieses Potenzial wollen wir heben. Wir wollen die Rechenkapazitäten
  in den nächsten Jahren massiv ausbauen und haben dafür vor einigen Monaten bereits
  eine Nationale Rechenzentrumsstrategie beschlossen. Unser Ziel ist es, die Rechenkapazitäten
  in Deutschland bis zum Jahr 2030 mindestens zu verdoppeln und die Rechenkapazitäten
  für High-Performance-Computing und künstliche Intelligenz mindestens zu vervierfachen.
  Auch hier sehen Sie: Wir sind auf dem Weg zu größerer Souveränität, auch in modernen
  Technologien. Auch deshalb bewerben wir uns um eine der AI Gigafactories aus Europa
  für Deutschland. Wir wollen die Rechenkapazitäten gezielt unter anderem für die
  Entwicklung von europäischer Speerspitzen- KI einsetzen. Denn der Aufbau von europäischen
  KI -Ökosystemen ist wiederum unverzichtbar für digitale Souveränität. Dass wir in
  Europa etwas auslösen können, wenn wir zusammenhalten und unsere Kraft auf die Straße
  bringen, konnten wir bei der überfälligen Korrektur der KI -Regulierung in der Europäischen
  Union – ich sehe hier Roland Busch – für den Maschinenbau in Deutschland ermöglichen.
  Es war eine gehörige Kraftanstrengung, die anderen Mitgliedstaaten der Europäischen
  Union davon zu überzeugen, die Maschinen-Regulierung aus der entsprechenden Verordnung,
  der allgemeinen KI -Regulierung der Europäischen Union, herauszunehmen. Es ist uns
  gelungen, das in einer gemeinsamen Kraftanstrengung zu ermöglichen. Der Maschinenbau
  in Deutschland und andere Branchen haben damit jetzt eine sehr viel bessere Chance,
  künstliche Intelligenz anzuwenden, als in der Vergangenheit. Meine Damen und Herren,
  wir haben auch deshalb erneut zusammen mit Frankreich in der vergangenen Woche eine
  gemeinsame Definition und klare Kriterien für europäische digitale Souveränität
  vorgelegt. Es ist jetzt unser gemeinsames Ziel, Abhängigkeiten im Tech bereich zu
  reduzieren und souveräne Lösungen in Europa zu unterstützen. Viertens und abschließend:
  Wir gehen gerade heute in der Sicherheits- und Verteidigungsindustrie große Schritte
  nach vorn. Ich habe es immer wieder gesagt und wiederhole es hier: Wir wollen uns
  verteidigen können, um uns nicht verteidigen zu müssen. Das erfordert aber größte
  Kraftanstrengungen in unsere Verteidigungsfähigkeit. Ich gebe Ihnen auch dazu eine
  Zahl. Seit Mai 2025, also seit gut einem Jahr, sind Beschaffungsverträge mit einem
  historischen Gesamtvolumen von rund 85 Milliarden Euro auf den Weg gebracht worden.
  Wir investieren nicht nur in etablierte Waffensysteme, sondern genauso in Zukunftstechnologien
  wie unbemannte Systeme, Weltraum und Cyber . All das ist ebenfalls eine Investition
  in Resilienz und Souveränität. Davon profitiert nicht nur die klassische Rüstungsindustrie,
  sondern davon profitieren auch Hersteller von Dual-Use -Technologien, Hunderte ziviler
  Unternehmen bis hin zu Start-up -Unternehmen, die sich in diesem Bereich gegründet
  haben. Meine Damen und Herren, ich komme auf die Ausgangsfrage zurück, die auch
  Peter Leibinger gestellt hat. Warum machen wir das alles? Worum geht es bei den
  Veränderungen, die wir doch alle für nötig halten? Was ist sozusagen die Vision?
  Auch Sie, Herr Leibinger, fragen ja nach genau diesem großen Zielbild. Beim Tag
  der Familienunternehmen vor zwei Wochen habe ich geantwortet, das Ziel ist, dass
  wir und unsere Kinder und Kindeskinder weiterhin in Freiheit, Sicherheit und Wohlstand
  leben können. Lassen Sie mich das noch etwas präziser sagen. Im nächsten Jahr, im
  Jahr 2027, jährt sich zum 70. Mal das Erscheinen des Buches mit dem Titel „Wohlstand
  für Alle“, das Ludwig Erhard geschrieben hat. Meine Damen und Herren, dieses Versprechen
  aus dem Jahr 1957, das Ludwig Erhard abgegeben hat, hat er eingelöst. Die marktwirtschaftliche
  Ordnung hat eindrucksvoll bewiesen, dass sie genau das kann, Wohlstand für alle.
  Wir alle, die wir heute in dem Raum sitzen, sind Kinder dieses Wohlstandes. Jetzt
  müssen wir die zweite Auflage dieses Buches schreiben. Der Titel dieses Buches muss
  lauten: Wohlstand für die Jugend. Jetzt ist die junge Generation diejenige, die
  unsere gesamte Zuwendung und Aufmerksamkeit verlangt und uns zu Recht abverlangt.
  Wir müssen jetzt die Weichen dafür stellen, dass in den nächsten Jahren und Jahrzehnten
  die nächste, die übernächste Generation genau die Chance hat, die wir als die Älteren
  gehabt haben – ich darf mich selbst dazuzählen –, nämlich in Frieden, in Freiheit,
  in Wohlstand und mit einem hohen Maß an sozialer Gerechtigkeit zu leben. Nach „Wohlstand
  für Alle“ muss jetzt folgen: Wohlstand für die Jugend. Meine Damen und Herren, wenn
  wir uns darauf gemeinsam verständigen, wenn wir das in dem Geist tun, den Sie in
  Ihrer Rede angesprochen haben und den ich in meinem Beitrag heute anzusprechen versucht
  habe, wenn das unsere gemeinsame Zielvorstellung für Deutschland ist, dann habe
  ich keinen Zweifel daran, dass wir in einer großen Kraftanstrengung gemeinsam in
  der Lage sind, dies zu erreichen. Was vor 70 Jahren möglich war, unter schwierigsten
  Bedingungen nach zwei verlorenen Weltkriegen und angesichts eines Landes in Trümmern,
  das muss doch heute erneut möglich sein, auf diesem stabilen Fundament, auf dem
  wir heute stehen. Meine Damen und Herren, packen wir das gemeinsam an! Wenden wir
  uns diesem Zielbild zu, und zeigen wir vor allem den Jüngeren in unserem Land, dass
  die besten Jahre nicht nur nicht hinter uns liegen, sondern dass sehr gute Jahre
  vor uns liegen. Wenn wir das zusammen tun, dann werden wir eines Tages aus der Rückschau
  auf diese Zeit sagen: Es war eine Zeit voller Krisen, voller großer Herausforderungen.
  Aber wir haben die richtigen Antworten gegeben. Wir haben in unserer Gesellschaft
  zusammengehalten, und wir haben gezeigt, was Deutschland kann. Ich bin davon überzeugt,
  dass es geht.'
