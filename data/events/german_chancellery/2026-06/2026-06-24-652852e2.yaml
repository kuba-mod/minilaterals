title: Preisträgerinnen und Preisträger im Bundeskanzleramt Kanzler trifft Gewinner
  des Europäischen Wettbewerbs
text: 'Die Gewinnerinnen und Gewinner kamen bei ihrem Besuch im Bundeskanzleramt auch
  mit Kanzler Merz ins Gespräch. Bundeskanzler Friedrich Merz hat Preisträgerinnen
  und Preisträger des Europäischen Wettbewerbs im Kanzleramt getroffen und die Gruppe
  bei einem Rundgang durchs Bundeskanzleramt persönlich begrüßt. Dabei nahm er sich
  Zeit für einen Austausch mit den jungen Gästen zu deren Perspektiven auf Europa.
  Auch der Stellvertretende Regierungssprecher Sebastian Hille traf die Gäste zu einem
  Austausch über Europa aus der jungen Perspektive. Diese ist sehr weit: So sprach
  Hille mit den Schülerinnen und Schülern über die EU in der internationalen Politik,
  den wachsenden Extremismus, aber auch über die Nutzung von Social Media unter Jugendlichen
  im europäischen Kontext. Der Europäische Wettbewerb motiviert Schülerinnen und Schüler,
  sich kreativ und kritisch mit europäischen Themen auseinanderzusetzen und ihre Sicht
  auf die Zukunft Europas einzubringen. Unter vielen anderen Preisen wartet auf 30
  Preisträgerinnen und Preisträger auch eine Reise nach Berlin und ins Bundeskanzleramt.
  Die ausgewählten Teilnehmerinnen und Teilnehmer lernen auf ihrer Reise die wichtigsten
  Orte und Wegmarken des politisch-historischen Berlins kennen und treffen den Bundeskanzler.
  Was in den 1950er Jahren mit der Vergabe von Aufsatzthemen begonnen hat, ist zum
  ältesten Schülerwettbewerbs Deutschland gereift. Fast 75.000 Jugendliche haben sich
  bei der jüngsten Ausgabe mit dem Thema Europa unter dem Motto „Dein Europa: Recht,
  Respekt – Realität?!“ kreativ beschäftigt. Von Bildern und Collagen über Videos
  und Gedichte bis hin zu selbst komponierter Musik – dem Ideenreichtum sind beim
  Europäischen Wettbewerb keine Grenzen gesetzt. Ausgewählte Arbeiten werden an die
  Bundesjury weitergeleitet und haben damit die Chance auf einen von circa 600 Bundespreisen.'
