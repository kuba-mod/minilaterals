title: Verfassungsschutzbericht 2025 Steigende Bedrohung durch Extremismus
text: 'In allen Bereichen der verfassungsfeindlichen Bestrebungen wurde ein Anstieg
  der Bedrohungen festgestellt. Foto: picture alliance/dts-Agentur/dts Nachrichtenagentur
  GmbH Bundesinnenminister Alexander Dobrindt hat gemeinsam mit dem Präsidenten des
  Bundesamtes für Verfassungsschutz ( BfV ), Sinan Selen, den Bundesverfassungsschutzbericht für
  das Jahr 2025 vorgestellt. Der Bericht zeigt einen deutlichen Anstieg der Bedrohungen
  in allen Phänomenbereichen. Dass die linksextremistische Gewalt zunehme, sei ein
  „ernstes Warnsignal für unseren Rechtsstaat“, betonte Innenminister Dobrindt und
  verwies dabei unter anderem auf die Brandanschläge auf die Berliner Stromversorgung
  im Januar. Dennoch, hob Dobrindt hervor, komme die größte Bedrohung für die Demokratie
  weiterhin von Rechtsextremisten. Das Ziel sei, jede Form des Extremismus konsequent
  zu bekämpfen. Für ein wirksames Vorgehen gegen Extremisten sollten die Sicherheitsbehörden
  mit weitergehenden Befugnissen ausgestattet werden, so der Innenminister. Insgesamt wurden
  für das Jahr 2025 58.851 Straftaten mit extremistischem Hintergrund verzeichnet
  (2024: 57.701). Die Zahl der darin enthaltenen Gewalttaten stieg um rund 10 Prozent
  deutlich auf 3.294 (2024: 2.976). Der jährliche Verfassungsschutzbericht des Bundes
  dient der Unterrichtung und Aufklärung über verfassungsfeindliche Bestrebungen in
  Deutschland. Er beruht auf den Erkenntnissen, die das BfV in seinem gesetzlichen
  Auftrag zusammen mit den Landesbehörden für Verfassungsschutz gewonnen hat. Der
  Bericht benennt detailliert Gefahren und unterrichtet über wesentliche Erkenntnisse.'
