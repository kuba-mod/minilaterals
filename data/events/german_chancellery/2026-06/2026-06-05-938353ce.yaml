title: Pressestatement von Kanzler Merz vor EU-Westbalkan-Gipfel „EU muss zeigen,
  dass sie erweiterungsfähig ist“
text: 'Kanzler Merz will den Erweiterungsprozess mit konkreten Vorschlägen vorantreiben,
  erklärte er vor dem EU -Westbalkan-Gipfel in Montenegro. „Die Europäische Union
  muss zeigen, dass sie erweiterungsfähig und erweiterungswillig ist“, sagte Bundeskanzler
  Friedrich Merz kurz vor Beginn des EU -Westbalkan-Gipfels in Tivat, Montenegro.
  Dort treffen sich die Staats- und Regierungschefs der Europäischen Union und die
  Spitzen der EU-Institutionen mit sechs Partnerländern des westlichen Balkans: Albanien,
  Bosnien und Herzegowina, Serbien, Montenegro, Nordmazedonien sowie Kosovo. Gemeinsam
  mit Frankreichs Präsident Macron habe er einen konkreten Vorschlag für die nächsten
  Schritte im Beitrittsprozess unterbreitet, erklärte der Kanzler. Auch auf Seiten
  der Europäischen Union gebe es Versäumnisse, die man bei diesem Treffen überwinden
  wolle. Er hoffe, dass man zu gemeinsamen Positionen komme, die dann in der kommenden
  Zeit auch in Brüssel umgesetzt werden könnten. Guten Tag! Meine Damen und Herren,
  wir treffen uns heute in Montenegro, um die Erweiterung der Europäischen Union,
  die seit vielen Jahren überfällig ist, zu besprechen. Präsident Macron und ich,
  wir haben einen konkreten Vorschlag unterbreitet, wie wir jetzt in die nächsten
  Schritte gehen und die Erweiterung insbesondere um einige der Staaten des Westbalkans
  ermöglichen können. Die Europäische Union muss zeigen, dass sie erweiterungsfähig
  und erweiterungswillig ist, und das wollen wir heute diskutieren. Natürlich gibt
  es eine ganze Reihe von Fragen, die wir gemeinsam beantworten müssen. Aber über
  alledem muss stehen, dass dieser Teil Europas in der Perspektive zur Europäischen
  Union gehört. Wenn wir seit jetzt dreizehn Jahren keine neuen Mitglieder mehr aufgenommen
  haben, dann zeigt das, dass die Versäumnisse auch auf der Seite der Europäischen
  Union liegen. Sie wollen wir heute überwinden. Ich hatte Gelegenheit, heute Morgen
  bereits eine Reihe von Vertretern der Region zu sprechen. Wir werden jetzt im Plenum
  mit den Vertretern der Westbalkanstaaten die weiteren Schritte erörtern. Ich hoffe
  sehr, dass wir dann auch zu gemeinsamen Schlussfolgerungen kommen, die in Brüssel
  umgesetzt werden. Nicht allein der heutige Tag ist wichtig, sondern auch die Umsetzung
  in den Tagen und Wochen danach in der Europäischen Union in Brüssel. Ich fühle mich
  durch die Gespräche heute Morgen ermuntert, aber ein großer Teil der Wegstrecke
  liegt noch vor uns. Aber die Arbeit ist lösbar. Einige Mitgliedstaaten, insbesondere
  das Gastgeberland, sind schon so weit, dass wir jetzt sehr schnell zu gemeinsamen
  Ergebnissen kommen können. Das hoffe ich auch.'
