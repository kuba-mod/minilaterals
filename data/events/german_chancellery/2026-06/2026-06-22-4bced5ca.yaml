title: Digitalisierung Den Führerschein gibt es bald auch digital
text: 'Den Kartenführerschein soll es bald auch als digitale Variante für das Mobiltelefon
  geben, wie hier im Projektbeispiel zu sehen. Foto: picture alliance/dpa/Christoph
  Dernbach Die Bundesregierung will Bürokratie massiv abbauen und Bürgerinnen, Bürger,
  Verwaltung und Wirtschaft deutlich entlasten. Die Digitalisierung von Fahrzeugdokumenten
  und eine smarte Parkraumbewirtschaftung sind Teil einer Reihe von Maßnahmen, die
  den Alltag von Bürgerinnen und Bürgern spürbar erleichtern sollen. Künftig sollen
  Fahrzeugdokumente, wie der Führerschein, bequem auf dem Smartphone mitgeführt werden
  können. Dafür hat die Bundesregierung die Grundlagen geschaffen. Dies erleichtert
  künftig beispielsweise die Nutzung von Mobilitätsangeboten, wie etwa Carsharing
  . Das entsprechende Gesetz tritt am 1. Juli 2026 in Kraft, um die technische Bereitstellung
  des digitalen Führerscheins zu ermöglichen. Ziel ist laut Bundesverkehrsministerium,
  den nationalen digitalen Führerschein bis Ende 2026 zur Verfügung zu stellen. Der
  digitale Führerschein ergänzt den klassischen Führerschein – dieser bleibt weiterhin
  gültig. Er ist ein Projekt der Modernisierungsagenda Bund , um den Alltag von Bürgerinnen
  und Bürgern zu erleichtern. Die Parkraumbewirtschaftung wird zudem digitalisiert
  . Mit dieser Maßnahme setzt die Bundesregierung um, was in anderen europäischen
  Ländern bereits gängige Praxis ist. Die Kommunen erhalten damit auch mehr Spielräume
  für Lösungen beim Parkraum management , da sie durch Digitalisierung mehr Daten
  über Auslastung, Parkdauer und Nutzerverhalten erhalten können. Für Bürgerinnen
  und Bürger bedeutet das künftig: kein Ticketziehen mehr, da beispielsweise Kennzeichen
  scanner Parkvorgänge automatisch erfassen können. Die Bezahlung kann bequem per
  App oder QR-Code erfolgen. Die Bundesregierung will zudem die Straßenverkehrssicherheit
  erhöhen: Sie hat deshalb beschlossen, dass der sogenannte Handel mit Punkten für
  Verkehrsverstöße künftig verboten wird. Wer dagegen verstößt, muss mit einem Bußgeld
  von bis zu 30.000 Euro rechnen. Das Kabinett hat am 5. November 2025 die Gesetzesänderung
  beschlossen. Der Bundestag stimmte dem Gesetzesentwurf am 26. März 2026 zu. Der
  Bundesrat erteilte seine Zustimmung am 8. Mai 2026. Weitere Informationen finden
  Sie beim Bundesverkehrsministerium .'
