title: Start der Initiative „Sommer der Berufsausbildung“ Berufsausbildung eröffnet
  vielfältige Perspektiven
text: 'Mit einer Ausbildung sammeln junge Menschen praktische Erfahrungen und schaffen
  die Grundlage für ihre berufliche Zukunft. Foto: picture alliance / Rupert Oberhäuser
  Viele junge Menschen, die in diesem Sommer ihren Schulabschluss machen, stehen vor
  der Frage, wie es nach der Schule für sie weitergehen soll. Bundeskanzler Friedrich
  Merz ermuntert alle, die in dieser Frage noch unentschlossen sind, sich für eine
  berufliche Ausbildung zu entscheiden. In seiner Videobotschaft zum Start der Initiative
  „Sommer der Berufsausbildung“ hebt der Bundeskanzler die Vorteile einer dualen Ausbildung
  hervor. Nach einer beruflichen Ausbildung stünden viele Wege offen – vom direkten
  Berufseinstieg über eine Meisterqualifikation bis hin zur Selbstständigkeit oder
  Studium. Fachkräfte würden in nahezu allen Branchen dringend gesucht. „Sicher ist:
  Unser Land braucht Sie!“, sagte Merz. Mit einer Ausbildung könnten junge Menschen
  etwas bewegen – Verantwortung übernehmen, die Zukunft des Landes mitgestalten und
  von guten Beschäftigungsperspektiven profitieren. Der „Sommer der Berufsausbildung“
  macht auch auf die vielfältigen Möglichkeiten einer beruflichen Ausbildung aufmerksam.
  Mit mehr als 300 anerkannten Ausbildungsberufen stehen jungen Menschen zahlreiche
  Wege offen. „Gehen Sie auf die Ausbildungsbetriebe zu, die Sie interessieren“, appellierte
  der Bundeskanzler an die Jugendlichen. „Man freut sich dort auf Sie! Auf die neuen
  Ideen und die neuen Perspektiven, die Sie mitbringen.“ Wer noch unsicher ist, welcher
  Ausbildungsberuf der richtige ist, kann sich an die Agenturen für Arbeit oder die
  jeweiligen Kammern (wie die Handwerkskammern, Industrie- und Handelskammern, Landwirtschaftskammern,
  Ärztekammern) und Jugendberufsagenturen vor Ort wenden. Dort gibt es Hilfe, den
  passenden Ausbildungsplatz zu finden und auch Unterstützung bei der Bewerbung. Der
  „Sommer der Berufsausbildung“ richtet sich besonders an Jugendliche und Eltern,
  aber auch an Betriebe, die Ausbildungsplätze anbieten. Von Juni bis Oktober informiert
  der „Sommer der Berufsausbildung“ – auf Social Media und in zahlreichen Veranstaltungen
  auf Bundes-, Landes- und regionaler Ebene – über die Chancen und Möglichkeiten einer
  Berufsausbildung. Ziel ist es, möglichst viele junge Menschen und Betriebe zusammenzubringen.
  Im Mittelpunkt stehen die Berufsorientierung, die Attraktivität der Ausbildung,
  die Vielfalt der Ausbildungsberufe und die Vermittlung freier Ausbildungsplätze.
  Die Partner der „Allianz für Aus- und Weiterbildung“ haben für 2026 bereits zum
  siebten Mal den „Sommer der Berufsausbildung“ ausgerufen. Der Allianz gehören Verbände,
  Ministerien, Gewerkschaften und Arbeitgeber an. Ihr gemeinsames Ziel ist es, möglichst
  viele junge Menschen für eine duale Berufsausbildung zu gewinnen. Für ihre Arbeit
  bis Ende 2029 haben die Partner drei Schwerpunkte festgelegt:'
