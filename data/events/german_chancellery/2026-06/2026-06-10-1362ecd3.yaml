title: Cabinet decision Strengthening Germany as an aviation nation
text: 'In order to strengthen German aviation in the long term, the Federal Government
  is focussing on economic relief and technological innovation, among other things.
  The Federal Cabinet has adopted a new aviation strategy to make Germany a leading
  location for sustainable, safe and competitive aviation. Efficient, safe and sustainable
  air transport moves people and goods. Aviation is therefore of central importance
  for mobility and for connecting German goods to markets worldwide – a key feature
  of economic strength, innovation and employment. The aviation industry is a high-tech
  industrial sector that promotes innovation and guarantees connectivity, added value
  and highly skilled jobs. Industry makes an important contribution to a strong and
  efficient location for industry in Germany and also to ensuring that the Bundeswehr
  can fulfil its tasks and is ready for deployment. The strategy contains different
  approaches for all of these aspects. They prioritise four goals: The Federal Government
  is supporting air traffic by reducing air traffic control charges and the costs
  of aviation security checks until 2029 and lowering the aviation tax, among other
  things. It is set to take effect on 1 July. The strategy also aims to improve the
  conditions for the use of renewable fuels for aviation: this includes strengthening
  supply and production in Germany and taking better account of them in emissions
  trading, for example. In addition, the government will continue to rely on an efficient
  and resilient network of airports with regional, cargo and 24-hour operations. The
  aim here is to further improve digital and climate-neutral operation and their integration
  into transport networks. The government also wants to utilise the potential of the
  drone economy. To this end, for example, it wants to develop a national Unmanned
  Aviation Space Act for unmanned aviation by the end of 2026. The new aviation strategy
  creates framework for more planning security in aviation for the next 15 years –
  for air traffic, the aviation industry and military aviation. The Federal Government
  will monitor the implementation of the strategy together with industry in an ongoing
  process.'
