title: Speech by Federal Chancellor Merz upon the opening of ILA 2026 Strengthening
  Europe as a continent for aviation
text: 'The aerospace industry also safeguards “our sovereignty and our ability to
  defend our country and our alliances”, said Chancellor Merz upon the opening of
  the ILA--International Aerospace Exhibition. In his speech to mark the opening of
  the International Aerospace Exhibition (ILA) in Berlin, Federal Chancellor Friedrich
  Merz outlined the Federal Government’s new aviation strategy , among other things.
  “Competitiveness and innovation in one of our country’s key growth sectors are at
  the heart of our strategy”, the Chancellor emphasised. Read the transcript of the
  speech here (in German only):'
