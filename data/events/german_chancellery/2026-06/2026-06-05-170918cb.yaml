date: '2026-06-05'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 5. Juni 2026
text: 'stellvertretender Regierungssprecher Hille (Vorsitzender Lange eröffnet die
  Pressekonferenz und begrüßt SRS Hille sowie die Sprecherinnen und Sprecher der Ministerien.)
  Vielen Dank, auch von mir ein herzliches Willkommen. Es ist schön, Sie alle hier
  zu sehen. Wie üblich an einem Freitag blicken wir als Erstes auf die öffentlichen
  Termine des Bundeskanzlers für die kommende Woche: Da geht es bereits morgen, am
  Samstag, dem 6. Juni, los. An diesem Tag wird der Bundeskanzler um 10:15 Uhr den
  Tag der Bundeswehr am Standort Rostock besuchen. Mit dem Besuch bringt der Bundeskanzler
  seine besondere Wertschätzung für die Bundeswehr sowie seine Anerkennung für die
  Leistungen der Soldatinnen und Soldaten sowie für die vielen zivilen Mitarbeiterinnen
  und Mitarbeiter der Bundeswehr zum Ausdruck. Weiter geht es am Montag, dem 8. Juni.
  An diesem Tag findet um 16:30 Uhr ein virtueller Austausch im Format der sogenannten
  Freunde der Wettbewerbsfähigkeit statt. Der Termin dient der Vorbereitung des Europäischen
  Rates am 18. und 19. Juni. Auf Einladung des belgischen Premiers, des Bundeskanzlers
  und der italienischen Ministerpräsidentin werden sich die teilnehmenden Staats-
  und Regierungschefs der EU prioritär mit der Förderung der europäischen Wettbewerbsfähigkeit
  befassen. Auch gemeinsame Initiativen für einen konsequenten Bürokratieabbau werden
  Thema sein. Bundeskanzler Merz wird sich dabei für eine ambitionierte und zügige
  Umsetzung der vereinbarten Agenda zur Wettbewerbsfähigkeit einsetzen. Die Stärkung
  der deutschen und auch der europäischen Wettbewerbsfähigkeit hat für die Bundesregierung,
  wie Sie wissen, oberste Priorität. Am Dienstag, den 9. Juni, werden ab 13 Uhr insgesamt
  sieben ehrenamtliche Initiativen als Bundespreisträger des Wettbewerbs startsocial
  durch den Bundeskanzler im Bundeskanzleramt ausgezeichnet . Darüber hinaus erhält
  ein Preisträger den Sonderpreis des Bundeskanzlers. Der Bundeskanzler ist Schirmherr
  dieser Veranstaltung. Zum 22. Mal organisiert startsocial den bundesweiten Wettbewerb
  zur Förderung des ehrenamtlichen sozialen Engagements. Kern des Wettbewerbs sind
  100 Beratungsstipendien. Im Rahmen dieser Stipendien unterstützen Fachleute, vor
  allem aus der Wirtschaft, ehrenamtliche Initiativen unterschiedlichster Art in ihrer
  Weiterentwicklung. Weiter geht es am Dienstagabend um 18 Uhr. Da empfängt der Bundeskanzler
  den Präsidenten des Weltwirtschaftsforums , Alois Zwinggi, sowie rund 50 Mitglieder
  der Initiative Leaders for European Growth and Competitiveness im Bundeskanzleramt,
  um sich bei einem Abendessen über Maßnahmen zur Stärkung der europäischen Wettbewerbsfähigkeit
  auszutauschen. Die Initiative trifft sich zweimal jährlich: einmal in Davos und
  einmal in einer europäischen Hauptstadt. Wir begrüßen es sehr, dass dieser Austausch
  nun im Bundeskanzleramt stattfindet. Die Initiative wurde am 1. Juli 2025 vom Weltwirtschaftsforum
  in Anwesenheit von EU-Kommissionspräsidentin Ursula von der Leyen und EU-Ratspräsident
  António Costa ins Leben gerufen. In der Initiative sind europäische Führungskräfte
  zusammengeschlossen, und sie wollen im regelmäßigen Austausch mit der Politik das
  zentrale Thema Wettbewerbsfähigkeit in Europa voranbringen. Die Veranstaltung ist
  nicht presseöffentlich. Am Mittwoch, dem 10. Juni, tagt – wie üblich mittwochs –
  um 10 Uhr das Bundeskabinett unter Leitung des Bundeskanzlers. Weiter geht es um
  13:20 Uhr. Da eröffnet der Bundeskanzler die Internationale Luft- und Raumfahrtausstellung
  – kurz ILA – in Berlin. Nach einer kurzen Begrüßung startet der Bundeskanzler den
  Eröffnungsrundgang mit einem Besuch bei der Bundeswehr sowie Airbus zusammen mit
  Vertretern der ILA, des Bundesverbandes der Deutschen Luft- und Raumfahrtindustrie,
  dem EU-Kommissar Kubilius sowie Ministerin Bär, Minister Schnieder, Ministerpräsident
  Woidke, Berlins Bürgermeister Wegner und weiteren Akteuren. Um 14:15 Uhr eröffnet
  der Bundeskanzler gemeinsam mit dem Präsidenten des Bundesverbandes der Deutschen
  Luft- und Raumfahrtindustrie, Herrn Schöllhorn, die Messe mit einer Rede. Anschließend
  nimmt der Bundeskanzler an einer Flugschau teil, bevor er den Messerundgang fortsetzt.
  Die ILA Berlin findet alle zwei Jahre statt und ist eine der weltweit bedeutendsten
  Luft- und Raumfahrtmessen. Sie deckt die gesamte Wertschöpfungskette ab: von den
  Zulieferern über die Luftfahrt bis hin zur Verteidigungs- und Weltraumindustrie.
  Sie ist damit auch für Deutschland als bedeutenden Luftfahrtstandort von großer
  Bedeutung. Die Messe steht, wie in den letzten Jahren auch, erneut unter dem Motto
  „Pioneering Aerospace“. Der Besuch ist presseöffentlich. Bundeskanzler Merz wird
  dann am Donnerstag, dem 11. Juni, ab 9 Uhr im Deutschen Bundestag eine Regierungserklärung
  abgeben, und zwar zum Europäischen Rat , der dann in der Folgewoche, am 18. und
  19. Juni, stattfindet. Am Donnerstagnachmittag wird der Bundeskanzler im Hotel Adlon
  am Tag des Familienunternehmens 2026 teilnehmen . Er hält dort gegen 16:15 Uhr eine
  Rede. Veranstalter ist die Stiftung Familienunternehmen und Politik. Der Bundeskanzler
  schätzt die Arbeit der Stiftung, die sie für die Familienunternehmen in Deutschland
  leistet. Die Bundesregierung ist sich der Bedeutung der inhabergeführten Unternehmen
  sehr bewusst. Familienunternehmen leisten einen entscheidenden Beitrag für Wohlstand
  und Innovation in unserem Land. Rund 90 Prozent aller deutschen Unternehmen sind
  Familienunternehmen. Sie erzielen rund 37 Prozent aller Umsätze in Deutschland,
  und über die Hälfte aller sozialversicherungspflichtig Beschäftigten arbeiten in
  Familienunternehmen. Auch dieser Termin ist presseöffentlich. Damit sind wir mit
  der Woche und den Terminen des Bundeskanzlers durch. Herr Hille, Sie sagten, der
  Kanzler werde im Rahmen der ILA an einer Flugschau teilnehmen. Können wir damit
  rechnen, dass er selbst ins Cockpit steigt? auch wenn ich glaube, dass Sie sich
  das sehr gern vorstellen würden, kann ich Ihnen dazu nichts Positives vermelden.
  Der erste Komplex betrifft den Besuch bei den Freunden der Wettbewerbsfähigkeit
  . Begriffe definieren und legitimieren sich ja auch immer durch ihr Gegenteil: Oben
  gibt es nicht ohne unten, rechts nicht ohne links. Wer sind denn aus Sicht der Bundesregierung
  Feinde der Wettbewerbsfähigkeit? auch wenn ich die Frage natürlich verstehe, will
  ich Ihre Analogie bzw. Ihre Ableitung nicht so richtig teilen. Wer an dem Termin
  teilgenommen hat, werden wir nach dem Termin kommunizieren. Sie wissen, welch große
  Bedeutung das Thema Wettbewerbsfähigkeit für den Bundeskanzler, aber auch für viele
  Staats- und Regierungschefs der Europäischen Union hat. Sie erinnern sich an die
  Sondertagung zum Thema Wettbewerb, die meiner Erinnerung nach im März stattgefunden
  hat. Nun, im Zulauf auf den nächsten Europäischen Rat, geht es darum, die nächsten
  Schritte zu konkretisieren, und dazu dient der Videocall, der am Montag stattfinden
  wird. Darf ich daraus schließen, dass der Bundesregierung keine Feinde oder auch
  nur Gegner der Wettbewerbsfähigkeit in Deutschland bekannt sind? Auch wenn Sie ein
  Freund solch binärer Eins-und-Null-Zuteilungen sind: Darum geht es nicht. Wir treffen
  uns mit denen, für die die Wettbewerbsfähigkeit ein besonderes Thema ist, und das
  sind meines Wissens ziemlich viele. Wir werden in der nächsten Woche – vielleicht
  noch nicht am Montag, aber am Mittwoch – an dieser Stelle dann gern auch konkret
  sagen, wer am Montag in dem Call mit dabei gewesen ist. Herr Hille, mich würde interessieren,
  was seit dem Treffen, das am 12. Februar war, dieser informellen Beratung, in der
  Frage der Wettbewerbsfähigkeit überhaupt erreicht worden ist. Für mich erkennbar
  folgten keine Beschlüsse. Vielleicht können Sie mich da korrigieren. In welchem
  Zeitrahmen sollen jetzt Beschlüsse erfolgen, und in Bezug worauf? Es gab ja auch
  einen deutsch-italienischen Vorschlag aus den Regierungskonsultationen im Januar.
  Die Sitzung, die ich ja gerade schon in der Retrospektive erwähnt habe, unter dem
  Titel Wettbewerbsfähigkeit, die im März in Belgien stattgefunden hat, ist ja noch
  nicht so lange her. Das Ergebnis daraus war eine Agenda für Wettbewerbsfähigkeit.
  Auf den Europäischen Räten, die jetzt und im laufenden Jahr stattfinden werden,
  werden – davon gehe ich aus – dann konkrete Beschlüsse gefasst. Aber so viele Europäische
  Räte haben zwischen März und jetzt noch nicht stattgefunden. Auch dieser Vorbereitungstermin
  macht deutlich und unterstreicht, wie zentral das Thema Wettbewerbsfähigkeit ist
  und wie wichtig es ist, dass wir da gemeinschaftlich vorangehen. Der Bundeskanzler
  ist bei diesem Thema zuvorderst mit dabei und führt die Partner in Europa auch bei
  diesem Thema zusammen. Ziel ist es – meiner Erinnerung nach ist das auch in der
  Agenda zur Wettbewerbsfähigkeit festgehalten, aber das muss ich ungeschützt sagen
  –, dass in diesem Jahr erste Beschlüsse umgesetzt werden. Wird es, wenn der Kanzler
  morgen um 10.15 Uhr in Rostock beim Tag der Bundeswehr ist, ein Statement oder Ähnliches
  geben? Nein, meines Wissens ist das nicht vorgesehen. Wird er sich irgendetwas speziell
  anschauen, oder geht er einmal so über das Gelände? Speziell ist allein schon der
  Ort. Wenn er in Rostock-Laage unterwegs sein wird, dann geht es um die Luftwaffe
  und um Luftfahrzeuge. Detaillierter kann ich Ihnen aber vorab keine Informationen
  über den Besuch geben, da die Organisation in den Händen der Bundeswehr liegt. In
  dieser Woche gibt es zwei luftfahrtrelevante Termine. Können Sie ein Update geben,
  wie die Haltung und die Perspektive der Bundesregierung im Hinblick auf das FCAS-Projekt
  ist? Das ursprünglich gemeinsam von Airbus und Dassault verfolgte Projekt ist offenbar
  gescheitert. Wie geht es jetzt weiter? Möchte die Bundesregierung, dass zwei getrennte
  Flugzeuge entwickelt werden, oder wie ist die Perspektive? Ich will mich erstens
  Ihren Schlussfolgerungen nicht anschließen, sage aber zweitens, dass ich keinen
  neuen Stand habe, den ich Ihnen jetzt hier von dieser Stelle mitteilen will. Die
  Schlussfolgerungen sind ja nicht meine Schlussfolgerungen, sondern das ist das,
  was über den Stand der Verhandlungen berichtet und von der Bundesregierung nicht
  dementiert wird. Vermittlungsversuche sind wegen der sehr unterschiedlichen Auffassung
  von Dassault und Airbus sozusagen misslungen. Das ist der aktuelle Stand. Weil der
  Kanzler sowohl in Rostock als auch bei der ILA gefragt werden wird, welche Linie
  er für das Projekt eines neuen Kampfflugzeugs vertritt, und die politische Richtungsweisung
  diesbezüglich entscheidend ist, frage ich: Welche Linie ist das inhaltlich? Darüber
  haben wir hier, glaube ich, schon mannigfaltig gesprochen, möchte ich sagen. Zu
  diesen Thematisierungen habe ich Ihnen heute keinen neuen Sachstand mitzuteilen.
  Ich weiß nicht, ob das BMVg, Herr Müller, etwas ergänzen möchte. – Herr Müller schüttelt
  den Kopf. –Auch wenn Sie das nicht zufriedenstellt müssen Sie mit der Antwort leben,
  dass ich Ihnen da keinen neuen Sachstand mit auf den Weg geben kann. Kurze Nachfrage
  zum Termin des Bundeskanzlers mit dem Koalitionsausschuss am Mittwochabend. Ist
  da irgendeine Form von Pressekonferenz auch mit den Sozialpartnern geplant, oder
  wird das ein „closed shop“ bleiben? Gibt es in der Regierungserklärung zum Europäischen
  Rat am Donnerstag auch ein kleines Minutenkontingent, um auf die Ergebnisse des
  Koalitionsausschusses einzugehen? Ich fange mit dem zweiten Teil Ihrer Frage an,
  einem möglichen Minutenkontingent in der Regierungserklärung am Donnerstag. Wie
  das so ist mit Dingen, die in der Zukunft liegen, werden wir das am Donnerstag sehen.
  Die übergeordneten Themen, um die es gehen wird, sind die betreffend den Europäischen
  Rat in der Woche darauf. Das nur noch mal zur Erinnerung. Was in der Regierungserklärung
  sonst noch seinen Raum finden wird, wird sich zeigen. Ansonsten kann ich Ihnen zu
  Ihrer Frage sagen, dass für die kommende Woche ein Treffen der Koalitionsspitzen
  mit Gewerkschaften und Wirtschaft geplant ist. Darum herum kann ich Ihnen aber nicht
  mehr Details, auch zu den Fragen in welcher Form, öffentlich oder nicht, sagen.
  Wir machen weiter mit Herrn Hille, der noch ein paar Sätze zum Thema UN-Sicherheitsrat
  sagen möchte. Ganz genau. Das ist ein Thema, das in dieser Woche für viele Diskussionen
  gesorgt hat. Deshalb möchte ich dazu gern von dieser Stelle aus zwei, drei Sätze
  sagen. Zuallererst möchte ich im Namen der Bundesregierung den beiden Mitbewerbern
  um die europäischen Sitze, nämlich Österreich und Portugal, herzlich zur Wahl gratulieren.
  Mit beiden werden zwei enge Partner im Sicherheitsrat vertreten sein. Eine starke
  europäische Stimme ist in unserem Interesse. Wir werden mit ihnen eng zusammenarbeiten,
  besonders wenn es darum geht, europäische Positionen im Sicherheitsrat sichtbar
  zu machen. Es wird Sie nicht überraschen, dass wir über das Ergebnis enttäuscht
  sind. Es war ein klares Ergebnis, das wir jetzt gründlich aufarbeiten werden. Die
  Bewerbung, die wir abgegeben haben, war Ausdruck des politischen Willens dieser
  Bundesregierung und ihrer Vorgänger, im Sicherheitsrat Verantwortung für Frieden
  und Sicherheit in der Welt zu übernehmen. Nun heißt es aber, nach vorn zu schauen.
  Deutschland wird sich weiterhin sowohl intensiv weltweit für Frieden und Sicherheit
  und für eine handlungsfähige VN engagieren als auch einen Beitrag für eine funktionierende
  multilaterale Ordnung leisten – für Freiheit, Sicherheit und den Wohlstand unseres
  Landes. Das liegt in unserem ureigensten Interesse. Um das klar zu sagen: Unsere
  Welt braucht starke Vereinte Nationen. Darum muss sie dringend effizienter werden.
  Den notwendigen, grundlegenden Reformprozess hierzu unterstützen wir ausdrücklich.
  Herr Hille, Sie haben gesagt, Sie werden das Ergebnis aufarbeiten. Wie muss man
  sich eine solche Aufarbeitung vorstellen? Ich glaube, Sie sind lang genug dabei
  und auch fantasiereich genug, um sich vorzustellen, wie die Aufarbeitung solcher
  Ereignisse stattfindet. Ich werde jetzt nicht weiter ins Detail gehen, was das heißt.
  Ich glaube, es liegt auf der Hand, mit was es sich zu beschäftigen gilt. Genau darum
  geht es. Wer wäre denn jetzt eher der Ansprechpartner: Portugal oder Österreich?
  Ich kenne Ihr Interesse –der Kollege hatte dieses binäre eins und null, das eine
  oder das andere, gerade auch schon –, aber das ist kein Entweder-oder, sondern ein
  Sowohl-als-auch. Portugal und Österreich sind zwei enge Partner, und wir werden
  weiter gut und eng und vertrauensvoll mit Portugal und Österreich zusammenarbeiten,
  insbesondere natürlich dann, wenn es darum geht, europäische Perspektiven und Interessen
  im Sicherheitsrat zu platzieren. Die Frage geht an Herrn Hille oder Herrn Giese.
  Beabsichtigt die Bundesregierung, sich weiterhin im üblichen Turnus von acht Jahren
  um einen nichtständigen Sitz zu bemühen? Wenn ja, wäre die nächste Periode, die
  infrage käme, wenn ich das richtig im Kopf habe, 2035/2036 bzw. 2043/2044. Herr
  Lange, ich würde hierzu gern „unter drei“ gehen. Ich verlese einmal für das Protokoll
  – ich lese es ab, damit ich nichts falsch mache – die Regeln für Fragen, Antworten
  usw., die „unter drei“ behandelt werden: Diese bleiben unter uns. Ich bitte auch
  darum, Nachfragen „unter drei“ zu stellen und sie nicht „unter eins“ zu nehmen.
  Dann gehen wir jetzt wieder „unter eins“. Wir setzen die Regierungspressekonferenz
  „ unter eins “ fort. Herr Giese, zu den Gründen dafür, dass Deutschland schon im
  ersten Wahlgang sehr deutlich ausgeschieden ist: Noch in der Woche vor der Sitzung
  in New York hat das Auswärtige Amt hier gesagt, man sei sehr optimistisch und hoffnungsvoll.
  Nun hatten aber andere Länder wie Österreich und Portugal wesentlich früher kandidiert.
  Hat sich das Auswärtige Amt einfach verschätzt in Bezug darauf, welche Stimmenzusagen
  die Kandidaten, die sich früher beworben haben, schon vorab erhalten hatten? Uns
  war von Anfang an klar, dass wir später eingestiegen sind – das ist ja auch berichtet
  worden – als Österreich und Portugal und eine ganze Reihe von Ländern bereits eine
  Zusage an Österreich und Portugal gemacht hatten. Auch in den Gesprächen, die man
  führt, ist das üblicherweise nichts, worüber man ganz offen spricht. Sie müssen
  sich das so vorstellen, dass man nach Unterstützung fragt und es dann entweder eine
  Unterstützungszusage gibt oder nicht. Üblicherweise wird aber nicht gesagt: „Wir
  haben es schon anderen zugesichert.“ Das aber ist etwas, das relativ klar geworden
  ist, und das ist ja auch verständlich. Österreich und Portugal, beide haben natürlich
  zunächst in Europa nach Unterstützung gesucht; das würden wir ganz genauso machen.
  Dadurch entsteht natürlich die Situation, dass, wenn man sehr viel später kommt
  und ein Land seine Stimme bereits zugesichert hat, dieses Land aufgrund seines internationalen
  Renommees diese Garantie bzw. diese Zusage auch einhält. Insofern wussten wir, dass
  uns in Europa Stimmen fehlen werden. Wir waren aber davon ausgegangen, dass wir
  ausreichend Zusagen haben. Dass das am Ende nicht so gekommen ist, wie wir uns das
  gewünscht haben, haben Sie alle zur Kenntnis genommen. Aber wir sind davon ausgegangen,
  genügend Stimmen, genügend Zusagen zu haben, sodass die Zuversicht, die Katrin Deschauer
  in der vergangenen Woche angesprochen hat und die ich in dieser Woche noch einmal
  genannt habe, begründet war. Das war nicht nur eine Hoffnung, sondern eine begründete
  Zuversicht basierend auf Zusagen. Dazu, dass die Zusagen teilweise nicht eingehalten
  worden sind, hat sich der Bundesaußenminister geäußert. Damit müssen wir umgehen,
  und das gehört auch zu dem Aufklärungsprozess, der jetzt vor uns steht, in dem wir
  uns zum einen über die Ursachen Gedanken machen, aber auch darüber, wie wir uns
  in der Zukunft aufstellen. Aber wir waren auf einer gewissen Basis hoffnungsfroh
  und zuversichtlich – allerdings in dem Wissen, dass wir es schwerer haben würden
  als Österreich und Portugal. Das war uns von Anfang an klar, und daraus haben wir
  auch kein Geheimnis gemacht. Der Außenminister hat vom „letzten Staffelläufer“ gesprochen.
  Ich glaube, das ist ein gutes Bild. Irgendwann wird es dann zu knapp, und dann kann
  man einen Rückstand nicht mehr aufholen. Das hat sich jetzt gezeigt. Das bedeutet
  im Klartext, dass diejenigen Länder, mit deren Zusagen Sie gerechnet haben, Sie
  schlicht und einfach angelogen haben. Welche Rolle spielen die Länder des sogenannten
  Globalen Südens? Von UN-Beobachtern, die in New York vor Ort sind, wurde Deutschlands
  geringe Unterstützung der UN-Kritik an Israel als ein wesentlicher Faktor für das
  Abstimmungsverhalten der Länder des Globalen Südens genannt. Wie sehen Sie das?
  Wie Sie wissen– Sie haben das verfolgt –, war diese Wahl geheim. Wir wissen von
  denjenigen Ländern, die uns ihre Stimme zugesagt haben, nicht, wer für uns gestimmt
  hat und wer nicht für uns gestimmt hat. Insofern fällt es mir schwer, das auf einzelne
  Gruppen auszudehnen. Ich sage aber anknüpfend an meine vorherige Antwort: Wir wussten,
  dass uns Stimmen in Europa fehlen. Wir haben deshalb in der ganzen Welt um Stimmen
  geworben, auch in dem von Ihnen sogenannten Globalen Süden. Von diesen Ländern müssen
  uns auch sehr, sehr viele unterstützt haben. Wir haben trotzdem immerhin 104 Stimmen
  bekommen. Das ist deutlich mehr als der enge Kreis der europäischen Länder, die
  uns möglicherweise noch hätten unterstützen können, weil sie keinem der anderen
  beiden Länder eine Zusage gemacht haben. Insofern würde ich das in dieser Generalität
  – wir hatten das in dieser Woche schon einmal thematisiert – zurückweisen. Klar
  gibt es Kritik an Deutschland, das hat auch der Außenminister gesagt, aber das kann
  verschiedene Ursachen haben. Viele haben sich auch an unserer Unterstützung für
  die Ukraine gestört. Es gab eine Gegenkampagne mit sehr, sehr viel Energie von Russland.
  Natürlich gibt es Länder, die sich an unserem Einstehen für Israel stören. Das alles
  sind Ursachen. Ich glaube, am Ende muss man sehen, dass es eine Addition von Umständen
  war, die dazu geführt haben, dass wir dieses Mal nicht erfolgreich waren. Zum Themenkomplex
  Ukraine/Russland habe ich eine Frage an Herrn Hille: Wie bewertet die Bundesregierung
  den Brief, den der ukrainische Präsident an den russischen Präsidenten geschrieben
  hat? Unterstützen Sie das Vorgehen? Sie sind ja lange Gast hier. Sie kennen unsere
  Grundhaltung in Bezug auf Russland und die Ukraine. Wir sind sehr dafür, dass dieser
  Konflikt zu einem Ende geführt wird. Wir sehen seit langer Zeit eine Bereitschaft
  aufseiten der Ukraine, für Gespräche bereitzustehen. Wir sehen diese Bereitschaft
  auf russischer Seite in keiner Weise. Im Gegenteil: Wir sehen regelmäßig brutale
  Angriffe auf Städte wie Kyjiw und Dnipro sowie die restliche Ukraine. Wir sind außerdem
  – auch das wissen Sie – dafür, dass die Europäer eine wichtige Rolle in einem Prozess
  spielen. Es darf keine Entscheidung über die Köpfe der Ukraine geben. Aber es darf
  aus unserer Sicht auch keine Entscheidung ohne die Europäer geben. Alles, was in
  diese Richtung weist, ist positiv zu bewerten. Aber es mangelt seit langer Zeit
  nicht an der Bereitschaft auf ukrainischer Seite, sondern auf russischer Seite.
  Da braucht es Zeichen für eine ernsthafte Bereitschaft, sich irgendwie gearteten
  Gesprächen zu nähern. Solche Zeichen sind bisher in keiner Weise zu erkennen. War
  der Brief mit Deutschland abgesprochen? Waren Sie im Vorfeld informiert? Noch einmal:
  Wir sind als Europäer natürlich grundsätzlich offen für ernsthafte Gespräche, auch
  mit Russland. Sie kennen unsere Aussagen dazu. Ein tragfähiger Friede kann nur unter
  Einbeziehung der Europäer erreicht werden. Es liegt an Russland, ernsthaft den Frieden
  zu suchen. Es braucht belastbare Signale von Russland, ernsthaft verhandeln zu wollen.
  Das, was wir sehen, die aktuelle Eskalation durch Russland, deutet genau in die
  gegenteilige Richtung. Alles, was in Richtung von Anbahnung und Ermöglichung von
  Gesprächen geht, um diesen Konflikt endlich zu einem Ende zu führen, ist deshalb
  positiv zu bewerten. Vielleicht darf ich das noch um einen Aspekt ergänzen, weil
  Sie fragten, ob das mit uns abgesprochen sei. Wenn man sich diesen Brief anguckt,
  sieht man, dass insbesondere ein Aspekt ganz wichtig ist, und zwar der, dass Selenskyj
  darin noch einmal verdeutlicht hat, dass Europa in Verhandlungen involviert werden
  muss, wenn es um gesamteuropäische Interessen und gesamteuropäische Sicherheit geht.
  Insofern ziehen wir mit der Ukraine am gleichen Strang. Dann darf ich noch ergänzen.
  Den entscheidenden Teil der Antwort auf Ihre Frage habe ich gerade unterschlagen.
  Grundsätzlich begrüßen wir den Brief Selenskyjs. Er erklärt die Bereitschaft von
  Präsident Selenskyj zu Verhandlungen mit einem Treffen mit Präsident Putin und einer
  Waffenruhe. Wir teilen zudem die Ansicht von Präsident Selenskyj, dass an Gesprächen
  mit Russland auch Vertreter Europas und der Vereinigten Staaten beteiligt werden
