  Teil betrifft die Staaten des westlichen Balkans. Stichworte sind hier ein Beobachterstatus
  in EU-Institutionen oder auch beschränkter, teilweiser Zugang zum gemeinsamen Markt,
  je nachdem wie Kriterien erfüllt sind. Wichtig ist ‑ das darf dabei nicht in Vergessenheit
  geraten ‑, dass das Ziel natürlich weiter die volle Mitgliedschaft der Kandidatenländer
  ist. Die jetzige Initiative von Deutschland und Frankreich zielt darauf ab, den
  Beitrittsprozess zu beschleunigen. An das Finanzministerium: Wie weit sind die Koalitionspläne
  gediehen, flächendeckend digitale Zahlungsmöglichkeiten neben Bargeld einzuführen?
  Ich müsste schauen, ob ich Ihnen etwaige Zahlen nachreichen kann. Ich würde fast
  davon ausgehen, dass wir keine entsprechenden Zahlen haben, aber ich prüfe das gerne
  noch einmal. Es gibt zwei Brandbriefe aus Bayern , einen zu den Landeskommandos
  und einen vom BSV Mittenwald, der die Nutzung des Trap-Schießstandes auf dem Truppenübungsplatz
  Mittenwald von der Bundeswehr aus Umweltschutzgründen untersagt wurde. Der Verein
  versichert, dass seit Jahren keine bleihaltige Munition verwendet werde und die
  Untere Naturschutzbehörde auch keine Beanstandungen habe. Womit begründet die Bundeswehr
  ihr Vorgehen? Bekommt der Verein noch eine Antwort? Die erste Frage war zu den Landeskommandos,
  richtig? Wir kommentieren keine sogenannten Brandbriefe. Ich möchte aber eines ganz
  klar sagen: Wir haben mit den Ländern eine unglaublich gute und enge Zusammenarbeit,
  weil wir ja im Rahmen des Operationsplans Deutschland und der Gesamtverteidigung
  die zivil-militärische Zusammenarbeit mit den Ländern leben müssen, wenn es darauf
  ankommt. Das erfolgt sehr intensiv. Es gab im Jahr 2024 sowohl eine Umstrukturierung
  als auch eine neue Führungsstruktur, die im sogenannten Osnabrücker Erlass geregelt
  wird. Das Operative Führungskommando hat die territoriale Verantwortung und die
  Landeskommandos bekommen, und die Heimatschutzverbände sind zum Heer gegangen, weil
  das Operative Führungskommando keine eigenen Einheiten führt. Das Operative Führungskommando
  hat aber die Befehlshoheit und die territoriale Verantwortung, und die Landeskommandos
  spielen eine zentrale Rolle bei der Koordinierung der zivil-militärischen Zusammenarbeit
  vor Ort. Sie sind eine ganz wichtige Stütze, und die Zusammenarbeit läuft aus unserer
  Sicht hervorragend. Wir sehen das bei Schadenslagen, wir sehen das bei Hochwasser,
  wir sehen das bei Naturkatastrophen; wir sehen es aber auch bei den großen Übungen,
  die wir für den Operationsplan fahren. Aus unserer Sicht ist die Zusammenarbeit
  also ein Erfolgsmodell, und wir haben keine Absicht, die Landeskommandos in irgendeiner
  Form zu schwächen. Ganz im Gegenteil: Wir haben die Gesamtkonzeption militärische
  Verteidigung vorgestellt, und in diesem Zusammenhang und mit dem neuen Fähigkeitsprofil
  werden wir die Truppe in Gänze und damit auch die Gesamtverteidigung stärken. ‑
  Das vielleicht zu Ihrer ersten Frage. Zu Ihrer zweiten Frage: Es ist richtig, dass
  der Vertrag für einen Tontaubenschießstand bzw. Wurfscheibenschießstand in Mittenwald
  ordentlich gekündigt wurde. Der Hauptgrund dafür ist, dass wir bundesweit an Standorten
  oder Liegenschaften keine Wurfscheibenschießstände mehr zulassen werden. Deswegen
  laufen die Verträge aus oder werden gekündigt. Das hat zwei Teilgründe: Der eine
  Teilgrund sind Kontamination und Umweltbelastungen. Der andere Teilgrund ist, dass
  wir auf unseren Liegenschaften aufgrund der Zeitenwende und des Bedarfs, den wir
  haben, keine externen Vereine haben wollen, die vor Ort bauliche Maßnahmen durchführen,
  für die Auflagen gelten ‑ und Schießbetrieb hat immer auch mit Auflagen zu tun ‑
  und die dann gegebenenfalls nicht mehr in unserer Hand sind. Diese beiden Bereiche
  haben wir ‑ ich kann beide noch einmal sehr ausführlich erläutern, wenn Sie möchten.
  Ich möchte aber ganz klar sagen, dass wir bundesweit an unseren Liegenschaften ‑
  mir fällt eigentlich keine Kaserne ein, bei der das nicht der Fall ist ‑ sehr gut
  mit den örtlichen Sportvereinen ‑ Schwimmvereinen, Leichtathletikvereinen ‑ kooperieren,
  die die Hallen und die die Sportstätten nutzen. Wir sehen es auch als wichtiges
  Bindeglied zur Zivilgesellschaft, wenn wir dort Möglichkeiten schaffen, unsere Sportstätten
  nach Dienstschluss zur Verfügung zu stellen. Das ist ein Erfolgsmodell, das weiterläuft ‑
  unabhängig von dem Stand der Wurfscheibenschießanlagen.'
