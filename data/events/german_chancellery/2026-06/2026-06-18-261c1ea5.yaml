title: Statement von Bundeskanzler Merz zum Abschluss des G7-Gipfeltreffens in Évian-les-Bains
  Starkes Zeichen der Einigkeit
text: Bundeskanzler Friedrich Merz hat zum Abschluss des G7 -Gipfels in Évian-les-Bains
  in Frankreich die gemeinsame Gipfelerklärung zu Iran und zur Ukraine als Erfolg
  bezeichnet. Gerade in der gemeinsamen Sprache zur Ukraine stecke die „sehr klare
  Botschaft“, dass die Unterstützung aus dem Kreis der G7 -Staaten heraus so stark
  wie selten zuvor ist. Die gemeinsame Hartnäckigkeit habe sich ausgezahlt, auch wenn
  es weiter ein schwieriger Weg zum Frieden bleibe. „Aber wir sind einen Schritt weitergekommen“,
  so der Kanzler. Dies gelte auch für den Nahen Osten. Die Einigung der Vereinigten
  Staaten mit Iran sei ein „großer Erfolg“. Ihm müssten nun weitere Verhandlungen
  folgen. Bundeskanzler Merz betonte erneut, dass Deutschland auch hier helfen werden.
  Dies könne ein militärisches Engagement in der Straße von Hormus mit entsprechendem
  Bundestagsmandat beinhalten. Schließlich sei zudem die notwendige Diskussion um
  geoökonomische Ungleichheiten vorangekommen. Ein Teil davon seien währungspolitische
  Ungleichgewichte, über die weiter gesprochen werden müsse. Bei kritischen Rohstoffen
  und Künstlicher Intelligenz sei zudem eine noch engere Zusammenarbeit verabredet
  worden.
