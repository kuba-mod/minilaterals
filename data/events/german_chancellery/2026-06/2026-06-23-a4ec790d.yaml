date: '2026-06-23'
type: press_release
source_name: german_chancellery
title: Pressekonferenz von Bundeskanzler Merz mit Bundesministerin Bas zur Übergabe
  des Berichts der Alterssicherungskommission „Reformvorschläge, die uns Mut machen“
text: 'Bundeskanzler Merz dankte der Alterssicherungskommission für das „ausgewogene
  Paket mit insgesamt 33 Einzelmaßnahmen“. Die Alterssicherungskommission habe zum
  „schwierigsten Reformprojekte unserer Zeit“ ein ausgewogenes Paket mit 33 Einzelmaßnahmen
  vorgelegt, so Bundeskanzler Friedrich Merz bei der gemeinsamen Pressekonferenz mit
  Bundessozialministerin Bärbel Bas sowie den Vorsitzenden der Alterssicherungskommission,
  Frank-Jürgen Weise und Constanze Janda. Zuvor hatten der Kanzler und die Ministerin
  den Abschlussbericht der Kommission entgegengenommen . Die Empfehlungen seien „von
  allergrößter Bedeutung“ – für den Sozialstaat, für den Wirtschaftsstandort, aber
  vor allem für die Gesellschaft, sagte Bundeskanzler Merz. Es sei erstmalig gelungen,
  ein Gesamtkonzept für alle Generationen auf den Tisch zu legen, sagte Bundessozialministerin
  Bas. „Wenn wir diese Reform machen, so, wie sie jetzt auch vorliegt, dann wird es
  für alle besser“, so Bas. Hier finden Sie den vollständigen Bericht der Alterssicherungskommission.
  PDF, 1 MB, barrierefrei Meine Damen und Herren, herzlich willkommen, vor allem Frau
  Prof. Janda und Herr Weise! Meine Damen und Herren aus der Kommission, Frau Bas
  und ich freuen uns sehr, dass wir Sie heute Morgen hier willkommen heißen dürfen
  und den Bericht der Alterssicherungskommission entgegennehmen dürfen. Die Kommission
  hat ein ausgewogenes Paket mit insgesamt 33 Einzelmaßnahmen vorgeschlagen. Sie alle,
  die Mitglieder der Alterssicherungskommission, die heute alle da sind, tragen dieses
  Ergebnis in der Gesamtheit einstimmig mit, und auch dafür möchte ich Ihnen sehr
  herzlich danken. Sie haben sich mit großem Sachverstand einem der vermutlich schwierigsten
  Reformprojekte unserer Zeit gewidmet. Ihre Empfehlungen sind von allergrößter Bedeutung
  für uns, für unseren Sozialstaat, für uns als Wirtschaftsstandort, aber vor allem
  für uns als Gesellschaft insgesamt. Es geht dabei um nicht weniger als um eine weitreichende
  Entscheidung, denn Sie kehren den Trend um. Ohne Reformen würde unweigerlich das
  Rentenniveau sinken und würden die Beiträge steigen. Mit dieser Reform können wir
  das umkehren. Wir wollen perspektivisch, dass das Rentenniveau steigt und dass die
  Beiträge sinken. Das von Ihnen vorgeschlagene Paket erfüllt damit zwei Ziele: Die
  Rente bleibt sicher, und die Lasten werden gerecht verteilt, über alle gesellschaftlichen
  Gruppen, über alle Generationen hinweg. Ausgangspunkt für Ihre Empfehlungen ist
  unser Auftrag, ein Auftrag, der vor allem vor dem Hintergrund des demografischen
  Wandels erteilt wurde. Wir wissen schon lange, dass sich das Zahlenverhältnis zwischen
  den Generationen verschiebt. Immer weniger Beitragszahler müssen die Renten für
  immer mehr Rentner aufbringen. Deswegen mussten wir reagieren. Es ist allerhöchste
  Zeit. Nichtstun ist keine Option. Wir haben im Rentensystem auch in der Vergangenheit
  immer mehr oder weniger kleinere oder größere Korrekturen vorgenommen. Diese Korrekturen
  waren nicht immer geeignet, das Rentensystem zu stabilisieren. Jetzt geht es darum,
  eine große Lösung zu beschließen, die unser Rentensystem langfristig sicher macht.
  Wir werden in Zukunft nicht mehr Jahr für Jahr um Beitragszahlen streiten müssen.
  Wir werden uns auf die Rente auf Dauer verlassen können. Ihre Reformvorschläge enthalten
  einige zentrale Aussagen, die uns Mut machen. Die gesetzliche Rente bleibt die wichtigste
  Säule in unserem System. Es muss sich keine Bürgerin, kein Bürger Sorgen machen.
  Der soziale Ausgleich bleibt bestehen, das aktuelle Rentenniveau bleibt erhalten,
  einen fundamentalen Systembruch wird es nicht geben. Aber Sie schlagen vor, die
  gesetzliche Rente an einer ganz entscheidenden Stelle weiterzuentwickeln. Es geht
  um die Stärkung der gesetzlichen Rente durch die Einführung einer zusätzlichen,
  verpflichtenden, individuell zugeordneten Kapitalrente. Dieser Kapitalanteil soll
  schrittweise bis zum Jahr 2031 hinzugefügt werden. Mittelfristig wird damit die
  neue gesetzliche Kapitalrente zu einem insgesamt höheren Gesamtversorgungsniveau
  bei sinkenden Beiträgen führen. Ich will noch einmal daran erinnern: Wir haben uns
  genau das im Koalitionsvertrag auch vorgenommen, nämlich ein neues Gesamtversorgungsniveau
  aus mehreren Elementen zu ermöglichen. Sie machen uns genau den dahin führenden
  Vorschlag. Wir nutzen also die positiven Effekte des Kapitalmarkts. Sehr beruhigend
  ist auch, dass dieses kapitalbasierte Modell krisenfest ist. Selbst bei einer Finanz-
  und Wirtschaftskrise wie zum Beispiel in den Jahren 2007 und 2008 würden die Renten
  immer noch steigen. Zur Wahrheit gehört aber auch: Es wird für diesen Umbau zu Mehrbelastungen
  kommen müssen. Die Kapitalrente erhöht in dem von Ihnen vorgeschlagenen Modell den
  paritätisch finanzierten Beitragssatz um zwei Prozentpunkte ab 2031. Das gehört
  zum vollständigen Bild dazu. Würden wir nichts tun, würde die Rentenreserve bis
  2028 weiter abschmelzen. Beitragssatzsteigerungen wären auch dann unumgänglich.
  Daher müssen wir jetzt handeln. Wenn wir jetzt die Kapitalrente beschließen und
  bald ein ausreichender Grundstock aufgebaut ist, dann steigt das Rentenniveau bis
  in die 2040er- und 2050er-Jahre. Das ist mir ebenfalls wichtig: Mit diesem neuen
  Rentenmodell organisieren wir die Teilhabe breiter Bevölkerungsgruppen am Vermögenszuwachs
  unserer Volkswirtschaft. Nicht nur Vermögende, auch Normalverdiener sollen von der
  wirtschaftlichen Entwicklung und damit vom Kapitalmarkt profitieren. Wenn Sie mir
  das zu sagen erlauben: Das ist das letzte bisher nicht eingelöste Versprechen der
  christlichen Soziallehre, nämlich die Beteiligung von Arbeitnehmerinnen und Arbeitnehmern
  am Zuwachs unserer Volkswirtschaft über den Kapitalmarkt. Ihre Reformvorschläge
  orientieren sich dabei stark am Beispiel der Skandinavier. Dort liegen die staatlichen
  Ausgaben für die Rente vergleichbar hoch, aber sie garantieren eine höhere Rente.
  Die kapitalgedeckte Altersvorsorge spielt dort eine viel größere Rolle als bei uns.
  In diesen Staaten gibt es auch weniger Frühverrentung, und das Renteneintrittsalter
  ist dort ebenfalls an die Lebenserwartung gekoppelt. Die Skandinavier haben es geschafft,
  und wir, meine Damen und Herren, können das auch. Ihre Vorschläge stärken den Generationenvertrag.
  Auch und gerade für die Jungen im Lande gibt es jetzt Grund zur Zuversicht. Auch
  die Älteren werden einen Beitrag leisten müssen. Wir kehren zurück zum Nachhaltigkeitsfaktor,
  sodass Renten zukünftig wieder etwas langsamer steigen als die Löhne. Die Rente
  wird aber auch weiterhin nicht gekürzt. Noch einmal: Es wird keine Kürzung von Rentenleistungen
  geben. Sie sehen, es handelt sich hierbei also wirklich um ein Generationenprojekt
  in doppelter Hinsicht. Wir nehmen der jüngeren Generation eine gewaltige Last von
  den Schultern, wir stellen sicher, dass auch die Jungen eine stabile Rente erwarten
  können, und wir nehmen uns die Zeit, diesen Umbau verträglich und finanzierbar hinzubekommen.
  Deswegen brauchen wir einen langen Atem und zugleich die Unterstützung der ganzen
  Gesellschaft. Alle Elemente dieses Reformpakets – ich betone: alle Elemente dieses
  Reformpakets – müssen jetzt zügig umgesetzt werden. Wir können es uns nicht erlauben,
  einzelne Maßnahmen herauszunehmen oder abzulehnen. Die einzelnen Maßnahmen greifen
  ineinander und balancieren sich aus. Sie bilden ein Gesamtkonzept, das nur in seiner
  Gesamtheit funktioniert. Deswegen bin ich auch sehr froh – ich will das noch einmal
  betonen –, dass wir uns in der Koalition einig sind, dass wir dieses Paket vollständig
  umsetzen werden. Wir werden nun eine breite Debatte über die Vorschläge der Kommission
  erleben. Sie hat ja am Wochenende auch schon angefangen. Das ist auch gut so. Ein
  solches Generationenprojekt muss von allen verstanden, diskutiert und am Ende getragen
  werden. Wir haben also Grund und Anlass zu Optimismus. Die Arbeit der Kommission
  hat sich gelohnt. Ich schaue voller Zuversicht auf die vor uns liegende Diskussion,
  und ich appelliere zugleich an alle Verantwortlichen, diese Diskussion konstruktiv
  zu begleiten. Wir schaffen damit eine neue Wachstums- und Beschäftigungsdynamik,
  wir verbessern die Bedingungen für den Standort, und genau das braucht Deutschland.
  Nochmals ein ganz herzliches Dankeschön an Sie, Frau Prof. Janda, und an Sie, Herr
  Weise, aber auch an die Mitglieder der Kommission für die sehr konstruktive und
  die sehr vertrauensvolle und vertrauliche Arbeit, die Sie über die ganzen Monate
  hinweg geleistet haben. Ich denke, es ist wirklich einen gemeinsamen Dank wert,
  dass Sie bereit waren, Ihre Fähigkeiten und auch Ihre Bereitschaft zum Kompromiss
  in den Dienst unseres Landes zu stellen. Ich will Ihnen dafür ganz ausdrücklich
  sehr, sehr herzlich danken. Das gilt für die drei Abgeordnetenkolleginnen und ‑kollegen
  genauso wie für die Fachleute aus der Wissenschaft, die diese Arbeit hier begleitet
  haben. Ganz herzlichen Dank! Sie haben uns wirklich eine sehr gute Grundlage für
  eine grundlegende Reform unseres Alterssicherungssystems gelegt, und wir werden
  sie umsetzen. Herzlichen Dank. Auch von mir, meine Damen und Herren, einen schönen
  guten Morgen! Meine Damen und Herren, ich glaube, ich kann hier sagen: Die Erwartungen
  an diese Kommission waren enorm hoch, und es gab auch nicht wenige, die schon darüber
  gemunkelt haben, warum man dieses wichtige Thema überhaupt in eine Kommission schiebt
  und was dabei eigentlich herauskommen soll. Das war so die Tonlage zu Beginn dieser
  Arbeit. Ich muss sagen, und ein volles Kompliment, stellvertretend an Frau Prof.
  Janda, aber auch an Herrn Weise, aber auch und vor allen Dingen an alle Mitglieder
  der Kommission, die auch heute anwesend sind: Sie haben abgeliefert! Sie haben in
  Rekordzeit, das muss man sagen, neben Ihren eigentlichen Tätigkeiten, die Sie alle
  ja auch noch haben, also ehrenamtlich, ein wirklich gutes Gesamtpaket auf den Tisch
  gelegt. Es ist deshalb so wichtig, dass es ein Gesamtpaket ist, was der Kanzler
  gerade schon gesagt hat, weil alles ineinandergreift. Man kann das jetzt auch nicht
  aufschnüren und sich an einzelnen Stellen Rosinen herauspicken, das eine oder andere
  herausnehmen, was einem gefällt, und das andere weglassen, was einem nicht gefällt.
  Hier greift alles ineinander. Das haben Sie übrigens nicht nur unter hohem Zeitdruck
  gemacht, sondern auch unter permanenter Beobachtung. Alle waren sehr gespannt, was
  dort abgeliefert wird. Ich finde, es ist eine Leistung, die nicht zu erwarten war
  und auch sicherlich nicht einfach war, dass hier auch ein Ergebnis im Konsens vorgelegt
  wird. Ich glaube, auch das ist eine Besonderheit, die es bisher so nicht gegeben
  hat. Zumindest nach meiner Erinnerung gab es in vergangenen Rentenberichten immer
  auch Sondervoten, unterschiedliche Meinungen. Es ist erstmalig gelungen, ein Gesamtkonzept
  für alle Generationen auf den Tisch zu legen, und das war ja wichtig. Ich möchte
  an die Diskussion aus dem letzten Jahr erinnern, die sehr heftig war. Insbesondere
  die junge Generation hat gesagt, dass sie auch eine Perspektive für ihre Zukunft
  haben will, und ich finde, das ist mit diesem Gesamtpaket jetzt gelungen. Wir adressieren
  alle. Für mich ist eine Reform immer dann wirklich eine Reform, wenn sie am Ende
  auch zu etwas Besserem führt. Der Status quo ist gerade geschildert worden. Machen
  wir jetzt nichts, entscheiden wir in dieser Legislaturperiode nichts mehr zur Rente,
  dann sind die Folgen klar: Die Beiträge werden steigen, weil wir einen demografischen
  Wandel haben, der nicht aufzuschieben ist, und das Rentenniveau wird sinken. Bis
  2039, wenn wir nichts tun, liegen wir bei einem Rentenniveau von 46 Prozent. Das
  hieße für alle, die Renten sinken und die Beiträge steigen, und das ist keine Option.
  Deshalb ist für mich ganz wichtig, diese Verantwortung, die wir jetzt haben, auch
  anzunehmen, auch für mich ganz persönlich, dass wir jetzt etwas auf dem Tisch haben,
  worüber es sich wirklich lohnt, in den nächsten Tagen sachlich zu diskutieren, alle
  Empfehlungen, 33 an der Zahl, wobei die eine oder andere sicherlich noch auszugestalten
  ist. Es gibt ja schon viele Rückfragen auch von Fachleuten: Wie machen Sie denn
  dieses oder jenes? – Ich glaube, die beiden können gleich hier in der Pressekonferenz
  auch noch einige Erklärungen zu ihren Vorschlägen abgeben. Aber wichtig ist mir,
  dass adressiert ist: Wenn wir diese Reform machen, so, wie sie jetzt auch vorliegt,
  dann wird es für alle besser. Das ist die Botschaft. Es wird für alle am Ende perspektivisch
  besser. Der Kapitalstock in der ersten Säule, und das ist ein wirklich überraschender
  Vorschlag, mit dem ich selbst so nicht gerechnet habe, dass wir für die Versicherten
  in der ersten Säule ansparen, paritätisch finanziert, und dass wir Beitragspunkte
  obendrauf setzen, heißt für die junge Generation: Das Rentenniveau wird auf mindestens,
  würde ich jetzt einmal sagen, 50 Prozent steigen. Wenn es sehr gut läuft – das schwedische
  Modell ist dabei die Grundlage –, dann wird die junge Generation später eine höhere
  Rente haben als die Rentner heute. Das ist wirklich eine wichtige Botschaft auch
  an die junge Generation, dass wir sie nicht vergessen haben, was uns in den vergangenen
  Debatten immer vorgeworfen wurde, sondern es ist uns gelungen, hier jetzt auch eine
  Perspektive aufzumachen, und die finde ich sehr, sehr wichtig. Dass das paritätisch
  passiert, dass da die Arbeitnehmerinnen und Arbeitnehmer, aber auch die Arbeitgeber
  mitfinanzieren, ist auch etwas Wichtiges, weil alle ihren Beitrag dazu leisten.
  Warum ist die erste Säule so wichtig? Ich habe oft über die Menschen im Osten Deutschlands
  gesprochen. Die haben nur diese gesetzliche Säule. Das ist für viele auch einfach
  umzusetzen. Es wird ein Rentenkonto angelegt, es wird auf diesem Konto angespart,
  es wird von der Rentenversicherung ausgezahlt. Man muss sich nicht als Beschäftigter
  darum kümmern, lange Diskussionen mit einem Partner zu führen und privat eine Versicherung
  zu suchen, sondern das wird in diesem ersten gesetzlichen Strang organisiert, einfach
  für die Beschäftigten, und es wächst an, wenn es gut angelegt ist, und das ist ein
  wichtiger Baustein, den wir haben. Für mich ist perspektivisch auch wichtig, und
  das war auch nicht unbedingt zu erwarten, dass das Zielbild eine Erwerbstätigenversicherung
  ist. Das ist ein Thema, das für viele ein Stück weit auch an die Gerechtigkeit anknüpft
  und viele beschäftigt hat. Warum zahlen eigentlich nicht alle langfristig in dieses
  System ein? – Es ist natürlich noch nicht beschrieben, wie es funktionieren soll.
  In einzelnen Schritten ist erwähnt, dass Abgeordnete und Selbstständige in das System
  kommen sollen, auch jetzt schon. Sie wissen, dass das Thema der Beamten etwas komplizierter
  ist; das ist auch mit den Ländern zu besprechen. Aber perspektivisch ist es wichtig,
  dass da die Aussage steht: Wir wollen in Zukunft eine Erwerbstätigenversicherung.
  Daran werden wir auch weiterarbeiten müssen. Auch das ist eine wichtige Botschaft,
  damit das System langfristig in der Struktur besser wird. Auch das ist ein wichtiger
  Schritt. Die Kommission hat sich auch mit dem Thema der Altersarmut beschäftigt.
  Das will ich an der Stelle auch sagen, nicht, dass das untergeht. Das ist in den
  Vorberichterstattungen ein Stück weit untergegangen oder hat vielleicht nicht so
  im Fokus gestanden. Aber auch das war eine wichtige Diskussion, denke ich, in der
  Kommission zu sagen: Was machen wir eigentlich mit den Menschen, die in dem Niedriglohnbereich
  sind, was bedeutet das eigentlich für ihre Renten, und wie wirkt sich diese neue
  Reform, wenn wir sie denn politisch umsetzen, auch auf diese Menschen aus? Haben
  wir da die richtigen Instrumente? – Da sind Freibeträge und die Grundsicherung im
  Alter, die auch verbessert werden sollte, noch einmal angesprochen worden. Das ist
  ein wichtiger Punkt, der hier nicht untergehen sollte. Die Kommission hat sich –
  auch das fand ich bemerkenswert – damit befasst, wenn wir schon länger arbeiten,
  an die Lebenserwartung angelehnt, die wir zugrunde legen und die übrigens alle paar
  Jahre auch darauf überprüft werden muss, ob sie tatsächlich steigt ‑ ‑ ‑ Wir wissen
  aber auch, dass es Menschen gibt, für die sie im Moment nicht steigt. Das ist auch
  bekannt. Für die allermeisten steigt sie schon – da steigt die Lebenserwartung –,
  aber es gibt eben auch Gruppen, in denen es nicht so ist, in denen Menschen aufgrund
  von Gesundheit und Erkrankung nicht so lange arbeiten können. Auch dafür ist eine
  Idee entwickelt worden, eine Empfehlung, die ich sehr gut finde, nämlich dass man
  auch schaut, wie wir eigentlich die Erwerbsminderungsrente oder eine neue Berufsunfähigkeitsrente
  schaffen müssen, die das adressiert und den Menschen einen leichteren Zugang ermöglicht,
  wenn sie kurz vor der Rente stehen und nicht mehr in ihrem alten Berufsfeld arbeiten
  können. Dass das adressiert worden ist, finde ich einen sehr guten Vorschlag. Alles
  in allem, würde ich sagen, sind darin sicherlich auch Punkte enthalten, weil wir
  ja jetzt auch die Verantwortung haben, das politisch umzusetzen. Heute haben der
  Kanzler und ich als Fachministerin diesen Bericht entgegengenommen. Die 33 Empfehlungen
  werden wir uns natürlich genau anschauen und werden sie prüfen. Aber es ist so:
  Es gibt jetzt kein Rosinenpicken, sondern das ist ein Gesamtkunstwerk, wie ich bereits
  gesagt habe. Ich betrachte das auch so, weil alles ineinandergreift und man jetzt
  nicht das eine oder andere weglassen kann, sondern es ist schon so, dass man jetzt
  den Mut aufbringen muss, das in der Gesamtheit auch umsetzen zu wollen oder es nicht
  zu wollen. Das ist jetzt unsere Verantwortung. Ich will hier deutlich sagen: Ich
  möchte dieses Paket umsetzen. Wir müssen dafür sicherlich auch noch in unseren eigenen
  Reihen die Fraktionen mitnehmen. Das ist wichtig, denn am Ende muss es im Deutschen
  Bundestag beschlossen werden. Ich weiß: Die drei Abgeordnetenkollegen – ich schaue
  sie mir hier gerade an – sind sehr selbstbewusst, und sie wollen auch nicht, dass
  wir ihnen einfach nur etwas auf den Tisch legen, sondern das letzte Wort hat das
  Parlament. Aber da die drei Abgeordneten hier ja auch sehr aktiv mitdiskutiert haben,
  mitentschieden haben, bin ich sehr zuversichtlich, dass uns das gelingen kann. Insgesamt
  ist das ein sehr gutes Gesamtpaket. Im Ergebnis wird es – im Vergleich zum Status
  quo, muss man immer sagen – langfristig für alle besser. Das ist die eigentlich
  wichtige Perspektive, und es lohnt sich, darüber zu diskutieren. Sehr geehrter Herr
  Bundeskanzler, sehr geehrte Frau Ministerin, Frau Janda und ich dürfen heute im
  Namen aller Mitglieder der Alterssicherungskommission den Bericht an Sie übergeben.
  Wir hatten 33 recht konkrete Themen mit Fragestellungen zu behandeln, und wir haben
  gestern in unserer Kommission den Bericht einstimmig im Konsens noch einmal abgestimmt.
  In unserer Arbeit an den 33 Themen gab es natürlich auch andere Meinungen. Es gab
  auch Widerspruch zu einzelnen Positionen. Das ist gut so, weil das Ringen um gute
  Lösungen aus unserer Sicht die Qualität der Arbeit verbessert hat. Wir haben, Frau
  Ministerin, in Ihrem Ministerium mit 17 Stunden gegen die Arbeitszeitverordnung
  verstoßen. Wir haben gegen die Arbeitsplatzordnung verstoßen, weil die Menschen
  auf den Bänken saßen. Aber ich denke, auch diese Dynamik, die Auseinandersetzung,
  die Freude an der Arbeit und der Respekt haben die gesamte Kommission beseelt. Als
  wertvoll hat sich erwiesen – das war ja ein Risiko für die Politik –, acht Wissenschaftler
  von insgesamt 13 Mitgliedern zu benennen. Das bedeutete, dass wir über Faktenbasis,
  Modelle und Beschreibungen einen guten Blick auf die Themen hatten. Uns war sicherlich
  auch sehr wichtig, dass wir mit der Deutschen Rentenversicherung einen immer verlässlichen,
  berechenbaren und guten Partner mit am Tisch hatten. Wir hatten drei Politiker,
  eine Politikerin, Frau Klose, Herrn Reddig und Herrn Dorn, die allein schon aufgrund
  ihres Alters Betroffene sind und den Blick nicht nur auf die Themen haben, sondern
  auch darauf, was das in der Perspektive bedeutet, und die dort dann auf Basis der
  Wissenschaft beurteilen und folgern konnten. Frau Janda hat unsere Arbeit in perfekter
  Form so strukturiert, dass wir sogar eine Woche früher fertig sein konnten. Ich
  habe eher moderiert. Im Ergebnis ist es so, dass wir in dieser ungünstigen demografischen
  Entwicklung, in einer schwierigen Wirtschafts- und Finanzlage mit durchaus für alle
  belastenden Übergängen, die kommen, dann eine vernünftig ausbalancierte Lösung für
  alle Beteiligten, Arbeitgeber, Arbeitnehmer, Rentnerinnen und Rentner und andere,
  gefunden haben; das muss man sagen. Wenn man die drei Stufen der Altersversicherung,
  also die gesetzliche Rente, jetzt mit einem Kapitalanteil, die sich hoffentlich
  verbessernde, verbreiternde betriebliche Absicherung und, was Politik ja schon entschieden
  hatte, die private Möglichkeit, die ganz besonders die Förderung von Familien und
  von Familien mit Kindern im Blick hat, kombiniert und addiert – mathematisch geht
  das nicht genau –, dann könnte man sagen: Es gibt eine sehr gute, belegbare, berechenbare
  Perspektive, dass man später auf 70 Prozent seines letzten Lohnes bzw. Gehaltes
  in den letzten Berufsjahren kommen kann. Sehr geehrter Herr Bundeskanzler, sehr
  geehrte Frau Ministerin, sehr geehrte Damen und Herren, die Kommission hatte die
  Aufgabe, Wege aufzuzeigen, wie die Alterssicherung in Deutschland künftig stabil
  sein kann. Wir sind am 7. Januar in unsere Arbeit gestartet. Wir hatten, denke ich,
  über 150 Sitzungen online. Wir hatten zahlreiche Hintergrundgespräche und viele
  Stunden Schreibarbeit. Ich denke, wir alle sind froh, dass wir heute unsere 33 Empfehlungen
  übergeben können. Die gesetzliche Rentenversicherung ist eines der zentralen Versprechen
  unseres Sozialstaats. Sie schützt Millionen Menschen gegen die Risiken von Alter
  und Erwerbsminderung. Sie steht für Sicherheit, für Solidarität und auch für die
  Anerkennung von Lebensleistungen. Dieses Versprechen der Rentenversicherung trägt
  schon seit vielen Jahrzehnten. Die deutsche Rentenversicherung hat auch viele Krisen
  überstanden. Dass wir sie jetzt zu reformieren vorschlagen, ist nicht Ausdruck einer
  großen Krise der Rentenversicherung. Es ist kein Ausdruck davon, dass die Rentenversicherung
  am Ende wäre, sondern im Gegenteil. Reform vorzuschlagen bedeutet, dass man die
  Rentenversicherung, ein sehr solides und stabiles System, an geänderte Rahmenbedingungen
  anpasst. Dies ist in einer sozialen Marktwirtschaft fortwährend notwendig. Die Bedingungen,
  unter denen die Rentenversicherung funktioniert, ändern sich grundlegend. Das wurde
  schon angesprochen. Die geburtenstarken Jahrgänge gehen in Rente. Immer weniger
  Beitragszahlerinnen und Beitragszahler müssen immer mehr Leistungen finanzieren.
  Das stellt ein Umlagesystem vor gewisse Herausforderungen, ohne es zum Scheitern
  gebracht zu haben. Wir müssen jetzt handeln, um die Rente dauerhaft zu stabilisieren.
  Deswegen haben wir Vorschläge unterbreitet, die durchaus grundlegend sind, ohne
  aber eine Revolution im System anzuzetteln. Wir schlagen also vor, das System als
  solches umzugestalten, ohne die Grundmauern einzureißen. Die Reform wird langfristig
  wirken. Sie hat die junge Generation im Blick, ohne die Älteren abzuhängen. Mit
  der Reform können also Jüngere wie Ältere gleichermaßen auf eine leistungsstarke
  und gerechte Rente vertrauen. Wir schaffen einen Ausgleich zwischen den Generationen
  und haben in unserer Arbeit – das ist auch der Vielfalt in der Zusammensetzung der
  Kommission zu verdanken – darauf geachtet, keine Gruppe aus dem Blick zu verlieren.
  Wir legen verschiedene Vorschläge vor. Ein Leitbild wurde schon angesprochen. Das
  Idealbild ist eine Erwerbstätigenversicherung. Die Versichertengemeinschaft sollte
  so breit wie möglich ausgestaltet werden, um die Umlage auf breite, solide Füße
  zu stellen. Es geht also um die Einbeziehung von neuen Selbstständigen, auch von
  Abgeordneten und von Vorständen. Idealerweise wären auch Beamte in das System einbezogen;
  allerdings gibt es dabei durchaus gewichtige Schwierigkeiten, sodass man das wohl
  durchdenken sollte. Wir schlagen weiterhin vor ‑ das wurde schon angesprochen –,
  die Beamten nicht gänzlich außen vor zu lassen, sondern über die kurze Frist die
  Reformen in der Rentenversicherung wirkungsgleich auf die Beamten zu übertragen
  und im System der Beamtenversorgung nachzujustieren, sodass sich beide Systeme zumindest
  annähern. Es wurde schon angesprochen, dass wir eine Kapitalrente nach schwedischem
  Modell vorschlagen, in der ersten Säule. Das heißt, die Umlage wird ergänzt, aber
  diese Kapitaldeckung wird sie keineswegs ersetzen oder ablösen. Wir schlagen ja
  zwei Prozent Beiträge vor. Auch hier sollen die Belastungen abgefedert werden. Es
  soll nicht sofort in einem Schritt eingeführt werden, sondern stufenweise. Das Ganze
  soll natürlich auch paritätisch finanziert werden. Das wird eine Investition in
  die Zukunft sein, von der insbesondere die jungen Versicherten profitieren können.
  Wir haben aber natürlich auch an die Menschen gedacht, die rentennah sind, wie auch
  immer man das genau definieren will, also an diejenigen, die möglicherweise nicht
  mehr hinreichend Zeit bis zum Eintritt in die Rente haben, um aus diesem Kapitalstock
  genügend Anwartschaften aufzubauen. Für diese Menschen haben wir eine Übergangsregel
  entwickelt, die ihr Rentenniveau stabilisiert, und zwar so lange, bis die Kapitaldeckung
  greift. Die Renten – auch das wurde schon gesagt – werden weiter steigen. Es gibt
  keine Kürzungen. Sie werden steigen, aber etwas langsamer. Der Nachhaltigkeitsfaktor
  wird wieder greifen. Das ist den Veränderungen im Verhältnis zwischen Beitragszahlern
  und Leistungsbeziehern geschuldet. Wir leben länger, was eine sehr gute Nachricht
  ist. Das hat zur Folge, dass wir vorgeschlagen haben, die Regelaltersgrenze an die
  Lebenserwartung zu koppeln, dies aber moderat. In ungefähr zehn Jahren wird die
  Regelaltersgrenze also vielleicht um ein halbes Jahr steigen, wenn die Lebenserwartung
  weiterhin so steigt wie jetzt. Die Ministerin hat es gesagt: Das soll regelmäßig
  überprüft werden. Wir hatten auch all jene im Blick, die es nicht schaffen, so lange
  zu arbeiten. Wir haben eine Härtefallregelung für die Menschen vorgeschlagen, die
  sich in den rentennahen Jahrgängen befinden und aus gesundheitlichen Gründen nicht
  mehr in der Lage sind, weiterhin in ihrem angestammten, langjährigen Berufsfeld
  tätig zu sein. Wir betonen die Verantwortung auch der Arbeitgeber für alters- und
  gesundheitsgerechte Ausgestaltung der Arbeitsplätze. Wir betonen die Bedeutung von
  Prävention und Rehabilitation. Wir stoßen an, auch die Erwerbsminderungsrenten zu
  überdenken. Ein ganz wichtiger Punkt: Auch das Thema der Altersarmut haben wir uns
  vorgenommen. Dabei beziehen wir uns explizit auf die Vorschläge der Kommission zur
  Sozialstaatsreform, für eine bessere Zugänglichkeit der Grundsicherung im Alter
  zu sorgen und sie zu entstigmatisieren, damit die Menschen nicht aus Scham oder
  Unkenntnis diese Leistungen, die ihnen zustehen, nicht beantragen. Wir plädieren
  auch für Freibeträge für die gesetzliche Rente, damit sich Arbeit immer gelohnt
  hat. Last but not least, zumindest unter den Punkten, die ich heute herausheben
  möchte, schlagen wir auch eine Organisationsreform bei der Rentenversicherung als
  solches vor. Die Rentenversicherung soll einfacher, schneller und digitaler sein.
  Wir wollen natürlich keine Abstriche in der bürgernahen Beratung vor Ort, aber das
  Ganze soll von Doppelstrukturen entlastet werden. Damit wird die Verwaltung schlanker,
  aber eben auch besser zugänglich. Sie sehen also ein wohlaustariertes und durchdachtes
  Gesamtpaket vor sich. Wir freuen uns, wenn es alsbald umgesetzt wird. Frage : Das
  Paket soll möglichst vollständig umgesetzt werden. Der Teufel steckt im Detail.
  An vielen Stellen sind Grenzen zu definieren und noch genaue Größen festzulegen.
  Muss es schnell gehen, damit es nicht zerredet wird? Welche Art von Debatten erwarten
  Sie auch innerhalb der Koalition dazu nun? Bundeskanzler Friedrich Merz : Ja, es
  muss schnell gehen. Denn die Probleme, die wir haben, dulden keinen Aufschub. Wir
  sind im Grunde jetzt schon sehr spät. Wir hätten das alles schon vor vielen Jahren
  tun sollen. Aber die Zeit ist nun verstrichen. Insofern wollen wir zügig an die
  Arbeit gehen. Wir haben, wie Sie wissen, nächste Woche eine Sitzung des Koalitionsausschusses.
  Wir werden den Zeitplan im Koalitionsausschuss besprechen. Dann wird das Ministerium
  von Frau Bas die Arbeit übernehmen, einen entsprechenden Gesetzentwurf, möglicherweise
  sogar mehrere Gesetzentwürfe vorzubereiten. Ich möchte, dass wir das jetzt sehr
  zügig auf den Weg bringen und dass wir im zweiten Halbjahr die Entscheidungen treffen,
  die notwendig sind, um diese Reform in Kraft zu setzen. Bundesministerin Bärbel
  Bas : Ich will, wenn ich darf, ergänzen. Es ist so, dass wir uns über den Zeitplan
  unterhalten müssen. Ich denke, Sie wissen auch, dass all das, was jetzt vorgeschlagen
  ist, ja noch im Detail ausgestaltet werden muss, zumindest an der einen oder anderen
  Stelle, sodass wir den Zeitplan sicherlich besprechen müssen. Aber das Ziel ist
  schon, dass wir spätestens nach der Sommerpause, zum Ende des Jahres in die ersten
  Gesetzgebungen gehen können. Das muss letztendlich das Ziel sein. Aber das politische
  Commitment , dass wir alle gemeinsam das wollen, wollen wir natürlich jetzt miteinander
  diskutieren. Das muss auch so sein. Das werden wir auch am 1. Juli tun und dann
  auch noch genauer schauen, wie der Zeitplan aussehen kann. Aber das sind an vielen
  Stellen viele Strukturmaßnahmen, die gut vorbereitet werden und gut durchdacht sein
  müssen, weil wir es richtig machen wollen. Ich bin sehr zuversichtlich. Was die
  Fraktionen angeht oder wo wir mit Widerstand rechnen, das haben wir ja schon gemerkt.
  Natürlich gibt es an dem einen oder anderen Punkt Kritik. Damit werden wir umgehen
  müssen. Nichtsdestoweniger – das habe ich vorhin schon gesagt – glaube ich nicht,
  dass sich jetzt jeder für sich das Schöne heraussuchen und den Rest lassen kann.
  Das ist schon ein Gesamtpaket, dessen Teile ineinandergreifen. Wenn man das nicht
  will, dann muss man etwas anderes vorschlagen, so würde ich es ausdrücken. Aber
  jetzt einzelne Dinge herauszupicken und zu sagen: „Die machen wir, und die anderen
  machen wir nicht“, das wird, denke ich, nicht gehen. Darin sind wir uns einig. Das
  Gesamtpaket ist ambitioniert. Wie es gesetzespolitisch umzusetzen ist, in welcher
  Reihenfolge das geschehen kann, das werden wir besprechen. Wenn es denn den politischen
  Willen gibt – und davon gehe ich jetzt erst einmal aus –, dann bekommen wir das
  auch recht schnell hin. Mein Haus wird das jetzt nicht gerne hören, weil wir gerade
  ja noch ganz andere Reformpakete bearbeiten, Stichwort Arbeitszeitgesetz usw. Das
  alles haben wir ja auch noch parallel dazu. Aber das ist, denke ich, ein guter Aufschlag,
  den wir heute haben. Natürlich wird die eine oder andere Empfehlung politisch dann
  auch mit den jeweiligen Fachgremien, die wir auch mit den Ausschüssen haben, noch
  auszugestalten sein. Frage : Sie alle haben jetzt die Notwendigkeit der Gesamtumsetzung
  dieser Vorschläge betont. Was bedeutet Erfolg oder Misserfolg, dies insgesamt umzusetzen,
  für die Stabilität Ihrer Koalition und damit der Regierung? Is failure an option
  ? Bundeskanzler Merz : Nein. Wir haben die Vorarbeiten leisten lassen, um sie umzusetzen.
  Das ist keine akademische Übung, die wir hier sozusagen im luftleeren Raum ausgelöst
  haben, sondern es ist eine konkrete Vorarbeit für die Gesetzgebung der Koalition.
  Wir haben uns – ich habe eben schon darauf hingewiesen – im Koalitionsvertrag darauf
  verständigt, ein neues Gesamtversorgungsniveau – dieses Wort steht im Koalitionsvertrag –
  zu ermöglichen, und zwar aus einer Kombination von gesetzlicher Rentenversicherung
  und zusätzlicher privater und betrieblicher kapitalgedeckter Altersversorgung. Die
  Vorschläge, die jetzt auf dem Tisch liegen, entsprechen genau unserem Wunsch, dies
  zu ermöglichen. Deswegen ist Scheitern keine Option, sondern wir setzen das, was
  die Kommission uns vorgeschlagen hat, jetzt um. Frage : Herr Bundeskanzler, ich
  möchte gerne nach der paritätischen Finanzierung der Kapitalrente fragen, weil das
  Anliegen der Bundesregierung ja eigentlich die Entlastung von Unternehmen war. Es
  gibt also zwei einander widerstrebende Ziele, die Sie haben. Können Sie erklären,
  warum das jetzt kein Problem ist? Eine Frage an Frau Janda oder Herrn Weise: Muss
  man bei der Kopplung an die Lebensarbeitszeit nicht eigentlich auch einen sozialen
  Faktor mit einrechnen? Denn wir wissen, dass Menschen, die nicht sehr viel Geld
  verdienen und nicht sehr viel haben, sehr viel kürzer leben als diejenigen, die
  viel Geld haben. Ist dieser Faktor bei Ihnen mit berücksichtigt, oder müsste das
  nicht korrigiert werden? Bundeskanzler Merz : Ich habe eben darauf hingewiesen:
  Wenn wir nichts tun würden, würden die Beiträge steigen und die Renten sinken. –
  Das kehren wir jetzt um. Wir ermöglichen steigende Altersversorgungsleistungen gegen
  die Stabilisierung der Beiträge. In den Beiträgen enthalten ist in Zukunft der zusätzliche
  Beitrag für die kapitalgedeckte Altersversorgung. Wir haben es auch in Zahlen ausgerechnet
  gesehen. Ich will diese Zahlen einmal nennen. Auf diese Weise kommen mindestens
  30 Milliarden Euro pro Jahr zusätzlich in die Wirtschaft, weil dies der Teil der
  kapitalgedeckten Altersversorgung ist, der gleichzeitig unserer Volkswirtschaft
  zur Verfügung steht. Das heißt, dies ist eine Situation, die wir schon viel früher
  hätten ermöglichen sollen. Eine Abweichung von meinen bisherigen Vorstellungen ist
  die Integration in den Beitragssatz der ersten Säule. Ich muss sagen, das ist eine
  geniale Idee. Ich habe mir immer entgegenhalten lassen müssen, meine Vorschläge
  zum Thema der betrieblichen Altersversorgung und der Vorschlag, das Ganze obligatorisch
  zu machen – ich war immer ein Befürworter einer obligatorischen zusätzlichen betrieblichen
  Altersversorgung –, hätten erheblichen bürokratischen Aufwand ausgelöst und ganz
  neue Strukturen erfordert, bis hin in die Kontrolle. Das alles ist nicht notwendig,
  wenn man das in der ersten Säule macht. Deswegen ist das wirklich eine richtig gute
  Idee. Ich habe mich nur darüber geärgert, dass ich nicht selbst darauf gekommen
  bin. Constanze Janda : Dann ergänze ich noch etwas zur Frage der Lebenserwartung.
  Wir haben dieses Thema tatsächlich sehr intensiv diskutiert und sind uns auch des
  Umstands bewusst, dass die Lebenserwartung nicht für alle Menschen gleichermaßen
  steigt. Deswegen haben wir die Härtefallregel vorgeschlagen, mit der Menschen, die
  aus gesundheitlichen Gründen nicht mehr in der Lage sind, in ihrem Berufsfeld weiterzuarbeiten,
  vorzeitig in Rente gehen können. Wir plädieren auch für eine Reform oder für ein
  Neudenken der Erwerbsminderungsrenten, um diese zugänglicher zu gestalten.'
