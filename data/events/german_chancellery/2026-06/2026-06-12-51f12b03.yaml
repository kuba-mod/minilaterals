title: 'Staatsminister Weimer überreicht Bundesverdienstkreuz an Personen des Kulturlebens
  – Weimer: „Wichtige Vorbilder für den Zusammenhalt in unserem Land“'
text: 'Kulturstaatsminister Wolfram Weimer hat heute im Bundeskanzleramt herausragenden
  Persönlichkeiten aus Kunst und Kultur den Verdienstorden der Bundesrepublik Deutschland
  ausgehändigt. Der Orden ist die höchste Auszeichnung, die die Bundesrepublik Deutschland
  für Verdienste um das Gemeinwesen vergibt. Die Auszeichnung wird durch Bundespräsident
  Frank-Walter Steinmeier verliehen. Er berücksichtigte damit die Vorschläge des Beauftragten
  der Bundesregierung für Kultur und Medien. Der Verdienstorden am Bande wurden verliehen
  an: Der Verdienstorden Erster Klasse wurde verliehen an: Dazu erklärt Kulturstaatsminister
  Weimer: „Außergewöhnliche Leistungen in Kultur und Kunst verdienen eine besondere
  Anerkennung. Mit der heutigen Auszeichnung würdigen wir Menschen, die unser kulturelles
  Leben über viele Jahre hinweg geprägt und bereichert haben. Ihr Engagement stärkt
  die kulturelle Vielfalt unseres Landes und zeigt, welche verbindende Kraft von Kunst
  und Kultur ausgeht. Sie sind wichtige Vorbilder für den Zusammenhalt in unserem
  Land.“'
