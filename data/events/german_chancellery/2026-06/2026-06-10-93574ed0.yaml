title: Nach dem Gespräch mit Vertreterinnen und Vertretern der Regierungsparteien,
  Wirtschaftsverbände und Gewerkschaften am 10. Juni 2026 im Bundeskanzleramt
text: 'Die Mitglieder des Koalitionsausschusses, Spitzenvertreter der Gewerkschaften
  und der Wirtschaftsverbände haben sich heute Abend über notwendige Reformschritte
  für Wachstum und Beschäftigung ausgetauscht. Der Termin diente der Stärkung des
  Standorts Deutschland. Die Teilnehmerinnen und Teilnehmer diskutierten zu vier Themenfeldern
  in konstruktiver und konzentrierter Atmosphäre: die Situation am Arbeitsmarkt, die
  Stabilität und Sicherung der Sozialversicherungen, Bürokratieabbau und Steuerpolitik.
  Einigkeit herrschte unter den Gesprächsteilnehmern, dass der Wirtschaftsstandort
  Deutschland vor großen Herausforderungen steht. Der technologische Wandel, die Veränderung
  in der Demografie und die vielfältigen Krisen in der Welt zwingen zu entschlossenen
  Schritten für mehr Wachstum und neue Wertschöpfung. Gleichzeitig anerkannten alle
  Seiten, dass die Sozialsysteme reformiert und die Bürokratielast verringert werden
  müssen. Die Teilnehmerinnen und Teilnehmer waren sich einig, dass weitere Schritte
  zur Sicherung von Arbeitsplätzen und zur Verbesserung der Attraktivität des Wirtschaftsstandortes
  zügig und entschlossen angegangen werden müssen. Dazu gehören auch die Bemühungen,
  die Wettbewerbsfähigkeit Deutschlands zu verbessern, etwa durch die Senkung von
  Energiekosten und die steuerliche Entlastung von Arbeitnehmerinnen und Arbeitnehmern.
  Die Vertreter der Regierungskoalition begrüßten die Bereitschaft der Wirtschafts-
  und Gewerkschaftsvertreter, den Reformprozess konstruktiv zu begleiten. Dazu wurden
  weitere Gespräche vereinbart.'
