  noch einmal darüber sprechen, was von den unterschiedlichen Akteuren angesprochen
  wurde. Ich denke, es ist schon fair, zu sagen, dass die wirtschaftliche Wettbewerbsfähigkeit
  und die Frage, wie wir in diesem Land Arbeitsplätze sichern und wie wir es schaffen,
  dass die Wirtschaft wieder wächst, bei allen Herausforderungen, die wir geopolitisch
  sehen, natürlich ein zentrales Thema sind, das Gewerkschaften und Arbeitgeber durchaus
