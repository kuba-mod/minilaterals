  Basis dafür, dass sich Menschen ein gutes und eigenständiges Leben aufbauen können.
  Insofern stehen die wirtschaftliche Wettbewerbsfähigkeit, eine starke Wirtschaft
  und sichere Arbeitsplätze natürlich ganz im Mittelpunkt von Beratung. Ich hatte
  aber nicht nach Einkommensungleichheit gefragt. Eine Vermögensungleichheit war bisher
  nie ein zentrales Thema für diese Bundesregierung. Danach hatte ich gefragt. Das
  liegt aber auch auf dem Tisch für die Bundesregierung, oder? Ich würde noch einmal
  darauf verweisen, dass die Gespräche heute Abend stattfinden. Was die Sozialpartner
  dort einbringen werden, müssten wir im Anschluss daran besprechen. Herr Meyer, ist
  die Begrifflichkeit „Sozialpartner“ eigentlich noch die richtige? Was wir im Moment
  an völlig konträren Forderungen erleben, zum Beispiel zur Arbeitsplatzgestaltung
