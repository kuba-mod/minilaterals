  ja nicht um eine Bewertung, sondern einfach nur um die Frage, ob Deutschland vorher
  angeboten wurde, sich daran zu beteiligen. Ich kenne jetzt nicht die Summe und Gesamtheit
  aller einzelnen Maßnahmen, die dort angekündigt wurden. Das müsste aber einer Bewertung
  des Ganzen zugrunde liegen. Deswegen kann ich sie nicht einordnen und nicht bewerten.
  Ich möchte noch einmal darlegen, was unser Modus ist und in welchem Rahmen wir uns
  einbringen. Das ist die Europäische Union, und das sind EU-Sanktionen, wie sie kürzlich
  auch beschlossen wurden. Dazu stehen wir. Herr Hinterseher, gestern gab es ein Joint
  Statement , also eine gemeinsame Erklärung, von, so meine ich, 20 europäischen Staaten
  , die sich dafür aussprachen, dass seitens Israels in Gaza humanitärer Zugang ermöglicht
  werde. Kurioserweise hat Deutschland dabei wieder gefehlt. Wie kommt das? Wir kennen
  das Statement der erwähnten Staaten. Sie wissen, dass wir uns grundsätzlich so äußern,
  wie es nach unserem Dafürhalten unseren außenpolitischen Zielen und natürlich auch
  dem Einfluss, den wir geltend machen möchten, zuträglich ist. Wir haben uns in der
  Vergangenheit zu diesem Thema sehr klar geäußert. Wie schon bei ähnlich gelagerten
  Fällen in der Vergangenheit gilt auch hier: Wir haben ebenfalls immer wieder Zugang
  nach Gaza für humanitäre Nichtregierungsorganisationen gefordert ebenso wie eine
  Verbesserung der humanitären Lage. Diese Position der Bundesregierung ist der israelischen
  Seite bekannt. Der Minister selbst hat dieser Tage mit dem israelischen Außenminister
  telefoniert. Wir teilen natürlich die formulierten Ziele und insbesondere auch die
  Sorge, die in diesem Statement zum Ausdruck kommt. Denn natürlich ist die humanitäre
  Lage im Gazastreifen bei Weitem nicht so, wie sie sein müsste. Das ist die Umsetzung
  des 20-Punkte-Plans, die auch vorankommen muss. Zum anderen Teil dieser Medaille
  gehört auch, dass ein anderer Aspekt der Umsetzung dieses 20-Punkte-Plans, nämlich
  die Entwaffnung der Hamas, ebenso wenig vorankommt. Deshalb hat unser Handeln weiterhin
  das Ziel, dort Einfluss zu nehmen. Wir glauben, dass wir das auf den Wegen und mit
  den Mitteln, die wir haben, nämlich einem etablierten und engen Gesprächskanal mit
  der israelischen Seite, tun können, und deswegen verfolgen wir das auch weiter.
  Das heißt, um es zusammenzufassen: Man kann sich über Ziele einig sein, aber der
  Weg ist vielleicht ein anderer. Kommt denn Israel seinen IGH-Auflagen nach? Ich
  meine, es gab ja schon im Januar 2024 angesichts der Völkermordklage eindeutige
  Maßnahmen vom IGH, unter anderem in Bezug auf Gaza und die humanitäre Lage. Meines
  Wissens hat sich Israel bisher nicht daran gehalten. Wie ist das aus Sicht der Bundesregierung?
  Sie sind ja durch die Nicaragua-Klage auch an dem Verfahren beteiligt. Ich kann
  mich weder zu laufenden Verfahren äußern, noch kann ich mich zu einer generellen
  Einschätzung hinreißen lassen, die jetzt darauf abstellt, ob Israel diese oder jene
  Maßnahme umgesetzt hat. Ich kann noch einmal unsere Ziele klar formulieren und sagen,
  wofür wir uns einsetzen. Wofür wir uns einsetzen, das ist eine verbesserte humanitäre
  Lage im Gazastreifen. Denn nach wie vor ist die Not viel zu groß; das ist allen
  völlig klar. Auch die Umsetzung des 20-Punkte-Plans kommt nicht in dem Maße voran,
  wie wir das gerne hätten. Insofern versuchen wir dort, weiter unseren Einfluss,
  sofern wir ihn haben, geltend zu machen. Herr Hinterseher, in der Vergangenheit
  war das AA in der Lage, den Status der humanitären Hilfe, das Durchlassen oder Nichtdurchlassen,
  auch zu quantifizieren. Also: Wie viele Tonnen täglich wären nötig? Wie viele wurden
  durchgelassen? ‑ Können Sie das vielleicht für die aktuelle Situation auch tun,
  entweder hier oder gegebenenfalls als Nachlieferung? Zu sagen „Wir appellieren an
  alle, und es muss besser werden“, das hilft wenig für eine quantifizierte Einschätzung
  der Lage. Ich kann Ihnen sagen, dass wir natürlich in der Lage sind, vor allem über
  unsere Präsenz vor Ort, aber auch über unseren engen Kontakt mit internationalen
  Hilfsorganisationen und NGOs, das schon auf eine Art und Weise zu quantifizieren.
  Wir berufen uns da auf UN-Zahlen, auch in der Vergangenheit. Ich glaube, die Lage
  bleibt nach wie vor höchst angespannt. Wir wissen von ungefähr drei Vierteln, ein
  bisschen darüber liegend ‑ ich glaube, es sind 77 Prozent der Bevölkerung ‑, die
  in einer Ernährungsnotlage leben. 1,7 Millionen Menschen leben in notdürftigen und
  überfüllten Lagern und Behelfsbehausungen. Deshalb ist es ja so wichtig, dass auch
  Material in den Gazastreifen kommt. Denn es geht nicht nur die Versorgung mit Lebensmitteln
  und überlebensnotwendigen Medikamenten, sondern auch um Behausungen. Man gerät dann
  oft auf israelischer Seite in den Konflikt, dass sie als Dual-Use-Güter angesehen
  werden; Sie kennen die Diskussion darum. Deswegen gilt unsere, ich sage einmal,
  ganze Energie, dort einen Mechanismus zu finden, der beiden Seiten, dem berechtigten
  Sicherheitsinteresse Israels und vor allem der humanitären Notlage der Menschen
  vor Ort, Rechnung trägt. Vielleicht könnten Sie es trotzdem schaffen ‑ Sie haben
  ja gesagt, dass Sie über Kontakte zu den Organisationen verfügen; Israel ist als
  faktische Besatzungsmacht ja verpflichtet, die humanitäre Situation zu sichern ‑,
  uns einen empirischen Überblick zu geben und uns zu nennen, zu wie viel Prozent
  ‑ oder ein anderer Maßstab ‑ Israel dieser Verpflichtung nachkommt und zu wie viel
  Prozent nicht? Das wäre schön. Ich kann das versuchen. Ich möchte Sie aber darauf
  hinweisen, dass ich gerade gesagt habe: Das sind öffentlich zugängliche VN-Zahlen.
  Insofern ‑ vielleicht als Recherchehinweis ‑ könnten Sie das auch selbst nachschlagen.
  Denn das wird turnusmäßig und sehr regelmäßig veröffentlicht. Eine kurze Frage,
  weil Sie die Entwaffnung der Hamas angesprochen haben. Der Deal aus dem letzten
  Jahr war ja, dass Israel sich aus Gaza zurückziehen muss. Erfüllt denn Israel seine
  Verpflichtungen, damit die Hamas entwaffnet? Ich habe ja gerade auf beide Seiten
  hingewiesen. Wir haben auch immer gesagt, dass die aktuelle Situation, nämlich diese
  „gelbe Linie“ und die Trennung in „rote Zone“ und „grüne Zone“, nicht dauerhaft
  sein darf. Es darf keine dauerhafte Besatzung geben. Inwiefern das dann der Sicherheit
  zuträglich ist, muss Israel im Einzelnen begründen. Ganz kurz zu einer dauerhaften
  Besatzung: In der Westbank sind die Israelis seit über 60 Jahren. Da wird das auch
  nicht als dauerhafte Besatzung bezeichnet, sondern immer noch temporär. Was hindert
  die Israelis dementsprechend daran, quasi in Gaza temporär über Jahrzehnte zu bleiben?
  Ich bin nicht der richtige Adressat für diese Frage, wie lange eine Besatzung im
  Einzelnen anhält. Ich habe unsere Position, unsere Ziele sehr klar gemacht, nämlich:
  Wir wirken darauf hin, dass sich die humanitäre Lage im Gazastreifen verbessert
  und es zu keiner dauerhaften Besatzung des Gazastreifens kommt. Noch einmal zum
  Westjordanland: Amnesty International hat heute einen Bericht über die Lage dort
  veröffentlicht und gesagt, dass Siedlergewalt, Vertreibungen, Enteignungen usw.
  keine Einzelfälle von extremistischen Siedlern sind, sondern ‑ ich zitiere ‑ „eine
  gezielte Politik der ethnischen Säuberung“ der israelischen Regierung. Streitet
  die Bundesregierung diese Beschreibung der Lage ab? Sie rekurrieren auf einen Bericht,
  den ich nicht kenne, den ich auch in Gänze nicht konsumiert habe. Wir schauen uns
  diese Berichte als Auswärtiges Amt immer sehr genau an. Wir analysieren die für
  uns. Wir werden uns nicht alle Wertungen im Einzelnen zu eigen machen. Das war auch
  in der Vergangenheit so. Ich kann Ihnen aber sagen, dass wir auch größte Sorge um
  die Situation im Westjordanland und die Besatzung dort haben, vor allem im Hinblick
  auf die Siedlungspolitik, die wir natürlich auch als eine staatliche Siedlungspolitik
  sehen. In dem Bericht fordert Amnesty International, dass Deutschland und andere
  EU-Länder härtere Maßnahmen gegen Israel treffen, darunter die Aussetzung des Assoziierungsabkommens
  zwischen der EU und Israel. Würde die Bundesregierung noch wie vorher dagegen sein?
  Ich glaube, dazu haben wir uns in der Vergangenheit hinlänglich geäußert. Dazu hat
  sich auch der Minister mehrfach geäußert. Da habe ich Ihnen keinen neuen Stand mitzuteilen.
  Ich habe aber gesagt, dass wir uns grundsätzlich in Diskussionen in der Europäischen
  Union einbringen. Das war die Ausgangsfrage, und darauf würde ich Sie gerne hinweisen.
  Wenn Sie gerade sagen, dass die Siedlungspolitik staatlich koordiniert ist, dann
  ist doch der logische Schluss, dass die ethnischen Säuberungen das auch sind. Damit
  geben Sie Amnesty doch recht. Ich kann Ihnen keinen logischen Schluss anbieten.
  Es ist Ihre Wertung; es ist auch Ihre Aufgabe, das Ganze zu werten. Ich kann sagen,
  dass wir den Siedlungsbau als völkerrechtswidrig betrachten und das Thema mit Israel
  immer wieder kritisch aufnehmen. Das war aber gerade nicht die Frage. Laut IGH ist
  die gesamte Besatzung illegal. Dementsprechend war die Frage vom Kollegen ja berechtigt.
  Ja, das Gutachten des IGH hat gesagt, dass die Besatzung zu beenden ist. Das kennen
  wir. Herr Müller, Generalleutnant André Bodemann, verantwortlich für die Erarbeitung
  vom Operationsplan Deutschland, erklärte kürzlich, dass für die Verteidigung Deutschlands
  auch ein Mindset in der Bevölkerung vorhanden sein müsse. Ein deutscher Zivilschutzexperte
  erklärte mir gegenüber kürzlich, dass es aus seiner Sicht in Deutschland an einer
  Kultur der Verteidigungsfähigkeit fehle und er einen deutlichen Unterschied beispielsweise
  zu den nordeuropäischen Ländern oder der Schweiz sehe. Wie sieht das die Bundesregierung?
  Ich kann natürlich nur für den militärischen Anteil der Gesamtverteidigung sprechen.
  Das müsste das Innenressort noch einmal aus anderer Perspektive erläutern. Wir hatten
  ja erst ‑ ich glaube, vor zwei Wochen ‑ gemeinsam Veranstaltungen zum Pakt für den
  Bevölkerungsschutz. Dort wurden beide Anteile der Gesamtverteidigung, also der zivile
  Anteil und der militärische Anteil, vorgeführt und erläutert, zum Beispiel auch
  gestern im Statement mit dem niedersächsischen Landeskabinett. Bei uns im BMVg war
  das auch noch einmal ein großes Thema Die Verteidigung eines Landes hat natürlich
  immer zwei Komponenten, und zwar einmal die militärische, die im Schwerpunkt extern
  gerichtet ist, und dann die sogenannte Zivilverteidigung; Zivilschutz ist auch ein
  Anteil. Beides kann nur im Zusammenspiel erfolgreich sein. Dafür haben wir zum Beispiel
  einen Operationsplan, der genau diese beiden Anteile zivil-militärisch zusammenführt.
  Für uns als Militär ist eben die Richtschnur, wie wir uns hier aufstellen, wenn
  Deutschland als Drehscheibe in Europa funktionieren muss. Dazu kann ich nur aus
  unserer Perspektive sagen: Die Zusammenarbeit mit dem zivilen Bereich ist ausgezeichnet.
  In den Bundesländern und nahezu in allen Bundesländern wird intensiv auf Basis dieses
  Operationsplans Deutschlands trainiert. Wir haben vor allem mit den Blaulicht- und
  Sicherheitsbehörden eine enge Zusammenarbeit in Hamburg. Wir haben das ab und zu
  in Berlin. Sie bekommen es ja mit, wenn die Hubschrauber tief fliegen oder die Truppe
  zum Beispiel in U-Bahn-Schächten trainiert. Wir haben also eine intensive Zusammenarbeit
  über die Landeskommandos, über das Operative Führungskommando. Ich kann dort keine
  Defizite sehen. Natürlich obliegt es dann auch uns als Land und als Gesellschaft,
  uns gesamtstaatlich auf alle Möglichkeiten einzustellen. Dazu gehört aus unserer
  Perspektive eben auch, dass der zivile Bereich einen Anteil an der Gesamtverteidigung
  leistet. Dazu muss, wie gesagt, das Innenressort noch ausführen. Wie schon angekündigt,
  hatten wir zuletzt die Vorstellung des Paktes für den Bevölkerungsschutz. Bereits
  seit geraumer Zeit haben wir wiederholt ‑ vor allen Dingen hat auch Minister Dobrindt
  darauf hingewiesen ‑, dass die zivile und die militärische Verteidigung enger verzahnt
  und enger zusammengedacht werden muss. Wir müssen nicht nur die militärische Verteidigung
  aufrüsten, sondern vor allen Dingen auch die zivile Verteidigung ausrüsten. Das
  geht halt in alle Bereiche ‑ das geht in die Bereiche Ausbildung, Ausstattung und
  auch Anerkennung ‑, um die gesamtgesellschaftliche Resilienz zu stärken und insgesamt
  auch dort wehrhafter zu werden. Wir hatten schon im vergangenen Jahr die Diskussion,
  dass dies stärker fokussiert im Privaten, in den Familien, stattfinden soll, aber
  auch in der schulischen Bildung. Die Grundresilienz und das Verständnis für die
  Bedeutung von zivilem Schutz und Katastrophenschutz soll einfach immanenter Bestandteil
  werden, genauso wie es die Erste Hilfe, der Ruf der Feuerwehr, der Ruf der Polizei
  ist. Man sollte in solchen Situationen möglichst von klein auf weiß wissen: Was
  sind die Wege? Was muss ich machen? Wie kann ich helfen? Wie kann ich selber den
  Beitrag leisten? Dazu haben wir zuletzt im Pakt für den Bevölkerungsschutz für die
  Bereiche Ausstattung und Ausbildung ‑ auch gerade für die vielen ehrenamtlichen
  Kräfte, die im THW und im Zivilschutz ehrenamtlich tätig sind ‑ langfristig Mittel
  zur Verfügung gestellt, aber auch technische Mittel, so etwa Fahrzeuge, um die nötige
  Ausstattung und Ausbildung zu gewährleisten. Ein letzter Punkt, der natürlich an
  alle gerichtet ist, ist, dass die Wertschätzung für die ehrenamtliche Tätigkeit
  und die aufopferungsvolle Arbeit der Ehrenamtler einfach gesteigert und anerkannt
  werden muss. Ich verstehe Sie also richtig, dass Sie als Bundesregierung schon einen
  Ausbaubedarf sehen für das Bewusstsein einer guten Verteidigungsfähigkeit der Gesellschaft?
  Ich habe gerade erläutert oder versucht zu erläutern, dass natürlich das Bewusstsein
  gestärkt werden muss, um eine gemeinsame Resilienz auch im Zivilschutz zu stärken
  und zu festigen. Ich habe eine Frage ans Verkehrsministerium: Es gibt einen Bericht
  , dass die Deutsche Bahn 13 Milliarden Eurozusätzliches Geld verlangt . Können Sie
  das bestätigen? Dazu kann ich im Moment nur sagen, dass wir uns im Prozess der Finalisierung
  der LV InfraGO befinden. Das ist die Nachfolge der Finanzierungsvereinbarung für
  die Deutsche Bahn; bisher ist es ja die LUFV III. Das Projekt liegt voll im Zeitplan.
  Im Hinblick auf die laufenden Haushaltsverhandlungen kann ich Ihnen dazu im Moment
  nicht mehr sagen. Wie sehen Sie denn insgesamt den Investitionsbedarf bei der Bahn
  in Euro? Im Moment sind erhebliche Mittel für die Deutsche Bahn vorgesehen, 106 Milliarden
  Euro bis zum Ende der Legislaturperiode. Das ist sicherlich eine sehr auskömmliche
  und gute Finanzausstattung für die Bahn und die Aufgaben, die da zu erledigen sind.
  Eine Frage an den Eigentümer der Deutschen Bahn: Erwägt das Ministerium die Umbenennung
  des Projekts Stuttgart 21 in Stuttgart 31? Hielten Sie das für angemessen angesichts
  der absehbaren Verzögerungen? Ernsthafter Kern der Frage: Diese Verzögerungen sind
  ja durch, soweit man weiß, Versäumnisse und Fehler massiver Art bei der Realisierung
  des Bahnhofs verursacht. Sind Sie der Meinung, dass da Regressansprüche zu stellen
  sind? Ich glaube, dazu kann ich mich jetzt nicht äußern. Das Projekt Stuttgart 21
  ist kein Bedarfsplanprojekt des Bundes, sondern ein eigenwirtschaftliches Projekt
  der Deutschen Bahn, des Landes Baden-Württemberg, der Landeshauptstadt Stuttgart,
  des Verbands Region Stuttgart und des Flughafens Stuttgart. Der Bund ist dabei nicht
  Projektpartner und auch nicht zuständig für Planung und Durchführung bzw. verantwortlich
  für Verzögerungen. Er wird sich mit dem Thema als Eigentümer aber selbstverständlich
  auch über seine Funktion im Aufsichtsrat befassen. Aus aktuellem Anlass an den Regierungssprecher:
  Wie viel KI steckt in den Reden des Bundeskanzlers? Ich könnte jetzt sagen: Zu internen
  Abläufen geben wir keine Auskunft. ‑ Nein, die Worte des Bundeskanzlers sind die
  Worte des Bundeskanzlers. Aber benutzen die Redenschreiber des Kanzlers denn auch
  künstliche Intelligenz, so wie das in Thüringen ja ganz offen zugegeben wird? Noch
  einmal: Wenn der Bundeskanzler spricht, dann sind das die Worte des Bundeskanzlers
  und von niemand anderem. Vielleicht könnten sich andere Ministerien äußern, falls
  sie bei Reden oder Texten der Minister und der Ministerinnen KI benutzen. Wir können
  vielleicht ganz allgemein zum Umgang mit KI in der Bundesverwaltung sagen, dass
  wir in der Bundesverwaltung selbstverständlich künstliche Intelligenz nutzen. Es
  gibt freigegebene Tools. Es gibt das Projekt KIPITZ, mit dem wir den Einsatz von
  KI in der Bundesverwaltung voranbringen können und wollen, um einfach mit der Zeit
  zu gehen und auch Kolleginnen und Kollegen zu entlasten, wenn es um automatisiertes
  Bearbeiten von Dokumenten, um IFG-Anfragen, bei denen Schwärzungen erforderlich
  sind, geht. Solche Dinge kann man mit KI bearbeiten. Da wird auch Text mit KI bearbeitet.
  Aber bei der Frage geht ja jetzt darum: Kommen die Worte von Ministern und Ministerien
  von KI? Ich verstehe, weil sich kein Ministerium angesprochen fühlt, dass die Vertreter
  der Bundesregierung für ihre eigenen Worte oder Reden keine KI nutzen. Es gibt keinen
  Widerspruch. Dann scheint das so zu sein. Auch an das Digitalministerium ‑ es ist
  gut, dass Sie gerade dort sitzen ‑: Hält das Ministerium weiterhin an Januar 2027
  für die Einführung der EUDI-Wallet fest? Wir hatten diese Frage, glaube ich, auch
  am Montag. Da hatte ich sie beantwortet: Der 2. Januar 2027 steht. Was sagen Sie
  zu den Berichten, dass es dabei Verzögerungen geben wird? Die Medienberichte haben
  wir gesehen. Wir kommentieren sie nicht. Das Projekt läuft auf Hochtouren. Das Sicherheitsthema
  haben wir auf dem Schirm. Es wird umfassend getestet, auch im Vorfeld. Dabei laufen
  auch im zweiten Halbjahr Testphasen an. Die Wallet befindet sich in einer Liveumgebung,
  in der 150 Unternehmen auch bereits Anwendungen testen. Unser Ziel ist ja auch nicht
  nur, mit dem Beginn der Wallet Anwendungen in der Bundesverwaltung zu schaffen,
  sondern dieses Projekt lebt davon, dass auch in der Wirtschaft der Einsatz einer
  Onlinealtersverifikation, einer digitalen Altersverifikation möglich ist. Dabei
  gibt es Projekte wie die Identifizierung beim Einkaufen im Supermarkt oder auch
  die Eröffnung eines Bankkontos. Wir sind darauf bedacht, dass möglichst viele Anwendungen
  mit der Wallet auch ab dem ersten Tag möglich sind. Sie kommt am 2. Januar, wie
  gesagt. Ich habe eine Frage an Herrn Meyer oder vielleicht auch das Wirtschaftsressort:
  Warum wurde, ich glaube, jetzt zum wiederholten Male das Energieeffizienzgesetz
  nicht im Kabinett behandelt? Das war doch längst mehrfach vorgesehen. In der Tat
  war das Energieeffizienzgesetz zwischenzeitlich auf der Tagesordnung für heute.
  Die Abstimmungen in der Bundesregierung dauern an. Wir arbeiten weiterhin an einer
  zügigen Umsetzung der europäischen Vorgaben im Energieeffizienzgesetz und beraten
  uns dazu innerhalb der Regierung. Können Sie uns sagen, wann es von der hoffnungsvollen
  Tagesordnung heruntergenommen wurde und an welchen Punkten es besonders hakt? Wie
  üblich, würde ich mich zu internen Abstimmungen nicht äußern. Die regierungsinternen
  Abläufe, wie jetzt die Tagesordnungsplanung war, kenne ich tatsächlich nicht. Können
  Sie schon sagen, wann es nun einen erneuten Tagesordnungsanlauf geben soll? Ein
  konkretes Datum kenne ich nicht. Ich weiß nur, dass wir einen zeitnahen Abschluss
  anstreben.'
