  als eine Sozialpartnerschaft, oder? Das ist ein Wortkonstrukt, aber ich weiß nicht,
  was Sie jetzt von mir als Definitionsfrage erwarten. Für uns ist wichtig, dass wir
  mit Arbeitgebern, mit der Wirtschaft, aber auch mit Gewerkschaften zusammenkommen,
  weil das am Ende die Akteure sind, die ganz zentral sind und die mit den Arbeitgebern
  und mit den Beschäftigten auch große Gruppen in der Bevölkerung hinter sich wissen.
  Deshalb lohnt sich, denke ich, dieser Austausch, und deshalb lohnt sich auch jeder
  Versuch, an Gemeinsamkeiten zu arbeiten. Der Hintergrund der Frage ist, dass Partnerschaft
  normalerweise eine andere Form von Verhältnis zueinander bedeutet. Aber ich entnehme
  dem, dass, sozusagen auch in Ihren Gesprächen ansetzend, das Wort gebraucht wird,
  aber die sehr konträren Auffassungen bei allen Beteiligten völlig bewusst ins Kalkül
  eingehen, richtig? Natürlich nehmen auch wir Debatten wahr. Es gab sie auch im Vorfeld
  des heutigen Termins. Aber noch einmal: Arbeitgeber und Gewerkschaften als diejenigen,
  die zum Beispiel Tarifverträge aushandeln etc., zeigen ja auch, dass sie eine ganz
  wichtige Funktion haben. Lassen Sie uns jetzt mit ein bisschen Optimismus, aber
  auch mit Offenheit in die Gespräche heute Abend gehen, und dann berichten wir im
  Anschluss darüber. (zum Entwurf eines GKV-Beitragssatzstabilisierungsgesetzes )
  Im Bundesrat gibt es offenbar Widerstand gegen das Krankenkassenpaket, das ja am
  Freitag zum ersten Mal im Bundestag beraten werden soll. Wie groß ist aus Sicht
  des Gesundheitsministeriums die Gefahr, dass das Paket im Bundesrat scheitert? Dass
  sich die Länder jetzt positionieren, ist Teil des ganz normalen Verfahrens im Gesetzgebungsprozess.
  Das Verfahren läuft jetzt, und das warten wir erst einmal ab. Gibt es irgendetwas,
  bei dem das BMG den Ländern dabei entgegenkommen kann oder will? Ist man dazu schon
  in Gesprächen mit den Ländern? Mit den Ländern sind wir kontinuierlich in Gesprächen.
  Es kam jetzt heraus, dass das Defizit der gesetzlichen Krankenkassen in diesem Jahr
  wahrscheinlich erheblich höher ausfallen wird, als bislang eingeplant. Die Summe
  von 3,5 Milliarden Euro steht im Raum. Wird jetzt nachgesteuert, oder wie wollen
  Sie verhindern, dass am Schluss doch die Beiträge erhöht werden müssen, was ja eigentlich
  verhindert werden soll? Ich kann zunächst einmal bestätigen, dass vorläufige Zahlen
  zeigen, dass die Ausgabendynamik deutlich höher ist, als vom Schätzerkreis prognostiziert.
  Wir können das allerdings erst dann abschließend bewerten, wenn die genauen Zahlen
  vorliegen und auch validiert wurden. Das ist in der Regel Ende Juni oder Anfang
  Juli der Fall. Dann wird das vom BMG verkündet, zusammen mit den Entwicklungen der
  einzelnen Leistungsbereiche. Klar ist in jedem Fall, dass die vorläufigen Zahlen
  deutlich machen, wie ernst die Lage der GKV ist. Weitergehend kommentieren oder
  bewerten kann ich das zum jetzigen Zeitpunkt aber nicht. Arbeiten Sie aber schon
  an einer Art von Plan B, wie man reagieren möchte, wenn sich diese Zahlen bewahrheiten
  sollten? Wie gesagt, werden sie abschließend bewertet, wenn genaue Zahlen vorliegen
  und validiert wurden. Es geht um die Sanktionen , die sechs Länder, Großbritannien,
  Frankreich, Kanada, Norwegen, Australien und Neuseeland, gegen Israel jetzt verhängen.
  Das sind ja enge Partner Deutschlands. Deswegen die Frage ans AA: Wurde Deutschland
  im Vorfeld angeboten, sich an diesen Sanktionen zu beteiligen? Es ist sehr richtig;
  das sind sehr enge Partner Deutschlands, unter anderem in der NATO und in der Europäischen
  Union, aber auch in unterschiedlichen Formaten. Australien haben wir zum Beispiel
  diese Woche im Zwei-plus-Zwei-Format getroffen. Wir nehmen den Schritt dieser Länder
  natürlich zur Kenntnis. Ich werde diesen Schritt hier aber nicht weiter bewerten
  oder kommentieren. Sie wissen auch, dass wir die Gewalttaten extremistischer Siedler
  sehr klar ablehnen. Wir haben das in der Vergangenheit getan und tun das auch hier
