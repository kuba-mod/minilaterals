date: '2026-06-10'
type: press_release
source_name: german_chancellery
title: Regierungspressekonferenz vom 10. Juni 2026
text: 'stellvertretender Regierungssprecher Meyer (Vorsitzender Feldhoff eröffnet
  die Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der
  Ministerien.) Das Bundeskabinett hat heute Vormittag getagt und einige Beschlüsse
  gefasst, die ich Ihnen kurz vorstellen möchte. Die Bundesregierung hat den von der
  Bundesjustizministerin vorgelegten Gesetzentwurf zur Modernisierung des Schiedsverfahrensrechts
  beschlossen. Deutschland soll für nationale und internationale Schiedsverfahren
  attraktiver werden und damit eine Stärkung als Justizstandort erfahren. Künftig
  sollen Schiedsvereinbarungen nicht mehr nur schriftlich, sondern auch in anderer
  Weise, beispielsweise in Textform, geschlossen werden können. Verfahren vor staatlichen
  Gerichten, die schiedsrechtliche Streitigkeiten betreffen, werden effizienter und
  flexibler gestaltet. Dies geschieht zum einen durch die Förderung von Digitalisierung.
  Zum anderen wird es deutlich mehr Möglichkeiten geben, Verfahrensschritte auf Englisch
  durchzuführen. Unter besonderen Voraussetzungen kann das Verfahren in Zukunft vollständig
  auf Englisch erfolgen. Eine Neuregelung zur Veröffentlichung von Schiedssprüchen
  zielt auf mehr Transparenz schiedsrechtlicher Rechtsprechung in Deutschland. Dies
  schafft Akzeptanz und führt zu mehr Einfluss auf die internationale Praxis. Dabei
  bleiben Vertraulichkeit und der Schutz von Geschäftsgeheimnissen durch Anonymisierung
  bzw. Pseudonymisierung erhalten. Außerdem soll ein sogenannter Restitutionsantrag
  geschaffen werden, mit dem in eng umgrenzten Fällen ein Schiedsspruch ausnahmsweise
  auch noch nach Ablauf der Frist für Aufhebungsanträge gerichtlich aufgehoben werden
  kann. Für einstweilige Anordnungen durch Schiedsgerichte sieht der Gesetzentwurf
  im Interesse effektiver Rechtsdurchsetzung klare Regelungen zur Vollstreckbarkeit
  vor. Bei Nachfragen steht das zuständige Ressort für Fragen sicherlich auch noch
  zur Verfügung. Das Kabinett hat heute weitere Änderungen im Telekommunikationsgesetz
  beschlossen. Mit den Änderungen sollen die Rahmenbedingungen für den flächendeckenden
  Ausbau von Mobilfunk und Festnetz verbessert und vereinfacht werden. So soll der
  Ausbau weiter beschleunigt sowie Glasfaser bis in jede Wohnung erreicht werden.
  Zudem werden Vorgaben aus dem EU-Recht im deutschen Recht umgesetzt. Das betrifft
  die Gigabit-Infrastruktur und die Roaming-Verordnung. Die Bundesregierung setzt
  damit zentrale Vorhaben aus dem Koalitionsvertrag um und nimmt den schnellen Ausbau
  der digitalen Infrastruktur, bei dem wir in den vergangenen Jahren bereits Fortschritte
  gemacht haben, weiter in den Fokus. Der Glasfaserausbau ist von zentraler Bedeutung
  für die Leistungsfähigkeit der nationalen digitalen Infrastruktur. Der Ausbau stärkt
  damit die Innovationskraft und Wettbewerbsfähigkeit in unserem Land. Leistungsfähige
  digitale Infrastrukturen sind die Grundlage für eine moderne und resiliente Gesellschaft
  sowie eine zukunfts- und wettbewerbsfähige deutsche Wirtschaft. Deshalb war die
  Novellierung an dieser Stelle auch notwendig und wurde so beschlossen. Wie Sie wissen,
  steht der heutige Tag auch ganz im Zeichen der Luft- und Raumfahrt. Heute wird nämlich
  die ILA eröffnet, an der in Kürze auch der Bundeskanzler und weitere Ministerinnen
  und Minister teilnehmen werden. Auch das Bundeskabinett hat sich heute in seiner
  Sitzung mit der Luft- und Raumfahrt beschäftigt. Dort wurde heute eine neue Luftfahrtstrategie
  beschlossen. Der Bundeskanzler und auch Ministerin Reiche und Minister Schnieder
  werden sich auf der ILA gleich sicherlich auch dazu äußern. Deshalb halte ich mich
  hier bezüglich dieser sehr umfassenden Strategie für den Moment kurz. Ziel der neuen
  Strategie ist es, Wettbewerbsfähigkeit und Innovation, Souveränität und Resilienz
  sowie Nachhaltigkeit in der Luftfahrt zu fördern, in der nächsten Dekade und auch
  darüber hinaus. Die Strategie greift dazu den Auftrag des Koalitionsvertrags auf
  und unternimmt erstmals einen Gesamtansatz, der die Luftfahrt- und Luftverkehrswirtschaft
  mit dem zivilen und militärischen Flugzeugbau am Standort Deutschland zusammen denkt.
  Deutschland war immer eine weltweit führende Luftfahrtnation. Die Luft- und Raumfahrtindustrie
  ist eine industrielle Schlüsselbranche für Deutschland, der Luftverkehr zentral
  für die Mobilität von Menschen und Gütern. Gerade die Luft- und Raumfahrtindustrie
  zeigt, dass Deutschland Innovation und Wachstum kann. Im letzten Jahr ist die Beschäftigtenzahl
  in der Branche um acht Prozent gewachsen, und es gab eine Umsatzsteigerung um 19 Prozent
  auf ca. 62 Milliarden Euro. In relevanten Feldern ist Deutschland technologisch
  führend, vor allem in der Triebwerkstechnologie, im Satellitenbau, unter anderem
  auch durch den Einsatz von Innovationen wie Quantencomputing. Darauf aufbauend sieht
  die Strategie eine Vielzahl von Handlungsansätzen vor, von der Stärkung der Wettbewerbsfähigkeit
  des Luftverkehrs über neue Ansätze in der militärischen Beschaffung bis hin zur
  strategischen Neuausrichtung der Forschungsförderung. Wichtig ist nun die Umsetzung
  der Luftfahrtstrategie. Die Bundesregierung wird eine Steuerungsgruppe einsetzen,
  die die Umsetzung vorantreibt und begleitet. Ein weiterer Beschluss, über den ich
  kurz berichten möchte: Die Bundesregierung hat heute den Entwurf eines Abkommens
  mit der Regierung der Republik Polen über die Zusammenarbeit im Verteidigungsbereich
  beschlossen. Beide Staaten bekräftigen darin die Verpflichtung zum gegenseitigen
  Beistand im Falle eines Angriffes von außen gemäß Artikel 5 des NATO-Vertrags und
  Artikel 42 (7) des EU-Vertrags. Das Abkommen legt umfangreiche Felder der Zusammenarbeit
  fest, unter anderem die Weiterentwicklung der Streitkräfte, Erfahrungs- und Personalaustausch,
  gemeinsame Übungen sowie das Schließen von Fähigkeitslücken für die Landes- und
  Bündnisverteidigung. Darüber hinaus wurden strukturierte Austauschformate zwischen
  den Verteidigungsministerien hinsichtlich aller relevanten Verteidigungsfragen vereinbart.
  Das Abkommen unterstreicht die vertrauensvolle Beziehung zu unserem Nachbarn Polen
  und die enge innereuropäische Zusammenarbeit für Frieden, gemeinsame Sicherheit
  und Stabilität. Ich habe eine Lernfrage, weil Sie, (was die Modernisierung des Schiedsverfahrensrechts
  angeht,) Schriftform gegen Textform abgegrenzt haben. Ich dachte immer, Schriftform
  sei eine Textform. Dabei kann sicherlich das federführende BMJV weiterhelfen. Nein,
  im Rechtssinn sind das zwei unterschiedliche Dinge. Die Textform ist zum Beispiel
  auch durch eine E-Mail erfüllt, und die Schriftform muss sozusagen auf Papier handschriftlich
  unterschrieben sein. Mit Textform ist hier also eine Textform gemeint, die über
  schriftlich niedergelegte Texte hinausgeht, richtig? Mit Textform ist eben eine
  leichtere Formvorgabe gemeint. Die Schriftform ist anspruchsvoll und heutzutage
  nicht mehr so richtig zeitgemäß, weil man dabei handschriftlich unterschreiben muss,
  und die Textform ist eben auch erfüllt, wenn man zum Beispiel einfach in einer E-Mail
  festhält, worauf man sich verständigt hat. Ich bin jetzt nicht sicher, wer zuständig
  ist, aber Deutschland liegt ja beim Glasfaserausbau im europäischen Vergleich im
  hinteren Mittelfeld. Können Sie uns einmal sagen, wie der aktuelle Stand in Sachen
  Glasfaserabdeckung in Deutschland ist und wann die Bundesregierung mit einer quasi
  einhundertprozentigen Abdeckung rechnet? Sehr gerne. Wir hatten erst letzte Woche
  unsere aktuellen Ausbauzahlen vorgestellt. Mittlerweile liegen wir bei rund 50 Prozent
  Glasfaserabdeckung in Deutschland. Unser Ziel ist hier, die Rahmenbedingungen auch
  mit der TKG-Novelle heute weiter zu verbessern, um den Glasfaserausbau zu beschleunigen.
  Deutschland hat ja hierbei auch eine besondere Stellung in Europa inne, weil wir
  ausgebaute Kabelnetze haben, weil wir auch leistungsfähige Kupfernetze haben. Aber
  die Zukunft ist die Glasfaser. Das Ziel ist ein flächendeckender Ausbau, so schnell
  wie möglich. Deswegen hat ja auch diese Bundesregierung die Förderung des Glasfaserausbaus
  in Regionen, in denen sich das für die Wirtschaft nicht rechnet, fortgesetzt. Wir
  wollen in dieser Legislaturperiode große Fortschritte machen. Das Ziel ist, glaube
  ich, auf mehr als 80 Prozent zu kommen. Eine konkrete Jahreszahl können wir Ihnen
  nicht nennen. Gestern hat ja auch der Telekommunikationsrat getagt, und für Europa
  ist im Digital Networks Act festgelegt, dass 2039 ein Zieljahr ist, bis zu dem die
  Kupfernetze spätestens abgeschaltet werden sollen. In der vergangenen Woche gab
  sich die Bundesregierung im Hinblick auf das sich abzeichnende FCAS -Scheitern noch
  sehr hoffnungsvoll. Nun ist auch diese Hoffnung gescheitert. Wie sieht jetzt die
  Strategie im Hinblick auf ein neu zu entwickelndes Kampfflugzeug aus? Ja, Sie haben
  es richtig dargestellt: Präsident Macron und Bundeskanzler Merz sind zu der geteilten
  Einschätzung gelangt, dass die Unternehmen beim Bau eines gemeinsamen Kampfflugzeuges
  im Rahmen dieses FCAS-Projekts nicht zusammenfinden. Diese Realität erkennen wir
  an und haben jetzt einfach in diesem Sinne auch eine wirklich sehr rationale Sachentscheidung
  getroffen. Der eigentliche Kern von FCAS soll als europäisches System der Systeme
  fortgeführt werden. Dies ist gewissermaßen das Nervensystem, das Flugzeuge, Drohnen
  und andere Bestandteile zu einem integrierten Ganzen vernetzt. Es geht nun jetzt
  beim deutsch-französischen Ministerrat, der im Juli ansteht, darum, dass beide Verteidigungsministerien
  dann auch einen gemeinsamen Arbeitsplan zur verteidigungsindustriellen Zusammenarbeit
  entwickeln, ihn formulieren und dann fortschreiben, auch konzentriert auf wenige
  realistische und relevante Vorhaben. Ich will es einmal so beschreiben: Wenn eine
  Tür zugeht, dann gehen häufig auch andere Türen auf. Wir werden jetzt intern innerhalb
  der Regierung, aber auch mit unseren Partnern in Frankreich, aber auch im europäischen
  Kontext und sicherlich auch mit der Industrie beraten, welchen Weg wir hier weiter
  einschlagen. Das hat eine hohe Priorität. Wir sind auch optimistisch, dass wir in
  der Zukunft dann zu weiteren Schritten und auch Entscheidungen kommen werden. Nun
  haben Sie nicht erst in der vergangenen Woche, sondern auch in den Wochen davor,
  als ein Scheitern von FCAS immer wahrscheinlicher wurde, darauf beharrt, dass man
  nach wie vor optimistisch sei, und Fragen nach der Entwicklung von Alternativen
  wurden nicht beantwortet. Können Sie jetzt sagen, ob tatsächlich aber schon an Alternativen
  gearbeitet wurde, während Sie nach vorne hin immer noch Optimismus verbreitet haben?
  Erst einmal haben wir jetzt diese Entscheidung so kommuniziert, wie sie dann auch
  getroffen wurde. Noch einmal: Ich glaube, das ist in Abwägung aller Informationen,
  die wir haben, und auch aller Gespräche, die wir in den vergangenen Wochen und Monaten
  geführt haben, rational die richtige Sachentscheidung. Alles Weitere werden wir
  jetzt entsprechend vorbereiten und die Gespräche führen. Vielleicht will das BMVg
  auch schon ein bisschen konkreter etwas ergänzen. Genau, ich kann ein bisschen ergänzen.
  Bundesminister Pistorius hat sich gestern in zwei Statements dazu geäußert. Er hat
  betont, dass wir uns ‑ er meinte sogar wörtlich, seit Monaten ‑ im Gespräch befinden,
  in ‑ „Sondierung“ will ich es jetzt nicht nennen ‑ der Analyse dessen befinden,
  welche alternativen Möglichkeiten dann gegebenenfalls betrachtet werden müssen.
  Das Kampfflugzeug im Rahmen von FCAS, das eigentliche Kampfflugzeug der sechsten
  Generation, ist ja nur ein Baustein. Wenn wir jetzt zusammen mit Frankreich das
  „System of Systems“, die Cloud darum herum und weitere Anteile gemeinsam entwickeln,
  dann bleibt natürlich weiterhin ‑ damit haben Sie vollkommen recht ‑ offen, wie
  wir mit dem Kampfflugzeug der sechsten Generation umgehen. Wir haben jetzt die F-35
  als Lösung, die den Tornado ablösen wird. Das ist die fünfte Generation. Also kann
  dieses Luftfahrzeug auch nur im Rahmen der fünften Generation eingesetzt werden.
  Es bleibt also weiterhin die Frage der sechsten Generation. Herr Pistorius hat gestern
  mehrere Optionen genannt, die jetzt quasi betrachtet werden. Eine Option war zum
  Beispiel, dass man sich im europäischen Rahmen natürlich mit Partnern austauscht
  oder dass man alternativ schon bestehende Kooperationen für den Einstieg betrachtet.
  Aber das sind Punkte, die jetzt noch zu weit gehen, für die es zu früh ist. Diese
  Sondierungen, sage ich einmal, werden jetzt intern weitergeführt. Das machen unsere
  Experten der Fähigkeitsentwicklung. Natürlich bietet diese Entscheidung jetzt auch
  noch einmal eine Chance ‑ da bin ich ganz ehrlich ‑, die rasanten technologischen
  Entwicklungen und Betrachtungen der letzten Jahre noch einmal mit in die Konzeptstudie
  einfließen zu lassen. Natürlich war FCAS in einem Stadium, in dem man das noch hätte
  einfließen lassen können. Aber wenn man noch einmal die Grundidee betrachtet, wenn
  man betrachtet, was dieses Luftfahrzeug leisten soll, und wenn man auch betrachtet,
  welche Innovationszyklen wir aktuell haben und wie eine Architektur gegebenenfalls
  auch offen gestaltet werden muss, um in der Entwicklung bzw. in der Fertigung weiter
  reagieren zu können, dann kann man das jetzt natürlich noch einmal in diesen Prozessschritt
  einfließen lassen. Ich empfehle auch das Interview mit dem Inspekteur der Luftwaffe
  heute im „Handelsblatt“, in dem er noch einmal genau auf diesen Punkt eingegangen
  ist, welche Chancen auch jetzt noch einmal bestehen. Auf der ILA wollen acht renommierte
  deutsche Unternehmen im Verteidigungssektor, darunter Aerospace & Defense, aber
  auch MBDA, Hensoldt und andere, den Vorschlag unterbreiten, selbst einen neuen deutschen
  Kampfjet der sechsten Generation zu entwickeln, also quasi als deutsches Konsortium.
  Wie steht die Bundesregierung und wie steht das Verteidigungsministerium dazu? Ich
  kann vielleicht anfangen. Wir haben das natürlich zur Kenntnis genommen. Ich würde
  das hier jetzt im Detail nicht weiter kommentieren. Wir haben gerade darauf hingewiesen,
  dass wir dann auch weitere Gespräche innerhalb der Bundesregierung, mit unseren
  Partnern, mit Frankreich, innerhalb Europas, aber natürlich auch mit der Industrie
  führen werden. Ganz allgemein kann ich natürlich sagen, dass wir ein Interesse an
  europäischen Lösungen haben, auch, was die weiteren Schritte angeht. Aber noch einmal:
  Den konkreten Vorschlag, den wir da auch wahrgenommen haben, würden wir an dieser
  Stelle noch nicht kommentieren. Vielleicht noch ein Punkt von mir, auch hier mit
  Bezug zu Minister Pistorius‘ Äußerungen von gestern: Er hat natürlich ausdrücklich
  begrüßt, dass eine wichtige Rolle der deutschen Sicherheits- und Verteidigungsindustrie
  und der deutschen Luft- und Raumfahrtindustrie natürlich zu begrüßen ist. Ich meine,
  wir reden ja von Souveränität. Wir reden davon, dass wir Hochtechnologie auch in
  Deutschland halten wollen, auch das Knowhow, auch das Wissen darüber, auch über
  die nächsten Jahrzehnte hinweg. Egal, wie das zukünftige Konstrukt aussieht, und
  es wurde ja betont, dass eine europäische Lösung eine der Optionen ist, wollen wir
  natürlich, dass die deutsche Luft- und Raumfahrtindustrie sich hier einbringt und
  ein wichtiger Pfeiler ist. Der Bundesverteidigungsminister hat gestern mehrere Optionen
  für den Nachfolger des Kampfjets erwähnt. Es war von vier Optionen die Rede, aber
  über die vierte hat er gesagt, darüber wolle er jetzt nicht reden. Können Sie irgendetwas
  Näheres dazu sagen, irgendwelche Erläuterungen, worum es eigentlich geht, auch „unter
  drei“? Nein, das kann ich leider nicht tun. Ich halte mich diesbezüglich an das,
  was der Minister gestern gesagt hat. Die Ideen dazu werden jetzt betrachtet, und
  die Analyse läuft. Das ist der Stand, den wir haben und den der Minister gestern
  genannt hat. Gibt es bei der Bundesregierung in diesem Moment eine bevorzugte Option?
  Der Regierungssprecher hat sich gerade zu den Optionen geäußert, die wir als vorteilhaft
  erachten würden. Dem habe ich nichts hinzuzufügen. Ich möchte auch noch einmal sagen:
  Wir haben jetzt eine Entscheidung getroffen. Wie gesagt, eine Tür geht zu, und damit
  gehen dann auch neue Türen auf. Das werden wir jetzt in aller Sorgfalt, aber auch
  mit dem notwendigen Tempo beraten und darüber dann natürlich auch transparent informieren.
  Herr Müller, Sie haben es schon ein bisschen angedeutet. Ist das Problem nicht,
  dass angesichts der rasanten Entwicklung in der Kriegsführung, wie wir sie im Moment
  auch in der Ukraine sehen, generell das Problem besteht, dass der Planungs- und
  Realisierungszeitraum für solche Projekte viel zu lang ist? Wenn das Flugzeug endlich
  fliegt, dann haben wir ein ganz anderes Szenario auf dem „battlefield“, wie man
  so schön sagt. Richtig ist, dass Innovationszyklen bei Großwaffensystemen und speziell
  im Bereich luftgestützter Systeme nicht mit Innovationszyklen zum Beispiel im Bereich
  von Drohnen zu vergleichen sind, wie wir jetzt in der Ukraine sehen, wo wir Innovationszyklen
  von wenigen Wochen haben. Sie wissen, dass in der Welt aktuell mehrere „sixth-generation
  fighter“ entwickelt werden. Vor dieser Herausforderung stehen alle Industrien und
  alle Konsortien, die jetzt daran arbeiten. Bei der sechsten Generation geht es ja
  nicht darum, ein paar Teile aus dem Regal zu nehmen und sie zu „refurbishen“ oder
  zu schauen, was man ein bisschen besser machen kann, sondern es geht um Technologien,
  die es noch gar nicht gibt. Das ist der Hauptauftrag. Wenn wir über die fünfte Generation
  reden, dann reden wir von F-35 und Co. Wenn wir über die sechste reden, dann geht
  es um eine ganze Menge an Entwicklungsarbeit, Forschung und Innovation, die da hineinzustecken
  sind. Bei allen Systemen, die man mit Weitblick entwickeln will, steht man vor der
  Herausforderung, dass man ja erst einmal ein Design entwickeln will: Wohin will
  man? ‑ Dann muss es entwickelt werden. In der Zwischenzeit wird sich die Welt immer
  weiterdrehen. Ja, es ist also eine Herausforderung, wie ich gesagt habe. Das muss
  man jetzt beim Aufstellen des Konzepts berücksichtigen, egal was man macht. Dazu
  gehören natürlich auch die letzten viereinhalb Jahre, das Lernen aus der Situation
  in der Ukraine und die Frage, wie wir mit Innovationszyklen umgehen. Diesbezüglich
  ist in der Bundeswehr ja auch schon einiges passiert. Natürlich wird das mit einfließen,
  um das möglichst so offen zu gestalten, dass man in den Vierzigerjahren nicht veraltet
  sein wird. Ich stimme Ihnen vollkommen zu, das ist eine der Herausforderungen. Vor
  ihr stehen aber alle Nationen, die jetzt an diesem System arbeiten. Vielleicht auch
  da noch, wenn ich darf, eine kurze Ergänzung: Wir sind natürlich sehr stark auf
  das Flugzeug fokussiert gewesen; das verstehe ich auch. Beim eigentlichen Kern von
  FCAS geht es um genau solche Vernetzungsfragen, um gemeinsame europäische Lösungen
  in Richtung von Cloud etc., die natürlich enorm wichtig sind und die wir dementsprechend
  jetzt auch weiter beraten und verfolgen werden. Wird Deutschland darauf bestehen,
  in einem zukünftigen Konsortium die Führung oder zumindest eine führende Rolle zu
  übernehmen? Wie gesagt, würde ich an der Stelle nicht über weitere Schritte spekulieren.
  Noch einmal: Wir haben jetzt eine Sachentscheidung getroffen. Das war in den vergangenen
  Monaten ja auch hier immer wieder einmal Thema. Es hat uns natürlich auch in der
  Bundesregierung sehr stark beschäftigt. Jetzt werden wir die nächsten Schritte gemeinsam
  einleiten. Noch einmal: Spekulieren oder vorgreifen möchte ich an der Stelle nicht.
  (zum Treffen der Bundesregierung mit Arbeitgeberverbänden und Gewerkschaften zu
  anstehenden Reformvorhaben ) Die erste Frage: Was sind denn die Erwartungen an heute
  Abend? Die zweite Frage: Was erwartet die Regierung ganz grundsätzlich von den Sozialpartnern
  im Reformprozess? Da die Frage recht allgemein war, kann ich vielleicht allgemein
  antworten, dass wir in der Tat heute Abend mit Gewerkschaften und mit Wirtschaftsverbänden
  zusammenkommen werden und dort den Gesprächsfaden, den wir in unterschiedlichen
  Konstellationen auch in den vergangenen Monaten schon hatten, aufgreifen und fortführen.
  Wir haben uns das Ziel gesetzt, zuzuhören und auch die Partizipation der Sozialpartner
  in diesem Prozess hin zu Reformen zu ermöglichen. Aus unserer Sicht ist es wichtig,
  dabei wirklich noch einmal abzugleichen, ob wir eigentlich das gleiche Problemverständnis
  und die gleichen Grundprämissen für die vor uns liegenden Aufgaben haben und ob
  am Ende auch Reformen in einem Korridor der gemeinsamen Sicht stattfinden können.
  Denn das ist, denke ich, schon wichtig. Wir nehmen ja durchaus wahr, dass auch in
  der Gesellschaft gerade intensive Debatten darüber stattfinden. Wir haben immer
  gesagt: Wir brauchen strukturelle Reformen, nicht nur für die wirtschaftliche Wettbewerbsfähigkeit,
  sondern auch für die Zukunft unserer Sozialsysteme. ‑ Das treibt viele Menschen
  um. Deshalb ist es, denke ich, der richtige Zeitpunkt, an dieser Stelle mit Arbeitgebern
  und Gewerkschaften heute Abend genau diesen Abgleich vorzunehmen. Was genau ist
  dann Ihre Erwartung an heute Abend? Ich denke, es wäre schon ein wichtiger Fortschritt
  ‑ aber das muss natürlich das Gespräch zeigen; dem kann ich nicht vorgreifen ‑,
  wenn wir ein gemeinsames Verständnis der Herausforderungen und auch gemeinsam Ansätze
  für die nächsten Schritte fänden. Wenn das heute gelänge, dann wäre das, denke ich,
  sehr gut und hilfreich für die weitere Debatte. Noch einmal: Der Dialog mit den
  betroffenen Akteuren war in den vergangenen Wochen und Monaten sehr intensiv, und
  er wird sicherlich auch in Zukunft in welcher Form auch immer weitergeführt. Aber
  das ist deshalb wichtig. Am Ende geht es natürlich auch darum, dass wir die Aufgaben,
  die wir vor uns haben, gemeinsam angehen, und dafür sind Gewerkschaften und Arbeitgeber
  natürlich ganz zentrale Akteure. Vielleicht einmal zur Klarstellung: Wir hatten
  den Kanzler am Wochenende und auch den Regierungssprecher am Montag eigentlich so
  verstanden, dass die Erwartung bestehe, dass die Sozialpartner heute Abend schon
  konkrete Vorschläge vorlegten. Haben wir das alles falsch verstanden? Ich habe ja
  gerade gesagt, dass ein gemeinsamer Abgleich der Herausforderungen und auch Lösungswege
  natürlich sehr wichtig ist. Natürlich wäre es dafür hilfreich, wenn es hier auch
  zu gemeinsamen Positionen käme. Aber noch einmal: Den Gesprächen kann ich nicht
  vorgreifen; sie finden erst heute Abend statt. Wird dieser Wunsch auch danach fortbestehen?
  Ist die Strategie also weiterhin, die Sozialpartner dazu zu bewegen, sich selbstständig
  zu einigen? Noch einmal: Das müssen am Ende ein Stück weit auch die Gespräche zeigen,
  die heute Abend erfolgen. Dafür ist das Gespräch ja auch da. Noch einmal: Es war
  uns sehr wichtig, mit Arbeitgebern und Gewerkschaften frühzeitig zusammenzukommen,
  gemeinsame Erwartungen abzugleichen, auch ein gemeinsames Bild dessen zu entwickeln,
  wohin wir gemeinsam wollen, und zu schauen, ob das vielleicht auch zusammenpasst.
  Noch einmal: Dafür gibt es diesen Austausch heute. Es gab, wie gesagt, bereits in
  der Vergangenheit Austausch, und es wird mit Sicherheit auch in Zukunft weiterhin
  einen Austausch in unterschiedlichen Formaten mit diesen beiden wirklich zentralen
  Akteuren für unseren Standort und für unser Land geben. Herr Meyer, was liegt mit
