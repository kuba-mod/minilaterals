date: '2026-06-11'
type: press_release
source_name: german_chancellery
title: Rede des Bundeskanzlers beim Tag der Familienunternehmen „Basis unserer Wirtschaft“
text: '„Unser Land hat einen guten Platz in der Welt von morgen", betonte Kanzler
  Merz in seiner Rede. „ Familienunternehmen sind zum Teil seit Jahrhunderten die
  Basis unserer Wirtschaft", sagte Bundeskanzler Friedrich Merz beim Tag der Familienunternehmen
  in Berlin. In seiner Rede thematisierte er zunächst die Herausforderungen, vor denen
  die Wirtschaft stehe: zum einen die geopolitische Lage und die Friedlosigkeit, zum
  anderen höhere Preise für Energie und Importe, höhere Zölle, unsichere Lieferketten,
  Handelsrestriktionen. „Unser Ziel ist klar: Unsere Wirtschaft muss stärker funktionieren,
  muss widerstandsfähiger, muss flexibler und in Kernbereichen auch strategisch unabhängiger
  werden“, so Merz weiter. Um das zu erreichen, habe die Bundesregierung bereits einige
  Reformen auf den Weg gebracht. Dazu zählen laut Kanzler Merz die steuerlichen Entlastungen
  für Unternehmen, eine pragmatische und realistische Energiepolitik sowie die Modernisierung
  und Digitalisierung von Staat und Verwaltung. Zum Tag der Familienunternehmen hat
  die Stiftung Familienunternehmen und Politik eingeladen. Rund 90 Prozent aller deutschen
  Unternehmen sind Familienunternehmen. Sie erzielen etwa 37 Prozent aller Umsätze
  in Deutschland, über die Hälfte aller sozialversicherungspflichtig Beschäftigten
  arbeiten dort. sehr geehrte Familienunternehmerinnen und -unternehmer, herzlichen
  Dank für die freundliche Begrüßung – schön, dass Sie durchgehalten haben! Ich freue
  mich, dass ich heute die Gelegenheit habe, zu einem nicht ganz einfachen Zeitpunkt
  kurz vor der parlamentarischen Sommerpause – die übrigens keine Sommerpause ist,
  sondern eine sitzungsfreie Zeit – hier zu sein. Wir werden auch über den Sommer
  einiges weiter bearbeiten und vorbereiten, aber darauf komme ich später noch zurück.
  Es sind in der Tat entscheidende Wochen und Monate, und Sie stellen zu Recht die
  Frage: Wo wollen wir hin, wie viel Veränderung, die so dringend notwendig ist, trauen
  wir uns zu, und was wollen wir zusammen in Deutschland erreichen? Nun, meine Damen
  und Herren, Sie haben es möglicherweise mitbekommen: Ich habe heute Morgen im Deutschen
  Bundestag zur Vorbereitung des Europäischen Rates und des G7 -Treffens in der nächsten
  Woche eine Regierungserklärung abgegeben, in der ich die Lage für unser Land beschrieben
  habe und die Aufgaben ebenfalls zu beschreiben versucht habe. Die Analyse kennen
  Sie, und gerade Sie haben es nicht nötig, dass ich sie hier in Länge wiederhole.
  Unsere wirtschaftliche Entwicklung stagniert seit dem Jahr 2019, und für die kommenden
  Jahre sagt man uns, wenn sich nichts ändert, lediglich ein Potenzialwachstum von
  unter einem Prozent voraus. Die geopolitische Lage, die Friedlosigkeit der Welt,
  ist einer der Gründe, die zu dieser Lage geführt haben. Für eine export- und fertigungsorientierte
  Volkswirtschaft wie die Bundesrepublik Deutschland, für unsere globalen Unternehmen,
  von denen ja auch viele hier im Raum vertreten sind, ist dies schon Herausforderung
  genug. Die globalen Umwälzungen, die wir erleben, haben eine besonders gefährliche
  Wirkung für ein Land wie Deutschland. Unser Geschäftsmodell, das wir über Jahre
  und Jahrzehnte hatten, besteht nicht mehr. Dieses deutsche Geschäfts- und Exportmodell,
  das uns so lange Wachstum und Wohlstand gebracht hat, steht infrage. Höhere Preise
  für Energie und Importe, höhere Zölle, unsichere Lieferketten, Handelsrestriktionen,
  all das trifft Sie und trifft unser Wirtschaftsmodell hart. Es gibt aber Regionen,
  Unternehmen und Branchen, die auch in diesen schwierigen Zeiten Wachstum verzeichnen.
  Dabei spreche ich nicht von Sonderfällen außerhalb der Bundesrepublik Deutschland
  und der Europäischen Union, etwa von Taiwan, das einen beispiellosen KI -Boom verzeichnet.
  Nein, es gibt auch in unserer unmittelbaren Nachbarschaft Länder wie Polen und Dänemark,
  die stark wachsen. Wir haben in Deutschland das Problem, dass sich neben den geoökonomischen
  Schocks und den globalen Transformationsprozessen überfällige Strukturreformen seit
  Jahren, wenn nicht seit Jahrzehnten aufgestaut haben. Wir haben begonnen, diesen
  Stau aufzulösen, und wir haben begonnen, wieder Möglichkeiten zu eröffnen – auch
  für Unternehmen, wie Sie es sind. Unser Ziel ist klar: Unsere Wirtschaft muss stärker
  funktionieren, muss widerstandsfähiger, muss flexibler und in Kernbereichen auch
  strategisch unabhängiger werden, damit wir wieder in den Wachstumsmodus kommen und
  Krisen besser abfedern können. Um dieses Ziel zu erreichen, haben wir in der Bundesregierung
  schon einiges getan. Wahr ist auch: Vielen geht es zu langsam – Ihnen und mir auch.
  Ich möchte aber zunächst das Positive nennen, das in diesen Tagen vielleicht ein
  wenig zu kurz kommt. Es ist nämlich einiges geschehen: Wir haben – Sie haben es
  dankenswerterweise gesagt, Herr Stoll – mit der Wiederherstellung unserer Verteidigungsfähigkeit
  begonnen. Meine Damen und Herren, das ist nicht trivial. Wir sehen das erste Mal
  seit Jahrzehnten, dass wir uns nun wirklich wieder verteidigen können müssen, und
  wir haben an diesem Auftrag so hart gearbeitet wie wahrscheinlich kein zweites Land
  in der gesamten NATO . Wir haben steuerliche Entlastungen für Unternehmen beschlossen.
  Wir haben eine pragmatische und realistische Energiepolitik eingeleitet, mit der
  wir die hohen Preise in den Griff bekommen wollen. Wir folgen den Leitlinien einer
  ambitionierten Technologiepolitik. Meine Damen und Herren, die Hightech -Agenda,
  die wir beschlossen haben und die wir umsetzen, zeigt auch die ersten Wirkungen.
  Wir treiben die Modernisierung und Digitalisierung von Staat und Verwaltung voran.
  Wir sind hier in kurzer Zeit schon viel weiter, als es oftmals bisher gesehen wurde
  und ganz objektiv gesehen werden kann. Wir wollen die digitale Work-and-Stay -Agentur,
  also eine zentrale IT -Plattform, als einheitlichen Kontaktpunkt für ausländische
  Fachkräfte. Das klingt so einfach, aber wir wollen auf dieser digitalen Plattform
  sämtliche Genehmigungsverfahren, die Arbeitserlaubnis, die Aufenthaltserlaubnis,
  die Anerkennung der Berufsabschlüsse digital und einheitlich ermöglichen, sodass
  sowohl Arbeitskräfte, die nach Deutschland kommen wollen, als auch Sie, die Unternehmen,
  die Arbeitskräfte von außen holen wollen, auf einer einfachen digitalen Plattform
  alle Informationen, alle Entscheidungen abrufen können. Dahinter liegt ein hochkomplexes
  System von sehr unterschiedlichen Zuständigkeiten zwischen Bund, Ländern und Gemeinden
  sowie zum Teil auch den Industrie- und Handelskammern, die ja zum Teil auch für
  die Anerkennung der Berufsabschlüsse zuständig sind. Dies ist wahrscheinlich das
  größte IT -Vorhaben, das wir für die gesamte Wahlperiode auf den Weg gebracht haben.
  Meine Damen und Herren, wir haben ein neues Baugesetzbuch verabschiedet, das die
  Grundlage für vereinfachtes und beschleunigtes Bauen sein soll. Wir wollen möglichst
  schnell auch den Gebäudetyp E ermöglichen, also einfaches Bauen mit Standards, die
  wieder einfacher sind, damit es auch preiswerter wird für junge Familien. Wir haben
  die ersten Beschlüsse hin zu einem neuen Rentensystem bereits gefasst. Diejenigen,
  die länger arbeiten wollen, können das seit dem 1. Januar 2026 tun und bis zu 24.000
  Euro im Jahr steuerfrei hinzuverdienen. Wir haben bereits entschieden – und das
  wird am 1. Januar 2027 in Kraft treten –, den Vermögensaufbau in privater Hand neu
  auszurichten, und zwar mit einem Instrument, das nicht mehr durch Garantien abgesichert
  werden muss und rein kapitalmarktorientiert ist. Das bedeutet eine echte Umkehr
  in der Vermögensbildung in Deutschland. Wir sind auf dem Weg hin zu einer großen
  ersten Gesundheitsreform, die noch vor den parlamentarischen Sommerferien verabschiedet
  werden soll. Eine zweite Strukturreform soll im Herbst folgen. Auch der Reformprozess,
  der im letzten halben Jahr auf der europäischen Ebene an Fahrt aufgenommen hat,
  ist ganz wesentlich auf unsere und zum Teil auch meine persönlichen Initiativen
  zurückzuführen. Ja, ich bin sehr viel und sehr engagiert in dieser Europäischen
  Union unterwegs. Aber, meine Damen und Herren, ich tue das nicht, weil ich immer
  schon einmal in viele Länder Europas reisen wollte, sondern ich tue das, weil es
  meine feste Überzeugung ist, dass ein Land wie Deutschland ein überdurchschnittlich
  hohes Interesse daran haben muss, dass diese Europäische Union gut funktioniert,
  dass dieser europäische Binnenmarkt mit 450 Millionen Einwohnern sein ganzes Potenzial
  ausschöpfen kann, dass wir auf der Welt auch als ein Wirtschaftsraum angenommen
  werden, in den es sich zu investieren lohnt und der auch mit seiner Macht als Konsumraum
  auf der Welt Regeln mitbestimmt, bis hin zu den Handelsabkommen, die wir abgeschlossen
  haben, die in Kraft getreten sind und die zum Teil schlussverhandelt sind. Die Schlussfolgerungen
  des letzten Europäischen Rates vom März und der im April unterzeichnete entsprechende
  Fahrplan geben unserer Wettbewerbsagenda jetzt mit ganz konkreten Initiativen und
  klaren Zeitvorgaben eine Kontur. Ich dringe in Brüssel darauf, dass weite Teile
  dieses Fahrplans noch in diesem Jahr, spätestens bis Mitte des nächsten Jahres umgesetzt
  werden. Meine Damen und Herren, wir haben das, was Enrico Letta zur Vollendung des
  europäischen Binnenmarktes aufgeschrieben hat, und das, was Mario Draghi zur Wettbewerbsfähigkeit
  der Europäischen Union aufgeschrieben hat, nicht in den Archiven der EU-Kommission
  verschwinden lassen, sondern haben es zum Gegenstand einer ganztägigen Klausurtagung
  des Europäischen Rates am 12. Februar in Alden Biesen in der Nähe von Lüttich gemacht.
  Wir haben mit beiden Autoren ausführlich über ihre Vorschläge gesprochen und haben
  das zum Gegenstand der Agenda für Binnenmarkt und Wettbewerbsfähigkeit der Europäischen
  Union gemacht. Ich habe die Handelsabkommen genannt. Auch hier schreitet Europa
  mit großen Schritten voran – so großen Schritten, wie wir sie seit Jahrzehnten bei
  Handelsabkommen nicht gemacht haben. Wir machen diese Handelsabkommen mit den MERCOSUR
  -Staaten, mit Mexiko, mit Indonesien, mit Malaysia, mit Australien und mit vielen
  anderen Ländern auf der Welt nicht nur, um den Handel mit diesen Ländern fortzuführen
  und zu verbessern, Grenzen zu öffnen und Zölle zu senken. Wir machen das mit diesen
  Ländern auch, um denen, die mit autoritären Regierungen die Welt neu ordnen wollen,
  etwas entgegenzusetzen, das da heißt: Wir stehen zur regelbasierten Ordnung, zum
  Freihandel, zu den Regeln der Welthandelsorganisation. Wir wollen diesen autoritären
  Systemen etwas entgegensetzen, was immer unser Modell war, nämlich offene Märkte,
  freien Handel und möglichst viel Wettbewerb auf der Welt, meine Damen und Herren.
  Deshalb machen wir das. Deshalb setze ich mich auch persönlich so sehr für diese
  Abkommen ein. Trotzdem wird Sie das alles zu Recht nicht zufriedenstellen. Unter
  anderem deshalb haben wir gestern Abend mehr als drei Stunden mit Vertreterinnen
  und Vertretern der Gewerkschaften und der Wirtschafts- und Arbeitgeberverbände zusammengesessen –
  Rainer Dulger war dabei und der Bruder von Frau Leibinger-Kammüller ebenfalls. Wir
  haben zu vier Themenfeldern in, wie ich finde, sehr konstruktiver und konzentrierter
  Atmosphäre diskutiert: die Situation am Arbeitsmarkt, die Lage der Sozialversicherungen,
  die überbordende Bürokratie und die steuerlichen Belastungen. Meine Damen und Herren,
  ich darf dies hoffentlich auch für diejenigen, die dabei waren, sagen: Hier wächst
  Vertrauen, Offenheit und auch Bereitschaft zur gemeinsamen Veränderung. Denn nur
  wenn wir miteinander sprechen, können wir die großen Reformen umsetzen, die wir
  noch vor uns haben. Wir haben Arbeitgebern und Gewerkschaften, dem Handwerk und
  der Industrie das Angebot gemacht, dass sie unseren Reformprozess weiterhin konstruktiv
  begleiten. Auch dazu stehe ich. Sicher ist aber auch, dass am Ende die Politik entscheiden
  muss, die Regierung entscheiden muss. Wir müssen dazu noch einmal alle Kräfte mobilisieren.
  Wir sehen immer noch sehr viel Zaghaftigkeit, was die notwendigen Reformen betrifft.
  Meine Damen und Herren, es ist so – das sage ich ohne jede Larmoyanz –: Eine wohlhabende
  Gesellschaft zu verändern, ist viel schwieriger, als ein Land nach Krieg und Zerstörung
  wieder aufzubauen. Das, was wir uns vorgenommen haben umzusetzen, erfordert Veränderungsbereitschaft
  aus dem Wohlstand heraus bzw. vielleicht aus einer Wohlstandsillusion heraus. Es
  wird sich aber tatsächlich als eine Illusion erweisen, wenn wir jetzt nicht handeln
  und die nötigen Veränderungen mit dieser Koalition auf den Weg bringen. Ich kenne
  diesen Druck, ich kenne den Zeitdruck, ich kenne die Notwendigkeit der Veränderung.
  Aber es gibt keinen Grund, meine Damen und Herren, dass wir als Land, als Gesellschaft
  nicht wieder an uns selbst glauben. Es gibt keinen Grund, daran zu zweifeln, dass
  unser Land sich wieder einen vorderen Platz in dieser sich verändernden Welt erarbeiten
  kann. Es mag sein, dass viele an alten Sicherheiten festhalten wollen, die längst
  nicht mehr wirken. Es handelt sich eben um eine Illusion. Das ist nicht der Weg.
  Wir müssen die Fesseln lösen. Wirtschaft – auch das gehört dazu – ist kein Nullsummenspiel.
  Für alle, die sich aufmachen und Chancen nutzen, ist weitaus mehr drin. Lassen Sie
  mich zwei sehr positive Beispiele nennen – es gibt ja auch viele positive Beispiele –:
  Ich habe gestern hier in Berlin auf dem BER-Flughafen die diesjährige ILA , die
  Internationale Luft- und Raumfahrtausstellung, eröffnet. Vielleicht war sogar der
  ein oder andere von Ihnen aus dieser Industrie und aus dieser Branche dabei. Dieser
  Teil der Volkswirtschaft wächst in vielen Teilen der Welt und auch hier bei uns
  in Deutschland – im letzten Jahr um 19 Prozent mit 10.000 neuen Arbeitsplätzen,
  die allein in dieser Branche entstanden sind –, und dort war greifbar, wie sich
  in dieser Industrie neue Chancen, neue Wirtschaftsräume eröffnen, bis hin zum Weltraum –
  oftmals belächelt, heute verteidigungspolitisch und wirtschaftspolitisch einer der
  wichtigsten Räume. Es war eine der wichtigsten Entscheidungen, die wir zu treffen
  hatten, auch eine aktive Weltraumstrategie in der Bundesregierung umzusetzen. Ich
  nenne Ihnen ein zweites Beispiel, meine Damen und Herren: Die Hannover Messe, deren
  Partnerland in diesem Jahr Brasilien war, hat so viel Aufbruch, so viele junge Unternehmen
  und auch so viel an Forschung und Entwicklung gezeigt wie selten zuvor. Viele, die
  dort sind, wollen es einfach wissen; sie wollen jetzt vorn mit dabei sein. Auch
  das gibt mir Zuversicht. Nehmen Sie, last, but not least , die Entwicklungen bei
  den Start-ups . Im Jahr 2025 sind über 3.500 junge Unternehmen in Deutschland gegründet
  worden. Sie selbst waren auch alle einmal Start-ups , vielleicht Ihre Eltern oder
  Ihre Großeltern. Aber das Wort kannte man damals noch nicht. Nur sind aus den kleinen
  zum Teil große, weltweit führende Unternehmen geworden. Jetzt haben sich viele junge
  Menschen – es waren nicht nur junge, aber viele junge Menschen – auf den Weg gemacht,
  in Deutschland wieder Start-ups zu gründen, 3.500 im vergangenen Jahr. Das war die
  größte Zahl, die wir je gesehen haben. Es waren über 30 Prozent mehr als im Vorjahr.
  Diese meist jungen Menschen haben den Mut, etwas Neues auszuprobieren, ihr Schicksal
  auch selbst in die Hand zu nehmen, Verantwortung zu übernehmen und Risiken einzugehen.
  Meine Damen und Herren, in diesem Sinne ein Dank an diejenigen, die das tun – nicht
  nur die Jungen, aber vor allem die Jungen! Wir haben in diesem Sinne einen neuen
  Mindset . Es geht darum, dass wir jetzt wieder unseren Fähigkeiten vertrauen und
  auf diesen Standort setzen. Unser Land hat einen guten Platz in der Welt von morgen.
  Europa hat einen guten Platz in der Welt von morgen. Ich höre das häufig weit außerhalb
  der Bundesrepublik Deutschland und der Europäischen Union, manchmal mehr als im
  eigenen Land. Wir werden auf der Welt als zuverlässiger Partner und zuverlässiger
  Standort geschätzt. Wir haben immer noch ein hohes Maß an gesellschaftlicher Stabilität.
  Machen wir uns wirklich klar, wie viel es wert ist, eine Demokratie und einen funktionierenden
  Rechtsstaat zu haben. Das sind gerade auch für Sie, meine Damen und Herren, die
  Sie diese Verlässlichkeit und Stabilität brauchen, wichtige Rahmenbedingungen. Noch
  einmal: Ich weiß, dass es noch viel zu tun gibt. Sie, die Familienunternehmen, sind
  zum Teil seit Jahrhunderten die Basis unserer Wirtschaft und in unserer Wirtschaft
  die Basis für unseren Sozialstaat. Auch das gehört dazu. Als regional verwurzelte
  Familienunternehmen spielen Sie bis heute eine unverzichtbare soziale Rolle vor
  Ort. Sie engagieren sich bei Betreuung und Ausbildung bis hin zur Förderung von
  Vereinen, von Kultur, von Sport, von Ehrenamt. Sie, die Familienunternehmen, wissen,
  was Verantwortung und persönliche Haftung bedeuten. Sie leben diese Prinzipien.
  Sie wollen zu Recht auch vom Gewinn aus Ihren Ideen und aus Ihrem Risiko profitieren
  dürfen. Sie rufen nicht ständig nach dem Staat, sondern Sie wollen, dass der Staat
  einen verlässlichen Rahmen und auch einen verlässlichen Sozialstaat schafft, einen
  Rahmen, in dem fairer Wettbewerb und eben Marktwirtschaft stattfinden. Genau dafür,
  diesen Rahmen zu erneuern und zu verbessern, bin ich mit der Bundesregierung angetreten.
  Das ist es, wofür ich in diesen Monaten, wofür ich in dieser Wahlperiode arbeite.
  Meine Damen und Herren, Sie haben die Ideen und Sie haben den Mut. Sie haben einfach
  Lust darauf, unser Land neu zu formen, eben ein neues Wirtschaftswunder zu schaffen.
  Haben wir diesen Mut auch als Land, auch als Gesellschaft? Das ist vermutlich die
  große Frage in diesen Wochen und Monaten. Wie reformfähig ist unser Land eigentlich?
  Trauen wir uns auch Einschränkungen und Änderungen von Gewohnheiten zu, um morgen
  etwas Besseres zu erreichen, oder kommen wir immer wieder nur auf die alten Ideen,
  Steuererhöhungen und neue Schulden? Nein, meine Damen und Herren, ein Land, das
  nur funktioniert, wenn es immer mehr Geld ausgibt, hat keine Zukunft. Die Frage
  ist: Können wir es in unserem Land auch einmal so angehen, dass wir die Wünsche,
  die wir haben, mit dem Geld abgleichen, das wir äußerstenfalls zur Verfügung haben?
  Wenn wir zu Veränderungen und zunächst auch zu Einschränkungen bereit sind, dann
  gewinnen wir diesen Spielraum für die Zukunft. Wir gewinnen neue Tragkraft. Wir
  gewinnen eine freiheitliche Lebensweise in einer sich grundlegend weiter verändernden
  Welt. Meine Damen und Herren, das sollte uns, das muss uns gelingen. Denn es geht
  nicht darum, dass wir es in unserer Zeit besonders gut haben. Es geht darum, dass
  unsere Kinder und Enkelkinder in unserem Land mindestens so gut leben können, wie
  wir das Glück hatten, es in unserer Lebenszeit zu dürfen – vielleicht sogar ein
  bisschen besser, aber in jedem Fall in Freiheit, in Frieden, mit wirtschaftlicher
  Perspektive und auch mit sozialer Gerechtigkeit. Das muss erreichbar sein. Gehen
  Sie davon aus, dass ich fest entschlossen bin, es mit Ihnen zusammen trotz aller
  Widrigkeiten zu erreichen.'
