title: Newsletter Verbraucherschutz aktuell / Ausgabe 9
text: 'die Rente steht vor einem tiefgreifenden Wandel: Mit 33 Empfehlungen hat die
  Rentenkommission den Weg für die nächste große Reformstufe aufgezeigt. Gleichzeitig
  werden bereits wichtige Maßnahmen wie Aktivrente, Frühstart-Rente, die stärkere
  Förderung privater und betrieblicher Altersvorsorge sowie das Rentenpaket 2025 umgesetzt.
  Welche Änderungen bereits in Kraft sind und was noch kommen soll, lesen Sie hier
  - verständlich und übersichtlich. Die aktuelle Hitzewelle macht wieder deutlich:
  Die Folgen des Klimawandels sind längst Teil unseres Alltags - Innenstädte heizen
  sich stark auf, Grünflächen trocknen aus. Mit dem Programm „Anpassung urbaner und
  ländlicher Räume an den Klimawandel“ werden Kommunen dabei unterstützt, öffentliche
  Räume widerstandsfähiger weiterzuentwickeln – mit mehr Grün, besserer Wasserspeicherung
  oder attraktiven Parks und Plätzen. Noch bis 30. Juni 2026 können Projektvorschläge
  eingereicht werden. Seit dem 19. Juni gilt: Wer online einen Vertrag abschließt,
  kann ihn auch genauso schnell mit einem einfachen Klick wieder beenden. Anbieter
  sind verpflichtet, eine klar erkennbare und jederzeit zugängliche Schaltfläche  -
  den sogenannten „Widerrufsbutton“ - zu schaffen. Die digitale Fahrzeugzulassung,
  die digitale Wohnsitzanmeldung, weniger Berichtspflichten und schnellere Planungs-
  und Genehmigungsverfahren: Das sind die ersten Erfolge der Föderalen Modernisierungsagenda,
  von denen Bürgerinnen und Bürger direkt profitieren. Bund und Länder arbeiten weiter
  intensiv daran, die Staatsmodernisierung voran zu treiben, um Verwaltung schneller,
  digitaler und weniger bürokratisch zu machen. Verbraucherschutz hat eine hohe Relevanz
  im Alltag der Menschen. Für 90 Prozent der für den Verbraucherreport Befragten ist
  Verbraucherschutz sehr oder eher wichtig, wenn es um ihre persönliche Sicherheit
  geht. Besonders 14- bis 29-Jährige betonten dies. Im Bereich „Internet und Digitales“
  fällt das empfundene Schutzniveau am niedrigsten aus. Die Familie ist neben Kita
  und Schule der wichtigste Bildungsort. Elternbegleitung setzt genau hier an. Sie
  schafft einen vertrauensvollen Zugang zu Familien, führt niedrigschwellige Begleitungs-
  und Beratungsangebote durch, bietet Unterstützung bei der Alltagsbewältigung und
  vermittelt anpassende Angebote der Kinder- und Jugendhilfe. Damit unterstützt sie
  Eltern, bestmögliche Bildungsentscheidungen für ihre Kinder zu treffen. Daten zur
  Mobilfunkversorgung sind wichtig, um unser Netz noch besser zu machen und weiterzuentwickeln.
  Besonders wichtig sind Daten aus der Perspektive von Verbraucherinnen und Verbrauchen
  zur tatsächlich erlebten Netzqualität. Darum rufen Bund, Länder und Kommunen in
  diesem Jahr das zweite Mal zur bundesweiten Mobilfunk-Messwoche auf. Mach jetzt
  mit, check Dein Netz und hilf mit. Hitze, Starkregen, Dürre: Die jährlich stattfindende
  Woche der Klimaanpassung dient dem Ziel, gute Beispiele und Vorreiter in der Klimaanpassung
  in der breiten Öffentlichkeit sichtbarer zu machen - als Inspiration für Kommunen
  und soziale Träger, die noch ganz am Anfang stehen. Seien Sie dabei!'
