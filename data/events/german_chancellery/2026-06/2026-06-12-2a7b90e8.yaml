title: Decided by the Bundesrat Air passenger duty to be reduced from 1 July
text: 'The reduction in air passenger duty is intended to bolster the aviation industry
  in Germany. For years, the aviation industry in Germany has been facing a challenging
  situation: high fees, charges and operating costs are all harming its competitiveness
  internationally. Around 1.5 million jobs in the country depend directly or indirectly
  on the aviation industry. It is essential to ensuring Germany’s economic strength,
  international connectivity and export performance. To restore the country’s appeal
  as an aviation hub, the Federal Government has decided to reduce air passenger duty
  rates back to the level they were at before 1 May 2024, with effect from 1 July
  2026. At the coalition committee meeting on 13 November 2025, the governing coalition
  agreed on a comprehensive package of measures to bolster the aviation industry.
  The reduction in air passenger duty has now been implemented as part of this package
  of measures. The Bundestag passed the bill on 21 May 2026, and the Bundesrat approved
  it on 12 June 2026. The reduction in air passenger duty is therefore set to come
  into force on 1 July as planned. The decision allows for a reduction in duty rates
  for short-, medium- and long-haul flights of between 2.50 and 11.40 euros per passenger.
  In practical terms, this means The Federal Government is thus implementing a key
  measure set out in the coalition agreement: the strengthening of the aviation industry,
  as a key sector. Impact on ticket prices: reducing air passenger duty could ease
  the financial burden and prevent further price rises. However, it is up to the companies
  involved to decide whether to pass on the savings in duty to customers.'
