title: Bundeskanzler Merz empfängt den Präsidenten der Republik Senegal, Bassirou
  Diomae Faye
text: Bundeskanzler Friedrich Merz wird am 23. Juni 2025 gegen 12 Uhr den Präsidenten
  der Republik Senegal, Bassirou Diomae Faye, mit militärischen Ehren empfangen. In
  einem gemeinsamen Gespräch werden unter anderem der Ausbau der wirtschaftlichen
  Zusammenarbeit, die Lage in der Sahel-Region und geopolitische Fragen Thema sein.
