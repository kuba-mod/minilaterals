title: G7 summit in France G7 shows of unity and capacity to deliver
text: 'The G7 , together with partner countries and international organisations, in
  a group photo with an extended line-up. This year''s G7 summit presented a strong
  sign of unity and capacity to deliver. The focus was on current crises and conflicts
  – in particular Ukraine and the situation in the Middle East. The G7 heads of state
  and government sent a clear signal in this regard with a joint statement. “It was
  hard work, but it was worth it,” the Federal Chancellor stressed in his press statement.
  The common ground reached on Ukraine is precisely what makes this “message so abundantly
  clear”: namely that support from the G7 countries is stronger than almost ever before.
  He also described that the agreement between the United States and Iran as a “great
  success”. This, he said, should now be followed by further negotiations. In addition
  to the geopolitical challenges, the G7 also made significant progress on other key
  issues – in particular economic cooperation, securing critical raw materials, and
  the fields of artificial intelligence and health. The heads of state and government
  of the G7 met in Évian-les-Bains, France, from 15 to 17 June for political discussions
  on current issues. The Federal Government was keen to play an active role in shaping
  the process and jointly developing solutions for global challenges among the partners.
  This year’s key priorities for the French Presidency included: Leaders'' Declaration
  on Tackling Migrant Smuggling (englisch) Leaders'' Declaration on the Fight against
  Drug Trafficking (englisch) G7 Leaders'' Statement on Geopolitical Issues (englisch)
  Leaders'' Declaration on Mutually Beneficial International Partnerships (englisch)
  Leaders'' Call on the Fight Against Cancer (englisch) Leaders'' Call for a Coordinated
  Response to the Bundibugyo Ebola Outbreak (englisch) See the Chancellor’s visit
  in pictures here: Évian-les-Bains, 15 June 2026: Federal Chancellor Friedrich Merz
  and his wife, Charlotte Merz, were welcomed by French President Emmanuel Macron
  to the three-day G7 summit in France. The summit was attended by the leading industrialised
  nations – Germany, Canada, France, Italy, Japan, the United Kingdom and the United
  States of America – as well as representatives of the European Union, such as European
  Commission President Ursula von der Leyen. One of the topics on the summit’s agenda
  was developments in the Middle East. The Chancellor welcomed the agreement between
  the United States of America and Iran on a peace memorandum. He called for the agreed
  measures to be implemented in a diligent and purposeful manner. According to Merz,
  the agreement could pave the way for a recovery in the global economy and stabilisation
  in the region. In view of the challenges facing foreign and economic policy, the
  Federal Government is pursuing clear objectives at the meeting: on the one hand,
  continued support for Ukraine and de-escalation in the Middle East; on the other
  hand, cooperation to strengthen the global economy and ensure a secure supply of
  critical raw materials. The G7 heads of state and government discussed issues such
  as these during a series of working sessions at the meeting on Lake Geneva. In addition,
  the format offers Federal Chancellor Friedrich Merz the opportunity to hold bilateral
  talks. On the first evening, he held talks with UK Prime Minister, Keir Starmer.
  According to Chancellor Merz, the summit is taking place during an “extremely turbulent
  period in world politics”. The situation presents challenges, “but also offers some
  opportunities”, he said, referring to international cooperation. Évian-les-Bains,
  16 June 2026: Ukrainian President Volodymyr Zelenskyy was invited as a guest on
  the second day. “Building peace and security for Ukraine and for Europe” was the
  theme of the first working session of the day. In the run-up to the summit, Federal
  Chancellor Merz expressed cautious optimism regarding negotiations on a peace settlement.
  The G7 heads of state and government agreed to step up the pressure on Russia over
  the war in Ukraine. US President Trump also wants to reinstate the suspended sanctions
  against Russian oil exports. The second working session focused on stability in
  the Middle East. The President of Egypt and the Prime Minister of Qatar, as well
  as the President of the United Arab Emirates, Sheikh Mohammed bin Zayed Al Nahyan,
  travelled to Évian for the occasion. On the second day, as is traditional, further
  partner countries also joined the meeting. That’s also when the extended family
  photo was taken. During a third working session, they exchanged views on the topic
  of ‘Forging new partnerships and rebuilding international solidarity’. At the end
  of the day, the Chancellor emphasised the "strong sense of transatlantic European
  unity and European teamwork" during the talks. Évian-les-Bains, 17 June 2026: The
  heads of state and government of the G7 countries gathered at the conference venue
  for the third day of the summit. The working session focused on boosting economic
  growth and addressing economic imbalances. At the conclusion of the summit, the
  G7 agreed on common positions regarding the conflict in the Middle East and Russia’s
  war of aggression against Ukraine. “Democracy is difficult, and diplomacy requires
  tenacity. "But I think we have been successful in this round of discussions amongst
  democratic states over the past two days," said Chancellor Merz in his statement
  at the close of the summit. Évian-les-Bains, 15 June 2026: Federal Chancellor Friedrich
  Merz and his wife, Charlotte Merz, were welcomed by French President Emmanuel Macron
