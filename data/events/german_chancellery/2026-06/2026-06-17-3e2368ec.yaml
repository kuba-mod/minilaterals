  in Évian-les-Bains. Alongside France and Germany, the G7 also includes Canada, Italy,
  the United Kingdom, Japan and the USA. Key questions and answers on this topic can
  be found in this overview. On the agenda for the G7 Summit in Evian, France: critical
  raw materials, global economy, foreign policy on Ukraine and Middle East: Read more
  here. France holds the presidency and is organising the G7 summit in Evian.'
