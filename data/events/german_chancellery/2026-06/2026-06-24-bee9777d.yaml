title: Desinformation besser erkennen Was ist Desinformation?
text: 'Gerade in Krisenzeiten häuft sich Desinformation. Unter Desinformation versteht
  man die absichtliche Verbreitung falscher oder irreführender Information. Ziel ist
  es, Meinungen zu beeinflussen, um so einer Person, einer sozialen Gruppe, einer
  Organisation oder einem Land zu schaden. Der Begriff „Desinformation” beschreibt
  also zwei Dinge: Die manipulierte Information und die Absicht, die hinter ihrer
  Verbreitung steckt. Die manipulierte Information kann in ganz unterschiedlichen
  Formen auftauchen. Etwa als Internet-Artikel, der vorgibt, von einem etablierten
  Medium zu stammen und falsche Behauptungen verbreitet – ein Beispiel dafür ist die
  sogenannte Doppelgänger-Kampagne . Genauso gut kann es aber auch ein KI -generiertes
  Deepfake -Video sein oder eine frei erfundene Meldung in Messenger -Kanälen. Oft
  setzt Desinformation auf emotionalisierende Inhalte oder alte Verschwörungstheorien,
  die neu aufbereitet werden. Die manipulierte Information muss also weder neu noch
  besonders kreativ sein, um Aufmerksamkeit zu bekommen. Was sind Deepfakes ? Deepfakes
  sind täuschend echte Foto-, Video- oder Audioinhalte, die mit künstlicher Intelligenz
  hergestellt werden. Desinformation ist kein neues Phänomen. Durch soziale Medien
  verbreitet sie sich heute aber viel schneller und effektiver. Besonders seit Beginn
  des russischen Angriffskriegs gegen die Ukraine hat Desinformation noch einmal deutlich
  zugenommen. Ausländische Akteure setzen sie ein, um Menschen zu verunsichern und
  das Vertrauen in die Demokratie zu schwächen. Deshalb sind insbesondere die Institutionen
  – wie Staat, Wissenschaft und Medien – die das Rückgrat der demokratischen Gesellschaft
  bilden, häufige Angriffsziele. Für diese Art ausländischer Desinformationskampagnen
  hat sich der Begriff FIMI ( Foreign Information Manipulation and Interference )
  etabliert. Im Sinne der wehrhaften Demokratie ist der Schutz der freiheitlich-demokratischen
  Grundordnung für die Bundesregierung Auftrag und Pflicht zugleich. Deshalb begegnet
  sie ausländischen Desinformationskampagnen auf mehreren Ebenen: Die Federführung
  liegt beim Bundesministerium des Inneren , da es sich bei Desinformation um eine
  hybride Bedrohung handelt. Grundsätzlich sind hierbei aber alle Ressorts der Bundesregierung
  sowie deren Geschäftsbereiche beteiligt. Von hoher Bedeutung ist zudem die Vernetzung
  von Bund und Ländern einschließlich ihrer Kommunen und den Sicherheitsbehörden sowie
  der Austausch mit der Zivilgesellschaft. Um zukünftig noch besser gewappnet zu sein,
  eröffnete Bundesinnenminister Dobrindt am 16. Juni 2026 gemeinsam mit Vertreterinnen
  und Vertretern von Sicherheitsbehörden des Bundes und der Länder das Gemeinsame
  Zentrum zur Abwehr hybrider Bedrohungen ( GAZ Hybrid ). Das Ziel von GAZ Hybrid
  ist es, Spionage, Sabotage, Desinformation und weitere Formen hybrider Bedrohungen
  zu erkennen und zu bekämpfen. Einen umfassenden Überblick über die wichtigsten Maßnahmen
  von Bund und Ländern bietet der „ Gemeinsame Aktionsplan von Bund und Ländern gegen
  Desinformation und für eine wehrhafte Demokratie“. Dazu zählt unter anderem die
  frühzeitige Erkennung von ausländischer Informationsmanipulation, zur Stärkung der
  gesellschaftlichen Resilienz und zur Intensivierung von Austausch und Forschung.
  Die ausländischen Akteure, die Deutschland mit Desinformation angreifen, greifen
  auch internationale Partner an. Pro-russische Desinformationskampagnen tauchen in
  vielen Staaten auf, die die Ukraine unterstützen. Daher steht die Bundesregierung
  mit diesen Staaten im engen Austausch zum Umgang mit Desinformation – etwa im Rahmen
  des Weimarer Dreiecks mit Frankreich und Polen, der EU , der NATO oder den Vereinten
  Nationen. In ganz Deutschland suchen Menschen nach neuen Wegen, dieser Bedrohung
  zu begegnen: Journalistinnen und Journalisten, Lehrkräfte, Forschende. Aber auch
  Bürgerinnen und Bürger leisten einen Beitrag, indem sie die Desinformationen an
  Social-Media -Plattformen oder Faktenchecker melden. Sie alle haben sich zum Ziel
  gesetzt die Demokratie zu schützen. Was können wir selbst gegen Desinformation tun?
  Drei Schritte zum Umgang mit Desinformation: Prüfen, Recherchieren; Teilen oder
  Melden Prüfen: Ruhe bewahren! Oft schwer, aber ganz  wichtig / W erde ich gerade
  manipuliert? Nur weil es ärgerlich, verängstigend oder lustig ist – ist es noch
  lange nicht wahr / Ist die Quelle seriös? Recherchieren: Findet sich die Meldung
  auch in anderen Medien? Nutzen Sie Faktenchecks: D iverse Organisationen überprüfen
  Meldungen und stellen diese, wenn nötig, richtig Teilen oder Melden: Wenn die Meldung
  stimmt: Spricht nichts dagegen, sie zu teilen. Wenn Sie glauben Desinformation gefunden
  zu haben: M elden Sie diese besser an Faktenchecker, aber auch direkt an die Plattformen
  selbst'
