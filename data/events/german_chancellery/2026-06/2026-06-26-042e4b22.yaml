title: Pressestatement von Bundeskanzler Merz bei Salutas Pharma Herausragendes Beispiel
  für zukunftsfähige Arbeitsplätze
text: 'Eine starke industrielle Basis schaffe eine verlässliche Versorgung von Patientinnen
  und Patienten in Deutschland und Europa mit kritischen Arzneimitteln, betonte der
  Kanzler. Bundeskanzler Friedrich Merz hat den Standorts von Salutas Pharma bei Magdeburg
  besucht und die Bedeutung des Produktionsstandorts betont. Dieser moderne und anpassungsfähige
  Industriestandort sei ein herausragendes Beispiel für zukunftsfähige Arbeitsplätze
  in den ostdeutschen Bundesländern. Die Pharmaindustrie und Medizintechnik in Deutschland
  gehörten zur Leitwirtschaft und seien eine Schlüsselindustrie. „Eine starke industrielle
  Basis schafft eine resiliente und verlässliche Versorgung von Patientinnen und Patienten
  in Deutschland und Europa mit kritischen Arzneimitteln“, so der Bundeskanzler. Die
  Bundesregierung wolle daher die Rahmenbedingungen der Pharmabranche für die Entwicklung
  und Produktion von Arzneimitteln weiter verbessern, unter anderem „setzen wir uns
  in der EU für Resilienz und Wettbewerbsfähigkeit ein“, sagte der Kanzler. Salutas
  Pharma ist eine Tochtergesellschaft der Hexal AG innerhalb des Schweizer Arzneimittelherstellers
  Sandoz. In Barleben im Bundesland Sachsen-Anhalt werden jährlich etwa zehn Milliarden
  Kapseln und Tabletten unter anderem zur Krebstherapie hergestellt und weltweit exportiert.
  Lieber Richard Saynor , Herr Weigold, meine sehr geehrten Damen und Herren, ich
  freue mich sehr, dass ich die Gelegenheit habe, heute zusammen mit Ministerpräsident
  Sven Schulze diesen wichtigen Standort der pharmazeutischen Industrie, die Salutas
  Pharma GmbH , als Teil des großen Unternehmens Hexal in der Sandoz-Gruppe zu besuchen.
  Wir haben Gelegenheit gehabt, uns über den Pharma-Standort Deutschland auszutauschen,
  und ich möchte klar sagen: Gerade Generikaprodukte, also die nicht mehr patentgeschützten
  sogenannten Nachahmerprodukte, sind eine wichtige bzw. eigentlich die wichtige Basis
  für bezahlbare und sichere Grundversorgung mit Arzneimitteln in Deutschland und
  in Europa. Richard Saynor hat in seinem Statement auf die strategische Bedeutung
  einer Versorgung mit Arzneimitteln hingewiesen. Wir haben in den vergangenen Jahren
  ja schon die Abhängigkeiten von Lieferketten in kritischen Bereichen wie eben in
  der Gesundheitsversorgung gesehen. Deshalb ist eine starke industrielle Basis für
  die resiliente und verlässliche Versorgung von Patientinnen und Patienten in Deutschland
  und in Europa mit kritischen Arzneimitteln für uns eine strategische Frage. Wir
  konnten heute Einblicke in einen hochmodernen und leistungsfähigen Produktions-
  und Logistikstandort mitten in Deutschland gewinnen. Hier werden unter strengsten
  Bedingungen Arzneimittel hergestellt und weltweit exportiert. Wir haben uns über
  die Herausforderungen bei der Herstellung von Generika und sogenannten Biosimilars,
  also Nachahmerprodukten, informiert und haben mit den Mitarbeiterinnen und Mitarbeitern
  beim Rundgang durch das Labor auch einen Überblick über wichtige Fragen der Qualitätssicherung
  gewonnen. Ich will dem Unternehmen, aber ganz besonders Richard Saynor sowie den
  Mitarbeiterinnen und Mitarbeitern für den wirklich sehr informativen Besuch herzlich
  danken. Das Unternehmen Salutas hat hier in Barleben im vergangenen Jahr sein 30. Standortjubiläum
  gefeiert. Ich freue mich, dass der Standort weiter wächst und dass das Unternehmen
  plant, weiter zu investieren. Wir haben uns als Bundesregierung zum Ziel gesetzt,
  die industrielle Gesundheitswirtschaft zu stärken. Ich will das hier wiederholen,
  was ich gerade im kleinen Kreis gesagt habe: Wenn man den Gesundheitssektor insgesamt
  betrachtet, also von der Herstellung von pharmazeutischen Produkten über die Gesundheitsversorgung
  in Arztpraxen und Krankenhäusern bis hin zur Versorgung älterer Menschen in Pflegeeinrichtungen,
  dann erkennt man, dass dieser gesamte Sektor der am schnellsten wachsende Sektor
  unserer Volkswirtschaft ist. Es ist der Sektor unserer Volkswirtschaft, der in den
  nächsten Jahren die meisten Arbeitsplätze neu schaffen wird und es zulässt, bestehende
  zu erhalten. Es ist deswegen für uns eine wichtige Frage, wie wir diesen Sektor
  auch weiter unter Marktbedingungen so entwickeln können, dass vor allem im pharmazeutischen
  Bereich mittelfristig wieder mehr wichtige Arzneimittel auch in Deutschland und
  in Europa produziert werden. Wir setzen uns deshalb – auch ich persönlich in der
  Europäischen Union ‑ dafür ein, dass wir ein starker und wettbewerbsfähiger Standort
  sind. National führen wir den Pharma- und Medizintechnikdialog in dieser Legislaturperiode
  weiter. Ich will der Bundesgesundheitsministerin Nina Warken erneut wirklich herzlich
  Dank dafür sagen, dass sie diesen strategischen Dialog mit der Industrie führt.
  Denn ein strukturierter Austausch der Bundesregierung mit den relevanten Akteuren
  aus Industrie, Verbänden, Wissenschaft, Selbstverwaltung, Gewerkschaften und nicht
  zuletzt mit den Vertreterinnen und Vertretern der Patienten ist für uns wichtig,
  um gemeinsam Lösungen für die aktuellen Herausforderungen zu finden. Darüber hinaus
  hat die Bundesregierung in den vergangenen 14 Monaten bereits zahlreiche Maßnahmen
  beschlossen, mit denen Wachstum und Wettbewerbsfähigkeit gestärkt werden sollen.
  Wir wissen, dass wir mehr tun müssen. Wir sind mitten im Prozess, und wir werden
  das in den nächsten Wochen auch weiter vorantreiben. Ich will den Ländern danken,
  insbesondere heute Sven Schulze, dass er als Ministerpräsident eines wichtigen Standortlandes
  auch an diesem Prozess aktiv teilnimmt. Sachsen-Anhalt hat sich in den letzten Jahren
  gerade in der pharmazeutischen Industrie zu einem der wichtigen Standorte in Deutschland
  entwickelt. Ich will auch herzlich Dank dafür sagen, dass Sven Schulze aktiv an
  dem teilnimmt, was wir Föderale Modernisierungsagenda nennen. Wir wollen ja gemeinsam
  erreichen, dass Deutschland ein digitaler Standort wird, dass wir Staatsmodernisierung
  und Digitalisierung voranbringen. Hierbei ist Sachsen-Anhalt für uns ein enorm wichtiger
  strategischer Partner zwischen Bund und Ländern. Deswegen mein persönlicher Dank
  auch noch einmal an Sven Schulze, dass er diese Arbeit mit so viel Kraft unterstützt
  und auch keine Angst vor Veränderungen hat, sondern der Ministerpräsident ist, der
  uns sagt: Macht es, und seht zu, dass ihr vorankommt mit den Themen, die jetzt wichtig
  sind, bis hin zu den umfassenden Reformen, die wir ja in Berlin bereits auf dem
  Tisch liegen haben. In diesem Sinne noch einmal herzlichen Dank für die Gastfreundschaft
  im Land Sachsen-Anhalt, aber auch ganz besonderen Dank an die Unternehmensführung
  und an die Mitarbeiterinnen und Mitarbeiter hier an diesem interessanten Standort!'
