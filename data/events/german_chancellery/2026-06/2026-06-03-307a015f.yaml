title: Im Kabinett beschlossen Potentiale der Kreislaufwirtschaft steigern
text: 'Mit dem Aktionsprogramm sollen auch KI -Anwendungen für Kreislaufwirtschaft
  und Ressourceneffizienz gefördert werden. Das Kabinett hat den Entwurf eines Aktionsprogramms
  zur Umsetzung der Nationalen Kreislaufwirtschaftsstrategie beschlossen. Damit setzt
  die Bundesregierung ein zentrales Vorhaben des Koalitionsvertrages im Umweltbereich
  um. Bundesumweltminister Carsten Schneider betonte: „In der aktuellen Weltlage gilt
  mehr denn je: Kreislaufwirtschaft macht unsere Wirtschaft unabhängiger. Sie schützt
  unsere Unternehmen, wenn internationale Lieferketten brüchig werden oder Handelswege
  blockiert sind. Und sie stärkt die Innovationskraft deutscher Unternehmen in Märkten,
  die deutlich mehr als andere wachsen.“ Mit dem Aktionsprogramm verfolgt die Bundesregierung
  eine ganze Reihe von Zielen: mehr Ressourcenschonung und damit auch mehr Umweltschutz
  und mehr Rohstoffsouveränität, weil Deutschland unabhängiger von Importen wird.
  Außerdem strebt sie mehr Wettbewerbsfähigkeit und Wachstum an: dadurch ergeben sich
  eine größere Versorgungssicherheit für die heimische Wirtschaft und mehr zukunftsfähige
  Arbeitsplätze. Ein wichtiges Element des Aktionsprogramms ist eine Plattform, die
  eingerichtet werden soll, um alle relevanten Akteure zur Umsetzung wesentlicher
  Maßnahmen zusammenzubringen. Die Investitions- und Innovations-Förderung für die
  Kreislaufwirtschaft bildet ein weiteres Element. Mit der Förderung sollen Umwelt-
  und Industriepolitik besser verzahnt und die Potentiale der Kreislaufwirtschaft
  unterstützt werden – beispielsweise bei innovativen Recycling anlagen und Start-Up
  -Unternehmen mit zirkulären Geschäftsmodellen. Zudem soll eine Digitalisierungsinitiative
  Stoffkreisläufe schließen. Dafür sind unter anderem digitale Produktpässe vorgesehen.
  Daneben sollen KI -Anwendungen für Kreislaufwirtschaft und Ressourceneffizienz gefördert
  werden. Zentral ist, sogenannte zirkuläre industrielle Datenräume weiterzuentwickeln,
  was den souveränen, sicheren und dialogfähigen Austausch von Daten entlang der gesamten
  industriellen Wertschöpfungskette ermöglichen soll. Dies soll die Zusammenarbeit
  zwischen Unternehmen erleichtern, Innovationen fördern und zugleich trotzdem die
  Kontrolle über die eigenen Daten behalten. Darüber hinaus soll die öffentliche Beschaffung
  als Hebel für zirkuläre Beschaffung eingesetzt werden. Nicht zuletzt soll der rechtliche
  Rahmen in den Bereichen Kreislaufwirtschaftsrecht und Produktverantwortung weiterentwickelt
  werden. Minister Schneider zeigte sich überzeugt: „Das Aktionsprogramm für die Kreislaufwirtschaft
  ist gut für die Umwelt und gut für die Zukunft der Wirtschaft.“'
