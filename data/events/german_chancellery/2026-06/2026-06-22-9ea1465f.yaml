title: Neubauprojekte aus „stiller Reserve“ holen Effizienzhaus 55-Plus-Förderung
  bis Ende 2026 verlängert
text: 'Durch die Effizienzhaus 55-Plus-Förderung können nun rund 33.700 Wohneinheiten
  doch gebaut werden. Foto: picture alliance/dpa/Rolf Vennenbernd In Deutschland werden
  zu wenige Wohnungen gebaut. Gleichzeitig befinden sich rund 760.000 Wohnungen im
  sogenannten Bauüberhang. Das bedeutet: Für diese Wohnungen liegen zwar Planungen
  und Baugenehmigungen vor, sie wurden jedoch aus verschiedenen Gründen nicht umgesetzt
  – häufig, weil sich die Projekte durch gestiegene Finanzierungskosten nicht mehr
  wirtschaftlich realisieren ließen. Genau hier setzt die nun verlängerte Effizienzhaus
  55-Plus-Förderung an. Mit zinsgünstigen KfW -Krediten will die Bundesregierung die
  stille Reserve aktivieren, die im Bauüberhang steckt. Tausende baureife Projekte
  erhalten so die Chance, wieder wirtschaftlich umgesetzt zu werden. Das einmalige
  Förderprogramm in Höhe von 800 Millionen Euro soll dem Wohnungsbau damit den entscheidenden
  Impuls geben, damit er wieder in Bewegung kommt. Das Fördergeld stammt aus dem Sondervermögen
  Infrastruktur und Klimaneutralität. „Unsere Förderung wirkt: Rund 33.700 Wohneinheiten,
  die bisher nur auf dem Papier existiert haben, werden nun gebaut. Wir konnten so
  bereits einen Teil des Bauüberhangs aktivieren“, betonte Verena Hubertz, Bundesministerin
  für Wohnen, Stadtentwicklung und Bauwesen. Das sei ein gutes Zeichen, aber die Herausforderungen
  für die Branche blieben, so die Ministerin. Der Iran-Krieg und die dadurch steigende
  Preise erschweren auch das Baugeschäft. Die Effizienzhaus 55-Plus-Förderung stößt
  auf eine starke Nachfrage. „Deshalb verlängern wir die EH55-Plus-Förderung. Es ist
  noch Geld im Fördertopf und wir wollen, dass es dort ankommt, wo es gebraucht wird“,
  sagte Hubertz. Rund 343 Millionen Euro stehen noch zur Verfügung. Die Förderung
  soll weiterhin möglichst mit einem Zinssatz von einem Prozent effektiven Jahreszins
  – bei zehn Jahren Laufzeit und zehn Jahren Zinsbindung – abrufbar sein. Die Förderung
  läuft noch längstens bis zum Jahresende, bis die Fördermittel vollständig verausgabt
  sind. Eine Aufstockung der Mittel ist nicht vorgesehen. Wichtige Fragen und Antworten
  dazu im Überblick: Die Effizienzhaus 55-Plus-Förderung gilt für Neubauten und Ersterwerb
  neu errichteter Wohn- und Nichtwohngebäude. Kommunen können einen Zuschuss erhalten.
  Dies geschieht über zinsverbilligte Kredite der staatlichen Förderbank KfW . Der
  Kredithöchstbetrag pro Wohneinheit beträgt 100.000 Euro. Die Laufzeit der Kredite
  beträgt bis zu 35 Jahre bei einer maximalen Zinsbindung von zehn Jahren. Die Mittel
  für die Förderung werden einmalig bereitgestellt. Um einen zinsverbilligten Kredit
  zu erhalten, müssen die Wohngebäude im Effizienzhausstandard 55 geplant worden sein,
  also mit einer Wärmeerzeugung mit 100 Prozent Erneuerbaren Energien. Fossile Energieträger
  wie Gas und Öl sind damit ausgeschlossen – Wärmepumpen, Fernwärme, Solarwärme, Biomasse
  und ähnliches sind förderfähig. Es muss zum Zeitpunkt der Antragstellung eine gültige
  Baugenehmigung vorliegen, mit dem Bauvorhaben darf jedoch noch nicht begonnen worden
  sein. Die Mittel für die Förderung werden einmalig bereitgestellt. Hier gelangen
  Sie zu weiteren Informationen und zur Antragstellung für Neubauten bzw. für Sanierungen.'
