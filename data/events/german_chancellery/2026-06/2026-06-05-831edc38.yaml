title: Bundesregierung aktuell
text: 'jeder dritte Chip, der in Europa gefertigt wird, stammt aus Sachsen. Das ist
  kein Zufall, sondern Ergebnis gezielter Investitionen in Forschung und Industrie.
  Ostdeutschland ist Innovationsland: Hier gehören Hochschulen und Forschungsinstitute
  zu den leistungsfähigsten in ganz Deutschland. Innovationen entstehen dabei nicht
  nur im Labor, sondern weil Wissenschaft, Start-ups und Industrie eng zusammenarbeiten.
  Bei der Wasserstoffwirtschaft und der Chip-Industrie zählt die Region zu den Vorreitern
  in Europa. Wer über das nächste Wirtschaftswunder spricht, kommt an Ostdeutschland
  nicht vorbei. In dieser Woche war der Bundeskanzler beim Ostdeutschen Wirtschaftsforum
  in Bad Saarow – einem wunderschönen Flecken in Brandenburg. Das Treffen der ostdeutschen
  Wirtschaftsszene mit der regionalen politischen Führung und auch der Bundespolitik
  ist längst kein Geheimtipp mehr, sondern ein Pflichttreff für alle, die den Osten
  verstehen und studieren – und dort investieren wollen. Neben den vielen ostdeutschen
  Erfolgsgeschichten gibt es aber auch hier die to-do-Liste für Bundes- und Landesregierungen,
  für die Sozialpartner und für alle An- und Zupacker beim Umbau der Republik. Die
  Chancen kommen nicht zufällig vorbeigeschwommen am Scharmützelsee in Bad Saarow.
  Die Unternehmer haben ihren Mut mitgebracht – und sie wollen von der Bundesregierung
  Gewissheit: über Kosten, Risiken, Energieversorgung, Bürokratie. Die Bundesregierung
  hat schon einiges auf den Weg gebracht, etwa durch die schrittweise Absenkung der
  Körperschaftssteuer oder Abschreibungsmöglichkeiten für Investitionen. Bürokratie
  wird zurückgefahren, Berichtspflichten gekappt. In der kommenden Woche werden sich
  die Koalitionsspitzen mit den Gewerkschaften und der Wirtschaft zu den großen Reformprogrammen
  austauschen, weil am Ende alle einen Beitrag leisten müssen. Wichtig dabei ist,
  dass die Belastungen fair verteilt werden, um - wie der Kanzler in Bad Saarow sagte
  – den nächsten Generationen einen guten Start zu ermöglichen. Diese nächste Generation
  war ebenfalls in dieser Woche im Kanzleramt zu Gast. Der Bundesjugendring, ein Zusammenschluss
  von 29 Jugendverbänden und den Landesjugendringen, war mit rund 40 Vertreterinnen
  und Vertretern und einer langen Liste von Gesprächsthemen gekommen: Umwelt, die
  digitale Welt und die eigene Gesundheit – der Kanzler wurde nicht geschont und verließ
  die Gruppe in der Gewissheit, dass hier eine politisch selbstbewusste Generation
  nachkommt. In den kommenden Wochen stehen viele Jugendliche vor dem Schulabschluss
  und damit vor der Frage: Was nun? Möglichkeiten gibt es viele – freiwilliger Wehrdienst,
  soziales Engagement oder ins Studium. Friedrich Merz wirbt in einer Videobotschaft
  für einen Weg, der oft unterschätzt wird: die Ausbildung. In Deutschland gibt es
  mehr als 300 anerkannte Ausbildungsberufe, Fachkräfte werden überall gesucht. Meisterqualifikation,
  Selbständigkeit oder Studium können danach kommen. Ob in Ost- oder in Westdeutschland:
  Nach einer Erfolgsgeschichte klingt das hier wie dort. Der rechtsextremistische
  Mord an Walter Lübcke muss uns eine Mahnung sein: Wer Verantwortung für unsere Demokratie
  übernimmt, darf niemals Angst um sein Leben haben müssen. In unserer freien Gesellschaft
  dürfen wir politischer Gewalt keinen Raum geben. Bundeskanzler Merz auf X anlässlich
  des 7. Todestags von Walter Lübcke am 2. Juni 2026 Am 6. Juni 1986 wurde das Bundesumweltministerium
  gegründet – eine Reaktion auf die Reaktorkatastrophe von Tschernobyl. Hinzu kamen
  Umweltprobleme der Zeit wie Waldsterben und saurer Regen. Nicht zu vergessen, der
  Klimawandel. Heute ist das Bundesumweltministerium eine zentrale Institution, die
  sich mit Themen von Artenschutz bis zur Zertifizierung nach Umweltstandards beschäftigt.
  Wir freuen uns über Ihr Feedback: Nutzen Sie bitte dafür das Kontaktformular (nicht
  die Antwortfunktion auf diese E-Mail).'
