date: '2026-06-02'
type: press_release
source_name: german_chancellery
title: Pressekonferenz von Kanzler Merz und Ungarns Ministerpräsident Magyar Gemeinsam
  für Demokratie und ein geeintes Europa
text: 'Bundeskanzler Merz empfing den ungarischen Ministerpräsidenten Péter Magyar
  mit militärischen Ehren im Kanzleramt. Angesichts der Bedrohung der NATO durch Russland
  und Moskaus Krieg gegen die Ukraine sei ein enges Zusammenrücken unerlässlich. Wenn
  Ungarn wieder klar auf der Seite eines geeinten Europas stehe, stärke das „die Sache
  der Freiheit und des Friedens“ in Europa. Das sagte Bundeskanzler Friedrich Merz
  beim Antrittsbesuch des ungarischen Ministerpräsidenten Péter Magyar am Dienstag
  in Berlin. Dessen großartiger Wahlsieg sei auch eine Inspiration für ganz Europa.
  Meine Damen und Herren, herzlich willkommen! Ich freue mich sehr, dass ich heute
  den neu gewählten Ministerpräsidenten von Ungarn, Péter Magyar , zu seinem ersten
  Besuch in Berlin begrüßen darf. Ich freue mich auch sehr, dass er so schnell nach
  seinem Amtsantritt nach Berlin kommt. Antrittsbesuche sind ja immer auch ein Neuanfang,
  und für diesen Besuch gilt das in ganz besonderer Weise. Ich möchte Péter Magyar
  noch einmal zu seinem großartigen Wahlsieg in Ungarn gratulieren. Das ist ein tiefer
  Einschnitt in der Geschichte Ungarns nach dem Ende des Kalten Krieges. Für viele
  Ungarinnen und Ungarn ist Péter Magyar der große Hoffnungsträger dieser Zeit. Sie
  haben ihm ein klares Mandat verliehen. Demokratie und Rechtsstaatlichkeit in Ungarn
  sind wieder gestärkt. Wir trauen ihm zu, dass er Ungarn zurück in die Mitte Europas
  führt. Ich darf nach unserem sehr guten Gespräch heute Mittag auch sagen: Sie wollen,
  lieber Péter Magyar , dass Ungarn wirtschaftlich wieder vorankommt. Hier in Berlin
  stehen Ihnen dazu die Türen offen. Wir wollen helfen, dass dieser Neuanfang in Ungarn
  ein Erfolg wird. Sie können auf uns zählen, und auch auf mich persönlich, wenn Sie
  Mitstreiter für die Arbeit in der Europäischen Union, für die Arbeit für Freiheit,
  Sicherheit und Wohlstand in ganz Europa suchen. Der Wahlsieg ist auch eine Inspiration
  für ganz Europa. Péter Magyar hat bewiesen: Das Pendel schwingt nicht nur in eine
  Richtung, nicht nur in die Richtung des Illiberalen oder gar Autoritären, sondern
  es kann auch eindrucksvoll in die Mitte zurückschwingen. Zum zweiten Mal in den
  letzten Jahrzehnten erreicht uns Deutsche damit eine ermutigende Botschaft aus Ungarn.
  Nach 1989 – wir haben darüber gesprochen – haben wir in diesem Jahr nun dieses Wahlergebnis
  und diese Bereitschaft, erneut an der Überwindung der Teilung Europas mitzuarbeiten
  und daran mitzuwirken, dass diese Europäische Union einen guten Weg nimmt im Hinblick
  auf Wachstum, Beschäftigung, Wettbewerbsfähigkeit und Verteidigungsfähigkeit. An
  diesen Moment der Freiheit und der Einigung wollen wir jetzt anknüpfen. Das müssen
  wir auch; denn wir stehen in einer Zeit, in der die Freiheit und die Einheit Europas
  einmal mehr in Gefahr sind. Die Bedrohung der NATO durch Russland und seinen Krieg
  gegen die Ukraine fordert uns alle fundamental heraus. Es ist wichtig, dass wir
  hier eng zusammenrücken, und wenn Ungarn wieder klar auf der Seite dieses Europas
  steht, dann stärkt das uns alle und die Sache der Freiheit und des Friedens. Lieber
  Péter Magya r, wir sind froh, wenn Ungarn diesen Weg einschlägt. Dazu gehört auch
  die europäische Politik gegenüber der Ukraine. Wir verstehen, dass Budapest zunächst
  bilaterale Fragen klären will, etwa Fragen zu den Rechten der ungarischen Minderheit
  in der Ukraine. Das darf aber nicht zulasten der europäischen Unterstützung gehen
  und uns nicht von dem Ziel abbringen, die Beitrittsverhandlungen mit der Ukraine
  jetzt mit dem ersten Kapitel förmlich zu eröffnen. Das alles sind Themen, über die
  wir heute gesprochen haben. Wir wissen, dass wir auch in Europa gemeinsam noch einen
  langen Weg vor uns haben. Wir wollen vor allem das Thema Wettbewerbsfähigkeit und
  Verteidigungsfähigkeit gemeinsam stärken. Die Lage in der Europäischen Union ist
  sehr unterschiedlich, aber wir wissen, dass wir nur gemeinsam Erfolg haben können.
  Wir haben die Berichte von Enrico Letta und Mario Draghi ja intensiv diskutiert
  und auch ausgewertet. Da ist ein Prozess in Gang gekommen, und ich möchte Ungarn
  gerne einladen, sich an diesem Prozess der Stärkung des europäischen Binnenmarktes
  und der Stärkung der Wettbewerbsfähigkeit zu beteiligen. Denn wir brauchen ein souveränes
  und ein wirtschaftlich starkes Europa, auch wenn wir uns jetzt mit Blick auf die
  Reform des Mehrjährigen Finanzrahmens an die Arbeit machen. Wir wollen noch in diesem
  Jahr festlegen, wie die Finanzen der Europäischen Union in der Zukunft aussehen;
  denn wir brauchen ja auch Investitionen in die Wettbewerbsfähigkeit und in die Verteidigungsfähigkeit.
  Péter Magyar und ich werden uns schon in zwei Wochen beim Europäischen Rat in Brüssel
  wiedersehen. Wir werden diese Fragen auch gemeinsam zu beantworten versuchen. Ich
  freue mich deswegen, dass wir darüber heute ein erstes ausführliches Gespräch führen
  konnten. Noch einmal herzlich willkommen in Berlin, herzlich willkommen zu einem
  Neustart unserer Beziehungen, die ja traditionell über Jahrzehnte sehr gut gewesen
  sind. Das wollen wir wieder aufnehmen. Ich freue mich jedenfalls auf die Zusammenarbeit
  mit meinem neuen Kollegen im Europäischen Rat, Péter Magyar . (auf Deutsch) Danke
  sehr, Herr Bundeskanzler, für diese Möglichkeit und für Ihre Einladung. (auf Ungarisch)
  Ganz herzlichen Dank dafür, dass ich hier bei Ihnen in Deutschland sein darf. Wie
  Sie wissen, nehmen Deutschland und die Menschen aus Deutschland einen besonderen
  Platz im Herzen der Ungarn ein. Wir haben mit dem Herrn Bundeskanzler auch über
  die lange gemeinsame Geschichte und über die verschiedenen Stationen gesprochen.
  Ich war sehr erfreut zu hören, dass die Erinnerung an 1989 immer noch im Herzen
  der Deutschen ist und dass auch die Erinnerung an die Rolle Ungarns beim Abbau des
  Eisernen Vorhangs und bei der Öffnung der Grenzen immer noch sehr lebendig ist.
  Ich freue mich sehr darüber, dass es nicht nur unser Herz erwärmt, wenn wir an das
  Paneuropäische Picknick oder an die Bilder denken, die wir damals in Deutschland
  oder von der deutschen Botschaft in Budapest gesehen haben, vor der sich die deutschen
  Geflüchteten gesammelt haben. Ich freue mich sehr, dass das damalige Ungarn dazu
  beitragen konnte – jedenfalls ein kleines bisschen –, dass Deutschland wiedervereinigt
  wurde. Ich bin also sehr glücklich darüber. Ich bin auch sehr froh über die Einladung
  und darüber, dass ich nach meinen Besuchen in Polen und in Österreich jetzt zu meinem
  dritten Amtsbesuch in Deutschland ‑ einem selbstverständlichen Verbündeten Ungarns
  – sein kann. Ich bin mit einem offenen Herzen hierhergekommen, um meine Heimat zu
  vertreten. Ungarn ist ein stolzes Land, Ungarn ist ein Land, das die Freiheit liebt,
  Ungarn ist ein ehrliches Land, und ich bin sehr froh darüber, dass wir Ungarn und
  wir Europäer den 70. Jahrestag der Revolution von 1956 als ein souveränes und freies
  europäisches Land begehen können. Ich bin auch sehr froh darüber, dass ich den Herrn
  Bundeskanzler zu diesem 70. Jahrestag der Revolution von 1956 einladen durfte. Wie
  der Herr Bundeskanzler auch erwähnte, haben wir diese Wahl gewonnen, und zwar nicht
  nur knapp, sondern sogar sehr deutlich. Seit 1990 gab es noch nie eine so hohe Beteiligung
  an den ungarischen Wahlen. Noch nie gab es eine ungarische Regierung, die so ein
  starkes Mandat bekommen hat wie unsere Regierung, unsere politische Gemeinschaft.
  Gleichzeitig sehen wir auch, welche Verantwortung so ein Mandat bedeutet, und natürlich
  gibt es auch sehr hohe Erwartungen. Ich habe bereits erlebt und gespürt, dass die
  Erwartungen nicht nur in Ungarn sehr hoch sind, sondern überall in Europa. Auch
  in der Nacht der Wahlen haben wir miteinander gesprochen, und ich hatte auch das
  Glück, mit allen führenden europäischen Politikern zu sprechen. Einige habe ich
  schon persönlich getroffen, und es ist sehr schön, zu sehen, dass die führenden
  europäischen Politiker und die meisten europäischen Mitgliedstaaten sehr glücklich
  über die Zusammenarbeit sind, dieser Zusammenarbeit frohen Mutes entgegenschauen
  und sehr froh darüber sind, dass Ungarn wieder als ehrliches, souveränes, freies
  Land am Tisch der Europäischen Union ist. Ich habe dem Bundeskanzler gegenüber bekräftigt,
  dass Ungarn ein konstruktiver Partner und ein stolzes europäisches Land sein wird.
  Wir werden da sein, wenn Aufgaben zu lösen sind – seien es die neuen MFR -Verhandlungen,
  seien es Verhandlungen zur illegalen Migration, in Bezug auf den Wettbewerb oder
  wenn es um außenpolitische Fragen geht. Ich konnte nicht versprechen, dass wir immer
  gleicher Meinung sein werden. Der Herr Bundeskanzler kennt die Funktionsweise der
  Europäischen Union aber sehr gut, und die europäische Arbeitsweise in Brüssel bedeutet
  auch, dass man Kompromisse eingeht. Ich kann nur versprechen, dass wir immer da
  sein werden, auch wenn ein Kompromiss schwierig sein wird, und wenn es eine Entscheidung
  in der Europäischen Union gibt, dann werden wir versuchen, diese Entscheidung mit
  aller Kraft einzuhalten und umzusetzen. Ich glaube, dass es normal ist, als ehrlicher
  und verlässlicher Partner so miteinander zu verhandeln – sei es bilateral, sei es
  auf europäischer Ebene. Deutschland ist der wichtigste ausländische Investor in
  Ungarn und unser wichtigster Handelspartner. Die Handelsbilanz unserer beiden Länder
  beträgt 67 Milliarden Euro, und glücklicherweise gibt es einen konstanten Zuwachs
  bei den deutschen Investitionen. Viele zehntausende Ungarn arbeiten in deutschen
  Unternehmen. Wir sind sehr stolz auf die Arbeit der deutschen Unternehmen in Ungarn,
  und wir freuen uns darauf, wenn so viele wie möglich zu uns kommen. Ich bin sehr
  stolz darauf, dass sehr viele Ungarn und sehr viele ungarische Unternehmen mit ihrer
  Arbeit und mit ihrem Know-how zur Entwicklung Deutschlands beitragen können. Ich
  habe auch dem Herrn Bundeskanzler gegenüber erwähnt, dass die deutschen Investitionen
  mit dem ungarischen Know-how und der ungarischen Courage zusammen fantastische Dinge
  hervorbringen können, sei es bei Forschung und Entwicklung, sei es bei Verteidigung
  oder in anderen Gebieten. Wir sind also sehr froh darüber, wenn so viele deutsche
  Investoren wie möglich nach Ungarn kommen. Ich habe dem Herrn Bundeskanzler gegenüber
  bereits erwähnt, dass wir uns mit den Vertretern der größten deutschen Investoren
  hinsetzen werden. Wir werden ihnen zuhören. Gleiches werden wir auch bei den ungarischen
  und anderen ausländischen Investoren tun. Wir werden uns anhören, was in der gegenwärtigen
  Situation gut ist, was wir verbessern können, wie wir dazu beitragen können, dass
  noch mehr Investitionen nach Ungarn kommen, dass es noch mehr Investitionen, vielleicht
  auch gemeinsame deutsch-ungarische Investitionen, auf dem Balkan geben kann. Wir
  werden alles dafür tun, dass die politische, kulturelle und wirtschaftliche Zusammenarbeit
  zwischen den zwei Ländern, unseren geliebten Heimatländern, gestärkt wird. Wir haben
  über Energiequellen, über Energieunabhängigkeit gesprochen. Ich habe dem Bundeskanzler
  gegenüber noch einmal unterstrichen, dass die neue ungarische Regierung alles dafür
  tun wird, damit möglichst aus vielen verschiedenen Quellen Energie bezogen werden
  kann, sei es Gas oder Öl, erstens wegen der Energiesicherheit, der Versorgungssicherheit,
  zweitens natürlich wegen des Preises. Denn wenn wir mehrere Quellen in Betracht
  ziehen, dann können wir natürlich günstiger und billiger an diese Energieträger
  kommen. Ich kann auch nur bekräftigen, was Herr Bundeskanzler gesagt hat, dass es
  momentan technische Verhandlungen zwischen der Ukraine und Ungarn gibt. Es geht
  um die sprachliche, kulturelle Zusammenarbeit sowie um die Bildungsrechte der ungarischen
  Minderheit in der Ukraine. Im Moment laufen diese Verhandlungen sehr positiv. Wir
  hoffen, dass wir diese Verhandlungen bereits in dieser Woche auf technischer Ebene
  abschließen können. Hier in Berlin, in dieser wunderbaren, lebhaften Stadt, kann
  ich nur wiederholen, dass ich bereit bin, mit Herrn Selenskyj , mit dem ukrainischen
  Präsidenten, Anfang nächster Woche zu verhandeln, mich mit ihm zu treffen. Dann
  werden wir uns hoffentlich auf die grundsätzlichen Menschenrechte einigen können.
  Wenn man Teil einer Minderheit ist, dann ist es wichtig, dass man die eigene Muttersprache
  verwenden kann, sei es in der Schule, in der Administration oder in der Kultur.
  Das ist kein Extra. Das ist ein grundlegendes Menschenrecht. Wir glauben, dass ein
  Land, das die Beitrittsverhandlungen zur Europäischen Union beginnen möchte, diese
  grundlegenden Menschenrechte einhalten muss. Ich bin sehr optimistisch, dass es
  uns gelingen wird, dieses etwas schwierige Gebiet mit der Ukraine, das schon seit
  zehn Jahren etwas schwierig ist, abzuschließen. Ich bin bereit, dass wir ein neues
  Kapitel in den ukrainisch-ungarischen Beziehungen eröffnen. Noch eine Sache: Ich
  habe gegenüber dem Herrn Bundeskanzler erwähnt, dass eine sehr wichtige außenpolitische
  Priorität für uns nicht nur die Zusammenarbeit innerhalb der Europäischen Union
  und der NATO hat, sondern auch die Zusammenarbeit innerhalb der Visegrád-4-Gruppe.
  Wir möchten die Zusammenarbeit stärken. Die Grundlage dessen war die Stärke der
  polnisch-ungarischen Beziehungen. Ich bin sehr froh, dass wir am 23. Juli ein Gipfeltreffen
  der Visegrád-4-Gruppe in Budapest organisieren können. Donald Tusk, der polnische
  Ministerpräsident, Babiš , der tschechische Ministerpräsident, und Robert Fico,
  der slowakische Ministerpräsident, haben meine Einladung angenommen. Wenn wir dann
  die Verhandlungen hinter uns haben, werde ich vorschlagen, dass wir diese Zusammenarbeit
  innerhalb der Visegrád-Gruppe ausweiten, dass wir Österreich und Deutschland oder
  auch Kroatien, Slowenien und Rumänien an den Verhandlungstisch holen und zusammen
  ein sehr starkes Zentraleuropa bauen. Das bedeutet Zusammenarbeit in der Infrastruktur,
  in der Wirtschaft und in der Kultur. Ich bin sehr froh darüber, dass ich hier sein
  durfte, dass wir hier sein durften. Ich habe den Herrn Bundeskanzler und die Mitglieder
  der deutschen Regierung zu einem Besuch in Ungarn eingeladen. Das wollte ich sagen.
  Wenn Sie Fragen haben, dann stehe ich sehr gerne zur Verfügung. Noch einmal vielen
  Dank für die Einladung und den sehr guten Empfang! Es ist immer eine große Freude,
  in Deutschland zu sein. Oder, um es mit den Worten Kennedys zu sagen: Ich bin ein
  Berliner. Frage: Guten Tag, Herr Ministerpräsident, Sie haben über die historischen
  Beziehungen zwischen Ungarn und Deutschland und auch über die Wirtschaftsbeziehungen
  gesprochen. Es gibt ja Tausende von Verbindungen zwischen der Wirtschaft der beiden
  Länder. Es gibt Tausende von deutschen Unternehmen in Ungarn. Haben Sie über die
  Erweiterungsmöglichkeiten gesprochen, zum Beispiel im Lichte der Energiekrise? Ministerpräsident
  Magyar : Vielen Dank für die Frage. Wie der Herr Bundeskanzler schon sagte, haben
  wir persönlich unter vier Augen, auch beim Mittagessen, darüber gesprochen, dass
  deutsche Unternehmen, deutsche Investoren mit großer Freude nach Ungarn kommen möchten,
  und zwar in größerem Umfang, als sie jetzt schon präsent sind. In der Autoindustrie
  und in Forschung und Entwicklung sind bereits Investoren in Ungarn. Wie der Herr
  Bundeskanzler sagte, kann ich nur bekräftigen, dass bis jetzt das größte Hindernis
  für die Erweiterung die riesige Korruption war, die in Ungarn herrschte, die die
  gesamte Wirtschaft, das politische Leben durchdrang. Ich habe dem Herrn Bundeskanzler
  gegenüber bekräftigt, dass zu den Top-Prioritäten unserer Regierung der Kampf gegen
  die Korruption und die Wiederherstellung der Unabhängigkeit von Justiz und Polizei
  zählen werden. Das ist auch einer der wichtigsten Punkte der politischen Vereinbarungen.
  Es geht hier um 16,4 Milliarden Euro. Das war eine der Bedingungen, dass wir ein
  Amt für Vermögensschutz und Vermögensrückgewinnung ins Leben rufen. Der Herr Bundeskanzler
  hat auch erwähnt: Wenn diese Maßnahmen erfolgreich sein werden, wenn wir in den
  folgenden Jahren noch ein investitionsfreundlicheres Umfeld schaffen können, wenn
  die ungarischen Investitionen genauso behandelt werden wie die deutschen oder die
  internationalen, wenn es also ein Level- Playing-Field geben wird, dann wird es
  auf jeden Fall noch mehr deutsche Investoren geben, sei es in der Verteidigung,
  in Forschung und Entwicklung oder in der Autoindustrie. Das ist unser Ziel. Denn
  für uns ist das Wichtigste, dass die ungarische Wirtschaft wieder in Gang gesetzt
  wird, dass sie effizient wird und das Lebensniveau der Ungarn erhöht wird. Frage:
  Herr Ministerpräsident, der Bundeskanzler hat Vorschläge für eine assoziierte EU
  -Partnerschaft der Ukraine vorgelegt, die eben auch die erwähnte Öffnung der verschiedenen
  Kapitel im regulären Beitrittsprozess beinhaltet. Wie stehen Sie dazu? Sie haben
  eben erwähnt, dass es eine Diskussion über Minderheitsrechte in der Ukraine gibt.
  Machen Sie das zu einer Voraussetzung für eine Öffnung der Kapitel? Herr Bundeskanzler,
  wie wollen Sie Ihren ungarischen Gast davon überzeugen, die militärische Unterstützung
  der Ukraine aufzunehmen, die ja bisher keine Änderungen in diesem Kurs erfahren
  hat? Vielleicht zum Schluss noch ganz kurz eine Frage an Sie beide: Seit dem Wahlabend
  ist viel von einem Momentum in der EU für neue und große Reformen bis hin zu Vertragsänderungen
  die Rede. Bisher ist noch nicht viel davon zu sehen, zum Beispiel auch beim Thema
  außenpolitische Mehrheitsentscheidungen. Warum ist noch nichts da, und was können
  wir da in der nächsten Zeit erwarten? Ministerpräsident Magyar : Ich glaube, wir
  haben mehrfach sehr eindeutig formuliert – das wissen unsere europäischen Partner;
  das wissen alle in der Europäischen Kommission, auch António Costa; und auch die
  ukrainische Partei weiß es –, dass eine grundsätzliche Erwartung von uns ist, dass
  die kulturellen, sprachlichen und anderen Rechte der ungarischen Minderheit in der
  Ukraine geregelt werden. Die Ungarn in der Ukraine, mehr als 100.000 Menschen, wollen
  einfach nur Grundrechte, nicht mehr, und das ist tatsächlich eine Voraussetzung.
  Aber ich glaube, darüber müssen wir jetzt nicht lange reden. Denn es ist zu erwarten.
  Wir sind hoffentlich schon fast bei einem Abschluss. Wie gesagt, dann können wir
  ein neues Kapitel in den ungarisch-ukrainischen Beziehungen eröffnen. Das ist auch
  im Interesse Europas. Die zweite Frage habe ich nicht ganz verstanden. Was hätte
  man in drei Wochen sehen müssen? Oder habe ich vielleicht etwas verpasst oder versäumt?
  Ich bin erst seit drei Wochen im Amt. Ich habe mit meinen Kollegen zusammen bis
  jetzt erreicht, dass wir knapp 16,4 Milliarden Euro nach Ungarn gebracht haben.
  Das sind 13 Prozent des ungarischen Staatshaushalts. Ich glaube, man sieht schon
  sehr starke außenpolitische Unterschiede zwischen der ehemaligen und der jetzigen
  Regierung. Wir werden keine Bots, sondern wir wissen, dass wir Mitglieder eines
  Clubs sind. Natürlich werden wir nicht immer gleicher Meinung sein, aber wir werden
  kein Veto einlegen, nur aus Prinzip. Ein Veto einzulegen ist natürlich ein souveränes
  Recht, aber ich glaube, man sollte das nur dann anwenden, wenn es wirklich um nationale
  Rechte, um die Souveränität geht und wenn es keine Verhandlungsmöglichkeit, keine
  Verhandlungswege mehr gibt. Ich glaube an die Verhandlungen. Ich war neun Jahre
  lang Diplomat in Brüssel. Ich war Diplomat der ehemaligen ungarischen Regierung.
  Es gab natürlich sehr schwierige Verhandlungen. Am Ende konnten wir aber immer einen
  Kompromiss eingehen, und ich musste nie ein Veto einlegen. Bundeskanzler Merz: Vielleicht
  aus meiner Sicht kurz eine Ergänzung: Wir haben im Augenblick keine Pläne, die Verträge
  zu ändern. Unterhalb der Änderung der Verträge gibt es eine ganze Reihe von institutionellen
  Fragen; die werden wir in den nächsten Monaten behandeln. Wir werden auch im nächsten
  Europäischen Rat im Hinblick auf die Kernziele Wettbewerbsfähigkeit und Verteidigung
  einige Diskussionen haben. Wir wollen auch die Diskussion über den Mehrjährigen
  Finanzrahmen fortsetzen. Aber das ist alles etwas, was unterhalb einer Änderung
  des europäischen Primärrechts stattfindet und auch dort stattfinden kann. Wir haben
  über die Ukraine gesprochen. Ministerpräsident Magyar hat dazu seine Stellungnahme
  abgegeben. Ich teile sie voll und ganz, was auch das erste Kapitel betrifft. Im
  Hinblick auf die militärische Unterstützung der Ukraine werden wir jetzt mit der
  neuen ungarischen Regierung sprechen. Wir werden in unserem Engagement für die Ukraine
  nicht nachlassen, und es zeigt ja auch Wirkung. Insofern sind die Sanktionen genauso
  wie die militärische Unterstützung der Ukraine das richtige Instrument, um diesen
  Krieg möglichst schnell zum Ende zu bringen. Ministerpräsident Magyar : Entschuldigung,
  ich möchte das noch ganz kurz ergänzen, wenn ich darf. Vielleicht habe ich Ihre
  Frage etwas missverstanden. Denn es ist jetzt wirklich nicht an der Zeit, die Verträge
  zu ändern. Wir müssen erst einmal wirklich echte, sachliche Arbeit leisten. Ich
  möchte noch einmal klarstellen, dass Ungarn weder Soldaten noch Waffen in die Ukraine
  senden wird, auch nicht unter der neuen ungarischen Regierung. Frage: Herr Ministerpräsident,
  gestern haben wir hier in Deutschland im „Cicero“ ein Interview mit Tamás Sulyok,
  dem Präsidenten der Republik, gelesen. Er kommentierte Ihre Forderung, er solle
  bis zum 31. Mai zurücktreten. Was denken Sie darüber, dass auf der Webseite des
  Präsidialamtes einige Dinge fehlten wie zum Beispiel die Begnadigung und Katalin
  Novák. Eine Frage zum Thema des Libanons an Herrn Bundeskanzler: Was sagen Sie zur
  Eskalation der Lage im Libanon bzw. zu der Tatsache, dass Ihre eigene Ministerin
  ihre Reise aufgrund der israelischen Militäreingriffe abbrechen musste? Ministerpräsident
  Magyar : Ich möchte mit der zweiten Hälfte der Frage beginnen. Der ungarische Präsident
  ist eigentlich eine Marionette von Viktor Orbán. Nur damit auch die Deutschen verstehen
  und aus erster Hand sehen, wie die Orbán-Zensur funktioniert hat und wie die Zensur
  des ungarischen Präsidenten funktioniert: Die Dinge, die ihnen nicht gefallen, werden
  aus dem Interview einfach weggelassen. Die Zitate werden so eingestellt. Es gab
  auch Beispiele in der Presse vom Präsidenten. Als die Stadt Munkács, eine Stadt
  in der Ukraine, in der auch Ungarn leben, im Sommer von einer russischen Rakete
  getroffen wurde, sahen wir auf der Internetseite des Präsidenten, dass dieser Angriff
  gegen die Stadt verurteilt wird. Einige Minuten später wurde aus der Formulierung
  „russischer Angriff“ das Wort „russisch“ gestrichen, auf der offiziellen Webseite
  des Präsidenten. So funktioniert das. Zur ersten Hälfte der Frage: Der Mensch, der
  zwei Jahre lang als Präsident eigentlich die Einheit der ungarischen Nation hätte
  verkörpern müssen, beschwert sich jetzt im Ausland. Er hätte eigentlich die demokratische
  Funktionsweise des ungarischen Staates behüten sollen. Er hat seine Aufgaben einfach
  nicht erledigt. Er hat niemanden beschützt. Er hat einfach zugesehen, wie während
  der Regierung von Viktor Orbán mehrere tausend Kinder von pädophilen Monstern in
  verschiedenen Kinderheimen physisch und seelisch zerstört wurden. Er ist als Präsident
  nur ein einziges Mal zu den Opfern gegangen und hat zwei Kisten Äpfel in einem Kinderheim
  abgeladen. Dieser Präsident hat zugesehen, wie Viktor Orbán die Geheimdienste dazu
  benützte, die größte Oppositionspartei kaputt zu schlagen. Dieser Präsident, der
  sich jetzt beschwert und der jetzt den Schutz des Rechtsstaates fordert, hat dabei
  zugesehen, wie russische Agenten in der ungarischen Wahlkampagne teilnahmen. Er
  hat dabei zugesehen, wie ich als Vorsitzender der größten Oppositionspartei zwei
  Jahre lang nicht in die öffentlich-rechtlichen Fernsehstudios eingeladen wurde und
  dort nicht hineindurfte. Ich weiß nicht, ob man das hier in Deutschland weiß. Wir,
  der Vorsitzende der größten Oppositionspartei – wir haben 50 Prozent, 55 Prozent
  Unterstützung der Ungarn –, wir wurden nicht einmal eine Minute in den öffentlich-rechtlichen
  Fernsehsendern zugelassen. Aber sie haben von früh bis spät Lügen über mich, über
  unsere Partei, über meine Familienmitglieder, über meine Kinder, über meine Eltern
  verbreitet. Sie haben genau das getan, was auch die Kommunisten getan haben, oder,
  wie man damals, 1956, sagte: Sie haben morgens gelogen, mittags gelogen und abends
  gelogen. – Dieser Präsident der Republik, dessen Aufgabe es gewesen wäre, Beschützer
  der demokratischen Staatsordnung zu sein, hat geschwiegen, genauso geschwiegen wie
  damals, als Viktor Orbán, der damalige Ministerpräsident, an unserem Nationalfeiertag
  Millionen von Ungarn als Insekten bezeichnet hat, genauso wie damals in Ruanda,
  drei Wochen bevor Millionen getötet wurden. Dieser Mensch hat dabei zugesehen, was
  Viktor Orbán getan hat, was seine Partei getan hat, wie er unsere Heimat verkauft
  hat, wie er dieses Land zum ärmsten und korruptesten Land der Europäischen Union
  gemacht hat, wie Richter, wie Künstler, wie zivile Funktionäre zurückgelassen und
  im Stich gelassen wurden. So ein Mensch soll einfach schweigen und sich nicht im
  Ausland über seine eigene Heimat beschweren. Entschuldigung, noch ein Satz: Wir
  haben von den Ungarn ein eindeutiges Mandat bekommen. Wir haben nicht die Katze
  im Sack verkauft. Unser wichtigstes Wahlversprechen war: Wenn wir eine Zweidrittelmehrheit
  bekommen, eine verfassungsändernde Mehrheit, dann werden wir diese Menschen und
  diese Marionetten aus dem Leben verschwinden lassen. – Und das werden wir auch tun.
  Bundeskanzler Merz: Ich möchte kurz auf Ihre Frage zum Libanon zurückkommen. Die
  Bundesregierung sieht die jüngste Eskalation der Gewalt im Süden des Landes mit
  großer Sorge. Die Hisbollah muss sofort aufhören, die Menschen in Israel anzugreifen,
  und sie muss ihre Waffen niederlegen. Die Bundesregierung ruft auch Israel dringend
  dazu auf, die im April vereinbarte Waffenruhe einzuhalten und die Zivilbevölkerung
  im Südlibanon zu schützen. Wir ermutigen Israel und Libanon dazu, den eingeschlagenen
  Weg direkter Gespräche fortzusetzen. Gerade jetzt ist dies notwendig, um einen Durchbruch
  auch in den Verhandlungen, die Präsident Trump und die iranische Führung führen,
  zu ermöglichen. Insofern ist es eine schwierige Lage. Ich schließe mich dem an,
  was der Bundesaußenminister bereits gestern in New York dazu gesagt hat. Wir versuchen,
  alles uns Mögliche zu tun, um zu einer Deeskalation beizutragen und die Waffenruhe
  wiederherzustellen. Frage: Herr Ministerpräsident, der Bundeskanzler hat Ihren Wahlsieg
  gerade als inspirierend für Europa bezeichnet. Hier in Deutschland erleben wir gerade
  noch die entgegengesetzte Bewegung, ein Erstarken der AfD , der in weiten Teilen
  rechtsextremen Partei. Was würden Sie unserem Kanzler raten, um gegen die AfD anzukommen?
  Herr Merz, morgen entscheidet sich, ob Deutschland für die nächsten zwei Jahre in
  den UN -Sicherheitsrat gewählt wird. Was würde es für Deutschland bedeuten, nicht
  hineingewählt zu werden? Eine innenpolitische Frage, wenn Sie erlauben: Wie sicher
  sind Sie sich der Unterstützung Ihrer eigenen Leute für die Reformvorhaben der nächsten
  Wochen nach den Debatten um einen möglichen Kanzlertausch in der vergangenen Woche?
  Ministerpräsident Magyar: Erstens: Wir unterstützen die Kandidatur Deutschlands
  im Sicherheitsrat mit großer Freude. Wir hoffen, dass Deutschland diesen Sitz gewinnt.
  Zweitens: Wer bin ich, einem deutschen Bundeskanzler innenpolitische Ratschläge
  zu erteilen! Ich denke nicht, dass das meine Aufgabe ist. Ich kann nur sagen, was
  wir getan haben. Das kann ich ganz kurz zusammenfassen. Ohne jegliche staatliche
  Unterstützung, in einem riesigen Gegenwind, haben zehn, zwölf Personen vor zwei
  Jahren eine Bewegung gegründet. Etwas mehr als zwei Jahre später, nachdem ich mehrere
  Millionen Kilometer hinter mich gebracht, 700 Ortschaften besucht und täglich fünf,
  sieben, acht Reden gehalten habe – auf einem Ford Transit, 30 Jahre alt, habe ich
  zum Beispiel die Reden gehalten –, haben wir die ungarischen Wahlen mit einer großen
  Mehrheit gewonnen. Viele fragen mich nach dem Geheimnis von Tisza, unserer Partei.
  Ich kann darauf nur sagen: Arbeit, Arbeit, Arbeit und Ehrlichkeit. In der Politik
  muss es um die Menschen gehen, auch wenn wir über Wirtschaft, Gesundheit und Infrastruktur
  oder wenn wir über den Umweltschutz reden. Ich habe alles getan, was ich konnte.
  Ich habe Hunderttausende von Menschen besucht. Ich habe ihnen in die Augen geschaut,
  wir haben uns die Hände gereicht, und ich habe ihnen zugehört. Ich bin in wirklich
  sehr kleinen Ortschaften gewesen, in kleinen Ortschaften, in denen vor mir noch
  nie ein lebender oder ein toter Politiker gewesen ist. Ich denke, dass wir aus genau
  diesem Grund solch ein Vertrauen von der ungarischen Bevölkerung bekommen haben.
  Ich weiß auch, dass es eine riesengroße Verantwortung ist. Um mit den Worten von
  József Antall zu sprechen, dem ersten frei gewählten Ministerpräsidenten von Ungarn
  – er hat mit Helmut Kohl sehr viel für eine Wiedervereinigung Ungarns mit Europa
  und von Europa getan und auch den Grundstein für den EU -Beitritt Ungarns gelegt ‑:
  Ich diene und diene so lange, bis die Nation Nutzen daraus zieht. – Ich werde dies
  tun, solange ich kann. Bundeskanzler Merz: Vielen Dank, Péter Magyar , für diese
  kurze Beschreibung des Wahlkampfes in Ungarn! Wir haben mit dem Amtsantritt der
  Bundesregierung im vergangenen Jahr begonnen, für die Mitgliedschaft der Bundesrepublik
  Deutschland im Sicherheitsrat der Vereinten Nationen als nicht ständiges Mitglied
  zu werben. Wir haben die Zustimmung vieler Staaten der Welt bekommen. Ich bin sehr
  dankbar dafür, dass auch Ungarn dazugehört. Wir werden auch von vielen europäischen
  und nicht europäischen Staaten unterstützt. Die Abstimmung findet morgen Nachmittag
  statt. Wir rechnen für den frühen Abend mit einem Ergebnis. Wir haben alles in unserer
  Kraft Stehende getan, auch der Bundesaußenminister, auch ich persönlich und viele
  Kabinettskollegen, um es möglich zu machen, dass wir die Zustimmung der Generalversammlung
  der Vereinten Nationen für einen nicht ständigen Sitz im Sicherheitsrat der Vereinten
  Nationen bekommen. Ich hoffe, dass wir damit morgen erfolgreich sind.'
