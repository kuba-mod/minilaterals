title: Fragen und Antworten Private Altersvorsorge wird attraktiver
text: 'Eine private Altersvorsorge kann dabei helfen, mögliche Versorgungslücken im
  Rentenalter zu schließen. Die Gesellschaft braucht ein Rentensystem, das zukunftssicher
  und finanzierbar ist – für eine verlässliche Alterssicherung aller Generationen.
  Neben der gesetzlichen Rente und der betrieblichen Altersvorsorge ist die private
  Altersvorsorge deshalb ein wichtiger Baustein, um mögliche Versorgungslücken im
  Rentenalter zu schließen. Damit es wieder attraktiv wird, auch privat für das Alter
  vorzusorgen, wurde sie reformiert. Das Bundeskabinett hat die Reform der steuerlich
  geförderten privaten Altersvorsorge am  17. Dezember 2025 verabschiedet. Am 27.
  März 2026 hat der Deutsche Bundestag die Reform inklusive einiger Änderungen beschlossen.
  Der Bundesrat stimmte am 8. Mai 2026 zu. Die Reform trat Ende Mai in Kraft, die
  Umsetzung erfolgt erst zum 1. Januar 2027 – ab dann sollen die neuen Altersvorsorgeprodukte
  für Bürgerinnen und Bürger zur Verfügung stehen. Die Riester-Rente wird durch neue,
  flexiblere, renditenstärkere und kostengünstigere Produkte ersetzt. Ein zentraler
  Bestandteil der Reform ist die Öffnung der steuerlichen Förderung für ein Altersvorsorgedepot ohne
  Garantie. So können Bürgerinnen und Bürger von Kapitalanlagen mit höheren Renditechancen
  profitieren, zum Beispiel durch global gestreute Aktien, sogenannte ETF . Für Menschen,
  die ein höheres Sicherheitsbedürfnis haben, wird weiterhin auch der Abschluss von
  Garantieprodukten möglich sein. Für mehr Orientierung bei der Anlageentscheidung
  wird ein kostengünstiges Standardprodukt geschaffen, das bei jedem Anbieter von
  Altersvorsorgeprodukten verfügbar sein wird. Zudem erhalten Bürgerinnen und Bürger
  künftig in der Auszahlungsphase der privaten Altersvorsorge mehr Flexibilität. Hier
  sollen neben lebenslangen Renten auch Zeitrenten angeboten werden. Die Kosten beim
  Standarddepot werden auf 1,0 Prozent begrenzt. Die gesetzliche Rente und betriebliche
  Altersvorsorge reichen in manchen Fällen nicht aus, um mögliche Versorgungslücken
  im Rentenalter zu schließen. Wer also privat vorsorgt, kann dem entgegenwirken und
  somit seinen persönlichen Lebensstandard im Alter besser absichern. Neben Arbeitnehmerinnen
  und Arbeitnehmern können künftig auch Selbstständige, Freiberufler und Gewerbetreibende
  von der staatlichen Förderung profitieren. Die Zulagenförderung wird grundlegend
  reformiert, um höhere Anreize zur Vorsorge zu setzen. Für jeden Spar-Euro gibt es
  künftig 50 Cent vom Staat bis zu einer Einzahlung von 360 Euro im Jahr, darüber
  hinaus bis 1800 Euro sind es 25 Cent. Damit erhöht sich die Grundzulage auf 540
  Euro. Darüber hinausgehende Einzahlungen in einen Altersvorsorgevertrag bis 6.840
  Euro sind möglich, die Zulage erhöht sich dadurch aber nicht. Wer vor dem 25. Geburtstag
  einen Altersvorsorgevertrag abschließt, erhält zusätzlich einmalig 200 Euro Berufseinsteigerbonus.
  Familien sollen besonders stark profitieren: Die volle Kinderzulage von 300 Euro
  pro Kind und Jahr soll künftig bereits bei einem monatlichen Sparbeitrag von 25
  Euro gewährt werden. Bestehende Riester-Verträge laufen weiter: Wer bereits einen
  Riester-Vertrag abgeschlossen hat, kann diesen auch nach der Reform weiter besparen.
  Es gibt keine automatische Kündigung oder Umwandlung. Ab 2027 können allerdings
  keine Verträge mehr nach altem Riester-Modell abgeschlossen werden. Bürgerinnen
  und Bürger können freiwillig in das neue Altersvorsorgedepot wechseln. Der Anbieter-Wechsel
  soll künftig zudem erleichtert werden. Die neuen Produkte sollen ab dem 1. Januar
  2027 angeboten werden.'
