date: '2026-06-19'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 19. Juni 2026
text: 'stellvertretender Regierungssprecher Meyer (Vorsitzende Hamberger eröffnet
  die Pressekonferenz und begrüßt SRS Meyer sowie die Sprecherinnen und Sprecher der
  Ministerien.) (zu den Terminen des Bundeskanzlers ) Wir freuen uns ‑ auch aufgrund
  der sommerlichen Temperaturen ‑ sehr auf den Tag der offenen Tür der Bundesregierung
  am kommenden Wochenende. Das Kanzleramt, die Bundesministerien und auch wir im Bundespresseamt
  öffnen die Türen für Besucherinnen und Besucher für den direkten Austausch mit vielen
  Mitgliedern auch des Kabinetts und auch für eine Reihe von wirklich spannenden Rahmenprogrammpunkten
  rundherum. Noch ein kurzer Hinweis: Am Sonntag findet der Veteranentag hier am Reichstagsgebäude
  statt. Auch dort gibt es, wie bereits angekündigt, einen Auftritt des Bundeskanzlers.
  Damit sind wir in der nächsten Woche. Es geht sportlich in die kommende Woche: Am
  Montag, dem 22. Juni, empfängt der Bundeskanzler um 16 Uhr feierlich die Medaillengewinnerinnen
  und -gewinner der Olympischen und Paralympischen Winterspiele im Bankettsaal des
  Bundeskanzleramts. Vorab wird der Bundespräsident die 48 deutschen Athletinnen und
  Athleten für ihre herausragenden Leistungen mit dem Silbernen Lorbeerblatt auszeichnen.
  Mit der Verleihung der höchsten sportpolitischen Auszeichnung Deutschlands und dem
  anschließenden feierlichen Empfang im Bundeskanzleramt werden die herausragenden
  sportlichen Leistungen und Erfolge der Medaillengewinnerinnen und -gewinner honoriert
  und gewürdigt. Am Dienstag um 9 Uhr wird die Alterssicherungskommission ihren Bericht
  zur Rentenreform an die Bundesregierung übergeben. Die beiden Vorsitzenden, Frank-Jürgen
  Weise und Constanze Janda, werden den Bericht Bundeskanzler Merz und Bundesministerin
  Bas im Kanzleramt überreichen. Auch die anderen Mitglieder der Kommission werden
  vor Ort anwesend sein. Es wird Statements von Bundeskanzler Merz und Bundesministerin
  Bas geben. Im Anschluss findet eine Pressekonferenz mit den beiden Vorsitzenden
  der Kommission statt, um weitere Details zu besprechen. Danach wird der Bundeskanzler
  ab 10.30 Uhr am Tag der Industrie des Bundesverbandes der Deutschen Industrie auf
  dem EUREF-Campus Berlin teilnehmen und dort eine Rede halten. Im Anschluss folgt
  ein kurzes moderiertes Bühnengespräch mit dem Bundeskanzler und BDI-Präsidenten
  Peter Leibinger. Die Veranstaltung hat das Motto: „Stärke. Sicherheit. Zukunft -
  Made by Europe“. Die Rede des Bundeskanzlers wird live auf der Homepage des BDI
  gestreamt. Danach wird der Bundeskanzler gegen 12 Uhr den Präsidenten Senegals,
  Herrn Bassirou Diomaye Faye , mit militärischen Ehren zu einem Gespräch im Kanzleramt
  empfangen. Themen werden unter anderem der Ausbau der wirtschaftlichen Zusammenarbeit,
  die Lage in der Sahel-Region und geopolitische Fragen sein. Vor dem Gespräch von
  Bundeskanzler Merz und dem senegalesischen Präsidenten Faye sind Pressestatements
  geplant. Der Mittwoch startet mit dem Kabinett unter der Leitung des Bundeskanzlers.
  Am Nachmittag wird sich der Bundeskanzler von 14 Uhr bis 15 Uhr bei seiner vierten
  Regierungsbefragung den Fragen der Bundestagsabgeordneten im Bundestagsplenum stellen. Wie
  bei der Regierungsbefragung üblich, wird der Bundeskanzler zu Beginn ein kurzes
  Statement zu Themen von aktuellem Interesse halten. Daran schließen sich die Fragen
  der Abgeordneten an. Am Donnerstag, dem 25. Juni , wird der Bundeskanzler an der
  Ukraine Recovery Conference in Danzig teilnehmen, die in diesem Jahr gemeinsam von
  Polen und der Ukraine ausgerichtet wird. Der Bundeskanzler wird im Eröffnungssegment
  der Konferenz sprechen. Im Vordergrund dieser breit aufgestellten internationalen
  Unterstützungskonferenz steht der Wiederaufbau der Ukraine als gesamtgesellschaftliche
  Aufgabe. Die Förderung einer stabilen, demokratischen und wirtschaftlich prosperierenden
  Ukraine liegt in unserem Interesse. Die durch den russischen Angriffskrieg verursachten
  Verluste und Schäden sind immens und mit öffentlichen Mitteln allein nicht zu bewältigen.
  Öffentliche und private Akteure müssen hier eng zusammenarbeiten. Das ist das Ziel
  auch dieser Ukraine Recovery Conference. Danach reist der Bundeskanzler wieder nach
  Deutschland. Um 15 Uhr kommt er dort zu seiner regulären Besprechung mit den Regierungschefinnen
  und Regierungschefs der Länder zusammen - Stichwort: MPK . Ohne der Diskussion vorgreifen
  zu wollen, kann ich Folgendes sagen: Einen wichtigen Schwerpunkt der Besprechung
  wird das Thema Staatsmodernisierung einnehmen. Bund und Länder werden sich insbesondere
  zum Stand der Umsetzung der Föderalen Modernisierungsagenda austauschen - ein Großprojekt,
  bei dem es gelingen soll, unnötige Bürokratie zurückzubauen und den Alltag für Menschen
  und Unternehmen zu erleichtern. Das hat für Bund und Länder wirklich hohe Priorität.
  Es gab in den vergangenen Wochen eine Reihe von sehr intensiven Gesprächen. Auch
  das wird Thema bei der Besprechung am kommenden Donnerstag sein. Darüber hinaus
  werden Bund und Länder den „Pakt für den Rechtsstaat“ beschließen und damit einen
  wichtigen Schritt zur Modernisierung unserer Justiz unternehmen. Außerdem wird es
  eine Übereinkunft zu „Visa- und Aufenthaltserlaubnisverfahren internationaler Studierender
  und Forschender“ geben. Ferner werden wichtige Themen der Bund-Länder-Zusammenarbeit
  im Fokus stehen, wie etwa Fragen der Veranlassungskonnexität ‑ also die Frage, wer
  Kosten übernimmt ‑ sowie des effizienten Ressourceneinsatzes bei Leistungsgesetzen.
  Schließlich wird der Kanzler mit den Ländern über die Europapolitik, die Außen-
  und Sicherheitspolitik sowie die Energiepolitik sprechen. Im Anschluss der Besprechung
  findet, wie gewohnt, eine Presseunterrichtung mit dem rheinland-pfälzischen Ministerpräsidenten
  Gordon Schnieder und dem niedersächsischen Ministerpräsidenten Olaf Lies im Bundeskanzleramt
  statt. Über die Details ‑ Uhrzeit etc. ‑ informieren wir Sie noch rechtzeitig. Am
  Donnerstagabend wird der Bundeskanzler am traditionellen Sommerfest des Parlamentskreises
  Mittelstand der CDU-/CSU-Bundestagsfraktion teilnehmen. Er wird dort eine Festrede
  halten. Diese Rede ist presseöffentlich. Am Freitag, dem 26. Juni, besucht der Bundeskanzler
  die Firma Salutas Pharma GmbH in Barleben . Die Firma ist eine Tochtergesellschaft
  der Hexal AG innerhalb des Schweizer Arzneimittelherstellers Sandoz. Dort macht
  sich der Kanzler einen Eindruck von dem hochmodernen Produktionsstandort. Mit knapp
  1400 Mitarbeitenden ist Salutas in Barleben der größte Produktionsstandort für Pharmaprodukte
  innerhalb des Sandoz-Verbunds und zugleich ein herausragendes Beispiel für zukunftsfähige
  Arbeitsplätze in den ostdeutschen Bundesländern . In Barleben werden jährlich etwa
  10 Milliarden Kapseln und Tabletten unter anderem zur Krebstherapie hergestellt
  und weltweit exportiert. Die Bundesregierung will die Rahmenbedingungen der Pharmabranche
  für die Entwicklung und Produktion von Arzneimitteln weiter verbessern. Die Pharmaindustrie
  und Medizintechnik in Deutschland gehören zur Leitwirtschaft und sind für uns eine
  Schlüsselindustrie. Ein Pressestatement des Bundeskanzlers ist für 18.30 Uhr geplant.
  (zur Übergabe des Berichts der Alterssicherungskommission ) Wie sieht der weitere
  Zeitplan aus? Wann wird entschieden, welche Vorschläge umgesetzt werden? Wir übergeben
  am kommenden Dienstag erst einmal den Bericht. Das ist wirklich ein ganz wesentlicher
  Meilenstein. Es war uns sehr wichtig, dieses wichtige Thema ‑ „Wie organisieren
  wir die Alterssicherung in der Zukunft? Wie stellen wir die Rente auch für die Zukunft
  auf?“ ‑ gemeinsam mit Expertinnen und Experten aus der Politik, aber auch aus der
  Wissenschaft intensiv zu diskutieren. Nun liegt offensichtlich ein Bericht vor,
  der am Dienstag präsentiert wird. Alle weiteren Schritte gehen wir danach an. Herr
  Meyer, mich interessiert die genaue Zielsetzung des Empfangs des senegalesischen
  Präsidenten . Das ist ja eine Person, der man in Senegal sehr viel zugetraut hat,
  die aber auch bereits dabei ist, die Meinungs-, Presse- und letztendlich auch Sexualitäts-
  und Identitätsfreiheit einzuschränken. Was will der Bundeskanzler mit diesem Empfang
  für Deutschland und die Beziehungen zum Senegal erreichen? Grundsätzlich würde ich,
  wie immer, den Gesprächen nicht vorgreifen. Es ist aber so, dass sich Präsident
  Faye für verschiedene Termine in Deutschland aufhält. Er wird, wenn ich richtig
  informiert bin, mit Ministerin Alabali Radovan auch am Deutsch-Senegalesischen Wirtschaftstag
  in Berlin teilnehmen, der anlässlich der Regierungsverhandlungen zur Entwicklungszusammenarbeit
  veranstaltet wird. Deutschland und Senegal pflegen vielfältige und gute Beziehungen,
  zum Beispiel in den Bereichen Entwicklungszusammenarbeit, Wirtschaft, aber auch
  Sicherheit. Angesichts der wirklich prekären Sicherheitslage im Zentralsahel ist
  die Zusammenarbeit mit stabilen Staaten in Westafrika wie Senegal für uns von großer
  Bedeutung. Deutschland und Senegal arbeiten deshalb seit Langem sicherheitspolitisch
  zusammen. Das ist der Rahmen, in dem dieser Termin stattfindet. Die Bundesbildungs-
  und Familienministerin Karin Prien wird am Montag nach Paris reisen, wo sie an der
  13. Sitzung der Deutsch-Französischen Parlamentarischen Versammlung teilnehmen wird.
  Dort wird sie zu familienfreundlicher Politik, Digitalisierung im Alltag und Jugendmedienschutz
  sowie Themen der Gleichstellungspolitik sprechen. Im Rahmen der Reise wird sie unter
  anderem Gespräche mit der Ministerin für Sport, Jugend und Vereinswesen, Marina
  Ferrari, und dem französischen Bildungsminister, Édouard Geffray, führen. Wir haben
  es gerade schon gehört: Die Ukraine Recovery Conference wird nächste Woche in Danzig
  stattfinden. Vom 25. bis 26. Juni richten die ukrainischen und polnischen Regierungen
  gemeinsam die jährliche Konferenz zur zivilen Unterstützung der Ukraine für den
  Wiederaufbau aus. Neben dem Bundeskanzler wird auch Entwicklungsministerin Reem
  Alabali Radovan anreisen. Sie wird vor allem die deutsche Unterstützung für die
  wirtschaftliche Zusammenarbeit für den Wiederaufbau auf der Konferenz einbringen.
  Begleitet wird Alabali Radovan von Entwicklungsstaatssekretär Niels Annen, der Deutschland
  bis zum 26. Juni vor Ort vertreten wird. Er nimmt bereits am 24. Juni als Vertreter
  der Bundesregierung beim Steuerungstreffen der Ukraine Donor Platform, dem wichtigsten
  Koordinierungsgremium für die internationale Unterstützung der Ukraine bei Finanzhilfen,
  Reformen und Wiederaufbau, teil. (zum Iran und zu der Straße von Hormus ) Frau Deschauer,
  eine entscheidende Säule dieses wackeligen Abkommens ist, dass Libanon einbezogen
  wird. Nun hat allerdings die israelische Regierung weitere Angriffe im Libanon geflogen.
  Frankreichs Außenminister hat heute Morgen Israel aufgefordert, diese Angriffe einzustellen.
  Ist das auch die Position des deutschen Außenministers? Fordert auch er, dass Israel
  die Angriffe im Libanon einstellt? Ich kann für den Außenminister und für die Bundesregierung
  insgesamt sagen, dass wir natürlich der Meinung sind, dass der Weg, auf dem sich
  Libanon und Israel befunden haben, in Gesprächen perspektivisch eine dauerhafte,
  befriedete Lösung zu finden, genau der Weg ist, den wir anstreben. Das haben wir
  immer unterstrichen. Dazu gehört auch, dass beiderseitig entsprechende Maßnahmen
  militärischer Art zu unterlassen sind. Das gilt für die Hisbollah, die ihre Angriffe
  auf Israel zu unterlassen hat. Aber das gilt auch dahin gehend, dass die israelische
  Seite natürlich insbesondere zivile Infrastruktur und Zivilisten im Libanon besonders
  zu betrachten und zu schonen hat. Wir sind natürlich der Auffassung, dass alles
  getan werden muss, damit das Rahmenabkommen, das es zwischen den USA und dem Iran
  gibt, jetzt ermöglicht wird. Dazu gehört natürlich auch die Fragestellung, die Sie
  hier angerissen haben. Ich habe jetzt aber nicht gehört, dass Sie sich explizit
  den französischen Forderungen anschließen. Dann habe ich eine Frage an das Verteidigungsministerium
  zur Straße von Hormus: Wie weit und in welchem Umfang sind die deutschen militärischen
  Vorbereitungen gediehen, um sich dort an der Befahrbarkeit, also konkret der Minenräumung,
  zu beteiligen? Wie wir hier schon mehrfach betont haben, sind unsere Marineeinheiten,
  vor allen Dingen das Minenjagdboot „Fulda“ und unser Tender, exzellent auf den Einsatz
  vorbereitet. Ich möchte aber betonen, dass natürlich die Voraussetzungen dafür vorliegen
  müssen. Ich kann Ihnen sagen, dass es eine Vorstationierung geben wird. Sie haben
  möglicherweise auch vernommen, dass die Schiffe gestern den Suezkanal passiert haben
  ‑ im Übrigen mit ihrem britischen Schwesterschiff, der „Lyme Bay“; sie werden noch
  auf andere alliierte Schiffe treffen ‑ und dann in Dschibuti vorstationiert werden.
  Es liegt in der Natur der militärischen Vorbereitungen, dass wir selbstverständlich
  alle Vorplanungen gut durchdenken und mit unseren Alliierten absprechen. Hier kann
  ich noch mal betonen: Die Marineeinheiten sind sehr gut auf einen möglichen Einsatz
  vorbereitet. Ich glaube, die Wortwahl, wie wir Dinge formulieren, ist uns immer
  individuell überlassen. Das kennen Sie, und das ist einfach so. Ich glaube, ich
  habe deutlich gemacht, dass wir nachdrücklich zum Einhalten der vereinbarten Waffenruhe
  auffordern. Das ist, glaube ich, der Appell der Bundesregierung. Er ist sehr konsistent,
  und er gilt natürlich mit umso größerer Dringlichkeit in einer Lage, in der dies
  ein Schlüsselelement sein kann, um insbesondere bei dem Rahmenabkommen und dessen
  Umsetzung und dann hoffentlich in Gesprächen, die demnächst stattfinden sollen,
  voranzukommen. ‑ Dies noch als Ergänzung Ihres Kommentars. Frau Flottillenarzt,
  ich habe eine kleine Detailnachfrage im Rückblick auf den Einsatz der Minensucher
  1991, weil Sie sagten, die Marine sei exzellent vorbereitet: Verfügt die „Fulda“
  mittlerweile über eine Klimaanlage? Die Frage bringt mich etwas zum Schmunzeln.
  Seit 1991 ist eine Menge passiert. Selbstverständlich entspricht unsere Ausstattung
  den klimatischen Bedingungen. Selbstverständlich ist es warm, so wie hier heute
  auch. Aber der typische Bundeswehrsoldat ist auf verschiedene Klimazonen eingestellt.
  Sie dürfen mir glauben, dass das auch für die Besatzung der „Fulda“ zutrifft. Herr
  Meyer, es soll zu dem Thema nächste Woche Beratungen der E5 auf Chefebene geben.
  Können Sie dazu etwas sagen? Ich kann generell bestätigen, dass in der kommenden
  Woche Gespräche im E5-Rahmen geplant sind. Den genauen Gesprächsinhalten kann ich
  da nicht vorgreifen. Es geht sicherlich ein Stück weit auch um die Vorbereitung
  des anstehenden NATO-Gipfels. Da wir gerade das Thema der Straße von Hormus hatten
  ‑ das BMVg hat das sehr richtig dargestellt ‑: Wir bereiten uns natürlich auf Szenarien
  vor. Auch der Bundeskanzler hat gestern noch einmal sehr stark darauf hingewiesen,
  dass wir jetzt am Anfang einer Diskussion stehen. Auch innerhalb des Kabinetts werden
  wir beraten. Wir sind bereit, einen Beitrag zu leisten, wenn das notwendig ist,
  und werden jetzt über die Rahmenbedingungen und die rechtlichen Grundlagen eines
  möglichen Mandats ‑ wie gesagt: Parlamentsvorbehalt ‑ und alles, was dazugehört,
  auch innerhalb der Bundesregierung weiter beraten. Laut einer Ankündigung der NATO
  soll dieses E5-Format am Mittwoch stattfinden. Herr Rutte wird sich dabei aus Washington
  einwählen. Können Sie Mittwoch bestätigen? Wie gesagt, teilen wir die genauen Rahmendaten
  ‑ Teilnehmer etc. ‑ mit, sobald alles wirklich feststeht. Ich kann Ihnen aber sagen,
  dass Mittwoch kein „bad guess“ ist. Ich habe eine Frage an das Verteidigungsministerium:
  Wie ist der Stand bei den Gesprächen über einen Einstieg des Bundes bei KNDS ? Dazu
  kann ich Ihnen sagen, dass die Verhandlungen laufen. Aber ich bitte um Verständnis
  dafür, dass wir uns dazu nicht einlassen können. Mehr kann ich Ihnen dazu heute
  leider nicht mitteilen. Wir haben uns schon grundlegend zum Stand der Verhandlungen
  geäußert. Ansonsten kann ich mich nur dem anschließen, dass wir uns zu laufenden
  Verfahren und auch zu Vorstellungen über eine Höhe des Preises nicht äußern. Können
  Sie perspektivisch etwas zum Zeitplan sagen? Es sieht gut aus. Wir sind in intensiven
  Gesprächen. Dem würde ich jetzt nichts weiter hinzufügen. Ich habe eine Frage an
  das BMAS: Es gibt große Kritik an dem Entwurf zur Arbeitszeiterfassung . Sieht das
  Ministerium diesen Entwurf im Einklang mit dem Koalitionsvertrag? Ich verstehe Ihr
  Interesse, aber meine Antwort wird Sie wenig überraschen: Das BMAS nimmt zu internen
  Arbeitsfassungen keine Stellung. Im Koalitionsvertrag ist vereinbart, dass Vertrauensarbeitszeit
  ohne Zeiterfassung möglich sein soll. Das steht auch im Referentenentwurf. Wie kann
  man von den Arbeitgebern erwarten, zu überprüfen, dass ihre Angestellten die Arbeitszeiten
  einhalten, wenn das nicht erfasst wird? Ich verstehe Ihre Frage, aber wir sprechen
  im Moment nicht über die interne Arbeitsfassung. Wir werden bald einen Entwurf vorlegen.
  Dann können wir gern über die Fragen sprechen. Können Sie etwas zum Zeitplan sagen?
  Können Sie schon sagen, wann der Entwurf kommt und ob es schon einen angestrebten
  Kabinettstermin gibt? Eine Prognos-Studie besagt, dass Hitzewellen die Volkswirtschaft
  wegen sinkender Produktivität etliche Milliarden kosteten. Gibt es im Rahmen dieser
  Reform auch Erwägungen der Bundesregierung, darauf durch Gegenmaßnahmen bei Hitzewellen
  wie mehr Gleitzeit oder Arbeitszeitverlagerung Rücksicht zu nehmen? Generell kann
  ich sagen: Dem BMAS ist der Schutz von Beschäftigten vor Hitzebelastungen natürlich
  sehr wichtig. Wie Sie schon sagten, wird gerade mit zunehmenden Extremtemperaturen
  der betriebliche Hitzeschutz immer noch wichtiger. Arbeitgeber sind dazu verpflichtet,
  Arbeitsbedingungen so zu gestalten, dass die Gesundheit der Beschäftigten nicht
  gefährdet wird. Das betrifft ganz verschiedene Bereiche, aber eben auch den Schutz
  vor Belastungen durch Hitze. Die Arbeitsstättenverordnung enthält bereits allgemeine
  Vorgaben zum Schutz vor gesundheitlich belastenden Raumtemperaturen. Konkretisiert
  werden diese Anforderungen durch die Technischen Regeln für Arbeitsstätten. Darin
  geht es um Dinge wie Raumtemperatur und Lüften. Aktuell werden die Regelungen für
  Arbeiten im Freien weiterentwickelt. Der Arbeitsschutz entwickelt sich also kontinuierlich
  weiter, gerade auch mit Blick auf die Folgen des Klimawandels. Was konkret Arbeitszeitmodelle
  und betriebliche Lösungen angeht, unterschiedet sich das sehr stark, je nach Branche
  und Betrieb. Schon heute nutzen viele Betriebe Möglichkeiten, Arbeitszeiten an Hitzetagen
  flexibel anzupassen. Solche Lösungen werden im Betrieb und gemeinsam mit den Sozialpartnern
  getroffen. Gibt es Überlegungen, darauf im Gesetz noch konkret einzugehen und das
  zu konkretisieren? An das BMG: Die US-Regierung beklagt die Arzneimittelpolitik
  in Deutschland . Jetzt soll geprüft werden, ob es Strafzölle geben solle. Können
  Sie dazu etwas sagen? Die Berichte sind uns bekannt. Als BMG und als Bundesregierung
  insgesamt stehen wir natürlich mit allen Partnern im Austausch. Die Bundesgesundheitsministerin
  hat sich in dieser Woche am Rande des EPSCO-Treffens gegenüber der Presse dazu geäußert
  und bestätigt, dass es Gespräche mit den USA gibt, unter anderem zu Arzneimittelpreisen.
  Zu der Untersuchung an sich kann ich natürlich nichts sagen; dafür müssten Sie sich
  an die US-Regierung wenden. Etwaige Ergebnisse bleiben abzuwarten. Gab es vonseiten
  der US-Regierung eine direkte Kontaktaufnahme mit dem Gesundheitsministerium oder
  Ähnliches? Ich verweise auf das, was die Ministerin beim EPSCO gesagt hat. Wie gesagt,
  stehen wir ständig im Austausch mit unseren Partnern und natürlich auch mit den
  USA. Mehr kann ich Ihnen dazu nicht sagen. Frau Deschauer, nach Berichten erwägt
  der Minister, die deutschen Beiträge an die Vereinten Nationen zu reduzieren . Können
  Sie dazu etwas sagen? Ja, sehr gern. Ich gebe erst einmal eine Leseempfehlung ab,
  und zwar für ein Interview in der „Rheinischen Post“. Ich habe wahrgenommen, dass
  eine verkürzte Berichterstattung darüber stattgefunden hat. Das Interview hat der
  Minister diese Woche gegeben. Darin geht es auch um die Fragestellung, wie Deutschland
  in den Vereinten Nationen engagiert ist. Er macht sehr deutlich, dass wir dort sehr
  engagiert bleiben und dass das für ein Land wie Deutschland, eine Mittelmacht, eine
  sehr große Volkswirtschaft, eine der größten der Welt, ein zentraler Bezugsrahmen
  und unser internationales Koordinatensystem ist. Er erläutert dann auch die Grundlage,
  die, denke ich, jeder sinnvollen Prüfung von Investitionen und dem Einsatz von deutschen
  Steuergeldern und von Mitteln immer zugrunde liegt. So ist es auch im Rahmen unserer
  UN-Politik. Wir schauen natürlich immer genau, wofür wir die Mittel verwenden. Ich
  kann das jetzt nicht konkret herunterbrechen, aber Sie wissen vielleicht, ganz grob
  gesagt, dass es bei den Vereinten Nationen Pflichtbeiträge gibt, die nach einem
  bestimmten Schlüssel festgesetzt sind. Daneben gibt es projekt- und organisationsgebundene
  Beiträge. Es ist guter Usus, dass Deutschland und andere Staaten immer sehr genau
  schauen, wofür man diese Mittel verwendet. Wir sind einer der größten Beitragszahler,
  setzen uns für Stabilität und das regelbasierte System in der Welt ein und sind
  dort weiterhin sehr aktiv engagiert. Ich denke, die beste Antwort zu meiner Ausführung,
  die einordnend war, ist wirklich die Leseempfehlung. Daraus geht es hervor. Ich
  meine, das Interview gelesen zu haben. Sie haben recht, aus einer Äußerung wurde
  die Nachricht gemacht, Kürzungen würden erwogen. Das lässt sich aber, wie ich meine,
  aus dem Interview so nicht herauslesen. Wie ist denn die Haltung des Auswärtigen
  Amtes? Wird das erwogen oder nicht, wenn Sie sich die freiwilligen Beiträge anschauen?
  Die Haltung ist so, wie ich sie beschrieben habe. Wie Kolleginnen und Kollegen unter
  Ihnen zu der verkürzten Nachricht, Meldung oder Headline kommen, müssten Sie im
  Kollegenkreis klären. Meine Frage richtet sich an das Wirtschaftsministerium mit
  Blick auf die Messe Intersolar Europe, die nächste Woche in München stattfindet,
  und mit Blick auf das geplante Netzanschlusspaket . Die Branche macht sich große
  Sorgen, dass in den zukünftig kapazitätslimitiert ausgewiesenen Gebieten der Ausbau
  komplett zum Erliegen kommt. Das würde zum Beispiel große Teile Bayerns betreffen.
  Was entgegnen Sie auf diese Sorge? Ist sie berechtigt? Kann es sein, dass es dann
  sozusagen blinde Flecken gibt? Wir sind gerade dabei, das Netzanschlusspaket innerhalb
  der Bundesregierung zu beraten, um es dann ins Kabinett zu bringen und weiterzuführen.
  Natürlich nehmen wir Sorgen prinzipiell ernst. Aber gerade darum geht es ja. Wo
  können Anschlüsse gut funktionieren? Wo kommt es nicht zu Überbelastungen? Wo kommt
  es nicht zu Unterbelastungen? Wo kann auch die erneuerbare Energie gut eingespeist
  werden, aber auch nicht zu viel, sodass es nicht zu viel Zahlungen gibt und die
  Kosten dann nicht auf andere Verbraucherinnen und Verbraucher umgeschlagen werden?
  All das ist Teil davon. Wir sind im ständigen Gespräch mit den Ländern. Wir sind
  im Gespräch mit den Verbänden. Wir nehmen die Sorgen ernst. Aber wir sind auch dabei,
  das in dem Paket so gut aufzuschlüsseln, dass es funktioniert. Ich vermute, meine
  Frage geht vorrangig an das Auswärtige Amt bzw. den Bundesbeauftragten für Kultur.
  Gerade wurde verkündet, dass Kulturgüter an Polen zurückgegeben worden sind, die
  während des Zweiten Weltkriegs von Deutschland gestohlen wurden. Wie sieht es denn
  im Gegenzug aus? Es gibt ja auch Kulturgüter in Polen , auf die die Bundesrepublik
  noch Anspruch erhebt, etwa die Berlinka-Sammlung, eine Handschrift unserer Nationalhymne.
  Gab es diesbezüglich schon eine Rückgabe ? Wie ist da der Stand? Grundsätzlich hat
  der Kulturstaatsminister zur gesamten Thematik sehr umfassend informiert. Ich glaube,
  auch mehrere Mitglieder der Bundesregierung, unter anderem der Außenminister, haben
  sich dazu geäußert. Darauf würde ich verweisen. Zu weitergehenden Fragen empfehle
  ich, sich an die Pressestelle des BKM zu wenden. Über das hinaus, was ohnehin kommuniziert
  wurde, liegen mir keine weiteren Erkenntnisse vor. Kann das Auswärtige Amt etwas
  dazu sagen? Denn ich glaube, federführend ist das AA. Ich glaube, wir sind hier
  an der Schnittstelle, aber machen das wie immer sehr gerne im Tandem. Ich habe im
  Moment auch keine Ergänzungen; da müsste ich mich noch einmal intensiver erkundigen.
  Der Außenminister hat sich aber zum Deutsch-Polnischen Forum und in diesem Zusammenhang
  auch zur Kulturgüterrückgabe geäußert. Aber der Anlass war jetzt erst einmal nur
  die eine Richtung? Genauso wie der Kollege habe ich im Moment nichts zu ergänzen.
  Ich habe leider doch noch eine Nachfrage: Auch die Deutsche Welle hat vom Außenminister
  entsprechende Aussagen bekommen. Weil das unter anderem in Griechenland ein großes
  Echo ausgelöst hat, würde ich gerne wissen, wie sich die Bundesregierung zu dem
  Thema Restitution ‑ das ist es ja letztendlich ‑ und Rückgabe von Kulturgütern aufstellt.
  Wie gesagt, es ist relativ umfassend informiert worden. Ich würde Sie da noch einmal
  bitten, sich im Zweifel an die Pressestelle des BKM zu wenden. Momentan habe ich
  nichts zu ergänzen. Wie gesagt, die Pressemitteilung vom Mittwoch war sehr umfangreich;
  ich glaube, rundherum wurde auch gebrieft. Ich glaube, da findet man erst einmal
  alles zu diesem Thema. An das Auswärtige Amt: Die türkische Gemeinde kritisiert
  die Wartezeiten für Visa in den deutschen Vertretungen in der Türkei . Da ist die
  Rede von bis zu elf Monaten. Können Sie das bestätigen? Wenn ja, warum ist das so?
  Das kann ich nicht bestätigen. Mir liegt auch die Meldung, auf die Sie sich beziehen,
  gerade nicht vor. Ich würde mich da noch einmal erkundigen. Ich kann aber sehr grundsätzlich
  sagen, dass das Auswärtige Amt sehr intensiv bemüht ist, weltweit, aber insbesondere
  an sehr großen Visastellenstandorten Prozesse zu beschleunigen und Verfahren zu
  vereinfachen, auch im Zuge der Visadigitalisierung. Das ist ein Großprojekt, das
  das Auswärtige Amt mit großem Nachdruck angegangen ist, und das läuft. Insofern
  kann ich die von Ihnen genannte Zahl jetzt nicht kommentieren. Wenn ich im Laufe
  der Sitzung noch ein bisschen mehr Informationen dazu bekomme, mache ich das aber
  gerne. Können Sie denn sagen, was Sie für eine Wartezeit Sie für die Visavergabe
  anstreben? Ihre Frage knüpfte jetzt an das, was ich schon sagte. Ich würde mich
  noch mal ein bisschen schlauer machen. Das kann man auch so pauschal gar nicht sagen;
  denn es gibt Orte, an denen die Anzahl der Visaanfragen enorm und riesengroß ist.
  Dieser Anzahl an Anfragen versuchen wir natürlich Herr zu werden, was aber auch
  nur mit begrenzten Mitteln möglich ist. Da haben wir verschiedene Mechanismen zur
  Beschleunigung ‑ das kann manchmal ein Personalzuwachs sein, das können auch die
  Verfahren der Visadigitalisierung sein. Ich kann mich jetzt aber auf keine konkrete
  Zahlenprognose für einzelne Standorte einlassen. Ich weiß nicht, ob es am Mittwoch
  schon gefragt wurde: Plant die Bundesregierung, dem Netzwerk W Social beizutreten
  und dort Accounts zu erstellen? Auf europäischer Ebene wird jetzt offensichtlich
  auch offiziell über dieses Netzwerk kommuniziert. Ich würde einmal sagen, wir beobachten
  das. Im Moment habe ich dazu nichts anzukündigen. An das Arbeitsministerium: Es
  gibt eine heftige Debatte um einen Entwurf für eine Arbeitszeitregelung . Dem Vernehmen
  nach möchte die Ministerin die Möglichkeit einer wöchentlichen statt einer täglichen
  Höchstarbeitszeit nur für tarifgebundene Betriebe einführen. Gilt dieser Stand immer
  noch? Ich glaube, dazu habe ich mich eben schon geäußert, aber ich sage es gerne
  noch einmal: Das BMAS nimmt zu internen Arbeitsfassungen keine Stellung. Aber es
  ist ja inzwischen eine politische Debatte geworden. Deshalb möchte ich den Regierungssprecher
  fragen: Ist der Kanzler der Meinung, dass das, was jetzt dann doch öffentlich bekannt
  geworden ist, die Formulierung des Koalitionsvertrages erfüllt, oder läuft es daneben
  her? Denn im Koalitionsvertrag war, glaube ich, eher eine generelle Ausweitung oder
  Veränderung hin zur Wochenarbeitszeit gemeint. Im Koalitionsvertrag wurde ja eine
  entsprechende Reform vereinbart. Daran wird jetzt innerhalb der Bundesregierung
  gearbeitet. Auch Sie werden aber verstehen, dass wir etwaige, mögliche interne Arbeitsstände
  hier nicht kommentieren werden. Wenn wir das ständig machen würden, dann hätten
  wir, glaube ich, nicht viel anderes mehr zu tun. Insofern schließe ich mich da voll
  dem BMAS an. Es hat ja schon Situationen gegeben, in denen dann, wenn einzelne Ressorts
  Vorschläge gemacht haben, die bei anderen auf starken Widerspruch gestoßen sind,
  der jeweilige Regierungschef bzw. die Regierungschefin das gesprochen hat, was man
  ein Machtwort nennt. In der Nähe eines solchen Eingriffs befindet sich der Bundeskanzler
  derzeit nicht? Unabhängig von diesem Thema möchte ich einmal ganz generell auf die
  Abläufe hinweisen: Natürlich entstehen Entwürfe im federführenden Haus. Es gibt
  dann eine Abstimmung innerhalb der Bundesregierung über solche Entwürfe, und wenn
  alle damit einverstanden sind, gibt es einen Kabinettsbeschluss. Das ist ein ganz
  normales Verfahren. Wir kommentieren dann, wenn wir einen Reifegrad haben, der sozusagen
  deutlich macht, dass innerhalb der Bundesregierung ein geeinter Entwurf vorliegt.
  Von diesem Punkt sind wir, glaube ich, noch ein gutes Stück entfernt. Insofern kommentieren
  wir diese internen Arbeitsstände ‑ wenn sie denn so stimmen; das kann ich gar nicht
  beurteilen ‑ nicht.'
