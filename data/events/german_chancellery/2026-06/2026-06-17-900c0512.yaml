title: 'Gedenken an die Opfer des Volksaufstandes und des Widerstands in der DDR –
  Staatsminister Weimer: „Ihre Namen dürfen nie vergessen werden“ – Gestaltungswettbewerb
  für Denkmal für Opfer der kommunistischen Diktatur in Deutschland beginnt'
text: 'Zum Jahrestag des DDR-Volksaufstandes erklärt Kulturstaatsminister Wolfram
  Weimer: „Am 17. Juni 1953 nahmen mutige Menschen – Arbeiterinnen und Arbeiter, Jugendliche,
  Enttäuschte aus der gesamten DDR – ihr Schicksal selbst in die Hand und erhoben
  sich gegen das SED-Regime. Der Mut dieser Menschen, sich für ein freies Deutschland
  einzusetzen, bewegt mich zutiefst.“ Der Aufstand wurde durch sowjetische Panzer
  brutal niedergeschlagen. An die Opfer des SED-Unrechts soll künftig auch im Herzen
  Berlins erinnert werden. Nun geht das Projekt in eine entscheidende Phase: Am 18.
  Juni werden die Auslobungsunterlagen für den künstlerischen Gestaltungswettbewerb
  für das Denkmal zur Mahnung und Erinnerung an die Opfer der kommunistischen Diktatur
  in Deutschland an die bereits ausgewählten Wettbewerbsteilnehmerinnen und -teilnehmer
  versandt. Dazu Weimer: „Dieses Denkmal in unmittelbarer Nähe des Deutschen Bundestages
  und des Bundeskanzleramtes schließt nicht nur eine schmerzlich empfundene Lücke
  in der deutschen Erinnerungslandschaft. Es macht zugleich sichtbar, dass der Bund
  neben der konsequenten Aufarbeitung des SED-Unrechts und der wissenschaftlich-fundierten
  Vermittlung dieses Wissens in besonderer Weise der Menschen gedenkt, die diesem
  Unrecht zum Opfer gefallen sind.“ Das Bundesamt für Bauwesen und Raumordnung (BBR)
  führt das Verfahren durch. Für das Denkmal zur Mahnung und Erinnerung an die Opfer
  der kommunistischen Diktatur in Deutschland stehen fünf Millionen Euro bereit. Ebenfalls
  am 18. Juni wird Kulturstaatsminister Weimer in Zeitz einen Kranz am Mahnmal für
  Pfarrer Oskar Brüsewitz niederlegen. Dieser verbrannte sich dort am 18. August 1976
  aus Protest gegen die Bildungs- und Kirchenpolitik des SED-Regimes selbst. Er gehörte
  zu denen, die in der Sowjetischen Besatzungszone und in der DDR Widerstand gegen
  die SED-Diktatur leisteten und dafür einen hohen Preis zahlten. Sie waren die Wegbereiter
  der Friedlichen Revolution 1989/90 und der Überwindung der deutschen Teilung. Dazu
  erklärt Weimer: „Einigkeit und Recht und Freiheit können nur gemeinsam bestehen.
  Dafür haben in der DDR mutige Menschen ihr Leben gelassen. Ihre Namen dürfen nie
  vergessen werden. Gerade in der heutigen Zeit müssen wir Freiheit, Demokratie und
  Rechtsstaatlichkeit umso klarer verteidigen.“ Der Bund wendet für die Aufarbeitung
  der SED-Diktatur rund 16 Millionen Euro jährlich auf. Dazu zählen unter anderem
  die Finanzierung der Stiftung zur Aufarbeitung der SED-Diktatur und die Förderung
  der Stiftung Berliner Mauer sowie weiterer Gedenkstätten und Museen in ganz Deutschland.
  Darüber hinaus finanziert der Bund auch die Arbeit des Bundesarchivs - Stasi-Unterlagen-Archiv.'
