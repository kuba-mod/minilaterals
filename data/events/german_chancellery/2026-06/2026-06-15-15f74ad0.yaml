title: 'Orte, die Identität stiften: Staatsminister Weimer geht vom 15. bis zum 19.
  Juni auf Kulturbautenreise'
text: 'Im Rahmen einer einwöchigen Reise besucht der Staatsminister für Kultur und
  Medien, Wolfram Weimer, ausgewählte Kulturbauten in Deutschland. Ziel ist, die herausragende
  Bedeutung für die kulturelle Identität Deutschlands sichtbar zu machen und zugleich
  ein Zeichen für die Vielfalt der Kulturlandschaft zu setzen, die weit über die großen
  Städte hinausreicht. Im Vorfeld sagte Staatsminister Weimer: „Ich freue mich auf
  einen einzigartigen kulturellen Roadtrip, der mich zu beeindruckenden Orten in Deutschland
  führen wird. Ich kann nur jeden ermutigen, sich ebenfalls auf Entdeckungsreise zu
  begeben!“ Er fügte hinzu: „Kulturbauten erzählen die Geschichte unseres Landes.
  Sie bewahren Erinnerungen, stiften Identität und schaffen Orte der Begegnung – nicht
  nur in den großen Städten. Gerade in kleineren Gemeinden tragen Museen, Klöster
  und Schlösser wesentlich zum kulturellen Leben und zum gesellschaftlichen Zusammenhalt
  bei. Diese Leistungen verdienen Sichtbarkeit und Anerkennung.“ Zu Beginn der Reise
  besucht Staatsminister Weimer in Bayern die Klöster Wettenhausen, Weißenohe und
  Waldsassen, die – auch wenn teilweise dort kein klösterliches Leben mehr stattfindet
  – auf eine teils mehr als tausendjährige Geschichte zurückblicken. In Weißenohe
  wird zudem ein symbolischer Förderbescheid in Höhe von 5,3 Millionen Euro übergeben.
  Damit wird die Sanierung des Рrälatenbaus unterstützt, der zukünftig als Chorakademie
  genutzt werden soll. Am Dienstag erhält auch die Kaiser-Wilhelm-Gedächtnis-Kirche
  in Berlin einen symbolischen Förderbescheid in Höhe von 9 Millionen Euro. Damit
  wird die Sanierung des denkmalgeschützten Kirchengebäudes, entworfen von Egon Eiermann
  im Stil der Moderne. unterstützt. Hierzu gehört auch die Instandsetzung der Betonfassade
  sowie die Restaurierung der wertvollen Dickglas-Elemente. Darüber hinaus besichtigt
  Staatsminister Weimer die historische Turmruine. Gemeinsam mit Thüringens Minister
  für Bildung, Wissenschaft und Kultur, Christian Tischner, nimmt Staatsminister Weimer
  am Mittwoch am Spatenstich für den Werkstattneubau des Deutschen Nationaltheaters
  in Weimar teil. Des Weiteren wird ein Finanzierungsabkommen der Klassik Stiftung
  Weimar in Höhe von 75,45 Millionen Euro über einen Zeitraum von fünf Jahren unterzeichnet.
  In Sachsen-Anhalt besucht er am Donnerstag zusammen mit dem Staatsminister und Minister
  für Kultur des Landes Sachsen-Anhalt, Rainer Robra, die Künstlerwerkstätten der
  Design Akademie Saaleck in Naumburg sowie die feierliche Grundsteinlegung für das
  neue Dokumentationszentrum vor Ort. Im Anschluss folgt ein Austausch mit Vertreterinnen
  und Vertretern der Kulturinstitutionen aus Sachsen-Anhalt über aktuelle kulturpolitische
  Herausforderungen und Perspektiven. Des Weiteren legt Staatsminister Weimer gemeinsam
  mit dem Regionalbischof Dr. Dr. h. c. Schneider einen Kranz zum Gedenken an Oskar
  Brüsewitz nieder. Den Abschluss der Reise am Freitag bildet ein Rundgang durch das
  Thüringer Landesmuseum auf der Heidecksburg. Mit seiner Reise möchte Staatsminister
  Weimer die historischen und kulturellen Bauwerke Deutschland würdigen sowie die
  Arbeit der Kulturinstitutionen. Viele dieser Orte prägen seit Jahrhunderten das
  Erscheinungsbild ihrer Regionen und sind zugleich wichtige Anziehungspunkte für
  Bildung und Tourismus. Die Stärkung der kulturellen Infrastruktur zählt zu den zentralen
  Anliegen der Bundesregierung. Mit nachhaltigen Investitionen unterstützt der Bund
  kulturelle Einrichtungen und Kulturdenkmäler von nationaler Bedeutung. Weitere Informationen
  rund um die BKM-Förderung von Kulturbauten finden Sie unter www.kulturstaatsminister.de/kulturbauten-und-kulturgutschutz/kulturbauten
  .'
