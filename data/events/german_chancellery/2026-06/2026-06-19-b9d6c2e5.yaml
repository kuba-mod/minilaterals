title: G7-Gipfel in Frankreich G7 zeigen Handlungsfähigkeit und Einigkeit
text: 'Die G7 gemeinsam mit den Partnerländern sowie internationalen Organisationen
  beim Familienfoto in erweitertem Kreis. Der diesjährige G7 -Gipfel hat ein starkes
  Signal der Handlungsfähigkeit und Einigkeit ausgesendet. Im Mittelpunkt standen
  aktuelle Krisen und Konflikte – insbesondere die Ukraine und die Lage im Nahen Osten.
  Dazu haben die Staats- und Regierungschefs der G7 ein deutliches Zeichen gesetzt.
  So verabschiedeten sie eine gemeinsame Erklärung. Die Vertreterinnen und Vertreter
  der G7 -Staaten und eingeladenen Partnerländer kamen vom 15. bis 17. Juni zu politischen
  Gesprächen im französischen Évian-les-Bains zusammen. Der Bundesregierung war es
  ein wichtiges Anliegen, das Vorgehen aktiv mitzugestalten und gemeinsam Lösungen
  für die globalen Herausforderungen im Kreis der Partner zu entwickeln. Die G7 stehen
  fest und geschlossen an der Seite der Ukraine und werden den Druck auf Russland
  weiter erhöhen. Zudem werden alle G7 -Partner ihren militärischen und ihren finanziellen
  Beitrag für die Ukraine verstärken. „Die Unterstützung der Ukraine ist aus diesem
  Kreis heraus so stark wie selten zuvor“, betonte der Bundeskanzler in seinem Abschlussstatement.
  Das setze einen neuen Ton, auch in der transatlantischen Einigkeit und Entschlossenheit.
  Dies könne „vielleicht erstmals eine Chance auf einen Frieden eröffnen“. „Diese
  wollen wir als G7 -Partner jedenfalls gemeinsam nutzen“, so Merz. Auch die Einigung
  der Vereinigten Staaten mit Iran sei ein „großer Erfolg“, sagte der Bundeskanzler.
  Nun müssten weitere Verhandlungen folgen. Bundeskanzler Merz betonte zudem, dass
  Deutschland auch hier helfen werde. Dies könne ein militärisches Engagement in der
  Straße von Hormus mit entsprechendem Bundestagsmandat beinhalten. Neben dem Beschluss
  zur Ukraine und zu Iran verabschiedeten die Staats- und Regierungschefs noch acht
  weitere gemeinsame Erklärungen, darunter: G7 Leaders'' Statement on Geopolitical
  Issues (englisch) Erklärung der Staats- und Regierungschefinnen und -chefs der G7
  zu geopolitischen Fragen (Arbeitsübersetzung deutsch) Leader''s Call on a Safer
  Digital Space for Minors (englisch) G7 Leaders'' Declaration on Securing Supply
  Chains for Critical Minerals (englisch) Leaders'' Statement for a More Balanced,
  Durable, Resilient Growth (englisch) Leaders'' Declaration on Tackling Migrant Smuggling
  (englisch) Leaders'' Declaration on the Fight against Drug Trafficking (englisch)
  Leaders'' Declaration on Mutually Beneficial International Partnerships (englisch)
  Leaders'' Call on the Fight Against Cancer (englisch) Leaders'' Call for a Coordinated
  Response to the Bundibugyo Ebola Outbreak (englisch) Évian-les-Bains , 15. Juni
  2026: Bundeskanzler Friedrich Merz und Ehefrau Charlotte Merz wurden vom französischen
  Präsidenten Emmanuel Macron zum dreitägigen G7 -Gipfel in Frankreich empfangen.
  An dem Gipfeltreffen nehmen die führenden Industrienationen Deutschland, Kanada,
  Frankreich, Italien, Japan, Großbritannien und die Vereinigten Staaten von Amerika
  sowie Vertreterinnen und Vertreter der Europäischen Union teil – etwa Kommissionspräsidentin
  Ursula von der Leyen. Ein Thema des Gipfeltreffens sind die Entwicklungen im Mittleren
  Osten. Der Kanzler begrüßte die Einigung der Vereinigten Staaten von Amerika und
  Iran auf ein Friedensmemorandum. Nun müsse das Vereinbarte zielstrebig umgesetzt
  werden, forderte er. Das Abkommen könne den Weg für eine Erholung der Weltwirtschaft
  und eine Stabilisierung der Region ebnen, so Merz. Mit Blick auf außen- und wirtschaftspolitische
  Herausforderungen verfolgt die Bundesregierung beim Treffen klare Ziele: einerseits
  die fortgesetzte Unterstützung für die Ukraine und eine Deeskalation im Nahen Osten,
  andererseits die Zusammenarbeit für eine stärkere globale Wirtschaft und für eine
  sichere Versorgung mit kritischen Rohstoffen. Über Themen wie diese tauschen sich
  die Staats- und Regierungschefinnen und -chefs der G7 bei dem Treffen am Genfer
  See in mehreren Arbeitssitzungen aus. Daneben bietet das Format für Bundeskanzler
  Friedrich Merz auch die Gelegenheit zu bilateralen Gesprächen. Am ersten Abend tauschte
  er sich mit Großbritanniens Premier Keir Starmer aus. Laut Kanzler Merz findet der
  Gipfel in einer „ausgesprochen bewegten Phase der Weltpolitik“ statt. Die Lage fordere,
  eröffne „aber auch einige Chancen“, sagte er mit Blick auf internationale Zusammenarbeit.
  Évian-les-Bains , 16. Juni 2026: Als Gast war am zweiten Tag der ukrainische Präsident
  Wolodymyr Selenskyj geladen. „ Building peace and Security for Ukraine and for Europe
  “ lautete das Thema der ersten Arbeitssitzung des Tages. Im Vorfeld des Gipfeltreffens
  hatte sich Bundeskanzler Merz vorsichtig optimistisch gezeigt mit Blick auf Verhandlungen
  über eine Friedenslösung. Die G7 -Staats- und Regierungschefs beschlossen, den Druck
  auf Russland im Ukraine-Krieg zu verstärken. Auch US -Präsident Trump will ausgesetzte
  Sanktionen gegen russische Ölexporte wieder in Kraft setzen. In der zweiten Arbeitssitzung
  ging es um die Stabilität im Nahen Osten. Dazu waren der Präsident von Ägypten und
  der Ministerpräsident von Katar, aber auch der Präsident der Vereinigten Arabischen
  Emirate, Scheich Mohammed bin Zayed Al Nahyan, nach Évian gereist. Am zweiten Tag
  kamen traditionell auch weitere Partnerländer zum dem Treffen hinzu. Dabei entstand
  auch das Familienfoto in erweitertem Kreis. In einer dritten Arbeitssitzung tauschten
  sie sich zum Thema „ Forging new partnerships and rebuilding international solidarity
  “ aus. Zun Abschluss des Tages betonte der Kanzler, dass die Gespräche „von einer
  wirklich großen transatlantischen und europäischen Einigkeit und von europäischem
  Team spiel“ geprägt gewesen seien. Évian-les-Bains , 17. Juni 2026: Die Staats-
  und Regierungschefs der G7 -Staaten kamen zum dritten Gipfeltag am Konferenzort
  zusammen. Bei der Arbeitssitzung ging es um Stärkung des Wirtschaftswachstums und
  die Beseitigung wirtschaftlicher Ungleichgewichte. Zum Abschluss des Gipfels verständigten
  sich die G7 auf gemeinsame Positionen zum Konflikt im Nahen Osten und zum russischen
  Angriffskrieg gegen die Ukraine. „Demokratie ist schwierig und Diplomatie braucht
  Hartnäckigkeit. Aber wir sind aus dieser Runde der demokratischen Staaten heraus,
  ich denke, in diesen zwei Tagen erfolgreich gewesen“, so Kanzler Merz in seinem
  Statement zum Abschluss des Gipfeltreffens. Évian-les-Bains , 15. Juni 2026: Bundeskanzler
