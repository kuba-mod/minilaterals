  Statement zum Abschluss des Gipfeltreffens. Als diesjähriger G7 -Vorsitz organisierte
  Frankreich den Gipfel in Évian-les-Bains . Neben Frankreich und Deutschland sind
  Kanada, Italien, Großbritannien, Japan und die USA Teil der G7 . Die wichtigsten
  Fragen und Antworten dazu im Überblick.'
