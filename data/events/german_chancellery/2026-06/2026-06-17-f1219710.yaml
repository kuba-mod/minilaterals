title: 'Kulturstaatsminister Wolfram Weimer besucht Weimar: Finanzierungsabkommen
  für die Klassik Stiftung Weimar unterzeichnet – Spatenstich für Werkstattneubau
  des Deutschen Nationaltheaters Weimar'
text: 'Im Rahmen seiner einwöchigen Kulturbautenreise hat Staatsminister Wolfram Weimer,
  Beauftragter der Bundesregierung für Kultur und Medien, heute die Kulturhauptstadt
  Weimar besucht. Gemeinsam mit Thüringens Kulturminister Christian Tischner und Weimars
  Oberbürgermeister Peter Kleine unterzeichnete er im Beisein von Präsidentin der
  Klassik Stiftung Weimar, Dr. Ulrike Lorenz, das Finanzierungsabkommen für die Klassik
  Stiftung Weimar für die Jahre 2027 bis 2031. Die Unterzeichnung fand in den restaurierten
  Dichterzimmern des Residenzschlosses Weimar statt. Am Nachmittag folgte der erste
  Spatenstich für den Werkstattneubau des Deutschen Nationaltheaters Weimar. Die Klassik
  Stiftung Weimar zählt zu den größten und bedeutendsten Kulturstiftungen in der Bundesrepublik.
  Sie ist nicht nur für zwölf UNESCO-Welterbestätten in und um Weimar verantwortlich,
  sondern auch für singuläre Sammlungen wie die handschriftlichen Nachlässe Johann
  Wolfgang von Goethes und Friedrich Nietzsches oder die von Lucas Cranach illustrierte
  Lutherbibel verantwortlich, die zum Weltdokumentenerbe zählen. Mit dem Abkommen
  setzen die Zuwendungsgeber und Stiftungsträger Bund, Freistaat Thüringen und Stadt
  Weimar wieder ein gemeinsames Zeichen für die nachhaltige Sicherung des kulturellen
  Erbes in Weimar. Die Vereinbarung bildet die Grundlage für die Fortführung der Arbeit
  der Klassik Stiftung Weimar auf hohem Niveau sowie die Erhaltung und Weiterentwicklung
  ihrer bedeutenden Sammlungen, Museen, Archive und historischen Liegenschaften für
  kommende Generationen. Gemäß dem Abkommen beabsichtigen Bund und Land, der Klassik
  Stiftung Weimar von 2027 bis 2031 jährlich jeweils 15,09 Millionen Euro für die
  institutionelle Förderung zur Verfügung zu stellen. Die Stadt Weimar wird jährlich
  2,25 Millionen Euro beitragen. Die institutionelle Förderung beläuft sich folglich
  auf eine Gesamtsumme von 32,43 Millionen Euro pro Jahr. Darüber hinaus sollen weitere
  jährliche Zuwendungen für große Investitionen bereitgestellt werden. Bei seinem
  Besuch informierte sich Kulturstaatsminister Weimer gemeinsam mit Minister Tischner,
  Oberbürgermeister Kleine und Dr. Lorenz über zentrale Orte und aktuelle Vorhaben
  der Klassik Stiftung Weimar. Zu den Stationen zählten das Goethe-Nationalmuseum,
  das Goethe- und Schiller-Archiv sowie die Baustelle des Residenzschlosses Weimar.
  Kulturstaatsminister Wolfram Weimer sagte vorab: „Mit der Unterzeichnung des gemeinsamen
  Finanzierungsabkommens für die Klassik Stiftung Weimar setzen wir ein starkes Zeichen
  für die nachhaltige Sicherung unseres kulturellen Erbes und schaffen eine verlässliche
  Grundlage, für den Erhalt bedeutsamer Kultureinrichtungen in Deutschland. Die nun
  beginnende Generalsanierung des Deutschen Nationaltheaters ist zugleich eine Investition
  in die Zukunft: in einen Ort, der Menschen zusammenführt, künstlerischen Austauschs
  ermöglicht und kreative Impulse weit über Thüringen hinaus sendet. Ein Ort der Identität
  stiftet.“ Thüringens Kulturminister Christian Tischner fügte hinzu: „Der heutige
  Besuch verbindet zwei zentrale kulturpolitische Vorhaben in Weimar: die verlässliche
  Finanzierung der Klassik Stiftung Weimar und den nächsten sichtbaren Schritt für
  die Zukunft des Deutschen Nationaltheaters. Beides zeigt: Kultur braucht Planungssicherheit,
  starke Partnerschaften und moderne Infrastruktur. Thüringen steht zu seiner Verantwortung
  für diese herausragenden Einrichtungen und für Weimar als lebendigen Ort von Kultur,
  Forschung und gesellschaftlichem Dialog.“ Dr. Ulrike Lorenz, Präsidentin der Klassik
  Stiftung Weimar, betonte: „Wir sind dankbar, dass unsere Träger ein so positives
  Signal für die Klassik Stiftung Weimar setzen. Der Finanzierungsrahmen ermöglicht
  uns, die Schauplätze und Sammlungen des deutschen Weltkulturerbes weiter zu erhalten
  und für die Existenzfragen des 21. Jahrhunderts aufzuschließen. Das heißt in den
  nächsten Jahren vor allem auch, die digitale Transformation voranzutreiben und Goethes
  Wohnhaus mit neuen Vermittlungsansätzen einem breiten Publikum nachhaltig nahe zu
  bringen. Gemeinsam mit Bund, Land und Stadt für die Zukunft unserer Herkunft und
  die Herkunft unserer Zukunft zu sorgen, macht uns stark.“ Weimars Oberbürgermeister
  Peter Kleine erklärte: „Dieser 17. Juni ist ein wichtiger Tag für die Kulturstadt
  Weimar. Die Klassik Stiftung Weimar erhält mit der Fortschreibung der Finanzierungsvereinbarung
  die nötige Planungssicherheit für ihre wichtige Kultur- und Bindungsarbeit. Zugleich
  wird sie in die Lage versetzt, für die Touristen der Stadt weiterhin nachhaltige
  Besuchermagnete anzubieten bzw. Reiseanlässe zu schaffen. Ich danke dem Bund und
  dem Land, dass sie die Stiftung auch in den nächsten Jahren auf sehr hohem Niveau
  unterstützen. Die Stadt Weimar erhöht (vorbehaltlich des noch zu treffenden Stadtratsbeschlusses)
  dagegen erstmals seit über 20 Jahren ihren finanziellen Anteil. Dies ist ebenfalls
  ein wichtiges Signal. Auch der Spatenstich für den Werkstattneubau des DNT - als
  erstes Teilprojekts im Rahmen der Generalsanierung - markiert für uns eine bedeutende
  Wegmarke. Die Fertigstellung des Werkstattgebäudes ist dringend notwendig, um mit
  den Sanierungsarbeiten am Haupthauses ab 2029 beginnen zu können. Angesicht der
  stetig steigenden Baupreise dürfen wir keine mehr Zeit verlieren.“ Am Nachmittag
  besuchte Kulturstaatsminister Weimer das Deutsche Nationaltheater (DNT) und die
  Staatskapelle Weimar. Dort informierte er sich gemeinsam mit Minister Tischner,
  Oberbürgermeister Kleine, Vertreterinnen und Vertretern der Stadt Weimar sowie der
  Teamintendanz des DNT über die Generalsanierung des Hauses. Anschließend fand in
  der Lützendorfer Straße auf dem Gelände im Norden Weimars der erste Spatenstich
  für den Neubau der Werkstätten des Theaters statt. Die Errichtung des neuen Werkstattgebäudes
  markiert den Anfang der umfassenden Generalsanierung des Deutschen Nationaltheaters
  Weimar. Der Neubau wird auf die Anforderungen eines modernen Theaterbetriebs ausgerichtet
  und schafft unter anderem Räumlichkeiten für den Malsaal, die Tischlerei und die
  Schreinerei. Mit diesem Schritt werden die Voraussetzungen dafür geschaffen, dass
  das Hauptgebäude am Theaterplatz technisch modernisiert und das Theatererlebnis
  für die Besucherinnen und Besucher nach Abschluss der Sanierungsarbeiten auf ein
  neues hohes Niveau gehoben werden kann. Die Teamintendanz des DNT, bestehend aus
  Valentin Schwarz, Dorian Dreher und Timon Jansen, erklärte: „Mit dem symbolischen
  ersten Spatenstich für den Werkstattneubau geht die Generalsanierung des DNT in
  die Ausführungsphase und damit in die nächste Etappe auf dem Weg zum Theater der
  Zukunft. Der Neubau der Theaterwerkstätten sichert uns zukunftsfähige Arbeitsplätze.
  Wir verfügen über eine wertvolle Manufaktur, in der jedes Bühnenbild vor Ort in
  Weimar gefertigt wird - just-in-time. Diese Aufgabe können wir mit der neuen Werkstatt
  auch in den kommenden Jahrzehnten gewährleisten. Mit der voraussichtlichen Fertigstellung
  im Jahr 2029 sind die funktionalen Voraussetzungen gegeben, um mit dem Bau am Haupthaus
  zu beginnen und auch im Interimsbetrieb grandiose Bühnenbilder fertigen zu können.
  Dieser reibungslose Übergang des Spielbetriebs ermöglicht es uns als Teamintendanz,
  unsere Mitarbeitenden in dieser Phase wertschätzend baulich zu unterstützen und
  Aufführungen an verschiedenen Orten der Theaterstadt Weimar zu erleben. Somit können
  wir Theatererlebnisse am DNT lückenlos und hochwertig für die Stadtgesellschaft
  zur Verfügung stellen. Dafür allen Projektverantwortlichen unser großer Dank!“ Die
  Fertigstellung des Werkstattgebäudes ist für das Jahr 2029 geplant. Sie ist eine
  unabdingbare Voraussetzung für den Auszug der Werkstätten aus dem Haupthaus und
  damit für den Beginn der Sanierungsmaßnahmen am historischen Theatergebäude in der
  Innenstadt. Die Gesamtkosten der Maßnahme wurden mit dem Finanzierungsabkommen vom
  08.04.2024 auf 167 Millionen Euro festgelegt. Bund und Land beteiligen sich hälftig
  jeweils mit 83,5 Millionen Euro. Das Deutsche Nationaltheater Weimar zählt zu den
  bedeutenden Orten deutscher Geschichte und Kultur. Unter der Leitung von Johann
  Wolfgang von Goethe wurde hier Anfang des 19. Jahrhunderts Literatur- und Schauspielgeschichte
  geschrieben. 1919 wurde im Deutschen Nationaltheater die Verfassung der ersten Demokratie
  auf deutschem Boden verabschiedet. Die Förderung der Generalsanierung durch Bund
  und Land unterstreicht die nationale und internationale Bedeutung Weimars als Kultur-
  und Theaterstandort. Pressekontakte Der Beauftragte der Bundesregierung für Kultur
