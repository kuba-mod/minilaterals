title: Gesetz in Kraft Schnellere Hilfe bei Organtransplantationen
text: 'Der Gesetzentwurf soll helfen, mehr Betroffenen die dringend benötigte Transplantation
  zu ermöglichen. Seit langem deckt die Zahl der Spendernieren den Bedarf nicht, weshalb
  Betroffene oft viele Jahre auf eine Nierenspende warten. Neben der postmortalen
  Nierenspende ist auch eine Lebendspende möglich. Hier kann bisher nur eine nahestehende
  Person Spenderin oder Spender sein – etwa Eltern, Geschwister oder Lebensgefährten.
  Das Problem: Manche Spender-Empfänger-Paare sind nicht kompatibel. Bei ihnen ist
  eine Organtransplantation nicht möglich, zum Beispiel wegen einer Blutgruppen- oder
  Gewebe-Unverträglichkeit. Hier kann nun künftig eine Überkreuz-Spende helfen: Dabei
  werden zwei inkompatible Spenderpaare zusammengebracht, die „über Kreuz“ spenden
  können. Dafür ist ein entsprechendes Gesetz zum 1. Juni 2026 in Kraft getreten -
  und zwar ein Änderungsentwurf des Transplantationsgesetzes. Der Weg der Gesetzgebung:
  Der Bundesrat hatte den Gesetzentwurf am 8. Mai 2026 gebilligt, nachdem der Bundestag
  ihn am 26. März 2026 verabschiedet hatte. Das Bundeskabinett hatte den Gesetzentwurf
  am 25. Oktober 2025 beschlossen. Hierzu soll ein nationales Programm für die Überkreuz-Lebendnierenspende
  und ein Pool von inkompatiblen Organspendepaaren aufgebaut werden. Aus diesem Pool
  werden die miteinander kompatiblen Organspenderinnen und -spender und Organempfängerinnen
  und -empfänger ermittelt, zwischen denen eine Lebendnierenspende durchgeführt werden
  kann. So kann mehr Betroffenen die dringend benötigte Transplantation ermöglicht
  werden. Die Überkreuz-Lebendspende von Nieren stärke die bewusste Entscheidung für
  die Organspende, so Bundesgesundheitsministerin Nina Warken. „Damit stellen wir
  statt der familiären Bindung den Willen zur Organspende in den Fokus.“ Wenn eine
  nahestehende Bezugsperson mit der betroffenen Person nicht kompatibel ist, kann
  eine Überkreuz-Spende infrage kommen. Zudem wird die sogenannte nicht gerichtete
  anonyme Nierenspende möglich. Das ist eine anonyme Spende an eine nicht bekannte
  Person. Die nicht gerichtete anonyme Spende wird in das Programm für die Vermittlung
  und Durchführung von Überkreuz-Lebendnierenspenden einbezogen. „ Das gibt vielen
  Menschen Hoffnung, die auf eine Spenderniere angewiesen sind“, so Ministerin Warken.
  Darüber hinaus soll der Schutz von Spenderinnen und Spendern von Organen und Gewebe
  verbessert werden. Dafür ist eine verpflichtende unabhängige psychosoziale Beratung
  und eine Evaluation der Spenderinnen und Spender vor einer Spende geplant. Zudem
  soll es verpflichtend sein, die Betroffenen im Transplantationszentrum über den
  gesamten Spendeprozess – vor, während und nach der Spende – individuell zu betreuen.
  Menschen, die in Deutschland auf eine Spenderniere warten, leiden unter gravierenden
  Einschränkungen ihrer Lebensqualität. Ende 2024 warteten in Deutschland rund 6.400
  Menschen auf eine Spenderniere. Gleichzeitig sank die Zahl der Nierentransplantationen
  auf 2.075. Finden Sie hier Fragen und Antworten zur Organspende und zum digitalen
  Organspende-Register.'
