title: Im Kabinett beschlossen Deutschland als Luftfahrtnation stärken
text: 'Um die deutsche Luftfahrt langfristig zu stärken, setzt die Bundesregierung
  unter anderem auf wirtschaftliche Entlastung und technologische Innovation. Das
  Bundeskabinett hat eine neue Luftfahrtstrategie verabschiedet, um Deutschland zu
  einem führenden Standort für eine nachhaltige, sichere und wettbewerbsfähige Luftfahrt
  zu machen. Ein funktionierender, sicherer und nachhaltiger Luftverkehr bewegt Menschen
  und Güter. Die Luftfahrt ist damit von zentraler Bedeutung für die Mobilität und
  für die Anbindung deutscher Güter an Märkte weltweit – ein wesentliches Merkmal
  für wirtschaftliche Stärke, Innovationskraft und Beschäftigung. Die Luftfahrtindustrie
  ist industrielle Hightech -Branche, sie fördert Innovationen und garantiert Anbindung,
  Wertschöpfung und hochqualifizierte Arbeitsplätze. Die Industrie leistet einen wichtigen
  Beitrag zu einem starken und leistungsfähigen Industriestandort Deutschland und
  auch dazu, dass die Bundeswehr ihre Aufgaben erfüllen kann und einsatzbereit ist.
  Für all diese Aspekte enthält die Strategie unterschiedliche Handlungsansätze. Sie
  stellen vier Ziele in den Vordergrund: Die Bundesregierung unterstützt den Luftverkehr
  unter anderem durch Senkungen bei Flugsicherungsgebühren sowie Kosten der Luftsicherheitskontrollen
  bis 2029 und Senkung der Luftverkehrssteuer. Sie soll am 1. Juli in Kraft treten.
  Die Strategie sieht auch vor, die Bedingungen für die Verwendung von erneuerbaren
  Kraftstoffen für die Luftfahrt zu verbessern – etwa durch Stärkung von Angebot und
  Produktion auch in Deutschland und besserer Berücksichtigung zum Beispiel im Emissionshandel.
  Zudem setzt die Regierung auch künftig auf ein effizientes und resilientes Netz
  an Flughäfen mit Regional-, Fracht- und Flughäfen im 24-Stunden-Betrieb. Hier sollen
  digitaler und klimaneutraler Betrieb und die Einbindung in Verkehrsnetze weiter
  verbessert werden. Auch die Potentiale der Drohnen-Ökonomie will die Regierung nutzen.
  Dafür will sie beispielsweise bis Ende 2026 ein nationales U -Space-Gesetz zur unbemannten
  Luftfahrt erarbeiten. Die neue Luftfahrtstrategie schafft einen Orientierungsrahmen
  für mehr Planungssicherheit in der Luftfahrt für die kommenden 15 Jahre – sowohl
  für Luftverkehr, Luftfahrtindustrie als auch militärische Luftfahrt. Die Bundesregierung
  wird die Umsetzung der Strategie gemeinsam mit der Branche in einem kontinuierlichen
  Prozess nachhalten.'
