  Berechnung der Länder können das ja durchaus mehrere Milliarden Euro sein? Herr
  Hille, geht die Bundesregierung davon aus, dass man einfach keine Leistungsgesetze
  mehr beschließt, die möglicherweise zu Erstattungen an die Länder führen, wenn dieses
  Prinzip ab September gilt? Grundsätzlich kann ich sagen, dass es sehr gut ist, dass
  bei diesem wichtigen Thema gestern eine Einigung erzielt wurde. Wie Sie wissen,
  gilt die Regelung für Gesetze, die noch kommen werden. Daher kann natürlich zum
  aktuellen Zeitpunkt keine Vorsorge für Gesetze, die noch nicht im Raum stehen, aber
  zukünftig verabschiedet werden, getroffen werden. Ich ergänze gerne noch, Herr Feldhoff,
  und möchte das noch etwas aufzoomen, um noch einmal zu unterstreichen, was da gestern
  gelungen ist. Wir haben hier ja schon vielfach gesessen und über die finanziell
  schwierige Situation insbesondere der Kommunen gesprochen. Wir haben auch immer
  wieder unterstrichen, was für eine große Bedeutung das für uns und für den Bundeskanzler
  hat und dass wir uns dieser Situation sehr bewusst sind. Deshalb ist es gar nicht
  hoch genug einzuschätzen, dass es Bund und Ländern nun gemeinsam gelungen ist, genau
  diese Lösung finden ‑ in dem Wissen, dass die Kommunen der Ort sind, an dem die
  Menschen die meisten Berührungspunkte mit dem Staat haben. Umso wichtiger ist es,
  dass der Staat dort funktioniert. Dem dient die Vereinbarung, die gestern getroffen
  worden ist, um den Kommunen wieder finanzielle Luft zu geben. Insofern kann man
  da wirklich von einem großen Schritt, wenn nicht sogar von einer Reform, sprechen.
  Uns wird ja immer unterstellt, es würden keine Reformen stattfinden. In diesem Fall
  ist das tatsächlich eine Reform der Bund-Länder-Finanzbeziehungen, die ‑ das möchte
  ich noch einmal unterstreichen ‑ gar nicht hoch genug eingeschätzt werden kann.
  An das BMAS: In den Haushaltseckpunkten war davon die Rede, dass von der Deutschen
  Rentenversicherung ein Sparbeitrag von vier Milliarden Euro zu erbringen sei. Immer
  wenn ich danach gefragt habe, wurde auf die Rentenkommission verwiesen. Die Empfehlungen
  der Rentenkommission liegen jetzt vor. Wie weit ist das Haus bei der Überlegung,
  wie dieser Sparbeitrag finanziert und erbracht werden soll? Auch da gilt leider,
  dass das interne Prozesse sind und ich Sie deshalb bitten muss, die allgemeinen
  Beschlüsse zum Haushalt abzuwarten. Das ist erst einmal nur ein Kommissionsvorschlag,
  und das ist alles auch noch nicht in Gesetzentwürfe umgesetzt worden. Insofern muss
  man da einfach noch abwarten. Diese Frage muss ja bis zum Kabinettsbeschluss am
  6. September geklärt werden. Ihre Gesetzentwürfe kommen aber erst sehr viel später,
  wenn ich das richtig verstanden habe? Ja, da haben Sie recht. Trotzdem kann ich
  Ihnen jetzt einfach noch keinen neuen Stand geben. An das BMVg: Ich würde mich gerne
  noch einmal nach der aktuellen Position desMinenjagdboots „Fulda“ erkundigen. Wo
  liegt das Boot gerade? Entsprechend unserer Ankündigung sind die beiden Boote „Fulda“
  und „Mosel“ in Dschibuti angekommen. Sie führen aktuell einsatzvorbereitende Maßnahmen
  durch und sind im Stand-by für den Fall, dass eine Mission mandatiert wird oder
  eine weitere Stationierung erfolgen kann. Aktuell sind sie aber in Dschibuti. Wie
  lange, denken Sie, wird die Besatzung dort bleiben? Das ist ein netter Versuch ‑
  das haben wir hier ja schon mehrfach besprochen. Sie wissen, dass wir für eine weitere
  Verlegung gewisse Rahmenbedingungen benötigen. Diese sind noch nicht vorhanden.
  Dafür sind zwischen anderen Nationen noch Abstimmungen notwendig. Wenn diese Abstimmungen
  abgeschlossen sind und dann auch die Rahmenbedingungen für einen möglichen Einsatz
  in der Straße von Hormus vorliegen, werden sich die Schiffe wieder in Bewegung setzen.
  Wir werden darüber informieren ‑ und Sie werden das aufgrund der weltpolitischen
  Lage ja auch mitbekommen ‑, wenn es dort weitere Entwicklungen gibt. An das Gesundheitsministerium:
  Was sieht der Entwurf eines Gesetzes zur Stärkung der nationalen Suizidprävention
  , der von Frau Warken vorgelegt wurde, konkret vor? Es ist richtig, wir haben einen
  Entwurf für ein Suizidpräventionsgesetz vorgelegt. Das war im Koalitionsvertrag
  so vereinbart worden, und das setzen wir nun um. Das grundsätzliches Ziel ist, die
  Prävention von Suizidversuchen und Suiziden durch Maßnahmen der Information, Aufklärung,
  Forschung und Unterstützung zu stärken und zu verbessern, auch in Zusammenarbeit
  mit den Ländern, bei denen primär die Verantwortung für Aufgaben der Suizidprävention
  liegt. Ist vorgesehen, dass es eine einheitliche Notrufnummer für ganz Deutschland
  geben wird? Eine zentrale Maßnahme ist die Errichtung einer Bundesfachstelle für
  Suizidprävention im Geschäftsbereich des BMG. Diese Bundesfachstelle soll mehrere
  Aufgaben wahrnehmen, darunter die Entwicklung eines Konzepts zum Aufbau und Betrieb
  einer bundesweit einheitlichen Krisendienstrufnummer unter Einbeziehung der Länder.
  Ich möchte noch etwas zum Tankrabatt nachreichen. Ich hatte vorhin an das Kartellamt
  verwiesen. Das ist nicht ganz richtig; vielmehr hat sich die Monopolkommission in
  einem öffentlich einsehbaren Policy Brief zu den kurzfristigen Auswirkungen des
  Tankrabatts geäußert. Das Kartellamt ist natürlich weiter mit seinen Sektoruntersuchungen
  im Kraftstoffbereich aktiv. Wir haben jetzt alle noch ungefähr eine Minute, bevor
  wir wieder in die Wärme hinaus dürfen. Weil das ja vielen Menschen Sorgen macht,
  wüsste ich aus aktuellem Anlass gerne ‑ Herr Hille, vielleicht können Sie da vorausgehen ‑,
  ob das im Bewusstsein der Bundesregierung auch eine Rolle spielt, strukturell Deutschland
  fitter für künftige klimabedingte Hitzewellen zu machen. Mit „das“ meinen Sie die
  aktuelle Wetterlage? ‑ Natürlich ist das ein Thema. Das ist ein Thema im Bund, das
  ist aber vor allen Dingen natürlich auch ein Thema bei Ländern und Kommunen. Ich
  würde dazu an die Kolleginnen und Kollegen in den Ressorts verweisen. Wir müssen
  auch in dieser Frage resilient sein. Da geht es darum ‑ das ist aber, wie gesagt,
  vor allen Dingen eine Frage, die in den Kommunen geregelt wird ‑, wie hitzebeständig
  Kommunen gebaut und strukturiert sind. Ich will und kann da jetzt nicht ins Detail
  gehen, aber natürlich ist das ein Thema, mit dem wir alle umgehen müssen. Ich habe
  noch eine Frage an Herrn Hille zum Ukraine-Wiederaufbaufonds . Der Kanzler hat gestern
  in Danzig gesagt, das Versprechen werde jetzt eingelöst. Wie sieht das technisch
  aus? Wo liegt das Geld und wer entscheidet, wohin es fließt? Ich vermute, Ihre Frage
  bezieht sich darauf, dass jetzt die erste Tranche aus dem 90-Milliarden-Euro-Paket
  freigegeben und überwiesen wird. Ich bin kein Fachmann und kann Ihnen insofern nicht
  sagen, von welchem Konto das überwiesen wird. Es wird der Ukraine von der Europäischen
  Kommission zur Verfügung gestellt. Das ist eine sehr gute Nachricht, die das unterstreicht,
  was wir seit Jahren sagen: Wir unterstützen die Ukraine, so gut es geht. Deshalb
  begrüßen wir natürlich, dass jetzt die ersten drei Milliarden Euro ausgezahlt werden
  können. Ich schaue noch einmal, ob ich Ihnen noch irgendein Detail zu den Überweisungen
  nennen kann. ‑ Herr Giese, wissen Sie da Details, von wem an wen das geht? Ich glaube,
  es ist genau so, wie Sie es gesagt haben: Das wird in Tranchen ausbezahlt, das wird
  am Kapitalmarkt aufgenommen und besichert und das wird über die Europäische Kommission
  ausgereicht. Was den genauen Weg betrifft, so kann das, glaube ich, je nach Tranche
  unterschiedlich sein. Umgangssprachlich redet man vom Ukraine-Wiederaufbaufonds,
  aber gemeint ist ja eigentlich der European Flagship Fund for the Reconstruction
  of Ukraine, mit dem auch private Investoren angelockt werden sollen. Wie sieht das
  konkret aus? Wie kann ein Privater jetzt sein Geld in diesen Fonds investieren?
  Soll dabei auch eine Rendite herauskommen? Das sind jetzt tatsächlich sehr technische
  Fragen. Ich schaue einmal herüber zum BMF, das in Sachen Anleihen und Renditen vielleicht
  irgendetwas sagen kann. Ansonsten würde ich vorschlagen: Wenn die Kollegin da nichts
  ergänzen kann, schauen wir uns das noch einmal an, und sofern das Anschauen ein
  Ergebnis bringt, teilen wir Ihnen das mit. Ich wünsche Ihnen allen einen kühlen
  und schattigen Nachmittag. Dem schließen wir uns an. Und nicht vergessen: Trinken,
  trinken, trinken!'
