date: '2026-06-26'
type: press_release
source_name: german_chancellery
title: Im Wortlaut Regierungspressekonferenz vom 26. Juni 2026
text: 'stellvertretender Regierungssprecher Hille (Vorsitzende Küfner eröffnet die
  Pressekonferenz und begrüßt SRS Hille sowie die Sprecherinnen und Sprecher der Ministerien.)
  Vielen Dank, schön, Sie zu sehen! Als Erstes: In Anbetracht des Wetters habe ich
  es mir ausnahmsweise erlaubt, das Sakko einmal in den Katakomben hier zu lassen.
  Ich hoffe, das ist okay und es gibt keinen Widerspruch im Saal. Aber ich sehe selbst
  wenige Sakkos hier. Von daher nehme ich das als Zustimmung und mache dann mit den
  Terminen des Bundeskanzlers in der kommenden Woche weiter. Am Mittwoch wird es wie
  gewohnt losgehen. Um 10 Uhr wird eine Sitzung des Bundeskabinetts stattfinden, allerdings
  nicht wie üblich im Bundeskanzleramt, sondern im Bundesverteidigungsministerium,
  und das schon zum zweiten Mal. Sie erinnern sich daran, dass der Bundeskanzler im
  vergangenen Jahr damit begonnen hat, einmal im Jahr mit dem Kabinett im Verteidigungsministerium
  zu tagen. Die Bundesregierung unterstreicht damit die Bedeutung der Bundeswehr sowie
  der Sicherheits- und Verteidigungspolitik in einer Zeit zunehmender Krisen und Kriege,
  die uns ganz direkt betreffen. Das Kabinett wird sich in seiner Sitzung als Schwerpunkt
  mit sicherheits- und verteidigungspolitischen Themen auseinandersetzen. Als Gast
  wird NATO-Generalsekretär Rutte mit dabei sein. Für ca. 12 Uhr ist eine gemeinsame
  Pressekonferenz des Bundeskanzlers, des Verteidigungsministers und des NATO-Generalsekretärs
  geplant. Am Freitag, dem 3. Juli, wird der Bundeskanzler um 12 Uhr die Staats- und
  Regierungschefs der drei baltischen Staaten, Lettland, Estland und Litauen, zu einem
  Treffen im sogenannten B3+1-Format im Bundeskanzleramt empfangen. Es gibt also nicht
  nur das E3-, sondern auch das B3-Format ‑ „B“ steht dabei für das Baltikum. Der
  multilaterale Austausch wird im Rahmen eines gemeinsamen Mittagessens erfolgen.
  Vor dem Hintergrund des NATO-Gipfels in Ankara ‑ zur Erinnerung: Er wird am 7. und
  8. Juli stattfinden ‑ werden vor allem sicherheits- und verteidigungspolitische
  Themen sowie die gemeinsame Unterstützung der Ukraine im Fokus stehen. Auch hierbei
  ist im Anschluss, gegen 13.30 Uhr, eine gemeinsame Pressebegegnung des Bundeskanzlers
  und der B3-Staats- und Regierungschefs geplant. So weit waren das die Termine für
  die kommende Woche. Außenminister Wadephul wird am Montag nach Washington reisen.
  Im Anschluss wird er weiter nach Paraguay, Argentinien und Brasilien reisen. Er
  wird auf dieser Reise von Mitgliedern des Deutschen Bundestages, einer Wirtschaftsdelegation
  und dem deutsch-brasilianischen Fußballer Cacau als Gast und Sportbotschafter begleitet
  werden. Zu den einzelnen Stationen: Am Montag wird der Außenminister seinen amerikanischen
  Amtskollegen Marco Rubio treffen. Die Außenminister werden sich zur Lage im Nahen
  Osten beraten. Es wird auch um die weitere Unterstützung der Ukraine und um die
  Vorbereitung des NATO-Gipfels in Ankara gehen. Im Anschluss an das Gespräch wird
  der Außenminister am Montagmittag in die paraguayische Hauptstadt Asunción weiterreisen.
  Dort wird er am Dienstag am Gipfel der MERCOSUR-Staaten teilnehmen. Paraguay hat
  derzeit die Präsidentschaft von MERCOSUR inne. Am Rande des Gipfels wird der Außenminister
  den Präsidenten und den Außenminister der Republik Paraguay sowie den Präsidenten
  und den Außenminister der Republik Chile zu Gesprächen treffen. Im Anschluss wird
  der Außenminister nach Argentinien reisen. Dort wird er am Mittwoch Gespräche mit
  dem Außenminister der Argentinischen Republik führen. Die beiden Außenminister werden
  eine Absichtserklärung zur engeren Zusammenarbeit zwischen Deutschland und Argentinien
  im Rohstoffbereich unterzeichnen. Geplant ist auch ein Besuch der Gedenkstätte Parque
  de la Memoria für die Opfer der Militärdiktatur und das Estadio Monumental des argentinischen
  Fußballclubs River Plate. Der Außenminister wird in Buenos Aires auch mit Vertreterinnen
  und Vertretern deutscher Unternehmen in Argentinien sowie mit Vertreterinnen und
  Vertretern der argentinischen Zivilgesellschaft zusammentreffen. Im Anschluss reist
  der Außenminister in die brasilianische Wirtschaftsmetropole São Paulo weiter, in
  der er am Donnerstag an einer Konferenz der deutschen Auslandshandelskammer zu den
  Chancen des EU-MERCOSUR-Abkommens teilnehmen und Gespräche mit deutschen und brasilianischen
  Unternehmerinnen und Unternehmern führen wird. Außerdem wird er im Goethe-Institut
  Sprachschülerinnen und Sprachschüler treffen. Das Goethe-Institut in Brasilien leistet
  einen wichtigen Beitrag beim Spracherwerb, gerade für junge Deutschlernende, die
  auch als Fachkräfte nach Deutschland kommen möchten. Am Donnerstag wird der Außenminister
  weiter nach Brasília reisen. Dort wird er am Freitag politische Gespräche mit seinem
  brasilianischen Amtskollegen führen. Die beiden Außenminister werden auch eine Absichtserklärung
  zum Diplomatenaustausch zwischen Deutschland und Brasilien unterzeichnen. Darüber
  hinaus sind eine Konferenz zur deutsch-brasilianischen Zusammenarbeit im Bereich
  kritischer Rohstoffe und Gespräche mit Repräsentanten der brasilianischen Wirtschaftsverbände
  geplant. Insgesamt kann man sagen: Nach dem vorläufigen Inkrafttreten des EU-MERCOSUR-Handelsabkommens
  wollen wir das Potenzial, das mit diesem Abkommen insbesondere für die deutsche
  Wirtschaft entsteht, schnell nutzen. Deshalb ist es gut, dass eine Wirtschaftsdelegation
  den Außenminister begleitet. Es sind vor allem Unternehmen aus dem Bereich kritischer
  Rohstoffe vertreten, aber auch aus den Bereichen der Energie sowie der Sicherheit
  und Verteidigung. Herr Hille, ist bei der Kabinettssitzung auch ein Beschluss im
  Bereich der Verteidigungspolitik geplant? Sie wissen ja, wie es mit Dingen ist,
  die in der Zukunft liegen, und auch bei Kabinettssitzungen ist das der Fall: Ich
  greife dem nicht vor. ‑ Sie können sich vorstellen, dass natürlich aufgrund des
  Tagungsortes und dem NATO-Generalsekretär als Gast das Thema Sicherheit und Verteidigung
  eine zentrale Rolle spielt. Was darüber hinaus noch an Beschlüssen gefasst wird,
  werden wir dann sehen und gern nach der Kabinettssitzung in der RegPK hier in der
  kommenden Woche besprechen. (zur Reise des Bundesaußenministers in die USA sowie
  nach Paraguay, Argentinien und Brasilien ) Es mag profan wirken; aber das ist es
  ja für Argentinier nicht: Warum entscheidet sich der Außenminister im Jahr, in dem
  Maradonas „Hand Gottes“ 40 Jahre zurückliegt, ausgerechnet dafür, zu River Plate
  zu gehen und nicht zu Boca? Das ist möglicherweise das falsche Stadion. Ich glaube,
  das ist eine Frage, zu der sich der Außenminister in Argentinien wird äußern müssen.
  Aber darauf, dass diese Frage kommen wird, werde ich ihn vorbereiten. (zu den Terminen
  des Bundeskanzlers ) Ich habe eine Frage zu einem Termin, den Sie nicht genannt
  haben. Und zwar soll sich der Bundeskanzler am Sonntag mit den anderen Parteivorsitzenden
  der Koalition treffen. Können Sie das bestätigen? Sie wissen, dass schon seit einiger
  Zeit intensive Beratungen und Gespräche rund um das Thema Reformen stattfinden.
  Diese Gespräche finden fortlaufend statt. Das heißt, Sie würden den Termin der vier
  Parteivorsitzenden jetzt nicht dementieren? Sie wissen ja, in welcher Rolle ich
  hier sitze. Sie heißt „Regierungssprecher“. Ich habe gerade das zu dem Thema gesagt,
  was ich dazu zu sagen habe. Wir befinden uns innerhalb der Koalition in dauerhafter
  Abstimmung. Herr Hille, Sie sind ja als Regierungssprecher hier. Deswegen will ich
  Sie in Ihrer Funktion als Regierungssprecher fragen. Es soll am Sonntag ja auch
  nicht nur ein Treffen der Parteivorsitzenden stattfinden, sondern auch von Regierungsvertretern
  in unterschiedlichen Formationen. Können Sie das bestätigen? Dazu kann ich auf die
  Antwort verweisen, die ich gerade auf die Frage von Herrn Feldhoff gegeben habe:
  Wir befinden uns in der Koalition im engen Austausch zu allen möglichen Themen und
  auch in den vergangenen Wochen, um nicht zu sagen Monaten, zu dem Thema der Reformen.
  Dieser Austausch dauert an. Können Sie zumindest sagen, welche Themen am Sonntag
  auf der Agenda stehen? Denn, allgemein für Reformen gibt es Regierungen insgesamt.
  Aber was wird jetzt an diesem Sonntag besprochen? Sie versuchen jetzt, mich nach
  einem Termin zu fragen, zu dem ich mich nicht genauer eingelassen habe. Die Themen,
  um die es jetzt geht, sind, glaube ich, bekannt. Wir haben in dieser Woche den Bericht
  der Rentenkommission entgegengenommen. Wir haben vor einigen Wochen die Reform der
  GKV, der Krankenversicherung, auf den Weg gebracht. Es ist auch kein Geheimnis,
  dass es in der kommenden Woche ja noch einen weiteren Termin der Koalition geben
  wird. Die Themen, die unter dem Stichwort „Reformen“ laufen, sind, glaube ich, auch
  hinlänglich bekannt, sodass ich dabei jetzt nicht mehr ins Detail gehen werde. Herr
  Hille, dann will ich es noch einmal bei der Funktion des Regierungssprechers versuchen:
  Sie treffen sich ja aller Voraussicht nach in einem Regierungsgebäude, nämlich dem
  Bundeskanzleramt. Können Sie bestätigen, dass sich in einem Regierungsgebäude am
  Sonntag verschiedene Parteivorsitzende, die diese Koalition tragen, treffen oder
  zu Gast sein werden, wie immer Sie es nennen wollen? Chapeau für die Kreativität
  im Zugang zu den Dingen. Auch Sie versuchen, mich nach einem Termin zu fragen, zu
  dem ich mich nicht im Detail eingelassen habe. Das erübrigt dann, glaube ich, auch
  die weitere Formulierung. Wir befinden uns innerhalb der Koalition, wie sich das
  in guten Koalitionen gehört, eng und ständig im Austausch, und dieser Austausch
  findet statt. Wir wechseln das Thema, ein Statement von Herrn Hille. Dann werfen
  wir den Blick noch einmal nach Venezuela. Wir haben, denke ich, alle die schrecklichen
  Bilder aus Venezuela vom fürchterlichen Erdbeben gesehen. Es ist völlig klar, dass
  diese uns alle, glaube ich, betroffen machen. Der Bundeskanzler hat sich dazu ja
  bereits gestern auch auf X geäußert. Er hat gesagt: In diesen schweren Stunden gilt
  unser Mitgefühl der venezolanischen Bevölkerung. Unsere Gedanken gelten den Opfern
  und jenen, die ihr Hab und Gut verloren haben. Den Verletzten wünschen wir Kraft
  und schnelle Genesung. Den Angehörigen der Opfer sprechen wir unser tief empfundenes
  Beileid aus. Jetzt geht es darum, zügig Hilfe zu organisieren. Die internationale
  Hilfe für Venezuela ist ja auch bereits angelaufen. Auch Deutschland beteiligt sich
  daran. Es sind bereits Vorausteams vor Ort. Die ersten Luftfahrzeuge des Typs A400M
  der Bundeswehr mit Hilfsgütern und Rettungskräften sind bereits auf dem Weg. Dazu
  kann der Kollege Müller gleich gegebenenfalls auch noch deutlich weiter ins Detail
  gehen. Zur Koordinierung der Maßnahmen hat die Bundesregierung im Auswärtigen Amt
  einen Krisenstab eingerichtet ‑ dazu kann der Kollege Giese Ihnen gleich gern noch
  mehr sagen ‑, sodass man sagen kann, dass das Auswärtige Amt, die Bundeswehr und
  die Hilfsorganisationen vorbereitet sind, schnelle Hilfe zu leisten. Auch das THW
  ist bereits auf dem Weg nach Venezuela, um dort nach Kräften zu unterstützen. Heute
  gegen 11 Uhr ist das erste Luftfahrzeug vom Lufttransportstützpunkt Wunstorf aus
  nach Venezuela gestartet. An Bord waren Personal und Material des Technischen Hilfswerkes.
  Wir planen, dass insgesamt vier Luftfahrzeuge im Laufe des Tages nach Venezuela
  oder in die Richtung fliegen. Es sind drei Transportmaschinen und eine Maschine
  in der MedEvac-Konfiguration speziell für den medizinischen Kranken- und Patiententransport
  geplant. Ohne jetzt dem BMI mit dem THW etwas vorwegzunehmen: Die Ladung dieser
  Maschinen wird größtenteils Personal des Technischen Hilfswerkes beinhalten, ungefähr
  75 bis 80 Personen. Ungefähr 30 Tonnen Material sind geplant. Hunde sind an Bord.
  In den letzten Stunden, soweit ich weiß, auch seit gestern Abend, wurde die Zeit
  genutzt, um in Wunstorf den Umschlag sicherzustellen und die Maschinen zu beladen.
  In einer Aussage von vor Ort habe ich gerade gehört, dass die Maschinen wirklich
  rappelvoll sind und jetzt wahrscheinlich mit einem Tankstopp bei den Azoren direkt
  nach Venezuela fliegen. Es sind ungefähr 8200 Kilometer Großkreislinie, und die
  Azoren liegen ziemlich genau auf dem Großkreis. Mit verstärkten Crews, einem Besatzungswechsel
  und einem Tankstopp kann man es jetzt also wirklich durchziehen und dann auch schnell
  diese Krisenregion erreichen und das Material auslagern. Ich will noch mitteilen:
  Die Abstimmung zusammen mit dem Auswärtigen Amt, den anderen Ressorts und auch mit
  den Hilfsorganisationen läuft ausgezeichnet, muss ich sagen, sodass das Material
  und die Hilfe gestern auch schnell in Wunstorf ankamen. Ich kann gern hinzufügen,
  dass dazu ja gestern ein Treffen des Krisenstabs im Auswärtigen Amt stattfand, bei
  dem es darum ging, dass wir uns jetzt koordinieren. Unmittelbar nach dem Beben hat
  das Auswärtige Amt auch mit der Katastrophenhilfe begonnen, für die das Auswärtige
  Amt zuständig ist. Die Mittel, dank derer jetzt die Flugzeuge beladen werden, stammen
  aus dem Etat des Auswärtigen Amts, den wir noch einmal genau angeschaut haben und
  in dem wir auch bereits begonnen haben, Umschichtungen vorzunehmen, um jetzt zu
  helfen. Wie Sie schon gesagt haben, sind die ersten deutschen Helfer bereits am
  Donnerstag nach Venezuela aufgebrochen. Gerade weil für die unter den Trümmern eingeschlossenen
  Menschen jetzt jede Minute zählt, ist es ganz hervorragend, dass der Transport in
  der Koordination mit dem Verteidigungsministerium und durch die Luftwaffe erfolgt.
  Wir werden jetzt schauen, wie sich die Lage weiterentwickelt. Sie haben das alle
  zur Kenntnis genommen. Weder die Zahl der Opfer noch die Zahl der in weiterem Maße
  Betroffenen lässt sich jetzt schon ganz genau absehen. Insofern arbeiten wir über
  unsere Botschaft in Caracas, die weiterhin arbeitsfähig ist und die weiterhin den
  Kontakt auch mit der Regierung in Venezuela hält, daran, die Bedarfe zu klären,
  denn am Ende wird sich unsere Hilfe daran ausrichten, was die tatsächlichen Bedarfe
  sind. Das, was in Venezuela angefragt wird, werden wir zur Verfügung stellen. Das
  genau zu koordinieren, ist eine Gesamtaufgabe der gesamten Bundesregierung. Herr
  Müller, es wurde gestern von Minister Pistorius gesagt, dass die Hilfe angefordert
  werden muss. Wer hat denn die Hilfe angefordert? Zu diesem Zweck gibt es internationale
  Mechanismen. In der Europäischen Union gibt es den sogenannten EU-Katastrophenschutzmechanismus.
  Das ist ein Mechanismus, bei dem es sozusagen einmal „europäisch“ und einmal „international“
  gibt. Wenn internationale Partner bzw. wenn Länder in der ganzen Welt diesen Mechanismus
  in der Europäischen Union anfragen, dann beginnt eine Abstimmung innerhalb der EU.
  Dabei werden Hilfsmittel, Transportkapazitäten und Expertise sozusagen so gebündelt,
  dass man dann schaut, dass man europäisch gemeinsam antworten kann. Ich würde jetzt
  nicht ausschließen ‑ ich weiß nicht, ob der Kollege vom BMVg noch darauf eingehen
  kann ‑, dass wir auch immer bereit sind, Mittel anderer Länder mit zu transportieren
  und dabei Unterstützung zu leisten. Die ersten Helferinnen und Helfer beispielsweise
  des Technischen Hilfswerks sind gemeinsam mit Kolleginnen und Kollegen aus der Schweiz
  gestartet. Diese Art von gemeinsamer Hilfe wird es auch weiterhin geben. Gab es
  denn eine Anfrage an die venezolanischen Behörden oder direkten Kontakt zu den venezolanischen
  Behörden? In dem Maße, in dem ich das gerade gesagt habe, natürlich. Unabhängig
  davon, wie wir politisch zu den Verhältnissen in Venezuela stehen, müssen diejenigen,
  die die Macht innehaben, diese Anfrage stellen. Insofern gab es entsprechende Kontakte.
  Venezuela muss diesen Mechanismus auslösen. Dazu stehen wir auch mit Venezuela in
  Kontakt. Das ist ja auch erforderlich, denn nur die Machthaber vor Ort können uns
  wirklich auch sagen, was die Bedarfe sind. Herr Giese, gibt es neue Informationen
  über mögliche deutsche Opfer der beiden Erdbeben? Wie viele Menschen haben sich
  im Moment auf die ELEFAND-Liste eingetragen? Auf der ELEFAND-Liste gibt es eine
  niedrige dreistellige Zahl von Personen, die sich eingetragen haben. Sie ist auch
  seit gestern nicht besonders gestiegen. Sie wissen, dass in Bezug auf Venezuela
  seit geraumer Zeit eine Teilreisewarnung wegen der Zustände im Land besteht. Insofern
  ist es keine übliche Urlaubsdestination. Wir rechnen nicht damit, dass es dort sehr,
  sehr viele Deutsche gibt. Sie wissen allerdings, wie diese Liste generell einzuschätzen
  ist. Es ist eine Liste, in die man sich eintragen kann. Das entspricht nicht einer
  Meldepflicht. Solch eine gibt es im Ausland nicht. Insofern sind das die Personen,
  die sich darin eingetragen haben. Darüber, wie viele sich tatsächlich im Land aufhalten,
  haben wir keinen konkreten Überblick. Was wir derzeit nicht wissen und auch nicht
  erfahren haben, ist, ob es deutsche Opfer gibt. Wenn es so wäre, wäre die Tendenz,
  dass sich diese Personen über den ELEFAND-Kontakt an uns wenden würden. Das ist
  nicht geschehen. Insofern würden wir jetzt noch davon ausgehen, dass es keine deutschen
  Betroffenen gibt. Ich hätte noch eine logistische Nachfrage an das BMVg: Wie genau
  läuft die Anreise ab? Können Sie in Venezuela selbst landen? Wie sieht es mit Beschädigungen
  aus? Sind auch Nachbarländer mit darin einbezogen? Das sind Fragen, die sich jetzt
  natürlich vor allen Dingen bei den ersten Missionen stellen. Natürlich wird so etwas
  vorbereitet. Auch Venezuela ist mit seinen Flugplätzen in, sage ich einmal, internationalen
  Meldeformaten für Flughäfen, z.B. welche Anflugverfahren gibt es? ‑ Aber natürlich
  wird sich jetzt für die ersten Crews, die ankommen, genau darstellen: Wie sehen
  die Landeverfahren aus? Gibt es vielleicht Beschädigungen am Flughafen? ‑ Wir hatten
  in der Türkei vor drei Jahren das Bild, dass Flughäfen durch Hilfslieferungen überlastet
  waren. Wir erinnern uns noch. Das wird jetzt vor Ort auch mit Blick auf das Gelände
  betrachtet werden. Deswegen gibt es durchaus Optionen, dass man die Ladung direkt
  hineinfliegt ‑ das ist aktuell der Plan ‑, aber danach vielleicht die Luftfahrzeuge
  außerhalb des Landes abstellt und dann gegebenenfalls auch ein Shuttle aus Deutschland
  heraus mit den nächsten Ladungen einrichtet. Deswegen haben wir, wie gesagt, sechs
  Maschinen vorgehalten. Deswegen fliegen sie heute auch nicht alle, weil wir in den
  nächsten Tagen dann vielleicht einfach überschlagend die nächsten Maschinen auf
  den Weg schicken und die anderen Maschinen wieder zurückführen und gegebenenfalls
  Crews unten lassen, die dann gleichzeitig die Maschine übernehmen und gleich ins
  Landesinnere fliegen können oder wieder zurückfliegen können. Das sind jetzt Fragen,
  die sich ergeben. Aber die Situation nach solch einem schweren Erdbeben ist meistens
  davon bestimmt, dass die ersten Tage eine gewisse Unsicherheit haben. Diese wird
  jetzt aufgeklärt. Dann hat man auch für die nächsten Tage den Plan. Dann hätte ich
  noch eine Nachfrage an Herrn Hille: Plant die Bundesregierung auch Finanzhilfen
  für Venezuela, um es jetzt nach dem Erdbeben zu unterstützen? Auch dafür würde ich
  zum Kollegen Giese schauen. Das kann ich Ihnen sagen. Es gibt keine direkten Finanzhilfen
  an die venezolanische Regierung. Das war bislang nicht die Politik. Dazu kann ich
  Ihnen auch nichts ankündigen. Was wir allerdings schon seit längerer Zeit tun, ist,
  die Menschen in Venezuela über die VN humanitär zu unterstützen. Es gibt bereits
  jetzt Programme über sechs Millionen Euro, um die Menschen in Venezuela humanitär
  mit dem Nötigsten zu versorgen. Auch Erste-Hilfe-Geld über die Vereinten Nationen
  fließt schon. Der VN-Nothilfefonds hat gestern 15 Millionen US-Dollar ausgeschüttet.
  In diesen Nothilfefonds hat Deutschland in diesem Jahr bereits 35 Millionen Dollar
  einbezahlt. Im vergangenen Jahr waren wir der drittgrößte Geber. Insofern helfen
  wir über die Vereinten Nationen. Wir helfen auch über die Rotkreuzbewegung. Diese
  hat unmittelbar zwei Millionen Franken bereitgestellt. Diesen Fonds haben wir auch
  mit dieser Summe in diesem Jahr bereits unterstützt. Dann gibt es Mittel von UNICEF,
  an denen sich Deutschland beteiligt, das sogenannte Global Humanitarian Thematic
  Funding. An diesem Fonds waren wir im vergangenen Jahr mit 6,5 Millionen Euro beteiligt.
  Auch da sind wir drittgrößter Geber. Insbesondere über die Spezialorganisation der
  Vereinten Nationen leisten wir humanitäre Hilfe, Katastrophenhilfe. Wir prüfen natürlich
  weiterhin, welche Bedarfe es geben kann, um den Menschen dort direkt zu helfen.
  Ich habe eine Frage an Herrn Müller. Die gestrige Pressemitteilung von Ihrem Ministerium
  hat von sechs Flugtransportern gesprochen. Aber wenn ich es richtig verstanden habe,
  mobilisieren Sie erst einmal nur vier Flugtransporte. Warum das? Werden alle sechs
  mobilisiert? Ich habe gerade probiert, das zu erklären. Jetzt geht es erst einmal
  darum, die erste Ladung, den ersten Schwung herunterzubekommen. Zum Beispiel ist
  auch ein spezielles Such- und Bergungsteam für urbane Situationen vom THW dabei.
  Das muss jetzt schnell dort herunter. Dann haben wir die Situation, dass wir erst
  einmal schauen müssen, wie die Lage vor Ort aussieht, wo man die Luftfahrzeuge hinstellt,
  wo man die sicher betankt, wie man sie wieder nach Hause bekommt, wie die Gesamtsituation
  ist, ob der Tower für das Anflugverfahren beschädigt ist oder irgendwas ist. Wir
  gehen also mit dem dort herunter, was wir haben. Auch die Anlieferung von weiteren
  Hilfsgütern nach Wunstorf wird einfach etwas Zeit benötigen, um die weiteren Maschinen
  zu füllen. Die Maschinen, die jetzt zu Hause geblieben sind und für die sich auch
  die Crews im Stand-by befinden, werden in den nächsten Tagen genutzt, werden beladen,
  werden dann dort herunterfliegen, während andere Maschinen wahrscheinlich zurückkommen.
  Denn es sind ja mehr als 8000 Kilometer, und ansonsten müsste man die Hilfsgüter
  auf anderem Wege ‑ über Schiffsverkehr oder andere Luftfahrzeuge ‑ herunterbringen,
  um sie dann in das Land zu shuttlen. Man muss sie also höchstwahrscheinlich luftgestützt,
  per Flugzeug, herunterfliegen, und das kann man am besten nur überschlagend machen.
  Wenn man am ersten Tag mit sechs Maschinen kommt und die nirgendwo sicher oder auch
  verlässlich hinstellen oder sie betanken kann, dann ist ja nichts gewonnen. Die
  sechs Maschinen sind also da. Die Crews waren vorher schon in Bereitschaft. Die
  haben wir immer. Darüber hinaus haben sich Crews bereiterklärt und gesagt: Ich habe
  am Wochenende nichts vor, ich habe die nächsten zwei Wochen nichts vor, nehmt mich.
  – Sofort nach dem Erdbeben haben wir diese sechs Crews beisammengehabt, plus Technikteam,
  plus Kommandoführung, und die befinden sich weiterhin im Stand-by und werden die
  nächsten Tage genutzt. Natürlich richtet sich das immer auch, wie gesagt wurde,
  nach den Bedarfen. Es kommt also immer darauf an, was in zwei, drei Tagen noch benötigt
  wird, wie die Situation ist und wie die Gesamtschadenslage aussieht. Danach wird
  sich auch der Fluss der Hilfsgüter entscheiden und damit auch das Flugaufkommen.
  Eine Zusatzfrage, um diese ganzen logistischen Fragen zu lösen oder zu koordinieren:
