title: Im Bundesrat beschlossen Mit elektronischer Fußfessel gegen häusliche Gewalt
text: 'Die elektronische Fußfessel soll von Familiengerichten angeordnet werden können,
  um Abstands- und Kontaktverbote wirksam durchzusetzen. Foto: picture alliance /
  Ulrich Baumgarten Der Bundesrat hat den Gesetzentwurf der Bundesregierung zur Einführung
  der elektronischen Aufenthaltsüberwachung und der Täterarbeit im Gewaltschutzgesetz
  beschlossen. Ziel ist es, Menschen besser vor häuslicher Gewalt zu schützen, schneller
  zu handeln und bundesweit einheitliche Regeln zu schaffen. Der Bundestag hat dem
  Gesetzentwurf nun zugestimmt. Hintergrund ist, dass jährlich mehr als 250.000 Fälle
  häuslicher Gewalt erfasst werden – der Großteil der Betroffenen sind Frauen. Diese
  Entwicklung ist ein klarer Handlungsauftrag. Häusliche Gewalt ist keine Privatsache.
  Kern des Vorhabens sind zwei Maßnahmen: eine Rechtsgrundlage für die Anordnung der
  elektronischen Fußfessel in Hochrisikofällen sowie verpflichtende Anti-Gewalt- Trainings
  . Familiengerichte sollen die Fußfessel anordnen können, um Abstands- und Kontaktverbote
  wirksam durchzusetzen. So werden Annäherungen früh erkannt und die Polizei kann
  umgehend reagieren. Auf Wunsch erhalten Betroffene ein Warngerät. Anti-Gewalt- Trainings
  durchbrechen Gewaltmuster und senken Rückfallrisiken. „ Das Beispiel Spanien zeigt:
  Die elektronische Fußfessel kann Leben retten. Auch Anti-Gewalt- Trainings können
  Übergriffe verhindern ”, so Bundesjustizministerin Stefanie Hubig. Der Eingriff
  ist spürbar, deshalb gilt ein enger rechtlicher Rahmen: Anordnung nur durch das
  Familiengericht, nur in Hochrisikofällen, befristet und regelmäßig überprüft. Das
  Familiengericht prüft jeden Fall einzeln. Maßgeblich sind konkrete Tatsachen, die
  im Einzelfall die Annahme rechtfertigen, dass ein Verstoß gegen eine Maßnahme nach
  dem Gewaltschutzgesetz zu erwarten ist und sich daraus eine konkrete, erhebliche
  Gefahr für das Opfer ergibt. Das Gesetz sieht wirksame Durchsetzungsinstrumente
  vor, einschließlich der Möglichkeit, Ordnungshaft anzuordnen. Ziel ist die verlässliche
  Umsetzung der Maßnahme. Verstöße gegen Schutzanordnungen werden strenger geahndet.
  Das Höchstmaß der Freiheitsstrafe steigt auf drei Jahre. Familiengerichte können
  Auskünfte aus dem Waffenregister einholen, um Gefährdungslagen besser einzuschätzen.
  Im parlamentarischen Verfahren wurden Änderungen, insbesondere bei der Ausgestaltung
  der elektronischen Aufenthaltsüberwachung vorgenommen. Neu eingeführt wurde unter
  anderem die Möglichkeit, dass die Koordinierungsstelle eine über die Verbotszone
  hinausgehende „Warnzone“ festlegen kann. Diese soll eine frühere automatisierte
  Benachrichtigung für einen effektiveren Opferschutz ermöglichen. Darüber hinaus
  wurde geregelt, dass der geschützten Person automatisiert Daten über den Aufenthaltsort
  des Täters übermittelt werden können, wenn dieser gegen festgelegte geografische
  Grenzen oder Mindestabstände verstößt. Zusätzlich umfasst die Änderung, dass der
  Täter verpflichtet ist, ein technisches Überwachungsmittel zu tragen, auch, „ein
  zur Verfügung gestelltes Mobiltelefon ständig in betriebsbereitem Zustand bei sich
  zu führen“. Damit soll sichergestellt werden, dass die Koordinierungsstelle den
  Täter jederzeit kontaktieren kann. Zugleich wurde eine vorgesehene Regelung, wonach
  die elektronische Aufenthaltsüberwachung nicht gegen den erklärten Willen des Opfers
  angeordnet werden darf, gestrichen. Es bestehe die Gefahr, dass der Täter so erheblich
  Druck auf die betroffene Person ausüben könne.'
