title: Vorstellung der Fallzahlen für das Jahr 2025 Neuer Höchststand Politisch motivierter
  Gewalt
text: 'Bundesinnenminister Dobrindt und BKA -Präsident Münch bei der Vorstellung der
  Fallzahlen. Foto: picture alliance / Chris Emil Janßen Die Politisch motivierte
  Kriminalität (PMK) hat in Deutschland 2025 erneut einen Höchststand erreicht. Das
  zeigen die Fallzahlen, die Bundesinnenminister Alexander Dobrindt gemeinsam mit
  dem Präsidenten des Bundeskriminalamtes, Holger Münch, am Dienstag in Berlin vorstellte.
  Mit insgesamt 85.837 registrierten Straftaten hat sich die Zahl der Straftaten in
  den vergangenen zehn Jahren mehr als verdoppelt. Auch die Zahl der politisch motivierten
  Gewalttaten ist um rund 1,2 Prozent auf 4.156 Delikte angestiegen. Bundesinnenminister
  Alexander Dobrindt hob hervor, dass sowohl im Phänomenbereich links als auch im
  Phänomenbereich rechts die Gewaltdelikte deutlich ansteigen. Die linke Szene unterstreiche
  mit 42 Prozent mehr an Gewalttaten die wachsende Bedrohung, die von ihr ausgeht.
  Die mit Abstand meisten Delikte würden allerdings von rechten und rechtsextremen
  Tätern verübt, was wiederholt zeige, dass die größte Gefahr aktuell vom Rechtsextremismus
  ausgehe. „Wir stellen uns gegen jede Form von Extremismus und bauen deswegen unsere
  Instrumente gegen die extremistische Bedrohung weiter aus“, so der Bundesinnenminister.
  Weitere Informationen finden Sie beim Bundesinnenministerium und Bundeskriminalamt
  .'
