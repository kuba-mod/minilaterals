title: Endlich wieder Tag der offenen Tür bei der Bundesregierung
text: 'Den Kanzler-Hubschrauber besichtigen, mit ESA-Astronauten sprechen und den
  direkten Dialog mit Mitgliedern der Bundesregierung suchen – all das ist möglich
  am 20. und 21. Juni in Berlin. Früher als in den Vorjahren öffnen das Kanzleramt,
  die Bundesministerien und das Bundespresseamt dieses Mal schon im Juni ihre Tore
  für Besucherinnen und Besucher und bieten ihnen einen Blick hinter die Kulissen
  der Politik. Bürgerinnen und Bürger können sich so umfassend über die Arbeit der
  Bundesregierung informieren und auf Entdeckungsreise im politischen Berlin gehen
  – zum Beispiel in den verschiedenen Bundesministerien, in denen viele Ministerinnen
  und Minister selbst Rede und Antwort stehen. Auch für Familien mit Kindern wird
  an vielen Orten ein spannendes Programm geboten. Highlights im Bundeskanzleramt
  Mit dabei sind natürlich auch Bundeskanzler Friedrich Merz und der Chef des Bundeskanzleramts
  Thorsten Frei, die am Sonntag im Bundeskanzleramt vor Ort sein werden. Auf der Bühne
  im so genannten Ehrenhof gibt es zudem ein abwechslungsreiches Programm mit Talks,
  Kinderprogramm und Live-Musik. Im Haus informieren auch das Team der Staatsministerin
  für Sport und Ehrenamt Christiane Schenderlein und der Bundesnachrichtendienst über
  ihre Arbeit. Der Beauftragte der Bundesregierung für Kultur und Medien, Wolfram
  Weimer, ist ebenfalls vor Ort. Beim Planspiel „Bundeskabinett“ können die Besucherinnen
  und Besucher in die Rolle eines Kabinettsmitglieds schlüpfen. Die Besichtigung der
  Gastgeschenkeausstellung, des internationalen Konferenzsaales sowie der Kanzlergalerie
  ist ebenfalls möglich. Im Kanzlergarten gibt es u.a. Mitmachaktionen für Kinder
  und die Bundespolizei präsentiert ihre Arbeit und einen ihrer Hubschrauber. Spannende
  Talkrunden im Bundespresseamt Im Bundespresseamt wird auf dem Podium diskutiert:
  Es geht um alle aktuellen Themen der Innen- und Außenpolitik, um neues Wirtschaftswachstum,
  die Modernisierung des Landes und die Stärkung der Bundeswehr. Alles unter dem Motto:
  Das kann Deutschland. Erwartet werden unter anderem Finanzminister Klingbeil, Außenminister
  Wadephul, Verkehrsminister Schnieder, Justizministerin Hubig, Familienministerin
  Prien und Bauministerin Hubertz, Digitalminister Wildberger und Forschungs- und
  Raumfahrtministerin Bär. Sie wird u.a. von den beiden ESA-Astronauten Alexander
  Gerst und Matthias Maurer begleitet. Auch hochrangige Vertreterinnen und Vertreter
  der Bundeswehr, des THW und des Bevölkerungsschutzes stehen auf der Bühne Rede und
  Antwort. Regierungssprecher Stefan Kornelius wird zudem am Samstag in einer Kinder-
  und Jugendpressekonferenz die Fragen von Kindern und Jugendlichen beantworten. An
  allen Standorten gibt es ein vielseitiges Kinder- und Familienprogramm. Das ausführliche
  Programm finden Sie hier!'
