date: '2026-06-19'
type: press_release
source_name: german_chancellery
title: Pressekonferenz des Bundeskanzlers nach dem Europäischen Rat „Haben gezeigt,
  dass wir als Europäer handlungsfähig sind“
text: 'Beim Europäischen Rat habe man über eine Reihe von Themen gesprochen, „die
  für die Europäische Union von großer Bedeutung sind“, sagte Merz im Anschluss. Bundeskanzler
  Friedrich Merz hat nach den Beratungen beim Europäischen Rat ein positives Fazit
  gezogen und die zentralen Weichenstellungen für die Zukunft Europas hervorgehoben.
  Er betonte die Notwendigkeit eines realistischen EU ‑Finanzrahmens, die Stärkung
  der Wettbewerbsfähigkeit, neue handelspolitische Schutzmechanismen sowie eine eng
  koordinierte europäische Linie im Ukraine‑Krieg. Besonders wichtig sei, so Merz,
  dass Europa handlungsfähig bleibt – in der EU wie im G7 ‑Format. Im Mittelpunkt
  standen außerdem die Fortschritte bei der EU ‑Erweiterung, die Vorbereitung möglicher
  Friedensgespräche zur Ukraine und die Lage im Nahen Osten. Bundeskanzler Merz betonte,
  dass der zwischen den USA und Iran ausgehandelte Waffenstillstand im Süden des Libanon
  dringend eingehalten werden müsse. Meine Damen und Herren, vielen Dank für Ihr Kommen!
  Wir haben die Beratungen nach fast 20 Stunden heute und gestern abgeschlossen. Wir
  haben bei diesem Gipfel eine ganze Reihe von wichtigen Themen besprochen, die für
  die Europäische Union insgesamt von großer Bedeutung sind. Lassen Sie mich mit dem
  Mehrjährigen Finanzrahmen beginnen. Das hat für uns eine große Priorität; denn wir
  wollen ja versuchen, noch im Jahr 2026 zu einem Abschluss zu kommen, weil wir dann
  auch Planungssicherheit für die Zeit ab 2028 haben. Ich will allerdings auch dazusagen:
  Der Vorschlag, den wir zurzeit haben, ist aus deutscher Sicht unbezahlbar und auch
  unausgewogen. Der nächste Vorschlag, den wir dann in der nächsten Präsidentschaft
  erwarten, muss deutlich unter dem gegenwärtigen Vorschlag liegen. Die irische Ratspräsidentschaft
  ist gebeten, einen akzeptablen Vorschlag vorzulegen. Wir werden uns natürlich konstruktiv
  in die Debatten der nächsten Wochen einbringen. Bereits gestern ging es um die Wettbewerbsfähigkeit
  der Europäischen Union. Für uns alle ist das ein zentrales Thema, das jetzt auf
  jedem Europäischen Rat besprochen und auch vorangetrieben wird. Die Kommissionspräsidentin
  legt vor jedem Europäischen Rat einen sogenannten Fortschrittsbericht vor, auf dessen
  Grundlage wir dann auch gegebenenfalls nachsteuern können. Ich bin sehr dankbar,
  dass wir alle zusammen ein Verständnis darüber haben, dass wir in diesem Jahr und
  im nächsten Jahr zu einigen Entscheidungen kommen müssen, die auch dieses Thema
  einschließlich der gesamten bürokratischen Lasten für unsere Unternehmen und auch
  für die Bürgerinnen und Bürger in den Blick nehmen. Im engen Zusammenhang damit
  steht auch das Thema globale ökonomische Ungleichgewichte. Wir waren uns einig,
  dass wir uns als größter Binnenmarkt der Welt vor marktverzerrenden Praktiken und
  Ungleichgewichten besser schützen müssen. Wir haben ein Gewicht auf der Welt, und
  das wollen wir auch einsetzen. Wir haben der Europäischen Kommission vor diesem
  Hintergrund zwei Aufträge auf den Weg gegeben: Erstens soll die Kommission weiterhin
  selbstbewusst die Interessen der Europäischen Union im konstruktiven Dialog mit
  unseren Handelspartnern verteidigen. Zweitens soll die Kommission unsere Handelsschutzinstrumente
  nachschärfen und um weitere Instrumente ergänzen. Der Europäischen Union müssen
  wirksame Instrumente zur Verfügung stehen, um ihre Interessen auf der Welt effektiv
  zu verteidigen. Von besonderer Bedeutung war diesmal unser Austausch mit dem ukrainischen
  Präsidenten Wolodymyr Selenskyj . Er hat uns sehr ausführlich von den Entwicklungen
  an der Front berichtet. Die Lage hat sich dort in den letzten Wochen zugunsten der
  Ukraine verschoben. Es ändert sich die gesamte Dynamik dieses schrecklichen Krieges.
  Wir haben beraten, wie wir auf dem Weg zu einem Frieden in der Ukraine vorankommen.
  Mir war wichtig, hier ins Zentrum zu stellen, dass es jetzt wirklich um die Substanz
  der diplomatischen Bemühungen geht. Wir haben wichtige Fortschritte gemacht. Keir
  Starmer , Emmanuel Macron und ich haben mit Wolodymyr Selenskyj ja schon in London
  vor einigen Tagen Eckpunkte für mögliche Friedensgespräche formuliert. Es gibt dafür
  sehr breite Unterstützung im Kreis der europäischen Staats- und Regierungschefs.
  Wir waren uns auch beim G7 -Gipfel in Évian zu Beginn dieser Woche erstmals in seiner
  zweiten Präsidentschaft mit Präsident Trump einig: Wir wollen gemeinsam unsere Unterstützung
  für die Ukraine verbessern und den Druck auf Moskau noch einmal erhöhen. Die Botschaft
  an Russland ist klar: Es ist jetzt an der Zeit, in ernsthafte Verhandlungen einzutreten.
  Es liegt nur noch an Moskau. Diese Fortschritte, die wir gemeinsam mit Amerika im
  G7 -Format erzielt haben, begrüßen auch die europäischen Partner. Wir haben uns
  auch über das mögliche Format miteinander verständigt. Verhandlungen zu einem Frieden
  müssen am Ende die Ukraine, Russland, Europa und die USA führen. Wer dabei für Europa
  spricht, ist jetzt nicht zu entscheiden. Erst müssen wir in der Sache einig sein;
  dann klären wir die Formate eins nach dem anderen. Auch beim Thema Erweiterung gibt
  es eine positive Dynamik. Letzte Woche haben wir das erste Cluster der Verhandlungskapitel
  für die Ukraine und für Moldau eröffnet. Gestern haben wir angestoßen, dass auch
  die anderen Cluster angegangen werden. Auf meinen Wunsch werden wir beim Europäischen
  Rat im Oktober ausführlicher über das Thema sprechen, insbesondere was den sogenannten
  westlichen Balkan betrifft. Mir ist wichtig, dass wir nicht entscheiden, ob wir
  die Beitrittsprozesse beschleunigen, sondern dass wir entscheiden, wie wir die Beitrittsprozesse
  beschleunigen können. Schließlich gab es über Mittag noch eine ausführliche Diskussion
  zur Lage im Nahen Osten. Wir sind uns in der Bewertung einig: Es ist jetzt dringend
  erforderlich, dass der zwischen den USA und dem Iran ausgehandelte Waffenstillstand
  auch im Süden des Libanon hält. Wir rufen die israelische Regierung auf, von einer
  weiteren Eskalation durch den Siedlungsbau im Westjordanland abzusehen. Ich habe
  dies auch immer wieder in meinen Gesprächen mit Präsident Netanjahu deutlich gemacht.
  Wir haben auch Handelsmaßnahmen gegen Israel diskutiert. Diese Vorschläge habe ich
  für die Bundesregierung abgelehnt. Ich will abschließen: Wir haben intensive Diskussionen
  auf zwei großen internationalen Formaten in dieser Woche geführt, sowohl in den
  G7 als auch im Europäischen Rat. Ich habe gerade eben Präsident Macron noch einmal
  für seine sehr erfolgreiche Präsidentschaft im G7 -Format gedankt. Dass wir in dieser
  Woche so gut und so einvernehmlich miteinander ein umfassendes Leaders‘ Statement
  abgeben konnten, ist ganz maßgeblich sein Verdienst, aber auch das Ergebnis einer
  guten Abstimmung auf der europäischen Seite. Die Mitglieder aus der Europäischen
  Union, die in der G7 -Gruppe vertreten sind – Frankreich, Italien und Deutschland
  –, sind von Anfang an sehr gut koordiniert gewesen. Wir haben das auch gemeinsam
  mit Großbritannien gut vorbesprochen. Ich gehe davon aus, dass wir diese Zusammenarbeit
  in den nächsten Wochen und Monaten auch fortsetzen. Wir werden, wenn es um die Ukraine
  geht, natürlich auch immer wieder mit Polen sprechen. Ich will das ohnehin einmal
  betonen: Es gibt kein Format und keine Gespräche, die ich führe, ohne auch gleichzeitig
  immer wieder kleinere und mittlere Mitgliedstaaten der Europäischen Union zu informieren –
  insbesondere dann, wenn sie unmittelbar selbst regional betroffen sind, wie zum
  Beispiel die Anrainerstaaten in Osteuropa. Insofern haben wir, glaube ich, gezeigt,
  dass wir als Europäer handlungsfähig sind, und zwar sowohl im großen Format der
  G7 als auch in der großen Runde der Staats- und Regierungschefs der Europäischen
  Union. Ich fahre in dieser Woche nach intensiven Beratungen in dem Gefühl nach Hause,
  dass die internationale Zusammenarbeit sowohl in Europa als auch im G7 -Format gut
  funktioniert. Das ist die Voraussetzung dafür, dass wir unseren Beitrag zu nicht
  mehr und nicht weniger als zum Frieden auf der Welt leisten. – Herzlichen Dank.
  Frage : Herr Bundeskanzler, es scheint ja größere Uneinigkeit zu geben, wer für
  die Europäer am Verhandlungstisch sitzen soll, wenn es zu Gesprächen zwischen der
  Ukraine und Russland kommen wird. Sehen Sie trotz dieser Uneinigkeit immer noch
  genug Rückhalt in der EU für die E3 , den diplomatischen Prozess fortzuführen? Hat
  die E3 eigentlich eigene Gesprächskanäle nach Russland, auf welcher Ebene auch immer,
  oder herrscht da im Moment totale Funkstille? Bundeskanzler Friedrich Merz : Ich
  bitte um Nachsicht, dass wir über Details unserer Beratungen nicht öffentlich informieren.
  Wichtig ist mir aber zweierlei. Zum einen: Dieses E3 -Format ist auf den ausdrücklichen
  Wunsch der Ukraine hin zustande gekommen. Es hat auch eine gewisse innere Logik,
  dass Großbritannien, Deutschland und Frankreich hier eng zusammenarbeiten; denn
  das sind große Staaten in Europa, und das sind auch diejenigen, die in erheblichem
  Umfang zur militärischen Unterstützung der Ukraine beitragen – Deutschland ist da
  mittlerweile mit großem Abstand die Nummer eins. Es ist, wie gesagt, der ausdrückliche
  Wunsch der Ukraine gewesen, dass diese drei Länder hier eine Rolle spielen, auch
  in der Koordinierung. Das tun wir. Großbritannien als ein Land, das nicht mehr der
  Europäischen Union angehört, muss trotzdem dabei sein. Es ist ein wichtiger NATO
  -Partner in Europa, und wir sprechen zusammen ja nicht nur über die Ukraine, sondern
  wir sprechen auch über wichtige Fragen in der Vorbereitung des NATO -Gipfels in
  Ankara in wenigen Tagen. Insofern sind das wichtige Gesprächsformate. Wir beziehen
  natürlich immer auch Italien, Polen und auch andere Mitgliedstaaten der Europäischen
  Union ein; das ist für uns selbstverständlich. Wer für die Europäische Union spricht,
  müssen wir heute nicht entscheiden. Das werden wir entscheiden, wenn es zu Gesprächen
  kommt. Selbstverständlich ist klar, dass António Costa , der Präsident des Europäischen
  Rates, hier eine wichtige Rolle zu spielen hat. Er vertritt die Europäische Union,
  er sorgt dafür, dass wir in der Europäischen Union gute Gespräche führen und dass
  wir auch gut organisiert, gut vorbereitet in die Tagungen des Europäischen Rates
  gehen. Insofern brauchen wir im Augenblick keine darüber hinausgehenden Entscheidungen
  zu treffen. Frage : Herr Bundeskanzler, können Sie bitte ein bisschen präzisieren,
  welche Instrumente Sie von der EU -Kommission haben wollen? Sind das auch welche
  gegen Währungsmanipulationen, die Sie jetzt ja immer angesprochen haben? Eine Zusatzfrage:
  Die USA haben eine Untersuchung gegen Deutschland wegen der Pharmapreise eingeleitet.
  Sorgen Sie sich, dass das Zollabkommen mit den USA jetzt wieder hinfällig ist, weil
  möglicherweise höhere Zölle auf Pharmaprodukte kommen? Bundeskanzler Merz : Nein,
  ich gehe davon aus, dass die Vereinigten Staaten von Amerika sich an die Verabredung
  halten, die wir haben. Was die Erstattung von modernen, innovativen Arzneimitteln
  durch unsere Krankenkassen betrifft, so ist das eine Entscheidung, die in unserer
  nationalen Zuständigkeit liegt. Wenn Amerika darüber Informationen haben möchte,
  dann stellen wir sie selbstverständlich gerne zur Verfügung. Das ist aber eine Frage
  unseres Erstattungssystems in der gesetzlichen Krankenversicherung. Insofern ist
  das eine rein innerstaatliche Angelegenheit, über die wir uns hier dann auch gegebenenfalls
  unterhalten müssen. Die Frage, wie wir in den Formaten weiter vorangehen, ist eine
  Frage, die ich gerade erläutert habe. Ich denke, wir haben jetzt wirklich einen
  guten Rhythmus gefunden, wie wir die Gespräche führen. Dass wir alle darum bemüht
  sind, den Krieg in der Ukraine so schnell wie möglich zu beenden, ist, glaube ich,
  für uns alle klar. Bundeskanzler Merz : Ach so, Sie wollten die ‑ ‑ ‑ Entschuldigung,
  das habe ich dann falsch verstanden. – Welche Instrumente uns zur Verfügung stehen,
  das soll die Kommission jetzt für den nächsten Rat vorbereiten. Ich habe das Thema
  Währungsrelationen oder Wechselkurse bereits im G7 -Format angesprochen – übrigens
  auch mit großer Zustimmung der amerikanischen Seite, weil Amerika davon genauso
  betroffen ist wie wir auch. Wir konkurrieren in einigen Fällen mit Währungsräumen,
  deren Währungen gegenüber dem Euro um bis zu 30 Prozent zu niedrig bewertet sind.
  Ich habe daran erinnert, dass es auch in früheren Jahrzehnten schon einmal solche
  Verwerfungen zwischen Handelsräumen gab. Es hat dann vernünftige Gesprächsformate
  gegeben, in denen man sich mit solchen Fragen dann letztendlich auseinandersetzt.
  Im Plaza-Hotel in New York wurde einmal eine Verabredung getroffen, und auch in
  Paris gab es entsprechende Verabredungen, noch bevor es den Währungsverbund im europäischen
  Rahmen bzw. die EU ‑Währungsunion gab. Es gab damals das europäische Währungssystem.
  Das war auch ein System, in dem man sich über Korridore bezüglich der Wechselkurse
  verständigt hat. So etwas schwebt mir jetzt vor. Wir wollen keine gegenseitigen
  Schuldzuweisungen vornehmen, sondern wir wollen versuchen, diese Imbalances auszugleichen.
  Es sind Imbalances , die ja nicht nur zulasten der Handelspartner gehen, sie gehen
  auch zulasten der Binnennachfrage und der Kaufkraft im Inland. Es kann also, im
  Grunde genommen, niemand Interesse daran haben, auf Dauer solche Währungsbelastungen,
  solche Verschiebungen auch im Rahmen der wirklichen Kaufkraft der einzelnen Währung
  zu haben. Insofern sind Gespräche angezeigt. Diese müssen wir in unserem Interesse
  aber auch führen. Frage : Herr Bundeskanzler, zunächst eine Nachfrage zu den möglichen
  Verhandlungen mit Russland: Sie haben gesagt, erst müsse man sich in der Sache einig
  sein, dann kläre man die Formate. Wo sind Sie sich als E3 und mit der Ukraine in
  der Sache noch nicht einig? Welche Fragen sind noch zu klären? Zum Zweiten zur Erweiterung:
  Sie haben gesagt, die Debatte komme eigentlich erst im Oktober. Sie haben aber Ihre
  Überlegungen schon unterbreitet und wohl auch im Raum vorgestellt. An Ihrem Vorschlag
  einer assoziierten Mitgliedschaft für die Ukraine gibt es viel Kritik aus den Mitgliedstaaten.
  Die Argumente lauten, man dürfe die Ukraine nicht gegenüber dem Westbalkan bevorzugen
  und es sei rechtlich nicht machbar, einen Beobachterstatus einzuführen. Ist der
  Vorschlag im Grunde jetzt schon tot, bevor Sie wirklich darüber diskutieren können?
  Bundeskanzler Merz : Zunächst einmal: In der Sache einig zu sein, heißt, mit Russland
  einig zu sein, dass wir jetzt verhandeln. Das ist die Voraussetzung dafür, dass
  wir definieren, wer verhandelt. In erster Linie entscheidet darüber die Ukraine.
  Die Ukraine ist das betroffene Land. Die Ukraine hat letztendlich darüber zu entscheiden,
  wer an ihrer Seite steht und Verhandlungen führt. Die Europäische Union ist kein
  neutraler Dritter und kein Mediator, sondern sie ist Partei auf der Seite der Ukraine.
  Dann entscheidet auch die Ukraine, wer für sie und mit ihr verhandelt. Das heißt,
  in der Sache einig zu sein mit Russland, heißt, darüber einig zu sein, dass Verhandlungen
  geführt werden. Da sind wir noch nicht, und ich wiederhole: Es liegt ausschließlich
  an Russland, die Entscheidung zu treffen, jetzt in Verhandlungen einzutreten. Was
  den Erweiterungsprozess betrifft, haben wir darüber aus Zeitgründen gestern und
  heute nicht ausführlich gesprochen. Das war rein den zeitlichen Umständen geschuldet,
  weil die Tagesordnung schon sehr voll war und weil es zum Teil auch sehr lange gedauert
  hat. Wir haben zwei Papiere vorgelegt. Zunächst einmal habe ich einen Vorschlag
  gemacht, was eine assoziierte Mitgliedschaft der Ukraine betrifft, und in meinem
  Brief an die Kommissionspräsidentin und an den Ratspräsidenten auch den Westbalkan
  einbezogen. Ich habe dann mit Emmanuel Macron ein sogenanntes Non-Paper vorgelegt,
  in dem wir es präzisiert haben und in die Tiefe gegangen sind. Die assoziierte Mitgliedschaft
  geht ohne Vertragsänderung. Wir haben Vorbilder dafür. Ich will noch einmal daran
  erinnern – das hat bei mir gedanklich ein bisschen Pate gestanden –: Als wir 1990,
  ein Jahr nach der zuvor stattgefundenen Europawahl, mit der Deutschen Einheit ein
  Territorium in die Europäische Union aufgenommen hatten, das seinerzeit noch nicht
  in den Institutionen vertreten war, haben wir für die damals noch bestehende DDR
  und anschließend für die ostdeutschen Bundesländer einen Beobachterstatus im Europäischen
  Parlament eingeführt. Aus Ostdeutschland sind damals 18 Beobachter ohne Stimmrecht
  in das Europäische Parlament eingezogen. Das ging ohne Vertragsänderung. Deswegen
  geht auch das, was ich jetzt vorgeschlagen habe, ohne Vertragsänderung. Mein Vorschlag
  zielte genau darauf ab, etwas zu ermöglichen, was ohne Vertragsänderung geht. Alles
  andere ist eine Illusion. Wir bekommen zum jetzigen Zeitpunkt in Europa keine Vertragsänderungen
  hin. Das Ganze muss natürlich auch mit dem Prozess um den Westbalkan abgestimmt
  werden. Ich möchte keine unterschiedlichen Geschwindigkeiten. Es gibt unterschiedliche
  Sachverhalte, es gibt unterschiedliche Fortschrittsberichte, es gibt unterschiedliche
  Restriktionen. Ein Land im Krieg wie die Ukraine kann nicht Mitglied der Europäischen
  Union werden, aber es könnte assoziiertes Mitglied der Europäischen Union und später
  Vollmitglied der Europäischen Union werden. Beim Westbalkan verhält es sich anders.
  Wir verhandeln mit diesen Staaten schon seit fast 20 Jahren über die Mitgliedschaft
  in der Europäischen Union. Mindestens eines der Länder, nämlich Montenegro, ist
  praktisch aufnahmebereit. Die Cluster sind weitgehend abgeschlossen. Das Land könnte
  jetzt sozusagen in den finalen Prozess eintreten. Da gibt es die Frage: Alle zugleich,
  oder nacheinander? – Es gibt gute Gründe, zu sagen: Alle zugleich. – Es gibt aber
  auch gute Gründe, zu sagen: Einer nach dem anderen. – Darüber werden wir aber beim
  nächsten Europäischen Rat sprechen. Das ist alles andere als vom Tisch. Im Gegenteil,
  die Vorschläge sind auf dem Tisch, und es gibt eine große Zahl von Kolleginnen und
  Kollegen, die dankbar dafür sind, dass sie aus der Frustration des vergangenen Jahres
  heraus sind, die wir hatten, als wir den vorigen Westbalkangipfel hier in Brüssel
  durchgeführt haben und keiner so richtig wusste, was wir jetzt mit den Westbalkanstaaten
  machen und wie wir dabei vorankommen. Der Versuch von Emmanuel Macron und mir ist
  schlicht der, aus dieser Schleife herauszukommen und einen Vorschlag zu machen,
  wie wir mit diesem Thema weiterkommen. Ich sage es immer wieder: Am Tisch oben sitzt
  der Ministerpräsident aus Kroatien, Andrej Plenković . Kroatien ist das letzte Land,
  das der Europäischen Union beigetreten ist, vor 13 Jahren, und Andrej Plenković
  ist mittlerweile der dienstälteste Ministerpräsident, der dort am Tisch sitzt. Man
  kann an diesem Beispiel also sehen, wie lange das her ist und wie überfällig es
  ist, dass wir über Erweiterungen sprechen, vor allen Dingen bei den Ländern, die
  eigentlich beitrittsreif sind. Frage : Herr Bundeskanzler, das Thema des Bürokratieabbaus
  haben Sie gerade nur sehr oberflächlich angeschnitten. Man hat jetzt insgesamt nicht
  mehr viel Konkretes darüber gehört. Denken Sie noch immer, dass Sie dieses Jahr,
  wie Sie es vorhatten, bei der EU konkrete Umsetzungen erreichen wie zum Beispiel
  die Genehmigungsfiktion? Welche Länder sind dabei eigentlich die Bremser? Bundeskanzler
  Merz : Ich habe das ganz und gar nicht nur oberflächlich angesprochen, sondern ich
  habe es in meinem kurzen Eingangsstatement sehr klar gesagt. Das ist eines der Hauptthemen,
  mit dem wir uns auch jetzt wieder beschäftigt haben. Die Kommission legt jetzt zu
  jedem Europäischen Rat einen Fortschrittsbericht vor. Die Kommission lässt zu, dass
  wir jedes Mal miteinander auch über Nachsteuerungen reden, über die Frage, wie wir
  schneller vorankommen. Wir haben auch noch einmal – das habe ich eben nicht erwähnt,
  aber ich hole es nach – über das 28. Regime gesprochen, also die einfache, in ganz
  Europa verfügbare Rechtsform für Start-up - und Scale-up -Unternehmen, die innerhalb
  von 24 Stunden ein Unternehmen für ganz Europa gründen können sollen. Diese Idee
  ist nach wie vor richtig. Wir wollen sie vorantreiben, und wir sind uns einig, dass
  wir das bis zum Ende des Jahres ermöglichen wollen. Es hat auch heute und gestern
  eine große Rolle im Rat gespielt, dass wir dieses Thema wirklich jetzt gemeinsam
  weiter mit Nachdruck bearbeiten. Natürlich gibt es Widerstände, und natürlich gibt
  es immer wieder Bremser, aber es ist unsere Aufgabe, genau das zu überwinden und
  dafür zu sorgen, dass wir das, was uns Enrico Letta und Mario Draghi gesagt haben
  und was wir am 12. Februar sehr intensiv miteinander diskutiert haben, jetzt umsetzen.
  Frage : Herr Bundeskanzler, auch noch einmal zum Thema China: Das ist für Sie ja
  eine Gratwanderung. Auf der einen Seite wollen Sie natürlich einen offenen Handelskrieg
  vermeiden. Auf der anderen Seite besteht ja sehr großer Handlungsdruck, jetzt doch
  etwas zu tun, einfach deswegen, weil sich die Zahlen sehr dramatisch entwickelt
  haben, was die „ trade balance “ angeht. Wie wollen Sie vermeiden, dass sich die
  Chinesen von den diskutierten Maßnahmen provoziert fühlen und jetzt schon reagieren?
  Können Sie noch einmal kurz erläutern, was genau Sie mit dem „ exchange rate corridor
  “ gemeint haben und wer da mit wem diskutiert? Bundeskanzler Merz : Zunächst einmal:
  Wir haben ganz allgemein über geoökonomische Ungleichgewichte gesprochen. Wir respektieren
  es und erkennen es an, wenn es Länder gibt, die zum Beispiel hohe Ausgaben für Forschung
  und Entwicklung tätigen und damit auch technologisch sehr schnell vorankommen. Wir
  akzeptieren voll und ganz, wenn die Produktivität in diesen Ländern höher ist als
  in Europa. Das ist für uns ein Wettbewerb, dem wir uns zu stellen haben, ohne Wenn
  und Aber, und daran gibt es nichts zu kritisieren. Wenn andere besser sind als wir,
  dann müssen wir uns anstrengen, wieder gut zu werden. Wenn es sich allerdings um
  hohe Subventionen in ganzen Branchen handelt, die damit Märkte überfluten, wenn
  wir sehen, dass einzelne Länder 13 Prozent oder 14 Prozent der Weltnachfrage und
  gleichzeitig über 30 Prozent der Industrieproduktion haben, wenn also systematisch
  in Überkapazitäten hinein subventioniert wird, und wenn das Ganze mit einer Währung
  begleitet wird, die nicht frei konvertierbar ist und die letztendlich auch nicht
  am Kapitalmarkt teilnimmt, weil der Kapitalmarkt für sich abgeschottet ist, dann
  sind das Wettbewerbsverzerrungen, die wir nicht einfach hinnehmen wollen. Darüber
  muss man dann auch offen sprechen. Ich tue das bei meinen Besuchen in den Ländern,
  mit denen wir intensiv Handel treiben. Ich spreche diese Themen offen an, und ich
  erwarte, dass akzeptiert wird, dass wir über diese Themen sprechen. Wenn es sich
  um diese währungspolitischen Fragen handelt, dann will ich noch einmal an das EWS,
  das Europäische Währungssystem, erinnern, das wir in Europa einmal etabliert hatten,
  um zum Beispiel zu vermeiden, dass über die Wechselkurse Wirtschaftspolitik gemacht
  wird. Ob das das richtige Format ist, sei dahingestellt; ich will nur sagen: Wir
  haben auf der europäischen Seite und auf der transatlantischen Seite mit solchen
  Dialogformaten über Wechselkurse Erfahrungen, und das sind im Wesentlichen gute
  Erfahrungen. Wir müssen über dieses Thema miteinander reden. Ich denke, es liegt
  im beiderseitigen Interesse, das zu tun. Denn auch eine künstlich niedrig gehaltene
  Währung beeinträchtigt die Kaufkraft im eigenen Land. Sie ist also für diejenigen,
  die damit außenwirtschaftliche Wettbewerbspositionen verbessern wollen, nicht nur
  von Vorteil. Insofern ist das ein Dialog, den wir führen müssen. Und noch einmal:
  Das ist ein Dialog im gegenseitigen Interesse. Frage : Herr Bundeskanzler, die erste
  Frage zum MFF , ganz kurz: Was meinen Sie mit „deutlich“? Können Sie eine Größenordnung
  angeben, wenn Sie sagen, die Zahlen müssten herunter? Um wie viel? Über wie viel
  reden wir da? Zweite Frage zum MFF , nach den Beratungen, die Sie heute geführt
  haben: Was werden Sie in den kommenden Monaten in die Waagschale werfen, um das
  Ziel zu erreichen, noch in diesem Jahr fertig zu werden? Inwiefern können Sie das
  jetzt besser abschätzen? Bundeskanzler Merz : Das Jahr 2026 kann ich nicht abschätzen.
  Ich kann nur von meiner Seite aus sagen – ich habe das im Kabinett bereits besprochen,
  und wir werden das noch einmal besprechen; ich werde das auch in enger Abstimmung
  mit dem Bundeskabinett, insbesondere mit dem Finanzminister, tun –: Wir wollen im
  Jahr 2026 zu einem Abschluss kommen, einfach deshalb, um Planungssicherheit zum
  Beispiel für die Kohäsions- und Agrarmittel auch für die Jahre ab 2028 zu haben.
  Diejenigen, die davon profitieren, müssen einfach die Planungssicherheit haben,
  dass es diese Mittel ab 2028 weiterhin gibt, in verändertem Umfang, aber die Mittel
  werden ja nicht gänzlich gestrichen, sondern es wird Veränderungen geben. Aber gerade
  der Umstand, diese Veränderungen rechtzeitig zu kennen, ist für alle Beteiligte
  wichtig. In welchem Umfang wir reduzieren, das will ich im Augenblick gar nicht
  voraussagen. Das hängt ganz entscheidend davon ab, wie die einzelne Gewichtung sein
  wird. Wir haben jetzt, im Grunde genommen, drei Säulen. Die Gemeinsame Agrarpolitik
  und die Kohäsionspolitik werden in die regionalen Partnerschaftsprogramme zusammengefasst.
  Es wird dann die Wettbewerbsfähigkeit und den dazugehörigen Fonds sowie die Mittel
  für die Außenpolitik und für die Handelspolitik geben. Die Gewichtung dieser drei
  Säulen untereinander ist genauso ungeklärt wie die Frage, wie die Europäische Union
  eigentlich ihre Einnahmen finanziert. Die Kommission hat ja auch Vorschläge für
  ein neues Regime der Eigenmittel unterbreitet. Dazu müssen wir, jeder für sich,
  eine entsprechende Rückkopplung mit den Mitgliedsstaaten vornehmen, weil Eigenmittel
  dabei sind, die zum Teil durch eigene Steuereinnahmen bereits in den nationalen
  Haushalten verbucht sind. Da kommt jetzt also eine ganze Reihe von hochkomplexen
  Fragen auf uns zu. Insofern will und kann ich mich jetzt nicht festlegen. Ich sage
  nur: Der Vorschlag der Kommission, sogar noch mehr der Vorschlag des Europäischen
  Parlaments, auf einen Betrag in Höhe von 1,6 Billionen oder gar 1,7 Billionen Euro
  für die nächsten sieben Jahre zu gehen, ist ein Vorschlag, der aus meiner Sicht
  nicht darstellbar ist. Er ist auch nicht finanzierbar. Ich habe den Kollegen eben
  gerade noch einmal gesagt, was das für den europäischen Zahlungsbeitrag in den Haushalt
  der Europäischen Union – nicht für den Nettobeitrag, der ist in diesem Zusammenhang
  unerheblich – bedeuten würde. Dieser Vorschlag, den wir jetzt von der Kommission
  und vom Rat haben, ist ein Vorschlag, der bei uns pro Jahr um mindestens 15 Milliarden,
  eher 20 Milliarden Euro höhere Beiträge an den europäischen Haushalt auslösen würde.
  Dass das angesichts unserer Haushaltslage im Augenblick nicht darstellbar ist, und
  zwar auf lange Zeit, das wird, denke ich, jedem klar, wenn er nur einmal die Zahlen
  hört. Deswegen habe ich diese Zahlen im Rat vorgetragen, übrigens nicht zum ersten
  Mal. Ich habe das im vergangenen Jahr kurz vor Weihnachten schon einmal getan und
  den Kollegen einfach gesagt: Ihr müsst wissen, was geht und was nicht geht, und
  das geht nicht. Vielen Dank. Guten Heimweg und schönes Wochenende! Bis zum nächsten
  Mal! Ciao !'
