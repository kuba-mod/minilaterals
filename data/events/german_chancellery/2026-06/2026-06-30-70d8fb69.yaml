title: Schwerpunkte der Bundesregierung Neues Wirtschaftswachstum und gute Arbeit
text: 'Die Bundesregierung will das Wirtschaftswachstum voranbringen und gute Arbeitsbedingungen
  unterstützen. Deutschland soll eine starke Industrienation und Mittelstandsland
  bleiben – und zugleich zur KI - und Gründer-Nation werden. Die Bundesregierung setzt
  deswegen insbesondere auf Entlastungen, gezielte Innovationsförderung und umfassende
  Investitionen in Digitalisierung, Infrastruktur und Energieversorgung. Profitieren
  sollen davon Unternehmen sowie Verbraucherinnen und Verbraucher. Ziel ist es, das
  Wirtschaftswachstum und die Wettbewerbsfähigkeit nachhaltig zu stärken. Gleichzeitig
  sollen die Arbeitsbedingungen verbessert, die Altersvorsorge unterstützt sowie qualifizierte
  Fachkräfte gewonnen werden. Um das Wirtschaftswachstum und die Wettbewerbsfähigkeit
  Deutschlands zu steigern, werden Unternehmen entlastet und damit Investitionsanreize
  geschaffen. Das steuerliche Investitionssofortprogramm ist am 19. Juli in Kraft
  getreten. Es soll dazu beitragen, den Standort Deutschland kurzfristig und auf Dauer
  zu stärken und zu modernisieren: Ein neuer Deutschlandfonds schließt zudem Finanzierungslücken
  für Mittelstand, Industrie, junge Unternehmen und Energieversorgungsunternehmen.
  Das Interesse in- und ausländischer Investoren am Standort Deutschland steigt wieder
  deutlich. Mit dem Standortfördergesetz ermöglicht die Bundesregierung mehr private
  Investitionen und fördert Start-ups sowie innovative Unternehmen. M ehr private
  Kapitalgeber aus dem Ausland zu gewinnen, ist zudem Aufgabe des neuen Persönlichen
  Beauftragten für Investitionen des Bundeskanzlers . Innovationsstandort stärken:
  Mit ihrer Hightech Agenda fördert die Bundesregierung zentrale Technologien, damit
  Deutschland nicht nur ein Top-Forschungsstandort bleibt, sondern auch wieder ein
  wettbewerbsfähiger Technologie- und Innovationsstandort wird. So will sie mit der
  Mikroelektronik-Strategie Deutschlands Rolle als führender Halbleiterstandort in
  Europa sichern und die Chancen des „ European Chips Act ” nutzen. Konkret geht es
  um Anreize, hierzulande in Entwicklung und neue Produktionsstätten zu investieren.
  Erstmals sollen zudem Mikroelektronik-Fachkräfte gezielt gefördert werden. Die Bundesregierung
  reduziert die Energiekosten spürbar und dauerhaft. Das soll sowohl die internationale
  Wettbewerbsfähigkeit des Wirtschaftsstandortes stärken als auch die Verbraucherinnen
  und Verbraucher in Deutschland entlasten. Seit 1. Januar 2026 werden daher Bürgerinnen,
  Bürger und die Wirtschaft zusammen um rund 10 Milliarden Euro bei den Energiekosten
  entlastet : Zudem entlastet die Bundesregierung Bürgerinnen und Bürger sowie Betriebe
  angesichts der im Zuge der Iran-Krise gestiegenen Spritpreise . So sinkt die Energiesteuer
  um insgesamt circa 17 Cent pro Liter Benzin und Diesel für im Mai und im Juni 2026
  – insgesamt rund 1,6 Milliarden Euro. Zur Entlastung energieintensiver Industrieunternehmen
  hat die Bundesregierung darüber hinaus einen Industriestrompreis eingeführt. Das
  stärkt die Wirtschaft im internationalen Wettbewerb, vom Taschentuch- oder Schraubenhersteller
  bis zur Stahl- und Kupferindustrie. Der Industriestrompreis ergänzt die Strompreiskompensation,
  die dauerhaft gelten und auf weitere Branchen ausgeweitet werden soll. Für mehr
  Wirtschaftswachstum will die Regierungskoalition die Bürokratiekosten für die Wirtschaft
  um 25 Prozent (etwa 16 Milliarden Euro) reduzieren . Die Bundesregierung zeigt in
  ihrer Modernisierungsagenda Bund und der föderalen Modernisierungsagenda konkrete
  Reformen auf, um die staatliche Bürokratie zurückzubauen. Mit der Änderung des nationalen
  Lieferkettengesetzes entlastet sie die Unternehmen bereits, bevor die Europäische
  Lieferkettenrichtlinie in nationales Recht umgesetzt ist. Einfachere Vergabeverfahren
  für öffentliche Aufträge kommen Verwaltungen und Unternehmen zugute. Deutschland
  soll auch in Zukunft Standort einer starken Automobil- und Zulieferindustrie mit
  zahlreichen Arbeitsplätzen bleiben. Insbesondere sollen Strafzahlungen wegen der
  europäischen Flottengrenzwerte abgewehrt werden. Die Bundesregierung wird die deutsche
  Autoindustrie dabei unterstützen . Sie soll neben der Elektromobilität weitere Technologien
  vorantreiben können, um die Klimaziele zu erreichen und im Wettbewerb wieder stärker
  zu werden. Um die E -Mobilität weiter voranzubringen , hat die Regierung bessere
  Abschreibungen für Elektro-Firmenfahrzeuge und eine höhere Förderung bei der Dienstwagenbesteuerung
  eingeführt. Sie hat außerdem die Kfz -Steuerbefreiung für neue Elektroautos bis
  zum Jahr 2035 verlängert und unterstützt Menschen mit kleinen und mittleren Einkommen
  beim Umstieg auf E -Mobilität mit einem Förderprogramm . Die Rahmenbedingungen für
  das Laden aller Elektrofahrzeuge werden zudem verbessert. Die Bundesregierung hat
  dafür den Masterplan Ladeinfrastruktur 2030 beschlossen. Damit soll der Ausbau eines
  flächendeckenden Ladenetzes sowie eines Schnellladenetzes für Pkw und Lkw beschleunigt
  werden. Deutschland soll eine offene und international ausgerichtete Volkswirtschaft
  bleiben. Die Bundesregierung setzt sich daher stets für den freien, regelbasierten
  Handel ein. Sie will den europäischen Binnenmarkt weiter stärken , neue Lieferketten
  sichern und den Abschluss neuer Handelsabkommen voranbringen. So ist die Einigung
  zum EU - MERCOSUR -Abkommen und sein vorläufiges Inkrafttreten am 1. Mai 2026 ein
  Meilenstein in der europäischen Handelspolitik und ein wichtiges Signal ihrer strategischen
  Souveränität und Handlungsfähigkeit. Die Zolleinigung zwischen der EU und den USA
  schafft Klarheit, ist aber nicht das Ende des Prozesses. Auch mit anderen EU -Partnern
  setzt sich die Bundesregierung für den Abschluss weiterer Freihandelsabkommen ein
  – so mit Indien , Australien , dem Golfkooperationsrat und den ASEAN -Staaten. Die
  Bundesregierung steht zu den Klimaschutzzielen : Deutschland soll Industrieland
  bleiben und bis 2045 klimaneutral werden. Es gilt, Klimaschutz, wirtschaftliche
  Wettbewerbsfähigkeit und soziale Ausgewogenheit zusammenzubringen. Die Sicherung
  der Fachkräftebasis ist ein entscheidender Faktor für den wirtschaftlichen Erfolg
  und den Wohlstand in Deutschland. Die Bundesregierung will alle Register ziehen,
  um mehr inländische und ergänzend qualifizierte ausländische Arbeitskräfte zu gewinnen
  und zu halten. Dies sind wichtige Maßnahmen, die dabei unterstützen sollen: Um die
  Absicherung im Alter zu gewährleisten, hat die Bundesregierung folgende Maßnahmen
  beschlossen: Zum 1. Juli 2026 soll die Neue Grundsicherung für Arbeitssuchende schrittweise
  das Bürgergeld ablösen. Die Vermittlung in Arbeit soll dann Vorrang haben. Mitwirkungspflichten
  und Sanktionen sollen verschärft werden. Eine Sozialstaatskommission hat Ende Januar
  ihren Bericht vorgelegt. Darin macht sie Vorschläge, wie unser Sozialstaat effizienter,
  bürgerfreundlicher und transparenter werden kann. So empfiehlt sie etwa Maßnahmen
  zur Digitalisierung und Modernisierung der Sozialverwaltung. Mit der Reform des
  Behindertengleichstellungsgesetzes soll für Menschen mit Behinderungen die Barrierefreiheit
  verbessert werden. So sollen etwa alle öffentlich zugänglichen Bauten des Bundes
  bis 2035 barrierefrei gestaltet werden. Weitere geplante Vorhaben: Mehr Menschen
  mit Behinderungen sollen auf den allgemeinen Arbeitsmarkt wechseln können. Werkstätten
  für Menschen mit Behinderungen sollen zudem reformiert werden.'
