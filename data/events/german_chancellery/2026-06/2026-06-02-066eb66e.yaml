title: Press conference between Chancellor Merz and Hungarian Prime Minister Magyar
  Together for democracy and a united Europe
text: 'Federal Chancellor Merz received Hungarian Prime Minister Péter Magyar with
  military honours in the Chancellery. In view of the threat posed to the NATO--North
  Atlantic Treaty Organisation by Russia and Moscow’s war against Ukraine, close cooperation
  is essential. If Hungary is once again plainly on the side of a united Europe, this
  will bolster “the cause of freedom and peace” in Europe. This is what Federal Chancellor
  Friedrich Merz said during the inaugural visit of Hungarian Prime Minister Péter
  Magyar in Berlin on Tuesday. His great election victory was also an inspiration
  for the whole of Europe. Read the transcript of the press conference here (in German
  only):'
