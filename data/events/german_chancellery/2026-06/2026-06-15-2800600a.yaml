title: Statement by Federal Chancellor Friedrich Merz on the agreement between the
  United States and Iran
text: The German Government welcomes the fact that the United States and Iran have
  reached a framework agreement. The German Government would like to congratulate
  President Trump and the Iranian side on this diplomatic breakthrough and would like
  to thank all partners who have helped to make this possible. The agreement can pave
  the way for the recovery of the global economy and for stabilisation in the region.
  It is important now to implement what has been agreed to with determination. The
  Strait of Hormuz must be opened for free shipping permanently and without restrictions.
  Further negotiations must ensure in the coming weeks that Iran verifiably ends its
  military nuclear programme. There must be no more attacks on Israel or other neighbours
  in the region. The German Government continues to support and promote all diplomatic
  endeavours to this end. In this context, it is in close contact with the United
  States, European partners and the countries of the region.
