title: Bundesregierung gedenkt der Opfer des Volksaufstandes vom 17. Juni 1953
text: 'Die Gedenkveranstaltung der Bundesregierung zum 73. Jahrestag des Volksaufstandes
  vom 17. Juni 1953 in Ost-Berlin und weiten Teilen der ehemaligen DDR findet am Mittwoch,
  dem 17. Juni 2026, am Mahnmal für die Opfer des Volksaufstandes auf dem Friedhof
  Seestraße 92 in 13347 Berlin (Wedding) statt. An der Gedenkveranstaltung nehmen
  teil: Bundesminister für besondere Aufgaben und Chef des Bundeskanzleramtes Thorsten
  Frei Regierender Bürgermeister von Berlin Kai Wegner Präsidentin des Abgeordnetenhauses
  von Berlin Cornelia Seibeld Vorsitzender der Vereinigung 17. Juni 1953 e.V. Mike
  Mutterlose Folgender Ablauf ist vorgesehen:'
