title: Effektiver Umweltschutz Strafferes Klagerecht für Umweltverbände
text: 'Infrastrukturprojekte sollen in Zukunft schneller umgesetzt werden können.
  Die Bundesregierung will Infrastrukturvorhaben künftig schneller realisieren und
  zugleich einen wirksamen Umweltschutz sicherstellen. Ein zentraler Hebel dafür ist
  die Weiterentwicklung des Umweltverbandsklagerechts. Ziel ist es, gerichtliche Verfahren
  in Umweltangelegenheiten zu beschleunigen. Vorhaben, die für eine funktionierende
  Infrastruktur dringlich sind, sollen in gebotener Zeit umgesetzt werden. Um langwierige
  Verfahren zu vermeiden, sollen Klagen von Umweltverbänden gegen Infrastrukturprojekte
  künftig auf konkrete Klägerargumente beschränkt werden. Zudem ist explizit vorgesehen,
  dass Klagen nicht mehr aufschiebend wirken können. Das gilt künftig für Anfechtungsklagen
  gegen Projekte in den Bereichen Verkehr, Energie und Telekommunikation, außerdem
  für Vorhaben, die dem Klimaschutz, der Klimaanpassung und der Ernährungssicherheit
  dienen, ausgenommen bleiben allerdings Tierhaltungsanlagen. Der Entwurf sieht fest
  definierte Kriterien für die Anerkennung von Umweltvereinigungen vor. So soll eine
  Anerkennung deutlicher auf räumliche und Inhaltliche Betroffenheit ausgerichtet
  sein. Auch Stiftungen sollen in Umweltbelangen ein Klagerecht erhalten. Zusätzlich
  gilt das Umwelt-Rechtsbehelfsgesetz künftig auch für klagende Einzelpersonen. Zugleich
  sieht die Novelle eine verschärfte Missbrauchsklausel sowie eine Mitwirkungspflicht
  der Umweltverbände vor. Die Anerkennungsbescheide sollen im Internet veröffentlicht
  werden. Das schafft Transparenz. Zudem wird das europaweit vereinbarte Informations-,
  Beteiligungs- und Klagerecht von Umweltorganisationen in die Novelle aufgenommen.
  Damit wird ein Beschluss der Vertragsstaaten der Aarhus-Konferenz umgesetzt. Die
  Bundesregierung ist überzeugt: Ein ausgewogener Ausgleich zwischen effektivem Rechtsschutz
  in Umweltfragen und einem zügigen Umsetzen von Infrastrukturvorhaben ermöglicht
  wirksamen Umweltschutz. Das stärkt zugleich den Industrie- und Wirtschaftsstandort
  Deutschland. Dabei bekennt sich die Bundesregierung klar zu ihren Klimazielen. Umweltschutz
  soll schneller, unkomplizierter und zugleich demokratischer ausgestaltet werden.
  Mit den schnelleren Genehmigungsverfahren werden starke Industriestandorte geschaffen.
  So strebt die Bundesregierung außerdem an, das Umweltverbandsklagerecht und das
  Verfahrensrecht auch auf europäischer Ebene zu vereinfachen.'
