title: Bundesregierung aktuell
text: 'wir wissen aus vielen Umfragen und Wortmeldungen: Die Bürgerinnen und Bürger
  mögen keinen Streit in der Politik, und sie erwarten, dass die Regierung regiert
  – also die Dinge vorantreibt, reformiert, verbessert. Allerdings: Geräuschloses
  Regieren ist schwierig in der Demokratie deutscher Bauart. Also muss eine Regierungskoalition,
  müssen alle Akteure aus Parlament, Regierung und der Gesellschaft (wozu zum Beispiel
  die Arbeitgeberverbände oder die Gewerkschaften gehören) möglichst zivilisiert ihren
  Disput austragen und die feine Linie zwischen harter Diskussion und Streit tunlichst
  nicht überschreiten. Genau das erleben wir in diesen Tagen: In der berüchtigten
  Berliner Blase wird disputiert, wie selten zuvor. Eine intensive Debatte über die
  Großreformen im Land hat die Akteure gepackt, die nicht selten in der Berichterstattung
  fiebrig beschrieben wird. Per se ist Fieber ja nicht schlecht, wenn der Organismus
  auf dem Weg der Besserung ist. In Berlin jedenfalls wird dieser Verbesserungs-Prozess
  jetzt intensiv betrieben – in Sherpa-Runden, in den Parteien, den Behörden und auch
  zwischen den Akteuren der Gesellschaft. In dieser Woche waren Gewerkschaften und
  Wirtschaftsverbände im Kanzleramt. Das war eine bemerkenswerte Runde von Damen und
  Herren, die gemeinsam viel Verantwortung tragen für Arbeit und Beschäftigung. Ziel
  des Meinungsaustauschs mit den Vertretern der Koalitionsparteien war es, eine Grundlage
  für die Reformen zu entwickeln. Es schadet nicht, wenn man sich im Prinzip einig
  ist, in welche Richtung die Reise gehen soll. So entsteht Vertrauen, so beginnen
  Prozesse. Im Mittelpunkt des Gesprächs standen die Themen Wachstum und Beschäftigung.
  Daran muss jeder ein Interesse haben, der die soziale Marktwirtschaft deutscher
  Bauart erhalten möchte. Beispielhaft für ein neues deutsches Wirtschaftswunder ist
  die Luft- und Raumfahrtindustrie. Sie wächst gerade beeindruckend stark und hat
  einen neuen Beschäftigungshöchststand erreicht. Allein im vergangenen Jahr stieg
  der Umsatz um 19 Prozent auf rund 62 Milliarden Euro, und die Zahl der Beschäftigten
  kletterte um acht Prozentpunkte. Deutschland ist technologisch führend, etwa bei
  den Triebwerken, im Satellitenbau für die Erdbeobachtung und die Navigation oder
  beim Quantencomputing. All das konnte der Bundeskanzler am Mittwoch bei der Eröffnung
  der Internationalen Luft- und Raumfahrtausstellung in Berlin sehen und hören – ein
  Termin, zu dem er frisch vom Kabinettstisch die gerade verabschiedete Luft- und
  Raumfahrtstrategie mit an den Berliner Flughafen nehmen konnte (natürlich im Hubschrauber,
  wie es sich für die Branche gehört). Friedrich Merz hat deutlich gemacht, welches
  Potenzial in dieser Branche steckt. Erstmals werden in der neuen Strategie die Themen
  der Luftfahrt, der Luftverkehrswirtschaft sowie des zivilen und militärischen Flugzeugbaus
  gemeinsam gedacht. Die Reformen von heute werden ihre Wirkung erst in einiger Zeit
  entfalten. Die von gestern sind bereits heute zu spüren. So ist es beim Thema Migration,
  wo an diesem Freitag das gemeinsame europäische Asylsystem in Kraft trat. Es schafft
  Ordnung und Sicherheit: Migration wird besser gesteuert, Verfahren werden beschleunigt,
  Kommunen entlastet; Geflüchtete erhalten verlässlich Schutz, wenn sie Anspruch darauf
  haben. Auch diese politische Form wurde einst heftig diskutiert – jetzt ist sie
  in Kraft, ihre Wirkung ist bereits zu spüren. Neben dem fiebrigen Geschäft der Politik
  gibt es glücklicherweise noch das Fußballfieber, von dem sich das Land jetzt packen
  lassen sollte. Der Ball rollt wieder, die 23. Fußball-Weltmeisterschaft hat begonnen.
  Friedrich Merz hat mit dem Spielerrat und Bundestrainer Julian Nagelsmann per Video
  telefoniert. Ein kurzes, aber herzliches Gespräch, in dem Friedrich Merz dem Team
  Glück und Erfolg wünschte. Immer wieder wird der Kanzler gefragt, ob er die deutsche
  Mannschaft im Finale sieht. Gibt es da eine Frage? Selbstverständlich sieht er sie
  dort – und bis dahin wünschen wir uns alle gute Spiele, gute Nerven und viele Tore.
  „Gute Lösungen entstehen im Dialog. Gemeinsam mit Wirtschaftsverbänden und Gewerkschaften
  haben wir beraten, wie wir unsere Wettbewerbsfähigkeit und den Arbeitsmarkt stärken.
  Deutschland wieder auf Wachstumskurs bringen – das ist in den nächsten Wochen von
  höchster Priorität.“ Bundeskanzler Friedrich Merz nach dem Treffen mit Sozialpartnern
  und der Wirtschaft auf X am 10.06.2026 Wir freuen uns über Ihr Feedback: Nutzen
  Sie bitte dafür das Kontaktformular (nicht die Antwortfunktion auf diese E-Mail).'
