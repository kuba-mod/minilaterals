title: Bundeskanzler Merz gratuliert dem Premierminister der Republik Malta, Robert
  Abela
text: Sehr geehrter Herr Premierminister, zu Ihrer erneuten Vereidung zum Premierminister
  der Republik Malta gratuliere ich Ihnen sehr herzlich. Malta und Deutschland sind
  durch gemeinsame Interessen und Werte eng miteinander verbunden – als bilaterale
  Partner mit vielfältigen Verflechtungen und als Mitgliedstaaten in der Europäischen
  Union. Für die anstehenden Aufgaben wünsche ich Ihnen gutes Gelingen, eine glückliche
  Hand und viel Erfolg. Friedrich Merz Bundeskanzler der Bundesrepublik Deutschland
