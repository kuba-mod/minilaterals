date: '2026-06-02'
type: press_release
source_name: german_chancellery
title: Keynote des Bundeskanzlers beim Ostdeutschen Wirtschaftsforum Zukunftsweisende
  Entwicklungen für ganz Deutschland
text: 'Auf dem Wirtschaftsforum stellte der Kanzler die Bedeutung Ostdeutschlands
  als Innovationsregion heraus. In diesem Jahr stand der Leitgedanke „Eine neue (Un)Ordnung“
  im Mittelpunkt des Ostdeutschen Wirtschaftsforums. „Ich finde, das ist eine richtige
  Diagnose unserer Zeit“, erklärte Bundeskanzler Friedrich Merz in seiner Keynote
  . Die veränderten globalen Rahmenbedingungen für Deutschlands Wettbewerbsfähigkeit
  – mit besonderem Blick auf Ostdeutschland als dynamischen Industrie- und Investitionsraum
  – wurden dabei in diesem Jahr in den Blick genommen. „Wir müssen die Potenziale
  nutzen, die wir in unserem Land haben. Wir haben sehr große und viele Potenziale“,
  sagte der Kanzler. Das Ostdeutsche Wirtschaftsforum (OWF) gilt als eine der wichtigsten
  Plattformen für alle Themen rund um den Wirtschaftsstandort Ostdeutschland. Ziel
  ist es, die Chancen und Herausforderungen des Wirtschaftsstandorts herauszuarbeiten
  und relevante Akteure und Akteurinnen aus Wirtschaft, Politik, Wissenschaft und
  Gesellschaft zu vernetzen. Sehr geehrter Herr Lösch, lieber Karsten Wildberger,
  meine sehr geehrten Damen und Herren, Frau Nandra, Kolleginnen und Kollegen und
  Frau Kaiser aus dem Deutschen Bundestag, ich freue mich sehr, dass ich heute zu
  dieser schon sehr traditionsreichen Veranstaltung des Ostdeutschen Wirtschaftsforums
  hier sein kann. Ich konnte im vergangenen Jahr nicht dabei sein, obwohl ich es fest
  eingeplant hatte. Es war sozusagen fast höhere Gewalt. In Rom wurde ein neuer Papst
  eingeführt, und da hatte ich keine Wahl. Aber er ist gesund, im Amt, und es drohen
  keine weiteren Pflichtbesuche in Rom, jedenfalls nicht aus einem solchen Anlass.
  Ich freue mich, dass ich hier sein kann und will gleich zu Beginn eine Bemerkung
  zu diesem Forum machen. Meine Damen und Herren, Foren wie dieses, Netzwerke, Plattformen
  zum Austausch von Ideen, Geschäftsideen, aber auch zum Austausch der Leistungsträgerinnen
  und Leistungsträger unseres Landes, von Unternehmerinnen und Unternehmern, Wissenschaftlern,
  Entscheidungsträgern, das sind wichtige Orte nicht nur der Begegnung, sondern es
  sind Orte, an denen Ideen über die Zukunft unseres Landes ausgetauscht werden, an
  denen neue Allianzen entstehen und an denen auch Synergien gehoben werden. Darum
  geht es Ihnen, und das ist auch in unserem Sinne etwas, was richtig und notwendig
  ist. Es ist von unschätzbarem Wert, dass wir Sie haben und dass wir diese Institution
  haben. Herr Lösch, stellvertretend für all diejenigen, die daran mitwirken, herzlichen
  Dank dafür, dass Sie diese Arbeit leisten, und dafür, dass Sie dies immer wieder
  ermöglichen! Meine Damen und Herren, Sie haben dem Forum in diesem Jahr dankenswerterweise
  das Motto vorangestellt: „Eine neue (Un)Ordnung“, das „un“ in Klammern gesetzt.
  Ich finde, das ist eine richtige Diagnose unserer Zeit. Es ist aber zugleich auch
  eine Aufgabenbeschreibung. Denn diese neue Weltunordnung, deren Teil wir sind und
  von der wir betroffen sind, müssen wir gemeinsam lösen, als Wirtschaftsstandort,
  als Bundesrepublik Deutschland, als Europäische Union, geopolitisch und geoökonomisch.
  Wir müssen versuchen, damit umzugehen und nicht nur die Risiken zu sehen, sondern
  auch die Chancen. Wir können diesen Neuordnungsprozess, der auf der Welt stattfindet,
  in diesem Moment, in dem wir hier sind, mitgestalten. Denn es liegt auch mit in
  unserer Hand, das, was für uns geschieht, was für Deutschland und was für Europa
  geschieht, zu lösen. Deswegen ist die erste Antwort, die ich Ihnen heute gern geben
  möchte, diese: Wir müssen die Potenziale nutzen, die wir in unserem Land haben.
  Wir haben sehr große und viele Potenziale. Wir haben sie in Form etablierter Formate
  wie dieses. Wir haben sie in Form von handelnden Akteuren. Wir haben sie in Form
  von großartigen Unternehmen, großen, kleinen und mittleren. Wir haben sie in Form
  von Start-ups . Meine Damen und Herren, das Jahr 2025 war das Jahr mit der höchsten
  bisher gemessenen Zahl an neu gegründeten Start-ups in Deutschland. Über 3500 neue
  Unternehmen, täglich mehr als zehn, wochentäglich mehr als 15, sind in Deutschland
  gegründet worden. Wir hätten eine solche Gründung von jungen Unternehmen nicht – es
  sind ja nicht immer nur jüngere, aber es sind oft jüngere Unternehmerinnen und Unternehmer,
  die diese Start-ups gründen –, wenn sie alle mit großem Pessimismus nach vorn schauen
  würden. Wir haben sie, weil sie den Standort in Deutschland richtig einschätzen
  und die Chancen in Deutschland nutzen wollen. Wir haben Wissenschaftseinrichtungen
  wie kaum ein zweites Land der Welt komprimiert in vielen Teilen unseres Landes.
  Wir haben aber auch historische Erfahrungen mit Umbrüchen. Wir sind ein Land mit
  wirklich reichhaltiger Erfahrung mit Blick darauf, wie Transformation geht. Das
  wissen Sie hier in der Region, das wissen Sie in den ostdeutschen Ländern vielleicht
  sogar noch besser als die westdeutschen Länder, in denen die letzte große eigene
  Erfahrung mit einer so fundamentalen Transformation mittlerweile über 75 Jahre zurückliegt.
  Sie sind uns im Osten gegenüber dem alten Westen also mit der frischen Erinnerung
  daran, was es bedeutet, ein Land durch eine solche Transformation zu führen, sozusagen
  voraus. Sie haben diese Chance in Ostdeutschland genutzt. Meine Damen und Herren,
  Ostdeutschland ist wirtschaftlich schon lange nicht mehr die Aufholregion unseres
  Landes, sondern vielerorts – ich muss Ihnen das hier nicht im Detail darlegen; Sie
  wissen das viel besser – gibt es Entwicklungen, die zukunftsweisend für ganz Deutschland
  sind. Ich sehe diese harte Währung auch in den Zahlen. Ostdeutschland lag bei der
  wirtschaftlichen Dynamik in den vergangenen Jahren sogar leicht über dem Bundesdurchschnitt.
  In relativ kurzer Zeit sind in dieser Region Technologie- und Forschungsstandorte
  entstanden, die jetzt schon Innovationstreiber für ganz Deutschland sind. Hier liegt,
  meine Damen und Herren, der entscheidende Punkt, den ich heute gern ansprechen möchte,
  nämlich unsere Innovationskraft in Deutschland und in allen Teilen der Gesellschaft.
  Wir brauchen Innovationen. Die Grundvoraussetzung dafür, dass wir sie bekommen und
  dass wir sie einlösen und umsetzen können, war vor 36 Jahren das Versprechen der
  Wiedervereinigung in Freiheit, in Frieden und in Wohlstand für unser Land und für
  ganz Europa. Diesen Umbruch haben wir großartig bewältigt; Sie haben ihn großartig
  bewältigt. Jetzt ist es die Aufgabe jeder Bundesregierung, den Rahmen dafür zu setzen,
  dass diese Erfolgsgeschichte fortgeschrieben werden kann. Das ist – ich sage es
  so, wie ich es denke – vom ersten Tag im Amt an, lieber Karsten Wildberger, liebe
  Kollegin Kaiser, unsere Aufgabenbeschreibung und unser Ziel. Ich will die Baustellen
  kurz skizzieren, zum einen die Sicherheitspolitik, aber zum anderen auch die damit
  Hand in Hand einhergehende Handelspolitik. Meine Damen und Herren, wir brauchen
  tragfähige Bündnisse auf der Welt, und wir brauchen auch neue Handelspartnerschaften,
  zum Beispiel für sichere Lieferketten, für neue Absatzmärkte und für Fachkräfte.
  Wir haben uns in der Europäischen Union – und ich bin daran nicht ganz unbeteiligt –
  auf den Weg gemacht, neue Handelspartnerschaften einzugehen. Das MERCOSUR -Abkommen
  ist in Kraft getreten. Ein Abkommen mit Indien ist abgeschlossen und befindet sich
  im Prozess der Ratifikation. Ein Abkommen mit Mexiko ist auf dem Weg. Wir suchen
  auf der Welt neue Partnerschaften und neue Absatzmärkte. Wir suchen vor allen Dingen
  Partner nach dem entscheidenden Gesichtspunkt: Wer teilt mit uns die Überzeugung
  von regelbasierter globaler Ordnung? Wer gibt mit uns Antworten auf das autoritäre
  Verhalten einer ganzen Reihe von Staaten, auch solcher, denen wir das in früheren
  Jahren gar nicht zugetraut hätten? – Das sind die Erfolgsgeschichten, die wir auch
  nur gemeinsam in Europa schreiben können. Die Handelspolitik liegt übrigens wie
  die Währungspolitik ausschließlich in der Zuständigkeit der Europäischen Union.
  Das machen wir nicht allein, aber wir machen es erfolgreich zusammen mit der Europäischen
  Union. Deswegen dränge ich auch so darauf, dass sich diese Europäische Union jetzt
  auf ihre Kernaufgaben zurückbesinnt, und das ist nicht Überreglementierung. Die
  Kernaufgabe der Europäischen Union, das Versprechen des europäischen Binnenmarktes,
  war einmal – und das muss sie wieder werden – eine Öffnung unseres Marktes, Freiheit
  des Personenverkehrs, des Kapitalverkehrs, des Warenverkehrs, des Dienstleistungsverkehrs
  und damit den größten zusammenhängenden Wirtschaftsraum zu schaffen, der dem Ziel
  folgt, ein offener Handelsraum zu sein. Meine Damen und Herren, wir sind 450 Millionen
  Konsumenten in dieser Europäischen Union. Die Europäische Union ist um hundert Millionen
  Konsumenten größer als die Vereinigten Staaten von Amerika. Wir dürfen uns nicht
  kleiner machen, als wir sind. Wir sollten diese Aufgabe mit Selbstbewusstsein angehen.
  Das gilt für die Verteidigungsbereitschaft genauso wie für die Handelspolitik. Aber
  wir müssen auch klar sehen, auch auf uns, auf Deutschland, bezogen: Wir müssen die
  hausgemachten Probleme lösen. Wir müssen die hausgemachten Wachstumshindernisse,
  die wir haben, abbauen. Davon haben wir über die Jahre viel zu viele aufgebaut,
  zum Teil mit großer Nachlässigkeit. Lassen Sie mich vor allem zu diesem zweiten
  großen Punkt etwas sagen. Wir wollen in der Bundesregierung den Standort Deutschland
  wieder bezahlbar machen. Wir haben in Deutschland ein Problem der preislichen Wettbewerbsfähigkeit.
  Auch wenn das nicht jeder gern hört, ist Deutschland zu teuer geworden. Wir sind
  in vielen Bereichen nicht mehr wettbewerbsfähig, weil wir preislich mit den Regionen
  der Welt, die mit uns im Wettbewerb stehen, nicht mehr mithalten. Deswegen wollen
  wir Deutschland wieder zu einem Land machen, das attraktiv für unternehmerischen
  Mut ist, in dem es Leistungsgerechtigkeit gibt und, ja, in dem es genauso auch ein
  gutes Miteinander in der Gesellschaft gibt. Das ist keine kleine Aufgabe. Das setzt
  Forschungsfortschrittssprünge in verschiedenen Bereichen zugleich voraus, in der
  Unternehmensbesteuerung, bei den Energiekosten, bei der Bürokratie, bei den Verfahren,
  bei der Beschleunigung der Verfahren, bei den Lohnzusatzkosten, bei der Digitalisierung
  und bei der Infrastruktur. Ich bin sehr dankbar dafür, dass Sie Karsten Wildberger
  eingeladen haben. Er hat heute Morgen einmal dargelegt, was er mit seinem Aufgabenbereich
  macht, mit dem Ministerium, das wir neu eingeführt haben und das jetzt eine Querschnittsaufgabe
  der Staatsmodernisierung und der Digitalisierung hat. Ich will diese Gelegenheit
  nutzen, um Karsten Wildberger einfach einmal herzlichen Dank dafür zu sagen, dass
  er bereit war, aus der Privatwirtschaft in den öffentlichen Sektor, in die Bundesregierung,
  einzutreten und genau dieses Ziel mit uns zu erarbeiten, nämlich Digitalisierung
  und Staatsmodernisierung. Lieber Karsten, herzlichen Dank! Meine Damen und Herren,
  das ist ein Mammutprojekt, aber eines, das man innerhalb einer Wahlperiode sehr
  wohl bereits zu einem großen Teil konzipieren und umsetzen kann. Ich möchte es einmal
  so ausdrücken: Wir haben etwas neu zu beweisen in der Politik, auch als Bundesregierung.
  Wir haben neu zu beweisen, dass unsere demokratischen Institutionen in der Lage
  sind, langfristige und tragfähige Lösungen für die großen Herausforderungen unserer
  Zeit zu finden und sie dann auch in einem vernünftigen Tempo umzusetzen. Das ist
  keine ganz leichte Aufgabe. Wir sind bedrängt von ganz links und von ganz rechts.
  Darunter sind viele, die ganz grundsätzlich in Frage stellen, ob unser Staat denn
  überhaupt noch handlungsfähig sei. Ja, es ist richtig, unser Staat war in den letzten
  Jahren nicht mehr gut genug. Auch die Parteien waren zum Teil nicht mehr gut genug.
  Es gibt berechtigte Enttäuschung über verschleppte Entscheidungen auf vielen Ebenen.
  Jetzt ist es unsere Aufgabe, dass wir besser werden, dass wir Vertrauen zurückgewinnen
  und dass wir zeigen, dass es geht. Ich weiß das, und ich weiß um die Größe und die
  Dimension dieser Aufgabe. Meine Damen und Herren, ich will dafür keinen Vertrauensvorschuss
  haben, aber ich will sehr wohl die Bereitschaft aller Bürgerinnen und Bürger in
  Anspruch nehmen, daran konstruktiv mitzuarbeiten. Das betrifft die Belegschaften,
  das betrifft die Unternehmen, das betrifft die Verbände, das betrifft die Gewerkschaften,
  das betrifft große gesellschaftliche Institutionen. Wir wollen und müssen jetzt
  gemeinsam zeigen, dass wir in der Lage sind, die Probleme unseres Landes zu lösen.
  Das Verrückte daran ist: Viele ausländische Investoren, die nach Deutschland kommen
  – Martin Blessing kann darüber berichten –, trauen uns das oft mehr zu als wir selbst.
  Gehen wir also mit ein bisschen mehr Selbstbewusstsein und auch Selbstachtung in
  diese Diskussion und in diese Entscheidungen der nächsten Wochen, Monate und Jahre,
  damit wir wieder ein Land sind, in dem die Menschen gern leben, in dem gute Stimmung
  ist und in dem wir auch investieren, in dem wir Arbeitsplätze haben und in dem es
  sich gut leben lässt! Unser Land hat es verdient, dass wir das gemeinsam annehmen
  und diese Aufgabe auch umsetzen. Eine unserer ersten Maßnahmen im vergangenen Jahr,
  um diesen Weg zu gehen, war eine Reform der Besteuerung der Unternehmen. Sie wissen
  es. Wir haben das zum 1. Juli mit den größten Abschreibungsmöglichkeiten, die es
  seit langen Jahren und Jahrzehnten gegeben hat, in Kraft gesetzt, dreimal 30 Prozent.
  Das sind Abschreibungen, über die Sie innerhalb von zweieinhalb Jahren zwei Drittel
  Ihrer Investitionen abschreiben können. Aber wahr ist auch: Ja, Abschreibungen muss
  man verdienen. Deswegen wollen wir auch die Steuerlast senken. Wir haben das mit
  der Körperschaftssteuer bereits beschlossen; die wird sukzessive gesenkt. Wir haben
  bei den Energiekosten etwas getan – immer noch nicht genug, aber wir sind auf einem
  richtigen Weg. Wir haben im Kabinett die Kraftwerkstrategie beschlossen. Das ist
  ein Plan für grundlastfähige Stromerzeugung. Das ist kein Ausstieg aus den Regenerativen,
  auch wenn wir jetzt an der Zahlungsmodalität etwas ändern wollen. Meine Damen und
  Herren, um es ist klar zu sagen: Das ist kein Ausstieg aus den Regenerativen und
  nicht ein Wiedereinstieg in die Fossilen. Aber wir brauchen grundlastfähige Energieerzeugung,
  insbesondere Stromerzeugung, und das wird für eine gewisse Zeit nicht ohne Gaskraftwerke
  in der Reserve gehen. Dieses Land ist darauf angewiesen, eine gesicherte, stabile,
  preisgünstige Stromversorgung zu haben. Das wird auf absehbare Zeit allein mit Wind
  und Sonne nicht gehen, insbesondere in den sogenannten Dunkelflauten nicht, in denen
  wir ebenfalls verlässliche, bezahlbare Energie, vor allen Dingen Stromversorgung
  in Deutschland brauchen. Wir sind den Weg des Bürokratierückbaus gegangen. Wir beschließen
  Verfahrensbeschleunigungen. Wir haben substanzielle Erleichterungen beim Bauen vorgenommen.
  Der sogenannte Bau-Turbo ist beschlossen. Das Vergabebeschleunigungsgesetz ist beschlossen.
  Die Aufhebung von Berichtspflichten sind beschlossen. An der Modernisierung von
  Staat und Verwaltung arbeiten wir intensiv, nicht nur im Bund, sondern auch zusammen
  mit den Ländern. Wir haben am 4. Dezember des letzten Jahres zusammen mit den Ländern
  die umfangreichste Modernisierungs- und Digitalisierungsagenda föderal beschlossen
  – einstimmig mit allen 16 Bundesländern und dem Bund –, die in den Ländern zum Teil
  bereits umgesetzt wird, mit der Abschaffung von Berichtspflichten, mit der Abschaffung
  von überflüssiger Bürokratie, mit Entlastungskabinettssitzungen. Wir werden in der
  Bundesregierung am 15. Juli ein zweites Mal eine Kabinettssitzung machen, zu der
  ich die Kolleginnen und Kollegen gebeten habe, nicht neue Gesetze vorzuschlagen,
  sondern vorzuschlagen, welche alten Gesetze wir abschaffen können. Das wollen wir
  am 15. Juli ein zweites Mal machen. Wir haben es am 25. November des letzten Jahres
  mit einem kleinen Paket gemacht. Ich fordere die Kolleginnen und Kollegen jetzt
  in jeder Kabinettssitzung wieder auf – der Karsten Wildberger weiß das, die Kollegin
  Elisabeth Kaiser weiß es auch –: Macht eure Hausaufgaben, legt uns die Liste vor.
  Im Übrigen: Auch Sie können daran teilnehmen. Wir haben zwischen Bundeswirtschaftsministerium
  und Digitalministerium ein Portal geöffnet, einfach-machen.gov.de , auf dem Sie
  konkrete Vorschläge unterbreiten können, wie wir Bürokratie in Deutschland zurückbauen.
  Wir lassen das durch KI sorgfältig analysieren. Wir machen daraus ein Paket. Wir
  gehen damit am 15. Juli in einem ersten großen weiteren Schritt ins Kabinett. Also,
  meine Damen und Herren, wir sind auch hier auf einem Weg, Deutschland moderner zu
  machen mit weniger Regulierung. Ich gebe Ihnen ein weiteres Beispiel: Wir arbeiten
  – und das ist wahrscheinlich das größte Projekt der laufenden Wahlperiode in diesem
  Bereich, in dem Bereich der Digitalisierung – an einer Work-and-Stay- Agentur, die
  nicht mehr und nicht weniger tun soll als ein einheitliches, digitalisiertes Verfahren
  für die Fachkräfteeinwanderung. Wir trennen die beiden Verfahren, Asyl und Fachkräfteeinwanderung.
  Wir trennen sie administrativ und wir machen dieses eine Verfahren digital mit der
  Folge, dass Aufenthaltsgenehmigung, Arbeitsgenehmigung und Anerkennung der Berufsabschlüsse
  aus einer Hand auf einer Plattform möglich sind. Dahinter liegt ein hochgradig komplizierter
  Prozess, weil wir natürlich – Bund, Länder und Gemeinden – viele Institutionen wie
  die Kammern und andere, die Berufsabschlüsse anerkennen, in diesen Prozess mit einbeziehen
  müssen. Deswegen ist es ein sehr anspruchsvolles Vorhaben. Aber wir sind auf dem
  Weg, es aufzustellen und umzusetzen, sodass wir auch internationale Fachkräfte gewinnen,
  um nach Deutschland zu kommen; denn wir müssen dieses Fachkräftepotenzial noch einmal
  deutlich steigern. Darum unterstützen wir als Bund auch die Länder dabei, diese
  Ausbildungs- und Weiterbildungsmöglichkeiten jetzt schon zu nutzen. Wir arbeiten
  parallel an der lang überfälligen Reform der sozialen Sicherungssysteme – Rentenversicherung,
  Krankenversicherung, Pflegeversicherung. Meine Damen und Herren, das ist nicht einfach.
  Aber wir müssen sie jetzt zukunftsfest machen, wir müssen sie jetzt demografiefest
  machen, wenn sie eine Chance haben wollen, in dieser Form auch in Zukunft zu bestehen.
  Unser Gesetzentwurf zur Stabilisierung der Beitragssätze in der Krankenversicherung
  ist im Kabinett verabschiedet, ist im Prozess im Parlament. Das ist wirklich ein
  großes Paket. Wir machen jetzt das erste Mal seit 20 Jahren eine Gesundheitsreform,
  die dazu beitragen soll, dass die Beiträge nicht weiter steigen. Allein das ist
  schon eine schwierige Operation. Wir wollen Ähnliches dann bei der Rentenversicherung
  und der Pflegeversicherung machen. Sie sehen also: Wir nehmen die Verantwortung
  ernst, die uns übertragen ist. Wir wollen in dieser Legislaturperiode das Fundament
  unseres Landes so erneuern, dass es wieder für Jahre, vielleicht für ein ganzes
  Jahrzehnt ausreicht und stabil ist. Das betrifft auch die infrastrukturellen Standortbedingungen
  und Lebensbedingungen in unserem Land. Wir wollen sie wieder auf das Niveau bringen,
  auf dem sie einmal waren. Wir investieren deshalb ganz intensiv und massiv in die
  Verkehrsinfrastruktur, die vielerorts ja in keinem wirklich guten Zustand ist. Wir
  investieren auch in die digitale Infrastruktur. Unsere Nationale Rechenzentrumsstrategie
  – ich vermute, Karsten Wildberger hat darüber gesprochen – ist beschlossen. Wir
  verdoppeln innerhalb von fünf Jahren die vorhandene Rechnerkapazität in Deutschland.
  Meine Damen und Herren, lassen Sie mich das offen sagen: Ich hätte vor zwei Jahren
  nicht geglaubt, Ihnen heute sagen zu können, dass ich zuversichtlich bin, dass wir
  uns mit Rechenkapazitäten in Deutschland von amerikanischen und chinesischen Rechenzentren
  unabhängig machen. Ich habe das vor zwei Jahren nicht geglaubt, dass uns das gelingt.
  Aber wir haben jetzt in einem so großen Aufholprozess in vielen Bundesländern diese
  Zentren errichtet, übrigens auch im Osten, mit großen Investitionen, milliardenschweren
  Investitionen. Rechenkapazitäten sind eben die Infrastruktur der Industrie von morgen.
  Wenn wir KI wollen, dann brauchen wir große Rechenkapazitäten. Innovationskraft
  ist in diesem Sinne auch eine Grundvoraussetzung für die Zukunft unseres Landes.
  Unsere Leistungsfähigkeit bei der Entwicklung und industriellen Implementierung
  von neuen Technologien wird ganz entscheidend darüber sein, wie sicher, souverän
  und wachstumsstark unser Land in den kommenden Jahrzehnten sein wird. Der Weg zu
  industrieller Stärke von morgen liegt deshalb in der Übersetzung unserer traditionellen
  Stärken in Forschung, Entwicklung und Produktion in neue Wertschöpfungslogiken.
  Meine Damen und Herren, insbesondere Ostdeutschland kommt dabei – und das sage ich
  nicht, weil ich heute hier stehe, sondern ich sage es auch an jedem anderen Ort
  der Bundesrepublik Deutschland ‑ eine Schlüsselrolle zu, dass wir noch besser werden
  in dem, was wir sind. Ostdeutsche Hochschulen und Forschungsinstitute gehören heute
  zu den leistungsfähigsten Standorten ganz Deutschlands. In Görlitz zum Beispiel
  entsteht das Deutsche Zentrum für Astrophysik. Magdeburg hat sich mit dem Forschungscampus
  STIMULATE zu einem führenden Innovationsstandort für KI in der Medizin entwickelt.
  In Greifswald wird weltweit sichtbare Spitzenforschung zur Fusionstechnologie betrieben.
  In Halle, Jena, Dresden entstehen neue Innovationen bei den Materialwissenschaften.
  Biotechnologie, Quantentechnologien, alles das sind keine Fremdworte im Osten, sondern
  das ist gelebte Praxis in Forschung und Entwicklung. Diese Forschungslandschaft
  ist ein enormer Standortvorteil für ganz Deutschland von internationaler Dimension.
  Wir sehen jetzt schon, dass in Ostdeutschland strategische Zukunftsindustrien entwickelt
  werden und entstehen. Nehmen wir nur einmal als weiteres Beispiel den Halbleiterstandort
  Sachsen. Meine Damen und Herren, was die Sachsen so schön Silicon Saxony nennen,
  ist heute eines der bedeutendsten Mikroelektronik- Cluster ganz Europas. Ich weiß
  nicht, ob Sie das alle wissen: Jeder dritte Chip in Europa, der gefertigt wird,
  stammt mittlerweile aus Sachsen. Das alles ist eine sehr erfreuliche Entwicklung
  und wird noch einmal verstärkt durch die Ansiedlung der neuen Chip fabrik von TSMC,
  durch die Eröffnung eines neuen Werkes von Infineon. In Zahlen gesprochen bedeutet
  das also Investitionen in den Standort mit einem Volumen von rund 10 Milliarden
  Euro. Auch der Bund fördert es in großer Höhe, weil wir die großen Zukunftspotenziale
  sehen, die daraus entstehen. Meine Damen und Herren, das sind Tausende von direkten
  und indirekten Arbeitsplätzen, in Form von neuen Ausbildungszentren dazu und neuen
  Forschungskooperationen darüber hinaus. Ich will neben dieser Innovation im Bereich
  der Digitalisierung ein zweites großes Zukunftsfeld nennen: Das ist das Thema Wasserstoffwirtschaft.
  Auch hier gehört Ostdeutschland inzwischen zu den Vorreitern in Europa. Von Rostock
  über Leuna bis Chemnitz entstehen derzeit zukunftsfähige Projekte. Es geht also
  wirklich in großen Schritten voran. Das sehen Sie an den Erfolgsgeschichten, den
  Innovationen, die geschrieben werden. Es gibt genauso Fortschritte und Erfolge in
  der politischen Arbeit; ich komme noch einmal auf die europäische Ebene zurück.
  Ja, auch in Brüssel ist man aufgewacht. Wo es noch an Entschlossenheit fehlt, da
  will ich mit anderen zusammen der Antreiber sein, gerade für die Europäische Union.
  Denn wir haben mit dem Bericht von Mario Draghi über die Wettbewerbsfähigkeit viele
  Vorlagen, viele Vorschläge, viele gute Ideen; wir müssen sie jetzt nur in die Tat
  umsetzen. Wir müssen vorankommen, auch im Kreis der Staats- und Regierungschefs
  der Europäischen Union, im Europäischen Parlament und in der Kommission. Es geht
  also voran im Bereich der Sicherheitspolitik, im Bereich der Wettbewerbspolitik,
  im Bereich der Handelspolitik. Ich nenne hier noch einmal die Freihandelsabkommen,
  von denen ich eben bereits gesprochen habe. Gibt es also noch viel zu tun? Ja, meine
  Damen und Herren, es gibt in Berlin und in Brüssel noch viel zu tun. Es könnte bisweilen
  auch schneller mit der Umsetzung gehen, insbesondere bei Entlastungen der Wirtschaft.
  Ich sage ausdrücklich: Ja, da ist mehr nötig. Aber genauso ausdrücklich sage ich
  auch: Für grundlegende Zweifel an der Problemlösungsfähigkeit unserer Gesellschaft
  sehe ich überhaupt keinen Grund. Es gibt auch keinen Grund für Pessimismus und Schwarzmalerei
  über die Zukunft unseres Landes. Es liegen nicht die besten Jahre unseres Landes
  hinter uns, sondern es liegen sehr gute Jahre vor uns – in Ostdeutschland, in Westdeutschland,
  in der Bundesrepublik Deutschland insgesamt und in Europa –, wenn wir jetzt gemeinsam
  statt gegeneinander daran arbeiten. Das heißt, dass wir die sehr deutschen Reflexe
  des Schlechtredens, dass wir auch die parteipolitischen Spielchen und das Hoffen
  auf einen großen Befreiungsschlag hinter uns lassen müssen, auf den großen Tag,
  auf den großen Big Bang , der alle Probleme auf einmal löst. Meine Damen und Herren,
  den wird es nicht geben. Aber es kann umgekehrt einen Big Bang geben, der dann nicht
  zum Besseren und zum Guten führt. Die Stärke unseres Landes, die Stärke Europas
  liegt eben in der Stabilität unserer Institutionen, auch unserer demokratischen
  Institutionen. Diese Stabilität rührt daher, dass wir Politik in einer Demokratie
  immer auch als Aushandlungsprozess verstanden haben, als einen Aushandlungsprozess,
  in dem es um Freiheit, um Wohlstand und auch um ein gutes Leben für alle gehen muss,
  die sich anstrengen und sich einbringen. Machen wir uns bitte nichts vor: In dieser
  Welt um uns herum wird es sehr stürmisch bleiben. Das wird uns wahrscheinlich noch
  manches abverlangen – an Umstellung, an Weiterentwicklung, an neuen Prioritäten.
  Aber wenn wir darüber gemeinsam nicht den Kopf verlieren, sondern uns Schritt für
  Schritt gemeinsam daran machen, zu reformieren, wo es nötig ist, und die vielen
  Ressourcen und Potenziale, die wir haben, zu mobilisieren, dann bin ich ganz sicher:
  Dann können wir das nicht nur bewältigen, dann können wir aus dieser schwierigen
  Zeit, in der wir sind, sogar gestärkt hervorgehen. Ich setze jedenfalls alles darauf.
  Ich arbeite daran – und ich weiß, dass Sie daran arbeiten –, dass wir eines Tages
  im Rückblick auf die Zeit von heute sagen können: Wir haben es richtig gemacht.
  Wir haben es geschafft. Wir haben es auch für unsere Kinder und Enkelkinder, meine
  Damen und Herren, geschafft. Wir machen das doch nicht alles nur für uns selbst,
  sondern wir machen es für unsere Familien, für unsere Kinder, für unsere Enkelkinder,
  für diejenigen, die nach uns kommen und die auch den Anspruch haben, in einer Welt
  der Freiheit, des Friedens und des Wohlstandes zu leben, genauso, wie wir heute
  das große Privileg haben, in einer solchen Welt zu leben. Gehen wir also gemeinsam
  an die Arbeit, um dieses Ziel gemeinsam zu erreichen. Unsere Kinder sollen eines
  Tages sagen: Ja, die haben es damals verstanden, die haben das richtig gemacht und
  die haben auch die richtigen Entscheidungen getroffen.'
