title: Aktuelle Entwicklungen im Nahen Osten Verhandlungen zwischen USA und Iran
text: 'Die Straße von Hormus ist eine wichtige Meerenge für Erdöl- und Flüssigerdgas-Exporte.
  Ihre Sperrung durch Iran ist einer der großen Konfliktpunkte. Durch die Absprache
  zwischen USA und Iran bestehe jetzt die Gelegenheit, „regionale Stabilität wiederherzustellen
  und die Weltwirtschaft zu stabilisieren", machte Bundeskanzler Merz gemeinsam mit
  den Staats- und Regierungschefinnen und -chefs Frankreichs, Italiens, Polens und
  des Vereinigtes Königreichs in einer Gemeinsamen Erklärung deutlich. Die E5 betonten,
  dass Iran niemals eine Nuklearwaffe besitzen darf und machten deutlich, „wie wichtig
  die bedingungslose und uneingeschränkte Freiheit der Schifffahrt in der Straße von
  Hormus ist". Die E5 bestätigten ihr Bekenntnis, „sich im Einklang mit ihren jeweiligen
  verfassungsrechtlichen Voraussetzungen und sobald es die Lage zulässt, an der von
  Frankreich und vom Vereinigten Königreich geführten multinationalen Militärmission
  zu beteiligen." Diese könnte eine wichtige Rolle dabei spielen, das Vertrauen für
  die Schifffahrtsbranche wiederherzustellen und die Straße von Hormus wieder zu öffnen,
  unter anderem durch die Kontrolle der Minenräumung. Dem Abschluss der Vereinbarung
  zwischen den USA und Iran „müssen nun auch weitere Verhandlungen folgen, insbesondere
  eine zweite Verhandlungsrunde“, hatte Bundeskanzler Merz bereits auf dem G7 -Gippfeltreffen
  im französischen Évian-les-Bains deutlich gemacht. „Wir sind uns über das Ziel völlig
  einig. Die Straße von Hormus muss ohne jede Einschränkung offen sein, ohne Wenn
  und Aber, und Iran muss sein Nuklearprogramm dauerhaft und nachweisbar beenden.
  Der Frieden muss halten, und das gilt nicht nur für den Iran, das gilt auch für
  den Libanon, insbesondere für den Südlibanon. Über die dortige Lage haben wir uns
  ausführlich unterhalten“, so Merz. Außerdem machte Kanzler Merz im Rahmen des G7
  -Gipfeltreffens gemeinsam mit den anderen Staats- und Regierungschefinnen und -chefs
  in einer Erklärung zu geopolitischen Fragen PDF, 57 KB, nicht barrierefrei am 17.
  Juni deutlich, „dass das Recht auf Transitdurchfahrt ohne Einschränkungen oder Gebühren
  die Grundlage des Welthandels darstellt“. „Wir unterstützen nachdrücklich ein tragfähiges
  und umfassendes diplomatisches Nachfolgeabkommen zu der von Präsident Trump erzielten
  Absprache, das allen Menschen in der Region Frieden und Sicherheit bringen kann“,
  heißt es in der Erklärung weiter. Die G7 unterstrichen die Notwendigkeit diesbezüglicher
  Verhandlungen, um die Bedrohungen anzugehen, die in der Region und darüber hinaus
  von Iran ausgehen, und zu gewährleisten, dass Iran niemals in den Besitz einer Atomwaffe
  gelangt. „In Libanon unterstützen wir durch einen unmittelbaren und tragfähigen
  Waffenstillstand die Bemühungen der libanesischen Führung, die Hisbollah zu entwaffnen
  und das staatliche Waffenmonopol zu erlangen sowie die territoriale Unversehrtheit
  und Souveränität Libanons mit den angemessenen internationalen Sicherheitsgarantien
  zu schützen“, so die G7 Staats- und Regierungschefinnen und -chefs in der Erklärung.
  Bereits zuvor hatte Kanzler Merz beim G7 -Gipfeltreffen betont: „Der vereinbarte
  Frieden muss einfach halten, und zwar auch im Libanon.“ Außerdem hatte die Bundesregierung
  in einer gemeinsamen Erklärung mit Frankreich, Großbritannien und Italien ihre „volle
  Unterstützung für die Stabilität, Souveränität und territoriale Unversehrtheit Libanons“
  bekräftigt. Und „betonen die Bedeutung eines robusten Waffenstillstands“. Die Hisbollah
  sei aufgefordert ihre Waffen niederzulegen und die Angriffe auf Israel einzustellen.
  Die Bundesregierung ermutige Israel und Libanon dazu, den eingeschlagenen Weg direkter
  Gespräche fortzusetzen. In Gaza wollen die G7 humanitäre Bemühungen sowie Bemühungen
  um Wiederaufbau und die rasche Umsetzung einschlägiger politischer und sicherheitspolitischer
  Maßnahmen beschleunigen. „Wir rufen zu einem Ende der Gewalt im Westjordanland auf.“
  Deutschland werde helfen, machte der Kanzler ebenfalls in seinem Statement am 17.
  Juni deutlich. „Es liegt in unserem Interesse, dass der Frieden hält. Wir brauchen
  einen stabilen Nahen und Mittleren Osten.“ Man brauche eine Klarheit bei den Seewegen
  und freie Seewege. Man brauche stabile Energiepreise. „Unsere Hilfe kann auch ein
  militärisches Engagement vor Hormus beinhalten. Ein entsprechendes Mandat wird die
  Bundesregierung dem Bundestag vorschlagen, wenn und sobald die entsprechenden Voraussetzungen
  gegeben sind“, hob der Kanzler hervor. Das Abkommen könne den Weg zu einer Erholung
  der Weltwirtschaft und einer Stabilisierung der Region bahnen, so Merz in seinem
  Statement am 15. Juni. „Die Straße von Hormus muss dauerhaft und uneingeschränkt
  für die freie Schifffahrt geöffnet werden.“ Weitere Verhandlungen müssten sicherstellen,
  dass Iran sein militärisches Nuklearprogramm nachprüfbar beendet, sagte der Kanzler.
  Und: „Es darf keine weiteren Angriffe gegen Israel und andere Nachbarn in der Region
  geben." Die Bundesregierung unterstützt weiterhin alle diplomatischen Anstrengungen
  und steht dazu in engem Austausch mit den Vereinigten Staaten, den europäischen
  Partnern und den Staaten der Region. Gemeinsam mit Frankreich, Großbritannien und
  Italien erklärte die Bundesregierung am 15. Juni: „Wir sind entschlossen, unseren
  Teil dazu beizutragen, im Einklang mit unseren jeweiligen verfassungsrechtlichen
  Bestimmungen, einschließlich durch eine rein defensiv ausgerichtete, unabhängige
  Mission, um die Handelsschifffahrt zu ermutigen und Minenräumung durchzuführen.“
  Für einen deutschen Beitrag zu einem Prozess der Sicherung der Straße von Hormus
  gäbe es – das hatte der Bundeskanzler stets betont – drei Voraussetzungen: „Der
  Krieg muss zu Ende sein. Es muss eine Rechtsgrundlage und ein Bundestagsmandat geben.
  Schließlich muss es ein tragfähiges politisches und militärisches Gesamtkonzept
  geben.“ Iran dürfe niemals in den Besitz einer Atomwaffe gelangen. Auch diese Haltung
  der Bundesregierung ist klar. Gemeinsam mit Frankreich, Großbritannien und Italien
  erklärte sie: „Wir stehen bereit, hierzu mit den USA , Iran und der IAEO zusammenzuarbeiten.
  Wir stellen in Aussicht, entsprechende Sanktionen aufzuheben, sofern Iran klare
  und überprüfbare Schritte in Bezug auf sein Atomprogramm unternimmt.“ Über Jahre
  und Jahrzehnte habe das iranische Regime die Welt mit Terror überzogen und die Nachbarschaft
  destabilisiert. Das machte Bundeskanzler Merz in seiner Regierungserklärung am 18.
  März deutlich. „Dieses Regime trägt die Verantwortung für die gegenwärtige Krise
  der Region“, sagte der Kanzler. Die Bundesregierung teile mit Israel und den Vereinigten
  Staaten das Ziel, dass Iran in Zukunft keine Bedrohung mehr darstellen kann, weder
  für Israel noch für die benachbarten Staaten in der Region. Der Kanzler wünsche
  dem iranischen Volk, „dass es sein Schicksal auch selbst in die Hand nehmen darf
  und kann und auch mit demokratischen Wahlen eine legitime Regierung herbeiführt.“
  Mit Blick auf die Lage im Nahen und Mittleren Osten ist die EU bereit, „ihre diplomatischen,
  rechtlichen, operativen und finanziellen Instrumente in vollem Umfang zu mobilisieren,
  um unkontrollierte Migrationsbewegungen in die EU zu verhindern und die Sicherheit
  in Europa zu wahren“, heißt es in den Schlussfolgerungen des Europäischen Rates
  vom 19. März. Die Sicherheit und die Kontrolle der Außengrenzen der EU werden weiter
  verstärkt. Der Europäische Rat betont, wie wichtig es ist, mit Partnern in der Region
  zusammenzuarbeiten, um sicherzustellen, dass sie die erforderliche Hilfe und Unterstützung
  erhalten. Außerdem arbeitet die Bundesregierung daran, die Auswirkungen des Krieges
  auf die Wirtschaft zu dämpfen. So dürfen die Spritpreise künftig nur noch einmal
  am Tag angehoben werden. Die Senkung der Energiesteuer für Diesel und Benzin ist
  für die Monate Mai und Juni in Kraft getreten.  Die Steuern – Energiesteuer auf
  Kraftstoffe und Mehrwertsteuer darauf – beim Tanken reduzieren sich um circa 17
  Cent pro Liter. Zudem wurden im Rahmen der Internationalen Energieagentur Ölreserven
  freigegeben.'
