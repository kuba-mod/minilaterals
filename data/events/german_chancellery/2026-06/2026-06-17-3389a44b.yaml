title: Gemeinsame Verantwortung für die Geschichte Europas – Deutschland gibt weitere
  kriegsbedingt verbrachte Kulturgüter an Polen zurück
text: 'Im Rahmen des Deutsch-Polnischen Forums sind heute verschiedene Kulturgüter
  an die Republik Polen zurückgegeben worden, die während der deutschen Besatzung
  Polens im Zweiten Weltkrieg entzogen oder verlagert wurden. Die Rückgaben stehen
  für die enge deutsch-polnische Zusammenarbeit bei der Aufarbeitung historischen
  Unrechts und sind Ausdruck der deutschen Verantwortung gegenüber Polen. Außenminister
  Johann Wadephul würdigte die Rückgaben: „80 Jahre nach dem Ende des Zweiten Weltkrieges
  können heute in enger Zusammenarbeit mit den bewahrenden Einrichtungen und der polnischen
  Seite Kulturgüter an Polen zurückgegeben werden, die während Krieg und Besatzung
  geraubt wurden. Die Rückgabe ist Ausdruck von gegenseitigem Respekt, bleibender
  deutscher Verantwortung und unserer vertrauensvollen Partnerschaft. Sie stärkt aus
  Anlass des 35. Jubiläums des Deutsch-Polnisches Freundschaftsvertrages die festen
  Bande zwischen unseren Ländern weiter. Erinnerung an das Geschehene, Verantwortung
  für die Zukunft und Versöhnung als Generationenaufgabe leiten auch heute unser Handeln.“
  Kulturstaatsminister Wolfram Weimer erklärte: „Ich freue ich mich sehr, dass der
  Hymnus „Gaude Mater Polonia“ an das polnische Volk zurückgegeben wird. Er ist eines
  der ältesten Werke religiöser Dichtung des Landes. Die heutige Rückgabe ist eine
  wichtige Geste der Anerkennung historischen Unrechts. Sie ist das Ergebnis konsequenter
  Provenienzforschung der kulturgutbewahrenden Einrichtungen Deutschlands sowie einer
  vertrauensvollen und engen Zusammenarbeit mit unseren polnischen Partnern. Damit
  schreiben wir ein neues Kapitel in der Erinnerungskultur unserer beiden Länder.“
  Die Präsidentin der Stiftung Preußischer Kulturbesitz Marion Ackermann erklärte:
  „Ich bin sehr glücklich, dass dieses Manuskript mit einer frühen Niederschrift der
  Hymne „Gaude Mater Polonia“, ein Manuskript, das Zeugnis einer der dunkelsten Zeiten
  der langen deutsch-polnischen Geschichte ist, heute wieder nach Polen zurückkehren
  kann. Mit den bedeutenden Kultureinrichtungen Polens verbindet uns heute eine freundschaftliche
  Zusammenarbeit, die wir noch intensivieren möchten. So kooperiert etwa die Staatsbibliothek
  demnächst im Rahmen eines Drittmittelprojektes mit vier polnischen Bibliotheken,
  und ist das Nationalmuseum in Warschau ab morgen zu Gast in der Alten Nationalgalerie
  auf der Museumsinsel.“ Bundesverkehrsminister Patrick Schnieder erklärte: „Die aktuelle
  geopolitische Lage und die heutigen Feierlichkeiten erinnern uns daran, wie wertvoll
  die deutsch-polnische Beziehung ist. In der Mobilität erleben wir das jeden Tag:
  Menschen aus Polen und Deutschland nutzen täglich die vielen grenzüberschreitenden
  Verbindungen sowohl auf der Schiene als auch auf der Straße. Das zeigt, wie lebendig
  und selbstverständlich unsere Partnerschaft heute ist. Umso mehr freue ich mich,
  im Rahmen des 35-jährigen Jubiläums die Rückgabe von Eisenbahnmodellen und Objekten
  vorzunehmen, die ihren historischen Platz in Polen haben.“ Der Oberbürgermeister
  von Pforzheim Peter Boch erklärte: „Mit der Rückgabe des Rings folgen wir der Überzeugung,
  dass historische Verantwortung nicht allein juristisch betrachtet werden kann. Der
  Ring besitzt für Polen eine außergewöhnliche kulturelle und ideelle Bedeutung. Deshalb
  hat der Gemeinderat der Stadt Pforzheim seine Rückgabe beschlossen. Wir verstehen
  diesen Schritt als Zeichen des Respekts und der Freundschaft gegenüber unserem polnischen
  Nachbarn. Gerade als Stadt, die selbst die Folgen von Krieg und Zerstörung erfahren
  hat, wissen wir, wie wichtig Versöhnung für das Zusammenleben in Europa ist.“ Hintergrund
  Seit den deutsch-polnischen Regierungskonsultationen vom 1. Dezember 2025 hat die
  Zusammenarbeit bei der Rückgabe kriegsbedingt verlagerter Kulturgüter deutlich an
  Dynamik gewonnen. Eine auf Initiative von Bundeskanzler Friedrich Merz eingerichtete
  deutsch-polnische Arbeitsgruppe unter Federführung des Auswärtigen Amtes bearbeitet
  gemeinsam mit dem polnischen Kulturministerium, dem Beauftragten der Bundesregierung
  für Kultur und Medien sowie den Botschaften beider Länder laufende Rückgabefälle.
  Die heute übergebenen Kulturgüter verfügen jeweils über eine eigene, oftmals bewegte
  Provenienzgeschichte. Mittelalterliches Manuskript mit Fragment der Hymne „Gaude
  Mater Polonia“ Die Stiftung Preußischer Kulturbesitz gibt eine mittelalterliche
  Handschrift zurück, die einen Teil des Textes der polnischen Hymne „Gaude Mater
  Polonia“ enthält. Das aus sechs Pergamentblättern bestehende Heft gelangte auf bisher
  unbekanntem Weg in die Staatsbibliothek zu Berlin, wo es als Fremdbesitz verwahrt
  wurde. Es stammt aus der Bibliothek des Priesterseminars in Płock, deren Bestände
  während des Zweiten Weltkriegs geplündert und weitgehend zerstört wurden. Die wertvollsten
  Handschriften dieser Bibliothek wurden von den deutschen Besatzungsbehörden nach
  Königsberg verbracht. Wie das Manuskript anschließend in den Bestand der Staatsbibliothek
  zu Berlin gelangte, konnte bislang nicht abschließend geklärt werden. Sichtbare
  Stempel der Seminarbibliothek belegen jedoch eindeutig seine Herkunft. Die drei
  Doppelblätter waren ursprünglich wohl Teil eines Codex aus dem späten 14. Jahrhundert.
  Sie wurden vermutlich im 16. oder 17. Jahrhundert daraus herausgelöst und in einem
  anderen Buch verwendet. Das belegen Spuren wie Verschmutzungen, Knicke und Einschnitte.
  Das Objekt kann unter folgender URL abgerufen werden: https://resolver.staatsbibliothek-berlin.de/SBB0003972B00000000
  Eisenbahnminiaturen und Zubehör aus dem Verkehrsmuseum Warschau Das BMV übergibt
  aus den Beständen des Bundeseisenbahnvermögen elf Objekte, die ursprünglich zur
  Sammlung des Verkehrsmuseums Warschau gehörten. Die Eisenbahnminiaturen und Zubehörteile
  waren bis zum Sommer 1940 in Warschau ausgestellt und wurden während der deutschen
  Besatzung in das damalige Verkehrs- und Baumuseum Berlin verbracht. Ihre Herkunft
  konnte anhand historischer Zugangsbücher rekonstruiert werden. Bereits bei der wissenschaftlichen
  Erschließung der Bestände des heutigen Deutschen Technikmuseums in Berlin wurde
  festgestellt, dass die Objekte im September 1940 „aus dem Verkehrsmuseum Warschau
  übernommen“ worden waren. Seit 2003 waren sie in der Datenbank „Lost Art“ als kriegsbedingt
  verlagertes Kulturgut registriert. Jagiellonen-Ring aus dem Schmuckmuseum Pforzheim
  Der Oberbürgermeister der Stadt Pforzheim übergibt einen Ring aus der ersten Hälfte
  des 16. Jahrhunderts, der König Sigismund I. dem Alten zugeschrieben wird. Der Ring
  könnte ein Geschenk seiner Gemahlin Bona Sforza gewesen sein und gehörte vermutlich
  zur sogenannten Königlichen Schatulle der Fürstenfamilie Czartoryski in Krakau.
  Kurz vor dem deutschen Überfall auf Polen wurde die Sammlung nach Sieniawa ausgelagert
  und dort vermutlich im September 1939 von deutschen Truppen geplündert. Der Ring
  gelangte später nach Deutschland und wurde dem Schmuckmuseum Pforzheim 1963 als
  Teil einer größeren Ringsammlung geschenkt. Der aus hochkarätigem Gelbgold gefertigte
  Ring ist mit einem etwa 3,5 Karat schweren Diamanten besetzt und zählt zu den herausragenden
  Beispielen höfischer Renaissance-Schmuckkunst. Die heutigen Rückgaben knüpfen an
  bereits erfolgte Rückgaben an, darunter die der sogenannten Deutschordensurkunden
  sowie eines Skulpturenkopfes der Marienburg an Polen. Die Bundesregierung wird die
  Prüfung weiterer polnischer Rückgabeersuchen fortsetzen und im Rahmen der Arbeitsgruppe
  die Zusammenarbeit mit den zuständigen Institutionen auf Bundes-, Landes- und kommunaler
  Ebene systematisch voranbringen. Kontakt Auswärtiges Amt: presse@diplo.de Beauftragter
  der Bundesregierung für Kultur und Medien: presse@bkm-info.bund.de Stiftung Preußischer
  Kulturbesitz: presse@spk-berlin.de Bundesverkehrsministerium: presse@bmv.bund.de
  Stadt Pforzheim: info@pforzheim.de'
