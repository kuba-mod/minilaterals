title: Fragen und Antworten Neuregelungen in der Migrationspolitik
text: 'Asylunterkunft in Berlin: Um Migration effektiver begrenzen und steuern zu
  können, hat das Bundeskabinett Neuregelungen in der Migrationspolitik beschlossen.
  Migration effektiv steuern und begrenzen: Das ist eines der Ziele der Bundesregierung.
  Das Gesetz ist nun in Kraft getreten. „Das sind wesentliche Elemente, um die Asylwende
  durchzuführen“, betonte Bundesinnenminister Alexander Dobrindt. Konkret sind zwei
  Regelungen vorgesehen, die nun beide in Kraft getreten sind: Die Einstufung sicherer
  Herkunftsstaaten wird vereinfacht (Februar 2026) und die verpflichtende Bestellung
  eines Anwalts bei Abschiebungshaft und Ausreisegewahrsam wird abgeschafft (Juni
  2026). Erstens: Die Asylverfahren sollen beschleunigt und Behörden und Gerichten
  entlastet werden. Zweitens: Es soll klar kommuniziert werden, dass Asylanträge aus
  sicheren Herkunftsländern in der Regel kaum Aussicht auf Erfolg haben. Damit setzt
  die Bundesregierung zwei weitere prioritäre Maßnahmen aus dem Koalitionsvertrag
  für eine effektive Steuerung der Migration um. Im parlamentarischen Verfahren hat
  der Innenausschuss noch eine Ergänzung des Staatsangehörigkeitsgesetz vorgenommen.
  Danach soll eine Einbürgerung für die Dauer von zehn Jahren ausgeschlossen werden,
  wenn sie unanfechtbar zurückgenommen oder im Einbürgerungsverfahren z.B. mit Arglist,
  Drohung oder Bestechung falsche Angaben unterliegt. Diese Regelung ist mit der Verkündung
  des Gesetzes in Kraft getreten. Der Gesetzesentwurf sieht vor, dass die Bundesregierung
  in Zukunft die Bestimmung sicherer Herkunftsstaaten für den internationalen Schutz
  durch eine einfache Rechtsverordnung ohne Zustimmung des Bundestages und Bundesrates
  vornehmen kann. Damit wird das Verfahren zur Bestimmung der sicheren Herkunftsländer
  in Deutschland vereinfacht und bürokratische Hürden werden abgebaut. Außerdem sieht
  der Gesetzesentwurf die Abschaffung der verpflichtenden Bestellung eines Rechtsbeistands
  im Verfahren über die Anordnung von Abschiebehaft und Ausreisegewahrsam vor. Ein
  sicherer Herkunftsstaat ist ein Land, in dem generell keine staatliche Verfolgung
  droht – etwa wegen des demokratischen Systems, einer stabilen Rechtsordnung und
  funktionierender Schutzmechanismen. Auch vor nichtstaatlicher Verfolgung muss der
  jeweilige Staat wirksam schützen können. Für Menschen aus diesen Ländern gilt deshalb
  die sogenannte Regelvermutung, dass sie im Herkunftsland keiner Verfolgung ausgesetzt
  sind. Das heißt aber nicht, dass sie pauschal vom Asyl ausgeschlossen sind: Jeder
  Antrag wird individuell geprüft. Wer glaubhaft macht, dass ihm oder ihr im konkreten
  Fall dennoch Verfolgung droht, kann weiterhin Schutz erhalten. In Deutschland gelten
  derzeit folgende Länder als sichere Herkunftsstaaten: Die Mitgliedstaaten der Europäischen
  Union, Albanien, Bosnien und Herzegowina, Georgien, Ghana, Kosovo, Mazedonien, Montenegro,
  Republik Moldau, Senegal, Serbien. Entsprechend des Koalitionsvertrages soll die
  Liste der sicheren Herkunftsstaaten erweitert werden. Im Rahmen dessen sollen auch
  die Möglichkeiten der GEAS Reform ausgeschöpft werden. Zunächst sollen Algerien,
  Indien, Marokko und Tunesien als sichere Herkunftsstaaten bestimmt werden. Weitere
  Einstufungen werden fortlaufend geprüft.'
