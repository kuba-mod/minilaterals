title: Im Kabinett beschlossen Neues deutsch-polnisches Verteidigungsabkommen unterzeichnet
text: 'Bundesverteidigungsminister Pistorius und sein polnischer Amtskollege Kosiniak-Kamysz
  haben das neue Verteidigungsabkommen in Warschau unterzeichnet. Die geopolitische
  Weltordnung verändert sich dramatisch. Die Bundesregierung setzt in diesen disruptiven
  Zeiten auf verlässliche und kooperative Partnerschaften. Bundeskanzler Friedrich
  Merz betonte auf der diesjährigen Münchner Sicherheitskonferenz : „Nie wieder werden
  wir Deutsche allein gehen. Unsere Freiheit behaupten wir mit unseren Nachbarn, unseren
  Verbündeten und unseren Partnern.“ Im Rahmen dieser Zielsetzung hat die Bundesregierung
  nun ein Abkommen zur Verteidigungszusammenarbeit zwischen Polen und Deutschland
  beschlossen. Das Verteidigungsabkommen betont die Einbettung der Verteidigungspolitik
  beider Länder in die NATO und EU . Es bekräftigt die gegenseitige Verpflichtung
  zum Beistand im Falle eines Angriffes von Außen gemäß Artikel 5 des NATO -Vertrages
  und Artikel 42 Absatz 7 des EU -Vertrages. Zudem stärkt und vertieft das Abkommen
  die militärische Zusammenarbeit in allen Dimensionen. Polen und Deutschland kooperieren
  künftig enger in der Fähigkeitsentwicklung und fördern die Zusammenarbeit ihrer
  Verteidigungsindustrien. Außerdem sieht das Abkommen gemeinsame Ausbildungen und
  Übungen vor. Ein besonderer Fokus liegt hierbei auf dem Ostseeraum. Deutschland
  und Polen wollen auch im Krisen management sowie der Begegnung auf hybride Bedrohungen
  enger zusammenarbeiten. Darüber hinaus werden strukturierte Austauschformate zwischen
  den Verteidigungsministerien zu allen relevanten Verteidigungsfragen vereinbart.
  Das Verteidigungsabkommen unterstreicht die vertrauensvollen Beziehungen zu Deutschlands
  Nachbarn Polen und die enge innereuropäische Zusammenarbeit für Frieden, gemeinsame
  Sicherheit und Stabilität. Es wurde am 17. Juni 2026 in Warschau von Verteidigungsminister
  Boris Pistorius und dem polnischen Verteidigungsminister Wladyslaw Kosiniak-Kamysz
  unterzeichnet – dem 35. Jahrestag des Deutsch-Polnischen Nachbarschaftsvertrags.'
