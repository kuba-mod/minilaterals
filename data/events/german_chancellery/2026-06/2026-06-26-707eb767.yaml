title: Bundesregierung aktuell
text: 'eine hochentwickelte Demokratie ist ein kunstvolles Gewächs. Wer diese Pflanze
  zuschneiden möchte, sollte besser nicht mit der Machete arbeiten. Deswegen ist es
  besonders beeindruckend, welcher Kunstschnitt der Alterssicherungskommission gelungen
  ist, die (weil es einfacher ist) auch Rentenkommission heißen darf. Diese Kommission
  hatte die Dekaden-Aufgabe, das deutsche Rentensystem vor seinem scheinbar unaufhaltsamen
  Niedergang zu bewahren. Es hat sich ausgezahlt, einer Gruppe von Expertinnen und
  Experten die Zeit, den Raum und die Ruhe zu geben, ihren Schnitt zu planen. Ihr
  Reformvorschlag hat in Berlin viel Applaus aus allen politischen Richtungen bekommen,
  vielleicht auch, weil er die großen Themen der nächsten Jahre adressiert: Wie kann
  Deutschland wirtschaftlich stark bleiben? Was hält die Gesellschaft zusammen? Und
  wie kann der Sozialstaat seine Zusagen erfüllen? Die Rente der Zukunft würde den
  Trend in doppelter Hinsicht umkehren:  Die Grundsicherung könnte wieder wachsen,
  die Rentenbeiträge hingegen sinken, was nicht nur die Beschäftigten entlastet, sondern
  auch die Unternehmer (weil die Kosten für die Arbeit gesenkt würden). Die wichtigste
  Botschaft aber geht an die junge Generation: Ihre Sorge vor einer übermäßigen Belastung
  wird genommen. Kern des Konzepts ist die Ergänzung der gesetzlichen Rentenversicherung
  durch eine Kapitalanlage. Wer hier regelmäßig einzahlt, wird im Alter belohnt werden.
  Die Rentenkommission nennt sogar ein konkretes Ziel für die Sicherung des Lebensstandards:
  Menschen mit durchschnittlichem Einkommen sollen im Ruhestand mindestens 70 Prozent
  ihres früheren Nettoeinkommens erreichen, Menschen mit geringeren Einkommen entsprechend
  mehr. Bemerkenswert war also nicht nur der Inhalt des Berichts, sondern auch seine
  Entstehungsgeschichte. Sie zeigt: Gute Kompromisse sind möglich, wenn Experten und
  politische Köpfe aller Couleur mit dem Willen zum Ergebnis über einer Aufgabe brüten.
  Nun beginnt der politische Prozess in Regierung und Parlament. Also seien Sie nicht
  irritiert, wenn die vielen Unterthemen dieser Großreform immer und immer wieder
  diskutiert werden – das kunstvolle Gewächs Demokratie möchte weiter gedüngt und
  gewässert werden. Für die Bundesregierung war dies eine gute Woche, weil noch ein
  weiteres Puzzleteil im großen Reformbild passgenau an die richtige Stelle fiel.
  Bundeskanzler, die Kabinettsmitglieder und die Regierungschefinnen und Regierungschefs
  der Länder verständigten sich bei einem der drängendsten Probleme der Städte und
  Gemeinden: Wer kommt für die gewaltigen Kosten für die Jugendhilfe, Eingliederungshilfe
  und Unterhalt auf? Das Zauberwort heißt Konnexität. Übersetzung: Wer bestellt, der
  bezahlt. In diesem Fall ist es der Bund, weil diese sogenannten Versorgungsgesetze
  aus seiner Feder stammen. Das entlastet zunächst die Gemeinden, die wieder mehr
  Luft zum Atmen bekommen. Entlastung versprechen außerdem dutzende Maßnahmen zum
  Bürokratieabbau und zur Modernisierung des Staates. Planungs- und Genehmigungsverfahren
  sollen beschleunigt, Verwaltungsleistungen digitaler werden. Obendrauf kommt noch
  ein „Pakt für den Rechtsstaat“, der Geld und Personal für die stark belasteten Gerichte
  und Strafverfolgungsbehörden verspricht. Ob bei der Rente, der Hilfe für die Gemeinden
  oder beim Bürokratieabbau: Stück für Stück kommt die Modernisierung des Landes voran.
  Jetzt liegen noch mindestens zwei intensive politische Wochen vor uns, ehe Regierung
  und Parlament Richtung Sommerpause einen Gang runter schalten dürfen. Weil aber
  das kunstvolle Gewächs Demokratie immer wieder neu beschnitten werden muss: Die
  nächste Reform kommt bestimmt. „Deutschland, Frankreich, Polen, Italien und Großbritannien
  stehen eng zusammen und übernehmen mehr Verantwortung für die Sicherheit unseres
  Kontinents. Denn Europas Sicherheit wird nur gemeinsam verteidigt.“ Defekte Waschmaschinen,
  Kühlschränke und Smartphones werden oft nicht repariert, sondern durch neue Produkte
  ersetzt. Das soll sich ändern. Der Bundestag hat ein Gesetz beschlossen, mit dem
  Verbraucherinnen und Verbraucher ein Recht auf Reparatur erhalten sollen. 20,9 %
  der Bevölkerung in Deutschland lebt alleine. Wir freuen uns über Ihr Feedback: Nutzen
  Sie bitte dafür das Kontaktformular (nicht die Antwortfunktion auf diese E-Mail).'
