title: Chancellor’s trip to Saudi Arabia, Qatar and the United Arab Emirates Strengthening
  strategic partnerships
text: 'The last stop on his trip to the Gulf region took Federal Chancellor Friedrich
  Merz to Abu Dhabi. It was his first official trip to the Gulf region: Federal Chancellor
  Friedrich Merz has visited Saudi Arabia, Qatar and the United Arab Emirates. The
  Federal Chancellor’s trip underlines the fact that stability in the Near and Middle
  East is in Germany’s interest. The Federal government wants to strengthen and deepen
  relations with the three Gulf states. The Federal Chancellor first met with Crown
  Prince Mohammad bin Salman in Saudi Arabia for personal talks. The following day,
  he travelled to Qatar, where he met with the Emir of Qatar, Sheikh Tamim bin Hamad
  Al-Thani. His trip ended in Abu Dhabi in the United Arab Emirates (UAE), where the
  Chancellor met the President of the UAE--United Arab Emirates, Mohammed bin Zayed.
  Building strategic partnerships, strengthening bilateral relations and making joint
  efforts for peace and stability in the Gulf region were the recurring themes of
  the trip, as the Chancellor explained. He also sees the trip in a wider context:
  “We need such partnerships more than ever at a time when major powers are increasingly
  dominating politics.” During his visit to the United Arab Emirates , on the third
  stop on his trip, Federal Chancellor Merz spoke of the impressions that make him
  feel optimistic - also with regard to investments in Germany and German investments
  in the Gulf region. In a world of great uncertainty, what is needed above all else
  is reliability in bilateral relations. “I can offer that from Germany,” said the
  Chancellor. Germany is also prepared to cooperate more closely on foreign trade
  policy, with the possibility of reaching a free trade agreement with the UAE--United
  Arab Emirates. The Federal Chancellor spoke at length with President bin Zayed about
  the talks held in Abu Dhabi between Russia, Ukraine and the USA. Iran, Sudan and
  Yemen, where the United Arab Emirates also play an important role, were also discussed.
  In Doha, the second stop on his trip, Federal Chancellor Merz emphasised the positive
  cooperation with Qatar . The country is a reliable partner and plays an important
  role politically. The Emir of Qatar has proven himself time and again as a mediator.
  Germany has been purchasing liquid gas from Qatar for several years. According to
  Merz, this has contributed to a reliable energy supply. German companies would do
  good business in Qatar. At the same time, the country is involved in a whole range
  of German companies. Sheikh Al-Thani will pay a state visit to Germany in July –
  a further sign that the two countries want to deepen their partnership. During his
  stop in Riyadh, Federal Chancellor Merz emphasised the economic importance of bilateral
  relations with Saudi Arabia . “Saudi Arabia''s economic, cultural and social modernisation
  makes the country an attractive market for German industry. We have a substantial
  investment in the Saudi sovereign wealth fund. We want to utilise this – for growth
  in Germany,” said the Chancellor. The partnerships with the Gulf states also opened
  up the opportunity to diversify oil and gas supply chains. Defence exports will
  also be discussed. Riyadh, 4 February 2026: Federal Chancellor Merz has travelled
  to the Gulf region to strengthen strategic partnerships with Saudi Arabia, Qatar
  and the United Arab Emirates. In Saudi Arabia, he was received by Crown Prince Mohammed
  bin Salman bin Abdulaziz Al Saud. The Chancellor was accompanied by a business delegation.
  Before making the trip, the Chancellor explained that the countries being visited
  are among the key economic players in the region and are important trading partners
  for Germany. For Federal Chancellor Merz, Saudi Arabia – the only G20 state in the
  Gulf – is an attractive market for German industry. “The volume of trade already
  amounts to around eleven billion euros, with a strong upward trend,” said Chancellor
  Merz. Doha, 5 February 2026: The second stop on the trip took the Federal Chancellor
  to the capital of Qatar. The agenda in Doha included discussions with Qatari and
  German business representatives. At the joint meeting with Sheikh Mohammed bin Abdulrahman
  bin Jassim Al-Thani, the Chancellor made it clear that the partnership with Qatar
  was to be strengthened. Federal Chancellor Merz was then received by Sheikh Tamim
  bin Hamad bin Khalifa Al Thani, Emir of Qatar, for talks. Finally, the Chancellor
  visited one of the most important museums of Islamic art on the Arabian Peninsula.
  The Doha Museum of Islamic Art houses significant parts of the extensive art collection
  of the Qatari Emirs. Germany and Qatar want to strengthen their partnership. Federal
  Chancellor Merz made this clear after talks with the Emir of Qatar in Doha. The
  dialogue centred on economic issues, cultural exchange and stability in the Gulf
  region. Abu Dhabi, 6 February 2026: The aim of closer cooperation on foreign trade
  policy was also reflected in the Chancellor’s agenda. In the UAE--United Arab Emirates
  he visited a subsidiary of the German company BAUER AG. “Germany has a very high
  reputation here, also because we are a good investment location,” said Chancellor
  Merz during the visit. There has been a sharp rise in investment figures and a significant
  increase in orders in many companies. The Chancellor also visited the state-owned
  oil company Abu Dhabi National Oil Company (ADNOC). His trip to the Gulf was possibly
  one of the most important in recent months, said the Chancellor at the end of his
  visit. There is huge potential in terms of investment in Germany and of German investment
  in the region. Riyadh, 4 February 2026: Federal Chancellor Merz has travelled to
  the Gulf region to strengthen strategic partnerships with Saudi Arabia, Qatar and
  the United Arab Emirates. In Saudi Arabia, he was received by Crown Prince Mohammed
  bin Salman bin Abdulaziz Al Saud. The Chancellor was accompanied by a business delegation.
  Before making the trip, the Chancellor explained that the countries being visited
  are among the key economic players in the region and are important trading partners
  for Germany. For Federal Chancellor Merz, Saudi Arabia – the only G20 state in the
  Gulf – is an attractive market for German industry. “The volume of trade already
  amounts to around eleven billion euros, with a strong upward trend,” said Chancellor
  Merz. Doha, 5 February 2026: The second stop on the trip took the Federal Chancellor
  to the capital of Qatar. The agenda in Doha included discussions with Qatari and
  German business representatives. At the joint meeting with Sheikh Mohammed bin Abdulrahman
  bin Jassim Al-Thani, the Chancellor made it clear that the partnership with Qatar
  was to be strengthened. Federal Chancellor Merz was then received by Sheikh Tamim
  bin Hamad bin Khalifa Al Thani, Emir of Qatar, for talks. Finally, the Chancellor
  visited one of the most important museums of Islamic art on the Arabian Peninsula.
  The Doha Museum of Islamic Art houses significant parts of the extensive art collection
  of the Qatari Emirs. Germany and Qatar want to strengthen their partnership. Federal
  Chancellor Merz made this clear after talks with the Emir of Qatar in Doha. The
  dialogue centred on economic issues, cultural exchange and stability in the Gulf
  region. Abu Dhabi, 6 February 2026: The aim of closer cooperation on foreign trade
  policy was also reflected in the Chancellor’s agenda. In the UAE--United Arab Emirates
  he visited a subsidiary of the German company BAUER AG. “Germany has a very high
  reputation here, also because we are a good investment location,” said Chancellor
  Merz during the visit. There has been a sharp rise in investment figures and a significant
  increase in orders in many companies. The Chancellor also visited the state-owned
  oil company Abu Dhabi National Oil Company (ADNOC). His trip to the Gulf was possibly
  one of the most important in recent months, said the Chancellor at the end of his
  visit. There is huge potential in terms of investment in Germany and of German investment
  in the region. The Chancellor had announced that he also wanted to address difficult
  issues during the three stops on his trip. In Saudi Arabia, for example, a lot has
  been achieved through Crown Prince bin Salman’s “Vision 2030”, but there is certainly
  still a lot to be done – also with regard to human rights. The Gulf states are committed
  to regional stability and are mediating partners in many other conflicts. According
  to the Federal Chancellor, the trip was therefore also focused on peace and stability
  in the region. Developments in Iran played an important role. In the talks, there
  was great concern expressed about a further escalation in the conflict. The Chancellor
  emphasised three points: The Iranian regime''s violence against its own population
  must stop immediately. Iran must stop its military nuclear programme and put an
  end to its destabilising activities in the region. Merz emphasised the close contact
  Germany enjoys with its partners and how they want to promote de-escalation.'
