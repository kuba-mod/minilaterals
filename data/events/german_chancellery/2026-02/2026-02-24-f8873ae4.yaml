title: A war of aggression against Ukraine "The fate of Ukraine is our fate"
text: 'People hold German and Ukrainian flags in Berlin to demonstrate solidarity
  with Ukraine. 24 February 2026 marks the fourth anniversary of Russia''s invasion
  of the whole of Ukraine. For four years, Ukraine has been defending its freedom
  – and our common security in Europe. "For four years, every day and every night
  has been a nightmare for Ukrainians, and it''s not just a nightmare for them, but
  for all of us. War has been back in Europe for almost four years," wrote Federal
  Chancellor Friedrich Merz on X and Instagram. The Chancellor made it clear that
  since then we have been reminded daily of "what violence, lack of freedom and revisionism
  look like". At the same time, the Ukrainians'' fight for defence reminds us of what
  just resistance looks like. The Federal Chancellor expressed confidence, saying: "We
  will only be able to create sustainable peace in Europe together with a free and
  sovereign Ukraine, a strong Ukraine that can continue to protect itself against
  Russian attacks now and in the future." Political and historical common sense demand
  that we recognise this: "The fate of Ukraine is the fate of the whole of Europe,"
  said Chancellor Merz. On the 4th anniversary of the start of the Russia’s full-scale
  invasion, the G7 states have reaffirmed in a joint statement their "unwavering support
  for Ukraine in defending its territorial integrity and right to exist, and its freedom,
  sovereignty and independence". In order to achieve these objectives, all member
  countries are supporting the peace process initiated by US President Donald Trump,
  in which Europe has a leading role to play together with other partners.'
