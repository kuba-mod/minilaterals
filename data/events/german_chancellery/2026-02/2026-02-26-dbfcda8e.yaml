title: Critical infrastructure protection Strengthening drone defence
text: In addition, intentional, unauthorised entry onto airport premises will be a
  punishable offence in the future. Illegal drone flights over critical infrastructure
  in Germany have increased significantly since the beginning of Russia’s war of aggression
  against Ukraine. It is suspected that they are also being piloted by foreign state
  actors for espionage and sabotage purposes in Germany. On 8 October 2025, the Federal
  Government launched a comprehensive reform of the Federal Police Act and expanded
  the powers of the Federal Police in the area of drone defence . Amendments made
  to the Second Act Amending the German Aviation Security Act are intended to further
  improve drone defence. In addition, intentional, unauthorised entry onto airport
  premises will be a punishable offence in the future. Until now, this could only
  be dealt with by imposing fines.
