title: The Federal Chancellor’s trip to Beijing and Hangzhou “We want a partnership
  with China”
text: 'Germany aims for fair and transparent competition with China. Friedrich Merz
  has travelled to the People’s Republic of China for an official visit lasting several
  days – for the first time in his office as Federal Chancellor. After visiting the
  Forbidden City on Thursday – the palace complex in the centre of Beijing that served
  as the centre of power for Chinese emperors for centuries – the Chancellor followed
  up with a visit to the Mercedes-Benz Group. Federal Chancellor Merz then travelled
  on to the megacity of Hangzhou in the east of the country, where he was first welcomed
  by the Party Secretary of Zhejiang Province, Wang Hao. Finally, he visited the robotics
  company Unitree and Siemens Energy. Following talks with the Chinese leadership
  on Wednesday, the Federal Chancellor emphasised that discussions had focused on
  the growth of both economies and trade policy issues. He also mentioned the 30-strong
  business delegation that had accompanied him on the visit and announced further
  visits by specialist ministers over the course of the year. At the end of his trip
  to China, Federal Chancellor Merz said that he was returning home with many good
  impressions and with many tasks that still needed to be accomplished together. Germany
  and China, he said, wanted to work more closely together – both economically and
  politically. Among other things, German-Chinese government consultations were being
  planned for this purpose. However, he acknowledged that there were still challenges
  – such as competition – that were being worked on jointly. The two countries are
  seeking a good cooperation and so also openly address difficult issues, said Merz.
  The Federal Chancellor took part in a meeting of the China-Germany Economic Advisory
  Committee. A number of declarations were signed at a signing ceremony. Following
  the talks with Chinese President Xi Jinping, the Chancellor said: “We started off
  by agreeing that we want to strengthen our comprehensive strategic partnership.”
  According to Merz, the question of how Germany and China organise their competition
  played an important role here. This, he said, was not only of economic importance,
  but also says something about the quality of the bilateral partnership. “The Chinese
  and Germans are aware that our economic exchange contributes significantly to the
  prosperity of both countries”, said Merz. He cited the Chinese government’s order
  for 120 additional aircraft from Airbus as a concrete example. Beijing, 25 February
  2026: the Chancellor’s two-day trip to China began in Beijing. Chancellor Merz emphasised
  that there is “great potential for growth” in both economies. In the Great Hall
  of the People, the Chancellor was welcomed by China’s Prime Minister Li Qiang with
  a military ceremony. Merz said he is looking forward to having positive discussions
  and a good exchange between the countries. The talks centred on opportunities for
  economic cooperation and security policy. Federal Chancellor Merz was accompanied
  by a 30-strong business delegation. The German government’s goal is for trade with
  China to be as open, fair and free as possible. While there are a number of challenges
  – such as the growing trade imbalance – the Chancellor stressed that these challenges
  could be overcome “through cooperation and dialogue”. At the end of the first day,
  President Xi Jinping invited the Chancellor to a joint dinner. Chancellor Merz would
  like to maintain and deepen diplomatic ties and intensive economic relations with
  China. Beijing, 26 February: The second day started on a cultural note: the Forbidden
  City is a designated World Heritage Site and one of the most important historical
  sites in China. The chancellor was led by the director of the German Archaeological
  Institute Beijing, Dominic Hosner. This was followed by various company visits,
  starting with the Mercedes-Benz Group in Beijing, where the Chancellor was able
  to take a look into the future at the German car manufacturer. He took a short ride
  in an autonomous vehicle. Chancellor Merz then travelled to the technology metropolis
  of Hangzhou. The Chinese manufacturer Unitree specialises in the development, production
  and worldwide distribution of high-quality humanoid robots. The Chancellor was able
  to see these in action for himself at a demonstration. They jump, dance and even
  fight: the first AI-controlled robot models, which can also help with household
  chores, are already on the market in China. The last appointment on the agenda was
  a visit to Siemens Energy. In a joint venture with two Chinese companies, high-voltage
  and circuit breakers are produced here to prevent short circuits in power stations
  and substations. For the Chancellor, the company visits were “impressive examples
  of successful cooperation and good technological development”. The aim now is to
  seek good cooperation, but also to openly address those issues that present challenges,
  the Chancellor said this at the end of his trip. Beijing, 25 February 2026: the
  Chancellor’s two-day trip to China began in Beijing. Chancellor Merz emphasised
  that there is “great potential for growth” in both economies. In the Great Hall
  of the People, the Chancellor was welcomed by China’s Prime Minister Li Qiang with
  a military ceremony. Merz said he is looking forward to having positive discussions
  and a good exchange between the countries. The talks centred on opportunities for
  economic cooperation and security policy. Federal Chancellor Merz was accompanied
  by a 30-strong business delegation. The German government’s goal is for trade with
  China to be as open, fair and free as possible. While there are a number of challenges
  – such as the growing trade imbalance – the Chancellor stressed that these challenges
  could be overcome “through cooperation and dialogue”. At the end of the first day,
  President Xi Jinping invited the Chancellor to a joint dinner. Chancellor Merz would
  like to maintain and deepen diplomatic ties and intensive economic relations with
  China. Beijing, 26 February: The second day started on a cultural note: the Forbidden
  City is a designated World Heritage Site and one of the most important historical
  sites in China. The chancellor was led by the director of the German Archaeological
  Institute Beijing, Dominic Hosner. This was followed by various company visits,
  starting with the Mercedes-Benz Group in Beijing, where the Chancellor was able
  to take a look into the future at the German car manufacturer. He took a short ride
  in an autonomous vehicle. Chancellor Merz then travelled to the technology metropolis
  of Hangzhou. The Chinese manufacturer Unitree specialises in the development, production
  and worldwide distribution of high-quality humanoid robots. The Chancellor was able
  to see these in action for himself at a demonstration. They jump, dance and even
  fight: the first AI-controlled robot models, which can also help with household
  chores, are already on the market in China. The last appointment on the agenda was
  a visit to Siemens Energy. In a joint venture with two Chinese companies, high-voltage
  and circuit breakers are produced here to prevent short circuits in power stations
  and substations. For the Chancellor, the company visits were “impressive examples
  of successful cooperation and good technological development”. The aim now is to
  seek good cooperation, but also to openly address those issues that present challenges,
  the Chancellor said this at the end of his trip. The Chancellor also announced the
  resumption of German-Chinese government consultations, which had been interrupted
  by the change of government and the pandemic. He also reiterated his desire to deepen
  the comprehensive strategic partnership between Germany and China. He emphasised
  the need to talk about current challenges in the area of international trade and
  said that there would be further bilateral dialogue formats. The Chancellor expressed
  his satisfaction with China’s commitment to peace in the region. He said that the
  EU had an interest in security and stability and would seek co-operation in diplomatic
  efforts – among other things, to ensure that Russia was not supplied with dual-use
  goods. The Chancellor also made it clear that an escalation in the Indo-Pacific
  region would also be dangerous for Europe. “Overall, we want to continue the success
  story of cooperation between China and Germany”, said the Chancellor. This requires
  regulated access to the markets, he said, and competition needs to be fair and based
  on compliance with jointly set rules. During his trip, the Federal Chancellor also
  wanted to gain an impression of how rapidly innovations in the fields of autonomous
  driving, energy and climate technology, and artificial intelligence are developing
  in China and what opportunities are opening up for the German economy. Germany and
  China enjoy close economic relations. The state in East Asia is Germany’s most important
  trading partner, but is now regarded by the Federal Government as both a trading
  partner and a competitor. Before his departure, the Federal Chancellor also outlined
  five guiding principles that would shape his trip: Chinese-German economic and trade
  relations are far-reaching. With a foreign trade turnover of more than 250 billion
  euros, the People’s Republic was once again Germany’s most important trading partner
  in 2025 – as it was from 2016 to 2023. With 5,200 German companies, China is one
  of Germany’s most important foreign locations overall – with a focus on the automotive,
  mechanical engineering and electrical industries.'
