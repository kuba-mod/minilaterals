title: كلمة تهنئة للمستشار الاتحادي بمناسبة حلول شهر رمضان 2026 "بمناسبة حلول شهر
  رمضان الفضيل، يطيب لي أن أتقدّم إليكم بأسمى آيات التهاني وأطيب التمنيات."
text: 'يبدأ الكثير من المسلمات والمسلمين وجبة الإفطار ليلةً بتناول التمر المجفف: يتمنى
  لهم المستشار الاتحادي فريدريش ميرتس أوقاتًا مليئة بالسلام. يعدّ شهر رمضان وقتا للرجوع
  إلى الذات والتأمّل العميق، وفي الوقت نفسه زمنا تتجلى فيه روح الجماعة في أبهى صورها.
  ففي كل ليلة تفطرون مع عائلتكم، وفي دوائر أصدقائكم، وبين جيرانكم أو في رحاب جماعتكم.
   تتقاسمون أطايب الطعام، وتتشاركون مشاعر الفرح والامتنان. إنه لنموذج يحتذى به أن
  يقوم العديد من المسلمات والمسلمين بدعوة أشخاص من ثقافات وأديان أخرى لمشاركتهم مائدة
  الإفطار. فمجتمعُنا القائم على الحرية يفترض أن نلتقي بعضنا بعضًا بروح التسامح، ويحيا
  بالانفتاح وبالفضول الصادق تجاه الآخر. ويهيّئ شهر رمضان إطارًا احتفاليًا للقاء الشخصي
  والاختلاط بالآخرين عبر الحدود الثقافية. وفي هذا التآلف تكمن القوة الدافعة نحو المستقبل
  التي يحتاج إليها بلدنا، خاصة في هذه الأوقات التي نواجه فيها العديد من التحديات والاختبارات.
  ومن ثمّ فإن شكري موصولٌ إلى جميع المسلمات والمسلمين الذين يثرون بلدنا بكرم ضيافتهم،
  لا سيما في هذا الشهر الكريم. وبصفتنا الحكومة الاتحادية، فإنه من مسؤوليتنا أن نكفل
  لجميع الناس الذين يعيشون في ألمانيا أن ينمّوا ذواتهم بحرية وأن ينعموا بالأمن – بصرف
  النظر عن معتقداتهم وأصولهم. فكرامة الفرد وحريّته وتحقيقه لذاته هي الغاية العليا
  لدولتنا ومجتمعنا. هذا وأعلم أنّ كثيرين منكم يلتزمون، في شهر رمضان كما في سائر الأيام،
  بالعمل من أجل تعايش منسجم في بلدنا. ولكم مني خالص الشكر والتقدير على ذلك. ولرمضان
  2026 أتمنى لكم حوارات ملهمة تبعث على القوة، وأوقاتًا مليئة بالسلام.'
