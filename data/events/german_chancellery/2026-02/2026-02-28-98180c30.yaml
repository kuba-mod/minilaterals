title: E3 Joint Leaders’ Statement on Iran
text: France, Germany and the United Kingdom have consistently urged the Iranian regime
  to end Iran’s nuclear program, curb its ballistic missile program, refrain from
  its destabilizing activity in the region and our homelands, and to cease the appalling
  violence and repression against its own people. We did not participate in these
  strikes, but are in close contact with our international partners, including the
  United States, Israel, and partners in the region. We reiterate our commitment to
  regional stability and to the protection of civilian life. We condemn Iranian attacks
  on countries in the region in the strongest terms. Iran must refrain from indiscriminate
  military strikes. We call for a resumption of negotiations and urge the Iranian
  leadership to seek a negotiated solution. Ultimately, the Iranian people must be
  allowed to determine their future. - Deutsche Höflichkeitsübersetzung - Gemeinsame
  Erklärung der Staats- und Regierungschefs der E3 Frankreich, Deutschland und das
  Vereinigte Königreich haben wiederholt an das iranische Regime appelliert, ihr Nuklearprogramm
  einzustellen, das ballistische Raketenprogramm zu reduzieren, von destabilisierenden
  Aktivitäten in der Region und unseren Heimatländern abzusehen und die abstoßende
  Gewalt und Repression gegen die eigene Bevölkerung zu beenden. Wir waren nicht an
  den Militärschlägen beteiligt, stehen aber in engem Kontakt mit unseren internationalen
  Partnern, inklusive den Vereinigten Staaten, Israel und Partnern in der Region.
  Wir wiederholen unsere Verpflichtung zu regionaler Stabilität und dem Schutz von
  Zivilisten. Wir verurteilen die iranischen Angriffe auf Staaten in der Region auf
  das Schärfste. Iran muss seine willkürlichen Militärschläge unterlassen. Wir rufen
  zu einer Wiederaufnahme der Verhandlungen auf und fordern die iranische Führung,
  eine Verhandlungslösung zu finden. Letztendlich muss es dem iranischen Volk erlaubt
  sein, ihre eigene Zukunft zu gestalten.
