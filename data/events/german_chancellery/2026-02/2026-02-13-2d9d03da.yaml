title: Speech by Federal Chancellor Merz at the Munich Security Conference “We are
  asserting our freedom with our neighbours”
text: '“A strong network of global partnerships” is important for future international
  cooperation, according to Federal Chancellor Friedrich Merz. “Together, we have
  crossed the threshold into an era that is once again openly characterised by power
  and, above all, great-power politics”, said Federal Chancellor Friedrich Merz in
  his opening speech at the 62nd Munich Security Conference. Our “first task as Europeans”
  today is, he said, to recognise this reality and “make provisions for the new era”.
  The Chancellor emphasised that German foreign and security policy is always anchored
  in Europe. “We are asserting our freedom with our neighbours”, said Merz. In the
  era of great powers, he said, Europe’s freedom is at risk. In order to maintain
  this freedom, “firmness and willpower” are needed, as are a willingness to set a
  new course, to change and to make sacrifices. To this end, he said, Europe needs
  a “programme of freedom”. According to Merz, this includes the further strengthening
  of Europe in particular – as a sovereign and strong Europe in NATO. In addition,
  the transatlantic relationship needs to be revitalised and a strong network with
  global partners should be established. New world disorder: “The international order,
  which was based on rights and rules”, said Federal Chancellor Merz, “no longer exists”.
  With the Russian war of aggression against Ukraine, if not before, “a new phase
  of open wars and conflicts has begun”. The struggle for spheres of influence, dependencies
  and allegiance sometimes pushes democratically constituted states to the very limits
  of their ability to act, Merz said. Transatlantic relations: According to the Chancellor,
  a rift has opened up with the USA, and the United States’ claim to leadership is
  being challenged. On some issues, he said, Europe and the administration in Washington
  would come to different conclusions. But despite all the difficulties in the partnership,
  it still has potential, according to Merz. NATO, he said, is the shared competitive
  advantage – for Europe and for the USA. Europe’s new role: The Chancellor also emphasised
  that Europe must preserve its interests and values and focus on its own strengths.
  Europe’s freedom, he said, is predominant and is made possible by security and economic
  strength. With a programme of freedom, said Merz, Europe should be stronger and
  more sovereign in the future.'
