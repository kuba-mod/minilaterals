title: Press conference with Federal Chancellor Merz after the meeting of the coalition
  of the willing Pushing for peace in Ukraine
text: 'Another meeting of the coalition of the willing has taken place in Paris. Following
  the summit meeting of the coalition of the willing in Paris, Federal Chancellor
  Friedrich Merz emphasised the increasing cooperation between Ukraine, the European
  partners and the United States of America. The aim, he explained, is to create the
  conditions for a lasting and just peace in Europe. Merz noted that Europe and its
  partners share the same strategic goal: a stable ceasefire, strong security guarantees
  and a peace that Europeans and Ukrainians shape together. "Today, the focus was
  on what contribution Europe and its partners in the coalition of the willing can
  make together to ensure Ukraine''s security following a ceasefire", he said. Read
  the most important facts in brief here: Read the transcript of the press conference
  here (in German only):'
