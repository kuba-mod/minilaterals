title: Press conference with Federal Chancellor Merz and Prime Minister Meloni United
  and strong in a new age of great powers
text: '“The conditions for a very close and cooperative partnership between Germany
  and Italy are in place,” said Merz. At the press conference with Italian Prime Minister
  Giorgia Meloni after the 33rd German-Italian intergovernmental consultations, Federal
  Chancellor Friedrich Merz emphasised that Germany and Italy are closer at the present
  time than ever before. This year marks the 75th anniversary of the resumption of
  diplomatic relations between the two countries. “We want to make 2026 a year of
  opportunities and a year of decisions,” said Merz. Merz and Meloni had already held
  bilateral talks before the plenary session, which was attended by numerous members
  of both government cabinets. In addition to European and economic policy issues,
  they also discussed Europe’s security and defence capabilities. Read the transcript
  of the press conference here (in German only):'
