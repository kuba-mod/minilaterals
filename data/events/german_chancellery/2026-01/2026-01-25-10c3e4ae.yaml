title: International North Sea Summit in Germany For independent and secure energy
  in Europe
text: 'Federal Chancellor Merz with the Prime Minister of Belgium, Bart De Wever,
  Danish Prime Minister Mette Frederiksen, Luxembourgian Prime Minister Luc Frieden
  , Dutch Prime Minister Dick Schoof, the Prime Minister of Norway, Jonas Gahr Støre,
  and the NATO representative, Jean-Charles Ellermann-Kingombe. Expansion of cross-border
  cooperation in building out offshore wind energy: That was the aim of the third
  international North Sea Summit, which took place in Hamburg on 26 January 2026.
  It was the first time that Germany had organised the summit, after which Federal
  Chancellor Merz reiterated that the resolutions would “keep offshore energy affordable
  for consumers” and enable new investments for the economy. This is essential for
  a “strong, independent and competitive Europe”. Federal Minister for Economic Affairs
  and Energy Katherina Reiche emphasised that the summit would strengthen economic,
  security and energy policy interests. The consistent expansion and intelligent networking
  of offshore energy will create affordable, clean and secure energy, reduce strategic
  dependencies and increase Europe’s overall resilience. The results were set out
  in a joint “Hamburg Declaration” as well as in various intergovernmental summit
  declarations and co-operation projects. The energy ministers have also agreed on
  a concrete action plan to realise these steps. In their joint declaration, the energy
  ministers agreed to integrate up to 100 GW of generation capacity across borders.
  In addition, a joint investment pact between North Sea states, the offshore wind
  industry and transmission system operators aims to make the North Sea region the
  largest hub for clean energy. The bilateral agreement between Germany and Denmark
  to jointly promote the wind farm as part of the cross-border co-operation project
  “Bornholm Energy Island” also demonstrates that concrete steps have been taken in
  Hamburg. This agreement was reached within the broader context of the summit. It
  contributes to a reliable, affordable and sustainable electricity supply in the
  region. The “Bornholm Energy Island” is the first legally binding hybrid offshore
  co-operation project in Europe. The plan is to generate three gigawatts of offshore
  wind power, which will be channelled to both Germany and Denmark via two new grid
  connections. By connecting the Danish and German energy grids, the Bornholm Energy
  Island is setting new standards for cross-border co-operation in Europe. This improved
  cooperation between the countries bordering the North Sea was a key objective of
  the summit. For example, the expansion of offshore wind energy and the hydrogen
  infrastructure in the North Sea will be enhanced and made more efficient. The focus
  was also on improved co-operation for greater security in the North Sea and the
  High North. Heads of state and government as well as energy ministers from Belgium,
  Denmark, France, Great Britain, Ireland, Luxembourg, the Netherlands, Norway, the
  European Commission and, for the first time, Iceland and NATO took part. Over 100
  company representatives also took part in the summit. On 26 January 2026, the international
  North Sea Summit took place in Germany for the first time. The North Sea Summit
  was first held in Esbjerg, Denmark, in 2022 and most recently in Ostend, Belgium,
  in 2023. It was created as a result of the Russian war of aggression against Ukraine
  in order to help Europe reduce its dependence on fossil fuel imports, particularly
  from Russia. The primary aim is to intensify co-operation for more offshore wind
  energy. The Federal Chancellor welcomed the heads of government at the Port of Hamburg
  at midday. There, they began with a tour of the Neuwerk multi-purpose vessel of
  the Federal Waterways and Shipping Administration. Among other things, the Neuwerk
  can be used as an icebreaker, for maritime police duties and as a fire-fighting
  vessel – even in offshore wind farms. The talks then continued in Hamburg City Hall.
  The participants first came together for working sessions on security in the High
  North and energy supply. This was followed by a conference with the energy ministers
  and over 100 company representatives and stakeholders. The summit concluded with
  the celebratory signing of the joint declaration and a press conference over dinner.'
