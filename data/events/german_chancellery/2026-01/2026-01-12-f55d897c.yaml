title: Press statements from the Chancellor and India's Prime Minister Modi “Germany
  places a high priority on our partnership with India”
text: 'According to Chancellor Merz, Germany and India share a fundamental interest
  in deepening their strategic partnership. German Chancellor Friedrich Merz was received
  by Prime Minister Narendra Modi in his home state of Gujarat at the start of his
  trip to India. It was a very special honour to be invited, said the Chancellor.
  Gujarat is considered the cradle of modern India – it was from here that the national
  hero Mahatma Gandhi led his non-violent struggle for freedom, self-determination
  and democracy. In the joint press statement with Prime Minister Modi, the Chancellor
  emphasised that the conditions for the renewed and deepened partnership between
  Germany and India could hardly be better than at present. “Germany, as the most
  populous and economically strongest state in the European Union, and India, as the
  largest democracy in the world, are united by fundamental values,” said Merz. “Highly
  dynamic India and technologically advanced Germany share essential interests.” Government
  consultations are due to take place in Berlin towards the end of the year. Read
  the most important facts in brief here: Read the transcript of the press statements
  here (in German only):'
