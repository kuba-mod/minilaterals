title: Speech by the Federal Chancellor at the World Economic Forum in Davos “Denmark
  and the people of Greenland can count on our solidarity”
text: 'Chancellor Merz in a subsequent discussion with the Chairman of the World Economic
  Forum, Børge Brende. At the World Economic Summit in Davos, German Chancellor Friedrich
  Merz welcomed the fact that the USA had withdrawn its announced special tariffs
  for Germany and other European countries. At the same time, he emphasised that the
  European NATO partners had to do more for security in the High North – this being
  a common Transatlantic interest. Ukraine also had to continue to be supported in
  its fight for a just peace. According to Chancellor Merz, European neighbours such
  as Denmark and Greenland can rely on German solidarity. It was in the common transatlantic
  interest to do more as European NATO allies to secure the High North. This was why
  Germany was involved in NATO. “Autocracies may have subjects, democracies have partners
  and reliable friends,” said the Chancellor. “We will work hard to ensure that this
  is not forgotten.” At the same time, the Chancellor spoke in favour of confidence.
  Although a harsh wind was blowing in the world of the great powers, it was also
  important to realise this: “We are not at the mercy of this world. We can shape
  it.” And that is exactly what we are doing. “Let us therefore focus on our own strengths
  in a level-headed, creative and courageous way.” Investing in one’s own security
  and making the economy competitive again is important. Germany had reduced its energy
  costs for this purpose. In addition, 500 billion euros had been made available for
  the expansion and modernisation of infrastructure. Defence spending had also been
  increased to up to five percent of GDP. The World Economic Forum in Davos is all
  about building bridges to international partners and promoting Germany as a business
  location. The forum will take place in 2026 from 19 to 23 January under the motto
  “A Spirit of Dialogue”.'
