title: Press conference with Chancellor Merz and Romania's Prime Minister Bolojan
  Merz recognises Romania's contribution to European security
text: 'Peace for Ukraine and security for Europe: These goals are equally crucial
  to both Germany and Romania, as Chancellor Merz emphasised after the talks with
  Prime Minister Bolojan. “How can we work together to make Europe safer in these
  difficult times? How can we make it more competitive?” These questions were the
  focus of the talks with Ilie Bolojan, as Federal Chancellor Friedrich Merz noted
  at a joint press conference with the Romanian Prime Minister in Berlin on Wednesday.
  Bolojan was welcomed with military honours during his inaugural visit to the Federal
  Chancellery. In this “new era of great power politics”, in which freedom, security
  and Europe’s prosperity can no longer be taken for granted, strengthening Europe’s
  security and competitiveness is an urgent matter, Federal Chancellor Merz emphasised.
  He thanked Romania, noting how, in its position on NATO’s eastern flank and on the
  border with Ukraine, the country is doing “great things every day” for European
  security. Read the transcript of the press conference here (in German only):'
