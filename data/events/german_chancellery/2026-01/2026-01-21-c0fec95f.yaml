title: Cabinet decision Freedom of Science Act expanded
text: 'More flexible remuneration regulations are intended to make it easier for research
  institutions to recruit top international talent. Photo: mauritius images / Bruno
  Golemac / Alamy The German science system is in constant international competition.
  Non-university research in Germany is therefore still dependent on research-friendly
  conditions. Non-profit, non-university research institutions should be able to compete
  internationally for the best minds. The Federal Cabinet has therefore decided to
  amend the Freedom of Science Act. In future, industry-related, non-profit research
  institutions will be allowed to pay their scientists better salaries than comparable
  federal employees. This applies to organisations that receive project funding from
  public funds but do not use public funds for salary payments. The rule that has
  now been adopted will also ensure that fewer individual applications for exceptions
  to this ban on preferential treatment will have to be submitted and reviewed in
  future. This means that it also helps to reduce bureaucracy. The amendment to the
  law implements a corresponding mandate from the coalition agreement.'
