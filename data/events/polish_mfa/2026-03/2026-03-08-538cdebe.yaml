title: Consultations of Polish and Bahraini foreign ministers
text: During the phone conversation, the Polish deputy prime minister strongly condemned
  the unprovoked military action of Iran against the Arab countries of the Persian
  Gulf in response to the Israeli-American attacks. The head of Polish diplomacy emphasized
  that non-military critical infrastructure should never become a target of military
  action as Bahrain had faced Iranian attacks on sites such as a seawater desalination
  installation and a university. Deputy Prime Minister Sikorski requested for providing
  Polish citizens with support in leaving Bahrain and thanked the country for its
  efforts to ensure stability in the region. The ministers agreed that substantive
  and balanced dialogue should play a key role in restoring the peaceful coexistence
  of all countries in the Middle East. Poland’s top diplomat congratulated Minister
  Al Zayani on Bahrain assuming a non-permanent seat on the UN Security Council for
  2026–2027, as well as the presidency of the Gulf Cooperation Council. The head of
  Polish diplomacy stressed the importance of the Kingdom of Bahrain’s initiative
  to call a Gulf Cooperation Council emergency meeting on the Iranian aggression.
