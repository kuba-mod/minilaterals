title: Deputy Minister Wojciech Zajączkowski visits Chile
text: 'On 11 March, Deputy Foreign Minister Wojciech Zajączkowski attended the swearing-in
  ceremony of President of the Republic of Chile José Antonio Kast. The ceremony took
  place at the National Congress in Valparaíso. During his visit to Chile, the deputy
  chief of Polish diplomacy also met with Deputy Foreign Minister Patricio Torres
  and Undersecretary of Mining Álvaro González. Polish undersecretary of state discussed
  the directions of bilateral cooperation with representatives of the Chilean government.
  He underlined Chile’s growing importance as Poland’s key partner in South America,
  and the impact of Polish investments, which have generated over 3,000 jobs on the
  Chilean market. The interlocutors saw a great potential in expanding cooperation
  in the defence, copper mining and mining technologies, and cybersecurity sectors.
  In Santiago, the deputy head of the Polish MFA presented the Bene Merito awards
  to the great-grandchildren of Ignacy Domeyko: José Domeyko Pérez, Pablo Domeyko
  Pérez, and Jorge Domeyko Pérez. The ceremony was held at the University of Chile,
  co-founded and later presided by Ignacy Domeyko for many years. Wojciech Zajączkowski
  emphasised that the awardees had made a significant contribution to the work of
  the Polish Relief Committee. They also supported Poles who came to Chile after the
  Second World War. For many years, they have taken efforts to preserve the Domeyko
  family house and a valuable collection of the scholar’s memorabilia.'
