title: Edward Raczyński Promotion of diplomatic and consular training officially begins
text: This year, 18 new trainees were welcomed. Over half of them graduated in the
  last three years. Some trainees boast the knowledge of uncommon foreign languages,
  such as Arabic, Japanese, or Hungarian. Head of the Foreign Service congratulated
  the trainees on succeeding in a tough selection procedure, which attracted 277 candidates.
  She also made reference to her own experience as a trainee in 2001, accentuating
  the importance and nature of diplomatic service with a special emphasis on the challenges
  it is faced with in the current international setting. In her address, she recalled
  the words of Edward Raczyński who pointed out that foreign service was not only
  an honour but also a commitment to history, the present, and future generations.
  The second part of the ceremony featured an inaugural lecture by Professor Krzysztof
  Kania from the Faculty of History at Nicolaus Copernicus University in Toruń. It
  focused on Edward Raczyński, going over the successive stages of his diplomatic
  and political career. The namesake of the training programme was portrayed as a
  symbol of unwavering service to the Polish state, an exemplary high-ranking diplomat,
  and a statesman embodying both professionalism and moral courage. The intense, year-long
  curriculum of the diplomatic and consular training covers both theoretical and practical
  knowledge, including tailored classes preparing for work in the foreign service.
  Trainees broaden their knowledge of international relations, the history of Polish
  diplomacy, and the priorities of Poland’s foreign policy. They participate in internships
  home and abroad, study visits, and meetings with state officials as well as contribute
  to the organisation of events held by the MFA. The classes within the programme
  are taught by experienced diplomats, members of the ministerial staff, and university
  lecturers. Once the training is complete, trainees take the diplomatic and consular
  exam. Passing it is the condition for being awarded the lowest diplomatic rank.
