title: Georgia - Joint Ministerial Statement by the Foreign Ministers of France, Germany
  and Poland on the adoption of legislative amendments on foreign funding and political
  activities
text: We, the Foreign Ministers of the Weimar Triangle, regret the adoption on March
  4th by the Georgian Parliament of new legislation on foreign funding and political
  activities, which is proof of a further repressive approach adopted by the Georgian
  authorities in relation to civil society. We fully endorse the statement made by
  the High Representative of the Union for Foreign Affairs and Security Policy on
  6 March 2026. The new amendments extend state control over political and societal
  activities in Georgia to an unprecedented level and infringe on the freedoms of
  association and expression. They weaken rule of law, put further pressure on independent
  civil society, including independent media, human rights defenders or individual
  experts and service providers. Through those new regulations, the Georgian authorities
  consciously breach the commitments undertaken by Georgia vis-à-vis the European
  Union, in particular through the Association Agreement with the European Union.
  We recall that it was Georgian government’s course of action since 2024 that has
  brought the EU accession process to a de facto halt, as determined by the European
  Council’s conclusions in 2024 and assessed by the European Commission in its Enlargement
  Report in 2025. We reaffirm our steadfast support for the Georgian people and civil
  society organisations who have been steadily working for the democratic and European
  future of Georgia. We also reaffirm our support to Georgia’s sovereignty and territorial
  integrity within its internationally recognised borders.
