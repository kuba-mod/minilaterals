title: Poland's and Oman's top diplomats talk security
text: Their phone conversation focused on Polish citizens returning from Oman to Poland.
  Deputy Prime Minister Sikorski thanked the Omani side for their support for Polish
  travellers and the excellent cooperation in organising return flights. The head
  of Polish diplomacy stressed that Poland strongly and unequivocally condemns Iran’s
  attacks on Oman and other countries of the region not involved in the armed conflict
  between Israel and the US, and Iran, which are in breach of international law. The
  ministers concurred that there is an urgent need to seek de-escalation and stability
  in the region. They emphasised that constructive dialogue is the only possible solution
  to the crisis.
