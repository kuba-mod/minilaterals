title: Polish-Romanian Solidarity Day marked by foreign ministers meeting
text: I am very happy with today’s talks with Minister Oana Ţoju, marking this special
  occasion. This is the third time we celebrate Polish–Romanian Solidarity Day. The
  ministers discussed the situation in Iran and the Middle East. In this context,
  they called on all parties to exercise restraint, observe international law, and
  ensure the protection of civilians. They expressed their solidarity with the countries
  of the region afflicted by the escalation of hostilities while underlining that
  ensuring the protection of civilians remains the number one priority. Additionally,
  they reaffirmed their support for the measures taken by EU High Representative Kaja
  Kallas as well as emphasised the importance of the European Union’s unity in the
  face of global challenges. The meeting of foreign ministers testified to the strategic
  character of the Polish–Romanian partnership and highlighted both countries’ common
  interests related to security, economic growth, and cooperation within the EU and
  NATO. The discussion led to defining specific measures aimed at further deepening
  the two countries’ collaboration. These include scheduling the 5th round of Polish–Romanian
  intergovernmental consultations to be conducted in Warsaw this year, launching the
  works on the new 2027–2031 Action Plan, and resuming the strategic dialogue with
  the participation of foreign and defence ministries. The participants also expressed
  their willingness to continue their cooperation within other regional fora. In the
  context of regional security, special attention was paid to NATO’s eastern flank
  and the cooperation of the countries of the Bucharest Nine. Let me remind you that,
  along with Romania, we started this format, and the fact that representatives of
  Nordic countries participate in its meetings only adds to the significance of our
  region’s voice. Another important item on the agenda was the situation in Ukraine
  and the persistent threat from Russia. The ministers stressed the need to immediately
  adopt the 20th sanctions package to curb Russia’s ability to finance warfare. They
  reiterated the two countries’ continued multidimensional support for Kyiv and stressed
  Poland’s and Romania’s special role as the largest neighbours of Ukraine and key
  partners in the region. The participants also discussed the situation in Moldova.
  Ministers Sikorski and Țoiu declared that close coordination of actions taken to
  enhance Moldova’s security and resilience will continue, including measures to support
  its democratic institutions and counter disinformation. We want to further support
  Moldova through enhancing its security and resilience as well as work on institutional
  reforms and, obviously, the EU accession process. The heads of diplomacy also talked
  about the current European agenda and vital global issues, including relations with
  China and India. Celebrated in 2026 for the third time, Polish–Romanian Solidarity
  Day was established in 2023. The day, 3 March, was chosen to commemorate the signing
  of a historic “Convention on Defensive Alliance between the Republic of Poland and
  the Kingdom of Romania” in 1921, supplemented by bilateral guarantee treaties signed
  in 1926 and 1931. Mutual security guarantees were primarily intended to counteract
  unprovoked aggression from the Union of Soviet Socialist Republics. Solidarity Day
  is both a reminder of the enduring bond between the Polish and Romanian peoples
  and a strong indicator of the continued interest and desire of both countries to
  further strengthen and develop their lasting and comprehensive strategic partnership.
