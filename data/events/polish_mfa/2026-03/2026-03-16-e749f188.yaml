title: Deputy Prime Minister Radosław Sikorski on support for Ukraine at the Foreign
  Affairs Council
text: The Council discussed minimising the negative impact of the conflict in the
  Middle East on Ukraine as it fights the Russian aggressor. Maintaining support for
  Ukraine must remain Europe’s priority underlined Deputy Prime Minister Radosław
  Sikorski. Poland’s top diplomat called on Hungary to unblock the EU loan for Ukraine
  and adopt the 20th package of sanctions against Russia. At the same time, he pointed
  to risks carried by Hungary’s reliance on Russian raw materials. Ukraine’s Foreign
  Minister Andrii Sybiha outlined the current situation on the front line and in the
  energy sector. When debating the situation in the Middle East, Deputy Prime Minister
  Sikorski called for coordinated efforts to stabilise energy prices in Europe. He
  also expressed openness to using EU naval missions in the region for stabilisation
  operations in the Strait of Hormuz once the active phase of conflict with Iran ends.
  EU foreign ministers also talked with India’s top diplomat about further strengthening
  of cooperation. Referring to the conclusions of the latest EU–India summit, it was
  agreed that the mutual relations require a new momentum. Deputy Prime Minister Sikorski
  also took part in an informal discussion regarding the work on a new European Security
  Strategy. He pointed to the key assumptions that should be reflected in the Strategy,
  among them recognising Russia as the main threat to the EU in both short- and long-term
  perspective and enhancing European defence capabilities considerably. *** The Council
  of the European Union is where ministers from all EU countries meet in ten different
  configurations to negotiate and adopt EU laws. Foreign Affairs Council is responsible
  for the EU’s foreign policy, and manages its diplomatic relations with the rest
  of the world. It decides on security and defence matters, concludes trade agreements,
  and establishes international partnerships.
