title: Poland-Finland security talks
text: The officials agreed that the threats Europe is currently faced with are serious
  and call for intensive efforts. They acknowledged that amid Russia’s aggressive
  acts only active approach can enhance our security. In this context, projects carried
  out by the Baltic countries and NATO’s whole eastern flank play a vital role that
  is complementary to building national resilience and allied deterrence capabilities.
  One example is the Eastern Flank Watch. In the face of growing instability in other
  parts of the world, mobilising national and European resources is necessary to increase
  Europe’s defence potential and support Ukraine in its fight against Russian aggression.
  It will also strengthen our alliance with the US. - emphasised the deputy head of
  Polish diplomacy. The officials also pointed out that bilateral cooperation may
  contribute to the strengthening of European defence potential of Poland and Finland
  and holds promising prospects for the future. This applies to political and military
  cooperation as well as industrial partnership, including in high-tech.
