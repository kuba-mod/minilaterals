title: Deputy prime ministers, foreign ministers of Poland and United Arab Emirates
  meet to discuss situation in Middle East
text: The heads of diplomacy of Poland and the UAE discussed in detail the progress
  so far and the next steps with respect to the evacuation of Polish nationals from
  the United Arab Emirates, including scheduling of as many flights to Poland as possible.
  The diplomats spoke about the current security situation and the prospects for its
  development, as well as its effects on the Middle Eastern and European countries.
  Foreign Minister Radosław Sikorski presented Poland’s position on military action
  in the region and thanked his counterpart for the assistance provided so far to
  our citizens by the Emirati society and authorities. He also expressed his full
  solidarity with the United Arab Emirates and other countries in the region that
  are not parties to the conflict which have been targeted by Iranian drone and missile
  strikes in the past week. Furthermore, the heads of Polish and Emirati foreign ministries
  talked about energy security in connection with the blockade of the Strait of Hormuz
  and certain aspects of bilateral cooperation. At the same time, the ministers called
  for a peaceful resolution of the conflict and its swiftest possible deescalation.
  The foreign ministers stressed that further chaos in the region carries a serious
  risk of irreversible consequences on a global scale.
