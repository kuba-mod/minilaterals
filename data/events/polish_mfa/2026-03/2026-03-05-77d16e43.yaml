title: Deputy Prime Minister Sikorski takes part in informal FAC meeting with Gulf
  Cooperation Council states' heads of diplomacy
text: The ministers strongly condemned Iran’s attacks on the Gulf countries. They
  considered the attacks a threat to regional security and a risk of escalating the
  conflict. Therefore, they called on Iran to immediately cease its aggressive activity.
  The interlocutors agreed that the conflict in the Middle East also jeopardises maritime
  security and trade routes. Other prominent points of the discussion were the EU
  member states’ support for their partners in the region and calls to de-escalate
  hostilities. Head of Polish diplomacy Radosław Sikorski thanked ministers of the
  countries engaged in ensuring security of Polish nationals in the region. The participants
  reiterated their support for dialogue and diplomacy as means to resolve the crisis
  and expressed this view in a joint statement .
