title: Talks of foreign ministers of Poland and United Arab Emirates
text: During the talks, Deputy Prime Minister Radosław Sikorski underlined his gratitude
  to the UAE authorities for their efforts to ensure security of Polish nationals
  in UAE. The Saudi Arabian side assured that security of all residents and tourists
  is its priority and its competent services are on standby to respond to any kind
  of threats. Poland unequivocally condemned Iran’s attacks on the territory of the
  UAE and other countries in the region. Poland’s top diplomat stressed that such
  activity violates the principles of international law, undermines stability of the
  region, and puts the civilian population in jeopardy. We expressed solidarity with
  our regional partners and support for the actions taken to protect the sovereignty
  and territorial integrity of the states affected by the attacks. The ministers jointly
  emphasised that de escalation of tensions and a return to diplomatic solutions are
  necessary. They called on all sides to refrain from actions that could lead to the
  region’s further destabilisation. Deputy Prime Minister Sikorski noted that the
  security of naval trade routes and air links is crucial to the functioning of the
  global economy. He stressed that lasting security can be achieved only through dialogue,
  respect for international law, and cooperation within the international community.
  The foreign ministers of Poland and the United Arab Emirates declared their willingness
  for further consultations and joint actions in support of peace and stability in
  the Middle East.
