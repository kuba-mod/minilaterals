type: press_release
source_name: polish_mfa
title: Statement by the Ministry of Foreign Affairs
text: We believe that the attacks against the states which are not engaged directly
  in the conflict are unjustified and pose an immediate life threat to the Polish
  nationals present in the region in their tens of thousands, whose safety is our
  top priority. We deplore the deaths of civilians and allied soldiers in the conflict.
  Poland is actively engaged in the European and transatlantic coordination. We hope
  that Iran will stop posing a threat to its region and take the path of the rule
  of law and peaceful coexistence.
