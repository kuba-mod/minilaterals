title: Poland's and Qatar's top diplomats talk about safety of Poles
text: The chief diplomats of Poland and Qatar focused on the conflict in the Gulf
  region. Deputy Prime Minister Sikorski conveyed support to the people and the government
  of Qatar. In the context of threats posed by Iran’s retaliatory strikes targeting
  its neighbouring countries, Deputy Prime Minister Sikorski addressed the safety
  of Polish citizens who are either staying in or transiting through Qatar. The ministers
  concurred as to the utmost importance of seeking de-escalation and restoring stability
  in the region, which would contribute to the reopening of shipping lanes and airspace.
  Both sides underlined that long-term disruptions to maritime traffic in such a significant
  region can have an adverse impact on global supply chains.
