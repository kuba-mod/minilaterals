title: Polish and North Macedonian foreign ministers discuss security, NATO, and EU
  enlargement
text: The ministers gave a positive assessment of bilateral relations, noting the
  growing political and economic contacts, trade, and people-to-people links between
  our two nations. Another important subject involved security. The foreign ministers
  exchanged their assessments of the current international situation, particularly
  Russia’s aggression against Ukraine and the situation in the Middle East, and discussed
  preparations for this year’s NATO summit in Ankara. In this context, the ministers
  jointly emphasised the need to further increase defence spending to bolster Europe’s
  security. They also discussed cooperation on modernising North Macedonia’s armed
  forces, including possible involvement of Poland’s defence industry. “Poland is
  an example of bold and strategic decisions. This is the direction we, as NATO allies,
  must follow,” stressed Minister Timcho Mucunski. The talks also covered the prospects
  for EU enlargement, including into Western Balkan countries, as well as the regional
  situation in the context of the Russian Federation’s actions, including disinformation.
  The ministers agreed that expanding the area of security, stability, and prosperity
  by supporting countries aspiring to EU membership—in both the south and the east—is
  nowadays a geopolitical necessity. “Poland fully supports North Macedonia’s European
  aspirations. We are ready to share our experience of the pre-accession period and
  our expert knowledge on accession negotiations—to the extent that this is desired
  by our partners,” emphasised Deputy Prime Minister Radosław Sikorski. The meeting
  reaffirmed the very good relations between Poland and North Macedonia and our shared
  approach to the key challenges facing Europe and the North Atlantic Alliance today.
