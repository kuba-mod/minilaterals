title: Polish-Paraguayan political consultations
text: Deputy foreign ministers of Poland and Paraguay discussed Warsaw–Asunción bilateral
  relations, including the current state of political and economic cooperation as
  well as the prospects for its enhancement. They signed a memorandum establishing
  a political consultations mechanism with a view to deepening the dialogue between
  the two foreign ministries. The deputy ministers also talked about the security
  of Europe and Latin America. They acknowledged the problem of disinformation in
  public space, which is a pressing issue in both countries. The meeting’s agenda
  further included cooperation with the US and reforming the UN,  as well as the subject
  of China. Paraguay does not maintain diplomatic relations with Beijing, putting
  cooperation with Taiwan at the centre of its foreign policy. Deputy Minister Zajączkowski
  also met with Minister of Information and Communication Technologies Gustavo Villate
  and Minister of the Interior Enrique Riera Escudero. Their talks focused on cooperation
  in cybersecurity and countering hybrid threats, including the instrumentalisation
  of migration as a destabilisation strategy. In addition, the ministers discussed
  improved border protection and potential for cooperation in e-governance.
