date: '2026-03-01'
type: press_release
source_name: polish_mfa
title: Statement on developments in Middle East
text: We unwaveringly support peaceful settlement of conflicts in the Middle East
  and the dispute over the Iranian nuclear programme. Painfully affected by recent
  political repressions following a wave of protests, the Iranian society deserves
  freedom, peace, stability, and prosperity. We express solidarity with Qatar, Bahrain,
  Kuwait, the UAE, Saudi Arabia, Jordan, and Oman, which have suffered as a result
  of escalation of hostilities. We strongly condemn all attempts to spread the conflict
  across the Middle East. It remains high on our agenda to ensure the safety of Polish
  citizens in the region.
