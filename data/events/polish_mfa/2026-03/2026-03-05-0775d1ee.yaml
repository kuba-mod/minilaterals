title: Heads of diplomacy of Poland and Saudi Arabia discuss security in Middle East
text: In particular, the foreign ministers talked about the impact of the armed conflict
  between Israel, the United States, and Iran on security in the entire Gulf region.
  They pointed out the political, economic, and social consequences of Tehran’s aggression
  against the Gulf Cooperation Council states, including Saudi Arabia, who are not
  party to the conflict. Furthermore, Poland’s and Saudi Arabia’s heads of diplomacy
  spoke about how the conflict has affected air and sea transport, stressing the urgent
  need to clear the shipping lanes and restore regular service. Deputy Prime Minister
  Sikorski highlighted the key issue of ensuring the security of Polish citizens staying
  on a permanent or temporary basis in the area at risk of Iranian attacks. He also
  thanked the head of Saudi diplomacy for the multifaceted efforts to bring peace
  and stability and the support provided to Polish passengers who are trying to leave
  at-risk areas through the territory of Saudi Arabia. In the conversation with his
  counterpart, Deputy Prime Minister Sikorski conveyed expressions of support for
  all residents of the Kingdom in the face of the current difficult experiences. The
  diplomats agreed that the only appropriate way to solve the region’s problems is
  through dialogue and respect for the rule of law. The head of Polish diplomacy reiterated
  that Poland strongly condemns Tehran’s military action, which is in breach of international
  law, against the Gulf Arab states in response to the Israeli–American operation.
