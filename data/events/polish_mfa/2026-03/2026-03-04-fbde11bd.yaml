title: Meeting between heads of diplomacy of Poland and Croatia
text: 'During their Warsaw meeting, the top diplomats of Poland and Croatia paid much
  attention to security issues. They agreed that further increase of defence spending
  is necessary. In 2025, Poland allocated 4.7 per cent of its GDP on defence and has
  planned to consistently strengthen the security sector. Last year, Croatia exceeded
  the 2 per cent of GDP target and is also planning to regularly boost its defence
  spending. Deputy Prime Minister Sikorski considers it a token of our partners’ responsibility
  and solidarity. “Europe must increase its military capabilities while using the
  European defence industry’s potential to full advantage. We have no illusions: Putin’s
  Russia will remain one of the most serious threats to our security,” said Deputy
  Prime Minister Sikorski. The head of the Polish MFA noted that in the face of global
  geopolitical turmoil caused by Russian aggression in Ukraine, we stand shoulder
  to shoulder with Croatia as allies. He pointed out Croatian armed forces’ presence
  in Bemowo Piskie under NATO’s Forward Land Forces Battle Group. Poland’s and Croatia’s
  top diplomats also discussed their countries’ engagement in supporting Ukraine in
  its four-year-long struggle with Russian aggression. “We have recently visited Kyiv
  together on the anniversary of Russia''s aggression against Ukraine, and we agreed
  on the undeniable importance of Europe''s continued strong support for Ukraine until
  a just and lasting peace is achieved,” said Minister Gordan Grlić Radman. The foreign
  ministers also highlighted the key role of the European Union in the peace process.
  They underlined the importance of cooperation in the areas of security and trade,
  especially in the context of Croatia’s presidency of the Three Seas Initiative.
  Trade between Poland and Croatia has been constantly growing. In 2024, it amounted
  to two billion euros. Since Poland joined the EU, trade between Poland and Croatia
  has increased more than ninefold. The two foreign ministers also discussed the prospects
  for European Union enlargement and the situation in the Western Balkans. They welcomed
  the pace of Albania''s accession negotiations and the progress made by Montenegro
  on its path towards the EU. They elaborated on the situation in Bosnia and Herzegovina,
  particularly in the context of the implementation of local Croatians’ electoral
  rights. The foreign ministers agreed that expanding the zone of stability and consistently
  supporting countries aspiring to join the EU is currently a geopolitical necessity.'
