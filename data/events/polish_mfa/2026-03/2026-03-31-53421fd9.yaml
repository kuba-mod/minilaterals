title: Deputy Prime Minister Radosław Sikorski takes part in informal meeting of EU
  top diplomats in Kyiv
text: During the Kyiv meeting, the foreign ministers, the head of EU diplomacy, Kaja
  Kallas, and President Volodymyr Zelenskyy of Ukraine spoke about the Union’s continued
  support for Ukraine, particularly in energy security, defence capabilities development,
  and post-war support for the veterans. The Kyiv talks also covered Ukraine’s current
  political and military situation. Deputy Prime Minister Radosław Sikorski said that
  the Middle East crisis plays to Russia’s benefit. He noted that no agreement with
  Moscow is possible at the moment. Moscow is not a partner for talks now; it is only
  interested in Ukraine’s surrender. That is why no agreement is possible under the
  current circumstances. We must continue to put pressure on Russia in order to change
  its calculations - Deputy Prime Minister Sikorski said. During the visit, the EU
  foreign ministers commemorated the victims of the March 2022 massacre in Bucha.
  They agreed that Russia must be called to account for its crimes in Ukraine and
  there is no room for any tolerance of its impunity. Anyone who is trying to justify
  Putin’s Russia and distract attention from its unjustified aggression should come
  to Bucha to remember what the “Russkiy mir” looks like. Anyone who has seen Bucha
  knows that these are the ways of a torturer, not a liberator. Poland remains ready
  to support self-defending Ukraine, including in military terms, for as long as needed
  - Deputy Prime Minister Sikorski said, adding that Poland is going to accede to
  the Enlarged Partial Agreement on the Management Committee of the Special Tribunal
  for the Crime of Aggression against Ukraine and join the International Claims Commission
  for Ukraine as a founding member. Poland’s top diplomat invited partners to take
  part in the Ukraine Recovery Conference in Gdańsk on 25–26 June. The Conference
  agenda will include the question of support for Ukrainian veterans. Poland has carried
  out projects in Ukraine that focus in particular on psychological and physical rehabilitation,
  reintegration into civilian life, and labour activation. On the sidelines of the
  Kyiv meeting, Deputy Prime Minister Radosław Sikorski held a series of bilateral
  talks, including with Ukraine’s Defence Minister Mykhailo Fedorov, the Head of the
  Office of the President of Ukraine, Kyrylo Budanov, and Germany’s Foreign Minister
  Johann Wadephul.
