title: Informal meeting of CBSS foreign ministers
text: 'Poland holds Presidency of the Council of the Baltic Sea States. The meeting
  was convened at the initiative of the Polish Presidency around the idea of the need
  to strengthen the organisation’s political dimension and initiate an in-depth discussion
  among the region’s countries on the current security challenges. The participants
  took stock of the preparations for the upcoming NATO summit in Ankara, scheduled
  for this July. They spoke about the progress of the commitments made at the previous
  NATO summit in The Hague. Another important matter on the agenda was a review of
  the status of peace talks between Ukraine and Russia from the perspective of the
  Baltic Sea region. We want the NATO summit to end in a success, to increase the
  standing of Europe in relation to the United States, so that we could influence
  the outcome of the US–Russia negotiations regarding Ukraine. The Baltic Sea region
  is particularly interested in achieving and implementing strong security guarantees
  for Ukraine. Their role should be to prevent the Russian Federation from further
  aggression, to ensure Ukraine’s stability, and to rebuild military deterrence potential.
  As a result, conditions should be created for economic growth in Ukraine and the
  region. We have our demands just as Russia has its own in regard to the future,
  postwar security architecture. The process must let both Ukraine and all of us rest
  assured that Russia will not be capable of another aggression. The participants
  discussed the main challenges of the enlargement process, which is now linked directly
  to the security dimension. They expressed support for Ukraine’s accession to the
  European Union and emphasised the need for the country to align its legislation
  with the EU acquis. EU High Representative Kaja Kallas stressed in a press conference
  with Deputy Prime Minister Radosław Sikorski that despite the difficult situation
  in the Middle East, Ukraine must not slip off the agenda. Moscow may have lost another
  ally—Tehran—but the same drones that are hitting Dubai are also hitting Kyiv. The
  EU’s top diplomat emphasised that the Union is coordinating consular assistance,
  working to arrange repatriation flights for the EU citizens stranded in the region.
  She also announced a meeting this Thursday between the EU foreign ministers and
  their counterparts from the Gulf states. During the press conference, Minister Sikorski
  referred to a special report on the consular situation in the Middle East: As you
  know, the prime minister has already requested president’s approval for an emergency
  medical flight from Oman. The consular service has compiled a list of 57 persons,
  mostly from the United Arab Emirates, who could be repatriated as soon as tomorrow.
  Deputy Prime Minister Sikorski said that the Polish consular service in Egypt received
  736 persons, with some of the evacuees brought from Jordan by sea. Nearly 800 Poles
  left Jordan, including 300 during the last 24 hours. Evacuation from Israel is practically
  over, too; nearly 500 people were evacuated. The extraordinary meeting of the CBSS
  sent a clear message from the countries in the region about their support for Ukraine
  and about ensuring stability in the Baltic Sea basin. The foreign ministers declared
  further close-knit cooperation, emphasising that the security of NATO’s eastern
  flank remains an absolute priority of the Polish Presidency of the CBSS. *** The
  Council of the Baltic Sea States was established in 1992 with Poland as one of its
  founders. The current members include Denmark, Estonia, Finland, Germany, Iceland,
  Latvia, Lithuania, Norway, Poland, Sweden, and the EU. The Council focuses on supporting
  political dialogue and cooperation, setting strategic priorities and guiding regional
  initiatives in line with the organisation’s long-term priorities, namely Regional
  Identity, Sustainable & Prosperous Region, and Safe & Secure Region. At present,
  the Council of the Baltic Sea States runs four main working groups: the Expert Group
  on Sustainable Maritime Economy, the Task Force Against Trafficking in Human Beings,
  the Expert Group on Children at Risk, and the Civil Protection Network. Poland has
  presided over the Council since 1 July 2025 and will continue in this capacity until
  30 June 2026.'
