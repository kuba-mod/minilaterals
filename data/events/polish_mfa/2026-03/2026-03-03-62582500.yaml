title: Meeting of Advisory Legal Committee
text: The agenda focused on a draft Convention on Prevention and Punishment of Crimes
  Against Humanity. The meeting discussed proposed amendments to the draft, emphasising
  the need for better safeguards for vulnerable groups, including children, among
  other issues. Also, the Committee analysed the International Law Commission’s draft
  articles on the protection of persons in the event of disasters. The discussion
  focused on the rules of international cooperation, duties of the affected states
  and the assisting states, and the issue of respecting sovereignty of states while
  ensuring effective protection of the population. The Advisory Legal Committee’s
  opinion adopted at the meeting will contribute to preparing Poland’s position to
  be presented in international fora. The Advisory Legal Committee of the Minister
  of Foreign Affairs is an expert panel that deals with key issues in the field of
  international, EU, and domestic law pursuant to the requirements of the Minister
  of Foreign Affairs. The Committee’s work is coordinated by a Secretary of State
  or Undersecretary of State, who turns to it for legal analyses and opinions on the
  Minister’s behalf.
