title: Polish-Irish consultations on European affairs
text: During the meeting, both sides expressed satisfaction with the close cooperation
  between Poland and the Republic of Ireland within the European Union. Discussed
  were, among other issues, support for the EU enlargement process and the EU legislation
  simplification package, which offers an opportunity to enhance EU’s competitiveness
  on the global arena. Minister Byrne also outlined the program priorities of the
  Irish Presidency of the Council for the second half of 2026. The main focus will
  be on the Union’s security, boosting competitiveness, and closer coordination of
  their activities within the EU. Minister Niemczycki stressed Poland’s support for
  the planned initiatives, particularly in the areas of economic resilience and continued
  support for the struggling Ukraine. Other issues raised during the discussion were
  the rule of law and the initiative to establish a European Centre for Democratic
  Resilience. Poland and Ireland support the establishment of the Centre dedicated
  to safeguarding democratic institutions, strengthening civil society, and combating
  disinformation. As regards the peace process in Ukraine, Minister Niemczycki reiterated
  the need for European countries to take part in the current negotiations. Ukraine’s
  security remains crucial to the future of this continent. Both sides expressed their
  deep concern with the situation in the Middle East.
