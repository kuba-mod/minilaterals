title: Foreign ministers of Poland and Kuwait discuss security in Gulf region
text: The conversation was devoted to the current situation in the Gulf region, including
  the security of Polish citizens in Kuwait and Iran’s aggression targeting Kuwaiti
  territory. The ministers discussed the impact of the conflict, including the blockade
  of the Strait of Hormuz, on the security of the Gulf states. Minister Sikorski conveyed
  his support to the people and the government of Kuwait in the face of the difficult
  experience of an armed aggression. He also raised the topic of Poles staying in
  Kuwait on a permanent or temporary basis, highlighting the need to ensure their
  security. Our top diplomat emphasised that Poland unequivocally condemns Iran’s
  retaliatory strikes targeting the Arab states of the Persian Gulf, including Kuwait.
  He underlined that these measures violate international law since the Gulf Arab
  States are not parties to the conflict. The ministers concurred as to the utmost
  importance of seeking de-escalation and restoring stability in the region. They
  recognised the special significance of ensuring safe air transportation and freedom
  of navigation. Poland and Kuwait take the view that the only appropriate way to
  solve the problems of the Gulf region is through dialogue.
