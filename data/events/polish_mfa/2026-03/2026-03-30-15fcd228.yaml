title: New Armenian-language service VT Hayastan News launched in response to disinformation
text: The project’s mission is also to increase the public’s resilience to manipulation
  and information interference, and to counter disinformation targeting Armenia and
  its partners. It has been set up as part of TVP’s International Media Centre financed
  from public funds at the disposal of the Ministry of Foreign Affairs. This is the
  next stage in the development of a multilingual news service intended for audiences
  in the Eastern Partnership countries. The launch of the service marks an expansion
  of VT (formerly “Vot Tak”), which, following the addition of a Romanian-language
  programming for Moldova in February 2026, now broadcasts content in three languages.
  The VT Hayastan News team is composed of Armenian journalists including Razmik Martirosyan,
  Harutyun Voskanyan, and Nune Gevorgian, who also represents the large Armenian diaspora.
  TVP’s International Media Centre expands its offering into other languages in response
  to the growing information pressure on the countries which cooperate with the EU
  under the Eastern Partnership. Next language projects are underway. The programming
  will be aired on the Belsat channel, from Monday to Friday, and made available on
  YouTube and Facebook.
