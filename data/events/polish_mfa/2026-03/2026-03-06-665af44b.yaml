title: Deputy Prime Minister Radosław Sikorski meets with EU ambassadors accredited
  to Warsaw
text: The meeting was held on the initiative of Ambassador of Cyprus to Poland Nicos
  Nicolaou, in connection with the ongoing Cyprus presidency of the EU Council. The
  discussion covered current international situation and the greatest challenges faced
  by Europe. The head of Polish diplomacy expressed his gratitude for the sustained
  efforts of the Cyprus presidency to build a strong, resilient, and secure European
  Union. The talks focused on threats to European security resulting from Russia’s
  actions, and the consequences of the conflict in the Middle East to the stability
  of our continent. Deputy Prime Minister Radosław Sikorski strongly condemned Iran’s
  attacks on states which are not parties to the conflict, including on civilian infrastructure.
  He also talked about steps taken by Polish embassies and consulates in the region
  to support and evacuate Polish nationals staying in the area. Poland has also provided
  assistance to the citizens of other EU countries. The head of the MFA pointed out
  the implications of the Middle East conflict for Europe, including the need to further
  increase European support for Ukraine and exert more pressure on Russia, also through
  sanctions and by fighting against Russian hybrid operations. Foreign Minister Sikorski
  reaffirmed Poland’s unchanged stance on the use of frozen Russian state assets and
  the need to continue combating the shadow fleet. He also presented the objectives
  of the Ukraine Recovery Conference, scheduled to take place in Gdańsk in June 2026.
