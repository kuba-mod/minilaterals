title: New members of Venice Commission appointed
text: “According to the Commission’s Statute, its members should possess the highest
  qualifications that ensure independence and outstanding expertise in constitutional
  and international law. Guided by these criteria, together with the Ministry of Justice,
  we have decided to entrust this important role to eminent Polish experts whose achievements
  and experience are acknowledged across Europe,” said Deputy Prime Minister and Foreign
  Minister Radosław Sikorski during the ceremony. “Heraclitus of Ephesus once warned
  that the people should fight for the law as for their city walls because only behind
  them can one live a safe life. I believe that the new Polish representatives as
  members of the Venice Commission will make a real contribution to strengthening
  these walls, democratic standards, the rule of law, and the protection of human
  rights throughout Europe,” added Deputy Prime Minister Radosław Sikorski. Prof.
  Wojciech Sadurski is a constitutional lawyer and professor of law at the University
  of Sydney and at the Centre for Europe at the University of Warsaw. He specialises
  in constitutional law, legal theory, and human rights. Prof. Wojciech Sadurski is
  a renowned researcher of democratic mechanisms, authoritarianism, and the protection
  of fundamental rights. His publications often serve as a point of reference in discussions
  on the state of the rule of law in Europe. Prof. Monika Florczak-Wątor, a professor
  at the Jagiellonian University. Her work focuses on individual rights and freedoms,
  the functioning of the Constitutional Tribunal, and standards of constitutional
  protection in Poland and Europe. She is the author of numerous academic works and
  expert opinions in the field of public law. Minister of Justice Waldemar Żurek emphasised
  that the candidates guarantee the highest professional and ethical standards. “These
  are individuals highly respected in the legal community, with a well established
  academic record and—what is particularly important for us—absolutely independent.
  Independence is the foundation of rebuilding trust in the state and its institutions,”
  he highlighted. The head of the Ministry of Justice pointed out that the Venice
  Commission remains one of the most important points of reference on the rule of
  law in Europe. “Given the experience of recent years, we want to show that Poland
  is fully capable of restoring the standards of the rule of law in accordance with
  the Constitution and European law. Today’s nomination is an important element of
  this process and proof that we have worthy representatives in key international
  bodies,” said Minister Żurek. Professor Wojciech Sadurski emphasised that joining
  the Venice Commission is both a special honour and a responsibility. “The very name
  ‘Democracy through Law’ expresses deep wisdom. We may argue about various models
  of democracy, there are many of them across Europe, but the rule of law is the common
  denominator and the minimum consensus in constitutional language. That is not merely
  a technical principle or a subject of debate among lawyers, but above all a moral
  promise from the authorities to citizens that the law will not be used instrumentally,”
  he said. “today, in times of constitutional crises, growing political tensions,
  and the instrumental use of law, the Commission has a particularly important role
  in monitoring the quality of the rule of law and strengthening judicial independence
  and the protection of individual rights. Poland’s membership of this body is an
  expression of willingness to co create European standards of the rule of law,” she
  emphasised. Prof. Monika Florczak Wątor also welcomed the opportunity to continue
  the work of previous Polish representatives at the Commission, including Prof. Hanna
  Suchocka, and declared that she intends to leverage her research experience on the
  quality of democracy in the Commission’s work. About the Venice Commission Established
  in 1990, the Venice Commission, officially the European Commission for Democracy
  through Law, is the most important advisory body of the Council of Europe. The Commission’s
  opinions lay the groundwork for European standards of the rule of law. The Commission
  supports member States in strengthening the rule of law, constitutional democracy,
  and the protection of human rights. It prepares opinions and expert analyses concerning
  constitutional matters, fundamental institutional laws, and changes within judicial
  systems. Each state that is a member of the Venice Commission delegates one member
  and one substitute member appointed from among distinguished experts in constitutional
  or international law. Candidates are nominated by national governments, and their
  appointment is approved by the Committee of Ministers of the Council of Europe for
  a four year term, with the possibility of reappointment. The newly appointed experts
  will serve as members of the Venice Commission representing Poland, participating
  in the work on opinions and recommendations related to democratic and legal standards
  in the member States of the Council of Europe.
