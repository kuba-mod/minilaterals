title: Deputy Prime Minister Radosław Sikorski attends informal video conference of
  EU foreign ministers on situation in the Middle East
text: Informal talks of EU member states’ top diplomats were held to exchange views
  on the developments in the Middle East and to continue efforts towards a diplomatic
  resolution of the conflict. The discussion highlighted the need for the EU to keep
  sending a strong and unified message regarding the threat posed by the continuation
  of Iran's nuclear programme as well as on de-escalation, solidarity with partners
  in the region affected by Iranian attacks, and continued support for the democratic
  aspirations of the Iranian people. The need for constant communication with the
  US was raised, mainly due to the broader regional implications of the conflict. The
  ministers considered the coordination of measures to ensure safety of EU citizens
  in the region, including diplomats and their families, to be their top priority.
  During the meeting, ministers endorsed the statement by High Representative Kaja
  Kallas on developments in the Middle East delivered on behalf of the EU.
