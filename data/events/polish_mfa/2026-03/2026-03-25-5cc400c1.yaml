title: Poland strengthens Armenia's resilience
text: Held on 23–25 March 2026, the event was attended by representatives of Armenia,
  Moldova, Ukraine, the United Kingdom, the EU institutions and member states, as
  well as experts from think tanks, civil society organisations, and the media. The
  participants learned how to respond to hostile campaigns by developing communication
  strategies aimed to challenge hostile narratives, and how to cooperate with partners
  from public administration and the third sector. It was the third time Poland’s
  MFA organised this sort of exercise for partner countries. As part of the war game,
  the participants could jointly practice the techniques used to identify and defend
  against information manipulation and foreign interference (FIMI). Through simulations
  of real-world scenarios, they practiced responding to such threats using whole-of-government
  and whole-of-society approaches. By organising this year’s edition, Poland reiterated
  its commitment to supporting Armenia and reaffirmed its position as a leader of
  international efforts to counter FIMI.
