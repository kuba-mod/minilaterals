title: Poland and Latvia discuss security and UN cooperation
text: Security in the Baltic Sea region was the central point of the talks. Threats
  posed by Russia and Belarus as well as the current situation in Ukraine were also
  high on the agenda. The ministers discussed the prospects for the further strengthening
  of NATO’s eastern flank, which will improve NATO’s deterrence and defence capabilities
  on its eastern border. It was agreed that the actions taken by the countries of
  the region with that in mind should be threefold, combining national efforts with
  intergovernmental projects and NATO- and EU-coordinated measures. In this context,
  future development of bilateral and multilateral cooperation was also debated, including
  within regional initiatives such as the Council of the Baltic Sea States, currently
  presided by Poland. The Latvian partners shared their experience after three months
  of the country’s first-ever non-permanent membership of the UN Security Council,
  which Latvia will preside over in November 2026. The deputy head of Polish diplomacy
  stressed that Poland considers a well-organised and efficient United Nations to
  be a key element of the rules-based international order. Deputy Minister Kupiecki
  expressed readiness to continuously cooperate with Latvia within multilateral fora.
