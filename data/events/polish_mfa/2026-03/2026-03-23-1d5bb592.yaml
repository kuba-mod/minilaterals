title: Poland's top diplomat Radosław Sikorski meets with ambassadors of Arab countries
text: The participants referred to the Arab League Council Resolution No. 9241 of
  8 March 2026 that condemned Iran’s attacks targeting sites on the territory of countries
  that are not parties to the ongoing conflict. Deputy Prime Minister Sikorski thanked
  Gulf ambassadors for support in evacuating Polish nationals stranded in the region
  and unable to return safely to their home country due to hostilities. Poland’s chief
  diplomat spoke about the consequences of the current situation in the Middle East
  for global security, economy, and multidimensional international relations. He deplored
  the impact of the aggression on the situation of the affected civilians. The participants
  also talked about Israel’s military operation in Lebanon.
