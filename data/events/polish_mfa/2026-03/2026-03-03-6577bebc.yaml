title: Deputy Minister Wojciech Zajączkowski takes part in Polish Senegalese political
  consultations
text: The deputy ministers discussed bilateral cooperation as well as regional and
  international issues. Security was an important topic, particularly in Eastern Europe,
  the Sahel, the Gulf of Guinea, and the Persian Gulf. Potential areas of cooperation
  included border‑control mechanisms, counterterrorism, combating smuggling, and preventing
  illegal migration. The officials emphasised the need to counter disinformation and
  external interference in states’ information environments (FIMI, or Foreign Information
  Manipulation and Interference). The Polish side voiced its support for Senegal’s
  economic transition and at the same time hoped that it will create favourable conditions
  for investment and trade. Deputy Minister Zajączkowski showcased the Polish offer
  in areas such as cybersecurity, maritime economy, mining, agricultural processing,
  and food industry. The Senegalese delegation presented its strategic industrialisation
  plans, digitalisation, and the ongoing negotiations with the International Monetary
  Fund. Secretary General Khare Diouf listed the priority areas of cooperation, including
  artificial intelligence, green technologies, security, and space technologies. The
  interlocutors also discussed cooperation in the fields of science, culture, sports,
  and tourism.
