title: The Poland-ASEAN Dialogue conference in Polish Sejm
text: The cooperation between the EU, Poland, and the countries of ASEAN (the Association
  of Southeast Asian Nations) is an element of strengthening the strategic resilience.
  - In the face of uncertainty in the international environment, it is vital to identify
  reliable partners, community of interests, and measures enabling safe development
  for the highest possible number of international actors. Poland is aware of the
  values and goals it shares with the ASEAN countries -  said Minister Sikorski. Panel
  discussions attended by the ASEAN countries experts offered room to debate security
  and economic cooperation in conditions of global uncertainty. The participants also
  stressed the importance of building people-to-people contacts using academic cooperation
  and science diplomacy. - ASEAN is the chief architect of regional security. The
  Treaty of Amity and Cooperation in Southeast Asia (TAC), currently of 58 members,
  is a cornerstone for maintaining security in the region - noted Ambassador of the
  Philippines Alan Lazaro Deniega. The event confirmed that Poland considers ASEAN
  an important area of its foreign policy – not only in terms of bilateral relations,
  but also as an element of EU’s wider involvement in the Indo-Pacific region. - Expanding
  global partnerships may be mutually beneficial, and this is why Poland will soon
  accede to the Treaty of Amity and Cooperation in Southeast Asia. We know we have
  friends in this part of the world - underlined Deputy Prime Minister Radosław Sikorski.
  The conference was organised by the Sejm of the Republic of Poland in cooperation
  with the Ministry of Foreign Affairs, the Polish National Agency for Academic Exchange,
  and the Polish Institute of International Affairs. Over 200 representatives of academia,
  business, the parliament, state administration, and the diplomatic corps of Southeast
  Asian countries, including Vietnam, the Philippines, Cambodia, Thailand, Indonesia,
  and Malaysia, took part in the event. ASEAN (the Association of Southeast Asian
  Nations) was established in Bangkok in 1967. It is a political and economic organisation
  based in Jakarta.
