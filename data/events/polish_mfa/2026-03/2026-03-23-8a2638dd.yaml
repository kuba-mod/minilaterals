title: Deputy Prime Minister Radosław Sikorski signs agreement on financing ODIHR
  premises in Warsaw
text: ODIHR was established in Warsaw by the Charter of Paris for a New Europe (1990).
  Poland has participated in financing its premises in accordance with a general practice
  in the relations between a host country and an international organisation. The fact
  that ODIHR has its premises in Warsaw consolidates Poland’s central position in
  a debate on human rights and democratic transformation. ODIHR is an autonomous institution
  of the Organization for Security and Co-operation in Europe (OSCE) that plays a
  leading role in observing elections, strengthening democracy, and promoting human
  rights.
