title: Polska na Konferencji Przeglądowej Traktatu o nierozprzestrzenianiu broni jądrowej
text: Wiceminister Robert Kupiecki w swoim wystąpieniu skrytykował Federację Rosyjską
  za prowadzenie agresywnej polityki zastraszania nuklearnego. Wskazał, że działania
  Rosji destabilizują środowisko bezpieczeństwa oraz są sprzecznie z duchem NPT. Tak
  długo jak broń jądrowa będzie używana, aby nam grozić, Polska będzie postrzegała
  politykę odstraszania jądrowego jako kluczowe narzędzie zapewniania pokoju w Europie,
  przeciwdziałania agresji oraz przymusowi. – zapewnił wiceszef MSZ Robert Kupiecki,
  potwierdzając jednocześnie przywiązanie Rzeczypospolitej Polskiej do zasad NPT.
  Na marginesie konferencji wiceminister Kupiecki odbył szereg spotkań bilateralnych,
  w tym z zastępcami Sekretarza Generalnego ONZ Rosemary DiCarlo, Guyem Ryderem oraz
  Izumi Nakamitsu, z którymi rozmawiał o najważniejszych wyzwaniach, z jakimi obecnie
  mierzy się Organizacja Narodów Zjednoczonych. Podczas swojego pobytu w Nowym Jorku,
  wiceminister Kupiecki spotkał się ze swoją wietnamską odpowiedniczką Thi Thu Hang,
  z którą omówił perspektywy wzmocnienia stosunków dwustronnych.
