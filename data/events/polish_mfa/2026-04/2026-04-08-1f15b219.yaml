title: Statement on the US-Iran ceasefire agreement
text: Poland welcomes therefore the ceasefire between Iran and the US. We thank Pakistan
  and other mediators involved for their diplomatic efforts. The agreement should
  also include stabilization and the guarantees of Lebanon's territorial integrity,
  as one of the conditions for achieving peace in the Middle East. We strongly encourage
  Israel to accept the Lebanese authorities' call for direct negotiations to end the
  conflict. Improved political situation in the Middle East will ensure the security
  of energy supplies and key raw materials and create investment conditions for reconstruction
  and economic growth. Building a security architecture in the region that is resilient
  to internal and external threats will also require a lasting, diplomatic resolution
  of the Iranian nuclear and ballistic missile programs, and an end to Iran's support
  for terrorist organizations that destabilize the region.
