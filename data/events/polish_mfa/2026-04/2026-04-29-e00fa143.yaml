title: Foreign minister's call with head of Iranian diplomacy
text: The ministers discussed the possibilities of resuming negotiations between Iran
  and the United States, with a particular focus on deescalating tensions and putting
  an end to the ongoing conflict. Both sides stressed the importance of diplomatic
  dialogue as a fundamental instrument for resolving conflicts and building stability
  in the region. Ensuring the freedom of navigation in the Strait of Hormuz was another
  important issue discussed by the two diplomats. Deputy Prime Minister Radosław Sikorski
  spoke about the importance of maintaining security of the transport routes for the
  stability of global markets and about the significance of uninterrupted delivery
  of critical materials for energy, food, and technological security. Both ministers
  reaffirmed readiness to continue the bilateral political dialogue, including by
  maintaining regular diplomatic contacts. The call was part of an agenda aimed at
  enhancing international dialogue and finding solutions that foster stability and
  security.
