title: O Strategii Polskiej Polityki Zagranicznej na Uniwersytecie Jagiellońskim
text: 'Podczas spotkania w ramach Jagiellońskiego Seminarium Dyplomatycznego przedstawiciele
  Departamentu Strategii MSZ zwrócili szczególną uwagę na kontekst amerykański polskiej
  polityki zagranicznej. Podkreślali, że konieczne jest budowanie pozytywnych relacji
  transatlantyckich, korzystnych dla interesu narodowego i strategicznego Polski.
  W części pytań i odpowiedzi przedstawiciele Departamentu Strategii MSZ omówili szereg
  zagadnień dotyczących polskiej polityki zagranicznej. Pytania dotyczyły między innymi
  promowania Polski, polityki w Europie Środkowo-Wschodniej i Południowej oraz koordynacji
  polskich działań dyplomatycznych. Wydarzenie spotkało się z dużym zainteresowaniem
  zarówno pracowników naukowych Wydziału Studiów Międzynarodowych i Politycznych Uniwersytetu
  Jagiellońskiego, jak i studentów. WSMiP należy do najbardziej umiędzynarodowionych
  jednostek wśród polskich uniwersytetów, dlatego planowana jest kontynuacja współpracy
  w ramach upowszechniania informacji o celach i strategii polskiej polityki zagranicznej.
  Więcej o Strategii polskiej polityki zagranicznej na lata 2026-2030: LINK'
