title: Poland's top diplomat takes part in meeting on Middle East situation
text: Led by the UK’s Foreign Secretary Yvette Cooper, the gathering discussed options
  to restore freedom of navigation in the Strait of Hormuz. The participants agreed
  that it is imperative to work out a diplomatic and political solution to the crisis.
  Poland has been consistent in maintaining that it is important amid the Middle East
  conflict not to lose sight of Ukraine defending itself against Russia’s unprovoked
  aggression. Given that Moscow is benefitting from destabilisation in the Gulf region,
  the pressure on the Kremlin must be increased, including through ever harsher sanctions.
