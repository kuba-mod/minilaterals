title: Minister Sikorski's call with foreign minister of Lebanon
text: Poland’s top diplomat expressed solidarity with Lebanon and said that Poland
  continues development assistance and humanitarian aid programmes for the country.
  He welcomed the groundbreaking decision to start direct talks with the Israeli side
  in Washington. Minister Sikorski expressed hope that the two sides will use this
  opportunity to reach a lasting peaceful solution. Also discussed was the situation
  in southern Lebanon. Minister Sikorski and Minister Raggi emphasised that the safety
  and security of members of the United Nations Interim Force in Lebanon (UNIFIL)
  peacekeeping mission, including the Polish Military Contingent, remains top priority.
