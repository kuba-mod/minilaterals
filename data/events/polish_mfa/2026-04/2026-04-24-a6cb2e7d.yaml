title: Wizyta studyjna podsekretarza stanu Artura Harazima i Doradczego Komitetu Prawnego
  w Genewie
text: W trakcie wizyty Wiceminister Artur Harazim spotkał się z Nadą Al–Nashif, Zastępczynią
  Wysokiego Komisarza ds. Praw Człowieka oraz Ruvendrini Menikdiwelą, Zastępczynią
  Wysokiego Komisarza Narodów Zjednoczonych ds. Uchodźców. Członkowie Doradczego Komitetu
  Prawnego przy Ministrze Spraw Zagranicznych uczestniczyli w konsultacjach z profesorami
  prawa międzynarodowego Akademii Genewskiej. Spotkali się również z przedstawicielami
  Biura Wysokiego Komisarza Narodów Zjednoczonych ds. Uchodźców (UNHCR), Biura Wysokiego
  Komisarza Narodów Zjednoczonych ds. Praw Człowieka (OCHCR), Międzynarodowej Organizacji
  Pracy (MOP), Światowej Organizacji Własności Intelektualnej (WIPO) i Międzynarodowego
  Komitetu Czerwonego Krzyża (MKCK). Podczas wizyty w Genewie miało miejsce także
  posiedzenie Doradczego Komitetu Prawnego. Omówiono mechanizmy kontrolne dotyczące
  wykonywania i interpretacji międzynarodowych instrumentów z zakresu ochrony praw
  człowieka. Temat jest szczególnie istotny w kontekście wypracowania przyszłego stanowiska
  Rzeczypospolitej Polskiej w projekcie Konwencji o zapobieganiu i karaniu zbrodni
  przeciwko ludzkości . Kolejnym tematem posiedzenia był zakres uprawnień państwa
  wykonującego prawo wizyty wobec statku nieposiadającego przynależności państwowej,
  w świetle art. 110 Konwencji o prawie morza oraz powszechnego prawa międzynarodowego.
  Doradczy Komitet Prawny przy Ministrze Spraw Zagranicznych został utworzony w 1999
  roku. W jego skład wchodzi obecnie 15 członków – przedstawicieli doktryny i praktyki
  prawa. Komitet opracowuje opinie w sprawach szczególnie istotnych dla prawa międzynarodowego,
  prawa Unii Europejskiej oraz prawa krajowego.
