title: 'II polsko-kubańskie seminarium: doświadczenia polskiej transformacji i aktualne
  reformy gospodarcze na Kubie'
text: Seminarium było realizacją inicjatywy Wicepremiera, Ministra Spraw Zagranicznych
  Radosława Sikorskiego w kontekście możliwości wsparcia przez Polskę transformacji
  gospodarczej na Kubie. Wydarzenie odbyło się w Szkole Głównej Handlowej (SGH). W
  seminarium uczestniczyli naukowcy z SGH, Centrum Analiz Społeczno-Ekonomicznych
  oraz przedstawiciele kubańskich ośrodków ekonomicznych zaangażowanych w badanie
  oraz opracowywanie reform gospodarki kubańskiej. Korzystając z doświadczeń Polski
  - pionierskiego i skutecznego przejścia po upadku komunizmu od gospodarki centralnie
  planowanej do gospodarki wolnorynkowej, rozmówcy omówili wyzwania związane z procesem
  transformacji polskiej gospodarki oraz jego skutki dla polskiego społeczeństwa.
  Wskazywano, że Kubańczycy mogą wykorzystać pewne aspekty polskiej transformacji
  jako inspirację w przyszłym procesie kubańskich reform gospodarczych. Naukowcy kubańscy
  wskazali na działania konieczne do zapewnienia stabilizacji finansowej oraz makroekonomicznej
  na wyspie. Przedstawili też stan i proponowane zmiany w sektorze państwowym oraz
  sektorze prywatnym kubańskiej gospodarki. Wskazali na potrzebę prowadzenia zrównoważonej
  polityki społecznej i ochrony poziomu życia ludności, przy konieczności zachowania
  zadowalającego stanu służby zdrowia i edukacji. Ponadto podkreślano, że w procesie
  zmian gospodarczych na Kubie wyzwaniem będzie utrzymanie stabilnego systemu energetycznego
  oraz modernizacja infrastruktury. Seminarium było przykładem współpracy polskich
  i kubańskich naukowców zajmującymi się reformami gospodarczymi. Wydarzenie potwierdziło,
  że Polska może wspierać proces transformacji gospodarczej na Kubie poprzez wsparcie
  najbardziej kompetentnych kubańskich ekonomistów i dzielenie się swoimi doświadczeniami.
