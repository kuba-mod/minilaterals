title: Wspólne oświadczenie w sprawie Dialogu Strategicznego między Rzecząpospolitą
  Polską a Stanami Zjednoczonymi Ameryki Północnej
text: Wzmacnianie współpracy w zakresie bezpieczeństwa i obronności Delegacje obu
  krajów podkreśliły znaczenie silnego partnerstwa w dziedzinie bezpieczeństwa i obrony
  między Polską a Stanami Zjednoczonymi. Obie strony ponowiły zobowiązanie do wzmacniania
  współpracy na rzecz bezpieczeństwa, w tym do wzajemnej obrony i odstraszania, oraz
  zobowiązały się do poszukiwania nowych możliwości pogłębiania współpracy transatlantyckiej
  w obszarze przemysłów obronnych z myślą o zwiększaniu interoperacyjności, rozwijaniu
  zdolności obronnych Polski oraz tworzeniu możliwości gospodarczych w obu krajach.
  Oba kraje podkreśliły znaczenie silnych i sprawnych polskich sił zbrojnych. Rozszerzanie
  współpracy w zakresie bezpieczeństwa energetycznego Oba kraje potwierdziły zobowiązanie
  do rozszerzania współpracy w zakresie bezpieczeństwa energetycznego. Polska i Stany
  Zjednoczone omówiły możliwości umocnienia bliskiego partnerstwa w dziedzinie bezpieczeństwa
  energetycznego, w tym poprzez bezpieczne dostawy skroplonego gazu ziemnego (LNG)
  do regionu oraz wspieranie realizacji projektów w dziedzinie cywilnej energetyki
  jądrowej z udziałem amerykańskich przedsiębiorstw w celu zwiększania mocy produkcyjnych
  energii elektrycznej w Polsce. Obie strony zobowiązały się do współpracy w celu
  zapewnienia Polsce i regionowi dostaw niezawodnej, przystępnej cenowo i bezpiecznej
  energii. Stany Zjednoczone wyraziły poparcie dla aspiracji Polski, aby stać się
  regionalnym hubem LNG, który zastąpi model zależności wschód–zachód, historycznie
  podatny na zagrożenia, zdywersyfikowanym systemem północ południe. Rozwijanie współpracy
  w dziedzinie technologii krytycznych i zabezpieczania łańcuchów dostaw Polska i
  Stany Zjednoczone podpisały ramowe porozumienie dotyczące minerałów krytycznych
  i uzgodniły współpracę na rzecz zabezpieczania ich łańcuchów dostaw. Polska i Stany
  Zjednoczone podkreśliły również znaczenie pogłębiania współpracy w obszarze bezpieczeństwa
  technologicznego, w tym poprzez ograniczanie zależności od dostawców wysokiego ryzyka
  w sektorach wrażliwych oraz ochronę krytycznej infrastruktury technologicznej przed
  zewnętrzną ingerencją. Oba kraje potwierdziły swoje zaangażowanie na rzecz bezpiecznych
  globalnych łańcuchów dostaw, w tym rozszerzania współpracy w dziedzinie minerałów
  krytycznych. Polska i Stany Zjednoczone omówiły znaczenie wspierania konkurencyjności
  i innowacyjności gospodarek w obu krajach. Polska wyraziła wdzięczność wobec Stanów
  Zjednoczonych za zaproszenie do udziału w pracach grupy G-20 na wszystkich szczeblach
  podczas amerykańskiej prezydencji. Z kolei Stany Zjednoczone wyraziły zdecydowane
  poparcie dla przystąpienia Polski do grupy G 20 w roli stałego członka. Obie strony
  podkreśliły potrzebę usprawnienia przepisów sprzyjających wzrostowi gospodarczemu,
  przedsiębiorczości i postępowi technologicznemu. Oba kraje wyraziły poparcie dla
  pogłębionego dialogu między rządem a biznesem gwarantującego przewidywalne warunki
  inwestycyjne. Stany Zjednoczone z uznaniem odnotowały przewodnią rolę Polski w powyższych
  kwestiach oraz zadeklarowały bliską współpracę z Polską na rzecz promowania polityk
  sprzyjających rozwojowi dwustronnej wymiany handlowej i inwestycyjnej, tworzeniu
  miejsc pracy i stymulowaniu koniunktury w obu krajach.
