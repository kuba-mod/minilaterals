title: Komunikat MSZ w sprawie Global Sumud Flotilla
text: Siłowe działania na wodach międzynarodowych to poważne naruszenie prawa międzynarodowego,
  w tym prawa morza. Wzywamy wszystkie strony do przestrzegania obowiązującego prawa
  międzynarodowego. MSZ pozostaje w stałym kontakcie z koordynatorami akcji Global
  Sumud Flotilla. Polska służba konsularna podjęła działania w celu zapewnienia pomocy
  konsularnej obywatelom RP i jest w kontakcie z ich bliskimi. W MSZ pracuje Zespół
  Zarządzania Kryzysowego, który zebrał się niezwłocznie po otrzymaniu informacji
  o możliwym zagrożeniu bezpieczeństwa polskich obywateli. Oczekujemy pilnego wyjaśnienia
  wszystkich okoliczności przeprowadzenia akcji sił zbrojnych Izraela oraz żądamy
  zagwarantowania bezpieczeństwa uczestnikom Flotylli.
