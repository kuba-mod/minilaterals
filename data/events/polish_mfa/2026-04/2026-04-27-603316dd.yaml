title: Polish Television to start newscast in Georgian
text: VT Sakartvelo News is part of TVP’s International Media Centre, and is intended
  for audiences in Georgia and the Georgian community abroad. The newscast will be
  run by the multilingual Vot Tak team of the International Media Centre. The news
  will be prepared by Georgian journalists who are aware of the problems that Georgia’s
  residents face and will speak to them in their native language. The project aims
  to present reliable information on political, social, and economic events from the
  European perspective and support the process of democratisation. Its mission also
  involves strengthening of the public’s resilience to manipulation and countering
  disinformation targeted at Georgia and its international partners, most importantly
  the European Union. The VT Sakartvelo News programme will be aired on the Belsat
  channel and made available on YouTube and Facebook. VT Sakartvelo News is yet another
  Vot Tak project supported by the MFA, besides VT Moldova News, broadcast in Romanian
  and Russian, and VT Hayastan News, in Armenian. The project, supported by the MFA,
  is planned to cover all the EU’s Eastern Partnership countries and more. Launching
  of a Kazakh language VT Qazaqstan News is to take place by the end of the year.
