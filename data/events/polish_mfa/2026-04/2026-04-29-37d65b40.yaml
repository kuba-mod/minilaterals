title: Rozmowa telefoniczna szefów dyplomacji Polski i Iranu
text: W trakcie rozmowy omówiono możliwości wznowienia negocjacji pomiędzy Iranem
  a Stanami Zjednoczonymi, ze szczególnym uwzględnieniem działań na rzecz deeskalacji
  napięć oraz zakończenia trwającego konfliktu. Strony podkreśliły znaczenie dialogu
  dyplomatycznego jako podstawowego narzędzia rozwiązywania sporów oraz budowania
  stabilności w regionie. Istotnym elementem rozmowy była również kwestia zapewnienia
  swobody żeglugi w rejonie Cieśniny Ormuz. Wicepremier Radosław Sikorski zwrócił
  uwagę na znaczenie utrzymania bezpieczeństwa szlaków transportowych dla stabilności
  globalnych rynków oraz niezakłóconych dostaw surowców krytycznych dla bezpieczeństwa
  energetycznego, żywnościowego i technologicznego. Rozmówcy potwierdzili gotowość
  do kontynuowania bilateralnego dialogu politycznego, w tym utrzymywania regularnych
  kontaktów dyplomatycznych. Rozmowa wpisuje się w działania na rzecz wzmacniania
  międzynarodowego dialogu oraz poszukiwania rozwiązań sprzyjających stabilności i
  bezpieczeństwu.
