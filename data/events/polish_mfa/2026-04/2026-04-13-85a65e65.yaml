title: Minister Radosław Sikorski congratulates Tisza on election win and invites
  Hungary's future top diplomat to Warsaw
text: Minister Sikorski said that the voting outcome paves the way for a renewed momentum
  between the two countries and carries a symbolic meaning for the states that stand
  up for democratic principles. He also spoke highly of the declaration made by the
  future Hungarian prime minister, Péter Magyar, about resuming a close partnership
  with Poland. I am glad to see the willingness to rebuild our relations. After a
  few particularly difficult years, we now have a clear goal ahead, namely to resume
  constructive dialogue, both bilaterally and in the European Union Poland’s top diplomat
  invited Anita Orbán to visit Warsaw at the earliest convenience. The meeting will
  focus on giving new energy to cooperation in Central Europe and working out shared
  positions on key security issues. During the call, Minister Sikorski listed the
  cooperation areas prioritised by Poland, namely unblocking funds from the European
  Peace Facility, continued financial support for Ukraine, and the necessity to quickly
  adopt a new package of EU sanctions against Russia. The two officials affirmed readiness
  to work closely towards enhanced regional security and cohesion of European policies.
