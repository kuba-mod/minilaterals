title: Minister Sikorski's call with foreign minister of Pakistan
text: Deputy Prime Minister Radosław Sikorski thanked Deputy Prime Minister Ishaq
  Dar for his active role in actions towards unblocking the Strait of Hormuz and establishing
  a ceasefire in the Middle East. The Pakistani authorities have hosted and mediated
  the US–Iran peace talks, which started on 11 April. The chief diplomats of Poland
  and Pakistan also exchanged their views on global issues and discussed bilateral
  relations. Deputy Prime Minister Sikorski invited Deputy Prime Minister Dar to Poland.
  A visit would allow further discussions of the Polish-Pakistani cooperation, which
  the ministers initiated during Deputy Prime Minister Sikorski’s visit to Pakistan
  last October.  It led to the signing of a new agreement on cooperation between the
  foreign ministries, which provides for bilateral political consultations on a yearly
  basis and training exchanges, among other things.
