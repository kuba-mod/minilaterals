title: Polska i Włochy wzmacniają współpracę strategiczną - rozmowy szefów dyplomacji
  w Rzymie
text: 'Podczas spotkania szefowie dyplomacji potwierdzili wolę dynamicznego rozwoju
  relacji dwustronnych, szczególnie w obszarach nowoczesnych technologii, inwestycji
  oraz współpracy przedsiębiorstw. Bezpieczeństwo i Ukraina Ministrowie omówili architekturę
  bezpieczeństwa w Europie w obliczu rosyjskiej agresji. Podkreślono konieczność nieprzerwanego
  wsparcia militarnego i finansowego dla Ukrainy oraz ścisłej koordynacji działań
  wewnątrz UE i NATO. Zgadzamy się, że pełnowymiarowa agresja Rosji stanowi fundamentalne
  wyzwanie dla ładu międzynarodowego. Podkreśliłem potrzebę wzmacniania wsparcia dla
  Ukrainy oraz skoordynowanych działań wywierających presję na Federację Rosyjską
  w celu zakończenia tej wojny - zaznaczył wicepremier Radosław Sikorski. Ważnym punktem
  rozmów była również aktualna agenda europejska. W ramach tej dyskusji Ministrowie
  omówili proces rozszerzenia Unii Europejskiej, uznając go za ważne narzędzie budowania
  stabilności i bezpieczeństwa na kontynencie. Wierzymy w Europę i potrzebujemy silnej
  Europy. Dlatego musimy działać razem, by wzmocnić naszą współpracę. Ma ona kluczowe
  znaczenie dla przyszłości kontynentu. Dialog o Bliskim Wschodzie i Afryce Rozmowy
  objęły również sytuację na Bliskim Wschodzie oraz rosnące znaczenie kontynentu afrykańskiego
  dla stabilności regionu Morza Śródziemnego. Szef polskiej dyplomacji wskazał na
  potrzebę wspólnych działań rozwojowych i bezpieczeństwa w tych regionach. Kluczowy
  efekt: Memorandum o Porozumieniu Zwieńczeniem wizyty było podpisanie przez ministrów Memorandum
  o Porozumieniu między MSZ Polski i Włoch w sprawie systematycznych konsultacji i
  współpracy strategicznej. Dokument ten formalizuje regularny dialog polityczny i
  wzmacnia koordynację obu państw na forum międzynarodowym.'
