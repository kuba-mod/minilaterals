title: Deputy Prime Minister Radosław Sikorski calls US Secretary of State Marco Rubio
text: I spoke with Secretary of State Marco Rubio to thank him for the successful
  American–Polish prisoner release deal said Deputy Prime Minister Radosław Sikorski,
  adding that the initiative was US-brokered. Poland’s top diplomat also highlighted
  the key role played by John Coale, US President Donald Trump’s special envoy, and
  by the Department of State. Minister Sikorski stressed that the successful exchange
  is also underpinned by the alliance between Poland and the US. “Poland had supported
  the previous prisoner swaps and will continue to work with the United States to
  secure the release of all political prisoners, not only in Belarus,” declared the
  foreign minister. Minister Sikorski and Secretary Rubio confirmed willingness to
  deepen the Polish–American cooperation in such strategic areas as security, defence,
  economy, and energy. These areas of cooperation were on the agenda of the 16th round
  of the Poland–US Strategic Dialogue that took place on 30 April in Warsaw.
