title: Statement by the Ministry of Foreign Affairs regarding the Global Sumud Flotilla
text: Forceful activity in international waters is a serious violation of international
  law, including the law of the sea. We call on all parties to respect the applicable
  international law. The MFA stays in touch with the coordinator of the Global Sumud
  Flotilla operation. Polish consular service took action to provide consular assistance
  to Polish citizens and is in touch with their relatives. The Crisis Management Team
  has been working at the MFA, which convened immediately upon receiving information
  of possible threat to Polish nationals. We expect an urgent explanation of all the
  circumstances of the Israeli military operation and demand that the safety of the
  Flotilla participants be ensured.
