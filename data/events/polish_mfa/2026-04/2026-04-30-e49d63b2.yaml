title: 16. edycja Polsko-Amerykańskiego Dialogu Strategicznego
text: Współpraca gospodarcza jest ważnym elementem relacji polsko-amerykańskich. Podczas
  spotkania wiceminister klimatu i środowiska Krzysztof Galos i podsekretarz stanu
  Allison Hooker podpisali porozumienie ramowe w sprawie zabezpieczenia dostaw w zakresie
  wydobycia, przetwarzania i recyklingu surowców krytycznych, w tym metali ziem rzadkich.
  Polska jest pierwszym krajem Unii Europejskiej, który zawarł takie dwustronne porozumienie
  z USA. 24 kwietnia br. komisarz UE ds. handlu Maroš Šefčovič podpisał w Waszyngtonie
  analogiczne porozumienie w imieniu Unii Europejskiej. 16. edycja Polsko-Amerykańskiego
  Dialogu Strategicznego potwierdziła trwałość partnerstwa polsko-amerykańskiego oraz
  jego kluczowe znaczenie dla bezpieczeństwa i stabilności w regionie euroatlantyckim.
  Dialog Strategiczny jest forum służącym do omówienia najważniejszych obszarów współpracy
  dwustronnej między Polską a Stanami Zjednoczonymi Ameryki.
