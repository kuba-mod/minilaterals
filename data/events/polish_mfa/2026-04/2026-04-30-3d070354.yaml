title: Szef polskiej dyplomacji z wizytą w Algierii
text: 'Podczas wizyty wicepremier Radosław Sikorski spotkał się z Prezydentem Algierii
  Abdelmadjidem Tebboune, z Ministrem Spraw Zagranicznych i Wspólnoty Narodowej za
  Granicą Algierskiej Republiki Ludowo-Demokratycznej, a także z przedstawicielami
  algierskiej Polonii oraz przedstawicielami środowiska politycznego i kulturalno-naukowego
  Algierii. To pierwsza wizyta polskiego Ministra Spraw Zagranicznych w Algierii od
  2017 roku, a głównym jej celem jest przegląd i rozwój relacji dwustronnych, zwłaszcza
  w obszarze współpracy gospodarczej powiedział szef polskiej dyplomacji, podkreślając
  jednocześnie komponent gospodarczy delegacji. Ministrowi Spraw Zagranicznych towarzyszyli
  m.in.: Grzegorz Wrona, Sekretarz Stanu w Ministerstwie Aktywów Państwowych; Agnieszka
  Kurpińska, Wiceprezes Zarządu spółki Grupa Azoty Zakłady Azotowe Kędzierzyn; Mariusz
  Bogacki, Dyrektor Wykonawczy ds. Handlu Produktami Petrochemicznymi ORLEN oraz Karolina
  Florek, Zastępczyni Głównego Lekarza Weterynarii. Podczas spotkania z Prezydentem
  Algierii Abdelmadjidem Tebboune omawiano przyjazne stosunki między naszymi krajami
  sięgające 1962 roku. Szef polskiej dyplomacji zaznaczył, że Algieria jest jednym
  z głównych partnerów Polski w regionie Bliskiego Wschodu i Afryki Północnej (MENA).
  Ponadto obie strony zauważyły kluczową roli Algierii w regionie jako inicjatora
  wzmacniania współpracy w obszarach: energetyki, rolnictwa, turystyki, cyfryzacji,
  nauki i sportu. Współpraca dwustronna w sferze gospodarczej oraz globalne wyzwania
  stały się także głównym tematem rozmowy ministra Radosława Sikorskiego z szefem
  MSZ Algierii Ahmedem Attafem. Podczas rozmów poruszyliśmy kwestie międzynarodowe,
  podkreślając znaczenie bezpieczeństwa, stabilności oraz przestrzegania prawa międzynarodowego,
  zarówno w kontekście wojny w Ukrainie, jak i sytuacji na Bliskim Wschodzie i w regionie
  Sahelu, w którym dominuje destabilizacja polityczna, terroryzm, nielegalne migracje
  czy też działalność obcych sił najemnych W trakcie rozmów zwrócono uwagę na potrzebę
  większego zaangażowania polskich przedsiębiorców, inwestorów i eksporterów na rynku
  algierskim. Mamy też tę kompatybilność, że Algieria produkuje gaz, a my go potrzebujemy
  i mamy też możliwości przerabiania gazu na nawozy sztuczne Radosław Sikorski wyraził
  też nadzieję, że dojdzie do ustanowienia bezpośredniego połączenia lotniczego między
  Polską a Algierią. Szczególny potencjał wskazano w sektorze energetycznym – w tym
  odnawialnych źródeł energii – a także w branży rolno-spożywczej i obszarze bezpieczeństwa.
  Omówiono także sytuację regionalną i międzynarodową. Rozmówcy potwierdzili przywiązanie
  do zasad prawa międzynarodowego oraz znaczenie stabilności i bezpieczeństwa. Podczas
  wizyty w Algierii podpisano protokoły o współpracy między Akademią Dyplomatyczną
  MSZ oraz Algierskim Instytutem Dyplomatycznym i Stosunków Międzynarodowych. Podpisany
  został również  list intencyjny o współpracy Szkoły Głównej Handlowej (SGH) i jej
  odpowiednikiem ESAA (Ecole Superieure algerienne des Affaires).'
