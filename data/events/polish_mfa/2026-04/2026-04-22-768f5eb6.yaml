title: Poland and Italy strengthen strategic cooperation as top diplomats meet in
  Rome
text: The top diplomats reaffirmed willingness to vigorously develop their bilateral
  relations, particularly in new technologies, investments, and business cooperation.
  The ministers discussed the security architecture in Europe in the light of Russia’s
  aggression. They stressed the need for unwavering military and financial support
  for Ukraine and close coordination of EU and NATO response. We agree that Russia’s
  full-scale aggression poses a fundamental challenge to the international order.
  I have emphasised the need for reinforced support for Ukraine as well as coordinated
  action that would exert pressure on the Russian Federation in order to bring the
  war to an end said Deputy Prime Minister Radosław Sikorski. The current European
  agenda was another important topic. The ministers spoke about the EU enlargement
  process as an important tool to build the continent’s stability and security. We
  believe in Europe and need a strong Europe. This is why we must act together to
  strengthen our cooperation. It is key to the future of our continent The talks also
  covered the situation in the Middle East and the increasing role Africa plays in
  ensuring the stability of the Mediterranean. The Polish chief diplomat highlighted
  the need to jointly foster development and security of these regions. The visit
  concluded with the signature of the Memorandum of Understanding on regular consultations
  and strategic cooperation between Poland’s and Italy’s MFAs by the ministers. The
  document formalises regular political dialogue and strengthens coordination between
  the two countries on international fora.
