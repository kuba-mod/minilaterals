title: Polish-Irish consultations in Warsaw
text: Competitiveness, values, and security are the three pillars of Ireland’s Presidency
  of the EU Council that were discussed today in Warsaw by the foreign ministers of
  Poland and Ireland. Minister McEntee emphasised that EU member states should increase
  their defence investment. As minister of defence, I want to be more ambitious—not
  only in Ireland, but also at the EU level—so that together we ensure our defence
  is strong, that we invest in the security and defence industry, and that we also
  address new and emerging challenges, whether hybrid threats or maritime security,
  which has come to the forefront - said Minister Helen McEntee. She added that new
  challenges have an impact on both Europe’s security and its economic stability.
  The ministers also discussed the situation in Ukraine. Both stressed that they unequivocally
  condemn Russian aggression and agree that continued assistance for Kyiv is necessary.
  The heads of diplomacy noted that supporting Ukraine also means safeguarding the
  EU’s security. Poland and Ireland support Ukraine also on its path to European Union
  membership. Deputy Prime Minister Sikorski recalled that the countries have joined
  Ukraine2EU, the EU programme which supports integration. Poland advises Ukrainian
  public administration institutions in their efforts to conduct EU-related reforms
  and align legislation with EU acquis. We also support Western Balkan countries on
  their accession path The foreign ministers of Poland and Ireland also discussed
  opportunities to develop economic cooperation. Trade between the two countries in
  2025 exceeded EUR 4.5 billion, representing a 24% increase compared with 2024. Poland’s
  top diplomat pointed out that construction companies in particular are highly valued
  for their contribution to improving the situation on the Irish housing market. Deputy
  Prime Minister Sikorski emphasised that the Polish diaspora serves as a natural
  bridge between Poland and Ireland. It is composed of around 120,000 people who are
  viewed positively due to their professionalism, significant contribution to the
  Irish economy, and openness to integration.
