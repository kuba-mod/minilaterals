title: Deputy Foreign Minister Wojciech Zajączkowski visits Eritrea-new opening in
  bilateral relations
text: Held at the Eritrean MFA, the talks were an opportunity to tighten relations
  and deepen political dialogue. The Polish side presented the scale of the country’s
  social and economic transformation over the last several decades, emphasising Poland’s
  dynamic growth and its rising investment potential. The two sides also expressed
  their readiness to forge a partnership that is based on mutual understanding and
  shared interests. The consultations helped to identify areas of future cooperation
  in science, most notably archaeology, and in economy, with particular emphasis on
  the agricultural sector. During the meeting with the Eritrean presidential adviser,
  the interlocutors highlighted Eritrea’s strategic location at the crossroads of
  the Middle East and the Horn of Africa, and the resulting potential for multisectoral
  cooperation. The two sides expressed their willingness to engage in an open dialogue,
  which can serve as a basis for elaborating a comprehensive bilateral cooperation
  plan.
