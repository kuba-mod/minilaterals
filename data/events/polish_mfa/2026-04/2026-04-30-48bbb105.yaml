title: 16th round of Poland-US Strategic Dialogue
text: Economic cooperation is an important part of Polish–US relations. At the meeting,
  Deputy Minister of Climate and Environment Krzysztof Galos and Undersecretary of
  State Allison Hooker signed the Critical Minerals Framework. It concerns securing
  critical minerals supply chains, including rare earth metals, at the stages of extraction,
  processing, and recycling. Poland is the first EU country to reach such a framework
  agreement with the United States. EU Commissioner for Trade and Economic Security
  Maroš Šefčovič signed a corresponding agreement on the behalf of the European Union
  in Washington, D.C. on 24 April 2026. The 16th round of the Poland–US Strategic
  Dialogue reaffirmed the durability of both countries’ partnership and its key significance
  for the security and stability in the Euro-Atlantic region. The Strategic Dialogue
  is a forum where the most important areas of bilateral cooperation between Poland
  and the United States are discussed.
