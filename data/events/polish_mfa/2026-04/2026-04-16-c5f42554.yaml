title: Capital Level Consultations of the Neutral Nations Supervisory Commission
text: Discussions focused on the current situation on the Korean Peninsula and its
  impact on the activities of the NNSC. The representatives also reviewed and evaluated
  the operational tasks of the NNSC and reaffirmed their long-term commitment to contribute
  to a permanent peace solution on the Korean Peninsula. The political consultations
  were concluded with the delegations adopting a Joint Statement. Additional elements
  of the consultations’ program included a roundtable discussion with representatives
  of Polish think tanks (OSW, PISM) hosted by the Centre for Eastern Studies. The
  participants were also received by Secretary of State at the Ministry of Foreign
  Affairs Władysław Teofil Bartoszewski. The NNSC was established nearly 73 years
  ago through the Korean Armistice Agreement of 27 July 1953, which is still the only
  legally binding instrument for the avoidance of hostilities on the Korean Peninsula.
  The role of the NNSC remains crucial in maintaining the military armistice as well
  as in promoting transparency and in building confidence on both sides of the military
  demarcation line. During the Consultations, Poland was represented by Brigadier
  General M. Bieniek, Head of the Polish Military Mission to the NNSC, MRs Joanna
  Dopierała-Konkołowicz and Mr. Konrad Pawlik, Deputy Director of the Asia and Pacific
  Department at the Ministry of Foreign Affairs. The Swedish and Swiss sides were
  represented by representatives of the Ministries of Foreign Affairs and the Heads
  of Military missions to the NNSC of each country. Next year’s annual consultations
  will be organized by Switzerland.
