title: Andrzej Seweryn first to receive Bronisław Geremek Prize
text: 'The actor received the prize by MFA Secretary of State Ignacy Niemczycki and
  Minister Delegate for European Affairs of the French Republic Benjamin Haddad. The
  laureate chosen by a Polish-French committee was decorated for outstanding artistic
  accomplishments and his consistence in building bridges between Poland and France
  through cultural and public activity. The Bronisław Geremek Prize is a token of
  appreciation for individuals of special merit for enhanced dialogue and cooperation
  between Poland and France based on common values and centuries-old bonds between
  the two nations. Establishment of the award is consistent with the spirit of the
  Treaty of Nancy—signed on 9 May 2025 and in force since 22 January 2026—which marked
  a new stage in the bilateral relations. The first recipient of the prize is Andrzej
  Seweryn—an actor and longstanding member of the famous Comédie-Française, which
  has been run uninterruptedly since 1680—who has been contributing significantly
  to the Polish-French cultural relations for decades. Andrzej Seweryn is a symbol
  of successfully building bridges between the two countries. The patron of the award,
  prof. Bronisław Geremek, was one of the architects of Poland’s European policy,
  a proponent of dialogue and reconciliation in Europe, and a minister of foreign
  affairs during Poland’s accession to NATO. His legacy and stance serve as a point
  of reference for contemporary international cooperation, especially in security
  context. *** More about the Polish-French intergovernmental summit in Gdańsk: Gdańsk
  Intergovernmental Summit: Deputy Minister Niemczycki talks international affairs
  - Ministry of Foreign Affairs Republic of Poland - Gov.pl website'
