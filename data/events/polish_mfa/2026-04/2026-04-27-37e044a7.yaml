title: Telewizja Polska z serwisem w języku gruzińskim
text: Serwis informacyjny VT Sakartvelo News jest częścią Ośrodka Mediów dla Zagranicy
  Telewizji Polskiej. Jest skierowany do odbiorców w Gruzji oraz gruzińskiej diaspory
  za granicą. Serwis będzie realizowany przez wielojęzyczną redakcję Vot Tak Ośrodka
  Mediów dla Zagranicy Telewizji Polskiej. Wiadomości będą przygotowywać gruzińscy
  dziennikarze, którzy znają problemy mieszkańców Gruzji  i będą mówić do nich w rodzimym
  języku. Celem projektu jest dostarczanie rzetelnych informacji o wydarzeniach politycznych,
  społecznych i gospodarczych z europejskiej perspektywy oraz wspieranie procesów
  demokratycznych. Misją serwisu jest również wzmacnianie odporności odbiorców na
  manipulacje oraz przeciwdziałanie dezinformacji wymierzonej w Gruzję i jej partnerów
  międzynarodowych, w szczególności Unię Europejską. Program VT Sakartvelo News będzie
  transmitowany satelitarnie na antenie Belsat oraz w internecie, w serwisie YouTube
  oraz na Facebooku. VT Sakartvelo News  to kolejny projekt Vot Tak wpierany przez
  MSZ. Serwis dołącza do VT Moldova News, nadawanego w języku rumuńskim i rosyjskim
  oraz VT Hayastan News - w języku ormiańskim. Projekt w przyszłości ma objąć wszystkie
  kraje Partnerstwa Wschodniego Unii Europejskiej i nie tylko. Jeszcze w tym roku
  planowanie jest uruchomienie VT Qazaqstan News w języku kazachskim.
