title: Polsko-irlandzkie konsultacje w Warszawie
text: Konkurencyjność, wartości i bezpieczeństwo – to trzy filary Prezydencji Irlandii
  w Radzie UE, o których dzisiaj w Warszawie rozmawiali szefowie MSZ Polski i Irlandii.
  Minister McEntee podkreślała, że państwa Unii Europejskiej powinny zwiększyć inwestycje
  w przemysł obronny. - Jako minister obrony chcę być bardziej ambitna, nie tylko
  w Irlandii, ale także w odniesieniu do UE, abyśmy wspólnie zadbali o to, by nasza
  obrona była silna, byśmy inwestowali w przemysł bezpieczeństwa i obronny, ale także
  byśmy stawiali czoła nowym i pojawiającym się wyzwaniom, czy to zagrożeniom hybrydowym,
  czy to bezpieczeństwu morskiemu, które wysunęło się na pierwszy plan – mówiła Minister
  Spraw Zagranicznych Irlandii Helen McEntee i dodała, że nowe wyzwania mają wpływ
  zarówno na bezpieczeństwo, jak i stabilność gospodarczą Europy. Ministrowie rozmawiali
  także o sytuacji w Ukrainie. Oboje podkreślili, że jednoznacznie potępiają rosyjską
  agresję i  zgadzają się, że konieczna jest dalsza pomoc dla Kijowa. Szefowie dyplomacji
  zaznaczyli, że wspieranie Ukrainy oznacza również ochronę bezpieczeństwa UE. Polska
  i Irlandia wspierają Ukrainę także na ścieżce do Unii Europejskiej. Wicepremier
  Sikorski przypomniał, że państwa przystąpiły do unijnego programu wsparcia integracji
  Ukraine2EU. Polska doradza ukraińskim organom administracji publicznej we wprowadzaniu
  reform związanych z UE i dostosowywaniu prawodawstwa do unijnego dorobku prawnego.
  Wspieramy także państwa Bałkanów Zachodnich na ich ścieżce akcesyjnej Szefowie MSZ
  Polski i Irlandii omówili też możliwości rozwoju współpracy ekonomicznej. Obroty
  handlowe między państwami w 2025 roku wyniosły ponad 4,5 miliarda euro. To wzrost
  o 24% w porównaniu z 2024 rokiem. Szef polskiego MSZ zwrócił uwagę na to, że szczególnie
  cenione są firmy budowlane, które wpływają na poprawę sytuacji na irlandzkim rynku
  mieszkaniowym. Wicepremier Sikorski podkreślił, że naturalnym pomostem pomiędzy
  Polską i Irlandią jest polska diaspora. To około 120 tysięcy osób, które są pozytywnie
  postrzegane ze względu na profesjonalizm, ogromny wkład w irlandzką gospodarkę oraz
  otwartość na integrację.
