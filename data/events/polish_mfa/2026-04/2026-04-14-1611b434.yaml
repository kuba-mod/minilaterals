title: Polish-Ivorian political consultations
text: During the meeting, Deputy Foreign Minister Wojciech Zajączkowski congratulated
  the secretary-general at the Ivorian Foreign Ministry on the country’s rapidly growing
  economy. He expressed his hope to see more investments between Warsaw and Yamoussoukro.
  Côte d’Ivoire is interested in Poland’s transformation experience and its capabilities
  in the areas of agricultural mechanisation and agri-food industry. Furthermore,
  the deputy ministers identified maritime industry and new technologies as other
  priority cooperation areas. They also paid particular attention to the issue of
  security in Europe, the Sahel, and the Gulf of Guinea. The deputy ministers highlighted
  the major challenges these regions face, namely organised crime and foreign interference,
  including interference in the information space. In addition to stressing the significance
  of bolstering cybersecurity and fighting hybrid threats, the diplomats declared
  their willingness to cooperate to counter disinformation. The deputy ministers also
  exchanged experiences related to the reception and integration of refugees and economic
  migrants. Evariste Koffi Yapi pointed out that Poland and Côte d’Ivoire are bound
  by ties of friendship. He asserted that Yamoussoukro was ready to launch joint endeavours
  with Poland, for example in the fields of energy, healthcare, infrastructure, and
  education. In this context, the Ivorian side gave an account of the ongoing and
  planned reforms under its National Development Plan 2026–2030.
