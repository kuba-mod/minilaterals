title: Poland at Review Conference of Treaty on Non-Proliferation of Nuclear Weapons
text: The participation of the Polish delegation in the Review Conference of the Treaty
  on the Non-Proliferation of Nuclear Weapons provides an opportunity to present Poland’s
  position on the prospects for nuclear disarmament, the challenges of non-proliferation
  of nuclear weapons, and the possible peaceful uses of nuclear energy. In his speech,
  Deputy Minister Robert Kupiecki criticised the Russian Federation for pursuing an
  aggressive policy of nuclear intimidation. He pointed out that Russia’s actions
  are destabilising the security environment and run counter to the spirit of the
  NPT. As long as nuclear weapons are used to threaten us, Poland will see the policy
  of nuclear deterrence as a key tool for ensuring peace in Europe and countering
  aggression and coercion. - said MFA deputy head and reaffirmed Poland’s commitment
  to the principles of NPT. On the sidelines of the Conference, Deputy Minister Kupiecki
  held a series of bilateral meetings, including with UN Deputy Secretaries-General
  Rosemary DiCarlo, Guy Ryder and Izumi Nakamitsu, with whom he discussed the most
  pressing challenges currently facing the United Nations. During his visit to New
  York, Deputy Minister Kupiecki met with his Vietnamese counterpart, Thi Thu Hang,
  with whom he discussed prospects for strengthening bilateral relations.
