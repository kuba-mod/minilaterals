title: Inaugural meeting of Poland-Canada High-Level Steering Group on Bilateral Cooperation
text: Consultations, held in specialised groups, concerned defence cooperation, military
  procurement and partnerships, energy security, clean energy cooperation, and countering
  foreign information manipulation and interference. While in Canada, Undersecretary
  of State Robert Kupiecki also conducted talks with David Morrison and Dominic Rochon,
  experts in international politics who work with Prime Minister Mark Carney. The
  discussions focused on bilateral affairs, the current challenges to international
  security, cooperation within NATO, and the opportunities to jointly combat cyber
  threats. In August 2025, the prime ministers of Poland and Canada committed to renew
  and enhance the two countries’ strategic partnership. To operationalise this, a
  High-Level Steering Group on Bilateral Cooperation was established, co-chaired by
  the Polish and Canadian foreign ministries. It is tasked with overseeing the implementation
  of mutually determined areas of enhanced cooperation.
