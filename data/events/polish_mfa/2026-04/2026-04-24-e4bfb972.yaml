title: 'Second edition of Polish-Cuban Seminar on Economic Transformation: Poland''s
  experience and Cuba''s ongoing reforms'
text: The seminar built on the initiative by Deputy Prime Minister and Minister of
  Foreign Affairs Radosław Sikorski to provide Polish support for Cuba’s economic
  transition. The event, hosted by the SGH, attracted experts from the SGH and the
  Center for Social and Economic Research as well as representatives of Cuban organisations
  that study the country’s economy and design its reforms. Drawing from the Polish
  experience—a pioneer successful transition from central planning to a market economy
  after the fall of communism—the participants discussed the challenges of the Polish
  economic switch and its societal impact. It was pointed out that Cubans could treat
  some aspects of the Polish story as an inspiration for the future economic reform
  of their country. The Cuban researchers listed the measures necessary to ensure
  financial and macroeconomic stabilisation back home. They also gave an account of
  the current state of and the proposed changes to the public and private sectors
  of the Cuban economy. The experts emphasised the need to implement a sustainable
  social policy and protect the population’s living standard, while sustaining an
  acceptable level of healthcare and education services. It was also highlighted that
  the challenges to Cuba’s economic transformation will include maintaining a reliable
  energy system and modernising the infrastructure. The seminar showcased the cooperation
  of Polish and Cuban researchers specialised in economic reforms. It proved that
  Poland can foster Cuba’s economic transition through supporting the country’s most
  competent economists and sharing its own experience.
