title: Rozmowa telefoniczna wicepremiera Radosława Sikorskiego z Sekretarzem Stanu
  USA Marco Rubio
text: Rozmawiałem z Sekretarzem Stanu Marco Rubio, aby mu podziękować za udaną amerykańsko-polską
  akcję uwolnienia więźniów. – powiedział wicepremier Radosław Sikorski dodając, że
  negocjującymi byli Amerykanie. Szef polskiej dyplomacji podkreślił także kluczową
  rolę specjalnego ​wysłannika prezydenta USA Donalda Trumpa Johna Coale'a ​oraz Departamentu
  Stanu. Minister Sikorski dodał, że za sukcesem stoi także polsko-amerykański sojusz.
  Polska wspierała już poprzednie wymiany więźniów i nadal będziemy współpracować
  ze Stanami Zjednoczonymi na rzecz uwolnienia wszystkich więźniów politycznych, nie
  tylko w Białorusi. – zapowiedział minister spraw zagranicznych. Minister Sikorski
  i sekretarz Rubio potwierdzili wolę pogłębiania współpracy polsko-amerykańskiej
  w strategicznych obszarach dotyczących bezpieczeństwa i obrony oraz współpracy gospodarczej
  i energetycznej. Właśnie tym obszarom poświęcony był odbywający się 30 kwietnia
  br. w Warszawie 16. Dialog Strategiczny między Stanami Zjednoczonymi a Polską.
