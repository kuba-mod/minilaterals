title: Deputy Prime Minister Radosław Sikorski takes part in meeting of leaders on
  situation in Strait of Hormuz
text: The talks focused on a joint British and French initiative to unblock that strategic
  shipping corridor. The participants agreed that the current situation is paralysing
  the Strait of Hormuz as a route for the international delivery of supplies and strategic
  raw materials. The costs fall on the whole international community, including the
  poorest countries of the world. Poland declares support for measures aimed at a
  permanent opening of the waterway, noting that the success of any such plans depends
  on whether the ceasefire holds and the tensions between Tehran and Washington de-escalate
  effectively. Deputy Prime Minister Sikorski says that Warsaw hopes for a continued
  dialogue and prolonged truce. The gathering prioritised freedom of navigation without
  further restrictions and charges, particularly in regard to the shipment of energy
  supplies, food, and fertilisers. In this context, the participants discussed plans
  for a peaceful multinational maritime mission to clear the waterway of mines and
  make it navigable once the active phase of the conflict is over. It was also said
  during the meeting that engagement in the Middle East cannot lessen vigilance towards
  Russia’s aggression against Ukraine. Regional destabilisation and the ensuing rise
  in energy prices are directly beneficial for Kremlin’s interests. A continued pressure
  on Moscow is necessary to prevent it from using global crises to fund its war against
  Ukraine.
