title: MFA Statement
text: Criticism of Israel’s regional policy by the MP does not justify such a gesture,
  which is deeply offensive not only to Jews and Israelis, but also to all those for
  whom the Holocaust and other Nazi crimes constitute an important element of memory
  and identity. Poles have a particular responsibility to preserve the historical
  memory of the Holocaust, the greatest crime committed in the occupied territories.
  Any such provocations must be regarded as reprehensible and unacceptable.
