title: Polish Foreign Policy Strategy discussed at Jagiellonian University
text: The gathering was part the “Jagiellonian Diplomatic Encounters” series. During
  the lecture, representatives of the MFA Department of Strategy paid special attention
  to the American context of Polish foreign policy. They emphasised the need to forge
  positive transatlantic relations that benefit Poland’s national and strategic interest.
  The Q&A session focused on various aspects of Polish foreign policy, including promoting
  Poland, politics in Central, Eastern, and Southern Europe, and coordinating Polish
  diplomatic efforts. The event met with great interest from both students and academics
  affiliated with the Faculty of International and Political Studies of the Jagiellonian
  University—one of Poland’s most internationalised academic divisions. For that reason,
  plans are in place to continue cooperation in disseminating information about the
  goals and strategy of Polish foreign policy. More on the Polish Foreign Policy Strategy
  2026–2030 here .
