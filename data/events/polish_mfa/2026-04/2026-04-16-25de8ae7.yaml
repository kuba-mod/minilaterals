title: 'Poland and France open a new chapter: the first Friendship Day'
text: 'The date, 20 April, is by no means accidental. It marks the anniversary of
  the enshrinement of Marie Skłodowska-Curie’s remains in the Panthéon in Paris (1995).
  As the first woman honoured at the memorial for her own achievements, the Nobel
  laureate remains a powerful symbol of Polish–French scientific and cultural synergy.
  Today, this shared history forms the foundation for modern cooperation in the fields
  of security, economy, and high technologies. Following the provisions of the Treaty
  of Nancy—signed on 9 May 2025 and in force since 22 January 2026—the two countries
  are launching a series of annual intergovernmental summits. The first of these important
  meetings is to take place in Gdańsk. In their talks, the two countries’ leaders
  will focus on building a strong, competitive, and secure Europe, and the summits
  themselves will serve both capitals as the main vehicle for defining policy directions.
  Polish–French Friendship Day is not only a commemoration of our shared history,
  but primarily an investment in the future. The strong alliance between Warsaw and
  Paris is now one of the pillars of entire European Union’s stability and development
  insisted Deputy Prime Minister and Foreign Minister Radosław Sikorski. Our partnership
  has entered a new stage: Warsaw and Paris now speak in one voice when it comes to
  all major debates on the community’s future. Through regular summits and coordinated
  policies, Poland and France are steadily laying the groundwork for a secure Europe—one
  that is capable of protecting its values and emerging as a top competitor in the
  international arena. The Gdańsk meeting highlights will include the announcement
  of the first ever Bronisław Geremek Prize laureate. This distinction, established
  recently by both countries’ Ministers of Foreign Affairs, recognises individuals
  and institutions who have made an outstanding contribution to building bridges between
  the two nations. The Prize also fits into the social dimension of the Treaty of
  Nancy. We are determined to both honour past achievements and inspire future efforts
  aimed at bringing the Polish and French societies closer. The awardee is selected
  by a prize committee composed of members appointed by both countries’ foreign ministers.
  The Friendship Day is much more than backroom diplomacy: multiple regional events
  have been planned in both Poland and France. What is more, this initiative is a
  prelude to the Poland–France Cultural Season scheduled for 2027.'
