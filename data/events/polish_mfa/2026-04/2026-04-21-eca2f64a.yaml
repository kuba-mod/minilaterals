title: Deputy Minister Niemczycki takes part in Foreign Affairs Council (FAC) in Luxembourg
text: During a discussion on Russia’s aggression against Ukraine, Deputy Minister
  Ignacy Niemczycki stressed that the European Union should urgently approve a EUR
  90 billion loan for Ukraine. He also spoke in favour of adopting the 20th package
  of sanctions against Russia and beginning work on the next one. The deputy head
  of Polish diplomacy stressed that the EU should unlock payments to member states
  from the European Peace Facility and open the “Fundamentals” cluster in the EU’s
  accession negotiations with Ukraine as soon as possible. He also noted the need
  to support reintegration of Ukraine’s veterans and outlined Poland’s activity in
  this area. Deputy Minister Niemczycki also referred to the Veteran’s Centre in Zhytomyr,
  which offers rehabilitation and psychological support to more than 11,000 patients
  annually. He added that 16 such centres are to open this year. The top diplomats
  also discussed the tensions in the Middle East, the Armenia—Azerbaijan peace process,
  and the constantly deteriorating humanitarian situation in Sudan. As to the Middle
  East, the ministers agreed that unblocking the Strait of Hormuz and developing a
  lasting ceasefire are of paramount importance, expressing their readiness to involve
  the EU in the process. The vast majority of participants criticised the continued
  establishment of illegal Israeli settlements in the West Bank and endorsed the EU’s
  firm response. The ministers expect a boost in bilateral relations in view of the
  upcoming, first ever EU–Armenia summit in Yerevan scheduled for 4–5 May this year.
