title: Warsaw as centre of global debate on Convention on Crimes against Humanity
text: The deputy minister noted that Poland regards the draft convention prepared
  by the International Law Commission as a sound basis for further negotiations. He
  added that one of Poland’s priorities will be to enhance the protection of children
  as victims and witnesses of crime. The new convention should become a foundation
  for effective prevention and criminal liability mechanisms. Held under the honorary
  patronage of the Minister of Foreign Affairs, the conference was organised at a
  pivotal moment, just before the deadline for the UN member states to submit their
  comments on the draft convention. The event gathered prominent lawyers, historians,
  and representatives of the academia, placing Warsaw at the centre of global debate
  on the new treaty. One of its highlights was a speech by Professor Aleksandra Mężykowska,
  an expert on human rights and a candidate to the International Law Commission. In
  her analysis, among other issues, she addressed reparations for the victims of mass
  international law violations. The attendees also reflected on the historical roots
  of the notion of “crime against humanity” and the contemporary difficulties of incorporating
  them in the law. Thanks to the participation of judges from international courts
  and representatives of the academia, this conference offers a significant contribution
  to the process of drafting the first such comprehensive UN legal instrument in this
  field.
