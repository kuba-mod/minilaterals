title: Declaration of Poland on the Special Tribunal for the Crime of Aggression against
  Ukraine
text: Deputy Prime Minister Radosław Sikorski signed a declaration of will to join
  the Enlarged Partial Agreement on the Management Committee of the Special Tribunal
  for the Crime of Aggression against Ukraine. The Council of Ministers had previously
  approved the submission of the document to the Secretary General of the Council
  of Europe. The establishment of the Enhanced Agreement is a prerequisite for the
  entry into force of the agreement on the Special Tribunal for the Crime of Aggression
  against Ukraine, signed on 25 June 2025 by Ukraine and the Council of Europe. The
  Special Tribunal’s purpose is to prosecute and bring to justice the political and
  military leaders responsible for the crime of aggression against Ukraine, which
  constitutes a violation of Article 2(4) of the UN Charter and customary international
  law. Sixteen countries must submit a declaration of intent to accede to the Agreement
  before the establishment procedure of the Agreement can be initiated. According
  to the Ukrainian side, this condition has already been met. The Agreement will be
  established in Chișinău during the next session of the Council of Europe’s Committee
  of Ministers on 14–15 May 2026.
