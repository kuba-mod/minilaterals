title: Fundusz Współpracy Inicjatywy Środkowoeuropejskiej 2026 - nabór wniosków o
  granty
text: 'Wnioski mogą składać instytucje publiczne i prywatne zarejestrowane w państwie
  członkowskim IŚE (Polska), organizacje pozarządowe oraz organizacje międzynarodowe.
  Fundusz wspiera innowacyjne działania, które sprzyjają mobilności, współpracy, wymianie
  wiedzy i doświadczeń. Łączna wartość środków dostępnych w ramach ww. konkursu wynosi
  442 tys. euro. Termin zgłaszania wniosków upływa 29 maja br. Fundusz Współpracy
  IŚE finansowany jest z rocznych składek wszystkich państw członkowskich organizacji.
  Szczegółowe informacje nt. konkursu, wraz z dokumentacją, znajdują się na stronie:
  https://application.cei.int/application/cf2026/ Ewentualne pytania do konkursu można
  przesyłać do Sekretariatu Wykonawczego IŚE na adres e-mail: applications.coopfund@cei.int
  WAŻNE: Każda instytucja może złożyć tylko jeden wniosek.'
