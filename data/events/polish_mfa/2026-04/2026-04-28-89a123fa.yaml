title: Rozmowa szefów dyplomacji Polski i Libanu
text: Szef polskiej dyplomacji wyraził solidarność z Libanem i zaznaczył, że Polska
  kontynuuje programy pomocy rozwojowej i humanitarnej. Przekazał wyrazy uznania dla
  przełomowej decyzji o rozpoczęciu bezpośrednich rozmów ze stroną izraelską w Waszyngtonie.
  Minister Radosław Sikorski wyraził ponadto nadzieję, że strony wykorzystają szansę
  w celu znalezienia trwałego rozwiązania pokojowego. W trakcie rozmowy poruszono
  także tematykę sytuacji na południu Libanu. Szefowie dyplomacji Polski i Libanu
  podkreślili, że bezpieczeństwo członków misji pokojowej Tymczasowych Sił Zbrojnych
  ONZ w Libanie (UNIFIL), w tym żołnierzy Polskiego Kontyngentu Wojskowego, pozostaje
  najwyższym priorytetem.
