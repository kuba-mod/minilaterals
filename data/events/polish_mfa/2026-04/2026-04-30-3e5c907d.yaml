title: Joint Statement on the Strategic Dialogue Between Poland and the United States
text: Bolstering the Security and Defense Partnership The two delegations celebrated
  the robust security and defense partnership between the United States and Poland. 
  Both sides reaffirmed their commitment to enhance security cooperation, including
  on mutual self-defense and deterrence, and committed to exploring new opportunities
  to deepen transatlantic defense industrial cooperation that will strengthen interoperability,
  enhance Poland’s defense capabilities, and create economic opportunities in both
  countries.  Both countries recognized the importance of a strong and capable Polish
  military. The two countries reiterated their commitment to expanding energy security
  cooperation.  The United States and Poland discussed opportunities to reinforce
  their strong partnership on energy security, including through the secure delivery
  of liquefied natural gas (LNG) to the region and support for civil nuclear energy
  projects with U.S. companies to increase power generation in Poland.  Both sides
  committed to working together to ensure reliable, affordable, and secure energy
  for Poland and the region.  The United States expressed support for Poland’s ambitions
  to become a regional LNG hub that will replace the historically vulnerable east-west
  dependency model with a diversified north-south system. Enhancing Cooperation in
  Critical Technologies and Securing Supply Chains During the dialogue, the United
  States and Poland signed the Critical Minerals Framework and agreed to collaborate
  on securing critical minerals supply chains.  The United States and Poland also
  agreed on the importance of deepening cooperation on technology security, including
  by reducing dependency on high-risk vendors in sensitive sectors and protecting
  critical technology infrastructure from foreign interference.  Both countries reaffirmed
  their commitment to secure global supply chains, including expanding cooperation
  on critical minerals. The United States and Poland discussed the importance of fostering
  a competitive, innovation-driven economy in both countries.  Poland conveyed its
  appreciation to the United States for the invitation to participate, at all levels,
  in the work of the G20 during the U.S. presidency.  In turn, the United States expressed
  its strong support for Poland’s accession to the G20 as a permanent member.  Both
  sides emphasized the need for streamlined regulatory environments that support economic
  growth, entrepreneurship, and technological advancement.  The two countries expressed
  support for strong dialogue between government and business to ensure a predictable
  investment environment.  The United States welcomed Poland’s leadership on these
  issues and committed to working closely with Poland to promote policies that enhance
  bilateral trade and investment, create jobs, and drive prosperity in both countries.
