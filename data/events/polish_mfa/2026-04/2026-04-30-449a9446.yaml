title: Chief of Polish diplomacy visits Algeria
text: 'During his visit, Deputy Prime Minister Radosław Sikorski met with Algeria’s
  President Abdelmadjid Tebboune and Minister of Foreign Affairs, National Community
  Abroad and African Affairs Ahmed Attaf; as well as representatives of the Polish
  community in Algeria and members of Algeria’s political, cultural, and academic
  circles. This is the first visit by a Polish foreign minister to Algeria since 2017,
  and its main objective is to review and develop bilateral relations, especially
  in the area of economic cooperation said the head of Polish diplomacy emphasising
  the delegation’s economic dimension. Foreign Minister Sikorski was accompanied,
  among others, by: Grzegorz Wrona, Undersecretary of State at the Ministry of State
  Assets; Agnieszka Kurpińska, Vice President of the Management Board of Grupa Azoty;
  Mariusz Bogacki, Executive Director of Petrochemical Sales at ORLEN; and Karolina
  Florek, Deputy Chief Veterinary Officer. During the meeting with President Abdelmadjid
  Tebboune, discussions covered the friendly relations between the two countries dating
  back to 1962. The head of Polish diplomacy noted that Algeria is one of Poland’s
  key partners in the Middle East and North Africa (MENA) region. Both sides emphasised
  Algeria’s key role in the region as an initiator of strengthened cooperation in
  areas such as energy, agriculture, tourism, digital transition, science, and sports.
  Bilateral economic cooperation and global challenges were also at the centre of
  the exchange between Minister Radosław Sikorski and Algeria’s Minister of Foreign
  Affairs Ahmed Attaf. Our talks concerned international issues, with an emphasis
  on security, stability, and respect for international law, in the context of both
  the Ukraine war and the situation in the Middle East and the Sahel, a region with
  a prevalence of political instability, terrorism, illegal migration, and foreign
  mercenary activities The talks also highlighted the need to increase the engagement
  of Polish entrepreneurs, investors, and exporters in the Algerian market. We are
  compatible when it comes to natural gas—Algeria produces it; we need it and we are
  able to use it for fertiliser production added Poland’s top diplomat. Deputy Prime
  Minister Sikorski was hopeful to see a direct air link between Poland and Algeria.
  The visit was an occasion to highlight the particular potential of the energy sector,
  including renewable energy sources, the agri-food industry, and security. Discussions
  also revolved around the situation in the region and in the international setting.
  The interlocutors reaffirmed their commitment to the principles of international
  law as well as the significance of stability and security. The visit saw the signing
  of two documents: a memorandum of understanding between the MFA Diplomatic Academy
  and the Algerian Institute of Diplomacy and International Relations as well as a
  letter of intent in regard to cooperation between Poland’s SGH Warsaw School of
  Economics and its Algerian counterpart ESAA (Ecole Supérieure Algérienne des Affaires).'
