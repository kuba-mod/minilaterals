title: Deputy Minister Wojciech Zajączkowski visits Chad
text: 'Undersecretary of State Wojciech Zajączkowski stressed that Poland wants to
  strengthen relations with Chad and transform declarations into concrete actions—one
  of which is establishing a Polish Honorary Consulate. He also thanked the authorities
  of Chad for their effective support in releasing a Polish doctor, kidnapped in 2024.
  Deputy Minister Zajączkowski pointed out to Chad’s role in stabilising the region,
  emphasising the country’s efforts related to accepting refugees from Sudan and its
  engagement in stabilisation operations in the Sahel and the Lake Chad region. The
  officials noted the importance of international order based on multilateralism and
  respect for international law. They also referred to the role of multilateral organisations
  in the face of contemporary challenges and conflicts. In the course of the visit,
  Deputy Minister Zajączkowski took part in the inauguration of the Polish Honorary
  Consulate in Chad and delivered a lecture at the National School of Administration
  of Chad devoted to political situation and security in Central Europe. While in
  Chad, Deputy Minister Zajączkowski also visited the sites of Polish aid and development
  projects implemented in Dembe from 2024 to 2025, such as: Political consultations
  in Chad are consistent with Polish aspirations to develop relations with African
  countries in the areas of economy, politics, and security, especially in the context
  of the challenges related to the current situation in the Sahel.'
