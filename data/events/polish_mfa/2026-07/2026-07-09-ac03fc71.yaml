title: Minister Jean-Noël Barrot as Polish Heads of Missions Conference guest of honour
text: During bilateral talks, Deputy Prime Minister Radosław Sikorski and Minister
  Jean-Noël Barrot discussed current security challenges, European policy, and bilateral
  cooperation between Warsaw and Paris. They pledged to continue a close political
  dialogue and enhance cooperation in key areas, including economy, defence, and culture.
  Poland’s top diplomat stressed that France is our strategic European partner with
  a similar perception of security challenges and ongoing processes in Europe. The
  ministers also discussed the implementation of new infrastructural and industrial
  investments. Deputy Prime Minister Sikorski emphasised that Poland and France are
  bound by strong economic ties. France is our third-largest trading partner and fourth-largest
  investor in Poland. French companies provide 227,000 jobs in Poland. We are very
  interested in deepening our dialogue with France. France is our strategic partner
  in Europe and in the Weimar Triangle said Deputy Prime Minister Radosław Sikorski.
  The number of Polish businesses operating in the French market is also increasing.
  They invest mainly in the automotive, industry, construction, and IT sectors. A
  coordinated cooperation within international organisations was high on the meeting’s
  agenda. Deputy Prime Minister Sikorski appealed for support for Poland’s efforts
  to become a permanent member of the G20. The ministers also discussed current security
  risks, including in the Middle East and Ukraine. In his address to heads of missions,
  Minister Jean-Noël Barrot presented France’s perspective on the key challenges facing
  Europe and the transatlantic community. The head of French diplomacy spoke about
  security and pointed out that European countries must stay united. In his speech,
  he emphasised the importance of relations between Poland and France. The future
  of Europe belongs to Europeans. France and Poland have a special responsibility
  for this future. Those are the words of the Treaty of Nancy. We’ll have to build
  a stronger European security architecture with France and Poland as core pillars.
  It is not a question of old versus new Europe. It’s about peace and war, about freedom
  versus slavery Previously, a French foreign minister took part in the Polish Heads
  of Missions Conference in 2012, when Minister Laurent Fabius was the Conference’s
  guest of honour. In January 2025, it was Deputy Prime Minister Radosław Sikorski
  who participated in the French Ambassadors’ Conference in Paris.
