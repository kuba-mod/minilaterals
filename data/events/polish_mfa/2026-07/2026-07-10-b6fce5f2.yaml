title: Pierwsze spotkanie Polsko-Francuskiej Grupy Sterującej ds. Współpracy Nuklearnej
text: W trakcie spotkania, obie delegacje skoncentrowały się na bieżących kwestiach
  bezpieczeństwa europejskiego. Określono zakres dalszych, szczegółowych rozmów oraz
  współpracy dwustronnej w celu wzmocnienia bezpieczeństwa Polski, Francji i Europy.
