title: Odyseusz now available in mObywatel app to make travel registration even simpler
text: 'Users can log in to Odyseusz using mObywatel, the Trusted Profile (Profil Zaufany),
  an electronic ID card, or online banking. These secure authentication methods reduce
  the registration form to a minimum, as most data is filled in automatically. The
  user only needs to provide the destination and dates of travel, as well as contact
  details. After travel destination is entered, the system suggests the correct location,
  displays it on a map, and automatically shows the current travel advisory level
  issued by the Ministry of Foreign Affairs. Once registration is complete, travellers
  receive push notifications, SMS messages, and emails related to both the country
  and the specific location of their stay. The new version of Odyseusz responds to
  the needs of Polish travellers in an era of rapidly changing global security conditions.
  It facilitates travel planning but above all improves communication with the consular
  service in crisis situations. Travellers will no longer need to search missions’
  websites or social media for information. Logging takes place using secure authentication
  methods such as mObywatel, the Trusted Profile, the electronic ID card, and online
  banking - said MFA Undersecretary of State Artur Harazim. The new version of Odyseusz
  enables convenient travel planning and offers one-stop access to the MFA’s key services.
  Users can check the profiles of countries and territories featuring up-to-date information
  about security and entry and stay requirements, register their travel, and receive
  alerts and updates. In case of emergency, the system supports contact with the consular
  services. Registering your travel with the Odyseusz system is one of the easiest
  ways you can improve your safety and security abroad. Thanks to the system’s integration
  with mObywatel, the whole process takes a few minutes and is available through the
  app which is used by 12 millions of Poles - said Secretary of State at the Ministry
  of Digital Affairs Dariusz Standerski. The new Odyseusz has been fitted with a crisis
  module, which can be launched by the Ministry of Foreign Affairs in emergency situations.
  It communicates with travellers, requests assistance, provides information on consular
  activity, including evacuation, and coordinates support for Polish nationals abroad
  more efficiently. At further development stages, a dedicated Odyseusz mobile app
  will be made available offering the system’s full functionality. The portal will
  also be regularly updated with new country profiles and the latest information for
  travellers. The launch of the new version of the system was accompanied by the announcement
  of the winner of the MFA’s competition to design the Odyseusz logo. The competition
  was open to all, amateurs, future users of the system, and professional designers
  alike. Out of 22 submissions, 10 of which met formal requirements, the jury selected
  the work by Marta Krzyszkowska-Gierych—a graphic designer specialising, among other
  things, in visual identification and graphic layouts for publications. “It was thanks
  to the competition that I found out about Odyseusz,” said the winner. The winning
  logo is a reference to the notion of safe travelling. It combines a pin on a map
  with a form associated with protection—an umbrella, a capsule, or a shield—and uses
  colours similar to those of Polish flag. The new logo will be used on the website,
  in the mObywatel app and in the Odyseusz mobile app currently under development,
  becoming the system’s recognisable symbol for Polish travellers. Remember these
  three steps before starting your journey: Odyseusz—your safety starts way before
  your trip does.'
