title: Narada Kierowników Placówek Zagranicznych RP 2026
text: 'W tegorocznej Naradzie Kierowników Placówek Zagranicznych RP bierze udział
  około 170 osób kierujących ambasadami, stałymi przedstawicielstwami RP, instytutami
  polskimi, konsulatami generalnymi RP oraz wydziałami konsularnymi największych polskich
  ambasad. Wszyscy uczestnicy wzięli udział w uroczystej kolacji, do której dołączyło
  także ponad 140 konsulów honorowych RP z całego świata. Kolacja była bowiem ostatnim
  punktem trwającego od piątku Zjazdu Konsulów Honorowych. Gości przywitali podsekretarz
  stanu Artur Harazim oraz szefowa służby zagranicznej i dyrektor generalna MSZ Henryka
  Mościcka-Dendys. Głos zabrali również minister finansów Andrzej Domański i prorektor
  Politechniki Warszawskiej, prof. Mariusz Malinowski. Oficjalnie Narada Kierowników
  Placówek Zagranicznych RP rozpoczęła się 6 lipca, debatą dotyczącą strategii, w
  której wziął udział wicepremier Radosław Sikorski. Podczas panelu szef polskiej
  dyplomacji zwrócił uwagę na dynamiczny rozwój Polski w ostatnich latach: Dysproporcja
  sił między nami a Europą Zachodnią jest dziś znacznie mniejsza niż kiedyś. W przeszłości
  byliśmy rzeczywiście państwem marginalnym, bardzo biednym. Dzisiaj jesteśmy nie
  tylko znacznie bogatsi, lecz także mamy ogromną dynamikę rozwoju Szef polskiej dyplomacji
  mówił też o agresji Rosji na Ukrainę i konieczności inwestowania w obronność. Uważam,
  że przyszłą wojnę wygra ten, kto wdroży lekcje z wojny rosyjsko-ukraińskiej. Dopiero
  pożyczka SAFE daje nam środki, dzięki którym możemy zainwestować w systemu dronowe
  i antydronowe. Pytanie, czy stworzymy armię, która będzie ekwiwalentem powojennej
  armii rosyjskiej. Przecież nie tylko Ukraina odrobiła lekcję. Rosjanie także się
  uczą. Trwa wyścig: co kilka miesięcy przewagę w nowych technologiach ma raz Ukraina,
  raz Rosja Łącznie uczestnicy Narady wezmą udział w kilkunastu panelach dyskusyjnych
  i wykładach, których głównymi tematami będą kwestie bezpieczeństwa, bieżącej sytuacji
  w Europie, relacji transatlantyckich i zmian w globalnym porządku międzynarodowym.
  Gościem honorowym tegorocznej Narady będzie Minister ds. Europy i Spraw Zagranicznych
  Republiki Francuskiej Jean-Noël Barrot. W programie przewidziano również spotkania
  z przedstawicielami polskiego rządu. Ponadto zaplanowano Narady Regionalne i szkolenia
  dla szefów placówek z zarządzania zespołem oraz współpracy z mediami.'
