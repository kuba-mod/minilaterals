title: Wizyta sekretarza stanu Marcina Bosackiego w Budapeszcie
text: Wiceszef polskiej dyplomacji wziął udział w panelu „Europe under double strategic
  pressure” w ramach konferencji Budapest Energy and Security Talks. To wiodąca międzynarodowa
  konferencja strategiczna na Węgrzech, która stanowi platformę dialogu w odniesieniu
  do najważniejszych wyzwań z zakresu bezpieczeństwa i polityki energetycznej stojących
  przed wspólnotą transatlantycką. W ramach konsultacji na temat rozszerzenia Unii
  Europejskiej wiceminister Marcin Bosacki rozmawiał z sekretarzem stanu węgierskiego
  MSZ Krisztiánem Mészárosem. Podczas pobytu w Budapeszcie wiceminister Bosacki dyskutował
  o reformach przywracających państwo prawa, przeprowadzanych przez rząd Tiszy. Ponadto
  wiceszef polskiej dyplomacji udzielił wywiadu dla wiodącego i jednego z najbardziej
  niezależnych portali informacyjnych na Węgrzech HVG, przedstawiając m.in. polski
  punkt widzenia na temat relacji polsko-węgierskich oraz przyszłości Grupy Wyszehradzkiej.
  Wiceminister Bosacki odpowiadał także na pytania dotyczące długoterminowego zagrożenia
  dla bezpieczeństwa europejskiego wynikającego z polityki Rosji czy też skutków kampanii
  dezinformacyjnych prowadzonych przez Rosję i sposobów ich zwalczania.
