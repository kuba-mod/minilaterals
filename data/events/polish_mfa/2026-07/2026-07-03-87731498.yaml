title: Undersecretary of State Wojciech Zajączkowski meets with minister from Honduras
text: The talks confirmed mutual interest in the further development of political
  and economic cooperation between Poland and Honduras. While in Poland, Minister
  Marinakys attended the Meeting of Honorary Consuls. Thanks to the support of the
  Polish Investment and Trade Agency, he also met with representatives of Polish medical
  technology, fintech, IT, and waste management industries. The next stage in the
  cooperation will feature political consultations at the level of deputy foreign
  ministers, to be held in November.
