title: Odyseusz dostępny w aplikacji mObywatel. Rejestracja podróży jeszcze prostsza.
text: 'Do systemu Odyseusz można zalogować się za pomocą mObywatela, Profilu Zaufanego,
  e-dowodu lub bankowości elektronicznej. Bezpieczne metody uwierzytelniania pozwalają
  ograniczyć formularz rejestracji do minimum – większość danych uzupełnia się automatycznie.
  Użytkownik wskazuje jedynie miejsce i termin podróży oraz dane kontaktowe. Po wpisaniu
  celu wyjazdu system podpowiada właściwą lokalizację, prezentuje ją na mapie oraz
  automatycznie wyświetla aktualny poziom ostrzeżeń Ministerstwa Spraw Zagranicznych.
  Po zakończeniu rejestracji, podróżny otrzymuje powiadomienia PUSH, SMS i e-mail
  dotyczące zarówno kraju, jak i miejsca swojego pobytu. Nowa odsłona Odyseusza to
  odpowiedź na potrzeby podróżujących Polek i Polaków w dobie szybko zmieniającej
  się sytuacji bezpieczeństwa na świecie. Ułatwia planowanie podróży, ale przede wszystkim
  w sytuacjach kryzysowych usprawnia kontakt ze służbą konsularną. Podróżni nie będą
  już musieli przeszukiwać stron internetowych placówek czy mediów społecznościowych.
  Logowanie odbywa się za pomocą bezpiecznych metod uwierzytelnienia takich jak: mObywatel,
  Profil Zaufany, e-dowód i bankowość elektroniczna – podkreślił Artur Harazim, podsekretarz
  stanu w Ministerstwie Spraw Zagranicznych. Nowy Odyseusz umożliwia wygodne planowanie
  podróży i zapewnia dostęp do najważniejszych usług Ministerstwa Spraw Zagranicznych
  w jednym miejscu. Użytkownicy mogą sprawdzić profile państw i terytoriów z aktualnymi
  informacjami o bezpieczeństwie, warunkach wjazdu i pobytu, zarejestrować swój wyjazd
  oraz otrzymywać powiadomienia o zmianach sytuacji i ostrzeżeniach. W razie wystąpienia
  sytuacji nadzwyczajnych system wspiera również kontakt ze służbą konsularną. Rejestracja
  podróży w systemie Odyseusz to jeden z najprostszych sposobów na zwiększenie własnego
  bezpieczeństwa za granicą. Dzięki integracji z mObywatelem cały proces zajmuje kilka
  minut i jest dostępny w aplikacji, z której korzysta już ponad 12 milionów Polek
  i Polaków - powiedział sekretarz stanu z Ministerstwa Cyfryzacji Dariusz Standerski.
  Nowy Odyseusz został wyposażony w moduł kryzysowy, który może zostać uruchomiony
  przez Ministerstwo Spraw Zagranicznych w sytuacjach nadzwyczajnych. Pozwala on na
  komunikację z podróżnymi, zgłaszanie potrzeby pomocy, przekazywanie informacji o
  działaniach konsularnych, w tym ewakuacji, oraz sprawniejsze koordynowanie wsparcia
  dla obywateli przebywających za granicą. W kolejnych etapach rozwoju udostępniona
  zostanie dedykowana aplikacja mobilna Odyseusz oferująca pełną funkcjonalność systemu.
  Portal będzie również systematycznie rozbudowywany o nowe profile państw i aktualne
  informacje dla podróżujących. Premierze nowej odsłony systemu towarzyszyło rozstrzygnięcie
  konkursu Ministerstwa Spraw Zagranicznych na jego znak graficzny Odyseusza. Konkurs
  był otwarty dla wszystkich zainteresowanych – zarówno amatorów i przyszłych użytkowników
  systemu, jak i profesjonalnych projektantów. Spośród 22 zgłoszonych prac, z których
  10 spełniło wymagania formalne, jury wybrało projekt Marty Krzyszkowskiej-Gierych
  – graficzki i projektantki zajmującej się m.in. tworzeniem identyfikacji wizualnej
  oraz opraw graficznych publikacji. – Dowiedziałam się o istnieniu Odyseusza właśnie
  dzięki ogłoszonemu konkursowi - zaznaczyła zwyciężczyni. Zwycięskie logo nawiązuje
  do idei bezpiecznego podróżowania. Łączy motyw pinezki na mapie z formą kojarzącą
  się z ochroną – parasolem, kapsułą lub osłoną – oraz wykorzystuje barwy nawiązujące
  do polskich kolorów narodowych. Nowy znak będzie wykorzystywany w serwisie internetowym,
  aplikacji mObywatel oraz przygotowywanej aplikacji mobilnej Odyseusz, stając się
  rozpoznawalnym symbolem systemu dla podróżujących Polek i Polaków. Pamiętaj o trzech
  krokach przed wyjazdem: Odyseusz – Twoje bezpieczeństwo zaczyna się jeszcze przed
  podróżą.'
