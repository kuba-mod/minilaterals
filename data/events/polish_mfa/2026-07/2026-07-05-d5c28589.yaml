title: II Zjazd Konsulów Honorowych RP
text: 'Podczas Zjazdu konsulowie honorowi mogli wymienić się doświadczeniami dotyczącymi
  funkcji, którą pełnią. Wzięli też udział w panelach merytorycznych, podczas których
  mogli pogłębić swoją wiedzę na temat budowania polskiej marki w świecie oraz potencjału
  ekonomiczno-naukowo-kulturalnego Polski. Z uczestnikami Zjazdu spotkała się Marszałek
  Senatu RP Małgorzata Kidawa-Błońska oraz przedstawiciele m.st. Warszawy. W programie
  wydarzenia były także spotkania związane z kulturą i historią Polski. Konsulowie
  honorowi towarzyszyli wiceministrowi Władysławowi Teofilowi Bartoszewskiemu w uroczystym
  złożeniu kwiatów przed Grobem Nieznanego Żołnierza i wzięli udział w recitalu fortepianowym
  na Zamku Królewskim. I Zjazd Konsulów Honorowych odbył się 18 lat temu z inicjatywy
  ministra Radosława Sikorskiego. Przed tegorocznym Zjazdem szef polskiej dyplomacji
  podkreślał istotną rolę, jaką odgrywają konsulowie honorowi we współczesnej dyplomacji.
  Konsulowie honorowi reprezentujący Polskę na świecie stanowią istotny element polskiej
  służby konsularnej. Wspierają naszych konsulów oraz są budowniczymi mostów pomiędzy
  Polską a państwami w których mieszkają Pomimo wykonywania jedynie wybranych zadań
  konsularnych, konsulaty honorowe stanowią ważne wsparcie dla służby zagranicznej
  i zwiększają skuteczność jej działań. Konsulowie honorowi RP stoją na straży praw
  i interesów Rzeczypospolitej Polskiej i jej obywateli, udzielają pomocy konsularnej
  naszym rodakom przebywającym w ich okręgu konsularnym, ułatwiają nawiązywanie kontaktów
  pomiędzy zainteresowanymi polskimi podmiotami gospodarczymi a tymi działającymi
  w państwie przyjmującym, co sprzyja rozwojowi dwustronnej współpracy gospodarczej.
  Konsulowie honorowi dbają również o prezentowanie pozytywnego wizerunku Polski,
  a także wspierają działania polskiej diaspory. Obecnie Konsulów RP wspiera 218 konsulów
  honorowych. Swoje funkcje wykonują na 6 kontynentach. Liczba urzędów konsularnych
  kierowanych przez konsulów honorowych na świecie stale się zwiększa. W 2026 roku Wicepremier,
  Minister Spraw Zagranicznych RP Radosław Sikorski powołał konsulów honorowych w:
  Orleanie (Francja), Douglas (Wyspa Man​), Bryan (USA), Prai (Republika Zielonego
  Przylądka), Surprise (USA), Plaine Magnien (Mauritius), Bergen (Norwegia), Vaduz
  (Liechtenstein), Belmopan (Belize) oraz Aronie (Hiszpania).'
