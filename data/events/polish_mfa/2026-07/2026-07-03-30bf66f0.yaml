title: Rozmowy ministrów spraw zagranicznych Polski i Mozambiku
text: 'Wicepremier Radosław Sikorski wyraził nadzieję na dynamizację relacji dwustronnych.
  Podkreślił, że regularne kontakty dyplomatyczne będą stanowić dobrą podstawę do
  dalszego rozwoju współpracy bilateralnej. Za perspektywiczny dla relacji dwustronnych
  uznano sektor energetyczny z uwagi na zasoby naturalne Mozambiku. To państwo posiada
  trzecie co do wielkości złoża gazu ziemnego w Afryce. Uwagę poświęcono także sektorom:
  infrastruktury, gospodarki cyfrowej oraz zaawansowanych technologii dla rolnictwa.
  Ministrowie Radosław Sikorski i Maria Manuel dos Santos Lucas omówili sytuację polityczną
  i bezpieczeństwa w regionie Afryki Południowej oraz aktywność Misji Wsparcia Wojskowego
  UE w Mozambiku (UEMAM Mozambique) w prowincji Cabo Delgago. Omówiono możliwości
  wzmocnienia trwałych zdolności operacyjnych mozambickich sił szybkiego reagowania.
  Szef polskiej dyplomacji podkreślił, że poprawa bezpieczeństwa i skuteczne sprawowanie
  rządów ma zasadnicze znaczenie dla powodzenia realizacji celów UEMAM oraz stabilizacji
  regionu przez władze Mozambiku. Szefowie dyplomacji potwierdzili przywiązanie do
  zasady suwerenności i integracji terytorialnej, zgodnie z brzmieniem Karty ONZ.
  W rozmowie poruszono także kwestię rosyjskiej wojny w Ukrainie i jej skutków dla
  Europy oraz Afryki. Wizyta w Warszawie jest pierwszym etapem europejskiej podróży
  minister spraw zagranicznych Mozambiku.'
