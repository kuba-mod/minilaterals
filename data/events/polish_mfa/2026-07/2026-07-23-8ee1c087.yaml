title: Spotkanie szefów dyplomacji Polski i Palestyny
text: Wicepremier Radosław Sikorski przypomniał, że Palestyna od 2005 r. stanowi priorytetowy
  obszar polskiej pomocy humanitarnej i rozwojowej oraz zapewnił o kontynuacji tej
  polityki oraz o dalszym wsparciu dla Agencji Narodów Zjednoczonych ds. Pomocy Uchodźcom
  Palestyńskim na Bliskim Wschodzie (UNRWA). Palestyna jest od lat krajem priorytetowym
  w programie polskiej pomocy. Zaangażowanie Polski w pomoc humanitarną i rozwojową
  dla Palestyny nie zmalało po rosyjskiej agresji na Ukrainę w lutym 2022 roku. Wręcz
  przeciwnie – znacząco wzrosło. (...) W latach 2023-2025 pomoc humanitarna i rozwojowa
  Polski dla Palestyny osiągnęła wartość 20 mln USD, przy czym zdecydowana większość
  środków (ok. 11 mln USD) została przekazana za pośrednictwem agencji ONZ, w tym
  UNRWA Wyraziłam uznanie dla aktywnego zaangażowania Polski w działania prowadzone
  w ramach Unii Europejskiej i Organizacji Narodów Zjednoczonych. Doceniam również
  konsekwentne wsparcie Polski na rzecz budowy i wzmacniania instytucji palestyńskich
  – zaznaczyła szefowa dyplomacji Palestyny dr Varsen Aghabekian. Minister Sikorski
  podkreślił wsparcie Polski dla aspiracji narodu palestyńskiego i jego prawa do samostanowienia.
  Zaznaczył, że Polska konsekwentnie wspiera „rozwiązanie dwupaństwowe”, które wywodzi
  się z rezolucji Rady Bezpieczeństwa ONZ nr 242 z roku 1967. Polska uznała państwowość
  Palestyny w 1988 r. Wspieramy cel, jakim jest rozwiązanie dwupaństwowe, czyli -
  pokojowe współistnienie Palestyny i Izraela, w granicach uznanych międzynarodowo,
  szanujących swoją suwerenność i integralność terytorialną - powiedział wicepremier
  Radosław Sikorski. W rozmowie poruszono także kwestie Planu Pokojowego prezydenta
  Donalda Trumpa dla Strefy Gazy, usankcjonowanego rezolucją Rady Bezpieczeństwa ONZ
  nr 2803 z 17 listopada 2025 r. oraz sytuację na Zachodnim Brzegu. Wicepremier Sikorski
  z zadowoleniem przyjął również informację o ogłoszeniu wyborów do Palestyńskiej
  Rady Legislacyjnej, planowanych jesienią bieżącego roku.
