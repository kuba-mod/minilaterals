title: Wicepremier, minister spraw zagranicznych Radosław Sikorski z wizytą w Republice
  Południowej Afryki
text: 'Podczas spotkania z ministrem ds. stosunków międzynarodowych i współpracy RPA
  Ronaldem Lamolą, wicepremier Radosław Sikorski z zadowoleniem odnotował zainteresowanie
  RPA rozwojem głębszych relacji z Unią Europejską oraz rosnącą rolę tego państwa
  w mediowaniu między stronami konfliktów, nie tylko na kontynencie Afryki. Rozmówcy
  omówili również problematykę G20 w kontekście sprawowanej przez Stany Zjednoczone
  prezydencji oraz perspektyw ewolucji tego ugrupowania w kolejnych latach. Zapewniłem
  pana Ministra, że nasz rząd ma ambicję dołączenia do G20, ale nie kosztem RPA. Obie
  strony doskonale to rozumieją. Nasze poparcie dla współpracy wielostronnej i dialogu
  międzynarodowego jest niezachwiane i solidne. Podzielamy to podejście z partnerami
  z Republiki Południowej Afryki. Proces uzyskania pełnego członkostwa wymaga czasu
  i mamy nadzieję, że Republika Południowej Afryki – członek G20 – będzie naszym dobrym
  partnerem na tej drodze Szefowie dyplomacji Polski i RPA wyrazili nadzieję na dalszy
  rozwój dwustronnych stosunków politycznych i gospodarczych, czego jednym z elementów
  ma być organizacja, w IV kwartale 2026 r., posiedzenia Dwustronnej Komisji Gospodarczej.
  Ministrowie podkreślili i docenili rolę, jaką oba państwa odgrywają na swoich kontynentach
  oraz w wymiarze globalnej polityki międzynarodowej. Nasza rozmowa dotyczyła przede
  wszystkim współpracy gospodarczej. Wartość wymiany handlowej przekroczyła 1,5 mld
  USD w 2025 r. i liczymy na zacieśnienie tych wzajemnie korzystnych relacji Podczas
  wizyty ministrowi towarzyszył podsekretarz stanu w Ministerstwie Rozwoju i Technologii
  Michał Baranowski oraz przedstawiciele zarządów polskich przedsiębiorstw: TAURON,
  WB Group, Torhamer oraz Węglokoks. Doceniamy rosnące zainteresowanie firm południowoafrykańskich
  rynkiem polskim. Dostrzegamy znaczny potencjał w zakresie wzmocnienia dwustronnej
  wymiany handlowej i inwestycji. Sektory takie jak górnictwo i przetwórstwo, surowce
  krytyczne, transformacja energetyczna oraz logistyka oferują obiecujące możliwości
  W Pretorii wicepremier Sikorski uczestniczył w spotkaniu z młodymi dyplomatami,
  w ramach którego wygłosił wykład. Wicepremier Sikorski spotkał się także z południowoafrykańską
  Polonią oraz złożył kwiaty pod Pomnikiem Katyńskim w Johannesburgu.'
