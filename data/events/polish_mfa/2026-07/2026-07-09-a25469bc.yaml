title: Minister Jean-Noël Barrot gościem honorowym Narady Kierowników Placówek Zagranicznych
  RP
text: Podczas spotkania dwustronnego wicepremier Radosław Sikorski i minister Jean-Noël
  Barrot omówili bieżące sprawy dotyczące bezpieczeństwa, polityki europejskiej oraz
  współpracy bilateralnej między Warszawą a Paryżem. Zadeklarowali kontynuację ścisłego
  dialogu politycznego i rozwój współpracy w kluczowych obszarach, w tym m.in. gospodarce,
  obronności oraz kulturze. Szef polskiej dyplomacji podkreślał, że Francja jest naszym
  strategicznym partnerem w Europie, o podobnej percepcji wyzwań bezpieczeństwa i
  procesów zachodzących na płaszczyźnie europejskiej. Ministrowie omówili też kwestie
  związane z realizacją nowych inwestycji infrastrukturalnych i przemysłowych. Wicepremier
  Sikorski zaznaczył, że Polskę i Francję łączą silne relacje gospodarcze. Francja
  jest naszym trzecim najważniejszym partnerem handlowym i czwartym inwestorem w Polsce.
  Francuskie firmy utrzymują 227 tysięcy miejsc pracy w Polsce. Jesteśmy bardzo zainteresowani
  pogłębianiem dialogu z Francją. Jest naszym strategicznym partnerem w Europie i
  Trójkącie Weimarskim powiedział wicepremier Radosław Sikorski. Polskie przedsiębiorstwa
  także coraz częściej prowadzą działalność na francuskim rynku. Inwestują głównie
  w sektorze motoryzacyjnym, produkcji przemysłowej, budownictwie i usługach informacyjnych.
  Ważnym elementem spotkania była kwestia koordynacji współpracy na forum organizacji
  międzynarodowych. Wicepremier Sikorski apelował o poparcie polskich starań o stały
  udział w pracach Grupy G20. Ministrowie dyskutowali także o bieżących wyzwaniach
  związanych z bezpieczeństwem, w tym na Bliskim Wschodzie i w Ukrainie. W swoim wystąpieniu
  dla kierowników placówek zagranicznych minister Jean-Noël Barrot przedstawił francuską
  perspektywę wobec najważniejszych wyzwań stojących przed Europą i wspólnotą transatlantycką.
  Szef francuskiej dyplomacji mówił o kwestiach związanych z bezpieczeństwem i zaznaczył,
  że konieczne jest utrzymanie jedności państw europejskich. W swoim wystąpieniu podkreślał
  też wagę relacji łączących Polskę i Francję. Przyszłość Europy jest w rękach Europejczyków.
  Francja i Polska mają wyjątkową odpowiedzialność za to, jak będzie wyglądać jutro
  naszego kontynentu. Takie jest przesłanie Traktatu z Nancy. Wspólnie musimy budować
  silniejszą europejską architekturę bezpieczeństwa, której fundamentem będzie współpraca
  Francji i Polski. Nie chodzi o podział na starą i nową Europę. Chodzi o wybór między
  pokojem a wojną, między wolnością a niewolą Poprzednia wizyta francuskiego ministra
  spraw zagranicznych na polskiej Naradzie Kierowników Placówek Dyplomatycznych miała
  miejsce w 2012 r. Gościem honorowym był wtedy minister Laurent Fabius. Z kolei w
  styczniu 2025 r. wicepremier Radosław Sikorski uczestniczył w Paryżu w Konferencji
  Ambasadorów Francji.
