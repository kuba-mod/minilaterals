title: Meeting on commemorating Polish victims of German Nazi concentration camps
text: The meeting was opened by Head of the Foreign Service and Director General Henryka
  Mościcka-Dendys and Undersecretary of State at the Ministry of Culture and National
  Heritage Marek Krawczyk. According to the MFA director general, cooperation between
  the institutions needs to be streamlined. As the goals for the nearest future, she
  identified analysing the presence of Polish representatives on advisory bodies at
  memorial sites and reviewing the coverage of Poland-related themes in the exhibitions
  presented there. Still, a major challenge is the lack of knowledge within German
  society regarding the history of the Second World War in Central and Eastern Europe
  and the Polish victims of that war, as well as the shortage of academic and popular
  history literature in German. Therefore, we should strive for a wider use of the
  Polish-German history textbook in schools and, hopefully, in academic teaching -
  emphasised Director General Henryka Mościcka-Dendys. Karol Polejowski, Deputy President
  of the Institute of National Remembrance (IPN), and Michał Syska, Deputy Head of
  the Office for War Veterans and Victims of Oppression, noted the need to develop
  lasting mechanisms for cooperation between state institutions and organisations
  bringing together former prisoners and their families. They also stressed that efforts
  should be made to improve access to information about Polish victims in exhibitions
  at memorial sites and to ensure broader representation of Polish groups at anniversary
  commemorations. During the meeting, representatives of the Foundation for Polish-German
  Reconciliation presented information on the current challenges faced by associations
  of former prisoners and their families. Representatives of the Berlin branch of
  the Witold Pilecki Institute of Solidarity and Valor outlined their educational
  activities aimed at audiences in Germany. The discussion was also attended by heads
  of Polish diplomatic missions and consular offices in Germany and Austria, who provided
  detailed information on individual memorial sites. Meeting participants agreed about
  the need to continue discussion on how to conduct an effective history policy towards
  Germany and Austria and work out a set of potential joint measures.
