title: Podsekretarz stanu Wojciech Zajączkowski spotkał się z ministrem Hondurasu
text: Rozmowy potwierdziły wspólne zainteresowanie dalszym wzmacnianiem współpracy
  politycznej i gospodarczej między Polską a Hondurasem. Podczas wizyty w Polsce minister
  Marinakys uczestniczy w Zjeździe Konsulów Honorowych RP. Przy wsparciu Polskiej
  Agencji Inwestycji i Handlu odbywa także spotkania z przedstawicielami polskich
  firm z sektorów technologii medycznych, fintech, IT i gospodarki odpadami. Kolejnym
  krokiem współpracy są zaplanowane na listopad konsultacje polityczne na szczeblu
  wiceministrów spraw zagranicznych.
