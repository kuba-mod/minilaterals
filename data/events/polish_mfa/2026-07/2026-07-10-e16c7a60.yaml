title: Podsumowanie Narady Kierowników Placówek Zagranicznych RP
text: 'Narada oficjalnie rozpoczęła się 5 lipca od spotkania kierowników placówek
  zagranicznych z konsulami honorowymi RP, którzy brali udział w Zjeździe w Warszawie
  . Podczas uroczystości w budynku Politechniki Warszawskiej gości przywitali Dyrektor
  Generalna, Szefowa Służby Zagranicznej Henryka Mościcka-Dendys oraz Podsekretarz
  Stanu Artur Harazim. W wydarzeniu uczestniczyli również przedstawiciele rządu. Po
  oficjalnym otwarciu kierownicy placówek zagranicznych przez 5 dni uczestniczyli
  w wykładach i dyskusjach. Zaczęli od panelu strategicznego z udziałem wicepremiera
  Radosława Sikorskiego.  Minister spraw zagranicznych mówił o bezpieczeństwie, rozwoju
  gospodarki oraz miejscu Polski na arenie międzynarodowej. Jeśli chodzi o nasza rolę
  w G20, ale także Organizacji Narodów Zjednoczonych, to myślę, że ciągle płacimy
  spóźnioną cenę za komunizm. Gdybyśmy przez te 45 lat nie znajdowali się po drugiej
  stronie żelaznej kurtyny, to po pierwsze, bylibyśmy członkiem-założycielem Unii
  Europejskiej. Po drugie, nie bylibyśmy razem ze Związkiem Radzieckim zaliczani w
  ONZ do grupy państw wschodnioeuropejskich, gdzie do dziś jesteśmy w pewnym sensie
  dyskryminowani W panelach podczas Narady brali udział wszyscy członkowie Kierownictwa
  MSZ. W swoich wystąpieniach dla kierowników placówek zgłębiali zagadnienia polskiej
  polityki zagranicznej. Jednym z najważniejszych punktów Narady było spotkanie polskich
  dyplomatów z gościem honorowym – Ministrem ds. Europy i Spraw Zagranicznych Francji
  Jean-Noëlem Barrotem. Wicepremier Radosław Sikorski podczas wspólnej konferencji
  z szefem francuskiej dyplomacji mówił o wyjątkowych relacjach pomiędzy Warszawą
  a Paryżem. Podkreślał, że nasza współpraca gospodarcza nabrała tempa po wejściu
  w życie traktatu z Nancy, czyli Traktatu o wzmocnionej współpracy i przyjaźni między
  Rzecząpospolitą Polską a Republiką Francuską. Podczas spotkania z polskimi dyplomatami
  minister Barrot podkreślał wartość wielowiekowej przyjaźni i współpracy polsko-francuskiej.
  Historia zawsze stawiała nas po tej samej stronie – od czasów Napoleona i polskich
  legionów marszałka Poniatowskiego po armię generała Hallera, od Monte Cassino po
  Normandię, gdzie walczyliśmy o tę samą sprawę: wolność. Jednak to, co łączy Francję
  i Polskę, to coś więcej niż tylko historia. To całkowita odmowa pogodzenia się z
  fatalizmem, przekonanie, że zawsze warto walczyć o wolność i że nadzieja nigdy nie
  umiera – mówił minister Jean-Noël Barrot. Szef francuskiej dyplomacji wskazał też
  na wyzwania, z którymi obecnie mierzy się Europa – między innymi dotyczącymi bezpieczeństwa.
  O bezpieczeństwie, podczas spotkania z kierownikami placówek zagranicznych, mówili
  także wicepremier, minister obrony narodowej Władysław Kosiniak-Kamysz i wiceminister
  obrony narodowej, pełnomocnik rządu do spraw Instrumentu na rzecz Zwiększenia Bezpieczeństwa
  Europy Magdalena Sobkowiak-Czarnecka. Szef MON podsumował ostatni szczyt NATO w
  Ankarze. Polska jest dziś liderem zbrojeń. To najczęściej powtarzane zdanie na Szczycie
  NATO. Miarą sukcesu, jaki odnieśliśmy na ostatnim Szczycie, jest miejsce, w którym
  Polska zabrała głos w trakcie sesji ogólnej zgromadzenia sojuszniczego. Wynikało
  to z naszej aktywności w Sojuszu i naszych inwestycji w kolektywną obronę. Pierwszy
  głos zabrał gospodarz, potem prezydencja, a tuż po niej Stany Zjednoczone, Niemcy
  i Polska. Przed Wielką Brytanią, przed Francją, przed Włochami, przed Kanadą i innymi
  sojusznikami – to pokazuje, jaką drogę przeszliśmy od 1999 roku i jak umocniliśmy
  się w Sojuszu – mówił wicepremier Władysław Kosiniak-Kamysz. Z kolei minister Sobkowiak-Czarnecka
  przedstawiła zmiany, jakie zaszły w polskiej branży zbrojeniowej. Zaznaczyła, że
  Polska zaczyna być eksporterem rozwiązań i w kompleksowy sposób kieruje swoją ofertę
  do odbiorców w Europie i nie tylko. Z kierownikami placówek zagranicznych spotkał
  się także wicepremier, minister cyfryzacji Krzysztof Gawkowski, który mówił o osiągnięciach
  polskiej administracji i sektora prywatnego w dziedzinie usług cyfrowych. Z kolei
  minister finansów Andrzej Domański w swoim wystąpieniu podkreślił dynamiczny wzrost
  polskiej gospodarki i zaznaczył, że sukces należy utrwalać konkretnymi działaniami,
  które można realizować także dzięki współpracy z polskimi placówkami zagranicznymi.
  Uczestnicy Narady rozmawiali także m.in. z marszałkiem Sejmu Włodzimierzem Czarzastym,
  marszałek Senatu Małgorzatą Kidawą-Błońską, wicemarszałkami obu izb oraz przewodniczącymi
  komisji parlamentarnych spraw zagranicznych i europejskich. Kierownicy placówek
  zagranicznych wzięli również udział w szkoleniach dotyczących m.in. współpracy z
  mediami i zarządzania zespołem oraz spotkali się z polskimi przedsiębiorcami.'
