title: Komunikat w sprawie wrogich działań Federacji Rosyjskiej w cyberprzestrzeni
text: 'Oświadczenie UE wskazuje, że 16 Centrum Federalnej Służby Bezpieczeństwa (FSB)
  Rosji prowadzi szeroko zakrojoną wrogą działalność w cyberprzestrzeni wymierzoną
  w: W przeprowadzanie ataków Rosja angażuje zarówno służby wywiadowcze, cyberprzestępców,
  samozwańcze grupy haktywistyczne, jak i prywatne przedsiębiorstwa. System ten służy
  działaniom destrukcyjnym oraz operacjom wpływu ukierunkowanym na destabilizację
  struktur i procesów decyzyjnych państw UE i NATO. W pełni popieramy decyzję UE o
  przyjęciu, w odpowiedzi na wrogie działania Rosji w cyberprzestrzeni, środków ograniczających
  pod postacią cybersankcji. Po raz pierwszy na tak szeroką skalę sankcje obejmują
  nie tylko osoby fizyczne, lecz także inne podmioty zaangażowane w prowadzenie wrogich
  operacji w cyberprzestrzeni. Są one reakcją na wrogie działania naruszające prawo
  międzynarodowe oraz obowiązujące normy i zasady. W obliczu stałego wzrostu zagrożeń
  w cyberprzestrzeni, Polska aktywnie działa na rzecz: ochrony krajowej infrastruktury
  krytycznej, budowania odporności, wzmacniania cyberoobrony. We współpracy z sojusznikami
  stosujemy wszelkie dostępne narzędzia presji dyplomatycznej służące publicznemu
  potępieniu i pociągnięciu do odpowiedzialności sprawców cyberataków. Pełną treść
  oświadczeń UE i NATO można znaleźć tutaj:'
