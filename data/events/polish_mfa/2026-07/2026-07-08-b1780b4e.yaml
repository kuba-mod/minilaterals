title: Deputy Prime Minister Radosław Sikorski takes part in Ankara NATO Summit
text: NATO Allies confirmed their progress in fulfilling The Hague defence commitment,
  taken on during last year’s Summit. It involves increasing the annual defence spending
  to 5% of GDP, allocating at least 3.5% of GDP to resourcing core defence requirements
  and 1.5% of GDP to broader defence- and security-related investments. A greater
  role assumed by European states and Canada will reinforce Allied security while
  they are building their defence capabilities. Putin forced us to spend more on defence.
  Obviously, we would have preferred to earmark these funds for something else, but
  if security is lacking, it is impossible to enjoy other aspects of civilised life
  said Deputy Prime Minister Radosław Sikorski. He also underlined that if the Allies
  merely honour their commitment, the European member states will be cable of deterring
  Russia by the end of this decade. On the sidelines of the Summit, Deputy Prime Minister
  Radosław Sikorski attended meetings with NATO’s partners forming the Istanbul Cooperation
  Initiative (Bahrain, Kuwait, Qatar, and the United Arab Emirates) as well as a session
  of the NATO–Ukraine Council with the participation of EU High Representative for
  Foreign Affairs and Security Policy Kaja Kallas. Poland’s top diplomat also met
  with his counterparts from the European Group of Five (E5), that is France, Germany,
  Italy, and the United Kingdom, as well as with the EU and Türkiye’s representatives,
  to discuss further cooperation centred on European security. We are determined to
  make sure everyone understands that today it is not feasible for two countries to
  run the European Union. This is why we are committed to the E5 format This engagement
  was a follow-up to the meeting of E5 leaders held in Berlin on 24 June 2026. At
  the invitation of the United States, Minister of Foreign Affairs Radosław Sikorski
  represented Poland at a meeting with his Danish, Finnish, German, Norwegian, Swedish,
  and Turkish counterparts. During the meeting, US Secretary of State Marco Rubio
  praised Allied efforts to reinforce the key areas of NATO’s industrial base and
  expand arms production. Minister Radosław Sikorski also held bilateral meetings,
  including one with Iceland’s Minister for Foreign Affairs Þorgerður Katrín Gunnarsdóttir,
  which marked the hand-over of the presidency of the Council of the Baltic Sea States
  from Poland to Iceland. Additionally, the chief of Polish diplomacy met with Kuwait’s
  Minister of Foreign Affairs Sheikh Jarrah Jaber Al-Ahmad Al-Sabah to discuss the
  plans to assign the Polish mission in Kuwait as a NATO Contact Point Embassy in
  2027.
