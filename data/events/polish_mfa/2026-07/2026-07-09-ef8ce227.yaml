title: Statement of the Resilience Council on Russian Disinformation Concerning the
  Volhynian Crime
text: In recent days, Russia has intensified these efforts through the Federal Security
  Service (FSB), the successor to the NKVD and the KGB, by declassifying allegedly
  previously unknown documents purportedly demonstrating that the crimes committed
  by Ukrainians against Poles in July 1943 were more extensive than previously believed.
  These documents concern the alleged murder of eleven Catholic priests and two thousand
  inhabitants of Volodymyr-Volynskyi. Polish historians have expressed scepticism
  regarding the authenticity and credibility of the information contained in these
  materials, emphasizing that the event described in the documents did not occur.
  Most likely, in an effort to maximise the propaganda effect, the Russian propaganda
  apparatus combined incidents that took place in different locations and at different
  times. This is not an attempt to uncover previously unknown historical facts, but
  rather an effort to transfer emotions associated with past events into present-day
  Polish-Ukrainian relations in order to undermine and ultimately damage them. Russia's
  actions also form part of a broader attempt to exploit the FSB materials to undermine
  the credibility of Ukrainian institutions countering disinformation, including the
  Centre for Countering Disinformation, which had already warned on 4 July about a
  Russian information operation concerning Volhynia planned for 5 July. The use of
  a document that is most likely authentic in form but contains false information
  appears to have been intended to discredit the Ukrainian side's warnings about Russian
  disinformation activities. If such a perception were to take hold, it could deepen
  prejudice and distrust towards institutions engaged in countering Russian disinformation,
  which would not serve Poland's interests. Therefore, while reaffirming the importance
  of Polish historical memory and acknowledging the emotions associated with the Volhynian
  crime, as well as expressing a critical assessment of the decision to name a Ukrainian
  military unit after the "Heroes of the Ukrainian Insurgent Army" , the Council calls
  on the public not to react to information concerning the Volhynian crime originating
  from Russian or otherwise unverified sources until it has been examined by Polish
  historians. The Council also calls for restraint in responding to statements and
  reports from the Ukrainian side. It is important to remember that the Volhynian
  crime has long been exploited by the Russian propaganda machine to deepen divisions
  between the Polish and Ukrainian nations, with the Kremlin's ultimate objective
  of provoking conflict between the two countries and undermining their cooperation.
  Such an outcome would serve Russia's strategic interests. Preventing such a scenario
  is a vital interest of Poland, as it would pose a direct threat to our national
  security. We therefore call for restraint in emotions directed towards Ukrainian
  society and for a critical and cautious approach to information designed to provoke
  such emotions . We must remember that misunderstandings between Poles and Ukrainians
  ultimately serve Russia's interests. The Council also calls on the competent institutions
  and political actors in Poland to respond appropriately, in particular by undertaking
  information activities that, on the one hand, expose and refute Russian manipulation
  and its underlying objectives and, on the other hand, provide the public with an
  impartial, credible, and fact-based account of the situation.
