title: Wizyta wicepremiera Radosława Sikorskiego w Kalifornii
text: Podczas spotkania w Bibliotece Prezydenckiej Ronalda Reagana wicepremier Sikorski
  wygłosił przemówienie na temat zaangażowania prezydenta Ronalda Reagana w walkę
  o prawo Polaków do suwerenności i jego postawy wobec Związku Radzieckiego. Przypomniał
  wystąpienie, w którym prezydent Reagan nazwał Związek Radziecki „imperium zła”.
  Przemówienie, w którym wspomniał o „imperium zła” miało znaczenie, ponieważ przywróciło
  kwestię moralności do polityki zagranicznej. Reagan przypomniał światu, że jest
  różnica między dobrem a złem, między wolnością a tyranią, między prawdą a kłamstwem.
  Wierzył, że Stany Zjednoczone powinny – i mogły – być siłą dobra. – mówił wicepremier
  Sikorski i dodał, że prezydent Reagan rozumiał, że wolny naród musi być silny, ale
  także, że wielka władza bez wyższego celu jest pozbawiona sensu i nieskuteczna.
  Wicepremier Sikorski przekazał Bibliotece Prezydenckiej dwa prezenty – kopię Uchwały
  przyjętej 29 maja 2026 r. przez Sejm RP z okazji 250-lecia USA oraz zdjęcie ze strajku
  w Stoczni Gdańskiej. Sukces strajku doprowadził do powstania Solidarności i był
  jedną z cegieł wyjętych z muru komunizmu. Uważam, że to istotne. To miejsce, które
  odwiedził Ronald Reagan po objęciu prezydentury. Podczas spotkania w Bibliotece
  Prezydenckiej szef polskiej dyplomacji wziął także udział w dyskusji na temat znaczenia
  transatlantyckiego partnerstwa między Warszawą a Waszyngtonem. Podczas wizyty wicepremier
  Sikorski spotkał się z Gubernatorem Kalifornii Gavinem Newsomem. Ponad godzinna
  rozmowa dotyczyła relacji transatlantyckich, podsumowania szczytu NATO w Ankarze
  oraz wzmacniania relacji polsko-amerykańskich. Polska i Kalifornia rozwijają współpracę,
  m.in. w obszarze cyberbezpieczeństwa. Szef MSZ zauważył, że gdyby Kalifornia była
  państwem, byłaby czwartą gospodarka świata. Jest też globalnym laboratorium innowacji
  – odpowiada za około 18% światowych wydatków na badania i rozwój. Pozostaje również
  centrum inwestycji w innowacyjne przedsiębiorstwa – przyciąga większość finansowania
  Venture Capital w USA. To rynek, na którym aktywnie działają polscy przedsiębiorcy
  - współtworzą globalne technologie i biznes. W Dolinie Krzemowej wicepremier Sikorski
  spotkał się z przedstawicielami firmy, która pomaga polskim startupom. Rozmowa dotyczyła
  między innymi relacji z inwestorami i ram wsparcia instytucjonalnego na amerykańskim
  rynku. Podczas wizyty na zachodnim wybrzeżu USA wicepremier Radosław Sikorski nominował
  trzech nowych Konsulów Honorowych RP. W Belmont w Kalifornii funkcję konsula honorowego
  będzie pełniła Dianne Panos Taube; w Napa, także w stanie Kalifornia, tę funkcję
  obejmie Gregory G. Flynn. Z kolei Tomasz Niemyjski będzie reprezentował polskie
  interesy w Surprise, w stanie Arizonie. Wszyscy są aktywnie zaangażowani w sprawy
  Polonii. Konsulowie honorowi zapewniają wsparcie dla służby zagranicznej i zwiększają
  skuteczność jej działań. Dbają o prezentowanie pozytywnego wizerunku Polski, ułatwiają
  nawiązywanie kontaktów pomiędzy polskimi przedsiębiorcami a tymi, którzy działają
  w państwie przyjmującym, wspierają także działania polskiej diaspory. Konsulowie
  honorowi pełnią swoją rolę pro bono. Kalifornia jest największym skupiskiem osób
  polskiego pochodzenia na zachodnim wybrzeżu USA. Według ostatniego spisu powszechnego
  (American Community Survey 2024), około 400 tysięcy mieszkańców Kalifornii deklaruje
  polskie pochodzenie. Wicepremier Sikorski spotkał się z przedstawicielami Polonii
  w Los Angeles. Podziękował im za budowanie pozytywnego wizerunku Polski w USA i
  kultywowanie języka polskiego, kultury, historii i naszych narodowych tradycji.
  Szef polskiej dyplomacji przypomniał, że Polska wspiera osoby, które planują powrót
  do kraju, między innymi poprzez rozwiązania ułatwiające przeniesienie rezydencji
  podatkowej oraz wspieranie rozwoju zawodowego i naukowego. Kalifornia to jedno z
  kluczowych miejsc promowania polskiej kultury w USA. Podczas wizyty w Los Angeles
  wicepremier Radosław Sikorski spotkał się z przedstawicielami branży filmowej. Szef
  MSZ rozmawiał z producentką Sylwią Wilkos i operatorem Januszem Kamińskim o promowaniu
  Polski poprzez kinematografię. Spotkał się także z reżyserem Josephem Kosinskim.
  W tym roku obchodzimy 100. rocznicę urodzin i 10. rocznicę śmierci reżysera Andrzeja
  Wajdy. W związku z tym Konsulat Generalny RP w Los Angeles realizuje projekt „The
  Year of Wajda in Los Angeles” we współpracy z Centrum Kultury Filmowej im. Andrzeja
  Wajdy oraz Muzeum Akademii Filmowej w Los Angeles. Między 31 lipca a 2 sierpnia
  w Ted Mann Theater będzie można zobaczyć filmy Andrzeja Wajdy. W Kalifornii doceniana
  jest także polska sztuka współczesna i muzyka. Podczas międzynarodowej wystawy w
  Los Angeles Center of Photography prezentowane były fotografie Ady Zielińskiej.
  Konsulat w Los Angeles współpracuje z USC Polish Music Center, najważniejszym w
  USA ośrodkiem dokumentacji polskiej muzyki oraz z Paderewski Festival w Paso Robles.
