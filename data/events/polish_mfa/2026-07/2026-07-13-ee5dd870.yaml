title: Wicepremier Radosław Sikorski z apelem o pilne przyjęcie 21. pakietu sankcji
  wobec Kremla podczas Rady do Spraw Zagranicznych (FAC) w Brukseli
text: 'Konieczne wsparcie energetyczne dla Ukrainy i wzmocnienie presji na Kreml Szef
  polskiej dyplomacji Radosław Sikorski zwrócił uwagę, że Rosja zniszczyła 4/5 ukraińskich
  zdolności do produkcji energii elektrycznej. Podkreślił konieczność wsparcia Ukrainy
  w odbudowie systemu energetycznego, w tym pilnego przekazania środków na odbudowę
  elektrociepłowni ukraińskich i tworzenie rozproszonych źródeł generowania elektryczności
  przed kolejną zimą. Minister Sikorski zaapelował również o szybkie przyjęcie przez
  Unię Europejską 21. pakietu sankcji wobec Rosji, która ostatniej nocy po raz kolejny
  przeprowadziła ataki na cele cywilne w Ukrainie. Zaznaczył także konieczność pilnego
  wsparcia Ukrainy systemami obrony powietrznej. Wicepremier Sikorski z zadowoleniem
  przyjął oświadczenie Wysokiej Przedstawiciel Kai Kallas w sprawie wrogich działań
  Rosji w cyberprzestrzeni wobec państw członkowskich, w tym Polski. W oświadczeniu
  po raz pierwszy wskazano związek pomiędzy wrogimi działaniami w cyberprzestrzeni
  a rosyjską Federalną Służbą Bezpieczeństwa (FSB). Terror wobec ludności cywilnej
  przetrzymywanej przez Rosjan Na marginesie posiedzenia FAC odbyło się nieformalne
  spotkanie unijnych ministrów spraw zagranicznych z szefem ukraińskiej dyplomacji
  Andrijem Sybihą oraz ukraińskimi działaczami na rzecz praw człowieka: Ołeksandrą
  Matwijczuk, szefową Centrum Wolności Obywatelskich i Maksymem Butkiewiczem, byłym
  jeńcem wojennym, założycielem NGO ZMINA. Przekazali oni informacje na temat okrucieństw
  dokonywanych przez Rosjan wobec ludności cywilnej przetrzymywanej na okupowanych
  terytoriach ukraińskich. Minister Sikorski podkreślił konieczność reakcji społeczności
  międzynarodowej na naruszenia międzynarodowego prawa humanitarnego. Należy ukarać
  sprawców, wśród których są m.in. członkowie rosyjskich służb specjalnych, zarządcy
  więzień, a także sędziowie, wydający niesprawiedliwe wyroki Szef polskiej dyplomacji
  poparł oświadczenie Wysokiej Przedstawiciel Kai Kallas w sprawie ukraińskich cywilów
  więzionych przez Rosjan. W dyskusji ministrów podczas obrad na temat Bliskiego Wschodu,
  wicepremier Sikorski wyraził zaniepokojenie z powodu zaostrzenia sytuacji wokół
  Cieśniny Ormuz, kluczowej dla globalnego bezpieczeństwa energetycznego. Uzgodnienia
  dotyczące irańskiego programu nuklearnego, sankcji, bezpieczeństwa morskiego i relacje
  z Izraelem wymagają zaufania i dobrej woli po obu stronach. Inaczej nierozwiązane
  kwestie będą podsycać napięcia. Minister poparł ideę, by Komisja Europejska przedłożyła
  pisemne propozycje dotyczące ograniczenia importu produktów z nielegalnych osiedli
  izraelskich, i wskazał na konieczność przestrzegania przez Unię Europejską prawa
  międzynarodowego w sprawie statusu terytoriów okupowanych, zaznaczając, że to „kwestia
  zasad”.  Ponadto, minister poparł wysiłki na rzecz wzmocnienia unijnego zaangażowania
  w Libanie, w tym ustanowienia nowej misji Unii Europejskiej. Nawiązując do dyskusji
  FAC na posiedzeniu 15 czerwca, Rada przyjęła decyzję o rozpoczęciu doradczej Misji
  Partnerstwa Unii Europejskiej w Armenii ( EUPM Armenia ), której celem jest wsparcie
  władz Armenii w zwiększaniu odporności kraju na zagrożenia hybrydowe i zdolności
  do radzenia sobie z ewoluującymi wyzwaniami bezpieczeństwa.'
