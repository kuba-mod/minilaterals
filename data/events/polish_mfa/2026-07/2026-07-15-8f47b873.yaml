title: Wystąpienie Wicepremiera, Ministra Spraw Zagranicznych RP Radosława Sikorskiego
  w Bibliotece Prezydenckiej Ronalda Reagana
text: jestem zaszczycony, że Ronald Reagan Presidential Library zechciała gościć mnie
  w swoich murach. Jestem głęboko poruszony, że mogę tutaj być, ponieważ Ronald Reagan
  zajmuje wyjątkowe miejsce w sercach Polaków kochających wolność. Ronald Reagan pozostaje
  jednym z prezydentów, którzy wywarli największy wpływ na historię Stanów Zjednoczonych.
  Jednak dla wielu Polaków, zwłaszcza tych, którzy pamiętają czasy komunistycznej
  opresji, jest kimś więcej niż tylko postacią historyczną. Został zapamiętany jako
  człowiek, który zrozumiał istotę komunizmu, nazwał go po imieniu i natchnął nadzieją
  mieszkających za żelazną kurtyną. Nie był bez wad. Jak każdy prezydent. Jak każdy
  polityk. Jego administracja popełniała błędy. Amerykańska gospodarka nie stanęła
  na nogi tak szybko, jak się tego spodziewał. Polityczna polaryzacja w Waszyngtonie
  narastała. O sporach wewnątrz administracji prasa donosiła regularnie. A jednak
  naród go popierał. W 1984 roku zafundował mu jedno z najbardziej spektakularnych
  zwycięstw w historii Stanów Zjednoczonych. Niektórzy sądzą, że to dzięki jego urokowi
  osobistemu. Często lubili go nawet ci, którzy się z nim nie zgadzali. Chociaż to
  prawda, to jednak nie tłumaczy w pełni popularności Reagana, której źródła były
  dużo głębsze. Ronald Reagan wiedział coś, o czym politycy zdają się zapominać. Mianowicie,
  że my, naród, nie chcemy być tylko rządzeni. Chcemy coś znaczyć. Chcemy wiedzieć
  jakie wartości urzeczywistnia nasz kraj. Chcemy przywódców, którzy mają własne wyobrażenie
  wolności, godności, odpowiedzialności, sprawiedliwości i patriotyzmu. Wiele przemówień
  Reagana przeszło do historii, ale jedno z najsłynniejszych wygłosił 8 marca 1983
  roku przed Narodowym Stowarzyszeniem Ewangelików. Związek Radziecki nazwał w nim
  „imperium zła”. Został za to mocno skrytykowany. Zdaniem wielu to określenie było
  prowokacyjne. Ostrzegali, że taki język uniemożliwi przyszłe negocjacje z sowietami.
  Reagan udowodnił, że się mylili. Prawie dwa lata później, gdy nadszedł właściwy
  – jego zdaniem – moment, spotkał się w Genewie z Michaiłem Gorbaczowem, żeby rozmawiać
  o ograniczeniu broni jądrowej. Człowiek posądzany o kierowanie się ideologią po
  raz kolejny okazał się pragmatykiem. Przemówienie, w którym wspomniał o „imperium
  zła” miało znaczenie, ponieważ przywróciło kwestię moralności do polityki zagranicznej.
  Reagan przypomniał światu, że jest różnica między dobrem a złem, między wolnością
  a tyranią, między prawdą a kłamstwem. Wierzył, że Stany Zjednoczone powinny – i
  mogły – być siłą dobra. Czy Ameryka zawsze była siłą dobra? Nie. Nawet pod rządami
  Reagana. Ale ten prezydent miał wyjątkową zdolność przekonywania znacznej części
  świata, że Ameryka nadal chciała być lepsza. Był przekonywujący nie ze względu na
  aktorską przeszłość. Był przekonywujący, bo wierzył w to co mówił. Głosił wyjątkowość
  Ameryki, ale uważał wolność jednostki za powszechne prawo człowieka. W komunistycznej
  Polsce wierzyliśmy mu – i wierzyliśmy w niego. Dlatego Reagan jest aktualny dziś,
  gdy ideały zbyt często prezentuje się jako względne i gdy tak wielu ludzi poszukuje
  przewodników moralnych. Przypomniał nam, że konserwatyzm w swoim najlepszym wydaniu
  wolny jest od złości, niechęci czy izolacjonizmu. Jeśli jest zakorzeniony w pewności,
  jasności moralnej i odwadze, to niesie nadzieję, otwartość i gotowość do współdziałania
  ze światem. Za rządów Reagana w modernizację amerykańskiej armii zainwestowano miliardy
  dolarów. Jednak to ten prezydent był jedną z najskuteczniejszych broni, którą Ameryka
  miała przeciw komunizmowi. Rozumiał, że wolny naród musi być silny, ale także, że
  wielka władza bez wyższego celu jest pozbawiona sensu i nieskuteczna. Dziś Polska
  jest dumnym, demokratycznym, bezpiecznym i coraz bogatszym krajem – członkiem grupy
  G-20, klubu największych gospodarek świata. Sukces Polski był możliwy dzięki Solidarności
  i jej wyjątkowemu przywódcy – Lechowi Wałęsie, którego wspierały takie wybitne postacie
  jak papież Jan Paweł II i Ronald Reagan. W centrum Warszawy, naprzeciw ambasady
  Stanów Zjednoczonych stoi brązowy pomnik prezydenta Reagana. Jestem przekonany,
  że byłby dumny patrząc jak jego walka z „imperium zła” wydała owoce w postaci nowoczesnej
  Polski i nowoczesnej Warszawy, które od jego czasów zmieniły się nie do poznania.
  Przyjedźcie do Polski i zobaczcie to na własne oczy. Jesteśmy symbolem zwycięstwa
  Ronniego.
