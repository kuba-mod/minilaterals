title: 2nd meeting of Poland's honorary consuls
text: 'During the Meeting, honorary consuls had the opportunity to exchange their
  experience. They also took part in discussion panels, during which they could gain
  an insight into building Poland’s brand worldwide and its economic, research, and
  cultural potential. Participants met with Poland’s Senate Speaker Małgorzata Kidawa-Błońska
  and a delegation of Warsaw’s municipal authorities. The event’s programme also featured
  meetings on Poland’s culture and history. Honorary consuls accompanied Deputy Minister
  Władysław Teofil Bartoszewski at a flower-laying ceremony at the Tomb of the Uknown
  Soldier and attended a piano recital at the Royal Castle. The first Meeting of Honorary
  Consuls was held 18 years ago at Minister Sikorski’s initiative. Ahead of this year’s
  Meeting, the head of Polish diplomacy emphasised the important role honorary consuls
  play in modern diplomacy. Honorary consuls, who represent Poland abroad, are a vital
  part of Poland’s consular services. They support our consuls and act as a link between
  Poland and their countries of residence Despite the fact that honorary consulates
  perform only selected consular tasks, they are immensely helpful to the foreign
  service and make it more efficient. Honorary consuls of the Republic of Poland protect
  the rights and interests of our country and its citizens, provide consular support
  to our compatriots in their consular districts, and facilitate contacts between
  Polish businesses and those in the receiving state, which encourages bilateral economic
  cooperation. Honorary consuls also promote Poland’s positive image abroad as well
  as supporting the activities of the Polish diaspora. Right now, Poland’s consuls
  are supported by 218 honorary consuls across six continents. The number of consular
  posts headed by honorary consuls is on a constant rise. In 2026, Deputy Prime Minister
  and Foreign Minister Radosław Sikorski appointed honorary consuls in: Orléans (France),
  Douglas (Isle of Man), Bryan (United States), Praia (Cabo Verde), Surprise (United
  States), Plaine Magnien (Mauritius), Bergen (Norway), Vaduz (Liechtenstein), Belmopan
  (Belize), and Arona (Spain).'
