title: Deputy Prime Minister Radosław Sikorski urges to adopt 21st sanctions package
  against Kremlin at Foreign Affairs Council (FAC), Brussels
text: 'Necessary energy support for Ukraine and increasing pressure on the Kremlin
  Radosław Sikorski, the head of Polish diplomacy, said that Russia destroyed 80%
  of Ukraine’s electricity generation capacity. He emphasised the need to support
  Ukraine in the reconstruction of its energy system, including the urgent provision
  of funds to rebuild Ukrainian combined heat and power plants and to set up distributed
  electricity generation sources before winter. Minister Sikorski also urged the EU
  to adopt the 21st package of sanctions against Russia, which attacked civilian targets
  in Ukraine again last night. Moreover, he noted the need to immediately provide
  Ukraine with air defence systems. Deputy Prime Minister Sikorski welcomed the Statement
  by the High Representative Kaja Kallas on Russia’s malicious cyber activities targeting
  the EU member states, including Poland. It was this statement that first linked
  malicious cyber activity to Russia’s Federal Security Service (FSB). Terror against
  civilian population detained by Russians On the sidelines of FAC, EU foreign ministers
  held an informal meeting with Ukraine’s top diplomat Andrii Sybiha and Ukrainian
  human rights activists: Oleksandra Matviichuk, head of the Center for Civil Liberties,
  and Maksym Butkevych, former prisoner of war and the founder of the ZMINA NGO. They
  informed the audience about the atrocities committed by the Russians against civilians
  held captive in the occupied Ukrainian territories. Minister Sikorski stressed that
  the international community must respond to the violations of the international
  humanitarian law. The perpetrators—who include, among others, members of the Russian
  secret service, prison governors, and judges who pass unjust sentences—must be punished
  Poland’s top diplomat endorsed the Statement by the High Representative Kaja Kallas
  on Ukrainian civilians detained by Russia. Following on the discussion during the
  FAC meeting on 15 June, the Council decided to launch an advisory EU Partnership
  Mission in Armenia ( EUPM Armenia ) to support the Armenian authorities in enhancing
  the country’s resilience against hybrid threats and ability to address evolving
  security challenges. During the ministers’ discussion on the Middle East, Deputy
  Prime Minister Sikorski expressed concern over the deteriorating situation around
  the Strait of Hormuz, which is pivotal for global energy security. Arrangements
  regarding Iran’s nuclear programme, sanctions, maritime security, and relations
  with Israel require trust and good faith on both sides. Otherwise, unresolved issues
  will fuel tensions. Minister Sikorski favoured the idea that the European Commission
  should put forward written proposals to restrict imports of products from illegal
  Israeli settlements, and highlighted the need for the European Union to comply with
  international law regarding the status of the occupied territories, emphasising
  that this was “a matter of principles.” He also supported the efforts to increase
  the EU’s engagement in Lebanon, including setting up a new EU mission.'
