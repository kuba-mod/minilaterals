title: Spotkanie szefów dyplomacji Polski i Ukrainy
text: Podczas spotkania ministrowie podkreślili wspólną wolę rozwoju narzędzi prowadzenia
  dialogu historycznego opartego na prawdzie i wzajemnym poszanowaniu przeszłości.
  Zwrócili uwagę, że prawda, szacunek i pamięć o ofiarach pozostają kluczowymi elementami
  relacji dwustronnych, wymagającymi odpowiedzialnego podejścia. Pozytywnym przykładem
  tego procesu są znaczące, najlepsze od wielu lat postępy w procesie ekshumacji oraz
  wydawanie kolejnych zgód na prace poszukiwawcze. W kontekście bezpieczeństwa regionalnego
  ministrowie omówili sytuację współpracy wojskowej. Minister Radosław Sikorski potwierdził
  wsparcie dla Ukrainy w jej walce z agresorem. Podkreślił przy tym strategiczne znaczenie
  zacieśniania współpracy wojskowej i stabilizacji regionu dla bezpieczeństwa całej
  Europy. Ważnym elementem rozmów były kwestie współpracy gospodarczej, oceniane przez
  pryzmat pozytywnych efektów niedawnej Konferencji na rzecz Odbudowy Ukrainy, która
  odbyła się w Gdańsku. Rozmówcy omówili wyzwania z jakimi mierzą się spółki na rynku
  ukraińskim i podkreślili, że rozwój relacji ekonomicznych przynosi wymierne korzyści
  obu państwom. Dla Polski oznacza to m.in. zaangażowanie rodzimych przedsiębiorstw
  w powojenną rekonstrukcję kraju, wzrost możliwości inwestycyjnych oraz umocnienie
  pozycji rynkowej polskich firm działających na Ukrainie. Ministrowie zgodzili się,
  że deeskalacja napięć i budowanie trwałych mechanizmów opartych na wzajemnym zrozumieniu
  historii i rozwoju współpracy gospodarczej są kluczowe dla pełnego wykorzystania
  potencjału polsko-ukraińskiego partnerstwa.
