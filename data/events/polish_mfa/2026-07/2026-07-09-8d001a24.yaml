title: Oświadczenie Rady Odporności w związku z rosyjską dezinformacją wokół zbrodni
  wołyńskiej
text: W ostatnich dniach działania w tym obszarze strona rosyjska podjęła rękami Federalnej
  Służby Bezpieczeństwa (FSB), spadkobierczyni NKWD i KGB, która odtajniła rzekomo
  nieznane wcześniej dokumenty, mające dowodzić, że w lipcu 1943 r. Ukraińcy mieliby
  dopuścić się zbrodni na Polakach o większej intensywności niż do tej pory sądzono.
  Chodzi o rzekome zamordowanie 11 księży katolickich i dwóch tysięcy mieszkańców
  Włodzimierza Wołyńskiego. Polscy historycy podchodzą do autentyczności zawartych
  w tych materiałach informacji sceptycznie, podkreślając, że przywołane w nich zdarzenie
  o jednorazowym charakterze nie miało miejsca. Prawdopodobnie dla zwiększenia efektu,
  rosyjski aparat propagandowy połączył wydarzenia, do których doszło w różnych miejscach
  i czasie. Nie ma to nic wspólnego z odkrywaniem nieznanych wcześniej faktów historycznych,
  ale jest próbą przeniesienia emocji związanych z przeszłością na współczesne relacje
  polsko-ukraińskie, by doprowadzić do ich zniszczenia. Działania strony rosyjskiej
  wpisują się również w szerszą próbę podważenia przy pomocy materiałów FSB wiarygodności
  ukraińskich instytucji zajmujących się przeciwdziałaniem dezinformacji, w tym Centrum
  Przeciwdziałania Dezinformacji, które już 4 lipca ostrzegało przed zapowiadaną na
  5 lipca rosyjską operacją informacyjną dotyczącą Wołynia. Wykorzystanie w narracji
  najprawdopodobniej autentycznego, ale przedstawiającego fałszywe informacje dokumentu,
  miało na celu dyskredytację ostrzeżeń strony ukraińskiej nt. rosyjskich działań
  dezinformacyjnych. Gdyby takie przekonanie utrwaliło się w odbiorze społecznym,
  mogłoby to doprowadzić do pogłębienia uprzedzeń i nieufności wobec instytucji zajmujących
  się zwalczaniem rosyjskiej dezinformacji, co nie leży w polskim interesie. W związku
  z tym, przy afirmacji polskiej pamięci historycznej i emocji związanych ze zbrodnią
  wołyńską, a także krytycznej ocenie decyzji o nadaniu imienia „Bohaterów UPA” ukraińskiej
  jednostce wojskowej , Rada zwraca się z apelem o niereagowanie na wszelkie informacje
  na temat zbrodni wołyńskiej pochodzące ze źródeł rosyjskich i niezweryfikowanych,
  przynajmniej do czasu, gdy zostaną zbadane przez polskich historyków. Apelujemy
  również o powściągliwe reakcje na doniesienia strony ukraińskiej. Pamiętajmy, że
  zbrodnia wołyńska jest od dawna tematem, po który sięga rosyjska machina propagandowa,
  by pogłębiać podziały między narodami polskim i ukraińskim, co – w zamyśle Kremla
  – doprowadzić ma do skłócenia obu państw i zaniechania współpracy między nimi. Gdyby
  do tego doszło, leżałoby to w interesie Rosji. W żywotnym interesie Polski leży
  niedopuszczenie do realizacji takiego scenariusza, będącego zagrożeniem dla bezpieczeństwa
  naszego kraju. Apelujemy w związku z tym o powściąganie emocji kierowanych przeciwko
  społeczeństwu ukraińskiemu oraz o krytyczne i ostrożne podejście do informacji,
  które je wywołują. Pamiętajmy, że polsko-ukraińskie nieporozumienia pomagają wyłącznie
  Rosji. Rada wzywa również odpowiednie instytucje i siły polityczne w Polsce do reakcji,
  w szczególności poprzez podjęcie działań informacyjnych, które z jednej strony obnażałyby
  i obalały rosyjskie manipulacje i ich ukryty zamiar, z drugiej zaś przekazywały
  społeczeństwu bezstronny i wiarygodny obraz sytuacji. Rada Odporności - Ministerstwo
  Spraw Zagranicznych - Portal Gov.pl
