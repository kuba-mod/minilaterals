title: Meeting between top diplomats of Poland and Mozambique
text: Deputy Prime Minister Radosław Sikorski expressed his hope for giving bilateral
  relations a new momentum. He stressed that regular diplomatic contacts will serve
  as a solid foundation for further development of bilateral cooperation. The ministers
  considered the energy sector to hold great potential for bilateral relations, given
  Mozambique’s natural resources, including its third-largest deposits of natural
  gas in Africa. Much attention was also paid to infrastructure, digital economy,
  and advanced technologies in agriculture. Foreign Ministers Radosław Sikorski and
  Maria Manuela dos Santos Lucas discussed the political and security situation in
  South Africa, as well as the activities of the European Union Military Assistance
  Mission in Mozambique (EUMAM Mozambique) in Cabo Delgado Province. They also explored
  ways to strengthen the sustainable operational capabilities of Mozambique’s quick
  reaction forces. The head of Polish diplomacy emphasised that improved security
  and effective governance are essential for the successful implementation of EUMAM’s
  objectives and for the region’s stabilisation by the Mozambican authorities. The
  ministers reaffirmed their commitment to the principles of sovereignty and territorial
  integrity, in accordance with the UN Charter. The discussion also covered Russia’s
  war against Ukraine and its consequences for both Europe and Africa. The Warsaw
  visit is the first stop on the Mozambican foreign minister’s European tour.
