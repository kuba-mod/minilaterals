title: Top diplomats of Poland and Ukraine meet
text: The ministers stressed their shared willingness to develop tools that foster
  historical dialogue based on truth and mutual respect for the past. They pointed
  out that truth, respect, and the memory of the victims remain key for bilateral
  relations and must be approached responsibly. One positive example of this is a
  significant progress, the most substantial in years, in the exhumation process,
  as well as further permits being granted for search operations. In the context of
  regional security, the ministers discussed the state of military cooperation. Minister
  Radosław Sikorski reaffirmed Poland’s support for Ukraine’s struggle against the
  aggressor and underlined the strategic importance of deepening military cooperation
  and ensuring the region’s stability for the security of the entire continent. Economic
  cooperation was an important item on the agenda. The interlocutors looked at it
  through the lens of the positive outcomes of the recent Ukraine Recovery Conference
  in Gdańsk. They also discussed the challenges faced by the companies present on
  the Ukrainian market and highlighted the tangible benefits that ever-closer economic
  ties offer to both countries. For Poland, this includes the involvement of Polish
  enterprises in Ukraine’s post-war reconstruction, more investment opportunities,
  and strengthening the position of Polish companies on the Ukrainian market. The
  ministers agreed that de-escalating tensions and building lasting mechanisms based
  on mutual understanding of the history and bolstering of the economic cooperation
  are key to harnessing the full potential of the Polish–Ukrainian partnership.
