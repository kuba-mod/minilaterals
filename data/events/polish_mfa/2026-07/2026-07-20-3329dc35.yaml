title: Irlandia rozpoczęła prezydencję w Radzie UE - spotkanie wicepremiera Radosława
  Sikorskiego z ambasadorami państw UE akredytowanymi w Polsce
text: Priorytety właśnie rozpoczętej prezydencji irlandzkiej w Radzie UE – konkurencyjność,
  europejskie wartości i bezpieczeństwo – są ambitne i dostosowane do aktualnych uwarunkowań
  międzynarodowych, ocenił wicepremier Radosław Sikorski. Dodał, że jednym z kluczowych
  zadań irlandzkiej prezydencji będzie kontynuowanie negocjacji dotyczących Wieloletnich
  Ram Finansowych na lata 2028–2034. Szef MSZ wyraził nadzieję, że bezpieczeństwo
  znajdzie się wśród głównych priorytetów nowego budżetu UE, bez szkody dla tradycyjnych
  polityk, jak Wspólna Polityka Rolna i polityka spójności. Podczas spotkania minister
  Sikorski podkreślił, że bliskie relacje Europy ze Stanami Zjednoczonymi są naszą
  najlepszą linią obrony wobec Rosji, stąd Polsce zależy na utrzymaniu silnego zaangażowania
  wojskowego USA w Europie. Ocenił, że Rosja nie wygrywa wojny w Ukrainie i wskazał
  na potrzebę dalszego wsparcia militarnego Kijowa oraz utrzymania presji wobec Moskwy
  zwłaszcza poprzez kolejne sankcje. Polska popiera członkostwo Ukrainy w UE – zaznaczył
  minister Sikorski, wskazując, że proces akcesyjny musi opierać się na wypełnieniu
  przez państwo kandydujące wszystkich kryteriów. Szef polskiej dyplomacji podziękował
  ambasadorowi Haughey’owi, kończącemu swoją misję w Polsce, za aktywną pracę na rzecz
  wzmacniania relacji polsko-irlandzkich. Przypomniał również, że irlandzka prezydencja
  wywołuje w Warszawie pozytywne konotacje, ponieważ to w trakcie jej przewodnictwa
  w pierwszej połowie 2004 r. Polska stała się członkiem Unii Europejskiej.
