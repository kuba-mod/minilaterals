title: Wicepremier Radosław Sikorski wziął udział w Szczycie NATO w Ankarze
text: Państwa NATO potwierdziły postępy w realizacji przyjętego na zeszłorocznym szczycie
  Sojuszu w Hadze zobowiązania dotyczące zwiększenia wydatków obronnych do 5% PKB,
  w tym 3,5% na wydatki na obronność i 1,5% na inne wydatki powiązane z obronnością.
  Większa rola państw europejskich i Kanady wzmocni bezpieczeństwo sojuszników w budowaniu
  zdolności do obrony. Putin zmusił nas do tego, żebyśmy wydawali więcej na obronność.
  Przecież wolelibyśmy te środki przeznaczać na coś innego. Tylko, że bez bezpieczeństwa
  nie ma innych korzyści cywilizowanego życia mówił w Ankarze wicepremier Radosław
  Sikorski i podkreślał, że jeśli Sojusznicy zrobią tylko to, do czego się zobowiązali,
  to pod koniec dekady europejska część NATO będzie w stanie odstraszyć Rosję. Poza
  główną sesją szczytu w gronie sojuszników, wicepremier Radosław Sikorski wziął udział
  także w spotkaniach z grupą krajów partnerskich NATO ze Stambulskiej Inicjatywy
  Współpracy (Bahrajnu, Kataru, Kuwejtu i Zjednoczonych Emiratów Arabskich). Ponadto
  szef polskiej dyplomacji uczestniczył w posiedzeniu Rady NATO-Ukraina, z udziałem
  Wysokiej Przedstawiciel UE ds. Polityki Zagranicznej i Bezpieczeństwa Kai Kallas.
  Szef polskiej dyplomacji Radosław Sikorski, w ramach tzw. Formatu E5, spotkał się
  ze swoimi odpowiednikami z Francji, Niemiec, Wielkiej Brytanii oraz Włoch, a także
  UE i Turcji, aby omówić dalszą współpracę na rzecz bezpieczeństwa europejskiego.
  Zależy nam na tym, żeby wszyscy zrozumieli, że w dzisiejszej Unii Europejskiej nie
  da się już zarządzać przez dwa kraje i dlatego zabiegamy o formułę E5 Spotkanie
  było następstwem spotkania szefów państw i rządów E5 w Berlinie 24 czerwca 2026
  r. Na zaproszenie USA, minister spraw zagranicznych Radosław Sikorski reprezentował
  Polskę na spotkaniu ze swoimi odpowiednikami z Danii, Szwecji, Norwegii, Finlandii,
  Turcji i Niemiec. W jego trakcie Sekretarz Stanu USA Marco Rubio wyraził uznanie
  dla działań sojuszników, które służą wzmacnianiu bazy przemysłowej NATO w kluczowych
  obszarach i zwiększaniu produkcji uzbrojenia. Wicepremier Radosław Sikorski w ramach
  spotkań bilateralnych rozmawiał z minister spraw zagranicznych Islandii Þorgerður
  Katrín Gunnarsdóttir, przekazując jej symbolicznie prezydencję w Radzie Państw Morza
  Bałtyckiego. Ponadto szef polskiej dyplomacji spotkał się również z ministrem spraw
  zagranicznych Kuwejtu Szejkiem Jarrahem Jaberem Al-Ahmadem Al-Sabahem. Ministrowie
  rozmawiali m.in. o planowanym przejęciu przez Ambasadę RP w Kuwejcie roli punktu
  kontaktowego NATO od 2027 roku.
