title: Deputy Prime Minister and Foreign Minister Radosław Sikorski visits Republic
  of South Africa
text: 'During his meeting with Minister Ronald Lamola , Deputy Prime Minister Radosław
  Sikorski welcomed South Africa’s interest in developing deeper relations with the
  European Union and the country’s growing role in mediating conflicts, not only on
  the African continent. The ministers also discussed G20-related issues in the context
  of the United States’ presidency and the prospects for the group’s evolution in
  the coming years. I assured Minister Lamola that our government wants G20 membership,
  but not at the expense of South Africa. It is clear for both sides. Our support
  for multilateral cooperation and international dialogue is steadfast and solid,
  we share this approach with South African partners. The process to obtain full membership
  takes time and we hope that South Africa – a G20 member – will be our good partner
  on that path The foreign ministers of Poland and South Africa expressed hope for
  the further development of bilateral political and economic relations. One element
  of these efforts will be the convening of a Bilateral Economic Commission meeting
  in the fourth quarter of 2026. The ministers emphasised and appreciated the role
  both countries play on their respective continents and in global international affairs.
  Our talks focused on economic cooperation. The value of bilateral trade exceeded
  USD 1.5 billion in 2025, and we look forward to further strengthening these mutually
  beneficial ties On his visit, the minister was accompanied by Michał Baranowski,
  Undersecretary of State at the Ministry of Economic Development and Technology,
  as well as representatives of the management boards of Polish companies: TAURON,
  WB Group, Torhamer, and Węglokoks. We appreciate the growing interest of South African
  companies in the Polish market. We see significant potential for strengthening bilateral
  trade and investment. Sectors such as mining and processing, critical raw materials,
  energy transition, and logistics offer promising opportunities In Pretoria, Deputy
  Prime Minister Sikorski took part in a meeting with young diplomats, during which
  he delivered a lecture. Deputy Prime Minister Sikorski also met with members of
  the Polish community in South Africa and laid flowers at the Katyn Memorial in Johannesburg.'
