title: Statement on Russian malicious activities in cyberspace
text: 'The European Union''s statement indicates that the 16th Centre of Russia’s
  Federal Security Service (FSB) is widely engaged in malicious cyber activities aimed
  at: In carrying out cyberattacks Russia relies on intelligence services, cybercriminals,
  self-proclaimed hacktivist groups, and private companies alike. This ecosystem serves
  destructive purposes and enables influence operations aimed at destabilising state
  institutions and decision-making processes targets in the EU and NATO countries.
  We fully support the European Union''s decision to adopt, in response to Russia’s
  malicious cyber activities, restrictive measures in the form of cybersanctions.
  For the first time on such a broad scale, these sanctions target not only individuals
  but also a wide range of entities involved in conducting malicious cyber operations.
  They constitute a reaction to malicious actions violating international law as well
  as established norms of responsible state behaviour. Amid the continuously evolving
  cyber threat landscape, Poland remains committed to protecting its national critical
  infrastructure, strengthening resilience, and enhancing its cyber defence capabilities.
  Together with our allies, we continue to employ all available diplomatic tools to
  publicly condemn and hold accountable those responsible for malicious cyber activities.
  The full text of the EU and NATO statements can be found here:'
