title: Spotkanie na temat upamiętnienia polskich ofiar niemieckich nazistowskich obozów
  koncentracyjnych
text: Spotkanie otworzyli szefowa służby zagranicznej i dyrektor generalna MSZ Henryka
  Mościcka-Dendys oraz podsekretarz stanu w MKiDN Marek Krawczyk. Według dyrektor
  generalnej MSZ konieczne jest usprawnienie współpracy między instytucjami. Jako
  cele na najbliższy czas wskazała m.in. analizę obecności przedstawicieli Polski
  w gremiach doradczych w miejscach pamięci oraz sprawdzenie polskiej tematyki na
  prezentowanych w tych miejscach ekspozycjach i wystawach. Poważnym wyzwaniem pozostają
  braki wiedzy w niemieckim społeczeństwie na temat historii II wojny światowej w
  Europie Środkowej i Wschodniej, polskich ofiar tej wojny, jak również deficyty historycznej
  literatury naukowej i popularno-naukowej w języku niemieckim. Stąd powinniśmy zabiegać
  o szersze wykorzystanie w szkołach, ale może też w nauczaniu akademickim podręcznika
  polsko-niemieckiego do nauki historii – podkreśliła dyrektor generalna Henryka Mościcka-Dendys.
  Z kolei zastępca prezesa Instytutu Pamięci Narodowej Karol Polejowski oraz zastępca
  szefa Urzędu do Spraw Kombatantów i Osób Represjonowanych Michał Syska zwrócili
  uwagę na potrzebę wypracowania trwałych mechanizmów współpracy między instytucjami
  państwowymi i organizacjami zrzeszającymi byłych więźniów i ich rodziny. Podkreślali
  również, że powinniśmy zabiegać o lepszy dostęp do informacji dotyczących polskich
  ofiar na ekspozycjach w miejscach pamięci oraz szerszą reprezentacja polskich grup
  na uroczystościach rocznicowych. Podczas spotkania przedstawiciele Fundacji Polsko-Niemieckie
  Pojednanie przedstawili informacje na temat aktualnych wyzwań w działalności stowarzyszeń
  skupiających środowiska byłych więźniów i ich rodzin. Z kolei reprezentanci berlińskiej
  filii Instytutu Solidarności i Męstwa im. rtm. Witolda Pileckiego zaprezentowali
  swoją działalność edukacyjną kierowaną do odbiorców w Niemczech. W dyskusji uczestniczyli
  również kierownicy placówek dyplomatycznych i urzędów konsularnych RP w Niemczech
  i Austrii, którzy przedstawili szczegółowe informacje na temat poszczególnych miejsc
  pamięci. Uczestnicy spotkania zgodzili się, że konieczne jest kontynuowanie dyskusji
  na temat prowadzenia skutecznej polskiej polityki historycznej w odniesieniu do
  Niemiec i Austrii oraz wypracowanie katalogu możliwych do podjęcia wspólnych działań.
