title: Stanowisko wobec gróźb zablokowania cieśniny Bab al-Mandab
text: W związku z ostatnimi wydarzeniami w południowej części basenu Morza Czerwonego
  oraz zagrożeniami dla bezpieczeństwa żeglugi statków handlowych przez cieśninę Bab
  al-Mandab, wyrażamy zdecydowany sprzeciw wobec wszelkich gróźb formułowanych ostatnio
  przez Huti, roszczących sobie prawo do wpływania na swobodę żeglugi w tym kluczowym
  korytarzu międzynarodowym. Konflikt w Zatoce Perskiej oraz będąca jego bezpośrednim
  następstwem blokada cieśniny Ormuz już wcześniej poważnie zagroziły światowym szlakom
  handlowym. Zakłócenie funkcjonowania kolejnej kluczowej cieśniny może wpłynąć negatywnie
  na sytuację humanitarną na świecie oraz pozbawić wiele państw zasobów niezbędnych
  do bieżącego funkcjonowania ich gospodarek, wpływając tym samym na niezliczone,
  wzajemnie powiązane łańcuchy dostaw na całym świecie.
