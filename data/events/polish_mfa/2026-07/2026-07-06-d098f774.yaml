title: Deputy Prime Minister Sikorski meets with Secretary General of the International
  Civil Aviation Organization (ICAO) Juan Carlos Salazar
text: This was the first-ever visit of the ICAO head to Poland, and it took place
  in connection with an international event on unmanned aerial vehicles hosted by
  the country. During the talks, Poland’s top diplomat praised ICAO’s contribution
  to maintaining international civil aviation standards and referred to Poland’s current
  membership of the ICAO Council (2025–2028 term). ICAO is a specialised agency of
  the United Nations that sets global standards for safety, security, and development
  of civil aviation. For Poland, membership of the ICAO Council means that it has
  the opportunity to play an active part in shaping international aviation regulations
  and promote national priorities more effectively, in particular the development
  of modern air traffic management technologies, the strengthening of operational
  security, the development of sustainable aviation fuels, and ensuring regulatory
  coherence between solutions adopted by ICAO, the EU, and the European Union Aviation
  Safety Agency (EASA).
