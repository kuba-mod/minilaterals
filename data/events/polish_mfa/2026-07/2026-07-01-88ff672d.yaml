title: Wicepremier Radosław Sikorski z wizytą w Republice Namibii
text: Wizyta ministra spraw zagranicznych Radosława Sikorskiego w Namibii wpisuje
  się w nurt polityki zagranicznej wobec kontynentu afrykańskiego. Zakłada ona m.in.
  rozwój współpracy handlowej i inwestycyjnej. Podczas rozmowy z ministrem stosunków
  międzynarodowych i handlu Republiki Nambii Selmą Ashipalą - Musavyi, Radosław Sikorski
  podkreślił chęć zacieśnienia dialogu między obydwoma państwami oraz odnotował wznowienie
  dialogu partnerskiego z UE w 2025 r. W imieniu moich europejskich kolegów chciałbym
  podziękować Państwu za zorganizowanie udanego Forum Biznesowego Namibia–UE w Windhoek
  w zeszłym miesiącu. Takie inicjatywy potwierdzają, że obie strony są otwarte na
  współpracę jako przewidywalni i stabilni partnerzy Szefowie dyplomacji Polski i
  Namibii wyrazili zadowolenie z dobrze rozwijających się relacji między obu krajami
  i wyrazili gotowość do zintensyfikowania dialogu politycznego, gospodarczego i naukowego.
  Cieszę się, że mieliśmy okazję potwierdzić nasze przyjazne stosunki oraz omówić
  liczne możliwości, jakie nasze dwa kraje dostrzegają w dziedzinie handlu, inwestycji,
  nauki oraz współpracy w ramach organizacji międzynarodowych W trakcie spotkań omówiono
  sytuację regionalną i międzynarodową. Rozmówcy potwierdzili wagę poszanowania zasady
  suwerenności państw oraz respektowania międzynarodowych norm prawnych. Minister
  Sikorski odwiedził również największe na świecie, naziemne obserwatorium astronomiczne
  promieniowania gamma - High Energy Stereoscopic System (HESS), w którym współpracują
  zespoły naukowe z Centrum Astronomicznego im. Mikołaja Kopernika PAN, Uniwersytetu
  Jagiellońskiego, Uniwersytetu Łódzkiego oraz Narodowego Centrum Badań Jądrowych.
