title: Secretary of State Marcin Bosacki visits Budapest
text: The deputy head of Polish diplomacy participated in a panel discussion “Europe
  under double strategic pressure” at the Budapest Energy and Security Talks, which
  is a leading international strategy conference in Hungary, aiming to provide a platform
  for dialogue on the most important security and energy challenges ahead of the transatlantic
  community. Deputy Minister Marcin Bosacki held talks focused on EU enlargement with
  Secretary of State at the Hungarian MFA Krisztián Mészáros. Deputy Minister Bosacki’s
  Budapest visit featured discussions on the reforms aimed at restoring the rule of
  law, currently implemented by the Tisza government. Additionally, the deputy head
  of Polish diplomacy gave an interview to HVG, Hungary’s leading and one of the most
  independent media outlets. He shared the Polish perspective on the Polish–Hungarian
  relations and the future of the Visegrád Group. Deputy Minister Bosacki also answered
  questions concerning the long-term threat to European security brought about by
  Russia’s policies, the consequences of Russian disinformation campaigns, and ways
  to counter them.
