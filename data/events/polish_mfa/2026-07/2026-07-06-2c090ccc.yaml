title: Spotkanie wicepremiera Sikorskiego z Sekretarzem Generalnym Międzynarodowej
  Organizacji Lotnictwa Cywilnego (ICAO), Juanem Carlosem Salazarem
text: Spotkanie odbyło się w ramach pierwszej w historii wizyty szefa ICAO w naszym
  kraju, związanej z goszczeniem przez Polskę międzynarodowego wydarzenia dotyczącego
  bezzałogowych statków powietrznych. Podczas rozmowy szef polskiej dyplomacji wyraził
  uznanie dla wkładu ICAO w utrzymanie międzynarodowych standardów w dziedzinie lotnictwa
  cywilnego i odniósł się do obecnego członkostwa Polski w Radzie ICAO (kadencja 2025–2028).
  ICAO jest wyspecjalizowaną organizacją ONZ odpowiedzialną za tworzenie globalnych
  standardów bezpieczeństwa, ochrony i rozwoju lotnictwa cywilnego. Dla Polski członkostwo
  w Radzie tej Organizacji oznacza możliwość aktywnego współtworzenia międzynarodowych
  regulacji lotniczych oraz skuteczniejszego promowania krajowych priorytetów, w szczególności
  rozwoju nowoczesnych technologii zarządzania ruchem lotniczym, wzmacniania bezpieczeństwa
  operacyjnego, rozwoju zrównoważonych paliw lotniczych oraz zapewnienia spójności
  regulacyjnej między rozwiązaniami przyjmowanymi przez ICAO, UE i Agencję UE ds.
  Bezpieczeństwa Lotniczego (EASA).
