title: Deputy Prime Minister Radosław Sikorski takes part in Defence24 Days
text: Deputy Prime Minister Radosław Sikorski stressed that Poland’s stance on security
  is one of the most important voices in Europe. The head of the Polish MFA pointed
  out that Poland is the top defence spender by GDP. Our total military expenditure
  in 2025 exceeded PLN 186.5 billion (approx. 4.7% of GDP) and the defence budget
  (including the Armed Forces Support Fund) for 2026 is set at PLN 200 billion, that
  is approx. 4.8% of GDP. Deputy Prime Minister Sikorski said that procurement of
  defence products financed under SAFE, Security Action for Europe, will further strengthen
  Poland’s security. Poland was first to join the EU instrument and is its largest
  beneficiary. Under the SAFE programme, Poland is to receive up to EUR 43.7 billion
  in low-interest loans. Poland will see huge sums flow into our already increased
  defence budget. We must leverage this funding to provide the Polish Army with the
  best, cutting-edge, and most effective gear to deter the enemies whom we regrettably
  have across our eastern border He also referred to the changes in the US troops’
  presence in Europe and stressed that it is in Poland’s interest that as many US
  soldiers as possible be deployed in Europe, preferably in Poland. Defence24 Days
  is a key forum of discussion on defence and arms industry. Besides Deputy Prime
  Minister Radosław Sikorski, the panels’ participants included delegations from several
  dozen partner countries, representatives of public administration, military experts,
  and businesspeople from the defence sector.
