title: Deputy Minister Artur Harazim takes part in Council of Europe ministerial session
text: 'Discussions centred on the Council of Europe’s support for Ukraine and on holding
  the Russian Federation to account for its acts of war. The session also addressed
  combating disinformation and foreign information manipulation and interference (FIMI).
  Other topics included the New Democratic Pact for Europe in times of rupture as
  well as the Council of Europe Strategy on External Action. Together with 36 other
  states plus the EU, Poland has signed the Resolution establishing the Enlarged Partial
  Agreement on the Management Committee of the Special Tribunal for the Crime of Aggression
  against Ukraine. In his remarks, MFA Undersecretary of State Artur Harazim emphasised
  that at a time of rising geopolitical tensions, the Council of Europe’s role matters
  more than ever before. Human rights, democracy, and the rule of law are being undermined
  or attacked. Russian aggression against Ukraine also represents an assault on the
  values that underpin the Council of Europe. The deputy minister stressed that Polska
  strongly supports the establishment of the Special Tribunal for the Crime of Aggression
  against Ukraine, and that there can be no place for fatigue with Russia’s brutal
  aggression. Poland also wants to see an end to the war and a lasting peace but,
  most of all, it is looking forward to the reconstruction and recovery of Ukraine,
  devastated by Russia, with respect for human rights and bolstering the resilience
  of democratic institutions. The deputy minister expressed Poland’s support for a
  vision set out in the New Democratic Pact for Europe: joint initiatives to redefine
  and strengthen democracy. Deputy Minister Harazim also took part in a roundtable
  discussion titled “Current Migration Challenges.”'
