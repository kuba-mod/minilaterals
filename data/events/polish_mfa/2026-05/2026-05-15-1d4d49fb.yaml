title: Kongres Architektury Polskiej z udziałem Szefowej Służby Zagranicznej i Dyrektor
  Generalnej Henryki Mościckiej-Dendys
text: 'Kongres miał miejsce 14-15 maja br. w Muzeum Historii Polski w Warszawie. Podczas
  ceremonii otwarcia Szefowa Służby Zagranicznej podkreśliła znaczenie wspólnej pracy
  dyplomatów i architektów w budowaniu marki Polska. W ramach dyskusji zatytułowanej
  „Architektura ambasadorem Polski na świecie” nawiązała do najlepszych przykładów
  polskich placówek dyplomatycznych (od Ankary po Tokio), które powstały w oparciu
  o projekty wybitnych polskich architektów. Wskazywała też, że dyplomacja i architektura
  są bardzo interdyscyplinarne i ogromne znaczenie w obu tych dziedzinach ma praca
  zespołowa. W rozmowie prowadzonej przez dr inż. arch. Martę A. Urbańską, profesor
  Politechniki Krakowskiej, uczestniczyli przedstawiciele środowiska architektonicznego
  i eksperci zajmujący się projektowaniem współczesnych przestrzeni publicznych -
  profesor Kazimierz Butelski z Politechniki Krakowskiej; Tomasz Konior, architekt
  i urbanista z Konior Studio i Paweł Potoroczyn, dyrektor Europejskiej Stolicy Kultury
  Lublin 2029. W trakcie dyskusji Szefowa Służby Zagranicznej i Dyrektor Generalna
  MSZ Henryka Mościcka-Dendys wymieniła zarówno historyczne projekty polskich ambasad,
  jak i współczesne realizacje, które przyczyniają się do promowania Polski za granicą.
  Wśród historycznych wymieniła następujące projekty: Jako przykłady doskonałej współczesnej
  architektury polskiej podała m.in. ukończoną przed dwoma laty  Ambasadę RP w Berlinie,
  autorstwa grupy JEMS Architekci oraz finalizowaną właśnie budowę Ambasadę RP w Mińsku,
  autorstwa pracowni PRC Architekci. Odnosząc się do projektu Ambasady RP w Mińsku,
  Szefowa Służby Zagranicznej i Dyrektor Generalna Henryka Mościcka-Dendys podkreśliła,
  że „Sąsiedztwo, nawet w trudnych czasach, wymaga inwestycji, a architektura może
  być tą nicią, która łączy”. Szefowa Służby Zagranicznej i Dyrektor Generalna MSZ
  zaznaczyła również, że architektura jest ważnym elementem tzw. soft power. Ministerstwo
  Spraw Zagranicznych wspiera obecność polskich architektów na najważniejszych wydarzeniach
  międzynarodowych, organizuje wizyty studyjne oraz współpracuje z branżą przy promowaniu
  polskiej architektury i designu poprzez placówki zagraniczne, w szczególności Instytuty
  Polskie na świecie. Kongres Architektury Polskiej jest uznawany za największe wydarzenie
  branżowe w Polsce, integrujące środowisko architektów, a jego głównym celem jest
  wypracowanie założeń pakietu regulacji ustawowych tworzących Polską Politykę Architektoniczną.
  Szczegółowe informacje o Kongresie, uwzględniające program dwudniowych debat, znajdują
  się na oficjalnej stronie wydarzenia . Honorowy patronat nad Kongresem Architektury
  Polskiej objęli: Ministerstwo Rozwoju i Technologii, Minister Spraw Zagranicznych,
  Minister Kultury i Dziedzictwa Narodowego, Prezydent miasta stołecznego Warszawy
  oraz Marszałek Województwa Mazowieckiego.'
