title: Wicepremier Radosław Sikorski na spotkaniu ministrów spraw zagranicznych państw
  NATO
text: Istotnym elementem dyskusji szefów dyplomacji w Helsingborgu były relacje transatlantyckie,
  które dla Polski pozostają kluczowym elementem budowy bezpieczeństwa w Europie.
  Wicepremier Sikorski odniósł się do wiadomości Prezydenta USA Donalda Trumpa, który
  w mediach społecznościowych ogłosił, że Stany Zjednoczone wyślą do Polski kolejnych
  5 tysięcy żołnierzy. Chcę podziękować prezydentowi Trumpowi za ogłoszenie, że rotacja,
  czyli obecność wojsk amerykańskich w Polsce, zostanie utrzymana mniej więcej na
  dotychczasowym poziomie. - powiedział wicepremier Sikorski i podziękował wszystkim,
  którzy przyczynili się do podjęcia tej decyzji. Minister Sikorski podkreślił, że
  konieczna jest bliska współpraca tak Polski z USA, jak i Europy z USA oraz większe
  zaangażowaniem państw europejskich w NATO. Ministrowie omówili także postępy w zwiększaniu
  wydatków na obronność. Wicepremier Sikorski zaznaczył, że ze względu na utrzymujące
  się zagrożenie ze strony Rosji, konieczne jest przyspieszenia tempa modernizacji
  wojskowej w Europie. Wszyscy mamy świadomość, że musimy wyciągnąć lekcje dla polityki
  zakupowej, dla sztuki operacyjnej, dla szkoleń żołnierzy w świetle coraz lepiej
  wyglądającej dla Ukrainy obrony przed rosyjską agresją. Ona powoduje rewolucję w
  sprawach wojskowych. - mówił wicepremier Sikorski. Wskazywał, że wdrożenie wyciągniętych
  wniosków i szybka adaptacja to klucz do skutecznego odstraszania. Szef polskiej
  dyplomacji dodał, że Polska jest liderem pod względem udziału PKB przeznaczonego
  na obronność. W 2025 r. łączne wydatki wyniosły ponad 186,5 mld zł (ok. 4,7% PKB),
  w 2026 r. budżet obronny (z Funduszem Wsparcia Sił Zbrojnych) osiągnie ponad 200
  mld zł (46,5 mld EUR), co stanowi ok. 4,8% PKB. Państwa członkowskie UE zwiększyły
  wydatki na obronę o 63% w ciągu ostatnich 5 lat. Odpowiedni wzrost inwestycji w
  obronę obronną wyniósł 150%. Podczas spotkania szef polskiej dyplomacji przedstawił
  też polskie oczekiwania wobec lipcowego szczytu NATO w Ankarze. Wicepremier Sikorski
  podkreślił, że sojusznicy powinni zademonstrować jedność i jednoznacznie potwierdzić
  gotowość do realizacji artykułu 5. Traktatu Północnoatlantyckiego, który dotyczy
  wzajemnej obrony.
