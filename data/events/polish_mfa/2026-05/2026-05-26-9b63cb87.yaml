title: Secretary of State Ignacy Niemczycki takes part in General Affairs Council
  meeting in Brussels
text: 'As part of the discussion on the European Council scheduled for 18–19 June,
  Deputy Minister Ignacy Niemczycki emphasised the importance of continuing comprehensive
  support for Ukraine: the need for the swift implementation of the EUR 90 billion
  loan for Ukraine, EU security guarantees, sanctions targeting the Russian energy
  sector and third countries, as well as the rapid opening of accession negotiations
  in the “Fundamentals” cluster. He also stressed the need for further work within
  EU defence policy, in particular strengthening the EU’s eastern flank. The ministers
  also exchanged views on the relationship between the future Multiannual Financial
  Framework and the development of the single market. The deputy head of Polish diplomacy
  underlined the importance of investment in physical infrastructure for strengthening
  the EU’s cohesion and competitiveness. On the margins of the General Affairs Council
  (GAC), another meeting was held between ministers from the Friends of Cohesion group
  and Ministers for the Future. A joint declaration of the Friends of Cohesion group,
  supported by 16 delegations including Poland, was also presented. The text is available
  below.'
