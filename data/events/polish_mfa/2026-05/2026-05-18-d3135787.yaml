title: Szefowie dyplomacji Polski i Francji wzięli udział w konsultacjach i otwarciu
  nowej siedziby Instytutu Polskiego
text: 'Polsko-francuska współpraca nabiera tempa. To dobra wiadomość dla Polski, Francji
  i całej Europy - ocenił Radosław Sikorski po spotkaniu 18 maja w Paryżu. Podczas
  rozmów szefowie polskiej i francuskiej dyplomacji omówili rezultaty pierwszego -
  po podpisaniu Traktatu z Nancy – Polsko-Francuskiego Szczytu Międzyrządowego z udziałem
  Premiera Polski i Prezydenta Francji, który odbył się 20 kwietnia br. w Gdańsku.
  O bezpieczeństwie i współpracy gospodarczej Szefowie MSZ Polski i Francji rozmawiali
  również o wsparciu walczącej Ukrainy. Podkreślili szczególną rolę Polski w europejskich
  działaniach na rzecz bezpieczeństwa w regionie. Omówili również oczekiwania wobec
  zbliżającego się szczytu NATO w Ankarze. Istotnym tematem rozmów była także współpraca
  gospodarcza, zarówno dwustronna, jak i udział Polski w pracach G20 oraz francuskie
  przygotowania do szczytu G7 w Évian-les-Bains, który odbędzie się 15-17 czerwca.
  Szef polskiej dyplomacji o stabilności polskiego sektora energii Podczas wizyty
  w Paryżu Minister Spraw Zagranicznych spotkał się również z szefem Międzynarodowej
  Agencji Energetycznej Fatihem Birolem. Rozmowa dotyczyła wpływu sytuacji na Bliskim
  Wschodzie na globalny rynek energii, możliwości wsparcia przez MAE odporności i
  rekonstrukcji ukraińskiego systemu energetycznego, a także roli MAE w zakresie bezpieczeństwa
  dostaw surowców krytycznych i promocji energii jądrowej. Minister Sikorski podkreślił
  stabilność polskiego sektora energii, uzyskaną dzięki dywersyfikacji, odejściu od
  rosyjskich źródeł energii oraz zabezpieczeniu rezerw. Docenił też krytyczne stanowisko
  kierownictwa MAE wobec powrotu do współpracy z Rosją w zakresie węglowodorów. Instytut
  Polski w Paryżu wraca do swojej historycznej siedziby Szefowie dyplomacji Polski
  i Francji wzięli także udział w uroczystości otwarcia odnowionego Instytutu Polskiego.
  Nasza wspólna obecność z Panem Ministrem Barrot na dzisiejszej uroczystości pokazuje,
  że kultura jest jednym z kluczowych obszarów strategicznego partnerstwa łączącego
  nasze państwa – powiedział Minister Sikorski. Życzę nam wszystkim, żeby odnowione
  mury Instytutu Polskiego w Paryżu stały się miejscem owocnej współpracy, inspirujących
  projektów i przyjaźni, które – jak relacje między Polską a Francją – potrafią przetrwać
  próbę czasu – dodał. Podczas uroczystości otwarcia wicepremier Radosław Sikorski
  podkreślił, że misją Instytutu Polskiego jest budowanie trwałych relacji między:
  instytucjami, artystami, naukowcami i społeczeństwami naszych krajów. Szef polskiej
  dyplomacji przypomniał historię relacji polsko-francuskich i zaznaczył, że wspólnota
  doświadczeń i wartości znalazła swój wyraz w podpisanym 9 maja 2025 roku Traktacie
  z Nancy. Traktat o wzmocnionej współpracy i przyjaźni dotyczy nie tylko współdziałania
  w zakresie przemysłu obronnego, gospodarki, rolnictwa i nauki, ale też współpracy
  kulturalnej.  Wicepremier Sikorski zapowiedział też jeden z najważniejszych projektów,
  nad którym pracują instytucje związane z kulturą w Polsce i Francji, między innymi
  Instytut Polski w Paryżu – Sezon Kulturalny Polska-Francja 2027. W programie nie
  zabraknie projektów odpowiadających na wyzwania naszych czasów – dotyczących walki
  z dezinformacją, obrony wolności obywatelskich czy wzmacniania dialogu społecznego.
  To właśnie takie inicjatywy sprawiają, że zapisy traktatów i deklaracji nabierają
  realnego, ludzkiego wymiaru – mówił wicepremier Sikorski. Szef polskiej dyplomacji
  dodał, że wyrazem uznania dla znaczenia relacji międzyludzkich jest także ustanowiona
  w tym roku Nagroda im. Bronisława Geremka – wyróżnienie dla tych, którzy w sposób
  szczególny przyczyniają się do budowania mostów między Polską a Francją. Pierwszym
  laureatem został polski aktor, członek Comédie-Française Andrzej Seweryn. Artysta
  odebrał nagrodę 20 kwietnia - w Dniu Przyjaźni Polsko-Francuskiej, który w tym roku
  także obchodziliśmy po raz pierwszy. Instytut Polski w Paryżu powstał w 1979 r.
  Mieści się w budynku powstałym z dwóch połączonych ze sobą kamienic przy rue Jean
  Goujon 31, w 8. dzielnicy Paryża. Instytut realizuje około stu projektów rocznie
  w obszarze: kina, muzyki, teatru, tańca, sztuk wizualnych, literatury i historii.
  Współpracuje również z największymi francuskimi festiwalami, takimi jak: Festiwal
  w Awinionie, festiwal komiksu w Angoulême, Salon Książki w Paryżu czy Jazz à Junas.
  W odnowionym budynku znajdują się m.in. : sala kinowa dla 100 osób, sala koncertowa
  i przestrzeń ekspozycyjna.'
