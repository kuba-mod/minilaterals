title: Polish-US talks on security
text: The consultations with Under Secretary DiNanno focused on key strategic issues,
  particularly enhancing NATO’s deterrence capabilities, the Alliance’s Eastern policy,
  and the future of the arms control and disarmament regime. They also discussed Polish–US
  cooperation in defence, including between the defence industries. This was another
  meeting devoted to Polish–American cooperation in security and defence, following
  the 16th round of the Poland–US Strategic Dialogue .
