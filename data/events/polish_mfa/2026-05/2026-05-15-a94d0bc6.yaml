title: Wiceminister Artur Harazim wziął udział w sesji ministerialnej Rady Europy
text: 'Dyskusja koncentrowała się wokół tematu wsparcia Rady Europy dla Ukrainy i
  rozliczenia Federacji Rosyjskiej za działania wojenne. Ponadto omawiano walkę z
  dezinformacją i zagranicznymi manipulacjami informacją (FIMI). Przedmiotem obrad
  był także Nowy Pakt Demokratyczny dla Europy oraz Strategia Działań Zewnętrznych
  w dobie gwałtownych zmian geopolitycznych i erozji demokracji. Polska, wraz z 36
  innymi państwami oraz Unią Europejską, przystąpiła do rezolucji Komitetu Ministrów
  dotyczącej utworzenia Poszerzonego Porozumienia Częściowego w sprawie Komitetu Zarządzającego
  Specjalnego Trybunału ds. Zbrodni Agresji przeciwko Ukrainie. Podsekretarz stanu
  w MSZ Artur Harazim podkreślił w wystąpieniu, że w dobie wzrostu napięć geopolitycznych
  rola Rady Europy jest ważniejsza niż kiedykolwiek. Prawa człowieka, demokracja i
  rządy prawa są naruszane lub atakowane. Rosyjski atak na Ukrainę jest również atakiem
  na te wartości, leżące u postaw Rady Europy. Wiceminister zaznaczył, że Polska stanowczo
  popiera utworzenie Specjalnego Trybunału ds. Zbrodni Agresji, a zmęczenie brutalną
  agresją Rosji nie może mieć miejsca. Polsce zależy także na zakończeniu wojny i
  osiągnięciu trwałego pokoju, ale przede wszystkim – na odbudowie zniszczonej przez
  Rosję Ukrainy, z poszanowaniem praw człowieka i wzmacnianiu odporności instytucji
  demokratycznych. Jednocześnie wiceminister wyraził poparcie Polski dla wizji zawartej
  w Nowym Pakcie Demokratycznym: wspólnych działaniach na rzecz redefinicji i wzmocnienia
  demokracji. Wiceminister Harazim wziął także udział w panelu dyskusyjnym sesji „Współczesne
  wyzwania migracyjne”.'
