title: MFA Statement
text: During the meeting, he received an official note demanding that the rights and
  dignity of those detained be respected and that they be treated in accordance with
  international standards, that an investigation be carried out into the circumstances
  of the incident, that the perpetrators be condemned, and that the Israeli authorities
  issue an apology. Moreover, Deputy Prime Minister and Minister of Foreign Affairs
  Radosław Sikorski decided to file a request with the Office for Foreigners to issue
  an entry ban for Israel’s Minister of National Security Itamar Ben-Gvir on the territory
  of the Republic of Poland due to his activity.
