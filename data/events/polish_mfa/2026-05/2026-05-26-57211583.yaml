title: Wystawa „Wielki Wodewil” w Akademii Sztuk Pięknych w Warszawie
text: 'Wydarzenie zostało zorganizowane w ramach współpracy trójstronnej pomiędzy
  MSZ (Departamentem Dyplomacji Kulturalnej i Promocji Polski, Protokołem Dyplomatycznym),
  Fundacją im. Mariusza Kazany oraz Akademią Sztuk Pięknych w Warszawie. Wystawa „Wielki
  Wodewil” jest wydarzeniem wyjątkowym, gdyż jako pierwsza została zorganizowana w
  miejscu innym niż Galeria u Dyplomatów w siedzibie MSZ - powiedziała Irena Lichnerowicz,
  dyrektorka Protokołu Dyplomatycznego MSZ. Z kolei Barbara Kazana przypomniała: 18
  lat temu Mariusz Kazana, ówczesny dyrektor Protokołu Dyplomatycznego w MSZ, wspólnie
  z ASP zorganizował po raz pierwszy spotkanie dla korpusu dyplomatycznego w pracowniach
  graficznych Akademii. Wydarzenie to zapoczątkowało ideę promocji polskiej grafiki
  i jej twórców wśród dyplomatów. Anna Godlewska, zastępczyni dyrektora w Departamencie
  Dyplomacji Kulturalnej i Promocji Polski podkreśliła, że w dzisiejszych czasach,
  kiedy mierzymy się z tak licznymi wyzwaniami, artyści uczą nas jak działać z odwagą
  i jak ważna jest to wartość. Wernisaż prac prof. Winieckiego był także szczególną
  okazją do przedstawienia edukacji artystycznej warszawskiej ASP. Goście wystawy
  mieli okazję zwiedzić pracownie litografii, technik klasycznych (dekoracja porcelany)
  i zecerni, gdzie przybliżony im został proces powstawania dzieł artystycznych. W
  wernisażu wzięli udział przedstawiciele korpusu dyplomatycznego, Rektor Akademii
  Sztuk Pięknych w Warszawie i przedstawiciele ASP w Warszawie oraz pracownicy MSZ.
  Wystawa prac prof. Winieckiego we wrześniu zostanie przeniesiona do Galerii u Dyplomatów
  w siedzibie MSZ, gdzie będzie prezentowana do grudnia 2026 r. *** Profesor Władysław
  Winiecki (1941-2008) ostatnie lata swojego życia spędził pracując w Akademii Sztuk
  Pięknych w Warszawie na Wydziale Grafiki w Pracowni Litografii. Prace profesora
  znajdują się w zbiorach m.in. Muzeum Narodowego w Warszawie i w Krakowie, Biblioteki
  Narodowej w Paryżu i Muzeum Sztuki Współczesnej w Tokio. Fundacja im. Mariusza Kazany
  powstała w 2010 r. po tragicznej śmierci dyplomaty w katastrofie samolotu prezydenckiego
  pod Smoleńskiem. Jej celem jest podtrzymanie pamięci o byłym dyrektorze Protokołu
  Dyplomatycznego oraz kontynuacja jego misji, czyli budowanie pozytywnego wizerunku
  Polski poprzez popularyzowanie kultury i sztuki w kraju oraz za granicą.'
