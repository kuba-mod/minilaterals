title: Oświadczenie MSZ
text: Głębokie niezadowolenie z tej decyzji wyraził 28 maja w rozmowie z Ambasadorem
  Ukrainy w Polsce sekretarz stanu w MSZ Marcin Bosacki oraz 29 maja w rozmowie z
  wiceministrem spraw zagranicznych Ukrainy Oleksandrem Miszczenko chargé d’affaires
  w Kijowie Piotr Łukasiewicz. W obliczu trwającej agresywnej wojny Rosji przeciw
  Ukrainie i zagrożenia dla bezpieczeństwa całego regionu, kluczowe dla obu naszych
  państw i narodów relacje polsko-ukraińskie nie powinny stawać się zakładnikiem trudnej
  historii. Wspólne bezpieczeństwo, solidarność wobec rosyjskiej agresji oraz odpowiedzialność
  za przyszłość Europy wymagają dojrzałości i przywiązania do dialogu po obu stronach.​
