title: Deputy Minister Ignacy Niemczycki visits Bern
text: Also discussed were the reconstruction of Ukraine, relations with the US, and
  security. “The growing importance of Polish–Swiss relations is mainly reflected
  in the economic dimension,” jointly stated Deputy Minister Ignacy Niemczycki and
  Director Helene Budliger Artieda. This is evidenced by the growing volume of trade
  and intensified investments and capital cooperation. The G20 format offers additional
  opportunities to enhance this cooperation. The interlocutors agreed on the need
  to add momentum to Switzerland – EU relations, especially in the face of ongoing
  geopolitical changes and the current US policy. The talks with Deputy State Secretary
  Patric Franzen mainly focused on security. Poland and Switzerland take a similar
  position on this issue, including the perception of the war in Ukraine and the need
  to provide financial and humanitarian aid to the victim of aggression. The officials
  appreciated Switzerland’s growing engagement in the EU’s defence activity and declared
  their readiness to further cooperate during the country’s OSCE chairmanship.
