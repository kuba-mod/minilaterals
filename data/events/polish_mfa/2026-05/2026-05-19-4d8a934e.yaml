title: Jerzy Buzek i Lech Wałęsa odznaczeni nowym orderem Parlamentu Europejskiego
text: 'Lech Wałęsa otrzymał tytuł Wybitnego Członka Europejskiego Orderu Zasługi,
  a Jerzego Buzka wyróżniono tytułem Honorowego Członka Europejskiego Orderu Zasługi.
  Ludzie muszą widzieć, że Unia Europejska daje bezpieczeństwo, pracę i dobrobyt.
  I ludzie muszą wierzyć w Europę — a ta zawsze była silna wtedy, gdy potrafiła wyobrazić
  sobie lepszą przyszłość — i wspólnie, solidarnie ją budować. Dlatego marzmy odważnie
  i działajmy odpowiedzialnie zaapelował były premier Jerzy Buzek odbierając odznaczenie.
  Prezydium Parlamentu Europejskiego uhonorowywało osiągnięcia osób, które wniosły
  znaczący wkład w integrację europejską oraz w promowanie i obronę europejskich wartości.
  Były Prezydent Lech Wałęsa przyjął order jako uznanie dla zwycięskiej walki ruchu
  Solidarność. Zależy mi na tym, aby Unia i „pokolenie posolidarnościowe” odniosło
  sukces podkreślił Lech Wałęsa w swoim przemówieniu. Europejski Order Zasługi ( European
  Order of Merit ) został ustanowiony przez Prezydium Parlamentu Europejskiego w przededniu
  75. rocznicy Deklaracji Schumana. Kandydatury zgłaszali szefowie państw i rządów
  krajów członkowskich, przewodniczący parlamentów narodowych oraz szefów instytucji
  UE. Order przyznawany jest w trzech kategoriach:'
