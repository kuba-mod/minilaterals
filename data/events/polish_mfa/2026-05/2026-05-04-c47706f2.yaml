title: Wicepremier Radosław Sikorski podsumował działania międzyresortowego zespołu
  ds. sankcji
text: Prace zespołu, koordynowane przez Ministerstwo Spraw Zagranicznych, koncentrują
  się na skutecznym wdrażaniu sankcji Unii Europejskiej i krajowych związanych z rosyjską
  agresją na Ukrainę oraz udziałem w niej Białorusi. Polska kładzie szczególny nacisk
  na efektywne przeciwdziałanie naruszaniu i obchodzeniu środków ograniczających poprzez
  zacieśnioną współpracę resortów, organów wymiaru sprawiedliwości, nadzoru finansowego
  oraz służb. Ministerstwo Finansów i Krajową Administrację Skarbową reprezentowali
  Pan Marcin Łoboda, Szef KAS oraz Pan Zbigniew Stawicki, Zastępca Szefa KAS. KAS
  odgrywa kluczową rolę w egzekwowaniu sankcji unijnych i krajowych zastosowanych
  wobec Federacji Rosyjskiej i Białorusi. Działania KAS w zakresie przestrzegania
  nałożonych ograniczeń obejmują kontrole, postępowania administracyjne dotyczące
  wymierzania kar pieniężnych, zawiadomienia organów ścigania w przypadku podejrzenia
  omijania sankcji oraz wnioski Szefa KAS o wpisy na polską listę sankcyjną osób/podmiotów
  prowadzoną przez MSWiA. W wyniku prowadzonych działań majątki osób i instytucji
  objętych restrykcjami są na bieżąco identyfikowane i zamrażane – dotychczas łączna
  kwota zamrożonych aktywów wyniosła 546,2 mln euro. Równolegle prowadzone są intensywne
  kontrole celno-skarbowe, które stawiają Polskę w roli lidera monitorowania obrotu
  towarowego w Unii Europejskiej. W II półroczu 2025 r. liczba polskich zgłoszeń celnych
  w systemie RIF, służącym ostrzeganiu o nieprawidłowościach, wyniosła 180. Stanowi
  to aż 55,9% wszystkich zgłoszeń dokonanych przez państwa członkowskie UE, co bezpośrednio
  przekłada się na skuteczność kontroli transgranicznych w całej Wspólnocie. Egzekwowanie
  przepisów sankcyjnych wiąże się z surowymi konsekwencjami finansowymi i karnymi.
  Do 22 kwietnia 2026 r. wydano 138 decyzji o nałożeniu kar pieniężnych na łączną
  kwotę ponad 74,4 mln zł. Osoby naruszające sankcje podlegają również odpowiedzialności
  karnej – w I kwartale 2026 r. w toku było 191 spraw, w których postawiono zarzuty
  122 osobom. Dotychczas skierowano 13 aktów oskarżenia, a w 10 sprawach zapadły już
  prawomocne orzeczenia sądowe. Dopełnieniem unijnych środków ograniczających jest
  polska lista sankcyjna prowadzona przez Ministra Spraw Wewnętrznych i Administracji,
  na której figuruje obecnie 548 osób i podmiotów wspierających agresję rosyjską.
  Ministrowie Marcin Łoboda oraz Zbigniew Stawicki poinformowali, że organy KAS cały
  czas prowadzą intensywne, obejmujące wiele obszarów, branż i zagadnień, analizy
  przestrzegania ograniczeń związanych z sankcjami. W przypadku stwierdzenia kolejnych
  przypadków łamania sankcji, podejmowane będą działania zapobiegające tym naruszeniom.
  Podstawę działań Rzeczypospolitej Polskiej stanowią rozporządzenia Rady UE nr 833/2014,
  nr 269/2014, nr 765/2006 oraz przepisy ustawy z dnia 13 kwietnia 2022 r. o szczególnych
  rozwiązaniach w zakresie przeciwdziałania wspieraniu agresji na Ukrainę oraz służących
  ochronie bezpieczeństwa narodowego.
