title: Polsko-amerykańskie rozmowy o bezpieczeństwie
text: Konsultacje z podsekretarzem DiNanno koncentrowały się na kluczowych kwestiach
  strategicznych, zwłaszcza rozwoju zdolności NATO do odstraszania, polityce wschodniej
  Sojuszu Północnoatlantyckiego oraz przyszłości reżimu kontroli zbrojeń i rozbrojenia.
  Omówiono także polsko-amerykańską współpracę w sferze obronności, w tym sektorów
  zbrojeniowych. Było to kolejne, po 16. rundzie Dialogu Strategicznego Polska – USA
  , spotkanie dotyczące polsko-amerykańskiej współpracy w zakresie bezpieczeństwa
  i obronności.
