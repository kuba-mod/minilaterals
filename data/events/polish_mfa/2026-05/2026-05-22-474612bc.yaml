title: Warszawa gospodarzem pilotażowego szkolenia dyplomatycznego ASEF
text: 'Szkolenie stanowiło odpowiedź na rosnące zapotrzebowanie na zaawansowane kompetencje
  negocjacyjne w coraz bardziej spolaryzowanym i złożonym środowisku międzynarodowym.
  Jego celem było wyposażenie uczestników w wiedzę teoretyczną oraz praktyczne narzędzia
  niezbędne do prowadzenia skutecznych negocjacji dyplomatycznych – ze szczególnym
  naciskiem na budowanie zaufania, poszukiwanie płaszczyzny porozumienia oraz wypracowywanie
  trwałych rozwiązań akceptowalnych dla wszystkich stron. Program szkolenia obejmował
  zajęcia poświęcone koncepcjom i taktykom negocjacyjnym, w tym możliwym zastosowaniom
  sztucznej inteligencji w dyplomacji. Agenda szkolenia uwzględniała też kluczowe
  wyzwania i zagrożenia w Europie oraz w regionie Azji i Pacyfiku, a także polskie
  doświadczenia z okresu prezydencji w Radzie UE oraz roli komunikacji strategicznej
  i przeciwdziałania dezinformacji we współczesnej dyplomacji. W szkoleniu uczestniczyło
  24 dyplomatów z 12 państw. Spotkanie było również platformą dialogu i okazją do
  wzajemnego poznania – szansą na pogłębienie rozumienia relacji między Azją a Europą
  wśród dyplomatów z obu kontynentów. Pokazuje również, jak istotną wagę Polska przywiązuje
  do relacji z państwami Azji i Pacyfiku. ASEF (Fundacja Azja-Europa) to międzyrządowa
  fundacja powołana w 1997 roku w ramach procesu ASEM (Asia–Europe Meeting), której
  celem jest wzmacnianie dialogu i współpracy między społeczeństwami Azji i Europy.
  ASEF liczy obecnie 53 członków – są to partnerzy formatu ASEM: 30 państw europejskich,
  21 państw azjatyckich oraz dwie organizacje – Unię Europejską i Sekretariat ASEAN
  (Stowarzyszenie Narodów Azji Południowo-Wschodniej). Fundacja ASEF realizuje programy
  w obszarach edukacji, kultury, społeczeństwa obywatelskiego, mediów oraz dobrego
  zarządzania, wspierając budowę trwałych powiązań międzyregionalnych głównie w zakresie
  miękkiej dyplomacji i relacji międzyludzkich. Polska jest członkiem ASEF od 2004
  roku. Obecnie dyrektorem zarządzającym ASEF jest przedstawicielka naszego kraju
  – ambasador Beata Stoczyńska . ASEM (Asia – Europe Meeting) to zainicjowany w 1996
  r. w Bangkoku proces współpracy Europy i Azji. ASEAN (Stowarzyszenie Narodów Azji
  Południowo-Wschodniej) powstało w Bangkoku w 1967 r. Siedzibą tej organizacji polityczno-gospodarczej
  jest Dżakarta.'
