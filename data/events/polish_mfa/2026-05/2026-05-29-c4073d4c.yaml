title: 23. Sesja Ministerialna Rady Państw Morza Bałtyckiego
text: 'Uczestnicy 23. Sesji Ministerialnej RPMB w Sopocie omówili bieżące wyzwania
  dla bezpieczeństwa w regionie Morza Bałtyckiego, między innymi kwestię zakłócania
  sygnałów Globalnego Systemu Nawigacji Satelitarnej i konieczności ochrony infrastruktury
  krytycznej. Wicepremier Radosław Sikorski podkreślał, że jednym z największych wyzwań
  pozostaje „flota złomu”. Flota złomu to nie tylko sposób Rosji na finansowanie swojej
  krwawej wojny w Ukrainie, ale także są to pływające bomby ekologiczne. Musimy je
  zwalczać i zapobiegać katastrofie. Rozwiązujemy ten problem na szczeblu europejskim. Przypominam,
  że w 2024 roku sankcjami objętych było pierwsze 27 jednostek. Dziś, także dzięki
  pracy polskiej prezydencji, jest to ponad 630 jednostek – mówił wicepremier Sikorski
  i dodał, że liczne raporty ekspertów nie pozostawiają wątpliwości - Rosja wspierana
  przez Białoruś jest odpowiedzialna za co najmniej kilkadziesiąt wrogich operacji
  hybrydowych w krajach Rady. Jak się wysadza szyny pod poruszającym się pociągiem,
  to to już jest terroryzm. Jak się próbuje umieszczać ładunki wybuchowe na pokładzie
  samolotów, to jest to działanie, którego celem przewidywalnym musi być śmierć ludzi. Mamy
  do czynienia z globalnym zakłócaniem nawigacji satelitarnej, co ma wpływ nie tylko
  na wojsko, ale także na cywilny ruch lotniczy Ministrowie rozmawiali też o współpracy
  w obszarze międzynarodowego prawa morza i wzmocnieniu politycznego i eksperckiego
  filaru Rady w obszarze bezpieczeństwa regionalnego. Istotnym elementem dyskusji
  były scenariusze rozwoju sytuacji w Ukrainie oraz proces integracji europejskiej
  Kijowa. Ministrowie zgodzili się, że zacieśnianie współpracy pomiędzy państwami
  regionu Morza Bałtyckiego a Ukrainą – państwem-obserwatorem w RPMB – jest kluczowym
  elementem nowej architektury bezpieczeństwa. Podczas wydarzenia przedstawicielki
  Forum Młodzieży Regionu Morza Bałtyckiego przedstawiły Ministrom rekomendacje w
  zakresie udziału młodzieży w szeroko pojętej współpracy w regionie Morza Bałtyckiego,
  wypracowane podczas Młodzieżowej Sesji Ministerialnej, zorganizowanej w Warszawie
  w kwietniu 2026 r. Ponadto, eksperci Polskiego Instytutu Spraw Międzynarodowych
  oraz Ośrodka Studiów Wschodnich zaprezentowali raporty: „Biała księga rosyjskich
  aktów sabotażu i dywersji wobec członków Rady Państw Morza Bałtyckiego” (PISM) oraz
  „Formaty współpracy w obszarze bezpieczeństwa w regionie Morza Bałtyckiego. Rekomendacje
  dla Rady Państw Morza Bałtyckiego” (OSW) stanowiące istotny wkład w dyskusję dot.
  zmian w sytuacji bezpieczeństwa w regionie oraz przyszłej roli  RPMB w tym kontekście.
  Uczestnicy 23. Sesji Ministerialnej Rady Państw Morza Bałtyckiego przyjęli Deklarację
  Sopocką. Dokument dotyczy sytuacji bezpieczeństwa w regionie, wsparcia dla Ukrainy
  i konieczności zdecydowanej odpowiedzi na rosyjskie ataki hybrydowe. Treść Deklaracji
  Sopockiej: LINK Polska sprawuje przewodnictwo w Radzie Państw Morza Bałtyckiego
  od 1 lipca 2025 r. do 30 czerwca 2026 r. Od 1 lipca prezydencję w Radzie rozpocznie
  Islandia. Rada Państw Morza Bałtyckiego powstała w 1992 r., a Polska znalazła się
  w gronie współzałożycieli organizacji. Państwami członkowskimi są obecnie Dania,
  Estonia, Finlandia, Islandia, Litwa, Łotwa, Niemcy, Norwegia, Polska i Szwecja,
  a także UE. Głównym zadaniem Rady jest wspieranie dialogu politycznego i współpracy,
  ustalanie priorytetów strategicznych i kierunków inicjatyw regionalnych zgodnych
  z długoterminowymi priorytetami organizacji, do których należą: tożsamość regionalna,
  zrównoważony i dobrze prosperujący region, bezpieczny i stabilny region. Obecnie
  funkcjonują cztery grupy robocze: ds. zrównoważonej gospodarki morskiej, ds. zwalczania
  handlu ludźmi, ds. współpracy na rzecz dzieci zagrożonych oraz ds. obrony cywilnej.'
