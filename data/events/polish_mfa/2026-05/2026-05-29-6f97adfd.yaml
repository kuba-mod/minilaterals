date: '2026-05-29'
type: press_release
source_name: polish_mfa
title: Deklaracja Sopocka
text: 'Rada ponownie z całą mocą potępiła nielegalną, nieuzasadnioną i niesprowokowaną
  wojnę napastniczą Rosji przeciwko Ukrainie. Pełnoskalowa inwazja Rosji na Ukrainę,
  która posiada status obserwatora przy RPMB, gruntownie zmieniła sytuację związaną
  z bezpieczeństwem w Europie, czego konsekwencje są odczuwalne także daleko poza
  granicami Ukrainy. Rosja pozostaje najpoważniejszym bezpośrednim i długoterminowym
  zagrożeniem dla bezpieczeństwa euroatlantyckiego. Rada podkreśliła, że Rosja, wspierana
  przez Białoruś, oraz osoby odpowiedzialne muszą zostać rozliczone za popełnione
  przestępstwa i w pełni zadośćuczynić za szkody wyrządzone Ukrainie. Istnieje potrzeba
  zwiększenia nacisku na Rosję celem osłabienia jej zdolności do kontynuacji swej
  nielegalnej wojny napastniczej, co można zrealizować poprzez skuteczne nakładanie
  sankcji, ściślejsze egzekwowanie wdrożonych już środków i ewentualne wprowadzanie
  nowych instrumentów, takich jak całkowity zakaz świadczenia usług morskich związanych
  z eksportem rosyjskiej energii, oparty na pełnej koordynacji z G7 i Koalicją ds.
  Limitu Cen (Price Cap Coalition) i uwzględniający dyskusje w ich ramach. Rada podkreśliła
  również, jak ważne jest szybkie podjęcie działań zmierzających do uniezależnienia
  się od importu energii z Rosji, zgodnie z REPowerEU, i odnotowała propozycje dalszego
  ograniczenia mobilności osób zaangażowanych po stronie Rosji w wojnę przeciwko Ukrainie,
  w tym poprzez wprowadzenie nowych, ukierunkowanych środków wizowych. Rada podtrzymała
  zdecydowane i niesłabnące poparcie dla niepodległości, suwerenności i integralności
  terytorialnej Ukrainy w jej uznawanych przez społeczność międzynarodową granicach,
  jak również dla powszechnego, sprawiedliwego i trwałego pokoju opartego na prawie
  międzynarodowym, w tym Karcie Narodów Zjednoczonych. Rada wspiera Ukrainę, korzystającą
  z przyrodzonego prawa do samoobrony w obliczu nielegalnej wojny napastniczej Rosji,
  i podkreśla znaczenie zapewnienia zwiększonej pomocy politycznej, finansowej, gospodarczej,
  humanitarnej, wojskowej i dyplomatycznej. Rada wyraziła swoje zaangażowanie na rzecz
  wspierania poszukiwań, powrotów i reintegracji ukraińskich dzieci, które zostały
  nielegalnie deportowane i przymusowo przemieszczone przez Rosję, aby doprowadzić
  do wyciągnięcia konsekwencji za te zbrodnie i oceny prawnej indoktrynacji dzieci
  na terytoriach okupowanych. Rada wspólnie stwierdziła, że Ukraina ma coraz większy
  wkład w zapewnienie bezpieczeństwa swoim partnerom, wyrażając uznanie dla jej niezrównanej
  innowacyjności i doświadczenia w stosowaniu nowoczesnych technologii na polu walki.
  Rada podkreśliła, że żadne inicjatywy ani decyzje dotyczące Ukrainy nie mogą być
  podejmowane bez udziału Ukrainy. Rada wyraziła potrzebę stosowania w regionie Morza
  Bałtyckiego bardziej zdecydowanych środków w odpowiedzi na agresywne działania Rosji,
  z którymi mierzyły się państwa członkowskie RPMB, takie jak: operacje w cyberprzestrzeni,
  akty sabotażu, w tym przeciwko łańcuchom dostaw w Europie, obce manipulacje informacjami
  i ingerencje (FIMI), ingerowanie w wybory, instrumentalizacja migracji, również
  poprzez działania Białorusi, zwłaszcza w związku z nielegalną presją migracyjną,
  oraz zakłócanie lotów, naruszanie przestrzeni powietrznej czy groźne w skutkach
  zakłócanie systemów nawigacji przez Rosję. Sytuacja ta wymaga zacieśnienia współpracy
  między demokratycznymi państwami regionu w celu wzmocnienia odporności i poprawy
  bezpieczeństwa. Rada zaapelowała o podejmowanie dalszych zdecydowanych kroków wymierzonych
  w działania zagrażające bezpieczeństwu w regionie Morza Bałtyckiego, w tym krytycznej
  infrastrukturze podwodnej. Państwa Morza Bałtyckiego są zaangażowane we wzmacnianie
  gotowości i intensyfikację współpracy przy jednoczesnym zapewnieniu właściwym organom
  krajowym zdolności do skutecznego działania. Rada pokreśliła, że realizacja memorandum
  w sprawie ochrony podwodnej infrastruktury krytycznej na Morzu Bałtyckim stanowi
  zasadniczy element tych działań. Rada wyraziła uznanie dla misji Baltic Sentry prowadzonej
  w ramach wzmożonej aktywności NATO za poprawę świadomości sytuacyjnej i wzmocnienie
  odstraszania. Rada wyraziła głębokie zaniepokojenie dużą liczbą statków należących
  do floty cieni, z których wiele jest podejrzanych o brak przynależności państwowej,
  a niektóre korzystają z fałszywych rejestrów, i wezwała do podjęcia dalszych kroków,
  w tym poprzez działania dyplomatyczne wobec państw bandery. Rosyjska flota cieni,
  składająca się w dużej mierze z przestarzałych, niedoubezpieczonych statków, które
  nie spełniają norm bezpieczeństwa morskiego, jest nadal poważnym powodem do niepokoju,
  stwarzając znaczne zagrożenie dla bezpieczeństwa, środowiska naturalnego i gospodarki
  zarówno w regionie Morza Bałtyckiego, jak i na całym świecie. Podjęcie kwestii floty
  cieni, w tym poprzez zdecydowane działania przeciwko tworzącym ją statkom, ma kluczowe
  znaczenie dla ograniczenia rosyjskich dochodów z eksportu surowców energetycznych,
  które są wykorzystywane do finansowania nielegalnej wojny napastniczej przeciwko
  Ukrainie, a także dla zapewnienia bezpieczeństwa i ochrony na Morzu Bałtyckim. W
  tym kontekście Rada z zadowoleniem przyjęła zorganizowanie w Sztokholmie w dniu
  6 maja 2026 r. spotkania doradców prawnych poświęconego zagrożeniom wynikającym
  z działalności floty cieni oraz ochronie krytycznej infrastruktury podwodnej, a
  także podkreśliła znaczenie kontynuowania rozmów między członkami RPMB, w razie
  potrzeby z udziałem doradców prawnych, na temat krajowych i międzynarodowych ram
  prawa morza. Rada potwierdziła niezmienne przywiązanie do prawa morza zawartego
  w Konwencji Narodów Zjednoczonych o prawie morza (UNCLOS), w tym do swobody żeglugi.
  Szczególny nacisk kładziony jest na pogłębiony dialog i bliższą współpracę z Unią
  Europejską. Współpraca w ramach UE, NB8++ i Grupy Zadaniowej G7/NB8++ ds. Floty
  Cieni pozostaje najwyższym priorytetem. Rada podkreśliła wyjątkową rolę RPMB w zjednoczeniu
  wszystkich demokratycznych państw regionu oraz jako platformy dialogu politycznego
  na wysokim szczeblu dotyczącego polityki zagranicznej i bezpieczeństwa, wymiany
  informacji i komunikacji w sprawach związanych z bezpieczeństwem regionu. RPMB może
  służyć także jako nieformalne forum prowadzenia dyskusji ad hoc poprzedzających
  inne spotkania regionalne. W tym zakresie Rada przyjęła z zadowoleniem organizację
  spotkania dyrektorów politycznych RPMB w dniu 15 stycznia 2026 r. oraz nieformalnego
  spotkania ministrów RPMB w Warszawie w dniu 4 marca 2026 r. Rada podkreśliła znaczenie
  zbliżającego się szczytu NATO w Ankarze jako okazji do pokazania jedności transatlantyckiej.
  Rada wyraziła uznanie dla osiągnięć grup eksperckich, sieci i projektów w ramach
  RPMB oraz ich wkładu w międzysektorową integrację i odporność w regionie. Instrument
  Wspierania Projektów RPMB powinien być kontynuowany ze szczególnym naciskiem na
  bezpieczeństwo i współpracę w budowaniu odporności. W tym kontekście Rada przyjęła
  z zadowoleniem pogłębienie współpracy z państwami o statusie obserwatora przy RPMB,
  w szczególności wzmocnioną i przynoszącą wzajemne korzyści współpracę z Ukrainą.
  Rada ustaliła, że jej dalsza praca będzie nadal koncentrować się na kwestiach bezpieczeństwa
  zarówno na szczeblu politycznym, jak i eksperckim. Konkretna współpraca powinna
  sprzyjać odporności państw członkowskich oraz ułatwiać skoordynowane reagowanie
  na bieżące wyzwania, w tym zagrożenia hybrydowe, a zarazem stanowić uzupełnienie
  prac innych organizacji międzynarodowych. Należy rozwijać współpracę w obszarze
  bezpieczeństwa cywilnego i gotowości cywilnej, w tym poprzez dialog publiczno-prywatny
  oraz spotkania właściwych ministrów w stosownych przypadkach. Należy przywiązywać
  najwyższą wagę do zwiększania świadomości i skoordynowanego reagowania w regionie
  w odniesieniu do FIMI jako szczególnego zagrożenia dla wszystkich członków RPMB.
  Rada podkreśliła wartość udziału młodzieży w procesach podejmowania decyzji dotyczących
  przyszłości regionu Morza Bałtyckiego oraz odnotowała Ministerialne Spotkanie Młodzieży,
  które odbyło się w Warszawie w dniach 20–22 kwietnia 2026 r., i rekomendacje opracowane
  podczas tego wydarzenia. Rada przyjęła do wiadomości raport przedstawiony na wniosek
  polskiej prezydencji przez Ośrodek Studiów Wschodnich jako kontynuację refleksji
  nad przyszłością RPMB w ramach przeglądu realizowanego zgodnie z Deklaracją z Vihuli
  z 16 maja 2025 r. Rada zwróciła się do następnej, islandzkiej prezydencji w RPMB
  o kontynuowanie reformy przez wzmacnianie dialogu i współpracy w kwestiach dotyczących
  bezpieczeństwa w oparciu o rozmowy i wspólne podstawy wypracowane podczas polskiej
  prezydencji w RPMB. Rada podziękowała Polsce za udaną prezydencję w RPMB w latach
  2025–2026 oraz wyraziła uznanie dla Stałego Sekretariatu Międzynarodowego za skuteczny
  wkład w realizację priorytetów RPMB. Rada powitała Islandię w roli państwa, które
  obejmie prezydencję od lipca 2026 r.'
