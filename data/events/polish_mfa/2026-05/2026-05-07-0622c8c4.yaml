title: Statement MFA
text: Article 18 of the Universal Declaration of Human Rights, adopted by the United
  Nations General Assembly in 1948, states that "everyone has the right to freedom
  of thought, conscience, and religion." By joining the UN, Israel accepted the organization's
  values as expressed in the Declaration. This same principle of religious freedom
  was reflected in Israel's Declaration of Independence, also adopted in 1948. Lebanon,
  on whose territory the incident occurred, is also a signatory. Every state has a
  responsibility to respect this fundamental right. In Poland, insulting religious
  feelings is a punishable offense. Repeated incidents involving representatives of
  the State of Israel that violate the religious sentiments of Christians undermine
  efforts to promote peace and cooperation in the Middle East. The Ministry of Foreign
  Affairs of the Republic of Poland consistently condemns all manifestations of religious
  discrimination in the world.
