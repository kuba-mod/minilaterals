title: Informal meeting of EU foreign ministers in Cyprus
text: EU ministers discussed key issues currently on the EU’s foreign policy agenda,
  most of all Russia’s aggression against Ukraine, supporting Ukraine, and ways of
  ramping up pressure on Russia. A discussion on the Middle East, including the consequences
  of the conflict in the Strait of Hormuz, as well as the situation in Gaza, Lebanon,
  and Syria, was joined by the foreign ministers of Saudi Arabia and India. In the
  margins of Gymnich, Minister Radosław Sikorski met with the foreign ministers of
  Ukraine and Slovakia.
