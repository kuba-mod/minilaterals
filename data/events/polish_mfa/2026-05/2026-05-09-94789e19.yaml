title: W najlepszym miejscu do życia. Polska świętuje Dzień Europy.
text: 'Polska współkształtuje decyzje Unii Europejskiej. Jesteśmy piątym co do wielkości
  krajem UE, z blisko 37 milionami mieszkańców, odpowiadającymi za niemal 8% populacji
  Unii. W ciągu 22 lat osiągnęliśmy 81% średniego poziomu bogactwa UE. Nasz głos ma
  znaczenie – zarówno w polityce gospodarczej, jak i w kwestiach bezpieczeństwa. Członkostwo
  w UE to znacznie więcej niż fundusze europejskie. Swobodny dostęp do największego
  zintegrowanego rynku świata to realne pieniądze, które wzmacniają polską gospodarkę,
  tworzą miejsca pracy i budują dobrobyt obywateli. Rynek wewnętrzny Unii jest większy
  od polskiego dwunastokrotnie pod względem liczby ludności i dwudziestokrotnie pod
  względem potencjału gospodarczego. Trafia tam ¾ towarów, które z Polski eksportujemy.
  To bezpieczeństwo, możliwości i silniejsza pozycja Polski na świecie. Doświadczenia
  ostatnich lat pokazują, że UE to nie tylko długofalowe korzyści rozwojowe, ale także
  realne narzędzia działania w sytuacjach kryzysowych – od pandemii, przez kryzys
  energetyczny, po wojnę w Ukrainie. Dziś nie tylko korzystamy z europejskiego bezpieczeństwa
  – sami je wzmacniamy. Polska przeznacza 200 mld PLN na obronność a w Warszawie znajduje
  się siedziba Frontexu – agencji odpowiedzialnej za ochronę granic zewnętrznych UE.
  Polska odegrała kluczową rolę w odpowiedzi na kryzysy, przyjmując milion uchodźców
  z Ukrainy, chroniąc wschodnią granicę UE i wzmacniając bezpieczeństwo energetyczne
  regionu. Inwestycje unijne takie jak gazociąg Baltic Pipe czy terminal LNG pozwoliły
  uniezależnić się od rosyjskiego gazu i wzmocnić odporność całej Unii. Wspieramy
  rozwój OZE, niezależnych od importu paliw z zagranicy. Dzięki wspólnym regulacjom
  konsumenci w Europie są lepiej chronieni a firmy działają w przewidywalnym otoczeniu.
  Obywatele korzystają z jednolitych standardów – od bezpieczeństwa produktów, przez
  prawa pasażerów po przejrzystość cen z ostatnich 30 dni. Brak kontroli paszportów,
  uznawanie krajowego prawa jazdy, koszty rozmów telefonicznych i dostępu do internetu
  takie same jak w kraju, możliwość zwrotu towaru w ciagu 14 dni czy wspólne standardy
  ładowania urządzeń to dziś codzienność milionów Polaków. Roaming danych w UE to
  średnio 86 PLN miesięcznych oszczędności na osobę. Ponad 3/4 podróży zagranicznych
  Polaków to podróże do państw UE. W latach 2004–2026 środki europejskie pozwoliły
  na budowę i modernizację niemal 20 tysięcy kilometrów dróg, ponad 6 tysięcy kilometrów
  linii kolejowych i rozwój transportu publicznego. Dzięki temu Polska jest dziś lepiej
  skomunikowana i bezpieczniejsza – liczba wypadków drogowych spadła o ponad połowę.
  To zmiany, które poza Unią Europejską zajęłyby dekady. Stabilne reguły, przejrzystość
  i przewidywalność pozwalają planować rozwój, przyciągać inwestycje i budować zaufanie.
  Wspólnota europejska opiera się na wartościach – demokracji, wolności i rządach
  prawa, które stanowią fundament naszego bezpieczeństwa i dobrobytu. *** Dowiedz
  się więcej: 22 lata Polski w Unii Europejskiej. Polski sukces w liczbach. - Ministerstwo
  Spraw Zagranicznych - Portal Gov.pl'
