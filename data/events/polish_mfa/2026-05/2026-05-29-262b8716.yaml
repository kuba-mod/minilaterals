title: Polsko-włoskie konsultacje w Warszawie
text: Spotkanie wiceszefów dyplomacji Polski i Włoch były okazją do omówienia tematów
  jakich jak relacje dwustronne, współpraca gospodarcza i obronna, rozszerzenie UE,
  kwestie migracyjne i sytuacja polityczna w sąsiedztwie Europy. Wiceministrowie podkreślili
  zbieżność stanowisk m.in. w kwestiach związanych z bezpieczeństwem, dlatego omawiali
  możliwości rozwoju współpracy zbrojeniowej oraz w branży kosmicznej. W trakcie spotkania
  strona polska formalnie zadeklarowała wolę stania się państwem członkowskim Procesu
  Rzymskiego w sprawach migracji. Potwierdzono też rozpoczęcie prac nad nowym Traktatem
  o przyjaźni i współpracy, zgodnie z zapowiedzią po spotkaniu Prezesa Rady Ministrów
  Donalda Tuska z Premier Republiki Włoskiej Giorgią Meloni 7 maja 2026 r. w Rzymie.
  Przypomnijmy, że w kwietniu wicepremier i minister spraw zagranicznych RP Radosław
  Sikorski oraz wicepremier i minister spraw zagranicznych Republiki Włoskiej Antonio
  Tajani podpisali w Rzymie Memorandum o Porozumieniu w sprawie współpracy strategicznej
  między oboma resortami. Dokument, sygnowany podczas polsko-włoskiego forum „THE
  BRIDGE”, zakłada systematyczne konsultacje obu państw oraz zacieśnienie więzi polityczno-gospodarczych
  na osi Bałtyk-Morze Śródziemne.
