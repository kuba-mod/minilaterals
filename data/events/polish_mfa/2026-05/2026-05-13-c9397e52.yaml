title: Deputy Prime Minister Sikorski takes part in IMPACT CEE 2026
text: 'Hosted by Professor Monika Sus of the Institute of Political Studies at the
  Polish Academy of Sciences, a fireside chat around the theme of “Poland in a Changing
  World Order. Radosław Sikorski on Challenges and Opportunities” offered room for
  discussion on the future of Ukraine, the prospects for Polish business, and Poland’s
  role in the European Union. During the debate, Deputy Prime Minister Sikorski said
  that Russia’s war against Ukraine is more than a mere territorial conflict. The
  Ukrainian people are fighting for the right to self-determination and accession
  to the European Union. He referred to the origins of the Maidan demonstrations,
  inspired by Ukraine’s European aspirations. Ukraine exemplifies how important it
  is for people from outside Europe to become part of it. Ukrainians are fighting
  and dying for the right to accede to the European Union Poland’s top diplomat noted
  that the Polish business community is already present in Ukraine, represented by
  nearly three thousand Polish companies. He also said that Poland has inherent advantages
  to use as leverage in rebuilding Ukraine, namely cultural, linguistic, and logistical
  proximity. What is more, the strength of the Polish business community lies in Poles’
  skill at competing on the European market. Foreign Minister Sikorski also spoke
  about the immense economic benefits of Poland’s membership of the EU: Deputy Prime
  Minister Radosław Sikorski also emphasised the need to strengthen the EU in the
  face of new threats, including war, both conventional and hybrid, security, and
  migration. Personally, I am an enthusiast of Tony Blair’s beautiful thought that
  the EU must be a superpower, not a superstate. If we want the EU to fulfil more
  tasks, we have to give it more instruments Minister Sikorski quoted the example
  of what had happened in the immediate aftermath of Russia’s full-scale invasion
  of Ukraine. Most Europeans wanted the EU to take care of our defence, and it did.
  We have launched a peace budget (the European Peace Facility) to financially support
  Ukraine’s efforts During the conference, Deputy Prime Minister Radosław Sikorski
  visited the MFA’s exhibition stand mapping the network of Polish Institutes around
  the globe. So did the MFA’s Secretary of State Marcin Bosacki and Secretary of State
  for European Affairs Ignacy Niemczycki. The top diplomat stressed the importance
  of cultural diplomacy in pursuing foreign policy. This includes promoting the Polish
  culture abroad and building Poland’s soft power. He also announced that two new
  institutes will be opened in Seoul and Istanbul. At this point, the network of Polish
  Institutes is composed of 25 entities that build partnerships with cultural institutions
  and shape Poland’s image among foreigners. This is also exemplified by cooperation
  with the gaming sector, and with literary translators and publishers. All visitors
  of the MFA’s stand could become familiar with Polish literature translated into
  more than ten languages and watch the film “Digital Dreamers” promoting the history
  of gamedev in Poland. Impact CEE is one of the largest business and technology conferences
  in Central and Eastern Europe, bringing together representatives of politics, business,
  culture, and sport.'
