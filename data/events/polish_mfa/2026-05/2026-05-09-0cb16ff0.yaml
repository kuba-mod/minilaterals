title: In the best place to live. Poland celebrates Europe Day
text: 'Poland co-shapes the decisions of the European Union. We are the fifth-largest
  country in the EU, with a population of nearly 37 million, accounting for almost
  8% of the Union’s total population. Over the past 22 years, we have reached 81%
  of the EU’s average level of wealth. Our voice matters—both in economic policy and
  on security issues. EU membership is about much more than just European funds. Unrestricted
  access to the world’s largest integrated market translates into real financial benefits
  that strengthen the Polish economy, create jobs, and build prosperity for citizens.
  The EU’s internal market is twelve times larger than Poland’s in terms of population
  and twenty times larger in terms of economic potential. It is the destination for
  three-quarters of the goods we export from Poland. It means security, opportunities,
  and a stronger position for Poland on the global stage. Experience of the recent
  years has shown that the EU offers not only long-term development benefits, but
  also effective measures for responding to crises—from the pandemic and the energy
  crisis to the war in Ukraine. Today, we not only benefit from European security—we
  are helping to strengthen it ourselves. Poland has allocated PLN 200 billion to
  defence, and Warsaw is home to the headquarters of Frontex, the agency responsible
  for protecting the EU’s external borders. Poland has played a key role in responding
  to crises by welcoming a million refugees from Ukraine, protecting the EU’s eastern
  border, and strengthening the region’s energy security. EU investments such as the
  Baltic Pipe gas pipeline and the LNG terminal made it possible to reduce dependence
  on Russian gas and strengthen the resilience of the EU as a whole. We support the
  development of renewable energy sources that are not reliant on fuel imports from
  abroad. Thanks to common regulations, consumers in Europe are better protected and
  businesses operate in a predictable environment. Citizens benefit from uniform standards—from
  product safety and passenger rights to price transparency covering the last 30 days.
  No passport checks, recognition of national driving licences, phone call and internet
  access costs the same as at home, the possibility to return goods within 14 days,
  and common charging standards for devices are now part of everyday life for millions
  of Poles. Data roaming within the EU results in average monthly savings of PLN 86
  per person. More than three-quarters of Poles’ trips abroad are to EU countries.
  Between 2004 and 2026, European funding enabled the construction and modernisation
  of almost 20,000 kilometres of roads, over 6,000 kilometres of railway lines, and
  the development of public transport. As a result, Poland is now better connected
  and safer—the number of road accidents has fallen by more than half. These changes
  would have taken decades to implement outside the European Union. Stable rules,
  transparency, and predictability make it possible to plan growth, attract investment,
  and build trust. The European community is founded on the values of democracy, freedom
  and the rule of law, which form the basis of our security and prosperity. *** Learn
  more: Poland''s 22 years in the European Union. Success in figures - Ministry of
  Foreign Affairs Republic of Poland - Gov.pl website'
