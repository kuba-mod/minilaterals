title: Polsko-kongijskie konsultacje w Warszawie
text: Spotkanie stanowiło ważny krok w kierunku pogłębienia relacji dwustronnych.
  Wiceministrowie wyrazili nadzieję na intensyfikację kontaktów na wysokim szczeblu
  oraz dalszy rozwój wymiany handlowej. Wiceminister Wojciech Zajączkowski przedstawił
  polską ofertę w takich sektorach jak cyberbezpieczeństwo, cyfryzacja (w tym e-administracja),
  rolnictwo, sektor wydobywczy, uprzemysłowienie państwa, gospodarka morska oraz infrastruktura
  kolejowa. Z kolei wiceministra Ayeganagato Nakwipone poinformowała o wdrażaniu strategii
  rozwoju gospodarczego państwa kongijskiego. Zaznaczyła jednocześnie, że polska oferta
  współpracy doskonale wpisuje się w wizję projektów inwestycyjnych i rozwojowych
  Dempkratycznej Republiki Konga w takich sektorach jak rolnictwo, górnictwo, e-administracja
  i przemysł. Wyraziła przy tym uznanie dla polskiej transformacji ekonomicznej i
  zaawansowania technologicznego naszego kraju, wskazując je jako wartościowy przykład
  dla współpracy i wymiany doświadczeń. Rozmowy polsko-kongijskie dotyczyły także
  kwestii bezpieczeństwa regionalnego, w szczególności w Europie i w regionie Wielkich
  Jezior. W tym kontekście omówiono zagrożenia dla ludności cywilnej oraz wyzwania
  związane z zarządzaniem bezpieczeństwem granic. Omówiono również współpracę w dziedzinie
  nauki, szkoleń zawodowych oraz w obszarach administracji publicznej. Wiceszefowa
  kongijskiej dyplomacji spotkała się także z przedstawicielami Ministerstwa Cyfryzacji,
  Ministerstwa Rozwoju i Technologii oraz Głównego Inspektoratu Weterynaryjnego. Delegacja
  Demokratycznej Republiki Konga uczestniczyła również w forum ekonomicznym zorganizowanym
  przez Polską Agencję Inwestycji i Handlu.
