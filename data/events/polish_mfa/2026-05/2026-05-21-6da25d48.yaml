title: Oświadczenie MSZ
text: Podczas spotkania otrzymał oficjalną notę z żądaniem poszanowania praw i godności
  aresztowanych oraz traktowania ich w sposób zgodny z międzynarodowymi standardami,
  przeprowadzenia postępowania wyjaśniającego okoliczności zdarzenia, potępienia sprawców
  oraz przeprosin ze stron władz Izraela. Ponadto, Wicepremier, Minister Spraw Zagranicznych
  Radosław Sikorski podjął decyzję o skierowaniu wniosku do Urzędu do Spraw Cudzoziemców.
  Zwrócił się w nim objęcie ministra bezpieczeństwa narodowego Izraela Itamara Ben-Gwira
  zakazem wjazdu na teren Polski w związku ze swoimi działaniami.
