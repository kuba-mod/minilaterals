title: Deputy Minister Bosacki takes part in Foreign Affairs Council (FAC) in Brussels
text: Besides the sanctions, the 11 May talks focused on Russia’s ongoing aggression
  against Ukraine, the situation in the Middle East, and the EU’s relations with Western
  Balkan countries. Also, informal meetings with foreign ministers of Western Balkan
  countries and Canada’s Foreign Minister Anita Anand were held in Brussels. In a
  discussion on Russia’s aggression against Ukraine, Deputy Minister Bosacki underlined
  that Russia’s goals have not changed, although it is incapable of achieving them
  through war. He called for prompt launching of the EUR 90 billion loan for Ukraine,
  which is necessary to strengthen Ukraine’s Armed Forces and keep the Ukrainian state
  operational. He also highlighted the importance of keeping the sanctions pressure
  on Russia, including energy sanctions. The deputy head of Polish diplomacy called
  for the urgent opening of the first negotiating cluster with Ukraine (Fundamentals),
  whilst emphasising that enlargement must remain a process based on substantive grounds
  and taking into account the vulnerabilities of the member states (including those
  relating to agriculture and transport). During the meeting, the Council imposed
  sanctions on further 16 individuals and seven entities responsible for regular unlawful
  deportation, forced resettlement, and assimilation of Ukrainian children as well
  as their illegal adoption and transfer to the Russian Federation. Talking on the
  situation in the Middle East, the ministers emphasised the crucial importance of
  swiftly restoring freedom of navigation through the Strait of Hormuz and reaching
  a lasting ceasefire. They spoke in favour of strengthening relations with the Gulf
  states. The participants criticised Israel’s violation of the ceasefire reached
  with Hamas on 9 October 2025 and voiced their concerns about the number of civilian
  casualties in Lebanon. The Council also expressed its support for imposing sanctions
  on illegal Israeli settlers in the West Bank. During an informal meeting with the
  foreign ministers of the Western Balkans, Poland’s Deputy Foreign Minister Bosacki
  urged his partners to fully align with the EU’s priorities in foreign and security
  policies. He stressed that it is a prerequisite for a future EU membership. During
  the meeting with Canada’s foreign minister, it was confirmed that the EU and Canada
  share the same position on key foreign policy issues, including Russia’s aggression
  against Ukraine. *** Foreign Affairs Council is responsible for the EU’s foreign
  policy, and manages its diplomatic relations with the rest of the world. It decides
  on security and defence matters, concludes trade agreements, and establishes international
  partnerships.
