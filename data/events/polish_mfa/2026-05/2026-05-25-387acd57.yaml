title: MFA statement
text: If Russia, as it claims, is not conducting a war but rather a so-called “special
  military operation,” which by definition should be limited in scope to military
  targets, then any attacks on other infrastructure, including diplomatic missions,
  should be treated as hostile acts. Any strike on Poland’s diplomatic missions will
  therefore be considered deliberate and intentional. The actions of the Russian Federation
  carry serious consequences under international law, once again undermining its role
  as a permanent member of the UN Security Council. We call on Russia to immediately
  cease its unjustified and unlawful aggression and to comply with its international
  commitments and treaties.
