title: Oświadczenie MSZ
text: Artykuł 18 Powszechnej Deklaracji Praw Człowieka uchwalonej przez Zgromadzenie
  Ogólne Narodów Zjednoczonych w 1948 roku stanowi, że „każdy ma prawo do wolności
  myśli, sumienia i religii.” Przystępując do ONZ, Izrael przyjął wartości tej organizacji
  wyrażone w Deklaracji. Ta sama zasada wolności religijnej znalazła odzwierciedlenie
  w Deklaracji Niepodległości Izraela przyjętej również w 1948 roku. Do grona sygnatariuszy
  należy natomiast Liban, na terytorium którego doszło do incydentu. Obowiązek zapewnienia
  poszanowania tego prawa o fundamentalnym znaczeniu dla godności człowieka spoczywa
  na każdym państwie. W Polsce znieważanie czyichkolwiek uczuć religijnych jest czynem
  karalnym. Kolejny incydent z udziałem przedstawiciela Państwa Izrael, naruszający
  uczucia religijne chrześcijan, nie tworzy atmosfery sprzyjającej pokojowi na Bliskim
  Wschodzie i rozwojowi współpracy. MSZ RP niezmiennie potępia przejawy wszelkiej
  dyskryminacji religijnej na świecie.
