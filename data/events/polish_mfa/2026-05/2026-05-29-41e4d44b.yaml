title: Król Aszanti z wizytą w Polsce
text: 'Podczas rozmowy wiceminister Zajączkowski podkreślił rosnące znaczenie Ghany
  jako stabilnego i demokratycznego partnera gospodarczego oraz bramy do rynków Afryki
  Zachodniej. W Ghanie działa sekretariat Afrykańskiej Kontynentalnej Strefy Wolnego
  Handlu (African Continental Free Trade Area), który wspiera integrację gospodarczą
  na kontynencie. Wiceminister wskazał, że coraz więcej polskich przedsiębiorstw szuka
  możliwości rozwoju poza Europą, a Afryka staje się jednym z najbardziej perspektywicznych
  kierunków ekspansji. Szczególny potencjał współpracy dostrzeżono w sektorach: rolno-spożywczym,
  maszynowym, transportowym, cyfrowym oraz cyberbezpieczeństwa. Rozmowy dotyczyły
  również współpracy akademickiej. Uczestnicy spotkania rozmawiali o programach wymiany
  studentów, naukowców i lekarzy oraz rozwoju kontaktów kulturalnych. Podkreślali,
  że są zainteresowani dalszym wzmacnianiem relacji politycznych i gospodarczych,
  które mogą otworzyć nowe możliwości dla obu państw.'
