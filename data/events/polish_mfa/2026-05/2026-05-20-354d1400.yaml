title: Polish-Hungarian consultations in Warsaw
text: Poland’s top diplomat Radosław Sikorski reaffirmed our support for Péter Magyar’s
  government’s efforts to unlock European funds for Hungary and stressed the importance
  of the rule of law and restoring trust in public institutions in this context. The
  talks also covered energy resources. Deputy Prime Minister Sikorski stressed that
  Poland can be Hungary’s major partner is its search for alternative sources of supplies
  and gaining independence from Russian raw materials. The meeting between the foreign
  ministers of Poland and Hungary in Warsaw was a milestone in building new relations
  between the two countries and identifying areas of mutual interest. The ministers
  agreed on the need to enhance cooperation in regional formats, including within
  the Visegrad Group. The talks were held as part of Prime Minister Péter Magyar’s
  first official foreign visit since taking office, during which he has travelled
  to Poland on 19–21 May 2026. The broad composition of the Hungarian government delegation—including,
  among others, the head of the Prime Minister’s Office and the ministers responsible
  for defence, the economy, energy, agriculture, and culture—is a token of Budapest’s
  willingness to rebuild good bilateral relations with Warsaw, based on mutual respect
  and trust.
