title: Spotkanie wicepremiera Radosława Sikorskiego z kubańskim opozycjonistą José
  Danielem Ferrerem
text: Podczas spotkania z José Danielem Ferrerem wicepremier Radosław Sikorski podkreślił,
  że Polska chce przekazać Kubańczykom doświadczenia z okresu zmian systemowych, a
  polski model transformacji może stać się inspiracją dla środowisk niezależnych.
  Kubańczyków wspierają także polscy ekonomiści, którzy uczestniczą w międzynarodowych
  seminariach dotyczących reform gospodarczych na Kubie. Szef MSZ zapewnił, że Polska
  popiera kubańskie dążenia do przemian demokratycznych i przypomniał o przyznaniu
  Nagrody Solidarności im. Lecha Wałęsy kubańskiej dysydentce Bercie Soler . Komunizm
  pozostawia po sobie tylko zgliszcza. Wspieramy demokratyczne aspiracje narodu kubańskiego
  José Daniel Ferrer rozpoczął europejską podróż kilka miesięcy po emigracji do USA.
  Więzieniem, a potem banicją zapłacił za działalność skierowaną do najbardziej potrzebujących
  Kubańczyków, a także śmiałe głoszenie postulatów organizacji wolnych wyborów i działania
  na rzecz praw człowieka. Podczas europejskiej podróży, poza Polską, José Daniel
  Ferrer odwiedzi m.in. Hiszpanię, Szwecję, Holandię, Francję i Wielką Brytanię.
