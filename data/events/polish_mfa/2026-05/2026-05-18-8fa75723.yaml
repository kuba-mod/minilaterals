title: Poland's and France's top diplomats meet for consultations and attend Polish
  Institute opening event
text: 'The cooperation between Poland and France is gaining momentum. That’s good
  news for Poland, France, and Europe at large,” Radosław Sikorski said after the
  Paris meeting on 18 May. During the talks, the two diplomats took stock of the Polish–French
  Intergovernmental Summit co-chaired by the Polish Prime Minister and the President
  of France in Gdańsk on 20 April as the first such meeting following the signing
  of the Treaty of Nancy. On security and economic cooperation The foreign ministers
  of Poland and France spoke about support for Ukraine as it fights the Russian invasion.
  They stressed Poland’s special role in the actions taken by Europe for the sake
  of regional security. They also discussed expectations ahead of the upcoming NATO
  summit in Ankara. Economic cooperation was also high on the agenda, encompassing
  its bilateral dimension as well as Poland’s engagement in G-20 work and France’s
  preparations for the G-7 summit in Évian-les-Bains on 15–17 June. Poland’s top diplomat
  on the stability of the Polish energy sector During his visit to Paris, Foreign
  Minister Sikorski met with Fatih Birol, Executive Director of the International
  Energy Agency. The two officials discussed how the situation in the Middle East
  affects the global energy market, how the IEA could contribute to the resilience
  and reconstruction of Ukraine’s energy system, and what role the Agency plays in
  regard to the security of supply of critical raw materials and the promotion of
  nuclear energy. Minister Sikorski made a point about the stability of the Polish
  energy sector, obtained through diversification, departure from Russian energy sources,
  and the safeguarding of reserves. He also welcomed the IEA executive’s criticism
  of returning to collaboration with Russia on hydrocarbons. Polish Institute in Paris
  returns to its historical seat The top diplomats of Poland and France took part
  in an official event to mark the opening of a renovated seat of the Polish Institute.
  Our presence with Minister Barrot at this event testifies that culture is among
  the key areas of the strategic partnership between our countries May the refurbished
  venue of the Polish Institute in Paris be a place of fruitful cooperation, inspiring
  projects, and bonds of friendship that endure the test of time as do relations between
  Poland and France During the opening event, Deputy Prime Minister Sikorski said
  that the Polish Institute’s mission is to build lasting relations between institutions,
  artists, scientists, and societies of the two countries. The head of Polish diplomacy
  recalled the history of Polish‑French relations and emphasised that the shared experiences
  and values are reflected in the Treaty of Nancy, signed on 9 May 2025. The Treaty
  on Enhanced Cooperation and Friendship concerns not only collaboration in the fields
  of the defence industry, the economy, agriculture, and science, but also cultural
  cooperation. Deputy Prime Minister Sikorski also announced one of the most important
  projects cultural institutions in Poland and France, including the Polish Institute
  in Paris, are currently working on: the Poland–France Cultural Season 2027. The
  programme won’t be short on projects addressing the challenges of our times—including
  countering disinformation, defending civil liberties, and strengthening social dialogue.
  It is precisely such initiatives that give the provisions of treaties and declarations
  a real, human dimension. Poland’s top diplomat added that the importance of people-to-people
  relations is also reflected in the Bronisław Geremek Prize, established this year:
  a distinction granted to those who make a particularly significant contribution
  to building bridges between Poland and France. The first laureate is the Polish
  actor and member of the Comédie-Française, Andrzej Seweryn. The artist received
  the award on 20 April, Polish‑French Friendship Day, which was also celebrated for
  the first time this year. Founded in 1979, the Polish Institute in Paris is located
  in a building formed from two connected houses at 31 rue Jean Goujon in the 8th
  arrondissement of Paris. Annually, the Institute carries out around one hundred
  projects in the fields of film, music, theatre, dance, visual arts, literature,
  and history. It also cooperates with major French festivals such as the Avignon
  Festival, the Angoulême International Comics Festival, the Paris Book Fair, and
  Jazz à Junas. Among other facilities, the renovated building offers a movie theatre
  for 100 people, a concert hall, and an exhibition space.'
