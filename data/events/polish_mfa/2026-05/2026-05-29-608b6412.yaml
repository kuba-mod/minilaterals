title: Spotkanie podsekretarza stanu Artura Harazima z przedstawicielami kapituły
  Nagrody im. Geremka
text: Nagroda im. Bronisława Geremka za wkład w umacnianie relacji polsko-francuskich
  stanowi wyraz uznania dla szczególnie zasłużonych dla rozwoju dialogu i współpracy
  między Polską a Francją, opartych na wspólnych wartościach i wielowiekowych więziach
  obu narodów. Jej ustanowienie wynika z postanowień Traktatu z Nancy – podpisanego
  9 maja 2025 r. i obowiązującego od 22 stycznia br. - który wyznaczył nowy etap w
  relacjach dwustronnych. Wiceminister Artur Harazim wręczył akty powołania na członków
  kapituły Nagrody im. Bronisława Geremka prezes Fundacji im. B. Geremka Jolancie
  Kawie oraz posłowi na Sejm RP i przewodniczącemu Polsko-Francuskiej Grupie Parlamentarnej
  Pawłowi Bliźniukowi. Podczas spotkania omówiono m.in. działania na rzecz relacji
  polsko‑francuskich w sferze kultury i dialogu społecznego. Podjęto także temat możliwości
  realizacji wspólnych inicjatyw w tych obszarach. Nazwisko pierwszego laureata Nagrody
  im. B. Geremka ogłoszono 20 kwietnia w Dzień Przyjaźni Polsko-Francuskiej, na marginesie
  Międzyrządowego Szczytu w Gdańsku. Nagrodę otrzymał aktor Andrzej Seweryn za wybitne
  osiągnięcia artystyczne oraz konsekwentne budowanie mostów między Polską a Francją
  poprzez działalność kulturalną i publiczną.
