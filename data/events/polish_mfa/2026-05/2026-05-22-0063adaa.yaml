title: Wizyta Wiceministra Ignacego Niemczyckiego w Bernie
text: Ponadto rozmawiano również o odbudowie Ukrainy, relacjach z USA i bezpieczeństwie.
  Rosnące znaczenie stosunków polsko-szwajcarskich znajduje wyraz przede wszystkim
  w wymiarze gospodarczym – stwierdzili zgodnie wiceminister Ignacy Niemczycki oraz
  dyrektor Helena Budligier Artieda. Świadczą o tym wzrastający wolumen wymiany handlowej
  oraz intensyfikacja współpracy inwestycyjno-kapitałowej. Dodatkowe możliwości w
  zakresie pogłębiania tych relacji stwarza format G20. Rozmówcy zgodzili się co do
  konieczności nadania relacjom Szwajcarii i Unii Europejskiej większej dynamiki,
  zwłaszcza w obliczu współczesnych zmian geopolitycznych i obecnej polityki USA.
  Rozmowy z podsekretarzem stanu Patricem Franzenem ogniskowały się przede wszystkim
  wokół kwestii bezpieczeństwa. Polska i Szwajcaria podzielają stanowisko w tym zakresie,
  włączając w to percepcję wojny w Ukrainie i potrzebę zapewnienia dalszego wsparcia
  finansowego i humanitarnego dla ofiary agresji. Rozmówcy z aprobatą odnieśli się
  do pogłębiającego się zaangażowania Szwajcarii w przedsięwzięcia obronne UE oraz
  zadeklarowali gotowość dalszej współpracy w związku z jej przewodnictwem w OBWE.
