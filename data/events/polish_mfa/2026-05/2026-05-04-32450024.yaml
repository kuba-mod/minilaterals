title: Wyniki konkursu „Pomoc humanitarna 2026”
text: W wyniku rozstrzygnięcia konkursu Ministra Spraw Zagranicznych „Pomoc humanitarna
  2026” dofinansowanie otrzymuje 16 ofert. Celem konkursu było wyłonienie najlepszych
  ofert z propozycjami zadań publicznych (projektów), obejmujących realizację działań
  humanitarnych w Libanie, Palestynie, Syrii i Ukrainie, z wyłączeniami terytorialnymi
  wskazanymi w pkt. 2.1 Regulaminu konkursu. Biorąc pod uwagę potrzeby humanitarne
  w Ukrainie i na Bliskim Wschodzie oraz wysoką jakość złożonych ofert Minister Spraw
  Zagranicznych zdecydował o zwiększeniu budżetu konkursu (pierwotnie 15 000 000 zł)
  o 4 869 175 zł, by sfinansować również 5 kolejnych najwyższej ocenionych projektów.
  W efekcie łączna wartość dotacji w konkursie „Pomoc humanitarna 2026” wynosi 19 869 175
  zł. Fundacja "Polskie Centrum Pomocy Międzynarodowej" Pomoc żywnościowa dla osób
  wewnętrznie przesiedlonych i nowo przybyłych uchodźców w Libanie Fundacja "Polskie
  Centrum Pomocy Międzynarodowej" Poprawa dostępu do podstawowej opieki zdrowotnej
  i medycyny ratunkowej w regionie Damaszku i Rif Dimashq Zapewnienie interwencyjnej
  pomocy żywnościowej dla najbardziej zagrożonej ludności cywilnej na Zachodnim Brzegu
  Palestyny. Zapewnienie dostępu do wody pitnej oraz podstawowych środków higieny
  dla ludności przesiedlonej w Strefie Gazy Fundacja "Polskie Centrum Pomocy Międzynarodowej"
  Poprawa warunków higienicznych osób z grup wrażliwych w hromadach obwodów charkowskiego,
  odeskiego i mikołajowskiego w Ukrainie Wsparcie funkcjonowania systemu ochrony zdrowia
  i dostępności usług medycznych w obwodzie charkowskim w Ukrainie Leki i materiały
  medyczne pierwszej potrzeby dla społeczności dotkniętych kryzysem w Libanie Towarzystwo
  Salezjańskie - Inspektoria (Prowincja) św. Stanisława Kostki Wsparcie humanitarne
  w zakresie pomocy żywnościowej dla osób poszkodowanych w wyniku wojny w Ukrainie
  Poprawa bezpieczeństwa żywnościowego poprzez pomoc żywnościową w formie e-voucherów
  dla najbardziej potrzebujących osób wewnętrznie przemieszczonych, powracających
  oraz społeczności przyjmujących w miejscowości Latmana, w prowincji Hama, w północno-zachodniej
  Syrii Zapewnienie wsparcia w zakresie schronienia oraz podstawowej pomocy dla gospodarstw
  domowych rodzin przesiedlonych w Strefie Gazy. Wsparcie podstawowej opieki zdrowotnej,
  zdrowia psychicznego oraz leczenia niedożywienia w regionie Idlib w Syrii SAFE –
  Pilna pomoc żywnościowa dla osób przesiedlonych i społeczności szczególnie narażonych
  w Libanie
