title: Warsaw hosts Polish-Italian consultations
text: Deputy foreign ministers discussed bilateral ties, economic and defence cooperation,
  EU enlargement, migration, and the political situation in Europe’s neighbourhood.
  The diplomats highlighted their countries’ similar views on security, which led
  them to discussing the prospects of working together, for example in the armaments
  and space sectors. At the meeting, Poland officially declared its willingness to
  join the 'Rome Process' on migration as a participating state. Both sides also confirmed
  the inauguration of works on a new Treaty of Friendship and Cooperation, first announced
  following the talks between Prime Minister of Poland Donald Tusk and Prime Minister
  of Italy Giorgia Meloni, held in Rome on 7 May 2026. It is worth recalling that
  in April, at “THE BRIDGE” Polish–Italian forum in Rome, Deputy Prime Minister and
  Foreign Minister Radosław Sikorski and his Italian counterpart Antonio Tajani signed
  a Memorandum of Understanding on strategic cooperation between the two ministries
  . It provides for regular bilateral consultations and tightened political and economic
  bonds on the Baltic–Mediterranean axis.
