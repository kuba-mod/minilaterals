title: Konkurs na logo nowej wersji systemu „Odyseusz”
text: 'Nowy „Odyseusz” połączy najważniejsze funkcje i informacje potrzebne podróżującym.
  System będzie dostępny na stronie internetowej, w specjalnej aplikacji mobilnej
  oraz w aplikacji mObywatel. Dzięki nowemu „Odyseuszowi” użytkownicy będą mogli:
  Termin nadsyłania prac: 31 maja 2026 r. Zgłoszenia należy przesyłać drogą elektroniczną
  na adres: odyseusz@msz.gov.pl Szczegółowe informacje dotyczące zasad udziału w konkursie,
  wymagań technicznych oraz sposobu zgłaszania prac znajdują się w regulaminie poniżej.'
