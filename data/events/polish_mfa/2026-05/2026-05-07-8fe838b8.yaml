title: Deputy Prime Minister Radosław Sikorski meets with Cuban opposition leader
  José Daniel Ferrer
text: During the meeting with José Daniel Ferrer, Deputy Prime Minister Sikorski stressed
  that Poland wants to share its political transition experience with the Cubans and
  that Poland’s transformation model could become an inspiration for circles engaged
  in independent activism. The Cubans also have the support of Polish economists who
  are taking part in international seminars on Cuba’s economic reforms. The MFA head
  declared that Poland supports Cuban aspirations for democratic reform and recalled
  that Lech Wałęsa Solidarity Prize was awarded to Cuban dissident Berta Soler . Communism
  leaves behind nothing but ashes. We support the democratic aspirations of the people
  of Cuba José Daniel Ferrer began to tour Europe a few months after he had emigrated
  to the US. His activism addressing the most vulnerable Cubans, bold solicitation
  for free elections, and advocacy of human rights had cost him imprisonment and exile.
  Apart from Poland, José Daniel Ferrer’s European itinerary will include Spain, Sweden,
  the Netherlands, France, and the United Kingdom, among other countries.
