title: Dzień Polonii i Polaków za Granicą
text: Dzień Polonii i Polaków za Granicą został ustanowiony przez Sejm RP w 2002 roku
  w uznaniu „wielowiekowego dorobku i wkładu Polonii i Polaków  za granicą w odzyskanie
  przez Polskę niepodległości, wierność i przywiązanie do polskości oraz pomoc Krajowi
  w najtrudniejszych momentach, w celu potwierdzenia więzi z Macierzą i jedności wszystkich
  Polaków, tak mieszkających w Kraju, jak i żyjących poza nim”. Polonia i Polacy za
  granicą są jedną z najliczniejszych diaspor na świecie. To około 20 milionów osób,
  które emigrowały z Polski lub których przodkowie opuścili Ojczyznę pod naciskiem
  historii, ze względów ekonomicznych czy kierując się osobistymi wyborami. To osoby,
  które mimo odległości od Warszawy, znają język polski, pielęgnują polskie tradycje
  i dbają o pozytywny wizerunek Polski w oczach społeczności międzynarodowej. Dziękujemy
  Państwu w imieniu Służby Zagranicznej i wszystkich Polaków za zaangażowanie w upowszechnianie
  polskiej kultury i dziedzictwa. Ministerstwo Spraw Zagranicznych zachęca również
  do zapoznania się z Rządową strategią współpracy z Polonią i Polakami za granicą
  na lata 2025-2030 .
