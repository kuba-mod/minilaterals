title: A Great Vaudeville at Warsaw's Academy of Fine Arts
text: The event was organised under the three-party cooperation between the MFA (the
  Diplomatic Protocol and the Department of Promotion and Cultural Diplomacy), the
  Mariusz Kazana Foundation, and the Academy of Fine Arts in Warsaw. A Great Vaudeville
  is extraordinary, as it is the first exhibition we organise outside of the Diplomats’
  Gallery at the MFA. - said Director of the Diplomatic Protocol Irena Lichnerowicz.
  Barbara Kazana added that 18 years ago, Mariusz Kazana, who was the director of
  the MFA’s Diplomatic Protocol at the time, and the Academy of Fine Arts co-organised
  the first gathering of the diplomatic corps at the Academy’s graphics studios. That
  event laid the groundwork for the promotion of Polish graphic arts and artists among
  diplomats. - Deputy Director of the Department of Promotion and Cultural Diplomacy
  Anna Godlewska underscored that these days, abounding in challenges, artists teach
  us how to act with courage and show us the real importance of this value. The exhibition
  opening was also a unique opportunity to have a closer look at the educational facilities
  of the Academy of Fine Arts in Warsaw. The guests had a chance to visit the lithography
  studio, the classical techniques studio (porcelain decoration), and the letterpress
  studio, where they could learn more about the process of artwork creation. The opening
  was attended by members of the diplomatic corps, the Rector and other representatives
  of the Academy of Fine Arts in Warsaw, and MFA employees. In September, the exhibition
  of Professor Władysław Winiecki’s works will be transferred to the Diplomats’ Gallery
  at the MFA. It will remain on display until December 2026. *** In the final years
  of his life, Professor Władysław Winiecki (1941–2008) was professionally involved
  with the Academy of Fine Arts’ Faculty of Graphic Arts, namely the Lithography Studio.
  His works feature in the collections the National Museums in Warsaw and in Kraków,
  France’s National Library in Paris, and the Museum of Contemporary Art Tokyo, among
  other institutions. The Mariusz Kazana Foundation was set up in 2010, after the
  diplomat’s tragic death in the presidential plane crash near Smolensk. It aims to
  keep the memory of the former director of the Diplomatic Protocol alive and to carry
  on with his mission of building Poland’s positive image by popularising culture
  and art both at home and abroad.
