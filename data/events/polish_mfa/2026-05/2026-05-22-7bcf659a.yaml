title: Deputy Prime Minister Radosław Sikorski takes part in NATO foreign ministers
  meeting
text: The Helsingborg talks centred around transatlantic relations, which Poland continuosly
  considers crucial in building Europe's security. Deputy Prime Minister Sikorski
  referred to US President Donald Trump's social media announcement that the United
  States will be sending an additional 5,000 troops to Poland. I want to thank President
  Trump for his annoucement that the rotation, the presence of American troops in
  Poland will be maintained more or less at previous levels - Minister Sikorski said,
  thanking everybody who had contributed to this decision. The minister added that
  close cooperation is as necessary between Poland and the US as it is between the
  US and Europe, with greater engagement of European states in NATO. The foreign ministers
  discussed progress in increasing defence spending. Deputy Prime Minister Sikorski
  observed that military modernisation in Europe must be stepped up because of continued
  Russia threat. We are all aware that we must draw lessons for the purchasing policy,
  for the operational art, for troop trainings in the light of defence against the
  Russian aggression, where things are looking up for Ukraine. It brings about a revolution
  in military matters. - Deputy Prime Minister Sikorski said. Poland's top diplomat
  pointed out that drawing on lessons learned and a swift adjustment are the key aspects
  of effective deterrence. He added that Poland is NATO's top defence spender as a
  share of GDP. In 2025 the total spending exceeded pln 186.5 billion (about 4.7%
  GDP), and in 2026 the defence budget (inclusive of the Armed Forces Support Fund)
  will go beyond PLN 200 billion (EUR 46.5 billion), an equivalent of about 4.8% GDP.
  The EU member states have seen a 63% increase in defence spending over the last
  five years. Defence investments have risen by 150% in the corresponding period.
  During the ministerial, Deputy Prime Minister Sikorski outlined Poland's expectations
  ahead of the NATO Summit in Ankara this July. The minister stressed that they are
  ready to abide by the collective defence principle laid down in Article 5 of the
  North Atlantic Treaty.
