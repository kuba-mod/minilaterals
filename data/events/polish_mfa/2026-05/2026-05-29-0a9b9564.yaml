title: MFA Statement
text: MFA Secretary of State Marcin Bosacki expressed profound dissatisfaction with
  the decision while speaking with the Ukrainian Ambassador to Poland on 28 May, which
  was reiterated on 29 May by Polish chargé d’affaires in Kyiv Piotr Łukasiewicz during
  his conversation with Ukraine’s Deputy Foreign Minister Olexandr Mischenko. In the
  face of Russia’s ongoing war of aggression against Ukraine and a security threat
  to the entire region, Polish–Ukrainian relations, so crucial for our states and
  nations, should not become a hostage to a difficult history. Joint security, solidarity
  in response to Russia’s aggression, and responsibility for the future of Europe
  require maturity and commitment to dialogue on both sides.​
