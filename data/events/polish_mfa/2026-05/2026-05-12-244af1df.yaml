title: Zacieśnienie relacji polsko-egipskich
text: 'W trakcie wizyty wiceminister Wojciech Zajączkowski rozmawiał z Asystentem
  Ministra Spraw Zagranicznych Egiptu ds. europejskich Waelem Hamedem oraz przedstawicielami
  egipskiego resortu spraw zagranicznych odpowiedzialnymi za kwestie związane z ONZ
  i bezpieczeństwem regionalnym. Strona egipska pozytywnie oceniła rozwój relacji
  bilateralnych, podkreślając rosnące znaczenie Polski jako najważniejszego partnera
  Egiptu w Europie Środkowej oraz istotnego filaru współpracy egipsko-unijnej. Rozmówcy
  odnotowali intensyfikację kontaktów politycznych i gospodarczych, w tym rosnące
  zainteresowanie współpracą inwestycyjną i handlową. Wiceminister Wojciech Zajączkowski podkreślił,
  że Egipt pozostaje kluczowym partnerem Polski w regionie Bliskiego Wschodu i Afryki
  Północnej. Wskazał również na zainteresowanie dalszym rozwijaniem współpracy gospodarczej,
  w szczególności poprzez zwiększenie eksportu polskich produktów rolno-spożywczych,
  rozwój partnerstwa w sektorze transportowym, morskim i lotniczym oraz pogłębianie
  relacji w obszarze technologii cyfrowych. W trakcie rozmów omówiono możliwości rozszerzenia
  współpracy inwestycyjnej. Strona egipska zachęcała polskie przedsiębiorstwa do zwiększania
  obecności na rynku egipskim, wskazując na poprawę klimatu inwestycyjnego i rozwój
  infrastruktury. Wiceminister Zajączkowski podkreślił znaczenie współpracy archeologicznej pomiędzy
  obydwoma państwami. Obie strony wskazały potrzebę działań na rzecz przeciwdziałania
  nielegalnemu handlowi zabytkami. Poruszone zostały również kwestie regionalne, w tym
  konflikt w Strefie Gazy, sytuacja bezpieczeństwa na Bliskim Wschodzie oraz w Rogu
  Afryki. Rozmówcy zaakcentowali konieczność deeskalacji napięć oraz znaczenie dialogu
  i poszanowania prawa międzynarodowego. Podczas wizyty w Kairze, wiceminister Wojciech
  Zajączkowski wziął udział w ceremonii zakończenia Polsko-Egipskiego Forum Biznesowego.
  Wydarzenie zostało zorganizowane przez Polską Agencję Inwestycji i Handlu (PAIH)
  oraz Federację Egipskich Izb Handlowych (FEDCOC), we współpracy z Ambasadą RP w
  Kairze oraz Ambasadą Egiptu w Polsce. W forum uczestniczyło kilkadziesiąt firm z
  Polski i Egiptu reprezentujących sektory: kolejowy, przetwórstwa żywności, maszyn
  rolniczych, energii odnawialnej, oświetlenia, motoryzacyjny, chemiczny, IT/ICT,
  logistyczny oraz turystyczny. W wydarzeniu udział wzięli udział także przedstawiciele
  Banku Gospodarstwa Krajowego i Agencji Rozwoju Przemysłu. Forum stanowiło okazję do
  omówienia perspektyw rozwoju współpracy handlowej i inwestycyjnej, a także prezentacji
  potencjału polskich i egipskich przedsiębiorstw.'
