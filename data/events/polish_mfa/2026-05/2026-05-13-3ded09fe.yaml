title: Wicepremier Radosław Sikorski na Międzynarodowym Kongresie Morskim w Szczecinie
text: 'W czasie Kongresu wicepremier Radosław Sikorski podkreślał, że przewodnictwo
  Polski w Radzie Państw Morza Bałtyckiego (od 1 lipca 2025 roku) zmieniło postrzeganie
  bezpieczeństwa na wodach Bałtyku. Państwa Unii Europejskiej zwróciły uwagę na to,
  że jest on istotny pod względem gospodarczym i strategicznym i ze względu na to
  jego ochrona powinna być wzmocniona. Szef polskiego MSZ ocenił, że Bałtyk powinien
  być chroniony między innymi ze względu na „flotę złomu”, czyli statki, czasami w
  złym stanie, bez ubezpieczeń i bez bandery, które transportują rosyjską ropę. Nie
  rozumiem, czemu na lotniska nie wpuszczamy wątpliwych samolotów, a od samochodów
  żądamy ubezpieczeń i badań technicznych, a jeśli chodzi o "flotę złomu", takich
  ograniczeń nie wprowadzamy mówił wicepremier Radosław Sikorski i dodał, że jednostki
  „floty złomu” uszkodziły już jedenaście instalacji podwodnych. To wyzwanie, na które
  zareagowały państwa Unii Europejskiej. Kolejne statki są obejmowane unijnymi sankcjami.
  Obecnie to 632 jednostki. Oczy świata zwrócone są na Cieśninę Ormuz. Ale to przecież
  nie jedyne wody, które padają ofiarą zaostrzającej się rywalizacji, to samo dzieje
  się na Morzu Czerwonym, na Morzu Czarnym. Ta rywalizacja i te zagrożenia mają miejsce
  także tu, na Bałtyku Poprawa bezpieczeństwa Polski jest możliwa dzięki programom
  zbrojeniowym, takim jak: „Orka” (dotyczącym okrętów podwodnych nowej generacji),
  „Miecznik” (dotyczącym budowy wielozadaniowych fregat dla Marynarki Wojennej RP)
  i inwestycjach w rozwój polskich bezzałogowych pojazdów nawodnych. Równie ważne
  jest posiadanie platformy, która umożliwi monitorowanie sytuacji i wczesne ostrzeganie.
  Nad taką platformą pracuje Ośrodek Badawczo-Rozwojowy Centrum Techniki Morskiej
  S.A. w Gdyni. Wicepremier Sikorski podkreślał także, że Bałtyk jest istotny gospodarczo.
  1/3 naszego eksportu poza Unię Europejską wychodzi przez nasze porty morskie, które
  w 2025 roku odpowiadały za blisko 1/3 (32,3%) wszystkich obrotów kontenerowych na
  Morzu Bałtyckim. Szef polskiej dyplomacji zwrócił uwagę na to, że Bałtyk to kluczowy
  korytarz bezpieczeństwa energetycznego państwa. Polski „bałtycki hub energetyczny”
  obejmuje porty LNG, LPG, Naftoport oraz platformy wydobywcze i gazociągi. W 2026
  r. dołączą do niego morskie farmy wiatrowe budowane w polskiej wyłącznej strefie
  ekonomicznej. Do 2030 roku mają zapewnić 13%, a w 2040 r. - 19% energii elektrycznej
  dla kraju. Polska jest też gotowa do pełnienia roli centrum redystrybucji gazu z
  importu LNG z USA w celu wzmocnienie bezpieczeństwa dostaw i wsparcia niezależności
  Europy Środkowej od surowców z Rosji.'
