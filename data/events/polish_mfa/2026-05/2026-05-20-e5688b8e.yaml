title: MFA Statement
text: Respecting international law, including international law of the sea and international
  humanitarian law is the duty of all states. One of the fundamental principles of
  the law of the sea is freedom of navigation in international waters, where ships
  are subject to the exclusive authority and jurisdiction of their flag state. This
  freedom cannot be restricted or infringed upon by other states. Under international
  humanitarian law, no action may be taken to prevent the delivery of essential relief
  to civilians, and ships delivering humanitarian aid enjoy special protection in
  this regard. We are concerned by the reports of detention of Polish nationals travelling
  onboard one of the Global Sumud Flotilla vessels. We hope that their safety will
  not be violated and their rights will be fully respected. The Polish consular services
  in Greece, Türkiye, and Israel are constantly monitoring the situation as it develops
  and stand ready to assist Polish citizens within the applicable legal framework.
  The MFA stays in touch with the coordinators of the Global Sumud Flotilla operation.
  Poland expects an urgent explanation of all the circumstances of the Israeli military
  operation in international waters. At the same time, the MFA continues to advise
  against travel to the region, including to Israel and Palestine, especially to the
  Gaza Strip. Please be reminded that those who nonetheless decide on such travel
  do so at their own risk and the decision may have unforeseeable consequences.
