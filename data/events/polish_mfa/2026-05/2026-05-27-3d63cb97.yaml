title: Head of the Foreign Service Henryka Mościcka-Dendys attends jubilee Odra Partnership
  summit in Poznań
text: 'The participants discussed security challenges, development of infrastructure,
  and the further strengthening of economic and social cooperation between regions
  of Poland and Germany. The event was hosted by Marek Woźniak, Marshal of the Wielkopolskie
  Province, which is currently presiding over the Odra Partnership. In her speech,
  the head of the Foreign Service underlined the special context of this year’s meeting,
  which falls on the 35th anniversary of the signing of the Polish-German Treaty of
  Good Neighbourship and Friendly Cooperation: Today, we find ourselves in a completely
  different situation from that one. As allies within NATO and partners within the
  European Union, we are being confronted with a new international situation. Poland
  is currently the world’s 20th largest economy and Germany is our key trading partner.
  At the same time, the peace dividend, which enabled this unusual progress, is over.
  Our resilience is being tested, which also affects your new projects under the Odra
  Partnership She also called on the representatives of Polish provinces and German
  federal states to consider in their activities the security issue and building social
  resilience, including countering hybrid threats and disinformation. The head of
  the Foreign Service also noted the need to further expand and upgrade transport
  infrastructure and reduce the difficulties caused by border controls. During the
  discussion, members of the local governments in both countries stressed the importance
  of developing road and railway connections for further sustainable economic and
  social development of the border areas. The summit was an opportunity for Brandenburg
  to take over the presidency of the Odra Partnership from the Wielkopolskie Province.
  The Odra Partnership is a forum of cooperation of the Dolnośląkie, Lubuskie, Wielkopolskie,
  and Zachodniopomorskie provinces, and the federal states of Berlin, Brandenburg,
  Mecklenburg-Vorpommern, and Saxony. This initiative aims to boost the region’s potential
  by coordinating local government activities in areas such as the economy, science
  and research, public infrastructure, and tourism. Photo: Marshal’s Office of the
  Wielkopolskie Province'
