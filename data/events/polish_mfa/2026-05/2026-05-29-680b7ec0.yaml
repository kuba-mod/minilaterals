title: Undersecretary of State Artur Harazim meets with representatives of Bronisław
  Geremek Prize committee
text: The Bronisław Geremek Prize for contribution to the strengthening of Polish–French
  relations is a token of appreciation for individuals of special merit for enhanced
  dialogue and cooperation between Poland and France based on common values and centuries-old
  bonds between the two nations. The prize was established under the Treaty of Nancy—signed
  on 9 May 2025 and in force since 22 January 2026—which marked a new stage in the
  bilateral relations. Deputy Minister Artur Harazim handed letters of appointment
  for members of the Bronisław Geremek Prize committee to Jolanta Kawa, chairperson
  of the Bronisław Geremek Foundation, and Paweł Bliźniuk, Polish MP and chairperson
  of the Polish–French Parliamentary Group. During the meeting, they discussed initiatives
  to promote Polish–French relations in the fields of culture and social dialogue
  and possible joint initiatives in these areas. The first Bronisław Geremek Prize
  laureate was announced on 20 April 2026, on the Polish–French Friendship Day, on
  the sidelines of the Intergovernmental Summit in Gdańsk. Andrzej Seweryn, an actor,
  was decorated for outstanding artistic accomplishments and his consistence in building
  bridges between Poland and France through cultural and public activity.
