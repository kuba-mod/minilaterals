title: Oświadczenie MSZ
text: Skoro Rosja, jak sama deklaruje, nie prowadzi wojny tylko tzw. „specjalną wojenną
  operację”, która w założeniu powinna mieć zasięg ograniczony do obiektów militarnych,
  to jakiekolwiek ataki na inną infrastrukturę, w tym przedstawicielstwa dyplomatyczne
  powinny być traktowane jako akty nieprzyjazne. Każdy przypadek uderzenia w polskie
  przedstawicielstwa dyplomatyczne będziemy traktowali w związku z tym jako celowy
  i zamierzony. Działania Federacji Rosyjskiej rodzą poważne konsekwencje prawno-
  międzynarodowe deprecjonując po raz kolejny rolę tego państwa jako stałego członka
  Rady Bezpieczeństwa ONZ. Wzywamy Rosję do natychmiastowego zaprzestania nieuzasadnionej
  i bezprawnej agresji oraz do przestrzegania zobowiązań i traktatów międzynarodowych.
