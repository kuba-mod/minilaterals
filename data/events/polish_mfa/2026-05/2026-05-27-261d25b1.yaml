title: Szefowa Służby Zagranicznej Henryka Mościcka-Dendys na jubileuszowym szczycie
  Partnerstwa Odry w Poznaniu
text: 'Uczestnicy spotkania rozmawiali o wyzwaniach bezpieczeństwa, rozwoju infrastruktury
  oraz dalszym wzmacnianiu współpracy gospodarczej i społecznej pomiędzy regionami
  Polski i Niemiec. Gospodarzem wydarzenia był Pan Marek Woźniak, Marszałek Województwa
  Wielkopolskiego, sprawującego aktualnie przewodnictwo Partnerstwa Odry. Szefowa
  Służby Zagranicznej  w wystąpieniu podkreśliła szczególny kontekst tegorocznych
  obrad, przypadających w 35 rocznicę podpisania polsko-niemieckiego Traktatu o dobrym
  sąsiedztwie i przyjaznej współpracy: Dziś znajdujemy się w zupełnie innym momencie
  niż wówczas. Jako sojusznicy w NATO i partnerzy w Unii Europejskiej jesteśmy konfrontowani
  z nową sytuacją międzynarodową. Polska jest dziś 20. gospodarką świata, Niemcy są
  naszym najważniejszym partnerem handlowym. Jednocześnie kończy się dywidenda czasu
  pokoju, który umożliwia ten niezwykły rozwój. Testowana jest nasza odporność, co
  rzutuje także na nowe projekty, które Państwo wspólnie w ramach Partnerstwa Odry
  podejmujecie -  zaznaczyła Henryka Mościcka-Dendys. Szefowa Służby Zagranicznej Henryka
  Mościcka-Dendys zaapelowała do reprezentantów polskich województw i niemieckich
  krajów związkowych o uwzględnianie w swoich aktywnościach kwestii bezpieczeństwa
  i budowy odporności społecznej, w tym przeciwdziałania zagrożeniom hybrydowym i
  dezinformacji. Wskazała również na potrzebę dalszej rozbudowy i modernizacji infrastruktury
  transportowej oraz ograniczania utrudnień wynikających z kontroli granicznych. W
  trakcie dyskusji, samorządowcy z obu krajów podkreślali znaczenie rozwoju połączeń
  drogowych i kolejowych dla dalszego zrównoważonego rozwoju gospodarczego i społecznego
  regionów przygranicznych. Podczas spotkania przewodnictwo w Partnerstwie Odry na
  okres dwóch lat przejęła Brandenburgia od Województwa Wielkopolskiego. We współpracy
  w ramach Partnerstwa Odry uczestniczą województwa: Dolnośląskie, Lubuskie, Wielkopolskie,
  Zachodniopomorskie oraz kraje związkowe Berlin, Brandenburgia, Meklemburgia-Pomorze
  Przednie i Saksonia. Inicjatywa ta ma na celu zwiększenie potencjału regionu poprzez
  koordynację działań na szczeblu samorządowym w takich obszarach jak gospodarka,
  nauka i badania, infrastruktura publiczna czy turystyka. Foto : Urząd Marszałkowski
  Województwa Wielkopolskiego'
