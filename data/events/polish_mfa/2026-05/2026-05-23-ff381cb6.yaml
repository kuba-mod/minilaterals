title: 21st edition of GLOBSEC Forum featuring Deputy Prime Minister Radosław Sikorski
text: 'For over two decades, the Forum has established itself as one of Europe''s
  most influential platforms for shaping global security and stability. This year''s
  gathering brought together world leaders, innovators and changemakers under the
  auspices of President of Czechia, Petr Pavel. The 21st edition of the GLOBSEC Forum
  convened under the theme "The Global Systemic Transformation" addressing a key question
  of our time: how can Europe play a constructive role in a world marked by fragmentation,
  power competition, and accelerating risk? This war is not about NATO. It is about
  Ukraine''s aspirations to join Europe - to live in a country that is free from corruption,
  based on the rule of law, shifting from poverty to prosperity. This is what is at
  stake. Discussions at the Forum explored Europe''s strategic role in a rapidly changing
  world, from rethinking alliances and shaping global governance to advancing transatlantic
  cooperation. The sessions addrssed security and defence in a new era, technology''s
  impact on geopolitics and innovation, sustainable growth strategies, energy and
  climate security and building resilience amid global uncertainty.'
