title: Oświadczenie MSZ
text: Poszanowanie prawa międzynarodowego, w tym międzynarodowego prawa morza  i międzynarodowego
  prawa humanitarnego jest obowiązkiem wszystkich państw. Jedną z fundamentalnych
  zasad prawa morza jest wolność żeglugi na wodach międzynarodowych, na których statki
  podlegają wyłącznej władzy i jurysdykcji państw bandery. Wolność ta nie może być
  ograniczana ani naruszana przez inne państwa. W świetle przepisów międzynarodowego
  prawa humanitarnego nie można podejmować działań, które uniemożliwiają dostarczenie
  niezbędnej pomocy cywilom, a statki niosące pomoc humanitarną podlegają w tym zakresie
  szczególnej ochronie. Z zaniepokojeniem przyjmujemy doniesienia o zatrzymaniu polskich
  obywateli, będących na pokładzie jednego ze statków należących do Global Sumud Flotilla.
  Wyrażamy nadzieję, że nie zostanie naruszone ich bezpieczeństwo oraz że przysługujące
  im prawa będą w pełni uszanowane. Polskie służby konsularne w placówkach w Grecji,
  Turcji i Izraelu na bieżąco monitorują aktualną sytuację i pozostają w gotowości
  do ew. udzielenia pomocy obywatelom RP w ramach obowiązującego porządku prawnego.
  MSZ pozostaje w stałym kontakcie z koordynatorami akcji Global Sumud Flotilla. Polska
  oczekuje pilnego wyjaśnienia wszystkich okoliczności przeprowadzenia akcji sił zbrojnych
  Izraela na wodach międzynarodowych. Jednocześnie MSZ wciąż odradza wyjazdy do regionu,
  również do Izraela i Palestyny, w tym szczególnie do Strefy Gazy. Przypominamy,
  że osoby, które się na nie decydują, czynią to na własną odpowiedzialność, a podjęcie
  decyzji o wyjeździe może nieść ze sobą nieprzewidywalne konsekwencje.
