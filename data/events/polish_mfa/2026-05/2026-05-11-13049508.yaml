title: Deputy Prime Minister Sikorski presents Bene Merito honorary distinction to
  Colonel Stanisław Aronson
text: Born in Warsaw, Stanisław Aronson grew up in an assimilated Jewish family. He
  was the only one in the family to escape death by fleeing from a train destined
  for Treblinka. He continued his fight under nom de guerre “Rysiek” in the ranks
  of the Home Army. He fought in the Warsaw Uprising and later joined the II Corps
  of General Władyslaw Anders. After the Second World War, persecuted by the communist
  secret security services, UB, he emigrated to Israel, where throughout his life
  he remained an ambassador for the memory of the Polish Underground State, Polish
  efforts to save Jews, and an advocate for Polish–Jewish dialogue. Stanisław Aronson
  has repeatedly warned against hatred and manipulation of historical memory. “Colonel
  Stanisław Aronson is one of those truly remarkable people whose lives became symbols
  of courage, commitment to values, and service to Poland despite the most tragic
  experiences,” said Deputy Prime Minister and head of Polish diplomacy Radosław Sikorski
  while presenting the Bene Merito honorary distinction. Established in 2009, the
  Bene Merito honorary distinction is conferred by the Minister of Foreign Affairs
  in acknowledgement of accomplishments that contribute to strengthening Poland’s
  international status.
