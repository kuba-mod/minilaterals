title: Jerzy Buzek and Lech Wałęsa receive new European Parliament order
text: 'Lech Wałęsa has been appointed Distinguished Member of the European Order of
  Merit and Jerzy Buzek has been appointed Honourable Member of the European Order
  of Merit. People need to know that the EU offers security, jobs, and prosperity.
  And people need to believe in Europe—and Europe has always been strong when it has
  been able to imagine a better future—and to build it together in solidarity. So
  let’s dream big and act responsibly said former Prime Minister Jerzy Buzek at the
  conferral ceremony. The Bureau of the European Parliament honours the achievements
  of individuals who have made a significant contribution to European integration
  or to the promotion and defence of the values enshrined in the Treaties. Former
  President Lech Wałęsa accepted the Order as a recognition of the Solidarity movement’s
  victorious struggle. I want the EU and the ‘post-Solidarity’ generation to succeed
  The European Order of Merit was launched by the Bureau of the European Parliament
  on the occasion of the 75th anniversary of the Schuman Declaration. Proposals for
  appointment are made by the Members States’ heads of state and government, speakers
  of the national parliaments, and presidents of key EU institutions. The Order has
  three levels of distinction:'
