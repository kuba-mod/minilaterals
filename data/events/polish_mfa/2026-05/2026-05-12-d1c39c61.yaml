title: Strengthening Polish-Egyptian ties
text: During his visit, Deputy Foreign Minister Wojciech Zajączkowski talked with
  Assistant to Foreign Minister for European Affairs Wael Hamed and representatives
  of the Egyptian Ministry of Foreign Affairs responsible for UN and regional security
  matters. The Egyptian side welcomed the development of bilateral relations, stressing
  the growing importance of Poland as Egypt’s most important partner in Central Europe
  and a major pillar of Egypt–EU cooperation. The interlocutors pointed out the intensified
  political and economic contacts, including a growing interest in investment and
  trade cooperation. Deputy Minister Zajączkowski noted that Egypt is one of Poland’s
  key partners in the Middle East and North Africa. He also spoke about an interest
  in enhancing economic cooperation, in particular through increasing exports of Polish
  agri-food products, strengthening partnership in the transport, maritime, and aviation
  sectors, and forging closer ties in the digital technology sector. The talks also
  covered opportunities to expand investment cooperation. The Egyptian side encouraged
  Polish enterprises to increase their presence in the Egyptian market, pointing to
  improvements in the investment climate and infrastructure. Deputy Minister Zajączkowski
  highlighted the importance of archaeological cooperation between the two countries.
  Both sides agreed on the need to counter illegal trade in historical artefacts.
  The meeting also covered regional issues, including the conflict in the Gaza Strip,
  and the security situation in the Middle East and the Horn of Africa. The diplomats
  emphasised the need to de-escalate tensions and the importance of dialogue and respect
  for international law. During his visit to Cairo, Deputy Minister Wojciech Zajączkowski
  took part in the closing ceremony of the Polish–Egyptian Business Forum. The event
  was organised by the Polish Investment and Trade Agency (PAIH) and the Federation
  of Egyptian Chambers of Commerce (FEDCOC) in cooperation with the Polish Embassy
  in Cairo and the Embassy of Egypt in Poland. The forum brought together several
  dozen companies from Poland and Egypt representing railway, food processing, agricultural
  machinery, renewable energy, lighting, automotive, chemical, IT/ICT, logistics,
  and tourism sectors. The event was also attended by the representatives of Bank
  Gospodarstwa Krajowego and the Industrial Development Agency. The forum provided
  an opportunity to discuss prospects for trade and investment cooperation, and to
  showcase the potential of Polish and Egyptian companies.
