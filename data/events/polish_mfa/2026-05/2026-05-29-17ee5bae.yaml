title: Asante king visits Poland
text: Deputy Minister Zajączkowski stressed Ghana’s ever-greater role as a stable
  and democratic economic partner and a gateway to the West African markets. Ghana
  is home to the African Continental Free Trade Area Secretariat, an organisation
  supporting economic integration across the continent. The deputy minister pointed
  out that the increasing number of Polish companies seek growth opportunities outside
  Europe, with Africa becoming one of the most promising directions of expansion.
  Agri-food, machine industry, transportation, digital, and cybersecurity were considered
  as top sectors where cooperation potential can be unlocked. Academic cooperation
  was another item on the agenda. The officials discussed student, scientist, and
  medical doctor exchange programmes as well as the development of cultural dialogue.
  They emphasised that they are determined to further strengthen political and economic
  relations, a potential source of new opportunities for both countries.
