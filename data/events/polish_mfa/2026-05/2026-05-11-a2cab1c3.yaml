title: Wicepremier Sikorski wręczył odznakę honorową „Bene Merito'' pułkownikowi Stanisławowi
  Aronsonowi
text: Urodzony w 1925 roku w Warszawie i wychowany w zasymilowanej rodzinie żydowskiej,
  Stanisław Aronson jako jedyny z rodziny uniknął śmierci, uciekając z transportu
  do Treblinki. Swoją walkę Stanisław Aronson (ps. „Rysiek”) kontynuował w szeregach
  Armii Krajowej. Walczył w Powstaniu Warszawskim, następnie dołączył do 2. Korpusu
  Polskiego pod dowództwem generała Władysława Andersa. Po wojnie, prześladowany przez
  Urząd Bezpieczeństwa, wyemigrował do Izraela, gdzie przez całe życie pozostawał
  ambasadorem pamięci o Polskim Państwie Podziemnym, polskich wysiłkach na rzecz ratowania
  Żydów i rzecznikiem dialogu polsko-żydowskiego. Stanisław Aronson wielokrotnie przestrzegał
  przed nienawiścią i manipulowaniem pamięcią historyczną. Pułkownik Stanisław Aronson
  należy do grona osób wyjątkowych, których życiorysy stały się symbolem odwagi, wierności
  wartościom oraz służby Polsce, mimo najtragiczniejszych doświadczeń – podkreślił
  wicepremier, szef polskiej dyplomacji Radosław Sikorski, wręczając odznakę honorową
  „Bene Merito”. To wyróżnienie podkreśla wagę starań pułkownika o rzetelne przedstawianie
  losów obywateli Rzeczypospolitej. Postawa Stanisława Aronsona jest przykładem na
  to, że przywiązanie do kraju i praca na rzecz porozumienia to wartości, które pozostają
  aktualne i kluczowe dla polskiej dyplomacji. Odznaka honorowa „Bene Merito”, ustanowiona
  w 2009 r., przyznawana jest przez Ministra Spraw Zagranicznych RP w uznaniu zasług
  na rzecz działalności wzmacniającej pozycję Polski na arenie międzynarodowej.
