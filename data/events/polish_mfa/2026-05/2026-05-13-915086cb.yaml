title: Wicepremier Sikorski wziął udział w IMPACT CEE 2026
text: 'Rozmowa zatytułowana „Polska w zmieniającym się porządku światowym. Radosław
  Sikorski o wyzwaniach i szansach”, którą poprowadziła prof. Monika Sus z Instytutu
  Studiów Politycznych PAN, stała się przestrzenią do dyskusji o przyszłości Ukrainy,
  perspektywach dla rodzimego biznesu oraz roli Polski w Unii Europejskiej. W dyskusji
  Wicepremier Sikorski podkreślił, że wojna Rosji przeciw Ukrainie nie jest wyłącznie
  konfliktem terytorialnym, ale walką Ukraińców o prawo do samostanowienia i przystąpienia
  do Unii Europejskiej. Przypomniał genezę Majdanu, który wynikał właśnie z aspiracji
  europejskich Ukrainy. W Ukrainie widać, jak ważne jest - dla ludzi, który są poza
  Europą – by stać się jej częścią. Ukraińcy walczą i umierają za to, żeby mieć prawo
  przystąpienia do Unii Europejskiej, powiedział Wicepremier Radosław Sikorski. Szef
  polskiej dyplomacji zwrócił uwagę, że polski biznes już jest obecny w Ukrainie –
  blisko trzy tysiące polskich firm. Ponadto, podkreślił, że Polska ma naturalne przewagi
  w zakresie odbudowy Ukrainy: bliskość kulturową, językową i logistyczną. Co więcej,
  siłą polskiego biznesu jest to, że Polacy potrafią konkurować na rynku europejskim.
  Minister spraw zagranicznych Radosław Sikorski wskazywał także na ogromne korzyści
  gospodarcze wynikające z członkostwa Polski w UE: Wicepremier Radosław Sikorski
  podkreślił także konieczność wzmacniania UE wobec nowych zagrożeń, m.in. wojny -
  również tej hybrydowej, bezpieczeństwa i migracji. Osobiście jestem zwolennikiem
  pięknej tezy premiera Tony’ego Blaira, że Unia ma być supermocarstwem, a nie superpaństwem.
  Jeśli chcemy, żeby Unia wypełniała więcej zadań, musimy dać jej więcej instrumentów,
  Minister Sikorski podał przykład tego, co wydarzyło się po rozpoczęciu pełnoskalowej
  rosyjskiej agresji na Ukrainę. Większość Europejczyków chciała, by Unia zajęła się
  obronnością i to się stało. Stworzyliśmy „budżet pokoju” (Europejski Instrument
  na Rzecz Pokoju), który finansuje wysiłek ukraiński, W ramach uczestnictwa w konferencji,
  Wicepremier Radosław Sikorski odwiedził stanowisko wystawienniczo-promocyjne MSZ,
  prezentujące sieć Instytutów Polskich na świecie. Stanowisko odwiedzili również
  Sekretarz Stanu MSZ Marcin Bosacki i Sekretarz Stanu do Spraw Europejskich Ignacy
  Niemczycki. Szef MSZ podkreślił znaczenie dyplomacji kulturalnej dla realizacji
  polityki zagranicznej, w tym promocji kultury polskiej za granicą i budowania polskiej
  soft power. Zapowiedział także otwarcie dwóch nowych Instytutów - w Seulu i Stambule.
  Obecnie sieć Instytutów Polskich to 25 placówek, które budują partnerstwa z instytucjami
  kultury, kształtujące wizerunek Polski wśród zagranicznych odbiorców. Przykładem
  tego jest m.in. współpraca z sektorem gier wideo oraz z tłumaczami i wydawcami literatury.
  Goście stoiska promocyjnego MSZ mogli obejrzeć publikacje polskiej literatury w
  przekładach na kilkanaście języków oraz film pt. „Digital Dreamers”, promujący historię
  polskiej branży gamedev. Impact CEE to jedna z największych konferencji biznesowo-technologicznych
  w regionie Europy Środkowo-Wschodniej. Biorą w niej udział przedstawiciele świata
  polityki, biznesu, kultury i sportu.'
