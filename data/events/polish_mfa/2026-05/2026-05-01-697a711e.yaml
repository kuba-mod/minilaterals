title: Poland's 22 years in the European Union. Success in figures
text: 'Poland’s presence in the European Union has been a story of spectacular development
  boost, although joining the EU in 2004 was an opportunity, not a guarantee of success.
  It was thanks to the sound economic policies and good strategic decisions, but mainly
  the initiative and wise choices of the Polish people, that we could make better
  use of this potential than any other country in the region. The European Union has
  a population of 450 million. The EU single market is 12 times larger in terms of
  population and 20 times larger in terms of economy than the domestic market. It
  is its scale and potential that enable Polish companies to grow. A large and stable
  market also means security and predictability. The European Union is Poland’s most
  important trade partner. Economy: Poland as the region’s growth leader Over the
  past 22 years in the EU, our economy has more than doubled: Poland’s cumulative
  GDP growth between 2003 and 2025 stood at almost 130%, the highest in the EU (the
  EU-27 average was 34.5%). Our GDP per capita has risen from just under 50% to over
  80% of the EU average. We have already overtaken Greece in this respect, and according
  to International Monetary Fund forecasts we will overtake Spain in 2026. As much
  as 58% of Poland’s economic growth since 2004 results from its EU membership. Our
  GDP per capita is 42% higher than it would be outside the EU. Our GDP has topped
  USD 1 trillion, and in December 2026 we will take part in the summit of the world’s
  20 largest economies. The labour market: millions of jobs in Poland within the European
  single market As many as 5 million jobs in Poland are linked to the EU single market,
  accounting for one-third of the country’s workforce. Almost 80% of Poles in working
  age are employed, which is one of the best figures in Europe. Over 22 years, the
  average pay in Poland has risen by more than 180%. Unemployment fell from 19% in
  2004 to 3% in 2025. Since 2003, the number of the employed has grown by 3.6 million,
  an equivalent of the entire population of the greater Warsaw and Rzeszów areas finding
  a job over the 22-year span - says the Report on Poland’s 22 Years in the European
  Union. Part I: Economy and Labour Market prepared by the Economic Department of
  the MFA. Exports: Poland makes use of the common market encompassing 450 million
  consumers Since 2004, Poland’s exports have increased more than sixfold, and its
  exports of agri-food products have seen a twelvefold rise. Three quarters of Poland’s
  exports, and just as much of its exports of agri-food products, go to the EU market.
  Over the past 22 years, we have increased four times the share of high-tech products
  in exports, outdoing Austria, Spain, and Sweden. As of now, more than 60% of Poland’s
  exports of services is to the EU market. We rank first in the EU in transport services
  with a nearly 20% share in the road freight transport, higher than Germany and Spain.
  Out of the total of 15.2 million people employed in Poland in 2022, 5 million worked
  on positions linked with the single market. Another 0.6 million jobs were created
  with EU funding. In other words, membership of the EU created conditions that were
  used by Polish companies and employees to create more than a third of domestic jobs,
  a number that exceeds the total population of Warsaw, Kraków, Wrocław, Łódź, Poznań,
  Gdańsk, and Szczecin As much as 85% of foreign investments in Poland are from other
  EU member states. Also, Poland itself has become an investor: 73% of its foreign
  investments are in EU countries. At the end of 2004, Poland’s direct foreign investments
  amounted to EUR 512 million, whereas two decades later, in 2024—to EUR 38.6 billion.
  Download the report ''Poland’s 22 Years in the European Union. Part I: Economy and
  Labour Market'', available below (Polish version only).'
