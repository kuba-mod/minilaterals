title: Wicepremier Radosław Sikorski na Defence24 Days
text: Podczas konferencji wicepremier Radosław Sikorski podkreślił, że stanowisko
  Polski w zakresie bezpieczeństwa jest jednym z najważniejszych w Europie. Szef polskiego
  MSZ przypomniał, że jesteśmy liderem pod względem udziału PKB przeznaczonego na
  obronność. W 2025 roku łączne wydatki wyniosły ponad 186,5 mld zł (ok. 4,7% PKB),
  natomiast w 2026 roku budżet obronny (wraz z Funduszem Wsparcia Sił Zbrojnych) ma
  osiągnąć ponad 200 mld zł, co stanowi ok. 4,8% PKB. Wicepremier Sikorski zaznaczył,
  że wzmocnieniem polskiego bezpieczeństwa będzie też zakup uzbrojenia ze środków
  w ramach programu SAFE, czyli unijnego programu wsparcia dla obronności. Polska
  przystąpiła do programu jako pierwsze państw we Wspólnocie i jest największym beneficjentem
  programu. W ramach programu SAFE Polska ma otrzymać nawet 43,7 mld euro w niskooprocentowanych
  pożyczkach. Do Polski trafią olbrzymie pieniądze w dodatku do naszego już dużego
  budżetu obronnego. Musimy za te pieniądze dać Wojsku Polskiemu to co najlepsze,
  najnowocześniejsze, to co najskuteczniej odstraszy wrogów, których niestety mamy
  za naszą wschodnią granicą Wicepremier odniósł się także do zmian dotyczących obecności
  amerykańskich żołnierzy w Europie. Podkreślił, że polskim interesie jest, żeby amerykańskich
  żołnierzy w Europie było jak najwięcej, a najlepiej w Polsce. Defence24 Days to
  kluczowe forum dotyczące obronności i przemysłu obronnego. W panelach, poza wicepremierem
  Radosławem Sikorskim, uczestniczyły delegacje z kilkudziesięciu krajów partnerskich,
  przedstawiciele administracji publicznej, eksperci wojskowi oraz przedsiębiorcy
  związani z sektorem zbrojeniowym.
