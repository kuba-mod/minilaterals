title: The Polish Ministry of Foreign Affairs expresses its condemnation of Russian
  threats and disinformation aimed at Latvia and other states
text: The Russian Federation is the aggressor that launched an unprovoked war against
  Ukraine. Under international law, Ukraine has every right to defend itself. We call
  on the Russian side to drop the practice of spreading lies and making escalatory
  statements. W e strongly oppose making threats against other NATO Allies .
