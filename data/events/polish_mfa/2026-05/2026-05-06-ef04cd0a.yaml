title: Wystąpienie wicepremiera Radosława Sikorskiego w Kolegium Europy w Natolinie
text: 'Wicepremier Radosław Sikorski podkreślił, że Ewa Ośniecka-Tamecka została wyróżniona
  Bene Merito w uznaniu jej wybitnych zasług dla integracji Polski z Unią Europejską
  oraz blisko 20-letniego dorobku jako szefowej uczelni, która stała się prestiżowym
  ośrodkiem kształcenia. W uroczystości wzięli udział przedstawiciele korpusu dyplomatycznego
  oraz studenci warszawskiego kampusu Kolegium Europy. Wicepremier Sikorski skierował
  do nich wystąpienie na temat roli dyplomacji w odpowiedzi na współczesne wyzwania
  geopolityczne. Chwieją się istniejące od wielu lat instytucje. Tradycyjne sojusze
  są kwestionowane. Relacje handlowe są wykorzystywane jako narzędzie walki, nie tylko
  z przeciwnikami, ale czasami także przeciwko partnerom Szef polskiej dyplomacji
  podkreślił, że wyzwania, przed którymi stoimy mogą poważnie zaszkodzić naszym: systemom
  politycznym, gospodarce i społeczeństwu. Tylko w 2024 roku wydatki na działania
  wojenne uszczupliły światową gospodarkę o blisko 20 bilionów dolarów, a brak zaufania
  i niestabilność na rynku zwiększają koszty, które ponoszą przedsiębiorcy. Przybywa
  także osób, które musiały opuścić swoje domy. Według danych z czerwca 2025 roku
  przymusowymi przesiedleniami zostało dotkniętych około 117 milionów osób. Wicepremier
  Sikorski zwrócił uwagę na niebezpieczny paradoks – pomimo tego, że władze autorytarne
  często są odpowiedzialne za niestabilność, część społeczeństwa zaczyna widzieć rozwiązanie
  właśnie w autorytaryzmie. Szef polskiej dyplomacji zaznaczył, że to nie jest właściwe
  rozwiązanie. Jeżeli scentralizowane rządy silnej ręki byłyby efektywne, Rosja Władimira
  Putina byłaby modelem sukcesu. Zamiast tego widzimy największe państwo na świecie
  z siłą skoncentrowaną w rękach jednej osoby, gdzie decyzje są podejmowane nie ze
  względu na interes narodowy w długiej perspektywie, ale ze względu na osobiste ambicje
  i megalomańskie wyobrażenia – powiedział wicepremier Sikorski i dodał, że zmiany
  są konieczne, ale powrót do XIX-wiecznego autorytaryzmu nie jest reformą. Szef MSZ
  w swoim przemówieniu zaapelował też do studentów o obronę europejskich wartości
  – współpracy, odpowiedzialności i prawa. Podkreślił, że wkrótce staną się oni najbardziej
  wiarygodnymi ambasadorami norm, na których opiera się nasze społeczeństwo.'
