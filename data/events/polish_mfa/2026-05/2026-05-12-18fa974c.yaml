title: Spotkanie szefów dyplomacji Polski i Ukrainy
text: 'Szefowie dyplomacji Polski i Ukrainy rozmawiali o możliwościach wzmocnienia
  bezpieczeństwa i stabilności w regionie.  Podczas sesji ministerialnej minister
  Andrij Sybiha mówił o sytuacji na froncie i zapewniał, że Kijów jest zainteresowany
  trwałym i długoterminowym zawieszeniem broni. Utrzymujemy pozycję, zamykamy przestrzeń
  powietrzną [dla rosyjskich dronów] i bardzo skutecznie wykorzystujemy nasze specjalne
  sankcje i inne operacje. I to naprawdę działa – mówił minister Sybiha i dodał, że
  konieczne jest utrzymanie presji na Rosję, zapewnienie zaangażowania USA i podniesienie
  ceny, jaką Rosja zapłaci za dalszą agresję. Z kolei wicepremier Sikorski zapewniał,
  że Polska nadal będzie wspierać Ukrainę: Ważne jest aby przeciwnik wiedział, że
  Ukraina jest gotowa walczyć dalej, a my jesteśmy gotowi nadal ją wspierać. Myślę,
  że to właśnie stabilizacja sytuacji na froncie przez Ukrainę oraz przełamanie paraliżu
  w Europie – dzięki wspaniałemu zwycięstwu sił prodemokratycznych na Węgrzech – zmuszają
  Putina do ponownego przemyślenia sytuacji. Musi on teraz rozważyć, czy będzie w
  stanie kontynuować tę wojnę przez kolejne dwa lata Podczas rozmów bilateralnych
  ministrowie rozmawiali o procesie akcesji Ukrainy do Unii Europejskiej. Omówili
  postępy reform, które są niezbędne do realizacji przez Ukrainę kolejnych etapów
  integracji. Podczas spotkania szefowie dyplomacji rozmawiali również o klimacie
  inwestycyjnym na Ukrainie, przede wszystkim sytuacji polskich przedsiębiorców, którzy
  prowadzą tam działalność. Ministrowie omówili główne wyzwania i szanse dotyczące
  dalszego rozwoju polskich inwestycji na Ukrainie.'
