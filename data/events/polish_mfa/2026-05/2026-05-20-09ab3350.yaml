title: Polsko-węgierskie konsultacje w Warszawie
text: Szef polskiej dyplomacji Radosław Sikorski wyraził wsparcie dla ambicji rządu
  Pétera Magyara w zakresie odblokowania funduszy europejskich dla Węgier, podkreślając
  w tym kontekście znaczenie praworządności i przywracania zaufania do instytucji
  publicznych. W rozmowie podniesiono także kwestię surowców energetycznych. Wicepremier
  Sikorski zwrócił uwagę, że Polska może być ważnym partnerem Węgier w poszukiwaniu
  alternatywnych źródeł dostaw i uniezależnianiu się od rosyjskich surowców. Spotkanie
  szefów dyplomacji Polski i Węgier w Warszawie było ważnym elementem budowania nowych
  relacji między oboma państwami oraz tworzenia mapy wspólnych interesów. Ministrowie
  zgodzili się co do potrzeby zacieśniania współdziałania w formatach regionalnych,
  w tym w ramach Grupy Wyszehradzkiej. Rozmowy odbyły się w ramach pierwszej od objęcia
  urzędu oficjalnej wizyty zagranicznej premiera Węgier Pétera Magyara w Polsce, zaplanowanej
  w dniach 19–21 maja br. Szeroki skład węgierskiej delegacji rządowej – obejmujący
  m.in. szefa kancelarii premiera oraz ministrów odpowiedzialnych za obronność, gospodarkę,
  energetykę, rolnictwo i kulturę – stanowi jednoznaczne potwierdzenie woli Budapesztu
  do odbudowy dobrych relacji bilateralnych z Warszawą, opartych na wzajemnym szacunku
  i zaufaniu.
