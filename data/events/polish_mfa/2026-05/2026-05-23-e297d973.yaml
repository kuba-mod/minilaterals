title: 21. edycja GLOBSEC Forum 2026 z udziałem wicepremiera Radosława Sikorskiego
text: 'Od ponad dwóch dekad GLOBSEC Forum ugruntowało swoją pozycję jako jedna z najbardziej
  wpływowych platform w Europie, kształtująca globalne bezpieczeństwo i stabilność.
  Tegoroczne spotkanie zgromadziło światowych liderów, innowatorów i twórców zmian
  pod patronatem prezydenta Czech, Petra Pavla. 21. edycja Forum GLOBSEC odbyła się
  pod hasłem „Globalna transformacja systemowa”, poruszając kluczowe pytanie naszych
  czasów: w jaki sposób Europa może odegrać konstruktywną rolę w świecie naznaczonym
  fragmentacją, rywalizacją o władzę i rosnącym ryzykiem. To nie jest wojna o NATO.
  To wojna o dążenie Ukrainy do dołączenia do Europy - do życia w kraju wolnym od
  korupcji, opartym na praworządności, przechodzącym od biedy do dobrobytu. O to toczy
  się gra. Dyskusje prowadzone podczas forum dotyczyły strategicznej roli Europy w
  szybko zmieniającym się świecie, od kształtowania globalnego zarządzania po rozwijanie
  współpracy transatlantyckiej. Poruszone tematy dotyczyły bezpieczeństwa i obrony
  w nowej erze, wpływu technologii na geopolitykę i innowacje, strategii zrównoważonego
  wzrostu, a także bezpieczeństwa energetycznego i klimatycznego oraz budowania odporności
  w obliczu globalnej niepewności.'
