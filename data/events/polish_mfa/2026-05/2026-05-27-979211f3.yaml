title: Nieformalne spotkanie ministrów spraw zagranicznych UE na Cyprze
text: Unijni ministrowie omówili kluczowe kwestie znajdujące się obecnie na agendzie
  polityki zagranicznej UE, przede wszystkim agresję Rosji na Ukrainę, wsparcie dla
  Ukrainy i metody zwiększenia presji na Rosję. W dyskusji na temat sytuacji na Bliskim
  Wschodzie, w tym konsekwencji konfliktu w Cieśninie Ormuz, sytuacji w Gazie oraz
  Libanie i Syrii udział wzięli ministrowie spraw zagranicznych Arabii Saudyjskiej
  oraz Indii. Na marginesie Gymnich minister Radosław Sikorski spotkał się z ministrem
  spraw zagranicznych Ukrainy oraz z ministrem spraw zagranicznych Słowacji.
