title: Sekretarz Stanu Ignacy Niemczycki wziął udział w posiedzeniu Rady do Spraw
  Ogólnych (GAC) w Brukseli
text: 'W ramach dyskusji o Radzie Europejskiej zaplanowanej na 18-19 czerwca br. wiceminister
  Ignacy Niemczycki podkreślił wagę kontynuacji wieloaspektowego wsparcia Ukrainy:
  konieczności szybkiej realizacji pożyczki 90 mld euro dla Ukrainy, unijnych gwarancji
  bezpieczeństwa, sankcji na rosyjski sektor energetyczny i kraje trzecie oraz szybkiego
  otwarcia negocjacji akcesyjnych w klastrze „Sprawy podstawowe”. Zaznaczył również
  potrzebę dalszych prac w ramach polityki obronnej, przede wszystkim wzmocnienia
  wschodniej flanki UE. Podczas dyskusji ministrowie wymienili także poglądy na temat
  związku przyszłych Wieloletnich Ram Finansowych z rozwojem jednolitego rynku. Wiceszef
  polskiej dyplomacji podkreślił znaczenie inwestycji w fizyczną infrastrukturę dla
  wzmacniania spójności i konkurencyjności UE. Na marginesie posiedzenia Rady do Spraw
  Ogólnych (GAC) odbyło się także spotkanie ministrów państw grupy przyjaciół spójności
  oraz ministrów ds. przyszłości. Przedstawiono również wspólną deklarację grupy Friends
  of Cohesion, popartą przez 16 delegacji, w tym polską. Jej treść w języku angielskim
  dostępna jest poniżej.'
