title: Ministerstwo Spraw Zagranicznych potępia rosyjskie groźby oraz kampanię dezinformacyjną
  wymierzoną w Republikę Łotewską oraz inne kraje
text: Federacja Rosyjska jest agresorem, który rozpoczął niesprowokowaną wojnę przeciwko
  Ukrainie. Zgodnie z prawem międzynarodowym Ukraina ma prawo do obrony. Wzywamy stronę
  rosyjską do zaprzestania rozpowszechniania kłamstw oraz formułowania eskalacyjnych
  wypowiedzi. Stanowczo sprzeciwiamy się kierowaniu gróźb wobec Łotwy lub innych Sojuszników
  z NATO.
