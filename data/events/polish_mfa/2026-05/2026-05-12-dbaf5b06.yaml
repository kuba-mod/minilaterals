title: Top diplomats of Poland and Ukraine meet
text: 'The foreign ministers of Poland and Ukraine talked about possible ways of bolstering
  regional security and stability. At the ministerial session, minister Andrii Sybiha
  spoke about the developments at the battlefront and emphasised that Kyiv is interested
  in reaching a sustainable and long-term ceasefire. We hold the line, we close the
  sky, and we use very effectively our asymmetric special sanctions and asymmetric
  attacks. And it is really working - said minister Sybiha, adding that it is necessary
  to further exert pressure on Russia, ensure the US engagement, and increase the
  price that Russia pays for its continued aggression. Deputy Prime Minister Sikorski
  stressed that Poland will continue to support Ukraine: It is important for the adversary
  to know that Ukraine is willing to continue and we are willing to continue to support
  it. I think it is Ukraine stabilising the front and Europe overcoming its paralysis
  thanks to the magnificent victory of prodemocratic forces in Hungary that is forcing
  Putin to recalculate. He now has to calculate whether he can continue with this
  war for another two years As part of bilateral talks, the ministers spoke about
  the process of Ukraine’s accession to the European Union. They discussed the progress
  made in introducing reforms that are necessary for Ukraine to move towards greater
  integration. At the bilateral level, the top diplomats also talked about the investment
  climate in Ukraine, particularly the situation of Polish entrepreneurs operating
  in the country. The ministers discussed the main challenges and opportunities in
  the context of further Polish investments in Ukraine.'
