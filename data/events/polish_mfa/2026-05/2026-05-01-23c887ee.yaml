title: 22 lata Polski w Unii Europejskiej. Polski sukces w liczbach.
text: 'Polska w Unii Europejskiej to historia spektakularnego skoku rozwojowego, choć
  wejście do UE w 2004 r. było szansą, a nie gwarancją sukcesu. To właśnie dzięki
  rozsądnej polityce gospodarczej i dobrym decyzjom strategicznym, a przede wszystkim
  dzięki aktywności i właściwym wyborom Polaków, najlepiej ze wszystkich państw regionu
  wykorzystaliśmy ten potencjał. Unia Europejska to 450 milionów ludzi. Jednolity
  rynek UE jest 12 razy większy pod względem ludności i 20 razy większy pod względem
  gospodarki niż rynek krajowy. To jego skala i potencjał umożliwiają rozwój polskich
  firm. Wielki i stabilny rynek to także bezpieczeństwo i przewidywalność. Unia Europejska
  to najważniejszy partner handlowy Polski. W ciągu 22 lat w UE nasza gospodarka urosła
  ponad dwukrotnie: skumulowany wzrost PKB Polski w latach 2003–2025 wyniósł prawie
  130%, najwięcej w Unii (średnia dla UE-27 to 34,5%). Nasz PKB na mieszkańca wzrósł
  z niecałych 50% do ponad 80% średniej UE i wyprzedziliśmy już pod tym względem Grecję,
  a w 2026 r. według prognoz Międzynarodowego Funduszu Walutowego wyprzedzimy Hiszpanię.
  Aż 58% wzrostu gospodarczego Polski po 2004 r. wynika z członkostwa w UE. Nasz PKB
  na mieszkańca jest o 42% wyższy niż byłby poza UE. Przekroczyliśmy 1 bilion dolarów
  PKB i w grudniu 2026 r. weźmiemy udział w szczycie 20 największych gospodarek świata.
  Aż 5 milionów miejsc pracy w Polsce jest związanych z jednolitym rynkiem UE – co
  stanowi ⅓ osób pracujących w Polsce. Zatrudnienie posiada niemal 80% Polaków w wieku
  produkcyjnym i jest to jeden z najlepszych wyników w Europie. Średnie wynagrodzenie
  w Polsce wzrosło w ciągu 22 lat o ponad 180%. Bezrobocie spadło z 19% w 2004 r.
  do 3% w 2025 r. Od 2003 r. liczba pracujących wzrosła o 3,6 miliona osób. To tak,
  jakby w ciągu tych 22 lat pracę znalazła cała populacja metropolii warszawskiej
  i rzeszowskiej czytamy w Raporcie „22 lata Polski w Unii Europejskiej. Cz. I: gospodarka
  i rynek pracy”. Opracowanie: Departament Ekonomiczny MSZ Od 2004 r. polski eksport
  wzrósł ponad 6 razy, a eksport rolno-spożywczy – 12 razy. Na rynek UE trafia ¾ naszego
  eksportu, a także ¾ naszego eksportu rolno-spożywczego. W czasie 22 lat wartość
  polskiego eksportu high-tech wzrosła 27 razy, wyprzedzając Austrię, Hiszpanię i
  Szwecję. Na rynek UE trafia już ponad 60% naszego eksportu usług. Jesteśmy na 1.
  miejscu w UE w usługach transportowych — z prawie 20% udziałem w rynku drogowych
  przewozów towarowych wyprzedziliśmy Niemcy i Hiszpanię. Na 15,2 mln osób pracujących
  w Polsce w 2022 r., 5 mln pracowało na stanowiskach związanych z jednolitym rynkiem.
  Kolejne 0,6 mln miejsc pracy powstało dzięki funduszom unijnym. Oznacza to, że członkostwo
  w UE stworzyło warunki, które polskie firmy i pracownicy wykorzystali do stworzenia
  ponad ⅓ miejsc pracy w kraju – to więcej niż mieszkańców w Warszawie, Krakowie,
  Wrocławiu, Łodzi, Poznaniu, Gdańsku i Szczecinie razem wziętych Aż 85% inwestycji
  zagranicznych w Polsce pochodzi z państw UE. Jednocześnie Polska stała się inwestorem:
  73% polskich inwestycji zagranicznych trafia do państw Unii. O ile na koniec 2004
  r. wartość rodzimych bezpośrednich inwestycji za granicą wynosiła 512 mln EUR, o
  tyle dwie dekady później, w 2024 r., wskaźnik ten osiągnął poziom 38,6 mld EUR Raport
  „22 lata Polski w Unii Europejskiej. Cz. I: gospodarka i rynek pracy” do pobrania
  poniżej.'
