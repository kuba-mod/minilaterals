title: Wiceminister Bosacki uczestniczył w posiedzeniu Rady ds. Zagranicznych (FAC)
  w Brukseli
text: 'Ponadto głównymi tematami rozmów – które miały miejsce 11 maja – były: trwająca
  agresja Rosji wobec Ukrainy, sytuacja na Bliskim Wschodzie oraz relacje UE z państwami
  Bałkanów Zachodnich. W Brukseli doszło też do nieformalnego spotkania z ministrami
  spraw zagranicznych państw Bałkanów Zachodnich oraz z kanadyjską minister spraw
  zagranicznych Anitą Anand. W dyskusji na temat agresji Rosji wobec Ukrainy wiceminister
  Bosacki podkreślił, że cele Rosji się nie zmieniły, choć nie jest ona w stanie zrealizować
  ich na wojnie. Wezwał do szybkiego wdrożenia pożyczki dla Ukrainy w wysokości 90
  miliardów euro – niezbędnej do wzmocnienia Sił Zbrojnych Ukrainy i zapewnienia funkcjonowania
  ukraińskiego państwa. Podkreślił także wagę utrzymania presji sankcyjnej wobec Rosji,
  w tym w obszarze energii. Wiceszef polskiej dyplomacji zaapelował o pilne otwarcie
  pierwszego klastra negocjacyjnego z Ukrainą (Sprawy podstawowe), podkreślając jednocześnie,
  że rozszerzenie musi pozostać procesem opartym na podstawach merytorycznych i uwzględniającym
  wrażliwości państw członkowskich (m.in. dot. rolnictwa i transportu). Podczas spotkania
  Rada podjęła decyzję o nałożeniu sankcji na kolejne 16 osób oraz siedem podmiotów
  odpowiedzialnych za systematyczne bezprawne deportacje, przymusowe przesiedlenia
  i przymusową asymilację ukraińskich dzieci, a także za ich bezprawną adopcję i wywożenie
  do Federacji Rosyjskiej. W rozmowie na temat sytuacji na Bliskim Wschodzie, ministrowie
  podkreślili kluczowe znaczenie szybkiego odblokowania żeglugi przez Cieśninę Ormuz
  i wypracowania trwałego zawieszenia działań zbrojnych. Opowiedzieli się za zacieśnieniem
  relacji z krajami Zatoki Perskiej. Uczestnicy spotkania krytycznie ocenili fakt
  naruszania przez Izrael porozumienia o zawieszeniu broni, zawartego z Hamasem 9
  października 2025 r. i wyrażali zaniepokojenie liczbą ofiar wśród ludności cywilnej
  w Libanie. Rada wyraziła także poparcie dla objęcia sankcjami nielegalnych osadników
  izraelskich na Zachodnim Brzegu. Podczas nieformalnego spotkania z szefami spraw
  zagranicznych Bałkanów Zachodnich wiceszef polskiej dyplomacji Bosacki zachęcał
  partnerów do osiągnięcia pełnej zgodności z priorytetami UE w obszarze polityki
  zagranicznej i bezpieczeństwa. Wiceminister Bosacki podkreślił, że jest to niezbędny
  warunek przyszłego członkostwa w UE. Podczas spotkania z szefową kanadyjskiego MSZ
  potwierdzono zbieżność stanowisk UE i Kanady w kluczowych obszarach polityki zagranicznej,
  w tym w odniesieniu do agresji Rosji wobec Ukrainy. *** Rada do Spraw Zagranicznych
  (FAC) odpowiada za politykę zagraniczną Unii i kieruje jej stosunkami dyplomatycznymi
  z resztą świata. Decyduje o sprawach bezpieczeństwa i obrony, zawiera umowy handlowe
  i ustanawia partnerstwa międzynarodowe.'
