title: W MSZ o międzynarodowym prawie humanitarnym
text: 'Podczas spotkania Cordula Droege, Chief Legal Officer z Międzynarodowego Komitetu
  Czerwonego Krzyża (MKCK) podkreśliła, że międzynarodowe prawo humanitarne (MPH)
  jest kluczowym narzędziem do ochrony ludzkiego życia i godności w przypadku konfliktów
  zbrojnych. Przedstawiła współczesne wyzwania oraz możliwe działania na rzecz wzmocnienia
  jego przestrzegania. Obecnie MKCK odnotowuje ponad 130 konfliktów zbrojnych na świecie.
  To znacznie więcej niż w poprzednich dekadach, a zmiany polityczne, zacieranie się
  sojuszy i szybki postęp technologiczny zwiększają ryzyko konfliktów, które mogą
  prowadzić do poważnych konsekwencji dla ludności cywilnej. Skutki działań wojennych
  możemy obserwować za wschodnią granicą Polski. W wojnie pomiędzy Rosją a Ukrainą
  ataki dronów i rakiet ranią cywilów daleko od linii frontu. Niszczona jest także
  kluczowa infrastruktura. Do MKCK zgłoszono ponad 200 tysięcy przypadków zaginięć
  – zarówno wojskowych, jak i cywilnych. MKCK jest ważnym partnerem Polski w działaniach
  na rzecz najbardziej potrzebujących. Wspólnie wspieramy ofiary konfliktów zbrojnych,
  promujemy międzynarodowe prawo humanitarne oraz realizujemy projekty humanitarne.
  W 2025 r. Polska przekazała MKCK ok. 4,5 mln zł w ramach wpłat dobrowolnych na rzecz
  pomocy humanitarnej dla Ukrainy. Międzynarodowy Komitet Czerwonego Krzyża to niezależna
  i neutralna organizacja, która od 1863 roku zapewnia ochronę i pomoc humanitarną
  ofiarom działań wojennych i innych form przemocy. Więcej na temat działalności MKCK:
  LINK'
