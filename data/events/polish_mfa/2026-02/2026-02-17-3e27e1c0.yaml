title: Secretary of State Marcin Bosacki visits Türkiye
text: 'During his two-day visit to Türkiye (16–17 February), the deputy minister was
  accompanied by representatives of the Polish Sejm and Senate as well as the heads
  of key Polish financial and investment institutions: Andrzej Dycha of the Polish
  Investment and Trade Agency and Bartłomiej Babuśka of the Industrial Development
  Agency. Deputy Minister Bosacki met, among others, with representatives of the Ministry
  of Foreign Affairs of the Republic of Türkiye, the Grand National Assembly of Türkiye,
  and business institutions. The deputy foreign minister held talks with his Turkish
  counterpart, Deputy Foreign Minister Mehmet Kemal Bozay, on bilateral political
  and economic cooperation, as well as cooperation on security and defence. Their
  talks also covered the current situation in Europe, including Russia’s aggression
  against Ukraine and Türkiye’s involvement in negotiations between Kyiv and Moscow,
  as well as in the South Caucasus and the Middle East. Poland highly values Türkiye’s
  efforts to achieve peace in Ukraine and protect its territorial integrity. Russia’s
  illegal and aggressive war against Ukraine requires a strong and united response,
  emphasised Deputy Minister Marcin Bosacki. The visit also reaffirmed Poland’s support
  for Turkey’s European integration. An agreement was signed between the Minister
  of Foreign Affairs of Poland and the Minister of Foreign Affairs of the Republic
  of Türkiye on the education of Turkish citizens at the College of Europe in Natolin.
  Meetings with Turkish parliamentarians: Burhan Kayatürk, Chairman of the EU Harmonization
  Committee, and Ferhat Nasıroğlu, Chairman of the Türkiye–Poland Parliamentary Friendship
  Group, also focused on support for the country’s European integration and the development
  of bilateral cooperation. During the meetings at the Grand National Assembly of
  Türkiye, the deputy foreign minister was accompanied by the Chairmen of the Polish–Turkish
  Parliamentary Group, MP Andrzej Szewiński, and Senator Krzysztof Bieńkowski. While
  in Ankara, Deputy Minister Marcin Bosacki laid a wreath at the Atatürk Mausoleum.
  He handed the Bene Merito honorary distinctions to Prof. Özgün Erler Bayır and Prof.
  Özgehan Şenyuva in recognition of their contributions to strengthening bilateral
  relations. The talks in Istanbul also addressed prospects for strengthening Poland–Türkiye
  economic cooperation, the presence of Polish companies in Türkiye, including support
  for Polish entrepreneurs operating in the local market, as well as incentives for
  potential Turkish investors in Poland. During a meeting with Michał Nitka, a board
  member of Asseco South Eastern Europe S.A., the deputy minister stressed that Polish
  businesses in the Bosporus contributes to enhancing the competitiveness of the Turkish
  economy. A meeting with Nail Olpak, President of the Foreign Economic Relations
  Board (DEİK), resulted in an agreement to organise the 5th Polish–Turkish Economic
  Forum. Poland offers Turkish investors a stable, predictable, and competitive environment
  for long-term projects. Investors can benefit from a skilled workforce, well-developed
  industrial and logistical infrastructure, full integration with EU markets, and
  a strong production and services base, The deputy foreign minister also met with
  Şekib Avdagiç, President of the Istanbul Chamber of Commerce.'
