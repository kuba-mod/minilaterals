title: Secretary of State Marcin Bosacki meets today with Deputy Minister of Foreign
  Affairs Olexandr Mischenko of Ukraine
text: While discussing security, the deputy chiefs of diplomacy of Poland and Ukraine
  took into consideration an escalating energy crisis, which affects Ukrainian cities
  and civilians. Deputy Foreign Minister Bosacki confirmed that Poland can offer concrete
  support for Kyiv, referring to recent actions of the Government Agency for Strategic
  Reserves, and the “Warmth from Poland for Kyiv” campaign. Such activity is aimed
  at mitigating the consequences of mass Russian attacks on Ukraine’s critical infrastructure.
  Another important topic on the agenda was the ongoing peace process and prospects
  for reaching agreement. Deputy foreign ministers discussed current regional challenges
  and the need to continuously put international pressure on Russia. The meeting also
  focused on the outlook for enhancing the Polish–Ukrainian military cooperation,
  including cooperation in the unmanned aerial systems (drones) sector. Furthermore,
  Deputy Foreign Ministers Bosacki and Mischenko talked about bilateral political,
  economic, and social cooperation, highlighting the fact that people-to-people contacts
  and humanitarian aid are vital for building mutual understanding.  The ministers
  stressed the strategic importance of Polish–Ukrainian partnership and Poland’s role
  as a key ally of Ukraine—both in the security context and as a provider of humanitarian,
  military, and logistical support.
