title: Minister Radosław Sikorski holds annual meeting with diplomatic corps of Asia-Pacific
  states
text: Hosted by the Asia and Pacific Museum in Warsaw on 16 February, the event was
  an opportunity to take stock of the developments to date and map out new relations
  with that globally critical region. In his address, Minister Radosław Sikorski outlined
  Polish diplomacy’s priorities in the Asia-Pacific, highlighting ever closer political
  dialogue and permanent economic ties. During such turbulent times, when our security
  is deeply interdependent, stable and reliable partnerships have become not only
  valuable but even indispensable,” Deputy Prime Minister Sikorski said. Poland’s
  top diplomat pointed out the country’s dynamic economic growth, noting that it is
  now one of the world’s twenty largest economies. This strong and stable standing
  provides a sound foundation to exchange experience with Asia-Pacific states and
  carry out joint projects in order to respond effectively to today’s international
  challenges.
