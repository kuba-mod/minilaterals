title: Telewizja Polska launches Romanian-language version of "Vot Tak. Moldova”
text: The purpose of the new programme is to reach out to the Romanian-speaking part
  of Moldovan society and to strengthen the region’s resilience to disinformation,
  in particular inspired by the Russian Federation. The initiative directly addresses
  the demand for reliable and independent sources of knowledge in that part of Europe.
  The “Vot Tak. Moldova” project premièred in Russian in May 2025. As a next step
  in its development, the plans involved adjusting the programme’s offering to Moldova’s
  linguistic profile. The launch of a Romanian-language version is a natural move
  towards building a wide reception among all the nationals. “Vot Tak. Moldova” is
  part of the Russian-language Vot Tak editorial team under TVP’s Foreign Media Center.
  The team have been successful in their outreach, recording a total of more than
  818 million views of their materials in 2025. The programme is available as an online
  video stream and on social media. The format includes news, interviews with experts,
  analyses of propaganda mechanisms, and content devoted to Moldova’s integration
  with the European Union and cooperation with EU member states. Access to independent
  media is crucial in the face of Russia’s attempts at influencing the democratic
  processes in Moldova, as evidenced during the 2024 presidential vote and the 2025
  parliamentary election in the country. TVP’s Foreign Media Center has consistently
  strengthened Poland’s Eastern European presence as a country that supports freedom
  of speech and democratic standards. Vot Tak is now one of the fastest-growing Russian-language
  media outlets in Europe and an important pillar of Poland’s public diplomacy based
  on democratic values and pluralism.
