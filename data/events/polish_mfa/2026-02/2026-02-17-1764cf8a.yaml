title: Poland-France Cultural Season 2027 announced
text: 'The programme will translate strategic partnership into real meetings of people,
  ideas, and arts. The organisation of the Cultural Season was approved by both countries’
  ministries of culture on 17 February 2026. The event’s programme in France will
  be prepared by the Adam Mickiewicz Institute in collaboration with the Polish Institute
  in Paris, while the programme in Poland will be carried out by the French Institute
  in cooperation with the French Embassy in Poland. In 2025, Poland and France reaffirmed
  their ambition to build a strong and sovereign Europe based on trust, shared responsibility,
  and cooperation. The Treaty of Nancy highlights the importance of strategic relations
  between both countries and cultural cooperation is one of its key areas. In the
  Poland–France Cultural Season 2027, European values are not merely declared but
  experienced and co-created. More than two decades after the notable “Nova Polska”
  Cultural Season in France, both countries return to the idea of bilateral cooperation—now
  in the context of new European challenges. Next year’s programme will address issues
  crucial for today’s Europe: countering misinformation, opposing the revival of totalitarian
  ideas, and defending human rights and civil liberties. The Season will not merely
  showcase artistic highlights, but it will also inspire lasting collaboration in
  the form of co-productions, study visits, research projects, and initiatives that
  bring together the cultural and innovation sectors. The mobility of artists and
  cultural professionals will also be an important element ensuring that the relations
  established in 2027 have long-lasting effects. The implementation of the programme
  is made possible thanks to the involvement of the Ministry of Culture and Ministry
  for Europe and Foreign Affairs in France as well as the Ministry of Culture and
  National Heritage and Ministry of Foreign Affairs in Poland.'
