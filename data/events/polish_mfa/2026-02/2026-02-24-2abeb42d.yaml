title: Statement by Deputy Prime Minister Radosław Sikorski during a meeting of the
  OSCE Permanent Council on the fourth anniversary of the outbreak of the Ukraine
  war
text: 'Four years into the Russian aggression – the Kremlin’s forces still occupy
  almost a fifth of Ukraine’s territory. Last year was the deadliest for Ukrainian
  civilians since 2022 — with over 2.5 thousand killed and 12 thousand injured. Well
  aware that Ukraine faces one of the harshest winters in decades, the aggressor now
  targets heating and energy systems to maximise civilian suffering. Fortunately,
  Ukraine heroically stands its ground and refuses to buckle under the pressure. Moscow’s
  advances along the frontline are incredibly costly, with 382 thousand Russian casualties
  in 2025 alone. But unfortunately, Russia does not seem intend to stop. By using
  hybrid warfare tools, including acts of sabotage, it strives to undermine the security
  in many OSCE participating states. We, the Western democracies, have been standing
  with Ukraine since day one. We must continue to do so for as long as it takes –
  by consistently implementing appropriate measures: targeting energy sector, asset
  freezes and travel bans. Non-compliance with international obligations must carry
  enforceable consequences. The OSCE and its participating states have a role to play
  in this regard. We should expose obstruction and track those who enable the aggression.
  Business as usual is not an option. We must continue our efforts towards a just
  and lasting peace for Ukraine. One that does more than just silence the guns. One
  that will deter future aggression and lay the foundation for full national recovery.
  Europe’s security will not be restored through polite declarations. It will be rebuilt
  by unity, resolve and accountability.'
