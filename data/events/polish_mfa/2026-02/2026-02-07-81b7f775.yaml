title: Deputy Prime Minister and Foreign Minister Radosław Sikorski visits United
  States
text: The United States, in cooperation with its closest allies, is taking action
  to strengthen supply chains for critical minerals. These supply chains are essential
  to the functioning of modern economies, as they underpin technological development,
  the energy transition, and the industrial security of states. This is an important
  issue for the entire West. The United States has identified a serious problem that
  our companies have already faced […]. First came the shortage of magnets, followed
  by proposals aimed at rationing critical minerals The European Union already has
  a position on these challenges, and now the United States has proposed a major international
  initiative whose goals Poland and the rest of the European Union support - he added.
  Deputy Prime Minister Sikorski announced that the proposals presented by the US
  authorities will be the subject of further work, including within the European Union.
  He also expressed his belief that transatlantic cooperation on security and the
  economy is evidence of the enduring bonds between the US and Europe. Critical minerals
  cannot be used for blackmail, and their production should be geographically more
  diversified. This is an element of our economic security - summarised Minister Sikorski.
  The next stop on the US tour were meetings in Washington. The deputy prime minister
  met with members of Congress, analysts, and Polish and American journalists to discuss
  transatlantic cooperation on security and defence. Also emphasised was the need
  to continue supporting Ukraine in its armed struggle. Minister Radosław Sikorski
  also laid flowers at the bust of General Tadeusz Kościuszko at the US Congress.
  4 February marked the 280th anniversary of this Polish-American hero’s birth. While
  in the US capital, the Polish foreign minister inspected the progress of work on
  constructing the new building of the Embassy of the Republic of Poland in Washington.
  In December 2024 Poland finalised the purchase of property intended for this diplomatic
  mission. On the final day of the visit, Minister Sikorski travelled to Chicago,
  home to the largest Polish community in the United States. He met with its representatives
  at the Polish Museum of America and with Hubert Cioromski, President of the Polish
  American Congress. In talks with the governor of Illinois and the mayor of Chicago,
  the minister raised the issue of the Polish diaspora’s contribution to the city’s
  development and discussed prospects for strengthening economic cooperation.
