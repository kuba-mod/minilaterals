title: Poland Joins the G7 Rapid Response Mechanism
text: The G7 RRM was established by G7 leaders at the 2018 Charlevoix Summit as part
  of a commitment to uphold a rules-based international order and to counter foreign
  threats to democracies. The mechanism includes G7 members as well as associate members,
  such as Australia, New Zealand, NATO, the Netherlands, and Sweden. Poland brings
  unique expertise in countering foreign interference, including both informational
  and cyber domains. Our national threat detection capabilities and willingness to
  confront malign actors will strengthen the collective resilience of the RRM participating
  countries. Poland’s accession to the G7 RRM also reflects the international community’s
  confidence in our democratic security experience and represents another step toward
  enhancing transatlantic and European cooperation in countering hybrid threats and
  disinformation campaigns. Poland continues to develop its institutions responsible
  for responding to hybrid and FIMI threats, and membership in the G7 RRM will enable
  better information sharing, coordinated actions, and more effective real-time responses.
