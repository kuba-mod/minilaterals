title: Council for Cooperation with the Federal Republic of Germany inaugurated
text: 'In her opening address, the Council’s Chair Henryka Mościcka-Dendys highlighted
  the unique character of Polish–German ties. In the face of the present threats to
  security and the complex international situation, Poland aims to give new momentum
  to its relations with Germany so that they reflect the ambitions and the potential
  of both countries, The meeting was an opportunity for representatives of the ministries
  involved in intersocietal and cross-border cooperation with Germany to discuss the
  prospects of strengthening bilateral relations in 2026 in the context of the 35th
  anniversary of the Treaty on Good Neighbourly Relations and Friendly Cooperation,
  the current challenges to Polish–German ties, and other issues. The attendees agreed
  that the Council’s main focus in the current year will be on the monitoring and
  exchange of information on: cross-border cooperation, connectivity, trade, joint
  research initiatives, the teaching of the Polish language, and measures promoting
  Polish history in Germany. The Council for Cooperation with the Federal Republic
  of Germany is an auxiliary consultative body established by the Order no. 6 of the
  President of the Council of Ministers of 23 January 2026 (“Monitor Polski” Official
  Gazette of 2026, item 136). On 30 January, Henryka Mościcka-Dendys was designated
  as the Chair of the Council. The Council is composed of representatives of selected
  ministries: the Ministry of Development and Technology, the Ministry of Culture
  and National Heritage, the Ministry of Foreign Affairs, the Ministry of the Interior
  and Administration, the Ministry of Climate and Environment, the Ministry of National
  Education, the Ministry of Infrastructure, and the Ministry of Science and Higher
  Education. The chair of the Polish limb of the Polish–German Intergovernmental Commission
  for Regional and Cross-Border Cooperation and, optionally, the chair of the Polish–German
  Parliamentary Group also take part in the Council’s work.'
