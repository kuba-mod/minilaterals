title: Poland's humanitarian aid for Afghanistan
text: Today, a transport of humanitarian aid has been sent to the people of Afghanistan
  affected by the earthquakes that have repeatedly struck the eastern provinces of
  the country in recent months. Around PLN 2 million worth of medical equipment, medicines,
  food, and blankets will be distributed among the survivors, especially in the Kunar
  province. For many years, Poland has been engaged in aid activities to relieve those
  in Afghanistan who need them most.
