title: Deputy Minister Zajączkowski meets OSW experts and ambassadors of Latin American
  countries
text: Wojciech Konończuk, Director of the Centre for Eastern Studies, presented the
  OSW’s activities, emphasising its role as an expert institution supporting decision-making
  processes and public debate on Eastern policy. The core part of the meeting involved
  presentations by the heads of the OSW’s thematic departments. Marek Menkiszak, the
  Head of Russian Department, outlined the current political, social, and economic
  conditions in the country. Tadeusz Iwański, the Head of Department for Belarus,
  Ukraine and Moldova, discussed the internal situation in Ukraine and its international
  position against the backdrop of the prolonged war. The experts also addressed peace
  negotiations and the broader geopolitical context. Following the presentations,
  participants exchanged comments and observations. Summing up the meeting, Deputy
  Foreign Minister Wojciech Zajączkowski highlighted the importance of cooperation
  between public institutions and the expert community. He thanked the ambassadors
  and OSW specialists for their participation and encouraged the diplomats to make
  use of the OSW’s analyses and publications, which—he noted—provide significant insights
  into the complex security landscape of Central and Eastern Europe and are accessible
  on the OSW website free of charge. Set up in 1990, the Marek Karp Centre for Eastern
  Studies prepares analyses and forecasts of international affairs—from Eastern Europe
  to Asia—in support of decision-making processes within the Polish government. Funded
  from the state budget, the Centre operates as an independent analytical institution
  promoting Poland’s expertise in foreign and security policy.
