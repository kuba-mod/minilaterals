title: Meeting between top diplomats of Poland and Czechia
text: 'The ministers discussed fundamental issues in the further development of bilateral
  relations including economic cooperation, expansion of infrastructural links, and
  energy security. They also noted the joint efforts to strengthen European defence.
  Special attention was paid to Ukraine, including to the need to ensure long-term
  support for Kyiv. We have consistently stressed the need to ensure long-term support
  for the country which is fighting for its own freedom and the security of the whole
  Europe. A just peace does not punish the victim. We care for a stable and secure
  Ukraine in a strong European Union,” underlined Deputy Prime Minister Sikorski.
  The Czech Republic would like to actively contribute to slightly more dynamic local
  activity we have been observing in Ukraine, because we, the entire region, have
  a lot in common. The ministers agreed that Poland and the Czech Republic share similar
  views on key issues such as energy security. During the consultations, they also
  identified both countries’ priorities in working on the future budget of the EU.
  Speaking with concern about the future of Central Europe, the top diplomats of Poland
  and Czechia referred to cooperation in the Visegrad format: One cannot help but
  notice that the Visegrad cooperation potential has decreased in recent years due
  to discrepancies between the Visegrad Group states in regard to their position on
  the key issues of security and relations with Russia and Ukraine,” Deputy Prime
  Minister Sikorski observed. In that context, Poland’s foreign minister noted that
  the Visegrad Group is a format with a potential for bringing closer together and
  integrating the societies of Poland and Czechia. He added that Poland maintains
  a pragmatic approach to cooperation in the Group, prioritising its engagement in
  the matters that are significant from the citizens’ standpoint. The ministers also
  referred to the question of the Czech Republic’s “territorial debt” towards Poland.
  The debt has been unsettled for about 70 years now. We have made significant progress
  today on an issue that has long remained unresolved—an old border debt that originated
  back in the 1950s,” Minister Petr Macinka said as he commented on returning borderlands
  to Poland. The issue can be resolved by way of a joint flood control or other project
  carried out to the benefit of people living in Poland and Czechia.'
