title: Deputy foreign ministers of Poland and Egypt hold consultations
text: Deputy Foreign Minister Kupiecki highlighted that Russia’s war against Ukraine
  has global consequences and affects the foundations of the international order.
  He pointed out that it has a negative impact on both Europe and the Arab world.
  The deputy foreign ministers also discussed security in the Middle East and North
  Africa, the reform of the UN, the upcoming election of the next Secretary-General,
  and prospects for cooperation within UNESCO. The deputy head of the Polish MFA reiterated
  Poland’s commitment to the UN Charter and emphasised its fundamental importance
  to the entire international community. Furthermore, the talks in Cairo provided
  an opportunity to discuss key issues in bilateral cooperation between the two countries.
