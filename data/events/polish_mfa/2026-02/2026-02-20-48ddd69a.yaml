title: Meeting between top diplomats of Poland and Palestine
text: 'Deputy Prime Minister Sikorski emphasised Poland’s unwavering support for the
  Palestinian people’s statehood-oriented aspirations. He also announced a continuation
  of the humanitarian and development assistance provided under the scheme of Polish
  Aid : “In 2023–2025, we contributed more than PLN 70 million worth of aid for the
  Palestinians, with more than PLN 21 million provided by the MFA in 2025 alone. In
  the current year, we will carry on with projects totalling about PLN 7 million and
  aimed at improving Palestine’s healthcare system in the West Bank. We are also planning
  to issue calls for proposals from NGOs: Polish Development Assistance 2026 and Humanitarian
  Aid 2026,” Minister Sikorski said. Minister Aghabeikan stressed that Palestine appreciates
  Poland’s aid: “We appreciate Poland’s ongoing support for projects aimed at development
  and humanitarian aid, including healthcare and support for the UNRWA and similar
  agencies, food programmes, and medical aid,” Varsen Aghabeikan said. The ministers
  also discussed prospects for cooperation between sectors and local government authorities.
  The meeting’s agenda included Russia’s aggression against Ukraine, security situation
  in the Middle East, and the coordination of positions taken in international fora.
  In regard to the situation in the Gaza Strip, Deputy Prime Minister Sikorski reaffirmed
  Poland’s position: “Poland consistently opts for the adoption of a two-State solution
  and the establishment of an independent State of Palestine next to the State of
  Israel. That solution is compliant with international law. It was also described
  in the UN Security Council Resolution 2803, which has recently welcomed the establishment
  of the Board of Peace,” Poland’s top diplomat observed. He added that in September
  2025, Poland had joined the New York Declaration, which defines the steps needed
  for the realisation of a State of Palestine. Referring to the launch of the Board
  of Peace in Washington on 19 February, Deputy Prime Minister Sikorski hoped for
  real progress in its work.'
