title: Undersecretary of State Wojciech Zajączkowski hosts Polish-Emirati political
  consultations
text: Participants discussed the future development of Polish–Emirati cooperation.
  Deputy Minister Zajączkowski underlined that Poland is pleased with the increase
  in trade and investment spending. The diplomat praised the extraordinary potential
  to strengthen different aspects of bilateral relations, for example, tightening
  the promising collaboration in the field of criminal law and extraditions. Other
  discussions centred on regional and global affairs, including providing humanitarian
  aid to Ukraine and the Gaza Strip, and the Emirati mediation efforts aimed at putting
  an end to Russia’s aggression against Ukraine. Poland and the UAE exchanged insights
  on their transatlantic relations. The agenda also covered the Middle East, the current
  situation in Africa, and possibilities to better coordinate initiatives within the
  UN. Both sides emphasised that Poland and the UAE share their respect for the paramount
  role of international law in relations between countries and readiness to cooperate
  towards de-escalation and peaceful conflict resolution. Minister Lana Nusseibeh
  showed openness to our perspective on a number of issues and expressed her gratitude
  for organising the Warsaw meeting as well as for two fruitful conversations with
  Deputy Prime Minister Radosław Sikorski—both today and during the Munich Security
  Conference, concluded last weekend. The consultations held at the MFA served as
  an opportunity to renew bilateral dialogue, with the previous round of consultations
  taking place in June 2021. Moreover, this was Minister Lana Nusseibeh’s first official
  visit to Warsaw.
