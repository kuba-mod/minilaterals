title: Spotkanie szefów dyplomacji Polski i Andory
text: Ministrowie spraw zagranicznych Polski i Andory wyrazili satysfakcję z bardzo
  dobrego stanu relacji dwustronnych. Podkreślili szczególny charakter wizyty minister
  spraw zagranicznych Andory w Warszawie, która przypadła w 30. rocznicę nawiązania
  stosunków dyplomatycznych między Polską a Andorą. Jednym z głównych tematów rozmów
  był proces prowadzący do zawarcia umowy stowarzyszeniowej między Andorą a Unią Europejską.
  Minister Radosław Sikorski wskazał, że bliskie relacje Andory z Unią Europejską
  wynikają nie tylko z jej położenia geograficznego, ale również ze wspólnych wartości
  demokratycznych, poszanowania praworządności oraz podstawowych wolności. Podkreślił
  także poparcie Polski dla dalszego zbliżenia Andory z Unią Europejską. Szefowie
  dyplomacji omówili również kwestie bezpieczeństwa międzynarodowego, ze szczególnym
  uwzględnieniem konsekwencji rosyjskiej agresji przeciwko Ukrainie. Minister Sikorski
  wyraził uznanie dla jednoznacznego stanowiska Andory potępiającego działania Rosji
  oraz dla wsparcia udzielanego obywatelom Ukrainy zmuszonym do opuszczenia swojego
  kraju. Rozmowy objęły także aktualną sytuację na Bliskim Wschodzie. W trakcie pobytu
  w Warszawie, minister spraw zagranicznych Imma Tor Faus spotkała się również ze
  słuchaczami Akademii Dyplomatycznej MSZ. Podczas wystąpienia przedstawiła perspektywę
  małego państwa europejskiego na wyzwania współczesnych stosunków międzynarodowych.
