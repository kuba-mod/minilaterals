title: Deputy Minister Artur Harazim launches 2nd Kościuszko Forum
text: 'The event was attended by members of the MFA leadership, representatives of
  the City of Gdańsk, and members of Belarusian democratic forces, including Sviatlana
  Tsikhanouskaya, the leader of Belarusian democratic opposition, who joined via video
  link. Culture is not a supplement to politics, but a foundation without which the
  democratic edifice cannot hold. Without identity, democracy is merely an empty form
  that can easily be filled with populism tailored to the needs of authoritarianism
  said Deputy Foreign Minister Artur Harazim. Conference participants discussed the
  theme “Culture as a force of democracy,” with Belarusian culture in the focus of
  attention. Panels brought together representatives of creative communities, non-governmental
  organisations, independent media, and research institutions. See the event’s full
  programme here: https://ecs.gda.pl/wydarzenia/forum-kosciuszkowskie-kultura-sila-demokracji/'
