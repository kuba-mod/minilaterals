title: Wicepremier Radosław Sikorski w debacie „Jasne, że Europa!”
text: '„Jasne, że Europa!” to cykl debat o wyzwaniach i przyszłości kontynentu organizowanych
  w warszawskim przedstawicielstwie Parlamentu Europejskiego. W debacie z licealistami
  i studentami, która miała miejsce 12 czerwca, wziął udział szef polskiej dyplomacji
  Radosław Sikorski. Rozwój zasady „Made in Europe” Uczestnicy zgodnie stwierdzili,
  że Unia Europejska stoi obecnie przed bezprecedensowymi wyzwaniami gospodarczymi,
  technologicznymi i geopolitycznymi. W dyskusji pojawił się wątek dotyczący rozwoju
  zasady „Made in Europe”. Zakłada ona silniejsze wsparcie dla europejskich producentów
  i dostawców w projektach finansowanych ze środków unijnych. Ponadto jej celem jest
  stworzenie warunków sprzyjających inwestycjom, innowacjom i rozwojowi przemysłu
  na terenie Unii Europejskiej. To co jest zagrożeniem dla nas, to deindustrializacja
  pod presją niższych cen energii w Stanach Zjednoczonych i masywnej, zautomatyzowanej
  produkcji i preferencji eksportowych w Chinach. To są te prawdziwe wyzwania. Walka
  z dezinformacją Dezinformacja, jej zwalczanie oraz zagraniczne ingerencje w procesy
  demokratyczne były jednym z głównych tematów dyskusji. Minister spraw zagranicznych
  podkreślił, że rosyjskie kampanie informacyjne są wymierzone w zaufanie obywateli
  do instytucji publicznych, mediów oraz współpracy międzynarodowej. Dlatego Unia
  Europejska rozwija narzędzia służące ochronie przestrzeni informacyjnej i wzmacnianiu
  odporności społecznej: Unia Europejska powinna swoją tożsamość obronną rozwijać
  w harmonii i z NATO i ze Stanami Zjednoczonymi. Dodał również, że w tym celu powstaje
  Europejska Tarcza Demokracji. Jej zadaniem będzie ochrona integralności debaty publicznej,
  wspieranie wolnych i uczciwych wyborów oraz rozwój kompetencji medialnych obywateli.
  Budowanie silnych partnerstw Debata była okazją, aby podkreślić, że Polska aktywnie
  wspiera rozwój współpracy europejskiej poprzez budowanie silnych partnerstw dwustronnych.
  Szczególne znaczenie mają relacje z Francją, które w ostatnich miesiącach weszły
  w nowy etap dzięki podpisaniu Traktatu o wzmocnionej współpracy i przyjaźni. Szef
  polskiej dyplomacji przypomniał, że współpraca obejmuje między innymi kwestie bezpieczeństwa
  i obronności, rozwój potencjału przemysłowego sektora obronnego, a także intensyfikację
  kontaktów politycznych, eksperckich, akademickich i samorządowych. Dodatkowym symbolem
  zacieśniania relacji jest ustanowienie 20 kwietnia Dnia Przyjaźni Polsko-Francuskiej
  oraz Nagrody im. Bronisława Geremka za zasługi dla relacji polsko-francuskich.'
