title: Polsko-chiński Dialog Strategiczny
text: Podczas wizyty w Pekinie wiceminister Władysław Teofil Bartoszewski podkreślił
  fundamentalne znaczenie dialogu politycznego na różnych szczeblach - w tym głów
  państw i szefów rządów. Wyraził nadzieję na realizację tegorocznej wizyty wysokiego
  szczebla w 10. rocznicę ustanowienia wszechstronnego partnerstwa strategicznego
  między Polską a Chinami. W trakcie Dialogu Strategicznego rozmówcy zgodzili się,
  że relacje polsko-chińskie powinny odzwierciedlać realia geopolityczne i gospodarcze.
  Wiceszef polskiej dyplomacji podziękował stronie chińskiej za udzielenie poparcia
  dla udziału Polski w pracach Grupy G20. Relacje UE-Chiny Pośród problemów międzynarodowych,
  które omówiono w trakcie Dialogu Strategicznego znalazła się agresja Rosji na Ukrainę,
  sytuacja bezpieczeństwa w Azji Wschodniej oraz relacje UE-Chiny.  Wiceminister Bartoszewski
  podkreślił, że społeczność międzynarodowa doświadcza zmian, które wymagają wspólnych
  działań wokół spraw fundamentalnych tj. obrona prawa międzynarodowego, upominanie
  się o suwerenność i integralność terytorialną państw, nienaruszalność ich granic.
  Wiceminister podkreślił, że Polska wspiera wielowymiarowy dialog z Chinami w ramach
  strategicznego partnerstwa UE-Chiny. Polski wątek w Harbin Po rozmowach w Pekinie
  wiceminister Bartoszewski odwiedził Harbin, ważny ośrodek Północno-Wschodnich Chin
  o szczególnie bliskich historycznych więzach z Polską. W czasie spotkań z wicegubernatorem
  prowincji Heilongjiang i wiceburmistrzem Harbinu omówiono możliwe sposoby upamiętnienia
  wkładu Polaków w rozwój tego miasta. To polski inżynier Adam Szydłowski podjął w
  1898 roku decyzję o budowie metropolii na terenie małej mandżurskiej wioski i został
  jej pierwszym burmistrzem. Handel artykułami rolno-spożywczymi Przed zakończeniem
  wizyty wiceszefa polskiej dyplomacji w Chinach podpisany został dokument dot. zasad
  eksportu polskiego mięsa drobiowego do Chin. Jednocześnie protokół w tej sprawie
  został podpisany w Warszawie przez Ministra Rolnictwa i Rozwoju Wsi Stefana Krajewskiego
  oraz Ambasadora Chin w Polsce Lu Shana, w imieniu szefa Generalnej Agencji Celnej
  Chin (GACC). Krok ten daje nadzieje na zwiększenie i lepsze zbalansowanie dwustronnego
  handlu artykułami rolno-spożywczymi. Jednocześnie wieńczy dwuletnie wysiłki głów
  państw, zainteresowanych instytucji oraz resortów dyplomacji.
