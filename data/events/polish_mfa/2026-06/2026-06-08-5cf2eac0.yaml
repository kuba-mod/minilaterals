title: Deputy Prime Minister and Minister of Foreign Affairs Radosław Sikorski met
  with Ales Bialatski
text: The meeting was devoted, among other things, to the activities of the "Viasna"
  Human Rights Center, of which Ales Bialatski is the founder. Minister Sikorski expressed
  satisfaction with the recent registration in Poland of the Ales Bialatski Foundation,
  which aims to protect and promote human rights. He expressed gratitude for his guest's
  participation in the Kościuszko Forum, which took place last week in Gdańsk organized
  in cooperation between the Ministry of Foreign Affairs and the European Solidarity
  Centre. We in Poland are impressed by your steadfast stance and modesty, and above
  all, we are deeply grateful for your determination in the struggle for human rights.
  We appreciate your independence and focus on defending civil liberties Ales Bialatski
  was released from a Belarusian penal colony in December 2025 as part of the dialogue
  with Belarus conducted by President Trump's administration. He was forcibly deported
  to Lithuania. After the release, he continues his pro-democracy activities.
