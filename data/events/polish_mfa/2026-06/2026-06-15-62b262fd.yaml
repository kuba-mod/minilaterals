title: 'MFA head Radosław Sikorski at EU Council: pressure on Russia must go up'
text: 'Further pressure on the Kremlin and opening accession negotiations with Kyiv
  At the Council session, Minister Sikorski called for a firm stance towards Russia
  as it fails to display good will to enter meaningful peace talks. The head of Polish
  diplomacy condemned the attacks on Kyiv and Kharkiv. In particular, he condemned
  the destruction of the Kyiv Pechersk Lavra, an Eastern Orthodox monastery complex
  from 11th century, listed as UNESCO World Heritage Site. Minister Sikorski said
  that this is yet another act of terror which exposes Moscow’s hypocrisy as it claims
  that defending Christian heritage had been one of the reasons to start the war.
  Poland’s top diplomat welcomed the adoption by the EU Council of further restrictive
  measures against Russia due to its attack on Ukraine, violation of human rights,
  and hybrid activities. Having noted the evident decline of both Russia’s army and
  the economy, the deputy prime minister also insisted on prompt adoption of the 21st
  round of economic sanctions. New restrictions should cover essential areas such
  as the financial, military, machine, and energy sectors. Minister Sikorski also
  voiced the need to finalise talks on the transfer of pre-arranged reimbursement
  for the EU member states from the unblocked European Peace Facility funds. At the
  same time, Poland welcomed the opening of the first cluster in negotiations with
  Ukraine, a milestone on its path to the EU. The launching of a substantive dialogue
  in the key areas proves that the political transition process and the implementation
  of EU standards are key tools in the modernisation of the state seeking to join
  Western institutions. Polish initiative against hybrid activity In the context of
  growing hybrid activity in Europe, Radosław Sikorski presented an essential document
  developed on MFA’s initiative by the Polish Institute of International Affairs (PISM). 
  The White Paper on Russian Acts of Sabotage and Subversion against Members of the
  Council of the Baltic Sea States was elaborated as part of the Polish presidency
  of the Council of the Baltic Sea States. To access the full report presented by
  the foreign minister, go to the Polish Institute of International Affairs website:
  The White Paper describes, among others, attacks on critical infrastructure, disruptions
  to shipping through deliberate GNSS jamming, and aggressive cognitive operations
  targeting European societies. The minister emphasised that in order to stop Russia’s
  hybrid aggression the EU member states must strengthen their intelligence cooperation,
  set up a common data exchange system, and clearly identify the perpetrators. EU–China
  relations and the Middle East crisis During the debate on EU–China relations, Poland
  unequivocally supported the need to recalibrate economic relations with Beijing.
  The European Union must provide an adequate and firm response to China supporting
  Russian arms industry. While taking part in a discussion on the Middle East, Deputy
  Prime Minister Sikorski welcomed the preliminary agreement between the US and Iran.
  He also stressed that ensuring the freedom of navigation in the strategically important
  Strait of Hormuz is crucial to global energy security. Referring to the situation
  in the occupied territories, the Polish delegation advocated the EU responding to
  Israel’s actions and the European Commission urgently presenting proposals in this
  regard. Poland backed further sanctions against illegal settlers and the Israeli
  government ministers who support them, Itamar Ben-Gvir and Bezalel Smotrich. On
  the margins of the Foreign Affairs Council, the EU foreign ministers also held an
  informal meeting with Armenia’s Minister of Foreign Affairs, Ararat Mirzoyan. Deputy
  Prime Minister Sikorski declared his unequivocal support for Yerevan’s pro-European
  and pro-Western course. The head of Polish diplomacy also supported the EU’s efforts
  to build Armenia’s resilience to Russian hybrid operations.'
