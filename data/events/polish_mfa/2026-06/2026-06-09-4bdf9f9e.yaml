title: Spotkanie Sekretarzy Stanu i Sekretarzy Generalnych ds. UE z udziałem Szefowej
  Służby Zagranicznej
text: W spotkaniu, poza przedstawicielami resortów spraw zagranicznych państw członkowskich,
  wzięli udział reprezentanci Europejskiej Służby Działań Zewnętrznych oraz Sekretariatu
  Generalnego Rady UE. Polskę reprezentowała Szefowa Służby Zagranicznej i Dyrektor
  Generalna Henryka Mościcka-Dendys. W dyskusji na temat bezpieczeństwa podkreśliła,
  że Rosja pozostaje głównym zagrożeniem dla Europy, a budowa odporności na rosyjskie
  i białoruskie działania hybrydowe, w tym w obszarze dezinformacji, wymaga wspólnych
  wysiłków całej europejskiej wspólnoty. Agenda rozmów oprócz omówienia założeń przygotowywanej
  Europejskiej Strategii Bezpieczeństwa objęła prezentację priorytetów prezydencji
  na nadchodzące półrocze, kwestie związane z negocjacjami Wieloletnich Ram Finansowych
  na lata 2028-2034, polityką rozszerzenia UE oraz konkurencyjności i wspólnego rynku.
  *** 1 lipca br. Irlandia po raz ósmy obejmie przewodnictwo w Radzie UE. Wśród priorytetów
  na najbliższe półrocze wskazuje nie tylko kwestie polityki bezpieczeństwa i obrony,
  ale też szereg kwestii gospodarczych, w szczególności dotyczących konkurencyjności
  gospodarki czy innowacyjności.
