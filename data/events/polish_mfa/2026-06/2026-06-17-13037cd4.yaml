title: Deputy Prime Minister Radosław Sikorski takes part in Polish-German Forum in
  Berlin
text: 'Ministers Radosław Sikorski and Johann Wadephul spoke about security policy
  and Ukraine’s fight with the Russian aggressor. They also discussed transatlantic
  relations, cooperation in NATO, the future and enlargement of the European Union,
  as well as the situation in the Middle East. The Russian aggression against Ukraine
  is a test of our responsibility and far-sightedness. We will continue to support
  Ukraine together and to boost the security not only of the eastern flank but of
  the entire Community. Bilateral relations, including defence cooperation and historical
  matters, were high on the agenda. Also, Minister Sikorski emphasised that infrastructure
  links between Poland and Germany should be expanded. Polish-German economic cooperation
  is a source of satisfaction. Bilateral trade continues to reach new record highs.
  With trade amounting to €180 billion last year, Poland is one of Germany’s most
  important trading partners. (...) But let us not pretend there are no difficult
  issues—as is often the case between neighbours. What matters is that we are able
  to discuss them openly. (...) Over the past 30 years, only one new cross-border
  bridge has been built, despite the fact that goods worth €500 million cross our
  shared border every single day. The ministers signed the Joint Statement by the
  Republic of Poland and the Federal Republic of Germany on the 35th Signing Anniversary
  of the Treaty between the Republic of Poland and the Federal Republic of Germany
  on Good Neighbourly Relations and Friendly Cooperation. Meetings and talks at the
  Forum were held in the context of a signing anniversary of the Treaty on Good Neighbourly
  Relations and Friendly Cooperation, concluded exactly 35 years ago, on 17 June 1991.
  As usual, the Forum offered room for dialogue between representatives of the civil
  society, experts, entrepreneurs, and cultural and scientific circles. The event
  featured ten thematic panels on economy, security, society, education, culture,
  youth, global policies, culture of remembrance, Europe, and language. Discussed
  were, among other topics, enhancing domestic and European defence capabilities,
  support for Ukraine, adequate response to long-term threats posed by Russia, and
  the ways to strengthen the EU. Much attention was paid to important bilateral issues
  such as history, teaching Polish in Germany and German in Poland, and cooperation
  in culture and education. This year’s Polish–German Forum was organised, for the
  second consecutive year, by the Foundation for Polish–German Cooperation on the
  initiative of Poland’s Ministry of Foreign Affairs and Germany’s Federal Foreign
  Office. This edition was hosted by the German side. “Neighbourhood in a time of
  change. 35 years of Polish–German cooperation,” the Forum’s motto, refers to today’s
  35th signing anniversary of the Treaty between the Republic of Poland and the Federal
  Republic of Germany on Good Neighbourly Relations and Friendly Cooperation of 17
  June 1991. The Polish–German Forum was opened by Henryka Mościcka-Dendys, the MFA’s
  Director-General and chair of the Council for Cooperation with the Federal Republic
  of Germany, and Knut Abraham, coordinator of German–Polish Intersocietal and Cross-Border
  Cooperation. Director-General Mościcka-Dendys and Coordinator Abraham participated
  in a discussion called “35th anniversary of the Treaty on Good Neighbourly Relations:
  Is it time for a new chapter in Polish–German relations?”. They also recapitulated
  one of the panels, focused on the role of civil society in bilateral relations.
  The Forum featured contributions from Poland and Germany’s top diplomats, Radosław
  Sikorski and Johann Wadephul. The event, also attended by Minister of Culture and
  National Heritage Marta Cienkowska,  saw the restitution of priceless Polish heritage
  artefacts—the German side returned a ring once owned by King Sigismund the Old,
  miniature railway exhibits, and a manuscript of “Gaude Mater Polonia.” Streaming
  available here: 2026 POLISH–GERMAN FORUM “Neighbourhood in a Time of Change" . During
  the Polish–German Forum, Ministers Radosław Sikorski and Johann Wadephul presented
  the Prize for Outstanding Merits for the Development of Polish–German Relations.
  Following the recommendations of the Polish–German Prize Committee, this year’s
  award went to Janusz Reiter, for his contribution to fostering dialogue between
  Poland and Germany, and to the Słubice–Frankfurt Cooperation Centre, for its commitment
  to cross-border cooperation and promotion of people-to-people contacts. On this
  special day, marking 35 years since the Treaty between Poland and Germany was signed,
  the panel decided to pay tribute to Janusz Reiter, a leading champion of Polish–German
  relations. Through his dedication as a journalist and a diplomat, he played a crucial
  role in building partnership relations between our countries, - said Małgorzata
  Ławrowska-von Thadden, Co-Chair of the Committee. The Polish–German Prize aims to
  honour individuals, institutions, and organisations that have particularly contributed
  to tightening and developing bilateral cooperation, by promoting mutual understanding
  and supporting dialogue between our societies. The Polish–German Forum is a platform
  for exchange of views on key topics related to bilateral relations and international
  policy. Established in 1976 and then enshrined in the Treaty on Good Neighbourly
  Relations and Friendly Cooperation between the Republic of Poland and the Federal
  Republic of Germany of 17 June 1991, the Forum is held alternately in Poland and
  Germany and financed respectively by both countries’ foreign ministries. This year,
  the event was hosted by Germany. The Polish–German Prize, awarded “for outstanding
  merits for the development of Polish–German relations”, was established by the Treaty
  between the Republic of Poland and the Federal Republic of Germany on Good Neighbourly
  Relations and Friendly Cooperation, signed on 17 June 1991. Janusz Reiter is a diplomat,
  columnist, and analyst. He served as Poland’s ambassador to Germany in 1990–1995,
  playing a part in laying the treaty and institutional foundations for Polish–German
  relations. In 1996, he set up the Centre for International Relations, a think tank
  dealing with foreign policy and security issues. He is an acclaimed author of articles
  and commentaries published in press and electronic media in Poland and Germany,
  in which he highlights the importance of the Polish–German partnership to the stability
  and security in the region. He also stresses that cooperation between the two countries
  is key to Europe’s future. The Słubice–Frankfurt Cooperation Centre is a joint initiative
  of two border towns of Słubice and Frankfurt (Oder) set up in 2011. Its projects
  serve local communities and focus on culture, tourism, environmental protection,
  and urban development. Recently, the Centre held a series of discussions and meetings
  under the theme of “Border Experiences” on countering disinformation, strengthening
  democracy, and promoting civic attitudes.'
