title: Wicepremier, Minister Spraw Zagranicznych Radosław Sikorski spotkał się z Alesiem
  Białackim
text: Spotkanie poświęcone było m.in. działalności Centrum Praw Człowieka „Wiosna”,
  którego Aleś Białacki jest założycielem. Minister Sikorski wyraził zadowolenie z
  niedawnego zarejestrowania w Polsce Fundacji Alesia Białackiego, której celem jest
  działalność na rzecz ochrony i promocji praw człowieka. Podziękował za udział gościa
  w Forum Kościuszkowskim, które odbyło się przed tygodniem w Gdańsku zorganizowane
  we współpracy Ministerstwa Spraw Zagranicznych z Europejskim Centrum Solidarności.
  Jesteśmy w Polsce pod wrażeniem Pańskiej niezłomnej postawy i skromności, a przede
  wszystkim głęboko wdzięczni za konsekwencję w walce o prawa człowieka. Dostrzegamy
  z uznaniem Pana niezależność i skupienie się na obronie swobód obywatelskich - zwrócił
  się do gościa minister. Aleś Białacki został zwolniony z białoruskiej kolonii karnej
  w grudniu 2025 roku w ramach dialogu prowadzonego z Białorusią przez administrację
  prezydenta Trumpa. Został przymusowo deportowany na Litwę. Po uwolnieniu nie zrezygnował
  z aktywności prodemokratycznej.
