title: Wiceminister Władysław Teofil Bartoszewski z wizytą w Mongolii
text: W czasie rozmów wiceministrowie dokonali przeglądu Planu Działań na rzecz Wszechstronnego
  Partnerstwa między Polską a Mongolią na lata 2025-2030 oraz bieżących spraw z zakresu
  współpracy dwustronnej. Omówiono także kwestie regionalne i globalne, a także plany
  organizacji wizyt wysokiego szczebla. Wiceministrowie Polski i Mongolii podkreślili
  zaangażowanie swoich rządów w rozwój dwustronnych relacji we wszystkich sektorach,
  zwłaszcza w przemyśle spożywczym, zbrojeniowym oraz górnictwie i rolnictwie, IT,
  zielonych technologiach, opiece zdrowotnej, farmaceutyce, odnawialnych źródłach
  energii, infrastrukturze oraz modernizacji miast i transporcie. Wiceszefowie dyplomacji
  o bezpieczeństwie Wiceszef polskiej dyplomacji wziął udział w Ułanbatoriańskim Dialogu
  Bezpieczeństwa – cyklicznym wydarzeniu będącym inicjatywą MSZ Mongolii i Rady Bezpieczeństwa
  Narodowego Mongolii, podczas którego dyskutowane są w gronie przedstawicieli państw
  regionu aktualne wyzwania regionalne i międzynarodowe w zakresie bezpieczeństwa.
  Wiceminister Bartoszewski podczas swojego wystąpienia zauważył, że ,,najwyższym
  priorytetem dla Polski – która, podobnie jak Mongolia, również cieszy się unikalnym
  położeniem geograficznym – jest bezpieczeństwo narodowe, które obecnie jest zagrożone
  przez wojnę toczącą się tuż za naszą wschodnią granicą, za której wywołanie i ofiary
  z nią związane ponosi Rosja i jej imperialistyczna polityka denominacji w regionach
  uważanych przez Moskwę za swoją strefę wpływów”. 50 mln euro na rozwój Podczas wizyty
  wiceminister Bartoszewski odbył spotkanie także w Ministerstwie Finansów Mongolii,
  w trakcie którego doszło do wymiany podpisanych alternatów Aneksu do Umowy między
  Rządem Rzeczypospolitej Polskiej a Rządem Mongolii o udzieleniu kredytu w ramach
  pomocy wiązanej, podpisanej w Ułan Bator 9 maja 2017 r. Zgodnie z umową Rząd RP
  udzielił Rządowi Mongolii preferencyjnego kredytu w wysokości do 50 mln euro, przeznaczonego
  na finansowanie projektów w dziedzinie modernizacji rolnictwa, infrastruktury, edukacji,
  ochrony środowiska oraz ochrony zdrowia. Zgodnie z decyzją obu stron, pozostała
  w ramach kredytu niezakontraktowana kwota 9,8 mln euro zostanie wykorzystana na
  dokończenie realizacji rozpoczętych projektów. Rozmowy o perspektywach dla polskich
  firm Wiceminister Bartoszewski przeprowadził także rozmowy w Ministerstwie Rozwoju
  Obszarów Miejskich, Budownictwa i Mieszkalnictwa, gdzie omówiono projekty polskich
  firm. Z kolei podczas spotkania w Ministerstwie Przemysłu i Zasobów Mineralnych
  Mongolii podsumowano współpracę geologiczną oraz omówiono perspektywę rozwoju działalności
  polskich firm na mongolskich rynku w obszarze wydobycia bogactw naturalnych i eksportu
  maszyn górniczych. Współpraca na rzecz prawdy historycznej Towarzysząca konsultacjom
  politycznym delegacja Instytutu Pamięci Narodowej na czele z dr. hab. Karolem Polejowskim
  – Zastępcą Prezesa Instytutu podpisała z Państwowa Komisją ds. Zarządzania Rehabilitacją
  Polityczną Mongolii Porozumienie o Współpracy. Obie instytucje zobowiązały się zacieśnić
  współpracę poprzez wymianę wiedzy, doświadczeń i najlepszych praktyk w ramach działań
  zmierzających do zachowania prawdy historycznej w obszarze represji politycznych
  oraz promowania praw człowieka i wartości demokratycznych. W ramach współpracy obie
  Instytucje nawiązały rozmowy dot. projektu upamiętnienia wsparcia opozycji demokratycznej
  w Polsce dla przemian demokratycznych w Mongolii, udzielonego na początku lat 90.
  XX wieku.
