title: III runda polsko-gwatemalskich konsultacji politycznych
text: Wiceministrowie podkreślili znaczenie współpracy na rzecz ochrony zasad prawa
  międzynarodowego wobec współczesnych wyzwań, w tym działań rewizjonistycznych i
  polityki siły. Wiceminister Wojciech Zajączkowski przedstawił priorytety polskiej
  polityki zagranicznej oraz możliwość rozszerzenia współpracy dwustronnej o nowe
  obszary, takie jak „zielone” technologie, cyfryzacja usług publicznych, ochrona
  granic czy cyberbezpieczeństwo. Strona gwatemalska wyraziła zainteresowanie polskimi
  rozwiązaniami w sektorze IT oraz ofertą polskiego przemysłu nawozowego. Rozmowy
  objęły również kwestie weterynaryjne. Partnerzy poinformowali o akceptacji wzoru
  świadectwa zdrowia mleka i produktów mlecznych eksportowanych z Polski do Gwatemali,
  co stwarza nowe możliwości dla polskich eksporterów. Ważnym tematem konsultacji
  była współpraca naukowa i akademicka. Wiceszefowie dyplomacji omówili rozwój kontaktów
  w dziedzinie archeologii oraz udział studentów Gwatemali w programach Erasmus+.
  Wiceministrowie wymienili także poglądy na temat najważniejszych kwestii regionalnych
  i globalnych, w tym wojny w Ukrainie oraz sytuacji bezpieczeństwa w basenie Morza
  Karaibskiego. W ramach wizyty polska delegacja spotkała się z przedstawicielami
  Ministerstwa Nauki i Technologii oraz Prezydenckiej Komisji ds. Otwartego Rządu
  i Administracji Cyfrowej. Rozmowy koncentrowały się na przedstawieniu polskich doświadczeń
  w zakresie cyfryzacji administracji publicznej i wzmacniania cyberbezpieczeństwa.
  Wiceminister Wojciech Zajączkowski oddał również hołd Barbarze i Andrzejowi Bobkowskim,
  składając kwiaty na ich grobie. W siedzibie Ministerstwa Spraw Zagranicznych Gwatemali
  wiceszef polskiej dyplomacji zainaugurował wystawę poświęconą twórczości Andrzeja
  Bobkowskiego – polskiego pisarza i eseisty, który w Gwatemali m.in. założył warsztat
  modelarski, wokół którego powstał klub miłośników modelarstwa.
