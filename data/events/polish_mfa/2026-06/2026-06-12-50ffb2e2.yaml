title: Deputy Prime Minister Radosław Sikorski takes part in debate "Europe, that's
  for sure”
text: “Europe, that’s for sure” is a series of debates on the continent’s challenges
  and future organised at the European Parliament Liaison Office in Warsaw. One of
  the discussions with high school pupils and university students, held on 12 June,
  was joined by Poland’s top diplomat Radosław Sikorski. Reinforcing the “Made in
  Europe” approach The participants agreed that the European Union is now facing unprecedented
  economic, technological, and geopolitical challenges. The discussion touched on
  reinforcing the “Made in Europe” approach which involves stronger support for European
  producers and suppliers in projects funded by the EU. It is also aimed at creating
  conditions favourable to investment, innovation, and industrial development within
  the European Union. One of our current threats is deindustrialisation under the
  pressure of lower energy prices in the United States and a massive, automated production
  and export preferences in China. These are real challenges - the head of Polish
  diplomacy said. To respond to these global threats, we need a stable, modern industry,
  capable of competing with the world’s largest economies. However, this requires
  member states’ full solidarity in drafting legislation that actually protects the
  EU market against unfair external competition. Disinformation, how to tackle it,
  and foreign interference in democratic processes were among the main topics of discussion.
  The foreign minister stressed that Russian information campaigns are supposed to
  undermine citizens’ trust in public institutions, the media, and international cooperation.
  For this reason, the European Union develops tools to protect the information space
  and reinforce the social resilience. The European Union should develop its defence
  identity in harmony with both NATO and the United States - minister Radosław Sikorski
  said. He added that this is why we are preparing the European Democracy Shield.
  It will aim to protect the integrity of public debate, support free and fair elections,
  and develop citizens’ media literacy. The debate offered the opportunity to emphasise
  that Poland actively supports European cooperation by building strong bilateral
  partnerships. Of particular importance are Poland’s relations with France that have
  entered a new phase in recent months, after the two countries signed the Treaty
  for Enhanced Cooperation and Friendship. The head of Polish diplomacy underlined
  that the cooperation under the Treaty includes security and defence, tapping the
  defence sector’s industrial potential, and intensifying exchange between politicians,
  experts, academics, and representatives of local government. The tightened alliance
  is also symbolised by the new Polish–French Friendship Day, celebrated on 20 April,
  and the new Bronisław Geremek Prize for fostering Polish–French relations.
