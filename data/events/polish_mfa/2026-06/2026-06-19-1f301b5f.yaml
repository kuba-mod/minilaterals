title: Deputy Prime Minister Radosław Sikorski visits London
text: Poland and the United Kingdom are linked by strategic political cooperation
  in security, defence, and the economy. Warsaw and London unequivocally support Ukraine’s
  sovereignty and territorial integrity. The ministers agreed that the war must end
  on terms grounded in international law. Our countries have a similar assessment
  of Russia and support maintaining international pressure until its aggression ends.
  By signing the Northolt Treaty last month, Brits and Poles have opened a new chapter
  in our relationship – one defined by closer cooperation in areas of security and
  defence. Both Poland and Britain understand the importance of military power under
  current circumstances. - Minister Sikorski emphasised during his visit. The head
  of Polish diplomacy also met with representatives of the Polish diaspora and Poles
  living in the United Kingdom. The Polish community constitutes an important element
  of bilateral relations between Poland and the UK. Our community actively participates
  in the UK’s economic, social, and cultural life, while remaining a vibrant bridge
  connecting both countries. Minister Sikorski stressed that Poland looks after the
  interests of its citizens abroad, and that their voices and experiences are an important
  component in shaping Poland’s foreign policy.
