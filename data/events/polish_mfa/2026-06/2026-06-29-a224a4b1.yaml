title: First-ever Polish-Swedish intergovernmental consultations
text: Deputy Prime Minister Radosław Sikorski and Minister Maria Malmer Stenergard
  spoke about Polish–Swedish relations, which they found particularly dynamic. Our
  relations have flourished based on our shared values and our exceptionally close,
  almost identical, perception of the challenges we are now facing in the region,
  Europe, and the world. Poland and Sweden understand each other without words. The
  chiefs of Polish and Swedish diplomacies also discussed top challenges to international
  security, including European defence, Russia’s aggression against Ukraine, the Middle
  East conflict, and cooperation on the Korean Peninsula. The European Union is one
  of the key dimensions of the Polish–Swedish strategic partnership. This is why MFA
  Undersecretary of State Artur Harazim and Sweden’s Minister for European Union Affairs
  Jessica Rosencrantz discussed cooperation within the EU in Gdynia. They reaffirmed
  that Poland and Sweden will work hard towards a European Union that is economically
  competitive, open to innovation, and on a par with global market players. Deputy
  Minister Harazim and Minister Rosencrantz also discussed the Multiannual Financial
  Framework and the EU Emissions Trading System (ETS). The deputy head of Polish diplomacy
  emphasised that the willingness to understand each other’s perspectives is also
  an important dimension of the Strategic Partnership. As demonstrated by the historically
  significant Polish–Swedish initiative of the Eastern Partnership, the Warsaw–Stockholm
  team is a recognizable brand within Brussels institutions. We commit to continuing
  dialogue and generating solutions needed for our countries and for Europe. - summarised
  Deputy Minister Artur Harazim. Parallel to the meeting on foreign affairs, talks
  were also held by the Prime Ministers of Poland and Sweden, Donald Tusk and Ulf
  Kristersson, along with representatives of other ministries. Deputy Foreign Minister
  Robert Kupiecki accompanied Prime Minister Tusk’s delegation as National Security
  Advisor. One of the most important points of the intergovernmental consultations
  was the signing of a contract for the purchase of three A26 submarines under the
  Orka programme, which opens a new chapter in military cooperation with Sweden. At
  the conclusion of the consultations, representatives of Poland and Sweden adopted
  a Joint Declaration and a Joint Statement on the Baltic Sea Pact, in which both
  countries agreed to deepen bilateral cooperation on security and defence in the
  Baltic Sea. Joint Statement of the Republic of Poland and the Kingdom of Sweden
  on the Baltic Sea Pact Polish–Swedish Intergovernmental Consultations— Joint Declaration
