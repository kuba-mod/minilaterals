title: Wspólne oświadczenie Rzeczypospolitej Polskiej i Republiki Federalnej Niemiec
  z okazji 35-tej rocznicy podpisania Traktatu o dobrym sąsiedztwie i przyjaznej współpracy
text: 'Polska i Niemcy są dzisiaj nie tylko sąsiadami i przyjaciółmi, ale też bliskimi,
  równoprawnymi partnerami i wiarygodnymi sojusznikami, trwale zakotwiczonymi w strukturach
  europejskich i euroatlantyckich. Po długim czasie podziałów i nieufności Traktat,
  stał się nie tylko ważnym elementem w procesie polsko-niemieckiego pojednania, ale
  także początkiem pogłębionej, pełnej zaufania współpracy na wszystkich płaszczyznach.
  Stworzone 35 lat temu ramy instytucjonalno-prawne umożliwiły bezprecedensowy rozwój
  współpracy polsko-niemieckiej, co zawdzięczamy przede wszystkim zaangażowaniu społeczeństw
  naszych krajów. Od tego czasu oba nasze państwa zasadniczo się zmieniły. Przede
  wszystkim jednak,  na skutek pełnoskalowego ataku Rosji na Ukrainę, fundamentalnie
  zmieniło się nasze otoczenie geopolityczne. Pomni tragicznej historii XX w. jako
  sojusznicy w NATO, partnerzy w UE ponosimy szczególną odpowiedzialność za nasz region
  i kontynent. Rosyjska agresja przeciwko Ukrainie postawiła nas w nowej rzeczywistości
  politycznej. Jest probierzem naszej odpowiedzialności i skuteczności. Wspólne zaangażowane
  we wzmocnienie bezpieczeństwa Europy to dziś geopolityczna konieczność. Polsko-niemiecki
  wkład w bezpieczeństwo wschodniej flanki jest tego dobrym przykładem. Z satysfakcją
  odnotowujemy zawarcie w dniu 17 czerwca br. nowej polsko-niemieckiej umowy o współpracy
  w dziedzinie obronności. Potwierdza to naszą determinację do podejmowania wspólnych
  działań. Polsko-niemieckie partnerstwo pozostaje filarem silnej, zjednoczonej Europy
  i wiarygodnego NATO. Agresywne działania Rosji, zwłaszcza o charakterze hybrydowym
  i dezinformacyjnym, wymierzone są także przeciwko nam. Mają na celu wywołanie podziałów
  społecznych, niszczenie porządku publicznego, podważanie zaufania do państwa i jego
  instytucji. Nie damy się zastraszyć. Będziemy skutecznie wzmacniać naszą odporność
  i edukować nasze społeczeństwa. Naszym nadrzędnym celem pozostaje ochrona europejskich
  wartości, w tym rządów państwa prawa i transparentnych procesów wyborczych, a wreszcie
  trwały i sprawiedliwy pokój na Ukrainie, wzmacniający bezpieczeństwo Europy. Poważnie
  traktujemy lekcję wynikającą z historii. „Nigdy więcej wojny” to nie jest puste
  hasło, lecz zobowiązanie wobec przyszłych pokoleń. W przeświadczeniu niemieckich
  win, uznajemy tragiczny rozdział naszej historii za wieczną przestrogę. 81 lat po
  zakończeniu II wojny światowej odchodzą ostatni świadkowie tamtych wydarzeń. Wierzymy,
  że historia może nie tylko dzielić, ale też łączyć. Do tego potrzeba wzajemnego
  wyczucia, wrażliwości, ale także konkretnych działań, w duchu wspólnego oświadczenia
  z 1 grudnia 2025 roku, które wykraczają poza sferę symbolicznych gestów. Z zadowoleniem
  odnotowujemy kolejne kroki na drodze do budowy w centrum Berlina pomnika poświęconego
  obywatelom polskim – ofiarom II wojny światowej i nazistowskiego terroru w latach
  1939–1945 i czekamy z niecierpliwością na wyniki konkursu pod koniec tego roku.
  Doceniamy dotychczasowe decyzje rządu federalnego na rzecz zwrotu do Polski zagrabionych
  dóbr kultury. Wkrótce powinny nastąpić kolejne. Nasza współpraca gospodarcza daje
  nam szczególne powody do satysfakcji. Obroty handlowe między Polską a Niemcami uległy
  w ostatnich dekadach zwielokrotnieniu. Niemcy zajmują 3 miejsce na liście największych
  gospodarek świata, Polska aspiruje do pierwszej 20-tki. Istotnie zmieniła się struktura
  i charakter naszych kontaktów handlowych. Przekłada się to na wspólny dobrobyt,
  powstawanie nowych miejsc pracy i rozwój więzi społecznych. Do pełnego uwolnienia
  potencjału społeczno-gospodarczego potrzebujemy nowych impulsów. Nasi przedsiębiorcy
  i obywatele czekają na rozwój infrastruktury transgranicznej i rozbudowę sieci komunikacyjnej.
  Zwiększy to nie tylko ich mobilność społeczną i ułatwi handel, ale też wzmocni nasz
  potencjał militarny. Opowiadamy się za rozbudową sieci partnerstw, zwłaszcza w tych
  obszarach, gdzie oba nasze kraje mają szczególnie dużo zaległości – od technologii
  podwójnego zastosowania po cyfryzację czy rozwój sztucznej inteligencji. Unia Europejska
  pozostaje osią naszej współpracy. Jej wzmocnienie i stabilność to nasz strategiczny
  interes. W tym duchu pragniemy wnosić wspólny wkład w kształtowanie przyszłości
  Unii Europejskiej. Nie mamy wątpliwości, że w obliczu narastających napięć Unia
  Europejska staje się dla nas kluczowym narzędziem służącym na poziomie globalnym
  ochronie i realizacji naszych interesów. Trójkąt Weimarski, podobnie jak Traktat,
  obchodzi w tym roku jubileusz 35-lecia. Jak żaden inny format uosabia on odzyskanie
  jedności i solidarności Europy. Jesteśmy zgodni, że Trójkąt Weimarski może nadal
  generować wspólne impulsy w polityce zagranicznej i europejskiej oraz wzmacniać
  spójność Unii Europejskiej. Z satysfakcją odnotowujemy w tym kontekście rozwój współpracy
  sektorowej. Optyka relacji polsko-niemieckich istotnie się zmieniła. Stoimy dzisiaj
  przed innymi wyzwaniami niż w 1991 roku. Polskę i Niemcy stać na więcej – stawką
  jest nasza wolność, bezpieczeństwo, dobrobyt. Jesteśmy odpowiedzialni za przyszłość
  – jako sąsiedzi, partnerzy, sojusznicy. Musimy zdać ten egzamin, budując przyszłość
  wzajemnych relacji: odpowiedzialnie, uczciwie i po partnersku i interesie całej
  Europy.'
