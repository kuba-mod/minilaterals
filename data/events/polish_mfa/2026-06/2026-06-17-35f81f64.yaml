title: Wicepremier Radosław Sikorski na Forum Polsko-Niemieckim w Berlinie
text: 'Rozmowa ministrów Radosława Sikorskiego i Johanna Wadephula koncentrowała się
  na polityce bezpieczeństwa i walce Ukrainy z rosyjskim agresorem. Szefowie dyplomacji
  omówili również relacje transatlantyckie, współpracę w ramach NATO, przyszłość i
  rozszerzenie Unii Europejskiej, a także sytuację na Bliskim Wschodzie. Rosyjska
  agresja przeciw Ukrainie jest sprawdzianem naszej odpowiedzialności i dalekowzroczności.
  Będziemy nadal wspierać Ukrainę i wzmacniać bezpieczeństwo nie tylko wschodniej
  flanki, ale wszystkich krajów Wspólnoty - zaznaczył Wicepremier Radosław Sikorski.
  Ważnym punktem rozmowy były relacje dwustronne, w tym współpraca obronna i kwestie
  historyczne. Minister Sikorski podkreślił także potrzebę rozbudowy połączeń infrastrukturalnych
  pomiędzy Polską i Niemcami. Polsko-niemiecka współpraca gospodarcza daje powody
  do satysfakcji. Poziom wymiany handlowej bije kolejne rekordy. Z obrotami na poziomie
  stu osiemdziesięciu miliardów euro za zeszły rok, Polska jest jednym z najważniejszych
  partnerów handlowych Niemiec. (…) Ale nie ukrywajmy – są i tematy trudne, jak to
  między sąsiadami. Ważne, że potrafimy o nich otwarcie rozmawiać. (…) W ciągu ostatnich
  30 lat przybył tylko jeden nowy most graniczny. Mimo że przez naszą granicę przepływa
  dziennie 500 milionów euro towarów - zwrócił uwagę szef polskiej dyplomacji. Ponadto
  ministrowie podpisali „ Wspólne oświadczenie Rzeczypospolitej Polskiej i Republiki
  Federalnej Niemiec z okazji 35-tej rocznicy podpisania Traktatu pomiędzy Rzecząpospolitą
  Polską i Republiką Federalną Niemiec o dobrym sąsiedztwie i przyjaznej współpracy
  ”. Spotkania i rozmowy podczas Forum wpisały się w kontekst rocznicy Traktatu o
  dobrym sąsiedztwie i przyjaznej współpracy, który został podpisany dokładnie 35
  lat wcześniej – w dniu 17 czerwca 1991 roku. Forum tradycyjnie stworzyło przestrzeń
  do dialogu dla przedstawicieli społeczeństwa obywatelskiego, ekspertów, środowisk
  biznesowych, świata kultury i nauki. W ramach wydarzenia odbyło się dziesięć paneli
  tematycznych w obszarach: gospodarka, bezpieczeństwo, społeczeństwo, edukacja, kultura,
  młodzież, polityka globalna, kultura pamięci, Europa, język. Dyskutowano m.in. o
  wzmacnianiu krajowych i europejskich zdolności obronnych, wsparciu dla Ukrainy,
  o właściwej odpowiedzi na długofalowe zagrożenie ze strony Rosji, a także o tym,
  jak wzmocnić Unię Europejską. Dużo uwagi poświęcono kwestiom istotnym w wymiarze
  dwustronnym: historii, nauczaniu języka polskiego w Niemczech i języka niemieckiego
  w Polsce, współpracy kulturalnej i edukacji. Tegoroczne Forum Polsko-Niemieckie
  zostało zorganizowane po raz drugi z rzędu przez Fundację Współpracy Polsko-Niemieckiej
  z inicjatywy Ministerstw Spraw Zagranicznych obu państw. Gospodarzem tegorocznej
  edycji była strona niemiecka. „Sąsiedztwo w czasach zmian. 35 lat współpracy polsko-niemieckiej”
  jako hasło przewodnie Forum nawiązywało do przypadającej dokładnie tego dnia 35.
  rocznicy podpisania Traktatu między Rzecząpospolitą Polską a Republiką Federalną
  Niemiec o dobrym sąsiedztwie i przyjaznej współpracy z 17 czerwca 1991 r. Forum
  zainaugurowali dyrektor generalna MSZ i przewodnicząca Rady ds. Współpracy z RFN
  Henryka Mościcka-Dendys oraz Knut Abraham, koordynator ds. współpracy międzyspołecznej
  i przygranicznej z Polską. Dyrektor generalna MSZ i koordynator uczestniczyli w
  dyskusji pod hasłem „35 lat Traktatu o dobrym sąsiedztwie – Czas na nowy rozdział
  w stosunkach polsko niemieckich?”. Wspólnie podsumowali także jeden z paneli Forum
  poświęcony roli społeczeństwa obywatelskiego w stosunkach dwustronnych. Podczas
  Forum wystąpili również szefowie dyplomacji Polski i Niemiec, Radosław Sikorski
  i Johann Wadephul. Zobacz transmisję: FORUM POLSKO-NIEMIECKIE 2026 „Sąsiedztwo w
  czasach zmian" W wydarzeniu uczestniczyła również ministra kultury i dziedzictwa
  narodowego Marta Cienkowska.  Podczas Forum strona niemiecka zwróciła bezcenne dla
  polskiego dziedzictwa dobra kultury - Pierścień Króla Zygmunta Starego, miniatury
  kolejowe, Gaude Mater Polonia. Podczas Forum Polsko-Niemieckiego ministrowie Radosław
  Sikorski i Johann Wadephul wręczyli Nagrodę za Szczególne Zasługi dla Rozwoju Stosunków
  Polsko-Niemieckich. Z rekomendacji Komitetu Nagrody Polsko-Niemieckiej tegorocznymi
  laureatami zostali Janusz Reiter – za szczególne zasługi w budowaniu dialogu między
  Polską a Niemcami oraz Słubicko-Frankfurckiego Centrum Kooperacji - za zaangażowanie
  we współpracę transgraniczną oraz rozwój kontaktów społecznych. W tym szczególnym
  roku, 35. rocznicy podpisania Traktatu między Polską a Niemcami, jury podjęło decyzję
  o uhonorowaniu Janusza Reitera, człowieka instytucji dla relacji polsko-niemieckich.
  Dzięki swojemu zaangażowaniu zarówno w roli dziennikarza, jak i dyplomaty, odegrał
  kluczową rolę w budowaniu partnerskich stosunków między naszymi krajami - podsumowała
  wybór współprzewodnicząca Komitetu M. Ławrowska-von Thadden. Celem Nagrody Polsko-Niemieckiej
  jest wyróżnianie osób, instytucji i organizacji, które w sposób szczególny przyczyniają
  się do zacieśniania i rozwijania współpracy między oboma państwami, promując wzajemne
  porozumienie oraz wspierając dialog między naszymi społeczeństwami. Forum Polsko-Niemieckie
  stanowi płaszczyznę wymiany opinii na tematy istotne z punktu widzenia stosunków
  dwustronnych i polityki międzynarodowej. Powołane zostało w 1976 roku, a jego znaczenie
  potwierdzone zostało w Traktacie między Rzecząpospolitą Polską i Republiką Federalną
  Niemiec o dobrym sąsiedztwie i przyjaznej współpracy z 17 czerwca 1991 r. Organizowane
  jest na przemian w Polsce i w Niemczech i finansowane na zmianę przez Ministerstwa
  Spraw Zagranicznych obu państw. W tym roku gospodarzem była strona niemiecka. Nagroda
  Polsko-Niemiecka „za szczególne zasługi dla rozwoju stosunków polsko-niemieckich”
  została ustanowiona na podstawie Traktatu o dobrym sąsiedztwie i przyjaznej współpracy
  między Rzecząpospolitą Polską i Republiką Federalną Niemiec, podpisanego 17 czerwca
  1991 r. Janusz Reiter to dyplomata, publicysta i analityk. Jako ambasador RP w Niemczech
  w latach 1990-1995 uczestniczył w tworzeniu podstaw traktatowo-instytucjonalnych
  dla relacji polsko-niemieckich. W 1996 r. założył Centrum Stosunków Międzynarodowych,
  think-tank podejmujący tematy polityki zagranicznej i bezpieczeństwa. Ceniony autor
  artykułów, komentarzy zamieszczanych w prasie i mediach elektronicznych w Polsce
  i w Niemczech. Wskazuje w nich na znaczenie partnerskich relacji polsko-niemieckich
  dla stabilności i bezpieczeństwa w regionie. Podkreśla, że współpraca między oboma
  państwami jest kluczowa dla przyszłości Europy. Słubicko-Frankfurckie Centrum Kooperacji
  to wspólne przedsięwzięcie miast pogranicza Słubic oraz Frankfurtu nad Odrą realizowane
  od 2011 roku. Projekty adresowane do lokalnych społeczności dotyczą takich dziedzin
  jak kultura, turystyka, ochrona środowiska, rozwój miejski. Wśród ostatnich inicjatyw
  można wyróżnić cykl dyskusji i spotkań „Doświadczenia graniczne”, którego tematem
  pozostaje przeciwdziałanie dezinformacji, wzmacnianie demokracji i postaw obywatelskich.'
