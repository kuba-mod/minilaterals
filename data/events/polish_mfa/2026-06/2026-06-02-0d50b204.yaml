title: Wiceminister Artur Harazim na II Forum Kościuszkowskim
text: 'W wydarzeniu udział wzięli pracownicy kierownictwa MSZ, Miasta Gdańska oraz
  przedstawiciele białoruskich sił demokratycznych, w tym łącząca się zdalnie liderka
  białoruskich środowisk demokratycznych Swiatłana Cichanouska. Kultura nie jest uzupełnieniem
  polityki, lecz fundamentem, bez którego budowla demokratyczna nie może przetrwać.
  Bez tożsamości demokracja jest tylko pustą formą, którą łatwo wypełnić populizmem
  skrojonym na potrzeby autorytaryzmu powiedział podsekretarz stanu MSZ Artur Harazim.
  Uczestnicy konferencji dyskutowali wokół hasła „Kultura - siłą demokracji”, a w
  centrum uwagi znalazła się kultura białoruska. W panelach udział wzięli przedstawiciele
  środowisk twórczych, organizacji pozarządowych, niezależnych mediów i ośrodków badawczych.
  Pełen program wydarzenia dostępny jest tutaj: https://ecs.gda.pl/wydarzenia/forum-kosciuszkowskie-kultura-sila-demokracji/'
