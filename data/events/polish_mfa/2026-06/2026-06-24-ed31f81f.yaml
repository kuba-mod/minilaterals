title: Prezentacja „Strategii polskiej polityki zagranicznej na lata 2026-2030” dla
  Dyplomatów państw NATO i Indo-Pacyficznej Czwórki
text: 'Strategia - przyjęta przez rząd Polski i opublikowana na początku 2026 roku
  - była podstawą do dyskusji na temat najważniejszych wyzwań dla współpracy europejskiej,
  transatlantyckiej oraz w regionie Indo-Pacyfiku. Uczestnicy spotkania wymienili
  też opinie na temat średnio- i długoterminowych priorytetów polskiej polityki zagranicznej
  w wymiarach: geostrategicznym, politycznym i ekonomicznym. Zaproszeni dyplomaci
  byli zainteresowani także metodologią opracowania i sposobem implementacji Strategii.
  Podczas spotkania kierownictwo Departamentu Strategii podkreślało wartość współpracy
  z partnerami. Budowanie zaufania i przewidywalność partnerów współpracy międzynarodowej
  nabiera dziś szczególnej wartości. Dlatego istnieje potrzeba identyfikacji obszarów
  odpowiedzialnej i przewidywalnej współpracy z partnerami, którzy budują przestrzeń
  pokoju i bezpieczeństwa - mówił zastępca dyrektora, kierujący Departamentem Strategii
  Łukasz Pawłowski. W spotkaniu udział wzięli przedstawiciele ponad trzydziestu placówek
  dyplomatycznych w Warszawie oraz Zespół Departamentu Strategii MSZ. Dyskusję poprzedziła
  prezentacja dokumentu „Strategia polskiej polityki zagranicznej na lata 2026-2030”
  przedstawiona przez kierownictwo Departamentu Strategii MSZ.'
