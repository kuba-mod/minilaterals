title: Wicepremier Radosław Sikorski z wizytą w Londynie
text: Polskę i Zjednoczone Królestwo łączy strategiczna współpraca polityczna w obszarze
  bezpieczeństwa, obronności i gospodarki. Warszawa i Londyn jednoznacznie popierają
  suwerenność i integralność terytorialną Ukrainy. Wojna musi zakończyć się na warunkach
  opartych w prawie międzynarodowym. Nasze państwa podobnie oceniają Rosję i popierają
  utrzymanie presji międzynarodowej aż do zakończenia agresji. Podpisując w zeszłym
  miesiącu Traktat z Northolt, Brytyjczycy i Polacy otworzyli nowy rozdział w naszych
  stosunkach – rozdział charakteryzujący się ściślejszą współpracą w dziedzinie bezpieczeństwa
  i obrony. Zarówno Polska, jak i Wielka Brytania rozumieją znaczenie siły militarnej
  w obecnych okolicznościach - podkreślił podczas wizyty Wicepremier Radosław Sikorski.
  Szef polskiej dyplomacji spotkał się także z reprezentantami Polonii i Polaków mieszkających
  w Wielkiej Brytanii. Polska diaspora stanowi istotny element relacji dwustronnych
  między Polską a Wielką Brytanią. Nasza społeczność aktywnie uczestniczy w życiu
  gospodarczym, społecznym i kulturalnym Zjednoczonego Królestwa, pozostając jednocześnie
  żywym pomostem łączącym oba kraje. Minister Sikorski podkreślił, że Polska dba o
  interesy swoich obywateli i Rodaków za granicą, a ich głos i doświadczenia są ważnym
  elementem kształtowania polskiej polityki zagranicznej.
