title: Komunikat Ministerstwa Spraw Zagranicznych RP
text: Wyrażamy głęboką satysfakcję, że sprawa znalazła pozytywne rozwiązanie. Dziękujemy zaangażowanym
  w działania na rzecz rozwiązania tej kwestii, w szczególności naszym sojusznikom,
  partnerom z Unii Europejskiej oraz instytucjom po stronie libijskiej, które przyczyniły
  się do osiągnięcia tego rezultatu. Jednocześnie przypominamy, że ze względu na utrzymującą
  się niestabilną sytuację bezpieczeństwa Ministerstwo Spraw Zagranicznych od wielu
  lat stanowczo odradza wszelkie podróże do Libii. Apelujemy do obywateli polskich
  o śledzenie aktualnych komunikatów i ostrzeżeń dla podróżnych publikowanych przez
  MSZ oraz o stosowanie się do wydawanych zaleceń.
