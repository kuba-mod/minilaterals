title: Sekretarz Stanu Ignacy Niemczycki z wizytą w Atenach
text: Wiceministrowie spraw zagranicznych Polski i Grecji omówili relacje dwustronne
  oraz w ramach Unii Europejskiej oraz NATO. Oba państwa mają podobne podejście do
  spraw bezpieczeństwa, stabilności regionu Bałkanów Zachodnich, rozszerzenia oraz
  ochrony granic zewnętrznych UE. W trakcie spotkania ministrowie podkreślili strategiczne
  znaczenie Polski i Grecji jako krajów stanowiących filary logistycznego i politycznego
  wsparcia dla walczącej Ukrainy. Wiceminister Niemczycki podkreślił, że konieczne
  jest dalsze wywierania presji na agresora, m.in. za pomocą sankcji. Strona grecka
  zadeklarowała poparcie dla kolejnych pakietów sankcyjnych, jednocześnie zwracając
  uwagę na problemy z ich implementacją. Ministrowie wyrazili również nadzieję na
  przełom w drodze Ukrainy do Unii Europejskiej. Wiceminister Niemczycki przedstawił
  też stanowisko Polski w sprawie Wieloletnich Ram Finansowych na lata 2028-2034.
  Podkreślił pozytywną rolę współpracy z Grecją w formacie Grupy Przyjaciół Spójności.
  Ponadto odniósł się do propozycji Industrial Accelerator Act. Według Polski należy
  zadbać, aby zawarte w dokumencie kryterium emisyjne nie powodowało podziałów na
  rynku wewnętrznym UE. Wiceministrowie omówili również najważniejsze priorytety greckiej
  prezydencji w Radzie UE, która przypada na drugą połowę 2027 roku. Podczas wizyty
  w Grecji wiceminister Niemczycki otworzył wspólnie z sekretarzem generalnym ds.
  międzynarodowych relacji gospodarczych Republiki Greckiej Dimitrisem Skalkosem seminarium
  Energy Security and Critical Infrastructure in the Baltic and Mediterranean Maritime
  Space - Mutual Risk, Mutual Resilience, czyli seminarium na temat bezpieczeństwa
  energetycznego oraz morskiej infrastruktury krytycznej. Wydarzenie zostało zorganizowane
  przez Ambasadę RP w Atenach w ramach polskiej prezydencji w Radzie Państw Morza
  Bałtyckiego.
