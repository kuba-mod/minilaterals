title: Wicepremier Radosław Sikorski w Sejmie na konferencji „Wojna o umysły. Strach,
  dywersja, dezinformacja”
text: 'Obok wicepremiera Sikorskiego w konferencji uczestniczyli przedstawiciele administracji
  rządowej, środowiska naukowego oraz eksperci zajmujący się problematyką bezpieczeństwa
  informacyjnego, dezinformacji i odporności państwa na działania hybrydowe. Szef
  polskiej dyplomacji zauważył w swoim wystąpieniu „Europa w cieniu wojny", że Rosja
  toczy przeciwko Polsce pełnoskalową wojnę kognitywną. Z perspektywy Kremla jest
  to wojna z Zachodem. Wymierzona w nasze sojusze. Mająca zniszczyć podstawy sukcesu
  nie tylko Polski, ale całego naszego regionu – powiedział wicepremier Radosław Sikorski
  i jednocześnie zwrócił uwagę na to, ile pieniędzy Rosja przeznacza na machinę propagandową.
  W 2025 r. Rosja wydała na propagandę rekordowe sumy: około 1,4 miliarda (!) dolarów.
  To ponad 118 milionów dolarów – czyli mniej więcej pół miliarda złotych – miesięcznie.
  Od początku pełnoskalowej inwazji na Ukrainę Rosja wydała łącznie ponad 6 miliardów
  dolarów na aparat propagandowy – zauważył minister spraw zagranicznych Radosław
  Sikorski. Szef polskiej dyplomacji podkreślił, że Rosja, która wpisała wojnę kognitywną
  do swojej doktryny, nie ukrywa celów: siać zamęt, osłabiać wolę oporu oraz godzić
  w wartości demokratyczne. Za sprawą sztucznej inteligencji prowadzenie operacji
  dezinformacyjnych jest dziś tańsze i szybsze niż kiedykolwiek w historii. Prawo
  nie może pozostawać w tyle za technologią – musi dać konkretną odpowiedź na pełne
  spektrum współczesnych zagrożeń cyfrowych – stwierdził wicepremier Radosław Sikorski.
  W opinii ministra spraw zagranicznych świat Zachodu musi na to odpowiedzieć: adekwatnie
  nowelizować prawo, aby skutecznie reagować na pełne spektrum współczesnych zagrożeń
  cyfrowych, w tym rozwój sztucznej inteligencji. W swoim wystąpieniu minister Radosław
  Sikorski podkreślił także zagrożenie, jakim jest dezinformacja w mediach społecznościowych
  oraz istota współpracy z młodym pokoleniem. Przywołał pozytywny przykład takiej
  współpracy - Młodą Radę Odporności przy MSZ. Minister zaznaczył, że tego typu inicjatyw
  powinno powstawać więcej. Czytaj więcej o Młodej Radzie Odporności przy MSZ: https://www.gov.pl/web/dyplomacja/iv-posiedzenie-28-kwietnia-2026'
