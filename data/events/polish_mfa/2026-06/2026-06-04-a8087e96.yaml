title: Third round of Polish-Guatemalan political consultations
text: The deputy ministers underlined the importance of cooperating to protect the
  principles of international law in the face of contemporary challenges, such as
  revisionism and power politics. Deputy Minister Zajączkowski presented the priorities
  of the Polish foreign policy and the prospects of expanding bilateral cooperation
  to cover such areas as green technologies, digitalisation of public services, border
  protection, and cybersecurity. The Guatemalan side expressed interest in Polish
  IT solutions and the Polish fertiliser industry. Veterinary issues were also discussed.
  The partners announced the approval of the model health certificate for milk and
  milk products exported from Poland to Guatemala, which presents new opportunities
  for Polish exporters. Scientific and academic cooperation was also high on the agenda.
  Deputy heads of diplomacy discussed the development of cooperation in the field
  of archaeology and the participation of Guatemalan students in Erasmus+ projects.
  They also exchanged views on the most important regional and global issues, including
  the war in Ukraine and the security situation in the Caribbean. The Polish delegation
  met with representatives of the National Sectretariat of Science and Technology
  and the Presidential Commission for Open and Electronic Government. The talks focused
  on sharing Polish experiences of digitalising the public administration and strengthening
  cybersecurity. Moreover, Deputy Minister Wojciech Zajączkowski paid tribute to Barbara
  Bobkowska and Andrzej Bobkowski by laying flowers on their grave. At the Guatemala’s
  Ministry of Foreign Affairs, the deputy head of Polish diplomacy opened an exhibition
  on the work of Andrzej Bobkowski, a Polish writer and essayist who, among other
  initiatives, set up a model-making workshop in Guatemala, which laid the foundation
  of a model-making club.
