title: TVP rozszerza zasięg mediów dla odbiorców Europy Wschodniej
text: 'Telewizja Polska rozszerza dostępność zagranicznych pasm językowych. Kanały
  Biełsat, Slawa TV oraz Vot Tak dołączają do międzynarodowego pakietu satelitarnego
  „Svoboda”, zarządzanego przez organizację „Reporterzy bez Granic”. Projekt ma na
  celu zapewnienie odbiorcom dostępu do niezależnych informacji w regionach, gdzie
  wolność mediów jest ograniczana. Pakiet „Svoboda” dociera do ponad 4,5 mln gospodarstw
  domowych w Rosji oraz około 800 tys. gospodarstw na terytoriach okupowanych. W Europie
  jego zasięg obejmuje około 18 milionów gospodarstw domowych, a sygnał dostępny jest
  również w krajach Afryki Północnej i na Bliskim Wschodzie. Przeniesienie kanałów
  TVP na nową platformę transmisyjną oznacza znaczące zwiększenie ich dostępności
  dla odbiorców w Europie Zachodniej, w tym licznych diaspor białoruskiej, ukraińskiej
  i rosyjskiej. Dzięki wykorzystaniu popularnej pozycji satelitarnej Hot Bird (pozycja
  13E) programy będą mogły być odbierane przez użytkowników indywidualnych oraz operatorów
  telewizji satelitarnej w wielu krajach Europy. Jak podkreśla Michał Broniatowski,
  dyrektor Ośrodka Mediów dla Zagranicy TVP: Wejście TVP World na satelitę pozwoli
  nam dotrzeć do znacznej grupy nowych odbiorców, którzy preferują oglądanie kanałów
  telewizyjnych w tradycyjny sposób. Zyskają dostęp do newsów oraz programów dotyczących
  Polski i Europy Środkowo-Wschodniej, przygotowywanych przez międzynarodowy zespół
  Ośrodka Mediów dla Zagranicy. Jest to jedyny tak sformatowany anglojęzyczny kanał
  informacyjny w Europie. Dostęp do rzetelnych i ekskluzywnych materiałów informacyjnych
  jest szczególnie ważny w obecnej sytuacji międzynarodowej oraz w czasach zalewu
  dezinformacji i propagandy. Projekt „Svoboda” został uruchomiony przez „Reporterów
  bez granic” jako odpowiedź na ograniczanie wolności słowa i dostępu do niezależnych
  źródeł informacji. W skład pakietu wchodzą kanały telewizyjne i stacje radiowe tworzone
  przez niezależnych dziennikarzy z Ukrainy, Białorusi i Rosji.'
