title: Deputy Minister Władysław Teofil Bartoszewski visits Mongolia
text: The deputy ministers reviewed the Action Plan for Comprehensive Partnership
  between the Republic of Poland and Mongolia for the 2025–2030 period. They also
  discussed current bilateral issues, regional and global affairs, as well as organisation
  of planned high-level visits. The two diplomats underlined their respective governments’
  engagement in the development of bilateral relations in all sectors, especially
  in the food and defence industries, mining, agriculture, IT, green technologies,
  healthcare, pharmaceuticals, renewable energy, infrastructure, as well as urban
  modernisation and transport. Deputy foreign ministers discuss security The deputy
  head of Poland’s diplomacy took part in Ulaanbaatar Dialogue on Security, held regularly
  on the initiative of Mongolia’s MFA and the National Security Council of Mongolia,
  where representatives of the countries of the region discuss current regional and
  international security challenges. During his speech, Deputy Minister Bartoszewski
  said that “the top priority for Poland—which, like Mongolia, also enjoys a unique
  geographical location—is national security, which is currently threatened by the
  war raging just beyond our eastern border, the responsibility for the outbreak of
  which and the associated casualties lies with Russia and its imperialist policy
  of domination in regions considered by Moscow to be its sphere of influence.” EUR
  50 million on development Deputy Minister Bartoszewski also held a meeting at Mongolia’s
  Ministry of Finance, during which signed alternates were exchanged of an Annex to
  the Tied Aid Credit Agreement made between the Government of the Republic of Poland
  and the Government of Mongolia in Ulaanbaatar on 9 May 2017. Under the Agreement,
  the Polish government granted the Mongolian government a preferential credit of
  EUR 50 million to finance projects related to the modernisation of agriculture,
  infrastructure, education, environmental protection, and health care. The parties
  decided that the remaining uncontracted amount of EUR 9.8 million be used to complete
  the projects already underway. Prospects for Polish companies Deputy Minister Bartoszewski
  also visited the Ministry of Urban Development, Construction and Housing, where
  projects run by Polish companies were elaborated on. During his visit in the Ministry
  of Industry and Mineral Resources, the geological cooperation was summarised and
  the prospects for the development of Polish companies’ activities in the Mongolian
  market in the field of natural resources extraction and the export of mining machinery
  were discussed. Cooperation for the historical truth A delegation from the Institute
  of National Remembrance, led by Karol Polejowski, PhD, Deputy President of the Institute,
  which accompanied the political consultations, signed a Memorandum of Understanding
  with the State Commission for the Management of Political Rehabilitation of Mongolia.
  Both institutions have committed to strengthening their cooperation by sharing knowledge,
  experience, and best practices as part of efforts to preserve historical truth about
  political repression and to promote human rights and democratic values. As part
  of their cooperation, the two institutions have launched talks on a project to commemorate
  the support provided by the democratic opposition in Poland for democratic reforms
  in Mongolia in the early 1990s.
