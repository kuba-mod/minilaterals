title: Poland-China Strategic Dialogue
text: While in Beijing, Deputy Minister Władysław Teofil Bartoszewski underlined the
  fundamental importance of political dialogue on different levels, including by heads
  of state and government. He hoped for this year’s successful high-level visit on
  the 10th anniversary of the comprehensive strategic partnership between Poland and
  China. During the Strategic Dialogue, the interlocutors agreed that Polish–Chinese
  relations should reflect the geopolitical and economic realities. The deputy head
  of Polish diplomacy thanked the Chinese side for supporting Poland’s participation
  in the work of the G20. EU–China relations The Strategic Dialogue also covered international
  issues such as Russia’s aggression against Ukraine, security situation in East Asia,
  and the EU–China relations.  Deputy Minister Bartoszewski stressed that the international
  community has been experiencing changes which call for joint action on fundamental
  matters such as the protection of the international law, insisting on the sovereignty
  and territorial integrity of states, and the inviolability of their borders. He
  highlighted Poland’s support for China’s multidimensional dialogue within the framework
  of the EU–China strategic partnership. Polish chapter in Harbin’s history After
  the talks in Beijing, Deputy Minister Bartoszewski visited Harbin, a major city
  in north-eastern China with particularly close historical ties to Poland. The talks
  with the vice governor of the Heilongjiang province and deputy mayor of Harbin featured
  possible ways to commemorate Poles’ contribution to the development of the city.
  In fact, it was a Polish engineer, Adam Szydłowski, who decided to build the metropolis
  in place of a small Manchurian village in 1898 and became its first mayor. Trade
  in agri-food products Before the end of the deputy foreign minister’s visit to China,
  a document was signed setting out the rules for the export of Polish poultry meat
  to China. A related protocol was signed at the same time in Warsaw by Minister of
  Agriculture and Rural Development Stefan Krajewski and China’s Ambassador to Poland
  Lu Shan, who acted on behalf of the head of General Administration of Customs of
  China (GACC). This offers hope for an increase in and a better balance of bilateral
  trade in agri-food products. It also marks the culmination of two years of efforts
  by heads of state, relevant institutions, and diplomatic services.
