title: Polish-French consultations in Warsaw
text: Deputy Minister Harazim and Secretary-General Briens welcomed the results of
  the Polish–French Intergovernmental Summit held in Gdańsk on 20 April . They declared
  their willingness to enhance the strategic partnership through, among other things,
  developing joint economic, defence, energy, and social and cultural projects. Undersecretary
  of State Harazim noted the growing Polish investments in France, encouraging the
  partners to learn about what Poland has to offer as regards its defence industry
  and digital transition solutions, and to take part in planned investments, including
  infrastructural ones. Taking stock of the Ukraine Recovery Conference in Gdańsk
  was an important item on the consultations agenda. The interlocutors agreed that
  arrangements made during the event are crucial for Ukraine. The talks also focused
  on major European Union topics, including the ongoing work on the future Multiannual
  Financial Framework and the EU enlargement process. The deputy ministers also discussed
  the situation in the Middle East. The officials welcomed the joint Polish–French
  cultural season that will take place from February to October 2027, bringing together
  artists and the public from both countries. They also noted with satisfaction the
  ever-closer cooperation between the Polish and French foreign ministries.
