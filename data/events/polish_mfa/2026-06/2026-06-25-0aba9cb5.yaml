title: Wicepremier, Minister Spraw Zagranicznych Radosław Sikorski na Konferencji
  Odbudowy Ukrainy w Gdańsku
text: 'W Konferencji, której celem była mobilizacja międzynarodowego wsparcia na rzecz
  odbudowy Ukrainy, wzięło udział ponad 5 000 uczestników, w tym ponad 50 delegacji
  wysokiego szczebla państw z całego świata, organizacji międzynarodowych, instytucji
  Unii Europejskiej, a także przedstawicieli biznesu, samorządów i organizacji pozarządowych.
  Uczestnicy dyskutowali w pięciu wymiarach tematycznych: biznesowym, społecznym,
  lokalnym i regionalnym, unijnym, a także bezpieczeństwa i obrony. Wicepremier Radosław
  Sikorski wziął udział w panelu otwierającym wymiar unijny, gdzie zaakcentował, że
  w ślad za historycznym momentem, jakim było otwarcie formalnego procesu negocjacji
  członkostwa Ukrainy w Unii Europejskiej 15 czerwca, musi iść realny wysiłek w kierunku
  spójności z prawem, zasadami i standardami UE. Tak naprawdę to nie są negocjacje,
  to przejęcie dorobku Unii Europejskiej i dostosowanie się kandydatów do reguł klubu,
  do którego chcą wejść W dyskusji prowadzonej przez Orysię Łucewycz, szefową Ukraine
  Forum, obok szefa polskiej dyplomacji, udział wzięli również Taras Kaczka, Wicepremier
  Ukrainy ds. integracji europejskiej i euroatlantyckiej oraz Marta Kos, Komisarz
  UE ds. rozszerzenia. W rozmowie poruszono także temat niezbędnych reformach, jakie
  Ukraina musi przeprowadzić na ścieżce integracji, w szczególności w zakresie praworządności
  i walki z korupcją, a także tematykę integracji z jednolitym rynkiem, transformacji
  energetycznej czy reformy administracji publicznej. Konferencja była okazją do spotkań
  dwustronnych wicepremiera Sikorskiego z partnerami z całego świata w celu zacieśnienia
  relacji gospodarczych i dyplomatycznych, m.in. z Ministrem Spraw Zagranicznych Azerbejdżanu
  Dżejhunem Bajramowem oraz Minister Stanu ds. Współpracy Międzynarodowej Zjednoczonych
  Emiratów Arabskich Reem Al-Hashimy, z którymi rozmawiał o m.in. o współpracy bilateralnej,
  wsparciu dla Ukrainy oraz znaczeniu porozumienia USA-Iran dla stabilności regionu
  oraz przyszłości państw Zatoki Perskiej. Szef polskiej dyplomacji spotkał się również
  ze swoją odpowiedniczką z Wielkiej Brytanii Yvette Cooper, z którą rozmawiał m.in.
  o sytuacji w Ukrainie, na Bliskim Wschodzie oraz przygotowaniach do szczytu NATO
  w Ankarze. Wicepremier Sikorski rozmawiał także z Sekretarzami Generalnymi OBWE
  Feridunem Sinirlioğlu oraz OECD Mathiasem Cormannem, podkreślając konieczność zachowania
  europejskiej solidarności w zakresie wsparcia Ukrainy w jej wojnie z Rosją.'
