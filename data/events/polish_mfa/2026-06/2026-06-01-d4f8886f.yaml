title: Geopolitical challenges discussed in Barcelona
text: 'In Barcelona, the foreign ministers discussed European security, most of all
  in the context of Russia’s aggression against Ukraine. They emphasised the need
  for Poland and Spain to enhance their cooperation, not only bilaterally or within
  the European Union, but also within NATO. Also discussed were Poland–Spain relations.
  The officials noted the robust economic relationship. In 2025, trade between Poland
  and Spain reached record levels, in excess of EUR 19 billion, and last year it saw
  a 6% increase. The ministers took part together in a conference hosted by the Spanish
  think-tank Cercle d’Economia, appearing on a panel on the geopolitical challenges
  of the war in Ukraine and Europe’s strategic autonomy. Minister Sikorski stressed
  that the Ukraine war poses a fundamental threat, especially for eastern flank countries.
  He went to argue, however, that Europe should not be panicky about Russia’s aggression.
  We thought [Putin] had the second army in the world. He thought he had the second
  army in the world. He, in fact, has the second army in Ukraine. And they are beginning
  not only to lose ground, they are suffering casualties that are bigger than what
  they recruit. And they are now losing control over some vital logistical lines,
  such as the M14 highway from Donbass to Crimea,” said Deputy Prime Minister Sikorski,
  adding that 20–30% of Russia’s refining capacity is knocked out and that the Russian
  economy is truly beginning to suffer. Minister Albares agreed that nothing about
  the frontline reality seems to show that Putin gets stronger or makes gains from
  his aggression. We cannot allow the aggressor and the war of aggression to succeed,
  reap benefit or take profit. That would be contrary to what the European project
  has always been. The European project is a peaceful one. It is a project that rejects
  an approach whereby the war can be an instrument of foreign policy, The head of
  Spanish diplomacy emphasised that peace and respect for international law are the
  principles to abide by in Ukraine as well as the Gaza Strip, Lebanon, and Iran.
  The ministers also discussed the future of the European Union and its guiding principles,
  such as unanimity. On sanctions, we should not be the hostage of one country blocking
  everything under the influence of a third country from outside. So, personally,
  I don''t think that unanimity is the only expression of democracy. In our parliaments,
  we don''t vote by unanimity, When a particular country’s national interest is at
  stake, I find it absolutely normal for that country to use its right to veto in
  defence of its vital interests. That’s what unanimity is for. But let me be very
  frank: I have always objected to a country’s use of veto not in defence of its own
  national interest but only to hinder the progress of others or win concessions in
  completely different, domestic matters. When talking about economy and security,
  Minister Albares pointed out that a uniform capital market should be built in Europe,
  while European savings should be spent on Europe’s original ideas and innovations.
  Spain’s foreign minister also said that European security implies strengthening
  NATO’s European pillar. Deputy Prime Minister Radosław Sikorski’s visit to Barcelona
  and convergence of opinions with Minister José Albares confirmed that in spite of
  their geographical remoteness, Poland and Spain remain key partners in shaping the
  future of Europe. Joint engagement in helping Ukraine, increasingly closer cooperation
  in the NATO structures, and dynamically growing trade are a solid foundation for
  the continued development of a strong and united Community. Founded in the 1950s,
  Cercle d’Economia is a Spanish think tank that brings together more than 1,300 members.
  Its Annual Meetings are a space for meeting, debate, and proposals on the most important
  problems and challenges faced by Spain, Europe, and the world. This year’s session
  features King Felipe VI of Spain and Spanish Prime Minister Pedro Sánchez among
  the invitees.'
