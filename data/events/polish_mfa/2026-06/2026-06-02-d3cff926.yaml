title: Wiceminister Wojciech Zajączkowski z wizytą w Meksyku
text: Podczas konsultacji w dniach 1 i 2 czerwca, wiceminister Wojciech Zajączkowski
  spotkał się także ze swoją odpowiedniczką – wiceszefową dyplomacji Meksyku Maríą
  Teresą Mercado. Wiceministrowie omówili perspektywy współpracy dwustronnej w takich
  dziedzinach, jak nowe technologie i cyberbezpieczeństwo. Przedyskutowano współpracę
  gospodarczą i inwestycyjną oraz istniejące bariery weterynaryjne i fitosanitarne.
  Wiceszefowie dyplomacji zgodzili się, że zawarta w maju br. Zmodernizowana Umowa
  Globalna UE-Meksyk stwarza dodatkowe szanse dla przedsiębiorców obu państw. Zwrócono
  uwagę na konieczność wzmocnienia współpracy w obszarze zwalczania przestępczości
  zorganizowanej. Kwestie wielostronne, w tym reforma ONZ, wojna w Ukrainie oraz sytuacja
  na Bliskim Wschodzie i w basenie Morza Karaibskiego, zdominowały drugą część konsultacji.
  Omówiono także przygotowania do obchodów 100-lecia nawiązania stosunków dyplomatycznych,
  które przypadną na rok 2028. Podczas wizyty w Meksyku wiceminister Wojciech Zajączkowski
  wygłosił również wykład na temat polskiej polityki wobec Ameryki Łacińskiej w Instytucie
  Matíasa Romero - ośrodku szkoleniowym i analitycznym meksykańskiego MSZ. Wspólnie
  z przewodniczącą Parlamentarnej Grupy Przyjaźni Meksykańsko-Polskiej, deputowaną
  Maríą Angélicą Granados Trespalacios, zainaugurował w Senacie wystawę Camas vacías
  („Puste łóżka”), poświęconą problemowi nielegalnych deportacji i przymusowych przesiedleń
  ukraińskich dzieci przez Rosję. Ponadto wiceminister spotkał się z Polonią i polskimi
  przedsiębiorcami działającymi w Meksyku. W 2025 r. Meksyk był drugim partnerem Polski
  w regionie Ameryki Łacińskiej i Karaibów i największym rynkiem dla polskiego eksportu
  (1,87 mld USD).
