title: Polsko-francuskie konsultacje w Warszawie
text: Wiceminister Harazim i Sekretarz Generalny Breins wyrazili satysfakcję z ustaleń
  szczytu międzyrządowego Polska–Francja zorganizowanego w Gdańsku 20 kwietnia . Zadeklarowali
  wolę pogłębiania partnerstwa strategicznego m.in. poprzez rozwój wspólnych projektów
  gospodarczych, obronnych, energetycznych i społeczno – kulturalnych. Podsekretarz
  stanu Harazim odnotował rosnący poziom inwestycji polskich we Francji, zachęcając
  partnerów do zapoznania się m.in. z ofertą polskiego przemysłu zbrojeniowego, rozwiązań
  w obszarze cyfryzacji oraz udziału w planowanych inwestycjach, w tym infrastrukturalnych.
  Istotnym elementem konsultacji było podsumowanie rezultatów Konferencji na rzecz
  Odbudowy Ukrainy w Gdańsku . Rozmówcy zgodnie podkreślili znaczenie wypracowanych
  podczas wydarzenia ustaleń dla Ukrainy. Podczas rozmów omówiono najważniejsze kwestie
  z agendy europejskiej, w tym prace nad kształtem przyszłych Wieloletnich Ram Finansowych
  czy unijnego procesu rozszerzenia. Wiceministrowie przedyskutowali również sytuację
  na Bliskim Wschodzie. Rozmówcy wyrazili zadowolenie z zaplanowanego od lutego br.
  do października 2027 r. wspólnego, polsko-francuskiego sezonu kulturalnego , który
  przybliży twórców i społeczeństwa obu państw. Z satysfakcją odnotowali również zacieśnianie
  współpracy pomiędzy resortami spraw zagranicznych Polski i Francji.
