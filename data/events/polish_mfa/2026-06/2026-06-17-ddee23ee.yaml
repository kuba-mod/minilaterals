title: Wizyta Sekretarza Stanu Marcina Bosackiego w Kiszyniowie
text: Polskiej delegacji przewodzili wiceminister Marcin Bosacki z Ministerstwa Spraw
  Zagranicznych oraz wiceminister Jacek Karnowski z Ministerstwa Funduszy i Polityki
  Regionalnej. Mołdawię reprezentowali wicepremier ds. integracji europejskiej Cristina
  Gherasimov, sekretarz generalny rządu Alexei Buzu oraz sekretarz stanu w Ministerstwie
  Spraw Zagranicznych Carolina Perebinos. Spotkania polskich wiceministrów ze stroną
  mołdawską miały miejsce w szczególnym momencie dla Mołdawii – w okresie formalnego
  rozpoczęcia negocjacji akcesyjnych z Unią Europejską. Podczas konsultacji omówiono
  perspektywy dalszego rozwoju współpracy politycznej i gospodarczej między Polską
  a Mołdawią. Strony potwierdziły bardzo dobry stan relacji dwustronnych oraz zgodność
  stanowisk w kluczowych kwestiach dotyczących bezpieczeństwa europejskiego i sytuacji
  międzynarodowej. Jednym z głównych tematów rozmów z wicepremier Cristiną Gherasimov
  były przygotowania Mołdawii do członkostwa w Unii Europejskiej. Dyskutowano o postępach
  we wdrażaniu reform oraz kolejnych etapach procesu negocjacyjnego. Wiceminister
  Marcin Bosacki podkreślił gotowość Polski do dalszego wspierania Mołdawii w działaniach
  na rzecz integracji europejskiej oraz skutecznego wdrażania reform. Polska wspiera
  i będzie wspierać Mołdawię na jej drodze do UE. Oferujemy konkretne programy, które
  pomogą wdrażać europejskie standardy lokalnym instytucjom. Mołdawia jest jednym
  z liderów procesu integracji, ale kluczowe będzie teraz skupienie się na efektywnym
  wdrażaniu reform, w tym administracji samorządowej i sądownictwa. W trakcie spotkania
  z sekretarzem generalnym rządu Alexeim Buzu, skoncentrowano się na reformie administracji
  terytorialnej, uznawanej za jeden z kluczowych elementów przygotowań Mołdawii do
  członkostwa w UE. Rozmowy w Kiszyniowie dotyczyły również możliwości pogłębienia
  współpracy gospodarczej. Towarzyszą mi dziś przedstawiciele polskich firm obecnych
  lub zainteresowanych wejściem na rynek mołdawski. Proces akcesji Mołdawii do UE
  stanowi impuls do dalszych reform i szansę na stworzenie atrakcyjnych warunków dla
  inwestorów zagranicznych. Omówiona została obecność polskich przedsiębiorstw na
  rynku mołdawskim oraz instrumenty wsparcia dla polskich firm zainteresowanych rozwojem
  działalności w Mołdawii.
