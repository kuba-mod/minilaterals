title: Deputy Minister Wojciech Zajączkowski visits Mexico
text: During the consultations held on 1–2 June, Deputy Minister Wojciech Zajączkowski
  also met with his counterpart, Undersecretary for Foreign Affairs María Teresa Mercado.
  The deputy ministers discussed prospects for bilateral cooperation in areas such
  as new technologies and cybersecurity. The talks covered economic and investment
  cooperation as well as existing veterinary and phytosanitary barriers. The deputy
  heads of diplomacy agreed that the EU–Mexico Modernised Global Agreement, signed
  in May this year, creates additional opportunities for entrepreneurs from the two
  countries. Both diplomats also highlighted the need to strengthen cooperation in
  the fight against organised crime. The second part of consultations was dominated
  by multilateral issues such as the reform of the UN, the war in Ukraine, and the
  situation in the Middle East and in the Caribbean. Preparations for the centenary
  of the establishment of diplomatic relations, which will be celebrated in 2028,
  were also discussed. While in Mexico, Deputy Minister Wojciech Zajączkowski delivered
  a lecture on Polish policy towards Latin America at the Instituto Matías Romero,
  Mexico’s Secretariat of Foreign Affairs’ training and research centre. Together
  with the head of the Mexican–Polish Parliamentary Friendship Group, María Angélica
  Granados Trespalacios, the deputy minister opened an exhibition titled Camas vacías
  (Empty beds) at the Senate focusing on the issue of illegal deportations and forced
  resettlements of Ukrainian children by Russia. The deputy minister also met with
  members of the local Polish community and Polish entrepreneurs operating in Mexico.
  In 2025, Mexico was Poland’s second-largest partner in Latin America and the Caribbean
  and the largest market for Polish exports (USD 1.87 billion) in the region.
