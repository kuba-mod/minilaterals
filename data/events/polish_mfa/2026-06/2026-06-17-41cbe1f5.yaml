title: Joint Statement by the Republic of Poland and the Federal Republic of Germany
  on the 35th Signing Anniversary on Good Neighbourly Relations and Friendly Cooperation
text: 'Today, Poland and Germany are not only neighbours and friends but also close
  partners on equal terms and trustworthy allies, permanently rooted in the European
  and Euro-Atlantic structures. Following a long period of mutual division and distrust,
  the Treaty not only became material for the Polish–German reconciliation but also
  initiated enhanced, trust-based cooperation across all areas. The institutional
  and legal framework established 35 years ago enabled the unprecedented development
  of Polish–German cooperation, driven primarily by the commitment of the two societies.
  Our states have since changed fundamentally. But above all, Russia’s full-scale
  aggression on Ukraine has fundamentally altered our geopolitical setting. Mindful
  of the tragic history of the 20th century, as NATO allies and partners in the EU,
  we are particularly responsible for our region and continent. The Russian aggression
  against Ukraine has put us in a new political reality. It has been a touchstone
  of our responsibility and effectiveness. Joint commitment towards enhancing Europe’s
  security is today’s geopolitical must. It is well exemplified by the Polish–German
  contribution to the security of the eastern flank. We are satisfied to note the
  conclusion on 17 June of a new Polish–German defence cooperation agreement. It testifies
  to our determination to act together. The Polish–German partnership remains a pillar
  of a strong, united Europe and a credible NATO. Russia’s aggressive actions, including
  in particular hybrid and disinformation activities, are also aimed at us. They seek
  to sow social division, undermine public order, and erode trust in the state and
  its institutions. We will not be intimidated. We will effectively boost our resilience
  and educate our societies. Our overarching goal is to protect European values, including
  the rule of law and transparent electoral processes, and to secure a just and lasting
  peace in Ukraine that would strengthen Europe’s security. We take the lessons history
  has taught us seriously. “No more war” is not an empty slogan but a commitment to
  future generations. Recognising Germany’s guilt, we regard this tragic chapter of
  our history as an enduring warning. Eighty-one years after the end of World War
  II, the last witnesses of those events are passing away. We believe that history
  can not only divide but also unite. That requires mutual understanding, sensitivity,
  and concrete steps, in a spirit of the joint declaration of 1 December 2025, ones
  that go beyond the sphere of symbolic gestures. We welcome new developments in the
  process to erect a memorial in central Berlin to Polish citizens who were victims
  of World War II and the Nazi terror of 1939–1945 and we eagerly await the outcome
  of the procedure later this year. We appreciate the Federal Government’s decisions
  taken so far to return looted cultural property to Poland. We expect more to come
  soon. Our economic cooperation gives us special reasons to be satisfied. Trade between
  Poland and Germany has grown multiple times in recent decades. Germany ranks third
  among the world’s largest economies, while Poland aspires to join the top 20. The
  structure and nature of our trade relations have significantly evolved. This translates
  into sharing prosperity, creating new jobs, and cementing social ties. To fully
  unleash our socioeconomic potential, we need a new impetus. Entrepreneurs and citizens
  in both countries are looking forward to improving cross-border infrastructure and
  expanding the transport network, which will not only increase social mobility and
  promote trade between Poland and Germany, but also strengthen our military capabilities.
  We support reinforcing the network of partnerships, especially in the areas where
  both countries are falling behind, from dual-use technologies to digitalisation
  to artificial intelligence. The European Union remains at the heart of our cooperation.
  An ever-stronger and stable Union is in our strategic interest. In this spirit,
  we wish to jointly contribute to shaping the future of the European Union. We are
  convinced that as tensions grow, the European Union is becoming a primary vehicle
  for the protection and pursuit of our interests on a global scale. Like the Treaty,
  the Weimar Triangle also sees its 35th anniversary in 2026. This format is second
  to none in embodying Europe’s regained unity and solidarity. We both believe that
  the Weimar Triangle is still capable of spurring joint initiatives in foreign and
  European politics and fostering greater cohesion within the European Union. In this
  context, we are pleased to note increased sectoral cooperation. The perspective
  on Polish–German relations has changed substantially. The challenges we face today
  are different than back in 1991. Poland and Germany are capable of more: our liberty,
  security, and prosperity are at stake. As neighbours, partners, and allies, we hold
  the future in our hands. This is a test we must pass by building our future relations
  responsibly, fairly, in the spirit of partnership, and in the interest of the whole
  of Europe.'
