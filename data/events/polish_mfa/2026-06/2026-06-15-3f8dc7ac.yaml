title: 'Szef MSZ Radosław Sikorski na Radzie UE: Presja na Rosję musi wzrosnąć'
text: 'Dalsza presja na Kreml i otwarcie negocjacji akcesyjnych z Kijowem. Podczas
  posiedzenia Rady minister Sikorski wezwał do zdecydowanej postawy wobec Rosji w
  obliczu braku woli Kremla do podjęcia realnych rozmów pokojowych. Szef polskiej
  dyplomacji potępił ataki na Kijów i Charków. Szczególnie potępił zniszczenie historycznej
  Ławry Peczerskiej – prawosławnej świątyni z XI wieku, wpisanej na listę światowego
  dziedzictwa UNESCO. Minister wskazał, że to kolejny akt terroru, który obnaża hipokryzję
  Moskwy, deklarującą rzekomą obronę chrześcijańskiego dziedzictwa, jako jeden z powodów
  rozpoczęcia wojny. Szef polskiej dyplomacji wyraził zadowolenie z przyjęcia przez
  Radę UE kolejnych środków ograniczających wobec Rosji w związku z jej napaścią na
  Ukrainę, łamaniem praw człowieka i prowadzeniem działań hybrydowych. Wskazując na
  widoczne osłabienie rosyjskiej armii i gospodarki, wicepremier zaapelował także
  o szybkie przyjęcie 21. pakietu sankcji gospodarczych. Nowe restrykcje powinny obejmować
  kluczowe sektory: finansowy, militarny, maszynowy oraz energetyczny. Wicepremier
  podniósł także potrzebę finalizacji rozmów nt. przekazania uzgodnionych zwrotów
  finansowych dla państw członkowskich z odblokowanych funduszy European Peace Facility.
  Jednocześnie Polska z satysfakcją odnotowała otwarcie pierwszego klastra w negocjacjach
  akcesyjnych z Ukrainą, co stanowi kamień milowy na jej drodze do struktur europejskich.
  Rozpoczęcie merytorycznego dialogu w kluczowych obszarach potwierdza, że proces
  transformacji ustrojowej i wdrażanie unijnych standardów to dla Ukrainy kluczowy
  instrument modernizacji państwa w drodze do struktur zachodnich. Polska inicjatywa
  przeciwko operacjom hybrydowym W kontekście nasilających się zagrożeń działań hybrydowych
  w Europie, Radosław Sikorski zaprezentował unijnym ministrom kluczowy dokument opracowany
  przez Polski Instytut Spraw Międzynarodowych (PISM) z inicjatywy MSZ. Raport pt.
  „Biała księga rosyjskich aktów sabotażu i dywersji wobec członków Rady Państw Morza
  Bałtyckiego” powstał w ramach polskiej prezydencji w Radzie Państw Morza Bałtyckiego.
  Pełna treść raportu zaprezentowanego przez Ministra Spraw Zagranicznych dostępna
  jest na stronach Polskiego Instytutu Spraw Międzynarodowych: Dokument ten wskazuje
  m.in. ataki na infrastrukturę krytyczną, paraliżowanie żeglugi poprzez celowe zakłócanie
  sygnałów satelitarnych GNSS oraz agresywne operacje kognitywne wymierzone w europejskie
  społeczeństwa. Minister podkreślił, że powstrzymanie rosyjskiej agresji hybrydowej
  wymaga od państw członkowskich natychmiastowego zacieśnienia współpracy wywiadowczej,
  stworzenia wspólnego systemu wymiany danych oraz jasnego wskazania sprawców. Relacje
  UE z Chinami i kryzys na Bliskim Wschodzie Podczas debaty na temat relacji UE z
  Chinami Polska jednoznacznie poparła potrzebę rekalibracji relacji gospodarczych
  z Pekinem. Unia Europejska musi adekwatnie i stanowczo odpowiedzieć na wsparcie,
  jakiego Chiny udzielają rosyjskiemu sektorowi zbrojeniowemu. W dyskusji dotyczącej
  Bliskiego Wschodu wicepremier Sikorski z zadowoleniem przyjął wstępne porozumienie
  między USA a Iranem. Podkreślił przy tym, że zapewnienie bezwzględnej swobody żeglugi
  w strategicznej Cieśninie Ormuz jest kluczowe dla globalnego bezpieczeństwa energetycznego.
  Odnosząc się do sytuacji na terytoriach okupowanych, Polska opowiedziała się za
  reakcją UE wobec działań Izraela oraz pilnego przedstawienia przez KE propozycji
  w tym zakresie. Polska poparła objęcie dalszymi sankcjami nielegalnych osadników
  oraz wspierających ich ministrów izraelskiego rządu, Itamara Ben Gwira i Becalela
  Smotricza. Na marginesie posiedzenia FAC doszło także do nieformalnego spotkania
  unijnych ministrów z ministrem spraw zagranicznych Armenii, Araratem Mirzojanem.
  Wicepremier Sikorski zadeklarował jednoznaczne poparcie dla proeuropejskiego i prozachodniego
  kursu Erywania. Szef polskiej dyplomacji wsparł także działania UE na rzecz budowania
  odporności Armenii na rosyjskie działania hybrydowe.'
