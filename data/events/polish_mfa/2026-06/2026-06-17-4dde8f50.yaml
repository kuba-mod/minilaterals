title: Secretary of State Marcin Bosacki visits Chișinău
text: The delegation was headed by Deputy Minister Marcin Bosacki and Deputy Minister
  Jacek Karnowski from the Ministry of Foreign Affairs and the Ministry of Development
  Funds and Regional Policy, respectively. The Republic of Moldova was represented
  by Deputy Prime Minister for European Integration Cristina Gherasimov, Secretary
  General of the Government Alexei Buzu, and Secretary of State at the Ministry of
  Foreign Affairs Carolina Perebinos. Polish deputy ministers and the Moldovan side
  met at a special moment for Moldova as it has formally begun EU accession talks.
  The consultations covered further prospects for the development of political and
  economic cooperation between Poland and Moldova. Both parties reaffirmed the very
  good state of bilateral relations, as well as Poland’s and Moldova’s similar assessment
  of the most important issues concerning European safety and the international situation.
  One of the main topics of conversation with Prime Minister Cristina Gherasimov were
  the preparations for Moldova’s EU membership. Among the matters discussed were progress
  in implementing reforms and further stages of the negotiation process. Deputy Minister
  Marcin Bosacki emphasised Poland’s willingness to further support Moldova in its
  European integration and efficient reform implementation efforts. The meeting with
  Secretary of State Alexei Buzu focused on the reform of territorial administration,
  which is said to be one of the key elements of Moldova’s preparations for EU membership.
  The talks in Chișinău also touched on the opportunities for deepening economic cooperation.
  The participants addressed the presence of Polish companies on Moldovan markets,
  and support instruments for Polish companies interested in expanding their business
  in Moldova.
