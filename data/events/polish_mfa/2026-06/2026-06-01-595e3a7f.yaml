title: O wyzwaniach geopolitycznych w Barcelonie
text: 'Ministrowie Spraw Zagranicznych Polski i Hiszpanii w Barcelonie omówili bieżące
  kwestie dotyczące bezpieczeństwa w Europie, przede wszystkim w kontekście rosyjskiej
  agresji na Ukrainę. Podkreślili, konieczność zacieśniania współpracy obu państw
  nie tylko dwustronnie czy w Unii Europejskiej, lecz także w ramach NATO. Szefowie
  dyplomacji omówili też polsko-hiszpańskie relacje. Podczas rozmów zwrócili uwagę
  intensywną współpracę gospodarczą. Wartość obrotów handlowych między Polską a Hiszpanią
  w 2025 roku była rekordowa, wyniosły ponad 19 miliardów euro, a w zeszłym roku wzrosły
  o około 6 procent. Ministrowie razem wzięli udział w konferencji hiszpańskiego think
  tanku Cercle d’Economia. Uczestniczyli w panelu poświęconym geopolitycznym wyzwaniom
  związanym z wojną w Ukrainie oraz strategicznej autonomii Europy. Minister Sikorski
  podkreślał, że wojna w Ukrainie stanowi, zwłaszcza dla państw wschodniej flanki,
  zagrożenie o fundamentalnym znaczeniu. Zaznaczył jednak, że państwa Europy nie powinny
  panikować w związku z agresją Rosji. Myśleliśmy, że (Putin) ma drugą co do wielkości
  armię na świecie. On sam myślał, że ma drugą co do wielkości armię na świecie. W
  rzeczywistości ma drugą co do wielkości armię w Ukrainie. I nie tylko zaczyna tracić
  pozycje, ale ponosi straty większe niż liczba nowych rekrutów. Traci też kontrolę
  nad niektórymi kluczowymi szlakami logistycznymi, takimi jak autostrada M14 z Donbasu
  na Krym – mówił wicepremier Sikorski i dodał, że od 20 do 30 procent rosyjskich
  mocy rafineryjnych zostało unieruchomionych, a rosyjska gospodarka naprawdę zaczyna
  odczuwać skutki tej sytuacji. Minister Albares także przyznał, że rzeczywistość
  na froncie nie wskazuje na to, by Putin zyskiwał na sile ani czerpał korzyści z
  agresji. Nie możemy pozwolić, by agresor i wojna agresywna odniosły zwycięstwo,
  czerpały korzyści czy otrzymały nagrodę. Byłoby to sprzeczne z tym, czym zawsze
  był projekt europejski. Projekt europejski jest projektem pokojowym. Jest to projekt,
  który odrzuca pogląd, że wojna może być instrumentem polityki zagranicznej Szef
  hiszpańskiej dyplomacji podkreślał, że pokój i poszanowanie prawa międzynarodowego
  to zasady, którymi należy kierować się zarówno w Ukrainie, jak i w Strefie Gazy,
  Libanie i Iranie. Ministrowie rozmawiali też o przyszłości Unii Europejskiej i zasadach,
  którymi kieruje się Wspólnota, między innymi o jednomyślności. Jeśli chodzi o sankcje,
  nie powinniśmy być zakładnikami jednego kraju, który pod wpływem państwa trzeciego
  z zewnątrz blokuje wszelkie działania. Osobiście nie uważam więc, by jednomyślność
  była jedyną formą wyrażania demokracji. W naszych parlamentach nie głosujemy jednomyślnie
  Z kolei wicepremier Albares odpowiedział: Gdy w grę wchodzi interes narodowy danego
  kraju, wydaje mi się czymś całkowicie normalnym, że państwo korzysta z prawa weta,
  aby bronić swoich żywotnych interesów. Właśnie temu służy jednomyślność. Jednak
  powiem bardzo otwarcie: zawsze budziło mój sprzeciw, gdy widziałem państwo, które
  nie korzystało z weta w obronie własnego interesu narodowego, lecz wykorzystywało
  je wyłącznie po to, by blokować postęp pozostałych albo wymuszać ustępstwa w zupełnie
  innych, krajowych sprawach. Podczas dyskusji o gospodarce i bezpieczeństwie minister
  Albares podkreślał, że należy stworzyć jednolity europejski rynek kapitałowy. Ponadto
  europejskie oszczędności powinny finansować pomysły i innowacje powstające w Europie.
  Szef hiszpańskiego MSZ podkreślał też, że europejskie bezpieczeństwo oznacza wzmocnienie
  europejskiego filaru NATO. Wizyta wicepremiera Radosława Sikorskiego w Barcelonie
  oraz zbieżność stanowisk z ministrem José Albaresem potwierdziły, że Polska i Hiszpania,
  mimo geograficznego oddalenia, pozostają kluczowymi partnerami w kształtowaniu przyszłości
  Europy. Wspólne zaangażowanie w pomoc Ukrainie, zacieśnianie współpracy w strukturach
  NATO oraz dynamicznie rosnąca wymiana handlowa stanowią silny fundament pod dalsze
  budowanie bezpiecznej i zjednoczonej Wspólnoty. Cercle d’Economia to hiszpański
  think tank, który powstał w latach 50. XX w. Skupia ponad 1300 członków. Doroczne
  spotkania Cercle d’Economia są przestrzenią spotkań, debat i propozycji dotyczących
  najważniejszych problemów i wyzwań dla Hiszpanii, Europy i świata. Gościem tegorocznej
  edycji będzie m.in. Król Hiszpanii Filip VI czy premier Pedro Sánchez.'
