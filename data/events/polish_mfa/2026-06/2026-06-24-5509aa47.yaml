title: MFA statement
text: The MFA expresses deep satisfaction that the case has reached a positive resolution.
  We would like to thank all those involved in efforts to resolve this matter, in
  particular our allies, partners from the European Union, and the Libyan institutions
  that contributed to achieving this result. At the same time, please be reminded
  that the Ministry of Foreign Affairs has for many years strongly advised against
  all travel to Libya owing to the continuing unstable security situation there. We
  call on Polish citizens to follow the latest updates and travel advice issued by
  the Ministry and to comply with the recommendations provided. Ministry of Foreign
  Affairs of the Republic of Poland
