title: Spotkanie sekretarza stanu Marcina Bosackiego z szefem Biura Prezydenta Ukrainy
  Kyryłem Budanowem
text: Minister Bosacki przedstawił polskie stanowisko, podkreślając, że decyzja prezydenta
  Ukrainy wywołała ból i oburzenie w społeczeństwie polskim, które wspiera broniącą
  się Ukrainę od początku rosyjskiej agresji. Minister zaznaczył, że wzajemne relacje
  muszą być budowane na podstawie prawdy historycznej, szacunku dla ofiar i dialogu.
  Ważnym punktem agendy było również podsumowanie bieżących działań wojennych i sytuacji
  na linii frontu w kontekście dalszych scenariuszy dyplomatycznych oraz warunków
  rozmów pokojowych. Minister Bosacki i generał Budanow potwierdzili strategiczny
  charakter współpracy polsko-ukraińskiej oraz jej znaczenie w obliczu wyzwań związanych
  z bezpieczeństwem regionu i trwającą agresją Rosji przeciwko Ukrainie.
