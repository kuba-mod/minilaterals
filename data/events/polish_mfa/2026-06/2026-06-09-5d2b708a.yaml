title: Poland's Head of the Foreign Service joins meeting of EU State Secretaries
  and Secretaries-General
text: The participants represented member states’ foreign ministries, the European
  External Action Service, and the General Secretariat of the Council. Poland’s delegate
  to the meeting was Head of the Foreign Service and Director-General Henryka Mościcka-Dendys.
  In a debate on security, she emphasised that Russia remains the principal threat
  for Europe, and a joint effort of the whole European community is required to build
  resilience to Russian and Belarusian disinformation-related and other hybrid operations.
  Aside from discussing the assumptions behind a currently drafted European Security
  Strategy, the meeting’s agenda included a presentation of the Irish presidency’s
  priorities for the coming six months, matters concerning negotiations of the 2028–2034
  Multiannual Financial Framework, the EU enlargement policy, competitiveness, and
  the common market. *** On 1 July, Ireland will assume its eighth presidency of the
  Council of the EU. Its priorities for the six months ahead encompass security and
  defence policy as well as a range of economic matters, concerning in particular
  economic competitiveness and innovation.
