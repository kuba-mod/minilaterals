title: Secretary of State Marcin Bosacki meets head of Zelenskyy's office Kyrylo Budanov
text: Minister Bosacki presented Poland’s position, emphasising that the Ukrainian
  president’s decision caused pain and indignation in the Polish society, which has
  been supporting Ukraine in its fight since the onset of the Russian aggression.
  The minister noted that mutual relations must be built on historical truth, respect
  for the victims, and dialogue. A summary of the current military operations and
  the situation on the frontline in the context of further diplomatic scenarios and
  conditions for peace talks was another major issue on the agenda. Minister Bosacki
  and General Budanov confirmed the strategic character of Poland–Ukraine cooperation
  and its significance in the face of regional security challenges and Russia’s ongoing
  aggression against Ukraine.
