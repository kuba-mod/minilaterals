title: Pierwsze w historii polsko-szwedzkie konsultacje międzyrządowe
text: Podczas spotkania wicepremier Radosław Sikorski i minister Maria Malmer Stenergard
  rozmawiali o relacjach polsko-szwedzkich. Przyznali, że rozwijają się one bardzo
  dynamicznie. Rozkwit naszych relacji z jednej strony opiera się na wspólnocie wartości,
  z drugiej strony jest pochodną wyjątkowo zbliżonej, wręcz identycznej, percepcji
  wyzwań z jakimi przyszło nam się dziś mierzyć w regionie, w Europie oraz globalnie.
  Szwecja to kraj, z którym rozumiemy się bez słów. - podkreślił wicepremier Radosław
  Sikorski. Szefowie dyplomacji Polski i Szwecji omówili też najważniejsze wyzwania
  w zakresie bezpieczeństwa międzynarodowego, w tym kwestii europejskiej obronności,
  rosyjskiej agresji przeciwko Ukrainie, sytuacji na Bliskim Wschodzie oraz współpracy
  na Półwyspie Koreańskim. Jednym z kluczowych wymiarów realizacji polsko-szwedzkiego
  partnerstwa strategicznego jest Unia Europejska. O współpracy w ramach UE rozmawiali
  w Gdyni Podsekretarz Stanu MSZ Artur Harazim oraz Minister ds. UE Szwecji, Jessica
  Rosencrantz. Potwierdzili, że Polska i Szwecja będą intensywnie działać na rzecz
  konkurencyjnej gospodarczo, otwartej na innowacje i zdolnej do skutecznej rywalizacji
  na globalnych rynkach Unii Europejskiej. Wiceminister Harazim oraz minister Rosencrantz
  rozmawiali również o Wieloletnich Ramach Finansowych i Europejskim Systemie Handlu
  Emisjami (ETS). Wiceszef polskiej dyplomacji podkreślił, że gotowość do poznania
  swoich perspektyw, to także istotny wymiar Partnerstwa Strategicznego. Jak pokazuje
  historycznie ważna polsko-szwedzka inicjatywa Partnerstwa Wschodniego, tandem Warszawa-Sztokholm
  to rozpoznawalna marka  w instytucjach w Brukseli.  Zobowiązujemy się do dalszego
  dialogu i generowania rozwiązań potrzebnych naszym krajom i Europie - podsumował
  spotkanie wiceminister Artur Harazim. Równolegle do spotkania na temat spraw zagranicznych
  rozmowy prowadzili szefowie rządów Polski i Szwecji Donald Tusk i Ulf Kristersson
  oraz przedstawiciele innych resortów. Podsekretarz Stanu MSZ Robert Kupiecki towarzyszył
  delegacji Premiera Tuska jako jego doradca ds. bezpieczeństwa narodowego. Jednym
  z najważniejszych punktów konsultacji międzyrządowych było podpisanie kontraktu
  na zakup trzech okrętów podwodnych A26 w ramach programu „Orka”, który otwiera nowy
  rozdział we współpracy wojskowej ze Szwecją. Na zakończenie konsultacji przedstawiciele
  Polski i Szwecji przyjęli Wspólną Deklarację oraz Wspólne Oświadczenie w sprawie
  Paktu Bałtyckiego, w którym państwa zgodziły się na pogłębienie dwustronnej współpracy
  w zakresie bezpieczeństwa i obrony na Morzu Bałtyckim. Wspólne oświadczenie Rzeczypospolitej
  Polskiej i Królestwa Szwecji w sprawie Paktu dla Morza Bałtyckiego Polsko-szwedzkie
  konsultacje międzyrządowe. Wspólna deklaracja
