title: Secretary of State Ignacy Niemczycki visits Athens
text: The deputy foreign ministers of Poland and Greece discussed bilateral links
  and relations within the European Union and NATO. The two countries share similar
  approach to security, stability of the Western Balkans, EU enlargement, and the
  protection of the EU’s external borders. During the meeting, the ministers underlined
  the strategic importance of Poland and Greece as the pillars of logistical and political
  support for the fighting Ukraine. Deputy Minister Niemczycki stressed that it is
  necessary to exercise further pressure on the aggressor, including by means of sanctions.
  The Greek side declared to support subsequent packages of sanctions and noted the
  difficulties with implementation of sanctions to date. The ministers also hoped
  for a breakthrough in Ukraine’s path to the European Union. Deputy Minister Niemczycki
  also presented Poland’s position on the 2028–2034 Multiannual Financial Framework.
  He emphasised the positive role of cooperation with Greece in the Friends of Cohesion
  format. In addition, he referred to the proposed Industrial Accelerator Act. Poland
  finds it necessary to ensure that the document’s emissions criterion does not provoke
  divisions in the EU’s internal market. The deputy ministers also discussed the major
  priorities of the Greek Presidency of the Council of the European Union scheduled
  for the second half of 2027. During his visit to Greece, Deputy Minister Niemczycki
  was joined by the Hellenic Republic’s Secretary General for International Economic
  Affairs Dimitris Skalkos to inaugurate a seminar on Energy Security and Critical
  Infrastructure in the Baltic and Mediterranean Maritime Space—Mutual Risk, Mutual
  Resilience. The event was organised by the Polish Embassy in Athens in connection
  with the Polish Presidency of the Council of the Baltic Sea States.
