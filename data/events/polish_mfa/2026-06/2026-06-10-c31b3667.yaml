title: Meeting between top diplomats of Poland and Andorra
text: Poland’s and Andorra’s foreign ministers expressed their satisfaction with the
  very good state of bilateral relations. They highlighted the special nature of Andorran
  foreign minister’s visit to Warsaw, as it fell on the 30th anniversary of establishing
  diplomatic relations between Poland and Andorra. One of the main conversation topics
  was the process leading to concluding the association agreement between Andorra
  and the European Union. Minister Radosław Sikorski pointed out that Andorra’s close
  relations with the EU result not only from its geographical location but also from
  shared democratic values, respect for the rule of law and fundamental freedoms.
  He also emphasised Polish support for Andorra forging closer ties with the European
  Union. The heads of diplomacy also discussed international security issues, with
  particular regard to the consequences of Russia’s aggression against Ukraine. Minister
  Sikorski commended Andorra on its clear stance condemning Russia’s actions and its
  support for Ukrainian citizens forced to leave their country. The meeting also covered
  the current situation in the Middle East. During her visit to Warsaw, Foreign Minister
  Imma Tor Faus also met with the students of the MFA’s Diplomatic Academy. During
  her address, she presented the small European country’s perspective on the challenges
  of contemporary international relations.
