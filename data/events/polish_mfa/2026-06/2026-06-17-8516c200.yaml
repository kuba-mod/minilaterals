title: Podsekretarz stanu Artur Harazim z wizytą w Islandii
text: 'Wiceminister Harazim spotkał się z minister spraw zagranicznych Islandii Þorgerdur
  Katrín Gunnarsdóttir. Rozmowy dotyczyły rozwoju relacji polsko-islandzkich, współpracy
  regionalnej oraz wyzwań stojących przed państwami Europy Północnej. Strona islandzka
  pozytywnie oceniła intensyfikację kontaktów dwustronnych oraz przedstawiła priorytety
  przewodnictwa Islandii w Radzie Państw Morza Bałtyckiego (RPMB), które rozpocznie
  się 1 lipca 2026 r. Wiceminister Harazim przeprowadził konsultacje polityczne z
  Martinem Eyjólfssonem, Sekretarzem Stanu w Ministerstwie Spraw Zagranicznych Islandii.
  Rozmówcy potwierdzili bardzo dobry stan stosunków polsko-islandzkich oraz podkreślili
  znaczenie współpracy w regionie Morza Bałtyckiego. Omówili także wspólne wyzwania
  międzynarodowe oraz rolę licznej polskiej diaspory mieszkającej w Islandii. Wiceszef
  polskiej dyplomacji spotkał się także z przewodniczącym Komisji Spraw Zagranicznych
  Parlamentu Islandii Pawłem Bartoszkiem. Rozmowa była poświęcona rozwijaniu współpracy
  parlamentarnej między Polską i Islandią. Seminarium poświęcone bezpieczeństwu i
  współpracy politycznej w regionie Morza Bałtyckiego Wiceminister Artur Harazim uczestniczył
  również w seminarium pt. „Bezpieczeństwo i współpraca polityczna w państwach Morza
  Bałtyckiego i poza nim”, zorganizowanym w ramach polskiej prezydencji w Radzie Państw
  Morza Bałtyckiego. Wydarzenie zostało przygotowane wspólnie przez Ambasadę RP w
  Reykjaviku, Ministerstwo Spraw Zagranicznych Islandii oraz stowarzyszenie Vardberg.
  W seminarium udział wzięli przedstawiciele korpusu dyplomatycznego, administracji
  islandzkiej oraz eksperci zajmujący się tematyką bezpieczeństwa i współpracy regionalnej.
  Wśród panelistów znaleźli się Anna Hjartardóttir Dyrektor Generalna ds. Stosunków
  Międzynarodowych w islandzkim MSZ oraz Gustav Lindström, Dyrektor Generalny Sekretariatu
  RPMB w Sztokholmie. W swoim wystąpieniu wiceminister Harazim podsumował rezultaty
  polskiej, rocznej prezydencji w Radzie Państw Morza Bałtyckiego. Wskazał na najważniejsze
  osiągnięcia, w tym organizację ponad 100 wydarzeń w kraju i za granicą, rozwój współpracy
  eksperckiej oraz przygotowanie dwóch raportów poświęconych bezpieczeństwu regionu
  Morza Bałtyckiego: Oba dokumenty szczegółowo podsumowują aktualną sytuację bezpieczeństwa
  na Morzu Bałtyckim oraz wyzwania, z jakimi mierzą się członkowie Rady Państw Morza
  Bałtyckiego. Uczestnicy seminarium omówili również działania na rzecz przeciwdziałania
  zagrożeniom dla infrastruktury krytycznej, zwalczania tzw. floty złomu oraz wzmacniania
  odporności państw regionu wobec zagrożeń hybrydowych. Podkreślono znaczenie ścisłej
  współpracy państw członkowskich RPMB dla utrzymania bezpieczeństwa i stabilności
  w regionie. Rada Państw Morza Bałtyckiego została utworzona w 1992 r., a Polska
  należy do grona jej założycieli. W skład organizacji wchodzą obecnie: Estonia, Finlandia,
  Islandia, Litwa, Łotwa, Niemcy, Norwegia, Polska i Szwecja, a także Unia Europejska.
  Celem Rady jest wzmacnianie dialogu politycznego i współpracy regionalnej na rzecz
  bezpieczeństwa, stabilności i zrównoważonego rozwoju regionu Morza Bałtyckiego.
  Aktualnie w ramach organizacji funkcjonują cztery grupy robocze: ds. zrównoważonej
  gospodarki morskiej, ds. zwalczania handlu ludźmi, ds. współpracy na rzecz dzieci
  zagrożonych oraz ds. obrony cywilnej.'
