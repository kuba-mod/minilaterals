title: Sekretarz Stanu Władysław Teofil Bartoszewski na spotkaniu z Amerykanami polskiego
  pochodzenia
text: Budowanie trwałych więzi między młodym pokoleniem Polonii w Stanach Zjednoczonych,
  a współczesną Polską – to jeden z celów inicjatywy Departamentu Współpracy z Polonią
  i Polakami za Granicą MSZ zorganizowanej we współpracy z amerykańskim programem
  Heritage Polonia, sponsorowanym przez Ambasadę RP w Waszyngtonie. W spotkaniu, które
  miało miejsce 16 czerwca br. uczestniczył wiceminister Władysław Teofil Bartoszewski.
  Rozmowa była okazją do przedstawienia współczesnej Polski jako państwa dynamicznie
  rozwijającego się gospodarczo, coraz bardziej widocznego w obszarze nowych technologii
  oraz otwartego na młodych ludzi, którzy chcą rozwijać swoje związki z krajem przodków.
  W trakcie spotkania wiceminister W.T. Bartoszewski poruszył m.in. kwestie przemian
  gospodarczych Polski, osiągnięć polskich naukowców, przedsiębiorców i innowatorów,
  a także rosnącego znaczenia polskich firm na rynkach międzynarodowych. Wśród omawianych
  tematów znalazły się m.in. rozwój sektora nowych technologii, sztuczna inteligencja,
  technologie kwantowe, a także przykłady polskich firm i rozwiązań, które z powodzeniem
  funkcjonują poza granicami kraju. Istotną część rozmowy poświęcono także nauce języka
  polskiego oraz możliwościom podejmowania studiów w Polsce. Wiceminister zachęcał
  uczestników programu do traktowania znajomości języka polskiego nie tylko jako elementu
  rodzinnego dziedzictwa, lecz także jako praktycznego narzędzia budowania relacji
  z Polską, rozwijania kompetencji i planowania dalszej ścieżki edukacyjnej lub zawodowej.
  Uczestnicy rozmawiali również o umiędzynarodowieniu polskich uczelni oraz o możliwościach,
  jakie Polska oferuje młodym osobom z zagranicy zainteresowanym studiami, stażami
  i współpracą akademicką. Podkreślono, że współczesne relacje młodej Polonii z Polską
  mogą obejmować nie tylko wymiar historyczny i rodzinny, ale także edukacyjny, zawodowy,
  naukowy i technologiczny. Przestawiając autorski program MSZ staży biznesowych „Poland.
  Businees Adventure”, realizowanych we współpracy z Polską Agencją Handlu i Inwestycji,
  wiceminister W.T. Bartoszewski podkreślił, że trzymiesięczny pobyt i praca w Polsce
  może być doskonałą okazją do rozwoju zawodowego i osobistego, ale także krokiem
  do rozwoju kariery w oparciu o związki z naszym krajem. Program Heritage Polonia
  umożliwia młodym Amerykanom poznanie Polski poprzez spotkania, wizyty studyjne oraz
  rozmowy z przedstawicielami instytucji publicznych, świata nauki, kultury i życia
  społecznego.
