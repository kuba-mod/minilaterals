title: Secretary of State Marcin Bosacki visits Ukraine
text: During his visit on 12–13 December 2026, Deputy Minister Marcin Bosacki met
  with representatives of Ukraine’s MFA and the Office of the President of Ukraine.
  With his counterpart, Deputy Minister Olexandr Mischenko, he discussed the security
  of Ukraine and of the EU, as well as bilateral cooperation, including in the defence
  sector. The agenda of the meeting with representatives of the Office of the President
  of Ukraine, Sergiy Kyslytsya and Iryna Vereshchuk, included the peace process and
  Poland's participation in international consultations. The deputy head of Polish
  diplomacy talked with Deputy Prime Minister for European and Euro-Atlantic Integration
  Taras Kachka about the most important issues of Ukraine’s accession process. Deputy
  Minister Bosacki emphasised that Poland continues to support Ukraine's integration
  with the European Union and wants to share with Kyiv its experience of the EU accession
  process, including the alignment of national legislation with EU law. The Polish
  delegation also visited the Center for Countering Disinformation at the National
  Security and Defense Council of Ukraine. Deputy Minister Bosacki underlined that
  Warsaw and Kyiv jointly respond to false information spread across the public space.
  We have been enhancing bilateral cooperation in countering Russian disinformation—Russia's
  false narrative will not cause the withdrawal of support for Ukraine - said Deputy
  Foreign Minister Marcin Bosacki. Poland and Ukraine are actively cooperating to
  counter disinformation, including at the Joint Analysis Training and Education Centre
  (JATEC), multilateral formats (e.g. Ukraine Communications Group), and during the
  organisation of joint study visits of journalists from the Global South to Poland
  and Ukraine. The Kyiv talks also covered economic cooperation. Deputy Minister Marcin
  Bosacki and representatives of Polska Grupa Zbrojeniowa S.A., Bank Gospodarstwa
  Krajowego S.A., PKO BP, and Industrial Development Agency JSC met with Deputy Minister
  of Economy, Environment and Agriculture Denis Bashlyk and Deputy Minister for Development
  of Communities and Territories of Ukraine Alona Shkrum. They talked about the participation
  of Polish companies in the post-war reconstruction of Ukraine and the cooperation
  between the two countries’ defence industries. During the visit, the Polish delegation
  paid tribute to the fallen for Ukraine's freedom and to Polish victims of the NKVD
  and the Katyn massacre, and laid flowers at the Wall of Remembrance and at the Polish
  military cemetery in Bykivnia.
