title: Meeting of Weimar Triangle and India foreign ministers
text: During the Paris meeting, the Weimar Triangle foreign ministers, Radosław Sikorski,
  Jean-Noël Barrot, and Johann Wadephul, discussed the progress of Ukraine peace negotiations.
  They stressed that Europe, working closely with the US administration, should engage
  actively in forging peace solutions that comply with the rules of international
  law. “Diplomacy has accelerated. Two days ago, international security advisers met
  in Kyiv. Yesterday, the Coalition of the Willing gathered in Paris, and today, the
  Weimar Triangle is joined for talks by the world’s most populous country, India,”
  said Deputy Prime Minister Sikorski. The top diplomats concluded that Russia’s repeated
  attacks on people living in Ukraine call for the pressure on Russia to be sustained
  through another round of sanctions, including on the energy and the financial sectors.
  The ministers agreed that combatting the Russian clunker fleet should be a priority.
  Also discussed were the relations between the European Union and India, including
  a plan to bring the sphere of security and defence under the EU–India Partnership.
  As a result, Brussels and New Delhi may align their stances on Russia’s aggression
  against Ukraine. Another important item on the agenda was the reduction of Russian
  oil imports by India so as to prevent the aggressor from financing its war machine
  and continuing to disregard the universal standards of international law. The ministers
  also talked about a Free Trade Agreement (FTA) between the European Union and India.
  “We want the negotiated agreement to take into account not only the surging trade
  between Europe and India, but also questions that matter for businesses and ordinary
  people,” Deputy Prime Minister Sikorski said. Poland’s top diplomat reiterated that
  the European Union remains India’s largest trade partner. The Weimar Triangle was
  established in 1991 by the foreign ministers of Poland, France, and Germany with
  a view to overcoming European divides and bringing Poland closer to the European
  and Euro-Atlantic structures. At present, the format is a platform for the governments
  in Warsaw, Paris, and Berlin to pursue dialogue and seek joint solutions to European
  policy issues.
