title: Council of the Baltic Sea States debates security
text: 'Poland currently holds the one‑year presidency of the Council of the Baltic
  Sea States. Our country attaches great importance to political and practical cooperation
  within the Council, which is the only intergovernmental organisation that brings
  together all countries in the region, except Russia. As part of the presidency,
  the Polish MFA initiated meetings in the format of political directors of CBSS foreign
  ministries, the European External Action Service, and the Director General of the
  CBSS Secretariat, with the hope that this format will be continued by subsequent
  presidencies. The Polish MFA was represented by Adam Bugajski, Political Director
  and Director of the Security Policy Department. During the meeting, we emphasised
  that the Council should be able to respond more effectively to new regional security
  challenges. This expectation was included in the Declaration of CBSS Foreign Ministers
  adopted in Vihula (Estonia) in May 2025. Thursday’s meeting was an important step
  towards giving fresh impetus to the Council’s activities. The participants agreed
  about the need to maintain continued pressure—including sanctions—on Russia, to
  sustain support for Ukraine in its defence, and to work towards achieving a just
  and lasting peace that provides strong security guarantees for Kyiv. The second
  part of the meeting was devoted to hybrid threats from Russia in the Baltic Sea,
  including the activities of the “clunker fleet” and attacks on undersea critical
  infrastructure. Participants discussed possible actions to counter these threats.
  Poland’s contribution consisted of proposals addressing these challenges from the
  perspective of international law. Also discussed were preparations for the Council’s
  ministerial meeting scheduled for spring 2026. The Council of the Baltic Sea States
  was established in 1992 with Poland as one of its founders. The current members
  include Denmark, Estonia, Finland, Germany, Iceland, Latvia, Lithuania, Norway,
  Poland, Sweden, and the EU. The Council’s focus is on supporting political dialogue
  and cooperation, setting strategic priorities and guiding regional initiatives in
  line with the organisation’s long-term priorities: Regional Identity, Sustainable
  and Prosperous Region, and Safe and Secure Region. At present, the Council of the
  Baltic Sea States runs four main working groups: the Expert Group on Sustainable
  Maritime Economy, the Expert Group on Children at Risk, the Task Force Against Trafficking
  in Human Beings, and the Civil Protection Network.'
