title: Deputy Foreign Minister Ignacy Niemczycki attends Polish-Finnish political
  consultations
text: During the meeting, held in Warsaw on 27 January, both sides stressed the importance
  of cooperation between Poland and Finland in its bilateral and regional dimensions
  as well as within the European Union and NATO. Our relations are crucial for improving
  the security in the region and in Europe as a whole, especially in the context of
  protecting the EU’s and NATO’s Eastern flank. Close political cooperation between
  Poland and Finland boosts the interest in forging stronger economic links. At the
  meeting, diplomats highlighted the need to further advance bilateral cooperation
  in such sectors as raw material security, critical metals, nuclear energy, and defence.
  The discussion also focused on transatlantic relations. In this area, given the
  overall importance of the alliance with the United States, participants saw the
  need for European countries to work together when it comes to their relations with
  Washington. With regard to the ongoing war in Ukraine, interlocutors backed staying
  the course of Ukrainian integration with the European Union and advocated continued
  military, political, and economic support for the country.
