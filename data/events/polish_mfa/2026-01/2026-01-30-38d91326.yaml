title: Meeting between top diplomats of Poland and Luxembourg
text: 'When it comes to security, we share a clear understanding of NATO’s pivotal
  role and the importance of sustaining transatlantic cooperation Also, Minister Sikorski
  stressed that Luxembourg is one of the leading foreign investors in Poland, consistently
  ranking third in terms of the value of cumulative foreign direct investment. Regular
  bilateral contacts are clearly conducive to building a common position in wider-ranging
  cooperation fora. I hope that Poland’s relations with Luxembourg, our important
  partner in the EU and NATO, will continue to flourish in the spirit of friendship
  and good cooperation Deputy Prime Minister Xavier Bettel highlighted the importance
  of the European community: Today’s Europe is a Europe of freedom, a Europe of mobility,
  tolerance, values. Even though we have different history, different pasts, different
  cultures, we stand up with Poland for these values. We have multilateralism, we
  work together irrespective of whether we are in the north, the south, the east or
  the west, and whether we are small, medium, or large countries. We are building
  the strength of that Europe together. That strength comes into sight when we are
  united as 27 countries - said Minister Bettel. During the visit, Minister Sikorski
  presented Minister Bettel with the Grand Cross of the Order of Merit of the Republic
  of Poland in recognition of his contribution to the development of cooperation between
  the Republic of Poland and the Grand Duchy of Luxembourg. During the award ceremony,
  Minister Sikorski thanked Minister Bettel for his engagement in promoting European
  values, including measures against discrimination and initiatives fostering respect
  for the principles of equality and human dignity. Minister Sikorski said that decisions
  made by Deputy Prime Minister Bettel helped strengthen the security of Central Europe
  and confirmed solidarity with countries in the region.'
