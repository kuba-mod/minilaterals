title: Polish Ambassador to Denmark visits Greenland
text: In Nuuk, the ambassador met with members of the Government of Greenland, including
  Minister of Foreign Affairs and Research Vivian Motzfeldt and Minister of Fisheries,
  Hunting, Agriculture, and Self-Sufficiency Peter Borg. Talks focused on the possibilities
  for developing bilateral cooperation, especially within the context of the planned
  strengthening of the ties between the EU and Greenland, as well as on the prospects
  of working together on building resilience to threats and managing crisis situations.
  The ambassador also familiarised herself with the living and working conditions
  of Greenland’s small Polish community in the Arctic climate. The Poles on the island
  are mostly experts in construction, services, and tourism, as well as researchers.
  Polar studies remain a major field of cooperation between Poland and Greenland.
  The year 2027 will mark the 90th anniversary of the first Polish research expedition
  to Greenland. That historic endeavour underpinned the subsequent development of
  Polish polar studies and made a major contribution to geography and glaciology in
  Poland. Drawing on the many years of experience, cooperation in polar studies adds
  to opportunities for establishing closer relations between Poland and Greenland.
  The visit also sought to promote Polish literature. The Polish Embassy in Copenhagen
  stocked the main library in Nuuk with a dozen or so books by Polish authors translated
  into Danish. The donation included works by Olga Tokarczuk, Stanisław Lem, Andrzej
  Sapkowski, and Remigiusz Mróz, which are now available to the local readers.
