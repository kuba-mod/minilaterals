title: Deputy Prime Minister Radosław Sikorski attends World Economic Forum in Davos
text: 'From 21 to 23 January 2026, Poland’s top diplomat Radosław Sikorski took part
  in several Davos meetings on international security, geopolitical changes, and the
  situation in Ukraine. During talks with politicians, business leaders, and academia,
  he emphasised that Europe must strengthen its capacity to act independently while
  remaining open to international cooperation. The head of Polish diplomacy reiterated
  that the threat from Russia and our continued support for Ukraine remain in the
  focus. During the Ukrainian Breakfast, he said that: ''Poland is actually the only
  NATO and EU country that borders both Russia and Ukraine. If Ukraine does not end
  up within defensible borders as a result of the deal, we will be planting the seeds
  of the next war. To get to a fair deal, you have to put pressure not on the victim
  of aggression, but on the aggressor''. Poland’s deputy prime minister also expressed
  his appreciation to the Ukrainian people, who, despite difficult winter conditions
  and constant interruptions in gas and electricity supplies, are standing out against
  the aggressor in solidarity. At the Davos forum, Deputy Prime Minister Radosław
  Sikorski also met with Argentina’s Minister of Foreign Affairs, International Trade,
  and Worship Pablo Quirno. The ministers discussed economic and expert cooperation,
  Russia''s aggression against Ukraine, and a bilateral extradition agreement. Poland’s
  top diplomat also discussed cooperation within the G20 as well as enhancing trade
  and investment flow with South Africa’s Minister of International Relations and
  Cooperation Ronald Lamola. The experience and history of development of both countries
  can serve as a good example. Therefore, the ministers agreed that the exchange of
  good practices between Poland and South Africa, including on a regional level, is
  an important element of cooperation. Moreover, Minister Sikorski met with representatives
  of businesses keen to invest in Poland. During the talks, the foreign minister promoted
  the achievements of Poland''s transformation and the strength of our economy, emphasising
  that since 1990, Poland''s GDP per capita has increased more than eightfold, and
  last year saw Poland become one of the world''s twenty largest economies. Since
  1971, the World Economic Forum in Davos has been a meeting place for heads of state,
  business leaders, and members of academia. It is a platform for discussing the most
  important global challenges, such as security, the economy, climate change, and
  technological development. Polish representatives in Davos aim to promote the country
  as an attractive economic and investment partner.'
