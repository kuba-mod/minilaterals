title: The release of the Polish citizen detained in Venezuela
text: The MFA also notes the readiness declared by the current authorities in Caracas
  to develop relations with the European Union and the United States. Poland is ready
  to share its historical experience in the field of national reconciliation and to
  support Venezuelans in achieving a negotiated, democratic, inclusive, and peaceful
  resolution of the crisis.
