title: Talks on the future of Polish-German relations held in Warsaw
text: The officials agreed on the need for efficient implementation of the arrangements
  adopted during the Polish–German intergovernmental consultations held in Berlin
  on 1 December 2025. They emphasised the importance of joint efforts to strengthen
  security, develop transport infrastructure, and further deepen Polish–German dialogue.
  Deputy Minister Mościcka-Dendys referred to the Bundestag resolution from December
  last year to establish a permanent memorial in Berlin commemorating the Polish victims
  of World War II and German occupation.  She underscored the importance of historical
  education, particularly aimed at Germany’s younger generations. She also stressed
  the need to continue measures related to the restitution of looted cultural property
  to Poland. Separately, a broader discussion took place with representatives from
  the Ministries of the Interior and Administration, Infrastructure, Economic Development
  and Technology, and Culture and National Heritage. Coordinator Knut Abraham also
  met with Deputy Marek Krząkała, Chair of the Polish–German Parliamentary Group in
  the Sejm, to discuss interparliamentary cooperation and support for intersocietal
  and cross-border initiatives.
