title: Deputy Minister Henryka Mościcka-Dendys takes part in Polish-French consultations
text: 'The Treaty signed in Nancy on 9 May 2025 by French President Emmanuel Macron
  and Polish Prime Minister Donald Tusk entered into force on 22 January 2026. It
  covers military, economic, social, and cultural issues. The Treaty of Nancy’s impact
  and practical role are even greater today than they were at the time of its signing.
  Poland is ready to fully implement the Treaty in order to further strengthen its
  strategic partnership with France - said Deputy Minister Henryka Mościcka-Dendys.
  It was during these consultations that the action plan for implementing the Treaty''s
  objectives was discussed and priority areas of political, economic, and security
  cooperation were identified. The interlocutors emphasised the potential of joint
  defence projects (including those under the Security Action for Europe programme
  adopted in 2025), as well as energy and social projects. They also discussed European
  affairs, including the developments in Ukraine, EU enlargement, the agreement with
  Mercosur countries, and global issues. Deputy Minister Henryka Mościcka-Dendys emphasised
  the intensity of Polish-French relations at all levels, including between parliaments.
  She noted the enormous importance of a deeper and closer Polish-French dialogue
  in the context of growing instability in the international environment. She highlighted
  that close cooperation between European countries sharing views on international
  policy will be crucial in avoiding or mitigating various types of pressure: economic,
  social, or related to hybrid threats. Both sides also agreed on the need to further
  develop contacts in the cultural, social, and scientific areas, as well as in youth
  support.'
