title: Deputy Prime Minister Radosław Sikorski takes part in Foreign Affairs Council
text: The talks covered Russia’s aggression against Ukraine, and the situation in
  the Middle East and in the Great Lakes region. Another important item on the agenda
  was security. Russian attacks on Ukraine’s energy infrastructure prove that Russia
  is not interested in making peace. Therefore, we should continue to help Ukraine
  and put pressure on the aggressor", said Deputy Prime Minister Radosław Sikorski.
  He pointed out that Poland supports the reconstruction of Ukraine’s energy infrastructure
  and called on other member states to intensify their aid to Kyiv. The head of Polish
  diplomacy said he expects that the 20th sanctions package against Russia will soon
  be adopted. We need to impose sanctions on refineries that process Russian oil.
  This would supplement the sanctions we have on the clunker fleet", urged Deputy
  Prime Minister Sikorski. The head of the Polish MFA emphasised that we need to fulfil
  our commitments to NATO, including by allocating adequate resources for armaments.
  Poland can act as a role model. We’re off to a good start with the SAFE instrument.
  It’s EUR 150 billion for the most advanced types of armaments, and nearly one-third
  of that will go to Poland," added the minister. EU foreign affairs ministers also
  held an exchange of views with UN High Commissioner for Human Rights Volker Türk
  about priorities set for this year for the institution he heads, also in the context
  of Russia’s aggression against Ukraine and the situation in Belarus.
