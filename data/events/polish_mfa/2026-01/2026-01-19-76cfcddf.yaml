title: Deputy Prime Minister Radosław Sikorski visits India
text: The ministers reviewed the progress of the Strategic Partnership which both
  countries established in 2024. In light of the upcoming EU–India Summit, scheduled
  for 27 January, the topic of EU–India relations came to the fore. The diplomats
  also discussed economic relations, identifying the areas of close cooperation. Both
  sides considered mining, digital technologies, and the defence industry to be among
  the most promising sectors. Significant attention was paid to security-related matters.
  Deputy Prime Minister Sikorski and Minister Jaishankar talked about multilateral
  cooperation, including within the framework of the G20, and current international
  issues. Poland’s top diplomat emphasised that as we are witnessing “the world’s
  new constitutive moment”, the G20 might play a significant role in the evolving
  international landscape. He also reported on the current state of Russia’s war against
  Ukraine and underlined the importance of Europe’s commitment to this cause. Both
  ministers condemned terrorism. Both India and Poland are victims of transnational
  terrorism, and therefore we condemn the crossing of international borders, either
  by tanks or by terrorists, in the strongest terms. Poland has been faced with Russia-inspired
  attacks on critical infrastructure, including railway tracks, among other threats
  - said Deputy Prime Minister Radosław Sikorski. While in India, Minister Sikorski
  attended the Jaipur Literature Festival—one of the country’s most renowned cultural
  events, featuring the region’s most prominent opinion leaders. He reflected on the
  challenges ahead of Europe in the face of Russia’s aggression against Ukraine, geopolitical
  instability, and changing global power balance. Poland and the European Union attach
  great importance to their cooperation with India, which is reflected by the busy
  calendar of meetings and visits. The end of last year saw political consultations
  at the level of deputy ministers (1 December 2025) as well as a visit of the Ministry
  of Digital Affairs’ delegation at the Bengaluru Tech Summit (16–21 November 2025).
  This year began with a Weimar Triangle foreign ministers meeting in Paris with guest
  attendance from India’s External Affairs Minister (7 January 2026). The foreign
  minister’s recent visit is part of a series of planned bilateral and EU-level meetings
  hosted by India in which Poland plays an active role, namely the EU–India Summit
  (27 January), the India–EU Forum (6–7 February), the AI Impact Summit (19–20 February),
  and the Raisina Dialogue (5–7 March). Poland and India established diplomatic relations
  in 1954. The history of consular relations dates back to 1933, when the Polish Consulate
  General in Bombay (now Mumbai) was opened. An important episode in the history of
  our bilateral relations is linked to the help thousands of Polish orphans received
  from India during World War II.  After a period of weakened relations in the 1990s
  following Poland’s transition and India’s economic reform, bilateral ties were reinvigorated
  thanks to India’s Prime Minister Narendra Modi’s 2024 visit to Poland and the Strategic
  Partnership established at that time. Indian citizens are the third largest group
  of foreign nationals in Poland.
