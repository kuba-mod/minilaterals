title: On Poland-UK relations in Warsaw
text: The ministers discussed bilateral relations. Poland and the United Kingdom maintain
  contacts based on strategic partnership. The two countries cooperate closely in
  political terms as well as in the spheres of security, defence, economy, and culture.
  They regularly hold high-level consultations, both bilaterally and in the framework
  of broader international initiatives. Talks about Russia’s aggression against Ukraine
  and the prospects for ending the Russia–Ukraine conflict were high on the visit’s
  agenda. Both Poland and the United Kingdom unequivocally support Ukraine’s sovereignty
  and territorial integrity. The two states agree that the terms of ending the war
  must be in line with international law. They jointly support Ukraine in political,
  military, and diplomatic terms, including by coordinating the measures taken within
  the coalition of the willing and NATO. Also, Warsaw and London take a similar stand
  on Russia. They opt for maintaining sanctions and increasing international pressure
  until the aggression is over.
