title: Deputy Prime Minister Radosław Sikorski visits Republic of Namibia
text: Foreign Minister Radosław Sikorski’s visit to Namibia is in line with Poland’s
  foreign policy towards the African continent, which includes, but is not limited
  to, the development of trade and investment cooperation. Talking with Minister of
  International Relations and Trade Selma Ashipala-Musavyi, Radosław Sikorski underlined
  his willingness to further enhance the dialogue between both countries and noted
  the renewed partner dialogue with the EU in 2025. Speaking for my European colleagues,
  I would like to thank you for hosting successful Namibia–EU Business Forum in Windhoek
  last month. Such engagements confirm that both sides are open to working together,
  as predictable, stable partners The foreign ministers of Poland and Namibia expressed
  their satisfaction with the growing relations between both countries and expressed
  their willingness to step up political, economic, and scientific dialogue. I am
  glad that we had a chance to confirm our friendly relations and discuss many opportunities
  that our two countries see in the areas of trade, investment, science, and cooperation
  within multinational organizations - stressed Deputy Prime Minister Sikorski. Discussions
  also covered the regional and international situation. The interlocutors reaffirmed
  the importance of respecting the rule of the sovereignty of states and international
  legal norms. Minister Sikorski also visited the world's largest ground-based gamma-ray
  astronomical observatory, the High Energy Stereoscopic System (HESS), which brings
  together research teams from the Nicolaus Copernicus Astronomical Center of the
  Polish Academy of Sciences, the Jagiellonian University, the University of Lodz,
  and the National Centre for Nuclear Research.
