title: Statement by Foreign Minister Wadephul ahead of his trip to Lithuania
text: 'Foreign Minister Wadephul issued the following statement on 5 January 2026
  prior to his departure for Lithuania: With my first trip abroad in the new year,
  my intention is to define our foreign and security policy priority. We must counter
  the threat from Russia with strong European cohesion. In this context, it is vital
  that we are prepared to defend ourselves and our freedom more independently. Germany
  and Lithuania are in complete agreement in this situation: only resolute action
  can help us to steer Russia away from ever more escalation. In order to achieve
  this, we are working hand in hand with Lithuania and our partners in NATO and the
  EU – with more control measures on the Baltic Sea, with greater vigilance and with
  investment in more robust infrastructure. The NATO operation Baltic Sentry has already
  proved its worth in this regard. My talks in Lithuania will address, among other
  things, ways to cooperate even more closely to ward off the diverse Russian threats
  – for Vilnius and for Berlin. I will also be visiting the German brigade currently
  being established in Lithuania. The fact that Germany is stationing such a brigade
  abroad for the first time is an indication of how serious the situation is, but
  also of the strength of our resolve to stand by our friends and allies. The immense
  trust being placed in us in this connection, also by the people of Lithuania, is
  both a mark of recognition and an obligation. Another thing that unites us with
  our Lithuanian friends is our firm support for Ukraine – especially now, in this
  perhaps crucial phase of the international efforts to end Russia’s war of aggression.
  Here we are guided by our shared conviction that only a strong Ukraine and a resilient
  Europe can secure lasting peace on our continent.'
