title: Joint media statement – Australia-Germany 2+2 Ministerial Consultations
text: The third Security Policy Consultations between the Foreign and Defence Ministries
  of Australia and Germany convened today on 8 June 2026 at the level of Ministers.
  The Federal Minister for Foreign Affairs of Germany, Dr. Johann Wadephul, and the
  Federal Minister of Defence of Germany, Boris Pistorius, welcomed the Deputy Prime
  Minister and Minister for Defence of Australia, the Hon Richard Marles MP, and the
  Minister for Foreign Affairs of Australia, Senator the Hon Penny Wong, to Berlin.
  Australia and Germany are determined to address common and similar security and
  regional challenges in close cooperation, based on shared values and interests,
  including through our increasingly close bilateral cooperation, with the aim of
  promoting international peace, stability and the rules-based international order.
  Ministers unequivocally condemned Russia’s illegal war of aggression against Ukraine
  and demanded its complete and unconditional withdrawal. Both countries reaffirmed
  their call for a comprehensive and unconditional ceasefire as a first step towards
  a just and lasting peace and underscored their continued steadfast support for Ukraine.
  Ministers agreed that such support remains crucial, including via NATO . They called
  on support from the international community to increase the pressure on Russia,
  including for third countries to cease their direct and indirect support to Russia’s
  military, and for those with influence on Russia, particularly China, to play a
  positive role in achieving a just and lasting peace. Against the backdrop of expanding
  conflict and escalating humanitarian impacts in the Middle East, Australia and Germany
  called on all parties to uphold international law and protect civilian life. Ministers
  unequivocally condemned Iran’s dangerous escalations, particularly in and around
  the Strait of Hormuz, its attacks against merchant vessels, and threats of further
  attacks. They recognised the severe disruptions to the global economy and supply
  chains, and reaffirmed their shared commitment to open markets and rules-based trade
  in energy resources, liquid fuels, and downstream commodities. Ministers reiterated
  their support for a diplomatic resolution to the conflict and urged Iran to immediately
  and unconditionally restore free, safe and toll-free passage through the Strait,
  based on international law. Ministers recognised that economic security is critical
  to national security. They highlighted the importance of coordinated, strategic
  action aimed at building shared economic resilience working with like-minded powers.
  Ministers committed to building resilience through encouraging deeper cooperation
  between Europe and the Indo-Pacific, including with like-minded partners. They underlined
  the pivotal role of international law as the foundation of the international order
  and reaffirmed the importance of freedom of navigation and overflight as enshrined
  in the United Nations Convention on the Law of the Sea, noting that the 2016 South
  China Sea Arbitral Award is final and binding on the parties. Ministers underscored
  the importance of peace and stability across the Taiwan Strait and reaffirmed their
  shared opposition to any unilateral action to change the status quo by force or
  coercion. They reaffirmed that differences should be managed through dialogue and
  supported Taiwan’s meaningful participation in international organisations as a
  member where statehood is not a prerequisite, and as an observer or guest where
  it is. Ministers agreed to continue working together to support a peaceful, stable
  and prosperous Pacific region. They reaffirmed their shared commitment to COP31
  including the importance of the pre-COP in the Pacific and global support for Pacific
  island countries’ resilience. Ministers recognised the deteriorating international
  security environment and underscored the importance of strengthening defence cooperation.
  They committed to enhancing how our militaries exercise and cooperate, including
  by facilitating the movement of defence personnel and equipment through our respective
  territories and removing unnecessary barriers to operational collaboration. Following
  agreement in April 2026 to pursue a status of forces agreement, today Ministers
  announced the formal commencement of negotiations towards, and shared commitment
  to, reaching in-principle agreement of the text by the end of 2026. They also agreed
  to continue exploring opportunities for enhanced cooperation in space, discussed
  ways to bolster their defence industrial bases, and reaffirmed their close and trusted
  partnership in strengthening supply chain resilience and promoting economic growth.
  Ministers discussed the importance of cooperating on countering cyber and hybrid
  threats, as well as foreign information manipulation and interference, recognising
  the impacts of these challenges on democratic institutions and processes. They committed
  to ongoing cooperation to build collective responses, including in multilateral
  fora, to promote resilient, healthy, open, and fact-based environments. Ministers
  reaffirmed their steadfast support for international law and multilateral institutions,
  in particular the United Nations. Regarding the UN80 Initiative, Australia and Germany
  will work together and with partners, as well as with the United Nations and its
  agencies, in driving forward reform to build a more effective and efficient UN .
  They also reiterated their strong commitment to the multilateral economic and trading
  system, including the World Trade Organization and the G20.
