title: Rede von Außenminister Johann Wadephul anlässlich seiner Reise nach Lateinamerika
  beim Empfang in der Deutschen Botschaft in Buenos Aires
text: 'Sehr geehrte Damen und Herren, liebe Gäste, sehr geehrter Herr Botschafter,
  lieber Herr Lamlé! Zunächst einmal mein herzlicher Dank an Sie persönlich für Ihren
  Dienst und natürlich auch an Ihre Frau für die Gastfreundschaft. Danke, dass Sie
  extra Ihren Ruhestand nach hinten verschoben haben, um mich heute hier zu empfangen!
  Es ist mir wirklich eine große Freude, hier in Buenos Aires zu sein. Diese Reise
  wollte ich eigentlich schon im Frühjahr antreten; sie musste dann wegen des Krieges
  in Iran leider verschoben werden. Und jetzt muss ich zugeben: Während einer Fußball-Weltmeisterschaft
  nach Argentinien zu kommen, ist nicht unbedingt der einfachste Zeitpunkt für einen
  deutschen Außenminister. Aber in Paraguay gestern war es sogar noch ein bisschen
  schwieriger. Hier in Argentinien dreht sich ja gerade alles um Lionel Messi, den
  wir alle bewundern. Er hat gerade Miroslav Klose als Rekordhalter der meisten WM-Tore
  abgelöst hat. Aber natürlich wissen wir alle: Titel gewinnt man nicht allein, ein
  Star allein reicht nicht aus. Mit Mitspielern, die alle ihren Teil beitragen. Mit
  Partnern, auf die man sich verlassen kann. Und das, meine Damen und Herren, gilt
  nicht nur im Fußball, sondern auch für die internationale Politik. Auch Staaten
  brauchen verlässliche Partner. Nicht nur für die guten Zeiten. Sondern gerade dann,
  wenn die Herausforderungen – wie wir es im Moment auf der Weltbühne sehen – größer
  werden: In einer Zeit, in der Demokratien von innen und von außen unter Druck stehen.
  In einer Zeit, in denen Krisen und Kriege den politischen Alltag beherrschen. In
  einer Zeit, in der internationale Handelsrouten fragmentierter werden und es immer
  weniger internationale Regeln zu geben scheint. Genau jetzt braucht es Partner,
  die langfristig denken. Die Vertrauen aufbauen. Partner, die nicht nur kommen, wenn
  es etwas zu gewinnen gibt, sondern die dauerhaft bleiben. Argentinien ist für Deutschland
  ein solcher Partner. Und Deutschland auch umgekehrt für Argentinien. Dafür sind
  wir dankbar. Meine Damen und Herren, die historisch-kulturellen Beziehungen unserer
  beiden Länder sind untrennbar miteinander verwoben. Letztes Jahr haben wir zusammen
  ein besonderes Jubiläum gefeiert: „200 Jahre deutsche Einwanderung nach Argentinien“.
  Denn schon 1825 kamen die ersten deutschen Siedler hierher. Das war der Beginn einer
  langfristigen Migrationsgeschichte, die dieses Land bis heute in vielen Bereichen
  prägt: In den Cafés von Buenos Aires sieht man auch 2026 noch Bücher von Kafka,
  Freud und Goethe; allabendlich erklingt beim Tango porteño das Bandoneon – ein deutsches
  Instrument. Und ich habe gehört, – als gelernten Juristen freut mich das natürlich
  besonders – dass argentinischen Rechtsanwälten auch die deutschen Strafrechtler
  Jakobs und Roxin ein Begriff sind. Aber uns verbinden auch schwierige Kapitel unserer
  jeweiligen Vergangenheit: Unsere Länder eint das Bewusstsein, dass sich Geschichte
  nicht umschreiben lässt. Dass Erinnerungsarbeit und geschichtliche Aufarbeitung
  einen dauerhaften Platz in unserer Gesellschaft benötigen – gerade, wenn es um die
  jüngere Generation geht. An dieser Stelle möchte ich Argentinien – auch im Namen
  der jüdischen Gemeinde – dafür danken, dass Sie dieses Jahr den Vorsitz der International
  Holocaust Remembrance Alliance übernehmen. Als erstes lateinamerikanisches Land,
  das diesen Vorsitz innehat, sind Sie damit ein Vorbild für die ganze Region. Meine
  Damen und Herren, wir Deutschen haben manchmal den Ruf verschlossen zu sein. Das
  mag insbesondere für die Norddeutschen, wie mich, gelten. Wir brauchen – anders
  als Argentinier – oft eine gewisse Zeit, bis wir uns öffnen und Freundschaften schließen.
  Aber wenn wir einmal eine Freundschaft geschlossen haben, dann hält die auch! Lassen
  Sie mich zwei Beispiele nennen: Das deutsch-argentinische Hochschulzentrum ist für
  Deutschland etwas ganz Besonderes. Nur mit unserem europäischen Nachbarn und engen
  Partner Frankreich besitzen wir eine vergleichbare Struktur – wie mit Argentinien.
  Mehr als 40 Universitäten aus Argentinien und Deutschland bieten binationale Studiengänge
  mit Doppelabschlüssen an. Das heißt, dass die Studierenden nach ihrem Abschluss
  direkt für beide Arbeitsmärkte qualifiziert und einsatzbereit sind. Wenn unsere
  Universitäten also zusammenarbeiten, denken sie bereits an die nächste Generation.
  Und wenn deutsche Unternehmen investieren, tun sie das für Jahrzehnte. Siemens führte
  bereits 1857 sein erstes Projekt in Argentinien durch: die Installation einer Telegrafenlinie
  entlang der ersten Strecke der Ferrocarril del Oeste. Und auch am Bau des Obelisken,
  dem wohl bekanntesten Wahrzeichen von Buenos Aires, war das deutsche Unternehmen
  maßgeblich beteiligt. Heute, nach unseren gemeinsamen – und man muss schon sagen
  historischen – Fortschritten in diesem Jahr beim EU -MERCOSUR-Abkommen – ist es
  an uns allen, dieses mit Leben zu füllen und unsere wirtschaftliche Partnerschaft
  weiter zu stärken! Argentinien verfügt über wichtige Rohstoffe – wie Kupfer und
  Lithium. Deutschland hingegen hat die nötige Spitzentechnologie, um diese Rohstoffe
  zu verarbeiten. Dafür steht auch das langfristige Abkommen über den Export von argentinischem
  Flüssigerdgas nach Deutschland, das vor kurzem abgeschlossen wurde. Genauso wie
  das neue Daimler-Truck-Werk in Zárate. Aber – und damit richte ich mich besonders
  an die anwesenden Unternehmensvertreterinnen und Vertreter – wir können und müssen
  diese Partnerschaft noch weiter ausbauen. So können wir gegenseitig voneinander
  profitieren! Meine Damen und Herren, Deutschland ist leider nicht mehr Teil der
  Weltmeisterschaft, aber wir werden die lateinamerikanischen Teams anfeuern und mit
  Ihnen fiebern. Wir freuen uns auf eine weiterhin spannende WM! An dieser Stelle
  möchte ich mit den Worten von Botschafter Lamlé: Argentinien gehört mit uns zur
  westlichen Familie. In diesem Sinne: Auf einen schönen Abend! Ich freue mich nun
  auf die persönlichen Gespräche mit Ihnen.'
