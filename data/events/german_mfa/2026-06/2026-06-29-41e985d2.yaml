title: Außenminister Wadephul vor seiner Abreise nach Washington D.C., Paraguay, Argentinien
  und Brasilien
text: 'Vor seiner Abreise nach Washington D.C., zum MERCOSUR-Gipfel in Paraguay, nach
  Argentinien und Brasilien erklärte Außenminister Wadephul heute (29. Juni 2026):
  In einer Welt der globalen Umbrüche und Multi-Krisen wahren wir unsere Kerninteressen
  nur in starken Partnerschaften. Freiheit, Sicherheit und Wohlstand: Diese Ziele
  leiten mich als Außenminister. Dabei wissen wir uns als Deutsche und Europäer eng
  verbunden mit unseren natürlichen Partnern auf dem amerikanischen Doppelkontinent.
  Deshalb reise ich erneut nach Nord- und Südamerika. Die USA sind und bleiben unser
  wichtigster Partner außerhalb Europas. Wir sind Alliierte bei der Verteidigung unserer
  Freiheit. Unsere euro-atlantische Sicherheit hängt entschieden davon ab, dass wir
  auch in Zukunft so entschlossen wie bisher in der NATO zusammenstehen. Aus gutem
  Grund wagt Putins Russland nicht, ein NATO -Mitglied anzugreifen: Unsere kollektive
  Abschreckung wirkt. Mit meinem Amtskollegen Marco Rubio werde ich beraten, wie wir
  beim NATO -Gipfel kommende Woche in Ankara eine neue Lastenteilung im Bündnis und
  eine stabile, langfristige Unterstützung der Ukraine erreichen können. Eine Unterstützung,
  die Moskau zur Erkenntnis gelangen lässt, dass es endlich Zeit ist, das Töten in
  der Ukraine zu beenden und an den Verhandlungstisch zu kommen. Die Ukraine ist längst
  zu Frieden bereit – und wir Europäer dazu, sie nach Kräften zu begleiten. Mit Blick
  auf die destabilisierende Rolle des Iran im Nahen und Mittleren Osten und darüber
  hinaus eint uns das Ziel, dass aus der Rahmenvereinbarung zwischen den USA und Iran
  eine dauerhafte und tragfähige Lösung entstehen kann. Gerade Irans riskante Strategie
  um die Straße von Hormus verdeutlicht: Sicherheitspolitik und Wirtschaftspolitik
  sind nicht voneinander zu trennen. Für eine große Volkswirtschaft wie Deutschland
  hängen Sicherheit und globales Gewicht auch maßgeblich von unserer Wirtschaftskraft
  ab. Je mehr Handelskonflikte und Krisen weltweite Lieferketten empfindlich treffen,
  umso mehr müssen wir uns wirtschaftlich breiter und widerstandsfähiger aufstellen.
  Das EU -Mercosur-Freihandelsabkommen ist ein Meilenstein für den Handel und bietet
  für Deutschland und Europa ein riesiges Wachstumspotenzial. 31 gefestigte Demokratien
  mit über 700 Millionen Einwohnern, die 20% des weltweiten BIP ausmachen, stehen
  für Freihandel statt Zölle, für Wettbewerb statt Protektionismus. Beim Mercosur-Gipfel
  in Paraguay und bei meinen Gesprächen in Argentinien und Brasilien möchte ich ausloten,
  wie aus der größten Freihandelszone der Welt konkret Wachstum und Wohlstand für
  beide Seiten entstehen können. Die Weichen dafür sind gestellt. Für deutsche Unternehmen
  gilt es, die Chancen in den Mercosur-Staaten nun zu ergreifen. Deshalb begleiten
  mich auch Unternehmensvertreter aus den Bereichen Energie, Sicherheit und Verteidigung
  und Rohstoffe. Gerade bei Seltenen Erden und kritischen Mineralien haben wir die
  Chance, unsere Lieferketten mit Südamerika zu diversifizieren und gleichzeitig für
  nachhaltige Wertschöpfung zu sorgen. Dies wird auch im Zentrum meiner Gespräche
  in Argentinien und Brasilien stehen. Brasilien und Deutschland sind strategische
  Partner. Erst vor wenigen Monaten war Brasilien Gastland der Hannover Messe, in
  deren Rahmen Regierungskonsultationen stattgefunden haben. Die brasilianische Wirtschaft
  bietet eine immense Innovationskraft, auch im Bereich nachhaltiger Transformation.
  Wir wollen zudem gemeinsam daran arbeiten, dass noch mehr der hervorragend ausgebildeten
  und bei uns dringend benötigten Fachkräfte ihren Weg auf unseren Arbeitsmarkt finden.
  Mit Paraguay, Argentinien und Brasilien teilen wir nicht nur wirtschaftliche Interessen.
  Uns einen freiheitlich-demokratischen Gesellschaften und das klare Bekenntnis zu
  einer stabilen internationalen Ordnung, die auf Regeln beruht. Unsere Verbundenheit
  reicht bis tief in die Gesellschaften selbst: In Teilen Argentiniens hat fast ein
  Drittel der Bevölkerung deutsche Wurzeln. In Brasilien ist Deutsch die am zweitmeisten
  gesprochene Sprache. Gerade während der WM auf dem amerikanischen Kontinent ist
  die gemeinsame Fußballleidenschaft zu spüren. Deshalb freue ich mich besonders auf
  einige Ballwechsel mit jungen Sportlerinnen und Sportlern, gemeinsam mit dem deutsch-brasilianischen
  Fußballer Cacau, der mich als Sportbotschafter begleitet. Gemeinsam wollen wir den
  menschlichen und kulturellen Kitt, der unsere Länder jetzt schon verbindet, in die
  Zukunft tragen.'
