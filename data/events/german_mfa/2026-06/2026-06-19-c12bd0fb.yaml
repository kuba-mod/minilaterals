title: Tag der offenen Tür im Auswärtigen Amt am 20. und 21. Juni 2026
text: 'Am 20. und 21. Juni 2026 lädt die Bundesregierung zum Tag der offenen Tür ein.
  Im Auswärtigen Amt können Besucherinnen und Besucher einen Blick hinter die Kulissen
  deutscher Außenpolitik werfen, Diplomatinnen und Diplomaten kennenlernen und Außenminister
  Wadephul ihre Fragen stellen. Wie kann man in Krisen und Konflikten, bei Dürren
  oder nach Erdbeben wirksam Hilfe leisten? Wie funktioniert die Zusammenarbeit in
  EU , NATO und UN ? Wo überall in der Welt ist Deutschland vertreten? Wie organisiert
  man einen Staatsbesuch? Und wie können unsere Kolleginnen und Kollegen Deutsche,
  wenn sie im Ausland in eine Notsituation geraten, unterstützen? Wir stellen die
  ganze Bandbreite der Außenpolitik vor. In verschiedenen Dialogformaten wollen wir
  mit Bürgerinnen und Bürgern ins Gespräch kommen, deutsche Außenpolitik diskutieren
  und uns den Fragen dazu stellen. Wer danach Lust auf mehr hat, erfährt alles über
  Karrieremöglichkeiten im Auswärtigen Dienst. Besondere Akzente setzen in diesem
  Jahr die Partnerländer USA , Frankreich und Zypern, die mit eigenen Beiträgen, kulturellen
  Einblicken und kulinarischen Angeboten vertreten sind. Darüber hinaus stellen sich
  erneut internationale Organisationen und zivilgesellschaftliche Im Kinder- und Familienbereich
  können sich bereits die Kleinsten spielerisch an politische Themen wagen. Kreative
  Mitmachangebote und eine Kinder-Rallye sorgen dafür, dass auch die jüngsten Besucherinnen
  und Besucher Diplomatie hautnah erleben können. Ein Höhepunkt des Wochenendes ist
  das Bürgerforum mit Außenminister Johann Wadephul am Sonntag, bei dem Bürgerinnen
  und Bürger direkt mit dem Minister ins Gespräch kommen und ihre Fragen zur deutschen
  Außenpolitik stellen können. Ort: Auswärtiges Amt Werderscher Markt 1 10117 Berlin
  Öffnungszeiten: Samstag und Sonntag, jeweils 10:00–18:00 Uhr, letzter Einlass: 17:30
  Uhr Bürgerforum mit Außenminister Johann Wadephul: Sonntag, 14:30-15:30 Uhr'
