title: Gemeinsame Erklärung der Internationalen Kontaktgruppe für die Großen Seen
  (ICG)
text: 'Unter dem Vorsitz von Schweden geben Belgien, Dänemark, Deutschland, Frankreich,
  Kanada, die Niederlande, Schweden, die Schweiz, das Vereinigte Königreich, die Vereinigten
  Staaten von Amerika und die Europäische Union folgende Erklärung zur Lage in der
  Region der Großen Seen ab: Die ICG nahm an der vom Büro des Sondergesandten des
  VN -Generalsekretärs für die Region der Großen Seen und der Schweiz vom 17.-18.
  Juni in Nairobi organisierten Tagung der Akteure und Fachleute der Großen Seen (
  Great Lakes Stakeholders and Experts Retreat ) teil. Die ICG tauschte sich mit den
  Unterzeichnerstaaten des Rahmenwerks für Frieden, Sicherheit und Zusammenarbeit,
  Vertreterinnen und Vertretern regionaler und internationaler Vermittlungs- und Fazilitatorenteams,
  Regionalorganisationen, einschließlich der Afrikanischen Union ( AU ), der Ostafrikanischen
  Gemeinschaft (EAC), der Internationalen Konferenz der Region der Großen Seen (ICGLR)
  und der Entwicklungsgemeinschaft des Südlichen Afrika ( SADC ), sowie unabhängigen
  Fachleuten und Vertreterinnen und Vertretern der Zivilgesellschaft aus. Bei dem
  Treffen wurde Bilanz der Friedens-, Sicherheits- und Wirtschaftsdynamik in der Region
  der Großen Seen gezogen. Dazu gehören die fortgesetzten Bemühungen durch den Vermittler
  der Afrikanischen Union und die Ko-Fazilitatoren, die im Rahmen der Washingtoner
  Vereinbarungen über Frieden und Wohlstand unter Leitung der Vereinigten Staaten
  erzielten Fortschritte und die leitende Vermittlungsarbeit Katars im Doha-Prozess.
  Eine Reihe konkreter Optionen zur Unterstützung laufender Friedensbemühungen wurden
  festgehalten und die Umsetzung bereits gemachter Zusagen geprüft. Am 19. Juni kam
  die ICG in Addis Abeba mit dem Vertreter des von der AU ernannten Vermittlers Faure
  Gnassingbé, Präsident des Ministerrats der Republik Togo, und dem Sondergesandten
  des VN -Generalsekretärs für die Region der Großen Seen mit dem Ziel zusammen, den
  Dialog und die Zusammenarbeit mit der AU weiter zu vertiefen. Die Delegation hielt
  Treffen mit dem Vorsitzenden der Kommission der Afrikanischen Union, S.E. Mahmoud
  Ali Youssouf, dem Kommissar für politische Angelegenheiten der AU , S.E. Bankole
  Adeoye und der von der AU ernannten Fazilitatorin und früheren Präsidentin Äthiopiens,
  I.E. Sahle-Work Zewde ab. Der Schwerpunkt der Gespräche lag auf den derzeitigen
  Entwicklungen in der Region der Großen Seen, der Komplementarität der Vermittlungsbemühungen
  und der humanitären Lage im Osten der Demokratischen Republik Kongo, einschließlich
  des aktuellen Ebola-Ausbruchs. Zudem nahm die Delegation einen zielgerichteten Dialog
  mit den Vertreterinnen und Vertretern der AU über Partnerschaften für nachhaltigen
  Frieden auf. Die Delegation hielt ferner Konsultationen mit zivilgesellschaftlichen
  Partnerinnen und Partnern und Forscherinnen und Forschern aus der Region der Großen
  Seen ab, einschließlich Vertreterinnen und Vertretern von Frauen und Jugendlichen,
  unter Beteiligung der Sondergesandten der AU zu Frauen, Frieden und Sicherheit,
  I.E. Liberata Mulamula. Die ICG unterstreicht, wie wichtig es ist, den Perspektiven
  der Zivilgesellschaft und der Gemeinschaften in der Region Rechnung zu tragen. Die
  Vermittlung unter afrikanischer Führung, die durch ein starkes regionales Engagement
  unterstützt wird, bleibt von zentraler Bedeutung, wenn es darum geht, einen dauerhaften
  Frieden in der Region der Großen Seen zu erreichen. Die ICG bekräftigt ihre Unterstützung
  für die laufenden Friedensbemühungen durch den von der AU ernannten Vermittler,
  Faure Gnassingbé, Präsident des Ministerrats der Republik Togo, sowie das Panel
  der Fazilitatoren, die Kommission der AU und regionale Partner. Wir würdigen die
  bisher durch die Vermittlung unter der Führung der AU erzielten Fortschritte und
  sehen den nächsten Schritten erwartungsvoll entgegen. Die ICG unterstützt die fortgesetzten
  Bemühungen aller Vermittlerinnen und Vermittler mit dem Ziel, Kooperation und Komplementarität
  zwischen der AU , dem Verhandlungsstrang von Washington und dem Verhandlungsstrang
  von Doha sicherzustellen. Die ICG ruft alle Konfliktparteien dazu auf, diese Dynamik
  zu nutzen und sich konstruktiv am Dialog zu beteiligen. Es kann keine militärische
  Lösung für den Konflikt geben.'
