title: Staatsminister Gunther Krichbaum vor seiner Abreise nach Wien
text: 'Vor seiner Abreise nach Wien erklärte Staatsminister Gunther Krichbaum heute
  (18.06.2026): Mit unseren österreichischen Nachbarn verbindet uns eine tiefe Freundschaft
  und enge Partnerschaft. In der Europäischen Union schauen wir auf wichtige Zukunftsfragen
  aus einer ähnlichen Perspektive: die Integration der Staaten des Westlichen Balkans
  in die Europäische Union, die Aushandlung des Mehrjährigen Finanzrahmens oder die
  Gestaltung einer handlungsfähigen und wirtschaftlich starken Europäischen Union.
  Ich freue mich, den intensiven Austausch zu diesen und weiteren Themen mit meiner
  österreichischen Amtskollegin Claudia Bauer in Wien weiter vertiefen zu können.
  Der Staatsminister für Europa im Auswärtigen Amt und Mitglied des Deutschen Bundestags,
  Gunther Krichbaum, reist am 18.-19.06.2026 nach Wien, Österreich. Im Zentrum der
  Reise stehen Gespräche mit Europaministerin Claudia Bauer, Generalsekretär des Bundesministeriums
  für Europäische und Internationale Angelegenheiten Nikolaus Marschik sowie Vertreterinnen
  und Vertretern der österreichischen Zivilgesellschaft. Zentrale Themen sind die
  europapolitische Zusammenarbeit sowie die Vertiefung der bilateralen Beziehungen.'
