title: Staatsministerin Güler vor ihrer Reise in die Dominikanische Republik, nach
  Costa Rica und nach Jamaika
text: 'Staatsministerin Güler vor ihrer Reise in die Dominikanische Republik, nach
  Costa Rica und nach Jamaika (28.06.2026): Costa Rica, Jamaika und die Dominikanische
  Republik sind echte Partner, mit denen Deutschland seit vielen Jahren politisch
  und wirtschaftlich eng verbunden ist. Deutschland wendet sich verstärkt Lateinamerika
  und der Karibik zu – die jüngsten Reisen des Bundespräsidenten und des Bundesaußenministers
  zeugen davon. In dieser Region wollen wir politische Allianzen vertiefen und die
  wirtschaftlichen Verflechtungen ausbauen. Lateinamerika und die Karibik – diese
  Großregion umfasst mehr als 30 Staaten, von denen sich die meisten zu Demokratie
  und Rechtsstaatlichkeit, zu Marktwirtschaft und Sozialstaat, zu einer multilateralen,
  wertebasierten internationalen Ordnung bekennen. Es ist in unserem ureigensten Interesse,
  unsere Beziehungen zu ihnen umfassend ausbauen. Ich möchte mit meiner Reise unterstreichen,
  wie eng und partnerschaftlich wir zusammenarbeiten, und wie unsere Handelsbeziehungen
  in den letzten Jahren gewachsen sind. Für Deutschland und die karibischen Staaten
  gilt: Gemeinsam sind wir besser aufgestellt. Auf meiner Reise wird es darum gehen,
  wie wir noch enger zusammenarbeiten können – bilateral, regional und multilateral.
  In der Dominikanischen Republik beispielsweise werden wir uns intensiv über die
  Lage im Nachbarland Haiti und die Ende 2025 von den Vereinten Nationen neu geschaffene
  multilaterale Eingreiftruppe „Gang Suppression Force“ beraten. Deutschland unterstützt
  seit langem das Engagement der internationalen Gemeinschaft in Haiti. Wir werden
  ebenso über die wirtschaftliche Zusammenarbeit im Rahmen der Karibischen Gemeinschaft
  (CARICOM) sprechen. Und wir werden uns für die EU -Konnektivitätsinitiative Global
  Gateway starkmachen, die auch in Lateinamerika und der Karibik Infrastrukturpartnerschaften
  schafft und damit zur Resilienz von Lieferketten beiträgt. Zudem darf ich in Santo
  Domingo den Preis des Frauennetzwerks „Unidas“, eine 2019 von Deutschland mit lateinamerikanischen
  Partnern ins Leben gerufene Organisation, überreichen. Das verheerende Doppel-Erdbeben
  am Mittwoch in Venezuela macht uns tief betroffen. Es ist eine menschliche Katastrophe,
  in der die Weltgemeinschaft und wir in Deutschland solidarisch unterstützen. Auch
  das ist ein Signal an unsere Partner in der Region. Deutschland braucht mehr denn
  je verlässliche Partnerschaften in der Welt. Angesichts tiefgreifender geopolitischer
  Veränderungen müssen wir unsere Partnerschaften resilienter machen. Mit dieser Reise
  möchte ich unsere Zusammenarbeit in Mittelamerika und der Karibik festigen und an
  den neuen Dynamiken und weltpolitischen Veränderungen ausrichten.'
