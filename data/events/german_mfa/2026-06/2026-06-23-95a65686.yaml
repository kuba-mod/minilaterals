title: Gemeinsame Erklärung zur Lage in El Obeid
text: 'Deutschland, Frankreich, Irland, Italien, die Niederlande, Norwegen und das
  Vereinigte Königreich geben eine gemeinsame Erklärung zur Lage in El Obeid, Sudan,
  ab. Wir, die Außenministerinnen und Außenminister gleichgesinnter Partner (Deutschland,
  Frankreich, Irland, Italien, die Niederlande, Norwegen, Vereinigtes Königreich)
  sind zutiefst besorgt aufgrund der Berichte über den Angriff auf El Obeid, der trotz
  Forderungen nach einem Ende des Angriffs und dem Schutz der Zivilbevölkerung andauert.
  Letztes Jahr wurde die Welt mit Entsetzen Zeuge der Gräueltaten in Al-Faschir –
  Verbrechen, die dahin gehend bewertet werden, dass sie „Merkmale eines Völkermords“
  aufweisen. Wir dürfen nicht zulassen, dass sich Derartiges wiederholt. In den letzten
  Wochen wurden durch wiederholte Drohnenangriffe auf El Obeid Zivilistinnen und Zivilisten
  getötet und es wurde ein akuter Mangel an Treibstoffen, Lebensmitteln und Wasser
  verursacht. Während die Regenzeit immer näher rückt, leistet humanitäres Personal
  weiterhin lebensrettende Hilfe, wird jedoch gezielt angegriffen. Jetzt gibt es glaubhafte
  Anzeichen für eine unmittelbar bevorstehende Offensive. Dies ist ein entscheidender
  Moment, und die internationale Gemeinschaft muss handeln. Wir fordern die RSF auf,
  ihren Angriff unverzüglich einzustellen. Die Zivilbevölkerung muss sicher ausreisen
  können und alle Parteien müssen einen raschen, sicheren und ungehinderten humanitären
  Zugang gewährleisten. Die RSF und die SAF sowie ihre jeweiligen Verbündeten müssen
  deeskalieren, das humanitäre Völkerrecht einhalten und ihren Verpflichtungen im
  Rahmen der Erklärung von Dschidda nachkommen. Durch Unterstützung von außen wird
  dieser Konflikt weiterhin aufrechterhalten. Wir fordern jene, die den Konflikt anheizen,
  auf, dies zu unterlassen; jene, die Einfluss haben, müssen diesen ausüben, um weiteres
  Blutvergießen zu verhindern. Wir werden weiterhin eng im Sicherheitsrat der Vereinten
  Nationen und mit regionalen und internationalen Partnern zusammenarbeiten, um eine
  klare und geeinte Reaktion sicherzustellen: Die Gewalt muss ein Ende haben, die
  Zivilbevölkerung muss geschützt und die Verantwortlichen müssen zur Rechenschaft
  gezogen werden. Wir engagieren uns weiterhin dafür, einen glaubwürdigen Weg hin
  zu Frieden durch den vom Quintett geführten Prozess zu unterstützen und fordern
  alle Parteien auf, sich in redlicher Absicht zu beteiligen.'
