title: Speech by Foreign Minister Johann Wadephul at the 14th Conference of German
  Staff in International Organisations and European Institutions
text: 'These last two weeks, I spent more time in New York than here in Berlin. The
  way things turned out for Germany there – and we need to say this straight out –
  was a bitter disappointment. We stood firmly behind our campaign for a non-permanent
  seat on the Security Council, where we wanted to make an important contribution
  as one of the United Nations’ largest supporters. We did so because we so highly
  value our engagement in the UN , and in the other international organisations. The
  motto we chose for our campaign was “Respect. Justice. Peace.” It expressed our
  desire to assume responsibility for peace and security within the United Nations
  and to work to bolster the multilateral order. This remains valid. “Respect. Justice.
  Peace.” is at the core of what our German foreign policy stands for. Germany remains
  a reliable partner. We continue to take on responsibility around the world. The
  responsibility you assume is part of the big picture. It helps make multilateralism
  work. Therefore, I truly want to thank you all: Thank you for coming to Berlin –
  no matter how long your journey was. Thank you for taking it upon yourselves – for
  the first time in eight years – to attend this in-person gathering again. And thank
  you especially for the work that you do every day. For Germany. For Europe. For
  the world. With some 600 of you in attendance, it is almost impossible to pay tribute
  to the full breadth of activities you are engaged in: Some of you work at the United
  Nations, at NATO , in the EU and in all the many other European institutions. In
  financial and security organisations, at European and international courts of justice,
  in development programmes and in the sphere of humanitarian assistance. It is thanks
  to you that people from Germany have leverage and are involved in decision-making
  all around the world. You help make international cooperation work. International
  problems require joint solutions – because crisis, war and migration know no borders.
  As is the case for global supply chains, or for the effects of climate change. You
  all know that Russia’s war of aggression is directed not only at Ukraine, but also
  against the entire Euro-Atlantic security architecture, and against core tenets
  of international law. The war against Iran concerns us all, way beyond the region
  itself. Events in recent hours have once again made this clear. Around the world,
  we are feeling the impact on energy prices and supplies, on food and fertiliser,
  and we see the risk of new famines and food crises on the horizon. In the Sudan,
  we are witnessing one of the most severe humanitarian crises of our time. That is
  why, in April, representatives from numerous states and organisations convened –
  here, in this very hall – to collaboratively seek solutions to humanitarian suffering
  and displacement in the Sudan. These crises and conflicts cannot be resolved by
  any one state on its own. They can only be tackled through teamwork. By settling
  our differences of opinion at the negotiation table. By engaging in dialogue, rather
  than choosing isolationism. And by talking to each other, despite having – or should
  I say precisely because we have – different interests. This is how we, as Germans,
  would like to shape multilateralism. Many organisations – the United Nations, as
  well as the EU – urgently require reform. And indeed, this reform will to some extent
  also bring cuts in staff. What is important to me is that Germans are not disproportionately
  affected. Ultimately, strong institutions should adapt to, and reflect, changes
  in the world. They must remain capable of action. This adaptation to new realities
  is, by the way, also what is driving the structural reform at the Federal Foreign
  Office that we implemented this last weekend. This morning, all of the colleagues
  here at the Ministry took up their duties under the new roles they’ve been assigned
  in the new structure. As an organisation, we are now much more closely tailored
  to the needs of our present-day strategic environment. And the international and
  European organisations that you work for must do likewise: You need to adapt along
  with the geopolitical challenges, as they evolve. That is why, this May, I made
  six specific reform proposals for the European Union. Because we must become stronger
  and more effective as the EU – so that, as Europeans, we can help shape the tremendous
  transformations that are taking place around the world. Ladies and gentlemen, our
  shared task is not to administer multilateralism. Our task is to renew and invigorate
  it. Currently, some 9500 Germans work at just under 300 international organisations
  and European institutions. That’s an impressive number! At the same time, we know
  that, compared to our standing and our engagement – including our financial contributions
  – the figure could be even higher. Looking around here today, I realise that we
  need more people like you! We need more young professionals from Germany who are
  prepared to take on responsibility in Europe and the wider world. We want as many
  Germans as possible to succeed in their job applications – whether it be in the
  EU Competition for European civil servants or for positions at NATO , the UN Secretariat
  and other UN posts. You should know that I regularly also work to garner support
  for these candidatures within the Federal Government. This includes us at the Federal
  Foreign Office making working at an international organisation even more attractive
  and accessible to our own staff. Of course, letting go of the best people we’ve
  got is not exactly pleasant. But I know very well that, when these colleagues return,
  they bring with them a wealth of experience that they can put to excellent use here
  at the Ministry. The insight they’ve gained is of immeasurable value for our work.
  And this makes all of you a strategic resource for our country. I want us to put
  this added value to even better use. a Team Germany, if you will, that defines itself
  not only through roles and institutions, but through personal exchange, trust and
  mutual support. This means sharing experiences and opening doors for each other.
  Jointly ensuring that German expertise exists where international decisions are
  taken. And, vice versa, ensuring that your international expertise is present in
  those key places where national decisions are taken. Therefore, I urge you today
  to make good use of these two days in Berlin! Hand out all of your calling cards,
  and get digitally connected. Network, both amongst yourselves and especially with
  us, the Federal Foreign Office and the other Ministries. So that, as Team Germany,
  we can together assume responsibility for peace and security. Thank you very much
  for being here today. I look forward to our conversations.'
