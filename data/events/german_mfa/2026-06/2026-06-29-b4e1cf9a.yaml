title: Statement by Foreign Minister Wadephul prior to his departure for Washington
  DC, Paraguay, Argentina and Brazil
text: 'Before departing for Washington DC, the Mercosur Summit in Paraguay, as well
  as Argentina and Brazil, Foreign Minister Wadephul issued the following statement
  today (29 June 2026): In a world marked by global upheaval and multicrises, the
  only way for us to uphold our core interests is through strong partnerships. Freedom,
  security and prosperity – these are the goals by which I am guided as Foreign Minister.
  And we as Germans and Europeans are closely linked to our natural partners on the
  continents of North and South America. That is why I am again visiting both on this
  trip. The United States is and will remain our most important partner outside Europe.
  We stand together as allies in defending our freedom. Our Euro-Atlantic security
  decisively depends on us retaining our steadfast resolve within NATO in the future,
  too. It is for good reason that Putin’s Russia does not dare attack a NATO Member
  Country: our collective defence is effective. During talks with my counterpart Marco
  Rubio, I will discuss how, at next week’s NATO Summit in Ankara, we can achieve
  new burden-sharing within the Alliance, as well as stable, long-term support for
  Ukraine. Support that will make Moscow realise that the time has finally come to
  stop the killing in Ukraine and sit down at the negotiating table. Ukraine has for
  some time now been willing to make peace – and we Europeans are willing to provide
  all the support we can in this regard. With respect to Iran’s destabilising role
  in the Near and Middle East and beyond, we are united in working towards ensuring
  that the MoU between the US and Iran becomes a permanent and viable solution. Iran’s
  risky strategy regarding the Strait of Hormuz illustrates that security policy and
  economic policy are inextricably linked. For a major economy like Germany, security
  and global influence also depend significantly on our economic strength. The more
  that global supply chains are impacted by trade conflicts and crises, the more economically
  strong, diverse and resilient we must become. The EU -Mercosur free trade agreement
  is a milestone for trade and presents tremendous growth potential for Germany and
  Europe. 31 robust democracies with a combined population of more than 700 million
  that account for 20% of global GDP are placing free trade over tariffs, and competition
  over protectionism. At the Mercosur Summit in Paraguay and during my talks in Argentina
  and Brazil, I want to explore how the world’s largest free trade area can generate
  growth and prosperity for both sides. The preparations have been put in place. German
  companies must now seize the opportunities they have in the Mercosur countries.
  That is why I will be accompanied by business representatives from the energy, security
  and defence, and raw materials sectors. Especially with regard to rare earths and
  critical minerals, we have the opportunity to diversify our supply chains via South
  America and at the same time to build sustainable supply chains. This, too, will
  be a focus of my talks in Argentina and Brazil. Brazil and Germany are strategic
  partners. Only a few months ago, Brazil was the Partner Country at HANNOVER MESSE,
  and intergovernmental consultations were held in this context. Brazil’s economy
  has immense potential for innovation, including in the field of sustainable transformation.
  We also want to work together to give even more of the country’s well-trained skilled
  workers access to our job market, as they are urgently needed here. Our shared interests
  with Paraguay, Argentina and Brazil go beyond business. We all have liberal democratic
  societies and are firmly committed to a stable international order that is based
  on rules. Our ties extend deep into our respective societies: in parts of Argentina,
  nearly one-third of the population has German roots. In Brazil, German is the second
  most spoken language. Especially now that the World Cup is taking place on the American
  continent, our shared passion for football can be felt. I am therefore very much
  looking forward to having some time to play football with young players, during
  which I will be joined by the German-Brazilian footballer Cacau, who is travelling
  with me as sports ambassador. Together, we want to strengthen for the future those
  human and cultural connections that already tie our countries together.'
