title: Ansprache von Staatssekretär Géza Andreas von Geyr beim Abschlussempfang des
  Deutsch-Polnischen Forums
text: 'Zunächst mein sehr herzlicher Dank an Sie, Herr Regierender Bürgermeister,
  für die Einladung zu diesem schönen Empfang. Es ist etwas Besonderes, dass das Forum
  heute bei Ihnen im Roten Rathaus Berlins zu Gast sein kann – und das passt zu diesem
  heutigen Tag, der für unsere deutsch-polnische Geschichte eben auch ein ganz besonderer
  ist. Als heute vor 35 Jahren Bundeskanzler Kohl und Ministerpräsident Bielecki den
  Deutsch-Polnischen Freundschafts- und Nachbarschaftsvertrag unterzeichnet haben,
  war dies keine Selbstverständlichkeit. Dieser Vertrag hat ein neues Kapitel in den
  deutsch-polnischen Beziehungen aufgeschlagen. Für mich ist der Vertrag die Grundlage,
  dass wir, Deutsche und Polen, uns vertrauen und zugewandt sein können. Einander
  zugewandt gemeinsam Politik gestalten, Europa bauen. Es liegt an uns, dass wir das
  Beste daraus machen. Hierzu möchte ich drei Bemerkungen machen. Zunächst zur Politik
  und unseren gemeinsamen Aufgaben: Unsere beiden Außenminister haben heute Vormittag
  beim Forum den Stand unserer Beziehungen eingeordnet. Wichtiger aber noch: Sie haben
  hingewiesen auf die Herausforderungen, die jetzt und absehbar vor uns liegen – und
  diese Herausforderungen sind angesichts der Lage Europas und der Welt scharf und
  enorm. Ich will nicht in´s Detail gehen, nur so viel: Ich bin überzeugt, dass die
  drängendsten Fragen einer guten Zukunft Europas ein enges deutsch-polnisches Miteinander
  brauchen. Je enger Deutschland und Polen zusammenfinden, umso stärker die NATO ,
  umso besser die Sicherheit Europas. Je enger Deutschland und Polen zusammenfinden,
  umso handlungsfähiger die EU , umso wettbewerbsfähiger Europa. Umgekehrt beschreibt
  dies auch unsere gemeinsame Verantwortung: Wenn unser Miteinander nicht klappt,
  dann schwächt dies nicht nur uns, sondern Europa. Gerade weil derzeit der Blick
  auf unsere Beziehung durchaus kritisch ist, möchte ich ein Beispiel der Aktualitäten
  herausgreifen, und zwar ein so anspruchsvolles wie vielversprechendes: Sicherheit
  und Verteidigung gehören bestimmt zu den sensibelsten Bereichen bilateraler Beziehungen.
  Alle Staaten sind da besonders vorsichtig. Dass heute in Warschau ein Verteidigungsabkommen
  zwischen unseren Ländern unterzeichnet wurde, ist umso bedeutender. Dieses Abkommen
  kann, wenn mit Substanz gefüllt, ein wichtiges, ein starkes Stück deutsch-polnischen
  Miteinanders werden und zu einem starken Europa beitragen. Wir haben es selbst in
  der Hand. Meine zweite Bemerkung schließt daran an: Europa. Staaten, Nationen, können
  zwei Umstände nicht ändern: Ihre Geschichte und ihre Geographie. Dies charakterisiert
  Europa vielleicht mehr als andere Kontinente. So gilt es auch für Deutschland und
  Polen. Wir tragen weiterhin schwer an unserer Geschichte. Von deutschem Boden ist
  im vergangenen Jahrhundert unermessliches Leid über Polen gebracht worden. Aber
  wichtiger noch: Das wollen wir Deutschen nicht vergessen. Wichtig ist, was wir aus
  dem Nachdenken über unsere Geschichte machen, dass wir es zu einem möglichst gemeinsamen
  Nachdenken machen. Dass demnächst ein Denkmal hier in Berlin an die polnischen Opfer
  des Zweiten Weltkriegs und der Besatzung erinnern wird, ist wichtig und gut. Der
  Gestaltungswettbewerb hat begonnen, Ende des Jahres soll der Siegerentwurf präsentiert
  werden. Hier möchte ich auch sagen, dass ich mich sehr freue, dass heute mit Botschafter
  Janusz Reiter der Deutsch-Polnische Preis an jemanden ging, der wie kaum ein anderer
  den Wert von Geschichtsbewusstsein und Versöhnung für unsere beiden Länder und damit
  für Europa zu beschreiben weiß. Dass wir beide, Deutsche und Polen heute in Freiheit
  über unsere Geschichte nachdenken können ist ein Glück, das noch nicht allen Europäern
  vergönnt ist. Die Ukraine leidet seit viereinhalb Jahren unter der brutalen und
  durch nichts zu rechtfertigenden Aggression Russlands. Gerade erst in der Nacht
  von Sonntag auf Montag hat Moskau die Ukraine mit einem der härtesten Angriffswellen
  seit April 2022 überzogen: Über 600 Drohnen und über 70 Raketen. Es darf und wird
  dem Kreml nicht gelingen, seine Grenzen mit Gewalt zu verändern, seine Nachbarn
  zu dominieren und uns einzuschüchtern. Dass am gleichen Tag die EU -Beitrittsverhandlungen
  mit der Ukraine begonnen haben, zeigt unmissverständlich, wo wir die Zukunft der
  Ukraine sehen: bei uns! Zugleich hoffen wir, dass der andere Krieg an den Grenzen
  Europas, im Nahen Osten und am Golf, jetzt rasch ein Ende findet. Auch das ist deutsch-polnisches
  Interesse. Die gemeinsame Sorge und der gemeinsame Einsatz für Frieden und Freiheit
  in ganz Europa, Sicherheit an allen unseren Grenzen, das gehört heute zu uns, zu
  Polen und Deutschland. Wir dürfen den Blick unserer gemeinsamen Verantwortung als
  Deutschland und Polen nicht verengen, sondern werden ihn noch mehr weiten müssen
  – und dies auch immer wieder erklären müssen. Geschichte und Geographie: Polen und
  Deutschland, wir sind doch in jeder Hinsicht zwei wichtige Länder in der Mitte Europas.
  Auch daraus wächst gemeinsame Verantwortung. Wichtig ist: In welchen Konfigurationen
  auch immer wir als Europäer dies und jenes verhandeln: Polen kann sich darauf verlassen,
  dass wir nicht über seine Köpfe hinweg Politik gestalten. Meine dritte Bemerkung
  dreht sich um die Menschen. Wir sind Nachbarn, haben eine lange gemeinsame Grenze.
  Ich plädiere für einen offenen Blick: Bei all den Schwierigkeiten, die es immer
  wieder gibt: entscheidend ist und bleibt doch, dass unsere gemeinsame Grenze den
  Menschen heute so unendlich viel mehr Chancen bietet als Probleme. Deutsche und
  Polen leben weit weniger nebeneinander als miteinander. Sie wirtschaften miteinander,
  lernen, forschen, reisen, treiben Sport miteinander. Die Menschen freuen sich miteinander
  und sie leiden miteinander. Auch hier gilt: Es liegt an uns, was wir aus unserer
  Nachbarschaft machen. Das heutige Forum hat eindrucksvoll gezeigt: die für das Deutsch-Polnische
  Engagierten, unzählige Menschen machen viel daraus, sehr viel! Und es kann noch
  mehr werden, entscheidend sind Offenheit, Dialog und Empathie, ein geschichtsbewusster
  Blick in die Zukunft. Genau dazu passt das heute auch mit dem deutsch-polnischen
  Preis ausgezeichnete Projekt „Grenzerfahrungen“ der Städte Frankfurt (Oder) und
  Słubice . Zwei starke, innovative, sich zugewandte Verwaltungen! Bravo! Wenn schon
  Verwaltungen diese Zugewandtheit hinbekommen, dann doch die Menschen allemal. Eines
  der Vorhaben unserer beiden Regierungen ist: 60.000 Gratis-Bahntickets für junge
  Deutsche und Polen. Das ist ein tolles Angebot. Aber es liegt an den Menschen, was
  sie daraus machen: Wenn jeder der reist, dabei 10 Freundschaften schließt, dann
  haben wir damit 600.000 Menschen neu erreicht, oder noch mehr. Ich glaube: die Menschen
  sind der Politik und Bürokratie schon ein Stück weit voraus. Im Kleinen wird doch
  schon praktiziert, was wir als Regierungen manchmal noch umständlich wägen und diskutieren.
  Unsere beiden Länder sind sich auf ganz besondere Weise verbunden, wir haben ganz
  besondere Gestaltungsmöglichkeiten. Unser Verhältnis ist zu wichtig, es darf nicht
  zum Opfer innenpolitisch motivierter Instrumentalisierung werden. 35 Jahre deutsch-polnischen
  Freundschaftsvertrag: lassen Sie uns einander zugewandt sein, lassen Sie uns die
  vielen großen und kleinen Chancen entschlossen gemeinsam nutzen. Das ist gut und
  wichtig für uns - und das bringt Europa voran.'
