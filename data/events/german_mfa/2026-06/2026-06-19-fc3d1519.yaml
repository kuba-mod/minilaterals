title: Rede von Außenminister Johann Wadephul bei der Kiel Security Conference
text: 'Das Schwarze Meer, die Ostsee und der Nordatlantik unterscheiden sich hinsichtlich
  ihrer Lage und Eigenschaften grundlegend voneinander. Gemeinsam sind sie jedoch
  ein- und derselben Bedrohung ausgesetzt: Russland. Diese Bedrohung tritt heute nicht
  punktuell oder sporadisch auf. Wie ein Graben zieht sie sich durch Europa, entlang
  der russischen Grenze bis hoch in den Norden. Vom Schwarzen Meer bis hinauf in die
  Arktis versucht Russland, vermeintliche historische Ansprüche geltend zu machen
  und eine Einflusssphäre abzustecken. Es versucht, politischen Druck aufzubauen,
  Angst zu verbreiten und unser Bündnis zu spalten. Denn Europa und die NATO treten
  dieser Bedrohung geeint entgegen. Kiel ist durch die Ostsee ein naheliegender Konfliktschauplatz.
  In den letzten Jahren hat sie sich zu einem sicherheitspolitischen Brennpunkt entwickelt.
  Wir alle wissen: Die Ostsee ist von höchster Bedeutung für unsere kollektive Sicherheit.
  Sie bildet das östliche Ende der Seeverbindungslinien der NATO , die sich durch
  den Nordatlantik bis hin zur Ostküste Nordamerikas erstrecken. Russlands völkerrechtswidriger
  Krieg gegen die Ukraine, der im Jahr 2014 begann, hat in aller Deutlichkeit gezeigt,
  dass Putins Russland eine Gefahr für die Freiheit und Sicherheit in Europa und eine
  Bedrohung für die NATO darstellt. Insbesondere für jene Staaten, die direkt an Russland
  grenzen. Unsere baltischen Verbündeten haben viele Jahre lang vor dieser Gefahr
  gewarnt. Aber in den meisten europäischen Ländern stießen diese Warnungen auf taube
  Ohren, bis Russland völkerrechtswidrig und mit Gewalt die Krim besetzte und den
  Krieg nach Europa zurückbrachte. Als Reaktion darauf begann die NATO ab 2016, ihre
  Präsenz entlang der Nordostflanke anzupassen. Weil wir verstanden haben, dass die
  Grenzen der baltischen Republiken zu Russland und Belarus eine Schwachstelle der
  NATO -Nordostflanke bildeten. Heute würde sie niemand mehr als Schwachstelle bezeichnen.
  Die Präsenz der NATO hat sich vom „Stolperdraht“ hin zu einem transatlantischen
  Bollwerk entwickelt. Es ist übrigens auch eine Region, in der die europäischen NATO
  -Mitglieder bereits die volle Verantwortung für die Gewährleistung der eigenen Sicherheit
  übernehmen, mit Unterstützung starker Verbündeter von der anderen Seite des Nordatlantiks,
  wie Kanada. Wenn wir heute über die transatlantischen Beziehungen sprechen, dann
  dürfen wir nicht vergessen, dass unsere kanadischen Verbündeten sich mit Nachdruck
  als Rahmennation in Lettland engagieren. Denn wir alle haben verstanden, dass die
  Ostsee von zentraler Bedeutung für die Verteidigung des gesamten Bündnisses ist.
  Sie dient als strategische Route im Hinblick auf Verstärkung und Nachschubversorgung.
  Schweden und Finnland – die jüngsten NATO -Mitgliedstaaten – sind maßgeblich auf
  diese Versorgungsrouten über die Ostsee angewiesen. Und militärisch betrachtet bildet
  die Ostsee den maritimen Zugang nach Mitteleuropa. Und das ist der Grund, warum
  Russland die Ostsee zunehmend als Konfrontationszone betrachtet. Wir haben Sabotageakte
  erlebt, Spionageaktivitäten, Störungen von GPS-Signalen, das Eindringen von Drohnen
  und Kampfflugzeugen in NATO -Luftraum, die Durchfuhr von Schiffen der russischen
  Schattenflotte und die wiederholte Präsenz russischer Forschungsschiffe in der Nähe
  von kritischer Infrastruktur. Genau deshalb ist es so wichtig, dass das NATO -Manöver
  BALTOPS, das dieses Jahr zum 55. Mal stattfindet, weiterhin als große multinationale
  Marineübung in der Ostsee abgehalten wird. BALTOPS steht unter Führung der 6. US-Flotte.
  Später dürfen wir noch deren Kommandeur, Vizeadmiral Anderson, zu einer unserer
  Podiums-Diskussionen begrüßen. In einer Zeit, in der es viele Debatten um die Zukunft
  der NATO gibt, ist es immer sinnvoll, einen Blick auf die Einsatzrealität zu werfen.
  Und was wir hier in Kiel direkt vor uns sehen, ist klar. Während einige schon voreilig
  verlauten ließen, die transatlantische Zusammenarbeit würde schwächer werden oder
  stünde sogar kurz vor ihrem Ende, führt die 6. US-Flotte diese Übung konsequent
  seit 55 Jahren durch. Unser Bündnispartner USA erwartet von den europäischen Ländern,
  für ihre eigene Sicherheit einzustehen. Aber richtig ist auch: Dieser Gedanke kam
  nicht erst unter der derzeitigen US-Regierung auf. Schon lange vorher haben die
  Vereinigten Staaten darauf gedrängt, dass Europa die Themen Abschreckung und Verteidigung
  ernst nehmen muss. Inzwischen haben sich die Zeiten drastisch verändert. Heute investieren
  die meisten europäischen Länder nachhaltig in ihre Streitkräfte. Mit Blick auf die
  Bundeswehr muss ich zugeben, dass wir noch nicht da sind, wo wir hinwollen. In den
  letzten beiden Wochen hat die Deutsche Marine mit den Seestreitkräften vierzehn
  anderer Nationen das BALTOPS-Manöver durchgeführt. Gerade in Zeiten wie diesen sendet
  BALTOPS eine kraftvolle Botschaft an diejenigen, die das transatlantische Band gern
  geschwächt oder gekappt sähen. Aber offensichtlich hat sich Putin verkalkuliert.
  Heute sieht sich Russland in der Ostseeregion und auch darüber hinaus weit stärkeren
  NATO -Kräften gegenüber als noch vor ein paar Jahren. Dies ist das Ergebnis zunehmender
  Investitionen in unsere Streitkräfte. In der gesamten NATO müssen diese Investitionen
  noch weiter in Richtung des vereinbarten Zielwerts von fünf Prozent aufwachsen.
  Es ist ja ganz einfach: Die NATO sorgt für Europas Sicherheit. Deshalb ist das 5%-Ziel
  in Europas Sicherheitsinteresse. Indem wir in die NATO investieren, investieren
  wir auch in Europa. Und Deutschland engagiert sich hierbei in der Spitzengruppe.
  Aber hier in Kiel, mit all den eindrucksvollen Marineschiffen im Hafen, drängt sich
  noch eine andere Erkenntnis auf. Unsere Kapazitäten weiter aufzubauen und unsere
  Verteidigungsbereitschaft zu stärken, ist eine der drängendsten, aber auch schwierigsten
  Herausforderungen, vor denen unsere Streitkräfte heute allesamt stehen. Mehr Geld
  in unsere Sicherheit zu investieren, ist eine unbestreitbare Notwendigkeit – aber
  genauso wichtig ist es, Haushaltsmittel in echte militärische Fähigkeiten zu transformieren.
  Erst dann werden aus unseren Worten auch Taten. Ein Land, das uns Tag für Tag zeigt,
  wie man das macht, ist die Ukraine. Heldenhaft verteidigt sich die Ukraine im modernsten
  konventionellen Krieg unserer Zeit. Hier zeigt sich bereits, wie Kriege in der Zukunft
  geführt werden. Und während sich die meisten Beobachter auf den Kampf an Land konzentrieren,
  wird Russland auch im maritimen Bereich erfolgreich abgewehrt. Die Ukraine hat Russlands
  vermeintliche Seeüberlegenheit im Schwarzen Meer durch Innovation, moderne Technologie
  und einen unbeugsamen Kampfeswillen gebrochen. Als Russland 2014 völkerrechtswidrig
  die Krim besetzte und annektierte, begründete Putin das zum Teil damit, dass anderenfalls
  „die NATO -Flotte in Sewastopol, der Stadt russischen militärischen Ruhmes, anlegen
  würde“. Die NATO hatte nie ein solches Interesse an Sewastopol. Als Konsequenz seiner
  eigenen Handlungen hat Putin dann mitansehen müssen, wie ukrainische Drohnen wiederholt
  den Hafen von Sewastopol trafen, wie die „Moskwa“ versenkt und die russische Schwarzmeerflotte
  erheblich dezimiert wurde und ihre operative Bewegungsfreiheit verloren hat. Heute
  ist der Großteil dieser Flotte aufgrund der ukrainischen Seekriegsführung nicht
  mehr in Sewastopol, sondern in Noworossijsk stationiert. Statt die Seeherrschaft
  im Schwarzen Meer auszuüben, hat Putin Russlands maritime Einflussmöglichkeiten
  dort in weiten Teilen verspielt. Vom Ruhm der russischen Flotte ist nichts geblieben.
  Aber aus russischer Sicht ist etwas noch Wesentlicheres geschehen. Das Schwarze
  Meer ist wieder auf die strategische Landkarte westlicher Länder zurückgekehrt.
  Im vergangenen Jahr hat die Europäische Union erstmals eine Strategie für eine stabile
  und sichere Schwarzmeerregion verabschiedet. Dies ist ein erster wichtiger Schritt,
  um das Schwarze Meer wieder ins Zentrum des strategischen Denkens Europas zu rücken.
  Wir alle haben nun die Aufgabe, in dieser Weise strategisch umzudenken. Das Schwarze
  Meer ist von größter Bedeutung – heute, aber auch mit Blick auf die Zukunft. Denn
  jede künftige Friedensvereinbarung für die Ukraine muss auch die maritime Dimension
  des Krieges miteinbeziehen. Und auch das schwierige und fragile Gleichgewicht zwischen
  allen Schwarzmeer-Anrainerstaaten. Im Augenblick ist es allerdings ein umkämpfter
  Kriegsschauplatz. Der Ukraine ist es gelungen, einen Korridor für die lebenswichtige
  Wirtschaftsverbindung des Landes zu den globalen Märkten offenzuhalten. Auf diesem
  Weg kann sie die Getreideexporte aufrechterhalten, die für die globale Ernährungssicherheit
  von grundlegender Bedeutung sind. Dies unterstreicht auch die verschiedenen geopolitischen
  Rollen, die die Ukraine heute ausfüllt. Wir unterstützen die Ukraine finanziell
  und durch Militärhilfe. Gerade auch im maritimen Bereich liefern wir den ukrainischen
  Seestreitkräften Material und Know-how – und werden dies auch weiterhin tun. Ich
  danke der Deutschen Marine für ihre enormen Anstrengungen in dieser Hinsicht. Aber
  durch ihre eigene herausragende militärische Kompetenz hat sich die Ukraine von
  einem bloßen Empfänger von Sicherheitsleistungen zu einem Akteur entwickelt, der
  selbst Sicherheit gewährleistet und ein starker strategischer Partner ist. Unsere
  jüngsten bilateralen Regierungskonsultationen in Berlin im April haben dies unterstrichen.
  Wir haben unsere Zusammenarbeit zu einer strategischen Partnerschaft zwischen Deutschland
  und der Ukraine ausgeweitet. Deutschland ist als ein führendes Land in Europa der
  Ukraine verpflichtet. Das es liegt auch in unserem nationalen Interesse. Das ukrainische
  Know-How ist zum Maßstab für die Streitkräfte und Rüstungsindustrien in aller Welt
  geworden. wenn wir uns fragen, wie wir die Ostseeregion verteidigen sollen, müssen
  wir die Schwarzmeerregion in den Blick nehmen. Wir müssen den Nordatlantik und unsere
  strategischen Versorgungswege in den Blick nehmen. Wir müssen die Arktis und die
  wachsenden Herausforderungen im hohen Norden in den Blick nehmen, wo Russlands nukleare
  U-Boote NATO -Interessen bedrohen. Und wo auch China seine Präsenz und seinen Einfluss
  verstärkt. Im Moment gibt es wahrlich keinen Mangel an geostrategischen Konflikten.
  Glücklicherweise sind Vertreter von jedem der Schauplätze, die ich gerade genannt
  habe, heute hier vertreten. Lassen Sie uns nun gemeinsam die richtigen Schlussfolgerungen
  ziehen.'
