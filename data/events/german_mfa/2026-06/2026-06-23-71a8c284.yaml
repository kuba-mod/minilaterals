title: Rede von Außenminister Johann Wadephul beim Tag der Industrie 2026 des BDI
text: 'Im April schrieb ein Journalist über die Straße von Hormus sie sei „Schrödingers
  Seeweg“. Wir erinnern uns an schöne Stunden im Physik- oder Mathematikunterricht:
  gleichzeitig offen und geschlossen. So ein Status der Unberechenbarkeit ist für
  uns, sowohl in der Politik als auch in der Wirtschaft, nicht lange tragbar: Wenn
  Containerschiffe und Tanker plötzlich wochenlang feststecken, eine ganze Region
  den permanenten Drohgebärden aus Iran ausgesetzt ist und lang funktionierende globale
  Abläufe von heute auf morgen enden, dann wird die geopolitische Lage zu einem Alltags-Problem.
  Unser ganz normaler Alltag wird mit einem mal anders: Raketen, die wir nicht sehen,
  verändern den Sprit, den Spritpreis, den wir tanken. Ich weiß, es hätte die Straße
  von Hormus nicht gebraucht zur Diskussion darüber, wie die Wirtschaft in einem global
  vernetzten Industrieland wie Deutschland planbar bleiben kann. Es mangelt nicht
  an warnenden Beispielen aus unserem Land. Die Versorgung mit kritischen Rohstoffen,
  die volatilen Zölle für wichtige Exportmärkte oder auch die Frage nach dem europäischen
  Zugang zu führenden KI-Modellen: Das sind heute außenpolitische Fragen. Mit konkreten
  innenpolitischen Auswirkungen. Sie bestimmen die Arbeit meines Hauses, unsere Außenpolitik.
  Und ich bin mir der Lage unseres Landes bewusst. Aber mein Job bringt es mit sich,
  dass ich Deutschland sehr oft aus dem Ausland heraus betrachten darf. Deutschland
  ist eines der reichsten und sichersten Länder der Welt. Dass das in einer zunehmend
  fragmentierten Welt so bleibt, das sollte unser aller Auftrag sein. Meiner ist es
  in jedem Fall. Es reicht nicht, wenn wir rührselig „Exportweltmeister“ in den Untertitel
  unseres Landes schreiben. Wir müssen gemeinsam mit Partnern in der Welt investieren,
  produzieren, forschen, ausbilden. Dazu gehört auch: Auf gemeinsame Regeln setzen.
  Dass ich das als Außenminister betonen muss, sagt auch viel aus über die Welt, in
  der wir agieren. Gemeinsame Regeln, die für alle gelten und einen sicheren Handlungsrahmen
  bieten. Deswegen setzen wir im Auswärtigen Amt auf globale Partnerschaften, die
  auf unseren nationalen Interessen fußen. Und nach über einem Jahr im Amt kann ich
  sagen, dass dieses Konzept aufgeht. Globale Partnerschaften brauchen Verlässlichkeit.
  Deshalb legen wir, lege ich ja so viel Wert auf die Stärkung und Diversifizierung
  unserer Handelsbeziehungen. Wir machen das über moderne Handelsabkommen, die sind
  ein zentraler Baustein unserer Agenda mit globalen Partnern. Wir haben hier viel
  erreicht mit MERCOSUR, in der nächsten Woche bin ich dazu auch in Paraguay auf dem
  MERCOSUR-Gipfel und in Brasilien und Argentinien, mit Indien, mit Indonesien, mit
  Australien und mit Mexiko. Im nächsten Schritt müssen wir jetzt den Fokus auf eine
  rasche Umsetzung der Abkommen legen. Sie, die deutsche Industrie müssen sie auch
  aktiv nutzen! Und um jetzt einigen Befürchtungen zuvor zu kommen: Wir dürfen die
  Vorteile, die wir durch die neuen Abkommen erzielt haben, natürlich nicht gleich
  wieder durch gegenläufige EU -Regulierungen zunichtemachen. Und deswegen: Ja, wir
  unterstützen den Industrial Accelerator Act – aber er muss kohärent sein. Für uns
  als Bundesregierung ist deshalb wichtig: Es geht nur über “Made with Europe” , sprich
  eine grundsätzliche Gleichbehandlung von Freihandels- und assoziierten Wirtschaftspartnern.
  Daneben bleibt die Stabilisierung der EU -US Handelsbeziehungen ein bedeutendes
  Element unserer Handelspolitik. Die Fortschritte auf EU -Seite zur Umsetzung des
  Turnberry Agreements mit den USA waren wichtig. Und trotzdem sind wir hier weiterhin
  in einer instabilen Lage. Die erfordert, dass wir unsere Interessen – wenn nötig
  – effektiv schützen. “Moving the goalposts” und andauerndes Drohen mit neuen Zollmaßnahmen
  schadet den USA und uns. Und gleichzeitig ist der richtige geoökonomische Umgang
  mit China für unsere Wettbewerbsfähigkeit von größter Bedeutung. Wir müssen unsere
  kritischen Abhängigkeiten abbauen und unsere Resilienz stärken. Dabei spielt unser
  geoökonomischer Instrumentenkasten in der EU , auch die Handelsschutzinstrumente,
  eine wichtige Rolle. Es geht nicht darum, dass wir fairen Wettbewerb scheuen. Im
  Gegenteil: als Marktwirtschaft suchen wir den Wettbewerb, weil er Innovation und
  Effizienz fördert. Aber wir können marktverzerrenden, unfairen Wettbewerbspraktiken
  nicht tatenlos zusehen. Sowohl im EU -Binnenmarkt, als auch in Drittmärkten. Das
  geht aber nur im engen Schulterschluss mit der deutschen Industrie und mit Partnern.
  Und das, meine Damen und Herren, bringt mich wieder auf mein heutiges Kernanliegen
  zurück: Wie können wir, die deutsche Industrie und die Bundesregierung, in einer
  fragmentierten Welt ein Team Deutschland bilden, das mit unserem Land an der Spitze
  spielt? Wir setzen im Auswärtigen Amt dafür weiter auf das Drei-Säulen-Modell der
  Außenwirtschaftsförderung: Wir haben die Auslandshandelskammern in über 90 Ländern,
  die deutsche Unternehmen mit lokalen Märkten verbinden, rechtliche Sicherheit vermitteln
  und Delegationen und Kooperationsbörsen organisieren. Wir haben Germany Trade and
  Invest als Außenwirtschaftsagentur des Bundes, die weltweit für Deutschland als
  Investitionsstandort wirbt, Märkte analysiert und wirtschaftliche Chancen identifiziert.
  Und unsere Auslandsvertretungen schaffen Zugänge zu Märkten, vermitteln in schwierigen
  politischen Kontexten und schützen deutsche Unternehmen. Drei Säulen, ein Team,
  im Auftrag für unser Land. das heißt auch, dass wir beim Ausbau der globalen Partnerschaften
  noch enger als bislang zusammenspielen müssen. Ich setze mich dafür persönlich bei
  jeder Gelegenheit ein und einige von Ihnen waren ja auch schon auf Auslandsreisen
  dabei. Die Mitnahme deutscher Wirtschaftsvertreterinnen und -vertreter gehört zum
  Geschäft des Außenministers meines Erachtens dazu. Das habe ich geändert. Das ist
  regelmäßig der Fall, so auch nächste Woche auf dieser Reise nach Lateinamerika.
  Die Förderung der Interessen der deutschen Industrie ist unter meiner Leitung eine
  Priorität des Auswärtigen Amts geworden. Ich denke: Das sind wir Ihnen als dem Pfeiler
  des Wohlstands und damit auch der Sicherheit Deutschlands schuldig. Auch in einer
  konfliktreicheren Welt sehen wir: Es braucht Offenheit, um wirtschaftlich erfolgreich
  zu sein. Das gilt auch für die deutsche Außenpolitik. Mehr als früher werben wir
  heute aber um Vertrauen, setzen uns für den Erhalt von Regeln ein und suchen global
  Partner, die das mit uns angehen. Statt Rückzug hinter die Buchsbaumhecke, wie er
  von den Rändern des politischen Spektrums gefordert wird, brauchen wir mehr Vernetzung,
  mehr Partnerschaften, basierend auf unseren Interessen. Um unseren Wohlstand in
  und für Deutschland zu sichern. Das schaffen wir nur gemeinsam als Team Deutschland.
  Und ich bin dankbar für jeden und jede von Ihnen, der da mitzieht! Ich bleibe, um
  in der Fußballsprache zu bleiben, anspielbar, und hoffe, dass sie das auch sind.'
