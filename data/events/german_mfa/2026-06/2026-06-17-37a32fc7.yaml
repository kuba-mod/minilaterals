title: Joint Declaration by the Foreign Ministers of the Federal Republic of Germany
  and the Republic of Poland on the 35th anniversary of the signing of the Treaty
  between the Federal Republic of Germany and the Republic of Poland on Good-Neighbourliness,
  Friendship and Cooperation
text: The signing of the Treaty on Good-Neighbourliness, Friendship and Cooperation
  35 years ago marked a turning point in German-Polish relations, on which we look
  back with pride. Today, Germany and Poland are not only neighbours and friends,
  but close equal partners and reliable allies, firmly anchored together in European
  and Euro-Atlantic structures. Not only was the Treaty an important part of the process
  of German-Polish reconciliation following long periods of division and mistrust,
  it also marked the starting point for profound, trust-based cooperation on all levels
  of our society. The institutional and legal regulations established 35 years ago
  laid the foundations for today’s unprecedented level of German-Polish cooperation,
  which we primarily owe to the dedicated people in our countries. Since then, our
  countries have changed profoundly. Above all, we find ourselves in a fundamentally
  changed geopolitical environment, particularly in view of Russia’s comprehensive
  attack on Ukraine. In awareness of the tragic history of the 20th century, we bear
  a special responsibility for our region and our continent as allies in NATO and
  partners in the European Union. Russia’s aggression against Ukraine means that we
  face new political realities. Our response to it has become the yardstick of our
  responsibility and ability to act. Our joint commitment to strengthening European
  security is now a geopolitical necessity. The German-Polish contribution to securing
  the eastern flank is a good example of this. We welcome the signing of the new German-Polish
  Agreement on Defence Cooperation. It is testament to our determination to act together.
  The German-Polish partnership is, and will remain, a cornerstone of a strong, united
  Europe and a NATO that is able to defend itself. Russia’s aggressive actions, in
  particular those of a hybrid nature and in the field of disinformation, are also
  aimed at us. Their goal is to divide our societies, to destroy public order and
  to undermine trust in the state and its institutions. We will not be intimidated.
  We will successfully enhance our resilience and inform our societies. Our overarching
  aim remains the protection of European values, including the rule of law and free
  elections, and ultimately a lasting and just peace in Ukraine that strengthens European
  security. We take the lessons of the past seriously. “Never again should there be
  war” is not a hollow phrase, but a duty to future generations. In awareness of German
  guilt, our tragic history will always serve as a warning to us. Eighty-one years
  after the end of the Second World War, the last survivors are leaving us. We firmly
  believe that history can unite people. This requires mutual empathy, but also concrete
  measures in the spirit of the Joint Declaration of 1 December 2025 that go beyond
  mere symbolics. We welcome the steps being undertaken to erect a memorial in central
  Berlin to the Polish people – victims of the Second World War and Nazi tyranny between
  1939 and 1945 – and look forward to the outcome of the design competition towards
  the end of the year. We welcome the Federal Government’s decisions to date on returning
  stolen cultural property that belongs to Poland. Further returns will follow. Our
  economic cooperation is a source of particular satisfaction for us. Trade between
  Poland and Germany has multiplied in the past decades. Germany is among the three
  largest economies in the world. Poland is on the verge of becoming one of the 20
  largest economies. The structure and profile of our trade relations have fundamentally
  changed. This helps to foster mutual prosperity, the creation of new jobs and the
  development of civil-society ties. However, we need new impetus in order to make
  full use of the societal and economic potential. Our companies and citizens await
  the further development of cross-border infrastructure and the expansion of transport
  connections. Not only will this make them more mobile and facilitate trade, it will
  also strengthen our military potential. We also advocate more partnerships, especially
  in the fields in which our two countries see a particular need for action, ranging
  from dual-use technologies and digitalisation to the development of artificial intelligence.
  The European Union is the linchpin of our cooperation. Strengthening and stabilising
  it is in our strategic interest. In this regard, we would like to make a joint contribution
  to the future of the European Union. Given the increasing challenges, we are in
  no doubt that the European Union will become our most important source of protection
  and our most crucial instrument for asserting our interests at global level. Like
  the Treaty on Good-Neighbourliness, Friendship and Cooperation, the Weimar Triangle
  also turns 35 this year. More than any other political format, it stands for the
  regained unity and the solidarity in Europe. We are in agreement as regards continuing
  to use the Weimar Triangle for joint impetus in foreign and EU policy and in strengthening
  cohesion in the European Union. We also welcome the intensive interministerial cooperation
  in the Weimar format. The perception of German-Polish relations has fundamentally
  changed. We face different challenges today to those we faced in 1991. Poland and
  Germany can do more – our freedom, security and prosperity are at stake. As neighbours,
  friends and allies, we bear responsibility for the future. We will rise to this
  challenge by jointly ensuring that our future relations are even closer, doing so
  responsibly, sincerely and in a spirit of partnership in the interests of Europe
  as a whole.
