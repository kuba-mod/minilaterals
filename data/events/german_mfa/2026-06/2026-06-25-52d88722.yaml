title: Gemeinsame Erklärung des Auswärtigen Amts und des Bundesministeriums der Verteidigung
  zum schweren Erdbeben in Venezuela
text: 'Die beiden stärksten Beben des Jahres haben Venezuela erschüttert. Das massive
  Ausmaß der Zerstörung wird stündlich klarer. Unsere Gedanken sind bei den betroffenen
  Venezolanerinnen und Venezolanern, sie brauchen nun internationale Unterstützung.
  Für Deutschland steht fest: Wir wollen zügig und gezielt Hilfe leisten. Vor diesem
  Hintergrund fand heute eine koordinierende Sitzung des Krisenstabs der Bundesregierung
  im Auswärtigen Amt statt. Die einzelnen Ressorts sind zudem auch in Abstimmungsgesprächen
  mit den zivilen Hilfs- und Katastrophenschutzorganisationen. Venezuela hat am heutigen
  Nachmittag ein internationales Hilfeersuchen nach dem EU -Katastrophenschutzmechanismus
  gestellt. Auf der Basis der dort eingemeldeten, konkreten Bedarfe werden wir nun
  – europäisch abgestimmt – unsere Unterstützungsmöglichkeiten prüfen. Dafür stehen
  Hilfsgüter, wie etwa Wasserfilter, Feldbetten, Zelte oder Generatoren bereit. Das
  Auswärtige Amt ist bereits seit der Nacht mit den deutschen Einsatzteams in der
  Katastrophenhilfe und mit unseren internationalen Partnern in Kontakt. Noch heute
  brechen Vorab-Teams des THW und der Hilfsorganisationen @fire und I.S.A.R Germany
  gemeinsam mit den Kolleginnen und Kollegen aus der Schweiz zur genaueren Lageabklärung
  in die Region auf. Bereits jetzt sind außerdem viele Rettungsteams aus der Region
  unterwegs nach Venezuela, mit denen wir uns vor Ort koordinieren. Sechs Maschinen
  der Luftwaffe stehen für die Unterstützung bereit: Von diesen sechs taktischen Luftfahrzeugen
  kann eine Maschine auch in der sogenannten MedEvac-Rolle genutzt werden, um den
  medizinischen Krankentransport sicherzustellen. Die weiteren fünf Maschinen werden
  in der Standardkonfiguration für den Transport von Personal und Material bereitgehalten.
  Beim Lufttransportgeschwader 62 in Wunstorf laufen die Vorbereitungen auf Hochtouren.
  Die Luftfahrzeuge sind einsatzbereit und werden aktuell vorgehalten. Der Verband
  bereitet sich auch darauf vor, als Logistikhub für zivile Hilfs- und Katastrophenschutzorganisationen,
  wie DRK und THW zu fungieren und angelieferte Hilfsgüter für den Weitertransport
  aufzunehmen und anschließend zu verladen. Zum Beginn eines möglichen Hilfseinsatzes
  würde das Kontingent des Lufttransportgeschwaders den Kontingentführer, die fliegende
  Besatzung, und ein kleines Technikteam umfassen. Der A400M kann bis zu 16 Tonnen
  Material und Personal transportieren. Nach aktuellen Planungen werden die Flüge
  in die 8200 km entfernte Krisenregion rund 13 Stunden an reiner Flugzeit benötigen.
  Durch Tankstopps, einem Besatzungstausch und verstärkten Crews kann die Krisenregion
  ohne Zeitverzug für die schnellstmögliche Lieferung der dringend benötigten Hilfe
  erreicht werden.'
