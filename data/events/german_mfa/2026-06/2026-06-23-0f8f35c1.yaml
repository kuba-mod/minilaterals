title: Rede von Außenminister Johann Wadephul bei der Sitzung des Ständigen Rates
  der Deutschen Bischofskonferenz
text: 'Im Jahr 2004 stand Wladimir Putin in Kyjiw und nannte das Höhlenkloster das
  „Symbol der geistlichen Einheit von Russland und der Ukraine“. Heute – gut 20 Jahre
  später – schickt eben dieser Mann Drohnenschwärme und ballistische Raketen, die
  genau dieses angebliche Symbol in der vergangenen Woche in Flammen aufgehen ließen.
  Der im Übrigen den ganzen Widerspruch der russischen Propaganda entlarvt: Wer behauptet,
  ein „Brudervolk“ zu „befreien“ oder „zu schützen“, der zerbombt nicht deren heiligste
  Stätten. Wir sehen: Putins Vernichtungskrieg macht keinen Halt vor Gotteshäusern,
  dem Glauben, der Religion. Der Kreml will nichts weniger als die Auslöschung der
  ukrainischen Identität und Kultur. Das zeigen die brennenden Trümmer der Mariä-Entschlafens-Kathedrale
  in Kyjiw. Aber auch die im Juli 2023 bombardierte Verklärungskathedrale in Odessa.
  Ich habe das selber gesehen. Das zeigen – neben bombardierten Museen, Theatern und
  anderen Kunststätten – ganz deutlich die zahlreichen zerstörten und beschädigten
  Kirchen und Kathedralen, aber auch Moscheen und Synagogen in der von Russland überfallenen
  Ukraine. Und gerade, weil uns diese Bilder vor Augen führen, worum es wirklich geht
  – dass Putin mehr im Sinn hat als einen Krieg um Territorium, nämlich einen Krieg
  gegen die ukrainische Identität, Freiheit und Würde – gilt umso mehr: Dieser Angriffskrieg
  wird unsere unerschütterliche Unterstützung für die Freiheit und Souveränität der
  Ukraine nur noch verstärken. Sie, lieber Prälat Jüsten, haben es selbst beim ökumenischen
  Friedensgebet zum vierten Jahrestag der russischen Invasion – da haben wir uns ja
  auch gesehen – gesagt: Die Ukraine verteidigt ihre Freiheit, aber natürlich auch
  unsere Freiheit. Sie haben dann auch, völlig richtig, davon gesprochen, dass viele
  in Deutschland diesen Zusammenhang nach wie vor nicht wahrhaben wollen. Weil nämlich
  falsche Propheten versuchen, die Friedenssehnsucht vieler in Deutschland niederträchtig
  zu ihren Gunsten auszunutzen. Diese falschen Propheten suggerieren uns, wir müssten
  nur die Waffen schweigen lassen, das Gespräch beginnen – und der Friede käme fast
  wie von selbst. Nun ist es für mich als Außenminister Teil meiner Jobbeschreibung,
  diplomatische Wege auszuloten, und Prälat Jüsten, als Sie mich und mein Team in
  den Dienst entsandten, haben Sie uns den Friedenauftrag ja ausdrücklich mit Ihrem
  geistlichen Wort mitgegeben: „Friede sei mit Dir, das Wort Jesu“, das zwei Mal vorkam.
  Also, wir haben diese Wege auszuloten, und das tun wir alle. Russland, so viel ist
  in den letzten Monaten klar geworden, kann seinen Angriffskrieg militärisch nicht
  gewinnen. Genau aus diesem Grund entsteht zurzeit an vielen Orten eine neue Dynamik.
  Hoffnung darauf, dass ein Weg zu Verhandlungen sich öffnen könnte. Doch der Einzige,
  der bisher bedauerlicherweise keinerlei ernst zu nehmende Anstalten macht, die Waffen
  schweigen lassen zu wollen, der sitzt nach wie vor im Kreml. Vier lange Winter hat
  er systematisch die zivile Energie- und Wärmeinfrastruktur bombardiert. Es ist ihm
  nicht gelungen, den Verteidigungswillen der Ukrainerinnen und Ukrainer durch Kälte
  und Dunkelheit zu brechen. Nun versucht er es, indem er Drohnen auf ihre Klöster
  schickt. Von dieser Resilienz können wir noch viel lernen. Als Außenminister sage
  ich Ihnen deswegen auch: Diplomatie braucht ein Fundament der Stärke. Wir verhandeln
  nicht in irgendeinem luftleeren Raum der Illusionen, sondern auf dem Boden der Realität.
  Und für die Ukraine haben wir da sehr reale, sehr klare Leitlinien: Wir brauchen
  einen sofortigen Waffenstillstand. Der ist die Grundlage für jedwede Verhandlung.
  Der aktuelle Frontverlauf muss Ausgangspunkt jeder Verhandlung sein. Wir brauchen
  Sicherheitsgarantien für die Ukraine, und die müssen belastbar und rechtssicher
  sein. Und europäische und transatlantische Sicherheitsinteressen müssen konsequent
  berücksichtigt werden. Aber die Voraussetzung für das alles ist, dass Russland ernsthaftes
  Interesse an einer diplomatischen Lösung zeigt. Das ist nicht der Fall! Und solange
  das so ist, werden wir uns auch dafür einsetzen, den Druck auf Russland weiter zu
  erhöhen, zum Beispiel mit einem für den Kreml schmerzhaften 21. Sanktionspaket.
  Und indem wir im EU -Kreis unsere Wirtschaftssanktionen gegen Russland nun erstmals
  nicht nur um sechs, sondern um zwölf Monate verlängert haben. Auch beim G7 -Gipfel
  in Évian in der vergangenen Woche ist es gelungen, noch einmal ein klares Zeichen
  in Richtung Kreml zu senden. Aber bei der Unterstützung für die Ukraine geht es
  um mehr als militärische und wirtschaftliche Hilfen. Es geht auch um die Verortung
  der politischen Zukunft des Landes. Unser Ziel ist klar: Wir wollen das Land auf
  dem Weg in die europäische Familie begleiten. Und auf diesem Weg machen wir gute
  Fortschritte! Vor gut einer Woche war ich in Luxemburg und habe mich dort mit den
  EU -Außenministerinnen und Außenminister getroffen. Endlich haben wir im EU -Mitgliedskreis
  einstimmig beschlossen, für die Ukraine und Moldau das erste EU -Beitrittskapitel
  zu öffnen. Damit untermauern wir unsere Solidarität einmal mehr. Wir als deutsche
  Regierung unterstützen sehr, dass das jetzt zügig vorangeht. Man muss natürlich
  immer dazu sagen: Dieser Prozess ist keine Einbahnstraße und dazu gehört auch, dass
  die Beitrittskandidaten mit ihren Reformen weiterkommen. Unser Engagement für die
  Ukraine ist damit zweigeteilt: Wir unterstützen durch militärische, humanitäre und
  wirtschaftliche Hilfen und durch das Öffnen politischer Perspektiven. Perspektiven,
  die sich vor dem russischen Angriff so noch nicht abgezeichnet haben. Das zeigt
  vielleicht auch das Ausmaß der strategischen Fehlkalkulation Putins. Deutschland
  übernimmt in dieser Lage zentral Verantwortung und geht in Europa voran. Das tun
  wir aber auch an anderer Stelle. Denn die russische Aggression ist ja nicht unser
  einziges Krisenherd-Thema. Spätestens, wenn wir den Blick nach Süden und Osten richten,
  sehen wir, wie eng die Krisen unserer Welt miteinander verzahnt sind: Jetzt zeichnet
  sich nach der jüngsten Annäherung zwischen den USA und dem Iran ein Hoffnungsschimmer
  am Golf ab. Auch hier stehen wir, als Bundesregierung – aber natürlich auch gemeinsam
  mit unseren europäischen Freunden und Partnern – bereit, uns einzubringen und international
  Verantwortung zu übernehmen. Denn Auswirkungen der Blockade spüren wir bereits weltweit
  in der Wirtschaft, das ist ja – glaube ich – allen klar. Spätestens wenn die Bürgerinnen
  und Bürger zur Tankstelle fahren spüren Sie das unmittelbar. Ich will aber noch
  andere Beispiele nennen. In Asien fehlen durch die Blockade die Düngemittel, die
  Reisernten fallen dort geringer aus. Diese Verknappung führt dazu, dass Essen deutlich
  teurer wird. Familien hungern! Die Blockade hat aber auch Auswirkungen auf Hilfslieferungen.
  Nicht nur, weil die humanitären Organisationen selbst zu höheren Preisen auf dem
  Weltmarkt einkaufen müssen, sondern auch, weil die gestiegenen Preise für Treibstoff
  in ihre ohnehin zuletzt gesunkenen Budgets weiter beschneiden. So droht, dass Hilfslieferungen
  teilweise nicht mehr ihren Weg an die Orte finden, wo sie dringend benötigt werden.
  Zum Beispiel in den Sudan, wo vor unseren Augen die größte humanitäre Katastrophe
  unserer Zeit stattfindet, wo eine mittellose Millionenbevölkerung zwischen die Fronten
  zweier verfeindeter Warlords und ihrer internationalen Sponsoren gerät. Nun haben
  in der Straße von Hormus beide Seiten erklärt, dass der Schiffverkehr wieder laufen
  solle. Bis das aber der Fall ist und sich dies auf den angespannten Lebensmittel-
  und Energiemärkten der Welt bemerkbar macht, dürfte es noch einige Wochen und vielleicht
  Monate dauern. ob wir über die Freiheit in der Ukraine reden, den Schutz der Schifffahrtswege
  an der Straße von Hormus oder das Leid im Sudan; eines wird sehr deutlich: Appelle
  allein und noch ein bisschen guter Wille reichen nicht aus. Wir müssen handeln!
  Als Deutschland, als Europa. Wir bewegen uns in einer Welt, die sich tiefgreifend
  wandelt. Die globale Tektonik der Macht verschiebt sich so schnell, wie seit Generationen
  nicht. Deutschlands Wohlstand und auch Deutschlands Wertekompass waren über Jahre
  ohne die USA nicht denkbar. Und heute stellen wir fest: Das transatlantische Verhältnis
  ist heute ein anderes als noch vor 15 Jahren. Aber wir dürfen die Augen nicht vor
  den Tatsachen verschließen. Als Realist schaue ich auf die Welt, wie sie ist und
  nicht, wie ich sie gerne hätte. Zum transatlantischen Verhältnis kann ich deswegen
  folgendes sagen: Europa kann heute nicht mehr davon ausgehen, dass die USA einen
  Blankoscheck für unsere Sicherheit ausstellen. Wir haben das lange Jahre erwartet
  und es uns in dieser Erwartungshaltung auch ein bisschen zu bequem gemacht, wahrscheinlich
  zu bequem. Und jetzt haben wir Entscheidungen getroffen, die vielleicht nicht sofort
  populär sind, aber notwendig. Als ich vor einem knappen Jahr gesagt habe, wir brauchen
  5% unserer Wirtschaftsleistung für Verteidigung, da gabs auch hier Kritik. Das ist
  heute glücklicherweise das erklärte Ziel aller NATO -Alliierten. Ich habe jetzt
  ein hoffentlich nicht zu düsteres Bild unserer Welt gezeichnet, wie sie mir als
  Außenminister täglich begegnet. Aber ich bin davon überzeugt, – ich habe das eben
  ja schon einmal gesagt – dass wir die Welt realistisch betrachten müssen. Und politische
  Stärke allein nicht reichen wird. Denn jede dauerhafte Friedensordnung braucht mehr
  als Macht und Abschreckung. Wenn wir es mit nihilistischem Vernichtungswillen zu
  tun haben, aber auch mit einer rapiden technologischen Revolution, die unser menschliches
  Zusammenleben radikal verändern wird, dann brauchen wir mehr als die Mittel des
  Staates. Dann brauchen wir auch ein ethisches Fundament. Die katholische Kirche
  ist eine Weltkirche. Ihre moralische Stimme reicht weit über Ländergrenzen hinaus
  und tief in Gesellschaften hinein. Sie verfügen über Netzwerke und Kanäle, die keinem
  Ministerium offenstehen. Ich darf Sie herzlich bitten: Nutzen Sie diese weiterhin!
  Sie können Antworten geben auf Menschheitsfragen, die in der ganzen Welt widerhallen.
  Papst Leo XIV. hat dies jüngst getan, in seiner Enzyklika zum Thema Künstliche Intelligenz.
  In der er diejenigen zur Verantwortung mahnt, die die modernen Modelle entwickeln.
  Sie daran erinnert, dass sie Macht in den Händen halten, dass ihre Technologie nicht
  neutral ist. In der er vor der Entmenschlichung der Kriegsführung warnt. Und die
  vor allem ein leidenschaftliches Plädoyer ist für das, was KI – in den Worten des
  Papstes – imitieren und simulieren, aber niemals verstehen wird: Liebe, Arbeit,
  Freundschaft und Verantwortung. Friede auf Erden wächst nicht daraus, die Verantwortung
  für unser menschliches Zusammenleben blind einer neuen Technologie zu übertragen.
  Und echter Friede wächst nicht aus der Kapitulation vor einem Aggressor, dem nichts
  heilig ist. Er wächst nur aus Gerechtigkeit und dem bedingungslosen Schutze der
  menschlichen Würde. Aber auch Menschen und Institutionen, ja, Kirchen, die Orientierung
  geben.'
