title: Joint press release from the Federal Foreign Office, the Federal Government
  Commissioner for Culture and the Media, the Prussian Cultural Heritage Foundation,
  the Federal Ministry of Transport and the City of Pforzheim on the return of cultural
  property at the German-Polish Forum
text: 'Today, at the German-Polish Forum, various cultural objects that were removed
  or displaced during Germany’s occupation of Poland in the Second World War were
  returned to the Republic of Poland. These returns reflect the close cooperation
  between Germany and Poland on confronting historical injustice and are an expression
  of Germany’s responsibility towards Poland. Today, 80 years after the end of the
  Second World War and in close cooperation with the holding institutions and the
  Polish side, cultural property that was stolen during the war and occupation can
  be returned to Poland. Its return is an expression of mutual respect, Germany’s
  enduring responsibility and our partnership based on mutual trust. As we mark the
  35th anniversary of the Treaty on Good-Neighbourliness, Friendship and Cooperation,
  it further strengthens the firm ties between our countries. Remembrance of what
  happened, responsibility for the future and reconciliation as a task for generations
  continue to guide our actions today. I am delighted that the hymn “Gaude Mater Polonia”
  is being returned to the Polish people. It is one of the country’s oldest religious
  lyrics. Its return today is an important gesture of the recognition of historical
  injustice. It is the result of rigorous provenance research by the German institutions
  holding cultural property and of close and trusting cooperation with our Polish
  partners. Today we are writing a new chapter in the culture of remembrance of both
  our countries. I am very happy that this early manuscript of the hymn “Gaude Mater
  Polonia”, a manuscript that bears witness to one of the darkest periods in the long
  history of German-Polish relations, can return to Poland today. Today we nurture
  friendly cooperation with the major cultural institutions in Poland – and wish to
  further intensify it. For example, the Staatsbibliothek will soon cooperate with
  four Polish libraries in a third‑party-funded project, and from tomorrow the National
  Museum in Warsaw is a guest at the Alte Nationalgalerie on Museum Island in Berlin.
  The current geopolitical situation and today’s celebrations remind us how precious
  German-Polish relations are. When it comes to mobility, we see it day in, day out:
  people from Poland and Germany make daily use of the many cross-border links, both
  rail and road. This shows how vibrant and how natural our partnership is today.
  I am therefore all the more delighted, as we mark the 35th anniversary, to return
  model railways and objects that have their historic place in Poland. In returning
  the ring, we are acting on the conviction that historical responsibility cannot
  be interpreted solely in legal terms. The ring has extraordinary cultural and idealistic
  significance for Poland. That is why Pforzheim city council decided to return it.
  We regard this step as a sign of respect and friendship towards our Polish neighbour.
  Not least as a city that itself experienced the repercussions of war and destruction,
  we know how important reconciliation is for coexistence in Europe. Cooperation on
  the return of war-displaced cultural property has gained considerable momentum since
  the German-Polish intergovernmental consultations of 1 December 2025. A German-Polish
  working group set up on the initiative of Federal Chancellor Friedrich Merz and
  under the lead responsibility of the Federal Foreign Office is working with the
  Polish Ministry of Culture and National Heritage, the Federal Government Commissioner
  for Culture and the Media and the embassies of the two countries to process requests
  for returns. The cultural objects returned today all have their own, often turbulent,
  provenance history. The Prussian Cultural Heritage Foundation is returning a medieval
  manuscript bearing part of the text of the Polish hymn “Gaude Mater Polonia”. It
  is not as yet known how the manuscript, comprising six parchment sheets, came to
  be in the Staatsbibliothek zu Berlin, where it was kept as external property. It
  originates from the library of the seminary in Płock, whose holdings were plundered
  and largely destroyed during the Second World War. The German occupying authorities
  removed the most valuable manuscripts from the library and took them to Königsberg.
  It has not yet been possible to clarify for certain how the manuscript then came
  to be in the Staatsbibliothek zu Berlin. However, visible stamps from the seminary
  library provide conclusive proof of its origin. It is likely that the three double
  sheets were originally part of a codex from the late 14th century. Given signs such
  as stains, folds and cuts, it is presumed that they were detached from the codex
  in the 16th or 17th century and used in another book. The object can be seen here:
  https://resolver.staatsbibliothek-berlin.de/SBB0003972B00000000 . The Federal Ministry
  of Transport is returning eleven objects which were originally part of the collection
  of Warsaw Transport Museum and were in the possession of the Federal Railway Property
  Agency. The model railways and accessories were exhibited in Warsaw up until the
  summer of 1940, and were brought to the then Verkehrs- und Baumuseum Berlin (Transport
  and Construction Museum) during the German occupation. Their origin could be reconstructed
  on the basis of historical accession registers. Back when the holdings of what is
  now known as the Deutsches Technikmuseum (German Museum of Technology) in Berlin
  were being scientifically catalogued, it was already possible to ascertain that
  the objects had been “taken over from Warsaw Transport Museum” in September 1940.
  Since 2003, they had been registered as war-displaced cultural property on the Lost
  Art online database. The Mayor of the City of Pforzheim is handing over a ring dating
  from the first half of the 16th century that is thought to have belonged to King
  Sigismund I the Old. The ring may have been a gift from his wife Bona Sforza, and
  was probably one of the relics in the so‑called Royal Casket of the Czartoryski
  princely family in Kraków. Shortly before Germany’s invasion of Poland, the collection
  was transported to Sieniawa and hidden, but it was plundered by German soldiers,
  probably in September 1939. The ring later found its way to Germany and in 1963
  was gifted to Pforzheim Jewellery Museum as part of a large collection of rings.
  The ring, made of high-carat yellow gold, bears a diamond of approx. 3.5 carats
  and is regarded as an outstanding example of Renaissance courtly jewellery. Today’s
  returns are the latest of several returns of cultural property, including those
  of charters of the Teutonic Order and of a sculptural head from Malbork Castle to
  Poland. The German Government will continue to examine further requests from Poland
  for returns and, within the framework of the working group, systematically drive
  forward cooperation with the relevant institutions at federal, Land and municipal
  levels.'
