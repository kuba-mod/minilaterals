title: Rede von Außenminister Johann Wadephul beim Sommerempfang der EKD
text: 'ich übermittle Ihnen die herzlichen Grüße der Bundesregierung. Den gestrigen
  Tag habe ich begonnen mit einem Gespräch in der katholischen Bischofskonferenz.
  Den heutigen beschließe ich mit dem Johannisempfang bei der EKD , das ist doch ein
  schönes Alpha und Omega. Ihre Rede, liebe Frau Fehrs, war ja wieder ein Erfolg und
  ist ja immer ein Steinbruch für uns mit möglichen Kirsten Fehrs-Zitaten. Da ich
  Ihre Rede im Vorfeld aber nicht kannte, habe ich ein Zitat mitgebracht, das etwas
  älter ist. Stammt von Ihnen. Mir gefällt der Satz. Sie haben ihn während der Corona-Krise
  gesagt. Und ich halte ihn für sehr wahr. In ihrem Festvortrag, da war ja auch wieder
  eine Menge Zuversicht, die sie uns zugerufen haben, drin. Vor Ihrer Predigt heute
  haben wir den Sommerpsalm von Waldemar Ahlén gehört. Dessen letzten beiden Verse
  möchte ich noch einmal wiederholen, auf deutsch: Der Gedanke hinter diesen beiden
  letzten Zeilen des Liedes ist ja die Erinnerung daran, dass das Leben vergänglich
  ist. Und dass es, aber, auch etwas gibt, was darüber hinaus Bestand hat. Etwas,
  dass uns Halt gibt, wenn alles andere in Bewegung ist. Und dieser Gedanke, der ist
  wichtig, ist auch mir persönlich sehr wichtig. Er führt uns mitten in das hinein,
  was wir Zuversicht nennen. Zuversicht: Das feste, manchmal erschütterte, aber unerschütterliche
  Vertrauen auf Gott. Weil ich eben überzeugt bin, dass wir ohne dieses Vertrauen,
  ohne die Zuversicht, um Ihre Worte, liebe Frau Fehrs, da noch einmal aufzunehmen,
  alle irre werden. Und für mein Berufsfeld gilt das allemal. Sie haben gerade über
  die Krise des Sozialstaats gesprochen. Und darüber, dass die eigentliche Krise die
  des gesellschaftlichen Zusammenhalts ist. In der Tat, wir erleben das gerade: Wenn
  Krisen ineinandergreifen, dann geraten auch wohlhabende Gesellschaften unter Druck.
  Ein Druck, der von innen kommt, aber auch von außen. Sie alle schauen ja sicherlich
  täglich die Nachrichten. Ich muss Ihnen jetzt nicht en Detail die vielen Krisen
  aufzählen, mit denen meine Kolleginnen und Kollegen im diplomatischen Dienst und
  ich tagtäglich zu tun haben. Der russische Angriffskrieg gegen die Ukraine. Die
  technische Revolution durch Künstliche Intelligenz. Wir merken das an der Tankstelle.
  Wir merken das an der Supermarktkasse. Und natürlich macht das etwas mit den Menschen.
  Es kostet eben auch seelische Ressourcen. Das ist doch klar. unsere Gesellschaft
  gründet sich auch auf ein Fortschrittsversprechen. Welche Eltern schauen nicht auf
  ihre Kinder mit dem Wunsch: Du sollst es einmal besser haben als ich! Aber das ist
  ein Versprechen, das im Angesicht all der Krisen unserer Zeit, unwahrscheinlicher
  geworden ist. Wir als Bundesregierung arbeiten daran, dass es uns erhalten bleibt.
  Es sind schwierige Wochen, Frau Kollegin Bas. Und ich meine wir machen dabei Fortschritte.
  Denn wer bei dieser Realität an diesem Versprechen noch festhält, der ist zwar nicht
  irre, aber bald sehr frustriert. Und ich verstehe auch, dass es für eine Gesellschaft
  schwer ist, mit dieser Erfahrung umzugehen. Dass sich Dinge eben nicht immer rein
  zum Besseren entwickeln. Dass manche Dinge, manche Gewissheiten, auch verloren gehen.
  Die Wahrheit ist: Im Angesicht dieses wirklich fundamentalen Wandels unserer Zeit
  müssen wir unser Fortschrittsversprechen anpassen. In einer Welt, die sich für manche
  Bürgerinnen und Bürger durch eine Ohnmachtserfahrung auszeichnet, heißt Fortschritt:
  Subjekt bleiben, handlungsfähig bleiben. Die Verteidigungsausgaben stehen wie keine
  andere Haushaltsposition für diesen Wandel. Sie sind eine Investition in die Zukunft
  unseres Landes. Denn sie werden dafür sorgen, dass dieses Land bestehen kann. Gleichzeitig
  fehlt es in vielen anderen Bereichen an Finanzmitteln. Diese Situation kann für
  Menschen, die mit der Gnade des Friedens aufgewachsen sind, in einem scheinbaren
  Widerspruch stehen. Es ist aber an der Zeit, die Dinge anders zu betrachten. Und
  viele Menschen in Deutschland tun das. Und weil sie sehen: Eine resilientere Gesellschaft,
  eine Gesellschaft, die besser und stärker gegen Einwirkung von Außen gewappnet ist,
  ist auch ein Fortschritt. Dass wir diesen Streit führen können, ohne einander zu
  Feinden zu erklären, ist eine große kulturelle Leistung unserer Gesellschaft. An
  der die protestantische Kirche einen großen Anteil hat. Weil sie den Menschen als
  Gegenüber Gottes versteht. Als jemanden, der Verantwortung trägt. Für sein eigenes
  Handeln. Für seine Mitmenschen. Für die Gemeinschaft, in der er lebt. Die Zuversicht
  gemeinsam mit anderen etwas bewegen zu können, ist Ausgangspunkt jeder demokratischen
  Politik. Wer Politik macht, tut es in der Überzeugung, dass wir Gestaltung selbst
  in der Hand haben. Das ist zumindest mein Politikverständnis. Bürgerlichkeit ist
  das Verdienst des Protestantismus. Und es ist auch das, was diejenigen, die totalitär
  denken, abschaffen wollen. Wir erleben das gerade schon in einigen Gegenden unseres
  Landes, und in einigen von unseren europäischen Nachbarländern. Wo totalitäre Ideologen
  dem freien und verantwortlichen Menschen misstrauen. Sie setzen die Gefolgschaft
  über das Gewissen. Der Protestantismus steht für das Gegenteil. Und deswegen wird
  er zum Ziel der Totalitären. Eine freie Gesellschaft erkennt man nicht daran, dass
  Religion unsichtbar wird. Sondern daran, dass Menschen ihren Glauben sichtbar leben
  können. Wenn zwei Fußballnationalspieler nach einem Spiel gemeinsam auf dem Rasen
  niederknien und beten, dann ist das für mich zunächst einmal nichts anderes als
  ein sichtbarer Ausdruck von Dankbarkeit, Demut und Glauben. Und dennoch erleben
  wir, wie aus diesem Gebet binnen Minuten ein Kulturkampf wird. Weil sichtbarer christlicher
  Glaube in unserer Öffentlichkeit mittlerweile viele irritiert. Eine freie Gesellschaft
  muss sich gerade in solchen Debatten beweisen. Und behaupten. Sichtbar gelebter
  Glaube erinnert uns an das christliche Menschenbild, auf dessen Boden unsere Gesellschaft
  entstanden ist. An die Kontinuität, die uns in einer schwierigen Weltlage Halt und
  Orientierung bietet. Die uns verdeutlicht, dass der Mensch mehr ist als Bürgerin
  und Bürger, Konsumentin oder Konsument oder eine Funktion, die er trägt. Dass es
  noch diesen Raum gibt, in dem wir zusammenkommen, wie wir sind. Und jeder und jede
  angenommen ist. Was für eine Kraft liegt darin in dieser Zeit. Und damit das gelingen
  kann, liebe Gäste, sind wir als Regierung auf Sie als Kirche angewiesen. Als sozialer
  Anker. Weil Sie vor Ort sind. Aber auch darüber hinaus. Weil Ihre geistliche, geistige
  und gesellschaftliche Prägekraft, die unser Land seit Jahrhunderten ausmacht, jetzt
  so sehr zählt wie lange nicht. Gemeinsam stehen wir für die freie Kraft des Glaubens.'
