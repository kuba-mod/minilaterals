title: Joint Statement on the situation in El Obeid
text: 'France, Germany, Ireland, Italy, Netherlands, Norway and the United Kingdom
  deliver a joint statement on the situation in El Obeid, Sudan. We, the Foreign Ministers
  of like-minded partners (France, Germany, Ireland, Italy, Netherlands, Norway, UK),
  are deeply concerned by reports of a continued assault on El Obeid, despite calls
  for a halt to the attack and protection of civilians. Last year, the world witnessed
  with horror the atrocities in El Fasher - crimes that are assessed to bear the “hallmarks
  of genocide”. We must not allow such failures to be repeated. In recent weeks, repeated
  drone strikes on El Obeid have killed civilians and driven acute shortages of fuel,
  food and water. With the rainy season fast approaching, humanitarian workers continue
  to provide life-saving assistance but are being deliberately targeted. There are
  now credible signs of an imminent offensive. This is a critical moment, and the
  international community must act. We call on the RSF to halt its attack immediately.
  Civilians must be able to leave safely, and all parties must ensure rapid, safe
  and unhindered humanitarian access. The RSF and the SAF, and their allies, must
  de-escalate, uphold international humanitarian law, and honour their commitments
  under the Jeddah Declaration. External support continues to sustain this conflict.
  We call on those fuelling the conflict to cease, and those with influence must exercise
  it now to avoid further bloodshed. We will continue to work closely at the UN Security
  Council and with regional and international partners to secure a clear and unified
  response: the violence must end, civilians must be protected, and those responsible
  must be held to account. We remain committed to supporting a credible path to peace
  through the Quintet-led process and call on all parties to engage in good faith.'
