title: Statement by Foreign Minister Wadephul on Canada’s procurement of submarines,
  with TKMS as the preferred supplier
text: 'Foreign Minister Wadephul issued the following statement on the decision by
  the Canadian Government to join the German-Norwegian submarine cooperation, with
  TKMS as the preferred supplier: I am pleased that we were able to convince Canada
  of the benefits of our German-Norwegian cooperation for the Canadian submarine programme.
  In this way, Canada has sent a clear message on cohesion in the transatlantic alliance.
  Together, we are making the Atlantic smaller. With the German company TKMS as the
  preferred supplier, Canada has chosen the best conventional submarines in the world.
  This step will strengthen and deepen our partnership in the transatlantic alliance
  for the long term. Canada, Norway and Germany are thus also starting a new chapter
  in defence and industry policy.'
