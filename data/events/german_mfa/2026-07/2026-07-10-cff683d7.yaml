title: Erklärung der Hohen Vertreterin im Namen der Europäischen Union zur eskalierenden
  Gewalt in El Obeid
text: Die Europäische Union ( EU ) ist zutiefst besorgt über die Lage in El Obeid,
  der Hauptstadt von Nordkordofan. Eine starke Konzentration militärischer Kräfte
  der Rapid Support Forces (RSF) bedroht die Stadt, in der sich zurzeit 500 000 Zivilpersonen
  aufhalten, darunter etwa 100 000 Vertriebene. Die RSF muss umgehend alle militärischen
  Operationen in und um El Obeid einstellen, durch die Zivilpersonen gefährdet werden.
  El Obeid darf nicht zu einem weiteren Al-Faschir werden. Alle Konfliktparteien müssen
  das humanitäre Völkerrecht und alle menschenrechtlichen Normen, darunter die zum
  Schutz von Zivilpersonen und insbesondere von Frauen und Mädchen sowie zum Schutz
  der zivilen Infrastruktur, in vollem Umfang einhalten. Jeder Angriff, der sich gegen
  die Zivilbevölkerung richtet oder ihr sicheres Geleit verhindert, und jede Handlung,
  die vorsätzlich den humanitären Zugang zu bedürftigen Personen behindert, stellt
  einen Verstoß gegen das humanitäre Völkerrecht dar und wird dazu führen, dass die
  EU robuste Maßnahmen gegen die Verantwortlichen in Erwägung zieht. Die EU ruft alle
  ausländischen Akteure mit Nachdruck auf, ihrer Verpflichtung im Rahmen der Berliner
  Prinzipien nachzukommen, jegliche direkte oder indirekte Unterstützung, die die
  Fortsetzung des Konflikts ermöglicht, umgehend zu beenden. Die EU ruft alle Konfliktparteien
  auf, zu Verhandlungen über einen dauerhaften Waffenstillstand zurückzukehren, den
  schnellen, sicheren und ungehinderten humanitären Zugang prinzipientreu und dauerhaft
  sicherzustellen, einen von der sudanesischen Zivilbevölkerung angeführten politischen
  Prozess zu unterstützen, der zur Wiederherstellung einer Zivilregierung führt, sowie
  die Rechenschaftspflicht und die Achtung des Völkerrechts wiederherzustellen und
  aufrechtzuerhalten. Als Mitglied des Quintetts bekräftigt die EU ihr Eintreten für
  die sudanesische Bevölkerung und wird Bemühungen um ein Ende des Leids, zur Förderung
  der Gerechtigkeit und der Rechenschaftspflicht und zur Wiederherstellung des Friedens
  im Rahmen eines in sudanesischer Eigenverantwortung erfolgenden Übergangs zu einer
  Zivilregierung weiterhin unterstützen.
