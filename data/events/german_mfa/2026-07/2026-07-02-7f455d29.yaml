title: Auswärtiges Amt zu russischen Luftangriffen auf die Ukraine
text: 'Zu russischen Luftangriffen auf die Ukraine erklärte ein Sprecher des Auswärtigen
  Amts heute (02.07.2026): Wir verurteilen die massiven russischen Luftangriffe auf
  Kyjiw und weitere Teile der Ukraine in der vergangenen Nacht auf das Schärfste.
  Erneut hat Putins Russland die ukrainische Hauptstadt und weite Teile des Landes
  mit massiven Drohnen- und Raketenangriffen überzogen. Menschen wurden im Schlaf
  getötet oder verletzt, Wohnhäuser zerstört und zivile Infrastruktur wie eine medizinische
  Einrichtung schwer beschädigt. Unsere Gedanken sind bei den Opfern und ihren Angehörigen.
  Die erschütternden Bilder der Zerstörung aus der letzten Nacht zeigen einmal mehr:
  Russland setzt seinen völkerrechtswidrigen Angriffskrieg gegen die Ukraine mit unverminderter
  Brutalität fort. Putin zeigt keinerlei Verhandlungsbereitschaft. Er setzt weiter
  auf Raketen- und Drohnenterror gegen die Bevölkerung, während Russland an der Front
  enorme Verluste bei seiner Aggression gegen die Ukraine erleidet. Deswegen erhöht
  Deutschland gemeinsam mit seinen Partnern weiter den Druck auf Russland. Wir setzen
  unsere Unterstützung für die Ukraine in ihrem Abwehrkampf fort. Um diese Unterstützung
  wird es auch kommende Woche auf dem NATO -Gipfel in Ankara gehen.'
