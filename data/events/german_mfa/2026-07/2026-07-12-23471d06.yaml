title: 'Erklärung der Hohen Vertreterin im Namen der Europäischen Union zum Südchinesischen
  Meer: zehnter Jahrestag des Schiedsspruchs zu den Philippinen und China'
text: Am 12. Juli jährt sich der Schiedsspruch des nach Anlage VII des Seerechtsübereinkommens
  der Vereinten Nationen eingesetzten Schiedsgerichts betreffend das Südchinesische
  Meer („Schiedsspruch von 2016“) zum zehnten Mal. Der Schiedsspruch von 2016, der
  im Einklang mit dem VN -Seerechtsübereinkommen durch das unabhängige und unparteiische
  Schiedsgericht angenommen wurde, ist für die Verfahrensbeteiligten endgültig und
  rechtlich bindend. Als wegweisende Entscheidung im Bereich der friedlichen Beilegung
  von Streitigkeiten ist er von den Verfahrensbeteiligten zu respektieren und uneingeschränkt
  umzusetzen. Die EU bekräftigt ihr unerschütterliches Bekenntnis zum VN -Seerechtsübereinkommen,
  welches das Völkergewohnheitsrecht widerspiegelt und kodifiziert und den allgemeinen
  und einheitlichen Rechtsrahmen bildet, innerhalb dessen sämtliche Aktivitäten in
  den Ozeanen und Meeren zu erfolgen haben. Die EU unterstreicht die entscheidende
  Bedeutung der Wahrung der im VN -Seerechtsübereinkommen niedergelegten Freiheiten,
  Rechte und Pflichten, insbesondere der Freiheit der Schifffahrt und des Überflugs,
  einschließlich des Rechts auf Transitdurchfahrt, als wesentlich für die regionale
  Stabilität, die globale Sicherheit und die Aufrechterhaltung sicherer, freier und
  offener Seewege. Die EU bekräftigt ihre Unterstützung für die laufenden Bemühungen
  von ASEAN und China, einen wirksamen, substanziellen und rechtlich bindenden Verhaltenskodex
  für das Südchinesische Meer zu schließen, der mit dem VN -Seerechtsübereinkommen
  in Einklang steht. Spannungen und Streitigkeiten sind im Einklang mit dem Völkerrecht,
  in dessen Zentrum die Charta der Vereinten Nationen und das VN -Seerechtsübereinkommen
  stehen, durch Dialog und mit friedlichen Mitteln beizulegen. Die EU ist tief besorgt
  angesichts der stetigen Zunahme der Spannungen und gefährlichen Vorfälle im Südchinesischen
  Meer und spricht sich nachdrücklich gegen alle einseitigen Schritte aus, denen die
  Gefahr innewohnt, die regionale Stabilität und die internationale Ordnung auf der
  Grundlage des Völkerrechts und der Rechtsstaatlichkeit zu untergraben, und bekennt
  sich weiterhin fest zu sicheren, freien und offenen Seewegen im Indopazifik und
  darüber hinaus.
