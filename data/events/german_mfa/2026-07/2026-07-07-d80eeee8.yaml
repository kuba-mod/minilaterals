title: Foreign Minister Wadephul travels to Israel
text: 'Foreign Minister Wadephul issued the following statement on 7 July 2026 prior
  to his departure for Israel: I am visiting a close friend and partner. The State
  of Israel is under threat from many sides, and global antisemitism is on the rise.
  Furthermore, we are bound by a mutual security partnership. At the same time, however,
  we know that the pressing questions of regional security in the Middle East can
  only be answered within a framework of shared understanding among all the countries
  involved. Before taking part in the NATO summit in Ankara, I am therefore travelling
  again to Israel for talks with my Israeli counterpart. My aim is to help foster
  understanding and lasting peace in the region. The agreement between Israel and
  Lebanon offers hope and the chance to resolve a decades-long conflict. Germany wants
  to support Israel and Lebanon on this path. It is vital that Lebanon reliably enforces
  the state’s monopoly on the use of force, and clear security guarantees for Israel
  are equally crucial. If all sides take responsibility, this process can lead to
  stability, security and lasting peace. I will also discuss the negotiations between
  the United States and Iran with my Israeli colleague. The ceasefire that has been
  achieved has yet to be consolidated. It is up to Iran to seize the opportunity for
  constructive negotiations. We are also keeping a close eye on the situation in Gaza:
  during these hot summer months, the water shortage is currently reaching dangerous
  levels. Full access for humanitarian aid workers and their supplies is essential
  in order to improve the desperate situation of people in Gaza. Our relations with
  Israel can never be seen independently of the responsibility that Germany bears
  for the security of the only Jewish state in light of the Shoah – that most atrocious
  crime against humanity committed by Germans. Part of this responsibility is to oppose
  any form of historical distortion or relativisation, including by ensuring that
  the historical truth is passed on to future generations even after the last survivors
  have left us. To this end, the Federal Government and the Länder are working intensively
  together with the Yad Vashem Holocaust Memorial. My visit to Israel is also intended
  to strengthen and further expand this cooperation.'
