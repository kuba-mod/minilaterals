title: Rede von Außenminister Johann Wadephul in São Paulo bei der AHK-Konferenz „EU-Mercosur-Abkommen
  – Chancen für eine grüne und digitale Zukunft“
text: 'Ich freue mich wirklich sehr, hier zu sein! Vor allem, weil ich eigentlich
  schon Anfang März nach Brasilien kommen wollte und meine Reise wegen des Kriegs
  in Iran verschieben musste. Damals wollte ich mit einem herzlichen Glückwunsch an
  Lucas Pinheiro Braathen einsteigen. Nun liegt sein Olympia-Sieg im Riesenskislalom
  ja bereits einige Monate zurück. Und heute sprechen aller über die Fußball-WM –
  für uns Deutsche gerade nicht das einfachste Thema. Aber ich bin nach wie vor beeindruckt
  von seiner Leistung: der erste Südamerikaner ganz oben auf dem Treppchen bei den
  Olympischen Winterspielen. Das zeigt: Es ist immer möglich, etwas Unerwartetes zu
  erreichen! Meine Damen und Herren, eine weitere herausragende Leistung Anfang dieses
  Jahres war der Abschluss des EU -MECOSUR-Abkommens! Manch ein Beobachter hielt diesen
  Abschluss auch bereits für unerwartet. Denn die Widerstände waren groß, 25 Jahre
  lang ist verhandelt worden. Aber am Ende einte uns der gemeinsame Wille zum Erfolg,
  die Unterschriften sind geleistet worden und das Abkommen ist da! Wir handelten
  in einer globalen Lage, die keine weiteren Verzögerungen mehr zuließ: Wie wichtig
  freier Handel für die Unternehmen unserer Regionen ist, haben der Iran-Krieg und
  die Blockade der Straße von Hormus zuletzt schmerzhaft verdeutlicht. Und das Problem
  ist nach wie vor nicht gelöst. Denn, wenn Containerschiffe und Tanker plötzlich
  wochenlang feststecken, wenn lang etablierte globale Abläufe von heute auf morgen
  enden, wird das – in vernetzten Industrieländern wie Deutschland und Brasilien –
  zur Zerreißprobe für die unternehmerische Planbarkeit. Gar nicht zu sprechen von
  der gleichzeitigen Herausforderung durch volatile Zölle für wichtige Exportmärkte
  und dem steigenden Druck auf internationale Handelsregeln. Das ist keine einfache
  Ausgangslage, vor der wir alle miteinander stehen! Ich übertreibe also nicht, wenn
  ich sage: Unser Abkommen ist ein historischer Meilenstein für unsere beiden Regionen.
  Weil wir zusammen eine der größten Freihandelszonen der Welt bilden – mit einem
  Markt von über 700 Millionen Verbrauchern! Weil wir als EU - und MERCOSUR-Staaten
  in schwierigen Zeiten ein strategisches Zeichen gesetzt haben: für offenen, regelbasierten
  und beidseitig vorteilhaften Handel. Und weil wir gleichzeitig zeigen: Wir stehen
  als Demokratien und Rechtsstaaten zusammen und verbinden unsere Gesellschaften,
  die von denselben Werten getragen werden! Meine Damen und Herren, 2026 feiern wir
  75 Jahre diplomatische Beziehungen zwischen unseren beiden Ländern! Beziehungen,
  die sich auch in einem starken wirtschaftlichen Band zeigen: Brasilien ist – mit
  einem bilateralen Warenhandelsvolumen von ca. 21 Milliarden Euro im Jahr 2025 –
  mit Abstand Deutschlands wichtigster Handelspartner in Südamerika. Deutsche Unternehmen
  exportieren jährlich Waren für fast 13 Milliarden Euro nach Brasilien. Deshalb begleitet
  mich auf dieser Reise auch eine größere Wirtschaftsdelegation – aus wichtigen deutschen
  Industriebereichen wie Energie, Rohstoffen und Verteidigung. Gleichzeitig ist auch
  Deutschland Brasiliens wichtigster Handelspartner in Europa. Hierzulande gibt es
  mehr als tausend deutsch-brasilianische Unternehmen, die erheblich zum brasilianischen
  BIP beitragen und tausende von Arbeitsplätzen schaffen. Deutsche Unternehmen investieren
  in Maschinenbau, in der Automobilbranche, in der chemischen und der Elektroindustrie
  – und zunehmend auch in zukunftsorientierte Bereiche wie Wasserstoff und erneuerbare
  Energien. Brasilien wiederum ist nicht nur ein wichtiger Lieferant für kritische
  Rohstoffe, sondern verfügt auch über einen der saubersten Strommixe der Welt und
  hat enormes Potenzial für Wind-, Solar- und Biomasseenergie. Ihr Land ist also auch
  für grünen Wasserstoff ein wichtiger Partner für uns. Meine Damen und Herren, das
  aktuelle Gesamthandelsvolumen zwischen der Europäischen Union und MERCOSUR beträgt
  111 Milliarden Euro pro Jahr – davon entfallen bei Waren ca. 25 Prozent auf Deutschland.
  Das EU -MERCOSUR-Abkommen ermöglicht unseren Unternehmen nun, ihre Handelsströme
  weiter zu diversifizieren, gegenseitige Investitionen zu steigern und somit auch
  Innovation zu beschleunigen. Denn es senkt Zölle, verringert Investitionshemmnisse
  und sorgt für Rechtssicherheit und Planbarkeit für Unternehmen auf beiden Seiten!
  Nicht ohne Grund gehörten Deutschland und Brasilien zu den stärksten Befürwortern
  des Abkommens. An dieser Stelle mein herzlicher Dank für die starke Führungsrolle
  Brasiliens! Danke, dass Sie bei der Schnelligkeit der Ratifizierung dem Vorbild
  von Lucas Pinheiro Braathen gefolgt sind! Ich persönlich habe innerhalb der Europäischen
  Union für das vorläufige Inkrafttreten ab dem 1. Mai dieses Jahres geworben. Denn
  ich bin überzeugt davon, dass wir die beidseitigen Vorteile nun schnell ausschöpfen
  müssen und damit bestehende Zweifel beseitigen können! Liebe Unternehmerinnen und
  Unternehmer, liebe Verbandsvertreterinnen und -vertreter, machen Sie Gebrauch von
  diesem Abkommen! Lassen Sie es uns gemeinsam nutzen, um unsere Wirtschaftsbeziehungen
  weiter auszubauen und die industrielle Basis unserer Volkswirtschaften zu stärken
  – von kritischen Rohstoffen und grüner Energie bis hin zu High-Tech-Sektoren. Jetzt
  freue ich mich darauf, von Ihnen zu hören, welche Erwartungen Sie haben und wie
  Sie die Vorteile des Abkommens schon heute nutzen. Und natürlich auch auf Ihre Einschätzung,
  wie die Vereinbarung künftig noch verbessert werden kann!'
