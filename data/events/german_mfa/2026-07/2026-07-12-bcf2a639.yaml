title: Erklärung zum zehnten Jahrestag des Schiedsspruchs im Fall Philippinen gegen
  China betreffend das Südchinesische Meer
text: Der Wortlaut der folgenden Erklärung wurde von den Regierungen der Vereinigten
  Staaten von Amerika, Australiens, Deutschlands, Estlands, Italiens, Japans, Kanadas,
  Lettlands, Litauens, Neuseelands, der Republik der Philippinen, Rumäniens, Sloweniens
  und des Vereinigten Königreichs anlässlich des zehnten Jahrestags des Schiedsspruchs
  im Fall Philippinen gegen China betreffend das Südchinesische Meer veröffentlicht.
  Wir bekräftigen unser unerschütterliches Bekenntnis zur Aufrechterhaltung eines
  freien, offenen, friedlichen, stabilen, regelbasierten und fest an das Völkerrecht
  gebundenen indopazifischen Raums und erinnern an den zehnten Jahrestag der wegweisenden
  und einstimmigen Entscheidung vom 12. Juli 2016 zum Südchinesischen Meer des nach
  Anlage VII des Seerechtsübereinkommens der Vereinten Nationen eingerichteten Schiedsgerichts.
  Wir bekräftigen, dass seerechtliche Streitigkeiten friedlich und im Einklang mit
  dem Seerechtsübereinkommen der Vereinten Nationen beigelegt werden müssen. Wir bekräftigen,
  dass der vor zehn Jahren vom Schiedsgericht ergangene Schiedsspruch einen wichtigen
  Meilenstein darstellt und im Verhältnis zwischen China und den Philippinen mit Blick
  auf die vom Schiedsgericht behandelten seerechtlichen Ansprüche und Forderungen
  endgültig, rechtlich bindend und maßgeblich ist. Wir bekräftigen die Entscheidung
  des Schiedsgerichts, dass es keine Rechtsgrundlage für Chinas expansive seerechtliche
  Ansprüche im Südchinesischen Meer gibt, auch nicht für solche, die aus „historischen
  Rechten“ abgeleitet werden. Wir unterstreichen, wie wichtig es ist, die Freiheit
  der Schifffahrt und des Überflugs ebenso wie andere international rechtmäßige Nutzungen
  des Meeres im Einklang mit dem UN ‑Seerechtsübereinkommen aufrechtzuerhalten. Wir
  betonen erneut unsere entschiedene Ablehnung destabilisierender oder einseitiger
  Handlungen, auch durch Gewaltanwendung oder Zwangsausübung, die den Frieden und
  die Stabilität in der Region bedrohen. Wir bekräftigen unsere entschiedene Ablehnung
  des Einsatzes von Küstenwache, Militär und Marinemilizen, um rechtmäßige Operationen
  anderer Staaten zu Wasser oder in der Luft zu stören, zu behindern oder unter Druck
  zu setzen, wobei die Sicherheit von Personal und Fischern gefährdet wird und Frieden
  und Sicherheit in der Region ernsthaft beeinträchtigt werden. Wir rufen die Parteien
  dringend auf, sich an den Schiedsspruch von 2016 zu halten und Streitigkeiten friedlich
  durch Dialog und andere rechtmäßige Mechanismen im Einklang mit dem Völkerrecht
  beizulegen. Wir stehen weiterhin fest zu unserer Unterstützung eines freien und
  offenen indopazifischen Raums und bekräftigen unser Bekenntnis zur Förderung unserer
  gemeinsam mit ASEAN angestrebten Vision eines Südchinesischen Meeres, das geprägt
  ist von Frieden, Stabilität, Zusammenarbeit und Wohlstand, getragen von einem regen
  Handel auf der Grundlage von Recht und Gesetz.
