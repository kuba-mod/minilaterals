title: Außenminister Wadephul vor seiner Abreise nach Helsinki
text: 'Vor seiner Abreise nach Helsinki erklärte Außenminister Wadephul heute (15.07.2026):
  Mit Finnlands Beitritt hat sich die NATO verändert. Finnlands Grenze mit Russland
  ist länger als die aller anderen NATO -Partner zusammen. Finnland weiß aus historischer
  Erfahrung, dass Frieden und Sicherheit keine Selbstverständlichkeiten sind. Mit
  Finnland ist die NATO stärker und schlagkräftiger, als sie es vor Putins Angriff
  auf die Ukraine war – ein echter Sicherheitsgewinn für Europa. Uns allen muss zugleich
  klar sein: Die Sicherheit Europas wird heute nicht nur in der Ukraine verteidigt.
  Über sie wird an der finnisch-russischen Grenze, in der Ostsee und in europäischen
  Wahlen entschieden – also überall dort, wo Russland versucht, schädlichen Einfluss
  zu nehmen und unsere Gesellschaften zu spalten. Mit seinem Angriffskrieg gegen die
  Ukraine hat Russland die europäische Sicherheitsordnung grundlegend herausgefordert.
  Auf diese Bedrohung reagieren wir: Die Beschlüsse der Europäer bei den NATO -Gipfeln
  in Den Haag und Ankara unterstreichen, dass wir Russlands ständigen Provokationen
  eine verbesserte Abschreckungs- und Verteidigungsfähigkeit entgegensetzen. Wir haben
  der Ukraine als NATO -Partner beim Gipfel in Ankara 140 Milliarden Euro für die
  Verteidigung zugesagt, damit Putin endlich begreift: Der Weg zum Frieden führt allein
  über ernsthafte Verhandlungen. Meine Reise nach Finnland wird mich – neben Helsinki
  – auch an die finnisch-russische Grenze führen. Finnlands Resilienz und Zivilschutz
  zeigen uns, wie auch wir uns noch effektiver gegen Bedrohungen aufstellen. Denn
  sie beginnen nicht erst im Krisenfall, sondern mit der Vorbereitung auf diesen.
  Wehrhaftigkeit ist kein abstraktes Konzept, sie ist die konkrete Voraussetzung für
  Frieden und Sicherheit. Mit ihrem umfassenden Sicherheitsansatz lebt die finnische
  Gesellschaft vor, wie alle Teile der Bevölkerung dabei eine Rolle zu spielen haben.
  Von dieser Erfahrung können wir in Europa lernen, um uns besser gegen Sabotage,
  Cyberangriffe oder Desinformation zu wappnen. Finnland ist zugleich eines der Länder,
  dessen Sicherheit und Wohlstand – wie auch unserer – ganz besonders von freiem Handel
  und sicheren Versorgungswegen abhängt. Von einer sicheren Ostsee hängen 95 Prozent
  der Versorgung Finnlands mit Waren und Gütern ab. Deshalb werden wir es nicht zulassen,
  dass Moskau kritische Infrastruktur zur Zielscheibe macht und Versorgungswege, wie
  etwa durch die marode Schattenflotte, gefährdet. Deshalb werden wir als NATO -Partner
  weiter die Baltic Sentry Mission verstärken. Deutschland und Finnland verbindet
  auch der Wille, Europas Wettbewerbsfähigkeit zu stärken. Dazu gehört ein moderner
  EU -Haushalt, der die richtigen Schwerpunkte setzt. Wir sind uns einig, dass wir
  in Brüssel schneller und effizienter Entscheidungen treffen und bürokratische Hürden
  abbauen müssen. Die Energiepreise weltweit zeigen uns auch: Der zügige Ausbau von
  Zukunftsbranchen, wie etwa einer leistungsfähigen europäischen Wasserstoffwirtschaft,
  die zukunftsorientierte und sichere Wertschöpfung an allen Ufern der Ostsee-Partner
  schafft, müssen wir mit europäischen Unternehmen entschlossen voranbringen.'
