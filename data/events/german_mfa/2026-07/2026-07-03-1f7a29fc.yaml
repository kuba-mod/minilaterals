title: Grußwort von Außenminister Johann Wadephul bei der Konferenz zur deutsch-brasilianischen
  Zusammenarbeit im Bereich kritischer Rohstoffe in Brasilia
text: 'Deutschen und Brasilianern werden oft unterschiedliche Stärken zugeschrieben:
  In Deutschland sind wir stolz auf Präzision, Pünktlichkeit und sorgfältige Planung.
  In Brasilien legen Sie eine bemerkenswerte Anpassungsfähigkeit an den Tag, damit
  alles funktioniert – auch, wenn sich Pläne ändern. Wenn es um kritische Rohstoffe
  und sich verändernde Lieferketten geht, brauchen wir beides: Planung und die Flexibilität,
  diese Planung in die Praxis umzusetzen. Deutschland und Brasilien mögen Tausende
  Kilometer voneinander entfernt sein. Doch auf der heutigen Konferenz geht es darum,
  diese Entfernung zu überbrücken. Es geht darum, eine Brücke für kritische Rohstoffe
  zu bauen. Eine Brücke, die unsere Stärken, unsere Volkswirtschaften, unsere Industrien
  und unsere gemeinsamen Zukunftsvisionen verbindet. Für Deutschland hat die Diversifizierung
  unserer Lieferketten für kritische Rohstoffe oberste Priorität. Unser Ziel ist dabei
  klar: Wir wollen Abhängigkeiten von einzelnen Zulieferern reduzieren und eine engere
  Kooperation mit verlässlichen Partnern wie Brasilien fördern. Erst vor zwei Wochen
  hat Deutschland dieses Ziel beim G7 -Gipfel in Frankreich unterstrichen, als die
  G7 -Mitglieder eine nichtverbindliche Allianz für kritische Rohstoffe ins Leben
  riefen, welche für den Austausch mit gleichgesinnten Partnern offen ist. Bei unserem
  gemeinsamen Bestreben, globale Lieferketten für kritische Rohstoffe zu stärken und
  zu diversifizieren, ist Brasilien für uns ein Schlüsselpartner. Aufgrund der weltweit
  zweitgrößten Vorkommen an seltenen Erden und zahlreicher weiterer kritischer Rohstoffe
  kommt Brasilien eine enorme strategische Bedeutung zu. Wir sind jedoch überzeugt,
  dass unsere Partnerschaft weit über im Boden befindliche Rohstoffe hinausgeht. Brasilien
  ist für Deutschland deshalb ein so wichtiger Partner, weil wir durch dieselben Interessen
  und Werte verbunden sind: erstens verbindet uns das Streben nach diversifizierten
  und resilienten Handelsbeziehungen. Und zweitens, eine verlässliche, langfristige
  und vertrauensvolle Partnerschaft. Meine Damen und Herren, auch Deutschland bringt
  wichtige Stärken in diese Partnerschaft ein: Wir bieten eine starke Nachfrage nach
  kritischen Rohstoffen und einen attraktiven Markt für brasilianische Unternehmen.
  Darüber hinaus bringt die deutsche Industrie umfassende Expertise mit: in den Bereichen
  Bergbau, Verarbeitung, fortschrittliche Fertigung, Technologie und Forschung – einschließlich
  Unternehmen, die bereit sind, in Brasilien zu investieren. Kurz gesagt: Wir möchten
  mit Brasilien entlang der gesamten Wertschöpfungskette für Rohstoffe zusammenarbeiten
  – von der Erschließung über die Gewinnung bis hin zu Verarbeitung, Recycling, Innovation
  und der Entwicklung neuer Technologien. Die Wirtschaftsdelegation, die mich heute
  begleitet, steht für unsere Entschlossenheit, die industrielle Zusammenarbeit zu
  vertiefen und Ergebnisse zu erzielen, die beiden Seiten zugutekommen. Gleichzeitig
  sind wir der Ansicht, dass eine erfolgreiche Zusammenarbeit mehr beinhalten muss
  als die bloße Absicherung der Versorgung. Wir sind gleichermaßen an lokaler Wertschöpfung,
  der Stärkung der Verarbeitungskapazitäten und der Unterstützung der industriellen
  Entwicklung in Brasilien interessiert. Ferner bekennen wir uns zur Förderung hoher
  Umwelt-, Sozial- und Governance-Standards, und zwar entlang der gesamten Wertschöpfungskette.
  Mit anderen Worten: Die Brücke, die wir bauen, sollte nicht nur stark, sondern auch
  nachhaltig sein und den Unternehmen und Menschen auf beiden Seiten dienen. Meine
  Damen und Herren, Deutschland und Brasilien haben 2024 eine Rohstoffpartnerschaft
  geschlossen – eine ausgezeichnete Grundlage, um unsere Zusammenarbeit auf eine neue
  Stufe zu heben. Nun ist es an der Zeit, konkrete Ergebnisse zu liefern. Auf der
  heutigen Konferenz geht es darum, die zentralen Akteure zusammenzubringen; es geht
  darum, das Beste aus beiden Welten zu vereinen.'
