title: Der Beauftragte der Bundesregierung für Menschenrechtspolitik und humanitäre
  Hilfe Lars Castellucci reist nach Libyen
text: 'Vor seiner Reise nach Tripolis erklärte der Beauftragte der Bundesregierung
  für Menschenrechtspolitik und humanitäre Hilfe, Lars Castellucci, heute (12.7.2026):
  Nur rund 300 km Mittelmeer trennen Libyen von der Europäischen Union. Das Land gehört
  zur unmittelbaren Nachbarschaft der EU . Die Entwicklungen in Libyen haben Auswirkungen
  auf uns in Europa. Das gilt insbesondere auch für Flucht- und Migrationsbewegungen
  aus Asien und Subsahara-Afrika. Allein seit dem erneuten Ausbruch des Konflikts
  im Sudan im Jahr 2023 sind rund eine Million Menschen nach Libyen geflohen. Das
  Land sieht sich dadurch mit humanitären, migrationspolitischen und gesellschaftlichen
  Herausforderungen konfrontiert, die durch die anhaltende, seit dem Arabischen Frühling
  nicht überwundene politische Krise verschärft werden. Während meiner Reise nach
  Libyen werde ich mich über die Situation der Geflüchteten und Migrantinnen und Migranten
  sowie der aufnehmenden libyschen Gemeinden informieren. Wir müssen gemeinsam mit
  Libyen und den weiteren Akteuren entlang der Fluchtrouten nach Lösungen suchen,
  um Schutzsuchenden lebensgefährliche Wege nach Europa zu ersparen. Der zunehmenden
  Gewöhnung an die Lage auf dem Mittelmeer müssen wir entgegenwirken – jeder Ertrunkene
  ist einer zu viel. Gleichzeitig verfolge ich aufmerksam die Berichte über die Menschenrechtssituation
  in Libyen. Meine Sorge gilt insbesondere benachteiligten Bevölkerungsgruppen. Deshalb
  werde ich mich auch mit Vertreterinnen und Vertretern der Zivilgesellschaft über
  ihre Arbeit und ihre Handlungsspielräume austauschen. Dabei wird es insbesondere
  darum gehen, auszuloten, wie Deutschland Libyen dabei unterstützen kann, die Lebensbedingungen
  der Libyerinnen und Libyer zu verbessern und zivilgesellschaftliches Engagement
  zu stärken. Der Beauftragte der Bundesregierung für Menschenrechtspolitik und humanitäre
  Hilfe, Lars Castellucci, reist vom 12. bis 15. Juli 2026 in die libysche Hauptstadt
  Tripolis. Deutschland hat mit den Berliner Konferenzen 2020 und 2021 daran mitgewirkt,
  dass der Bürgerkrieg in Libyen beendet werden konnte. Dennoch hat das Land weiterhin
  keine nationalen Wahlen durchgeführt. Deutschland setzt sich dafür ein, dass die
  demokratische Übergangsphase mit freien, transparenten und inklusiven Parlaments-
  und Präsidialwahlen erfolgreich vollendet wird. Dabei unterstützt es die Bemühungen
  der UN -Mission in Libyen UNSMIL , die einen breiten und inklusiven politischen
  Prozess fazilitiert. In Tripolis wird sich der Menschenrechtsbeauftragte mit Vertreterinnen
  und Vertretern libyscher Behörden, von nationalen und internationalen Nichtregierungsorganisationen,
  der Zivilgesellschaft und der UN -Mission UNSMIL treffen. Eine besondere Rolle bei
  den Gesprächen werden die Entwicklungen im Bereich Menschenrechte, Migration, humanitäre
  Hilfe und Teilhabe am politischen Leben spielen. Deutschland unterstützte Libyen
  mittels internationaler Organisationen 2025 mit 2,1 Mio. Euro bei der Versorgung
  von vulnerablen Personen. Zudem werden Projekte zur gesellschaftlichen Stärkung
  von Frauen und jungen Menschen, Stärkung des Gesundheitssystems, der Basisdienstleistungen
  sowie kommunaler Entwicklung von Deutschland gefördert.'
