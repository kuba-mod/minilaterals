title: Opening remarks by Foreign Minister Johann Wadephul at the conference “Building
  rare earth supply chains between Brazil, Germany and the EU” in Brasilia
text: 'Germans and Brazilians are often associated with very different strengths:
  In Germany, we take pride in precision, punctuality and meticulous planning. In
  Brazil, you have a remarkable ability to adapt – to make everything work, even when
  the plan changes. When it comes to critical raw materials and evolving supply chains,
  we need both planning and the flexibility to turn those plans into reality. Germany
  and Brazil may be separated by thousands of kilometers. But today’s conference is
  about building a bridge over this distance – a bridge in the field of critical raw
  materials. A bridge that connects our strengths, our economies, our industries,
  and our shared ambitions for the future. For Germany, diversifying our supply chain
  for critical raw materials is a top priority. Our goal is clear: to reduce dependencies
  on individual suppliers and to foster closer cooperation with reliable partners
  such as Brazil. Germany underscored this objective just two weeks ago at the G7
  Summit in France, where a non-binding G7-Critical Minerals Resilience and Production
  Alliance was launched – open to engagement with likeminded partners. In our joint
  effort to strengthen and diversify global supply chains for critical raw materials
  we see Brazil as a key partner: With the world''s second-largest reserves of rare
  earths and a broad range of other critical raw materials, Brazil holds massive strategic
  importance. However, we are convinced, that our partnership goes far beyond resources
  in the ground. What makes Brazil such an important partner for Germany is that we
  share the same interests and values: First, diversified and resilient trade relationships.
  And second, reliable, long-term partnerships built on trust. Ladies and gentlemen,
  Germany too brings important strengths to this partnership: We offer a strong demand
  for critical raw materials and an attractive market for Brazilian companies. Also,
  German industry contributes extensive expertise in mining, processing, advanced
  manufacturing, technology, and research – including companies that are ready to
  invest in Brazil. In short, our ambition is clear: to work together with Brazil
  across the entire raw materials value chain – from exploration and extraction to
  processing, recycling, innovation, and the development of new technologies. The
  business delegation accompanying me today represents our commitment to deepening
  industrial cooperation and creating mutually beneficial outcomes. At the same time,
  we believe that successful cooperation must go beyond simply securing supply. We
  are equally interested in local value creation, strengthening processing capacities,
  and supporting industrial development in Brazil. We are also committed to promoting
  high environmental, social, and governance standards – across the entire value chain.
  In other words, the bridge we are building should not only be strong, but also sustainable
  and beneficial for companies and communities on both sides. Ladies and gentlemen,
  in 2024, Germany and Brazil concluded a Raw Materials Partnership – an excellent
  foundation for taking our cooperation to the next level. Now, the time has come
  to deliver concrete results. Today’s conference is about bringing together the key
  actors; about bringing together the best of both worlds.'
