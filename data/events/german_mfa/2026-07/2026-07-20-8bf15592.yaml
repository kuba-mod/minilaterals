title: Außenminister Wadephul vor seiner Abreise nach Mauretanien, Nigeria und Südafrika
text: 'Vor seiner Abreise nach Mauretanien, Nigeria und Südafrika erklärte Außenminister
  Johann Wadephul heute (20.07.): Europa und Afrika verbindet mehr als geografische
  Nähe. Unsere Kontinente sind politisch, wirtschaftlich und in Sicherheitsfragen
  eng verflochten. Gerade in Zeiten globaler geopolitischer Verwerfungen ist eine
  verlässliche Zusammenarbeit mit unseren afrikanischen Partnern wichtig. Es geht
  Deutschland und Europa dabei um mehr als das naheliegende Interesse an einem möglichst
  stabilen und prosperierenden Nachbarkontinent. Es geht darum, einander Angebote
  zu machen. Deshalb besuche ich zum dritten Mal innerhalb weniger Monate wichtige
  Staaten Afrikas. Mauretanien, Nigeria und Südafrika liegen in drei sehr unterschiedlichen
  Regionen des afrikanischen Kontinents. Zugleich stehen wir vor ähnlichen Herausforderungen:
  Wir alle profitieren von fairen Handelspartnerschaften und frei befahrbaren Seewegen,
  benötigen eine zuverlässige Versorgung mit kritischen Rohstoffen, wollen die Chancen
  geordneter Migration nutzen und unsere Lebensgrundlagen gegen Klimawandel schützen.
  Um die Freiheit der Menschen zu sichern, müssen wir Extremismus und Terrorismus
  bekämpfen. Eine regelgeleitete internationale Ordnung ist der Rahmen, den wir für
  unsere Zusammenarbeit brauchen. Als stabiler Staat in einer sonst hochgradig fragilen
  Region ist Mauretanien für uns ein verlässlicher Partner. Die Dauerkrise im Sahel
  stellt das Land vor immense humanitäre und auch Sicherheits-Herausforderungen. Deutschland
  steht bereit, hier noch stärker zu unterstützen. Denn Stabilität im Sahel liegt
  ganz klar auch im deutschen und europäischen Interesse. Mauretanien bietet zugleich
  Chancen für erneuerbare Energien, insbesondere beim Gewinn von grünem Wasserstoff.
  Mit meinem Besuch möchte ich auch über die Möglichkeiten für vertiefte wirtschaftliche
  Beziehungen bei Zukunftstechnologien sprechen. Als bevölkerungsreichstes Land und
  größter Binnenmarkt Afrikas ist Nigeria ein wirtschaftliches Kraftzentrum und spielt
  auch in der regionalen Energieversorgung eine Schlüsselrolle. Bereits jetzt ist
  das Land unser zweitwichtigster Handelspartner in Subsahara-Afrika. Das wechselseitige
  Potenzial wollen wir weiter ausschöpfen und mehr deutsche Unternehmen ermuntern,
  den Schritt nach Nigeria zu gehen. Neben seiner wirtschaftlichen Bedeutung ist Nigeria
  eine politische Führungsmacht in Westafrika und der Regionalorganisation ECOWAS
  . Als gefestigte Demokratie, die auf eine stabile internationale Ordnung setzt,
  hat das Land Gestaltungsanspruch darüber hinaus. Wir wollen unsere Beziehungen systematisch
  stärken. Dazu gehört auch die Zusammenarbeit im Sicherheitsbereich, denn die Spill-Over
  Effekte der Krise im Sahel betreffen inzwischen alle Küstenanrainerstaaten von Mauretanien
  bis nach Nigeria. Südafrika ist seit langem ein Schlüsselpartner für Deutschland
  auf dem afrikanischen Kontinent. Unsere gemeinsame Wertebasis als Demokratien verbindet
  uns in besonderem Maße. Mit keinem anderen Staat Afrikas ist die Zusammenarbeit
  so eng und breit aufgestellt. Deshalb haben wir unsere Beziehungen erst vor einigen
  Wochen zu einer Strategischen Partnerschaft ausgebaut, mit der wir auch den Dialog
  in außenpolitischen Fragen vertiefen wollen. Denn die südafrikanische Stimme – als
  entschiedener Verfechter des Multilateralismus und als einziges afrikanisches G20
  -Mitglied – hat Gewicht. Mit knapp 600 deutschen Firmen und als bei weitem bedeutendster
  Handelspartner in Afrika ist Südafrika zudem zentraler Ankerpunkt für die deutsche
  Wirtschaft. Erhebliche Chancen bestehen insbesondere im Bereich der Energiewirtschaft
  und der Rohstoffzusammenarbeit. In meinen Gesprächen vor Ort will ich ausloten,
  wie wir hier weitere Schritte aufeinander zugehen können. Wenn Krisen, Handelsbeschränkungen
  und globale Abschottungstrends die internationale Zusammenarbeit auf die Probe stellen,
  ist es an uns, unsere weltweiten Netze noch enger zu knüpfen – so auch mit wichtigen
  Partnern auf unserem Nachbarkontinent Afrika. Deutschland steht dabei für internationale
  Kooperation, wirtschaftliche Offenheit und Verlässlichkeit.'
