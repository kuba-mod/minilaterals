title: Statement von Staatssekretär Dr. Géza Andreas von Geyr anlässlich der Eröffnungssitzung
  des Deutsch-Syrischen Joint Committee in Damaskus
text: 'Vielen Dank für die freundliche Begrüßung und Ihre Gastfreundschaft, wir freuen
  uns, hier zu sein. Dies ist ein guter, ein wichtiger Tag für Deutschland, für Syrien,
  für die deutsch-syrischen Beziehungen! Beim Besuch Ihres Präsidenten in Berlin im
  März diesen Jahres haben Präsident al-Sharaa und Bundeskanzler Merz ein neues Kapitel
  unserer Beziehungen aufgeschlagen und den deutsch-syrischen Aktionsplan vereinbart.
  Dieser umfasst ein ambitioniertes Programm – heute beginnen wir als Joint Committee
  damit, das Programm, das viele Bereiche abdeckt, gemeinsam in die Tat umzusetzen.
  Gemeinsam - Wichtig ist, dass wir von Anfang an gemeinsam vorgehen. Deshalb ist
  es gut, dass die Vertreter der dafür verantwortlichen Ministerien und Behörden unserer
  beiden Länder heute hier zusammenkommen. Eine Anmerkung zu diesem einzigartigen
  Ort, an dem wir heute als Joint Committee tagen: Hier kommt Vieles zusammen: die
  schmerzhafte Vergangenheit Ihres Landes und der hoffnungsvolle Aufbruch in eine
  gute Zukunft – eine gute Zukunft, die wir Ihrem Land und den Menschen von Herzen
  wünschen. Wir in Deutschland haben mitverfolgt, wie sich die Menschen in Syrien
  nach vielen Jahren der Diktatur ihre Freiheit, ihre Würde, ihr Recht auf Selbstbestimmung
  über die Zukunft ihres Landes zurückgeholt haben - gerade auch hier, mit diesem
  Palast. Wir haben das Streben des syrischen Volkes nach Freiheit immer unterstützt
  und werden auch den weiteren Prozess begleiten. Für unser heutiges Treffen als Joint
  Committee möchte ich für die deutsche Seite fünf wesentliche Punkte hervorheben:
  Wir sind bereit, den Wiederaufbau in Syrien nach Kräften zu unterstützen. Dies wird
  im Zentrum unserer Gespräche stehen. Die Zerstörungen waren gewaltig – und so sind
  auch die Herausforderungen an Ihre Regierung gewaltig, insbesondere bei der Wiederinstandsetzung
  der Infrastruktur, der Grundversorgung oder der Bereitstellung von dringend benötigtem
  Wohnraum. Es gibt bereits viele Initiativen und Projekte aus den verschiedenen Ministerien,
  die heute hier mit am Tisch sitzen und auch darüber hinaus. Jetzt geht es darum,
  in enger Koordinierung mit Ihnen noch mehr tun. Wir wollen gemeinsam mit Ihnen ambitioniert
  sein. Voraussetzung für Vieles ist, dass die fiskalischen Rahmenbedingungen stimmen.
  Gerade weil die Aufgaben so groß sind, dass kein Staat und auch keine Gruppe von
  Staaten diese allein schultern kann, braucht Ihr Land, brauchen wir unbedingt fiskalische
  Rahmenbedingungen, die eine finanzielle Unterstützung des Wiederaufbaus durch die
  internationale Gemeinschaft und durch multilaterale Institutionen möglich machen.
  Über Wege und Möglichkeiten werden wir intensiv sprechen. Die politischen Rahmenbedingungen
  müssen stimmen, damit eine wirkliche Erholung der Wirtschaft, und zwar unter Einbeziehung
  aller gesellschaftlicher Gruppen, gelingen kann. Syrien braucht funktionierende,
  professionelle und unparteiische staatliche Institutionen für alle Syrerinnen und
  Syrer und eine transparente Aufarbeitung der Verbrechen der Vergangenheit. Dies,
  so verstehe ich es, sind auch wesentliche Ziele Ihrer Regierung. Der Weg dorthin
  ist nicht einfach. Wir werden Sie, wo sie es wünschen und wo wir können, unterstützen.
  An dieser Stelle möchte ich ausdrücklich begrüßen, dass die neue Nationalversammlung
  nun arbeitsfähig ist und am vergangenen Sonntag ihre konstituierende Sitzung abgehalten
  hat. Wir werden heute auch intensiv darüber sprechen, wie auch die Syrerinnen und
  Syrer, die sich in Deutschland befinden und dort in schwierigen Zeiten Zuflucht
  gefunden haben, am Wiederaufbau ihres Landes teilhaben können. Dabei wird es auch
  darum gehen, wie wir die Rückkehr von Syrerinnen und Syrern aus Deutschland in ihre
  Heimat befördern und unterstützen können und wie wir dafür durch Wiederaufbau und
  die Ankurbelung der Wirtschaft Impulse setzen können. Ihr Land, das durch eine so
  schwierige Zeit gegangen ist, befindet sich heute wieder umgeben von Krisen, Auseinandersetzungen
  und neuen Kriegen. Wir haben, Herr Außenminister, gerade über die brisante Lage
  in der Region und an fast allen ihren Grenzen gesprochen. Und ich bedanke mich dafür,
  dass Sie uns an Ihrer so profunden Expertise teilhaben lassen, die unser Verständnis
  schärft. Ich möchte auch sagen: Meinen großen Respekt dafür, wie stabil Syrien heute
  inmitten all der Auseinandersetzungen ist – auch dank Ihrer diplomatischen Kunst
  in so fordernden Zeiten. Und ich hoffe sehr, dass sich die Zeiten ändern werden,
  und Sie aus der einzigartigen Lage Ihres Landes Nutzen ziehen können, als Verbindung
  zwischen Europa und dem Nahen und Mittleren Osten bis zum Golf. Auch darüber was
  hier in Zukunft möglich werden sollte, werden wir sprechen – ein Thema, das ja auch
  Ihr Präsident dem Bundeskanzler nahegebracht hat. Haben Sie nochmals herzlichen
  Dank für die Gastfreundschaft!'
