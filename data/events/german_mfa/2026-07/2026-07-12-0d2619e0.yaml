title: E3 Foreign Ministers‘ Statement on Iranian Attacks
text: We condemn Iran’s reckless attacks on commercial shipping in the Strait of Hormuz
  and countries in the region including Qatar, Kuwait, Bahrain, Oman and Jordan. Respect
  for sovereignty over territorial seas and freedom of navigation are fundamental
  principles of international law. We reaffirm our continued support for the swift
  and full resumption of international shipping through the Strait of Hormuz and express
  full solidarity with our Gulf and regional partners. We also call for the resumption
  of the ceasefire and of negotiations.
