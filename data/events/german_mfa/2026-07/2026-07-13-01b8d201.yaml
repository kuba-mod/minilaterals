title: Außenminister Wadephul vor seiner Abreise nach Bodø, Norwegen
text: 'Vor seiner Abreise nach Bodø, Norwegen, erklärte Außenminister Wadephul heute
  (13.07.2026): Im Hohen Norden ist Norwegen für Deutschland ein unverzichtbarer Werte-,
  Sicherheits- und Wirtschaftspartner. Hier hat sich ein geopolitischer Hotspot entwickelt,
  der für unsere gemeinsame Sicherheit von strategischer Bedeutung ist. Gerade in
  der Arktis und im Nordatlantik wird unmissverständlich deutlich: Nach dem russischen
  Angriffskrieg gegen die Ukraine müssen wir unsere Sicherheit, Verteidigung und Abschreckung
  gegenüber Russland an der Ost- und Nordflanke der NATO neu ausrichten. Im Nordatlantik
  verlaufen Europas transatlantische Lebensadern: Datenkabel, Energieinfrastruktur,
  Versorgungswege zu Luft und zunehmend auch zur See in der Arktis. Russland drängt
  wirtschaftlich und militärisch immer stärker in eine Region, die für unsere Sicherheit
  von herausragender strategischer Bedeutung ist. Dabei schreckt Russland auch vor
  Provokationen und hybriden Angriffen nicht zurück. Auch China verstärkt seine Präsenz
  in der Arktis planvoll. Der Klimawandel beschleunigt dabei die geopolitische Drift:
  Die Arktis erwärmt sich viermal schneller als der Rest der Welt. Schmelzendes Eis
  schafft neue Seerouten und eröffnet den Zugang zu kritischen Rohstoffen wie seltenen
  Erden – und schafft somit neue Konkurrenz in arktischen Breiten. Umso dringlicher
  ist es, dass wir als NATO -Alliierte gemeinsam für Stabilität und Sicherheit im
  Hohen Norden eintreten. Deutschland und Norwegen stehen in der NATO dabei Seite
  an Seite. Wir stärken konsequent die Nordflanke des Bündnisses gegen alte wie neue
  Bedrohungen. Das zwischen Deutschland und Norwegen gemeinsam entwickelte U-Boot
  der Klasse U212CD, für das sich vergangene Woche auch Kanada entschieden hat, verkörpert
  unsere herausragende Zusammenarbeit. Daraus entsteht die größte, stärkste und modernste
  konventionelle U-Boot-Flotte der Allianz. Unsere transatlantischen Verteidigungsfähigkeiten
  im Nordatlantik hebt diese Zusammenarbeit auf ein vollkommen neues Niveau. Und unsere
  personellen Fähigkeiten wachsen ebenfalls mit: Mehr als tausend deutsche Soldatinnen
  und Soldaten haben sich in diesem Jahr an der NATO -Übung Cold Response in Norwegen
  beteiligt – ein klares Zeichen, dass wir uns auf neue Entwicklungen im Nordatlantik
  gemeinsam vorbereiten. Dazu werde ich auch das operative Hauptquartier der norwegischen
  Streitkräfte in Reitan besuchen, das für die Überwachung der gesamten Region essentiell
  ist. Sei es für die Zukunft unserer Energieversorgung, wie etwa bei der Gewinnung
  von Wasserstoff, bei unserer Versorgung mit kritischen Lieferketten und Rohstoffen
  oder bei technologischem Fortschritt, etwa bei der Weltraumforschung in Norwegen
  und Schweden: Die Sicherheit Norwegens im Hohen Norden ist untrennbar mit unserer
  eigenen Sicherheit verbunden. Als strategische Schlüsselregion mit starken und zuverlässigen
  Partnern messen wir der nordischen Region deshalb größte Bedeutung bei. Deshalb
  werde ich meine Reise am Mittwoch in Finnland fortsetzen.'
