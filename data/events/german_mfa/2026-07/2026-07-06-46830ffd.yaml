title: Außenminister Wadephul zum Kauf von U-Booten mit TKMS als bevorzugtem Hersteller
text: 'Außenminister Wadephul sagte zur Entscheidung der kanadischen Regierung für
  ein deutsch-norwegisches Angebot zum Kauf von U-Booten mit TKMS als bevorzugten
  Hersteller: Ich freue mich, dass wir Kanada von unserem deutsch-norwegischen Angebot
  im Rahmen des kanadischen U-Boot-Programms überzeugen konnten. Kanada hat damit
  ein starkes Signal des Zusammenhalts im transatlantischen Bündnis abgegeben. Gemeinsam
  machen wir den Atlantik kleiner. Mit dem deutschen Unternehmen TKMS als bevorzugtem
  Hersteller hat sich Kanada für die besten konventionellen U-Boote der Welt entschieden.
  Dieser Schritt bedeutet eine langfristige Stärkung und Vertiefung unserer Partnerschaft
  im transatlantischen Bündnis. Kanada, Norwegen und Deutschland schlagen damit auch
  ein neues Kapitel der Verteidigungs- und Industriepolitik auf.'
