title: Staatminister Gunther Krichbaum reist zu politischen Terminen nach Paris und
  in die Region von Tours
text: 'Vor seiner Abreise nach Frankreich sagte Staatsminister Gunther Krichbaum am
  01.07.2026: Vor dem Hintergrund wachsender Unsicherheiten und Bedrohungen ist die
  deutsch-französische Zusammenarbeit unverzichtbarer denn je. Es waren der Mut und
  die Entschlossenheit von De Gaulle und Adenauer, die den Grundstein für unsere Aussöhnung
  gelegt haben. Heute ist es unsere Aufgabe, mit demselben Mut und derselben Entschlossenheit
  diesen Weg im Dienste eines starken, souveränen und handlungsfähigen Europas fortzusetzen.
  Gemeinsam mit Frankreich wollen wir unsere Bemühungen noch weiter intensivieren,
  um Europa mit all unseren Partnern in eine freie, wohlhabende und sichere Zukunft
  zu führen. Dieses Ziel werden wir im Rahmen des anstehenden deutsch-französischen
  Ministerrats weiterverfolgen. Auch deswegen bin ich heute in Paris. Ich danke Sabine
  Thillaye , Abgeordnete von Indre et Loire und Vorsitzende der deutsch-französischen
  Freundschaftsgruppe in der Assemblée Nationale , für die Einladung, ihre wunderbare
  Region, die Touraine, kennenzulernen. Es freut mich zu sehen, wie facettenreich
  sich deutsch-französische Kooperationen im ganzen Land und auf allen Ebenen gestalten.
  Sie stärken tagtäglich und in allen Bereichen die deutsch-französische Freundschaft
  und die europäische Zusammenarbeit. Der Staatsminister für Europa im Auswärtigen
  Amt und Beauftragte für die deutsch-französische Zusammenarbeit, Gunther Krichbaum,
  reist vom 1. bis 3. Juli nach Paris und in die Region von Tours. Er wird politische
  Gespräche in Paris führen. Er trifft dort seinen Amtskollegen, Europaminister Benjamin
  Haddad, sowie verschiedene Abgeordnete der Assemblée nationale . Darüber hinaus
  wird er die Region von Tours besuchen. Neben Gesprächen mit lokalen Amtsträgern
  und deutsch-französischen Akteuren trifft er sich mit Vertreterinnen und Vertretern
  lokaler Unternehmen und französischer Niederlassungen deutscher Unternehmen, die
  die Verflechtung der deutschen, französischen und europäischen Wirtschaft verkörpern.
  Im Fokus der Gespräche steht die hohe Bedeutung der intensiven deutsch-französischen
  Zusammenarbeit auf allen Ebenen, vom anstehenden deutsch-französischen Ministerrat
  bis hin zu kommunalen Partnerschaften, die die deutsch-französische Freundschaft
  täglich mit Leben erfüllen. Auch europapolitische Themen, vor allem die weitere
  Ausgestaltung einer starken, zukunftsorientierten und handlungsfähigen Europäischen
  Union, stehen auf der Agenda.'
