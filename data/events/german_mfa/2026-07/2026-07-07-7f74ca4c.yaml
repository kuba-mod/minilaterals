title: Bundesregierung verfünffacht ihre Unterstützung für die Gedenkstätte Yad Vashem
text: 'Eine Sprecherin des Auswärtigen Amts teilte mit (07.07.2026): Die Bundesregierung
  verfünffacht ihre Unterstützung für die Gedenkarbeit von Yad Vashem in den nächsten
  Jahren. Damit werden Deutschland und Israel ihre besonderen Beziehungen noch weiter
  festigen. Die Bundesregierung erkennt die fortwährende Verantwortung des deutschen
  Volkes für die die Shoah und ihre Folgen an und würdigt die besondere Bedeutung
  der zentralen Holocaust-Gedenkstätte Yad Vashem für das jüdische Volk. In Zeiten,
  in denen kaum noch Zeitzeugen vom Menschheitsverbrechen der Shoa berichten können,
  ist die Gedenkarbeit, die Yad Vashem und andere Gedenkstätten leisten, von unschätzbarem
  Wert. Als weltweites Dokumentationszentrum des Holocaust hält Yad Vashem dank seiner
  Bildungsprogramme und mithilfe moderner Technologien das Gedenken an den Holocaust
  aufrecht. Durch die heute von Außenminister Wadephul und dem israelischen Außenminister
  Saar unterzeichnete Vereinbarung wird die seit 2012 bestehende finanzielle Unterstützung
  für Yad Vashem bis zum Ende des Jahrzehnts von einer Million Euro auf insgesamt
  fünf Millionen Euro jährlich verfünffacht. Diese Mittel sind gerade jetzt und in
  den kommenden Jahren erforderlich, um die gewaltigen Bestände von Yad Vashem zu
  digitalisieren. Außerdem sollen dadurch stärkere europa- und weltweite Bildungsprogramme
  zur Aufklärung über den Holocaust ermöglicht werden, insbesondere für jüngere Zielgruppen.
  Yad Vashem trägt an entscheidender Stelle dafür Sorge, dass Zeitzeugenberichte und
  schriftliche Zeugnisse gefunden, gesichert, wissenschaftlich aufbereitet, nach modernsten
  Standards konserviert, digitalisiert und, auch online, einer breiten Öffentlichkeit
  zugänglich gemacht werden. Dazu beizutragen – und damit der grassierenden Relativierung
  und sogar Leugnung des Holocaust entschieden entgegen zu treten, bleibt meinem Land
  Aufgabe und Verpflichtung. Die Bundesregierung hat heute der Unterzeichnung des
  Protokolls zur Änderung des Abkommens vom 10. Juni 2020 zwischen der Regierung des
  Bundesrepublik Deutschland und der Regierung des Staates Israel über die finanzielle
  Unterstützung von Yad Vashem, der Gedenkstätte für Holocaust und Heldentum, für
  Erforschung, Dokumentation, Pädagogik und Gedenken an den Holocaust zugestimmt.
  Außenminister Wadephul unterzeichnete das Protokoll während seiner Reise nach Israel
  gemeinsam mit seinem israelischen Amtskollegen Gideon Sa‘ar.'
