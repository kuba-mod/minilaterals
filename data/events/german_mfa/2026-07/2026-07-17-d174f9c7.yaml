title: Erklärung zur grenzüberschreitenden Zusammenarbeit zwischen Frankreich und
  Deutschland
text: Gunther Krichbaum - Benjamin Haddad; Staatsminister für Europa - Beigeordneter
  Minister für Europa Vor einem Jahr haben wir am Rande des Deutsch-Französischen
  Ministerrats (DFMR) in Toulon gemeinsam einen Aktionsplan zur grenzüberschreitenden
  Zusammenarbeit beschlossen, der konkrete Verbesserungen im Alltag der Menschen in
  den Grenzregionen ermöglichen soll. Im Geiste des Vertrags von Aachen haben wir
  mit regionalen und lokalen Akteuren zusammen an der Umsetzung unserer Vorhaben gearbeitet
  und werden unsere Bemühungen weiter fortsetzen. Wir begrüßen die Fortschritte im
  Bereich der grenzüberschreitenden Gesundheitsversorgung, insbesondere die Unterzeichnung
  des Zusatzprotokolls zur MOSAR-Vereinbarung, in dem es speziell um die Versorgung
  von Schlaganfällen geht. Zudem freuen wir uns über den erfolgreichen Start der Arbeitsgruppe
  Gesundheitskorridor im Ausschuss für grenzüberschreitende Zusammenarbeit (AGZ) und
  bitten die Arbeitsgruppe konkrete Vorschläge zur Umsetzung in einem Bericht zu erarbeiten,
  der geprüft wird, um unsere Zusammenarbeit in diesem Bereich weiter zu vertiefen.
  In diesem Zusammenhang wird basierend auf der erstellten gemeinsamen Bedarfsanalyse,
  in Abstimmung mit den Kostenträgern, geprüft, wie sich neue Kooperationen nach Fachgebiet
  im Rahmen der Gesundheitsversorgung entwickeln lassen. Diese Ergebnisse können,
  soweit sinnvoll, zu neuen Kooperationsprojekten zum Nutzen der Patientinnen und
  Patienten in der Grenzregion führen. Wir sehen große Fortschritte beim Erwerb von
  grenzüberschreitenden Zugtickets, insbesondere durch die Einführung neuer digitaler
  Buchungsmöglichkeiten bei SNCF und DB. Auch die Umsetzung von grenzüberschreitenden
  Regionalbahnprojekten (TER) schreitet voran. Die Vereinfachung von Verfahren zur
  Arbeitnehmerentsendung bleibt eine Priorität für die Unternehmen in der Region.
  Wir begleiten engagiert die Umsetzung der Revision der Verordnung (EG) Nr. 883/2004,
  die die Zusammenarbeit zwischen Behörden sowie Dienstreisen und kurze Arbeitseinsätze
  auf der anderen Seite der Grenze erleichtern wird. Wir begrüßen, dass im Rahmen
  des AGZ eine Arbeitssitzung mit allen betroffenen Akteuren zu diesen Themen stattgefunden
  hat und der Dialog dazu fortgesetzt wird. Wir begrüßen die starke Nachfrage nach
  grenzüberschreitenden Berufsbildungsangeboten unter dem Abkommen von Lauterbourg.
  Unser gemeinsames Ziel ist es, so vielen jungen Menschen wie möglich grenzüberschreitende
  Berufsbildungsangebote zu machen. Bis zum Jahres-ende prüfen wir, wo aufgrund der
  systemischen Unterschiede in unseren Bildungssystemen ergänzende Optionen für grenzüberschreitende
  Praxisphasen notwendig sind, um diese im ersten Halbjahr 2027 umzusetzen. Wir begrüßen
  außerdem die engagierte Arbeit der AG „Grenzüberschreitendes Duales Studium“ im
  AGZ, die ergänzende Vorschläge zur Vereinfachung des grenzüberschreitenden Dualen
  Studiums erarbeitet. Wir begrüßen das regionale Engagement zur Erforschung und Nutzung
  des geothermischen Potentials in der Grenzregion. Wir freuen uns auf den Beginn
  des Interreg-Projekts GeoTresOR, das wir weiterhin aufmerksam verfolgen werden und
  dessen Ziel darin besteht, das Wissen über Geothermie als Ressource zu verbessern,
  administrative Hürden abzubauen und die Akzeptanz dieser Energie in der Bevölkerung
  zu erhöhen. Wir vereinfachen den Alltag unserer Grenzgängerinnen und Grenzgänger,
  indem wir die Entwicklung eines „grenzüberschreitenden Reflexes“ voranbringen, der
  bei den von unseren bei-den Ländern erarbeiteten Gesetzesentwürfen eine bessere
  Berücksichtigung der Besonderheiten des Grenzraums ermöglichen soll. Wir wollen
  Gesetze so gestalten, dass sie die besondere Ausgangslage in den Grenzregionen besser
  berücksichtigen und dass keine zusätzliche Bürokratie entsteht. Im Herbst werden
  wir im Rahmen des AGZ die derzeit laufende Pilotphase evaluieren und über die nächsten
  Schritte beraten, insbesondere über die in Frankreich entwickelte Methodologie und
  den in Deutschland verfolgten Ansatz, den Grenzraumcheck im Rahmen der „Besseren
  Rechtssetzung“ zu verankern. Wir blicken gespannt auf die Erfahrungen aus einem
  Pilotprojekt in Frankreich zur Umsetzung der „BRIDGEforEU“-Verordnung an der deutsch-französischen
  Grenze. Auf EU -Ebene werden in diesem Jahr entscheidende Dossiers behandelt, die
  Relevanz für die Grenzregionen haben. Hierzu zählen das Fair Labour Mobility Package
  und das Passenger Package. Es ist uns wichtig, dass die besonderen Belange unserer
  Grenzregionen in die Positionen unserer Regierungen einfließen. Hierzu werden wir
  in der nächsten AGZ-Sitzung den Austausch zu diesen Dossiers suchen. Im Bereich
  der Mobilität werden wir unsere Zusammenarbeit verstärken, um den täglichen Weg
  von Grenzpendlern und allen Bürgerinnen und Bürgern über die gemeinsame Grenze zu
  erleichtern. Wir sind zuversichtlich, dass wir durch diese gemeinsamen Anstrengungen
  die deutsch-französische Zusammenarbeit weiter voranbringen. Dabei stimmen wir uns
  eng mit den regionalen und lokalen Akteurinnen und Akteuren ab und stellen die Arbeitsfähigkeit
  des AGZ sicher. Gemeinsam können wir die Lebensqualität in unseren Grenzregionen
  maßgeblich verbessern und somit einen essentiellen Beitrag zur gelebten deutsch-französischen
  Freundschaft und europäischen Integration leisten.
