title: Federal Foreign Office on Russian airstrikes on Ukraine
text: 'A Federal Foreign Office Spokesperson issued the following statement today
  (2 July 2026) on the Russian airstrikes on Ukraine: We condemn the massive Russian
  airstrikes on Kyiv and other parts of Ukraine last night in the strongest terms.
  Once again, Putin’s Russia has subjected the Ukrainian capital and large areas of
  the country to heavy drone and missile attacks. People were killed or injured while
  they slept, homes destroyed and civilian infrastructure including a medical facility
  severely damaged. Our thoughts are with the victims and their families. The devastating
  images of last night’s destruction show once more that Russia is continuing to wage
  its illegal war of aggression against Ukraine with undiminished brutality. Putin
  is showing absolutely no willingness to negotiate. He persists in mounting missile
  and drone attacks against the population, while Russia is suffering great losses
  on the frontline in the context of its aggression against Ukraine. That is why Germany,
  together with its partners, is increasing the pressure on Russia. We are continuing
  our support for Ukraine in its fight to defend itself. This support will also be
  high up on the agenda of the NATO summit in Ankara next week.'
