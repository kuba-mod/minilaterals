title: E3-Außenministererklärung zu den iranischen Angriffen
text: Wir verurteilen die ruchlosen Angriffe Irans auf die Handelsschifffahrt in der
  Straße von Hormus und auf Länder in der Region, darunter Katar, Kuwait, Oman und
  Jordanien. Die Achtung der Souveränität über Küstenmeere sowie die Freiheit der
  Schifffahrt sind grundlegende Prinzipien des Völkerrechts. Wir bekräftigen unsere
  fortwährende Unterstützung für eine rasche und vollständige Wiederaufnahme der internationalen
  Schifffahrt durch die Straße von Hormus und verleihen unserer uneingeschränkten
  Solidarität mit unseren Partnern unter den Golfstaaten und in der Region Ausdruck.
  Wir fordern ferner die Wiederherstellung des Waffenstillstands und die Wiederaufnahme
  der Verhandlungen.
