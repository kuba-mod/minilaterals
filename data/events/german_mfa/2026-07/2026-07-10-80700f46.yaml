title: Statement by the High Representative on behalf of the European Union on the
  escalating violence in El Obeid
text: The European Union ( EU ) is seriously alarmed by the situation in El Obeid,
  the capital of North Kordofan. A major military build-up by the Rapid Support Forces
  (RSF) threatens the city which currently shelters 500,000 civilians, including approximately
  100,000 displaced persons. The RSF must immediately cease all military operations
  in and around El Obeid that put civilians at risks. El Obeid cannot become another
  El Fasher. International humanitarian and human rights laws, including the protection
  of civilians in particular women and girls and civilian infrastructure, must be
  fully respected by all parties to the conflict. Any attack that targets the civilian
  population, prevents their safe passage or any action that intentionally obstructs
  humanitarian access to persons in need constitutes a violation of international
  humanitarian law and will lead the EU to consider robust measures against those
  responsible. The EU urges all foreign actors in line with their commitments in the
  Berlin principles to immediately end any direct or indirect support which enables
  and intensifies the conflict to continue. The EU calls on all parties to the conflict
  to return to negotiations for a lasting ceasefire, to ensure rapid, safe, unimpeded,
  principled and sustained humanitarian access, to support a Sudanese-led civilian
  political process leading to the restoration of civilian governance, and to restore
  and to uphold accountability and respect for international law. As a member of the
  Quintet, the EU reaffirms its commitment to the Sudanese people and will continue
  to support efforts to end the suffering, to promote justice and accountability,
  and restore peace in a Sudanese-led transition to civilian rule.
