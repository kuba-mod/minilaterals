title: Außenminister Wadephul reist nach Israel
text: 'Vor seiner Abreise nach Israel sagte Außenminister Wadephul (07.07.2026): Ich
  reise zu einem engen Freund und Partner. Der Staat Israel ist von vielen Seiten
  bedroht, der weltweite Antisemitismus nimmt zu. Wir sind aber auch durch eine gegenseitige
  Sicherheitspartnerschaft verbunden. Zugleich wissen wir, dass die drängenden Fragen
  regionaler Sicherheit im Nahen und Mittleren Osten nur im Rahmen eines gemeinsamen
  Verständnisses aller beteiligten Länder beantwortet werden können. Vor meiner Teilnahme
  am NATO -Gipfel in Ankara reise ich daher nochmals zu Gesprächen mit meinem israelischen
  Amtskollegen nach Israel. Mein Ziel ist es, einen Beitrag zur Verständigung und
  langfristigen Befriedung in der Region zu leisten. Die Einigung zwischen Israel
  und Libanon macht Hoffnung, sie bietet die Chance, einen jahrzehntelangen Konflikt
  beizulegen. Deutschland möchte Israel und Libanon auf diesem Weg unterstützen. Entscheidend
  ist, dass Libanon sein staatliches Gewaltmonopol verlässlich durchsetzt, ebenso
  wichtig sind klare Sicherheitsgarantien für Israel. Wenn alle Seiten Verantwortung
  übernehmen, kann dieser Prozess zu Stabilität, Sicherheit und dauerhaftem Frieden
  führen. Mit meinem israelischen Amtskollegen werde ich auch über die Verhandlungen
  zwischen den USA und Iran sprechen. Die Verstetigung des erreichten Waffenstillstandes
  steht weiterhin aus. Es ist an Iran, die Gelegenheit für konstruktive Verhandlungen
  zu nutzen. Wir verlieren auch die Lage in Gaza nicht aus dem Blick: Während der
  heißen Sommermonate spitzt sich aktuell der Wassermangel gefährlich zu. Vollumfänglicher
  Zugang für humanitäre Helfer und ihre Materialien sind unerlässlich, um die verzweifelte
  Lage der Menschen in Gaza zu verbessern. Unser Verhältnis zu Israel kann nie unabhängig
  von der Verantwortung gesehen werden, die Deutschland angesichts des von Deutschen
  begangenen Menschheitsverbrechens der Shoa für die Sicherheit des einzigen jüdischen
  Staates trägt. Zu dieser Verantwortung gehört es, jeder Art von Geschichtsverfälschung
  und Relativierung entgegenzutreten, auch indem die historische Wahrheit auch nach
  dem Verlust der letzten Zeitzeugen heutigen Generationen vermittelt wird. Zu diesem
  Ziel arbeiten Bund und Länder intensiv mit der Gedenkstätte Yad Vashem zusammen.
  Mein Besuch in Israel dient auch dem Ziel, diese Kooperation zu stärken und weiter
  auszubauen.'
