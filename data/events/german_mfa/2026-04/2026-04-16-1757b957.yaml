title: Statement by Foreign Minister Johann Wadephul on the ceasefire announced between
  Israel and Lebanon
text: 'On 16 April 2026, Foreign Minister Johann Wadephul issued the following statement
  on the ceasefire announced between Israel and Lebanon: We welcome the ten-day ceasefire
  between Israel and Lebanon announced by US President Trump. It can give people on
  both sides of the border an important respite. I would like to thank the United
  States for its mediation work, particularly in the past days. I encourage the Israeli
  and Lebanese Governments to continue on the positive path of direct talks begun
  in Washington on Tuesday. Long-term agreements on securing the border, protecting
  civilians on both sides of the Blue Line and ensuring security for the UNIFIL blue
  helmets are now needed. Direct peace talks between Israel and Lebanon offer the
  potential of a future as neighbours, with both Israel’s legitimate security interests
  and Lebanon’s right to territorial integrity and sovereignty taken equally into
  account. Long-term security in the region can only be achieved if Hezbollah is disarmed
  effectively. We welcome the fact that the Lebanese Government has also declared
  the disarmament of Hezbollah as a goal — the Government is now called on to carry
  this out effectively. Germany is helping to maintain stability in Lebanon through
  its support for the Lebanese army and the Lebanese security forces. As the largest
  humanitarian donor to the people in Lebanon, we support those suffering from the
  impact of the war, particularly the over one million internally displaced persons.'
