title: Statement by Minister of State Hahn on his arrival in Brunei for the ASEAN-EU
  Ministerial Meeting (27 and 28 April 2026)
text: 'Minister of State Hahn issued the following statement today (27 April) on his
  arrival in Brunei for the ASEAN- EU Ministerial Meeting (27 and 28 April): ASEAN
  and the EU are united by shared values, shared interests, trade, political exchange
  and close people-to-people relations. We are both committed to a rules-based international
  order, to international law and to multilateralism. The EU enjoys trust in the region
  and is seen as a reliable partner. ASEAN is one of the largest international trading
  blocs and a dynamic and innovative economic area. Trade between ASEAN and the EU
  has more than tripled since 2000. The EU and Germany support the expansion of trade,
  investment and stable supply chains. In this context, it is important to us to ensure
  legal certainty and reliable investment conditions, market access, stable supply
  chains and the dismantling of trade barriers. Especially in times of geopolitical
  uncertainty, it is crucial for business that partnerships are resilient with a long-term
  perspective. To mark the fiftieth anniversary of the EU -ASEAN Strategic Partnership
  in 2027, this already close cooperation is set to be upgraded to a “comprehensive
  strategic partnership”. That is the aim of the ASEAN- EU Ministerial Meeting taking
  place in Bandar Seri Begawan from 27 to 28 April 2026. In light of the situation
  in the Gulf and the Strait of Hormuz, cooperation in the field of energy is crucial.
  The ongoing EU support for the ASEAN energy grid is an important element in this,
  as are other measures to expand renewable energies.'
