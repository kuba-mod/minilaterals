title: Joint Statement by Italy and Germany
text: Italy and Germany follow with great concern developments regarding the Global
  Sumud Flotilla, which was seized last night in international waters off the coast
  of Greece. We call for a full respect of international applicable law and for restraint
  from irresponsible actions. Our common utmost priority is to ensure the security
  of our citizens, in line with humanitarian international law. We recall our joint
  commitment and the efforts of the international community to provide humanitarian
  aid to Gaza in accordance with international law and standards.
