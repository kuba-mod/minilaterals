title: Speech by Foreign Minister Johann Wadephul at the “New Königswinter Future
  Lab”
text: 'In politics, much is often about clarity. It can be one of the key factors
  for successful action. One of your great institutions has just taken a decision
  of real clarity: By extending the contract of Thomas Tuchel – the very first German
  to coach the Three Lions – for two more years, the Football Association has again
  shown strategic foresight. Yvette, today we stand here as friends and partners –
  of course. But when it comes to football, even we are competitors. However, I would
  say Germany has a pretty good chance of winning anyway. Because either the German
  team takes the trophy… Or the English team does – with a German manager at the helm.
  as important as football is, there is even more to the future of German-British
  relations, which we are here to talk about today. Germany and the United Kingdom
  are facing the same monumental challenges. We see an international order that is
  eroding – economically, politically, and militarily. For the first time in generations,
  Europe is facing two wars simultaneously: In the East, we have to counter an imperialist
  Russia. For years Russia’s brutal war of aggression against Ukraine has shattered
  the illusion that peace in Europe can be taken for granted. And Russia will remain
  a key threat to our security for the foreseeable future. Additionally in the South,
  the situation in the Middle East and Gulf region also poses a threat to our security
  and prosperity. The objective now must be to pursue a diplomatic process towards
  a lasting end to the war. At the same time, our transatlantic relationship is undergoing
  a profound transformation. And we are facing an accelerated technological revolution
  driven by AI and other emerging technologies – including in space. Technologies
  that require us to adapt fast and decisively. None of these challenges can be addressed
  by one country alone. But together we have the strength, the experience and the
  credibility to make a difference. I am convinced that Europe’s fundamental interests
  and values can be far better protected and strengthened together with the United
  Kingdom! Because – for us – the UK is a key partner in defending our European security
  and in supporting Ukraine. The UK is a key partner in protecting our freedom and
  democracy, as well as the prosperity and growth of our economies. And the UK is
  also indispensable in preserving free trade and multilateral cooperation. Germany
  and the United Kingdom have already coordinated their efforts closely and intensively.
  However, the Kensington Treaty provides our bilateral partnership with a new structured
  framework. The treaty underlines the commitment shared by Germany and the United
  Kingdom: To stand together, as friends and partners that complement each other.
  To resolutely defend security and peace in Europe. The treaty outlines 17 priority
  projects not only at the economic and political levels, but also for civil society,
  that aim to deliver tangible benefits for the citizens of both countries. Because
  treaties do not create partnerships. People do. Friendship comes about only when
  we listen to one another, share our thoughts, and come to understand one another
  better. That is why we are planning a direct rail connection between Germany and
  the UK. That is why we are promoting civil society exchanges through visa-free school
  trips. Or through the first German-British Youth Summit, which took place in March.
  That brings me to you – the young generation in this room. Because at “New Königswinter
  Future Lab” we want to look ahead and listen to your perspectives. Because you are
  the ones who will give life to our partnership in the years to come. You will shape
  how our countries work together – through your ideas, your networks and your engagement.
  Whether you work in finance, diplomacy, tech or civil society – you will be the
  bridge between our nations. And your willingness to cooperate across borders. Because
  the challenges we face will not become easier or fewer. And thank you for being
  willing to take responsibility for the future of our partnership. The message we
  send today is simple, but powerful: Germany and the United Kingdom stand together.
  I look forward to today’s discussion with you.'
