title: North Atlantic Council statement on the occasion of the 11th review conference
  of the Treaty on the Non-Proliferation of Nuclear Weapons
text: NATO Allies underline their strong commitment to the full implementation of
  the Treaty on the Non-Proliferation of Nuclear Weapons (NPT). Ever since its entry-into-force
  in 1970, the NPT has significantly stemmed the spread of nuclear weapons around
  the world, serving the security interest of all NPT States Parties, including NATO
  Allies. The NPT is an essential cornerstone of the global non-proliferation and
  disarmament architecture, and the framework for international cooperation in sharing
  the benefits of the peaceful uses of nuclear energy, science, and technology. Today’s
  deteriorating security environment poses challenges relevant to the NPT, as proliferation
  crises continue and escalate. Russia has violated crucial arms control commitments
  and employed irresponsibly threatening nuclear rhetoric. China continues to rapidly
  expand and diversify its nuclear arsenal without transparency. Both have increased
  ties with States that seek to proliferate nuclear weapons and undermine international
  arms control. Allies strongly encourage the United States’ pursuit of multilateral
  strategic stability. As long as nuclear weapons exist, NATO will remain a nuclear
  alliance. The fundamental purpose of NATO’s nuclear capability is to preserve peace,
  prevent coercion, and deter aggression. Allies have always adhered to their obligations
  under the NPT and continue to do so. NATO’s nuclear sharing arrangements have always
  been fully consistent with the NPT and have been in place since before the NPT entered
  into force in 1970 and at the NPT’s indefinite extension in 1995. NATO’s nuclear
  sharing arrangements have been key in preventing proliferation, one of the NPT’s
  core goals. Allies reject any attempt to delegitimise nuclear deterrence and reiterate
  that the Treaty on the Prohibition of Nuclear Weapons does not change the legal
  obligations on our countries with respect to nuclear weapons. Allies are resolved
  to contribute to the preservation, universalisation, and full implementation of
  the NPT. Allies remain firmly committed to arms control, disarmament, and non-proliferation
  efforts, with a focus on promoting transparency, reducing risk, and enhancing security.
  Allies also remain firmly committed to promoting cooperation in peaceful uses. Allies
  continue to support all the objectives of the Treaty, including Article VI, with
  a view towards worldwide verifiable elimination of nuclear weapons, based on the
  principle of undiminished security for all. We will work towards a successful NPT
  Review Conference, and stand ready to work with all NPT States Parties towards that
  same goal.
