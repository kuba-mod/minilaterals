title: Statement by Foreign Minister Wadephul prior to his departure for Morocco
text: 'Foreign Minister Wadephul issued the following statement today (29 April) prior
  to his departure for Rabat: Morocco is an important bridge between the European
  and the African continent and therefore a key partner for Germany. This year, we’ll
  be celebrating the 70th anniversary of our bilateral relations – and we still have
  lots of plans for the future. Already now, the country is our second-largest trading
  partner on the African continent. And there is significant further potential for
  growth in our economic relations, particularly in the areas of renewable energies,
  critical raw materials and hydrogen. Moreover, Moroccan skilled workers are, for
  example, providing valuable support in the health and care sector in Germany. Especially
  in times marked by uncertainty and geopolitical tensions, it is with partners like
  Morocco that we want to strengthen and intensify our exchange. Our countries share
  a commitment to the rules-based international order, with the United Nations at
  its core. In the strategic dialogue with my counterpart Nasser Bourita, we will
  address a wide range of international issues. Morocco has declared its willingness
  to help with the implementation of the 20-point plan for Gaza and to be part of
  an international security force. This is evidence of the country’s stabilising role
  in the region, a role that we highly value and are counting on. We also have the
  same objective as Morocco when it comes to stabilising the Sahel region, in order
  to mitigate the causes of crises and displacement there. Germany and Morocco conduct
  a strategic dialogue every two years at the level of Foreign Ministers in which
  they address both bilateral and international issues. The last strategic dialogue
  took place in June 2024, when the Moroccan Foreign Minister visited Berlin. Foreign
  Minister Wadephul will be accompanied on his trip by Members of the German Bundestag
  as well as by an economic delegation, which is being led by Parliamentary State
  Secretary Rouenhoff from the Federal Ministry for Economic Affairs and Energy.'
