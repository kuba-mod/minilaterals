title: 'Introductory statement by Foreign Minister Johann Wadephul at the Sudan Conference:
  Humanitarian Response and humanitarian diplomacy'
text: 'Today, we are gathered not for a pleasant occasion, not for a ceremony. Rather,
  we are gathered here because, at this very moment, the conflict in Sudan – now nearing
  its third year – is raging. A war waged with utmost brutality against the people
  of Sudan. Over the past three years, it has caused the greatest humanitarian catastrophe
  of our time. We all know the numbers of displaced persons, the reports of war crimes,
  the pictures reflecting the horror that the people of Sudan are living in. And yet,
  we have to consider: Behind every number, within every report, and on every picture
  – is a human being. They have names, they have identities and they once had plans
  for their future. Don’t they have the right to live in peace? We all share a humanitarian
  responsibility towards the people of Sudan. This catastrophe is not getting the
  public attention it should. We will not stop working to change that. This is why,
  after Paris, after London, we meet today here in Berlin. It’s a necessity in light
  of the suffering in Sudan. It’s a necessity appealing to our responsibility as the
  states and actors who are able to create change. To send the message to the people
  of Sudan that we stand by their side. It gives me confidence that all of us have
  decided to be part of this message, together. This extraordinary crisis requires
  more than our attention – it requires action. Because the situation in Sudan will
  be far more challenging as we look to the future. Russia’s ongoing war against Ukraine
  and the war in the Middle East are deepening the crisis for the people in Sudan
  and the Region, who are already living in unbearable circumstances. In this regard,
  our deepest respect goes out to the neighbouring countries that are caring for those
  who have sought refuge with them. To share the burden they carry, we must therefore
  scale up our assistance and pressure the warring parties to ensure humanitarian
  access to people all across Sudan. Let us join forces so that humanitarian assistance
  and humanitarian diplomacy can save lives. In this spirit, Germany pledges 212 million
  euro of humanitarian assistance to Sudan and the neighbouring countries. We encourage
  other countries, organisations and private-sector actors to join in the response.
  I welcome the efforts by Minister of State Serap Güler to encourage additional financial
  contributions from the German business community. The private sector has an important
  role to play. But more is needed to facilitate meaningful support. In Sudan, our
  assistance would not reach those in need without the backbone of the humanitarian
  response: the Sudanese frontline responders. There would be no support to the people
  in need without their commitment, without them risking their lives between frontlines
  on a daily basis. It is on us to strengthen this backbone and scale up their vital
  support to people across Sudan, through our political and humanitarian support.
  Looking around, I’m really grateful that all of you are here. Thanks to your commitment
  this can become much more than a productive meeting. It can become a moment of hope
  for the people of Sudan.'
