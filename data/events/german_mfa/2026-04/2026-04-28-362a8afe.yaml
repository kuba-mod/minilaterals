title: Statement by Foreign Minister Wadephul at the Open Debate on Maritime Security
  in the United Nations Security Council
text: 'Germany aligns itself with the EU Statement to be delivered later. Kitchens
  stay cold. Because liquid gas doesn’t flow. Rice stops to grow. Because fertilizers
  can’t be applied. Assembly lines stop running. Because energy has become a scarce
  resource. This is what happens globally, when Maritime Security is attacked. Maritime
  security is not an abstract concept. It is the very foundation of our interconnected
  global economy. Every country, whether coastal or landlocked, is directly or indirectly
  dependent on secure maritime routes and free and safe navigation. This creates not
  only prosperity, but also vulnerability. Disruptions in only one strategic waterway
  have the potential to affect livelihoods, stability, and economic resilience worldwide.
  In the Gulf, Iran has created and armed a network of malign militias destabilizing
  the whole region. We recount attacks on commercial vessels. Such actions constitute
  clear violations of international law, including the law of the sea, as reflected
  in the United Nations Convention on the Law of the Sea. Continued escalation, including
  missile attacks against civilian targets in the Gulf States, risks further destabilization.
  Already now, the lack of fertilizer will lead to lower-than-usual rice harvests
  in Asia. Already now, food prices on markets in Africa are rising because of much
  higher transportation costs. Already now, humanitarian aid becomes less available
  for the most vulnerable. This vicious circle has to stop before it is too late and
  before more people suffer. Germany therefore supports the UN Task Force set up to
  mitigate these risks. We call on all countries to support the UN ’s crucial and
  life-saving efforts. Please allow me to thank you for the leadership you have shown
  in the past weeks by tabling two resolutions in the Security Council. Resolution
  2817 is a crystal-clear testament to the global opposition to the reckless actions
  at hand. Germany deplores that the Security Council was unable to adopt the second
  draft resolution. Germany is prepared to help ensure the freedom of navigation in
  the Strait of Hormuz once hostilities have ceased. Our message, in coordination
  with all our partners, is this: Iran must stop attacking other countries. The Strait
  of Hormuz must be open to free and safe maritime traffic .'
