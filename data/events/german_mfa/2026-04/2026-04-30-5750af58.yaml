title: Berlin Principles for Sudan
text: 'Following the Sudan Conference in Berlin on April 15, 2026, marking three years
  of devastating conflict, in the wake of the 2024 Paris and 2025 London Conferences,
  the Ministers of Foreign Affairs and high representatives of the States and international
  and regional organizations assembled in Berlin – the African Union ( AU ), the European
  Union ( EU ), France, Germany, the United Kingdom and the United States of America
  as co-hosts, as well as Djibouti, Egypt, Ethiopia, Kenya, Norway, Qatar, Saudi-Arabia,
  South Sudan, Switzerland, Tchad, Türkiye, Uganda, the United Arab Emirates, the
  United Nations ( UN ), the Intergovernmental Authority on Development ( IGAD ),
  and the League of Arab States (LAS) – (“the participants”) reaffirmed the following
  guiding principles for a peaceful and durable resolution of this conflict in line
  with the Quad Joint Statement, the African Union Roadmap and Resolutions and relevant
  United Nations Security Council Resolutions on Sudan: The participants commit to
  uphold these principles and to act accordingly.'
