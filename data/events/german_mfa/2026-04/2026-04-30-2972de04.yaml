title: Joint Declaration of the Kingdom of Morocco and the Federal Republic of Germany
  - Second Session of the Multidimensional Strategic Dialogue
text: 1. The Minister of Foreign Affairs, African Cooperation and Moroccans Living
  Abroad of the Kingdom of Morocco, Mr. Nasser Bourita, received in Rabat on April
  30, 2026, the Minister of Foreign Affairs of the Federal Republic of Germany, Dr.
  Johann David Wadephul, within the framework of the second session of the Morocco-Germany
  Multidimensional Strategic Dialogue. 2. The two Ministers expressed their satisfaction
  with the excellent relations between the Kingdom of Morocco and the Federal Republic
  of Germany and welcomed the positive dynamics in the bilateral relations since the
  holding, on June 28, 2024, in Berlin, of the 1st session of the Morocco-Germany
  Multidimensional Strategic Dialogue, co-chaired by the Ministers of Foreign Affairs
  of the two countries. During the second session of the Strategic Dialogue, they
  took the opportunity to reiterate its objectives, namely, the preservation of the
  priority interests of the two countries, the strengthening of coherence in the various
  areas of bilateral cooperation, the exploration of new opportunities for mutually
  beneficial collaboration and partnership in key sectors, the strengthening of trust
  and mutual understanding, and the consolidation of cooperation in the political,
  economic, social, cultural and security fields. 3. The two Ministers welcomed the
  efforts and progress made since the adoption of the 2024 Berlin Joint Declaration.
  They welcomed with satisfaction the important progress in implementing the joint
  agenda defined in the Joint Declaration and reaffirmed their common commitment to
  continue the implementation based on shared values, common interests and mutual
  respect. They welcomed the opportunity offered by this second session of the Multidimensional
  Strategic Dialogue to exchange views on bilateral, regional, and international issues
  of common interest, to assess joint achievements over the past two years, and to
  further strengthen the multidimensional partnership in all areas. 4. The two Ministers
  welcomed the commemoration this year of the 70th anniversary of the establishment
  of diplomatic relations between the Kingdom of Morocco and the Federal Republic
  of Germany, which underscores the depth of bilateral relations and provides an opportunity
  to celebrate seven decades of historic partnership and all the men and women from
  both countries who have worked to further the friendship between Morocco and Germany,
  particularly through the New Development Model. 5. The Minister of Foreign Affairs
  of the Federal Republic of Germany welcomed the reforms undertaken by the Kingdom
  of Morocco under the leadership of His Majesty King Mohammed VI, aimed at advancing
  the political, economic and social development of the country for the benefit of
  all Moroccans, 6. The two Ministers agreed on the importance of continuing the work
  in the UN Human Rights Council in support of human rights. They stressed the importance
  of the EU -Moroccan Human Rights Dialogue. They decided to continue the bilateral
  dialogue and coordination on human rights issues. 7. The two Ministers welcomed
  the high level of German investments and substantial engagement of the German private
  sector in Morocco, notably in the automotive, aviation, pharmaceutical and digital
  industry, and highlighted the opportunities in the field of renewable hydrogen and
  energy transition as well as, among others, in infrastructure and circular economy.
  The two Ministers reaffirmed their commitment to further developing investment and
  trade relations and encouraged economic actors to develop existing and explore new
  opportunities. They emphasized Morocco's significant investment potential and highlighted
  Morocco's participation in the G20 “Compact with Africa” initiative. 8. The two
  Foreign Ministers commended the remarkable momentum in trade between Germany and
  Morocco, marked by record growth and an even trade balance. They welcomed the continued
  strengthening of the bilateral economic partnership and the rise of the Kingdom's
  position among Germany's trading partners. 9. The two Ministers stressed the importance
  of the bilateral Joint Economic Commission. Such regular Moroccan-German Economic
  Forums will serve as a key platform bringing together public and private stakeholders
  from both countries, aiming to strengthen industrial partnerships, facilitate trade,
  promote cross-investment, and support strategic projects, particularly in the areas
  of industry, integrated value chains, renewable energy and hydrogen and digitalization
  including AI. They may also contribute to identifying new opportunities for high-value-added
  cooperation. 10. The two Ministers agreed to work to tap the high potential of complementarities
  and opportunities that the economic relations between Morocco and Germany offer.
  German private investments in Morocco support sustainable development, vocational
  training, and SMEs. 11. The two Ministers welcomed the holding of the Moroccan-German
  Intergovernmental Negotiations on Development Cooperation in November 2025 in Berlin,
  which set joint priorities for the period 2026-2027.They include the support to
  Morocco’s reforms aimed at promoting a sustainable, decarbonized and equitable economic
  transformation with a view to unlocking the private sector’s potential for job creation
  and growth, to Morocco’s energy transition including the market ramp-up of a green
  hydrogen based economy, promotion of sustainable water resource management adapted
  to the effects of climate change and other areas of common interest. 12. The two
  Ministers agreed on the importance of involving the private sector and private sector
  institutions of both countries more closely in development cooperation and on strengthening
  the links between the bilateral development cooperation portfolio and the private
  sector. 13. The two Ministers reiterated their interest in continuing triangular
  cooperation, such as the Femmpact project, and South-South cooperation for the benefit
  of the African continent, building on the experiences gained within the framework
  of Moroccan-German cooperation and pursuing the implementation of ongoing projects,
  as well as exploring the opportunity to expand them to other African countries.
  14. The two ministers reaffirmed their commitment to promoting an ambitious international
  effort to combat the effects of climate change and its effects, aiming to limit
  global warming and fostering resilience for a sustainable prosperous future, among
  others through cooperation in the areas of forest restoration and climate adaptation,
  as well as regarding renewables, energy efficiency, and production of green hydrogen.
  They agreed to continue close exchanges on climate diplomacy ahead of the next COP.
  15. The two Ministers agreed to expand bilateral agricultural trade relations, to
  use the potential for cooperation in the areas of agricultural technology, innovation
  and digitalization, and to continue the successful high-level inter-ministerial
  working group on food and agriculture. They further agreed to continue cooperation
  between research institutions and authorities and welcomed the existing bilateral
  cooperation program on organic farming and cooperatives as a comprehensive approach
  for resilient, sustainable agriculture. 16. The two Ministers welcomed the signing,
  in January 2026, in Rabat, of the partnership agreement between the National Museums
  Foundation and the Prussian Cultural Heritage Foundation, thus marking the strengthening
  of cultural cooperation between Morocco and Germany in the scientific, educational
  and cultural fields and defining a general framework for collaboration based on
  a common vision of heritage as a lever for intercultural dialogue, knowledge sharing
  and sustainable development. 17. Both parties underscored the importance of their
  partnership in the fields of higher education, scientific research and innovation.
  The two countries expressed their shared commitment to further strengthening this
  cooperation through the signing of a Memorandum of Understanding in the areas of
  higher education, scientific research, and innovation and expressed their commitment
  to strengthening the existing support programmes for the acquisition of German and
  Arabic language, expanding the PASCH-Initiative within the Moroccan school system,
  enhancing exchanges, sharing of the best practices between schools and reinforcing
  teacher capacity building under the PASCH initiative. 18. The two Ministers reiterated
  the importance of promoting bilateral cooperation in the cultural, religious, and
  academic fields, strengthening interpersonal relations and increasing the enrolment
  of Moroccan students in German higher education institutions, including through
  relevant EU initiatives. The two Ministers recognized the important role of members
  of the Moroccan-German community in both countries as a bridge to fostering economic
  cooperation and cultural exchange. 19. Cultural cooperation between Morocco and
  Germany is rooted in a solid and well-established framework, built on the cultural
  cooperation agreement, signed in 1987 and entered into force in 1990. Since then,
  this agreement reflects the continuous commitment of both countries to maintain
  and further strengthen their cultural ties. Building on this foundation and in recognition
  of the central role that culture plays in bringing our two people and friendly nations
  closer together, the two ministers express their readiness to further strengthen
  their bilateral cultural cooperation and to give new momentum to their cultural
  exchanges, as well as sharing experiences and expertise in areas of common interest.,
  20. The two Ministers welcomed the first meeting of the German-Moroccan working
  group for the implementation of the declaration of intent on religious policy, held
  in Morocco in 2025. 21. The two Ministers also agreed to promote cooperation in
  the field of sport and in this regard, the German Minister congratulated Morocco
  on the organization of the 2030 FIFA World Cup, alongside Portugal and Spain, highlighting
  his country's interest in contributing through German companies to the realization
  of this grand event, which will have a significant impact on the development of
  Morocco at all levels. 22. The two Ministers agreed on the important role of civil
  society and welcomed the signing in September 2025, on the sidelines of the 80th
  session of the United Nations General Assembly in New York, of the amendment to
  the Agreement on Technical and Economic Cooperation of November 24, 1966, concerning
  German Political Foundations in Morocco. In this regard, they reaffirmed the importance
  of the implementation of the agreement and commended the German political foundations
  in Morocco for their activities. The Two Ministers welcomed the willingness of the
  German Political Foundations to accompany the strategic partnership between the
  two countries through a sustained, transparent and long-term engagement in Morocco.
  23. The two Ministers stressed the importance of involving regional and local authorities
  and non-state actors in the dynamics of the bilateral partnership. They welcomed
  partnerships between regions, including the conclusion of a partnership between
  the region Tanger-Tétouan-Al Hoceima and the Land Niedersachsen. 24. In the area
  of migration cooperation, the two Ministers commended the mutual strategic and reliable
  partnership and welcomed the fact that this partnership is based on shared responsibility
  and a structured approach to managing migration flows. The two Ministers expressed
  their support for the work of the bilateral Permanent Mixed Migration Group (PMMG).
  They also welcomed the preparations for the next meeting of the group, scheduled
  to take place in Germany in 2026. They agreed that reducing irregular migration
  is a common goal and requires a comprehensive approach that guarantees international
  human rights standards. They reaffirmed their commitment to continue strengthening
  return and readmission processes as well as to improving professional mobility and
  legal migration, drawing on experiences piloted within the framework of bilateral
  development cooperation, as well as reintegration, particularly through EU talent
  partnerships, within the framework of the Rabat process and the Global Compact.
  25. The two Ministers reaffirmed their steadfast commitment to the promotion of
  regional and international peace and security, the protection of human rights, and
  the advancement of sustainable development. They underscored the importance of a
  rules-based international order with the United Nations at its core and condemn
  any violation of the fundamental principles of the UN Charter. They also reaffirmed
  their commitment to the peaceful settlement of disputes and emphasized the central
  role of the UN and multilateral institutions in addressing global challenges. Both
  Ministers committed to working together with a view to strengthening multilateral
  institutions and further enhancing cooperation and coordination within international
  organizations, particularly at the UN . The two Ministers welcomed their coordination
  on matters of common interest within international organizations and bodies. 26.
  The two Ministers reaffirmed their commitment to the UN -led process on Western
  Sahara, and welcomed UN Security Council Resolution 2797 (2025), which expresses
  full support for the Secretary-General and his Personal Envoy in facilitating and
  conducting negotiations, taking as a basis Morocco’s Autonomy Proposal, with a view
  to achieving a just, lasting and mutually acceptable resolution of the dispute,
  consistent with the United Nations Charter, and welcomes any constructive suggestion
  by the parties in response to the Autonomy Proposal and which calls upon the parties
  to engage in discussions without preconditions, taking as a basis Morocco’s Autonomy
  Proposal, with a view to achieving a final and mutually acceptable political solution
  that provides for the self-determination of the people of Western Sahara, and recognizes
  that genuine autonomy could represent a most feasible outcome and encourages the
  parties to submit ideas to support a final mutually acceptable solution, noting
  that UN Security Council Resolution 2797 affirms that genuine autonomy under Moroccan
  sovereignty could constitute a most feasible solution. In this context, Germany
  welcomed Morocco’s willingness to engage in good faith with all parties concerned
  in order to clarify the arrangements under this autonomy plan, which Germany regards
  as a serious and credible basis for negotiations, and explain what shape autonomy
  under Moroccan sovereignty would take. Germany stands ready to assist in facilitating
  the consultations between the parties within the framework of the United Nations
  and to support the efforts of the Secretary-General’s Personal Envoy. In this regard,
  Germany would act in accordance with its position at the diplomatic and economic
  level in compliance with international law. 27. The two Ministers exchanged views
  on current international affairs and emphasized the active and constructive commitment
  of their two countries to maintaining stability, security, and peace in their respective
  regions, particularly in the Sahel, Libya, the Middle East, Iran, the Gulf States,
  and Europe. Deploring the serious situation that has persisted for more than four
  years since Russia violated Ukraine's territorial integrity, and recalling in particular
  the various United Nations General Assembly resolutions on Ukraine, the two Ministers
  reaffirmed the obligation of all states to refrain from the threat or use of force
  in their international relations. They underscored the need to reach, as soon as
  possible, a comprehensive, just and lasting peace in Ukraine in line with the principles
  of the United Nations Charter and international law. They reaffirmed their support
  for the independence, sovereignty and territorial integrity of Ukraine within its
  internationally recognized borders. 28. With regard to the current developments
  in the Middle East, the two Ministers urged all involved to fully respect the ceasefire
  across the region, cease all military operations and fully ensure freedom of navigation
  as well as free and safe passage through the Strait of Hormuz. Diplomacy is key
  to resolve all outstanding issues. The two ministers reaffirmed their countries’
  commitment to a negotiated two-State solution, with a democratic, independent and
  viable Palestine living side by side in peace and security with Israel. The German
  Minister commended the constructive role of the Kingdom of Morocco in the Middle
  East particularly the personal engagement of His Majesty King Mohammed VI as Chairman
  of the Al-Quds Committee. The Moroccan Minister commended the German support for
  the Palestinian Authority as well as the significant humanitarian assistance and
  development cooperation Germany has provided and continues to provide to Palestinians.
  29. The German Foreign Minister also commended Morocco's active and constructive
  role and its contribution, under the leadership of His Majesty King Mohammed VI,
  to peace and stability in the region, reaffirming that the Kingdom is a key partner
  of the European Union, NATO , and Germany in Africa and a crucial link between North
  and South. In this regard, he praised Morocco's efforts in combating terrorism and
  irregular migration. The Moroccan Foreign Minister, in turn, expressed Morocco’s
  strong commitment to the strategic partnership with the European Union and its wish
  to foster closer ties with Germany as an essential European partner. 30. The two
  Ministers expressed their support for the close cooperation and strategic partnership
  between the European Union and the Kingdom of Morocco and welcomed the results of
  the 15th meeting of the Association Council between the European Union and the Kingdom
  of Morocco, held in January 2026. In this context, the two Ministers also emphasized
  Morocco’s important and constructive role in the European Union’s southern neighbourhood,
  as a trusted partner and committed actor for regional stability and prosperity.
  To this end, they welcomed the Pact for the Mediterranean, launched in Barcelona
  in November 2025, which promotes a renewed spirit of partnership between the European
  Union and its southern partners, based on mutual trust and shared responsibility.
  The two Ministers stressed the importance of creating synergies and strengthening
  cooperation through European Union initiatives and programs. 31. The German Minister
  also welcomed Morocco's efforts through the numerous initiatives launched under
  the leadership of His Majesty King Mohammed VI, aimed at promoting peace, stability,
  and socio-economic development in Africa. The Moroccan Minister emphasised particularly
  the Royal Initiative to facilitate access for Sahel countries to the Atlantic Ocean,
  the African State Process and the African Atlantic Gas Pipeline project. 32. The
  two Ministers expressed their intention to further strengthen military cooperation
  as well as armament and defence cooperation on the basis of mutual trust and respect.
  The Declaration of Intent on Military Cooperation will represent an important step
  towards a continued, ambitious, and beneficial military cooperation. 33. The two
  Ministers welcomed the strengthening of security cooperation between Morocco and
  Germany, particularly in the fight against terrorism, thanks to intensive exchanges
  between Moroccan and German security services and cooperation within the Global
  Coalition against Daesh. They further encouraged continued close cooperation on
  transnational organized crime, drug smuggling in addition to the issue of ensuring
  the security of major events, including World Cup 2030, through enhanced operational
  cooperation, intelligence sharing, and police training.In this regard, German security
  authorities stand ready to share their expertise in organizing safe and secure sport
  events based on the recent experiences in Germany. 34. The two Ministers welcomed
  the progress in negotiations of a bilateral security agreement and establishing
  a security dialogue, complementing existing cooperation, to strengthen consultation
  on issues of common interest, particularly in the fight against terrorism and regional
  security. 35. The two ministers underlined their intention and commitment to advance
  towards the signing of a Classified Information and Security Agreement. 36. The
  two Ministers agreed to continue working towards an agreement between Morocco and
  Germany on the elimination of visa requirements for service passports. 37. The two
  ministers emphasized the friendly, open and constructive atmosphere of their exchange
  and agreed to continue the multidimensional strategic dialogue on the implementation
  of the Joint Declaration, with regular consultations aimed at strengthening the
  comprehensive partnership between Morocco and Germany.
