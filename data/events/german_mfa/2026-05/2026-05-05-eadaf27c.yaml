title: Speech by Foreign Minister Johann Wadephul at the Africa Day 2026
text: 'When the Federal Government signed the Coalition Treaty, on this day exactly
  one year ago, we agreed to put Africa’s global importance at the core of our foreign
  policy. My assignment was clear: I would have to strengthen our bonds. Within my
  first two weeks in office, I therefore met and spoke with nearly half of your Foreign
  Ministers. And it quickly made me realise that we need both: an “ Africa policy
  ” as well as “ Africa policies ”. We are strong believers in Africa’s ambitions
  to unite and stand strong against the geopolitical turbulences of our time, which
  is why we have always supported the African Union and continue to do so. Because
  a successful “ Africa policy ” is essential for German and European foreign and
  security policy. In addition, we need “ Africa policies ”: Each of your 54 African
  countries is unique. Each is connected to us via an individual partnership that
  deserves specific attention. This also became visible in April, when we had what
  one could almost call a wonderful “African month” in Germany. Here in Berlin, we
  celebrated 30 years of the Binational Commission with South Africa. We co-hosted
  the international Sudan Conference, together with the AU and other partners. Chancellor
  Merz and I met with the Chairperson of the African Union Commission. Last week in
  New York, I met with the permanent representatives of the African Group. And just
  a few days ago, I returned from my first visit to Morocco. My legs are still sore
  from the match we played against the young female Moroccan football team. And clearly
  it doesn’t matter who the winner was. But once again I realised: As foreign minister
  of Germany, you are always also a football diplomat. However, my job is of course
  more than that. Early in our tenure, Minister of State Serap Güler and I decided
  that Africa will be one of her key priorities. This is why she visited Sudan as
  the first European politician since the war broke out. Minister of State Güler and
  I want to work towards an end to this terrible war and support the Sudanese people
  in the best way possible. It is a promising achievement that, in the aftermath of
  the Sudan Conference, we finalised a political declaration – the “ Berlin Principles
  ” – signed by all regional actors with influence over the conflict parties. Last
  week, I had the honour to speak at the UN Security Council. Under the topic of Maritime
  Security, we discussed the impacts of the war in Iran. Impacts we all can feel in
  our countries. The impact of the blockade of the Strait of Hormuz on the global
  economy. The impact of the shortage of oil and fertilisers that could have horrible
  consequences for already vulnerable regions around the world. We are convinced that
  we now need the cooperation of the international community to alleviate the war’s
  consequences more than ever before. Rest assured: Germany will continue to speak
  up for African interests on the international stage. Because we choose cooperation
  over confrontation. A principle that may seem almost outdated in today’s world -
  but one that is all the more essential. This was my strong impression in New York
  last week, where I met with representatives of many of your countries. I was there
  to advocate for Germany’s candidacy for a non-permanent seat on the United Nations
  Security Council. It may seem contradictory to some at a time when many speak of
  the erosion of the rules-based international order – why would Germany campaign
  for stronger engagement in the UN ? But this is not a contradiction. It is a necessity.
  Because the troubling aspect of this erosion is not merely that it is happening,
  but that it reflects a deeper truth: The rules-based international order within
  the UN does not adequately represent today’s geopolitical realities. For me, this
  is one of the key issues. It is one of the reasons why I agreed with the Chairperson
  of the AU Commission, Mahmoud Ali Youssouf, on a strategic dialogue when I was in
  Addis Ababa in January. We want to use this dialogue to discuss foreign policy issues
  that are of mutual interest and concern. Africa is a centre of gravity and shapes
  discussions of global governance. And African states and institutions will take
  over more global responsibility. We support African demands for reform of global
  governance. Modern multilateralism must reflect today’s realities. That is why Germany
  advocated for the African Union to become a full member of the G20 and supported
  South Africa’s role at the G20 table. And that is why, in New York, I actively advocated
  for two permanent and five non-permanent seats for our African partners. A legitimate
  international order that delivers for all is only just if all can see themselves
  reflected in it – with both their responsibilities and their rights. Around 70 percent
  of the Security Council’s agenda concerns Africa, and by 2050, one in five people
  worldwide will be African. Supporting the Ezulwini Consensus is a matter of fairness
  and respect. A united Europe and Africa can be a powerful force – together representing
  over 40 percent of votes in the UN General Assembly. This unity became visible at
  the last AU - EU Summit in Luanda. That is why it is important for us to work together
  – to build partnerships in which we stand side by side. And to overcome global challenges
  which affect both our continents. This also entails the strengthening of our economic
  partnership with your countries. Our vision is clear: We want to boost trade, drive
  investment, and strengthen regional integration. We want diversification of supply
  chains, local added value, closer cooperation on critical raw materials, and fewer
  trade barriers. Because I firmly believe that investing in regional free trade is
  a long-term investment in peace and security. Regional integration and the reduction
  of non-tariff barriers are key. That is why Germany is the largest bilateral donor
  to the African Continental Free Trade Area and a longstanding supporter of regional
  economic communities. Germany is present all across the African continent, promoting
  exchange through our 45 missions, our Chambers of Commerce and Industry, the Goethe-Institutes,
  GIZ, Deutsche Welle , foundations, and the German Academic Exchange Service DAAD
  . I said in the beginning that the Federal Government puts Africa’s global importance
  at the core of our foreign policy. Celebrating this Africa Day and the 63 rd anniversary
  of the founding of the Organization of African Unity with you today therefore almost
  feels like coming full circle. I am especially glad that we are hosting this celebration
  together - here at the Federal Foreign Office, which is not only at the core but
  also at the heart of our foreign policy - and our Africa policies!'
