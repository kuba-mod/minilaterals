title: Joint Statement on DPRK Sanctions Accountability
text: 'The Governments of Australia, Canada, France, Germany, Italy, Japan, New Zealand,
  the Republic of Korea, the United Kingdom, and the United States and the European
  External Action Service welcomed the April 30 Open Source Centre briefing to the
  United Nations Security Council on continuing maritime sanctions evasion by the
  Democratic People’s Republic of Korea (DPRK). The evidence presented—including vessel
  imagery, voyage reconstruction, Automatic Identification System (AIS) manipulation,
  and port call analysis—indicates clear violations of obligations under Security
  Council resolutions prohibiting the export of DPRK coal and iron ore. The vessels
  identified as involved in these activities in recent months are DREAM WAVE (IMO
  8693073), PEACEFUL 8 (IMO 1039424), ORION (IMO 9638953), FU RUN DA 1 (IMO 1099814),
  and OSTROV ANTSIFEROVA (IMO 9178070). We further note the clear evidence supporting
  the seven vessels nominated to the 1718 Committee in December 2025 for designation
  under Security Council resolution 2321 that remain under consideration and call
  on the Committee to act swiftly to designate these vessels: FLYFREE (IMO 1092684),
  CASIO (IMO 9125786), MARS (IMO 1077402), CARTIER (IMO 1091898), SOPHIA/PRADA (IMO
  1079345), ARMANI (IMO 1078561), and YI LI 1 (IMO 1059149). Under United Nations
  Security Council resolution 1718, paragraph 12, the Committee is mandated to examine
  and take appropriate action on information regarding violations and to strengthen
  implementation of the measures it oversees. Prompt designations are essential to
  preserving the credibility and effectiveness of the UN sanctions regime.'
