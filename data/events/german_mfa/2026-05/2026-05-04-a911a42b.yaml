title: Foreign Minister Wadephul prior to his departure for Athens
text: 'Foreign Minister Wadephul issued the following statement today (4 May 2026)
  prior to his departure for Athens: Greece is a strategic anchor for us in southeastern
  Europe and a close friend and partner in the European Union and NATO . My visit
  to Athens today is sending a clear signal that Germany and Greece are forging even
  closer ties – for a Europe that protects its interests, defends its values and is
  capable of action in an increasingly turbulent world. Greece is the cradle of essential
  values that shape Europe today. These values and established global rules are increasingly
  being called into question by power politics around the world. Russia’s war of aggression
  against Ukraine, the situation in the Middle East and Iran’s blockade of the Strait
  of Hormuz show that our security, economic stability and open trade routes are inextricably
  linked. In the face of these challenges, we Europeans have decided to take on greater
  responsibility for our own security and defence capabilities. Fortunately, new options
  are now available to us in this regard: in joint procurement, in European funding
  and in building a robust defence industry. We intend to make full use of these instruments
  – particularly with close partners such as Greece. Our economic cooperation is the
  foundation for Europe’s ability to assert its interests. Through bold and vigorous
  reforms, Greece has found its way out of an economic crisis and onto a path of growth.
  Greece is a dynamic growth market today. In areas such as energy, the digital transformation
  and infrastructure, there is great potential for even closer cooperation between
  our countries. A Europe capable of action also needs a modern EU budget that responds
  flexibly to new threats and sets clear priorities – particularly in areas where
  we need to become more independent and resilient. Enhancing the EU’s capability
  to act also means that we must put our decision-making processes on a new footing
  in order to address the many crises that we face more quickly and effectively. Deadlocks
  are something that we can increasingly ill afford, particularly because we want
  to think strategically about Europe’s future. EU enlargement is a concrete promise,
  and tangible progress among the candidate countries must be taken seriously. From
  Albania to Ukraine, we must offer credible prospects for accession. Greece has a
  special role to play here. A decisive phase lies ahead during its Presidency of
  the Council of the European Union in the second half of 2027 – and we want to shape
  this together.'
