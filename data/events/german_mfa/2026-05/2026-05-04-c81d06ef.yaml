title: Joint Statement by the Ministers for Foreign Affairs of the Hellenic Republic
  and the Federal Republic of Germany on the establishment of a Partnership for Strategic
  Cooperation
text: 'Greece and Germany can build upon a longstanding friendship rooted in deep
  historical, cultural and societal ties as well as our shared values of freedom and
  democracy, human rights and the respect for the rule of law serving as a solid fundament
  even in difficult phases. As members of the United Nations we are fully committed
  to upholding the rules based international order, particularly investing in respect
  for sovereignty and territorial integrity and compliance with international law.
  We firmly support ongoing efforts to strengthen multilateral solutions and make
  the United Nations more efficient and effective. Against the backdrop of fundamental
  geopolitical changes following Russia’s war of aggression against Ukraine as well
  as instability arising in the Near and Middle East, Greece and Germany are committed
  to jointly assume responsibility and step up their efforts to contribute to peace
  and security in Europe and beyond. Ten years after signing the first Greek-German
  Action Plan in 2016, the strength of our partnership is reflected in the established
  close political dialogue as well as significant investments and trade. Our excellent
  and growing cooperation in culture and science and especially the ties between German
  and Greek people form the strong and solid base of our bilateral relations. As EU
  partners and NATO allies, our shared interest is upholding a strong, secure and
  competitive Europe in the current challenging context. In this spirit, we are committed
  to further intensifying our close cooperation as well as expanding and solidifying
  our bilateral ties to the benefit of our societies, thereby upgrading our partnership
  to a new level. Recognizing the need for even deeper coordination between our two
  countries in a rapidly changing global landscape, we therefore agree to work towards
  an agenda for a Partnership for Strategic Cooperation between Greece and Germany,
  jointly addressing the following pillars: I. Foreign Policy, Security, Migration
  & European Affairs , with the objective to create an ambitious framework for bilateral
  and European coordination on key geopolitical issues, regional stability, multilateral
  governance, migration flows, and the future of the European Union. II. Defence,
  Civil Protection & Hybrid Threats, Law Enforcement , with the objective to strengthen
  our capabilities to respond to conventional and hybrid threats and expand our efforts
  in defence procurement, logistics, and crisis management. III. Economic cooperation,
  Investments, Digital Transformation & Infrastructure , with the objective to boost
  resilience of bilateral and European trade and investment, strengthen industrial
  ecosystems and harness new technologies for governance, business and socially just
  transformation. ΙV. Science, Education, Skills & Culture, Civil Society and Youth
  , with the objective to foster collaboration in research, education, and cultural
  exchange, as well as to further promote mutual understanding and reconciliation
  between societies. The Foreign Ministries will be responsible for the monitoring
  and the effective implementation of this reenergized partnership through regular
  consultations, in liaison with the competent ministries.'
