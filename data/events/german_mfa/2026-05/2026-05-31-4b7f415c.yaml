title: Statement by Foreign Minister Wadephul on the Israeli army’s advance further
  into southern Lebanon
text: Foreign Minister Wadephul issued the following statement on 31 May 2026 on the
  Israeli army’s advance further into southern Lebanon The further advance by the
  Israeli army into southern Lebanon gives cause for serious concern. At the same
  time, this is a reaction to continued attacks by Hezbollah on the north of Israel
  that must finally stop. All parties to the conflict have been urgently called upon
  to cease all hostilities and return to the ceasefire that has been agreed upon.
  Any further escalation will exacerbate the already tense situation and trigger new
  waves of displacement within Lebanon. Of course Israel has legitimate security interests.
  Yet when it is civilians that pay the price of a military escalation and when parts
  of Lebanon become permanently uninhabitable, this will not make Israel’s environment
  any more secure in the long term. In taking action against Hezbollah, Israel must
  protect civilians as well as civilian infrastructure. The key to stabilising Lebanon
  is strengthening the Lebanese state. This includes decisive action by the Lebanese
  Government against Hezbollah, and Lebanon exercising its sole right to the use of
  force on its entire territory. In a historic step, the Governments of Lebanon and
  of Israel have met in Washington for direct talks. A further round of these talks
  is planned for the upcoming week. This is the correct channel through which to achieve
  success. There must be a sustainable diplomatic solution with a view to protecting
  civilians on both sides of the Blue Line, and there must be lasting peace. Hezbollah
  must not further undermine this peace process.
